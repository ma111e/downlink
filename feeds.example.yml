# Example feeds.yml with dummy values
# Demonstrates all supported configuration options

feeds:
    # Basic RSS feed with minimal config
    - url: https://example.com/rss.xml
      title: Example Blog
      type: rss
      enabled: true
      scraper:
        article: div.article-body
        cutoff: footer

    # Feed with dynamic scraping enabled
    - url: https://technews.example.org/feed
      title: Tech News Daily
      type: rss
      enabled: true
      scraping: dynamic
      scraper:
        article: .post-content
        cutoff: .related-posts

    # Feed with full_browser scraping (headless browser)
    - url: https://blog.example.com/rss
      title: Security Blog
      type: rss
      enabled: true
      scraping: full_browser
      scraper:
        triggers:
            failed:
                - .cf-browser-verification
            loaded:
                - article
        selectors:
            article: .article-content
            cutoff: .share-buttons

    # Feed with blacklist selector
    - url: https://news.example.net/feed
      title: News Wire
      type: rss
      enabled: true
      scraper:
        article: article.post
        blacklist: .ads

    # Disabled feed
    - url: https://oldfeed.example.com/rss
      title: Old Feed (disabled)
      type: rss
      enabled: false
      scraper:
        article: div.content
