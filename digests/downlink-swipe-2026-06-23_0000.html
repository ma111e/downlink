g; both migrations must proceed concurrently now because the authentication dependency chain is long and ecosystem support is still immature, or the 2031 target will be missed.","The 2031 authentication deadline reveals that the U.S. government assesses a non-negligible chance that a cryptographically-relevant quantum computer will be operational around that time, effectively disclosing an internal threat horizon.","Without defining 'transition' to explicitly require disabling classical cryptography, agencies risk completing a formal migration that remains fully vulnerable to downgrade attacks, repeating the SSLv3 deprecation failure.","Insisting on a full cryptographic bill of materials (CBOM) before acting can stall migration for years; a quantum impact inventory focused on system exposure and mitigation feasibility is a faster, more practical starting point.","The procurement mandates on federal contractors act as a supply-chain lever that will force PQC-capable products into the broader market, indirectly upgrading hospitals, banks, universities, and small businesses without direct regulation."],"referencedReports":[{"title":"Safeguarding cryptocurrency by disclosing quantum vulnerabilities responsibly","url":"https://research.google/blog/safeguarding-cryptocurrency-by-disclosing-quantum-vulnerabilities-responsibly/","publisher":"Google","context":"Cited as a research breakthrough that helped accelerate Cloudflare's internal post-quantum security deadline to 2029.","category":"","primary":false},{"title":"Oratomic quantum research breakthrough (arXiv:2603.28627)","url":"https://arxiv.org/abs/2603.28627","publisher":"Oratomic","context":"Cited as a research breakthrough that helped accelerate Cloudflare's internal post-quantum security deadline to 2029.","category":"","primary":false},{"title":"NIST IR 8547 (Initial Public Draft) Transitioning the Use of Cryptographic Algorithms and Key Lengths","url":"https://nvlpubs.nist.gov/nistpubs/ir/2024/NIST.IR.8547.ipd.pdf","publisher":"NIST","context":"Referenced as the previous 2024 guidance that the executive order updates, setting deprecation deadlines for classical public key cryptography.","category":"","primary":false},{"title":"CNSA 2.0 Algorithms","url":"https://media.defense.gov/2025/May/30/2003728741/-1/-1/0/CSA_CNSA_2.0_ALGORITHMS.PDF","publisher":"NSA","context":"Referenced as the already-set classified track deadlines for National Security Systems, separate from the EO timelines.","category":"","primary":false},{"title":"Product Categories for Technologies That Use Post-Quantum Cryptography Standards","url":"https://www.cisa.gov/resources-tools/resources/product-categories-technologies-use-post-quantum-cryptography-standards","publisher":"CISA","context":"Referenced as CISA's procurement guidance separating 'widely available' and 'transitioning' PQC product categories, shaping agency purchasing.","category":"","primary":false},{"title":"Research on cryptographic key purpose understanding (arXiv:2603.22442)","url":"https://arxiv.org/abs/2603.22442","publisher":"arXiv","context":"Cited to support the argument that a cryptographic bill of materials lists keys without an understanding of their purpose, making a quantum impact inventory more useful.","category":"","primary":false},{"title":"NIST SP 800-131A Revision 2: Transitioning the Use of Cryptographic Algorithms and Key Lengths","url":"https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-131Ar2.pdf","publisher":"NIST","context":"Provided as an example of how long cryptographic transitions can take, illustrating the broader challenge.","category":"","primary":false}],"body":"\u003cp\u003eOn June 22, 2026, President Trump signed Executive Order 14409, requiring U.S. federal agencies to migrate their most sensitive systems—High Value Assets and high impact systems—to post-quantum encryption by the end of 2030 and to post-quantum authentication by the end of 2031. The order also directs the FAR Council to propose rules mandating that federal contractors comply with post-quantum Federal Information Processing Standards by 2030, applying supply chain pressure that helps drive broader industry adoption. Cloudflare, which has been working on post-quantum deployment since 2019, welcomes the EO and provides its perspective on effective migration.\u003c/p\u003e\n\n\u003cp\u003eThe EO splits the migration into two phases reflecting different threat models: encryption must be upgraded now to prevent harvest-now-decrypt-later attacks, where adversaries collect traffic today for decryption once quantum computers become capable, while authentication can wait until a cryptographically-relevant quantum computer actually exists. However, the article warns that the one-year gap between the encryption and authentication deadlines is misleading, because authentication carries a longer dependency chain involving coordinated upgrades across clients, servers, certificate authorities, root stores, and browsers, and ecosystem support is still immature. Both migrations must therefore begin concurrently.\u003c/p\u003e\n\n\u003cp\u003eCloudflare advises organizations to start immediately by protecting public Internet traffic, updating procurement requirements to demand post-quantum support at no extra cost, and conducting a practical quantum impact inventory rather than waiting for an exhaustive cryptographic bill of materials. The article stresses that OMB guidance must clearly define what fully \u0026lsquo;transitioning\u0026rsquo; a system means, explicitly requiring the disabling of classical cryptography to prevent downgrade attacks, and calls for speeding up NIST\u0026rsquo;s Cryptographic Module Validation Program. International standards alignment is also highlighted as critical, because cryptographic migrations cannot succeed in isolation and fragmentation would increase attack surface and slow deployment across the global Internet.\u003c/p\u003e\n"},{"n":31,"title":"The Code You Didn't Write Is Still Yours to Defend","source":"socket.dev","sourceColorIdx":2,"link":"https://socket.dev/blog/the-code-you-didnt-write-is-still-yours-to-defend?utm_medium=feed","time":"15:41","priority":"MAY READ","score":55,"tldr":"AI agents now routinely fetch and execute unvetted open-source packages in ephemeral sandboxes, bypassing traditional supply chain controls, so organizations must adopt real-time threat intelligence at the point of ingest to defend against attacks that weaponize within minutes.","briefOverview":"\u003cp\u003eA routine AI assistant action—like tidying a spreadsheet—now triggers a software supply chain event where the agent silently fetches and executes open-source packages in a sandbox, completely outside the reach of scanners, proxies, or code review. This new exposure is already occurring across every enterprise that has given employees AI agents, and it bypasses traditional vulnerability management tools that were designed for slow, forensic investigations. The article notes that today\u0026rsquo;s attacks move at a drastically faster pace: a working exploit for a disclosed vulnerability can emerge within two hours, and a malicious package can be imported into a real project minutes after landing in a registry.\u003c/p\u003e\n\n\u003cp\u003eThe popular self-help fix of blocking packages newer than seven days creates its own risk by delaying urgent security patches precisely when the patch‑to‑exploit window has compressed to hours. The article proposes a defense built on threat intelligence at the point of ingest—an hourly updated feed that can immediately refuse to download or build a compromised dependency. This control point must extend beyond the build pipeline to the developer laptop, where central‑proxy coverage is often overestimated, and especially to the agent sandbox, the fastest‑growing unmonitored gap.\u003c/p\u003e\n\n\u003cp\u003eThe author recounts deploying Socket as a customer and later joining as a strategic advisor, citing its growth to more than 27,000 organizations and its ability to flag the Axios compromise within six minutes. He predicts that within five years, a threat feed wired into an ingest control point will become a standard security layer, akin to endpoint detection, and that organizations which adopt it early will spend far less time on incident response.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["AI assistants now fetch and execute open source packages in sandboxes without human review, creating a software supply chain event that traditional scanners and proxies miss.","Attackers can use a simple prompt to generate code that appears routine yet includes a backdoor, and working exploits can emerge within two hours of a patch release.","A cooldown that blocks packages newer than seven days also delays security patches, widening the exposure because the patch-to-exploit window is now only hours.","Governance at the point of ingest, using an hourly updated threat intelligence feed that blocks downloads or builds when a malicious package appears, is the effective defense.","The agent environment is the fastest growing blind spot, and Socket Firewall addresses this by protecting endpoints where code runs without a build pipeline."],"insights":["When a user asks an AI assistant to perform a task, the assistant can autonomously fetch and execute open source packages the user never requested or even saw, leaving the human completely unaware of the newly introduced supply chain risk.","Blocking packages newer than seven days, a popular defensive measure, backfires by delaying urgent security patches while the exploit window has shrunk to just hours, actually widening the attack surface.","The share of developers routing their laptop traffic through a central security proxy is consistently overestimated by security teams, making the developer machine a persistent, unmanaged blind spot.","The barrier to inserting a backdoor that survives peer review has collapsed: an attacker with stolen commit rights can now use a simple prompt to generate routine-looking malicious code, whereas before this required patient, expert-level knowledge of the codebase."],"referencedReports":[],"body":"\u003cp\u003eA routine AI assistant action—like tidying a spreadsheet—now triggers a software supply chain event where the agent silently fetches and executes open-source packages in a sandbox, completely outside the reach of scanners, proxies, or code review. This new exposure is already occurring across every enterprise that has given employees AI agents, and it bypasses traditional vulnerability management tools that were designed for slow, forensic investigations. The article notes that today\u0026rsquo;s attacks move at a drastically faster pace: a working exploit for a disclosed vulnerability can emerge within two hours, and a malicious package can be imported into a real project minutes after landing in a registry.\u003c/p\u003e\n\n\u003cp\u003eThe popular self-help fix of blocking packages newer than seven days creates its own risk by delaying urgent security patches precisely when the patch‑to‑exploit window has compressed to hours. The article proposes a defense built on threat intelligence at the point of ingest—an hourly updated feed that can immediately refuse to download or build a compromised dependency. This control point must extend beyond the build pipeline to the developer laptop, where central‑proxy coverage is often overestimated, and especially to the agent sandbox, the fastest‑growing unmonitored gap.\u003c/p\u003e\n\n\u003cp\u003eThe author recounts deploying Socket as a customer and later joining as a strategic advisor, citing its growth to more than 27,000 organizations and its ability to flag the Axios compromise within six minutes. He predicts that within five years, a threat feed wired into an ingest control point will become a standard security layer, akin to endpoint detection, and that organizations which adopt it early will spend far less time on incident response.\u003c/p\u003e\n"},{"n":27,"title":"Measuring Identity Risk: The Metrics Every Security Leader Should Track","source":"constella.ai","sourceColorIdx":4,"link":"https://constella.ai/blog/measuring-identity-risk/","time":"05:00","priority":"MAY READ","score":50,"tldr":"Identity risk is an under-measured but critical attack surface; security leaders should track metrics like total exposed identities, executive exposure, and exposure velocity to quantify risk, prioritize remediation, and communicate effectively to the board.","briefOverview":"\u003cp\u003eThe article argues that identity has become a primary attack surface, yet many organizations lack meaningful metrics to quantify identity risk. Attackers increasingly target credentials, sessions, and trusted relationships rather than exploiting systems directly, making it difficult for security leaders to answer how much identity risk their organization actually carries. Without measurement, it is impossible to prioritize remediation, demonstrate progress, communicate risk to leadership, or make informed investments.\u003c/p\u003e\n\n\u003cp\u003eThe author proposes eight specific identity risk metrics to fill this gap: Total Exposed Identities, High-Risk Identity Exposure Rate, Executive Exposure Score, Third-Party Exposure Score, Repeat Exposure Rate, Exposure Velocity, Time-to-Remediation, and Identity Risk Concentration. These metrics are designed to move organizations from simple counts to contextual understanding, highlighting executive and vendor exposure, the speed of new exposures, remediation efficiency, and where risk is most concentrated.\u003c/p\u003e\n\n\u003cp\u003eMeasuring identity risk turns raw data into business intelligence that supports governance, board reporting, and smarter resource allocation. Boards are increasingly demanding visibility into executive and third-party exposure, and traditional metrics fail to provide it. The article concludes that organizations that establish meaningful identity risk metrics will be better positioned to reduce risk, improve resilience, and drive smarter security investments in a threat landscape where identity is the new perimeter.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Identity has become a primary attack surface, yet many organizations lack meaningful metrics to measure identity risk.","The article defines eight specific identity risk metrics, including Total Exposed Identities, High-Risk Identity Exposure Rate, Executive Exposure Score, and Exposure Velocity.","Measuring identity risk enables security leaders to prioritize investments, focus remediation, communicate risk to leadership, and demonstrate progress.","Boards are increasingly asking for identity risk metrics, such as executive and third-party exposure, because traditional cybersecurity metrics fail to answer these questions.","Identity risk is dynamic, persistent, and distributed; exposed credentials can remain usable indefinitely, making identity risk uniquely difficult to quantify."],"insights":["Unlike a software vulnerability that can be patched and closed, an exposed identity often remains exposed indefinitely, creating a persistent and compounding risk.","A relatively small number of identities often account for a large percentage of overall identity risk, allowing security teams to prioritize remediation efficiently.","Tracking the rate at which new identity exposures are discovered (Exposure Velocity) provides a forward-looking indicator of whether risk is accelerating or improving, not just a point-in-time count.","The Executive Exposure Score serves as a board-friendly metric, translating technical identity risk into a language leadership teams care about, because executive compromise can lead to high-impact fraud and impersonation."],"referencedReports":[],"body":"\u003cp\u003eThe article argues that identity has become a primary attack surface, yet many organizations lack meaningful metrics to quantify identity risk. Attackers increasingly target credentials, sessions, and trusted relationships rather than exploiting systems directly, making it difficult for security leaders to answer how much identity risk their organization actually carries. Without measurement, it is impossible to prioritize remediation, demonstrate progress, communicate risk to leadership, or make informed investments.\u003c/p\u003e\n\n\u003cp\u003eThe author proposes eight specific identity risk metrics to fill this gap: Total Exposed Identities, High-Risk Identity Exposure Rate, Executive Exposure Score, Third-Party Exposure Score, Repeat Exposure Rate, Exposure Velocity, Time-to-Remediation, and Identity Risk Concentration. These metrics are designed to move organizations from simple counts to contextual understanding, highlighting executive and vendor exposure, the speed of new exposures, remediation efficiency, and where risk is most concentrated.\u003c/p\u003e\n\n\u003cp\u003eMeasuring identity risk turns raw data into business intelligence that supports governance, board reporting, and smarter resource allocation. Boards are increasingly demanding visibility into executive and third-party exposure, and traditional metrics fail to provide it. The article concludes that organizations that establish meaningful identity risk metrics will be better positioned to reduce risk, improve resilience, and drive smarter security investments in a threat landscape where identity is the new perimeter.\u003c/p\u003e\n"},{"n":14,"title":"Compromise kids online safety bill unveiled by House leaders, with key omission","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/compromise-kids-online-safety-bill-unveiled-omission","time":"15:20","priority":"MAY READ","score":45,"tldr":"The House released a bipartisan kids online safety bill that notably excludes a 'duty of care' provision requiring platforms to mitigate harms like cyberbullying and eating disorders, a decision that may jeopardize support from many lawmakers and advocates.","briefOverview":"\u003cp\u003eThe House Energy and Commerce Committee released a bipartisan compromise kids online safety bill that notably strips out the long-debated \u0026lsquo;duty of care\u0026rsquo; provision. That removed requirement would have forced online platforms to modify their algorithm and design features to prevent specific harms like suicidal ideation, eating disorders, and cyberbullying. Despite 76 senators supporting that standard, House leaders chose to omit it in favor of a package they describe as the strongest protections to date.\u003c/p\u003e\n\n\u003cp\u003eThe new KIDS Act incorporates several discrete mandates: banning disappearing messages for minors, requiring AI chatbots to disclose they are not human, forcing porn sites to use age-verification technology, and establishing a data broker registry for children\u0026rsquo;s data. Digital freedoms experts from the Center for Democracy and Technology criticized the bill, arguing that age-verification incentives threaten privacy for all users and risk blocking access to constitutionally protected materials.\u003c/p\u003e\n\n\u003cp\u003eThe bill\u0026rsquo;s path forward remains uncertain. Senator Marsha Blackburn, who is working with the White House on her own version that retains the duty of care, denounced the omission as keeping Big Tech\u0026rsquo;s profit-before-safety status quo. The House version more closely aligns with the Senate bill, but Senate Democrats have already signaled that KOSA without a duty of care faces serious hurdles, leaving a gap between the chambers that will require further negotiation.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The House bill released by the Energy and Commerce Committee excludes a 'duty of care' provision that would have required online platforms to modify algorithms and design to prevent harms like suicidal ideation, eating disorders, and cyberbullying.","The compromise package blocks minors from using disappearing messages, mandates AI chatbots to acknowledge they are not human, forces porn sites to use age verification technology, and establishes a data broker registry for children's data.","Senator Marsha Blackburn criticized the omission, and 76 senators have previously supported including a duty of care in the legislation; her own forthcoming proposal with the White House is expected to retain that standard.","Kate Ruane of the Center for Democracy and Technology warned that the bill incentivizes age verification, putting the privacy of all internet users at risk and threatening access to constitutionally protected materials.","The new House version aligns more closely with the Senate bill, but Senate Democrats have indicated that passing the bill without a duty of care will be difficult."],"insights":["The House bill's omission of a duty of care, despite 76 senators from both parties supporting it, underscores a deep chamber divide: House Republicans prioritized preemption of state AI laws and parental-control features over platform design mandates, a gap that may make the bill unpassable in the Senate.","Banning disappearing messages for minors and forcing AI chatbots to self-disclose as non-human are concrete, feature-level interventions that mark a shift away from systemic algorithmic accountability toward narrow, hardware-like prohibitions on specific platform functions.","The bill's structure for state preemption—blocking weaker rules but allowing stricter ones and carving out some state AI laws—could trigger a regulatory patchwork where progressive states raise standards above the federal floor, potentially increasing compliance costs and legal uncertainty for platform operators.","The main barrier to passage is no longer partisan gridlock but an intra-Republican disagreement: Senator Blackburn insists on a duty of care while House Energy and Commerce leadership dropped it, revealing a fracture over the role of government in dictating platform design."],"referencedReports":[],"body":"\u003cp\u003eThe House Energy and Commerce Committee released a bipartisan compromise kids online safety bill that notably strips out the long-debated \u0026lsquo;duty of care\u0026rsquo; provision. That removed requirement would have forced online platforms to modify their algorithm and design features to prevent specific harms like suicidal ideation, eating disorders, and cyberbullying. Despite 76 senators supporting that standard, House leaders chose to omit it in favor of a package they describe as the strongest protections to date.\u003c/p\u003e\n\n\u003cp\u003eThe new KIDS Act incorporates several discrete mandates: banning disappearing messages for minors, requiring AI chatbots to disclose they are not human, forcing porn sites to use age-verification technology, and establishing a data broker registry for children\u0026rsquo;s data. Digital freedoms experts from the Center for Democracy and Technology criticized the bill, arguing that age-verification incentives threaten privacy for all users and risk blocking access to constitutionally protected materials.\u003c/p\u003e\n\n\u003cp\u003eThe bill\u0026rsquo;s path forward remains uncertain. Senator Marsha Blackburn, who is working with the White House on her own version that retains the duty of care, denounced the omission as keeping Big Tech\u0026rsquo;s profit-before-safety status quo. The House version more closely aligns with the Senate bill, but Senate Democrats have already signaled that KOSA without a duty of care faces serious hurdles, leaving a gap between the chambers that will require further negotiation.\u003c/p\u003e\n"},{"n":25,"title":"Aikido x Drydock | A way for maintainers to catch malware before it ships","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/drydock-pre-publish-package-review","time":"12:47","priority":"MAY READ","score":45,"tldr":"Aikido and Drydock are launching a free integration that lets npm and PyPI maintainers inspect and diff staged package releases before publishing, catching malware during approval rather than after it ships.","briefOverview":"\u003cp\u003eAikido has partnered with Drydock to give open-source package maintainers a tool that inspects a staged release\u0026rsquo;s exact contents before it goes public. The integration works with npm\u0026rsquo;s new staged publishing feature, where a version waits for manual approval before being published. Without Drydock, a maintainer could only see the version number, not the actual code inside the tarball. Drydock fills that gap by downloading the staged package, diffing it against the last published version, and surfacing security-relevant changes.\u003c/p\u003e\n\n\u003cp\u003eDrydock flags new or modified files, lifecycle scripts like preinstall or postinstall, code that spawns processes or makes network requests, and added binaries. Each finding is ranked by severity and pinned to the specific line that introduced it, allowing a maintainer to quickly review and approve or reject the release using their own two-factor authentication. For PyPI, which lacks staged publishing, and for npm packages that publish without staging, Drydock integrates into the release pipeline as a GitHub Actions environment gate, pausing the release so a human can review before it reaches the registry.\u003c/p\u003e\n\n\u003cp\u003eThis approach aims to break the cycle where malware is detected only after it has been downloaded by users, shifting the moment of detection to the approval stage. Drydock operates with a read-only token, never executes the package contents, and does not publish on its own, keeping the human in the loop for every decision. The service is offered at no cost to npm and PyPI maintainers, lowering the barrier to catching malware before it ships.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Aikido and Drydock partnered to give npm and PyPI maintainers a free way to inspect the exact contents of a staged package release before it publishes.","Drydock diffs a staged release against the last published version and flags security-relevant changes like new lifecycle scripts, network access, or added binaries, ranked by severity.","For npm staged publishing, an approving maintainer can see the changed bytes and then approve publish with their own 2FA; for PyPI or unstaged npm, Drydock runs as a GitHub Actions gate.","Drydock uses a read-only token, never runs the package contents, never publishes itself, and keeps a human in the loop for every approval decision.","The goal is to catch malware during the approval stage instead of after it ships, breaking the pattern of post-mortem malware disclosures and damage control."],"insights":["npm's staged publishing introduced a manual approval requirement but gave maintainers no visibility into the package contents, leaving them to approve releases blindly—a gap that undermines the security benefit of staging.","The article reflects a shift from the open-source ecosystem's original trust-based instant-publishing model toward a verification-based model where maintainers are expected to catch malware before it ever reaches end users.","Drydock deliberately keeps a human decision-maker in every publish approval, avoiding automated gates that could themselves become a vector for compromise or false decisions.","By only reading file listings and text without executing any package code, Drydock avoids the risk of malware escaping a sandbox, though this also implies a trade-off in detecting threats that only manifest at runtime."],"referencedReports":[],"body":"\u003cp\u003eAikido has partnered with Drydock to give open-source package maintainers a tool that inspects a staged release\u0026rsquo;s exact contents before it goes public. The integration works with npm\u0026rsquo;s new staged publishing feature, where a version waits for manual approval before being published. Without Drydock, a maintainer could only see the version number, not the actual code inside the tarball. Drydock fills that gap by downloading the staged package, diffing it against the last published version, and surfacing security-relevant changes.\u003c/p\u003e\n\n\u003cp\u003eDrydock flags new or modified files, lifecycle scripts like preinstall or postinstall, code that spawns processes or makes network requests, and added binaries. Each finding is ranked by severity and pinned to the specific line that introduced it, allowing a maintainer to quickly review and approve or reject the release using their own two-factor authentication. For PyPI, which lacks staged publishing, and for npm packages that publish without staging, Drydock integrates into the release pipeline as a GitHub Actions environment gate, pausing the release so a human can review before it reaches the registry.\u003c/p\u003e\n\n\u003cp\u003eThis approach aims to break the cycle where malware is detected only after it has been downloaded by users, shifting the moment of detection to the approval stage. Drydock operates with a read-only token, never executes the package contents, and does not publish on its own, keeping the human in the loop for every decision. The service is offered at no cost to npm and PyPI maintainers, lowering the barrier to catching malware before it ships.\u003c/p\u003e\n"},{"n":5,"title":"Webinar: Why email security teams are drowning in alerts","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/webinar-why-email-security-teams-are-drowning-in-alerts/","time":"12:12","priority":"MAY READ","score":40,"tldr":"A July 8 webinar will address how behavioral AI can automate email security workflows to reduce alert fatigue and accelerate investigation and response to phishing, business email compromise, and account takeover attacks.","briefOverview":"\u003cp\u003eOn July 8, 2026, BleepingComputer will host a live webinar titled “Stop chasing alerts: Automating email security with behavioral AI,” featuring Dan Nickolaisen of Abnormal AI and Eric Danneker of Novant Health. The event focuses on a persistent problem for security teams: despite heavy investment in email defenses, they remain overwhelmed by phishing, business email compromise, and account takeover alerts. Rather than a failure of detection, the core issue is the manual burden of investigation and response, which creates backlogs and alert fatigue.\u003c/p\u003e\n\n\u003cp\u003eThe webinar will explore how behavioral AI can automate the entire sequence of detection, investigation, and remediation by learning normal user behavior and surfacing only the highest-risk incidents. This automation promises to handle routine triage tasks that currently consume analyst time, shifting their focus to truly dangerous threats. The session aims to show how AI-driven workflows can reduce repetitive manual reviews and accelerate response before attacks escalate.\u003c/p\u003e\n\n\u003cp\u003eAttendees can expect practical guidance on reducing manual analysis, prioritizing the most critical threats, and improving operational efficiency in email security operations. The presentation will cover techniques for minimizing investigation backlogs, improving response times, and building a more automated and resilient security posture against modern phishing and compromise campaigns.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A live webinar titled 'Stop chasing alerts: Automating email security with behavioral AI' will be held on July 8, 2026, hosted by BleepingComputer.","The webinar is presented by Dan Nickolaisen of Abnormal AI and Eric Danneker of Novant Health.","Security teams face alert fatigue and investigation backlogs due to the high volume of manual tasks required to investigate phishing, business email compromise, and account takeover attacks.","The session examines how behavioral AI can automate detection, investigation, and remediation workflows to surface the highest-risk incidents and accelerate responses.","Attendees will learn practical techniques to reduce manual analysis, prioritize high-risk threats, and improve operational efficiency in email security operations."],"insights":["Despite heavy investment in email security controls, security teams still struggle with manual investigation backlogs, revealing that detection tools alone do not reduce operational burden.","The bottleneck in email security is not the inability to detect threats, but the time-consuming manual processes required to investigate and remediate them.","Automating response workflows with behavioral AI can shift analysts from routine alert triage to higher-priority threats, directly addressing the root cause of alert fatigue."],"referencedReports":[],"body":"\u003cp\u003eOn July 8, 2026, BleepingComputer will host a live webinar titled “Stop chasing alerts: Automating email security with behavioral AI,” featuring Dan Nickolaisen of Abnormal AI and Eric Danneker of Novant Health. The event focuses on a persistent problem for security teams: despite heavy investment in email defenses, they remain overwhelmed by phishing, business email compromise, and account takeover alerts. Rather than a failure of detection, the core issue is the manual burden of investigation and response, which creates backlogs and alert fatigue.\u003c/p\u003e\n\n\u003cp\u003eThe webinar will explore how behavioral AI can automate the entire sequence of detection, investigation, and remediation by learning normal user behavior and surfacing only the highest-risk incidents. This automation promises to handle routine triage tasks that currently consume analyst time, shifting their focus to truly dangerous threats. The session aims to show how AI-driven workflows can reduce repetitive manual reviews and accelerate response before attacks escalate.\u003c/p\u003e\n\n\u003cp\u003eAttendees can expect practical guidance on reducing manual analysis, prioritizing the most critical threats, and improving operational efficiency in email security operations. The presentation will cover techniques for minimizing investigation backlogs, improving response times, and building a more automated and resilient security posture against modern phishing and compromise campaigns.\u003c/p\u003e\n"},{"n":1,"title":"The Exploit Doesn't Exist. You Can Still Prove It Works Against You","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/the-exploit-doesnt-exist-you-can-still-prove-it-works-against-you/","time":"14:01","priority":"MAY READ","score":35,"tldr":"You can prove a vulnerability is not exploitable in your environment without a live exploit by validating each technique in its attack chain against your existing controls, giving you a defensible verdict even for day-one CVEs or off-limits assets.","briefOverview":"\u003cp\u003eAI has collapsed the weaponization window for vulnerabilities from months to hours—the Zero Day Clock now averages around 8 hours from disclosure to exploit in 2026, while median fix times have stretched to 43 days. Verizon’s 2026 DBIR shows the share of organizations fully patching known-exploited flaws has fallen to 26%, and even the fastest teams close only 30–40% in the first week. With nearly every new CVE scoring near-perfect severity, traditional triage by CVSS leaves security teams unable to prioritize, and the sheer volume (over 48,000 CVEs in 2025, with fewer than 0.6% ever patched) makes patching alone mathematically impossible.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that the real gap isn’t finding vulnerabilities but proving which ones are actually exploitable against an organization’s live controls—especially when no exploit exists, the asset is too sensitive to test with a live payload, or the CVE just dropped on day one. Rather than launching a full exploit, Picus’s TTP-chain validation decomposes a CVE into the sequence of attacker techniques (e.g., execution, privilege escalation, credential dumping) and tests each link against an environment’s real EDR, GPO, LSASS protections, and firewalls. If any required link breaks, the entire exploit chain fails, giving security teams a defensible verdict without detonating an exploit—even on air-gapped or business-critical systems.\u003c/p\u003e\n\n\u003cp\u003eA concrete illustration uses CVE-2025-29824, a Windows CLFS use-after-free exploited by Storm-2460 in RansomEXX campaigns. Rather than firing an exploit, the chain is tested technique by technique: msbuild execution, KASLR bypass, kernel escalation, token manipulation, and LSASS credential dumping. If application allow-listing stops the execution step or LSASS protection blocks the dump, the vulnerability is proven not exploitable on that asset. This approach turns a fresh CVE ID into an actionable, evidence-backed decision within hours of disclosure, closing the gap between attack speed and response time.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The average time from vulnerability disclosure to exploitation has fallen to roughly 8 hours in 2026, while median fix times for known-exploited vulnerabilities have risen to 43 days.","Automated penetration testing is limited because it cannot safely test assets that are business-critical, air-gapped, or lack a public exploit, leaving 85-90% of an enterprise's exposures unaddressed.","TTP-chain validation breaks a vulnerability into the sequence of attacker techniques required for exploitation and tests each step against existing security controls, providing a defensible verdict without launching a live exploit.","The technique-chain approach works on day one of a disclosure, on assets where live exploits are unsafe, and even when no working exploit exists, because it validates by inference rather than detonation.","CVE-2025-29824, a Windows CLFS use-after-free exploited by Storm-2460 in RansomEXX attacks, is used as an example of how TTP-chain validation can determine exploitability by testing individual techniques like MSBuild execution and LSASS dumping against controls."],"insights":["The 'Mythos' threshold, where AI models autonomously find and weaponize vulnerabilities, has already been passed: an Anthropic model uncovered a flaw hiding in OpenBSD for 27 years, showing that vulnerability discovery is no longer a purely human-speed activity.","When nearly every published CVE scores a 9 or 10, severity-based prioritization effectively prioritizes nothing; the only question that matters is whether a flaw is exploitable given an organization's actual deployed controls.","Even automated penetration testing can safely validate only 10-15% of an enterprise's exposure, because it requires a safe exploit and cannot fire against business-critical, regulated, or air-gapped assets.","Treating an exploit as a sequence of independently testable techniques—like ground-testing rocket components instead of launching the whole vehicle—enables a defensible verdict on a vulnerability without ever needing a working exploit or risking a live detonation."],"referencedReports":[{"title":"Verizon 2026 Data Breach Investigations Report","url":"https://www.verizon.com/business/resources/reports/dbir/","publisher":"Verizon","context":"Used to cite median fix times of 43 days for known-exploited vulnerabilities, declining patch rates, and the widening gap between exploitation speed and remediation.","category":"","primary":false},{"title":"Glasswing","url":"https://www.anthropic.com/glasswing","publisher":"Anthropic","context":"Referenced as an example of the Mythos threshold being crossed, where Anthropic’s model found an OpenBSD vulnerability hidden for 27 years.","category":"","primary":false},{"title":"Glasswing Initial Update","url":"https://www.anthropic.com/research/glasswing-initial-update","publisher":"Anthropic","context":"Cited for the statistic that fewer than 0.6% of 48,185 CVEs in 2025 were ever patched.","category":"","primary":false}],"body":"\u003cp\u003eAI has collapsed the weaponization window for vulnerabilities from months to hours—the Zero Day Clock now averages around 8 hours from disclosure to exploit in 2026, while median fix times have stretched to 43 days. Verizon’s 2026 DBIR shows the share of organizations fully patching known-exploited flaws has fallen to 26%, and even the fastest teams close only 30–40% in the first week. With nearly every new CVE scoring near-perfect severity, traditional triage by CVSS leaves security teams unable to prioritize, and the sheer volume (over 48,000 CVEs in 2025, with fewer than 0.6% ever patched) makes patching alone mathematically impossible.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that the real gap isn’t finding vulnerabilities but proving which ones are actually exploitable against an organization’s live controls—especially when no exploit exists, the asset is too sensitive to test with a live payload, or the CVE just dropped on day one. Rather than launching a full exploit, Picus’s TTP-chain validation decomposes a CVE into the sequence of attacker techniques (e.g., execution, privilege escalation, credential dumping) and tests each link against an environment’s real EDR, GPO, LSASS protections, and firewalls. If any required link breaks, the entire exploit chain fails, giving security teams a defensible verdict without detonating an exploit—even on air-gapped or business-critical systems.\u003c/p\u003e\n\n\u003cp\u003eA concrete illustration uses CVE-2025-29824, a Windows CLFS use-after-free exploited by Storm-2460 in RansomEXX campaigns. Rather than firing an exploit, the chain is tested technique by technique: msbuild execution, KASLR bypass, kernel escalation, token manipulation, and LSASS credential dumping. If application allow-listing stops the execution step or LSASS protection blocks the dump, the vulnerability is proven not exploitable on that asset. This approach turns a fresh CVE ID into an actionable, evidence-backed decision within hours of disclosure, closing the gap between attack speed and response time.\u003c/p\u003e\n"},{"n":22,"title":"Agentic AI: The Weapon That No Longer Needs a Warrior","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/agentic-ai-weapon-that-no-longer-needs.html","time":"11:30","priority":"MAY READ","score":30,"tldr":"Agentic AI allows offensive tools to plan and execute attacks without human guidance, lowering the barrier for unskilled attackers and eroding traditional detection signals, which makes human oversight and verification the critical remaining role.","briefOverview":"\u003cp\u003eThe article examines the emergence of agentic artificial intelligence in offensive cybersecurity, where AI tools no longer merely draft attacks for human execution but autonomously plan and carry out entire campaigns. It contrasts this shift with historical weapons evolution, noting that while weapons extended human reach, the decision to strike remained human until now. Agentic AI severs that tether, enabling the weapon to aim itself, which dramatically transforms the threat landscape.\u003c/p\u003e\n\n\u003cp\u003eThis change grants real offensive capability to unskilled attackers through what the author calls \u0026lsquo;script kiddie as a service\u0026rsquo;, while letting skilled operators run campaigns at previously impossible speeds. Autonomous social engineering erases the linguistic tells that traditional phishing detection relies on, forcing defenders to depend more heavily on infrastructure signals like sender reputation. Similarly, AI-driven exploit chains, malware rewriting, and vulnerability matching reduce the technical barrier, but the article warns that these agents produce high-confidence outputs without verifying actual target conditions, creating a dangerous false certainty.\u003c/p\u003e\n\n\u003cp\u003eThe piece emphasizes that the core job of the operator now shifts from executing attacks to exercising judgment: the machine can aim but cannot decide whether a shot should be taken. It argues that only by using offensive AI tools against an organization’s own defenses can leaders validate whether their security holds, making human oversight the critical remaining component in an era where the weapon has learned to act on its own.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Agentic AI autonomously executes entire attack chains, eliminating the need for a human operator to guide each step.","This technology grants unskilled attackers real offensive capability, a phenomenon the author terms 'script kiddie as a service'.","Autonomous social engineering erases classic detection signals by generating fluent, personalized messages that do not follow mass-produced templates.","AI-driven exploit chains can produce false conclusions with high confidence because agents match indicators to assumptions without verifying actual target conditions.","Human oversight becomes the critical component, as the machine can aim itself but cannot judge whether an attack should be launched."],"insights":["The convergence of unskilled attackers on AI models creates a behavioral monoculture, giving defenders a new detection advantage if they learn to recognize these standardized attack patterns.","As AI erases linguistic tells in phishing, defenders must now rely entirely on infrastructure signals like sender reputation and authentication—signals that themselves may erode under sustained pressure.","Retrieval-augmented agents introduce a critical flaw: they suggest exploits based on plausible relevance without verifying target conditions, producing high-confidence but false readiness to attack.","Effective defense validation now requires actively using offensive AI tools against internal systems, because only live attacks can confirm which policies and controls actually hold."],"referencedReports":[{"title":"SANS Secure AI Blueprint","url":"https://www.sans.org/white-papers/own-ai-securely-sans-secure-ai-blueprint?utm_medium=Sponsored_Content\u0026utm_source=Hacker_News\u0026utm_rdetail=NA\u0026utm_goal=Orders\u0026utm_type=Live_Training_Events\u0026utm_content=THN_SanAn26_June_OA_AIeBook\u0026utm_campaign=SANS_San_Antonio_2026","publisher":"SANS Institute","context":"The article references this whitepaper to explain the three tracks (Protect AI, Utilize AI, Govern AI) that form the framework for securing AI systems.","category":"","primary":false}],"body":"\u003cp\u003eThe article examines the emergence of agentic artificial intelligence in offensive cybersecurity, where AI tools no longer merely draft attacks for human execution but autonomously plan and carry out entire campaigns. It contrasts this shift with historical weapons evolution, noting that while weapons extended human reach, the decision to strike remained human until now. Agentic AI severs that tether, enabling the weapon to aim itself, which dramatically transforms the threat landscape.\u003c/p\u003e\n\n\u003cp\u003eThis change grants real offensive capability to unskilled attackers through what the author calls \u0026lsquo;script kiddie as a service\u0026rsquo;, while letting skilled operators run campaigns at previously impossible speeds. Autonomous social engineering erases the linguistic tells that traditional phishing detection relies on, forcing defenders to depend more heavily on infrastructure signals like sender reputation. Similarly, AI-driven exploit chains, malware rewriting, and vulnerability matching reduce the technical barrier, but the article warns that these agents produce high-confidence outputs without verifying actual target conditions, creating a dangerous false certainty.\u003c/p\u003e\n\n\u003cp\u003eThe piece emphasizes that the core job of the operator now shifts from executing attacks to exercising judgment: the machine can aim but cannot decide whether a shot should be taken. It argues that only by using offensive AI tools against an organization’s own defenses can leaders validate whether their security holds, making human oversight the critical remaining component in an era where the weapon has learned to act on its own.\u003c/p\u003e\n"},{"n":28,"title":"Silent Push partners with CDL Cyber Intelligence to bring preemptive defense to the United Kingdom","source":"silentpush.com","sourceColorIdx":6,"link":"https://www.silentpush.com/news/silent-push-partners-with-cdl-cyber-intelligence/?utm_source=rss\u0026utm_medium=rss\u0026utm_campaign=silent-push-partners-with-cdl-cyber-intelligence","time":"20:07","priority":"MAY READ","score":20,"tldr":"Silent Push and CDL Cyber Intelligence have partnered to provide UK organizations with early warning of cyber threats by detecting adversary staging infrastructure, offering an average 157-day lead time before an attack hits their perimeter.","briefOverview":"\u003cp\u003eSilent Push and CDL Cyber Intelligence have formed a strategic partnership to bring preemptive cyber defense to organizations across the United Kingdom and Europe. The collaboration combines Silent Push\u0026rsquo;s Context Graph platform with CDL\u0026rsquo;s intelligence-led security practice, which includes former intelligence officers, ethical hackers, and engineers experienced in threat intelligence and incident response. The shared belief is that effective defense requires intelligence before an event, not just detection tools.\u003c/p\u003e\n\n\u003cp\u003eThe core of the partnership centers on exposing adversary preparation activities that many tools miss. The Silent Push Context Graph continuously maps infrastructure creation across DNS, WHOIS, certificates, and hosting data at internet scale, surfacing clusters of staging activity as Indicators of Future Attack. These signals give CDL\u0026rsquo;s clients an average of 157 days of lead time before a campaign reaches their perimeter, revealing the operational patterns threat actors use while building and aging domains and hosting long before targeting anyone.\u003c/p\u003e\n\n\u003cp\u003eThe UK\u0026rsquo;s position as a NATO member, major financial hub, and home to critical infrastructure draws sustained attention from state-linked and opportunistic actors. To counter this, Silent Push Traffic Origin identifies the true upstream country of origin controlling a connection, even when attackers route through residential proxies or VPNs to appear local. The partnership enables CDL to deliver preemptive visibility that few teams can offer, allowing clients to act on what is being pointed at them well before an attack materializes.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Silent Push and CDL Cyber Intelligence have partnered to deliver preemptive defense by uncovering adversary staging infrastructure long before an attack launches.","The Context Graph continuously monitors DNS, WHOIS, certificate, and hosting data to surface clusters of preparation activity as Indicators of Future Attack.","Clients of CDL gain an average of 157 days of warning before a threat campaign reaches their network perimeter.","The UK is a high-risk target for state-linked threat actors due to its roles as a NATO member, financial hub, and home to critical infrastructure.","Traffic Origin technology reveals the true upstream country controlling a connection, even when attackers mask it with local-looking residential proxies or VPNs."],"insights":["Adversaries often spend weeks or months quietly registering domains, aging infrastructure, and setting up hosting before launching an attack, and most detection tools are blind to this preparation phase.","The Silent Push Context Graph surfaces adversary staging infrastructure as Indicators of Future Attack, giving CDL clients an average of 157 days of advance warning before a campaign reaches their perimeter.","Traffic Origin technology can unmask the true upstream country controlling a connection even when attackers use residential proxies or VPNs to appear local and legitimate.","Effective preemptive defense requires pairing platform-generated early signals with human analysts who have the intelligence background to interpret and act on raw data, which the CDL team provides."],"referencedReports":[],"body":"\u003cp\u003eSilent Push and CDL Cyber Intelligence have formed a strategic partnership to bring preemptive cyber defense to organizations across the United Kingdom and Europe. The collaboration combines Silent Push\u0026rsquo;s Context Graph platform with CDL\u0026rsquo;s intelligence-led security practice, which includes former intelligence officers, ethical hackers, and engineers experienced in threat intelligence and incident response. The shared belief is that effective defense requires intelligence before an event, not just detection tools.\u003c/p\u003e\n\n\u003cp\u003eThe core of the partnership centers on exposing adversary preparation activities that many tools miss. The Silent Push Context Graph continuously maps infrastructure creation across DNS, WHOIS, certificates, and hosting data at internet scale, surfacing clusters of staging activity as Indicators of Future Attack. These signals give CDL\u0026rsquo;s clients an average of 157 days of lead time before a campaign reaches their perimeter, revealing the operational patterns threat actors use while building and aging domains and hosting long before targeting anyone.\u003c/p\u003e\n\n\u003cp\u003eThe UK\u0026rsquo;s position as a NATO member, major financial hub, and home to critical infrastructure draws sustained attention from state-linked and opportunistic actors. To counter this, Silent Push Traffic Origin identifies the true upstream country of origin controlling a connection, even when attackers route through residential proxies or VPNs to appear local. The partnership enables CDL to deliver preemptive visibility that few teams can offer, allowing clients to act on what is being pointed at them well before an attack materializes.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

// Shared card chrome so the front and back faces render identical tokens.
function CardTitle({ children }) {
  return (
    <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 20, lineHeight: 1.3, letterSpacing: "-0.005em", color: "var(--text)" }}>
      {children}
    </h2>
  );
}

function SourceTag({ article }) {
  const srcColor = `var(--p${article.sourceColorIdx})`;
  return (
    <>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
        {article.source}
      </span>
    </>
  );
}

function numberedList(items, accent) {
  return (
    <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
      {(items || []).map((item, i) => (
        <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: accent, marginTop: 3, letterSpacing: "0.04em" }}>
            {String(i + 1).padStart(2, "0")}
          </span>
          <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{item}</span>
        </li>
      ))}
    </ul>
  );
}

function KeyPointsSection({ keyPoints, accent }) {
  if (!keyPoints || keyPoints.length === 0) return null;
  return (
    <div style={{ marginTop: 18 }}>
      <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
      {numberedList(keyPoints, accent)}
    </div>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            {report.primary && <span className="report-primary">PRIMARY</span>}
            <a className="report-link" href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
            {report.category && <span className={"report-cat report-cat-" + report.category}>{report.category}</span>}
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
