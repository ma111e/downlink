 SSRF vulnerability, CVE-2026-20230, in Cisco Unified Communications Manager allows unauthenticated attackers to write arbitrary files to the underlying operating system.","Cisco released security updates for the flaw on June 3, warning that successful exploitation could give attackers root privileges.","Threat intelligence firm Defused observed active exploitation over the weekend, with attacks using file:// payloads to create files on the device.","The current in-the-wild exploitation appears to be reconnaissance, attempting to write a test file named '/tmp/cve-2026-20230-test.txt' to identify vulnerable devices.","Following the disclosure, SSD Secure published a technical write-up and proof-of-concept exploit detailing how the Webdialer component can be abused for remote code execution."],"insights":["The current exploitation is strictly reconnaissance, writing a harmless test file to /tmp, which gives organizations a small window to patch before attackers move to root-privilege attacks.","All observed attack traffic originated from a single IP address, suggesting a focused campaign rather than mass-scanning.","SSD Secure released a full technical write-up and proof-of-concept exploit only after the in-the-wild exploitation was disclosed, so any attacker now has easy access to weaponized code.","Exploitation requires knowing the target system's hostname, but researchers demonstrated it can be easily retrieved from the device, removing a potential hurdle for attackers."],"referencedReports":[{"title":"Cisco Unified Communications Manager and Unified Communications Manager Session Management Edition Server-Side Request Forgery Vulnerability","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-cucm-ssrf-cXPnHcW","publisher":"Cisco","context":"Cisco's advisory details the vulnerability CVE-2026-20230, its impact, and the security updates released on June 3.","category":"","primary":false},{"title":"Cisco Unified Communications Manager Arbitrary File Write to RCE","url":"https://ssd-disclosure.com/cisco-unified-communications-manager-arbitrary-file-write-to-rce/","publisher":"SSD Secure","context":"SSD Secure's technical write-up explains the WebDialer SSRF flaw and provides a proof-of-concept exploit for remote code execution.","category":"","primary":false}],"body":"\u003cp\u003eThe article covers the active exploitation of CVE-2026-20230, a high-severity server-side request forgery (SSRF) vulnerability in Cisco Unified Communications Manager (Unified CM) and Cisco Unified Communications Manager Session Management Edition (Unified CM SME). Cisco released security updates for the flaw on June 3, warning that successful exploitation could let unauthenticated remote attackers write files to the underlying operating system and eventually gain root privileges. The vulnerability arises from improper input validation for specific HTTP requests, specifically within the WebDialer component.\u003c/p\u003e\n\n\u003cp\u003eOver the weekend, threat intelligence firm Defused detected in-the-wild exploitation originating from a single IP address. Attackers sent crafted file:// payloads to create a test file at \u003ccode\u003e/tmp/cve-2026-20230-test.txt\u003c/code\u003e, which appears to be reconnaissance rather than a full compromise. Following this disclosure, SSD Secure published a detailed technical write-up and proof-of-concept exploit demonstrating how an attacker can retrieve the target hostname and then abuse the SSRF to achieve arbitrary file writes and remote code execution with root access. With the exploit publicly available, broader exploitation is expected, making immediate patching critical.\u003c/p\u003e\n"},{"n":7,"title":"New macOS ClickFix attack silently mounts DMGs to push infostealer","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-macos-clickfix-attack-silently-mounts-dmgs-to-push-infostealer/","time":"18:30","priority":"MUST READ","score":95,"tldr":"A new macOS ClickFix campaign tricks users into executing a Terminal command from fake CAPTCHAs that automatically downloads, mounts, and launches a DMG containing the Atomic macOS Stealer infostealer, evading the need for manual user interaction with the disk image.","briefOverview":"\u003cp\u003eA new macOS ClickFix campaign leverages social engineering to infect users with the Atomic macOS Stealer (AMOS) infostealer. It begins with a fake CAPTCHA page instructing victims to open Terminal and paste a command. This single command uses curl to quietly download a malicious DMG file from an attacker-controlled server, then employs hdiutil with the -nobrowse flag to silently mount it, and finally searches for and launches the contained application without any visual indication to the user.\u003c/p\u003e\n\n\u003cp\u003eThe payload, a self-signed application bundle named \u0026ldquo;NNApp.app,\u0026rdquo; belongs to the Atomic Stealer family. Once executed, it displays a fake System Preferences password prompt to steal the user\u0026rsquo;s login credentials. It targets multiple Chromium-based and Firefox-derived browsers to harvest cookies, login data, autofill information, payment cards, and browser profiles. Additionally, it collects cryptocurrency wallet data from numerous wallets, Telegram and Discord data, Apple Notes databases, Safari cookies, Keychain files, and user documents.\u003c/p\u003e\n\n\u003cp\u003eThe malware also replaces legitimate Ledger Live and Trezor Suite installations with malicious versions, likely to facilitate further cryptocurrency theft. The harvested data is compressed into a ZIP archive and exfiltrated to attacker-controlled servers, such as svs-verificationdate[.]beer and 196.251.107[.]171. Users are warned never to run Terminal commands prompted by websites claiming to be part of CAPTCHA checks or troubleshooting steps, as fully automated infection chains like this can compromise sensitive financial and personal data with minimal user interaction.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A new macOS ClickFix campaign displays a fake CAPTCHA page instructing users to paste a malicious Terminal command.","The command silently downloads a DMG file from an attacker-controlled server, mounts it with hdiutil, and launches the contained application.","The payload is the Atomic macOS Stealer infostealer, which steals browser data, cryptocurrency wallets, Keychain data, messaging app information, and user documents.","The malware replaces legitimate Ledger Live and Trezor Suite installations with malicious versions to perform cryptocurrency theft."],"insights":["The attack fully automates DMG delivery by having the single Terminal command download, silently mount (using hdiutil -nobrowse), and auto-launch the malware, eliminating the need for the user to manually open the disk image, which makes the infection chain harder to notice.","The malware specifically replaces legitimate installations of Ledger Live and Trezor Suite with trojanized versions, a technique that can compromise cryptocurrency holdings directly, beyond just stealing wallet files or credentials.","The use of the '-nobrowse' flag with hdiutil hides the mounted volume from Finder and the desktop, preventing the user from seeing the malicious disk image after it is mounted, which increases stealth."],"referencedReports":[],"body":"\u003cp\u003eA new macOS ClickFix campaign leverages social engineering to infect users with the Atomic macOS Stealer (AMOS) infostealer. It begins with a fake CAPTCHA page instructing victims to open Terminal and paste a command. This single command uses curl to quietly download a malicious DMG file from an attacker-controlled server, then employs hdiutil with the -nobrowse flag to silently mount it, and finally searches for and launches the contained application without any visual indication to the user.\u003c/p\u003e\n\n\u003cp\u003eThe payload, a self-signed application bundle named \u0026ldquo;NNApp.app,\u0026rdquo; belongs to the Atomic Stealer family. Once executed, it displays a fake System Preferences password prompt to steal the user\u0026rsquo;s login credentials. It targets multiple Chromium-based and Firefox-derived browsers to harvest cookies, login data, autofill information, payment cards, and browser profiles. Additionally, it collects cryptocurrency wallet data from numerous wallets, Telegram and Discord data, Apple Notes databases, Safari cookies, Keychain files, and user documents.\u003c/p\u003e\n\n\u003cp\u003eThe malware also replaces legitimate Ledger Live and Trezor Suite installations with malicious versions, likely to facilitate further cryptocurrency theft. The harvested data is compressed into a ZIP archive and exfiltrated to attacker-controlled servers, such as svs-verificationdate[.]beer and 196.251.107[.]171. Users are warned never to run Terminal commands prompted by websites claiming to be part of CAPTCHA checks or troubleshooting steps, as fully automated infection chains like this can compromise sensitive financial and personal data with minimal user interaction.\u003c/p\u003e\n"},{"n":11,"title":"Feds seize alleged cyber-scam infrastructure connected to Southeast Asian company","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/feds-seize-alleged-cyber-scam-infrastructure-southeast-asia","time":"18:00","priority":"MUST READ","score":95,"tldr":"The U.S. seized a cloud account used by Cambodia's Huione Group as backend infrastructure for a multi-billion-dollar cyber scam operation, which laundered illicit funds for Southeast Asian crime and North Korean cyber heists through Telegram channels.","briefOverview":"\u003cp\u003eThe U.S. Department of Justice announced the seizure of a cloud computing account that served as backend infrastructure for subsidiaries of the Cambodian Huione Group, a conglomerate accused of supporting investment scams, money laundering, and other cyber-enabled crimes. The account hosted operations that included Telegram channels where criminals discussed and facilitated the sale of stolen credit card and identity information, malware-enabled thefts, human trafficking procurement, and laundering of romance and investment scam proceeds. This action directly targets the technical backbone that enabled a broad range of illicit activities.\u003c/p\u003e\n\n\u003cp\u003eThe Huione Group had already been severed from the U.S. financial system in 2024 by the Treasury\u0026rsquo;s FinCEN, which found the group laundered at least $4 billion in illicit funds from August 2021 to January 2025, including proceeds from Southeast Asian scam operations and North Korean cyber heists. Cambodia itself arrested the former head of Huione, Li Xiong, and extradited him to China to face money laundering and fraud charges as a member of the Chen Xi crime syndicate. The combined financial isolation and infrastructure seizure mark an escalating U.S. effort to dismantle the group\u0026rsquo;s criminal ecosystem.\u003c/p\u003e\n\n\u003cp\u003eThe seizure is part of a broader U.S. crackdown, following sanctions on more than two dozen individuals including a Cambodian senator and ongoing FBI cooperation with Southeast Asian governments to combat the transnational scam industry. The FBI emphasized the commitment to disrupting every component of the illegal ecosystem to prevent further victimization from scams. The action demonstrates a shift from purely financial measures to technical disruption, directly hitting the cloud infrastructure that supports global cybercriminal logistics.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The U.S. Department of Justice seized a cloud computing account that hosted backend infrastructure for subsidiaries of the Cambodia-based Huione Group.","The Huione Group laundered at least $4 billion in illicit proceeds between August 2021 and January 2025, including funds from Southeast Asian scam operations and North Korean cyber heists.","The seized infrastructure supported Telegram channels used to sell stolen credit card and identity information, enable human trafficking, and launder money from romance and investment scams.","Cambodian authorities arrested the former head of Huione Group, Li Xiong, and extradited him to China to face money laundering and fraud charges as a member of the Chen Xi crime syndicate.","This action follows a series of U.S. measures, including last year's FinCEN order severing Huione from the U.S. financial system and recent sanctions on individuals connected to scam operations."],"insights":["The seized cloud account was not used solely for scam operations but also served as a hub for human trafficking, identity theft, and malware-enabled theft, highlighting how tightly integrated these different criminal ecosystems are.","Huione Group laundered $4 billion in just over three years, a volume that included proceeds from North Korean state-sponsored cyber heists, illustrating the convergence of nation-state and organized crime financial operations.","The U.S. escalated its disruption tactics from financial isolation (the previous FinCEN severance) to a technical infrastructure seizure, signaling a shift toward directly dismantling the operational backbone of cybercriminal enterprises.","The infrastructure specifically hosted Telegram channels that functioned as a marketplace for illicit products and services, emphasizing Telegram's role as a critical platform for transnational cybercrime logistics."],"referencedReports":[],"body":"\u003cp\u003eThe U.S. Department of Justice announced the seizure of a cloud computing account that served as backend infrastructure for subsidiaries of the Cambodian Huione Group, a conglomerate accused of supporting investment scams, money laundering, and other cyber-enabled crimes. The account hosted operations that included Telegram channels where criminals discussed and facilitated the sale of stolen credit card and identity information, malware-enabled thefts, human trafficking procurement, and laundering of romance and investment scam proceeds. This action directly targets the technical backbone that enabled a broad range of illicit activities.\u003c/p\u003e\n\n\u003cp\u003eThe Huione Group had already been severed from the U.S. financial system in 2024 by the Treasury\u0026rsquo;s FinCEN, which found the group laundered at least $4 billion in illicit funds from August 2021 to January 2025, including proceeds from Southeast Asian scam operations and North Korean cyber heists. Cambodia itself arrested the former head of Huione, Li Xiong, and extradited him to China to face money laundering and fraud charges as a member of the Chen Xi crime syndicate. The combined financial isolation and infrastructure seizure mark an escalating U.S. effort to dismantle the group\u0026rsquo;s criminal ecosystem.\u003c/p\u003e\n\n\u003cp\u003eThe seizure is part of a broader U.S. crackdown, following sanctions on more than two dozen individuals including a Cambodian senator and ongoing FBI cooperation with Southeast Asian governments to combat the transnational scam industry. The FBI emphasized the commitment to disrupting every component of the illegal ecosystem to prevent further victimization from scams. The action demonstrates a shift from purely financial measures to technical disruption, directly hitting the cloud infrastructure that supports global cybercriminal logistics.\u003c/p\u003e\n"},{"n":23,"title":"GitHub Updates actions/checkout to Block Common Pwn Request Attack Patterns","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/github-updates-actionscheckout-to-block.html","time":"14:22","priority":"MUST READ","score":95,"tldr":"GitHub is hardening actions/checkout to refuse fetching fork pull request code by default in pull_request_target and workflow_run workflows, blocking a common attack vector that lets malicious pull requests run with the base repository’s full privileges and steal secrets.","briefOverview":"\u003cp\u003eGitHub is updating its official \u003ccode\u003eactions/checkout\u003c/code\u003e action to block a common attack pattern known as pwn requests. Effective June 18, 2026, version 7 will refuse to fetch code from fork pull requests by default when used inside \u003ccode\u003epull_request_target\u003c/code\u003e and \u003ccode\u003eworkflow_run\u003c/code\u003e workflows. The same change will be backported to all currently supported major versions on July 16, 2026. Workflow authors can still opt in to the risky behavior by explicitly setting the \u003ccode\u003eallow-unsafe-pr-checkout\u003c/code\u003e input to \u003ccode\u003etrue\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe update addresses the danger of the \u003ccode\u003epull_request_target\u003c/code\u003e trigger, which runs automatically with the base repository\u0026rsquo;s full privileges—including secrets, a read-write \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e, and default-branch cache access. If a workflow checks out and executes code from an untrusted fork, an attacker can steal secrets or gain write access. This technique has been exploited in recent supply chain attacks against projects such as Nx (the s1ngularity campaign), PostHog, TanStack, and \u003ccode\u003ekubernetes-el\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe new default blocks checkouts where the \u003ccode\u003erepository\u003c/code\u003e input points to the fork PR repository, the \u003ccode\u003eref\u003c/code\u003e input matches \u003ccode\u003erefs/pull/*/head\u003c/code\u003e or \u003ccode\u003erefs/pull/*/merge\u003c/code\u003e, or the \u003ccode\u003eref\u003c/code\u003e resolves to a fork PR\u0026rsquo;s head or merge commit SHA. The protection is limited to the \u003ccode\u003eactions/checkout\u003c/code\u003e action; workflows that use git, the GitHub CLI, or other checkout methods are not covered, and pwn requests triggered through other event types like \u003ccode\u003eissue_comment\u003c/code\u003e remain out of scope. GitHub and security firm Socket both emphasize that this is a guardrail, not a complete solution, and that any workflow running untrusted code in a privileged context still requires careful review.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["GitHub is updating the actions/checkout action to refuse fetching fork pull request code by default when used in pull_request_target and workflow_run workflows.","The new default refusal takes effect June 18, 2026 for version 7 and will be backported to all supported major versions on July 16, 2026.","Workflow authors can explicitly allow the checkout by setting the allow-unsafe-pr-checkout input to true, but the default behavior blocks the most common pwn request patterns.","The change is designed to stop attacks where malicious pull requests from forks run with the base repository’s full privileges, a technique used in recent supply chain compromises against Nx, PostHog, TanStack, and kubernetes-el.","The protection is limited to the actions/checkout action and does not prevent pwn requests through other methods, so it serves as a guardrail rather than a complete solution."],"insights":["The protection is confined to the actions/checkout action; workflows that check out fork code using git commands or other actions are not covered, leaving a significant attack surface still open.","The change is backported to all currently supported major versions, so existing pipelines relying on the risky pattern will break unless developers actively opt out, potentially causing widespread CI disruption.","Even with the new default, any workflow that executes untrusted code in a privileged event context remains a pwn request risk, making the fix a limited guardrail rather than a resolution of the underlying pattern.","The article cites four real-world projects (Nx, PostHog, TanStack, kubernetes-el) recently compromised through this exact mechanism, demonstrating that even mature, security-aware teams are susceptible without platform-enforced defaults."],"referencedReports":[{"title":"Safer pull_request_target defaults for GitHub Actions checkout","url":"https://github.blog/changelog/2026-06-18-safer-pull_request_target-defaults-for-github-actions-checkout/","publisher":"GitHub","context":"The article cites this official changelog as the source of the new default refusal behavior in actions/checkout.","category":"","primary":false},{"title":"Actions pull_request_target and environment branch protections changes","url":"https://github.blog/changelog/2025-11-07-actions-pull_request_target-and-environment-branch-protections-changes/","publisher":"GitHub","context":"The article mentions this earlier changelog as part of GitHub's advice on countering pull_request_target risks.","category":"","primary":false},{"title":"The Monsters in Your Build Cache – GitHub Actions Cache Poisoning","url":"https://adnanthekhan.com/2024/05/06/the-monsters-in-your-build-cache-github-actions-cache-poisoning/","publisher":"Adnan Khan","context":"The article links to this technical analysis when noting that pull_request_target vulnerabilities include cache poisoning.","category":"","primary":false},{"title":"Pwn Request Threat: A Hidden Danger in GitHub Actions","url":"https://www.endorlabs.com/learn/pwn-request-threat-a-hidden-danger-in-github-actions","publisher":"Endor Labs","context":"The article uses this resource to explain the term 'pwn request attack' as a hidden danger in GitHub Actions.","category":"","primary":false},{"title":"GitHub Actions: Preventing pwn requests","url":"https://securitylab.github.com/resources/github-actions-preventing-pwn-requests/","publisher":"GitHub Security Lab","context":"The article refers to this guide from GitHub Security Lab when discussing the pwn request attack pattern.","category":"","primary":false}],"body":"\u003cp\u003eGitHub is updating its official \u003ccode\u003eactions/checkout\u003c/code\u003e action to block a common attack pattern known as pwn requests. Effective June 18, 2026, version 7 will refuse to fetch code from fork pull requests by default when used inside \u003ccode\u003epull_request_target\u003c/code\u003e and \u003ccode\u003eworkflow_run\u003c/code\u003e workflows. The same change will be backported to all currently supported major versions on July 16, 2026. Workflow authors can still opt in to the risky behavior by explicitly setting the \u003ccode\u003eallow-unsafe-pr-checkout\u003c/code\u003e input to \u003ccode\u003etrue\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe update addresses the danger of the \u003ccode\u003epull_request_target\u003c/code\u003e trigger, which runs automatically with the base repository\u0026rsquo;s full privileges—including secrets, a read-write \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e, and default-branch cache access. If a workflow checks out and executes code from an untrusted fork, an attacker can steal secrets or gain write access. This technique has been exploited in recent supply chain attacks against projects such as Nx (the s1ngularity campaign), PostHog, TanStack, and \u003ccode\u003ekubernetes-el\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe new default blocks checkouts where the \u003ccode\u003erepository\u003c/code\u003e input points to the fork PR repository, the \u003ccode\u003eref\u003c/code\u003e input matches \u003ccode\u003erefs/pull/*/head\u003c/code\u003e or \u003ccode\u003erefs/pull/*/merge\u003c/code\u003e, or the \u003ccode\u003eref\u003c/code\u003e resolves to a fork PR\u0026rsquo;s head or merge commit SHA. The protection is limited to the \u003ccode\u003eactions/checkout\u003c/code\u003e action; workflows that use git, the GitHub CLI, or other checkout methods are not covered, and pwn requests triggered through other event types like \u003ccode\u003eissue_comment\u003c/code\u003e remain out of scope. GitHub and security firm Socket both emphasize that this is a guardrail, not a complete solution, and that any workflow running untrusted code in a privileged context still requires careful review.\u003c/p\u003e\n"},{"n":26,"title":"What the Miasma campaign reveals about the new supply chain threat model and the underground market for developer credentials","source":"tenable.com","sourceColorIdx":5,"link":"https://www.tenable.com/blog/what-the-miasma-campaign-reveals-about-the-new-supply-chain-threat-model-and-the-underground","time":"13:00","priority":"MUST READ","score":95,"tldr":"The Miasma campaign exposed a thriving Developer Credential Economy where stolen developer credentials circulate for weeks before being used in automated supply chain attacks, highlighting the need for exposure management over reactive detection.","briefOverview":"\u003cp\u003eThe Miasma campaign was a self-propagating npm worm that compromised over 89 packages across three waves from June 1–5, affecting repositories under Red Hat, Vapi.ai, and Microsoft Azure. Derived from the open-sourced Mini Shai-Hulud toolchain, the attack exploited a stolen Red Hat developer credential and session cookie that had been sitting in infostealer logs for seven weeks before weaponization. The worm harvested a wide range of secrets from every infected environment, turning each machine that ran npm install into a credential generation node that fed subsequent attack waves.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the campaign escalated rapidly: Wave 1 delivered malicious packages with valid SLSA Build Level 3 provenance attestations, demonstrating that signed builds do not prove a clean pipeline. Wave 2 introduced the Phantom Gyp technique, abusing a binding.gyp file to execute payloads and bypass the preinstall-script monitoring defenders had just deployed. Wave 3 expanded the attack surface further by dropping persistence files targeting AI coding assistants (Claude Code, Cursor, Gemini CLI, VS Code), ensuring compromise could trigger simply by opening an infected repository in a developer’s IDE.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is the clearest example to date of the Developer Credential Economy, a three-layer model where credential generation via supply chain compromise feeds underground distribution markets, which in turn enable multiple threat actors to weaponize access for varied objectives. Miasma validated that EDR and reactive detection are insufficient because credential theft occurs in ephemeral CI/CD environments where endpoint tools have no visibility. The public release of the full Mini Shai-Hulud source code in May permanently lowered the barrier for copycat operators, making proactive exposure management and human-gated publishing controls essential to disrupt the attack chain.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The Miasma campaign compromised over 89 npm packages across five days, affecting repositories under Red Hat, Vapi.ai, and Microsoft Azure.","The attack originated from a GitHub credential and session cookie stolen by a commodity infostealer and left available in underground markets for approximately seven weeks before weaponization.","Malicious packages were published with valid SLSA Build Level 3 provenance attestations because the attacker injected code into the legitimate CI/CD pipeline, demonstrating that cryptographic build signatures do not prove the pipeline was clean.","Wave 3 of the campaign introduced persistence files that target AI coding assistants (Claude Code, Cursor, Gemini CLI, VS Code), broadening the attack surface from registries to local developer environments.","The public release of the full Mini Shai-Hulud worm source code on May 12 lowered the barrier to entry, allowing any operator to replicate structurally identical supply chain campaigns."],"insights":["Valid SLSA Build Level 3 provenance attestations only prove that a specific pipeline built the package, not that the pipeline was free of malware; attackers can inject code while preserving the attestation and bypassing supply-chain verification.","The Miasma campaign is the first observed supply chain attack that systematically targets AI coding assistants by dropping hidden instruction-layer override files, expanding the attack surface from registries to developer IDEs and AI-assisted workflows.","EDR tools have zero visibility into ephemeral CI/CD runners where Miasma’s credential harvesting executes, meaning the most damaging phase of the attack—credential theft—occurs entirely outside the monitoring boundary.","The worm turned every infected machine that ran npm install into a credential generation node, creating a self-compounding cycle where each compromised environment harvests fresh credentials that fuel the next wave."],"referencedReports":[{"title":"Red Hat Miasma Supply Chain Attack","url":"https://whiteintel.io/blog/red-hat-miasma-supply-chain-attack","publisher":"Whiteintel","context":"Whiteintel detected a Red Hat employee's GitHub credential and session cookie in infostealer logs on April 13, establishing the credential theft timeline.","category":"","primary":false},{"title":"SpyCloud Annual Identity Exposure Report 2025","url":"https://spycloud.com/resource/report/spycloud-annual-identity-exposure-report-2025/","publisher":"SpyCloud","context":"The report provides statistics on infostealer infection volumes and exposed credentials that illustrate the scale of the credential distribution layer.","category":"","primary":false},{"title":"Monitoring npm Supply Chain Attacks","url":"https://unit42.paloaltonetworks.com/monitoring-npm-supply-chain-attacks/","publisher":"Palo Alto Networks Unit 42","context":"Unit 42 documented that copycat activity using the Shai-Hulud toolchain has complicated future attribution.","category":"","primary":false}],"body":"\u003cp\u003eThe Miasma campaign was a self-propagating npm worm that compromised over 89 packages across three waves from June 1–5, affecting repositories under Red Hat, Vapi.ai, and Microsoft Azure. Derived from the open-sourced Mini Shai-Hulud toolchain, the attack exploited a stolen Red Hat developer credential and session cookie that had been sitting in infostealer logs for seven weeks before weaponization. The worm harvested a wide range of secrets from every infected environment, turning each machine that ran npm install into a credential generation node that fed subsequent attack waves.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the campaign escalated rapidly: Wave 1 delivered malicious packages with valid SLSA Build Level 3 provenance attestations, demonstrating that signed builds do not prove a clean pipeline. Wave 2 introduced the Phantom Gyp technique, abusing a binding.gyp file to execute payloads and bypass the preinstall-script monitoring defenders had just deployed. Wave 3 expanded the attack surface further by dropping persistence files targeting AI coding assistants (Claude Code, Cursor, Gemini CLI, VS Code), ensuring compromise could trigger simply by opening an infected repository in a developer’s IDE.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is the clearest example to date of the Developer Credential Economy, a three-layer model where credential generation via supply chain compromise feeds underground distribution markets, which in turn enable multiple threat actors to weaponize access for varied objectives. Miasma validated that EDR and reactive detection are insufficient because credential theft occurs in ephemeral CI/CD environments where endpoint tools have no visibility. The public release of the full Mini Shai-Hulud source code in May permanently lowered the barrier for copycat operators, making proactive exposure management and human-gated publishing controls essential to disrupt the attack chain.\u003c/p\u003e\n"},{"n":3,"title":"LastPass confirms data breach in Klue supply chain attack","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/lastpass-confirms-data-breach-in-klue-supply-chain-attack/","time":"13:58","priority":"MUST READ","score":93,"tldr":"LastPass confirmed that threat actors used stolen OAuth tokens from a supply chain compromise of Klue to access customer data within its Salesforce environment, though no vault data was accessed.","briefOverview":"\u003cp\u003eLastPass disclosed that unauthorized actors accessed customer data from its Salesforce environment after stealing OAuth tokens from Klue, a third-party market intelligence platform. The compromise was part of a larger supply-chain attack attributed to the Icarus extortion group, which had infiltrated Klue\u0026rsquo;s infrastructure through compromised legacy credentials. LastPass confirmed that its core products, services, and customer vaults remained secure and unaffected by the incident.\u003c/p\u003e\n\n\u003cp\u003eThe attackers exploited the stolen OAuth tokens to pull customer-related information such as names, phone numbers, email addresses, physical addresses, support case details, and sales/CRM data. No evidence was found that call or email data from the Gong system was accessed. In response, LastPass disabled employee access to Klue, rotated the exposed tokens, notified law enforcement, and warned users about phishing attempts originating from specific sender domains.\u003c/p\u003e\n\n\u003cp\u003eThe breach extended beyond LastPass, affecting other organizations including Recorded Future, Tanium, Jamf, Sprout Social, Gong, and Insurity, and the threat actor launched an extortion campaign. This incident illustrates how a single compromised service provider with broad OAuth integrations can expose sensitive data across multiple unrelated companies, increasing the risk of convincing phishing and social engineering attacks that leverage real customer information.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["LastPass announced that hackers accessed customer data from its Salesforce environment after stealing OAuth tokens in a supply chain attack on Klue.","The exposed data includes customer names, phone numbers, email addresses, physical addresses, support case information, and sales/CRM data, but customer vaults and passwords were not accessed.","The attack was claimed by the Icarus extortion group, which compromised Klue’s infrastructure using legacy credentials and stole OAuth tokens connecting customers’ Salesforce environments.","Multiple other organizations were affected, including Recorded Future, Tanium, Jamf, Sprout Social, Gong, and Insurity.","LastPass disabled employee access to Klue, rotated exposed tokens, notified law enforcement, and warned users about phishing from specific sender domains."],"insights":["The attackers gained access to Klue's infrastructure through compromised legacy credentials for an integration service, demonstrating how forgotten service accounts can become critical supply chain weaknesses.","Several cybersecurity firms, including Recorded Future, Tanium, and Jamf, were among the victims, underscoring that even security vendors are not immune to supply chain breaches through non-security third-party tools.","Exposed support case information, combined with customer names and contact details, could make subsequent phishing attempts particularly convincing by referencing real customer issues."],"referencedReports":[{"title":"Klue Supply Chain Incident and LastPass Response","url":"https://blog.lastpass.com/posts/klue-supply-chain-incident-and-lastpass-response","publisher":"LastPass","context":"The article quotes LastPass's official statement and links to their blog post detailing the incident.","category":"","primary":false}],"body":"\u003cp\u003eLastPass disclosed that unauthorized actors accessed customer data from its Salesforce environment after stealing OAuth tokens from Klue, a third-party market intelligence platform. The compromise was part of a larger supply-chain attack attributed to the Icarus extortion group, which had infiltrated Klue\u0026rsquo;s infrastructure through compromised legacy credentials. LastPass confirmed that its core products, services, and customer vaults remained secure and unaffected by the incident.\u003c/p\u003e\n\n\u003cp\u003eThe attackers exploited the stolen OAuth tokens to pull customer-related information such as names, phone numbers, email addresses, physical addresses, support case details, and sales/CRM data. No evidence was found that call or email data from the Gong system was accessed. In response, LastPass disabled employee access to Klue, rotated the exposed tokens, notified law enforcement, and warned users about phishing attempts originating from specific sender domains.\u003c/p\u003e\n\n\u003cp\u003eThe breach extended beyond LastPass, affecting other organizations including Recorded Future, Tanium, Jamf, Sprout Social, Gong, and Insurity, and the threat actor launched an extortion campaign. This incident illustrates how a single compromised service provider with broad OAuth integrations can expose sensitive data across multiple unrelated companies, increasing the risk of convincing phishing and social engineering attacks that leverage real customer information.\u003c/p\u003e\n"},{"n":9,"title":"Scattered Spider members plead guilty to hacking Transport for London","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/scattered-spider-members-plead-guilty-to-hacking-transport-for-london/","time":"15:31","priority":"MUST READ","score":93,"tldr":"Two members of the Scattered Spider cybercrime group, Thalha Jubair and Owen Flowers, pleaded guilty to hacking Transport for London in 2024, causing £29 million in losses and significant operational disruption.","briefOverview":"\u003cp\u003eIn 2024, two members of the Scattered Spider cybercrime group—Thalha Jubair (20) and Owen Flowers (18)—pleaded guilty to hacking Transport for London (TfL), the public body that operates most of London’s transit network. The intrusion took place between August 31 and September 3, 2024, and the two individuals initially pleaded not guilty but changed their pleas on the first day of proceedings at Woolwich Crown Court.\u003c/p\u003e\n\n\u003cp\u003eThe attack caused severe operational disruption: all 28,000 TfL employees were forced to visit offices in person to reset their passwords, customer refund services were delayed after attackers accessed the Oyster refunds system, and TfL later confirmed that customer data had been stolen. The financial damage amounted to £29 million (approximately $38.3 million), which the NCA described as millions of pounds in losses to a key piece of UK critical national infrastructure. The agency’s Deputy Director emphasized that the convictions were made possible because TfL engaged with law enforcement early.\u003c/p\u003e\n\n\u003cp\u003eInvestigators uncovered significant evidence when they searched Flower’s home, seizing a laptop that contained a screenshot showing connectivity to TfL infrastructure, proof of access to a stolen‑credential marketplace, and videos of Jubair actively breaching TfL systems. The hackers coordinated via Telegram and a shared online collaboration platform. Beyond the TfL case, Flowers has been linked to intrusions at two US healthcare organizations—SSM Health Care Corporation and Sutter Health—and he twice breached his bail conditions in 2025. Sentencing is now scheduled for July 16.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Two members of the Scattered Spider group, Thalha Jubair and Owen Flowers, pleaded guilty to hacking Transport for London's systems in 2024.","The cyberattack occurred between August 31 and September 3, 2024, causing access to Oyster refunds data and disruption of customer refund services.","The attack forced all 28,000 TfL employees to reset their passwords in person and resulted in £29 million in financial losses.","Devices seized from Owen Flowers' home contained a screenshot showing connectivity to TfL infrastructure and videos of Jubair breaching TfL systems.","The two hackers communicated via Telegram and a shared online platform during the intrusion, and Flowers has also been linked to intrusions at US healthcare organizations SSM Health Care Corporation and Sutter Health."],"insights":["The breach forced all 28,000 Transport for London employees to physically visit offices for password resets, illustrating how a cyberattack can cause massive offline operational disruption.","The NCA stated that the conviction would not have been possible without TfL's early engagement with law enforcement, offering a clear action lesson for victim organizations.","Investigators found evidence that the hackers accessed a marketplace selling stolen credentials, highlighting their reliance on underground criminal infrastructure beyond the direct attack."],"referencedReports":[],"body":"\u003cp\u003eIn 2024, two members of the Scattered Spider cybercrime group—Thalha Jubair (20) and Owen Flowers (18)—pleaded guilty to hacking Transport for London (TfL), the public body that operates most of London’s transit network. The intrusion took place between August 31 and September 3, 2024, and the two individuals initially pleaded not guilty but changed their pleas on the first day of proceedings at Woolwich Crown Court.\u003c/p\u003e\n\n\u003cp\u003eThe attack caused severe operational disruption: all 28,000 TfL employees were forced to visit offices in person to reset their passwords, customer refund services were delayed after attackers accessed the Oyster refunds system, and TfL later confirmed that customer data had been stolen. The financial damage amounted to £29 million (approximately $38.3 million), which the NCA described as millions of pounds in losses to a key piece of UK critical national infrastructure. The agency’s Deputy Director emphasized that the convictions were made possible because TfL engaged with law enforcement early.\u003c/p\u003e\n\n\u003cp\u003eInvestigators uncovered significant evidence when they searched Flower’s home, seizing a laptop that contained a screenshot showing connectivity to TfL infrastructure, proof of access to a stolen‑credential marketplace, and videos of Jubair actively breaching TfL systems. The hackers coordinated via Telegram and a shared online collaboration platform. Beyond the TfL case, Flowers has been linked to intrusions at two US healthcare organizations—SSM Health Care Corporation and Sutter Health—and he twice breached his bail conditions in 2025. Sentencing is now scheduled for July 16.\u003c/p\u003e\n"},{"n":16,"title":"Malicious npm Packages Pose as PostCSS Tools to Deliver Windows RAT","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/malicious-npm-packages-pose-as-postcss.html","time":"08:54","priority":"MUST READ","score":93,"tldr":"Malicious npm packages masquerading as PostCSS tools have been discovered delivering a multi-stage Windows remote access trojan, alongside several other supply chain attacks targeting developer credentials and Linux systems.","briefOverview":"\u003cp\u003eCybersecurity researchers have uncovered multiple malicious npm packages impersonating popular PostCSS tools to deliver a Windows remote access trojan (RAT). The packages — aes-decode-runner-pro, postcss-minify-selector, and postcss-minify-selector-parser — were published by user abdrizak and remain downloadable. Each includes a JavaScript dropper that writes and executes a PowerShell script, which downloads a ZIP archive from an attacker-controlled server containing a Visual Basic Script, a Python runtime, and Nuitka-compiled Python extension modules.\u003c/p\u003e\n\n\u003cp\u003eThe malware, once launched via the Python loader, functions as a full-featured RAT that gathers host information, steals Chrome credentials by bypassing app-bound encryption, collects Chrome extension data, executes shell commands, and transfers files to and from a command-and-control server at 95.216.92.207:8080. The attack chain demonstrates how a seemingly small parser-like dependency can conceal a multi-stage Windows payload while appearing related to legitimate build tooling with massive weekly usage.\u003c/p\u003e\n\n\u003cp\u003eThe discovery coincides with several other npm supply chain attacks: a package named apintergrationpost delivers a Linux RAT called MYRA with a native C rootkit and multiple persistence methods; @withgoogle/stitch-sdk steals developer credentials from eight sources including Claude Code and Docker config; and a cluster of five packages (procwire, routecraft, endpointmap, bytecraft, staticlayer) drops a Windows binary during installation. These incidents overlap with the North Korean PolinRider operation, which injects obfuscated JavaScript into GitHub repositories to distribute the BeaverTail downloader and InvisibleFerret backdoor.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Malicious npm packages aes-decode-runner-pro, postcss-minify-selector, and postcss-minify-selector-parser deliver a Windows remote access trojan by dropping a PowerShell downloader that fetches a ZIP from nvidiadriver[.]net.","The RAT collects host information, steals Chrome credentials by bypassing app-bound encryption, runs shell commands, and communicates with command-and-control server 95.216.92.207:8080.","A separate package named apintergrationpost delivers a Linux RAT called MYRA that compiles a native C rootkit and establishes multiple persistence mechanisms.","The @withgoogle/stitch-sdk package steals developer credentials from eight sources including Claude Code, git config, and npm config, then exfiltrates them to stitch-production[.]org.","The activity overlaps with the North Korean PolinRider operation, which injects obfuscated JavaScript into GitHub repositories to distribute the BeaverTail downloader and InvisibleFerret backdoor."],"insights":["The RAT's core logic is implemented in Python extension modules compiled with Nuitka, which may evade static analysis tools that expect plaintext scripts.","The @withgoogle/stitch-sdk credential stealer specifically harvests developer secrets from Claude Code and Docker config, indicating attackers are targeting AI development pipelines beyond traditional source code.","The gonex-AI supply chain attack uses a two-stage blockchain-based C2 where the second-stage payload address is encoded in a Tron address's most recent transaction, making takedown difficult and detection harder."],"referencedReports":[{"title":"From PostCSS Typosquat to Windows RAT","url":"https://research.jfrog.com/post/from-postcss-typosquat-to-windows-rat/","publisher":"JFrog","context":"The article cites JFrog's analysis as the primary source for the PostCSS typosquatting campaign and the multi-stage Windows RAT delivery chain.","category":"","primary":false},{"title":"Malicious apintergrationpost npm Package Delivers MYRA RAT","url":"https://safedep.io/malicious-apintergrationpost-npm-myra-rat/","publisher":"SafeDep","context":"The article references SafeDep's findings on a malicious npm package that deploys a Linux remote access trojan called MYRA as a coinciding campaign.","category":"","primary":false},{"title":"Scope Squat: @withgoogle/stitch-sdk Credential Harvester","url":"https://safedep.io/withgoogle-stitch-sdk-scope-squat-credential-harvester/","publisher":"SafeDep","context":"The article references SafeDep's discovery of a package impersonating Google's Stitch AI tool to steal developer credentials from eight sources.","category":"","primary":false},{"title":"Procwire npm Windows Dropper Campaign","url":"https://safedep.io/procwire-npm-windows-dropper-campaign/","publisher":"SafeDep","context":"The article references SafeDep's report on a cluster of five npm packages that deliver a Windows dropper binary during installation.","category":"","primary":false},{"title":"Blockchain C2 Supply Chain Attack on gonex-AI","url":"https://safedep.io/astro-config-blockchain-c2-supply-chain/","publisher":"SafeDep","context":"The article references SafeDep's analysis of a supply chain attack using blockchain-based command and control against the gonex-AI/Understand-Anything tool.","category":"","primary":false},{"title":"PolinRider Rides Again: North Korean Attack Expands Across GitHub","url":"https://opensourcemalware.com/blog/polinrider-rides-again-north-korean-attack-expands-across-github","publisher":"Open Source Malware","context":"The article cites this research to link the current activity to the North Korean PolinRider operation that injects JavaScript into GitHub repositories to deliver BeaverTail and InvisibleFerret.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers have uncovered multiple malicious npm packages impersonating popular PostCSS tools to deliver a Windows remote access trojan (RAT). The packages — aes-decode-runner-pro, postcss-minify-selector, and postcss-minify-selector-parser — were published by user abdrizak and remain downloadable. Each includes a JavaScript dropper that writes and executes a PowerShell script, which downloads a ZIP archive from an attacker-controlled server containing a Visual Basic Script, a Python runtime, and Nuitka-compiled Python extension modules.\u003c/p\u003e\n\n\u003cp\u003eThe malware, once launched via the Python loader, functions as a full-featured RAT that gathers host information, steals Chrome credentials by bypassing app-bound encryption, collects Chrome extension data, executes shell commands, and transfers files to and from a command-and-control server at 95.216.92.207:8080. The attack chain demonstrates how a seemingly small parser-like dependency can conceal a multi-stage Windows payload while appearing related to legitimate build tooling with massive weekly usage.\u003c/p\u003e\n\n\u003cp\u003eThe discovery coincides with several other npm supply chain attacks: a package named apintergrationpost delivers a Linux RAT called MYRA with a native C rootkit and multiple persistence methods; @withgoogle/stitch-sdk steals developer credentials from eight sources including Claude Code and Docker config; and a cluster of five packages (procwire, routecraft, endpointmap, bytecraft, staticlayer) drops a Windows binary during installation. These incidents overlap with the North Korean PolinRider operation, which injects obfuscated JavaScript into GitHub repositories to distribute the BeaverTail downloader and InvisibleFerret backdoor.\u003c/p\u003e\n"},{"n":21,"title":"FortiBleed Targeted FortiGate Firewalls in 110 Million-Credential Harvesting Operation","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/fortibleed-targeted-fortigate-firewalls.html","time":"18:20","priority":"MUST READ","score":93,"tldr":"A Russian-speaking threat actor orchestrated the FortiBleed campaign, compromising over 430,000 FortiGate firewalls to passively harvest more than 110 million credentials using a custom sniffing tool, as part of a broader multi-vendor initial access operation since February 2026.","briefOverview":"\u003cp\u003eThe FortiBleed campaign is a credential-harvesting operation orchestrated by a Russian-speaking initial access broker that has compromised over 430,000 FortiGate firewalls globally since February 2026. The attackers deploy a custom Golang tool named FortigateSniffer, which abuses the native FortiOS diagnostic packet sniffer to passively capture cleartext and hashed credentials from authentication traffic across 24 protocols. This approach allows the threat actor to collect sensitive logon data without installing external malware, making detection significantly more difficult.\u003c/p\u003e\n\n\u003cp\u003eBy running in five-hour cycles and restricting activity to Moscow business hours behind a geofencing filter, the group has harvested more than 110 million credentials, including RADIUS, NTLM, Kerberos, and MySQL tokens. The primary victims are small and medium businesses with fewer than 200 employees, especially in the United States and India, with IT service providers being particularly targeted to enable downstream access into customer networks. Stolen password hashes are cracked using Hashmat, Hashtopolis, and a Telegram bot named HASHBOT, then reused for lateral movement and Active Directory enumeration.\u003c/p\u003e\n\n\u003cp\u003eFortiBleed is only one part of a larger automated brute-forcing campaign that also targets Synology NAS devices, Sophos firewalls, RDWeb portals, Citrix SSL-VPNs, and MS-SQL servers. Notably, the same username and password pairs appeared across thousands of distinct IP addresses, suggesting the attackers may have planted backdoor accounts on infected devices. The operation also utilized components of the open-source AI-native offensive platform CyberStrike for workflow automation, illustrating how even financially motivated cybercriminals are incorporating artificial intelligence to scale their attacks.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A Russian-speaking initial access broker conducted the FortiBleed credential-harvesting operation, compromising over 430,000 FortiGate firewalls globally since February 2026.","The attackers deployed a custom tool named FortigateSniffer that uses the FortiOS diagnostic sniffer to passively capture cleartext and hashed credentials from traffic passing through infected devices.","The group primarily targeted small and medium businesses with fewer than 200 employees, with a notable focus on the United States and India.","FortiBleed is part of a broader multi-vendor initial access operation that also brute-forces Synology NAS, Sophos firewalls, RDWeb portals, Citrix SSL-VPNs, and MS-SQL servers.","The operation harvested over 110 million credentials, including RADIUS, NTLM, Kerberos, and MySQL authentication tokens, and used Hashmat, Hashtopolis, and a Telegram bot called HASHBOT for cracking."],"insights":["The attackers abused the legitimate FortiOS 'diagnose sniffer' packet-capture command to build a passive credential sniffer that operates entirely within the device's own diagnostic framework, eliminating the need for external malware.","The operation was restricted to specific IP ranges and only ran between 7 a.m. and 6 p.m. Moscow Time, indicating a deliberate effort to avoid detection by mimicking regular administrative activity during business hours.","Identical username and password pairs repeated across thousands of distinct IP addresses suggest the threat actor may have deliberately planted backdoor accounts on compromised devices for persistent access.","The campaign incorporated an open-source AI-native offensive security platform (CyberStrike) to assist with workflow automation, illustrating how even smaller criminal operations are leveraging AI tools to scale their attacks."],"referencedReports":[{"title":"Dismantling FortiBleed","url":"https://socradar.io/wp-content/uploads/2026/06/Dismantling-FortiBleed.pdf","publisher":"SOCRadar","context":"SOCRadar released a fresh report detailing the FortiBleed campaign, its tools, and operational stages.","category":"","primary":false},{"title":"What SpyCloud Found Inside the FortiBleed Threat Actor Infrastructure","url":"https://spycloud.com/blog/what-spycloud-found-inside-the-fortibleed-threat-actor-infrastructure/","publisher":"SpyCloud","context":"SpyCloud shared data on the capture cycle start date and hash cracking setup timeline within the FortiBleed operation.","category":"","primary":false},{"title":"FortiBleed Sens Unique Paris Libsodium DoS","url":"https://socradar.io/blog/fortibleed-sens-unique-paris-libsodium-dos/","publisher":"SOCRadar","context":"SOCRadar blog post covering the SantaAd advertisement of access to Fortinet devices, referenced as a related development to the FortiBleed campaign.","category":"","primary":false}],"body":"\u003cp\u003eThe FortiBleed campaign is a credential-harvesting operation orchestrated by a Russian-speaking initial access broker that has compromised over 430,000 FortiGate firewalls globally since February 2026. The attackers deploy a custom Golang tool named FortigateSniffer, which abuses the native FortiOS diagnostic packet sniffer to passively capture cleartext and hashed credentials from authentication traffic across 24 protocols. This approach allows the threat actor to collect sensitive logon data without installing external malware, making detection significantly more difficult.\u003c/p\u003e\n\n\u003cp\u003eBy running in five-hour cycles and restricting activity to Moscow business hours behind a geofencing filter, the group has harvested more than 110 million credentials, including RADIUS, NTLM, Kerberos, and MySQL tokens. The primary victims are small and medium businesses with fewer than 200 employees, especially in the United States and India, with IT service providers being particularly targeted to enable downstream access into customer networks. Stolen password hashes are cracked using Hashmat, Hashtopolis, and a Telegram bot named HASHBOT, then reused for lateral movement and Active Directory enumeration.\u003c/p\u003e\n\n\u003cp\u003eFortiBleed is only one part of a larger automated brute-forcing campaign that also targets Synology NAS devices, Sophos firewalls, RDWeb portals, Citrix SSL-VPNs, and MS-SQL servers. Notably, the same username and password pairs appeared across thousands of distinct IP addresses, suggesting the attackers may have planted backdoor accounts on infected devices. The operation also utilized components of the open-source AI-native offensive platform CyberStrike for workflow automation, illustrating how even financially motivated cybercriminals are incorporating artificial intelligence to scale their attacks.\u003c/p\u003e\n"},{"n":10,"title":"Two Scattered Spider members plead guilty over cyberattack that crippled London transit","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/guilty-plea-tfl-cyberattack-scattered-spider-members","time":"13:00","priority":"SHOULD READ","score":88,"tldr":"Two alleged members of the Scattered Spider cybercrime group pleaded guilty to hacking London's transport authority, Transport for London, in a 2024 attack that caused months of disruption, exposed customer data, and cost the organization around £29 million.","briefOverview":"\u003cp\u003eTwo alleged members of the Scattered Spider cybercrime group, Thalha Jubair (20) and Owen Flowers (18), pleaded guilty on the first day of their trial to infiltrating Transport for London\u0026rsquo;s network in September 2024. The pair had been scheduled to stand trial but changed their pleas, with sentencing set for July 16. They were charged under British cybercrime legislation with conspiracy to commit unauthorized computer acts that create a risk of serious damage to human welfare or national security, which carries a maximum sentence of life imprisonment.\u003c/p\u003e\n\n\u003cp\u003eThe attack forced all 28,000 TfL employees to reset their passwords in person and caused around £29 million in losses and recovery costs. Customer refund services were disrupted for months, and data held in the Oyster smart-ticketing refund system was exposed. Applications for discounted Oyster photocards used by children and young people were also affected.\u003c/p\u003e\n\n\u003cp\u003eThe investigation uncovered that the two communicated via Telegram and collaborated through a shared online workspace during the intrusion. A search of Flowers\u0026rsquo;s home yielded devices containing a screenshot of connections to TfL infrastructure and evidence of accessing a stolen credentials marketplace. Investigators also recovered videos showing Jubair accessing TfL systems. The same evidence indicated infiltration and damage at U.S. healthcare providers SSM Health Care Corporation and Sutter Health, both of which reported large data breaches in 2023.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Two alleged members of the Scattered Spider group, Thalha Jubair and Owen Flowers, pleaded guilty to hacking Transport for London in September 2024.","The cyberattack forced all 28,000 TfL employees to reset their passwords in person and cost the organization approximately £29 million in losses and recovery.","The breach exposed customer data held in the Oyster refund system and disrupted refund services for several months.","Investigators found evidence linking the pair to intrusions at U.S. healthcare providers SSM Health Care Corporation and Sutter Health.","The defendants communicated through Telegram and used a shared online workspace while carrying out the attack."],"insights":["The investigation into the TfL breach uncovered evidence linking the same individuals to prior infiltrations at two major U.S. healthcare providers (SSM Health and Sutter Health), which both reported large data breaches in 2023, showing how a single cross-case probe can connect earlier intrusions across continents.","The compromise was so severe that all 28,000 TfL employees had to reset passwords in person, a measure normally reserved for when remote authentication trust is completely undermined.","Despite the group's history of extorting $115 million, the TfL charges mention only unauthorized access and risk of serious damage, not extortion, suggesting this operation may have had a different immediate objective or that extortion was not part of the indictment.","The pair collaborated via Telegram and a shared online workspace—ordinary consumer tools—underscoring that sophisticated damage can stem from low-barrier coordination, without custom malware or infrastructure."],"referencedReports":[],"body":"\u003cp\u003eTwo alleged members of the Scattered Spider cybercrime group, Thalha Jubair (20) and Owen Flowers (18), pleaded guilty on the first day of their trial to infiltrating Transport for London\u0026rsquo;s network in September 2024. The pair had been scheduled to stand trial but changed their pleas, with sentencing set for July 16. They were charged under British cybercrime legislation with conspiracy to commit unauthorized computer acts that create a risk of serious damage to human welfare or national security, which carries a maximum sentence of life imprisonment.\u003c/p\u003e\n\n\u003cp\u003eThe attack forced all 28,000 TfL employees to reset their passwords in person and caused around £29 million in losses and recovery costs. Customer refund services were disrupted for months, and data held in the Oyster smart-ticketing refund system was exposed. Applications for discounted Oyster photocards used by children and young people were also affected.\u003c/p\u003e\n\n\u003cp\u003eThe investigation uncovered that the two communicated via Telegram and collaborated through a shared online workspace during the intrusion. A search of Flowers\u0026rsquo;s home yielded devices containing a screenshot of connections to TfL infrastructure and evidence of accessing a stolen credentials marketplace. Investigators also recovered videos showing Jubair accessing TfL systems. The same evidence indicated infiltration and damage at U.S. healthcare providers SSM Health Care Corporation and Sutter Health, both of which reported large data breaches in 2023.\u003c/p\u003e\n"},{"n":8,"title":"Tata Electronics confirms cyberattack as hackers leak data","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/tata-electronics-confirms-cyberattack-as-hackers-leak-data/","time":"21:06","priority":"SHOULD READ","score":85,"tldr":"Tata Electronics confirmed a cyberattack after the World Leaks extortion group leaked stolen data, including Apple product manufacturing schematics, while the company says operations remain unaffected.","briefOverview":"\u003cp\u003eTata Electronics, a division of the Tata Group that manufactures Apple iPhones and components, confirmed it was the target of a cybersecurity incident that affected some of its IT systems. The company stated that its operational response was immediate and that business operations, including production, were not impacted. The confirmation came after a threat group called World Leaks claimed the attack and leaked data allegedly stolen from the company.\u003c/p\u003e\n\n\u003cp\u003eAmong the leaked files are directories and documents that World Leaks asserts contain Apple product manufacturing data, including internal component schematics, PCB designs, material specifications, and SDK files. BleepingComputer reached out to Apple for comment on possible exposure of proprietary data, but had not received a response at the time of publication.\u003c/p\u003e\n\n\u003cp\u003eWorld Leaks is considered a rebrand of the Hunters International ransomware group and now operates purely as a data extortion operation, stealing files and threatening to release them without encrypting victim systems. Other major victims linked to the same group include Dell, which confirmed a breach of its test lab platform in July 2025, and Nike, which launched an investigation after a claimed 1.4 TB data theft in January 2026.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Tata Electronics confirmed a cybersecurity incident on some of its IT systems but stated that its operations were not affected and continued normally.","The World Leaks threat group claimed the attack and leaked files that it alleged contain Apple product manufacturing data, including internal component schematics and PCB designs.","World Leaks is a rebrand of the Hunters International ransomware group and now operates purely as a data-extortion group, stealing files and threatening to leak them without encrypting systems.","Apple had not responded to BleepingComputer’s inquiry about whether any proprietary data was exposed at the time of publication.","Other confirmed or investigated victims of World Leaks include Dell, which confirmed a breach in July 2025, and Nike, which launched an investigation after a claimed theft of 1.4 TB of files in January 2026."],"insights":["The rebranding of Hunters International to World Leaks marks a deliberate shift from ransomware with encryption to a pure data-extortion model, indicating the group now relies solely on the threat of leaking stolen files.","The leak of internal Apple manufacturing documents from a contract supplier demonstrates that extortion groups can obtain sensitive product design data by targeting companies in the supply chain rather than the brand owner directly.","The group has successfully breached or claimed multiple major global brands — Dell, Nike, and Tata Electronics — in less than a year, pointing to a well-resourced and persistent operation against large multinationals."],"referencedReports":[],"body":"\u003cp\u003eTata Electronics, a division of the Tata Group that manufactures Apple iPhones and components, confirmed it was the target of a cybersecurity incident that affected some of its IT systems. The company stated that its operational response was immediate and that business operations, including production, were not impacted. The confirmation came after a threat group called World Leaks claimed the attack and leaked data allegedly stolen from the company.\u003c/p\u003e\n\n\u003cp\u003eAmong the leaked files are directories and documents that World Leaks asserts contain Apple product manufacturing data, including internal component schematics, PCB designs, material specifications, and SDK files. BleepingComputer reached out to Apple for comment on possible exposure of proprietary data, but had not received a response at the time of publication.\u003c/p\u003e\n\n\u003cp\u003eWorld Leaks is considered a rebrand of the Hunters International ransomware group and now operates purely as a data extortion operation, stealing files and threatening to release them without encrypting victim systems. Other major victims linked to the same group include Dell, which confirmed a breach of its test lab platform in July 2025, and Nike, which launched an investigation after a claimed 1.4 TB data theft in January 2026.\u003c/p\u003e\n"},{"n":15,"title":"Fake shops target shoppers across Europe with fake Samsung deals, counterfeit goods and World Cup scams","source":"bitdefender.com","sourceColorIdx":7,"link":"https://www.bitdefender.com/en-us/blog/labs/fake-shops-europe-samsung-world-cup-scams","time":"12:55","priority":"SHOULD READ","score":85,"tldr":"Bitdefender Labs identified more than 55 coordinated fake-shop campaigns across 12 European countries that use Facebook ads, WhatsApp, and lookalike domains to impersonate Samsung, Nike, ZARA, and other major brands, stealing payments and personal data while exploiting FIFA World Cup 2026 excitement.","briefOverview":"\u003cp\u003eBitdefender Labs uncovered more than 55 coordinated fake-shop campaigns that targeted shoppers in 12 European countries between March and May 2026. Attackers impersonated globally recognized brands, including Samsung, Nike, Adidas, ZARA, H\u0026amp;M, Amazon, Lidl, and SHEIN, to lure victims through Facebook ads, WhatsApp messages, email, SMS, phone calls, and fraudulent websites. Several operations exploited anticipation for the 2026 FIFA World Cup to push counterfeit jerseys and fan kits. The campaigns collectively represent a professionalized fake-commerce ecosystem designed to harvest payments and personal information at scale.\u003c/p\u003e\n\n\u003cp\u003eThe investigation revealed that these operations go far beyond isolated scam websites. They use advanced evasion techniques such as Unicode lookalike domains (e.g., adidas.com with a dotless i), rapid domain rotation, and shared infrastructure—like a Polish hub hosting both ZARA and Nike scams on the same domain. The mature Homborg Online Handel network in Germany accepts only SEPA advance bank transfers, leaving victims with no practical way to recover lost funds. WhatsApp-based counterfeit supply chains operated by a China-based supplier called “Carl” direct buyers to password-protected Yupoo catalogs, creating a hidden marketplace for fake goods.\u003c/p\u003e\n\n\u003cp\u003eWith over 40 attack domains mapped and half a dozen channels abused, the threat landscape shows that fake-shop operators are increasingly mimicking legitimate e-commerce operations with advertising budgets, localized content, and customer-service workflows. The campaigns not only steal money but also collect home addresses and other sensitive delivery details, and some exploit Amazon branding to enroll users in unwanted subscription traps. Bitdefender’s findings highlight that consumers across the EU and the UK face persistent and evolving risks from these coordinated scams, especially as major sports events like the World Cup fuel new waves of fraudulent activity.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Bitdefender Labs uncovered more than 55 fake-shop campaigns that targeted consumers in 12 European countries between March and May 2026, impersonating brands like Samsung, Nike, Adidas, ZARA, H\u0026amp;M, Amazon, Lidl, and SHEIN.","Attackers used Facebook ads, WhatsApp messages, email, SMS, phone calls, and Unicode lookalike domains such as adidas¹.com to redirect victims to fraudulent payment or data-harvesting pages.","A German fake-shop network called “Homborg Online Handel” rotated domains frequently and only accepted SEPA advance bank transfers, making it nearly impossible for victims to recover their money.","Several campaigns exploited excitement for the FIFA World Cup 2026, offering counterfeit jerseys and fake Adidas Deutschland fan kits through redirect chains and WhatsApp messages.","The investigation identified a China-based operator named “Carl” who used WhatsApp to direct European users to password-protected Yupoo catalogs selling counterfeit Nike, Adidas, and luxury goods."],"insights":["Attackers used visually deceptive Unicode lookalike domains (e.g., adidas.com with a dotless i or caron) to trick users into trusting fake storefronts while bypassing detection tools that rely on exact ASCII matching.","Although the fake shops often advertised card and PayPal payments, some—like the Homborg Online Handel network—only accepted SEPA advance bank transfers, deliberately choosing a method that leaves victims with almost no way to recover their money.","The same Polish domain notcia.shop was used to run both ZARA and Nike impersonation campaigns, revealing operational links that allow defenders to connect distinct-looking scams to a single infrastructure hub.","The counterfeit supplier 'Carl' used password-protected Yupoo photo catalogs and WhatsApp to create a private, invitation-only storefront for fake goods, moving beyond public websites to evade automated scanning.","The SHEIN-themed email campaign hosted its legal documentation on Google Drive rather than on an official domain—a subtle anomaly that can serve as a practical detection clue for identifying fake order confirmation scams."],"referencedReports":[{"title":"Verbraucherschutz Deutschland warnings about Homborg Online Handel fake shops","url":"https://verbraucherschutz.de/","publisher":"Verbraucherschutz Deutschland online e.V.","context":"The article notes that this German consumer protection association has published warnings about the Homborg Online Handel network, which rotates domains and only accepts SEPA advance bank transfers, leaving victims little recourse.","category":"","primary":false}],"body":"\u003cp\u003eBitdefender Labs uncovered more than 55 coordinated fake-shop campaigns that targeted shoppers in 12 European countries between March and May 2026. Attackers impersonated globally recognized brands, including Samsung, Nike, Adidas, ZARA, H\u0026amp;M, Amazon, Lidl, and SHEIN, to lure victims through Facebook ads, WhatsApp messages, email, SMS, phone calls, and fraudulent websites. Several operations exploited anticipation for the 2026 FIFA World Cup to push counterfeit jerseys and fan kits. The campaigns collectively represent a professionalized fake-commerce ecosystem designed to harvest payments and personal information at scale.\u003c/p\u003e\n\n\u003cp\u003eThe investigation revealed that these operations go far beyond isolated scam websites. They use advanced evasion techniques such as Unicode lookalike domains (e.g., adidas.com with a dotless i), rapid domain rotation, and shared infrastructure—like a Polish hub hosting both ZARA and Nike scams on the same domain. The mature Homborg Online Handel network in Germany accepts only SEPA advance bank transfers, leaving victims with no practical way to recover lost funds. WhatsApp-based counterfeit supply chains operated by a China-based supplier called “Carl” direct buyers to password-protected Yupoo catalogs, creating a hidden marketplace for fake goods.\u003c/p\u003e\n\n\u003cp\u003eWith over 40 attack domains mapped and half a dozen channels abused, the threat landscape shows that fake-shop operators are increasingly mimicking legitimate e-commerce operations with advertising budgets, localized content, and customer-service workflows. The campaigns not only steal money but also collect home addresses and other sensitive delivery details, and some exploit Amazon branding to enroll users in unwanted subscription traps. Bitdefender’s findings highlight that consumers across the EU and the UK face persistent and evolving risks from these coordinated scams, especially as major sports events like the World Cup fuel new waves of fraudulent activity.\u003c/p\u003e\n"},{"n":19,"title":"Fake AI Agent Skill Passed Security Scans and Reportedly Reached 26,000 Agents","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/fake-ai-agent-skill-passed-security.html","time":"15:16","priority":"SHOULD READ","score":85,"tldr":"A fake AI agent skill passed all major security scanners by keeping the submitted package clean while hosting malicious instructions on an external link that was changed after approval, proving that scanners cannot catch runtime payload swaps.","briefOverview":"\u003cp\u003eSecurity firm AIR built a fake AI agent skill named \u0026ldquo;brand-landingpage\u0026rdquo; that passed all major skill scanners by shipping a clean package and directing the agent to an external link the firm controlled. The skill gained trust by having a pull request merged into a popular 36,000-star marketplace repository and by being promoted through an Instagram ad. After the skill was installed on roughly 26,000 agents, AIR swapped the external website to serve a script that harvested email addresses, proving that scanners only evaluate a static snapshot and cannot detect content changes made after review.\u003c/p\u003e\n\n\u003cp\u003eThe blind spot is structural: scanners from Cisco, NVIDIA, and skills.sh all analyzed only the submitted SKILL.md and files, missing that the external link could be rewritten post-approval. Earlier independent research by Trail of Bits reached the same conclusion, and real campaigns have used the same delayed-payload technique for months. Anthropic\u0026rsquo;s own documentation already warns that skills fetching external URLs are risky because content can change after vetting, yet the ecosystem still relies on star counts and clean scan results as safety proof.\u003c/p\u003e\n\n\u003cp\u003eThe article advises defenders to treat skills as software rather than text, to vet what a skill points to, and to re-check when anything changes. AIR\u0026rsquo;s figures are self-reported and tied to its own product launch, but the method—borrowing trust signals and exploiting the gap between a static scan and a mutable external page—remains an unclosed threat that could give attackers access to files, data, and internal systems.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["AIR created a fake AI agent skill called 'brand-landingpage' that passed every tested security scanner because the submitted package contained no malicious code and directed the agent to an external link the firm controlled.","The skill gained credibility by having a pull request merged into a popular marketplace repository, inheriting its high GitHub star count, and was promoted via an Instagram ad.","After the skill was installed on roughly 26,000 agents, AIR changed the external website to serve a script that harvested email addresses, showing that scanners only evaluate a static snapshot and cannot detect changes made after approval.","The method reflects earlier independent research by Trail of Bits and real-world campaigns that use the same delayed-payload tactic, confirming that current skill scanners fail to address runtime content swaps."],"insights":["Current skill scanners evaluate only the static package submitted, not the external sites it references, allowing an attacker to swap a benign site for a malicious one after the scan clears.","A pull request merged into a popular 36,000-star repository gave the fake skill an inherited high star count, turning a single approval into a powerful false trust signal.","The demo harvested only email addresses, but the same foothold could have read files, moved data, or hit internal systems, limited only by the agent's access level.","Multiple independent scanners from Cisco, NVIDIA, and others all failed this test, and research shows they often disagree because each judges in isolation without considering external content changes.","Anthropic's own documentation already warns that skills fetching external URLs are risky because content can change post-vetting, yet the ecosystem still relies on scanne
