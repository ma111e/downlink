<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;

  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; flex: 1; min-height: 0; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;

  }

  .pill-btn {

  .pill-btn:hover { transform: scale(1.06); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }

  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }

  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }

<script>
window.__DL_ARTICLES = [{"n":3,"title":"Ollama Out-of-Bounds Read Vulnerability Allows Remote Process Memory Leak","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/ollama-out-of-bounds-read-vulnerability.html","time":"12:41","priority":"MUST READ","score":95,"tldr":"Ollama contains critical unpatched vulnerabilities that allow remote attackers to leak process memory or achieve persistent code execution, requiring immediate patching, auto-update disabling, and network isolation.","briefOverview":"\u003cp\u003eResearchers have disclosed a critical out-of-bounds read vulnerability in Ollama, tracked as CVE-2026-7482, that allows unauthenticated attackers to leak entire process memory. The flaw affects versions prior to 0.17.1 and stems from unsafe memory handling in the GGUF model loader during tensor quantization. Attackers can exploit this by uploading a crafted GGUF file with inflated tensor shapes to trigger the heap read. Once triggered, sensitive data such as API keys, environment variables, and conversation histories can be exfiltrated via the \u003ccode\u003e/api/push\u003c/code\u003e endpoint.\u003c/p\u003e\n\n\u003cp\u003eIn addition to this memory leak, two unpatched vulnerabilities in Ollama\u0026rsquo;s Windows client enable persistent remote code execution. These flaws combine a missing signature verification and a path traversal issue in the auto-update mechanism to drop malicious executables into the Windows Startup folder. Users are strongly advised to apply the latest patches, disable automatic updates on Windows, and restrict network exposure until official fixes are released.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers have identified a critical out-of-bounds read vulnerability in Ollama, designated as CVE-2026-7482 and codenamed Bleeding Llama. This flaw impacts over 300,000 servers globally and carries a CVSS score of 9.1. The vulnerability resides in the GGUF model loader and is triggered when the \u003ccode\u003e/api/create\u003c/code\u003e endpoint processes a maliciously crafted GGUF file.\u003c/p\u003e\n\n\u003cp\u003eDuring the quantization process, the server reads past the allocated heap buffer due to the framework\u0026rsquo;s reliance on the Go \u003ccode\u003eunsafe\u003c/code\u003e package. Successful exploitation allows an attacker to dump the entire process memory, exposing environment variables, API keys, system prompts, and concurrent user conversations. Researchers demonstrated that this leaked data could be exfiltrated by pushing the resulting model artifact to an external registry through the \u003ccode\u003e/api/push\u003c/code\u003e endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe impact is further amplified when Ollama is integrated with AI coding assistants like Claude Code, as all tool outputs are automatically flushed into the vulnerable heap. Separately, researchers at Striga detailed two unpatched vulnerabilities in Ollama\u0026rsquo;s Windows desktop client that chain together to achieve persistent remote code execution. The first flaw, CVE-2026-42248, involves a missing signature verification check that allows unsigned binaries to bypass integrity validation.\u003c/p\u003e\n\n\u003cp\u003eThe second flaw, CVE-2026-42249, introduces a path traversal vulnerability that stems from unsanitized HTTP response headers used to construct local installer paths. When combined with the client\u0026rsquo;s default auto-update polling mechanism, an attacker controlling an update server can redirect the installer to the Windows Startup folder. This results in silent, persistent code execution at the user privilege level upon every system login.\u003c/p\u003e\n\n\u003cp\u003eAffected Windows versions range from 0.12.10 through 0.17.5, with interim mitigations recommending the disablement of automatic updates and the removal of the Ollama shortcut from the Startup directory.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eVulnerability Overview and Impact\u003c/strong\u003e\nResearchers have disclosed a critical out-of-bounds read vulnerability in Ollama, tracked as CVE-2026-7482 and codenamed Bleeding Llama. The flaw affects versions prior to 0.17.1 and likely impacts over 300,000 servers worldwide. It carries a CVSS score of 9.1 and stems from unsafe memory handling within the GGUF model loader.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eExploitation Mechanics\u003c/strong\u003e\nThe vulnerability is triggered when the \u003ccode\u003e/api/create\u003c/code\u003e endpoint accepts an attacker-supplied GGUF file with inflated tensor offsets and sizes. During the quantization phase, the server reads past the allocated heap buffer in the \u003ccode\u003efs/ggml/gguf.go\u003c/code\u003e and \u003ccode\u003eserver/quantization.go\u003c/code\u003e modules. This behavior is enabled by Ollama\u0026rsquo;s use of the Go \u003ccode\u003eunsafe\u003c/code\u003e package, which bypasses standard memory safety guarantees.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eData Exfiltration and Amplified Risks\u003c/strong\u003e\nSuccessful exploitation results in a complete leak of the Ollama process memory. Attackers can extract sensitive information including environment variables, API keys, system prompts, and concurrent user conversation data. The exfiltration chain involves three steps: uploading a crafted GGUF file, triggering the out-of-bounds read via \u003ccode\u003e/api/create\u003c/code\u003e, and pushing the resulting model artifact to an external registry using \u003ccode\u003e/api/push\u003c/code\u003e. The risk is significantly heightened when Ollama is connected to AI coding tools like Claude Code, as all tool outputs and conversation data are automatically saved to the vulnerable heap.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eWindows Client Remote Code Execution Flaws\u003c/strong\u003e\nIn a separate disclosure, researchers at Striga outlined two unpatched vulnerabilities in Ollama\u0026rsquo;s Windows desktop client that chain into persistent remote code execution. The Windows client auto-starts on login, listens on 127.0.0.1:11434, and periodically polls for updates via the \u003ccode\u003e/api/update\u003c/code\u003e endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe first flaw, CVE-2026-42248, involves a missing signature verification check that does not validate update binaries prior to installation. The second flaw, CVE-2026-42249, introduces a path traversal vulnerability caused by unsanitized HTTP response headers being used to construct the local staging directory path.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAttack Chain and Persistence\u003c/strong\u003e\nWhen combined, these flaws allow an attacker controlling an update server to execute arbitrary code at the user privilege level. By overriding the \u003ccode\u003eOLLAMA_UPDATE_URL\u003c/code\u003e to point at a malicious server, an attacker can supply a crafted executable that bypasses signature checks and leverages path traversal to write directly to the Windows Startup folder. This results in persistent, silent code execution on every system login.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAffected Versions and Mitigations\u003c/strong\u003e\nThe Windows vulnerabilities affect versions 0.12.10 through 0.17.5, with researchers noting that installations up to version 0.22.0 remain vulnerable. Interim mitigations for the Windows client include disabling automatic updates and removing the Ollama shortcut from the \u003ccode\u003e%APPDATA%\\Microsoft\\Windows\\Start Menu\\Programs\\Startup\u003c/code\u003e directory.\u003c/p\u003e\n\n\u003cp\u003eFor all Ollama instances, security guidance emphasizes applying the latest patches, limiting network exposure, and isolating servers behind firewalls. Since the REST API lacks built-in authentication, deploying an authentication proxy or API gateway is strongly recommended to prevent unauthorized access.\u003c/p\u003e\n","keyPoints":["Ollama versions prior to 0.17.1 contain a critical out-of-bounds read vulnerability (CVE-2026-7482) that allows unauthenticated attackers to leak sensitive process memory, including API keys and conversation data, through crafted GGUF files.","Two unpatched vulnerabilities (CVE-2026-42248 and CVE-2026-42249) in Ollama's Windows update mechanism combine path traversal and missing signature verification to enable persistent remote code execution at the user privilege level.","The Windows update flaws affect versions 0.12.10 through 0.17.5, and researchers recommend disabling automatic updates and removing the Ollama shortcut from the Windows Startup folder as interim mitigations.","Security guidance for all instances includes applying the latest patches, limiting network exposure, isolating servers behind firewalls, and deploying authentication proxies since the REST API does not provide authentication out of the box."],"insights":["The memory leak exploit leverages Ollama's own /api/push endpoint to exfiltrate heap data to an external registry, bypassing the need for traditional network exfiltration tools.","Windows RCE persistence is driven by a default configuration setting (AutoUpdateEnabled on by default) combined with a missing signature check, allowing unsigned payloads to survive in the Startup folder without cleanup.","Integration with AI coding assistants like Claude Code drastically expands the breach impact, as all tool outputs and conversation data are automatically flushed into the vulnerable heap memory."],"referencedReports":[{"title":"Bleeding Llama: Critical Unauthenticated Memory Leak in Ollama","url":"https://www.cyera.com/research/bleeding-llama-critical-unauthenticated-memory-leak-in-ollama","publisher":"Cyera","context":"Cited as the entity that codenamed the vulnerability and provided the official CVE description.","category":"","primary":false},{"title":"Bleeding Llama: A Critical Memory Leak in the World's Most Popular Local AI Platform","url":"https://www.cyera.com/blog/bleeding-llama-a-critical-memory-leak-in-the-worlds-most-popular-local-ai-platform","publisher":"Cyera","context":"Linked as the source detailing the three-step exploitation chain and providing quotes from security researcher Dor Attias.","category":"","primary":false},{"title":"Ollama Windows Auto-Update RCE","url":"https://www.striga.ai/research/ollama-windows-auto-update-rce","publisher":"Striga","context":"Referenced as the research that detailed two unpatched Windows update vulnerabilities that chain into persistent remote code execution.","category":"","primary":false},{"title":"CVE-2026-42248","url":"https://cert.pl/en/posts/2026/04/CVE-2026-42248/","publisher":"CERT Polska","context":"Identified as the organization that took over the coordinated disclosure process for the Windows update flaws.","category":"","primary":false}],"body":"\u003cp\u003eResearchers have disclosed a critical out-of-bounds read vulnerability in Ollama, tracked as CVE-2026-7482, that allows unauthenticated attackers to leak entire process memory. The flaw affects versions prior to 0.17.1 and stems from unsafe memory handling in the GGUF model loader during tensor quantization. Attackers can exploit this by uploading a crafted GGUF file with inflated tensor shapes to trigger the heap read. Once triggered, sensitive data such as API keys, environment variables, and conversation histories can be exfiltrated via the \u003ccode\u003e/api/push\u003c/code\u003e endpoint.\u003c/p\u003e\n\n\u003cp\u003eIn addition to this memory leak, two unpatched vulnerabilities in Ollama\u0026rsquo;s Windows client enable persistent remote code execution. These flaws combine a missing signature verification and a path traversal issue in the auto-update mechanism to drop malicious executables into the Windows Startup folder. Users are strongly advised to apply the latest patches, disable automatic updates on Windows, and restrict network exposure until official fixes are released.\u003c/p\u003e\n"},{"n":2,"title":"Hackers abuse Google ads, Claude.ai chats to push Mac malware","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/hackers-abuse-google-ads-claudeai-chats-to-push-mac-malware/","time":"17:52","priority":"SHOULD READ","score":85,"tldr":"Attackers are abusing Google Ads and legitimate Claude.ai shared chats to trick macOS users into pasting malicious terminal commands that silently install credential-stealing malware. Users should only download AI tools from official sources and never paste unverified commands into their terminal.","briefOverview":"\u003cp\u003eAttackers are running an active malvertising campaign that abuses Google Ads and legitimate Claude.ai shared chats to distribute macOS malware. Users searching for Claude downloads encounter sponsored results that appear to link to the official claude.ai domain but actually direct them to weaponized shared chat pages. These chats mimic official installation guides and trick users into pasting base64 commands into their Terminal. The commands silently download and execute shell scripts that run entirely in memory. One variant performs regional profiling by checking for Russian or CIS keyboard layouts before delivering a payload via macOS scripting tools. A second variant bypasses profiling and immediately harvests browser credentials, cookies, and Keychain contents using the MacSync infostealer. The campaign uniquely leverages legitimate domains to bypass traditional phishing detection methods. Security researchers recommend downloading AI tools only from official sources and avoiding pasting unverified terminal commands.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA new malvertising campaign is actively targeting macOS users by abusing both Google Ads and legitimate Claude.ai shared chat features. The attack was initially identified by Trendyol Group security engineer Berk Albayrak, who documented the campaign on LinkedIn. Users searching for Claude downloads encounter sponsored search results that list claude.ai as the destination but lead to malicious shared chats. These chats impersonate official installation guides and are falsely attributed to Apple Support. The pages instruct victims to open Terminal and paste base64-encoded commands that silently download shell scripts from external domains. Researchers discovered two distinct variants of the attack that follow identical social engineering structures but utilize different infrastructure and payloads. The first variant checks the victim\u0026rsquo;s system for Russian or CIS-region keyboard layouts and exits silently if a match is found. Machines that pass this filter receive a profiling step that collects the external IP address, hostname, OS version, and locale before sending the data to the attacker. The script then executes a second-stage payload using macOS\u0026rsquo;s built-in osascript engine, achieving remote code execution without dropping traditional binaries on disk. The second variant skips the profiling phase entirely and immediately harvests browser credentials, cookies, and macOS Keychain contents. This data is packaged and exfiltrated to the attacker\u0026rsquo;s server, identifying the malware as a variant of the MacSync infostealer. Unlike traditional malvertising that relies on lookalike domains, this campaign points directly to Anthropic\u0026rsquo;s genuine claude.ai domain. The malicious instructions are hosted natively within Claude\u0026rsquo;s shared chat feature, rendering standard URL verification ineffective. Similar abuse of AI platform chats has been previously observed targeting ChatGPT and Grok users. Users are advised to navigate directly to claude.ai for official downloads and to treat any terminal commands from chat interfaces with extreme caution.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"campaign-overview-and-delivery-mechanism\"\u003eCampaign Overview and Delivery Mechanism\u003c/h2\u003e\n\n\u003cp\u003eAttackers are executing an active malvertising campaign that weaponizes both Google Ads and legitimate Claude.ai shared chats to distribute macOS malware. The delivery method flips traditional malvertising tactics by pointing sponsored search results directly to Anthropic\u0026rsquo;s genuine claude.ai domain rather than using lookalike phishing sites. Users searching for Claude downloads encounter these ads, which lead to malicious shared chat pages disguised as official installation guides. These chats are falsely attributed to Apple Support and employ a consistent social engineering approach across multiple variants.\u003c/p\u003e\n\n\u003ch2 id=\"technical-execution-and-payload-analysis\"\u003eTechnical Execution and Payload Analysis\u003c/h2\u003e\n\n\u003cp\u003eThe malicious chats instruct victims to open Terminal and paste base64-encoded commands that silently download shell scripts from external domains. Researchers identified two distinct variants utilizing different infrastructure but following identical structural patterns.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe first variant, documented by security engineer Berk Albayrak, retrieves an encoded script that functions as a MacSync infostealer variant. It immediately harvests browser credentials, cookies, and macOS Keychain contents before packaging and exfiltrating the data to the attacker\u0026rsquo;s server.\u003c/li\u003e\n\u003cli\u003eThe second variant, identified by BleepingComputer, incorporates a geographic filtering mechanism. It checks for Russian or CIS-region keyboard layouts and exits silently with a cis_blocked status ping if a match is detected. Only machines that pass this check proceed to a profiling step that collects the external IP address, hostname, OS version, and keyboard locale. This data is sent to the attacker before the script executes a second-stage payload via macOS\u0026rsquo;s built-in osascript engine. This method achieves remote code execution while running entirely in memory and leaving no traditional binary or application dropped on disk.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"researcher-findings-and-historical-context\"\u003eResearcher Findings and Historical Context\u003c/h2\u003e\n\n\u003cp\u003eThe campaign was first spotted by Berk Albayrak, a security engineer at Trendyol Group, who publicly shared his findings on LinkedIn. BleepingComputer researchers verified Albayrak\u0026rsquo;s initial discovery and located a second shared Claude chat conducting the same attack through entirely separate infrastructure. Both chats remained publicly accessible at the time of reporting. This technique mirrors previous campaigns that abused AI platform shared chats to target ChatGPT and Grok users. The use of legitimate domains and native chat features represents an evolution in malvertising that bypasses conventional domain-based threat detection.\u003c/p\u003e\n\n\u003ch2 id=\"mitigation-recommendations\"\u003eMitigation Recommendations\u003c/h2\u003e\n\n\u003cp\u003eUsers are strongly advised to navigate directly to claude.ai for downloading the native Claude app rather than clicking sponsored search results. The legitimate Claude Code CLI is available through official documentation and does not require pasting commands from a chat interface. Security best practices dictate treating any instructions requesting terminal command pasting with extreme caution, regardless of the perceived source. BleepingComputer contacted both Anthropic and Google for comment prior to publishing the findings.\u003c/p\u003e\n","keyPoints":["Attackers are abusing Google Ads and legitimate Claude.ai shared chats to distribute macOS malware disguised as official installation guides.","Victims are tricked into pasting base64 commands into the Terminal that silently download and execute shell scripts running entirely in memory.","One malware variant checks for specific regional keyboard layouts and profiles the victim before executing a payload via macOS's built-in scripting engine.","A second variant identified by researchers skips profiling and directly harvests browser credentials, cookies, and Keychain contents using the MacSync infostealer."],"insights":["The malware executes entirely in memory using macOS's native osascript engine, completely avoiding disk artifacts and traditional binary drops.","Attackers implement geographic filtering by checking for Russian or CIS-region keyboard layouts, silently aborting execution and pinging their server if a match is found.","The campaign bypasses domain-based phishing detection by hosting malicious instructions within the legitimate Claude.ai shared chat feature, rendering traditional URL verification useless.","Users can mitigate this threat by verifying that legitimate CLI tools are installed via official documentation rather than pasting terminal commands from chat interfaces."],"referencedReports":[],"body":"\u003cp\u003eAttackers are running an active malvertising campaign that abuses Google Ads and legitimate Claude.ai shared chats to distribute macOS malware. Users searching for Claude downloads encounter sponsored results that appear to link to the official claude.ai domain but actually direct them to weaponized shared chat pages. These chats mimic official installation guides and trick users into pasting base64 commands into their Terminal. The commands silently download and execute shell scripts that run entirely in memory. One variant performs regional profiling by checking for Russian or CIS keyboard layouts before delivering a payload via macOS scripting tools. A second variant bypasses profiling and immediately harvests browser credentials, cookies, and Keychain contents using the MacSync infostealer. The campaign uniquely leverages legitimate domains to bypass traditional phishing detection methods. Security researchers recommend downloading AI tools only from official sources and avoiding pasting unverified terminal commands.\u003c/p\u003e\n"},{"n":1,"title":"Police shut down reboot of Crimenetwork marketplace, arrest admin","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/police-shut-down-reboot-of-crimenetwork-marketplace-arrest-admin/","time":"14:16","priority":"MAY READ","score":65,"tldr":"German and Spanish authorities successfully shut down a rebooted Crimenetwork cybercrime marketplace and arrested its operator in Spain, seizing over €3.6 million in illicit revenue and extensive user data.","briefOverview":"\u003cp\u003eGerman authorities, working with Spanish police, have shut down a newly launched version of the Crimenetwork cybercrime marketplace. A 35-year-old German suspect was arrested at his residence in Mallorca, Spain, under a European arrest warrant. The rebooted platform quickly attracted 22,000 users and over 100 vendors within days of its launch. Police estimates indicate the site generated at least €3.6 million in illicit revenue before the seizure. Law enforcement also confiscated approximately €194,000 in illicit assets and secured extensive user and transaction data. The arrested administrator now faces charges under Section 127 of the German Criminal Code and Sections 29a and 30a of the German Narcotics Act. This action follows the December 2024 takedown of the original marketplace and the subsequent sentencing of its operator to over seven years in prison. German officials emphasized that the coordinated international effort successfully disrupted the cybercrime operation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGerman authorities have successfully dismantled a relaunch of the Crimenetwork cybercrime marketplace, which had generated over €3.6 million in revenue. The operation was coordinated by the Public Prosecutor\u0026rsquo;s Office in Frankfurt am Main, the Central Office for Combating Cybercrime, and the Federal Criminal Police Office.\u003c/p\u003e\n\n\u003cp\u003eFollowing the initial shutdown of the original platform in December 2024, a new version emerged on different infrastructure within days. A 35-year-old German man was arrested in Mallorca, Spain, by Spanish National Police under a European arrest warrant. He is accused of building and administering the new technical infrastructure and naming it Crimenetwork.\u003c/p\u003e\n\n\u003cp\u003eThe rebooted site quickly amassed 22,000 registered users and hosted more than 100 vendors offering illicit goods and services. Police seized approximately €194,000 in illicit assets and collected substantial transaction data for further investigations. The suspect now faces charges under Section 127 of the German Criminal Code and Sections 29a and 30a of the German Narcotics Act, both carrying potential prison sentences.\u003c/p\u003e\n\n\u003cp\u003eCarsten Meywirth, Director at the Federal Criminal Police, stated that the reboot has failed and that another administrator will answer to a German court. The original marketplace operator was previously sentenced to seven years and 10 months in prison and ordered to forfeit over €10 million in criminal proceeds. This ruling remains non-final, but the new enforcement action demonstrates consistent cross-border pressure on darknet cybercrime operations.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"operation-overview\"\u003eOperation Overview\u003c/h3\u003e\n\n\u003cp\u003eGerman authorities, in coordination with Spanish law enforcement, have shut down a newly launched version of the Crimenetwork cybercrime marketplace. The operation was led by the Public Prosecutor\u0026rsquo;s Office in Frankfurt am Main, the Central Office for Combating Cybercrime (ZIT), and the Federal Criminal Police Office (BKA). A special unit of the Spanish National Police executed the arrest under a European arrest warrant.\u003c/p\u003e\n\n\u003ch3 id=\"timeline-and-infrastructure-shift\"\u003eTimeline h3\u003e\n\n\u003cp\u003eCarsten Meywirth, Director at the Federal Criminal Police, confirmed that the reboot has failed. He emphasized that another administrator will answer before a German court. The BKA highlighted the consistent enforcement of laws across national borders in darknet environments. A seizure banner was placed on the portal to inform visitors of the shutdown. The operation demonstrates sustained pressure on cybercrime marketplaces and their rapid operational continuity.\u003c/p\u003e\n","keyPoints":["German authorities and Spanish police shut down a rebooted Crimenetwork cybercrime marketplace and arrested its 35-year-old German operator in Mallorca, Spain.","The rebooted platform quickly amassed 22,000 users and generated at least €3.6 million in revenue before being seized.","Police confiscated approximately €194,000 in illicit assets and obtained substantial user and transaction data for further investigations.","The arrested administrator faces charges under Section 127 of the German Criminal Code and Sections 29a and 30a of the German Narcotics Act."],"insights":["The new technical infrastructure was built and operational only days after the previous shutdown, showing rapid operational continuity by cybercrime administrators.","The platform generated at least €3.6 million and attracted 22,000 users within days, indicating high monetization velocity and sustained market demand.","Authorities used a European arrest warrant to coordinate a cross-border seizure in Spain, demonstrating effective multinational enforcement protocols."],"referencedReports":[],"body":"\u003cp\u003eGerman authorities, working with Spanish police, have shut down a newly launched version of the Crimenetwork cybercrime marketplace. A 35-year-old German suspect was arrested at his residence in Mallorca, Spain, under a European arrest warrant. The rebooted platform quickly attracted 22,000 users and over 100 vendors within days of its launch. Police estimates indicate the site generated at least €3.6 million in illicit revenue before the seizure. Law enforcement also confiscated approximately €194,000 in illicit assets and secured extensive user and transaction data. The arrested administrator now faces charges under Section 127 of the German Criminal Code and Sections 29a and 30a of the German Narcotics Act. This action follows the December 2024 takedown of the original marketplace and the subsequent sentencing of its operator to over seven years in prison. German officials emphasized that the coordinated international effort successfully disrupted the cybercrime operation.\u003c/p\u003e\n"}];

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
