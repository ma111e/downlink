\n\u003cp\u003eThe attack methodology begins with identity acquisition, where criminals obtain sufficient personal data to impersonate a legitimate borrower.\u003c/p\u003e\n\n\u003cp\u003eThey then assess the victim’s credit profile to determine loan eligibility before gathering additional details to prepare for knowledge-based authentication checks.\u003c/p\u003e\n\n\u003cp\u003eBy anticipating verification questions using publicly available data and leaked datasets, attackers treat identity checks as predictable steps rather than barriers.\u003c/p\u003e\n\n\u003cp\u003eOnce the application is submitted, the fraudster relies on the institution’s standard approval channels to release funds.\u003c/p\u003e\n\n\u003cp\u003eAfter approval, the operation shifts to a critical cash-out phase where funds are rapidly transferred through intermediary accounts.\u003c/p\u003e\n\n\u003cp\u003eThis monetization strategy deliberately mirrors normal financial behavior, using compressed timeframes to complete the cash-out before detection systems can intervene.\u003c/p\u003e\n\n\u003cp\u003eIndustry reporting indicates that auto lending fraud exposure is projected to reach $9.2 billion in 2025, with smaller lenders facing mounting pressure from these organized schemes.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview-of-the-threat\"\u003eOverview of the Threat\u003c/h2\u003e\n\n\u003cp\u003eThreat actors across underground forums and chat groups are increasingly crafting structured fraud methods aimed at exploiting weaknesses in financial institution work processes.\u003c/p\u003e\n\n\u003cp\u003eRather than relying on isolated or opportunistic scams, these discussions reflect an organized, process-driven approach that combines stolen identity data, social engineering, and knowledge of financial workflows.\u003c/p\u003e\n\n\u003cp\u003eThis methodology does not exploit software vulnerabilities but instead focuses on navigating legitimate onboarding and lending workflows as if the applicant were genuine.\u003c/p\u003e\n\n\u003ch2 id=\"the-fraud-workflow\"\u003eThe Fraud Workflow\u003c/h2\u003e\n\n\u003cp\u003eThe structured approach breaks down into a consistent eight-step process:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFirst, attackers acquire stolen personal data, including full identity details and background information sufficient for impersonation.\u003c/li\u003e\n\u003cli\u003eThey then review the victim’s financial profile to determine loan eligibility and approval likelihood.\u003c/li\u003e\n\u003cli\u003eNext, they gather additional details to anticipate and correctly answer identity verification questions.\u003c/li\u003e\n\u003cli\u003eAttackers select small to mid-sized credit unions based on perceived weaker verification processes and lower fraud detection maturity.\u003c/li\u003e\n\u003cli\u003eA loan application is then submitted using the stolen identity, ensuring data consistency across all fields.\u003c/li\u003e\n\u003cli\u003eThe application successfully passes knowledge-based authentication and standard checks.\u003c/li\u003e\n\u003cli\u003eFinally, the institution approves the loan and releases funds through standard channels.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"target-selection-and-verification-exploitation\"\u003eTarget Selection and Verification Exploitation\u003c/h2\u003e\n\n\u003cp\u003eSmall and mid-sized credit unions are specifically targeted because they are perceived as more reliant on traditional identity verification methods.\u003c/p\u003e\n\n\u003cp\u003eThese institutions are viewed as less equipped with advanced behavioral fraud detection and more likely to prioritize customer accessibility over strict controls.\u003c/p\u003e\n\n\u003cp\u003eA central component of the success of this method is bypassing knowledge-based authentication.\u003c/p\u003e\n\n\u003cp\u003eThese systems rely on questions derived from past addresses, loan history, and employment associations.\u003c/p\u003e\n\n\u003cp\u003eAttackers reconstruct this information using publicly available data, social media profiles, and previously leaked datasets.\u003c/p\u003e\n\n\u003cp\u003eThis allows them to anticipate verification checks in advance, turning a supposed security barrier into a predictable step.\u003c/p\u003e\n\n\u003ch2 id=\"cash-out-and-monetization\"\u003eCash-Out and Monetization\u003c/h2\u003e\n\n\u003cp\u003eOnce the loan is approved, the operation shifts to its most critical phase: turning access into money.\u003c/p\u003e\n\n\u003cp\u003eThe focus moves to speed and separation, as attackers quickly transfer funds away from the originating account.\u003c/p\u003e\n\n\u003cp\u003eThey often route money through intermediary accounts to create distance from the source and reduce traceability.\u003c/p\u003e\n\n\u003cp\u003eThis stage overlaps with broader fraud ecosystems, where access to additional accounts enables funds to be routed, split, or repositioned.\u003c/p\u003e\n\n\u003cp\u003eWhat makes this phase particularly effective is that each step mirrors normal financial behavior.\u003c/p\u003e\n\n\u003cp\u003eTransfers, withdrawals, and account activity are not inherently suspicious on their own.\u003c/p\u003e\n\n\u003cp\u003eInstead, the risk lies in how these actions are chained together within a compressed timeframe.\u003c/p\u003e\n\n\u003cp\u003eThis allows attackers to complete the cash-out before detection systems or manual reviews can intervene.\u003c/p\u003e\n\n\u003ch2 id=\"at-risk-groups-and-industry-context\"\u003eAt-Risk Groups and Industry Context\u003c/h2\u003e\n\n\u003cp\u003eThe method provides indirect insight into which individuals and institutions are most frequently targeted for identity theft.\u003c/p\u003e\n\n\u003cp\u003eIndividuals with established credit histories are highly valuable to attackers because they increase the likelihood of loan approval.\u003c/p\u003e\n\n\u003cp\u003eDigitally exposed individuals are also targeted, as their significant online presence may inadvertently expose personal details that assist in passing verification checks.\u003c/p\u003e\n\n\u003cp\u003eCustomers of smaller financial institutions face increased exposure if their institutions rely on less advanced fraud detection systems.\u003c/p\u003e\n\n\u003cp\u003eRecent industry reporting supports this targeting trend, projecting that auto lending fraud exposure will reach $9.2 billion in 2025.\u003c/p\u003e\n\n\u003cp\u003eSmaller and regional lenders are facing increasing pressure from these organized fraud schemes.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThis loan fraud method illustrates how financial fraud is evolving toward process exploitation rather than direct system targeting.\u003c/p\u003e\n\n\u003cp\u003eAttackers leverage identity, predictability, and institutional trust to achieve their goals.\u003c/p\u003e\n\n\u003cp\u003eAs these approaches become more structured and accessible, the line between legitimate activity and fraud continues to blur.\u003c/p\u003e\n\n\u003cp\u003eThis evolution makes detection more complex and requires a more adaptive defensive approach from financial institutions.\u003c/p\u003e\n","keyPoints":["Threat actors are using organized, process-driven loan fraud methods that exploit weaknesses in financial institution workflows rather than exploiting software vulnerabilities.","Small to mid-sized credit unions are specifically targeted because attackers perceive them as having weaker verification processes and lower fraud detection maturity.","Attackers successfully bypass identity verification checks by reconstructing knowledge-based authentication answers from publicly available data and previously leaked datasets.","Once a fraudulent loan is approved, criminals quickly move funds through intermediary accounts to reduce traceability and complete monetization before detection systems can intervene.","Individuals with established credit histories and significant online digital footprints are frequently targeted to provide the necessary data for impersonation and verification bypass."],"insights":["Attackers bypass knowledge-based authentication by pre-emptively aggregating leaked datasets and public social media data to reconstruct verification answers before submitting applications.","Fraud detection systems struggle to intercept cash-outs because criminals deliberately structure fund transfers to mirror normal financial behavior, relying on compressed timelines rather than triggering transactional alerts.","The attack exploits procedural design flaws in lending workflows rather than technical vulnerabilities, rendering traditional security controls ineffective against applicants who navigate onboarding processes legitimately.","Underground forums now host highly structured, replicable fraud methodologies, indicating that loan fraud has evolved from opportunistic scams into an organized, process-driven industrial operation."],"referencedReports":[{"title":"2025 Auto Lending Fraud Trends Report","url":"https://pointpredictive.com/press-releases/2025-auto-lending-fraud-trends-report-9-2-billion-industry-risk/","publisher":"Point Predictive","context":"The article cites this industry report to support the observation that smaller and regional lenders face increasing pressure from organized fraud schemes, projecting $9.2 billion in fraud exposure for 2025."}],"body":"\u003cp\u003eThreat actors across underground forums are deploying structured loan fraud methods that target the operational workflows of financial institutions. Rather than exploiting software vulnerabilities, these attackers navigate legitimate onboarding and lending processes using stolen identities. Smaller financial institutions, particularly small to mid-sized credit unions, are heavily targeted due to perceived gaps in verification systems and limited fraud prevention resources. The attack methodology begins with identity acquisition, where criminals obtain sufficient personal data to impersonate a legitimate borrower. They then assess the victim’s credit profile to determine loan eligibility before gathering additional details to prepare for knowledge-based authentication checks. By anticipating verification questions using publicly available data and leaked datasets, attackers treat identity checks as predictable steps rather than barriers. Once the application is submitted, the fraudster relies on the institution’s standard approval channels to release funds. After approval, the operation shifts to a critical cash-out phase where funds are rapidly transferred through intermediary accounts. This monetization strategy deliberately mirrors normal financial behavior, using compressed timeframes to complete the cash-out before detection systems can intervene. Industry reporting indicates that auto lending fraud exposure is projected to reach $9.2 billion in 2025, with smaller lenders facing mounting pressure from these organized schemes.\u003c/p\u003e\n"},{"n":3,"title":"Webinar: Why MSPs must rethink security and backup strategies","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/webinar-why-msps-must-rethink-security-and-backup-strategies/","time":"12:16","priority":"MAY READ","score":65,"group":null,"groupColor":null,"tldr":"MSPs must integrate SaaS backups and business continuity strategies alongside traditional security to ensure rapid recovery and cyber resilience against evolving AI-driven phishing and ransomware attacks.","briefOverview":"\u003cp\u003eCyberattacks are evolving at a pace that outpaces most managed service providers, with phishing now established as the primary entry point for compromises. The integration of artificial intelligence into attack campaigns has created highly personalized phishing efforts that traditional defenses struggle to detect and block. The most critical challenge for organizations often emerges after the initial breach, resulting in severe data loss, extended downtime, and complex recovery requirements. A live webinar on May 14, 2026, will explore these evolving threats and why MSPs must fundamentally rethink both security and recovery strategies. While prevention remains important, many MSPs incorrectly treat security and backup as separate functions, leaving gaps that attackers exploit after initial access. The session will examine how threats progress from AI-driven phishing to ransomware and data-loss events. It will also highlight how threat actors use trusted infrastructure and SaaS platforms to bypass existing controls. Attendees will learn why SaaS backups and a business continuity and disaster recovery plan are essential for cyber resilience. The webinar will demonstrate how leading MSPs combine prevention, detection, and rapid recovery to protect clients and maintain uptime. Joining the session will help strengthen both security posture and recovery capabilities to ensure outcomes remain under control even when attacks succeed.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCyberattacks are evolving faster than most managed service providers can adapt, with phishing now acting as the primary entry point for compromises. Attackers are increasingly leveraging artificial intelligence to generate highly personalized phishing campaigns that traditional defenses struggle to detect.\u003c/p\u003e\n\n\u003cp\u003eThe most significant challenge often arises after the initial breach, leaving organizations to manage data loss, downtime, and recovery. On May 14, 2026, experts from BleepingComputer and Kaseya will host a live webinar to explore these evolving threats.\u003c/p\u003e\n\n\u003cp\u003eThe session will examine how modern attacks unfold and why MSPs must fundamentally rethink both security and recovery strategies. While preventing attacks remains critical, the reality is that not every threat can be stopped in time.\u003c/p\u003e\n\n\u003cp\u003eMany MSPs still treat security and backup as separate functions, creating operational gaps that attackers exploit after gaining initial access. This webinar will trace how threats progress from AI-driven phishing and business email compromise to ransomware and data-loss events.\u003c/p\u003e\n\n\u003cp\u003eIt will also highlight how threat actors increasingly leverage trusted infrastructure and SaaS platforms to bypass traditional defenses. The session will emphasize why SaaS backups and a comprehensive business continuity and disaster recovery strategy are essential components of cyber resilience.\u003c/p\u003e\n\n\u003cp\u003eThese measures ensure organizations can recover quickly and minimize operational impact when incidents occur. Attendees will learn why AI-driven phishing and brand impersonation are outpacing traditional email security controls.\u003c/p\u003e\n\n\u003cp\u003eThe discussion will cover how attackers exploit trusted infrastructure and SaaS environments to circumvent existing defenses. It will also pinpoint where most MSP security strategies fail once an initial compromise is achieved.\u003c/p\u003e\n\n\u003cp\u003eFinally, the webinar will demonstrate how leading MSPs combine prevention, detection, and rapid recovery to protect clients and maintain uptime. Joining the session will help strengthen both security posture and recovery capabilities to ensure outcomes remain under control even when attacks succeed.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eCyberattacks are evolving at a pace that outpaces most managed service providers, with phishing now established as the primary entry point for compromises. The integration of artificial intelligence into attack campaigns has created highly personalized phishing efforts that traditional defenses struggle to detect and block. The most critical challenge for organizations often emerges after the initial breach, resulting in severe data loss, extended downtime, and complex recovery requirements.\u003c/p\u003e\n\n\u003ch3 id=\"webinar-overview\"\u003eWebinar Overview\u003c/h3\u003e\n\n\u003cp\u003eOn Thursday, May 14, 2026, at 2:00 PM Eastern Daylight Time, experts from BleepingComputer and Kaseya will host a live webinar to address these evolving threats. The session is designed to explore how modern attacks unfold and why MSPs must fundamentally rethink both their security and recovery strategies. The event will provide actionable insights into strengthening both defensive postures and recovery capabilities.\u003c/p\u003e\n\n\u003ch3 id=\"the-security-and-recovery-gap\"\u003eThe Security and Recovery Gap\u003c/h3\u003e\n\n\u003cp\u003eWhile preventing attacks remains a critical objective, the reality is that not every threat can be stopped in time. Many MSPs still treat security and backup as separate operational functions, creating structural gaps that attackers exploit after initial access. This session will examine how threats progress from AI-driven phishing and business email compromise to ransomware deployment and data-loss events. It will also highlight how threat actors increasingly leverage trusted infrastructure and SaaS platforms to bypass traditional perimeter defenses.\u003c/p\u003e\n\n\u003ch3 id=\"key-learning-objectives\"\u003eKey Learning Objectives\u003c/h3\u003e\n\n\u003cp\u003eDuring the session, attendees will gain a deeper understanding of several critical areas:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhy AI-driven phishing and brand impersonation are currently outpacing traditional email security controls.\u003c/li\u003e\n\u003cli\u003eHow attackers leverage trusted infrastructure and SaaS platforms to circumvent existing defenses.\u003c/li\u003e\n\u003cli\u003eWhere most MSP security strategies fail once an initial compromise is achieved.\u003c/li\u003e\n\u003cli\u003eWhy SaaS backups and a comprehensive business continuity and disaster recovery plan are critical layers of cyber resilience.\u003c/li\u003e\n\u003cli\u003eHow leading MSPs combine prevention, detection, and rapid recovery to protect clients and maintain operational uptime.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"strategic-takeaways\"\u003eStrategic Takeaways\u003c/h3\u003e\n\n\u003cp\u003eThe webinar emphasizes that SaaS backups and a robust business continuity and disaster recovery strategy are essential components of modern cyber resilience. These measures ensure organizations can recover quickly and minimize operational impact when incidents occur. Joining the session will help strengthen both security posture and recovery capabilities. This integrated approach helps ensure that even if an attack succeeds, the outcome remains under the MSP\u0026rsquo;s control.\u003c/p\u003e\n","keyPoints":["AI-driven phishing campaigns are increasingly bypassing traditional email security defenses.","Treating security and backup as separate functions creates critical gaps that attackers exploit after initial access.","Attackers are leveraging trusted infrastructure and SaaS platforms to bypass security controls and cause data loss.","Implementing SaaS backups and a business continuity and disaster recovery strategy is essential for maintaining cyber resilience.","MSPs must combine prevention, detection, and rapid recovery capabilities to protect clients and minimize downtime."],"insights":["Attackers are increasingly leveraging SaaS platforms and trusted infrastructure to bypass traditional perimeter defenses, requiring MSPs to secure application layers rather than just network boundaries.","Treating security and backup as siloed functions creates critical recovery gaps; MSPs must integrate SaaS backups directly into their BCDR strategy to ensure rapid post-breach continuity.","AI-driven phishing and brand impersonation are now outpacing traditional email security, making rapid recovery capabilities more critical than purely preventive detection measures."],"referencedReports":[],"body":"\u003cp\u003eCyberattacks are evolving at a pace that outpaces most managed service providers, with phishing now established as the primary entry point for compromises. The integration of artificial intelligence into attack campaigns has created highly personalized phishing efforts that traditional defenses struggle to detect and block. The most critical challenge for organizations often emerges after the initial breach, resulting in severe data loss, extended downtime, and complex recovery requirements. A live webinar on May 14, 2026, will explore these evolving threats and why MSPs must fundamentally rethink both security and recovery strategies. While prevention remains important, many MSPs incorrectly treat security and backup as separate functions, leaving gaps that attackers exploit after initial access. The session will examine how threats progress from AI-driven phishing to ransomware and data-loss events. It will also highlight how threat actors use trusted infrastructure and SaaS platforms to bypass existing controls. Attendees will learn why SaaS backups and a business continuity and disaster recovery plan are essential for cyber resilience. The webinar will demonstrate how leading MSPs combine prevention, detection, and rapid recovery to protect clients and maintain uptime. Joining the session will help strengthen both security posture and recovery capabilities to ensure outcomes remain under control even when attacks succeed.\u003c/p\u003e\n"},{"n":7,"title":"4th May – Threat Intelligence Report","source":"research.checkpoint.com","sourceColor":"#38bdf8","link":"https://research.checkpoint.com/2026/4th-may-threat-intelligence-report/","time":"13:49","priority":"MAY READ","score":0,"group":null,"groupColor":null,"tldr":"","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":[],"insights":[],"referencedReports":[],"body":""}];

  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];

});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function CardFront({ article }) {
  const srcColor  = article.sourceColor;

          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
