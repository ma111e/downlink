<style>

<script>
window.__DL_ARTICLES = [{"n":3,"title":"Oracle mitigates PeopleSoft zero-day exploited in data theft attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/oracle-mitigates-peoplesoft-zero-day-exploited-in-data-theft-attacks/","time":"19:39","priority":"MUST READ","score":98,"tldr":"Oracle issued emergency mitigations for a critical PeopleSoft PeopleTools zero-day, CVE-2026-35273, that enables unauthenticated remote code execution. The flaw is reportedly being actively exploited by ShinyHunters to steal data from PeopleSoft instances, so affected organizations should apply mitigations and check logs for related indicators.","briefOverview":"\u003cp\u003eOracle is warning customers about CVE-2026-35273, a critical zero-day vulnerability in Oracle PeopleSoft PeopleTools. The flaw is remotely exploitable without authentication and can result in remote code execution. Oracle says PeopleSoft Enterprise Applications customers may also be affected.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability has a CVSS base score of 9.8 and affects PeopleSoft Enterprise PeopleTools versions 8.61 and 8.62. Oracle has released emergency mitigations and says a patch is coming soon. The disclosure follows reports that a PeopleSoft zero-day was used in data theft attacks attributed to ShinyHunters.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer reported that CVE-2026-35273 is the zero-day exploited in those attacks, and Mandiant’s Charles Carmakal also confirmed active exploitation on LinkedIn. ShinyHunters claimed it used a “gadget chain” of old and zero-day flaws to breach PeopleSoft instances. The group allegedly stole data from 300 instances across more than 100 organizations.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOracle issued a security alert for CVE-2026-35273, a critical zero-day vulnerability in Oracle PeopleSoft PeopleTools. The flaw has a CVSS base score of 9.8 and is remotely exploitable without authentication. Oracle said successful exploitation may result in remote code execution.\u003c/p\u003e\n\n\u003cp\u003eOracle confirmed that the vulnerability affects PeopleSoft Enterprise PeopleTools versions 8.61 and 8.62. The company released emergency mitigations to address the flaw and said a patch is coming soon. Oracle also noted that PeopleSoft Enterprise Applications customers may be affected.\u003c/p\u003e\n\n\u003cp\u003eThe disclosure came after BleepingComputer reported that Oracle PeopleSoft servers had been targeted in data theft attacks involving a PeopleSoft zero-day. BleepingComputer later said it learned that CVE-2026-35273 is the zero-day exploited in those attacks. Charles Carmakal, CTO at Mandiant - Google Cloud, also confirmed on LinkedIn that the vulnerability is actively exploited and said Oracle had released mitigations.\u003c/p\u003e\n\n\u003cp\u003eThe attacks are attributed in the article to the ShinyHunters extortion gang, which BleepingComputer says confirmed it was behind them. ShinyHunters claimed it used a “gadget chain” of old and zero-day flaws to breach PeopleSoft instances. The group allegedly stole data from 300 instances across more than 100 organizations.\u003c/p\u003e\n\n\u003cp\u003eThe article says ShinyHunters is known for breaching cloud SaaS instances, CRMs, and enterprise platforms that store large volumes of corporate data. After gaining access, the group downloads data and demands a ransom to prevent public leaks. The article also links the group to high-profile attacks involving SnowFlake, Salesforce, and third-party integration providers over the past year.\u003c/p\u003e\n\n\u003cp\u003eCybersecurity researcher Michael R found exposed online directories containing attack-related tooling and shared IP addresses used in the attacks. The article advises organizations running Oracle PeopleSoft to analyze logs for connections from those IP addresses to determine whether they were targeted. BleepingComputer said it contacted Oracle with questions about the vulnerability and attacks but had not received a response.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOracle is warning about CVE-2026-35273, a critical zero-day vulnerability in Oracle PeopleSoft PeopleTools. The vulnerability allows unauthenticated remote code execution and has a CVSS base score of 9.8. Oracle said the vulnerability is remotely exploitable without authentication and that successful exploitation may result in remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe article reports that the flaw is being actively exploited in ShinyHunters data theft attacks. Although Oracle’s advisory does not state that the vulnerability is actively exploited, BleepingComputer says it learned that CVE-2026-35273 is the zero-day used in the attacks. Charles Carmakal, CTO at Mandiant - Google Cloud, also confirmed on LinkedIn that the vulnerability is actively exploited.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products\"\u003eAffected Products\u003c/h2\u003e\n\n\u003cp\u003eOracle confirmed that CVE-2026-35273 affects Oracle PeopleSoft Enterprise PeopleTools versions 8.61 and 8.62. Oracle also stated that PeopleSoft Enterprise Applications customers may be affected by the vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe affected product and versions identified in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOracle PeopleSoft Enterprise PeopleTools 8.61\u003c/li\u003e\n\u003cli\u003eOracle PeopleSoft Enterprise PeopleTools 8.62\u003c/li\u003e\n\u003cli\u003ePotentially affected Oracle PeopleSoft Enterprise Applications customers\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"oracle-response\"\u003eOracle Response\u003c/h2\u003e\n\n\u003cp\u003eOracle released emergency mitigations for CVE-2026-35273. The company said a patch is coming soon.\u003c/p\u003e\n\n\u003cp\u003eOracle’s advisory states that the vulnerability is remotely exploitable without authentication. It also states that successful exploitation may result in remote code execution.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer said it contacted Oracle with questions about the vulnerability and the attacks but had not received a response.\u003c/p\u003e\n\n\u003ch2 id=\"reported-exploitation\"\u003eReported Exploitation\u003c/h2\u003e\n\n\u003cp\u003eThe article says the Oracle disclosure followed BleepingComputer’s earlier report that ShinyHunters was exploiting a PeopleSoft zero-day vulnerability to breach instances and steal data. BleepingComputer later said it learned that CVE-2026-35273 is that zero-day.\u003c/p\u003e\n\n\u003cp\u003eCharles Carmakal of Mandiant - Google Cloud also confirmed on LinkedIn that CVE-2026-35273 is actively exploited. He also stated that Oracle released mitigations for the flaw.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-activity\"\u003eThreat Actor Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article attributes the data theft attacks to ShinyHunters. BleepingComputer says ShinyHunters confirmed that it was behind the attacks.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, ShinyHunters claimed it used a “gadget chain” of old and zero-day flaws to breach PeopleSoft instances. The threat actor allegedly stole data from 300 instances across more than 100 organizations.\u003c/p\u003e\n\n\u003cp\u003eThe article describes ShinyHunters as a well-known extortion gang that commonly breaches cloud SaaS instances, CRMs, and enterprise platforms that host large volumes of corporate data. After gaining access to an instance, the group downloads the data and demands a ransom to prevent public leaking.\u003c/p\u003e\n\n\u003cp\u003eThe article also says ShinyHunters has been linked to high-profile attacks targeting:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSnowFlake\u003c/li\u003e\n\u003cli\u003eSalesforce\u003c/li\u003e\n\u003cli\u003eThird-party integration providers\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-and-investigation-guidance\"\u003eIndicators and Investigation Guidance\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researcher Michael R found several exposed online directories containing attack-related tooling. The researcher shared IP addresses that were used in the attacks.\u003c/p\u003e\n\n\u003cp\u003eThe IP addresses listed in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e142.11.200[.]186\u003c/li\u003e\n\u003cli\u003e142.11.200[.]187\u003c/li\u003e\n\u003cli\u003e142.11.200[.]188\u003c/li\u003e\n\u003cli\u003e142.11.200[.]189\u003c/li\u003e\n\u003cli\u003e142.11.200[.]190\u003c/li\u003e\n\u003cli\u003e108.174.202[.]99\u003c/li\u003e\n\u003cli\u003e176.120.22[.]24\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article strongly advises organizations running Oracle PeopleSoft to analyze logs for connections from those IP addresses. The stated purpose is to determine whether they were targeted in the attacks.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability is significant because it is a critical unauthenticated remote code execution flaw in Oracle PeopleSoft PeopleTools. It affects PeopleTools versions 8.61 and 8.62 and may also impact PeopleSoft Enterprise Applications customers.\u003c/p\u003e\n\n\u003cp\u003eThe reported exploitation is tied to data theft and extortion activity. The article says ShinyHunters allegedly stole data from 300 instances across more than 100 organizations using a “gadget chain” of old and zero-day flaws.\u003c/p\u003e\n\n\u003cp\u003eOracle has made emergency mitigations available while a full patch is still pending. Organizations running Oracle PeopleSoft are advised in the article to apply the mitigations and review logs for the listed IP addresses.\u003c/p\u003e\n","keyPoints":["Oracle warned about CVE-2026-35273, a critical zero-day vulnerability in PeopleSoft PeopleTools that allows unauthenticated remote code execution and has a CVSS base score of 9.8.","Oracle confirmed that CVE-2026-35273 affects PeopleSoft Enterprise PeopleTools versions 8.61 and 8.62 and released emergency mitigations, with a patch coming soon.","BleepingComputer reported that CVE-2026-35273 is the zero-day exploited in ShinyHunters data theft attacks against Oracle PeopleSoft instances.","ShinyHunters claimed it used a “gadget chain” of old and zero-day flaws to breach PeopleSoft instances and allegedly stole data from 300 instances across more than 100 organizations.","Cybersecurity researcher Michael R found exposed online directories containing attack-related tooling and shared IP addresses that organizations running Oracle PeopleSoft are advised to check in their logs."],"insights":["Oracle’s advisory does not state that CVE-2026-35273 is actively exploited, but BleepingComputer and Mandiant’s Charles Carmakal both identified it as the PeopleSoft zero-day used in ongoing attacks.","The article provides seven specific IP addresses linked to the attacks, giving PeopleSoft operators concrete indicators to search for in logs: 142.11.200.186 through 142.11.200.190, 108.174.202.99, and 176.120.22.24.","Because Oracle has released emergency mitigations while a full patch is still pending, affected PeopleSoft Enterprise PeopleTools 8.61 and 8.62 customers have an interim defensive action available immediately.","ShinyHunters claimed it used a “gadget chain” combining old and zero-day flaws, indicating organizations should not limit reviews to CVE-2026-35273 alone when investigating possible PeopleSoft compromise."],"referencedReports":[{"title":"Oracle Security Alert for CVE-2026-35273","url":"https://support.oracle.com/support/?documentId=CPU187","publisher":"Oracle","context":"The article cites Oracle’s advisory and emergency mitigations for the PeopleSoft PeopleTools zero-day vulnerability CVE-2026-35273.","category":"advisory","primary":true}],"body":"\u003cp\u003eOracle is warning customers about CVE-2026-35273, a critical zero-day vulnerability in Oracle PeopleSoft PeopleTools. The flaw is remotely exploitable without authentication and can result in remote code execution. Oracle says PeopleSoft Enterprise Applications customers may also be affected.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability has a CVSS base score of 9.8 and affects PeopleSoft Enterprise PeopleTools versions 8.61 and 8.62. Oracle has released emergency mitigations and says a patch is coming soon. The disclosure follows reports that a PeopleSoft zero-day was used in data theft attacks attributed to ShinyHunters.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer reported that CVE-2026-35273 is the zero-day exploited in those attacks, and Mandiant’s Charles Carmakal also confirmed active exploitation on LinkedIn. ShinyHunters claimed it used a “gadget chain” of old and zero-day flaws to breach PeopleSoft instances. The group allegedly stole data from 300 instances across more than 100 organizations.\u003c/p\u003e\n"},{"n":4,"title":"ShinyHunters Exploits Oracle PeopleSoft Zero-Day (CVE-2026-35273) to Breach Universities","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/shinyhunters-exploits-oracle-peoplesoft.html","time":"20:29","priority":"MUST READ","score":96,"tldr":"ShinyHunters exploited a zero-day remote code execution flaw in Oracle PeopleSoft to breach universities and steal sensitive data before Oracle disclosed the issue. Organizations running PeopleSoft should immediately restrict or disable exposed PSEMHUB and related endpoints, apply available patches, and hunt for signs of compromise.","briefOverview":"\u003cp\u003eShinyHunters exploited an unpatched Oracle PeopleSoft flaw, CVE-2026-35273, to breach enterprise systems, steal data, and demand payment to keep it private. Google Mandiant attributes the activity to UNC6240 and says it occurred between May 27 and June 9. Oracle published its advisory on June 10, meaning the bug was a zero-day during the reported campaign.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-35273 is a remote code execution vulnerability in PeopleSoft Enterprise PeopleTools rated 9.8 out of 10. It requires no login or user interaction and can be exploited over HTTP when the Environment Management Hub is reachable from the network. Oracle lists PeopleTools 8.61 and 8.62 as affected and says earlier unsupported versions are probably vulnerable as well.\u003c/p\u003e\n\n\u003cp\u003eMandiant notified more than 100 organizations with vulnerable endpoints, 68% of which were in higher education, mostly in the United States. The University of Nottingham is a confirmed victim, with Have I Been Pwned counting about 455,000 unique email addresses in the leaked data set. Oracle’s guidance is to disable or remove the Environment Management Hub where possible, or block external access to specific PSEMHUB and PSIGW endpoints.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reports that the ShinyHunters extortion crew exploited a zero-day in Oracle PeopleSoft to compromise enterprise systems, steal data, and pressure victims for payment. Google Mandiant attributes the campaign to UNC6240 and places the activity between May 27 and June 9. Oracle did not publish its advisory for CVE-2026-35273 until June 10, so the flaw was unpatched throughout the observed activity.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-35273 is described as a 9.8-rated remote code execution bug in PeopleSoft Enterprise PeopleTools. The flaw requires no authentication and no user interaction, only HTTP network access to the affected service. The vulnerable area is the Updates Environment Management component behind the Environment Management Hub, also referred to as PSEMHUB.\u003c/p\u003e\n\n\u003cp\u003eOracle lists PeopleTools 8.61 and 8.62 as affected and says earlier unsupported versions are probably vulnerable too. The advisory credits researchers from TrendAI Zero Day Initiative and TrendAI Research for the report. The article says Oracle’s patch availability details are behind a support login and that whether a full fix is broadly available is unclear, while current guidance focuses on mitigation.\u003c/p\u003e\n\n\u003cp\u003eOperational details emerged because the attackers left their own infrastructure exposed. Researcher @nahamike01 publicly flagged open directories, and Mandiant examined five sequential IP addresses running Python’s SimpleHTTP server on port 8888. The exposed files included shared bash history, custom MeshCentral remote-management agents disguised as Microsoft Azure binaries, and a lateral-movement script.\u003c/p\u003e\n\n\u003cp\u003eThe agents connected to azurenetfiles.net, a domain chosen to resemble Azure NetApp Files. The lateral-movement script used SSH with hardcoded usernames and passwords against internal hosts from /etc/hosts and dropped a marker file into PeopleSoft directories. Command history showed data compressed with zstd and an outbound SSH connection to the server hosting the public mirror of the ShinyHunters leak site.\u003c/p\u003e\n\n\u003cp\u003eMandiant notified more than 100 organizations whose IPs matched vulnerable endpoints, with 68% in higher education and most in the United States. The University of Nottingham is one confirmed victim, and Have I Been Pwned counted about 455,000 unique email addresses in the leaked set, along with names, addresses, phone numbers, passport numbers, and details on ethnicity and disabilities. Oracle advises disabling or removing the Environment Management Hub or blocking external access to /PSEMHUB/*, especially /PSEMHUB/hub, and /PSIGW/HttpListeningConnector.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that ShinyHunters exploited an unpatched Oracle PeopleSoft vulnerability, CVE-2026-35273, to breach enterprise systems, steal data, and demand payment to keep the information private. Google Mandiant attributes the activity to UNC6240 and dates it between May 27 and June 9. Oracle published its advisory on June 10, meaning the flaw was a zero-day for the entire period described by Mandiant.\u003c/p\u003e\n\n\u003cp\u003eThe campaign hit universities hardest. Mandiant notified more than 100 organizations whose IP addresses matched vulnerable endpoints, and 68% were in higher education, mostly in the United States. Some organizations blocked the activity, while others were compromised and had data posted to the ShinyHunters leak site.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-and-affected-product\"\u003eVulnerability and affected product\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-35273 is a remote code execution vulnerability in Oracle PeopleSoft Enterprise PeopleTools. The article states that it is rated 9.8 out of 10 and requires no login and no user interaction. Exploitation requires network access over HTTP and can result in takeover of the server.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is located in the Updates Environment Management component, which sits behind the Environment Management Hub, also known as PSEMHUB. Oracle lists PeopleTools 8.61 and 8.62 as affected and says earlier unsupported versions are probably vulnerable too. Oracle credits researchers from TrendAI Zero Day Initiative and TrendAI Research for reporting the issue.\u003c/p\u003e\n\n\u003cp\u003eThe exposure described in the article applies to PeopleSoft deployments where the Environment Management Hub is reachable from outside. The article says the immediate action for such deployments is to lock those endpoints down.\u003c/p\u003e\n\n\u003ch2 id=\"attribution-and-timing\"\u003eAttribution and timing\u003c/h2\u003e\n\n\u003cp\u003eGoogle Mandiant attributes the campaign to the group it tracks as UNC6240, identified in the article as ShinyHunters. Mandiant CTO Charles Carmakal confirmed that the bug is being exploited in the wild. The article notes that Oracle has not said whether it has observed exploitation.\u003c/p\u003e\n\n\u003cp\u003eMandiant dates the activity from May 27 to June 9. Oracle’s advisory appeared on June 10, after the observed activity window. Because of that timing, the article describes the vulnerability as a zero-day during the campaign.\u003c/p\u003e\n\n\u003ch2 id=\"attacker-infrastructure-and-tooling\"\u003eAttacker infrastructure and tooling\u003c/h2\u003e\n\n\u003cp\u003eThe article says operational details became public because the attackers left their own infrastructure exposed. Researcher @nahamike01 publicly flagged open directories, after which Mandiant triaged five sequential IP addresses running Python’s SimpleHTTP server on port 8888.\u003c/p\u003e\n\n\u003cp\u003eThose exposed servers contained staging files, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA shared \u003ccode\u003e.bash_history\u003c/code\u003e file.\u003c/li\u003e\n\u003cli\u003eCustom MeshCentral remote-management agents disguised as Microsoft Azure binaries.\u003c/li\u003e\n\u003cli\u003eA lateral-movement script.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe MeshCentral agents called home to a command-and-control server at \u003ccode\u003eazurenetfiles.net\u003c/code\u003e. The article says the domain was selected to look like Azure NetApp Files.\u003c/p\u003e\n\n\u003ch2 id=\"lateral-movement-and-data-handling\"\u003eLateral movement and data handling\u003c/h2\u003e\n\n\u003cp\u003eThe lateral-movement script was named \u003ccode\u003e[victim]_fanout.sh\u003c/code\u003e. According to the article, it spreads over SSH by spraying a hardcoded list of usernames and passwords against internal hosts pulled from \u003ccode\u003e/etc/hosts\u003c/code\u003e. It then drops a marker file named \u003ccode\u003eREADME-IF-YOU-SEE-THIS-YOUVE-BEEN-HACKED.TXT\u003c/code\u003e into PeopleSoft directories.\u003c/p\u003e\n\n\u003cp\u003eThe command history showed data being compressed with \u003ccode\u003ezstd\u003c/code\u003e. It also showed an outbound SSH connection to the server hosting the public mirror of the ShinyHunters leak site.\u003c/p\u003e\n\n\u003ch2 id=\"victims-and-impact\"\u003eVictims and impact\u003c/h2\u003e\n\n\u003cp\u003eMandiant notified more than 100 organizations whose IP addresses matched vulnerable endpoints. The article states that 68% were in higher education, most of them in the United States. Some organizations blocked the activity, while others were compromised and had data posted to the leak site.\u003c/p\u003e\n\n\u003cp\u003eThe University of Nottingham is identified as one of the first confirmed victims. Have I Been Pwned counted about 455,000 unique email addresses in the leaked set. The data covered current students and alumni and included names, addresses, phone numbers, passport numbers, and details on ethnicity and disabilities.\u003c/p\u003e\n\n\u003cp\u003eThe University of Nottingham confirmed the breach. The article also states that ShinyHunters says victim outreach has only just started and that it has not posted most of the organizations it claims, so more names are likely.\u003c/p\u003e\n\n\u003ch2 id=\"mitigation-guidance\"\u003eMitigation guidance\u003c/h2\u003e\n\n\u003cp\u003eOracle’s guidance is to disable the Environment Management Hub service on multi-server setups. For single-server setups, Oracle advises removing the PSEMHUB application outright. If neither option is possible, organizations should block external access to \u003ccode\u003e/PSEMHUB/*\u003c/code\u003e, especially \u003ccode\u003e/PSEMHUB/hub\u003c/code\u003e, and \u003ccode\u003e/PSIGW/HttpListeningConnector\u003c/code\u003e at the perimeter.\u003c/p\u003e\n\n\u003cp\u003eMandiant warns that WAF body-inspection rules alone are not sufficient because they can be bypassed. The article also notes that restricting these endpoints does not break normal user sessions. Organizations are advised to apply Oracle’s update for the relevant PeopleTools version once they confirm it is available in My Oracle Support.\u003c/p\u003e\n\n\u003ch2 id=\"hunting-guidance-and-indicators\"\u003eHunting guidance and indicators\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several signs organizations should look for when checking for compromise:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWebLogic access logs showing external POST requests to \u003ccode\u003e/PSEMHUB/hub\u003c/code\u003e or \u003ccode\u003e/PSIGW/HttpListeningConnector\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eUnexpected \u003ccode\u003e.jsp\u003c/code\u003e files under the \u003ccode\u003ePSEMHUB.war\u003c/code\u003e web application directory.\u003c/li\u003e\n\u003cli\u003eOdd folders named \u003ccode\u003elogs\u003c/code\u003e, \u003ccode\u003epersistantstorage\u003c/code\u003e, or \u003ccode\u003escratchpad\u003c/code\u003e under PSEMHUB paths.\u003c/li\u003e\n\u003cli\u003eRecently changed \u003ccode\u003e.xml\u003c/code\u003e files under the web document root’s \u003ccode\u003eenvmetadata/data/environment\u003c/code\u003e directory.\u003c/li\u003e\n\u003cli\u003eOutbound SMB traffic on port 445 from PeopleSoft hosts to external destinations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article explains that the XML files can be abused for XMLDecoder persistence that triggers on the next restart. It also says the exploit chain may use outbound SMB traffic to capture machine-account NetNTLM hashes.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article frames the campaign as notable because ShinyHunters has recently focused on vishing, stolen tokens, and weak access controls against SaaS and education platforms. Examples cited include Salesforce customers and Canvas. In contrast, a server-side zero-day in on-premises ERP software represents a different method aimed at the same data-rich targets.\u003c/p\u003e\n\n\u003cp\u003eThe article closes by saying the open question is whether this was a one-off borrowed zero-day or the start of ShinyHunters moving into ERP exploitation.\u003c/p\u003e\n","keyPoints":["Google Mandiant attributes the Oracle PeopleSoft exploitation campaign to ShinyHunters, tracked as UNC6240, and dates the activity between May 27 and June 9.","CVE-2026-35273 is a 9.8-rated remote code execution flaw in Oracle PeopleSoft Enterprise PeopleTools that requires no login or user interaction and can be exploited over HTTP.","Mandiant notified more than 100 organizations with vulnerable endpoints, and 68% of them were in higher education, mostly in the United States.","The University of Nottingham confirmed a breach, and Have I Been Pwned counted about 455,000 unique email addresses in the leaked data set.","Oracle advised disabling or removing the Environment Management Hub service, or blocking external access to /PSEMHUB/* and /PSIGW/HttpListeningConnector if disabling is not possible."],"insights":["Mandiant warned that WAF body-inspection rules alone are insufficient because they can be bypassed, while restricting the exposed PeopleSoft endpoints does not break normal user sessions.","The attackers exposed their own staging infrastructure, allowing researchers to recover operational details such as shared bash history, disguised MeshCentral agents, and a lateral-movement script.","The lateral-movement script used hardcoded username and password spraying over SSH against internal hosts from /etc/hosts, indicating defenders should review internal SSH authentication attempts from PeopleSoft systems.","Recently modified XML files under envmetadata/data/environment are a notable persistence indicator because they can be abused for XMLDecoder persistence that triggers on the next restart.","Outbound SMB traffic on port 445 from PeopleSoft hosts to external destinations is a specific hunting signal because the exploit chain may use it to capture machine-account NetNTLM hashes."],"referencedReports":[{"title":"ShinyHunters Targets Education Sector Using Oracle Exploit","url":"https://cloud.google.com/blog/topics/threat-intelligence/shinyhunters-targets-education-sector-oracle-exploit/","publisher":"Google Mandiant","context":"The article cites Mandiant’s threat intelligence analysis for attribution to UNC6240, campaign timing, victim notification, attacker infrastructure, tooling, and hunting guidance.","category":"research","primary":true},{"title":"Oracle Security Alert Advisory - CVE-2026-35273","url":"https://www.oracle.com/security-alerts/alert-cve-2026-35273.html","publisher":"Oracle","context":"The article references Oracle’s advisory for the affected PeopleSoft Enterprise PeopleTools versions, severity, exposure details, and mitigation guidance.","category":"advisory","primary":true}],"body":"\u003cp\u003eShinyHunters exploited an unpatched Oracle PeopleSoft flaw, CVE-2026-35273, to breach enterprise systems, steal data, and demand payment to keep it private. Google Mandiant attributes the activity to UNC6240 and says it occurred between May 27 and June 9. Oracle published its advisory on June 10, meaning the bug was a zero-day during the reported campaign.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-35273 is a remote code execution vulnerability in PeopleSoft Enterprise PeopleTools rated 9.8 out of 10. It requires no login or user interaction and can be exploited over HTTP when the Environment Management Hub is reachable from the network. Oracle lists PeopleTools 8.61 and 8.62 as affected and says earlier unsupported versions are probably vulnerable as well.\u003c/p\u003e\n\n\u003cp\u003eMandiant notified more than 100 organizations with vulnerable endpoints, 68% of which were in higher education, mostly in the United States. The University of Nottingham is a confirmed victim, with Have I Been Pwned counting about 455,000 unique email addresses in the leaked data set. Oracle’s guidance is to disable or remove the Environment Management Hub where possible, or block external access to specific PSEMHUB and PSIGW endpoints.\u003c/p\u003e\n"},{"n":2,"title":"A tale of two eras","source":"blog.talosintelligence.com","sourceColorIdx":6,"link":"https://blog.talosintelligence.com/a-tale-of-two-eras/","time":"18:00","priority":"MAY READ","score":40,"tldr":"Talos argues that AI-driven zero-day discovery is accelerating too fast for traditional patch-first security to keep up. Organizations should focus on resilience through MFA, hardening, segmentation, behavioral detection, and tested incident response.","briefOverview":"\u003cp\u003eThis Threat Source newsletter centers on Talos’ warning that AI-driven vulnerability discovery has outpaced human patching capabilities. It cites a blog by Yuri Kramarz arguing that frontier AI models can autonomously discover and exploit zero-days in minutes. The article says this has collapsed the traditional vulnerability lifecycle and made patch-reliant security strategies insufficient.\u003c/p\u003e\n\n\u003cp\u003eThe key recommendation is to adopt a fallback model rooted in foundational security practices rather than relying only on vulnerability management. Talos advises enforcing MFA, hardening devices with CIS benchmarks, and using strict network segmentation to limit an attacker’s blast radius. It also recommends behavioral-based EDR, NDR, and XDR, along with penetration testing and purple team exercises to validate controls and incident response playbooks.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also rounds up major security headlines, including a Check Point VPN bug under attack by Qilin, Anthropic’s Claude Fable 5 launch, Microsoft zero-day fixes, WhatsApp’s allegations against NSO, and a Linux nf_tables use-after-free issue. It lists recent Talos content, upcoming events, and prevalent malware files observed in Talos telemetry.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThis edition of the Threat Source newsletter opens with a personal reflection on older communication and computing devices, including a Handspring Visor and walkie talkies. The anecdote is used to introduce the idea that unprotected communications can be intercepted, with the author joking that people should use encrypted channels if they do not want others listening in. The main security focus then shifts to AI-driven vulnerability discovery and defensive resilience.\u003c/p\u003e\n\n\u003cp\u003eThe central item is a Talos blog by Yuri Kramarz about security in what the newsletter calls a hyper-accelerated threat environment. According to the article, AI-driven vulnerability discovery has completely outpaced human patching capabilities. It states that frontier AI models can autonomously discover and exploit zero-days in minutes, causing the traditional vulnerability lifecycle to collapse.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter argues that speed has become a major multiplier in the traditional risk equation. It says that when an AI can uncover a decades-old zero-day and write an exploit for it in minutes, relying only on vulnerability management is a losing strategy. Talos frames the new measure of security as the ability to absorb, detect, and survive the initial blow, rather than just preventing exploitation.\u003c/p\u003e\n\n\u003cp\u003eTalos recommends that organizations stop treating basic security controls as optional compliance checkboxes. The advised controls include enforcing MFA everywhere, hardening devices with CIS benchmarks, and implementing strict network segmentation to reduce an attacker’s blast radius. The article also says hardened systems only slow attackers down, so defenders should use behavioral-based EDR, NDR, and XDR to catch post-exploitation activity missed by signatures.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter’s headline roundup includes several separate security developments. These include CISA giving U.S. federal agencies three days to fix a Check Point VPN-related bug under attack by Qilin, Anthropic launching Claude Fable 5 with cybersecurity guardrails, Microsoft fixing two high-severity zero-days, WhatsApp accusing NSO of violating a no-hacking court order, and a Linux nf_tables use-after-free issue caused by a faulty character. The issue also highlights additional Talos content, upcoming Cisco Connect Germany, Black Hat USA, and DEF CON 34 appearances, and four prevalent malware files from Talos telemetry.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThis Threat Source newsletter combines a personal introduction about older technology with a security-focused discussion of AI-driven vulnerability discovery. The author recalls using devices such as a Handspring Visor and walkie talkies, including an anecdote about a walkie talkie capturing a child’s voice on an open channel. The story is used to make a light point about interception of communications and the value of encrypted channels.\u003c/p\u003e\n\n\u003cp\u003eThe main substantive focus is Talos’ argument that the vulnerability management lifecycle has been disrupted by AI. The newsletter points readers to a blog by Talos’ Yuri Kramarz, which it says highlights how AI-driven vulnerability discovery has outpaced human patching capabilities. The article describes a security environment where frontier AI models can autonomously discover and exploit zero-days in minutes.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe core message is that organizations can no longer rely on patching alone as their main defensive strategy. The article states that the traditional vulnerability lifecycle has collapsed because AI can discover and exploit zero-days far faster than humans can patch systems. Talos argues that defenders need to assume some exploitation will get through and prepare their environments to absorb, detect, and survive initial compromise.\u003c/p\u003e\n\n\u003ch2 id=\"ai-accelerated-vulnerability-discovery\"\u003eAI-Accelerated Vulnerability Discovery\u003c/h2\u003e\n\n\u003cp\u003eThe newsletter says speed is the “new, terrifying multiplier” in the traditional risk equation. It gives the example of an AI uncovering a decades-old zero-day and writing an exploit for it in minutes. In that scenario, relying solely on vulnerability management is described as a losing game.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this as a shift in what security programs should measure. Prevention remains important, but the newsletter says the true measure of security is now how well an environment can handle the initial blow. This includes absorbing impact, detecting post-exploitation activity, and surviving compromise attempts.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-defensive-model\"\u003eRecommended Defensive Model\u003c/h2\u003e\n\n\u003cp\u003eTalos recommends abandoning patch-reliant strategies in favor of a three-stage fallback model built on foundational security principles. The newsletter does not provide the full model in detail, but it lists several concrete controls organizations should prioritize.\u003c/p\u003e\n\n\u003cp\u003eRecommended measures include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnforcing multi-factor authentication everywhere.\u003c/li\u003e\n\u003cli\u003eHardening devices using CIS benchmarks.\u003c/li\u003e\n\u003cli\u003eImplementing strict network segmentation to limit an attacker’s blast radius.\u003c/li\u003e\n\u003cli\u003eDeploying behavioral-based EDR, NDR, and XDR to catch post-exploitation activity that signatures miss.\u003c/li\u003e\n\u003cli\u003eValidating controls through penetration testing and purple team exercises.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that basic security controls should not be treated as optional compliance checkboxes. It also states that hardened systems only slow attackers down, which is why behavioral detection and validation exercises are necessary.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-response-emphasis\"\u003eDetection and Response Emphasis\u003c/h2\u003e\n\n\u003cp\u003eThe newsletter highlights the importance of behavioral-based detection tools because signature-based methods may miss post-exploitation activity. It specifically names EDR, NDR, and XDR as technologies defenders should use to identify behavior after exploitation occurs. The article positions these tools as part of the response to an environment where prevention alone is not enough.\u003c/p\u003e\n\n\u003cp\u003eTalos also recommends penetration testing and purple team exercises. The stated purpose is to validate security controls and make incident response playbooks become “muscle memory” rather than wishful thinking. This reinforces the article’s broader emphasis on resilience and operational readiness.\u003c/p\u003e\n\n\u003ch2 id=\"security-headlines-mentioned\"\u003eSecurity Headlines Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe newsletter includes a roundup of major security headlines from the week:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCISA gave U.S. federal agencies three days to fix a Check Point VPN-related bug that was under attack by Qilin.\u003c/li\u003e\n\u003cli\u003eAnthropic launched Claude Fable 5, described as a Mythos-class AI model with cybersecurity guardrails.\u003c/li\u003e\n\u003cli\u003eMicrosoft fixed two high-severity zero-days disclosed by a researcher, including a local privilege escalation issue that could be chained with another vulnerability to gain SYSTEM rights.\u003c/li\u003e\n\u003cli\u003eWhatsApp said spyware maker NSO violated a permanent injunction and reported learning of a social engineering attack attempting to trick users into clicking malicious links.\u003c/li\u003e\n\u003cli\u003eArs Technica reported a high-severity Linux vulnerability in nf_tables caused by a single faulty exclamation point, resulting in a use-after-free issue.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese headlines are presented as brief external news items rather than the central topic of the newsletter.\u003c/p\u003e\n\n\u003ch2 id=\"additional-talos-content\"\u003eAdditional Talos Content\u003c/h2\u003e\n\n\u003cp\u003eThe newsletter also promotes additional Talos material. One item explains how Cisco Talos Threat Hunting uses hypothesis-driven methods and multi-domain telemetry correlation to find stealthy threats operating below automated detection thresholds. Another features Tony Giandomenico discussing Talos Threat Hunting, major product launches, and Ironman triathlons.\u003c/p\u003e\n\n\u003cp\u003eA Talos Takes episode is also highlighted, focusing on David Bianco’s open-source project EvidenceForge. The episode discusses why traditional synthetic data may fall short and how EvidenceForge generates coherent attack stories for better detection.\u003c/p\u003e\n\n\u003ch2 id=\"events\"\u003eEvents\u003c/h2\u003e\n\n\u003cp\u003eThe article lists upcoming events where Talos can be found:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco Connect Germany on June 16 in Frankfurt, Germany.\u003c/li\u003e\n\u003cli\u003eBlack Hat USA from Aug. 1 to Aug. 6 in Las Vegas, Nevada.\u003c/li\u003e\n\u003cli\u003eDEF CON 34 from Aug. 6 to Aug. 9 in Las Vegas, Nevada.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"malware-telemetry\"\u003eMalware Telemetry\u003c/h2\u003e\n\n\u003cp\u003eThe newsletter ends with prevalent malware files observed in Talos telemetry over the past week. It provides SHA256 and MD5 hashes, Talos reputation links, example filenames, and detection names.\u003c/p\u003e\n\n\u003cp\u003eThe listed detections are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWin.Worm.Coinminer::1201, associated with the example filename VID001.exe.\u003c/li\u003e\n\u003cli\u003eW32.Injector:Gen.21ie.1201, associated with the example filename d4aa3e7010220ad1b458fac17039c274_63_Exe.exe.\u003c/li\u003e\n\u003cli\u003eWin.Dropper.Miner::95.sbx.tg, associated with the example filename d4aa3e7010220ad1b458fac17039c274_62_Exe.exe.\u003c/li\u003e\n\u003cli\u003eWin.Tool.Procpatcher::1201, associated with the example filename sample.exe.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central significance is its argument that AI has changed the speed and practicality of vulnerability exploitation. Talos presents this as a reason to prioritize resilience, segmentation, hardening, behavioral detection, and practiced response. The newsletter’s main security message is that patching remains important, but organizations must prepare for exploitation that happens faster than traditional patch cycles can address.\u003c/p\u003e\n","keyPoints":["Talos highlighted Yuri Kramarz’s blog arguing that AI-driven vulnerability discovery has outpaced human patching capabilities.","The article says frontier AI models can autonomously discover and exploit zero-days in minutes, collapsing the traditional vulnerability lifecycle.","Talos recommends organizations move away from patch-reliant strategies and adopt a three-stage fallback model based on foundational security principles.","Recommended controls include enforcing MFA, hardening devices with CIS benchmarks, and implementing strict network segmentation to limit an attacker’s blast radius.","The article advises deploying behavioral-based EDR, NDR, and XDR and validating controls through penetration testing and purple team exercises."],"insights":["The article reframes security success as the ability to absorb, detect, and survive initial compromise rather than simply preventing exploitation.","Talos treats foundational controls such as MFA, CIS-based hardening, and segmentation as operational necessities in an AI-accelerated threat environment, not compliance tasks.","The article emphasizes that hardened systems are expected only to slow attackers down, so behavioral EDR, NDR, and XDR are needed to catch activity that signature-based detections may miss.","Talos argues that penetration testing and purple team exercises are necessary to turn incident response playbooks into practiced operational routines."],"referencedReports":[],"body":"\u003cp\u003eThis Threat Source newsletter centers on Talos’ warning that AI-driven vulnerability discovery has outpaced human patching capabilities. It cites a blog by Yuri Kramarz arguing that frontier AI models can autonomously discover and exploit zero-days in minutes. The article says this has collapsed the traditional vulnerability lifecycle and made patch-reliant security strategies insufficient.\u003c/p\u003e\n\n\u003cp\u003eThe key recommendation is to adopt a fallback model rooted in foundational security practices rather than relying only on vulnerability management. Talos advises enforcing MFA, hardening devices with CIS benchmarks, and using strict network segmentation to limit an attacker’s blast radius. It also recommends behavioral-based EDR, NDR, and XDR, along with penetration testing and purple team exercises to validate controls and incident response playbooks.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also rounds up major security headlines, including a Check Point VPN bug under attack by Qilin, Anthropic’s Claude Fable 5 launch, Microsoft zero-day fixes, WhatsApp’s allegations against NSO, and a Linux nf_tables use-after-free issue. It lists recent Talos content, upcoming events, and prevalent malware files observed in Talos telemetry.\u003c/p\u003e\n"},{"n":1,"title":"Permiso Wins Best Identity Threat Detection and Response (ITDR) Platform at the 2026 Cybersecurity Stars Awards","source":"permiso.io","sourceColorIdx":8,"link":"https://permiso.io/blog/best-itdr-platform-hacker-news-cybersecurity-stars-2026","time":"18:15","priority":"MAY READ","score":25,"tldr":"Permiso announced that its Identity Threat Detection and Response platform won Best ITDR Platform at the 2026 Cybersecurity Stars Awards presented by The Hacker News.","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Permiso announced that it won Best Identity Threat Detection and Response Platform at the 2026 Cybersecurity Stars Awards.","The 2026 Cybersecurity Stars Awards are presented by The Hacker News.","The award recognized Permiso’s Identity Threat Detection and Response platform."],"insights":["The article does not provide technical details about Permiso’s ITDR platform, such as detection methods, integrations, or response capabilities.","The announcement cites The Hacker News and the Cybersecurity Stars Awards as the source of recognition, with links provided to the award winner page and awards site."],"referencedReports":[],"body":""}];

<script type="text/babel">

function priorityColor(p) {

  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

  constructor(props) { super(props); this.state = { error: null }; }

}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

          <option value="pastel">PASTEL</option>
          
        </select>

        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
