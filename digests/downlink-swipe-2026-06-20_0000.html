<script type="application/json" id="dl-articles">[{"n":1,"title":"Microsoft links Mastra AI supply chain attack to North Korean hackers","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/microsoft-links-mastra-ai-supply-chain-attack-to-north-korean-hackers/","time":"14:09","priority":"MUST READ","score":94,"tldr":"Microsoft says North Korea’s Sapphire Sleet hackers hijacked an npm maintainer account to push malicious updates to more than 140 Mastra AI packages. The attack installed a cross-platform infostealer aimed at stealing developer credentials, API keys, tokens, and cryptocurrency wallets.","briefOverview":"\u003cp\u003eMicrosoft attributed a recent Mastra AI supply chain attack to Sapphire Sleet, a North Korean state actor also known as BlueNoroff. The attack compromised more than 140 npm packages after threat actors hijacked the npm maintainer account “ehindero,” which had publishing privileges across the Mastra package environment. Microsoft said the group primarily targets the financial sector and has previously been linked to cryptocurrency theft campaigns, malicious browser extensions, fake job offers, and software supply chain compromises.\u003c/p\u003e\n\n\u003cp\u003eThe attackers used the compromised account to publish malicious updates for packages in the @mastra scope that added a dependency named “easy-day-js,” a typosquat of the legitimate dayjs JavaScript library. When installed, the dependency ran a post-install hook that executed an obfuscated dropper, disabled TLS certificate verification, contacted attacker-controlled command-and-control infrastructure, downloaded a second-stage payload, and ran it as a detached hidden process. The second-stage payload was a cross-platform information stealer targeting Windows, Linux, and macOS systems.\u003c/p\u003e\n\n\u003cp\u003eThe malware collected host information, browser histories, installed applications, and running processes, and checked for 166 cryptocurrency wallet browser extensions including MetaMask, Phantom, Coinbase Wallet, Binance Wallet, and TronLink. It used operating-system-specific persistence methods such as Windows Registry Run keys, macOS LaunchAgents, and Linux systemd services. Microsoft said systems that contacted the attackers’ command-and-control servers showed follow-on activity associated with Sapphire Sleet, including a PowerShell backdoor, Microsoft Defender exclusions, and a malicious Windows service granting SYSTEM privileges.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Microsoft attributed the Mastra AI supply chain attack that compromised more than 140 npm packages to the North Korean hacking group Sapphire Sleet, also known as BlueNoroff.","The attackers compromised the npm maintainer account “ehindero” and used it to publish malicious updates for packages in the @mastra scope.","The malicious updates injected a dependency named “easy-day-js,” a typosquat of the legitimate dayjs JavaScript library, which executed a post-install hook on installation.","The second-stage payload was a cross-platform information stealer targeting Windows, Linux, and macOS systems, with checks for 166 cryptocurrency wallet browser extensions.","Microsoft said systems that communicated with the attackers’ command-and-control servers showed follow-on activity using tactics previously associated with Sapphire Sleet, including a PowerShell backdoor and additional persistence mechanisms."],"insights":["A single compromised npm maintainer account with broad publishing privileges was enough to affect more than 140 packages across the Mastra package environment.","The malicious dependency name “easy-day-js” closely imitated the legitimate dayjs library, showing the attackers relied on a package-name lookalike inside a trusted update chain.","The malware was built to persist differently on Windows, macOS, and Linux, indicating the campaign was designed to compromise developers across multiple operating systems.","The implant checked for 166 cryptocurrency wallet browser extensions, making cryptocurrency theft a central and highly targeted objective of the payload.","Microsoft linked the campaign to Sapphire Sleet not only through initial malware behavior but also through follow-on activity, including a PowerShell backdoor and C2 infrastructure used in prior campaigns."],"referencedReports":[{"title":"Postinstall payload inside Mastra npm supply chain compromise","url":"https://www.microsoft.com/en-us/security/blog/2026/06/17/postinstall-payload-inside-mastra-npm-supply-chain-compromise/","publisher":"Microsoft","context":"The article cites Microsoft’s June 19 update as the source for attributing the Mastra AI npm supply chain attack to Sapphire Sleet and describing the malware behavior.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft attributed a recent Mastra AI supply chain attack to Sapphire Sleet, a North Korean state actor also known as BlueNoroff. The attack compromised more than 140 npm packages after threat actors hijacked the npm maintainer account “ehindero,” which had publishing privileges across the Mastra package environment. Microsoft said the group primarily targets the financial sector and has previously been linked to cryptocurrency theft campaigns, malicious browser extensions, fake job offers, and software supply chain compromises.\u003c/p\u003e\n\n\u003cp\u003eThe attackers used the compromised account to publish malicious updates for packages in the @mastra scope that added a dependency named “easy-day-js,” a typosquat of the legitimate dayjs JavaScript library. When installed, the dependency ran a post-install hook that executed an obfuscated dropper, disabled TLS certificate verification, contacted attacker-controlled command-and-control infrastructure, downloaded a second-stage payload, and ran it as a detached hidden process. The second-stage payload was a cross-platform information stealer targeting Windows, Linux, and macOS systems.\u003c/p\u003e\n\n\u003cp\u003eThe malware collected host information, browser histories, installed applications, and running processes, and checked for 166 cryptocurrency wallet browser extensions including MetaMask, Phantom, Coinbase Wallet, Binance Wallet, and TronLink. It used operating-system-specific persistence methods such as Windows Registry Run keys, macOS LaunchAgents, and Linux systemd services. Microsoft said systems that contacted the attackers’ command-and-control servers showed follow-on activity associated with Sapphire Sleet, including a PowerShell backdoor, Microsoft Defender exclusions, and a malicious Windows service granting SYSTEM privileges.\u003c/p\u003e\n"},{"n":3,"title":"Hackers Exploit Gravity SMTP WordPress Plugin Bug to Expose API Keys","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/hackers-exploit-gravity-smtp-wordpress.html","time":"09:56","priority":"MUST READ","score":92,"tldr":"Attackers are actively exploiting CVE-2026-4020 in the Gravity SMTP WordPress plugin to expose system details and email service API keys from vulnerable sites. Site owners should update to version 2.1.5 or later and rotate any configured third-party email credentials.","briefOverview":"\u003cp\u003eThreat actors are exploiting a recently patched flaw in Gravity SMTP, a WordPress plugin installed on about 100,000 sites. The vulnerability is tracked as CVE-2026-4020 and has a CVSS score of 5.3. It can allow unauthenticated attackers to extract sensitive data, including configuration data, API keys, secrets, and OAuth tokens used by the plugin’s email integrations.\u003c/p\u003e\n\n\u003cp\u003eWordfence said the issue is caused by a REST API endpoint at /wp-json/gravitysmtp/v1/tests/mock-data with a permission callback that always returns true. When the ?page=gravitysmtp-settings query parameter is appended, the endpoint can return about 365 KB of JSON containing the full System Report. The exposed data can include PHP and web server versions, WordPress and plugin details, database information, and API keys or tokens for services such as Amazon SES, Google, Mailjet, Resend, and Zoho.\u003c/p\u003e\n\n\u003cp\u003eA patch has been released in Gravity SMTP version 2.1.5. Wordfence said it has blocked more than 17 million exploit attempts targeting CVE-2026-4020, with activity starting in early May 2026 and spiking around June 6, 2026. Site owners running vulnerable versions with third-party email integrations are advised to assume compromise, update the plugin, rotate credentials, and review server logs for suspicious requests to the affected API endpoint.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Threat actors are exploiting CVE-2026-4020, a medium-severity information disclosure flaw in the Gravity SMTP WordPress plugin installed on about 100,000 sites.","The flaw involves a REST API endpoint at /wp-json/gravitysmtp/v1/tests/mock-data whose permission callback allows unauthenticated access.","Attackers can use the vulnerable endpoint with the ?page=gravitysmtp-settings query parameter to retrieve sensitive data such as system details, plugin versions, database information, and API keys or tokens for email integrations.","Wordfence said it has blocked more than 17 million exploit attempts targeting CVE-2026-4020, with activity spiking around June 6, 2026.","The vulnerability has been patched in Gravity SMTP version 2.1.5, and affected site owners are advised to update and rotate third-party email credentials."],"insights":["Site owners using vulnerable Gravity SMTP versions with third-party email integrations are advised to assume compromise and rotate credentials after updating, because live API credentials may already have been exposed.","The exploit requires only an unauthenticated HTTP GET request with the ?page=gravitysmtp-settings query parameter, making log review for that specific endpoint and parameter combination especially actionable.","The exposed data is not limited to email credentials; the returned system report can include software versions, active plugins, theme details, database table names, and configuration information that can help attackers plan follow-on attacks.","Wordfence observed exploitation beginning at the start of May 2026 before a sharp spike around June 6, 2026, so investigations should review logs from at least early May onward."],"referencedReports":[{"title":"Attackers Actively Exploiting Sensitive Information Exposure Vulnerability in Gravity SMTP Plugin","url":"https://www.wordfence.com/blog/2026/06/attackers-actively-exploiting-sensitive-information-exposure-vulnerability-in-gravity-smtp-plugin/","publisher":"Wordfence","context":"The article cites Wordfence’s analysis explaining the vulnerable REST API endpoint, exposed data, exploitation activity, and remediation guidance.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors are exploiting a recently patched flaw in Gravity SMTP, a WordPress plugin installed on about 100,000 sites. The vulnerability is tracked as CVE-2026-4020 and has a CVSS score of 5.3. It can allow unauthenticated attackers to extract sensitive data, including configuration data, API keys, secrets, and OAuth tokens used by the plugin’s email integrations.\u003c/p\u003e\n\n\u003cp\u003eWordfence said the issue is caused by a REST API endpoint at /wp-json/gravitysmtp/v1/tests/mock-data with a permission callback that always returns true. When the ?page=gravitysmtp-settings query parameter is appended, the endpoint can return about 365 KB of JSON containing the full System Report. The exposed data can include PHP and web server versions, WordPress and plugin details, database information, and API keys or tokens for services such as Amazon SES, Google, Mailjet, Resend, and Zoho.\u003c/p\u003e\n\n\u003cp\u003eA patch has been released in Gravity SMTP version 2.1.5. Wordfence said it has blocked more than 17 million exploit attempts targeting CVE-2026-4020, with activity starting in early May 2026 and spiking around June 6, 2026. Site owners running vulnerable versions with third-party email integrations are advised to assume compromise, update the plugin, rotate credentials, and review server logs for suspicious requests to the affected API endpoint.\u003c/p\u003e\n"},{"n":2,"title":"New Prinz Eugen ransomware prioritizes recent files for encryption","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-prinz-eugen-ransomware-prioritizes-recent-files-for-encryption/","time":"15:23","priority":"SHOULD READ","score":82,"tldr":"Prinz Eugen is a new hands-on ransomware operation that likely uses stolen RDP credentials and legitimate RMM tools, then encrypts the most recently modified files first to maximize disruption. The malware leaves no ransom note, self-deletes, and moves extortion communications out-of-band to reduce forensic traces.","briefOverview":"\u003cp\u003eA new ransomware operation named Prinz Eugen prioritizes recently modified files for encryption and leaves no ransom note on infected systems. Threatdown, Malwarebytes’ enterprise cybersecurity arm, found that the attackers use a hands-on-keyboard style and prefer legitimate remote monitoring and management software and living-off-the-land tools. Researchers said initial access is likely achieved through stolen RDP credentials, followed by manual download and execution of the main payload, \u003ccode\u003eservertool.exe\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eIn an investigated incident, the attackers used the RemotePC RMM tool and a backdoor administrator account for persistence. Prinz Eugen is not currently operating as ransomware-as-a-service, and its developers are not currently recruiting affiliates. Its data leak site lists three victims, but Threatdown identified at least five victims and said the Standard Bank attacker demanded 1 BTC and was refused.\u003c/p\u003e\n\n\u003cp\u003eThe Go-based encryptor recursively scans directories with no depth limit or exclusions and encrypts virtually every file except those with the \u003ccode\u003e.prinzeugen\u003c/code\u003e extension. It uses ChaCha20-Poly1305 encryption, a 32-byte master key, random initialization vectors for each file, and key derivation based on Argon2id, SHA-256, and HKDF-SHA256. Threatdown said the lack of a ransom note can reduce forensic artifacts and move ransom communications to email, phone contact, or dark-web victim portals.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Threatdown found that the new Prinz Eugen ransomware operation prioritizes recently modified files for encryption and does not leave a ransom note on infected systems.","Researchers said initial access is likely achieved through stolen RDP credentials, followed by manual download and execution of the main payload, servertool.exe.","In one investigated incident, attackers used the RemotePC remote monitoring and management tool and a backdoor administrator account for persistence.","The Go-based encryptor recursively scans directories without a depth limit or exclusions and encrypts virtually every file except those ending in .prinzeugen.","Threatdown identified at least five Prinz Eugen victims and said that in the Standard Bank breach the attacker demanded 1 BTC and was refused."],"insights":["Prinz Eugen’s choice to encrypt the most recently modified files first is an impact-focused strategy because those files are more likely to be actively used and business-critical.","The lack of a ransom note is intentional rather than an omission, as Threatdown says it reduces forensic artifacts and pushes ransom communication to email, phone contact, or dark-web victim portals.","The encryptor checks that a file can be decrypted before deleting the original when the --delete flag is used, showing the malware is designed to avoid corrupting files in a way that would prevent recovery after payment.","Prinz Eugen attempts to prevent key recovery by overwriting the encryption key with zeroes, forcing garbage collection, and self-deleting from disk."],"referencedReports":[{"title":"Prinz Eugen ransomware: a deep dive into a new Go-based encryptor","url":"https://www.threatdown.com/blog/prinz-eugen-ransomware-a-deep-dive-into-a-new-go-based-encryptor/","publisher":"Threatdown","context":"The article cites Threatdown researchers’ technical analysis of Prinz Eugen’s encryption behavior, lack of ransom note, and operational tactics.","category":"","primary":false}],"body":"\u003cp\u003eA new ransomware operation named Prinz Eugen prioritizes recently modified files for encryption and leaves no ransom note on infected systems. Threatdown, Malwarebytes’ enterprise cybersecurity arm, found that the attackers use a hands-on-keyboard style and prefer legitimate remote monitoring and management software and living-off-the-land tools. Researchers said initial access is likely achieved through stolen RDP credentials, followed by manual download and execution of the main payload, \u003ccode\u003eservertool.exe\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eIn an investigated incident, the attackers used the RemotePC RMM tool and a backdoor administrator account for persistence. Prinz Eugen is not currently operating as ransomware-as-a-service, and its developers are not currently recruiting affiliates. Its data leak site lists three victims, but Threatdown identified at least five victims and said the Standard Bank attacker demanded 1 BTC and was refused.\u003c/p\u003e\n\n\u003cp\u003eThe Go-based encryptor recursively scans directories with no depth limit or exclusions and encrypts virtually every file except those with the \u003ccode\u003e.prinzeugen\u003c/code\u003e extension. It uses ChaCha20-Poly1305 encryption, a 32-byte master key, random initialization vectors for each file, and key derivation based on Argon2id, SHA-256, and HKDF-SHA256. Threatdown said the lack of a ransom note can reduce forensic artifacts and move ransom communications to email, phone contact, or dark-web victim portals.\u003c/p\u003e\n"},{"n":4,"title":"Three Security Wrappers, One Redirect to a Google Docs Phishing Page","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/edgepilot-barracuda-wrapper-redirect-google-docs-credential-harvest","time":"11:00","priority":"SHOULD READ","score":82,"tldr":"A phishing email impersonating a document-sharing notification hid its credential-harvesting link behind EdgePilot, Barracuda LinkProtect, a throwaway redirect domain, and Google Docs, allowing trusted infrastructure to camouflage the attack. Despite failing SPF, DKIM, and DMARC, it reached the inbox because downstream trust in an intermediary gateway overrode the raw authentication failures.","briefOverview":"\u003cp\u003eIRONSCALES detected a credential-harvesting campaign in May 2026 targeting a mid-size equipment finance company. The email impersonated a document-sharing notification from “Jennifer Johnson” and referenced a company-specific aging report. The actual sender address was \u003ccode\u003edavidbr@bellnet[.]ca\u003c/code\u003e, a Canadian consumer ISP account with no connection to the target organization or document-sharing platform.\u003c/p\u003e\n\n\u003cp\u003eThe attack routed its payload link through three layers before reaching a Google Docs presentation. The chain used EdgePilot, Barracuda LinkProtect, the throwaway domain \u003ccode\u003esmstkart[.]com/bee\u003c/code\u003e, and then \u003ccode\u003edocs[.]google[.]com/presentation/d/e/...\u003c/code\u003e. The article states that legitimate link-protection services and Google Docs provided trusted-domain camouflage for the phishing payload.\u003c/p\u003e\n\n\u003cp\u003eThe message failed SPF, DKIM, and DMARC at the recipient’s Microsoft 365 tenant, but Microsoft still delivered it to the inbox with \u003ccode\u003eSCL=-1\u003c/code\u003e. AppRiver’s SecureTide gateway had logged the links as wrapped and returned a clean verdict before forwarding the message. Themis flagged the message at 84% confidence and auto-resolved it as phishing based on behavioral signals including a first-time sender, a consumer ISP address, a display-name mismatch, and an inconsistent communication pattern.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["IRONSCALES detected a credential-harvesting campaign in May 2026 that targeted a mid-size equipment finance company with a fake document-sharing notification.","The email used the display name “Jennifer Johnson,” but the actual sender address was davidbr@bellnet[.]ca, a Canadian consumer ISP account with no connection to the target organization or document-sharing platforms.","The payload link was routed through EdgePilot, Barracuda LinkProtect, the throwaway domain smstkart[.]com/bee, and then a Google Docs presentation.","The email failed SPF, DKIM, and DMARC at the recipient’s Microsoft 365 tenant, yet Microsoft delivered it to the inbox with SCL=-1.","Themis flagged the message at 84% confidence and auto-resolved it as phishing based on behavioral signals including a first-time sender, a consumer ISP address, a display-name mismatch, and an inconsistent communication pattern."],"insights":["Legitimate link-protection services can become camouflage when attackers place their own redirect infrastructure behind trusted wrapper domains.","A clean verdict from an upstream email gateway can create downstream trust even when Microsoft 365 later records SPF, DKIM, and DMARC failures.","URL reputation alone was insufficient in this case because the visible and terminal domains included trusted services such as EdgePilot, Barracuda LinkProtect, and Google Docs.","Behavioral signals such as first-time sender status, consumer ISP origin, display-name mismatch, and unusual communication patterns identified the phishing attempt when authentication and link checks did not."],"referencedReports":[],"body":"\u003cp\u003eIRONSCALES detected a credential-harvesting campaign in May 2026 targeting a mid-size equipment finance company. The email impersonated a document-sharing notification from “Jennifer Johnson” and referenced a company-specific aging report. The actual sender address was \u003ccode\u003edavidbr@bellnet[.]ca\u003c/code\u003e, a Canadian consumer ISP account with no connection to the target organization or document-sharing platform.\u003c/p\u003e\n\n\u003cp\u003eThe attack routed its payload link through three layers before reaching a Google Docs presentation. The chain used EdgePilot, Barracuda LinkProtect, the throwaway domain \u003ccode\u003esmstkart[.]com/bee\u003c/code\u003e, and then \u003ccode\u003edocs[.]google[.]com/presentation/d/e/...\u003c/code\u003e. The article states that legitimate link-protection services and Google Docs provided trusted-domain camouflage for the phishing payload.\u003c/p\u003e\n\n\u003cp\u003eThe message failed SPF, DKIM, and DMARC at the recipient’s Microsoft 365 tenant, but Microsoft still delivered it to the inbox with \u003ccode\u003eSCL=-1\u003c/code\u003e. AppRiver’s SecureTide gateway had logged the links as wrapped and returned a clean verdict before forwarding the message. Themis flagged the message at 84% confidence and auto-resolved it as phishing based on behavioral signals including a first-time sender, a consumer ISP address, a display-name mismatch, and an inconsistent communication pattern.\u003c/p\u003e\n"}]</script>
