<style>

window.__DL_ARTICLES = [{"n":1,"title":"Microsoft links Mastra AI supply chain attack to North Korean hackers","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/microsoft-links-mastra-ai-supply-chain-attack-to-north-korean-hackers/","time":"14:09","priority":"MUST READ","score":94,"tldr":"Microsoft says North Korea’s Sapphire Sleet hackers hijacked an npm maintainer account to push malicious updates to more than 140 Mastra AI packages. The attack installed a cross-platform infostealer aimed at stealing developer credentials, API keys, tokens, and cryptocurrency wallets.","briefOverview":"\u003cp\u003eMicrosoft attributed a recent Mastra AI supply chain attack to Sapphire Sleet, a North Korean state actor also known as BlueNoroff. The attack compromised more than 140 npm packages after threat actors hijacked the npm maintainer account “ehindero,” which had publishing privileges across the Mastra package environment. Microsoft said the group primarily targets the financial sector and has previously been linked to cryptocurrency theft campaigns, malicious browser extensions, fake job offers, and software supply chain compromises.\u003c/p\u003e\n\n\u003cp\u003eThe attackers used the compromised account to publish malicious updates for packages in the @mastra scope that added a dependency named “easy-day-js,” a typosquat of the legitimate dayjs JavaScript library. When installed, the dependency ran a post-install hook that executed an obfuscated dropper, disabled TLS certificate verification, contacted attacker-controlled command-and-control infrastructure, downloaded a second-stage payload, and ran it as a detached hidden process. The second-stage payload was a cross-platform information stealer targeting Windows, Linux, and macOS systems.\u003c/p\u003e\n\n\u003cp\u003eThe malware collected host information, browser histories, installed applications, and running processes, and checked for 166 cryptocurrency wallet browser extensions including MetaMask, Phantom, Coinbase Wallet, Binance Wallet, and TronLink. It used operating-system-specific persistence methods such as Windows Registry Run keys, macOS LaunchAgents, and Linux systemd services. Microsoft said systems that contacted the attackers’ command-and-control servers showed follow-on activity associated with Sapphire Sleet, including a PowerShell backdoor, Microsoft Defender exclusions, and a malicious Windows service granting SYSTEM privileges.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Microsoft attributed the Mastra AI supply chain attack that compromised more than 140 npm packages to the North Korean hacking group Sapphire Sleet, also known as BlueNoroff.","The attackers compromised the npm maintainer account “ehindero” and used it to publish malicious updates for packages in the @mastra scope.","The malicious updates injected a dependency named “easy-day-js,” a typosquat of the legitimate dayjs JavaScript library, which executed a post-install hook on installation.","The second-stage payload was a cross-platform information stealer targeting Windows, Linux, and macOS systems, with checks for 166 cryptocurrency wallet browser extensions.","Microsoft said systems that communicated with the attackers’ command-and-control servers showed follow-on activity using tactics previously associated with Sapphire Sleet, including a PowerShell backdoor and additional persistence mechanisms."],"insights":["A single compromised npm maintainer account with broad publishing privileges was enough to affect more than 140 packages across the Mastra package environment.","The malicious dependency name “easy-day-js” closely imitated the legitimate dayjs library, showing the attackers relied on a package-name lookalike inside a trusted update chain.","The malware was built to persist differently on Windows, macOS, and Linux, indicating the campaign was designed to compromise developers across multiple operating systems.","The implant checked for 166 cryptocurrency wallet browser extensions, making cryptocurrency theft a central and highly targeted objective of the payload.","Microsoft linked the campaign to Sapphire Sleet not only through initial malware behavior but also through follow-on activity, including a PowerShell backdoor and C2 infrastructure used in prior campaigns."],"referencedReports":[{"title":"Postinstall payload inside Mastra npm supply chain compromise","url":"https://www.microsoft.com/en-us/security/blog/2026/06/17/postinstall-payload-inside-mastra-npm-supply-chain-compromise/","publisher":"Microsoft","context":"The article cites Microsoft’s June 19 update as the source for attributing the Mastra AI npm supply chain attack to Sapphire Sleet and describing the malware behavior.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft attributed a recent Mastra AI supply chain attack to Sapphire Sleet, a North Korean state actor also known as BlueNoroff. The attack compromised more than 140 npm packages after threat actors hijacked the npm maintainer account “ehindero,” which had publishing privileges across the Mastra package environment. Microsoft said the group primarily targets the financial sector and has previously been linked to cryptocurrency theft campaigns, malicious browser extensions, fake job offers, and software supply chain compromises.\u003c/p\u003e\n\n\u003cp\u003eThe attackers used the compromised account to publish malicious updates for packages in the @mastra scope that added a dependency named “easy-day-js,” a typosquat of the legitimate dayjs JavaScript library. When installed, the dependency ran a post-install hook that executed an obfuscated dropper, disabled TLS certificate verification, contacted attacker-controlled command-and-control infrastructure, downloaded a second-stage payload, and ran it as a detached hidden process. The second-stage payload was a cross-platform information stealer targeting Windows, Linux, and macOS systems.\u003c/p\u003e\n\n\u003cp\u003eThe malware collected host information, browser histories, installed applications, and running processes, and checked for 166 cryptocurrency wallet browser extensions including MetaMask, Phantom, Coinbase Wallet, Binance Wallet, and TronLink. It used operating-system-specific persistence methods such as Windows Registry Run keys, macOS LaunchAgents, and Linux systemd services. Microsoft said systems that contacted the attackers’ command-and-control servers showed follow-on activity associated with Sapphire Sleet, including a PowerShell backdoor, Microsoft Defender exclusions, and a malicious Windows service granting SYSTEM privileges.\u003c/p\u003e\n"},{"n":3,"title":"Hackers Exploit Gravity SMTP WordPress Plugin Bug to Expose API Keys","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/hackers-exploit-gravity-smtp-wordpress.html","time":"09:56","priority":"MUST READ","score":92,"tldr":"Attackers are actively exploiting CVE-2026-4020 in the Gravity SMTP WordPress plugin to expose system details and email service API keys from vulnerable sites. Site owners should update to version 2.1.5 or later and rotate any configured third-party email credentials.","briefOverview":"\u003cp\u003eThreat actors are exploiting a recently patched flaw in Gravity SMTP, a WordPress plugin installed on about 100,000 sites. The vulnerability is tracked as CVE-2026-4020 and has a CVSS score of 5.3. It can allow unauthenticated attackers to extract sensitive data, including configuration data, API keys, secrets, and OAuth tokens used by the plugin’s email integrations.\u003c/p\u003e\n\n\u003cp\u003eWordfence said the issue is caused by a REST API endpoint at /wp-json/gravitysmtp/v1/tests/mock-data with a permission callback that always returns true. When the ?page=gravitysmtp-settings query parameter is appended, the endpoint can return about 365 KB of JSON containing the full System Report. The exposed data can include PHP and web server versions, WordPress and plugin details, database information, and API keys or tokens for services such as Amazon SES, Google, Mailjet, Resend, and Zoho.\u003c/p\u003e\n\n\u003cp\u003eA patch has been released in Gravity SMTP version 2.1.5. Wordfence said it has blocked more than 17 million exploit attempts targeting CVE-2026-4020, with activity starting in early May 2026 and spiking around June 6, 2026. Site owners running vulnerable versions with third-party email integrations are advised to assume compromise, update the plugin, rotate credentials, and review server logs for suspicious requests to the affected API endpoint.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Threat actors are exploiting CVE-2026-4020, a medium-severity information disclosure flaw in the Gravity SMTP WordPress plugin installed on about 100,000 sites.","The flaw involves a REST API endpoint at /wp-json/gravitysmtp/v1/tests/mock-data whose permission callback allows unauthenticated access.","Attackers can use the vulnerable endpoint with the ?page=gravitysmtp-settings query parameter to retrieve sensitive data such as system details, plugin versions, database information, and API keys or tokens for email integrations.","Wordfence said it has blocked more than 17 million exploit attempts targeting CVE-2026-4020, with activity spiking around June 6, 2026.","The vulnerability has been patched in Gravity SMTP version 2.1.5, and affected site owners are advised to update and rotate third-party email credentials."],"insights":["Site owners using vulnerable Gravity SMTP versions with third-party email integrations are advised to assume compromise and rotate credentials after updating, because live API credentials may already have been exposed.","The exploit requires only an unauthenticated HTTP GET request with the ?page=gravitysmtp-settings query parameter, making log review for that specific endpoint and parameter combination especially actionable.","The exposed data is not limited to email credentials; the returned system report can include software versions, active plugins, theme details, database table names, and configuration information that can help attackers plan follow-on attacks.","Wordfence observed exploitation beginning at the start of May 2026 before a sharp spike around June 6, 2026, so investigations should review logs from at least early May onward."],"referencedReports":[{"title":"Attackers Actively Exploiting Sensitive Information Exposure Vulnerability in Gravity SMTP Plugin","url":"https://www.wordfence.com/blog/2026/06/attackers-actively-exploiting-sensitive-information-exposure-vulnerability-in-gravity-smtp-plugin/","publisher":"Wordfence","context":"The article cites Wordfence’s analysis explaining the vulnerable REST API endpoint, exposed data, exploitation activity, and remediation guidance.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors are exploiting a recently patched flaw in Gravity SMTP, a WordPress plugin installed on about 100,000 sites. The vulnerability is tracked as CVE-2026-4020 and has a CVSS score of 5.3. It can allow unauthenticated attackers to extract sensitive data, including configuration data, API keys, secrets, and OAuth tokens used by the plugin’s email integrations.\u003c/p\u003e\n\n\u003cp\u003eWordfence said the issue is caused by a REST API endpoint at /wp-json/gravitysmtp/v1/tests/mock-data with a permission callback that always returns true. When the ?page=gravitysmtp-settings query parameter is appended, the endpoint can return about 365 KB of JSON containing the full System Report. The exposed data can include PHP and web server versions, WordPress and plugin details, database information, and API keys or tokens for services such as Amazon SES, Google, Mailjet, Resend, and Zoho.\u003c/p\u003e\n\n\u003cp\u003eA patch has been released in Gravity SMTP version 2.1.5. Wordfence said it has blocked more than 17 million exploit attempts targeting CVE-2026-4020, with activity starting in early May 2026 and spiking around June 6, 2026. Site owners running vulnerable versions with third-party email integrations are advised to assume compromise, update the plugin, rotate credentials, and review server logs for suspicious requests to the affected API endpoint.\u003c/p\u003e\n"},{"n":2,"title":"New Prinz Eugen ransomware prioritizes recent files for encryption","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-prinz-eugen-ransomware-prioritizes-recent-files-for-encryption/","time":"15:23","priority":"SHOULD READ","score":82,"tldr":"Prinz Eugen is a new hands-on ransomware operation that likely uses stolen RDP credentials and legitimate RMM tools, then encrypts the most recently modified files first to maximize disruption. The malware leaves no ransom note, self-deletes, and moves extortion communications out-of-band to reduce forensic traces.","briefOverview":"\u003cp\u003eA new ransomware operation named Prinz Eugen prioritizes recently modified files for encryption and leaves no ransom note on infected systems. Threatdown, Malwarebytes’ enterprise cybersecurity arm, found that the attackers use a hands-on-keyboard style and prefer legitimate remote monitoring and management software and living-off-the-land tools. Researchers said initial access is likely achieved through stolen RDP credentials, followed by manual download and execution of the main payload, \u003ccode\u003eservertool.exe\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eIn an investigated incident, the attackers used the RemotePC RMM tool and a backdoor administrator account for persistence. Prinz Eugen is not currently operating as ransomware-as-a-service, and its developers are not currently recruiting affiliates. Its data leak site lists three victims, but Threatdown identified at least five victims and said the Standard Bank attacker demanded 1 BTC and was refused.\u003c/p\u003e\n\n\u003cp\u003eThe Go-based encryptor recursively scans directories with no depth limit or exclusions and encrypts virtually every file except those with the \u003ccode\u003e.prinzeugen\u003c/code\u003e extension. It uses ChaCha20-Poly1305 encryption, a 32-byte master key, random initialization vectors for each file, and key derivation based on Argon2id, SHA-256, and HKDF-SHA256. Threatdown said the lack of a ransom note can reduce forensic artifacts and move ransom communications to email, phone contact, or dark-web victim portals.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Threatdown found that the new Prinz Eugen ransomware operation prioritizes recently modified files for encryption and does not leave a ransom note on infected systems.","Researchers said initial access is likely achieved through stolen RDP credentials, followed by manual download and execution of the main payload, servertool.exe.","In one investigated incident, attackers used the RemotePC remote monitoring and management tool and a backdoor administrator account for persistence.","The Go-based encryptor recursively scans directories without a depth limit or exclusions and encrypts virtually every file except those ending in .prinzeugen.","Threatdown identified at least five Prinz Eugen victims and said that in the Standard Bank breach the attacker demanded 1 BTC and was refused."],"insights":["Prinz Eugen’s choice to encrypt the most recently modified files first is an impact-focused strategy because those files are more likely to be actively used and business-critical.","The lack of a ransom note is intentional rather than an omission, as Threatdown says it reduces forensic artifacts and pushes ransom communication to email, phone contact, or dark-web victim portals.","The encryptor checks that a file can be decrypted before deleting the original when the --delete flag is used, showing the malware is designed to avoid corrupting files in a way that would prevent recovery after payment.","Prinz Eugen attempts to prevent key recovery by overwriting the encryption key with zeroes, forcing garbage collection, and self-deleting from disk."],"referencedReports":[{"title":"Prinz Eugen ransomware: a deep dive into a new Go-based encryptor","url":"https://www.threatdown.com/blog/prinz-eugen-ransomware-a-deep-dive-into-a-new-go-based-encryptor/","publisher":"Threatdown","context":"The article cites Threatdown researchers’ technical analysis of Prinz Eugen’s encryption behavior, lack of ransom note, and operational tactics.","category":"","primary":false}],"body":"\u003cp\u003eA new ransomware operation named Prinz Eugen prioritizes recently modified files for encryption and leaves no ransom note on infected systems. Threatdown, Malwarebytes’ enterprise cybersecurity arm, found that the attackers use a hands-on-keyboard style and prefer legitimate remote monitoring and management software and living-off-the-land tools. Researchers said initial access is likely achieved through stolen RDP credentials, followed by manual download and execution of the main payload, \u003ccode\u003eservertool.exe\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eIn an investigated incident, the attackers used the RemotePC RMM tool and a backdoor administrator account for persistence. Prinz Eugen is not currently operating as ransomware-as-a-service, and its developers are not currently recruiting affiliates. Its data leak site lists three victims, but Threatdown identified at least five victims and said the Standard Bank attacker demanded 1 BTC and was refused.\u003c/p\u003e\n\n\u003cp\u003eThe Go-based encryptor recursively scans directories with no depth limit or exclusions and encrypts virtually every file except those with the \u003ccode\u003e.prinzeugen\u003c/code\u003e extension. It uses ChaCha20-Poly1305 encryption, a 32-byte master key, random initialization vectors for each file, and key derivation based on Argon2id, SHA-256, and HKDF-SHA256. Threatdown said the lack of a ransom note can reduce forensic artifacts and move ransom communications to email, phone contact, or dark-web victim portals.\u003c/p\u003e\n"},{"n":4,"title":"Three Security Wrappers, One Redirect to a Google Docs Phishing Page","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/edgepilot-barracuda-wrapper-redirect-google-docs-credential-harvest","time":"11:00","priority":"SHOULD READ","score":82,"tldr":"A phishing email impersonating a document-sharing notification hid its credential-harvesting link behind EdgePilot, Barracuda LinkProtect, a throwaway redirect domain, and Google Docs, allowing trusted infrastructure to camouflage the attack. Despite failing SPF, DKIM, and DMARC, it reached the inbox because downstream trust in an intermediary gateway overrode the raw authentication failures.","briefOverview":"\u003cp\u003eIRONSCALES detected a credential-harvesting campaign in May 2026 targeting a mid-size equipment finance company. The email impersonated a document-sharing notification from “Jennifer Johnson” and referenced a company-specific aging report. The actual sender address was \u003ccode\u003edavidbr@bellnet[.]ca\u003c/code\u003e, a Canadian consumer ISP account with no connection to the target organization or document-sharing platform.\u003c/p\u003e\n\n\u003cp\u003eThe attack routed its payload link through three layers before reaching a Google Docs presentation. The chain used EdgePilot, Barracuda LinkProtect, the throwaway domain \u003ccode\u003esmstkart[.]com/bee\u003c/code\u003e, and then \u003ccode\u003edocs[.]google[.]com/presentation/d/e/...\u003c/code\u003e. The article states that legitimate link-protection services and Google Docs provided trusted-domain camouflage for the phishing payload.\u003c/p\u003e\n\n\u003cp\u003eThe message failed SPF, DKIM, and DMARC at the recipient’s Microsoft 365 tenant, but Microsoft still delivered it to the inbox with \u003ccode\u003eSCL=-1\u003c/code\u003e. AppRiver’s SecureTide gateway had logged the links as wrapped and returned a clean verdict before forwarding the message. Themis flagged the message at 84% confidence and auto-resolved it as phishing based on behavioral signals including a first-time sender, a consumer ISP address, a display-name mismatch, and an inconsistent communication pattern.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["IRONSCALES detected a credential-harvesting campaign in May 2026 that targeted a mid-size equipment finance company with a fake document-sharing notification.","The email used the display name “Jennifer Johnson,” but the actual sender address was davidbr@bellnet[.]ca, a Canadian consumer ISP account with no connection to the target organization or document-sharing platforms.","The payload link was routed through EdgePilot, Barracuda LinkProtect, the throwaway domain smstkart[.]com/bee, and then a Google Docs presentation.","The email failed SPF, DKIM, and DMARC at the recipient’s Microsoft 365 tenant, yet Microsoft delivered it to the inbox with SCL=-1.","Themis flagged the message at 84% confidence and auto-resolved it as phishing based on behavioral signals including a first-time sender, a consumer ISP address, a display-name mismatch, and an inconsistent communication pattern."],"insights":["Legitimate link-protection services can become camouflage when attackers place their own redirect infrastructure behind trusted wrapper domains.","A clean verdict from an upstream email gateway can create downstream trust even when Microsoft 365 later records SPF, DKIM, and DMARC failures.","URL reputation alone was insufficient in this case because the visible and terminal domains included trusted services such as EdgePilot, Barracuda LinkProtect, and Google Docs.","Behavioral signals such as first-time sender status, consumer ISP origin, display-name mismatch, and unusual communication patterns identified the phishing attempt when authentication and link checks did not."],"referencedReports":[],"body":"\u003cp\u003eIRONSCALES detected a credential-harvesting campaign in May 2026 targeting a mid-size equipment finance company. The email impersonated a document-sharing notification from “Jennifer Johnson” and referenced a company-specific aging report. The actual sender address was \u003ccode\u003edavidbr@bellnet[.]ca\u003c/code\u003e, a Canadian consumer ISP account with no connection to the target organization or document-sharing platform.\u003c/p\u003e\n\n\u003cp\u003eThe attack routed its payload link through three layers before reaching a Google Docs presentation. The chain used EdgePilot, Barracuda LinkProtect, the throwaway domain \u003ccode\u003esmstkart[.]com/bee\u003c/code\u003e, and then \u003ccode\u003edocs[.]google[.]com/presentation/d/e/...\u003c/code\u003e. The article states that legitimate link-protection services and Google Docs provided trusted-domain camouflage for the phishing payload.\u003c/p\u003e\n\n\u003cp\u003eThe message failed SPF, DKIM, and DMARC at the recipient’s Microsoft 365 tenant, but Microsoft still delivered it to the inbox with \u003ccode\u003eSCL=-1\u003c/code\u003e. AppRiver’s SecureTide gateway had logged the links as wrapped and returned a clean verdict before forwarding the message. Themis flagged the message at 84% confidence and auto-resolved it as phishing based on behavioral signals including a first-time sender, a consumer ISP address, a display-name mismatch, and an inconsistent communication pattern.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  const [theme, setTheme] = React.useState(() => document.documentElement.dataset.theme || 'dark');
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  const applyTheme = (t) => {
    document.documentElement.dataset.theme = t;
    try { localStorage.setItem('downlink.theme', t); } catch(e){}
    setTheme(t);
  };
  return (
    <nav className="swipe-nav" style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span className="swipe-clock" style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <select value={theme} onChange={(e) => applyTheme(e.target.value)} title="Select theme" aria-label="Select theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
