erview":"\u003cp\u003eMultiple npm supply chain attacks have targeted the ecosystem with malicious and poisoned versions of legitimate packages. The campaigns distributed a Rust-based information stealer called IronWorm and a self-spreading Miasma worm variant. The attacks affected more than 50 legitimate packages in one case and 57 npm packages across more than 286 malicious versions in another.\u003c/p\u003e\n\n\u003cp\u003eJFrog said IronWorm scrapes secrets from developer machines, hides behind an eBPF kernel rootkit, and communicates with its operator over Tor. The malware was traced to a compromised npm account named asteroiddao and used a preinstall hook to execute a Rust ELF binary. It also abused GitHub Actions workflows and npm Trusted Publishing in CI environments to steal secrets and publish poisoned package versions.\u003c/p\u003e\n\n\u003cp\u003eThe Miasma variant used a technique StepSecurity called “Phantom Gyp,” abusing a small binding.gyp file to trigger code execution during npm install instead of relying on preinstall or postinstall scripts. It downloaded the Bun runtime and used it to run a credential harvester targeting cloud, developer, package registry, SSH, password manager, wallet, and AI assistant secrets. Developers who installed affected versions were advised to rotate credentials, turn off install scripts and native rebuilds by default, and pin packages with integrity hashes.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMultiple npm supply chain attacks have hit the ecosystem through malicious and poisoned versions of legitimate packages. One campaign distributed IronWorm, a Rust-based information stealer described by JFrog as a tool that scrapes secrets from developer machines, hides behind an eBPF kernel rootkit, and communicates over Tor. Another campaign distributed a new variant of the Miasma worm across 57 npm packages and more than 286 malicious versions.\u003c/p\u003e\n\n\u003cp\u003eIronWorm activity was traced to a compromised npm account named asteroiddao, which published package versions containing a Rust ELF binary executed through a preinstall hook. The malware targets 86 environment variables and files associated with OpenAI Codex, Anthropic, Claude, Google Gemini, Cursor, AWS, Docker, Kubernetes, npm, vault configurations, and Exodus wallet files. It also includes logic to skip the threat actor’s own cryptocurrency wallet, which was empty at the time of writing.\u003c/p\u003e\n\n\u003cp\u003eJFrog described IronWorm as a supply chain weapon that finds secrets, modifies projects, and injects malicious code to self-propagate across GitHub. Malicious commits were introduced across nine GitHub organizations under the author name “claude” with the email “claude@users.noreply.github.com.” JFrog said the malware stole credentials belonging to ocrybit and used them to push commits across accessible repositories, planting malware into other packages.\u003c/p\u003e\n\n\u003cp\u003eIronWorm also replaces existing GitHub Actions workflows with one that harvests secrets, writes them to a harmless-looking file, and uploads them as a build artifact. In CI environments, it abuses npm Trusted Publishing to obtain short-lived tokens and push poisoned versions containing the malware to the registry. Its eBPF payload hides processes and hinders analysis, but those process-hiding techniques fail on systems where kernel lockdown is enabled.\u003c/p\u003e\n\n\u003cp\u003eSeparately, Endor Labs and StepSecurity reported a new Miasma variant that compromised 57 npm packages, including ai-sdk-ollama, autotel, awaitly, effect-analyzer, eslint-plugin-awaitly, executable-stories-cypress, http-uploader-dev, mountly, node-env-resolver, and node-env-resolver-aws. The stolen data was exfiltrated to a now-inaccessible GitHub account named liuende501, which had staged 236 repositories. StepSecurity said the campaign used “Phantom Gyp,” abusing a 157-byte binding.gyp file to trigger code execution during npm install.\u003c/p\u003e\n\n\u003cp\u003eThe Miasma attack chain downloaded and installed the Bun JavaScript runtime to run a credential harvester targeting AWS, Google Cloud, Microsoft Azure, HashiCorp Vault, Docker, Kubernetes, GitHub Actions, npm, RubyGems, PyPI, SSH, password managers, and AI assistants. Red Hat said the root cause behind the Miasma incident was likely a compromised GitHub account used to push unauthorized commits to RedHatInsights repositories. Microsoft said the payload operated across Linux, macOS, and Windows, while OX Security reported additional stages using GitHub commit searches for “firedalazer” and public repositories described as “Miasma: The Spreading Blight” or “Miasma - The Spreading Blight.”\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMultiple software supply chain attacks have targeted the npm ecosystem using malicious and poisoned versions of legitimate packages. The article describes two major threads: IronWorm, a Rust-based information stealer with self-propagation behavior, and a new variant of the Miasma worm. Together, the campaigns show attackers using npm packages, GitHub repositories, GitHub Actions, npm Trusted Publishing, and developer tooling as part of the infection and propagation process.\u003c/p\u003e\n\n\u003cp\u003eIronWorm was analyzed by JFrog, while the newer Miasma activity was described by Endor Labs, StepSecurity, Red Hat, Microsoft, and OX Security. The article reports that the attacks involved more than 50 legitimate packages in the IronWorm-related activity and 57 npm packages across more than 286 malicious versions in the Miasma variant campaign.\u003c/p\u003e\n\n\u003ch2 id=\"ironworm-campaign\"\u003eIronWorm campaign\u003c/h2\u003e\n\n\u003cp\u003eJFrog identified a Rust-based information stealer called IronWorm. According to JFrog, the stealer “scrapes every secret it can find on a developer’s machine, hides behind an eBPF kernel rootkit, and answers to its operator over Tor.” The malware also uses stolen credentials as a propagation mechanism, drawing comparisons to the Shai-Hulud worm.\u003c/p\u003e\n\n\u003cp\u003eThe malicious activity was traced to a compromised npm account named asteroiddao. That account published package versions containing a Rust ELF binary that was executed through a preinstall hook. By publishing itself to npm through trojanized packages, the malware created a self-replicating supply chain attack pattern.\u003c/p\u003e\n\n\u003ch2 id=\"ironworm-targets-and-behavior\"\u003eIronWorm targets and behavior\u003c/h2\u003e\n\n\u003cp\u003eIronWorm targets 86 environment variables and several categories of files that may contain credentials. The article says these include data associated with:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOpenAI Codex\u003c/li\u003e\n\u003cli\u003eAnthropic\u003c/li\u003e\n\u003cli\u003eClaude\u003c/li\u003e\n\u003cli\u003eGoogle Gemini\u003c/li\u003e\n\u003cli\u003eCursor\u003c/li\u003e\n\u003cli\u003eAmazon Web Services\u003c/li\u003e\n\u003cli\u003eDocker\u003c/li\u003e\n\u003cli\u003eKubernetes\u003c/li\u003e\n\u003cli\u003enpm\u003c/li\u003e\n\u003cli\u003eVault configurations\u003c/li\u003e\n\u003cli\u003eExodus cryptocurrency wallet files\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAn unusual detail is that the malware includes logic for the wallet-stealing component to skip the threat actor’s own wallet. At the time of writing, the referenced cryptocurrency wallet was empty and had no recorded transactions.\u003c/p\u003e\n\n\u003ch2 id=\"ironworm-propagation-through-github-and-npm\"\u003eIronWorm propagation through GitHub and npm\u003c/h2\u003e\n\n\u003cp\u003eJFrog described IronWorm as “a supply chain weapon built to find secrets, modify projects, and inject malicious code to self-propagate across GitHub.” The malicious commits spanned nine GitHub organizations and were introduced under the author name “claude” with the email address “claude@users.noreply.github.com,” apparently to mimic Anthropic’s AI chatbot.\u003c/p\u003e\n\n\u003cp\u003eJFrog linked the npm publisher asteroiddao to the asteroid-dao GitHub organization and said that ocrybit was a member of that organization and related Arweave organizations. According to the article, the malware stole ocrybit’s credentials and used them to push commits across repositories it could access. Those commits planted malware into other packages, which could then be published and infect additional developers.\u003c/p\u003e\n\n\u003ch2 id=\"ironworm-abuse-of-workflows-publishing-and-ebpf\"\u003eIronWorm abuse of workflows, publishing, and eBPF\u003c/h2\u003e\n\n\u003cp\u003eThe IronWorm payload can replace existing GitHub Actions workflows with one designed to harvest secrets. The workflow writes stolen secrets to a harmless-looking file and uploads it as a build artifact, removing the need for an external command-and-control server for that part of the operation.\u003c/p\u003e\n\n\u003cp\u003eIn CI environments, IronWorm abuses npm’s Trusted Publishing flow to obtain short-lived tokens. It then uses those tokens to push poisoned versions containing the malware to the npm registry.\u003c/p\u003e\n\n\u003cp\u003eIronWorm also includes an eBPF payload that works as a kernel-level rootkit to hide processes and hinder analysis. The article notes that on systems with kernel lockdown enabled, the process-hiding tricks fail and the relevant processes and sockets become visible again.\u003c/p\u003e\n\n\u003ch2 id=\"new-miasma-worm-variant\"\u003eNew Miasma worm variant\u003c/h2\u003e\n\n\u003cp\u003eThe article separately describes a distinct supply chain campaign involving a new Miasma worm variant. Endor Labs and StepSecurity reported that the campaign compromised 57 npm packages across more than 286 malicious versions. This followed an earlier Miasma incident that infected 32 packages across more than 90 versions under the @redhat-cloud-services npm namespace within 72 seconds earlier in the week.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several affected packages, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eai-sdk-ollama\u003c/li\u003e\n\u003cli\u003eautotel\u003c/li\u003e\n\u003cli\u003eawaitly\u003c/li\u003e\n\u003cli\u003eeffect-analyzer\u003c/li\u003e\n\u003cli\u003eeslint-plugin-awaitly\u003c/li\u003e\n\u003cli\u003eexecutable-stories-cypress\u003c/li\u003e\n\u003cli\u003ehttp-uploader-dev\u003c/li\u003e\n\u003cli\u003emountly\u003c/li\u003e\n\u003cli\u003enode-env-resolver\u003c/li\u003e\n\u003cli\u003enode-env-resolver-aws\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe data stolen by this malware was exfiltrated to a now-inaccessible GitHub account named liuende501. The article says 236 repositories were staged in that account, but it was not known whether GitHub removed the account or the threat actor deleted it.\u003c/p\u003e\n\n\u003ch2 id=\"phantom-gyp-execution-technique\"\u003e“Phantom Gyp” execution technique\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity described a technique it called “Phantom Gyp.” Instead of using preinstall or postinstall lifecycle scripts that security tools commonly monitor, the attacker abused a 157-byte binding.gyp file to trigger code execution during npm install. StepSecurity said this bypassed most install-script security checks entirely.\u003c/p\u003e\n\n\u003cp\u003eLike the earlier Miasma activity, the attack chain downloaded and installed the Bun JavaScript runtime. Bun was then used to load a credential harvester tailored to extract secrets from many sources, including AWS, Google Cloud, Microsoft Azure, HashiCorp Vault, Docker, Kubernetes, GitHub Actions, npm, RubyGems, PyPI, SSH, password managers, and AI assistants.\u003c/p\u003e\n\n\u003ch2 id=\"ai-assistant-and-developer-environment-targeting\"\u003eAI assistant and developer environment targeting\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights the Miasma variant’s targeting of AI coding assistant configurations as especially novel and concerning. The malware injects persistent backdoor files into project repositories. Those files execute whenever a developer opens the project in an AI-assisted IDE.\u003c/p\u003e\n\n\u003cp\u003eThe article also says developers who installed an affected version should rotate credentials, turn off install scripts and native rebuilds by default, and ensure packages are pinned with integrity hashes.\u003c/p\u003e\n\n\u003ch2 id=\"red-hat-and-microsoft-findings-on-miasma\"\u003eRed Hat and Microsoft findings on Miasma\u003c/h2\u003e\n\n\u003cp\u003eRed Hat said the likely root cause of the Miasma supply chain incident was a compromised GitHub account. That account was used to push unauthorized commits to repositories in the RedHatInsights GitHub organization.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the Miasma payload operated across Linux, macOS, and Windows by dynamically downloading the correct Bun runtime for each platform. Microsoft also said Linux CI/CD runners appeared to be the primary target.\u003c/p\u003e\n\n\u003cp\u003eOn developer systems, Microsoft said the malware stole SSH keys, command-line interface credentials, browser data, and wallet data. In CI/CD environments, it scraped GitHub Actions runner memory for secrets, escalated privileges using passwordless sudo, and republished poisoned packages with forged SLSA provenance to continue downstream propagation.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-shai-hulud-and-teampcp\"\u003eRelationship to Shai-Hulud and TeamPCP\u003c/h2\u003e\n\n\u003cp\u003eThe article says the Miasma payload is assessed to be a derivative of the Shai-Hulud worm used by TeamPCP in recent campaigns. It describes the changes as largely cosmetic while keeping the underlying functionality similar. However, attribution for the latest attacks remains unclear because TeamPCP publicly released the Shai-Hulud code.\u003c/p\u003e\n\n\u003cp\u003eIronWorm was also compared to Shai-Hulud because it uses stolen credentials for propagation and publishes itself through trojanized npm packages.\u003c/p\u003e\n\n\u003ch2 id=\"ox-security-findings-on-later-miasma-stages\"\u003eOX Security findings on later Miasma stages\u003c/h2\u003e\n\n\u003cp\u003eOX Security uncovered additional stages in the Miasma attack chain. These included searches for GitHub commits containing the string “firedalazer,” which replaced the previously flagged “FIRESCALE” dead drop. The purpose was to retrieve another payload, a JavaScript file named index.js containing an alternative version of the Shai-Hulud worm.\u003c/p\u003e\n\n\u003cp\u003eThe article says this effectively transformed the infection into a perpetual loop. In this part of the campaign, stolen data was exfiltrated to public GitHub repositories carrying the description “Miasma: The Spreading Blight” or “Miasma - The Spreading Blight.” At the time described in the article, 82 such repositories existed on the user accounts 0tabek16 and windy629.\u003c/p\u003e\n\n\u003cp\u003eOX Security researchers said the threat actor could dynamically change the “firedalazer” commits in GitHub to create new malware versions. They described GitHub as functioning as an adaptive command-and-control channel that uses a trusted and widely whitelisted platform, making network-level detection difficult because many tools are not configured to treat GitHub traffic as suspicious.\u003c/p\u003e\n","keyPoints":["Multiple npm supply chain attacks used malicious and poisoned versions of more than 50 legitimate packages to distribute the Rust-based IronWorm information stealer and a self-spreading worm.","JFrog said IronWorm steals secrets from developer machines, uses an eBPF kernel rootkit, communicates with its operator over Tor, and propagates by publishing trojanized npm packages with stolen credentials.","IronWorm activity was traced to a compromised npm account named asteroiddao, which published package versions containing a Rust ELF binary executed through a preinstall hook.","A distinct campaign compromised 57 npm packages across more than 286 malicious versions to distribute a new Miasma worm variant that exfiltrated stolen data to a GitHub account named liuende501.","StepSecurity said the new Miasma variant uses a “Phantom Gyp” technique, abusing a small binding.gyp file to trigger code execution during npm install instead of relying on preinstall or postinstall lifecycle scripts."],"insights":["The Miasma variant’s “Phantom Gyp” technique is especially actionable because it avoids the preinstall and postinstall lifecycle scripts that security tools commonly monitor, meaning defenses focused only on npm install scripts may miss execution through binding.gyp.","IronWorm can abuse npm Trusted Publishing in CI environments to obtain short-lived tokens and publish poisoned package versions, showing that token rotation alone may not prevent propagation if CI workflows are compromised.","The Miasma campaign turns GitHub into an exfiltration and adaptive command-and-control channel by using public repositories, staged accounts, and searchable commit strings such as “firedalazer,” making network-level detection harder because GitHub traffic is often trusted.","Developers who opened infected projects in AI-assisted IDEs faced additional risk because the Miasma variant injected persistent backdoor files into repositories that execute when the project is opened in those environments.","IronWorm’s eBPF rootkit process-hiding capability can fail on systems with kernel lockdown enabled, making kernel lockdown a concrete hardening measure that may improve visibility during investigation."],"referencedReports":[{"title":"IronWorm: Shai-Hulud’s Rustier Cousin","url":"https://research.jfrog.com/post/iron-worm-shai-hulud-rustier-cousin/","publisher":"JFrog","context":"The article cites JFrog’s analysis as the source for details on IronWorm’s secret scraping, eBPF rootkit, Tor communications, and self-propagation behavior.","category":"","primary":false},{"title":"Malicious Payload in ai-sdk-ollama npm Package","url":"https://www.endorlabs.com/learn/malicious-payload-in-ai-sdk-ollama-npm-package","publisher":"Endor Labs","context":"The article says Endor Labs shed light on a distinct npm supply chain campaign involving a new Miasma worm variant.","category":"","primary":false},{"title":"binding.gyp npm Supply Chain Attack Spreads Like Worm","url":"https://www.stepsecurity.io/blog/binding-gyp-npm-supply-chain-attack-spreads-like-worm","publisher":"StepSecurity","context":"The article cites StepSecurity’s analysis of the Miasma variant’s “Phantom Gyp” technique using binding.gyp to trigger code execution during npm install.","category":"","primary":false},{"title":"RHSB-2026-006","url":"https://access.redhat.com/security/vulnerabilities/RHSB-2026-006","publisher":"Red Hat","context":"The article references Red Hat’s advisory update explaining that the Miasma incident likely stemmed from a compromised GitHub account used to push unauthorized commits.","category":"","primary":false},{"title":"Preinstall Persistence Inside Red Hat npm Miasma Credential-Stealing Campaign","url":"https://www.microsoft.com/en-us/security/blog/2026/06/02/preinstall-persistence-inside-red-hat-npm-miasma-credential-stealing-campaign/","publisher":"Microsoft","context":"The article quotes Microsoft’s analysis describing Miasma’s cross-platform payload behavior and its activity on developer systems and CI/CD environments.","category":"","primary":false},{"title":"Six Stages Deep and an Endless Loop: Shai-Hulud Is Getting Sophisticated","url":"https://www.ox.security/blog/six-stages-deep-and-an-endless-loop-shai-hulud-is-getting-sophisticated/","publisher":"OX Security","context":"The article cites OX Security’s findings about additional Miasma stages, including GitHub commit searches for “firedalazer” and use of GitHub as an adaptive command-and-control mechanism.","category":"","primary":false}],"body":"\u003cp\u003eMultiple npm supply chain attacks have targeted the ecosystem with malicious and poisoned versions of legitimate packages. The campaigns distributed a Rust-based information stealer called IronWorm and a self-spreading Miasma worm variant. The attacks affected more than 50 legitimate packages in one case and 57 npm packages across more than 286 malicious versions in another.\u003c/p\u003e\n\n\u003cp\u003eJFrog said IronWorm scrapes secrets from developer machines, hides behind an eBPF kernel rootkit, and communicates with its operator over Tor. The malware was traced to a compromised npm account named asteroiddao and used a preinstall hook to execute a Rust ELF binary. It also abused GitHub Actions workflows and npm Trusted Publishing in CI environments to steal secrets and publish poisoned package versions.\u003c/p\u003e\n\n\u003cp\u003eThe Miasma variant used a technique StepSecurity called “Phantom Gyp,” abusing a small binding.gyp file to trigger code execution during npm install instead of relying on preinstall or postinstall scripts. It downloaded the Bun runtime and used it to run a credential harvester targeting cloud, developer, package registry, SSH, password manager, wallet, and AI assistant secrets. Developers who installed affected versions were advised to rotate credentials, turn off install scripts and native rebuilds by default, and pin packages with integrity hashes.\u003c/p\u003e\n"},{"n":5,"title":"AWS Login Phishing Attack: How Attackers Exploit New Authentication","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/inside-aws-login-exploring-a-new-phishing-method","time":"20:47","priority":"SHOULD READ","score":84,"tldr":"Researchers show that AWS’s new aws login --remote flow can be abused for phishing by hosting the lure on legitimate amazonaws.com infrastructure and relaying the victim’s real AWS authentication to an attacker-controlled CLI session. Organizations should block the required OAuth sign-in actions with SCPs where possible and monitor CloudTrail for cross-device login events with mismatched IPs or user agents.","briefOverview":"\u003cp\u003eAWS introduced \u003ccode\u003eaws login\u003c/code\u003e, a browser-based AWS CLI authentication method, including a \u003ccode\u003e--remote\u003c/code\u003e option for systems without a browser. The article argues that this remote flow creates a phishing vector because the browser session that authenticates and the CLI process requesting credentials can be on different devices. Attackers can abuse this separation to make victims complete legitimate AWS authentication while the attacker receives a valid AWS CLI session.\u003c/p\u003e\n\n\u003cp\u003eThe researchers describe a proof-of-concept phishing setup built entirely on AWS services, including S3, DynamoDB, Lambda, API Gateway, EC2, and SSM. This allows the phishing page to live on an \u003ccode\u003eamazonaws.com\u003c/code\u003e domain, which the article says can bypass trust assumptions and domain-based blocking strategies. The attack uses fresh \u003ccode\u003eaws login --remote\u003c/code\u003e URLs, victim session tracking, and token relay to complete authentication on attacker-controlled infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends prevention through Service Control Policies that deny \u003ccode\u003esignin:AuthorizeOAuth2Access\u003c/code\u003e and \u003ccode\u003esignin:CreateOAuth2Token\u003c/code\u003e where cross-device or CLI-based sign-in is not needed. It also recommends CloudTrail detection focused on \u003ccode\u003erequestParameters.client_id = arn:aws:signin:::devtools/cross-device\u003c/code\u003e. Suspicious indicators include mismatched source IP addresses, user agents, geographies, or timing between \u003ccode\u003eAuthorizeOAuth2Access\u003c/code\u003e and \u003ccode\u003eCreateOAuth2Token\u003c/code\u003e events.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article examines AWS’s new \u003ccode\u003eaws login\u003c/code\u003e authentication process, which lets developers authenticate the AWS CLI through a browser rather than manually configuring access keys or using SSO setup. The feature also supports \u003ccode\u003eaws login --remote\u003c/code\u003e, where a URL is generated on one device and opened in a browser on another device. The article identifies this cross-device model as the core weakness that enables phishing.\u003c/p\u003e\n\n\u003cp\u003eIn the described flow, \u003ccode\u003eaws login --remote\u003c/code\u003e generates a dedicated URL with a unique device code and uses \u003ccode\u003esignin.amazonaws.com\u003c/code\u003e for authentication. After the victim completes email, password, and MFA authentication, AWS provides a verification code that can be submitted back to the CLI flow. The researchers found that the device state must match, meaning the attacker must tie each victim to the attacker’s own live remote-login session rather than simply reuse an unrelated token.\u003c/p\u003e\n\n\u003cp\u003eThe researchers built a proof-of-concept phishing system using only AWS infrastructure. They hosted an AWS-themed phishing page in an S3 bucket, tracked sessions in DynamoDB, used Lambda and API Gateway for orchestration, and used EC2 with SSM and \u003ccode\u003eexpect\u003c/code\u003e to run and hold \u003ccode\u003eaws login --remote\u003c/code\u003e sessions. This produced a working AWS-native phishing tool that generated fresh remote-login URLs per visitor and relayed verification tokens back to the attacker-controlled CLI process.\u003c/p\u003e\n\n\u003cp\u003eThe article says the impact is significant because victims authenticate through legitimate AWS pages and the attacker receives a valid AWS session that looks legitimate to AWS. With that session, an attacker may inventory the environment, map sensitive assets, exfiltrate data, or create persistence through IAM users, access keys, roles, or trust policies if the compromised permissions allow it. The article emphasizes that activity after compromise may appear as ordinary AWS API usage in CloudTrail.\u003c/p\u003e\n\n\u003cp\u003eFor prevention, the article recommends using Service Control Policies to deny \u003ccode\u003esignin:AuthorizeOAuth2Access\u003c/code\u003e and \u003ccode\u003esignin:CreateOAuth2Token\u003c/code\u003e in accounts or organizational units that do not need this OAuth sign-in functionality. For detection, it recommends CloudTrail analysis of \u003ccode\u003eAuthorizeOAuth2Access\u003c/code\u003e and \u003ccode\u003eCreateOAuth2Token\u003c/code\u003e events with \u003ccode\u003erequestParameters.client_id = arn:aws:signin:::devtools/cross-device\u003c/code\u003e. The article highlights mismatched IP addresses, inconsistent user agents, unusual timing gaps, and unusual geography between authentication and token exchange events as strong indicators.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article analyzes a phishing technique enabled by AWS’s new \u003ccode\u003eaws login\u003c/code\u003e authentication process for the AWS CLI. The command allows developers to authenticate through a browser using email, password, and MFA, after which credentials are cached under the default CLI profile. AWS also provides \u003ccode\u003eaws login --remote\u003c/code\u003e for environments without a browser, allowing a URL generated on one device to be opened on another device for authentication.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that the \u003ccode\u003e--remote\u003c/code\u003e workflow introduces a new phishing vector because the browser session used for authentication is not tightly bound to the CLI device requesting credentials. In the described attack, the victim authenticates through a legitimate AWS sign-in flow, while the attacker completes the CLI login on their own infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"authentication-flow-described-in-the-article\"\u003eAuthentication flow described in the article\u003c/h2\u003e\n\n\u003cp\u003eWhen a user runs \u003ccode\u003eaws login --remote\u003c/code\u003e, the CLI creates a request to the AWS authorization endpoint and generates a dedicated URL containing a unique \u003ccode\u003edevice_code\u003c/code\u003e. The user opens the URL in a browser, authenticates on \u003ccode\u003esignin.amazonaws.com\u003c/code\u003e, and receives a verification code. The article describes the flow as \u003ccode\u003ecross_device\u003c/code\u003e, indicating that the token is intended to be taken to a different device.\u003c/p\u003e\n\n\u003cp\u003eThe verification value is described as a Base64-encoded JWT containing what AWS needs to sign the user in. Once submitted back to the login process, the CLI receives credentials and the user is authenticated.\u003c/p\u003e\n\n\u003ch2 id=\"core-phishing-concept\"\u003eCore phishing concept\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main finding is that attackers can exploit the separation between the browser session and the CLI process. In the phishing scenario, the attacker initiates \u003ccode\u003eaws login --remote\u003c/code\u003e from attacker-controlled infrastructure and then convinces the victim to complete the browser authentication flow. The victim sees a legitimate AWS authentication page, but the resulting verification step is relayed back into the attacker’s waiting CLI session.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that a simple token-stealing approach does not work by itself because the device state code must match the originating login session. This means the attacker must generate a fresh remote-login flow and associate it with the victim’s session. The 10-minute expiration window for each generated URL also requires automation to create URLs for new visitors and track each victim separately.\u003c/p\u003e\n\n\u003ch2 id=\"proof-of-concept-infrastructure\"\u003eProof-of-concept infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe researchers describe building a repeatable phishing setup using AWS services. The infrastructure includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn S3 bucket hosting an AWS-themed phishing page.\u003c/li\u003e\n\u003cli\u003eA DynamoDB table using \u003ccode\u003esessionId\u003c/code\u003e as a partition key to track victim sessions.\u003c/li\u003e\n\u003cli\u003eA Lambda function acting as a bridge between the frontend, DynamoDB, and EC2.\u003c/li\u003e\n\u003cli\u003eAPI Gateway exposing endpoints for browser-to-Lambda communication.\u003c/li\u003e\n\u003cli\u003eAn EC2 instance running \u003ccode\u003eaws login --remote\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSSM to send commands to the EC2 instance.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eexpect\u003c/code\u003e to keep the interactive CLI login process alive and feed it the victim-provided verification token.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article gives the example of an S3-hosted lure such as \u003ccode\u003ehttps://aws-session-expired.s3.us-east-1.amazonaws.com\u003c/code\u003e. It emphasizes that hosting the phishing page on an \u003ccode\u003eamazonaws.com\u003c/code\u003e domain makes the lure more convincing and harder to block with simple domain-based filtering.\u003c/p\u003e\n\n\u003ch2 id=\"api-and-session-workflow\"\u003eAPI and session workflow\u003c/h2\u003e\n\n\u003cp\u003eThe article describes three logical API operations exposed through API Gateway:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ePOST /start\u003c/code\u003e generates a new \u003ccode\u003esessionId\u003c/code\u003e, creates a DynamoDB record, and uses SSM to start \u003ccode\u003eaws login --remote\u003c/code\u003e on EC2.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eGET /session/{id}\u003c/code\u003e returns the current status and login URL for the frontend while it polls for the generated URL.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ePOST /token/{id}\u003c/code\u003e receives the verification code from the victim and sends it to the EC2 instance so the attacker’s CLI login can complete.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe researchers initially attempted to use SSM to execute the login command directly, but found that SSM did not remain attached to the interactive process. They used \u003ccode\u003eexpect\u003c/code\u003e as a workaround to monitor CLI output, extract the browser URL, wait for the token, and feed it back into the login process.\u003c/p\u003e\n\n\u003ch2 id=\"social-engineering-angle\"\u003eSocial engineering angle\u003c/h2\u003e\n\n\u003cp\u003eThe article says the researchers drew inspiration from ClickFix and ConsentFix phishing campaigns. Rather than presenting a generic login page, the lure frames the action as a routine fix, such as an expired AWS session that must be restored. The victim is instructed to sign in and paste the verification code, which is exactly the action required to complete \u003ccode\u003eaws login --remote\u003c/code\u003e on the attacker’s side.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that AI-generated phishing content has reduced the usefulness of traditional phishing indicators such as grammar and spelling errors. It says modern phishing emails can be contextually convincing and can target technical staff, who are high-value targets because their credentials may provide access to cloud infrastructure, production systems, and sensitive data repositories.\u003c/p\u003e\n\n\u003ch2 id=\"impact-described-in-the-article\"\u003eImpact described in the article\u003c/h2\u003e\n\n\u003cp\u003eAccording to the article, a successful attack gives the attacker a valid AWS session. From AWS’s perspective, subsequent actions appear to come from a legitimate user session because the victim completed real AWS authentication. The article says the attacker may not need to immediately escalate privileges if the victim already has useful permissions.\u003c/p\u003e\n\n\u003cp\u003ePotential post-compromise actions listed in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInventorying the AWS environment.\u003c/li\u003e\n\u003cli\u003eMapping sensitive assets.\u003c/li\u003e\n\u003cli\u003eExfiltrating valuable data.\u003c/li\u003e\n\u003cli\u003eCreating IAM users with quiet policies.\u003c/li\u003e\n\u003cli\u003eGenerating access keys that do not go through SSO, MFA, or the browser login flow.\u003c/li\u003e\n\u003cli\u003eCreating roles with trust policies that allow principals the organization may not be monitoring.\u003c/li\u003e\n\u003cli\u003eAssuming roles already used for automation.\u003c/li\u003e\n\u003cli\u003eMoving laterally across accounts the user legitimately had access to.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that these actions can blend into normal AWS API activity, producing CloudTrail records that show the legitimate user performing actions.\u003c/p\u003e\n\n\u003ch2 id=\"prevention-recommendations\"\u003ePrevention recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends using Service Control Policies to deny the OAuth sign-in actions that the demonstrated flow depends on:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003esignin:AuthorizeOAuth2Access\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esignin:CreateOAuth2Token\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt states that blocking these actions can prevent the remote-login phishing flow in accounts where cross-device or CLI-based sign-in is not required. In environments where the functionality is needed, the article recommends selectively denying it for specific organizational units, accounts, or identities. It also recommends asking whether cross-device sign-in flows are actually needed, rather than leaving them enabled by default.\u003c/p\u003e\n\n\u003ch2 id=\"detection-recommendations\"\u003eDetection recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe article says detection should start with CloudTrail events involving cross-device remote login usage. The repeated fingerprint observed by the researchers was:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003erequestParameters.client_id = arn:aws:signin:::devtools/cross-device\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article recommends correlating \u003ccode\u003eAuthorizeOAuth2Access\u003c/code\u003e and \u003ccode\u003eCreateOAuth2Token\u003c/code\u003e events and comparing their attributes. Suspicious patterns include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDifferent source IP addresses between authentication and token exchange.\u003c/li\u003e\n\u003cli\u003eDifferent user agents.\u003c/li\u003e\n\u003cli\u003eOdd timing gaps between the steps.\u003c/li\u003e\n\u003cli\u003eUnusual geography.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article explains that in the phishing scenario, the victim authenticates from one IP address while the attacker completes the verification flow from another. It also notes that legitimate remote workflows can produce IP mismatches, so the mismatch should be combined with other signals rather than treated as a standalone indicator.\u003c/p\u003e\n\n\u003ch2 id=\"named-parties-and-examples-mentioned\"\u003eNamed parties and examples mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article is written as research by Mitiga and references Mitiga’s CDR platform as showing an alert for the simulated attack chain. It also mentions AWS services and components including AWS CLI, AWS CloudTrail, S3, DynamoDB, Lambda, API Gateway, EC2, SSM, IAM, STS, CloudWatch Logs, and Service Control Policies.\u003c/p\u003e\n\n\u003cp\u003eThe article references recent phishing or vishing activity involving Salesforce, Scattered Spider, M\u0026amp;S, DoorDash, SoundCloud, Betterment, and Crunchbase as examples of phishing impact, but it does not attribute the demonstrated AWS login phishing technique to a named threat actor.\u003c/p\u003e\n","keyPoints":["AWS introduced the aws login command with a --remote option that generates a cross-device authentication URL for browser-based sign-in and returns credentials to the AWS CLI.","The article describes a phishing method in which attackers run aws login --remote on their own infrastructure, lure victims to authenticate through legitimate AWS sign-in pages, and use the verification code to complete the attacker’s CLI login.","The researchers built a proof-of-concept phishing setup using AWS services including S3, DynamoDB, Lambda, API Gateway, EC2, and SSM, causing the phishing infrastructure to reside on amazonaws.com domains.","The article recommends preventing the demonstrated flow by using Service Control Policies to deny signin:AuthorizeOAuth2Access and signin:CreateOAuth2Token where cross-device or CLI-based sign-in is not needed.","The article states that detection should focus on CloudTrail events with requestParameters.client_id set to arn:aws:signin:::devtools/cross-device and mismatches in source IP address, user agent, timing, or geography between AuthorizeOAuth2Access and CreateOAuth2Token events."],"insights":["The phishing infrastructure can be made more convincing and harder to block because the lure can be hosted on an amazonaws.com S3 URL rather than on a lookalike domain.","The attack depends on a valid device state match, so simply stealing or reusing a victim’s verification token is insufficient unless it is relayed back into the same remote-login flow initiated by the attacker.","The 10-minute expiration window for aws login --remote URLs forces attackers to generate fresh URLs per visitor and track sessions, which creates detectable timing relationships between authorization and token-creation events.","Service Control Policies can remove the attack path at the organization level by denying signin:AuthorizeOAuth2Access and signin:CreateOAuth2Token without relying on user training or email filtering.","A strong detection signal is not the presence of a single OAuth event, but the correlation of AuthorizeOAuth2Access and CreateOAuth2Token events where the cross-device client is used and the IP address, user agent, timing, or geography differs."],"referencedReports":[],"body":"\u003cp\u003eAWS introduced \u003ccode\u003eaws login\u003c/code\u003e, a browser-based AWS CLI authentication method, including a \u003ccode\u003e--remote\u003c/code\u003e option for systems without a browser. The article argues that this remote flow creates a phishing vector because the browser session that authenticates and the CLI process requesting credentials can be on different devices. Attackers can abuse this separation to make victims complete legitimate AWS authentication while the attacker receives a valid AWS CLI session.\u003c/p\u003e\n\n\u003cp\u003eThe researchers describe a proof-of-concept phishing setup built entirely on AWS services, including S3, DynamoDB, Lambda, API Gateway, EC2, and SSM. This allows the phishing page to live on an \u003ccode\u003eamazonaws.com\u003c/code\u003e domain, which the article says can bypass trust assumptions and domain-based blocking strategies. The attack uses fresh \u003ccode\u003eaws login --remote\u003c/code\u003e URLs, victim session tracking, and token relay to complete authentication on attacker-controlled infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends prevention through Service Control Policies that deny \u003ccode\u003esignin:AuthorizeOAuth2Access\u003c/code\u003e and \u003ccode\u003esignin:CreateOAuth2Token\u003c/code\u003e where cross-device or CLI-based sign-in is not needed. It also recommends CloudTrail detection focused on \u003ccode\u003erequestParameters.client_id = arn:aws:signin:::devtools/cross-device\u003c/code\u003e. Suspicious indicators include mismatched source IP addresses, user agents, geographies, or timing between \u003ccode\u003eAuthorizeOAuth2Access\u003c/code\u003e and \u003ccode\u003eCreateOAuth2Token\u003c/code\u003e events.\u003c/p\u003e\n"},{"n":8,"title":"Suspicious Polyfill login prompts pop up on Toshiba, Muji websites","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/suspicious-polyfill-login-prompts-pop-up-on-toshiba-muji-websites/","time":"21:54","priority":"SHOULD READ","score":82,"tldr":"Toshiba, Muji, and other Japanese websites displayed suspicious browser login prompts caused by lingering polyfill.io code after the domain became active again and returned HTTP 401 authentication requests. Users who entered credentials are advised to change their passwords, though there is no confirmed evidence of site compromise or credential theft.","briefOverview":"\u003cp\u003eToshiba and Muji warned visitors that suspicious sign-in screens appeared on parts of their websites and could collect credentials. Both Japanese companies advised users who entered account login information into the prompts to change their passwords. The companies said they had resolved the issue and suspended the service involved.\u003c/p\u003e\n\n\u003cp\u003eThe login pop-ups were generated by the external service hosted at polyfill.io, a JavaScript CDN associated with a 2024 incident in which malicious code was introduced into scripts delivered by its CDN. Security researcher Pasquale Pillitteri reported that the polyfill.io domain became active again in late May 2026 and began responding with HTTP 401 authentication requests. Browsers visiting affected pages interpreted those responses as requests for credentials and displayed login prompts.\u003c/p\u003e\n\n\u003cp\u003eJapanese media reported that Zojirushi, FiNC Technologies, Ishiyaku Publishers, and Hobonichi were also impacted by the same issue. Pillitteri also said Samsung Smart TVs and websites displayed a login prompt on June 1. The article states there is currently no indication that the impacted websites were hacked or that credentials entered into the rogue login screens were stolen.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eToshiba and Muji warned website visitors about suspicious authentication pop-ups that appeared on their sites and could collect credentials. Toshiba told users to cancel the sign-in screen without entering information if it appeared. Both Toshiba and Muji advised users who entered account login data in the prompts to change their passwords.\u003c/p\u003e\n\n\u003cp\u003eThe pop-ups were tied to an external service hosted at polyfill.io. In 2024, polyfill.io introduced malicious code in scripts delivered by its CDN after the domain was purchased by a Chinese entity, according to reports cited in the article. Polyfill is described as a JavaScript CDN for legacy browsers that provides compatibility for unsupported technologies.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that the polyfill.io domain was not owned by Andrew Betts, the creator of the open source Polyfill project. When the domain expired, it could be claimed by anyone. Betts publicly recommended in 2024 that website owners remove the service and relaunched the JavaScript CDN service at new domains.\u003c/p\u003e\n\n\u003cp\u003eAlthough deactivation of the service at polyfill.io stopped earlier redirections, some websites did not remove all references to it over the following two years. Security researcher Pasquale Pillitteri reported that starting in late May 2026, polyfill.io became active again and began returning HTTP 401 authentication requests. Browsers visiting pages that still loaded the service interpreted those responses as requests for usernames and passwords and displayed login prompts.\u003c/p\u003e\n\n\u003cp\u003eToshiba and Muji said they solved the issue and suspended the service. Japanese media reported that Zojirushi, FiNC Technologies, Ishiyaku Publishers, and Hobonichi were also impacted, and Pillitteri said Samsung Smart TVs and websites displayed a login prompt on June 1. The article states that there is no current indication that the affected websites were hacked or that credentials entered into the rogue login screens were stolen.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eToshiba and Muji warned visitors that suspicious sign-in screens could appear on their websites and potentially collect credentials. Both companies advised users who entered account login data into the authentication screens to change their passwords for the affected services. Toshiba instructed visitors who saw the screen to select \u0026ldquo;Cancel\u0026rdquo; without entering any information.\u003c/p\u003e\n\n\u003cp\u003eThe suspicious login prompts were generated by the external service hosted at polyfill.io. The article connects the issue to the polyfill.io service, which in 2024 introduced malicious code in scripts delivered by its CDN. Both Toshiba and Muji said they had resolved the issue and suspended the service.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical details\u003c/h2\u003e\n\n\u003cp\u003ePolyfill is described as a JavaScript CDN for legacy browsers. Its purpose is to let modern websites run on older browsers by providing a compatibility layer for unsupported technologies. The affected websites still had remnants of Polyfill code that loaded the polyfill.io domain.\u003c/p\u003e\n\n\u003cp\u003eSecurity researcher Pasquale Pillitteri reported that, starting in late May 2026, the polyfill.io domain became active again and began responding with HTTP 401 authentication requests. Browsers visiting pages such as Toshiba’s and Muji’s interpreted those HTTP 401 responses as requests for a username and password. As a result, the browsers displayed login prompts to users.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the issue did not necessarily indicate that the impacted websites had been hacked. At the time of publication, there was no indication that credentials entered into the rogue login screens had been stolen.\u003c/p\u003e\n\n\u003ch2 id=\"background-on-polyfill-io\"\u003eBackground on polyfill.io\u003c/h2\u003e\n\n\u003cp\u003eThe Polyfill code was delivered through a CDN at polyfill.io, but the domain was not owned by Andrew Betts, the creator of the open source Polyfill project. The article explains that because the domain expired, it could be claimed by anyone. Reports cited in the article say the domain was purchased by a Chinese entity in 2024.\u003c/p\u003e\n\n\u003cp\u003eIn 2024, the polyfill.io domain added malicious scripts that impacted more than 100,000 websites using the Polyfill service, according to reports referenced in the article. Betts publicly recommended at the time that website owners remove the service from their sites. He relaunched the JavaScript CDN service at a new domain, polyfill.com, and later settled at polyfill.top.\u003c/p\u003e\n\n\u003cp\u003eAlthough deactivation of the service at polyfill.io stopped the earlier redirections, some websites did not clean all pages over the following two years. The article says remnants of Polyfill code remained on some sites, allowing the renewed polyfill.io behavior to trigger browser authentication prompts.\u003c/p\u003e\n\n\u003ch2 id=\"affected-organizations-and-platforms\"\u003eAffected organizations and platforms\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies Toshiba and Muji as two Japanese companies that warned users about the suspicious prompts. Both companies said they had solved the issue and suspended the service. Muji said it had not confirmed any unauthorized access or information leakage to its site, but asked customers to consider their response to ensure safety.\u003c/p\u003e\n\n\u003cp\u003eJapanese media outlets reported that additional organizations were also impacted by the same issue, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eZojirushi\u003c/li\u003e\n\u003cli\u003eFiNC Technologies\u003c/li\u003e\n\u003cli\u003eIshiyaku Publishers\u003c/li\u003e\n\u003cli\u003eHobonichi\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSecurity researcher Pasquale Pillitteri also said Samsung Smart TVs and websites displayed a login prompt on June 1.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and response\u003c/h2\u003e\n\n\u003cp\u003eThe main user-facing impact was the appearance of unexpected authentication prompts on legitimate websites that still referenced polyfill.io. Toshiba and Muji warned that the prompts could collect credentials. Both companies advised users who entered login data into the prompts to change their passwords.\u003c/p\u003e\n\n\u003cp\u003eToshiba told users not to enter any information if they saw the prompt and to cancel it instead. Muji stated that it had not confirmed unauthorized access or information leakage to its site. The article concludes that users should be cautious about unexpected authentication prompts, while noting that there was no current indication that affected websites were hacked or that credentials entered into the rogue prompts were stolen.\u003c/p\u003e\n","keyPoints":["Toshiba and Muji warned visitors that suspicious sign-in screens on their websites could collect credentials and advised users who entered login data to change their passwords.","The login pop-ups were generated by the external service hosted at polyfill.io, which had introduced malicious code in scripts delivered by its CDN in 2024.","Both Toshiba and Muji said they had solved the issue and suspended the polyfill.io service on their websites.","Japanese media reported that Zojirushi, FiNC Technologies, Ishiyaku Publishers, and Hobonichi were also impacted by the same issue.","Security researcher Pasquale Pillitteri reported that in late May 2026 polyfill.io became active again and started responding with HTTP 401 authentication requests, causing browsers to display login prompts."],"insights":["The incident shows that even after polyfill.io redirections were stopped in 2024, forgotten references to the old CDN could still create user-facing security risks two years later.","The suspicious prompts did not require the affected websites to be hacked; browsers displayed them because polyfill.io returned HTTP 401 authentication requests to pages that still loaded the external service.","The original Polyfill open source project was not the owner of the polyfill.io domain, making expired-domain control a critical risk for websites depending on third-party CDN resources.","Website operators were explicitly advised by Polyfill creator Andrew Betts in 2024 to remove the old service, but some organizations still had remnants of the code on their pages."],"referencedReports":[{"title":"Toshiba notice on suspicious sign-in screen","url":"https://www.global.toshiba/jp/top/info-20260602.html","publisher":"Toshiba","context":"The article cites Toshiba's short communication warning users not to enter information if a suspicious sign-in screen appears.","category":"","primary":false},{"title":"Muji notice on suspicious authentication screens","url":"http://www.muji.com/jp/ja/notice/1676928","publisher":"Muji","context":"The article cites Muji's announcement warning visitors about suspicious authentication screens generated by the external polyfill.io service.","category":"","primary":false},{"title":"Popup Polyfill.io Smart TV Samsung: cómo solucionar","url":"https://pasqualepillitteri.it/es/news/4078/popup-polyfill-io-smart-tv-samsung-como-solucionar","publisher":"Pasquale Pillitteri","context":"The article references security researcher Pasquale Pillitteri's report that Samsung Smart TVs and websites displayed login prompts and that polyfill.io began returning HTTP 401 authentication requests.","category":"","primary":false},{"title":"当社が意図していない不審な認証画面の表示について","url":"https://help.1101.com/hc/ja/articles/5409783458462-%E5%BD%93%E7%A4%BE%E3%81%8C%E6%84%8F%E5%9B%B3%E3%81%97%E3%81%A6%E3%81%84%E3%81%AA%E3%81%84%E4%B8%8D%E5%AF%A9%E3%81%AA%E8%AA%8D%E8%A8%BC%E7%94%BB%E9%9D%A2%E3%81%AE%E8%A1%A8%E7%A4%BA%E3%81%AB%E3%81%A4%E3%81%84%E3%81%A6","publisher":"Hobonichi","context":"The article links to Hobonichi's notice while reporting that the publishing brand was also impacted by the suspicious authentication screen issue.","category":"","primary":false}],"body":"\u003cp\u003eToshiba and Muji warned visitors that suspicious sign-in screens appeared on parts of their websites and could collect credentials. Both Japanese companies advised users who entered account login information into the prompts to change their passwords. The companies said they had resolved the issue and suspended the service involved.\u003c/p\u003e\n\n\u003cp\u003eThe login pop-ups were generated by the external service hosted at polyfill.io, a JavaScript CDN associated with a 2024 incident in which malicious code was introduced into scripts delivered by its CDN. Security researcher Pasquale Pillitteri reported that the polyfill.io domain became active again in late May 2026 and began responding with HTTP 401 authentication requests. Browsers visiting affected pages interpreted those responses as requests for credentials and displayed login prompts.\u003c/p\u003e\n\n\u003cp\u003eJapanese media reported that Zojirushi, FiNC Technologies, Ishiyaku Publishers, and Hobonichi were also impacted by the same issue. Pillitteri also said Samsung Smart TVs and websites displayed a login prompt on June 1. The article states there is currently no indication that the impacted websites were hacked or that credentials entered into the rogue login screens were stolen.\u003c/p\u003e\n"},{"n":11,"title":"A New AI Executive Order: What Federal Agencies Need to Know","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/a-new-ai-executive-order-what-federal-agencies-need-to-know","time":"18:26","priority":"SHOULD READ","score":78,"tldr":"A new U.S. Executive Order directs federal agencies to accelerate AI adoption while strengthening cyber defenses, including AI-enabled security tools, vulnerability coordination, and testing of advanced frontier models. Netskope frames the order as a call for agencies to improve visibility, data protection, and zero trust controls across AI use.","briefOverview":"\u003cp\u003eOn June 2, 2026, a new Executive Order on AI titled “Promoting Advanced Artificial Intelligence Innovation and Security” was issued. The article says the order continues a federal shift toward AI innovation, security, and adoption while emphasizing that the United States must lead in AI without compromising national security. For federal agencies, the order is presented as an acceleration of existing priorities rather than a set of entirely new concepts.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights several near-term actions agencies should expect, including rapid prioritization of cyber defense and Binding Operational Directives from the Secretary of Homeland Security through CISA in consultation with OMB. It also describes plans to expand AI-enabled cybersecurity capabilities and create an AI cybersecurity clearinghouse involving Treasury, the National Cyber Director, NSA, CISA, AI industry, and critical infrastructure operators. The clearinghouse is intended to coordinate vulnerability scanning, validation, remediation prioritization, and patch distribution.\u003c/p\u003e\n\n\u003cp\u003eThe order also addresses “covered frontier models,” calling for a classified benchmarking process within 60 days to assess advanced cyber capabilities of AI models. It outlines a voluntary framework that could allow AI developers to provide up to 30 days of pre-release access to covered frontier models for evaluation and security testing. The article concludes by positioning Netskope’s AI security capabilities as a way for federal agencies to improve visibility, data protection, AI-specific threat detection, zero trust enforcement, and red teaming.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article discusses a June 2, 2026 Executive Order on AI titled “Promoting Advanced Artificial Intelligence Innovation and Security.” It says the order signals a continued shift in how the federal government approaches AI innovation, security, and adoption. The article frames the order as a mandate for federal agencies to move quickly on AI while hardening systems against increasingly sophisticated threats.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, AI is already embedded in government mission systems, cybersecurity tools, and data analysis workflows. As adoption grows, the article says agencies face new attack surfaces, new forms of exploitation, and national security considerations. The resulting requirement is described as a dual mandate: accelerate AI adoption while improving resilience for systems, data, and models.\u003c/p\u003e\n\n\u003cp\u003eSeveral near-term actions are described as directly relevant to federal agencies. The order calls for cyber defense prioritization, particularly for agencies operating National Security Systems and civilian infrastructure. Within 30 days, the Secretary of Homeland Security, through CISA and in consultation with OMB, is expected to release Binding Operational Directives to strengthen protections across federal environments.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes the expansion of AI-enabled cybersecurity capabilities and the establishment of an AI cybersecurity clearinghouse. The clearinghouse is to be formed within 30 days by the Secretary of Treasury, in consultation with the National Cyber Director, NSA, and CISA, working with AI industry and critical infrastructure operators. Its stated functions include coordinating and deconflicting vulnerability scanning, discovering and validating vulnerabilities, and prioritizing remediation and patch distribution.\u003c/p\u003e\n\n\u003cp\u003eFor advanced AI systems, the article says the order introduces “covered frontier models” and requires Treasury, NSA, CISA, and others to develop a classified benchmarking process within 60 days. That process is intended to assess advanced cyber capabilities of AI models and define thresholds for covered frontier model designation. The order also establishes a voluntary framework for AI developers to provide up to 30 days of pre-release access to covered frontier models for evaluation and security testing.\u003c/p\u003e\n\n\u003cp\u003eThe article notes stronger enforcement against AI-enabled criminal activity, including unauthorized system access, data breaches, and fraud. It also highlights investments in federal cybersecurity hiring pathways. The final section presents Netskope’s commercial capabilities for federal agencies, including AI usage visibility, real-time data protection, detection and blocking of prompt injection and jailbreaks, zero trust enforcement, and red teaming.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article examines a June 2, 2026 Executive Order on AI titled “Promoting Advanced Artificial Intelligence Innovation and Security.” It states that the order continues a shift in the federal government’s approach to AI innovation, security, and adoption. The central theme presented in the article is that the United States must move quickly to lead in AI while avoiding compromises to national security.\u003c/p\u003e\n\n\u003cp\u003eThe article characterizes the order as less about introducing entirely new concepts and more about accelerating action for federal agencies. It says the order builds on prior guidance while sharpening the focus on secure AI operations, stronger cyber defenses, and deeper collaboration with industry.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-order-matters-for-agencies\"\u003eWhy the Order Matters for Agencies\u003c/h2\u003e\n\n\u003cp\u003eThe article states that AI is no longer an emerging technology in government. It says AI is already embedded in mission systems, cybersecurity tools, and data analysis workflows. As AI adoption increases, the article says risk also increases.\u003c/p\u003e\n\n\u003cp\u003eThe Executive Order is described as acknowledging both the benefits and risks of AI. On one side, AI is framed as a driver of economic growth and national strength. On the other side, the article says advanced AI capabilities create new attack surfaces, new forms of exploitation, and new national security considerations.\u003c/p\u003e\n\n\u003cp\u003eFor federal agencies, the article describes this as a dual mandate:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMove quickly on AI adoption.\u003c/li\u003e\n\u003cli\u003eHarden systems in parallel.\u003c/li\u003e\n\u003cli\u003eEnsure systems, data, and models are resilient against increasingly sophisticated threats.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"immediate-cyber-defense-prioritization\"\u003eImmediate Cyber Defense Prioritization\u003c/h2\u003e\n\n\u003cp\u003eThe article says the order directs agencies to rapidly prioritize cyber defense, especially agencies operating National Security Systems and civilian infrastructure. It identifies a 30-day timeline for action involving the Secretary of Homeland Security.\u003c/p\u003e\n\n\u003cp\u003eWithin that period, the Secretary of Homeland Security, through CISA and in consultation with OMB, is expected to release Binding Operational Directives. These directives are described as being aimed at strengthening protections across federal environments.\u003c/p\u003e\n\n\u003cp\u003eThe article says agencies should anticipate:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAccelerated timelines for implementing cybersecurity controls.\u003c/li\u003e\n\u003cli\u003eExpanded use of AI-enabled defensive tools.\u003c/li\u003e\n\u003cli\u003eIncreased expectations for visibility across systems and data.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"expansion-of-ai-enabled-cybersecurity-capabilities\"\u003eExpansion of AI-Enabled Cybersecurity Capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article says the order calls for expanding federal programs and services that use AI for defense. It also emphasizes improved access to advanced cybersecurity tools.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that this emphasis is not limited to federal agencies. It also includes state, local, and critical infrastructure organizations.\u003c/p\u003e\n\n\u003ch2 id=\"ai-cybersecurity-clearinghouse\"\u003eAI Cybersecurity Clearinghouse\u003c/h2\u003e\n\n\u003cp\u003eOne of the article’s most notable provisions is the establishment of an AI cybersecurity clearinghouse. The article says the Secretary of Treasury, in consultation with the National Cyber Director, NSA, and CISA, must form the clearinghouse within 30 days of the order.\u003c/p\u003e\n\n\u003cp\u003eThe clearinghouse is described as working with AI industry and critical infrastructure operators. Its stated purposes are to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCoordinate and deconflict scanning for software vulnerabilities.\u003c/li\u003e\n\u003cli\u003eDiscover and validate such vulnerabilities.\u003c/li\u003e\n\u003cli\u003eCoordinate and prioritize remediation and distribution of vulnerability patches.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this could improve how vulnerabilities are identified and addressed, especially in complex environments where software supply chains and AI models intersect.\u003c/p\u003e\n\n\u003ch2 id=\"covered-frontier-models-and-secure-deployment\"\u003eCovered Frontier Models and Secure Deployment\u003c/h2\u003e\n\n\u003cp\u003eThe Executive Order is described as introducing the concept of “covered frontier models.” The article defines these as advanced AI systems that meet certain thresholds of capability and potential risk.\u003c/p\u003e\n\n\u003cp\u003eWithin 60 days, Treasury, NSA, CISA, and others must develop a classified benchmarking process. The article says this process is intended to assess the advanced cyber capabilities of AI models and determine the threshold at which an AI model should be designated a covered frontier model.\u003c/p\u003e\n\n\u003cp\u003eThe article also says those entities must design a voluntary framework for AI developers to engage with the federal government before releasing advanced models. Under that framework, developers can provide up to 30 days of pre-release access to covered frontier models for evaluation and security testing.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the order does not impose mandatory licensing or pre-approval requirements. It frames this as reinforcing a commitment to innovation while encouraging responsible deployment.\u003c/p\u003e\n\n\u003ch2 id=\"enforcement-against-ai-enabled-threats\"\u003eEnforcement Against AI-Enabled Threats\u003c/h2\u003e\n\n\u003cp\u003eThe article says the order prioritizes enforcement against criminal activity involving AI. Examples given include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnauthorized system access.\u003c/li\u003e\n\u003cli\u003eData breaches.\u003c/li\u003e\n\u003cli\u003eFraud.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that this reflects the reality that AI is not only a defensive tool. It is also being used offensively by threat actors. Agencies are described as needing to prepare for AI-driven attacks that are faster, more automated, and harder to detect.\u003c/p\u003e\n\n\u003ch2 id=\"federal-workforce-investments\"\u003eFederal Workforce Investments\u003c/h2\u003e\n\n\u003cp\u003eThe order also addresses workforce needs. The article says it calls for expanding federal cybersecurity hiring pathways.\u003c/p\u003e\n\n\u003cp\u003eThis includes strengthening programs to recruit and place cybersecurity professionals across government. The article presents this as recognition that technology alone is not enough.\u003c/p\u003e\n\n\u003ch2 id=\"implications-for-federal-leaders\"\u003eImplications for Federal Leaders\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several key realities for federal agencies and leaders:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAI adoption and cybersecurity are now inseparable.\u003c/li\u003e\n\u003cli\u003eSpeed matters because many directives have aggressive timelines.\u003c/li\u003e\n\u003cli\u003eCollaboration is essential because the government will rely increasingly on partnerships with industry.\u003c/li\u003e\n\u003cli\u003eVisibility and control are foundational because agencies must understand where AI is being used, how data flows through systems, and where risk exists.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"netskope-s-positioning\"\u003eNetskope’s Positioning\u003c/h2\u003e\n\n\u003cp\u003eThe article closes by describing how Netskope says it can help federal agencies translate policy into action. Netskope presents its approach as unified and data-centric across cloud, SaaS, web, private applications, and AI.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several capabilities Netskope says it provides:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVisibility into AI usage across users, applications, and emerging AI services.\u003c/li\u003e\n\u003cli\u003eReal-time protection of sensitive data.\u003c/li\u003e\n\u003cli\u003eGuardrails to prevent exposure through AI prompts, outputs, and model interactions.\u003c/li\u003e\n\u003cli\u003eDetection and blocking of AI-specific threats such as prompt injection and jailbreaks.\u003c/li\u003e\n\u003cli\u003eConsistent enforcement of zero trust principles.\u003c/li\u003e\n\u003cli\u003eLeast privilege across environments.\u003c/li\u003e\n\u003cli\u003eRed teaming capabilities to validate AI systems against real-world attack techniques.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that these capabilities are intended to reduce operational and mission risk before vulnerabilities reach production.\u003c/p\u003e\n","keyPoints":["The June 2, 2026 Executive Order on AI directs federal agencies to accelerate AI adoption while strengthening cybersecurity and national security protections.","The order calls for the Secretary of Homeland Security, through CISA and in consultation with OMB, to release Binding Operational Directives within 30 days to strengthen protections across federal environments.","The order requires the creation of an AI cybersecurity clearinghouse to coordinate vulnerability scanning, validation, remediation prioritization, and patch distribution with AI industry and critical infrastructure operators.","The order directs Treasury, NSA, CISA, and others to develop a classified benchmarking process within 60 days to assess advanced cyber capabilities of AI models and identify thresholds for covered frontier models.","Netskope states that it can help federal agencies secure AI usage by providing visibility, data protection, AI-specific threat detection, zero trust enforcement, and red teaming capabilities."],"insights":["Federal agencies should prepare for compressed implementation timelines because the order places several major cybersecurity and AI security actions on 30- to 60-day deadlines.","The order treats AI model security and software vulnerability management as connected issues by creating a clearinghouse focused on vulnerability scanning, validation, remediation, and patch distribution where software supply chains and AI models may intersect.","The voluntary pre-release framework gives AI developers a way to provide up to 30 days of access to covered frontier models for federal evaluation without creating mandatory licensing or pre-approval requirements.","Agencies are expected to improve visibility across systems, data flows, and AI usage because the article emphasizes that AI adoption and cybersecurity are now inseparable.","The order’s focus on AI-enabled criminal activity indicates agencies must account for adversaries using AI offensively, not only adopt AI as a defensive capability."],"referencedReports":[],"body":"\u003cp\u003eOn June 2, 2026, a new Executive Order on AI titled “Promoting Advanced Artificial Intelligence Innovation and Security” was issued. The article says the order continues a federal shift toward AI innovation, security, and adoption while emphasizing that the United States must lead in AI without compromising national security. For federal agencies, the order is presented as an acceleration of existing priorities rather than a set of entirely new concepts.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights several near-term actions agencies should expect, including rapid prioritization of cyber defense and Binding Operational Directives from the Secretary of Homeland Security through CISA in consultation with OMB. It also describes plans to expand AI-enabled cybersecurity capabilities and create an AI cybersecurity clearinghouse involving Treasury, the National Cyber Director, NSA, CISA, AI industry, and critical infrastructure operators. The clearinghouse is intended to coordinate vulnerability scanning, validation, remediation prioritization, and patch distribution.\u003c/p\u003e\n\n\u003cp\u003eThe order also addresses “covered frontier models,” calling for a classified benchmarking process within 60 days to assess advanced cyber capabilities of AI models. It outlines a voluntary framework that could allow AI developers to provide up to 30 days of pre-release access to covered frontier models for evaluation and security testing. The article concludes by positioning Netskope’s AI security capabilities as a way for federal agencies to improve visibility, data protection, AI-specific threat detection, zero trust enforcement, and red teaming.\u003c/p\u003e\n"},{"n":1,"title":"Health Care and Social Assistance Threat Landscape Report","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/health-care-and-social-assistance-threat-landscape-report/","time":"18:25","priority":"MAY READ","score":55,"tldr":"ReliaQuest’s Q1 2026 report summarizes the main cyber threats facing the health care and social assistance sector, including ransomware and data-leak activity, vulnerability exploitation, attacker targeting, common techniques, data exposure risks, and targeted countries.","briefOverview":"\u003cp\u003eThe article announces the Health Care and Social Assistance Threat Landscape Report, dated June 5, 2026. It states that the report covers the period from January 1 to March 31, 2026. The report is presented as a ReliaQuest publication associated with Health-ISAC.\u003c/p\u003e\n\n\u003cp\u003eThe article says the report provides insights into ransomware and data-leak sites, vulnerability exploitation, attacker target insights, top techniques, data risk protection, and countries targeted. It does not name specific threat actors, malware families, vulnerabilities, victims, or countries in the text provided. ReliaQuest is described as a Champion with Health-ISAC Community Services.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is titled “Health Care and Social Assistance Threat Landscape Report” and is dated June 5, 2026. It identifies the reporting period as January 1 to March 31, 2026. The report is presented on the Health-ISAC site and is associated with ReliaQuest.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the ReliaQuest report provides insights into multiple threat landscape areas. These areas include ransomware and data-leak sites, vulnerability exploitation, attacker target insights, top techniques, data risk protection, and countries targeted. The article does not provide the detailed findings for those areas in the text shown.\u003c/p\u003e\n\n\u003cp\u003eThe affected sector identified by the title is health care and social assistance. The article also includes tags for Community Services, Cyber Vulnerability, Data Breach, and White Paper. ReliaQuest is described as a Champion with Health-ISAC Community Services.\u003c/p\u003e\n\n\u003cp\u003eNo specific cyber incident is described in the article. No named threat actor, malware family, exploited product, CVE, or victim organization is identified in the text provided. No specific impact, mitigation, or response action is disclosed.\u003c/p\u003e\n\n\u003cp\u003eThe article includes a list of related Health-ISAC resources and news items. These include items on agentic AI in healthcare, medical device security analysis, healthcare vulnerabilities, HIPAA-related inventory and PHI mapping, social engineering attacks, human cyber risk, and credential worms. The article itself does not summarize those related resources beyond listing their titles and links.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article announces the “Health Care and Social Assistance Threat Landscape Report,” dated June 5, 2026. It states that the report covers the period from January 1 to March 31, 2026. The report is attributed to ReliaQuest and appears on the Health-ISAC website.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies the report as relevant to the health care and social assistance sector. It is tagged with Community Services, Cyber Vulnerability, Data Breach, and White Paper. ReliaQuest is described as a Champion with Health-ISAC Community Services.\u003c/p\u003e\n\n\u003ch2 id=\"report-scope\"\u003eReport Scope\u003c/h2\u003e\n\n\u003cp\u003eAccording to the article, the ReliaQuest report provides insights into the following areas:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRansomware and data-leak sites.\u003c/li\u003e\n\u003cli\u003eVulnerability exploitation.\u003c/li\u003e\n\u003cli\u003eAttacker target insights.\u003c/li\u003e\n\u003cli\u003eTop techniques.\u003c/li\u003e\n\u003cli\u003eData risk protection.\u003c/li\u003e\n\u003cli\u003eCountries targeted.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not include the underlying data, rankings, examples, or detailed findings from those sections. It also does not identify any specific ransomware group, data-leak site operator, vulnerability, technique, or targeted country in the text provided.\u003c/p\u003e\n\n\u003ch2 id=\"sector-and-stakeholders\"\u003eSector and Stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe sector named in the article is health care and social assistance. Health-ISAC is the host organization for the page. ReliaQuest is the entity credited with providing the report.\u003c/p\u003e\n\n\u003cp\u003eThe article states that ReliaQuest is a Champion with Health-ISAC Community Services. No individual health care organization, social assistance organization, government agency, vendor, or affected victim is named as part of a specific event.\u003c/p\u003e\n\n\u003ch2 id=\"technical-and-threat-content\"\u003eTechnical and Threat Content\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several technical and threat-focused topics covered by the report, including vulnerability exploitation, top techniques, and data risk protection. It also references ransomware and data-leak sites as a report topic. However, the article does not provide specific technical details, such as exploited products, CVEs, malware names, intrusion methods, or defensive recommendations.\u003c/p\u003e\n\n\u003cp\u003eThe article mentions attacker target insights and countries targeted as included areas of coverage. It does not name any actor, target type, geography, or country in the visible text. As a result, the article functions as a high-level description of the report rather than a detailed technical analysis in the provided content.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-or-response\"\u003eDisclosed Impact or Response\u003c/h2\u003e\n\n\u003cp\u003eNo incident impact is disclosed in the article. The text does not describe any confirmed breach, disruption, expo
