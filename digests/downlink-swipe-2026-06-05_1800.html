<script>
window.__DL_ARTICLES = [{"n":3,"title":"ShinyHunters: Salesforce’s Uninvited Guest User Profile Breach | Mitiga","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/an-uninvited-guest","time":"20:42","priority":"MUST READ","score":94,"tldr":"ShinyHunters reportedly exploited misconfigured Salesforce Experience Cloud Guest User permissions, not a Salesforce vulnerability, to access CRM data through the public Aura endpoint at scale. Organizations using Salesforce Experience Cloud should immediately audit guest access, disable guest API permissions, and monitor /s/sfsites/aura traffic for bulk unauthenticated queries.","briefOverview":"\u003cp\u003eShinyHunters reportedly targeted misconfigured Salesforce Experience Cloud sites by abusing Guest User Profile settings rather than exploiting a Salesforce platform vulnerability. The article says the issue arises when anonymous guest users are granted access to internal CRM objects, allowing unauthenticated internet users to retrieve data intended to remain private. It emphasizes that this is a configuration problem and that there is no platform-level patch coming.\u003c/p\u003e\n\n\u003cp\u003eThe reported attack involved a modified version of Mandiant’s open-source AuraInspector auditing tool, which was allegedly repurposed to scan Salesforce sites and exploit the public \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e endpoint at scale. The article describes an attack flow involving mass scanning, identifying excessive guest permissions, querying CRM data as a guest, bypassing Salesforce’s 2,000-record query limit, and automating data exfiltration.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claims to have breached 300 to 400 organizations and extracted full CRM records, including customer names, phone numbers, financial data, and business relationships. The article warns that stolen CRM data can later be reused for phishing, vishing, identity fraud, extortion, regulatory exposure, and reputational damage. It recommends immediate review of guest permissions, disabling guest API access, hardening sharing settings, and monitoring Aura endpoint traffic for abnormal unauthenticated activity.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes a Salesforce Experience Cloud exposure in which ShinyHunters reportedly abused misconfigured Guest User Profile permissions rather than hacking Salesforce itself. Guest User Profiles are meant to let anonymous visitors access public resources such as help centers, knowledge bases, or product catalogs. If administrators grant those guest users access to internal CRM objects, unauthenticated users on the internet can access data such as customer records, contacts, or financial information.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the attack centered on the public \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e endpoint, which supports Salesforce’s Aura, or Lightning, frontend framework. ShinyHunters reportedly modified Mandiant’s legitimate open-source AuraInspector auditing tool to automate mass scanning, identify sites with overly permissive guest permissions, and extract data from vulnerable endpoints. The article stresses that the endpoint is public by design, which can make abuse blend into normal traffic if organizations are not monitoring guest user activity.\u003c/p\u003e\n\n\u003cp\u003eThe article outlines an attack flow in which attackers scan public Salesforce Experience Cloud sites, identify misconfigured Guest User Profiles, target the Aura API endpoint, and query CRM records as unauthenticated guests when API access is enabled. It also says Salesforce limits API queries to 2,000 records at a time, but ShinyHunters found a way to bypass that limit. The modified tool was allegedly used to automate data exfiltration at scale.\u003c/p\u003e\n\n\u003cp\u003eThe reported impact is significant because ShinyHunters claims to have breached 300 to 400 organizations and extracted full CRM records. The article lists exposed data types as customer names, phone numbers, financial data, and business relationships. It says affected organizations may face extortion demands, regulatory violations under privacy laws such as GDPR, and reputational damage, while exposed individuals may later be targeted through phishing, vishing, identity fraud, and related activity.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends several detection and remediation steps for organizations using Salesforce Experience Cloud. Detection measures include monitoring high-volume requests to \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e, unusual CRM object queries from unauthenticated sessions, large response payloads from guest sessions, WAF logs, Salesforce Event Monitoring, and Salesforce Shield where available. Remediation steps include disabling guest user API access, documenting current permissions, setting organization-wide defaults to private for sensitive objects, enabling secure guest user record access, reviewing Guest User Sharing Rules, restricting field-level access to sensitive data, and scheduling recurring guest access reviews.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that the reported ShinyHunters activity against Salesforce customers is not a Salesforce platform hack, but an abuse of misconfigured Salesforce Experience Cloud Guest User Profile settings. The central issue is that Experience Cloud sites can expose a public guest user for legitimate anonymous access, but administrators may mistakenly grant that guest user access to internal CRM objects. When that happens, unauthenticated users on the internet can potentially access sensitive Salesforce data.\u003c/p\u003e\n\n\u003cp\u003eThe article’s core message is that this is a misconfiguration problem rather than a platform vulnerability. Because the exposure depends on customer configuration, the article says there is no patch coming. It warns that organizations using Salesforce Experience Cloud must audit and harden their own guest access settings.\u003c/p\u003e\n\n\u003ch2 id=\"guest-user-profile-exposure\"\u003eGuest User Profile Exposure\u003c/h2\u003e\n\n\u003cp\u003eSalesforce Experience sites use Guest User Profiles to allow anonymous visitors to access public-facing content. The article gives examples such as company help centers, public knowledge bases, and product catalogs. This functionality is legitimate, but its permissions determine what anonymous visitors can access.\u003c/p\u003e\n\n\u003cp\u003eThe article says the risk emerges when administrators grant the guest profile access to internal CRM objects. These objects may include records such as customer records, contacts, or financial data. If the guest profile has excessive permissions, anonymous internet users, including threat actors, can interact with functionality that should not be exposed.\u003c/p\u003e\n\n\u003ch2 id=\"reported-role-of-shinyhunters-and-aurainspector\"\u003eReported Role of ShinyHunters and AuraInspector\u003c/h2\u003e\n\n\u003cp\u003eThe article attributes the activity to ShinyHunters, described as a well-known cybercriminal group responsible for multiple high-profile data breaches. It says ShinyHunters claimed to have modified AuraInspector, an open-source auditing tool developed by Mandiant, which is part of Google. AuraInspector was originally designed for legitimate administrative and debugging purposes involving Aura components and the \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e endpoint in Salesforce environments.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, if ShinyHunters’ claim is accurate, the modified tool could be used to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAutomate mass scanning across thousands of Salesforce sites.\u003c/li\u003e\n\u003cli\u003eIdentify sites with misconfigured Guest User Profiles and interesting permissions.\u003c/li\u003e\n\u003cli\u003eAutomatically extract data from vulnerable endpoints at scale.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that a defensive auditing tool was reportedly repurposed into an attack tool by using the same visibility it provides to find and exploit the very issues it identifies.\u003c/p\u003e\n\n\u003ch2 id=\"technical-attack-flow\"\u003eTechnical Attack Flow\u003c/h2\u003e\n\n\u003cp\u003eThe article presents a step-by-step attack flow involving Salesforce Experience Cloud sites and the Aura endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe described process includes:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eMass scanning:\u003c/strong\u003e Attackers automate scanning across thousands of public Salesforce Experience Cloud sites.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTarget identification:\u003c/strong\u003e Attackers look for Guest User Profiles with excessive permissions.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAura endpoint targeting:\u003c/strong\u003e Attackers send requests to \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e, the backend API that powers Salesforce’s Aura, or Lightning, frontend framework.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCRM queries as a guest:\u003c/strong\u003e If the guest profile has API access enabled and sufficient object permissions, unauthenticated requests can query internal CRM records.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRecord limit bypass:\u003c/strong\u003e The article says Salesforce limits API queries to 2,000 records at a time, but ShinyHunters found a way to bypass that limit.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAutomated exfiltration:\u003c/strong\u003e The modified AuraInspector tool is described as enabling mass extraction of data.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe article explains that \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e is public by design because the Experience Cloud site needs it to function. It also notes that Aura is powerful because its components communicate through events and attributes and can access the Salesforce Apex server to retrieve or update data. This combination makes excessive guest access especially dangerous.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-activity-can-be-difficult-to-notice\"\u003eWhy the Activity Can Be Difficult to Notice\u003c/h2\u003e\n\n\u003cp\u003eThe article says the attack is effective because several conditions align. Salesforce is described as a complex platform, and configuring Experience Cloud correctly requires deep understanding of the Salesforce permission model. The article specifically notes that many administrators may not fully understand the implications of enabling API access on a guest profile.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights that the activity requires no authentication. Attackers do not need stolen credentials, a software vulnerability, MFA bypass, or another authentication bypass technique. Anyone on the internet can attempt to access an exposed configuration.\u003c/p\u003e\n\n\u003cp\u003eBecause the Aura endpoint is public by design, the article says malicious activity may blend in with normal traffic. It notes that security teams may not have been monitoring guest user query volumes, often focusing instead on network perimeters and endpoints rather than Salesforce API logs.\u003c/p\u003e\n\n\u003cp\u003eThe article summarizes the risk as: a powerful public API plus overly permissive anonymous access plus lack of monitoring can result in a database being exposed to anyone on the internet.\u003c/p\u003e\n\n\u003ch2 id=\"reported-impact\"\u003eReported Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article says ShinyHunters claims to have breached 300 to 400 organizations. It states that the group allegedly extracted full CRM records, including customer names, phone numbers, financial data, and business relationships. The article also says many affected companies still do not know they were targeted and breached.\u003c/p\u003e\n\n\u003cp\u003eThe business risks described include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExtortion demands.\u003c/li\u003e\n\u003cli\u003eRegulatory violations under privacy laws such as GDPR.\u003c/li\u003e\n\u003cli\u003eReputational damage.\u003c/li\u003e\n\u003cli\u003eExposure of customers and individuals represented in the stolen data.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article stresses that stolen CRM data does not remain static. It says the data can circulate, be resold, and later return in targeted phishing emails, vishing calls, identity fraud, and other follow-on activity.\u003c/p\u003e\n\n\u003ch2 id=\"follow-on-attack-patterns\"\u003eFollow-On Attack Patterns\u003c/h2\u003e\n\n\u003cp\u003eThe article links stolen CRM data to more sophisticated follow-on campaigns. It states that Palo Alto Networks Unit 42 documented incidents involving voice-based phishing, or vishing, attacks that used exfiltrated contact information since late December 2025. The affected sectors named in the article include financial services, manufacturing, professional and legal services, and wholesale and retail.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that in one documented case, threat actors moved from initial access to complete data exfiltration in under 60 seconds. It says the speed and precision suggested extensive preparation using stolen CRM data. It further notes Unit 42 analysis saying identity weakness played a role in 89% of incident response cases in 2025, with 65% involving identity-based initial access techniques.\u003c/p\u003e\n\n\u003ch2 id=\"detection-recommendations\"\u003eDetection Recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe article says the attack is relatively easy to detect if an organization actively logs Aura endpoint traffic. It recommends watching for activity tied to \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e, because the known attack activity hits that endpoint.\u003c/p\u003e\n\n\u003cp\u003eRecommended indicators include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHigh request volume to \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eUnusual request patterns querying CRM objects such as Contacts and Accounts from unauthenticated sessions.\u003c/li\u003e\n\u003cli\u003eLarge response payloads from guest or anonymous sessions.\u003c/li\u003e\n\u003cli\u003eRepeated high-volume unauthenticated requests seen in WAF logs.\u003c/li\u003e\n\u003cli\u003eSequential pagination patterns that appear to step through CRM records in chunks.\u003c/li\u003e\n\u003cli\u003eAuraInspector-like query structures targeting CRM objects in rapid succession.\u003c/li\u003e\n\u003cli\u003eIP addresses generating bulk unauthenticated API call volumes.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor organizations with Salesforce Event Monitoring, the article recommends looking for guest user sessions querying sensitive objects, abnormally large returned record counts, and repeated near-identical queries occurring at machine speed.\u003c/p\u003e\n\n\u003cp\u003eFor organizations with Salesforce Shield, the article recommends using Field Audit Trail and Platform Encryption, and says Shield enhances event visibility for detecting abnormal data access patterns.\u003c/p\u003e\n\n\u003ch2 id=\"immediate-exposure-check\"\u003eImmediate Exposure Check\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies a fast way to determine whether an organization is vulnerable. Administrators should go to Setup and review the Guest User profile of the relevant Experience Cloud site. They should examine which objects and fields have Read access.\u003c/p\u003e\n\n\u003cp\u003eThe article says that if the guest profile has access to Contacts, Accounts, or any sensitive object, the organization is exposed.\u003c/p\u003e\n\n\u003ch2 id=\"remediation-checklist\"\u003eRemediation Checklist\u003c/h2\u003e\n\n\u003cp\u003eThe article provides a staged remediation checklist with an estimated total time of 45 minutes.\u003c/p\u003e\n\n\u003ch3 id=\"emergency-containment\"\u003eEmergency containment\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends immediately unchecking \u003cstrong\u003eAPI Enabled\u003c/strong\u003e in guest user System Permissions. It also recommends documenting the current guest user permission configuration before making changes.\u003c/p\u003e\n\n\u003ch3 id=\"configuration-hardening\"\u003eConfiguration hardening\u003c/h3\u003e\n\n\u003cp\u003eThe recommended hardening steps are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSet Organization-Wide Defaults to \u003cstrong\u003ePrivate\u003c/strong\u003e for all sensitive objects.\u003c/li\u003e\n\u003cli\u003eEnable \u003cstrong\u003eSecure guest user record access\u003c/strong\u003e in Sharing Settings.\u003c/li\u003e\n\u003cli\u003eReview all existing Guest User Sharing Rules and restrict their scope.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"data-protection-enhancement\"\u003eData protection enhancement\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eImplementing Enhanced Personal Information Masking for sensitive fields.\u003c/li\u003e\n\u003cli\u003eConfiguring field-level security to restrict access to personally identifiable information fields.\u003c/li\u003e\n\u003cli\u003eSetting guest user session timeout to maximum restrictiveness.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"ongoing-monitoring\"\u003eOngoing monitoring\u003c/h3\u003e\n\n\u003cp\u003eFor continued monitoring, the article recommends:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDeploying Salesforce Shield for enhanced audit logging.\u003c/li\u003e\n\u003cli\u003eConfiguring WAF rules to detect bulk unauthenticated Aura requests.\u003c/li\u003e\n\u003cli\u003eScheduling monthly Guest User Sharing Rule access reviews.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-significance\"\u003eBroader Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article frames the incident as an example of attackers targeting misconfigurations rather than software vulnerabilities. It says ShinyHunters did not invent a new attack class, but found an old and overlooked exposure and scaled it. The article argues that the deeper issue is the gap between the complexity of enterprise platforms and organizations’ ability to secure them.\u003c/p\u003e\n\n\u003cp\u003eIt concludes that as enterprise software becomes more powerful and customizable, the attack surface grows. The article warns that attackers are locating and targeting misconfigured public-facing APIs on trusted enterprise platforms. It urges organizations using Salesforce Experience Cloud to audit Guest User permissions and monitor Aura and other internet-facing endpoints.\u003c/p\u003e\n","keyPoints":["The article says ShinyHunters did not hack Salesforce itself but abused misconfigured Salesforce Experience Cloud Guest User Profile permissions that exposed data to unauthenticated users.","ShinyHunters reportedly modified Mandiant’s open-source AuraInspector tool to scan Salesforce sites, identify overly permissive guest profiles, and extract data through the /s/sfsites/aura endpoint at scale.","The article states that unauthenticated attackers can query internal CRM records when guest user profiles have API access enabled and permissions to sensitive objects such as Contacts or Accounts.","ShinyHunters claims to have breached 300 to 400 organizations and extracted CRM records including customer names, phone numbers, financial data, and business relationships.","The article recommends disabling API access for guest users, reviewing guest object and field permissions, enabling secure guest user record access, and monitoring /s/sfsites/aura traffic for high-volume unauthenticated queries."],"insights":["There is no platform patch expected because the exposure comes from customer-controlled Salesforce Guest User Profile configuration rather than a Salesforce software vulnerability.","The article highlights that legitimate /s/sfsites/aura traffic can make malicious activity easy to miss unless teams specifically monitor guest user query volumes and response sizes.","The same auditing visibility provided by Mandiant’s AuraInspector reportedly enabled attackers to automate discovery and exploitation of the misconfigurations it was designed to help defenders find.","A fast initial exposure check is to review the Experience Cloud site’s Guest User profile for Read access to sensitive Salesforce objects such as Contacts, Accounts, or other internal CRM data.","The article says stolen CRM data has downstream value beyond extortion because it can be reused for targeted phishing, vishing, identity fraud, and other follow-on campaigns."],"referencedReports":[],"body":"\u003cp\u003eShinyHunters reportedly targeted misconfigured Salesforce Experience Cloud sites by abusing Guest User Profile settings rather than exploiting a Salesforce platform vulnerability. The article says the issue arises when anonymous guest users are granted access to internal CRM objects, allowing unauthenticated internet users to retrieve data intended to remain private. It emphasizes that this is a configuration problem and that there is no platform-level patch coming.\u003c/p\u003e\n\n\u003cp\u003eThe reported attack involved a modified version of Mandiant’s open-source AuraInspector auditing tool, which was allegedly repurposed to scan Salesforce sites and exploit the public \u003ccode\u003e/s/sfsites/aura\u003c/code\u003e endpoint at scale. The article describes an attack flow involving mass scanning, identifying excessive guest permissions, querying CRM data as a guest, bypassing Salesforce’s 2,000-record query limit, and automating data exfiltration.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claims to have breached 300 to 400 organizations and extracted full CRM records, including customer names, phone numbers, financial data, and business relationships. The article warns that stolen CRM data can later be reused for phishing, vishing, identity fraud, extortion, regulatory exposure, and reputational damage. It recommends immediate review of guest permissions, disabling guest API access, hardening sharing settings, and monitoring Aura endpoint traffic for abnormal unauthenticated activity.\u003c/p\u003e\n"},{"n":4,"title":"The Domino Effect of a Software Supply Chain Attack","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/the-domino-effect","time":"20:42","priority":"MUST READ","score":94,"tldr":"A misconfigured GitHub Actions pull_request_target workflow let TeamPCP steal credentials and rapidly compromise multiple software supply chain ecosystems, including GitHub, Docker Hub, npm, Open VSX, and PyPI. The key lesson is that mutable tags, over-permissioned CI/CD secrets, and weak cross-platform correlation can turn one exposed token into a broad cascading compromise.","briefOverview":"\u003cp\u003eIn March 2026, a threat actor known as TeamPCP used a misconfigured GitHub Actions workflow in Aqua Security’s Trivy repository to obtain credentials and expand across multiple software ecosystems. The campaign affected GitHub Actions, Docker Hub, npm, the Open VSX Registry, and PyPI. The article says more than 1,000 SaaS environments were actively impacted, with a projection that the number could grow to 10,000.\u003c/p\u003e\n\n\u003cp\u003eThe initial entry point was a pull_request_target workflow that executed external contributor code with access to secrets, exposing the aqua-bot Personal Access Token. TeamPCP later used the stolen token to force-push Trivy Action release tags to malicious commits, allowing pipelines that referenced those tags to pull attacker-controlled code. The payload stole secrets, exfiltrated them, and then ran the legitimate Trivy scanner so workflows appeared to complete normally.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central takeaway is that software supply chain attacks can move faster than human response when CI/CD secrets, mutable tags, cached package tokens, and over-permissioned service accounts align. It argues that detection must correlate activity across GitHub, container registries, package managers, and cloud infrastructure. It also highlights AI-assisted development as an accelerant because tools may pull transitive dependencies without human review.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes a March 2026 software supply chain campaign attributed to TeamPCP that began with a single pull request and expanded into five ecosystems in less than a week. The entry point was a misconfigured GitHub Actions pull_request_target workflow in Aqua Security’s Trivy vulnerability scanner. Because this workflow ran in the context of the base repository with access to secrets, it exposed the aqua-bot service account Personal Access Token.\u003c/p\u003e\n\n\u003cp\u003eTeamPCP later returned and used the stolen PAT to force-push nearly all release tags in aquasecurity/trivy-action to malicious commits. The article emphasizes that no new releases or branch pushes were needed because Git tags are mutable. CI/CD pipelines referencing version tags such as v0.69.4 instead of immutable commit SHAs then pulled attacker-controlled code.\u003c/p\u003e\n\n\u003cp\u003eThe malicious Trivy payload searched process memory and filesystems for secrets, encrypted the stolen data, and exfiltrated it to a typosquatted domain. It then executed the legitimate Trivy scanner so workflows appeared to complete normally. Malicious Docker Hub images for Trivy versions 0.69.4 through 0.69.6 also established persistence through a systemd service that polled an Internet Computer Protocol canister.\u003c/p\u003e\n\n\u003cp\u003eThe campaign then spread through credentials harvested from compromised CI environments and developer machines. TeamPCP deployed CanisterWorm, which the article describes as the first publicly documented malware to use ICP canisters for command and control, to scan infected machines for npm tokens and publish malicious package versions automatically. The same actor was also linked with high confidence to rewritten Checkmarx KICS GitHub Action tags and malicious VS Code extensions in the Open VSX Registry, based on identical encryption keys and shared exfiltration methods.\u003c/p\u003e\n\n\u003cp\u003eThe final known phase targeted LiteLLM, a Python AI gateway proxy, through malicious versions published directly to PyPI. The payload used a .pth file that Python loads automatically at startup, harvested credentials, attempted Kubernetes lateral movement through privileged pods, and installed a persistent backdoor. The article states that malicious LiteLLM packages were available for several hours before being quarantined.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that the attack succeeded because of mutable tags, secrets in workflows, over-permissioned service accounts, cached tokens, normal-looking behavior, and lack of cross-platform correlation. It provides detection logic for each phase, including monitoring pull_request_target workflows with secrets access, dormant identities performing privileged operations, tag rewrites, bulk token creation, ServiceAccount token requests, privileged pod creation, and new DaemonSets or CronJobs. Its broader message is that organizations need cross-platform detection that matches the speed of modern software supply chain attacks, especially as AI-assisted development expands dependency chains.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article analyzes a March 2026 software supply chain campaign attributed to a threat actor known as TeamPCP. The campaign began with a misconfigured GitHub Actions workflow in Aqua Security’s Trivy repository and expanded across GitHub Actions, Docker Hub, npm, the Open VSX Registry, and PyPI. According to the article, Mandiant CTO Charles Carmakal said more than 1,000 SaaS environments were actively impacted and projected that the number could grow to 10,000.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the campaign as an example of how a single pull request can cascade into broad platform compromise when automated CI/CD systems execute untrusted code with access to secrets. It focuses less on recounting the already documented campaign and more on concrete detection logic for each phase of the kill chain. It also stresses that isolated platform monitoring is insufficient because the full pattern only emerges when activity is correlated across ecosystems.\u003c/p\u003e\n\n\u003ch2 id=\"what-made-the-attack-possible\"\u003eWhat Made the Attack Possible\u003c/h2\u003e\n\n\u003cp\u003eThe article describes modern software supply chains as automated pipelines that pull code, run tests, sign artifacts, and publish releases. These pipelines often hold high-value secrets such as API tokens, service account credentials, signing keys, and publishing tokens. The core risk is that these automated systems trust the code they execute.\u003c/p\u003e\n\n\u003cp\u003eA central example is GitHub Actions workflows triggered by pull_request_target. Unlike standard pull_request triggers, pull_request_target runs in the context of the base repository and can have access to secrets and write permissions even when the pull request comes from an external contributor. The article says this behavior is by design and was exactly what TeamPCP exploited.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies several architectural decisions that enabled the campaign:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGit tags are mutable and can be silently rewritten.\u003c/li\u003e\n\u003cli\u003eWorkflows using pull_request_target can expose secrets to external contributors if misconfigured.\u003c/li\u003e\n\u003cli\u003eService accounts can be over-permissioned beyond their intended CI/CD role.\u003c/li\u003e\n\u003cli\u003eCached npm and PyPI tokens on developer machines can become lateral movement vectors.\u003c/li\u003e\n\u003cli\u003eMalicious code can execute legitimate tools afterward, making CI jobs appear normal.\u003c/li\u003e\n\u003cli\u003eMonitoring systems often lack cross-platform correlation across GitHub, Docker Hub, npm, PyPI, Kubernetes, and other environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"phase-1-initial-credential-theft\"\u003ePhase 1: Initial Credential Theft\u003c/h2\u003e\n\n\u003cp\u003eThe campaign began when TeamPCP submitted a pull request to Aqua Security’s Trivy repository. A misconfigured pull_request_target workflow executed with access to secrets and exposed the aqua-bot service account’s Personal Access Token. Aqua attempted credential rotation, but the article says residual access remained.\u003c/p\u003e\n\n\u003cp\u003eThe article calls this type of event the single highest-signal detection opportunity for this class of attack. It recommends querying GitHub audit logs for workflow runs where the event is pull_request_target and secrets were passed to the job context. It also recommends flagging runs triggered by contributors outside the organization, especially first-time contributors with no prior repository activity.\u003c/p\u003e\n\n\u003ch2 id=\"phase-2-tag-hijacking-and-malicious-trivy-action-code\"\u003ePhase 2: Tag Hijacking and Malicious Trivy Action Code\u003c/h2\u003e\n\n\u003cp\u003eWeeks after the initial credential theft, TeamPCP used the stolen PAT to force-push nearly all release tags in aquasecurity/trivy-action to malicious commits. The article emphasizes that there were no new releases and no branch pushes, only silent tag rewrites. Pipelines referencing those version tags then pulled attacker-controlled code.\u003c/p\u003e\n\n\u003cp\u003eThe malicious payload scanned process memory and filesystems for secrets. It encrypted the stolen data and exfiltrated it to a typosquatted domain. Afterward, it executed the legitimate Trivy scanner so workflows appeared to complete normally.\u003c/p\u003e\n\n\u003cp\u003eThe article also says malicious Docker Hub images for Trivy versions 0.69.4, 0.69.5, and 0.69.6 established persistence through a systemd service. That service polled an Internet Computer Protocol canister, which the article describes as blockchain-hosted infrastructure resistant to traditional domain takedowns.\u003c/p\u003e\n\n\u003cp\u003eFor detection, the article recommends monitoring dormant identities that suddenly perform privileged operations. It also recommends tracking anomalous repository access scope by identity and alerting on spikes in the number of repositories accessed. Tag rewrites on release repositories are highlighted as especially suspicious because rewriting existing release tags is rare in normal operations.\u003c/p\u003e\n\n\u003ch2 id=\"phase-3-spread-through-npm-open-vsx-and-additional-github-actions\"\u003ePhase 3: Spread Through npm, Open VSX, and Additional GitHub Actions\u003c/h2\u003e\n\n\u003cp\u003eCredentials harvested during the Trivy phase included npm authentication tokens cached on developer machines. TeamPCP then deployed CanisterWorm, which the article describes as the first publicly documented malware to use ICP canisters for command and control. The worm scanned infected machines for npm tokens and automatically published malicious versions of packages those tokens could access.\u003c/p\u003e\n\n\u003cp\u003eThe article says dozens of npm packages across multiple scopes were compromised. Three days later, TeamPCP used a compromised service account to rewrite all 35 tags in the Checkmarx KICS GitHub Action. The actor also published malicious VS Code extensions to the Open VSX Registry.\u003c/p\u003e\n\n\u003cp\u003eSecurity researchers confirmed with high confidence that the same actor was involved, based on identical encryption keys and shared exfiltration methodology. The article uses this phase to show how stolen credentials became lateral movement fuel across multiple platforms.\u003c/p\u003e\n\n\u003cp\u003eDetection recommendations for this stage include monitoring for bulk token creation, such as three or more personal access tokens created by one identity within one hour. The article also recommends watching for GitHub Actions secrets created or updated from unfamiliar infrastructure. OAuth or GitHub App authorizations with critical scopes such as repo, admin:org, or write:packages are also identified as credential escalation signals.\u003c/p\u003e\n\n\u003ch2 id=\"phase-4-litellm-and-pypi-compromise\"\u003ePhase 4: LiteLLM and PyPI Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe final known phase targeted LiteLLM, described in the article as a widely adopted Python AI gateway proxy present in many cloud environments. TeamPCP bypassed LiteLLM’s official CI/CD workflows and published malicious versions directly to PyPI. The malicious versions identified in the article are litellm 1.82.7 and 1.82.8.\u003c/p\u003e\n\n\u003cp\u003eThe payload used a .pth file, specifically a Python path configuration file that the interpreter loads automatically at startup. The article notes that this meant no explicit import was required. The payload harvested credentials, attempted Kubernetes lateral movement through privileged pods, and installed a persistent backdoor.\u003c/p\u003e\n\n\u003cp\u003eAccording to LiteLLM’s security disclosure as described in the article, the malicious packages were available for several hours before being quarantined. The article lists .pth files such as litellm_init.pth as a persistence indicator.\u003c/p\u003e\n\n\u003ch2 id=\"phase-5-kubernetes-lateral-movement\"\u003ePhase 5: Kubernetes Lateral Movement\u003c/h2\u003e\n\n\u003cp\u003eThe LiteLLM backdoor attempted Kubernetes lateral movement. The article highlights ServiceAccount token creation and privileged pod behavior as important signals. It recommends monitoring TokenRequest API activity in EKS, GKE, and AKS for service account tokens created by workloads or identities that do not normally request them.\u003c/p\u003e\n\n\u003cp\u003eThe article also recommends detecting pods created with privileged: true, hostPID: true, or volume mounts to the host filesystem. These are described as container escape attempts and rare enough in normal operations to warrant immediate alerts. New DaemonSets and CronJobs are also highlighted because DaemonSets can create cluster-wide persistence and CronJobs can provide scheduled persistence.\u003c/p\u003e\n\n\u003ch2 id=\"cross-platform-correlation-as-the-central-detection-lesson\"\u003eCross-Platform Correlation as the Central Detection Lesson\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that each phase of the TeamPCP campaign could appear plausible or isolated when viewed in a single platform. GitHub might show a suspicious workflow run and tag changes. Kubernetes might show an anomalous pod. npm, PyPI, Docker Hub, and Open VSX would each see only part of the activity.\u003c/p\u003e\n\n\u003cp\u003eThe campaign followed a temporal pattern described in the article as workflow abuse, credential theft, dormant account revival, tag rewrites across repositories, npm token abuse, additional GitHub Action compromise, PyPI package compromise, and Kubernetes lateral movement. The article says the pattern becomes visible only when identity behavior is correlated across GitHub, container registries, package managers, and cloud infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article’s key detection theme is that organizations should connect activity across platforms and time windows. This cross-platform view turns multiple isolated alerts into one investigation.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise-listed-in-the-article\"\u003eIndicators of Compromise Listed in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article provides several indicators of compromise for TeamPCP activity:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eC2 domains: scan.aquasecurtiy[.]org, models.litellm[.]cloud, checkmarx[.]zone.\u003c/li\u003e\n\u003cli\u003eC2 IPs: 45.148.10.212 and 83.142.209.11.\u003c/li\u003e\n\u003cli\u003eICP canister: tdtqy-oyaaa-aaaae-af2dq-cai.raw.icp0.io.\u003c/li\u003e\n\u003cli\u003eCloudflare Tunnel: plug-tab-protective-relay.trycloudflare.com.\u003c/li\u003e\n\u003cli\u003eMalicious PyPI packages: litellm 1.82.7 and 1.82.8.\u003c/li\u003e\n\u003cli\u003eMalicious Docker images: aquasec/trivy 0.69.4, 0.69.5, and 0.69.6.\u003c/li\u003e\n\u003cli\u003ePersistence mechanisms: systemd services named sysmon and .pth files such as litellm_init.pth.\u003c/li\u003e\n\u003cli\u003eGitHub repositories: tpcp-docs and docs-tpcp as exfiltration fallback repositories.\u003c/li\u003e\n\u003cli\u003eCompromised tags: nearly all trivy-action tags, seven setup-trivy tags, and 35 KICS tags.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says that finding any of these IOCs should lead defenders to assume active attack and follow the response checklist referenced in the post.\u003c/p\u003e\n\n\u003ch2 id=\"ai-assisted-development-as-an-accelerant\"\u003eAI-Assisted Development as an Accelerant\u003c/h2\u003e\n\n\u003cp\u003eThe article connects the LiteLLM compromise to AI-assisted development. It says the compromise was discovered when a researcher at FutureSearch was testing a Cursor MCP plugin that pulled LiteLLM as a transitive dependency. A bug in the malware crashed the machine, making the backdoor visible.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that no human had reviewed the package and no developer had consciously decided to install that version. Instead, an AI tool resolved the dependency and the compromised package was pulled in. The article uses this example to argue that AI-assisted development extends the trust chain and reduces human visibility into transitive dependencies.\u003c/p\u003e\n\n\u003cp\u003eIt also states that AI can accelerate both attack and detection. TeamPCP used AI agents to triage stolen credentials, while AI-assisted development can expose more attack surface by pulling dependencies without human review of each transitive package.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-significance\"\u003eImpact and Significance\u003c/h2\u003e\n\n\u003cp\u003eThe campaign compromised tools used across enterprise software development and security workflows, including Trivy, KICS, and LiteLLM. The article characterizes the campaign as a credential harvesting operation targeting high-value secrets in CI/CD environments. It also says many affected organizations may not yet know they were impacted.\u003c/p\u003e\n\n\u003cp\u003eThe article states that supply chain compromises can trigger regulatory reporting under SOX, PCI DSS, and GDPR. It argues that the 96-hour timeline from compromise to detection exceeds many breach notification windows, turning a security incident into a compliance crisis with board-level consequences.\u003c/p\u003e\n\n\u003cp\u003eThe final message is that the speed of supply chain attacks can exceed human response capacity. The article argues that organizations should not slow AI adoption, but should instead build detection capable of matching the speed of automated development and deployment environments.\u003c/p\u003e\n","keyPoints":["TeamPCP began the campaign by exploiting a misconfigured GitHub Actions pull_request_target workflow in Aqua Security’s Trivy repository, exposing the aqua-bot service account Personal Access Token.","Using the stolen PAT, TeamPCP force-pushed nearly all release tags in aquasecurity/trivy-action to malicious commits, causing pipelines that referenced those tags to pull attacker-controlled code.","The malicious Trivy payload searched process memory and filesystems for secrets, encrypted the stolen data, exfiltrated it to a typosquatted domain, and then ran the legitimate Trivy scanner so workflows appeared normal.","Credentials harvested from compromised environments enabled TeamPCP to spread into npm, the Open VSX Registry, Checkmarx KICS GitHub Action tags, and PyPI through malicious packages and extensions.","The article emphasizes that effective detection requires correlating identity behavior across GitHub, container registries, package managers, and cloud infrastructure rather than monitoring each platform in isolation."],"insights":["Referencing GitHub Actions by version tags instead of immutable commit SHAs creates a silent compromise path because attackers can rewrite existing tags without creating new releases or obvious branch activity.","A successful CI/CD compromise may leave no failed builds or obvious workflow errors because the malicious payload can run the legitimate tool after stealing secrets.","The article identifies external pull_request_target workflow runs with secrets access as the highest-signal detection opportunity for this class of supply chain attack.","The same attacker activity can appear as unrelated noise when GitHub, Docker Hub, npm, PyPI, and Kubernetes telemetry are monitored separately, making cross-platform identity correlation central to detection.","AI-assisted development can hide supply chain exposure because tools may resolve and install transitive dependencies without a developer consciously choosing or reviewing the affected package version."],"referencedReports":[],"body":"\u003cp\u003eIn March 2026, a threat actor known as TeamPCP used a misconfigured GitHub Actions workflow in Aqua Security’s Trivy repository to obtain credentials and expand across multiple software ecosystems. The campaign affected GitHub Actions, Docker Hub, npm, the Open VSX Registry, and PyPI. The article says more than 1,000 SaaS environments were actively impacted, with a projection that the number could grow to 10,000.\u003c/p\u003e\n\n\u003cp\u003eThe initial entry point was a pull_request_target workflow that executed external contributor code with access to secrets, exposing the aqua-bot Personal Access Token. TeamPCP later used the stolen token to force-push Trivy Action release tags to malicious commits, allowing pipelines that referenced those tags to pull attacker-controlled code. The payload stole secrets, exfiltrated them, and then ran the legitimate Trivy scanner so workflows appeared to complete normally.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central takeaway is that software supply chain attacks can move faster than human response when CI/CD secrets, mutable tags, cached package tokens, and over-permissioned service accounts align. It argues that detection must correlate activity across GitHub, container registries, package managers, and cloud infrastructure. It also highlights AI-assisted development as an accelerant because tools may pull transitive dependencies without human review.\u003c/p\u003e\n"},{"n":7,"title":"Chinese APT deploys new malware to keep access to hacked networks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/chinese-apt-deploys-new-malware-to-keep-access-to-hacked-networks/","time":"18:09","priority":"MUST READ","score":94,"tldr":"Chinese espionage group UNC5221/VerdantBamboo maintained long-term access to victim networks and an MSP using Brickstorm plus newly documented Plenet and AgentPSD backdoors. The campaign shows the group’s focus on persistence, stolen credentials, and devices that often lack EDR coverage, such as firewalls, NAS systems, and appliances.","briefOverview":"\u003cp\u003eChinese espionage group UNC5221, also tracked as VerdantBamboo, accessed Microsoft 365 environments using the Brickstorm backdoor and newly documented malware named Plenet and AgentPSD. Volexity’s investigation found that the threat actor had been present in a victim network for at least 18 months before detection. The group had also compromised the victim organization’s managed services provider.\u003c/p\u003e\n\n\u003cp\u003eThe activity is significant because VerdantBamboo maintained long-term access, returned after remediation, and used compromised appliances and infrastructure to re-establish access. The attackers used stolen credentials, Brickstorm proxying features, and SSL VPN access to blend in with legitimate traffic and bypass controls. Volexity assessed with high confidence that the Microsoft 365 access was designed to evade Conditional Access policies.\u003c/p\u003e\n\n\u003cp\u003eBrickstorm was deployed on systems including an Egnyte Storage Sync appliance, a pfSense firewall, and a retired Linux GroupWise email archive server. Plenet, also tracked by Google as Grimbolt, is a cross-platform .NET backdoor with shell, command execution, file manipulation, and C2 switching capabilities. AgentPSD is a Python-based reverse shell utility that Volexity believes was used as a fallback persistence mechanism.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eChinese espionage group UNC5221, also known as VerdantBamboo, used the Brickstorm backdoor and newly documented malware named Plenet and AgentPSD to maintain access to compromised environments. The group accessed Microsoft 365 environments and used systems such as Egnyte Storage Sync, Synology NAS, pfSense, and Linux servers during the activity described by Volexity. The investigation found that the threat actor had access to the victim network for at least 18 months before detection.\u003c/p\u003e\n\n\u003cp\u003eUNC5221 has been involved in attacks exploiting zero-day vulnerabilities in edge devices since at least 2023, according to the article. Brickstorm has previously been described as an advanced malware implant, with early variants written in Golang and later variants written in Rust. Google previously documented UNC5221 activity using Brickstorm, and CISA has warned about Brickstorm deployment by Chinese hackers against VMware vSphere servers.\u003c/p\u003e\n\n\u003cp\u003eIn the incident investigated by Volexity, VerdantBamboo compromised an Egnyte Storage Sync system and periodically accessed it through the victim’s web SSL VPN. From that foothold, the attackers used Brickstorm proxying features and stolen credentials to access the organization’s Microsoft 365 environment. Volexity assessed with high confidence that this was done to blend in with legitimate traffic and evade Conditional Access policies.\u003c/p\u003e\n\n\u003cp\u003eAfter remediation efforts, the threat actor breached the victim again using stolen credentials to enable and configure SSL VPN access on the victim’s firewall. The attackers then connected to internal systems and deployed additional custom malware to a Synology NAS device. Volexity’s investigation of the customer’s managed services provider found a BSD variant of Brickstorm on a pfSense firewall, which had also been compromised at least 18 months earlier.\u003c/p\u003e\n\n\u003cp\u003eThe newly described Plenet backdoor, also tracked by Google as Grimbolt, is a cross-platform .NET-based backdoor that provides interactive shell access, remote command execution, file manipulation, and C2 server switching. Volexity noted that Plenet is similar in design to Brickstorm because it uses WebSocket for command-and-control communications and a multiplexing library for simultaneous data streams. AgentPSD is a Python-based reverse shell utility that Volexity believes VerdantBamboo used as fallback persistence if other malware became inaccessible.\u003c/p\u003e\n\n\u003cp\u003eVolexity created a fingerprint to identify IP addresses and domains used by Brickstorm for command-and-control communication, but the threat actor took infrastructure offline before additional systems could be revealed. Between September 18 and September 23, all servers previously matching the pattern turned off services on port 443. Volexity described VerdantBamboo as a highly sophisticated threat actor that combines living-off-the-land techniques and malware and targets systems that do not support endpoint detection and response solutions.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eChinese espionage group UNC5221, also tracked as VerdantBamboo, accessed Microsoft 365 environments using the Brickstorm backdoor and newly documented malware named Plenet and AgentPSD. Volexity’s investigation found that the threat actor had gained access to the victim network at least 18 months before detection. The investigation also found that the victim organization’s managed services provider had been compromised.\u003c/p\u003e\n\n\u003cp\u003eUNC5221 has been involved in attacks exploiting zero-day vulnerabilities in edge devices since at least 2023. The group has used Brickstorm in environments belonging to multiple targets in the United States, remaining undetected for more than a year until breaches were discovered around March 2025. Researchers have described Brickstorm as an advanced malware implant, with initial variants written in Golang and later variants written in Rust.\u003c/p\u003e\n\n\u003ch2 id=\"prior-brickstorm-activity\"\u003ePrior Brickstorm Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Google documented UNC5221 activity using Brickstorm in April 2024 and again in September 2025. The September reporting described attacks against legal services, software-as-a-service providers, business process outsourcers, and technology companies. CISA also warned that Brickstorm was deployed by Chinese hackers against VMware vSphere servers.\u003c/p\u003e\n\n\u003cp\u003eMore recently, Google reported that Brickstorm was deployed by UNC6201 against Dell RecoverPoint for Virtual Machines. These references place Brickstorm within a broader set of intrusions involving Chinese threat actors and enterprise infrastructure. The article focuses on Volexity’s investigation into VerdantBamboo activity involving Brickstorm, Plenet, and AgentPSD.\u003c/p\u003e\n\n\u003ch2 id=\"initial-victim-compromise\"\u003eInitial Victim Compromise\u003c/h2\u003e\n\n\u003cp\u003eVolexity researchers responding to an incident found that VerdantBamboo had compromised an Egnyte Storage Sync system. The threat actor accessed that system periodically through the victim’s web SSL VPN. From this foothold, the attackers used Brickstorm proxying features and stolen credentials to access the victim organization’s Microsoft 365 environment.\u003c/p\u003e\n\n\u003cp\u003eVolexity assessed with high confidence that this Microsoft 365 access was intended to blend in with legitimate network traffic. The researchers said the approach helped evade Conditional Access policies that would otherwise have prevented access. Later analysis showed that the attackers had been present in the network for at least 18 months before being detected.\u003c/p\u003e\n\n\u003ch2 id=\"recompromise-after-remediation\"\u003eRecompromise After Remediation\u003c/h2\u003e\n\n\u003cp\u003eAfter Volexity completed remediation efforts, VerdantBamboo breached the organization again. In the second intrusion, the attackers used stolen credentials to enable and configure SSL VPN access on the victim’s firewall. They then connected to internal systems and deployed additional custom malware to a Synology NAS device.\u003c/p\u003e\n\n\u003cp\u003eThis second intrusion led Volexity to investigate the victim’s managed services provider. At the MSP, Volexity found that VerdantBamboo had planted a BSD variant of Brickstorm on a pfSense firewall. Volexity concluded that this firewall, like the victim organization’s Storage Sync system, had also been compromised at least 18 months earlier.\u003c/p\u003e\n\n\u003cp\u003eVolexity said it has medium confidence that the attacker pivoted from the MSP into the victim organization’s environment. Brickstorm was later deployed to the victim’s Egnyte Storage Sync appliance and to a retired Linux GroupWise email archive server.\u003c/p\u003e\n\n\u003ch2 id=\"malware-used-in-the-campaign\"\u003eMalware Used in the Campaign\u003c/h2\u003e\n\n\u003ch3 id=\"brickstorm\"\u003eBrickstorm\u003c/h3\u003e\n\n\u003cp\u003eBrickstorm is described in the article as an advanced malware implant. It was used by VerdantBamboo to maintain access and support proxying activity into the victim environment. Initial variants were written in Golang, while later variants were written in Rust.\u003c/p\u003e\n\n\u003cp\u003eBrickstorm was found on several systems in the investigated activity, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn Egnyte Storage Sync appliance.\u003c/li\u003e\n\u003cli\u003eA pfSense firewall at the managed services provider.\u003c/li\u003e\n\u003cli\u003eA retired Linux GroupWise email archive server.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"plenet-grimbolt\"\u003ePlenet / Grimbolt\u003c/h3\u003e\n\n\u003cp\u003eAfter returning to the victim’s infrastructure, the attackers deployed custom malware named Plenet to a Synology NAS appliance. Plenet is also tracked by Google as Grimbolt. It is a cross-platform .NET-based backdoor.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, Plenet provides:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInteractive shell access.\u003c/li\u003e\n\u003cli\u003eRemote command execution.\u003c/li\u003e\n\u003cli\u003eFile manipulation.\u003c/li\u003e\n\u003cli\u003eCommand-and-control server switching.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eVolexity noted that Plenet is similar in design to Brickstorm. Both use WebSocket protocol for command-and-control communications and a multiplexing library for simultaneous data streams to the server.\u003c/p\u003e\n\n\u003ch3 id=\"agentpsd\"\u003eAgentPSD\u003c/h3\u003e\n\n\u003cp\u003eAgentPSD is described as a simple Python-based reverse shell utility. Volexity believes VerdantBamboo used it as a fallback persistence mechanism in case other malware was no longer accessible. AgentPSD was configured to connect to a different domain than the one used by Brickstorm.\u003c/p\u003e\n\n\u003cp\u003eThe article states that AgentPSD was never used because Brickstorm was still running. This supported Volexity’s assessment that AgentPSD was a secondary access mechanism.\u003c/p\u003e\n\n\u003ch2 id=\"infrastructure-investigation\"\u003eInfrastructure Investigation\u003c/h2\u003e\n\n\u003cp\u003eDuring the investigation, Volexity attempted to identify infrastructure related to VerdantBamboo. The researchers created a fingerprint to identify IP addresses and domains used by Brickstorm for command-and-control communication. Multiple machines were identified through this approach.\u003c/p\u003e\n\n\u003cp\u003eHowever, the threat actor took the infrastructure offline before Volexity could reveal additional systems. Between September 18 and September 23, all servers previously matching the pattern turned off their services on port 443. Around that time, Google also published a new report on Brickstorm activity, which the article says may suggest the attacker was aware their operations were under investigation.\u003c/p\u003e\n\n\u003ch2 id=\"assessment-and-impact\"\u003eAssessment and Impact\u003c/h2\u003e\n\n\u003cp\u003eVolexity described VerdantBamboo/UNC5221 as a highly sophisticated threat actor. The group mixes living-off-the-land techniques with custom malware. The article states that the group targets systems that do not support endpoint detection and response solutions.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed impact includes long-term unauthorized access to the victim network, access to Microsoft 365, compromise of the victim’s managed services provider, and deployment of multiple backdoors across appliances and servers. Volexity compiled and published indicators of compromise linked to the investigated UNC5221 campaign.\u003c/p\u003e\n","keyPoints":["Chinese espionage group UNC5221, also tracked as VerdantBamboo, accessed Microsoft 365 environments using the Brickstorm backdoor and newly documented malware named Plenet and AgentPSD.","Volexity found that the threat actor had been present in the victim network for at least 18 months before detection and had also compromised the victim organization’s managed services provider.","After remediation, VerdantBamboo breached the organization again using stolen credentials to enable and configure SSL VPN access on the victim’s firewall and then deployed custom malware to a Synology NAS device.","Plenet is a cross-platform .NET-based backdoor that provides interactive shell access, remote command execution, file manipulation, and command-and-control server switching.","AgentPSD is a Python-based reverse shell utility that Volexity believes was used as a fallback persistence mechanism if other malware was no longer accessible."],"insights":["UNC5221 used Brickstorm proxying features and stolen credentials to access Microsoft 365 in a way Volexity assessed was intended to blend with legitimate traffic and evade Conditional Access policies.","The compromise of the managed services provider’s pfSense firewall indicates that remediation of a victim environment may be insufficient if upstream service providers are not also investigated for long-term persistence.","VerdantBamboo repeatedly deployed malware on appliances and systems such as Egnyte Storage Sync, pfSense, Synology NAS, and a retired Linux GroupWise email archive server, highlighting the risk of devices that may lack endpoint detection and response coverage.","AgentPSD was configured to use a different domain from Brickstorm and was not used while Brickstorm remained active, supporting Volexity’s assessment that the attackers maintained a separate fallback access path."],"referencedReports":[{"title":"VerdantBamboo: Just Another Brickstorm in the Firewall","url":"https://www.volexity.com/blog/2026/06/04/verdantbamboo-just-another-brickstorm-in-the-firewall/","publisher":"Volexity","context":"The article cites Volexity’s incident response research as the source for details on VerdantBamboo’s use of Brickstorm, Plenet, and AgentPSD in the investigated intrusions.","category":"","primary":false},{"title":"VerdantBamboo indicators of compromise","url":"https://github.com/volexity/threat-intel/tree/main/2026/2026-06-04%20VerdantBamboo","publisher":"Volexity","context":"The article links to Volexity’s published indicators of compromise for the investigated UNC5221 campaign.","category":"","primary":false}],"body":"\u003cp\u003eChinese espionage group UNC5221, also tracked as VerdantBamboo, accessed Microsoft 365 environments using the Brickstorm backdoor and newly documented malware named Plenet and AgentPSD. Volexity’s investigation found that the threat actor had been present in a victim network for at least 18 months before detection. The group had also compromised the victim organization’s managed services provider.\u003c/p\u003e\n\n\u003cp\u003eThe activity is significant because VerdantBamboo maintained long-term access, returned after remediation, and used compromised appliances and infrastructure to re-establish access. The attackers used stolen credentials, Brickstorm proxying features, and SSL VPN access to blend in with legitimate traffic and bypass controls. Volexity assessed with high confidence that the Microsoft 365 access was designed to evade Conditional Access policies.\u003c/p\u003e\n\n\u003cp\u003eBrickstorm was deployed on systems including an Egnyte Storage Sync appliance, a pfSense firewall, and a retired Linux GroupWise email archive server. Plenet, also tracked by Google as Grimbolt, is a cross-platform .NET backdoor with shell, command execution, file manipulation, and C2 switching capabilities. AgentPSD is a Python-based reverse shell utility that Volexity believes was used as a fallback persistence mechanism.\u003c/p\u003e\n"},{"n":9,"title":"CISA: Hackers now exploit SolarWinds Serv-U flaw to crash servers","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-hackers-now-exploit-solarwinds-serv-u-flaw-to-crash-servers/","time":"19:15","priority":"MUST READ","score":94,"tldr":"CISA says attackers are actively exploiting a newly patched SolarWinds Serv-U denial-of-service flaw, CVE-2026-28318, that can crash servers via unauthenticated crafted POST requests. Organizations should install Serv-U 15.5.4 Hotfix 1 or apply SolarWinds’ mitigations immediately.","briefOverview":"\u003cp\u003eCISA warned that hackers are actively exploiting a recently patched high-severity SolarWinds Serv-U vulnerability to crash servers. The flaw, tracked as CVE-2026-28318, affects SolarWinds’ Windows and Linux file transfer software, which provides Managed File Transfer and FTP server capabilities. CISA added the flaw to its Known Exploited Vulnerabilities Catalog and ordered Federal Civilian Executive Branch agencies to patch by June 19.\u003c/p\u003e\n\n\u003cp\u003eSolarWinds released Serv-U 15.5.4 Hotfix 1 to address the denial-of-service issue, which it described as an uncontrolled resource consumption weakness. The company said specially crafted unauthenticated POST requests using \u003ccode\u003eContent-Encoding: deflate\u003c/code\u003e can crash the Serv-U service. SolarWinds advised administrators who cannot immediately patch to limit access to known addresses and block POST requests containing \u003ccode\u003econtent-encoding\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that Shodan tracks more than 12,000 Serv-U servers exposed online, while Shadowserver tracks just over 3,100, with no information on how many have been patched. CISA said this type of vulnerability is a frequent attack vector for malicious cyber actors and urged all network defenders, including private-sector organizations, to secure their networks. The article also highlights that Serv-U vulnerabilities have been exploited in past campaigns by groups including Clop and DEV-0322.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA warned that attackers are actively exploiting CVE-2026-28318, a high-severity SolarWinds Serv-U flaw, to crash servers. Serv-U is SolarWinds’ Windows and Linux file transfer software offering Managed File Transfer and FTP server capabilities over protocols including HTTP/HTTPS, FTP, FTPS, and SFTP. SolarWinds patched the issue in Serv-U 15.5.4 Hotfix 1.\u003c/p\u003e\n\n\u003cp\u003eSolarWinds said the vulnerability stems from uncontrolled resource consumption. The company stated that Serv-U is susceptible to specially crafted POST requests that crash the service without authentication when using \u003ccode\u003eContent-Encoding: deflate\u003c/code\u003e. The article says remote attackers can exploit the flaw without privileges in low-complexity attacks that do not require user interaction.\u003c/p\u003e\n\n\u003cp\u003eSolarWinds advised administrators who cannot immediately deploy the patch to limit access to known addresses and block any POST request containing \u003ccode\u003econtent-encoding\u003c/code\u003e. The company said the vulnerable Serv-U service does not require that functionality. These mitigations were presented as interim steps for organizations that cannot apply the hotfix right away.\u003c/p\u003e\n\n\u003cp\u003eDays after SolarWinds addressed the flaw, CISA flagged CVE-2026-28318 as exploited in the wild and added it to the Known Exploited Vulnerabilities Catalog. CISA ordered all Federal Civilian Executive Branch agencies to patch affected servers by June 19 under Binding Operational Directive 22-01. Although the directive applies only to U.S. government agencies, CISA also urged all network defenders, including the private sector, to secure their networks against ongoing attacks.\u003c/p\u003e\n\n\u003cp\u003eThe article reports broad internet exposure for Serv-U, citing more than 12,000 servers tracked by Shodan and just over 3,100 tracked by Shadowserver. It also says there is no information on how many exposed systems have been patched. CISA warned that this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise.\u003c/p\u003e\n\n\u003cp\u003eThe article places the issue in the context of prior exploitation of SolarWinds Serv-U vulnerabilities. It says the Clop ransomware gang exploited CVE-2021-35211 to breach corporate networks in 2021, while DEV-0322 Chinese hackers also used that vulnerability in zero-day attacks starting in July 2021. It also notes that GreyNoise and Rapid7 tagged CVE-2024-28995, a Serv-U path-traversal vulnerability, as actively exploited in June 2024.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA warned that hackers are actively exploiting a recently patched high-severity SolarWinds Serv-U vulnerability to crash servers. The flaw is tracked as CVE-2026-28318 and affects SolarWinds Serv-U, the company’s Windows and Linux file transfer software. Serv-U provides Managed File Transfer and FTP server capabilities and supports file exchange over HTTP/HTTPS, FTP, FTPS, and SFTP.\u003c/p\u003e\n\n\u003cp\u003eSolarWinds released Serv-U 15.5.4 Hotfix 1 to patch the vulnerability. The company described the issue as a denial-of-service vulnerability caused by uncontrolled resource consumption. CISA later added the flaw to its Known Exploited Vulnerabilities Catalog after determining that it is being exploited in the wild.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical details\u003c/h2\u003e\n\n\u003cp\u003eSolarWinds said Serv-U is vulnerable to specially crafted POST requests that can crash the Serv-U service without authentication. The requests use \u003ccode\u003eContent-Encoding: deflate\u003c/code\u003e. The article states that remote attackers can exploit the flaw without privileges, with low attack complexity, and without user interaction.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is specifically described as a denial-of-service issue rather than a data theft or code execution flaw. Its observed impact in the article is that attackers can crash affected Serv-U servers. SolarWinds attributed the underlying cause to uncontrolled resource consumption.\u003c/p\u003e\n\n\u003ch2 id=\"patch-and-mitigations\"\u003ePatch and mitigations\u003c/h2\u003e\n\n\u003cp\u003eSolarWinds addressed the flaw in Serv-U 15.5.4 Hotfix 1. Organizations running affected Serv-U deployments are directed to apply this update to remediate CVE-2026-28318.\u003c/p\u003e\n\n\u003cp\u003eFor administrators who cannot immediately deploy the patch, SolarWinds recommended interim mitigations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLimit access to known addresses.\u003c/li\u003e\n\u003cli\u003eBlock any POST request containing \u003ccode\u003econtent-encoding\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSolarWinds said the vulnerable Serv-U service does not require the \u003ccode\u003econtent-encoding\u003c/code\u003e functionality. This makes blocking POST requests containing that header a vendor-recommended workaround for environments where immediate patching is not possible.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-response\"\u003eCISA response\u003c/h2\u003e\n\n\u003cp\u003eCISA flagged CVE-2026-28318 as exploited in the wild days after SolarWinds addressed the vulnerability. The agency added it to the Known Exploited Vulnerabilities Catalog. Under Binding Operational Directive 22-01, CISA ordered all Federal Civilian Executive Branch agencies to patch their servers against the ongoing attacks by June 19.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that BOD 22-01 applies only to U.S. government agencies. However, CISA also urged all network defenders, including private-sector organizations, to secure their networks against ongoing CVE-2026-28318 attacks as soon as possible. CISA warned that this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise.\u003c/p\u003e\n\n\u003cp\u003eCISA advised organizations to apply mitigations according to vendor instructions, follow applicable BOD 22-01 guidance for cloud services, or discontinue use of the product if mitigations are unavailable.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-and-affected-systems\"\u003eExposure and affected systems\u003c/h2\u003e\n\n\u003cp\u003eThe article cites internet exposure data showing that many Serv-U servers are reachable online. Shodan tracks more than 12,000 Serv-U servers exposed online. Shadowserver tracks just over 3,100 exposed Serv-U Managed File Transfer instances.\u003c/p\u003e\n\n\u003cp\u003eThe article states that there is no information on how many of these exposed servers have already been patched. This means the public exposure numbers show the potential attack surface, but not the number of systems still vulnerable to CVE-2026-28318.\u003c/p\u003e\n\n\u003ch2 id=\"historical-context\"\u003eHistorical context\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that multiple cybercrime and state-backed hacking groups have targeted Serv-U vulnerabilities in recent years to steal sensitive corporate and customer data. It gives several prior examples involving SolarWinds Serv-U flaws.\u003c/p\u003e\n\n\u003cp\u003eIn 2021, the Clop ransomware gang exploited a Serv-U remote code execution vulnerability tracked as CVE-2021-35211 to breach corporate networks. The article also says DEV-0322 Chinese hackers used CVE-2021-35211 in zero-day attacks starting in July 2021.\u003c/p\u003e\n\n\u003cp\u003eMore recently, in June 2024, GreyNoise and Rapid7 tagged a Serv-U path-traversal vulnerability, CVE-2024-28995, as actively exploited. The article also states that over the past several years CISA has tagged 11 vulnerabilities across various SolarWinds products as actively exploited in attacks, one of which has also been abused by ransomware gangs.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe central development is that CVE-2026-28318 is no longer only a recently patched SolarWinds Serv-U denial-of-service vulnerability; CISA says it is now being actively exploited in the wild. SolarWinds has released Serv-U 15.5.4 Hotfix 1, and CISA has required U.S. federal civilian agencies to patch by June 19 while urging all network defenders to apply the vendor’s mitigations or discontinue use if mitigations are unavailable.\u003c/p\u003e\n","keyPoints":["CISA warned that hackers are actively exploiting CVE-2026-28318, a recently patched high-severity SolarWinds Serv-U denial-of-service vulnerability, to crash servers.","SolarWinds said CVE-2026-28318 is caused by uncontrolled resource consumption and can be triggered by specially crafted unauthenticated POST requests using Content-Encoding: deflate.","SolarWinds released Serv-U 15.5.4 Hotfix 1 to fix the flaw and advised administrators who cannot patch immediately to limit access to known addresses and block POST requests containing content-encoding.","CISA added CVE-2026-28318 to its Known Exploited Vulnerabilities Catalog and ordered Federal Civilian Executive Branch agencies to patch affected servers by June 19 under BOD 22-01.","Shodan tracks more than 12,000 SolarWinds Serv-U servers exposed online, while Shadowserver tracks just over 3,100, with no information on how many have been patched."],"insights":["The vulnerable Serv-U service does not require the Content-Encoding functionality used in the attacks, making SolarWinds’ suggested mitigation of blocking POST requests containing \"content-encoding\" a targeted workaround for organizations that cannot patch immediately.","CISA added CVE-2026-28318 to the KEV catalog only days after SolarWinds released the fix, indicating that defenders have a narrow window to patch before or during active exploitation.","Although BOD 22-01 legally applies only to Federal Civilian Executive Branch agencies, CISA explicitly urged private-sector defenders to apply the same mitigations because the vulnerability poses significant risk beyond federal networks.","Serv-U has a documented history of being targeted by both cybercrime and state-backed groups, including prior exploitation by Clop and DEV-0322, making exposed Serv-U servers a recurring high-priority target surface."],"referencedReports":[{"title":"SolarWinds Security Advisory: CVE-2026-28318","url":"https://www.solarwinds.com/trust-center/security-advisories/cve-2026-28318","publisher":"SolarWinds","context":"The article cites SolarWinds’ advisory describing the Serv-U denial-of-service flaw and its unauthenticated crafted POST request trigger.","category":"","primary":false},{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/05/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article references CISA’s alert that CVE-2026-28318 was added to the Known Exploited Vulnerabilities Catalog after exploitation in the wild.","category":"","primary":false},{"title":"CISA Known Exploited Vulnerabilities Catalog: CVE-2026-28318","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?field_cve=CVE-2026-28318","publisher":"CISA","context":"The article links to CISA’s KEV Catalog entry for CVE-2026-28318, which sets the federal remediation deadline.","category":"","primary":false},{"title":"Binding Operational Directive 22-01","url":"https://www.cisa.gov/binding-operational-directive-22-01","publisher":"CISA","context":"The article cites BOD 22-01 as the directive requiring Federal Civilian Executive Branch agencies to remediate KEV-listed vulnerabilities.","category":"","primary":false}],"body":"\u003cp\u003eCISA warned that hackers are actively exploiting a recently patched high-severity SolarWinds Serv-U vulnerability to crash servers. The flaw, tracked as CVE-2026-28318, affects SolarWinds’ Windows and Linux file transfer software, which provides Managed File Transfer and FTP server capabilities. CISA added the flaw to its Known Exploited Vulnerabilities Catalog and ordered Federal Civilian Executive Branch agencies to patch by June 19.\u003c/p\u003e\n\n\u003cp\u003eSolarWinds released Serv-U 15.5.4 Hotfix 1 to address the denial-of-service issue, which it described as an uncontrolled resource consumption weakness. The company said specially crafted unauthenticated POST requests using \u003ccode\u003eContent-Encoding: deflate\u003c/code\u003e can crash the Serv-U service. SolarWinds advised administrators who cannot immediately patch to limit access to known addresses and block POST requests containing \u003ccode\u003econtent-encoding\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that Shodan tracks more than 12,000 Serv-U servers exposed online, while Shadowserver tracks just over 3,100, with no information on how many have been patched. CISA said this type of vulnerability is a frequent attack vector for malicious cyber actors and urged all network defenders, including private-sector organizations, to secure their networks. The article also highlights that Serv-U vulnerabilities have been exploited in past campaigns by groups including Clop and DEV-0322.\u003c/p\u003e\n"},{"n":10,"title":"IronWorm and New Miasma Worm Variant Hit npm in Supply Chain Attacks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/ironworm-and-new-miasma-worm-variant.html","time":"18:05","priority":"MUST READ","score":94,"tldr":"Multiple npm supply chain attacks are spreading Rust-based IronWorm and a new Miasma variant through trojanized packages, stealing developer and CI/CD secrets and using compromised credentials to publish more poisoned packages. The campaigns abuse GitHub, npm Trusted Publishing, GitHub Actions, and even AI coding assistant configurations to propagate and persist.","briefOv
