<script type="application/json" id="dl-articles">[{"n":2,"title":"Ransomware gang abuses Microsoft Teams relays to hide malicious traffic","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/ransomware-gang-abuses-microsoft-teams-relays-to-hide-malicious-traffic/","time":"10:18","priority":"MUST READ","score":94,"tldr":"DragonForce ransomware used a custom Go-based backdoor, Backdoor.Turn, to hide command-and-control traffic through Microsoft Teams TURN relay infrastructure during an attack on a major U.S. services company. Symantec says this is the first known in-the-wild malware abusing Teams relays for C2, alongside sophisticated BYOVD and persistence techniques.","briefOverview":"\u003cp\u003eDragonForce ransomware used a custom Go-based malware named Backdoor.Turn to hide command-and-control traffic inside Microsoft Teams relay infrastructure. Symantec researchers observed the malware in a December 2025 attack against a major U.S. services company. The backdoor abuses the TURN protocol used by Microsoft Teams when direct client connections are unavailable.\u003c/p\u003e\n\n\u003cp\u003eSymantec says Backdoor.Turn is the first known in-the-wild malware to abuse Microsoft Teams TURN relay servers to mask command-and-control traffic. The malware obtains an anonymous Teams visitor token, uses a legitimate Microsoft TURN relay during connection setup, and then connects to the attacker’s C2 server. This makes defender-visible traffic appear associated with Microsoft Teams infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe intrusion likely began with exploitation of an unknown SQL or MSSQL server flaw, followed by persistence, rogue user creation, firewall changes, and BYOVD activity. The attackers used multiple vulnerable drivers and a malicious driver called ABYSSWORKER to terminate security tools and gain kernel-level privileges. After reconnaissance and defense evasion, they exfiltrated all data, deployed DragonForce ransomware, and encrypted the victim’s systems.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDragonForce ransomware used a custom Go-based remote access trojan called Backdoor.Turn to conceal command-and-control traffic inside Microsoft Teams relay infrastructure. The activity was documented by Symantec in an attack against a major U.S. services company observed in December 2025. DragonForce has been active since at least 2023 and has adopted a cartel-style organizational structure, with links to the Scattered Spider threat group.\u003c/p\u003e\n\n\u003cp\u003eBackdoor.Turn abuses the Traversal Using Relays around NAT protocol used by Microsoft Teams to distribute messages when direct client connections are unavailable. The malware obtains an anonymous Teams visitor token, uses a legitimate Microsoft TURN relay server during connection setup, and then establishes communication with the attacker’s C2 server. As a result, defenders see traffic associated with Microsoft Teams infrastructure, allowing the malware to hide within a trusted network.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that Praetorian previously demonstrated a related technique called Ghost Calls in 2025, showing how temporary TURN credentials for Teams and Zoom could be hijacked for stealthy communication tunnels. Symantec says Backdoor.Turn is the first known malware observed in the wild abusing Microsoft Teams TURN relay servers to mask C2 traffic. This makes the campaign notable beyond the ransomware deployment itself.\u003c/p\u003e\n\n\u003cp\u003eThe attack likely began through exploitation of an unknown flaw in an SQL or MSSQL server. After gaining access, the attackers downloaded a ZIP archive containing a legitimate VirtualBox or DbgView executable and a malicious DLL used for sideloading. They then strengthened persistence by creating rogue users, abusing the Windows LimitBlankPassword security policy, and modifying firewall rules.\u003c/p\u003e\n\n\u003cp\u003eThe attackers also used Bring Your Own Vulnerable Driver techniques with several drivers, including Huawei’s HWAuidoOs2Ec.sys, Topaz Antifraud wsftprm.sys, Tower of Fantasy GameDriverx64.sys, and K7 Security K7RKScan.sys. These drivers were used to obtain kernel-level privileges and terminate security tools, and the attackers also used ABYSSWORKER, a malicious driver masquerading as a legitimate Palo Alto driver. Backdoor.Turn was injected into DbgView64.exe after ransomware deployment, suggesting it may have been intended for persistence or future access.\u003c/p\u003e\n\n\u003cp\u003eBackdoor.Turn’s capabilities include command execution, process creation, network scanning, TLS certificate capturing, LDAP and Active Directory searching, website title collection, and browser credential theft. After reconnaissance and defense evasion, the attackers exfiltrated all data, deployed DragonForce ransomware, and encrypted the victim’s systems. Symantec published indicators of compromise to help defenders detect and block the activity.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eDragonForce ransomware used a custom Go-based malware named Backdoor.Turn to hide command-and-control traffic inside Microsoft Teams relay infrastructure. The activity was reported by Symantec after an attack against a major U.S. services company observed in December 2025. The article describes the campaign as involving sophisticated tradecraft, including stealthy C2, persistence, BYOVD techniques, security tool termination, data exfiltration, and ransomware deployment.\u003c/p\u003e\n\n\u003cp\u003eDragonForce is described as a ransomware operation active since at least 2023. The group has adopted a cartel-style organizational structure and has been linked to the Scattered Spider threat group.\u003c/p\u003e\n\n\u003ch2 id=\"significance-of-backdoor-turn\"\u003eSignificance of Backdoor.Turn\u003c/h2\u003e\n\n\u003cp\u003eSymantec says Backdoor.Turn is the first known malware observed in the wild to abuse Microsoft Teams TURN relay servers to mask command-and-control traffic. The backdoor abuses the Traversal Using Relays around NAT protocol used by Microsoft Teams when a direct connection to a client is unavailable, such as when clients are on a private network.\u003c/p\u003e\n\n\u003cp\u003eThe malware obtains an anonymous Teams visitor token and uses a legitimate Microsoft TURN relay server during connection setup before connecting to the attacker’s C2 server. Because of this, defenders see traffic associated with Microsoft Teams infrastructure, allowing the malware’s communications to blend into a trusted network path.\u003c/p\u003e\n\n\u003cp\u003eThe article also references Praetorian’s 2025 Ghost Calls technique, which showed how temporary TURN credentials for Teams and Zoom could be hijacked to create stealthy communication tunnels through trusted conferencing infrastructure. While Ghost Calls demonstrated the concept, Backdoor.Turn is presented as the first known in-the-wild malware to apply Microsoft Teams TURN relay abuse for C2 communications.\u003c/p\u003e\n\n\u003ch2 id=\"initial-access-and-early-intrusion-activity\"\u003eInitial Access and Early Intrusion Activity\u003c/h2\u003e\n\n\u003cp\u003eAccording to Symantec, the December 2025 attack likely began with exploitation of an unknown flaw in an SQL or MSSQL server. After establishing a foothold, the attacker downloaded a ZIP archive that contained a legitimate VirtualBox or DbgView executable and a malicious DLL file used for sideloading.\u003c/p\u003e\n\n\u003cp\u003eThe attackers then strengthened persistence and access within the environment. The article says they created rogue users, abused the Windows LimitBlankPassword security policy for easier access, and modified firewall rules.\u003c/p\u003e\n\n\u003ch2 id=\"byovd-and-defense-evasion\"\u003eBYOVD and Defense Evasion\u003c/h2\u003e\n\n\u003cp\u003eThe campaign included Bring Your Own Vulnerable Driver activity used to gain kernel-level privileges and terminate security tools on the host. Symantec highlighted exploitation of Huawei’s HWAuidoOs2Ec.sys driver, referred to in the article as “Havoc Process Terminator,” as part of the attackers’ evasion activity.\u003c/p\u003e\n\n\u003cp\u003eThe attackers used multiple drivers in the BYOVD phase, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHuawei HWAuidoOs2Ec.sys.\u003c/li\u003e\n\u003cli\u003eTopaz Antifraud wsftprm.sys, tracked as CVE-2023-52271.\u003c/li\u003e\n\u003cli\u003eTower of Fantasy GameDriverx64.sys, tracked as CVE-2025-61155.\u003c/li\u003e\n\u003cli\u003eK7 Security K7RKScan.sys, tracked as CVE-2025-1055.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also says the attackers used ABYSSWORKER, a custom malicious driver masquerading as a legitimate Palo Alto driver.\u003c/p\u003e\n\n\u003ch2 id=\"backdoor-turn-deployment-and-capabilities\"\u003eBackdoor.Turn Deployment and Capabilities\u003c/h2\u003e\n\n\u003cp\u003eBackdoor.Turn was injected into DbgView64.exe after the ransomware had been deployed. The article says this suggests the RAT may have been intended for persistence or future access.\u003c/p\u003e\n\n\u003cp\u003eThe malware’s capabilities include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCommand execution.\u003c/li\u003e\n\u003cli\u003eProcess creation.\u003c/li\u003e\n\u003cli\u003eNetwork scanning.\u003c/li\u003e\n\u003cli\u003eTLS certificate capturing.\u003c/li\u003e\n\u003cli\u003eLDAP and Active Directory searching.\u003c/li\u003e\n\u003cli\u003eWebsite title collection.\u003c/li\u003e\n\u003cli\u003eBrowser credential theft.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe malware establishes communication with the attacker’s C2 after using a legitimate Microsoft TURN relay server during connection setup.\u003c/p\u003e\n\n\u003ch2 id=\"impact-on-the-victim\"\u003eImpact on the Victim\u003c/h2\u003e\n\n\u003cp\u003eThe victim was described as a major U.S. services company. After reconnaissance and defense evasion, the attackers exfiltrated all data, deployed DragonForce ransomware, and encrypted the victim’s systems.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name the affected company. Symantec published a complete list of indicators of compromise to help defenders catch and block the attacks.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe central finding is that DragonForce used Backdoor.Turn to hide C2 communications through Microsoft Teams TURN relay infrastructure, making malicious traffic appear associated with trusted Microsoft Teams infrastructure. The campaign combined this stealthy communications method with SQL or MSSQL server exploitation, DLL sideloading, persistence changes, multiple BYOVD drivers, security tool termination, data theft, and DragonForce ransomware encryption.\u003c/p\u003e\n","keyPoints":["DragonForce ransomware used a custom Go-based malware named Backdoor.Turn to hide command-and-control traffic inside Microsoft Teams relay infrastructure.","Symantec says Backdoor.Turn is the first known in-the-wild malware to abuse Microsoft Teams TURN relay servers to mask command-and-control traffic.","The December 2025 attack against a major U.S. services company likely began with exploitation of an unknown flaw in an SQL or MSSQL server.","The attackers used BYOVD techniques with multiple vulnerable drivers, including Huawei’s HWAuidoOs2Ec.sys, Topaz Antifraud wsftprm.sys, Tower of Fantasy GameDriverx64.sys, and K7 Security K7RKScan.sys, to obtain kernel-level privileges and terminate security tools.","After reconnaissance and defense evasion, the attackers exfiltrated all data, deployed DragonForce ransomware, and encrypted the victim’s systems."],"insights":["Traffic that appears associated with Microsoft Teams infrastructure may still warrant scrutiny, because Backdoor.Turn used legitimate Microsoft TURN relays during setup to blend C2 communications into a trusted network path.","The Backdoor.Turn RAT was injected into DbgView64.exe after ransomware deployment, indicating the attackers retained or prepared remote access even after encryption activity.","The attackers combined several vulnerable drivers from different vendors in the same intrusion, showing that blocking only one known BYOVD driver would not have covered the full defense-evasion chain described by Symantec.","The campaign reused the same class of Teams TURN relay abuse previously demonstrated by the Ghost Calls research, showing that a 2025 proof-of-concept technique had moved into real-world malware use by December 2025."],"referencedReports":[{"title":"DragonForce abuses Microsoft Teams infrastructure to hide C\u0026C traffic","url":"https://www.security.com/threat-intelligence/dragonforce-msteams-backdoor","publisher":"Symantec","context":"The article cites Symantec researchers as the source for the analysis of DragonForce’s Backdoor.Turn malware, its abuse of Microsoft Teams TURN relays, and the published IoCs.","category":"","primary":false}],"body":"\u003cp\u003eDragonForce ransomware used a custom Go-based malware named Backdoor.Turn to hide command-and-control traffic inside Microsoft Teams relay infrastructure. Symantec researchers observed the malware in a December 2025 attack against a major U.S. services company. The backdoor abuses the TURN protocol used by Microsoft Teams when direct client connections are unavailable.\u003c/p\u003e\n\n\u003cp\u003eSymantec says Backdoor.Turn is the first known in-the-wild malware to abuse Microsoft Teams TURN relay servers to mask command-and-control traffic. The malware obtains an anonymous Teams visitor token, uses a legitimate Microsoft TURN relay during connection setup, and then connects to the attacker’s C2 server. This makes defender-visible traffic appear associated with Microsoft Teams infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe intrusion likely began with exploitation of an unknown SQL or MSSQL server flaw, followed by persistence, rogue user creation, firewall changes, and BYOVD activity. The attackers used multiple vulnerable drivers and a malicious driver called ABYSSWORKER to terminate security tools and gain kernel-level privileges. After reconnaissance and defense evasion, they exfiltrated all data, deployed DragonForce ransomware, and encrypted the victim’s systems.\u003c/p\u003e\n"},{"n":4,"title":"Attackers Exploit Three Fortinet FortiSandbox Flaws, One Patched Last Week","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/attackers-exploit-three-fortinet.html","time":"10:30","priority":"MUST READ","score":94,"tldr":"Attackers are actively exploiting three critical Fortinet FortiSandbox vulnerabilities, including one patched only last week, that can enable authentication bypass and unauthenticated command execution. Organizations using affected FortiSandbox products should apply Fortinet’s patches immediately.","briefOverview":"\u003cp\u003eDefused Cyber said it observed exploitation of three Fortinet FortiSandbox vulnerabilities over the past 24 hours. The flaws are CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089, each with a CVSS score of 9.1. One of the vulnerabilities, CVE-2026-25089, was fixed by Fortinet last week.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-39813 is a path traversal flaw in the FortiSandbox JRPC API that could allow unauthenticated authentication bypass through specially crafted HTTP requests. CVE-2026-39808 and CVE-2026-25089 are operating system command injection issues that could allow unauthenticated attackers to execute unauthorized commands or code using crafted HTTP requests. Fortinet patched CVE-2026-39813 and CVE-2026-39808 in April 2026, while CVE-2026-25089 affects FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI.\u003c/p\u003e\n\n\u003cp\u003eDefused Cyber said the exploit for CVE-2026-25089 appears to have been developed using an artificial intelligence model and is faulty. The article states that a working exploit for CVE-2026-25089 has not been publicly disclosed. It also notes that Fortinet appliances have been a frequent target for attackers in recent years.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThreat intelligence firm Defused Cyber said bad actors are exploiting multiple vulnerabilities in Fortinet FortiSandbox. In a post shared on X, the company said it observed exploitation of CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089 over the past 24 hours. All three vulnerabilities are listed in the article with CVSS scores of 9.1.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-39813 is described as a path traversal vulnerability in the FortiSandbox JRPC API. The flaw could allow an unauthenticated attacker to bypass authentication using specially crafted HTTP requests. Fortinet patched this vulnerability in April 2026.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-39808 is described as an operating system command injection vulnerability. It could allow an unauthenticated attacker to execute unauthorized code or commands via crafted HTTP requests. Fortinet also patched CVE-2026-39808 in April 2026.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-25089 was fixed last week and affects FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI. Fortinet described it as an operating system command injection flaw that could allow unauthenticated attackers to execute unauthorized commands through specifically crafted HTTP requests. Defused Cyber said the exploit for CVE-2026-25089 appears to have been developed using an artificial intelligence model and is faulty.\u003c/p\u003e\n\n\u003cp\u003eThe article states that no working exploit for CVE-2026-25089 has been publicly disclosed. It also notes that vulnerabilities in Fortinet appliances have become a lightning rod for attackers in recent years. As an example, it cites Fortinet’s April 2026 out-of-band patches for CVE-2026-35616, a critical FortiClient EMS vulnerability that Fortinet said had been exploited in the wild.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThreat intelligence firm Defused Cyber said attackers are exploiting multiple security vulnerabilities in Fortinet FortiSandbox. The company shared the observation in a post on X, saying it had seen exploitation of three flaws over the past 24 hours.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities named in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-39813\u003c/li\u003e\n\u003cli\u003eCVE-2026-39808\u003c/li\u003e\n\u003cli\u003eCVE-2026-25089\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eEach of the three vulnerabilities is listed with a CVSS score of 9.1.\u003c/p\u003e\n\n\u003ch2 id=\"exploited-fortisandbox-vulnerabilities\"\u003eExploited FortiSandbox vulnerabilities\u003c/h2\u003e\n\n\u003ch3 id=\"cve-2026-39813\"\u003eCVE-2026-39813\u003c/h3\u003e\n\n\u003cp\u003eCVE-2026-39813 is described as a path traversal vulnerability in the FortiSandbox JRPC API. According to the article, the flaw could allow an unauthenticated attacker to bypass authentication.\u003c/p\u003e\n\n\u003cp\u003eThe article states that exploitation would involve specially crafted HTTP requests. Fortinet patched CVE-2026-39813 in April 2026.\u003c/p\u003e\n\n\u003ch3 id=\"cve-2026-39808\"\u003eCVE-2026-39808\u003c/h3\u003e\n\n\u003cp\u003eCVE-2026-39808 is described as an operating system command injection vulnerability. The flaw could allow an unauthenticated attacker to execute unauthorized code or commands.\u003c/p\u003e\n\n\u003cp\u003eThe article says this could be done using crafted HTTP requests. Fortinet patched CVE-2026-39808 in April 2026.\u003c/p\u003e\n\n\u003ch3 id=\"cve-2026-25089\"\u003eCVE-2026-25089\u003c/h3\u003e\n\n\u003cp\u003eCVE-2026-25089 was fixed by Fortinet last week. The article says Fortinet described it as an operating system command injection vulnerability impacting FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI.\u003c/p\u003e\n\n\u003cp\u003eThe flaw could allow an unauthenticated attacker to execute unauthorized commands via specifically crafted HTTP requests. Defused Cyber said the exploit for CVE-2026-25089 shows signs of being developed using an artificial intelligence model, but is also faulty.\u003c/p\u003e\n\n\u003cp\u003eThe article states that a working exploit for CVE-2026-25089 has not been publicly disclosed.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products-and-parties\"\u003eAffected products and parties\u003c/h2\u003e\n\n\u003cp\u003eThe affected Fortinet products named in relation to CVE-2026-25089 are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFortiSandbox\u003c/li\u003e\n\u003cli\u003eFortiSandbox Cloud\u003c/li\u003e\n\u003cli\u003eFortiSandbox PaaS WEB UI\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also discusses FortiSandbox JRPC API in connection with CVE-2026-39813. Defused Cyber is the threat intelligence firm that reported observing exploitation activity.\u003c/p\u003e\n\n\u003ch2 id=\"patch-timeline-mentioned-in-the-article\"\u003ePatch timeline mentioned in the article\u003c/h2\u003e\n\n\u003cp\u003eFortinet patched CVE-2026-39813 and CVE-2026-39808 in April 2026. CVE-2026-25089 was fixed last week.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that in April 2026 Fortinet released out-of-band patches for CVE-2026-35616, a critical flaw affecting FortiClient EMS. Fortinet said that FortiClient EMS flaw had been exploited in the wild.\u003c/p\u003e\n\n\u003ch2 id=\"broader-context\"\u003eBroader context\u003c/h2\u003e\n\n\u003cp\u003eThe article states that vulnerabilities in Fortinet appliances have become a lightning rod for attackers in recent years. It uses the FortiClient EMS vulnerability CVE-2026-35616 as a recent example of a critical Fortinet flaw that had been exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe immediate focus of the article remains the reported exploitation of the three FortiSandbox flaws, including one vulnerability that was patched only last week.\u003c/p\u003e\n","keyPoints":["Defused Cyber said it observed attackers exploiting CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089 in Fortinet FortiSandbox over the past 24 hours.","CVE-2026-39813 is a FortiSandbox JRPC API path traversal vulnerability that could allow an unauthenticated attacker to bypass authentication using specially crafted HTTP requests.","CVE-2026-39808 is an operating system command injection flaw that could allow an unauthenticated attacker to execute unauthorized code or commands through crafted HTTP requests.","Fortinet patched CVE-2026-39813 and CVE-2026-39808 in April 2026, while CVE-2026-25089 was fixed last week.","Defused Cyber said the exploit for CVE-2026-25089 appears to have been developed using an AI model and is faulty, and no working exploit for that vulnerability has been publicly disclosed."],"insights":["The exploitation of CVE-2026-25089 within a week of its patch indicates defenders have a very narrow remediation window for FortiSandbox flaws.","The reported CVE-2026-25089 exploit being faulty despite signs of AI-assisted development suggests attackers may be attempting rapid exploit generation even before reliable public exploit code exists.","Because all three exploited flaws can be triggered through crafted HTTP requests by unauthenticated attackers, internet-exposed FortiSandbox interfaces represent especially urgent patching targets.","The article links the latest FortiSandbox exploitation to a broader pattern of attackers repeatedly targeting Fortinet appliances, including a separate FortiClient EMS flaw exploited earlier in 2026."],"referencedReports":[],"body":"\u003cp\u003eDefused Cyber said it observed exploitation of three Fortinet FortiSandbox vulnerabilities over the past 24 hours. The flaws are CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089, each with a CVSS score of 9.1. One of the vulnerabilities, CVE-2026-25089, was fixed by Fortinet last week.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-39813 is a path traversal flaw in the FortiSandbox JRPC API that could allow unauthenticated authentication bypass through specially crafted HTTP requests. CVE-2026-39808 and CVE-2026-25089 are operating system command injection issues that could allow unauthenticated attackers to execute unauthorized commands or code using crafted HTTP requests. Fortinet patched CVE-2026-39813 and CVE-2026-39808 in April 2026, while CVE-2026-25089 affects FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI.\u003c/p\u003e\n\n\u003cp\u003eDefused Cyber said the exploit for CVE-2026-25089 appears to have been developed using an artificial intelligence model and is faulty. The article states that a working exploit for CVE-2026-25089 has not been publicly disclosed. It also notes that Fortinet appliances have been a frequent target for attackers in recent years.\u003c/p\u003e\n"},{"n":1,"title":"CISA warns of another cPanel plugin flaw exploited in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-warns-of-another-actively-exploited-cpanel-plugin-flaw/","time":"10:47","priority":"MUST READ","score":92,"tldr":"CISA ordered U.S. federal agencies to patch an actively exploited LiteSpeed cPanel plugin flaw within three days. The vulnerability can let attackers with FTP or web shell access escalate privileges to root on affected CloudLinux/CageFS shared hosting servers.","briefOverview":"\u003cp\u003eCISA has ordered U.S. Federal Civilian Executive Branch agencies to secure servers within three days against an actively exploited vulnerability in the LiteSpeed cPanel user-end plugin. The issue is described in the article as affecting all user-end plugin versions before 2.4.8 and being under active exploitation. CISA added the flaw to its Known Exploited Vulnerabilities Catalog and directed agencies to follow BOD 26-04 guidance.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was reported by Namecheap and stems from a UNIX symlink following weakness. According to the article, attackers with FTP or web shell access can escalate privileges to root on shared hosting servers running CloudLinux/CageFS. LiteSpeed released urgent security updates in early June and advised users to update the cPanel user-end plugin bundled with the WHM plugin.\u003c/p\u003e\n\n\u003cp\u003eLiteSpeed also provided a grep command administrators can use to check for signs that the vulnerability may have been exploited. The company said any output from that command may indicate exploitation and should be followed by examination of system logs for actions taken by the detected IPs. CISA warned that this type of flaw is a frequent attack vector and poses significant risk to the federal enterprise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA has warned U.S. government agencies about an actively exploited vulnerability in the LiteSpeed cPanel user-end plugin. The agency gave Federal Civilian Executive Branch agencies three days to secure affected systems. The article identifies the issue as a high-severity flaw affecting all user-end plugin versions before 2.4.8. CISA added the vulnerability to its Known Exploited Vulnerabilities Catalog.\u003c/p\u003e\n\n\u003cp\u003eThe article says the vulnerability was reported by Namecheap and stems from a UNIX symlink following weakness. It allows attackers with FTP or web shell access to escalate privileges to root on shared hosting servers running CloudLinux/CageFS. The affected plugin is the cPanel user-end plugin bundled with the WHM plugin. LiteSpeed flagged the vulnerability as actively exploited in early June.\u003c/p\u003e\n\n\u003cp\u003eLiteSpeed released urgent security updates and warned users to update to the latest plugin version. The company provided a grep command that checks cPanel and related logs for patterns associated with possible exploitation. LiteSpeed said that if the command produces output, the vulnerability may have been exploited on the server. It advised administrators to review system logs for actions taken by the detected IPs.\u003c/p\u003e\n\n\u003cp\u003eCISA’s directive is tied to Binding Operational Directive 26-04, which was issued the prior Wednesday and revoked older BODs 19-02 and 22-01. The article says BOD 26-04 requires federal agencies to prioritize patching based on exploitation risk. CISA highlighted factors such as KEV inclusion, internet exposure, whether exploitation can be automated at scale, and whether exploitation grants partial or total control of a target system.\u003c/p\u003e\n\n\u003cp\u003eNo named threat actor is identified in the article. CISA said this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise. The agency also said stakeholders are responsible for evaluating each asset’s internet exposure and ensuring adherence to BOD 26-04 patching guidelines. If mitigations are unavailable, CISA said agencies should follow cloud-service guidance or discontinue use of the product.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA has warned that a vulnerability in the LiteSpeed cPanel user-end plugin is being actively exploited. The agency gave U.S. Federal Civilian Executive Branch agencies three days to secure their servers against the issue. The article initially references CVE-2026-54420 and then states that the vulnerability is tracked as CVE-2026-48172.\u003c/p\u003e\n\n\u003cp\u003eCISA added the vulnerability to its Known Exploited Vulnerabilities Catalog. Under Binding Operational Directive 26-04, federal agencies must prioritize remediation based on exploitation risk and follow the applicable patching guidance. CISA said agencies should follow BOD 26-04 guidance for cloud services or discontinue use of the product if mitigations are unavailable.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability affects all LiteSpeed cPanel user-end plugin versions before 2.4.8. The article says the flaw was reported by Namecheap and is caused by a UNIX symlink following weakness. According to the article, attackers with FTP or web shell access can escalate privileges to root.\u003c/p\u003e\n\n\u003cp\u003eThe affected environments are shared hosting servers running CloudLinux/CageFS. The vulnerable component is the LiteSpeed cPanel user-end plugin, which the article says is bundled with the WHM plugin. LiteSpeed flagged the issue as actively exploited in early June.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-and-impact\"\u003eExploitation and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the vulnerability is actively exploited. It does not name any threat actor or group responsible for the activity. CISA characterized this type of vulnerability as a frequent attack vector for malicious cyber actors and said it poses significant risks to the federal enterprise.\u003c/p\u003e\n\n\u003cp\u003eThe stated impact is privilege escalation to root by attackers who already have FTP or web shell access. This makes the issue especially significant for shared hosting servers running CloudLinux/CageFS. The article does not provide specific victim names, incident counts, or confirmed post-exploitation outcomes.\u003c/p\u003e\n\n\u003ch2 id=\"detection-guidance-from-litespeed\"\u003eDetection Guidance from LiteSpeed\u003c/h2\u003e\n\n\u003cp\u003eLiteSpeed advised users to check whether their servers may have been exploited by running the following command:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-bash\"\u003egrep -rE 'cpanel_jsonapi_func=(generateEcCert|packageUserSize)|cert_action_entry .*geneccert' /usr/local/cpanel/logs/ /var/cpanel/logs/ 2\u0026gt;/dev/null\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eLiteSpeed said that if this command produces any output, the vulnerability may have been exploited on the server. The company advised administrators to examine system logs for any actions taken by the detected IPs. LiteSpeed also warned that all user-end plugin versions before 2.4.8 are at risk.\u003c/p\u003e\n\n\u003ch2 id=\"vendor-and-government-response\"\u003eVendor and Government Response\u003c/h2\u003e\n\n\u003cp\u003eLiteSpeed released urgent security updates in early June. The company urged users to update the cPanel user-end plugin to the latest version. The article notes that the user-end plugin is bundled with the WHM plugin.\u003c/p\u003e\n\n\u003cp\u003eCISA added the vulnerability to the Known Exploited Vulnerabilities Catalog on Monday. This action triggered a three-day remediation requirement for Federal Civilian Executive Branch agencies under BOD 26-04. The article says BOD 26-04 was issued the previous Wednesday and revoked older BODs 19-02 and 22-01.\u003c/p\u003e\n\n\u003ch2 id=\"bod-26-04-context\"\u003eBOD 26-04 Context\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that BOD 26-04 requires U.S. federal agencies to prioritize patching according to exploitation risk. It lists several factors agencies should consider when assessing risk:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhether the flaw is included in CISA’s Known Exploited Vulnerabilities Catalog.\u003c/li\u003e\n\u003cli\u003eWhether the affected asset is publicly exposed online.\u003c/li\u003e\n\u003cli\u003eWhether exploitation can be automated for large-scale attacks.\u003c/li\u003e\n\u003cli\u003eWhether successful exploitation gives attackers partial or total control of the targeted system.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCISA said stakeholders are responsible for evaluating each asset’s internet exposure and ensuring compliance with BOD 26-04 patching guidelines.\u003c/p\u003e\n\n\u003ch2 id=\"related-prior-cisa-warning\"\u003eRelated Prior CISA Warning\u003c/h2\u003e\n\n\u003cp\u003eThe article also says that last month CISA warned federal agencies to patch another LiteSpeed cPanel vulnerability. It describes that prior issue as one exploited by unauthenticated attackers to execute arbitrary scripts with root privileges. The article identifies that prior vulnerability as CVE-2026-48172, even though the main vulnerability in the article is also described as tracked under the same CVE identifier.\u003c/p\u003e\n","keyPoints":["CISA ordered U.S. Federal Civilian Executive Branch agencies to secure systems within three days against an actively exploited LiteSpeed cPanel user-end plugin vulnerability.","The vulnerability, tracked as CVE-2026-48172 in the article, affects all LiteSpeed cPanel user-end plugin versions before 2.4.8.","Namecheap reported that the flaw allows attackers with FTP or web shell access to escalate privileges to root on shared hosting servers running CloudLinux/CageFS.","LiteSpeed released urgent security updates in early June and warned users to update the cPanel user-end plugin bundled with the WHM plugin.","CISA added the vulnerability to its Known Exploited Vulnerabilities Catalog and said agencies must follow BOD 26-04 guidance or discontinue use of the product if mitigations are unavailable."],"insights":["LiteSpeed provided a specific grep command that can indicate possible exploitation; any output should prompt administrators to examine system logs for actions taken by the detected IPs.","The article references two different CVE identifiers near the start, CVE-2026-54420 and CVE-2026-48172, while describing the actively exploited LiteSpeed cPanel plugin issue.","Under BOD 26-04, CISA’s three-day federal patching urgency is tied not only to KEV listing but also to factors such as internet exposure, large-scale automation potential, and whether exploitation gives partial or total system control.","CISA said agencies should discontinue use of the product if mitigations are unavailable, making removal an explicit compliance option rather than only patching."],"referencedReports":[{"title":"Security Update for LiteSpeed cPanel Plugin","url":"https://blog.litespeedtech.com/2026/06/01/security-update-for-litespeed-cpanel-plugin-2/","publisher":"LiteSpeed Technologies","context":"The article says LiteSpeed released urgent security updates and warned users to update the cPanel user-end plugin to the latest version.","category":"","primary":false},{"title":"CISA Adds Two Known Exploited Vulnerabilities to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/15/cisa-adds-two-known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"The article cites CISA's alert adding the LiteSpeed cPanel plugin vulnerability to its Known Exploited Vulnerabilities Catalog.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog: CVE-2026-48172","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?field_cve=CVE-2026-48172","publisher":"CISA","context":"The article references CISA's KEV catalog entry for the actively exploited LiteSpeed cPanel plugin vulnerability.","category":"","primary":false}],"body":"\u003cp\u003eCISA has ordered U.S. Federal Civilian Executive Branch agencies to secure servers within three days against an actively exploited vulnerability in the LiteSpeed cPanel user-end plugin. The issue is described in the article as affecting all user-end plugin versions before 2.4.8 and being under active exploitation. CISA added the flaw to its Known Exploited Vulnerabilities Catalog and directed agencies to follow BOD 26-04 guidance.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was reported by Namecheap and stems from a UNIX symlink following weakness. According to the article, attackers with FTP or web shell access can escalate privileges to root on shared hosting servers running CloudLinux/CageFS. LiteSpeed released urgent security updates in early June and advised users to update the cPanel user-end plugin bundled with the WHM plugin.\u003c/p\u003e\n\n\u003cp\u003eLiteSpeed also provided a grep command administrators can use to check for signs that the vulnerability may have been exploited. The company said any output from that command may indicate exploitation and should be followed by examination of system logs for actions taken by the detected IPs. CISA warned that this type of flaw is a frequent attack vector and poses significant risk to the federal enterprise.\u003c/p\u003e\n"},{"n":5,"title":"New Rokarolla Android Malware Steals PINs, SMS Codes, and Crypto Wallet Funds","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/new-rokarolla-android-malware-steals.html","time":"13:10","priority":"SHOULD READ","score":82,"tldr":"Zimperium researchers found Rokarolla, a new Android banking trojan spread through fake app sites that abuses Accessibility access to steal PINs, SMS codes, banking credentials, and crypto funds. Its 137 remote commands let attackers disable Play Protect, overlay fake login screens, intercept messages, rewrite crypto wallet addresses, and remotely control infected phones.","briefOverview":"\u003cp\u003eZimperium’s zLabs documented Rokarolla, a new Android banking trojan targeting 217 banking and cryptocurrency apps. The malware supports 137 remote commands, giving an operator extensive control over infected phones. It can steal lock-screen PINs, read and send SMS messages, rewrite clipboard contents to redirect crypto payments, and disable Google Play Protect.\u003c/p\u003e\n\n\u003cp\u003eRokarolla spreads through malicious websites that impersonate well-known apps such as TikTok and Chrome. The first installed component is a dropper pretending to be Google Play Protect, which helps install the payload and obtain Accessibility access. Once active, the malware uses overlays, keylogging, screen logging, SMS interception, notification scraping, and contact scraping to collect sensitive data.\u003c/p\u003e\n\n\u003cp\u003eThe trojan downloads fake HTML login pages for targeted banking and wallet apps and displays them over legitimate apps to capture credentials and card details. It can also show a fake Android lock screen to capture a PIN, pattern, or password, enabling control even when the device is locked. Zimperium did not attribute Rokarolla to a named group, and the article says there is no patch because this is malware rather than a product flaw.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSecurity researchers at Zimperium’s zLabs documented Rokarolla, a new Android banking trojan named after its command-and-control servers. The malware targets 217 banking and cryptocurrency apps and includes 137 remote commands. According to the article, those commands give an operator near-total control of an infected phone.\u003c/p\u003e\n\n\u003cp\u003eRokarolla is distributed through malicious websites posing as well-known apps, including TikTok and Chrome. The initial dropper pretends to be Google Play Protect and uses that disguise to install the payload and obtain Accessibility access. After the malware is running, one of its commands disables Google Play Protect.\u003c/p\u003e\n\n\u003cp\u003eThe theft workflow relies heavily on overlays. Rokarolla retrieves a target list from its server, downloads fake HTML login pages for apps marked as active, and stores them in a local database. When a victim opens the real banking or wallet app, the malware places the fake page on top to capture typed information, including card details.\u003c/p\u003e\n\n\u003cp\u003eThe malware can also display an overlay mimicking the Android lock screen to capture a PIN, pattern, or password. It reads SMS messages and can send texts, enabling theft of SMS one-time codes used by banks for logins and transactions. By making itself the default app for texts and calls, it can block incoming calls, including warning calls from a bank.\u003c/p\u003e\n\n\u003cp\u003eRokarolla includes a keylogger, screen logger, contact scraping, notification reading, and clipboard rewriting that swaps attacker wallet addresses into copied crypto payments. For surveillance, it avoids MediaProjection prompts by taking screenshots through Accessibility, compressing them to PNG, and sending them out one frame at a time. The article says this is quieter than live hidden VNC approaches seen in families like Klopatra.\u003c/p\u003e\n\n\u003cp\u003eThe malware includes multiple fallback C2 domains and can receive new ones dynamically, reducing the effect of taking down a single server. Zimperium did not link Rokarolla to a named group, but the article says the build shows intent to bypass protections users are told to rely on, including Play Protect and the lock screen. Zimperium says its products detect the family and published indicators of compromise in its GitHub repository.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eZimperium’s zLabs documented Rokarolla, a new Android banking trojan named after its command-and-control servers. The malware targets 217 banking and cryptocurrency apps and contains 137 remote commands. The article describes those commands as giving an operator near-total control of an infected phone.\u003c/p\u003e\n\n\u003cp\u003eRokarolla’s capabilities include stealing lock-screen PINs, reading and sending SMS messages, rewriting clipboard contents to redirect crypto payments, disabling Google Play Protect, logging keystrokes and screens, scraping contacts, and reading notifications. Zimperium did not tie Rokarolla to a named group.\u003c/p\u003e\n\n\u003ch2 id=\"distribution-and-initial-access\"\u003eDistribution and Initial Access\u003c/h2\u003e\n\n\u003cp\u003eRokarolla spreads through malicious websites that pose as well-known apps such as TikTok and Chrome. The first component installed by a victim is a dropper that pretends to be Google Play Protect.\u003c/p\u003e\n\n\u003cp\u003eThe dropper uses the Google Play Protect disguise to help install the payload and obtain Accessibility access. Once the malware is running, one of its commands turns Google Play Protect off.\u003c/p\u003e\n\n\u003ch2 id=\"overlay-based-theft\"\u003eOverlay-Based Theft\u003c/h2\u003e\n\n\u003cp\u003eThe article says Rokarolla’s theft workflow runs through overlays. The malware pulls a target list from its server, and for each app marked active, it downloads a fake HTML login page and stores it in a local database.\u003c/p\u003e\n\n\u003cp\u003eWhen the victim opens a real banking or wallet app, Rokarolla places the fake page on top of the legitimate app. The overlay captures everything typed into it, including card details. The report cited in the article shows one fake page mimicking the banking app imagin.\u003c/p\u003e\n\n\u003cp\u003eRokarolla also uses a separate overlay that mimics the Android lock screen. This overlay captures the victim’s PIN, pattern, or password, which the article says lets the operator control the phone even while it is locked.\u003c/p\u003e\n\n\u003ch2 id=\"sms-calls-and-account-verification-codes\"\u003eSMS, Calls, and Account Verification Codes\u003c/h2\u003e\n\n\u003cp\u003eRokarolla reads every SMS message on the device and can send messages itself. The article states that this is enough to capture SMS one-time codes used by banks to approve logins and transactions.\u003c/p\u003e\n\n\u003cp\u003eThe malware can also make itself the phone’s default app for texts and calls. In that position, it can block incoming calls, which the article notes could stop a warning call from the bank from reaching the victim.\u003c/p\u003e\n\n\u003ch2 id=\"logging-clipboard-hijacking-and-surveillance\"\u003eLogging, Clipboard Hijacking, and Surveillance\u003c/h2\u003e\n\n\u003cp\u003eRokarolla includes a keylogger and screen logger to record what the user types and sees. It also scrapes contacts and reads notifications.\u003c/p\u003e\n\n\u003cp\u003eThe malware silently rewrites clipboard contents, replacing copied cryptocurrency wallet addresses with attacker-controlled wallet addresses. This can cause a copied crypto payment to be sent to the wrong account.\u003c/p\u003e\n\n\u003cp\u003eFor surveillance, Rokarolla avoids the usual MediaProjection screen casting method, which displays a visible recording prompt. Instead, it takes screenshots through Accessibility, compresses them to PNG, and sends them out one frame at a time. The article describes this snapshot approach as simpler and quieter than the live hidden VNC seen in families such as Klopatra.\u003c/p\u003e\n\n\u003ch2 id=\"command-and-control-resilience\"\u003eCommand-and-Control Resilience\u003c/h2\u003e\n\n\u003cp\u003eRokarolla carries multiple fallback command-and-control domains. It can also receive new domains dynamically.\u003c/p\u003e\n\n\u003cp\u003eThe article says this means pulling a single server does little. It also notes that Rokarolla’s 137 commands outnumber the 107 commands Zimperium counted in the HOOK trojan.\u003c/p\u003e\n\n\u003ch2 id=\"broader-pattern-described-in-the-article\"\u003eBroader Pattern Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article places Rokarolla within a wave of Android bankers using a similar playbook. That playbook includes fake-app droppers, Accessibility abuse, and HTML overlays.\u003c/p\u003e\n\n\u003cp\u003eRokarolla is described as being built to beat protections users are told to rely on, including Google Play Protect and the Android lock screen.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-affected-parties\"\u003eImpact and Affected Parties\u003c/h2\u003e\n\n\u003cp\u003eThe affected targets are users of Android devices who install the malicious apps from the fake websites. The malware targets banking and cryptocurrency applications, with 217 banking and crypto apps included in its targeting.\u003c/p\u003e\n\n\u003cp\u003eThe potential impacts described in the article include credential theft, card detail theft, SMS one-time-code theft, lock-screen credential capture, interception or blocking of calls, crypto payment redirection, contact scraping, notification reading, and remote operator control of an infected phone.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-defenses\"\u003eResponse and Defenses\u003c/h2\u003e\n\n\u003cp\u003eThe article says there is no patch to apply because Rokarolla is malware rather than a product flaw. The recommended defenses are described as standard protections against Android bankers: install apps only from Google Play, leave Play Protect enabled, and treat unexpected Accessibility requests as a red flag.\u003c/p\u003e\n\n\u003cp\u003eZimperium says its own products detect the Rokarolla family. The article also states that indicators of compromise are available in Zimperium’s GitHub repository.\u003c/p\u003e\n","keyPoints":["Zimperium's zLabs documented Rokarolla, a new Android banking trojan that targets 217 banking and cryptocurrency apps and supports 137 remote commands.","Rokarolla spreads through malicious websites posing as well-known apps such as TikTok and Chrome, with an initial dropper pretending to be Google Play Protect.","The malware abuses Accessibility access to disable Google Play Protect, capture lock-screen PINs or passwords, deploy fake HTML login overlays, and take screenshots without using MediaProjection.","Rokarolla can read and send SMS messages, make itself the default app for texts and calls, block incoming calls, scrape contacts, read notifications, and log keystrokes and screens.","The trojan silently rewrites clipboard contents to replace copied cryptocurrency wallet addresses with attacker-controlled addresses."],"insights":["Rokarolla’s fake Google Play Protect disguise is especially deceptive because the same trust signal it impersonates is later disabled by the malware once it gains control.","The article emphasizes that there is no patch for Rokarolla because it is not exploiting a product flaw, making app-source hygiene and refusal of unexpected Accessibility requests the primary defenses.","Rokarolla avoids the visible Android screen-recording prompt by using Accessibility-based screenshots instead of MediaProjection, making its surveillance quieter than live hidden VNC approaches described in other Android bankers.","Taking down one command-and-control server is unlikely to stop Rokarolla because it includes multiple fallback C2 domains and can receive new ones dynamically.","By making itself the default app for texts and calls, Rokarolla can both steal SMS one-time codes and prevent bank warning calls from reaching the victim."],"referencedReports":[{"title":"Rokarolla: Android Banker With Complete Device Takeover Capabilities","url":"https://zimperium.com/blog/rokarolla-android-banker-with-complete-device-takeover-capabilities","publisher":"Zimperium zLabs","context":"The article is based on Zimperium zLabs' report documenting the Rokarolla Android banking trojan, its targeted apps, commands, and device-takeover capabilities.","category":"","primary":false}],"body":"\u003cp\u003eZimperium’s zLabs documented Rokarolla, a new Android banking trojan targeting 217 banking and cryptocurrency apps. The malware supports 137 remote commands, giving an operator extensive control over infected phones. It can steal lock-screen PINs, read and send SMS messages, rewrite clipboard contents to redirect crypto payments, and disable Google Play Protect.\u003c/p\u003e\n\n\u003cp\u003eRokarolla spreads through malicious websites that impersonate well-known apps such as TikTok and Chrome. The first installed component is a dropper pretending to be Google Play Protect, which helps install the payload and obtain Accessibility access. Once active, the malware uses overlays, keylogging, screen logging, SMS interception, notification scraping, and contact scraping to collect sensitive data.\u003c/p\u003e\n\n\u003cp\u003eThe trojan downloads fake HTML login pages for targeted banking and wallet apps and displays them over legitimate apps to capture credentials and card details. It can also show a fake Android lock screen to capture a PIN, pattern, or password, enabling control even when the device is locked. Zimperium did not attribute Rokarolla to a named group, and the article says there is no patch because this is malware rather than a product flaw.\u003c/p\u003e\n"},{"n":6,"title":"The Invoice That Originated from the Wrong Continent","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/invoice-fraud-korean-originating-ip-fabricated-thread-spf-pass","time":"11:00","priority":"MAY READ","score":72,"tldr":"A legitimate-looking invoice fraud email passed SPF and appeared to come from a real construction consulting domain, but header analysis revealed it was submitted from an anonymous Seoul IP inconsistent with the sender’s US-based business. The key takeaway is that authentication checks alone can miss payment diversion attempts when attackers use valid infrastructure and fabricated internal threads.","briefOverview":"\u003cp\u003eA same-day invoice payment request was sent from a legitimate construction consulting domain to a forensic engineering consultancy. The message used hosted Exchange infrastructure, passed SPF, and returned DMARC bestguesspass. The sender name matched a real employee at the claimed company, and the domain had been registered since 2019.\u003c/p\u003e\n\n\u003cp\u003eThe email body fabricated a three-message reply chain using real names and procedural business language to direct payment to a specific accounts payable contact. The attached PDF invoice included line items, a payment amount, and full Wells Fargo routing and account numbers, while static analysis found the PDF clean. The message was significant because the visible email and attachment details appeared consistent with a normal invoice workflow.\u003c/p\u003e\n\n\u003cp\u003eThe key anomaly was the hidden x-originating-ip header, which showed 45[.]67[.]97[.]6, geolocated to Seoul, South Korea, with no PTR record. This conflicted with the claimed Albuquerque-based sender and would not be visible in a standard mail client. Themis flagged the message at 62% confidence with a VIP Recipient label and triggered inline mitigation before the recipient could act.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes a high-severity invoice fraud and business email compromise attempt targeting a forensic engineering consultancy. A same-day payment request appeared to come from a legitimate construction consulting firm’s domain through hosted Exchange infrastructure. SPF passed, DMARC returned bestguesspass, and the message received an SCL score of 1, which the article says was low enough for inbox delivery by default.\u003c/p\u003e\n\n\u003cp\u003eThe sender name matched a real employee at the claimed company, based on public LinkedIn and corporate directory records cited in the article. The sending domain, adacen[.]com, had been registered since 2019 and used Cloudflare nameservers with Microsoft-hosted Exchange infrastructure. The sending server was listed as out[.]exch092[.]serverdata[.]net at 64[.]78[.]27[.]158.\u003c/p\u003e\n\n\u003cp\u003eThe email body constructed a fabricated three-message reply chain. It claimed that a managing director at the target organization had instructed a colleague to route payment to a specific accounts payable contact, and that colleague then forwarded the thread to the actual recipient with a request to complete payment by the close of business. The article states that the thread used proper business formatting, a W-9 reference, and procedural language designed to blend into financial workflows.\u003c/p\u003e\n\n\u003cp\u003eThe attached file, Inv_33119277.pdf, was a 400KB invoice that contained line items, a payment amount, and banking details at Wells Fargo. The listed payment target included routing number 121000248 and account number 5479471608, which the article describes as an attacker-controlled payment destination. Static analysis of the PDF found it clean.\u003c/p\u003e\n\n\u003cp\u003eThe decisive technical indicator was the x-originating-ip header, which recorded 45[.]67[.]97[.]6. The article says this IP geolocated to Seoul, South Korea, had no PTR record, and was inconsistent with an Albuquerque-based firm. SPF, DKIM, and DMARC did not surface this issue because they validate the sending server rather than the client behind it.\u003c/p\u003e\n\n\u003cp\u003eThe article maps the activity to MITRE ATT\u0026amp;CK techniques T1566.001, T1534, and T1036.005. Themis flagged the message at 62% confidence, applied a VIP Recipient label, and triggered inline mitigation before the recipient could act. No named threat actor is identified in the article.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a high-severity invoice fraud and business email compromise attempt involving a same-day payment request. The message appeared to come from a legitimate construction consulting firm’s domain and was delivered through hosted Exchange infrastructure. It targeted a forensic engineering consultancy and referenced a settlement update for a specific invoice number.\u003c/p\u003e\n\n\u003cp\u003eThe email passed SPF and returned DMARC bestguesspass. The article states that the sender’s name matched a real employee at the claimed company, confirmed through public LinkedIn and corporate directory records. The sending domain had been registered since 2019 and used Cloudflare nameservers with Microsoft-hosted Exchange infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"fraud-structure\"\u003eFraud Structure\u003c/h2\u003e\n\n\u003cp\u003eThe email body created a fabricated three-message reply chain. In that thread, a managing director at the target organization supposedly instructed a colleague to route the payment to a specific accounts payable contact. The colleague then forwarded the thread to the actual recipient with a request to complete the payment by the close of business.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the exchange used details that made it look like a normal business workflow, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eProper business formatting.\u003c/li\u003e\n\u003cli\u003eA W-9 reference.\u003c/li\u003e\n\u003cli\u003eProcedural language such as “please refer to the email thread below for complete context.”\u003c/li\u003e\n\u003cli\u003eReal names used in the fabricated thread.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"attachment-and-payment-details\"\u003eAttachment and Payment Details\u003c/h2\u003e\n\n\u003cp\u003eThe email included an attached PDF invoice named Inv_33119277.pdf. The attachment was 400KB and contained line items, a payment amount, and banking details at a major US financial institution. The article identifies the payment target as Wells Fargo routing number 121000248 and account number 5479471608.\u003c/p\u003e\n\n\u003cp\u003eStatic analysis of the PDF found it clean. The article’s emphasis is that the malicious element was not described as malware in the attachment, but as invoice and payment redirection content inside a legitimate-looking business document.\u003c/p\u003e\n\n\u003ch2 id=\"key-technical-anomaly\"\u003eKey Technical Anomaly\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the single anomaly distinguishing the message from a real invoice was the x-originating-ip header. That header recorded 45[.]67[.]97[.]6, which geolocated to Seoul, South Korea, and had no PTR record. This was inconsistent with the claimed sender, an Albuquerque-based construction firm.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that the x-originating-ip header is not visible in standard mail clients and requires header inspection to find. It also states that SPF, DKIM, and DMARC cannot surface this anomaly because they validate the sending server rather than the client behind it.\u003c/p\u003e\n\n\u003ch2 id=\"email-infrastructure-and-authentication\"\u003eEmail Infrastructure and Authentication\u003c/h2\u003e\n\n\u003cp\u003eThe sending domain was listed as adacen[.]com. The sending server was out[.]exch092[.]serverdata[.]net at 64[.]78[.]27[.]158, described as US-based hosted Exchange infrastructure. Authentication results included SPF pass, DKIM none, DMARC bestguesspass, compauth pass, and reason 109.\u003c/p\u003e\n\n\u003cp\u003eThe message received an SCL score of 1. The article says this score was low enough for default inbox delivery. This made the hidden x-originating-ip mismatch especially important as a detection signal.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-named-entities\"\u003eAffected Parties and Named Entities\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the recipient organization only as a forensic engineering consultancy. It identifies the claimed sender as an Albuquerque-based construction consulting firm’s domain. It also references a real employee name match through public LinkedIn and corporate directory records, but does not name the individual.\u003c/p\u003e\n\n\u003cp\u003eNamed infrastructure and entities in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eadacen[.]com as the sending domain.\u003c/li\u003e\n\u003cli\u003eout[.]exch092[.]serverdata[.]net as the sending server.\u003c/li\u003e\n\u003cli\u003e45[.]67[.]97[.]6 as the x-originating-ip.\u003c/li\u003e\n\u003cli\u003e64[.]78[.]27[.]158 as the hosted Exchange server IP.\u003c/li\u003e\n\u003cli\u003eCloudflare nameservers.\u003c/li\u003e\n\u003cli\u003eMicrosoft-hosted Exchange infrastructure.\u003c/li\u003e\n\u003cli\u003eGoDaddy as the registrar.\u003c/li\u003e\n\u003cli\u003eWells Fargo as the bank named in the payment details.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eThemis flagged the message at 62% confidence and applied a VIP Recipient label. The article says Themis identified the behavioral pattern of a first-time sender with a same-day payment demand targeting a VIP recipient. It then triggered inline mitigation before the recipient could act.\u003c/p\u003e\n\n\u003cp\u003eThe article presents the case as an example of an invoice fraud message that appeared legitimate across sender identity, domain history, hosted infrastructure, authentication checks, business formatting, and attachment analysis. The decisive signal was a hidden header showing an originating IP in Seoul, South Korea, inconsistent with the Albuquerque-based sender.\u003c/p\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK Mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to three MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eT1566.001, Phishing: Spearphishing Attachment, because the email used a PDF invoice with banking details.\u003c/li\u003e\n\u003cli\u003eT1534, Internal Spearphishing, because the message used a fabricated internal thread to establish context.\u003c/li\u003e\n\u003cli\u003eT1036.005, Masquerading: Match Legitimate Name or Location, because real employee names were used in the fabricated thread.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise-listed-in-the-article\"\u003eIndicators of Compromise Listed in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article provides the following indicators and context:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSending domain: adacen[.]com, registered 2019-11-09 through GoDaddy with Cloudflare nameservers.\u003c/li\u003e\n\u003cli\u003ex-originating-ip: 45[.]67[.]97[.]6, geolocated to Seoul, South Korea, with no PTR record.\u003c/li\u003e\n\u003cli\u003eSending server: out[.]exch092[.]serverdata[.]net at 64[.]78[.]27[.]158, described as US-based hosted Exchange.\u003c/li\u003e\n\u003cli\u003eAuthentication results: SPF pass, DKIM none, DMARC bestguesspass, compauth pass, reason 109.\u003c/li\u003e\n\u003cli\u003eSCL: 1, described as low confidence and allowing inbox delivery by default.\u003c/li\u003e\n\u003cli\u003eAttachment: Inv_33119277.pdf, 400KB, containing bank routing and account numbers.\u003c/li\u003e\n\u003cli\u003ePayment target: Wells Fargo routing number 121000248 and account number 5479471608, described as an attacker-controlled payment destination.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article does not state that a payment was made. It says inline mitigation was triggered before the recipient could act. The disclosed risk was payment diversion through a same-day invoice request that appeared legitimate except for the hidden x-originating-ip anomaly.\u003c/p\u003e\n","keyPoints":["A same-day payment request arrived from a legitimate construction consulting domain via hosted Exchange infrastructure, with SPF passing and DMARC returning bestguesspass.","The email body fabricated a three-message thread using real employee names and directed the recipient to complete payment by the close of business.","The attached PDF invoice included line items, a payment amount, and Wells Fargo routing and account numbers, and static analysis found the PDF clean.","The x-originating-ip header showed 45[.]67[.]97[.]6, geolocated to Seoul, South Korea, with no PTR record, which was inconsistent with the Albuquerque-based sender.","Themis flagged the message at 62% confidence with a VIP Recipient label and triggered inline mitigation before the recipient could act."],"insights":["Email authentication results were not sufficient to expose the fraud because SPF, DMARC, and compauth validated the sending infrastructure rather than the client IP recorded in the x-originating-ip header.","The most decisive anomaly was hidden from normal mail-client views, making full header inspection necessary to identify the mismatch between the sender’s claimed Albuquerque business context and the Seoul-originating submission IP.","A clean PDF attachment can still support invoice fraud when the malicious element is the payment instruction itself rather than executable code or embedded malware.","The message’s low SCL score showed that infrastructure-based trust and benign attachment analysis can allow a payment-diversion email to reach the inbox despite strong behavioral red flags."],"referencedReports":[{"title":"Phishing: Spearphishing Attachment","url":"https://attack.mitre.org/techniques/T1566/001/","publisher":"MITRE ATT\u0026CK","context":"The article maps the PDF invoice with banking details to MITRE ATT\u0026CK technique T1566.001.","category":"","primary":false},{"title":"Internal Spearphishing","url":"https://attack.mitre.org/techniques/T1534/","publisher":"MITRE ATT\u0026CK","context":"The article maps the fabricated internal thread used to establish context to MITRE ATT\u0026CK technique T1534.","category":"","primary":false},{"title":"Masquerading: Match Legitimate Name or Location","url":"https://attack.mitre.org/techniques/T1036/005/","publisher":"MITRE ATT\u0026CK","context":"The article maps the use of real employee names in the fabricated thread to MITRE ATT\u0026CK technique T1036.005.","category":"","primary":false}],"body":"\u003cp\u003eA same-day invoice payment request was sent from a legitimate construction consulting domain to a forensic engineering consultancy. The message used hosted Exchange infrastructure, passed SPF, and returned DMARC bestguesspass. The sender name matched a real employee at the claimed company, and the domain had been registered since 2019.\u003c/p\u003e\n\n\u003cp\u003eThe email body fabricated a three-message reply chain using real names and procedural business language to direct payment to a specific accounts payable contact. The attached PDF invoice included line items, a payment amount, and full Wells Fargo routing and account numbers, while static analysis found the PDF clean. The message was significant because the visible email and attachment details appeared consistent with a normal invoice workflow.\u003c/p\u003e\n\n\u003cp\u003eThe key anomaly was the hidden x-originating-ip header, which showed 45[.]67[.]97[.]6, geolocated to Seoul, South Korea, with no PTR record. This conflicted with the claimed Albuquerque-based sender and would not be visible in a standard mail client. Themis flagged the message at 62% confidence with a VIP Recipient label and triggered inline mitigation before the recipient could act.\u003c/p\u003e\n"},{"n":8,"title":"GCP's serviceData: Officially Deprecated, Actively Dangerous","source":"permiso.io","sourceColorIdx":8,"link":"https://permiso.io/blog/gcp-servicedata-officially-deprecated-actively-dangerous","time":"12:46","priority":"MAY READ","score":68,"tldr":"GCP’s deprecated serviceData field can undermine cloud audit log reliability, making detections and investigations risky if teams still depend on it. Security teams should update their logging and detection logic to use supported audit log fields instead.","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article states that GCP's serviceData is officially deprecated and actively dangerous.","Cloud audit logs are described as the backbone of detection engineering in cloud environments.","Security teams depend on cloud audit logs to identify suspicious behavior, build detection rules, and reconstruct attacker activity after an incident.","The article states that in GCP, every meaningful administrative action leaves a trace in the form of an audit log entry.","The quality of a GCP audit log entry directly affects the reliability of investigative and detection efforts."],"insights":["A deprecated GCP audit log field can represent an active detection and investigation risk, not merely a legacy compatibility concern.","Security teams should treat the quality of GCP audit log fields as a dependency for detection rules and incident reconstruction, rather than assuming that the existence of an audit log entry is sufficient."],"referencedReports":[],"body":""},{"n":3,"title":"Survey: 94% of Incidents Involve Anonymized Infrastructure. Teams Are Still Reactive","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/survey-94-of-incidents-involve.html","time":"11:30","priority":"MAY READ","score":55,"tldr":"A Spur Intelligence survey found that anonymized infrastructure like VPNs and residential proxies now appears in nearly every security incident, but many security teams still lack the context and workflows to act on IP data proactively. The key takeaway is that organizations need richer IP intelligence integrated into real-time risk decisions, not just post-incident investigations.","briefOverview":"\u003cp\u003eA Spur Intelligence study of more than 200 security practitioners found that anonymizing infrastructure, including VPNs and residential proxy networks, now appears in nearly every security incident. The article says security teams have abundant IP data but still struggle to determine who is behind an IP address and what action should follow. The findings point to a broader industry pattern in which many organizations remain reactive in managing IP-based risk.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that VPN services and residential proxy networks make malicious activity harder to interpret because traffic can appear to come from legitimate consumer or ISP connections. Nearly half of surveyed companies reported significant operational or financial impact from account takeover attempts and credential abuse via VPNs and residential proxies. Nearly half of respondents also said lack of context is the biggest challenge when analyzing IP activity.\u003c/p\u003e\n\n\u003cp\u003eMany organizations still use IP intelligence mainly after alerts are generated, during investigations and incident review. The article says security teams increasingly want IP intelligence to support real-time workflows such as adaptive authentication, risk-based access controls, fraud prevention, automated policy enforcement, and session risk scoring. It also notes that a full third of companies surveyed are not measuring the effectiveness of their IP intelligence efforts at all.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article discusses findings from a Spur Intelligence industry study of more than 200 security practitioners on the use and effectiveness of IP intelligence. It says anonymizing infrastructure, including VPNs and residential proxy networks, now appears in nearly every security incident. Despite the volume of enrichment feeds, geolocation data, reputation scores, telemetry, and threat intelligence available to analysts, many organizations still lack the visibility and context needed to make effective decisions from IP data.\u003c/p\u003e\n\n\u003cp\u003eA major technical challenge described in the article is the growing use of VPN services and residential proxy networks by cybercriminals. Residential proxies route traffic through consumer internet connections, while VPN services allow additional anonymity and rapid switching between locations and network identities. As a result, the article says traditional approaches based only on reputation or static blocklists are becoming less effective.\u003c/p\u003e\n\n\u003cp\u003eThe study found that nearly half of companies reported significant operational or financial impact from account takeover attempts and credential abuse conducted through VPNs and residential proxies. In these cases, an IP address may appear residential, belong to a legitimate ISP, and have no prior malicious reputation while still being part of an active attack campaign. The article says this makes basic attributes such as geolocation and network ownership useful but insufficient for understanding intent.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies lack of context as a central problem for security operations. Nearly half of respondents said lack of context is the biggest challenge for teams analyzing IP activity. The article says security teams increasingly need infrastructure classification, VPN and proxy attribution, behavioral indicators, historical usage patterns, device and session correlations, and automation and bot signals.\u003c/p\u003e\n\n\u003cp\u003eMany organizations still apply IP intelligence primarily after alerts have already been generated, using it to support investigations and historical review. The article says respondents want more predictive and intelligence-led workflows, including adaptive authentication, risk-based access controls, fraud prevention workflows, automated policy enforcement, and session risk scoring. It frames the goal as making better decisions before incidents escalate.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights internal risks from anonymizing infrastructure on employee devices and consumer applications. It says bring-your-own-device policies, consumer apps, personal VPN usage, and nation-state actors posing as legitimate employees in high-concentration remote work environments create additional blind spots. The Spur study found that 61% of respondents were moderately, slightly, or not at all concerned about potential internal network exposure through residential proxies on employee devices or consumer apps, and that one-third of companies are not measuring the effectiveness of IP intelligence at all.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article summarizes findings from a Spur Intelligence industry study of more than 200 security practitioners focused on IP intelligence and anonymized infrastructure. The central finding is that anonymizing infrastructure, including VPNs and residential proxy networks, now appears in nearly every security incident. The article argues that, although security teams have access to more IP-related data than ever, many still struggle to determine who is behind an IP address and what action should follow.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the issue as a gap between data availability and operational decision-making. Analysts ingest enrichment feeds, geolocation data, reputation scores, telemetry, and threat intelligence from many vendors and platforms. However, the study indicates that organizations often lack the visibility, context, and workflows needed to use that information effectively.\u003c/p\u003e\n\n\u003ch2 id=\"anonymized-infrastructure-in-security-incidents\"\u003eAnonymized Infrastructure in Security Incidents\u003c/h2\u003e\n\n\u003cp\u003eThe article describes VPN services, residential proxy networks, and other anonymization tools as a major change in how cybercriminals operate. Residential proxies route traffic through consumer internet connections, allowing malicious activity to blend in with normal user behavior. VPN services add anonymity and allow rapid switching between locations and network identities.\u003c/p\u003e\n\n\u003cp\u003eBecause of these capabilities, the article says approaches based only on reputation or static blocklists are becoming less effective. Security teams increasingly encounter cases where the IP address itself provides little immediate insight into intent. An address may look residential, belong to a legitimate ISP, and have no prior malicious reputation while still being involved in an active attack campaign.\u003c/p\u003e\n\n\u003ch2 id=\"reported-impact\"\u003eReported Impact\u003c/h2\u003e\n\n\u003cp\u003eThe Spur study found that nearly half of companies reported significant operational or financial impact from account takeover attempts and credential abuse via VPNs and residential proxies. The article presents these incidents as examples of why IP addresses alone can be misleading. The use of anonymized infrastructure can make malicious traffic appear ordinary or legitimate at the network level.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify specific victim organizations or named threat actors. It discusses the affected parties broadly as security teams, organizations, analysts, employees, and companies using IP intelligence. It also mentions nation-state actors posing as legitimate employees in high-concentration remote work environments, but does not name a specific country or actor.\u003c/p\u003e\n\n\u003ch2 id=\"lack-of-context-as-a-core-problem\"\u003eLack of Context as a Core Problem\u003c/h2\u003e\n\n\u003cp\u003eA major theme in the article is the “context deficit” facing security operations. Nearly half of survey respondents said lack of context is the biggest challenge for security teams analyzing IP activity. The article says basic IP attributes such as geolocation and network ownership remain useful, but often do not explain the intent behind activity.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several additional layers of context that security teams increasingly need:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInfrastructure classification.\u003c/li\u003e\n\u003cli\u003eVPN and proxy attribution.\u003c/li\u003e\n\u003cli\u003eBehavioral indicators.\u003c/li\u003e\n\u003cli\u003eHistorical usage patterns.\u003c/li\u003e\n\u003cli\u003eDevice and session correlations.\u003c/li\u003e\n\u003cli\u003eAutomation and bot signals.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eWithout this context, analysts must make decisions based on incomplete information. With context, the article says teams can better understand not only where traffic is coming from, but also why it may represent elevated risk.\u003c/p\u003e\n\n\u003ch2 id=\"reactive-use-of-ip-intelligence\"\u003eReactive Use of IP Intelligence\u003c/h2\u003e\n\n
