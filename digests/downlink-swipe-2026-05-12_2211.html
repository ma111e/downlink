s.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eIndustry Adoption and Strategic Partnerships\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eOpenAI is actively deploying these capabilities through a broad network of industry and government partners. Several major security and networking companies, including Akamai, Cisco, Cloudflare, CrowdStrike, Fortinet, Oracle, Palo Alto Networks, and Zscaler, are already integrating Daybreak’s capabilities. Access to the tooling remains tightly controlled at this stage, with OpenAI urging interested organizations to request vulnerability scans or contact its sales team directly.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eImpact on Vulnerability Discovery and Patching\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe rollout addresses a critical industry bottleneck caused by AI tools that have drastically shortened the time required to discover latent security flaws. What once demanded extensive manual effort can now be identified rapidly, leaving traditional patching processes struggling to keep pace. This acceleration has resulted in significant triage fatigue, forcing project maintainers to sift through overwhelming volumes of vulnerability reports. Some of these reports contain plausible-sounding but entirely hallucinated findings generated by AI models. The severity of this issue prompted HackerOne to pause its bug bounty program in early March, citing an unsustainable imbalance between discovery rates and remediation capacity.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eThe Shift in Disclosure Timelines\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eAs AI lowers the barrier to finding security flaws, companies like OpenAI, Anthropic, and Google are positioning AI security agents as a new operational layer for infrastructure defense. This technological shift has fundamentally altered traditional disclosure practices. Security researcher Himanshu Anand recently published an analysis declaring the traditional 90-day coordinated disclosure policy dead. He argued that when multiple researchers independently identify the same vulnerability within weeks, and AI can convert a patch diff into a working exploit in 30 minutes, extended disclosure windows provide no meaningful protection. The industry is now forced to adapt to compressed timelines where discovery and exploitation occur almost simultaneously.\u003c/p\u003e\n","keyPoints":["OpenAI launched Daybreak, a cybersecurity initiative leveraging GPT-5.5 models and Codex Security to help organizations identify, validate, and patch vulnerabilities.","The system utilizes three distinct GPT-5.5 variants, including a permissive model for red teaming and a version with Trusted Access for Cyber designed for verified defensive work.","Major companies such as Akamai, Cisco, and Cloudflare are integrating these capabilities to address the remediation bottleneck caused by AI tools shortening the time required to discover security flaws.","Security researchers note that AI has compressed disclosure and exploit timelines to near-zero, leading to claims that the traditional 90-day disclosure policy is no longer viable."],"insights":["The traditional 90-day coordinated disclosure window is functionally obsolete because AI can now generate working exploits from patch diffs in under 30 minutes, compressing the timeline to near-zero.","AI-driven vulnerability discovery has triggered a triage fatigue crisis severe enough to force platforms like HackerOne to pause bug bounty programs due to unsustainable report volumes.","OpenAI is positioning AI security agents as a foundational operational layer that embeds threat modeling, patch validation, and remediation guidance directly into the developer workflow rather than treating them as external scanning tools.","The deployment of a specifically permissive GPT-5.5-Cyber model for red teaming and controlled validation demonstrates a strategic shift toward using highly capable AI models for offensive security testing within authorized environments."],"referencedReports":[],"body":"\u003cp\u003eOpenAI has launched Daybreak, a cybersecurity initiative that merges frontier AI capabilities with Codex Security to help organizations proactively identify and patch vulnerabilities. The platform integrates secure code review, threat modeling, and remediation guidance directly into the development loop to improve software resilience. Daybreak operates using three distinct GPT-5.5 model variants tailored for different security operations. The first is a standard model with general safeguards, while the second provides Trusted Access for Cyber for verified defensive work. The third is a permissive GPT-5.5-Cyber model specifically built for red teaming and penetration testing. Major security vendors like Cisco, Cloudflare, and CrowdStrike are already integrating these tools into their workflows. This initiative addresses a critical industry bottleneck where AI-accelerated vulnerability discovery is outpacing traditional patching processes. The rapid pace of AI-assisted research has led to severe triage fatigue and prompted platforms like HackerOne to pause bug bounty programs. Security researchers now argue that the traditional 90-day disclosure window is obsolete, as AI can turn patch diffs into working exploits in minutes.\u003c/p\u003e\n"},{"n":2,"title":"Instructure pays ransom after Canvas incident as Congress announces investigation","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/instructure-pays-ransom-canvas-incident-congress-investigation","time":"13:01","priority":"SHOULD READ","score":88,"group":"M","groupColor":"#ca9a04","tldr":"Instructure paid a ransom to the ShinyHunters group after hackers breached its Canvas platform, prompting a congressional investigation into the company's incident response and data security practices.","briefOverview":"\u003cp\u003eInstructure paid a ransom to the ShinyHunters cybercriminal group following two breaches of its Canvas platform in early May. The company confirmed that the hackers returned the stolen data and provided digital proof of its destruction. Instructure assured customers that no schools or universities would be individually extorted or have their data publicly leaked. The House Homeland Security Committee announced an investigation into the incident, with Representative Andrew Garbarino requesting a briefing on the company\u0026rsquo;s response. Garbarino\u0026rsquo;s letter highlighted a significant gap between Instructure\u0026rsquo;s initial claim of containing the breach on May 2 and the second intrusion on May 7. The FBI has warned students against responding to hacker communications, noting that such contact does not guarantee data compromise. Instructure\u0026rsquo;s CEO issued a public apology and confirmed that CrowdStrike and another cybersecurity firm are conducting forensic analyses. The attack affected thousands of educational institutions using Canvas for course materials and communication. ShinyHunters has a documented history of targeting major organizations, including Ticketmaster and AT\u0026amp;T. The group\u0026rsquo;s leak site was taken offline on Monday, leading experts to speculate about potential law enforcement intervention.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eInstructure, an education technology firm, paid a ransom to the ShinyHunters cybercriminal group after hackers compromised its Canvas platform. The company published a note confirming that the agreement required the hackers to return the stolen data and provide digital confirmation of its destruction. Instructure stated that no individual customers would face extortion or public data leaks as a result of the incident.\u003c/p\u003e\n\n\u003cp\u003eThe ShinyHunters group breached the platform twice within a two-week period, initially stealing data on May 1 and defacing the site with a ransom message on May 7. Thousands of universities and K-12 schools rely on Canvas to share materials and communicate with educators. When users logged in recently, they encountered a threatening message that prompted Instructure to temporarily shut down the platform.\u003c/p\u003e\n\n\u003cp\u003eHackers claimed to have accessed information from 9,000 customers, including names, email addresses, student IDs, and private messages. They demanded individual ransoms from each school and threatened a public leak on May 12. The ransom payment decision followed an announcement by the House Homeland Security Committee that it would investigate the cyberattack.\u003c/p\u003e\n\n\u003cp\u003eRepresentative Andrew Garbarino sent a letter requesting a briefing from Instructure\u0026rsquo;s CEO before May 21. Garbarino emphasized the need to understand the circumstances of both intrusions and the adequacy of the company\u0026rsquo;s coordination with federal agencies. He specifically noted the discrepancy between Instructure\u0026rsquo;s May 2 containment claim and the subsequent second breach.\u003c/p\u003e\n\n\u003cp\u003eThe recurrence of the intrusion within days of the initial disclosure raised serious questions about the company\u0026rsquo;s incident response capabilities. Instructure CEO Steve Daly published a letter apologizing for the disruption and confirming that Canvas is currently safe. He announced that CrowdStrike and another cyber firm have been hired to conduct forensic analysis and harden the environment.\u003c/p\u003e\n\n\u003cp\u003eThe FBI confirmed awareness of the disruption and advised students not to respond to hacker contact. Agency officials clarified that receiving messages from ShinyHunters does not necessarily indicate that personal information has been compromised. On Monday, the ShinyHunters leak site was taken offline, with cybersecurity experts pointing to potential FBI action against the group.\u003c/p\u003e\n\n\u003cp\u003eThe attack on Instructure follows a pattern of ShinyHunters targeting high-profile companies across multiple sectors. The group previously breached organizations like Ticketmaster, AT\u0026amp;T, and McGraw Hill. This incident underscores the ongoing cybersecurity challenges facing educational technology providers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncident Overview and Timeline\u003c/strong\u003e\nInstructure, an education technology firm, paid a ransom to the ShinyHunters cybercriminal group following a significant security incident involving its Canvas platform. The breach occurred in two distinct phases over a two-week period in early May. On May 1, the group initially stole troves of information from the platform. A second intrusion occurred on May 7, during which the hackers defaced the Canvas interface by displaying a ransom message. Instructure temporarily shut down the platform following the second breach, leaving millions of students unable to access class materials ahead of final exams.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eData Scope and Hacker Demands\u003c/strong\u003e\nShinyHunters claimed to have compromised data from 9,000 Instructure customers. The alleged stolen information includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNames and email addresses\u003c/li\u003e\n\u003cli\u003eStudent IDs\u003c/li\u003e\n\u003cli\u003ePrivate messages exchanged between students and professors\nThe group demanded individual ransoms from each affected school and issued a threat to publicly leak the data on May 12. Instructure confirmed that the ransom agreement included the return of the stolen data and digital verification of its destruction. The company explicitly stated that no individual customers would be extorted or have their data publicly released.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eRegulatory and Law Enforcement Response\u003c/strong\u003e\nThe House Homeland Security Committee announced an investigation into the cyberattack, highlighting concerns over the educational technology sector\u0026rsquo;s cybersecurity practices. Representative Andrew Garbarino (R-NY) sent a formal letter to Instructure\u0026rsquo;s CEO, requesting a briefing before May 21. The letter demanded a transparent accounting of the incident, including the circumstances of both intrusions, the volume of accessed data, and the company\u0026rsquo;s coordination with federal law enforcement and CISA. Garbarino specifically criticized the timeline discrepancy between Instructure\u0026rsquo;s initial claim of containing the breach on May 2 and the subsequent second intrusion. He noted that the rapid recurrence of the attack and apparent failure to remediate vulnerabilities during that window raise serious questions about the company\u0026rsquo;s incident response capabilities. The FBI confirmed it is aware of the disruption and issued a public warning advising students not to respond to contact from the hackers. FBI spokespersons clarified that receiving messages from ShinyHunters does not necessarily mean personal information has been compromised, urging individuals to await formal guidance from their institutions. On Monday, the ShinyHunters leak site was taken offline, leading cybersecurity experts to speculate about potential FBI action targeting the group.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eCorporate Response and Mitigation\u003c/strong\u003e\nInstructure CEO Steve Daly published a letter to customers apologizing for the incident and reaffirming that the Canvas platform is currently safe to use. The company hired CrowdStrike and another cybersecurity firm to conduct a forensic analysis of the breach and harden its environment. Instructure stated that any university or school not already contacted by the company was not impacted by the cyberattack. The decision to pay the ransom was framed as a necessary step to provide customers with additional peace of mind, despite the inherent uncertainties of dealing with cybercriminals.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eThreat Actor Context\u003c/strong\u003e\nThe ShinyHunters group has demonstrated a pattern of targeting high-profile organizations across multiple sectors. Prior to the Instructure incident, the group was responsible for breaches at Ticketmaster, AT\u0026amp;T, and educational publisher McGraw Hill. The attack on Instructure represents the latest in a series of operations by this persistent threat actor, underscoring the ongoing risks faced by critical infrastructure and educational technology providers.\u003c/p\u003e\n","keyPoints":["Instructure paid a ransom to the ShinyHunters cybercriminal group after hackers breached the Canvas platform twice in early May.","The House Homeland Security Committee announced an investigation into the cyberattack, with Rep. Andrew Garbarino requesting a briefing on the company's incident response capabilities.","ShinyHunters claimed to have stolen data from 9,000 Instructure customers, including names, email addresses, student IDs, and messages between students and professors.","The FBI warned students not to respond to contact from the hackers and stated that receiving messages from ShinyHunters does not necessarily mean personal information has been compromised."],"insights":["The timeline discrepancy between Instructure’s May 2 containment claim and the May 7 second breach indicates inadequate vulnerability remediation during the critical post-incident window, directly prompting congressional scrutiny.","The FBI’s explicit guidance that contact from ShinyHunters does not necessarily mean data is compromised provides a critical risk-filter for institutions to prevent panic-driven responses and unauthorized payments.","ShinyHunters operates as a persistent cross-sector threat actor, evidenced by prior breaches of Ticketmaster, AT\u0026T, and McGraw Hill, indicating a recurring pattern that warrants sustained threat monitoring."],"referencedReports":[],"body":"\u003cp\u003eInstructure paid a ransom to the ShinyHunters cybercriminal group following two breaches of its Canvas platform in early May. The company confirmed that the hackers returned the stolen data and provided digital proof of its destruction. Instructure assured customers that no schools or universities would be individually extorted or have their data publicly leaked. The House Homeland Security Committee announced an investigation into the incident, with Representative Andrew Garbarino requesting a briefing on the company\u0026rsquo;s response. Garbarino\u0026rsquo;s letter highlighted a significant gap between Instructure\u0026rsquo;s initial claim of containing the breach on May 2 and the second intrusion on May 7. The FBI has warned students against responding to hacker communications, noting that such contact does not guarantee data compromise. Instructure\u0026rsquo;s CEO issued a public apology and confirmed that CrowdStrike and another cybersecurity firm are conducting forensic analyses. The attack affected thousands of educational institutions using Canvas for course materials and communication. ShinyHunters has a documented history of targeting major organizations, including Ticketmaster and AT\u0026amp;T. The group\u0026rsquo;s leak site was taken offline on Monday, leading experts to speculate about potential law enforcement intervention.\u003c/p\u003e\n"},{"n":4,"title":"State of ransomware in 2026","source":"securelist.com","sourceColor":"#2dd4bf","link":"https://securelist.com/state-of-ransomware-in-2026/119761/","time":"07:00","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"Ransomware is shifting toward data-centric extortion and post-quantum encryption, making proactive defense, secure remote access, and immutable backups essential for organizations.","briefOverview":"\u003cp\u003eThe 2026 ransomware landscape is defined by a shift toward encryptionless extortion and the adoption of post-quantum cryptography by emerging threat families. Although the percentage of organizations affected by ransomware decreased in 2025, the threat remains highly persistent and efficiently scaled.\u003c/p\u003e\n\n\u003cp\u003eAttackers are increasingly relying on defense evasion tools, such as EDR killers and BYOVD techniques, to neutralize endpoint protections before deployment. As ransom payments dropped to 28%, groups like ShinyHunters are prioritizing data theft and public disclosure over file encryption.\u003c/p\u003e\n\n\u003cp\u003eInitial access has become highly industrialized through initial access brokers, with RDWeb portals emerging as a preferred remote access vector. Law enforcement has disrupted several dark web platforms, but new actors like Qilin and The Gentlemen quickly fill operational vacuums. Organizations must prioritize proactive patching, secure remote access architectures, and immutable backups to mitigate these evolving risks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eKaspersky’s 2026 annual report highlights that ransomware continues to be a persistent and adaptive cyberthreat despite a regional decline in affected organizations in 2025. The threat landscape is evolving through several distinct operational shifts. New ransomware families are adopting post-quantum cryptography, with the PE32 group utilizing the NIST-selected Kyber1024 algorithm to resist decryption by both classical and quantum computers. Simultaneously, attackers are implementing encryptionless extortion as ransom payments fell to 28% in 2025. Groups like ShinyHunters now focus exclusively on data exfiltration and public leak sites, shifting the primary risk from business continuity to compliance and reputational damage.\u003c/p\u003e\n\n\u003cp\u003eDefense evasion has become a deliberate phase of the attack lifecycle, with operators routinely deploying EDR killers and exploiting signed drivers through Bring Your Own Vulnerable Driver techniques. Initial access remains highly commoditized through initial access brokers, who increasingly target inadequately secured RDWeb portals alongside traditional RDP and VPN vectors. The underground ecosystem facilitates this industrialization, with compromised credentials and datasets traded on Telegram channels and dark web forums. Law enforcement actions have seized major platforms like RAMP and LeakBase, yet the market remains resilient as dormant groups like RansomHub are replaced by faster-growing operators.\u003c/p\u003e\n\n\u003cp\u003eIn 2025, Qilin emerged as the dominant targeted attack group, while Clop specialized in supply-chain-style compromises and Akira maintained steady operational consistency. Emerging 2026 actors like The Gentlemen demonstrate a professionalized, data-centric approach that targets enterprise hardware such as FortiOS and Cisco ASA appliances. To counter these threats, Kaspersky recommends automated vulnerability management, Microsoft’s Vulnerable Driver Blocklist, and strict remote access controls using ZTNA and continuous multi-factor authentication. Network segmentation, offline immutable backups, and comprehensive incident response planning are also essential. Ultimately, the report emphasizes that preventing initial compromise and maintaining robust data security controls are critical to surviving the modern ransomware ecosystem.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview-and-threat-landscape\"\u003eOverview and Threat Landscape\u003c/h2\u003e\n\n\u003cp\u003eThe 2026 ransomware report from Kaspersky outlines a highly adaptive threat environment that remains persistent despite a documented decline in affected organizations across all regions in 2025. Ransomware operators are refining their tactics and scaling operations with greater efficiency. The manufacturing sector alone faced over $18 billion in potential losses from ransomware attacks in the first three quarters of 2025. This underscores that formal decreases in attack frequency do not equate to reduced severity or financial impact.\u003c/p\u003e\n\n\u003ch2 id=\"key-operational-shifts\"\u003eKey Operational Shifts\u003c/h2\u003e\n\n\u003cp\u003eThe ransomware ecosystem is undergoing three major operational transformations. First, encryptionless extortion is rising as ransom payments dropped to 28% in 2025. Groups like ShinyHunters now bypass file encryption entirely, focusing instead on data theft and public disclosure. This shifts the victim\u0026rsquo;s primary concern from operational disruption to regulatory consequences and reputational harm.\u003c/p\u003e\n\n\u003cp\u003eSecond, defense evasion has become a standardized, repeatable phase of the attack lifecycle. Operators routinely deploy EDR killers and exploit trusted, signed drivers through Bring Your Own Vulnerable Driver techniques to degrade defensive visibility. Third, new ransomware families are integrating post-quantum cryptography. The PE32 group utilizes the Kyber1024 algorithm, a NIST-selected standard that secures AES keys against both classical and quantum decryption attempts.\u003c/p\u003e\n\n\u003ch2 id=\"ecosystem-dynamics-and-actor-analysis\"\u003eEcosystem Dynamics and Actor Analysis\u003c/h2\u003e\n\n\u003cp\u003eInitial access has become highly industrialized through an Access-as-a-Service model. Initial access brokers supply pre-compromised credentials harvested from infostealers and phishing campaigns. While RDP and VPN remain common vectors, attackers are increasingly targeting RDWeb portals that are frequently vulnerable or inadequately safeguarded.\u003c/p\u003e\n\n\u003cp\u003eThe underground market facilitates this specialization, with compromised datasets and access credentials traded on Telegram channels and dark web forums. The competitive landscape features both established and emerging actors. Qilin dominated targeted attacks in 2025 through high-volume operations and a structured affiliate model. Clop distinguished itself with supply-chain-style attacks exploiting enterprise software, while Akira maintained consistent operational stability. RansomHub experienced sudden dormancy, creating a market vacuum filled by newer groups.\u003c/p\u003e\n\n\u003cp\u003eEmerging 2026 actors like The Gentlemen demonstrate a professionalized, data-centric approach. They target widely deployed enterprise hardware such as FortiOS, SonicWall, and Cisco ASA appliances, focusing on controlled pressure and reputational risk rather than immediate disruption. Other noted groups include Devman, MintEye, DireWolf, NightSpire, Vect, Tengu, and Kazu, illustrating the low barrier to entry and constant churn within the ecosystem.\u003c/p\u003e\n\n\u003ch2 id=\"law-enforcement-and-dark-web-activity\"\u003eLaw Enforcement and Dark Web Activity\u003c/h2\u003e\n\n\u003cp\u003eLaw enforcement agencies are actively disrupting ransomware infrastructure by seizing dark web platforms and data leak sites. Major underground forums like RAMP and LeakBase were seized in early 2026, following takedowns of Nulled, Cracked, and XSS in 2025. Specific ransomware groups like BlackSuit and 8Base also saw their leak sites seized.\u003c/p\u003e\n\n\u003cp\u003eWhile these actions cause coordination friction for initial access brokers and affiliates, similar forums typically emerge to fill the void. The dark web remains a central hub for malware distribution, service advertisements, and cross-group collaboration, ensuring operational continuity despite enforcement pressure.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-recommendations\"\u003eDefensive Recommendations\u003c/h2\u003e\n\n\u003cp\u003eKaspersky outlines several critical defensive measures to counter the evolving threat. Organizations must prioritize proactive patching and vulnerability management, utilizing automated tools to update operating systems and software. Enabling Microsoft’s Vulnerable Driver Blocklist is essential to thwart BYOVD attacks.\u003c/p\u003e\n\n\u003cp\u003eRemote access infrastructure requires strict hardening, with RDP and RDWeb connections restricted behind VPNs or Zero Trust Network Access architectures. Continuous multi-factor authentication and the Principle of Least Privilege should be enforced across all endpoints. Network segmentation and robust EDR solutions like Kaspersky NEXT are necessary to detect suspicious driver loading and limit lateral movement.\u003c/p\u003e\n\n\u003cp\u003eFinally, maintaining regularly tested offline backups, conducting simulated phishing training, and developing comprehensive incident response plans are vital. The report strongly advises against paying ransoms due to infrastructure risks and affiliate instability, recommending the use of free decryptors when available.\u003c/p\u003e\n","keyPoints":["Ransomware groups are increasingly adopting post-quantum cryptography, with families like PE32 utilizing the NIST-selected Kyber1024 algorithm to resist decryption by classical and quantum computers.","As ransom payments dropped to 28% in 2025, attackers are shifting toward encryptionless extortion that focuses exclusively on data theft and public disclosure rather than file encryption.","Initial access remains highly industrialized through initial access brokers selling compromised credentials, with attackers increasingly targeting RDWeb portals as a preferred remote access vector.","Defense evasion has become a standard phase of the attack lifecycle, with operators routinely deploying EDR killers and exploiting signed drivers through Bring Your Own Vulnerable Driver techniques to disable endpoint protections.","Law enforcement takedowns of underground forums and leak sites have disrupted some operations, but the ransomware ecosystem remains stable with new groups like Qilin and The Gentlemen quickly filling operational vacuums."],"insights":["The shift to encryptionless extortion renders traditional offline backups ineffective, as organizations now face direct risks from data exposure, regulatory penalties, and reputational damage.","Attackers are systematically disabling EDR tools by exploiting trusted, signed drivers through BYOVD techniques, making Microsoft’s Vulnerable Driver Blocklist a critical defensive control.","With public RDP exposure increasingly restricted, initial access brokers are pivoting to target inadequately secured RDWeb portals as the primary remote access vector.","Emerging groups like \"The Gentlemen\" are professionalizing ransomware by focusing on controlled data exfiltration and targeting widely deployed enterprise hardware such as FortiOS and Cisco ASA appliances.","Captured credentials from infostealers now fuel the access-as-a-service market, requiring continuous authentication and strict credential monitoring to prevent breaches from single compromised accounts."],"referencedReports":[{"title":"Kaspersky and VDC Research Reveal Over $18B in Potential Losses from Ransomware Attacks on the Global Manufacturing Industry in 2025","url":"https://www.kaspersky.com/about/press-releases/kaspersky-and-vdc-research-reveal-over-18b-in-potential-losses-from-ransomware-attacks-on-the-global-manufacturing-industry-in-2025","publisher":"Kaspersky \u0026 VDC Research","context":"Cited for joint research findings indicating that ransomware attacks caused over $18 billion in losses in the manufacturing sector during the first three quarters of 2025."},{"title":"Crypto Ransomware 2026","url":"https://www.chainalysis.com/blog/crypto-ransomware-2026/","publisher":"Chainalysis","context":"Referenced to support the statistic that the share of ransom payments dropped to 28% in 2025."}],"body":"\u003cp\u003eThe 2026 ransomware landscape is defined by a shift toward encryptionless extortion and the adoption of post-quantum cryptography by emerging threat families. Although the percentage of organizations affected by ransomware decreased in 2025, the threat remains highly persistent and efficiently scaled.\u003c/p\u003e\n\n\u003cp\u003eAttackers are increasingly relying on defense evasion tools, such as EDR killers and BYOVD techniques, to neutralize endpoint protections before deployment. As ransom payments dropped to 28%, groups like ShinyHunters are prioritizing data theft and public disclosure over file encryption.\u003c/p\u003e\n\n\u003cp\u003eInitial access has become highly industrialized through initial access brokers, with RDWeb portals emerging as a preferred remote access vector. Law enforcement has disrupted several dark web platforms, but new actors like Qilin and The Gentlemen quickly fill operational vacuums. Organizations must prioritize proactive patching, secure remote access architectures, and immutable backups to mitigate these evolving risks.\u003c/p\u003e\n"},{"n":5,"title":"State-sponsored actors, better known as the friends you don’t want","source":"blog.talosintelligence.com","sourceColor":"#60a5fa","link":"https://blog.talosintelligence.com/state-sponsored-actors-better-known-as-the-friends-you-dont-want/","time":"10:00","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"Defending against state-sponsored actors requires abandoning trust-based security models in favor of continuous verification and deep visibility, making comprehensive logging, strict identity controls, and pre-established incident response plans critical long before an intrusion occurs.","briefOverview":"\u003cp\u003eState-sponsored actors operate within the trust boundary using legitimate credentials and trusted system tools to maintain long-term, undetected access. Unlike criminal threats that seek disruption, these adversaries prioritize espionage and long-term data extraction, requiring defenders to adopt continuous verification rather than implicit trust. Effective detection demands comprehensive logging, centralized log aggregation, and dynamic behavioral baselines to identify living-off-the-land techniques.\u003c/p\u003e\n\n\u003cp\u003eContainment decisions are highly complex, often requiring silent monitoring and coordination with legal counsel and national authorities rather than immediate network isolation. Organizations must also prepare for OT/ICS threats, supply chain compromises, and structured insider threats through pre-established response procedures. Ultimately, security teams with limited resources should prioritize enabling existing visibility configurations, enforcing strict identity controls, and concentrating monitoring on critical infrastructure to build a resilient defense posture.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eState-sponsored actors fundamentally differ from criminal threat actors by operating inside the trust boundary using legitimate credentials and trusted administrative tools. Their primary objective is covertness, allowing them to extract intelligence or pre-position for disruption without triggering alarms. This operational reality renders conventional incident response playbooks inadequate, as they are typically designed for malware containment and ransomware recovery. Defenders must instead adopt a zero-trust mindset that continuously verifies trust and plans for inevitable failures. The Cyber Kill Chain remains applicable, but state-sponsored adversaries execute each phase with greater patience and precision. Reconnaissance is often prolonged and conducted through OSINT or lawful access laws. Initial access frequently relies on spear phishing or supply chain compromises that bypass signature-based detection. Lateral movement heavily utilizes living-off-the-land techniques, leveraging built-in tools like PowerShell and WMI to blend with normal administrative activity. Persistence mechanisms are distributed across scheduled tasks, dormant accounts, and firmware-level implants, remaining dormant until activated by geopolitical triggers.\u003c/p\u003e\n\n\u003cp\u003eAttribution should be treated as a secondary function, with tactical response focusing on containment, scope determination, and recovery. Preparation requires robust visibility through full command-line logging, PowerShell script block logging, and centralized log forwarding. Behavioral baselines must be continuously updated to reflect organizational changes and seasonal patterns. Identity and privilege management are critical, requiring tiered admin models and strict service account scoping. Operational security during an incident is essential, necessitating out-of-band communications and compartmentalized investigation teams. For OT environments, hardware-enforced unidirectional gateways are necessary to prevent compromised accounts from reconfiguring software segmentation. Supply chain readiness demands an accurate software bill of materials and pre-authorized incident response procedures for third-party integrations. Insider threat programs must extend beyond background checks to include deep identity verification and behavioral monitoring.\u003c/p\u003e\n\n\u003cp\u003eContainment strategies require careful deliberation, as premature isolation may signal detection to the adversary and trigger accelerated objectives. Silent monitoring should only be deployed with legal approval and senior leadership coordination. Post-incident activities must include intelligence sharing through ISACs, structured ATT\u0026amp;CK mapping, and sustained threat hunting to catch return attempts. Security teams operating with constrained budgets should sequence their efforts by first enabling native logging, then enforcing strict identity controls, and finally concentrating advanced monitoring on domain controllers and critical servers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eOperational Methodology and Threat Profile\u003c/strong\u003e\nState-sponsored actors operate exclusively within the trust boundary, leveraging legitimate credentials and trusted system tools to maintain long-term, undetected access. Unlike financially motivated criminals who require target awareness for ransom demands, these adversaries prioritize espionage, intellectual property theft, and pre-positioning for future disruption. Their success depends entirely on remaining invisible, which dictates every technical decision throughout the Cyber Kill Chain. Reconnaissance is typically prolonged and conducted through open-source intelligence, social engineering of adjacent organizations, or lawful access laws that leave no defensive artifacts. Initial access frequently exploits zero-days or leverages legitimate credentials obtained via spear phishing. Lateral movement heavily relies on living-off-the-land techniques, utilizing built-in administrative tools like PowerShell, WMI, and PsExec to execute actions indistinguishable from routine operations. Persistence is established through multiple redundant mechanisms, including scheduled tasks, dormant accounts, and firmware-level implants that remain inactive until a specific intelligence or geopolitical trigger activates them.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eDetection and Visibility Requirements\u003c/strong\u003e\nConventional security architectures fail to identify this threat category because they assume internal trust. Defenders must implement continuous verification through comprehensive logging and dynamic behavioral baselines. Windows command-line logging (Event ID 4688) and PowerShell script block logging (Event ID 4104) are essential for capturing exact execution parameters. Sysmon should be deployed to flag suspicious parent-child process relationships, particularly on domain controllers and externally facing systems. Centralized log forwarding is mandatory to prevent adversaries from clearing local event logs. Network-layer visibility must complement endpoint telemetry through NetFlow analysis, DNS logging, and encrypted traffic analysis using machine learning models to detect command-and-control patterns without breaking encryption. Behavioral baselines require continuous updating to account for seasonal shifts, infrastructure changes, and role transitions, ensuring anomaly detection remains accurate rather than noisy. Key visibility priorities include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnabling full command-line argument logging to track exact execution parameters.\u003c/li\u003e\n\u003cli\u003eCapturing PowerShell script blocks to record actual code execution rather than just process launches.\u003c/li\u003e\n\u003cli\u003eDeploying Sysmon selectively on critical servers to flag legitimate binaries used as malicious proxies.\u003c/li\u003e\n\u003cli\u003eForwarding all logs to a write-once, centralized location to preserve evidence against local log clearing.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eIncident Response and Containment Strategy\u003c/strong\u003e\nResponding to state-sponsored intrusions demands fundamentally different playbooks than those used for ransomware or malware. Attribution should be delegated to national authorities, allowing internal teams to focus on containment, scope determination, and recovery. Containment decisions are highly complex; premature network isolation can signal detection to the adversary, potentially triggering accelerated objectives before defenses are ready. Silent monitoring may be strategically preferable but introduces legal, ethical, and operational risks that require formal approval from legal counsel and senior leadership. Operational security during the investigation is critical, requiring out-of-band communications on isolated devices and strict compartmentalization of personnel. Post-incident activities must include intelligence sharing through ISACs, structured ATT\u0026amp;CK mapping to identify control failures, and sustained threat hunting focused on the specific actor\u0026rsquo;s tactics and techniques.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eSpecialized Environments and Supply Chain Readiness\u003c/strong\u003e\nOperational technology and industrial control systems present unique challenges that standard IT incident response plans do not address. The IT-OT boundary is treated as a lateral movement path rather than a security barrier, as demonstrated by campaigns like Volt Typhoon. OT environments often cannot be taken offline for forensic imaging, requiring investigations to work around live production systems. Legacy software constraints make virtual patching through IDS/IPS rules the only near-term remediation option. Hardware-enforced unidirectional gateways are necessary to provide deterministic network separation that cannot be overridden by compromised accounts. Supply chain readiness requires maintaining an accurate software bill of materials, mapping third-party access privileges, and enforcing strict contractual notification clauses. Pre-authorized incident response procedures must be established for each vendor integration to eliminate delays during active compromise. Critical supply chain measures include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMaintaining a software bill of materials connected directly to infrastructure for automated vulnerability monitoring.\u003c/li\u003e\n\u003cli\u003eMapping third-party system access, mechanisms, and privilege levels to understand trust boundary extensions.\u003c/li\u003e\n\u003cli\u003eEnforcing 24-hour disclosure clauses in vendor contracts to prevent containment windows from closing prematurely.\u003c/li\u003e\n\u003cli\u003eInventorying firmware patch status for all network devices and applying compensating controls to legacy equipment.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eInsider Threats and Resource Prioritization\u003c/strong\u003e\nState-sponsored insider threats operate as structured intelligence operations that exploit the hiring process itself. Verification must extend beyond standard background checks to include live multi-stage video interviews with liveness verification, digital footprint validation, and cross-referencing for identity inconsistencies. Behavioral baselines and data loss prevention policies should be established alongside legal pre-authorization for employee monitoring. Security teams operating with constrained budgets and competing priorities should sequence their defensive investments strategically. Visibility improvements should come first by enabling existing native logging configurations at zero licensing cost. Identity controls should be prioritized next through multi-factor authentication on administrative accounts and tiered admin models. Advanced monitoring should then be concentrated on critical infrastructure, ensuring that early foundational steps determine the effectiveness of all subsequent security investments.\u003c/p\u003e\n","keyPoints":["State-sponsored actors operate inside the trust boundary using legitimate credentials and trusted system tools to maintain long-term, undetected access.","Defenders must implement continuous verification through comprehensive logging, centralized log aggregation, and dynamic behavioral baselines to detect living-off-the-land techniques.","Containment decisions during state-sponsored incidents are highly complex and often require silent monitoring, legal counsel input, and coordination with national authorities rather than immediate isolation.","Security teams with limited resources should prioritize enabling existing visibility configurations, enforcing strict identity controls like multi-factor authentication and tiered admin models, and concentrating monitoring on critical infrastructure."],"insights":["Premature containment in state-sponsored incidents risks triggering accelerated adversary objectives and forfeiting intelligence gathering, making silent monitoring a deliberate strategic choice requiring legal and leadership approval.","Machine learning can detect command-and-control traffic in encrypted TLS sessions by analyzing packet timing and size distributions, enabling detection without deep packet inspection or privacy violations.","Hardware-enforced unidirectional gateways (data diodes) are required for OT/ICS boundaries because software-defined segmentation can be reconfigured by compromised privileged accounts.","Enabling native Windows command-line logging (Event ID 4688) and PowerShell script block logging (Event ID 4104) provides critical visibility at zero licensing cost, addressing the most common detection gap before investing in new tooling."],"referencedReports":[{"title":"Waterfall Threat Report 2026","url":"https://industrialcyber.co/reports/waterfall-threat-report-2026-finds-ransomware-slowdown-masks-deeper-shift-toward-nation-state-attacks-on-critical-infrastructure/","publisher":"Industrial Cyber","context":"Referenced to highlight the shift toward nation-state attacks on critical infrastructure and recommendations for engineering-based protections for OT boundaries."},{"title":"CISA Advisory AA24-038A","url":"https://www.cisa.gov/news-events/cybersecurity-advisories/aa24-038a","publisher":"CISA","context":"Cited for CISA's assessment of Volt Typhoon's progression from IT reconnaissance to a sabotage-ready foothold in critical infrastructure."},{"title":"China-Linked Cyber Operations Targeting US Critical Infrastructure","url":"https://www.cyber.nj.gov/threat-landscape/nation-state-threat-analysis-reports/china-linked-cyber-operations-targeting-us-critical-infrastructure/salt-typhoon","publisher":"NJ Cybersecurity \u0026 Communications Integration Center","context":"Referenced to detail Salt Typhoon's access to lawful intercept systems and its operational methodology."},{"title":"Joint Advisory on Living-off-the-Land Techniques","url":"https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-144a","publisher":"CISA","context":"Cited as the joint advisory recommending continuous behavioral baselines to detect living-off-the-land techniques."},{"title":"Identifying and Mitigating Living-off-the-Land Techniques","url":"https://www.cyber.gov.au/about-us/view-all-content/alerts-and-advisories/identifying-and-mitigating-living-off-the-land-techniques","publisher":"Australian Cyber Security Centre","context":"Referenced alongside CISA's guidance on maintaining continuous baselines across network traffic and user behavior."}],"body":"\u003cp\u003eState-sponsored actors operate within the trust boundary using legitimate credentials and trusted system tools to maintain long-term, undetected access. Unlike criminal threats that seek disruption, these adversaries prioritize espionage and long-term data extraction, requiring defenders to adopt continuous verification rather than implicit trust. Effective detection demands comprehensive logging, centralized log aggregation, and dynamic behavioral baselines to identify living-off-the-land techniques.\u003c/p\u003e\n\n\u003cp\u003eContainment decisions are highly complex, often requiring silent monitoring and coordination with legal counsel and national authorities rather than immediate network isolation. Organizations must also prepare for OT/ICS threats, supply chain compromises, and structured insider threats through pre-established response procedures. Ultimately, security teams with limited resources should prioritize enabling existing visibility configurations, enforcing strict identity controls, and concentrating monitoring on critical infrastructure to build a resilient defense posture.\u003c/p\u003e\n"},{"n":8,"title":"New GhostLock tool abuses Windows API to block file access","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/new-ghostlock-tool-abuses-windows-api-to-block-file-access/","time":"22:02","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"GhostLock abuses the Windows CreateFileW API to lock files and block access without elevated privileges, creating a disruption attack that evades standard detection by generating legitimate file open requests.","briefOverview":"\u003cp\u003eA security researcher has released GhostLock, a proof-of-concept tool that abuses the Windows CreateFileW API to block file access. By setting the dwShareMode parameter to zero, the technique grants exclusive access to files and prevents other processes from opening them. This method works on both local files and SMB network shares without requiring elevated privileges. The attack primarily causes operational disruption rather than data destruction, similar to a denial-of-service event. Attackers could use these file locks as a decoy to overwhelm IT staff while conducting other malicious activities. Traditional detection methods often miss this technique because it relies on legitimate file open requests instead of encryption or mass writes. Reliable identification requires monitoring open-file counts with zero share access at the file server layer. The researcher has published detection templates and mitigation guidance in an accompanying whitepaper.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGhostLock is a proof-of-concept tool developed by Kim Dvash of Israel Aerospace Industries that demonstrates how to abuse the Windows CreateFileW API. The technique leverages the dwShareMode parameter by setting it to zero, which grants a process exclusive access to a file. When this setting is active, Windows blocks all other users and applications from opening the targeted file. The researcher has published an automated tool on GitHub that recursively opens numerous files across SMB shares to maximize the disruption. Standard domain users can execute this attack without needing any elevated privileges. The impact is strictly disruption-based, causing operational downtime rather than data loss like ransomware. Attackers can deploy this technique across multiple compromised devices simultaneously to create widespread access blocks. The tool is designed to continuously reacquire file handles even when terminated processes are replaced, sustaining the lock. However, the disruption ends automatically once the SMB session terminates, the processes are killed, or the system reboots. This method is particularly effective as a decoy during intrusions, as the file-access disruptions can overwhelm IT staff. Traditional security products focus on detecting mass file writes or encryption operations, making GhostLock difficult to spot. The only reliable detection metric is the per-session open-file count with ShareAccess equal to zero at the file server layer. This metric exists within storage platform management interfaces rather than Windows event logs or EDR telemetry. The researcher has shared SIEM queries and network detection rules in a whitepaper to help defenders identify the activity.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"overview\"\u003eOverview\u003c/h3\u003e\n\n\u003cp\u003eGhostLock is a proof-of-concept security tool created by Kim Dvash of Israel Aerospace Industries. It demonstrates how attackers can abuse the Windows CreateFileW API to block file access on local systems and SMB network shares. The technique relies on manipulating the dwShareMode parameter to enforce exclusive file locks.\u003c/p\u003e\n\n\u003ch3 id=\"technical-mechanism\"\u003eTechnical Mechanism\u003c/h3\u003e\n\n\u003cp\u003eThe attack operates by calling the CreateFileW function with the dwShareMode parameter set to zero. This configuration grants the initiating process exclusive access to the file. Windows subsequently returns a STATUS_SHARING_VIOLATION error to any other process attempting to open the locked file. The researcher provided a code example showing how to open a finance.xlsx file in exclusive mode using this method.\u003c/p\u003e\n\n\u003ch3 id=\"execution-and-impact\"\u003eExecution and Impact\u003c/h3\u003e\n\n\u003cp\u003eThe GhostLock tool automates this process by recursively opening a large number of files across SMB shares. It requires only standard domain user privileges to function, eliminating the need for elevated access. Attackers can scale the disruption by launching the tool from multiple compromised devices simultaneously. The tool is designed to continuously reacquire file handles as terminated processes are replaced, maintaining the lock. Once the SMB session ends, the processes are killed, or the system reboots, Windows automatically closes the handles and restores normal access. The researcher classifies the impact as disruption-based rather than destructive, drawing a parallel to operational downtime windows rather than ransomware data loss.\u003c/p\u003e\n\n\u003ch3 id=\"detection-challenges\"\u003eDetection Challenges\u003c/h3\u003e\n\n\u003cp\u003eTraditional security products and behavioral detection systems typically focus on mass file writes or encryption operations. GhostLock evades these controls by generating large volumes of legitimate file open requests. The attack lacks the typical telemetry signatures found in Windows event logs, EDR data, or network flow records. The only reliable observable for detection is the per-session open-file count with ShareAccess equal to zero at the file server layer. This metric resides within storage platform management interfaces rather than standard endpoint or network monitoring tools.\u003c/p\u003e\n\n\u003ch3 id=\"mitigation-and-resources\"\u003eMitigation and Resources\u003c/h3\u003e\n\n\u003cp\u003eDefenders can use the researcher\u0026rsquo;s whitepaper to implement detection templates. The document includes SIEM queries and NDR detection rules designed to identify the abnormal file locking patterns. The tool and technical documentation are publicly available on GitHub and Zenodo. Security teams should monitor file server layer metrics to identify unauthorized exclusive file locks.\u003c/p\u003e\n","keyPoints":["GhostLock abuses the Windows CreateFileW API with a zero share mode to lock files and block access without requiring elevated privileges.","The technique operates as a disruption attack that causes operational downtime rather than destroying data like ransomware.","Traditional security tools often fail to detect the attack because it relies on legitimate file open requests instead of mass file writes or encryption.","Effective detection requires monitoring the per-session open-file count with ShareAccess equal to zero at the file server layer."],"insights":["Detection relies on storage platform management interfaces rather than traditional Windows event logs or EDR telemetry, as the attack generates legitimate file open requests that bypass standard behavioral detection.","The technique's disruption nature allows attackers to use widespread file locks as a tactical decoy to overwhelm IT staff while conducting lateral movement or data exfiltration.","Standard domain users can execute the attack without elevated privileges, and coordinating it across multiple compromised devices creates a scalable disruption that only resolves upon session termination or system reboot."],"referencedReports":[{"title":"GhostLock whitepaper","url":"https://zenodo.org/records/20070064","publisher":"Kim Dvash","context":"The article references this document as containing SIEM queries and NDR detection rules that defenders can use as templates for identifying the attack."}],"body":"\u003cp\u003eA security researcher has released GhostLock, a proof-of-concept tool that abuses the Windows CreateFileW API to block file access. By setting the dwShareMode parameter to zero, the technique grants exclusive access to files and prevents other processes from opening them. This method works on both local files and SMB network shares without requiring elevated privileges. The attack primarily causes operational disruption rather than data destruction, similar to a denial-of-service event. Attackers could use these file locks as a decoy to overwhelm IT staff while conducting other malicious activities. Traditional detection methods often miss this technique because it relies on legitimate file open requests instead of encryption or mass writes. Reliable identification requires monitoring open-file counts with zero share access at the file server layer. The researcher has published detection templates and mitigation guidance in an accompanying whitepaper.\u003c/p\u003e\n"},{"n":11,"title":"GM agrees to $12.75M California settlement over sale of drivers’ data","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/legal/gm-agrees-to-1275m-california-settlement-over-sale-of-drivers-data/","time":"22:40","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"General Motors agreed to pay a record $12.75 million settlement to California for illegally collecting and selling drivers' location and driving data to third-party brokers, and must delete retained data and halt sales for five years.","briefOverview":"\u003cp\u003eCalifornia Attorney General Rob Bonta announced a $12.75 million settlement with General Motors for violating the California Consumer Privacy Act. The investigation found that GM illegally collected and sold drivers\u0026rsquo; location and driving data to brokers Verisk Analytics and LexisNexis Risk Solutions between 2020 and 2024. This data was gathered through GM\u0026rsquo;s OnStar subsidiary and Smart Driver system for insurance scoring purposes.\u003c/p\u003e\n\n\u003cp\u003eThe company previously faced a five-year sales ban from the FTC for similar unlawful data collection practices. Under the new agreement, GM must stop selling driving data for five years and delete retained information within 180 days unless consumers explicitly consent. The settlement also requires GM to order the data brokers to delete previously sold information and establish a stronger privacy compliance program.\u003c/p\u003e\n\n\u003cp\u003eThis $12.75 million penalty represents a record amount in California and marks the state\u0026rsquo;s first enforcement action focused on data minimization rules. Officials noted that California drivers are unlikely to face higher insurance premiums due to existing state laws prohibiting insurers from using driving data for rate setting. GM has not yet responded to requests for comment regarding the settlement.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCalifornia Attorney General Rob Bonta announced a $12.75 million settlement with General Motors over allegations that the automaker violated the California Consumer Privacy Act. The violations stem from claims that GM illegally collected and sold Californians\u0026rsquo; driving and location data to third-party brokers Verisk Analytics and LexisNexis Risk Solutions. This unauthorized data sharing occurred between 2020 and 2024 through GM\u0026rsquo;s OnStar subsidiary and its Smart Driver system.\u003c/p\u003e\n\n\u003cp\u003eThe information was reportedly intended for driver-scoring products used by insurance companies. The investigation into these practices began in 2024 after media reports highlighted automakers sharing driver behavior with insurers. State authorities determined that GM failed to properly notify consumers or obtain consent for this data collection.\u003c/p\u003e\n\n\u003cp\u003eThe company also retained the data longer than necessary and re-purposed it for sale, generating approximately $20 million nationwide. Attorney General Bonta stated that GM sold California drivers\u0026rsquo; data without knowledge or consent despite previous assurances against doing so. The collected information included precise location data capable of identifying the daily habits and movements of individuals.\u003c/p\u003e\n\n\u003cp\u003eThe $12.75 million civil penalty sets a new record for California and represents the state\u0026rsquo;s first enforcement action centered on data minimization rules. In addition to the financial penalty, GM must cease selling driving data to consumer reporting agencies and brokers for five years. The automaker is required to delete retained driving data within 180 days unless consumers provide explicit consent for retention.\u003c/p\u003e\n\n\u003cp\u003eGM must also instruct Verisk and LexisNexis to delete the data they previously received. Furthermore, the company must implement a stronger privacy compliance program and submit regular assessments to regulators. Officials indicated that California drivers are unlikely to experience higher insurance premiums because state law already prohibits insurers from using driving data to set rates. BleepingComputer contacted GM for a comment on the announcement but has not received a response by publication time.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eCalifornia Attorney General Rob Bonta has announced a record-breaking $12.75 million settlement with General Motors for violations of the California Consumer Privacy Act. The settlement addresses the illegal collection and sale of driver location and behavior data to third-party data brokers. This enforcement action marks a significant regulatory milestone for data minimization compliance.\u003c/p\u003e\n\n\u003ch3 id=\"background-and-investigation\"\u003eBackground and Investigation\u003c/h3\u003e\n\n\u003cp\u003eThe investigation into GM\u0026rsquo;s data practices began in 2024 following media reports about automakers sharing driver behavior information with insurance entities. State authorities found that GM illegally collected and sold Californians\u0026rsquo; driving and location data to Verisk Analytics and LexisNexis Risk Solutions between 2020 and 2024. This data was gathered through GM\u0026rsquo;s OnStar subsidiary and its Smart Driver system.\u003c/p\u003e\n\n\u003cp\u003eThe collected information was reportedly intended for driver-scoring products related to insurance underwriting. California officials determined that GM failed to properly notify consumers or obtain consent for the data collection. The automaker retained the data longer than necessary and re-purposed it for commercial sale.\u003c/p\u003e\n\n\u003cp\u003eAttorney General Bonta emphasized that GM sold the data without knowledge or consent despite previous public statements guaranteeing it would not do so. The trove of information included precise location data capable of identifying the everyday habits and movements of California residents. This case follows previous scrutiny from the U.S. Federal Trade Commission, which previously banned GM from selling drivers\u0026rsquo; location data for five years.\u003c/p\u003e\n\n\u003ch3 id=\"settlement-requirements-and-compliance-mandates\"\u003eSettlement Requirements and Compliance Mandates\u003c/h3\u003e\n\n\u003cp\u003eThe $12.75 million civil penalty represents a record amount in California\u0026rsquo;s history. It also stands as the state\u0026rsquo;s first enforcement action specifically focused on data minimization rules. The agreement imposes several strict operational requirements on General Motors. The automaker must immediately stop selling driving data to consumer reporting agencies and brokers for a period of five years.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGM is required to delete all retained driving data within 180 days unless consumers explicitly consent to its retention.\u003c/li\u003e\n\u003cli\u003eThe company must also formally request that Verisk Analytics and LexisNexis Risk Solutions delete the previously sold data.\u003c/li\u003e\n\u003cli\u003eAdditionally, GM must implement a stronger privacy compliance program and submit regular assessments to state regulators.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"impact-on-consumers-and-market\"\u003eImpact on Consumers and Market\u003c/h3\u003e\n\n\u003cp\u003eState officials noted that California drivers are unlikely to face higher insurance premiums as a direct result of GM\u0026rsquo;s data sales. This is due to existing state laws that prohibit insurers from using driving data to set insurance rates. BleepingComputer contacted GM for a comment regarding the California announcement but has not received a response by the time of publication. The settlement concludes a major privacy enforcement action while establishing new precedents for data lifecycle management.\u003c/p\u003e\n","keyPoints":["General Motors agreed to pay a record $12.75 million settlement to California for violating the California Consumer Privacy Act by illegally collecting and selling drivers' location and driving data.","The company collected this data between 2020 and 2024 through its OnStar subsidiary and Smart Driver system without proper consumer notification or consent.","As part of the settlement, GM must stop selling driving data to brokers for five years and delete retained data within 180 days unless consumers explicitly consent to retention.","The settlement also requires GM to instruct data brokers Verisk Analytics and LexisNexis Risk Solutions to delete the previously sold information and implement a stronger privacy compliance program."],"insights":["The settlement marks California's first enforcement action specifically targeting data minimization violations, signaling a regulatory shift from basic consent compliance to proactive data lifecycle management.","GM must mandate third-party brokers like Verisk and LexisNexis to delete previously sold data, establishing that data minimization obligations now extend downstream to all data recipients.","The 180-day deadline to purge retained data unless explicit consent is obtained creates a strict, time-bound compliance window that organizations must architect directly into their data retention policies."],"referencedReports":[],"body":"\u003cp\u003eCalifornia Attorney General Rob Bonta announced a $12.75 million settlement with General Motors for violating the California Consumer Privacy Act. The investigation found that GM illegally collected and sold drivers\u0026rsquo; location and driving data to brokers Verisk Analytics and LexisNexis Risk Solutions between 2020 and 2024. This data was gathered through GM\u0026rsquo;s OnStar subsidiary and Smart Driver system for insurance scoring purposes.\u003c/p\u003e\n\n\u003cp\u003eThe company previously faced a five-year sales ban from the FTC for similar unlawful data collection practices. Under the new agreement, GM must stop selling driving data for five years and delete retained information within 180 days unless consumers explicitly consent. The settlement also requires GM to order the data brokers to delete previously sold information and establish a stronger privacy compliance program.\u003c/p\u003e\n\n\u003cp\u003eThis $12.75 million penalty represents a record amount in California and marks the state\u0026rsquo;s first enforcement action focused on data minimization rules. Officials noted that California drivers are unlikely to face higher insurance premiums due to existing state laws prohibiting insurers from using driving data for rate setting. GM has not yet responded to requests for comment regarding the settlement.\u003c/p\u003e\n"},{"n":18,"title":"New TrickMo Variant Uses TON C2 and SOCKS5 to Create Android Network Pivots","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/new-trickmo-variant-uses-ton-c2-and.html","time":"12:50","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"A new TrickMo Android variant uses the TON blockchain for stealthy command-and-control and SOCKS5 proxies to turn infected devices into network pivots, bypassing traditional detection and enabling sophisticated traffic routing.","briefOverview":"\u003cp\u003eResearchers have identified a new variant of the TrickMo Android banking trojan that leverages the TON blockchain for stealthy command-and-control communications. First observed between January and February 2026, this malware actively targets banking and cryptocurrency wallet users across France, Italy, and Austria. The trojan is distributed through phishing websites and dropper apps that disguise themselves as adult versions of TikTok. Once installed, the malware impersonates Google Play Services and loads its core functionality dynamically at runtime. Unlike previous iterations that focused primarily on accessibility-driven remote control, this variant introduces advanced network capabilities. It now incorporates SSH tunneling and authenticated SOCKS5 proxying to transform compromised devices into programmable network pivots. These features allow attackers to conduct network reconnaissance and route malicious traffic through the victim\u0026rsquo;s own connection. By resolving all command-and-control requests through TON overlay hostnames, the malware effectively evades traditional DNS-based detection and blocking methods. The article also notes that the developers have included dormant code for future expansion, indicating ongoing evolution of the threat.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers have flagged a new version of the TrickMo Android device takeover malware that introduces significant network-oriented enhancements. ThreatFabric observed this variant actively targeting financial and cryptocurrency users in France, Italy, and Austria between January and February 2026. The malware continues to rely on a runtime-loaded APK component, but it now incorporates advanced capabilities for traffic routing and network reconnaissance. Distribution occurs via phishing websites and dropper applications that masquerade as adult versions of TikTok. These droppers serve as conduits for a dynamically loaded APK that retrieves its payload from attacker-controlled infrastructure at runtime. Once active, the malware impersonates Google Play Services under specific package names to maintain system legitimacy and avoid suspicion. While earlier versions abused Android accessibility services to hijack one-time passwords and provide remote device control, this iteration shifts focus toward network operations. The new variant embeds a native TON proxy that starts on a loopback port upon execution. All command-and-control traffic is routed through this proxy and resolved via TON overlay hostnames, effectively bypassing conventional DNS infrastructure and traditional network-blocking measures. The malware now supports network reconnaissance commands such as curl, ping, traceroute, and telnet, giving operators a remote shell-equivalent from the victim\u0026rsquo;s network position. Additionally, it implements SSH tunneling and authenticated SOCKS5 proxying to turn infected devices into programmable network pivots. This architecture allows malicious traffic to originate from the victim\u0026rsquo;s own environment, successfully circumventing IP-based fraud detection systems on banking and e-commerce platforms. The article also highlights two dormant features within the codebase, including the Pine hooking framework and extensive NFC permissions. Although currently unimplemented, these components suggest the developers are preparing for future capability expansions. ThreatFabric detailed these findings in a report shared with The Hacker News, emphasizing the trojan\u0026rsquo;s evolution from a credential-stealing tool into a sophisticated network manipulation instrument.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003eThe article details a significant evolution in the TrickMo Android banking trojan, highlighting its transition from a traditional credential-stealing malware to a sophisticated network manipulation tool. Researchers at ThreatFabric documented this new variant between January and February 2026, noting its active targeting of banking and cryptocurrency wallet users in France, Italy, and Austria. The following analysis breaks down the malware\u0026rsquo;s distribution, architecture, capabilities, and strategic implications based strictly on the provided report.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eDistribution and Initial Access\u003c/strong\u003e\nThe trojan is distributed through phishing websites and malicious dropper applications. These droppers disguise themselves as adult versions of TikTok to trick users into installation. Once executed, the dropper acts as a conduit for a dynamically loaded APK component known as the dex.module. This module is retrieved at runtime from attacker-controlled infrastructure, allowing operators to update and modify payloads without requiring a new app installation. The actual malware component impersonates Google Play Services to maintain system legitimacy and avoid detection. Specific package names used by the dropper include com.app16330.core20461 and com.app15318.core1173. The TrickMo payload itself operates under the identifiers uncle.collop416.wifekin78 and nibong.lida531.butler836.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eCommand-and-Control Architecture\u003c/strong\u003e\nA major architectural shift in this variant is the adoption of the TON decentralized blockchain for command-and-control communications. The malware embeds a native TON proxy that automatically starts on a loopback port when the process begins. The bot\u0026rsquo;s HTTP client is subsequently wired through this local proxy, ensuring that every outbound command-and-control request is addressed to an .adnl hostname. These hostnames are resolved through the TON overlay network rather than conventional DNS infrastructure. This design significantly reduces the effectiveness of traditional takedown efforts and network-blocking strategies. By blending command-and-control traffic with legitimate TON activity, the malware maintains persistent communication channels while evading standard security monitoring.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eNetwork and Reconnaissance Capabilities\u003c/strong\u003e\nWhile previous iterations of TrickMo relied on socket.io-based channels to abuse Android accessibility services for remote control, this version introduces a robust network-operative subsystem. The new architecture transforms the compromised device into a programmable network pivot and traffic-exit node. Attackers can now execute network reconnaissance commands directly from the victim\u0026rsquo;s device, including curl, dnslookup, ping, telnet, and traceroute. This functionality provides a remote shell-equivalent that allows operators to map internal corporate or home networks. The malware also implements SSH tunneling and authenticated SOCKS5 proxying to route malicious traffic through the infected device. This capability effectively defeats IP-based fraud-detection signatures employed by banking, e-commerce, and cryptocurrency exchange services.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eDormant Features and Future Development\u003c/strong\u003e\nThe article notes the presence of two dormant features within the malware\u0026rsquo;s codebase that are currently inactive. These include the Pine hooking framework and declarations for extensive NFC-related permissions. Although neither feature is actively implemented in the current variant, their presence strongly indicates that the core developers are preparing to expand the trojan\u0026rsquo;s operational capabilities in the future. ThreatFabric emphasized that this latest version fundamentally changes the operational role of infected devices, shifting the focus from simple credential theft to comprehensive network manipulation and traffic routing.\u003c/p\u003e\n","keyPoints":["The new TrickMo variant uses The Open Network blockchain for stealthy command-and-control communications routed through an embedded local proxy.","Infected Android devices function as programmable network pivots and traffic-exit nodes using SSH tunneling and authenticated SOCKS5 proxying capabilities.","The malware bypasses IP-based fraud detection on banking and cryptocurrency services by routing malicious traffic through the victim's own network environment.","Distribution occurs via dropper apps masquerading as adult versions of TikTok that dynamically load the actual malware at runtime.","A new network-operative subsystem replaces previous remote control methods, enabling network reconnaissance commands like ping, traceroute, and dnslookup from the compromised device."],"insights":["The malware resolves all command-and-control traffic through .adnl hostnames via an embedded TON proxy, rendering traditional DNS-based takedowns and network-blocking ineffective.","The inclusion of dormant Pine hooking framework code and extensive NFC permissions indicates active preparation for future capability expansion, even though these features are not yet implemented.","The shift from a socket.io-based accessibility channel to a network-operative subsystem transforms the malware from a credential-stealing tool into a programmable network pivot capable of executing commands like traceroute and SSH tunneling from the victim's internal network."],"referencedReports":[{"title":"New TrickMo Variant Device Take Over Malware Targeting Banking, Fintech \u0026 Wallet Auth App","url":"https://www.threatfabric.com/blogs/new-trickmo-variant-device-take-over-malware-targeting-banking-fintech-wallet-auth-app","publisher":"ThreatFabric","context":"The article cites this report from ThreatFabric, noting that the company shared it with The Hacker News to detail the new variant's network-oriented functionality and C2 capabilities."}],"body":"\u003cp\u003eResearchers have identified a new variant of the TrickMo Android banking trojan that leverages the TON blockchain for stealthy command-and-control communications. First observed between January and February 2026, this malware actively targets banking and cryptocurrency wallet users across France, Italy, and Austria. The trojan is distributed through phishing websites and dropper apps that disguise themselves as adult versions of TikTok. Once installed, the malware impersonates Google Play Services and loads its core functionality dynamically at runtime. Unlike previous iterations that focused primarily on accessibility-driven remote control, this variant introduces advanced network capabilities. It now incorporates SSH tunneling and authenticated SOCKS5 proxying to transform compromised devices into programmable network pivots. These features allow attackers to conduct network reconnaissance and route malicious traffic through the victim\u0026rsquo;s own connection. By resolving all command-and-control requests through TON overlay hostnames, the malware effectively evades traditional DNS-based detection and blocking methods. The article also notes that the developers have included dormant code for future expansion, indicating ongoing evolution of the threat.\u003c/p\u003e\n"},{"n":6,"title":"Android 17 to expand banking scam call and privacy protections","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/android-17-to-expand-banking-scam-call-and-privacy-protections/","time":"17:00","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"Android 17 significantly strengthens device security by introducing automated banking scam call detection, enhanced anti-theft locking features, and expanded threat detection capabilities that will also backport to older Android versions.","briefOverview":"\u003cp\u003eAndroid 17 introduces significant security and privacy enhancements focused on combating device theft, banking scams, and malicious app behavior. The update will automatically detect and terminate spoofed banking calls by cross-referencing caller numbers with internal bank databases. Device theft protection is strengthened through a new \u0026ldquo;Mark as lost\u0026rdquo; feature that requires biometric authentication to disable tracking or access the device. Live Threat Detection expands its capabilities to identify SMS forwarding misuse, concealed accessibility overlays, and hidden application icons. Additi
