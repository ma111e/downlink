<style>

window.__DL_ARTICLES = [{"n":1,"title":"Inside AD CS Escalation: Unpacking Advanced Misuse Techniques and Tools","source":"unit42.paloaltonetworks.com","sourceColor":"#c084fc","link":"https://unit42.paloaltonetworks.com/active-directory-certificate-services-exploitation/","time":"22:00","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"Attackers heavily exploit misconfigured Active Directory Certificate Services and shadow credential abuse to achieve stealthy privilege escalation and persistence, making strict configuration hygiene and behavioral monitoring essential for detection.","briefOverview":"\u003cp\u003eActive Directory Certificate Services (AD CS) serves as a foundational component of enterprise infrastructure but frequently suffers from insecure default configurations that adversaries actively exploit. Attackers leverage misconfigured certificate templates and shadow credential abuse to escalate privileges and establish long-term persistence without relying on traditional malware or zero-day vulnerabilities. The exploitation lifecycle typically progresses from initial low-privileged access through template enumeration and certificate requests to sustained access via cryptographic key manipulation. Common misconfigurations include overly permissive enrollment rights and disabled manager approvals that allow attackers to impersonate privileged accounts. Effective defense requires strict configuration hygiene combined with behavioral detection strategies that correlate certificate issuance events, directory modifications, and unusual LDAP reconnaissance activity. Organizations must monitor specific Windows Event IDs and track anomalous authentication patterns to uncover these stealthy abuse techniques before they result in full domain compromise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eActive Directory Certificate Services (AD CS) is a critical public key infrastructure component responsible for issuing digital certificates that enable user authentication and secure communications across enterprise networks. Despite its importance, AD CS remains a high-impact attack surface due to widespread misconfigurations, complex permission structures, and limited native monitoring capabilities. Adversaries consistently exploit these weaknesses to escalate privileges and maintain persistence by misusing native certificate issuance workflows rather than deploying traditional malware. The attack lifecycle generally begins with initial access through compromised low-privileged accounts, followed by discovery of certificate authorities and template permissions. Exploitation occurs when attackers request certificates from misconfigured templates that allow subject impersonation or lack manager approval requirements. Once obtained, these certificates facilitate privilege escalation through Kerberos authentication and enable lateral movement across the network. Attackers frequently combine certificate template abuse with shadow credential techniques, which involve registering cryptographic keys in the msDS-KeyCredentialLink attribute to achieve passwordless, persistent access. This persistence mechanism remains effective even after standard password resets or certificate revocations. A growing ecosystem of open-source tools, including Certify, Certipy, Whisker, and pyWhisker, has significantly lowered the technical barrier for executing these attacks. Both financially motivated ransomware groups and state-sponsored actors actively utilize these techniques in the wild. Detection requires moving beyond signature-based approaches to implement behavioral analytics that correlate multiple data sources. Security teams must monitor specific Windows Event IDs for certificate requests, template modifications, and directory attribute changes. Additionally, tracking anomalous LDAP queries targeting certificate templates and key attributes provides early warning signals of adversarial reconnaissance. By maintaining secure template configurations and correlating authentication telemetry, defenders can effectively identify and respond to stealthy AD CS exploitation.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary-and-threat-landscape\"\u003eExecutive Summary and Threat Landscape\u003c/h3\u003e\n\n\u003cp\u003eActive Directory Certificate Services (AD CS) functions as the backbone of enterprise public key infrastructure, managing digital certificates that authenticate users, devices, and services across corporate networks. Despite its critical role, AD CS is frequently undermined by insecure default configurations, overly permissive enrollment rights, and complex template management that security teams hesitate to modify. These structural weaknesses have established AD CS as a primary vector for privilege escalation and unauthorized identity impersonation in modern environments. Unlike traditional vulnerability exploitation, AD CS attacks rarely depend on zero-day exploits or malware execution. Instead, adversaries systematically misuse native certificate issuance mechanisms to impersonate privileged accounts and establish long-term persistence.\u003c/p\u003e\n\n\u003ch3 id=\"attack-lifecycle-and-operational-phases\"\u003eAttack Lifecycle and Operational Phases\u003c/h3\u003e\n\n\u003cp\u003eThe exploitation of AD CS follows a structured five-phase lifecycle that transforms a single compromised account into enterprise-wide dominance. The process begins with initial access through phishing or credential theft, followed by comprehensive discovery of certificate authorities, template permissions, and account keys. During the exploitation phase, attackers submit certificate requests against misconfigured templates to impersonate high-privileged accounts. These certificates are then utilized for Kerberos authentication, enabling privilege escalation and lateral movement across the network. The final phase focuses on persistence, where attackers leverage shadow credentials and key trust mechanisms to maintain access that survives password resets and certificate revocations.\u003c/p\u003e\n\n\u003ch3 id=\"core-exploitation-techniques\"\u003eCore Exploitation Techniques\u003c/h3\u003e\n\n\u003cp\u003eCertificate template misuse represents the most consistently observed escalation method, particularly through the ESC1 technique. ESC1 exploits templates configured with low-privileged enrollment rights, disabled manager approval, and the ENROLLEE_SUPPLIES_SUBJECT flag that allows requesters to define certificate subjects. This configuration enables attackers to mint authentication certificates for privileged accounts they should not control. Shadow credential abuse operates through the msDS-KeyCredentialLink attribute, which stores cryptographic keys for Windows Hello for Business and smartcard authentication. Attackers manipulate this attribute to register their own public keys against target accounts, creating passwordless authentication paths that bypass traditional credential rotation defenses. Key techniques include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eESC1 template exploitation for privilege escalation\u003c/li\u003e\n\u003cli\u003eShadow credential registration for persistent access\u003c/li\u003e\n\u003cli\u003ePKINIT authentication for Kerberos ticket requests\u003c/li\u003e\n\u003cli\u003eLDAP enumeration for template and attribute discovery\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"adversarial-tooling-and-ecosystem\"\u003eAdversarial Tooling and Ecosystem\u003c/h3\u003e\n\n\u003cp\u003eA rapidly expanding toolkit of open-source utilities has democratized AD CS exploitation across the threat landscape. Certify and Certipy serve as primary enumeration and exploitation frameworks for identifying vulnerable templates and executing ESC-style attacks. PKINITtools extends this capability into Kerberos authentication by leveraging certificates to request Ticket Granting Tickets. Whisker and pyWhisker specialize in shadow credential manipulation, directly modifying the msDS-KeyCredentialLink attribute to establish persistent access. The widespread availability of these tools has significantly lowered the technical expertise required to execute sophisticated AD CS attacks.\u003c/p\u003e\n\n\u003ch3 id=\"detection-strategies-and-telemetry-correlation\"\u003eDetection Strategies and Telemetry Correlation\u003c/h3\u003e\n\n\u003cp\u003eEffective defense against AD CS abuse requires behavioral analytics that correlate multiple event types across authentication and directory services. Security teams must monitor specific Windows Event IDs, including 4886 and 4887 for certificate requests and issuance, 4898 for template loading, and 5136 for directory object modifications. Correlating these events with Kerberos authentication requests (\u003csup\u003e4768\u003c/sup\u003e\u0026frasl;\u003csub\u003e4769\u003c/sub\u003e) reveals attempts to leverage stolen or shadow credentials for lateral movement. LDAP reconnaissance activity serves as a critical early warning indicator, with attackers executing high-volume queries targeting pKICertificateTemplate, PKI-Enrollment-Service, and msDS-KeyCredentialLink attributes. Monitoring for these specific LDAP queries, combined with tracking unusual enrollment patterns and SAN usage, enables defenders to identify adversarial activity before privilege escalation occurs.\u003c/p\u003e\n","keyPoints":["Active Directory Certificate Services is frequently exploited by adversaries through misconfigured certificate templates and shadow credential abuse to achieve privilege escalation and maintain persistent access.","Attackers utilize open-source tools such as Certify, Certipy, Whisker, and pyWhisker to enumerate vulnerable templates and register cryptographic keys against the msDS-KeyCredentialLink attribute.","Effective detection requires correlating specific Windows Event IDs, including certificate issuance events, directory modifications, and Kerberos authentication requests, with unusual LDAP reconnaissance activity.","The exploitation lifecycle typically progresses from initial low-privileged access through template enumeration and certificate request to long-term persistence via shadow credentials and key trust misuse."],"insights":["Shadow credentials stored in the msDS-KeyCredentialLink attribute enable persistent authentication that survives password resets and certificate revocations, bypassing standard credential rotation defenses.","Adversaries conduct early reconnaissance by executing high-volume LDAP queries specifically targeting pKICertificateTemplate, PKI-Enrollment-Service, and msDS-KeyCredentialLink objects, making anomalous LDAP traffic a strong initial detection signal.","The ESC1 technique is the most consistently exploited escalation path, relying on templates configured with disabled manager approval and authorized signatures while enabling the ENROLLEE_SUPPLIES_SUBJECT flag for subject impersonation.","Open-source AD CS exploitation tools like Certipy and pyWhisker are actively deployed by both ransomware groups (e.g., Fog) and state-sponsored actors (e.g., Fighting Ursa), significantly lowering the technical barrier for privilege escalation attacks."],"referencedReports":[{"title":"Navigating Through The Fog","url":"https://thedfirreport.com/2025/04/28/navigating-through-the-fog/","publisher":"The DFIR Report","context":"The article cites this report for identifying an exposed toolkit associated with the Fog ransomware group that leverages AD CS abuse."},{"title":"Cybersecurity Advisory AA25-141A","url":"https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-141a","publisher":"U.S. Cybersecurity and Infrastructure Security Agency (CISA)","context":"Referenced as a 2025 advisory detailing a cyberespionage campaign attributed to Fighting Ursa that utilized AD CS enumeration and exploitation techniques."},{"title":"Certifried: Active Directory Domain Privilege Escalation (CVE-2022–26923)","url":"https://research.ifcr.dk/certifried-active-directory-domain-privilege-escalation-cve-2022-26923-9e098fe298f4","publisher":"Oliver Lyak, Institut For Cyber Risk","context":"Listed in the additional resources as a technical analysis of the CVE-2022-26923 certificate-based privilege escalation vulnerability."},{"title":"Certified Pre-Owned: Abusing Active Directory Certificate Services","url":"https://specterops.io/wp-content/uploads/sites/3/2022/06/Certified_Pre-Owned.pdf","publisher":"SpecterOps","context":"Referenced as the foundational research that originally identified and categorized the ESC1 through ESC8 AD CS escalation techniques."}],"body":"\u003cp\u003eActive Directory Certificate Services (AD CS) serves as a foundational component of enterprise infrastructure but frequently suffers from insecure default configurations that adversaries actively exploit. Attackers leverage misconfigured certificate templates and shadow credential abuse to escalate privileges and establish long-term persistence without relying on traditional malware or zero-day vulnerabilities. The exploitation lifecycle typically progresses from initial low-privileged access through template enumeration and certificate requests to sustained access via cryptographic key manipulation. Common misconfigurations include overly permissive enrollment rights and disabled manager approvals that allow attackers to impersonate privileged accounts. Effective defense requires strict configuration hygiene combined with behavioral detection strategies that correlate certificate issuance events, directory modifications, and unusual LDAP reconnaissance activity. Organizations must monitor specific Windows Event IDs and track anomalous authentication patterns to uncover these stealthy abuse techniques before they result in full domain compromise.\u003c/p\u003e\n"},{"n":7,"title":"Shai Hulud attack ships signed malicious TanStack, Mistral npm packages","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/shai-hulud-attack-ships-signed-malicious-tanstack-mistral-npm-packages/","time":"11:29","priority":"MUST READ","score":95,"group":"J","groupColor":"#fb923c","tldr":"The Shai Hulud supply-chain attack compromised hundreds of popular npm and PyPI packages by hijacking CI/CD credentials to distribute self-propagating credential-stealing malware with valid cryptographic attestations. Security teams must immediately rotate all secrets and audit systems for persistent malicious artifacts.","briefOverview":"\u003cp\u003eThe Shai Hulud supply-chain campaign, attributed to the TeamPCP threat group, has compromised hundreds of popular npm and PyPI packages by hijacking OpenID Connect tokens and abusing CI/CD pipelines. Attackers successfully published malicious package versions that carry valid SLSA Build Level 3 attestations and legitimate cryptographic signatures, making them appear cryptographically authentic to developers. The infection chain leverages a risky GitHub Actions workflow, cache poisoning, and token theft from runner memory to inject credential-stealing malware. Once installed, the malware reads process memory to harvest secrets from over 100 file paths and exfiltrates them via the Session P2P network to disguise traffic as encrypted messenger data. The threat actor ensures persistence by writing malicious code into Claude Code hooks and VS Code auto-run tasks, meaning standard package uninstallation fails to remove the infection. A self-propagation mechanism uses stolen credentials to modify tarballs and republish malicious versions across registries. The payload includes geofencing logic to avoid Russian language settings and a probabilistic routine that recursively wipes systems in environments matching Israel or Iran. Security researchers recommend immediately rotating all credentials, auditing IDE directories for persistent artifacts, and enforcing lockfile-only installs to mitigate future risks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Shai Hulud supply-chain attack, attributed to the TeamPCP threat group, has compromised hundreds of packages across npm and PyPI. The campaign began last September and has evolved through multiple iterations, recently targeting TanStack and Mistral AI namespaces before spreading to Guardrails AI, UiPath, OpenSearch, Bitwarden CLI, and official SAP packages. Attackers hijacked valid OpenID Connect tokens to publish malicious versions through legitimate CI/CD pipelines, successfully attaching verifiable SLSA Build Level 3 provenance attestations.\u003c/p\u003e\n\n\u003cp\u003eAccording to TanStack’s post-mortem, the intrusion chained three specific vulnerabilities: a risky pull_request-target workflow, GitHub Actions cache poisoning, and OIDC token theft from runner memory. The threat actor published 84 malicious versions across 42 TanStack packages that carried valid Sigstore attestations and legitimate GitHub Actions signatures. Endor Labs, Aikido, and Socket independently tracked over 160 compromised npm packages and hundreds of malicious artifacts across both registries.\u003c/p\u003e\n\n\u003cp\u003eA clever Git commit trick involved an orphaned commit pushed to a fork of the TanStack/router repository, which npm automatically fetched and executed via a malicious optional dependency. The resulting malware targets a wide array of developer secrets, including GitHub Actions tokens, PATs, Git credentials, npm publish tokens, AWS secrets, Kubernetes tokens, HashiCorp Vault tokens, SSH keys, and .env files. StepSecurity researchers noted that the payload reads the GitHub Actions process memory to collect credentials from more than 100 file paths associated with cloud providers and messaging apps.\u003c/p\u003e\n\n\u003cp\u003eTo exfiltrate this data, the malware utilizes the Session P2P network, disguising the traffic as encrypted messenger communications to hinder detection. Persistence is maintained by writing the payload into Claude Code hooks and VS Code auto-run tasks, ensuring that uninstalling the malicious packages does not remove the infection. The self-propagation mechanism remains consistent with past waves, using stolen credentials to enumerate linked packages, modify tarballs, and republish malicious versions.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft Threat Intelligence analyzed a payload delivered via a compromised Mistral AI package named transformers.pyz, which drops an information-stealing malware on Linux systems. This stealer includes geofencing logic that avoids execution on hosts with Russian language settings. Additionally, a destructive secondary routine carries a one-in-six chance of running a recursive wipe command on environments matching Israel or Iran.\u003c/p\u003e\n\n\u003cp\u003eSecurity vendors recommend checking for affected versions, rotating all credentials, auditing IDE directories for surviving malicious files, and blocking known command-and-control domains at the DNS or proxy level. Long-term mitigation strategies include verifying provenance, adding behavioral analysis at install time, and enforcing lockfile-only installs to prevent silent package updates.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"campaign-overview-attribution\"\u003eCampaign Overview \u0026amp; Attribution\u003c/h1\u003e\n\n\u003cp\u003eThe Shai Hulud supply-chain campaign, attributed to the TeamPCP threat group, has compromised hundreds of packages across npm and PyPI. The attack initially emerged last September and has progressed through multiple iterations, previously exposing hundreds of thousands of developer secrets in automatically generated GitHub repositories. Recent waves have targeted the TanStack and Mistral AI namespaces, quickly expanding to popular projects including Guardrails AI, UiPath, OpenSearch, Bitwarden CLI, and official SAP packages.\u003c/p\u003e\n\n\u003ch1 id=\"attack-vector-vulnerability-chain\"\u003eAttack Vector \u0026amp; Vulnerability Chain\u003c/h1\u003e\n\n\u003cp\u003eThe threat actor successfully published malicious package versions by hijacking valid OpenID Connect (OIDC) tokens and leveraging legitimate CI/CD pipelines. According to TanStack’s post-mortem report, the attackers chained three distinct vulnerabilities to achieve this:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA risky \u003ccode\u003epull_request-target\u003c/code\u003e GitHub Actions workflow\u003c/li\u003e\n\u003cli\u003eGitHub Actions cache poisoning\u003c/li\u003e\n\u003cli\u003eOIDC token theft extracted from runner memory\nThe compromised packages were published with verifiable provenance attestation (SLSA Build Level 3), valid Sigstore attestations, and legitimate GitHub Actions signatures, making them appear cryptographically authentic to developers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"scale-compromised-ecosystem\"\u003eScale \u0026amp; Compromised Ecosystem\u003c/h1\u003e\n\n\u003cp\u003eIndependent security vendors have tracked significant numbers of affected artifacts across both registries:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEndor Labs reported over 160 compromised packages in the TanStack ecosystem.\u003c/li\u003e\n\u003cli\u003eAikido recorded 373 malicious package-version entries.\u003c/li\u003e\n\u003cli\u003eSocket tracked 416 compromised package artifacts across npm and PyPI.\nThe attackers published 84 malicious versions spanning 42 TanStack packages. A clever Git commit trick involved an orphaned commit pushed to a fork of the TanStack/router repository. This commit was accessible through GitHub’s shared fork object storage despite not belonging to any branch, and it was referenced via a malicious optional dependency to automatically fetch and execute attacker-controlled code during installation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"malware-capabilities-persistence\"\u003eMalware Capabilities \u0026amp; Persistence\u003c/h1\u003e\n\n\u003cp\u003eThe installed malware is designed to steal a broad spectrum of developer secrets, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGitHub Actions OIDC tokens and personal access tokens (PATs)\u003c/li\u003e\n\u003cli\u003eGit credentials and npm publish tokens\u003c/li\u003e\n\u003cli\u003eAWS Secrets Manager, IAM, and ESC task credentials\u003c/li\u003e\n\u003cli\u003eKubernetes service account tokens and cluster credentials\u003c/li\u003e\n\u003cli\u003eHashiCorp Vault tokens and SSH keys\u003c/li\u003e\n\u003cli\u003eClaude Code configurations, VS Code tasks, and .env files\nStepSecurity researchers confirmed that the payload reads the GitHub Actions process memory to collect credentials from more than 100 file paths associated with cloud providers, cryptocurrency tokens, and messaging apps. Crucially, the malware ensures persistence by writing itself into Claude Code hooks and VS Code auto-run tasks. Consequently, uninstalling the malicious packages does not remove the infection from developer machines.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"exfiltration-propagation\"\u003eExfiltration \u0026amp; Propagation\u003c/h1\u003e\n\n\u003cp\u003eTo exfiltrate sensitive information, the malware utilizes the Session P2P network. This technique disguises the data transfer as encrypted messenger traffic, complicating detection, blocking, and takedown efforts. The self-propagation mechanism remains largely unchanged from previous campaign waves. It operates by using stolen GitHub and npm credentials to enumerate packages linked to the compromised maintainer, modifying tarballs to inject the payload, and republishing malicious versions across the registries.\u003c/p\u003e\n\n\u003ch1 id=\"payload-behavior-geofencing\"\u003ePayload Behavior \u0026amp; Geofencing\u003c/h1\u003e\n\n\u003cp\u003eMicrosoft Threat Intelligence analyzed a payload delivered via a compromised Mistral AI package on PyPI, naming it \u0026lsquo;transformers.pyz\u0026rsquo; to impersonate the Hugging Face Transformers library. The actor drops an information-stealing malware on Linux systems that includes basic geofencing logic, specifically avoiding execution on hosts where Russian language settings are detected. A destructive secondary routine is also embedded within the payload. In environments that appear to originate from Israel or Iran, the malware introduces a probabilistic sabotage mechanism with a one-in-six chance of running a recursive wipe command (\u003ccode\u003erm -rf/\u003c/code\u003e). This behavior closely mirrors the CanisterWorm campaign deployed by TeamPCP in March, which targeted Kubernetes platforms with similar regional wiping logic.\u003c/p\u003e\n\n\u003ch1 id=\"mitigation-recommendations\"\u003eMitigation \u0026amp; Recommendations\u003c/h1\u003e\n\n\u003cp\u003eSecurity researchers and vendors have outlined immediate and long-term defensive actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eImmediate Response:\u003c/strong\u003e Developers who downloaded affected versions should assume credentials were exposed. Security teams must check for affected package versions, verify persistence on developer machines, and rotate all credentials including GitHub tokens, npm tokens, AWS credentials, Vault tokens, Kubernetes service accounts, and CI/CD secrets.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSystem Auditing:\u003c/strong\u003e Audit IDE directories for malicious files that survive package uninstallation, such as \u003ccode\u003erouter_runtime.js\u003c/code\u003e or \u003ccode\u003esetup.mjs\u003c/code\u003e. Block the threat actor\u0026rsquo;s command-and-control infrastructure (\u003ccode\u003eapi.masscan.cloud\u003c/code\u003e, \u003ccode\u003egit-tanstack.com\u003c/code\u003e, and \u003ccode\u003e*.getsession.org\u003c/code\u003e) at the DNS or proxy level.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLong-Term Controls:\u003c/strong\u003e Since the attack produces valid SLSA Build Level 3 attestations, organizations must verify provenance and add a behavioral analysis layer at install time. Implementing signature-based checks for malicious packages is also advised. In the long term, enforcing lockfile-only installs should prevent auto or silent package updates that could reintroduce compromised artifacts.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["The Shai Hulud campaign compromised hundreds of npm and PyPI packages by hijacking OIDC tokens and abusing CI/CD pipelines to publish malicious versions with valid SLSA and Sigstore attestations.","The credential-stealing malware reads process memory to collect secrets from over 100 file paths and exfiltrates them via the Session P2P network to disguise traffic as encrypted messenger data.","The payload persists on developer machines by writing itself into Claude Code hooks and VS Code auto-run tasks, meaning package uninstallation does not remove the infection.","The threat actor self-propagates by using stolen credentials to enumerate linked packages, modify tarballs to inject the payload, and republish malicious versions across registries.","The malware includes geofencing logic to avoid Russian language settings and a probabilistic routine that recursively wipes systems in environments matching Israel or Iran."],"insights":["The malware persists by writing itself into Claude Code hooks and VS Code auto-run tasks, ensuring that uninstalling the malicious packages does not remove the infection.","Exfiltration is conducted via the Session P2P network to disguise data transfer as encrypted messenger traffic, complicating network detection efforts.","The payload includes geofencing logic to avoid execution on hosts with Russian language settings and a probabilistic routine to recursively wipe systems in environments matching Israel or Iran.","The threat actor successfully published malicious packages with valid SLSA Build Level 3 attestations and Sigstore signatures, bypassing standard cryptographic verification."],"referencedReports":[{"title":"Endor Labs Report on TanStack Ecosystem Compromise","url":"https://www.endorlabs.com/learn/shai-hulud-compromises-the-tanstack-ecosystem-80-packages-compromised","publisher":"Endor Labs","context":"The article cites this report for data documenting over 160 compromised packages in the TanStack namespace."},{"title":"TanStack NPM Supply Chain Compromise Post-Mortem","url":"http://tanstack.com/blog/npm-supply-chain-compromise-postmortem","publisher":"TanStack","context":"Referenced as the official post-mortem detailing how attackers chained a risky workflow, cache poisoning, and OIDC token theft."},{"title":"SafeDep Analysis of Mass NPM Supply Chain Attack","url":"https://safedep.io/mass-npm-supply-chain-attack-tanstack-mistral/","publisher":"SafeDep","context":"Cited for explaining that while trigger mechanisms differ between TanStack and Mistral AI packages, they deliver the same credential-stealing payload."},{"title":"Snyk Research on TanStack NPM Packages Compromise","url":"https://snyk.io/blog/tanstack-npm-packages-compromised/","publisher":"Snyk","context":"Referenced for researchers noting that the attack produces valid SLSA Build Level 3 attestations, necessitating provenance verification and behavioral analysis."}],"body":"\u003cp\u003eThe Shai Hulud supply-chain campaign, attributed to the TeamPCP threat group, has compromised hundreds of popular npm and PyPI packages by hijacking OpenID Connect tokens and abusing CI/CD pipelines. Attackers successfully published malicious package versions that carry valid SLSA Build Level 3 attestations and legitimate cryptographic signatures, making them appear cryptographically authentic to developers. The infection chain leverages a risky GitHub Actions workflow, cache poisoning, and token theft from runner memory to inject credential-stealing malware. Once installed, the malware reads process memory to harvest secrets from over 100 file paths and exfiltrates them via the Session P2P network to disguise traffic as encrypted messenger data. The threat actor ensures persistence by writing malicious code into Claude Code hooks and VS Code auto-run tasks, meaning standard package uninstallation fails to remove the infection. A self-propagation mechanism uses stolen credentials to modify tarballs and republish malicious versions across registries. The payload includes geofencing logic to avoid Russian language settings and a probabilistic routine that recursively wipes systems in environments matching Israel or Iran. Security researchers recommend immediately rotating all credentials, auditing IDE directories for persistent artifacts, and enforcing lockfile-only installs to mitigate future risks.\u003c/p\u003e\n"},{"n":10,"title":"Official CheckMarx Jenkins package compromised with infostealer","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/official-checkmarx-jenkins-package-compromised-with-infostealer/","time":"22:03","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"The TeamPCP hacker group compromised the official CheckMarx Jenkins AST plugin using credentials stolen from a prior supply-chain breach, distributing a malicious version that steals user credentials. CheckMarx has directed users to immediately revert to a verified safe version and rotate all secrets to contain the threat.","briefOverview":"\u003cp\u003eThe TeamPCP hacker group compromised the official CheckMarx Jenkins AST plugin by using credentials stolen from a prior supply-chain breach. A malicious version of the plugin was uploaded to the Jenkins Marketplace on May 9, containing code designed to steal user credentials. CheckMarx confirmed this is the third supply-chain incident the company has faced since late March. The company advises users to immediately revert to version 2.0.13-829.vc72453fa_1c16 or an older release. Users who downloaded the rogue version should rotate all secrets and investigate their systems for lateral movement. CheckMarx emphasized that its GitHub repositories are isolated from customer production environments and do not store customer data. The threat actor left a message criticizing the company for failing to rotate secrets. CheckMarx has published indicators of compromise to help defenders identify the malicious artifacts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCheckMarx warned that a rogue version of its Jenkins Application Security Testing plugin was published on the Jenkins Marketplace. The compromise was claimed by the TeamPCP hacker group, which has conducted a series of supply-chain attacks targeting developer tools. TeamPCP gained access to CheckMarx\u0026rsquo;s GitHub repositories by using credentials obtained during a March supply-chain attack that affected the Trivy vulnerability scanner. The malicious plugin, identified as version 2026.5.09, was uploaded on May 9 outside of the official release pipeline. This unauthorized upload lacked standard git tags and GitHub releases, and it contained credential-stealing malware. CheckMarx acknowledged the breach and is currently publishing a new secure version of the plugin. The company noted this incident follows previous supply-chain attacks and a data leak by the LAPSUS$ threat group in April. Security guidance recommends that users revert to version 2.0.13-829.vc72453fa_1c16, which was published on December 17, 2025, or use an older release. Anyone who installed the malicious plugin should assume their credentials are compromised and immediately rotate all secrets. Organizations should also investigate their environments for signs of lateral movement or persistent access. CheckMarx clarified that its GitHub repositories are completely isolated from customer production environments. The company stated that no customer data is stored within those repositories.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview\"\u003eIncident Overview\u003c/h3\u003e\n\n\u003cp\u003eCheckMarx issued a security alert regarding a compromised version of its Jenkins Application Security Testing (AST) plugin. The malicious artifact was distributed through the Jenkins Marketplace and is attributed to the TeamPCP hacker group. This incident represents the third supply-chain attack targeting CheckMarx since late March. The threat actor previously breached the company\u0026rsquo;s infrastructure by leveraging credentials stolen from the Trivy vulnerability scanner supply-chain attack.\u003c/p\u003e\n\n\u003ch3 id=\"attack-methodology-and-timeline\"\u003eAttack Methodology and Timeline\u003c/h3\u003e\n\n\u003cp\u003eTeamPCP utilized the stolen credentials to interact directly with CheckMarx\u0026rsquo;s GitHub environment. The group backdoored the Jenkins AST plugin to deliver credential-stealing malware. A rogue version, labeled 2026.5.09, was uploaded to repo.jenkins-ci.org on May 9. This upload bypassed the official release pipeline and omitted standard git tags and GitHub releases. The threat actor maintained unauthorized access for at least a month before deploying the malicious code. TeamPCP also left a message in the plugin\u0026rsquo;s about section criticizing the company for failing to rotate secrets.\u003c/p\u003e\n\n\u003ch3 id=\"impact-and-affected-systems\"\u003eImpact and Affected Systems\u003c/h3\u003e\n\n\u003cp\u003eThe compromised plugin integrates security scanning into automated software development pipelines. It was distributed alongside other developer tools on platforms including GitHub, Docker, Open VSX, and VSCode. The malicious code is designed to harvest data and steal credentials from developer environments. CheckMarx confirmed that previous attacks also resulted in the publication of backdoored artifacts across multiple distribution channels. The LAPSUS$ threat group previously leaked data from CheckMarx\u0026rsquo;s private GitHub repository in April.\u003c/p\u003e\n\n\u003ch3 id=\"mitigation-and-security-guidance\"\u003eMitigation and Security Guidance\u003c/h3\u003e\n\n\u003cp\u003eCheckMarx advises all users to immediately revert to version 2.0.13-829.vc72453fa_1c16, which was published on December 17, 2025, or to use an older release. Users who downloaded the malicious version should assume their credentials are compromised and rotate all secrets immediately. Organizations are urged to investigate their environments for signs of lateral movement or persistent access. CheckMarx has published a set of indicators of compromise to help defenders identify malicious artifacts. The company has communicated directly with customers and provided additional recommendations through its Security Updates section and Support Portal.\u003c/p\u003e\n\n\u003ch3 id=\"data-isolation-and-customer-impact\"\u003eData Isolation and Customer Impact\u003c/h3\u003e\n\n\u003cp\u003eCheckMarx explicitly stated that its GitHub repositories are isolated from its customer production environments. The company confirmed that no customer data is stored within the compromised GitHub repositories. While the threat actor successfully backdoored internal development tools and plugins, customer data remains unaffected. CheckMarx continues to provide ongoing security updates and will share further information as it becomes available.\u003c/p\u003e\n","keyPoints":["The TeamPCP hacker group compromised CheckMarx's Jenkins AST plugin by using credentials stolen from a prior supply-chain attack to access the company's GitHub repositories.","A rogue version of the plugin was uploaded to the Jenkins Marketplace on May 9, containing malicious code designed to steal credentials.","CheckMarx advised users to revert to version 2.0.13-829.vc72453fa_1c16 or an older release and rotate all secrets.","CheckMarx confirmed that its GitHub repositories are isolated from customer production environments and do not store customer data."],"insights":["The malicious plugin was uploaded outside the official release pipeline and lacked standard git tags or GitHub releases, indicating direct unauthorized repository commits rather than automated build system exploitation.","Security guidance explicitly advises users to revert to or remain on the December 2025 build instead of updating to newer versions, prioritizing known-safe artifacts over automatic updates.","The threat actor leveraged credentials from a prior supply-chain breach to maintain persistent access for over a month and successfully pivot across multiple distribution channels, including GitHub, Docker, Open VSX, and Jenkins."],"referencedReports":[],"body":"\u003cp\u003eThe TeamPCP hacker group compromised the official CheckMarx Jenkins AST plugin by using credentials stolen from a prior supply-chain breach. A malicious version of the plugin was uploaded to the Jenkins Marketplace on May 9, containing code designed to steal user credentials. CheckMarx confirmed this is the third supply-chain incident the company has faced since late March. The company advises users to immediately revert to version 2.0.13-829.vc72453fa_1c16 or an older release. Users who downloaded the rogue version should rotate all secrets and investigate their systems for lateral movement. CheckMarx emphasized that its GitHub repositories are isolated from customer production environments and do not store customer data. The threat actor left a message criticizing the company for failing to rotate secrets. CheckMarx has published indicators of compromise to help defenders identify the malicious artifacts.\u003c/p\u003e\n"},{"n":13,"title":"SAP fixes critical vulnerabilities in Commerce Cloud and S/4HANA","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/sap-fixes-critical-vulnerabilities-in-commerce-cloud-and-s-4hana/","time":"11:04","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"SAP released May 2026 security updates to patch 15 vulnerabilities across its Commerce Cloud and S/4HANA platforms, including two critical flaws enabling unauthenticated code execution and SQL injection. Organizations should apply these patches immediately to mitigate high-impact risks, particularly given the recent trend of SAP software being targeted in supply chain and ransomware attacks.","briefOverview":"\u003cp\u003eSAP has released its May 2026 security updates to address 15 vulnerabilities across its Commerce Cloud and S/4HANA platforms. Two critical flaws were patched, including an unauthenticated code execution vulnerability in Commerce Cloud caused by improper Spring Security configuration. Another critical issue in S/4HANA allows low-complexity SQL injection due to direct concatenation of user input into database queries. The advisory also resolves one high-severity and eleven medium-severity issues involving command injection, cross-site scripting, cross-site request forgery, and denial-of-service. While SAP reports no evidence of in-the-wild exploitation for these specific patches, CISA has recently added 14 SAP vulnerabilities to its Known Exploited Vulnerabilities catalog. This follows a recent supply-chain attack that compromised official SAP npm packages to steal developer credentials. As the largest enterprise software vendor, SAP serves 99 of the 100 largest companies worldwide and reported over €36 billion in fiscal year 2025. Organizations should prioritize applying these updates to mitigate high-impact security risks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSAP has published its May 2026 security advisory, detailing patches for 15 vulnerabilities across its enterprise software suite. The update addresses two critical flaws in SAP Commerce Cloud and S/4HANA that pose severe risks to system integrity and availability. The first critical vulnerability, tracked as CVE-2026-34263, is a missing authentication check in Commerce Cloud. Due to improper Spring Security configuration, this flaw allows unauthenticated users to upload malicious configurations and inject code, resulting in arbitrary server-side execution. The second critical flaw, CVE-2026-34260, affects S/4HANA and enables basic-privilege attackers to perform low-complexity SQL injection attacks. The application directly concatenates unsanitized user input into SQL queries before passing them to the underlying database. Successful exploitation grants unauthorized access to sensitive database information and can crash the application, severely impacting confidentiality and availability. Beyond the critical patches, the advisory covers one high-severity issue and eleven medium-severity vulnerabilities. These include command injection, missing authorization checks, cross-site scripting, cross-site request forgery, and denial-of-service conditions. SAP states that there is currently no evidence of these specific vulnerabilities being exploited in the wild. However, the broader SAP ecosystem remains a frequent target for threat actors. CISA has recently added 14 SAP security flaws to its Known Exploited Vulnerabilities catalog, with two previously abused in ransomware campaigns. Additionally, a recent supply-chain attack successfully compromised official SAP npm packages to steal credentials and authentication tokens from developer systems. As the world’s largest enterprise software vendor, SAP supports 99 of the 100 largest companies globally and generated over €36 billion in revenue during fiscal year 2025.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eExecutive Summary\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eSAP has released its May 2026 security updates addressing 15 vulnerabilities across its Commerce Cloud and S/4HANA platforms. The patch cycle includes two critical flaws, one high-severity issue, and eleven medium-severity vulnerabilities affecting core enterprise functions. While SAP reports no active in-the-wild exploitation for these specific patches, the broader SAP software ecosystem remains highly targeted by threat actors.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eCritical Vulnerabilities\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe May 2026 advisory highlights two critical flaws that require immediate remediation. The first critical vulnerability, tracked as CVE-2026-34263, stems from an improper Spring Security configuration that fails to enforce authentication checks. Unauthenticated attackers can exploit this misconfiguration to perform malicious configuration uploads and code injection, leading to arbitrary server-side code execution. SAP notes this flaw has a high impact on the confidentiality, integrity, and availability of the application.\u003c/p\u003e\n\n\u003cp\u003eThe second critical flaw, CVE-2026-34260, affects S/4HANA and enables basic-privilege attackers to execute low-complexity SQL injection attacks. The application directly concatenates unsanitized user input into SQL queries before passing them to the underlying database. Successful exploitation grants unauthorized access to sensitive database information and can crash the application, severely impacting confidentiality and availability.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAdditional Security Fixes\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eBeyond the critical patches, the advisory resolves several other significant security issues. The update covers one high-severity vulnerability and eleven medium-severity vulnerabilities. Affected attack vectors include command injection, missing authorization checks, cross-site scripting, cross-site request forgery, and denial-of-service conditions.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eThreat Landscape and Context\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eSAP explicitly states that there is no current evidence of these patched vulnerabilities being exploited in the wild. However, historical data indicates a persistent threat environment for SAP products. CISA has recently added 14 SAP security flaws to its Known Exploited Vulnerabilities catalog, including two vulnerabilities that were actively abused during ransomware attacks. Furthermore, the company recently fell victim to a supply-chain attack where official SAP npm packages were compromised to steal credentials and authentication tokens from developer systems.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eVendor Background\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eSAP operates as the world’s largest vendor of enterprise software, serving 99 of the 100 largest companies worldwide. The German multinational reported total revenues exceeding €36 billion in fiscal year 2025. Its S/4HANA suite is designed to replace legacy on-premises ECC ERP systems, while Commerce Cloud powers e-commerce operations for major global retailers and brands.\u003c/p\u003e\n","keyPoints":["SAP released May 2026 security updates addressing 15 vulnerabilities across its Commerce Cloud and S/4HANA platforms.","Two critical flaws were patched, including an unauthenticated code execution vulnerability in Commerce Cloud and a low-complexity SQL injection flaw in S/4HANA.","The advisory also resolves one high-severity and eleven medium-severity issues involving command injection, XSS, CSRF, and denial-of-service.","While SAP reports no evidence of in-the-wild exploitation for these specific patches, CISA has recently added 14 SAP vulnerabilities to its Known Exploited Vulnerabilities catalog."],"insights":["The Commerce Cloud critical flaw originates from improper Spring Security configuration, demonstrating that enterprise authentication can be bypassed through misconfigured framework settings rather than complex vulnerabilities.","The S/4HANA SQL injection vulnerability is caused by direct concatenation of user input into queries, indicating that specific application modules lack parameterized query implementation.","While SAP reports no in-the-wild exploitation for these patches, CISA’s recent addition of 14 SAP flaws to its Known Exploited Vulnerabilities catalog—including those leveraged in ransomware—highlights the active exploitation landscape for SAP software.","The compromise of official SAP npm packages in a recent supply-chain attack demonstrates that SAP’s developer toolchain is a direct attack vector for credential theft, extending the threat beyond the patched enterprise platforms."],"referencedReports":[{"title":"SAP May 2026 Security Advisory","url":"https://support.sap.com/en/my-support/knowledge-base/security-notes-news/may-2026.html","publisher":"SAP","context":"The article cites this advisory as the official source detailing the patches for 15 vulnerabilities across SAP products."},{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?f%5B0%5D=vendor_project%3A835","publisher":"CISA","context":"The article references this catalog to highlight that 14 SAP vulnerabilities have been added to it, with some previously abused in ransomware attacks."}],"body":"\u003cp\u003eSAP has released its May 2026 security updates to address 15 vulnerabilities across its Commerce Cloud and S/4HANA platforms. Two critical flaws were patched, including an unauthenticated code execution vulnerability in Commerce Cloud caused by improper Spring Security configuration. Another critical issue in S/4HANA allows low-complexity SQL injection due to direct concatenation of user input into database queries. The advisory also resolves one high-severity and eleven medium-severity issues involving command injection, cross-site scripting, cross-site request forgery, and denial-of-service. While SAP reports no evidence of in-the-wild exploitation for these specific patches, CISA has recently added 14 SAP vulnerabilities to its Known Exploited Vulnerabilities catalog. This follows a recent supply-chain attack that compromised official SAP npm packages to steal developer credentials. As the largest enterprise software vendor, SAP serves 99 of the 100 largest companies worldwide and reported over €36 billion in fiscal year 2025. Organizations should prioritize applying these updates to mitigate high-impact security risks.\u003c/p\u003e\n"},{"n":17,"title":"Mini Shai-Hulud Worm Compromises TanStack, Mistral AI, Guardrails AI \u0026 More Packages","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/mini-shai-hulud-worm-compromises.html","time":"08:50","priority":"MUST READ","score":95,"group":"J","groupColor":"#fb923c","tldr":"The Mini Shai-Hulud supply chain attack compromised multiple npm and PyPI packages by hijacking GitHub Actions and stealing credentials, deploying a self-spreading worm that exfiltrates sensitive data and persists across development environments.","briefOverview":"\u003cp\u003eTeamPCP has launched a fresh Mini Shai-Hulud supply chain attack compromising multiple npm and PyPI packages from major projects like TanStack, Mistral AI, and Guardrails AI. The malicious code includes an obfuscated JavaScript file that profiles the environment and deploys a comprehensive credential stealer. This stealer targets cloud providers, cryptocurrency wallets, AI tools, and CI systems, exfiltrating data to a decentralized messaging service domain. Attackers also use stolen GitHub tokens to commit encrypted data to controlled repositories as a fallback. The worm autonomously spreads by scanning for npm tokens with bypass_2fa enabled and exchanging GitHub OIDC tokens for per-package publish tokens. TanStack has assigned CVE-2026-45321 to the incident, rating it as critical with a CVSS score of 9.6. The attack impacted 42 packages and 84 versions across the ecosystem. PyPI compromises like the mistralai package contain malicious code with country-aware logic that avoids Russian-language environments. The campaign demonstrates a highly sophisticated, self-spreading threat targeting both frontend tooling and AI infrastructure.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTeamPCP, the threat actor behind a recent supply chain attack spree, has compromised npm and PyPI packages from TanStack, UiPath, Mistral AI, OpenSearch, and Guardrails AI in a fresh Mini Shai-Hulud campaign.\u003c/p\u003e\n\n\u003cp\u003eThe affected npm packages contain an obfuscated JavaScript file named router_init.js that profiles the execution environment and launches a credential stealer. This malware targets cloud providers, cryptocurrency wallets, AI tools, messaging apps, and CI systems like GitHub Actions. Exfiltrated data is sent to the filev2.getsession[.]org domain, a deliberate choice to evade enterprise detection due to its association with a privacy-focused messaging service.\u003c/p\u003e\n\n\u003cp\u003eAs a fallback, encrypted data is committed to attacker-controlled GitHub repositories using stolen tokens via the GraphQL API. The malware also establishes persistence by injecting hooks into Claude Code and Visual Studio Code to survive reboots. Additionally, it installs a gh-token-monitor service to track and re-exfiltrate GitHub tokens while injecting malicious workflows that serialize repository secrets and upload them to api.masscan[.]cloud.\u003c/p\u003e\n\n\u003cp\u003eTanStack traced the compromise to a chained GitHub Actions attack involving pull_request_target triggers, cache poisoning, and runtime memory extraction of an OIDC token. Notably, no npm tokens were stolen, and the npm publish workflow itself remained uncompromised. The attackers staged the payload in a GitHub fork, injected it into published npm tarballs, and hijacked the legitimate TanStack/router workflow to publish compromised versions with valid SLSA provenance.\u003c/p\u003e\n\n\u003cp\u003eThis makes the worm the first documented npm threat capable of producing malicious packages with valid SLSA Build Level 3 attestations. The worm spreads autonomously by finding npm tokens with bypass_2fa enabled, enumerating packages by the same maintainer, and exchanging GitHub OIDC tokens for per-package publish tokens. The TanStack compromise is assigned CVE-2026-45321 with a CVSS score of 9.6, impacting 42 packages and 84 versions.\u003c/p\u003e\n\n\u003cp\u003eBeyond npm, the campaign affected PyPI packages including guardrails-ai@0.10.1 and mistralai@2.4.6. Microsoft analysis revealed the mistralai package downloads a credential stealer with country-aware logic that avoids Russian-language environments. The payload carries a 1-in-6 chance of executing rm -rf / on systems detected in Israel or Iran.\u003c/p\u003e\n\n\u003cp\u003eThe guardrails-ai compromise executes malicious code on import, checking for Linux systems before downloading and running a remote Python artifact without integrity verification. The campaign continues to propagate across search infrastructure, AI tooling, enterprise automation, and CI/CD ecosystems.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eTeamPCP has executed a sophisticated Mini Shai-Hulud supply chain attack targeting both npm and PyPI ecosystems. The campaign compromises critical packages from TanStack, Mistral AI, Guardrails AI, OpenSearch, and UiPath, deploying a self-spreading worm with advanced credential theft, persistence, and evasion capabilities.\u003c/p\u003e\n\n\u003ch3 id=\"attack-vector-and-payload-execution\"\u003eAttack Vector and Payload Execution\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003enpm Compromise:\u003c/strong\u003e Affected packages contain an obfuscated JavaScript file (\u003ccode\u003erouter_init.js\u003c/code\u003e) that profiles the execution environment and deploys a comprehensive credential stealer.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePyPI Compromise:\u003c/strong\u003e Packages like \u003ccode\u003eguardrails-ai@0.10.1\u003c/code\u003e execute malicious code immediately upon import. The malware checks for Linux systems, downloads a remote Python artifact (\u003ccode\u003e/tmp/transformers.pyz\u003c/code\u003e), and executes it without integrity verification.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTarget Scope:\u003c/strong\u003e The stealer actively targets cloud providers, cryptocurrency wallets, AI tools, messaging applications, and CI/CD systems such as GitHub Actions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"data-exfiltration-and-evasion-techniques\"\u003eData Exfiltration and Evasion Techniques\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePrimary Exfiltration:\u003c/strong\u003e Stolen data is transmitted to \u003ccode\u003efilev2.getsession[.]org\u003c/code\u003e, a domain chosen to bypass enterprise security controls due to its association with a decentralized privacy-focused messaging service.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFallback Mechanism:\u003c/strong\u003e Encrypted data is committed to attacker-controlled repositories under the author name \u003ccode\u003eclaude@users.noreply.github.com\u003c/code\u003e via the GitHub GraphQL API using compromised tokens.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePersistence:\u003c/strong\u003e The malware injects hooks into Claude Code and Microsoft Visual Studio Code to ensure re-execution on every IDE launch. It also deploys a \u003ccode\u003egh-token-monitor\u003c/code\u003e service to continuously track and re-exfiltrate GitHub tokens.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWorkflow Injection:\u003c/strong\u003e Two malicious GitHub Actions workflows are injected to serialize repository secrets into JSON and upload them to \u003ccode\u003eapi.masscan[.]cloud\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"self-spreading-mechanics-and-slsa-abuse\"\u003eSelf-Spreading Mechanics and SLSA Abuse\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAutonomous Propagation:\u003c/strong\u003e The worm locates npm tokens with \u003ccode\u003ebypass_2fa\u003c/code\u003e enabled, enumerates all packages published by the same maintainer, and exchanges a GitHub OIDC token for a per-package publish token to bypass traditional authentication.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSLSA Provenance:\u003c/strong\u003e Compromised packages carry valid SLSA Build Level 3 attestations, marking the first documented npm worm capable of producing malicious packages with cryptographically valid supply chain provenance.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTanStack Postmortem:\u003c/strong\u003e TanStack traced the initial compromise to a chained GitHub Actions attack utilizing \u003ccode\u003epull_request_target\u003c/code\u003e triggers, cache poisoning, and runtime memory extraction of an OIDC token from the runner process. No npm tokens were stolen, and the npm publish workflow itself was not compromised.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"incident-impact-and-cve-assignment\"\u003eIncident Impact and CVE Assignment\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-45321:\u003c/strong\u003e Assigned to the TanStack compromise with a CVSS score of 9.6.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScope:\u003c/strong\u003e Impacts 42 packages and 84 versions across the TanStack ecosystem.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAffected Packages:\u003c/strong\u003e Includes \u003ccode\u003e@opensearch-project/opensearch\u003c/code\u003e (versions 3.5.3, 3.6.2, 3.7.0, 3.8.0), \u003ccode\u003e@squawk/mcp@0.9.5\u003c/code\u003e, \u003ccode\u003e@squawk/weather@0.5.10\u003c/code\u003e, \u003ccode\u003e@squawk/flightplan@0.5.6\u003c/code\u003e, and multiple \u003ccode\u003e@tallyui/connector\u003c/code\u003e packages.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"destructive-capabilities-and-geofencing\"\u003eDestructive Capabilities and Geofencing\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003emistralai Package:\u003c/strong\u003e Microsoft security analysis revealed the package downloads a credential stealer from \u003ccode\u003e83.142.209[.]194\u003c/code\u003e with country-aware logic.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGeofenced Destruction:\u003c/strong\u003e The payload contains a destructive branch that avoids Russian-language environments and carries a 1-in-6 probability of executing \u003ccode\u003erm -rf /\u003c/code\u003e when the system is detected in Israel or Iran.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEcosystem Impact:\u003c/strong\u003e The campaign continues to propagate across search infrastructure, AI tooling, aviation-related developer packages, enterprise automation, frontend tooling, and CI/CD-adjacent systems.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["TeamPCP's Mini Shai-Hulud campaign compromised multiple npm and PyPI packages, including those from TanStack, Mistral AI, and Guardrails AI, by deploying a self-spreading worm.","The worm spreads across the npm ecosystem by hijacking GitHub Actions workflows and exchanging OIDC tokens for per-package publish tokens to bypass authentication.","Compromised packages deploy credential stealers that exfiltrate sensitive data to external domains and inject malicious GitHub Actions workflows to serialize repository secrets.","The mistralai PyPI package contains malicious code with country-aware logic that avoids Russian-language environments and carries a 1-in-6 chance of executing rm -rf / on systems located in Israel or Iran."],"insights":["The worm autonomously propagates by scanning for npm tokens with bypass_2fa enabled and exchanging GitHub OIDC tokens for per-package publish tokens, effectively bypassing traditional authentication.","Exfiltrated data is routed through Session Protocol, a decentralized privacy-focused messaging service, to deliberately evade enterprise security controls and network blocking.","This campaign marks the first documented npm worm capable of publishing malicious packages with valid SLSA Build Level 3 provenance attestations, directly undermining supply chain verification mechanisms.","The malware ensures persistent access by injecting hooks into Claude Code and VS Code, guaranteeing the credential stealer executes on every IDE launch."],"referencedReports":[{"title":"Mini Shai-Hulud is Back: TanStack Compromised","url":"https://www.aikido.dev/blog/mini-shai-hulud-is-back-tanstack-compromised","publisher":"Aikido Security","context":"Cited alongside other security firms to analyze the credential stealer and supply chain attack."},{"title":"Shai-Hulud Compromises the TanStack Ecosystem: 80 Packages Compromised","url":"https://www.endorlabs.com/learn/shai-hulud-compromises-the-tanstack-ecosystem-80-packages-compromised","publisher":"Endor Labs","context":"Referenced as a third-party analysis detailing the scope of the npm compromise."},{"title":"Mass NPM Supply Chain Attack: TanStack \u0026 Mistral","url":"https://safedep.io/mass-npm-supply-chain-attack-tanstack-mistral/","publisher":"SafeDep","context":"Listed as a source providing technical analysis on the widespread attack across npm and PyPI."},{"title":"TanStack npm packages compromised: Mini Shai-Hulud supply chain attack","url":"https://socket.dev/blog/tanstack-npm-packages-compromised-mini-shai-hulud-supply-chain-attack","publisher":"Socket","context":"Cited alongside other researchers to describe the worm's propagation and impact."},{"title":"Mini Shai-Hulud is Back: A self-spreading supply chain attack hits the npm ecosystem","url":"https://www.stepsecurity.io/blog/tanstack-npm-packages-compromised-mini-shai-hulud-supply-chain-attack","publisher":"StepSecurity","context":"Referenced to explain the worm's self-spreading capabilities and credential theft mechanisms."},{"title":"NPM Supply Chain Compromise Postmortem","url":"https://tanstack.com/blog/npm-supply-chain-compromise-postmortem","publisher":"TanStack","context":"Linked as the official postmortem where TanStack traced the compromise to chained GitHub Actions attacks and OIDC token extraction."},{"title":"The Monsters in Your Build Cache: GitHub Actions Cache Poisoning","url":"https://adnanthekhan.com/2024/05/06/the-monsters-in-your-build-cache-github-actions-cache-poisoning/","publisher":"Adnan The Khan","context":"Cited as a technical analysis explaining the GitHub Actions cache poisoning technique leveraged in the attack."},{"title":"GHSA-g7cv-rxg3-hmpx","url":"https://github.com/TanStack/router/security/advisories/GHSA-g7cv-rxg3-hmpx","publisher":"GitHub / TanStack","context":"Referenced as the official security advisory assigning CVE-2026-45321 and documenting the critical severity of the compromise."}],"body":"\u003cp\u003eTeamPCP has launched a fresh Mini Shai-Hulud supply chain attack compromising multiple npm and PyPI packages from major projects like TanStack, Mistral AI, and Guardrails AI. The malicious code includes an obfuscated JavaScript file that profiles the environment and deploys a comprehensive credential stealer. This stealer targets cloud providers, cryptocurrency wallets, AI tools, and CI systems, exfiltrating data to a decentralized messaging service domain. Attackers also use stolen GitHub tokens to commit encrypted data to controlled repositories as a fallback. The worm autonomously spreads by scanning for npm tokens with bypass_2fa enabled and exchanging GitHub OIDC tokens for per-package publish tokens. TanStack has assigned CVE-2026-45321 to the incident, rating it as critical with a CVSS score of 9.6. The attack impacted 42 packages and 84 versions across the ecosystem. PyPI compromises like the mistralai package contain malicious code with country-aware logic that avoids Russian-language environments. The campaign demonstrates a highly sophisticated, self-spreading threat targeting both frontend tooling and AI infrastructure.\u003c/p\u003e\n"},{"n":19,"title":"RubyGems Suspends New Signups After Hundreds of Malicious Packages Are Uploaded","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/rubygems-suspends-new-signups-after.html","time":"14:47","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"RubyGems has temporarily suspended new account registrations following a major malicious attack that involved the upload of hundreds of compromised packages to the platform.","briefOverview":"\u003cp\u003eRubyGems, the standard package manager for the Ruby programming language, has temporarily suspended new account registrations following a major malicious attack on the platform. Maciej Mensfeld, a senior product manager at Mend.io, confirmed that hundreds of packages were uploaded, with some containing exploits. Visitors attempting to register for new accounts are currently greeted with a message stating that registration has been disabled. Mend.io, which secures the RubyGems platform, intends to release further details once the incident is contained. The identity of the attackers remains unknown. This event occurs amidst a broader trend of software supply chain attacks targeting open-source ecosystems. Threat actors like TeamPCP have been compromising widely used packages to distribute credential-stealing malware. According to a report published by Google on Monday, the credentials stolen from affected environments are being monetized through partnerships with ransomware and data theft extortion groups.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eRubyGems, the standard package manager for the Ruby programming language, has temporarily paused account sign-ups in response to what has been described as a major malicious attack. Maciej Mensfeld, senior product manager for software supply chain security at Mend.io, confirmed the situation in a post on X. He stated that hundreds of packages are involved in the incident, with some carrying exploits. Visitors to the RubyGems sign-up page are now greeted with a message indicating that new account registration has been temporarily disabled. Mend.io, which secures RubyGems, plans to release more details once the incident is contained. It is currently unknown who is behind the attack. This development occurs as software supply chain attacks targeting open-source ecosystems have been on the rise. Threat actors like TeamPCP have compromised widely used packages to distribute credential-stealing malware. This malware is capable of harvesting sensitive data and allowing attackers to expand their reach. A report published on Monday by Google detailed how credentials stolen from affected environments have been monetized. These credentials are sold through partnerships with ransomware and data theft extortion groups. The article notes that this is a developing story and advises readers to check back for more details.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"incident-overview\"\u003eIncident Overview\u003c/h2\u003e\n\n\u003cp\u003eRubyGems, the standard package manager for the Ruby programming language, has temporarily suspended new account registrations following a major malicious attack. Maciej Mensfeld, senior product manager for software supply chain security at Mend.io, confirmed the attack in a post on X. He noted that hundreds of packages are involved, with some carrying exploits.\u003c/p\u003e\n\n\u003ch2 id=\"platform-impact\"\u003ePlatform Impact\u003c/h2\u003e\n\n\u003cp\u003eVisitors to the RubyGems sign-up page are currently greeted with a message stating that new account registration has been temporarily disabled. Mend.io, which secures RubyGems, intends to release more details once the incident is contained. It is currently unknown who is behind the attack.\u003c/p\u003e\n\n\u003ch2 id=\"security-context\"\u003eSecurity Context\u003c/h2\u003e\n\n\u003cp\u003eThe development comes as software supply chain attacks targeting open-source ecosystems have been on the rise. Threat actors like TeamPCP have compromised widely used packages to distribute credential-stealing malware. This malware is capable of harvesting sensitive data and allowing attackers to expand their reach.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-monetization\"\u003eThreat Actor \u0026amp; Monetization\u003c/h2\u003e\n\n\u003cp\u003eA report published on Monday by Google detailed how credentials stolen from affected environments have been monetized. These credentials are monetized through partnerships with ransomware and data theft extortion groups. The article notes that this is a developing story and advises readers to check back for more details.\u003c/p\u003e\n","keyPoints":["RubyGems has temporarily disabled new account registrations following a major malicious attack on the platform.","Hundreds of packages were uploaded to the site, with some containing exploits.","Mend.io, which secures RubyGems, will release further details once the incident is contained.","The attack occurs amid a rising trend of software supply chain threats targeting open-source ecosystems to distribute credential-stealing malware."],"insights":["Stolen credentials are monetized through partnerships with ransomware and data theft extortion groups, indicating a sophisticated, multi-stage monetization strategy.","Threat actors are employing worm-like propagation techniques, exemplified by the 'Mini Shai Hulud worm,' to compromise widely used packages and expand their reach.","The attack demonstrates the vulnerability of open-source registries to direct package uploads, as hundreds of malicious packages were successfully distributed before the platform suspended new registrations."],"referencedReports":[],"body":"\u003cp\u003eRubyGems, the standard package manager for the Ruby programming language, has temporarily suspended new account registrations following a major malicious attack on the platform. Maciej Mensfeld, a senior product manager at Mend.io, confirmed that hundreds of packages were uploaded, with some containing exploits. Visitors attempting to register for new accounts are currently greeted with a message stating that registration has been disabled. Mend.io, which secures the RubyGems platform, intends to release further details once the incident is contained. The identity of the attackers remains unknown. This event occurs amidst a broader trend of software supply chain attacks targeting open-source ecosystems. Threat actors like TeamPCP have been compromising widely used packages to distribute credential-stealing malware. According to a report published by Google on Monday, the credentials stolen from affected environments are being monetized through partnerships with ransomware and data theft extortion groups.\u003c/p\u003e\n"},{"n":20,"title":"OpenAI Launches Daybreak for AI-Powered Vulnerability Detection and Patch Validation","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/openai-launches-daybreak-for-ai-powered.html","time":"06:55","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"OpenAI launched Daybreak, an AI-driven security initiative that uses advanced GPT models and Codex Security to help organizations rapidly detect, validate, and patch vulnerabilities. This addresses the critical bottleneck where AI-accelerated threat discovery is outpacing traditional patching and disclosure timelines.","briefOverview":"\u003cp\u003eOpenAI has launched Daybreak, a cybersecurity initiative that merges frontier AI capabilities with Codex Security to help organizations proactively identify and patch vulnerabilities. The platform integrates secure code review, threat modeling, and remediation guidance directly into the development loop to improve software resilience. Daybreak operates using three distinct GPT-5.5 model variants tailored for different security operations. The first is a standard model with general safeguards, while the second provides Trusted Access for Cyber for verified defensive work. The third is a permissive GPT-5.5-Cyber model specifically built for red teaming and penetration testing. Major security vendors like Cisco, Cloudflare, and CrowdStrike are already integrating these tools into their workflows. This initiative addresses a critical industry bottleneck where AI-accelerated vulnerability discovery is outpacing traditional patching processes. The rapid pace of AI-assisted research has led to severe triage fatigue and prompted platforms like HackerOne to pause bug bounty programs. Security researchers now argue that the traditional 90-day disclosure window is obsolete, as AI can turn patch diffs into working exploits in minutes.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOpenAI has introduced Daybreak, a new cybersecurity initiative designed to leverage frontier AI capabilities alongside Codex Security. The platform enables organizations to build editable threat models, identify vulnerabilities in isolated environments, and propose fixes before attackers can exploit them. Daybreak operates using three distinct GPT-5.5 model variants. The first is a standard model with general safeguards. The second provides Trusted Access for Cyber to support verified defensive work in authorized environments. The third is a permissive GPT-5.5-Cyber model specifically built for red teaming, penetration testing, and controlled validation. Several major technology firms, including Akamai, Cisco, Cloudflare, CrowdStrike, Fortinet, Oracle, Palo Alto Networks, and Zscaler, are already integrating these capabilities. The initiative arrives as AI tools drastically shorten the time required to discover latent security flaws. This acceleration has created a significant patching bottleneck, even under ideal conditions. The surge in AI-assisted vulnerability research has led to triage fatigue, where maintainers must sift through massive volumes of reports. Some of these reports contain plausible-sounding but entirely hallucinated findings generated by AI models. The volume and speed of discoveries prompted HackerOne to pause its bug bounty program in early March. Industry leaders are now positioning AI security agents as a necessary operational layer to safeguard digital infrastructure. Security researcher Himanshu Anand recently published an analysis declaring the traditional 90-day disclosure policy dead. He noted that when multiple researchers find the same bug quickly and AI can generate working exploits from patch diffs in 30 minutes, extended disclosure windows offer no real protection.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eOverview of the Daybreak Initiative\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eOpenAI has launched Daybreak, a comprehensive cybersecurity initiative that merges frontier artificial intelligence capabilities with Codex Security. The platform is designed to help organizations proactively identify, validate, and patch vulnerabilities before malicious actors can exploit them. By integrating secure code review, threat modeling, and remediation guidance directly into the development loop, the initiative aims to make software more resilient from the outset.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eModel Architecture and Capabilities\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe system relies on three distinct GPT-5.5 model variants tailored for different security operations. Each variant serves a specific defensive or offensive purpose:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA standard model equipped with general-purpose safeguards for everyday use.\u003c/li\u003e\n\u003cli\u003eA version with Trusted Access for Cyber designed for verified defensive work in authorized environments.\u003c/li\u003e\n\u003cli\u003eA permissive GPT-5.5-Cyber model optimized for red teaming, penetration testing, and controlled validation.\nTogether, these models allow defenders to build editable threat models, test vulnerabilities in isolated environments, and propose targeted fixe
