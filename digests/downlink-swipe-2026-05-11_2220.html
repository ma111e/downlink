le Teaming\u003c/h3\u003e\n\n\u003cp\u003eAutonomous purple teaming directly addresses these bottlenecks by deploying AI agents to execute the entire validation loop at machine speed. This methodology eliminates human typing bottlenecks by automating knowledge transfer and handoffs. Red findings automatically convert into blue tests, while blue detection gaps immediately trigger red exercises.\u003c/p\u003e\n\n\u003cp\u003eThe system operates as a continuous dial rather than a binary switch. Organizations can crawl with manual processes, walk with scheduled AI assistance, or run end-to-end autonomous loops with human oversight reserved only for critical decisions. Every step remains fully auditable, allowing operators to override, retune, or roll back actions at any time.\u003c/p\u003e\n\n\u003ch3 id=\"core-components-and-integrated-workflow\"\u003eCore Components and Integrated Workflow\u003c/h3\u003e\n\n\u003cp\u003eEffective autonomous purple teaming requires three specialized components functioning as a unified system rather than isolated tools.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAutomated Penetration Testing serves as the red team’s continuous inquiry, constantly assessing whether attackers can reach critical assets given current exposures and controls.\u003c/li\u003e\n\u003cli\u003eBreach and Attack Simulation (BAS) functions as the blue team’s validation mechanism, verifying whether firewalls, EDRs, SIEM rules, and response playbooks perform as intended.\u003c/li\u003e\n\u003cli\u003eAI-Powered Mobilization replaces manual ticketing with a chain of specialized agents that orchestrate the entire response lifecycle.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eWhen a CISA alert arrives, a CTI agent enriches it against the environment while a baseliner agent determines relevance. Red and blue agents then execute simulations in parallel. A mobilizer agent auto-deploys low-risk fixes, opens tickets for moderate issues, and flags critical items for human review. Finally, a reporter agent generates both executive and technical summaries.\u003c/p\u003e\n\n\u003ch3 id=\"operational-impact-and-strategic-value\"\u003eOperational Impact and Strategic Value\u003c/h3\u003e\n\n\u003cp\u003eThe output of this architecture is not a static list of thousands of CVEs ranked by CVSS scores. Instead, it produces a single continuous action queue that highlights only what is actively exploitable against live organizational controls. This shifts the focus from theoretical vulnerabilities to practical, real-time remediation.\u003c/p\u003e\n\n\u003cp\u003eBy compressing the defender’s clock to match the attacker’s, autonomous purple teaming transforms security validation from a periodic calendar event into an ongoing operational reality. This methodology finally delivers the continuous loop the industry has pursued for years, ensuring defenses are tested and hardened at the pace modern threats demand.\u003c/p\u003e\n","keyPoints":["The vulnerability exploitation window has collapsed to roughly 10 hours, with AI-powered attackers now compromising systems in seconds.","Traditional purple teaming fails to operate continuously due to human friction, tool orchestration bottlenecks, and approval processes that outpace exploitation windows.","Autonomous purple teaming utilizes AI agents to automate the red and blue team validation loop, executing security testing and response at machine speed.","This autonomous approach integrates automated penetration testing, breach and attack simulation, and AI-powered mobilization agents to continuously validate defenses and deploy fixes.","The system replaces manual handoffs and CVE lists with a continuous action queue that identifies only what is actually exploitable against current organizational controls."],"insights":["The standard change-approval process now takes longer than the vulnerability exploitation window, rendering traditional patching cycles fundamentally obsolete against AI-driven threats.","Defensive response time is lost not in security tool failures but in the manual handoff between teams, where delays accumulate through ticketing queues, copy-pasted artifacts, and fragmented communications.","True security autonomy requires abandoning isolated task automations like drafting YARA rules in favor of end-to-end agentic loops that continuously orchestrate detection, validation, and remediation.","Autonomous validation shifts the operational output from static CVE lists ranked by CVSS to a continuous action queue that prioritizes only what is actively exploitable against live organizational controls."],"referencedReports":[],"body":"\u003cp\u003eTraditional purple teaming aims to continuously validate security posture by looping red and blue team activities, but it consistently fails in practice. The primary bottleneck is human friction, where handoffs between teams rely on slow manual processes like copy-pasting hashes, emailing PDFs, and waiting for change approvals. Meanwhile, AI-powered adversaries have compressed the vulnerability exploitation window to roughly 10 hours, with some attacks completing in under 73 seconds. Because standard approval processes now take longer than the exploitation window, quarterly exercises are no longer sufficient. Autonomous purple teaming addresses this gap by using AI agents to run the entire validation loop at machine speed. This approach integrates automated penetration testing, breach and attack simulation, and AI-powered mobilization to continuously test defenses and deploy fixes without manual intervention. Instead of generating static CVE lists, the system produces a continuous action queue focused only on what is actively exploitable against live controls. This shifts security validation from a calendar event to an ongoing, autonomous methodology that matches the pace of modern threats.\u003c/p\u003e\n"},{"n":3,"title":"Why Changing Passwords Doesn’t End an Active Directory Breach","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/why-changing-passwords-doesnt-end-an-active-directory-breach/","time":"13:53","priority":"SHOULD READ","score":80,"tldr":"Resetting passwords alone fails to stop an Active Directory breach because cached credentials, active Kerberos sessions, and modified permissions allow attackers to maintain access. Complete remediation requires simultaneously terminating sessions, clearing cached tickets, rotating privileged credentials, and auditing directory permissions.","briefOverview":"\u003cp\u003ePassword resets are frequently the immediate reaction to a suspected security breach, yet they fail to completely cut off an attacker’s access. Windows systems cache password hashes locally, and hybrid environments experience synchronization delays, creating a gap that attackers can exploit. Threat actors leverage this window through pass-the-hash methods, active Kerberos tickets, long-lived service accounts, and forged Golden or Silver tickets. Closing this gap requires terminating active sessions, clearing cached credentials, and rotating privileged service account passwords. Defenders must also audit directory permissions and, in severe cases, reset the KRBTGT account twice to invalidate forged tickets.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ePassword resets are frequently the immediate reaction to a suspected security breach, yet they fail to completely cut off an attacker’s access. In both Active Directory and hybrid Entra ID environments, credential changes do not instantly invalidate old authentication material across every path. Windows systems cache password hashes locally for offline logons, meaning devices that have not recently connected to the domain still hold usable previous credentials. Hybrid deployments also experience synchronization delays before new password hashes reach Entra ID. Attackers exploit this window through several established techniques. They can use pass-the-hash methods to leverage cached credentials, maintain access via valid Kerberos tickets, or rely on long-lived service accounts with elevated privileges. Forged Golden and Silver tickets further bypass password resets entirely by controlling authentication without needing valid credentials. Permission modifications also create persistent access paths, such as manipulating the AdminSDHolder template to ensure recurring privilege grants. Closing this gap requires a multi-step incident response strategy. Defenders must explicitly terminate active sessions, force logoffs or reboots, and clear Kerberos tickets on affected systems. Service account passwords must be rotated, particularly those tied to critical infrastructure. Local cached credentials should be purged as endpoints reconnect to the domain network. Directory auditing is equally critical, requiring a review of group memberships, delegated rights, and privileged roles. In advanced compromise scenarios, resetting the KRBTGT account twice is mandatory to invalidate forged tickets. Ultimately, securing an environment demands combining strong password policies with immediate session termination and comprehensive permission audits.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"the-authentication-gap\"\u003eThe Authentication Gap\u003c/h3\u003e\n\n\u003cp\u003ePassword resets are commonly deployed as the initial response to a suspected compromise. However, this action does not instantly invalidate old credentials across all authentication mechanisms. Windows operating systems cache password hashes locally to facilitate offline logons. Consequently, endpoints that have not recently communicated with the domain controller retain previous credentials in a functional state. Hybrid environments introduce additional complexity due to synchronization delays between Active Directory and Entra ID. During this brief interval, the old password remains valid for authentication attempts.\u003c/p\u003e\n\n\u003ch3 id=\"attack-vectors-exploiting-the-gap\"\u003eAttack Vectors Exploiting the Gap\u003c/h3\u003e\n\n\u003cp\u003eThreat actors leverage this authentication gap through multiple established techniques. Cached credentials enable pass-the-hash attacks, where the captured hash authenticates without requiring the plaintext password. Active Kerberos tickets allow attackers to maintain resource access without re-entering credentials. This provides time to establish persistence or move laterally within the network. Service accounts present another vulnerability due to their long-lived passwords and elevated privileges tied to critical systems. Forged ticket attacks, including Golden and Silver Tickets, completely bypass password changes by manipulating the Kerberos Ticket Granting Ticket or targeting specific services. Permission modifications also create persistent access paths. Attackers can grant themselves rights to reset other user passwords or manipulate the AdminSDHolder object to ensure recurring privilege grants through SDProp.\u003c/p\u003e\n\n\u003ch3 id=\"comprehensive-remediation-strategies\"\u003eComprehensive Remediation Strategies\u003c/h3\u003e\n\n\u003cp\u003eMitigating these threats requires a coordinated response that extends beyond simple credential rotation. Active sessions must be explicitly terminated through forced logoffs or system reboots to purge Kerberos tickets. In advanced compromise scenarios, resetting the KRBTGT account twice is mandatory to invalidate forged tickets. Credential hygiene must extend to service accounts, requiring immediate password rotation for those with elevated privileges. Local cached credentials should be cleared as endpoints reconnect to the domain network. Directory auditing is essential to identify hidden access paths. Security teams must review the following elements:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGroup memberships\u003c/li\u003e\n\u003cli\u003eDelegated rights and Access Control Lists\u003c/li\u003e\n\u003cli\u003ePrivileged account roles\nModifying the AdminSDHolder template requires particular attention to prevent recurring permission grants.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"strategic-security-implementation\"\u003eStrategic Security Implementation\u003c/h3\u003e\n\n\u003cp\u003eEffective defense relies on hardening every account with strong passwords and implementing secure reset processes. Solutions like Specops uReset can immediately update local cached credential stores on endpoints where resets are performed. This reduces exposure at the network edge where remote systems are frequently targeted. Forcing more frequent synchronizations, such as enabling AD Change Notification, can minimize the gap between resets and Entra ID updates. Ultimately, complete eviction of threat actors demands a combination of session termination, targeted credential rotation, and rigorous verification that no hidden access paths remain.\u003c/p\u003e\n","keyPoints":["Password resets do not immediately invalidate old credentials across all authentication paths due to locally cached password hashes and synchronization delays in hybrid environments.","Attackers can maintain access after a password change by exploiting cached credentials, active Kerberos tickets, long-lived service accounts, forged tickets, or persistent permission modifications.","Fully removing an attacker requires terminating active sessions, clearing cached credentials, rotating privileged service account passwords, and auditing directory permissions and ACLs.","In severe compromise scenarios, resetting the KRBTGT account twice is necessary to invalidate forged Kerberos tickets that bypass standard password changes."],"insights":["Modifying the AdminSDHolder object allows attackers to maintain persistent permissions because SDProp reapplies these modifications hourly, bypassing the need for password-based access.","Resetting the KRBTGT account twice is a necessary step to invalidate forged Kerberos tickets (Golden and Silver tickets) that persist despite user password changes.","Specops uReset can immediately update the local cached credential store on the endpoint where the reset occurs, effectively closing the window for pass-the-hash attacks on that specific machine."],"referencedReports":[],"body":"\u003cp\u003ePassword resets are frequently the immediate reaction to a suspected security breach, yet they fail to completely cut off an attacker’s access. Windows systems cache password hashes locally, and hybrid environments experience synchronization delays, creating a gap that attackers can exploit. Threat actors leverage this window through pass-the-hash methods, active Kerberos tickets, long-lived service accounts, and forged Golden or Silver tickets. Closing this gap requires terminating active sessions, clearing cached credentials, and rotating privileged service account passwords. Defenders must also audit directory permissions and, in severe cases, reset the KRBTGT account twice to invalidate forged tickets.\u003c/p\u003e\n"},{"n":4,"title":"Webinar this week: Prevention alone is not enough against modern attacks","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/webinar-this-week-prevention-alone-is-not-enough-against-modern-attacks/","time":"12:30","priority":"MAY READ","score":62,"tldr":"Modern cyberattacks routinely bypass traditional defenses, making robust backup and recovery strategies essential for maintaining business continuity and minimizing operational disruption.","briefOverview":"\u003cp\u003eModern cyberattacks have evolved beyond simple malware and isolated phishing emails into complex campaigns that combine AI-generated phishing, business email compromise, ransomware, and SaaS abuse. These threats are specifically designed to bypass traditional security boundaries by exploiting trusted infrastructure and legitimate platforms.\u003c/p\u003e\n\n\u003cp\u003eEven when suspicious activity is detected, organizations frequently struggle to contain attacks before operational disruption or data loss occurs. Consequently, relying solely on prevention measures is no longer sufficient for maintaining cyber resilience.\u003c/p\u003e\n\n\u003cp\u003eThe upcoming BleepingComputer webinar on May 14, 2026, will explore why backup and recovery strategies must now be integrated into modern security frameworks. Attendees will learn how IT teams and managed service providers can reduce the impact of these advanced threats by strengthening both their security posture and recovery readiness.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eModern cyberattacks are no longer confined to malware or isolated phishing emails, as threat actors now combine AI-generated phishing, business email compromise, ransomware, and SaaS abuse to infiltrate business environments. These campaigns are specifically engineered to bypass traditional security boundaries by exploiting trusted infrastructure and legitimate SaaS platforms.\u003c/p\u003e\n\n\u003cp\u003eEven when suspicious activity is successfully detected, organizations often struggle to contain the breach before it results in operational disruption or permanent data loss. Because of this shift, organizations can no longer rely on prevention measures alone to protect their networks.\u003c/p\u003e\n\n\u003cp\u003eThe upcoming BleepingComputer webinar, hosted on Thursday, May 14, 2026, at 2:00 PM ET, will address this critical gap in modern defense strategies. The session features Austin O\u0026rsquo;Saben, Product Marketing Manager at Kaseya, who will discuss why backup and recovery strategies have become essential components of cyber resilience.\u003c/p\u003e\n\n\u003cp\u003eThe discussion will highlight how attackers leverage trusted platforms to bypass defenses and why most security strategies fail after an initial compromise is detected. Furthermore, the webinar will examine why SaaS backups and comprehensive business continuity and disaster recovery planning are now mandatory layers of defense.\u003c/p\u003e\n\n\u003cp\u003eAttendees will gain actionable insights on how IT teams and managed service providers can reduce the impact of modern attacks. The session will demonstrate how organizations can combine prevention, detection, backup, and rapid recovery capabilities across their environments.\u003c/p\u003e\n\n\u003cp\u003eBy strengthening both security posture and recovery readiness, businesses can maintain uptime and minimize prolonged downtime. The webinar aims to help professionals understand why modern attacks require a dual focus on strong security and fast recovery capabilities.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"article-overview-and-threat-landscape\"\u003eArticle Overview and Threat Landscape\u003c/h1\u003e\n\n\u003cp\u003eModern cyberattacks have evolved significantly beyond traditional malware and isolated phishing emails. Today\u0026rsquo;s threat actors actively combine AI-generated phishing, business email compromise, ransomware, and SaaS abuse to infiltrate business environments and disrupt operations. These sophisticated campaigns are specifically engineered to bypass traditional security boundaries by exploiting trusted infrastructure and legitimate SaaS platforms.\u003c/p\u003e\n\n\u003cp\u003eEven when suspicious activity is successfully detected, organizations frequently struggle to contain the breach before it results in operational disruption or permanent data loss. This reality demonstrates that relying solely on prevention measures is no longer sufficient for maintaining organizational cyber resilience.\u003c/p\u003e\n\n\u003ch2 id=\"webinar-details-and-speaker-information\"\u003eWebinar Details and Speaker Information\u003c/h2\u003e\n\n\u003cp\u003eBleepingComputer will host a live webinar titled \u0026ldquo;From phishing to fallout: Why MSPs must rethink both security and recovery\u0026rdquo; on Thursday, May 14, 2026, at 2:00 PM ET. The session will feature Austin O\u0026rsquo;Saben, Product Marketing Manager at Kaseya, who will lead the discussion. The webinar explores why organizations can no longer rely on prevention alone and why backup and recovery strategies have become critical components of modern cyber resilience. Attendees can register through the provided event link to secure their spot for this live session.\u003c/p\u003e\n\n\u003ch2 id=\"core-challenges-in-modern-defense\"\u003eCore Challenges in Modern Defense\u003c/h2\u003e\n\n\u003cp\u003eThe article outlines several critical challenges that organizations face when defending against contemporary threats:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAttackers increasingly leverage trusted infrastructure and legitimate SaaS platforms to bypass traditional email and network security controls.\u003c/li\u003e\n\u003cli\u003eAI-driven phishing and brand impersonation campaigns are actively outpacing legacy email security solutions.\u003c/li\u003e\n\u003cli\u003eMost traditional security strategies fail after an initial compromise is detected, leaving organizations vulnerable to prolonged downtime and data loss.\u003c/li\u003e\n\u003cli\u003eWithout reliable backup and recovery strategies, even contained attacks can lead to severe operational disruption and extended business continuity issues.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"strategic-shift-toward-integrated-recovery\"\u003eStrategic Shift Toward Integrated Recovery\u003c/h2\u003e\n\n\u003cp\u003eThe challenge does not end once an attacker gains access to the network. Without robust backup and recovery strategies, organizations face prolonged downtime, data loss, and operational disruption even after containment. Consequently, SaaS backups and comprehensive business continuity and disaster recovery planning are now essential layers of cyber resilience. The webinar will examine how these recovery mechanisms protect organizations as phishing, ransomware, and account compromise techniques continue to evolve.\u003c/p\u003e\n\n\u003ch2 id=\"actionable-takeaways-for-it-teams-and-msps\"\u003eActionable Takeaways for IT Teams and MSPs\u003c/h2\u003e\n\n\u003cp\u003eThe session will provide IT teams and managed service providers with practical strategies to reduce the impact of modern attacks. Key discussion points include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhy AI-driven phishing and brand impersonation are outpacing traditional email security\u003c/li\u003e\n\u003cli\u003eHow attackers leverage trusted infrastructure and SaaS platforms to bypass defenses\u003c/li\u003e\n\u003cli\u003eWhere most security strategies fail after initial compromise\u003c/li\u003e\n\u003cli\u003eWhy SaaS backups and a BCDR plan are critical layers of cyber resilience\u003c/li\u003e\n\u003cli\u003eHow organizations combine prevention, detection, and rapid recovery to maintain uptime\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eKaseya\u0026rsquo;s approach to cybersecurity, backup, and IT management solutions aims to help organizations improve resilience by integrating prevention, detection, backup, and rapid recovery capabilities across all environments. Ultimately, the article emphasizes that modern attacks require both strong security postures and fast recovery capabilities to maintain business continuity.\u003c/p\u003e\n","keyPoints":["Modern cyberattacks increasingly combine AI-generated phishing, ransomware, and SaaS abuse to bypass traditional security defenses.","Organizations can no longer rely solely on prevention measures because attackers often disrupt operations before containment is possible.","Reliable backup and recovery strategies, including SaaS backups and business continuity planning, are now essential layers of cyber resilience.","The upcoming webinar will detail how IT teams and MSPs can reduce attack impact by integrating prevention, detection, and rapid recovery capabilities."],"insights":["Attackers exploit legitimate SaaS platforms and trusted infrastructure to bypass traditional boundaries, making SaaS-specific backups a mandatory defense layer rather than an afterthought.","Traditional security strategies consistently fail after initial compromise, requiring organizations to treat rapid recovery and BCDR planning as core security functions rather than separate IT operations.","AI-driven phishing and brand impersonation are outpacing legacy email security controls, forcing a strategic shift toward integrated detection and recovery frameworks."],"referencedReports":[],"body":"\u003cp\u003eModern cyberattacks have evolved beyond simple malware and isolated phishing emails into complex campaigns that combine AI-generated phishing, business email compromise, ransomware, and SaaS abuse. These threats are specifically designed to bypass traditional security boundaries by exploiting trusted infrastructure and legitimate platforms.\u003c/p\u003e\n\n\u003cp\u003eEven when suspicious activity is detected, organizations frequently struggle to contain attacks before operational disruption or data loss occurs. Consequently, relying solely on prevention measures is no longer sufficient for maintaining cyber resilience.\u003c/p\u003e\n\n\u003cp\u003eThe upcoming BleepingComputer webinar on May 14, 2026, will explore why backup and recovery strategies must now be integrated into modern security frameworks. Attendees will learn how IT teams and managed service providers can reduce the impact of these advanced threats by strengthening both their security posture and recovery readiness.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;

function priorityColor(p) {

  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

}

function CardFront({ article }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
