<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; flex: 1; min-height: 0; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--accept); border-color: var(--accept); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--cyan);   border-color: var(--cyan); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }

<script>
window.__DL_ARTICLES = [{"n":1,"title":"Google: Hackers used AI to develop zero-day exploit for web admin tool","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/google-hackers-used-ai-to-develop-zero-day-exploit-for-web-admin-tool/","time":"13:02","priority":"MUST READ","score":95,"tldr":"Google Threat Intelligence Group has identified the first known zero-day exploit developed with AI to bypass two-factor authentication in a web administration tool, underscoring a growing trend of threat actors using large language models for automated vulnerability discovery and exploit generation.","briefOverview":"\u003cp\u003eGoogle Threat Intelligence Group has identified a zero-day exploit targeting an unnamed open-source web administration tool that bypasses two-factor authentication. Researchers determined that the exploit was likely generated using a large language model based on its Python code structure, educational docstrings, and hallucinated CVSS scores. This incident marks the first time GTIG has documented a threat actor using AI to develop a zero-day vulnerability. The flaw exploited is a high-level semantic logic bug, a type of issue that AI systems are particularly adept at identifying compared to traditional fuzzing methods. Google notified the software developer, allowing them to disrupt the attack before mass exploitation could occur.\u003c/p\u003e\n\n\u003cp\u003eThe report also highlights a broader trend of state-sponsored actors from China, North Korea, and Russia leveraging AI for vulnerability discovery, malware obfuscation, and social engineering. Additionally, researchers noted that threat actors are industrializing access to premium AI models through automated account creation and proxy infrastructure. Security teams can now look for AI-generated artifacts like structured docstrings and hallucinated metrics when analyzing suspicious exploit code.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGoogle Threat Intelligence Group researchers have published a report detailing the first known instance of a threat actor using artificial intelligence to develop a zero-day exploit. The vulnerability targets a popular, unnamed open-source web administration tool and is capable of bypassing two-factor authentication protections. Google researchers analyzed the Python exploit code and found strong indicators of AI generation, including abundant educational docstrings, a hallucinated CVSS score, and a highly structured Pythonic format characteristic of large language model training data. While the specific model used remains unknown, Google explicitly ruled out the involvement of Gemini. The nature of the flaw further supports the AI hypothesis, as it is a high-level semantic logic bug rather than a memory corruption issue typically found through automated fuzzing or static analysis. Google alerted the software developer, enabling timely intervention that foiled the attack prior to widespread exploitation.\u003c/p\u003e\n\n\u003cp\u003eBeyond this specific case, the report documents a growing reliance on AI across multiple threat groups. Chinese and North Korean actors, including APT27, APT45, UNC2814, UNC5673, and UNC6201, are actively using AI models for vulnerability discovery and exploit development. Russian-linked operators have been observed employing AI-generated decoy code to obfuscate malware families such as CANFAIL and LONGSTREAM. Another Russian campaign, codenamed Overload, utilized AI voice cloning to create synthetic videos of journalists for social engineering purposes. The report also references ESET’s analysis of PromptSpy, an Android backdoor that integrates Gemini APIs for autonomous device interaction. PromptSpy contains a module named GeminiAutomationAgent that uses a hardcoded prompt to assign a benign persona, successfully bypassing the AI model’s safety filters. This allows the malware to calculate user interface geometry and replay authentication credentials like lock patterns or PINs. Google warns that threat actors are increasingly industrializing their access to premium AI models by deploying automated account creation, proxy relays, and account-pooling infrastructure.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"ai-generated-zero-day-exploit-analysis\"\u003eAI-Generated Zero-Day Exploit Analysis\u003c/h1\u003e\n\n\u003cp\u003eGoogle Threat Intelligence Group (GTIG) has documented the first known zero-day exploit developed with artificial intelligence. The attack targeted an unnamed open-source web administration tool and successfully bypassed two-factor authentication protections. Researchers analyzed the Python exploit code and identified several distinct markers of large language model generation:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe script contained abundant educational docstrings and a hallucinated CVSS score.\u003c/li\u003e\n\u003cli\u003eThe code followed a highly structured, textbook Pythonic format typical of LLM training data.\u003c/li\u003e\n\u003cli\u003eThe vulnerability itself was a high-level semantic logic bug, a category of flaw that AI systems excel at identifying compared to traditional fuzzing or static analysis techniques.\u003c/li\u003e\n\u003cli\u003eGoogle researchers ruled out the use of Gemini in the exploit\u0026rsquo;s creation, though the specific LLM remains unidentified.\u003c/li\u003e\n\u003cli\u003eThe software developer was notified promptly, allowing Google and the vendor to disrupt the attack before mass exploitation could occur.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"broader-threat-actor-trends\"\u003eBroader Threat Actor Trends\u003c/h1\u003e\n\n\u003cp\u003eThe report highlights a systematic adoption of AI tools across multiple threat groups, moving beyond isolated incidents to coordinated campaigns:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eChinese and North Korean Actors:\u003c/strong\u003e Groups such as APT27, APT45, UNC2814, UNC5673, and UNC6201 are actively leveraging AI models for vulnerability discovery and exploit development.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRussian-Linked Operators:\u003c/strong\u003e Threat actors have utilized AI-generated decoy code to obfuscate malware families like CANFAIL and LONGSTREAM.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSocial Engineering Campaigns:\u003c/strong\u003e A Russian operation codenamed Overload employed AI voice cloning to fabricate videos of journalists, promoting anti-Ukraine narratives through synthetic media.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"malware-integration-and-autonomous-ai\"\u003eMalware Integration and Autonomous AI\u003c/h1\u003e\n\n\u003cp\u003eThe article references ESET’s findings on PromptSpy, an Android backdoor that represents a significant evolution in AI-integrated malware:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe malware integrates Gemini APIs to enable autonomous device interaction.\u003c/li\u003e\n\u003cli\u003eIt includes a module named GeminiAutomationAgent that relies on a hardcoded prompt to assign a benign persona, effectively bypassing the LLM’s safety features.\u003c/li\u003e\n\u003cli\u003eThis configuration allows the malware to calculate user interface bounds and replay authentication mechanisms, including lock patterns and PINs.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"industrialization-of-ai-access\"\u003eIndustrialization of AI Access\u003c/h1\u003e\n\n\u003cp\u003eGoogle researchers warn that threat actors are transitioning from ad-hoc AI usage toward industrialized infrastructure to sustain large-scale operations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOperators are deploying automated account creation systems to bypass rate limits and detection.\u003c/li\u003e\n\u003cli\u003eProxy relays and account-pooling networks are being used to maintain continuous access to premium AI models.\u003c/li\u003e\n\u003cli\u003eThis infrastructure enables threat actors to scale AI-assisted vulnerability discovery, exploit generation, and malware obfuscation across extensive campaigns.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Google Threat Intelligence Group identified a zero-day exploit targeting an unnamed open-source web administration tool that bypasses two-factor authentication.","The exploit's Python code structure, educational docstrings, and hallucinated CVSS scores indicate that a large language model was used to discover and weaponize the vulnerability.","This marks the first time GTIG has documented a threat actor using AI to develop a zero-day exploit.","Google reports that state-sponsored actors from China, North Korea, and Russia are increasingly using AI models for vulnerability discovery, malware obfuscation, and social engineering.","Threat actors are industrializing access to premium AI models through automated account creation and proxy relays to support their cyber operations."],"insights":["AI models are particularly effective at discovering high-level semantic logic bugs, offering a more efficient vulnerability discovery path than traditional fuzzing or static analysis techniques.","Security teams can identify AI-generated exploits by looking for forensic artifacts such as educational docstrings, hallucinated CVSS scores, and highly structured Pythonic formatting.","Malware operators bypass large language model safety filters by embedding hardcoded prompts that assign benign personas, enabling autonomous UI navigation and authentication replay on compromised devices.","Threat actors are transitioning from ad-hoc AI usage to industrialized AI infrastructure, leveraging automated account creation, proxy relays, and account-pooling to sustain large-scale AI-assisted operations."],"referencedReports":[],"body":"\u003cp\u003eGoogle Threat Intelligence Group has identified a zero-day exploit targeting an unnamed open-source web administration tool that bypasses two-factor authentication. Researchers determined that the exploit was likely generated using a large language model based on its Python code structure, educational docstrings, and hallucinated CVSS scores. This incident marks the first time GTIG has documented a threat actor using AI to develop a zero-day vulnerability. The flaw exploited is a high-level semantic logic bug, a type of issue that AI systems are particularly adept at identifying compared to traditional fuzzing methods. Google notified the software developer, allowing them to disrupt the attack before mass exploitation could occur.\u003c/p\u003e\n\n\u003cp\u003eThe report also highlights a broader trend of state-sponsored actors from China, North Korea, and Russia leveraging AI for vulnerability discovery, malware obfuscation, and social engineering. Additionally, researchers noted that threat actors are industrializing access to premium AI models through automated account creation and proxy infrastructure. Security teams can now look for AI-generated artifacts like structured docstrings and hallucinated metrics when analyzing suspicious exploit code.\u003c/p\u003e\n"},{"n":5,"title":"11th May – Threat Intelligence Report","source":"research.checkpoint.com","sourceColor":"#38bdf8","link":"https://research.checkpoint.com/2026/11th-may-threat-intelligence-report/","time":"12:49","priority":"MUST READ","score":95,"tldr":"Organizations must urgently patch critical vulnerabilities and monitor for AI-related exploits, phishing campaigns, and supply chain attacks as multiple major breaches and state-sponsored espionage efforts actively target enterprise and educational sectors this week.","briefOverview":"\u003cp\u003eThis threat intelligence report covers significant security incidents and vulnerabilities discovered around May 11. Major data breaches impacted several high-profile organizations, including Instructure, Zara, Mediaworks, and Škoda, exposing sensitive customer records, financial documents, and internal communications. The report also highlights emerging threats targeting artificial intelligence ecosystems, detailing critical flaws in the Cline coding agent and Anthropic’s Claude Chrome extension that enable data exfiltration and command injection. Additionally, a malicious supply chain campaign on NuGet distributed infostealers disguised as Chinese UI libraries to nearly 65,000 developers. Critical vulnerabilities were identified across widely used enterprise software, with patches released for MOVEit Automation and Ivanti Endpoint Manager Mobile, while Palo Alto Networks firewalls and the Linux kernel remain unpatched amid active exploitation. State-sponsored threat actors continue to evolve their tactics, with Iran-linked MuddyWater using ransomware as an espionage cover and China-linked UAT-8302 conducting long-term government intrusions. Phishing campaigns leveraging tax notifications and code-of-conduct emails successfully bypassed multi-factor authentication and delivered backdoors to organizations across multiple continents. Together, these findings underscore the urgent need for rapid patching, enhanced AI security controls, and vigilant monitoring of supply chain and phishing threats.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe May 11 threat intelligence report details a wide array of active breaches, vulnerabilities, and threat actor campaigns affecting global organizations. In the breach category, Instructure confirmed a major cloud environment compromise that exposed student and staff records, with ShinyHunters defacing school portals. Spanish fashion retailer Zara suffered a third-party provider breach that leaked 197,400 customer emails, order IDs, and purchase histories.\u003c/p\u003e\n\n\u003cp\u003eHungarian media company Mediaworks confirmed an intrusion after attackers leaked 8.5 terabytes of internal files, including payroll and financial documents. Czech automaker Škoda reported a security incident on its online shop that exposed customer names, contact details, and login credentials, though payment data remained secure. Artificial intelligence threats were heavily featured, with researchers uncovering a CVSS 9.7 WebSocket hijacking flaw in the Cline local Kanban server that allows arbitrary command injection.\u003c/p\u003e\n\n\u003cp\u003eA separate vulnerability in Anthropic’s Claude Chrome extension enabled other browser extensions to hijack the AI agent and access sensitive browser data. Security researchers also detailed an InstallFix campaign using fake AI installer pages to deploy multi-stage malware that disables protections and establishes persistence. The vulnerabilities section highlighted critical flaws in enterprise software, including authentication bypass and privilege escalation issues in MOVEit Automation that were patched in recent releases.\u003c/p\u003e\n\n\u003cp\u003eIvanti addressed a zero-day endpoint manager vulnerability that allows remote code execution for administrators, while Palo Alto Networks and the Dirty Frag Linux kernel flaw remain unpatched despite active exploitation. Threat intelligence reports revealed that Iran-linked MuddyWater is using Chaos ransomware as a cover for espionage, leveraging Microsoft Teams social engineering to harvest credentials without encrypting files. A Silver Fox campaign targeted organizations in India and Russia with tax-themed phishing that delivered the ABCDoor backdoor and ValleyRAT malware.\u003c/p\u003e\n\n\u003cp\u003eResearchers also exposed a multi-stage phishing campaign using fake code-of-conduct emails and adversary-in-the-middle tactics to bypass multi-factor authentication across 26 countries. Finally, a China-linked espionage group known as UAT-8302 was profiled for conducting long-term government intrusions using custom backdoors and cloud-based command channels, while a NuGet supply chain attack distributed infostealers disguised as Chinese UI libraries to nearly 65,000 downloads.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"threat-intelligence-synthesis-may-11-report\"\u003eThreat Intelligence Synthesis: May 11 Report\u003c/h3\u003e\n\n\u003cp\u003e\u003cstrong\u003eOverview\u003c/strong\u003e\nThis report catalogs a significant surge in cyber incidents spanning data breaches, AI-targeted vulnerabilities, critical software flaws, and state-sponsored espionage campaigns. The findings highlight a coordinated shift toward exploiting AI development tools, leveraging ransomware as an espionage cover, and targeting enterprise supply chains.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eMajor Data Breaches \u0026amp; Intrusions\u003c/strong\u003e\nMultiple high-profile organizations experienced severe compromises affecting customer data, financial records, and internal communications:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eInstructure:\u003c/strong\u003e Confirmed a major cloud environment breach exposing student and staff records alongside private messages. The ShinyHunters group escalated the attack by defacing hundreds of school login portals with ransom messages.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eZara (Inditex):\u003c/strong\u003e A third-party technology provider breach resulted in the exposure of 197,400 unique email addresses, order IDs, purchase histories, and customer support tickets.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMediaworks:\u003c/strong\u003e The Hungarian media company confirmed an intrusion after attackers leaked 8.5TB of internal files online, including payroll records, contracts, financial documents, and internal communications.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eŠkoda:\u003c/strong\u003e A software flaw in the Czech automaker’s online shop exposed customer names, contact details, order history, and logins. The company verified that passwords and payment card data were not compromised.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eAI \u0026amp; Software Supply Chain Threats\u003c/strong\u003e\nArtificial intelligence ecosystems and developer toolchains are increasingly targeted through critical vulnerabilities and supply chain attacks:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCline WebSocket Hijacking:\u003c/strong\u003e A CVSS 9.7 vulnerability in the Cline local Kanban server allows any visited website to exfiltrate workspace data and inject arbitrary commands into the AI agent. The flaw was patched in version 0.1.66.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eClaude Chrome Extension Flaw:\u003c/strong\u003e A vulnerability in Anthropic’s Chrome extension permits other browser extensions to hijack the AI agent, trigger malicious prompts, and access sensitive browser-connected data.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInstallFix Malware Campaign:\u003c/strong\u003e Researchers detailed a campaign using fake Claude AI installer pages promoted via Google Ads. Victims execute commands that launch multi-stage malware, steal browser data, disable security protections, and establish persistence through scheduled tasks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNuGet Supply Chain Attack:\u003c/strong\u003e Five malicious packages impersonating Chinese .NET UI libraries were distributed on NuGet, recording nearly 65,000 downloads. These packages install an infostealer designed to harvest passwords, SSH keys, and cryptocurrency wallet data.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eCritical Vulnerabilities \u0026amp; Patch Status\u003c/strong\u003e\nSeveral high-severity flaws were identified across enterprise and infrastructure software, with varying patch availability:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMOVEit Automation:\u003c/strong\u003e Customers were alerted to CVE-2026-4670 (critical authentication bypass) and CVE-2026-5174 (privilege escalation). Fixes are available in versions 2025.1.5, 2025.0.9, and 2024.1.8.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIvanti Endpoint Manager Mobile:\u003c/strong\u003e CVE-2026-6973, a high-severity zero-day vulnerability, allows administrators to execute remote code. The flaw affects EPMM 12.8.0.0 and earlier, with hundreds of appliances remaining exposed online.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePalo Alto Networks PAN-OS:\u003c/strong\u003e CVE-2026-0300 is a critical buffer overflow flaw enabling unauthenticated attackers to execute code with root privileges. Active exploitation against exposed portals has been observed, and no patch is currently available.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDirty Frag Linux Kernel Flaw:\u003c/strong\u003e An unpatched privilege escalation vulnerability impacts Ubuntu, RHEL, Fedora, AlmaLinux, and CentOS Stream. By chaining IPsec and RxRPC bugs, local users can reliably gain root access, with public proof-of-concept code already released.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eAdvanced Persistent Threats \u0026amp; Espionage Campaigns\u003c/strong\u003e\nState-sponsored actors are employing sophisticated, multi-stage tactics to conduct long-term espionage and data theft:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMuddyWater (Iran):\u003c/strong\u003e Researchers linked the group to using Chaos ransomware as an espionage cover. Attackers utilized Microsoft Teams social engineering to harvest credentials, deployed remote tools, and extorted victims without encrypting files before leaking data.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSilver Fox:\u003c/strong\u003e A campaign targeting organizations in India and Russia delivered tax-themed phishing emails that distributed the ABCDoor backdoor and ValleyRAT malware. Over 1,600 socially engineered messages impacted industrial, consulting, retail, and transportation sectors.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUAT-8302 (China):\u003c/strong\u003e This espionage group conducts long-term intrusions against government agencies in South America and southeastern Europe. They utilize custom backdoors like NetDraft and CloudSorcerer, combined with OneDrive and GitHub command channels and open-source reconnaissance tools.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003ePhishing \u0026amp; Social Engineering Tactics\u003c/strong\u003e\nAdversaries are increasingly leveraging multi-stage phishing and advanced token compromise techniques to bypass traditional security controls:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA multi-stage phishing campaign operating between April 14 and 16 used fake code-of-conduct emails paired with adversary-in-the-middle (AiTM) tactics. The campaign hijacked sign-in sessions to bypass multi-factor authentication, targeting over 35,000 users across 13,000 organizations in 26 countries.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eConclusion\u003c/strong\u003e\nThe current threat landscape demands immediate attention to unpatched critical vulnerabilities, active exploitation of AI development tools, and evolving supply chain attacks. Organizations should prioritize applying available patches for MOVEit Automation and Ivanti, monitor for Dirty Frag and Palo Alto exploitation, and implement strict controls over browser extensions and AI agent environments. Continuous threat intelligence monitoring remains essential to detect state-sponsored espionage campaigns and sophisticated phishing infrastructure.\u003c/p\u003e\n","keyPoints":["Multiple organizations, including Instructure, Zara, and Škoda, experienced data breaches exposing customer records, financial documents, and login credentials.","Critical vulnerabilities were identified and patched in MOVEit Automation and Ivanti EPMM, while Palo Alto Networks and the Linux kernel remain unpatched with active exploitation in progress.","AI-related threats include a WebSocket hijacking flaw in the Cline coding agent, a Chrome extension vulnerability allowing hijacking of Anthropic's Claude, and a supply chain campaign distributing malicious NuGet packages.","State-sponsored threat actors such as Iran's MuddyWater, China-linked UAT-8302, and the Silver Fox group are actively conducting espionage, data theft, and targeted phishing campaigns across multiple sectors."],"insights":["Palo Alto Networks PAN-OS Authentication Portal is actively exploited by a critical buffer overflow that currently has no available patch.","Iranian threat actor MuddyWater is using Chaos ransomware as an espionage cover by deploying it without encrypting files to maintain stealth while harvesting credentials through Microsoft Teams social engineering.","AI development tools and browser extensions are actively being weaponized, as demonstrated by a CVSS 9.7 WebSocket hijacking in the Cline agent and a Chrome extension flaw that allows malicious extensions to hijack Anthropic’s Claude and exfiltrate sensitive browser data."],"referencedReports":[{"title":"InstallFix and Claude Code Research","url":"https://www.trendmicro.com/en_us/research/26/e/installfix-and-claude-code.html","publisher":"Trend Micro","context":"The article references researchers detailing an InstallFix campaign that uses fake AI installer pages to distribute multi-stage malware and establish persistence on compromised systems.","category":"","primary":false},{"title":"Multi-Stage Code of Conduct Phishing Campaign Analysis","url":"https://www.microsoft.com/en-us/security/blog/2026/05/04/breaking-the-code-multi-stage-code-of-conduct-phishing-campaign-leads-to-aitm-token-compromise/","publisher":"Microsoft","context":"The article references researchers unmasking a multi-stage phishing campaign that leverages fake code-of-conduct emails and adversary-in-the-middle tactics to hijack sign-in sessions and bypass multi-factor authentication.","category":"","primary":false},{"title":"UAT-8302 Espionage Group Profile","url":"https://blog.talosintelligence.com/uat-8302/","publisher":"Talos Intelligence","context":"The article references researchers profiling a China-linked espionage group conducting long-term intrusions against government agencies using custom backdoors and cloud-based command channels.","category":"","primary":false}],"body":"\u003cp\u003eThis threat intelligence report covers significant security incidents and vulnerabilities discovered around May 11. Major data breaches impacted several high-profile organizations, including Instructure, Zara, Mediaworks, and Škoda, exposing sensitive customer records, financial documents, and internal communications. The report also highlights emerging threats targeting artificial intelligence ecosystems, detailing critical flaws in the Cline coding agent and Anthropic’s Claude Chrome extension that enable data exfiltration and command injection. Additionally, a malicious supply chain campaign on NuGet distributed infostealers disguised as Chinese UI libraries to nearly 65,000 developers. Critical vulnerabilities were identified across widely used enterprise software, with patches released for MOVEit Automation and Ivanti Endpoint Manager Mobile, while Palo Alto Networks firewalls and the Linux kernel remain unpatched amid active exploitation. State-sponsored threat actors continue to evolve their tactics, with Iran-linked MuddyWater using ransomware as an espionage cover and China-linked UAT-8302 conducting long-term government intrusions. Phishing campaigns leveraging tax notifications and code-of-conduct emails successfully bypassed multi-factor authentication and delivered backdoors to organizations across multiple continents. Together, these findings underscore the urgent need for rapid patching, enhanced AI security controls, and vigilant monitoring of supply chain and phishing threats.\u003c/p\u003e\n"},{"n":6,"title":"⚡ Weekly Recap: Linux Rootkit, macOS Crypto Stealer, WebSocket Skimmers and More","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/weekly-recap-linux-rootkit-macos-crypto.html","time":"12:36","priority":"MUST READ","score":95,"tldr":"Attackers are actively exploiting critical vulnerabilities in major platforms like Ivanti and Palo Alto while leveraging supply chain compromises and advanced social engineering to steal credentials, making immediate patching and vigilant monitoring essential.","briefOverview":"\u003cp\u003eThreat actors are actively exploiting critical zero-day vulnerabilities in Ivanti Endpoint Manager Mobile and Palo Alto Networks PAN-OS firewalls to gain root access. Advanced malware campaigns are also emerging, including the peer-to-peer Quasar Linux RAT and the credential-stealing PCPJack tool that actively clears rival infections. Supply chain compromises continue to pose significant risks, with malicious installers distributed through DAEMON Tools and the JDownloader website. Attackers are increasingly leveraging legitimate Remote Monitoring and Management software like SimpleHelp and ScreenConnect to maintain persistent access without triggering traditional malware alerts. A wide array of trending CVEs affects major platforms including Linux, Apache, PostgreSQL, and Cisco, highlighting urgent patching needs. Meanwhile, AI-driven developments include OpenAI releasing a security-focused model and Mozilla using AI to identify hundreds of Firefox vulnerabilities. The week also saw notable incidents involving state-sponsored espionage groups using ransomware as a decoy, widespread credential theft via phishing, and severe password cracking capabilities using modern GPUs.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThis week’s cybersecurity landscape is defined by active exploitation of critical vulnerabilities and the continued evolution of advanced threat actor tradecraft. The primary focus is on the weaponization of CVE-2026-6973 in Ivanti EPMM and CVE-2026-0300 in Palo Alto PAN-OS, both allowing unauthorized code execution. In the malware space, the new Quasar Linux RAT introduces peer-to-peer mesh networking and kernel-level rootkits to evade detection, while PCPJack systematically clears TeamPCP infections to deploy its own cloud credential stealers. Espionage groups like MuddyWater are using Chaos ransomware as a decoy to mask data exfiltration, and supply chain attacks have compromised DAEMON Tools and JDownloader installers across multiple countries. Defenders are also tracking the abuse of legitimate RMM tools like SimpleHelp and ScreenConnect, as well as WebSocket backdoors injecting credit card skimmers into compromised websites. Social engineering continues to dominate, with ClickFix attacks evolving to use native Windows utilities and AppleScript to deliver stealers like Vidar and NotnullOSX. A massive list of trending CVEs impacts infrastructure and software including Linux, Apache, PostgreSQL, Cisco, Android, Chrome, and Next.js, requiring immediate patching. Beyond technical vulnerabilities, the article highlights broader industry shifts such as India pushing for sovereign AI hosting, OpenAI’s limited release of GPT-5.5-Cyber, and Mozilla’s use of AI models to identify 423 Firefox flaws. Operational security remains a challenge, as evidenced by the FIRESTARTER backdoor surviving Cisco reboots and the ShinyHunters group exfiltrating 3.65TB of data from Instructure’s Canvas LMS. The week concludes with warnings about the rapid cracking of MD5 hashes using modern GPUs and the ongoing use of Vercel for scalable phishing campaigns.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"threat-of-the-week\"\u003eThreat of the Week\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eIvanti EPMM \u0026amp; Palo Alto PAN-OS Exploitation:\u003c/strong\u003e Attackers are actively weaponizing CVE-2026-6973 (Ivanti Endpoint Manager Mobile) and CVE-2026-0300 (Palo Alto PAN-OS). Both vulnerabilities allow authenticated or unauthenticated attackers to execute code with root privileges on enterprise systems. Censys detected approximately 263,000 internet-exposed PAN-OS hosts, with patches expected in mid-May 2026.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"top-news-malware-campaigns\"\u003eTop News \u0026amp; Malware Campaigns\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eQuasar Linux RAT (QLNX):\u003c/strong\u003e A new modular Linux remote access trojan utilizes peer-to-peer mesh networking to create interconnected infection networks. It combines kernel-level rootkits, PAM backdoors, and process masquerading to maintain persistent access and harvest credentials.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePCPJack Credential Stealer:\u003c/strong\u003e This campaign systematically removes TeamPCP artifacts to deploy its own malware. It propagates laterally across cloud infrastructure and uses Common Crawl parquet files for target discovery, suggesting possible affiliation with or rivalry to the original TeamPCP group.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMuddyWater Espionage Decoy:\u003c/strong\u003e An Iranian state-sponsored group disguised its operations as a Chaos ransomware attack. While it harvested credentials and exfiltrated data, no actual encryption malware was deployed, indicating the ransomware claim was a deliberate cover for espionage.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDAEMON Tools Supply Chain Attack:\u003c/strong\u003e Compromised installers affected users in over 100 countries. Most victims received a data miner, while a smaller subset targeted at government and retail organizations received the QUIC RAT implant.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRMM Tool Abuse:\u003c/strong\u003e Attackers are leveraging legitimate Remote Monitoring and Management software like SimpleHelp and ScreenConnect to maintain persistent access without deploying traditional malware, bypassing security controls through trusted enterprise tools.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"trending-cves-vulnerabilities\"\u003eTrending CVEs \u0026amp; Vulnerabilities\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe article highlights a dense list of critical vulnerabilities requiring immediate patching across multiple platforms. Key targets include Linux Kernel (CVE-2026-43284), Apache HTTP Server (CVE-2026-23918), PostgreSQL (CVE-2026-2005), Cisco Network Controllers (CVE-2026-20188), Google Chrome (CVE-2026-7896), Android (CVE-2026-0073), Microsoft Copilot (CVE-2026-26129), and Next.js (CVE-2026-23864). The rapid exploitation of these flaws underscores the shrinking gap between patch releases and real-world weaponization.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"social-engineering-phishing-evolution\"\u003eSocial Engineering \u0026amp; Phishing Evolution\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eClickFix Campaigns:\u003c/strong\u003e This social engineering tactic continues to evolve by instructing users to run native Windows utilities (cmdkey, regsvr32) or AppleScript commands to fetch and execute payloads. It is currently delivering stealers like Vidar, NotnullOSX, and AMOS across Windows and macOS.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVercel \u0026amp; GitHub.io Phishing:\u003c/strong\u003e Threat actors are heavily abusing Vercel and GitHub Pages to host scalable, easily redeployable phishing sites impersonating major brands and Microsoft services.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eConsentFix v3:\u003c/strong\u003e A new toolkit automates Microsoft account hijacking by combining ClickFix-style social engineering with OAuth consent phishing. It uses Cloudflare Workers, ZoomInfo for targeting, and Pipedream for exfiltration.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eShinyHunters \u0026amp; Instructure Breach:\u003c/strong\u003e The group targeted Instructure’s Canvas LMS, defacing portals for 330 colleges and claiming 3.65TB of exfiltrated data. They exploited a vulnerability in the Free for Teacher environment and threatened to leak student records.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"ai-industry-developments\"\u003eAI \u0026amp; Industry Developments\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMozilla AI Bug Hunting:\u003c/strong\u003e Mozilla used AI models, including Anthropic’s Mythos, to identify and patch 423 Firefox vulnerabilities in April 2026, including a 20-year-old use-after-free flaw.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOpenAI GPT-5.5-Cyber:\u003c/strong\u003e OpenAI released a limited preview of a security-focused model variant trained to be more permissive on cyber-related tasks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePassword Cracking Realities:\u003c/strong\u003e Analysis of 231 million dark web passwords shows 60% of MD5 hashes can be cracked in under an hour, with 48% crackable in under a minute using modern GPUs like the RTX 5090.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSovereign AI \u0026amp; Policy:\u003c/strong\u003e India is pushing for domestic hosting of Anthropic’s Claude models due to national security concerns, while Google expanded Play Policy Insights in Android Studio to catch security threats and support post-quantum cryptography.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"tools-resources\"\u003eTools \u0026amp; Resources\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAiSOC:\u003c/strong\u003e An open-source, self-hostable AI-powered SOC that maps alerts to MITRE ATT\u0026amp;CK and supports purple teaming.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWatcher:\u003c/strong\u003e A Django and React-based platform using AI to monitor threat data, track suspicious domains, and follow official cybersecurity news.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"conclusion\"\u003eConclusion\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe week’s threats reflect a landscape held together by reactive defenses and outdated security practices. Attackers continue to exploit trusted software, abuse legitimate tools, and leverage social engineering with minimal effort. Defenders face an ongoing challenge of patching critical CVEs, monitoring for supply chain compromises, and adapting to rapidly evolving malware and phishing tradecraft.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Attackers are actively exploiting critical vulnerabilities in Ivanti Endpoint Manager Mobile and Palo Alto Networks PAN-OS firewalls to execute code with root privileges.","The newly discovered Quasar Linux RAT utilizes peer-to-peer mesh networking and kernel-level rootkits to maintain persistent access and evade detection on compromised systems.","Threat actors are increasingly abusing legitimate Remote Monitoring and Management tools like SimpleHelp and ScreenConnect to establish persistent control without deploying traditional malware.","Supply chain compromises affecting software such as DAEMON Tools and JDownloader are being leveraged to distribute malicious installers and implants across multiple countries."],"insights":["The Cline Kanban server's WebSocket endpoint lacks origin validation, allowing any website a developer visits to silently exfiltrate workspace data and inject commands into their AI agent.","MuddyWater is using Chaos ransomware as a deliberate decoy to mask espionage activities, complicating attribution by adding victims to public leak sites without deploying actual encryption malware.","The FIRESTARTER backdoor on Cisco ASA devices achieves persistent survival across reboots and firmware updates by hooking the LINA process and triggering its persistence routine specifically on Linux runlevel 6.","Threat actors are evolving ClickFix attacks by instructing users to run Terminal commands that leverage native Windows utilities like cmdkey and regsvr32 to dynamically fetch and execute payloads, eliminating the need for manual DMG installations.","Modern GPUs like the RTX 5090 can crack nearly half of all MD5 password hashes in under a minute, making legacy hash algorithms critically insecure for current threat landscapes."],"referencedReports":[{"title":"Cifas Workplace Fraud Trends 2026 Report","url":"https://www.cifas.org.uk/newsroom/workplace-fraud-trends-2026","publisher":"Cifas","context":"Referenced as a new report finding that 13% of employees have sold or know someone who sold company login details.","category":"","primary":false},{"title":"Anthropic Claude AI Propaganda Audit","url":"https://www.newsguardtech.com/special-reports/anthropic-ai-chatbot-claude-russia-iran-propaganda/","publisher":"NewsGuard","context":"Cited as an audit revealing that Claude repeated false claims from pro-Kremlin and pro-Iran media sources at increased rates.","category":"","primary":false},{"title":"WhatsApp Security Advisory 2026","url":"https://www.whatsapp.com/security/advisories/2026/","publisher":"Meta/WhatsApp","context":"Linked as the official advisory detailing critical vulnerabilities affecting Meta WhatsApp.","category":"","primary":false},{"title":"Palo Alto Networks Unit 42 Threat Intel","url":"https://github.com/PaloAltoNetworks/Unit42-timely-threat-intel/blob/main/2026-05-01-WebSocket-Backdoor-Campaign-Injecting-Credit-Card-Skimmers.txt","publisher":"Palo Alto Networks Unit 42","context":"Referenced as a technical analysis detailing how obfuscated WebSocket backdoors are used to inject credit card skimmers into compromised websites.","category":"","primary":false},{"title":"Kaspersky Password Hacking Research","url":"https://www.kaspersky.com/blog/passwords-hacking-research-2026/55743/","publisher":"Kaspersky","context":"Cited as a research analysis showing that 60% of MD5 password hashes from dark web leaks can be cracked in under an hour using modern GPUs.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors are actively exploiting critical zero-day vulnerabilities in Ivanti Endpoint Manager Mobile and Palo Alto Networks PAN-OS firewalls to gain root access. Advanced malware campaigns are also emerging, including the peer-to-peer Quasar Linux RAT and the credential-stealing PCPJack tool that actively clears rival infections. Supply chain compromises continue to pose significant risks, with malicious installers distributed through DAEMON Tools and the JDownloader website. Attackers are increasingly leveraging legitimate Remote Monitoring and Management software like SimpleHelp and ScreenConnect to maintain persistent access without triggering traditional malware alerts. A wide array of trending CVEs affects major platforms including Linux, Apache, PostgreSQL, and Cisco, highlighting urgent patching needs. Meanwhile, AI-driven developments include OpenAI releasing a security-focused model and Mozilla using AI to identify hundreds of Firefox vulnerabilities. The week also saw notable incidents involving state-sponsored espionage groups using ransomware as a decoy, widespread credential theft via phishing, and severe password cracking capabilities using modern GPUs.\u003c/p\u003e\n"},{"n":2,"title":"TrickMo Android banker adopts TON blockchain for covert comms","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/trickmo-android-banker-adopts-ton-blockchain-for-covert-comms/","time":"09:03","priority":"SHOULD READ","score":88,"tldr":"The TrickMo Android banking malware now uses the TON blockchain for covert command-and-control communications, leveraging encrypted overlay networks to hide its infrastructure and evade traditional domain takedowns.","briefOverview":"\u003cp\u003eThe TrickMo Android banking malware has evolved with a new variant that leverages the TON blockchain for covert command-and-control communications. Disguised as popular apps like TikTok, this malware primarily targets banking and cryptocurrency wallets across France, Italy, and Austria. Instead of relying on traditional domain-based servers, the threat actors use encrypted TON overlay networks and local proxies to mask their infrastructure. This approach effectively bypasses standard domain takedown efforts and makes network traffic indistinguishable from legitimate applications.\u003c/p\u003e\n\n\u003cp\u003eThe malware operates using a modular two-stage architecture and executes a wide range of offensive actions, including phishing overlays, keylogging, screen recording, and SMS interception. Security researchers also note the addition of new network commands like SSH tunneling and SOCKS5 proxy support, expanding its remote access capabilities. Users are advised to stick to official app stores, limit installed applications, and maintain active Play Protect settings to mitigate these threats.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe TrickMo Android banking malware continues to evolve, with researchers from ThreatFabric identifying a new variant dubbed Trickmo.C since January 2024. Originally discovered in September 2019, the malware has maintained active development and recently expanded its operational reach across Europe. The latest campaigns target users in France, Italy, and Austria by disguising the malicious APK as legitimate TikTok or streaming applications.\u003c/p\u003e\n\n\u003cp\u003eA major architectural shift in this variant is the adoption of the TON blockchain for stealthy command-and-control communications. Rather than using publicly exposed internet servers, the malware routes traffic through an embedded local TON proxy and utilizes .ADNL addresses. This decentralized approach hides the operator\u0026rsquo;s IP addresses and ports behind 256-bit identifiers, rendering traditional domain takedowns ineffective. Network traffic analysis at the edge only reveals encrypted TON flows that blend in with other legitimate applications.\u003c/p\u003e\n\n\u003cp\u003eThe malware employs a two-stage modular design consisting of a host APK loader and a runtime-downloaded offensive module. Once active, it performs extensive data theft and surveillance, including phishing overlays, keylogging, live screen streaming, SMS interception, and OTP suppression. Additional capabilities involve clipboard modification, notification filtering, and automated screenshot capturing. ThreatFabric\u0026rsquo;s analysis reveals that the new variant introduces advanced network commands such as curl, ping, traceroute, and SSH tunneling. It also supports remote and local port forwarding alongside authenticated SOCKS5 proxy functionality.\u003c/p\u003e\n\n\u003cp\u003eWhile the Pine runtime hooking framework and extensive NFC permissions have been declared, researchers found no active hooks or NFC operations at this time. Previous assessments by Zimperium in October 2024 documented forty distinct variants communicating through twenty-two separate command-and-control infrastructures. To defend against these threats, Android users should exclusively download software from Google Play, minimize installed applications, and ensure Play Protect remains enabled.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"article-overview-and-discovery\"\u003eArticle Overview and Discovery\u003c/h3\u003e\n\n\u003cp\u003eThe TrickMo Android banking malware has introduced a significant operational update tracked by ThreatFabric as Trickmo.C. Researchers have been monitoring this variant since January 2024, noting a shift in its distribution and communication methods. Originally identified in September 2019, the malware has remained in continuous development. Recent campaigns focus on users across France, Italy, and Austria. The malicious applications are carefully disguised as popular TikTok or streaming apps to bypass user suspicion. Prior analysis by Zimperium in October 2024 documented forty distinct variants distributed through sixteen droppers, communicating with twenty-two separate command-and-control infrastructures.\u003c/p\u003e\n\n\u003ch3 id=\"command-and-control-infrastructure\"\u003eCommand-and-Control Infrastructure\u003c/h3\u003e\n\n\u003cp\u003eThe most notable technical advancement in this variant is the integration of the TON blockchain for covert communications. Instead of relying on traditional domain-based servers, the malware utilizes .ADNL addresses routed through an embedded local TON proxy running directly on the infected device. This decentralized peer-to-peer network masks the operator\u0026rsquo;s IP addresses and communication ports behind 256-bit identifiers. Consequently, traditional domain takedown strategies are largely ineffective against this infrastructure. Network traffic analysis at the edge only reveals encrypted TON flows, which are completely indistinguishable from legitimate TON-enabled applications.\u003c/p\u003e\n\n\u003ch3 id=\"operational-architecture-and-capabilities\"\u003eOperational Architecture and Capabilities\u003c/h3\u003e\n\n\u003cp\u003eTrickMo operates using a modular, two-stage design. The initial host APK functions as a loader and persistence layer, while a runtime-downloaded APK module implements the offensive functionality. Once deployed, the malware executes a comprehensive suite of surveillance and data theft operations. These capabilities include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePhishing overlays to capture banking credentials\u003c/li\u003e\n\u003cli\u003eKeylogging and live screen streaming\u003c/li\u003e\n\u003cli\u003eSMS interception and OTP notification suppression\u003c/li\u003e\n\u003cli\u003eClipboard modification and notification filtering\u003c/li\u003e\n\u003cli\u003eAutomated screenshot capturing\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"new-commands-and-frameworks\"\u003eNew Commands and Frameworks\u003c/h3\u003e\n\n\u003cp\u003eThreatFabric researchers have identified several new commands and capabilities added to the current variant. These additions expand the malware\u0026rsquo;s network reconnaissance and remote access potential:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNetwork tools: curl, dnsLookup, ping, telnet, and traceroute\u003c/li\u003e\n\u003cli\u003eTunneling and proxying: SSH tunneling, remote port forwarding, local port forwarding, and authenticated SOCKS5 proxy support\u003c/li\u003e\n\u003cli\u003eFrameworks and permissions: The Pine runtime hooking framework is present but currently inactive due to a lack of installed hooks. Additionally, the malware declares extensive NFC permissions and reports NFC capabilities in telemetry, though no active NFC functionality has been observed.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"mitigation-recommendations\"\u003eMitigation Recommendations\u003c/h3\u003e\n\n\u003cp\u003eThe article outlines specific defensive measures for Android users to reduce exposure to TrickMo and similar threats. Users are advised to exclusively download software from the official Google Play store. It is also recommended to limit the total number of installed applications on devices. Security best practices include using applications only from reputable publishers and ensuring that Play Protect remains active at all times.\u003c/p\u003e\n","keyPoints":["The TrickMo Android banking malware now uses the TON blockchain for covert command-and-control communications to hide its infrastructure from traditional domain takedowns.","This variant disguises itself as TikTok or streaming applications to target banking and cryptocurrency wallets in France, Italy, and Austria.","The malware features a modular two-stage design and implements extensive capabilities including phishing overlays, keylogging, screen recording, and SMS interception.","Threat researchers have identified new operational commands in the latest variant, such as SSH tunneling, remote port forwarding, and authenticated SOCKS5 proxy support.","Android users are advised to download software exclusively from Google Play, limit installed applications, and ensure Play Protect remains active."],"insights":["TrickMo leverages TON's decentralized .ADNL addresses and local proxy routing to mask command-and-control traffic as indistinguishable from legitimate encrypted overlay network flows, rendering traditional domain takedowns ineffective.","The malware has expanded beyond banking theft to include network reconnaissance commands like ping and traceroute, alongside SSH tunneling and SOCKS5 proxy support, indicating a pivot toward broader remote access capabilities.","While the malware declares extensive NFC permissions and reports NFC capabilities in telemetry, researchers detected no active NFC functionality, suggesting undeveloped hardware-based attack vectors."],"referencedReports":[{"title":"TrickMo Unmasked: The Hidden DEX Module and the Variant that Replaced It","url":"https://www.threatfabric.com/blogs/trickmo-unmasked-the-hidden-dex-module-and-the-variant-that-replaced-it","publisher":"ThreatFabric","context":"The article cites this ThreatFabric research to explain how the malware's TON-based command-and-control infrastructure evades traditional domain takedowns by routing traffic through encrypted overlay networks.","category":"","primary":false}],"body":"\u003cp\u003eThe TrickMo Android banking malware has evolved with a new variant that leverages the TON blockchain for covert command-and-control communications. Disguised as popular apps like TikTok, this malware primarily targets banking and cryptocurrency wallets across France, Italy, and Austria. Instead of relying on traditional domain-based servers, the threat actors use encrypted TON overlay networks and local proxies to mask their infrastructure. This approach effectively bypasses standard domain takedown efforts and makes network traffic indistinguishable from legitimate applications.\u003c/p\u003e\n\n\u003cp\u003eThe malware operates using a modular two-stage architecture and executes a wide range of offensive actions, including phishing overlays, keylogging, screen recording, and SMS interception. Security researchers also note the addition of new network commands like SSH tunneling and SOCKS5 proxy support, expanding its remote access capabilities. Users are advised to stick to official app stores, limit installed applications, and maintain active Play Protect settings to mitigate these threats.\u003c/p\u003e\n"},{"n":8,"title":"Fake OpenAI Privacy Filter Repo Hits #1 on Hugging Face, Draws 244K Downloads","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/fake-openai-privacy-filter-repo-hits-1.html","time":"07:05","priority":"SHOULD READ","score":88,"tldr":"A malicious Hugging Face repository impersonating OpenAI's Privacy Filter model tricked users into downloading over 240,000 copies, deploying a sophisticated information stealer that harvested sensitive data and was linked to the Chinese Silver Fox hacking group.","briefOverview":"\u003cp\u003eA malicious Hugging Face repository impersonating OpenAI’s Privacy Filter model reached the platform\u0026rsquo;s number one trending position, accumulating approximately 244,000 downloads before being disabled.\u003c/p\u003e\n\n\u003cp\u003eThe project copied the legitimate model’s description and model card verbatim to deceive users into downloading a Rust-based information stealer. Upon execution, a Python loader script disabled SSL verification and decoded a Base64-encoded URL hosted on JSON Keeper to trigger a PowerShell command.\u003c/p\u003e\n\n\u003cp\u003eThis command downloaded a batch script that elevated privileges, configured antivirus exclusions, and established a one-shot scheduled task to run the final malware payload. The stealer harvested sensitive data including screenshots, cryptocurrency wallet details, browser history, and configuration files from applications like FileZilla and Discord.\u003c/p\u003e\n\n\u003cp\u003eIt employed multiple evasion techniques such as debugger detection, virtual machine checks, and the disabling of Windows AMSI and ETW. The stolen data was exfiltrated in JSON format to a remote server.\u003c/p\u003e\n\n\u003cp\u003eShared command-and-control infrastructure links this attack to a previous campaign that distributed ValleyRAT through a malicious npm package. The activity highlights a broader supply chain operation targeting open-source ecosystems by the Chinese hacking group Silver Fox.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA malicious Hugging Face repository named Open-OSS/privacy-filter successfully impersonated OpenAI’s legitimate Privacy Filter open-weight model to distribute malware.\u003c/p\u003e\n\n\u003cp\u003eThe project copied the official model card and description verbatim, allowing it to reach the number one trending spot on the platform with roughly 244,000 downloads and 667 likes within eighteen hours. Hugging Face subsequently disabled access to the repository.\u003c/p\u003e\n\n\u003cp\u003eThe malicious project instructed users to clone the code and run either a batch script or a Python loader file to configure dependencies and launch the model. Once executed, the Python script triggered malicious code that disabled SSL verification and decoded a Base64-encoded URL hosted on the JSON Keeper paste service.\u003c/p\u003e\n\n\u003cp\u003eThis URL provided a command passed to PowerShell for execution. The PowerShell command downloaded a batch script from api.eth-fastscan[.]org and launched it using cmd.exe. The batch script functioned as a second-stage downloader that elevated privileges through a User Account Control prompt, configured Microsoft Defender Antivirus exclusions, and downloaded a final binary.\u003c/p\u003e\n\n\u003cp\u003eIt also configured a scheduled task to run the executable, which waited two seconds before deleting itself to operate as a one-shot SYSTEM-context launcher. The final stage was an information stealer designed to capture screenshots, harvest data from Discord and cryptocurrency wallets, and extract system metadata and browser information.\u003c/p\u003e\n\n\u003cp\u003eThe malware actively avoided detection by checking for debuggers, virtual machines, and attempting to disable Windows AMSI and ETW. Stolen data was exfiltrated in JSON format to recargapopular[.]com.\u003c/p\u003e\n\n\u003cp\u003ePrior to being disabled, the download numbers were suspected to be artificially inflated to build trust. Analysis also uncovered six additional repositories by the user anthfu containing similar Python loaders.\u003c/p\u003e\n\n\u003cp\u003eShared infrastructure connected the attack to a previous campaign that utilized a malicious npm package to deliver ValleyRAT. The shared command-and-control server and payload delivery methods suggest a coordinated supply chain operation targeting open-source ecosystems.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview-platform-impact\"\u003eOverview \u0026amp; Platform Impact\u003c/h2\u003e\n\n\u003cp\u003eA malicious Hugging Face repository titled Open-OSS/privacy-filter impersonated OpenAI’s legitimate Privacy Filter open-weight model. The project copied the official model card and description verbatim to deceive users. It reached the number one trending position on Hugging Face, accumulating approximately 244,000 downloads and 667 likes within eighteen hours. The platform subsequently disabled access to the repository. Analysts suspect the download metrics were artificially inflated to create an illusion of trust.\u003c/p\u003e\n\n\u003ch2 id=\"initial-access-delivery-mechanism\"\u003eInitial Access \u0026amp; Delivery Mechanism\u003c/h2\u003e\n\n\u003cp\u003eThe malicious project instructed users to clone the repository and run a batch script for Windows or a Python script for Linux and macOS systems. These scripts were designed to configure dependencies and launch the model. However, the Python loader file actually fetched and executed a Rust-based information stealer on Windows machines.\u003c/p\u003e\n\n\u003ch2 id=\"multi-stage-execution-chain\"\u003eMulti-Stage Execution Chain\u003c/h2\u003e\n\n\u003cp\u003eThe infection utilizes a multi-stage delivery process:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe Python loader disables SSL verification and decodes a Base64-encoded URL hosted on JSON Keeper.\u003c/li\u003e\n\u003cli\u003eThe decoded URL provides a command passed to PowerShell for execution.\u003c/li\u003e\n\u003cli\u003ePowerShell downloads a batch script from api.eth-fastscan[.]org and runs it via cmd.exe.\u003c/li\u003e\n\u003cli\u003eThe batch script elevates privileges through a User Account Control prompt and configures Microsoft Defender Antivirus exclusions.\u003c/li\u003e\n\u003cli\u003eIt downloads a second-stage binary and creates a scheduled task to run the executable.\u003c/li\u003e\n\u003cli\u003eThe scheduled task executes the malware, waits two seconds, and then deletes itself to function as a one-shot SYSTEM-context launcher.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"malware-capabilities-evasion\"\u003eMalware Capabilities \u0026amp; Evasion\u003c/h2\u003e\n\n\u003cp\u003eThe final payload is an information stealer designed to harvest sensitive data. Its capabilities include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCapturing screenshots of the user’s desktop.\u003c/li\u003e\n\u003cli\u003eHarvesting data from Discord, cryptocurrency wallets, and browser extensions.\u003c/li\u003e\n\u003cli\u003eExtracting system metadata, FileZilla configurations, and wallet seed phrases.\u003c/li\u003e\n\u003cli\u003eDumping data from Chromium and Gecko-based web browsers.\nThe malware employs several evasion techniques to avoid behavioral detection:\u003c/li\u003e\n\u003cli\u003eChecks for the presence of debuggers and sandboxes.\u003c/li\u003e\n\u003cli\u003eVerifies it is not running inside a virtual machine.\u003c/li\u003e\n\u003cli\u003eAttempts to disable the Windows Antimalware Scan Interface and Event Tracing for Windows.\nStolen data is exfiltrated in JSON format to the domain recargapopular[.]com.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"infrastructure-cross-campaign-links\"\u003eInfrastructure \u0026amp; Cross-Campaign Links\u003c/h2\u003e\n\n\u003cp\u003eAnalysis revealed six additional repositories under the user anthfu that feature similar Python loaders to deploy the stealer. These repositories include models named Bonsai-8B-gguf, Qwen3.6-35B-A3B-APEX-GGUF, DeepSeek-V4-Pro, Qwopus-GLM-18B-Merged-GGUF, Qwen3.6-35B-A3B-Claude-4.6-Opus-Reasoning-Distilled-GGUF, and supergemma4-26b-uncensored-gguf-v2. The domain api.eth-fastscan[.]org was also used to serve a different Windows executable that beaconed to welovechinatown[.]info. This command-and-control server was previously utilized in a campaign involving a malicious npm package named trevlo. That package executed an obfuscated JavaScript loader that spawned a PowerShell command to download and run a Winos 4.0 stager binary.\u003c/p\u003e\n\n\u003ch2 id=\"attribution-ecosystem-impact\"\u003eAttribution \u0026amp; Ecosystem Impact\u003c/h2\u003e\n\n\u003cp\u003eThe attack represents a new initial access vector for ValleyRAT, a modular remote access trojan. ValleyRAT is exclusively attributed to the Chinese hacking group Silver Fox, which traditionally distributes its tools via phishing emails and search engine optimization poisoning. The shared infrastructure and delivery methods across the Hugging Face repository, the npm package, and the command-and-control servers suggest these campaigns are linked. This indicates a broader supply chain operation actively targeting open-source ecosystems to deliver persistent remote access capabilities.\u003c/p\u003e\n","keyPoints":["A malicious Hugging Face repository impersonating OpenAI's Privacy Filter model reached the #1 trending position with approximately 244,000 downloads before being disabled by the platform.","The repository contained a Python script that executed a multi-stage information stealer capable of harvesting sensitive data from Discord, cryptocurrency wallets, and web browsers.","The malware employed evasion techniques including disabling SSL verification, detecting virtual machines, and attempting to disable Windows AMSI and ETW to avoid detection.","Shared infrastructure linked the attack to a previous campaign delivering ValleyRAT, a remote access trojan attributed to the Chinese hacking group Silver Fox."],"insights":["The malware leverages JSON Keeper as a dead-drop resolver, enabling attackers to dynamically swap payloads without modifying or re-uploading the malicious repository.","The infection chain uses a self-deleting scheduled task to execute as SYSTEM, indicating a deliberate design to bypass persistence mechanisms while maximizing privilege for immediate data exfiltration.","Shared command-and-control infrastructure connects this Hugging Face supply chain attack to a prior npm-based campaign, revealing a cross-platform strategy targeting open-source ecosystems.","The malicious loader explicitly disables SSL verification and configures Microsoft Defender exclusions, making script dependency auditing and antivirus configuration monitoring critical defensive controls."],"referencedReports":[{"title":"Malware Found in Trending Hugging Face Repository: Open-OSS/Privacy-Filter","url":"https://www.hiddenlayer.com/research/malware-found-in-trending-hugging-face-repository-open-oss-privacy-filter","publisher":"HiddenLayer Research Team","context":"The article cites this report to explain how the malicious repository impersonated OpenAI's Privacy Filter and executed a loader.py file.","category":"","primary":false},{"title":"Sober Up: npm Typosquat Delivers Winos4.0 Implant via Multi-Stage PowerShell Dropper","url":"https://panther.com/blog/sober-up-npm-typosquat-delivers-winos4.0-implant-via-multi-stage-powershell-dropper","publisher":"Panther","context":"The article references this technical analysis to describe the technical execution of a previous campaign involving the trevlo npm package and Winos4.0.","category":"","primary":false}],"body":"\u003cp\u003eA malicious Hugging Face repository impersonating OpenAI’s Privacy Filter model reached the platform\u0026rsquo;s number one trending position, accumulating approximately 244,000 downloads before being disabled.\u003c/p\u003e\n\n\u003cp\u003eThe project copied the legitimate model’s description and model card verbatim to deceive users into downloading a Rust-based information stealer. Upon execution, a Python loader script disabled SSL verification and decoded a Base64-encoded URL hosted on JSON Keeper to trigger a PowerShell command.\u003c/p\u003e\n\n\u003cp\u003eThis command downloaded a batch script that elevated privileges, configured antivirus exclusions, and established a one-shot scheduled task to run the final malware payload. The stealer harvested sensitive data including screenshots, cryptocurrency wallet details, browser history, and configuration files from applications like FileZilla and Discord.\u003c/p\u003e\n\n\u003cp\u003eIt employed multiple evasion techniques such as debugger detection, virtual machine checks, and the disabling of Windows AMSI and ETW. The stolen data was exfiltrated in JSON format to a remote server.\u003c/p\u003e\n\n\u003cp\u003eShared command-and-control infrastructure links this attack to a previous campaign that distributed ValleyRAT through a malicious npm package. The activity highlights a broader supply chain operation targeting open-source ecosystems by the Chinese hacking group Silver Fox.\u003c/p\u003e\n"},{"n":7,"title":"Your Purple Team Isn't Purple — It's Just Red and Blue in the Same Room","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/your-purple-team-isnt-purple-its-just.html","time":"11:30","priority":"SHOULD READ","score":85,"tldr":"Traditional purple teaming fails because human handoffs are too slow to counter AI-driven attackers operating at machine speed. Autonomous purple teaming solves this by using AI agents to continuously automate the red and blue team validation loop, closing security gaps in real time.","briefOverview":"\u003cp\u003eTraditional purple teaming aims to continuously validate security posture by looping red and blue team activities, but it consistently fails in practice. The primary bottleneck is human friction, where handoffs between teams rely on slow manual processes like copy-pasting hashes, emailing PDFs, and waiting for change approvals. Meanwhile, AI-powered adversaries have compressed the vulnerability exploitation window to roughly 10 hours, with some attacks completing in under 73 seconds. Because standard approval processes now take longer than the exploitation window, quarterly exercises are no longer sufficient. Autonomous purple teaming addresses this gap by using AI agents to run the entire validation loop at machine speed. This approach integrates automated penetration testing, breach and attack simulation, and AI-powered mobilization to continuously test defenses and deploy fixes without manual intervention. Instead of generating static CVE lists, the system produces a continuous action queue focused only on what is actively exploitable against live controls. This shifts security validation from a calendar event to an ongoing, autonomous methodology that matches the pace of modern threats.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDefending a network at night often involves analysts manually copying hashes into SIEM queries and rewriting red team scripts for blue team use. Every human in this chain is performing their job correctly, but the workflow itself is broken. The attacker’s clock has accelerated dramatically, shrinking the mean time from CVE publication to working exploit from 56 days in 2024 to roughly 10 hours in 2026.\u003c/p\u003e\n\n\u003cp\u003eAI-assisted attackers can now compromise systems in just 73 seconds, while defenders still face multi-hour approval chains. Purple teaming was designed to close this gap by continuously iterating between red and blue teams, but it remains largely aspirational. Traditional implementations fail due to three main factors.\u003c/p\u003e\n\n\u003cp\u003eFirst, human purple teaming creates excessive friction through long meetings, detailed reports, and fragmented communication channels. Second, orchestrating multiple teams and tools results in a messy handoff chain where artifacts are repeatedly reinterpreted and delayed. Third, standard change-approval processes now exceed the exploitation window, making quarterly exercises obsolete snapshots of past battles.\u003c/p\u003e\n\n\u003cp\u003eAutonomous purple teaming resolves these issues by deploying AI agents to run the validation loop at machine speed. Red findings automatically become blue tests, and blue gaps immediately trigger red exercises without human intervention. This system requires three integrated components: automated penetration testing to identify attacker paths, breach and attack simulation to validate controls, and AI-powered mobilization to orchestrate the response.\u003c/p\u003e\n\n\u003cp\u003eSpecialized agents enrich alerts, run parallel simulations, auto-deploy low-risk fixes, and generate both executive and technical reports. The output shifts from thousands of ranked CVEs to a single continuous action queue prioritizing actual exploitable threats. This approach transforms purple teaming from a periodic exercise into a real-time operational methodology.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"the-accelerating-threat-landscape-and-defender-bottlenecks\"\u003eThe Accelerating Threat Landscape and Defender Bottlenecks\u003c/h3\u003e\n\n\u003cp\u003eDefending a network at 2 a.m. typically involves an analyst manually copying a hash from a PDF into a SIEM query while a red team script is rewritten by hand. Every individual in this chain is executing their duties correctly, yet the overall system remains fundamentally flawed. The attacker’s operational clock has nearly vanished, compressing the mean time from a CVE publication to a working exploit from 56 days in 2024 to roughly 10 hours in 2026.\u003c/p\u003e\n\n\u003cp\u003eAI-powered adversaries have leapfrogged past even this accelerated pace, now compromising systems in approximately 73 seconds. In stark contrast, the defender’s clock runs in hours, and the standard change-approval process alone often exceeds the exploitation window. This asymmetry renders traditional security validation methods obsolete.\u003c/p\u003e\n\n\u003ch3 id=\"why-traditional-purple-teaming-fails-in-practice\"\u003eWhy Traditional Purple Teaming Fails in Practice\u003c/h3\u003e\n\n\u003cp\u003ePurple teaming was conceived as a continuous iterative loop where red team findings become blue team inputs and vice versa. Despite a decade of industry promotion, it has never been successfully operationalized due to three critical barriers.\u003c/p\u003e\n\n\u003cp\u003eFirst, human-driven purple teaming introduces severe friction through lengthy meetings, exhaustive post-mortems, and fragmented communication channels. Response time is lost in transit through unread Slack messages, emailed PDFs, and manual ticket approvals.\u003c/p\u003e\n\n\u003cp\u003eSecond, orchestrating multiple teams and tools creates a disjointed handoff chain. Network teams manage firewalls, SOC analysts consume alerts, red teams run exercises, and IT operations apply patches. Each group produces artifacts that must be manually reinterpreted and passed along, resulting in a jury-rigged workflow glued together by exhausted analysts.\u003c/p\u003e\n\n\u003cp\u003eThird, the pace of AI-assisted attacks has outpaced human approval cycles. A quarterly or monthly exercise no longer functions as a validation loop; it merely captures a snapshot of a battle that has already concluded.\u003c/p\u003e\n\n\u003ch3 id=\"the-shift-to-autonomous-purple-teaming\"\u003eThe Shift to Autonomous Purp
