<script type="application/json" id="dl-articles">[{"n":1,"title":"Ex-school district employee jailed for hacks on former employer","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/ex-school-district-employee-jailed-for-hacks-on-former-employer/","time":"20:53","priority":"MAY READ","score":68,"tldr":"A former IT employee of Iowa’s Saydel Community School District was sentenced to 21 months in prison for using retained credentials to repeatedly sabotage district systems for nearly two years. The attacks disrupted classroom operations, deleted accounts, and caused nearly $60,000 in remediation costs.","briefOverview":"\u003cp\u003eA former IT employee at Iowa’s Saydel Community School District was sentenced to 21 months in prison for conducting a prolonged cyberattack against his former employer. Ezekiel Dean Potter, 34, had worked as a senior IT support specialist for the district from May 2022 through April 2023. Prosecutors said he retained access credentials after his employment ended and repeatedly targeted district systems over the next 21 months.\u003c/p\u003e\n\n\u003cp\u003eThe attacks disrupted classroom operations, deleted accounts, impaired access to educational platforms, and caused tens of thousands of dollars in remediation costs. Court documents said Potter deleted the district’s Facebook page, affected Apple School Manager access, targeted GoDaddy and other online services, and later accessed Schoology through Google administrator accounts. He was ordered to pay $59,668.81 in restitution to the district and its insurer, Travelers Casualty and Surety Company.\u003c/p\u003e\n\n\u003cp\u003eFederal investigators traced some activity to IP addresses associated with Potter’s other employers, including Casey’s Store Support Center and The Printer Inc. After Potter left The Printer Inc., a coworker gave investigators a USB drive that allegedly contained spreadsheets with usernames and passwords for Saydel accounts and services. Potter pleaded guilty in January 2026 to computer fraud charges under the Computer Fraud and Abuse Act without a plea agreement.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eEzekiel Dean Potter, a former senior IT support specialist for the Saydel Community School District in Des Moines, Iowa, was sentenced to 21 months in prison for cyberattacks against the district after his employment ended. Potter worked for the district from May 2022 through April 2023. Prosecutors said he retained access credentials and repeatedly targeted district systems for 21 months.\u003c/p\u003e\n\n\u003cp\u003eThe U.S. government described Potter in a sentencing memorandum as “a plague on the Saydel Community School District.” Prosecutors said he deleted the district’s Facebook page, removed employee access to educational platforms and accounts, and repeatedly attempted to reset employee usernames and passwords for various platforms and accounts. The attacks disrupted school operations, impaired the district’s ability to teach students, and generated tens of thousands of dollars in remediation costs.\u003c/p\u003e\n\n\u003cp\u003eCourt documents said the activity began shortly after Potter left the district, when Saydel’s Facebook account was deleted. Prosecutors said Potter later targeted the district’s Apple School Manager account, deleting user accounts, passwords, phone numbers, billing information, and device management server data. This prevented school employees from accessing Apple School Manager and disabled management of district MacBooks and iPads for about a week while staff worked with Apple to recover access.\u003c/p\u003e\n\n\u003cp\u003eThe district also saw unauthorized access attempts against its GoDaddy account and other online services. In January 2025, Potter accessed the district’s Schoology learning management system through a Google administrator account and deleted an IT employee’s account, disrupting teacher access and affecting classes for approximately two hours. A week later, prosecutors said he accessed another administrator account and deleted nine Gmail accounts belonging to current and former district employees, including the IT director and superintendent.\u003c/p\u003e\n\n\u003cp\u003eCourt filings said Potter later switched to using a VPN service after receiving Google security alerts about unauthorized account access. Federal investigators traced some activity to IP addresses linked to Potter’s other employers, including Casey’s Store Support Center and The Printer Inc. After Potter left The Printer Inc. in January 2025, a former coworker turned over a USB drive from Potter’s desk that allegedly contained spreadsheets with usernames and passwords for Saydel district accounts and services.\u003c/p\u003e\n\n\u003cp\u003ePotter pleaded guilty in January 2026 to computer fraud charges under the Computer Fraud and Abuse Act without entering into a plea agreement. On June 11, he was sentenced to 21 months in prison followed by three years of supervised release. His supervised release includes restrictions and monitoring related to employment, finances, and computer systems, and he must pay $59,668.81 in restitution to Saydel Community School District and Travelers Casualty and Surety Company.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA former IT employee of the Saydel Community School District in Des Moines, Iowa, was sentenced to 21 months in prison for conducting a prolonged cyberattack against the district after leaving his job. The defendant, Ezekiel Dean Potter, 34, previously worked as a senior IT support specialist for the district from May 2022 through April 2023.\u003c/p\u003e\n\n\u003cp\u003eAccording to prosecutors, Potter retained access credentials after his employment ended and repeatedly targeted the district’s systems over the next 21 months. The attacks disrupted classroom operations, deleted accounts, impaired access to educational systems, and caused tens of thousands of dollars in remediation costs.\u003c/p\u003e\n\n\u003ch2 id=\"defendant-and-employment-context\"\u003eDefendant and Employment Context\u003c/h2\u003e\n\n\u003cp\u003ePotter worked for the Saydel Community School District as a senior IT support specialist. His employment lasted from May 2022 through April 2023.\u003c/p\u003e\n\n\u003cp\u003eAfter he left the district, prosecutors said he continued to have access credentials and used them to target district systems. The U.S. government described his conduct in a sentencing memorandum as lasting “over a year and a half.”\u003c/p\u003e\n\n\u003ch2 id=\"prosecutors-description-of-the-conduct\"\u003eProsecutors’ Description of the Conduct\u003c/h2\u003e\n\n\u003cp\u003eThe government said Potter deleted the district’s Facebook page, stripped employees of access to educational platforms and accounts, and repeatedly tried to reset usernames and passwords for other platforms and accounts.\u003c/p\u003e\n\n\u003cp\u003eProsecutors said the activity caused widespread disruption to the school district. They said the attacks impaired the district’s ability to teach students and resulted in tens of thousands of dollars in remediation costs.\u003c/p\u003e\n\n\u003ch2 id=\"affected-systems-and-services\"\u003eAffected Systems and Services\u003c/h2\u003e\n\n\u003cp\u003eCourt documents described multiple district systems and online services affected by the activity.\u003c/p\u003e\n\n\u003cp\u003eThe affected or targeted services included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe Saydel Community School District Facebook account.\u003c/li\u003e\n\u003cli\u003eApple School Manager.\u003c/li\u003e\n\u003cli\u003eDistrict MacBooks and iPads managed through Apple School Manager.\u003c/li\u003e\n\u003cli\u003eGoDaddy and other online services.\u003c/li\u003e\n\u003cli\u003eSchoology.\u003c/li\u003e\n\u003cli\u003eGoogle administrator accounts.\u003c/li\u003e\n\u003cli\u003eGmail accounts belonging to current and former district employees.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"apple-school-manager-disruption\"\u003eApple School Manager Disruption\u003c/h2\u003e\n\n\u003cp\u003eProsecutors said Potter targeted the district’s Apple School Manager account after his employment ended. He allegedly deleted user accounts, passwords, phone numbers, billing information, and device management server data.\u003c/p\u003e\n\n\u003cp\u003eThe article states that this prevented school employees from accessing Apple School Manager. It also disabled management of district MacBooks and iPads for roughly a week while staff worked with Apple to recover access.\u003c/p\u003e\n\n\u003ch2 id=\"schoology-google-administrator-and-gmail-activity\"\u003eSchoology, Google Administrator, and Gmail Activity\u003c/h2\u003e\n\n\u003cp\u003eCourt documents said that in January 2025, Potter accessed the district’s Schoology learning management system through a Google administrator account. He deleted an IT employee’s account, which disrupted teacher access to the platform and affected classes for approximately two hours.\u003c/p\u003e\n\n\u003cp\u003eA week later, prosecutors said Potter accessed another administrator account. He then deleted nine Gmail accounts belonging to current and former district employees, including the district’s IT director and superintendent.\u003c/p\u003e\n\n\u003ch2 id=\"attribution-and-investigative-details\"\u003eAttribution and Investigative Details\u003c/h2\u003e\n\n\u003cp\u003eCourt filings said Potter later switched to using a VPN service after receiving Google security alerts that warned of unauthorized account access.\u003c/p\u003e\n\n\u003cp\u003eFederal investigators eventually traced some of the activity to IP addresses associated with Potter’s other employers. Those employers included Casey’s Store Support Center and The Printer Inc.\u003c/p\u003e\n\n\u003cp\u003eAfter Potter left The Printer Inc. in January 2025, prosecutors said he asked a former coworker to retrieve and wipe a USB drive from his desk. The coworker instead turned the USB drive over to investigators.\u003c/p\u003e\n\n\u003cp\u003eInvestigators allegedly found spreadsheets on the USB drive containing usernames and passwords for Saydel School District accounts and services.\u003c/p\u003e\n\n\u003ch2 id=\"legal-outcome\"\u003eLegal Outcome\u003c/h2\u003e\n\n\u003cp\u003ePotter pleaded guilty in January 2026 to computer fraud charges under the Computer Fraud and Abuse Act. He did not enter into a plea agreement.\u003c/p\u003e\n\n\u003cp\u003eOn June 11, Potter was sentenced to 21 months in prison. He was also sentenced to three years of supervised release.\u003c/p\u003e\n\n\u003ch2 id=\"supervised-release-and-restitution\"\u003eSupervised Release and Restitution\u003c/h2\u003e\n\n\u003cp\u003eAs part of his supervised release, Potter will be subject to restrictions and monitoring related to employment, finances, and computer systems. The conditions include searches of electronic devices upon reasonable suspicion.\u003c/p\u003e\n\n\u003cp\u003ePotter must also pay $59,668.81 in restitution. The restitution is owed to the Saydel Community School District and its insurer, Travelers Casualty and Surety Company, for remediation costs related to the attacks.\u003c/p\u003e\n\n\u003ch2 id=\"impact-on-the-school-district\"\u003eImpact on the School District\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the attacks disrupted classroom operations and impaired the district’s ability to teach students. The disruptions included loss of access to educational platforms, deletion of accounts, and temporary inability to manage district Apple devices.\u003c/p\u003e\n\n\u003cp\u003eThe financial impact described in the article was $59,668.81 in restitution for remediation costs. The affected parties named in connection with restitution are the Saydel Community School District and Travelers Casualty and Surety Company.\u003c/p\u003e\n","keyPoints":["Former Saydel Community School District senior IT support specialist Ezekiel Dean Potter was sentenced to 21 months in prison for conducting cyberattacks against the district after his employment ended.","Prosecutors said Potter retained access credentials and targeted the district’s systems over 21 months, including deleting its Facebook page and disrupting access to educational platforms and accounts.","Court documents state that Potter deleted data from the district’s Apple School Manager account, preventing staff from accessing the platform and disabling management of district MacBooks and iPads for roughly a week.","In January 2025, Potter accessed the district’s Schoology learning management system through Google administrator accounts and deleted employee Gmail accounts, disrupting teacher access and district operations.","Potter was ordered to serve three years of supervised release and pay $59,668.81 in restitution to the Saydel Community School District and its insurer for remediation costs."],"insights":["The incident shows that offboarding failures can have long-lasting impact, as Potter allegedly retained credentials and used them to access district systems for 21 months after leaving.","Third-party and cloud administration consoles were central points of disruption, with Apple School Manager, Google administrator accounts, Schoology, GoDaddy, Gmail, and Facebook all involved in the attacks.","Google security alerts were significant enough that Potter later switched to a VPN service, indicating that account security notifications contributed to investigative pressure even though they did not immediately stop the activity.","Investigators linked activity to IP addresses associated with Potter’s later employers, showing that workplace network logs outside the victim organization contributed to attribution.","A USB drive found at Potter’s former workplace allegedly contained spreadsheets of Saydel account usernames and passwords, highlighting the risk of administrators keeping credential inventories outside approved systems."],"referencedReports":[],"body":"\u003cp\u003eA former IT employee at Iowa’s Saydel Community School District was sentenced to 21 months in prison for conducting a prolonged cyberattack against his former employer. Ezekiel Dean Potter, 34, had worked as a senior IT support specialist for the district from May 2022 through April 2023. Prosecutors said he retained access credentials after his employment ended and repeatedly targeted district systems over the next 21 months.\u003c/p\u003e\n\n\u003cp\u003eThe attacks disrupted classroom operations, deleted accounts, impaired access to educational platforms, and caused tens of thousands of dollars in remediation costs. Court documents said Potter deleted the district’s Facebook page, affected Apple School Manager access, targeted GoDaddy and other online services, and later accessed Schoology through Google administrator accounts. He was ordered to pay $59,668.81 in restitution to the district and its insurer, Travelers Casualty and Surety Company.\u003c/p\u003e\n\n\u003cp\u003eFederal investigators traced some activity to IP addresses associated with Potter’s other employers, including Casey’s Store Support Center and The Printer Inc. After Potter left The Printer Inc., a coworker gave investigators a USB drive that allegedly contained spreadsheets with usernames and passwords for Saydel accounts and services. Potter pleaded guilty in January 2026 to computer fraud charges under the Computer Fraud and Abuse Act without a plea agreement.\u003c/p\u003e\n"}]</script>
