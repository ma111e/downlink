nalists, warning them not to report on the leaked material. Mediaworks stated that the illicit acquisition of data is a crime, and that any subsequent use, processing, transmission, or disclosure of the information is also considered criminal. Despite these warnings, independent media outlets proceeded with their reporting. The outlet Media1 faced legal threats from Mediaworks and was asked to remove the article. Media1 refused the censorship attempt, arguing that the request is unfounded and that the information is of significant public interest. This stance is particularly relevant given Hungary\u0026rsquo;s political alignment under Prime Minister Viktor Orbán and the country\u0026rsquo;s contentious stance toward Russia during the war in Ukraine.\u003c/p\u003e\n\n\u003ch3 id=\"threat-actor-profile\"\u003eThreat Actor Profile\u003c/h3\u003e\n\n\u003cp\u003eWorld Leaks is a data extortion group that emerged in early 2025. It operates as a rebrand of the Hunters International ransomware operation. Unlike traditional ransomware gangs that focus on system encryption, World Leaks specializes in data theft and extortion. The group threatens to publish sensitive information rather than locking victims out of their systems. While it has primarily targeted organizations across the United States, Europe, India, and Canada, the Mediaworks breach marks its first known operation in Hungary.\u003c/p\u003e\n\n\u003ch3 id=\"historical-context-and-verification\"\u003eHistorical Context and Verification\u003c/h3\u003e\n\n\u003cp\u003eMediaworks has a documented history of cyber incidents. In 2022, the hacktivist collective Anonymous defaced several Hungarian government-affiliated news sites, including Mediaworks outlets. That attack was motivated by accusations that the firm serves as a propaganda tool for Orbán’s pro-Kremlin policies. The article notes that Orbán recently lost the national election to the opposition party. Recorded Future News reported that it could not independently verify the authenticity of the leaked data or the reported memo.\u003c/p\u003e\n","keyPoints":["The World Leaks data extortion group claims responsibility for a breach of Hungarian media company Mediaworks that resulted in the online publication of nearly 8.5 terabytes of stolen files.","The leaked data includes payroll records, contracts, financial statements, and internal communications, with independent outlets reporting a memo suggesting coordination with Moscow regarding Ukrainian President Volodymyr Zelensky.","Mediaworks confirmed the incident, launched an investigation, and warned journalists that publishing or using the illegally obtained data constitutes a criminal offense.","World Leaks is a rebrand of the Hunters International ransomware operation that focuses on data theft and extortion rather than encrypting victims' systems."],"insights":["World Leaks operates without encrypting victim systems, instead relying on rapid data publication and extortion, which shifts the pressure model from operational disruption to reputational and legal coercion.","Mediaworks explicitly warned journalists that publishing or using the leaked data constitutes a criminal offense, revealing a defensive strategy aimed at controlling information flow and limiting secondary liability.","The breach marks World Leaks' first known operation in Hungary, indicating a geographic expansion into Central European media markets that may correlate with the firm's political alignment and recent electoral shifts.","The exfiltration of 8.5 terabytes of internal communications alongside financial and payroll records suggests a deep, persistent compromise of Mediaworks' infrastructure rather than a superficial network intrusion."],"referencedReports":[{"title":"World Leaks Threat Actor Profile","url":"https://www.halcyon.ai/threat-group/worldleaks#activities","publisher":"Halcyon","context":"The article cites this threat intelligence profile to provide background on World Leaks, noting it emerged in early 2025 as a rebrand of the Hunters International ransomware operation."}],"body":"\u003cp\u003eThe cyber-extortion group World Leaks claims responsibility for a recent breach of Hungarian media company Mediaworks, resulting in the publication of nearly 8.5 terabytes of allegedly sensitive files on its dark web site. Local media outlets that reviewed the material state it contains payroll records, contracts, financial statements, and internal communications.\u003c/p\u003e\n\n\u003cp\u003eMediaworks confirmed the incident and launched an investigation, but explicitly warned journalists against reporting on the leaked data. The company argued that publishing or processing the illegally obtained information constitutes a criminal offense. Despite this warning, independent outlets reported that the documents include a January 2025 editorial memo suggesting coordination with Moscow regarding articles aimed at discrediting Ukrainian President Volodymyr Zelensky.\u003c/p\u003e\n\n\u003cp\u003eWorld Leaks, a rebrand of the Hunters International operation, focuses on data theft and extortion rather than system encryption. This marks the group\u0026rsquo;s first known operation in Hungary, following previous cyber incidents targeting the pro-government media firm in 2022.\u003c/p\u003e\n"},{"n":5,"title":"Trellix discloses data breach after source code repository hack","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/trellix-discloses-data-breach-after-source-code-repository-hack/","time":"16:25","priority":"SHOULD READ","score":78,"group":null,"groupColor":null,"tldr":"Cybersecurity firm Trellix disclosed unauthorized access to its source code repository and is investigating with forensic experts, though it currently reports no evidence that the code was exploited or altered.","briefOverview":"\u003cp\u003eCybersecurity firm Trellix has disclosed a data breach involving unauthorized access to a portion of its source code repository. The company, formed by the October 2021 merger of McAfee Enterprise and FireEye, serves over 50,000 business and government customers globally. Upon discovering the incident, Trellix immediately engaged leading forensic experts to investigate the matter and notified law enforcement. The firm stated that there is currently no evidence that the threat actors exploited or altered the accessed source code. Furthermore, the investigation has not revealed any impact on the source code release or distribution process. While Trellix has not yet provided further details regarding the timing of the detection or specific data stolen, it intends to share more information after the investigation concludes. This incident follows a series of recent breaches affecting other cybersecurity companies, including Checkmarx, Cisco, and HackerOne.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTrellix, a global cybersecurity firm formed from the October 2021 merger of McAfee Enterprise and FireEye, disclosed that attackers gained access to a portion of its source code repository. The company serves over 50,000 business and government customers worldwide and protects more than 200 million endpoints. According to an official statement updated on Monday, Trellix is investigating the incident with outside forensic experts and has notified law enforcement.\u003c/p\u003e\n\n\u003cp\u003eThe firm stated that it has found no evidence that the threat actors exploited or altered the source code they accessed. Additionally, there is no evidence that the source code release or distribution process was affected. A Trellix spokesperson provided the same statement to BleepingComputer when asked for more details about the breach. However, the company has not yet replied to a subsequent email requesting information on when the breach was detected, whether corporate or customer data was stolen, or if a ransom demand was made.\u003c/p\u003e\n\n\u003cp\u003eTrellix indicated that it intends to share further details as appropriate after the investigation concludes. This incident follows a series of recent breaches affecting other cybersecurity companies. Application security firm Checkmarx confirmed last week that the LAPSUS$ hacking group leaked data from its private GitHub repository. Cisco revealed last month that hackers breached its internal development environment and stole source code using credentials compromised in the Trivy supply chain attack. Finally, HackerOne notified hundreds of employees in March that their personal information was stolen by attackers who hacked Navia, one of its benefits administrators.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview\"\u003eIncident Overview\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eEvent:\u003c/strong\u003e Trellix disclosed unauthorized access to a portion of its source code repository.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSource:\u003c/strong\u003e The disclosure was made via an official statement updated on Monday.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"company-context\"\u003eCompany Context\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eIdentity:\u003c/strong\u003e Trellix is a global cybersecurity firm created from the October 2021 merger of McAfee Enterprise and FireEye.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScope:\u003c/strong\u003e The company serves over 50,000 business and government customers and protects more than 200 million endpoints worldwide.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"investigation-and-response\"\u003eInvestigation and Response\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eActions Taken:\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003eTrellix immediately began working with leading forensic experts to resolve the incident.\u003c/li\u003e\n\u003cli\u003eLaw enforcement has been notified.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFindings to Date:\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003eThere is no evidence that the threat actors exploited or altered the accessed source code.\u003c/li\u003e\n\u003cli\u003eThere is no evidence that the source code release or distribution process was affected.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCommunication:\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003eA spokesperson shared the official statement with BleepingComputer.\u003c/li\u003e\n\u003cli\u003eThe company has not yet replied to a subsequent email requesting details on detection timing, stolen data, or ransom demands.\u003c/li\u003e\n\u003cli\u003eTrellix intends to share further details as appropriate after the investigation ends.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"industry-context\"\u003eIndustry Context\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eTrellix is not the first cybersecurity company to experience a breach this year.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCheckmarx:\u003c/strong\u003e Confirmed last week that the LAPSUS$ hacking group leaked data stolen from its private GitHub repository.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCisco:\u003c/strong\u003e Revealed last month that hackers breached its internal development environment and stole source code using credentials compromised in the Trivy supply chain attack.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHackerOne:\u003c/strong\u003e Notified hundreds of employees in March that personal information was stolen by attackers who hacked Navia, one of its U.S. benefits administrators.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Trellix disclosed that attackers gained unauthorized access to a portion of its source code repository.","The company is investigating the incident with outside forensic experts and has notified law enforcement.","Trellix has found no evidence that the source code was exploited, altered, or that its release process was affected.","Trellix is a global cybersecurity firm formed from the merger of McAfee Enterprise and FireEye that serves over 50,000 customers worldwide."],"insights":["Multiple cybersecurity vendors (Checkmarx, Cisco, HackerOne) experienced similar repository or supply chain breaches within months, highlighting a sector-wide vulnerability pattern.","Trellix reports attackers accessed only a \"portion\" of the repository with no evidence of code exploitation or distribution process interference, indicating the breach may not have compromised active security product releases.","The HackerOne breach originated from a compromised third-party benefits administrator, demonstrating that security firms remain highly vulnerable to operational supply chain attacks rather than direct infrastructure breaches."],"referencedReports":[],"body":"\u003cp\u003eCybersecurity firm Trellix has disclosed a data breach involving unauthorized access to a portion of its source code repository. The company, formed by the October 2021 merger of McAfee Enterprise and FireEye, serves over 50,000 business and government customers globally. Upon discovering the incident, Trellix immediately engaged leading forensic experts to investigate the matter and notified law enforcement. The firm stated that there is currently no evidence that the threat actors exploited or altered the accessed source code. Furthermore, the investigation has not revealed any impact on the source code release or distribution process. While Trellix has not yet provided further details regarding the timing of the detection or specific data stolen, it intends to share more information after the investigation concludes. This incident follows a series of recent breaches affecting other cybersecurity companies, including Checkmarx, Cisco, and HackerOne.\u003c/p\u003e\n"},{"n":7,"title":"Webinar: Why MSPs must rethink security and backup strategies","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/webinar-why-msps-must-rethink-security-and-backup-strategies/","time":"12:16","priority":"MAY READ","score":65,"group":null,"groupColor":null,"tldr":"MSPs must integrate SaaS backups and business continuity strategies alongside traditional security to ensure rapid recovery and cyber resilience against evolving AI-driven phishing and ransomware attacks.","briefOverview":"\u003cp\u003eCyberattacks are evolving at a pace that outpaces most managed service providers, with phishing now established as the primary entry point for compromises. The integration of artificial intelligence into attack campaigns has created highly personalized phishing efforts that traditional defenses struggle to detect and block. The most critical challenge for organizations often emerges after the initial breach, resulting in severe data loss, extended downtime, and complex recovery requirements. A live webinar on May 14, 2026, will explore these evolving threats and why MSPs must fundamentally rethink both security and recovery strategies. While prevention remains important, many MSPs incorrectly treat security and backup as separate functions, leaving gaps that attackers exploit after initial access. The session will examine how threats progress from AI-driven phishing to ransomware and data-loss events. It will also highlight how threat actors use trusted infrastructure and SaaS platforms to bypass existing controls. Attendees will learn why SaaS backups and a business continuity and disaster recovery plan are essential for cyber resilience. The webinar will demonstrate how leading MSPs combine prevention, detection, and rapid recovery to protect clients and maintain uptime. Joining the session will help strengthen both security posture and recovery capabilities to ensure outcomes remain under control even when attacks succeed.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eC function SwipeCard({ article, isTop, depth, onSwipe }) {
  const [dx, setDx]             = React.useState(0);

  const [dragging, setDragging] = React.useState(false);
  const [flying, setFlying]     = React.useState(null);

  let transform; let opacity = 1;
  if (flying === "left")       { transform = "translate(-140%, " + (dy * 1.5) + "px) rotate(-22deg)"; opacity = 0; }
  else if (flying === "right") { transform = "translate(60%, " + dy + "px) rotate(12deg) scale(0.95)"; }
  else if (dragging)           { transform = "translate(" + dx + "px, " + (dy * 0.4) + "px) rotate(" + (dx * 0.05) + "deg)"; }

  else                         { transform = "translate(0, 0) rotate(0)"; }

  const skipOpacity = !flipped && dx < 0 ? Math.min(1, -dx / 100) : 0;
  const readOpacity = !flipped && dx > 0 ? Math.min(1, dx / 100) : 0;
  const cardClass   = "swipe-card " + (dragging ? "dragging" : flying ? "fly-out" : "snap-back");

  return (
    <div className={cardClass}
      style={{ transform, opacity, zIndex: 100 - depth, cursor: isTop && !flipped ? "grab" : "default", pointerEvents: isTop ? "auto" : "none" }}
      onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={onPointerUp}>
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      {!flipped && (
        <>
          <div className="stamp skip" style={{ opacity: skipOpacity }}>SKIP</div>
          <div className="stamp read" style={{ opacity: readOpacity }}>READ</div>
        </>
      )}
    </div>
  );
}

function App() {
  const [index, setIndex] = React.useState(0);
  const [tick, setTick]   = React.useState(0);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  { setIndex(i => i + 1); setTick(t => t + 1); }
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished]);

  const advance = () => { setIndex(i => i + 1); setTick(t => t + 1); };

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setTick(0); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + tick + "-" + realDepth}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onSwipe={(dir) => { if (dir === "left") advance(); }}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Skip (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--text3)", letterSpacing: "0.12em", textAlign: "center", lineHeight: 1.7 }}>
              <div>&#8592; SKIP · READ &#8594;</div>
              <div style={{ opacity: 0.6, marginTop: 2 }}>SWIPE OR CLICK</div>
            </div>
            <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="Read details (ArrowRight)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
