<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { transition: none; cursor: grabbing; }
  .swipe-card.snap-back { transition: transform 0.32s cubic-bezier(.2,.9,.2,1); }
  .swipe-card.fly-out  { transition: transform 0.4s cubic-bezier(.4,.0,.6,1), opacity 0.4s; }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0; transition: opacity 0.1s;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--discard); color: var(--discard); }
  .pill-btn.read:hover { border-color: var(--accept);  color: var(--accept); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

<script>
window.__DL_ARTICLES = [{"n":12,"title":"CISA says ‘Copy Fail’ flaw now exploited to root Linux systems","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/cisa-says-copy-fail-flaw-now-exploited-to-root-linux-systems/","time":"11:28","priority":"MUST READ","score":98,"group":null,"groupColor":null,"tldr":"CISA has classified the actively exploited Copy Fail Linux kernel vulnerability as a critical threat and mandated immediate patching for federal systems, while urging all organizations to apply available updates to prevent unauthorized root access.","briefOverview":"\u003cp\u003eCISA has issued a warning regarding the active exploitation of the \u0026ldquo;Copy Fail\u0026rdquo; Linux security vulnerability, also known as CVE-2026-31431.\u003c/p\u003e\n\n\u003cp\u003eThe flaw resides in the Linux kernel\u0026rsquo;s algif_aead cryptographic interface and allows unprivileged local users to escalate privileges to root access.\u003c/p\u003e\n\n\u003cp\u003eResearchers at Theori disclosed the issue and released a reliable Python-based exploit that successfully grants root shells across multiple major distributions.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects essentially every mainstream Linux distribution that shipped with a kernel version released between 2017 and the recent patch.\u003c/p\u003e\n\n\u003cp\u003eIn response, CISA added the flaw to its Known Exploited Vulnerabilities Catalog and mandated federal agencies to apply patches within two weeks.\u003c/p\u003e\n\n\u003cp\u003eSecurity teams are strongly urged to prioritize these updates or discontinue use of vulnerable systems if mitigations are unavailable.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA has formally warned that threat actors are actively exploiting the \u0026ldquo;Copy Fail\u0026rdquo; Linux vulnerability in the wild.\u003c/p\u003e\n\n\u003cp\u003eThis security flaw, tracked as CVE-2026-31431, was discovered in the Linux kernel\u0026rsquo;s algif_aead cryptographic algorithm interface.\u003c/p\u003e\n\n\u003cp\u003eIt enables unprivileged local users to gain root privileges by writing four controlled bytes to the page cache of any readable file.\u003c/p\u003e\n\n\u003cp\u003eTheori researchers disclosed the vulnerability and shared a proof-of-concept exploit they describe as one hundred percent reliable.\u003c/p\u003e\n\n\u003cp\u003eTheir testing demonstrated successful root access on Ubuntu 24.04 LTS, Amazon Linux 2023, RHEL 10.1, and SUSE 16.\u003c/p\u003e\n\n\u003cp\u003eThe researchers noted that the same script works unmodified against any Linux distribution shipped since 2017 with a vulnerable kernel version.\u003c/p\u003e\n\n\u003cp\u003eWhile major distributions have begun pushing kernel updates to address the issue, industry analysts noted that official updates were not yet available at the time of the initial advisory.\u003c/p\u003e\n\n\u003cp\u003eCISA subsequently added the flaw to its Known Exploited Vulnerabilities Catalog on Friday.\u003c/p\u003e\n\n\u003cp\u003eThe agency ordered Federal Civilian Executive Branch agencies to patch their Linux endpoints and servers within two weeks, by May 15.\u003c/p\u003e\n\n\u003cp\u003eThis directive aligns with the requirements of Binding Operational Directive 22-01.\u003c/p\u003e\n\n\u003cp\u003eCISA emphasized that this vulnerability type poses significant risks to the federal enterprise and is a frequent attack vector.\u003c/p\u003e\n\n\u003cp\u003eThe agency advised organizations to apply mitigations per vendor instructions or discontinue product use if patches are unavailable.\u003c/p\u003e\n\n\u003cp\u003eCISA also urged all security teams to prioritize securing their networks against this specific CVE.\u003c/p\u003e\n\n\u003cp\u003eThe article also mentions a separate high-severity root privilege escalation flaw dubbed Pack2TheRoot that was patched earlier in the month.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"vulnerability-overview\"\u003eVulnerability Overview\u003c/h3\u003e\n\n\u003cp\u003eThe article details the active exploitation of the \u0026ldquo;Copy Fail\u0026rdquo; Linux security flaw, officially tracked as CVE-2026-31431.\u003c/p\u003e\n\n\u003cp\u003eThis vulnerability resides within the Linux kernel\u0026rsquo;s algif_aead cryptographic algorithm interface.\u003c/p\u003e\n\n\u003cp\u003eIt allows unprivileged local users to escalate privileges to root access through a precise memory manipulation technique.\u003c/p\u003e\n\n\u003cp\u003eSpecifically, attackers can gain control by writing four controlled bytes to the page cache of any readable file on the system.\u003c/p\u003e\n\n\u003ch3 id=\"research-disclosure-and-exploit-capabilities\"\u003eResearch Disclosure and Exploit Capabilities\u003c/h3\u003e\n\n\u003cp\u003eTheori researchers publicly disclosed the flaw and released a proof-of-concept exploit.\u003c/p\u003e\n\n\u003cp\u003eThey characterized their Python-based script as one hundred percent reliable in granting root access.\u003c/p\u003e\n\n\u003cp\u003eInitial testing successfully obtained root shells across four distinct distributions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUbuntu 24.04 LTS\u003c/li\u003e\n\u003cli\u003eAmazon Linux 2023\u003c/li\u003e\n\u003cli\u003eRHEL 10.1\u003c/li\u003e\n\u003cli\u003eSUSE 16\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe researchers emphasized that the exploit binary works unmodified across all tested environments.\u003c/p\u003e\n\n\u003cp\u003eThey further stated that any Linux distribution shipped since 2017 with a vulnerable kernel version falls within the attack scope.\u003c/p\u003e\n\n\u003ch3 id=\"regulatory-response-and-mitigation-directives\"\u003eRegulatory Response and Mitigation Directives\u003c/h3\u003e\n\n\u003cp\u003eCISA formally added the Copy Fail vulnerability to its Known Exploited Vulnerabilities Catalog.\u003c/p\u003e\n\n\u003cp\u003eThe agency issued a directive ordering Federal Civilian Executive Branch agencies to patch their Linux endpoints and servers within two weeks.\u003c/p\u003e\n\n\u003cp\u003eThe compliance deadline is set for May 15, as mandated by Binding Operational Directive 22-01.\u003c/p\u003e\n\n\u003cp\u003eCISA highlighted that this type of vulnerability represents a frequent attack vector and poses significant risks to the federal enterprise.\u003c/p\u003e\n\n\u003cp\u003eThe agency instructed agencies to apply mitigations according to vendor guidelines or discontinue use of the product if mitigations cannot be applied.\u003c/p\u003e\n\n\u003cp\u003eCISA also extended this urgent recommendation to all security teams outside the federal government.\u003c/p\u003e\n\n\u003ch3 id=\"industry-context-and-related-developments\"\u003eIndustry Context and Related Developments\u003c/h3\u003e\n\n\u003cp\u003eAt the time of the initial advisory, security analysts noted that official vendor updates were not yet publicly available.\u003c/p\u003e\n\n\u003cp\u003eHowever, major Linux distributions have subsequently begun pushing fixes through kernel updates.\u003c/p\u003e\n\n\u003cp\u003eThe article also references a separate high-severity privilege escalation vulnerability dubbed Pack2TheRoot.\u003c/p\u003e\n\n\u003cp\u003eTracked as CVE-2026-41651, this flaw persisted in the PackageKit daemon for over a decade and was patched earlier in the month.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes by listing related cybersecurity alerts and upcoming industry events focused on autonomous validation and rapid exploit mitigation.\u003c/p\u003e\n","keyPoints":["CISA has added the actively exploited Copy Fail Linux kernel vulnerability to its Known Exploited Vulnerabilities Catalog and mandated federal agencies to patch their systems within two weeks.","The vulnerability, tracked as CVE-2026-31431, resides in the kernel's algif_aead cryptographic interface and allows unprivileged local users to escalate to root privileges.","Researchers disclosed the flaw and released a Python-based exploit that reliably grants root access across major Linux distributions shipped since 2017.","While major distributions have released kernel updates to address the issue, CISA has urged all security teams to prioritize applying these patches immediately."],"insights":["The researchers demonstrated that a single unmodified Python exploit script successfully grants root access across four different Linux distributions, indicating that attackers can leverage one tool against virtually all mainstream systems running kernels from 2017 onward.","CISA mandated federal agencies to patch within two weeks under BOD 22-01, reflecting the vulnerability's rapid transition from public disclosure to active exploitation.","The flaw resides in the kernel's algif_aead cryptographic interface, allowing privilege escalation through a simple mechanism of writing four controlled bytes to the page cache of any readable file.","CISA explicitly advised organizations to discontinue use of vulnerable products if mitigations cannot be applied, providing a clear fallback contingency for systems that cannot be immediately patched."],"referencedReports":[{"title":"Theori Copy Fail Vulnerability Disclosure","url":"https://copy.fail/","publisher":"Theori Researchers","context":"The article cites this link as the official disclosure page where Theori researchers published their technical analysis and proof-of-concept exploit for the Copy Fail flaw."},{"title":"CISA Known Exploited Vulnerabilities Catalog Alert","url":"https://www.cisa.gov/news-events/alerts/2026/05/01/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article references this link as the official CISA advisory alert announcing the vulnerability's inclusion in the KEV Catalog and the subsequent patching mandate."}],"body":"\u003cp\u003eCISA has issued a warning regarding the active exploitation of the \u0026ldquo;Copy Fail\u0026rdquo; Linux security vulnerability, also known as CVE-2026-31431.\u003c/p\u003e\n\n\u003cp\u003eThe flaw resides in the Linux kernel\u0026rsquo;s algif_aead cryptographic interface and allows unprivileged local users to escalate privileges to root access.\u003c/p\u003e\n\n\u003cp\u003eResearchers at Theori disclosed the issue and released a reliable Python-based exploit that successfully grants root shells across multiple major distributions.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects essentially every mainstream Linux distribution that shipped with a kernel version released between 2017 and the recent patch.\u003c/p\u003e\n\n\u003cp\u003eIn response, CISA added the flaw to its Known Exploited Vulnerabilities Catalog and mandated federal agencies to apply patches within two weeks.\u003c/p\u003e\n\n\u003cp\u003eSecurity teams are strongly urged to prioritize these updates or discontinue use of vulnerable systems if mitigations are unavailable.\u003c/p\u003e\n"},{"n":11,"title":"Progress warns of critical MOVEit Automation auth bypass flaw","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/moveit-automation-customers-warned-to-patch-critical-auth-bypass-flaw/","time":"12:18","priority":"MUST READ","score":95,"group":"F","groupColor":"#60a5fa","tldr":"Progress Software urges immediate upgrading of MOVEit Automation to a patched version to mitigate a critical remote authentication bypass vulnerability and a high-severity privilege escalation flaw affecting over 1,400 publicly exposed instances, including several US government systems.","briefOverview":"\u003cp\u003eProgress Software has issued an urgent advisory regarding a critical authentication bypass vulnerability in its MOVEit Automation managed file transfer application.\u003c/p\u003e\n\n\u003cp\u003eTracked as CVE-2026-4670, this flaw affects versions prior to 2025.1.5, 2025.0.9, and 2024.1.8.\u003c/p\u003e\n\n\u003cp\u003eRemote attackers can exploit the vulnerability without authentication or user interaction in low-complexity attacks.\u003c/p\u003e\n\n\u003cp\u003eThe company strongly recommends upgrading to the latest patched release to fully remediate the issue.\u003c/p\u003e\n\n\u003cp\u003eThis upgrade process requires a full installer and will temporarily cause a system outage.\u003c/p\u003e\n\n\u003cp\u003eAlongside the authentication flaw, Progress also patched a high-severity privilege escalation vulnerability stemming from improper input validation.\u003c/p\u003e\n\n\u003cp\u003eOver 1,400 MOVEit instances are currently exposed online, including several linked to U.S. government agencies.\u003c/p\u003e\n\n\u003cp\u003eWhile not yet confirmed as exploited in the wild, MOVEit software has a history of being targeted by ransomware groups like Clop.\u003c/p\u003e\n\n\u003cp\u003eOrganizations should prioritize immediate patching to prevent potential data theft and system compromise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eProgress Software has warned its customer base to urgently patch a critical authentication bypass vulnerability within its MOVEit Automation enterprise-grade managed file transfer application.\u003c/p\u003e\n\n\u003cp\u003eThe flaw, identified as CVE-2026-4670, impacts all MOVEit Automation versions released before 2025.1.5, 2025.0.9, and 2024.1.8.\u003c/p\u003e\n\n\u003cp\u003eThreat actors can leverage this vulnerability remotely without needing any prior privileges on the targeted systems.\u003c/p\u003e\n\n\u003cp\u003eThe attack vector is classified as low-complexity and does not require any interaction from a legitimate user.\u003c/p\u003e\n\n\u003cp\u003eProgress explicitly states that upgrading to the latest patched release is the only effective method to resolve this security issue.\u003c/p\u003e\n\n\u003cp\u003eAdministrators must note that applying the full installer will inevitably cause a temporary outage to the system during the upgrade process.\u003c/p\u003e\n\n\u003cp\u003eIn addition to the authentication bypass, Progress simultaneously released updates to address a high-severity privilege escalation flaw labeled CVE-2026-5174.\u003c/p\u003e\n\n\u003cp\u003eThis secondary vulnerability arises from an improper input validation weakness within the same software suite.\u003c/p\u003e\n\n\u003cp\u003eIndependent cybersecurity research indicates that more than 1,400 MOVEit Automation instances are currently exposed to the internet.\u003c/p\u003e\n\n\u003cp\u003eFurthermore, over a dozen of these publicly accessible systems are directly associated with U.S. local and state government agencies.\u003c/p\u003e\n\n\u003cp\u003eThere is currently no public data detailing how many of these exposed instances have already been secured against the new CVEs.\u003c/p\u003e\n\n\u003cp\u003eAlthough Progress has not yet confirmed active exploitation of these specific flaws, the MOVEit platform has historically been a prime target for ransomware operators.\u003c/p\u003e\n\n\u003cp\u003eNotably, the Clop ransomware gang previously exploited a zero-day in the MOVEit Transfer platform during a massive 2023 campaign.\u003c/p\u003e\n\n\u003cp\u003eThat earlier attack compromised over 2,100 organizations and exposed the data of more than 62 million individuals.\u003c/p\u003e\n\n\u003cp\u003eManaged file transfer software remains highly attractive to threat actors due to its central role in enterprise data workflows.\u003c/p\u003e\n\n\u003cp\u003eProgress Software reports that its MOVEit solutions currently serve more than 3,000 enterprise organizations and over 100,000 users globally.\u003c/p\u003e\n\n\u003cp\u003eSecurity teams are advised to immediately prioritize these patches to mitigate potential unauthorized access and privilege escalation risks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003eProgress Software has issued a critical security advisory regarding a severe authentication bypass flaw in its MOVEit Automation managed file transfer application.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is officially tracked as CVE-2026-4670 and affects all software versions released prior to 2025.1.5, 2025.0.9, and 2024.1.8.\u003c/p\u003e\n\n\u003cp\u003eRemote threat actors can exploit this flaw without possessing any authentication credentials or system privileges.\u003c/p\u003e\n\n\u003cp\u003eThe attack characteristics are classified as low-complexity and require no interaction from end users to succeed.\u003c/p\u003e\n\n\u003cp\u003eIn addition to the authentication bypass, Progress released a simultaneous patch for a high-severity privilege escalation vulnerability designated as CVE-2026-5174.\u003c/p\u003e\n\n\u003cp\u003eThis secondary flaw stems directly from an improper input validation weakness within the same codebase.\u003c/p\u003e\n\n\u003cp\u003eKey technical details include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-4670: Critical authentication bypass requiring no user interaction or privileges.\u003c/li\u003e\n\u003cli\u003eCVE-2026-5174: High-severity privilege escalation caused by improper input validation.\u003c/li\u003e\n\u003cli\u003eAffected versions: All releases prior to 2025.1.5, 2025.0.9, and 2024.1.8.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe vendor explicitly states that upgrading to the latest patched release is the only viable method to remediate the authentication bypass issue.\u003c/p\u003e\n\n\u003cp\u003eOrganizations must utilize the full installer package to ensure complete security patching.\u003c/p\u003e\n\n\u003cp\u003eIT administrators should plan for an unavoidable system outage, as the upgrade process will temporarily halt all MOVEit Automation services.\u003c/p\u003e\n\n\u003cp\u003eProgress has not provided alternative mitigation strategies or temporary workarounds for environments that cannot immediately undergo the upgrade.\u003c/p\u003e\n\n\u003cp\u003eIndependent research utilizing Shodan search data reveals that over 1,400 MOVEit Automation instances are currently exposed online.\u003c/p\u003e\n\n\u003cp\u003eA significant portion of these publicly accessible systems are directly linked to U.S. local and state government agencies.\u003c/p\u003e\n\n\u003cp\u003eThere is currently no available intelligence regarding the exact number of these exposed instances that have already been patched against CVE-2026-4670.\u003c/p\u003e\n\n\u003cp\u003eWhile Progress has not flagged these specific vulnerabilities as actively exploited in the wild, the MOVEit platform has a documented history of being targeted by sophisticated threat actors.\u003c/p\u003e\n\n\u003cp\u003eThe Clop ransomware syndicate previously leveraged a zero-day vulnerability in the MOVEit Transfer platform during a massive 2023 data theft campaign.\u003c/p\u003e\n\n\u003cp\u003eThat historical breach impacted more than 2,100 organizations and compromised the personal data of over 62 million individuals.\u003c/p\u003e\n\n\u003cp\u003eManaged file transfer software remains a highly attractive target for ransomware operators due to its centralized role in enterprise data workflows.\u003c/p\u003e\n\n\u003cp\u003eProgress Software reports that its MOVEit managed file transfer solutions are currently deployed across more than 3,000 enterprise organizations worldwide.\u003c/p\u003e\n\n\u003cp\u003eThe platform supports over 100,000 individual users who rely on it for automated data workflow orchestration.\u003c/p\u003e\n\n\u003cp\u003eGiven the critical nature of the authentication bypass and the widespread exposure of government and enterprise instances, immediate patching is strongly recommended.\u003c/p\u003e\n\n\u003cp\u003eSecurity teams should prioritize the full installer upgrade to close both the authentication and privilege escalation vulnerabilities before they can be leveraged in targeted attacks.\u003c/p\u003e\n","keyPoints":["Progress Software has issued an advisory urging customers to patch a critical authentication bypass vulnerability (CVE-2026-4670) and a high-severity privilege escalation flaw (CVE-2026-5174) in MOVEit Automation.","The vulnerabilities impact MOVEit Automation versions prior to 2025.1.5, 2025.0.9, and 2024.1.8, requiring an upgrade to the latest release that causes a system outage during installation.","Research indicates that over 1,400 MOVEit Automation instances are currently exposed online, with more than a dozen of these systems linked to U.S. local and state government agencies.","Although Progress has not yet confirmed exploitation of these specific flaws, the MOVEit platform has been a frequent target for ransomware groups, including the 2023 Clop attacks that compromised over 2,100 organizations."],"insights":["The remediation process requires a full installer upgrade that forces a system outage, meaning organizations must schedule downtime to apply the patch.","Shodan data indicates that over 1,400 MOVEit Automation instances are currently exposed online, with more than a dozen of these systems linked to U.S. local and state government agencies.","The critical authentication bypass vulnerability allows remote threat actors to exploit the flaw without privileges or user interaction, creating a low-complexity attack vector."],"referencedReports":[{"title":"MOVEit Automation Critical Security Alert Bulletin April 2026","url":"https://community.progress.com/s/article/MOVEit-Automation-Critical-Security-Alert-Bulletin-April-2026-CVE-2026-4670-CVE-2026-5174","publisher":"Progress Software","context":"The article cites this official advisory where Progress recommends upgrading to the latest patched release to remediate critical vulnerabilities."},{"title":"Unpacking the MOVEit Breach Statistics and Analysis","url":"http://www.emsisoft.com/en/blog/44123/unpacking-the-moveit-breach-statistics-and-analysis/","publisher":"Emsisoft","context":"The article references this analysis to provide estimates on the scale of the 2023 Clop ransomware attacks that compromised MOVEit Transfer."}],"body":"\u003cp\u003eProgress Software has issued an urgent advisory regarding a critical authentication bypass vulnerability in its MOVEit Automation managed file transfer application.\u003c/p\u003e\n\n\u003cp\u003eTracked as CVE-2026-4670, this flaw affects versions prior to 2025.1.5, 2025.0.9, and 2024.1.8.\u003c/p\u003e\n\n\u003cp\u003eRemote attackers can exploit the vulnerability without authentication or user interaction in low-complexity attacks.\u003c/p\u003e\n\n\u003cp\u003eThe company strongly recommends upgrading to the latest patched release to fully remediate the issue.\u003c/p\u003e\n\n\u003cp\u003eThis upgrade process requires a full installer and will temporarily cause a system outage.\u003c/p\u003e\n\n\u003cp\u003eAlongside the authentication flaw, Progress also patched a high-severity privilege escalation vulnerability stemming from improper input validation.\u003c/p\u003e\n\n\u003cp\u003eOver 1,400 MOVEit instances are currently exposed online, including several linked to U.S. government agencies.\u003c/p\u003e\n\n\u003cp\u003eWhile not yet confirmed as exploited in the wild, MOVEit software has a history of being targeted by ransomware groups like Clop.\u003c/p\u003e\n\n\u003cp\u003eOrganizations should prioritize immediate patching to prevent potential data theft and system compromise.\u003c/p\u003e\n"},{"n":13,"title":"4th May – Threat Intelligence Report","source":"research.checkpoint.com","sourceColor":"#38bdf8","link":"https://research.checkpoint.com/2026/4th-may-threat-intelligence-report/","time":"13:49","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"Security teams must immediately patch critical zero-day and SQL injection vulnerabilities in cPanel, LiteLLM, and Microsoft Entra ID, while implementing defenses against active AI-driven attacks and supply chain compromises.","briefOverview":"\u003cp\u003eThe article covers significant cyber incidents and vulnerabilities reported on May 4th. Major organizations like Medtronic, Vimeo, Robinhood, and Trellix have disclosed security breaches involving data theft, phishing abuse, and source code exposure. AI-driven threats are escalating, with researchers identifying a remote code execution flaw in Cursor, a phishing-as-a-service platform using multiple AI models, and a supply chain attack where an AI co-authored malware into an open-source project. Critical vulnerabilities were patched in Microsoft Entra ID, Google Gemini CLI, and LiteLLM, while cPanel addressed an actively exploited zero-day authentication bypass. Additionally, threat intelligence highlights VECT 2.0 ransomware functioning as an unrecoverable wiper, a Mirai-based botnet targeting Brazilian ISPs, a large-scale Facebook phishing campaign, and a supply chain campaign compromising SAP npm packages. Security teams are advised to apply patches and monitor for these active threats.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe May 4th threat intelligence report details several high-profile breaches and emerging attack vectors across multiple sectors. Medtronic disclosed a corporate IT breach where ShinyHunters claimed to have stolen 9 million records, though the company confirmed no impact on its products or financial systems. Vimeo confirmed a data breach stemming from a compromised analytics vendor, exposing internal operational data and customer emails.\u003c/p\u003e\n\n\u003cp\u003eRobinhood addressed a flaw in its account creation process that was abused to launch a phishing campaign using official email addresses. Trellix suffered a source code repository breach but reported no evidence of product tampering or pipeline compromise. AI-related threats are rapidly evolving, with researchers pinpointing a remote code execution vulnerability in Cursor’s coding environment.\u003c/p\u003e\n\n\u003cp\u003eA new phishing-as-a-service platform called Bluekit now bundles over 40 templates with an AI assistant utilizing multiple large language models. Researchers also documented an AI-enabled supply chain attack where Claude Opus co-authored a commit introducing PromptMink malware into a crypto trading project. Several critical vulnerabilities were addressed in recent patches.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft fixed a privilege escalation flaw in Entra ID that allowed AI agent roles to impersonate service accounts. cPanel patched a critical authentication bypass actively exploited in the wild across tens of thousands of internet addresses. Google released patches for a code execution flaw in the Gemini CLI that allowed malicious pull requests to trigger commands in CI/CD pipelines.\u003c/p\u003e\n\n\u003cp\u003eLiteLLM versions 1.81.16 to 1.83.6 were affected by a critical SQL injection flaw used to manage LLM API keys. Threat intelligence reports further revealed that VECT 2.0 ransomware acts as an unrecoverable data wiper due to an encryption mistake. A Mirai-based botnet campaign targeted Brazilian internet providers by abusing router vulnerabilities and open DNS servers.\u003c/p\u003e\n\n\u003cp\u003eA phishing campaign dubbed AccountDumpling abused Google AppSheet to hijack Facebook accounts and monetize stolen access through Telegram. Finally, researchers documented a TeamPCP supply chain campaign that compromised four SAP npm packages to harvest credentials across major cloud providers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eThe May 4th threat intelligence report provides a comprehensive overview of recent cyber incidents, emerging attack vectors, and critical vulnerabilities. The document highlights significant data breaches affecting major corporations, the rapid weaponization of AI for phishing and supply chain attacks, and the patching of critical flaws in widely used software platforms. Security teams are advised to apply immediate patches and monitor for active exploitation of identified threats.\u003c/p\u003e\n\n\u003ch3 id=\"top-attacks-and-breaches\"\u003eTop Attacks and Breaches\u003c/h3\u003e\n\n\u003cp\u003eSeveral high-profile organizations have disclosed security incidents affecting their corporate IT systems and user data.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMedtronic disclosed a breach where ShinyHunters claimed to have stolen 9 million records. The company confirmed that the incident did not impact its medical devices, operations, or financial systems.\u003c/li\u003e\n\u003cli\u003eVimeo confirmed a data breach originating from a compromised analytics vendor. Exposed data included internal operational information, video metadata, and customer emails, while passwords, payment data, and video content remained secure.\u003c/li\u003e\n\u003cli\u003eThreat actors abused a flaw in Robinhood\u0026rsquo;s account creation process to launch a phishing campaign. The campaign utilized emails from Robinhood\u0026rsquo;s official mailing account to bypass security checks, though no accounts or funds were compromised.\u003c/li\u003e\n\u003cli\u003eTrellix experienced a breach of its internal source code repository. The vendor engaged forensic experts and law enforcement, stating there is currently no evidence of product tampering, pipeline compromise, or active exploitation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"ai-threats\"\u003eAI Threats\u003c/h3\u003e\n\n\u003cp\u003eArtificial intelligence is increasingly being leveraged to facilitate sophisticated cyberattacks across multiple vectors.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eResearchers identified CVE-2026-26268, a vulnerability in Cursor\u0026rsquo;s coding environment that enables remote code execution. The attack chains Git hooks and bare repositories to run malicious scripts, risking the exposure of source code and internal tokens.\u003c/li\u003e\n\u003cli\u003eBluekit, a phishing-as-a-service platform, now offers over 40 templates integrated with an AI assistant. The toolkit utilizes multiple large language models to centralize domain setup, generate realistic login clones, and exfiltrate sessions via Telegram.\u003c/li\u003e\n\u003cli\u003eResearchers documented an AI-enabled supply chain attack where Anthropic\u0026rsquo;s Claude Opus co-authored a code commit. The commit introduced PromptMink malware into an open-source crypto trading project, siphoning credentials and enabling wallet takeovers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"vulnerabilities-and-patches\"\u003eVulnerabilities and Patches\u003c/h3\u003e\n\n\u003cp\u003eCritical security flaws were addressed across several major platforms, with some already seeing active exploitation in the wild.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft patched a privilege escalation flaw in Entra ID that allowed the Agent ID Administrator role to impersonate privileged service accounts. Researchers published a proof-of-concept demonstrating how attackers could add credentials to take over identities.\u003c/li\u003e\n\u003cli\u003ecPanel addressed CVE-2026-41940, a critical authentication bypass actively exploited as a zero-day. The flaw grants full administrative control without credentials, and Shadowserver observed 44,000 internet addresses scanning or attacking decoy systems.\u003c/li\u003e\n\u003cli\u003eGoogle released patches for a critical code execution flaw in the Gemini CLI and its GitHub Action. The vulnerability automatically trusted workspace files during automated jobs, allowing malicious pull requests to trigger commands on build servers.\u003c/li\u003e\n\u003cli\u003eLiteLLM proxy versions 1.81.16 to 1.83.6 are affected by CVE-2026-42208, a critical SQL injection flaw. Attackers can read and alter the proxy database to manage large language model API keys, with exploitation attempts observed roughly 36 hours after disclosure.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"threat-intelligence-reports\"\u003eThreat Intelligence Reports\u003c/h3\u003e\n\n\u003cp\u003eIndependent researchers and threat intelligence teams have documented several notable campaigns and malware families.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCheck Point Research revealed that VECT 2.0 ransomware functions as an unrecoverable data wiper across Windows, Linux, and ESXi. A critical encryption mistake discards decryption information for files larger than 128 KB, making recovery impossible even after ransom payment.\u003c/li\u003e\n\u003cli\u003eResearchers analyzed a Mirai-based botnet campaign targeting Brazilian internet providers. The campaign abuses TP-Link router vulnerabilities and open DNS servers for high-volume amplification attacks, with leaked files linking control activity to a DDoS mitigation firm.\u003c/li\u003e\n\u003cli\u003eA large-scale phishing campaign dubbed AccountDumpling abuses Google AppSheet to hijack Facebook accounts. The operation, linked to Vietnam-based attackers, uses cloned support pages and reward lures to collect 2FA codes, compromising over 30,000 users.\u003c/li\u003e\n\u003cli\u003eResearchers documented a TeamPCP supply chain campaign that compromised four SAP npm packages. The malicious installers harvested developer and cloud credentials across GitHub and major providers, enabling downstream compromises before the packages were removed.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"protective-measures-mentioned\"\u003eProtective Measures Mentioned\u003c/h3\u003e\n\n\u003cp\u003eThe report explicitly notes specific Check Point security products that provide protection against identified threats. Check Point IPS offers protection against the cPanel authentication bypass and the LiteLLM SQL injection flaw. Additionally, Check Point Threat Emulation and Harmony Endpoint provide protection against the VECT 2.0 ransomware.\u003c/p\u003e\n","keyPoints":["Medtronic disclosed a corporate IT breach where ShinyHunters claimed to have stolen 9 million records, though the company confirmed no impact on its products or financial systems.","Critical vulnerabilities were patched in Microsoft Entra ID, Google Gemini CLI, and LiteLLM, while the cPanel authentication bypass flaw CVE-2026-41940 is being actively exploited in the wild.","AI-related threats include a Cursor coding environment vulnerability enabling remote code execution, a Bluekit phishing-as-a-service platform utilizing multiple AI models, and a supply chain attack where Claude Opus co-authored malware into an open-source crypto project.","Threat intelligence reports reveal that VECT 2.0 ransomware functions as an unrecoverable data wiper due to an encryption mistake, alongside documented campaigns involving a Mirai-based botnet targeting Brazilian ISPs and a phishing operation hijacking Facebook accounts through Google AppSheet."],"insights":["VECT 2.0 ransomware inadvertently functions as an unrecoverable data wiper because an encryption bug discards decryption information for files over 128 KB, making recovery impossible even after ransom payment.","AI models are now being weaponized to bypass traditional code review, as demonstrated by Claude Opus co-authoring a commit that introduced PromptMink malware into an open-source crypto project.","The cPanel zero-day authentication bypass is being actively exploited at scale, with Shadowserver observing 44,000 internet addresses scanning or attacking decoy systems to identify vulnerable infrastructure.","Google's Gemini CLI flaw enables attackers to execute arbitrary commands in CI/CD pipelines by exploiting the platform's automatic trust of workspace files during automated jobs triggered by pull requests."],"referencedReports":[{"title":"Threat Intelligence Bulletin","url":"https://research.checkpoint.com/wp-content/uploads/2026/05/Threat_Intelligence_News_2026-05-04.pdf","publisher":"Check Point Research","context":"Downloaded for the latest discoveries in cyber research for the week of 4th May."},{"title":"VECT 2.0 ransomware by design, wiper by accident","url":"https://research.checkpoint.com/2026/vect-ransomware-by-design-wiper-by-accident/","publisher":"Check Point Research","context":"Revealed that the VECT 2.0 ransomware effectively acts as an unrecoverable data wiper across Windows, Linux, and ESXi due to a critical encryption mistake."}],"body":"\u003cp\u003eThe article covers significant cyber incidents and vulnerabilities reported on May 4th. Major organizations like Medtronic, Vimeo, Robinhood, and Trellix have disclosed security breaches involving data theft, phishing abuse, and source code exposure. AI-driven threats are escalating, with researchers identifying a remote code execution flaw in Cursor, a phishing-as-a-service platform using multiple AI models, and a supply chain attack where an AI co-authored malware into an open-source project. Critical vulnerabilities were patched in Microsoft Entra ID, Google Gemini CLI, and LiteLLM, while cPanel addressed an actively exploited zero-day authentication bypass. Additionally, threat intelligence highlights VECT 2.0 ransomware functioning as an unrecoverable wiper, a Mirai-based botnet targeting Brazilian ISPs, a large-scale Facebook phishing campaign, and a supply chain campaign compromising SAP npm packages. Security teams are advised to apply patches and monitor for these active threats.\u003c/p\u003e\n"},{"n":15,"title":"⚡ Weekly Recap: AI-Powered Phishing, Android Spying Tool, Linux Exploit, GitHub RCE \u0026 More","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/weekly-recap-ai-powered-phishing.html","time":"14:23","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"Attackers are rapidly scaling sophisticated operations across SaaS environments, Linux kernels, and open-source supply chains, making immediate patching of critical vulnerabilities and strict verification of pipeline credentials essential for defense.","briefOverview":"\u003cp\u003eThis week’s cybersecurity landscape is defined by rapid, high-impact attacks targeting foundational infrastructure and trusted development pipelines. A critical cPanel vulnerability is actively being exploited, leading to complete website wipes and the deployment of botnet variants and ransomware. Simultaneously, the Linux kernel’s Copy Fail flaw has been confirmed as actively exploited, offering reliable privilege escalation and container escapes without leaving disk traces.\u003c/p\u003e\n\n\u003cp\u003eAttackers are also leveraging a severe GitHub remote code execution flaw to compromise enterprise codebases and internal secrets. Beyond infrastructure, threat actors are increasingly operating within SaaS environments and weaponizing legitimate CI/CD pipelines to distribute poisoned software under real developer identities. The VECT 2.0 ransomware variant further escalates the threat by permanently wiping files instead of encrypting them, making data recovery impossible even for the attackers. Organizations must prioritize immediate patching of these critical vulnerabilities and rigorously verify their supply chain credentials to mitigate these accelerating threats.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe weekly recap highlights a shift from initial breaches to sustained occupation, with attackers scaling operations across SaaS, Linux kernels, and open-source pipelines. The cPanel critical flaw CVE-2026-41940 is under active exploitation, causing complete website wipes and deploying Mirai variants and the Sorry ransomware strain. In SaaS environments, cybercrime groups Cordial Spider and Snarky Spider are using vishing to bypass MFA, capture credentials, and move laterally while masking traffic through residential proxies.\u003c/p\u003e\n\n\u003cp\u003eThe Linux Copy Fail vulnerability CVE-2026-31431 has been added to CISA’s KEV catalog due to its reliable, memory-only privilege escalation and container escape capabilities. TeamPCP continues its supply chain campaign by poisoning packages across npm, PyPI, and Packagist, weaponizing legitimate CI/CD pipelines to push malicious versions under real identities. A new Python backdoor framework called DEEP#DOOR provides persistent remote command execution, surveillance, and system disruption capabilities on Windows systems.\u003c/p\u003e\n\n\u003cp\u003eResearchers also disclosed a critical GitHub RCE vulnerability CVE-2026-3854 that allows authenticated users to execute code or compromise enterprise servers with a single git push. The VECT 2.0 ransomware-as-a-service platform partners with TeamPCP and BreachForums, permanently wiping files instead of encrypting them to ensure irreversible data loss. Additional threats include the KidsProtect Android spyware sold on the clear web, the KYCShadow malware targeting Indian users via WhatsApp, and spear-phishing campaigns against Pakistani government entities using VS Code tunnel abuse.\u003c/p\u003e\n\n\u003cp\u003eMultiple phishing campaigns are leveraging Calendly branding, Microsoft Teams IT impersonation, and the new AI-integrated Bluekit phishing kit to steal credentials and deploy malware. Ransomware and fraud campaigns are surging, with Fortinet reporting nearly 8.8K ransomware victims in 2025 and Europol dismantling a €50 million cryptocurrency fraud ring. Notable disclosures include ClickUp’s exposure of customer emails in feature flags, the arrest of a Scattered Spider member, and the Xygeni compromise linked to a residential proxy botnet. Organizations are urged to patch trending CVEs immediately, verify supply chains, tighten SaaS access controls, and treat routine logins and pipeline runs as potentially hostile.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"threat-landscape-overview\"\u003eThreat Landscape Overview\u003c/h2\u003e\n\n\u003cp\u003eThe current cybersecurity environment has shifted from initial breaches to sustained occupation. Attackers are operating with professional precision, scaling operations across SaaS ecosystems, Linux kernels, and open-source development pipelines. The gap between vulnerability disclosure and active exploitation continues to shrink, demanding immediate defensive action.\u003c/p\u003e\n\n\u003ch2 id=\"critical-vulnerabilities-active-exploitation\"\u003eCritical Vulnerabilities \u0026amp; Active Exploitation\u003c/h2\u003e\n\n\u003cp\u003eSeveral high-severity flaws are under active exploitation or have been patched with critical severity ratings:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ecPanel \u0026amp; WHM (CVE-2026-41940):\u003c/strong\u003e A critical authentication bypass flaw is actively exploited in the wild. Successful attacks have resulted in complete website wipes, the deployment of Mirai botnet variants, and the installation of the Sorry ransomware strain.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLinux Kernel Copy Fail (CVE-2026-31431):\u003c/strong\u003e Added to CISA’s Known Exploited Vulnerabilities catalog, this logic bug enables reliable privilege escalation via a 732-byte Python exploit. It executes entirely in memory, leaves no disk traces, and facilitates container escapes across Kubernetes clusters.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGitHub RCE (CVE-2026-3854):\u003c/strong\u003e A critical flaw allowing authenticated users to achieve remote code execution or full server compromise with a single git push command. Microsoft patched the issue within six days, but exploitation could expose nearly all major enterprise codebases and internal secrets.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAdditional Trending CVEs:\u003c/strong\u003e The article highlights numerous other critical vulnerabilities, including CVE-2026-42208 (LiteLLM SQL injection), CVE-2026-32202 (Microsoft Windows Shell), CVE-2026-26268 (Cursor CI RCE), CVE-2026-35414 (OpenSSH), CVE-2026-6770 (Firefox/Tor privacy), CVE-2026-42167 (ProFTPD), CVE-2026-24908 (OpenEMR), CVE-2026-6807 (GRASSMARLIN), CVE-2026-7363 (Google Chrome), CVE-2026-7322 (Firefox), CVE-2026-6100 (CPython), CVE-2026-0204 (SonicWall), CVE-2026-42511 (FreeBSD), CVE-2026-40684 (Exim), CVE-2026-5402 (Wireshark), CVE-2026-42520 (Jenkins), CVE-2026-3008 (Notepad++), and CODESYS vulnerabilities.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"supply-chain-saas-threats\"\u003eSupply Chain \u0026amp; SaaS Threats\u003c/h2\u003e\n\n\u003cp\u003eThreat actors are increasingly weaponizing trusted development environments and legitimate workflows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTeamPCP Supply Chain Campaign:\u003c/strong\u003e The group continues its \u0026ldquo;Mini Shai Hulud\u0026rdquo; attacks across npm, PyPI, and Packagist. They weaponize CI/CD pipelines to push poisoned software versions under real developer identities, making detection extremely difficult. Immediate mitigation requires rotating pipeline credentials and reducing credential scoping.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSaaS Ecosystem Occupation:\u003c/strong\u003e Groups like Cordial Spider and Snarky Spider use vishing to bypass MFA and capture single sign-on credentials. They move laterally across SaaS environments, remove MFA devices, delete alert emails, and mask traffic using residential proxy networks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVECT 2.0 Ransomware:\u003c/strong\u003e This ransomware-as-a-service platform partners with TeamPCP and BreachForums. It permanently wipes large files instead of encrypting them, making data recovery impossible even for the attackers. The platform covers the full operational lifecycle for affiliates.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"malware-phishing-fraud-campaigns\"\u003eMalware, Phishing, \u0026amp; Fraud Campaigns\u003c/h2\u003e\n\n\u003cp\u003eA diverse array of malicious tools and deceptive campaigns are targeting users and organizations globally:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDEEP#DOOR Backdoor:\u003c/strong\u003e A stealthy Python framework enabling persistent remote command execution, system reconnaissance, keylogging, webcam/microphone access, and system disruption like MBR overwriting and Defender disabling.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAndroid Surveillance \u0026amp; Malware:\u003c/strong\u003e KidsProtect is marketed on the clear web as a subscription-based spyware tool offering near-total phone control. KYCShadow masquerades as a bank verification app distributed via WhatsApp, using Firebase and VPN manipulation to harvest credentials and OTPs.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePhishing \u0026amp; Social Engineering:\u003c/strong\u003e Spear-phishing campaigns target Pakistani government entities using VS Code tunnel abuse for persistence. Calendly-themed phishing kits fingerprint visitors and steal credentials. Microsoft Teams phishing impersonates IT help desks following email bombing. The AI-integrated Bluekit phishing kit offers over 40 templates and AI drafting assistants. GovTrap and FEMITBOT scale global fraud through fake government portals and Telegram Mini Apps.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDesktop \u0026amp; Credential Theft:\u003c/strong\u003e A Pastebin-hosted PowerShell script steals Telegram Desktop sessions. KarstoRAT RAT is distributed via fake Roblox game marketplaces, enabling reconnaissance, audio monitoring, and token theft. ClickUp disclosed an exposure of 893 customer emails and an API token in feature flag configurations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"industry-law-enforcement-developments\"\u003eIndustry \u0026amp; Law Enforcement Developments\u003c/h2\u003e\n\n\u003cp\u003eLaw enforcement and industry initiatives are responding to the escalating threat landscape:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eArrests \u0026amp; Takedowns:\u003c/strong\u003e Finnish authorities arrested a 19-year-old Scattered Spider member attempting to board a flight to Japan. Europol dismantled a €50 million cryptocurrency fraud ring operating call centers in Albania, arresting ten individuals and seizing significant assets.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInfrastructure \u0026amp; DDoS Attacks:\u003c/strong\u003e Canonical’s Ubuntu servers were knocked offline by a sustained, cross-border DDoS attack claimed by the pro-Iranian hacktivist group 313 Team. A Brazilian anti-DDoS firm, Huge Networks, enabled a botnet that attacked other ISPs, later claiming it was a competitor intrusion.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAI \u0026amp; Security Tooling:\u003c/strong\u003e Cisco released the open-source Model Provenance Kit to verify AI model origins and detect modifications. OpenAI launched Advanced Account Security with YubiKey integration for ChatGPT. Google updated Android’s Credential Manager to issue cryptographically verified email credentials without OTPs.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eData Leaks \u0026amp; Compromises:\u003c/strong\u003e Truffle Security found 8,792 unique secrets leaked across 22 million public projects on cloud development environments like CodePen and StackBlitz. The Xygeni GitHub compromise is linked to a proxy botnet using hacked ASUS and TP-Link routers running a ShadowLink beacon. EnOcean SmartServer flaws allow arbitrary command execution and ASLR bypasses on building management systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"strategic-recommendations\"\u003eStrategic Recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes with actionable guidance for security teams. Organizations must patch critical vulnerabilities immediately, starting with those marked as actively exploited. Supply chains require rigorous verification, and pipeline credentials must be rotated and scoped narrowly. SaaS access controls need tightening, and every routine login or pipeline execution should be treated as potentially hostile. Security programs must shift from compliance theater to measurable maturity, focusing on concrete behavioral targets and business risk alignment. Small defensive habits now will prevent major operational disruptions later.\u003c/p\u003e\n","keyPoints":["A critical cPanel vulnerability (CVE-2026-41940) is actively being exploited in the wild, resulting in complete website wipes and the deployment of botnet variants and ransomware.","The Linux kernel's Copy Fail flaw (CVE-2026-31431) has been added to CISA's KEV catalog because it reliably triggers privilege escalation and enables container escapes without leaving disk traces.","TeamPCP continues its supply chain attacks across npm, PyPI, and Packagist by weaponizing legitimate CI/CD pipelines to push poisoned software versions under real developer identities.","A critical GitHub vulnerability (CVE-2026-3854) allows authenticated users to achieve remote code execution or full server compromise with a single git push command."],"insights":["The Copy Fail Linux kernel flaw (CVE-2026-31431) executes entirely in memory without writing to disk, making traditional forensic detection impossible while reliably triggering privilege escalation 100% of the time.","TeamPCP weaponizes legitimate CI/CD pipelines to push poisoned software under real developer identities, forcing organizations to immediately rotate pipeline credentials and reduce credential scoping rather than relying on standard vulnerability scanners.","Threat actors like Cordial Spider bypass MFA through vishing and conceal lateral movement across SaaS environments by routing traffic through residential proxy networks to mimic legitimate home user behavior.","VECT 2.0 ransomware permanently destroys data by wiping large files instead of encrypting them, making recovery impossible even for the attackers themselves.","Nearly 8,800 unique secrets have been leaked across 22 million public projects on cloud development environments like CodePen and CodeSandbox, exposing a critical blind spot in traditional secret monitoring."],"referencedReports":[{"title":"VECT 2.0: An Insider Perspective on the New Ransomware Variant","url":"https://labs.beazley.security/articles/vect-2-0-an-insider-perspective-on-the-new-ransomware-variant","publisher":"Beazley Security","context":"The article cites this analysis to explain that VECT 2.0 wipes large files instead of encrypting them, making recovery impossible even for the attackers."},{"title":"ICS Advisory 2026-118-01","url":"https://www.cisa.gov/news-events/ics-advisories/icsa-26-118-01","publisher":"CISA","context":"The article references this advisory when listing CVE-2026-6807, which impacts GRASSMARLIN software."},{"title":"Fortinet 2026 Global Threat Landscape Report","url":"https://www.fortinet.com/corporate/about-us/newsroom/press-releases/2026/fortinet-2026-global-threat-landscape-report-reveals-surge-in-ai-enabled-cybercrime-increase-ransomware-victims-year-over-year","publisher":"Fortinet","context":"The article uses this report to cite data showing a 389% year-over-year increase in ransomware victims in 2025, driven by AI-enabled cybercrime toolkits."},{"title":"KYCShadow: An Android Banking Malware Exploiting Fake KYC Workflows for Credential and OTP Theft","url":"https://www.cyfirma.com/research/kycshadow-an-android-banking-malware-exploiting-fake-kyc-workflows-for-credential-and-otp-theft/","publisher":"CYFIRMA","context":"The article references this research to detail how the malware functions as a multi-stage dropper that uses native code obfuscation and Firebase-based remote execution to harvest sensitive user data."},{"title":"Exploiting EnOcean SmartServer to Attack Connected Building Management Systems","url":"https://claroty.com/team82/research/exploiting-enocean-smartserver-to-attack-connected-building-management-systems","publisher":"Claroty Team82","context":"The article cites this research to explain how crafted LON IP-852 messages can bypass ASLR protections and execute arbitrary commands on legacy building automation devices."}],"body":"\u003cp\u003eThis week’s cybersecurity landscape is defined by rapid, high-impact attacks targeting foundational infrastructure and trusted development pipelines. A critical cPanel vulnerability is actively being exploited, leading to complete website wipes and the deployment of botnet variants and ransomware. Simultaneously, the Linux kernel’s Copy Fail flaw has been confirmed as actively exploited, offering reliable privilege escalation and container escapes without leaving disk traces.\u003c/p\u003e\n\n\u003cp\u003eAttackers are also leveraging a severe GitHub remote code execution flaw to compromise enterprise codebases and internal secrets. Beyond infrastructure, threat actors are increasingly operating within SaaS environments and weaponizing legitimate CI/CD pipelines to distribute poisoned software under real developer identities. The VECT 2.0 ransomware variant further escalates the threat by permanently wiping files instead of encrypting them, making data recovery impossible even for the attackers. Organizations must prioritize immediate patching of these critical vulnerabilities and rigorously verify their supply chain credentials to mitigate these accelerating threats.\u003c/p\u003e\n"},{"n":17,"title":"Progress Patches Critical MOVEit Automation Bug Enabling Authentication Bypass","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/progress-patches-critical-moveit.html","time":"16:34","priority":"MUST READ","score":95,"group":"F","groupColor":"#60a5fa","tldr":"Progress Software has released urgent patches for MOVEit Automation to address critical authentication bypass and privilege escalation vulnerabilities, advising immediate updates since no workarounds exist and previous flaws in the platform were exploited by ransomware groups.","briefOverview":"\u003cp\u003eProgress Software has released urgent updates to address two critical security vulnerabilities in MOVEit Automation. The first flaw, CVE-2026-4670, carries a CVSS score of 9.8 and enables authentication bypass. The second flaw, CVE-2026-5174, has a CVSS score of 7.7 and allows privilege escalation through improper input validation. These issues specifically target the service backend command port interfaces and could lead to unauthorized administrative access and data exposure. Airbus SecLab researchers discovered and reported the vulnerabilities, but no temporary workarounds are available. Users must immediately upgrade to patched versions to secure their environments.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eProgress Software has issued security updates for MOVEit Automation to resolve two distinct vulnerabilities affecting the platform. The first issue, designated as CVE-2026-4670, is a critical authentication bypass flaw with a CVSS score of 9.8. The second issue, CVE-2026-5174, is a high-severity improper input validation vulnerability scoring 7.7 that enables privilege escalation. Progress Software explicitly warns that these critical and high vulnerabilities impact the service backend command port interfaces. Successful exploitation could result in unauthorized system access, full administrative control, and sensitive data exposure. The vulnerabilities impact multiple software releases, including versions up to 2025.1.4, 2025.0.8, and 2024.1.7. Each affected release has corresponding fixed versions available, specifically 2025.1.5, 2025.0.9, and 2024.1.8. Researchers from Airbus SecLab, including Anaïs Gantet, Delphine Gourdou, Quentin Liddell, and Matteo Ricordeau, are credited with identifying and reporting these flaws. The vendor has confirmed that there are no alternative workarounds to mitigate the issues without applying the official patches. While Progress Software has not reported any active exploitation in the wild, immediate remediation is strongly advised. This urgency stems from the history of MOVEit Transfer being targeted by ransomware groups such as Cl0p. Organizations should prioritize applying the available updates to prevent potential compromise.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eVulnerability Overview\u003c/strong\u003e\nProgress Software has released critical updates to address two security flaws within MOVEit Automation. The first flaw, identified as CVE-2026-4670, is a critical authentication bypass vulnerability with a CVSS score of 9.8. The second flaw, CVE-2026-5174, is a high-severity improper input validation issue scoring 7.7 that facilitates privilege escalation. Both vulnerabilities specifically target the service backend command port interfaces.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eImpact and Exploitation\u003c/strong\u003e\nProgress Software warns that exploitation of these flaws could lead to unauthorized access, complete administrative control, and significant data exposure. The advisory emphasizes that these are critical and high-severity issues requiring immediate attention. There are currently no workarounds available to mitigate the vulnerabilities without applying the official vendor patches.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAffected Versions and Remediation\u003c/strong\u003e\nThe security flaws impact the following software versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMOVEit Automation versions less than or equal to 2025.1.4, which are fixed in version 2025.1.5.\u003c/li\u003e\n\u003cli\u003eMOVEit Automation versions less than or equal to 2025.0.8, which are fixed in version 2025.0.9.\u003c/li\u003e\n\u003cli\u003eMOVEit Automation versions less than or equal to 2024.1.7, which are fixed in version 2024.1.8.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eResearch Credits and Threat Context\u003c/strong\u003e\nAirbus SecLab researchers Anaïs Gantet, Delphine Gourdou, Quentin Liddell, and Matteo Ricordeau have been officially credited with discovering and reporting these vulnerabilities. Although Progress Software has not confirmed any in-the-wild exploitation, the vendor strongly urges immediate patching. This recommendation is heavily influenced by previous MOVEit Transfer flaws that were actively exploited by ransomware gangs like Cl0p. Organizations must apply the fixes promptly to maintain optimal security posture.\u003c/p\u003e\n","keyPoints":["Progress Software has released updates to address two critical security flaws in MOVEit Automation that could allow authentication bypass and privilege escalation.","The vulnerabilities, identified as CVE-2026-4670 and CVE-2026-5174, affect multiple software versions and require immediate patching as no workarounds exist.","Airbus SecLab researchers discovered and reported the flaws, which Progress Software advises users to fix promptly given the platform's history of ransomware exploitation.","The fixes are available in MOVEit Automation versions 2025.1.5, 2025.0.9, and 2024.1.8 for the affected releases."],"insights":["The vulnerabilities specifically exploit the service backend command port interfaces, indicating that internal service communication channels are the primary attack vector rather than the standard web interface.","Progress Software explicitly states there are no workarounds, meaning security teams cannot rely on temporary mitigations and must treat immediate version upgrades as the only remediation path.","The authentication bypass flaw carries a CVSS score of 9.8, signaling a critical vulnerability that likely enables remote exploitation without requiring valid credentials or user interaction.","Although Progress reports no current in-the-wild exploitation, the advisory explicitly ties the urgency to historical ransomware campaigns like Cl0p that previously targeted MOVEit products."],"referencedReports":[{"title":"MOVEit Automation Critical Security Alert Bulletin April 2026 CVE-2026-4670 CVE-2026-5174","url":"https://community.progress.com/s/article/MOVEit-Automation-Critical-Security-Alert-Bulletin-April-2026-CVE-2026-4670-CVE-2026-5174","publisher":"Progress Software","context":"The article cites this link as the official advisory detailing the critical vulnerabilities and required patches."},{"title":"Airbus SecLab Research Credits","url":"https://airbus-seclab.github.io/#2026","publisher":"Airbus SecLab","context":"The article links to this page to credit the researchers who discovered and reported the two vulnerabilities."}],"body":"\u003cp\u003eProgress Software has released urgent updates to address two critical security vulnerabilities in MOVEit Automation. The first flaw, CVE-2026-4670, carries a CVSS score of 9.8 and enables authentication bypass. The second flaw, CVE-2026-5174, has a CVSS score of 7.7 and allows privilege escalation through improper input validation. These issues specifically target the service backend command port interfaces and could lead to unauthorized administrative access and data exposure. Airbus SecLab researchers discovered and reported the vulnerabilities, but no temporary workarounds are available. Users must immediately upgrade to patched versions to secure their environments.\u003c/p\u003e\n"},{"n":18,"title":"Bitwarden CLI Hijacked on npm: Bun-Staged Credential Stealer Targets Developers, GitHub Actions, and AI Tools","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/bitwarden-cli-hijacked-on-npm-bun-staged-credential-stealer-targets-developers-github-actions-and-ai-tools","time":"17:20","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"A compromised Bitwarden CLI package deployed a silent credential stealer via a malicious preinstall hook that harvested SSH keys, cloud credentials, and AI tool configurations while weaponizing stolen GitHub tokens to inject malicious workflows. This attack demonstrates that strict network egress controls in CI/CD pipelines are essential to prevent credential exfiltration and stop supply chain pivots.","briefOverview":"\u003cp\u003eThe official Bitwarden CLI package was compromised when an attacker hijacked a maintainer\u0026rsquo;s GitHub account and exploited npm\u0026rsquo;s OIDC Trusted Publishing to publish a malicious version. The compromised release included a silent preinstall hook that downloaded the Bun JavaScript runtime and executed a credential stealer targeting SSH keys, cloud credentials, and AI tool configurations. Stolen data was encrypted and exfiltrated to a domain impersonating Checkmarx, with fallback channels leveraging legitimate GitHub API infrastructure. StepSecurity\u0026rsquo;s AI Package Analyst detected the attack by identifying anomalous behavioral signals like a newly introduced install script and unexpected runtime downloads. The incident highlights how OIDC Trusted Publishing lacks branch-level restrictions and how strict network egress controls in CI/CD pipelines are essential to prevent credential exfiltration.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe @bitwarden/cli@2026.4.0 package was compromised and republished on npm after an attacker hijacked a Bitwarden engineer\u0026rsquo;s GitHub account. This represents the first confirmed supply chain attack utilizing npm\u0026rsquo;s OIDC Trusted Publishing, where the attacker rewrote the publish-cli.yml workflow to exchange a GitHub Actions OIDC token for an npm auth token. Because npm Trusted Publishing lacks branch-level restrictions and no approval gate was configured, the malicious package was successfully published. The compromised release featured a preinstall hook that silently downloaded the Bun JavaScript runtime and executed a 9.7 MB obfuscated credential stealer. The malware targeted SSH keys, npm and GitHub tokens, AWS and GCP credentials, shell history, environment variables, and AI tool configuration files like those for Claude Code and Cursor. Exfiltrated data was encrypted with AES-256-GCM and sent to audit.checkmarx.cx, a domain registered to impersonate Checkmarx. The attacker also implemented resilient fallback channels using GitHub commit history and victim account repositories to maintain command-and-control persistence. StepSecurity\u0026rsquo;s AI Package Analyst detected the compromise by flagging three critical signals: a newly introduced preinstall script, undocumented files with no git history, and anomalous runtime downloads during installation. A forensic version mismatch between the declared package version and internal metadata further confirmed the artifact was injected rather than rebuilt from source. StepSecurity\u0026rsquo;s Harden Runner successfully blocked the exfiltration attempt in a controlled test by enforcing network egress restrictions. The article provides detailed indicators of compromise and recommends immediate remediation steps, including uninstalling the malicious version, rotating all credentials, auditing GitHub repositories for injected workflows, and enforcing \u0026ndash;ignore-scripts in CI/CD pipelines. Pinning exact package versions and utilizing automated package checks are strongly advised to prevent future supply chain incidents.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncident Overview\u003c/strong\u003e\nThe @bitwarden/cli@2026.4.0 package was compromised and republished on npm, marking the first confirmed supply chain attack that leveraged npm\u0026rsquo;s OIDC Trusted Publishing mechanism. An attacker hijacked a Bitwarden engineer\u0026rsquo;s GitHub account and created a new branch in the bitwarden/clients repository. The attacker staged a prebuilt malicious tarball and rewrote the publish-cli.yml workflow to exchange a GitHub Actions OIDC token for an npm auth token via the registry API. Because npm Trusted Publishing does not support branch-level restrictions and no required approval gate was configured on the workflow, the compromised package was successfully published. The attacker subsequently deleted the workflow runs, branch, and release tag, leaving the published package as the primary artifact.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eMalware Execution and Targets\u003c/strong\u003e\nThe compromised package shipped with a preinstall hook that silently downloaded the Bun JavaScript runtime and executed a 9.7 MB obfuscated credential stealer. Using Bun instead of Node.js was a deliberate evasion tactic designed to bypass EDR rules and security scanners tuned to flag suspicious node child processes. The payload contained three primary collectors running in parallel:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDeveloper Credential Sweep: Targeted SSH keys, Git credentials, shell history, npm tokens, GitHub tokens, AWS/GCP credentials, and .env files.\u003c/li\u003e\n\u003cli\u003eAI Tool Credential Targeting: Explicitly enumerated Claude Code, Kiro, Cursor, Codex CLI, and Aider, treating ~/.claude.json and MCP server configurations as first-class exfiltration targets.\u003c/li\u003e\n\u003cli\u003eGitHub Actions Runner Targeting: Activated when GITHUB_ACTIONS=true was detected, retrieving GitHub CLI session tokens and validating them against the GitHub API.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eExfiltration and Persistence\u003c/strong\u003e\nCollected data was encrypted with AES-256-GCM and exfiltrated to audit.checkmarx.cx, a domain registered to impersonate the security vendor Checkmarx. When a valid GitHub token was discovered, the malware weaponized it to enumerate repositories, extract Actions secrets, and inject malicious workflows into every accessible repository. The attacker also implemented a resilient fallback command-and-control architecture consisting of three channels:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCommit-embedded attacker PATs: Base64-encoded tokens hidden in commit messages were decoded and used to create repositories under the attacker\u0026rsquo;s account.\u003c/li\u003e\n\u003cli\u003eSigned domain rotation: RSA-signed blobs prefixed with beautifulcastle in commit messages allowed the attacker to rotate C2 domains without updating the payload.\u003c/li\u003e\n\u003cli\u003eVictim account exfiltration: Stolen GitHub tokens were used to create repositories under the victim\u0026rsquo;s own account, making traffic indistinguishable from normal API usage.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eDetection and Forensic Indicators\u003c/strong\u003e\nStepSecurity\u0026rsquo;s AI Package Analyst detected the compromise by running behavioral analysis on the package diff. Three signals triggered an immediate CRITICAL verdict:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA preinstall script appeared for the first time in the package\u0026rsquo;s history.\u003c/li\u003e\n\u003cli\u003eTwo undocumented files, bw_setup.js and bw1.js, were introduced with no presence in the project\u0026rsquo;s git history.\u003c/li\u003e\n\u003cli\u003eThe loader downloaded the Bun runtime from GitHub during installation, representing anomalous network activity for a CLI tool.\nForensic analysis revealed a version mismatch where package.json declared version 2026.4.0 but embedded metadata still referenced 2026.3.0, confirming the artifact was injected rather than rebuilt from source. In a controlled test, StepSecurity\u0026rsquo;s Harden Runner blocked the exfiltration connection to audit.checkmarx.cx and logged the anomalous Bun download.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eRemediation and Defense Recommendations\u003c/strong\u003e\nOrganizations are advised to immediately uninstall the compromised version and downgrade to @bitwarden/cli@2026.3.0 using \u0026ndash;ignore-scripts. All credentials on affected machines and CI/CD pipelines must be rotated, including GitHub tokens, npm tokens, SSH keys, cloud credentials, and AI tool API keys. GitHub repositories accessible to affected accounts should be audited for malicious workflow injections and unauthorized branch creation. Network logs must be checked for connections to audit.checkmarx.cx or its associated IP address. To prevent future incidents, developers should pin exact package versions, enforce \u0026ndash;ignore-scripts in automated builds, and utilize automated package checks that block known malicious releases. StepSecurity\u0026rsquo;s Harden Runner egress enforcement and AI Package Analyst monitoring provide defense-in-depth capabilities to detect and block supply chain compromises before they impact production environments.\u003c/p\u003e\n","keyPoints":["The @bitwarden/cli@2026.4.0 package was compromised and republished on npm after an attacker hijacked a maintainer's GitHub account and exploited OIDC Trusted Publishing.","The malicious release included a preinstall hook that silently downloaded the Bun runtime and executed a credential stealer targeting SSH keys, cloud credentials, and AI tool configurations.","Exfiltrated data was sent to a domain impersonating Checkmarx, while fallback command-and-control channels utilized legitimate GitHub API infrastructure to maintain persistence.","StepSecurity detected the attack by flagging anomalous behavioral signals such as a newly introduced install script, undocumented files, and unexpected runtime downloads during package installation."],"insights":["npm's OIDC Trusted Publishing lacks branch-level restrictions, allowing attackers to publish malicious packages from compromised branches without approval gates.","The credential stealer explicitly enumerates and exfiltrates data from AI coding assistants like Claude Code and Cursor, treating AI configuration files as first-class targets alongside traditional secrets.","A version mismatch between the declared package version and internal metadata serves as a reliable forensic indicator that an artifact was injected rather than rebuilt from source.","The malware uses the Bun JavaScript runtime instead of Node.js to evade security
