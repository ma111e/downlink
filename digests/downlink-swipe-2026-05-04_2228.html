 detections, as EDR rules and scanners are often tuned to flag suspicious node processes but miss bun."],"referencedReports":[],"body":"\u003cp\u003eThe official Bitwarden CLI package was compromised when an attacker hijacked a maintainer\u0026rsquo;s GitHub account and exploited npm\u0026rsquo;s OIDC Trusted Publishing to publish a malicious version. The compromised release included a silent preinstall hook that downloaded the Bun JavaScript runtime and executed a credential stealer targeting SSH keys, cloud credentials, and AI tool configurations. Stolen data was encrypted and exfiltrated to a domain impersonating Checkmarx, with fallback channels leveraging legitimate GitHub API infrastructure. StepSecurity\u0026rsquo;s AI Package Analyst detected the attack by identifying anomalous behavioral signals like a newly introduced install script and unexpected runtime downloads. The incident highlights how OIDC Trusted Publishing lacks branch-level restrictions and how strict network egress controls in CI/CD pipelines are essential to prevent credential exfiltration.\u003c/p\u003e\n"},{"n":19,"title":"TeamPCP Injects Two-Stage Credential Stealer into xinference PyPI Package","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/teampcp-injects-two-stage-credential-stealer-into-xinference-pypi-package","time":"17:20","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"TeamPCP compromised three versions of the xinference PyPI package with a credential-stealing payload that executes immediately upon import and exfiltrates sensitive data to an attacker-controlled domain. Affected users must immediately downgrade to a safe version, rotate all exposed credentials, and monitor network logs for unauthorized outbound connections.","briefOverview":"\u003cp\u003eOn April 22, 2026, three consecutive versions of the xinference PyPI package were compromised with a two-stage credential-stealing payload injected directly into the \u003ccode\u003e__init__.py\u003c/code\u003e file. The malicious code executes immediately upon module import, harvesting SSH keys, cloud credentials, environment variables, and cryptocurrency wallets before compressing the data into a file named \u003ccode\u003elove.tar.gz\u003c/code\u003e. This archive is exfiltrated via a \u003ccode\u003ecurl\u003c/code\u003e POST request to an attacker-controlled domain, leaving no artifacts on disk due to automatic cleanup. The threat actor, identified as TeamPCP, iterated on the injection technique across the three versions within a single day, progressively hiding the payload inside a legitimate function and refining its execution method. Unlike previous campaigns by the same actor, this payload lacks encryption and sends the stolen data as a plain compressed archive. All three compromised versions have been yanked from PyPI, and affected systems require immediate credential rotation and network log auditing to mitigate the breach. Security researchers independently analyzed the payloads and documented the full technical breakdown of the attack chain.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOn April 22, 2026, three consecutive releases of the xinference PyPI package—versions 2.6.0, 2.6.1, and 2.6.2—were confirmed to contain a malicious credential-stealing payload. The attack vector involves code injected directly into the package\u0026rsquo;s \u003ccode\u003e__init__.py\u003c/code\u003e file, which executes unconditionally whenever the module is imported or the CLI is invoked. There are no \u003ccode\u003e.pth\u003c/code\u003e files or install hooks involved, meaning the payload fires immediately during standard dependency resolution or service startup. The threat actor behind the compromise is identified as TeamPCP, the same group responsible for recent supply chain attacks on litellm and telnyx.\u003c/p\u003e\n\n\u003cp\u003eThe attacker demonstrated rapid operational refinement by iterating on the injection technique across the three published versions. Version 2.6.0 placed the malicious code at module scope, using a detached \u003ccode\u003esubprocess.Popen\u003c/code\u003e call to execute a base64-encoded payload while suppressing all output. Version 2.6.1 moved the injection inside the legitimate \u003ccode\u003e_install()\u003c/code\u003e function, and execution was switched to a synchronous \u003ccode\u003eexec()\u003c/code\u003e call. Version 2.6.2 restored the async subprocess execution while keeping the payload hidden inside the helper function, achieving optimal stealth and non-blocking behavior.\u003c/p\u003e\n\n\u003cp\u003eThe first-stage wrapper script decodes a second-stage credential collector and pipes it into a fresh Python interpreter via stdin. This collector performs initial system reconnaissance by executing commands like \u003ccode\u003ehostname\u003c/code\u003e, \u003ccode\u003ewhoami\u003c/code\u003e, and \u003ccode\u003eip addr\u003c/code\u003e, and captures environment variables. It then systematically targets a wide array of sensitive data, including SSH private keys, AWS credentials retrieved from disk, environment variables, and live IMDS API calls. The script also harvests Kubernetes service account tokens, GCP and Azure configuration files, Docker registry credentials, and various developer tokens.\u003c/p\u003e\n\n\u003cp\u003eAfter collecting the data, the collector writes the output to a temporary file, compresses it into \u003ccode\u003elove.tar.gz\u003c/code\u003e, and exfiltrates it via a \u003ccode\u003ecurl\u003c/code\u003e POST request to \u003ccode\u003ewhereisitat.lucyatemysuperbox.space\u003c/code\u003e. The exfiltration uses a custom header \u003ccode\u003eX-QT-SR: 14\u003c/code\u003e to route the data on the attacker\u0026rsquo;s server. Unlike TeamPCP\u0026rsquo;s previous campaigns, this payload does not use AES-256-CBC or RSA-4096 encryption, sending the archive as plain text. The Python \u003ccode\u003eTemporaryDirectory\u003c/code\u003e context manager automatically cleans up all artifacts after the upload completes. All three compromised versions have been yanked from PyPI. Affected users are advised to immediately downgrade to versions prior to 2.6.0, audit outbound network logs for connections to the C2 domain, and rotate all exposed credentials. Security tools like StepSecurity\u0026rsquo;s Harden-Runner have demonstrated the ability to block the exfiltration attempt in controlled environments, while their Compromised Package Check and PyPI Cooldown Check features provide proactive defense mechanisms for CI/CD pipelines.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eOn April 22, 2026, the open-source LLM inference framework \u003ccode\u003exinference\u003c/code\u003e was compromised through a supply chain attack involving three consecutive PyPI package versions. The malicious payload, attributed to the threat actor TeamPCP, executes immediately upon module import and systematically harvests credentials from cloud environments, development systems, and local configurations. All compromised versions have been yanked, and remediation requires immediate credential rotation and network monitoring.\u003c/p\u003e\n\n\u003ch3 id=\"attack-vector-and-injection-methodology\"\u003eAttack Vector and Injection Methodology\u003c/h3\u003e\n\n\u003cp\u003eThe malicious code is embedded directly into \u003ccode\u003exinference/__init__.py\u003c/code\u003e, the package\u0026rsquo;s top-level initialization module. Because Python automatically executes this file upon import, the payload triggers unconditionally across multiple scenarios:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDirect imports in application code\u003c/li\u003e\n\u003cli\u003eCLI invocation of the xinference tool\u003c/li\u003e\n\u003cli\u003eService startup sequences\u003c/li\u003e\n\u003cli\u003eDownstream dependency resolution\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe attacker iterated on the injection technique across three versions within a single day, demonstrating live operational refinement:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eVersion 2.6.0:\u003c/strong\u003e The payload was placed at module scope, using a detached \u003ccode\u003esubprocess.Popen\u003c/code\u003e call to execute a base64-encoded script while suppressing all output.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVersion 2.6.1:\u003c/strong\u003e The injection was moved inside the legitimate \u003ccode\u003e_install()\u003c/code\u003e function, and execution was switched to a synchronous \u003ccode\u003eexec()\u003c/code\u003e call. The subprocess method was commented out, suggesting experimental testing.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVersion 2.6.2:\u003c/strong\u003e The payload remained inside the helper function, but the async \u003ccode\u003esubprocess.Popen\u003c/code\u003e method was restored alongside a new \u003ccode\u003etempfile\u003c/code\u003e import, achieving optimal stealth and non-blocking execution.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"payload-architecture-and-execution-flow\"\u003ePayload Architecture and Execution Flow\u003c/h3\u003e\n\n\u003cp\u003eThe attack utilizes a two-stage execution model designed to evade detection and maximize data collection. The first stage acts as a wrapper that decodes the second stage and manages the exfiltration process.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe wrapper script contains the actor marker \u003ccode\u003e# hacked by teampcp\u003c/code\u003e and imports necessary modules like \u003ccode\u003eos\u003c/code\u003e, \u003ccode\u003ebase64\u003c/code\u003e, \u003ccode\u003etempfile\u003c/code\u003e, and \u003ccode\u003esubprocess\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eIt defines a \u003ccode\u003estart()\u003c/code\u003e function that decodes the second-stage collector and pipes it into a fresh Python interpreter via stdin using \u003ccode\u003esys.executable\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eThe collector\u0026rsquo;s output is captured into a temporary file, compressed into \u003ccode\u003elove.tar.gz\u003c/code\u003e, and uploaded via \u003ccode\u003ecurl\u003c/code\u003e POST to \u003ccode\u003ehttps://whereisitat.lucyatemysuperbox.space/\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eThe exfiltration includes a custom routing header, \u003ccode\u003eX-QT-SR: 14\u003c/code\u003e, and relies on Python\u0026rsquo;s \u003ccode\u003eTemporaryDirectory\u003c/code\u003e context manager to automatically delete all artifacts after the upload completes.\u003c/li\u003e\n\u003cli\u003eNotably, this campaign lacks the AES-256-CBC and RSA-4096 OAEP encryption layers found in TeamPCP\u0026rsquo;s previous litellm and telnyx compromises, indicating a simplified toolkit or copycat variant.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"credential-harvesting-capabilities\"\u003eCredential Harvesting Capabilities\u003c/h3\u003e\n\n\u003cp\u003eThe second-stage collector performs comprehensive reconnaissance and targets a wide array of sensitive data commonly found in AI and cloud development environments.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSystem Reconnaissance:\u003c/strong\u003e Executes commands to gather hostname, user identity, OS details, IP addresses, routes, and environment variables.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSSH and Host Keys:\u003c/strong\u003e Scans user home directories and \u003ccode\u003e/root\u003c/code\u003e for SSH private keys, authorized keys, known hosts, and host configuration files. It also walks \u003ccode\u003e/etc/ssh\u003c/code\u003e to collect host keys.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCloud Credentials:\u003c/strong\u003e Targets AWS credentials from disk, environment variables, and live IMDS API calls. It actively queries AWS Secrets Manager and SSM Parameter Store using harvested keys.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eKubernetes and Container Security:\u003c/strong\u003e Harvests Kubernetes service account tokens, CA certificates, kubeconfig files, and Docker registry configurations from multiple paths.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDeveloper and CI/CD Assets:\u003c/strong\u003e Scans for \u003ccode\u003e.env\u003c/code\u003e files across deep directory structures, npm and PyPI tokens, Vault tokens, \u003ccode\u003e.netrc\u003c/code\u003e files, database passwords, and CI/CD configuration files like \u003ccode\u003e.gitlab-ci.yml\u003c/code\u003e and \u003ccode\u003eJenkinsfile\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCryptocurrency Wallets:\u003c/strong\u003e Targets Bitcoin, Ethereum, Cardano, and Solana wallet files and validator keys.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSystem and TLS Files:\u003c/strong\u003e Collects \u003ccode\u003e/etc/passwd\u003c/code\u003e, \u003ccode\u003e/etc/shadow\u003c/code\u003e, authentication logs, and TLS/SSL private keys and certificates.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"remediation-and-defensive-measures\"\u003eRemediation and Defensive Measures\u003c/h3\u003e\n\n\u003cp\u003eImmediate action is required for any system that installed the compromised versions.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePackage Mitigation:\u003c/strong\u003e Users must downgrade to versions prior to 2.6.0 using \u003ccode\u003epip install \u0026quot;xinference\u0026lt;2.6.0\u0026quot;\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eArtifact Verification:\u003c/strong\u003e Administrators should check \u003ccode\u003e/tmp\u003c/code\u003e for leftover \u003ccode\u003elove.tar.gz\u003c/code\u003e files, though the payload\u0026rsquo;s cleanup mechanism typically removes them.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNetwork Auditing:\u003c/strong\u003e Outbound logs must be scanned for HTTPS connections to \u003ccode\u003ewhereisitat.lucyatemysuperbox.space\u003c/code\u003e to confirm exfiltration.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCredential Rotation:\u003c/strong\u003e All accessible credentials must be rotated, including AWS keys, Kubernetes tokens, SSH private keys, GCP/Azure credentials, \u003ccode\u003e.env\u003c/code\u003e values, Docker tokens, and developer API keys. AWS Secrets Manager and SSM Parameter Store secrets must also be rotated due to live API harvesting.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAutomated Defense:\u003c/strong\u003e StepSecurity\u0026rsquo;s Harden-Runner successfully blocked the exfiltration in a controlled test by intercepting the outbound \u003ccode\u003ecurl\u003c/code\u003e POST request. Their Compromised Package Check and PyPI Cooldown Check features provide proactive safeguards by flagging known malicious versions and enforcing waiting periods for newly published packages.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["TeamPCP injected a two-stage credential-stealing payload into the xinference PyPI package versions 2.6.0, 2.6.1, and 2.6.2.","The malicious code executes immediately upon module import, harvesting SSH keys, cloud credentials, environment variables, and crypto wallets before exfiltrating the data as love.tar.gz to an attacker-controlled domain.","The attacker iterated on the injection technique across the three versions, progressively hiding the payload inside a legitimate function and refining the execution method to avoid detection.","All three compromised versions have been yanked from PyPI, and affected systems require immediate credential rotation and network log auditing."],"insights":["The attacker iterated on the injection technique across three versions within a single day, moving the payload from module scope to inside a helper function and toggling between synchronous `exec()` and asynchronous `subprocess.Popen` to balance stealth with execution reliability.","Unlike previous TeamPCP campaigns that used AES-256-CBC and RSA-4096 OAEP encryption, this payload exfiltrates data as a plain `tar.gz` archive, suggesting a simplified toolkit or copycat actor despite the identical injection methodology.","The credential collector actively harvests live AWS role credentials via IMDS API calls rather than relying solely on static configuration files, allowing attackers to obtain temporary credentials even if no `.aws/credentials` file exists on the system."],"referencedReports":[],"body":"\u003cp\u003eOn April 22, 2026, three consecutive versions of the xinference PyPI package were compromised with a two-stage credential-stealing payload injected directly into the \u003ccode\u003e__init__.py\u003c/code\u003e file. The malicious code executes immediately upon module import, harvesting SSH keys, cloud credentials, environment variables, and cryptocurrency wallets before compressing the data into a file named \u003ccode\u003elove.tar.gz\u003c/code\u003e. This archive is exfiltrated via a \u003ccode\u003ecurl\u003c/code\u003e POST request to an attacker-controlled domain, leaving no artifacts on disk due to automatic cleanup. The threat actor, identified as TeamPCP, iterated on the injection technique across the three versions within a single day, progressively hiding the payload inside a legitimate function and refining its execution method. Unlike previous campaigns by the same actor, this payload lacks encryption and sends the stolen data as a plain compressed archive. All three compromised versions have been yanked from PyPI, and affected systems require immediate credential rotation and network log auditing to mitigate the breach. Security researchers independently analyzed the payloads and documented the full technical breakdown of the attack chain.\u003c/p\u003e\n"},{"n":20,"title":"elementary-data Compromised on PyPI and GHCR: Forged Release Pushed via GitHub Actions Script Injection","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/elementary-data-compromised-on-pypi-and-ghcr-forged-release-pushed-via-github-actions-script-injection","time":"17:20","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"Attackers compromised the elementary-data supply chain by exploiting an unsafe GitHub Actions workflow interpolation through a malicious PR comment, enabling them to forge a release and distribute a credential-stealing payload to PyPI and the GitHub Container Registry, highlighting the critical risk of unvalidated event inputs in CI/CD pipelines.","briefOverview":"\u003cp\u003eA malicious version of the elementary-data package, specifically 0.23.3, was compromised and distributed through PyPI and the GitHub Container Registry. Attackers exploited an unsafe GitHub Actions workflow by injecting malicious code into a pull request comment, which triggered a script injection vulnerability. This allowed them to forge a release commit and dispatch the legitimate publishing pipeline without touching the master branch. The compromised wheel contained a .pth file that executed a credential-stealing payload on every Python startup. The same attack pushed a trojaned Docker image tagged as latest, exposing unpinned container deployments. The payload harvested SSH keys, cloud credentials, and cryptocurrency wallets before exfiltrating the data to a command-and-control server. The Elementary team and community researchers quickly identified the breach, removed the malicious artifacts, and published a clean replacement version. Defensive tools like Harden-Runner and package cooldown checks are now deployed to block similar supply chain attacks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe elementary-data Python package and its associated Docker image were compromised through a sophisticated supply chain attack leveraging GitHub Actions script injection. The attacker injected malicious code into a pull request comment, exploiting an unsafe workflow that interpolated the comment body directly into a shell script. This triggered a stager that executed with the repository\u0026rsquo;s GITHUB_TOKEN, allowing the attacker to forge a release commit and tag. The compromised commit bypassed traditional branch protections and directly dispatched the legitimate publishing pipeline. On April 24, 2026, the malicious version 0.23.3 was uploaded to PyPI, containing a .pth file that executes import statements at Python interpreter startup. The corresponding Docker image was pushed to GitHub Container Registry with both 0.23.3 and latest tags, ensuring that unpinned deployments automatically pulled the trojaned build. The payload utilized a three-stage encryption scheme to deliver a comprehensive credential harvester. This collector targeted multiple data categories, including SSH keys, cloud provider credentials, container configurations, cryptocurrency wallets, and system files. All harvested data was compressed into a tar-gzipped archive and exfiltrated via a single HTTP POST request to a command-and-control domain. Community researchers crisperik and H-Max quickly identified the anomaly and escalated the report, prompting the Elementary team to yank the malicious release and publish version 0.23.4. StepSecurity has since integrated the compromised package and command-and-control domain into its threat intelligence and defensive controls. Harden-Runner now blocks outbound connections to the exfiltration server, while PR-time checks prevent the introduction of the malicious version into downstream codebases.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncident Overview\u003c/strong\u003e\nThe elementary-data package and its Docker image were compromised through a multi-stage supply chain attack. The breach exploited a script injection vulnerability within the project\u0026rsquo;s GitHub Actions workflows. Attackers successfully forged a release and distributed malicious artifacts to PyPI and the GitHub Container Registry. The incident was reported and remediated rapidly by community researchers and the maintainer team.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAttack Vector and Execution\u003c/strong\u003e\nThe initial compromise began with a malicious comment injected into an open pull request. The project\u0026rsquo;s update_pylon_issue.yml workflow contained an unsafe line that expanded the comment body directly into a shell script. This triggered a handle_comment job that executed a curl | bash stager using the repository\u0026rsquo;s GITHUB_TOKEN. The workflow remained in an in-progress state for over two hours, providing cover for subsequent malicious actions. The attacker used the token to forge a commit and tag, bypassing branch protections and pull request requirements. They then dispatched the legitimate Release package workflow against the forged commit to trigger the publishing pipeline.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eMalicious Artifacts and Payload Analysis\u003c/strong\u003e\nThe compromised wheel for version 0.23.3 contained a top-level elementary.pth file. Python automatically discovers and executes .pth files at interpreter startup, causing the payload to run on every Python invocation. The file contained a base64-wrapped line that decoded through two additional layers of XOR encryption. Stage three delivered a comprehensive credential and secret harvester. The collector targeted multiple data categories, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIdentity materials like SSH keys, Git credentials, and authentication tokens.\u003c/li\u003e\n\u003cli\u003eCloud provider secrets from AWS, GCP, and Azure via file reads and live API calls.\u003c/li\u003e\n\u003cli\u003eContainer orchestration configs, Kubernetes secrets, and ServiceAccount tokens.\u003c/li\u003e\n\u003cli\u003eCryptocurrency wallet files and validator keypairs across multiple blockchains.\u003c/li\u003e\n\u003cli\u003eSystem files, shell histories, and configuration databases.\nAll collected data was compressed into a tar-gzipped archive and exfiltrated via a single HTTP POST request. The attacker directed traffic to a custom domain with a specific HTTP header.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eContainer Image Exposure\u003c/strong\u003e\nThe same workflow run that published to PyPI also built and pushed a multi-arch Docker image. The image was tagged with both 0.23.3 and latest, carrying the identical malicious payload. Teams relying on unpinned image tags or default latest references automatically pulled the trojaned build. This created widespread exposure across Kubernetes deployments, Docker Compose stacks, and Argo CD applications.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eRemediation and Defensive Measures\u003c/strong\u003e\nThe Elementary team removed the malicious artifacts from PyPI and GHCR within hours of the community report. A clean replacement version, 0.23.4, was published to restore trust in the supply chain. StepSecurity has integrated the incident into its threat intelligence platform. The compromised package version and command-and-control domain are now actively monitored. Harden-Runner blocks outbound connections to the exfiltration server across all protected workflows. PR-time checks prevent the introduction of the malicious version into downstream repositories. Package cooldown mechanisms flag newly published versions for review before they are trusted.\u003c/p\u003e\n","keyPoints":["Attackers exploited an unsafe GitHub Actions workflow interpolation by injecting malicious code into a pull request comment, triggering a stager that executed with the repository's GITHUB_TOKEN.","The compromised workflow forged a release commit and tag, dispatching the legitimate publishing pipeline to distribute a wheel containing a .pth file that executed a credential-stealing payload on Python startup.","The same attack pushed a trojaned Docker image to GitHub Container Registry, causing all unpinned pulls of the :latest or 0.23.3 tags to install the malicious build.","The payload harvested SSH keys, cloud credentials, container configurations, and cryptocurrency wallets before compressing and exfiltrating the data to a command-and-control domain."],"insights":["The malicious .pth file executes import statements at Python interpreter startup, causing the payload to run on every Python invocation across any installed environment rather than only when the library is explicitly imported.","The attacker maintained runner access by exploiting a hung workflow that ran for over two and a half hours, using its in-progress status as cover to dispatch the legitimate publishing pipeline against a forged commit.","Compromising the :latest container tag creates a silent exposure risk for teams that pin Python dependencies but leave Docker images unpinned, as they will automatically pull the trojaned build without version awareness.","Defensive controls like Harden-Runner's global block list and PR-time package cooldown checks can immediately block C2 callbacks and prevent the introduction of known-malicious or newly published packages into the codebase."],"referencedReports":[],"body":"\u003cp\u003eA malicious version of the elementary-data package, specifically 0.23.3, was compromised and distributed through PyPI and the GitHub Container Registry. Attackers exploited an unsafe GitHub Actions workflow by injecting malicious code into a pull request comment, which triggered a script injection vulnerability. This allowed them to forge a release commit and dispatch the legitimate publishing pipeline without touching the master branch. The compromised wheel contained a .pth file that executed a credential-stealing payload on every Python startup. The same attack pushed a trojaned Docker image tagged as latest, exposing unpinned container deployments. The payload harvested SSH keys, cloud credentials, and cryptocurrency wallets before exfiltrating the data to a command-and-control server. The Elementary team and community researchers quickly identified the breach, removed the malicious artifacts, and published a clean replacement version. Defensive tools like Harden-Runner and package cooldown checks are now deployed to block similar supply chain attacks.\u003c/p\u003e\n"},{"n":10,"title":"Backdoored PyTorch Lightning package drops credential stealer","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/backdoored-pytorch-lightning-package-drops-credential-stealer/","time":"17:15","priority":"MUST READ","score":92,"group":null,"groupColor":null,"tldr":"A compromised version of the PyTorch Lightning package distributed on PyPI contained a hidden credential-stealing payload targeting browser data, environment files, and cloud services. Users who imported version 2.6.3 must immediately rotate all secrets, as the package has been reverted to a safe release.","briefOverview":"\u003cp\u003eA malicious version of the PyTorch Lightning package, specifically version 2.6.3, was distributed on the Python Package Index containing a hidden credential-stealing payload. The attack triggers automatically whenever the library is imported into a Python environment. Upon execution, the package silently spawns a background process that downloads a JavaScript runtime and executes a heavily obfuscated script. This payload, identified by Microsoft Defender as ShaiWorm, targets environment files, browser data, API keys, and cloud service credentials across major providers like AWS, Azure, and GCP. Microsoft Threat Intelligence reported that the malicious activity affected a small number of devices and was successfully contained. The package maintainer, Lightning AI, has reverted the distribution to the safe version 2.6.1 and strongly advises all affected users to immediately rotate their compromised secrets. Developers are currently investigating how the build and release pipeline was breached to prevent further compromise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA malicious version of the PyTorch Lightning deep learning framework was distributed on the Python Package Index. Version 2.6.3 of the package contained a hidden execution chain designed to steal sensitive credentials. The developer publicly disclosed the supply-chain attack on April 30. When users import the compromised library, the malicious code triggers automatically without any additional interaction. The payload silently spawns a background process to avoid detection. This background process downloads a JavaScript runtime known as Bun version 1.3.13 from GitHub. It then executes an 11.4 megabyte heavily obfuscated JavaScript file named router_runtime.js. Microsoft Threat Intelligence detected the malicious routine using Defender and prevented it from executing on customer systems. The company flagged the malware as ShaiWorm and promptly notified the package maintainer. The payload actively targets environment files, API keys, secrets, GitHub tokens, and data stored in Chrome, Firefox, and Brave browsers. It also interacts directly with cloud service APIs from AWS, Azure, and GCP to extract credentials. The malware supports arbitrary system command execution to facilitate broader compromise. Microsoft telemetry indicates that the malicious activity impacted a small number of devices. The threat appears to have been contained within a narrow set of environments. Lightning AI has reverted the package on PyPI to the safe version 2.6.1. The maintainer strongly recommends that anyone who imported version 2.6.3 immediately rotate all secrets, keys, and tokens. The publishers are currently investigating how the build and release pipeline was breached. All recent releases will undergo a full audit for similar payloads.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eAttack Vector and Disclosure\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eA malicious version of the PyTorch Lightning deep learning framework was published on the Python Package Index. Version 2.6.3 of the package contained a hidden execution chain designed to steal sensitive credentials. The developer publicly disclosed the supply-chain attack on April 30. PyTorch Lightning is a widely used framework for pretraining and fine-tuning AI models, accumulating over 11 million downloads last month.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003ePayload Execution Mechanics\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eWhen users import the compromised library, the malicious code triggers automatically without any additional interaction. The payload silently spawns a background process to avoid detection. This background process downloads a JavaScript runtime known as Bun version 1.3.13 from GitHub. It then executes an 11.4 megabyte heavily obfuscated JavaScript file named router_runtime.js.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTarget Scope and Capabilities\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe payload actively targets environment files, API keys, secrets, GitHub tokens, and data stored in Chrome, Firefox, and Brave browsers. It also interacts directly with cloud service APIs from AWS, Azure, and GCP to extract credentials. The malware supports arbitrary system command execution to facilitate broader compromise. Key capabilities include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAutomatic background process spawning upon import\u003c/li\u003e\n\u003cli\u003eDownload and execution of an 11.4 MB obfuscated JavaScript payload\u003c/li\u003e\n\u003cli\u003eDirect API interaction with major cloud providers for credential theft\u003c/li\u003e\n\u003cli\u003eArbitrary system command execution for lateral movement\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eDetection Scope and Containment\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eMicrosoft flagged the malware as ShaiWorm and promptly notified the package maintainer. Microsoft telemetry indicates that the malicious activity impacted a small number of devices. The threat appears to have been contained within a narrow set of environments. The company successfully prevented the malicious routine from causing widespread damage.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eRemediation and Ongoing Investigation\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eLightning AI has reverted the package on PyPI to the safe version 2.6.1. The maintainer strongly recommends that anyone who imported version 2.6.3 immediately rotate all secrets, keys, and tokens. The publishers are currently investigating how the build and release pipeline was breached. All recent releases will undergo a full audit for similar payloads. Users will be notified through all available communication channels regarding the audit results.\u003c/p\u003e\n","keyPoints":["Version 2.6.3 of the PyTorch Lightning package on PyPI contained a hidden execution chain that silently downloaded and executed a credential-stealing payload upon import.","The malicious payload, detected by Microsoft Defender as ShaiWorm, targets environment files, browser data, API keys, and cloud service credentials.","Lightning AI has reverted the package to version 2.6.1 and strongly recommends that affected users immediately rotate all secrets.","Maintainers are investigating how the build and release pipeline was breached and will audit recent releases for similar payloads."],"insights":["The malicious payload triggers automatically upon a standard import lightning statement, requiring no additional user interaction to initiate the credential theft chain.","Rather than relying on Python-based exfiltration, the attack downloads and executes a JavaScript runtime to run an 11.4 MB obfuscated script, evading typical Python-focused security monitoring.","The malware actively interacts with major cloud provider APIs to extract cloud credentials, significantly expanding the breach scope beyond local environment files and browser data.","Microsoft Defender successfully contained the threat to a narrow set of environments and flagged it as ShaiWorm, demonstrating how EDR telemetry can rapidly isolate novel supply chain compromises."],"referencedReports":[{"title":"Security Advisory","url":"https://github.com/Lightning-AI/pytorch-lightning/issues/21689","publisher":"Lightning AI","context":"The article references this GitHub issue as the official security advisory that discloses the hidden execution chain and credential-stealing payload."}],"body":"\u003cp\u003eA malicious version of the PyTorch Lightning package, specifically version 2.6.3, was distributed on the Python Package Index containing a hidden credential-stealing payload. The attack triggers automatically whenever the library is imported into a Python environment. Upon execution, the package silently spawns a background process that downloads a JavaScript runtime and executes a heavily obfuscated script. This payload, identified by Microsoft Defender as ShaiWorm, targets environment files, browser data, API keys, and cloud service credentials across major providers like AWS, Azure, and GCP. Microsoft Threat Intelligence reported that the malicious activity affected a small number of devices and was successfully contained. The package maintainer, Lightning AI, has reverted the distribution to the safe version 2.6.1 and strongly advises all affected users to immediately rotate their compromised secrets. Developers are currently investigating how the build and release pipeline was breached to prevent further compromise.\u003c/p\u003e\n"},{"n":21,"title":"CanisterSprawl: pgserve Compromised on npm: Malicious Versions Harvest Credentials and Exfiltrate to a Decentralized ICP Canister","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/pgserve-compromised-on-npm-malicious-versions-harvest-credentials","time":"17:20","priority":"MUST READ","score":92,"group":null,"groupColor":null,"tldr":"Compromised versions 1.1.11 through 1.1.13 of the pgserve npm package contain a credential-harvesting malware that exfiltrates secrets to an ICP canister and automatically propagates across developer environments. Organizations must immediately avoid these versions and pin dependencies to the safe release 1.1.10 or earlier.","briefOverview":"\u003cp\u003eOn April 21, 2026, malicious versions 1.1.11 through 1.1.13 of the pgserve npm package were published to the registry. These compromised versions inject a 1,143-line credential-harvesting script that executes automatically during the npm install process. The malware scans environment variables and local filesystems to collect sensitive data, including cloud credentials, SSH keys, and browser passwords. Stolen information is encrypted with RSA-4096 and AES-256 before being exfiltrated to a decentralized ICP canister and a secondary webhook. The attack also functions as a supply chain worm, automatically locating developer tokens to infect and publish additional packages. Detection was achieved through StepSecurity\u0026rsquo;s AI Package Analyst and Harden Runner, which successfully captured and blocked the exfiltration attempts. Organizations are advised to avoid these compromised versions and pin dependencies to the safe release 1.1.10 or earlier.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article details a supply chain compromise affecting the pgserve npm package, an embedded PostgreSQL server used for development environments. Malicious versions 1.1.11, 1.1.12, and 1.1.13 were published on April 21, 2026, without corresponding git tags in the upstream repository. Each compromised version replaces the clean baseline by injecting a postinstall hook that executes a 1,143-line CommonJS script named check-env.js. The script deliberately appends || true to its execution command to mask any failures and ensure the installation appears successful. Once triggered, the malware performs six distinct malicious operations. It harvests environment variables matching approximately forty regex patterns and collects filesystem secrets from the developer\u0026rsquo;s home directory. Collected data includes package manager tokens, SSH keys, cloud credentials, cryptocurrency wallets, and decrypted browser passwords. The stolen information is encrypted using a hybrid RSA-4096 and AES-256 scheme before transmission. Exfiltration occurs through two channels: a primary decentralized ICP canister designed to resist takedowns, and a secondary webhook endpoint. The malware also operates as a supply chain worm by scanning for npm and PyPI tokens to automatically infect and publish other packages under the victim\u0026rsquo;s control. Detection was triggered by the StepSecurity AI Package Analyst, which flagged all three versions with a Critical verdict. Runtime validation using Harden Runner confirmed the execution chain and successfully blocked both exfiltration domains via its global block list. The last legitimate release, version 1.1.10, was published on April 17, 2026, and remains the only safe version. The compromise has been disclosed to the maintainer through a GitHub issue.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003eAttack Overview and Timeline\u003c/p\u003e\n\n\u003cp\u003eOn April 21, 2026, malicious versions 1.1.11, 1.1.12, and 1.1.13 of the pgserve npm package were published to the registry. The last legitimate release, version 1.1.10, was tagged on April 17, 2026. None of the compromised versions have corresponding git tags in the upstream repository. The compromise was disclosed to the maintainer via GitHub issue #25.\u003c/p\u003e\n\n\u003cp\u003eMalware Mechanics and Payload\u003c/p\u003e\n\n\u003cp\u003eThe compromised tarballs inject exactly two new files: scripts/check-env.js and scripts/public.pem. The package.json file is modified to add a postinstall hook that runs node scripts/check-env.cjs || true. The || true clause ensures the installation completes cleanly regardless of script success or failure. The injected script contains 1,143 lines of CommonJS JavaScript and executes six distinct operations.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnvironment Variable Harvesting: The malware scans environment variables against approximately forty regex patterns, including tokens, secrets, keys, passwords, and cloud provider prefixes. In controlled analysis, it successfully harvested thirty-eight matching variables.\u003c/li\u003e\n\u003cli\u003eFilesystem Secret Collection: The script reads credential files from the developer\u0026rsquo;s home directory, including .npmrc, .netrc, SSH keys, cloud credentials, crypto wallets, and Chrome browser password databases.\u003c/li\u003e\n\u003cli\u003ePayload Encryption: Stolen data is encrypted using a random AES-256-CBC session key, which is then wrapped with an RSA-4096 public key bundled in the package.\u003c/li\u003e\n\u003cli\u003eDual-Channel Exfiltration: Encrypted payloads are sent to a primary ICP canister at cjn37-uyaaa-aaaac-qgnva-cai.raw.icp0.io/drop and a secondary webhook at telemetry.api-monitor.com/v1/telemetry. The ICP canister was selected specifically because blockchain-hosted endpoints cannot be seized or taken down.\u003c/li\u003e\n\u003cli\u003eSupply Chain Worm Propagation: The malware searches for npm and PyPI tokens to automatically infect other packages. It bumps patch versions, copies the malicious scripts, adds the postinstall hook, and publishes the compromised packages.\u003c/li\u003e\n\u003cli\u003ePyPI Cross-Ecosystem Spreading: If a PyPI token is found, the malware injects .pth files into the Python site-packages directory to execute on every interpreter invocation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDetection and Validation\u003c/p\u003e\n\n\u003cp\u003eThe StepSecurity AI Package Analyst flagged all three compromised versions with a Critical verdict. The analysis identified credential theft, environment exfiltration, browser password theft, and network exfiltration. Runtime validation was conducted using Harden Runner in a controlled GitHub Actions environment. The runner\u0026rsquo;s process monitor confirmed the postinstall hook spawned the malicious script as a direct child of the npm install process. Harden Runner\u0026rsquo;s eBPF-based network monitor captured and blocked both exfiltration domains. Both domains were immediately added to the Harden-Runner global block list, providing automatic protection across all protected workflows without configuration changes.\u003c/p\u003e\n\n\u003cp\u003eIndicators of Compromise\u003c/p\u003e\n\n\u003cp\u003eThe following indicators are explicitly listed in the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCompromised packages: pgserve@1.1.11, pgserve@1.1.12, pgserve@1.1.13\u003c/li\u003e\n\u003cli\u003eSafe version: pgserve@1.1.10 and earlier\u003c/li\u003e\n\u003cli\u003eExfiltration domains: cjn37-uyaaa-aaaac-qgnva-cai.raw.icp0.io and telemetry.api-monitor.com\u003c/li\u003e\n\u003cli\u003eMalicious files: scripts/check-env.js and scripts/public.pem\u003c/li\u003e\n\u003cli\u003eExecution trigger: postinstall hook\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Compromised versions 1.1.11, 1.1.12, and 1.1.13 of the pgserve npm package execute a malicious postinstall script that harvests environment variables, filesystem secrets, and browser passwords.","The malware encrypts stolen data using RSA-4096 and AES-256 before exfiltrating it to a decentralized Internet Computer Protocol canister and a secondary webhook.","The attack operates as a supply chain worm that automatically locates npm and PyPI tokens to infect other packages controlled by the compromised developer account.","StepSecurity's AI Package Analyst flagged all three compromised versions with a Critical verdict, and Harden Runner successfully blocked the exfiltration network connections during controlled analysis."],"insights":["Attackers deliberately chose an ICP canister for data exfiltration to ensure persistence, as blockchain-hosted endpoints cannot be seized or taken down by traditional law enforcement or domain takedowns.","The malware uses a `|| true` clause in its postinstall hook to mask execution failures, ensuring compromised installations appear successful to developers and CI/CD pipelines.","Harden-Runner's global block list provides immediate, zero-configuration protection across all protected workflows as soon as new IOCs are added, eliminating the need for per-repository updates.","The attack cross-pollinates ecosystems by injecting `.pth` files into Python site-packages when PyPI tokens are detected, replicating the propagation technique from the Shai-Hulud campaign."],"referencedReports":[{"title":"Widespread supply chain compromise impacting npm ecosystem","url":"https://www.cisa.gov/news-events/alerts/2025/09/23/widespread-supply-chain-compromise-impacting-npm-ecosystem","publisher":"CISA","context":"The article references this CISA advisory as the official documentation for the .pth file injection technique used in the Shai-Hulud npm supply chain campaign."}],"body":"\u003cp\u003eOn April 21, 2026, malicious versions 1.1.11 through 1.1.13 of the pgserve npm package were published to the registry. These compromised versions inject a 1,143-line credential-harvesting script that executes automatically during the npm install process. The malware scans environment variables and local filesystems to collect sensitive data, including cloud credentials, SSH keys, and browser passwords. Stolen information is encrypted with RSA-4096 and AES-256 before being exfiltrated to a decentralized ICP canister and a secondary webhook. The attack also functions as a supply chain worm, automatically locating developer tokens to infect and publish additional packages. Detection was achieved through StepSecurity\u0026rsquo;s AI Package Analyst and Harden Runner, which successfully captured and blocked the exfiltration attempts. Organizations are advised to avoid these compromised versions and pin dependencies to the safe release 1.1.10 or earlier.\u003c/p\u003e\n"},{"n":6,"title":"Microsoft confirms April Windows updates cause backup failures","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-confirms-backup-failures-caused-by-vulnerable-driver-block/","time":"10:40","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"Microsoft's April 2026 security update blocks the vulnerable psmounterex.sys driver to prevent privilege escalation attacks, but this inadvertently breaks third-party backup applications that rely on it for mounting and restoring images. Administrators should update their backup software to newer versions rather than uninstalling the Windows patch to maintain system security.","briefOverview":"\u003cp\u003eMicrosoft has confirmed that its April 2026 security updates are causing widespread failures in third-party backup applications. The issue stems from a security hardening change that added the psmounterex.sys driver to the Vulnerable Driver Blocklist. This driver was blocked to mitigate CVE-2023-43896, a high-severity buffer overflow vulnerability that could allow attackers to escalate privileges or execute arbitrary code.\u003c/p\u003e\n\n\u003cp\u003eConsequently, backup software relying on this driver now experiences Volume Shadow Copy Service timeouts when attempting to mount or restore disk images. Affected products include Macrium Reflect, Acronis Cyber Protect Cloud, UrBackup Server, and NinjaOne Backup across Windows 10, Windows 11, and Windows Server environments. Microsoft explicitly advises against uninstalling the patch and recommends updating to newer versions of the affected backup applications.\u003c/p\u003e\n\n\u003cp\u003eAdministrators can verify the block by checking for Event ID 3077 in the Code Integrity Operational log. While full image backups may still succeed, mounting and restore operations will consistently fail until the software is updated.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has officially confirmed that the April 2026 security updates are triggering failures in third-party backup applications. The root cause is a security hardening modification that placed the psmounterex.sys kernel driver onto the Microsoft Vulnerable Driver Blocklist. This action was taken to defend against CVE-2023-43896, a critical buffer overflow flaw that enables privilege escalation and arbitrary code execution.\u003c/p\u003e\n\n\u003cp\u003eAs a direct result, backup solutions utilizing this driver encounter Volume Shadow Copy Service timeouts during snapshot creation. The affected software ecosystem includes Macrium Reflect, Acronis Cyber Protect Cloud, UrBackup Server, and NinjaOne Backup. These failures span across Windows 10, Windows 11, and Windows Server operating systems.\u003c/p\u003e\n\n\u003cp\u003eWhen the driver is blocked by Windows Code Integrity enforcement, users will notice that backup applications cannot mount image files as virtual drives. Attempting to browse or restore from these images will trigger errors or prolonged timeouts. Users may also see specific error messages stating that the VSS service timed out during snapshot creation.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, the Event Viewer will record Event ID 3077 in the Code Integrity Operational log, indicating the driver was blocked in enforcement mode. Despite these mount failures, the creation of full image backups typically remains unaffected. Microsoft strongly advises IT administrators not to uninstall or pause the April update.\u003c/p\u003e\n\n\u003cp\u003eInstead, organizations should deploy the latest versions of their backup applications, which incorporate updated drivers with the necessary protections. To confirm the block, administrators should navigate to the CodeIntegrity Operational log and search for Event ID 3077 paired with Policy ID {D2BDA982-CCF6-4344-AC5B-0B44427B6816}. This issue follows other recent April update complications, including BitLocker recovery prompts on Windows Server 2025 and out-of-band fixes for update installation failures and restart loops.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"overview-of-the-issue\"\u003eOverview of the Issue\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft has officially confirmed that its April 2026 security updates are causing widespread failures in third-party backup applications. The core problem involves a compatibility conflict between the updated operating system and legacy kernel drivers used by backup vendors. This conflict specifically disrupts the mounting and restoration of backup images across multiple Windows platforms.\u003c/p\u003e\n\n\u003ch3 id=\"root-cause-and-security-context\"\u003eRoot Cause and Security Context\u003c/h3\u003e\n\n\u003cp\u003eThe disruption originates from a security hardening change introduced in the April patch. Microsoft added the psmounterex.sys driver to its Vulnerable Driver Blocklist to mitigate a high-severity buffer overflow vulnerability. This flaw is tracked as CVE-2023-43896 and allows attackers to escalate privileges or execute arbitrary code on compromised systems. By blocking this driver, Microsoft aims to prevent exploitation targeting the driver\u0026rsquo;s inherent security weaknesses.\u003c/p\u003e\n\n\u003ch3 id=\"affected-systems-and-software\"\u003eAffected Systems and Software\u003c/h3\u003e\n\n\u003cp\u003eThe compatibility issue impacts a wide range of backup solutions that depend on the psmounterex.sys driver for snapshot and image management. Notable affected products include Macrium Reflect, Acronis Cyber Protect Cloud, UrBackup Server, and NinjaOne Backup. These failures are not limited to a single operating system, as they occur across Windows 10, Windows 11, and Windows Server environments. The issue specifically targets applications that utilize the Volume Shadow Copy Service for creating and managing disk images.\u003c/p\u003e\n\n\u003ch3 id=\"symptoms-and-detection\"\u003eSymptoms and Detection\u003c/h3\u003e\n\n\u003cp\u003eWhen the vulnerable driver is blocked by Windows Code Integrity enforcement, users will experience distinct operational failures. Administrators can identify the issue through the following indicators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBackup applications will be unable to mount backup image files as virtual drives.\u003c/li\u003e\n\u003cli\u003eAny attempt to browse or restore data from these images will result in errors or prolonged timeouts.\u003c/li\u003e\n\u003cli\u003eUsers may encounter specific error messages indicating that the Microsoft VSS service timed out during snapshot creation.\u003c/li\u003e\n\u003cli\u003eThe system will also log VSS_E_BAD_STATE errors in the event logs.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eTo verify the block, IT administrators can inspect the Event Viewer. They should navigate to Applications and Services Logs, then Microsoft, Windows, CodeIntegrity, and finally the Operational log. The presence of Event ID 3077 with Policy ID {D2BDA982-CCF6-4344-AC5B-0B44427B6816} confirms that the psmounterex driver was blocked in enforcement mode. Despite these mount failures, the creation of full image backups typically remains unaffected and will still succeed.\u003c/p\u003e\n\n\u003ch3 id=\"microsoft-s-official-guidance\"\u003eMicrosoft\u0026rsquo;s Official Guidance\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft has issued clear directives for administrators managing impacted systems. The company explicitly advises against uninstalling or pausing the April 2026 security update. Removing the patch would leave systems exposed to the CVE-2023-43896 vulnerability. Instead, Microsoft recommends that customers update their backup applications to the latest versions. These newer software releases utilize updated drivers that include the required security protections against the blocklist. Organizations should validate their current driver configurations against the Microsoft Vulnerable Driver Blocklist to ensure ongoing protection.\u003c/p\u003e\n\n\u003ch3 id=\"related-april-2026-update-issues\"\u003eRelated April 2026 Update Issues\u003c/h3\u003e\n\n\u003cp\u003eThe backup driver block is part of a broader set of complications introduced by the April 2026 updates. Earlier in the month, Microsoft warned that some Windows Server 2025 devices might boot into BitLocker recovery mode after installing the KB5082063 update. Additionally, Microsoft released out-of-band updates to address update installation failures and restart loops affecting certain domain controllers. These concurrent issues highlight the complexity of deploying major security patches across enterprise environments.\u003c/p\u003e\n","keyPoints":["Microsoft's April 2026 security update added the psmounterex.sys driver to the Vulnerable Driver Blocklist to mitigate CVE-2023-43896.","This security hardening change causes third-party backup applications relying on the driver to fail when mounting or restoring disk images.","Affected systems will display VSS timeout errors and Event ID 3077 in the Code Integrity Operational log.","Microsoft recommends that users update their backup software to newer versions with updated drivers instead of uninstalling the Windows patch."],"insights":["Full image backups remain functional even when mount operations fail, allowing administrators to preserve data integrity while troubleshooting restore issues.","The definitive detection signature for the blocked driver is Event ID 3077 in the Code Integrity Operational log associated with Policy ID {D2BDA982-CCF6-4344-AC5B-0B44427B6816}.","Microsoft explicitly advises against uninstalling the update, requiring users to update their backup software to newer versions with compatible drivers to remain protected against CVE-2023-43896."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft has confirmed that its April 2026 security updates are causing widespread failures in third-party backup applications. The issue stems from a security hardening change that added the psmounterex.sys driver to the Vulnerable Driver Blocklist. This driver was blocked to mitigate CVE-2023-43896, a high-severity buffer overflow vulnerability that could allow attackers to escalate privileges or execute arbitrary code.\u003c/p\u003e\n\n\u003cp\u003eConsequently, backup software relying on this driver now experiences Volume Shadow Copy Service timeouts when attempting to mount or restore disk images. Affected products include Macrium Reflect, Acronis Cyber Protect Cloud, UrBackup Server, and NinjaOne Backup across Windows 10, Windows 11, and Windows Server environments. Microsoft explicitly advises against uninstalling the patch and recommends updating to newer versions of the affected backup applications.\u003c/p\u003e\n\n\u003cp\u003eAdministrators can verify the block by checking for Event ID 3077 in the Code Integrity Operational log. While full image backups may still succeed, mounting and restore operations will consistently fail until the software is updated.\u003c/p\u003e\n"},{"n":16,"title":"2026: The Year of AI-Assisted Attacks","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/2026-year-of-ai-assisted-attacks.html","time":"11:58","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"AI has democratized and accelerated cyberattacks to the point where traditional patching and signature detection are no longer viable defenses. Security teams must abandon reactive strategies and structurally eliminate entire categories of vulnerability to protect their environments.","briefOverview":"\u003cp\u003eThe article documents a significant shift in the cyber threat landscape in 2025, where AI-assisted tools have dramatically lowered the barrier to entry for conducting sophisticated cyberattacks. Non-technical individuals, including teenagers with no coding background, successfully executed large-scale breaches by leveraging platforms like ChatGPT and Claude Code. This democratization of offensive capabilities coincided with a massive surge in malicious software, as malicious public repository packages grew from 55,000 in 2022 to over 454,000 in 2025. Traditional defensive measures are struggling to keep pace, with the average time to exploit a vulnerability dropping to just 44 days and nearly 29% of critical flaws being actively exploited within 24 hours of disclosure. Furthermore, AI-generated malware is increasingly bypassing static analysis and signature scanners by mimicking legitimate software structures. Because the exploit window is shrinking faster than patching cycles can adapt, the article argues that reactive vulnerability management is no longer sufficient. Instead, organizations must structurally eliminate entire categories of vulnerability by rebuilding open-source dependencies from verified, attributable source code to render these attacks impossible.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eIn December 2025, a 17-year-old in Osaka was arrested for extracting data from over 7 million internet cafe users, a breach motivated solely by a desire to purchase Pokémon cards. Unlike historical cybercriminals, this individual lacked technical expertise, highlighting a broader trend where AI coding assistants have removed the need for specialized programming skills. Throughout 2025, LLM-backed agent systems evolved from error-prone helpers into end-to-end development powerhouses, directly correlating with a doubling of cybercrime frequency and severity. In February, three teenagers used ChatGPT to launch approximately 220,000 fraudulent mobile contracts against Rakuten Mobile, while a single actor in July utilized Claude Code to orchestrate an extortion campaign against 17 organizations in just one month. By December, another individual successfully breached multiple Mexican government agencies, stealing over 195 million taxpayer records using the same AI tools. Quantitative metrics reflect this acceleration, with malicious packages in public repositories surging from 55,000 in 2022 to 454,600 in 2025. Cloud intrusions increased by 35%, and AI-generated phishing campaigns began outperforming human red teams. The time required to develop an exploit for a newly disclosed vulnerability plummeted from over 700 days in 2020 to just 44 days in 2025. In fact, 28.3% of CVEs are now exploited within 24 hours of their public disclosure. Defensive capabilities are simultaneously lagging, as the average time to remediate a critical CVE stretches to 74 days, and 45% of vulnerabilities in large enterprises remain permanently unpatched. The September 2025 Shai-Hulud attack compromised over 500 npm packages and resulted in $8.5 million stolen from Trust Wallet, demonstrating the scale of supply chain risks. AI-crafted malware is now routinely embedding documentation, unit tests, and telemetry-like code to evade static analysis and signature-based detection. With AI coding benchmarks like SWE-bench jumping from 33% resolution in mid-2024 to nearly 81% by late 2025, the gap between offensive and defensive capabilities is widening. The article concludes that organizations can no longer rely on traditional patching cycles or reactive detection. Instead, security teams must structurally eliminate entire vulnerability categories by sourcing dependencies from verified, attributable repositories.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"executive-summary-of-ai-driven-cybersecurity-shifts-in-2025-2026\"\u003eExecutive Summary of AI-Driven Cybersecurity Shifts in 2025-2026\u003c/h2\u003e\n\n\u003cp\u003eThe cybersecurity landscape has undergone a fundamental transformation, driven by the rapid maturation of AI-assisted coding tools. This shift has democratized offensive capabilities, accelerated attack timelines, and overwhelmed traditional defensive mechanisms.\u003c/p\u003e\n\n\u003ch3 id=\"the-democratization-of-cyber-offense\"\u003eThe Democratization of Cyber Offense\u003c/h3\u003e\n\n\u003cp\u003eTraditional barriers to conducting sophisticated cyberattacks have effectively vanished. In December 2025, a 17-year-old in Osaka was arrested for extracting personal data from over 7 million users of Japan\u0026rsquo;s largest internet cafe chain, motivated simply by a desire to buy Pokémon cards. This individual lacked any technical background, mirroring other 2025 incidents where non-experts achieved significant impact. Three teenagers aged 14 to 16 utilized ChatGPT to launch approximately 220,000 fraudulent mobile contracts against Rakuten Mobile. A single actor in July leveraged Claude Code to execute a month-long extortion campaign targeting 17 organizations. By December, another individual used a combination of Claude Code and ChatGPT to breach more than 10 Mexican government agencies, exfiltrating over 195 million taxpayer records. These cases demonstrate that single actors and non-technical individuals can now execute attacks that previously required organized, highly skilled teams.\u003c/p\u003e\n\n\u003ch3 id=\"acceleration-of-malicious-activity-and-exploit-velocity\"\u003eAcceleration of Malicious Activity and Exploit Velocity\u003c/h3\u003e\n\n\u003cp\u003eThe proliferation of AI tools has directly correlated with a dramatic increase in the volume and speed of cyber threats. Malicious packages discovered in public repositories surged from 55,000 in 2022 to 454,600 in 2025, with notable spikes following major AI releases. Cloud intrusions increased by 35% throughout the year, and AI-generated phishing began outperforming human red teams in benchmark tests. More critically, the time-to-exploit metric has collapsed from over 700 days in 2020 to just 44 days in 2025. According to Mandiant’s M-Trends 2026 report, this window has effectively gone negative, with 28.3% of CVEs actively exploited within 24 hours of disclosure. AI coding benchmarks reflect this capability leap, with top models resolving 33% of real GitHub issues in August 2024 and climbing to nearly 81% by December 2025.\u003c/p\u003e\n\n\u003ch3 id=\"the-collapse-of-traditional-defensive-postures\"\u003eThe Collapse of Traditional Defensive Postures\u003c/h3\u003e\n\n\u003cp\u003eDefensive strategies are struggling to match the accelerated pace of offensive operations. The average time to remediate a high- or critical-severity CVE now stands at 74 days, and 45% of vulnerabilities in large enterprises never receive a patch. Supply chain integrity has been severely compromised, exemplified by the September 2025 Shai-Hulud attack that poisoned over 500 npm packages, affected 487 organizations, and resulted in $8.5 million stolen from Trust Wallet. Detection mechanisms are failing against AI-generated malware that mimics legitimate software by including authentic documentation, unit tests, and structured telemetry modules. Static analysis and signature scanners consistently miss these artifacts because they appear indistinguishable from legitimate code. As noted by industry experts, the complexity and scale of vulnerability management have outgrown the operational capabilities of most security teams.\u003c/p\u003e\n\n\u003ch3 id=\"strategic-recommendations-for-structural-defense\"\u003eStrategic Recommendations for Structural Defense\u003c/h3\u003e\n\n\u003cp\u003eThe shrinking exploit window and rising sophistication of AI-assisted attacks render reactive patching and signature-based detection obsolete. Organizations must abandon the strategy of trying to outrun attackers and instead focus on structurally eliminating entire categories of vulnerability. The article advocates for rebuilding open-source dependencies from verified, attributable source code to prevent CI/CD takeovers, dependency confusion, and package distribution attacks. Testing demonstrates that this approach blocked 99.7% of 8,783 malicious npm packages and approximately 98% of malicious Python packages. By ensuring production systems, artifact managers, and developer workstations only consume verified libraries, organizations can neutralize the threat of rapidly evolving AI-crafted malware and supply chain compromises.\u003c/p\u003e\n","keyPoints":["AI-assisted attacks have lowered the barrier to entry, allowing non-technical individuals and single actors to conduct sophisticated cybercrimes that previously required organized teams.","Malicious packages in public repositories surged from 55,000 in 2022 to 454,600 in 2025, while cloud intrusions increased by 35%.","The time to exploit a vulnerability has dropped from over 700 days in 2020 to 44 days in 2025, with 28.3% of CVEs exploited within 24 hours of disclosure.","Traditional detection methods are failing against AI-generated malware, and the average time to remediate a critical CVE is 74 days, leaving 45% of vulnerabilities in large companies unpatched."],"insights":["AI-crafted malware now mimics legitimate telemetry modules complete with documentation and unit tests, causing static analysis and signature scanners to miss malicious code entirely.","Exploit development has outpaced patching to the point where 28.3% of vulnerabilities are actively exploited within 24 hours of disclosure, rendering traditional reactive patching cycles obsolete.","The attacker demographic has fundamentally shifted from technical experts to non-technical individuals, with teenagers successfully executing large-scale breaches using only off-the-shelf LLMs.","Reactive vulnerability management is no longer viable at scale since 45% of critical vulnerabilities in large enterprises remain permanently unpatched, making structural elimination of attack categories the only sustainable defense."],"referencedReports":[{"title":"State of the Software Supply Chain 2026","url":"https://www.sonatype.com/state-of-the-software-supply-chain/2026/open-source-malware","publisher":"Sonatype","context":"Cited as the source for data showing malicious public repository packages grew from 55,000 in 2022 to 454,600 in 2025."},{"title":"Global Threat Report","url":"https://www.crowdstrike.com/global-threat-report/","publisher":"CrowdStrike","context":"Referenced to support the statistic that cloud intrusions increased by 35% throughout 2025."},{"title":"M-Trends 2026","url":"https://cloud.google.com/blog/topics/threat-intelligence/m-trends-2026/","publisher":"Mandiant","context":"Explicitly named as the report that found time-to-exploit has gone negative, with 28.3% of CVEs exploited within 24 hours of disclosure."},{"title":"N-Day Vulnerability Trends","url":"https://flashpoint.io/blog/n-day-vulnerability-trends/","publisher":"Flashpoint","context":"Linked as the source documenting the drop in time-to-exploit from over 700 days in 2020 to 44 days in 2025."},{"title":"Widespread Supply Chain Compromise Impacting npm Ecosystem","url":"https://www.cisa.gov/news-events/alerts/2025/09/23/widespread-supply-chain-compromise-impacting-npm-ecosystem","publisher":"CISA","context":"Cited as the official advisory detailing how 487 organizations had secrets compromised during the Shai-Hulud attack."},{"title":"Mitigating Malware in the Python/NPM Ecosystem","url":"https://www.chainguard.dev/unchained/mitigating-malware-in-the-python-npm-ecosystem","publisher":"Chainguard","context":"Referenced as the technical analysis demonstrating that Chainguard Libraries blocked 99.7% of tested malicious npm packages."}],"body":"\u003cp\u003eThe article documents a significant shift in the cyber threat landscape in 2025, where AI-assisted tools have dramatically lowered the barrier to entry for conducting sophisticated cyberattacks. Non-technical individuals, including teenagers with no coding background, successfully executed large-scale breaches by leveraging platforms like ChatGPT and Claude Code. This democratization of offensive capabilities coincided with a massive surge in malicious software, as malicious public repository packages grew from 55,000 in 2022 to over 454,000 in 2025. Traditional defensive measures are struggling to keep pace, with the average time to exploit a vulnerability dropping to just 44 days and nearly 29% of critical flaws being actively exploited within 24 hours of disclosure. Furthermore, AI-generated malware is increasingly bypassing static analysis and signature scanners by mimicking legitimate software structures. Because the exploit window is shrinking faster than patching cycles can adapt, the article argues that reactive vulnerability management is no longer sufficient. Instead, organizations must structurally eliminate entire categories of vulnerability by rebuilding open-source dependencies from verified, attributable source code to render these attacks impossible.\u003c/p\u003e\n"},{"n":1,"title":"Forbes preliminarily agrees to pay $10 million to settle California wiretapping lawsuit","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/forbes-agrees-10-million-settlement-privacy-class-action","time":"16:49","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"Forbes Media agreed to pay $10 million to settle a California lawsuit alleging its website illegally tracked users via third-party scripts from LinkedIn and Microsoft, requiring improved user notice and control over data collection.","briefOverview":"\u003cp\u003eForbes Media has preliminarily agreed to pay $10 million to resolve a class action lawsuit regarding unauthorized website tracking. The settlement addresses allegations that the company tracked users across the internet without their consent. Plaintiffs claimed Forbes violated California’s Invasion of Privacy Act and Unfair Competition Law.\u003c/p\u003e\n\n\u003cp\u003eThe lawsuit specifically cited the use of pen registers and trap and trace devices to collect unique IP addresses and identifiers. These tracking mechanisms were developed by LinkedIn and Microsoft. The agreement requires Forbes to provide greater notice of its tracking practices.\u003c/p\u003e\n\n\u003cp\u003eIt also mandates new website language that gives California residents more control over data collection and third-party sharing. Eligible class members will receive payouts ranging from \u003cspan class=\"math inline\"\u003e\\(32 to \\)\u003c/span\u003e189 each. A Forbes spokesperson declined to comment on the preliminary agreement.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eForbes Media has preliminarily agreed to pay $10 million and implement changes to its business practices. This settlement resolves a class action lawsuit filed by plaintiffs who alleged the company tracked users across the internet without consent. The preliminary agreement was released on Thursday.\u003c/p\u003e\n\n\u003cp\u003eIt outlines specific operational changes Forbes must make to comply with the settlement terms. The company will provide greater notice regarding its use of tracking technologies. Additionally, Forbes will add explicit language to its website. This new language will give California residents increased control over how their data is collected and shared with third parties.\u003c/p\u003e\n\n\u003cp\u003ePlaintiffs alleged that Forbes violated California’s Invasion of Privacy Act and the Unfair Competition Law. They claimed the website used pen registers and trap and trace devices to gather unique IP addresses and other identifiers. According to the lawsuit, these trackers were developed by LinkedIn and Microsoft.\u003c/p\u003e\n\n\u003cp\u003eThe scripts collected unique identifiers and transmitted them to those companies and other third parties. These entities then fed the data into large databases. The databases were used to compile and analyze specific users’ browsing and shopping habits across the internet.\u003c/p\u003e\n\n\u003cp\u003eThe settlement agreement specifies that class members will receive between \u003cspan class=\"math inline\"\u003e\\(32 and \\)\u003c/span\u003e189. The exact payout amount will depend on the estimated number of claimants. A spokesperson for Forbes Media did not immediately respond to requests for comment.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eSettlement Overview\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eForbes Media has preliminarily agreed to pay $10 million to settle a class action lawsuit. The agreement addresses allegations that the company tracked users across the internet without their consent. The preliminary settlement document was released on Thursday. It mandates significant changes to Forbes\u0026rsquo;s data collection practices.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eLegal Allegations\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003ePlaintiffs claimed that Forbes violated California’s Invasion of Privacy Act. They also alleged violations of the state’s Unfair Competition Law. The core of the lawsuit focused on the unauthorized collection of user data. Plaintiffs argued that the website operated as a wiretapping device under state law.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTechnical Mechanisms\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe lawsuit specifically cited the use of pen registers and trap and trace devices. These tools were used to collect unique IP addresses and other user identifiers. The tracking scripts were developed by LinkedIn and Microsoft. They were embedded directly on the Forbes website.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe scripts transmitted unique identifiers to LinkedIn, Microsoft, and other third parties.\u003c/li\u003e\n\u003cli\u003eThese companies processed the data into large databases.\u003c/li\u003e\n\u003cli\u003eThe databases compiled detailed profiles of specific users’ browsing and shopping habits across the internet.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eSettlement Terms\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe agreement requires Forbes to give users greater notice of its tracking practices. The company will add new language to its website. This language will provide California residents with more control over data collection. It will also govern how data is shared with third parties.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFinancial compensation for the class is estimated at \u003cspan class=\"math inline\"\u003e\\(32 to \\)\u003c/span\u003e189 per member.\u003c/li\u003e\n\u003cli\u003eThe exact payout will be calculated based on the total number of claimants.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eCorporate Response\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eA spokesperson for Forbes Media did not immediately respond to a request for comment. The company has not issued a public statement regarding the preliminary agreement.\u003c/p\u003e\n","keyPoints":["Forbes Media preliminarily agreed to pay $10 million to settle a class action lawsuit alleging unauthorized cross-site tracking of users.","The settlement requires Forbes to provide greater notice of tracking technologies and allow California residents to control how their data is collected and shared.","Plaintiffs claimed Forbes violated California privacy laws by using third-party scripts from LinkedIn and Microsoft to collect unique identifiers and compile browsing habits.","Eligible class members will receive between $32 and $189 based on the total number of claimants."],"insights":["The plaintiffs successfully framed embedded third-party tracking scripts from LinkedIn and Microsoft as \"pen registers and trap and trace devices\" under California’s Invasion of Privacy Act, expanding the legal definition of wiretapping to include non-voice digital data collection.","Third-party scripts actively routed
