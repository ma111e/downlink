 the campaign.\u003c/p\u003e\n\n\u003cp\u003eIt is also unknown whether any specific targets have been successfully compromised.\u003c/p\u003e\n\n\u003ch3 id=\"mitigation-strategies\"\u003eMitigation Strategies\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft is providing immediate protection through the Exchange Emergency Mitigation Service.\u003c/p\u003e\n\n\u003cp\u003eThis service is enabled by default and automatically applies a URL rewrite configuration to block the vulnerability.\u003c/p\u003e\n\n\u003cp\u003eAdministrators are advised to ensure the Windows service is running if it is not already active.\u003c/p\u003e\n\n\u003cp\u003eFor environments with air-gap restrictions that prevent service deployment, Microsoft recommends using the Exchange on-premises Mitigation Tool.\u003c/p\u003e\n\n\u003cp\u003eThe tool can be downloaded from a Microsoft-provided URL and executed via an elevated Exchange Management Shell.\u003c/p\u003e\n\n\u003cp\u003eSingle servers can be patched using a direct command, while all internal servers can be remediated simultaneously through a pipeline script.\u003c/p\u003e\n\n\u003ch3 id=\"known-issues-and-recommendations\"\u003eKnown Issues and Recommendations\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft has documented a cosmetic bug in the mitigation tool where the description field incorrectly displays \u0026ldquo;Mitigation invalid for this exchange version.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eThe vendor clarifies that this message is purely cosmetic and does not indicate a failure, provided the status field shows \u0026ldquo;Applied.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eThe Exchange Team is actively investigating how to correct this display error.\u003c/p\u003e\n\n\u003cp\u003eIn the absence of detailed threat intelligence or a permanent patch, Microsoft strongly recommends that all administrators immediately apply the available mitigations to secure their on-premises Exchange environments.\u003c/p\u003e\n","keyPoints":["Microsoft has disclosed CVE-2026-42897, a critical vulnerability actively exploited in the wild that allows arbitrary JavaScript execution on on-premise Exchange Server versions 2016, 2019, and Subscription Edition.","The cross-site scripting flaw can be triggered by opening a crafted email in Outlook Web Access under specific interaction conditions.","Administrators should deploy the Exchange Emergency Mitigation Service or run the Exchange on-premises Mitigation Tool script to automatically apply a URL rewrite configuration that blocks the vulnerability.","Exchange Online remains unaffected by this issue, and a cosmetic error message during mitigation does not prevent the fix from successfully applying."],"insights":["Microsoft's emergency response bypasses traditional patching by deploying protection through a URL rewrite configuration, allowing immediate mitigation while a permanent fix is developed.","The remediation script explicitly filters out Edge transport servers, indicating the vulnerability is isolated to internal Exchange roles rather than perimeter mail gateways.","A known cosmetic bug causes the mitigation tool to display \"Mitigation invalid\" in the description field, requiring administrators to verify the \"Applied\" status field to confirm protection is active.","Exploitation requires specific \"certain interaction conditions\" beyond simply opening a crafted email, meaning attackers must trigger precise UI states within Outlook Web Access to execute arbitrary JavaScript.","Microsoft has not yet disclosed the threat actor, attack scale, or specific targets, leaving organizations to rely exclusively on vendor mitigations without intelligence on adversary behavior or objectives."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft has disclosed CVE-2026-42897, a critical security flaw actively exploited in the wild that impacts on-premises versions of Exchange Server.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability, rated with a CVSS score of 8.1, stems from a cross-site scripting bug that allows unauthorized attackers to perform spoofing over a network.\u003c/p\u003e\n\n\u003cp\u003eWhen a user opens a crafted email in Outlook Web Access under specific interaction conditions, arbitrary JavaScript code can be executed in the browser context.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft has tagged this issue with an \u0026ldquo;Exploitation Detected\u0026rdquo; assessment and is urging immediate action.\u003c/p\u003e\n\n\u003cp\u003eAdministrators should deploy the Exchange Emergency Mitigation Service, which automatically applies a URL rewrite configuration to block the threat.\u003c/p\u003e\n\n\u003cp\u003eFor air-gapped environments, the company provides a mitigation script that can be run through the Exchange Management Shell.\u003c/p\u003e\n\n\u003cp\u003eExchange Online remains unaffected by this vulnerability.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft is currently investigating the threat actor and attack scale while organizations apply the recommended fixes.\u003c/p\u003e\n"},{"n":20,"title":"CISA Adds Cisco SD-WAN CVE-2026-20182 to KEV After Admin Access Exploits","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/cisa-adds-cisco-sd-wan-cve-2026-20182.html","time":"05:28","priority":"MUST READ","score":95,"group":"L","groupColor":"#34d399","tldr":"CISA has added the critical authentication bypass CVE-2026-20182 to its KEV catalog, mandating federal agencies patch Cisco SD-WAN immediately due to confirmed active exploitation by multiple threat actors deploying web shells and malware.","briefOverview":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency has added the critical authentication bypass CVE-2026-20182 to its Known Exploited Vulnerabilities catalog. Federal Civilian Executive Branch agencies must remediate the flaw in Cisco Catalyst SD-WAN Controller and Manager systems by May 17, 2026. The vulnerability carries a maximum severity CVSS score of 10.0 and allows unauthenticated remote attackers to obtain administrative privileges. Cisco Talos attributes active exploitation to threat cluster UAT-8616, which performs post-compromise actions such as adding SSH keys and escalating to root. Multiple threat clusters are chaining this flaw with other vulnerabilities to deploy web shells and command-and-control frameworks on compromised systems. Attackers are leveraging publicly available proof-of-concept exploit code to compromise SD-WAN controllers and harvest sensitive credentials. Cisco advises customers to immediately apply the official security guidance outlined in their advisories.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency officially added CVE-2026-20182 to its Known Exploited Vulnerabilities catalog on Thursday. This critical authentication bypass affects Cisco Catalyst SD-WAN Controller and Manager systems and carries a CVSS score of 10.0. The vulnerability enables unauthenticated, remote attackers to bypass authentication mechanisms and gain administrative privileges. CISA has mandated that Federal Civilian Executive Branch agencies must remediate the issue by May 17, 2026. Cisco Talos attributes the active exploitation to threat cluster UAT-8616 with high confidence. This cluster performs post-compromise actions including adding SSH keys, modifying NETCONF configurations, and escalating to root privileges. The infrastructure used by UAT-8616 overlaps with Operational Relay Box networks. Threat actors have been chaining CVE-2026-20182 with three other vulnerabilities since March 2026 to gain unauthorized device access. Attackers are utilizing publicly available proof-of-concept exploit code to deploy web shells on compromised systems. One notable JavaServer Pages-based web shell, codenamed XenShell, utilizes code released by ZeroZenX Labs. At least ten distinct threat clusters have been linked to the exploitation of these flaws. These clusters deploy a wide range of malicious tools, including Godzilla and Behinder web shells, Sliver command-and-control frameworks, and XMRig cryptocurrency miners. Cluster 8 installs the KScan asset mapping tool alongside a Nim-based backdoor with file execution capabilities. Cluster 10 operates a credential stealer targeting admin hashdumps, JWT tokens, and AWS credentials for vManage. Cisco recommends that all customers strictly follow the guidance published in the official advisories to protect their environments.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency has added the critical authentication bypass CVE-2026-20182 to its Known Exploited Vulnerabilities catalog. Federal Civilian Executive Branch agencies are required to remediate the flaw in Cisco Catalyst SD-WAN Controller and Manager systems by May 17, 2026. The vulnerability carries a maximum severity CVSS score of 10.0 and allows unauthenticated, remote attackers to bypass authentication and obtain administrative privileges.\u003c/p\u003e\n\n\u003ch3 id=\"threat-actor-attribution-and-tactics\"\u003eThreat Actor Attribution and Tactics\u003c/h3\u003e\n\n\u003cp\u003eCisco Talos attributes the active exploitation of this vulnerability to threat cluster UAT-8616 with high confidence. This cluster previously weaponized CVE-2026-20127 and continues to perform similar post-compromise actions after successfully exploiting the new flaw. These actions include adding SSH keys, modifying NETCONF configurations, and escalating to root privileges. The infrastructure used by UAT-8616 to carry out exploitation overlaps with Operational Relay Box networks.\u003c/p\u003e\n\n\u003ch3 id=\"chained-vulnerabilities-and-exploitation-methods\"\u003eChained Vulnerabilities and Exploitation Methods\u003c/h3\u003e\n\n\u003cp\u003eMultiple threat clusters have been observed chaining CVE-2026-20182 with CVE-2026-20133, CVE-2026-20128, and CVE-2026-20122 since March 2026. When combined, these three vulnerabilities allow a remote unauthenticated attacker to gain unauthorized access to the device. These flaws were previously added to the CISA KEV catalog last month. Attackers are leveraging publicly available proof-of-concept exploit code to deploy web shells on hacked systems. One such JavaServer Pages-based web shell has been codenamed XenShell owing to its use of proof-of-concept code released by ZeroZenX Labs.\u003c/p\u003e\n\n\u003ch3 id=\"identified-threat-clusters-and-malware-deployments\"\u003eIdentified Threat Clusters and Malware Deployments\u003c/h3\u003e\n\n\u003cp\u003eAt least ten different clusters have been linked to the exploitation of these flaws, each deploying distinct malicious tools:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCluster 1 and Cluster 4 deploy variants of the Godzilla web shell.\u003c/li\u003e\n\u003cli\u003eCluster 2 and Cluster 3 deploy the Behinder web shell and a XenShell variant.\u003c/li\u003e\n\u003cli\u003eCluster 5 utilizes malware compiled off the AdaptixC2 red teaming framework.\u003c/li\u003e\n\u003cli\u003eCluster 6 deploys the Sliver command-and-control framework.\u003c/li\u003e\n\u003cli\u003eCluster 7 and Cluster 9 deploy the XMRig miner and a peer-based tunneling tool called gsocket.\u003c/li\u003e\n\u003cli\u003eCluster 8 installs the KScan asset mapping tool and a Nim-based backdoor with file and command execution capabilities.\u003c/li\u003e\n\u003cli\u003eCluster 10 operates a credential stealer targeting admin user hashdumps, JWT key chunks, and AWS credentials for vManage.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"vendor-guidance\"\u003eVendor Guidance\u003c/h3\u003e\n\n\u003cp\u003eCisco is actively recommending that customers follow the official guidance and recommendations outlined in the advisories for the aforementioned vulnerabilities. Organizations must apply these updates immediately to secure their SD-WAN environments against ongoing exploitation campaigns.\u003c/p\u003e\n","keyPoints":["CISA added the critical authentication bypass CVE-2026-20182 to its Known Exploited Vulnerabilities catalog, requiring federal agencies to patch Cisco SD-WAN systems by May 17, 2026.","Threat cluster UAT-8616 is actively exploiting this vulnerability to gain administrative access and perform post-compromise actions such as adding SSH keys and escalating to root privileges.","Multiple threat clusters are chaining CVE-2026-20182 with other vulnerabilities to deploy web shells and command-and-control frameworks on compromised SD-WAN controllers.","Cisco has assigned a CVSS score of 10.0 to the vulnerability and advises customers to follow official advisory guidance to secure their environments."],"insights":["Attackers are leveraging publicly available proof-of-concept exploit code rather than custom zero-days, significantly lowering the barrier to entry for compromising SD-WAN controllers.","At least 10 distinct threat clusters are simultaneously exploiting the same vulnerability chain, each deploying different malware families ranging from web shells to credential stealers and cryptocurrency miners.","Post-exploitation activities heavily focus on infrastructure persistence and credential harvesting, specifically targeting SSH keys, NETCONF configurations, JWT tokens, and AWS credentials for vManage."],"referencedReports":[{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/05/14/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article cites this official advisory to confirm the addition of CVE-2026-20182 to the KEV catalog and the mandatory May 17, 2026 remediation deadline for federal agencies."},{"title":"SD-WAN Ongoing Exploitation","url":"https://blog.talosintelligence.com/sd-wan-ongoing-exploitation/","publisher":"Cisco Talos","context":"The article references this technical analysis to attribute active exploitation of the vulnerability to threat cluster UAT-8616 and detail their post-compromise actions such as SSH key modification and root escalation."}],"body":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency has added the critical authentication bypass CVE-2026-20182 to its Known Exploited Vulnerabilities catalog. Federal Civilian Executive Branch agencies must remediate the flaw in Cisco Catalyst SD-WAN Controller and Manager systems by May 17, 2026. The vulnerability carries a maximum severity CVSS score of 10.0 and allows unauthenticated remote attackers to obtain administrative privileges. Cisco Talos attributes active exploitation to threat cluster UAT-8616, which performs post-compromise actions such as adding SSH keys and escalating to root. Multiple threat clusters are chaining this flaw with other vulnerabilities to deploy web shells and command-and-control frameworks on compromised systems. Attackers are leveraging publicly available proof-of-concept exploit code to compromise SD-WAN controllers and harvest sensitive credentials. Cisco advises customers to immediately apply the official security guidance outlined in their advisories.\u003c/p\u003e\n"},{"n":22,"title":"TanStack Supply Chain Attack Hits Two OpenAI Employee Devices, Forces macOS Updates","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/tanstack-supply-chain-attack-hits-two.html","time":"10:54","priority":"MUST READ","score":95,"group":"D","groupColor":"#f472b6","tldr":"OpenAI disclosed that a supply chain attack on TanStack compromised two employee devices, but no user data or production systems were affected; the company revoked macOS app signing certificates, forcing users to update their apps by June 12, 2026.","briefOverview":"\u003cp\u003eOpenAI disclosed that a supply chain attack on TanStack, dubbed Mini Shai-Hulud, compromised two employee devices in its corporate environment. The company confirmed no user data, production systems, or intellectual property were accessed or modified without authorization, though limited credential material was exfiltrated from internal source code repositories.\u003c/p\u003e\n\n\u003cp\u003eThe attack forced OpenAI to revoke and reissue code-signing certificates for iOS, macOS, and Windows products, requiring macOS users of ChatGPT Desktop, Codex App, Codex CLI, and Atlas to update their apps before June 12, 2026. This is the second such certificate rotation in two months, following a prior incident involving a North Korean hacking group.\u003c/p\u003e\n\n\u003cp\u003eThe broader campaign by the group TeamPCP compromised hundreds of packages across multiple organizations including UiPath, Mistral AI, OpenSearch, and Guardrails AI. TanStack explained the attacker exploited a CI pipeline\u0026rsquo;s own cache to steal a publish token at the moment of its creation, without phishing or stealing maintainer credentials.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article details the impact of the Mini Shai-Hulud supply chain attack on TanStack, which targeted multiple organizations via compromised npm and PyPI packages. OpenAI reported that two employee devices were affected, leading to unauthorized access to a limited set of internal source code repositories containing signing certificates for iOS, macOS, and Windows products. OpenAI revoked those certificates and issued new ones, mandating macOS users update their apps by June 12, 2026.\u003c/p\u003e\n\n\u003cp\u003eTanStack\u0026rsquo;s own analysis revealed that no maintainers were phished or had tokens stolen; instead, the attacker engineered a path where the CI pipeline itself stole its own publish token through a cache trusted by everyone in the chain. The hacking group TeamPCP claimed responsibility, having also compromised packages associated with UiPath, Mistral AI, OpenSearch, and Guardrails AI as part of an ongoing credential-theft campaign.\u003c/p\u003e\n\n\u003cp\u003eMistral AI confirmed it was impacted by the same supply chain attack, resulting in trojanized versions of its npm and PyPI SDKs. One developer device was affected, but there was no evidence of infrastructure breach. TeamPCP later announced a supply chain attack contest in partnership with Breached cybercrime, offering \u003cspan class=\"math inline\"\u003e\\(1,000 in Monero to participants who compromise open-source packages using the Shai-Hulud worm. The group also threatened to leak about 5GB of Mistral AI source code for a \\)\u003c/span\u003e25,000 BIN.\u003c/p\u003e\n\n\u003cp\u003eA technical analysis by Hunt.io of the malware delivered to Linux systems revealed a modular Python toolkit with a hard-coded primary C2 server (83.142.209.194) and a sophisticated fallback mechanism called FIRESCALE. When the primary C2 is unreachable, the malware searches public GitHub commit messages worldwide for a signed alternative server URL, verified against an embedded 4096-bit RSA key. Exfiltration follows three paths in sequence: primary C2, FIRESCALE dead-drop redirect, and the victim\u0026rsquo;s own GitHub repository.\u003c/p\u003e\n\n\u003cp\u003eThe malware includes a collection module that harvests AWS credentials across all 19 availability zones, including the restricted us-gov-east-1 and us-gov-west-1 GovCloud regions used by U.S. government agencies and defense contractors. Additionally, on machines geolocated to Israel or Iran, a 1-in-6 probability gate triggers destructive behavior: audio playback at maximum volume followed by deletion of all accessible files. The malware exits on systems with a Russian locale.\u003c/p\u003e\n\n\u003cp\u003eOpenAI characterized the incident as part of a broader shift in the threat landscape, where attackers increasingly target shared software dependencies and development tooling rather than any single company. The company rotated its macOS app certificate for the second time in two months; the previous rotation in April 2026 followed a separate compromise of a GitHub Actions workflow by the North Korean group UNC1069.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports on the fallout of the Mini Shai-Hulud supply chain attack targeting TanStack, a widely used open-source library, which then cascaded to affect multiple downstream organizations including OpenAI, Mistral AI, UiPath, OpenSearch, and Guardrails AI. OpenAI disclosed that two employee devices in its corporate environment were impacted, but confirmed no user data, production systems, or intellectual property were compromised. The attack focused on credential exfiltration from internal source code repositories.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-of-the-attack\"\u003eTechnical Details of the Attack\u003c/h2\u003e\n\n\u003cp\u003eTanStack explained that the attacker did not phish maintainers or steal tokens from accounts. Instead, the attacker engineered a path where TanStack\u0026rsquo;s own CI pipeline stole its own publish token at the exact moment it was created, by way of a cache that everyone in the chain implicitly trusted. This novel approach allowed the attacker to publish malicious packages under legitimate names.\u003c/p\u003e\n\n\u003cp\u003eHunt.io performed a deeper analysis of the modular Python toolkit delivered to Linux systems via compromised guardrails-ai and mistralai packages. The malware has a hard-coded primary C2 server address (83.142.209.194). When that becomes unreachable, a fallback mechanism called FIRESCALE activates, which searches all public GitHub commit messages worldwide for a signed alternative server URL. This URL is verified against an embedded 4096-bit RSA key, making the C2 infrastructure highly resilient.\u003c/p\u003e\n\n\u003cp\u003eExfiltration follows three paths in sequence:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePrimary C2 server\u003c/li\u003e\n\u003cli\u003eFIRESCALE dead-drop redirect\u003c/li\u003e\n\u003cli\u003eThe victim\u0026rsquo;s own GitHub repository\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBlocking any single tier leaves the other two intact. The malware\u0026rsquo;s collection module harvests Amazon Web Services (AWS) credentials covering all 19 availability zones, including the restricted us-gov-east-1 and us-gov-west-1 GovCloud regions used by U.S. government agencies and defense contractors.\u003c/p\u003e\n\n\u003cp\u003eThe malware also captures every environment variable on the machine, reads all SSH keys and config, walks the entire home directory for dotenv files, and pulls credentials from running Docker containers.\u003c/p\u003e\n\n\u003ch2 id=\"destructive-behavior\"\u003eDestructive Behavior\u003c/h2\u003e\n\n\u003cp\u003eOn machines geolocated to Israel or Iran, a 1-in-6 probability gate activates audio playback at maximum volume, followed by deletion of all accessible files. The malware exits on systems with a Russian locale. This geo-targeted destructive behavior mirrors prior attacks by TeamPCP, specifically the \u0026ldquo;kamikaze\u0026rdquo; wiper used against Iran-based Kubernetes clusters in connection with the CanisterWorm campaign.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-response\"\u003eAffected Parties and Response\u003c/h2\u003e\n\n\u003cp\u003e\u003cstrong\u003eOpenAI\u003c/strong\u003e:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTwo employee devices impacted\u003c/li\u003e\n\u003cli\u003eUnauthorized access to limited internal source code repositories\u003c/li\u003e\n\u003cli\u003eLimited credential material exfiltrated\u003c/li\u003e\n\u003cli\u003eRepositories included signing certificates for iOS, macOS, and Windows\u003c/li\u003e\n\u003cli\u003eRevoked and reissued all certificates\u003c/li\u003e\n\u003cli\u003emacOS users of ChatGPT Desktop, Codex App, Codex CLI, and Atlas must update by June 12, 2026\u003c/li\u003e\n\u003cli\u003eIsolated impacted systems and identities, revoked sessions, rotated credentials, temporarily restricted code-deployment workflows, audited user and credential behavior\u003c/li\u003e\n\u003cli\u003eThis is the second macOS certificate rotation in two months; the prior one in April 2026 was due to a GitHub Actions workflow compromise by North Korean group UNC1069 involving a malicious Axios library download\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eMistral AI\u003c/strong\u003e:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eConfirmed impact from TanStack compromise\u003c/li\u003e\n\u003cli\u003eTrojanized versions of npm and PyPI SDKs released\u003c/li\u003e\n\u003cli\u003eOne developer device impacted\u003c/li\u003e\n\u003cli\u003eNo evidence of infrastructure breach\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eOther organizations\u003c/strong\u003e: UiPath, OpenSearch, Guardrails AI also had packages compromised in the same campaign.\u003c/p\u003e\n\n\u003ch2 id=\"attribution-and-actor-behavior\"\u003eAttribution and Actor Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe hacking group TeamPCP claimed responsibility for the campaign. Beyond the initial attack, TeamPCP announced a supply chain attack contest in partnership with Breached cybercrime, offering participants \u003cspan class=\"math inline\"\u003e\\(1,000 in Monero to compromise open-source packages using the Shai-Hulud worm, which they made freely available. The group also threatened to leak approximately 5GB of internal source code from Mistral AI, asking for a \\)\u003c/span\u003e25,000 BIN from prospective buyers. If no buyer is found within a week, they stated they would leak all the data for free to forums.\u003c/p\u003e\n\n\u003ch2 id=\"broader-significance\"\u003eBroader Significance\u003c/h2\u003e\n\n\u003cp\u003eOpenAI noted that this incident reflects a broader shift in the threat landscape: attackers are increasingly targeting shared software dependencies and development tooling rather than any single company. Modern software relies on an interconnected ecosystem of open-source libraries, package managers, and CI/CD infrastructure, meaning an upstream vulnerability can propagate widely and quickly across organizations.\u003c/p\u003e\n","keyPoints":["OpenAI disclosed that two employee devices were impacted by the Mini Shai-Hulud supply chain attack on TanStack, but no user data, production systems, or intellectual property were compromised or modified in an unauthorized manner.","OpenAI revoked signing certificates for iOS, macOS, and Windows products because impacted repositories contained these certificates, and macOS users of ChatGPT Desktop, Codex App, Codex CLI, and Atlas must update their apps before June 12, 2026, when the old certificates are scheduled to be revoked.","The attack was conducted by a group called TeamPCP, which compromised hundreds of packages associated with TanStack, UiPath, Mistral AI, OpenSearch, and Guardrails AI as part of an ongoing supply chain attack campaign designed to push malware and steal credentials.","Mistral AI confirmed it was impacted by the supply chain attack caused by the compromise of TanStack, leading to the release of trojanized versions of its npm and PyPI SDKs, and a lone developer device was affected with no evidence of infrastructure breach.","The malware delivered to Linux systems includes destructive behavior: on machines geolocated to Israel or Iran, a 1-in-6 probability gate activates audio playback at maximum volume followed by deletion of all accessible files, and the malware exists on systems with a Russian locale."],"insights":["The attacker exploited a cache that the CI pipeline itself implicitly trusted to steal its own publish token at the exact moment it was created, a novel technique that did not require phishing or credential theft from maintainers.","The malware includes a fallback command-and-control mechanism that searches public GitHub commit messages worldwide for a signed alternative server URL, verified against an embedded 4096-bit RSA key, making takedown difficult since blocking any single C2 path leaves two others intact.","The destructive behavior is geo-targeted: on systems located in Israel or Iran, there is a 1-in-6 probability of triggering audio playback at maximum volume followed by deletion of all accessible files, while the malware exits on systems with a Russian locale, suggesting deliberate avoidance of Russian targets.","The credential harvesting module covers all 19 AWS availability zones including the restricted us-gov-east-1 and us-gov-west-1 GovCloud regions used by U.S. government agencies and defense contractors, indicating a broad intelligence-gathering scope."],"referencedReports":[{"title":"TeamPCP Python Toolkit: FIRESCALE GitHub C2 Takedown","url":"https://hunt.io/blog/teampcp-python-toolkit-firescale-github-c2-takedown","publisher":"Hunt.io","context":"The article references Hunt.io's technical analysis of the malware's command-and-control fallback mechanism and credential harvesting across all AWS availability zones, including GovCloud regions."}],"body":"\u003cp\u003eOpenAI disclosed that a supply chain attack on TanStack, dubbed Mini Shai-Hulud, compromised two employee devices in its corporate environment. The company confirmed no user data, production systems, or intellectual property were accessed or modified without authorization, though limited credential material was exfiltrated from internal source code repositories.\u003c/p\u003e\n\n\u003cp\u003eThe attack forced OpenAI to revoke and reissue code-signing certificates for iOS, macOS, and Windows products, requiring macOS users of ChatGPT Desktop, Codex App, Codex CLI, and Atlas to update their apps before June 12, 2026. This is the second such certificate rotation in two months, following a prior incident involving a North Korean hacking group.\u003c/p\u003e\n\n\u003cp\u003eThe broader campaign by the group TeamPCP compromised hundreds of packages across multiple organizations including UiPath, Mistral AI, OpenSearch, and Guardrails AI. TanStack explained the attacker exploited a CI pipeline\u0026rsquo;s own cache to steal a publish token at the moment of its creation, without phishing or stealing maintainer credentials.\u003c/p\u003e\n"},{"n":23,"title":"Cisco Catalyst SD-WAN Controller Auth Bypass Actively Exploited to Gain Admin Access","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/cisco-catalyst-sd-wan-controller-auth.html","time":"17:45","priority":"MUST READ","score":93,"group":"L","groupColor":"#34d399","tldr":"Cisco patched a critical Cisco Catalyst SD-WAN Controller authentication bypass flaw, CVE-2026-20182, that is already being exploited to let remote unauthenticated attackers gain admin-level access and manipulate SD-WAN configurations. Organizations should urgently update exposed systems and check logs for unauthorized vmanage-admin logins or suspicious peering activity.","briefOverview":"\u003cp\u003eCisco has released updates for a maximum-severity authentication bypass vulnerability in Catalyst SD-WAN Controller, tracked as CVE-2026-20182, and said it has been exploited in limited attacks. The flaw carries a CVSS score of 10.0 and can allow a remote unauthenticated attacker to bypass authentication and obtain administrative privileges on affected systems. Cisco said the issue affects Cisco Catalyst SD-WAN Controller, formerly SD-WAN vSmart, and Cisco Catalyst SD-WAN Manager, formerly SD-WAN vManage.\u003c/p\u003e\n\n\u003cp\u003eAccording to Cisco, the vulnerability is caused by a malfunction in the peering authentication mechanism and can be exploited by sending crafted requests. Successful exploitation could let an attacker log in as an internal, high-privileged, non-root user account and then use that access to reach NETCONF and manipulate SD-WAN fabric network configuration. The impacted deployments include on-prem, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud (Cisco Managed), and Cisco SD-WAN for Government (FedRAMP).\u003c/p\u003e\n\n\u003cp\u003eRapid7, which discovered the flaw, said it affects the vdaemon service over DTLS on UDP port 12346 and is different from CVE-2026-20127, another critical authentication bypass in the same component. Cisco said it became aware of limited exploitation in May 2026 and warned that internet-accessible systems with exposed ports are at increased risk. The company advised customers to apply updates quickly and review logs for unauthorized vmanage-admin public key logins and suspicious peering events from unknown IP addresses or inconsistent device types.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco has released security updates to fix a critical authentication bypass flaw in Catalyst SD-WAN Controller that it said has been exploited in limited attacks. The vulnerability is tracked as CVE-2026-20182 and has a CVSS score of 10.0. Cisco described the issue as affecting Cisco Catalyst SD-WAN Controller, formerly SD-WAN vSmart, and Cisco Catalyst SD-WAN Manager, formerly SD-WAN vManage.\u003c/p\u003e\n\n\u003cp\u003eThe company said the vulnerability is rooted in a malfunction of the peering authentication mechanism. An unauthenticated remote attacker could exploit the flaw by sending crafted requests to an affected system. If successful, the attacker could bypass authentication and obtain administrative privileges.\u003c/p\u003e\n\n\u003cp\u003eCisco said a successful exploit would allow the attacker to log in as an internal, high-privileged, non-root user account. From there, the attacker could access NETCONF and manipulate network configuration for the SD-WAN fabric. This makes the flaw operationally significant because it enables privileged changes to SD-WAN infrastructure without prior authentication.\u003c/p\u003e\n\n\u003cp\u003eThe advisory says the vulnerability affects multiple deployment models: on-prem deployments, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud (Cisco Managed), and Cisco SD-WAN for Government (FedRAMP). Cisco also warned that Catalyst SD-WAN Controller systems exposed to the internet and with ports accessible are at greater risk of compromise. The company urged customers to install the latest updates as soon as possible.\u003c/p\u003e\n\n\u003cp\u003eRapid7, which discovered CVE-2026-20182, said the flaw affects the vdaemon service over DTLS on UDP port 12346. The researchers noted that it resembles CVE-2026-20127, another critical authentication bypass affecting the same component, but emphasized that the new issue is not a patch bypass. Instead, they said it is a separate flaw located in a similar part of the vdaemon networking stack.\u003c/p\u003e\n\n\u003cp\u003eThe article also connects the issue to prior exploitation trends. CVE-2026-20127 is said to have been exploited by a threat actor tracked as UAT-8616 since at least 2023. Separately, Cisco said it became aware of limited exploitation of CVE-2026-20182 in May 2026 and recommended reviewing /var/log/auth.log for “Accepted publickey for vmanage-admin” entries from unknown IP addresses, as well as checking logs for suspicious peering events involving unrecognized IPs, unusual timing, or device types inconsistent with the environment’s architecture.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eCisco has released updates to address a critical authentication bypass vulnerability in Catalyst SD-WAN Controller that it said has already been exploited in limited attacks. The flaw is tracked as CVE-2026-20182 and carries a CVSS score of 10.0. Cisco said the issue affects Cisco Catalyst SD-WAN Controller, formerly SD-WAN vSmart, as well as Cisco Catalyst SD-WAN Manager, formerly SD-WAN vManage.\u003c/p\u003e\n\n\u003cp\u003eCisco described the vulnerability as a flaw in peering authentication that could allow a remote, unauthenticated attacker to bypass authentication and gain administrative privileges on an affected system. The article frames this as a maximum-severity issue with active exploitation, making remediation urgent.\u003c/p\u003e\n\n\u003ch1 id=\"technical-details\"\u003eTechnical Details\u003c/h1\u003e\n\n\u003cp\u003eAccording to Cisco, the root cause is a malfunction in the peering authentication mechanism. An attacker can exploit the vulnerability by sending crafted requests to the affected system.\u003c/p\u003e\n\n\u003cp\u003eIf exploitation succeeds, the attacker can log in to the Cisco Catalyst SD-WAN Controller as an internal, high-privileged, non-root user account. The article says this access can then be used to reach NETCONF and manipulate network configuration for the SD-WAN fabric.\u003c/p\u003e\n\n\u003cp\u003eRapid7, which discovered CVE-2026-20182, provided additional technical detail. The researchers said the vulnerability affects the \u003ccode\u003evdaemon\u003c/code\u003e service over DTLS on UDP port 12346. They also said the flaw is not a patch bypass of CVE-2026-20127, but rather a distinct issue in a similar part of the \u003ccode\u003evdaemon\u003c/code\u003e networking stack.\u003c/p\u003e\n\n\u003cp\u003eRapid7 summarized the end result as effectively the same as the earlier flaw: a remote unauthenticated attacker can abuse CVE-2026-20182 to become an authenticated peer of the target appliance and perform privileged operations.\u003c/p\u003e\n\n\u003ch1 id=\"affected-deployments\"\u003eAffected Deployments\u003c/h1\u003e\n\n\u003cp\u003eThe article says the vulnerability impacts the following deployment types:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn-Prem Deployment\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud-Pro\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud (Cisco Managed)\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN for Government (FedRAMP)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis indicates that the flaw spans both customer-managed and Cisco-managed SD-WAN environments, including government-focused deployments.\u003c/p\u003e\n\n\u003ch1 id=\"relationship-to-earlier-vulnerabilities\"\u003eRelationship to Earlier Vulnerabilities\u003c/h1\u003e\n\n\u003cp\u003eThe article draws a direct comparison between CVE-2026-20182 and CVE-2026-20127, another critical authentication bypass flaw affecting the same component. CVE-2026-20127 also carried a CVSS score of 10.0.\u003c/p\u003e\n\n\u003cp\u003eRapid7 said the new flaw has echoes of the earlier issue because both affect the same \u003ccode\u003evdaemon\u003c/code\u003e service and involve similar areas of the networking stack. However, the researchers explicitly stated that CVE-2026-20182 is not a patch bypass of CVE-2026-20127.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that CVE-2026-20127 has reportedly been exploited by a threat actor tracked as UAT-8616 since at least 2023. That historical context underscores that the component has already been targeted in real-world operations.\u003c/p\u003e\n\n\u003ch1 id=\"exploitation-status\"\u003eExploitation Status\u003c/h1\u003e\n\n\u003cp\u003eCisco said it became aware of “limited exploitation” of CVE-2026-20182 in May 2026. The article does not identify the actor responsible for exploiting this new flaw, but it does clearly state that exploitation has already occurred.\u003c/p\u003e\n\n\u003cp\u003eThis places the issue in the category of actively exploited, high-impact vulnerabilities rather than a purely theoretical or lab-only finding.\u003c/p\u003e\n\n\u003ch1 id=\"risk-factors\"\u003eRisk Factors\u003c/h1\u003e\n\n\u003cp\u003eCisco warned that Catalyst SD-WAN Controller systems exposed to the internet and with ports accessible are at increased risk of compromise. The article specifically ties heightened risk to internet accessibility and exposed services.\u003c/p\u003e\n\n\u003cp\u003eBecause the flaw enables unauthenticated access that can be elevated into administrative control of SD-WAN functions, exposed deployments represent the most urgent remediation priority based on the information provided.\u003c/p\u003e\n\n\u003ch1 id=\"detection-and-hunting-guidance\"\u003eDetection and Hunting Guidance\u003c/h1\u003e\n\n\u003cp\u003eCisco recommended that customers review authentication logs and peering activity for signs of compromise. Specifically, it advised auditing \u003ccode\u003e/var/log/auth.log\u003c/code\u003e for entries showing:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eAccepted publickey for vmanage-admin\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eSource IP addresses that are unknown or unauthorized\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCisco also pointed to suspicious peering events in logs as another indicator. The article says defenders should look for:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnauthorized peer connections\u003c/li\u003e\n\u003cli\u003eConnections occurring at unexpected times\u003c/li\u003e\n\u003cli\u003eConnections originating from unrecognized IP addresses\u003c/li\u003e\n\u003cli\u003eDevice types inconsistent with the environment’s architecture\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese indicators are presented as practical methods for identifying possible exploitation after the fact.\u003c/p\u003e\n\n\u003ch1 id=\"vendor-and-researcher-response\"\u003eVendor and Researcher Response\u003c/h1\u003e\n\n\u003cp\u003eCisco’s response was to release software updates and urge customers to apply them as soon as possible. The company also provided operational guidance for log review and highlighted the increased danger posed by internet-exposed systems.\u003c/p\u003e\n\n\u003cp\u003eRapid7 is credited in the article with discovering CVE-2026-20182. Its researchers, Jonah Burgess and Stephen Fewer, contributed technical clarification on where the flaw resides and how it differs from the previous critical issue in the same service.\u003c/p\u003e\n\n\u003ch1 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-20182 is a critical, CVSS 10.0 authentication bypass in Cisco Catalyst SD-WAN Controller.\u003c/li\u003e\n\u003cli\u003eCisco said the vulnerability has been exploited in limited attacks.\u003c/li\u003e\n\u003cli\u003eExploitation allows a remote unauthenticated attacker to gain administrative-level access as an internal, high-privileged, non-root user.\u003c/li\u003e\n\u003cli\u003eThat access can be used to reach NETCONF and manipulate SD-WAN fabric configuration.\u003c/li\u003e\n\u003cli\u003eThe flaw affects on-prem, cloud-managed, cloud-pro, and FedRAMP deployments.\u003c/li\u003e\n\u003cli\u003eRapid7 said the issue affects \u003ccode\u003evdaemon\u003c/code\u003e over DTLS on UDP port 12346 and is distinct from, but similar to, CVE-2026-20127.\u003c/li\u003e\n\u003cli\u003eCisco warned that internet-exposed systems are at greater risk and recommended urgent patching and log review for unauthorized logins and anomalous peering activity.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Cisco released updates for a critical Cisco Catalyst SD-WAN Controller authentication bypass vulnerability tracked as CVE-2026-20182 with a CVSS score of 10.0.","Cisco said the flaw can allow a remote unauthenticated attacker to bypass authentication, gain administrative privileges, and access NETCONF to manipulate SD-WAN fabric network configuration.","The vulnerability affects On-Prem Deployment, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud (Cisco Managed), and Cisco SD-WAN for Government (FedRAMP).","Rapid7 said the flaw affects the vdaemon service over DTLS on UDP port 12346 and is a different issue from CVE-2026-20127, although both impact a similar part of the same networking stack.","Cisco said it became aware of limited exploitation of CVE-2026-20182 in May 2026 and advised customers to audit auth.log for unauthorized vmanage-admin public key logins and to review logs for suspicious peering events."],"insights":["Although the flaw is an authentication bypass, Cisco said successful exploitation results in access as an internal high-privileged non-root account rather than direct root access, which still enables NETCONF-based manipulation of SD-WAN fabric configuration.","Rapid7 noted that CVE-2026-20182 is not a patch bypass of CVE-2026-20127, but a separate bug in a similar area of the same vdaemon networking stack, showing the same service has now been hit by multiple critical auth bypass issues.","Cisco specifically warned that internet-accessible Catalyst SD-WAN Controller systems with exposed ports face increased risk, making external exposure a key factor in prioritizing remediation.","Cisco provided concrete post-compromise indicators beyond software updates, including reviewing /var/log/auth.log for unexpected 'Accepted publickey for vmanage-admin' entries and looking for anomalous peering events from unrecognized IP addresses or inconsistent device types."],"referencedReports":[{"title":"Cisco Security Advisory for CVE-2026-20182","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-sdwan-rpa2-v69WY2SW","publisher":"Cisco","context":"The article cites Cisco's security advisory as the source describing the authentication bypass vulnerability, impacted products, exploitation details, and mitigation guidance."},{"title":"VE-CVE-2026-20182: Critical Authentication Bypass Cisco Catalyst SD-WAN Controller Fixed","url":"https://www.rapid7.com/blog/post/ve-cve-2026-20182-critical-authentication-bypass-cisco-catalyst-sd-wan-controller-fixed/","publisher":"Rapid7","context":"The article references Rapid7's technical analysis to explain that CVE-2026-20182 affects the vdaemon service over DTLS and is distinct from CVE-2026-20127 despite occurring in a similar part of the networking stack."}],"body":"\u003cp\u003eCisco has released updates for a maximum-severity authentication bypass vulnerability in Catalyst SD-WAN Controller, tracked as CVE-2026-20182, and said it has been exploited in limited attacks. The flaw carries a CVSS score of 10.0 and can allow a remote unauthenticated attacker to bypass authentication and obtain administrative privileges on affected systems. Cisco said the issue affects Cisco Catalyst SD-WAN Controller, formerly SD-WAN vSmart, and Cisco Catalyst SD-WAN Manager, formerly SD-WAN vManage.\u003c/p\u003e\n\n\u003cp\u003eAccording to Cisco, the vulnerability is caused by a malfunction in the peering authentication mechanism and can be exploited by sending crafted requests. Successful exploitation could let an attacker log in as an internal, high-privileged, non-root user account and then use that access to reach NETCONF and manipulate SD-WAN fabric network configuration. The impacted deployments include on-prem, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud (Cisco Managed), and Cisco SD-WAN for Government (FedRAMP).\u003c/p\u003e\n\n\u003cp\u003eRapid7, which discovered the flaw, said it affects the vdaemon service over DTLS on UDP port 12346 and is different from CVE-2026-20127, another critical authentication bypass in the same component. Cisco said it became aware of limited exploitation in May 2026 and warned that internet-accessible systems with exposed ports are at increased risk. The company advised customers to apply updates quickly and review logs for unauthorized vmanage-admin public key logins and suspicious peering events from unknown IP addresses or inconsistent device types.\u003c/p\u003e\n"},{"n":16,"title":"ThreatsDay Bulletin: PAN-OS RCE, Mythos cURL Bug, AI Tokenizer Attacks, and 10+ Stories","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/threatsday-bulletin-pan-os-rce-mythos.html","time":"16:07","priority":"MUST READ","score":92,"group":null,"groupColor":null,"tldr":"Threat actors are actively exploiting weak authentication, trusted tools, and unpatched systems across diverse attack vectors including ransomware, supply chain compromises, and AI vulnerabilities. Maintaining strict security hygiene through consistent patching, access controls, and verified backups remains the most effective defense against this escalating threat landscape.","briefOverview":"\u003cp\u003eThis week\u0026rsquo;s threat landscape features active exploitation of critical vulnerabilities alongside novel attack techniques leveraging legitimate tools and AI components. Palo Alto Networks patched an exploited buffer overflow in PAN-OS, while multiple threat campaigns deployed ransomware and remote access trojans through deceptive file formats and impersonation tactics. Attackers are increasingly abusing trusted infrastructure, utilizing techniques like GhostLock file locking, NATS-based command channels, and Hugging Face tokenizer tampering to bypass detection. AI-powered code analysis and supply chain weaponization are also prominent, with threat actors hosting public competitions to distribute open-source worms. Meanwhile, major tech and government entities are responding with enhanced privacy features, extended regulatory deadlines, and new fraud intelligence sharing agreements. The overarching theme remains that attackers continue to succeed by exploiting weak authentication, unpatched systems, and social engineering, making consistent patching and access control essential defenses.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ePalo Alto Networks released patches for CVE-2026-0300, a critical buffer overflow in PAN-OS actively exploited to deploy payloads like EarthWorm and ReverseSocks5. Meta introduced Incognito Chat, processing AI interactions in a Trusted Execution Environment to ensure complete privacy. A defense contractor exposed sensitive military data through unauthenticated API endpoints, though the company reported no evidence of third-party exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe FCC extended its ban on foreign consumer routers by two years, allowing continued software and firmware updates for already deployed devices. State-sponsored threats remain active, with Operation GriefLure targeting Vietnamese telecom and Philippine healthcare sectors via spear-phishing RAR archives. Another campaign, Operation SilentCanvas, weaponized PowerShell payloads disguised as JPEG files to deliver ScreenConnect remote access tools.\u003c/p\u003e\n\n\u003cp\u003eAttackers also leveraged humanitarian aid themes in Operation HumanitarianBait to deploy a fileless Python implant targeting Russian-speaking entities. A new proof-of-concept tool called GhostLock demonstrated how low-privileged users can indefinitely lock SMB shares, causing operational disruptions indistinguishable from ransomware. AI security testing saw mixed results, as Anthropic\u0026rsquo;s Mythos model identified only one low-severity cURL vulnerability amid numerous false positives.\u003c/p\u003e\n\n\u003cp\u003eIndia\u0026rsquo;s I4C, Ministry of Home Affairs, and RBIH signed an MoU to share fraud intelligence and combat cyber-enabled financial crimes. Ransomware campaigns continue to evolve, with crpx0 ransomware distributed through fake OnlyFans account ZIP files and ClickFix malware adopting PySoxy for encrypted proxy access. AI model security faces new risks through tokenizer tampering, allowing attackers to hijack Hugging Face model outputs without modifying weights.\u003c/p\u003e\n\n\u003cp\u003eSocial engineering remains highly effective, as fake IT support accounts on Teams deliver ModeloRAT and exploit CVE-2023-36036 for privilege escalation. Supply chain attacks are being gamified, with TeamPCP hosting a competition using the open-sourced Shai-Hulud worm to reward the most package compromises. Finally, attackers are leveraging NATS servers as command-and-control channels to harvest cloud credentials and AI API keys.\u003c/p\u003e\n\n\u003cp\u003eThe bulletin concludes that persistent security hygiene, including patching, key rotation, and backup testing, remains the only reliable defense against these escalating threats.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-overview\"\u003eExecutive Overview\u003c/h3\u003e\n\n\u003cp\u003eThe bulletin highlights a week where attackers successfully exploited weak authentication, unpatched systems, and trusted tools across diverse vectors. The threat landscape spans critical infrastructure vulnerabilities, state-sponsored espionage, ransomware campaigns, and novel techniques leveraging legitimate software and AI components.\u003c/p\u003e\n\n\u003ch3 id=\"critical-vulnerabilities-patches\"\u003eCritical Vulnerabilities \u0026amp; Patches\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePAN-OS RCE (CVE-2026-0300):\u003c/strong\u003e Palo Alto Networks released patches for a critical buffer overflow in the User-ID Authentication Portal service. Threat actors have actively exploited the flaw since last month to execute arbitrary code with root privileges and deploy payloads like EarthWorm and ReverseSocks5.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ecURL Vulnerability:\u003c/strong\u003e A security scan of cURL by Anthropic\u0026rsquo;s Mythos model confirmed five potential issues, but developer Daniel Stenberg verified only one low-severity bug. The confirmed flaw will be published as a low-severity CVE alongside the upcoming 8.21.0 release.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"threat-actor-campaigns-malware\"\u003eThreat Actor Campaigns \u0026amp; Malware\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eOperation GriefLure:\u003c/strong\u003e A state-sponsored cluster targets Vietnam\u0026rsquo;s telecom and the Philippines\u0026rsquo; healthcare sectors. The campaign uses spear-phishing emails with RAR archives to deploy a remote access trojan featuring process enumeration, credential harvesting, and file execution capabilities.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOperation SilentCanvas:\u003c/strong\u003e Attackers deliver a trojanized instance of ConnectWise ScreenConnect using a PowerShell payload disguised as a legitimate JPEG file. The technique exploits user trust and bypasses file-extension validation mechanisms.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOperation HumanitarianBait:\u003c/strong\u003e A espionage campaign targets Russian-speaking entities using phishing emails with malicious LNK files inside RAR archives. The attack deploys a fileless Python implant retrieved from GitHub Releases that captures keystrokes, screenshots, credentials, and exfiltrates sensitive data.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ecrpx0 Ransomware Campaign:\u003c/strong\u003e Threat actors distribute a ZIP file disguised as a free OnlyFans account. Clicking a malicious shortcut executes a VBScript loader that installs Python-based malware capable of remote command execution, clipboard hijacking, seed phrase harvesting, and ransomware deployment.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eClickFix \u0026amp; PySoxy:\u003c/strong\u003e A ClickFix campaign uses scheduled tasks for persistence and PySoxy, an open-source Python SOCKS5 proxy, to establish encrypted command-and-control access without relying on traditional RMM tools.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eModeloRAT via Fake IT Support:\u003c/strong\u003e Actors impersonate IT helpdesk staff on Microsoft Teams to deliver a Dropbox-hosted Python payload. The chain includes privilege escalation using CVE-2023-36036, fake lock screen credential harvesting, memory dumping, and lateral movement. Attributed to financially motivated IAB KongTuke.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"emerging-attack-techniques-tool-abuse\"\u003eEmerging Attack Techniques \u0026amp; Tool Abuse\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGhostLock File Locking:\u003c/strong\u003e A proof-of-concept tool demonstrates that low-privileged domain users can indefinitely lock SMB file shares by calling CreateFileW with dwShareMode set to zero. This causes STATUS_SHARING_VIOLATION errors, stalls ERP systems, and mimics ransomware behavior without deploying encryption or requiring elevated privileges.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNATS as C2 Channel:\u003c/strong\u003e Threat actors exploit CVE-2026-33017 in Langflow to download Python and Go binaries. They then use the NATS high-performance messaging system as a covert command-and-control channel to harvest cloud credentials and AI API keys.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTokenizer Tampering:\u003c/strong\u003e Researchers demonstrated that modifying the tokenizer.json file in Hugging Face models directly controls model output. This technique affects conversational responses and tool-call arguments across Safetensors, ONNX, and GGUF formats without requiring weight modifications or adversarial inputs.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"ai-supply-chain-developments\"\u003eAI \u0026amp; Supply Chain Developments\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMeta Incognito Chat:\u003c/strong\u003e Meta announced a new privacy feature that processes AI inference in a Trusted Execution Environment. Messages disappear upon session exit, and the feature relies on Private Processing technology already used for message summarization.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSupply Chain Attack Contest:\u003c/strong\u003e Threat actor TeamPCP partnered with the Breached forum to host a competition offering $1,000 in Monero. Participants must use the open-sourced Shai-Hulud worm to compromise packages, with winners determined by the highest number of weekly or monthly downloads.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAI Code Analysis:\u003c/strong\u003e The article notes that artificial intelligence-powered static analyzers are significantly outperforming traditional code analysis tools in identifying security flaws and mistakes in source code.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"regulatory-industry-responses\"\u003eRegulatory \u0026amp; Industry Responses\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eFCC Router Ban Extension:\u003c/strong\u003e The FCC extended the deadline for banning foreign consumer-grade routers until at least January 1, 2029. The extension specifically covers software and firmware updates to maintain functionality and patch vulnerabilities for already deployed devices.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eZero-Auth Data Leak:\u003c/strong\u003e Schemata, a defense technology company with DoD contracts, exposed user records and military training materials through unauthenticated API endpoints. The company stated there is no evidence that third parties exploited the vulnerability.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIndia Fraud Intelligence Pact:\u003c/strong\u003e India\u0026rsquo;s I4C, Ministry of Home Affairs, and RBIH signed a Memorandum of Understanding to share fraud-risk intelligence and coordinate operations. The initiative aims to strengthen proactive fraud detection and curb mule accounts across banking and digital payment ecosystems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"conclusion\"\u003eConclusion\u003c/h3\u003e\n\n\u003cp\u003eThe bulletin concludes that attackers continue to succeed by exploiting simple failures such as weak checks, fake help desks, and outdated systems. The recommended course of action is to perform routine security maintenance, including patching, rotating credentials, verifying user access, testing backups, and blocking obvious threats.\u003c/p\u003e\n","keyPoints":["Palo Alto Networks released patches for CVE-2026-0300, a critical buffer overflow in PAN-OS that has been actively exploited to deploy payloads like EarthWorm and ReverseSocks5.","Multiple threat campaigns are using deceptive file formats and impersonation tactics, such as JPEG PowerShell lures, fake IT support Teams messages, and OnlyFans account lures, to deliver ransomware and remote access tools.","Attackers are leveraging legitimate infrastructure and AI components through techniques like GhostLock file locking, NATS-based command channels, and Hugging Face tokenizer tampering to bypass detection and maintain access.","Meta announced its Incognito Chat feature to process AI interactions in a Trusted Execution Environment, while a security scan of cURL by Anthropic's Mythos model confirmed only one low-severity vulnerability among many false positives.","The threat actor TeamPCP partnered with the Breached forum to host a supply chain attack competition using the open-sourced Shai-Hulud worm, offering cryptocurrency prizes for the most package compromises."],"insights":["Low-privileged users can indefinitely lock SMB file shares using standard API calls with dwShareMode set to zero, causing ERP failures and workflow stalls without triggering traditional ransomware indicators.","Modifying the tokenizer.json configuration file in Hugging Face models directly hijacks generated output and enables data exfiltration across multiple formats without altering model weights or requiring adversarial inputs.","Threat actors are repurposing NATS, a high-performance messaging system, as a command-and-control channel to bypass traditional HTTP-based or chat-based communication methods.","AI-powered static code analyzers are proving significantly more effective than traditional tools at identifying genuine vulnerabilities, despite generating notable false positives during recent large-scale scans."],"referencedReports":[{"title":"how-strix-found-zero-auth-vulnerability-dod-backed-startup","url":"https://www.strix.ai/blog/how-strix-found-zero-auth-vulnerability-dod-backed-startup","publisher":"Strix","context":"The article references Strix's technical analysis detailing how their team discovered an unauthenticated API vulnerability exposing sensitive military training data."},{"title":"operation-grieflure-dissecting-an-apt-campaign-targeting-vietnams-military-telecom-philippine-healthcare/","url":"https://www.seqrite.com/blog/operation-grieflure-dissecting-an-apt-campaign-targeting-vietnams-military-telecom-philippine-healthcare/","publisher":"Seqrite","context":"The article cites Seqrite's research dissecting a state-sponsored spear-phishing campaign deploying a remote access trojan in Southeast Asia."},{"title":"operation-silentcanvas-jpeg-based-multistage-powershell-intrusion/","url":"https://www.cyfirma.com/research/operation-silentcanvas-jpeg-based-multistage-powershell-intrusion/","publisher":"CYFIRMA","context":"The article references CYFIRMA's research on a multi-stage intrusion campaign that weaponizes PowerShell payloads disguised as JPEG files to deliver ScreenConnect."},{"title":"nats-as-c2-inside-a-new-technique-attackers-are-using-to-harvest-cloud-credentials-and-ai-api-keys","url":"https://www.sysdig.com/blog/nats-as-c2-inside-a-new-technique-attackers-are-using-to-harvest-cloud-credentials-and-ai-api-keys","publisher":"Sysdig","context":"The article cites Sysdig's technical analysis of a novel command-and-control technique leveraging the NATS messaging system to bypass traditional HTTP-based communication channels."},{"title":"tokenizer-tampering","url":"https://www.hiddenlayer.com/research/tokenizer-tampering","publisher":"HiddenLayer","context":"The article references HiddenLayer's research demonstrating how modifying the tokenizer.json file in Hugging Face models can hijack model outputs and enable data exfiltration."}],"body":"\u003cp\u003eThis week\u0026rsquo;s threat landscape features active exploitation of critical vulnerabilities alongside novel attack techniques leveraging legitimate tools and AI components. Palo Alto Networks patched an exploited buffer overflow in PAN-OS, while multiple threat campaigns deployed ransomware and remote access trojans through deceptive file formats and impersonation tactics. Attackers are increasingly abusing trusted infrastructure, utilizing techniques like GhostLock file locking, NATS-based command channels, and Hugging Face tokenizer tampering to bypass detection. AI-powered code analysis and supply chain weaponization are also prominent, with threat actors hosting public competitions to distribute open-source worms. Meanwhile, major tech and government entities are responding with enhanced privacy features, extended regulatory deadlines, and new fraud intelligence sharing agreements. The overarching theme remains that attackers continue to succeed by exploiting weak authentication, unpatched systems, and social engineering, making consistent patching and access control essential defenses.\u003c/p\u003e\n"},{"n":21,"title":"Stealer Backdoor Found in 3 Node-IPC Versions Targeting Developer Secrets","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/stealer-backdoor-found-in-3-node-ipc.html","time":"17:22","priority":"MUST READ","score":92,"group":"I","groupColor":"#c084fc","tldr":"Three recently published node-ipc npm versions (9.1.6, 9.2.3, and 12.0.1) were malicious and designed to steal developer and cloud credentials, with 9.x broadly affecting any system that loaded them and 12.0.1 apparently targeting a specific victim. Anyone who installed these versions should remove them immediately, rotate secrets, and investigate for possible compromise and data exfiltration.","briefOverview":"\u003cp\u003eCybersecurity researchers from Socket and StepSecurity reported that three npm releases of node-ipc — 9.1.6, 9.2.3, and 12.0.1 — contained obfuscated stealer and backdoor functionality. The package is a high-download dependency, and the article says the malicious code was appended directly to \u003ccode\u003enode-ipc.cjs\u003c/code\u003e as an immediately invoked function expression, causing it to execute whenever \u003ccode\u003erequire('node-ipc')\u003c/code\u003e is called. The payload fingerprints the host, enumerates files, collects secrets, compresses the data, and attempts exfiltration through network infrastructure selected via DNS and address logic.\u003c/p\u003e\n\n\u003cp\u003eThe article says the malware seeks about 90 categories of developer and cloud credentials, including AWS, Google Cloud, Azure, SSH keys, Kubernetes tokens, GitHub CLI configs, Terraform state, shell history, and more. StepSecurity found that version 12.0.1 includes a SHA-256 fingerprint gate that makes it inert unless the system matches a hard-coded hash, while the 9.x versions execute on any machine that loads them. A second exfiltration path uses DNS TXT record chunks and overrides the system resolver, and the malware can continue running by forking into detached child processes.\u003c/p\u003e\n\n\u003cp\u003eThe malicious versions were published by an account named \u003ccode\u003eatiertant\u003c/code\u003e, which the article says is not the original author \u003ccode\u003eriaevangelist\u003c/code\u003e, despite appearing in the maintainer list. The package had not been updated since August 2024, and the article notes the 21-month dormancy raises concern that maintainer access may have been compromised or specifically added for the malicious publication. Users are advised to remove the affected versions, reinstall clean releases 9.2.1 or 12.0.0, rotate credentials and secrets, review logs, audit cloud activity, and block traffic to the command-and-control domain.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eResearchers are warning that newly published versions of the npm package \u003ccode\u003enode-ipc\u003c/code\u003e contained malicious code. According to Socket and StepSecurity, the affected versions are \u003ccode\u003enode-ipc@9.1.6\u003c/code\u003e, \u003ccode\u003enode-ipc@9.2.3\u003c/code\u003e, and \u003ccode\u003enode-ipc@12.0.1\u003c/code\u003e. Socket described the activity as obfuscated stealer and backdoor behavior that fingerprints the environment, reads local files, compresses stolen data, wraps it in a cryptographic envelope, and attempts exfiltration. The package is described as dormant and high-download, which increases the significance of the compromise.\u003c/p\u003e\n\n\u003cp\u003eThe article says the malware does not depend on npm lifecycle scripts such as \u003ccode\u003epreinstall\u003c/code\u003e, \u003ccode\u003einstall\u003c/code\u003e, or \u003ccode\u003epostinstall\u003c/code\u003e. Instead, the malicious payload was appended to the end of \u003ccode\u003enode-ipc.cjs\u003c/code\u003e as an immediately invoked function expression, causing the code to run whenever \u003ccode\u003erequire('node-ipc')\u003c/code\u003e executes. StepSecurity said the payload is heavily obfuscated and activates at runtime, targeting a broad set of developer and cloud secrets. The article lists about 90 categories of credentials and sensitive material, including cloud provider credentials, SSH keys, Kubernetes tokens, GitHub CLI configs, Claude AI and Kiro IDE settings, Terraform state, database passwords, and shell history.\u003c/p\u003e\n\n\u003cp\u003eThe malware compresses collected data into a GZIP archive and attempts exfiltration to \u003ccode\u003esh.azurestaticprovider[.]net\u003c/code\u003e. The article also describes a second exfiltration mechanism that encodes archive chunks into DNS TXT records after overriding the system’s DNS resolver with Google Public DNS. StepSecurity said the malware first resolves the fake Azure domain via \u003ccode\u003e1.1.1.1\u003c/code\u003e or \u003ccode\u003e8.8.8.8\u003c/code\u003e to obtain the C2 IP, then points the resolver directly at the C2 IP for exfiltration queries. According to the article, this direct-to-C2 DNS method reduces visibility in public DNS logs and may evade organizations relying only on corporate DNS logging.\u003c/p\u003e\n\n\u003cp\u003eA notable distinction among the malicious releases is that version \u003ccode\u003e12.0.1\u003c/code\u003e includes a SHA-256 fingerprint check. StepSecurity said this version compares a computed hash against a hard-coded target assembled from obfuscated fragments, making it inert on systems that do not match the intended fingerprint. The article says this indicates the attacker knew the exact project or developer being targeted for \u003ccode\u003e12.0.1\u003c/code\u003e, while the 9.x releases do not include this gate and execute on any system that loads them. The malware also tries to persist beyond the parent process by forking itself into detached background child processes.\u003c/p\u003e\n\n\u003cp\u003eThe article attributes publication of the malicious versions to an account named \u003ccode\u003eatiertant\u003c/code\u003e, which it says has no connection to the original author \u003ccode\u003eriaevangelist\u003c/code\u003e. Although \u003ccode\u003eatiertant\u003c/code\u003e appeared in the maintainer list, the account reportedly had no prior publish history for \u003ccode\u003enode-ipc\u003c/code\u003e, and the previous package update occurred in August 2024. The article says the 21-month gap suggests either the account was newly compromised or was added as a maintainer specifically to publish the malicious versions. It also notes that \u003ccode\u003enode-ipc\u003c/code\u003e has a prior history of controversial and malicious functionality, including 2022 releases that overwrote files on systems in Russia or Belarus and later versions that included the \u003ccode\u003epeacenotwar\u003c/code\u003e dependency.\u003c/p\u003e\n\n\u003cp\u003eUsers are advised to remove the compromised versions and reinstall known clean versions \u003ccode\u003e9.2.1\u003c/code\u003e and \u003ccode\u003e12.0.0\u003c/code\u003e. The article further recommends assuming compromise, rotating credentials and secrets, auditing npm publish activity for packages accessible with rotated tokens, reviewing workflow run logs, and checking cloud logs for unauthorized actions by affected IAM identities. Blocking egress traffic to the command-and-control domain is also recommended. Upwind characterized the campaign as an example of software supply chain attacks evolving into infrastructure-aware credential harvesting operations aimed at identities and automation systems used in software delivery.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eCybersecurity researchers are warning that three recently published versions of the npm package \u003ccode\u003enode-ipc\u003c/code\u003e contained malicious functionality designed to steal secrets and provide backdoor-like capabilities. The article cites research from Socket and StepSecurity, which confirmed that the malicious versions are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003enode-ipc@9.1.6\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003enode-ipc@9.2.3\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003enode-ipc@12.0.1\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSocket said early analysis showed the package versions contained obfuscated stealer and backdoor behavior. According to the article, the malware fingerprints the host environment, enumerates and reads local files, compresses and chunks collected data, wraps it in a cryptographic envelope, and attempts exfiltration through network infrastructure chosen via DNS and address-selection logic.\u003c/p\u003e\n\n\u003ch1 id=\"why-the-incident-matters\"\u003eWhy the Incident Matters\u003c/h1\u003e\n\n\u003cp\u003eThe article presents this as a serious software supply chain event involving a known, high-download npm package. It emphasizes that the package had been dormant for an extended period and was then used to deliver credential-harvesting malware. Because \u003ccode\u003enode-ipc\u003c/code\u003e is a dependency that may be loaded during normal application runtime, the malicious behavior could trigger simply when software requires the package.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights that this campaign reflects the broader evolution of supply chain attacks. Upwind’s Avital Harel said such attacks are moving beyond simple malicious packages toward infrastructure-aware operations that target identities and automation systems used in modern software delivery.\u003c/p\u003e\n\n\u003ch1 id=\"malicious-versions-identified\"\u003eMalicious Versions Identified\u003c/h1\u003e\n\n\u003cp\u003eThe article states that three versions have been confirmed as malicious:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e9.1.6\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e9.2.3\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e12.0.1\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eUsers are advised to remove these versions and reinstall known clean releases:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e9.2.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e12.0.0\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"execution-method\"\u003eExecution Method\u003c/h1\u003e\n\n\u003cp\u003eA key technical detail in the article is that the malware does \u003cstrong\u003enot\u003c/strong\u003e rely on npm lifecycle hooks such as \u003ccode\u003epreinstall\u003c/code\u003e, \u003ccode\u003einstall\u003c/code\u003e, or \u003ccode\u003epostinstall\u003c/code\u003e. Instead, the payload was appended directly to the end of \u003ccode\u003enode-ipc.cjs\u003c/code\u003e as an Immediately Invoked Function Expression (IIFE).\u003c/p\u003e\n\n\u003cp\u003eThis implementation means the malicious code executes unconditionally whenever code runs:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003erequire('node-ipc')\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this makes the payload fire at runtime rather than during installation, which is a notable implementation detail because it embeds the malicious logic directly into the package’s normal execution path.\u003c/p\u003e\n\n\u003ch1 id=\"what-the-malware-collects\"\u003eWhat the Malware Collects\u003c/h1\u003e\n\n\u003cp\u003eStepSecurity said the payload attempts to exfiltrate a wide range of developer and cloud secrets. The article states it targets \u003cstrong\u003e90 categories of credentials and sensitive material\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eExamples named in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAmazon Web Services credentials\u003c/li\u003e\n\u003cli\u003eGoogle Cloud credentials\u003c/li\u003e\n\u003cli\u003eMicrosoft Azure credentials\u003c/li\u003e\n\u003cli\u003eSSH keys\u003c/li\u003e\n\u003cli\u003eKubernetes tokens\u003c/li\u003e\n\u003cli\u003eGitHub CLI configurations\u003c/li\u003e\n\u003cli\u003eClaude AI settings\u003c/li\u003e\n\u003cli\u003eKiro IDE settings\u003c/li\u003e\n\u003cli\u003eTerraform state\u003c/li\u003e\n\u003cli\u003eDatabase passwords\u003c/li\u003e\n\u003cli\u003eShell history\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the harvested data is compressed into a GZIP archive before exfiltration.\u003c/p\u003e\n\n\u003ch1 id=\"exfiltration-infrastructure-and-methods\"\u003eExfiltration Infrastructure and Methods\u003c/h1\u003e\n\n\u003cp\u003eThe article says the compressed data is transmitted to the domain:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003esh.azurestaticprovider[.]net\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also describes a second exfiltration channel based on DNS. According to StepSecurity, the malware encodes chunks of the stolen archive into DNS TXT records. Before doing so, it overrides the system DNS resolver with Google Public DNS in order to sidestep local DNS-based security controls.\u003c/p\u003e\n\n\u003cp\u003eThe article provides the following sequence for that behavior:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eThe malware resolves \u003ccode\u003esh.azurestaticprovider.net\u003c/code\u003e using \u003ccode\u003e1.1.1.1\u003c/code\u003e as primary or \u003ccode\u003e8.8.8.8\u003c/code\u003e as fallback.\u003c/li\u003e\n\u003cli\u003eIt obtains the command-and-control IP address.\u003c/li\u003e\n\u003cli\u003eIt then points the resolver directly at the C2 IP for all exfiltration queries.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eStepSecurity said this direct-to-C2 DNS method is notable because the exfiltration queries do not touch public DNS resolvers. The article says that, as a result, there is no observable \u003ccode\u003ebt.node.js\u003c/code\u003e activity in public DNS logs, and organizations relying only on DNS logging through corporate resolvers may not see the traffic.\u003c/p\u003e\n\n\u003ch1 id=\"victim-targeting-and-fingerprinting\"\u003eVictim Targeting and Fingerprinting\u003c/h1\u003e\n\n\u003cp\u003eOne of the most notable technical distinctions in the article concerns version \u003ccode\u003e12.0.1\u003c/code\u003e. StepSecurity researcher Sai Likhith said that release performs a SHA-256 fingerprint check and compares the result against a hard-coded hash assembled from eight obfuscated table fragments embedded in the code.\u003c/p\u003e\n\n\u003cp\u003eThe article says this causes \u003ccode\u003e12.0.1\u003c/code\u003e to remain inert unless the machine’s primary module path hashes to the expected value. StepSecurity concluded this means the attacker knew exactly which project or developer was being targeted and pre-computed the hash of the intended entry point before publishing the package.\u003c/p\u003e\n\n\u003cp\u003eBy contrast, the article says the \u003ccode\u003e9.x\u003c/code\u003e malicious versions do \u003cstrong\u003enot\u003c/strong\u003e include this gate. Those versions execute the full payload on any system that loads them.\u003c/p\u003e\n\n\u003ch1 id=\"persistence-behavior\"\u003ePersistence Behavior\u003c/h1\
