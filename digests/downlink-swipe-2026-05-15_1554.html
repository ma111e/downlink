ts executive. These two officials will coordinate across spy agencies and convene an interagency group to evaluate evidence of foreign meddling. They recently briefed congressional intelligence committee aides and confirmed that ODNI will utilize the existing notification framework for reporting foreign interference. ODNI leadership emphasized that an expansive team is conducting robust briefings comparable to traditional election year operations.\u003c/p\u003e\n\n\u003cp\u003eThis activity unfolds amid significant controversy surrounding Gabbard’s recent actions. She faced bipartisan scrutiny after being photographed at an FBI raid on a Georgia election office linked to unproven 2020 election fraud claims. Gabbard later testified she was merely observing at the president’s request and did not participate in the law enforcement search. Her office also faced criticism for seizing voting machines in Puerto Rico, though officials maintained the action was solely for assessing security vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eDespite the political friction, Republican lawmakers remain focused on the operational response. House Intelligence Committee Chair Rick Crawford stated that intelligence agencies are paying closer attention to increasingly aggressive foreign adversaries. He emphasized that the primary concern is not just presidential races, but the significant influence foreign actors can exert at the congressional and state levels.\u003c/p\u003e\n\n\u003cp\u003eStructural changes within the intelligence community have also altered the threat landscape. The Foreign Malign Influence Center, established by Congress in 2022, was scaled back and folded into ODNI after Republicans argued its disinformation countermeasures suppressed conservative free speech. Simultaneously, federal budget cuts reduced CISA’s workforce by approximately 1,000 employees. This reduction has forced CISA to cut back on election security training and digital assistance for state and local officials.\u003c/p\u003e\n\n\u003cp\u003eDemocratic lawmakers have voiced serious concerns about these developments. Senator Mark Warner described recent intelligence briefings as unsatisfying and questioned how threat intelligence will reach local election officials without CISA’s robust distribution network. Cybersecurity experts warn that the 2026 cycle will be highly unpredictable due to artificial intelligence amplifying foreign disinformation campaigns. Meanwhile, Cyber Command and the NSA are preparing to reconvene their joint election security group to monitor foreign chatter, with formal plans expected to be submitted to ODNI and the Department of Defense.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eThe ODNI is restructuring its election security posture for the 2026 midterms amid political controversy, institutional reorganizations, and emerging technological threats.\u003c/p\u003e\n\n\u003ch3 id=\"leadership-appointments-and-coordination\"\u003eLeadership Appointments and Coordination\u003c/h3\u003e\n\n\u003cp\u003eODNI Director Tulsi Gabbard has appointed Dave Mastro from the National Intelligence Council and James Cangialosi, deputy chief of the National Counterintelligence and Security Center, to jointly serve as the intelligence community’s election threats executive. This role, originally established during President Donald Trump’s first term, is tasked with convening an interagency group to evaluate and publicize evidence of foreign meddling. Mastro and Cangialosi recently conducted closed-door briefings for House and Senate Intelligence committee aides, reaffirming that ODNI will adhere to the established notification framework for foreign interference in U.S. elections. ODNI spokesperson Olivia Coleman confirmed that an expansive team is providing robust, election-year-level briefings to safeguard election integrity.\u003c/p\u003e\n\n\u003ch3 id=\"political-context-and-leadership-scrutiny\"\u003ePolitical Context and Leadership Scrutiny\u003c/h3\u003e\n\n\u003cp\u003eThe appointment and briefing activity occur against a backdrop of intense scrutiny surrounding Director Gabbard. Gabbard faced widespread criticism after being photographed at an FBI raid on a Georgia election office tied to former President Trump’s unproven claims of 2020 election fraud. She later testified that she was present only to observe at the president’s request and did not participate in the law enforcement operation. Additional Democratic criticism emerged regarding ODNI’s seizure of voting machines in Puerto Rico, though the office maintains the action was strictly for assessing security vulnerabilities rather than investigating a specific election. Despite the political friction, Republican leadership remains focused on the intelligence response. House Intelligence Committee Chair Rick Crawford emphasized that intelligence agencies are tracking increasingly aggressive foreign adversaries and that the primary concern lies in the potential impact at the congressional and state levels rather than just the presidential race.\u003c/p\u003e\n\n\u003ch3 id=\"institutional-restructuring-and-resource-constraints\"\u003eInstitutional Restructuring and Resource Constraints\u003c/h3\u003e\n\n\u003cp\u003eThe operational landscape for election security has shifted significantly due to recent administrative and legislative changes. Key structural adjustments include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe Foreign Malign Influence Center, created by Congress in 2022, was scaled back and folded into ODNI following Republican arguments that its counter-disinformation efforts suppressed conservative free speech.\u003c/li\u003e\n\u003cli\u003eFederal budget cuts reduced the Cybersecurity and Infrastructure Security Agency (CISA) workforce by approximately 1,000 employees, eliminating more than one-third of its staff.\u003c/li\u003e\n\u003cli\u003eCISA has consequently scaled back its election security training and digital security assistance programs for state and local election officials.\nSenator Mark Warner criticized these cuts, noting that the decimation of CISA undermines the distribution model required to push threat intelligence to local election officials.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"emerging-threats-and-operational-readiness\"\u003eEmerging Threats and Operational Readiness\u003c/h3\u003e\n\n\u003cp\u003eCybersecurity specialists and election experts have warned that the 2026 electoral cycle will be highly unpredictable due to artificial intelligence. AI’s capacity to rapidly spread misinformation and disinformation creates a compounding threat when combined with state-sponsored efforts from Russia, China, and Iran. In response, personnel from U.S. Cyber Command and the National Security Agency have been placed on alert for foreign adversary chatter regarding U.S. elections. These entities are expected to reconvene their joint election security group, with formal proposals outlining their operational plans to be submitted to Director Gabbard and Defense Secretary Pete Hegseth. Lawmakers from both parties continue to press the intelligence community for additional briefings and clearer strategies to address these evolving threats.\u003c/p\u003e\n","keyPoints":["ODNI appointed Dave Mastro and James Cangialosi to coordinate across intelligence agencies for monitoring threats to the 2026 elections.","The Foreign Malign Influence Center was scaled back and folded into ODNI after Republicans argued its disinformation countermeasures suppressed conservative free speech.","Administration budget cuts reduced CISA's workforce by roughly 1,000 employees, significantly decreasing election security training and digital assistance for local officials.","Cyber Command and the NSA are preparing to reconvene their joint election security group to monitor foreign adversary chatter regarding U.S. elections."],"insights":["The folding of the Foreign Malign Influence Center into ODNI has shifted election threat monitoring from a specialized counter-disinformation hub to a broader intelligence coordination function.","CISA’s workforce reduction by roughly one-third has eliminated direct federal digital security training and assistance for state and local election officials, creating a critical defense gap.","Intelligence officials and lawmakers identify state-level and congressional district elections as the primary targets for foreign interference, indicating a strategic shift toward localized disruption rather than presidential race manipulation.","The explicit recognition of AI as a compounding threat multiplier for foreign disinformation campaigns highlights an urgent operational gap in defending against synthetic media and automated misinformation."],"referencedReports":[],"body":"\u003cp\u003eThe ODNI has appointed Dave Mastro and James Cangialosi to coordinate across intelligence agencies for monitoring threats to the 2026 midterm elections. This initiative follows recent scrutiny of Director Tulsi Gabbard regarding her involvement in re-examining 2020 election claims and her presence at a Georgia election office raid. Despite the controversy, ODNI leadership confirmed that robust briefings and an existing notification framework will guide election security efforts. However, the Foreign Malign Influence Center, previously the hub for countering election disinformation, was scaled back and folded into ODNI following political pushback. Concurrently, administration budget cuts reduced CISA’s workforce by roughly one-third, significantly limiting its capacity to provide election security training and digital assistance to local officials. Lawmakers from both parties have expressed concerns about these structural changes and the potential impact of AI-driven disinformation on state-level elections.\u003c/p\u003e\n"},{"n":8,"title":"TeamPCP hackers advertise Mistral AI code repos for sale","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/teampcp-hackers-advertise-mistral-ai-code-repos-for-sale/","time":"22:50","priority":"SHOULD READ","score":85,"group":"D","groupColor":"#f472b6","tldr":"TeamPCP hackers are threatening to leak Mistral AI's internal source code unless they find a buyer within a week, following a supply-chain breach that compromised some SDK packages but left core systems and user data secure.","briefOverview":"\u003cp\u003eTeamPCP hackers are threatening to leak nearly 450 Mistral AI repositories unless they secure a buyer within a week. The group is asking $25,000 for the stolen data, which they claim includes five gigabytes of internal source code used for model training and benchmarking. They offer a flexible pricing model and warn that the data will be publicly released for free if no purchase is made within seven days.\u003c/p\u003e\n\n\u003cp\u003eMistral AI confirmed the breach originated from the Mini Shai-Hulud supply-chain attack, which compromised CI/CD credentials and contaminated official SDK packages. Despite the intrusion, the company emphasized that core repositories, hosted services, and user data remain secure. The same supply-chain incident also affected OpenAI, impacting two employees and exposing a limited subset of internal code. OpenAI has since rotated exposed code-signing certificates and issued urgent update warnings for macOS users.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTeamPCP hackers have posted a threat on a hacking forum demanding $25,000 for access to nearly 450 Mistral AI repositories. The group claims to possess five gigabytes of internal source code related to training, fine-tuning, benchmarking, and model delivery. They offer a flexible pricing model and warn that the data will be leaked publicly for free if no buyer is found within seven days.\u003c/p\u003e\n\n\u003cp\u003eMistral AI verified that the breach occurred after the Mini Shai-Hulud supply-chain attack compromised official npm packages. The initial compromise involved stolen CI/CD credentials and the exploitation of legitimate workflows. This attack subsequently spread to hundreds of other projects across npm and PyPI registries, including UiPath, Guardrails AI, and OpenSearch. TeamPCP successfully contaminated some of Mistral AI\u0026rsquo;s SDK packages for a brief period before the intrusion was contained.\u003c/p\u003e\n\n\u003cp\u003eWhile TeamPCP contaminated some of Mistral AI\u0026rsquo;s SDK packages temporarily, the company\u0026rsquo;s forensic investigation determined that the breached data did not include core repositories. Mistral AI explicitly stated that hosted services, managed user data, and research environments were never compromised. The breach was traced back to a single developer device that was impacted by the TanStack supply-chain attack.\u003c/p\u003e\n\n\u003cp\u003eThe TanStack supply-chain attack also impacted OpenAI\u0026rsquo;s internal systems, granting limited access to source code repositories for two employees. OpenAI confirmed that while a small set of credentials was stolen, there is no evidence they were used to launch additional attacks. OpenAI has already rotated the exposed code-signing certificates and issued a mandatory update warning for macOS users. Users must update their OpenAI desktop applications before June 12, or the software will fail to launch and stop receiving updates.\u003c/p\u003e\n\n\u003cp\u003eRelated incidents in the article include compromises to SAP npm packages, a Bitwarden CLI package used to steal developer credentials, and a backdoored Telnyx PyPI package that distributed malware hidden in WAV audio files. The article concludes by promoting a technical guide on validating six distinct security surfaces beyond basic network penetration testing.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncident Overview\u003c/strong\u003e\nTeamPCP hackers are actively threatening to leak Mistral AI\u0026rsquo;s internal source code unless they secure a buyer within a week. The group is asking for $25,000 for a dataset comprising nearly 450 repositories. They claim the stolen data totals approximately five gigabytes and includes internal code used for model training, fine-tuning, benchmarking, and inference experiments.\u003c/p\u003e\n\n\u003cp\u003eThe hackers have indicated that the asking price is flexible and they are open to receiving competitive offers. They warn that if no purchase is made within seven days, they will publicly release the entire dataset for free. This commercialized threat strategy prioritizes rapid monetization over permanent data destruction.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eAttack Vector and Supply-Chain Impact\u003c/strong\u003e\nThe breach originated from the Mini Shai-Hulud supply-chain attack, which successfully compromised official npm packages from both TanStack and Mistral AI. Attackers utilized stolen CI/CD credentials and exploited legitimate workflows to infiltrate the systems. This initial compromise rapidly cascaded across hundreds of other software projects hosted on npm and PyPI registries.\u003c/p\u003e\n\n\u003cp\u003eNotable third-party projects affected by the spread include UiPath, Guardrails AI, and OpenSearch. TeamPCP successfully contaminated some of Mistral AI\u0026rsquo;s SDK packages for a brief period before the intrusion was contained. The incident demonstrates how a single compromised developer device can rapidly propagate across multiple software ecosystems.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eCompany Response and Scope of Compromise\u003c/strong\u003e\nMistral AI confirmed the security incident and published a detailed security advisory outlining the breach timeline. Forensic analysis revealed that the compromised data did not intersect with the company\u0026rsquo;s core code repositories. The company explicitly stated that hosted services, managed user data, and all research and testing environments remained secure.\u003c/p\u003e\n\n\u003cp\u003eThe breach was traced back to a single developer device that was impacted by the TanStack supply-chain attack. This distinction highlights that the attackers targeted development artifacts rather than proprietary model weights or production environments. Mistral AI\u0026rsquo;s rapid forensic response successfully contained the threat to SDK packages without core infrastructure exposure.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eRelated Industry Impact\u003c/strong\u003e\nThe TanStack supply-chain attack also compromised OpenAI\u0026rsquo;s internal systems, granting limited access to source code repositories for two employees. OpenAI confirmed that while a small set of credentials was stolen, there is no evidence they were used to launch additional attacks. OpenAI has already rotated the exposed code-signing certificates and issued a mandatory update warning for macOS users.\u003c/p\u003e\n\n\u003cp\u003eUsers must update their OpenAI desktop applications before June 12, or the software will fail to launch and stop receiving updates. This urgent patching requirement underscores how credential theft directly impacts end-user deployment reliability and software continuity.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eBroader Context and Industry Trends\u003c/strong\u003e\nThe article highlights a broader pattern of supply-chain vulnerabilities affecting major technology firms. Related incidents documented include the compromise of official SAP npm packages, a Bitwarden CLI package used to steal developer credentials, and a backdoored Telnyx PyPI package that distributed malware hidden in WAV audio files.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes with a promotional link to a technical guide titled \u0026ldquo;The Validation Gap.\u0026rdquo; The guide argues that automated pentesting tools only answer one question about network movement. It advocates for validating six distinct security surfaces, including threat blocking controls, detection rule efficacy, and cloud configuration integrity.\u003c/p\u003e\n","keyPoints":["TeamPCP hackers are demanding $25,000 for nearly 450 Mistral AI repositories and threaten to publicly leak the data if no buyer is found within a week.","The breach originated from the Mini Shai-Hulud supply-chain attack, which compromised CI/CD credentials and briefly contaminated Mistral AI's SDK packages.","Mistral AI confirmed that the compromised data did not include core code repositories, hosted services, managed user data, or research environments.","The same TanStack supply-chain attack also impacted OpenAI, compromising a limited subset of internal source code repositories for two employees without evidence of further unauthorized access."],"insights":["The supply-chain compromise forced OpenAI to urgently rotate exposed code-signing certificates and mandate immediate desktop app updates for macOS users to prevent software failures, highlighting how credential theft directly impacts end-user deployment reliability.","Despite claims of stealing five gigabytes of internal training and benchmarking data, forensic analysis confirmed the breach excluded core repositories, user data, and research environments, indicating the attackers likely targeted development artifacts rather than proprietary model weights.","A single developer device compromise via TanStack rapidly cascaded across npm and PyPI registries, affecting hundreds of unrelated projects like UiPath and OpenSearch, demonstrating the critical need for strict credential rotation and package verification across multiple ecosystems.","TeamPCP’s threat includes a flexible pricing model and a strict seven-day deadline before a public free leak, reflecting a commercialized threat actor strategy that prioritizes rapid monetization over permanent data destruction."],"referencedReports":[{"title":"Security Advisory","url":"https://docs.mistral.ai/resources/security-advisories","publisher":"Mistral AI","context":"The article references this advisory as the official document published by Mistral AI detailing how the breach occurred through a compromised developer device."}],"body":"\u003cp\u003eTeamPCP hackers are threatening to leak nearly 450 Mistral AI repositories unless they secure a buyer within a week. The group is asking $25,000 for the stolen data, which they claim includes five gigabytes of internal source code used for model training and benchmarking. They offer a flexible pricing model and warn that the data will be publicly released for free if no purchase is made within seven days.\u003c/p\u003e\n\n\u003cp\u003eMistral AI confirmed the breach originated from the Mini Shai-Hulud supply-chain attack, which compromised CI/CD credentials and contaminated official SDK packages. Despite the intrusion, the company emphasized that core repositories, hosted services, and user data remain secure. The same supply-chain incident also affected OpenAI, impacting two employees and exposing a limited subset of internal code. OpenAI has since rotated exposed code-signing certificates and issued urgent update warnings for macOS users.\u003c/p\u003e\n"},{"n":1,"title":"Gremlin Stealer's Evolved Tactics: Hiding in Plain Sight With Resource Files","source":"unit42.paloaltonetworks.com","sourceColor":"#c084fc","link":"https://unit42.paloaltonetworks.com/gremlin-stealer-evolution/","time":"10:00","priority":"SHOULD READ","score":82,"group":null,"groupColor":null,"tldr":"Gremlin Stealer has evolved to conceal its payload in .NET resource files with XOR encryption and employs advanced obfuscation to evade detection, while expanding its targeting to include Discord tokens, cryptocurrency clipboard hijacking, and live browser session hijacking.","briefOverview":"\u003cp\u003eThis article from Unit 42 details the evolution of Gremlin stealer malware, which now employs advanced obfuscation techniques to hide its malicious payload within .NET resource files using XOR encoding. The malware targets web browsers, system clipboard, and local storage to steal payment card details, browser cookies, session tokens, cryptocurrency wallet data, and FTP/VPN credentials, then exfiltrates the data to attacker-controlled servers.\u003c/p\u003e\n\n\u003cp\u003eThe latest variant introduces several new capabilities, including a dedicated Discord token extraction module, a cryptocurrency clipboard hijacker that replaces wallet addresses in real time, and a WebSocket-based session hijacking module that bypasses modern cookie protections. The malware’s code is further protected by a commercial packing utility that uses instruction virtualization, identifier renaming, string encryption, and control-flow obfuscation to hinder static analysis.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eUnit 42 researchers identified a new variant of Gremlin stealer that conceals its payload in the .NET Resource section using XOR encryption, a tactic that evades signature-based detection and heuristic scanning. The malware exfiltrates stolen data—including browser cookies, session tokens, clipboard contents, cryptocurrency wallet data, and FTP/VPN credentials—to a newly deployed C2 site at hxxp://194.87.92[.]109. At discovery, this site had zero detections on VirusTotal, with no block list entries or malicious categorizations.\u003c/p\u003e\n\n\u003cp\u003eCompared to older versions, which lacked obfuscation and left function exports intact, the current iteration implements a staged loading mechanism where each critical function is decrypted and mapped into memory only when needed. This forces analysts to perform dynamic debugging to observe meaningful behavior. The malware also uses a commercial packing utility that applies instruction virtualization, converting original code into custom bytecode executed by a private virtual machine.\u003c/p\u003e\n\n\u003cp\u003eKey enhancements in the latest variant include an expanded target scope with a Discord token extraction module, a crypto clipper that monitors the clipboard for cryptocurrency wallet addresses and replaces them with the attacker’s address during transactions, and a WebSocket-based session hijacking module that requests session data directly from running browser processes to bypass modern cookie protections. The malware names the exfiltrated ZIP archive using the victim’s public IP address.\u003c/p\u003e\n\n\u003cp\u003ePalo Alto Networks protects against this threat through several products: Advanced WildFire, Advanced URL Filtering, Advanced DNS Security, Advanced Threat Prevention, Cortex XDR, and XSIAM. These tools prevent execution of known and unknown malware, detect credential gathering tools, and identify malicious domains and URLs. The article lists 11 SHA256 hashes of analyzed samples and the C2 URL as indicators of compromise.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"executive-summary\"\u003eExecutive Summary\u003c/h2\u003e\n\n\u003cp\u003eThe article, published on May 15, 2026, by Unit 42 researchers Pranay Kumar Chhaparwal and Mark Lim, examines new obfuscation techniques used by Gremlin stealer malware. The malware conceals malicious payloads within embedded .NET resource files using XOR encoding and employs a commercial packing utility with instruction virtualization. Gremlin stealer siphons sensitive information from compromised systems—including payment card details, browser cookies, session tokens, cryptocurrency wallet data, and FTP/VPN credentials—and exfiltrates it to attacker-controlled servers.\u003c/p\u003e\n\n\u003ch2 id=\"new-c2-infrastructure\"\u003eNew C2 Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eA new Gremlin variant exfiltrates stolen data to a site at hxxp://194.87.92[.]109. At the time of discovery, this site had zero detections on VirusTotal, with no block list entries, community reports, or malicious categorizations. After data theft, the malware bundles harvested artifacts into a ZIP archive named using the victim’s public IP address and uploads it to the attacker-controlled site.\u003c/p\u003e\n\n\u003ch2 id=\"technical-analysis\"\u003eTechnical Analysis\u003c/h2\u003e\n\n\u003ch3 id=\"hiding-payload-in-resource\"\u003eHiding Payload in Resource\u003c/h3\u003e\n\n\u003cp\u003eThe latest iteration shifts the malicious payload into the .NET Resource section, masking it with XOR encoding to bypass signature-based detection and heuristic scanning. The resource section appears as an opaque block of data, hiding strings and API calls. Applying single-byte XOR decryption recovers plain-text configuration revealing hard-coded C2 URLs and exfiltration paths. This tactic mirrors that of malware families such as Agent Tesla, GuLoader, LokiBot, and Quasar RAT.\u003c/p\u003e\n\n\u003ch3 id=\"comparison-with-older-version\"\u003eComparison with Older Version\u003c/h3\u003e\n\n\u003cp\u003eLegacy samples lacked obfuscation, leaving function exports and internal symbols intact. The current iteration implements a staged loading mechanism where each critical function is decrypted and mapped into memory from the .NET resource section only when needed, forcing analysts to perform dynamic debugging.\u003c/p\u003e\n\n\u003ch3 id=\"key-enhancements\"\u003eKey Enhancements\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eExpanded target scope\u003c/strong\u003e: A dedicated Discord token extraction module pivots toward targeting digital identity.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eActive financial fraud\u003c/strong\u003e: A crypto clipper continuously monitors the system clipboard for cryptocurrency wallet patterns and replaces the victim’s address with the attacker’s in real time.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAdvanced persistence\u003c/strong\u003e: A WebSocket-based session hijacking module requests data directly from running browser processes, bypassing modern cookie protections.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"packed-sample-using-commercial-packing-utility\"\u003ePacked Sample Using Commercial Packing Utility\u003c/h3\u003e\n\n\u003cp\u003eA variant (SHA256 2172dae9a5a695e00e0e4609e7db0207d8566d225f7e815fada246ae995c0f9b) was packed using a commercial packing utility. It employs three main anti-analysis techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eIdentifier Renaming\u003c/strong\u003e: All meaningful names for classes, methods, and variables are replaced with meaningless ones (e.g., a, b, c, hf, bb), removing context for analysts.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eString Encryption\u003c/strong\u003e: All important strings are stored encrypted in an embedded resource file. A decoder function (\u003ccode\u003e_003CModule_003E.c(int, int, int)\u003c/code\u003e) takes three integers, calculates an offset and length, reads encrypted bytes from the resource, decrypts them using the third integer as a key, and returns the readable string. For example, obfuscated code like \u003ccode\u003estring url = global::_003CModule_003E.c(18829, 2178, 23);\u003c/code\u003e at runtime produces \u003ccode\u003estring url = \u0026quot;http://api.ipify.org/?format=json\u0026quot;;\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eControl-Flow Obfuscation\u003c/strong\u003e: Complex and nonsensical if-else statements, goto jumps, and mathematical operations break logical flow, confusing both human analysts and automated tools. Switch statements and goto labels create tangled execution paths.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"palo-alto-networks-protection-and-mitigation\"\u003ePalo Alto Networks Protection and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Palo Alto Networks customers are protected through:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAdvanced WildFire machine-learning models updated to detect the IoCs.\u003c/li\u003e\n\u003cli\u003eAdvanced URL Filtering and Advanced DNS Security identify associated domains and URLs as malicious.\u003c/li\u003e\n\u003cli\u003eAdvanced Threat Prevention provides real-time exploit detection.\u003c/li\u003e\n\u003cli\u003eCortex XDR and XSIAM prevent execution of known and unknown malware via Behavioral Threat Protection and machine learning; protect against credential gathering tools via Credential Gathering Protection; and detect post-exploit activity with behavioral analytics.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eContact information for Unit 42 Incident Response is provided for North America, UK, Europe/Middle East, Asia, Japan, Australia, and India.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article lists 11 SHA256 hashes of Gremlin stealer samples analyzed and the URL hxxp://194.87.92[.]109/i.php as an indicator of compromise.\u003c/p\u003e\n","keyPoints":["Gremlin stealer now hides its malicious payload in the .NET Resource section using XOR encoding to bypass signature-based detection and heuristic scanning.","The malware exfiltrates stolen data such as browser cookies, session tokens, clipboard contents, cryptocurrency wallet data, and FTP/VPN credentials to a new attacker-controlled site at hxxp://194.87.92[.]109.","The latest variant adds a dedicated Discord token extraction module, a crypto clipper that replaces cryptocurrency wallet addresses in the clipboard, and a WebSocket-based session hijacking module for active browser sessions.","A packed variant of Gremlin stealer uses a commercial packing utility that applies identifier renaming, string encryption via a decoder function, and control-flow obfuscation to impede static analysis.","Palo Alto Networks products including Advanced WildFire, Advanced URL Filtering, Advanced DNS Security, Advanced Threat Prevention, and Cortex XDR provide protection against the threats discussed in the article."],"insights":["Despite being a known malware family, the new Gremlin stealer C2 site had zero detections on VirusTotal at discovery, with no block list entries or malicious categorizations.","The WebSocket-based session hijacking module bypasses modern cookie protections by requesting session data directly from the running browser process instead of relying on static database files.","The malware uses a commercial packing utility that employs instruction virtualization, transforming the original code into a custom non-standard bytecode executed by a private virtual machine, which severely impedes static analysis."],"referencedReports":[{"title":"Agent Tesla Campaign","url":"https://www.stormshield.com/news/agent-tesla-campaign/","publisher":"Stormshield","context":"The article cites this report as an example of a malware family that uses the resource section for payload obfuscation, a tactic now mirrored by Gremlin stealer."},{"title":"GuLoader Malware Analysis","url":"https://www.crowdstrike.com/en-us/blog/guloader-malware-analysis/","publisher":"CrowdStrike","context":"The article cites this report as an example of a malware family that uses the resource section for payload obfuscation, a tactic now mirrored by Gremlin stealer."},{"title":"A Deep Dive into LokiBot Infection Chain","url":"https://blog.talosintelligence.com/a-deep-dive-into-lokibot-infection-chain/","publisher":"Talos Intelligence","context":"The article cites this report for LokiBot as an example of a malware family that uses the resource section for payload obfuscation."},{"title":"A Deep Dive into LokiBot Infection Chain","url":"https://blog.talosintelligence.com/a-deep-dive-into-lokibot-infection-chain/","publisher":"Talos Intelligence","context":"The article cites this report for Quasar RAT as an example of a malware family that uses the resource section for payload obfuscation."}],"body":"\u003cp\u003eThis article from Unit 42 details the evolution of Gremlin stealer malware, which now employs advanced obfuscation techniques to hide its malicious payload within .NET resource files using XOR encoding. The malware targets web browsers, system clipboard, and local storage to steal payment card details, browser cookies, session tokens, cryptocurrency wallet data, and FTP/VPN credentials, then exfiltrates the data to attacker-controlled servers.\u003c/p\u003e\n\n\u003cp\u003eThe latest variant introduces several new capabilities, including a dedicated Discord token extraction module, a cryptocurrency clipboard hijacker that replaces wallet addresses in real time, and a WebSocket-based session hijacking module that bypasses modern cookie protections. The malware’s code is further protected by a commercial packing utility that uses instruction virtualization, identifier renaming, string encryption, and control-flow obfuscation to hinder static analysis.\u003c/p\u003e\n"},{"n":13,"title":"Inside the REMUS Infostealer: Session Theft, MaaS, and Rapid Evolution","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/inside-the-remus-infostealer-session-theft-maas-and-rapid-evolution/","time":"14:02","priority":"SHOULD READ","score":82,"group":null,"groupColor":null,"tldr":"The REMUS infostealer campaign reveals a rapid evolution from basic credential theft into a mature malware-as-a-service platform that prioritizes stealing authenticated browser sessions and password manager data, reflecting a broader shift in cybercrime toward operational persistence and professionalized development.","briefOverview":"\u003cp\u003eThe REMUS infostealer emerged in early 2026 and rapidly evolved over a few months from basic credential theft into a sophisticated malware-as-a-service (MaaS) platform. Flare researchers analyzed 128 underground posts between February 12 and May 8, 2026, revealing an aggressive development cycle that prioritized session theft, password-manager targeting, and operational scalability.\u003c/p\u003e\n\n\u003cp\u003eThe malware\u0026rsquo;s operator publicly promoted versioned updates, bug fixes, and customer support, treating the malware like a commercial software product. By April 2026, REMUS added support for IndexedDB collection from 1Password and LastPass extensions and referenced Bitwarden-related searches, showing a clear shift toward stealing authenticated browser sessions rather than just passwords.\u003c/p\u003e\n\n\u003cp\u003eThe campaign highlighted a broader trend in cybercrime where stolen cookies and authenticated sessions are becoming more valuable than standalone credentials, as they can bypass MFA and other security controls. The underground operation demonstrated professionalized MaaS development with multi-operator dashboards, worker tracking, and statistics pages.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eREMUS is a new infostealer malware that entered the cybercrime landscape in early 2026, drawing attention from security researchers due to its similarities to Lumma Stealer. Flare\u0026rsquo;s analysis of 128 underground posts from February 12 to May 8, 2026, provided a rare look at how the threat actor developed and marketed the malware as a commercial MaaS platform.\u003c/p\u003e\n\n\u003cp\u003eThe development cycle was highly compressed: February focused on initial commercial promotion with claims of a ~90% callback rate, March represented the most active development period with features like restore-token functionality, duplicate-log filtering, and worker tracking, April added SOCKS5 proxy support, anti-VM toggles, and password-manager collection (1Password, LastPass, Bitwarden via IndexedDB), and early May focused on refinement and stability.\u003c/p\u003e\n\n\u003cp\u003eA key technical detail is REMUS\u0026rsquo;s emphasis on session theft over traditional credential harvesting. The operator repeatedly promoted cookie collection, token handling, and proxy-assisted restoration of authenticated sessions, reflecting a shift in the underground economy toward artifacts that bypass MFA. Multiple updates referenced \u0026lsquo;Restore\u0026rsquo; improvements and compatibility with multiple proxy types during token restoration workflows.\u003c/p\u003e\n\n\u003cp\u003eThe malware is technically linked to Lumma Stealer as a 64-bit variant sharing anti-VM checks, browser-focused credential theft, and browser encryption bypass techniques. However, the underground data shows the story extends beyond lineage to an aggressive commercial operation with customer support, versioned updates, and operational refinements like statistics dashboards and loader execution visibility.\u003c/p\u003e\n\n\u003cp\u003eThe operation demonstrated increasing professionalization: posts implied a multi-operator environment through references to workers, statistics dashboards, and log categorization. The campaign targeted platforms where active sessions carry substantial value, including Discord, Steam, Riot Games, and Telegram-linked environments. The article notes that infostealers are evolving into mature operational platforms supporting persistence, automation, and long-term monetization.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eREMUS is a new infostealer malware that emerged in the cybercrime landscape in early 2026. Flare researchers conducted an analysis of 128 posts linked to the REMUS underground operation between February 12 and May 8, 2026, providing insight into how the group presents, develops, and operationalizes the malware within underground communities. The findings reveal rapid evolution of capabilities, a growing focus on commercialization, operational scalability, session theft, and password-manager targeting.\u003c/p\u003e\n\n\u003ch2 id=\"technical-capabilities-and-development-cycle\"\u003eTechnical Capabilities and Development Cycle\u003c/h2\u003e\n\n\u003ch3 id=\"february-2026-initial-commercial-push\"\u003eFebruary 2026: Initial Commercial Push\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eEarly posts focused on establishing REMUS as reliable and easy-to-use\u003c/li\u003e\n\u003cli\u003ePromoted browser credential theft, cookie collection, Discord token theft, Telegram delivery, and basic log management\u003c/li\u003e\n\u003cli\u003eThe operator claimed: \u0026lsquo;With good crypting and a dedicated intermediary server, the callback rate is ~90%\u0026rsquo;\u003c/li\u003e\n\u003cli\u003eAnother post marketed the malware as featuring \u0026lsquo;\u003csup\u003e24\u003c/sup\u003e\u0026frasl;\u003csub\u003e7\u003c/sub\u003e support\u0026rsquo; and functionality \u0026lsquo;simple enough that even a child can figure it out\u0026rsquo;\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"march-2026-most-active-development\"\u003eMarch 2026: Most Active Development\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eIntroduced restore-token functionality\u003c/li\u003e\n\u003cli\u003eExpanded log handling, worker tracking, statistics pages, duplicate-log filtering\u003c/li\u003e\n\u003cli\u003eImproved Telegram delivery workflows\u003c/li\u003e\n\u003cli\u003eAdded worker nicknames to log tables and statistics views\u003c/li\u003e\n\u003cli\u003eImproved loader execution visibility to understand failed infections\u003c/li\u003e\n\u003cli\u003eShift toward becoming a broader operational platform rather than just a malware executable\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"april-2026-shift-toward-session-continuity\"\u003eApril 2026: Shift Toward Session Continuity\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eAdded SOCKS5 proxy support\u003c/li\u003e\n\u003cli\u003eImproved token restoration\u003c/li\u003e\n\u003cli\u003eAdded anti-VM toggles\u003c/li\u003e\n\u003cli\u003eAdded gaming-platform targeting (Discord, Steam, Riot Games)\u003c/li\u003e\n\u003cli\u003eAdded password-manager-related collection: \u0026lsquo;Added IndexedDB collection for 1Password and LastPass extensions\u0026rsquo;\u003c/li\u003e\n\u003cli\u003eReferenced Bitwarden-related searches\u003c/li\u003e\n\u003cli\u003eIncreasingly emphasized authenticated sessions, restore workflows, and browser-side storage\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"early-may-2026-refinement-and-stability\"\u003eEarly May 2026: Refinement and Stability\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eRestore improvements, bug fixes, collection optimizations\u003c/li\u003e\n\u003cli\u003eContinued adjustments to delivery and management functionality\u003c/li\u003e\n\u003cli\u003eShift from rapid feature expansion toward platform stabilization\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"connection-to-lumma-stealer\"\u003eConnection to Lumma Stealer\u003c/h2\u003e\n\n\u003cp\u003ePublic reporting has described REMUS as a technically significant successor or variant of the Lumma Stealer. Researchers described the malware as a 64-bit infostealer sharing multiple similarities with Lumma, including anti-VM checks, browser-focused credential theft, and browser encryption bypass techniques. However, the underground data suggests the story extends beyond malware lineage to an aggressive commercial cybercrime product with customer support and continuous development.\u003c/p\u003e\n\n\u003ch2 id=\"emphasis-on-session-theft\"\u003eEmphasis on Session Theft\u003c/h2\u003e\n\n\u003cp\u003eOne of the clearest themes across the REMUS campaign is the growing emphasis on session theft rather than traditional credential harvesting alone. Historically, many infostealers focused primarily on usernames and passwords. REMUS repeatedly emphasized cookie collection, token handling, browser sessions, proxy-assisted restoration, and authenticated access continuity. This reflects a broader shift across the underground economy where stolen cookies and authenticated sessions have become highly valuable commodities, as they may bypass MFA prompts, login alerts, device verification, and risk-based authentication systems.\u003c/p\u003e\n\n\u003cp\u003eMultiple REMUS updates referenced \u0026lsquo;Restore\u0026rsquo; improvements, proxy compatibility, and support for multiple proxy types during token restoration workflows, strongly suggesting the operator viewed session persistence as a major selling point. The campaign targeted platforms where active sessions carry substantial value: Discord, Steam, Riot Games, and Telegram-linked environments.\u003c/p\u003e\n\n\u003ch2 id=\"password-manager-targeting\"\u003ePassword Manager Targeting\u003c/h2\u003e\n\n\u003cp\u003eThe most significant late-stage evolution involved password-manager-related collection. By April 2026, the operator advertised support tied to Bitwarden, 1Password, LastPass, and IndexedDB browser storage. The references to IndexedDB are especially relevant because modern browser applications and extensions frequently use local browser storage mechanisms to retain application data and session information. The posts do not prove successful vault decryption but clearly demonstrate REMUS development moving toward browser-side storage collection associated with password-management ecosystems.\u003c/p\u003e\n\n\u003ch2 id=\"operational-maturity\"\u003eOperational Maturity\u003c/h2\u003e\n\n\u003cp\u003eThe underground activity demonstrates how modern MaaS ecosystems increasingly resemble legitimate software businesses. Across the analyzed posts, the operator repeatedly published versioned updates, bug fixes, feature expansions, troubleshooting improvements, statistics enhancements, and operational visibility refinements. Several posts implied a multi-operator environment through references to workers, statistics dashboards, management visibility, loader monitoring, and log categorization. This structure aligns with broader MaaS trends where malware developers separate development, infrastructure, delivery, and monetization into specialized roles.\u003c/p\u003e\n\n\u003ch2 id=\"key-quotes-from-the-article\"\u003eKey Quotes from the Article\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u0026lsquo;With good crypting and a dedicated intermediary server, the callback rate is ~90%.\u0026rsquo;\u003c/li\u003e\n\u003cli\u003e\u0026lsquo;Simple enough that even a child can figure it out.\u0026rsquo;\u003c/li\u003e\n\u003cli\u003e\u0026lsquo;Added IndexedDB collection for 1Password and LastPass extensions.\u0026rsquo;\u003c/li\u003e\n\u003cli\u003e\u0026lsquo;Stolen Sessions Are the New Stolen Passwords\u0026rsquo; (section heading)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe REMUS campaign offers a revealing look into how modern infostealer operations are evolving far beyond simple credential theft. Over just a few months, the activity showed a clear transition from basic malware promotion into a structured MaaS ecosystem focused on operational reliability, session persistence, and scalable data collection. The repeated emphasis on token restoration, proxy-assisted session recovery, and password-manager-related collection reflects a broader shift in cybercrime operations away from stealing passwords and toward maintaining direct access to already-authenticated environments. Infostealers are rapidly evolving into mature operational platforms that support persistence, automation, and long-term monetization workflows.\u003c/p\u003e\n","keyPoints":["REMUS is a new infostealer malware that emerged in 2026 and rapidly evolved from basic credential theft to include session theft, SOCKS5 proxy support, and password-manager targeting (1Password, LastPass, Bitwarden) within a few months.","The malware's development cycle mirrored a legitimate software business, with the operator publishing versioned updates, bug fixes, feature expansions, and customer support in underground forums.","The campaign placed a strong emphasis on stealing authenticated browser sessions and cookies rather than just passwords, reflecting a broader shift in cybercrime toward bypassing MFA and maintaining persistent access."],"insights":["The operator explicitly claimed a ~90% callback rate when using a proper crypting and intermediary server, revealing that the malware's effectiveness is heavily dependent on delivery infrastructure rather than just the stealer itself.","The REMUS updates included operational management features like worker nicknames in log tables and loader execution visibility, indicating the malware was developed as a multi-operator SaaS-style dashboard rather than a simple executable.","The campaign's repeated emphasis on 'Restore' improvements, proxy compatibility, and support for multiple proxy types during token restoration suggests the malware actively attempts to rehydrate stolen sessions, not merely exfiltrate them."],"referencedReports":[{"title":"Remus: Unpacking the 64-bit Evolution of the Lumma Stealer","url":"https://socprime.com/active-threats/remus-unpacking-the-64-bit-evolution-of-the-lumma-stealer/","publisher":"SocPrime","context":"The article references this as 'Public reporting' that has focused on REMUS as a technically significant successor or variant of the Lumma Stealer."}],"body":"\u003cp\u003eThe REMUS infostealer emerged in early 2026 and rapidly evolved over a few months from basic credential theft into a sophisticated malware-as-a-service (MaaS) platform. Flare researchers analyzed 128 underground posts between February 12 and May 8, 2026, revealing an aggressive development cycle that prioritized session theft, password-manager targeting, and operational scalability.\u003c/p\u003e\n\n\u003cp\u003eThe malware\u0026rsquo;s operator publicly promoted versioned updates, bug fixes, and customer support, treating the malware like a commercial software product. By April 2026, REMUS added support for IndexedDB collection from 1Password and LastPass extensions and referenced Bitwarden-related searches, showing a clear shift toward stealing authenticated browser sessions rather than just passwords.\u003c/p\u003e\n\n\u003cp\u003eThe campaign highlighted a broader trend in cybercrime where stolen cookies and authenticated sessions are becoming more valuable than standalone credentials, as they can bypass MFA and other security controls. The underground operation demonstrated professionalized MaaS development with multi-operator dashboards, worker tracking, and statistics pages.\u003c/p\u003e\n"},{"n":7,"title":"Microsoft backpedals: Edge to stop loading passwords into memory","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-edge-to-stop-loading-cleartext-passwords-in-memory-on-startup/","time":"14:49","priority":"SHOULD READ","score":78,"group":null,"groupColor":null,"tldr":"Microsoft will update Edge so it no longer decrypts and keeps all saved passwords in memory at startup, reversing its earlier position that this behavior was expected. The fix is already in Canary and is being rolled out to supported Edge versions starting with build 148.","briefOverview":"\u003cp\u003eMicrosoft said it is changing Edge so the browser no longer loads saved passwords into process memory in clear text at startup. The company had previously told security researcher Tom Jøran Sønstebyseter Rønning and BleepingComputer that this behavior was expected or \u0026ldquo;by design,\u0026rdquo; but later announced it would make a defense-in-depth change.\u003c/p\u003e\n\n\u003cp\u003eRønning disclosed on May 4 that all credentials stored in Edge’s built-in password manager were decrypted on launch and remained in memory even when not in use. He also released a proof-of-concept tool that could dump passwords from Edge processes, with Administrator privileges allowing access to other users’ processes and no admin privileges allowing access to the same user’s Edge processes.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the reported scenario falls within its existing threat model, which excludes attackers who already have administrative control of a device, but it still chose to reduce password exposure in memory. The fix is already live in the Edge Canary channel and will be included in the next update for all supported Edge releases, build 148 and newer.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft is updating the Edge browser so it no longer loads saved passwords into process memory in clear text at startup. This follows public disclosure by security researcher Tom Jøran Sønstebyseter Rønning, who said Edge decrypted all credentials stored in its built-in password manager on launch and kept them in memory even when they were not being used. Microsoft had initially maintained that the behavior was expected or \u0026ldquo;by design\u0026rdquo; before later announcing a change.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, Rønning disclosed the issue on May 4 and demonstrated the behavior publicly. He also released a proof-of-concept tool that could allow attackers with Administrator privileges to dump passwords from other users’ Edge processes. Without admin privileges, the tool could still access Edge processes launched by the same user.\u003c/p\u003e\n\n\u003cp\u003eRønning said Edge was the only Chromium-based browser he tested that behaved this way. He contrasted this with Chrome, saying Chrome uses a design that makes it much harder for attackers to extract saved passwords simply by reading process memory. This comparison highlighted why the Edge behavior stood out in his testing.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft told BleepingComputer at the time that the scenario was an expected feature of the application, and later said the reported issue fell within its existing threat model. Specifically, the article notes that Microsoft’s threat model excludes attacks where an adversary already has administrative control of a device. Even so, Microsoft said it is taking a broader view under its Secure Future Initiative and customer feedback, and is implementing the change as a defense-in-depth improvement.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft Edge Security Lead Gareth Evans said the change will come to every supported version of Edge, including Stable, Beta, Dev, Canary, and the Extended Stable channel used by enterprise customers. The fix is already live in the Edge Canary channel. It will be included in the next update for all supported Edge releases, build 148 and newer.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes other Edge-related security actions by Microsoft from the past year. These include a feature to protect against malicious sideloaded extensions and restrictions on access to Edge’s Internet Explorer mode after hackers used zero-day exploits in the Chakra JavaScript engine to access target devices.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"microsoft-changes-edge-password-handling-after-public-disclosure\"\u003eMicrosoft changes Edge password handling after public disclosure\u003c/h1\u003e\n\n\u003cp\u003eMicrosoft announced that it is updating the Edge browser so that saved passwords are no longer loaded into process memory in clear text at startup. The article says this change comes after the company had previously characterized the behavior as expected or \u0026ldquo;by design,\u0026rdquo; but later decided to change it.\u003c/p\u003e\n\n\u003cp\u003eThe issue was disclosed publicly on May 4 by security researcher Tom Jøran Sønstebyseter Rønning. According to the article, he demonstrated that all credentials stored in the Edge built-in password manager were decrypted as soon as the browser launched and remained in memory even when they were not actively being used.\u003c/p\u003e\n\n\u003ch1 id=\"what-the-researcher-reported\"\u003eWhat the researcher reported\u003c/h1\u003e\n\n\u003cp\u003eRønning publicly described the behavior and released a proof-of-concept tool. The article says the tool would allow attackers with Administrator privileges to dump passwords from other users’ Edge processes.\u003c/p\u003e\n\n\u003cp\u003eIt also states that, without admin privileges, the proof-of-concept still allowed access to Edge processes launched by the same user. This means the exposure described in the article was not limited only to cross-user process access under elevated permissions.\u003c/p\u003e\n\n\u003cp\u003eThe researcher also said he had reported the issue to Microsoft before making it public. According to the article, Microsoft told him the behavior was \u0026ldquo;by design\u0026rdquo; before the disclosure.\u003c/p\u003e\n\n\u003cp\u003eRønning further said that Edge was the only Chromium-based browser he had tested that behaved this way. He contrasted it with Chrome, which he said uses a design that makes it far harder for attackers to extract saved passwords by simply reading process memory.\u003c/p\u003e\n\n\u003ch1 id=\"microsoft-s-initial-position-and-later-reversal\"\u003eMicrosoft’s initial position and later reversal\u003c/h1\u003e\n\n\u003cp\u003eThe article says Microsoft initially refused to address the issue. At the time, the company told BleepingComputer that the behavior was \u0026ldquo;an expected feature of the application.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eLater, Microsoft announced that future versions of Edge would stop loading saved passwords into memory at startup. The company said that, although the reported scenario falls within its existing threat model, it was still making the change as a defense-in-depth improvement.\u003c/p\u003e\n\n\u003cp\u003eThe article specifically notes that Microsoft’s existing threat model excludes attacks in which an adversary already has administrative control of a device. Despite that, Microsoft said it is taking a broader view in line with its Secure Future Initiative and customer feedback.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft Edge Security Lead Gareth Evans said the company is looking not only at whether a condition meets the threshold for a security issue, but also at where exposure can be reduced through defense-in-depth improvements. In this case, the company said reducing password exposure in memory is a practical step in that direction.\u003c/p\u003e\n\n\u003ch1 id=\"scope-of-the-fix-and-rollout-details\"\u003eScope of the fix and rollout details\u003c/h1\u003e\n\n\u003cp\u003eMicrosoft said the defense-in-depth change will be delivered to every supported version of Edge. The article lists the following channels as included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eStable\u003c/li\u003e\n\u003cli\u003eBeta\u003c/li\u003e\n\u003cli\u003eDev\u003c/li\u003e\n\u003cli\u003eCanary\u003c/li\u003e\n\u003cli\u003eExtended Stable\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the fix is already live in the Edge Canary channel. It also says the change will be included in the next update for all supported Edge releases, build 148 and newer.\u003c/p\u003e\n\n\u003ch1 id=\"why-the-issue-drew-attention\"\u003eWhy the issue drew attention\u003c/h1\u003e\n\n\u003cp\u003eThe behavior stood out because the researcher said Edge loaded all saved credentials into memory in clear text at startup and kept them there even when not in use. The article also emphasizes that he tested other Chromium-based browsers and identified this behavior as unique to Edge among those he examined.\u003c/p\u003e\n\n\u003cp\u003eThe proof-of-concept added a practical demonstration component to the disclosure. According to the article, it showed that password dumping could occur across users with Administrator privileges and for the same user without Administrator privileges.\u003c/p\u003e\n\n\u003ch1 id=\"related-microsoft-edge-security-actions-mentioned\"\u003eRelated Microsoft Edge security actions mentioned\u003c/h1\u003e\n\n\u003cp\u003eThe article closes by pointing to two prior Edge-related security moves by Microsoft:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLast year, Microsoft introduced a new Edge security feature intended to protect users against malicious extensions sideloaded into the browser.\u003c/li\u003e\n\u003cli\u003eMicrosoft also restricted access to Edge’s Internet Explorer mode after hackers began leveraging zero-day exploits in the Chakra JavaScript engine to access target devices.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"bottom-line\"\u003eBottom line\u003c/h1\u003e\n\n\u003cp\u003eThe central development in the article is Microsoft’s decision to change Edge so it no longer decrypts and retains saved passwords in memory at browser startup. This follows a public disclosure, a proof-of-concept demonstrating password extraction from Edge processes, and criticism that Microsoft had originally dismissed the behavior as expected.\u003c/p\u003e\n\n\u003cp\u003eThe announced fix is already present in Canary and is slated for rollout across all supported Edge channels in build 148 and newer. The company frames the update as a defense-in-depth improvement rather than as a change driven by a threat scenario outside its stated model.\u003c/p\u003e\n","keyPoints":["Microsoft said it will update Edge so saved passwords are no longer loaded into process memory in clear text at startup.","Security researcher Tom Jøran Sønstebyseter Rønning disclosed that Edge decrypted all credentials stored in its built-in password manager on launch and kept them in memory even when not in use.","Rønning released a proof-of-concept tool that could dump passwords from other users' Edge processes with Administrator privileges, and from the same user's Edge processes without admin privileges.","Microsoft had initially told the researcher and BleepingComputer that this behavior was expected or \"by design,\" but later announced a defense-in-depth change to reduce password exposure in memory.","Microsoft said the fix is already live in the Edge Canary channel and will be included in the next update for all supported Edge releases, build 148 and newer."],"insights":["Microsoft reversed its earlier stance that Edge loading saved passwords into memory at startup was \"by design\" and is now treating the change as a defense-in-depth improvement.","The researcher noted that Edge was the only Chromium-based browser he tested that loaded saved passwords this way, while Chrome used a design that made password extraction from process memory much harder.","Microsoft explicitly said the reported attack scenario was within its existing threat model because it excludes adversaries who already have administrative control of a device, yet it still decided to change the behavior.","The announced fix is not limited to preview builds, as Microsoft said it will reach every supported Edge channel, including Stable, Beta, Dev, Canary, and Extended Stable.","The proof-of-concept showed that password dumping was possible even without Administrator privileges for Edge processes launched by the same user, highlighting exposure beyond cross-user attacks."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft said it is changing Edge so the browser no longer loads saved passwords into process memory in clear text at startup. The company had previously told security researcher Tom Jøran Sønstebyseter Rønning and BleepingComputer that this behavior was expected or \u0026ldquo;by design,\u0026rdquo; but later announced it would make a defense-in-depth change.\u003c/p\u003e\n\n\u003cp\u003eRønning disclosed on May 4 that all credentials stored in Edge’s built-in password manager were decrypted on launch and remained in memory even when not in use. He also released a proof-of-concept tool that could dump passwords from Edge processes, with Administrator privileges allowing access to other users’ processes and no admin privileges allowing access to the same user’s Edge processes.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the reported scenario falls within its existing threat model, which excludes attackers who already have administrative control of a device, but it still chose to reduce password exposure in memory. The fix is already live in the Edge Canary channel and will be included in the next update for all supported Edge releases, build 148 and newer.\u003c/p\u003e\n"},{"n":9,"title":"Microsoft to automatically roll back faulty Windows drivers","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-to-automatically-roll-back-faulty-windows-drivers/","time":"12:29","priority":"MAY READ","score":70,"group":null,"groupColor":null,"tldr":"Microsoft is introducing Cloud-Initiated Driver Recovery, allowing it to automatically roll back faulty Windows drivers delivered via Windows Update without requiring hardware partners or users to manually intervene, with the feature rolling out in September 2026.","briefOverview":"\u003cp\u003eMicrosoft is introducing Cloud-Initiated Driver Recovery, a new capability that allows the company to remotely roll back problematic Windows drivers delivered through Windows Update without requiring hardware partners or end users to take manual action. The recovery process is managed entirely by Microsoft and will only be initiated for drivers rejected due to quality issues during the Driver Shiproom evaluation. This remediates a gap where devices could otherwise remain on a low-quality driver for an extended period.\u003c/p\u003e\n\n\u003cp\u003eRecovery is delivered through the existing Windows Update infrastructure, meaning no new client agent or partner tooling is required. The feature is being tested between May and August 2026 and will begin rolling back drivers rejected during Flighting or Gradual Rollout starting September 2026. Microsoft also unveiled a Driver Quality Initiative at WinHEC 2026 to raise driver quality, reliability, and security across the Windows ecosystem.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft is introducing Cloud-Initiated Driver Recovery, a new capability that allows the company to remotely roll back problematic Windows drivers delivered through Windows Update. Under the current system, if a driver has quality issues, the hardware partner must submit a replacement or users must manually uninstall the faulty driver, leaving devices on a low-quality driver for an extended period. With this new feature, Microsoft can directly trigger a rollback to a previous, stable driver version or the next best version available on Windows Update without requiring new software or actions from hardware partners.\u003c/p\u003e\n\n\u003cp\u003eThe recovery process is entirely managed by Microsoft and will only be initiated for drivers rejected due to quality issues during the Driver Shiproom evaluation. Devices where a Driver Shiproom-approved driver cannot be located will not attempt Cloud-Initiated Driver Recovery. The recovery is delivered through the existing Windows Update infrastructure, meaning no new client agent or partner tooling is required.\u003c/p\u003e\n\n\u003cp\u003eThe feature is being tested between May and August 2026 and will begin rolling back drivers rejected during Flighting or Gradual Rollout starting September 2026. At WinHEC 2026 in Taipei, Microsoft also unveiled a Driver Quality Initiative to raise driver quality, reliability, and security across the Windows ecosystem, in coordination with OEM, silicon, and hardware partners.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft stated that in the months ahead they will keep investing in fundamentals including reliability, security, performance, compatibility and quality. They will also collaborate with OEMs, silicon partners, IHVs, ODMs and the broader hardware ecosystem through the Windows Resiliency Initiative, the new Driver Quality Initiative, and their daily work. In June 2025, Microsoft also announced plans to periodically remove legacy drivers from the Windows Update catalog to mitigate compatibility issues and security risks.\u003c/p\u003e\n\n\u003cp\u003eThe article mentions no specific incidents or actors other than Microsoft and its hardware partners. The primary affected parties are hardware partners (who no longer need to submit replacement drivers) and end users (who no longer need to manually uninstall faulty drivers). The impact is a faster, automated remediation path for driver quality issues without user or partner intervention.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft is introducing a new capability called Cloud-Initiated Driver Recovery that allows the company to remotely roll back problematic Windows drivers delivered through Windows Update. The feature is designed to address quality issues identified after drivers have been distributed, eliminating the need for hardware partners or end users to manually fix problems.\u003c/p\u003e\n\n\u003ch2 id=\"current-vs-new-process\"\u003eCurrent vs. New Process\u003c/h2\u003e\n\n\u003cp\u003eUnder the current system, if a driver distributed through Windows Update has quality issues, the hardware partner must submit a replacement driver, or users must manually uninstall the faulty driver. This creates a gap where devices may remain on a low-quality driver for an extended period.\u003c/p\u003e\n\n\u003cp\u003eWith Cloud-Initiated Driver Recovery, Microsoft can directly trigger a rollback to a previous, stable driver version or the next best version available on Windows Update. The recovery process is entirely managed by Microsoft with no partner-side actions required.\u003c/p\u003e\n\n\u003ch2 id=\"key-technical-details\"\u003eKey Technical Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe recovery is only initiated for Windows drivers rejected due to quality issues during the Driver Shiproom evaluation.\u003c/li\u003e\n\u003cli\u003eDevices where a Driver Shiproom-approved driver cannot be located will not attempt Cloud-Initiated Driver Recovery.\u003c/li\u003e\n\u003cli\u003eRecovery is delivered through the existing Windows Update infrastructure — no new client agent or partner tooling is required.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"timeline-and-testing\"\u003eTimeline and Testing\u003c/h2\u003e\n\n\u003cp\u003eThe new Windows Update feature is being tested between May and August 2026. It will begin rolling back drivers rejected during Flighting or Gradual Rollout starting September 2026.\u003c/p\u003e\n\n\u003ch2 id=\"broader-context\"\u003eBroader Context\u003c/h2\u003e\n\n\u003cp\u003eAt WinHEC 2026 (the Windows Hardware Engineering Conference) in Taipei, Microsoft unveiled a Driver Quality Initiative (DQI) to raise driver quality, reliability, and security across the Windows ecosystem, in coordination with OEM, silicon, and hardware partners. Microsoft stated it will keep investing in the fundamentals that matter most to customers: reliability, security, performance, compatibility and quality, and will collaborate through the Windows Resiliency Initiative, the new Driver Quality Initiative, and daily work.\u003c/p\u003e\n\n\u003cp\u003eIn June 2025, Microsoft also announced plans to periodically remove legacy drivers from the Windows Update catalog to mitigate compatibility issues and security risks.\u003c/p\u003e\n\n\u003ch2 id=\"related-article-references\"\u003eRelated Article References\u003c/h2\u003e\n\n\u003cp\u003eThe article includes links to related news such as Microsoft fixing a Windows Autopatch bug installing restricted drivers, May 2026 Patch Tuesday fixes, Windows 11 cumulative updates, emergency updates for Windows Server issues, and a revamped Windows Insider Program — all as separate stories, not part of this announcement.\u003c/p\u003e\n","keyPoints":["Microsoft is introducing Cloud-Initiated Driver Recovery, which allows the company to remotely roll back problematic Windows drivers delivered through Windows Update without requiring hardware partners or end users to take action.","The recovery process is entirely managed by Microsoft and will only be initiated for drivers rejected due to quality issues during the Driver Shiproom evaluation.","Recovery is delivered through the existing Windows Update infrastructure, meaning no new client agent or partner tooling is required.","The new feature is being tested between May and August and will begin rolling back drivers rejected during Flighting or Gradual Rollout starting September 2026.","Microsoft also unveiled a Driver Quality Initiative (DQI) at WinHEC 2026 to raise driver quality, reliability, and security across the Windows ecosystem."],"insights":["The rollback is not universal: it only applies to drivers rejected during the Driver Shiproom evaluation, and devices where no shiproom-approved driver version exists will not receive a recovery action, meaning some faulty drivers may persist.","Microsoft can initiate the rollback directly from its Hardware Dev Center without requiring any action from hardware partners, shifting the responsibility for driver remediation away from vendors and into Microsoft's own operational pipeline.","The recovery mechanism uses the existing Windows Update infrastructure, so no new client agent or partner tooling is needed, making it a transparent, behind-the-scenes capability for end users."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft is introducing Cloud-Initiated Driver Recovery, a new capability that allows the company to remotely roll back problematic Windows drivers delivered through Windows Update without requiring hardware partners or end users to take manual action. The recovery process is managed entirely by Microsoft and will only be initiated for drivers rejected due to quality issues during the Driver Shiproom evaluation. This remediates a gap where devices could otherwise remain on a low-quality driver for an extended period.\u003c/p\u003e\n\n\u003cp\u003eRecovery is delivered through the existing Windows Update infrastructure, meaning no new client agent or partner tooling is required. The feature is being tested between May and August 2026 and will begin rolling back drivers rejected during Flighting or Gradual Rollout starting September 2026. Microsoft also unveiled a Driver Quality Initiative at WinHEC 2026 to raise driver quality, reliability, and security across the Windows ecosystem.\u003c/p\u003e\n"},{"n":17,"title":"What 45 Days of Watching Your Own Tools Will Tell You About Your Real Attack Surface","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/what-45-days-of-watching-your-own-tools.html","time":"11:00","priority":"MAY READ","score":50,"group":null,"groupColor":null,"tldr":"Legitimate Windows tools are abused in 84% of high-severity incidents, making over-entitlement your biggest risk; Bitdefender's free 45-day assessment maps and reduces this attack surface by locking down unnecessary binaries without disrupting operations.","briefOverview":"\u003cp\u003eThe article argues that the most dangerous activity inside organizations is legitimate tool abuse, or living off the land, which was found in 84% of 700,000 high-severity incidents analyzed by Bitdefender. It highlights that a clean Windows 11 install ships with 133 unique living-off-the-land binaries across 987 instances, and PowerShell is active on 73% of endpoints, much of it invoked silently by third-party applications.\u003c/p\u003e\n\n\u003cp\u003eTo address this over-entitlement problem, Bitdefender offers a complimentary 45-day Internal Attack Surface Assessment powered by its GravityZone PHASR technology. The assessment builds behavioral profiles, provides an exposure score and prioritized findings across five categories, and allows optional automated reduction. Early-access customers have reduced their attack surface by 30% or more in the first 30 days, with one reporting close to 70% reduction.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that preemptive cybersecurity is becoming essential, citing Gartner projections that it will account for 50% of IT security spending by 2030. It concludes that the fastest way to shorten an attacker\u0026rsquo;s reach is to look at and reduce the tools available inside your environment, and invites organizations with 250 or more users to request the free assessment.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article builds on a previous piece titled \u0026lsquo;Your Biggest Security Risk Isn\u0026rsquo;t Malware — It\u0026rsquo;s What You Already Trust,\u0026rsquo; which argued that trusted utilities like PowerShell, WMIC, and Certutil are the preferred toolkit of modern threat actors. Bitdefender\u0026rsquo;s analysis of 700,000 high-severity incidents found legitimate-tool abuse in 84% of them, framing the problem not as malware but as over-entitlement of trusted tools.\u003c/p\u003e\n\n\u003cp\u003eTo provide a practical solution, Bitdefender introduces its complimentary Internal Attack Surface Assessment, a 45-day low-effort engagement for organizations with 250 or more employees. The assessment uses GravityZone PHASR technology to turn the abstract problem of living off the land into a specific, prioritized list of users, endpoints, and tools that can be safely removed without breaking business operations. A clean Windows 11 install contains 133 unique living-off-the-land binaries, and Gartner projects that 60% of large enterprises will adopt dynamic attack surface reduction technologies by 2030.\u003c/p\u003e\n\n\u003cp\u003eThe assessment runs in four steps: kickoff and behavioral learning over 30 days, an Attack Surface Dashboard review with an exposure score and findings across five categories (living-off-the-land binaries, remote admin tools, tampering tools, cryptominers, and piracy tools), an optional reduction sprint where controls can be applied manually or via Autopilot with a one-click approval workflow, and a reduction review session.\u003c/p\u003e\n\n\u003cp\u003eEarly results show that early-access customers have reduced their attack surface by 30% or more in the first 30 days, with one reporting close to 70% reduction by locking down LOLBins and remote tools. The article notes this was achieved without investigation overhead or end-user disruption. Different stakeholders benefit: CISOs get a board-ready exposure number, SOC and IT admins see up to 50% less investigation workload, and business decision-makers gain documented surface reduction valued by regulators and insurers.\u003c/p\u003e\n\n\u003cp\u003eThe article ends by reiterating that the most significant risks are already inside the environment, and that a precise, prioritized map of those risks can be obtained within 45 days at no cost without changing the existing security stack. It directs interested organizations to request the assessment, stating that whether a compromise becomes a breach depends on what an attacker can reach once inside.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-argument-and-context\"\u003eCore Argument and Context\u003c/h2\u003e\n\n\u003cp\u003eThe article is a follow-up to a previous piece titled \u0026lsquo;Your Biggest Security Risk Isn\u0026rsquo;t Malware — It\u0026rsquo;s What You Already Trust,\u0026rsquo; which established that trusted administrative utilities (PowerShell, WMIC, netsh, Certutil, MSBuild) are the preferred toolkit of modern threat actors. This new article addresses the common response: \u0026lsquo;We know. So what do we actually do about it?\u0026rsquo;\u003c/p\u003e\n\n\u003cp\u003eBitdefender\u0026rsquo;s analysis of 700,000 high-severity incidents found legitimate-tool abuse in 84% of them, underscoring that the problem is not malware but over-entitlement of legitimate tools. The article states that this over-entitlement problem cannot be patched away.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-from-the-article\"\u003eTechnical Details from the Article\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eA clean Windows
