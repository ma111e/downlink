<script type="application/json" id="dl-articles">[{"n":1,"title":"UK to ban social media access for children under 16","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/uk-to-ban-social-media-access-for-children-under-16","time":"00:03","priority":"MAY READ","score":62,"tldr":"The UK plans to ban children under 16 from major social media platforms by spring 2027, with stronger age checks and added restrictions on features like livestreaming and stranger communication. The proposal follows similar moves in other countries but faces concerns over privacy, enforcement, and whether banning children addresses platform safety problems.","briefOverview":"\u003cp\u003eBritish Prime Minister Keir Starmer said the UK intends to block children under 16 from using social media. The government says the measures would be the strongest child online safety rules in the world once implemented. Legislation is expected before Christmas, with enforcement targeted for spring 2027.\u003c/p\u003e\n\n\u003cp\u003eThe ban would apply to user-to-user platforms that enable social interaction, allow users to post material, and use algorithms. TikTok, Facebook, Instagram, Snapchat, X, and YouTube are named as covered platforms, while messaging services such as WhatsApp are not. The plan also includes restrictions on AI romantic companion chatbots and intimate chatbot functions for children under 18.\u003c/p\u003e\n\n\u003cp\u003eThe UK says its approach will go further than Australia’s ban by requiring highly effective age assurance and restricting functions such as livestreaming and stranger communication for under-16s, including on gaming sites. The article notes that Australia’s ban has had enforcement gaps, with many children retaining accounts because platforms had not asked them to verify their age. Civil liberties and privacy concerns are already part of the debate, with Amnesty International UK criticizing the exclusion-based approach.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe UK government plans to ban social media access for children under 16, according to an announcement described by Prime Minister Keir Starmer. The measure is intended to apply to user-to-user platforms designed for social interaction, where users can post material and where algorithms are present. The government expects to bring legislation before Christmas and enforce the ban by spring 2027.\u003c/p\u003e\n\n\u003cp\u003eThe platforms named as subject to the ban include TikTok, Facebook, Instagram, Snapchat, X, and YouTube. Messaging platforms such as WhatsApp are not included under the ban described in the government press release. The article also says AI romantic companion chatbots and intimate functionality on other chatbots will be restricted for children under 18.\u003c/p\u003e\n\n\u003cp\u003eThe UK plan is modeled after Australia’s social media ban but is described as going further. The government says it will add blocks on harmful functions such as livestreaming and stranger communication with children under 16. These restrictions would apply to a wider range of online services, including gaming sites.\u003c/p\u003e\n\n\u003cp\u003eAge assurance is a central component of the UK proposal. The UK communications regulator has been tasked with designing highly effective age assurance measures and is due to report back to the central government by October. Additional measures expected next month may include overnight curfews and required breaks in infinite scrolling for teens under 18.\u003c/p\u003e\n\n\u003cp\u003eThe article cites an Australian eSafety Commissioner study indicating that Australia’s ban has not prevented large numbers of children from staying on regulated platforms. Parents reported that 31.3% of children still had an account on at least one platform after the ban took effect. More than two-thirds of those children reportedly kept accounts because tech firms had not asked them to verify their age.\u003c/p\u003e\n\n\u003cp\u003eSeveral other countries have implemented or are considering similar restrictions, including Spain, the Netherlands, France, Malaysia, and Turkey. Amnesty International UK criticized the UK approach, arguing that the problem is unsafe platform design rather than children’s presence on social media. Joe Jonas of the IAPP said privacy risks will be a key factor and noted that political uncertainty could affect whether the Starmer government can advance the initiative.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eBritish Prime Minister Keir Starmer said the UK intends to block children under 16 from using social media. The government described the plan as a landmark child online safety move and said it would become the strongest set of children’s online safety measures in the world once implemented.\u003c/p\u003e\n\n\u003cp\u003eThe UK government plans to bring legislation before Christmas. It expects the ban to be enforced by spring 2027.\u003c/p\u003e\n\n\u003ch2 id=\"scope-of-the-proposed-ban\"\u003eScope of the proposed ban\u003c/h2\u003e\n\n\u003cp\u003eThe ban is intended to cover “user-to-user platforms” whose purpose is to enable social interaction and that allow users to post material alongside algorithms. The article names the following platforms as subject to the ban:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTikTok\u003c/li\u003e\n\u003cli\u003eFacebook\u003c/li\u003e\n\u003cli\u003eInstagram\u003c/li\u003e\n\u003cli\u003eSnapchat\u003c/li\u003e\n\u003cli\u003eX\u003c/li\u003e\n\u003cli\u003eYouTube\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMessaging platforms such as WhatsApp are not included, according to the cited government press release.\u003c/p\u003e\n\n\u003ch2 id=\"additional-restrictions-beyond-social-media-access\"\u003eAdditional restrictions beyond social media access\u003c/h2\u003e\n\n\u003cp\u003eThe UK proposal goes beyond a blanket social media ban. The government also plans restrictions on functions it describes as harmful, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLivestreaming involving children under 16\u003c/li\u003e\n\u003cli\u003eStranger communication with children under 16\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these restrictions will apply to a wider range of online services, including gaming sites.\u003c/p\u003e\n\n\u003cp\u003eAI-related restrictions are also included. AI romantic companion chatbots and “intimate functionalities” on other chatbots will be restricted for children under 18.\u003c/p\u003e\n\n\u003ch2 id=\"age-assurance-requirements\"\u003eAge assurance requirements\u003c/h2\u003e\n\n\u003cp\u003eThe UK plans to require “highly effective age assurance” methods. The article says these methods are intended to go beyond those used in Australia.\u003c/p\u003e\n\n\u003cp\u003eThe UK’s communications regulator has been tasked with designing the age assurance measures. It is due to report back to the central government with a plan by October.\u003c/p\u003e\n\n\u003cp\u003eThe government is also expected to announce additional measures next month. These may include overnight curfews and required breaks in infinite scrolling for teens under 18.\u003c/p\u003e\n\n\u003ch2 id=\"comparison-with-australia\"\u003eComparison with Australia\u003c/h2\u003e\n\n\u003cp\u003eThe UK plan is modeled after a similar social media ban that took effect in Australia last December. However, the UK government says its approach will go further by adding safeguards and broader restrictions.\u003c/p\u003e\n\n\u003cp\u003eThe article cites a study released in March by Australia’s eSafety Commissioner. According to that study, Australia’s social media ban has not succeeded at keeping large numbers of Australian youth off regulated platforms.\u003c/p\u003e\n\n\u003cp\u003eThe study found that surveyed parents reported that nearly half of children had an account on a regulated platform before the ban. After the ban took effect, 31.3% still had an account on at least one regulated platform.\u003c/p\u003e\n\n\u003cp\u003eMore than two-thirds of Australian children who still maintained accounts reportedly did so because tech firms had not asked them to verify their age.\u003c/p\u003e\n\n\u003ch2 id=\"public-consultation-and-government-rationale\"\u003ePublic consultation and government rationale\u003c/h2\u003e\n\n\u003cp\u003eThe UK has conducted pilot programs to test certain restrictions and held a consultation process inviting public input. The government press release said nine in 10 of 116,000 surveyed parents backed a ban.\u003c/p\u003e\n\n\u003cp\u003eStarmer said he had heard directly from families calling for change and said the government would act on those concerns. He described the package as more comprehensive than a blanket ban because it responds to how children experience harm online, rather than only where that harm occurs.\u003c/p\u003e\n\n\u003cp\u003eTechnology Secretary Liz Kendall said tech companies had been given many chances to reform their practices and had failed to do so. She said that failure made the ban necessary.\u003c/p\u003e\n\n\u003ch2 id=\"international-context\"\u003eInternational context\u003c/h2\u003e\n\n\u003cp\u003eThe article places the UK proposal within a broader international movement toward youth social media restrictions. Several countries are described as having implemented or considered similar bans.\u003c/p\u003e\n\n\u003cp\u003eSpain’s Prime Minister Pedro Sanchez said in February that his government would ban social media for children under 16. He described social media as a “digital Wild West” and said it had become a “failed state” where laws are ignored and crimes are tolerated.\u003c/p\u003e\n\n\u003cp\u003eThe Netherlands’ new minority government said in February that it would seek a ban for children aged 14 and younger. French lawmakers are working on legislation to ban children under 15 from social media. Malaysia and Turkey have bans in place for children under 16 and under 15, respectively.\u003c/p\u003e\n\n\u003ch2 id=\"criticism-and-concerns\"\u003eCriticism and concerns\u003c/h2\u003e\n\n\u003cp\u003eSome human rights and civil liberties organizations are critical of the UK’s approach. Kerry Moscogiuri, chief executive of Amnesty International UK, called it “the right diagnosis but the wrong prescription.”\u003c/p\u003e\n\n\u003cp\u003eAmnesty International UK argued that the problem is not that children are present on social media. Instead, it said social media companies have built platforms that are unsafe by design, and that the remedy should be regulating platforms rather than excluding children.\u003c/p\u003e\n\n\u003cp\u003ePrivacy risks are also identified as a key issue in the public debate. Joe Jonas, director of research and insights at the IAPP, said privacy will be a major factor because of the role of age assurance in the ban.\u003c/p\u003e\n\n\u003cp\u003eJonas also said Starmer’s political weakness could make it difficult for the government to advance the ban. He said political uncertainty around the current government may affect whether the initiative can move forward.\u003c/p\u003e\n","keyPoints":["The UK government plans to ban children under 16 from using user-to-user social media platforms including TikTok, Facebook, Instagram, Snapchat, X, and YouTube.","The government expects to introduce legislation before Christmas and enforce the ban by spring 2027.","The UK plans to require highly effective age assurance methods and has asked its communications regulator to design them by October.","The proposal includes additional restrictions on harmful functions such as livestreaming and stranger communication with children under 16, including on gaming sites.","Critics including Amnesty International UK argue that the government should regulate unsafe platform design rather than exclude children from social media."],"insights":["The UK is trying to address a weakness seen in Australia’s ban, where more than two-thirds of children who kept accounts reportedly did so because platforms had not asked them to verify their age.","The UK proposal is broader than a simple social media ban because it would also restrict specific functions such as livestreaming and stranger communication for under-16s across a wider range of services, including gaming sites.","The government is considering controls for users under 18, not only under 16, including possible overnight curfews and required breaks in infinite scrolling.","Privacy is likely to be a central dispute because the ban depends on highly effective age assurance methods that have not yet been finalized by the communications regulator."],"referencedReports":[{"title":"Under the new age restrictions: Early insights from Australian parents","url":"https://www.esafety.gov.au/sites/default/files/2026-03/Under-the-new-age-restrictions-Early-insights-from-Australian-parents-March2026.pdf?v=1781547021739","publisher":"Australia eSafety Commissioner","context":"The article cites this study to show that Australia’s social media ban has not kept large numbers of children off regulated platforms.","category":"","primary":false}],"body":"\u003cp\u003eBritish Prime Minister Keir Starmer said the UK intends to block children under 16 from using social media. The government says the measures would be the strongest child online safety rules in the world once implemented. Legislation is expected before Christmas, with enforcement targeted for spring 2027.\u003c/p\u003e\n\n\u003cp\u003eThe ban would apply to user-to-user platforms that enable social interaction, allow users to post material, and use algorithms. TikTok, Facebook, Instagram, Snapchat, X, and YouTube are named as covered platforms, while messaging services such as WhatsApp are not. The plan also includes restrictions on AI romantic companion chatbots and intimate chatbot functions for children under 18.\u003c/p\u003e\n\n\u003cp\u003eThe UK says its approach will go further than Australia’s ban by requiring highly effective age assurance and restricting functions such as livestreaming and stranger communication for under-16s, including on gaming sites. The article notes that Australia’s ban has had enforcement gaps, with many children retaining accounts because platforms had not asked them to verify their age. Civil liberties and privacy concerns are already part of the debate, with Amnesty International UK criticizing the exclusion-based approach.\u003c/p\u003e\n"}]</script>
