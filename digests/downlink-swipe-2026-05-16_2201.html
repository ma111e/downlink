<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; flex: 1; min-height: 0; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--accept); border-color: var(--accept); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--cyan);   border-color: var(--cyan); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }

<script>
window.__DL_ARTICLES = [{"n":2,"title":"Funnel Builder Flaw Under Active Exploitation Enables WooCommerce Checkout Skimming","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/funnel-builder-flaw-under-active.html","time":"15:20","priority":"MUST READ","score":94,"group":null,"groupColor":null,"tldr":"A critical unpatched-before-3.15.0.3 flaw in the WordPress Funnel Builder plugin is being actively exploited to inject fake Google Tag Manager scripts into WooCommerce checkout pages and steal payment details. Store owners should update immediately and inspect Funnel Builder’s External Scripts settings for unfamiliar code.","briefOverview":"\u003cp\u003eA critical security vulnerability in the Funnel Builder plugin for WordPress is being actively exploited to inject malicious JavaScript into WooCommerce checkout pages. The flaw affects all plugin versions before 3.15.0.3, currently has no official CVE identifier, and impacts a plugin used by more than 40,000 WooCommerce stores. FunnelKit has released a patch in version 3.15.0.3.\u003c/p\u003e\n\n\u003cp\u003eSansec reported that attackers are planting fake Google Tag Manager scripts into the plugin’s External Scripts setting. The injected code appears similar to ordinary analytics tags but loads a payment skimmer designed to steal credit card numbers, CVVs, billing addresses, and other checkout data. Site owners are advised to update the plugin and review Settings \u0026gt; Checkout \u0026gt; External Scripts for unfamiliar entries.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA critical vulnerability in the Funnel Builder plugin for WordPress has come under active exploitation in the wild. The flaw enables attackers to inject malicious JavaScript into WooCommerce checkout pages to steal payment data. The issue affects all versions of the plugin before 3.15.0.3 and currently does not have an official CVE identifier.\u003c/p\u003e\n\n\u003cp\u003eThe activity was detailed by Sansec, which said the vulnerability allows unauthenticated attackers to inject arbitrary JavaScript into every checkout page on a store. Funnel Builder is used in more than 40,000 WooCommerce stores. FunnelKit, the maintainer of Funnel Builder, has released a patch in version 3.15.0.3.\u003c/p\u003e\n\n\u003cp\u003eAccording to Sansec, attackers are planting fake Google Tag Manager scripts into the plugin’s External Scripts setting. The injected code is made to look like ordinary analytics code next to legitimate tags, but it loads a payment skimmer. The skimmer is designed to collect credit card numbers, CVVs, billing addresses, and other personal information entered during checkout.\u003c/p\u003e\n\n\u003cp\u003eThe technical issue involves a publicly exposed checkout endpoint that allowed an incoming request to choose the type of internal method to run. Older versions did not check the caller’s permissions or restrict which methods could be invoked. A bad actor could send an unauthenticated request that reaches an internal method capable of writing attacker-controlled data into the plugin’s global settings.\u003c/p\u003e\n\n\u003cp\u003eSansec observed at least one payload masquerading as a Google Tag Manager loader and launching JavaScript from a remote domain. The payload then opened a WebSocket connection to the attacker’s command-and-control server at wss://protect-wss[.]com/ws to retrieve a skimmer tailored to the victim’s storefront. Store owners are advised to update Funnel Builder and inspect Settings \u0026gt; Checkout \u0026gt; External Scripts for unfamiliar code.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA critical security vulnerability affecting the Funnel Builder plugin for WordPress is being actively exploited in the wild. The attacks target WooCommerce checkout pages by injecting malicious JavaScript intended to steal payment information from customers.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects all versions of Funnel Builder before 3.15.0.3. The issue currently does not have an official CVE identifier. Funnel Builder is used in more than 40,000 WooCommerce stores.\u003c/p\u003e\n\n\u003cp\u003eFunnelKit, which maintains Funnel Builder, has released a patch for the vulnerability in version 3.15.0.3.\u003c/p\u003e\n\n\u003ch2 id=\"reported-exploitation\"\u003eReported Exploitation\u003c/h2\u003e\n\n\u003cp\u003eSansec published details of the activity and said attackers are using the flaw to inject arbitrary JavaScript into every checkout page on affected stores. The malicious code is being placed in the plugin’s External Scripts setting.\u003c/p\u003e\n\n\u003cp\u003eAccording to Sansec, attackers are planting fake Google Tag Manager scripts in that setting. The injected scripts are designed to appear like ordinary analytics code alongside a store’s legitimate tracking tags.\u003c/p\u003e\n\n\u003cp\u003eThe apparent purpose of this disguise is to make the malicious code look familiar and less suspicious during review. Sansec noted that presenting skimmers as Google Analytics or Google Tag Manager code is a recurring Magecart pattern.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe flaw involves a publicly exposed checkout endpoint in Funnel Builder. That endpoint allows an incoming request to choose the type of internal method to run.\u003c/p\u003e\n\n\u003cp\u003eIn older plugin versions, the endpoint did not check the caller’s permissions. It also did not limit which internal methods could be invoked.\u003c/p\u003e\n\n\u003cp\u003eAs described in the article, a bad actor could exploit this by sending an unauthenticated request that reaches an internal method capable of writing attacker-controlled data into the plugin’s global settings. Once the malicious snippet is added there, it is injected into every Funnel Builder checkout page.\u003c/p\u003e\n\n\u003cp\u003eThis means an attacker can plant a malicious \u003ccode\u003e\u0026lt;script\u0026gt;\u003c/code\u003e tag that runs during every checkout transaction on a vulnerable WordPress site.\u003c/p\u003e\n\n\u003ch2 id=\"observed-payload-behavior\"\u003eObserved Payload Behavior\u003c/h2\u003e\n\n\u003cp\u003eSansec observed at least one payload that masqueraded as a Google Tag Manager loader. The payload launched JavaScript hosted on a remote domain.\u003c/p\u003e\n\n\u003cp\u003eThe JavaScript then opened a WebSocket connection to the attacker’s command-and-control server at \u003ccode\u003ewss://protect-wss[.]com/ws\u003c/code\u003e. Through that connection, it retrieved a payment skimmer tailored to the victim’s storefront.\u003c/p\u003e\n\n\u003cp\u003eThe skimmer’s goal is to siphon data entered by site visitors during checkout. The article specifically names credit card numbers, CVVs, billing addresses, and other personal information as targeted data.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-impact\"\u003eAffected Parties and Impact\u003c/h2\u003e\n\n\u003cp\u003eAffected parties are WooCommerce stores using vulnerable versions of the Funnel Builder plugin. The plugin is installed on more than 40,000 WooCommerce stores, according to the article.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed impact is the injection of malicious JavaScript into checkout pages and theft of payment-related information. Because the malicious code can be written into global plugin settings, the injected script can appear across every Funnel Builder checkout page on a compromised store.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify a specific threat actor by name. It refers to attackers and a bad actor exploiting the vulnerability.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eFunnelKit has released a fix in Funnel Builder version 3.15.0.3. Site owners are advised to update the plugin to the latest version.\u003c/p\u003e\n\n\u003cp\u003eThe article also recommends that site owners review the plugin’s External Scripts area. Specifically, they should check Settings \u0026gt; Checkout \u0026gt; External Scripts for unfamiliar entries and remove anything suspicious.\u003c/p\u003e\n\n\u003ch2 id=\"related-disclosure-mentioned-in-the-article\"\u003eRelated Disclosure Mentioned in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article also notes a separate campaign detailed by Sucuri involving Joomla websites. In that campaign, Joomla sites were backdoored with heavily obfuscated PHP code that contacted attacker-controlled command-and-control servers.\u003c/p\u003e\n\n\u003cp\u003eThe PHP script acted as a remote loader, sending information about the infected website and waiting for instructions. According to Sucuri’s description, the attacker could dynamically inject spam product links, redirect visitors, or display malicious pages without modifying local files again.\u003c/p\u003e\n\n\u003cp\u003eThat Joomla campaign is described as having the ultimate aim of abusing the compromised sites’ reputation to inject spam.\u003c/p\u003e\n","keyPoints":["A critical security vulnerability in the Funnel Builder plugin for WordPress is being actively exploited to inject malicious JavaScript into WooCommerce checkout pages.","The vulnerability affects all versions of Funnel Builder before 3.15.0.3 and currently does not have an official CVE identifier.","Attackers are abusing the plugin's External Scripts setting to plant fake Google Tag Manager scripts that load payment skimmers.","The injected skimmer is designed to steal credit card numbers, CVVs, billing addresses, and other personal information entered during checkout.","Site owners are advised to update Funnel Builder to the latest version and review Settings \u003e Checkout \u003e External Scripts for unfamiliar entries."],"insights":["The exploit abuses a publicly exposed checkout endpoint that allowed unauthenticated requests to invoke internal plugin methods without permission checks or an allowlist of permitted methods.","The malicious code is inserted into Funnel Builder’s global settings, which causes the skimmer to appear on every Funnel Builder checkout page rather than requiring attackers to modify individual pages.","At least one observed payload disguised itself as a Google Tag Manager loader and then used a WebSocket connection to wss://protect-wss[.]com/ws to retrieve a storefront-specific skimmer.","A practical detection step for store owners is to inspect the plugin’s Settings \u003e Checkout \u003e External Scripts area for unfamiliar entries, because attackers are planting the skimmer through that setting."],"referencedReports":[{"title":"FunnelKit WooCommerce Vulnerability Exploited","url":"https://sansec.io/research/funnelkit-woocommerce-vulnerability-exploited","publisher":"Sansec","context":"The article says Sansec published details of the active exploitation of the Funnel Builder vulnerability affecting WooCommerce checkout pages."},{"title":"Joomla SEO Spam Injector: Obfuscated PHP Backdoor Hijacking Site Visitors","url":"https://blog.sucuri.net/2026/04/joomla-seo-spam-injector-obfuscated-php-backdoor-hijacking-site-visitors.html","publisher":"Sucuri","context":"The article references Sucuri's analysis of a campaign backdooring Joomla websites with obfuscated PHP code to contact attacker-controlled C2 servers and serve spam content."}],"body":"\u003cp\u003eA critical security vulnerability in the Funnel Builder plugin for WordPress is being actively exploited to inject malicious JavaScript into WooCommerce checkout pages. The flaw affects all plugin versions before 3.15.0.3, currently has no official CVE identifier, and impacts a plugin used by more than 40,000 WooCommerce stores. FunnelKit has released a patch in version 3.15.0.3.\u003c/p\u003e\n\n\u003cp\u003eSansec reported that attackers are planting fake Google Tag Manager scripts into the plugin’s External Scripts setting. The injected code appears similar to ordinary analytics tags but loads a payment skimmer designed to steal credit card numbers, CVVs, billing addresses, and other checkout data. Site owners are advised to update the plugin and review Settings \u0026gt; Checkout \u0026gt; External Scripts for unfamiliar entries.\u003c/p\u003e\n"},{"n":1,"title":"Russian hackers turn Kazuar backdoor into modular P2P botnet","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/russian-hackers-turn-kazuar-backdoor-into-modular-p2p-botnet/","time":"14:15","priority":"SHOULD READ","score":84,"group":null,"groupColor":null,"tldr":"Russian-linked Secret Blizzard has evolved the Kazuar backdoor into a stealthy modular P2P botnet that elects an internal leader to communicate with command-and-control servers while other infected hosts stay quiet. Microsoft says defenders should prioritize behavioral detection because Kazuar is highly configurable, persistent, and designed for long-term espionage and data theft.","briefOverview":"\u003cp\u003eThe Russian hacker group Secret Blizzard has developed the long-running Kazuar backdoor into a modular peer-to-peer botnet. The new design is intended for long-term persistence, stealth, and data collection. Secret Blizzard’s activity overlaps with Turla, Uroburos, and Venomous Bear, and the group has been associated with Russia’s FSB.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft researchers analyzed a recent Kazuar variant and found that it now operates with three distinct modules: Kernel, Bridge, and Worker. The Kernel module coordinates tasks, manages other modules, elects a leader, and orchestrates communications and data flow. The elected leader communicates with command-and-control infrastructure, while non-leader infected systems remain silent to reduce external visibility.\u003c/p\u003e\n\n\u003cp\u003eKazuar’s Worker module carries out espionage functions such as keylogging, screenshot capture, filesystem harvesting, system and network reconnaissance, email and MAPI collection, window monitoring, and recent file theft. The malware also supports 150 configuration options, including AMSI, ETW, and WLDP bypasses. Microsoft recommends behavioral detection because Kazuar’s modular and highly configurable nature makes it evasive.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSecret Blizzard has evolved the Kazuar backdoor into a modular peer-to-peer botnet built for long-term persistence, stealth, and data collection. The group’s activity overlaps with Turla, Uroburos, and Venomous Bear, and it has been associated with the Russian intelligence service FSB. The article says Secret Blizzard is known for targeting government and diplomatic organizations, defense-related entities, and critical systems across Europe, Asia, and Ukraine.\u003c/p\u003e\n\n\u003cp\u003eKazuar has been documented since 2017, and researchers found that its code lineage goes back to 2005. Its activity has been linked to the Turla espionage group working for the FSB. The malware was previously observed in attacks targeting European government organizations in 2020 and in attacks against Ukraine three years later.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft researchers analyzed a recent Kazuar variant and found that it now uses three modules: Kernel, Bridge, and Worker. The Kernel module is the central coordinator, managing tasks, controlling other modules, electing a leader, and orchestrating communications and data flow. The leader is one infected system in a compromised environment or network segment that communicates with the command-and-control server and forwards tasks internally.\u003c/p\u003e\n\n\u003cp\u003eNon-leader systems enter “silent” mode and do not communicate directly with command-and-control infrastructure. Microsoft explains that the elected Kernel leader communicates with the Bridge module on behalf of other Kernel modules, reducing visibility by avoiding large volumes of external traffic from multiple infected hosts. Leader selection is autonomous and uses uptime, reboot, and interruption counts.\u003c/p\u003e\n\n\u003cp\u003eThe Bridge module serves as the external communications proxy between the elected Kernel leader and remote command-and-control infrastructure, using protocols such as HTTP, WebSockets, or Exchange Web Services. Internal communications use IPC mechanisms including Windows Messaging, Mailslots, and named pipes, and messages are AES-encrypted and serialized with Google Protocol Buffers. The Worker module performs data theft and reconnaissance, including keylogging, screenshots, filesystem harvesting, email and MAPI collection, and recent file theft.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft says Kazuar supports 150 configuration options for security bypasses, task scheduling, exfiltration timing and chunk size, process injection, task management, and command execution. The malware includes bypass options for AMSI, ETW, and WLDP. Microsoft recommends that companies focus defenses on behavioral detection rather than static signatures because Kazuar’s modular and highly configurable nature makes the threat particularly evasive.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSecret Blizzard has developed the long-running Kazuar backdoor into a modular peer-to-peer botnet. The article describes the updated Kazuar as designed for long-term persistence, stealth, and data collection. Microsoft researchers analyzed a recent Kazuar variant and found that it now operates through three distinct modules: Kernel, Bridge, and Worker.\u003c/p\u003e\n\n\u003ch2 id=\"actor-and-targeting-context\"\u003eActor and targeting context\u003c/h2\u003e\n\n\u003cp\u003eSecret Blizzard is described as a Russian hacker group whose activity overlaps with Turla, Uroburos, and Venomous Bear. The group has been associated with the Russian intelligence service FSB. The article says Secret Blizzard is known for targeting government and diplomatic organizations, defense-related entities, and critical systems across Europe, Asia, and Ukraine.\u003c/p\u003e\n\n\u003cp\u003eKazuar has been documented since 2017, and researchers found that its code lineage goes as far back as 2005. Its activity has been linked to the Turla espionage group working for the FSB. The article also notes prior Kazuar-related activity targeting European government organizations in 2020 and Ukraine three years later.\u003c/p\u003e\n\n\u003ch2 id=\"modular-kazuar-architecture\"\u003eModular Kazuar architecture\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft researchers observed that the recent Kazuar variant uses three modules:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eKernel\u003c/li\u003e\n\u003cli\u003eBridge\u003c/li\u003e\n\u003cli\u003eWorker\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe Kernel module is the central coordinator. It manages tasks, controls other modules, elects a leader, and orchestrates communications and data flow across the botnet.\u003c/p\u003e\n\n\u003cp\u003eThe Bridge module acts as the external communications proxy. It relays traffic between the elected Kernel leader and remote command-and-control infrastructure using protocols such as HTTP, WebSockets, or Exchange Web Services.\u003c/p\u003e\n\n\u003cp\u003eThe Worker module carries out the espionage operations. It collects data, stages it locally after encryption, and later exfiltrates it through the Bridge module.\u003c/p\u003e\n\n\u003ch2 id=\"leader-election-and-stealth-design\"\u003eLeader election and stealth design\u003c/h2\u003e\n\n\u003cp\u003eA key part of the updated Kazuar design is leader election inside a compromised environment or network segment. The leader is one infected system that communicates with the command-and-control server, receives tasks, and forwards them internally to other infected systems. Non-leader systems enter “silent” mode and do not communicate directly with command-and-control infrastructure.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft explains that the elected Kernel leader communicates with the Bridge module on behalf of other Kernel modules. This reduces visibility by avoiding large volumes of external traffic from multiple infected hosts. The leader selection process is internal and autonomous, using uptime, reboot, and interruption counts.\u003c/p\u003e\n\n\u003ch2 id=\"internal-and-external-communications\"\u003eInternal and external communications\u003c/h2\u003e\n\n\u003cp\u003eKazuar uses the Bridge module for external communications with command-and-control infrastructure. The article says the Bridge module can use HTTP, WebSockets, or Exchange Web Services.\u003c/p\u003e\n\n\u003cp\u003eFor internal communications, Kazuar relies on IPC mechanisms that include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows Messaging\u003c/li\u003e\n\u003cli\u003eMailslots\u003c/li\u003e\n\u003cli\u003eNamed pipes\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these mechanisms blend well with normal operational noise. The internal messages are AES-encrypted and serialized with Google Protocol Buffers.\u003c/p\u003e\n\n\u003ch2 id=\"worker-module-capabilities\"\u003eWorker module capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe Worker module performs the operational espionage activity. The article lists the following functions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eKeylogging\u003c/li\u003e\n\u003cli\u003eCapturing screenshots\u003c/li\u003e\n\u003cli\u003eHarvesting data from the filesystem\u003c/li\u003e\n\u003cli\u003ePerforming system and network reconnaissance\u003c/li\u003e\n\u003cli\u003eCollecting email and MAPI data, including Outlook downloads\u003c/li\u003e\n\u003cli\u003eMonitoring windows\u003c/li\u003e\n\u003cli\u003eStealing recent files\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCollected data is encrypted and staged locally. It is later exfiltrated through the Bridge module.\u003c/p\u003e\n\n\u003ch2 id=\"configuration-and-bypass-capabilities\"\u003eConfiguration and bypass capabilities\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft emphasizes Kazuar’s versatility. The malware now supports 150 configuration options that allow operators to enable or disable specific security bypasses, schedule tasks, time data theft, set the size of exfiltration chunks, perform process injection, manage tasks, and execute commands.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies several security bypass options supported by Kazuar:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAntimalware Scan Interface bypass\u003c/li\u003e\n\u003cli\u003eEvent Tracing for Windows bypass\u003c/li\u003e\n\u003cli\u003eWindows Lockdown Policy bypass\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact-and-defensive-guidance\"\u003eImpact and defensive guidance\u003c/h2\u003e\n\n\u003cp\u003eSecret Blizzard typically seeks long-term persistence on target systems for intelligence collection. The actor exfiltrates documents and email content with political importance.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft recommends that companies focus their defenses on behavioral detection rather than static signatures. The article states that Kazuar’s modular and highly configurable nature makes the threat particularly evasive.\u003c/p\u003e\n","keyPoints":["The Russian hacker group Secret Blizzard has developed the Kazuar backdoor into a modular peer-to-peer botnet designed for long-term persistence, stealth, and data collection.","Microsoft researchers found that the recent Kazuar variant uses three modules: Kernel, Bridge, and Worker.","Kazuar elects one infected system as a leader to communicate with command-and-control infrastructure, while non-leader systems remain silent to reduce external traffic and detection risk.","The Worker module performs espionage activities including keylogging, screenshot capture, filesystem data harvesting, system and network reconnaissance, email and MAPI data collection, window monitoring, and recent file theft.","Microsoft recommends focusing defenses on behavioral detection because Kazuar’s modular and highly configurable design makes it difficult to detect with static signatures."],"insights":["Kazuar reduces detection opportunities by routing external command-and-control traffic through a single elected infected host, meaning defenders may need to investigate internal peer communications even when only one system shows outbound C2 activity.","Leader selection is autonomous and based on uptime, reboot, and interruption counts, indicating that stable, long-running infected systems are more likely to become the botnet’s external communications point.","Kazuar blends internal communications into normal Windows operational noise by using IPC mechanisms such as Windows Messaging, Mailslots, and named pipes, with messages encrypted using AES and serialized with Protobuf.","Kazuar’s support for 150 configuration options allows operators to selectively enable security bypasses, schedule tasks, control exfiltration timing and chunk size, and manage process injection or command execution, making static detection less reliable.","The malware includes bypass options for AMSI, ETW, and WLDP, so monitoring for attempted impairment of these Windows security mechanisms is particularly relevant for detecting Kazuar activity."],"referencedReports":[{"title":"Kazuar: anatomy of a nation-state botnet","url":"https://www.microsoft.com/en-us/security/blog/2026/05/14/kazuar-anatomy-of-a-nation-state-botnet/","publisher":"Microsoft","context":"The article cites Microsoft researchers' analysis of a recent Kazuar variant and quotes Microsoft's explanation of the Kernel leader's role in reducing external traffic visibility."}],"body":"\u003cp\u003eThe Russian hacker group Secret Blizzard has developed the long-running Kazuar backdoor into a modular peer-to-peer botnet. The new design is intended for long-term persistence, stealth, and data collection. Secret Blizzard’s activity overlaps with Turla, Uroburos, and Venomous Bear, and the group has been associated with Russia’s FSB.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft researchers analyzed a recent Kazuar variant and found that it now operates with three distinct modules: Kernel, Bridge, and Worker. The Kernel module coordinates tasks, manages other modules, elects a leader, and orchestrates communications and data flow. The elected leader communicates with command-and-control infrastructure, while non-leader infected systems remain silent to reduce external visibility.\u003c/p\u003e\n\n\u003cp\u003eKazuar’s Worker module carries out espionage functions such as keylogging, screenshot capture, filesystem harvesting, system and network reconnaissance, email and MAPI collection, window monitoring, and recent file theft. The malware also supports 150 configuration options, including AMSI, ETW, and WLDP bypasses. Microsoft recommends behavioral detection because Kazuar’s modular and highly configurable nature makes it evasive.\u003c/p\u003e\n"}];

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>

      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
