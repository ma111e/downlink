window.__DL_ARTICLES = [{"n":6,"title":"Unpatched Langflow Flaw CVE-2026-5027 Exploited for Unauthenticated RCE","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/unpatched-langflow-flaw-cve-2026-5027.html","time":"15:00","priority":"MUST READ","score":94,"tldr":"Langflow flaw CVE-2026-5027 is being actively exploited to achieve unauthenticated remote code execution through an arbitrary file-write path traversal bug. About 7,000 internet-exposed Langflow instances may be at risk, and the issue remains unpatched.","briefOverview":"\u003cp\u003eA high-severity unpatched flaw in Langflow, tracked as CVE-2026-5027, is being actively exploited in the wild, according to VulnCheck. Langflow is an open-source low-code platform used to build AI applications. The vulnerability has a CVSS score of 8.8 and is described as a path traversal issue that can let an attacker write files to arbitrary locations.\u003c/p\u003e\n\n\u003cp\u003eTenable said the flaw affects the \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint because it does not sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter in multipart form data. Attackers can use path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e to write files elsewhere on the filesystem. VulnCheck said the flaw enables remote code execution and noted that Langflow’s default unauthenticated auto-login can allow attackers to obtain a valid session token without credentials.\u003c/p\u003e\n\n\u003cp\u003eObserved exploitation has so far appeared to involve writing test files on victim systems. Censys data cited in the article shows about 7,000 Langflow instances publicly exposed on the internet, most of them in North America. The article also notes that Langflow has faced exploitation activity involving several other CVEs this year, including one weaponized by the Iranian state-sponsored group MuddyWater.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA high-severity unpatched vulnerability in Langflow, CVE-2026-5027, has come under active exploitation in the wild, according to findings from VulnCheck. Langflow is described as an open-source low-code platform for building artificial intelligence applications. The flaw carries a CVSS score of 8.8 and involves path traversal that can allow attackers to write files to arbitrary locations.\u003c/p\u003e\n\n\u003cp\u003eTenable, which discovered the issue, said the vulnerable \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint does not sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter from multipart form data. This allows an attacker to use path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e to write files to arbitrary filesystem locations. Tenable said it tried to contact the project maintainers three times in January and February 2026 before disclosing details on March 27.\u003c/p\u003e\n\n\u003cp\u003eVulnCheck’s Caitlin Condon said the vulnerability enables remote code execution. She also said Langflow enables unauthenticated auto-login by default, meaning no credentials are required to reach the vulnerable endpoint. According to that description, a single unauthenticated request can be enough to obtain a valid session token before exploitation proceeds.\u003c/p\u003e\n\n\u003cp\u003eThe exploitation activity observed so far appears to use the flaw to write test files on victim systems. Censys data cited in the article shows about 7,000 Langflow instances exposed to the public internet. A majority of those exposed instances are located in North America.\u003c/p\u003e\n\n\u003cp\u003eThe article places CVE-2026-5027 within a broader pattern of exploitation activity targeting Langflow vulnerabilities this year. It cites CVE-2026-0770, CVE-2026-33017, CVE-2026-21445, and CVE-2025-34291 as other Langflow-related flaws targeted in 2026. The last of those, CVE-2025-34291, has been weaponized by the Iranian state-sponsored group known as MuddyWater.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA high-severity unpatched security flaw in Langflow, tracked as CVE-2026-5027, has come under active exploitation in the wild, according to findings from VulnCheck. Langflow is described in the article as an open-source low-code platform used to build artificial intelligence applications. The vulnerability has a CVSS score of 8.8.\u003c/p\u003e\n\n\u003cp\u003eThe flaw is a path traversal issue that can allow an attacker to write files to arbitrary locations on the filesystem. VulnCheck’s Caitlin Condon said the issue enables remote code execution. The article emphasizes that the risk is heightened because Langflow enables unauthenticated auto-login by default.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical details\u003c/h2\u003e\n\n\u003cp\u003eTenable, which discovered the flaw, said the issue affects the \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint. According to Tenable, the endpoint does not sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter from multipart form data.\u003c/p\u003e\n\n\u003cp\u003eThis behavior allows an attacker to use path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e to write files to arbitrary filesystem locations. The article describes the vulnerability as unpatched at the time of reporting.\u003c/p\u003e\n\n\u003cp\u003eVulnCheck said the vulnerability can be exploited without credentials because of Langflow’s default unauthenticated auto-login behavior. Condon said a single unauthenticated request is enough to obtain a valid session token before proceeding with exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-timeline\"\u003eDisclosure timeline\u003c/h2\u003e\n\n\u003cp\u003eTenable said it attempted to contact the Langflow project maintainers three times in January and February 2026. After those attempts, Tenable disclosed details of the issue on March 27, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe article frames Tenable’s publication as an alert and VulnCheck’s findings as confirming active exploitation in the wild.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-activity\"\u003eExploitation activity\u003c/h2\u003e\n\n\u003cp\u003eVulnCheck reported that CVE-2026-5027 is being actively exploited. The exploitation observed so far appears to weaponize the bug to write test files on victim systems.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name a specific actor behind the exploitation of CVE-2026-5027. It does state that the activity follows other exploitation efforts targeting Langflow vulnerabilities this year.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-and-affected-ecosystem\"\u003eExposure and affected ecosystem\u003c/h2\u003e\n\n\u003cp\u003eCensys data cited in the article shows that about 7,000 Langflow instances are publicly exposed on the internet. A majority of those exposed instances are located in North America.\u003c/p\u003e\n\n\u003cp\u003eThe affected product is Langflow, an open-source low-code platform for building AI applications. The article highlights that attackers are increasingly targeting infrastructure and tooling used by organizations to build and deploy AI applications.\u003c/p\u003e\n\n\u003ch2 id=\"related-langflow-vulnerabilities\"\u003eRelated Langflow vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article states that this exploitation follows a flurry of activity targeting other Langflow vulnerabilities in 2026. The referenced vulnerabilities include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-0770\u003c/li\u003e\n\u003cli\u003eCVE-2026-33017\u003c/li\u003e\n\u003cli\u003eCVE-2026-21445\u003c/li\u003e\n\u003cli\u003eCVE-2025-34291\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says CVE-2025-34291 has been weaponized by MuddyWater, an Iranian state-sponsored group.\u003c/p\u003e\n\n\u003ch2 id=\"key-entities-mentioned\"\u003eKey entities mentioned\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eLangflow: The affected open-source low-code AI application development platform.\u003c/li\u003e\n\u003cli\u003eVulnCheck: The company that reported active exploitation in the wild.\u003c/li\u003e\n\u003cli\u003eCaitlin Condon: VulnCheck’s vice president of security research, cited as saying the flaw enables remote code execution.\u003c/li\u003e\n\u003cli\u003eTenable: The company that discovered the flaw and disclosed details after attempting to contact maintainers.\u003c/li\u003e\n\u003cli\u003eCensys: The source of exposure data showing about 7,000 public Langflow instances.\u003c/li\u003e\n\u003cli\u003eMuddyWater: The Iranian state-sponsored group mentioned in connection with exploitation of CVE-2025-34291.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"most-important-takeaway\"\u003eMost important takeaway\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-5027 is an unpatched Langflow path traversal flaw that VulnCheck says is being actively exploited and can enable unauthenticated remote code execution. The article’s most significant operational detail is that Langflow’s default unauthenticated auto-login can allow attackers to obtain a valid session token without credentials before exploiting the vulnerable file upload endpoint.\u003c/p\u003e\n","keyPoints":["CVE-2026-5027 is a high-severity unpatched path traversal flaw in Langflow that could allow attackers to write files to arbitrary filesystem locations.","Tenable said the vulnerable POST /api/v2/files endpoint does not sanitize the filename parameter from multipart form data, enabling use of ../ path traversal sequences.","VulnCheck reported that CVE-2026-5027 is under active exploitation in the wild and can enable remote code execution.","VulnCheck said Langflow enables unauthenticated auto-login by default, allowing attackers to obtain a valid session token without credentials before exploiting the vulnerable endpoint.","Censys data shows about 7,000 Langflow instances are publicly exposed on the internet, with most located in North America."],"insights":["The flaw is especially exposed in default deployments because Langflow’s unauthenticated auto-login lets attackers reach the vulnerable endpoint without credentials.","Tenable disclosed details after three unsuccessful attempts to contact Langflow maintainers, indicating defenders may need to mitigate the issue before an official patch is available.","Observed exploitation has so far involved writing test files, which gives defenders a concrete artifact type to look for when checking suspected compromised systems.","Langflow has been targeted through multiple CVEs this year, showing that organizations using it should treat the platform as a recurring target rather than a one-off exposure."],"referencedReports":[{"title":"TRA-2026-26","url":"https://www.tenable.com/security/research/tra-2026-26","publisher":"Tenable","context":"The article cites Tenable's late March 2026 alert describing the Langflow POST /api/v2/files path traversal issue and its disclosure timeline.","category":"","primary":false}],"body":"\u003cp\u003eA high-severity unpatched flaw in Langflow, tracked as CVE-2026-5027, is being actively exploited in the wild, according to VulnCheck. Langflow is an open-source low-code platform used to build AI applications. The vulnerability has a CVSS score of 8.8 and is described as a path traversal issue that can let an attacker write files to arbitrary locations.\u003c/p\u003e\n\n\u003cp\u003eTenable said the flaw affects the \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint because it does not sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter in multipart form data. Attackers can use path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e to write files elsewhere on the filesystem. VulnCheck said the flaw enables remote code execution and noted that Langflow’s default unauthenticated auto-login can allow attackers to obtain a valid session token without credentials.\u003c/p\u003e\n\n\u003cp\u003eObserved exploitation has so far appeared to involve writing test files on victim systems. Censys data cited in the article shows about 7,000 Langflow instances publicly exposed on the internet, most of them in North America. The article also notes that Langflow has faced exploitation activity involving several other CVEs this year, including one weaponized by the Iranian state-sponsored group MuddyWater.\u003c/p\u003e\n"},{"n":7,"title":"CISA Adds Cisco, Chrome, and Arista Flaws to KEV Catalog Amid Active Exploitation","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cisa-adds-cisco-chrome-and-arista-flaws.html","time":"14:44","priority":"MUST READ","score":92,"tldr":"CISA added actively exploited Cisco Catalyst SD-WAN Manager, Google Chrome V8, and Arista EOS vulnerabilities to its KEV catalog, requiring U.S. federal agencies to remediate or mitigate them by June 23, 2026. Notably, Arista does not plan to patch its EOS flaw and is recommending ACL-based mitigations instead.","briefOverview":"\u003cp\u003eCISA added three vulnerabilities to its Known Exploited Vulnerabilities catalog after reports of active exploitation. The flaws affect Cisco Catalyst SD-WAN Manager, Google Chrome V8, and Arista Extensible Operating System. Federal Civilian Executive Branch agencies were ordered to apply fixes or mitigations by June 23, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe listed vulnerabilities are CVE-2026-20245, CVE-2026-11645, and CVE-2026-7473. The Cisco issue could allow an authenticated local attacker to execute arbitrary commands as root, while the Chrome V8 issue could allow remote code execution inside a sandbox via a crafted HTML page. The Arista EOS flaw can cause affected switches configured as tunnel endpoints to incorrectly decapsulate and forward unexpected tunneled packets.\u003c/p\u003e\n\n\u003cp\u003eArista said CVE-2026-7473 has been reported as exploited in the wild but does not plan to release patches for it. The company cited the risk of breaking existing configurations and instead outlined mitigations based on applying ACLs either upstream or on affected devices. The flaw mainly impacts 7020R, 7280R/R2, and 7500R/R2 series products when specific tunnel decapsulation configurations are present.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency added three new vulnerabilities to its Known Exploited Vulnerabilities catalog following reports of active exploitation. The additions are CVE-2026-20245 in Cisco Catalyst SD-WAN Manager, CVE-2026-11645 in Google Chrome V8, and CVE-2026-7473 in Arista EOS. Federal Civilian Executive Branch agencies were ordered to apply the necessary fixes or mitigations by June 23, 2026.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-20245 has a CVSS score of 7.8 and is described as an improper encoding or escaping of output vulnerability in Cisco Catalyst SD-WAN Manager. The article says it could allow an authenticated, local attacker to execute arbitrary commands as root. Exploitation requires supplying a crafted file to the affected system.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-11645 has a CVSS score of 8.8 and affects Google Chrome V8. It is described as an out-of-bounds read and write vulnerability. According to the article, a remote attacker could exploit it to execute arbitrary code inside a sandbox via a crafted HTML page.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-7473 has a CVSS score of 6.9 and affects Arista Extensible Operating System. Arista said affected switches can incorrectly decapsulate and forward unexpected tunneled packets when a tunnel decapsulation configuration is present and a packet’s destination IP matches the configured decapsulation IP. The issue stems from the switch not verifying the tunnel protocol type.\u003c/p\u003e\n\n\u003cp\u003eThe Arista flaw mainly affects 7020R, 7280R/R2, and 7500R/R2 series products. Successful exploitation requires the device to be configured as a tunnel endpoint with a decapsulation IP, such as a VXLAN VTEP, a GRE tunnel endpoint, or an IP decap-group. Arista credited Comcast’s Scott Christiansen, Lukas Peitz, Rich Compton, and Jonathan Davis for responsibly disclosing the issue.\u003c/p\u003e\n\n\u003cp\u003eArista acknowledged that CVE-2026-7473 has been reported as exploited in the wild but said no patches are planned. The company cited risks that a patch could break existing configurations on deployments. Its recommended mitigations involve applying ACLs on upstream devices or on the devices where unexpected decapsulation is happening, with the goal of allowing only legitimate tunnel traffic or blocking malicious tunnel traffic.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA added three vulnerabilities to its Known Exploited Vulnerabilities catalog after reports of active exploitation. The newly listed flaws affect Cisco Catalyst SD-WAN Manager, Google Chrome V8, and Arista Extensible Operating System. The vulnerabilities are CVE-2026-20245, CVE-2026-11645, and CVE-2026-7473.\u003c/p\u003e\n\n\u003cp\u003eFederal Civilian Executive Branch agencies were ordered to apply the necessary fixes or mitigations by June 23, 2026. The article frames the additions as a response to active exploitation reports rather than as routine vulnerability tracking.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerabilities-added-to-the-kev-catalog\"\u003eVulnerabilities Added to the KEV Catalog\u003c/h2\u003e\n\n\u003cp\u003eCISA added the following vulnerabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-20245\u003c/strong\u003e affects Cisco Catalyst SD-WAN Manager and has a CVSS score of 7.8.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-11645\u003c/strong\u003e affects Google Chrome V8 and has a CVSS score of 8.8.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-7473\u003c/strong\u003e affects Arista Extensible Operating System and has a CVSS score of 6.9.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"cisco-catalyst-sd-wan-manager-issue\"\u003eCisco Catalyst SD-WAN Manager Issue\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-20245 is described as an improper encoding or escaping of output vulnerability in Cisco Catalyst SD-WAN Manager. The article says the flaw could allow an authenticated, local attacker to execute arbitrary commands as root. Exploitation involves supplying a crafted file to the affected system.\u003c/p\u003e\n\n\u003ch2 id=\"google-chrome-v8-issue\"\u003eGoogle Chrome V8 Issue\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-11645 is described as an out-of-bounds read and write vulnerability in Google Chrome V8. According to the article, it could allow a remote attacker to execute arbitrary code inside a sandbox. The exploitation path described in the article involves a crafted HTML page.\u003c/p\u003e\n\n\u003ch2 id=\"arista-eos-issue\"\u003eArista EOS Issue\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-7473 is described as an incomplete comparison with missing factors vulnerability in Arista Extensible Operating System. The article says the issue could be exploited to process non-configured tunnel traffic.\u003c/p\u003e\n\n\u003cp\u003eArista explained that on affected platforms running Arista EOS, the switch can incorrectly decapsulate and forward unexpected tunneled packets when certain tunnel decapsulation configurations are present. Examples given include VXLAN, decap-groups, and GRE tunnel interfaces. The behavior occurs when the unexpected tunneled packets have a destination IP matching the configured decapsulation IP.\u003c/p\u003e\n\n\u003cp\u003eArista said the issue happens because the switch does not verify the tunnel protocol type. This can lead to unexpected processing of non-configured tunnel traffic.\u003c/p\u003e\n\n\u003ch2 id=\"affected-arista-products-and-conditions\"\u003eAffected Arista Products and Conditions\u003c/h2\u003e\n\n\u003cp\u003eThe Arista vulnerability mainly impacts the following product series:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e7020R\u003c/li\u003e\n\u003cli\u003e7280R/R2\u003c/li\u003e\n\u003cli\u003e7500R/R2\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that successful exploitation requires the device to be configured as a tunnel endpoint with a decapsulation IP. Examples include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA VXLAN VTEP\u003c/li\u003e\n\u003cli\u003eA GRE tunnel endpoint\u003c/li\u003e\n\u003cli\u003eAn IP decap-group\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"disclosure-and-exploitation-status\"\u003eDisclosure and Exploitation Status\u003c/h2\u003e\n\n\u003cp\u003eArista acknowledged that CVE-2026-7473 has been reported as being exploited in the wild. The company credited Comcast’s Scott Christiansen, Lukas Peitz, Rich Compton, and Jonathan Davis for responsibly disclosing the vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify any threat actor or group associated with exploitation of the three vulnerabilities. It only states that the vulnerabilities were added to the KEV catalog following reports of active exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"arista-response-and-mitigations\"\u003eArista Response and Mitigations\u003c/h2\u003e\n\n\u003cp\u003eDespite acknowledging exploitation reports, Arista said no patches are being planned for CVE-2026-7473. The company cited the risk that a patch could break existing configurations on deployments.\u003c/p\u003e\n\n\u003cp\u003eArista outlined two broad mitigation approaches:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApplying ACLs on upstream devices.\u003c/li\u003e\n\u003cli\u003eApplying ACLs on the devices where unexpected decapsulation is happening.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe company said the goal in both cases is to selectively allow only legitimate tunnel traffic or selectively block malicious tunnel traffic.\u003c/p\u003e\n\n\u003ch2 id=\"required-federal-response\"\u003eRequired Federal Response\u003c/h2\u003e\n\n\u003cp\u003eFederal Civilian Executive Branch agencies must apply the necessary fixes or mitigations by June 23, 2026. This deadline applies to the three vulnerabilities added to the KEV catalog. For the Arista issue, the article indicates that mitigation rather than patching is the vendor-provided path because Arista does not plan to release patches for CVE-2026-7473.\u003c/p\u003e\n","keyPoints":["CISA added CVE-2026-20245, CVE-2026-11645, and CVE-2026-7473 to its Known Exploited Vulnerabilities catalog following reports of active exploitation.","CVE-2026-20245 is an improper encoding or escaping of output vulnerability in Cisco Catalyst SD-WAN Manager that could allow an authenticated local attacker to execute arbitrary commands as root.","CVE-2026-11645 is an out-of-bounds read and write vulnerability in Google Chrome V8 that could allow a remote attacker to execute arbitrary code inside a sandbox via a crafted HTML page.","CVE-2026-7473 affects Arista EOS and could cause affected switches configured as tunnel endpoints to incorrectly decapsulate and forward unexpected tunneled packets.","Arista said it does not plan to patch CVE-2026-7473 because of the risk of breaking existing configurations and instead outlined ACL-based mitigations."],"insights":["Arista’s decision not to patch an actively exploited KEV-listed flaw is unusual and makes configuration-level mitigation, rather than software updating, the primary remediation path for affected EOS deployments.","CVE-2026-7473 is only exploitable in specific Arista EOS configurations where the device is acting as a tunnel endpoint with a decapsulation IP, so exposure assessment should focus on VXLAN VTEP, GRE tunnel endpoint, and IP decap-group deployments.","The Arista mitigation guidance centers on filtering tunnel traffic with ACLs either upstream or on the affected device, indicating that organizations need to validate legitimate tunnel sources and protocols rather than simply apply a vendor update.","Federal Civilian Executive Branch agencies have a short remediation window until June 23, 2026, despite one of the three listed vulnerabilities lacking a planned patch."],"referencedReports":[{"title":"CISA Adds Three Known Exploited Vulnerabilities to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/09/cisa-adds-three-known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"The article cites CISA's alert announcing the addition of three actively exploited vulnerabilities to the KEV catalog.","category":"","primary":false},{"title":"Security Advisory 0137","url":"https://www.arista.com/en/support/advisories-notices/security-advisory/24005-security-advisory-0137","publisher":"Arista","context":"The article links to Arista's security advisory for CVE-2026-7473 and quotes Arista's explanation and mitigation guidance.","category":"","primary":false}],"body":"\u003cp\u003eCISA added three vulnerabilities to its Known Exploited Vulnerabilities catalog after reports of active exploitation. The flaws affect Cisco Catalyst SD-WAN Manager, Google Chrome V8, and Arista Extensible Operating System. Federal Civilian Executive Branch agencies were ordered to apply fixes or mitigations by June 23, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe listed vulnerabilities are CVE-2026-20245, CVE-2026-11645, and CVE-2026-7473. The Cisco issue could allow an authenticated local attacker to execute arbitrary commands as root, while the Chrome V8 issue could allow remote code execution inside a sandbox via a crafted HTML page. The Arista EOS flaw can cause affected switches configured as tunnel endpoints to incorrectly decapsulate and forward unexpected tunneled packets.\u003c/p\u003e\n\n\u003cp\u003eArista said CVE-2026-7473 has been reported as exploited in the wild but does not plan to release patches for it. The company cited the risk of breaking existing configurations and instead outlined mitigations based on applying ACLs either upstream or on affected devices. The flaw mainly impacts 7020R, 7280R/R2, and 7500R/R2 series products when specific tunnel decapsulation configurations are present.\u003c/p\u003e\n"},{"n":8,"title":"China-Linked JDY Botnet Expands to 1,500+ Devices for Cyber Reconnaissance","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/china-linked-jdy-botnet-expands-to-1500.html","time":"16:08","priority":"SHOULD READ","score":88,"tldr":"The China-linked JDY botnet has grown to more than 1,500 compromised SOHO and IoT devices and is being used as a high-speed reconnaissance network to identify exposed and vulnerable infrastructure. Researchers say it helps Chinese state-sponsored actors rapidly gather targeting data after new vulnerabilities are disclosed.","briefOverview":"\u003cp\u003eCybersecurity researchers at Lumen’s Black Lotus Labs warned of a resurgence and expansion of JDY, a covert China-linked botnet made up of more than 1,500 compromised SOHO and IoT devices. The network is described as a centrally controlled, high-performance scanner used to discover, fingerprint, and continuously map exposed services at scale. The article says the reconnaissance data is used to support follow-on target identification and exploitation by Chinese nation-state groups.\u003c/p\u003e\n\n\u003cp\u003eJDY was first identified as a cluster within the KV-botnet in December 2023 and has continued operating after the U.S. government’s takedown of KV-botnet in early 2024. Its device population has grown from about 650 bots in January 2024 to more than 1,500, with many compromised nodes located in the United States and Brazil, followed by Europe and Asia. The botnet has also expanded beyond Cisco RV320 and RV325 routers to include devices from Araknis, Mimosa Networks, Ubiquiti, Draytek, Hikvision, and Linksys.\u003c/p\u003e\n\n\u003cp\u003eBlack Lotus Labs said JDY uses a layered architecture in which operators manage infected infrastructure through Tor nodes, including command-and-control and payload servers. The malware fingerprints hosts, receives targeted scanning tasks, performs TCP, SSL, UDP, and ICMP-assisted probing, captures response data such as TLS certificates and metadata, and reports results back to dispatch servers. The article emphasizes that JDY’s purpose is infrastructure reconnaissance rather than direct exploitation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eLumen’s Black Lotus Labs reported that JDY, a covert network associated with China-nexus state-sponsored threat actors, has resurged and expanded into a botnet of more than 1,500 compromised SOHO and IoT devices. The botnet is described as a centrally controlled, high-performance scanner that discovers, fingerprints, and continuously maps exposed services at scale. The article says JDY is used to feed structured reconnaissance data into a larger scanning ecosystem for follow-on target identification and exploitation.\u003c/p\u003e\n\n\u003cp\u003eJDY was first flagged in December 2023 as a cluster within the KV-botnet, which included compromised SOHO routers, firewalls, and IoT devices. The article states that KV-botnet was used by Chinese hacking groups such as Volt Typhoon and was taken down by the U.S. government in early 2024. After the takedown, operators changed behavior, the second KV cluster largely went offline, and JDY evolved into a more independent reconnaissance capability.\u003c/p\u003e\n\n\u003cp\u003eThe botnet has grown from about 650 bots at the start of January 2024 to more than 1,500 compromised devices. Most hacked nodes are located in the United States and Brazil, followed by Europe and Asia. While the cluster previously featured Cisco RV320 and RV325 routers, it now includes a broader set of devices from Araknis, Mimosa Networks, Ubiquiti, Draytek, Hikvision, and Linksys.\u003c/p\u003e\n\n\u003cp\u003eBlack Lotus Labs said JDY’s use of many U.S.-based SOHO and IoT devices helps operators evade defenses such as geofencing, IP reputation-based detection, and static blocklists. By distributing reconnaissance activity across many IP addresses, the operators reduce the likelihood that any single IP will be labeled as a scanner and blocked. The use of compromised SOHO and IoT devices also helps scanning activity blend in with legitimate user traffic.\u003c/p\u003e\n\n\u003cp\u003eTechnically, JDY uses Tor nodes to manage infected infrastructure, including command-and-control and payload servers. Attack chains weaponize newly disclosed vulnerabilities in edge devices, such as CVE-2026-35616, to deliver a shell script dropper that downloads the primary payload based on processor architecture and deletes it from disk after launch. The malware fingerprints the host, receives scanning tasks, conducts high-volume TCP, SSL, UDP, and ICMP-assisted probing, captures responses such as TLS certificates and metadata, and reports the results back to central servers.\u003c/p\u003e\n\n\u003cp\u003eThe malware adapts its scanning method based on local privileges. If it can open a raw socket, indicating root privileges, it performs high-speed SYN scanning using custom-crafted TCP packets; otherwise, or for web scans, it uses standard TCP and TLS connections or protocols such as UDP and ICMP. Black Lotus Labs said JDY’s continued operation shows how reconnaissance networks can persist despite takedowns and provide adversaries with timely targeting data, often within hours of vulnerability disclosure.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eLumen’s Black Lotus Labs warned of a “resurgence and expansion” of JDY, a covert botnet associated with China-nexus state-sponsored threat actors. The JDY botnet now comprises more than 1,500 compromised small office and home office devices and IoT devices. Black Lotus Labs described it as a centrally controlled, high-performance scanner used to discover, fingerprint, and continuously map exposed services at scale.\u003c/p\u003e\n\n\u003cp\u003eThe article frames JDY as a reconnaissance capability rather than a tool focused on direct exploitation. Its operators use it to conduct targeted scanning and service fingerprinting, especially after public vulnerability disclosures. The reconnaissance output is described as structured data that feeds a larger scanning ecosystem for follow-on target identification and exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"background-and-relationship-to-kv-botnet\"\u003eBackground and Relationship to KV-botnet\u003c/h2\u003e\n\n\u003cp\u003eJDY was first flagged in mid-December 2023 as a cluster within another botnet known as KV-botnet. KV-botnet consisted of compromised SOHO routers, firewalls, and IoT devices and was used for broader scanning against internet targets. The article says Chinese hacking groups such as Volt Typhoon used the stealthy network.\u003c/p\u003e\n\n\u003cp\u003eThe U.S. government took down KV-botnet in early 2024. After that takedown, the botnet operators made behavioral changes, and the second KV cluster largely went offline. The article says it is suspected that the botnet is offered by its operators to various hacking groups while also being used by the operators for their own reconnaissance and targeting.\u003c/p\u003e\n\n\u003cp\u003eBlack Lotus Labs’ latest findings indicate that JDY has expanded in scope and now infects a broader range of devices. The article describes JDY’s evolution from a supporting component of KV-botnet into an independent, high-performance reconnaissance capability.\u003c/p\u003e\n\n\u003ch2 id=\"botnet-size-and-geographic-distribution\"\u003eBotnet Size and Geographic Distribution\u003c/h2\u003e\n\n\u003cp\u003eJDY has grown substantially since early 2024. According to the article, the botnet increased from about 650 bots at the start of January 2024 to more than 1,500 compromised devices.\u003c/p\u003e\n\n\u003cp\u003eMost of the hacked nodes are located in the United States and Brazil. The article says Europe and Asia follow as additional regions where compromised nodes are located.\u003c/p\u003e\n\n\u003cp\u003eBlack Lotus Labs said the large number of U.S.-based SOHO and IoT devices gives the botnet operational advantages. In particular, it helps operators evade traditional IP-based controls, including geofencing, IP reputation-based detection, and static blocklists.\u003c/p\u003e\n\n\u003ch2 id=\"affected-device-ecosystem\"\u003eAffected Device Ecosystem\u003c/h2\u003e\n\n\u003cp\u003eThe botnet’s device composition has become more diverse. Earlier, the JDY cluster primarily featured Cisco RV320 and RV325 routers. The current botnet makeup includes devices from a wider range of vendors.\u003c/p\u003e\n\n\u003cp\u003eThe article names the following vendors and devices as part of the present botnet ecosystem:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco RV320 and RV325 routers\u003c/li\u003e\n\u003cli\u003eAraknis devices\u003c/li\u003e\n\u003cli\u003eMimosa Networks devices\u003c/li\u003e\n\u003cli\u003eUbiquiti devices\u003c/li\u003e\n\u003cli\u003eDraytek devices\u003c/li\u003e\n\u003cli\u003eHikvision devices\u003c/li\u003e\n\u003cli\u003eLinksys devices\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis broader device mix supports the article’s description of JDY as a more durable and expanded reconnaissance network.\u003c/p\u003e\n\n\u003ch2 id=\"reconnaissance-role-and-operational-purpose\"\u003eReconnaissance Role and Operational Purpose\u003c/h2\u003e\n\n\u003cp\u003eJDY is used to conduct targeted scanning and service fingerprinting. Black Lotus Labs said this activity is intended to flag vulnerable infrastructure following public disclosures. The article describes this as an industrialized reconnaissance effort whose results are leveraged by Chinese nation-state groups.\u003c/p\u003e\n\n\u003cp\u003eThe malware’s goal is infrastructure reconnaissance rather than exploitation. It gathers information about exposed services and reports scan results back to central servers. The article says this activity most likely informs asset discovery, vulnerability-targeting pipelines, and downstream exploitation or attack-orchestration systems.\u003c/p\u003e\n\n\u003cp\u003eBlack Lotus Labs stated that JDY can provide adversaries with timely targeting data, often within hours of vulnerability disclosure.\u003c/p\u003e\n\n\u003ch2 id=\"architecture-and-command-infrastructure\"\u003eArchitecture and Command Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe botnet uses a layered architecture. Operators use Tor nodes to manage infected infrastructure, including both command-and-control servers and payload servers. The C2 servers direct bots to perform targeted reconnaissance and system profiling instead of indiscriminate scanning.\u003c/p\u003e\n\n\u003cp\u003eScan results are sent to central servers for ongoing intelligence gathering. The article says this intelligence-gathering effort is intended to further Chinese threat actors’ objectives.\u003c/p\u003e\n\n\u003cp\u003eThe distributed structure helps the botnet avoid simple blocking. By spreading scanning activity across many IP addresses, the operators reduce the chance that any individual IP address will be labeled as a scanner and blocked. The use of compromised SOHO and IoT devices also helps the activity blend in with legitimate user traffic.\u003c/p\u003e\n\n\u003ch2 id=\"infection-chain-and-payload-deployment\"\u003eInfection Chain and Payload Deployment\u003c/h2\u003e\n\n\u003cp\u003eThe article says attack chains weaponize newly disclosed vulnerabilities in edge devices, including CVE-2026-35616. These attacks deliver a shell script dropper to compromised devices.\u003c/p\u003e\n\n\u003cp\u003eThe dropper checks whether the malware is already active. If it is not active, the dropper downloads the primary payload based on the detected processor architecture. The article gives examples of supported architectures, including mips, mips64, mipsel, and mipsel64.\u003c/p\u003e\n\n\u003cp\u003eOnce the malware is launched, it is deleted from disk.\u003c/p\u003e\n\n\u003ch2 id=\"malware-capabilities\"\u003eMalware Capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe JDY malware is designed to support scanning and target reconnaissance. The article lists several core functions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFingerprinting the infected host\u003c/li\u003e\n\u003cli\u003eReceiving scanning tasks from a central C2 server\u003c/li\u003e\n\u003cli\u003ePerforming high-volume TCP probing\u003c/li\u003e\n\u003cli\u003ePerforming SSL probing\u003c/li\u003e\n\u003cli\u003ePerforming UDP probing\u003c/li\u003e\n\u003cli\u003ePerforming ICMP-assisted probing\u003c/li\u003e\n\u003cli\u003eCapturing responses such as TLS certificates and metadata\u003c/li\u003e\n\u003cli\u003eReporting results back to the dispatch server\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese capabilities allow the botnet to discover and profile exposed services at scale.\u003c/p\u003e\n\n\u003ch2 id=\"adaptive-scanning-behavior\"\u003eAdaptive Scanning Behavior\u003c/h2\u003e\n\n\u003cp\u003eA notable technical feature of the malware is that it adapts its scanning method based on its privileges on the local system. If the malware can open a raw socket, which the article describes as an indication of root privileges, it initiates high-speed SYN scanning with custom-crafted TCP packets.\u003c/p\u003e\n\n\u003cp\u003eIf raw sockets are unavailable, or if the task is a web scan, the scanning engine uses other methods. These include standard TCP and TLS connections, as well as protocols such as UDP and ICMP.\u003c/p\u003e\n\n\u003cp\u003eThis adaptive scanning behavior allows JDY to continue performing reconnaissance even when it lacks the privileges needed for raw-socket-based SYN scanning.\u003c/p\u003e\n\n\u003ch2 id=\"significance-of-the-findings\"\u003eSignificance of the Findings\u003c/h2\u003e\n\n\u003cp\u003eBlack Lotus Labs said JDY demonstrates how IoT and SOHO botnets, along with covert networks of compromised devices, are used for rapid vulnerability exploitation. The article emphasizes that the botnet’s purpose is to support reconnaissance and targeting, not direct exploitation by the malware itself.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights the durability of the capability. JDY’s continued operation after the KV-botnet takedown shows that disrupting individual nodes or clusters does not eliminate the underlying capability. According to Black Lotus Labs, the capability persists, adapts, and continues to provide adversaries with timely targeting data.\u003c/p\u003e\n","keyPoints":["Lumen's Black Lotus Labs reported that the China-linked JDY botnet has expanded to more than 1,500 compromised SOHO and IoT devices.","JDY is used as a centrally controlled scanner to discover, fingerprint, and continuously map exposed internet services at scale.","Researchers said JDY is being used for targeted scanning and service fingerprinting to identify vulnerable infrastructure after public vulnerability disclosures.","The botnet now includes devices from Araknis, Mimosa Networks, Ubiquiti, Draytek, Hikvision, and Linksys, expanding beyond its earlier focus on Cisco RV320 and RV325 routers.","Black Lotus Labs said JDY uses Tor nodes to manage infected infrastructure and command-and-control servers that assign reconnaissance and system-profiling tasks to bots."],"insights":["JDY’s use of many U.S.-based SOHO and IoT devices helps its reconnaissance traffic bypass geofencing, IP reputation controls, and static blocklists by blending with legitimate user traffic.","The botnet adapts its scanning behavior based on local privileges, using high-speed SYN scanning when raw sockets are available and falling back to standard TCP, TLS, UDP, or ICMP methods otherwise.","JDY appears to feed structured reconnaissance results into a broader scanning and targeting ecosystem, making it useful for rapid follow-on exploitation after vulnerability disclosures.","The botnet’s persistence after the KV-botnet takedown shows that disrupting individual clusters did not eliminate the underlying reconnaissance capability."],"referencedReports":[{"title":"Expanded JDY IoT and SOHO Botnet Enables Rapid Vulnerability Exploitation","url":"https://www.lumen.com/blog/en-us/expanded-jdy-iot-and-soho-botnet-enables-rapid-vulnerability-exploitation","publisher":"Lumen Black Lotus Labs","context":"The article cites a Lumen Black Lotus Labs report as the source for findings that JDY has expanded to more than 1,500 SOHO and IoT devices used for large-scale reconnaissance.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers at Lumen’s Black Lotus Labs warned of a resurgence and expansion of JDY, a covert China-linked botnet made up of more than 1,500 compromised SOHO and IoT devices. The network is described as a centrally controlled, high-performance scanner used to discover, fingerprint, and continuously map exposed services at scale. The article says the reconnaissance data is used to support follow-on target identification and exploitation by Chinese nation-state groups.\u003c/p\u003e\n\n\u003cp\u003eJDY was first identified as a cluster within the KV-botnet in December 2023 and has continued operating after the U.S. government’s takedown of KV-botnet in early 2024. Its device population has grown from about 650 bots in January 2024 to more than 1,500, with many compromised nodes located in the United States and Brazil, followed by Europe and Asia. The botnet has also expanded beyond Cisco RV320 and RV325 routers to include devices from Araknis, Mimosa Networks, Ubiquiti, Draytek, Hikvision, and Linksys.\u003c/p\u003e\n\n\u003cp\u003eBlack Lotus Labs said JDY uses a layered architecture in which operators manage infected infrastructure through Tor nodes, including command-and-control and payload servers. The malware fingerprints hosts, receives targeted scanning tasks, performs TCP, SSL, UDP, and ICMP-assisted probing, captures response data such as TLS certificates and metadata, and reports results back to dispatch servers. The article emphasizes that JDY’s purpose is infrastructure reconnaissance rather than direct exploitation.\u003c/p\u003e\n"},{"n":1,"title":"China-linked JDY botnet expands targeting of U.S. military networks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/china-linked-jdy-botnet-expands-targeting-of-us-military-networks/","time":"15:00","priority":"SHOULD READ","score":86,"tldr":"Black Lotus Labs says the China-linked JDY botnet has more than doubled in size and is being used to rapidly scan for newly disclosed vulnerabilities, with a heavy focus on U.S. military and related networks. Organizations should patch and lock down SOHO routers, firewalls, and IoT devices to prevent them from being recruited or used for reconnaissance.","briefOverview":"\u003cp\u003eBlack Lotus Labs by Lumen reports that the JDY botnet, previously associated with Chinese threat actors such as Volt Typhoon, has expanded its targeting scope and reconnaissance activity. The botnet has grown from roughly 650 active bots in January 2024 to more than 1,500 compromised SOHO and IoT devices. Researchers said JDY maintains a strong focus on the United States and heavily targets U.S. military and associated networks.\u003c/p\u003e\n\n\u003cp\u003eJDY is described as a distributed scanning and fingerprinting network rather than an exploitation framework or DDoS botnet. Its purpose is to help operators identify vulnerable infrastructure soon after public vulnerability disclosures. Lumen researchers observed JDY scans targeting CVE-2026-35616 shortly after Fortinet publicly disclosed the FortiClient EMS flaw.\u003c/p\u003e\n\n\u003cp\u003eThe botnet conducts service discovery, banner grabbing, TLS certificate collection, protocol fingerprinting, and flaw-focused reconnaissance. It includes compromised devices from vendors such as Cisco, Araknis, Mimosa Networks, Ubiquiti, DrayTek, Hikvision, and Linksys. The article advises organizations to patch routers, firewalls, and IoT devices, disable unnecessary exposed administrative interfaces, restrict remote management, replace default credentials, and monitor for unusual outbound scanning from edge devices.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eResearchers at Black Lotus Labs by Lumen report that the JDY botnet has significantly expanded its targeting scope and reconnaissance efforts. The botnet was previously associated with Chinese threat actors like Volt Typhoon. According to the researchers, JDY has grown from roughly 650 active bots in January 2024 to over 1,500 compromised SOHO and IoT devices today.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that JDY’s size should not be evaluated like a DDoS botnet or exploitation framework. Instead, JDY operates as a distributed scanning and fingerprinting network that helps operators locate targets vulnerable to newly disclosed flaws. Black Lotus Labs said the activity shows a clear focus on identifying vulnerable infrastructure shortly after public vulnerability disclosures.\u003c/p\u003e\n\n\u003cp\u003eJDY’s targeting is described as strongly focused on the United States, where many compromised devices are located. The most prominent targets are U.S. military and associated entities, though the article says the activity has been observed across a range of sectors. CISA has previously warned about the risks Volt Typhoon operatives pose to unprotected SOHO routers and urged vendors to eliminate vulnerabilities in SOHO router web management interfaces during design and development.\u003c/p\u003e\n\n\u003cp\u003eThe botnet is designed for service discovery, service banner grabbing, TLS certificate collection, protocol fingerprinting, and flaw-focused reconnaissance. Compromised devices include products from Cisco, Araknis, Mimosa Networks, Ubiquiti, DrayTek, Hikvision, and Linksys across MIPS, MIPS64, MIPSEL, and MIPSEL64 architectures. Lumen researchers observed JDY scans targeting CVE-2026-35616 shortly after Fortinet publicly disclosed the FortiClient EMS flaw.\u003c/p\u003e\n\n\u003cp\u003eJDY operators control the botnet through hidden Tor services that also act as command-and-control infrastructure. In some cases, they use the open-source Platypus reverse-shell and host-management framework. The malware registers with a central Dispatch Service, receives scanning assignments, executes them, compresses the results, and sends them back to the C2 until ordered to stop.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends that organizations keep routers, firewalls, and IoT devices updated to prevent recruitment into reconnaissance networks. Defenders should reduce external attack surface by disabling unnecessary internet-exposed administrative interfaces, restricting remote management access, replacing default credentials, and monitoring for unusual outbound scanning activity from edge devices.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eBlack Lotus Labs by Lumen reports that the JDY botnet has significantly expanded its targeting scope and reconnaissance efforts. The malware network was previously associated with Chinese threat actors like Volt Typhoon. Researchers said JDY has grown from roughly 650 active bots in January 2024 to more than 1,500 compromised SOHO and IoT devices today.\u003c/p\u003e\n\n\u003cp\u003eThe article states that JDY maintains a strong focus on the United States. Many of its compromised devices are located in the United States, and the botnet heavily targets U.S. military and associated networks. Black Lotus Labs said this targeted focus has been observed across a range of sectors, with U.S. military and associated entities the most prominent.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-botnet-matters\"\u003eWhy the Botnet Matters\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that JDY’s bot count may appear low, but that its purpose differs from exploitation frameworks or DDoS botnets. JDY does not require large swarms to accumulate firepower. Instead, it is a distributed scanning and fingerprinting network designed to help operators locate targets vulnerable to newly disclosed flaws.\u003c/p\u003e\n\n\u003cp\u003eBlack Lotus Labs said its analysis shows a clear focus on identifying vulnerable infrastructure shortly after public vulnerability disclosures. The researchers said this suggests that reconnaissance output is rapidly operationalized by China-nexus advanced persistent threat actors. As an example, Lumen researchers observed JDY scans targeting CVE-2026-35616 shortly after Fortinet publicly disclosed the FortiClient EMS flaw.\u003c/p\u003e\n\n\u003ch2 id=\"affected-devices-and-infrastructure\"\u003eAffected Devices and Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe article says JDY has compromised SOHO and IoT devices from several vendors. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco\u003c/li\u003e\n\u003cli\u003eAraknis\u003c/li\u003e\n\u003cli\u003eMimosa Networks\u003c/li\u003e\n\u003cli\u003eUbiquiti\u003c/li\u003e\n\u003cli\u003eDrayTek\u003c/li\u003e\n\u003cli\u003eHikvision\u003c/li\u003e\n\u003cli\u003eLinksys\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe compromised devices span MIPS, MIPS64, MIPSEL, and MIPSEL64 architectures. The article frames these devices as part of a reconnaissance network used to scan and fingerprint external infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"technical-capabilities\"\u003eTechnical Capabilities\u003c/h2\u003e\n\n\u003cp\u003eJDY is designed to conduct multiple reconnaissance activities, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eService discovery\u003c/li\u003e\n\u003cli\u003eService banner grabbing\u003c/li\u003e\n\u003cli\u003eTLS certificate collection\u003c/li\u003e\n\u003cli\u003eProtocol fingerprinting\u003c/li\u003e\n\u003cli\u003eFlaw-focused reconnaissance\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe scanning module supports TCP scanning, SSL/TLS scanning, UDP scanning, ICMP probing, banner collection, TLS certificate harvesting, and service fingerprinting using downloadable rule sets. The malware registers with a central Dispatch Service, receives scanning assignments, executes them, compresses the results, and sends them back to the command-and-control infrastructure. The botnet client repeats this cycle until the operator specifically orders it to stop.\u003c/p\u003e\n\n\u003ch2 id=\"command-and-control-and-management\"\u003eCommand-and-Control and Management\u003c/h2\u003e\n\n\u003cp\u003eThe operators control JDY through hidden Tor services. The article says these hidden services also serve as command-and-control infrastructure. In some cases, the operators also use Platypus, an open-source reverse-shell and host-management framework.\u003c/p\u003e\n\n\u003cp\u003eJDY’s operational workflow centers on tasking bots with scanning assignments and collecting the results. This allows the botnet to perform distributed reconnaissance against selected targets and return compressed scan output to its controllers.\u003c/p\u003e\n\n\u003ch2 id=\"raw-syn-scanning-behavior\"\u003eRaw SYN Scanning Behavior\u003c/h2\u003e\n\n\u003cp\u003eBlack Lotus Labs described the TCP scanning function as one of JDY’s most technically interesting capabilities. When the malware has sufficient privileges, it can perform much faster and stealthier raw SYN scanning. This generally requires root or administrative privileges because the malware must be able to open a raw socket.\u003c/p\u003e\n\n\u003cp\u003eWhen raw socket access is available, JDY initiates high-speed SYN scanning with custom-crafted TCP packets. These packets use a fixed source port of 19000, increment destination ports one at a time, and batch-process thousands of scan targets. The article presents this behavior as part of the botnet’s advanced reconnaissance capability.\u003c/p\u003e\n\n\u003ch2 id=\"related-warnings-and-response-guidance\"\u003eRelated Warnings and Response Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that CISA has previously warned about the risk Volt Typhoon operatives pose to unprotected SOHO routers. CISA urged network device vendors to eliminate vulnerabilities in SOHO router web management interfaces during design and development phases.\u003c/p\u003e\n\n\u003cp\u003eAs JDY activity increases, the article recommends that organizations ensure routers, firewalls, and IoT devices are running the latest security updates and patches. This is intended to reduce the likelihood that such devices will be recruited into reconnaissance networks.\u003c/p\u003e\n\n\u003cp\u003eThe article also recommends that defenders reduce external attack surface by:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDisabling unnecessary internet-exposed administrative interfaces\u003c/li\u003e\n\u003cli\u003eRestricting remote management access\u003c/li\u003e\n\u003cli\u003eReplacing default credentials\u003c/li\u003e\n\u003cli\u003eMonitoring for unusual outbound scanning activity originating from edge devices\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe central finding is that JDY has expanded into a larger, more active reconnaissance botnet focused heavily on the United States, especially U.S. military and associated networks. Its importance lies not in botnet size but in its role as a distributed scanning and fingerprinting platform that can quickly target infrastructure after public vulnerability disclosures.\u003c/p\u003e\n","keyPoints":["Black Lotus Labs by Lumen reports that the JDY botnet has expanded from roughly 650 active bots in January 2024 to more than 1,500 compromised SOHO and IoT devices.","Researchers say JDY focuses strongly on the United States and heavily targets U.S. military and associated networks.","JDY is a distributed scanning and fingerprinting network used for service discovery, banner grabbing, TLS certificate collection, protocol fingerprinting, and flaw-focused reconnaissance.","The botnet has compromised devices from vendors including Cisco, Araknis, Mimosa Networks, Ubiquiti, DrayTek, Hikvision, and Linksys.","JDY operators control the botnet through hidden Tor services and, in some cases, use the open-source Platypus reverse-shell and host-management framework."],"insights":["JDY’s relatively small size is still significant because it is built for distributed reconnaissance and fingerprinting rather than high-volume DDoS or exploitation activity.","The botnet’s scans shortly after Fortinet disclosed CVE-2026-35616 indicate that its operators rapidly turn public vulnerability disclosures into targeting activity.","JDY can perform faster and stealthier raw SYN scanning when it has root or administrative privileges, using custom TCP packets with a fixed source port of 19000.","Organizations can reduce the risk of both compromise and outbound reconnaissance by disabling unnecessary internet-exposed administrative interfaces and restricting remote management access on edge devices."],"referencedReports":[{"title":"Expanded JDY IoT and SOHO Botnet Enables Rapid Vulnerability Exploitation","url":"https://www.lumen.com/blog/en-us/expanded-jdy-iot-and-soho-botnet-enables-rapid-vulnerability-exploitation","publisher":"Black Lotus Labs by Lumen","context":"The article cites the Black Lotus Labs report as the source of its analysis on JDY’s expansion, targeting patterns, infrastructure, and scanning capabilities.","category":"","primary":false}],"body":"\u003cp\u003eBlack Lotus Labs by Lumen reports that the JDY botnet, previously associated with Chinese threat actors such as Volt Typhoon, has expanded its targeting scope and reconnaissance activity. The botnet has grown from roughly 650 active bots in January 2024 to more than 1,500 compromised SOHO and IoT devices. Researchers said JDY maintains a strong focus on the United States and heavily targets U.S. military and associated networks.\u003c/p\u003e\n\n\u003cp\u003eJDY is described as a distributed scanning and fingerprinting network rather than an exploitation framework or DDoS botnet. Its purpose is to help operators identify vulnerable infrastructure soon after public vulnerability disclosures. Lumen researchers observed JDY scans targeting CVE-2026-35616 shortly after Fortinet publicly disclosed the FortiClient EMS flaw.\u003c/p\u003e\n\n\u003cp\u003eThe botnet conducts service discovery, banner grabbing, TLS certificate collection, protocol fingerprinting, and flaw-focused reconnaissance. It includes compromised devices from vendors such as Cisco, Araknis, Mimosa Networks, Ubiquiti, DrayTek, Hikvision, and Linksys. The article advises organizations to patch routers, firewalls, and IoT devices, disable unnecessary exposed administrative interfaces, restrict remote management, replace default credentials, and monitor for unusual outbound scanning from edge devices.\u003c/p\u003e\n"},{"n":10,"title":"Oops, I Weaponized the Database: Abusing AI Features in SQL Server 2025","source":"specterops.io","sourceColorIdx":1,"link":"https://specterops.io/blog/2026/06/10/oops-i-weaponized-the-database-abusing-ai-features-in-mssql-2025/","time":"16:00","priority":"SHOULD READ","score":82,"tldr":"SQL Server 2025’s new AI features can be abused to send HTTPS requests, exfiltrate database and file contents, coerce NTLM authentication, and even build database-native C2 channels. Defenders should tightly restrict these features, monitor external model and REST endpoint usage, and block unexpected SQL Server egress.","briefOverview":"\u003cp\u003eThe article is a technical research write-up on abusing new AI-related features in Microsoft SQL Server 2025. It focuses on \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e, \u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e, and \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e, which allow SQL Server to make HTTPS requests, define external AI embedding models, and generate embeddings through those models. The author argues these features create practical channels for data exfiltration and command-and-control transport from within the database engine.\u003c/p\u003e\n\n\u003cp\u003eThe proof-of-concept examples show database table contents and file contents being sent to an external HTTPS server, including payloads up to the documented 100 MB limit. The article also demonstrates persistent exfiltration through a SQL trigger that sends newly inserted table rows to a remote endpoint. Another technique uses UNC paths with ONNX Runtime external models to coerce NTLM authentication over SMB.\u003c/p\u003e\n\n\u003cp\u003eThe article further shows two C2 implementations built around these features: a simple loop using \u003ccode\u003exp_cmdshell\u003c/code\u003e and a more advanced CLR assembly agent that sends embedding-style traffic. Defensive recommendations include reviewing SQL Server account privileges, auditing \u003ccode\u003exp_cmdshell\u003c/code\u003e, SQL Agent jobs, CLR assemblies, and external model changes, alerting on REST endpoint enablement, restricting SQL Server egress, and baselining legitimate model traffic.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article examines how Microsoft SQL Server 2025’s new AI-enabled features can be weaponized from an offensive security perspective. The author frames SQL Server as a common lateral movement target because it is often over-privileged and under-monitored. The analysis focuses on native AI and integration features that allow the database engine to interact with external services and models.\u003c/p\u003e\n\n\u003cp\u003eThree features receive the main technical attention: \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e, \u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e, and \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e. \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e allows SQL Server to make HTTPS requests to external REST endpoints when enabled, with a documented payload size limit of 100 MB. \u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e defines an external embedding model inside SQL Server, while \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e sends strings to that model and receives JSON vector output.\u003c/p\u003e\n\n\u003cp\u003eThe article demonstrates several data exfiltration techniques using these features. One proof of concept queries a database table, formats the results as JSON, and posts them to an external server. Another uses \u003ccode\u003eOPENROWSET\u003c/code\u003e to read a local file and sends its contents over HTTPS, while a third uses an \u003ccode\u003eAFTER INSERT\u003c/code\u003e trigger to persistently send newly inserted credential rows to a remote endpoint.\u003c/p\u003e\n\n\u003cp\u003eA separate proof of concept shows NTLM SMB coercion through \u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e when UNC paths are provided for ONNX Runtime model locations. The author states this behavior was reported to Microsoft on April 20, 2026, but Microsoft determined on May 12, 2026 that it did not represent a security boundary violation and did not meet the bar for security servicing. The article notes that the coercion primitive remains available for the time being.\u003c/p\u003e\n\n\u003cp\u003eThe article also builds command-and-control channels using the SQL Server 2025 AI features. A simple version registers a C2 server as an external model, polls it using \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e, executes received commands with \u003ccode\u003exp_cmdshell\u003c/code\u003e, and returns output through the same embedding function. A more advanced version uses a .NET CLR assembly loaded into SQL Server, avoids \u003ccode\u003exp_cmdshell\u003c/code\u003e, invokes \u003ccode\u003eCreateProcessW\u003c/code\u003e, and encodes encrypted command traffic to resemble embedding-style data.\u003c/p\u003e\n\n\u003cp\u003eFor defense, the author recommends reducing excessive SQL Server privileges, especially unnecessary \u003ccode\u003esysadmin\u003c/code\u003e rights, and auditing high-risk features such as \u003ccode\u003exp_cmdshell\u003c/code\u003e, SQL Agent jobs, and CLR assemblies. The article also recommends alerting on changes to \u003ccode\u003esys.external_models\u003c/code\u003e, enablement of \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e, and unexpected SQL Server HTTPS egress. It stresses that environments using AI features must understand and baseline legitimate model traffic because egress HTTPS from SQL Server may no longer be a simple indicator of malicious activity.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article is a technical deep dive into abusing new AI-related capabilities introduced in Microsoft SQL Server 2025. Its central claim is that native AI features in SQL Server 2025 provide practical channels for data exfiltration and command-and-control transport inside the database engine itself.\u003c/p\u003e\n\n\u003cp\u003eThe author approaches the topic from an offensive security perspective, noting that SQL Server is frequently useful during engagements because it is often over-privileged and under-monitored. The article assumes, for demonstration purposes, that an attacker has compromised an account with the \u003ccode\u003esysadmin\u003c/code\u003e role on a SQL Server 2025 instance.\u003c/p\u003e\n\n\u003ch2 id=\"sql-server-2025-ai-features-discussed\"\u003eSQL Server 2025 AI Features Discussed\u003c/h2\u003e\n\n\u003cp\u003eThe article focuses on three SQL Server 2025 features that support AI and external model workflows.\u003c/p\u003e\n\n\u003ch3 id=\"sp-invoke-external-rest-endpoint\"\u003e\u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e\u003c/h3\u003e\n\n\u003cp\u003eThe stored procedure \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e allows SQL Server on premises to make requests to external REST endpoints. According to the article, the feature has three main hard requirements:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe stored procedure must be enabled for the SQL Server instance.\u003c/li\u003e\n\u003cli\u003eRequests must use HTTPS.\u003c/li\u003e\n\u003cli\u003eThe remote server must have a verifiable certificate chain.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article highlights that the payload size limit is large enough for abuse, quoting documentation that payloads sent and received over the wire are UTF-8 encoded and limited to 100 MB.\u003c/p\u003e\n\n\u003ch3 id=\"create-external-model\"\u003e\u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e\u003c/h3\u003e\n\n\u003cp\u003eThe \u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e feature allows an external AI embedding model to be defined inside the database engine. The article shows an example where the model definition includes a hosted model URL, an API format such as OpenAI, a model type of embeddings, and a model name.\u003c/p\u003e\n\n\u003cp\u003eThe author explains that this feature is part of SQL Server’s role in supporting AI infrastructure and retrieval-augmented generation workflows.\u003c/p\u003e\n\n\u003ch3 id=\"ai-generate-embeddings\"\u003e\u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e\u003c/h3\u003e\n\n\u003cp\u003eThe \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e function works with a previously defined external model. It sends a string or character type to the defined embedding model and receives a JSON vector array. The article describes this as part of SQL Server 2025’s support for retrieval-augmented generation pipelines.\u003c/p\u003e\n\n\u003ch2 id=\"data-exfiltration-proofs-of-concept\"\u003eData Exfiltration Proofs of Concept\u003c/h2\u003e\n\n\u003cp\u003eThe article presents multiple proof-of-concept exfiltration methods using SQL Server 2025’s new AI-related features.\u003c/p\u003e\n\n\u003ch3 id=\"dumping-database-contents\"\u003eDumping Database Contents\u003c/h3\u003e\n\n\u003cp\u003eThe first exfiltration example enables \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e, queries a table named \u003ccode\u003edbo.app_users\u003c/code\u003e, formats selected fields as JSON, and sends the resulting payload to an external HTTPS endpoint. The article emphasizes that the 100 MB payload limit enables movement of large database contents in chunks.\u003c/p\u003e\n\n\u003ch3 id=\"dumping-file-contents\"\u003eDumping File Contents\u003c/h3\u003e\n\n\u003cp\u003eThe second example combines \u003ccode\u003eOPENROWSET\u003c/code\u003e with \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e. It reads a local file, such as \u003ccode\u003eC:\\Windows\\System32\\drivers\\etc\\hosts\u003c/code\u003e, stores the contents in a variable, and posts the content to a remote HTTPS server. The author notes that this traffic originates from SQL Server rather than from the operator’s C2 agent.\u003c/p\u003e\n\n\u003ch3 id=\"persistent-exfiltration-through-triggers\"\u003ePersistent Exfiltration Through Triggers\u003c/h3\u003e\n\n\u003cp\u003eThe third example uses a SQL trigger for persistent exfiltration. A trigger on \u003ccode\u003edbo.app_users\u003c/code\u003e fires after inserts, selects the inserted \u003ccode\u003eusername\u003c/code\u003e and \u003ccode\u003epassword\u003c/code\u003e values as JSON, and sends them to an external server using \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e. The article presents this as a way to continue collecting newly added credentials without repeatedly sending the full table.\u003c/p\u003e\n\n\u003ch2 id=\"ntlm-smb-coercion\"\u003eNTLM SMB Coercion\u003c/h2\u003e\n\n\u003cp\u003eThe article describes an NTLM SMB coercion technique involving \u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e and ONNX Runtime models. It states that locally hosted ONNX models can be referenced, and that UNC paths can be supplied in place of local filesystem paths.\u003c/p\u003e\n\n\u003cp\u003eThe proof of concept configures support for ONNX Runtime models, defines an external model with attacker-controlled UNC paths in \u003ccode\u003eLOCATION\u003c/code\u003e and \u003ccode\u003eLOCAL_RUNTIME_PATH\u003c/code\u003e, and triggers the model through \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e. SQL Server throws an error when failing to initialize the \u003ccode\u003eAIRuntimeHost\u003c/code\u003e process, but the article states that SMB authentication is still observed by the attacker-controlled SMB capture tool.\u003c/p\u003e\n\n\u003cp\u003eThe author says this coercion primitive was reported to Microsoft on April 20, 2026. Microsoft determined on May 12, 2026 that the behavior did not represent a security boundary violation because of the nature of file path resolution and did not meet the bar for security servicing. The article concludes that this behavior remains present for now.\u003c/p\u003e\n\n\u003ch2 id=\"command-and-control-implementations\"\u003eCommand-and-Control Implementations\u003c/h2\u003e\n\n\u003cp\u003eThe article demonstrates how the AI features can be combined into database-native C2 transport and agent behavior.\u003c/p\u003e\n\n\u003ch3 id=\"simple-c2-using-xp-cmdshell\"\u003eSimple C2 Using \u003ccode\u003exp_cmdshell\u003c/code\u003e\u003c/h3\u003e\n\n\u003cp\u003eThe simple C2 proof of concept enables advanced options, \u003ccode\u003exp_cmdshell\u003c/code\u003e, and external REST endpoints. It then registers a C2 server as an external model and enters a loop that uses \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e to check in with the server.\u003c/p\u003e\n\n\u003cp\u003eThe loop receives queued command instructions from the C2 server, parses special instructions such as \u003ccode\u003eexit\u003c/code\u003e and \u003ccode\u003esleep\u003c/code\u003e, and otherwise executes commands through \u003ccode\u003exp_cmdshell\u003c/code\u003e. Command output is aggregated and sent back through another call to \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e. The article describes this as an 81-line T-SQL query demonstrating C2 channel and agent behavior.\u003c/p\u003e\n\n\u003ch3 id=\"clr-based-c2-agent\"\u003eCLR-Based C2 Agent\u003c/h3\u003e\n\n\u003cp\u003eThe more advanced C2 proof of concept replaces \u003ccode\u003exp_cmdshell\u003c/code\u003e with a .NET CLR assembly loaded into SQL Server. The article explains that the CLR assembly exposes a SQL procedure entry point, uses \u003ccode\u003econtext connection=true\u003c/code\u003e to reuse the in-process SQL session, and calls \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e from inside the CLR code.\u003c/p\u003e\n\n\u003cp\u003eThe CLR agent handles encrypted, encoded, and vector-style beacon messages. It decodes vector data, decrypts instructions, executes commands using P/Invoke and \u003ccode\u003eCreateProcessW\u003c/code\u003e with \u003ccode\u003ecmd.exe /c\u003c/code\u003e, then encrypts and encodes output to resemble embedding-style traffic before sending it through the embedding function.\u003c/p\u003e\n\n\u003cp\u003eThe deployment steps include enabling CLR, disabling CLR strict security, setting the database as trustworthy, creating an external model pointed at the C2 server, loading the CLR assembly from hex bytes with \u003ccode\u003ePERMISSION_SET = UNSAFE\u003c/code\u003e, and exposing it through a stored procedure. The article notes that loading the assembly from hex bytes avoids dropping files to disk.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-recommendations\"\u003eDefensive Recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe article provides several defensive considerations focused on monitoring and controlling the new SQL Server 2025 capabilities.\u003c/p\u003e\n\n\u003ch3 id=\"sql-server-account-review\"\u003eSQL Server Account Review\u003c/h3\u003e\n\n\u003cp\u003eThe author recommends reviewing SQL Server logins and removing \u003ccode\u003esysadmin\u003c/code\u003e permissions where possible. The article specifically notes that web applications often use database connection strings containing accounts with \u003ccode\u003esysadmin\u003c/code\u003e roles even when standard query and write permissions would be sufficient.\u003c/p\u003e\n\n\u003ch3 id=\"audit-high-risk-execution-features\"\u003eAudit High-Risk Execution Features\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends auditing and alerting on usage of:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003exp_cmdshell\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eSQL Agent jobs\u003c/li\u003e\n\u003cli\u003eCLR assemblies\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt provides example Splunk searches for each category. It also notes that SQL Audit or Extended Events with SQL text exposed are needed, because native SQL Server logs do not reliably record each \u003ccode\u003exp_cmdshell\u003c/code\u003e, SQL Agent, or CLR execution.\u003c/p\u003e\n\n\u003ch3 id=\"monitor-external-model-changes\"\u003eMonitor External Model Changes\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends alerting on changes to \u003ccode\u003esys.external_models\u003c/code\u003e, including \u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e, \u003ccode\u003eALTER EXTERNAL MODEL\u003c/code\u003e, and \u003ccode\u003eDROP EXTERNAL MODEL\u003c/code\u003e. It provides a Splunk query to extract model names and actions from SQL text.\u003c/p\u003e\n\n\u003cp\u003eThe author notes that native SQL Server logs do not normally record these statements in a searchable form, so SQL Audit or Extended Events with DDL text exposed are required.\u003c/p\u003e\n\n\u003ch3 id=\"alert-on-rest-endpoint-enablement\"\u003eAlert on REST Endpoint Enablement\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends alerting when \u003ccode\u003eexternal rest endpoint enabled\u003c/code\u003e is configured. It notes that this event is covered by the native SQL Server ERRORLOG.\u003c/p\u003e\n\n\u003ch3 id=\"restrict-sql-server-egress\"\u003eRestrict SQL Server Egress\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends blocking egress traffic from SQL Server to unknown domains. If AI features are being used, the author recommends hosting models within internal network IP space and blocking all internet-bound traffic from SQL Server.\u003c/p\u003e\n\n\u003ch3 id=\"baseline-model-traffic\"\u003eBaseline Model Traffic\u003c/h3\u003e\n\n\u003cp\u003eThe article emphasizes that defenders should understand and baseline legitimate model traffic. It compares the proof-of-concept CLR C2 traffic with legitimate embedding traffic and argues that untrained analysts may not be able to distinguish the two. The author recommends training analysts and security tools on expected traffic patterns so anomalies can surface.\u003c/p\u003e\n\n\u003ch2 id=\"significance-and-impact\"\u003eSignificance and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main significance is that SQL Server 2025’s AI features normalize outbound HTTPS traffic from the database engine. The author argues that this complicates detection because defenders have historically treated egress web traffic from a database engine as a strong indicator of malicious activity.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights the 100 MB REST request payload limit as a serious abuse opportunity. According to the author, a determined threat actor could use asynchronous queries to exfiltrate and reassemble large volumes of data.\u003c/p\u003e\n\n\u003cp\u003eThe closing argument is that many of the demonstrated abuses use the new features largely as intended. The author states that organizations typically do not alert on intended feature usage and that security teams will need supplementary controls, monitoring, and baselines to defend against abuse of AI-enabled software features.\u003c/p\u003e\n","keyPoints":["SQL Server 2025 introduces AI-related features including sp_invoke_external_rest_endpoint, CREATE EXTERNAL MODEL, and AI_GENERATE_EMBEDDINGS for integrating the database engine with external models, embedding generation, and API-driven model orchestration.","The article demonstrates that sp_invoke_external_rest_endpoint can be used to exfiltrate database table contents and files over HTTPS in payloads up to 100 MB.","The article shows that a SQL trigger can call sp_invoke_external_rest_endpoint after inserts to persistently send newly added table data to an external server.","The article describes how CREATE EXTERNAL MODEL with UNC paths for ONNX Runtime models can coerce NTLM authentication over SMB from SQL Server.","The article demonstrates proof-of-concept C2 channels using SQL Server 2025 AI features, including a simple xp_cmdshell-based loop and a CLR assembly agent that sends embedding-style traffic."],"insights":["The new REST endpoint feature requires HTTPS and a verifiable certificate chain, but the article emphasizes that these controls do not prevent abuse because attackers can still use trusted certificates and send payloads up to 100 MB.","The ONNX Runtime UNC path behavior was reported to Microsoft, but Microsoft determined it did not meet the bar for security servicing, meaning defenders should not expect a vendor patch to remove that NTLM coercion primitive.","The article highlights that SQL Server egress over HTTPS may no longer be a simple malicious indicator in environments using AI features, forcing defenders to inspect SQL ac
