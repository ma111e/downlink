g passkeys and protecting biometric data. It says passkeys use FIDO2 and WebAuthn standards with public-key cryptography so passwords are not transmitted across the network, but notes that passwords are still often used for account recovery or device changes. For biometrics, it recommends avoiding raw biometric data storage, using encrypted biometric templates, performing authentication locally on trusted devices where feasible, and considering privacy-preserving techniques such as homomorphic encryption.\u003c/p\u003e\n\n\u003cp\u003eThe article is sponsored and written by Specops Software and includes commercial references to Specops offerings. It promotes Specops Password Policy for Active Directory password security, Specops Secure Service Desk for helpdesk verification workflows, and Specops Verified ID for government document scanning and biometric liveness detection. The closing section invites readers to contact Specops or book a demo to see its solutions in action.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article presents five best practices for secure identity verification in response to rising credential theft and increasingly sophisticated attacks. It states that credential theft surged by 160% in 2025 and contributed to one in five data breaches as attackers used AI-driven attacks to bypass traditional defenses.\u003c/p\u003e\n\n\u003cp\u003eThe central argument is that organizations must verify identities securely while avoiding unnecessary friction for legitimate users. The article identifies weak onboarding processes, overreliance on static credentials, and inconsistent authentication policies as weaknesses attackers can exploit.\u003c/p\u003e\n\n\u003cp\u003eThe article is sponsored and written by Specops Software. It combines best-practice guidance with references to Specops products for password policy enforcement, service desk verification, and high-risk identity verification workflows.\u003c/p\u003e\n\n\u003ch2 id=\"core-recommendations\"\u003eCore recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe article outlines five main practices for strengthening identity verification:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUse strong, fatigue-resistant multi-factor authentication.\u003c/li\u003e\n\u003cli\u003eSecure the service desk from social engineering.\u003c/li\u003e\n\u003cli\u003eBring device trust into identity verification decisions.\u003c/li\u003e\n\u003cli\u003eConsider using passkeys.\u003c/li\u003e\n\u003cli\u003eProtect biometric data.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese practices are framed as ways to strengthen access controls across organizational networks and improve cyber resilience.\u003c/p\u003e\n\n\u003ch2 id=\"strong-fatigue-resistant-mfa\"\u003eStrong, fatigue-resistant MFA\u003c/h2\u003e\n\n\u003cp\u003eThe article says multi-factor authentication remains one of the most effective ways to reduce account compromise. It explains that MFA verifies users through two or more factors from different categories:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSomething the user knows, such as a password or PIN.\u003c/li\u003e\n\u003cli\u003eSomething the user has, such as a smartphone, authenticator app, or hardware security key.\u003c/li\u003e\n\u003cli\u003eSomething the user is, such as a fingerprint or facial scan.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article cites NIST guidance to state that MFA is strongest when it combines factors from separate categories. It says a password paired with a hardware token or authenticator app provides stronger protection than multiple knowledge-based factors such as passwords and security questions.\u003c/p\u003e\n\n\u003cp\u003eThe article also warns that MFA can still be exploited if implemented weakly. It specifically identifies prompt bombing and SIM swapping as attacks against weaker MFA implementations.\u003c/p\u003e\n\n\u003cp\u003eTo improve MFA resilience, the article recommends that organizations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMove away from legacy SMS or email-based one-time passcodes, which it describes as more vulnerable to interception, phishing, and social engineering.\u003c/li\u003e\n\u003cli\u003ePrioritize phishing-resistant MFA methods such as FIDO2 security keys, passkeys, and certificate-based authentication.\u003c/li\u003e\n\u003cli\u003eUse authenticator apps that generate local one-time passcodes rather than push-based approval prompts where appropriate.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"service-desk-social-engineering-risks\"\u003eService desk social engineering risks\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies helpdesks as frequent targets for social engineering because they sit at the intersection of identity, access, and urgent user requests. It says attackers commonly impersonate employees to convince support staff to provide access to accounts, typically through reset requests.\u003c/p\u003e\n\n\u003cp\u003eIt also notes that these attacks are becoming more sophisticated. Threat actors may use AI-enabled deepfake audio or publicly available information to make support requests appear legitimate.\u003c/p\u003e\n\n\u003cp\u003eThe article cites Marks and Spencer and Clorox as high-profile examples in which service desk compromise was the first step toward ransomware deployment or broader lateral movement. For Marks and Spencer, it states that the attack led to a five-day suspension of sales, with average daily losses of £3.8 million.\u003c/p\u003e\n\n\u003cp\u003eThe article says the problem is often not a lack of security tools, but inconsistent identity verification during high-pressure support interactions.\u003c/p\u003e\n\n\u003ch2 id=\"specops-service-desk-products\"\u003eSpecops service desk products\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Specops Secure Service Desk as a specialized solution that embeds secure identity verification directly into helpdesk workflows. According to the article, this requires users to verify their identities through trusted authentication methods before password resets, MFA changes, or other sensitive actions can be completed.\u003c/p\u003e\n\n\u003cp\u003eIt says this helps support teams handle requests securely and reduces the risk that attackers bypass controls through social engineering.\u003c/p\u003e\n\n\u003cp\u003eFor especially high-risk actions, the article describes Specops Verified ID as adding government document scanning and biometric liveness detection to identity verification workflows. It says this additional layer can help organizations mitigate the risk of impersonation attacks leading to account takeover.\u003c/p\u003e\n\n\u003ch2 id=\"device-trust-in-identity-verification\"\u003eDevice trust in identity verification\u003c/h2\u003e\n\n\u003cp\u003eThe article states that modern identity verification cannot rely on credentials alone. It says attackers may steal session cookies and MFA tokens, making it harder to distinguish legitimate users from compromised accounts based only on login details.\u003c/p\u003e\n\n\u003cp\u003eTo address this, the article recommends bringing device trust into authentication and access decisions. It says device trust helps security teams verify not just who is logging in, but what device they are logging in from.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several device trust signals that access policies can evaluate:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhether the device is corporate-managed or unmanaged.\u003c/li\u003e\n\u003cli\u003eOperating system version and patch status.\u003c/li\u003e\n\u003cli\u003ePresence of endpoint protection or EDR tools.\u003c/li\u003e\n\u003cli\u003eDevice certificates or cryptographic identifiers.\u003c/li\u003e\n\u003cli\u003eBrowser reputation and session integrity.\u003c/li\u003e\n\u003cli\u003eSigns of compromise, malware, rooting, or jailbreaking.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article explains that these signals add context to identity verification workflows. A login from a recognized, compliant device on a corporate network may require minimal friction, while the same credentials used from an unmanaged device or suspicious IP range could trigger step-up authentication, restricted access, or a blocked session.\u003c/p\u003e\n\n\u003ch2 id=\"passkeys-and-passwordless-authentication\"\u003ePasskeys and passwordless authentication\u003c/h2\u003e\n\n\u003cp\u003eThe article says many organizations are looking beyond passwords, even though MFA significantly reduces the risk of compromised credentials. It identifies passkeys as one of the most widely adopted passwordless options.\u003c/p\u003e\n\n\u003cp\u003ePasskeys are described as being built on FIDO2 and WebAuthn standards. The article says they use public-key cryptography to authenticate users without transmitting passwords across the network.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the private key remains securely stored on the user’s device. This makes passkeys resistant to phishing, credential theft, and password reuse attacks.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that passkeys can reduce friction because users do not need to remember or rotate passwords. However, it states that passkeys are not yet a complete replacement for passwords.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that organizations often still rely on passwords as fallback authentication methods, especially during account recovery or when users switch devices. Because of that, it says strong password policies and phishing-resistant MFA remain important wherever passwords are still in use.\u003c/p\u003e\n\n\u003ch2 id=\"biometric-data-protection\"\u003eBiometric data protection\u003c/h2\u003e\n\n\u003cp\u003eThe article says biometric authentication, including fingerprint scans, facial recognition, and voice verification, can strengthen identity verification when implemented properly. However, it emphasizes that biometric data cannot be reset like a password if it is compromised.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends avoiding storage of raw biometric data wherever possible. Instead, it says organizations should store encrypted biometric templates and perform authentication locally on trusted devices where feasible.\u003c/p\u003e\n\n\u003cp\u003eIt also mentions privacy-preserving technologies in high-security environments. One example it gives is homomorphic encryption, which can allow biometric matching without exposing the underlying biometric data.\u003c/p\u003e\n\n\u003ch2 id=\"cited-data-and-external-references\"\u003eCited data and external references\u003c/h2\u003e\n\n\u003cp\u003eThe article cites several sources and examples to support its guidance:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt states that credential theft surged by 160% in 2025, linking this claim to ITPro.\u003c/li\u003e\n\u003cli\u003eIt cites Verizon’s Data Breach Investigation Report for the statement that credential theft contributed to one in five data breaches.\u003c/li\u003e\n\u003cli\u003eIt separately states that Verizon’s report found stolen credentials are involved in 44.7% of breaches.\u003c/li\u003e\n\u003cli\u003eIt references NIST guidance on MFA factor categories and MFA strength.\u003c/li\u003e\n\u003cli\u003eIt cites Marks and Spencer and Clorox as examples of breaches where service desk compromise played a major role.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"sponsored-and-commercial-elements\"\u003eSponsored and commercial elements\u003c/h2\u003e\n\n\u003cp\u003eThe article includes a promotional section for Specops Password Policy, which it says can secure Active Directory with compliant password policies, block more than 4 billion compromised passwords, boost security, and reduce support issues.\u003c/p\u003e\n\n\u003cp\u003eIt also promotes Specops Secure Service Desk and Specops Verified ID as products that support secure identity verification workflows. The article ends by encouraging readers to contact Specops or book a demo.\u003c/p\u003e\n\n\u003cp\u003eThe article explicitly states that it is sponsored and written by Specops Software.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that organizations should modernize identity verification by combining phishing-resistant MFA, secure helpdesk verification, device trust, passkeys, and careful biometric data protection. It frames these controls as necessary because attackers increasingly target credentials, authentication workflows, and service desk processes rather than relying only on traditional technical exploits.\u003c/p\u003e\n","keyPoints":["Credential theft surged by 160% in 2025 and contributed to one in five data breaches as attackers used AI-driven attacks to bypass traditional defenses.","The article recommends strong, fatigue-resistant multi-factor authentication, especially phishing-resistant methods such as FIDO2 security keys, passkeys, or certificate-based authentication instead of legacy SMS or email one-time passcodes.","Helpdesks are frequent social engineering targets, and the article says secure identity verification should be embedded into service desk workflows before password resets, MFA changes, or other sensitive actions are completed.","Device trust can add context to identity verification by evaluating signals such as whether a device is corporate-managed, patched, protected by EDR tools, or showing signs of compromise.","The article says passkeys can reduce phishing, credential theft, and password reuse risks, but passwords often remain necessary as fallback authentication methods during account recovery or device changes."],"insights":["The article highlights that MFA strength depends not only on adding a second factor, but on avoiding fatigue-prone or interceptable methods such as push approvals, SMS, and email-based OTPs.","Service desk identity checks are presented as a critical control point because attackers can bypass existing security tools by exploiting inconsistent verification during urgent support interactions.","Device trust is positioned as a way to reduce friction for legitimate users while increasing scrutiny for risky sessions, such as logins from unmanaged devices or suspicious IP ranges.","The article notes that passkeys reduce password-related risks but do not eliminate the need for strong password policies because passwords often remain in use for recovery and device transitions.","Biometric authentication creates a distinct risk because compromised biometric data cannot be reset, making encrypted templates and local authentication especially important."],"referencedReports":[{"title":"2025 Data Breach Investigations Report","url":"https://www.verizon.com/business/resources/reports/2025-dbir-data-breach-investigations-report.pdf","publisher":"Verizon","context":"The article cites Verizon’s report to state that credential theft contributed to one in five data breaches and that stolen credentials are involved in 44.7% of breaches.","category":"","primary":false}],"body":"\u003cp\u003eCredential theft surged by 160% in 2025 and contributed to one in five data breaches, according to the article. It says attackers are using AI-driven attacks to bypass traditional defenses, making secure identity verification a core part of cyber resilience. The article presents five best practices for strengthening identity verification while limiting friction for legitimate users.\u003c/p\u003e\n\n\u003cp\u003eThe recommendations include strong, fatigue-resistant multi-factor authentication, secure service desk verification, device trust signals, passkeys, and stronger protection for biometric data. The article emphasizes phishing-resistant MFA methods such as FIDO2 security keys, passkeys, and certificate-based authentication, while warning against weaker SMS or email-based one-time passcodes. It also highlights helpdesk social engineering as a major risk during password resets, MFA changes, and other sensitive support actions.\u003c/p\u003e\n\n\u003cp\u003eThe article is sponsored and written by Specops Software and includes several Specops product references. It describes Specops Secure Service Desk, Specops Verified ID, and Specops Password Policy as tools for improving identity verification, securing helpdesk workflows, and strengthening Active Directory password policies. It also cites examples including Marks and Spencer and Clorox, where service desk compromise was described as an early step toward ransomware deployment or broader lateral movement.\u003c/p\u003e\n"},{"n":5,"title":"Ivanti, Fortinet, and SAP Release Patches for Multiple Critical Vulnerabilities","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/ivanti-fortinet-and-sap-release-patches.html","time":"15:10","priority":"MAY READ","score":40,"tldr":"Fortinet, Ivanti, and SAP released patches for multiple critical vulnerabilities, including unauthenticated remote code execution, command injection, authentication bypass, and SAP platform flaws. Organizations using affected FortiSandbox, Ivanti Sentry, and SAP products should update promptly, though no active exploitation has been reported.","briefOverview":"\u003cp\u003eFortinet, Ivanti, and SAP released security updates for multiple critical vulnerabilities that could lead to arbitrary code execution and information disclosure. The affected products include FortiSandbox offerings, Ivanti Sentry, SAP NetWeaver AS ABAP and ABAP Platform, SAP Commerce Cloud, SAP Data Hub, and SAP NetWeaver Application Server Java. The article says there is no evidence that any of the listed flaws have been exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eFortinet patched CVE-2026-25089, a CVSS 9.1 command injection vulnerability in FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI. Fortinet said unauthenticated attackers could execute unauthorized commands through specially crafted HTTP requests. Ivanti fixed two critical Ivanti Sentry flaws, including CVE-2026-10520, which allows unauthenticated root-level remote code execution, and CVE-2026-10523, which allows unauthenticated attackers to create administrative accounts.\u003c/p\u003e\n\n\u003cp\u003eSAP issued fixes for four critical vulnerabilities, including an XML signature wrapping issue in SAML authentication, a memory corruption flaw in Application Server ABAP, a potential Spring security vulnerability, and a directory traversal flaw in SAP NetWeaver Application Server Java. Onapsis said the SAML issue could allow an authenticated user with normal privileges to send modified signed XML documents with tampered identity information. The article recommends updating affected products to the latest versions for optimal protection.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eFortinet, Ivanti, and SAP released patches for several critical security vulnerabilities affecting enterprise products. The flaws could result in arbitrary code execution and information disclosure, according to the article. The affected technologies include FortiSandbox, Ivanti Sentry, and multiple SAP platforms and applications. The article states that none of the mentioned vulnerabilities are known to have been exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eFortinet addressed CVE-2026-25089, a command injection vulnerability with a CVSS score of 9.1. The flaw affects FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI. Fortinet said the issue is caused by improper neutralization of special elements used in an OS command and may allow an unauthenticated attacker to execute unauthorized commands using specifically crafted HTTP requests. Affected FortiSandbox versions include 5.0.0 through 5.0.5 and 4.4.0 through 4.4.8, with upgrades available to fixed versions.\u003c/p\u003e\n\n\u003cp\u003eIvanti published fixes for two critical vulnerabilities in Ivanti Sentry, formerly MobileIron Sentry. CVE-2026-10520 has a CVSS score of 10.0 and is an operating system command injection vulnerability that allows a remote unauthenticated user to achieve root-level remote code execution before versions R10.5.2, R10.6.2, and R10.7.1. CVE-2026-10523 has a CVSS score of 9.9 and is an authentication bypass vulnerability that allows a remote unauthenticated attacker to create arbitrary administrative accounts and obtain full administrative access. watchTowr Labs said CVE-2026-10520 could be exploited through a specially crafted HTTP request to the \u0026ldquo;/mics/api/v2/sentry/mics-config/handleMessage\u0026rdquo; endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe Ivanti patch added controls that block access to the vulnerable endpoint, causing unauthenticated requests to be redirected to the login page. Security researcher Sonny Macdonald said Ivanti added authentication in front of the vulnerable execution path, making the endpoint significantly more difficult to reach. The article does not name any threat actors associated with these vulnerabilities. It also does not report any confirmed exploitation or victim impact beyond the potential effects described for the flaws.\u003c/p\u003e\n\n\u003cp\u003eSAP released fixes for four critical vulnerabilities affecting NetWeaver AS ABAP and ABAP Platform, SAP Commerce Cloud, SAP Data Hub, and SAP NetWeaver Application Server Java. These include CVE-2026-44748, an XML signature wrapping vulnerability in SAML authentication; CVE-2026-27671, a memory corruption flaw in Application Server ABAP; CVE-2026-22732, a potential Spring security vulnerability; and CVE-2026-40128, a directory traversal vulnerability in the NetWeaver Application Server Java Web Container. Onapsis said the SAML issue could allow an authenticated attacker with normal privileges to obtain a valid signed message and send modified signed XML documents with tampered identity information. For CVE-2026-27671, the article says an unauthenticated attacker can send a crafted RFC request that exploits SAP kernel RFC protocol validation to achieve memory corruption.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eFortinet, Ivanti, and SAP released security updates addressing multiple critical vulnerabilities across enterprise security and business application platforms. The article says these vulnerabilities could result in arbitrary code execution and information disclosure. The affected products include FortiSandbox, FortiSandbox Cloud, FortiSandbox PaaS, Ivanti Sentry, SAP NetWeaver AS ABAP and ABAP Platform, SAP Commerce Cloud, SAP Data Hub, and SAP NetWeaver Application Server Java.\u003c/p\u003e\n\n\u003cp\u003eThe article states that there is no evidence that any of the described flaws have been exploited in the wild. It recommends updating to the latest versions for optimal protection.\u003c/p\u003e\n\n\u003ch2 id=\"fortinet-cve-2026-25089\"\u003eFortinet: CVE-2026-25089\u003c/h2\u003e\n\n\u003cp\u003eFortinet patched a critical command injection vulnerability tracked as CVE-2026-25089. The flaw has a CVSS score of 9.1 and affects FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI.\u003c/p\u003e\n\n\u003cp\u003eFortinet described the issue as an improper neutralization of special elements used in an OS command vulnerability, classified as CWE-78. According to Fortinet, the flaw may allow an unauthenticated attacker to execute unauthorized commands through specifically crafted HTTP requests.\u003c/p\u003e\n\n\u003cp\u003eAffected Fortinet products and upgrade paths listed in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFortiSandbox 5.0.0 through 5.0.5, with an upgrade to 5.0.6 or above.\u003c/li\u003e\n\u003cli\u003eFortiSandbox 4.4.0 through 4.4.8, with an upgrade to 4.4.9 or above.\u003c/li\u003e\n\u003cli\u003eFortiSandbox Cloud 5.0.4 through 5.0.5, with an upgrade to 5.0.6 or above.\u003c/li\u003e\n\u003cli\u003eFortiSandbox PaaS 5.0.4 through 5.0.5, with an upgrade to 5.0.6 or above.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"ivanti-two-critical-ivanti-sentry-flaws\"\u003eIvanti: Two Critical Ivanti Sentry Flaws\u003c/h2\u003e\n\n\u003cp\u003eIvanti published fixes for two critical vulnerabilities affecting Ivanti Sentry, formerly known as MobileIron Sentry. The affected versions are those before R10.5.2, R10.6.2, and R10.7.1.\u003c/p\u003e\n\n\u003cp\u003eThe first vulnerability is CVE-2026-10520, which has a CVSS score of 10.0. It is an operating system command injection vulnerability that allows a remote unauthenticated user to achieve root-level remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe second vulnerability is CVE-2026-10523, which has a CVSS score of 9.9. It is an authentication bypass vulnerability that allows a remote unauthenticated attacker to create arbitrary administrative accounts and obtain full administrative access.\u003c/p\u003e\n\n\u003ch2 id=\"watchtowr-labs-analysis-of-cve-2026-10520\"\u003ewatchTowr Labs Analysis of CVE-2026-10520\u003c/h2\u003e\n\n\u003cp\u003ewatchTowr Labs published additional details about CVE-2026-10520. According to the article, watchTowr Labs said an attacker could exploit the vulnerability by issuing a specially crafted HTTP request to the following endpoint:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e/mics/api/v2/sentry/mics-config/handleMessage\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe request is interpreted as a MICS configuration command and executed by a backend component named \u003ccode\u003ehandleExecute()\u003c/code\u003e. The article says Ivanti’s patch added controls that block access to the vulnerable endpoint. As a result, unauthenticated requests are redirected to the login page.\u003c/p\u003e\n\n\u003cp\u003eSecurity researcher Sonny Macdonald said Ivanti did not only remove attacker control over the vulnerable execution path. He said the company also added a layer of protection in front of it by adding authentication, making the endpoint significantly more difficult to reach.\u003c/p\u003e\n\n\u003ch2 id=\"sap-four-critical-vulnerabilities\"\u003eSAP: Four Critical Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eSAP released fixes for four critical vulnerabilities affecting NetWeaver AS ABAP and ABAP Platform, SAP Commerce Cloud, SAP Data Hub, and SAP NetWeaver Application Server Java.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities listed in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-44748, with a CVSS score of 9.9, an XML signature wrapping vulnerability in SAML authentication in SAP NetWeaver AS ABAP and ABAP Platform.\u003c/li\u003e\n\u003cli\u003eCVE-2026-27671, with a CVSS score of 9.8, a memory corruption vulnerability in Application Server ABAP of SAP NetWeaver and ABAP Platform.\u003c/li\u003e\n\u003cli\u003eCVE-2026-22732, with a CVSS score of 9.1, a potential Spring security vulnerability within SAP Commerce Cloud and SAP Data Hub.\u003c/li\u003e\n\u003cli\u003eCVE-2026-40128, with a CVSS score of 9.0, a directory traversal vulnerability in SAP NetWeaver Application Server Java Web Container.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"sap-saml-authentication-issue\"\u003eSAP SAML Authentication Issue\u003c/h2\u003e\n\n\u003cp\u003eOnapsis described the SAP SAML-related issue as one in which an authenticated attacker with normal privileges can obtain a valid signed message and send modified signed XML documents containing tampered identity information to the verifier. Due to improper XML signature verification, the manipulated identity information is accepted.\u003c/p\u003e\n\n\u003cp\u003eAccording to Onapsis, this can lead to unauthorized access to sensitive user data and potential disruption of normal system usage.\u003c/p\u003e\n\n\u003ch2 id=\"sap-rfc-memory-corruption-issue\"\u003eSAP RFC Memory Corruption Issue\u003c/h2\u003e\n\n\u003cp\u003eFor CVE-2026-27671, the article says an unauthenticated attacker can send a crafted RFC request. The request exploits how the SAP kernel validates the RFC protocol and can lead to memory corruption.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-status-and-response\"\u003eExploitation Status and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article states that there is no evidence that any of the vulnerabilities have been exploited in the wild. It presents the vendor updates as the primary response and says it is a safe practice to update to the latest version for optimal protection.\u003c/p\u003e\n\n\u003cp\u003eNo threat actors are identified in connection with the vulnerabilities. No confirmed incidents, victims, or exploitation campaigns are described in the article.\u003c/p\u003e\n","keyPoints":["Fortinet patched CVE-2026-25089, a CVSS 9.1 command injection vulnerability in FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI that could allow unauthenticated attackers to execute unauthorized commands via crafted HTTP requests.","Ivanti released fixes for CVE-2026-10520, a CVSS 10.0 operating system command injection flaw in Ivanti Sentry that allows remote unauthenticated root-level code execution before versions R10.5.2, R10.6.2, and R10.7.1.","Ivanti also fixed CVE-2026-10523, a CVSS 9.9 authentication bypass vulnerability in Ivanti Sentry that allows remote unauthenticated attackers to create arbitrary administrative accounts and gain full administrative access before versions R10.5.2, R10.6.2, and R10.7.1.","SAP issued fixes for four critical vulnerabilities affecting NetWeaver AS ABAP and ABAP Platform, SAP Commerce Cloud, SAP Data Hub, and SAP NetWeaver Application Server Java.","The article states there is no evidence that any of the listed vulnerabilities have been exploited in the wild."],"insights":["Ivanti’s fix for CVE-2026-10520 did more than remove attacker control over the vulnerable execution path; it added authentication in front of the previously reachable endpoint to redirect unauthenticated requests to the login page.","The Ivanti Sentry issues are especially actionable because one flaw enables unauthenticated root-level code execution while another allows unauthenticated creation of administrative accounts in the same product line before versions R10.5.2, R10.6.2, and R10.7.1.","The SAP SAML issue can be exploited by an authenticated user with normal privileges who obtains a valid signed message and modifies signed XML documents to tamper with identity information.","SAP’s CVE-2026-27671 does not require authentication, as an attacker can send a crafted RFC request that abuses SAP kernel RFC protocol validation to trigger memory corruption."],"referencedReports":[{"title":"FG-IR-26-141","url":"https://fortiguard.fortinet.com/psirt/FG-IR-26-141","publisher":"Fortinet","context":"The article cites Fortinet's PSIRT advisory for details on CVE-2026-25089 affecting FortiSandbox products.","category":"","primary":false},{"title":"Security Advisory Ivanti Sentry CVE-2026-10520 CVE-2026-10523","url":"https://hub.ivanti.com/s/article/Security-Advisory-Ivanti-Sentry-CVE-2026-10520-CVE-2026-10523?language=en_US","publisher":"Ivanti","context":"The article references Ivanti's security advisory for fixes to two critical Ivanti Sentry vulnerabilities.","category":"","primary":false},{"title":"More Evidence That Words Don't Mean What We Thought They Meant: Ivanti Sentry Pre-Auth OS Command Injection CVE-2026-10520","url":"https://labs.watchtowr.com/more-evidence-that-words-dont-mean-what-we-thought-they-meant-ivanti-sentry-pre-auth-os-command-injection-cve-2026-10520/","publisher":"watchTowr Labs","context":"The article cites watchTowr Labs' technical analysis for additional details on exploiting CVE-2026-10520 in Ivanti Sentry.","category":"","primary":false},{"title":"SAP Security Notes News: June 2026","url":"https://support.sap.com/en/my-support/knowledge-base/security-notes-news/june-2026.html","publisher":"SAP","context":"The article cites SAP's June 2026 security notes as the source for fixes to critical SAP vulnerabilities.","category":"","primary":false},{"title":"SAP Security Patch Day June 2026","url":"https://onapsis.com/blog/sap-security-patch-day-june-2026/","publisher":"Onapsis","context":"The article quotes Onapsis' analysis describing the SAP XML signature verification issue and its impact.","category":"","primary":false}],"body":"\u003cp\u003eFortinet, Ivanti, and SAP released security updates for multiple critical vulnerabilities that could lead to arbitrary code execution and information disclosure. The affected products include FortiSandbox offerings, Ivanti Sentry, SAP NetWeaver AS ABAP and ABAP Platform, SAP Commerce Cloud, SAP Data Hub, and SAP NetWeaver Application Server Java. The article says there is no evidence that any of the listed flaws have been exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eFortinet patched CVE-2026-25089, a CVSS 9.1 command injection vulnerability in FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI. Fortinet said unauthenticated attackers could execute unauthorized commands through specially crafted HTTP requests. Ivanti fixed two critical Ivanti Sentry flaws, including CVE-2026-10520, which allows unauthenticated root-level remote code execution, and CVE-2026-10523, which allows unauthenticated attackers to create administrative accounts.\u003c/p\u003e\n\n\u003cp\u003eSAP issued fixes for four critical vulnerabilities, including an XML signature wrapping issue in SAML authentication, a memory corruption flaw in Application Server ABAP, a potential Spring security vulnerability, and a directory traversal flaw in SAP NetWeaver Application Server Java. Onapsis said the SAML issue could allow an authenticated user with normal privileges to send modified signed XML documents with tampered identity information. The article recommends updating affected products to the latest versions for optimal protection.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>

    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function numberedList(items, accent) {
  return (
    <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>

  );
}

  if (!keyPoints || keyPoints.length === 0) return null;
  return (
    <div style={{ marginTop: 18 }}>

    </ul>
  );
}

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <select value={theme} onChange={(e) => applyTheme(e.target.value)} title="Select theme" aria-label="Select theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <SourceTag article={article} />
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <CardTitle>{article.title}</CardTitle>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
        <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <div style={{ marginBottom: 12 }}>
          <CardTitle>{article.title}</CardTitle>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <SourceTag article={article} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
