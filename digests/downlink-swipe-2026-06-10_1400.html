tivity and traffic content rather than relying only on network destination or protocol.","The CLR-based C2 proof of concept shows that malicious traffic can be shaped to resemble embedding model traffic, making analyst training and baselining of legitimate model requests an important defensive requirement.","Native SQL Server logs do not reliably record every xp_cmdshell, SQL Agent, CLR, or external model action, so the article recommends SQL Audit or Extended Events with SQL text exposed for meaningful detection."],"referencedReports":[],"body":"\u003cp\u003eThe article is a technical research write-up on abusing new AI-related features in Microsoft SQL Server 2025. It focuses on \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e, \u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e, and \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e, which allow SQL Server to make HTTPS requests, define external AI embedding models, and generate embeddings through those models. The author argues these features create practical channels for data exfiltration and command-and-control transport from within the database engine.\u003c/p\u003e\n\n\u003cp\u003eThe proof-of-concept examples show database table contents and file contents being sent to an external HTTPS server, including payloads up to the documented 100 MB limit. The article also demonstrates persistent exfiltration through a SQL trigger that sends newly inserted table rows to a remote endpoint. Another technique uses UNC paths with ONNX Runtime external models to coerce NTLM authentication over SMB.\u003c/p\u003e\n\n\u003cp\u003eThe article further shows two C2 implementations built around these features: a simple loop using \u003ccode\u003exp_cmdshell\u003c/code\u003e and a more advanced CLR assembly agent that sends embedding-style traffic. Defensive recommendations include reviewing SQL Server account privileges, auditing \u003ccode\u003exp_cmdshell\u003c/code\u003e, SQL Agent jobs, CLR assemblies, and external model changes, alerting on REST endpoint enablement, restricting SQL Server egress, and baselining legitimate model traffic.\u003c/p\u003e\n"},{"n":4,"title":"Cyberattack shuts down major Australian sugar mills, disrupting harvest","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/cyberattack-shuts-down-major-australian-sugar-producer","time":"15:18","priority":"SHOULD READ","score":78,"tldr":"A cyberattack forced Mackay Sugar to shut down two major mills in Queensland, halting cane harvesting in one of Australia’s largest sugar-growing regions. The company is investigating with cybersecurity experts and authorities but has not disclosed the type of attack or whether data was compromised.","briefOverview":"\u003cp\u003eA cyberattack disrupted sugar production in Queensland’s Mackay region, one of Australia’s largest cane-growing areas. Mackay Sugar said the incident affected parts of its operations and forced the shutdown of its Farleigh and Racecourse mills. As a result, growers were instructed to stop harvesting sugarcane until further notice.\u003c/p\u003e\n\n\u003cp\u003eMackay Sugar said it engaged cybersecurity experts and local authorities to investigate the incident and restore systems safely. The company implemented temporary measures to keep essential operations running and reduce disruption. It did not disclose the nature of the cyberattack, whether data was compromised, or whether ransomware or another form of malicious activity was involved.\u003c/p\u003e\n\n\u003cp\u003eThe disruption affected milling and cane haulage at two facilities that had only recently begun the annual crushing season. Growers in the Marian district were not affected because Mackay Sugar’s third mill was not scheduled to begin operations until the following week. Mackay Sugar operates three mills, generates more than $420 million in annual revenue, and supplies raw sugar to domestic and export markets.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA cyberattack disrupted Mackay Sugar, Australia’s second-largest sugar producer, and forced two major mills in Queensland’s Mackay region to shut down. The affected facilities were the Farleigh and Racecourse mills, where sugar milling and cane haulage operations were suspended. The incident brought harvesting operations to a halt in one of Australia’s largest cane-growing regions.\u003c/p\u003e\n\n\u003cp\u003eMackay Sugar said it was responding to a cybersecurity incident affecting parts of its operations. The company engaged cybersecurity experts and local authorities to investigate the attack and restore its systems safely. It also said it had implemented temporary measures to keep essential operations running and minimize disruption.\u003c/p\u003e\n\n\u003cp\u003eCanegrowers Mackay, which represents local sugarcane farmers, said Mackay Sugar instructed growers early Wednesday morning to cease harvesting immediately. The organization said harvesting should not resume until further communication comes directly from the company. Both affected mills had only recently begun the annual sugarcane crushing season.\u003c/p\u003e\n\n\u003cp\u003eThe company did not disclose the nature of the cyberattack. It also did not say whether any data had been compromised or whether ransomware or another form of malicious activity was involved. No threat actor was identified in the article.\u003c/p\u003e\n\n\u003cp\u003eGrowers in the Marian district were unaffected because Mackay Sugar’s third mill was not scheduled to begin operations until the following week. Mackay Sugar operates three mills and generates annual revenue of more than $420 million. The company supplies raw sugar to domestic customers and export markets including South Korea, Indonesia, Japan and Malaysia.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA cyberattack disrupted sugar production in Queensland’s Mackay region, one of Australia’s largest cane-growing regions. Mackay Sugar, Australia’s second-largest sugar producer, said it was responding to a cybersecurity incident affecting parts of its operations. The incident forced the shutdown of the company’s Farleigh and Racecourse mills and halted harvesting operations.\u003c/p\u003e\n\n\u003ch2 id=\"affected-operations\"\u003eAffected Operations\u003c/h2\u003e\n\n\u003cp\u003eThe shutdown affected two Mackay Sugar facilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFarleigh mill\u003c/li\u003e\n\u003cli\u003eRacecourse mill\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCanegrowers Mackay said sugar milling and cane haulage operations at both mills had been suspended. Both facilities had only recently begun the annual sugarcane crushing season when the disruption occurred.\u003c/p\u003e\n\n\u003ch2 id=\"impact-on-growers\"\u003eImpact on Growers\u003c/h2\u003e\n\n\u003cp\u003eCanegrowers Mackay, which represents local sugarcane farmers, said Mackay Sugar instructed growers to stop harvesting early Wednesday morning. The organization said Mackay Sugar asked for all harvesting to cease immediately and not resume until further communication comes directly from the company.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the shutdown brought harvesting operations to a halt in the affected area. Growers in the Marian district were not affected because Mackay Sugar’s third mill was not scheduled to begin operations until the following week.\u003c/p\u003e\n\n\u003ch2 id=\"company-response\"\u003eCompany Response\u003c/h2\u003e\n\n\u003cp\u003eMackay Sugar said it engaged cybersecurity experts and local authorities to investigate the incident. The company said it was working to restore affected systems safely. It also said it had implemented temporary measures to keep essential operations running and minimize disruption.\u003c/p\u003e\n\n\u003cp\u003eMackay Sugar said it was communicating with employees, growers, and business partners. The company said it would provide further updates as more information becomes available.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-disclosed\"\u003eTechnical Details Disclosed\u003c/h2\u003e\n\n\u003cp\u003eThe article provides limited technical detail about the incident. Mackay Sugar did not disclose:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe nature of the cyberattack\u003c/li\u003e\n\u003cli\u003eWhether any data had been compromised\u003c/li\u003e\n\u003cli\u003eWhether ransomware was involved\u003c/li\u003e\n\u003cli\u003eWhether another form of malicious activity was involved\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eNo threat actor, malware family, vulnerability, or attack technique was identified in the article.\u003c/p\u003e\n\n\u003ch2 id=\"business-context\"\u003eBusiness Context\u003c/h2\u003e\n\n\u003cp\u003eMackay Sugar operates three mills and generates annual revenue of more than $420 million. The company supplies raw sugar to domestic customers and export markets. The export markets named in the article include South Korea, Indonesia, Japan, and Malaysia.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe incident is significant because it affected both digital systems and physical agricultural operations. The cyberattack led to mill shutdowns, suspended cane haulage, and stopped harvesting by growers. The disruption occurred at the start of the annual crushing season for the affected mills, increasing the immediate operational impact described in the article.\u003c/p\u003e\n","keyPoints":["A cyberattack disrupted Mackay Sugar’s operations and forced the shutdown of its Farleigh and Racecourse mills in Queensland’s Mackay region.","Canegrowers Mackay said Mackay Sugar instructed growers to stop harvesting sugarcane immediately until further communication from the company.","Mackay Sugar said it engaged cybersecurity experts and local authorities to investigate the incident and safely restore affected systems.","The company said it implemented temporary measures to keep essential operations running and minimize disruption while restoration work continues.","Mackay Sugar did not disclose the nature of the cyberattack, whether any data was compromised, or whether ransomware or another form of malicious activity was involved."],"insights":["The disruption extended beyond Mackay Sugar’s internal systems to physical agricultural operations, with growers told to stop harvesting until the company provides further communication.","The incident occurred just after the Farleigh and Racecourse mills had begun the annual sugarcane crushing season, increasing its immediate operational impact.","The Marian district avoided immediate disruption because Mackay Sugar’s third mill was not scheduled to start operations until the following week.","Mackay Sugar’s response emphasized safe restoration of affected systems, indicating the company was prioritizing controlled recovery over quickly resuming milling operations."],"referencedReports":[],"body":"\u003cp\u003eA cyberattack disrupted sugar production in Queensland’s Mackay region, one of Australia’s largest cane-growing areas. Mackay Sugar said the incident affected parts of its operations and forced the shutdown of its Farleigh and Racecourse mills. As a result, growers were instructed to stop harvesting sugarcane until further notice.\u003c/p\u003e\n\n\u003cp\u003eMackay Sugar said it engaged cybersecurity experts and local authorities to investigate the incident and restore systems safely. The company implemented temporary measures to keep essential operations running and reduce disruption. It did not disclose the nature of the cyberattack, whether data was compromised, or whether ransomware or another form of malicious activity was involved.\u003c/p\u003e\n\n\u003cp\u003eThe disruption affected milling and cane haulage at two facilities that had only recently begun the annual crushing season. Growers in the Marian district were not affected because Mackay Sugar’s third mill was not scheduled to begin operations until the following week. Mackay Sugar operates three mills, generates more than $420 million in annual revenue, and supplies raw sugar to domestic and export markets.\u003c/p\u003e\n"},{"n":11,"title":"Socket Partners with Replit to Block Malicious Packages in AI-Powered Development","source":"socket.dev","sourceColorIdx":2,"link":"https://socket.dev/blog/socket-partners-with-replit-to-block-malicious-packages?utm_medium=feed","time":"17:18","priority":"MAY READ","score":55,"tldr":"Socket has partnered with Replit to integrate Socket Firewall into Replit’s AI-powered development workflow, blocking malicious or suspicious open source packages at install time. The goal is to protect builders from supply chain threats such as typosquatting, credential stealers, malicious transitive dependencies, and install-time payloads before they run.","briefOverview":"\u003cp\u003eSocket has partnered with Replit to integrate Socket Firewall into Replit’s AI-powered development experience. The article says developers are no longer the only ones choosing dependencies because AI agents can now recommend, install, and wire open source packages into applications. The integration is presented as a way to move dependency security closer to the moment packages are selected and installed.\u003c/p\u003e\n\n\u003cp\u003eSocket Firewall evaluates open source packages as they are introduced into the build. The article says it is intended to help stop typosquatted and impersonated packages, malicious transitive dependencies, install scripts that fetch second-stage payloads, credential stealers, and packages tied to known malicious infrastructure. Socket says placing threat intelligence directly in the install path can help block supply chain attacks before malicious packages run.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the partnership as a response to fast-moving attacks against open source packages that can cause damage during installation. It emphasizes that AI-assisted development amplifies dependency risk when agents are empowered to pull in dependencies automatically. Replit CEO Amjad Masad is quoted saying Replit and Socket are putting security in the building loop so builders can stay protected while creating software.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSocket announced that Socket Firewall is now built into Replit’s AI-powered development experience. The article describes Replit as a platform that gives millions of builders a faster path from idea to working software. It says the way software is built is changing because AI agents can now recommend, install, and wire open source packages into applications as part of the build process.\u003c/p\u003e\n\n\u003cp\u003eThe stated purpose of the integration is to move dependency security closer to package selection and installation. Socket Firewall evaluates open source packages as they are introduced into the build. The article says this is meant to help stop attacks that do not wait for code review.\u003c/p\u003e\n\n\u003cp\u003eThe specific threats named in the article include typosquatted and impersonated packages, malicious transitive dependencies, install scripts that fetch second-stage payloads, credential stealers, and packages tied to known malicious infrastructure. Socket says it has seen a relentless wave of fast-moving attacks against open source packages. The article emphasizes that some malicious packages can do serious damage during installation, before manual review can occur.\u003c/p\u003e\n\n\u003cp\u003eThe affected or involved parties identified in the article are Socket, Replit, and Replit users. Socket says its threat intelligence is being placed directly in the install path to help builders move fast while blocking supply chain attacks. Replit CEO Amjad Masad is quoted as saying attackers are racing to take advantage of the speed of modern software creation and that the companies are putting security in the building loop.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify any specific threat actor, campaign, CVE, or disclosed compromise. It presents the partnership as a protective response to open source supply chain risk in AI-assisted development. The final message is that the answer is not to slow builders down, but to embed security into the tools they already use.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSocket announced a partnership with Replit to integrate Socket Firewall into Replit’s AI-powered development experience. The article frames the integration as a response to changes in how software is built, especially the increasing role of AI agents in recommending, installing, and wiring open source dependencies into applications.\u003c/p\u003e\n\n\u003cp\u003eReplit is described as a platform that gives millions of builders a faster path from idea to working software. Socket says that as more development happens inside AI-powered workflows, dependency security needs to move closer to the point where packages are selected and installed.\u003c/p\u003e\n\n\u003ch2 id=\"core-event\"\u003eCore Event\u003c/h2\u003e\n\n\u003cp\u003eSocket Firewall is now built into the Replit experience. The article says the integration evaluates open source packages as they are introduced into a build.\u003c/p\u003e\n\n\u003cp\u003eThe stated goal is to stop malicious or risky packages before they can run in the build environment. Socket says this is especially important because some attacks do not wait for code review and can cause damage during installation.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-mentioned\"\u003eTechnical Details Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several types of threats that Socket Firewall is intended to help block:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTyposquatted packages.\u003c/li\u003e\n\u003cli\u003eImpersonated packages.\u003c/li\u003e\n\u003cli\u003eMalicious transitive dependencies.\u003c/li\u003e\n\u003cli\u003eInstall scripts that fetch second-stage payloads.\u003c/li\u003e\n\u003cli\u003eCredential stealers.\u003c/li\u003e\n\u003cli\u003ePackages tied to known malicious infrastructure.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSocket says its threat intelligence is being placed directly in the install path. The article presents this as a way to prevent supply chain attacks before malicious packages run in the build environment.\u003c/p\u003e\n\n\u003ch2 id=\"ai-assisted-development-context\"\u003eAI-Assisted Development Context\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that AI-assisted development changes dependency risk because developers are not always the only ones choosing dependencies. It says AI agents can recommend, install, and wire open source packages into applications as part of the build process.\u003c/p\u003e\n\n\u003cp\u003eThis creates a need for security controls at the moment dependencies are introduced. The article says the risk is amplified when agents are empowered to pull in dependencies automatically while completing tasks.\u003c/p\u003e\n\n\u003ch2 id=\"significance-for-open-source-supply-chain-security\"\u003eSignificance for Open Source Supply Chain Security\u003c/h2\u003e\n\n\u003cp\u003eThe article states that open source makes modern software possible, but also gives attackers a direct path into the development process. Socket says it has seen a relentless wave of fast-moving attacks against open source packages.\u003c/p\u003e\n\n\u003cp\u003eA central point in the article is that malicious packages may do damage during installation, before manual review can take place. For that reason, the article argues that security should be embedded in the install path rather than relying only on later review.\u003c/p\u003e\n\n\u003ch2 id=\"stakeholders\"\u003eStakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe main organizations discussed are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSocket, which provides Socket Firewall and threat intelligence.\u003c/li\u003e\n\u003cli\u003eReplit, which is integrating Socket Firewall into its AI-powered development workflow.\u003c/li\u003e\n\u003cli\u003eReplit users and builders, who are the intended beneficiaries of the protection.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article includes a quote from Replit CEO Amjad Masad, who says software is being created faster than at any moment in history and that attackers are racing to take advantage. He describes the partnership as putting security in the building loop and blocking malicious code before it runs.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-response\"\u003eDisclosed Impact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article does not describe a specific breach, compromise, named campaign, threat actor, CVE, or victim incident. Instead, it presents the integration as a proactive response to malicious open source package activity and AI-assisted dependency selection.\u003c/p\u003e\n\n\u003cp\u003eSocket’s stated response is to embed its threat intelligence directly into Replit’s package installation workflow. The article says this approach is intended to help builders continue shipping quickly while blocking supply chain attacks.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that Socket Firewall is being integrated into Replit to evaluate open source dependencies at install time in AI-powered development workflows. The partnership is positioned as a way to block malicious packages before they run, while allowing builders to keep working quickly inside the tools they already use.\u003c/p\u003e\n","keyPoints":["Socket Firewall is now built into Replit’s AI-powered development experience to evaluate open source packages as they are introduced into builds.","The integration is intended to block threats such as typosquatted and impersonated packages, malicious transitive dependencies, install scripts that fetch second-stage payloads, credential stealers, and packages tied to known malicious infrastructure.","The article says AI agents can now recommend, install, and wire open source packages into applications as part of the build process.","Socket says its threat intelligence is being placed directly in the install path to help stop malicious packages before they run in the build environment.","Replit CEO Amjad Masad said Replit and Socket are putting security in the building loop to protect builders while they create software."],"insights":["Dependency security is being shifted from later review stages into the package selection and installation path because some malicious packages can cause damage during installation before manual review occurs.","AI-assisted development changes the threat model because agents may automatically pull in dependencies while completing tasks, making package-level controls more important at the moment dependencies are introduced.","The partnership emphasizes blocking malicious behavior without slowing builders down by embedding protection inside the development tools users already use."],"referencedReports":[],"body":"\u003cp\u003eSocket has partnered with Replit to integrate Socket Firewall into Replit’s AI-powered development experience. The article says developers are no longer the only ones choosing dependencies because AI agents can now recommend, install, and wire open source packages into applications. The integration is presented as a way to move dependency security closer to the moment packages are selected and installed.\u003c/p\u003e\n\n\u003cp\u003eSocket Firewall evaluates open source packages as they are introduced into the build. The article says it is intended to help stop typosquatted and impersonated packages, malicious transitive dependencies, install scripts that fetch second-stage payloads, credential stealers, and packages tied to known malicious infrastructure. Socket says placing threat intelligence directly in the install path can help block supply chain attacks before malicious packages run.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the partnership as a response to fast-moving attacks against open source packages that can cause damage during installation. It emphasizes that AI-assisted development amplifies dependency risk when agents are empowered to pull in dependencies automatically. Replit CEO Amjad Masad is quoted saying Replit and Socket are putting security in the building loop so builders can stay protected while creating software.\u003c/p\u003e\n"},{"n":12,"title":"Best Practices for Managing Third-Party Identity and  Access Management","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/best-practices-for-managing-third-party-identity-and-access-management/","time":"16:57","priority":"MAY READ","score":55,"tldr":"Health-ISAC released a white paper outlining best practices for managing third-party identity and access in healthcare, where vendors and partners often require remote access to networked systems and medical devices. The key takeaway is that healthcare organizations must tightly manage third-party accounts, roles, and privileges to reduce IAM-related risk.","briefOverview":"\u003cp\u003eHealth-ISAC has released \u003cem\u003eBest Practices for Managing Third-Party Identity and Access Management\u003c/em\u003e, the 12th white paper in its ongoing series for CISOs on Identity and Access Management. The paper focuses on managing vendors, partners, and other third parties appropriately to minimize risk to healthcare organizations. It is positioned as a resource for the health sector, where third-party support is needed across a wide range of systems and use cases.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that healthcare environments are complex, combining complicated facilities, third-party maintenance needs, government-like security requirements, and many devices that depend on outside parties for maintenance. Many healthcare systems and devices contain microprocessors, connect to networks, and require remote access by third parties. As a result, third-party IAM involves more than creating accounts and must include managing access, roles, and privileges for the necessary systems.\u003c/p\u003e\n\n\u003cp\u003eThe white paper is described as breaking down the challenges of third-party IAM and defining best practices for health sector organizations to mitigate threats to third-party IAM systems. It also uses real-world scenarios to show how those best practices can be applied. The article invites readers to read or download the white paper.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eHealth-ISAC announced the release of \u003cem\u003eBest Practices for Managing Third-Party Identity and Access Management\u003c/em\u003e. The document is the 12th white paper in an ongoing series for CISOs on Identity and Access Management. The article presents the paper as guidance for healthcare organizations that need to manage vendors, partners, and other third parties to minimize risk.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the health sector as unusually complex. It states that healthcare organizations have more complicated facilities and third-party maintenance issues than most retailers. It also says they have security requirements similar to government organizations and an array of devices dependent on third parties for maintenance that would rival manufacturing.\u003c/p\u003e\n\n\u003cp\u003eA central technical concern in the article is that many healthcare systems and devices are not simply physical tools or standalone equipment. The article says many systems and devices used in healthcare contain microprocessors and typically connect to a network. Because of that, third parties often require remote access to perform maintenance or support.\u003c/p\u003e\n\n\u003cp\u003eThe article stresses that third-party IAM issues go beyond provisioning a new account in a directory. It says accounts must be managed so they enable access to necessary systems with appropriate roles and privileges. The article also notes that this can be challenging depending on an organization’s IT infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe white paper is described as addressing three main areas. It will break down the challenges of third-party IAM, define best practices for health sector organizations to mitigate threats to third-party IAM systems, and use real-world scenarios to explain how the practices apply. No specific threat actor, incident, breach, or disclosed impact is identified in the article.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eHealth-ISAC has released \u003cem\u003eBest Practices for Managing Third-Party Identity and Access Management\u003c/em\u003e. The article identifies it as the 12th white paper in an ongoing series for CISOs on Identity and Access Management. The stated focus is on helping healthcare organizations manage vendors, partners, and other third parties appropriately to minimize risk.\u003c/p\u003e\n\n\u003cp\u003eThe article is not about a specific incident, breach, vulnerability, or named threat actor. Instead, it introduces a white paper focused on third-party IAM challenges and best practices in the healthcare sector.\u003c/p\u003e\n\n\u003ch2 id=\"healthcare-context\"\u003eHealthcare Context\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the health sector as a complex environment with broad third-party support needs. It states that healthcare organizations have:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMore complicated facilities and third-party maintenance issues than most retailers.\u003c/li\u003e\n\u003cli\u003eSecurity requirements that match government organizations.\u003c/li\u003e\n\u003cli\u003eAn array of devices reliant on third parties for maintenance that would rival manufacturing.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article uses this comparison to explain why healthcare organizations need support from third parties across many different use cases.\u003c/p\u003e\n\n\u003ch2 id=\"third-party-access-challenge\"\u003eThird-Party Access Challenge\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that third-party support in healthcare is often more complex than an individual physically maintaining equipment. Many healthcare systems and devices contain microprocessors and typically connect to a network. Because of that, third parties may require remote access to support or maintain those systems and devices.\u003c/p\u003e\n\n\u003cp\u003eThis creates IAM concerns that go beyond basic account creation. The article states that third-party IAM is more than provisioning a new account in a directory. Accounts must be managed to provide access to the necessary systems with appropriate roles and privileges.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that this can be challenging depending on the organization’s IT infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"scope-of-the-white-paper\"\u003eScope of the White Paper\u003c/h2\u003e\n\n\u003cp\u003eThe white paper is described as focusing on third-party identity and access management for health sector organizations. According to the article, the paper will:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBreak down the challenges of third-party IAM.\u003c/li\u003e\n\u003cli\u003eDefine best practices for health sector organizations to mitigate threats to third-party IAM systems.\u003c/li\u003e\n\u003cli\u003eUse real-world scenarios to show how the best practices can be applied.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-parties-and-stakeholders\"\u003eAffected Parties and Stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe stakeholders identified in the article include healthcare organizations, vendors, partners, and other third parties. The paper is aimed at CISOs and health sector organizations dealing with third-party access needs. It also addresses environments where systems and devices are maintained or supported by third parties.\u003c/p\u003e\n\n\u003ch2 id=\"technical-and-operational-significance\"\u003eTechnical and Operational Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main technical point is that healthcare third-party IAM must account for networked systems and devices that require remote access. This means healthcare organizations need to manage not only whether a third party has an account, but also which systems the account can access and what roles and privileges it receives.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this as a risk-management issue for healthcare organizations. It presents appropriate third-party IAM as a way to mitigate threats to third-party IAM systems and reduce organizational risk.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-or-response\"\u003eDisclosed Impact or Response\u003c/h2\u003e\n\n\u003cp\u003eNo specific incident impact, compromise, or threat actor activity is disclosed in the article. The response described is the publication of the Health-ISAC white paper and the invitation for readers to read or download it.\u003c/p\u003e\n","keyPoints":["Health-ISAC released Best Practices for Managing Third-Party Identity and Access Management as the 12th white paper in its ongoing IAM series for CISOs.","The paper focuses on the need to appropriately manage vendors, partners, and other third parties to minimize risk to healthcare organizations.","Healthcare organizations rely on third parties for a wide range of use cases involving complex facilities, maintenance needs, security requirements, and connected devices.","Many healthcare systems and devices contain microprocessors and connect to networks, which often requires remote access by third parties.","The paper aims to break down third-party IAM challenges, define best practices for mitigating threats, and use real-world scenarios to show how those practices can be applied."],"insights":["The article frames healthcare third-party IAM as unusually complex because healthcare organizations combine complicated facilities, government-level security requirements, and large numbers of third-party-maintained networked devices.","A key actionable point is that third-party access management must go beyond creating directory accounts and include controlling the specific systems, roles, and privileges each account can use.","The article highlights remote third-party access as a central risk area because many healthcare systems and devices contain microprocessors and connect to networks.","The white paper is intended to connect best practices to real-world healthcare scenarios through use cases rather than addressing third-party IAM only at a policy level."],"referencedReports":[],"body":"\u003cp\u003eHealth-ISAC has released \u003cem\u003eBest Practices for Managing Third-Party Identity and Access Management\u003c/em\u003e, the 12th white paper in its ongoing series for CISOs on Identity and Access Management. The paper focuses on managing vendors, partners, and other third parties appropriately to minimize risk to healthcare organizations. It is positioned as a resource for the health sector, where third-party support is needed across a wide range of systems and use cases.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that healthcare environments are complex, combining complicated facilities, third-party maintenance needs, government-like security requirements, and many devices that depend on outside parties for maintenance. Many healthcare systems and devices contain microprocessors, connect to networks, and require remote access by third parties. As a result, third-party IAM involves more than creating accounts and must include managing access, roles, and privileges for the necessary systems.\u003c/p\u003e\n\n\u003cp\u003eThe white paper is described as breaking down the challenges of third-party IAM and defining best practices for health sector organizations to mitigate threats to third-party IAM systems. It also uses real-world scenarios to show how those best practices can be applied. The article invites readers to read or download the white paper.\u003c/p\u003e\n"},{"n":3,"title":"Zero Trust for AI Agents: How to Enforce Anthropic's Framework","source":"varonis.com","sourceColorIdx":9,"link":"https://www.varonis.com/blog/zero-trust-for-ai-agents","time":"17:43","priority":"MAY READ","score":52,"tldr":"Anthropic’s Zero Trust framework for AI agents is useful, but the article argues enforcement must include data-layer controls because agents can amplify existing overexposure. Varonis positions its Atlas platform as a way to discover, assess, monitor, and enforce guardrails for AI systems with data context.","briefOverview":"\u003cp\u003eAnthropic’s whitepaper argues that perimeter-based cybersecurity defenses are no longer sufficient and that AI agents require a Zero Trust approach. The article summarizes Anthropic’s six-pillar framework for Zero Trust for AI agents, covering agent identity, task-scoped access, observability, behavioral monitoring, input and output controls, and integrity and recovery. It says AI agents can bypass application controls and connect directly to databases, APIs, and data stores at machine speed.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the main challenge is not the framework itself, but enforcement across heterogeneous AI environments. It argues that AI does not create entirely new data risks but amplifies existing ones, especially excessive permissions and overexposed sensitive data. It positions data context as essential because an authenticated and authorized agent can still access large volumes of sensitive records if the underlying data layer is exposed.\u003c/p\u003e\n\n\u003cp\u003eVaronis presents Atlas as an AI Security Platform designed to enforce Zero Trust for AI agents across discovery, posture assessment, runtime guardrails, governance, monitoring, detection and response, and AI penetration testing. The article says Atlas combines AI security controls with the Varonis Data Security Platform to provide classification, identity, sensitivity, compliance evidence, and data lineage. Its central takeaway is that Zero Trust for AI agents requires securing both agent behavior and the data those agents can reach.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article discusses Anthropic’s whitepaper on Zero Trust for AI agents, which opens by stating that perimeter-based cybersecurity defenses cannot keep up with modern threats. It says this concern has become more urgent because AI accelerates social engineering and exposes the blast radius of compromised identities. AI agents are described as bypassing application controls by connecting directly to databases, APIs, and data stores and accessing information at machine speed.\u003c/p\u003e\n\n\u003cp\u003eAnthropic’s framework is presented as a new application of the long-standing Zero Trust philosophy: trust nothing, verify everything, and assume breach. The article lists six pillars in the framework: agent identity and authentication, access control and privilege management, observability and auditing, behavioral monitoring and response, input validation and output controls, and integrity and recovery. It also notes that Anthropic maps the pillars into maturity tiers and outlines an implementation workflow covering identity, access scoping, sandboxing, input and output controls, and memory safeguards.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies several AI-agent-specific threats from Anthropic’s framework, including prompt injection, tool poisoning, identity and privilege abuse, memory poisoning, and supply chain attacks. It states that these risks are not theoretical and cites attack flows like “Reprompt” and an AI attack lab demonstrating how chatbot and agent behavior can be redirected to perform unauthorized actions. No specific threat actor is identified in the article.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that Anthropic’s framework defines what organizations should do, but that enforcement is the critical challenge. It says the security industry has often responded to AI risk with prompt filters, model scanners, and standalone inventories, but that these approaches focus on the AI layer and miss the data layer. The article’s stated view is that the data layer is where damage occurs when agents inherit excessive permissions or access overexposed sensitive information.\u003c/p\u003e\n\n\u003cp\u003eVaronis positions Atlas as a platform for enforcing Zero Trust for AI agents. The article says Atlas discovers AI systems and shadow AI, assesses agent and model posture through AI-SPM, enforces runtime guardrails through an AI Gateway, supports compliance and third-party risk management, monitors AI activity, and conducts AI penetration testing. It says Atlas goes further by using data context from the Varonis Data Security Platform, including classification, identity, sensitivity, compliance evidence, and data lineage.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article examines Anthropic’s whitepaper on Zero Trust for AI agents and argues that the framework is sound but must be enforced with data-layer context. It begins from Anthropic’s claim that perimeter-based cybersecurity defenses cannot keep up with modern threats, especially as AI accelerates attacker capabilities and expands the practical impact of compromised identities.\u003c/p\u003e\n\n\u003cp\u003eThe article states that social engineering has replaced malware as a common attack method and that stolen credentials are a factor in 86% of breaches. It then connects this problem to AI agents, which can bypass application controls and connect directly to databases, APIs, and data stores at machine speed.\u003c/p\u003e\n\n\u003ch2 id=\"anthropic-s-zero-trust-framework\"\u003eAnthropic’s Zero Trust Framework\u003c/h2\u003e\n\n\u003cp\u003eThe article summarizes Anthropic’s application of Zero Trust to agentic systems. It describes the core Zero Trust philosophy as “trust nothing, verify everything, assume breach has already occurred,” and says Anthropic adapts that philosophy for AI agents through cryptographically rooted identities, task-scoped permissions, protected memory, and defensive operations that can run at the speed of autonomous attackers.\u003c/p\u003e\n\n\u003cp\u003eAnthropic’s framework is organized around six pillars:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAgent identity and authentication:\u003c/strong\u003e Agents should have verifiable proof of what they are, who deployed them, and what they are authorized to do.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAccess control and privilege management:\u003c/strong\u003e Permissions should be scoped per individual task rather than retained across interactions.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eObservability and auditing:\u003c/strong\u003e Agent behavior, tool calls, and data access should be comprehensively logged and monitored.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBehavioral monitoring and response:\u003c/strong\u003e Agent actions should be continuously analyzed for anomalous, malicious, or noncompliant patterns at machine speed.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eInput validation and output controls:\u003c/strong\u003e Agent boundaries should include defenses against prompt injection, tool poisoning, and data leakage.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIntegrity and recovery:\u003c/strong\u003e Agent memory should be protected against poisoning, and systems should be able to recover from compromise.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also says Anthropic maps these pillars into three maturity tiers: Foundation, Advanced, and Optimized. It says the whitepaper outlines an eight-phase implementation workflow covering identity, access scoping, sandboxing, input and output controls, and memory safeguards.\u003c/p\u003e\n\n\u003ch2 id=\"threats-highlighted-in-the-article\"\u003eThreats Highlighted in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several threats that Anthropic identifies as specific to AI agents or especially relevant in agentic environments. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePrompt injection\u003c/li\u003e\n\u003cli\u003eTool poisoning\u003c/li\u003e\n\u003cli\u003eIdentity and privilege abuse\u003c/li\u003e\n\u003cli\u003eMemory poisoning\u003c/li\u003e\n\u003cli\u003eSupply chain attacks\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these risks are not theoretical because frontier AI models can already chain multiple weaknesses and produce working exploits in hours. It also references “Reprompt” as an attack flow used to turn AI systems against the organizations that deploy them.\u003c/p\u003e\n\n\u003cp\u003eThe article further cites an AI attack lab run by Varonis AI attack specialist Abdiel Santos, which demonstrated how chatbot and agent behavior can be redirected to perform unauthorized actions. No named threat actor, victim organization, or real-world breach is described.\u003c/p\u003e\n\n\u003ch2 id=\"enforcement-as-the-central-issue\"\u003eEnforcement as the Central Issue\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main argument is that Anthropic’s framework explains what should be done, but organizations still need a way to enforce it across complex AI environments. It says AI security requires a different approach because AI amplifies existing data risks rather than creating entirely new ones.\u003c/p\u003e\n\n\u003cp\u003eA key example in the article is excessive permissions. Permissions that were dormant or only theoretically dangerous can become critical when an agent inherits them and can search, reason over, and act on accessible data in seconds.\u003c/p\u003e\n\n\u003cp\u003eThe article criticizes early AI security responses such as prompt filters, model scanners, and standalone inventories. It says those tools may address the AI layer, but they miss the data layer, which the article describes as where the damage happens.\u003c/p\u003e\n\n\u003ch2 id=\"varonis-atlas-mapping-to-the-framework\"\u003eVaronis Atlas Mapping to the Framework\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Varonis Atlas as a complete AI Security Platform intended to enforce Zero Trust for AI agents. It maps Atlas capabilities to the lifecycle of AI security and to Anthropic’s framework.\u003c/p\u003e\n\n\u003ch3 id=\"discover\"\u003eDiscover\u003c/h3\u003e\n\n\u003cp\u003eThe article says Atlas continuously discovers AI systems across cloud, SaaS, code repositories, and AI platforms. It also says this includes shadow AI and creates a living inventory of agents, models, and their data access.\u003c/p\u003e\n\n\u003cp\u003eThe article frames discovery as foundational because posture cannot be assessed, monitoring cannot be performed, and governance cannot be applied to systems that are not visible.\u003c/p\u003e\n\n\u003ch3 id=\"assess\"\u003eAssess\u003c/h3\u003e\n\n\u003cp\u003eThe article says Atlas AI Security Posture Management assesses agents, chatbots, and models for vulnerabilities, misconfigurations, and risky data exposure. It argues that the key difference is data context.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, knowing that an agent can access SharePoint is less meaningful than knowing that it can access millions of sensitive records. This data context is presented as what turns posture assessment into real risk assessment.\u003c/p\u003e\n\n\u003ch3 id=\"enforce\"\u003eEnforce\u003c/h3\u003e\n\n\u003cp\u003eThe article says Atlas enforces real-time guardrails through an AI Gateway in the request path. This gateway inspects prompts, responses, and agent actions before they reach models or downstream systems.\u003c/p\u003e\n\n\u003cp\u003eThe article says these controls can block sensitive data exposure and unsafe behavior without requiring changes to underlying applications. It also states that Atlas can understand execution flow and tool chains, allowing it to go beyond keyword filtering and address indirect leakage and tool-chaining attacks.\u003c/p\u003e\n\n\u003ch3 id=\"govern\"\u003eGovern\u003c/h3\u003e\n\n\u003cp\u003eThe article says Atlas maps AI systems to frameworks such as the EU AI Act and NIST AI RMF. It says this mapping uses audit-ready evidence from live activity, posture findings, and runtime logs.\u003c/p\u003e\n\n\u003cp\u003eThe article also says Atlas supports third-party AI risk management by assessing vendors through inventories, questionnaires, and AI Bills of Materials.\u003c/p\u003e\n\n\u003ch3 id=\"monitor\"\u003eMonitor\u003c/h3\u003e\n\n\u003cp\u003eThe article says Atlas provides visibility into production AI behavior by capturing prompts, responses, agent actions, and data access. It also says AI Detection and Response identifies unsafe or malicious behavior in real time.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Atlas can alert, block, and integrate with SIEM and SOAR workflows to support machine-speed response.\u003c/p\u003e\n\n\u003ch3 id=\"test\"\u003eTest\u003c/h3\u003e\n\n\u003cp\u003eThe article says Atlas continuously tests AI systems using adversarial prompts and real-world attack simulations. It specifically mentions prompt injection and jailbreaks.\u003c/p\u003e\n\n\u003cp\u003eThe article says results from this testing feed directly into guardrails and policies, creating a loop from testing to protection.\u003c/p\u003e\n\n\u003ch2 id=\"importance-of-data-context\"\u003eImportance of Data Context\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that Zero Trust for AI agents requires data context. It says Anthropic’s framework addresses agent behavior, identity, and access control, but leaves the data layer to implementers.\u003c/p\u003e\n\n\u003cp\u003eThe article gives the example of an agent that can pass Zero Trust controls by being authenticated, authorized, scoped, and monitored, while still accessing four million customer records because the underlying data is overexposed.\u003c/p\u003e\n\n\u003cp\u003eVaronis argues that Atlas provides data context because it is built on the Varonis Data Security Platform. The article says this enables posture assessment with real data context, guardrails informed by classification, monitoring enriched with identity and sensitivity, and compliance evidence that includes data lineage.\u003c/p\u003e\n\n\u003ch2 id=\"central-takeaway\"\u003eCentral Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s core message is that Anthropic’s Zero Trust framework provides a strong model for securing AI agents, but practical enforcement requires controls that cover both AI behavior and the data those agents can access. Varonis positions Atlas as the enforcement layer for this approach by combining AI discovery, posture management, runtime controls, monitoring, testing, governance, and data security context.\u003c/p\u003e\n","keyPoints":["Anthropic’s Zero Trust for AI Agents framework is organized around six pillars: agent identity and authentication, access control and privilege management, observability and auditing, behavioral monitoring and response, input validation and output controls, and integrity and recovery.","The article says AI agents increase security risk by bypassing application controls and connecting directly to databases, APIs, and data stores at machine speed.","Anthropic identifies prompt injection, tool poisoning, identity and privilege abuse, memory poisoning, and supply chain attacks as threats that make agents different from traditional IT systems.","The article argues that enforcing Zero Trust for AI agents requires data-layer context because an authenticated and authorized agent can still access overexposed sensitive data.","Varonis says its Atlas platform supports Zero Trust enforcement for AI agents through discovery, AI security posture management, runtime guardrails, governance, monitoring, detection and response, and AI penetration testing."],"insights":["Zero Trust controls for AI agents can still fail to reduce blast radius if the underlying data permissions are excessive, because a properly authenticated and scoped agent may still reach large volumes of sensitive records.","The article treats data context as the differentiator between basic AI posture assessment and meaningful risk assessment, since knowing an agent can access a platform is less useful than knowing what sensitive data it can reach there.","Runtime guardrails are presented as more effective when placed in the request path, where prompts, responses, and agent actions can be inspected before they reach models or downstream systems.","The article argues that AI security controls limited to prompt filters, model scanners, and inventories miss the layer where harm occurs: the data layer accessed by agents.","Continuous adversarial testing is positioned as part of enforcement rather than a separate validation activity, because test results can feed directly back into guardrails and policies."],"referencedReports":[{"title":"Zero Trust for AI Agents","url":"https://cdn.prod.website-files.com/6889473510b50328dbb70ae6/6a1611a04085d7cd3dadc924_Claude-eBook-Zero-Trust-for-AI-Agents-05182026.pdf","publisher":"Anthropic","context":"The article builds on Anthropic’s whitepaper outlining a Zero Trust framework for AI agents and uses it as the basis for discussing enforcement requirements.","category":"","primary":false}],"body":"\u003cp\u003eAnthropic’s whitepaper argues that perimeter-based cybersecurity defenses are no longer sufficient and that AI agents require a Zero Trust approach. The article summarizes Anthropic’s six-pillar framework for Zero Trust for AI agents, covering agent identity, task-scoped access, observability, behavioral monitoring, input and output controls, and integrity and recovery. It says AI agents can bypass application controls and connect directly to databases, APIs, and data stores at machine speed.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the main challenge is not the framework itself, but enforcement across heterogeneous AI environments. It argues that AI does not create entirely new data risks but amplifies existing ones, especially excessive permissions and overexposed sensitive data. It positions data context as essential because an authenticated and authorized agent can still access large volumes of sensitive records if the underlying data layer is exposed.\u003c/p\u003e\n\n\u003cp\u003eVaronis presents Atlas as an AI Security Platform designed to enforce Zero Trust for AI agents across discovery, posture assessment, runtime guardrails, governance, monitoring, detection and response, and AI penetration testing. The article says Atlas combines AI security controls with the Varonis Data Security Platform to provide classification, identity, sensitivity, compliance evidence, and data lineage. Its central takeaway is that Zero Trust for AI agents requires securing both agent behavior and the data those agents can reach.\u003c/p\u003e\n"},{"n":9,"title":"Your Zero Trust Policy Has an AI Agent Problem","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/your-zero-trust-policy-has-an-ai-agent-problem","time":"17:33","priority":"MAY READ","score":48,"tldr":"The article argues that traditional zero trust controls are not enough for autonomous AI agents because threats like prompt injection, MCP tool abuse, and app-to-LLM API traffic can occur after valid authentication and outside normal inspection paths. Its key takeaway is that organizations need visibility and policy enforcement specifically for non-human AI identities and agent-to-tool communications.","briefOverview":"\u003cp\u003eThe article argues that many zero trust deployments were built around human access patterns, where a user authenticates, a device posture check occurs, and policy evaluates context before granting or denying access. It says AI agents do not fit that model because they authenticate once and then operate autonomously by calling APIs, reading data, invoking tools, and communicating with other agents or systems. The main significance is that valid credentials and authorized sessions can still lead to harmful actions if an agent is manipulated mid-session.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights prompt injection, Model Context Protocol traffic, and app-to-LLM API calls as major gaps for existing security architectures. Prompt injection can embed malicious instructions in content an agent processes, while MCP creates agent-to-tool communications that may not be visible to tools built for browser-to-application flows. App-to-LLM API traffic can also move directly between private infrastructure and AI models, bypassing cloud-based inspection points.\u003c/p\u003e\n\n\u003cp\u003eThe article presents Netskope One AI Security as a way to extend zero trust controls to non-human identities and agentic workflows. It says Netskope One Agentic Broker decodes MCP traffic in real time, integrates with Netskope One DLP, and uses the Cloud Confidence Index to assess MCP server risk. It also says Netskope One AI Gateway provides inspection for app-to-LLM API traffic in AWS VPCs and VMware ESXi environments.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article says traditional zero trust deployments commonly assume that every access request begins with a human user. In that model, a user authenticates, a device is checked for posture, and policy evaluates context before access is granted or denied. The article argues that AI agents increasingly operate outside this framework because they authenticate once and then act autonomously. Those actions can include calling APIs, reading data, invoking tools, and communicating with other systems without a human in the loop at each step.\u003c/p\u003e\n\n\u003cp\u003eA central technical issue described in the article is that credential-based trust does not hold well for agents. The article says the threat may not arrive at authentication time, but instead during the session through data the agent processes. Prompt injection is cited as an example in which malicious instructions are placed in a document, email, or web page that the agent reads as part of its workflow. The agent may then treat those instructions as legitimate goals and perform actions such as exfiltrating data, calling unauthorized endpoints, or modifying records.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies Model Context Protocol as an emerging standard for connecting AI agents to external tools and data sources. It describes MCP as an API layer for agentic AI that can give agents access to databases, code repositories, communication platforms, and other agents. The security concern is that MCP traffic may not resemble the user-to-application flows that existing inline tools were built to inspect. As a result, the article says organizations may lack DLP enforcement, threat detection, and access control over a growing category of data movement.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes tool poisoning as a risk related to MCP. It says an attacker can register a malicious MCP server and manipulate an agent into connecting to it, either by poisoning the agent’s tool list or by embedding instructions in content processed by the agent. Without visibility into MCP traffic, the article says security teams have no way to detect when this happens. It cites Netskope’s Cloud and Threat Report 2026 as finding AI workloads running through Azure OpenAI services, Amazon Bedrock, and Google Vertex AI.\u003c/p\u003e\n\n\u003cp\u003eAnother gap described in the article is app-to-LLM API traffic from internal applications to AI models. The article says this traffic can flow directly between private infrastructure and an AI model, bypassing the cloud-based inspection points used by many security stacks. It says this can mean no content inspection on data sent to the model, no logging of model responses, and no enforcement of data handling policies. The article frames these issues as requiring zero trust controls that cover non-human identities and traffic patterns most current architectures were not designed to handle.\u003c/p\u003e\n\n\u003cp\u003eThe response presented in the article is Netskope One AI Security, including Netskope One Agentic Broker and Netskope One AI Gateway. The article says Agentic Broker decodes MCP traffic in real time and provides visibility into which MCP servers agents connect to, what tools and prompts are in use, and whether data policy violations occur. It says AI Gateway provides a software-layer inspection point for app-to-LLM API traffic in AWS VPCs and VMware ESXi environments. It also says the platform integrates Netskope One DLP, Cloud Confidence Index, AI Guardrails, logging, and centralized authentication for agents and applications accessing LLMs.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that many zero trust deployments were designed around a human-centered access model. In that model, a user authenticates, a device is checked for posture, and policy evaluates context before granting or denying access. The article says this model has worked through cloud adoption and remote work, but it is increasingly not the model enterprises are running as AI agents become more common.\u003c/p\u003e\n\n\u003cp\u003eAI agents are described as operating outside the traditional framework by design. They authenticate once and then run autonomously, calling APIs, reading data, invoking tools, and communicating with other agents or systems. The article emphasizes that the credentials used by these agents can be valid and their sessions can be authorized, while the actions that follow may still range from routine automation to data exfiltration.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-article-says-zero-trust-has-an-ai-agent-problem\"\u003eWhy the article says zero trust has an AI agent problem\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central claim is that zero trust controls built for human access requests do not adequately address AI agent behavior. For human users, authentication, device posture, and contextual access policy provide meaningful control points. For AI agents, the article says the threat may appear after authentication, during the session, in the data the agent processes.\u003c/p\u003e\n\n\u003cp\u003eThe article cites IDC’s Worldwide Artificial Intelligence IT Spending Forecast, 2025-2029, stating that enterprise AI spending reached \u003cspan class=\"math inline\"\u003e\\(241.8 billion in 2025 and is projected to surpass \\)\u003c/span\u003e867 billion by 2029. It says most of that investment is generating agentic workflows. The article frames this growth as a reason security teams need to extend zero trust controls.\u003c/p\u003e\n\n\u003ch2 id=\"credential-based-trust-and-prompt-injection\"\u003eCredential-based trust and prompt injection\u003c/h2\u003e\n\n\u003cp\u003eThe article says credential-based trust does not hold for AI agents because authentication is not necessarily where the threat appears. Instead, malicious instructions can be embedded in content the agent reads after the session has already been authorized. This creates a situation in which valid credentials and authorized access do not guarantee safe behavior.\u003c/p\u003e\n\n\u003cp\u003ePrompt injection is the article’s main example of this problem. It describes an attacker placing malicious instructions in a document, email, or web page that the agent reads during its workflow. The agent may then interpret those instructions as legitimate goals and work toward them.\u003c/p\u003e\n\n\u003cp\u003eThe article lists possible outcomes of prompt injection, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExfiltrating data.\u003c/li\u003e\n\u003cli\u003eCalling unauthorized endpoints.\u003c/li\u003e\n\u003cli\u003eModifying records.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article cites IBM Research’s “AI Jailbreak” findings that jailbreak attempts succeed roughly 20% of the time. It also says attackers may need as few as 42 seconds and five interactions to bypass safety guardrails. The article argues that this becomes significant when agents are making hundreds of calls per minute.\u003c/p\u003e\n\n\u003ch2 id=\"model-context-protocol-as-a-new-traffic-type\"\u003eModel Context Protocol as a new traffic type\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies Model Context Protocol, or MCP, as an emerging standard for connecting AI agents to external tools and data sources. It describes MCP as the API layer for agentic AI. According to the article, an agent with MCP access can reach databases, code repositories, communication platforms, and other agents without the need for custom integrations.\u003c/p\u003e\n\n\u003cp\u003eThe article says the security problem is that MCP traffic does not look like the user-to-application flows existing inline tools were built to inspect. It gives the example of a secure web gateway that handles HTTP traffic from a browser session but may have little visibility into an MCP conversation between an agent and a data store. The article says this can result in no DLP enforcement, no threat detection, and no access control on a growing category of data movement.\u003c/p\u003e\n\n\u003ch2 id=\"tool-poisoning-and-mcp-visibility-gaps\"\u003eTool poisoning and MCP visibility gaps\u003c/h2\u003e\n\n\u003cp\u003eThe article says tool poisoning worsens the MCP security problem. It describes a scenario in which an attacker registers a malicious MCP server and manipulates an agent into connecting to it. The manipulation may happen by poisoning the agent’s tool list or by embedding instructions within content the agent processes.\u003c/p\u003e\n\n\u003cp\u003eThe article states that without visibility into MCP traffic, security teams have no way to detect when this happens. It also cites Netskope’s Cloud and Threat Report 2026, which found that 33% of organizations are already running AI workloads via Azure OpenAI services, 27% via Amazon Bedrock, and 10% on Google Vertex AI. The article says each of those deployments is a potential MCP attack surface that demands attention.\u003c/p\u003e\n\n\u003ch2 id=\"app-to-llm-api-traffic-bypassing-inspection\"\u003eApp-to-LLM API traffic bypassing inspection\u003c/h2\u003e\n\n\u003cp\u003eThe article also discusses app-to-LLM API traffic as a gap in existing security architectures. It says organizations building AI-powered applications faced this issue even before MCP became a standard of choice among AI-forward organizations. In this pattern, an internal application queries an LLM to process data or drive a workflow.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, this traffic can flow directly between private infrastructure and an AI model. It says this path can bypass the cloud-based inspection points that many security stacks depend on. The article identifies several consequences:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNo content inspection on data sent to the model.\u003c/li\u003e\n\u003cli\u003eNo logging of what the model returns.\u003c/li\u003e\n\u003cli\u003eNo enforcement of data handling policies on a traffic path that may carry sensitive information.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the volume of uninspected app-to-LLM traffic grows as organizations move from AI experimentation to production deployments.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-stakeholders-described-in-the-article\"\u003eAffected parties and stakeholders described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article focuses on enterprises adopting AI agents and agentic workflows. It also specifically discusses security teams that need to extend zero trust controls to cover non-human identities. The affected systems and environments described include AI agents, internal applications, private infrastructure, LLMs, MCP servers, databases, code repositories, communication platforms, and other agents or systems.\u003c/p\u003e\n\n\u003cp\u003eThe article names several AI platforms and environments in the context of AI workload adoption and traffic inspection:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAzure OpenAI services.\u003c/li\u003e\n\u003cli\u003eAmazon Bedrock.\u003c/li\u003e\n\u003cli\u003eGoogle Vertex AI.\u003c/li\u003e\n\u003cli\u003eAWS VPCs.\u003c/li\u003e\n\u003cli\u003eVMware ESXi environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not name a specific threat actor group. It refers generally to attackers who may use prompt injection, jailbreak attempts, malicious MCP servers, or tool poisoning.\u003c/p\u003e\n\n\u003ch2 id=\"netskope-s-proposed-response\"\u003eNetskope’s proposed response\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Netskope One AI Security as addressing the gaps it describes. It says the offering provides a purpose-built access and visibility layer for non-human identities. The article highlights two components: Netskope One Agentic Broker and Netskope One AI Gateway.\u003c/p\u003e\n\n\u003cp\u003eNetskope One Agentic Broker is described as decoding MCP traffic in real time. The article says it provides visibility into:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhich MCP servers agents are connecting to.\u003c/li\u003e\n\u003cli\u003eWhat tools and prompts are in use.\u003c/li\u003e\n\u003cli\u003eWhether data policy violations are occurring.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says Agentic Broker integrates with Netskope One DLP to enforce data inspection policies on agentic workflows. It also says it uses Netskope’s Cloud Confidence Index to assess the risk profile of MCP servers before agents connect to them.\u003c/p\u003e\n\n\u003cp\u003eNetskope One AI Gateway is described as addressing app-to-LLM API traffic running on private infrastructure. The article says it provides a software-layer inspection point within AWS VPCs and VMware ESXi environments. It also says the gateway centralizes authentication for agents and applications accessing LLMs, maintains searchable logs of API interactions, and integrates Netskope One AI Guardrails and DLP for content inspection without routing traffic through cloud-based control points.\u003c/p\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s overall takeaway is that zero trust needs to be extended beyond human users to account for AI agents and other non-human identities. It argues that valid credentials and authorized sessions are not enough when agents can be manipulated through prompts, MCP tool interactions, or direct app-to-LLM API flows. The article concludes that applying zero trust to AI agents requires visibility into traffic types and authentication patterns that many existing architectures were not designed to handle.\u003c/p\u003e\n","keyPoints":["Traditional zero trust models assume access requests originate from humans, but AI agents authenticate once and then autonomously call APIs, read data, invoke tools, and communicate with other systems.","Prompt injection can cause an authorized AI agent session with valid credentials to exfiltrate data, call unauthorized endpoints, or modify records without triggering policies built around authentication-time checks.","Model Context Protocol traffic between AI agents and external tools or data sources may not be visible to existing inline security tools, leaving gaps in DLP enforcement, threat detection, and access control.","App-to-LLM API traffic can flow directly between private infrastructure and AI models, bypassing cloud-based inspection points and leaving sensitive data exchanges uninspected.","The article says Netskope One AI Security provides visibility and enforcement for non-human identities through components including Netskope One Agentic Broker and Netskope One AI Gateway."],"insights":["For AI agents, the article identifies mid-session data processing rather than initial authentication as the point where zero trust controls can fail, because malicious instructions may be embedded in content the agent reads after access is granted.","The article highlights MCP as a distinct traffic category that can fall outside tools built for browser-to-application flows, making agent-to-tool communications a blind spot for DLP, threat detection, and access control.","The article cites IBM Research findings that jailbreak attempts can succeed about 20% of the time with as few as 42 seconds and five interactions, which becomes more significant when agents make hundreds of calls per minute.","The article points out that app-to-LLM API calls from private infrastructure can bypass cloud-based inspection entirely, creating an unmonitored path for sensitive data sent to and returned from AI models."],"referencedReports":[{"title":"Worldwide Artificial Intelligence IT Spending Forecast, 2025-2029","url":"https://www.idc.com/getdoc.jsp?containerId=US53688725","publisher":"IDC","context":"The article cites IDC's forecast to state that enterprise AI spending reached $241.8 billion in 2025 and is projected to surpass $867 billion by 2029.","category":"","primary":false},{"title":"AI Jailbreak","url":"https://www.ibm.com/think/insights/ai-jailbreak","publisher":"IBM Research","context":"The article cites IBM Research for findings that jailbreak attempts succeed roughly 20% of the time and can require as few as 42 seconds and five interactions.","category":"","primary":false}],"body":"\u003cp\u003eThe article argues that many zero trust deployments were built around human access patterns, where a user authenticates, a device posture check occurs, and policy evaluates context before granting or denying access. It says AI agents do not fit that model because they authenticate once and then operate autonomously by calling APIs, reading data, invoking tools, and communicating with other agents or systems. The main significance is that valid credentials and authorized sessions can still lead to harmful actions if an agent is manipulated mid-session.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights prompt injection, Model Context Protocol traffic, and app-to-LLM API calls as major gaps for existing security architectures. Prompt injection can embed malicious instructions in content an agent processes, while MCP creates agent-to-tool communications that may not be visible to tools built for browser-to-application flows. App-to-LLM API traffic can also move directly between private infrastructure and AI models, bypassing cloud-based inspection points.\u003c/p\u003e\n\n\u003cp\u003eThe article presents Netskope One AI Security as a way to extend zero trust controls to non-human identities and agentic workflows. It says Netskope One Agentic Broker decodes MCP traffic in real time, integrates with Netskope One DLP, and uses the Cloud Confidence Index to assess MCP server risk. It also says Netskope One AI Gateway provides inspection for app-to-LLM API traffic in AWS VPCs and VMware ESXi environments.\u003c/p\u003e\n"},{"n":2,"title":"The 5 Best Practices for Secure Identity Verification","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/the-5-best-practices-for-secure-identity-verification/","time":"14:05","priority":"MAY READ","score":45,"tldr":"Organizations should strengthen identity verification by moving beyond passwords and weak MFA to phishing-resistant methods, trusted-device checks, secure helpdesk verification, passkeys, and protected biometrics. The article emphasizes that credential theft and social engineering are making secure, low-friction identity workflows essential.","briefOverview":"\u003cp\u003eCredential theft surged by 160% in 2025 and contributed to one in five data breaches, according to the article. It says attackers are using AI-driven attacks to bypass traditional defenses, making secure identity verification a core part of cyber resilience. The article presents five best practices for strengthening identity verification while limiting friction for legitimate users.\u003c/p\u003e\n\n\u003cp\u003eThe recommendations include strong, fatigue-resistant multi-factor authentication, secure service desk verification, device trust signals, passkeys, and stronger protection for biometric data. The article emphasizes phishing-resistant MFA methods such as FIDO2 security keys, passkeys, and certificate-based authentication, while warning against weaker SMS or email-based one-time passcodes. It also highlights helpdesk social engineering as a major risk during password resets, MFA changes, and other sensitive support actions.\u003c/p\u003e\n\n\u003cp\u003eThe article is sponsored and written by Specops Software and includes several Specops product references. It describes Specops Secure Service Desk, Specops Verified ID, and Specops Password Policy as tools for improving identity verification, securing helpdesk workflows, and strengthening Active Directory password policies. It also cites examples including Marks and Spencer and Clorox, where service desk compromise was described as an early step toward ransomware deployment or broader lateral movement.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article argues that identity verification has become a major security priority as credential theft increased by 160% in 2025 and attackers used AI-driven methods to bypass traditional defenses. It says the problem for security teams is no longer only verifying identities, but doing so securely without adding unnecessary friction for legitimate users. Weak onboarding, static credentials, and inconsistent authentication policies are described as openings attackers can exploit.\u003c/p\u003e\n\n\u003cp\u003eThe first recommendation is to use strong, fatigue-resistant multi-factor authentication. The article says MFA is strongest when it combines factors from different categories, such as something the user knows, has, or is. It recommends moving away from legacy SMS or email-based one-time passcodes and prioritizing phishing-resistant options such as FIDO2 security keys, passkeys, and certificate-based authentication.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies helpdesks as frequent social engineering targets because they handle identity, access, and urgent support requests. It says attackers impersonate employees to convince support staff to perform account resets, and that AI-enabled deepfake audio or public information can make requests appear legitimate. It cites Marks and Spencer and Clorox as high-profile breaches where service desk compromise was the first step toward ransomware deployment or broader lateral movement.\u003c/p\u003e\n\n\u003cp\u003eDevice trust is presented as another important part of identity verification because attackers may steal credentials, session cookies, or MFA tokens. The article says trusted access policies can evaluate whether a device is corporate-managed, patched, protected by endpoint tools, associated with certificates, or showing signs of compromise. These signals can allow lower-friction access from recognized compliant devices while triggering step-up authentication, restrictions, or blocking for suspicious sessions.\u003c/p\u003e\n\n\u003cp\u003eThe article also recommends considerin
