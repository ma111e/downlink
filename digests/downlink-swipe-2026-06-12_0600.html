<script type="application/json" id="dl-articles">[{"n":1,"title":"CISA orders feds to patch actively exploited Ivanti flaw by Sunday","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-gives-feds-3-days-to-patch-ivanti-flaw-exploited-in-attacks/","time":"08:26","priority":"MUST READ","score":95,"tldr":"CISA has ordered U.S. federal agencies to patch the actively exploited Ivanti Sentry flaw CVE-2026-10520 within three days under its new BOD 26-04 directive. Shadowserver warns that unpatched internet-exposed Sentry systems are likely already compromised due to widespread exploitation using a public proof-of-concept.","briefOverview":"\u003cp\u003eCISA ordered U.S. Federal Civilian Executive Branch agencies to patch an actively exploited Ivanti Sentry vulnerability within three days under the newly issued Binding Operational Directive 26-04. The flaw, tracked as CVE-2026-10520, is a maximum-severity OS command injection vulnerability in Ivanti’s security gateway appliance, formerly known as MobileIron Sentry. CISA added the flaw to its Known Exploited Vulnerabilities Catalog after confirming active exploitation.\u003c/p\u003e\n\n\u003cp\u003eIvanti released patches for CVE-2026-10520 and initially said it had no evidence of in-the-wild exploitation, but Shadowserver later reported that attackers had already backdoored many internet-exposed Sentry gateways. Shadowserver said it was seeing a large amount of exploitation attempts based on the public proof-of-concept and warned that unpatched systems are likely compromised. The article also notes that Ivanti had not updated its advisory to warn of active exploitation at the time of publication.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA ordered federal agencies to secure Ivanti Sentry instances affected by CVE-2026-10520 within three days. The requirement applies to Federal Civilian Executive Branch agencies under Binding Operational Directive 26-04, which was issued the day before CISA added the flaw to its Known Exploited Vulnerabilities Catalog. CISA said this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-10520 is described as a maximum-severity OS command injection vulnerability in Ivanti Sentry, a security gateway appliance formerly known as MobileIron Sentry. Ivanti released patches for the vulnerability and said at that time that it had no evidence of in-the-wild exploitation. The article states that Ivanti had not updated its advisory to warn that the vulnerability was under active exploitation.\u003c/p\u003e\n\n\u003cp\u003eShadowserver reported that attackers had already backdoored many Sentry gateways exposed online. It said it was observing a large amount of exploitation attempts based on the public proof-of-concept and warned that systems not already patched are most likely compromised. Shadowserver tracked just over 50 Sentry admin portals exposed online, while noting that its detection may be limited because some Ivanti Sentry instances were not reachable in its scans.\u003c/p\u003e\n\n\u003cp\u003eBOD 26-04 superseded and revoked BOD 19-02 and BOD 22-01, and it requires U.S. federal agencies to prioritize patching based on several factors. These include whether the asset is publicly exposed, whether the flaw is in CISA’s KEV catalog, whether exploitation can be automated at scale, and whether exploitation gives attackers partial or total control of a targeted system. The article says CVE-2026-10520 is the first vulnerability for which BOD 26-04 applies.\u003c/p\u003e\n\n\u003cp\u003eThe article places the Ivanti Sentry flaw in a broader pattern of recent CISA emergency patching actions. It notes that CISA recently ordered federal agencies to patch flaws affecting Check Point VPN, Oracle WebLogic Server, and a cPanel plugin within three days. It also states that CISA has flagged 35 exploited vulnerabilities across Ivanti products in recent years, including 12 targeted by ransomware gangs.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA ordered U.S. Federal Civilian Executive Branch agencies to patch an actively exploited Ivanti Sentry vulnerability within three days. The directive applies to CVE-2026-10520, a maximum-severity flaw in Ivanti’s security gateway appliance, formerly known as MobileIron Sentry. CISA added the vulnerability to its Known Exploited Vulnerabilities Catalog after confirming that it is being exploited in attacks.\u003c/p\u003e\n\n\u003cp\u003eThe patching order was issued under Binding Operational Directive 26-04, which was newly issued and superseded the older BOD 19-02 and BOD 22-01. The article states that CVE-2026-10520 is the first vulnerability for which BOD 26-04 applies.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical details\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-10520 is described as an OS command injection vulnerability in Ivanti Sentry. The article characterizes it as maximum-severity and says it affects Ivanti’s security gateway appliance.\u003c/p\u003e\n\n\u003cp\u003eIvanti released patches for CVE-2026-10520 and said at the time that it had no evidence of exploitation in the wild. However, Shadowserver later reported that attackers had already backdoored many of the Sentry gateways exposed online.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-status\"\u003eExploitation status\u003c/h2\u003e\n\n\u003cp\u003eCISA confirmed that CVE-2026-10520 is actively exploited and added it to the Known Exploited Vulnerabilities Catalog. Shadowserver also reported active exploitation, saying it was observing a large amount of exploitation attempts based on the public proof-of-concept.\u003c/p\u003e\n\n\u003cp\u003eShadowserver warned that if organizations had not patched, they were most likely compromised. It tracked just over 50 Ivanti Sentry admin portals exposed online but said this number may be limited because multiple Ivanti Sentry instances were not reachable in its scans, possibly due to scanner blocking.\u003c/p\u003e\n\n\u003ch2 id=\"vendor-and-third-party-response\"\u003eVendor and third-party response\u003c/h2\u003e\n\n\u003cp\u003eIvanti released patches for the vulnerability before CISA’s KEV update. The article says Ivanti had not yet updated its advisory to warn that CVE-2026-10520 was under active exploitation. It also states that an Ivanti spokesperson had not responded to BleepingComputer’s request for more details on the ongoing attacks.\u003c/p\u003e\n\n\u003cp\u003eShadowserver provided independent visibility into exposed Ivanti Sentry instances and exploitation attempts. Its findings included reports of backdoored gateways and a warning that its observed exposure numbers were likely incomplete.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-directive-and-federal-requirements\"\u003eCISA directive and federal requirements\u003c/h2\u003e\n\n\u003cp\u003eCISA ordered Federal Civilian Executive Branch agencies to secure affected Ivanti Sentry instances within three days. The agency said this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise.\u003c/p\u003e\n\n\u003cp\u003eCISA instructed stakeholders to follow applicable BOD 26-04 guidance for cloud services or discontinue use of the product if mitigations are unavailable. It also said stakeholders are responsible for evaluating each asset’s internet exposure and ensuring adherence to BOD 26-04 patching guidelines.\u003c/p\u003e\n\n\u003cp\u003eBOD 26-04 requires federal agencies to prioritize patching based on several conditions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe asset is publicly exposed online.\u003c/li\u003e\n\u003cli\u003eThe security flaw has been added to CISA’s Known Exploited Vulnerabilities Catalog.\u003c/li\u003e\n\u003cli\u003eExploitation can be automated for large-scale attacks.\u003c/li\u003e\n\u003cli\u003eSuccessful exploitation gives attackers partial or total control of a targeted system.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-context\"\u003eBroader context\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that CISA has recently ordered federal agencies to patch other exploited vulnerabilities within three days. These included a Check Point VPN zero-day, a high-severity Oracle WebLogic Server vulnerability exploited in the wild, and an actively exploited cPanel plugin flaw.\u003c/p\u003e\n\n\u003cp\u003eIt also says CISA has flagged 35 vulnerabilities across Ivanti products over the past several years as abused in attacks. Of those, 12 were targeted by ransomware gangs.\u003c/p\u003e\n","keyPoints":["CISA ordered Federal Civilian Executive Branch agencies to patch the actively exploited Ivanti Sentry vulnerability CVE-2026-10520 within three days under Binding Operational Directive 26-04.","CVE-2026-10520 is a maximum-severity OS command injection vulnerability in Ivanti Sentry, formerly known as MobileIron Sentry.","Shadowserver reported that attackers had already backdoored many internet-exposed Ivanti Sentry gateways and warned that unpatched systems are likely compromised.","CISA added CVE-2026-10520 to its Known Exploited Vulnerabilities Catalog after confirming active exploitation in attacks.","BOD 26-04 requires federal agencies to prioritize patching when assets are publicly exposed, flaws are listed in CISA’s KEV catalog, exploitation can be automated at scale, and exploitation gives attackers partial or total control of a system."],"insights":["Shadowserver said its count of just over 50 exposed Ivanti Sentry admin portals is likely an undercount because some organizations may be blocking its scanner.","Ivanti had not updated its advisory to warn of active exploitation even after Shadowserver reported backdoored gateways and CISA added the flaw to the KEV catalog.","CVE-2026-10520 became the first vulnerability subject to the new BOD 26-04 patching requirements, which superseded BOD 19-02 and BOD 22-01.","Shadowserver observed a large volume of exploitation attempts based on the public proof-of-concept, indicating that public exploit availability quickly translated into broad scanning and attack activity."],"referencedReports":[{"title":"Security Advisory Ivanti Sentry CVE-2026-10520 CVE-2026-10523","url":"https://hub.ivanti.com/s/article/Security-Advisory-Ivanti-Sentry-CVE-2026-10520-CVE-2026-10523?language=en_US","publisher":"Ivanti","context":"The article cites Ivanti’s advisory for the patched Ivanti Sentry vulnerabilities and notes that it had not yet been updated to warn of active exploitation.","category":"","primary":false},{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/11/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article references CISA’s alert confirming active exploitation of CVE-2026-10520 and adding it to the Known Exploited Vulnerabilities Catalog.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog: CVE-2026-10520","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?field_cve=CVE-2026-10520","publisher":"CISA","context":"The article links to CISA’s KEV catalog entry for CVE-2026-10520 as the basis for the federal patching requirement.","category":"","primary":false}],"body":"\u003cp\u003eCISA ordered U.S. Federal Civilian Executive Branch agencies to patch an actively exploited Ivanti Sentry vulnerability within three days under the newly issued Binding Operational Directive 26-04. The flaw, tracked as CVE-2026-10520, is a maximum-severity OS command injection vulnerability in Ivanti’s security gateway appliance, formerly known as MobileIron Sentry. CISA added the flaw to its Known Exploited Vulnerabilities Catalog after confirming active exploitation.\u003c/p\u003e\n\n\u003cp\u003eIvanti released patches for CVE-2026-10520 and initially said it had no evidence of in-the-wild exploitation, but Shadowserver later reported that attackers had already backdoored many internet-exposed Sentry gateways. Shadowserver said it was seeing a large amount of exploitation attempts based on the public proof-of-concept and warned that unpatched systems are likely compromised. The article also notes that Ivanti had not updated its advisory to warn of active exploitation at the time of publication.\u003c/p\u003e\n"},{"n":4,"title":"INTERPOL Operation Takes Down Sniper Dz Phishing Platform, Arrests Administrator","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/interpol-takes-down-sniper-dz-phishing.html","time":"08:52","priority":"SHOULD READ","score":84,"tldr":"INTERPOL’s Operation Ramz dismantled the Sniper Dz phishing-as-a-service platform and led to 201 arrests across the MENA region, including its alleged administrator in Algeria. The decade-old service enabled large-scale phishing with ready-made kits and infrastructure tied to more than 20,000 domains and 45,000 victim records.","briefOverview":"\u003cp\u003eINTERPOL-led Operation Ramz disrupted Sniper Dz, a phishing-as-a-service platform active for about a decade. The operation took place between October 2025 and February 2026 and involved authorities from 13 countries in the Middle East and North Africa region. Authorities made 201 arrests, including Guedz, described as the primary developer and administrator of Sniper Dz.\u003c/p\u003e\n\n\u003cp\u003eAs part of the operation, authorities took down the website used to offer phishing-as-a-service capabilities and seized hardware containing phishing software and scripts. Group-IB said the platform had collected more than 45,000 victim records and was associated with more than 20,000 unique domains. Sniper Dz had rebranded over the years as Joker Dz, Storm Dz, and Spam Dz.\u003c/p\u003e\n\n\u003cp\u003eSniper Dz offered ready-made phishing kits, hosting infrastructure, and operational support to cybercriminals. Its toolkit targeted 30 major global organizations, including PayPal, Facebook, Instagram, Yahoo, Netflix, and Steam, using 80 phishing templates in five languages. Group-IB said the platform also redirected some victims into carrier billing fraud, premium SMS subscriptions, browser notification abuse, and other affiliate-driven scam campaigns.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAn INTERPOL-led operation disrupted Sniper Dz, a phishing-as-a-service platform that Group-IB said had been active since at least 2015. The effort, codenamed Operation Ramz, ran between October 2025 and February 2026. Authorities from 13 countries in the Middle East and North Africa region made 201 arrests.\u003c/p\u003e\n\n\u003cp\u003eAmong those arrested was Guedz, described as the primary developer and administrator of Sniper Dz. The arrest was carried out by the Algerian National Police. Group-IB said Sniper Dz had collected more than 45,000 victim records and had rebranded over the years as Joker Dz, Storm Dz, and Spam Dz.\u003c/p\u003e\n\n\u003cp\u003eAuthorities took down the website used to offer Sniper Dz’s phishing-as-a-service capabilities to other cybercriminals. They also seized hardware containing phishing software and scripts. Group-IB said more than 20,000 unique domains associated with the service had been identified.\u003c/p\u003e\n\n\u003cp\u003eSniper Dz provided ready-made phishing kits, hosting infrastructure, and operational support. Its toolkit primarily targeted 30 major global organizations, including PayPal, Facebook, Instagram, Yahoo, Netflix, and Steam. The platform used 80 phishing templates deployed in Arabic, English, French, Spanish, and Hebrew.\u003c/p\u003e\n\n\u003cp\u003eThe phishing campaigns targeted users of technology, social media, and streaming platforms across multiple geographies by impersonating popular brands and government entities. Group-IB said the campaigns harvested credentials, personal information, and other sensitive data. The platform also used fake social media accounts impersonating well-known political personalities in the Middle East and North Africa to promote phishing links disguised as promotional offers or free internet access.\u003c/p\u003e\n\n\u003cp\u003ePalo Alto Networks Unit 42 previously published a comprehensive analysis of Sniper Dz in October 2024, describing its Telegram channel with more than 7,300 subscribers and its option to host phishing pages on its own infrastructure behind a proxy server. Group-IB said Sniper Dz stood out because it offered its infrastructure for free. Its monetization avenues instead relied on credential theft and victim traffic, including redirects into carrier billing fraud, premium SMS subscriptions, browser notification abuse schemes, and other affiliate-driven scams.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eINTERPOL-led Operation Ramz disrupted Sniper Dz, a phishing-as-a-service platform that Group-IB said had been active since at least 2015. The operation took place between October 2025 and February 2026. Authorities from 13 countries in the Middle East and North Africa region participated and made 201 arrests.\u003c/p\u003e\n\n\u003cp\u003eOne of the arrests was Guedz, identified in the article as the primary developer and administrator of Sniper Dz. The Algerian National Police made the arrest. Group-IB said the platform had collected more than 45,000 victim records.\u003c/p\u003e\n\n\u003ch2 id=\"platform-history-and-rebranding\"\u003ePlatform History and Rebranding\u003c/h2\u003e\n\n\u003cp\u003eSniper Dz operated for about a decade as a phishing-as-a-service platform. Over the years, it rebranded itself as Joker Dz, Storm Dz, and Spam Dz. Group-IB described it as a sophisticated criminal platform offering ready-made phishing kits, hosting infrastructure, and operational support to cybercriminals.\u003c/p\u003e\n\n\u003cp\u003eMore than 20,000 unique domains associated with the service have been identified. The platform supported phishing activity at scale by supplying tooling and infrastructure to other cybercriminals.\u003c/p\u003e\n\n\u003ch2 id=\"law-enforcement-action\"\u003eLaw Enforcement Action\u003c/h2\u003e\n\n\u003cp\u003eAs part of Operation Ramz, authorities took down the website used to offer phishing-as-a-service capabilities. They also seized hardware containing phishing software and scripts. The operation involved authorities from 13 countries across the Middle East and North Africa region.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies INTERPOL as leading the operation and Group-IB as reporting details of the disruption. The arrest of Guedz was made by the Algerian National Police.\u003c/p\u003e\n\n\u003ch2 id=\"targeting-and-templates\"\u003eTargeting and Templates\u003c/h2\u003e\n\n\u003cp\u003eSniper Dz’s toolkit primarily targeted 30 major global organizations. The article names PayPal, Facebook, Instagram, Yahoo, Netflix, and Steam among the targeted organizations. The platform used 80 phishing templates deployed in five languages: Arabic, English, French, Spanish, and Hebrew.\u003c/p\u003e\n\n\u003cp\u003eCampaigns using Sniper Dz targeted users of technology, social media, and streaming platforms across several geographies. The phishing pages impersonated popular brands and government entities. Their purpose was to harvest credentials, personal information, and other sensitive data.\u003c/p\u003e\n\n\u003ch2 id=\"social-engineering-tactics\"\u003eSocial Engineering Tactics\u003c/h2\u003e\n\n\u003cp\u003eGroup-IB said Sniper Dz activity went beyond traditional credential theft. Threat actors created fake social media accounts impersonating well-known political personalities across the Middle East and North Africa. Those accounts were used to promote phishing links disguised as promotional offers or free internet access.\u003c/p\u003e\n\n\u003cp\u003eThis tactic relied on the popularity and credibility of public figures in the region. The article describes it as part of the platform’s broader social engineering approach.\u003c/p\u003e\n\n\u003ch2 id=\"prior-technical-analysis\"\u003ePrior Technical Analysis\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that Palo Alto Networks Unit 42 published a comprehensive analysis of Sniper Dz in October 2024. That analysis detailed the threat actor’s use of a Telegram channel with more than 7,300 subscribers. It also described options provided by the platform to host phishing pages on its own infrastructure behind a proxy server.\u003c/p\u003e\n\n\u003ch2 id=\"monetization-model\"\u003eMonetization Model\u003c/h2\u003e\n\n\u003cp\u003eGroup-IB said Sniper Dz stood out from the broader phishing-as-a-service market because it offered its entire infrastructure for free. This made it easier for aspiring cybercriminals to conduct phishing campaigns at scale. Instead of charging for access to the infrastructure, the platform’s monetization avenues relied on credential theft and victim traffic.\u003c/p\u003e\n\n\u003cp\u003eAccording to Group-IB, stolen credentials could be harvested through phishing campaigns. Users who did not yield credentials could still be redirected into carrier billing fraud, premium SMS subscriptions, browser notification abuse schemes, and other affiliate-driven scam campaigns.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Sniper Dz collected more than 45,000 victim records. It also states that more than 20,000 unique domains associated with the service have been identified. The affected targets included users of technology, social media, and streaming platforms, as well as organizations impersonated by the phishing templates and websites.\u003c/p\u003e\n","keyPoints":["INTERPOL-led Operation Ramz disrupted the Sniper Dz phishing-as-a-service platform between October 2025 and February 2026.","Authorities from 13 countries in the Middle East and North Africa region made 201 arrests, including Guedz, the primary developer and administrator of Sniper Dz.","Authorities took down the website used to offer Sniper Dz’s phishing-as-a-service capabilities and seized hardware containing phishing software and scripts.","Group-IB said Sniper Dz had collected more than 45,000 victim records and was associated with more than 20,000 unique domains.","Sniper Dz offered ready-made phishing kits, hosting infrastructure, and operational support, targeting major organizations such as PayPal, Facebook, Instagram, Yahoo, Netflix, and Steam."],"insights":["Sniper Dz stood out in the phishing-as-a-service market because it offered its infrastructure for free, lowering the barrier for aspiring cybercriminals to launch phishing campaigns at scale.","The platform’s monetization did not depend only on direct credential theft, as non-credential-yielding victims could be redirected into carrier billing fraud, premium SMS subscriptions, browser notification abuse, and affiliate scam campaigns.","Sniper Dz expanded beyond brand impersonation by using fake social media accounts impersonating well-known political figures in the Middle East and North Africa to promote phishing links as offers such as free internet access.","The platform’s repeated rebranding as Joker Dz, Storm Dz, and Spam Dz shows that defenders tracking phishing services may need to correlate infrastructure and operational patterns rather than relying only on a single service name."],"referencedReports":[{"title":"Free Sniper Dz Phishing Tools Fuel Phishing Attacks","url":"https://thehackernews.com/2024/10/free-sniper-dz-phishing-tools-fuel.html","publisher":"Palo Alto Networks Unit 42","context":"The article says Sniper Dz was the subject of a comprehensive analysis by Palo Alto Networks Unit 42 in October 2024 that detailed its Telegram channel and phishing-page hosting model.","category":"","primary":false}],"body":"\u003cp\u003eINTERPOL-led Operation Ramz disrupted Sniper Dz, a phishing-as-a-service platform active for about a decade. The operation took place between October 2025 and February 2026 and involved authorities from 13 countries in the Middle East and North Africa region. Authorities made 201 arrests, including Guedz, described as the primary developer and administrator of Sniper Dz.\u003c/p\u003e\n\n\u003cp\u003eAs part of the operation, authorities took down the website used to offer phishing-as-a-service capabilities and seized hardware containing phishing software and scripts. Group-IB said the platform had collected more than 45,000 victim records and was associated with more than 20,000 unique domains. Sniper Dz had rebranded over the years as Joker Dz, Storm Dz, and Spam Dz.\u003c/p\u003e\n\n\u003cp\u003eSniper Dz offered ready-made phishing kits, hosting infrastructure, and operational support to cybercriminals. Its toolkit targeted 30 major global organizations, including PayPal, Facebook, Instagram, Yahoo, Netflix, and Steam, using 80 phishing templates in five languages. Group-IB said the platform also redirected some victims into carrier billing fraud, premium SMS subscriptions, browser notification abuse, and other affiliate-driven scam campaigns.\u003c/p\u003e\n"},{"n":2,"title":"Over 73,000 French govt employees affected in Tchap messenger breach","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/french-govt-says-tchap-breach-affected-over-73-000-accounts/","time":"07:09","priority":"SHOULD READ","score":82,"tldr":"A breach of France’s Tchap government messaging platform exposed public chat data tied to 73,467 public-sector employees, including names, email addresses, organizations, and avatars. DINUM says private encrypted conversations remain protected, but the attacker allegedly scraped messages and files from unencrypted public rooms after gaining access through a compromised account.","briefOverview":"\u003cp\u003eThe French government said a breach of its Tchap encrypted messaging platform affected 73,467 public-sector employees, or less than 9% of more than 825,000 registered users. DINUM, the government’s digital affairs directorate, said a threat actor accessed the platform through a compromised user account. The incident was reported to France’s data protection authority, CNIL, because personal data shared by some users may have been exposed.\u003c/p\u003e\n\n\u003cp\u003eDINUM said private conversations on Tchap remain encrypted and protected, but public chat rooms are not encrypted by design. The attacker may have accessed data shared in those public forums, including users’ names, email addresses, avatar images, and the public-sector organizations they work for. DINUM said it identified and immediately blocked the account behind the malicious requests to remove persistent access and support further analysis.\u003c/p\u003e\n\n\u003cp\u003eA threat actor claimed responsibility for the attack over the weekend and said they gained access after a social engineering attack. The actor claimed to have scraped nearly 650,000 messages and data from more than 73,000 accounts, including email addresses, meeting links, organization information, account and device metadata, and over 13.5GB of documents and media files. They also alleged that hardcoded LDAP credentials were leaked through a PowerShell script.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe French government disclosed that a breach of the Tchap encrypted messaging platform affected 73,467 French public-sector employees. DINUM said this represents less than 9% of the platform’s more than 825,000 registered agents. The agency had initially provided few details, but later said attackers may have accessed information shared by users in public chat rooms.\u003c/p\u003e\n\n\u003cp\u003eDINUM said the attacker accessed Tchap using a compromised user account. The account behind the malicious requests was identified and immediately blocked to remove persistent access and allow in-depth analysis. DINUM also notified France’s data protection authority, CNIL, because of the potential exposure of personal data shared by some users.\u003c/p\u003e\n\n\u003cp\u003eThe agency said private conversations on Tchap remain protected because they are encrypted. However, public forums on the platform are open to all users and their messages are not encrypted by design. Data potentially exposed from user accounts includes last name, first name, email address, belonging entity, and avatar.\u003c/p\u003e\n\n\u003cp\u003eA threat actor claimed responsibility for the breach over the weekend and shared a sample of stolen files. The actor said they gained access to the platform following a social engineering attack. They claimed to have scraped nearly 650,000 messages and information from more than 73,000 accounts, including email addresses, meeting links, organization information, and account and device metadata.\u003c/p\u003e\n\n\u003cp\u003eThe same actor also alleged that they stole more than 13.5GB of documents and media files shared by public servants through Tchap. They further claimed that hardcoded LDAP credentials were leaked through a PowerShell script. DINUM has not attributed the breach in the article.\u003c/p\u003e\n\n\u003cp\u003eTchap was developed by DINUM with ANSSI in 2018 and is a decentralized collaboration and instant messaging platform for the French public sector based on the Matrix protocol. It became the default work communications app for all civil servants in early August 2025. The platform has more than 300,000 monthly users and over 500,000 downloads on Google’s Play Store.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe French government said a recent breach of its Tchap encrypted messaging platform affected 73,467 employees in the French public sector. DINUM, the French government’s digital affairs directorate, said this represents less than 9% of the platform’s more than 825,000 registered agents. The agency disclosed that a threat actor gained access to Tchap using a compromised user account.\u003c/p\u003e\n\n\u003cp\u003eDINUM notified France’s data protection authority, CNIL, because personal data shared by some users may have been exposed. The agency initially released few details about what was exposed and how many people were affected, but later provided an update describing the scope and types of data involved.\u003c/p\u003e\n\n\u003ch2 id=\"affected-data-and-platform-areas\"\u003eAffected data and platform areas\u003c/h2\u003e\n\n\u003cp\u003eDINUM said the attacker was able to access data shared in public chat rooms. These forums are open to all users and their messages are not encrypted by design. The agency emphasized that private conversations remain encrypted and protected.\u003c/p\u003e\n\n\u003cp\u003ePotentially exposed user account data includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLast name\u003c/li\u003e\n\u003cli\u003eFirst name\u003c/li\u003e\n\u003cli\u003eEmail address\u003c/li\u003e\n\u003cli\u003ePublic-sector entity or organization\u003c/li\u003e\n\u003cli\u003eAvatar image\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDINUM said the attacker could collect users’ names and email addresses, avatar images, and the public-sector organizations they work for from public chat rooms.\u003c/p\u003e\n\n\u003ch2 id=\"access-method-and-response\"\u003eAccess method and response\u003c/h2\u003e\n\n\u003cp\u003eDINUM said the attacker accessed the platform through a compromised user account. The agency identified the account behind the malicious requests and immediately blocked it. DINUM said this action was taken to remove the attacker’s persistent access and allow a deeper analysis of the data the attacker could access.\u003c/p\u003e\n\n\u003cp\u003eThe article does not state that DINUM has attributed the breach to a specific threat actor or group. It says DINUM has not yet attributed the breach.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-claims\"\u003eThreat actor claims\u003c/h2\u003e\n\n\u003cp\u003eA threat actor claimed responsibility for the attack over the weekend and shared a sample of stolen files. The actor said they gained access to the platform following a social engineering attack.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor claimed to have scraped nearly 650,000 messages and information from more than 73,000 accounts. According to the claims described in the article, the allegedly collected information included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEmail addresses\u003c/li\u003e\n\u003cli\u003eMeeting links\u003c/li\u003e\n\u003cli\u003eOrganization information\u003c/li\u003e\n\u003cli\u003eAccount metadata\u003c/li\u003e\n\u003cli\u003eDevice metadata\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe actor also allegedly stole more than 13.5GB of documents and media files shared by public servants using Tchap. They further claimed that hardcoded LDAP credentials were leaked through a PowerShell script.\u003c/p\u003e\n\n\u003ch2 id=\"tchap-background\"\u003eTchap background\u003c/h2\u003e\n\n\u003cp\u003eTchap was developed by DINUM in collaboration with ANSSI, the French Cybersecurity Agency, in 2018. It is described as a decentralized collaboration tool and instant messaging platform for the French public sector. The platform is based on the Matrix protocol.\u003c/p\u003e\n\n\u003cp\u003eTchap became the default app for work communications for all civil servants in early August 2025. The article says it has reached more than 300,000 monthly users and has more than 500,000 downloads on Google’s Play Store.\u003c/p\u003e\n\n\u003ch2 id=\"related-context-in-the-article\"\u003eRelated context in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article also notes that French authorities arrested a 15-year-old in May who was suspected of selling data stolen in an April cyberattack on ANTS, the country’s agency for issuing and managing official identity and registration documents. This prior incident is mentioned as additional context involving French government-related data breaches.\u003c/p\u003e\n","keyPoints":["DINUM said a breach of the Tchap encrypted messaging platform may have affected 73,467 French public-sector employees, representing less than 9% of registered users.","The attacker gained access to Tchap using a compromised user account, which DINUM identified and immediately blocked.","DINUM said private conversations on Tchap remain encrypted and protected, but public chat rooms are not encrypted and their shared data may have been accessed.","Potentially exposed user account data includes last name, first name, email address, public-sector entity, and avatar.","A threat actor claimed responsibility for the breach and alleged they scraped nearly 650,000 messages and information from more than 73,000 accounts, as well as documents and media files shared through Tchap."],"insights":["Tchap’s encryption protections did not apply uniformly across the platform, since public forums were open to all users and their messages were not encrypted by design.","A single compromised user account was enough to give the attacker persistent access until DINUM identified and blocked the account.","The exposed data may be useful for follow-on targeting because it links public-sector employees’ names and email addresses with their government entities and avatar images.","The attacker claimed the breach exposed more than chat metadata, including meeting links, device metadata, documents, media files, and hardcoded LDAP credentials from a PowerShell script."],"referencedReports":[],"body":"\u003cp\u003eThe French government said a breach of its Tchap encrypted messaging platform affected 73,467 public-sector employees, or less than 9% of more than 825,000 registered users. DINUM, the government’s digital affairs directorate, said a threat actor accessed the platform through a compromised user account. The incident was reported to France’s data protection authority, CNIL, because personal data shared by some users may have been exposed.\u003c/p\u003e\n\n\u003cp\u003eDINUM said private conversations on Tchap remain encrypted and protected, but public chat rooms are not encrypted by design. The attacker may have accessed data shared in those public forums, including users’ names, email addresses, avatar images, and the public-sector organizations they work for. DINUM said it identified and immediately blocked the account behind the malicious requests to remove persistent access and support further analysis.\u003c/p\u003e\n\n\u003cp\u003eA threat actor claimed responsibility for the attack over the weekend and said they gained access after a social engineering attack. The actor claimed to have scraped nearly 650,000 messages and data from more than 73,000 accounts, including email addresses, meeting links, organization information, account and device metadata, and over 13.5GB of documents and media files. They also alleged that hardcoded LDAP credentials were leaked through a PowerShell script.\u003c/p\u003e\n"},{"n":3,"title":"Europol Disrupts AudiA6 Crypto Laundering Service Used by Ransomware Gangs","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/europol-disrupts-audia6-crypto.html","time":"06:38","priority":"SHOULD READ","score":82,"tldr":"Europol and international partners disrupted AudiA6, a crypto laundering service allegedly used by ransomware gangs to wash more than €336 million since 2021. Two alleged administrators were arrested in Georgia, infrastructure was seized, and U.S. charges could carry up to 20 years in prison.","briefOverview":"\u003cp\u003eAuthorities in Europe disrupted AudiA6, a cryptocurrency laundering service used by ransomware gangs and cybercriminal networks. Europol said the operation cut off a key financial pipeline that had been used to launder more than €336 million since 2021. The platform allegedly helped criminals cash out stolen digital assets while obscuring the money trail from authorities.\u003c/p\u003e\n\n\u003cp\u003eThe June 10, 2026 action included the arrest of two alleged administrators in Georgia, the takedown of 25 domains, the seizure of more than 30 servers, and the replacement of AudiA6 and Dark2Web sites with law enforcement seizure banners. Authorities also seized or froze cryptocurrency assets, blocked Telegram accounts, and seized vehicles and properties in Georgia. The U.S. Department of Justice charged Ruslan Igorevich Tkachuk and Alexander Vladimirovich Ledenev with money laundering-related offenses.\u003c/p\u003e\n\n\u003cp\u003eEuropol described AudiA6 as an industrial-scale laundering operation that used thousands of fraudulent exchange accounts opened with stolen or purchased identities. The service allegedly functioned as a cryptocurrency mixing service, returning “cleaned” funds within an hour through complex transaction chains and charging commissions between 3 percent and 10 percent. Investigators identified more than 6,000 KYC records linked to money mule accounts and connected the service to more than 15 investigations worldwide involving ransomware and large-scale cryptocurrency theft.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eEuropean authorities disrupted AudiA6, a cryptocurrency laundering service allegedly used by ransomware gangs and cybercriminal networks. Europol said the service laundered more than €336 million since its launch in 2021 and served as a key financial pipeline for illicit profits. The agency described the platform as a central hub for criminals seeking to cash out stolen digital assets while hiding the money trail.\u003c/p\u003e\n\n\u003cp\u003eThe operation took place on June 10, 2026 and included arrests, searches, domain takedowns, server seizures, asset freezes, and Telegram account blocks. Two alleged administrators of Ukrainian and Russian nationality were arrested in Georgia. Authorities also seized more than 80 vehicles and multiple properties in Georgia, froze cryptocurrency assets worth €692,000, and seized €86,000 in cryptocurrency.\u003c/p\u003e\n\n\u003cp\u003eThe U.S. Department of Justice charged Ruslan Igorevich Tkachuk, 37, and Alexander Vladimirovich Ledenev, 25, with conspiracy to launder monetary instruments and sting money laundering. If convicted, both face a maximum possible sentence of 20 years in prison. The DoJ said approximately 10,333 bitcoin had been deposited, including approximately 393.39 BTC received directly from known darknet markets, ransomware organizations, cybercrime services, and other illicit sources.\u003c/p\u003e\n\n\u003cp\u003eEuropol said AudiA6 operated at industrial scale using thousands of fraudulent exchange accounts opened with stolen or purchased identities. The service allegedly accepted illicit proceeds into wallets controlled by the group and returned “cleaned” funds within an hour through complex transaction chains designed to obscure the origin of funds. Operators charged commissions ranging from 3 percent to 10 percent.\u003c/p\u003e\n\n\u003cp\u003eInvestigators also linked the AudiA6 operators to Dark2Web, a dark web cybercrime forum where criminals advertised illicit services and connected with other threat actors. More than 6,000 KYC records linked to money mule accounts were identified, many tied to Russian-speaking intermediaries recruited to move criminal proceeds through cryptocurrency exchanges. AudiA6 also used commercial email providers and email addresses linked to controlled domains to register money mule accounts.\u003c/p\u003e\n\n\u003cp\u003eEuropol said the crackdown followed a September 2025 Polish Police arrest of a Ukrainian national allegedly involved in AudiA6-linked money laundering activities. Forensic examination of seized devices helped authorities identify additional individuals connected to the operation. The investigation involved the United States Secret Service, IRS Criminal Investigation, Polish Police, and law enforcement partners from Australia, Canada, France, Georgia, Germany, Iceland, Japan, Switzerland, and the U.K.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAuthorities in Europe disrupted AudiA6, a cryptocurrency laundering service used by ransomware gangs and cybercriminal networks. Europol said the dismantling cut off a “key financial pipeline” used to wash hundreds of millions in illicit profits. The service is estimated to have laundered more than €336 million, or about $389 million, since it launched in 2021.\u003c/p\u003e\n\n\u003cp\u003eEuropol described AudiA6 as a central hub for ransomware actors and cybercriminals seeking to cash out stolen digital assets while hiding the money trail from authorities. The operators of AudiA6 are also suspected of administering Dark2Web, a dark web cybercrime forum used to advertise illicit services and connect threat actors globally.\u003c/p\u003e\n\n\u003ch2 id=\"law-enforcement-operation\"\u003eLaw Enforcement Operation\u003c/h2\u003e\n\n\u003cp\u003eThe coordinated operation took place on June 10, 2026. Authorities carried out multiple enforcement actions targeting AudiA6 and Dark2Web infrastructure, assets, and communications channels.\u003c/p\u003e\n\n\u003cp\u003eActions included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe arrest of two alleged administrators of Ukrainian and Russian nationality in Georgia.\u003c/li\u003e\n\u003cli\u003eThree property searches.\u003c/li\u003e\n\u003cli\u003eThe takedown of 25 domains.\u003c/li\u003e\n\u003cli\u003eThe seizure of more than 30 servers.\u003c/li\u003e\n\u003cli\u003eThe seizure of more than 80 vehicles and multiple properties in Georgia.\u003c/li\u003e\n\u003cli\u003eThe freezing of cryptocurrency assets worth €692,000, or about $798,000.\u003c/li\u003e\n\u003cli\u003eThe seizure of €86,000, or about $99,400, in cryptocurrency.\u003c/li\u003e\n\u003cli\u003eThe blocking of Telegram accounts used by the network.\u003c/li\u003e\n\u003cli\u003eThe replacement of clear web and dark web AudiA6 and Dark2Web websites with law enforcement seizure banners.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"u-s-charges\"\u003eU.S. Charges\u003c/h2\u003e\n\n\u003cp\u003eThe U.S. Department of Justice announced charges against the two arrested individuals: Ruslan Igorevich Tkachuk, 37, and Alexander Vladimirovich Ledenev, 25. They were charged with one count of conspiracy to launder monetary instruments and one count of sting money laundering.\u003c/p\u003e\n\n\u003cp\u003eIf convicted, both defendants face a maximum possible sentence of 20 years in prison. The DoJ said that out of approximately 10,333 bitcoin deposited, approximately 393.39 BTC were received directly from known darknet markets, ransomware organizations, cybercrime services, and other illicit sources. Those 393.39 BTC were valued at around $19,234,331 at the time of the transactions, and additional funds were deposited indirectly from illicit sources into AudiA6 wallets.\u003c/p\u003e\n\n\u003ch2 id=\"how-audia6-allegedly-operated\"\u003eHow AudiA6 Allegedly Operated\u003c/h2\u003e\n\n\u003cp\u003eEuropol characterized AudiA6 as an industrial-scale cryptocurrency laundering operation. The service relied on thousands of fraudulent exchange accounts opened using stolen or purchased identities.\u003c/p\u003e\n\n\u003cp\u003eBefore its disruption, AudiA6 was marketed as a cryptocurrency mixing service that guaranteed anonymity and speed. Customers transferred illicit proceeds to wallets controlled by the group and received “cleaned” funds in return within an hour. Europol said the process used a complex chain of transactions designed to conceal the origin of the funds.\u003c/p\u003e\n\n\u003cp\u003eThe transactions took place over private messaging platforms. The operators charged commissions ranging from 3 percent to 10 percent. Intel 471 previously reported in November 2021 that AudiA6 required a minimum balance of 27 bitcoins and charged a flat service fee between 3 percent and 5.5 percent.\u003c/p\u003e\n\n\u003ch2 id=\"fraudulent-accounts-and-money-mules\"\u003eFraudulent Accounts and Money Mules\u003c/h2\u003e\n\n\u003cp\u003eInvestigators identified more than 6,000 Know Your Customer records linked to money mule accounts. Europol said many of the mule accounts were connected to Russian-speaking intermediaries recruited specifically to move criminal proceeds through cryptocurrency exchanges.\u003c/p\u003e\n\n\u003cp\u003eAudiA6 allegedly used both commercial email providers and email addresses linked to domains under the operators’ control to register money mule accounts with cryptocurrency exchanges. The article lists the following domains connected to that activity:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003edesignli.pictures\u003c/li\u003e\n\u003cli\u003epheontx.eu\u003c/li\u003e\n\u003cli\u003esmplfy.in\u003c/li\u003e\n\u003cli\u003esumato-soft.org\u003c/li\u003e\n\u003cli\u003etechnobrains.dev\u003c/li\u003e\n\u003cli\u003elett.email\u003c/li\u003e\n\u003cli\u003etrayo.app\u003c/li\u003e\n\u003cli\u003edeliverly.top\u003c/li\u003e\n\u003cli\u003einboxly.top\u003c/li\u003e\n\u003cli\u003epostfast.eu\u003c/li\u003e\n\u003cli\u003epostino.click\u003c/li\u003e\n\u003cli\u003einboxally.agency\u003c/li\u003e\n\u003cli\u003emailora.eu\u003c/li\u003e\n\u003cli\u003epostify.email\u003c/li\u003e\n\u003cli\u003equix.express\u003c/li\u003e\n\u003cli\u003eflowcomm.click\u003c/li\u003e\n\u003cli\u003eqube.black\u003c/li\u003e\n\u003cli\u003edeliverlett.com\u003c/li\u003e\n\u003cli\u003elettermail.eu\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"links-to-other-cybercrime-activity\"\u003eLinks to Other Cybercrime Activity\u003c/h2\u003e\n\n\u003cp\u003eAudiA6 has been linked to more than 15 investigations worldwide involving ransomware attacks and large-scale cryptocurrency theft. The article also says that a December 2025 TRM Labs analysis found funds stolen from the 2022 LastPass hack were routed through Cryptex and AudiA6.\u003c/p\u003e\n\n\u003cp\u003eThe suspected connection between AudiA6 and Dark2Web broadened the scope of the enforcement action. Dark2Web was described as a dark web cybercrime forum where cybercriminals advertised illicit services and connected with other threat actors across the world.\u003c/p\u003e\n\n\u003ch2 id=\"investigative-path-and-international-partners\"\u003eInvestigative Path and International Partners\u003c/h2\u003e\n\n\u003cp\u003eEuropol said the crackdown was enabled by an earlier enforcement action by the Polish Police. That earlier action led to the arrest of a Ukrainian national in September 2025 for alleged involvement in money laundering activities connected to the AudiA6 group.\u003c/p\u003e\n\n\u003cp\u003eForensic examination of seized electronic devices belonging to that suspect helped authorities identify additional individuals linked to the operation. The investigation was carried out by the United States Secret Service and IRS Criminal Investigation, along with the Polish Police and law enforcement partners from Australia, Canada, France, Georgia, Germany, Iceland, Japan, Switzerland, and the U.K.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article frames the AudiA6 takedown as an example of law enforcement targeting the financial infrastructure that supports ransomware and cybercrime. Europol said ransomware groups and cybercriminal networks increasingly rely on chain-hopping, decentralized exchanges, and “mixer-as-a-service” platforms to move illicit cryptocurrency across multiple blockchains within minutes.\u003c/p\u003e\n\n\u003cp\u003eThe findings highlight the use of fraudulent exchange accounts, mule wallets, privacy-focused tools, and laundering services designed to conceal financial trails and bypass anti-money laundering controls. By disrupting AudiA6, authorities targeted a service alleged to have supported large-scale laundering for ransomware actors, darknet markets, cybercrime services, and other illicit sources.\u003c/p\u003e\n","keyPoints":["Europol said authorities disrupted AudiA6, a cryptocurrency laundering service used by ransomware gangs and cybercriminal networks to launder more than €336 million since 2021.","The June 10, 2026 operation included the arrest of two alleged administrators in Georgia, searches, takedowns of 25 domains, seizure of more than 30 servers, and blocking of Telegram accounts used by the network.","The U.S. Department of Justice charged Ruslan Igorevich Tkachuk and Alexander Vladimirovich Ledenev with conspiracy to launder monetary instruments and sting money laundering, each carrying a maximum possible sentence of 20 years in prison if convicted.","Europol said AudiA6 used thousands of fraudulent exchange accounts opened with stolen or purchased identities and identified more than 6,000 KYC records linked to money mule accounts.","AudiA6 allegedly operated as a cryptocurrency mixing service that returned “cleaned” funds within an hour through complex transaction chains while charging commissions between 3 percent and 10 percent."],"insights":["The AudiA6 investigation advanced after Polish Police arrested a Ukrainian national in September 2025 and forensic analysis of seized devices identified additional individuals linked to the operation.","AudiA6’s laundering model depended heavily on identity abuse, with investigators identifying more than 6,000 KYC records tied to money mule exchange accounts.","The operators allegedly controlled both a laundering service and the Dark2Web cybercrime forum, indicating the same network may have supported both financial cash-out and criminal marketplace coordination.","The service used email infrastructure tied to its own domains, giving investigators a concrete set of domains associated with fraudulent exchange account registration activity.","Funds from high-profile cryptocurrency thefts, including assets stolen in the 2022 LastPass hack, were reportedly routed through AudiA6 as recently as December 2025."],"referencedReports":[{"title":"Intel 471 November 2021 report on AudiA6","url":"https://thehackernews.com/2022/05/us-sanctions-cryptocurrency-mixer.html","publisher":"Intel 471","context":"The article says an Intel 471 report published in November 2021 disclosed AudiA6’s minimum balance requirement and service fees.","category":"","primary":false},{"title":"TRM Labs analysis of funds stolen from the 2022 LastPass hack","url":"https://thehackernews.com/2025/12/lastpass-2022-breach-led-to-years-long.html","publisher":"TRM Labs","context":"The article says a December 2025 TRM Labs analysis found that funds stolen from the 2022 LastPass hack were routed through Cryptex and AudiA6.","category":"","primary":false}],"body":"\u003cp\u003eAuthorities in Europe disrupted AudiA6, a cryptocurrency laundering service used by ransomware gangs and cybercriminal networks. Europol said the operation cut off a key financial pipeline that had been used to launder more than €336 million since 2021. The platform allegedly helped criminals cash out stolen digital assets while obscuring the money trail from authorities.\u003c/p\u003e\n\n\u003cp\u003eThe June 10, 2026 action included the arrest of two alleged administrators in Georgia, the takedown of 25 domains, the seizure of more than 30 servers, and the replacement of AudiA6 and Dark2Web sites with law enforcement seizure banners. Authorities also seized or froze cryptocurrency assets, blocked Telegram accounts, and seized vehicles and properties in Georgia. The U.S. Department of Justice charged Ruslan Igorevich Tkachuk and Alexander Vladimirovich Ledenev with money laundering-related offenses.\u003c/p\u003e\n\n\u003cp\u003eEuropol described AudiA6 as an industrial-scale laundering operation that used thousands of fraudulent exchange accounts opened with stolen or purchased identities. The service allegedly functioned as a cryptocurrency mixing service, returning “cleaned” funds within an hour through complex transaction chains and charging commissions between 3 percent and 10 percent. Investigators identified more than 6,000 KYC records linked to money mule accounts and connected the service to more than 15 investigations worldwide involving ransomware and large-scale cryptocurrency theft.\u003c/p\u003e\n"},{"n":5,"title":"LangGraph Flaw Chain Exposes Self-Hosted AI Agents to Remote Code Execution","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/langgraph-flaw-chain-exposes-self.html","time":"09:50","priority":"SHOULD READ","score":82,"tldr":"Researchers disclosed three patched LangGraph flaws, including a chain in self-hosted deployments that can combine SQL injection with unsafe deserialization to achieve remote code execution. Users running affected SQLite or Redis checkpointers should update immediately and restrict exposure of LangGraph servers and checkpoint access.","briefOverview":"\u003cp\u003eCybersecurity researchers disclosed details of three now-patched security flaws affecting LangGraph, an open-source framework created by LangChain for building complex, stateful, multi-agent AI applications. Check Point said the issues include a critical vulnerability chain that could result in remote code execution on self-hosted deployments. LangChain\u0026rsquo;s managed LangSmith Deployment platform is not affected.\u003c/p\u003e\n\n\u003cp\u003eThe most serious chain combines CVE-2025-67644, a SQL injection flaw in LangGraph\u0026rsquo;s SQLite checkpoint implementation, with CVE-2026-28277, an unsafe msgpack deserialization issue in LangGraph. According to researcher Yarden Porat, an attacker could use a malicious filter parameter to force a fake checkpoint row into database query results, causing attacker-controlled serialized data to be deserialized. This could execute arbitrary code when the application processes the checkpoint data.\u003c/p\u003e\n\n\u003cp\u003eThe flaws affect langgraph-checkpoint-sqlite versions before 3.0.1, langgraph versions before 1.0.10, and @langchain/langgraph-checkpoint-redis versions before 1.0.1. Check Point said the chain is exploitable in self-hosted deployments using the SQLite or Redis checkpointer with user-controlled filter input. Users are advised to apply fixes, implement authentication, avoid long-lived static secrets, enforce network segmentation, treat AI agents as privileged identities, and apply least privilege.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers disclosed three now-patched vulnerabilities in LangGraph, including a chain that could allow remote code execution. LangGraph is an open-source framework from LangChain for building complex, stateful, and multi-agent AI agentic applications. Check Point said an SQL injection in LangGraph could allow attackers to gain full control of a server by exploiting how the system processes and handles data.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities are CVE-2025-67644, CVE-2026-28277, and CVE-2026-27022. CVE-2025-67644 is a SQL injection flaw in LangGraph\u0026rsquo;s SQLite checkpoint implementation affecting langgraph-checkpoint-sqlite versions before 3.0.1. CVE-2026-28277 is an unsafe msgpack deserialization issue affecting langgraph versions before 1.0.10, and CVE-2026-27022 is a RediSearch Query Injection in @langchain/langgraph-checkpoint-redis affecting versions before 1.0.1.\u003c/p\u003e\n\n\u003cp\u003eCheck Point said the vulnerability chain is exploitable in self-hosted deployments using the SQLite or Redis checkpointer with user-controlled filter input. The article states that LangChain\u0026rsquo;s managed platform, LangSmith Deployment, is not affected. Security researcher Yarden Porat is credited with discovering and reporting all three flaws.\u003c/p\u003e\n\n\u003cp\u003eThe remote code execution chain relies on the application exposing the get_state_history() endpoint, which allows historical checkpoints to be retrieved based on metadata. In the described sequence, an attacker prepares a malicious msgpack payload, sends a malicious filter parameter that exploits SQL injection, causes a fake checkpoint row with attacker-controlled serialized data to be returned, and then triggers unsafe deserialization when the application processes the result. This allows the attacker to execute the payload on the server.\u003c/p\u003e\n\n\u003cp\u003eLangGraph described CVE-2026-28277 as a post-exploitation issue because successful exploitation requires the ability to write attacker-controlled checkpoint data and turn it into code execution in the application runtime. The maintainers said escalation from write access to the checkpoint store to code execution may expose runtime secrets or provide access to other systems the runtime can reach. Users are advised to apply the latest fixes, add authentication for self-hosted LangGraph servers, avoid long-lived static secrets, enforce network segmentation, treat AI agents as privileged identities, and apply least privilege.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers disclosed details of three now-patched vulnerabilities affecting LangGraph, an open-source framework created by LangChain for building complex, stateful, and multi-agent AI agentic applications. The flaws include a critical vulnerability chain that could result in remote code execution.\u003c/p\u003e\n\n\u003cp\u003eCheck Point said an SQL injection in a LangGraph function could allow attackers to gain full control via remote code execution of a server by exploiting weaknesses in how the system processes and handles data. Security researcher Yarden Porat is credited with discovering and reporting all three flaws.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products-and-vulnerabilities\"\u003eAffected Products and Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies three vulnerabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2025-67644\u003c/strong\u003e: A SQL injection vulnerability in LangGraph\u0026rsquo;s SQLite checkpoint implementation that allows attackers to manipulate SQL queries through metadata filter keys. It affects \u003cstrong\u003elanggraph-checkpoint-sqlite versions before 3.0.1\u003c/strong\u003e and has a CVSS score of \u003cstrong\u003e7.3\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-28277\u003c/strong\u003e: An unsafe \u003cstrong\u003emsgpack\u003c/strong\u003e deserialization vulnerability in LangGraph that could be used to trigger object reconstruction when a checkpoint is loaded by an attacker who can modify checkpoint data. It affects \u003cstrong\u003elanggraph versions before 1.0.10\u003c/strong\u003e and has a CVSS score of \u003cstrong\u003e6.8\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-27022\u003c/strong\u003e: A \u003cstrong\u003eRediSearch Query Injection\u003c/strong\u003e in \u003cstrong\u003e@langchain/langgraph-checkpoint-redis\u003c/strong\u003e that can be used to bypass access controls. It affects \u003cstrong\u003e@langchain/langgraph-checkpoint-redis versions before 1.0.1\u003c/strong\u003e and has a CVSS score of \u003cstrong\u003e6.5\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-conditions\"\u003eExploitation Conditions\u003c/h2\u003e\n\n\u003cp\u003eCheck Point said the vulnerability chain is exploitable in \u003cstrong\u003eself-hosted deployments\u003c/strong\u003e using the SQLite or Redis checkpointer with \u003cstrong\u003euser-controlled filter input\u003c/strong\u003e. The article states that \u003cstrong\u003eLangChain\u0026rsquo;s managed platform, LangSmith Deployment, is not affected\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe remote code execution chain specifically depends on the application exposing the \u003cstrong\u003eget_state_history()\u003c/strong\u003e endpoint. That endpoint allows an attacker to retrieve historical checkpoints based on their metadata.\u003c/p\u003e\n\n\u003ch2 id=\"remote-code-execution-chain\"\u003eRemote Code Execution Chain\u003c/h2\u003e\n\n\u003cp\u003eAccording to Yarden Porat, \u003cstrong\u003eCVE-2025-67644\u003c/strong\u003e and \u003cstrong\u003eCVE-2026-28277\u003c/strong\u003e can be chained to achieve remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the attack sequence as follows:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eThe attacker prepares a \u003cstrong\u003emsgpack payload\u003c/strong\u003e containing instructions to execute arbitrary code.\u003c/li\u003e\n\u003cli\u003eThe attacker sends a malicious filter parameter that exploits the SQL injection vulnerability.\u003c/li\u003e\n\u003cli\u003eThe SQL injection causes a fake checkpoint row to be returned in the database query results.\u003c/li\u003e\n\u003cli\u003eThe fake row\u0026rsquo;s checkpoint column contains attacker-controlled serialized data.\u003c/li\u003e\n\u003cli\u003eWhen the application processes the query results, it deserializes the malicious checkpoint\u0026rsquo;s BLOB.\u003c/li\u003e\n\u003cli\u003eThe attacker exploits the unsafe deserialization vulnerability to execute the payload, resulting in remote code execution on the server.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"langgraph-s-characterization-of-cve-2026-28277\"\u003eLangGraph\u0026rsquo;s Characterization of CVE-2026-28277\u003c/h2\u003e\n\n\u003cp\u003eLangGraph described \u003cstrong\u003eCVE-2026-28277\u003c/strong\u003e as a post-exploitation issue. The maintainers said successful exploitation requires the ability to write attacker-controlled checkpoint data and turn that into code execution in the application runtime.\u003c/p\u003e\n\n\u003cp\u003eLangGraph also said the issue does not pose risks to existing LangSmith-hosted deployments. In the described threat model, an attacker must tamper with the checkpoint persistence layer used by the deployment, and typical hosted configurations are designed to prevent such access.\u003c/p\u003e\n\n\u003cp\u003eThe maintainers said escalation from write access to the checkpoint store to code execution may expose runtime secrets or provide access to other systems the runtime can reach.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eCheck Point said the findings show how classic vulnerability classes such as SQL injection can become more potent when they appear inside AI agent frameworks. The article notes that these frameworks may carry elevated access and trust, which can open the door to sensitive data exposure.\u003c/p\u003e\n\n\u003cp\u003eThe issue is significant for self-hosted LangGraph deployments because the vulnerable conditions involve checkpoint storage, user-controlled filter input, and exposed state-history retrieval functionality. The managed LangSmith Deployment platform is explicitly stated to be unaffected.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended Response\u003c/h2\u003e\n\n\u003cp\u003eUsers are advised to apply the latest fixes for the affected packages. The article also recommends implementing authentication for self-hosted LangGraph servers.\u003c/p\u003e\n\n\u003cp\u003eAdditional recommended measures include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAvoiding long-lived static secrets.\u003c/li\u003e\n\u003cli\u003eEnforcing network segmentation.\u003c/li\u003e\n\u003cli\u003eTreating AI agents as privileged identities.\u003c/li\u003e\n\u003cli\u003eApplying the principle of least privilege to limit an agent\u0026rsquo;s access footprint.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Cybersecurity researchers disclosed three now-patched vulnerabilities affecting LangGraph, including a critical chain that could lead to remote code execution.","CVE-2025-67644 is a SQL injection flaw in LangGraph's SQLite checkpoint implementation that affects langgraph-checkpoint-sqlite versions before 3.0.1.","CVE-2026-28277 is an unsafe msgpack deserialization flaw in LangGraph that affects langgraph versions before 1.0.10.","CVE-2025-67644 and CVE-2026-28277 can be chained in self-hosted deployments using the SQLite checkpointer with user-controlled filter input to execute attacker-controlled code.","Check Point said LangChain's managed LangSmith Deployment platform is not affected by the vulnerability chain."],"insights":["The remote code execution chain depends on the application exposing the get_state_history() endpoint and accepting user-controlled metadata filters, making endpoint exposure and input control central to risk reduction.","A flaw described as post-exploitation by LangGraph can become part of a pre-authored remote code execution chain when paired with SQL injection that injects attacker-controlled checkpoint data into query results.","The issue highlights that checkpoint stores in AI agent frameworks should be treated as highly sensitive persistence layers because tampering with checkpoint data can expose runtime secrets or provide access to other systems reachable by the runtime.","Self-hosted LangGraph deployments face different risk than LangChain's managed LangSmith Deployment platform, so organizations should not assume managed-platform protections apply to their own deployments."],"referencedReports":[{"title":"When Your AI Agent's Memory Becomes a Security Liability","url":"https://blog.checkpoint.com/research/when-your-ai-agents-memory-becomes-a-security-liability/","publisher":"Check Point","context":"The article cites Check Point's research explaining that an SQL injection in LangGraph could allow attackers to gain full control via remote code execution.","category":"","primary":false},{"title":"From SQLi to RCE: Exploiting LangGraph's Checkpointer","url":"https://research.checkpoint.com/2026/from-sqli-to-rce-exploiting-langgraphs-checkpointer/","publisher":"Check Point Research","context":"The article cites Yarden Porat's technical analysis describing how CVE-2025-67644 and CVE-2026-28277 can be chained to achieve remote code execution.","category":"","primary":false},{"title":"CVE-2025-67644 LangGraph SQLite Checkpoint SQL Injection Advisory","url":"https://github.com/langchain-ai/langgraph/security/advisories/GHSA-9rwj-6rc7-p77c","publisher":"LangChain","context":"The article links to the GitHub security advisory for the SQL injection vulnerability affecting langgraph-checkpoint-sqlite versions before 3.0.1.","category":"","primary":false},{"title":"CVE-2026-28277 LangGraph Unsafe msgpack Deserialization Advisory","url":"https://github.com/langchain-ai/langgraph/security/advisories/GHSA-g48c-2wqr-h844","publisher":"LangChain","context":"The article links to the GitHub security advisory for the unsafe msgpack deserialization vulnerability affecting LangGraph versions before 1.0.10.","category":"","primary":false},{"title":"CVE-2026-27022 LangGraphJS RediSearch Query Injection Advisory","url":"https://github.com/langchain-ai/langgraphjs/security/advisories/GHSA-5mx2-w598-339m","publisher":"LangChain","context":"The article links to the GitHub security advisory for the RediSearch query injection vulnerability affecting @langchain/langgraph-checkpoint-redis versions before 1.0.1.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers disclosed details of three now-patched security flaws affecting LangGraph, an open-source framework created by LangChain for building complex, stateful, multi-agent AI applications. Check Point said the issues include a critical vulnerability chain that could result in remote code execution on self-hosted deployments. LangChain\u0026rsquo;s managed LangSmith Deployment platform is not affected.\u003c/p\u003e\n\n\u003cp\u003eThe most serious chain combines CVE-2025-67644, a SQL injection flaw in LangGraph\u0026rsquo;s SQLite checkpoint implementation, with CVE-2026-28277, an unsafe msgpack deserialization issue in LangGraph. According to researcher Yarden Porat, an attacker could use a malicious filter parameter to force a fake checkpoint row into database query results, causing attacker-controlled serialized data to be deserialized. This could execute arbitrary code when the application processes the checkpoint data.\u003c/p\u003e\n\n\u003cp\u003eThe flaws affect langgraph-checkpoint-sqlite versions before 3.0.1, langgraph versions before 1.0.10, and @langchain/langgraph-checkpoint-redis versions before 1.0.1. Check Point said the chain is exploitable in self-hosted deployments using the SQLite or Redis checkpointer with user-controlled filter input. Users are advised to apply fixes, implement authentication, avoid long-lived static secrets, enforce network segmentation, treat AI agents as privileged identities, and apply least privilege.\u003c/p\u003e\n"}]</script>
