Fake Document Factory Dismantled in Spain\u003c/h3\u003e\n\n\u003cp\u003eFrench and Spanish authorities, with Europol support, dismantled an online marketplace selling fake identity documents to migrant smuggling rings in Europe. The operation targeted documents used to evade border controls, fraudulently obtain residence rights, and facilitate secondary movement within Europe.\u003c/p\u003e\n\n\u003cp\u003eAuthorities located a counterfeit document production facility in Alicante, Spain. The operation resulted in one arrest and the seizure of:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApproximately 800 forged European documents.\u003c/li\u003e\n\u003cli\u003eDocument-production equipment.\u003c/li\u003e\n\u003cli\u003eDigital devices.\u003c/li\u003e\n\u003cli\u003eA vehicle.\u003c/li\u003e\n\u003cli\u003e€1,580 in cash.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eEuropol described the site as a fully operational counterfeit document workshop.\u003c/p\u003e\n\n\u003ch3 id=\"ibm-whistleblower-allegations\"\u003eIBM Whistleblower Allegations\u003c/h3\u003e\n\n\u003cp\u003eThe article reports that former IBM cybersecurity executive William Barlow accused IBM of being hacked three times in the previous decade by foreign governments and then covering up the breaches.\u003c/p\u003e\n\n\u003cp\u003eBarlow, IBM’s vice president of threat intelligence until August 2019, said IBM concluded that Chinese hackers breached its core network between 2013 and 2016. He also alleged that breaches at two other IBM subsidiaries were covered up in a similar way. The claims were revealed in a lawsuit unsealed the previous week.\u003c/p\u003e\n\n\u003ch2 id=\"ai-tooling-agent-skills-and-scanner-bypass\"\u003eAI Tooling, Agent Skills, and Scanner Bypass\u003c/h2\u003e\n\n\u003cp\u003eTrail of Bits said it bypassed ClawHub’s malicious skill detector, Cisco’s agent skill scanner, and scanners integrated into skills.sh. The company used this to push rogue skills to public skill marketplaces and steal sensitive data from developer systems.\u003c/p\u003e\n\n\u003cp\u003eOne malicious skill used prompt injection to persuade the guard model that the malicious payload was harmless. The skill instructed an agent to configure npm and yarn package managers to use an attacker-controlled registry, while presenting the change as corporate environment and virtual private network configuration.\u003c/p\u003e\n\n\u003cp\u003eThe article’s stated takeaway is that trust cannot be outsourced to third-party scanners, and that such scanners cannot reliably detect malicious content in agent skills. It recommends that organizations curate skill marketplaces for employees and agents using trustworthy open-source collections.\u003c/p\u003e\n\n\u003ch2 id=\"vect-ransomware-analysis\"\u003eVECT Ransomware Analysis\u003c/h2\u003e\n\n\u003cp\u003eA new analysis of the Windows version of VECT ransomware found additional flaws. Morphisec said the flaws can leave files renamed, partially encrypted, inconsistently modified, or damaged in ways that the attacker’s own decryptor cannot reliably reverse.\u003c/p\u003e\n\n\u003cp\u003eThe article says this changes recovery expectations because files with the same .vect suffix may have different outcomes, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFiles that were only renamed.\u003c/li\u003e\n\u003cli\u003eFiles encrypted in a single pass.\u003c/li\u003e\n\u003cli\u003eLarge files with only selected regions modified.\u003c/li\u003e\n\u003cli\u003eFiles left inconsistent because of failed writes or shared-state races.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"trending-cves\"\u003eTrending CVEs\u003c/h2\u003e\n\n\u003cp\u003eThe article lists many trending CVEs described as high-severity, widely used, or already being probed in the wild. It recommends patching what is present in an environment and prioritizing those marked urgent.\u003c/p\u003e\n\n\u003cp\u003eThe listed vulnerabilities affect products and ecosystems including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSolarWinds Serv-U: CVE-2026-28318.\u003c/li\u003e\n\u003cli\u003eFFmpeg: CVE-2026-39210 through CVE-2026-39217.\u003c/li\u003e\n\u003cli\u003eCisco Catalyst SD-WAN Manager: CVE-2026-20245.\u003c/li\u003e\n\u003cli\u003eCisco Unified Communications Manager: CVE-2026-20230.\u003c/li\u003e\n\u003cli\u003eEverest Forms Pro plugin: CVE-2026-3300.\u003c/li\u003e\n\u003cli\u003eGoogle Android: CVE-2025-48595.\u003c/li\u003e\n\u003cli\u003ePCTCore64.sys: CVE-2026-8501.\u003c/li\u003e\n\u003cli\u003eVerizon IMS network: CVE-2026-10629.\u003c/li\u003e\n\u003cli\u003eAppsmith: CVE-2026-7299.\u003c/li\u003e\n\u003cli\u003eCollibra Agent: CVE-2026-10621 and CVE-2026-10622.\u003c/li\u003e\n\u003cli\u003eHP Poly Voice: CVE-2026-0826.\u003c/li\u003e\n\u003cli\u003eThemeum Kirki WordPress plugin: CVE-2026-8206.\u003c/li\u003e\n\u003cli\u003eRedis: CVE-2026-23479, CVE-2026-23631, CVE-2026-25243, CVE-2026-25588, and CVE-2026-25589.\u003c/li\u003e\n\u003cli\u003eAcer Wave 7 routers: CVE-2026-49200 and CVE-2026-49201.\u003c/li\u003e\n\u003cli\u003eSecurly: CVE-2026-8874, CVE-2026-8876, CVE-2026-8878, CVE-2026-8879, CVE-2026-8881, CVE-2026-8888, and CVE-2026-8889.\u003c/li\u003e\n\u003cli\u003eGoogle Chrome: CVE-2026-10881, CVE-2026-10882, and CVE-2026-10883.\u003c/li\u003e\n\u003cli\u003eBroadcom VMware Cloud Foundation Operations: CVE-2026-41722, CVE-2026-41723, and CVE-2026-41724.\u003c/li\u003e\n\u003cli\u003eUniFi OS Server: CVE-2026-34908 and CVE-2026-34909.\u003c/li\u003e\n\u003cli\u003eHugging Face: CVE-2026-4372.\u003c/li\u003e\n\u003cli\u003eMicrosoft Edge: CVE-2026-45495.\u003c/li\u003e\n\u003cli\u003eApache ActiveMQ: CVE-2026-42253.\u003c/li\u003e\n\u003cli\u003eIvanti ITSM: CVE-2026-9614.\u003c/li\u003e\n\u003cli\u003eLaravel framework: CVE-2026-48019.\u003c/li\u003e\n\u003cli\u003eKMW CCTV cameras: CVE-2026-5386.\u003c/li\u003e\n\u003cli\u003eTP-Link Archer BE450 v1 and Archer BE7200 v1: CVE-2026-5509.\u003c/li\u003e\n\u003cli\u003eStrongDM: CVE-2026-4387.\u003c/li\u003e\n\u003cli\u003eIBM WebSphere: CVE-2026-8633.\u003c/li\u003e\n\u003cli\u003eMCP Toolbox: CVE-2026-9739.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"webinars-and-tools-mentioned\"\u003eWebinars and Tools Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article lists three cybersecurity webinars:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA webinar on validating what SIEM, EDR, and SOC tools catch.\u003c/li\u003e\n\u003cli\u003eA webinar on stopping AI-powered attacks before they spread.\u003c/li\u003e\n\u003cli\u003eA webinar on detecting and stopping risky AI use in real time.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also lists two cybersecurity tools:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCAI, an open-source framework for building AI agents for cybersecurity work, including security testing, vulnerability discovery, defense automation, reconnaissance, exploitation, privilege escalation, and security assessment.\u003c/li\u003e\n\u003cli\u003ePMG, a free open-source tool that blocks malicious open-source packages before installation by sitting in front of package managers such as npm, pip, and Poetry and checking packages with SafeDep threat intelligence.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article includes a disclaimer that these tools are for research and learning, have not been through a formal security audit, and should be tested in a sandbox before production use.\u003c/p\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article frames the week as a continuation of recurring cybersecurity problems rather than a set of entirely new patterns. It repeatedly points to old weaknesses showing up again, including package poisoning, credential theft, chatbot or support-tool abuse, malicious installers, exposed tokens, phishing, and quiet email espionage.\u003c/p\u003e\n\n\u003cp\u003eThe conclusion advises readers to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePatch what matters first.\u003c/li\u003e\n\u003cli\u003eWarn people who click suspicious content.\u003c/li\u003e\n\u003cli\u003eBack up important data.\u003c/li\u003e\n\u003cli\u003eExpect another messy week of cyber activity.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Microsoft’s GitHub repositories were impacted by the Miasma self-replicating supply chain attack, affecting 73 repositories across Azure, Azure-Samples, Microsoft, and MicrosoftDocs organizations.","Google patched 124 Android security vulnerabilities in June 2026, including CVE-2025-48595, a high-severity Framework privilege escalation flaw under limited, targeted exploitation.","U.S. authorities and private companies disrupted Southeast Asia-based cyber-enabled fraud schemes by taking down millions of accounts and freezing more than $3.8 million in cryptocurrency.","Unknown attackers spied on a senior global stock exchange executive’s Outlook mailbox for at least five months and exfiltrated email data through Dropbox and Microsoft OneDrive Personal.","Meta said 20,225 Instagram accounts may have been impacted by attacks that abused an AI-powered support tool to link attacker-controlled email addresses to targeted accounts."],"insights":["The Miasma incident shows that self-replicating supply chain malware can reach major vendor repositories quickly enough that platform-level intervention, such as GitHub disabling access, may be required for containment.","The Instagram account takeover campaign demonstrates that AI-powered internal support tooling can become an account recovery weakness when attackers can manipulate it into adding attacker-controlled email addresses.","The stock exchange mailbox intrusion highlights how low-volume, periodic exfiltration through common cloud services like Dropbox and OneDrive Personal can sustain espionage for months without obvious detection.","Several package ecosystem incidents involved post-install hooks, typosquatting, or impersonation of trusted developer tools, making pre-install package screening especially actionable for npm and PyPI users.","The malicious npm package that leaked its own Telegram bot token illustrates that some supply-chain malware is operationally sloppy, creating opportunities for defenders to identify attacker infrastructure from exposed secrets."],"referencedReports":[{"title":"Five Eyes Joint Bulletin: Safeguarding Our Secrets","url":"https://www.mi5.gov.uk/five-eyes-joint-bulletin-safeguarding-our-secrets","publisher":"Five Eyes intelligence partners","context":"The article cites a Five Eyes advisory warning that Chinese military intelligence services are using LinkedIn and other professional networking sites to target people with access to sensitive government, military, foreign policy, or economic information.","category":"","primary":false},{"title":"Stardrop Attack","url":"https://opensourcemalware.com/blog/stardrop-attack","publisher":"OpenSourceMalware","context":"The article references OpenSourceMalware research on malicious npm packages that impersonate an AI coding tool and harvest credentials and API keys.","category":"","primary":false},{"title":"Malicious faster-axios npm Epsilon Stealer","url":"https://safedep.io/malicious-faster-axios-npm-epsilon-stealer/","publisher":"SafeDep","context":"The article cites SafeDep analysis of two trojanized npm packages, turbo-axios and faster-axios, that deliver Epsilon Stealer.","category":"","primary":false},{"title":"Malware Slop 2: Malicious npm Package Leaks Its Own Bot’s Telegram Private Token","url":"https://www.ox.security/blog/malware-slop-2-malicious-npm-package-leaks-its-own-bots-telegram-private-token/","publisher":"OX Security","context":"The article references OX Security research on the malicious npm package cms-store-ren, which exfiltrates developer data to Telegram and exposes its own bot API token.","category":"","primary":false},{"title":"Inside Cross-Platform Propagation of New Gafgyt Variant C0XMO","url":"https://www.fortinet.com/blog/threat-research/inside-cross-platform-propagation-of-new-gafgyt-variant-c0xmo","publisher":"Fortinet FortiGuard Labs","context":"The article cites Fortinet FortiGuard Labs technical analysis of the C0XMO Gafgyt variant targeting DD-WRT routers and other devices.","category":"","primary":false},{"title":"VECT Ransomware That Can’t Decrypt","url":"https://www.morphisec.com/blog/vect-ransomware-that-cant-decrypt/","publisher":"Morphisec","context":"The article references Morphisec analysis identifying flaws in the Windows version of VECT ransomware that can leave files inconsistently modified or unrecoverable by the attacker’s decryptor.","category":"","primary":false},{"title":"Iran Handala Physical Threats","url":"https://www.recordedfuture.com/research/iran-handala-physical-threats","publisher":"Recorded Future","context":"The article cites Recorded Future research linking Iran’s Handala persona to external physical and influence operations targeting U.S. and Israeli interests.","category":"","primary":false},{"title":"OverlayPhantom Android Banking Trojan","url":"https://cyble.com/blog/overlayphantom-android-banking-trojan/","publisher":"Cyble","context":"The article references Cyble research on the OverlayPhantom Android banking trojan targeting more than 180 apps across 10 countries.","category":"","primary":false},{"title":"These Convincing Copyright Notices Are Designed to Steal Google Logins","url":"https://www.malwarebytes.com/blog/threat-intel/2026/06/these-convincing-copyright-notices-are-designed-to-steal-google-logins","publisher":"Malwarebytes","context":"The article cites Malwarebytes threat intelligence on fake copyright infringement notices used to steal Google credentials from Chrome extension developers.","category":"","primary":false},{"title":"The Sorry State of Skill Distribution","url":"https://blog.trailofbits.com/2026/06/03/the-sorry-state-of-skill-distribution/","publisher":"Trail of Bits","context":"The article references Trail of Bits research showing that malicious skill scanners could be bypassed to publish rogue skills and steal sensitive developer data.","category":"","primary":false},{"title":"BlackToad Network Manipulation in an AutoIt Payload","url":"https://www.jumpsec.com/guides/blacktoad-network-manipulation-in-an-autoit-payload/","publisher":"JUMPSEC","context":"The article cites JUMPSEC analysis of payment slip-themed phishing emails that deliver Remcos RAT through a multi-stage AutoIt-based chain.","category":"","primary":false},{"title":"Pink Extortion Brand Activity","url":"https://github.com/PaloAltoNetworks/Unit42-timely-threat-intel/blob/main/2026-06-03-Pink-Extortion-Brand-Activity.txt","publisher":"Palo Alto Networks Unit 42","context":"The article references Unit 42 threat intelligence on the Pink cybercrime brand, which uses vishing for initial access and data extortion.","category":"","primary":false}],"body":"\u003cp\u003eThe article is a weekly cybersecurity recap covering a broad set of incidents, vulnerabilities, scams, malware campaigns, and research findings. Its lead threat is the Miasma self-replicating supply chain attack, which affected 73 Microsoft GitHub repositories across Azure, Azure-Samples, Microsoft, and MicrosoftDocs organizations. GitHub disabled access to the impacted repositories, and Miasma is assessed to be a variant of the Mini Shai-Hulud worm released by TeamPCP in mid-May 2026.\u003c/p\u003e\n\n\u003cp\u003eOther major stories include Google patching 124 Android vulnerabilities, including CVE-2025-48595, a high-severity Framework privilege escalation flaw under limited, targeted exploitation. The recap also highlights U.S. action against Southeast Asia-based cyber-enabled fraud schemes, China-linked TA4922 expanding into Europe and Africa, and OP-512 targeting Microsoft IIS servers with a custom web shell framework. A separate espionage case involved attackers monitoring a senior stock exchange executive’s Outlook mailbox for at least five months and exfiltrating data through Dropbox and OneDrive Personal.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that many successful attacks still rely on familiar weaknesses, including poisoned packages, phishing, malicious installers, exposed tokens, and abuse of trusted tools. It lists numerous trending CVEs across Android, SolarWinds Serv-U, Cisco, Redis, Chrome, VMware, UniFi OS Server, Hugging Face, Apache ActiveMQ, Ivanti, and other products. It concludes by urging readers to prioritize important patches, warn users who are likely to click malicious content, and back up critical data.\u003c/p\u003e\n"},{"n":24,"title":"8th June – Threat Intelligence Report","source":"research.checkpoint.com","sourceColorIdx":4,"link":"https://research.checkpoint.com/2026/8th-june-threat-intelligence-report/","time":"14:47","priority":"MAY READ","score":40,"tldr":"Check Point’s weekly threat report highlights major data breaches, emerging AI-enabled attack techniques, and several actively exploited vulnerabilities affecting Android, Cisco, SolarWinds Serv-U, and Windows Netlogon. Organizations should prioritize patching exploited flaws and watch for supply-chain compromise, account takeover, and malware distribution campaigns.","briefOverview":"\u003cp\u003eCheck Point’s 8th June Threat Intelligence Report summarizes cyber activity from the week of 1st June, covering breaches, AI-related threats, exploited vulnerabilities, and threat intelligence findings. The report highlights incidents involving DentaQuest, Dashlane, the United Nations World Food Programme, Russian officials, and Hola’s Windows browser delivery pipeline. Impacts included exposed personal and health-related data, stolen encrypted password vaults for fewer than 20 Dashlane users, and a cryptominer delivered through a supply chain compromise.\u003c/p\u003e\n\n\u003cp\u003eThe report also emphasizes emerging AI security risks, including account takeover through Meta’s AI support chatbot and prompt injection against Google’s Gemini voice assistant. Researchers described an AI-enabled EDR evasion lab that automates malware development and testing against Sophos, CrowdStrike, and Microsoft Defender. Several vulnerabilities were also highlighted as exploited or high-risk, including Android CVE-2025-48595, Cisco CVE-2026-20230, SolarWinds Serv-U CVE-2026-28318, and Microsoft Windows Netlogon CVE-2026-41089.\u003c/p\u003e\n\n\u003cp\u003eCheck Point Research detailed a malware distribution ecosystem involving fake open-source sites, click-hijacking, and a gated traffic distribution system. The campaign impersonated tools such as Ghidra and dnSpy and led to infections by RemusStealer, AnimateClipper, and a new loader called SessionGate. The report also linked seized Dutch hosting infrastructure to Iranian cyber espionage groups and described election-related phishing, brand impersonation, and domain abuse ahead of the 2026 U.S. midterms.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCheck Point’s 8th June Threat Intelligence Report collects major cyber developments from the week of 1st June across breaches, AI threats, vulnerabilities, and threat intelligence investigations. The top attacks included a DentaQuest breach after ShinyHunters leaked exfiltrated data, exposing an estimated 2.6 million accounts. The exposed DentaQuest information included names, emails, government IDs, and health insurance details.\u003c/p\u003e\n\n\u003cp\u003eDashlane disclosed an attack in which threat actors brute-forced two-factor codes to register unauthorized devices and download encrypted password vaults for fewer than 20 users. The campaign began on May 31 and was contained after lockouts. The United Nations World Food Programme also disclosed unauthorized access to its Gaza self-registration application, affecting about 600,000 Palestinian households and exposing names, identification numbers, mobile numbers, and location data.\u003c/p\u003e\n\n\u003cp\u003eThe report also notes that Russia’s Federal Security Service claimed foreign intelligence agencies hacked mobile devices belonging to senior Russian officials. According to the claim, the spyware operation enabled access to correspondence, calls, geolocation data, contact lists, and covert audio and video surveillance. In another incident, Hola confirmed a supply chain compromise affecting its Windows browser delivery pipeline, where an unauthorized executable operated as a cryptominer, installed as a Windows service, and excluded itself from Defender.\u003c/p\u003e\n\n\u003cp\u003eAI-related threats featured prominently in the report. Check Point highlighted the risk of granting AI support agents account recovery authority after reports that attackers used Meta’s AI support chatbot to seize Instagram accounts. Researchers also demonstrated Fake Context Alignment, a notification-based prompt injection technique that manipulated Google’s Gemini voice assistant through incoming messages, and described an AI-enabled EDR evasion lab using LLM-driven agents and automated testing against Sophos, CrowdStrike, and Microsoft Defender.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities section covered several high-impact flaws and patches. Google released its June Android security patch for 124 vulnerabilities, including CVE-2025-48595, a high-severity Android Framework flaw under exploitation. Cisco patched CVE-2026-20230 in Unified Communications Manager and Session Management Edition, SolarWinds fixed Serv-U CVE-2026-28318, and Microsoft Windows Netlogon CVE-2026-41089 was reported as exploited against Windows Server domain controllers.\u003c/p\u003e\n\n\u003cp\u003eCheck Point Research also investigated a large-scale impersonation and click-hijacking scheme that rerouted downloads from fake open-source sites through a gated traffic distribution system. The scheme impersonated tools such as Ghidra and dnSpy and led to infection by RemusStealer, AnimateClipper, and a new loader called SessionGate. Additional research linked Dutch-seized WorkTitans infrastructure to Iranian groups MuddyWater, Agrius, and Nimbus Manticore, surveyed cyber risks around the 2026 U.S. midterms, and described a months-long espionage campaign against a senior stock exchange executive’s Microsoft Outlook mailbox.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCheck Point’s 8th June Threat Intelligence Report summarizes cyber research and threat activity for the week of 1st June. The article is organized into top attacks and breaches, AI threats, vulnerabilities and patches, and threat intelligence reports. It covers a mix of data breaches, supply chain compromise, AI-enabled or AI-targeting techniques, exploited vulnerabilities, and malware distribution research.\u003c/p\u003e\n\n\u003ch2 id=\"top-attacks-and-breaches\"\u003eTop attacks and breaches\u003c/h2\u003e\n\n\u003cp\u003eSeveral incidents involved exposure of sensitive personal or operational data. DentaQuest, a U.S. dental benefits administrator owned by Sun Life, suffered a data breach after ShinyHunters leaked exfiltrated data. Analysts assessed that 2.6 million accounts were exposed, including names, emails, government IDs, and health insurance details.\u003c/p\u003e\n\n\u003cp\u003eDashlane disclosed an attack involving brute-forced two-factor codes. Threat actors used the codes to register unauthorized devices and download encrypted password vaults for fewer than 20 users. The campaign began on May 31 and was contained after lockouts.\u003c/p\u003e\n\n\u003cp\u003eThe United Nations World Food Programme disclosed unauthorized access to its Gaza self-registration application. The exposed data included names, identification numbers, mobile numbers, and location data. The incident affected about 600,000 Palestinian households across Gaza, and WFP suspended the platform while responding.\u003c/p\u003e\n\n\u003cp\u003eRussia’s Federal Security Service claimed that foreign intelligence agencies hacked mobile devices belonging to senior Russian officials. The alleged spyware operation reportedly enabled access to correspondence, calls, geolocation data, contact lists, and covert audio and video surveillance.\u003c/p\u003e\n\n\u003cp\u003eHola confirmed a supply chain compromise affecting its Windows browser delivery pipeline. An unauthorized executable was pushed to some users and operated as a cryptominer. The file installed as a Windows service and excluded itself from Defender, while an independent review found the impact was limited to about 0.1% of users.\u003c/p\u003e\n\n\u003ch2 id=\"ai-related-threats\"\u003eAI-related threats\u003c/h2\u003e\n\n\u003cp\u003eThe report highlights several AI security risks tied to account recovery, prompt injection, and automated evasion testing.\u003c/p\u003e\n\n\u003cp\u003eCheck Point discussed an AI security risk following reports that attackers used Meta’s AI support chatbot to seize Instagram accounts. The article states that giving AI agents account recovery authority to change emails or approve requests without identity checks can enable unauthorized access. The incident is framed as an example of how permissions and verification shape AI security risk.\u003c/p\u003e\n\n\u003cp\u003eResearchers demonstrated a notification-based prompt injection technique called Fake Context Alignment. The technique manipulated Google’s Gemini voice assistant through incoming messages. The attack hid authorization prompts and enabled device control, auto-joining Zoom video calls, and cross-device memory poisoning, and Google deployed classifier updates after disclosure.\u003c/p\u003e\n\n\u003cp\u003eResearchers also described an AI-enabled EDR evasion lab. The lab used a threat actor workflow that automates malware development and testing against Sophos, CrowdStrike, and Microsoft Defender. LLM-driven agents and an automated Active Directory panel coordinated iterative trials, supporting stealthy post-exploitation tied to ransomware deployment and data theft.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerabilities-and-patches\"\u003eVulnerabilities and patches\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several notable vulnerabilities, including flaws under exploitation and flaws with public proof-of-concept code.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGoogle released its June Android security patch for 124 vulnerabilities.\u003c/li\u003e\n\u003cli\u003eThe Android patch included CVE-2025-48595, a high-severity Android Framework flaw under exploitation.\u003c/li\u003e\n\u003cli\u003eLocal attackers can use CVE-2025-48595 to gain code execution and escalate privileges on devices running Android 14 or later.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCisco released patches for CVE-2026-20230, a critical flaw affecting Unified Communications Manager and Session Management Edition. The flaw allows unauthenticated network attackers to write files and escalate to root. A public proof-of-concept had already been published, the bug requires WebDialer to be enabled, and fixes include 14SU6 and an interim 15.x COP.\u003c/p\u003e\n\n\u003cp\u003eSolarWinds Serv-U CVE-2026-28318 was reported as exploited in attacks against file transfer servers. The unauthenticated flaw allows crafted HTTP POST requests using a deflate header to crash the service and disrupt operations. SolarWinds fixed the vulnerability in Serv-U 15.5.4 HF1.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-41089 in Microsoft Windows Netlogon was reported as exploited in attacks against Windows Server domain controllers. The flaw is a critical stack-based buffer overflow that can allow remote code execution through crafted network requests. Successful exploitation may give attackers SYSTEM-level control of domain controllers in vulnerable Active Directory environments.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Check Point IPS provides protection against Microsoft Windows Netlogon Remote Code Execution, tracked as CVE-2026-41089.\u003c/p\u003e\n\n\u003ch2 id=\"threat-intelligence-reports\"\u003eThreat intelligence reports\u003c/h2\u003e\n\n\u003cp\u003eCheck Point Research investigated a large-scale impersonation and click-hijacking scheme. The scheme rerouted downloads from fake open-source sites through a gated traffic distribution system. It impersonated tools such as Ghidra and dnSpy and led to infection by RemusStealer, AnimateClipper, and a new loader called SessionGate.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Check Point Threat Emulation and Harmony Endpoint provide protection against this malware distribution threat.\u003c/p\u003e\n\n\u003cp\u003eCheck Point Research also linked a Dutch seizure of about 800 servers at hosting provider WorkTitans B.V. to Iranian cyber espionage operations. The infrastructure was used by MuddyWater, Agrius, and Nimbus Manticore. The article says these groups used the infrastructure for attacks that enabled remote access, credential theft, and scanning.\u003c/p\u003e\n\n\u003cp\u003eCheck Point researchers surveyed the 2026 U.S. midterm threat landscape. They found that operations focus on phishing, brand impersonation, and domain abuse rather than ballot tampering. The report also notes that Russian-linked Doppelganger networks cloned major media sites, vote-related domains increased, and exposed ActBlue and WinRed credentials surfaced.\u003c/p\u003e\n\n\u003cp\u003eResearchers identified a months-long espionage campaign targeting a senior executive’s Microsoft Outlook mailbox at a major global stock exchange. The attackers used legitimate cloud storage services and disguised update tasks to persist and move data in small batches. The campaign enabled five months of undetected access.\u003c/p\u003e\n\n\u003ch2 id=\"key-affected-organizations-products-and-entities\"\u003eKey affected organizations, products, and entities\u003c/h2\u003e\n\n\u003cp\u003eThe article mentions a broad set of affected parties and technologies, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDentaQuest and Sun Life\u003c/li\u003e\n\u003cli\u003eDashlane\u003c/li\u003e\n\u003cli\u003eUnited Nations World Food Programme\u003c/li\u003e\n\u003cli\u003eSenior Russian officials and Russia’s Federal Security Service\u003c/li\u003e\n\u003cli\u003eHola Windows browser users\u003c/li\u003e\n\u003cli\u003eMeta’s AI support chatbot and Instagram accounts\u003c/li\u003e\n\u003cli\u003eGoogle Gemini voice assistant\u003c/li\u003e\n\u003cli\u003eSophos, CrowdStrike, and Microsoft Defender\u003c/li\u003e\n\u003cli\u003eAndroid Framework on Android 14 or later\u003c/li\u003e\n\u003cli\u003eCisco Unified Communications Manager and Session Management Edition\u003c/li\u003e\n\u003cli\u003eSolarWinds Serv-U\u003c/li\u003e\n\u003cli\u003eMicrosoft Windows Netlogon and Windows Server domain controllers\u003c/li\u003e\n\u003cli\u003eWorkTitans B.V.\u003c/li\u003e\n\u003cli\u003eActBlue and WinRed\u003c/li\u003e\n\u003cli\u003eMicrosoft Outlook at a major global stock exchange\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"notable-named-threat-actors-and-malware\"\u003eNotable named threat actors and malware\u003c/h2\u003e\n\n\u003cp\u003eThe report names several threat actors, threat clusters, and malware families:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eShinyHunters, tied in the article to the DentaQuest leaked data.\u003c/li\u003e\n\u003cli\u003eMuddyWater, Agrius, and Nimbus Manticore, linked by Check Point Research to seized Dutch-hosted infrastructure.\u003c/li\u003e\n\u003cli\u003eDoppelganger, described as a Russian-linked network that cloned major media sites.\u003c/li\u003e\n\u003cli\u003eRemusStealer, AnimateClipper, and SessionGate, delivered through the impersonation and click-hijacking malware distribution ecosystem.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall significance\u003c/h2\u003e\n\n\u003cp\u003eThe report presents a threat landscape where exposed personal data, unauthorized access, supply chain compromise, and actively exploited vulnerabilities appear alongside AI-related abuse cases. The AI examples show risks involving account recovery authority, notification-based prompt injection, and automated EDR evasion testing. The vulnerability section emphasizes patching activity across Android, Cisco, SolarWinds, and Microsoft environments, while the threat intelligence section highlights malware distribution, Iranian espionage infrastructure, election-related domain abuse, and long-running mailbox espionage.\u003c/p\u003e\n","keyPoints":["DentaQuest suffered a data breach after ShinyHunters leaked exfiltrated data, exposing an estimated 2.6 million accounts with names, emails, government IDs, and health insurance details.","Dashlane disclosed an attack in which threat actors brute-forced two-factor codes to register unauthorized devices and download encrypted password vaults for fewer than 20 users.","The United Nations World Food Programme disclosed unauthorized access to its Gaza self-registration application, affecting about 600,000 Palestinian households and exposing names, identification numbers, mobile numbers, and location data.","Google, Cisco, SolarWinds, and Microsoft addressed or reported exploitation of vulnerabilities affecting Android, Unified Communications Manager, Serv-U, and Windows Netlogon.","Check Point Research investigated a malware distribution ecosystem that impersonated open-source tools and led to infections by RemusStealer, AnimateClipper, and a new loader called SessionGate."],"insights":["Several high-impact issues already have evidence of exploitation or public proof-of-concept code, including Android CVE-2025-48595, Cisco CVE-2026-20230, SolarWinds Serv-U CVE-2026-28318, and Windows Netlogon CVE-2026-41089, making patch prioritization urgent.","The AI incidents show that the operational permissions granted to AI agents can be as important as the model itself, because Meta account recovery authority and Gemini notification handling both enabled security-relevant actions when manipulated.","The Hola incident demonstrates that even a narrowly scoped supply-chain compromise can have meaningful impact when a browser update pipeline is abused to deliver a cryptominer that installs as a Windows service and excludes itself from Defender.","The Check Point malware distribution research shows attackers are using fake open-source software sites and gated traffic distribution systems to steer victims toward multiple payloads, including RemusStealer, AnimateClipper, and SessionGate.","The Dutch seizure of WorkTitans infrastructure had broader implications beyond hosting abuse because Check Point linked the seized servers to Iranian espionage groups MuddyWater, Agrius, and Nimbus Manticore."],"referencedReports":[],"body":"\u003cp\u003eCheck Point’s 8th June Threat Intelligence Report summarizes cyber activity from the week of 1st June, covering breaches, AI-related threats, exploited vulnerabilities, and threat intelligence findings. The report highlights incidents involving DentaQuest, Dashlane, the United Nations World Food Programme, Russian officials, and Hola’s Windows browser delivery pipeline. Impacts included exposed personal and health-related data, stolen encrypted password vaults for fewer than 20 Dashlane users, and a cryptominer delivered through a supply chain compromise.\u003c/p\u003e\n\n\u003cp\u003eThe report also emphasizes emerging AI security risks, including account takeover through Meta’s AI support chatbot and prompt injection against Google’s Gemini voice assistant. Researchers described an AI-enabled EDR evasion lab that automates malware development and testing against Sophos, CrowdStrike, and Microsoft Defender. Several vulnerabilities were also highlighted as exploited or high-risk, including Android CVE-2025-48595, Cisco CVE-2026-20230, SolarWinds Serv-U CVE-2026-28318, and Microsoft Windows Netlogon CVE-2026-41089.\u003c/p\u003e\n\n\u003cp\u003eCheck Point Research detailed a malware distribution ecosystem involving fake open-source sites, click-hijacking, and a gated traffic distribution system. The campaign impersonated tools such as Ghidra and dnSpy and led to infections by RemusStealer, AnimateClipper, and a new loader called SessionGate. The report also linked seized Dutch hosting infrastructure to Iranian cyber espionage groups and described election-related phishing, brand impersonation, and domain abuse ahead of the 2026 U.S. midterms.\u003c/p\u003e\n"},{"n":2,"title":"Reducing security operations complexity with Wazuh Cloud","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/reducing-security-operations-complexity-with-wazuh-cloud/","time":"14:01","priority":"MAY READ","score":35,"tldr":"Wazuh Cloud is presented as a managed SIEM/XDR platform that reduces security operations complexity by handling infrastructure, scaling, maintenance, and alert analysis. Its main pitch is helping teams gain faster visibility and reduce analyst workload through automation and AI-assisted security insights.","briefOverview":"\u003cp\u003eWazuh presents Wazuh Cloud as a fully managed, cloud-native version of the open source Wazuh platform designed to reduce security operations complexity. The article says security teams face complex hybrid environments, strict compliance requirements, and high alert volumes that slow detection and response. It argues that infrastructure management, deployment delays, scaling constraints, and inflexible licensing can leave organizations under-protected despite security investments.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Wazuh Cloud as a managed SIEM/XDR platform that handles backend operations, patches, rule enhancements, threat intelligence updates, version upgrades, and scalability. It supports lightweight agents across Windows, Linux, macOS, containers, and cloud workloads, with pre-configured rules and dashboards available immediately. Built-in modules such as File Integrity Monitoring, vulnerability detection, and Security Configuration Assessment are described as enabled automatically.\u003c/p\u003e\n\n\u003cp\u003eA key feature highlighted is Wazuh AI Security Analyst, which analyzes alerts, vulnerability data, and endpoint activity to generate weekly assessments and prioritized recommendations. The article says this reduces manual analysis, alert fatigue, and triage time while helping teams focus on investigation and remediation. It concludes that Wazuh Cloud is positioned for security teams in dynamic, hybrid, or multi-cloud environments that want a managed alternative to traditional SIEM operations.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is a sponsored Wazuh post promoting Wazuh Cloud, a fully managed, cloud-native version of the open source Wazuh platform. It frames the product around common security operations challenges, including ransomware, advanced persistent threats, supply chain attacks, hybrid infrastructure, multi-cloud platforms, containers, Kubernetes clusters, and compliance requirements. It states that SOCs often receive thousands of alerts per day with high false-positive rates, contributing to burnout and delays in mean time to detect and mean time to respond.\u003c/p\u003e\n\n\u003cp\u003eWazuh identifies several operational challenges for SIEM/XDR deployments. These include extended deployment timelines, ongoing maintenance demands, high alert volumes with limited context, scaling constraints, inflexible consumption models, and limited support. The article says these factors can increase operational costs, divert analysts from proactive threat hunting, and create visibility gaps during onboarding periods.\u003c/p\u003e\n\n\u003cp\u003eWazuh Cloud is described as addressing these issues through rapid deployment, a zero-maintenance platform, automatic scalability, flexible tiering, and proactive support. The article says Wazuh agents can be deployed across Windows, Linux, macOS, containers, and cloud workloads. It also says pre-configured rules, dashboards, File Integrity Monitoring, vulnerability detection, and Security Configuration Assessment are enabled automatically to provide immediate protection.\u003c/p\u003e\n\n\u003cp\u003eThe technical architecture described in the article uses an agent-server model, a managed indexing and data pipeline, a detection engine, and an AI analyst layer. Lightweight agents collect logs, monitor file integrity, assess configurations, detect rootkits locally, normalize events, and forward them securely to Wazuh Cloud over an encrypted channel. A managed indexer cluster handles indexing, retention policies, query performance, and horizontal scaling.\u003c/p\u003e\n\n\u003cp\u003eThe detection engine parses raw logs with decoders and evaluates them against thousands of rules organized by severity, category, and MITRE ATT\u0026amp;CK techniques. The article says advanced rule chaining across multiple data sources enables more precise correlation and lower false-positive rates. Wazuh AI Security Analyst processes alerts, vulnerability findings, and endpoint activity to generate weekly reports with trends, high-risk highlights, and prioritized remediation recommendations.\u003c/p\u003e\n\n\u003cp\u003eThe article does not describe a specific breach, threat actor, or vulnerability disclosure. Its disclosed impact is operational: reducing deployment time, maintenance burden, alert fatigue, scalability challenges, and triage effort for security teams. It concludes by encouraging readers to start a free trial of Wazuh Cloud.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article is a sponsored post written by Wazuh that promotes Wazuh Cloud, described as a fully managed, cloud-native version of the open source Wazuh platform. It positions Wazuh Cloud as a managed SIEM/XDR solution intended to reduce the operational complexity security teams face when deploying and maintaining security monitoring platforms.\u003c/p\u003e\n\n\u003cp\u003eThe central message is that organizations increasingly operate across complex environments that include on-premises systems, multi-cloud platforms, containers, and Kubernetes clusters. At the same time, they must address threats such as ransomware, advanced persistent threats, and supply chain attacks, while also meeting compliance requirements from frameworks such as PCI DSS, HIPAA, GDPR, NIST 800-53, and CIS Benchmarks.\u003c/p\u003e\n\n\u003ch2 id=\"security-operations-challenges-described\"\u003eSecurity operations challenges described\u003c/h2\u003e\n\n\u003cp\u003eThe article says modern SOCs commonly receive thousands of alerts per day and often deal with high false-positive rates. It states that analysts can spend most of their time reviewing false positives instead of investigating real threats, which contributes to burnout and delays in mean time to detect and mean time to respond.\u003c/p\u003e\n\n\u003cp\u003eWazuh highlights several recurring SIEM/XDR operational problems:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExtended deployment timelines involving infrastructure provisioning, agent rollout, data ingestion setup, rule tuning, and tool integrations.\u003c/li\u003e\n\u003cli\u003eVisibility gaps during onboarding periods when deployment is not yet complete.\u003c/li\u003e\n\u003cli\u003eOngoing maintenance requirements such as OS patching, indexer tuning, rule updates, cluster scaling, and data retention management.\u003c/li\u003e\n\u003cli\u003eHigh alert volumes with limited context, creating heavy triage workloads.\u003c/li\u003e\n\u003cli\u003eScaling constraints as endpoint counts grow or cloud-native environments expand.\u003c/li\u003e\n\u003cli\u003eInflexible licensing or consumption models that may force overpayment or missing capabilities.\u003c/li\u003e\n\u003cli\u003eSupport limitations when platforms rely mainly on reactive, ticket-based assistance.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these issues can increase operational costs and place additional pressure on security teams.\u003c/p\u003e\n\n\u003ch2 id=\"wazuh-cloud-positioning\"\u003eWazuh Cloud positioning\u003c/h2\u003e\n\n\u003cp\u003eWazuh Cloud is presented as a managed SIEM/XDR platform that removes infrastructure overhead and enhances detection precision. The article says the platform simplifies operations through automation, AI-driven analysis, and scalability.\u003c/p\u003e\n\n\u003cp\u003eThe stated goal is to let security teams focus on protecting assets rather than maintaining platform infrastructure. Wazuh says the cloud service manages backend operations, security patches, rule enhancements, threat intelligence updates, and version upgrades.\u003c/p\u003e\n\n\u003ch2 id=\"deployment-and-built-in-capabilities\"\u003eDeployment and built-in capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article says Wazuh Cloud supports lightweight Wazuh agent deployments across:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows\u003c/li\u003e\n\u003cli\u003eLinux\u003c/li\u003e\n\u003cli\u003emacOS\u003c/li\u003e\n\u003cli\u003eContainers\u003c/li\u003e\n\u003cli\u003eCloud workloads\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt states that pre-configured rules and dashboards activate immediately after onboarding. It also says several security modules are enabled automatically:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFile Integrity Monitoring for detecting unauthorized file changes.\u003c/li\u003e\n\u003cli\u003eVulnerability detection for identifying known weaknesses across systems.\u003c/li\u003e\n\u003cli\u003eSecurity Configuration Assessment for evaluating compliance against industry benchmarks.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eWazuh presents this out-of-the-box setup as a way to deliver visibility and protection without a lengthy configuration process.\u003c/p\u003e\n\n\u003ch2 id=\"ai-assisted-analysis\"\u003eAI-assisted analysis\u003c/h2\u003e\n\n\u003cp\u003eA major feature highlighted in the article is Wazuh AI Security Analyst. The article describes it as a Wazuh service that performs automated AI-powered security analysis for Wazuh Cloud environments.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, Wazuh AI Security Analyst analyzes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSecurity alerts\u003c/li\u003e\n\u003cli\u003eVulnerability data\u003c/li\u003e\n\u003cli\u003eEndpoint activity\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt generates weekly AI-produced assessments and recommendations that highlight trends, high-risk activity, and investigation priorities. The article says these reports are intended to reduce manual analysis, alert fatigue, and triage time while improving operational efficiency.\u003c/p\u003e\n\n\u003ch2 id=\"architecture-described-in-the-article\"\u003eArchitecture described in the article\u003c/h2\u003e\n\n\u003ch3 id=\"agent-server-model\"\u003eAgent-server model\u003c/h3\u003e\n\n\u003cp\u003eThe article says lightweight Wazuh agents installed on endpoints collect logs, monitor file integrity, assess configurations, and detect rootkits locally. These agents normalize events and securely forward them to the managed Wazuh Cloud server over an encrypted channel.\u003c/p\u003e\n\n\u003cp\u003eThe article states that this approach reduces bandwidth usage while maintaining visibility across distributed and high-latency environments.\u003c/p\u003e\n\n\u003ch3 id=\"indexing-and-data-pipeline\"\u003eIndexing and data pipeline\u003c/h3\u003e\n\n\u003cp\u003eWazuh Cloud uses a managed Wazuh indexer cluster for indexing. The article says this cluster uses pre-optimized shards, retention policies, and query performance settings.\u003c/p\u003e\n\n\u003cp\u003eIt also states that automatic horizontal scaling helps prevent performance degradation that can occur in self-managed environments.\u003c/p\u003e\n\n\u003ch3 id=\"detection-engine\"\u003eDetection engine\u003c/h3\u003e\n\n\u003cp\u003eThe article says raw logs are parsed by decoders and then evaluated against thousands of rules. These rules are organized by severity, category, and MITRE ATT\u0026amp;CK techniques.\u003c/p\u003e\n\n\u003cp\u003eIt also says advanced rule chaining across multiple data sources supports precise correlation and significantly lower false-positive rates.\u003c/p\u003e\n\n\u003ch3 id=\"ai-analyst-layer\"\u003eAI analyst layer\u003c/h3\u003e\n\n\u003cp\u003eThe Wazuh AI Analyst layer sits above the core detection capabilities. The article says it processes security alerts, vulnerability findings, and endpoint activity data to generate weekly reports.\u003c/p\u003e\n\n\u003cp\u003eThose reports include insights, trend analysis, high-risk highlights, and prioritized remediation recommendations. The article says this reduces the manual effort required for investigations and helps teams focus on threat detection and response.\u003c/p\u003e\n\n\u003ch2 id=\"scalability-tiering-and-support\"\u003eScalability, tiering, and support\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Wazuh Cloud resources dynamically adjust to agent volume and data ingestion rates. It says the platform can support environments ranging from hundreds to thousands of agents without performance degradation.\u003c/p\u003e\n\n\u003cp\u003eWazuh also describes flexible tiering based on agent count, data retention, and module needs. The article notes that upgrades for extended retention or advanced analytics are straightforward, although some setting changes are applied through a support workflow and may take effect on the next billing cycle.\u003c/p\u003e\n\n\u003cp\u003eFor support, the article says Wazuh Cloud includes continuous health checks on clusters, agents, and ingestion pipelines, combined with direct access to Wazuh experts.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-significance\"\u003eDisclosed impact and significance\u003c/h2\u003e\n\n\u003cp\u003eThe article does not report a specific cyber incident, vulnerability, exploit campaign, or threat actor activity. Its focus is operational rather than incident-driven.\u003c/p\u003e\n\n\u003cp\u003eThe impact described is that traditional SIEM limitations can lead to slower detection, higher operational costs, alert fatigue, delayed visibility, and security gaps. Wazuh argues that a managed cloud-native platform can reduce these burdens by handling infrastructure, maintenance, and scalability while adding AI-assisted alert and vulnerability analysis.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that Wazuh Cloud reduces the complexity of managing security operations by providing a managed SIEM/XDR architecture with automatic scaling, built-in modules, pre-configured detection content, proactive monitoring, and AI-generated recommendations. It presents the platform as especially relevant for security teams operating in dynamic, hybrid, or multi-cloud environments.\u003c/p\u003e\n\n\u003cp\u003eThe article ends with a call to visit Wazuh Cloud and start a free trial.\u003c/p\u003e\n","keyPoints":["The article says security operations teams face challenges including lengthy SIEM/XDR deployments, ongoing maintenance demands, high alert volumes, scaling constraints, inflexible licensing models, and limited support.","Wazuh Cloud is described as a fully managed, cloud-native version of the open source Wazuh platform that handles backend operations, patches, rule enhancements, threat intelligence updates, and version upgrades.","Wazuh Cloud supports lightweight Wazuh agents across Windows, Linux, macOS, containers, and cloud workloads, with pre-configured rules and dashboards enabled immediately.","The Wazuh AI Security Analyst analyzes security alerts, vulnerability data, and endpoint activity to generate weekly assessments, trends, high-risk highlights, and prioritized remediation recommendations.","The article states that Wazuh Cloud dynamically scales resources based on agent volume and data ingestion rates and offers flexible tiers based on agent count, data retention, and module needs."],"insights":["Wazuh Cloud’s out-of-the-box onboarding includes File Integrity Monitoring, vulnerability detection, and Security Configuration Assessment enabled automatically, which could reduce the initial rule and module configuration work that often delays SIEM/XDR deployments.","The article notes that some Wazuh Cloud tier or setting changes are handled through a support workflow and may not take effect until the next billing cycle, which is an operational planning consideration for teams expecting immediate configuration changes.","Wazuh Cloud agents normalize events locally and forward them over an encrypted channel, which the article says helps reduce bandwidth usage in distributed or high-latency environments.","The Wazuh AI Security Analyst is described as producing weekly assessments and recommendations, so its primary value in the article is periodic prioritization and trend analysis rather than real-time autonomous response."],"referencedReports":[],"body":"\u003cp\u003eWazuh presents Wazuh Cloud as a fully managed, cloud-native version of the open source Wazuh platform designed to reduce security operations complexity. The article says security teams face complex hybrid environments, strict compliance requirements, and high alert volumes that slow detection and response. It argues that infrastructure management, deployment delays, scaling constraints, and inflexible licensing can leave organizations under-protected despite security investments.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Wazuh Cloud as a managed SIEM/XDR platform that handles backend operations, patches, rule enhancements, threat intelligence updates, version upgrades, and scalability. It supports lightweight agents across Windows, Linux, macOS, containers, and cloud workloads, with pre-configured rules and dashboards available immediately. Built-in modules such as File Integrity Monitoring, vulnerability detection, and Security Configuration Assessment are described as enabled automatically.\u003c/p\u003e\n\n\u003cp\u003eA key feature highlighted is Wazuh AI Security Analyst, which analyzes alerts, vulnerability data, and endpoint activity to generate weekly assessments and prioritized recommendations. The article says this reduces manual analysis, alert fatigue, and triage time while helping teams focus on investigation and remediation. It concludes that Wazuh Cloud is positioned for security teams in dynamic, hybrid, or multi-cloud environments that want a managed alternative to traditional SIEM operations.\u003c/p\u003e\n"},{"n":20,"title":"AI Phishing Is Crushing SOCs with Alert Volume: How to Reduce Tier 1 Overload","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/ai-phishing-is-crushing-socs-with-alert.html","time":"13:00","priority":"MAY READ","score":35,"tldr":"AI-generated phishing is increasing SOC alert volume and making Tier 1 triage harder, so the article argues teams need faster behavior-based analysis, automation, and structured reports to reduce escalations and response delays. It promotes ANY.RUN’s sandbox as a way to expose phishing chains quickly and cut Tier 1 workload.","briefOverview":"\u003cp\u003eAI-generated phishing is increasing alert volume for SOC teams by enabling attackers to produce convincing emails, fake login pages, and tailored lures quickly. The article says this makes it harder for Tier 1 analysts to dismiss alerts at a glance, especially when phishing campaigns use varied messages, personalized details, and short-lived domains. As queues grow, credential theft attempts or malware delivery can remain buried among routine checks.\u003c/p\u003e\n\n\u003cp\u003eThe article presents faster phishing triage as the main response to Tier 1 overload. It argues that automated checks, behavior-based visibility, and ready-made reports can help analysts reach clearer verdicts without pushing every uncertain case to Tier 2. It promotes ANY.RUN’s Interactive Sandbox as a way to inspect suspicious links in an isolated browser and expose redirects, hidden pages, and credential-harvesting forms.\u003c/p\u003e\n\n\u003cp\u003eA cited example describes a LinkedIn Drive link that led to a fake Microsoft 365 login page hosted on AWS CloudFront and designed to steal corporate credentials. The article says the full phishing chain was exposed inside ANY.RUN’s sandbox in under 60 seconds. It also says ANY.RUN’s reports include verdicts, IOCs, behavioral indicators, MITRE ATT\u0026amp;CK mapping, AI summaries, and recommendations to speed escalations and response.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article focuses on how AI is increasing the volume and quality of phishing attempts that SOC teams must triage. It says attackers can generate convincing emails, fake login pages, and tailored lures in minutes, creating more cases for Tier 1 analysts to review. The main operational concern is that important threats, such as credential theft attempts or malware delivery, may be delayed or buried as queues grow.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, AI-driven phishing changes the workload by producing more lure variations, better impersonation, personalized messages, short-lived domains, and more uncertain cases. These characteristics make similar campaigns look less identical, allow messages to resemble routine HR, finance, or IT requests, and reduce the usefulness of quick visual checks. Short-lived URLs can also return little or no reputation history, leaving analysts without a clear verdict.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that adding more manual checks is not an effective way to handle increased phishing volume. Instead, it recommends combining automated checks, behavior-based visibility, and ready-made reports. This approach is presented as a way for Tier 1 analysts to investigate more alerts while reducing repetitive steps and limiting escalations to cases that truly need deeper review.\u003c/p\u003e\n\n\u003cp\u003eANY.RUN’s Interactive Sandbox is described as a tool that lets teams open suspicious links in a real, isolated browser environment and interact with the page while tracing the attack chain. The article says this can reveal redirects, hidden pages, credential-harvesting forms, and behavior that reputation checks cannot see. In one example, a LinkedIn Drive link led to a fake Microsoft 365 login page hosted on AWS CloudFront, and the sandbox exposed the chain in under 60 seconds.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes ANY.RUN’s automation and reporting features as ways to reduce Tier 1 workload and improve escalation quality. It says the sandbox can navigate pages, solve CAPTCHAs, and trigger hidden phishing steps, while analysts can step in when needed. It also says the Tier 1 Report consolidates verdicts, IOCs, behavioral indicators, MITRE ATT\u0026amp;CK mapping, AI summaries, and recommendations so Tier 2 teams do not need to rebuild the case.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that AI has turned phishing into a higher-volume and more difficult triage problem for SOC teams. It says attackers can now create convincing emails, fake login pages, and tailored lures in minutes. Each polished message creates another case for Tier 1 analysts to review, another link to inspect, and another alert that cannot be dismissed quickly.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central concern is Tier 1 overload. As phishing queues grow, a credential theft attempt or malware delivery attempt can become buried among routine checks. The article frames faster triage as a way to help SOC teams identify the alerts that could develop into serious incidents.\u003c/p\u003e\n\n\u003ch2 id=\"how-ai-phishing-increases-tier-1-workload\"\u003eHow AI Phishing Increases Tier 1 Workload\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several AI-driven changes that make phishing harder for Tier 1 teams to process quickly:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMore lure variations mean similar campaigns no longer look identical, so more alerts require manual review.\u003c/li\u003e\n\u003cli\u003eBetter impersonation makes phishing emails sound like routine HR, finance, or IT requests, increasing the time spent checking context.\u003c/li\u003e\n\u003cli\u003ePersonalized messages use public company or employee details, allowing more emails to pass a quick visual check.\u003c/li\u003e\n\u003cli\u003eShort-lived domains often have little or no reputation history, causing tools to return “unknown” instead of a clear verdict.\u003c/li\u003e\n\u003cli\u003eMore uncertain cases leave Tier 1 with less evidence to close alerts confidently, increasing escalations to Tier 2.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe result described in the article is that Tier 1 spends more time on each alert and sends more unclear cases to Tier 2. As backlogs grow, critical threats may sit in the queue longer. The article says this can delay response and increase the risk of a costly incident.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-workflow-for-handling-ai-phishing-at-scale\"\u003eRecommended Workflow for Handling AI Phishing at Scale\u003c/h2\u003e\n\n\u003cp\u003eThe article says that adding more manual checks will not solve the problem. When phishing volume rises, Tier 1 needs a way to investigate more alerts without spending extra time on repetitive steps or escalating every uncertain case. The proposed workflow combines automated checks, behavior-based visibility, and ready-made reports.\u003c/p\u003e\n\n\u003cp\u003eThis approach is presented as a way to give Tier 1 analysts the evidence needed to reach a clear verdict sooner. It also aims to ensure Tier 2 only steps in when a case truly requires deeper investigation. The article’s examples and recommendations focus on ANY.RUN’s Interactive Sandbox and reporting features.\u003c/p\u003e\n\n\u003ch2 id=\"behavior-visibility-through-interactive-sandboxing\"\u003eBehavior Visibility Through Interactive Sandboxing\u003c/h2\u003e\n\n\u003cp\u003eThe article says reputation checks can be insufficient when attackers launch new phishing variations faster than reputation systems can keep up. Even if a message looks convincing and a URL has no known history, analysts still need a way to see what happens after a user clicks. ANY.RUN’s Interactive Sandbox is described as allowing teams to open suspicious links in a real browser environment, interact with the page, and trace the full attack chain without risking company devices or infrastructure.\u003c/p\u003e\n\n\u003cp\u003eA cited case involved a routine-looking LinkedIn Drive link that led to a fake Microsoft 365 login page. The page was designed to steal corporate credentials. The article says the phishing content was hosted on AWS CloudFront and filtered out free email domains, helping it stay under the radar.\u003c/p\u003e\n\n\u003cp\u003eThe article says the full chain in that case was exposed inside the sandbox in under 60 seconds. It presents this as useful for busy Tier 1 teams because it can reveal redirects, hidden pages, and credential-harvesting forms in one session. It also says this helps analysts reach verdicts on fresh URLs even when those links have no known history.\u003c/p\u003e\n\n\u003ch2 id=\"automation-with-analyst-interactivity\"\u003eAutomation With Analyst Interactivity\u003c/h2\u003e\n\n\u003cp\u003eThe article distinguishes ANY.RUN’s approach from traditional automation by saying traditional automation may miss phishing pages that appear only after a redirect, CAPTCHA, or specific user action. It says such automation may save time on basic checks while still leaving Tier 1 analysts with incomplete results and additional manual investigation work.\u003c/p\u003e\n\n\u003cp\u003eANY.RUN is described as combining automation with interactivity. Once enabled, the sandbox opens suspicious links in an isolated browser, navigates through pages, solves CAPTCHAs, and triggers hidden steps in the phishing chain. The article says team members can also step in at any point when a case needs closer review.\u003c/p\u003e\n\n\u003cp\u003eThe stated benefits include cutting repetitive investigation steps and increasing Tier 1 capacity. The article also says this can help SOCs absorb alert spikes without immediately adding headcount. Human judgment remains available for complex threats because analysts can interact with the session when needed.\u003c/p\u003e\n\n\u003ch2 id=\"tier-1-reports-and-tier-2-handoff\"\u003eTier 1 Reports and Tier 2 Handoff\u003c/h2\u003e\n\n\u003cp\u003eThe article says escalation can remain slow even after Tier 1 confirms a threat. If findings are scattered across different tools, senior team members may need to repeat the same checks before deciding what to do next. To address this, the article describes ANY.RUN’s Tier 1 Report as a ready-to-use handoff after analysis is complete.\u003c/p\u003e\n\n\u003cp\u003eThe report is described as combining:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe verdict.\u003c/li\u003e\n\u003cli\u003eKey IOCs.\u003c/li\u003e\n\u003cli\u003eBehavioral indicators.\u003c/li\u003e\n\u003cli\u003eMITRE ATT\u0026amp;CK mapping.\u003c/li\u003e\n\u003cli\u003eAI Summary explaining what happened and why the activity is malicious.\u003c/li\u003e\n\u003cli\u003eAI Recommendations suggesting next investigation and response steps.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this allows Tier 1 to send a structured report instead of raw technical data. It frames this as a way to prevent Tier 2 from rebuilding the case, reduce the delay between triage and containment, standardize escalations across shifts, and give SOC leaders better oversight of bottlenecks and escalation quality.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-operational-impact\"\u003eClaimed Operational Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article presents faster phishing triage as a form of stronger business protection. It says AI phishing does not only create more alerts, but also keeps SOC teams busy while real threats move closer to the business. The article says teams getting ahead of the problem are giving Tier 1 a faster way to confirm threats, close routine cases, and escalate the right incidents with evidence already prepared.\u003c/p\u003e\n\n\u003cp\u003eThe article reports the following results for teams using ANY.RUN:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e94% of users report faster triage and clearer decisions.\u003c/li\u003e\n\u003cli\u003eUp to 20% decrease in Tier 1 workload.\u003c/li\u003e\n\u003cli\u003e30% fewer Tier 1-to-Tier 2 escalations.\u003c/li\u003e\n\u003cli\u003eUp to 21 minutes faster MTTR per case.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that AI-enabled phishing increases both alert volume and uncertainty for SOC Tier 1 teams. It argues that reputation checks and manual review are not enough when phishing campaigns use fresh URLs, convincing impersonation, redirects, CAPTCHAs, and hidden content. The article promotes behavior-based sandbox analysis, automated interaction, and structured reporting as ways to reduce Tier 1 overload and speed escalation to Tier 2.\u003c/p\u003e\n","keyPoints":["AI enables attackers to create convincing phishing emails, fake login pages, and tailored lures quickly, increasing the number of alerts Tier 1 SOC analysts must review.","AI-driven phishing causes more lure variations, better impersonation, personalized messages, short-lived domains, and uncertain cases that are harder for Tier 1 teams to dismiss quickly.","The article says ANY.RUN’s Interactive Sandbox lets teams open suspicious links in an isolated browser environment and trace the full phishing chain without risking company devices or infrastructure.","ANY.RUN’s sandbox can automate steps such as navigating pages, solving CAPTCHAs, and triggering hidden phishing content while still allowing analysts to interact with sessions when needed.","The article says ANY.RUN’s Tier 1 Report provides verdicts, IOCs, behavioral indicators, MITRE ATT\u0026CK mapping, AI summaries, and recommendations to speed Tier 1-to-Tier 2 handoffs."],"insights":["Reputation-based URL checks are less decisive against AI-enabled phishing because short-lived domains often return an “unknown” verdict, forcing analysts to rely on post-click behavior instead.","Interactive sandboxing can reveal phishing infrastructure that is hidden behind redirects, CAPTCHAs, or required user actions, which traditional automation may miss.","A cited phishing case used an AWS CloudFront-hosted fake Microsoft 365 login page and filtered out free email domains, showing how attackers use cloud hosting and targeting logic to evade casual review.","Standardized Tier 1 reports can reduce duplicate work by giving Tier 2 teams a ready-made package of verdicts, IOCs, behavioral findings, MITRE ATT\u0026CK mapping, and recommended next steps."],"referencedReports":[],"body":"\u003cp\u003eAI-generated phishing is increasing alert volume for SOC teams by enabling attackers to produce convincing emails, fake login pages, and tailored lures quickly. The article says this makes it harder for Tier 1 analysts to dismiss alerts at a glance, especially when phishing campaigns use varied messages, personalized details, and short-lived domains. As queues grow, credential theft attempts or malware delivery can remain buried among routine checks.\u003c/p\u003e\n\n\u003cp\u003eThe article presents faster phishing triage as the main response to Tier 1 overload. It argues that automated checks, behavior-based visibility, and ready-made reports can help analysts reach clearer verdicts without pushing every uncertain case to Tier 2. It promotes ANY.RUN’s Interactive Sandbox as a way to inspect suspicious links in an isolated browser and expose redirects, hidden pages, and credential-harvesting forms.\u003c/p\u003e\n\n\u003cp\u003eA cited example describes a LinkedIn Drive link that led to a fake Microsoft 365 login page hosted on AWS CloudFront and designed to steal corporate credentials. The article says the full phishing chain was exposed inside ANY.RUN’s sandbox in under 60 seconds. It also says ANY.RUN’s reports include verdicts, IOCs, behavioral indicators, MITRE ATT\u0026amp;CK mapping, AI summaries, and recommendations to speed escalations and response.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>

      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

// Shared card chrome so the front and back faces render identical tokens.
function CardTitle({ children }) {
  return (

function SourceTag({ article }) {

function numberedList(items, accent) {
  return (
    <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
      {(items || []).map((item, i) => (
        <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>

          <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{item}</span>
        </li>
      ))}
    </ul>
  );
}

function KeyPointsSection({ keyPoints, accent }) {
  if (!keyPoints || keyPoints.length === 0) return null;
  return (
    <div style={{ marginTop: 18 }}>
      <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
      {numberedList(keyPoints, accent)}

}

  return (
    <ul className="report-list">

          <div className="report-title">

          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}
