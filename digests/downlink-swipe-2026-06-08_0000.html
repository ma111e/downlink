nvolved.” SoFi also told customers it is actively reviewing the situation and taking extra precautions to keep accounts secure.\u003c/p\u003e\n\n\u003ch2 id=\"known-impact\"\u003eKnown Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that the compromised database contained customer information, but SoFi has not disclosed what specific information may have been exposed. The company has not provided the number of affected customers. It has also not disclosed whether the incident involved extortion.\u003c/p\u003e\n\n\u003cp\u003eA SoFi spokesperson confirmed the breach to BleepingComputer. The spokesperson declined to answer additional questions about the incident, including how many customers were affected, whether the company was extorted, or the identity of the third-party vendor involved.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-entities\"\u003eAffected Parties and Entities\u003c/h2\u003e\n\n\u003cp\u003eThe entities specifically named in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSoFi, the U.S.-based financial technology company.\u003c/li\u003e\n\u003cli\u003eSoFi Hong Kong, the regional operation providing investment and securities services.\u003c/li\u003e\n\u003cli\u003eSoFi Securities (Hong Kong) Limited, whose database was accessed through a vendor.\u003c/li\u003e\n\u003cli\u003eAn unnamed third-party vendor connected to the compromised database.\u003c/li\u003e\n\u003cli\u003eAn unnamed third-party cybersecurity firm engaged to help respond to the incident.\u003c/li\u003e\n\u003cli\u003eSoFi customers in Hong Kong who received breach notification emails.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-and-security-details\"\u003eTechnical and Security Details\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the incident as unauthorized access to a database through a third-party vendor. It does not identify the access method, the vendor, the threat actor, or any malware or exploit used. It also does not state whether customer credentials, financial account details, identity information, or other specific categories of data were exposed.\u003c/p\u003e\n\n\u003cp\u003eThe most specific technical detail disclosed is that the access involved a database of SoFi Securities (Hong Kong) Limited via one of SoFi’s vendors. SoFi detected the unauthorized access on April 30, 2026, and then engaged an outside cybersecurity firm to support the response.\u003c/p\u003e\n\n\u003ch2 id=\"customer-guidance\"\u003eCustomer Guidance\u003c/h2\u003e\n\n\u003cp\u003eSoFi advised customers to remain vigilant for phishing attempts, suspicious communications, and unusual account activity. It recommended that customers update passwords and enable two-factor authentication where possible. The company also advised customers to monitor financial accounts for suspicious activity and avoid opening links or attachments in unsolicited emails or messages.\u003c/p\u003e\n\n\u003cp\u003eSoFi said it has added additional safeguards and monitoring to affected accounts. It also said customers may be asked to provide additional verification information when contacting support or making account changes.\u003c/p\u003e\n\n\u003ch2 id=\"support-information\"\u003eSupport Information\u003c/h2\u003e\n\n\u003cp\u003eFor customers seeking more information, SoFi provided a Hong Kong support line and email address. The support phone number listed in the article is +852 26938888. The email address listed is hello@sofi.hk.\u003c/p\u003e\n\n\u003ch2 id=\"current-status\"\u003eCurrent Status\u003c/h2\u003e\n\n\u003cp\u003eAt the time described in the article, SoFi’s investigation was still ongoing. The company had confirmed the breach and notified customers, but it had not yet disclosed the full scope, the affected data categories, the number of impacted customers, the vendor involved, or whether extortion was part of the incident.\u003c/p\u003e\n","keyPoints":["SoFi Hong Kong warned customers that hackers gained unauthorized access to a third-party vendor database containing customer information.","SoFi said it discovered the incident on April 30, 2026, after detecting unauthorized access to a database of SoFi Securities (Hong Kong) Limited via one of its vendors.","The company said its investigation is ongoing and that it does not yet know the scope, impact, or specific categories of personal data that may have been involved.","A SoFi spokesperson confirmed the breach to BleepingComputer but declined to answer questions about the number of affected customers, whether extortion occurred, or the identity of the vendor.","SoFi advised customers to remain vigilant for phishing attempts, update passwords, enable two-factor authentication where possible, and monitor financial accounts for suspicious activity."],"insights":["SoFi notified customers even though it said it did not yet have complete information about the scope, impact, or categories of personal data involved, so customers are being asked to take precautions before exposure details are confirmed.","SoFi declined to identify the third-party vendor or disclose how many customers were affected, limiting customers’ ability to assess which external service was involved or the likely scale of the incident.","The company’s added safeguards may create extra friction for customers because SoFi said it may request additional verification information when customers contact support or make account changes.","SoFi’s recommended actions emphasize phishing awareness, password updates, two-factor authentication, and financial account monitoring rather than a data-specific remediation because the exposed information has not yet been determined."],"referencedReports":[],"body":"\u003cp\u003eSoFi Hong Kong warned customers that it suffered a data breach after hackers gained unauthorized access to a database at a third-party vendor. The database contained customer information for SoFi Securities (Hong Kong) Limited. SoFi said it discovered the incident on April 30, 2026, after detecting unauthorized access via one of its vendors.\u003c/p\u003e\n\n\u003cp\u003eThe company said its investigation is ongoing and that it does not yet know the scope or impact of the incident. SoFi also said it does not yet know whether customers’ personal data was involved or which categories of data may have been exposed. A spokesperson confirmed the breach to BleepingComputer but declined to answer questions about the number of affected customers, possible extortion, or the identity of the vendor.\u003c/p\u003e\n\n\u003cp\u003eSoFi advised customers to remain alert for phishing attempts, suspicious communications, and unusual account activity. It recommended updating passwords, enabling two-factor authentication where possible, monitoring financial accounts, and avoiding links or attachments in unsolicited messages. The company said it has added safeguards and monitoring to affected accounts and may request additional verification for support contacts or account changes.\u003c/p\u003e\n"},{"n":23,"title":"Keeping a Short Leash: New AzureHound Least-Privilege Documentation","source":"specterops.io","sourceColorIdx":1,"link":"https://specterops.io/blog/2026/06/08/keeping-a-short-leash-new-azurehound-least-privilege-documentation/","time":"16:00","priority":"MAY READ","score":72,"tldr":"SpecterOps has published and validated new least-privilege permission guidance for AzureHound, replacing broad default access with granular Microsoft Graph and Azure RBAC permissions. The main takeaway is that AzureHound can collect equivalent BloodHound data with much narrower read-only access, though teams must review permissions when upgrading collectors.","briefOverview":"\u003cp\u003eSpecterOps has published new least-privilege documentation for AzureHound, the collector that feeds Microsoft Entra ID and Azure Resource Manager data into BloodHound. The work produced a new reference article, updated manual deployment steps, and updated scripted deployment steps that use a narrower permission set by default. SpecterOps says the goal is tighter access control while recognizing that broader read permissions can reduce maintenance across future releases.\u003c/p\u003e\n\n\u003cp\u003eThe previous AzureHound guidance used broad permissions, including Microsoft Graph Directory.Read.All and RoleManagement.Read.All, Azure RBAC Reader at the Tenant Root Management Group, and the Entra ID Directory Readers role. The new least-privilege approach replaces those with eight granular Microsoft Graph application permissions and a custom AzureHound Reader role containing 16 specific Azure RBAC read actions. SpecterOps validated the changes through source inventory, documentation review, endpoint-level permission testing, and full AzureHound output comparison.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that least privilege for API-based collectors cannot be derived from documentation alone. Microsoft Graph behavior included one-to-many permission mappings, incomplete documentation, and property-level permission effects where an endpoint could return HTTP 200 while omitting requested data. SpecterOps found that least-privilege collections produced equivalent content, logs, and object counts compared with the prior broad-permission configuration in repeated testing.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSpecterOps announced new least-privilege permission guidance for AzureHound, the data collector used to ingest Microsoft Entra ID and Azure Resource Manager information into BloodHound. The author frames the work as part of SpecterOps Research’s product-feature work, focused on improving BloodHound and refining existing capabilities. The public deliverables are a new AzureHound Data Collection and Permissions reference article, updated manual deployment instructions, updated scripted configuration, and updates to AzureHound service principal requirements.\u003c/p\u003e\n\n\u003cp\u003eBefore this work, deploying AzureHound Community Edition and AzureHound Enterprise by the book required broad access across Microsoft Graph, Azure RBAC, and Entra ID. The prior guidance included Microsoft Graph Directory.Read.All and RoleManagement.Read.All, optional AuditLog.Read.All for sign-in enrichment, the Azure RBAC Reader role at the Tenant Root Management Group, and the Entra ID Directory Readers role. SpecterOps says this worked but conflicted with the Principle of Least Privilege, and some BloodHound Enterprise customers reported that internal security policies refused those broad permissions.\u003c/p\u003e\n\n\u003cp\u003eThe research separated AzureHound’s use of Microsoft Graph and Azure Resource Manager because the APIs have different permission models. Microsoft Graph permissions are assigned to the AzureHound application through Microsoft Graph application permissions or Microsoft Entra RBAC roles, while ARM permissions are granted through Azure RBAC role assignments. AzureHound was found to call 17 Microsoft Graph endpoints and 17 ARM endpoints, each mapped to a validated least-privilege permission or RBAC action.\u003c/p\u003e\n\n\u003cp\u003eFor Microsoft Graph, the validated least-privilege set collapsed to eight application permissions: AdministrativeUnit.Read.All, Application.Read.All, AuditLog.Read.All, Device.Read.All, GroupMember.Read.All, Organization.Read.All, RoleManagement.Read.Directory, and User.Read.All. The article notes that GroupMember.Read.All was sufficient for group endpoints where Group.Read.All had initially been considered, and RoleManagement.Read.Directory was sufficient instead of the broader RoleManagement.Read.All. SpecterOps also kept Organization.Read.All despite empirical testing showing User.Read.All worked for /v1.0/organization, because Microsoft did not document that behavior.\u003c/p\u003e\n\n\u003cp\u003eFor Azure Resource Manager, SpecterOps mapped AzureHound’s ARM requests to 16 specific read actions and defined a custom AzureHound Reader role. This replaces the built-in Reader role, which includes the */read wildcard for the control plane at the Tenant Root Management Group. The article states that assigning the role at the Tenant Root Management Group remains the recommended scope for tenant-wide collection, while lower scopes are valid for intentional partial collection but may cause resources outside the scope to be absent.\u003c/p\u003e\n\n\u003cp\u003eSpecterOps validated the least-privilege configuration by testing Microsoft Graph permission matrices and comparing full AzureHound collection output against the previous broad-permission configuration. Two service principals were created in a test tenant, one with the old broad privileges and one with the proposed least-privilege set. Repeated clean back-to-back runs produced identical content, logs, and metadata object counts, leading SpecterOps to recommend the least-privilege set while noting that organizations may consciously retain broader read permissions to reduce operational friction across future collector releases.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSpecterOps published new least-privilege permission guidance for AzureHound, the collector that feeds Microsoft Entra ID and Azure Resource Manager information into BloodHound. The article explains the research behind the new permissions and describes how SpecterOps validated that the narrower configuration can produce equivalent AzureHound collection output.\u003c/p\u003e\n\n\u003cp\u003eThe work resulted in several public deliverables:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA new reference article, \u003cstrong\u003eAzureHound Data Collection and Permissions\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eUpdated manual AzureHound deployment steps for configuration through the Microsoft Azure web UI.\u003c/li\u003e\n\u003cli\u003eUpdated scripted AzureHound configuration that automates the least-privilege setup.\u003c/li\u003e\n\u003cli\u003eUpdates to AzureHound’s service principal requirements.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSpecterOps recommends the least-privilege configuration because it reduces standing access if the AzureHound service principal is compromised. The article also acknowledges a tradeoff: broader read permissions may reduce maintenance when AzureHound adds new collection coverage in future releases.\u003c/p\u003e\n\n\u003ch2 id=\"prior-azurehound-permission-model\"\u003ePrior AzureHound Permission Model\u003c/h2\u003e\n\n\u003cp\u003eThe article states that AzureHound Community Edition and AzureHound Enterprise share collection code and previously used broad access when deployed according to earlier guidance. The prior configuration spanned three permission categories:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft Graph application permissions:\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDirectory.Read.All\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRoleManagement.Read.All\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAuditLog.Read.All\u003c/strong\u003e, optional for user sign-in enrichment\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eAzure RBAC:\n\n\u003cul\u003e\n\u003cli\u003eBuilt-in \u003cstrong\u003eReader\u003c/strong\u003e role assigned at the Tenant Root Management Group\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eEntra ID:\n\n\u003cul\u003e\n\u003cli\u003eBuilt-in \u003cstrong\u003eDirectory Readers\u003c/strong\u003e role\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSpecterOps says that configuration worked, but it conflicted with the Principle of Least Privilege. Some BloodHound Enterprise customers also reported internal security policies refusing the broad permissions.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights two specific reasons the older guidance was considered too broad:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft Graph’s \u003cstrong\u003eDirectory.Read.All\u003c/strong\u003e is listed by Microsoft among permissions to use with caution and includes a warning that it might be deprecated in the future.\u003c/li\u003e\n\u003cli\u003eAzure RBAC’s built-in \u003cstrong\u003eReader\u003c/strong\u003e role includes the \u003ccode\u003e*/read\u003c/code\u003e wildcard action for the control plane at the Tenant Root Management Group, giving read access to many Azure resource provider namespaces that AzureHound never queries.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"research-approach\"\u003eResearch Approach\u003c/h2\u003e\n\n\u003cp\u003eThe author began by identifying which APIs AzureHound calls. As part of SpecterOps’ work with OpenAI, Codex was used to accelerate the source-inventory phase by cataloguing AzureHound API calls and proposing an initial permission map.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that this automated output was only a starting point. The final mapping came from:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSource inventory.\u003c/li\u003e\n\u003cli\u003eMicrosoft documentation review.\u003c/li\u003e\n\u003cli\u003eEndpoint-level permission testing.\u003c/li\u003e\n\u003cli\u003eFull AzureHound output comparison.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSpecterOps separated AzureHound’s API usage into two different problems because Microsoft Graph and Azure Resource Manager use different permission models.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-graph-and-azure-resource-manager-distinction\"\u003eMicrosoft Graph and Azure Resource Manager Distinction\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Microsoft Graph as the API for the Azure identity plane. AzureHound uses it to collect information about users, groups, applications, service principals, devices, roles, and related objects.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Azure Resource Manager as the API for the Azure infrastructure plane. AzureHound uses it to collect information about virtual machines, key vaults, management groups, subscriptions, resource groups, and other Azure resources.\u003c/p\u003e\n\n\u003cp\u003eAlthough the two APIs look similar from a network and authentication standpoint, their permission models differ:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft Graph permissions are assigned to the AzureHound application through app registration as Microsoft Graph application permissions or Microsoft Entra RBAC roles.\u003c/li\u003e\n\u003cli\u003eARM permissions are granted through Azure RBAC role assignments made up of a security principal, role definition, and scope.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"microsoft-graph-least-privilege-findings\"\u003eMicrosoft Graph Least-Privilege Findings\u003c/h2\u003e\n\n\u003cp\u003eAzureHound sends GET requests to 17 Microsoft Graph endpoints. The article maps those endpoints to validated least-privilege permissions.\u003c/p\u003e\n\n\u003cp\u003eThe resulting Microsoft Graph application permission set contains eight granular permissions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAdministrativeUnit.Read.All\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eApplication.Read.All\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAuditLog.Read.All\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDevice.Read.All\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGroupMember.Read.All\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOrganization.Read.All\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRoleManagement.Read.Directory\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUser.Read.All\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eTwo important adjustments were made from the initial automated scan:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSome group endpoints initially suggested \u003cstrong\u003eGroup.Read.All\u003c/strong\u003e, but documentation review and testing showed \u003cstrong\u003eGroupMember.Read.All\u003c/strong\u003e was sufficient.\u003c/li\u003e\n\u003cli\u003eThe initial candidate for RBAC endpoints was \u003cstrong\u003eRoleManagement.Read.All\u003c/strong\u003e, but AzureHound only needed Entra ID directory role-management data, so \u003cstrong\u003eRoleManagement.Read.Directory\u003c/strong\u003e was sufficient.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"microsoft-graph-permission-complexities\"\u003eMicrosoft Graph Permission Complexities\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several Microsoft Graph permission complexities that affected the least-privilege work.\u003c/p\u003e\n\n\u003cp\u003eFirst, API-to-permission mapping can be one-to-many. For example, \u003ccode\u003e/v1.0/groups\u003c/code\u003e can work with multiple permissions, including \u003cstrong\u003eGroup.Read.All\u003c/strong\u003e, \u003cstrong\u003eGroupMember.Read.All\u003c/strong\u003e, and \u003cstrong\u003eDirectory.Read.All\u003c/strong\u003e. Choosing the narrowest valid permission required determining which permission worked across the fewest endpoints.\u003c/p\u003e\n\n\u003cp\u003eSecond, Microsoft Graph documentation could not be treated as complete. The article gives \u003ccode\u003e/v1.0/organization\u003c/code\u003e as an example: Microsoft documentation lists \u003cstrong\u003eOrganization.Read.All\u003c/strong\u003e as the lowest application permission, but empirical testing showed \u003cstrong\u003eUser.Read.All\u003c/strong\u003e also worked. SpecterOps chose to keep \u003cstrong\u003eOrganization.Read.All\u003c/strong\u003e because \u003cstrong\u003eUser.Read.All\u003c/strong\u003e for that endpoint was undocumented behavior and production collection should not depend on it.\u003c/p\u003e\n\n\u003cp\u003eThird, endpoint access does not prove data completeness. The article describes property-level permission behavior where Microsoft Graph can return HTTP 200 but omit, null, or withhold specific properties unless the token has the right permissions. For \u003ccode\u003e/v1.0/users\u003c/code\u003e, \u003cstrong\u003eUser.ReadBasic.All\u003c/strong\u003e could call the endpoint but returned null values for selected properties that \u003cstrong\u003eUser.Read.All\u003c/strong\u003e returned correctly. Similarly, AzureHound can read users with \u003cstrong\u003eUser.Read.All\u003c/strong\u003e, but the \u003ccode\u003esignInActivity\u003c/code\u003e property requires \u003cstrong\u003eAuditLog.Read.All\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"azure-resource-manager-least-privilege-findings\"\u003eAzure Resource Manager Least-Privilege Findings\u003c/h2\u003e\n\n\u003cp\u003eAzureHound sends GET requests to 17 ARM endpoints. The article maps those endpoints to specific Azure RBAC actions.\u003c/p\u003e\n\n\u003cp\u003eThe validated ARM permissions are consolidated into a custom \u003cstrong\u003eAzureHound Reader\u003c/strong\u003e role containing 16 specific read actions. These actions cover resource provider operations for tenants, subscriptions, resource groups, management groups, automation accounts, container registries, web sites, key vaults, logic workflows, managed clusters, storage accounts, blob containers, virtual machines, virtual machine scale sets, and role assignments.\u003c/p\u003e\n\n\u003cp\u003eThe article says ARM mapping is easier than Microsoft Graph mapping because each Azure RBAC action maps directly to one resource provider operation. For example:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eMicrosoft.Compute/virtualMachines/read\u003c/strong\u003e reads virtual machines.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMicrosoft.KeyVault/vaults/read\u003c/strong\u003e reads key vaults.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eUnlike Microsoft Graph, the article says ARM does not have one-to-many permission ambiguity or property-level side effects in this context.\u003c/p\u003e\n\n\u003ch2 id=\"scope-considerations-for-azure-rbac\"\u003eScope Considerations for Azure RBAC\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the custom AzureHound Reader role can be assigned to the AzureHound service principal at the Tenant Root Management Group. That scope is recommended for tenant-wide collection because it is inherited by every management group, subscription, resource group, and resource beneath it.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that assigning the role at a lower scope is valid for intentional partial collection. However, AzureHound will only see resources under that scope. Resources outside the scope may be absent rather than logged as permission failures because the service principal cannot enumerate resources it cannot see.\u003c/p\u003e\n\n\u003ch2 id=\"validation-process\"\u003eValidation Process\u003c/h2\u003e\n\n\u003cp\u003eSpecterOps validated the least-privilege configuration through both Microsoft Graph endpoint testing and full AzureHound output comparison.\u003c/p\u003e\n\n\u003cp\u003eFor Microsoft Graph, the author built a permission matrix harness. The harness created one service principal per candidate Graph permission, called every in-scope AzureHound Graph endpoint with each token, and recorded whether Microsoft Graph returned HTTP 200 or HTTP 403.\u003c/p\u003e\n\n\u003cp\u003eThe matrix helped identify overlaps and surprises, including \u003cstrong\u003eUser.Read.All\u003c/strong\u003e returning HTTP 200 for \u003ccode\u003e/v1.0/organization\u003c/code\u003e even though Microsoft did not document it as a valid application permission for that endpoint. The article notes that this matrix only measured access, not data completeness, so it could not serve as the final validation.\u003c/p\u003e\n\n\u003ch2 id=\"broad-privilege-versus-least-privilege-collection-comparison\"\u003eBroad-Privilege Versus Least-Privilege Collection Comparison\u003c/h2\u003e\n\n\u003cp\u003eFor full validation, the author created two service principals in a test tenant:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003edefault-priv\u003c/strong\u003e, using the previous broad privilege set.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eleast-priv\u003c/strong\u003e, using the proposed least-privilege set.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBefore running AzureHound, the author decoded tokens to confirm that each principal carried the expected permissions. The default-priv principal had \u003cstrong\u003eAuditLog.Read.All\u003c/strong\u003e, \u003cstrong\u003eDirectory.Read.All\u003c/strong\u003e, and \u003cstrong\u003eRoleManagement.Read.All\u003c/strong\u003e. The least-priv principal had the eight granular Microsoft Graph permissions.\u003c/p\u003e\n\n\u003cp\u003eThe author then ran full \u003ccode\u003eazurehound list\u003c/code\u003e collections with each principal, capturing verbose logs and JSON output to disk. The JSON outputs were compared with a hashtable-based diff function because PowerShell’s \u003ccode\u003eCompare-Object\u003c/code\u003e was too slow on large AzureHound output files.\u003c/p\u003e\n\n\u003cp\u003eSmall JSON differences were found to be the same records appearing in different order. The article attributes this to AzureHound collecting in parallel with goroutines and writing records as they return.\u003c/p\u003e\n\n\u003cp\u003eThe author also compared verbose log files after stripping timestamp prefixes. The log differences were limited to irrelevant differences such as the log filename and collection duration. The article notes that if a required Microsoft Graph permission had been missing, AzureHound would have logged an insufficient-privileges error.\u003c/p\u003e\n\n\u003cp\u003eFinally, the author compared the metadata object count embedded in each AzureHound JSON output. Both the broad-privilege and least-privilege collections reported the same count of \u003cstrong\u003e51,340\u003c/strong\u003e objects in the example shown.\u003c/p\u003e\n\n\u003cp\u003eThe full pipeline was repeated several times. According to the article, every clean back-to-back pair produced identical content, logs, and counts.\u003c/p\u003e\n\n\u003ch2 id=\"changes-summarized-by-specterops\"\u003eChanges Summarized by SpecterOps\u003c/h2\u003e\n\n\u003cp\u003eThe article summarizes the documented permission changes as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEntra RBAC:\n\n\u003cul\u003e\n\u003cli\u003ePrevious guidance: built-in \u003cstrong\u003eDirectory Readers\u003c/strong\u003e role.\u003c/li\u003e\n\u003cli\u003eLeast-privilege guidance: not required for app-based collection when using the listed Microsoft Graph application permissions.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eMicrosoft Graph:\n\n\u003cul\u003e\n\u003cli\u003ePrevious guidance: \u003cstrong\u003eDirectory.Read.All\u003c/strong\u003e, \u003cstrong\u003eRoleManagement.Read.All\u003c/strong\u003e, and \u003cstrong\u003eAuditLog.Read.All\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eLeast-privilege guidance: eight granular application permissions.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eAzure RBAC:\n\n\u003cul\u003e\n\u003cli\u003ePrevious guidance: built-in \u003cstrong\u003eReader\u003c/strong\u003e role.\u003c/li\u003e\n\u003cli\u003eLeast-privilege guidance: 16 specific read actions assigned through the custom \u003cstrong\u003eAzureHound Reader\u003c/strong\u003e role.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact-and-operational-guidance\"\u003eImpact and Operational Guidance\u003c/h2\u003e\n\n\u003cp\u003eSpecterOps says existing AzureHound deployments are not required to migrate immediately. The least-privilege set is presented as the security recommendation because it reduces standing access if the AzureHound service principal is compromised.\u003c/p\u003e\n\n\u003cp\u003eThe article states that a compromise of the AzureHound service principal would expose attack path intelligence, but the permissions remain read-only and do not directly grant write access to abuse attack paths.\u003c/p\u003e\n\n\u003cp\u003eSpecterOps also notes a maintenance tradeoff. When AzureHound gains new collection coverage, custom Microsoft Graph or ARM permissions may need to be updated. Organizations may choose to keep broader read permissions to reduce operational friction across future collector releases, but the article says this should be a conscious exception rather than the default.\u003c/p\u003e\n\n\u003cp\u003eThe article says that when new AzureHound collection coverage requires additional permissions, SpecterOps will call that out in the BloodHound release notes. Teams using the least-privilege configuration are advised to treat collector upgrades as checkpoints for reviewing whether custom permissions need updates.\u003c/p\u003e\n\n\u003ch2 id=\"main-research-takeaway\"\u003eMain Research Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main research conclusion is that least privilege for API-based collectors cannot be derived from documentation alone. SpecterOps says source inventory, empirical permission testing, and full output comparison each answered a different question:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSource inventory identified what AzureHound asks for.\u003c/li\u003e\n\u003cli\u003ePermission testing identified which permissions allow those requests.\u003c/li\u003e\n\u003cli\u003eFull output comparison verified whether the collected data remained equivalent.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article presents this process as the basis for the updated AzureHound least-privilege documentation and deployment guidance.\u003c/p\u003e\n","keyPoints":["SpecterOps published new AzureHound least-privilege documentation, updated manual deployment steps, and updated scripted configuration that use a narrower permission set by default.","AzureHound previously required broad Microsoft Graph permissions, the Azure RBAC Reader role at the Tenant Root Management Group, and the Entra ID Directory Readers role.","The validated least-privilege Microsoft Graph configuration uses eight granular application permissions instead of Directory.Read.All and RoleManagement.Read.All.","The validated least-privilege Azure RBAC configuration replaces the built-in Reader role with a custom AzureHound Reader role containing 16 specific read actions.","SpecterOps validated the least-privilege configuration through source inventory, endpoint-level permission testing, and full AzureHound output comparison against the previous broad-permission configuration."],"insights":["Microsoft Graph endpoint access alone is not enough to validate collection fidelity because an HTTP 200 response can still omit or null specific properties without the required permission set.","SpecterOps kept Organization.Read.All in the least-privilege set even though User.Read.All worked empirically for /v1.0/organization, because relying on undocumented Microsoft Graph behavior was considered unsuitable for production collection.","Assigning the custom AzureHound Reader role below the Tenant Root Management Group can cause AzureHound to miss resources outside that scope rather than log permission failures, because the service principal cannot enumerate resources it cannot see.","Teams using the least-privilege configuration should treat AzureHound upgrades as permission-review checkpoints, because new collection coverage may require updates to Microsoft Graph or Azure RBAC permissions.","The least-privilege validation required comparing full AzureHound output and logs, not just checking API permissions, because parallel collection can produce identical records in different orders."],"referencedReports":[],"body":"\u003cp\u003eSpecterOps has published new least-privilege documentation for AzureHound, the collector that feeds Microsoft Entra ID and Azure Resource Manager data into BloodHound. The work produced a new reference article, updated manual deployment steps, and updated scripted deployment steps that use a narrower permission set by default. SpecterOps says the goal is tighter access control while recognizing that broader read permissions can reduce maintenance across future releases.\u003c/p\u003e\n\n\u003cp\u003eThe previous AzureHound guidance used broad permissions, including Microsoft Graph Directory.Read.All and RoleManagement.Read.All, Azure RBAC Reader at the Tenant Root Management Group, and the Entra ID Directory Readers role. The new least-privilege approach replaces those with eight granular Microsoft Graph application permissions and a custom AzureHound Reader role containing 16 specific Azure RBAC read actions. SpecterOps validated the changes through source inventory, documentation review, endpoint-level permission testing, and full AzureHound output comparison.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that least privilege for API-based collectors cannot be derived from documentation alone. Microsoft Graph behavior included one-to-many permission mappings, incomplete documentation, and property-level permission effects where an endpoint could return HTTP 200 while omitting requested data. SpecterOps found that least-privilege collections produced equivalent content, logs, and object counts compared with the prior broad-permission configuration in repeated testing.\u003c/p\u003e\n"},{"n":30,"title":"Turning Cloudflare’s threat indicators into real-time WAF rules","source":"blog.cloudflare.com","sourceColorIdx":2,"link":"https://blog.cloudflare.com/realtime-threat-intel-waf-rules/","time":"13:00","priority":"MAY READ","score":65,"tldr":"Cloudflare now lets Cloudforce One customers use live Threat Events intelligence directly in WAF rules, enabling automated blocking based on threat actors, targeted industries or countries, attacker countries, and datasets like DDoS or WAF. The feature adds always-on detection, Security Analytics visibility, and one-click rule creation from saved Threat Events views.","briefOverview":"\u003cp\u003eCloudflare announced a new integration that brings Threat Events intelligence directly into its WAF engine. The feature allows customers to write proactive rules using live intelligence data, including known threat actor names, targeted industries, targeted countries, attacker countries, and data sources such as DDoS or WAF datasets. Cloudflare says this helps customers move from manually configuring rules to automating mitigation based on high-risk indicators.\u003c/p\u003e\n\n\u003cp\u003eThe capability is built on Cloudflare’s always-on detection framework, which separates detection from mitigation. Threat intelligence runs in the background and enriches HTTP request analytics before a customer chooses an action such as blocking. Cloudflare says Cloudforce One subscribers can view these insights in analytics and verify traffic patterns before enabling enforcement.\u003c/p\u003e\n\n\u003cp\u003eThe new fields are available in WAF custom rules and rate limiting rules through the Cloudflare dashboard, API, and Terraform. Because the fields are arrays, Cloudflare recommends using expressions such as \u003ccode\u003eany()\u003c/code\u003e with the \u003ccode\u003e[*]\u003c/code\u003e wildcard to match multiple values associated with a single IP address. Cloudflare says the datasets are distributed to its data centers globally and checked through constant-time local lookups with negligible latency.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCloudflare announced that customers can now use live Threat Events intelligence data directly in WAF rules. The article says security teams previously had visibility into IP addresses associated with threat actors or industry targeting, but often had to manually configure WAF rules to act on that information. The new integration is intended to turn that threat intelligence into proactive rules before the traffic reaches customer infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe feature exposes new WAF fields under \u003ccode\u003ecf.intel.ip\u003c/code\u003e, including attacker names, target industries, attacker countries, target countries, and datasets. Cloudflare gives examples such as matching known threat groups like \u003ccode\u003eCRAVENFLEA\u003c/code\u003e, industries such as \u003ccode\u003eCryptocurrency\u003c/code\u003e or \u003ccode\u003eAutomotive\u003c/code\u003e, and datasets such as \u003ccode\u003eddos\u003c/code\u003e or \u003ccode\u003ewaf\u003c/code\u003e. Example rules include blocking DDoS participants targeting France, protecting the finance sector from \u003ccode\u003eBLACKBASTA\u003c/code\u003e, and broadly filtering traffic associated with attacker country \u003ccode\u003eIR\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eCloudflare says the capability uses the same always-on detection framework recently introduced for Attack Signature Detection. In this model, detection is separated from mitigation so threat intelligence can enrich HTTP request analytics before a customer decides whether to take action. The article says this avoids the traditional trade-off between log mode and block mode because the system continues providing visibility even before enforcement is enabled.\u003c/p\u003e\n\n\u003cp\u003eThe new fields are integrated into existing workflows for WAF custom rules and rate limiting rules. Customers can use the Cloudflare dashboard, API, and Terraform to write expressions with the same syntax they already use. The article also says matches involving these threat intelligence fields are logged in Security Analytics, where users can inspect which rule was triggered and which indicator matched.\u003c/p\u003e\n\n\u003cp\u003eCloudflare also describes a one-click workflow from the Threat Intelligence Dashboard. Users can create Saved Views using filters such as IPs seen attacking the financial sector in the last seven days, then export those filters directly into a WAF rule. The feature is available to customers with any active Cloudforce One subscription, including Essentials, Advantage, and Elite tiers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCloudflare announced a new integration that allows customers to use live Threat Events intelligence directly inside the Cloudflare WAF engine. The article frames the release as a way to move from visibility into threats toward active mitigation based on Cloudflare’s global threat intelligence. Security teams can now write proactive WAF rules using intelligence context before known bad actors attempt to reach customer infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThreat Events already provides security analysts with visibility into the global threat landscape, including IPs attacking specific industries and threat actors trending globally. The article says the challenge for security teams has been translating that visibility into automated blocking. Previously, teams could know that certain IP addresses were associated with specific threat actors, such as Tycoon 2FA or RaccoonO365, or had been observed targeting their industry elsewhere, but still had to manually configure WAF rules.\u003c/p\u003e\n\n\u003ch2 id=\"what-cloudflare-announced\"\u003eWhat Cloudflare announced\u003c/h2\u003e\n\n\u003cp\u003eCloudflare says customers can now create WAF rules using live intelligence data. The WAF can screen traffic based on three main types of threat context:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWho is attacking, by matching threat actor names.\u003c/li\u003e\n\u003cli\u003eWho they have targeted, using industry or country filters.\u003c/li\u003e\n\u003cli\u003eWhat type of activity was observed, using enriched threat context such as DDoS, WAF, cybercrime, and the timeframe in which the activity was last seen.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article presents this as a way to add intelligence context to application protection and to block known bad actors before they interact with customer infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"always-on-detection-model\"\u003eAlways-on detection model\u003c/h2\u003e\n\n\u003cp\u003eThe capability is built on Cloudflare’s always-on detection framework, which the article says was recently introduced for Attack Signature Detection. This framework identifies common attack patterns in real time without requiring preconfigured rules. In this release, threat intelligence runs in the background and enriches HTTP request analytics before customers decide what action to take.\u003c/p\u003e\n\n\u003cp\u003eCloudflare says the main advantage of this model is that it removes the traditional log-versus-block trade-off. In a conventional model, customers may choose between observing traffic in log mode or protecting systems in block mode. The article notes that when a rule blocks a request, customers can lose visibility into how other signatures would have assessed it, which could otherwise help strengthen defenses.\u003c/p\u003e\n\n\u003cp\u003eFor customers with a Cloudforce One subscription, Cloudflare says the insights appear automatically in analytics. Customers can see which threat actors are hitting their site and which industries those IPs usually target. This allows teams to verify traffic patterns before enabling blocking.\u003c/p\u003e\n\n\u003ch2 id=\"new-waf-fields\"\u003eNew WAF fields\u003c/h2\u003e\n\n\u003cp\u003eCloudflare exposed specific threat intelligence signals to the WAF engine through new fields. The fields listed in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ecf.intel.ip.attacker_names\u003c/code\u003e: names of known threat groups, such as \u003ccode\u003eCRAVENFLEA\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecf.intel.ip.target_industries\u003c/code\u003e: industries targeted by the IP, such as \u003ccode\u003eCryptocurrency\u003c/code\u003e or \u003ccode\u003eAutomotive\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecf.intel.ip.attacker_countries\u003c/code\u003e: the source country of the threat event.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecf.intel.ip.target_countries\u003c/code\u003e: countries targeted by the threat event.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecf.intel.ip.datasets\u003c/code\u003e: the source feed providing the data, such as \u003ccode\u003eddos\u003c/code\u003e or \u003ccode\u003ewaf\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says a single IP address can be associated with multiple threat actors or targeted industries at the same time. For that reason, the fields are represented as arrays. Cloudflare recommends using the \u003ccode\u003eany()\u003c/code\u003e function and the \u003ccode\u003e[*]\u003c/code\u003e wildcard to check whether any value in the threat profile matches a customer’s criteria.\u003c/p\u003e\n\n\u003ch2 id=\"example-waf-expressions\"\u003eExample WAF expressions\u003c/h2\u003e\n\n\u003cp\u003eCloudflare provides several example expressions for the new fields:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBlocking known DDoS participants targeting France: \u003ccode\u003eany(cf.intel.ip.target_countries[*] == \u0026quot;FR\u0026quot;) and any(cf.intel.ip.datasets[*] == \u0026quot;ddos\u0026quot;)\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eProtecting against a specific threat actor targeting the finance sector: \u003ccode\u003eany(cf.intel.ip.target_industries[*] == \u0026quot;Banking \u0026amp; Financial Services\u0026quot;) and any(cf.intel.ip.attacker_names[*] == \u0026quot;BLACKBASTA\u0026quot;)\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eApplying broad protection against specific high-risk origin countries: \u003ccode\u003eany(cf.intel.ip.attacker_countries[*] == \u0026quot;IR\u0026quot;)\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese examples show how customers can combine intelligence attributes such as target country, dataset, industry, actor name, and attacker country in WAF logic.\u003c/p\u003e\n\n\u003ch2 id=\"workflow-integration\"\u003eWorkflow integration\u003c/h2\u003e\n\n\u003cp\u003eThe new \u003ccode\u003ecf.intel\u003c/code\u003e fields are integrated into Cloudflare’s WAF rule builder for WAF custom rules and rate limiting rules. The article says teams can write complex expressions using the same syntax they already use. Because the fields are standard WAF fields, they are supported through the Cloudflare API and Terraform.\u003c/p\u003e\n\n\u003cp\u003eCloudflare says this makes it possible to automate threat blocking across selected domains or across an entire account. The article positions this as useful for teams that prefer Infrastructure as Code as well as teams that use the dashboard.\u003c/p\u003e\n\n\u003ch2 id=\"visibility-in-security-analytics\"\u003eVisibility in Security Analytics\u003c/h2\u003e\n\n\u003cp\u003eCloudflare says all matches triggered by the threat intelligence fields are logged in Security Analytics. Users can review traffic to see which rule was triggered and which specific indicator matched. The article says these enriched logs support faster auditing and postmortem analysis when a rule triggers.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes a one-click option from Security Analytics to create a custom security rule based on threat event matches. This gives customers a way to move from observed intelligence matches into enforceable rules.\u003c/p\u003e\n\n\u003ch2 id=\"one-click-rule-creation-from-threat-events\"\u003eOne-click rule creation from Threat Events\u003c/h2\u003e\n\n\u003cp\u003eCloudflare describes a workflow for users already investigating trends in the Threat Intelligence Dashboard. Users can create Saved Views based on filters, such as IPs seen attacking the financial sector in the last seven days. Those Saved Views can then be exported directly into a WAF rule.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that this removes the need to copy and paste IP lists. Instead, the saved filter configuration can become rule logic in the WAF.\u003c/p\u003e\n\n\u003ch2 id=\"performance-and-global-distribution\"\u003ePerformance and global distribution\u003c/h2\u003e\n\n\u003cp\u003eCloudflare says the underlying threat intelligence datasets are compressed into a high-performance format and distributed to every Cloudflare data center globally. When a request reaches the network, the Cloudflare WAF performs an \u003ccode\u003eO(1)\u003c/code\u003e constant-time lookup against local datasets. The article says this keeps latency overhead effectively zero and measured in microseconds.\u003c/p\u003e\n\n\u003cp\u003eBecause one IP can be associated with multiple threat vectors, the engine does not stop at the first match. Cloudflare says it evaluates all signals associated with the IP simultaneously. This allows compound rules such as attacker country equals Russia and target industry equals banking to trigger by evaluating the intersection of attributes in a single pass.\u003c/p\u003e\n\n\u003ch2 id=\"current-scope-and-future-direction\"\u003eCurrent scope and future direction\u003c/h2\u003e\n\n\u003cp\u003eThe initial release focuses on IP-based matching. Cloudflare says it is already looking toward extending the capability to JA3 fingerprints and domain-based matching. The article says this would help block malicious traffic even when attackers rotate IPs, by identifying unique software signatures or malicious destination links used in payloads.\u003c/p\u003e\n\n\u003ch2 id=\"availability\"\u003eAvailability\u003c/h2\u003e\n\n\u003cp\u003eThe feature is available to customers with any active Cloudforce One subscription. The article lists three subscription tiers:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCloudforce One Essentials, which allows access to default datasets in Threat Events, indicator search, and threat-hunting investigations.\u003c/li\u003e\n\u003cli\u003eCloudforce One Advantage, which provides access to Threat Intelligence Analyst custom insights through requests for information.\u003c/li\u003e\n\u003cli\u003eCloudforce One Elite, which includes brand protection, a high number of requests for information, and access to all Threat Events datasets.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCloudflare directs customers to Threat Events or the WAF section of the Cloudflare Dashboard to begin building Threat Intel rules, or to contact their account team about subscribing to Cloudforce One.\u003c/p\u003e\n","keyPoints":["Cloudflare announced a new integration that allows customers to write WAF rules using live Threat Events intelligence data.","The new WAF fields include threat actor names, targeted industries, attacker countries, targeted countries, and source datasets such as DDoS or WAF feeds.","The capability is built on Cloudflare’s always-on detection framework, which enriches HTTP request analytics with threat metadata before customers decide whether to take action.","Customers can use the new cf.intel fields in WAF custom rules and rate limiting rules through the Cloudflare dashboard, API, and Terraform.","Threat intelligence datasets are distributed to Cloudflare data centers globally, where the WAF performs constant-time local lookups to minimize latency."],"insights":["Security teams can test threat-intelligence matches in analytics before blocking because Cloudflare separates always-on detection from mitigation, reducing the traditional trade-off between visibility and enforcement.","The WAF fields are arrays, so effective rules need expressions such as any() with the [*] wildcard to match IPs associated with multiple actors, industries, countries, or datasets.","Saved Views in the Threat Intelligence Dashboard can be converted directly into WAF rules, allowing filters such as recent IPs targeting a specific sector to become enforcement logic without copying IP lists.","Cloudflare’s implementation evaluates all threat signals associated with an IP in a single pass, enabling compound logic such as attacker country plus target industry without stopping at the first match."],"referencedReports":[],"body":"\u003cp\u003eCloudflare announced a new integration that brings Threat Events intelligence directly into its WAF engine. The feature allows customers to write proactive rules using live intelligence data, including known threat actor names, targeted industries, targeted countries, attacker countries, and data sources such as DDoS or WAF datasets. Cloudflare says this helps customers move from manually configuring rules to automating mitigation based on high-risk indicators.\u003c/p\u003e\n\n\u003cp\u003eThe capability is built on Cloudflare’s always-on detection framework, which separates detection from mitigation. Threat intelligence runs in the background and enriches HTTP request analytics before a customer chooses an action such as blocking. Cloudflare says Cloudforce One subscribers can view these insights in analytics and verify traffic patterns before enabling enforcement.\u003c/p\u003e\n\n\u003cp\u003eThe new fields are available in WAF custom rules and rate limiting rules through the Cloudflare dashboard, API, and Terraform. Because the fields are arrays, Cloudflare recommends using expressions such as \u003ccode\u003eany()\u003c/code\u003e with the \u003ccode\u003e[*]\u003c/code\u003e wildcard to match multiple values associated with a single IP address. Cloudflare says the datasets are distributed to its data centers globally and checked through constant-time local lookups with negligible latency.\u003c/p\u003e\n"},{"n":7,"title":"New Apple feature automatically changes your compromised passwords","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/apple/new-apple-feature-automatically-changes-your-compromised-passwords/","time":"21:03","priority":"MAY READ","score":64,"tldr":"Apple announced an iOS 27 Apple Intelligence feature that can automatically update eligible weak or compromised passwords to strong ones in Safari and the Passwords app. Apple says the feature will use on-device models and Private Cloud Compute to protect user privacy.","briefOverview":"\u003cp\u003eAt WWDC 2026, Apple announced an Apple Intelligence-powered feature that can automatically fix weak and compromised passwords. The feature is intended for Safari and the built-in Passwords app, which already flag weak, duplicate, or compromised passwords. Apple says the new capability will let those tools automatically update eligible accounts to strong passwords.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the change as a move from password warnings to automated password remediation. Apple says the Passwords app and Safari will use AI to “agentically” take action based on user behavior and secure passwords automatically. The feature is scheduled to launch with iOS 27 later this year, with beta access available through Apple’s Developer Program.\u003c/p\u003e\n\n\u003cp\u003eApple says the feature is powered by the next generation of Apple Foundation Models. The article states that those models run on device and on servers using Private Cloud Compute, and Apple says personal data handled by Private Cloud Compute is not stored or made accessible to Apple or anyone else. The article also says the foundation models were custom-built in collaboration with Google and used Gemini models, likely their output, to fine-tune Apple’s own model.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eApple announced at WWDC 2026 that it is adding an Apple Intelligence-powered password security feature to iOS 27. The feature can automatically fix weak and compromised passwords in Safari and the built-in Passwords app. According to the article, the current Apple password tools can already identify weak, duplicate, or compromised passwords, but they do not automatically remediate them.\u003c/p\u003e\n\n\u003cp\u003eThe new capability is described as an “agentic” password manager that can take action based on user behavior. Apple says Safari and the Passwords app will be able to automatically update eligible accounts to strong passwords. This means the tools will move beyond warning users and helping generate secure passwords when creating accounts.\u003c/p\u003e\n\n\u003cp\u003eApple says the feature is backed by the next generation of Apple Foundation Models. The article says these models were custom-built in collaboration with Google and that Apple used Gemini models, likely their output, to fine-tune its own model. Apple also says the models are deeply integrated into Apple Intelligence experiences.\u003c/p\u003e\n\n\u003cp\u003ePrivacy and security are emphasized as part of the feature’s design. Apple says the latest models run on device and on servers using Private Cloud Compute. The article says Apple claims Private Cloud Compute does not store users’ personal data or make it accessible to Apple or anyone else.\u003c/p\u003e\n\n\u003cp\u003eThe affected products named in the article are iOS 27, Safari, and the built-in Passwords app. Apple says the Apple Intelligence improvements and the agentic password manager will arrive later this year with iOS 27. Users who do not want to wait can sign up for the Developer Program and try the beta build.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eApple announced at WWDC 2026 a new Apple Intelligence-powered password feature that can automatically fix weak and compromised passwords. The feature is designed for Safari and the built-in Apple Passwords app. According to the article, it will launch with iOS 27 later this year.\u003c/p\u003e\n\n\u003cp\u003eThe article presents the feature as a change from passive password monitoring to automated remediation. Safari and the Passwords app can already flag weak, duplicate, or compromised passwords. The new capability is intended to automatically update eligible accounts to strong passwords.\u003c/p\u003e\n\n\u003ch2 id=\"current-password-capabilities\"\u003eCurrent Password Capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Safari and Apple’s built-in Passwords app currently detect and warn users about password issues. These include weak passwords, duplicate passwords, and compromised passwords.\u003c/p\u003e\n\n\u003cp\u003eWhen a user creates an account and enters a password, Apple can warn the user if the password is weak. Safari can also help users create a secure password. However, the article says these existing tools do not automatically fix weak or compromised passwords.\u003c/p\u003e\n\n\u003ch2 id=\"new-ios-27-password-feature\"\u003eNew iOS 27 Password Feature\u003c/h2\u003e\n\n\u003cp\u003eApple says the new feature will use AI to “agentically” take action based on user behavior. In the article’s description, this means Safari and the Passwords app can secure passwords automatically rather than only notifying users about problems.\u003c/p\u003e\n\n\u003cp\u003eThe feature is described as an “Agentic password manager in iOS 27.” It will be available for the Passwords app and Safari. Apple says it can automatically update eligible accounts to strong passwords.\u003c/p\u003e\n\n\u003cp\u003eKey product and platform details include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe feature was announced at WWDC 2026.\u003c/li\u003e\n\u003cli\u003eIt is powered by Apple Intelligence.\u003c/li\u003e\n\u003cli\u003eIt applies to Safari and the built-in Passwords app.\u003c/li\u003e\n\u003cli\u003eIt is planned for iOS 27.\u003c/li\u003e\n\u003cli\u003eIt can automatically update eligible accounts to strong passwords.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"ai-model-and-technical-foundation\"\u003eAI Model and Technical Foundation\u003c/h2\u003e\n\n\u003cp\u003eApple says the feature is powered by the next generation of Apple Foundation Models. The article states that these foundation models were custom-built in collaboration with Google. It also says Apple used Gemini models, likely their output, to fine-tune Apple’s own model.\u003c/p\u003e\n\n\u003cp\u003eThe article quotes Apple as saying that the latest models run on device and on servers using Private Cloud Compute. Apple also says the Apple Intelligence architecture is built privacy-first, from the Apple Foundation Models to the operating system technologies that integrate the models into Apple’s platforms.\u003c/p\u003e\n\n\u003ch2 id=\"privacy-and-security-claims\"\u003ePrivacy and Security Claims\u003c/h2\u003e\n\n\u003cp\u003eApple emphasizes privacy and security in connection with the new Apple Intelligence features. The article says most of these features run locally on new iPhones. It also says Apple uses Private Cloud Compute for some cloud-based processing without sharing users’ personal data.\u003c/p\u003e\n\n\u003cp\u003eApple says that when Private Cloud Compute handles user requests, users’ personal data is not stored and is not made accessible to Apple or anyone else. The article presents this as part of Apple’s argument that users do not need to worry about safety or privacy when using the new feature.\u003c/p\u003e\n\n\u003ch2 id=\"availability\"\u003eAvailability\u003c/h2\u003e\n\n\u003cp\u003eApple says the Apple Intelligence improvements and the agentic password manager will arrive with iOS 27 later this year. The article also notes that users who do not want to wait can sign up for Apple’s Developer Program and try the beta build today.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-named-entities\"\u003eAffected Parties and Named Entities\u003c/h2\u003e\n\n\u003cp\u003eThe article focuses on Apple and its users. The relevant products and services named are iOS 27, Safari, the Apple Passwords app, Apple Intelligence, Apple Foundation Models, Private Cloud Compute, Google, and Gemini.\u003c/p\u003e\n\n\u003cp\u003eNo threat actor, attack campaign, malware family, CVE, or specific victim organization is identified in the article. The security relevance centers on password hygiene and automated remediation of weak or compromised credentials within Apple’s ecosystem.\u003c/p\u003e\n","keyPoints":["At WWDC 2026, Apple announced an Apple Intelligence-powered feature that can automatically fix weak and compromised passwords.","The new feature will launch with iOS 27 for the Passwords app and Safari and can automatically update eligible accounts to strong passwords.","Apple says the built-in Passwords app and Safari now use AI to agentically take action based on user behavior and secure passwords automatically.","Apple says the features are powered by the next generation of Apple Foundation Models and run on device and on servers using Private Cloud Compute.","Apple says Private Cloud Compute does not store users’ personal data or make it accessible to Apple or anyone else."],"insights":["Apple is moving its password manager from passive warnings to automated remediation, which could reduce the need for users to manually change compromised or weak passwords on eligible accounts.","The feature extends beyond the standalone Passwords app into Safari, meaning password security changes may occur during normal web account use rather than only inside a dedicated password manager.","Apple says its new Foundation Models were custom-built in collaboration with Google using Gemini models, showing that the Apple Intelligence password feature is tied to a cross-vendor AI model development effort.","Users who want early access do not have to wait for the general iOS 27 release, because Apple says the feature is available through the Developer Program beta build."],"referencedReports":[],"body":"\u003cp\u003eAt WWDC 2026, Apple announced an Apple Intelligence-powered feature that can automatically fix weak and compromised passwords. The feature is intended for Safari and the built-in Passwords app, which already flag weak, duplicate, or compromised passwords. Apple says the new capability will let those tools automatically update eligible accounts to strong passwords.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the change as a move from password warnings to automated password remediation. Apple says the Passwords app and Safari will use AI to “agentically” take action based on user behavior and secure passwords automatically. The feature is scheduled to launch with iOS 27 later this year, with beta access available through Apple’s Developer Program.\u003c/p\u003e\n\n\u003cp\u003eApple says the feature is powered by the next generation of Apple Foundation Models. The article states that those models run on device and on servers using Private Cloud Compute, and Apple says personal data handled by Private Cloud Compute is not stored or made accessible to Apple or anyone else. The article also says the foundation models were custom-built in collaboration with Google and used Gemini models, likely their output, to fine-tune Apple’s own model.\u003c/p\u003e\n"},{"n":25,"title":"The New Data Breach Playbook: How ShinyHunters Exploit Access","source":"cyera.com","sourceColorIdx":9,"link":"https://www.cyera.com/research/the-new-data-breach-playbook-how-shinyhunters-exploit-access","time":"20:51","priority":"MAY READ","score":58,"tldr":"ShinyHunters-style breaches show that attackers increasingly steal data by abusing legitimate identities, OAuth tokens, SaaS integrations, and misconfigured access rather than exploiting systems directly. Defenders need data-centric visibility into where sensitive data lives and who or what can reach it across cloud and SaaS environments.","briefOverview":"\u003cp\u003eThe article argues that ShinyHunters represents a shift in cybercrime from breaking systems to abusing legitimate access. It describes the group’s recurring pattern as gaining access through credentials, session tokens, OAuth access, social engineering, misconfigurations, or third-party integrations, then using native SaaS and cloud platform capabilities to extract data at scale. The central significance is that traditional endpoint and vulnerability-focused defenses may miss activity that looks like legitimate user or application behavior.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights incidents and examples involving Snowflake, Vercel/Context.ai, Salesforce, Salesloft, Gainsight, and Vimeo to show how one compromised identity, vendor, or integration can cascade across a SaaS ecosystem. In the Vimeo case study, the article says leaked data included identity data, business operations data, product analytics, content metadata, marketing and attribution data, and API-related data. It frames this type of exposure as a complete blueprint of an organization that can support targeted phishing, account takeover, business email compromise, and competitive intelligence misuse.\u003c/p\u003e\n\n\u003cp\u003eFor defenders, the article’s main recommendation is to move security focus closer to the data layer. It says organizations need to continuously understand where sensitive data lives, who or what can access it, how access paths are connected, and which datasets are overexposed. The proposed defensive model correlates identity, environment, sensitivity, and reachability to identify and reduce risk before an attacker logs in or exfiltrates data.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article presents ShinyHunters as a cybercriminal collective that emerged around 2019 and built its reputation around data theft, sales, leaks, and extortion rather than destructive attacks. It says the group’s name has been tied to high-profile SaaS and data exposure incidents, while also noting that the ShinyHunters identity is contested in an open conflict between BreachForums operators and a separate leak-or-pay extortion site. Both sides are described as claiming legitimacy and accusing the other of impersonation.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central technical theme is that ShinyHunters-style operations are not defined by a single exploit or malware family. Instead, the group and actors using its name are described as relying on stolen credentials, session tokens, OAuth abuse, vishing, victim-branded SSO phishing, overly permissive SaaS configurations, and compromised third-party integrations. Once access is obtained, attackers use legitimate APIs, export functions, and platform capabilities in systems such as CRMs, databases, analytics platforms, and cloud services to remove structured data at scale.\u003c/p\u003e\n\n\u003cp\u003eSeveral examples are used to illustrate this pattern. The article cites Snowflake-related intrusions where access reportedly came through stolen customer credentials, often without MFA, rather than a Snowflake platform vulnerability. It also describes Vercel disclosing a breach in April 2026 after attackers first compromised Context.ai through an infostealer-infected tool downloaded by a developer, then abused an overly permissive OAuth integration to take over a Vercel employee account.\u003c/p\u003e\n\n\u003cp\u003eThe article also discusses Salesforce-related campaigns involving phone-based social engineering, malicious connected apps, SSO or MFA access, and misconfigured Salesforce Experience Cloud or Aura setups. It says third-party and integration compromises involving providers such as Salesloft, Drift, and Gainsight demonstrate how stolen OAuth or refresh tokens can be reused to access downstream customer environments. These cases are used to argue that modern SaaS platforms and integrations function as data access paths that can expose large amounts of sensitive information without a traditional infrastructure compromise.\u003c/p\u003e\n\n\u003cp\u003eA detailed case study focuses on a Vimeo dataset publicly leaked on April 29, 2026, described as a multi-layered exposure across the SaaS stack. The article says the data included active users, registration logs, Salesforce and sales conversion tables, product analytics and telemetry, content and streaming datasets, marketing attribution data, and API data. It states that the combined exposure could enable targeted phishing, account takeover, business email compromise, fraud aligned with legitimate business activity, and competitive intelligence use.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that identity controls are necessary but not enough because the key question after a valid login is what data the identity or integration can reach. It recommends a data-centric security model that discovers and classifies sensitive data, maps identities and integrations to effective access, and analyzes exposure through identity, environment, sensitivity, and reachability. The article’s final section presents Cyera’s Data Security Posture Management platform as a way to provide this visibility across cloud, SaaS, and on-prem environments.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that ShinyHunters and ShinyHunters-style activity illustrate a major shift in cybercrime: attackers increasingly abuse legitimate access instead of breaking systems through traditional exploits. The article’s core claim is that access is now the exploit, with credentials, OAuth tokens, session data, SaaS integrations, and social engineering serving as common entry points. Once inside, attackers use normal platform features such as APIs and exports to extract large volumes of data.\u003c/p\u003e\n\n\u003cp\u003eThe piece frames these campaigns as blueprints rather than isolated incidents. It says incidents involving Snowflake, Vercel/Context.ai, Salesloft, and Vimeo show how one compromised identity, vendor, or integration can expose data across an organization’s SaaS stack. The article’s defensive message is that endpoint and vulnerability controls remain necessary, but are insufficient without visibility into data location, sensitivity, identity access, and reachability.\u003c/p\u003e\n\n\u003ch2 id=\"who-shinyhunters-are\"\u003eWho ShinyHunters Are\u003c/h2\u003e\n\n\u003cp\u003eThe article describes ShinyHunters as a cybercriminal collective that emerged around 2019 on underground forums. From the beginning, its activity centered on stealing and monetizing data rather than encrypting systems or conducting destructive attacks. The group gained visibility through the volume and scale of its leaks and became associated with large customer databases, high-value SaaS and enterprise targets, and extortion campaigns based on threats to leak or sell stolen data.\u003c/p\u003e\n\n\u003cp\u003eThe article also says ShinyHunters is loosely connected to broader cybercrime ecosystems involving credential theft, access brokerage, and identity-based attacks. It notes that more recent activity attributed to the group has resembled LAPSUS\u003cspan class=\"math inline\"\u003e\\(-style operations emphasizing social engineering and identity compromise over technical exploitation. It refers to an entity called SLSH, described as Scattered Spider, LAPSUS\\)\u003c/span\u003e, and ShinyHunters.\u003c/p\u003e\n\n\u003ch2 id=\"contested-shinyhunters-identity\"\u003eContested ShinyHunters Identity\u003c/h2\u003e\n\n\u003cp\u003eThe article says that, as of March–April 2026, the ShinyHunters name is at the center of an open conflict. One side consists of BreachForums operators using the ShinyHunters identity, while the other is a leak-or-pay extortion site operating under the same name. Both sides claim to be the legitimate group, accuse the other of impersonation, and have escalated the dispute by leaking data about one another.\u003c/p\u003e\n\n\u003cp\u003eThe article includes claims attributed to the alleged “real ShinyHunters group” saying they no longer run BreachForums after an FBI seizure on October 10, 2025. The claims also state that they do not operate on Telegram or leak forum platforms and that current forums using various domains are fake. The article presents this dispute as part of how the ShinyHunters brand is leveraged in the underground to increase credibility and pressure victims.\u003c/p\u003e\n\n\u003ch2 id=\"modus-operandi\"\u003eModus Operandi\u003c/h2\u003e\n\n\u003cp\u003eThe article states that ShinyHunters is not defined by a single malware family or exploit. Instead, its strength lies in access abuse and data extraction. Across incident response investigations, the article identifies several recurring patterns:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCompromised credentials, session tokens, or OAuth access are frequent entry points.\u003c/li\u003e\n\u003cli\u003eAttackers abuse SaaS and cloud platforms rather than directly breaching infrastructure.\u003c/li\u003e\n\u003cli\u003eThey use legitimate APIs, export features, and platform functionality in CRMs, databases, and analytics systems.\u003c/li\u003e\n\u003cli\u003eTheir main goal is rapid extraction of structured datasets such as users, emails, phone numbers, financial data, and behavioral data.\u003c/li\u003e\n\u003cli\u003eMonetization occurs through underground sales, leaks, and extortion.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this reflects a broader shift toward attacking the data layer through identity and access rather than directly exploiting software vulnerabilities.\u003c/p\u003e\n\n\u003ch2 id=\"initial-access-patterns\"\u003eInitial Access Patterns\u003c/h2\u003e\n\n\u003cp\u003eThe article describes several initial access paths associated with ShinyHunters-style intrusions.\u003c/p\u003e\n\n\u003ch3 id=\"stolen-credentials\"\u003eStolen Credentials\u003c/h3\u003e\n\n\u003cp\u003eStolen credentials are presented as a common entry point, often sourced from infostealer logs, reused passwords, contractor machines, or previously compromised accounts. In Snowflake-related intrusions, the article says Mandiant reported access through stolen customer credentials, often without MFA, rather than through a Snowflake platform vulnerability. The article states that valid usernames and passwords, old credentials, weak IP restrictions, absent MFA, and highly privileged accounts enabled attackers to query or export tables at scale.\u003c/p\u003e\n\n\u003ch3 id=\"vercel-and-context-ai\"\u003eVercel and Context.ai\u003c/h3\u003e\n\n\u003cp\u003eThe article says Vercel disclosed a breach in April 2026 in which attackers gained access to internal systems after first compromising a third-party AI service, Context.ai. It states that Context.ai was breached through a developer who downloaded an infostealer-infected tool disguised as Roblox cheats. This allowed attackers to steal session data, including OAuth tokens, and then abuse an overly permissive OAuth integration to take over a Vercel employee’s account.\u003c/p\u003e\n\n\u003cp\u003eThe article says the threat actor, identified as ShinyHunters in the discussion, attempted to monetize the incident by advertising allegedly stolen data for around $2 million on underground forums. It also notes that the real group denied involvement, suggesting that the ShinyHunters name may have been used to increase credibility rather than accurately identify the operator.\u003c/p\u003e\n\n\u003ch3 id=\"vishing-and-social-engineering\"\u003eVishing and Social Engineering\u003c/h3\u003e\n\n\u003cp\u003eThe article says Salesforce campaigns tied by Google/Mandiant to ShinyHunters-branded activity involved phone-based social engineering. Attackers impersonated IT support and tricked employees into authorizing malicious connected apps or providing SSO or MFA access. The article also describes victim-branded phishing infrastructure using company-specific SSO pages such as companyname-sso.com.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, these tailored phishing pages were combined with phone-based social engineering to increase trust and success rates. Attackers used the access to gain legitimate entry and often register their own MFA device immediately. The article frames this as persistence established from the outset.\u003c/p\u003e\n\n\u003ch3 id=\"misconfigured-salesforce-experience-cloud-and-aura\"\u003eMisconfigured Salesforce Experience Cloud and Aura\u003c/h3\u003e\n\n\u003cp\u003eThe article says ShinyHunters-linked campaigns exploited misconfigured Salesforce Experience Cloud and Aura setups. In these cases, guest users and public APIs were overly permissive. Attackers queried exposed endpoints and extracted large volumes of data without credentials or malware.\u003c/p\u003e\n\n\u003ch3 id=\"third-party-and-integration-compromise\"\u003eThird-Party and Integration Compromise\u003c/h3\u003e\n\n\u003cp\u003eThe article highlights third-party SaaS integrations as one of the most scalable and impactful access vectors. It says attackers compromise integration providers such as Salesloft, Gainsight, and analytics platforms to steal OAuth or refresh tokens. Those tokens are then reused to access hundreds of downstream customer environments.\u003c/p\u003e\n\n\u003cp\u003eThe article specifically mentions incidents involving integrations like Drift through Salesloft and Gainsight. These are used to show how a single vendor compromise can cascade into large-scale downstream access across many organizations.\u003c/p\u003e\n\n\u003ch2 id=\"databases-and-saas-as-data-targets\"\u003eDatabases and SaaS as Data Targets\u003c/h2\u003e\n\n\u003cp\u003eThe article says ShinyHunters-style database access usually falls into four categories:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eCloud database credentials from stealer logs:\u003c/strong\u003e Attackers use valid credenti
