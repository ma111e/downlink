window.__DL_ARTICLES = [{"n":28,"title":"The Hades Campaign: Graph ML PyPI Packages Deploy Cross-Platform Memory Scrapers, AI Analyst Misdirection, and a Wiper Deterrent","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/the-hades-campaign-pypi-packages","time":"09:15","priority":"MUST READ","score":96,"tldr":"A sophisticated PyPI supply-chain campaign dubbed Hades compromised multiple scientific and graph ML packages, using a Bun-based payload to steal credentials, scrape GitHub Actions runner memory across Linux, macOS, and Windows, spread through CI/CD and developer environments, and maintain GitHub-based C2. The malware also includes AI-analysis prompt injection and a token-revocation wiper deterrent, making immediate detection and incident response more difficult.","briefOverview":"\u003cp\u003eOn June 8, 2026, version 0.8.101 of the graph machine learning package \u003ccode\u003eensmallen\u003c/code\u003e on PyPI was identified as containing a sophisticated supply chain compromise. Related packages in the computational biology, bioinformatics, and genotype-phenotype analysis ecosystem were also found to carry the same malicious payload. The operation is tracked in the article as the Hades Campaign and is described as the latest evolution of the Miasma threat actor.\u003c/p\u003e\n\n\u003cp\u003eThe compromised packages execute a malicious Python import hook that downloads a standalone Bun runtime and runs an obfuscated JavaScript payload from \u003ccode\u003e_index.js\u003c/code\u003e. The payload decrypts multiple functional modules and includes cross-platform memory scrapers for Linux, macOS, and Windows, targeting GitHub Actions \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory to extract plaintext secrets and tokens. The article also describes GitHub-based command-and-control channels, encrypted exfiltration repositories, worm propagation, IDE and AI assistant backdoors, and persistence mechanisms.\u003c/p\u003e\n\n\u003cp\u003eA notable feature of the campaign is a plain-text prompt injection placed at the start of the JavaScript bundle to misdirect automated LLM-based security analysis. The malware also installs a \u003ccode\u003egh-token-monitor\u003c/code\u003e service that checks whether a stolen GitHub token has been revoked and triggers destructive file deletion if it receives a 4xx response. The article states that StepSecurity Harden-Runner detects attempts to read \u003ccode\u003eRunner.Worker\u003c/code\u003e memory and enters lockdown mode to terminate the malicious process.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOn June 8, 2026, the article says version 0.8.101 of the PyPI package \u003ccode\u003eensmallen\u003c/code\u003e was identified as compromised. Multiple related packages were also listed as affected, including \u003ccode\u003emflux-streamlit\u003c/code\u003e, \u003ccode\u003enhmpy\u003c/code\u003e, \u003ccode\u003eppkt2synergy\u003c/code\u003e, \u003ccode\u003eembiggen\u003c/code\u003e, \u003ccode\u003egpsea\u003c/code\u003e, and \u003ccode\u003epyphetools\u003c/code\u003e. The campaign is named Hades and is described as the latest evolution of the Miasma threat actor, with overlap in credential harvesting, self-replicating worm logic, and GitHub-based exfiltration from prior campaigns.\u003c/p\u003e\n\n\u003cp\u003eThe infection path begins with an obfuscated import hook embedded in \u003ccode\u003e__init__.py\u003c/code\u003e. When imported, the code checks for \u003ccode\u003e/tmp/.bun_ran\u003c/code\u003e, searches Python module paths for \u003ccode\u003e_index.js\u003c/code\u003e, downloads Bun v1.3.14 from GitHub if needed, and runs the JavaScript payload with \u003ccode\u003ebun run\u003c/code\u003e. The article says this allows complex JavaScript tasks to run even in environments without Node.js.\u003c/p\u003e\n\n\u003cp\u003eThe \u003ccode\u003e_index.js\u003c/code\u003e bundle begins with a plain-text prompt injection intended to manipulate automated LLM-based analysis systems into ignoring the obfuscated code and producing a safe report. The bundle then acts as a bootstrapper that decrypts sixteen gzip-compressed AES-256-GCM encrypted blobs. These modules include OS-specific memory readers, IDE and CI/CD backdoor setup logic, and command-and-control components.\u003c/p\u003e\n\n\u003cp\u003eA central capability of the Hades Campaign is cross-platform scraping of GitHub Actions runner memory. On Linux, the malware reads \u003ccode\u003e/proc/{pid}/maps\u003c/code\u003e and \u003ccode\u003e/proc/{pid}/mem\u003c/code\u003e; on macOS, it uses Mach VM APIs through Python \u003ccode\u003ectypes\u003c/code\u003e; and on Windows, it compiles C# through PowerShell to call APIs such as \u003ccode\u003eVirtualQueryEx\u003c/code\u003e and \u003ccode\u003eReadProcessMemory\u003c/code\u003e. The article states this is used to extract unmasked variables and tokens from \u003ccode\u003eRunner.Worker\u003c/code\u003e across heterogeneous build environments.\u003c/p\u003e\n\n\u003cp\u003eThe malware uses GitHub infrastructure for command and control and exfiltration, including commit-search keywords \u003ccode\u003eDontRevokeOrItGoesBoom\u003c/code\u003e, \u003ccode\u003eTheBeautifulSnadsOfTime\u003c/code\u003e, and \u003ccode\u003efiredalazer\u003c/code\u003e. Stolen credentials are encrypted using gzip, AES-256-GCM, and RSA-2048 before being pushed to public GitHub repositories with Hades-themed names and the description “Hades - The End for the Damned.” The campaign also attempts SSH/SCP lateral movement, PyPI and npm OIDC trust exploitation with Sigstore SLSA provenance bundles, GitHub Actions workflow injection for secrets extraction, and AI coding assistant or IDE rules hijacking.\u003c/p\u003e\n\n\u003cp\u003eFor persistence, the article says the malware installs an \u003ccode\u003eupdate-monitor\u003c/code\u003e C2 polling daemon and a \u003ccode\u003egh-token-monitor\u003c/code\u003e service. The token monitor polls GitHub with a stolen token and, if it detects revocation through a 4xx HTTP response, executes a destructive command that removes user directories. The article lists indicators of compromise and states that StepSecurity Harden-Runner can detect and terminate attempts to read \u003ccode\u003eRunner.Worker\u003c/code\u003e memory before secrets are extracted.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOn June 8, 2026, the article reports that version 0.8.101 of the popular graph machine learning package \u003ccode\u003eensmallen\u003c/code\u003e on PyPI was identified as compromised. The same malicious payload was also found in related packages from the computational biology, bioinformatics, and genotype-phenotype analysis ecosystem. The article tracks the operation as the \u003cstrong\u003eHades Campaign\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is described as the latest evolution of the Miasma threat actor. The article links the Hades activity to previously documented Miasma behaviors, including multi-cloud credential harvesting, self-replicating worm logic, GitHub-based exfiltration, repository infection targeting IDEs and AI assistants, and Linux process memory reading.\u003c/p\u003e\n\n\u003ch2 id=\"affected-packages\"\u003eAffected packages\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following compromised packages and versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003emflux-streamlit\u003c/code\u003e versions 0.0.3 and 0.0.4\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003enhmpy\u003c/code\u003e version 2.4.7\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eppkt2synergy\u003c/code\u003e version 0.1.1\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eembiggen\u003c/code\u003e version 0.11.97\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003egpsea\u003c/code\u003e version 0.9.14\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003epyphetools\u003c/code\u003e version 0.9.120\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eensmallen\u003c/code\u003e version 0.8.101\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"execution-through-a-python-import-hook\"\u003eExecution through a Python import hook\u003c/h2\u003e\n\n\u003cp\u003eThe delivery mechanism differs from earlier npm campaigns described in the article. Instead of running through installation lifecycle scripts or native build hooks, the Hades Campaign runs during Python code execution through an obfuscated single-line import hook embedded in \u003ccode\u003e__init__.py\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe deobfuscated logic checks for a flag file at \u003ccode\u003e/tmp/.bun_ran\u003c/code\u003e. If the file does not exist, it searches Python module paths for a companion \u003ccode\u003e_index.js\u003c/code\u003e file. It then downloads a precompiled Bun v1.3.14 runtime from GitHub, extracts it to a temporary directory, and executes the JavaScript payload using \u003ccode\u003ebun run _index.js\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the flag file causes the payload to execute only once per boot cycle. It also emphasizes that using a standalone Bun binary allows the malware to run JavaScript tasks in environments that do not have Node.js installed.\u003c/p\u003e\n\n\u003ch2 id=\"ai-analyst-misdirection\"\u003eAI analyst misdirection\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a prompt injection block placed at the beginning of the \u003ccode\u003e_index.js\u003c/code\u003e bundle. This plain-text block is intended to manipulate automated Large Language Model pipelines used by security companies to inspect and summarize suspicious package code.\u003c/p\u003e\n\n\u003cp\u003eThe prompt injection instructs a parsing LLM to ignore the obfuscated code below it, classify the package as verified clean infrastructure, and produce a safe security report. The article characterizes this as a conceptual shift in which attackers target the cognitive logic of automated AI triage systems.\u003c/p\u003e\n\n\u003ch2 id=\"obfuscation-and-modular-payload-structure\"\u003eObfuscation and modular payload structure\u003c/h2\u003e\n\n\u003cp\u003eThe \u003ccode\u003e_index.js\u003c/code\u003e file acts as a runtime bootstrapper. The article says it decrypts and loads sixteen independent functional payloads at startup.\u003c/p\u003e\n\n\u003cp\u003eEach payload blob is gzip-compressed and encrypted with AES-256-GCM using a unique hardcoded key. The bootstrapper uses Bun APIs for decryption and decompression. After deobfuscation, the payloads were found to include modules for macOS and Windows memory reading, IDE and CI/CD backdoor setup, and command-and-control agents.\u003c/p\u003e\n\n\u003ch2 id=\"cross-platform-memory-scraping\"\u003eCross-platform memory scraping\u003c/h2\u003e\n\n\u003cp\u003eA major capability described in the article is reading the memory of the GitHub Actions \u003ccode\u003eRunner.Worker\u003c/code\u003e process to extract secrets. Earlier Miasma campaigns used Linux \u003ccode\u003e/proc/{pid}/mem\u003c/code\u003e, but the Hades Campaign adds macOS and Windows implementations.\u003c/p\u003e\n\n\u003ch3 id=\"linux\"\u003eLinux\u003c/h3\u003e\n\n\u003cp\u003eOn Linux, the malware walks memory mappings through \u003ccode\u003e/proc/{pid}/maps\u003c/code\u003e and directly reads \u003ccode\u003e/proc/{pid}/mem\u003c/code\u003e to scrape plaintext variables.\u003c/p\u003e\n\n\u003ch3 id=\"macos\"\u003emacOS\u003c/h3\u003e\n\n\u003cp\u003eOn macOS runners, the malware decrypts a Python script that invokes Mach kernel VM APIs through \u003ccode\u003ectypes\u003c/code\u003e. The article states that because the runner worker and execution process run under the same UID, the script can obtain a task port without root privileges. It then enumerates readable memory regions and writes their contents to standard output.\u003c/p\u003e\n\n\u003ch3 id=\"windows\"\u003eWindows\u003c/h3\u003e\n\n\u003cp\u003eOn Windows, the malware executes a PowerShell script that dynamically compiles a C# class using \u003ccode\u003eAdd-Type\u003c/code\u003e. The C# code uses Win32 APIs such as \u003ccode\u003eOpenProcess\u003c/code\u003e, \u003ccode\u003eVirtualQueryEx\u003c/code\u003e, and \u003ccode\u003eReadProcessMemory\u003c/code\u003e to crawl and dump the target process memory.\u003c/p\u003e\n\n\u003cp\u003eThe article states that these cross-platform scrapers allow the malware to extract unmasked variables and tokens on Linux, macOS, and Windows runners.\u003c/p\u003e\n\n\u003ch2 id=\"github-based-command-and-control\"\u003eGitHub-based command and control\u003c/h2\u003e\n\n\u003cp\u003eThe article describes three independent command-and-control channels that use public GitHub infrastructure.\u003c/p\u003e\n\n\u003ch3 id=\"token-dead-drop\"\u003eToken dead-drop\u003c/h3\u003e\n\n\u003cp\u003eHarvested GitHub personal access tokens are encrypted and pushed as commits to public repositories controlled by the attacker. These commits use the keyword \u003ccode\u003eDontRevokeOrItGoesBoom\u003c/code\u003e, which the attacker can locate through GitHub search APIs.\u003c/p\u003e\n\n\u003ch3 id=\"signed-javascript-eval\"\u003eSigned JavaScript eval\u003c/h3\u003e\n\n\u003cp\u003eThe malware searches GitHub commits for the keyword \u003ccode\u003eTheBeautifulSnadsOfTime\u003c/code\u003e. Matching commit messages contain base64-encoded JavaScript payloads and RSA-PSS signatures. The malware verifies the signatures against a hardcoded public key and executes valid payloads using \u003ccode\u003eeval()\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch3 id=\"python-dropper\"\u003ePython dropper\u003c/h3\u003e\n\n\u003cp\u003eThe campaign introduces a Python-specific C2 channel through a script named \u003ccode\u003eupdater.py\u003c/code\u003e. This service polls GitHub for commits matching \u003ccode\u003efiredalazer\u003c/code\u003e. Matching commits encode a URL and RSA-PSS signature; if the signature is valid, the daemon downloads and executes the script from the URL.\u003c/p\u003e\n\n\u003ch2 id=\"exfiltration-process\"\u003eExfiltration process\u003c/h2\u003e\n\n\u003cp\u003eThe article says stolen credentials are encrypted locally before exfiltration. The process includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eJSON serialization of harvested secrets\u003c/li\u003e\n\u003cli\u003egzip compression\u003c/li\u003e\n\u003cli\u003egeneration of a random 256-bit AES key\u003c/li\u003e\n\u003cli\u003eAES-256-GCM encryption of the data\u003c/li\u003e\n\u003cli\u003eRSA-2048 encryption of the ephemeral AES key using the attacker’s public key\u003c/li\u003e\n\u003cli\u003eupload of the encrypted payload to a newly created public GitHub repository under the attacker’s control\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe exfiltration repositories use Hades-themed names such as \u003ccode\u003estygian-cerberus-42817\u003c/code\u003e and \u003ccode\u003etartarean-charon-18401\u003c/code\u003e. They carry the description \u003ccode\u003eHades - The End for the Damned\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"worm-propagation-and-lateral-movement\"\u003eWorm propagation and lateral movement\u003c/h2\u003e\n\n\u003cp\u003eThe article describes three self-replication vectors.\u003c/p\u003e\n\n\u003ch3 id=\"ssh-and-scp-lateral-movement\"\u003eSSH and SCP lateral movement\u003c/h3\u003e\n\n\u003cp\u003eThe malware parses \u003ccode\u003e~/.ssh/known_hosts\u003c/code\u003e and \u003ccode\u003e~/.ssh/config\u003c/code\u003e to identify reachable hosts. If \u003ccode\u003essh\u003c/code\u003e and \u003ccode\u003escp\u003c/code\u003e are available, it attempts batch-mode connections using configured keys.\u003c/p\u003e\n\n\u003cp\u003eOn successful access, it stages a loader script and the primary payload in a temporary directory on the remote host, runs the loader, and deletes the staging directory.\u003c/p\u003e\n\n\u003ch3 id=\"pypi-and-npm-oidc-trust-exploitation\"\u003ePyPI and npm OIDC trust exploitation\u003c/h3\u003e\n\n\u003cp\u003eWhen running inside a GitHub Actions workflow runner, the malware checks for OIDC variables such as \u003ccode\u003eACTIONS_ID_TOKEN_REQUEST_TOKEN\u003c/code\u003e and \u003ccode\u003eACTIONS_ID_TOKEN_REQUEST_URL\u003c/code\u003e. If available, it attempts to mint PyPI or npm publishing tokens by calling the OIDC endpoint with registry audiences.\u003c/p\u003e\n\n\u003cp\u003eThe article says the malware also generates Sigstore SLSA provenance bundles. It requests a signing certificate from Fulcio, formats a SLSA provenance statement, DSSE-signs it, uploads it to Rekor, and packages the certificate, signatures, and inclusion proof into a Sigstore bundle. It then injects its payload into target libraries and publishes compromised versions to PyPI and npm using the organization’s automated publishing credentials and the generated provenance bundle.\u003c/p\u003e\n\n\u003ch3 id=\"github-actions-workflow-injection\"\u003eGitHub Actions workflow injection\u003c/h3\u003e\n\n\u003cp\u003eThe malware targets GitHub repositories to extract organization secrets if a harvested token has suitable permissions.\u003c/p\u003e\n\n\u003cp\u003eIf the token has the \u003ccode\u003eworkflow\u003c/code\u003e scope, it uses a push-triggered workflow technique. It creates a temporary branch, commits a workflow file under \u003ccode\u003e.github/workflows/codeql.yml\u003c/code\u003e, runs a workflow named \u003ccode\u003eRun Copilot\u003c/code\u003e, uploads secrets as an artifact named \u003ccode\u003eformat-results\u003c/code\u003e, then deletes the run history and temporary branch.\u003c/p\u003e\n\n\u003cp\u003eIf the token lacks \u003ccode\u003eworkflow\u003c/code\u003e scope but has repository write access, it uses a deployment-triggered technique. It commits a workflow file, immediately deletes it in a second commit, points a branch to the deletion commit, and triggers a GitHub deployment against the earlier commit that still contains the workflow. The workflow dumps secrets to an artifact, after which the malware deletes the deployment record, workflow run, and branch.\u003c/p\u003e\n\n\u003ch2 id=\"ai-coding-assistant-and-ide-rules-hijacking\"\u003eAI coding assistant and IDE rules hijacking\u003c/h2\u003e\n\n\u003cp\u003eThe malware also backdoors local workspace folders. It searches for rule files and configuration directories used by AI agents and IDE systems, including Claude, Codex, Gemini, Copilot, Cline, Aider, Tabby, Amazon Q, Cody, Bolt, and Continue.\u003c/p\u003e\n\n\u003cp\u003eThe article lists targeted files such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e.cursorrules\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.windsurfrules\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.cursor/rules/\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.github/copilot-instructions.md\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.aider.conf.yml\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esettings.json\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003econfig.json\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003emcp.json\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBy planting prompt instructions or hooks in these configuration assets, the malware attempts to trigger a \u003ccode\u003ebun run bootstrap\u003c/code\u003e command when developers load or consult the workspace with AI assistants.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-and-wiper-deterrent\"\u003ePersistence and wiper deterrent\u003c/h2\u003e\n\n\u003cp\u003eFor persistence, the malware installs an \u003ccode\u003eupdate-monitor\u003c/code\u003e C2 polling daemon. It also installs a second service named \u003ccode\u003egh-token-monitor\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe \u003ccode\u003egh-token-monitor\u003c/code\u003e service polls the GitHub API using the stolen token. If the token is revoked and GitHub returns a 4xx HTTP status, the script triggers a destructive command that removes the user’s home directory and Documents directory. The article states that the service runs for up to 72 hours.\u003c/p\u003e\n\n\u003cp\u003eOn Linux, the service is registered as a user-level \u003ccode\u003esystemd\u003c/code\u003e service with user lingering enabled. On macOS, it is installed as a \u003ccode\u003eLaunchAgent\u003c/code\u003e. The article says the threat actor uses the risk of data destruction to discourage immediate revocation of stolen credentials.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article provides multiple indicators of compromise, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e/tmp/.bun_ran\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/tmp/tmp.0144018410.lock\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/var/tmp/.gh_update_state\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.local/share/updater/update.py\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.config/systemd/user/update-monitor.service\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.config/systemd/user/gh-token-monitor.service\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/Library/LaunchAgents/com.user.update-monitor.plist\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/Library/LaunchAgents/com.user.gh-token-monitor.plist\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.local/bin/gh-token-monitor.sh\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.config/gh-token-monitor/token\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.claude/settings.json\u003c/code\u003e, \u003ccode\u003e.claude/index.js\u003c/code\u003e, and \u003ccode\u003e.claude/setup.mjs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.vscode/tasks.json\u003c/code\u003e and \u003ccode\u003e.vscode/setup.mjs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eWorkflows named \u003ccode\u003eRun Copilot\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eExfiltration repository patterns such as \u003ccode\u003estygian-cerberus-[0-9]+\u003c/code\u003e and \u003ccode\u003etartarean-charon-[0-9]+\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eExfiltration repository description \u003ccode\u003eHades - The End for the Damned\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eGitHub commit search keywords \u003ccode\u003eDontRevokeOrItGoesBoom\u003c/code\u003e, \u003ccode\u003eTheBeautifulSnadsOfTime\u003c/code\u003e, and \u003ccode\u003efiredalazer\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"stepsecurity-harden-runner-response\"\u003eStepSecurity Harden-Runner response\u003c/h2\u003e\n\n\u003cp\u003eThe article includes a section on StepSecurity Harden-Runner, described as a CI/CD runner security agent that monitors network events, process executions, file access, and outbound connections at the step level in GitHub Actions.\u003c/p\u003e\n\n\u003cp\u003eIn this campaign, the malicious payload attempts to read \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory to extract plaintext secrets, including \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e and other workflow-injected secrets. The article states that Harden-Runner detects this behavior, enters lockdown mode, terminates the malicious process before the memory read completes, halts the workflow run, and records a suspicious process event in the runtime trace.\u003c/p\u003e\n","keyPoints":["Version 0.8.101 of the PyPI package ensmallen and several related computational biology, bioinformatics, and genotype-phenotype packages were identified as compromised with the same malicious payload.","The malicious Python import hook downloads a standalone Bun runtime and executes a companion _index.js payload once per boot cycle using a /tmp/.bun_ran flag file.","The _index.js bundle contains a prompt-injection block intended to mislead automated LLM-based security analysis into classifying the package as clean.","The malware includes Linux, macOS, and Windows memory scrapers designed to read GitHub Actions Runner.Worker process memory and extract plaintext variables and tokens.","The campaign uses GitHub-based command-and-control channels, encrypted exfiltration repositories, worm propagation through SSH/SCP and package publishing workflows, and persistence services including a GitHub token revocation wiper deterrent."],"insights":["The malware’s plain-text prompt injection shows that attackers are deliberately targeting automated LLM-based triage workflows, so scanners that pass raw package contents to LLMs without strict isolation can be manipulated into false-negative reports.","The campaign’s use of a standalone Bun runtime lets the payload run complex JavaScript even on systems without Node.js, reducing reliance on conventional JavaScript package-manager execution paths.","The malware attempts to generate Sigstore SLSA provenance bundles from compromised GitHub Actions OIDC identities, meaning malicious package releases can appear to come from a legitimate verified build pipeline.","The token-revocation monitor creates an operational dilemma for responders because revoking a stolen GitHub token may trigger destructive file deletion on infected developer workstations within the malware’s 72-hour monitoring window.","The deployment-triggered workflow technique allows secret theft even when a token lacks the GitHub workflow scope, by briefly committing and deleting a workflow before triggering it through a deployment event."],"referencedReports":[],"body":"\u003cp\u003eOn June 8, 2026, version 0.8.101 of the graph machine learning package \u003ccode\u003eensmallen\u003c/code\u003e on PyPI was identified as containing a sophisticated supply chain compromise. Related packages in the computational biology, bioinformatics, and genotype-phenotype analysis ecosystem were also found to carry the same malicious payload. The operation is tracked in the article as the Hades Campaign and is described as the latest evolution of the Miasma threat actor.\u003c/p\u003e\n\n\u003cp\u003eThe compromised packages execute a malicious Python import hook that downloads a standalone Bun runtime and runs an obfuscated JavaScript payload from \u003ccode\u003e_index.js\u003c/code\u003e. The payload decrypts multiple functional modules and includes cross-platform memory scrapers for Linux, macOS, and Windows, targeting GitHub Actions \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory to extract plaintext secrets and tokens. The article also describes GitHub-based command-and-control channels, encrypted exfiltration repositories, worm propagation, IDE and AI assistant backdoors, and persistence mechanisms.\u003c/p\u003e\n\n\u003cp\u003eA notable feature of the campaign is a plain-text prompt injection placed at the start of the JavaScript bundle to misdirect automated LLM-based security analysis. The malware also installs a \u003ccode\u003egh-token-monitor\u003c/code\u003e service that checks whether a stolen GitHub token has been revoked and triggers destructive file deletion if it receives a 4xx response. The article states that StepSecurity Harden-Runner detects attempts to read \u003ccode\u003eRunner.Worker\u003c/code\u003e memory and enters lockdown mode to terminate the malicious process.\u003c/p\u003e\n"},{"n":8,"title":"Gogs patches critical zero-day enabling remote code execution","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/gogs-patches-critical-zero-day-enabling-remote-code-execution/","time":"16:18","priority":"MUST READ","score":95,"tldr":"Gogs has released version 0.14.3 to fix a critical zero-day argument-injection flaw that lets authenticated users gain remote code execution and access private repositories. Admins should upgrade immediately or restrict registration and repository creation to reduce exposure.","briefOverview":"\u003cp\u003eGogs has patched a critical zero-day argument injection vulnerability that can allow attackers to compromise Internet-facing instances and access any repositories, including private ones. The flaw has not yet been assigned a CVE ID and affects all Gogs releases up to and including 0.14.2 and 0.15.0+dev. It can be exploited by authenticated attackers without admin privileges.\u003c/p\u003e\n\n\u003cp\u003eRapid7 security researcher Jonah Burgess, who discovered and reported the flaw, said it affects all Gogs servers with default configurations. Gogs ships with open registration enabled by default and no limit on repository creation, allowing an unauthenticated attacker to create an account and repository on default-configured instances. Gogs maintainers released version 0.14.3 on June 7 to patch the vulnerability and requested a CVE ID.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation can allow attackers to compromise the targeted server, read any repository, steal credentials, move laterally to other systems, and alter hosted source code. Rapid7 recommends that all Gogs users upgrade immediately and provided temporary mitigations for those unable to patch right away. Shadowserver tracks more than 2,300 Internet-exposed Gogs servers, with most in Asia and Europe.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGogs has patched a critical zero-day flaw that can enable remote code execution and allow attackers to access repositories hosted on Internet-facing instances. The vulnerability is an argument injection issue that has not yet been assigned a CVE ID. It affects all Gogs releases up to and including 0.14.2 and 0.15.0+dev.\u003c/p\u003e\n\n\u003cp\u003eThe flaw can only be exploited by authenticated attackers without admin privileges, but Rapid7 researcher Jonah Burgess said default Gogs configurations make that requirement easy to satisfy. Gogs ships with open registration enabled by default and no limit on repository creation. Burgess said an unauthenticated attacker can simply create an account and repository on any default-configured instance.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, attackers who exploit the vulnerability can compromise the targeted server, read any repository including private repositories, steal credentials, move laterally to other systems on the network, and alter hosted source code. Any registered user who creates a repository is automatically its owner, and enabling rebase merging is a single toggle in settings. Burgess said the entire exploit chain can be operated without interaction from any other user.\u003c/p\u003e\n\n\u003cp\u003eGogs maintainers released version 0.14.3 on June 7 to address the flaw, 10 days after Rapid7 publicly disclosed it following a lack of response to multiple status updates. The fix was implemented through pull request #8301, and the maintainers requested a CVE ID. Rapid7 recommends that all Gogs users upgrade immediately.\u003c/p\u003e\n\n\u003cp\u003eFor users who cannot patch immediately, Rapid7 advised restricting user registration, restricting repository creation, and auditing rebase merge settings. The article notes that disabling “Rebase before merging” per repository is not an effective defense against a malicious user who owns or has admin access to a repository because they can re-enable it. Shadowserver currently tracks over 2,300 Internet-exposed Gogs servers, most of them in Asia and Europe, while Shodan lists just over 1,000 IP addresses with a Gogs fingerprint.\u003c/p\u003e\n\n\u003cp\u003eThe article also places the flaw in the context of prior Gogs argument injection vulnerabilities and a separate RCE issue, CVE-2025-8110, that was exploited in zero-day attacks to compromise hundreds of servers. Burgess said the new flaw is very similar to previously patched Gogs argument-injection flaws but affects a different code path, Merge(), that was never addressed. CISA confirmed on January 12 that CVE-2025-8110 was being abused in the wild and added it to its Known Exploited Vulnerabilities catalog.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGogs has released a patch for a critical zero-day vulnerability that can allow attackers to compromise Internet-facing Gogs instances. The flaw is an argument injection vulnerability and has not yet been assigned a CVE ID. It affects all Gogs releases up to and including 0.14.2 and 0.15.0+dev.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability can be used to gain remote code execution and access any repositories hosted on the targeted server, including private repositories. According to the article, successful exploitation can allow attackers to compromise the server, read private code, steal credentials, move laterally to other systems on the network, and alter hosted source code.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-requirements-and-default-exposure\"\u003eExploitation Requirements and Default Exposure\u003c/h2\u003e\n\n\u003cp\u003eThe flaw can only be exploited by authenticated attackers without admin privileges. However, Rapid7 security researcher Jonah Burgess said that default Gogs configurations significantly reduce the practical barrier to exploitation.\u003c/p\u003e\n\n\u003cp\u003eGogs ships with:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eDISABLE_REGISTRATION = false\u003c/code\u003e, meaning open registration is enabled by default.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eMAX_CREATION_LIMIT = -1\u003c/code\u003e, meaning there is no limit on repository creation by default.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBurgess said that because of these defaults, an unauthenticated attacker can create an account and repository on any default-configured instance. Any registered user who creates a repository automatically becomes its owner. From there, enabling rebase merging is a single toggle in repository settings, and Burgess said the full exploit chain can be performed without interaction from any other user.\u003c/p\u003e\n\n\u003ch2 id=\"patch-and-disclosure-timeline\"\u003ePatch and Disclosure Timeline\u003c/h2\u003e\n\n\u003cp\u003eRapid7 researcher Jonah Burgess discovered and reported the vulnerability. The article says Gogs maintainers released version 0.14.3 on June 7 to patch the flaw, 10 days after Rapid7 publicly disclosed it following a lack of response to multiple status updates.\u003c/p\u003e\n\n\u003cp\u003eThe fix was implemented through pull request #8301. Gogs maintainers also requested a CVE ID for the vulnerability. Rapid7 recommends that all Gogs users upgrade immediately.\u003c/p\u003e\n\n\u003ch2 id=\"temporary-mitigations\"\u003eTemporary Mitigations\u003c/h2\u003e\n\n\u003cp\u003eRapid7 provided mitigation measures for users who cannot patch their Gogs instances immediately.\u003c/p\u003e\n\n\u003cp\u003eThe recommended measures are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRestrict user registration by setting \u003ccode\u003eDISABLE_REGISTRATION = true\u003c/code\u003e in \u003ccode\u003eapp.ini\u003c/code\u003e. Rapid7 described this as the most impactful mitigation because the exploit is self-contained within a single user’s repository.\u003c/li\u003e\n\u003cli\u003eRestrict repository creation by setting \u003ccode\u003eMAX_CREATION_LIMIT = 0\u003c/code\u003e in \u003ccode\u003eapp.ini\u003c/code\u003e. This can also be configured per user through the “Max Repo Creation” option in the admin panel.\u003c/li\u003e\n\u003cli\u003eAudit rebase merge settings, including the “Rebase before merging” setting under \u003ccode\u003eSettings \u0026gt; Advanced\u003c/code\u003e for each repository.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that disabling “Rebase before merging” is not an effective defense against a malicious user who owns or has admin access to a repository, because that user can re-enable the setting.\u003c/p\u003e\n\n\u003ch2 id=\"affected-product-and-internet-exposure\"\u003eAffected Product and Internet Exposure\u003c/h2\u003e\n\n\u003cp\u003eGogs is written in Go and is designed as an alternative to GitHub Enterprise or GitLab. The article says it is often exposed online as a remote collaboration platform.\u003c/p\u003e\n\n\u003cp\u003eShadowserver currently tracks over 2,300 Internet-exposed Gogs servers. According to the article, most are in Asia, with 1,839 exposed servers, and Europe, with 312 exposed servers. Shodan lists just over 1,000 IP addresses with a Gogs fingerprint.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-earlier-gogs-vulnerabilities\"\u003eRelationship to Earlier Gogs Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eBurgess said the new vulnerability is very similar to other argument-injection flaws that the Gogs security team has patched in recent years. The article specifically references:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2024-39933\u003c/li\u003e\n\u003cli\u003eCVE-2024-39932\u003c/li\u003e\n\u003cli\u003eCVE-2026-26194\u003c/li\u003e\n\u003cli\u003eCVE-2024-39930\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHowever, Burgess said the new flaw affects a different code path, \u003ccode\u003eMerge()\u003c/code\u003e, that was not previously addressed.\u003c/p\u003e\n\n\u003ch2 id=\"prior-exploitation-of-gogs-rce-vulnerabilities\"\u003ePrior Exploitation of Gogs RCE Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article also references a separate Gogs remote code execution vulnerability, CVE-2025-8110. Gogs patched that issue in early December 2026 after it was exploited in zero-day attacks to compromise hundreds of servers.\u003c/p\u003e\n\n\u003cp\u003eWiz security researchers, who reported CVE-2025-8110, said many Gogs instances were configured with open registration enabled by default, creating a large attack surface. On January 12, CISA confirmed that CVE-2025-8110 was being abused in the wild and added it to its Known Exploited Vulnerabilities catalog. CISA ordered Federal Civilian Executive Branch agencies to secure their servers by February 2.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe most important action for Gogs administrators is to upgrade to version 0.14.3 immediately. For environments where immediate patching is not possible, Rapid7 recommends restricting user registration and repository creation, while noting that rebase-related configuration controls may not protect against malicious users with ownership or admin access to repositories.\u003c/p\u003e\n","keyPoints":["Gogs patched a critical argument injection zero-day vulnerability in version 0.14.3 released on June 7.","The flaw affects all Gogs releases up to and including 0.14.2 and 0.15.0+dev and has not yet been assigned a CVE ID.","Authenticated attackers without admin privileges can exploit the vulnerability to compromise a targeted server, read private repositories, steal credentials, move laterally, and alter hosted source code.","Rapid7 researcher Jonah Burgess said default Gogs configurations are affected because open registration and unlimited repository creation are enabled by default.","Rapid7 recommended immediate upgrades and, for users who cannot patch right away, restricting user registration and repository creation in app.ini."],"insights":["The vulnerability is especially actionable for attackers because Gogs ships with open registration enabled and no repository creation limit by default, allowing an unauthenticated attacker to create the account and repository needed to exploit it.","Disabling “Rebase before merging” per repository is not a reliable mitigation against malicious repository owners or admins because they can re-enable the setting themselves.","Restricting user registration is described by Rapid7 as the most impactful temporary mitigation because the exploit chain can be completed entirely within a single user's repository.","The flaw was patched 10 days after Rapid7 publicly disclosed it following a lack of response to multiple status updates from the maintainers.","The bug resembles several previously patched Gogs argument-injection vulnerabilities but affects a different code path, Merge(), that had not been addressed."],"referencedReports":[{"title":"Authenticated RCE via Argument Injection in Gogs","url":"https://www.rapid7.com/blog/post/ve-authenticated-rce-via-argument-injection-gogs-unfixed/","publisher":"Rapid7","context":"The article cites Rapid7 researcher Jonah Burgess's technical write-up warning that default-configured Gogs servers are affected and describing mitigation measures.","category":"","primary":false},{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/01/12/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article references CISA's alert confirming that CVE-2025-8110 was being exploited in the wild and added to the Known Exploited Vulnerabilities catalog.","category":"","primary":false}],"body":"\u003cp\u003eGogs has patched a critical zero-day argument injection vulnerability that can allow attackers to compromise Internet-facing instances and access any repositories, including private ones. The flaw has not yet been assigned a CVE ID and affects all Gogs releases up to and including 0.14.2 and 0.15.0+dev. It can be exploited by authenticated attackers without admin privileges.\u003c/p\u003e\n\n\u003cp\u003eRapid7 security researcher Jonah Burgess, who discovered and reported the flaw, said it affects all Gogs servers with default configurations. Gogs ships with open registration enabled by default and no limit on repository creation, allowing an unauthenticated attacker to create an account and repository on default-configured instances. Gogs maintainers released version 0.14.3 on June 7 to patch the vulnerability and requested a CVE ID.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation can allow attackers to compromise the targeted server, read any repository, steal credentials, move laterally to other systems, and alter hosted source code. Rapid7 recommends that all Gogs users upgrade immediately and provided temporary mitigations for those unable to patch right away. Shadowserver tracks more than 2,300 Internet-exposed Gogs servers, with most in Asia and Europe.\u003c/p\u003e\n"},{"n":14,"title":"Critical Check Point VPN Flaw Exploited to Bypass Passwords in IKEv1 Setups","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/critical-check-point-vpn-flaw-exploited.html","time":"14:17","priority":"MUST READ","score":95,"tldr":"Check Point warns that attackers are actively exploiting CVE-2026-50751, a critical flaw in IKEv1-based Remote Access VPN and Mobile Access setups, to bypass password authentication and establish VPN sessions. Affected organizations should apply the hotfix or disable legacy IKEv1 configurations, as exploitation has already targeted dozens of organizations and is linked in at least one case to Qilin ransomware activity.","briefOverview":"\u003cp\u003eCheck Point has warned of active exploitation of CVE-2026-50751, a critical vulnerability affecting Remote Access VPN and Mobile Access deployments configured to use the deprecated IKEv1 key exchange protocol. The flaw has a CVSS score of 9.3 and stems from a logic flow weakness in certificate validation. Check Point said exploitation can allow an unauthenticated remote attacker to establish a remote access VPN connection without a valid user password.\u003c/p\u003e\n\n\u003cp\u003eThe issue affects multiple Security Gateway and Spark Firewall versions, including several end-of-support releases. Successful exploitation requires specific conditions, including Remote Access or Mobile Access being enabled, IKEv1 being enabled for remote access, legacy Remote Access clients being accepted, and machine certificates not being required. Check Point said additional post-authentication activity is still required to access internal resources or escalate privileges.\u003c/p\u003e\n\n\u003cp\u003eCheck Point said it first observed suspicious activity on June 4, 2026, with the earliest observed exploitation dating back to May 7, 2026, and exploitation efforts increasing this month. The activity has reportedly affected a few dozen targeted organizations globally. In one case, post-exploitation activity was associated with a Qilin ransomware affiliate.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCheck Point has reported active exploitation of CVE-2026-50751, a critical vulnerability in Remote Access VPN and Mobile Access deployments using the deprecated IKEv1 key exchange protocol. The vulnerability has a CVSS score of 9.3 and involves a logic flow weakness in certificate validation. According to Check Point, the flaw can allow an unauthenticated remote attacker to bypass user authentication and establish a remote access VPN connection without a valid user password.\u003c/p\u003e\n\n\u003cp\u003eCheck Point said the vulnerability affects Security Gateways including R82.10 Jumbo Hotfix Take 19 or below, R82 Jumbo Hotfix Take 103 or below, R81.20 Jumbo Hotfix Take 141 or below, and end-of-support R81.10, R81, and R80.40 releases. Spark Firewalls are also affected, including R80.20.X, R81.10.X, and R82.00.X. The company published a hotfix and support information for the affected products and versions.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation requires several configuration conditions to be present. VPN Remote Access or Mobile Access must be enabled, IKEv1 must be enabled for remote access, gateways must accept legacy Remote Access clients, and gateways must not demand a machine certificate for connections. Check Point emphasized that, even after a VPN session is established without a valid password, additional post-authentication activity is required to access internal resources or escalate privileges.\u003c/p\u003e\n\n\u003cp\u003eThe company said it first observed indications of suspicious activity on June 4, 2026, while the earliest observed exploitation dates back to May 7, 2026. Exploitation attempts reportedly increased this month and have been limited to a few dozen targeted organizations globally. Check Point Research told The Hacker News that there was no indication the vulnerability was broadly available to other threat actors and described the activity as opportunistic against vulnerable organizations.\u003c/p\u003e\n\n\u003cp\u003eIn one case, post-exploitation activity was associated with a Qilin ransomware affiliate. Check Point also said the threat actor infrastructure appears to be exploiting other VPN-related vulnerabilities involving Palo Alto Networks, Fortinet, and F5. The company identified indicators suggesting the actor may use the Tox protocol for communication, which it described as a pattern commonly associated with financially motivated ransomware actors.\u003c/p\u003e\n\n\u003cp\u003eThe attackers used virtual private server infrastructure to conduct attacks, including VPS servers geolocated to a particular country to target organizations within that country\u0026rsquo;s borders. After access was established, attackers attempted to download malicious ELF files from actor-controlled infrastructure. Check Point also disclosed CVE-2026-50752, a second VPN-related vulnerability with a CVSS score of 7.40 that may allow an adversary-in-the-middle attack on VPN site-to-site connections, though there is no evidence it has been exploited in real-world attacks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCheck Point has warned that CVE-2026-50751 is being actively exploited against Remote Access VPN and Mobile Access deployments configured to use the deprecated IKEv1 key exchange protocol. The vulnerability is rated critical with a CVSS score of 9.3. It is described as a logic flow weakness in certificate validation that can allow an unauthenticated remote attacker to bypass user authentication.\u003c/p\u003e\n\n\u003cp\u003eAccording to Check Point, successful exploitation can let an attacker establish a remote access VPN session without possessing a valid user password. The company stated that additional post-authentication activity is required before an attacker can access internal resources or escalate privileges.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-50751 affects certificate validation logic in IKEv1-based Remote Access VPN and Mobile Access configurations. Check Point said the flaw allows attackers to bypass authentication requirements by exploiting a logic flaw in certificate validation.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation requires all of the following conditions described in the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVPN Remote Access or Mobile Access is enabled.\u003c/li\u003e\n\u003cli\u003eIKEv1 is enabled for remote access.\u003c/li\u003e\n\u003cli\u003eGateways accept legacy Remote Access clients.\u003c/li\u003e\n\u003cli\u003eGateways do not demand a machine certificate for connections.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that IKEv1 is deprecated. It also emphasizes that bypassing password authentication to establish a VPN session does not, by itself, provide full internal access or privilege escalation without additional post-authentication activity.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products-and-versions\"\u003eAffected Products and Versions\u003c/h2\u003e\n\n\u003cp\u003eThe affected Check Point products and versions listed in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSecurity Gateways R82.10 Jumbo Hotfix Take 19 or below.\u003c/li\u003e\n\u003cli\u003eSecurity Gateways R82 Jumbo Hotfix Take 103 or below.\u003c/li\u003e\n\u003cli\u003eSecurity Gateways R81.20 Jumbo Hotfix Take 141 or below.\u003c/li\u003e\n\u003cli\u003eSecurity Gateways R81.10, which is end-of-support.\u003c/li\u003e\n\u003cli\u003eSecurity Gateways R81, which is end-of-support.\u003c/li\u003e\n\u003cli\u003eSecurity Gateways R80.40, which is end-of-support.\u003c/li\u003e\n\u003cli\u003eSpark Firewalls R80.20.X, which is end-of-support.\u003c/li\u003e\n\u003cli\u003eSpark Firewalls R81.10.X.\u003c/li\u003e\n\u003cli\u003eSpark Firewalls R82.00.X.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article references Check Point\u0026rsquo;s support information for the affected products and versions and notes that Check Point released an important hotfix for vulnerabilities in the deprecated IKEv1 VPN protocol.\u003c/p\u003e\n\n\u003ch2 id=\"observed-exploitation-timeline\"\u003eObserved Exploitation Timeline\u003c/h2\u003e\n\n\u003cp\u003eCheck Point said it first observed indications of suspicious activity on June 4, 2026. The earliest observed exploitation activity dates back to May 7, 2026. The company said exploitation efforts have increased starting this month.\u003c/p\u003e\n\n\u003cp\u003eThe exploitation activity has been limited to a few dozen targeted organizations globally, according to Check Point. Check Point Research told The Hacker News that, to the best of its knowledge, there was no indication the vulnerability was broadly available to other threat actors. It described the activity as opportunistic and targeting vulnerable organizations rather than a characterized organization.\u003c/p\u003e\n\n\u003ch2 id=\"threat-activity-and-infrastructure\"\u003eThreat Activity and Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eIn one case, the post-exploitation phase was associated with a Qilin ransomware affiliate. Check Point also said it believes the threat actor infrastructure is exploiting other VPN-related vulnerabilities, including ones published by Palo Alto Networks, Fortinet, and F5.\u003c/p\u003e\n\n\u003cp\u003eThe company identified indicators suggesting the actor may use the Tox protocol for communication. Check Point described that pattern as commonly associated with financially motivated ransomware actors.\u003c/p\u003e\n\n\u003cp\u003eA notable operational detail is the use of virtual private server infrastructure. The article says the attackers used VPS servers geolocated to a particular country to target organizations within that country\u0026rsquo;s borders. Once access was established, the attackers were observed attempting to download malicious ELF files from actor-controlled infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-other-reporting\"\u003eRelationship to Other Reporting\u003c/h2\u003e\n\n\u003cp\u003eThe article says some aspects of the observed efforts overlap with a Ctrl-Alt-Intel report from the previous month. That report highlighted the Qilin ransomware crew\u0026rsquo;s abuse of corporate VPN appliances for initial access.\u003c/p\u003e\n\n\u003cp\u003eThe article does not state that the Check Point vulnerability was broadly available to other threat actors. Instead, it quotes Check Point Research as saying there was no indication of broad availability to date.\u003c/p\u003e\n\n\u003ch2 id=\"second-vulnerability\"\u003eSecond Vulnerability\u003c/h2\u003e\n\n\u003cp\u003eCheck Point\u0026rsquo;s review of affected VPN components also uncovered CVE-2026-50752. This second vulnerability has a CVSS score of 7.40. The article says it may allow an adversary-in-the-middle attack on VPN site-to-site connections.\u003c/p\u003e\n\n\u003cp\u003eThere is no evidence that CVE-2026-50752 has been exploited in real-world attacks, according to the article.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe central significance of the article is that a critical Check Point VPN flaw is already being exploited in the wild against specific IKEv1-based remote access configurations. The vulnerability can bypass valid password requirements for establishing a VPN session, making legacy IKEv1 configurations and the absence of machine certificate requirements especially important exposure factors.\u003c/p\u003e\n\n\u003cp\u003eThe observed exploitation has been limited in scope, but it has involved targeted organizations globally and at least one case associated with a Qilin ransomware affiliate. The article also links the activity to broader abuse of VPN infrastructure, including references to other VPN-related vulnerabilities affecting Palo Alto Networks, Fortinet, and F5.\u003c/p\u003e\n","keyPoints":["Check Point warned of active exploitation of CVE-2026-50751, a critical vulnerability affecting Remote Access VPN and Mobile Access deployments configured to use the deprecated IKEv1 key exchange protocol.","CVE-2026-50751 is a logic flow weakness in certificate validation that can allow an unauthenticated remote attacker to bypass user authentication and establish a remote access VPN connection without a valid user password.","Successful exploitation requires Remote Access or Mobile Access to be enabled, IKEv1 to be enabled for remote access, legacy Remote Access clients to be accepted, and machine certificates not to be required for connections.","Check Point said it first observed suspicious activity on June 4, 2026, with the earliest observed exploitation dating back to May 7, 2026, and activity increasing this month.","Check Point said exploitation has been limited to a few dozen targeted organizations globally, and one post-exploitation case was associated with a Qilin ransomware affiliate."],"insights":["Requiring machine certificates for connections is a specific configuration control that Check Point lists as absent in successful exploitation conditions.","The attackers used VPS infrastructure geolocated to the same country as their targets, making country-local VPS activity a notable signal for investigation.","Although CVE-2026-50751 enables VPN session establishment without a valid password, Check Point said additional post-authentication activity is still required to access internal resources or escalate privileges.","Check Point linked the observed infrastructure to exploitation of other VPN-related vulnerabilities affecting Palo Alto Networks, Fortinet, and F5 products, indicating the activity was not limited to Check Point appliances.","Check Point’s review also found CVE-2026-50752, which could enable adversary-in-the-middle attacks on VPN site-to-site connections, but the company said there is no evidence it has been exploited in real-world attacks."],"referencedReports":[{"title":"Check Point Releases Important Hotfix for Vulnerabilities in Deprecated IKEv1 VPN Protocol","url":"https://blog.checkpoint.com/security/check-point-releases-important-hotfix-for-vulnerabilities-in-deprecated-ikev1-vpn-protocol/","publisher":"Check Point","context":"The article cites Check Point's statement describing how the certificate validation logic flaw can allow attackers to establish VPN sessions without a valid password.","category":"","primary":false},{"title":"Check Point Support Advisory SK185033","url":"https://support.checkpoint.com/results/sk/sk185033","publisher":"Check Point","context":"The article links to Check Point's support advisory for the list of affected products and versions.","category":"","primary":false},{"title":"Qilin","url":"https://ctrlaltintel.com/research/Qilin/","publisher":"Ctrl-Alt-Intel","context":"The article says some aspects of the observed activity overlap with a Ctrl-Alt-Intel report about Qilin's abuse of corporate VPN appliances for initial access.","category":"","primary":false}],"body":"\u003cp\u003eCheck Point has warned of active exploitation of CVE-2026-50751, a critical vulnerability affecting Remote Access VPN and Mobile Access deployments configured to use the deprecated IKEv1 key exchange protocol. The flaw has a CVSS score of 9.3 and stems from a logic flow weakness in certificate validation. Check Point said exploitation can allow an unauthenticated remote attacker to establish a remote access VPN connection without a valid user password.\u003c/p\u003e\n\n\u003cp\u003eThe issue affects multiple Security Gateway and Spark Firewall versions, including several end-of-support releases. Successful exploitation requires specific conditions, including Remote Access or Mobile Access being enabled, IKEv1 being enabled for remote access, legacy Remote Access clients being accepted, and machine certificates not being required. Check Point said additional post-authentication activity is still required to access internal resources or escalate privileges.\u003c/p\u003e\n\n\u003cp\u003eCheck Point said it first observed suspicious activity on June 4, 2026, with the earliest observed exploitation dating back to May 7, 2026, and exploitation efforts increasing this month. The activity has reportedly affected a few dozen targeted organizations globally. In one case, post-exploitation activity was associated with a Qilin ransomware affiliate.\u003c/p\u003e\n"},{"n":3,"title":"Check Point links VPN zero-day attacks to Qilin ransomware gang","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/check-point-links-vpn-zero-day-attacks-to-qilin-ransomware-gang/","time":"13:05","priority":"MUST READ","score":94,"tldr":"Check Point patched a critical zero-day authentication bypass in Remote Access VPN and Mobile Access deployments using deprecated IKEv1, after limited exploitation against dozens of organizations. At least one compromise was linked to a Qilin ransomware affiliate, and affected customers should update or disable legacy IKEv1 configurations immediately.","briefOverview":"\u003cp\u003eCheck Point released security updates for a critical flaw affecting Remote Access VPN and Mobile Access deployments that was exploited in zero-day attacks. The vulnerability, tracked as CVE-2026-50751, can let unauthenticated remote attackers bypass authentication and establish a remote access VPN connection. Check Point said exploitation has been limited to a few dozen targeted organizations globally.\u003c/p\u003e\n\n\u003cp\u003eThe affected deployments are those configured to use the deprecated IKEv1 key exchange protocol, accept legacy Remote Access clients, and not require a machine certificate for connections. Check Point said attacks began on May 7 and surged in early June. At least one incident involved confirmed post-compromise activity associated with a Qilin ransomware affiliate.\u003c/p\u003e\n\n\u003cp\u003eCheck Point also found a second vulnerability, CVE-2026-50752, affecting certificate validation in deprecated IKEv1 key exchange. The second flaw could be exploited in man-in-the-middle attacks on site-to-site VPN connections, though Check Point said it has not seen exploitation in the wild. The company urged customers using IKEv1 to apply updates immediately or use mitigations if they cannot patch right away.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCheck Point released security updates to fix a critical vulnerability affecting Remote Access VPN and Mobile Access deployments after the flaw was exploited in zero-day attacks. The vulnerability is tracked as CVE-2026-50751 and affects certain Mobile Access / SSL VPNs, Remote Access VPNs, and Spark firewalls. It can be exploited by unauthenticated remote attackers to bypass authentication and establish a remote access VPN connection.\u003c/p\u003e\n\n\u003cp\u003eCheck Point said the flaw only affects deployments configured to use the deprecated IKEv1 key exchange protocol. The vulnerable configuration also requires security gateways that accept legacy Remote Access clients and do not require a machine certificate for connections. Customers using the IKEv1 key exchange protocol were strongly encouraged to apply the available security updates immediately.\u003c/p\u003e\n\n\u003cp\u003eThe attacks began on May 7 and surged in early June, according to Check Point. The company said the observed exploitation has been limited to a few dozen targeted organizations worldwide. At least one case involved confirmed post-compromise activity associated with a Qilin ransomware affiliate.\u003c/p\u003e\n\n\u003cp\u003eFor customers who cannot immediately patch, Check Point provided mitigation steps. The company advised removing support for the legacy remote access client, configuring global properties for Remote Access VPN Authentication to IKEv2 only, making Machine Certificate Authentication mandatory, and enabling IPS with downloaded signatures.\u003c/p\u003e\n\n\u003cp\u003eDuring its investigation of CVE-2026-50751, Check Point found a second vulnerability tracked as CVE-2026-50752. That flaw affects certificate validation in deprecated IKEv1 key exchange and could be exploited in man-in-the-middle attacks on site-to-site VPN connections. Check Point said it has not found evidence that CVE-2026-50752 has been exploited in the wild, but still advised customers to apply updates.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes Qilin as a Ransomware-as-a-Service operation that surfaced in August 2022 under the name Agenda. Qilin has claimed nearly 400 victims on its dark web leak site. Its listed victims include Yangfeng, Nissan, Asahi, Lee Enterprises, Synnovis, and Australia’s Court Services Victoria.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCheck Point released security updates to patch a critical flaw affecting Remote Access VPN and Mobile Access deployments. The vulnerability, tracked as CVE-2026-50751, was exploited in zero-day attacks before the updates were released.\u003c/p\u003e\n\n\u003cp\u003eThe flaw can allow unauthenticated remote attackers to bypass authentication on targeted Mobile Access / SSL VPNs, Remote Access VPNs, or Spark firewalls. Successful exploitation can let an attacker establish a remote access VPN connection.\u003c/p\u003e\n\n\u003cp\u003eCheck Point said the observed exploitation has affected only a few dozen targeted organizations globally. At least one incident included confirmed post-compromise activity associated with a Qilin ransomware affiliate.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2026-50751-technical-scope\"\u003eCVE-2026-50751 technical scope\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-50751 affects only specific Check Point deployments. According to Check Point, the flaw applies to deployments configured to use the deprecated IKEv1 key exchange protocol.\u003c/p\u003e\n\n\u003cp\u003eThe affected deployments also involve security gateways that accept legacy Remote Access clients. In addition, the affected configuration does not require a machine certificate for connections.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies the impacted product areas as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMobile Access / SSL VPNs\u003c/li\u003e\n\u003cli\u003eRemote Access VPNs\u003c/li\u003e\n\u003cli\u003eSpark firewalls\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-timeline-and-impact\"\u003eExploitation timeline and impact\u003c/h2\u003e\n\n\u003cp\u003eCheck Point said the attacks began on May 7. The activity surged in early June.\u003c/p\u003e\n\n\u003cp\u003eThe company described the exploitation as limited in scope so far. It said only a few dozen targeted organizations worldwide have been affected.\u003c/p\u003e\n\n\u003cp\u003eOne case involved confirmed post-compromise activity associated with a Qilin ransomware affiliate. The article does not provide further details about that victim organization or the specific actions taken after compromise.\u003c/p\u003e\n\n\u003ch2 id=\"check-point-response-and-mitigations\"\u003eCheck Point response and mitigations\u003c/h2\u003e\n\n\u003cp\u003eCheck Point released security updates and urged customers using the IKEv1 key exchange protocol to apply them immediately. The company also provided mitigation steps for customers that cannot patch vulnerable systems right away.\u003c/p\u003e\n\n\u003cp\u003eThe recommended mitigations include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRemove support for the legacy remote access client.\u003c/li\u003e\n\u003cli\u003eConfigure global properties for Remote Access VPN Authentication to IKEv2 only.\u003c/li\u003e\n\u003cli\u003eSet Machine Certificate Authentication as mandatory.\u003c/li\u003e\n\u003cli\u003eEnable IPS and download the signatures.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese mitigations are presented by Check Point as measures to reduce exposure for customers that cannot immediately apply the security updates.\u003c/p\u003e\n\n\u003ch2 id=\"second-vulnerability-found-during-the-investigation\"\u003eSecond vulnerability found during the investigation\u003c/h2\u003e\n\n\u003cp\u003eWhile investigating CVE-2026-50751, Check Point found another vulnerability tracked as CVE-2026-50752. This second flaw affects certificate validation in the deprecated IKEv1 key exchange protocol.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-50752 can be exploited in man-in-the-middle attacks on site-to-site VPN connections. Check Point said it has not yet found evidence that CVE-2026-50752 has been exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eEven without observed exploitation, Check Point advised customers to apply updates to mitigate potential exposure to CVE-2026-50752.\u003c/p\u003e\n\n\u003ch2 id=\"qilin-ransomware-context\"\u003eQilin ransomware context\u003c/h2\u003e\n\n\u003cp\u003eThe article links at least one CVE-2026-50751-related incident to post-compromise activity associated with a Qilin ransomware affiliate. Qilin surfaced in August 2022 as a Ransomware-as-a-Service operation under the name Agenda.\u003c/p\u003e\n\n\u003cp\u003eQilin has claimed responsibility for nearly 400 victims on its dark web leak site. The article lists several high-profile organizations previously associated with Qilin claims, including Yangfeng, Nissan, Asahi, Lee Enterprises, Synnovis, and Australia’s Court Services Victoria.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe main issue is a critical authentication bypass in certain Check Point VPN and Mobile Access configurations using deprecated IKEv1. The flaw has already been exploited in targeted zero-day attacks, and one case involved activity associated with a Qilin ransomware affiliate, making Check Point’s updates and recommended IKEv1-related mitigations urgent for affected deployments.\u003c/p\u003e\n","keyPoints":["Check Point released security updates for CVE-2026-50751, a critical flaw affecting Remote Access VPN and Mobile Access deployments that was exploited in zero-day attacks.","CVE-2026-50751 can allow unauthenticated remote attackers to bypass authentication on targeted Mobile Access / SSL VPNs, Remote Access VPNs, or Spark firewalls and establish a remote access VPN connection.","Check Point said CVE-2026-50751 affects only deployments using the deprecated IKEv1 key exchange protocol, accepting legacy Remote Access clients, and not requiring a machine certificate for connections.","The attacks began on May 7, surged in early June, affected a few dozen organizations worldwide, and included at least one incident linked to the Qilin ransomware operation.","Check Point also found CVE-2026-50752, a certificate validation vulnerability in deprecated IKEv1 that could be exploited in man-in-the-middle attacks on site-to-site VPN connections, but said it has not seen exploitation in the wild."],"insights":["Organizations can materially reduce exposure without waiting for patch deployment by removing legacy Remote Access client support, enforcing IKEv2 only, requiring Machine Certificate Authentication, and enabling IPS signatures.","The risk is concentrated in a narrow configuration set: deprecated IKEv1 deployments that still accept legacy Remote Access clients and do not require machine certificates.","Although exploitation has affected only a few dozen organizations globally, the confirmed involvement of a Qilin ransomware affiliate makes the flaw especially urgent for environments matching the vulnerable configuration.","Check Point’s investigation of the exploited flaw also uncovered a separate IKEv1 certificate validation issue, CVE-2026-50752, indicating that deprecated IKEv1 configurations present more than one security exposure."],"referencedReports":[{"title":"CVE-2026-50751","url":"https://support.checkpoint.com/results/sk/sk185033","publisher":"Check Point","context":"The article links to Check Point’s support page identifying CVE-2026-50751 as the critical authentication bypass flaw affecting Remote Access VPN and Mobile Access deployments.","category":"","primary":false},{"title":"Check Point releases important hotfix for vulnerabilities in deprecated IKEv1 VPN protocol","url":"https://blog.checkpoint.com/security/check-point-releases-important-hotfix-for-vulnerabilities-in-deprecated-ikev1-vpn-protocol/","publisher":"Check Point","context":"The article cites Check Point’s warning about active exploitation of CVE-2026-50751 and the availability of security updates.","category":"","primary":false},{"title":"CVE-2026-50752","url":"https://support.checkpoint.com/results/sk/sk185035","publisher":"Check Point","context":"The article links to Check Point’s support page for CVE-2026-50752, a certificate validation issue in deprecated IKEv1 that could enable man-in-the-middle attacks.","category":"","primary":false}],"body":"\u003cp\u003eCheck Point released security updates for a critical flaw affecting Remote Access VPN and Mobile Access deployments that was exploited in zero-day attacks. The vulnerability, tracked as CVE-2026-50751, can let unauthenticated remote attackers bypass authentication and establish a remote access VPN connection. Check Point said exploitation has been limited to a few dozen targeted organizations globally.\u003c/p\u003e\n\n\u003cp\u003eThe affected deployments are those configured to use the deprecated IKEv1 key exchange protocol, accept legacy Remote Access clients, and not require a machine certificate for connections. Check Point said attacks began on May 7 and surged in early June. At least one incident involved confirmed post-compromise activity associated with a Qilin ransomware affiliate.\u003c/p\u003e\n\n\u003cp\u003eCheck Point also found a second vulnerability, CVE-2026-50752, affecting certificate validation in deprecated IKEv1 key exchange. The second flaw could be exploited in man-in-the-middle attacks on site-to-site VPN connections, though Check Point said it has not seen exploitation in the wild. The company urged customers using IKEv1 to apply updates immediately or use mitigations if they cannot patch right away.\u003c/p\u003e\n"},{"n":29,"title":"Pythagora-io/gpt-pilot Compromised on GitHub - Shai-Hulud Credential Stealer Blocked by Python Linter","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/pythagora-io-gpt-pilot-compromised-on-github-shai-hulud-credential-stealer-blocked-by-python-linter","time":"21:21","priority":"MUST READ","score":94,"tldr":"A compromised maintainer account force-pushed a Shai-Hulud credential stealer into Pythagora-io/gpt-pilot, but the malicious code was blocked twice by Ruff linting/formatting failures before CI could pass. The incident underscores how branch protection and mandatory CI checks can stop supply-chain compromises even when a trusted GitHub account is taken over.","briefOverview":"\u003cp\u003eOn June 8, 2026, an attacker compromised the GitHub account of a Pythagora-io/gpt-pilot co-founder and force-pushed a credential-stealing payload to the repository’s main branch. The repository had no branch protection on main, allowing the malicious history rewrite without review or approval. The attack targeted a popular open-source AI developer tool with more than 33,700 GitHub stars and 3,500 forks.\u003c/p\u003e\n\n\u003cp\u003eThe injected malware was identified in the article as a variant of the Shai-Hulud worm and included a Python loader, a 758KB obfuscated JavaScript payload, and changes that launched it through the telemetry module. The payload targeted AWS keys, npm tokens, GitHub secrets, Kubernetes service accounts, HashiCorp Vault tokens, and SSH keys. It also used GitHub commit messages as a command-and-control channel and could exfiltrate stolen credentials through GitHub repositories.\u003c/p\u003e\n\n\u003cp\u003eThe attacker’s two attempts to pass CI failed because the project’s ruff checks rejected the injected code. The first failure was caused by formatting in _hooks.py, and the second was caused by import-order and module-level import violations in \u003cstrong\u003einit\u003c/strong\u003e.py. The article presents this as an example of code quality tooling acting as an accidental but effective supply-chain defense.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOn June 8, 2026, an attacker used the compromised LeonOstrez GitHub account, belonging to a Pythagora co-founder and repository maintainer, to force-push malicious code to Pythagora-io/gpt-pilot. The article says gpt-pilot is a widely used open-source AI developer tool marketed as “the first real AI developer.” Because the main branch had no branch protection rules, the attacker was able to replace the clean commit chain directly.\u003c/p\u003e\n\n\u003cp\u003eThe malicious change was hidden inside a backdated commit titled “Revert ‘Implemented weekend discount’,” which appeared to match a legitimate revert by Zvonimir Sabljic. The attacker created a malicious version of that commit with the same message, author name, and timestamp as a clean version, but with additional files in core/telemetry. Those files were _hooks.py, _runtime.bin, and a modified \u003cstrong\u003einit\u003c/strong\u003e.py.\u003c/p\u003e\n\n\u003cp\u003eThe injected \u003cstrong\u003einit\u003c/strong\u003e.py change started a daemon thread on module import, which called the Python loader in _hooks.py. The loader downloaded the Bun v1.3.13 runtime and executed _runtime.bin, a 758KB obfuscated JavaScript credential stealer. The payload targeted cloud, developer, and CI/CD credentials including AWS keys, npm tokens, GitHub secrets, Kubernetes service accounts, HashiCorp Vault tokens, and SSH keys.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the payload as a Shai-Hulud variant connected to TeamPCP/UNC6780 based on indicators including the Bun loader pattern, _runtime naming convention, credential target set, the “thebeautifulsnadsoftime” C2 marker, Russian locale exemption, and Sigstore/Fulcio abuse. It used GitHub commit searches as a command-and-control channel and could exfiltrate data by creating GitHub repositories and committing stolen credentials as files. It also included persistence hooks for Claude Code and VS Code.\u003c/p\u003e\n\n\u003cp\u003eThe attack did not pass CI because ruff blocked both force-push attempts. The first attempt failed ruff format due to a formatting violation in _hooks.py, and the second failed ruff check due to E402 and I001 import violations in \u003cstrong\u003einit\u003c/strong\u003e.py. The article states that all six CI jobs failed each time and that the attacker gave up after the second failure.\u003c/p\u003e\n\n\u003cp\u003eThe article says the compromise was disclosed to the maintainers and lists recovery steps for potentially affected users. It advises users who cloned or pulled gpt-pilot after June 8, 2026 11:01 UTC and before the force push was reverted to check for the malicious files, Bun runtime artifacts, lock files, and persistence hooks. It also recommends rotating credentials, auditing cloud and npm logs, inspecting GitHub repositories, checking for persistence, and killing suspicious processes.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOn June 8, 2026, an attacker compromised the GitHub account of LeonOstrez, described in the article as a Pythagora co-founder and repository maintainer, and force-pushed malicious code to the main branch of Pythagora-io/gpt-pilot. The project is described as a popular open-source AI developer tool with more than 33,700 GitHub stars and 3,500 forks. The article says the repository had no branch protection rules on main, allowing the attacker to replace the clean commit chain without review or approval.\u003c/p\u003e\n\n\u003cp\u003eThe malicious payload was identified as a variant of the Shai-Hulud worm. It was designed to steal developer, cloud, and CI/CD credentials, including AWS keys, npm tokens, GitHub secrets, Kubernetes service accounts, HashiCorp Vault tokens, and SSH keys. The article emphasizes that the attack was stopped not by a dedicated security control, but by ruff, the Python formatter and linter used in the project’s CI pipeline.\u003c/p\u003e\n\n\u003ch2 id=\"attack-timeline\"\u003eAttack Timeline\u003c/h2\u003e\n\n\u003cp\u003eThe article describes two force-push attempts and two CI failures:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA malicious “Revert” commit was authored and backdated to match a legitimate revert by Zvonimir Sabljic, adding _hooks.py, _runtime.bin, and modifying \u003cstrong\u003einit\u003c/strong\u003e.py in core/telemetry.\u003c/li\u003e\n\u003cli\u003eAt 2026-06-08 11:01:38 UTC, the first force push replaced the clean commit chain with a malicious chain.\u003c/li\u003e\n\u003cli\u003eAt 2026-06-08 11:02:07 UTC, CI failed because ruff format \u0026ndash;check detected a formatting violation in _hooks.py.\u003c/li\u003e\n\u003cli\u003e
