rding to the article, internal messages typically bypass the inbound scanning pipeline entirely. It specifically names URL reputation checks, sender verification, and content analysis as controls that are calibrated for external threats. A message generated by the mail platform itself can sit inside the trust boundary by definition.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that the attacker did not need to compromise an internal account in the traditional sense. Instead, the attacker triggered a Microsoft system mechanism that produced the delivery vehicle.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eThemis, IRONSCALES’ Adaptive AI, classified the message at 72% confidence. It applied a VIP Recipient label and flagged the message as high risk.\u003c/p\u003e\n\n\u003cp\u003eThe article says the detection signals were behavioral and contextual. These included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe sender was a first-time correspondent to the recipient.\u003c/li\u003e\n\u003cli\u003eThe message was flagged as high risk.\u003c/li\u003e\n\u003cli\u003eThe community intelligence layer identified the pattern as anomalous.\u003c/li\u003e\n\u003cli\u003eThe insurance claim subject referenced a specific claim that the recipient organization had no documented relationship with.\u003c/li\u003e\n\u003cli\u003eThe body included a credential prompt.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFour mailboxes were quarantined as part of the response.\u003c/p\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK Mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to three MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eT1534: Internal Spearphishing, because a system-generated internal message was used as the delivery mechanism.\u003c/li\u003e\n\u003cli\u003eT1078: Valid Accounts, because the message leveraged Microsoft internal authentication status.\u003c/li\u003e\n\u003cli\u003eT1566.002: Phishing: Spearphishing Link, because the message combined a credential prompt with a link to the outlook.office.com recall page.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise-listed-in-the-article\"\u003eIndicators of Compromise Listed in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article provides the following indicators and context:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSender Address: Office365Reports@microsoft[.]com, described as a Microsoft system-generated sender.\u003c/li\u003e\n\u003cli\u003eAuth Status: AuthAs=Internal, AuthMechanism=05, described as internal authentication and system-generated.\u003c/li\u003e\n\u003cli\u003eMessage Source: Transport Message Recall Routing Agent, described as the Microsoft Exchange recall mechanism.\u003c/li\u003e\n\u003cli\u003eRecall Link: outlook[.]office[.]com/mail/messageRecall.html?messageid=DM8P221MB0523B843476359C224750363B40B2@DM8P221MB0523[.]NAMP221[.]PROD[.]OUTLOOK[.]COM, described as a legitimate Microsoft recall URL.\u003c/li\u003e\n\u003cli\u003eSCL: 1, described as low spam confidence and consistent with internal traffic.\u003c/li\u003e\n\u003cli\u003eDirection: Originating, described as not inbound and generated within the mail platform.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact-and-affected-parties\"\u003eImpact and Affected Parties\u003c/h2\u003e\n\n\u003cp\u003eThe affected organization described in the article was a mid-size insurance brokerage. The message referenced a Texas school district and an insurance claim subject, but the article states the recipient organization had no documented relationship with that claim.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed response was quarantine of four mailboxes. The article does not name a threat actor or attacker group.\u003c/p\u003e\n","keyPoints":["Microsoft's Transport Message Recall Routing Agent generated an email authenticated as Internal with AuthAs=Internal and AuthMechanism=05, and the message direction was Originating.","The message appeared as a Message Recall Report from Office365Reports@microsoft.com and linked to a legitimate outlook.office.com message recall URL.","The email body included the credential prompt, “If prompted, login with your email address and password,” which the article states is not standard language in a Microsoft message recall notification.","Themis classified the message at 72% confidence with a VIP Recipient label, citing signals including a first-time sender, high risk, and anomalous community intelligence.","Four mailboxes were quarantined after the message was detected."],"insights":["Internal authentication and an Originating direction created a blind spot because internal messages typically bypass inbound scanning controls such as URL reputation checks, sender verification, and content analysis.","The attack did not rely on an attacker-controlled mail server; it weaponized a Microsoft system mechanism to produce a trusted-looking delivery vehicle.","A legitimate Microsoft-hosted outlook.office.com recall URL was not sufficient to establish safety because the suspicious element was the credential prompt embedded in the message body.","Behavioral and contextual signals, including first-time correspondence and an insurance claim subject with no documented relationship to the recipient organization, were needed to detect what authentication status did not reveal."],"referencedReports":[{"title":"Internal Spearphishing, T1534","url":"https://attack.mitre.org/techniques/T1534/","publisher":"MITRE ATT\u0026CK","context":"The article references MITRE ATT\u0026CK T1534 to describe the use of internal messaging systems to deliver malicious content that bypasses perimeter controls.","category":"","primary":false},{"title":"Valid Accounts, T1078","url":"https://attack.mitre.org/techniques/T1078/","publisher":"MITRE ATT\u0026CK","context":"The article maps the incident to MITRE ATT\u0026CK T1078 because it involved Microsoft internal authentication status.","category":"","primary":false},{"title":"Phishing: Spearphishing Link, T1566.002","url":"https://attack.mitre.org/techniques/T1566/002/","publisher":"MITRE ATT\u0026CK","context":"The article maps the credential prompt and recall-page link to MITRE ATT\u0026CK T1566.002.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft’s Transport Message Recall Routing Agent generated an email that was authenticated as internal and marked with an Originating direction. The message appeared as a “Message Recall Report” from Office365Reports@microsoft[.]com and referenced a real-looking insurance claim subject. It included a legitimate outlook[.]office[.]com recall-report link, but the body also told the recipient, “If prompted, login with your email address and password.”\u003c/p\u003e\n\n\u003cp\u003eThe article describes this as a high-severity credential harvesting attempt that weaponized a Microsoft system mechanism. Because the message carried AuthAs=Internal, AuthMechanism=05, SCL 1, and an internal message source, it sat inside a trust boundary that can reduce scrutiny from tools focused on external mail. The attack is mapped in the article to MITRE ATT\u0026amp;CK techniques T1534, T1078, and T1566.002.\u003c/p\u003e\n\n\u003cp\u003eThemis, IRONSCALES’ Adaptive AI, classified the message at 72% confidence with a VIP Recipient label. The detection relied on behavioral and contextual signals, including a first-time sender, high-risk flagging, community intelligence, and a mismatch between the insurance claim subject and the recipient organization’s documented relationships. Four mailboxes were quarantined.\u003c/p\u003e\n"},{"n":12,"title":"Russia upgrades rules for its digital spy system to better track citizens online","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/russia-upgrades-rules-for-digital-spy-system-sorm","time":"14:04","priority":"SHOULD READ","score":78,"tldr":"Russia has updated SORM rules to make its digital surveillance system faster and more automated, expanding the data authorities can search and correlate across telecom and internet infrastructure. The changes could deepen state monitoring of citizens’ online activity and pressure smaller providers that cannot afford compliance.","briefOverview":"\u003cp\u003eRussia’s Ministry of Digital Development published updated technical standards for SORM, the country’s System for Operative Investigative Activities, at the end of May. SORM gives Russian security and intelligence agencies access to telephone calls, internet traffic and other electronic communications passing through domestic networks. The new rules are intended by the ministry to support national security, while privacy advocates say they expand the government’s ability to monitor digital activity.\u003c/p\u003e\n\n\u003cp\u003eThe updated rules go beyond earlier requirements for operators to install SORM equipment and provide access to authorized agencies. They specify how information must be searched, processed and transmitted, and they expand searchable data to include names, passport information, tax identification numbers, addresses, usernames, domains, URLs, corporate records, device identifiers and geographic coordinates. Timofei Dubrovskikh of RKS Global said the system’s primary value is in building digital profiles that link phone numbers, SIM cards, devices, IP addresses, accounts and locations.\u003c/p\u003e\n\n\u003cp\u003eThe regulations apply not only to telecom operators but also to “information dissemination organizers” and operators of autonomous systems, a category that may include hosting providers, data centers, cloud operators, major technology companies, banks, universities and large corporations managing their own internet infrastructure. Compliance may require costly hardware, storage and dedicated communications infrastructure, which could burden smaller providers. Natalia Krapiva of Access Now said the changes could reinforce the perception that online activity is constantly monitored and encourage self-censorship.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eRussia has updated the technical rules governing SORM, its System for Operative Investigative Activities. The platform gives security and intelligence agencies access to telephone calls, internet traffic and other electronic communications traveling through domestic networks. The new regulations were published by the Ministry of Digital Development at the end of May. The ministry said the rules are necessary to support national security.\u003c/p\u003e\n\n\u003cp\u003eAccording to Timofei Dubrovskikh, a researcher at RKS Global, the previous requirement for operators was relatively straightforward: install SORM equipment and provide authorized agencies with access when required. The updated rules go further by specifying how information must be searched, processed and transmitted. The article describes the changes as making the system faster, more automated and better integrated across Russia’s internet infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe rules expand the range of searchable data available through SORM. The article lists full names, passport information, tax identification numbers, addresses, usernames, domains, URLs, corporate records, device identifiers and geographic coordinates. Dubrovskikh said SORM’s key value is less about intercepting communication content and more about building comprehensive digital profiles connecting phone numbers, SIM cards, devices, IP addresses, user accounts and locations.\u003c/p\u003e\n\n\u003cp\u003ePrivacy advocates cited in the article said the changes could strengthen Russia’s ability to monitor people’s digital activity. Natalia Krapiva of Access Now said the requirements appear intended to reinforce the perception that online activity is constantly monitored. She said targeted digital surveillance allows authorities to identify dissent while keeping services online, unlike nationwide internet disruptions that have proven unpopular even among politically neutral citizens.\u003c/p\u003e\n\n\u003cp\u003eThe regulations could also affect Russia’s telecommunications market by raising compliance costs for providers. Operators may need specialized hardware, storage systems and dedicated communications infrastructure capable of collecting, processing and transmitting data in government-mandated formats. The article says these investments can cost millions of rubles and may fall especially hard on smaller internet providers, while noncompliance can trigger licensing problems, regulatory scrutiny, approval delays and other administrative sanctions.\u003c/p\u003e\n\n\u003cp\u003eThe rules extend beyond traditional telecommunications companies to “information dissemination organizers” and operators of autonomous systems. According to the article, this category could include hosting providers, data centers, cloud operators, major technology companies, banks, universities and large corporations that manage their own internet infrastructure. For ordinary Russians, the article says there is little practical way to opt out because SORM operates inside telecommunications infrastructure, and VPNs may obscure some browsing activity but cannot hide the existence of the VPN connection itself or all metadata and network relationships.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eRussia has updated the technical standards governing SORM, the System for Operative Investigative Activities. SORM is described in the article as a platform that gives Russia’s security and intelligence agencies access to telephone calls, internet traffic and other electronic communications passing through domestic networks. The Ministry of Digital Development published the new regulations at the end of May.\u003c/p\u003e\n\n\u003cp\u003eThe article characterizes the update as part of a broader effort to make Russia’s digital surveillance infrastructure faster, more automated and better integrated across the country’s internet infrastructure. The ministry said the new rules are necessary to support national security. Privacy advocates cited in the article argue that the changes will further strengthen the government’s already extensive ability to monitor digital activity.\u003c/p\u003e\n\n\u003ch2 id=\"what-changed-in-the-sorm-rules\"\u003eWhat changed in the SORM rules\u003c/h2\u003e\n\n\u003cp\u003eAccording to Timofei Dubrovskikh, a researcher at the digital rights nonprofit RKS Global, earlier SORM requirements were relatively straightforward. Operators had to install SORM equipment and provide authorized agencies with access when required. The updated rules go further by specifying how information must be searched, processed and transmitted.\u003c/p\u003e\n\n\u003cp\u003eThe authorities also expanded the range of searchable data available in the system. The article lists the following examples:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFull names\u003c/li\u003e\n\u003cli\u003ePassport information\u003c/li\u003e\n\u003cli\u003eTax identification numbers\u003c/li\u003e\n\u003cli\u003eAddresses\u003c/li\u003e\n\u003cli\u003eUsernames\u003c/li\u003e\n\u003cli\u003eDomains\u003c/li\u003e\n\u003cli\u003eURLs\u003c/li\u003e\n\u003cli\u003eCorporate records\u003c/li\u003e\n\u003cli\u003eDevice identifiers\u003c/li\u003e\n\u003cli\u003eGeographic coordinates\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDubrovskikh said the overall objective is to enable SORM to quickly establish links between individuals, devices, networks, accounts and online activity.\u003c/p\u003e\n\n\u003ch2 id=\"technical-significance\"\u003eTechnical significance\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that the value of SORM is not only in intercepting communication content. Dubrovskikh said the primary value lies in constructing comprehensive digital profiles that connect phone numbers, SIM cards, devices, IP addresses, user accounts and locations into a single searchable network.\u003c/p\u003e\n\n\u003cp\u003eThe updated rules therefore strengthen the government’s ability to rapidly collect and correlate disparate digital traces. By linking fragmented data, SORM can map how people connect, move and interact across the internet, not only what they say online. Dubrovskikh said this moves SORM closer to functioning as a large-scale surveillance infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"political-and-social-implications-described-in-the-article\"\u003ePolitical and social implications described in the article\u003c/h2\u003e\n\n\u003cp\u003eNatalia Krapiva, senior tech counsel at Access Now, said the new requirements appear intended to reinforce the perception that online activity is constantly monitored. She said the authorities want to create the feeling that everything is controlled and listened to, making people less likely to express disagreement online. The article frames this as a mechanism for encouraging self-censorship.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that Russia has repeatedly experimented with nationwide internet disruptions during periods of political tension. Krapiva said such outages have proven unpopular even among politically neutral citizens. More targeted digital surveillance allows authorities to identify dissent while keeping services online.\u003c/p\u003e\n\n\u003ch2 id=\"affected-organizations-and-sectors\"\u003eAffected organizations and sectors\u003c/h2\u003e\n\n\u003cp\u003eThe updated SORM regulations extend beyond traditional telecommunications companies. They apply to all “information dissemination organizers” and operators of autonomous systems. According to the article, citing Russian independent outlet Meduza, this could encompass:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHosting providers\u003c/li\u003e\n\u003cli\u003eData centers\u003c/li\u003e\n\u003cli\u003eCloud operators\u003c/li\u003e\n\u003cli\u003eMajor technology companies\u003c/li\u003e\n\u003cli\u003eBanks\u003c/li\u003e\n\u003cli\u003eUniversities\u003c/li\u003e\n\u003cli\u003eLarge corporations that manage their own internet infrastructure\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDubrovskikh said SORM was traditionally associated with telephone networks, mobile operators and internet service providers. However, he said the modern internet has become more complex, and simply tapping telecom operators is no longer enough for security agencies seeking to correlate technical identifiers and subscriber information.\u003c/p\u003e\n\n\u003ch2 id=\"compliance-burden-and-market-effects\"\u003eCompliance burden and market effects\u003c/h2\u003e\n\n\u003cp\u003eThe regulations could reshape Russia’s telecommunications market. Compliance with SORM requirements can require providers to deploy specialized hardware, storage systems and dedicated communications infrastructure. These systems must be capable of collecting, processing and transmitting data in government-mandated formats.\u003c/p\u003e\n\n\u003cp\u003eThe article states that this investment can cost millions of rubles and falls especially hard on smaller internet providers. Krapiva said this could accelerate consolidation around larger operators with closer ties to the state. The article says such consolidation could reduce competition and make it easier for the Kremlin to monitor and control the sector.\u003c/p\u003e\n\n\u003cp\u003eDubrovskikh said operators that fail to comply face more than financial penalties. Noncompliance can trigger licensing problems, regulatory scrutiny, delays in network approvals and other administrative sanctions. These consequences could threaten the survival of smaller providers.\u003c/p\u003e\n\n\u003ch2 id=\"practical-impact-on-users\"\u003ePractical impact on users\u003c/h2\u003e\n\n\u003cp\u003eFor ordinary Russians, the article says there is little practical way to opt out. SORM operates within telecommunications infrastructure rather than on users’ devices, so it cannot simply be disabled through software settings. This means the surveillance capability is embedded at the network level rather than controlled by individual users.\u003c/p\u003e\n\n\u003cp\u003eThe article also discusses VPNs. Dubrovskikh said VPNs may obscure some browsing activity from internet providers, but they cannot hide the existence of the VPN connection itself. Metadata and network relationships may remain visible to authorities.\u003c/p\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe new SORM regulations expand and formalize how Russian authorities can search, process and transmit digital data through domestic communications infrastructure. The article presents the update as a shift from traditional wiretapping toward rapid correlation of identifiers, accounts, locations and network activity. Privacy advocates cited in the article say this could intensify monitoring, encourage self-censorship and place significant pressure on smaller providers and other infrastructure operators.\u003c/p\u003e\n","keyPoints":["Russia’s Ministry of Digital Development published updated technical standards for SORM, the country’s System for Operative Investigative Activities, at the end of May.","The new SORM rules specify how information must be searched, processed and transmitted, going beyond earlier requirements for operators to install equipment and provide access to authorized agencies.","The updated regulations expand searchable data to include names, passport information, tax identification numbers, addresses, usernames, domains, URLs, corporate records, device identifiers and geographic coordinates.","Digital rights advocates cited in the article said the changes could strengthen the government’s ability to monitor online activity and encourage self-censorship while keeping internet services online.","The regulations may impose costly compliance burdens on telecom providers, hosting providers, data centers, cloud operators, major technology companies, banks, universities and large corporations that manage their own internet infrastructure."],"insights":["The updated SORM rules emphasize correlating metadata and identifiers into searchable profiles rather than simply intercepting communication content.","Targeted surveillance may be more politically useful to Russian authorities than broad internet shutdowns because it can identify dissent while keeping online services available.","The compliance costs and regulatory consequences tied to SORM could push smaller internet providers out of the market and concentrate Russia’s telecom sector around larger, more state-aligned operators.","Because SORM operates inside telecommunications infrastructure, ordinary users cannot opt out through device settings, and VPNs cannot hide the existence of the VPN connection or all related metadata."],"referencedReports":[],"body":"\u003cp\u003eRussia’s Ministry of Digital Development published updated technical standards for SORM, the country’s System for Operative Investigative Activities, at the end of May. SORM gives Russian security and intelligence agencies access to telephone calls, internet traffic and other electronic communications passing through domestic networks. The new rules are intended by the ministry to support national security, while privacy advocates say they expand the government’s ability to monitor digital activity.\u003c/p\u003e\n\n\u003cp\u003eThe updated rules go beyond earlier requirements for operators to install SORM equipment and provide access to authorized agencies. They specify how information must be searched, processed and transmitted, and they expand searchable data to include names, passport information, tax identification numbers, addresses, usernames, domains, URLs, corporate records, device identifiers and geographic coordinates. Timofei Dubrovskikh of RKS Global said the system’s primary value is in building digital profiles that link phone numbers, SIM cards, devices, IP addresses, accounts and locations.\u003c/p\u003e\n\n\u003cp\u003eThe regulations apply not only to telecom operators but also to “information dissemination organizers” and operators of autonomous systems, a category that may include hosting providers, data centers, cloud operators, major technology companies, banks, universities and large corporations managing their own internet infrastructure. Compliance may require costly hardware, storage and dedicated communications infrastructure, which could burden smaller providers. Natalia Krapiva of Access Now said the changes could reinforce the perception that online activity is constantly monitored and encourage self-censorship.\u003c/p\u003e\n"},{"n":13,"title":"UK gives big tech 3 months to create device controls to block nude images of kids","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/uk-gives-big-tech-3-months-to-create-device-controls-kid-images","time":"20:24","priority":"SHOULD READ","score":78,"tldr":"The UK is giving Apple, Google and other tech companies three months to build device-level controls that block children from taking, sharing or viewing nude images on smartphones and tablets. If they do not comply, the government says it may force action through legislation, fines and potential criminal liability for executives.","briefOverview":"\u003cp\u003eThe United Kingdom is giving Apple, Google and other big tech companies three months to create safeguards on smartphones and tablets that detect and block nude images of children. The Home Office said the companies must activate built-in features or implement technical solutions on devices used by children. Prime Minister Keir Starmer announced the measure in a speech at London Tech Week.\u003c/p\u003e\n\n\u003cp\u003eThe rules will apply to both existing and new smartphones and tablets, and the government said it will introduce legislation to force action if companies do not comply. Fines and potential criminal liability for tech executives are being considered, with the Home Office saying that “nothing is off the table.” Adults will need to use age verification to access nude content of all types.\u003c/p\u003e\n\n\u003cp\u003eThe Home Office said the device would block harmful content across all apps and services without data collection, monitoring or reporting. The government said the measure is meant to protect children from online pornography, reduce the circulation of child sexual abuse imagery, and stop predators from exploiting children through their devices. Britain’s National Crime Agency said restricting high-risk features could reduce online victimization of children.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe United Kingdom is giving Apple, Google and other big tech companies three months to create device-level safeguards on smartphones and tablets that detect and block nude images of children. According to the Home Office, companies must activate built-in features or implement technical solutions for children’s devices. Prime Minister Keir Starmer announced the measure during a speech at London Tech Week.\u003c/p\u003e\n\n\u003cp\u003eThe planned rules will apply to both existing and new smartphones and tablets. If companies fail to comply, the government said it will introduce legislation to force them to act. The Home Office said fines and potential criminal liability for tech executives are being considered, adding that “nothing is off the table.”\u003c/p\u003e\n\n\u003cp\u003eThe initiative is designed to protect children from online pornography, reduce the number of images in circulation, and prevent predators from exploiting and abusing children through their devices. The Home Office said adults will need to use age verification to access nude content of all types. It also said the device controls would block harmful content across all apps and services without data collection, monitoring or reporting.\u003c/p\u003e\n\n\u003cp\u003eHome Secretary Shabana Mahmood said the government wants tech giants to block nudity across the whole device by default, with deactivation allowed only through age assurance. The article notes that Apple has introduced default age checks for iPhone users, but says nudity detection is not applied to third-party messaging services, cameras, apps or search. The government described the effort as making Britain the first country where it is impossible for children to take, share or view naked pictures on their devices.\u003c/p\u003e\n\n\u003cp\u003eBritain’s National Crime Agency welcomed the move and said device controls could drastically reduce the victimization of children online. The agency said online platforms currently contain features that offenders exploit to groom, coerce and sexually exploit children at scale. The announcement comes as the UK considers broader social media restrictions for child safety and as two UK regulators investigate xAI over nudified images the chatbot shared of women and children beginning in December.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe United Kingdom is giving Apple, Google and other big tech companies three months to create safeguards on smartphones and tablets that detect and block nude images of children. The measure was announced by Prime Minister Keir Starmer in a speech at London Tech Week. According to the Home Office, companies “must activate built-in features or implement technical solutions on smartphones and tablets to detect and block nude images for children.”\u003c/p\u003e\n\n\u003cp\u003eThe government said the rules will apply to both existing and new smartphones and tablets. If the companies do not comply within the three-month window, the government said it will introduce legislation to “force” them to act.\u003c/p\u003e\n\n\u003ch2 id=\"proposed-device-level-controls\"\u003eProposed device-level controls\u003c/h2\u003e\n\n\u003cp\u003eThe Home Office said the intended controls should block harmful content across all apps and services. In a social media post, the Home Office said: “There is no data collection, no monitoring and no reporting.” It described the mechanism as a device-level block rather than a reporting or surveillance system.\u003c/p\u003e\n\n\u003cp\u003eHome Secretary Shabana Mahmood said the government wants tech giants to “block nudity across the whole device by default, so they can only be deactivated via age assurance.” Adults will need to use age verification in order to access nude content of all types, according to the press release cited in the article.\u003c/p\u003e\n\n\u003cp\u003eThe government said the measure would make Britain the first country in the world where it is impossible for children to take, share or view naked pictures on their devices.\u003c/p\u003e\n\n\u003ch2 id=\"affected-companies-devices-and-services\"\u003eAffected companies, devices, and services\u003c/h2\u003e\n\n\u003cp\u003eThe article names Apple and Google among the big tech companies expected to create or activate these safeguards. The rules are expected to apply to smartphones and tablets, including both devices already in use and new devices.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that Apple has already introduced default age checks for iPhone users. However, it also says nudity detection is not applied to third-party messaging services, cameras, apps or search. The government’s stated goal is broader device-wide blocking rather than protection limited to specific apps or services.\u003c/p\u003e\n\n\u003ch2 id=\"rationale-and-stated-impact\"\u003eRationale and stated impact\u003c/h2\u003e\n\n\u003cp\u003eThe initiative is intended to protect children from online pornography and reduce the number of images in circulation. It is also designed to prevent predators from exploiting and abusing children through their devices.\u003c/p\u003e\n\n\u003cp\u003eThe Home Office press release cited in the article said more than 90% of child sex abuse reports made in 2024 featured content children generated themselves. The article also says several children who shared images with predators ultimately killed themselves.\u003c/p\u003e\n\n\u003ch2 id=\"enforcement-posture\"\u003eEnforcement posture\u003c/h2\u003e\n\n\u003cp\u003eThe UK government is giving companies three months to act voluntarily. If they fail to comply, the government said it will introduce legislation to force action.\u003c/p\u003e\n\n\u003cp\u003ePossible enforcement measures under consideration include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFines.\u003c/li\u003e\n\u003cli\u003ePotential criminal liability for technology executives.\u003c/li\u003e\n\u003cli\u003eAdditional legislation if companies do not comply.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe Home Office said “nothing is off the table.”\u003c/p\u003e\n\n\u003ch2 id=\"national-crime-agency-response\"\u003eNational Crime Agency response\u003c/h2\u003e\n\n\u003cp\u003eBritain’s National Crime Agency welcomed the announcement and said device controls could drastically reduce the online victimization of children. The agency said online platforms currently contain features that offenders exploit to groom, coerce and sexually exploit children at scale.\u003c/p\u003e\n\n\u003cp\u003eThe National Crime Agency said restricting access to those high-risk features remains an important part of reducing harm.\u003c/p\u003e\n\n\u003ch2 id=\"wider-uk-child-safety-agenda\"\u003eWider UK child-safety agenda\u003c/h2\u003e\n\n\u003cp\u003eThe announcement comes as the UK is considering broader social media restrictions intended to protect children online. The government said it will soon unveil new measures to hold social media platforms accountable for child safety and for protecting children from online harms.\u003c/p\u003e\n\n\u003cp\u003eIn March, the government launched pilot programs to test different methods for reining in social media platforms and how children interact with them.\u003c/p\u003e\n\n\u003ch2 id=\"related-regulatory-activity\"\u003eRelated regulatory activity\u003c/h2\u003e\n\n\u003cp\u003eThe article also notes that two UK regulators are investigating xAI for nudified images the chatbot shared of women and children beginning in December. The article does not provide further details about those investigations beyond their connection to the broader issue of online child safety and harmful imagery.\u003c/p\u003e\n","keyPoints":["The United Kingdom is giving Apple, Google and other big tech companies three months to create safeguards on smartphones and tablets that detect and block nude images of children.","The Home Office said the rules will apply to both existing and new smartphones and tablets, and the government will introduce legislation to force action if companies fail to comply.","The UK government said fines and potential criminal liability for tech executives are being considered, with the Home Office stating that “nothing is off the table.”","Home Secretary Shabana Mahmood said the government wants tech giants to block nudity across the whole device by default, with deactivation allowed only through age assurance.","Britain’s National Crime Agency said device controls could drastically reduce the victimization of children online by limiting features that offenders exploit to groom, coerce and sexually exploit children."],"insights":["The UK government is targeting device-level controls rather than app-by-app moderation, saying the blocking should work across all apps and services without data collection, monitoring or reporting.","The proposed controls would apply retroactively to existing smartphones and tablets as well as new devices, making implementation broader than a requirement limited to future products.","Apple’s existing default age checks are described as insufficient because nudity detection does not apply to third-party messaging services, cameras, apps or search.","The policy links child protection controls with broader age verification, as adults would need age verification to access nude content of all types."],"referencedReports":[],"body":"\u003cp\u003eThe United Kingdom is giving Apple, Google and other big tech companies three months to create safeguards on smartphones and tablets that detect and block nude images of children. The Home Office said the companies must activate built-in features or implement technical solutions on devices used by children. Prime Minister Keir Starmer announced the measure in a speech at London Tech Week.\u003c/p\u003e\n\n\u003cp\u003eThe rules will apply to both existing and new smartphones and tablets, and the government said it will introduce legislation to force action if companies do not comply. Fines and potential criminal liability for tech executives are being considered, with the Home Office saying that “nothing is off the table.” Adults will need to use age verification to access nude content of all types.\u003c/p\u003e\n\n\u003cp\u003eThe Home Office said the device would block harmful content across all apps and services without data collection, monitoring or reporting. The government said the measure is meant to protect children from online pornography, reduce the circulation of child sexual abuse imagery, and stop predators from exploiting children through their devices. Britain’s National Crime Agency said restricting high-risk features could reduce online victimization of children.\u003c/p\u003e\n"},{"n":21,"title":"Legacy Meets Modern: Breaking AD Through NIS \u0026 MFA Infrastructure","source":"netspi.com","sourceColorIdx":5,"link":"https://www.netspi.com/blog/technical-blog/network-pentesting/legacy-meets-modern-breaking-ad-through-nis-mfa-infrastructure/","time":"20:48","priority":"SHOULD READ","score":78,"tldr":"A penetration test showed how legacy NIS infrastructure and an MFA proxy integration can become a path to full Active Directory compromise when they expose password hashes, service credentials, and decryptable authentication traffic. The key takeaway is that security controls like MFA must be assessed in the context of their trust relationships with older systems, not in isolation.","briefOverview":"\u003cp\u003eThe article describes an internal network penetration test in which the tester progressed from a constrained foothold to full Active Directory compromise. The core finding was not a single vulnerability, but a chain of trust relationships across Apache NiFi, Linux infrastructure, NIS, Duo Authentication Proxy, CI/CD systems, SQL Server, and Active Directory. The author emphasizes that modern controls such as MFA can become part of the attack surface when integrated with legacy infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe initial foothold came from unauthenticated Apache NiFi servers that allowed remote command execution as root. From there, the tester found cleartext credentials in files, obtained initial domain access, recovered MD5Crypt hashes from an unauthenticated NIS query, cracked a privileged IT user’s password, and used it to access many Linux servers. One of those servers hosted Duo Authentication Proxy and contained both Active Directory service credentials and a RADIUS shared secret.\u003c/p\u003e\n\n\u003cp\u003eThe tester captured authentication traffic on the Duo proxy and used the shared secret to decrypt authentication exchanges, exposing credentials for users passing through the MFA infrastructure. A developer account then enabled access to CI/CD systems and SQL Server instances, where a Domain Admin SQL service account was coerced and relayed. The tester ultimately enabled xp_cmdshell, created a new Domain Admin user, and performed a DCSync to retrieve credential data for all domain accounts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is a technical write-up of an internal penetration test in which standard escalation paths repeatedly failed. The tester first found minor leads such as NBNS traffic, SNMP exposure, and a legacy key management portal with default credentials, but these did not produce meaningful progress. The breakthrough came after revisiting scan data and identifying unauthenticated Apache NiFi servers on non-standard web ports. The author frames the compromise as the result of interactions between legacy infrastructure and modern security controls.\u003c/p\u003e\n\n\u003cp\u003eApache NiFi became the first major foothold because the platform allowed unrestricted execution through workflows. The tester validated command execution as root and used an existing Metasploit module to obtain a Meterpreter session. File-system enumeration revealed cleartext credentials in a user’s bash history and domain credentials in /etc/fstab. Those credentials provided initial Active Directory access and access to internal data, but did not immediately allow privilege escalation.\u003c/p\u003e\n\n\u003cp\u003eThe tester then noticed NIS-style user imports in /etc/passwd and confirmed that NIS was configured in /etc/nsswitch.conf. Using ypwhich, domainname, and ypcat, the tester queried the NIS server and obtained usernames with MD5Crypt password hashes without authentication. A hash belonging to a privileged IT user was cracked, but the password did not work for the user’s domain account. Spraying the password against SSH services instead produced root access to 53 Linux servers.\u003c/p\u003e\n\n\u003cp\u003eOne of the SSH-accessible systems was a Duo Authentication Proxy host. Its configuration file contained an Active Directory service account password and a RADIUS shared secret, and logs showed that Active Directory authentication requests were being proxied through the host. The tester captured traffic and, using the RADIUS shared secret, decrypted authentication exchanges to view cleartext credentials for requests sent through the Duo Auth Proxy. In this case, the MFA infrastructure functioned as a source of credential exposure rather than a barrier to credential theft.\u003c/p\u003e\n\n\u003cp\u003eThe article does not describe a named threat actor; it describes activity performed during an authorized penetration test with client details redacted or modified. Captured credentials for a developer account led to access to JFrog and Jenkins environments, including Jenkins Script Console access, but those systems did not immediately yield Domain Admin access. The tester then used the developer account’s SQL Server access to coerce authentication from SQL Server service accounts with xp_dirtree and relay it with ntlmrelayx. One relayed account, DOMAIN\\sqlda, was confirmed to be a Domain Admin.\u003c/p\u003e\n\n\u003cp\u003eAfter establishing a SQL Server session through the relay, the tester enabled xp_cmdshell and executed commands in the context of the Domain Admin SQL service account. The tester created a new domain user, added it to the Domain Admins group, and then performed a DCSync to retrieve credential data for all domain accounts. The article concludes that security controls must be evaluated through their trust relationships, not only as isolated components. It specifically warns that backward compatibility, identity bridging, and authentication delegation can create abuse paths even when individual systems are operating as designed.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article presents a technical narrative from an internal network penetration test that ended in full Active Directory compromise. The author states that the engagement was unusually difficult because typical privilege escalation paths were blocked by security controls or environmental conditions. The decisive path emerged from the intersection of legacy infrastructure and modern authentication infrastructure, specifically NIS, Duo Authentication Proxy, SQL Server, and Active Directory.\u003c/p\u003e\n\n\u003cp\u003eThe author emphasizes that the compromise was not caused by one isolated misconfiguration. Instead, multiple systems extended trust across boundaries in ways that created an attack chain. The final impact included creation of a new Domain Admin account and retrieval of credential data for all domain users through DCSync.\u003c/p\u003e\n\n\u003ch2 id=\"initial-foothold-through-apache-nifi\"\u003eInitial Foothold Through Apache NiFi\u003c/h2\u003e\n\n\u003cp\u003eAfter early reconnaissance produced limited results, the tester revisited scan data and inspected non-standard web ports. This led to the discovery of several Apache NiFi servers that did not require authentication. The tester initially looked for domain credentials in NiFi workflows and found password fields, but many were blank.\u003c/p\u003e\n\n\u003cp\u003eWhile attempting to retrieve cleartext values from NiFi workflow steps, the tester discovered that execution was unrestricted. A simple command confirmed root-level execution on the server. The tester then used an existing Metasploit module for Apache NiFi processor remote code execution and obtained a Meterpreter session running as root.\u003c/p\u003e\n\n\u003cp\u003eKey details from this stage include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApache NiFi was exposed internally without authentication.\u003c/li\u003e\n\u003cli\u003eNiFi workflow execution allowed unauthenticated remote command execution.\u003c/li\u003e\n\u003cli\u003eThe resulting shell ran as root.\u003c/li\u003e\n\u003cli\u003eThe tester used Metasploit and Meterpreter to validate and use the foothold.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"credentials-found-on-the-nifi-server\"\u003eCredentials Found on the NiFi Server\u003c/h2\u003e\n\n\u003cp\u003eOnce on the NiFi server, the tester searched user home directories and other local files. A \u003ccode\u003e.bash_history\u003c/code\u003e file contained cleartext credentials used in an \u003ccode\u003enpx cypress run\u003c/code\u003e command, including an analytics platform username and password. These credentials provided access to an analytics platform and a RangerKMS database.\u003c/p\u003e\n\n\u003cp\u003eThe tester later found domain credentials in \u003ccode\u003e/etc/fstab\u003c/code\u003e, where a CIFS mount included a username, password, and domain. Those credentials provided initial Active Directory access. However, the account did not allow immediate escalation, and the tester notes that multiple apparent paths were blocked, including an ADCS ESC1 scenario where CA servers were not resolvable.\u003c/p\u003e\n\n\u003ch2 id=\"nis-enumeration-and-password-hash-recovery\"\u003eNIS Enumeration and Password Hash Recovery\u003c/h2\u003e\n\n\u003cp\u003eThe tester observed entries in \u003ccode\u003e/etc/passwd\u003c/code\u003e with plus signs indicating users imported from a network source. Review of \u003ccode\u003e/etc/nsswitch.conf\u003c/code\u003e confirmed that Network Information Service was configured as a user database for items such as \u003ccode\u003epasswd\u003c/code\u003e, \u003ccode\u003eshadow\u003c/code\u003e, \u003ccode\u003erpc\u003c/code\u003e, and \u003ccode\u003eservices\u003c/code\u003e. The tester then used \u003ccode\u003eypwhich\u003c/code\u003e and \u003ccode\u003edomainname\u003c/code\u003e to identify the NIS server and NIS domain.\u003c/p\u003e\n\n\u003cp\u003eThe NIS server did not require authentication for user listing. By querying it with \u003ccode\u003eypcat\u003c/code\u003e, the tester retrieved usernames and MD5Crypt password hashes. The article notes that \u003ccode\u003egetent passwd\u003c/code\u003e on the client server also pulled this information.\u003c/p\u003e\n\n\u003cp\u003eThe tester identified that a head of IT account was among the recovered users. The relevant hash was cracked within minutes. The cracked password did not work for the user’s Active Directory account, but it was still useful elsewhere in the environment.\u003c/p\u003e\n\n\u003ch2 id=\"password-spraying-against-linux-servers\"\u003ePassword Spraying Against Linux Servers\u003c/h2\u003e\n\n\u003cp\u003eThe tester sprayed the cracked IT user password across SSH servers discovered on the network. This resulted in root access to 53 Linux servers. Because time was limited, the tester used Nmap reverse DNS lookups and hostnames to prioritize which systems to inspect.\u003c/p\u003e\n\n\u003cp\u003eA host with a name containing \u003ccode\u003eduoproxy\u003c/code\u003e stood out. This system became one of the most important pivots in the attack chain because it hosted Duo Authentication Proxy and sat in the authentication flow.\u003c/p\u003e\n\n\u003ch2 id=\"duo-authentication-proxy-exposure\"\u003eDuo Authentication Proxy Exposure\u003c/h2\u003e\n\n\u003cp\u003eOn the Duo proxy host, the tester inspected the standard Duo Authentication Proxy configuration location. The configuration file contained several sensitive values, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDuo integration details such as \u003ccode\u003eikey\u003c/code\u003e, \u003ccode\u003eskey\u003c/code\u003e, and \u003ccode\u003eapi_host\u003c/code\u003e values, with some values redacted in the article.\u003c/li\u003e\n\u003cli\u003eAn Active Directory service account username and password.\u003c/li\u003e\n\u003cli\u003eA RADIUS shared secret.\u003c/li\u003e\n\u003cli\u003eA RADIUS server configuration using \u003ccode\u003eradius_server_challenge\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003efailmode=safe\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe author states that the presence of both Active Directory service credentials and RADIUS shared secrets on one host showed that the system sat directly in the AD authentication flow. Process and log review confirmed that Duo Authentication Proxy was actively handling MFA traffic.\u003c/p\u003e\n\n\u003ch2 id=\"capturing-and-decrypting-authentication-traffic\"\u003eCapturing and Decrypting Authentication Traffic\u003c/h2\u003e\n\n\u003cp\u003eThe tester tailed the Duo Authentication Proxy logs and saw Active Directory authentication requests being sent to a domain controller. The tester then started a packet capture on the relevant network interface while monitoring authentication activity.\u003c/p\u003e\n\n\u003cp\u003eAfter exporting and analyzing the packet capture alongside the RADIUS shared secret found in the configuration file, the tester was able to decrypt authentication exchanges. This exposed cleartext credentials for authentication requests passing through the Duo Authentication Proxy.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central observation is that MFA was not bypassed in the usual sense. Instead, the MFA infrastructure itself became a credential exposure point because the proxy host contained secrets and handled authentication traffic.\u003c/p\u003e\n\n\u003ch2 id=\"developer-credentials-and-ci-cd-access\"\u003eDeveloper Credentials and CI/CD Access\u003c/h2\u003e\n\n\u003cp\u003eThe tester mapped captured accounts against Active Directory group memberships. None of the captured accounts had immediate privileged group membership, delegation rights, or a direct escalation path. However, one user associated with multiple development-related Active Directory groups stood out.\u003c/p\u003e\n\n\u003cp\u003eUsing that developer account, the tester revisited internal systems related to software delivery and build automation. The credentials provided administrative-level access to a JFrog instance, which the author notes could imply the ability to modify or poison build artifacts, although there was not enough time to explore that path further. The same credentials also provided access to a Jenkins environment and the Script Console.\u003c/p\u003e\n\n\u003cp\u003eThe tester retrieved stored secrets and environment variables from Jenkins. Despite this access, nothing immediately provided a path to Domain Admin.\u003c/p\u003e\n\n\u003ch2 id=\"sql-server-relay-and-domain-admin-service-account\"\u003eSQL Server Relay and Domain Admin Service Account\u003c/h2\u003e\n\n\u003cp\u003eThe tester then returned to basic enumeration and realized that the developer account likely had SQL Server access. This proved true, and the account exposed access to multiple SQL Server instances. The tester discovered that some SQL Server services were running as domain admin accounts.\u003c/p\u003e\n\n\u003cp\u003eUsing PowerUpSQL from a PowerShell terminal running as the developer user, the tester executed \u003ccode\u003exp_dirtree\u003c/code\u003e to coerce authentication from the underlying SQL Server service account. The tester then used \u003ccode\u003entlmrelayx\u003c/code\u003e with a target list of SQL endpoints. A target list was used because Extended Protection for Authentication was in place on some systems.\u003c/p\u003e\n\n\u003cp\u003eThe relay succeeded against a SQL Server as the \u003ccode\u003eDOMAIN\\sqlda\u003c/code\u003e domain user. The tester used PowerShell’s Active Directory module to confirm that this account was a member of Domain Admins.\u003c/p\u003e\n\n\u003ch2 id=\"domain-admin-creation-through-xp-cmdshell\"\u003eDomain Admin Creation Through xp_cmdshell\u003c/h2\u003e\n\n\u003cp\u003eWith a relayed SQL Server session established, the tester connected to SQL Server through \u003ccode\u003eimpacket-mssqlclient\u003c/code\u003e using proxychains and Windows authentication. The tester enabled \u003ccode\u003exp_cmdshell\u003c/code\u003e because stealth was not an objective in the engagement.\u003c/p\u003e\n\n\u003cp\u003eAfter enabling operating system command execution through SQL Server, the tester ran \u003ccode\u003ewhoami\u003c/code\u003e and confirmed execution as \u003ccode\u003eDOMAIN\\sqlda\u003c/code\u003e. The tester then used \u003ccode\u003enet user\u003c/code\u003e to create a new domain user and used \u003ccode\u003enet group \u0026quot;domain admins\u0026quot;\u003c/code\u003e to add that user to the Domain Admins group.\u003c/p\u003e\n\n\u003cp\u003eThis step converted the relayed SQL Server service account context into persistent domain-level administrative access.\u003c/p\u003e\n\n\u003ch2 id=\"dcsync-and-full-domain-credential-access\"\u003eDCSync and Full Domain Credential Access\u003c/h2\u003e\n\n\u003cp\u003eAfter creating a new Domain Admin user, the tester performed a DCSync operation from a PowerShell session running as the new privileged account. The command retrieved credential data for all domain accounts. The sample output in the article shows account details and an NT hash field.\u003c/p\u003e\n\n\u003cp\u003eThis confirmed full Active Directory compromise. The article presents this as the final validation of domain-level control.\u003c/p\u003e\n\n\u003ch2 id=\"affected-environment-and-parties\"\u003eAffected Environment and Parties\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a client environment from a penetration test, with all client identifiers, system names, domains, and sensitive details redacted or modified. The affected environment included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApache NiFi servers.\u003c/li\u003e\n\u003cli\u003eLinux servers using NIS.\u003c/li\u003e\n\u003cli\u003eA NIS server exposing user hashes.\u003c/li\u003e\n\u003cli\u003eDuo Authentication Proxy infrastructure.\u003c/li\u003e\n\u003cli\u003eActive Directory.\u003c/li\u003e\n\u003cli\u003eSQL Server instances.\u003c/li\u003e\n\u003cli\u003eJFrog.\u003c/li\u003e\n\u003cli\u003eJenkins.\u003c/li\u003e\n\u003cli\u003eHadoop-related systems and RangerKMS.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eNo named threat actor is described. The activity was performed by a penetration tester during an assessment.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eThe disclosed impact included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRoot-level command execution on an Apache NiFi server.\u003c/li\u003e\n\u003cli\u003eCleartext credential recovery from local files.\u003c/li\u003e\n\u003cli\u003eInitial Active Directory access.\u003c/li\u003e\n\u003cli\u003eRetrieval of NIS password hashes.\u003c/li\u003e\n\u003cli\u003eCracking of a privileged IT user’s NIS password hash.\u003c/li\u003e\n\u003cli\u003eRoot access to 53 Linux servers via SSH.\u003c/li\u003e\n\u003cli\u003eExposure of Duo Authentication Proxy configuration secrets.\u003c/li\u003e\n\u003cli\u003eDecryption of authentication exchanges through the Duo proxy.\u003c/li\u003e\n\u003cli\u003eAccess to CI/CD infrastructure including JFrog and Jenkins.\u003c/li\u003e\n\u003cli\u003eSuccessful relay of a Domain Admin SQL Server service account.\u003c/li\u003e\n\u003cli\u003eCreation of a new Domain Admin user.\u003c/li\u003e\n\u003cli\u003eDCSync retrieval of credential data for all domain accounts.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that the most important issue was the interaction between legacy systems and modern security controls. NIS, Duo Authentication Proxy, SQL Server service account design, and Active Directory each played a role in the final compromise. The author argues that MFA remains a strong control, but it must be evaluated in the context of the systems that handle, proxy, and delegate authentication.\u003c/p\u003e\n\n\u003cp\u003eThe broader lesson is that backward compatibility, identity bridging, and authentication delegation can create unexpected attack paths. Security controls that function as intended can still become part of the attack surface when their trust relationships are not assessed together.\u003c/p\u003e\n","keyPoints":["The tester found unauthenticated Apache NiFi servers and used unrestricted workflow execution to gain remote code execution as root.","Cleartext credentials in files on the compromised NiFi server provided initial Active Directory access, but common escalation paths such as ADCS abuse were blocked.","NIS configuration on the Linux host allowed unauthenticated user enumeration and returned MD5Crypt password hashes for multiple accounts, including a privileged IT user whose password was cracked.","The cracked IT user password provided SSH access to 53 Linux servers, including a Duo Authentication Proxy host that contained Active Directory service credentials and a RADIUS shared secret.","After capturing and decrypting authentication traffic through the Duo proxy, the tester used developer credentials and SQL Server relay activity to gain command execution as a Domain Admin service account and create a new Domain Admin user."],"insights":["MFA became a credential exposure point because the Duo Authentication Proxy had both RADIUS shared secrets and visibility into proxied authentication traffic, allowing decrypted authentication exchanges after packet capture.","The compromise path depended on interactions between systems rather than one standalone flaw, with legacy NIS, Linux access, Duo MFA infrastructure, CI/CD access, SQL Server, and Active Directory trust relationships chaining together.","The article highlights that valuable data access did not immediately translate into Active Directory privilege escalation, and the eventual domain compromise came from revisiting authentication and service-account flows rather than from the initially discovered credentials.","Running SQL Server services as Domain Admin accounts created a direct escalation path once authentication could be coerced and relayed, turning database access into domain-level command execution."],"referencedReports":[],"body":"\u003cp\u003eThe article describes an internal network penetration test in which the tester progressed from a constrained foothold to full Active Directory compromise. The core finding was not a single vulnerability, but a chain of trust relationships across Apache NiFi, Linux infrastructure, NIS, Duo Authentication Proxy, CI/CD systems, SQL Server, and Active Directory. The author emphasizes that modern controls such as MFA can become part of the attack surface when integrated with legacy infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe initial foothold came from unauthenticated Apache NiFi servers that allowed remote command execution as root. From there, the tester found cleartext credentials in files, obtained initial domain access, recovered MD5Crypt hashes from an unauthenticated NIS query, cracked a privileged IT user’s password, and used it to access many Linux servers. One of those servers hosted Duo Authentication Proxy and contained both Active Directory service credentials and a RADIUS shared secret.\u003c/p\u003e\n\n\u003cp\u003eThe tester captured authentication traffic on the Duo proxy and used the shared secret to decrypt authentication exchanges, exposing credentials for users passing through the MFA infrastructure. A developer account then enabled access to CI/CD systems and SQL Server instances, where a Domain Admin SQL service account was coerced and relayed. The tester ultimately enabled xp_cmdshell, created a new Domain Admin user, and performed a DCSync to retrieve credential data for all domain accounts.\u003c/p\u003e\n"},{"n":5,"title":"Oxford University discloses data breach after careers platform hack","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/oxford-university-discloses-data-breach-after-careerconnect-platform-hack/","time":"11:14","priority":"MAY READ","score":72,"tldr":"Oxford University disclosed a data breach after third-party provider Group GTI’s CareerConnect platform was hacked, exposing users’ names, email addresses, and encrypted passwords for non-SSO accounts. Oxford says its own systems were not compromised, but affected users may face phishing attempts.","briefOverview":"\u003cp\u003eOxford University disclosed a data breach after its third-party provider, Group GTI, informed the university that the CareerConnect career services platform had been compromised. CareerConnect is used by Oxford for career services and is also used by other UK educational organizations, including King’s College London and the University of Manchester. Oxford said the incident affected GTI’s third-party system and that there is no evidence university systems were compromised.\u003c/p\u003e\n\n\u003cp\u003eThe breach occurred on May 28, when attackers gained access to users’ first names, last names, email addresses, and encrypted passwords for users who do not sign in using Single Sign-On. Oxford said alumni, research staff, and employer users access CareerConnect with locally set passwords, which GTI invalidated. These users will be asked to reset their passwords the next time they sign in.\u003c/p\u003e\n\n\u003cp\u003eOxford said there is no evidence that course information, uploaded files, appointment information, or financial information were involved. GTI stated the breach appeared focused on gathering credentials, which may lead to phishing attempts. The university warned staff, students, and external CareerConnect users that they might be targeted by phishing or scam emails.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOxford University disclosed a new data breach after being notified by Group GTI, the third-party provider behind its CareerConnect career services platform. The platform is used by Oxford to run its careers service and is also used by other UK educational organizations, including King’s College London and the University of Manchester. Oxford said the incident was limited to GTI’s third-party system. The university stated there is no evidence that Oxford systems were compromised.\u003c/p\u003e\n\n\u003cp\u003eThe CareerConnect platform was breached on May 28. According to Oxford, attackers accessed users’ first names, last names, email addresses, and encrypted passwords for users who do not sign in using Single Sign-On. Alumni, research staff, and employer users access CareerConnect with passwords set locally on the platform. GTI invalidated those passwords and users will be asked to reset them the next time they sign in.\u003c/p\u003e\n\n\u003cp\u003eOxford said there is no evidence that course information, uploaded files, appointment information, or financial information were involved in the incident. The university also said GTI and Oxford found no evidence that students’ passwords or financial information were accessed. GTI stated that the breach appeared to be focused on gathering credentials. Oxford warned that this could lead to phishing attempts.\u003c/p\u003e\n\n\u003cp\u003eThe university advised staff, students, and external CareerConnect users that they might be targeted by phishing or scam emails. The article does not identify the attackers behind the CareerConnect breach. An Oxford University spokesperson was not immediately available when contacted by BleepingComputer for comment on the incident.\u003c/p\u003e\n\n\u003cp\u003eThis is the second data breach disclosed by Oxford University this year. Earlier in May, Oxford confirmed it was affected by the ShinyHunters breach of Instructure’s Canvas learning management system, which the university uses. In that earlier incident, Oxford said its systems were not compromised and that exposed data was limited to usernames, Canvas email addresses, messages exchanged between users on the platform, course names, and course enrolment information.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOxford University disclosed a new data breach after being informed by its third-party provider, Group GTI, that the CareerConnect career services platform had been compromised. CareerConnect is used by Oxford for its career services and is also used by other UK educational organizations, including King’s College London and the University of Manchester, to run institution-specific career hubs.\u003c/p\u003e\n\n\u003cp\u003eOxford described the incident as affecting GTI’s third-party system rather than Oxford’s own systems. The university said there is no evidence that university systems were compromised.\u003c/p\u003e\n\n\u003ch2 id=\"breach-details\"\u003eBreach Details\u003c/h2\u003e\n\n\u003cp\u003eOxford said the CareerConnect platform was breached on May 28. Attackers gained access to the following user data:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFirst names\u003c/li\u003e\n\u003cli\u003eLast names\u003c/li\u003e\n\u003cli\u003eEmail addresses\u003c/li\u003e\n\u003cli\u003eEncrypted passwords for users who do not sign in using Single Sign-On\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe university said alumni, research staff, and employer users access CareerConnect with passwords set locally on CareerConnect. Group GTI invalidated those passwords, and affected users will be asked to reset their passwords the next time they sign in.\u003c/p\u003e\n\n\u003ch2 id=\"data-not-found-to-be-involved\"\u003eData Not Found to Be Involved\u003c/h2\u003e\n\n\u003cp\u003eOxford said there is no evidence that several categories of data were involved in the incident. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCourse information\u003c/li\u003e\n\u003cli\u003eUploaded files\u003c/li\u003e\n\u003cli\u003eAppointment information\u003c/li\u003e\n\u003cli\u003eFinancial information\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe university also said GTI and Oxford found no evidence that students’ passwords or financial information were accessed.\u003c/p\u003e\n\n\u003ch2 id=\"stated-purpose-and-follow-on-risk\"\u003eStated Purpose and Follow-On Risk\u003c/h2\u003e\n\n\u003cp\u003eGTI stated that the breach appeared to be focused on gathering credentials. Oxford said this may lead to phishing attempts.\u003c/p\u003e\n\n\u003cp\u003eThe university warned staff, students, and external CareerConnect users that they might be targeted by phishing or scam emails after the incident.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-platform-context\"\u003eAffected Parties and Platform Context\u003c/h2\u003e\n\n\u003cp\u003eThe directly discussed affected platform is CareerConnect, operated by Group GTI and used by Oxford University. The article also notes that the same platform is used by other UK educational organizations, including King’s College London and the University of Manchester.\u003c/p\u003e\n\n\u003cp\u003eOxford is described as a collegiate research university comprising 43 autonomous colleges, with more than 26,000 students and over 5,900 research, teaching, and research support staff. It is also described as the oldest university in the English-speaking world.\u003c/p\u003e\n\n\u003ch2 id=\"response\"\u003eResponse\u003c/h2\u003e\n\n\u003cp\u003eGroup GTI invalidated locally set CareerConnect passwords for affected users. Users who access CareerConnect with local passwords will be prompted to reset them when they next sign in.\u003c/p\u003e\n\n\u003cp\u003eOxford stated that the incident affected only GTI’s third-party system and that there is no evidence of compromise of university systems. The university also issued warnings about possible phishing or scam emails.\u003c/p\u003e\n\n\u003ch2 id=\"relation-to-earlier-oxford-breach-disclosure\"\u003eRelation to Earlier Oxford Breach Disclosure\u003c/h2\u003e\n\n\u003cp\u003eThe article states that this is the second data breach disclosed by Oxford University this year. The earlier incident involved the ShinyHunters extortion gang’s breach of Instructure’s Canvas learning management system, which Oxford uses.\u003c/p\u003e\n\n\u003cp\u003eAfter the Canvas attack, the hackers claimed to have stolen 280 million records tied to students and staff from 8,809 colleges, school districts, and online education platforms worldwide. Instructure later reached an agreement with the cybercrime group, saying that the hackers returned the stolen data and provided shred logs confirming its destruction.\u003c/p\u003e\n\n\u003cp\u003eOxford confirmed it was one of the victims of the Canvas incident. In that case, Oxford said its systems were not compromised and that exposed data was limited to usernames, Canvas email addresses, messages exchanged between users on the platform, course names, and course enrolment information.\u003c/p\u003e\n\n\u003ch2 id=\"known-or-suspected-actors\"\u003eKnown or Suspected Actors\u003c/h2\u003e\n\n\u003cp\u003eThe article does not identify the attackers responsible for the CareerConnect breach. It only states that GTI characterized the breach as appearing focused on gathering credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article separately names ShinyHunters in connection with the earlier Instructure Canvas breach, not the CareerConnect incident.\u003c/p\u003e\n\n\u003ch2 id=\"additional-note\"\u003eAdditional Note\u003c/h2\u003e\n\n\u003cp\u003eBleepingComputer contacted an Oxford University spokesperson for comment on the CareerConnect data breach, but the spokesperson was not immediately available.\u003c/p\u003e\n","keyPoints":["Oxford University disclosed a data breach after third-party provider Group GTI informed it that the CareerConnect career services platform had been compromised.","Attackers breached the CareerConnect platform on May 28 and accessed users’ first names, last names, email addresses, and encrypted passwords for users who do not sign in using Single Sign-On.","Oxford University said there is no evidence that course information, uploaded files, appointment information, financial information, students’ passwords, or university systems were compromised.","Group GTI invalidated locally set CareerConnect passwords, and affected alumni, research staff, and employer users will be asked to reset their passwords when they next sign in.","Oxford University warned staff, students, and external CareerConnect users that they might be targeted by phishing or scam emails following the incident."],"insights":["The incident highlights a recurring third-party exposure pattern for Oxford, as both breaches disclosed this year involved external education technology platforms rather than Oxford’s own systems.","The impact appears different for Single Sign-On users versus users with locally set CareerConnect passwords, since only the latter group had encrypted passwords accessed and invalidated.","Because CareerConnect is used by other UK educational organizations including King’s College London and the University of Manchester, the compromised platform has relevance beyond Oxford’s own user base.","GTI’s statement that the breach appeared focused on gathering credentials makes phishing preparedness a concrete follow-up priority for affected CareerConnect users."],"referencedReports":[],"body":"\u003cp\u003eOxford University disclosed a data breach after its third-party provider, Group GTI, informed the university that the CareerConnect career services platform had been compromised. CareerConnect is used by Oxford for career services and is also used by other UK educational organizations, including King’s College London and the University of Manchester. Oxford said the incident affected GTI’s third-party system and that there is no evidence university systems were compromised.\u003c/p\u003e\n\n\u003cp\u003eThe breach occurred on May 28, when attackers gained access to users’ first names, last names, email addresses, and encrypted passwords for users who do not sign in using Single Sign-On. Oxford said alumni, research staff, and employer users access CareerConnect with locally set passwords, which GTI invalidated. These users will be asked to reset their passwords the next time they sign in.\u003c/p\u003e\n\n\u003cp\u003eOxford said there is no evidence that course information, uploaded files, appointment information, or financial information were involved. GTI stated the breach appeared focused on gathering credentials, which may lead to phishing attempts. The university warned staff, students, and external CareerConnect users that they might be targeted by phishing or scam emails.\u003c/p\u003e\n"},{"n":6,"title":"SoFi confirms third-party data breach at Hong Kong subsidiary","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/sofi-confirms-third-party-data-breach-at-hong-kong-subsidiary/","time":"21:55","priority":"MAY READ","score":72,"tldr":"SoFi Hong Kong confirmed a data breach after unauthorized access to a third-party vendor database containing customer information. The company is still investigating what data was exposed and is urging customers to watch for phishing, suspicious account activity, and to strengthen account security.","briefOverview":"\u003cp\u003eSoFi Hong Kong warned customers that it suffered a data breach after hackers gained unauthorized access to a database at a third-party vendor. The database contained customer information for SoFi Securities (Hong Kong) Limited. SoFi said it discovered the incident on April 30, 2026, after detecting unauthorized access via one of its vendors.\u003c/p\u003e\n\n\u003cp\u003eThe company said its investigation is ongoing and that it does not yet know the scope or impact of the incident. SoFi also said it does not yet know whether customers’ personal data was involved or which categories of data may have been exposed. A spokesperson confirmed the breach to BleepingComputer but declined to answer questions about the number of affected customers, possible extortion, or the identity of the vendor.\u003c/p\u003e\n\n\u003cp\u003eSoFi advised customers to remain alert for phishing attempts, suspicious communications, and unusual account activity. It recommended updating passwords, enabling two-factor authentication where possible, monitoring financial accounts, and avoiding links or attachments in unsolicited messages. The company said it has added safeguards and monitoring to affected accounts and may request additional verification for support contacts or account changes.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSoFi Hong Kong is notifying customers of a data breach involving unauthorized access to a third-party vendor database. The database contained customer information associated with SoFi Securities (Hong Kong) Limited. SoFi discovered the incident on April 30, 2026, after detecting unauthorized access via one of its vendors.\u003c/p\u003e\n\n\u003cp\u003eSoFi is a U.S.-based financial technology company that provides banking, investing, loans, and other personal finance services. Its Hong Kong operation provides investment and securities services to customers in the region. The incident specifically involves SoFi Hong Kong and a vendor database connected to SoFi Securities (Hong Kong) Limited.\u003c/p\u003e\n\n\u003cp\u003eIn its customer email, SoFi said it did not yet have complete information about the scope and impact of the incident. The company also said it did not yet know whether personal data was involved or which categories of personal data may have been affected. SoFi stated that it is actively reviewing the situation and taking extra precautions to keep accounts secure.\u003c/p\u003e\n\n\u003cp\u003eAfter discovering the incident, SoFi engaged a third-party cybersecurity firm to assist with its response. A SoFi spokesperson confirmed the breach to BleepingComputer but declined to answer additional questions. The company did not disclose how many customers were affected, whether it was extorted, or the identity of the third-party vendor.\u003c/p\u003e\n\n\u003cp\u003eSoFi warned customers to remain vigilant for phishing attempts, suspicious communications, and unusual account activity. It advised customers to update passwords, enable two-factor authentication where possible, monitor financial accounts, and avoid opening links or attachments in unsolicited emails or messages. The company also said it added safeguards and monitoring to affected accounts and may request additional verification when customers contact support or make account changes.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSoFi Hong Kong confirmed a data breach involving unauthorized access to a database maintained through a third-party vendor. The affected database contained customer information for SoFi Securities (Hong Kong) Limited. SoFi said it discovered the incident on April 30, 2026, after detecting unauthorized access to the database via one of its vendors.\u003c/p\u003e\n\n\u003cp\u003eSoFi is described in the article as a U.S.-based financial technology company offering banking, investing, loans, and other personal finance services. The company also operates SoFi Hong Kong, which provides investment and securities services to customers in the region.\u003c/p\u003e\n\n\u003ch2 id=\"what-sofi-disclosed\"\u003eWhat SoFi Disclosed\u003c/h2\u003e\n\n\u003cp\u003eIn emails sent to customers and shared with BleepingComputer, SoFi said it detected unauthorized access to a database of SoFi Securities (Hong Kong) Limited through one of its vendors. The company said it engaged a third-party cybersecurity firm after discovering the incident.\u003c/p\u003e\n\n\u003cp\u003eSoFi told customers that its investigation remains ongoing. It said it does not yet have complete information about the scope or impact of the incident. It also said it does not yet know whether customers’ personal data was involved or, if it was, which categories of personal data may have been affected.\u003c/p\u003e\n\n\u003cp\u003eThe customer email stated: “We do not yet have complete information about the scope and impact of the incident, or whether (and, if so, which categories of) your personal data was i
