<script type="application/json" id="dl-articles">[{"n":1,"title":"Modern Malware — Spyware Skills, Hijacked Base URLs, and 1,230+ Leaking API Keys in AI Instruction Files","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/malware-in-ai-instruction-files-skillgate","time":"04:00","priority":"SHOULD READ","score":84,"tldr":"Mitiga Labs found that AI agent instruction files are becoming a malware-like supply-chain risk, with real-world cases of prompt exfiltration, Claude traffic hijacking via base URL overrides, unsafe permission defaults, and over 1,230 exposed API keys. The company released Skillgate, a free scanner to detect risky or malicious AI skills, hooks, MCP configs, and related agent files before agents trust and execute them.","briefOverview":"\u003cp\u003eMitiga Labs investigated AI instruction files over six months, including Cursor rules, Anthropic Skills, Claude Hooks, AGENTS.md and CLAUDE.md files, MCP server configs, package.json droppers, and hidden bytecode artifacts. The company says it found prompt-exfiltration tradecraft in the wild, attacker-controlled ANTHROPIC_BASE_URL overrides routing Claude traffic through man-in-the-middle proxies, permission-bypass defaults, and more than 1,230 hardcoded API keys and JWT tokens. Mitiga Labs released Skillgate, a free scanner built during the research to detect risks in AI agent skills and configurations.\u003c/p\u003e\n\n\u003cp\u003eThe article frames malicious instruction files as “modern-day malware” because AI agents read and follow them with near-zero validation and high trust. Mitiga Labs says a legitimate-looking GitHub repository with pre-staged instructions can deliver an attack chain involving npm install, an injected project path, a Claude Hook firing a dropper, and Skills invoked on a heartbeat cadence. The reported risks include supply-chain compromise, unauthorized access through MITM proxying, and stolen credentials.\u003c/p\u003e\n\n\u003cp\u003eSkillgate currently scans multiple AI-agent file types and has processed more than 50,000 files across over 7,000 public repositories. Its more than 80 detection rules cover direct execution, prompt manipulation, tool and MCP server poisoning, supply-chain and distribution attacks, obfuscation and evasion, and credential exposure and data exfiltration. Mitiga Labs recommends scanning instruction files before committing them or letting AI agents ingest them, and blocking merges for high-risk findings until human review.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMitiga Labs published research on security risks in AI agent instruction files and released Skillgate, a free scanner for AI skills, hooks, MCP configurations, and related files. Over six months, the company examined Cursor rules, Anthropic Skills, Claude Hooks, AGENTS.md and CLAUDE.md context files, MCP server configs, supply-chain droppers, and bytecode artifacts. The research found prompt-exfiltration tradecraft in the wild, attacker-controlled ANTHROPIC_BASE_URL overrides, permission-bypass overrides, and more than 1,230 hardcoded API keys and JWT tokens.\u003c/p\u003e\n\n\u003cp\u003eThe article says AI agents follow instruction files with near-zero validation and full trust, making these files a high-risk supply-chain surface. Mitiga Labs describes a strong observed attack chain that begins with npm install, injects an approved project path, has a developer launch the AI inside that project, triggers a Claude Hook to fire a dropper, and uses Skills on a heartbeat cadence. Each Skill can chain to the next to pull a fresh dropper or execute an operator objective.\u003c/p\u003e\n\n\u003cp\u003eMitiga Labs built two paired tools during the research: Skillforge and Skillgate. Skillforge is an internal web application that forges malicious skills based on public research, red-team work, and adversarial behavior mapped to MITRE ATT\u0026amp;CK and adjacent frameworks. Skillgate is the public scanner that detects those techniques, with rules informed by internal research, Skillforge-generated examples, public research, and incidents observed in the wild.\u003c/p\u003e\n\n\u003cp\u003eSkillgate has scanned more than 50,000 files across over 7,000 distinct public repositories from GitHub, arXiv-referenced samples, and Skillforge-generated adversarial inputs. It includes more than 80 detection rules across families such as direct execution and configuration abuse, prompt manipulation and instruction subversion, tool and MCP server poisoning, supply-chain and distribution attacks, obfuscation and evasion, and credential exposure and data exfiltration. It also uses the Gator Agent, an LLM-based reviewer that performs a second pass on flagged artifacts.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights several in-the-wild risk patterns, including prompt exfiltration, external URL fetch-and-execute permissions, hardcoded IP addresses as MCP endpoints, YOLO mode paired with ANTHROPIC_BASE_URL overrides, public service bindings to 0.0.0.0 paired with hardcoded Postgres credentials, and exposed provider keys. Mitiga Labs says manually verified findings came from roles including DevOps engineers, researchers, AI engineers, full-stack developers, founders, CEOs, PhD students, and product or project managers. The company states it did not access, use, authenticate with, weaponize, propagate, or test discovered credentials or tradecraft.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMitiga Labs published research on risks in AI agent instruction files and released Skillgate, a free scanner for detecting risky or malicious patterns in AI skills and configurations. The research covered a six-month investigation into files that AI agents and coding assistants read and trust, including Cursor rules, Anthropic Skills, Claude Hooks, AGENTS.md and CLAUDE.md files, MCP server configs, package.json droppers, and hidden bytecode artifacts.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central claim is that instruction files can function like malware because the agent follows them automatically, often with near-zero validation. Mitiga Labs says it found prompt-exfiltration tradecraft in the wild, attacker-controlled ANTHROPIC_BASE_URL overrides routing Claude traffic through man-in-the-middle proxies, permission-bypass defaults, and more than 1,230 hardcoded API keys and JWT tokens.\u003c/p\u003e\n\n\u003ch2 id=\"instruction-file-surface\"\u003eInstruction File Surface\u003c/h2\u003e\n\n\u003cp\u003eMitiga Labs mapped several categories of AI-agent instruction and configuration files that it says matter to modern coding assistants and agents:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSkills, such as MD files that provide task-specific context and instructions.\u003c/li\u003e\n\u003cli\u003eClaude Hooks, which are JSON-defined bash commands fired on Claude Code triggers.\u003c/li\u003e\n\u003cli\u003eAgent brain files such as AGENTS.md and CLAUDE.md.\u003c/li\u003e\n\u003cli\u003eMCP server configs, including settings.json or mcp.json blocks.\u003c/li\u003e\n\u003cli\u003eAgentic rules and tool configs such as .cursorrules, aider YAML, opencode, Continue, and equivalents.\u003c/li\u003e\n\u003cli\u003eSupply-chain droppers such as package.json files placed in an agent’s working directory.\u003c/li\u003e\n\u003cli\u003ePoisoned bytecode such as .pyc files hidden inside agent-tool directories.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the list of relevant instruction-file types continues to grow.\u003c/p\u003e\n\n\u003ch2 id=\"research-objective-and-attack-chain\"\u003eResearch Objective and Attack Chain\u003c/h2\u003e\n\n\u003cp\u003eMitiga Labs says its earlier research showed that AI agents follow these files with near-zero validation and full trust. The article states that a legitimate-looking GitHub repository with instructions already staged is the easiest delivery vector demonstrated in its recent work.\u003c/p\u003e\n\n\u003cp\u003eThe strongest chain described in the article combines several steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn npm install occurs.\u003c/li\u003e\n\u003cli\u003eAn approved project path is injected.\u003c/li\u003e\n\u003cli\u003eThe developer launches the AI inside that project.\u003c/li\u003e\n\u003cli\u003eA Claude Hook fires a dropper.\u003c/li\u003e\n\u003cli\u003eA Skill is invoked on a heartbeat cadence.\u003c/li\u003e\n\u003cli\u003eEach Skill can chain to the next to pull a fresh dropper or execute the operator’s objective.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMitiga Labs presents this as a path from npm install to persistent AI agent compromise.\u003c/p\u003e\n\n\u003ch2 id=\"skillforge-and-skillgate\"\u003eSkillforge and Skillgate\u003c/h2\u003e\n\n\u003cp\u003eThe article describes two paired tools developed during the research.\u003c/p\u003e\n\n\u003cp\u003eSkillforge is an internal Mitiga Labs web application that forges malicious skills. It is built from public research, Mitiga’s red-team work, and adversarial behavior mapped on MITRE ATT\u0026amp;CK and adjacent frameworks.\u003c/p\u003e\n\n\u003cp\u003eSkillgate is the community-facing scanner released by Mitiga Labs. It detects malicious or risky techniques inside skills and other instruction files. Its rule set is fed by internal research, Skillforge-generated samples, public research, and incidents observed in the wild.\u003c/p\u003e\n\n\u003cp\u003eMitiga Labs says the two systems operate as a closed learning loop in which adversarial skills are generated, scanned, and used to improve Skillgate’s detection rules. The article says this cycle has run on a near-daily basis for four to five months.\u003c/p\u003e\n\n\u003ch2 id=\"skillgate-capabilities\"\u003eSkillgate Capabilities\u003c/h2\u003e\n\n\u003cp\u003eAccording to the article, Skillgate currently provides simultaneous scanning across skills, hooks, agent brain files, MCP configs, agentic rules, supply-chain droppers, and bytecode artifacts. It has scanned more than 50,000 files across more than 7,000 distinct public repositories.\u003c/p\u003e\n\n\u003cp\u003eThe scanned corpus came from GitHub, arXiv-referenced samples, and Skillforge-generated adversarial inputs. Skillgate contains more than 80 detection rules organized into technique families. It also includes the Gator Agent, an LLM-based reviewer that runs a second pass on flagged artifacts and was iterated against thousands of real and synthetic samples.\u003c/p\u003e\n\n\u003ch2 id=\"detection-technique-families\"\u003eDetection Technique Families\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several technique families covered by Skillgate:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDirect execution and configuration abuse, including shell commands in hooks, dangerous settings toggles, permission-escalation patterns, and supply-chain droppers.\u003c/li\u003e\n\u003cli\u003ePrompt manipulation and instruction subversion, including prompt injection, jailbreaks, trigger phrases, instruction overrides, prompt leakage, and prompt exfiltration.\u003c/li\u003e\n\u003cli\u003eTool and MCP server poisoning, targeting the agent’s tool layer.\u003c/li\u003e\n\u003cli\u003eSupply-chain and distribution attacks, including poisoned bytecode, external-binary indirection, npm post-install droppers, and configurations that add untrusted sources.\u003c/li\u003e\n\u003cli\u003eObfuscation and evasion, including Unicode tricks, homoglyph substitutions, encoding chains, and steganography.\u003c/li\u003e\n\u003cli\u003eCredential exposure and data exfiltration, including hardcoded provider keys, secret leakage through logging or telemetry-shaped instructions, file-system exfiltration patterns, and instructions to send data somewhere it should not go.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMitiga Labs says each rule is documented in the platform and backed by at least one public CVE, named research disclosure, Skillforge-generated synthetic sample, or artifact captured in the wild.\u003c/p\u003e\n\n\u003ch2 id=\"in-the-wild-findings\"\u003eIn-the-Wild Findings\u003c/h2\u003e\n\n\u003ch3 id=\"prompt-exfiltration\"\u003ePrompt Exfiltration\u003c/h3\u003e\n\n\u003cp\u003eMitiga Labs identifies prompt exfiltration as one of the most consequential classes it tracks. The article describes it as a malicious instruction file telling the agent to capture the developer’s prompts and quietly send them to an operator-controlled endpoint.\u003c/p\u003e\n\n\u003cp\u003eMitiga Labs says it caught a live instance of this technique in the wild, but it is holding the full breakdown for a dedicated report. The article states that Skillgate already detects the technique class.\u003c/p\u003e\n\n\u003ch3 id=\"supply-chain-trust-through-external-urls\"\u003eSupply-Chain Trust Through External URLs\u003c/h3\u003e\n\n\u003cp\u003eThe article shows Skillgate detecting a file that grants an agent permission to use cURL against an external address. Mitiga Labs says a dependency may be benign at the time of review, but a configuration that allows the agent to fetch and execute content from a URL can become an arbitrary code-execution primitive if that URL is compromised or controlled by an untrusted operator.\u003c/p\u003e\n\n\u003ch3 id=\"mcp-proxying-via-hardcoded-ip-addresses\"\u003eMCP Proxying via Hardcoded IP Addresses\u003c/h3\u003e\n\n\u003cp\u003eMitiga Labs shows Skillgate flagging an MCP server endpoint set to a hardcoded IP address. The article presents this as a sign of possible man-in-the-middle proxying.\u003c/p\u003e\n\n\u003ch3 id=\"yolo-mode-and-anthropic-base-url-overrides\"\u003eYOLO Mode and ANTHROPIC_BASE_URL Overrides\u003c/h3\u003e\n\n\u003cp\u003eThe article highlights a configuration pairing YOLO mode with an ANTHROPIC_BASE_URL override. Mitiga Labs says the issue is not Anthropic’s own endpoint, but rather that the override can redirect all Claude API traffic from the developer’s machine through a third-party host.\u003c/p\u003e\n\n\u003cp\u003eThe article states that such a third-party host would be positioned to log, replay, or modify every conversation. It also shows Skillgate detections for change modification being permitted, PowerShell execution, and policy bypass in a SKILL.md file.\u003c/p\u003e\n\n\u003ch2 id=\"affected-roles-and-environments\"\u003eAffected Roles and Environments\u003c/h2\u003e\n\n\u003cp\u003eMitiga Labs says AI coding assistants have made many roles into part-time developers, increasing the threat surface beyond traditional software engineering teams. The article says manually verified in-the-wild findings came from roles including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDevOps engineers at security companies.\u003c/li\u003e\n\u003cli\u003eResearchers at data-platform companies.\u003c/li\u003e\n\u003cli\u003eAI engineers at web3 startups.\u003c/li\u003e\n\u003cli\u003eFull-stack developers at fintech companies.\u003c/li\u003e\n\u003cli\u003eFounders and CEOs of marketing platforms.\u003c/li\u003e\n\u003cli\u003ePhD students in data-related programs.\u003c/li\u003e\n\u003cli\u003eProject and product managers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article divides verified findings into two broad patterns: AI configuring infrastructure and AI configuring environment.\u003c/p\u003e\n\n\u003ch2 id=\"infrastructure-and-environment-configuration-risks\"\u003eInfrastructure and Environment Configuration Risks\u003c/h2\u003e\n\n\u003cp\u003eFor infrastructure configuration, Mitiga Labs shows Skillgate flagging a service bound to 0.0.0.0 alongside hardcoded Postgres credentials. The article states that pairing these creates a compromise primitive consisting of a publicly bound service plus a credential pair, gated only by an inbound firewall rule.\u003c/p\u003e\n\n\u003cp\u003eFor environment configuration, the article shows Skillgate flagging hardcoded provider API keys exposed in AI-agent configuration files. Provider categories mentioned include Anthropic Claude, OpenAI, Google Gemini, xAI Grok, Chinese-vendor models including MiniMax and DeepSeek, Context7, Databricks, Supabase, Vercel, YouTube, Langsmith, and Google Cloud Storage signed URLs and bucket API keys.\u003c/p\u003e\n\n\u003cp\u003eMitiga Labs notes that flipping a repository to private after exposure is not enough because public mirrors and code-search indexes may already have cached the commits and embedded tokens. The article recommends rotating every applicable key, auditing for unauthorized use, and then addressing repository visibility.\u003c/p\u003e\n\n\u003cp\u003eMitiga Labs states that it did not access, use, or attempt to authenticate with any discovered credential and treated all keys as in scope only for responsible disclosure.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-blast-radius\"\u003eImpact and Blast Radius\u003c/h2\u003e\n\n\u003cp\u003eThe article says Mitiga Labs did not weaponize, propagate, or test any discovered tradecraft. Based on what it observed, it ranks realistic impact as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSupply-chain compromise, described as the highest-value outcome for an adversary because a poisoned instruction file inside a popular agent template can reach every developer who clones it.\u003c/li\u003e\n\u003cli\u003eUnauthorized access through MITM proxying, based on observed base-URL overrides and IP-pinned MCP endpoints.\u003c/li\u003e\n\u003cli\u003eStolen credentials, with potential direct financial impact through provider wallet abuse and direct data impact through ingested data or tenant access.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMitiga Labs characterizes these as early outcomes in a broader emerging era.\u003c/p\u003e\n\n\u003ch2 id=\"methodology-and-limits\"\u003eMethodology and Limits\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the corpus included more than 50,000 instruction files across more than 7,000 distinct public repositories scanned from April to June 2026. Sources included public GitHub repositories containing recognized instruction-file patterns, arXiv-referenced skill samples, and Skillforge-generated adversarial inputs.\u003c/p\u003e\n\n\u003cp\u003eMitiga Labs says every in-the-wild finding cited in the article was manually triaged by the Gator Agent and a human reviewer. It also states that raw scanner output is not published as a finding.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that Skillgate flags configurations that are risky in context, and some YOLO-mode or cURL-allowlist findings may be intentional choices in trusted environments. It advises readers to treat each flag as requiring review rather than as proof of malware.\u003c/p\u003e\n\n\u003cp\u003eMitiga Labs says it did not measure actual exploitation, did not honeypot, contact, or test operator infrastructure, and went no further than identifying repository owners for disclosure.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-workflow\"\u003eRecommended Workflow\u003c/h2\u003e\n\n\u003cp\u003eMitiga Labs recommends that teams using AI-agent instruction files take several steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRun Skillgate against instruction-file paths added to source control, including .cursorrules, .claude/, CLAUDE.md, AGENTS.md, .continue/, mcp.json, and post-install scripts in the agent’s working directory.\u003c/li\u003e\n\u003cli\u003eBlock merges if Skillgate raises findings in the Direct Execution, Tool and MCP Poisoning, or Credential Exposure families until a human reviewer signs off.\u003c/li\u003e\n\u003cli\u003eRe-scan on every model or agent upgrade because new runtime permissions may ship quickly.\u003c/li\u003e\n\u003cli\u003eFor external repositories, run Skillgate before cloning or opening the files in an editor.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that Skillgate is free at skillgate.mitiga.ai and that public scans can be browsed anonymously, while submitting a skill or repository for scanning requires a free account.\u003c/p\u003e\n","keyPoints":["Mitiga Labs investigated AI instruction files over six months and found prompt-exfiltration tradecraft, attacker-controlled ANTHROPIC_BASE_URL overrides, permission-bypass defaults, and more than 1,230 hardcoded API keys and JWT tokens.","The research covered AI agent artifacts including Cursor rules, Anthropic Skills, Claude Hooks, AGENTS.md and CLAUDE.md files, MCP server configurations, package.json droppers, and hidden .pyc bytecode files.","Mitiga Labs released Skillgate, a free scanner that detects risky techniques across skills, hooks, agent brain files, MCP configurations, agentic rules, supply-chain droppers, and bytecode artifacts.","Skillgate has scanned over 50,000 files across more than 7,000 public repositories and currently includes over 80 detection rules organized into technique families such as direct execution, prompt manipulation, MCP server poisoning, supply-chain attacks, obfuscation, and credential exposure.","Mitiga Labs said it manually verified in-the-wild findings, did not access or authenticate with discovered credentials, and recommends scanning AI instruction files before agents ingest them or before external repositories are cloned."],"insights":["AI agent compromise can occur without traditional malware because a malicious instruction file can make the trusted agent itself capture prompts, read files, or send data externally.","A base-URL override such as ANTHROPIC_BASE_URL can turn a normal Claude configuration into a man-in-the-middle risk by routing all Claude API traffic through a third-party host.","Repository privacy changes are insufficient after secrets are exposed because public mirrors and code-search indexes may already have cached the commits and embedded tokens.","Risky AI-agent configurations are not limited to software engineers, as Mitiga manually verified findings tied to roles including founders, CEOs, product managers, researchers, and PhD students.","A benign dependency can still create a supply-chain execution risk when an agent is granted standing permission to fetch and execute content from an external URL controlled by someone else."],"referencedReports":[],"body":"\u003cp\u003eMitiga Labs investigated AI instruction files over six months, including Cursor rules, Anthropic Skills, Claude Hooks, AGENTS.md and CLAUDE.md files, MCP server configs, package.json droppers, and hidden bytecode artifacts. The company says it found prompt-exfiltration tradecraft in the wild, attacker-controlled ANTHROPIC_BASE_URL overrides routing Claude traffic through man-in-the-middle proxies, permission-bypass defaults, and more than 1,230 hardcoded API keys and JWT tokens. Mitiga Labs released Skillgate, a free scanner built during the research to detect risks in AI agent skills and configurations.\u003c/p\u003e\n\n\u003cp\u003eThe article frames malicious instruction files as “modern-day malware” because AI agents read and follow them with near-zero validation and high trust. Mitiga Labs says a legitimate-looking GitHub repository with pre-staged instructions can deliver an attack chain involving npm install, an injected project path, a Claude Hook firing a dropper, and Skills invoked on a heartbeat cadence. The reported risks include supply-chain compromise, unauthorized access through MITM proxying, and stolen credentials.\u003c/p\u003e\n\n\u003cp\u003eSkillgate currently scans multiple AI-agent file types and has processed more than 50,000 files across over 7,000 public repositories. Its more than 80 detection rules cover direct execution, prompt manipulation, tool and MCP server poisoning, supply-chain and distribution attacks, obfuscation and evasion, and credential exposure and data exfiltration. Mitiga Labs recommends scanning instruction files before committing them or letting AI agents ingest them, and blocking merges for high-risk findings until human review.\u003c/p\u003e\n"}]</script>
