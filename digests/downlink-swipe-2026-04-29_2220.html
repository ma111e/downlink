<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }

<script>
window.__DL_ARTICLES = [{"n":1,"title":"US, China partner on scam center takedown in Dubai","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/us-china-partner-on-dubai-scam-compound-takedown","time":"20:51","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"US and Chinese law enforcement successfully coordinated raids on nine cryptocurrency scam centers in Dubai, resulting in 276 arrests and the disruption of major pig-butchering fraud operations.","briefOverview":"\u003cp\u003eUS and Chinese law enforcement agencies successfully conducted a joint operation targeting cryptocurrency investment fraud. The raid targeted nine scam centers in Dubai and resulted in 276 arrests. Federal agents initiated the investigation after receiving numerous complaints from US victims who lost millions. With assistance from Meta, investigators traced the fraudulent schemes back to the Middle East. Four individuals now face federal fraud and money laundering charges for operating front companies that facilitated pig-butchering schemes. The coordinated effort highlights the growing international cooperation required to dismantle transnational cybercrime networks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eUS and Chinese law enforcement agencies executed a joint raid on nine cryptocurrency scam centers in Dubai, resulting in 276 arrests. The Justice Department revealed that the operation began last year following numerous victim complaints to the FBI. These US victims lost millions through cryptocurrency investment fraud schemes. Federal agents utilized financial data and cryptocurrency records provided by Meta to trace the illicit activities back to Dubai. Prosecutors have announced federal fraud and money laundering charges against four individuals, including Burmese national Thet Min Nyi and three Indonesian nationals. Thet Min Nyi allegedly managed a front company called Ko Thet Company, while the others ran Sanduo Group and Giant Company. All three organizations were used to conduct pig-butchering schemes involving fake investment opportunities. Wiliang Awang was arrested in Thailand by the Royal Thai Police, while Dubai Police conducted the coordinated raid that captured the others. The DOJ did not provide further details regarding the status of the 276 individuals arrested in Dubai. Scam centers across Asia are typically fueled by human trafficking and staffed by people held against their will. U.S. Attorney Adam Gordon noted that the scammers believed they were safe far from American jurisdiction. This Dubai operation follows accusations that Beijing uses recent takedowns to deepen its control over Southeast Asian nations. Experts have highlighted explicit coordination and financial commingling between Chinese state-backed investment projects and scam centers. The vast majority of these facilities are controlled by Chinese gangs. The DOJ-led Scam Center Strike Force has outlined additional law enforcement actions for 2026 to address cyber scams. These fraudulent schemes siphoned $16 billion from Americans last year. Ongoing sanctions and raids continue to create chaotic scenes across Southeast Asia as operators shut down and reopen their facilities.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"operation-overview\"\u003eOperation Overview\u003c/h3\u003e\n\n\u003cp\u003eUS and Chinese law enforcement agencies executed a coordinated raid on nine cryptocurrency scam centers in Dubai. The operation resulted in 276 arrests across multiple facilities. Federal agents initiated the investigation following numerous complaints from US victims who lost millions through cryptocurrency investment fraud.\u003c/p\u003e\n\n\u003ch3 id=\"evidence-and-investigation\"\u003eEvidence and Investigation\u003c/h3\u003e\n\n\u003cp\u003eInvestigators utilized financial data and cryptocurrency records provided by Meta to trace the illicit schemes. This digital trail led federal agents directly back to Dubai. The Justice Department confirmed that the operation began last year after sustained victim reports reached the FBI.\u003c/p\u003e\n\n\u003ch3 id=\"charges-and-key-figures\"\u003eCharges and Key Figures\u003c/h3\u003e\n\n\u003cp\u003eProsecutors have filed federal fraud and money laundering charges against four primary suspects. The investigation targeted the following key operators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThet Min Nyi, a 27-year-old Burmese national who managed the front company Ko Thet Company.\u003c/li\u003e\n\u003cli\u003eWiliang Awang, Andreas Chandra, and Lisa Mariam, who ran Sanduo Group and Giant Company.\nAll three organizations facilitated pig-butchering schemes centered on fake investment opportunities. Wiliang Awang was apprehended in Thailand by the Royal Thai Police. The Dubai Police Department executed the coordinated raid that secured the remaining arrests.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"broader-context-and-regional-impact\"\u003eBroader Context and Regional Impact\u003c/h3\u003e\n\n\u003cp\u003eThe DOJ has not elaborated on the current status of the 276 individuals arrested in Dubai. Industry reports indicate that scam centers across Asia are heavily fueled by human trafficking. These facilities are often staffed by individuals who are held against their will. U.S. Attorney Adam Gordon emphasized that the operators believed they were protected by distance from American jurisdictions. This Dubai coordination follows recent accusations that Beijing leverages scam center takedowns to expand its political control over Southeast Asian countries like Cambodia, Laos, and Myanmar. Government experts have documented explicit coordination and financial commingling between Chinese state-backed investment projects and these scam centers. The vast majority of these facilities remain under the control of Chinese criminal gangs.\u003c/p\u003e\n\n\u003ch3 id=\"future-enforcement-actions\"\u003eFuture Enforcement Actions\u003c/h3\u003e\n\n\u003cp\u003eThe DOJ-led Scam Center Strike Force has announced a comprehensive array of law enforcement actions scheduled for 2026. These measures aim to directly address the cyber scam epidemic that siphoned $16 billion from Americans last year. Ongoing sanctions, arrests, and raids are currently generating chaotic scenes across Southeast Asia. Criminal networks are rapidly shutting down their operations and reopening in new locations to evade law enforcement.\u003c/p\u003e\n","keyPoints":["US and Chinese law enforcement agencies conducted a joint operation that raided nine cryptocurrency scam centers in Dubai and resulted in 276 arrests.","Federal agents used financial data and cryptocurrency records provided by Meta to trace investment fraud schemes back to the Dubai locations.","Four individuals face federal fraud and money laundering charges for operating front companies that facilitated pig-butchering investment schemes.","The DOJ-led Scam Center Strike Force announced ongoing law enforcement actions in 2026 to combat cyber scams that extracted $16 billion from Americans last year.","Coordinated raids and sanctions across Southeast Asia have triggered chaotic scenes as scam centers frequently shut down and reopen."],"insights":["Social media platform Meta provided financial data and cryptocurrency records that enabled federal agents to trace investment fraud schemes directly back to Dubai locations.","Scam centers across Southeast Asia are rapidly shutting down and reopening following enforcement actions, indicating that criminal networks maintain operational continuity through decentralized relocation.","Financial commingling exists between Chinese state-backed investment projects and scam centers, revealing how legitimate economic infrastructure may be used to support cybercrime operations.","Law enforcement operations spanned multiple international jurisdictions, with arrests coordinated between Thai police and Dubai police, underscoring the necessity of synchronized cross-border task forces."],"referencedReports":[],"body":"\u003cp\u003eUS and Chinese law enforcement agencies successfully conducted a joint operation targeting cryptocurrency investment fraud. The raid targeted nine scam centers in Dubai and resulted in 276 arrests. Federal agents initiated the investigation after receiving numerous complaints from US victims who lost millions. With assistance from Meta, investigators traced the fraudulent schemes back to the Middle East. Four individuals now face federal fraud and money laundering charges for operating front companies that facilitated pig-butchering schemes. The coordinated effort highlights the growing international cooperation required to dismantle transnational cybercrime networks.\u003c/p\u003e\n"},{"n":2,"title":"Hackers exploit RCE flaws in Qinglong task scheduler for cryptomining","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/hackers-exploit-rce-flaws-in-qinglong-task-scheduler-for-cryptomining/","time":"20:50","priority":"SHOULD READ","score":82,"group":null,"groupColor":null,"tldr":"Hackers are exploiting two authentication bypass vulnerabilities in the Qinglong task scheduler to achieve remote code execution and deploy cryptominers on affected servers. The flaws stem from a mismatch between the middleware's authorization logic and Express.js routing behavior, prompting an urgent recommendation to update to the patched version.","briefOverview":"\u003cp\u003eHackers have been exploiting two authentication bypass vulnerabilities in the Qinglong open-source task scheduler to deploy cryptominers on developers\u0026rsquo; servers. The attacks began in early February and target publicly exposed installations of the platform. Researchers at Snyk identified that the vulnerabilities stem from a mismatch between the application\u0026rsquo;s middleware authorization logic and Express.js routing behavior. Specifically, a misconfigured rewrite rule exposes protected admin endpoints, while a case-sensitivity discrepancy allows attackers to bypass authentication checks. Once inside, threat actors inject shell commands to download and execute miner binaries disguised as a legitimate \u0026ldquo;Full GC\u0026rdquo; process. The initial response from Qinglong maintainers included an insufficient mitigation that only addressed command injection patterns. The effective fix was eventually released in pull request #2941, which corrected the underlying authentication bypass in the middleware. Organizations running Qinglong are advised to apply the latest updates immediately to prevent unauthorized cryptomining.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eHackers are actively exploiting two authentication bypass vulnerabilities in the Qinglong open-source task scheduling tool to deploy cryptominers on compromised servers. Exploitation activity began in early February, preceding the public disclosure of the security issues at the end of the month. Qinglong is a self-hosted time management platform that holds significant popularity among Chinese developers, boasting over 19,000 GitHub stars and more than 3,200 forks.\u003c/p\u003e\n\n\u003cp\u003eThe two critical flaws impact versions 2.20.1 and older and can be chained to achieve remote code execution. The first issue, CVE-2026-3965, involves a misconfigured rewrite rule that maps requests to \u003ccode\u003e/open/*\u003c/code\u003e directly to \u003ccode\u003e/api/*\u003c/code\u003e, unintentionally exposing protected administrative endpoints. The second flaw, CVE-2026-4047, arises because the authentication check treats paths as case-sensitive while the router matches them case-insensitively. This discrepancy allows attackers to use variations like \u003ccode\u003e/aPi/...\u003c/code\u003e to bypass security controls entirely.\u003c/p\u003e\n\n\u003cp\u003eSnyk researchers attribute both vulnerabilities to a fundamental mismatch between the security middleware\u0026rsquo;s assumptions and the Express.js framework\u0026rsquo;s actual behavior. Threat actors have targeted publicly exposed Qinglong panels since February 7 to deploy malicious miners. The initial compromise was detected by users who noticed a rogue background process named \u003ccode\u003e.fullgc\u003c/code\u003e consuming between 85% and 100% of their CPU resources. The process name deliberately mimics the resource-intensive \u0026ldquo;Full GC\u0026rdquo; operation to avoid raising suspicion.\u003c/p\u003e\n\n\u003cp\u003eAttackers exploit the flaws to modify the \u003ccode\u003econfig.sh\u003c/code\u003e file and inject shell commands that download a miner to \u003ccode\u003e/ql/data/db/.fullgc\u003c/code\u003e. The malicious binary is hosted at \u003ccode\u003efile.551911.xyz\u003c/code\u003e and includes variants for Linux x86_64, ARM64, and macOS architectures. Infections have been confirmed across various server configurations, including setups protected behind Nginx and SSL. Qinglong maintainers acknowledged the vulnerability on March 1 and urged users to install updates. However, the initial mitigation in pull request #2924 only blocked command injection patterns, which Snyk deemed insufficient. The effective remediation arrived in pull request #2941, which properly corrected the authentication bypass within the middleware layer.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"article-analysis-qinglong-task-scheduler-rce-exploitation\"\u003eArticle Analysis: Qinglong Task Scheduler RCE Exploitation\u003c/h1\u003e\n\n\u003ch2 id=\"overview-threat-landscape\"\u003eOverview \u0026amp; Threat Landscape\u003c/h2\u003e\n\n\u003cp\u003eHackers are exploiting two authentication bypass vulnerabilities in the Qinglong open-source task scheduler to deploy cryptominers on developers\u0026rsquo; servers. The exploitation campaign began in early February, with public disclosure of the security issues occurring at the end of the month. Qinglong is a self-hosted time management platform that is highly popular among Chinese developers, featuring over 19,000 GitHub stars and more than 3,200 forks.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-breakdown\"\u003eVulnerability Breakdown\u003c/h2\u003e\n\n\u003cp\u003eThe security issues impact Qinglong versions 2.20.1 and older. When chained together, these flaws enable remote code execution. The specific vulnerabilities are documented as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-3965:\u003c/strong\u003e A misconfigured rewrite rule maps \u003ccode\u003e/open/*\u003c/code\u003e requests to \u003ccode\u003e/api/*\u003c/code\u003e, which unintentionally exposes protected administrative endpoints through an unauthenticated path.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-4047:\u003c/strong\u003e The authentication check treats URL paths as case-sensitive, while the router matches them case-insensitively. This allows attackers to bypass authentication by sending requests with altered casing, such as \u003ccode\u003e/aPi/...\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-malware-behavior\"\u003eExploitation \u0026amp; Malware Behavior\u003c/h2\u003e\n\n\u003cp\u003eSnyk researchers report that attackers have targeted publicly exposed Qinglong panels since February 7 to deploy cryptominers. The initial compromise was identified by Qinglong users who reported a rogue hidden process named \u003ccode\u003e.fullgc\u003c/code\u003e utilizing between 85% and 100% of their CPU power. The process name deliberately mimics \u0026ldquo;Full GC,\u0026rdquo; an innocuous but resource-intensive operation, to evade detection. Once authenticated, attackers exploit the flaws to modify Qinglong’s \u003ccode\u003econfig.sh\u003c/code\u003e file and inject shell commands. These commands download a miner to \u003ccode\u003e/ql/data/db/.fullgc\u003c/code\u003e and execute it in the background. The remote resource at \u003ccode\u003efile.551911.xyz\u003c/code\u003e hosts multiple binary variants, including builds for Linux x86_64, ARM64, and macOS.\u003c/p\u003e\n\n\u003ch2 id=\"response-mitigation-timeline\"\u003eResponse \u0026amp; Mitigation Timeline\u003c/h2\u003e\n\n\u003cp\u003eThe attack activity continued with multiple confirmed infections across various server setups, including configurations running behind Nginx and SSL. Qinglong maintainers only responded to the situation on March 1. The maintainer acknowledged the vulnerability and urged users to install the latest update. However, the initial mitigation focused on pull request #2924, which concentrated on blocking command injection patterns. Snyk researchers noted that this approach was insufficient to address the underlying authentication bypass. The effective fix was ultimately delivered in pull request #2941, which corrected the authentication bypass directly in the middleware.\u003c/p\u003e\n\n\u003ch2 id=\"technical-root-cause\"\u003eTechnical Root Cause\u003c/h2\u003e\n\n\u003cp\u003eBoth vulnerabilities stem from a fundamental mismatch between the security middleware\u0026rsquo;s authorization assumptions and the Express.js framework\u0026rsquo;s routing behavior. Snyk researchers explain that the authentication layer assumed certain URL patterns would always be handled in a specific manner, while Express.js processed them differently. This architectural disconnect allows unauthenticated requests to reach protected endpoints despite the presence of middleware security controls.\u003c/p\u003e\n","keyPoints":["Hackers are exploiting two authentication bypass vulnerabilities in the Qinglong task scheduler to achieve remote code execution and deploy cryptominers on affected servers.","The flaws originate from a mismatch between the middleware's authorization assumptions and Express.js routing behavior, which allows unauthenticated requests to reach protected endpoints.","Attackers have targeted publicly exposed Qinglong installations since February 7 to inject shell commands that download and execute miner binaries disguised as a \"Full GC\" process.","Qinglong maintainers initially responded on March 1 with an insufficient mitigation, and the effective fix was later delivered through pull request #2941."],"insights":["The malware deliberately mimics the \"Full GC\" process name to exploit a common sysadmin blind spot, using legitimate-looking terminology to evade detection.","The authentication bypass exploits a subtle case-sensitivity mismatch between Express.js routing and middleware logic, demonstrating how framework configuration traps can completely circumvent security controls.","The maintainer's initial mitigation only targeted command injection patterns, proving insufficient against the actual RCE chain and highlighting the danger of partial security patches.","Attackers distributed architecture-specific binaries from a single remote domain, indicating a cross-platform mining operation that leverages a single open-source vulnerability across Linux, ARM64, and macOS environments."],"referencedReports":[{"title":"Qinglong Task Scheduler RCE Vulnerabilities","url":"https://snyk.io/blog/qinglong-task-scheduler-rce-vulnerabilities/","publisher":"Snyk","context":"The article cites Snyk researchers to explain the root cause of the vulnerabilities and details the timeline of exploitation."}],"body":"\u003cp\u003eHackers have been exploiting two authentication bypass vulnerabilities in the Qinglong open-source task scheduler to deploy cryptominers on developers\u0026rsquo; servers. The attacks began in early February and target publicly exposed installations of the platform. Researchers at Snyk identified that the vulnerabilities stem from a mismatch between the application\u0026rsquo;s middleware authorization logic and Express.js routing behavior. Specifically, a misconfigured rewrite rule exposes protected admin endpoints, while a case-sensitivity discrepancy allows attackers to bypass authentication checks. Once inside, threat actors inject shell commands to download and execute miner binaries disguised as a legitimate \u0026ldquo;Full GC\u0026rdquo; process. The initial response from Qinglong maintainers included an insufficient mitigation that only addressed command injection patterns. The effective fix was eventually released in pull request #2941, which corrected the underlying authentication bypass in the middleware. Organizations running Qinglong are advised to apply the latest updates immediately to prevent unauthorized cryptomining.\u003c/p\u003e\n"},{"n":3,"title":"Hackers arrested for hijacking and selling 610,000 Roblox accounts","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/hackers-arrested-for-hijacking-and-selling-610-000-roblox-accounts/","time":"18:32","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"Ukrainian police arrested three hackers who used info-stealing malware to compromise and sell 610,000 Roblox accounts for $225,000, with the suspects facing up to 15 years in prison.","briefOverview":"\u003cp\u003eUkrainian police in Lviv have arrested three individuals aged 19, 21, and 22 for hacking and selling over 610,000 Roblox accounts. The suspects generated approximately \u003cspan class=\"math inline\"\u003e\\(225,000 in profit by distributing info-stealing malware disguised as a game-enhancer tool. This malware infected victim devices and harvested their login credentials for unauthorized account access. Law enforcement conducted ten targeted searches, seizing \\)\u003c/span\u003e35,000 in cash along with numerous computing devices and mobile phones.\u003c/p\u003e\n\n\u003cp\u003eAt least 357 of the compromised accounts were classified as high-value or elite profiles containing rare items and significant in-game currency. The group categorized and sold these stolen accounts through a Russian website and closed online communities. The suspects now face up to 15 years in prison under theft and unauthorized IT interference charges. Authorities are continuing their investigation to identify additional accomplices and victims.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eUkrainian authorities have arrested three members of a hacking group responsible for compromising more than 610,000 Roblox accounts. The operation, led by a 19-year-old who recruited his accomplices on gaming forums, relied on info-stealing malware disguised as a game-enhancer tool. Once installed on victim devices, the malware collected login credentials to gain unauthorized access to user profiles.\u003c/p\u003e\n\n\u003cp\u003eThe stolen accounts were then evaluated based on their monetary value, inventory rarity, and remaining Robux balances. The group sold these compromised profiles via a Russian website and within closed online communities, earning a total profit of $225,000. Ukrainian prosecutors confirmed that at least 357 of the hijacked accounts were high-value or elite accounts holding limited-edition items and accumulated resources.\u003c/p\u003e\n\n\u003cp\u003eLviv police executed ten searches across targeted locations, resulting in the seizure of $35,000 in cash, 37 mobile phones, 11 desktop computers, seven laptops, five tablets, and four USB drives. The suspects have been charged under Article 185 for theft and Article 361 for unauthorized interference with IT systems. These charges carry a maximum penalty of up to 15 years in imprisonment.\u003c/p\u003e\n\n\u003cp\u003eThe Prosecutor General’s Office emphasized that Roblox accounts hold substantial financial value due to their in-game currency, premium content access, and years of accumulated progress. Law enforcement agencies are actively investigating the case to uncover other potential accomplices and identify additional victims.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncid     if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
