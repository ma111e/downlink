s to dominate the market through Telegram channel collaborations."},{"title":"The State of Cybercrime 2026","url":"https://www.kelacyber.com/blog/the-state-of-cybercrime-2026/","publisher":"KELA","context":"The article references a KELA study to highlight that nearly 2.86 billion compromised credentials were tracked globally in 2025, with hundreds of millions harvested by infostealers."},{"title":"What Do arXiv Preprints Contain?","url":"https://arxiv.org/abs/2604.20927","publisher":"arXiv Researchers","context":"The article references an arXiv research paper analyzing 2.7 million submissions to reveal that researchers routinely upload Git repositories, API keys, and private keys alongside their LaTeX sources."},{"title":"RDP Security, CPS Threats Spark Need for Secure Remote Access","url":"https://www.forescout.com/blog/rdp-security-cps-threats-spark-need-for-secure-remote-access/","publisher":"Forescout","context":"The article cites a Forescout analysis that identified 1.8 million exposed RDP and 1.6 million exposed VNC servers, noting that many run end-of-life Windows versions or have authentication disabled."},{"title":"Your Extensions Sell Your Data and It's Perfectly Legal","url":"https://layerxsecurity.com/blog/your-extensions-sell-your-data-and-its-perfectly-legal/","publisher":"LayerX Security","context":"The article references a LayerX analysis finding that multiple networks of browser extensions explicitly inform users in their privacy policies that they collect and resell browsing and viewing data for profit."}],"body":"\u003cp\u003eThis week’s security landscape features a mix of advanced threat tactics and glaring infrastructure vulnerabilities. Law enforcement has disrupted several criminal networks, including arrests related to SMS blasters, a Roblox account hacking ring, and a major cryptocurrency laundering operation. Meanwhile, threat actors are heavily targeting software supply chains through malicious npm and PyPI packages that steal environment variables, credentials, and cryptocurrency wallets. Credential theft remains rampant, with nearly 2.9 billion compromised accounts tracked globally in 2025 and the Vidar stealer dominating the underground market. Organizations are also grappling with widespread exposure of remote access servers, unpatched Windows privilege escalation flaws, and critical vulnerabilities in widely used healthcare software. Browser extensions are openly selling user data, while phishing kits evolve into sophisticated platforms that bypass traditional defenses. Despite these evolving threats, the overarching lesson emphasizes that basic security hygiene, timely patching, and user vigilance remain the most effective defenses.\u003c/p\u003e\n"},{"n":7,"title":"Trump’s cyber ambassador nominee advances to full Senate vote","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/trump-cyber-ambassador-nominee-advances-to-senate","time":"16:34","priority":"SHOULD READ","score":82,"group":null,"groupColor":null,"tldr":"Adam Cassady's nomination to lead the State Department's cyber policy bureau has cleared a key Senate committee hurdle and will proceed to a full vote, emphasizing the administration's focus on securing critical digital infrastructure. Senators are expected to demand a firm stance from Cassady regarding AI chip exports to China, a major national security issue highlighted during his confirmation hearing.","briefOverview":"\u003cp\u003eThe Senate Foreign Relations Committee advanced Adam Cassady’s nomination to lead the State Department’s Bureau of Cyberspace and Digital Policy to a full Senate vote. The committee approved the nomination with a 17-5 vote, including opposition from five Democratic members. Cassady previously served at the National Telecommunications and Information Administration and the Federal Communications Commission. He emphasized that digital infrastructure like subsea cables, semiconductors, and satellites is now as strategically significant as historical sea lanes and energy routes. During his confirmation hearing, senators questioned the administration’s decision to allow Nvidia to sell advanced AI processors to China. Cassady stated he lacks classified briefings on export controls and does not yet hold a firm position, though he pledged to develop one rapidly. Senator Jeanne Shaheen voted to advance the nomination and urged Cassady to investigate semiconductor exports thoroughly. She referenced briefings indicating that unrestricted chip sales could provide China with a substantial industrial advantage. The bureau has lacked a confirmed leader since the start of the second Trump administration. Its portfolio was temporarily divided among three offices following a departmental reshuffle.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Senate Foreign Relations Committee voted 17-5 to advance Adam Cassady’s nomination to helm the State Department’s Bureau of Cyberspace and Digital Policy. Five Democratic committee members joined the majority in supporting his advancement, sending the nomination to the full Senate for a final vote. Cassady was nominated last month to fill a leadership vacancy that has existed since the beginning of the second Trump administration. Under current arrangements, the bureau’s duties have been divided among three separate offices following a broader departmental restructuring. During his confirmation hearing, Cassady outlined his strategic vision for the role, emphasizing the urgent need to protect global digital infrastructure. He specifically identified subsea cables, semiconductors, and satellites as assets now comparable in strategic value to traditional sea lanes, airspace, and energy routes. Safeguarding these networks, he argued, is fundamental to maintaining American power and economic prosperity. The hearing featured a single major question regarding the administration’s policy on Nvidia selling advanced artificial intelligence processors to China. Cassady responded that he has not received classified briefings on export control frameworks and therefore lacks a strong initial viewpoint. He committed to rapidly forming a definitive position once confirmed and properly briefed. Senator Jeanne Shaheen, the committee’s top Democrat, voted to advance the nomination and encouraged Cassady to investigate the chip export issue thoroughly. She referenced prior intelligence briefings suggesting that unrestricted sales of high-level chips could provide China with a significant industrial jumpstart. She emphasized that this technological advantage would not materialize without continued American supply. Cassady’s background includes senior leadership roles at the National Telecommunications and Information Administration and the Federal Communications Commission. His confirmation will ultimately determine whether the State Department can immediately consolidate its cyber policy authority and address pressing export control questions. The full Senate vote will now decide whether he can begin addressing the immediate gaps in cyber diplomacy and infrastructure security.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eThis analysis outlines the progression of Adam Cassady’s nomination to lead the State Department’s Bureau of Cyberspace and Digital Policy. The Senate Foreign Relations Committee successfully advanced his nomination through a 17-5 vote. Five Democratic committee members opposed the motion, but the majority supported his elevation to the full Senate floor.\u003c/p\u003e\n\n\u003ch3 id=\"nomination-context-and-bureau-status\"\u003eNomination Context and Bureau Status\u003c/h3\u003e\n\n\u003cp\u003eCassady was nominated last month to fill a critical leadership gap within the State Department. The bureau has remained without a confirmed ambassador since the beginning of the second Trump administration. Following a broader departmental reshuffle, the bureau’s statutory portfolio was temporarily divided among three separate offices. This fragmentation has delayed comprehensive oversight of the department’s digital policy initiatives. Cassady’s confirmation would restore the bureau to its legally mandated structure under a single ambassadorial leader.\u003c/p\u003e\n\n\u003ch3 id=\"strategic-vision-for-digital-infrastructure\"\u003eStrategic Vision for Digital Infrastructure\u003c/h3\u003e\n\n\u003cp\u003eDuring his confirmation hearing, Cassady articulated a clear strategic framework for the role. He emphasized that the digital infrastructure underpinning the global economy demands immediate protection. Specifically, he identified subsea cables, semiconductors, and satellites as assets of paramount importance. He argued that these technological networks are now as strategically significant as historical sea lanes, airspace, and energy routes. Safeguarding this digital ecosystem, he stated, is central to preserving both American national power and long-term economic prosperity.\u003c/p\u003e\n\n\u003ch3 id=\"confirmation-hearing-highlights-and-policy-questions\"\u003eConfirmation Hearing Highlights and Policy Questions\u003c/h3\u003e\n\n\u003cp\u003eThe confirmation hearing was notably brief, featuring only a single substantive question from committee members. Senator Jeanne Shaheen focused entirely on the administration’s decision to permit Nvidia to sell advanced artificial intelligence processors to China. Cassady acknowledged that he has not yet received classified briefings on export control frameworks. Consequently, he stated he does not possess a strong initial viewpoint on the matter. He pledged to develop a definitive position rapidly once confirmed and properly briefed. Senator Shaheen voted to advance the nomination but urged Cassady to thoroughly investigate the semiconductor export issue. She referenced prior intelligence briefings suggesting that unrestricted chip sales could provide China with a significant industrial jumpstart. She emphasized that this technological advantage would not materialize without continued American supply.\u003c/p\u003e\n\n\u003ch3 id=\"nominee-background-and-next-steps\"\u003eNominee Background and Next Steps\u003c/h3\u003e\n\n\u003cp\u003eCassady brings prior executive experience to the nomination, having served as a senior leader at the National Telecommunications and Information Administration. He also previously held leadership positions at the Federal Communications Commission. His nomination now proceeds to the full Senate for a final confirmation vote. The outcome will determine whether the State Department can immediately consolidate its cyber policy authority and address pressing export control questions.\u003c/p\u003e\n","keyPoints":["The Senate Foreign Relations Committee approved Adam Cassady’s nomination to lead the State Department’s Bureau of Cyberspace and Digital Policy with a 17-5 vote.","Cassady stated that digital infrastructure such as subsea cables, semiconductors, and satellites is now as strategically significant as traditional routes for preserving American power and prosperity.","During his confirmation hearing, Cassady noted he has not received a classified briefing on AI chip exports to China and does not yet have a strong position on the issue.","Senator Jeanne Shaheen raised concerns that allowing Nvidia to sell advanced AI processors to China could provide Beijing with a significant advantage in the semiconductor industry.","The bureau has lacked a confirmed leader since the start of the second Trump administration, with its portfolio temporarily divided among three offices."],"insights":["The bureau’s portfolio has been divided among three offices due to a leadership vacuum, creating a structural gap in cyber diplomacy that requires immediate consolidation.","The confirmation hearing focused exclusively on AI chip exports to China, indicating that semiconductor supply chain security is already a primary lens for evaluating cyber policy.","The nominee’s stated lack of classified briefings on export controls highlights an immediate knowledge gap in critical technology transfer frameworks that must be addressed upon confirmation."],"referencedReports":[],"body":"\u003cp\u003eThe Senate Foreign Relations Committee advanced Adam Cassady’s nomination to lead the State Department’s Bureau of Cyberspace and Digital Policy to a full Senate vote. The committee approved the nomination with a 17-5 vote, including opposition from five Democratic members. Cassady previously served at the National Telecommunications and Information Administration and the Federal Communications Commission. He emphasized that digital infrastructure like subsea cables, semiconductors, and satellites is now as strategically significant as historical sea lanes and energy routes. During his confirmation hearing, senators questioned the administration’s decision to allow Nvidia to sell advanced AI processors to China. Cassady stated he lacks classified briefings on export controls and does not yet hold a firm position, though he pledged to develop one rapidly. Senator Jeanne Shaheen voted to advance the nomination and urged Cassady to investigate semiconductor exports thoroughly. She referenced briefings indicating that unrestricted chip sales could provide China with a substantial industrial advantage. The bureau has lacked a confirmed leader since the start of the second Trump administration. Its portfolio was temporarily divided among three offices following a departmental reshuffle.\u003c/p\u003e\n"},{"n":2,"title":"Zambia cancels global digital freedoms conference days before start","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/zabia-cancels-global-digital-freedoms-conference-shortly-before-start","time":"17:11","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"Zambia abruptly canceled the RightsCon digital freedoms conference, citing security and procedural concerns, amid allegations of foreign pressure and a broader crackdown on online expression.","briefOverview":"\u003cp\u003eAccess Now announced the cancellation of RightsCon, a major digital human rights conference originally scheduled for May 5 in Zambia. The Zambian government halted the event days before its start, citing incomplete security clearances and procedural misalignments. Officials also demanded comprehensive disclosure of the conference\u0026rsquo;s thematic discussions. This sudden shutdown has stranded thousands of delegates who were already traveling to the region. The decision arrives amid broader restrictions on digital expression within the country. Recent cyber legislation has expanded government surveillance capabilities and restricted online speech. International advocates have criticized the move as a direct assault on civil society and global digital freedoms.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAccess Now has canceled RightsCon, one of the world’s largest digital human rights conferences, due to direct intervention by the Zambian government. The event was scheduled to begin on May 5 in Lusaka but was halted just days prior. Minister of Technology and Science Felix Mutati initially signaled the cancellation by citing incomplete security clearances and a need for additional time to align the summit with national diplomatic protocols. Secretary for Information and Media Thabo Kawana later expanded on this, stating that comprehensive disclosure of critical thematic information was required. The announcement left thousands of delegates stranded or en route to Zambia. Many human rights organizations are already financially strained following the dismantling of USAID, complicating travel and rescheduling efforts. RightsCon typically draws over 5,000 advocates and academics from more than 150 countries. ARTICLE 19 acknowledged well-founded claims that foreign government pressure influenced the Zambian decision. Local reports suggested the program faced scrutiny because Taiwanese delegates might speak against China at a venue funded by Beijing. The Mulungushi International Conference Center received a $30 million grant from the Chinese government, according to College of William \u0026amp; Mary research tracking foreign investment. Zambia has recently tightened its grip on digital expression through legislation that critics say enables state surveillance. Freedom House recently classified the country as “partly free” and documented the jailing of online critics. Former UN Special Rapporteur David Kaye condemned the late-stage cancellation as a severe attack on civil society. The shutdown was first reported by 404 Media and has drawn widespread condemnation from the global human rights community.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"event-cancellation-and-official-justifications\"\u003eEvent Cancellation and Official Justifications\u003c/h2\u003e\n\n\u003cp\u003eAccess Now announced the complete cancellation of RightsCon, a premier global digital human rights conference, due to government intervention in Zambia. The summit was originally scheduled to begin on May 5 in Lusaka but was halted days before its start. Minister of Technology and Science Felix Mutati provided the first indication of the shutdown, citing incomplete security clearances for participants.\u003c/p\u003e\n\n\u003cp\u003eHe further stated that additional time was needed to align the event with national procedures and diplomatic protocols. Secretary for Information and Media Thabo Kawana later added that the government required comprehensive disclosure of critical information regarding the conference\u0026rsquo;s proposed thematic discussions.\u003c/p\u003e\n\n\u003ch2 id=\"operational-and-financial-impact\"\u003eOperational and Financial Impact\u003c/h2\u003e\n\n\u003cp\u003eThe abrupt cancellation has created significant logistical challenges for the human rights community. Thousands of delegates were either en route to Zambia or had already arrived when the announcement was made. The event typically attracts more than 5,000 human rights advocates and academics from over 150 countries.\u003c/p\u003e\n\n\u003cp\u003eMany participating organizations are already financially constrained due to the dismantling of the United States Agency for International Development. It remains unclear whether the global community can or will fund travel to a rescheduled conference.\u003c/p\u003e\n\n\u003ch2 id=\"geopolitical-and-venue-context\"\u003eGeopolitical and Venue Context\u003c/h2\u003e\n\n\u003cp\u003eARTICLE 19 issued a press release acknowledging well-founded claims that pressure from foreign governments contributed to the Zambian decision. Local news outlets reported that the cancellation stemmed from concerns over Taiwanese delegates who might speak against China. The conference was set to take place at the Mulungushi International Conference Center, which was donated by the Chinese government.\u003c/p\u003e\n\n\u003cp\u003eA College of William \u0026amp; Mary research lab confirmed that China provided a $30 million grant for the venue\u0026rsquo;s construction. While Recorded Future News could not independently verify all assertions, the financial ties between the venue and Beijing are documented.\u003c/p\u003e\n\n\u003ch2 id=\"domestic-digital-rights-environment\"\u003eDomestic Digital Rights Environment\u003c/h2\u003e\n\n\u003cp\u003eZambia has been actively cracking down on freedom of expression in recent years. Lawmakers recently passed legislation that human rights advocates argue severely limits free speech and facilitates government surveillance. Freedom House’s latest report classified Zambia as “partly free” and noted that the government has jailed critics for online speech.\u003c/p\u003e\n\n\u003cp\u003eThe cancellation of RightsCon aligns with this broader trend of restricting digital activism and independent discourse.\u003c/p\u003e\n\n\u003ch2 id=\"international-reaction\"\u003eInternational Reaction\u003c/h2\u003e\n\n\u003cp\u003eThe shutdown has drawn sharp criticism from global civil society leaders. David Kaye, a former United Nations Special Rapporteur on freedom of expression, condemned the decision as a serious attack on both local and international civil society. He emphasized that canceling the event at such a late stage, with thousands of people already traveling, was “horrible.”\u003c/p\u003e\n\n\u003cp\u003eThe news was initially reported by 404 Media and has since sparked widespread concern across the digital rights sector.\u003c/p\u003e\n","keyPoints":["Access Now canceled the RightsCon digital human rights conference in Zambia days before its scheduled start due to government intervention over its digital freedoms theme.","Zambian officials cited incomplete security clearances and a need for additional time to align the event with national procedures and diplomatic protocols.","Reports indicate the cancellation may have been influenced by concerns over Taiwanese delegates speaking against China at a venue funded by a $30 million Chinese government grant.","The decision occurs amid a broader crackdown on free expression in Zambia, including recent legislation that human rights advocates claim limits online speech and enables government surveillance.","Thousands of delegates from over 150 countries were en route to the event when the cancellation was announced, drawing criticism from global human rights organizations."],"insights":["The conference venue's $30 million Chinese government grant, combined with planned discussions involving Taiwanese delegates, demonstrates how foreign-funded infrastructure can be leveraged to suppress specific geopolitical narratives at hosted events.","Officials cited \"incomplete security clearances\" and \"diplomatic protocols\" to justify the cancellation, illustrating how administrative procedural controls can be weaponized to abruptly halt digital rights gatherings without substantive legal cause.","Recent Zambian cyber legislation, which facilitates government surveillance and restricts online speech, establishes a legal framework that enables preemptive shutdowns of digital freedom conferences under national security justifications."],"referencedReports":[{"title":"Freedom of the Net 2025 Report","url":"https://freedomhouse.org/country/zambia/freedom-net/2025","publisher":"Freedom House","context":"The article cites this report as the source for Freedom House's assessment that Zambia is ranked as 'partly free' based on its human rights and internet freedom records."},{"title":"China Foreign Investment Project Data","url":"https://china.aiddata.org/projects/57297","publisher":"College of William \u0026 Mary research lab (AidData)","context":"The article references this research lab's tracking data to verify that the Chinese government provided a $30 million grant for the construction of the conference venue."}],"body":"\u003cp\u003eAccess Now announced the cancellation of RightsCon, a major digital human rights conference originally scheduled for May 5 in Zambia. The Zambian government halted the event days before its start, citing incomplete security clearances and procedural misalignments. Officials also demanded comprehensive disclosure of the conference\u0026rsquo;s thematic discussions. This sudden shutdown has stranded thousands of delegates who were already traveling to the region. The decision arrives amid broader restrictions on digital expression within the country. Recent cyber legislation has expanded government surveillance capabilities and restricted online speech. International advocates have criticized the move as a direct assault on civil society and global digital freedoms.\u003c/p\u003e\n"},{"n":3,"title":"Congress punts FISA renewal to June","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/congress-punts-fisa-renewal-to-june","time":"21:31","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"Congress has temporarily extended Section 702 surveillance authority until June 21 to prevent a lapse while lawmakers negotiate a permanent reauthorization.","briefOverview":"\u003cp\u003eCongress on Thursday reauthorized a major foreign surveillance tool for several more weeks to prevent it from lapsing. The House voted 261-111 to renew Section 702 of the Foreign Intelligence Surveillance Act until June 21. This vote occurred just hours before the program was scheduled to expire. The temporary extension came after the Senate declared a previous three-year extension bill dead on arrival. That earlier bill was rejected because it included a controversial ban on the Federal Reserve’s ability to issue a digital currency. Following that failure, the upper chamber approved a 45-day extension by unanimous consent.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCongress on Thursday reauthorized a major foreign surveillance tool for several more weeks to prevent it from lapsing. The House voted 261-111 to renew Section 702 of the Foreign Intelligence Surveillance Act until June 21. This vote occurred just hours before the program was scheduled to expire.\u003c/p\u003e\n\n\u003cp\u003eThe temporary extension came after the Senate declared a previous three-year extension bill dead on arrival. That earlier bill was rejected because it included a controversial ban on the Federal Reserve’s ability to issue a digital currency. Following that failure, the upper chamber approved a 45-day extension by unanimous consent.\u003c/p\u003e\n\n\u003cp\u003eThis shorter timeline was secured after lawmakers reached a deal to declassify a recent Foreign Intelligence Surveillance Court opinion regarding 702 usage. The FISA legislation now moves to President Donald Trump, who is expected to sign it before the midnight deadline. The vote concludes what policymakers on both sides of the aisle viewed as a messy push to extend the surveillance authority.\u003c/p\u003e\n\n\u003cp\u003eSection 702 is designed to target foreign intelligence but inadvertently collects information belonging to an unknown number of Americans. The brief extension will give lawmakers until mid-June to work out a deal on a long-term reauthorization. Senate Majority Leader John Thune stated that the extension will allow additional time to finalize the agreement. Meanwhile, the Senate has been actively working on its own separate three-year extension proposal.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"legislative-timeline-and-immediate-actions\"\u003eLegislative Timeline and Immediate Actions\u003c/h2\u003e\n\n\u003cp\u003eCongress on Thursday reauthorized a major foreign surveillance tool for several more weeks to prevent it from lapsing. The House voted 261-111 to renew Section 702 of the Foreign Intelligence Surveillance Act until June 21. This vote occurred just hours before the program was scheduled to expire.\u003c/p\u003e\n\n\u003cp\u003eThe temporary extension came after the Senate declared a previous three-year extension bill dead on arrival. That earlier bill was rejected because it included a controversial ban on the Federal Reserve’s ability to issue a digital currency. Following that failure, the upper chamber approved a 45-day extension by unanimous consent.\u003c/p\u003e\n\n\u003ch2 id=\"senate-and-house-voting-dynamics\"\u003eSenate and House Voting Dynamics\u003c/h2\u003e\n\n\u003cp\u003eThis shorter timeline was secured after lawmakers reached a deal to declassify a recent Foreign Intelligence Surveillance Court opinion regarding 702 usage. The FISA legislation now moves to President Donald Trump, who is expected to sign it before the midnight deadline. The vote concludes what policymakers on both sides of the aisle viewed as a messy push to extend the surveillance authority.\u003c/p\u003e\n\n\u003cp\u003eSection 702 is designed to target foreign intelligence but inadvertently collects information belonging to an unknown number of Americans. The brief extension will give lawmakers until mid-June to work out a deal on a long-term reauthorization. Senate Majority Leader John Thune stated that the extension will allow additional time to finalize the agreement.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways-and-structural-breakdown\"\u003eKey Takeaways and Structural Breakdown\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eHouse Action:\u003c/strong\u003e The House passed the short-term renewal with a 261-111 vote mere hours before the statutory deadline.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSenate Resolution:\u003c/strong\u003e The Senate bypassed partisan gridlock by approving a 45-day extension via unanimous consent.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDeclassification Deal:\u003c/strong\u003e The unanimous consent was explicitly contingent on an agreement to declassify a recent FISC opinion on 702 usage.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePresidential Next Step:\u003c/strong\u003e President Donald Trump is expected to sign the legislation before the midnight deadline.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFuture Timeline:\u003c/strong\u003e Lawmakers have until mid-June to negotiate a permanent reauthorization, with the Senate already drafting its own three-year extension.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Congress reauthorized Section 702 of the Foreign Intelligence Surveillance Act for a temporary extension until June 21 to prevent the program from lapsing.","The Senate approved a 45-day extension by unanimous consent after agreeing to declassify a recent Foreign Intelligence Surveillance Court opinion regarding 702 usage.","The House voted 261-111 to renew the surveillance program after the Senate rejected a previous bill that included a ban on the Federal Reserve issuing a digital currency.","The temporary extension provides lawmakers until mid-June to negotiate a long-term reauthorization deal for the surveillance authority."],"insights":["The Senate's unanimous consent for the 45-day extension was explicitly tied to a deal to declassify a recent FISC opinion on 702 usage, linking immediate legislative action to judicial transparency.","Section 702 is designed to target foreign intelligence but sweeps up unknown amounts of American citizens' information, a privacy risk that the short-term extension deliberately postpones.","An unrelated dispute over banning the Federal Reserve's digital currency capability caused the Senate to kill the primary three-year extension bill, demonstrating how extraneous financial policy can stall national security surveillance renewals.","Lawmakers are using a brief, unanimous extension to buy time until mid-June, indicating that structural disagreements on long-term reauthorization remain unresolved."],"referencedReports":[],"body":"\u003cp\u003eCongress on Thursday reauthorized a major foreign surveillance tool for several more weeks to prevent it from lapsing. The House voted 261-111 to renew Section 702 of the Foreign Intelligence Surveillance Act until June 21. This vote occurred just hours before the program was scheduled to expire. The temporary extension came after the Senate declared a previous three-year extension bill dead on arrival. That earlier bill was rejected because it included a controversial ban on the Federal Reserve’s ability to issue a digital currency. Following that failure, the upper chamber approved a 45-day extension by unanimous consent.\u003c/p\u003e\n"},{"n":11,"title":"Romanian leader of online swatting ring gets 4 years in prison","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/romanian-leader-of-online-swatting-ring-gets-4-years-in-prison/","time":"17:45","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"Romanian national Thomasz Szabo was sentenced to four years in federal prison for orchestrating a massive online swatting campaign that targeted over 75 public officials, journalists, and religious institutions with false emergency reports. The conviction demonstrates the severe legal consequences and substantial law enforcement resource drain resulting from coordinated swatting attacks.","briefOverview":"\u003cp\u003eThomasz Szabo, a 27-year-old Romanian national, was sentenced to four years in federal prison and three years of supervised release for leading an online swatting ring. The group targeted more than 75 public officials, multiple journalists, and four religious institutions with false emergency reports. Szabo personally made high-profile threats against New York City synagogues, the U.S. Capitol, and President-elect Joe Biden. He also encouraged his followers to conduct similar attacks against members of Congress and senior government officials. The coordinated campaign wasted hundreds of thousands of dollars in taxpayer funds and created significant strain on law enforcement resources. Authorities emphasized that these actions were dangerous criminal harassment rather than harmless pranks. The sentencing serves as a clear warning to others who engage in swatting activities.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThomasz Szabo, a 27-year-old Romanian national extradited in November 2024, pleaded guilty in June 2025 to conspiracy and threats involving explosives. He was sentenced to four years in federal prison followed by three years of supervised release. Szabo founded and led an online community that began conducting swatting attacks and bomb threats in late 2020. Operating under numerous aliases, he personally filed false emergency reports with U.S. law enforcement. These included a December 2020 threat of a mass shooting at New York City synagogues and a January 2021 plot to detonate explosives at the U.S. Capitol and kill President-elect Joe Biden. Beyond his own actions, Szabo advertised his activities to followers and actively encouraged them to replicate the attacks. This directive triggered a concentrated spree between December 2023 and early January 2024. During this period, the group targeted at least 25 members of Congress or their families, six senior executive branch officials, and multiple cabinet-level figures. The attacks also extended to 13 senior federal law enforcement officials, members of the federal judiciary, 27 state officials, and four religious institutions. One follower boasted to Szabo about making over 25 swatting calls in a single day, claiming to have wasted more than $500,000 in taxpayer funds over just two days. U.S. Attorney Pirro noted that the scheme deliberately targeted members of Congress, cabinet officials, federal law enforcement heads, churches, journalists, and former presidents. FBI Special Agent Michael Burgwald highlighted the tremendous drain on law enforcement resources and the danger posed to innocent civilians. Another accomplice, 23-year-old Serbian national Nemanja Radovanovic, was charged in August 2024 and faces separate legal proceedings. The court documents and sentencing underscore the severe consequences of coordinating false emergency responses against high-profile targets.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"case-overview\"\u003eCase Overview\u003c/h3\u003e\n\n\u003cp\u003eThomasz Szabo, a 27-year-old Romanian national, was sentenced to four years in federal prison and three years of supervised release. He pleaded guilty in June 2025 to one count of conspiracy and one count of threats involving explosives. The case stems from his leadership of an online swatting ring that orchestrated false emergency reports to provoke armed police responses at targeted addresses.\u003c/p\u003e\n\n\u003ch3 id=\"operational-timeline-and-leadership\"\u003eOperational Timeline and Leadership\u003c/h3\u003e\n\n\u003cp\u003eSzabo founded and managed an online community that initiated a pattern of bomb threats and swatting attacks in late 2020. He operated under a wide array of aliases, including \u0026ldquo;Jonah,\u0026rdquo; \u0026ldquo;War Lord,\u0026rdquo; \u0026ldquo;Cypher,\u0026rdquo; and \u0026ldquo;NotThuggin2.\u0026rdquo; Court documents confirm that he personally made false reports to U.S. law enforcement throughout the campaign. Notable personal threats included a December 2020 mass shooting warning directed at New York City synagogues and a January 2021 plot to detonate explosives at the U.S. Capitol and assassinate President-elect Joe Biden.\u003c/p\u003e\n\n\u003ch3 id=\"coordinated-attack-spree-and-targets\"\u003eCoordinated Attack Spree and Targets\u003c/h3\u003e\n\n\u003cp\u003eBeyond his direct involvement, Szabo actively advertised his methods and encouraged followers to execute similar attacks. This instruction led to a concentrated wave of swatting incidents between December 2023 and early January 2024. The targets included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAt least 25 members of Congress or their family members\u003c/li\u003e\n\u003cli\u003eAt least six senior executive branch officials, including multiple cabinet-level figures\u003c/li\u003e\n\u003cli\u003eAt least 13 senior federal law enforcement officials and members of the federal judiciary\u003c/li\u003e\n\u003cli\u003eAt least 27 state officials\u003c/li\u003e\n\u003cli\u003eFour religious institutions\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"resource-impact-and-law-enforcement-response\"\u003eResource Impact and Law Enforcement Response\u003c/h3\u003e\n\n\u003cp\u003eThe scale of the operation resulted in significant financial and operational strain on emergency services. One group member boasted to Szabo about conducting more than 25 swatting calls in a single day, claiming to have wasted over $500,000 in taxpayer funds within a two-day window. U.S. Attorney Pirro emphasized that the scheme deliberately targeted members of Congress, cabinet officials, federal law enforcement heads, churches, journalists, and former presidents. FBI Special Agent Michael Burgwald noted that the incessant attacks created a tremendous drain on law enforcement resources and endangered innocent civilians. The sentencing aims to dismantle the misconception that swatting is merely a prank, establishing clear legal consequences for those who engage in the practice.\u003c/p\u003e\n\n\u003ch3 id=\"additional-legal-proceedings\"\u003eAdditional Legal Proceedings\u003c/h3\u003e\n\n\u003cp\u003eThe investigation also led to charges against accomplices operating within the same network. Nemanja Radovanovic, a 23-year-old Serbian national, was charged in August 2024 in connection with the conspiracy. He faces separate legal proceedings distinct from Szabo’s sentencing.\u003c/p\u003e\n","keyPoints":["Thomasz Szabo, a 27-year-old Romanian national, was sentenced to four years in federal prison and three years of supervised release for leading an online swatting ring.","The ring targeted over 75 public officials, journalists, and religious institutions with false emergency reports designed to provoke armed police responses.","Szabo personally made high-profile threats against New York City synagogues, the U.S. Capitol, and President-elect Joe Biden, while encouraging followers to conduct similar attacks.","Between December 2023 and January 2024, the group executed a concentrated spree of swatting attacks against members of Congress, federal officials, and state leaders, wasting hundreds of thousands of dollars in taxpayer funds.","Another accomplice, Serbian national Nemanja Radovanovic, was charged in August 2024 and faces separate legal proceedings."],"insights":["A single group member boasted of executing over 25 swatting calls in one day, claiming to have wasted more than $500,000 in taxpayer funds over just two days, highlighting the direct financial burden on emergency response systems.","The leader actively advertised his activities and encouraged followers to replicate attacks, revealing a coordinated, crowd-sourced operational model rather than isolated incidents.","The campaign specifically escalated to target high-value government assets, including at least 25 members of Congress, six senior executive branch officials, and multiple cabinet-level figures, demonstrating a strategic focus on disrupting critical institutions."],"referencedReports":[{"title":"DHS Fact Sheet on Swatting","url":"https://www.dhs.gov/sites/default/files/2025-04/25_0325_fps_swatting.pdf","publisher":"U.S. Department of Homeland Security","context":"Linked in the article to provide an official definition and background on the swatting criminal harassment tactic."}],"body":"\u003cp\u003eThomasz Szabo, a 27-year-old Romanian national, was sentenced to four years in federal prison and three years of supervised release for leading an online swatting ring. The group targeted more than 75 public officials, multiple journalists, and four religious institutions with false emergency reports. Szabo personally made high-profile threats against New York City synagogues, the U.S. Capitol, and President-elect Joe Biden. He also encouraged his followers to conduct similar attacks against members of Congress and senior government officials. The coordinated campaign wasted hundreds of thousands of dollars in taxpayer funds and created significant strain on law enforcement resources. Authorities emphasized that these actions were dangerous criminal harassment rather than harmless pranks. The sentencing serves as a clear warning to others who engage in swatting activities.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

function PriorityBadge({ priority }) {

function htmlPanel(value) {

}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function SwipeCard({ article, isTop, depth, onSwipe }) {
  const [dx, setDx]             = React.useState(0);
  const [dy, setDy]             = React.useState(0);
  const [dragging, setDragging] = React.useState(false);
  const [flying, setFlying]     = React.useState(null);
  const [flipped, setFlipped]   = React.useState(false);
  const startRef = React.useRef({ x: 0, y: 0 });

  React.useEffect(() => {
    if (isTop && !flipped) {
      window.__downlinkFlipTop = () => setFlipped(true);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const onPointerDown = (e) => {
    if (!isTop || flipped || flying) return;
    setDragging(true);
    startRef.current = { x: e.clientX, y: e.clientY };
    e.target.setPointerCapture && e.target.setPointerCapture(e.pointerId);
  };
  const onPointerMove = (e) => {
    if (!dragging) return;
    setDx(e.clientX - startRef.current.x);
    setDy(e.clientY - startRef.current.y);
  };
  const onPointerUp = () => {
    if (!dragging) return;
    setDragging(false);
    const threshold = 110;
    if (dx > threshold) {
      setFlying("right");
      setTimeout(() => { setFlipped(true); setDx(0); setDy(0); setFlying(null); }, 280);
    } else if (dx < -threshold) {
      setFlying("left");
      setTimeout(() => onSwipe("left"), 380);
    } else {
      setDx(0); setDy(0);
    }
  };

  let transform; let opacity = 1;
  if (flying === "left")       { transform = "translate(-140%, " + (dy * 1.5) + "px) rotate(-22deg)"; opacity = 0; }
  else if (flying === "right") { transform = "translate(60%, " + dy + "px) rotate(12deg) scale(0.95)"; }
  else if (dragging)           { transform = "translate(" + dx + "px, " + (dy * 0.4) + "px) rotate(" + (dx * 0.05) + "deg)"; }
  else if (depth > 0)          { transform = "translateY(" + (depth * 8) + "px) scale(" + (1 - depth * 0.04) + ")"; }
  else                         { transform = "translate(0, 0) rotate(0)"; }

  const skipOpacity = !flipped && dx < 0 ? Math.min(1, -dx / 100) : 0;
  const readOpacity = !flipped && dx > 0 ? Math.min(1, dx / 100) : 0;
  const cardClass   = "swipe-card " + (dragging ? "dragging" : flying ? "fly-out" : "snap-back");

  return (
    <div className={cardClass}
      style={{ transform, opacity, zIndex: 100 - depth, cursor: isTop && !flipped ? "grab" : "default", pointerEvents: isTop ? "auto" : "none" }}
      onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={onPointerUp}>
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      {!flipped && (
        <>
          <div className="stamp skip" style={{ opacity: skipOpacity }}>SKIP</div>
          <div className="stamp read" style={{ opacity: readOpacity }}>READ</div>
        </>
      )}
    </div>
  );
}

function App() {
  const [index, setIndex] = React.useState(0);
  const [tick, setTick]   = React.useState(0);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  { setIndex(i => i + 1); setTick(t => t + 1); }
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished]);

  const advance = () => { setIndex(i => i + 1); setTick(t => t + 1); };

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setTick(0); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + tick + "-" + realDepth}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onSwipe={(dir) => { if (dir === "left") advance(); }}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Skip (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--text3)", letterSpacing: "0.12em", textAlign: "center", lineHeight: 1.7 }}>
              <div>&#8592; SKIP · READ &#8594;</div>
              <div style={{ opacity: 0.6, marginTop: 2 }}>SWIPE OR CLICK</div>
            </div>
            <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="Read details (ArrowRight)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
