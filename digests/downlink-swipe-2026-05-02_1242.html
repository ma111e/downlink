<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { transition: none; cursor: grabbing; }
  .swipe-card.snap-back { transition: transform 0.32s cubic-bezier(.2,.9,.2,1); }
  .swipe-card.fly-out  { transition: transform 0.4s cubic-bezier(.4,.0,.6,1), opacity 0.4s; }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0; transition: opacity 0.1s;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--discard); color: var(--discard); }
  .pill-btn.read:hover { border-color: var(--accept);  color: var(--accept); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

<script>
window.__DL_ARTICLES = [{"n":13,"title":"Critical cPanel and WHM bug exploited as a zero-day, PoC now available","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/critical-cpanel-and-whm-bug-exploited-as-a-zero-day-poc-now-available/","time":"11:40","priority":"MUST READ","score":98,"group":null,"groupColor":null,"tldr":"A critical zero-day authentication bypass flaw in cPanel and WHM is actively being exploited to grant attackers full system control, making immediate patching or port blocking essential for all administrators.","briefOverview":"\u003cp\u003eA critical authentication bypass vulnerability, CVE-2026-41940, is actively being exploited in the wild against cPanel, WHM, and WP Squared systems. The flaw stems from a CRLF injection in the login and session loading processes that allows attackers to bypass password validation entirely. Hosting providers like KnownHost and Namecheap have confirmed active exploitation attempts dating back to late February 2026.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability grants attackers complete control over host systems, configurations, databases, and managed websites. cPanel released an emergency security update on April 28, 2026, to address the issue across multiple software versions. Administrators are strongly advised to apply the latest patches immediately or block external access to specific management ports if patching is delayed.\u003c/p\u003e\n\n\u003cp\u003eDetection scripts and vulnerability verification tools have also been published by security researchers to help identify compromised instances.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe critical CVE-2026-41940 authentication bypass vulnerability is currently being leveraged in active attacks against cPanel, WHM, and WP Squared environments. KnownHost reported that successful exploitation attempts were observed shortly after the vulnerability\u0026rsquo;s disclosure, with some execution attempts traced back to February 23, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe underlying issue involves improper session handling where user-controlled input from the Authorization header is written into server-side session files before authentication occurs. This CRLF injection flaw allows attackers to log into the system without validating the provided password. According to Rapid7, Shodan scans indicate approximately 1.5 million cPanel instances are currently exposed online, though the exact number of vulnerable systems remains unknown.\u003c/p\u003e\n\n\u003cp\u003eExploitation of this flaw grants attackers full control over the host system, its configurations, databases, and all managed websites. cPanel addressed the issue with an emergency update released on April 28, 2026, following significant pressure from hosting providers. The vendor clarified that only cPanel versions greater than 11.40 are affected by the security issue.\u003c/p\u003e\n\n\u003cp\u003eSpecific fixed versions include 11.110.0.97, 11.118.0.63, 11.126.0.54, 11.132.0.29, 11.134.0.20, and 11.136.0.5, alongside WP Squared version 11.136.1.7. Administrators who cannot patch immediately should block external access to ports 2083, 2087, 2095, and 2096, or stop the cpsrvd and cpdavd core services.\u003c/p\u003e\n\n\u003cp\u003eThe vendor also provided a detection script to check for compromise indicators, recommending session purging, credential resets, and log audits if signs of intrusion are found. Security firm watchTowr published a detailed technical analysis and a Detection Artifact Generator script to help verify vulnerability status across instances.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"threat-status-and-timeline\"\u003eThreat Status and Timeline\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-41940 is a critical authentication bypass vulnerability actively exploited in the wild against cPanel, WHM, and WP Squared.\u003c/li\u003e\n\u003cli\u003eKnownHost confirmed successful exploits were observed shortly after disclosure, with execution attempts traced back to February 23, 2026.\u003c/li\u003e\n\u003cli\u003eThe vulnerability was publicly disclosed and addressed through an emergency update released on April 28, 2026.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"technical-mechanism\"\u003eTechnical Mechanism\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe flaw is caused by a Carriage Return Line Feed (CRLF) injection in the login and session loading processes.\u003c/li\u003e\n\u003cli\u003eImproper session handling allows user-controlled input from the Authorization header to be written into server-side session files before authentication.\u003c/li\u003e\n\u003cli\u003eThe input is not properly sanitized, enabling attackers to trigger the bug and log into the system without validating the provided password.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"impact-and-scope\"\u003eImpact and Scope\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eSuccessful exploitation grants an attacker complete control over the cPanel host system, its configurations, databases, and all managed websites.\u003c/li\u003e\n\u003cli\u003eShodan internet scans reveal approximately 1.5 million cPanel instances are exposed online, though the exact count of vulnerable systems is unknown.\u003c/li\u003e\n\u003cli\u003eThe vulnerability impacts cPanel versions after 11.40, as well as WP Squared, a WordPress hosting management panel built on cPanel.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"mitigation-and-patching\"\u003eMitigation and Patching\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003ecPanel released emergency patches for multiple release branches:\n\n\u003cul\u003e\n\u003cli\u003ecPanel/WHM 11.110.0 → fixed in 11.110.0.97\u003c/li\u003e\n\u003cli\u003ecPanel/WHM 11.118.0 → fixed in 11.118.0.63\u003c/li\u003e\n\u003cli\u003ecPanel/WHM 11.126.0 → fixed in 11.126.0.54\u003c/li\u003e\n\u003cli\u003ecPanel/WHM 11.132.0 → fixed in 11.132.0.29\u003c/li\u003e\n\u003cli\u003ecPanel/WHM 11.134.0 → fixed in 11.134.0.20\u003c/li\u003e\n\u003cli\u003ecPanel/WHM 11.136.0 → fixed in 11.136.0.5\u003c/li\u003e\n\u003cli\u003eWP Squared 11.136.1 → fixed in 11.136.1.7\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eAdministrators must restart the ‘cpsrvd’ service after installing the latest software releases.\u003c/li\u003e\n\u003cli\u003eIf patching is not immediately possible, customers should block external access to ports 2083, 2087, 2095, and 2096, or stop the cpsrvd and cpdavd core services.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"detection-and-research\"\u003eDetection and Research\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe vendor provided a detection script to check for compromise indicators, recommending session purging, credential resets, log audits, and persistence mechanism investigations if signs of intrusion are found.\u003c/li\u003e\n\u003cli\u003eSecurity firm watchTowr published a detailed technical analysis explaining how the bug can be triggered to bypass authentication.\u003c/li\u003e\n\u003cli\u003ewatchTowr also released a Detection Artifact Generator script to verify if cPanel and WHM instances are vulnerable to CVE-2026-41940.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["CVE-2026-41940 is a critical authentication bypass vulnerability affecting cPanel, WHM, and WP Squared that has been actively exploited in the wild since late February 2026.","The flaw results from improper session handling that writes unsanitized user input from the Authorization header into server-side session files before authentication occurs.","Exploiting this vulnerability grants attackers complete control over the host system, its configurations, databases, and managed websites.","Administrators should immediately apply the emergency patches released on April 28, 2026, or block external access to ports 2083, 2087, 2095, and 2096 if patching is delayed."],"insights":["The authentication bypass allows password-less login because the system writes unsanitized user input from the Authorization header into session files before the authentication process begins.","If patching is not immediately possible, administrators can mitigate the vulnerability by stopping the cpsrvd and cpdavd core services, in addition to blocking access to specific ports.","The vendor clarified that the vulnerability only affects cPanel versions greater than 11.40, significantly narrowing the scope of potentially impacted systems compared to initial reports.","watchTowr researchers published a Detection Artifact Generator script to help administrators verify if their cPanel and WHM instances are vulnerable to the flaw."],"referencedReports":[{"title":"Security CVE-2026-41940 cPanel WHM WP2 Security Update 04-28-2026","url":"http://support.cpanel.net/hc/en-us/articles/40073787579671-Security-CVE-2026-41940-cPanel-WHM-WP2-Security-Update-04-28-2026","publisher":"cPanel","context":"The article references this official security advisory to clarify affected software versions and recommend restarting the cpsrvd service."},{"title":"CVE-2026-41940 cPanel \u0026 WHM Authentication Bypass","url":"https://www.rapid7.com/blog/post/etr-cve-2026-41940-cpanel-whm-authentication-bypass/","publisher":"Rapid7","context":"The article cites this technical analysis regarding the vulnerability's impact and Shodan scan data showing approximately 1.5 million exposed instances."}],"body":"\u003cp\u003eA critical authentication bypass vulnerability, CVE-2026-41940, is actively being exploited in the wild against cPanel, WHM, and WP Squared systems. The flaw stems from a CRLF injection in the login and session loading processes that allows attackers to bypass password validation entirely. Hosting providers like KnownHost and Namecheap have confirmed active exploitation attempts dating back to late February 2026.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability grants attackers complete control over host systems, configurations, databases, and managed websites. cPanel released an emergency security update on April 28, 2026, to address the issue across multiple software versions. Administrators are strongly advised to apply the latest patches immediately or block external access to specific management ports if patching is delayed.\u003c/p\u003e\n\n\u003cp\u003eDetection scripts and vulnerability verification tools have also been published by security researchers to help identify compromised instances.\u003c/p\u003e\n"},{"n":6,"title":"Hackers earning millions from hijacked cargo, FBI says","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/hackers-earning-millions-from-hijacked-cargo-fbi","time":"20:22","priority":"MUST READ","score":95,"group":"F","groupColor":"#34d399","tldr":"Cybercriminals are hijacking hundreds of millions of dollars in cargo by compromising logistics broker and carrier systems to post fake loads and reroute shipments. This attack vector has caused a 60% surge in theft losses and includes ransom demands from threat actors impersonating legitimate companies.","briefOverview":"\u003cp\u003eCybercriminals stole nearly $725 million worth of cargo in the U.S. and Canada last year through a sophisticated rerouting scheme. According to a recent FBI advisory, threat actors have spent the past two years compromising the systems of freight brokers and carriers. These attackers impersonate legitimate companies to post fraudulent listings on online load boards. Legitimate carriers bid on these fake jobs and inadvertently hand over control of their systems through malicious agreements. Hackers then redirect shipments using a process called double-brokering, altering official FMCSA contact and insurance details to bypass standard restrictions. Cargo theft losses surged by 60% in 2025 compared to the previous year, with the average theft value increasing by 36%. Victims across multiple sectors, including vape manufacturers and auto dealerships, have reported significant financial losses. Compromised carriers typically remain unaware of the breach until brokers report missing shipments. In some cases, the hackers demand ransom for the hijacked cargo via email or phone.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybercriminals are earning millions by hijacking nearly \u003cspan class=\"math inline\"\u003e\\(725 million worth of cargo across the U.S. and Canada over the past year. This surge in theft is driven by a coordinated campaign where threat actors impersonate logistics companies to reroute deliveries. FBI officials released an advisory detailing how attackers have spent the last two years breaching broker and carrier networks. The criminals trick brokers and carriers into surrendering goods by redirecting packages away from their intended destinations. Consequently, cargo theft losses skyrocketed by 60% in 2025 compared to 2024, while the average value of each incident increased by 36%. Industry professionals have expressed growing concern over the hijacking of high-value shipments, including a recent incident where a vape company lost \\)\u003c/span\u003e1 million in products. A New York car dealership representative confirmed that multiple vehicles shipped from overseas have been stolen over the past 16 months. The attacks consistently target online freight marketplaces known as load boards. Threat actors spoof brokers via email, sending malicious links that compromise carrier systems and grant unauthorized access. Once inside, criminals impersonate legitimate brokers and post tens of thousands of fake loads on the boards. Legitimate carriers bid on these fraudulent listings and contact the attackers, who then distribute malicious broker agreements to fully compromise the carrier\u0026rsquo;s computers. Hackers subsequently pose as the compromised carriers to accept shipments posted to the load boards. In some operations, they execute double-brokering by inserting unauthorized stops into the delivery chain, allowing them to intercept cargo at alternate locations. The attackers also modify the legitimate carrier\u0026rsquo;s official FMCSA contact and insurance information to approve loads that would otherwise be rejected. Compromised carriers usually do not discover the breach until brokers reach out with complaints about missing cargo. Finally, some cybercriminals have begun demanding ransom for the stolen goods, contacting victims through email and phone calls, occasionally using overseas numbers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"article-overview\"\u003eArticle Overview\u003c/h2\u003e\n\n\u003cp\u003eCybercriminals are generating millions of dollars by hijacking nearly $725 million worth of cargo throughout the United States and Canada. This massive financial loss stems from a coordinated wave of cyberattacks where threat actors impersonate logistics firms to reroute freight shipments. A recent FBI advisory outlines how these cybercriminals have systematically compromised broker and carrier systems over the past two years. The primary objective is to trick logistics networks into surrendering goods by redirecting packages away from their original destinations.\u003c/p\u003e\n\n\u003ch2 id=\"attack-methodology-and-execution\"\u003eAttack Methodology and Execution\u003c/h2\u003e\n\n\u003cp\u003eThe campaign heavily relies on the exploitation of online freight marketplaces, commonly referred to as load boards. Threat actors begin by spoofing legitimate brokers through email, delivering malicious links that infiltrate carrier networks and grant unauthorized system access. Once compromised, attackers impersonate brokers and flood the platforms with tens of thousands of fraudulent load postings. Legitimate carriers inadvertently bid on these fake jobs and contact the threat actors, who then distribute malicious broker agreements to fully compromise the carrier\u0026rsquo;s internal systems. Hackers subsequently assume the identity of the compromised carriers to accept shipments directed to the load boards.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDouble-Brokering Tactics:\u003c/strong\u003e Attackers frequently insert unauthorized stops into the delivery chain. This forces an unwitting driver to transport the package to a secondary location, where the cybercriminals intercept and collect the stolen cargo.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRegulatory Manipulation:\u003c/strong\u003e Threat actors actively modify the legitimate carrier\u0026rsquo;s official Federal Motor Carrier Safety Administration (FMCSA) contact details and insurance information. This manipulation allows them to approve and accept loads that the compromised carrier would normally reject due to compliance restrictions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"financial-impact-and-industry-scope\"\u003eFinancial Impact and Industry Scope\u003c/h2\u003e\n\n\u003cp\u003eThe financial toll of these cyber-enabled thefts has escalated dramatically. Cargo theft losses surged by 60% in 2025 compared to 2024, while the average monetary value of each incident increased by 36%. Industry stakeholders have voiced significant frustration over the hijacking of high-value, large-scale shipments. For instance, a vape manufacturer recently lost $1 million worth of products following a hacking-hijacking incident. Similarly, a source from a New York car dealership reported that multiple vehicles shipped from overseas have been stolen over the past 16 months.\u003c/p\u003e\n\n\u003ch2 id=\"detection-challenges-and-extortion-tactics\"\u003eDetection Challenges and Extortion Tactics\u003c/h2\u003e\n\n\u003cp\u003eCompromised carriers typically remain unaware of the intrusion until brokers contact them with complaints about missing cargo. This delayed detection allows threat actors to operate across multiple shipments before the breach is identified. Beyond simple theft, some cybercriminals have escalated their operations by demanding ransom for the hijacked loads. Victims are contacted through email and phone communications, with some incidents involving calls from overseas numbers. The FBI advisory serves as a critical warning to the logistics sector, emphasizing the need for enhanced email security, load board verification, and FMCSA record monitoring.\u003c/p\u003e\n","keyPoints":["Cybercriminals are stealing nearly $725 million worth of cargo by breaching logistics broker and carrier systems to post fraudulent listings on freight message boards.","Threat actors impersonate legitimate brokers and carriers to reroute shipments through double-brokering, often altering official carrier contact and insurance information with the FMCSA.","Cargo theft losses increased by 60% in 2025 compared to 2024, while the average value of each theft rose by 36%.","Compromised carriers usually remain unaware of the breach until brokers report missing shipments, and some hackers subsequently demand ransom for the stolen cargo."],"insights":["Compromised carriers often remain unaware of the breach until brokers report missing cargo, highlighting a critical detection gap in internal system monitoring.","Attackers manipulate official FMCSA records to alter a carrier's contact and insurance details, bypassing standard load acceptance restrictions to legitimize fraudulent shipments.","The primary access vector involves spoofed broker emails with malicious links that compromise carrier systems and enable the posting of thousands of fake loads.","Threat actors are increasingly monetizing the theft through direct extortion, contacting brokers via email and phone to demand ransom for the hijacked cargo."],"referencedReports":[{"title":"FBI IC3 Advisory (PSA260430)","url":"https://www.ic3.gov/PSA/260430","publisher":"FBI / IC3","context":"The article cites this advisory as the source for the FBI's warning about cyber actors impersonating brokers and posting fake loads on freight message boards."}],"body":"\u003cp\u003eCybercriminals stole nearly $725 million worth of cargo in the U.S. and Canada last year through a sophisticated rerouting scheme. According to a recent FBI advisory, threat actors have spent the past two years compromising the systems of freight brokers and carriers. These attackers impersonate legitimate companies to post fraudulent listings on online load boards. Legitimate carriers bid on these fake jobs and inadvertently hand over control of their systems through malicious agreements. Hackers then redirect shipments using a process called double-brokering, altering official FMCSA contact and insurance details to bypass standard restrictions. Cargo theft losses surged by 60% in 2025 compared to the previous year, with the average theft value increasing by 36%. Victims across multiple sectors, including vape manufacturers and auto dealerships, have reported significant financial losses. Compromised carriers typically remain unaware of the breach until brokers report missing shipments. In some cases, the hackers demand ransom for the hijacked cargo via email or phone.\u003c/p\u003e\n"},{"n":17,"title":"New Linux ‘Copy Fail’ flaw gives hackers root on major distros","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/new-linux-copy-fail-flaw-gives-hackers-root-on-major-distros/","time":"13:54","priority":"MUST READ","score":95,"group":"E","groupColor":"#a78bfa","tldr":"Researchers have disclosed CVE-2026-31431, a highly reliable Linux kernel flaw that grants unprivileged users root access across all major distributions since 2017. Administrators should immediately apply the latest kernel updates or disable the vulnerable AF_ALG crypto interface to prevent exploitation.","briefOverview":"\u003cp\u003eResearchers at Theori have disclosed a critical Linux kernel vulnerability dubbed \u0026ldquo;Copy Fail\u0026rdquo; (CVE-2026-31431) that enables unprivileged local attackers to gain root privileges. The flaw stems from a logic bug in the kernel\u0026rsquo;s crypto template and impacts all major distributions running kernels released since 2017. By leveraging the AF_ALG socket interface and the splice() system call, attackers can write four controlled bytes into the page cache of any readable file. When these bytes overwrite a setuid-root binary, they reliably trigger a privilege escalation to root.\u003c/p\u003e\n\n\u003cp\u003eThe researchers developed a 732-byte Python exploit that achieves a 100% success rate across tested environments. Kernel maintainers addressed the issue by reverting a problematic 2017 optimization, releasing patches in versions 6.18.22, 6.19.12, and 7.0. Administrators are advised to apply these updates immediately or disable the vulnerable algif_aead module as a temporary workaround.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe security firm Theori has published a proof-of-concept exploit for a local privilege escalation vulnerability identified as CVE-2026-31431. Dubbed \u0026ldquo;Copy Fail,\u0026rdquo; this flaw affects Linux kernels released since 2017 and grants unprivileged local users root access. The vulnerability was discovered in approximately one hour by scanning the Linux crypto subsystem using Theori\u0026rsquo;s AI-driven pentesting platform, Xint Code.\u003c/p\u003e\n\n\u003cp\u003eThey reported the finding to the Linux kernel security team on March 23, and patches became available within a week. The issue originates from a logic bug in the Linux kernel\u0026rsquo;s authencesn cryptographic template that allows a four-byte write into the page cache of any readable system file. Attackers combine the AF_ALG socket-based interface with the splice() system call to manipulate kernel buffers instead of standard user-space buffers.\u003c/p\u003e\n\n\u003cp\u003eWhen these four bytes overwrite a setuid-root binary, they alter its execution behavior and successfully escalate privileges to root. The researchers demonstrated a consistently effective 732-byte Python script that achieves a 100% success rate across Ubuntu 24.04 LTS, Amazon Linux 2023, RHEL 10.1, and SUSE 16. Theori notes that the exploit is more portable and practical than the earlier Dirty Pipe vulnerability, covering the entire 2017 to 2026 kernel window without needing offsets.\u003c/p\u003e\n\n\u003cp\u003eThe upstream Linux kernel team fixed the issue on April 1st by reverting the problematic in-place crypto optimization introduced in version 4.14. Official updates are now available in kernel versions 6.18.22, 6.19.12, and 7.0. While major distributions are actively pushing these updates, analysts note that no official security advisory has been published yet.\u003c/p\u003e\n\n\u003cp\u003eAs an immediate workaround, administrators can disable the vulnerable crypto interface by blacklisting the algif_aead module. Priority patching is strongly recommended for multi-tenant Linux hosts, Kubernetes clusters, CI runners, and cloud SaaS platforms that execute user code.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"vulnerability-overview-and-discovery\"\u003eVulnerability Overview and Discovery\u003c/h2\u003e\n\n\u003cp\u003eThe security company Theori has disclosed a critical local privilege escalation flaw dubbed \u0026ldquo;Copy Fail\u0026rdquo; (CVE-2026-31431). This vulnerability impacts Linux kernels released since 2017 and enables unprivileged local attackers to gain root permissions. Theori researchers discovered the issue in under an hour by scanning the Linux crypto subsystem using their AI-driven pentesting platform, Xint Code. They reported the finding to the Linux kernel security team on March 23, and patches became available within a week.\u003c/p\u003e\n\n\u003ch2 id=\"technical-root-cause-and-exploitation\"\u003eTechnical Root Cause and Exploitation\u003c/h2\u003e\n\n\u003cp\u003eThe flaw is a logic bug located in the Linux kernel\u0026rsquo;s authencesn cryptographic template. It allows an authenticated user to perform a four-byte write into the page cache of any readable file on the system. Attackers combine the AF_ALG socket-based interface with the splice() system call to force the kernel to write controlled data into a buffer instead of a normal page cache location. When these four bytes overwrite a setuid-root binary, they alter the binary\u0026rsquo;s execution behavior. This manipulation reliably triggers a privilege escalation to root.\u003c/p\u003e\n\n\u003cp\u003eThe researchers developed a 732-byte Python-based proof-of-concept exploit that achieves a 100% success rate across tested environments. The exploit has been successfully demonstrated on Ubuntu 24.04 LTS, Amazon Linux 2023, RHEL 10.1, and SUSE 16. Theori researchers characterize the flaw as more portable and broadly exploitable than typical local privilege escalation bugs. Unlike the Dirty Pipe vulnerability, which required specific kernel versions and patches, Copy Fail covers the entire 2017 to 2026 kernel window without needing offsets.\u003c/p\u003e\n\n\u003ch2 id=\"remediation-and-mitigation\"\u003eRemediation and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eThe upstream Linux kernel team fixed the issue on April 1st by reverting the problematic in-place crypto optimization introduced in version 4.14. Patches are now available in kernel versions 6.18.22, 6.19.12, and 7.0. Major distributions are actively pushing these updates, though analysts note that no official security advisory has been published yet. As an immediate workaround, administrators can disable the vulnerable crypto interface by blacklisting the algif_aead module.\u003c/p\u003e\n\n\u003cp\u003eTo implement this mitigation, administrators should run the following commands:\necho \u0026ldquo;install algif_aead /bin/false\u0026rdquo; \u0026gt; /etc/modprobe.d/disable-algif.conf\nrmmod algif_aead\u003c/p\u003e\n\n\u003cp\u003ePriority patching is strongly recommended for multi-tenant Linux hosts, Kubernetes clusters, CI runners, and cloud SaaS platforms that execute user code.\u003c/p\u003e\n","keyPoints":["The \"Copy Fail\" vulnerability (CVE-2026-31431) is a logic bug in the Linux kernel's crypto template that allows unprivileged local attackers to gain root permissions on all major distributions running kernels since 2017.","Researchers developed a 732-byte Python exploit that reliably escalates privileges by writing four controlled bytes into the page cache of setuid-root binaries using the AF_ALG socket interface and splice() system call.","The Linux kernel team fixed the issue on April 1st by reverting the problematic in-place crypto optimization, with patches released in versions 6.18.22, 6.19.12, and 7.0.","Administrators should immediately apply kernel updates or disable the algif_aead module as an interim mitigation to block the vulnerable crypto interface."],"insights":["The exploit's universal portability across all major distributions since 2017 eliminates the need for kernel-specific offsets, making it significantly more practical and broadly exploitable than comparable flaws like Dirty Pipe.","The vulnerability was discovered in under an hour by an AI-driven pentesting platform scanning the crypto subsystem, demonstrating how automated tools can rapidly surface deep logic bugs in long-standing kernel optimization paths.","Researchers explicitly prioritize patching multi-tenant environments such as Kubernetes clusters, CI runners, and cloud SaaS platforms, as these shared-hosting architectures provide the unprivileged local access required to trigger the escalation.","A rapid interim mitigation involves blacklisting the algif_aead module via /etc/modprobe.d/, which effectively severs the AF_ALG socket interface attack vector without requiring an immediate kernel update."],"referencedReports":[{"title":"Detailed write-up on Copy Fail vulnerability","url":"https://xint.io/blog/copy-fail-linux-distributions","publisher":"Xint Code / Theori","context":"The article references this link as the detailed write-up where researchers explain the root cause and exploitation mechanics of the flaw."},{"title":"OSS-Security mailing list advisory for kernel fixes","url":"https://www.openwall.com/lists/oss-security/2026/04/29/23","publisher":"Openwall / oss-security","context":"The article cites this mailing list post as the source confirming the upstream kernel versions containing the patches for CVE-2026-31431."}],"body":"\u003cp\u003eResearchers at Theori have disclosed a critical Linux kernel vulnerability dubbed \u0026ldquo;Copy Fail\u0026rdquo; (CVE-2026-31431) that enables unprivileged local attackers to gain root privileges. The flaw stems from a logic bug in the kernel\u0026rsquo;s crypto template and impacts all major distributions running kernels released since 2017. By leveraging the AF_ALG socket interface and the splice() system call, attackers can write four controlled bytes into the page cache of any readable file. When these bytes overwrite a setuid-root binary, they reliably trigger a privilege escalation to root.\u003c/p\u003e\n\n\u003cp\u003eThe researchers developed a 732-byte Python exploit that achieves a 100% success rate across tested environments. Kernel maintainers addressed the issue by reverting a problematic 2017 optimization, releasing patches in versions 6.18.22, 6.19.12, and 7.0. Administrators are advised to apply these updates immediately or disable the vulnerable algif_aead module as a temporary workaround.\u003c/p\u003e\n"},{"n":18,"title":"New Linux 'Copy Fail' Vulnerability Enables Root Access on Major Distributions","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/04/new-linux-copy-fail-vulnerability.html","time":"09:24","priority":"MUST READ","score":95,"group":"E","groupColor":"#a78bfa","tldr":"A new Linux kernel vulnerability, CVE-2026-31431, allows any unprivileged local user to reliably escalate privileges to root across major distributions by corrupting the page cache of setuid binaries. This portable flaw bypasses sandboxing and poses a significant cross-container security risk without requiring race conditions.","briefOverview":"\u003cp\u003eResearchers from Xint.io and Theori have disclosed CVE-2026-31431, a high-severity Linux local privilege escalation flaw codenamed Copy Fail. This vulnerability allows an unprivileged local user to write four controlled bytes into the page cache of any readable file, ultimately granting root access. The flaw originates from a logic error in the kernel\u0026rsquo;s algif_aead cryptographic module that was introduced in a 2017 source code commit. Exploitation requires a simple 732-byte Python script that corrupts the cached copy of a setuid binary like /usr/bin/su to inject and execute shellcode. While not remotely exploitable, the vulnerability reliably bypasses sandboxing and works across all major Linux distributions shipped since 2017. Major vendors including Ubuntu, RHEL, SUSE, Debian, and Amazon Linux have already released security advisories. The issue shares architectural similarities with the Dirty Pipe vulnerability but operates within a different subsystem. Its reliability and cross-container impact make it a significant threat to local system security.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers at Xint.io and Theori have publicly disclosed details regarding CVE-2026-31431, a critical Linux local privilege escalation vulnerability. Tracked with a CVSS score of 7.8, the flaw is codenamed Copy Fail and enables any unprivileged local user to escalate privileges to root. The vulnerability stems from a logic flaw within the Linux kernel\u0026rsquo;s algif_aead cryptographic module, which was introduced by a source code commit in August 2017. Exploitation is achieved through a straightforward 732-byte Python script that executes in four distinct phases. The script first opens an AF_ALG socket and binds it to authencesn(hmac(sha256),cbc(aes)). It then constructs a shellcode payload and triggers a write operation targeting the kernel\u0026rsquo;s cached copy of a setuid binary such as /usr/bin/su. Finally, the script calls execve to load the injected shellcode and execute it with root privileges. Although the flaw cannot be exploited remotely, local attackers can reliably corrupt the page cache of unowned files to achieve code execution. The vulnerability also carries significant cross-container implications because the page cache is shared across all processes on the system. In response to the disclosure, major Linux distributions including Amazon Linux, Debian, Red Hat Enterprise Linux, SUSE, and Ubuntu have published official security advisories. Security experts note that Copy Fail echoes the Dirty Pipe vulnerability, sharing the same class of page cache corruption primitive but operating within a different subsystem. Bugcrowd researcher David Brumley highlighted that the 2017 in-place optimization incorrectly routes page-cache pages into a writable scatterlist for AEAD operations. This architectural quirk allows an unprivileged process to drive splice() into the socket and complete targeted writes into the page cache. Unlike many kernel exploits, Copy Fail does not require race conditions or kernel offsets to function reliably. The researchers emphasize that the vulnerability is uniquely portable, tiny, stealthy, and capable of bypassing container sandboxing across all affected Linux versions.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"vulnerability-overview\"\u003eVulnerability Overview\u003c/h2\u003e\n\n\u003cp\u003eResearchers from Xint.io and Theori have disclosed CVE-2026-31431, a high-severity Linux local privilege escalation (LPE) flaw codenamed Copy Fail. The vulnerability carries a CVSS score of 7.8 and fundamentally alters how unprivileged users interact with the kernel\u0026rsquo;s page cache. By exploiting a logic flaw in the kernel\u0026rsquo;s cryptographic subsystem, attackers can write four controlled bytes into the page cache of any readable file on the system. This primitive ultimately grants the attacker full root access without requiring remote network access.\u003c/p\u003e\n\n\u003ch2 id=\"technical-mechanism-and-exploitation\"\u003eTechnical Mechanism and Exploitation\u003c/h2\u003e\n\n\u003cp\u003eThe core issue originates from a logic flaw within the \u003ccode\u003ealgif_aead\u003c/code\u003e module, introduced via a source code commit in August 2017. Exploitation is achieved through a compact 732-byte Python script that follows a precise four-step sequence. The script first opens an AF_ALG socket and binds it to authencesn(hmac(sha256),cbc(aes)). It then constructs a shellcode payload within the script environment. Next, the script triggers a write operation that targets the kernel\u0026rsquo;s cached copy of a setuid binary, specifically \u003ccode\u003e/usr/bin/su\u003c/code\u003e. Finally, the script executes \u003ccode\u003eexecve(\u0026quot;/usr/bin/su\u0026quot;)\u003c/code\u003e, which loads the injected shellcode and runs it with root privileges.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-cross-container-scope\"\u003eImpact and Cross-Container Scope\u003c/h2\u003e\n\n\u003cp\u003eWhile the vulnerability is strictly local and cannot be exploited remotely, its impact extends far beyond a single user session. An unprivileged user can reliably corrupt the page cache of a setuid binary to achieve immediate root access. Because the Linux page cache is shared across all processes on the host, the vulnerability carries significant cross-container implications. This shared memory architecture allows a single local compromise to cascade across isolated containers, effectively neutralizing container sandboxing boundaries.\u003c/p\u003e\n\n\u003ch2 id=\"vendor-response-and-historical-context\"\u003eVendor Response and Historical Context\u003c/h2\u003e\n\n\u003cp\u003eMajor Linux distributions have already responded to the disclosure by publishing official security advisories. Affected vendors include Amazon Linux, Debian, Red Hat Enterprise Linux, SUSE, and Ubuntu. Security analysts note that Copy Fail shares architectural similarities with the Dirty Pipe vulnerability (CVE-2022-0847), as both rely on page cache corruption primitives. However, Copy Fail operates within a different subsystem and leverages a distinct exploitation path. Bugcrowd researcher David Brumley clarified that the 2017 in-place optimization in \u003ccode\u003ealgif_aead\u003c/code\u003e allows a page-cache page to incorrectly end up in the kernel\u0026rsquo;s writable destination scatterlist. This misconfiguration enables an unprivileged process to drive \u003ccode\u003esplice()\u003c/code\u003e into the socket and complete small, targeted writes into the page cache of files it does not own.\u003c/p\u003e\n\n\u003ch2 id=\"key-differentiators-and-reliability\"\u003eKey Differentiators and Reliability\u003c/h2\u003e\n\n\u003cp\u003eThe Copy Fail vulnerability stands out due to its consistent reliability and lack of complex exploitation requirements. Unlike many kernel flaws, it does not depend on race conditions or kernel offset detection to function. The researchers describe the vulnerability as uniquely portable, tiny, stealthy, and cross-container. These combined properties allow any user account, regardless of privilege level, to escalate to full administrative access. Furthermore, the exploit bypasses standard sandboxing mechanisms and remains effective across all Linux versions and distributions shipped since 2017.\u003c/p\u003e\n","keyPoints":["Researchers have disclosed CVE-2026-31431, a high-severity Linux local privilege escalation flaw that allows unprivileged users to gain root access by corrupting the page cache of setuid binaries.","The vulnerability stems from a logic flaw in the kernel's algif_aead cryptographic module introduced in August 2017 and can be exploited using a simple 732-byte Python script.","Major Linux distributions including Ubuntu, RHEL, SUSE, Debian, and Amazon Linux have released security advisories to address the issue.","The exploit is portable across all affected distributions, requires no race conditions or kernel offsets, and impacts all processes sharing the system's page cache."],"insights":["The vulnerability exploits a 2017 kernel optimization that incorrectly routes page-cache pages into a writable scatterlist, allowing splice() to inject shellcode into unowned file caches.","The flaw reliably bypasses typical LPE mitigations by requiring no race conditions or kernel offsets, making it consistently exploitable across all major distributions since 2017.","Because the page cache is shared system-wide, a single local compromise can cascade across all containers, effectively neutralizing container isolation boundaries.","Attackers can achieve root by corrupting the cached copy of a setuid binary like /usr/bin/su rather than modifying the file on disk, enabling stealthy privilege escalation that avoids file integrity monitoring."],"referencedReports":[{"title":"Copy Fail Linux Distributions Research","url":"https://xint.io/blog/copy-fail-linux-distributions","publisher":"Xint.io and Theori","context":"Cited as the primary vulnerability research report detailing how unprivileged users can corrupt page cache to gain root access."},{"title":"What We Know About Copy Fail (CVE-2026-31431)","url":"https://www.bugcrowd.com/blog/what-we-know-about-copy-fail-cve-2026-31431/","publisher":"Bugcrowd","context":"Referenced as a technical analysis explaining the 2017 kernel optimization flaw and the mechanics of the splice() exploitation primitive."},{"title":"Linux Distribution Security Advisories","url":"https://explore.alas.aws.amazon.com/CVE-2026-31431.html","publisher":"Amazon Linux, Debian, Red Hat, SUSE, Ubuntu","context":"Explicitly listed as official advisories released by major Linux distributions in response to the vulnerability disclosure."}],"body":"\u003cp\u003eResearchers from Xint.io and Theori have disclosed CVE-2026-31431, a high-severity Linux local privilege escalation flaw codenamed Copy Fail. This vulnerability allows an unprivileged local user to write four controlled bytes into the page cache of any readable file, ultimately granting root access. The flaw originates from a logic error in the kernel\u0026rsquo;s algif_aead cryptographic module that was introduced in a 2017 source code commit. Exploitation requires a simple 732-byte Python script that corrupts the cached copy of a setuid binary like /usr/bin/su to inject and execute shellcode. While not remotely exploitable, the vulnerability reliably bypasses sandboxing and works across all major Linux distributions shipped since 2017. Major vendors including Ubuntu, RHEL, SUSE, Debian, and Amazon Linux have already released security advisories. The issue shares architectural similarities with the Dirty Pipe vulnerability but operates within a different subsystem. Its reliability and cross-container impact make it a significant threat to local system security.\u003c/p\u003e\n"},{"n":21,"title":"PyTorch Lightning Compromised in PyPI Supply Chain Attack to Steal Credentials","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/04/pytorch-lightning-compromised-in-pypi.html","time":"16:31","priority":"MUST READ","score":95,"group":"Y","groupColor":"#ca9a04","tldr":"PyTorch Lightning versions 2.6.2 and 2.6.3 were compromised in a supply chain attack to harvest credentials and propagate malware, requiring users to immediately downgrade to 2.6.1 and rotate exposed secrets.","briefOverview":"\u003cp\u003ePyTorch Lightning versions 2.6.2 and 2.6.3 were compromised in a PyPI supply chain attack to steal developer credentials and propagate malware. The malicious packages automatically execute upon import, downloading a JavaScript runtime that harvests GitHub tokens and injects worm-like payloads into repository branches. The campaign is linked to the Mini Shai-Hulud incident and threat actor TeamPCP, who also targeted Intercom and SAP packages.\u003c/p\u003e\n\n\u003cp\u003eMaintainers have quarantined the affected versions and advised users to downgrade to 2.6.1 while rotating exposed credentials. The attack silently overwrites files and impersonates Anthropic\u0026rsquo;s Claude Code in every poisoned commit to maintain persistence.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThreat actors compromised the popular Python framework PyTorch Lightning by publishing two malicious versions, 2.6.2 and 2.6.3, on April 30, 2026. PyPI administrators have since quarantined the project to halt the credential theft campaign. The attack extends the Mini Shai-Hulud supply chain incident that previously targeted SAP-related npm packages.\u003c/p\u003e\n\n\u003cp\u003eOnce installed, the package automatically runs a hidden downloader upon module import without requiring any user interaction. This downloader fetches the Bun JavaScript runtime and executes an 11-megabyte obfuscated payload designed to harvest credentials. The malware specifically validates stolen GitHub tokens against a public API endpoint before using them to inject worm-like payloads into up to fifty repository branches.\u003c/p\u003e\n\n\u003cp\u003eEvery poisoned commit is authored using a hardcoded identity that impersonates Anthropic\u0026rsquo;s Claude Code. The operation silently overwrites existing files and creates new ones without performing any pre-checks. Security researchers from Aikido, OX Security, Socket, and StepSecurity have documented the attack chain and payload behavior.\u003c/p\u003e\n\n\u003cp\u003eThe project maintainers acknowledged the compromise and are investigating the root cause, which likely stems from a breached GitHub account. In a separate advisory, they confirmed the affected versions contain credential-harvesting functionality. Users are strongly advised to block versions 2.6.2 and 2.6.3, downgrade to the clean 2.6.1 release, and rotate all exposed credentials.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is attributed to TeamPCP, a threat actor known for compromising Bitwarden, Checkmarx, and LiteLLM. TeamPCP recently launched a dark web onion site after being suspended from X for violating platform rules. They claimed affiliation with the LAPSUS$ group and denied using VECT encryption tools.\u003c/p\u003e\n\n\u003cp\u003eIn a related development, Intercom version 7.0.4 was compromised as part of the same campaign. The Intercom package uses a preinstall hook to trigger credential-stealing malware, mirroring the modus operandi of the SAP CAP campaign.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003ePyTorch Lightning versions 2.6.2 and 2.6.3 were compromised in a sophisticated supply chain attack targeting credential theft and malware propagation. PyPI administrators quarantined the project on April 30, 2026, after the malicious releases were published. The incident is assessed as an extension of the Mini Shai-Hulud campaign and is attributed to threat actor TeamPCP.\u003c/p\u003e\n\n\u003ch3 id=\"attack-mechanics-and-payload-execution\"\u003eAttack Mechanics and Payload Execution\u003c/h3\u003e\n\n\u003cp\u003eThe compromised packages contain a hidden \u003ccode\u003e_runtime\u003c/code\u003e directory housing a downloader and an obfuscated JavaScript payload. The execution chain triggers automatically upon module import without requiring any additional user action. The attack proceeds through a precise sequence of operations. A Python script named \u003ccode\u003estart.py\u003c/code\u003e downloads and executes the Bun JavaScript runtime. The runtime then processes an 11-megabyte obfuscated payload (\u003ccode\u003erouter_runtime.js\u003c/code\u003e) designed for comprehensive credential harvesting. Harvested GitHub tokens are validated against the \u003ccode\u003eapi.github.com/user\u003c/code\u003e endpoint before being leveraged to inject worm-like payloads into up to 50 repository branches.\u003c/p\u003e\n\n\u003ch3 id=\"persistence-and-propagation-vectors\"\u003ePersistence and Propagation Vectors\u003c/h3\u003e\n\n\u003cp\u003eThe malware employs stealthy persistence mechanisms and cross-environment propagation strategies. The operation functions as an upsert, silently overwriting existing files and creating new ones without performing any pre-checks. Every poisoned commit is authored using a hardcoded identity designed to impersonate Anthropic\u0026rsquo;s Claude Code. The malware also implements an npm-based propagation vector that modifies local developer environments. It injects a postinstall hook into the \u003ccode\u003epackage.json\u003c/code\u003e file, increments the patch version number, and repacks \u003ccode\u003e.tgz\u003c/code\u003e tarballs. If developers publish tampered packages from their local systems, the malware distributes to downstream users.\u003c/p\u003e\n\n\u003ch3 id=\"attribution-and-related-campaigns\"\u003eAttribution and Related Campaigns\u003c/h3\u003e\n\n\u003cp\u003eSecurity researchers from Aikido Security, OX Security, Socket, and StepSecurity have analyzed the attack and linked it to known threat actors. TeamPCP is identified as the primary threat actor behind this operation and the broader Mini Shai-Hulud campaign. The group recently launched a dark web onion site after being suspended from X for violating platform rules. They claimed affiliation with the LAPSUS$ group and denied using VECT encryption tools, asserting ownership of a private locker called CipherForce. In a related development, Intercom version 7.0.4 was compromised as part of the same campaign. The Intercom package uses a preinstall hook to trigger credential-stealing malware, mirroring the modus operandi of the SAP CAP campaign.\u003c/p\u003e\n\n\u003ch3 id=\"mitigation-and-advisory\"\u003eMitigation and Advisory\u003c/h3\u003e\n\n\u003cp\u003eThe PyTorch Lightning maintainers have acknowledged the compromise and are actively investigating the root cause. Indications point to a compromised GitHub account as the initial entry point. A security advisory confirms that the affected versions introduced functionality consistent with a credential harvesting mechanism. Users are advised to take immediate containment actions. Block and uninstall PyTorch Lightning versions 2.6.2 and 2.6.3 from all systems. Downgrade to the last known clean version, 2.6.1. Rotate all credentials and tokens exposed in affected development environments. Monitor repository branches for unauthorized commits authored under the Claude Code identity.\u003c/p\u003e\n","keyPoints":["PyTorch Lightning versions 2.6.2 and 2.6.3 were compromised and quarantined by PyPI administrators to prevent credential theft via obfuscated JavaScript payloads.","The malicious packages automatically execute a downloader that installs the Bun runtime to harvest GitHub tokens and inject worm-like payloads into developer repositories.","Users are advised to immediately remove the affected versions, downgrade to the clean version 2.6.1, and rotate any credentials exposed in their environments.","The attack is assessed as part of the Mini Shai-Hulud supply chain incident linked to threat actor TeamPCP, which also compromised Intercom and SAP packages."],"insights":["The malware executes automatically upon module import without requiring additional user action, bypassing typical installation-stage defenses.","The attack propagates through npm by hijacking the postinstall hook in package.json and repacking .tgz tarballs, turning local development environments into distribution vectors for downstream users.","Every poisoned commit is authored using a hardcoded identity impersonating Anthropic's Claude Code, and files are silently overwritten without pre-checks, complicating forensic attribution and detection."],"referencedReports":[{"title":"pytorch-lightning-pypi-compromise-mini-shai-hulud","url":"https://www.aikido.dev/blog/pytorch-lightning-pypi-compromise-mini-shai-hulud","publisher":"Aikido Security","context":"Cited as a source detailing the PyPI compromise and its connection to the Mini Shai-Hulud supply chain incident."},{"title":"lightning-python-package-shai-hulud-supply-chain-attack/","url":"https://www.ox.security/blog/lightning-python-package-shai-hulud-supply-chain-attack/","publisher":"OX Security","context":"Cited as a source analyzing the attack's operational details and supply chain impact."},{"title":"lightning-pypi-package-compromised","url":"https://socket.dev/blog/lightning-pypi-package-compromised","publisher":"Socket","context":"Cited as a source explaining the malicious package's hidden runtime directory and automatic execution chain upon module import."},{"title":"lightning-obfuscated-javascript-credential-stealer-bundled-in-pypi-wheel","url":"https://www.stepsecurity.io/blog/lightning-obfuscated-javascript-credential-stealer-bundled-in-pypi-wheel","publisher":"StepSecurity","context":"Cited as a source identifying the obfuscated JavaScript payload and the credential-harvesting mechanism."},{"title":"intercom-s-npm-package-compromised-in-supply-chain-attack","url":"https://socket.dev/blog/intercom-s-npm-package-compromised-in-supply-chain-attack","publisher":"Socket","context":"Cited as a source confirming the Intercom npm package compromise and its technical overlap with the SAP CAP campaign."}],"body":"\u003cp\u003ePyTorch Lightning versions 2.6.2 and 2.6.3 were compromised in a PyPI supply chain attack to steal developer credentials and propagate malware. The malicious packages automatically execute upon import, downloading a JavaScript runtime that harvests GitHub tokens and injects worm-like payloads into repository branches. The campaign is linked to the Mini Shai-Hulud incident and threat actor TeamPCP, who also targeted Intercom and SAP packages.\u003c/p\u003e\n\n\u003cp\u003eMaintainers have quarantined the affected versions and advised users to downgrade to 2.6.1 while rotating exposed credentials. The attack silently overwrites files and impersonates Anthropic\u0026rsquo;s Claude Code in every poisoned commit to maintain persistence.\u003c/p\u003e\n"},{"n":23,"title":"Google Fixes CVSS 10 Gemini CLI CI RCE and Cursor Flaws Enable Code Execution","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/04/google-fixes-cvss-10-gemini-cli-ci-rce.html","time":"07:07","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"Google patched a critical CVSS 10.0 RCE flaw in Gemini CLI by mandating explicit folder trust, while Cursor IDE remains vulnerable to high-severity code execution and credential theft through autonomous Git operations and uncontrolled extension access. These vulnerabilities underscore the critical need for strict sandboxing and explicit trust controls in AI-powered development tools to prevent supply-chain attacks and data theft.","briefOverview":"\u003cp\u003eGoogle has patched a critical CVSS 10.0 remote code execution vulnerability in Gemini CLI that allowed unprivileged attackers to bypass sandbox initialization and execute arbitrary commands on host systems. The flaw primarily impacted headless CI environments where the tool automatically trusted workspace folders without explicit user consent. Google addressed this by mandating explicit folder trust through the GEMINI_TRUST_WORKSPACE environment variable and hardening tool allowlisting in \u0026ndash;yolo mode. Separately, researchers identified a high-severity CVSS 8.1 vulnerability in Cursor IDE prior to version 2.5 that enables arbitrary code execution through prompt injection. This exploit leverages malicious Git hooks embedded in nested bare repositories, triggering silently outside the AI agent\u0026rsquo;s reasoning chain and the user\u0026rsquo;s visibility. Additionally, an unpatched CVSS 8.2 access control flaw in Cursor allows installed extensions to extract local API keys and credentials from a SQLite database. Security teams are advised to update Gemini CLI immediately and review Cursor extension permissions to mitigate these risks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGoogle recently addressed a maximum severity CVSS 10.0 security flaw in the Gemini CLI npm package and its associated GitHub Actions workflow. This vulnerability permitted unprivileged external attackers to inject malicious configuration files that triggered direct command execution on host systems. The flaw circumvented the agent’s sandbox initialization and lacked a CVE identifier. It impacted Gemini CLI versions below 0.39.1 and 0.40.0-preview.3, as well as the GitHub Actions workflow below version 0.1.22. Google clarified that the impact is restricted to headless CI workflows that previously auto-trusted workspace folders for configuration loading. To remediate the issue, Google requires administrators to explicitly trust directories using the GEMINI_TRUST_WORKSPACE environment variable. The update also enforces tool allowlist evaluation in \u0026ndash;yolo mode, which may cause silent failures in pipelines relying on unrestricted command execution. In parallel, Novee Security disclosed a CVSS 8.1 vulnerability in Cursor IDE versions prior to 2.5. This flaw enables arbitrary code execution via prompt injection by exploiting autonomous Git operations within nested bare repositories. The attack chain begins when a user opens a repository containing a malicious post-checkout hook and requests a codebase explanation. Cursor’s agent then parses AGENTS.md, triggers a git checkout, and silently executes the hook outside both the agent’s reasoning chain and user visibility. Researchers attribute this to a Git feature interaction that becomes dangerous when AI agents autonomously manage uncontrolled repositories. Furthermore, LayerX Security identified an unpatched CVSS 8.2 access control vulnerability dubbed CursorJacking. This flaw allows any locally installed extension to extract sensitive API keys and session tokens from a local SQLite database. Cursor maintains that exploitation requires prior user installation and permission grants for the extension. Organizations are urged to update Gemini CLI immediately, configure explicit folder trust, and restrict Cursor extensions to only trusted sources.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"gemini-cli-critical-rce-vulnerability\"\u003eGemini CLI Critical RCE Vulnerability\u003c/h3\u003e\n\n\u003cp\u003eGoogle has patched a CVSS 10.0 remote code execution flaw in the \u003ccode\u003e@google/gemini-cli\u003c/code\u003e npm package and its associated GitHub Actions workflow. This vulnerability permitted unprivileged attackers to inject malicious configuration files that triggered direct command execution on host systems. The execution bypassed the agent’s sandbox initialization entirely. The flaw currently lacks a CVE identifier and impacts several specific software versions.\u003c/p\u003e\n\n\u003cp\u003eGoogle’s advisory emphasizes that the impact is confined to headless CI environments. Previously, Gemini CLI automatically trusted workspace folders to load configuration and environment variables without review. This automatic trust mechanism enabled attackers to weaponize untrusted directory contents for supply-chain attacks. To resolve this, Google mandates explicit folder trust before configuration files can be accessed.\u003c/p\u003e\n\n\u003cp\u003eAdministrators must configure workflows using one of two approaches depending on input trust levels. Workflows processing trusted inputs should set the \u003ccode\u003eGEMINI_TRUST_WORKSPACE\u003c/code\u003e environment variable to true. Those handling untrusted inputs must follow Google’s hardening guidance and configure appropriate environment variables. Additionally, version 0.39.1 now evaluates tool allowlisting even when Gemini CLI runs in \u003ccode\u003e--yolo\u003c/code\u003e mode. This change prevents prompt injection attacks from untrusted inputs by restricting auto-approved tool calls. Consequently, CI pipelines that previously depended on unrestricted command execution may fail silently unless their allowlists are updated.\u003c/p\u003e\n\n\u003ch3 id=\"cursor-ide-code-execution-and-access-control-flaws\"\u003eCursor IDE Code Execution and Access Control Flaws\u003c/h3\u003e\n\n\u003cp\u003eConcurrently, researchers highlighted a CVSS 8.1 vulnerability in Cursor IDE prior to version 2.5 that enables arbitrary code execution through prompt injection. The exploit chain unfolds through a specific sequence of actions starting with a user cloning a repository. The repository contains an embedded bare repository with a malicious post-checkout hook. When the user opens the repository in CursorIDE and requests a codebase explanation, the agent parses an \u003ccode\u003eAGENTS.md\u003c/code\u003e file. The agent then navigates to the bare repository and executes a \u003ccode\u003egit checkout\u003c/code\u003e of the master branch. The post-checkout hook triggers automatically, executing arbitrary code without requiring user interaction.\u003c/p\u003e\n\n\u003cp\u003eSecurity researchers note that the root cause stems from a Git feature interaction that becomes exploitable when an AI agent autonomously executes Git operations. The malicious hook executes silently outside the agent’s reasoning chain and the user’s field of view. This highlights a broader risk when AI tools manage uncontrolled repositories without explicit boundaries.\u003c/p\u003e\n\n\u003cp\u003eIn addition to the code execution flaw, Cursor contains an unpatched CVSS 8.2 access control vulnerability known as CursorJacking. This issue permits any installed extension to access sensitive API keys and credentials stored locally in an SQLite database. Exploitation could lead to session token exposure, unauthorized backend access, and financial loss from unauthorized API usage. Cursor states that access is limited to the local machine where the extension was installed and granted permissions. The company advises users to exclusively download and install trusted extensions to mitigate this threat.\u003c/p\u003e\n","keyPoints":["Google patched a CVSS 10.0 remote code execution flaw in Gemini CLI by implementing explicit folder trust requirements to prevent malicious configuration loading in headless CI environments.","The Gemini CLI vulnerability affected versions prior to 0.39.1 and 0.1.22, allowing unprivileged attackers to bypass sandbox initialization and execute arbitrary commands on host systems.","Cursor IDE versions prior to 2.5 contain a CVSS 8.1 vulnerability that enables arbitrary code execution through prompt injection exploiting malicious Git hooks in nested bare repositories.","Cursor also features an unpatched CVSS 8.2 access control flaw that allows installed extensions to extract sensitive API keys and credentials from a local SQLite database."],"insights":["Gemini CLI's patch enforces tool allowlist evaluation even in `--yolo` mode, meaning CI pipelines relying on unrestricted command execution will fail silently unless explicitly updated.","The Cursor Git hook vulnerability executes malicious code completely outside the AI agent's reasoning chain and user visibility by leveraging autonomous Git operations in nested bare repositories.","Cursor's unpatched \"CursorJacking\" flaw reveals that local extension trust boundaries are insufficient, as any installed extension can extract API keys and credentials from a local SQLite database without backend access controls."],"referencedReports":[{"title":"Google Gemini CLI RCE Vulnerability CVSS 10 Critical Security Advisory","url":"https://novee.security/blog/google-gemini-cli-rce-vulnerability-cvss-10-critical-security-advisory/","publisher":"Novee Security","context":"Cited as a Wednesday report detailing how the vulnerability allowed unprivileged attackers to bypass sandbox initialization and execute arbitrary commands."},{"title":"GHSA-wpqr-6v78-jr5g","url":"https://github.com/google-github-actions/run-gemini-cli/security/advisories/GHSA-wpqr-6v78-jr5g","publisher":"Google","context":"Referenced as Google's published advisory explaining the headless mode folder trust mechanism and required configuration updates."},{"title":"GHSA-8pcm-8jpx-hv8r","url":"https://github.com/cursor/cursor/security/advisories/GHSA-8pcm-8jpx-hv8r","publisher":"Cursor","context":"Referenced as a February 2026 alert describing the sandbox escape vulnerability enabled by malicious Git hooks in nested repositories."},{"title":"Cursor IDE CVE-2026-26268 Git Hook Arbitrary Code Execution","url":"https://novee.security/blog/cursor-ide-cve-2026-26268-git-hook-arbitrary-code-execution/","publisher":"Novee Security","context":"Cited as technical research by Assaf Levkovich explaining how autonomous Git operations trigger malicious hooks outside the AI agent's reasoning chain."},{"title":"CursorJacking: Every Cursor User is Vulnerable to API Key Theft by Rogue Extensions","url":"https://layerxsecurity.com/blog/cursorjacking-every-cursor-user-is-vulnerable-to-api-key-theft-by-rogue-extensions/","publisher":"LayerX Security","context":"Cited as research by Roy Paz detailing the unpatched access control flaw that allows installed extensions to extract local API keys and credentials."}],"body":"\u003cp\u003eGoogle has patched a critical CVSS 10.0 remote code execution vulnerability in Gemini CLI that allowed unprivileged attackers to bypass sandbox initialization and execute arbitrary commands on host systems. The flaw primarily impacted headless CI environments where the tool automatically trusted workspace folders without explicit user consent. Google addressed this by mandating explicit folder trust through the GEMINI_TRUST_WORKSPACE environment variable and hardening tool allowlisting in \u0026ndash;yolo mode. Separately, researchers identified a high-severity CVSS 8.1 vulnerability in Cursor IDE prior to version 2.5 that enables arbitrary code execution through prompt injection. This exploit leverages malicious Git hooks embedded in nested bare repositories, triggering silently outside the AI agent\u0026rsquo;s reasoning chain and the user\u0026rsquo;s visibility. Additionally, an unpatched CVSS 8.2 access control flaw in Cursor allows installed extensions to extract local API keys and credentials from a SQLite database. Security teams are advised to update Gemini CLI immediately and review Cursor extension permissions to mitigate these risks.\u003c/p\u003e\n"},{"n":24,"title":"lightning: Obfuscated JavaScript Credential Stealer Bundled in PyPI Wheel","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/lightning-obfuscated-javascript-credential-stealer-bundled-in-pypi-wheel","time":"15:56","priority":"MUST READ","score":95,"group":"Y","groupColor":"#ca9a04","tldr":"Compromised versions of the widely used lightning Python package silently execute a malicious JavaScript payload that steals credentials, exfiltrates data via GitHub, and poisons downstream npm packages.","briefOverview":"\u003cp\u003eOn April 30, 2026, a supply chain compromise was identified in versions 2.6.2 and 2.6.3 of the widely used lightning PyPI package. Upon import, the malicious wheels silently execute a hidden JavaScript payload that downloads the Bun runtime and runs an 11 MB obfuscated script. This payload steals tokens, credentials, environment variables, and cloud secrets from the victim\u0026rsquo;s machine.\u003c/p\u003e\n\n\u003cp\u003eIt then abuses the victim\u0026rsquo;s GitHub credentials to commit the exfiltrated data directly to repositories. Additionally, the malware infects npm package tarballs on the developer\u0026rsquo;s machine to spread the attack further. The last known clean release is version 2.6.1 from January 30, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe attacker likely holds both PyPI publishing credentials and a GitHub token, as evidenced by the rapid closure of a public issue reporting the attack. This campaign follows the Shai-Hulud pattern of downloading external runtimes at execution time to bypass static analysis. Security tools like StepSecurity\u0026rsquo;s Harden-Runner can detect the underlying process-level memory dumping used by this family of attacks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe lightning package, maintained by Lightning AI, is a foundational deep learning framework that receives hundreds of thousands of daily downloads across research and production environments. Compromised versions 2.6.2 and 2.6.3 were published on January 30, 2026, and contain a hidden \u003ccode\u003e_runtime/\u003c/code\u003e directory within the wheel files. This directory houses a Python script that silently downloads the Bun JavaScript runtime from GitHub during package import.\u003c/p\u003e\n\n\u003cp\u003eA daemon thread then executes an 11 MB heavily obfuscated JavaScript file named \u003ccode\u003erouter_runtime.js\u003c/code\u003e without producing any visible output or errors. Static analysis of the Python wheel cannot reveal the payload\u0026rsquo;s true capabilities because the malicious logic is entirely contained within the fetched JavaScript file. Once executed, the payload scans for and exfiltrates tokens, API keys, authentication material, environment variables, and cloud secrets.\u003c/p\u003e\n\n\u003cp\u003eIt leverages the victim\u0026rsquo;s own GitHub credentials to encode and commit the stolen data directly to repositories. The malware also injects malicious code into npm package tarballs on the local machine, enabling the compromise to propagate to downstream JavaScript consumers. The attack follows the Shai-Hulud pattern, a supply chain technique first documented in a November 2025 npm compromise that affected hundreds of packages.\u003c/p\u003e\n\n\u003cp\u003eIndicators of a token-based takeover are evident in the project\u0026rsquo;s GitHub repository, where an issue reporting the attack was rapidly closed by suspicious responses. StepSecurity\u0026rsquo;s Harden-Runner platform detects this threat by monitoring process-level behavior, specifically flagging unauthorized memory access attempts that dump the GitHub Actions runner\u0026rsquo;s address space. Full payload analysis remains ongoing, and the organization plans to update its findings as new details emerge.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview-and-background\"\u003eOverview and Background\u003c/h2\u003e\n\n\u003cp\u003eThe lightning package, developed by Lightning AI, serves as a widely adopted high-level interface for training PyTorch models. It functions as a critical dependency across research environments, MLOps pipelines, and production AI systems. The framework routinely processes highly sensitive infrastructure secrets, including GPU cluster credentials, cloud IAM tokens, Hugging Face API keys, and Weights \u0026amp; Biases tokens.\u003c/p\u003e\n\n\u003cp\u003eThis high-value target profile makes the package a prime objective for credential-stealing campaigns. Supply chain compromise was identified in PyPI versions 2.6.2 and 2.6.3, which bundle a concealed \u003ccode\u003e_runtime/\u003c/code\u003e directory. This directory contains a Python script that silently downloads the Bun JavaScript runtime binary from GitHub upon package import.\u003c/p\u003e\n\n\u003ch2 id=\"attack-vector-and-execution-mechanism\"\u003eAttack Vector and Execution Mechanism\u003c/h2\u003e\n\n\u003cp\u003eA background daemon thread immediately executes an 11 MB heavily obfuscated JavaScript payload named \u003ccode\u003erouter_runtime.js\u003c/code\u003e. The thread operates with suppressed standard output and error streams, ensuring the process runs invisibly while the victim\u0026rsquo;s application continues without errors. This technique aligns with the Shai-Hulud supply chain attack family, which relies on downloading external runtimes at execution time to circumvent static analysis.\u003c/p\u003e\n\n\u003ch2 id=\"payload-capabilities-and-data-exfiltration\"\u003ePayload Capabilities and Data Exfiltration\u003c/h2\u003e\n\n\u003cp\u003eStatic analysis of the JavaScript payload reveals extensive scanning logic targeting system processes and authentication material. The malware confirms the following malicious capabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCredential Theft:\u003c/strong\u003e The script harvests tokens, API keys, authentication material, environment variables, and cloud secrets from the host environment.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGitHub API Abuse:\u003c/strong\u003e Exfiltrated data is encoded and committed to repositories using the victim\u0026rsquo;s own GitHub credentials, effectively masking the theft as legitimate repository activity.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003enpm Tarball Poisoning:\u003c/strong\u003e The payload injects malicious code into npm package tarballs on the developer\u0026rsquo;s machine, allowing the compromise to spread to downstream JavaScript consumers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise-and-account-takeover\"\u003eIndicators of Compromise and Account Takeover\u003c/h2\u003e\n\n\u003cp\u003eThe project\u0026rsquo;s GitHub repository exhibits clear signs of a token-based account compromise coinciding with the malicious releases. Issue #21689, which publicly surfaced the attack, was rapidly closed by suspicious responses, indicating the attacker maintains active administrative control. This behavior suggests the threat actor successfully obtained both PyPI publishing credentials and a GitHub token, bypassing direct build-system compromises in favor of credential-based access.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-se
