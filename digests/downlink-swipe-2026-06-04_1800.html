ailable as both a standalone browser download and an upgrade option for existing Brave installations. The company says the license is a one-time $59.99 purchase and can be used on up to 10 devices. Users installing the Linux version can get Brave Origin for free.\u003c/p\u003e\n\n\u003cp\u003eThe launch prompted criticism from some users who said Brave is charging people to remove features they viewed as unnecessary or unwanted. One Reddit user argued that Brave began by protecting users from the web’s monetization layers but that the browser itself became another monetization layer over time. That user said Brave Origin confirms the issue by making the clean, stripped-down, privacy-focused version a paid product.\u003c/p\u003e\n\n\u003cp\u003eOther users pointed out that many features removed by Brave Origin can already be disabled in the free Brave version using enterprise group policies. Because of that, some questioned whether Brave Origin adds meaningful differences beyond packaging those configuration settings into an easier-to-use interface. Defenders argued that most users are unlikely to manually configure enterprise policies and that Brave Origin offers a more accessible way to get a cleaner privacy-oriented browser while supporting the privacy project.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eBrave Software announced the public release of Brave Origin, a paid minimalist version of its browser. The company describes Brave Origin as a bloat-free browser for users who want Brave’s privacy features without cryptocurrency, AI, rewards, and other monetization-focused components.\u003c/p\u003e\n\n\u003cp\u003eBrave says the product is intended for users who do not need all of Brave’s out-of-the-box features but still want the privacy that the company says only Brave offers. The release positions Brave Origin as a cleaner, more streamlined alternative to the standard Brave browser.\u003c/p\u003e\n\n\u003ch2 id=\"features-removed\"\u003eFeatures Removed\u003c/h2\u003e\n\n\u003cp\u003eAccording to Brave, Brave Origin turns off a range of optional and promotional features included in the standard browser. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBrave Rewards\u003c/li\u003e\n\u003cli\u003eBrave Wallet\u003c/li\u003e\n\u003cli\u003eBrave VPN promotions\u003c/li\u003e\n\u003cli\u003eBrave Leo AI\u003c/li\u003e\n\u003cli\u003eBrave News\u003c/li\u003e\n\u003cli\u003eBrave Talk\u003c/li\u003e\n\u003cli\u003eSponsored images\u003c/li\u003e\n\u003cli\u003eOther promotional or monetization components\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that Brave Origin removes or disables these features to provide a minimalist, bloat-free browsing experience.\u003c/p\u003e\n\n\u003ch2 id=\"privacy-features-retained\"\u003ePrivacy Features Retained\u003c/h2\u003e\n\n\u003cp\u003eBrave Origin continues to include Brave Shields. The article describes Brave Shields as the browser’s built-in privacy and ad-blocking protections.\u003c/p\u003e\n\n\u003cp\u003eThis means the paid Origin version removes monetization and promotional features while retaining the privacy and ad-blocking protections that Brave highlights as core to its browser.\u003c/p\u003e\n\n\u003ch2 id=\"availability-and-pricing\"\u003eAvailability and Pricing\u003c/h2\u003e\n\n\u003cp\u003eBrave Origin is available in two forms:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAs a standalone browser download\u003c/li\u003e\n\u003cli\u003eAs an upgrade option for existing Brave installations\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe company says the license is a one-time purchase of $59.99 in the United States. That license can be used to activate the software on up to 10 devices. The article also states that users installing the Linux version can get Brave Origin for free.\u003c/p\u003e\n\n\u003ch2 id=\"user-criticism\"\u003eUser Criticism\u003c/h2\u003e\n\n\u003cp\u003eThe launch has raised criticism from users who argue that Brave is charging users to remove features many already viewed as unnecessary and unwanted. One Reddit user said Brave originally sold users on a browser that protected them from the web’s monetization layers, but that over time the browser itself became another monetization layer.\u003c/p\u003e\n\n\u003cp\u003eThat user argued that Brave Origin confirms the problem because the clean, stripped-down, privacy-focused version is now a paid product. The criticism focuses on the idea that a less promotional browser experience is being packaged as a premium offering.\u003c/p\u003e\n\n\u003ch2 id=\"questions-about-practical-differences\"\u003eQuestions About Practical Differences\u003c/h2\u003e\n\n\u003cp\u003eSome users also pointed out that many of the features removed in Brave Origin can already be disabled in the free Brave browser through enterprise group policies. The article says this led some users to question whether Brave Origin provides meaningful differences beyond packaging those configuration settings into an easier-to-use interface.\u003c/p\u003e\n\n\u003cp\u003eThis suggests that part of the debate is not only about pricing but also about whether Brave Origin is technically distinct from a manually configured free Brave installation.\u003c/p\u003e\n\n\u003ch2 id=\"defense-of-the-project\"\u003eDefense of the Project\u003c/h2\u003e\n\n\u003cp\u003eDefenders of Brave Origin argue that most users are unlikely to manually configure enterprise policies. From that perspective, Brave Origin offers a more accessible way to obtain a cleaner, privacy-oriented browser.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that supporters see the paid version as a way to support the privacy project. This defense frames Brave Origin as a convenience and support mechanism rather than simply a paid removal of unwanted features.\u003c/p\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall Significance\u003c/h2\u003e\n\n\u003cp\u003eThe most significant point in the article is that Brave has introduced a paid version of its browser that removes several monetization and promotional features while keeping its core privacy protections. The release has created debate among users over whether Brave is improving accessibility to a cleaner browser or charging for an experience that some believe should already be standard.\u003c/p\u003e\n","keyPoints":["Brave Software announced the public release of Brave Origin, a paid minimalist version of its browser that removes cryptocurrency, AI, rewards, and other monetization-focused features.","Brave Origin disables features including Brave Rewards, Brave Wallet, Brave VPN promotions, Brave Leo AI, Brave News, Brave Talk, sponsored images, and other promotional or monetization components.","Brave Origin still includes Brave Shields, the browser's built-in privacy and ad-blocking protections.","Brave Origin is available as a standalone browser download and as an upgrade option for existing Brave installations, with a one-time $59.99 license for up to 10 devices and a free Linux version.","Some users criticized Brave Origin as charging users to remove unwanted features, while others noted that many of those features can already be disabled in the free Brave version using enterprise group policies."],"insights":["Brave Origin’s main practical value may be convenience rather than new functionality, since users noted that many removed features can already be disabled in the free Brave browser through enterprise group policies.","The pricing model creates an unusual split in which Linux users can get Brave Origin for free, while other users are charged a one-time $59.99 license for up to 10 devices.","The launch highlights a tension in Brave’s privacy-focused positioning, as critics argue the standard browser has accumulated monetization features to the point that a stripped-down version is now being sold as a separate product."],"referencedReports":[],"body":"\u003cp\u003eBrave Software announced the public release of Brave Origin, a paid minimalist version of its browser. The company describes it as a bloat-free option for users who want Brave’s privacy protections without cryptocurrency, AI, rewards, and other monetization-focused features. Brave says the browser is intended for users who do not need all of Brave’s out-of-the-box features but still want its privacy capabilities.\u003c/p\u003e\n\n\u003cp\u003eBrave Origin turns off components including Brave Rewards, Brave Wallet, Brave VPN promotions, Brave Leo AI, Brave News, Brave Talk, sponsored images, and other promotional or monetization features. The browser continues to include Brave Shields, Brave’s built-in privacy and ad-blocking protections. It is available both as a standalone download and as an upgrade option for existing Brave installations.\u003c/p\u003e\n\n\u003cp\u003eThe license is a one-time $59.99 purchase that can activate the software on up to 10 devices, while the Linux version is free. The launch has drawn criticism from users who argue that Brave is charging to remove features they already considered unnecessary or unwanted. Others noted that many of the same features can already be disabled in the free Brave browser using enterprise group policies.\u003c/p\u003e\n"},{"n":1,"title":"Tenable joins Anthropic’s Project Glasswing to advance AI-era cyber defense","source":"tenable.com","sourceColor":"#ca9a04","link":"https://www.tenable.com/blog/anthropic-claude-mythos-tenable-joins-project-glasswing","time":"20:30","priority":"MAY READ","score":52,"tldr":"Tenable is joining Anthropic’s Project Glasswing to test how Claude Mythos Preview can improve exposure management tasks like attack path analysis, risk prioritization, and remediation. The partnership is also aimed at helping Tenable and its customers better understand and secure the growing AI attack surface.","briefOverview":"\u003cp\u003eTenable announced that it is joining Anthropic’s Project Glasswing and working with Claude Mythos Preview. The company says it will evaluate and benchmark how the frontier AI model’s advanced reasoning capabilities can improve exposure management programs. Areas of focus include attack path analysis, exposure prioritization, and remediation.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the move as part of Tenable’s broader effort to prepare for how AI will reshape cybersecurity. Tenable says vulnerability discovery is accelerating, attack surfaces are expanding, and security teams are overwhelmed by the volume of findings. It argues that defenders will need to understand what matters most and reduce exposure before attackers strike.\u003c/p\u003e\n\n\u003cp\u003eTenable also says it wants to understand emerging frontier AI model behaviors, their risks and benefits, and the controls organizations will need as AI adoption accelerates. The company links this work to its existing partnership with Anthropic, including a prior integration of Tenable One with the Claude Compliance API and Claude-powered workflows in Tenable Hexa AI.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTenable is participating in Anthropic’s Project Glasswing and working with Claude Mythos Preview to study how frontier AI can support cyber defense. The company says the work will focus on evaluating and benchmarking advanced reasoning capabilities in exposure management. Specific areas include attack path analysis, exposure prioritization, and remediation decision-making.\u003c/p\u003e\n\n\u003cp\u003eThe article presents this as a response to a changing cybersecurity environment shaped by AI. Tenable says the pace of vulnerability discovery is accelerating, attack surfaces are expanding, and security teams are struggling to determine which findings actually matter. It also says frontier AI models could accelerate cyber offense and challenge cyber defense over the next few years.\u003c/p\u003e\n\n\u003cp\u003eTenable emphasizes that defender advantage will not come from access to any single AI model. Instead, it says advantage will come from understanding the most important exposures, reducing risk before attackers act, and coordinating remediation at modern threat speed. The article positions exposure management as the core discipline for answering which exposures are dangerous, which combinations create attack paths, and what should be fixed first.\u003c/p\u003e\n\n\u003cp\u003eAs part of Project Glasswing, Tenable plans to use Claude Mythos Preview for new research, to reinforce existing security analysis, and to strengthen Tenable’s own defenses. The company also says it plans to use Mythos alongside other models to challenge assumptions and identify relationships and risk patterns faster than traditional approaches alone. Tenable expects frontier models to become another source of security insight and telemetry for exposure management platforms.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights the growing AI attack surface created as organizations become responsible for AI systems they did not build. Tenable says participation in Project Glasswing will help it understand model behaviors, evolving risks, and the controls organizations need as AI adoption accelerates. It connects this work to previous Anthropic-related efforts, including the integration of Tenable One with the Claude Compliance API and Claude-powered workflows in Tenable Hexa AI.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eTenable announced that it is joining Anthropic’s Project Glasswing and working with Claude Mythos Preview. The company describes this as a strategic step for defenders and an extension of its existing partnership with Anthropic.\u003c/p\u003e\n\n\u003cp\u003eThe stated goal is to evaluate and benchmark how a frontier AI model’s advanced reasoning capabilities can improve exposure management. Tenable specifically names attack path analysis, exposure prioritization, and remediation as areas where it wants to test the model’s usefulness.\u003c/p\u003e\n\n\u003ch2 id=\"why-tenable-says-this-matters\"\u003eWhy Tenable says this matters\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that AI is already reshaping cybersecurity. Tenable says vulnerability discovery is accelerating, attack surfaces are expanding faster than ever, and security teams are overwhelmed by the need to determine what actually matters.\u003c/p\u003e\n\n\u003cp\u003eTenable also says frontier AI models such as Claude Mythos Preview are demonstrating reasoning and agentic workflow capabilities that could significantly accelerate cyber offense and challenge cyber defense over the next few years. In that context, Tenable frames Project Glasswing participation as preparation for a future in which advanced AI capabilities become more widely available.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-management-focus\"\u003eExposure management focus\u003c/h2\u003e\n\n\u003cp\u003eTenable presents the central security problem as one of prioritization and context. The article says the industry already has more findings than humans can realistically process, making it essential to identify which exposures are actually dangerous and which combinations create meaningful attack paths.\u003c/p\u003e\n\n\u003cp\u003eThe exposure management questions highlighted in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhich exposures are actually dangerous.\u003c/li\u003e\n\u003cli\u003eWhich combinations create meaningful attack paths.\u003c/li\u003e\n\u003cli\u003eWhat should be fixed first.\u003c/li\u003e\n\u003cli\u003eWhich actions will materially reduce risk.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eTenable says it is working with frontier AI models to evaluate how advanced reasoning may improve exposure analysis, attack path understanding, prioritization, and remediation decision-making. The stated purpose is to help customers and partners improve their security and risk management initiatives.\u003c/p\u003e\n\n\u003ch2 id=\"use-of-claude-mythos-preview\"\u003eUse of Claude Mythos Preview\u003c/h2\u003e\n\n\u003cp\u003eAs part of Project Glasswing, Tenable says it is particularly interested in using Claude Mythos Preview to drive new research. It wants to better understand where the model can reinforce existing security analysis and help improve Tenable’s own defenses.\u003c/p\u003e\n\n\u003cp\u003eThe company also says it plans to use Mythos alongside other models. The stated purpose is to challenge assumptions and identify relationships and risk patterns faster than traditional approaches alone.\u003c/p\u003e\n\n\u003ch2 id=\"ai-as-security-insight-and-telemetry\"\u003eAI as security insight and telemetry\u003c/h2\u003e\n\n\u003cp\u003eTenable says it believes frontier AI models will increasingly become an important source of security insight and telemetry flowing into exposure management platforms. However, the article emphasizes that access to a single model will not be the long-term differentiator for defenders.\u003c/p\u003e\n\n\u003cp\u003eInstead, Tenable says the differentiator will be the ability to combine AI-derived signals with:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAuthoritative context.\u003c/li\u003e\n\u003cli\u003eAsset intelligence.\u003c/li\u003e\n\u003cli\u003eAttack path analysis.\u003c/li\u003e\n\u003cli\u003eCoordinated remediation across the enterprise.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis reflects the article’s broader position that defensive advantage depends on understanding what matters most and acting quickly, rather than relying on any one model.\u003c/p\u003e\n\n\u003ch2 id=\"ai-attack-surface-and-controls\"\u003eAI attack surface and controls\u003c/h2\u003e\n\n\u003cp\u003eThe article also addresses the expanding AI attack surface. Tenable says organizations are increasingly responsible for AI systems they did not build themselves, which creates new security responsibilities.\u003c/p\u003e\n\n\u003cp\u003eTenable says participation in frontier AI initiatives such as Project Glasswing will help it understand emerging model behaviors, evolving risks, and the controls organizations will need as AI adoption accelerates. The company says that learning will inform both its products and its own internal security practices.\u003c/p\u003e\n\n\u003ch2 id=\"existing-anthropic-related-work\"\u003eExisting Anthropic-related work\u003c/h2\u003e\n\n\u003cp\u003eTenable notes that it previously announced an integration between the Tenable One Exposure Management Platform and the Claude Compliance API. According to the article, that integration is intended to give Tenable customers better AI visibility and governance capabilities.\u003c/p\u003e\n\n\u003cp\u003eThe article also references Claude-powered workflows in Tenable Hexa AI, which it describes as the agentic engine of the Tenable One platform. These items are presented as part of Tenable’s broader partnership with Anthropic.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response-described-in-the-article\"\u003eImpact and response described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article does not describe a specific breach, exploited vulnerability, malware campaign, or named threat actor. Instead, it presents Tenable’s participation in Project Glasswing as a strategic and research-oriented response to the expected impact of frontier AI on cybersecurity.\u003c/p\u003e\n\n\u003cp\u003eTenable’s stated response includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEvaluating and benchmarking Claude Mythos Preview for exposure management use cases.\u003c/li\u003e\n\u003cli\u003eUsing the model to support new research.\u003c/li\u003e\n\u003cli\u003eExploring how frontier AI can reinforce existing security analysis.\u003c/li\u003e\n\u003cli\u003eStrengthening Tenable’s own defenses.\u003c/li\u003e\n\u003cli\u003eImproving understanding of emerging model behaviors and needed AI controls.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain takeaway\u003c/h2\u003e\n\n\u003cp\u003eTenable’s core message is that frontier AI capabilities will not remain rare and will eventually become broadly available, including to attackers. The company argues that defenders will gain advantage by understanding and reducing exposure, prioritizing what matters most, and coordinating remediation at the speed required by modern threats.\u003c/p\u003e\n","keyPoints":["Tenable is participating in Anthropic’s Project Glasswing and working with Claude Mythos Preview to evaluate how frontier AI reasoning capabilities can improve exposure management programs.","Tenable plans to assess Claude Mythos Preview for attack path analysis, exposure prioritization, remediation decision-making, and strengthening Tenable’s own security.","The article says Tenable previously integrated the Tenable One Exposure Management Platform with the Claude Compliance API to provide AI visibility and governance capabilities.","Tenable expects frontier AI models to become an important source of security insight and telemetry for exposure management platforms.","Tenable says organizations increasingly need controls for AI systems they did not build as AI adoption accelerates."],"insights":["Tenable frames the main defender advantage in the AI era as contextual exposure management and coordinated remediation, not exclusive access to any particular frontier model.","The article positions frontier AI models as future security telemetry sources that must be combined with asset intelligence, attack path analysis, and enterprise remediation workflows to be useful.","Tenable is using Project Glasswing not only for product development but also to challenge its own assumptions and improve the security of Tenable’s internal defenses.","The article highlights that organizations’ AI attack surface is expanding partly because they are becoming responsible for AI systems they did not build themselves."],"referencedReports":[],"body":"\u003cp\u003eTenable announced that it is joining Anthropic’s Project Glasswing and working with Claude Mythos Preview. The company says it will evaluate and benchmark how the frontier AI model’s advanced reasoning capabilities can improve exposure management programs. Areas of focus include attack path analysis, exposure prioritization, and remediation.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the move as part of Tenable’s broader effort to prepare for how AI will reshape cybersecurity. Tenable says vulnerability discovery is accelerating, attack surfaces are expanding, and security teams are overwhelmed by the volume of findings. It argues that defenders will need to understand what matters most and reduce exposure before attackers strike.\u003c/p\u003e\n\n\u003cp\u003eTenable also says it wants to understand emerging frontier AI model behaviors, their risks and benefits, and the controls organizations will need as AI adoption accelerates. The company links this work to its existing partnership with Anthropic, including a prior integration of Tenable One with the Claude Compliance API and Claude-powered workflows in Tenable Hexa AI.\u003c/p\u003e\n"},{"n":5,"title":"Reporting from Vegas: Networking, AI, and good boys","source":"blog.talosintelligence.com","sourceColor":"#60a5fa","link":"https://blog.talosintelligence.com/reporting-from-vegas-networking-ai-and-good-boys/","time":"18:00","priority":"MAY READ","score":40,"tldr":"Cisco Talos is expanding its Threat Hunting program to find advanced threats that evade traditional alerts by combining AI-driven telemetry analysis with human expert validation. The newsletter also highlights current security headlines and emphasizes preparing for increased patching and advisories as the summer conference season ramps up.","briefOverview":"\u003cp\u003eThe article is a Threat Source newsletter written from Cisco Live U.S. in Las Vegas, where the author describes the scale, noise, and intensity of the conference. It highlights therapy dogs, quiet spaces, and personal strategies such as using noise cancellation to manage the conference environment. The dominant conference theme described in the article is AI, especially from infrastructure and security perspectives.\u003c/p\u003e\n\n\u003cp\u003eThe main cybersecurity takeaway is that Cisco Talos is expanding its Threat Hunting program to proactively identify advanced adversaries that evade traditional detection thresholds. The program combines AI-driven telemetry analysis with human expert validation across endpoint, network, and identity data. Talos says this hypothesis-driven approach helped identify a KongTuke command-and-control discovery before a formal detection signature existed.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also summarizes several security headlines, including a monthslong email campaign against a global stock exchange, a GitHub.dev OAuth token theft issue, the Kali365 phishing kit, compromised Red Hat NPM packages, and an HTTP/2 Bomb exploit. It closes by noting that summer is bringing rapid patches and CVE advisories, with Black Hat and DEF CON approaching.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThis Threat Source newsletter is written from Cisco Live U.S. in Las Vegas and combines conference observations with cybersecurity updates. The author describes Cisco Live as a large, demanding event with many people, partners, workshops, CTFs, and symposiums. The piece also notes that therapy dogs from Healing Hounds were present at the event through a Splunk sponsorship.\u003c/p\u003e\n\n\u003cp\u003eA major theme at Cisco Live U.S. is AI, especially from an infrastructure and security perspective rather than only as a product topic. The article says discussions focused on how organizations plan to move, manage, process, and defend large volumes of data in an agentic world. It describes the scale as involving many hundreds of zettabytes of daily data and frames the challenge as difficult to fully comprehend.\u003c/p\u003e\n\n\u003cp\u003eThe central security item is Cisco Talos expanding its Threat Hunting program. The program is described as proactively tracking advanced adversaries who deliberately slip past traditional detection thresholds. It uses AI-driven telemetry analysis combined with human expert validation across endpoint, network, and identity data.\u003c/p\u003e\n\n\u003cp\u003eTalos presents the program as a response to limits in traditional detection models that alert when known-bad patterns appear. The article states that adversaries increasingly use AI to move faster and stay under the radar, leaving blind spots if defenders rely only on automated alerts. Talos says hypothesis-driven hunting can correlate weak signals across an environment to uncover complex intrusions, including a recent KongTuke command-and-control discovery before a formal detection signature existed.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also lists current security headlines from other publications. These include a global stock exchange email campaign using legitimate Windows tools, a GitHub.dev attack involving malicious VS Code extensions and OAuth tokens, Kali365 phishing-as-a-service expansion, compromised Red Hat NPM packages, and an HTTP/2 Bomb exploit affecting web server configurations. The article additionally points readers to Talos content on threat hunting and synthetic logs, and lists upcoming events including Cisco Live U.S. and Black Hat USA.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThis article is a Threat Source newsletter written from Cisco Live U.S. in Las Vegas. It blends personal conference observations, discussion of AI and security infrastructure, a primary update on Cisco Talos Threat Hunting, and a roundup of current cybersecurity headlines. The author describes Cisco Live as a large, high-energy three-day event involving people, partners, workshops, CTFs, and symposiums.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central cybersecurity focus is Cisco Talos expanding its Threat Hunting program. Talos describes the program as a proactive effort to find advanced adversaries that intentionally evade traditional detection thresholds. The program combines AI-driven telemetry analysis with human expert validation across endpoint, network, and identity data.\u003c/p\u003e\n\n\u003ch2 id=\"cisco-live-u-s-context\"\u003eCisco Live U.S. context\u003c/h2\u003e\n\n\u003cp\u003eThe newsletter opens with the author reporting from Cisco Live U.S. in Las Vegas. The author emphasizes the physical and sensory demands of attending a large technology conference, including long days, high noise levels, bright lights, and limited rest. The article recommends using Apple AirPods in noise-cancelling mode or earplugs to make the conference environment more manageable.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights the presence of therapy dogs at Cisco Live. Healing Hounds, a local Las Vegas therapy dog volunteer group, participated at the event, and Splunk sponsored them for the year. The author presents the therapy dogs and quiet spaces as helpful ways for attendees to recover during an intense technology convention.\u003c/p\u003e\n\n\u003ch2 id=\"ai-as-the-dominant-conference-theme\"\u003eAI as the dominant conference theme\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the “vibe” at Cisco Live U.S. is AI. It clarifies that the discussions are not described primarily from a product perspective, but from infrastructure and security perspectives. The author says participants are debating how organizations can move and manage large amounts of data, particularly in an agentic world.\u003c/p\u003e\n\n\u003cp\u003eThe article describes organizations as struggling with these issues in different ways. It frames Cisco Live U.S. as an opportunity for companies to discuss how to process and defend data in an AI world. The author describes the scale involved as many hundreds of zettabytes of data daily and characterizes that challenge as wild and almost incomprehensible.\u003c/p\u003e\n\n\u003ch2 id=\"main-security-focus-cisco-talos-threat-hunting-expansion\"\u003eMain security focus: Cisco Talos Threat Hunting expansion\u003c/h2\u003e\n\n\u003cp\u003eThe article’s “one big thing” is Cisco Talos expanding its Threat Hunting program. Talos says the program is designed to proactively track advanced adversaries who deliberately slip past traditional detection thresholds. The article positions this as a way to identify hidden threats before conventional signatures exist.\u003c/p\u003e\n\n\u003cp\u003eKey elements of the program include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAI-driven telemetry analysis.\u003c/li\u003e\n\u003cli\u003eHuman expert validation.\u003c/li\u003e\n\u003cli\u003eContinuous hunting across endpoint, network, and identity data.\u003c/li\u003e\n\u003cli\u003eA hypothesis-driven approach to threat discovery.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this method helped identify a recent KongTuke command-and-control discovery before a formal detection signature existed. KongTuke is the only named intrusion-related entity described in the main Talos Threat Hunting section.\u003c/p\u003e\n\n\u003ch2 id=\"why-talos-says-this-matters\"\u003eWhy Talos says this matters\u003c/h2\u003e\n\n\u003cp\u003eThe article contrasts hypothesis-driven hunting with traditional alert-based security tooling. It says many security tools operate on the principle that if a known-bad pattern appears, an alert is generated. Talos argues that this model leaves blind spots when threat actors move faster, use AI, and intentionally remain under the radar.\u003c/p\u003e\n\n\u003cp\u003eThe article says hypothesis-driven hunting addresses this gap by correlating weak signals across an environment. The goal is to help defenders piece together ambiguous anomalies and uncover sophisticated intrusions that automated alerts might miss. The article specifically frames this as important for complex intrusions that may not yet have formal detection signatures.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-response-from-the-article\"\u003eRecommended response from the article\u003c/h2\u003e\n\n\u003cp\u003eThe article advises organizations that lack dedicated headcount for continuous threat hunting to consider Cisco Talos Threat Hunting. It suggests reaching out to a Cisco account team, exploring the dedicated portal in Cisco Security Cloud Control, and reading the full Talos blog about the KongTuke command-and-control investigation. These are the article’s stated next steps for readers interested in the program.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also warns that summer is bringing what it calls the “great patchening,” with vendors beginning to issue rapid patches and CVE advisories. The author describes the current period as the quiet before the storm and notes that Black Hat and DEF CON are approaching. The article pairs this operational warning with a reminder to take care of oneself during security fire drills.\u003c/p\u003e\n\n\u003ch2 id=\"security-headlines-summarized-in-the-article\"\u003eSecurity headlines summarized in the article\u003c/h2\u003e\n\n\u003cp\u003eThe newsletter includes a section titled “Top security headlines of the week.” These are presented as brief summaries with links to external publications, not as the article’s primary reporting. The listed items are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA global stock exchange was affected by a monthslong email campaign in which a threat actor gained a near-continuous view into an influential finance executive’s inbox using legitimate native Windows tools.\u003c/li\u003e\n\u003cli\u003eA one-click GitHub.dev issue allowed attackers to install malicious VS Code extensions that could steal full GitHub OAuth tokens through a message-passing mechanism between the main VS Code window and webviews.\u003c/li\u003e\n\u003cli\u003eThe FBI-flagged Kali365 phishing-as-a-service kit expanded from Microsoft 365 targeting to include AWS, Okta, and Russian platforms while relying on device code phishing.\u003c/li\u003e\n\u003cli\u003eOfficial Red Hat NPM accounts were compromised and used to push a malicious worm that spread from machine to machine and attempted to steal sensitive credentials.\u003c/li\u003e\n\u003cli\u003eAn “HTTP/2 Bomb” exploit could knock web servers offline in seconds and potentially affected over 880,000 websites supporting HTTP/2 with default NGINX, Apache HTTPD, Microsoft IIS, Envoy, or Cloudflare Pingora configurations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"additional-talos-content-and-events\"\u003eAdditional Talos content and events\u003c/h2\u003e\n\n\u003cp\u003eThe article promotes additional Talos content. One item is “Winning the cyber marathon with Tony Giandomenico,” which discusses Talos Threat Hunting, product launch challenges, and Ironman triathlons. Another item is a Talos Takes episode titled “When synthetic logs don’t lie,” where Amy speaks with David Bianco about synthetic data and his open-source project EvidenceForge.\u003c/p\u003e\n\n\u003cp\u003eThe article lists upcoming events where Talos can be found. These include Cisco Live U.S. from May 31 to June 4 in Las Vegas, Nevada, and Black Hat USA from August 1 to August 6 in Las Vegas, Nevada.\u003c/p\u003e\n\n\u003ch2 id=\"malware-telemetry-shared-by-talos\"\u003eMalware telemetry shared by Talos\u003c/h2\u003e\n\n\u003cp\u003eThe newsletter includes a list of prevalent malware files from Talos telemetry over the past week. Each entry includes SHA256, MD5, Talos reputation URL, example filename, and detection name.\u003c/p\u003e\n\n\u003cp\u003eThe listed detections include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eWin.Worm.Coinminer::1201\u003c/code\u003e associated with example filename \u003ccode\u003eVID001.exe\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eWin.Tool.Procpatcher::1201\u003c/code\u003e associated with example filename \u003ccode\u003esample.exe\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eW32.C0AD494457-95.SBX.TG\u003c/code\u003e associated with example filename \u003ccode\u003ef_000b97.html\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ePUA.Win.Tool.Kmsactivator::\u003c/code\u003e associated with example filename \u003ccode\u003eAutoPico.exe\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eWin.Dropper.Miner::95.sbx.tg\u003c/code\u003e associated with an executable filename beginning \u003ccode\u003ed4aa3e7010220ad1b458fac17039c274_62_Exe.exe\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall significance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s most important security message is that Cisco Talos is expanding proactive, hypothesis-driven threat hunting to address adversaries that evade traditional alerting. It emphasizes that AI is affecting both attacker behavior and defender requirements, particularly through scale, telemetry, and the need to correlate weak signals across multiple data domains. The broader newsletter context places this update alongside a busy security news cycle, upcoming conference activity, and expected increases in patches and CVE advisories.\u003c/p\u003e\n","keyPoints":["Cisco Talos is expanding its Threat Hunting program to proactively track down advanced adversaries that deliberately slip past traditional detection thresholds.","The Talos Threat Hunting program combines AI-driven telemetry analysis with human expert validation across endpoint, network, and identity data.","Cisco Talos says its hypothesis-driven hunting approach helped identify a KongTuke command-and-control discovery before a formal detection signature existed.","The newsletter reports that AI was a major theme at Cisco Live U.S., especially around infrastructure, security, data movement, and data management in an agentic world.","The article lists major security headlines involving a global stock exchange email campaign, a GitHub.dev OAuth token theft issue, the Kali365 phishing kit, compromised Red Hat NPM packages, and the HTTP/2 Bomb exploit."],"insights":["The article emphasizes that relying only on known-bad detection patterns creates blind spots because advanced actors can intentionally remain below traditional alert thresholds.","Cisco Talos highlights weak-signal correlation across endpoint, network, and identity data as a practical way to uncover intrusions before formal signatures exist.","The Cisco Live discussions framed AI less as a product feature and more as an infrastructure and security scaling problem involving massive data movement and defense.","The newsletter points to the start of a “great patchening,” warning defenders to expect rapid vendor patches and CVE advisories as summer security events approach.","Several highlighted headlines involve abuse of trusted platforms or native tools, including Windows tools, GitHub.dev, official Red Hat NPM accounts, and device code phishing."],"referencedReports":[],"body":"\u003cp\u003eThe article is a Threat Source newsletter written from Cisco Live U.S. in Las Vegas, where the author describes the scale, noise, and intensity of the conference. It highlights therapy dogs, quiet spaces, and personal strategies such as using noise cancellation to manage the conference environment. The dominant conference theme described in the article is AI, especially from infrastructure and security perspectives.\u003c/p\u003e\n\n\u003cp\u003eThe main cybersecurity takeaway is that Cisco Talos is expanding its Threat Hunting program to proactively identify advanced adversaries that evade traditional detection thresholds. The program combines AI-driven telemetry analysis with human expert validation across endpoint, network, and identity data. Talos says this hypothesis-driven approach helped identify a KongTuke command-and-control discovery before a formal detection signature existed.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also summarizes several security headlines, including a monthslong email campaign against a global stock exchange, a GitHub.dev OAuth token theft issue, the Kali365 phishing kit, compromised Red Hat NPM packages, and an HTTP/2 Bomb exploit. It closes by noting that summer is bringing rapid patches and CVE advisories, with Black Hat and DEF CON approaching.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {

}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
