window.__DL_ARTICLES = [{"n":8,"title":"DentaQuest data breach  exposed info of 2.6 million accounts","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/dentaquest-data-breach-exposed-info-of-26-million-accounts/","time":"18:36","priority":"SHOULD READ","score":86,"tldr":"DentaQuest confirmed unauthorized access to part of its network after ShinyHunters leaked stolen data, with Have I Been Pwned finding records for 2.6 million accounts exposed. The leaked information includes names, emails, phone numbers, government IDs, health insurance details, genders, and dates of birth, raising phishing and identity theft risks.","briefOverview":"\u003cp\u003eDentaQuest, a dental benefits administrator that is part of Sun Life, confirmed unauthorized access to a limited portion of its network. The incident was publicly associated with ShinyHunters, which listed the company on its data leak site and claimed to have stolen more than 234 GB of data.\u003c/p\u003e\n\n\u003cp\u003eHave I Been Pwned analyzed the leaked information and found records for 2.6 million accounts. The exposed data included email addresses, full names, phone numbers, government-issued IDs, health insurance information, genders, and dates of birth.\u003c/p\u003e\n\n\u003cp\u003eDentaQuest said the incident caused limited disruption in customer service and that its systems remained fully operational. The company also said it engaged external experts to help investigate the incident and determine what data was compromised.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDentaQuest, one of the largest dental benefits administrators in the United States and part of Sun Life, reported a cybersecurity incident involving unauthorized access to a limited portion of its network. The company serves 35 million customers, operates programs in 50 states, and has a network of 140,000 dentists and dental specialists. It manages dental insurance plans and provider networks for Medicaid programs, Medicare Advantage plans, employers, health plans, and individual customers.\u003c/p\u003e\n\n\u003cp\u003eThe incident came to light after the extortion group ShinyHunters listed DentaQuest on its data leak site. The group claimed to have stolen more than 234 GB of data and later publicly leaked the data after what it described as a failure to reach an agreement with the company.\u003c/p\u003e\n\n\u003cp\u003eOn June 2, DentaQuest confirmed on its website that its networks had been breached. The company said it took immediate action after discovering the incident to secure its environment, contain the attack, and mitigate the threat. It also said its systems remained fully operational and that it continued to serve clients with limited disruption.\u003c/p\u003e\n\n\u003cp\u003eHave I Been Pwned analyzed the leaked dataset and found that it contained records for 2.6 million accounts. The exposed information included email addresses, full names, phone numbers, government-issued IDs, health insurance information, genders, and dates of birth. Have I Been Pwned also stated that roughly 66% of the exposed records were already present in its database from past incidents affecting other organizations and services.\u003c/p\u003e\n\n\u003cp\u003eDentaQuest’s statement did not confirm that the breach affected its clients, but the article notes that Have I Been Pwned is known to validate leaked datasets using multiple verification methods. People whose information may have been exposed were advised to be cautious about incoming communications because the leaked data increases the risk of social engineering and phishing attacks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eDentaQuest, a dental benefits administrator that is part of Sun Life, confirmed a cybersecurity incident involving unauthorized access to a limited portion of its network. The incident reportedly exposed sensitive data associated with 2.6 million accounts, according to an analysis by Have I Been Pwned.\u003c/p\u003e\n\n\u003cp\u003eThe breach was linked in the article to ShinyHunters, an extortion group that listed DentaQuest on its data leak site. The group claimed to have stolen more than 234 GB of data and later publicly leaked the information after what it described as a failure to reach an agreement with the company.\u003c/p\u003e\n\n\u003ch2 id=\"dentaquest-context\"\u003eDentaQuest context\u003c/h2\u003e\n\n\u003cp\u003eDentaQuest is described as one of the largest dental benefits administrators in the United States. It manages dental insurance plans and provider networks for Medicaid programs, Medicare Advantage plans, employers, health plans, and individual customers.\u003c/p\u003e\n\n\u003cp\u003eThe company says it serves 35 million customers, operates programs in 50 states, and has a network of 140,000 dentists and dental specialists.\u003c/p\u003e\n\n\u003ch2 id=\"incident-disclosure-and-company-response\"\u003eIncident disclosure and company response\u003c/h2\u003e\n\n\u003cp\u003eOn June 2, DentaQuest confirmed on its website that its networks had been breached. The company described the incident as unauthorized access to a limited portion of its network and said the event caused limited disruption in customer service.\u003c/p\u003e\n\n\u003cp\u003eDentaQuest said that upon discovering the initial incident, it took immediate action to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSecure its environment.\u003c/li\u003e\n\u003cli\u003eContain the attack.\u003c/li\u003e\n\u003cli\u003eMitigate the threat.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe company also stated that its systems remained fully operational and that it continued serving clients with limited disruption. DentaQuest said it engaged external experts to assist with the investigation and determine what data was compromised.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-claim-and-data-leak\"\u003eThreat actor claim and data leak\u003c/h2\u003e\n\n\u003cp\u003eThe article says the incident came to light after ShinyHunters listed DentaQuest on its data leak site. ShinyHunters claimed to have stolen more than 234 GB of data.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the data was publicly leaked after what the threat actor described as a failure to reach an agreement with the company.\u003c/p\u003e\n\n\u003ch2 id=\"exposed-data-identified-by-have-i-been-pwned\"\u003eExposed data identified by Have I Been Pwned\u003c/h2\u003e\n\n\u003cp\u003eHave I Been Pwned analyzed the leaked information and found records for 2.6 million accounts. The dataset reportedly included the following types of exposed information:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEmail addresses.\u003c/li\u003e\n\u003cli\u003eFull names.\u003c/li\u003e\n\u003cli\u003ePhone numbers.\u003c/li\u003e\n\u003cli\u003eGovernment-issued IDs.\u003c/li\u003e\n\u003cli\u003eHealth insurance information.\u003c/li\u003e\n\u003cli\u003eGenders.\u003c/li\u003e\n\u003cli\u003eDates of birth.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that DentaQuest’s public statement did not confirm that the breach affected its clients. However, it also notes that Have I Been Pwned is known to validate leaked datasets using multiple verification methods.\u003c/p\u003e\n\n\u003ch2 id=\"additional-exposure-context\"\u003eAdditional exposure context\u003c/h2\u003e\n\n\u003cp\u003eHave I Been Pwned also stated that roughly 66% of the exposed records were already present in its database from past incidents affecting other organizations and services. This indicates that many of the records in the DentaQuest dataset overlapped with information previously seen by Have I Been Pwned in other breaches.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-risk-to-individuals\"\u003eDisclosed impact and risk to individuals\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the main risk to potentially affected people as increased exposure to social engineering and phishing attacks. It advises people who may have had their information exposed to be cautious about all incoming communications.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed data types include both contact information and sensitive personal or health-related details, including government-issued IDs and health insurance information. The article does not state that DentaQuest confirmed client data exposure, but it reports that Have I Been Pwned found 2.6 million account records in the leaked dataset.\u003c/p\u003e\n","keyPoints":["DentaQuest confirmed that its networks were breached through unauthorized access to a limited portion of its network.","The ShinyHunters extortion group claimed to have stolen more than 234 GB of DentaQuest data and later publicly leaked it after failing to reach an agreement with the company.","Have I Been Pwned analyzed the leaked dataset and found that it contained records for 2.6 million accounts.","The exposed data included email addresses, full names, phone numbers, government-issued IDs, health insurance information, genders, and dates of birth.","DentaQuest said its systems remain fully operational and that it engaged external experts to investigate the incident and determine what data was compromised."],"insights":["The exposed dataset is especially useful for targeted social engineering because it combines contact details with government-issued IDs, health insurance information, genders, and dates of birth.","Roughly 66% of the exposed records were already present in Have I Been Pwned from previous incidents, indicating many affected people may face compounded exposure across multiple breaches.","Although DentaQuest described the intrusion as involving a limited portion of its network, Have I Been Pwned found records for 2.6 million accounts in the leaked data.","DentaQuest had not confirmed client data exposure in its statement, but Have I Been Pwned independently analyzed and listed the leaked dataset after validation."],"referencedReports":[{"title":"DentaQuest","url":"https://haveibeenpwned.com/Breach/DentaQuest","publisher":"Have I Been Pwned","context":"The article cites Have I Been Pwned's analysis of the leaked DentaQuest dataset, which found records for 2.6 million accounts and identified the exposed data types.","category":"","primary":false}],"body":"\u003cp\u003eDentaQuest, a dental benefits administrator that is part of Sun Life, confirmed unauthorized access to a limited portion of its network. The incident was publicly associated with ShinyHunters, which listed the company on its data leak site and claimed to have stolen more than 234 GB of data.\u003c/p\u003e\n\n\u003cp\u003eHave I Been Pwned analyzed the leaked information and found records for 2.6 million accounts. The exposed data included email addresses, full names, phone numbers, government-issued IDs, health insurance information, genders, and dates of birth.\u003c/p\u003e\n\n\u003cp\u003eDentaQuest said the incident caused limited disruption in customer service and that its systems remained fully operational. The company also said it engaged external experts to help investigate the incident and determine what data was compromised.\u003c/p\u003e\n"},{"n":9,"title":"Credit card theft campaign abuses Stripe to host stolen payment info","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/credit-card-theft-campaign-abuses-stripe-to-host-stolen-payment-info/","time":"20:47","priority":"SHOULD READ","score":86,"tldr":"A new Magecart credit card skimming campaign is abusing trusted Google Tag Manager and Stripe API infrastructure to load malicious code on checkout pages and store stolen payment data as fake Stripe customer records. Because the traffic goes through commonly allowed domains, the skimmer can bypass many content security and network filtering controls.","briefOverview":"\u003cp\u003eA new Magecart campaign is abusing Stripe’s API infrastructure to host both a credit card-stealing payload and stolen checkout data. Sansec discovered the malware family and reported that it is loaded through legitimate-looking Google Tag Manager containers. The activity relies on trusted domains, including googletagmanager.com and api.stripe.com, that online stores commonly allow.\u003c/p\u003e\n\n\u003cp\u003eThe skimmer targets Magento and Adobe Commerce checkout pages and attempts to capture credit card numbers, expiration dates, CVV codes, customer names, billing and email addresses, and phone numbers. The malicious code reads JavaScript from metadata fields in a Stripe customer record, reassembles it, and executes it using new Function(). Stolen data is obfuscated with XOR, stored locally, and later uploaded into fake Stripe customer records.\u003c/p\u003e\n\n\u003cp\u003eSansec also found a variant that uses Google Firestore instead of Stripe to retrieve the payload. In that version, the payload comes from a Firestore document named tracking/captcha in a project called braintree-payment-app, with stolen data stored under a different localStorage key. The article says the Stripe customer record containing the skimmer was created on December 24, 2025, suggesting the operation may have been active since at least then.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA new Magecart campaign is using trusted web infrastructure to steal credit card data from ecommerce checkout pages. According to Sansec, the campaign abuses Google Tag Manager to load malicious code and Stripe’s API infrastructure to host both the skimmer payload and the exfiltrated payment data. The article says the activity relies on googletagmanager.com and api.stripe.com, domains that online stores commonly trust and allow.\u003c/p\u003e\n\n\u003cp\u003eSansec found that the malicious code is embedded in legitimate-looking Google Tag Manager containers and executes on every page that loads them. When a shopper reaches a checkout page, the code queries Stripe’s API for a specific customer record, identified in the article as cus_TfFjAAZQNOYENR. It reads JavaScript code from the record’s metadata fields, reassembles it, and executes it using new Function().\u003c/p\u003e\n\n\u003cp\u003eThe skimmer targets Magento and Adobe Commerce checkout pages. It attempts to collect credit card numbers, expiration dates, CVV codes, customer names, billing and email addresses, and phone numbers. The stolen data is concatenated into a single string, obfuscated using XOR, and stored locally rather than being immediately sent out.\u003c/p\u003e\n\n\u003cp\u003eA separate routine retrieves the locally stored data after page load and then every minute. It splits the data blob in half, creates a new Stripe customer object, and stores the stolen data in metadata fields. The article says every stolen payment card becomes a fake customer record in the attacker’s Stripe account, turning Stripe into a storage backend for stolen data.\u003c/p\u003e\n\n\u003cp\u003eSansec also discovered a related variant that uses Google Firestore instead of Stripe. That version retrieves the payload from a Firestore document named tracking/captcha in a project called braintree-payment-app and stores stolen data in a localStorage key named _d_data\u003cem\u003ecustomer\u003c/em\u003e. The article notes that these names help the malware blend in with legitimate payment and bot-protection traffic.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name a specific threat actor beyond describing the activity as a Magecart campaign. It says the Stripe customer record containing the skimmer was created on December 24, 2025, suggesting the operation may have been active since at least that date. It also states that customers can reduce risk by using one-time virtual cards with set limits.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA new Magecart campaign is abusing trusted third-party services to steal payment card data from ecommerce checkout pages. The article reports that the campaign uses Google Tag Manager to load malicious code and Stripe’s API infrastructure to host both the credit card-stealing payload and the stolen data. Sansec, an ecommerce security company, discovered the malware family.\u003c/p\u003e\n\n\u003cp\u003eThe campaign relies on two domains that are commonly trusted by online stores: googletagmanager.com and api.stripe.com. Sansec says this trust allows the skimmer to slip past Content Security Policy rules and network filters that would otherwise flag traffic to an unknown skimmer domain.\u003c/p\u003e\n\n\u003ch2 id=\"core-technique\"\u003eCore Technique\u003c/h2\u003e\n\n\u003cp\u003eThe malicious code is embedded in legitimate-looking Google Tag Manager containers. Google Tag Manager is described in the article as a management system that allows website owners to add and manage scripts for analytics, ads, and tracking without modifying a site’s source code.\u003c/p\u003e\n\n\u003cp\u003eAccording to Sansec, the code executes on every page that loads the compromised or malicious GTM container. When a shopper reaches a checkout page, the code queries Stripe’s API for a specific customer record, identified in the article as \u003ccode\u003ecus_TfFjAAZQNOYENR\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe skimmer then reads JavaScript code from metadata fields in that Stripe customer record. It reassembles the code and executes it using \u003ccode\u003enew Function()\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"targeted-platforms-and-stolen-data\"\u003eTargeted Platforms and Stolen Data\u003c/h2\u003e\n\n\u003cp\u003eThe card skimmer targets Magento and Adobe Commerce checkout pages. It attempts to capture payment and customer information entered during checkout.\u003c/p\u003e\n\n\u003cp\u003eThe article lists the targeted data as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCredit card number\u003c/li\u003e\n\u003cli\u003eExpiration date\u003c/li\u003e\n\u003cli\u003eCVV code\u003c/li\u003e\n\u003cli\u003eCustomer name\u003c/li\u003e\n\u003cli\u003eBilling address\u003c/li\u003e\n\u003cli\u003eEmail address\u003c/li\u003e\n\u003cli\u003ePhone number\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"data-handling-and-exfiltration\"\u003eData Handling and Exfiltration\u003c/h2\u003e\n\n\u003cp\u003eThe stolen data is not immediately exfiltrated. Instead, it is concatenated into a single string, obfuscated using the XOR operation, and stored locally.\u003c/p\u003e\n\n\u003cp\u003eA separate routine retrieves the data after page load and then every minute after that. This routine splits the data blob in half, creates a new Stripe customer object, and stores the stolen information in metadata fields.\u003c/p\u003e\n\n\u003cp\u003eThe article says every stolen payment card becomes a fake customer record in the attacker’s Stripe account. In this way, Stripe is used as a storage backend for stolen data.\u003c/p\u003e\n\n\u003cp\u003eAfter the data is copied, the local file is wiped. The article says this is done to eliminate traces of the attack and prevent duplicate uploads.\u003c/p\u003e\n\n\u003ch2 id=\"firestore-variant\"\u003eFirestore Variant\u003c/h2\u003e\n\n\u003cp\u003eSansec also found a variant of the campaign that uses Google Firestore instead of Stripe. Google Firestore is described as a cloud database service for data storage and real-time retrieval.\u003c/p\u003e\n\n\u003cp\u003eIn the Firestore version, the payload is retrieved from a document named \u003ccode\u003etracking/captcha\u003c/code\u003e in a project called \u003ccode\u003ebraintree-payment-app\u003c/code\u003e. The stolen data is stored in a different localStorage key, \u003ccode\u003e_d_data_customer_\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the names of the document and project help the malware blend in with legitimate payment and bot-protection traffic.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-and-attribution\"\u003eTimeline and Attribution\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the activity as a Magecart campaign but does not identify a specific named threat actor or group. It says the Stripe customer record containing the skimmer was reportedly created on December 24, 2025.\u003c/p\u003e\n\n\u003cp\u003eThat creation date suggests the operation may have been active since at least December 24, 2025.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe notable aspect of the campaign is its use of trusted service domains for both payload delivery and stolen data storage. The article emphasizes that online stores commonly allow Stripe and Google Tag Manager domains by default.\u003c/p\u003e\n\n\u003cp\u003eBy using \u003ccode\u003eapi.stripe.com\u003c/code\u003e and \u003ccode\u003egoogletagmanager.com\u003c/code\u003e, the campaign can avoid controls that focus on detecting traffic to unknown skimmer infrastructure. Sansec specifically notes that this can help the skimmer bypass Content Security Policy rules and network filters.\u003c/p\u003e\n\n\u003ch2 id=\"customer-protection-mentioned\"\u003eCustomer Protection Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article states that customers can protect themselves from such risks by using one-time virtual cards with set limits.\u003c/p\u003e\n","keyPoints":["Sansec discovered a new Magecart campaign that uses Google Tag Manager to load malicious code and Stripe's API infrastructure to host both the credit card-stealing payload and exfiltrated data.","The skimmer targets Magento and Adobe Commerce checkout pages to capture payment card details, customer names, billing and email addresses, and phone numbers.","The malicious code retrieves JavaScript from metadata fields in a Stripe customer record, reassembles it, and executes it using new Function().","Stolen payment data is obfuscated with XOR, stored locally, and later uploaded by creating fake Stripe customer records with the data placed in metadata fields.","Sansec also found a variant that retrieves its payload from a Google Firestore document named tracking/captcha in a project called braintree-payment-app."],"insights":["The campaign is designed to exploit implicit trust in googletagmanager.com and api.stripe.com, allowing skimming traffic to evade Content Security Policy rules and network filters that would flag unknown domains.","Stripe is abused not only to deliver the skimmer but also as a storage backend, with each stolen payment card represented as a fake customer record in the attacker’s Stripe account.","The skimmer delays exfiltration by storing stolen data locally and uploading it through a separate routine after page load and every minute thereafter, then wiping the local file to reduce traces and avoid duplicate uploads.","A Firestore variant uses names such as tracking/captcha and braintree-payment-app to blend the malicious activity with legitimate payment and bot-protection traffic."],"referencedReports":[],"body":"\u003cp\u003eA new Magecart campaign is abusing Stripe’s API infrastructure to host both a credit card-stealing payload and stolen checkout data. Sansec discovered the malware family and reported that it is loaded through legitimate-looking Google Tag Manager containers. The activity relies on trusted domains, including googletagmanager.com and api.stripe.com, that online stores commonly allow.\u003c/p\u003e\n\n\u003cp\u003eThe skimmer targets Magento and Adobe Commerce checkout pages and attempts to capture credit card numbers, expiration dates, CVV codes, customer names, billing and email addresses, and phone numbers. The malicious code reads JavaScript from metadata fields in a Stripe customer record, reassembles it, and executes it using new Function(). Stolen data is obfuscated with XOR, stored locally, and later uploaded into fake Stripe customer records.\u003c/p\u003e\n\n\u003cp\u003eSansec also found a variant that uses Google Firestore instead of Stripe to retrieve the payload. In that version, the payload comes from a Firestore document named tracking/captcha in a project called braintree-payment-app, with stolen data stored under a different localStorage key. The article says the Stripe customer record containing the skimmer was created on December 24, 2025, suggesting the operation may have been active since at least then.\u003c/p\u003e\n"},{"n":7,"title":"Hola Browser for Windows compromised to deliver cryptominer","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/hola-browser-for-windows-compromised-to-deliver-cryptominer/","time":"21:27","priority":"SHOULD READ","score":80,"tldr":"Hola confirmed its Windows browser distribution pipeline was compromised in a supply-chain attack that installed an undeclared Monero cryptominer on a small share of users’ systems. The company says it rebuilt its pipeline and added stronger code-signing checks, access controls, and monitoring.","briefOverview":"\u003cp\u003eThe Windows version of Hola Browser was compromised in a supply chain attack that delivered an undeclared executable identified by researchers as a cryptocurrency miner. The issue was found during periodic AppEsteem certification checks, which Hola Browser had previously passed. Hola confirmed the compromise after being informed by AppEsteem and said the issue was also independently detected by Sygnia.\u003c/p\u003e\n\n\u003cp\u003eSophos and other cybersecurity companies involved in the evaluation found an undeclared executable named \u003ccode\u003eme.exe\u003c/code\u003e installed in some cases under \u003ccode\u003eC:\\Program Files\\Hola\\\u003c/code\u003e. Sophos reported that the file was not certified, had no timestamp, was not digitally signed, contained obfuscated code, and could write to memory. Further analysis found signs that it was a Monero cryptocurrency miner.\u003c/p\u003e\n\n\u003cp\u003eThe miner added a Windows Defender exclusion rule, copied itself as \u003ccode\u003eHolaMonitorService.exe\u003c/code\u003e, created an auto-starting Windows service named \u003ccode\u003ehola_monitor_svc\u003c/code\u003e, and ran when the computer was idle. Hola said about 0.1% of users were affected and that it had no evidence of user data access, theft, or compromise. The company said it rebuilt its distribution pipeline and added stronger code-signing verification, access controls, and continuous monitoring.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Windows version of Hola Browser was compromised in a supply chain attack that delivered an undeclared executable identified by researchers as a cryptocurrency miner. The compromise was discovered during periodic certification checks conducted as part of AppEsteem’s certification testing process. Hola Browser had previously passed those checks before the latest integrity review uncovered the issue.\u003c/p\u003e\n\n\u003cp\u003eHola Browser is a Chromium-based browser that integrates VPN and proxy functionality. Hola is an Israeli company best known for Hola VPN, which allows users to route internet traffic through other users’ devices or paid proxy infrastructure to access content from different countries. The article also notes that Hola and its products have previously attracted controversy over opaque traffic-handling practices tied to Luminati Networks, which turned free users into proxies.\u003c/p\u003e\n\n\u003cp\u003eSophos and other cybersecurity companies involved in the AppEsteem evaluation found an undeclared executable named \u003ccode\u003eme.exe\u003c/code\u003e being installed in some cases under \u003ccode\u003eC:\\Program Files\\Hola\\\u003c/code\u003e. The file had not been certified, had no timestamp, was not digitally signed, contained obfuscated code, and could write to memory. Sophos found signs that the binary was a Monero cryptocurrency miner, including strings pointing to its true nature.\u003c/p\u003e\n\n\u003cp\u003eThe miner’s behavior included adding a Windows Defender exclusion rule and copying itself to Program Files as \u003ccode\u003eHolaMonitorService.exe\u003c/code\u003e. It also created an auto-starting Windows service named \u003ccode\u003ehola_monitor_svc\u003c/code\u003e and ran when the computer was idle. These details were presented as part of Sophos’s closer examination of the binary.\u003c/p\u003e\n\n\u003cp\u003eHola was informed of the findings by AppEsteem and confirmed that it had suffered a supply chain compromise. The company said the compromise was also independently detected by cybersecurity firm Sygnia. Hola stated that about 0.1% of its users were affected and that there was no evidence of user data access, theft, or compromise.\u003c/p\u003e\n\n\u003cp\u003eHola CEO Avi Raz Cohen said the company had completely rebuilt its distribution pipeline, implemented advanced code-signing verification, and introduced tighter access controls and continuous monitoring. He said these measures were intended to ensure that only declared, certified, and signed components are delivered to users. BleepingComputer said it contacted Hola for more information about how the breach occurred, who was responsible, and whether other platforms were affected, but had not received a response by publication time.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe Windows version of Hola Browser was compromised in a supply chain attack that delivered an undeclared executable identified by researchers as a cryptocurrency miner. The compromise was uncovered during periodic certification checks performed as part of AppEsteem’s certification testing procedure. Hola Browser had previously passed this certification process before the latest checks revealed the issue.\u003c/p\u003e\n\n\u003cp\u003eHola confirmed the compromise after being informed by AppEsteem. The company also said the incident had been independently detected by cybersecurity firm Sygnia. According to Hola, about 0.1% of its users were affected, and the company said it found no evidence of user data access, theft, or compromise.\u003c/p\u003e\n\n\u003ch2 id=\"product-and-company-context\"\u003eProduct and Company Context\u003c/h2\u003e\n\n\u003cp\u003eHola is an Israeli company best known for Hola VPN. The service allows users to route internet traffic through other users’ devices or through paid proxy infrastructure to bypass geographic restrictions and access content from different countries.\u003c/p\u003e\n\n\u003cp\u003eHola Browser is based on Chromium and integrates VPN and proxy functionality directly into the browser. The article notes that Hola and its products have attracted controversy in the past because of opaque traffic-handling practices related to Luminati Networks, a commercial service that turned free users into proxies.\u003c/p\u003e\n\n\u003ch2 id=\"discovery-during-certification-checks\"\u003eDiscovery During Certification Checks\u003c/h2\u003e\n\n\u003cp\u003eThe compromise was found during AppEsteem certification testing. Sophos and other cybersecurity companies involved in the evaluation process discovered an undeclared executable named \u003ccode\u003eme.exe\u003c/code\u003e being installed in some cases under \u003ccode\u003eC:\\Program Files\\Hola\\\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe file raised several integrity concerns described in the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt had not been certified.\u003c/li\u003e\n\u003cli\u003eIt had no timestamp.\u003c/li\u003e\n\u003cli\u003eIt was not digitally signed.\u003c/li\u003e\n\u003cli\u003eIt contained obfuscated code.\u003c/li\u003e\n\u003cli\u003eIt could write to memory.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-findings\"\u003eTechnical Findings\u003c/h2\u003e\n\n\u003cp\u003eSophos examined the undeclared binary and found signs that it was a Monero cryptocurrency miner. The article says those signs included strings pointing to the binary’s true nature.\u003c/p\u003e\n\n\u003cp\u003eThe miner performed several actions on affected Windows systems:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt added a Windows Defender exclusion rule.\u003c/li\u003e\n\u003cli\u003eIt copied itself into Program Files as \u003ccode\u003eHolaMonitorService.exe\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eIt created an auto-starting Windows service named \u003ccode\u003ehola_monitor_svc\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eIt ran when the computer was idle.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese behaviors were identified in the article as part of the miner’s operation after installation.\u003c/p\u003e\n\n\u003ch2 id=\"hola-s-response\"\u003eHola’s Response\u003c/h2\u003e\n\n\u003cp\u003eHola was notified of the findings by AppEsteem and confirmed that it had suffered a supply chain compromise. The company stated that only about 0.1% of its users were affected. It also said there was no evidence that user data had been accessed, stolen, or compromised.\u003c/p\u003e\n\n\u003cp\u003eHola CEO Avi Raz Cohen said the company had taken several corrective measures. According to the article, Hola said it had:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCompletely rebuilt its distribution pipeline.\u003c/li\u003e\n\u003cli\u003eImplemented advanced code-signing verification.\u003c/li\u003e\n\u003cli\u003eIntroduced tighter access controls.\u003c/li\u003e\n\u003cli\u003eAdded continuous monitoring across its infrastructure.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCohen said these measures were designed to ensure that only declared, certified, and signed components are delivered to users.\u003c/p\u003e\n\n\u003ch2 id=\"remaining-unknowns\"\u003eRemaining Unknowns\u003c/h2\u003e\n\n\u003cp\u003eBleepingComputer said it contacted Hola to request more information about the incident. The publication asked how the breach occurred, who the perpetrators were, and whether clients on other platforms were also affected. As of publication, Hola had not responded to those questions.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that the confirmed impact was limited to some Windows Hola Browser installations that received the undeclared executable. Hola said approximately 0.1% of users were affected. The company stated that it had no evidence of user data access, theft, or compromise.\u003c/p\u003e\n","keyPoints":["The Windows version of Hola Browser was compromised in a supply chain attack that delivered an undeclared executable identified by researchers as a cryptocurrency miner.","Sophos and other cybersecurity companies found an undeclared file named me.exe installed in some cases under C:\\Program Files\\Hola\\ during AppEsteem certification checks.","Sophos found signs that me.exe was a Monero cryptocurrency miner, including strings pointing to its true nature.","The miner adds a Windows Defender exclusion rule, copies itself to Program Files as HolaMonitorService.exe, creates an auto-starting Windows service named hola_monitor_svc, and runs when the computer is idle.","Hola confirmed the supply chain compromise and said about 0.1% of its users were affected, with no evidence of user data access, theft, or compromise."],"insights":["Periodic AppEsteem certification testing detected the compromise even though Hola Browser had previously passed certification, showing that repeated integrity checks can uncover newly introduced supply-chain tampering.","The undeclared executable had multiple red flags that defenders can hunt for, including no digital signature, no timestamp, obfuscated code, and installation under C:\\Program Files\\Hola\\ as me.exe or HolaMonitorService.exe.","The miner attempted to reduce detection and persist on systems by adding a Windows Defender exclusion rule and creating an auto-starting service named hola_monitor_svc.","Hola’s response focused on distribution controls, including rebuilding its distribution pipeline, adding advanced code-signing verification, tightening access controls, and implementing continuous monitoring."],"referencedReports":[{"title":"You do surprise me.exe: An unexpected executable in Hola Browser","url":"https://www.sophos.com/en-us/blog/you-do-surprise-me-exe-an-unexpected-executable-in-hola-browser","publisher":"Sophos","context":"The article cites Sophos’s analysis of the undeclared me.exe binary found during Hola Browser certification checks and its identification as a Monero cryptocurrency miner.","category":"","primary":false}],"body":"\u003cp\u003eThe Windows version of Hola Browser was compromised in a supply chain attack that delivered an undeclared executable identified by researchers as a cryptocurrency miner. The issue was found during periodic AppEsteem certification checks, which Hola Browser had previously passed. Hola confirmed the compromise after being informed by AppEsteem and said the issue was also independently detected by Sygnia.\u003c/p\u003e\n\n\u003cp\u003eSophos and other cybersecurity companies involved in the evaluation found an undeclared executable named \u003ccode\u003eme.exe\u003c/code\u003e installed in some cases under \u003ccode\u003eC:\\Program Files\\Hola\\\u003c/code\u003e. Sophos reported that the file was not certified, had no timestamp, was not digitally signed, contained obfuscated code, and could write to memory. Further analysis found signs that it was a Monero cryptocurrency miner.\u003c/p\u003e\n\n\u003cp\u003eThe miner added a Windows Defender exclusion rule, copied itself as \u003ccode\u003eHolaMonitorService.exe\u003c/code\u003e, created an auto-starting Windows service named \u003ccode\u003ehola_monitor_svc\u003c/code\u003e, and ran when the computer was idle. Hola said about 0.1% of users were affected and that it had no evidence of user data access, theft, or compromise. The company said it rebuilt its distribution pipeline and added stronger code-signing verification, access controls, and continuous monitoring.\u003c/p\u003e\n"},{"n":3,"title":"Trump considers Palantir exec to lead CISA","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/trump-considers-palantir-exec-to-lead-cisa","time":"20:40","priority":"MAY READ","score":68,"tldr":"The Trump administration is reportedly considering Palantir CTO Shyam Sankar to lead CISA, though the White House disputed that the selection is accurate at this time. The role has been vacant since January 2025 as CISA faces major AI-related responsibilities under a new executive order.","briefOverview":"\u003cp\u003eThe Trump administration is considering Shyam Sankar, chief technology officer at Palantir Technologies, to lead the Cybersecurity and Infrastructure Security Agency, according to two sources familiar with the matter. After the story was published, a White House official disputed the potential selection, saying, “at this time this is not accurate.” CISA has not had a Senate-confirmed director since Jen Easterly stepped down in January 2025.\u003c/p\u003e\n\n\u003cp\u003eSankar has worked at Palantir for more than 20 years and previously served as the company’s chief operating officer for nearly 17 years before becoming CTO in 2023. His possible nomination comes as the administration has released a new artificial intelligence executive order that names CISA among key agencies responsible for implementation. The agency is also expected to issue a binding operational directive requiring other federal agencies to take actions related to the order.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights the growing relevance of AI to federal cybersecurity policy, including concerns and opportunities around AI-enabled security capabilities. It notes that government officials are focused on AI after Anthropic’s Mythos platform surfaced as a technology capable of detecting and targeting zero-day vulnerabilities without human intervention. CISA is handling these responsibilities while also facing workforce and budget cuts under Trump’s second term.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Trump administration is considering Palantir Technologies Chief Technology Officer Shyam Sankar to run the Cybersecurity and Infrastructure Security Agency, according to two sources familiar with the matter. Sankar has emerged as a lead contender for the long-vacant CISA director role, though a White House official disputed the possible selection after publication by saying, “at this time this is not accurate.” DHS and Sankar did not immediately respond to requests for comment.\u003c/p\u003e\n\n\u003cp\u003eCISA has lacked a Senate-confirmed director since Biden appointee Jen Easterly stepped down in January 2025. Sean Plankey, previously nominated for the role, withdrew from consideration in April after key senators blocked a confirmation vote for several months. Acting Director Nick Andersen has led the agency since February.\u003c/p\u003e\n\n\u003cp\u003eDepartment of Homeland Security Secretary Markwayne Mullin told lawmakers that the administration is close to nominating a director for CISA. He said the administration has a person “soon to be nominated” who can recruit and focus on the agency’s authorities. Mullin said the administration wants CISA to be the leader in cybersecurity and that it “should be and they will be.”\u003c/p\u003e\n\n\u003cp\u003eSankar has worked at Palantir for more than 20 years and became CTO in 2023 after nearly 17 years as chief operating officer, according to his LinkedIn profile. Palantir is described in the article as having deep ties with the Trump administration and as being heavily focused on AI. The company has emerged as a significant enterprise and defense AI provider.\u003c/p\u003e\n\n\u003cp\u003eThe possible nomination comes shortly after the administration released an artificial intelligence executive order. CISA is named throughout the order as one of the key agencies charged with implementing the president’s vision, and it is expected to release a binding operational directive by Friday. The directive would outline actions other federal agencies must take to move the order forward.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that government officials are increasingly focused on cybersecurity threats and opportunities posed by AI. It cites Anthropic’s Mythos platform as a technology capable of detecting and targeting zero-day vulnerabilities without human intervention. Sankar previously wrote in a Fox News opinion piece that AI should eliminate bureaucracy rather than create “compliance theater” or governance committees that slow work down.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-development\"\u003eCore development\u003c/h2\u003e\n\n\u003cp\u003eThe Trump administration is considering Shyam Sankar, the chief technology officer at Palantir Technologies, to lead the Cybersecurity and Infrastructure Security Agency, according to two sources familiar with the matter. Those sources said Sankar has emerged as a lead contender for the CISA director role. After publication, however, a White House official disputed the potential selection, saying, “at this time this is not accurate.”\u003c/p\u003e\n\n\u003cp\u003eDHS and Sankar did not immediately respond to requests for comment. The article describes the CISA director position as long vacant and notes that the agency has not had a Senate-confirmed chief since Jen Easterly stepped down in January 2025.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-leadership-context\"\u003eCISA leadership context\u003c/h2\u003e\n\n\u003cp\u003eCISA has been led by Acting Director Nick Andersen since February. Sean Plankey had previously been nominated for the director role, but he withdrew his name from consideration in April after key senators blocked a confirmation vote for several months.\u003c/p\u003e\n\n\u003cp\u003eDepartment of Homeland Security Secretary Markwayne Mullin told lawmakers on Wednesday that the administration is close to nominating a director for the agency. Mullin said, “We\u0026rsquo;ve got a person, soon to be nominated, that will be running CISA, that has the ability to recruit and focus on the authorities we have.” He added that the administration wants CISA to be the leader in cybersecurity and said, “They should be and they will be.”\u003c/p\u003e\n\n\u003ch2 id=\"shyam-sankar-and-palantir-background\"\u003eShyam Sankar and Palantir background\u003c/h2\u003e\n\n\u003cp\u003eSankar is 44 and has worked at Palantir Technologies for more than 20 years. According to his LinkedIn profile, he served as Palantir’s chief operating officer for nearly 17 years before becoming chief technology officer in 2023.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Palantir as a big data analytics company with deep ties to the Trump administration. It also says Palantir is heavily focused on AI and has emerged as a significant enterprise and defense AI provider.\u003c/p\u003e\n\n\u003cp\u003eSankar had previously been considered to lead research and engineering at the Pentagon. In a February Fox News opinion piece, Sankar wrote that AI can benefit civilization if handled correctly. He wrote that “AI should eliminate bureaucracy, not add to it,” and argued against “compliance theater” and “AI governance” committees designed to slow things down and centralize power in managers.\u003c/p\u003e\n\n\u003ch2 id=\"ai-executive-order-and-cisa-s-role\"\u003eAI executive order and CISA’s role\u003c/h2\u003e\n\n\u003cp\u003eThe news of Sankar’s possible nomination comes shortly after the Trump administration released an artificial intelligence executive order. The article says CISA was named throughout the order as one of several key agencies responsible for implementing the president’s vision.\u003c/p\u003e\n\n\u003cp\u003eThe executive order followed an earlier iteration that was spiked at the last minute after former AI and crypto czar David Sacks warned the president that it could threaten American competitiveness and innovation. The latest version of the order changes a voluntary review period giving the government time to vet models from 90 days to 30 days.\u003c/p\u003e\n\n\u003cp\u003eCISA is expected to release a binding operational directive by Friday. The directive is expected to outline actions other federal agencies must take to move the executive order forward.\u003c/p\u003e\n\n\u003ch2 id=\"ai-related-cybersecurity-significance\"\u003eAI-related cybersecurity significance\u003c/h2\u003e\n\n\u003cp\u003eThe article places the potential CISA leadership choice in the context of increasing government attention to AI’s cybersecurity risks and opportunities. It notes that officials are increasingly focused on AI, particularly after Anthropic’s Mythos platform surfaced as a technology capable of detecting and targeting zero-day vulnerabilities without human intervention.\u003c/p\u003e\n\n\u003cp\u003eThis makes CISA’s role in implementing the AI executive order especially significant within the article’s framing. The agency is being positioned as one of the federal bodies responsible for translating the administration’s AI policy into operational requirements for other agencies.\u003c/p\u003e\n\n\u003ch2 id=\"agency-conditions-and-disclosed-impact\"\u003eAgency conditions and disclosed impact\u003c/h2\u003e\n\n\u003cp\u003eThe article states that CISA has faced workforce and budget cuts since Trump entered his second term. At the same time, the agency is expected to help implement the AI executive order and issue a binding directive for federal agencies.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed impact in the article is primarily institutional and policy-related: CISA remains without a Senate-confirmed director, is operating under acting leadership, and is expected to take on new AI-related implementation responsibilities. The article does not describe a specific cyber incident, victim breach, or technical compromise.\u003c/p\u003e\n","keyPoints":["The Trump administration is considering Palantir Technologies Chief Technology Officer Shyam Sankar to lead the Cybersecurity and Infrastructure Security Agency, according to two sources familiar with the matter.","A White House official disputed the potential selection after publication, saying, \"at this time this is not accurate.\"","CISA has not had a Senate-confirmed director since Jen Easterly stepped down in January 2025, and Acting Director Nick Andersen has led the agency since February.","Department of Homeland Security Secretary Markwayne Mullin told lawmakers that the administration is close to nominating a CISA director.","CISA was named in the administration’s new artificial intelligence executive order as one of the key agencies responsible for implementing the president’s vision."],"insights":["Sankar’s background at Palantir, a major enterprise and defense AI provider, would align CISA leadership with the administration’s emphasis on AI implementation and national security technology.","The White House’s statement disputing Sankar’s potential selection shows the CISA nomination process remains unsettled even as DHS says a nominee is imminent.","CISA is being asked to implement major AI executive order requirements while operating under an acting director and after workforce and budget cuts, creating a notable governance and execution challenge.","Sankar’s Fox News opinion piece opposing added AI compliance bureaucracy is relevant because CISA is expected to issue binding requirements for federal agencies under the new AI executive order."],"referencedReports":[],"body":"\u003cp\u003eThe Trump administration is considering Shyam Sankar, chief technology officer at Palantir Technologies, to lead the Cybersecurity and Infrastructure Security Agency, according to two sources familiar with the matter. After the story was published, a White House official disputed the potential selection, saying, “at this time this is not accurate.” CISA has not had a Senate-confirmed director since Jen Easterly stepped down in January 2025.\u003c/p\u003e\n\n\u003cp\u003eSankar has worked at Palantir for more than 20 years and previously served as the company’s chief operating officer for nearly 17 years before becoming CTO in 2023. His possible nomination comes as the administration has released a new artificial intelligence executive order that names CISA among key agencies responsible for implementation. The agency is also expected to issue a binding operational directive requiring other federal agencies to take actions related to the order.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights the growing relevance of AI to federal cybersecurity policy, including concerns and opportunities around AI-enabled security capabilities. It notes that government officials are focused on AI after Anthropic’s Mythos platform surfaced as a technology capable of detecting and targeting zero-day vulnerabilities without human intervention. CISA is handling these responsibilities while also facing workforce and budget cuts under Trump’s second term.\u003c/p\u003e\n"},{"n":4,"title":"Russia seeks to label two anti-Kremlin hacker groups as ‘extremist’","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/russia-seeks-extremist-label-for-hacker-groups","time":"18:04","priority":"MAY READ","score":68,"tldr":"Russia is moving to label the anti-Kremlin hacking groups Belarusian Cyber Partisans and Silent Crow as extremist organizations, which would effectively ban their activities in the country. The groups have claimed major cyberattacks on Russian and Belarusian targets, including a disruptive 2025 Aeroflot breach.","briefOverview":"\u003cp\u003eRussia is seeking to designate Belarusian Cyber Partisans and Silent Crow as extremist organizations and ban their activities in the country. Russia’s Supreme Court said it would consider the request in a closed-door hearing, but did not explain why it was seeking the designation. Belarusian Cyber Partisans responded by calling the move recognition of the effectiveness of its work and that of Silent Crow.\u003c/p\u003e\n\n\u003cp\u003eThe lawsuit follows claimed cyber operations by the two groups against Russian and Belarusian targets, including critical infrastructure and government institutions. Less than a year earlier, the groups claimed responsibility for a July 2025 cyberattack on Aeroflot that forced more than 100 flight cancellations and disrupted travel for roughly 20,000 passengers. They also claimed they destroyed the airline’s IT infrastructure and exfiltrated sensitive data, including flight records, internal call recordings, and employee monitoring information.\u003c/p\u003e\n\n\u003cp\u003eIn Russia, organizations designated as extremist are effectively outlawed, with activities banned and websites or publications subject to blocking. Individuals associated with such organizations can face administrative or criminal penalties. The article notes that the practical impact on the two hacking groups remains unclear because they operate largely online and maintain public channels such as Telegram, while Belarusian Cyber Partisans also operates a website and YouTube channel.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eRussia is seeking to label Belarusian Cyber Partisans and Silent Crow as extremist organizations and ban their activities in the country. Russia’s Supreme Court said it would consider the request in a closed-door hearing. The court did not explain why it was seeking to designate the groups as extremist organizations.\u003c/p\u003e\n\n\u003cp\u003eBoth groups have previously claimed responsibility for cyberattacks targeting critical infrastructure and government institutions in Russia and Belarus. Belarusian Cyber Partisans reacted to the court announcement on Telegram, saying the move was recognition from Russia’s “Z-dictatorship” of the effectiveness of its work and Silent Crow’s work. Silent Crow did not publicly comment.\u003c/p\u003e\n\n\u003cp\u003eThe lawsuit comes less than a year after the groups claimed responsibility for a major cyberattack on Russia’s flagship carrier, Aeroflot. The July 2025 incident forced Aeroflot to cancel more than 100 flights and disrupted travel for roughly 20,000 passengers. The hackers claimed they destroyed the airline’s IT infrastructure and exfiltrated sensitive data, including flight records, internal call recordings, and information from employee monitoring systems.\u003c/p\u003e\n\n\u003cp\u003eThe groups later published what they said were flight records belonging to Aeroflot’s chief executive. In Russia, extremist designations effectively outlaw organizations, ban their activities, and can lead to blocked websites and publications. Individuals associated with such organizations can face administrative or criminal penalties.\u003c/p\u003e\n\n\u003cp\u003eThe article says it remains unclear what practical impact the designation would have because both groups operate largely online. Both maintain public Telegram channels, and Belarusian Cyber Partisans also operates a website and YouTube channel. Russian authorities have applied the extremist designation in recent years to a broad range of political opposition groups, religious organizations, and civil society movements.\u003c/p\u003e\n\n\u003cp\u003eBelarusian Cyber Partisans emerged after mass protests in Belarus in 2020 against President Alexander Lukashenko following an election that Western countries said was rigged. The group has carried out operations against Belarusian state institutions and the country’s railway network, saying the railway attacks were intended to disrupt Russian military logistics. Silent Crow is described as a pro-Ukraine hacking group that has claimed responsibility for several cyberattacks against Russian targets, including a claimed breach of Rosreestr, Russia’s state property registry.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eRussia is seeking to designate two anti-Kremlin hacker groups, Belarusian Cyber Partisans and Silent Crow, as extremist organizations and ban their activities in the country. Russia’s Supreme Court said it would consider the request during a closed-door hearing. The court did not explain why it was seeking to designate the groups as extremist organizations.\u003c/p\u003e\n\n\u003cp\u003eBelarusian Cyber Partisans responded to the announcement in a Telegram post. The group said the move represented recognition from Russia’s “Z-dictatorship” of the effectiveness of its work and that of Silent Crow, and said it would continue. Silent Crow did not publicly comment.\u003c/p\u003e\n\n\u003ch2 id=\"groups-named-in-the-case\"\u003eGroups Named in the Case\u003c/h2\u003e\n\n\u003cp\u003eThe two groups named in the Russian request are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBelarusian Cyber Partisans.\u003c/li\u003e\n\u003cli\u003eSilent Crow.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article describes both groups as having previously claimed responsibility for cyberattacks targeting critical infrastructure and government institutions in Russia and Belarus. Both groups maintain public Telegram channels. Belarusian Cyber Partisans also operates a website and a YouTube channel.\u003c/p\u003e\n\n\u003ch2 id=\"aeroflot-cyberattack-claim\"\u003eAeroflot Cyberattack Claim\u003c/h2\u003e\n\n\u003cp\u003eThe lawsuit comes less than a year after Belarusian Cyber Partisans and Silent Crow claimed responsibility for a major cyberattack on Aeroflot, Russia’s flagship carrier. The incident occurred in July 2025 and forced the airline to cancel more than 100 flights. The disruption affected roughly 20,000 passengers.\u003c/p\u003e\n\n\u003cp\u003eThe hackers claimed they had destroyed Aeroflot’s IT infrastructure. They also claimed to have exfiltrated a trove of sensitive data, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFlight records.\u003c/li\u003e\n\u003cli\u003eInternal call recordings.\u003c/li\u003e\n\u003cli\u003eInformation from employee monitoring systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe groups later published what they said were flight records belonging to Aeroflot’s chief executive.\u003c/p\u003e\n\n\u003ch2 id=\"legal-consequences-of-an-extremist-designation-in-russia\"\u003eLegal Consequences of an Extremist Designation in Russia\u003c/h2\u003e\n\n\u003cp\u003eThe article states that organizations designated as extremist in Russia are effectively outlawed. Their activities are banned, and their websites and publications can be blocked. Individuals associated with such organizations can face administrative or criminal penalties.\u003c/p\u003e\n\n\u003cp\u003eRussian authorities have applied the extremist designation in recent years to a broad range of political opposition groups, religious organizations, and civil society movements. However, the article says the practical impact of the designation on Belarusian Cyber Partisans and Silent Crow remains unclear because the groups operate largely online.\u003c/p\u003e\n\n\u003ch2 id=\"belarusian-cyber-partisans-background\"\u003eBelarusian Cyber Partisans Background\u003c/h2\u003e\n\n\u003cp\u003eBelarusian Cyber Partisans emerged after mass protests in Belarus in 2020 against President Alexander Lukashenko. Those protests followed an election that Western countries said was rigged.\u003c/p\u003e\n\n\u003cp\u003eThe group has since carried out a series of high-profile cyber operations. These include attacks on Belarusian state institutions and the country’s railway network. The group said its railway operations were intended to disrupt Russian military logistics.\u003c/p\u003e\n\n\u003cp\u003eIn a 2024 interview with Recorded Future News, members of Belarusian Cyber Partisans said they were sharing information obtained from hacked Russian entities with Ukrainian intelligence services and Western organizations.\u003c/p\u003e\n\n\u003ch2 id=\"silent-crow-background\"\u003eSilent Crow Background\u003c/h2\u003e\n\n\u003cp\u003eSilent Crow is described as a pro-Ukraine hacking group. It has claimed responsibility for several cyberattacks against Russian targets.\u003c/p\u003e\n\n\u003cp\u003eEarlier last year, Silent Crow said it had breached Rosreestr, Russia’s state property registry. Since the Aeroflot hack, the group has not posted any updates on its Telegram channel.\u003c/p\u003e\n\n\u003ch2 id=\"significance-and-known-impact\"\u003eSignificance and Known Impact\u003c/h2\u003e\n\n\u003cp\u003eThe most concrete operational impact described in the article is the claimed Aeroflot cyberattack. That incident resulted in more than 100 canceled flights and disrupted travel for roughly 20,000 passengers. The attackers also claimed destruction of IT infrastructure and theft of sensitive airline data.\u003c/p\u003e\n\n\u003cp\u003eThe legal action could lead to the groups being banned in Russia and their publications or websites being blocked. Individuals associated with them could face administrative or criminal penalties. The article emphasizes that the real-world effect of such a designation is uncertain because the groups operate largely online.\u003c/p\u003e\n","keyPoints":["Russia’s Supreme Court will consider a request in a closed-door hearing to designate Belarusian Cyber Partisans and Silent Crow as extremist organizations and ban their activities in Russia.","Belarusian Cyber Partisans and Silent Crow have previously claimed responsibility for cyberattacks targeting critical infrastructure and government institutions in Russia and Belarus.","The two groups claimed responsibility for a July 2025 cyberattack on Aeroflot that forced the airline to cancel more than 100 flights and disrupted travel for roughly 20,000 passengers.","The hackers claimed they destroyed Aeroflot’s IT infrastructure and exfiltrated sensitive data, including flight records, internal call recordings, and information from employee monitoring systems.","Belarusian Cyber Partisans emerged after mass protests in Belarus in 2020 and has carried out cyber operations against Belarusian state institutions and the country’s railway network."],"insights":["Russia’s proposed extremist designation may have limited operational impact because both groups operate largely online and maintain public channels outside traditional organizational structures.","The closed-door Supreme Court hearing and lack of explanation for the extremist designation highlight that the legal process described in the article is not being publicly justified.","The Aeroflot incident shows that these anti-Kremlin hacking groups’ operations have moved beyond data theft claims to disruptions affecting large numbers of civilian passengers.","Belarusian Cyber Partisans’ stated sharing of hacked Russian data with Ukrainian intelligence services and Western organizations shows the group’s activity is tied to broader anti-Russian state efforts, not only public hacktivist messaging."],"referencedReports":[],"body":"\u003cp\u003eRussia is seeking to designate Belarusian Cyber Partisans and Silent Crow as extremist organizations and ban their activities in the country. Russia’s Supreme Court said it would consider the request in a closed-door hearing, but did not explain why it was seeking the designation. Belarusian Cyber Partisans responded by calling the move recognition of the effectiveness of its work and that of Silent Crow.\u003c/p\u003e\n\n\u003cp\u003eThe lawsuit follows claimed cyber operations by the two groups against Russian and Belarusian targets, including critical infrastructure and government institutions. Less than a year earlier, the groups claimed responsibility for a July 2025 cyberattack on Aeroflot that forced more than 100 flight cancellations and disrupted travel for roughly 20,000 passengers. They also claimed they destroyed the airline’s IT infrastructure and exfiltrated sensitive data, including flight records, internal call recordings, and employee monitoring information.\u003c/p\u003e\n\n\u003cp\u003eIn Russia, organizations designated as extremist are effectively outlawed, with activities banned and websites or publications subject to blocking. Individuals associated with such organizations can face administrative or criminal penalties. The article notes that the practical impact on the two hacking groups remains unclear because they operate largely online and maintain public channels such as Telegram, while Belarusian Cyber Partisans also operates a website and YouTube channel.\u003c/p\u003e\n"},{"n":2,"title":"FTC considers setting aside or modifying $150 million privacy penalty against X","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/ftc-considers-modifying-150-million-twitter-privacy-fine","time":"19:42","priority":"MAY READ","score":65,"tldr":"The FTC is considering whether to modify or set aside its 2022 order and $150 million penalty against Twitter, now X, over the use of account security data for targeted advertising. X argues the order is outdated and burdensome, while the FTC is seeking public comment before deciding.","briefOverview":"\u003cp\u003eThe Federal Trade Commission said it is considering modifying or setting aside a 2022 settlement order with Twitter, now X, over the use of account security data for targeted advertising. The settlement included a $150 million fine and prohibited the company from continuing to profit from what the FTC described at the time as deceptively collected data. The FTC has opened a public comment period that ends July 2 before deciding whether to proceed with changes.\u003c/p\u003e\n\n\u003cp\u003eX filed a petition arguing that the settlement terms are unfair because the order was issued against a company that it says no longer exists, the workers responsible no longer work for X, and the company has since created a “world class” privacy and data protection program. X also argued that the order no longer serves a valid regulatory purpose and imposes needless costs for obligations already covered by privacy regimes and industry-recognized frameworks. The company also said setting aside or changing the order aligns with First Amendment principles and is critical to advancing American leadership in artificial intelligence.\u003c/p\u003e\n\n\u003cp\u003eThe 2022 order stemmed from FTC allegations that Twitter asked users for phone numbers and email addresses for account security but also used that data to target ads to specific consumers. The FTC said the practice affected more than 140 million users and boosted Twitter’s primary source of revenue. The agency also alleged that the conduct violated a 2011 order barring Twitter from deceiving the public about its privacy and security practices.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Federal Trade Commission is considering whether to modify or set aside a 2022 settlement order with Twitter, which was renamed X in 2023. The order concerned the company’s use of account security data to support targeted advertising. The settlement included a $150 million fine and barred the company from continuing to profit from data the FTC described as deceptively collected.\u003c/p\u003e\n\n\u003cp\u003eX filed a petition asking the FTC to change or set aside the order. According to the FTC’s call for public comment, X argued that the order is unfair because it was issued against a company that “no longer exists.” X also said the workers responsible for the scheme no longer work for the company and that it has since established a “world class” privacy and data protection program.\u003c/p\u003e\n\n\u003cp\u003eThe company also argued that the order no longer serves a valid regulatory purpose. X said it imposes millions of dollars in needless costs tied to obligations and protections already required by domestic and international privacy regimes and industry-recognized frameworks that X Corp. follows. The company further argued that setting aside the order is consistent with First Amendment principles and is critical to advancing American leadership in artificial intelligence.\u003c/p\u003e\n\n\u003cp\u003eThe FTC has invited public comment on whether it should modify or set aside the order. The public comment period ends July 2. After that period, the agency will decide whether to move forward with changes.\u003c/p\u003e\n\n\u003cp\u003eThe original May 2022 settlement order alleged that Twitter encouraged users to provide phone numbers and email addresses to safeguard their accounts. The FTC alleged that Twitter then used that data to help advertisers target ads to specific consumers, generating large profits. The FTC also alleged that the conduct violated a 2011 order that barred Twitter from deceiving the public about its privacy and security practices.\u003c/p\u003e\n\n\u003cp\u003eAt the time of the 2022 action, FTC Chair Lina Khan said Twitter obtained data from users under the pretext of using it for security purposes but also used it to target ads. She said the practice affected more than 140 million Twitter users and boosted Twitter’s primary source of revenue. Twitter came under new ownership in October 2022 when Elon Musk bought the company.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe Federal Trade Commission said it is considering whether to modify or set aside a 2022 settlement order with Twitter, now known as X. The order concerned Twitter’s alleged use of account security data to support targeted advertising. The settlement included a $150 million fine and prohibited the company from continuing to profit from what the FTC described at the time as deceptively collected data.\u003c/p\u003e\n\n\u003cp\u003eThe FTC has opened a public comment process on X’s petition. The public comment period ends July 2, after which the agency will decide whether to move forward with changes to the order.\u003c/p\u003e\n\n\u003ch2 id=\"x-s-petition\"\u003eX’s Petition\u003c/h2\u003e\n\n\u003cp\u003eX petitioned the FTC to change or set aside the settlement order. According to the FTC’s call for public comment, X argued that the settlement terms are unfair because the order was issued against a company that “no longer exists.” Twitter was renamed X in 2023.\u003c/p\u003e\n\n\u003cp\u003eX also argued that the workers responsible for the scheme no longer work for the company. The company said it has since established a “world class” privacy and data protection program.\u003c/p\u003e\n\n\u003cp\u003eX further argued that the order no longer serves any valid regulatory purpose. It said the order imposes millions of dollars in needless costs to address obligations and protections already required by domestic and international privacy regimes and industry-recognized frameworks that X Corp. follows.\u003c/p\u003e\n\n\u003ch2 id=\"additional-arguments-cited-by-x\"\u003eAdditional Arguments Cited by X\u003c/h2\u003e\n\n\u003cp\u003eThe article states that X also framed its request around broader legal and policy claims. The company argued that setting aside the order is in keeping with First Amendment principles. It also said changing or setting aside the order is “critical to advancing American leadership in artificial intelligence,” according to the FTC press release.\u003c/p\u003e\n\n\u003ch2 id=\"background-of-the-2022-settlement\"\u003eBackground of the 2022 Settlement\u003c/h2\u003e\n\n\u003cp\u003eThe May 2022 settlement order alleged that Twitter suggested users provide phone numbers and email addresses to safeguard their accounts. The FTC alleged that Twitter subsequently used that data to help advertisers target ads to specific consumers. The agency said the practice generated large profits.\u003c/p\u003e\n\n\u003cp\u003eThe FTC also alleged that Twitter’s actions violated a 2011 order. That earlier order barred the company from deceiving the public about its privacy and security practices.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eAt the time of the 2022 action, FTC Chair Lina Khan said Twitter obtained data from users under the pretext of using it for security purposes but also used the data to target users with ads. Khan said the practice affected more than 140 million Twitter users. She also said it boosted Twitter’s primary source of revenue.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-stakeholders\"\u003eAffected Parties and Stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe central parties in the article are the FTC and X Corp., formerly Twitter. Twitter was renamed X in 2023, and the article notes that the company came under new ownership in October 2022 when Elon Musk bought it. The affected users were Twitter users whose phone numbers and email addresses were allegedly collected for account security and then also used for advertising targeting.\u003c/p\u003e\n\n\u003ch2 id=\"current-status\"\u003eCurrent Status\u003c/h2\u003e\n\n\u003cp\u003eThe FTC has not yet decided whether to modify or set aside the 2022 order. It is seeking public comment on the issue, with comments due by July 2. After the public comment period closes, the agency will decide whether to move forward with changes.\u003c/p\u003e\n","keyPoints":["The Federal Trade Commission is considering modifying or setting aside a 2022 settlement order with Twitter, now X, over the use of account security data for targeted advertising.","Twitter was fined $150 million in 2022 and prohibited from continuing to profit from data that the FTC said had been deceptively collected.","X petitioned the FTC, arguing that the order is unfair because it was issued against a company that no longer exists, the workers responsible no longer work for X, and the company has established a privacy and data protection program.","The FTC has invited public comment on whether it should change or set aside the order, with the comment period ending July 2.","The FTC alleged in 2022 that Twitter encouraged users to provide phone numbers and email addresses for account security but also used that data to target ads to specific consumers."],"insights":["X is framing relief from a privacy settlement not only as a compliance-cost issue but also as tied to First Amendment principles and American leadership in artificial intelligence.","The FTC’s public comment process creates a defined opportunity for outside stakeholders to influence whether the 2022 order remains in force, is modified, or is set aside before the agency decides after July 2.","The 2022 penalty was based in part on the FTC’s allegation that Twitter had violated a prior 2011 order, making the case about repeat compliance obligations rather than a standalone privacy lapse.","X’s petition emphasizes organizational and ownership changes, including that the company formerly known as Twitter no longer exists and responsible workers have left, as reasons the existing order should no longer apply as written."],"referencedReports":[],"body":"\u003cp\u003eThe Federal Trade Commission said it is considering modifying or setting aside a 2022 settlement order with Twitter, now X, over the use of account security data for targeted advertising. The settlement included a $150 million fine and prohibited the company from continuing to profit from what the FTC described at the time as deceptively collected data. The FTC has opened a public comment period that ends July 2 before deciding whether to proceed with changes.\u003c/p\u003e\n\n\u003cp\u003eX filed a petition arguing that the settlement terms are unfair because the order was issued against a company that it says no longer exists, the workers responsible no longer work for X, and the company has since created a “world class” privacy and data protection program. X also argued that the order no longer serves a valid regulatory purpose and imposes needless costs for obligations already covered by privacy regimes and industry-recognized frameworks. The company also said setting aside or changing the order aligns with First Amendment principles and is critical to advancing American leadership in artificial intelligence.\u003c/p\u003e\n\n\u003cp\u003eThe 2022 order stemmed from FTC allegations that Twitter asked users for phone numbers and email addresses for account security but also used that data to target ads to specific consumers. The FTC said the practice affected more than 140 million users and boosted Twitter’s primary source of revenue. The agency also alleged that the conduct violated a 2011 order barring Twitter from deceiving the public about its privacy and security practices.\u003c/p\u003e\n"},{"n":6,"title":"Brave Software releases Origin for a paid, bloat-free browsing experience","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/software/brave-software-releases-origin-for-a-paid-bloat-free-browsing-experience/","time":"21:37","priority":"MAY READ","score":62,"tldr":"Brave Software launched Brave Origin, a paid $59.99 version of its browser that removes crypto, AI, rewards, promotions, and other monetization features while keeping Brave’s privacy protections. The release has drawn criticism from users who say Brave is charging for a cleaner experience that many believe should already be the default.","briefOverview":"\u003cp\u003eBrave Software announced the public release of Brave Origin, a paid minimalist version of its browser. The company describes it as a bloat-free option for users who want Brave’s privacy protections without cryptocurrency, AI, rewards, and other monetization-focused features. Brave says the browser is intended for users who do not need all of Brave’s out-of-the-box features but still want its privacy capabilities.\u003c/p\u003e\n\n\u003cp\u003eBrave Origin turns off components including Brave Rewards, Brave Wallet, Brave VPN promotions, Brave Leo AI, Brave News, Brave Talk, sponsored images, and other promotional or monetization features. The browser continues to include Brave Shields, Brave’s built-in privacy and ad-blocking protections. It is available both as a standalone download and as an upgrade option for existing Brave installations.\u003c/p\u003e\n\n\u003cp\u003eThe license is a one-time $59.99 purchase that can activate the software on up to 10 devices, while the Linux version is free. The launch has drawn criticism from users who argue that Brave is charging to remove features they already considered unnecessary or unwanted. Others noted that many of the same features can already be disabled in the free Brave browser using enterprise group policies.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eBrave Software announced the public release of Brave Origin, a paid version of its browser aimed at users who want a more streamlined browsing experience. The company says Brave Origin removes cryptocurrency, AI, rewards, and other monetization-focused features from the standard browser. Brave describes the product as an option for users who still want the privacy offered by Brave but do not need all of its out-of-the-box features.\u003c/p\u003e\n\n\u003cp\u003eAccording to Brave, Brave Origin disables Brave Rewards, Brave Wallet, Brave VPN promotions, Brave Leo AI, Brave News, Brave Talk, sponsored images, and other promotional or monetization components. The browser retains Brave Shields, which the article identifies as Brave’s built-in privacy and ad-blocking protections. This makes the product a reduced-feature version rather than a removal of Brave’s core privacy controls.\u003c/p\u003e\n\n\u003cp\u003eBrave Origin is av
