window.__DL_ARTICLES = [{"n":6,"title":"Chrome Ad Blocker with 10M+ Installs Found with Dormant Script Injection Capability","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/chrome-ad-blocker-with-10m-installs.html","time":"14:12","priority":"SHOULD READ","score":84,"tldr":"Researchers found that the Chrome extension Adblock for YouTube, used by more than 10 million people, contains a dormant remote-controlled capability that could enable arbitrary JavaScript injection on websites without an extension update or store review. There is no evidence it has been abused, but its broad permissions and ties to removed malicious ad-blocking extensions make it a significant security risk.","briefOverview":"\u003cp\u003eResearchers at Island analyzed a popular Chrome extension called \u003cstrong\u003eAdblock for YouTube\u003c/strong\u003e and found that it contains the ability to execute arbitrary JavaScript code. The extension has more than 10 million installs, carries a Featured badge on the Chrome Web Store, and is marketed as a way to block YouTube ads and related web page elements. Island said there is no evidence that a malicious payload has been distributed through this capability, but the capability creates privacy and security risks.\u003c/p\u003e\n\n\u003cp\u003eThe researchers said the extension includes the architecture for remote-controlled script injection on any website, which could be activated by a single server-side configuration change without an extension update, store review, or visible indication to users. They said the dormant capability centers on a bespoke scriptlet rule called \u003cstrong\u003etrusted-create-element\u003c/strong\u003e, which can create arbitrary script elements and potentially access sensitive data. Island warned that, in practical terms, abuse of the capability could mean reading pages, stealing data, or acting as the user inside personal accounts, work apps, admin panels, and other sensitive browser sessions.\u003c/p\u003e\n\n\u003cp\u003eIsland also found that the extension runs on every website a user visits, despite its YouTube-focused name, and only checks whether the current URL contains the string \u003cstrong\u003eyoutube.com\u003c/strong\u003e. The article says this check does not validate the hostname, frame origin, or embedded player context, so it can be bypassed by placing \u003cstrong\u003eyoutube.com\u003c/strong\u003e anywhere in a URL. The concern is heightened by the extension’s prior inclusion of the Unistream SDK, a major ownership and codebase change, and ties to other ad-blocking extensions that were removed from the Chrome Web Store for malware.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Researchers at Island found that the Chrome extension Adblock for YouTube, which has more than 10 million installs and a Featured badge on the Chrome Web Store, contains capabilities to run arbitrary JavaScript code.","Island said the extension includes a dormant remote-controlled script injection path that could be activated by a server-side configuration change without an extension update, store review, or visible sign to users.","The researchers said there is no evidence that a malicious payload has been distributed through this capability.","The extension has ties to other ad-blocking extensions that were removed from the Chrome Web Store for malware, including Adblock for Chrome, Adblock for You, and AdBlock Suite.","Island found that the extension runs on every website visited in Chrome and checks only whether the URL contains the string “youtube.com,” which can be bypassed by placing that string anywhere in a URL."],"insights":["The main risk does not require a malicious extension update, because Island said the dormant script injection path could be activated through a server-side change that would not trigger a Chrome Web Store review.","The extension’s YouTube-only branding is misleading from a security perspective, because Island found it runs on every website a Chrome user visits and only uses a weak URL string check for “youtube.com.”","The URL check described by Island makes the extension’s behavior easier to trigger beyond YouTube, because pages such as bank.example.com/search?q=youtube.com or internal.corp.com/redirect?from=youtube.com would satisfy the check.","Island framed the concern as the combination of factors rather than one suspicious code line: more than 10 million installs, all-site access, a remote-controlled injection path, prior ad-injection infrastructure, ownership and codebase changes, and links to extensions removed for malware."],"referencedReports":[{"title":"BadBlocker: 11 Million Users, One Server Call Away From Compromise","url":"https://www.island.io/blog/badblocker-11-million-users-one-server-call-away-from-compromise","publisher":"Island","context":"The article cites Island researchers’ report as the basis for the analysis of Adblock for YouTube’s dormant arbitrary JavaScript execution capability.","category":"research","primary":true},{"title":"Affiliate Marketing Fraud via Brand Impersonation Extension Farm","url":"https://github.com/PaloAltoNetworks/Unit42-timely-threat-intel/blob/main/2026-06-24-affiliate-marketing-fraud-via-brand-impersonation-extension-farm.txt","publisher":"Palo Alto Networks Unit 42","context":"The article references Unit 42’s findings about 18 browser extensions impersonating consumer brands to monetize through affiliate marketing.","category":"research","primary":false}],"body":"\u003cp\u003eResearchers at Island analyzed a popular Chrome extension called \u003cstrong\u003eAdblock for YouTube\u003c/strong\u003e and found that it contains the ability to execute arbitrary JavaScript code. The extension has more than 10 million installs, carries a Featured badge on the Chrome Web Store, and is marketed as a way to block YouTube ads and related web page elements. Island said there is no evidence that a malicious payload has been distributed through this capability, but the capability creates privacy and security risks.\u003c/p\u003e\n\n\u003cp\u003eThe researchers said the extension includes the architecture for remote-controlled script injection on any website, which could be activated by a single server-side configuration change without an extension update, store review, or visible indication to users. They said the dormant capability centers on a bespoke scriptlet rule called \u003cstrong\u003etrusted-create-element\u003c/strong\u003e, which can create arbitrary script elements and potentially access sensitive data. Island warned that, in practical terms, abuse of the capability could mean reading pages, stealing data, or acting as the user inside personal accounts, work apps, admin panels, and other sensitive browser sessions.\u003c/p\u003e\n\n\u003cp\u003eIsland also found that the extension runs on every website a user visits, despite its YouTube-focused name, and only checks whether the current URL contains the string \u003cstrong\u003eyoutube.com\u003c/strong\u003e. The article says this check does not validate the hostname, frame origin, or embedded player context, so it can be bypassed by placing \u003cstrong\u003eyoutube.com\u003c/strong\u003e anywhere in a URL. The concern is heightened by the extension’s prior inclusion of the Unistream SDK, a major ownership and codebase change, and ties to other ad-blocking extensions that were removed from the Chrome Web Store for malware.\u003c/p\u003e\n"},{"n":2,"title":"Bluekit phishing kit adopts browser-in-the-middle for login theft","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/bluekit-phishing-kit-adopts-browser-in-the-middle-for-login-theft/","time":"15:00","priority":"SHOULD READ","score":82,"tldr":"Bluekit phishing-as-a-service has upgraded to browser-in-the-middle attacks, letting victims interact with a real login page through an attacker-controlled browser so session tokens can be stolen even after authentication. The kit also uses stronger anti-analysis checks and live victim monitoring to evade researchers and improve account takeover success.","briefOverview":"\u003cp\u003eThe Bluekit phishing-as-a-service platform has continued to evolve, with nearly 70 new hostnames identified over the past week. Netcraft reports that Bluekit has added browser-in-the-middle capabilities for improved data theft. The platform was previously documented by Varonis as offering an AI assistant and 40 templates targeting services including Outlook, Hotmail, Gmail, Yahoo, ProtonMail, iCloud, GitHub, and Ledger.\u003c/p\u003e\n\n\u003cp\u003eBluekit’s newer method uses the open-source JavaScript library rrweb to serialize a page’s DOM and stream it over a WebSocket connection to the victim. In this setup, the victim interacts with a browser session controlled by the attacker, which loads the legitimate login page and relays activity between the victim and the target service. Authentication completes in the attacker’s browser, granting the attacker a valid session token and unlimited access to the victim’s account.\u003c/p\u003e\n\n\u003cp\u003eNetcraft says Bluekit also uses a victim qualification system to distinguish real targets from researchers or security crawlers. Its anti-analysis features include randomized CSS filters, a frequently changing obfuscated JavaScript bundle, custom CAPTCHA, browser fingerprinting, and WebRTC-based IP mismatch detection. The report also notes that latency in keyboard input and mouse clicks on login pages can be a red flag, while rrweb itself is legitimate and should not be treated as an indicator of compromise without broader context.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The Bluekit phishing-as-a-service platform has evolved with nearly 70 new hostnames identified over the past week and has added browser-in-the-middle capabilities for improved data theft.","Netcraft reports that Bluekit switched from adversary-in-the-middle to a browser-in-the-middle mechanism that uses the open-source JavaScript library rrweb to serialize the page DOM and stream it over a WebSocket connection to the victim.","In Bluekit’s browser-in-the-middle attack, the victim interacts with an attacker-controlled browser session that loads the legitimate login page, while the victim’s inputs are forwarded back to the attacker’s browser.","Authentication completes in the attacker’s browser, granting the attacker a valid session token and unlimited access to the victim’s account.","Bluekit uses anti-analysis features including randomized CSS filters, a frequently changing obfuscated JavaScript bundle, custom CAPTCHA, browser fingerprinting, and WebRTC-based IP mismatch detection."],"insights":["The presence of rrweb alone should not be treated as an indicator of compromise because Netcraft notes it is a legitimate library widely used for session replay and analytics.","Delayed keyboard input or mouse clicks on login pages can be a practical red flag because the browser-in-the-middle setup may introduce noticeable latency.","Bluekit’s use of WebRTC-based IP mismatch detection means users behind proxies or VPNs may be specifically screened out as possible researchers or security crawlers.","Bluekit-related signals such as randomized CSS filters, rotating obfuscated JavaScript, browser fingerprint checks, WebSocket traffic, and WebRTC checks are associated with the kit but do not individually constitute indicators of compromise."],"referencedReports":[{"title":"Bluekit Phishing-as-a-Service Threat","url":"https://www.netcraft.com/blog/bluekit-phishing-as-a-service-threat","publisher":"Netcraft","context":"The article cites a new Netcraft report as the source for Bluekit’s switch to browser-in-the-middle phishing and its anti-analysis features.","category":"research","primary":true}],"body":"\u003cp\u003eThe Bluekit phishing-as-a-service platform has continued to evolve, with nearly 70 new hostnames identified over the past week. Netcraft reports that Bluekit has added browser-in-the-middle capabilities for improved data theft. The platform was previously documented by Varonis as offering an AI assistant and 40 templates targeting services including Outlook, Hotmail, Gmail, Yahoo, ProtonMail, iCloud, GitHub, and Ledger.\u003c/p\u003e\n\n\u003cp\u003eBluekit’s newer method uses the open-source JavaScript library rrweb to serialize a page’s DOM and stream it over a WebSocket connection to the victim. In this setup, the victim interacts with a browser session controlled by the attacker, which loads the legitimate login page and relays activity between the victim and the target service. Authentication completes in the attacker’s browser, granting the attacker a valid session token and unlimited access to the victim’s account.\u003c/p\u003e\n\n\u003cp\u003eNetcraft says Bluekit also uses a victim qualification system to distinguish real targets from researchers or security crawlers. Its anti-analysis features include randomized CSS filters, a frequently changing obfuscated JavaScript bundle, custom CAPTCHA, browser fingerprinting, and WebRTC-based IP mismatch detection. The report also notes that latency in keyboard input and mouse clicks on login pages can be a red flag, while rrweb itself is legitimate and should not be treated as an indicator of compromise without broader context.\u003c/p\u003e\n"},{"n":4,"title":"New macOS malware embeds fake errors to confuse AI analysis tools","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-macos-malware-embeds-fake-errors-to-confuse-ai-analysis-tools/","time":"16:23","priority":"SHOULD READ","score":82,"tldr":"A new macOS Rust malware called Gaslight, attributed to a North Korean-linked actor, embeds fake system errors and prompt-injection strings to confuse AI-assisted malware analysis tools. The technique appears aimed at making LLM-based analysis agents abort, truncate, or doubt their findings rather than evading traditional sandboxes.","briefOverview":"\u003cp\u003eA newly discovered macOS malware called Gaslight is designed to confuse AI-assisted malware analysis tools by embedding prompt injection strings and fake debugging data inside its executable. SentinelOne attributes the malware with high confidence to a North Korean-linked threat actor. The malware is a Rust binary with backdoor and information-stealing functionality commonly seen in similar malware.\u003c/p\u003e\n\n\u003cp\u003eGaslight’s standout feature is a 3.5 KB payload containing 38 fake “system” messages embedded directly within the binary. These messages imitate developer logs, crash reports, debugging output, and program alerts, using Markdown formatting and template-style placeholders to appear like legitimate analysis data. Examples include fabricated memory dumps, token-expiration warnings, Redis connection failures, build-pipeline errors, SQL injection alerts, and JSON parsing errors.\u003c/p\u003e\n\n\u003cp\u003eAccording to SentinelOne, the fake errors are not meant to evade execution inside a sandbox but to confuse AI systems that read strings during automated analysis. The researchers say the messages are designed to make an LLM-assisted analysis pipeline question the validity of its session or abort, truncate, or refuse analysis. SentinelOne did not demonstrate that the technique could successfully bypass AI malware analysis platforms, but the findings suggest threat actors are experimenting with anti-analysis methods aimed at AI-assisted security platforms.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A newly discovered macOS malware called Gaslight hides prompt injection strings and fake debugging data inside its executable to confuse AI-assisted malware analysis tools.","SentinelOne attributes the malware with high confidence to a North Korean-linked threat actor.","Gaslight is a Rust binary with backdoor and information-stealing functionality commonly seen in similar malware.","The malware contains a 3.5 KB payload with 38 fake system messages that imitate developer logs, crash reports, debugging output, and program alerts.","SentinelOne says the fake messages are designed to make an LLM-assisted analysis pipeline abort, truncate, refuse analysis, or question the validity of its session."],"insights":["Gaslight targets the analysis workflow rather than the malware execution environment, meaning its unusual feature is aimed at misleading tools that read embedded strings instead of evading sandbox behavior.","The fake messages are formatted to resemble legitimate analysis artifacts, including Markdown and template-style placeholders, which could make them blend into automated reports or tool output.","SentinelOne notes that the technique was not demonstrated to bypass AI malware analysis platforms, so the finding is evidence of experimentation rather than proven real-world effectiveness.","The embedded messages include many unrelated failure themes, such as token expiry, out-of-memory kills, disk exhaustion, and static-analysis warnings, suggesting the malware is designed to disrupt multiple kinds of AI-assisted triage responses."],"referencedReports":[{"title":"macOS.Gaslight Rust Backdoor Turns Prompt Injection on the Analyst, Not the Sandbox","url":"https://www.sentinelone.com/labs/macos-gaslight-rust-backdoor-turns-prompt-injection-on-the-analyst-not-the-sandbox/","publisher":"SentinelOne","context":"The article cites SentinelOne’s analysis as the source explaining Gaslight’s embedded fake system-failure messages and prompt-injection behavior.","category":"research","primary":true}],"body":"\u003cp\u003eA newly discovered macOS malware called Gaslight is designed to confuse AI-assisted malware analysis tools by embedding prompt injection strings and fake debugging data inside its executable. SentinelOne attributes the malware with high confidence to a North Korean-linked threat actor. The malware is a Rust binary with backdoor and information-stealing functionality commonly seen in similar malware.\u003c/p\u003e\n\n\u003cp\u003eGaslight’s standout feature is a 3.5 KB payload containing 38 fake “system” messages embedded directly within the binary. These messages imitate developer logs, crash reports, debugging output, and program alerts, using Markdown formatting and template-style placeholders to appear like legitimate analysis data. Examples include fabricated memory dumps, token-expiration warnings, Redis connection failures, build-pipeline errors, SQL injection alerts, and JSON parsing errors.\u003c/p\u003e\n\n\u003cp\u003eAccording to SentinelOne, the fake errors are not meant to evade execution inside a sandbox but to confuse AI systems that read strings during automated analysis. The researchers say the messages are designed to make an LLM-assisted analysis pipeline question the validity of its session or abort, truncate, or refuse analysis. SentinelOne did not demonstrate that the technique could successfully bypass AI malware analysis platforms, but the findings suggest threat actors are experimenting with anti-analysis methods aimed at AI-assisted security platforms.\u003c/p\u003e\n"},{"n":5,"title":"Another Russian dairy company reportedly disrupted by cyberattack","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/russia-dairy-producter-cyberattack-ufa","time":"14:45","priority":"MAY READ","score":65,"tldr":"A cyberattack disrupted logistics and accounting systems at Russian dairy producer Ufagormolzavod, forcing manual paperwork and slowing shipments while production continued. The incident is part of a broader series of cyber disruptions affecting Russia’s dairy sector.","briefOverview":"\u003cp\u003eA cyberattack disrupted logistics and accounting operations at Ufagormolzavod, a dairy producer based in Ufa in Russia’s republic of Bashkortostan. The company’s chief executive, Ildar Faizullin, said production had not stopped, but document processing and shipments had slowed. He said the workforce had been mobilized to keep operations running manually.\u003c/p\u003e\n\n\u003cp\u003eUfagormolzavod produces kefir, sour cream, cottage cheese, butter and yogurt under the Molochny Fermer and Molochnaya Krepost brands. The company did not say who was behind the attack, whether any data had been compromised, or when it expects its IT systems to be restored. The incident is the latest in a series of cyber disruptions affecting Russia’s dairy sector.\u003c/p\u003e\n\n\u003cp\u003eEarlier in the same week, attackers compromised the website of Molochnaya Kukhnya, a state-run dairy producer in Bashkortostan, and posted false claims about power outages and contaminated products. Other recent incidents included a June 2025 disruption of Russia’s electronic veterinary certification system that forced paper documentation and caused logistical bottlenecks, a December ransomware attack on the Semyonishna dairy processing plant, and a September 2024 ransomware incident that left Kabosh production facilities unable to operate for nearly a month.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A cyberattack disrupted logistics and accounting operations at Ufagormolzavod, a dairy producer based in Ufa in Russia's republic of Bashkortostan.","Ufagormolzavod's chief executive, Ildar Faizullin, said production had not stopped, but document processing and shipments had slowed and workers were processing operations manually.","The company did not disclose who was behind the attack, whether any data was compromised, or when its IT systems would be restored.","Earlier the same week, attackers compromised the website of Molochnaya Kukhnya in Bashkortostan and posted fabricated claims about power outages and contaminated products.","The incident follows other cyber disruptions in Russia's dairy sector, including a June 2025 outage of the electronic veterinary certification system and ransomware attacks on Semyonishna and Kabosh."],"insights":["The disruption shows that a dairy producer can keep production running while still facing operational slowdowns because shipments and paperwork depend on affected IT systems.","Recent incidents in Russia’s dairy sector have affected different parts of the supply chain, including company IT systems, public websites, electronic veterinary certification, and production facilities.","The Molochnaya Kukhnya website compromise highlights that attackers can cause disruption by posting false public claims about contamination and outages, even without stopping production.","Previous outages in Russia’s dairy sector caused distribution centers to refuse shipments without digital certificates, showing that paperwork and certification systems can directly affect product availability at retailers."],"referencedReports":[],"body":"\u003cp\u003eA cyberattack disrupted logistics and accounting operations at Ufagormolzavod, a dairy producer based in Ufa in Russia’s republic of Bashkortostan. The company’s chief executive, Ildar Faizullin, said production had not stopped, but document processing and shipments had slowed. He said the workforce had been mobilized to keep operations running manually.\u003c/p\u003e\n\n\u003cp\u003eUfagormolzavod produces kefir, sour cream, cottage cheese, butter and yogurt under the Molochny Fermer and Molochnaya Krepost brands. The company did not say who was behind the attack, whether any data had been compromised, or when it expects its IT systems to be restored. The incident is the latest in a series of cyber disruptions affecting Russia’s dairy sector.\u003c/p\u003e\n\n\u003cp\u003eEarlier in the same week, attackers compromised the website of Molochnaya Kukhnya, a state-run dairy producer in Bashkortostan, and posted false claims about power outages and contaminated products. Other recent incidents included a June 2025 disruption of Russia’s electronic veterinary certification system that forced paper documentation and caused logistical bottlenecks, a December ransomware attack on the Semyonishna dairy processing plant, and a September 2024 ransomware incident that left Kabosh production facilities unable to operate for nearly a month.\u003c/p\u003e\n"},{"n":1,"title":"PirloTV sports piracy network disrupted as 44 domains seized","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/pirlotv-sports-piracy-network-disrupted-as-44-domains-seized/","time":"15:36","priority":"MAY READ","score":64,"tldr":"Authorities and anti-piracy groups disrupted the PirloTV sports piracy network by seizing 44 domains that drew over 950 million visits annually, especially in Latin America. The takedown may hamper illegal World Cup streaming, though PirloTV has a history of quickly moving to new domains.","briefOverview":"\u003cp\u003eA major sports piracy ring linked to the illegal PirloTV streaming platform was disrupted through an action targeting 44 domains. The Alliance for Creativity and Entertainment, together with UEFA, UC3, and Mexican authorities, collaborated on the shutdown. ACE said the targeted domains generated more than 950 million visits worldwide each year, including about 230 million visits from Mexico.\u003c/p\u003e\n\n\u003cp\u003ePirloTV is described as a network of websites that aggregates and embeds links to unauthorized live sports streams, primarily soccer, rather than streaming content directly. The service mainly targeted viewers in Latin America, with strong audiences in Mexico and Colombia, while also drawing traffic from Spain and the United States. The article notes that PirloTV is known for quickly moving to new domains after takedowns, and that some domains indexed by public search engines were still offering illegal sports streams at the time of writing.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The Alliance for Creativity and Entertainment, UEFA, UC3, and Mexican authorities collaborated to shut down 44 domains linked to the PirloTV sports piracy network.","ACE said the targeted domains collectively generated more than 950 million visits worldwide each year, including about 230 million visits from Mexico.","PirloTV is a network of websites that aggregates and embeds links to unauthorized live sports streams, primarily soccer, rather than streaming content directly.","The service primarily targeted viewers in Latin America, with strong audiences in Mexico and Colombia and additional traffic from Spain and the United States.","The article says PirloTV can quickly move to new domains, and some domains indexed by public search engines were still providing illegal sports streams at the time of writing."],"insights":["The timing of the domain seizures appears strategically aligned with major football events, as ACE noted the action occurred ahead of the UEFA Champions League final while the FIFA World Cup was underway.","PirloTV’s model of aggregating and embedding links rather than hosting streams directly may make enforcement harder, because the article says it is known for rapidly moving to new domains after takedowns.","The scale of traffic from Mexico alone, about 230 million visits annually, shows why Mexican authorities and IMPI were central to this enforcement action.","The article indicates that domain seizures alone may not fully disrupt access, because some PirloTV-related domains were still indexed by public search engines and offering illegal sports streams at the time of writing."],"referencedReports":[],"body":"\u003cp\u003eA major sports piracy ring linked to the illegal PirloTV streaming platform was disrupted through an action targeting 44 domains. The Alliance for Creativity and Entertainment, together with UEFA, UC3, and Mexican authorities, collaborated on the shutdown. ACE said the targeted domains generated more than 950 million visits worldwide each year, including about 230 million visits from Mexico.\u003c/p\u003e\n\n\u003cp\u003ePirloTV is described as a network of websites that aggregates and embeds links to unauthorized live sports streams, primarily soccer, rather than streaming content directly. The service mainly targeted viewers in Latin America, with strong audiences in Mexico and Colombia, while also drawing traffic from Spain and the United States. The article notes that PirloTV is known for quickly moving to new domains after takedowns, and that some domains indexed by public search engines were still offering illegal sports streams at the time of writing.\u003c/p\u003e\n"},{"n":7,"title":"Maven Support Comes to GitHub Checks and OSS Package Search","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/maven-support-comes-to-github-checks-and-oss-package-search","time":"15:21","priority":"MAY READ","score":55,"tldr":"StepSecurity has added Maven support to its GitHub Checks and OSS Package Search, letting Java teams block compromised or newly published risky dependencies in pull requests and quickly find affected Maven packages across their environments. The launch extends protections previously available for npm and PyPI to the Java supply chain.","briefOverview":"\u003cp\u003eStepSecurity announced Maven support in GitHub Checks and OSS Package Search, alongside existing support for npm and PyPI. The article says Java teams are affected by software supply chain attacks, citing compromised npm content that surfaced on Maven Central through an automated republishing process and a malicious lookalike of the Jackson JSON library. It emphasizes that the dangerous window is between a malicious package being published and later being discovered.\u003c/p\u003e\n\n\u003cp\u003eIn GitHub Checks, StepSecurity added Maven Package Compromised Updates and Maven Package Cooldown. The compromised updates control blocks pull requests that introduce or update Maven dependencies flagged in StepSecurity\u0026rsquo;s compromised-packages database, while the cooldown control blocks recently published Maven versions until they pass a configurable waiting period. Both controls can be set as Required or Optional, and the existing Approve All override can be used when a critical patch must ship inside the cooldown window.\u003c/p\u003e\n\n\u003cp\u003eOSS Package Search now includes Maven in its package ecosystem toggle. The feature can find where a specific Maven package and version appears across pull requests, default branches, and developer machines, link CI/CD findings to the pull request that introduced the dependency, and export results to CSV. StepSecurity also says Maven support for Secure Registry and Dev Machine Guard is coming soon.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["StepSecurity has added Maven as a first-class ecosystem in GitHub Checks and OSS Package Search alongside npm and PyPI.","The article cites recent Maven-related supply chain risks, including Shai-Hulud-related compromised npm content being rebundled as Maven artifacts and a malicious lookalike of the Jackson JSON library appearing in Maven Central.","GitHub Checks now includes Maven Package Compromised Updates to block pull requests that introduce or update Maven dependencies flagged in StepSecurity's compromised-packages database.","GitHub Checks now includes Maven Package Cooldown to block pull requests that add recently published Maven versions until they pass a configurable cooldown window.","OSS Package Search can now find specific Maven packages and versions across pull requests, default branches, and developer machines, link CI/CD findings to the pull request that introduced the dependency, and export results to CSV."],"insights":["The article highlights that Maven can inherit risk from other ecosystems when automated processes re-publish npm modules as Maven artifacts, as happened with compromised Shai-Hulud-related content.","StepSecurity is prioritizing detection speed over formal vulnerability disclosure by using a real-time compromised-packages database, because the article says CVE-based scanners are often too slow for malicious package releases.","A short delay before accepting newly published Maven versions is presented as a practical defense because the article says most malicious releases are caught within the first day or two after publication.","The new Maven controls are designed to stop risky dependencies before they merge into code, while the upcoming Secure Registry support is intended to enforce similar blocking at the point where builds and developer machines fetch packages."],"referencedReports":[],"body":"\u003cp\u003eStepSecurity announced Maven support in GitHub Checks and OSS Package Search, alongside existing support for npm and PyPI. The article says Java teams are affected by software supply chain attacks, citing compromised npm content that surfaced on Maven Central through an automated republishing process and a malicious lookalike of the Jackson JSON library. It emphasizes that the dangerous window is between a malicious package being published and later being discovered.\u003c/p\u003e\n\n\u003cp\u003eIn GitHub Checks, StepSecurity added Maven Package Compromised Updates and Maven Package Cooldown. The compromised updates control blocks pull requests that introduce or update Maven dependencies flagged in StepSecurity\u0026rsquo;s compromised-packages database, while the cooldown control blocks recently published Maven versions until they pass a configurable waiting period. Both controls can be set as Required or Optional, and the existing Approve All override can be used when a critical patch must ship inside the cooldown window.\u003c/p\u003e\n\n\u003cp\u003eOSS Package Search now includes Maven in its package ecosystem toggle. The feature can find where a specific Maven package and version appears across pull requests, default branches, and developer machines, link CI/CD findings to the pull request that introduced the dependency, and export results to CSV. StepSecurity also says Maven support for Secure Registry and Dev Machine Guard is coming soon.\u003c/p\u003e\n"},{"n":8,"title":"Cloud Security Incident Response: 7 Best Practices | Mitiga","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/7-best-practices-for-cloud-incident-response","time":"16:43","priority":"MAY READ","score":55,"tldr":"Cloud incident response requires different preparation than on-premises IR because evidence often lives in cloud-native logs, identity events, and API activity rather than disk images. Organizations should centralize and retain logs, enforce least privilege, preserve cloud evidence, test cloud-specific runbooks, and use native tools or partners to respond quickly.","briefOverview":"\u003cp\u003eThe article explains cloud security incident response as the process of detecting, investigating, and containing breaches across cloud and SaaS environments. It emphasizes that cloud response differs from traditional on-premises response because there may be no endpoint to image, logs can expire quickly, and the cloud provider owns part of the stack under the shared responsibility model. As organizations move more applications and services to the cloud, the article says they must prepare to respond to breaches in ways that fit cloud environments.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends understanding shared responsibility, applying least privilege and zero trust, and configuring, centralizing, and securing logs. It notes that cloud investigations often depend on control-plane logs, identity events, API activity, CloudTrail logs, VPC Flow logs, S3 server access logs, EC2 instance metadata, and EBS snapshots rather than traditional disk forensics. It also stresses that logs should be retained for a sufficient period, likely one year or longer, and protected from accidental or malicious deletion.\u003c/p\u003e\n\n\u003cp\u003eThe article also advises organizations to use built-in cloud monitoring and security tools such as AWS GuardDuty and CloudWatch for proactive threat detection. It says evidence preservation is important during incidents and that incident response plans should be tested through red team, purple team, blue team, and tabletop exercises. Finally, it suggests that organizations may augment internal capabilities with a cloud incident response partner, especially when teams are stretched or lack dedicated incident response resources.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Cloud security incident response relies on cloud-native telemetry such as control-plane logs, identity events, and API activity because some cloud and SaaS environments do not allow traditional endpoint imaging or endpoint security tools.","Organizations should apply least privilege and zero trust by locking down root users with multi-factor authentication, limiting user and resource access, segmenting systems, encrypting communications, and continuously monitoring for threats.","Logs should be configured, centralized, retained for a sufficient period such as one year or longer, and protected from accidental or malicious deletion so they remain available during an investigation.","Cloud-native tools such as AWS GuardDuty and AWS CloudWatch can provide proactive threat detection and help identify malicious or suspicious activity in cloud environments.","Incident response plans should be tested with exercises such as red teams, purple teams, blue teams, and tabletops, and organizations may augment internal capabilities with a cloud incident response partner."],"insights":["An on-premises incident response plan may not transfer cleanly to cloud environments because parts of the stack cannot be imaged by the customer and must be investigated through provider-owned telemetry }

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
