<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

<script>
window.__DL_ARTICLES = [{"n":2,"title":"Ivanti warns of new EPMM flaw exploited in zero-day attacks","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/ivanti-warns-of-new-epmm-flaw-exploited-in-zero-day-attacks/","time":"15:20","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"Ivanti urges immediate patching of Endpoint Manager Mobile to versions 12.6.1.1, 12.7.0.1, or 12.8.0.1 to mitigate CVE-2026-6973, a high-severity zero-day remote code execution flaw actively exploited in the wild. Administrators should also rotate privileged credentials to prevent unauthorized access.","briefOverview":"\u003cp\u003eIvanti has issued an urgent warning for customers to patch Endpoint Manager Mobile against CVE-2026-6973, a high-severity remote code execution flaw actively exploited in zero-day attacks. The vulnerability stems from improper input validation and allows attackers with administrative privileges to run arbitrary code on vulnerable EPMM versions. To mitigate the threat, organizations must update to EPMM 12.6.1.1, 12.7.0.1, or 12.8.0.1 and rotate credentials for all administrative accounts. Security researchers note that over 850 exposed EPMM servers are currently visible online, primarily across Europe and North America.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eIvanti has warned customers to urgently patch Endpoint Manager Mobile to address CVE-2026-6973, a high-severity remote code execution vulnerability currently exploited in zero-day attacks. The flaw originates from an improper input validation weakness that permits remote attackers with administrative privileges to execute arbitrary code on systems running EPMM 12.8.0.0 or earlier. The company recommends immediate mitigation by installing EPMM versions 12.6.1.1, 12.7.0.1, or 12.8.0.1, alongside rotating credentials for any accounts holding administrative rights. At the time of disclosure, Ivanti reported only limited exploitation of this specific CVE and confirmed it does not impact cloud-based offerings like Ivanti Neurons for MDM or Ivanti EPM.\u003c/p\u003e\n\n\u003cp\u003eIn addition to the zero-day, Ivanti patched four other high-severity EPMM vulnerabilities, including CVE-2026-5786, CVE-2026-5787, CVE-2026-5788, and CVE-2026-7821. These additional flaws could allow attackers to gain admin access, impersonate Sentry hosts for certificate theft, invoke arbitrary methods, or access restricted data. While there is no evidence of wild exploitation for these four flaws, CVE-2026-7821 remains actionable by unprivileged users who have configured Apple Device Enrollment.\u003c/p\u003e\n\n\u003cp\u003eThe article references a January advisory where Ivanti disclosed two critical EPMM code-injection vulnerabilities, CVE-2026-1281 and CVE-2026-1340, which were also exploited in zero-day attacks. Following that earlier advisory, the U.S. Cybersecurity and Infrastructure Security Agency mandated that federal agencies patch CVE-2026-1340 within four days. Historical data shows that numerous EPMM zero-days have been leveraged in recent years to breach government agencies worldwide.\u003c/p\u003e\n\n\u003cp\u003eCISA has officially flagged 33 Ivanti vulnerabilities as actively exploited in the wild, with twelve of those directly linked to ransomware operations. Currently, Shadowserver tracks over 850 publicly exposed EPMM IP addresses, with the majority located in Europe and North America. Ivanti continues to serve more than 40,000 customers globally through a partner network exceeding 7,000 entities.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eIvanti has issued a critical security advisory regarding Endpoint Manager Mobile (EPMM), urging immediate patching to mitigate CVE-2026-6973. This high-severity remote code execution vulnerability is actively exploited in zero-day attacks and stems from improper input validation. Organizations must update to specific patched versions and rotate administrative credentials to prevent exploitation.\u003c/p\u003e\n\n\u003ch3 id=\"vulnerability-details-and-mitigation\"\u003eVulnerability Details and Mitigation\u003c/h3\u003e\n\n\u003cp\u003eThe primary flaw, CVE-2026-6973, requires administrative privileges to execute arbitrary code on vulnerable EPMM systems running version 12.8.0.0 or earlier. Ivanti has released updated versions 12.6.1.1, 12.7.0.1, and 12.8.0.1 as the official mitigation paths. The company explicitly states that the vulnerability only affects the on-premises EPMM product and does not impact cloud-based solutions like Ivanti Neurons for MDM, Ivanti EPM, or Ivanti Sentry. At the time of disclosure, exploitation was reported as very limited. Security teams are advised to review and rotate credentials for all accounts with administrative rights to significantly reduce the attack surface.\u003c/p\u003e\n\n\u003ch3 id=\"additional-patched-vulnerabilities\"\u003eAdditional Patched Vulnerabilities\u003c/h3\u003e\n\n\u003cp\u003eAlongside the zero-day, Ivanti addressed four other high-severity EPMM flaws:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-5786\u003c/li\u003e\n\u003cli\u003eCVE-2026-5787\u003c/li\u003e\n\u003cli\u003eCVE-2026-5788\u003c/li\u003e\n\u003cli\u003eCVE-2026-7821\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese vulnerabilities could enable attackers to gain administrative access, impersonate registered Sentry hosts to obtain valid certificates, invoke arbitrary methods, or access restricted information. There is currently no evidence of wild exploitation for these flaws. However, CVE-2026-7821 is notable because it can be exploited without privileges, specifically affecting users who have configured Apple Device Enrollment.\u003c/p\u003e\n\n\u003ch3 id=\"historical-context-and-regulatory-response\"\u003eHistorical Context and Regulatory Response\u003c/h3\u003e\n\n\u003cp\u003eThis advisory follows a January disclosure of two critical EPMM code-injection vulnerabilities, CVE-2026-1281 and CVE-2026-1340, which were also exploited in zero-day attacks. Ivanti noted that organizations that rotated credentials in response to the January advisory face significantly reduced risk from the current CVE-2026-6973. The U.S. Cybersecurity and Infrastructure Security Agency (CISA) previously issued an emergency directive, ordering federal agencies to patch CVE-2026-1340 within four days.\u003c/p\u003e\n\n\u003ch3 id=\"threat-landscape-and-infrastructure-exposure\"\u003eThreat Landscape and Infrastructure Exposure\u003c/h3\u003e\n\n\u003cp\u003eMultiple EPMM zero-days have been leveraged in recent years to breach government agencies and other high-value targets worldwide. CISA has officially flagged 33 Ivanti vulnerabilities as actively exploited in the wild, with twelve directly linked to ransomware operations. Internet security watchdog Shadowserver currently tracks over 850 publicly exposed EPMM IP addresses, with 508 located in Europe and 182 in North America. The article does not specify how many of these exposed systems have already been patched against the current zero-day. Ivanti continues to provide IT asset management products to over 40,000 customers through a global partner network of more than 7,000 entities.\u003c/p\u003e\n","keyPoints":["Ivanti warned customers to patch Endpoint Manager Mobile to address CVE-2026-6973, a high-severity remote code execution vulnerability actively exploited in zero-day attacks.","The flaw results from improper input validation that allows remote attackers with administrative privileges to execute arbitrary code on EPMM versions 12.8.0.0 and earlier.","Customers should mitigate the risk by installing EPMM versions 12.6.1.1, 12.7.0.1, or 12.8.0.1 and rotating credentials for all accounts with administrative rights.","The vulnerability exclusively affects the on-premises EPMM product and does not impact Ivanti's cloud-based solutions or other product offerings.","Shadowserver currently tracks over 850 exposed IP addresses running Ivanti EPMM, with the majority located in Europe and North America."],"insights":["Rotating administrative credentials directly mitigates CVE-2026-6973, as the vulnerability requires admin authentication to execute arbitrary code.","Organizations that already rotated credentials following Ivanti's January advisory for CVE-2026-1281 and CVE-2026-1340 face significantly reduced risk from the current zero-day.","CVE-2026-7821 allows privilege-free exploitation but is strictly limited to environments that have configured Apple Device Enrollment.","CISA has officially flagged 33 Ivanti vulnerabilities as actively exploited in the wild, with 12 directly linked to ransomware operations, indicating a sustained, high-value attack pattern."],"referencedReports":[{"title":"CISA Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?f%5B0%5D=vendor_project%3A817","publisher":"Cybersecurity and Infrastructure Security Agency (CISA)","context":"The article cites this official catalog to state that CISA has flagged 33 Ivanti vulnerabilities as actively exploited in the wild."}],"body":"\u003cp\u003eIvanti has issued an urgent warning for customers to patch Endpoint Manager Mobile against CVE-2026-6973, a high-severity remote code execution flaw actively exploited in zero-day attacks. The vulnerability stems from improper input validation and allows attackers with administrative privileges to run arbitrary code on vulnerable EPMM versions. To mitigate the threat, organizations must update to EPMM 12.6.1.1, 12.7.0.1, or 12.8.0.1 and rotate credentials for all administrative accounts. Security researchers note that over 850 exposed EPMM servers are currently visible online, primarily across Europe and North America.\u003c/p\u003e\n"},{"n":1,"title":"North Carolina man pleads guilty to doxxing Supreme Court justices","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/north-carolina-man-pleads-guilty-to-doxxing","time":"15:00","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"A North Carolina man pleaded guilty to doxxing Supreme Court justices by publishing their home addresses online, underscoring the severe security risks and ease of accessing sensitive personal data for public officials.","briefOverview":"\u003cp\u003eKyle Edwards, a 59-year-old man from North Carolina, pleaded guilty to federal charges for doxxing a Supreme Court justice. He posted the justice\u0026rsquo;s home address on a publicly accessible social media site alongside life threats. Edwards also shared the former addresses and neighborhoods of two other Supreme Court justices on the same platform.\u003c/p\u003e\n\n\u003cp\u003eHe admitted to telling the targeted justice to buy Kevlar robes and encouraged others to turn multiple justices into charcoal. The public nature of the account attracted additional users who suggested attacking the justice. Prosecutors have not publicly identified the targeted justice.\u003c/p\u003e\n\n\u003cp\u003eThis case highlights the severe security risks public officials face from doxxing and the ease of accessing sensitive personal data online. The incident follows a separate October breach where a hacking group published personal data belonging to hundreds of federal law enforcement and homeland security officials. Edwards now faces a maximum prison sentence of five years.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eKyle Edwards, aged 59, pleaded guilty on Wednesday to federal charges related to doxxing a United States Supreme Court justice. The charges stem from his actions of posting the justice\u0026rsquo;s current home address on a social media platform and issuing direct threats against their life. While prosecutors have chosen not to publicly identify the specific justice involved, the case illustrates the broader vulnerabilities faced by high-profile government officials.\u003c/p\u003e\n\n\u003cp\u003eEdwards\u0026rsquo; activities extended beyond a single target, as he also published the former residential addresses and neighborhood details for two additional Supreme Court justices on the same publicly accessible account. According to a Department of Justice press release, Edwards explicitly told the targeted justice to purchase Kevlar robes for protection. He further encouraged other users to turn multiple justices into charcoal.\u003c/p\u003e\n\n\u003cp\u003eThe open nature of the social media account allowed other individuals to engage with the posts and suggest violent attacks against the justice. This incident underscores how easily sensitive personal information can be located and disseminated online. It also reflects a growing pattern of threats against public servants, mirroring a separate October incident where a hacking group known as the Com reportedly leaked personal data belonging to hundreds of DHS, ICE, FBI, and DOJ officials. Edwards is now subject to a maximum sentence of five years in federal prison.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview\"\u003eIncident Overview\u003c/h3\u003e\n\n\u003cp\u003eKyle Edwards, a 59-year-old resident of North Carolina, pleaded guilty on Wednesday to federal charges. The charges allege that he doxxed a United States Supreme Court justice by publishing their home address on a social media site. He also issued direct threats to the justice\u0026rsquo;s life. Prosecutors have not publicly disclosed the identity of the targeted justice.\u003c/p\u003e\n\n\u003ch3 id=\"perpetrator-actions-threats\"\u003ePerpetrator Actions \u0026amp; Threats\u003c/h3\u003e\n\n\u003cp\u003eEdwards\u0026rsquo; doxxing activities extended beyond a single target. He posted the former home addresses and neighborhood locations of two additional Supreme Court justices on the same platform. Key details from the Department of Justice press release include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEdwards admitted to telling the targeted justice to buy Kevlar robes.\u003c/li\u003e\n\u003cli\u003eHe encouraged other users to turn multiple justices into charcoal.\u003c/li\u003e\n\u003cli\u003eThe posts were made on a publicly accessible social media account.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"platform-dynamics-engagement\"\u003ePlatform Dynamics \u0026amp; Engagement\u003c/h3\u003e\n\n\u003cp\u003eThe open nature of the account allowed other users to view and interact with the posts. These users suggested attacking the targeted justice. The incident underscores how easily sensitive personal information can be located and disseminated online. It also demonstrates the immediate security risks public officials face from doxxing.\u003c/p\u003e\n\n\u003ch3 id=\"broader-context-threat-landscape\"\u003eBroader Context \u0026amp; Threat Landscape\u003c/h3\u003e\n\n\u003cp\u003eThis case occurs against a backdrop of increased targeting of government officials. In October, a hacking group known as the Com reportedly published personal data belonging to hundreds of officials. The compromised data included individuals from the Department of Homeland Security, Immigration and Customs Enforcement, the Federal Bureau of Investigation, and the Department of Justice. This pattern illustrates a systemic vulnerability across multiple federal agencies.\u003c/p\u003e\n\n\u003ch3 id=\"legal-consequences\"\u003eLegal Consequences\u003c/h3\u003e\n\n\u003cp\u003eEdwards faces a maximum sentence of five years in prison for his actions. The case underscores the legal and security ramifications of publishing private residential data for public figures. Federal authorities continue to track and prosecute individuals who exploit online platforms to threaten government officials.\u003c/p\u003e\n","keyPoints":["Kyle Edwards, a 59-year-old North Carolina man, pleaded guilty to federal charges for doxxing a Supreme Court justice by posting their home address on a social media site.","Edwards also posted the former home addresses and neighborhoods of two additional Supreme Court justices and made threats encouraging violence against them.","The public social media account used by Edwards attracted other users who suggested attacking the targeted justice.","Edwards faces a maximum sentence of five years in prison for these actions."],"insights":["The publicly accessible nature of the social media account enabled crowd-sourced threat amplification, as other users actively engaged by suggesting attacks on the targeted justice.","A separate hacking group recently compromised hundreds of federal law enforcement and homeland security officials, indicating a broader, systemic vulnerability across multiple government agencies rather than an isolated incident.","The perpetrator’s references to \"Kevlar robes\" and turning justices \"into charcoal\" suggest attackers are actively researching and exploiting publicly known judicial security protocols to craft targeted intimidation.","Federal charges for doxxing carry a maximum five-year sentence, underscoring a potential gap between the severe physical security risks of exposed personal data and the legal consequences faced by perpetrators."],"referencedReports":[],"body":"\u003cp\u003eKyle Edwards, a 59-year-old man from North Carolina, pleaded guilty to federal charges for doxxing a Supreme Court justice. He posted the justice\u0026rsquo;s home address on a publicly accessible social media site alongside life threats. Edwards also shared the former addresses and neighborhoods of two other Supreme Court justices on the same platform.\u003c/p\u003e\n\n\u003cp\u003eHe admitted to telling the targeted justice to buy Kevlar robes and encouraged others to turn multiple justices into charcoal. The public nature of the account attracted additional users who suggested attacking the justice. Prosecutors have not publicly identified the targeted justice.\u003c/p\u003e\n\n\u003cp\u003eThis case highlights the severe security risks public officials face from doxxing and the ease of accessing sensitive personal data online. The incident follows a separate October breach where a hacking group published personal data belonging to hundreds of federal law enforcement and homeland security officials. Edwards now faces a maximum prison sentence of five years.\u003c/p\u003e\n"},{"n":3,"title":"The Browser Is Breaking Your DLP: How Data Slips Past Modern Controls","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/the-browser-is-breaking-your-dlp-how-data-slips-past-modern-controls/","time":"14:01","priority":"SHOULD READ","score":80,"group":null,"groupColor":null,"tldr":"Traditional data loss prevention tools fail to detect sensitive data leaks occurring through browser-based activities like copy and paste, form inputs, and file uploads to unsanctioned accounts. Implementing browser-native DLP is essential to gain real-time visibility and enforce inline controls directly within user sessions to close this critical security gap.","briefOverview":"\u003cp\u003eTraditional data loss prevention tools are failing to protect sensitive information because they focus on endpoints and networks rather than modern browser-based workflows. Employees routinely copy data, type into forms, and upload files directly into web applications and AI tools like ChatGPT.\u003c/p\u003e\n\n\u003cp\u003eStudies show that 46% of sensitive file uploads to web apps are sent to unsanctioned accounts, creating a major visibility gap. Traditional DLP cannot inspect clipboard actions, form inputs, or browser session contexts, allowing data to leave the organization undetected.\u003c/p\u003e\n\n\u003cp\u003eBrowser-native DLP solutions address this by operating directly within browsing sessions to monitor real-time user interactions. These tools understand the application context, account type, and data being handled to enforce inline controls. This approach complements existing security stacks by closing the critical blind spot in modern data protection.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ePreventing sensitive data loss has historically relied on endpoint and network controls that inspect files and monitor traffic. However, enterprise workflows have shifted heavily toward browser-based applications like Google Workspace, Microsoft 365, Salesforce, and AI tools.\u003c/p\u003e\n\n\u003cp\u003eEmployees now interact with data directly in the browser by copying information, typing into web forms, and uploading files to various platforms. Recent analysis reveals that 46% of sensitive file uploads to web applications are directed to unsanctioned accounts, highlighting a significant monitoring gap.\u003c/p\u003e\n\n\u003cp\u003eTraditional DLP solutions lack visibility into these browser activities and cannot inspect clipboard operations, form inputs, or AI prompts. Network and endpoint controls never trigger when data is typed or pasted within a browser session. Furthermore, employees frequently use personal accounts and shadow instances within approved domains, making risky behavior indistinguishable from normal usage.\u003c/p\u003e\n\n\u003cp\u003eA real-world example involves developers copying proprietary code from internal repositories and pasting it into personal AI sessions, bypassing all traditional safeguards. Browser-native DLP operates directly within user browsing sessions to inspect data in real time. These solutions understand critical context, including the specific application in use, whether the account is corporate or personal, and the type of data being handled.\u003c/p\u003e\n\n\u003cp\u003eSecurity teams can enforce inline controls that block or warn on risky actions based on conditional policies. This approach does not replace existing DLP stacks but complements them by addressing activities traditional tools were never designed to monitor. By capturing forensic details and providing real-time alerts, browser-native DLP turns invisible user behavior into actionable security signals.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"the-modern-dlp-blind-spot\"\u003eThe Modern DLP Blind Spot\u003c/h2\u003e\n\n\u003cp\u003eTraditional data loss prevention strategies have historically treated security as an endpoint or network problem. Organizations deploy agents, inspect files, and monitor traffic, assuming this provides comprehensive coverage. However, recent analysis indicates that 46% of sensitive file uploads to web applications are sent to unsanctioned accounts. This statistic exposes a critical gap in how organizations monitor and control data movement across their digital ecosystems.\u003c/p\u003e\n\n\u003ch2 id=\"why-traditional-dlp-fails\"\u003eWhy Traditional DLP Fails\u003c/h2\u003e\n\n\u003cp\u003eEnterprise workflows have fundamentally shifted from desktop software to browser-based applications. Employees routinely use platforms like Google Workspace, Microsoft 365, Salesforce, GitHub, Jira, and AI tools such as ChatGPT. Instead of downloading and re-uploading files, users interact with data directly within the browser.\u003c/p\u003e\n\n\u003cp\u003eThis includes copying data between applications, uploading files to various tools, and inputting information into web forms and AI prompts. Compounding this risk is the widespread use of personal accounts and unsanctioned instances without restriction. Traditional DLP controls are not instrumented to monitor these browser-based activities.\u003c/p\u003e\n\n\u003ch2 id=\"how-sensitive-data-leaves-the-browser\"\u003eHow Sensitive Data Leaves the Browser\u003c/h2\u003e\n\n\u003cp\u003eData leakage in modern environments occurs through several specific browser activities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCopy and Paste:\u003c/strong\u003e Users copy sensitive records, credentials, and source code from internal systems and paste them into personal email, SaaS apps, and AI tools. The clipboard acts as a high-risk channel that traditional DLP cannot inspect with necessary context.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eForm Inputs and AI Prompts:\u003c/strong\u003e Sensitive data is frequently typed directly into web forms, SaaS applications, or AI prompts. Operating solely within the browser session, endpoint and network DLP controls never trigger.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFile Uploads to SaaS and AI Tools:\u003c/strong\u003e File uploads remain a major data loss vector. Employees upload source code, financial data, and customer records to various tools. Up to half of these uploads may target unsanctioned destinations, including personal accounts or unapproved tools.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eShadow Accounts and Instances:\u003c/strong\u003e Risk persists even within approved domains. Users may upload sensitive records to AI prompts using personal accounts or store files in personal cloud storage instead of corporate repositories. Traditional DLP cannot distinguish this activity from normal usage.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"real-world-example-and-traditional-dlp-limitations\"\u003eReal-World Example and Traditional DLP Limitations\u003c/h2\u003e\n\n\u003cp\u003eA developer accessing a private repository can copy proprietary code and paste it into a personal ChatGPT session to troubleshoot an issue. No file is downloaded or uploaded, and traffic to the AI tool is permitted, so network protection remains silent. Traditional DLP does not flag the paste action, making the sequence appear as benign activity despite introducing real risk.\u003c/p\u003e\n\n\u003cp\u003eTraditional DLP solutions were designed for a different risk model focusing on files at rest and data in motion across endpoints and networks. Endpoint DLP lacks visibility into browser copy/paste activities, web application interactions, and user account types. Network DLP lacks the same context, even with proxy inspection, and distributed workforces exacerbate visibility issues. Cloud DLP provides governance over specific sanctioned instances but cannot inspect unsanctioned browser sessions.\u003c/p\u003e\n\n\u003ch2 id=\"browser-native-dlp-closing-the-gap\"\u003eBrowser-Native DLP: Closing the Gap\u003c/h2\u003e\n\n\u003cp\u003eBrowser-native DLP operates directly within users’ browsing sessions, providing unique visibility and control. These solutions enable organizations to inspect data in real time across copy/paste activities, form inputs, and file uploads. They understand critical context, including the application in use, the account type, and the data classification.\u003c/p\u003e\n\n\u003cp\u003eSecurity teams can enforce inline controls that block or warn on risky actions based on conditional policies. This approach complements existing DLP stacks by filling a glaring visibility gap that network and endpoint tools cannot address. Solutions like Keep Aware analyze data at the point of user interaction, applying inline enforcement policies to block sensitive actions or reinforce acceptable use policies. This turns previously invisible browser behavior into clear, actionable security signals with robust forensic evidence collection.\u003c/p\u003e\n","keyPoints":["Traditional endpoint and network DLP controls cannot inspect or control browser-based activities like copy and paste, form inputs, or file uploads to unsanctioned accounts.","Analysis shows that 46% of sensitive file uploads to web applications are sent to unsanctioned accounts, exposing a significant visibility gap in current security strategies.","Browser-native DLP operates directly within browsing sessions to inspect data in real time, understand application and account context, and enforce inline controls such as blocking or warning on risky actions.","Modern workflows increasingly rely on browser applications and AI tools, allowing sensitive data to leave organizations through typed inputs and clipboard actions without triggering traditional file or network protections."],"insights":["Clipboard operations and direct form or AI prompt inputs bypass traditional DLP because these controls are not instrumented to inspect browser session activities.","Nearly half of sensitive file uploads target unsanctioned accounts, creating a visibility gap where traditional DLP cannot differentiate between corporate and personal instances within approved domains.","Browser-native DLP enables inline policy enforcement that can block or warn on risky actions in real time based on the specific application, account type, and data being handled.","Modern data protection must shift focus from monitoring files at rest or network traffic to inspecting user interactions directly within the browser session."],"referencedReports":[{"title":"The State of Browser Security Report 2026","url":"https://keepaware.com/resources/guides/the-state-of-browser-security-report-2026-2?utm_source=bleeping_computer\u0026utm_medium=article\u0026utm_campaign=may26","publisher":"Keep Aware","context":"The article cites this report to support the finding that 46% of sensitive file uploads to web applications are sent to unsanctioned accounts."}],"body":"\u003cp\u003eTraditional data loss prevention tools are failing to protect sensitive information because they focus on endpoints and networks rather than modern browser-based workflows. Employees routinely copy data, type into forms, and upload files directly into web applications and AI tools like ChatGPT.\u003c/p\u003e\n\n\u003cp\u003eStudies show that 46% of sensitive file uploads to web apps are sent to unsanctioned accounts, creating a major visibility gap. Traditional DLP cannot inspect clipboard actions, form inputs, or browser session contexts, allowing data to leave the organization undetected.\u003c/p\u003e\n\n\u003cp\u003eBrowser-native DLP solutions address this by operating directly within browsing sessions to monitor real-time user interactions. These tools understand the application context, account type, and data being handled to enforce inline controls. This approach complements existing security stacks by closing the critical blind spot in modern data protection.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function GroupBadge({ group, groupColor }) {
  if (!group || !groupColor) return null;
  const c = groupColor;
  return (
    <span style={{
      display: "inline-block", flexShrink: 0,
      width: 20, height: 20,
      border: "1px solid color-mix(in oklch, " + c + " 45%, transparent)",
      background: "color-mix(in oklch, " + c + " 12%, transparent)",
      borderRadius: 2
    }} />
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));

    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);

  return (
    <nav style={{
      position: "sticky", top: 0, zIndex: 100,

      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <div className="live-dot" />
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em" }}>LIVE</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      </div>
      <div style={{
        fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
        border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
      }}>
        {Math.min(index + 1, total)} / {total}
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>

        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>

          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
