window.__DL_ARTICLES = [{"n":4,"title":"CISA Adds Exploited Magento RCE Flaw CVE-2026-45247 to KEV Catalog","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cisa-adds-exploited-magento-rce-flaw.html","time":"07:19","priority":"MUST READ","score":95,"tldr":"CISA added CVE-2026-45247, a critical remote code execution flaw in the Mirasvit Cache Warmer Magento extension, to its Known Exploited Vulnerabilities catalog after active attacks were observed. Affected sites should update to version 1.11.12 or later and check for suspicious CacheWarmer cookies indicating exploitation attempts.","briefOverview":"\u003cp\u003eCISA added CVE-2026-45247, a critical flaw in the Mirasvit Cache Warmer Magento full-page cache extension, to its Known Exploited Vulnerabilities catalog after reports of active exploitation. The vulnerability has a CVSS score of 9.8 and affects all versions of the extension prior to 1.11.12. Patches were released on May 25, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe flaw is a deserialization of untrusted data issue that can allow unauthenticated attackers to execute arbitrary PHP code on an affected server. CISA said attackers can exploit it by supplying a crafted serialized PHP object in the CacheWarmer cookie. Sansec described the issue as PHP object injection involving PHP’s native unserialize() function.\u003c/p\u003e\n\n\u003cp\u003eImperva observed active attack activity using base64-encoded serialized PHP object payloads delivered through malicious HTTP requests. The activity primarily targeted gaming and business sites, with the U.S., the U.K., France, and Australia named as the most targeted countries. Federal Civilian Executive Branch agencies were ordered to apply fixes by June 6, 2026.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA added CVE-2026-45247 to its Known Exploited Vulnerabilities catalog after reports that the flaw is being actively exploited in the wild. The issue affects Mirasvit Cache Warmer, a popular Magento full-page cache extension. The vulnerability is rated critical with a CVSS score of 9.8.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-45247 is a deserialization of untrusted data vulnerability that can enable remote code execution. CISA said unauthenticated attackers can exploit the flaw by supplying a crafted serialized PHP object in the CacheWarmer cookie. The vulnerability affects all versions of the extension before version 1.11.12, and patches were released on May 25, 2026.\u003c/p\u003e\n\n\u003cp\u003eSansec said the vulnerability can be exploited through any storefront request carrying a crafted CacheWarmer cookie. The cookie value is deserialized with PHP’s native unserialize() function without requiring authentication or admin privileges. Sansec said this creates PHP object injection and can escalate to remote code execution when combined with a gadget chain from classes already shipped with Magento and its dependencies.\u003c/p\u003e\n\n\u003cp\u003eSansec identified about 6,000 stores running Mirasvit extensions, while noting that the exact number is likely higher because CDNs such as Cloudflare can mask installs. Imperva later disclosed that it had observed active attack activity attempting to exploit the vulnerability through serialized PHP object payloads in malicious HTTP requests. The payloads were designed to trigger PHP object deserialization and remote code execution through commonly abused gadget chains.\u003c/p\u003e\n\n\u003cp\u003eImperva said some observed payloads attempted to invoke functions such as system() and current() to execute arbitrary commands on the server. In several cases, attackers used test commands to validate successful code execution. The activity primarily targeted gaming and business sites, with the U.S., the U.K., France, and Australia emerging as the most targeted countries, and the actor behind the activity is currently not known.\u003c/p\u003e\n\n\u003cp\u003eFederal Civilian Executive Branch agencies were ordered to apply the fixes by June 6, 2026. Site owners were advised to audit storefront requests carrying a CacheWarmer cookie whose value contains the marker “CacheWarmer:” followed by a Base64-encoded string. Sansec said a CacheWarmer cookie value matching “CacheWarmer:(Tz|Qz|YT)” is a strong indicator of an exploitation attempt.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA added CVE-2026-45247 to its Known Exploited Vulnerabilities catalog after reports of active exploitation in the wild. The vulnerability affects Mirasvit Cache Warmer, a popular Magento full-page cache extension. The flaw is rated critical, with a CVSS score of 9.8.\u003c/p\u003e\n\n\u003cp\u003eThe issue affects all versions of the extension prior to version 1.11.12. Patches were released on May 25, 2026. In response to active exploitation, Federal Civilian Executive Branch agencies were ordered to apply the fixes by June 6, 2026.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-45247 is described as a deserialization of untrusted data vulnerability. CISA said the flaw could allow unauthenticated attackers to achieve remote code execution by supplying a crafted serialized PHP object in the CacheWarmer cookie.\u003c/p\u003e\n\n\u003cp\u003eSansec said the vulnerability can be exploited through any storefront request that carries a crafted CacheWarmer cookie. The cookie value is deserialized using PHP’s native unserialize() function without requiring authentication or admin privileges. Because the value comes directly from the client, an attacker controls the objects PHP reconstructs.\u003c/p\u003e\n\n\u003cp\u003eSansec characterized the issue as PHP object injection, corresponding to CWE-502. It said that, when combined with a gadget chain from classes already shipped with Magento and its dependencies, object injection can escalate to remote code execution.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-and-affected-parties\"\u003eExposure and Affected Parties\u003c/h2\u003e\n\n\u003cp\u003eSansec said it identified about 6,000 stores running Mirasvit extensions. The company also said the exact number is likely higher because content delivery networks such as Cloudflare can mask installs.\u003c/p\u003e\n\n\u003cp\u003eThe affected software is Mirasvit Cache Warmer for Magento. The article identifies gaming and business sites as the primary targets of observed activity. The U.S., the U.K., France, and Australia were named as the most targeted countries.\u003c/p\u003e\n\n\u003ch2 id=\"observed-exploitation\"\u003eObserved Exploitation\u003c/h2\u003e\n\n\u003cp\u003eImperva disclosed that it observed active attack activity attempting to exploit CVE-2026-45247. The observed attacks used serialized PHP object payloads delivered through malicious HTTP requests.\u003c/p\u003e\n\n\u003cp\u003eAccording to Imperva, observed payloads contained base64-encoded serialized objects designed to trigger PHP object deserialization and achieve remote code execution through commonly abused gadget chains. The payloads attempted to invoke functions such as system() and current() to execute arbitrary commands on the underlying server.\u003c/p\u003e\n\n\u003cp\u003eImperva also said that in several observed cases, attackers used test commands designed to validate successful code execution. The article states that it is currently not known who is behind the exploitation efforts. It also says the apparent end goal is to flag vulnerable Magento environments and confirm that remote code execution is possible.\u003c/p\u003e\n\n\u003ch2 id=\"detection-guidance-mentioned-in-the-article\"\u003eDetection Guidance Mentioned in the Article\u003c/h2\u003e\n\n\u003cp\u003eSite owners were advised to audit storefront requests that carry a CacheWarmer cookie whose value contains the marker “CacheWarmer:” followed by a Base64-encoded string.\u003c/p\u003e\n\n\u003cp\u003eSansec added that serialized PHP objects base64-encode to values starting with “Tz,” “Qz,” or “YT.” As a result, a CacheWarmer cookie value matching “CacheWarmer:(Tz|Qz|YT)” is a strong indicator of an exploitation attempt.\u003c/p\u003e\n\n\u003ch2 id=\"response\"\u003eResponse\u003c/h2\u003e\n\n\u003cp\u003eCISA’s addition of CVE-2026-45247 to the Known Exploited Vulnerabilities catalog followed reports of active exploitation. Federal Civilian Executive Branch agencies were required to apply the fixes by June 6, 2026. The article states that patches were released on May 25, 2026, and that affected versions are all versions prior to 1.11.12.\u003c/p\u003e\n","keyPoints":["CISA added CVE-2026-45247, a critical flaw affecting the Mirasvit Cache Warmer Magento full-page cache extension, to its Known Exploited Vulnerabilities catalog after reports of active exploitation.","CVE-2026-45247 is a deserialization of untrusted data vulnerability that can allow unauthenticated attackers to execute arbitrary PHP code by supplying a crafted serialized PHP object in the CacheWarmer cookie.","The vulnerability affects all versions of the Mirasvit Cache Warmer extension before version 1.11.12, and patches were released on May 25, 2026.","Imperva observed active exploitation attempts using base64-encoded serialized PHP object payloads in malicious HTTP requests to trigger PHP object deserialization and remote code execution.","Federal Civilian Executive Branch agencies were ordered to apply fixes by June 6, 2026, and site owners were advised to audit requests containing CacheWarmer cookies with suspicious base64-encoded serialized object markers."],"insights":["Exploitation can be attempted through any storefront request carrying a crafted CacheWarmer cookie, meaning attackers do not need authentication or Magento admin access to reach the vulnerable code path.","A practical detection indicator is a CacheWarmer cookie value matching CacheWarmer:(Tz|Qz|YT), because serialized PHP objects base64-encode to values beginning with Tz, Qz, or YT.","The true exposure may be larger than Sansec’s estimate of about 6,000 stores running Mirasvit extensions because CDNs such as Cloudflare can mask installations.","Observed attacker payloads included test commands to validate code execution, indicating some activity was focused on identifying vulnerable Magento environments and confirming remote code execution."],"referencedReports":[{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/03/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article cites CISA's alert announcing that CVE-2026-45247 was added to the Known Exploited Vulnerabilities catalog after active exploitation reports.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"The article quotes CISA's KEV catalog description of the Mirasvit Full Page Cache Warmer deserialization flaw and its remote code execution impact.","category":"","primary":false},{"title":"Mirasvit Cache Warmer Object Injection","url":"https://sansec.io/research/mirasvit-cache-warmer-object-injection","publisher":"Sansec","context":"The article references Sansec's research explaining how the CacheWarmer cookie can trigger PHP object injection and escalate to remote code execution.","category":"","primary":false},{"title":"Imperva Customers Protected Against CVE-2026-45247 in Mirasvit Full Page Cache Warmer for Magento","url":"https://www.imperva.com/blog/imperva-customers-protected-against-cve-2026-45247-in-mirasvit-full-page-cache-warmer-for-magento/","publisher":"Imperva","context":"The article cites Imperva's disclosure of observed exploitation attempts using base64-encoded serialized PHP object payloads against CVE-2026-45247.","category":"","primary":false}],"body":"\u003cp\u003eCISA added CVE-2026-45247, a critical flaw in the Mirasvit Cache Warmer Magento full-page cache extension, to its Known Exploited Vulnerabilities catalog after reports of active exploitation. The vulnerability has a CVSS score of 9.8 and affects all versions of the extension prior to 1.11.12. Patches were released on May 25, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe flaw is a deserialization of untrusted data issue that can allow unauthenticated attackers to execute arbitrary PHP code on an affected server. CISA said attackers can exploit it by supplying a crafted serialized PHP object in the CacheWarmer cookie. Sansec described the issue as PHP object injection involving PHP’s native unserialize() function.\u003c/p\u003e\n\n\u003cp\u003eImperva observed active attack activity using base64-encoded serialized PHP object payloads delivered through malicious HTTP requests. The activity primarily targeted gaming and business sites, with the U.S., the U.K., France, and Australia named as the most targeted countries. Federal Civilian Executive Branch agencies were ordered to apply fixes by June 6, 2026.\u003c/p\u003e\n"},{"n":2,"title":"Fake Sites Mimicking Open-Source Tools Rank High on Google to Deliver Malware via TDS","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/fake-sites-mimicking-open-source-tools.html","time":"09:51","priority":"SHOULD READ","score":84,"tldr":"Fake websites impersonating popular open-source tools are ranking highly on Google and using download-click hijacking plus a gated Traffic Distribution System to selectively deliver malware such as SessionGate, Remus Stealer, and AnimateClipper. The campaign shows how SEO-driven traffic monetization infrastructure can be repurposed into an evasive malware delivery pipeline.","briefOverview":"\u003cp\u003eCybersecurity researchers have identified a large-scale operation that impersonates open-source and freeware projects to route users through a Traffic Distribution System and deliver malware. The fake sites mimic trusted tools such as Ghidra, dnSpy, and SpiderFoot, and some rank highly in Google search results for related terms. Check Point reported that the campaign has been active since at least September 2025, with malware distribution beginning in January 2026.\u003c/p\u003e\n\n\u003cp\u003eThe sites are designed to look like legitimate project portals and may preserve real GitHub or upstream links to pass quick visual checks. However, clicking a download button loads a CloudFront-hosted JavaScript staging layer that intercepts the click and hands the user to a gated TDS. The TDS applies first-visit state checks, mandatory click confirmation, anti-bot and anti-analysis logic, VPN and datacenter filtering, and frequency capping.\u003c/p\u003e\n\n\u003cp\u003eThe malware payloads delivered through the TDS include SessionGate, Remus Stealer, and AnimateClipper. SessionGate is a multi-stage obfuscated loader, Remus Stealer targets data from browsers, extensions, cryptocurrency wallets, two-factor authentication tools, and password managers, and AnimateClipper can replace copied cryptocurrency wallet addresses. VirusTotal telemetry showed about 2,000 to 3,500 submissions of SessionGate-associated samples, mostly from Turkey, Poland, Brazil, Germany, France, Russia, and the U.K.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers have flagged a large-scale operation that impersonates open-source and freeware projects to funnel users through a Traffic Distribution System and deliver malware. Check Point researcher Alexey Bukhteyev said the sites are well-designed and can look like legitimate project portals at first glance, sometimes referencing real upstream resources. The operation is suspected to be designed for traffic acquisition and monetization while selectively leading users to malware delivery infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe fake sites target users searching for tools on engines such as Google, causing some bogus domains to appear at the top of search results. Identified sites mimic trusted reverse-engineering and security tools including Ghidra, dnSpy, and SpiderFoot. Fullstory documented an early iteration of the campaign in November 2025, and evidence cited in the article indicates the activity has been ongoing since September 2025.\u003c/p\u003e\n\n\u003cp\u003eThe article says the domains initially appeared focused on gaining favorable search rankings by leveraging the names, brands, and popularity of legitimate projects. Fullstory noted at the time that many of the sites ranked highly on Google for relevant search terms, sometimes eclipsing real project websites. Check Point later found that TDS scripts were embedded not long after, and the infrastructure was repurposed for malware distribution starting in January 2026.\u003c/p\u003e\n\n\u003cp\u003eThe download interaction is central to the deception. Hovering over the download button can reveal a legitimate URL for the real tool, but clicking the button initiates a TDS redirection chain. The CloudFront-hosted JavaScript staging layer converts the click into a handoff to a TDS that enforces first-visit state, mandatory click confirmation, anti-bot and anti-analysis logic, VPN and datacenter filtering, and frequency capping.\u003c/p\u003e\n\n\u003cp\u003ePayloads distributed through the TDS include SessionGate, Remus Stealer, and AnimateClipper. SessionGate is described as a previously unknown multi-stage obfuscated loader that delivers potentially unwanted applications and uses anti-analysis mechanisms to divert sandboxes toward a benign installer experience. Remus Stealer is described as a new malware-as-a-service information stealer and possible Lumma Stealer variant, while AnimateClipper is a cryptocurrency clipper delivered through a ClickFix lure.\u003c/p\u003e\n\n\u003cp\u003eVirusTotal telemetry showed approximately 2,000 to 3,500 submissions of samples associated with SessionGate, with most submissions originating from Turkey, Poland, Brazil, Germany, France, Russia, and the U.K. The SessionGate sequence delivers a client-unique payload only after the full redirect path is completed. Its final DLL contacts an external server, retrieves an encrypted configuration, extracts a download URL, and downloads and silently executes the next-stage malware through cmd.exe.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers have reported a large-scale operation that impersonates open-source and freeware projects to route users through a Traffic Distribution System and deliver malware. The campaign uses fake websites that mimic legitimate project portals and are designed to appear credible at a glance. Some of the identified sites impersonate trusted reverse-engineering and security tooling, including Ghidra, dnSpy, and SpiderFoot.\u003c/p\u003e\n\n\u003cp\u003eCheck Point researcher Alexey Bukhteyev said the deception is not limited to the page content, but occurs when a user interacts with the page. The sites load a CloudFront-hosted JavaScript staging layer that converts a click on a download button or link into a handoff to a TDS. The TDS then applies strict gating before determining whether to route the user toward malware delivery infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"search-driven-distribution\"\u003eSearch-driven distribution\u003c/h2\u003e\n\n\u003cp\u003eThe attack chains target users looking for open-source and freeware tools on search engines such as Google. The bogus sites can surface at the top of search results for relevant search terms. The article says this makes their visibility an asset and helps maximize traffic.\u003c/p\u003e\n\n\u003cp\u003eFullstory documented an early iteration of the campaign in November 2025. According to the article, evidence indicates that the activity has been ongoing since September 2025. At that time, the domains were described as focused on gaining favorable search engine rankings by leveraging the names, brands, and popularity of legitimate websites and projects.\u003c/p\u003e\n\n\u003cp\u003eFullstory noted that many of the sites ranked highly on Google for relevant search terms, sometimes eclipsing the real project websites. The article says there was initially no indication that those domains were being used for malicious activity beyond generating content, driving traffic, and enabling third parties to advertise their own sites. Check Point later found that TDS scripts were embedded not long after, and that the infrastructure was repurposed for malware distribution starting in January 2026.\u003c/p\u003e\n\n\u003ch2 id=\"click-interception-and-tds-gating\"\u003eClick interception and TDS gating\u003c/h2\u003e\n\n\u003cp\u003eA central feature of the campaign is the handling of the download interaction. Clicking a “Download” button initiates a TDS redirection chain that can result in malware deployment. One notable detail is that hovering over the button may show the legitimate URL from which the real tool can be downloaded, giving the page a veneer of legitimacy.\u003c/p\u003e\n\n\u003cp\u003eThe article describes a CloudFront-hosted JavaScript staging layer that converts the user’s click into a TDS handoff. The TDS enforces several forms of gating, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFirst-visit state checks.\u003c/li\u003e\n\u003cli\u003eMandatory click confirmation.\u003c/li\u003e\n\u003cli\u003eAnti-bot and anti-analysis logic.\u003c/li\u003e\n\u003cli\u003eVPN and datacenter filtering.\u003c/li\u003e\n\u003cli\u003eFrequency capping.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe redirect chains are also designed so that repeated attempts from the same IP address can result in downloads of benign software, such as the Opera browser or unnecessary browser extensions. The article states that the multi-stage delivery chain, validation logic, and TDS-side gating are designed to resist analysis and make payload retrieval challenging for analysts.\u003c/p\u003e\n\n\u003ch2 id=\"malware-families-and-payload-behavior\"\u003eMalware families and payload behavior\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several payloads distributed through the TDS: SessionGate, Remus Stealer, and AnimateClipper.\u003c/p\u003e\n\n\u003ch3 id=\"sessiongate\"\u003eSessionGate\u003c/h3\u003e\n\n\u003cp\u003eSessionGate is described as a previously unknown multi-stage, obfuscated loader. It is used to deliver potentially unwanted applications and includes extensive anti-analysis mechanisms. The article says these mechanisms can throw off sandboxes by pivoting to a benign installer experience.\u003c/p\u003e\n\n\u003cp\u003eThe SessionGate infection sequence aims to drop a payload that is unique per client and delivered only after the redirect path is traversed end-to-end. The final DLL payload communicates with an external server, retrieves an encrypted configuration, extracts the download URL from that configuration, and downloads and silently executes the next-stage malware via cmd.exe.\u003c/p\u003e\n\n\u003cp\u003eVirusTotal telemetry showed approximately 2,000 to 3,500 submissions of samples associated with the SessionGate family. The vast majority of those submissions came from Turkey, Poland, Brazil, Germany, France, Russia, and the U.K.\u003c/p\u003e\n\n\u003ch3 id=\"remus-stealer\"\u003eRemus Stealer\u003c/h3\u003e\n\n\u003cp\u003eRemus Stealer is described as a new information stealer offered under a malware-as-a-service model. It can steal data from more than 20 browsers, including hundreds of browser extensions and applications. The article specifically mentions cryptocurrency wallets, two-factor authentication tools, and password managers as targeted applications.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that Remus is believed to be a variant of Lumma Stealer.\u003c/p\u003e\n\n\u003ch3 id=\"animateclipper\"\u003eAnimateClipper\u003c/h3\u003e\n\n\u003cp\u003eAnimateClipper is described as a cryptocurrency clipper. It can substitute wallet addresses copied to the clipboard and hijack transactions across more than 20 blockchain ecosystems. The article says it is delivered by means of a ClickFix lure.\u003c/p\u003e\n\n\u003ch2 id=\"affected-users-and-observed-geography\"\u003eAffected users and observed geography\u003c/h2\u003e\n\n\u003cp\u003eThe campaign is aimed at users searching for open-source and freeware tools, especially users seeking tools that fake sites are impersonating. The article names Ghidra, dnSpy, and SpiderFoot as examples of projects mimicked by identified sites. Users can be exposed through search results when bogus domains rank above or near legitimate project sites.\u003c/p\u003e\n\n\u003cp\u003eFor SessionGate-associated samples, VirusTotal telemetry showed submissions mostly from Turkey, Poland, Brazil, Germany, France, Russia, and the U.K. The article does not identify a named threat actor or group behind the operation. It says the more plausible primary objective is traffic acquisition and monetization, while also noting that the same traffic pipeline can selectively route real users to malicious payloads.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe campaign combines search engine visibility, convincing project impersonation, click interception, and gated malware delivery. The fake sites may preserve legitimate links to real GitHub or upstream resources, helping them pass quick visual checks. However, user interaction with the download button can redirect the session into the TDS stack.\u003c/p\u003e\n\n\u003cp\u003eCheck Point’s analysis emphasizes that traffic acquisition and monetization infrastructure can become part of a malware distribution chain. The article states that by embedding a gated TDS layer and funneling search traffic into it, the operators become part of a distribution chain whose downstream consumers can include malware distributors. The same traffic pipeline used for gray monetization can also selectively route real users to malicious payloads.\u003c/p\u003e\n","keyPoints":["Cybersecurity researchers identified a large-scale operation in which fake sites impersonate open-source and freeware projects and route users through a Traffic Distribution System to deliver malware.","The fake sites mimic tools such as Ghidra, dnSpy, and SpiderFoot, and some rank highly in Google search results for related terms.","Clicking a download button on the fake sites triggers a CloudFront-hosted JavaScript staging layer and a gated redirect chain with first-visit checks, click confirmation, anti-bot logic, VPN and datacenter filtering, and frequency capping.","Check Point reported that the infrastructure was repurposed for malware distribution starting in January 2026 after earlier activity focused on traffic generation and advertising.","Payloads distributed through the TDS include SessionGate, Remus Stealer, and AnimateClipper, with VirusTotal telemetry showing about 2,000 to 3,500 submissions associated with SessionGate samples."],"insights":["The fake download pages preserve legitimate-looking links and may show the real tool URL on hover, so a quick visual check of the destination link is not sufficient to confirm safety.","Repeated access from the same IP address can return benign software instead of malware, making the campaign harder for analysts and automated sandboxes to reproduce.","The TDS uses first-visit state, mandatory click confirmation, VPN and datacenter filtering, and frequency capping, which means real-user interaction and residential traffic are central to payload delivery.","The same SEO-focused infrastructure that initially appeared to support traffic generation and advertising was later used for malware delivery, showing that high-ranking impersonation sites can become malicious after gaining visibility."],"referencedReports":[{"title":"Impersonation, Click Hijacking, and TDS: Inside a Malware Distribution Ecosystem","url":"https://research.checkpoint.com/2026/impersonation-click-hijacking-and-tds-inside-a-malware-distribution-ecosystem/","publisher":"Check Point Research","context":"The article cites Check Point researcher Alexey Bukhteyev's breakdown as the main source for details on the fake sites, TDS gating, and malware delivery chain.","category":"","primary":false},{"title":"Inside a Global Campaign Hijacking Open Source Project Identities","url":"https://www.fullstory.com/blog/inside-a-global-campaign-hijacking-open-source-project-identities/","publisher":"Fullstory","context":"The article says Fullstory documented an early iteration of the campaign in November 2025, when domains were gaining search rankings by impersonating open-source projects.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers have identified a large-scale operation that impersonates open-source and freeware projects to route users through a Traffic Distribution System and deliver malware. The fake sites mimic trusted tools such as Ghidra, dnSpy, and SpiderFoot, and some rank highly in Google search results for related terms. Check Point reported that the campaign has been active since at least September 2025, with malware distribution beginning in January 2026.\u003c/p\u003e\n\n\u003cp\u003eThe sites are designed to look like legitimate project portals and may preserve real GitHub or upstream links to pass quick visual checks. However, clicking a download button loads a CloudFront-hosted JavaScript staging layer that intercepts the click and hands the user to a gated TDS. The TDS applies first-visit state checks, mandatory click confirmation, anti-bot and anti-analysis logic, VPN and datacenter filtering, and frequency capping.\u003c/p\u003e\n\n\u003cp\u003eThe malware payloads delivered through the TDS include SessionGate, Remus Stealer, and AnimateClipper. SessionGate is a multi-stage obfuscated loader, Remus Stealer targets data from browsers, extensions, cryptocurrency wallets, two-factor authentication tools, and password managers, and AnimateClipper can replace copied cryptocurrency wallet addresses. VirusTotal telemetry showed about 2,000 to 3,500 submissions of SessionGate-associated samples, mostly from Turkey, Poland, Brazil, Germany, France, Russia, and the U.K.\u003c/p\u003e\n"},{"n":1,"title":"DoJ Disrupts Southeast Asia Crypto Fraud Networks, Freezes $3.8 Million in Assets","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/doj-disrupts-southeast-asia-crypto.html","time":"06:06","priority":"SHOULD READ","score":82,"tldr":"The U.S. Justice Department and international/private-sector partners disrupted Southeast Asia-based crypto scam networks, taking down or interrupting millions of accounts and related infrastructure while freezing over $3.8 million in stolen cryptocurrency. The action targets “pig butchering” fraud operations that have caused billions in losses for Americans and are often tied to trafficking-run scam compounds.","briefOverview":"\u003cp\u003eThe U.S. Department of Justice announced the results of a “Disruption Week” operation that began on May 18, 2026, targeting cyber-enabled and cryptocurrency fraud networks that defrauded Americans. The action involved U.S. government authorities, international law enforcement partners, and private sector companies. Private sector entities voluntarily froze more than $3.8 million in cryptocurrency involved in laundering funds stolen from Americans.\u003c/p\u003e\n\n\u003cp\u003eThe operation focused on transnational cybercrime groups in Southeast Asia, including networks running cryptocurrency investment fraud and “pig butchering,” also described as romance baiting, scams. The DoJ said these scams typically involve cultivating relationships with victims over time before directing them to fraudulent investment platforms promising high returns. Once funds are deposited, the assets are routed to accounts controlled by scammers, who stop contact after victims run out of money or discover the fraud.\u003c/p\u003e\n\n\u003cp\u003eThe disruption affected more than 1.4 million Facebook and Instagram accounts, pages, and groups, 20,000 Microsoft accounts, and thousands of Starlink kits. Authorities and partners also interrupted malicious IP address traffic, disrupted network connections, decommissioned servers and hosting infrastructure, identified scam platforms and scammers, and supported arrests in Thailand. The DoJ said reported U.S. losses from cryptocurrency investment scams rose from \u003cspan class=\"math inline\"\u003e\\(3.96 billion in 2023 to more than \\)\u003c/span\u003e7.2 billion in 2025.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe U.S. Department of Justice announced the results of a coordinated “Disruption Week” operation aimed at cyber-enabled and cryptocurrency fraud targeting Americans. The operation began May 18, 2026, and included government authorities and private sector companies. As part of the effort, private sector entities voluntarily froze more than $3.8 million in cryptocurrency involved in laundering funds stolen from Americans.\u003c/p\u003e\n\n\u003cp\u003eThe effort is part of the Scam Center Strike Force, a U.S. government initiative focused on dismantling transnational criminal organizations running cyber-enabled fraud and “pig butchering,” also known as romance baiting, scams. The DoJ described cryptocurrency investment scams as one of the fastest growing and most financially devastating forms of fraud targeting Americans. Reported losses from these scams increased from \u003cspan class=\"math inline\"\u003e\\(3.96 billion in 2023 to \\)\u003c/span\u003e5.8 billion in 2024 and to more than $7.2 billion in 2025.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, these schemes usually involve scammers cultivating relationships with victims over time and then persuading them to deposit funds into fraudulent investment platforms promising high returns. After deposits are made, assets are routed to accounts under the scammers’ control. The criminals then cease contact once the victim runs out of money or realizes the fraud.\u003c/p\u003e\n\n\u003cp\u003eParticipating private sector organizations included Apple, Coinbase, Google, Meta, Microsoft, Silent Push, SpaceX/Starlink, TRM Labs, and Zenlayer. Law enforcement participation included the Australian Federal Police, Canadian Anti-Fraud Centre, New Zealand Police, the Royal Thai Police, and the U.K. National Crime Agency. Meta said law enforcement has arrested 63 potential criminals connected to scam centers so far, and Coinbase froze more than $3 million in cryptocurrency assets tied to criminal networks.\u003c/p\u003e\n\n\u003cp\u003eThe operation disrupted criminal activity across more than 1.4 million Facebook and Instagram accounts, pages, and groups, 20,000 Microsoft accounts, and thousands of Starlink kits. It also interrupted malicious IP address traffic and network connections hosted by scammers, decommissioned servers, colocation environments, and hosting infrastructure, and identified multiple scammers and scam platforms for referral to U.S. authorities. In Thailand, seven scammers were arrested and new cases were opened by the Royal Thai Police Anti-Cyber Scam Center.\u003c/p\u003e\n\n\u003cp\u003eThe DoJ said many of these schemes are run out of industrial-scale compounds in Cambodia, Laos, and Burma along the border with Thailand. It said criminal syndicates lure workers to Thailand with promises of high-paying technical jobs, seize their identification documents, and traffic them to scam compounds. Within those compounds, trafficked workers are frequently forced to conduct fraud operations against victims in the United States and elsewhere under threat of violence.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe U.S. Department of Justice announced the results of a coordinated action called “Disruption Week,” which began on May 18, 2026. The operation targeted cyber-enabled and cryptocurrency fraud schemes used by transnational cybercrime groups to defraud Americans. The effort involved government authorities and private sector companies working together to disrupt the infrastructure, accounts, and financial flows used by scam networks.\u003c/p\u003e\n\n\u003cp\u003ePrivate sector entities voluntarily froze more than $3.8 million in cryptocurrency involved in laundering funds stolen from Americans. The DoJ framed the action as part of a broader effort to combat cyber-enabled and crypto investment fraud, which U.S. Attorney Jeanine Ferris Pirro described as devastating “Main Street Americans,” wiping out life savings, and preying on vulnerable citizens.\u003c/p\u003e\n\n\u003ch2 id=\"program-and-enforcement-context\"\u003eProgram and Enforcement Context\u003c/h2\u003e\n\n\u003cp\u003eThe operation is part of the Scam Center Strike Force, an ongoing U.S. government initiative. The initiative aims to dismantle transnational criminal organizations running cyber-enabled fraud and “pig butchering,” also known as romance baiting, scams from compounds in Southeast Asia. The article also states that the initiative addresses the human trafficking and money laundering operations that support these criminal enterprises.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that, last month, a separate joint international operation involving U.S. and Chinese authorities arrested at least 276 suspects and shut down nine scam centers used for cryptocurrency investment fraud schemes targeting Americans.\u003c/p\u003e\n\n\u003ch2 id=\"scam-method-described\"\u003eScam Method Described\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the schemes as relationship-based fraud operations. Scammers cultivate relationships with prospective victims over time and then persuade them to deposit funds into fraudulent investment platforms. These platforms promise high returns.\u003c/p\u003e\n\n\u003cp\u003eOnce victims deposit assets, the funds are routed to accounts controlled by the scammers. When victims run out of money or discover the fraud, the criminals cease contact with them.\u003c/p\u003e\n\n\u003ch2 id=\"geographic-scope\"\u003eGeographic Scope\u003c/h2\u003e\n\n\u003cp\u003eThe DoJ said many of these schemes are run from industrial-scale compounds in Southeast Asia. The article specifically names Cambodia, Laos, and Burma along the border with Thailand. It also describes Thailand as a place where workers are lured with promises of high-paying technical jobs before being trafficked to scam compounds.\u003c/p\u003e\n\n\u003cp\u003eInternational law enforcement participation included agencies from Australia, Canada, New Zealand, Thailand, and the United Kingdom. The article also identifies the United States as the primary target geography for the victims discussed.\u003c/p\u003e\n\n\u003ch2 id=\"human-trafficking-element\"\u003eHuman Trafficking Element\u003c/h2\u003e\n\n\u003cp\u003eThe DoJ said criminal syndicates often lure workers to Thailand with promises of high-paying technical jobs. According to the article, these syndicates then seize workers’ identification documents and traffic them to work in scam compounds. Within the compounds, trafficked workers are frequently forced to conduct fraud operations against victims in the United States and elsewhere under threat of violence.\u003c/p\u003e\n\n\u003cp\u003eThis links the online fraud activity described in the article to human trafficking and coercive labor conditions in scam compounds.\u003c/p\u003e\n\n\u003ch2 id=\"participants\"\u003eParticipants\u003c/h2\u003e\n\n\u003cp\u003eThe article names several private sector companies that participated in the operation:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApple\u003c/li\u003e\n\u003cli\u003eCoinbase\u003c/li\u003e\n\u003cli\u003eGoogle\u003c/li\u003e\n\u003cli\u003eMeta\u003c/li\u003e\n\u003cli\u003eMicrosoft\u003c/li\u003e\n\u003cli\u003eSilent Push\u003c/li\u003e\n\u003cli\u003eSpaceX/Starlink\u003c/li\u003e\n\u003cli\u003eTRM Labs\u003c/li\u003e\n\u003cli\u003eZenlayer\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also names participating law enforcement and government entities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eU.S. Department of Justice\u003c/li\u003e\n\u003cli\u003eAustralian Federal Police\u003c/li\u003e\n\u003cli\u003eCanadian Anti-Fraud Centre\u003c/li\u003e\n\u003cli\u003eNew Zealand Police\u003c/li\u003e\n\u003cli\u003eRoyal Thai Police\u003c/li\u003e\n\u003cli\u003eU.K. National Crime Agency\u003c/li\u003e\n\u003cli\u003eRoyal Thai Police Anti-Cyber Scam Center\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"disruption-actions\"\u003eDisruption Actions\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the event as a “first-of-its-kind” operation and lists multiple actions taken against scam networks. These included disruptions of criminal activity across more than 1.4 million Facebook and Instagram accounts, pages, and groups, 20,000 Microsoft accounts, and thousands of Starlink kits.\u003c/p\u003e\n\n\u003cp\u003eThe operation also interrupted malicious IP address traffic and network connections hosted by scammers. Partners decommissioned servers, colocation environments, and hosting infrastructure linked to scam networks operating across Southeast Asia.\u003c/p\u003e\n\n\u003cp\u003eAdditional results included the identification of multiple scammers and scam platforms, with referrals to U.S. authorities for investigation and possible prosecution. In Thailand, seven scammers were arrested, and the Royal Thai Police Anti-Cyber Scam Center opened new cases.\u003c/p\u003e\n\n\u003ch2 id=\"cryptocurrency-and-financial-impact\"\u003eCryptocurrency and Financial Impact\u003c/h2\u003e\n\n\u003cp\u003ePrivate sector entities voluntarily froze more than \u003cspan class=\"math inline\"\u003e\\(3.8 million in cryptocurrency tied to laundering funds stolen from Americans. In a coordinated statement, Meta said Coinbase froze more than \\)\u003c/span\u003e3 million in cryptocurrency assets tied to criminal networks.\u003c/p\u003e\n\n\u003cp\u003eThe DoJ stated that cryptocurrency investment scams are among the fastest growing and most financially devastating forms of fraud targeting Americans. Reported losses from these scams rose from \u003cspan class=\"math inline\"\u003e\\(3.96 billion in 2023 to \\)\u003c/span\u003e5.8 billion in 2024 and to more than $7.2 billion in 2025. The article states this represents a 24% year-over-year increase.\u003c/p\u003e\n\n\u003ch2 id=\"meta-and-coinbase-statement\"\u003eMeta and Coinbase Statement\u003c/h2\u003e\n\n\u003cp\u003eMeta said law enforcement has arrested 63 potential criminals connected to scam centers so far. The same coordinated statement said Coinbase froze more than $3 million in cryptocurrency assets tied to criminal networks.\u003c/p\u003e\n\n\u003ch2 id=\"significance-stated-in-the-article\"\u003eSignificance Stated in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that the operation disrupted a broad ecosystem of accounts, infrastructure, connectivity, and financial assets used in transnational scam activity. It also highlights that the activity targeted Americans and was connected to Southeast Asia-based scam compounds, cryptocurrency laundering, and human trafficking.\u003c/p\u003e\n\n\u003cp\u003ePolice Lieutenant General Jirabhop Bhuridej of the Royal Thai Police said transnational online fraud cannot be solved by any single agency or country acting alone. He said strong collaboration and timely information sharing are essential to dismantling these networks and protecting the public.\u003c/p\u003e\n","keyPoints":["The U.S. Department of Justice announced a “Disruption Week” operation that began May 18, 2026, targeting cyber-enabled and cryptocurrency fraud networks defrauding Americans.","The operation led to takedowns or disruptions across more than 1.4 million Facebook and Instagram accounts, pages, and groups, 20,000 Microsoft accounts, and thousands of Starlink kits.","Private sector entities voluntarily froze over $3.8 million in cryptocurrency involved in laundering funds stolen from Americans.","The effort involved companies including Apple, Coinbase, Google, Meta, Microsoft, Silent Push, SpaceX/Starlink, TRM Labs, and Zenlayer, along with law enforcement agencies from the United States, Australia, Canada, New Zealand, Thailand, and the United Kingdom.","The DoJ said many cryptocurrency investment scam schemes are run from industrial-scale compounds in Cambodia, Laos, and Burma along the Thai border, where trafficked workers may be forced to conduct fraud operations."],"insights":["The operation targeted the broader scam ecosystem rather than only individual scammers, disrupting social media accounts, email accounts, IP traffic, network connections, servers, colocation environments, hosting infrastructure, and Starlink kits used by the networks.","Private-sector participation was operationally significant, with companies not only sharing information but also freezing cryptocurrency assets, disabling accounts, and helping interrupt infrastructure tied to scam activity.","The article links online investment fraud with human trafficking, stating that workers are lured with job offers, stripped of identification documents, and forced to conduct scams under threat of violence in compounds in Southeast Asia.","Reported U.S. losses from cryptocurrency investment scams grew from $3.96 billion in 2023 to more than $7.2 billion in 2025, showing that the financial impact continued rising despite prior enforcement activity."],"referencedReports":[],"body":"\u003cp\u003eThe U.S. Department of Justice announced the results of a “Disruption Week” operation that began on May 18, 2026, targeting cyber-enabled and cryptocurrency fraud networks that defrauded Americans. The action involved U.S. government authorities, international law enforcement partners, and private sector companies. Private sector entities voluntarily froze more than $3.8 million in cryptocurrency involved in laundering funds stolen from Americans.\u003c/p\u003e\n\n\u003cp\u003eThe operation focused on transnational cybercrime groups in Southeast Asia, including networks running cryptocurrency investment fraud and “pig butchering,” also described as romance baiting, scams. The DoJ said these scams typically involve cultivating relationships with victims over time before directing them to fraudulent investment platforms promising high returns. Once funds are deposited, the assets are routed to accounts controlled by scammers, who stop contact after victims run out of money or discover the fraud.\u003c/p\u003e\n\n\u003cp\u003eThe disruption affected more than 1.4 million Facebook and Instagram accounts, pages, and groups, 20,000 Microsoft accounts, and thousands of Starlink kits. Authorities and partners also interrupted malicious IP address traffic, disrupted network connections, decommissioned servers and hosting infrastructure, identified scam platforms and scammers, and supported arrests in Thailand. The DoJ said reported U.S. losses from cryptocurrency investment scams rose from \u003cspan class=\"math inline\"\u003e\\(3.96 billion in 2023 to more than \\)\u003c/span\u003e7.2 billion in 2025.\u003c/p\u003e\n"},{"n":3,"title":"Hackers Spied on a Stock Exchange Executive's Outlook Mailbox for Five Months","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/hackers-spied-on-stock-exchange.html","time":"09:33","priority":"SHOULD READ","score":82,"tldr":"Unknown attackers spent at least five months spying on a senior stock exchange executive’s Outlook mailbox, repeatedly exporting small batches of email and hiding the exfiltration through Dropbox and OneDrive. The case points to espionage and shows why defenders need to monitor mailbox export behavior, cloud uploads, tunneling, and credential theft rather than relying on patches alone.","briefOverview":"\u003cp\u003eUnknown attackers spent at least five months inside the Outlook mailbox of a senior executive at a major global stock exchange. Symantec and Carbon Black\u0026rsquo;s Threat Hunter Team reported the campaign and said the commands indicated intelligence collection rather than theft for profit. Neither the executive nor the exchange was named.\u003c/p\u003e\n\n\u003cp\u003eThe attacker copied the mailbox in small, repeated batches and routed the data through Dropbox and OneDrive so the traffic blended into normal cloud activity. The main mailbox-stealing tool used Aspose, a legitimate .NET library that can read Outlook OST and PST files, to convert mailbox data to PST files. The first run captured email from August 2025 onward, followed by eight more pulls through February 17, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe operation also used scheduled tasks posing as Adobe, Lenovo, and OneDrive system services, along with hard-coded Microsoft IP addresses for OneDrive traffic to avoid DNS lookups for onedrive.live.com. Symantec’s indicators also included FRPC, Secretsdump, SharpDecryptPwd, and a Windows User Account Control bypass tool. The article emphasizes that there was no CVE involved and no attribution to a specific threat group.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eUnknown attackers spent at least five months monitoring the Outlook mailbox of a senior executive at a major global stock exchange. Symantec and Carbon Black\u0026rsquo;s Threat Hunter Team reported the activity and described it as an espionage-focused operation rather than theft for profit. The executive and the exchange were not named in the report.\u003c/p\u003e\n\n\u003cp\u003eThe article says the mailbox was valuable because it could contain non-public listing details, enforcement matters, deal terms, market-moving plans, calendar entries, and contacts. The attackers did not need broad access to other business systems to gain insight into the executive’s dealings and the organization’s direction. Five months of access gave them a near-continuous view into the mailbox.\u003c/p\u003e\n\n\u003cp\u003eThe first observed malicious activity appeared on October 10, 2025, when two binaries were already running as SYSTEM, one posing as Adobe’s updater and another posing as OneDrive. Symantec said the first signs likely came from lateral movement off a previously compromised device, but the initial access method remains unknown. The operation intensified on November 12, when the attacker pulled a Dropbox API token, began uploading data with curl, and deployed the mailbox-stealing tool.\u003c/p\u003e\n\n\u003cp\u003eThe main tool was built on Aspose, a legitimate .NET library used to read Outlook OST and PST files. Wrapped in an executable, it converted the mailbox to PST and wrote it to disk, with each execution using a password and a date-range flag. The first run collected everything from August 2025 onward, and later runs occurred every two to four weeks, collecting only the days since the previous extraction through February 17, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe attacker used Dropbox and OneDrive Personal for exfiltration and connected to hard-coded Microsoft IP addresses for OneDrive instead of the onedrive.live.com hostname. Scheduled tasks posed as Adobe, Lenovo, and OneDrive services, and the attacker briefly tested the public file host temp.sh in November before dropping it. The last observed activity on March 19, 2026, was a new backdoor that was staged but never run.\u003c/p\u003e\n\n\u003cp\u003eSymantec’s indicators pointed to a broader intrusion kit that included FRPC for tunneling, Secretsdump for Windows credential extraction, SharpDecryptPwd for recovering saved application passwords, and a Windows User Account Control bypass tool. The report did not say how each tool was used in this case, and none tied the operation to a specific group. The article notes there was no CVE involved and recommends monitoring for unusual mailbox exports, odd Outlook access, uploads to personal Dropbox or OneDrive accounts, unexpected tunneling, and credential dumping on systems tied to privileged users.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eUnknown attackers spent at least five months inside the Outlook mailbox of a senior executive at a major global stock exchange. Symantec and Carbon Black\u0026rsquo;s Threat Hunter Team reported the campaign and said the observed commands indicated intelligence collection rather than theft for profit.\u003c/p\u003e\n\n\u003cp\u003eNeither the executive nor the exchange was named. The article states that an exchange executive’s inbox could contain non-public listing details, enforcement matters, deal terms, market-moving plans, calendar and contact information.\u003c/p\u003e\n\n\u003ch2 id=\"significance-of-the-mailbox-access\"\u003eSignificance of the mailbox access\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that the compromise of a single senior executive’s mailbox could provide a detailed view of the executive’s dealings and the organization’s direction. The attackers did not need broad access to other business systems to collect potentially sensitive information from the mailbox.\u003c/p\u003e\n\n\u003cp\u003eThe operation is described as espionage-oriented because of the apparent focus on intelligence collection. The article contrasts this with theft for profit, which Symantec said was not indicated by the commands.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-of-observed-activity\"\u003eTimeline of observed activity\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe first malicious activity appeared on October 10, 2025.\u003c/li\u003e\n\u003cli\u003eAt that time, the attacker was already running two binaries as SYSTEM, the highest Windows privilege level.\u003c/li\u003e\n\u003cli\u003eOne binary posed as Adobe’s updater, and the other posed as OneDrive.\u003c/li\u003e\n\u003cli\u003eThe initial access method remains unknown.\u003c/li\u003e\n\u003cli\u003eSymantec said the first signs likely came from lateral movement off a previously compromised device.\u003c/li\u003e\n\u003cli\u003eThe operation became more active on November 12, 2025.\u003c/li\u003e\n\u003cli\u003eThe attacker pulled a Dropbox API token, began uploading data with curl, and deployed the main mailbox-stealing tool.\u003c/li\u003e\n\u003cli\u003eThe repeated mailbox pulls continued through February 17, 2026.\u003c/li\u003e\n\u003cli\u003eThe last observed activity was on March 19, 2026, when a new backdoor was staged but never run.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mailbox-stealing-method\"\u003eMailbox-stealing method\u003c/h2\u003e\n\n\u003cp\u003eThe main tool was a mailbox stealer built on Aspose, a legitimate .NET library that reads Outlook OST and PST files. The tool was wrapped in an executable and used to convert the mailbox to PST and write it to disk.\u003c/p\u003e\n\n\u003cp\u003eEach run used a password and a date-range flag. The first run collected everything from August 2025 onward. Later runs occurred every two to four weeks and collected only the days since the previous run.\u003c/p\u003e\n\n\u003cp\u003eThe article says there were eight more pulls through February 17, 2026. This produced a near-continuous copy of the mailbox while dividing the theft into small slices that were less likely to draw attention from security software.\u003c/p\u003e\n\n\u003ch2 id=\"exfiltration-and-stealth-techniques\"\u003eExfiltration and stealth techniques\u003c/h2\u003e\n\n\u003cp\u003eThe attacker routed stolen data through Dropbox and OneDrive Personal. The article says this made the activity blend into normal cloud traffic.\u003c/p\u003e\n\n\u003cp\u003eFor OneDrive, the attacker connected to hard-coded Microsoft IP addresses instead of using the onedrive.live.com hostname. As a result, there were no DNS lookups for perimeter tools to catch or block.\u003c/p\u003e\n\n\u003cp\u003eThe attacker also used scheduled tasks that posed as Adobe, Lenovo, and OneDrive system services. In November, the attacker tested the public file host temp.sh once and then dropped it.\u003c/p\u003e\n\n\u003ch2 id=\"additional-tools-and-indicators\"\u003eAdditional tools and indicators\u003c/h2\u003e\n\n\u003cp\u003eSymantec’s published indicators pointed to a broader intrusion kit, not only a mailbox grabber. The listed tools included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFRPC for tunneling traffic out.\u003c/li\u003e\n\u003cli\u003eSecretsdump for pulling Windows credentials.\u003c/li\u003e\n\u003cli\u003eSharpDecryptPwd for recovering saved application passwords.\u003c/li\u003e\n\u003cli\u003eA tool to bypass Windows User Account Control.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the report does not say how each tool was used in this specific intrusion. It also says none of the tools pointed to a specific group.\u003c/p\u003e\n\n\u003ch2 id=\"attribution-and-vulnerability-status\"\u003eAttribution and vulnerability status\u003c/h2\u003e\n\n\u003cp\u003eAttribution remains unresolved. The article says the mix of public tooling and consumer cloud services left little to tie the activity to a known actor.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that there is no CVE in the story. It describes the case as an intrusion against a person’s mailbox rather than exploitation of a newly disclosed flaw, meaning no patch directly closes the issue.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-focus-highlighted-by-the-article\"\u003eDefensive focus highlighted by the article\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends that defenders at exchanges, regulators, or firms holding market-moving information ingest the published hashes and watch for behavior behind them. It specifically points to unusual mailbox export activity, odd Outlook access, uploads to personal Dropbox or OneDrive accounts, unexpected tunneling, and credential dumping on systems tied to privileged users.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central defensive lesson is that monitoring and response are critical when no specific vulnerability or patch is involved. The attacker’s use of legitimate-looking services, consumer cloud storage, and small repeated exports made the activity harder to distinguish from normal behavior.\u003c/p\u003e\n","keyPoints":["Unknown attackers spent at least five months inside the Outlook mailbox of a senior executive at a major global stock exchange.","Symantec and Carbon Black's Threat Hunter Team reported that the activity appeared to be espionage-focused intelligence collection rather than theft for profit.","The attackers used a mailbox stealer built on the legitimate Aspose .NET library to convert Outlook OST and PST data into PST files and export emails in date-based batches.","The attackers routed exfiltrated data through Dropbox and OneDrive Personal, including connections to hard-coded Microsoft IP addresses to avoid DNS lookups for onedrive.live.com.","Symantec's indicators included FRPC, Secretsdump, SharpDecryptPwd, and a Windows User Account Control bypass tool, but the report did not attribute the activity to a specific threat group."],"insights":["The attacker avoided a large one-time mailbox theft by exporting emails in narrow date ranges every two to four weeks, making repeated mailbox export patterns a more important detection target than file size alone.","Using hard-coded Microsoft IP addresses for OneDrive exfiltration meant DNS-based controls looking for onedrive.live.com would not have seen the activity.","The intrusion did not rely on a disclosed CVE, so patching alone would not address the risk; detection needed to focus on endpoint behavior such as SYSTEM-level binaries, scheduled tasks, and credential-dumping tools.","The mailbox of a single senior executive provided access to potentially market-moving information without requiring broad compromise of the exchange’s business systems.","Scheduled tasks impersonating ordinary Adobe, Lenovo, and OneDrive services show that defenders should verify the legitimacy and execution context of routine-looking system tasks on privileged users’ machines."],"referencedReports":[{"title":"Stock Exchange Espionage","url":"https://www.security.com/threat-intelligence/stock-exchange-espionage","publisher":"Symantec and Carbon Black Threat Hunter Team","context":"The article says Symantec and Carbon Black's Threat Hunter Team reported the stock exchange executive mailbox espionage campaign this week.","category":"","primary":false}],"body":"\u003cp\u003eUnknown attackers spent at least five months inside the Outlook mailbox of a senior executive at a major global stock exchange. Symantec and Carbon Black\u0026rsquo;s Threat Hunter Team reported the campaign and said the commands indicated intelligence collection rather than theft for profit. Neither the executive nor the exchange was named.\u003c/p\u003e\n\n\u003cp\u003eThe attacker copied the mailbox in small, repeated batches and routed the data through Dropbox and OneDrive so the traffic blended into normal cloud activity. The main mailbox-stealing tool used Aspose, a legitimate .NET library that can read Outlook OST and PST files, to convert mailbox data to PST files. The first run captured email from August 2025 onward, followed by eight more pulls through February 17, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe operation also used scheduled tasks posing as Adobe, Lenovo, and OneDrive system services, along with hard-coded Microsoft IP addresses for OneDrive traffic to avoid DNS lookups for onedrive.live.com. Symantec’s indicators also included FRPC, Secretsdump, SharpDecryptPwd, and a Windows User Account Control bypass tool. The article emphasizes that there was no CVE involved and no attribution to a specific threat group.\u003c/p\u003e\n"}];

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";

function swipeHrefForDigest(filename) {

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>

  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}

    </>
  );

}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
