<script type="application/json" id="dl-articles">[{"n":1,"title":"Cisco Unified CM Flaw Exploited After PoC Reveals File-Write Path to Root","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cisco-unified-cm-flaw-exploited-after.html","time":"06:50","priority":"MUST READ","score":94,"tldr":"Threat actors are actively exploiting CVE-2026-20230, a critical Cisco Unified CM flaw that can allow unauthenticated file writes and potential root escalation when the WebDialer service is enabled. Cisco has patched the issue in Unified CM 14SU6 and 15SU5, and organizations should update or disable WebDialer immediately.","briefOverview":"\u003cp\u003eThreat actors have begun exploiting CVE-2026-20230, a recently disclosed critical security flaw affecting Cisco Unified Communications Manager and Unified Communications Manager Session Management Edition. Cisco describes the issue as improper input validation for specific HTTP requests that could allow an unauthenticated, remote attacker to conduct server-side request forgery attacks through an affected device. A successful exploit could allow the attacker to write files to the underlying operating system that could later be used to elevate to root.\u003c/p\u003e\n\n\u003cp\u003eDefused Cyber said it observed active exploitation of the vulnerability from a single source using an unvetted proof of concept, with file-write payloads landing on its decoys. Successful exploitation requires the Cisco WebDialer Web Service to be enabled, and the article notes that the service is disabled by default. Cisco provides steps for administrators to check whether WebDialer is running through the Cisco Unified CM Administration and Cisco Unified Serviceability interfaces.\u003c/p\u003e\n\n\u003cp\u003eCisco patched the vulnerability in Unified CM and Unified CM SME versions 14SU6 and 15SU5. If immediate patching is not possible, Cisco advises disabling the WebDialer service until a fix can be applied. SSD Secure Disclosure has also published additional technical details, describing how attackers can use the WebDialer component to obtain the target’s true hostname and ultimately achieve code execution.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Threat actors have begun actively exploiting CVE-2026-20230, a critical flaw affecting Cisco Unified Communications Manager and Unified Communications Manager Session Management Edition.","CVE-2026-20230 is an improper input validation issue in specific HTTP requests that can let an unauthenticated remote attacker conduct server-side request forgery through an affected device.","Cisco said successful exploitation could allow an attacker to write files to the underlying operating system that could later be used to elevate to root.","Successful exploitation requires the Cisco WebDialer Web Service to be enabled, and the service is disabled by default.","Cisco patched the vulnerability in Unified CM and Unified CM SME versions 14SU6 and 15SU5, and advises disabling WebDialer if immediate patching is not possible."],"insights":["The reported exploitation appears limited in scope so far, with Defused Cyber saying it observed activity from a single source using an unvetted proof of concept against decoys.","The practical exposure is narrower than the CVSS score alone suggests because exploitation requires the Cisco WebDialer Web Service to be enabled, even though it is disabled by default.","Cisco’s advisory had not yet been updated to reflect active exploitation, despite third-party reports that attacks were already occurring.","SSD Secure Disclosure’s technical write-up shows that attackers can use the WebDialer component to obtain the target’s true hostname as part of the path from arbitrary file write to code execution."],"referencedReports":[{"title":"Cisco Unified Communications Manager and Unified Communications Manager Session Management Edition Server-Side Request Forgery Vulnerability","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-cucm-ssrf-cXPnHcW","publisher":"Cisco","context":"The article cites Cisco’s advisory for details on CVE-2026-20230, affected services, mitigation steps, and patched versions.","category":"","primary":false},{"title":"Cisco Unified Communications Manager Arbitrary File Write to RCE","url":"https://ssd-disclosure.com/cisco-unified-communications-manager-arbitrary-file-write-to-rce/","publisher":"SSD Secure Disclosure","context":"The article says SSD Secure Disclosure published additional technical specifics describing how the WebDialer component can be used to achieve arbitrary file write and code execution.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors have begun exploiting CVE-2026-20230, a recently disclosed critical security flaw affecting Cisco Unified Communications Manager and Unified Communications Manager Session Management Edition. Cisco describes the issue as improper input validation for specific HTTP requests that could allow an unauthenticated, remote attacker to conduct server-side request forgery attacks through an affected device. A successful exploit could allow the attacker to write files to the underlying operating system that could later be used to elevate to root.\u003c/p\u003e\n\n\u003cp\u003eDefused Cyber said it observed active exploitation of the vulnerability from a single source using an unvetted proof of concept, with file-write payloads landing on its decoys. Successful exploitation requires the Cisco WebDialer Web Service to be enabled, and the article notes that the service is disabled by default. Cisco provides steps for administrators to check whether WebDialer is running through the Cisco Unified CM Administration and Cisco Unified Serviceability interfaces.\u003c/p\u003e\n\n\u003cp\u003eCisco patched the vulnerability in Unified CM and Unified CM SME versions 14SU6 and 15SU5. If immediate patching is not possible, Cisco advises disabling the WebDialer service until a fix can be applied. SSD Secure Disclosure has also published additional technical details, describing how attackers can use the WebDialer component to obtain the target’s true hostname and ultimately achieve code execution.\u003c/p\u003e\n"},{"n":2,"title":"DoJ Seizes Huione Cloud Account Tied to Cyber Scam Money Laundering","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/doj-seizes-huione-cloud-account-tied-to.html","time":"08:55","priority":"SHOULD READ","score":82,"tldr":"The U.S. Justice Department seized a cloud account used by Huione Group subsidiaries to support crypto money laundering infrastructure tied to Southeast Asian scam operations, while Treasury expanded actions against related Huione successors and Prince Group entities. Authorities say the ecosystem helped move billions in fraud proceeds and continues to adapt despite enforcement.","briefOverview":"\u003cp\u003eThe U.S. Department of Justice announced the seizure of a cloud computing account used by subsidiaries of Cambodia-based HuiOne Group. The account allegedly hosted backend infrastructure for subsidiaries including HuiOne Guarantee, also known as Haowang Guarantee, which operated an illicit Telegram-based marketplace. The Justice Department said these subsidiaries helped move proceeds from cryptocurrency investment frauds, cyber scams, and other criminal activity into the legitimate banking sector undetected.\u003c/p\u003e\n\n\u003cp\u003eHuiOne Guarantee allegedly supported transactions involving billions of dollars between 2021 and 2025 and sold or facilitated access to crime-related goods and services. These included personal and financial data, money laundering services, fake investment and phishing website services, human trafficking-related procurement, and software for face swapping, voice cloning, and deepfake impersonation during video calls. The Justice Department said the platform also provided escrow services for criminals, including money launderers handling cryptocurrency stolen by Southeast Asian scam centers.\u003c/p\u003e\n\n\u003cp\u003eThe action came alongside U.S. Treasury measures, including sanctions against nine individuals and 26 entities linked to Prince Group and FinCEN’s assessment of H-Pay Service PLC as a primary money laundering concern. Elliptic said HuiOne had received more than $31 billion in cryptoasset transactions before it was forced offline, while Flare reported that more than 30 marketplaces emerged after HuiOne announced it was ceasing operations in May 2025. Flare also said enforcement has produced visible adaptation, including rebranded channels, redistributed flows across successor markets, and work on alternative venues, but has not meaningfully reduced aggregate volume across the ecosystem.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The U.S. Department of Justice announced the seizure of a cloud computing account used by subsidiaries of Cambodia-based HuiOne Group as part of action against alleged cyber scam money laundering infrastructure.","The seized account hosted backend infrastructure for HuiOne subsidiaries, including HuiOne Guarantee, also known as Haowang Guarantee, which operated an illicit Telegram-based marketplace involved in billions of dollars in transactions between 2021 and 2025.","The Justice Department said HuiOne Guarantee provided escrow services for criminals and helped move funds stolen by Southeast Asian scam centers.","FinCEN assessed H-Pay Service PLC as a primary money laundering concern to guard against HuiOne Group’s attempts to circumvent being cut off from the U.S. financial system.","The U.S. Treasury also sanctioned nine individuals and 26 entities linked to Prince Group, which it had previously classified as a Transnational Criminal Organization tied to scam compounds, fraud, and money laundering."],"insights":["Huione Guarantee’s scale was extraordinary: Elliptic said it received more than $31 billion in cryptoasset transactions, making it more than 25 times larger than Silk Road and AlphaBay combined.","The marketplace ecosystem has adapted rather than disappeared, with Flare reporting that more than 30 replacement marketplaces emerged after HuiOne announced it was ceasing operations in May 2025.","Operators are trying to reduce dependence on Telegram by building proprietary messaging platforms to bypass Telegram bans, according to Flare’s analysis.","The criminal marketplace supported both digital fraud and physical coercion, with merchants allegedly selling crimeware and stolen data alongside items such as electric batons and electronic shackles for scam compound operators.","U.S. enforcement is targeting both infrastructure and financial access, combining the Justice Department’s cloud account seizure with FinCEN actions against H-Pay Service PLC and Treasury sanctions on Prince Group-linked individuals and entities."],"referencedReports":[{"title":"July 2024 analysis of HuiOne merchants","url":"https://thehackernews.com/2024/07/crypto-analysts-expose-huione.html","publisher":"Elliptic","context":"The article cites a July 2024 Elliptic analysis that found HuiOne merchants marketed items such as tear gas, electric batons, and electronic shackles for scam compound operators.","category":"","primary":false},{"title":"History of Chinese-Language Guarantee Marketplaces","url":"https://thehackernews.com/2026/06/weekly-recap-chrome-0-day-unifi.html#:~:text=History%20of%20Chinese%2DLanguage%20Guarantee%20Marketplaces","publisher":"Flare","context":"The article cites Flare analysis reporting that more than 30 marketplaces emerged after HuiOne announced it was ceasing operations and that operators were building proprietary messaging platforms to bypass Telegram bans.","category":"","primary":false}],"body":"\u003cp\u003eThe U.S. Department of Justice announced the seizure of a cloud computing account used by subsidiaries of Cambodia-based HuiOne Group. The account allegedly hosted backend infrastructure for subsidiaries including HuiOne Guarantee, also known as Haowang Guarantee, which operated an illicit Telegram-based marketplace. The Justice Department said these subsidiaries helped move proceeds from cryptocurrency investment frauds, cyber scams, and other criminal activity into the legitimate banking sector undetected.\u003c/p\u003e\n\n\u003cp\u003eHuiOne Guarantee allegedly supported transactions involving billions of dollars between 2021 and 2025 and sold or facilitated access to crime-related goods and services. These included personal and financial data, money laundering services, fake investment and phishing website services, human trafficking-related procurement, and software for face swapping, voice cloning, and deepfake impersonation during video calls. The Justice Department said the platform also provided escrow services for criminals, including money launderers handling cryptocurrency stolen by Southeast Asian scam centers.\u003c/p\u003e\n\n\u003cp\u003eThe action came alongside U.S. Treasury measures, including sanctions against nine individuals and 26 entities linked to Prince Group and FinCEN’s assessment of H-Pay Service PLC as a primary money laundering concern. Elliptic said HuiOne had received more than $31 billion in cryptoasset transactions before it was forced offline, while Flare reported that more than 30 marketplaces emerged after HuiOne announced it was ceasing operations in May 2025. Flare also said enforcement has produced visible adaptation, including rebranded channels, redistributed flows across successor markets, and work on alternative venues, but has not meaningfully reduced aggregate volume across the ecosystem.\u003c/p\u003e\n"},{"n":3,"title":"UK Cybercrime Journal: Hargreaves Landsdown Extortion Attempt by Bashe","source":"blog.bushidotoken.net","sourceColorIdx":2,"link":"https://blog.bushidotoken.net/2026/06/uk-cybercrime-journal-hargreaves.html","time":"08:00","priority":"SHOULD READ","score":78,"tldr":"Bashe/APT73 claimed it stole a Hargreaves Lansdown customer database, but analysis suggests the breach was fabricated using recycled data from older leaks. The key takeaway is that threat actors may exploit recent IT outages and customer anxiety to create believable but false extortion narratives.","briefOverview":"\u003cp\u003eHargreaves Lansdown, the UK-based investment platform, experienced a series of IT glitches, hacker claims, and technical outages between September 2025 and May 2026 that raised customer concern. In September 2025, customers saw incorrect pension and ISA balances that made it appear large sums had been withdrawn, but the company said the issue lasted 45 minutes and balances were restored. In March 2026, customers had trouble accessing parts of the website and app, and Hargreaves Lansdown said there was no evidence of a cyber incident or data breach.\u003c/p\u003e\n\n\u003cp\u003eOn 27 April 2026, Bashe listed hl.co.uk on its Tor data leak site and claimed to have stolen a customer database containing 658,259 unique users. On 8 May 2026, alleged Hargreaves Lansdown data appeared on DarkForums, with a sample containing addresses, names, emails, phone numbers, and dates of birth, but no customer account numbers or transaction details. The article says Bashe, also known as APT73 or Eraleign, has been active since April 2024 and is known for data-theft-extortion and ransomware claims, including claims that analysts say are fabricated.\u003c/p\u003e\n\n\u003cp\u003eThe article assesses with high confidence that the alleged Hargreaves Lansdown breach was entirely fabricated. Its analysis found that sample email addresses appeared in the Verifications.io breach and the People Data Labs customer breach, which it says is unusual for recently leaked data and likely points to fake data. The article says Bashe appears to have used Hargreaves Lansdown’s recent outages and glitches to create a plausible but false extortion narrative, and it recommends coordinated public communication, targeted threat hunting, and caution around mass password resets.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Hargreaves Lansdown experienced customer-facing IT issues in September 2025 and March 2026, but the company said the incidents were temporary technical problems and that customer assets and data were secure.","On 27 April 2026, Bashe listed hl.co.uk on its Tor data leak site and claimed to have stolen a customer database containing 658,259 unique users.","On 8 May 2026, alleged Hargreaves Lansdown data appeared on DarkForums, with a sample containing addresses, names, emails, phone numbers, and dates of birth but no customer account numbers or transaction details.","Analysis of the posted sample found the email addresses appeared in older Verifications.io and People Data Labs breaches, which the article says likely indicates the Bashe and DarkForums data was fake.","The article assesses with high confidence that the alleged Hargreaves Lansdown breach was fabricated and that Bashe used recent outages and glitches to support a false extortion narrative."],"insights":["The article treats the presence of sample emails in older Verifications.io and People Data Labs breaches as a strong indicator that the alleged Hargreaves Lansdown leak was assembled from recycled data rather than newly stolen records.","The free publication of alleged financial trading platform customer data is described as unusual because such data would normally be highly valuable on cybercrime markets.","The article says Bashe’s known pattern of falsely claiming high-profile breaches is an important factor in assessing the credibility of its claim against Hargreaves Lansdown.","The recommended response to a fake breach includes threat hunting targeted at systems holding customer data to help demonstrate that the claimed exfiltration did not occur.","The article warns that a broad precautionary password reset, if not carefully communicated, can unintentionally reinforce a criminal group’s false breach narrative and trigger customer panic."],"referencedReports":[{"title":"Unmasking Media-Hungry Ransomware Groups: Bashe/APT73","url":"https://www.cloudsek.com/blog/unmasking-media-hungry-ransomware-groups-bashe-apt73","publisher":"CloudSEK","context":"The article cites CloudSEK analysts as finding that APT73 fabricates attacks by falsely claiming responsibility for high-profile breaches to attract affiliates and build credibility.","category":"","primary":false}],"body":"\u003cp\u003eHargreaves Lansdown, the UK-based investment platform, experienced a series of IT glitches, hacker claims, and technical outages between September 2025 and May 2026 that raised customer concern. In September 2025, customers saw incorrect pension and ISA balances that made it appear large sums had been withdrawn, but the company said the issue lasted 45 minutes and balances were restored. In March 2026, customers had trouble accessing parts of the website and app, and Hargreaves Lansdown said there was no evidence of a cyber incident or data breach.\u003c/p\u003e\n\n\u003cp\u003eOn 27 April 2026, Bashe listed hl.co.uk on its Tor data leak site and claimed to have stolen a customer database containing 658,259 unique users. On 8 May 2026, alleged Hargreaves Lansdown data appeared on DarkForums, with a sample containing addresses, names, emails, phone numbers, and dates of birth, but no customer account numbers or transaction details. The article says Bashe, also known as APT73 or Eraleign, has been active since April 2024 and is known for data-theft-extortion and ransomware claims, including claims that analysts say are fabricated.\u003c/p\u003e\n\n\u003cp\u003eThe article assesses with high confidence that the alleged Hargreaves Lansdown breach was entirely fabricated. Its analysis found that sample email addresses appeared in the Verifications.io breach and the People Data Labs customer breach, which it says is unusual for recently leaked data and likely points to fake data. The article says Bashe appears to have used Hargreaves Lansdown’s recent outages and glitches to create a plausible but false extortion narrative, and it recommends coordinated public communication, targeted threat hunting, and caution around mass password resets.\u003c/p\u003e\n"}]</script>
