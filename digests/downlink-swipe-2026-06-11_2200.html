<script>
window.__DL_ARTICLES = [{"n":1,"title":"Japanese energy firm loses drive with data of 10.9 million clients","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/japanese-energy-firm-loses-drive-with-data-of-109-million-clients/","time":"23:14","priority":"SHOULD READ","score":82,"tldr":"Kyushu Electric Power lost an external drive containing personal and electricity service data for up to 10.9 million customers after it went missing from an unlocked server room cabinet. The company says no bank or credit card data was stored on the drive and has reported the incident to police and Japanese privacy authorities.","briefOverview":"\u003cp\u003eKyushu Electric Power Co., Inc. disclosed a physical security incident involving a missing external storage device containing private data for up to 10.9 million customer accounts. The company said the device was used on April 27 for a backup because of server storage capacity constraints. When IT staff went to retrieve it on May 26, they found the server room cabinet had been left unlocked and the drive was missing.\u003c/p\u003e\n\n\u003cp\u003eThe data on the missing drive included customer names, service location addresses, electricity usage data, telephone numbers, names of retail electricity providers, and other related information. Kyushu Electric Power said no bank account information or credit card data was stored on the drive. The company stated it will notify impacted customers individually.\u003c/p\u003e\n\n\u003cp\u003eKyushu Electric Power has interviewed personnel who entered the server room and conducted investigations but has not located the drive. Media reports cited in the article said 57 people had access to the server room and that the company filed a police report on June 4. The incident has also been reported to Japan’s Personal Information Protection Commission and relevant government authorities.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eKyushu Electric Power Co., Inc. disclosed that a missing external storage device may affect private data tied to up to 10.9 million customer accounts. The company is one of Japan’s major regional electric utilities and supplies electricity across the Kyushu region. The article notes that the Kyushu region has a population of 12.6 million, making the scale of affected accounts significant.\u003c/p\u003e\n\n\u003cp\u003eAccording to the company’s announcement, IT staff regularly perform backups to manage server storage. Because of capacity constraints, an external storage device was used for a backup on April 27. The device was then stored in a server room cabinet protected by multiple physical security layers.\u003c/p\u003e\n\n\u003cp\u003eOn May 26, IT staff went to retrieve the external drive and found that the cabinet had been left unlocked. The drive was missing, and subsequent interviews and investigations did not locate it. The company said it is investigating all possibilities, including unauthorized removal of the device.\u003c/p\u003e\n\n\u003cp\u003eThe missing device contained customer names, service location addresses, electricity usage data, telephone numbers, names of retail electricity providers, and other related information. Kyushu Electric Power clarified that the drive did not store bank account information or credit card data. The company said it plans to notify affected customers individually.\u003c/p\u003e\n\n\u003cp\u003eMedia outlets cited in the article reported that 57 people had access to the server room and that Kyushu Electric filed a police report on June 4 because it suspected someone had removed the drive. NHK One reported that Japan’s Ministry of Economy, Trade, and Industry gave the company until July 8 to report details of the incident and preventive measures. The incident has also been reported to Japan’s Personal Information Protection Commission and relevant government authorities.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eKyushu Electric Power Co., Inc. disclosed a physical security incident involving the loss of an external storage device containing private customer data. The company said the incident affects up to 10.9 million customer accounts. Kyushu Electric Power is a major regional electric utility in Japan serving the Kyushu region, including Fukuoka, Saga, Nagasaki, Kumamoto, Oita, Miyazaki, and Kagoshima.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the Kyushu region has an overall population of 12.6 million. Against that regional context, the company’s stated impact of up to 10.9 million accounts represents a large-scale exposure of customer information. The incident is not described as a network intrusion, but as the disappearance of a physical storage device from a server room cabinet.\u003c/p\u003e\n\n\u003ch1 id=\"how-the-incident-occurred\"\u003eHow the Incident Occurred\u003c/h1\u003e\n\n\u003cp\u003eKyushu Electric Power said its IT staff regularly perform backups to manage server storage. Due to capacity constraints, an external storage device was used for this task on April 27. After the backup, the device was stored in a server room cabinet that the company said was protected by multiple physical security layers.\u003c/p\u003e\n\n\u003cp\u003eOn May 26, IT staff went to retrieve the external drive. At that time, they found that the cabinet had been left unlocked and that the drive was missing. The company has not located the drive despite internal investigation efforts.\u003c/p\u003e\n\n\u003ch1 id=\"data-stored-on-the-missing-drive\"\u003eData Stored on the Missing Drive\u003c/h1\u003e\n\n\u003cp\u003eThe article lists the following types of data as being present on the missing external storage device:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCustomer names\u003c/li\u003e\n\u003cli\u003eService location addresses\u003c/li\u003e\n\u003cli\u003eElectricity usage data\u003c/li\u003e\n\u003cli\u003eTelephone numbers\u003c/li\u003e\n\u003cli\u003eNames of retail electricity providers\u003c/li\u003e\n\u003cli\u003eOther related information\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eKyushu Electric Power clarified that the drive did not contain bank account information or credit card data. The company also said it will notify impacted customers individually in the upcoming period.\u003c/p\u003e\n\n\u003ch1 id=\"investigation-and-suspected-removal\"\u003eInvestigation and Suspected Removal\u003c/h1\u003e\n\n\u003cp\u003eAfter discovering the drive was missing, Kyushu Electric Power interviewed all personnel who entered the server room and conducted investigations. Those efforts did not locate the device. The company said it is investigating all possibilities, including unauthorized removal of the device.\u003c/p\u003e\n\n\u003cp\u003eMedia outlets cited in the article reported that 57 people had access to the server room. They also reported that Kyushu Electric filed a police report on June 4 because it suspected someone had removed the drive. The article does not identify any known actor responsible for the missing device.\u003c/p\u003e\n\n\u003ch1 id=\"regulatory-and-government-response\"\u003eRegulatory and Government Response\u003c/h1\u003e\n\n\u003cp\u003eThe incident was reported to Japan’s Personal Information Protection Commission and relevant government authorities. NHK One reported that Japan’s Ministry of Economy, Trade, and Industry gave Kyushu Electric Power until July 8 to report all details about the incident and the preventive measures taken.\u003c/p\u003e\n\n\u003cp\u003eThe article quotes the company’s bulletin as saying that the company is investigating all possibilities, including unauthorized removal of the device, but that the device has not yet been found. The company’s response includes customer notification plans, internal interviews, investigation efforts, a police report according to media reports, and reporting to privacy and government authorities.\u003c/p\u003e\n\n\u003ch1 id=\"key-impact\"\u003eKey Impact\u003c/h1\u003e\n\n\u003cp\u003eThe central impact is the potential exposure of private customer and electricity service-related information for up to 10.9 million accounts. The exposed categories include identifying and contact information as well as electricity usage and service-related details. The company stated that financial payment details, specifically bank account information and credit card data, were not stored on the missing drive.\u003c/p\u003e\n","keyPoints":["Kyushu Electric Power Co., Inc. disclosed that a missing external storage device affects private data of up to 10.9 million customer accounts.","The external drive was used on April 27 for a backup due to server storage capacity constraints and was later found missing from a server room cabinet on May 26.","The missing drive contained customer names, service location addresses, electricity usage data, telephone numbers, names of retail electricity providers, and other related information.","Kyushu Electric Power said the drive did not contain bank account information or credit card data and promised to notify impacted customers individually.","The company reported the incident to Japan’s Personal Information Protection Commission and relevant government authorities, and media reports said it filed a police report on June 4."],"insights":["A temporary workaround for server storage capacity constraints led to the use of an external storage device that held data for nearly the entire Kyushu region customer base.","Multiple physical security layers did not prevent the incident because the cabinet containing the drive was left unlocked when staff later checked it.","The incident response had to account for a large insider-access population, as media reports said 57 people had access to the server room.","Japan’s Ministry of Economy, Trade, and Industry gave Kyushu Electric until July 8 to report incident details and preventive measures, indicating regulatory scrutiny beyond customer notification."],"referencedReports":[],"body":"\u003cp\u003eKyushu Electric Power Co., Inc. disclosed a physical security incident involving a missing external storage device containing private data for up to 10.9 million customer accounts. The company said the device was used on April 27 for a backup because of server storage capacity constraints. When IT staff went to retrieve it on May 26, they found the server room cabinet had been left unlocked and the drive was missing.\u003c/p\u003e\n\n\u003cp\u003eThe data on the missing drive included customer names, service location addresses, electricity usage data, telephone numbers, names of retail electricity providers, and other related information. Kyushu Electric Power said no bank account information or credit card data was stored on the drive. The company stated it will notify impacted customers individually.\u003c/p\u003e\n\n\u003cp\u003eKyushu Electric Power has interviewed personnel who entered the server room and conducted investigations but has not located the drive. Media reports cited in the article said 57 people had access to the server room and that the company filed a police report on June 4. The incident has also been reported to Japan’s Personal Information Protection Commission and relevant government authorities.\u003c/p\u003e\n"},{"n":3,"title":"CISA BOD 26-04: Frequently asked questions about the new risk-based patching directive","source":"tenable.com","sourceColorIdx":5,"link":"https://www.tenable.com/blog/cisa-bod-26-04-FAQ-vulnerability-remediation-impact","time":"23:39","priority":"SHOULD READ","score":82,"tldr":"CISA’s BOD 26-04 replaces flat federal patching deadlines with a risk-based model that can require remediation in as little as three days for the most dangerous vulnerabilities. Agencies and organizations will need continuous asset exposure visibility and risk-based prioritization to keep up, especially as AI accelerates exploit development.","briefOverview":"\u003cp\u003eCISA issued Binding Operational Directive 26-04, “Prioritizing Security Updates Based on Risk,” on June 10, 2026. The directive replaces BOD 22-01 and BOD 19-02 for Federal Civilian Executive Branch agencies. It moves federal vulnerability remediation away from flat deadlines and toward a risk-based model.\u003c/p\u003e\n\n\u003cp\u003eBOD 26-04 uses four binary variables to determine urgency: whether an asset is publicly exposed, whether the CVE is in CISA’s Known Exploited Vulnerabilities catalog, whether exploitation is automatable by an adversary, and whether exploitation yields total or partial control. These variables create a 16-tier remediation matrix with deadlines ranging from three days with forensic triage to deferral until the next system upgrade. The most urgent tier applies to KEV vulnerabilities that yield total system control.\u003c/p\u003e\n\n\u003cp\u003eThe article says the directive arrives as traditional vulnerability management is becoming less effective and AI is accelerating vulnerability discovery and weaponization. It cites the 2026 Verizon DBIR, which reported that only 26% of KEV vulnerabilities were fully remediated in 2025, down from 38% the prior year. Agencies must update policies immediately, update remediation processes within 60 days, and meet the full remediation timelines within 180 days.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA issued BOD 26-04 on June 10, 2026, replacing BOD 22-01 and BOD 19-02 with a new risk-based vulnerability remediation framework. The directive applies to Federal Civilian Executive Branch agencies and requires them to prioritize remediation using a four-variable model. The article describes this as a shift away from one-size-fits-all patching deadlines and toward exposure-driven prioritization.\u003c/p\u003e\n\n\u003cp\u003eThe four variables are public exposure, KEV status, adversary automation capability, and technical impact. Agencies must determine whether vulnerable assets are reachable from outside their networks, while CISA publishes KEV status, automation potential, and technical impact through its Vulnrichment Program. The 16 possible combinations map to remediation timelines ranging from three days to “fix on system upgrade.”\u003c/p\u003e\n\n\u003cp\u003eThe highest-risk vulnerabilities can require remediation within three days and mandatory forensic triage. The article explains that forensic triage is required when a vulnerability is in the KEV and yields total system control, because patching alone may not determine whether a system has already been compromised. Other high-risk combinations may receive a three-day deadline without forensic triage, while lower-risk combinations receive 14-day, 60-day, or upgrade-cycle timelines.\u003c/p\u003e\n\n\u003cp\u003eThe directive is mandatory for federal agencies but is also presented as influential beyond government. The article notes that BOD 22-01’s KEV catalog became widely used by private-sector organizations, state and local governments, critical infrastructure operators, and international allies. It argues that BOD 26-04’s four-variable model may similarly become a de facto standard.\u003c/p\u003e\n\n\u003cp\u003eCISA’s timing is tied in the article to declining remediation performance and AI-driven acceleration of vulnerability discovery and weaponization. The article cites the 2026 Verizon Data Breach Investigations Report, saying only 26% of KEV-listed vulnerabilities were fully remediated in 2025, down from 38% the prior year, and that median time to fully resolve vulnerabilities rose to 43 days. Agencies must immediately update vulnerability management policies, update remediation processes within 60 days, and meet the full Table 1 remediation timelines within 180 days.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA issued Binding Operational Directive 26-04, “Prioritizing Security Updates Based on Risk,” on June 10, 2026. The directive replaces BOD 22-01, “Reducing the Significant Risk of Known Exploited Vulnerabilities,” and BOD 19-02, “Vulnerability Remediation Requirements for Internet-Accessible Systems.” It applies to Federal Civilian Executive Branch agencies and creates a new framework for prioritizing vulnerability remediation.\u003c/p\u003e\n\n\u003cp\u003eThe article presents BOD 26-04 as a major change in federal vulnerability management. Instead of applying the same remediation deadline to every Known Exploited Vulnerability, the directive uses a graduated model based on risk. The model considers asset exposure, real-world exploitation evidence, adversary automation capability, and technical impact severity.\u003c/p\u003e\n\n\u003ch2 id=\"four-variable-prioritization-model\"\u003eFour-variable prioritization model\u003c/h2\u003e\n\n\u003cp\u003eBOD 26-04 uses four binary variables to determine remediation urgency:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePublicly exposed:\u003c/strong\u003e Whether the vulnerable asset is reachable from outside the agency network via a routable IP address.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIn the KEV:\u003c/strong\u003e Whether the CVE is listed in CISA’s Known Exploited Vulnerabilities catalog.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAutomatable by adversary:\u003c/strong\u003e Whether an attacker can automate all the steps needed to exploit the vulnerability.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTechnical impact:\u003c/strong\u003e Whether exploitation gives attackers total control of the affected system or only partial control.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that agencies must determine the public exposure variable themselves using their asset inventory and CISA’s Internet Exposure Reduction Guidance. CISA publishes the other three variables for each CVE through its Vulnrichment Program.\u003c/p\u003e\n\n\u003ch2 id=\"remediation-timelines\"\u003eRemediation timelines\u003c/h2\u003e\n\n\u003cp\u003eThe four binary variables produce 16 possible combinations, which are mapped in the directive to five remediation tiers. The article describes these tiers as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eThree days with forensic triage:\u003c/strong\u003e Required when a vulnerability is in the KEV and yields total system control, regardless of public exposure or exploit automation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThree days without forensic triage:\u003c/strong\u003e Required for certain high-risk combinations, such as a publicly exposed asset with an automatable vulnerability that yields total control, even if the CVE is not yet in the KEV.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e14 days:\u003c/strong\u003e Used for most KEV-listed vulnerabilities and several high-risk non-KEV combinations.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e60 days:\u003c/strong\u003e Applied to lower-risk combinations, such as non-exposed assets with automatable vulnerabilities that yield partial control.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFix on system upgrade:\u003c/strong\u003e Applied when none of the risk criteria are met.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that the highest-risk tier introduces the most aggressive vulnerability management timeline in federal directive history. It also explains that the forensic triage requirement reflects the need to determine whether systems have already been compromised, not just to patch them.\u003c/p\u003e\n\n\u003ch2 id=\"dynamic-nature-of-the-deadlines\"\u003eDynamic nature of the deadlines\u003c/h2\u003e\n\n\u003cp\u003eThe remediation timelines are dynamic. If an agency removes a system from public internet exposure, the applicable timeline can shift to a longer window. If CISA adds a vulnerability to the KEV catalog, the remediation timeline accelerates immediately.\u003c/p\u003e\n\n\u003cp\u003eThe article says this makes continuous asset exposure identification a central operational requirement. An agency that cannot maintain real-time visibility into which assets are internet-facing cannot comply with the graduated and dynamic timelines described by the directive.\u003c/p\u003e\n\n\u003ch2 id=\"differences-from-bod-22-01\"\u003eDifferences from BOD 22-01\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights several major differences between BOD 26-04 and BOD 22-01. BOD 22-01 applied flat remediation timelines to vulnerabilities in the KEV catalog: 14 days for CVEs assigned after 2021 and six months for older CVEs. BOD 26-04 instead treats KEV status as one of four variables in a broader risk model.\u003c/p\u003e\n\n\u003cp\u003eBOD 22-01 did not include a deferral mechanism, while BOD 26-04 allows vulnerabilities meeting none of the risk criteria to be fixed during the next system upgrade cycle. BOD 22-01 also did not require forensic triage, while BOD 26-04 mandates forensic analysis for the highest-risk tier. The article also states that the methodology shifts from reliance on KEV and CVSS scoring toward CISA’s Stakeholder-Specific Vulnerability Categorization system.\u003c/p\u003e\n\n\u003ch2 id=\"reasons-cited-for-the-directive\"\u003eReasons cited for the directive\u003c/h2\u003e\n\n\u003cp\u003eThe article says two factors drove CISA’s issuance of BOD 26-04. The first is declining effectiveness in traditional vulnerability management. Citing the 2026 Verizon Data Breach Investigations Report, the article says only 26% of KEV-listed vulnerabilities were fully remediated by organizations in 2025, down from 38% the previous year, while the median time to fully resolve vulnerabilities rose to 43 days.\u003c/p\u003e\n\n\u003cp\u003eThe second factor is artificial intelligence. The article states that CISA explicitly cites AI as accelerating both vulnerability discovery and weaponization. It also says AI-enabled tools are narrowing the window between vulnerability disclosure and exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-broader-relevance\"\u003eAffected parties and broader relevance\u003c/h2\u003e\n\n\u003cp\u003eBOD 26-04 is mandatory for Federal Civilian Executive Branch agencies. However, the article states that CISA encourages private-sector adoption. It also notes that BOD 22-01’s KEV catalog is already used by private-sector organizations, state and local governments, critical infrastructure operators, and international allies.\u003c/p\u003e\n\n\u003cp\u003eThe article presents BOD 26-04 as a framework that organizations outside the federal government may adopt for their own exposure management programs. It identifies the four variables of asset exposure, exploitation evidence, automation potential, and technical impact as a data-driven approach to prioritization.\u003c/p\u003e\n\n\u003ch2 id=\"operational-requirements-and-deadlines\"\u003eOperational requirements and deadlines\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the transition as a significant operational lift. Agencies must answer the four risk-variable questions for every vulnerability on every asset, and they must do so continuously.\u003c/p\u003e\n\n\u003cp\u003eThe stated compliance milestones are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAgencies must immediately update their vulnerability management policies.\u003c/li\u003e\n\u003cli\u003eWithin 60 days, approximately August 2026, agencies must update their processes for remediating common vulnerabilities according to the new tiered model.\u003c/li\u003e\n\u003cli\u003eWithin 180 days, approximately December 2026, agencies must meet the full remediation timelines defined in Table 1.\u003c/li\u003e\n\u003cli\u003eCISA will publish machine-level asset tagging data requirements within 60 days.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says organizations that have invested in continuous asset discovery, risk-based vulnerability prioritization, and exposure management capabilities are positioned to operationalize the directive more efficiently. It contrasts those organizations with ones still relying on periodic scanning and CVSS-based prioritization.\u003c/p\u003e\n\n\u003ch2 id=\"reported-workload-distribution\"\u003eReported workload distribution\u003c/h2\u003e\n\n\u003cp\u003eThe article cites an initial CISA analysis at one large civilian agency. In that analysis, only 1% of vulnerability instances fell into the three-day remediation category. More than 60% qualified for deferral to the next system upgrade.\u003c/p\u003e\n\n\u003cp\u003eThe article uses this example to emphasize that the model is intended to focus resources rather than overwhelm agencies. It frames the “fix on system upgrade” tier as operational relief for agencies because not every vulnerability receives an accelerated deadline.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions-in-the-article\"\u003eRecommended actions in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends three immediate actions for organizations:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eAudit vulnerability management posture against the four-variable model.\u003c/strong\u003e Organizations should assess whether they can identify publicly exposed assets, integrate KEV status into prioritization, and assess exploit automation potential and technical impact.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePrepare for the BOD 22-01 to BOD 26-04 transition.\u003c/strong\u003e Organizations with workflows built around BOD 22-01 should update policies, dashboards, and reporting to reflect the new four-variable model.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAssess forensic triage readiness.\u003c/strong\u003e Organizations should evaluate whether they can determine not only what is vulnerable, but what may already be compromised, especially for the highest-risk tier.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"article-framing\"\u003eArticle framing\u003c/h2\u003e\n\n\u003cp\u003eThe article is written from Tenable’s perspective and states that Tenable applauds the directive. It says the directive aligns with the risk-based, exposure-driven approach to vulnerability management that Tenable describes as part of the exposure management paradigm. It also says Tenable’s Research Special Operations team has argued for prioritization grounded in exploitation evidence, asset context, and threat actor intelligence.\u003c/p\u003e\n\n\u003cp\u003eThe article closes with links to CISA’s directive, the June 2026 AI Executive Order summary, CISA’s “Patch Smarter, Not Harder,” the CISA KEV catalog, and the Verizon 2026 Data Breach Investigations Report.\u003c/p\u003e\n","keyPoints":["CISA issued BOD 26-04 on June 10, 2026, replacing BOD 22-01 and BOD 19-02 with a risk-based vulnerability remediation framework for Federal Civilian Executive Branch agencies.","BOD 26-04 uses four binary variables to determine remediation urgency: whether an asset is publicly exposed, whether the CVE is in CISA’s Known Exploited Vulnerabilities catalog, whether exploitation is automatable by an adversary, and whether exploitation gives total or partial control.","The directive maps the 16 possible variable combinations to remediation timelines ranging from three days with mandatory forensic triage for the highest-risk vulnerabilities to deferral until the next system upgrade for vulnerabilities meeting none of the risk criteria.","CISA cited declining remediation effectiveness and AI-accelerated vulnerability discovery and weaponization as factors behind the directive, noting that only 26% of KEV-listed vulnerabilities were fully remediated by organizations in 2025 according to the 2026 Verizon DBIR.","Agencies must immediately update vulnerability management policies, update remediation processes within 60 days, and meet the full remediation timelines in Table 1 within 180 days."],"insights":["BOD 26-04 makes internet exposure visibility a compliance-critical capability because publicly exposed status is the only risk variable agencies must determine themselves and a change in exposure can immediately alter remediation deadlines.","The directive is designed to reduce patching workload as well as accelerate urgent fixes, since CISA’s initial analysis at one large civilian agency found only 1% of vulnerability instances fell into the three-day category while more than 60% qualified for deferral to the next system upgrade.","For the highest-risk vulnerabilities, patching alone is no longer sufficient because BOD 26-04 requires forensic triage to determine whether systems have already been compromised.","Organizations using BOD 22-01-based workflows need to update policies, dashboards, and reporting because BOD 26-04 revokes and replaces BOD 22-01 rather than merely supplementing it.","Periodic scanning and CVSS-based prioritization are explicitly described as insufficient for the new model because agencies need continuous answers to the four risk variables across every vulnerability and asset."],"referencedReports":[{"title":"CISA BOD 26-04: Prioritizing Security Updates Based on Risk","url":"https://www.cisa.gov/news-events/directives/bod-26-04-prioritizing-security-updates-based-risk","publisher":"CISA","context":"The article is centered on CISA’s BOD 26-04 directive and explains its new risk-based federal vulnerability remediation requirements.","category":"","primary":false},{"title":"Verizon 2026 Data Breach Investigations Report","url":"https://www.verizon.com/business/resources/reports/dbir/","publisher":"Verizon","context":"The article cites the 2026 Verizon DBIR for remediation statistics, including that only 26% of KEV-listed vulnerabilities were fully remediated in 2025.","category":"","primary":false}],"body":"\u003cp\u003eCISA issued Binding Operational Directive 26-04, “Prioritizing Security Updates Based on Risk,” on June 10, 2026. The directive replaces BOD 22-01 and BOD 19-02 for Federal Civilian Executive Branch agencies. It moves federal vulnerability remediation away from flat deadlines and toward a risk-based model.\u003c/p\u003e\n\n\u003cp\u003eBOD 26-04 uses four binary variables to determine urgency: whether an asset is publicly exposed, whether the CVE is in CISA’s Known Exploited Vulnerabilities catalog, whether exploitation is automatable by an adversary, and whether exploitation yields total or partial control. These variables create a 16-tier remediation matrix with deadlines ranging from three days with forensic triage to deferral until the next system upgrade. The most urgent tier applies to KEV vulnerabilities that yield total system control.\u003c/p\u003e\n\n\u003cp\u003eThe article says the directive arrives as traditional vulnerability management is becoming less effective and AI is accelerating vulnerability discovery and weaponization. It cites the 2026 Verizon DBIR, which reported that only 26% of KEV vulnerabilities were fully remediated in 2025, down from 38% the prior year. Agencies must update policies immediately, update remediation processes within 60 days, and meet the full remediation timelines within 180 days.\u003c/p\u003e\n"},{"n":4,"title":"What Recent Reporting Gets Right About The Gentlemen RaaS and What Silent Push Learned Months Earlier","source":"silentpush.com","sourceColorIdx":6,"link":"https://www.silentpush.com/blog/the-gentlemen-raas/?utm_source=rss\u0026utm_medium=rss\u0026utm_campaign=the-gentlemen-raas","time":"22:13","priority":"SHOULD READ","score":82,"tldr":"Silent Push says its earlier infrastructure tracking linked a Cobalt Strike affiliate across LockBit, Black Basta, Qilin, and The Gentlemen, allowing it to flag a C2 IP used in a later The Gentlemen intrusion 76 days before public reporting. The key takeaway is that persistent tooling fingerprints like Cobalt Strike watermarks can help defenders detect ransomware affiliates before they strike under new RaaS brands.","briefOverview":"\u003cp\u003eBrian Krebs of KrebsonSecurity published reporting identifying the person allegedly behind The Gentlemen ransomware operation. Silent Push says that reporting returns attention to a Ransomware-as-a-Service group that has been moving fast since mid-2025. The article positions Silent Push’s earlier research as focused on the infrastructure and affiliate activity supporting the operation.\u003c/p\u003e\n\n\u003cp\u003eSilent Push says its analysts identified a new malware loader named CountLoader in July and August 2025, observed in .NET, PowerShell, and JScript versions. The company linked CountLoader activity to two Cobalt Strike watermarks, 1473793097 and 1357776117, which it says were fingerprinted to a single ransomware affiliate tied to Black Basta, LockBit, and Qilin. Silent Push later connected that affiliate trail to The Gentlemen.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights 91.107.247[.]163, which Silent Push flagged as a Cobalt Strike C2 on February 8, 2026. Check Point later identified the same IP in an April 20, 2026 DFIR report on a The Gentlemen intrusion, which Silent Push says created a 76-day preemptive defense window for customers. The article recommends auditing and patching internet-facing VPN and firewall appliances, which it says The Gentlemen affiliates favor for initial access.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article responds to recent KrebsonSecurity reporting by Brian Krebs that identified the person allegedly behind The Gentlemen ransomware operation. Silent Push says the reporting is important but emphasizes that its own earlier work focused on the infrastructure and affiliate activity behind the group. The article describes The Gentlemen as a Ransomware-as-a-Service operation moving quickly since mid-2025.\u003c/p\u003e\n\n\u003cp\u003eSilent Push says it covered The Gentlemen in an April blog based on deep research from 2025. That research followed an affiliate across LockBit, Black Basta, Qilin, and The Gentlemen over nearly three years. The article presents this affiliate-focused approach as a way to track activity even when ransomware branding changes.\u003c/p\u003e\n\n\u003cp\u003eIn July and August 2025, Silent Push analysts identified a new malware loader called CountLoader. The loader was observed in three versions: .NET, PowerShell, and JScript. Silent Push says CountLoader led to two Cobalt Strike watermarks, 1473793097 and 1357776117, associated with a single ransomware affiliate tied to Black Basta, LockBit, and Qilin activity.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that Cobalt Strike licenses carry unique identifiers and that those watermarks can follow an affiliate across campaigns and RaaS platforms. Silent Push argues that while RaaS affiliations can change, a tooling fingerprint such as a Cobalt Strike watermark can remain a reliable tracking mechanism. This is the basis for the company’s claim that it maintained a high-confidence trail across three years of activity spanning four ransomware programs.\u003c/p\u003e\n\n\u003cp\u003eSilent Push says it flagged 91.107.247[.]163 as a Cobalt Strike C2 on February 8, 2026, and issued an Indicators of Future Attack alert to customers. On April 20, 2026, Check Point published a DFIR report on a The Gentlemen intrusion that identified the same IP as the Cobalt Strike C2 used in the attack. Silent Push says customers with its integrations had blocking in place 76 days before that public report.\u003c/p\u003e\n\n\u003cp\u003eFor defenders, the article recommends focusing on internet-facing VPN and firewall appliances because it says The Gentlemen affiliates favor those systems for initial access. It also promotes Silent Push Cobalt Strike IOFA feeds for enterprise clients, available via API and STIX/TAXII for integration into firewalls, SIEMs, and EDR platforms. The article frames those integrations as the mechanism that placed its customers ahead of the reported intrusion.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eBrian Krebs of KrebsonSecurity published reporting identifying the person allegedly behind The Gentlemen ransomware operation. Silent Push says the reporting is good work and has put renewed attention on a Ransomware-as-a-Service group that has been moving quickly since mid-2025.\u003c/p\u003e\n\n\u003cp\u003eSilent Push uses the article to summarize what it says it had already learned through its own infrastructure-focused research. Its earlier work centered on the infrastructure and affiliate activity supporting The Gentlemen, especially an affiliate it had tracked across multiple ransomware groups for nearly three years.\u003c/p\u003e\n\n\u003ch2 id=\"prior-silent-push-research-on-the-gentlemen\"\u003ePrior Silent Push Research on The Gentlemen\u003c/h2\u003e\n\n\u003cp\u003eSilent Push says it previously covered The Gentlemen in an April blog titled “No Place to Hide: Following a Serial Ransomware Affiliate from LockBit, Black Basta, and Qilin to The Gentlemen.” That blog was based on research conducted in 2025.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the earlier research focused on an affiliate tracked across four ransomware groups:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLockBit\u003c/li\u003e\n\u003cli\u003eBlack Basta\u003c/li\u003e\n\u003cli\u003eQilin\u003c/li\u003e\n\u003cli\u003eThe Gentlemen\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSilent Push presents this affiliate trail as important because the RaaS group used by the affiliate may change, while the infrastructure and tooling fingerprints can persist.\u003c/p\u003e\n\n\u003ch2 id=\"countloader-discovery\"\u003eCountLoader Discovery\u003c/h2\u003e\n\n\u003cp\u003eSilent Push says its Preemptive Cyber Defense Analysts identified a new malware loader in July and August 2025. The company named the loader CountLoader.\u003c/p\u003e\n\n\u003cp\u003eThe article says CountLoader was observed in three distinct versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e.NET\u003c/li\u003e\n\u003cli\u003ePowerShell\u003c/li\u003e\n\u003cli\u003eJScript\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSilent Push says the more significant finding was not only the loader itself, but what CountLoader activity led to: two Cobalt Strike watermarks associated with a single ransomware affiliate.\u003c/p\u003e\n\n\u003ch2 id=\"cobalt-strike-watermarks-and-affiliate-tracking\"\u003eCobalt Strike Watermarks and Affiliate Tracking\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies two Cobalt Strike watermarks tied to the activity:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e1473793097\u003c/li\u003e\n\u003cli\u003e1357776117\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSilent Push says these were fingerprinted to a single ransomware affiliate with verifiable ties to Black Basta, LockBit, and Qilin activity. It published those findings first in an exclusive client-facing report in August 2025, followed by a public blog on CountLoader on September 18, 2025.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that Cobalt Strike licenses carry unique identifiers. When an affiliate uses the same licensed instance across campaigns and RaaS platforms, the watermarks follow that affiliate. Silent Push argues that this makes Cobalt Strike watermarks a reliable tracking mechanism across ransomware brand changes.\u003c/p\u003e\n\n\u003ch2 id=\"connection-to-the-gentlemen\"\u003eConnection to The Gentlemen\u003c/h2\u003e\n\n\u003cp\u003eSilent Push says the affiliate tracked in its research worked across LockBit, Black Basta, Qilin, and The Gentlemen. The article describes the RaaS group under which the affiliate operates as interchangeable.\u003c/p\u003e\n\n\u003cp\u003eThe key technical claim is that Cobalt Strike watermarks persisted regardless of which ransomware program the affiliate was associated with. Silent Push says that persistence allowed it to maintain a high-confidence trail across three years of activity spanning four ransomware programs.\u003c/p\u003e\n\n\u003ch2 id=\"cobalt-strike-c2-ip-flagged-before-public-reporting\"\u003eCobalt Strike C2 IP Flagged Before Public Reporting\u003c/h2\u003e\n\n\u003cp\u003eOn February 8, 2026, Silent Push flagged 91.107.247[.]163 as a Cobalt Strike command-and-control IP. The company says it issued an Indicators of Future Attack alert to customers that day.\u003c/p\u003e\n\n\u003cp\u003eThe article states that blocking was automatically pushed to customer firewalls, SIEMs, and EDR platforms. Silent Push presents this as an example of preemptive cyber defense in action.\u003c/p\u003e\n\n\u003cp\u003eOn April 20, 2026, Check Point published a DFIR report on an intrusion by The Gentlemen. According to the article, that report identified 91.107.247[.]163 as the Cobalt Strike C2 used in the attack.\u003c/p\u003e\n\n\u003cp\u003eSilent Push says it had flagged the IP 76 days before the Check Point report. The article emphasizes that this 76-day gap is the kind of window where preemptive cyber defense operates.\u003c/p\u003e\n\n\u003ch2 id=\"operator-attribution-versus-infrastructure-attribution\"\u003eOperator Attribution Versus Infrastructure Attribution\u003c/h2\u003e\n\n\u003cp\u003eThe article distinguishes between identifying who is allegedly running a ransomware operation and identifying what infrastructure the operation uses. It says Krebs’ reporting addresses the operator picture, while Silent Push’s research addresses the infrastructure picture.\u003c/p\u003e\n\n\u003cp\u003eSilent Push argues that infrastructure attribution can help detect the same actor even when the actor moves between ransomware groups. In the article’s framing, ransomware brands can change, but toolmarks and infrastructure patterns can continue to expose the same affiliate.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-recommendations\"\u003eDefensive Recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe article says Cobalt Strike is widely known to be used by many threat actors and Advanced Persistent Threat groups. Silent Push says its Cobalt Strike-related Indicators of Future Attack feeds are available for enterprise clients.\u003c/p\u003e\n\n\u003cp\u003eThe article specifically says defenders should focus on initial access through internet-facing VPN and firewall appliances. It states that The Gentlemen affiliates favor those systems as entry points.\u003c/p\u003e\n\n\u003cp\u003eSilent Push recommends that organizations that have not recently audited and patched those surfaces treat that work as an immediate priority.\u003c/p\u003e\n\n\u003ch2 id=\"silent-push-iofa-feeds-and-integrations\"\u003eSilent Push IOFA Feeds and Integrations\u003c/h2\u003e\n\n\u003cp\u003eThe article says Silent Push Cobalt Strike IOFA feeds are available to enterprise clients via API and STIX/TAXII. It says these feeds can be integrated directly into firewalls, SIEMs, or EDR platforms.\u003c/p\u003e\n\n\u003cp\u003eSilent Push says this integration is what allowed its customers to have blocks in place before the intrusion described by Check Point was publicly reported. The article frames this as the practical defensive value of detecting and blocking infrastructure before it appears in post-incident reporting.\u003c/p\u003e\n\n\u003ch2 id=\"related-material-cited-by-the-article\"\u003eRelated Material Cited by the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article points readers to two related Silent Push posts:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e“No Place to Hide: Following a Serial Ransomware Affiliate from LockBit, Black Basta, and Qilin to The Gentlemen,” published April 22, 2026.\u003c/li\u003e\n\u003cli\u003e“CountLoader: Silent Push Discovers New Malware Loader Being Served in 3 Different Versions,” published September 18, 2025.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also references Check Point’s April 20, 2026 DFIR report on The Gentlemen, which identified 91.107.247[.]163 as the Cobalt Strike C2 used in an intrusion.\u003c/p\u003e\n\n\u003ch2 id=\"bottom-line\"\u003eBottom Line\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central point is that tracking infrastructure and tooling fingerprints can reveal ransomware affiliate activity across multiple RaaS brands. Silent Push uses its tracking of CountLoader, Cobalt Strike watermarks, and the IP 91.107.247[.]163 to argue that defenders can act before public incident reports confirm the use of specific infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe most concrete example provided is the 76-day interval between Silent Push flagging 91.107.247[.]163 as a Cobalt Strike C2 and Check Point later identifying the same IP in a The Gentlemen intrusion.\u003c/p\u003e\n","keyPoints":["Brian Krebs published reporting identifying the person allegedly behind The Gentlemen ransomware operation, while Silent Push says its earlier research focused on the group’s infrastructure and affiliate activity.","Silent Push identified a malware loader it named CountLoader in July and August 2025, observed in .NET, PowerShell, and JScript versions.","Silent Push linked CountLoader activity to two Cobalt Strike watermarks, 1473793097 and 1357776117, which it says were tied to a single ransomware affiliate connected to Black Basta, LockBit, Qilin, and The Gentlemen activity.","Silent Push flagged 91.107.247[.]163 as a Cobalt Strike command-and-control IP on February 8, 2026, and says Check Point later identified the same IP in an April 20, 2026 DFIR report on a The Gentlemen intrusion.","The article says The Gentlemen affiliates favor internet-facing VPN and firewall appliances for initial access and recommends auditing and patching those surfaces."],"insights":["Cobalt Strike watermarks can remain useful for attribution even when an affiliate changes RaaS programs, because the article says the same tooling fingerprints followed activity across LockBit, Black Basta, Qilin, and The Gentlemen.","The 76-day gap between Silent Push flagging 91.107.247[.]163 and Check Point later reporting it in a The Gentlemen intrusion shows that infrastructure indicators can provide defensive value well before an incident is publicly analyzed.","Tracking affiliates rather than only ransomware brands is actionable because the article describes the RaaS group as interchangeable while the affiliate’s infrastructure and tooling persisted across multiple operations.","Automated integration of IOFA feeds into firewalls, SIEMs, and EDR platforms is presented as important because Silent Push says its customers had blocks in place for the Cobalt Strike C2 before the reported intrusion."],"referencedReports":[{"title":"DFIR Report: The Gentlemen","url":"https://research.checkpoint.com/2026/dfir-report-the-gentlemen/","publisher":"Check Point Research","context":"The article cites Check Point's DFIR report as identifying 91.107.247[.]163 as the Cobalt Strike C2 used in a The Gentlemen intrusion.","category":"","primary":false}],"body":"\u003cp\u003eBrian Krebs of KrebsonSecurity published reporting identifying the person allegedly behind The Gentlemen ransomware operation. Silent Push says that reporting returns attention to a Ransomware-as-a-Service group that has been moving fast since mid-2025. The article positions Silent Push’s earlier research as focused on the infrastructure and affiliate activity supporting the operation.\u003c/p\u003e\n\n\u003cp\u003eSilent Push says its analysts identified a new malware loader named CountLoader in July and August 2025, observed in .NET, PowerShell, and JScript versions. The company linked CountLoader activity to two Cobalt Strike watermarks, 1473793097 and 1357776117, which it says were fingerprinted to a single ransomware affiliate tied to Black Basta, LockBit, and Qilin. Silent Push later connected that affiliate trail to The Gentlemen.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights 91.107.247[.]163, which Silent Push flagged as a Cobalt Strike C2 on February 8, 2026. Check Point later identified the same IP in an April 20, 2026 DFIR report on a The Gentlemen intrusion, which Silent Push says created a 76-day preemptive defense window for customers. The article recommends auditing and patching internet-facing VPN and firewall appliances, which it says The Gentlemen affiliates favor for initial access.\u003c/p\u003e\n"},{"n":2,"title":"Maine breach portal abused to publish fake data breach disclosures","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/maine-breach-portal-abused-to-publish-fake-data-breach-disclosures/","time":"22:44","priority":"SHOULD READ","score":78,"tldr":"Maine’s official breach portal was abused to publish fake data breach notices for companies including VRChat and Discord because submissions are posted without prior verification. The incidents show that public breach listings can be manipulated and should be independently confirmed before being treated as legitimate.","briefOverview":"\u003cp\u003eFraudulent data breach disclosures were submitted to Maine’s official breach portal and publicly posted before their legitimacy could be verified. The most recent cited entry allegedly came from VRChat and claimed that more than 2.4 million users had personal data exposed after hackers accessed the company’s cloud environment. VRChat told BleepingComputer the filing was fake and used the name of a fictitious employee.\u003c/p\u003e\n\n\u003cp\u003eThe article says Maine’s Attorney General’s Office confirmed that anyone can submit a breach notification form and have it added to the portal without verification. A separate suspicious filing allegedly from Discord claimed 10 million people were affected, but contained unreliable details such as a Gmail contact, placeholder phone number, and inconsistent dates. The incident shows how public breach portals can be abused to spread misinformation, potentially causing reputational harm and panic before companies become aware of the false filings.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eFraudulent breach notifications were submitted to Maine’s official breach portal and published in the state Attorney General’s breach disclosure database. The article describes the activity as an unusual misinformation campaign because entries appeared publicly before their legitimacy could be verified. Companies named in the filings were prompted to deny the claims.\u003c/p\u003e\n\n\u003cp\u003eThe most recent example cited was an alleged VRChat breach notice. The filing claimed that hackers accessed the company’s cloud environment and exposed personal data of more than 2.4 million users. The fake notification listed potentially impacted data including VRChat usernames, associated email addresses, VRChat+ subscription status, login history with device details and IP addresses, and Steam or Meta user IDs linked to accounts.\u003c/p\u003e\n\n\u003cp\u003eThe fake VRChat submission included a drafted notification letter for affected individuals. The letter claimed the incident occurred between May 10 and 12 and included details about unauthorized access, a forensic investigation, actions taken after detection, security improvements, and user protection steps. VRChat’s Head of Community Charles Tupper told BleepingComputer the company did not submit the notice, the named employee and email did not exist, and VRChat had no reason to believe its data or systems were compromised.\u003c/p\u003e\n\n\u003cp\u003eMaine’s Attorney General’s Office told BleepingComputer that the VRChat notice would be taken down. The office also said it was not aware of another example of intentional misrepresentation of notice filings. However, it confirmed that anyone can submit a breach notification form and have it added to the portal without verification.\u003c/p\u003e\n\n\u003cp\u003eThe article also cites an earlier suspicious filing allegedly from Discord that claimed 10 million people were impacted. That entry lacked a consumer notification letter and included vague or unreliable details, including a Gmail contact, a placeholder phone number, a July 9, 2024 breach date, an August 8, 2025 discovery date, and a January 1, 2000 consumer notification date. The article concludes that journalists and consumers should independently verify breach portal entries with affected companies before treating them as legitimate incidents.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that Maine’s official breach portal was abused through fraudulent data breach disclosures that were submitted and publicly posted before their legitimacy could be verified. The activity is described as an unusual misinformation campaign because the false notices appeared in an official government breach disclosure database and prompted named companies to deny the claims.\u003c/p\u003e\n\n\u003cp\u003eThe most recent entry discussed allegedly came from VRChat, a multiplayer social virtual reality platform. VRChat told BleepingComputer that the notice was fraudulent, that the named employee and email did not exist, and that it had no reason to believe its data or systems had been compromised.\u003c/p\u003e\n\n\u003ch2 id=\"fake-vrchat-breach-filing\"\u003eFake VRChat Breach Filing\u003c/h2\u003e\n\n\u003cp\u003eThe fake VRChat notice claimed that hackers gained access to the company’s cloud environment and exposed personal data belonging to more than 2.4 million users. The submission included a notification letter for affected individuals, which made the filing appear more credible at a cursory glance.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the fake letter claimed the incident occurred between May 10 and 12 and listed the following allegedly impacted data:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVRChat username\u003c/li\u003e\n\u003cli\u003eEmail address associated with a VRChat account\u003c/li\u003e\n\u003cli\u003eVRChat+ subscription status\u003c/li\u003e\n\u003cli\u003eLogin history, including device, hardware identifiers, and IP addresses\u003c/li\u003e\n\u003cli\u003eSteam or Meta user ID linked to a VRChat account\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the letter included details about unauthorized access, the results of a forensic investigation, post-detection actions, claims of security improvements, and recommendations for users to increase account protection.\u003c/p\u003e\n\n\u003ch2 id=\"vrchat-s-response\"\u003eVRChat’s Response\u003c/h2\u003e\n\n\u003cp\u003eCharles Tupper, Head of Community at VRChat, told BleepingComputer that VRChat did not submit the notice. He also said the employee and email cited in the notice did not exist.\u003c/p\u003e\n\n\u003cp\u003eTupper stated that VRChat had no reason to believe its data or systems had been compromised. He added that the company was contacting the Maine Attorney General’s Office to have the entry removed. Graham Gaylor, VRChat’s CEO and co-founder, also confirmed the statement BleepingComputer received from Tupper.\u003c/p\u003e\n\n\u003ch2 id=\"maine-attorney-general-s-office-response\"\u003eMaine Attorney General’s Office Response\u003c/h2\u003e\n\n\u003cp\u003eThe Maine Office of the Attorney General told BleepingComputer that the VRChat notice would be taken down. The office also said it was not aware of another example of intentional misrepresentation of notice filings.\u003c/p\u003e\n\n\u003cp\u003eHowever, the office confirmed that anyone can submit a breach notification form and have it added to the portal without verification. In response to questions about the earlier Discord-related submission, the office said it did not have independent knowledge of the breaches and that the submitting entity fills out the information, which goes directly onto the site.\u003c/p\u003e\n\n\u003ch2 id=\"suspicious-discord-filing\"\u003eSuspicious Discord Filing\u003c/h2\u003e\n\n\u003cp\u003eThe article also describes an earlier suspicious notification allegedly from Discord. That filing claimed that 10 million people were impacted by a data breach.\u003c/p\u003e\n\n\u003cp\u003eUnlike most formal data breach notifications, the Discord entry did not include a notification letter from the company explaining what happened or how impacted consumers could protect themselves. Apart from the company address, the entry contained vague and unreliable information.\u003c/p\u003e\n\n\u003cp\u003eThe article cites several red flags in the Discord filing:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe notice used a Gmail contact.\u003c/li\u003e\n\u003cli\u003eIt included a placeholder phone number.\u003c/li\u003e\n\u003cli\u003eIt listed a breach date of July 9, 2024.\u003c/li\u003e\n\u003cli\u003eIt listed a discovery date of August 8, 2025.\u003c/li\u003e\n\u003cli\u003eIt included an inconsistent consumer notification date of January 1, 2000.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that although Discord was impacted by a data breach in 2025, that incident occurred on September 20 and involved a compromise of the company’s Zendesk support desk system. At that time, hackers told BleepingComputer they had stolen data from 5.5 million users across 8.4 million tickets.\u003c/p\u003e\n\n\u003ch2 id=\"significance-and-impact\"\u003eSignificance and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that listings on official breach portals should not automatically be treated as valid. It states that inadequate vetting can make it easy for scammers to spread misinformation through public notification systems.\u003c/p\u003e\n\n\u003cp\u003eThe reported abuse could cause reputational harm and panic before affected companies even become aware that a false filing has been posted. The article concludes that journalists and consumers should independently verify breach notifications with affected companies before treating entries on public notification portals as legitimate incidents.\u003c/p\u003e\n","keyPoints":["Fraudulent data breach disclosures were submitted to Maine’s official breach portal and publicly posted before their legitimacy could be verified.","VRChat told BleepingComputer that the breach notification listed in the Maine Attorney General’s database was fake, submitted under a fictitious employee name, and not evidence of compromised systems or data.","The Maine Office of the Attorney General confirmed that anyone can submit a breach notification form and have it added to the portal without verification.","A suspicious breach notification allegedly from Discord claimed 10 million people were affected but contained unreliable details including a Gmail contact, placeholder phone number, and inconsistent dates.","The article states that fake filings on public breach portals can spread misinformation, cause reputational harm and panic, and should be independently verified with affected companies."],"insights":["An official government breach portal can lend credibility to false claims even when the submitting party is unverified, creating a misinformation vector against companies.","The fake VRChat filing was made more convincing by including a drafted consumer notification letter with incident details, forensic claims, remediation statements, and user-protection advice.","Obvious data quality issues in the Discord filing, such as a Gmail contact, placeholder phone number, and inconsistent dates, were still not enough to prevent publication on the Maine portal.","The Maine Attorney General’s Office said it was not aware of another example of intentional misrepresentation in notice filings, indicating this abuse pattern was unusual for the portal."],"referencedReports":[],"body":"\u003cp\u003eFraudulent data breach disclosures were submitted to Maine’s official breach portal and publicly posted before their legitimacy could be verified. The most recent cited entry allegedly came from VRChat and claimed that more than 2.4 million users had personal data exposed after hackers accessed the company’s cloud environment. VRChat told BleepingComputer the filing was fake and used the name of a fictitious employee.\u003c/p\u003e\n\n\u003cp\u003eThe article says Maine’s Attorney General’s Office confirmed that anyone can submit a breach notification form and have it added to the portal without verification. A separate suspicious filing allegedly from Discord claimed 10 million people were affected, but contained unreliable details such as a Gmail contact, placeholder phone number, and inconsistent dates. The incident shows how public breach portals can be abused to spread misinformation, potentially causing reputational harm and panic before companies become aware of the false filings.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
