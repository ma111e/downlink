<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

window.__DL_ARTICLES = [{"n":5,"title":"Critical Apache HTTP/2 Flaw (CVE-2026-23918) Enables DoS and Potential RCE","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/critical-apache-http2-flaw-cve-2026.html","time":"16:19","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"Apache HTTP Server 2.4.66 contains a critical HTTP/2 vulnerability that enables denial-of-service attacks and potential remote code execution. Administrators should immediately update to version 2.4.67 to mitigate the risk.","briefOverview":"\u003cp\u003eThe Apache Software Foundation has released an urgent security update for Apache HTTP Server 2.4.66 to address a critical vulnerability in its HTTP/2 protocol handling. Tracked as CVE-2026-23918, this flaw carries a CVSS score of 8.8 and involves a dangerous double-free condition in the mod_http2 module. Researchers from Striga.ai and ISEC.pl discovered the issue and reported it to the foundation. Exploiting the bug allows attackers to trigger a denial-of-service attack with just a single TCP connection and two HTTP/2 frames. On systems using the mmap allocator, the vulnerability can also be chained into a remote code execution attack. The Apache Portable Runtime scoreboard memory remains at a fixed address despite ASLR, enabling attackers to reliably place fake structures for exploitation. While the MPM prefork module is unaffected, the widespread default use of mod_http2 makes this a high-risk issue for most production deployments. Administrators are strongly advised to upgrade immediately to version 2.4.67 to mitigate these threats.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Apache Software Foundation has issued security updates to patch multiple vulnerabilities in the HTTP Server, with particular attention to a severe flaw in HTTP/2 handling. This vulnerability, identified as CVE-2026-23918, has been assigned a CVSS score of 8.8 and is officially classified as a double-free issue that could lead to remote code execution. The bug specifically impacts Apache HTTP Server version 2.4.66 and has been resolved in the newly released version 2.4.67. Bartlomiej Dmitruk of Striga.ai and Stanislaw Strzalkowski from ISEC.pl are credited with discovering and reporting the security issue. Dmitruk explained that the vulnerability triggers when a client sends an HTTP/2 HEADERS frame immediately followed by a RST_STREAM frame with a non-zero error code. This sequence occurs before the multiplexer registers the stream, causing two nghttp2 callbacks to fire in rapid succession. Both callbacks ultimately call the stream cleanup function, which incorrectly pushes the same stream pointer onto the purge cleanup array twice. When the server later iterates through this array, it attempts to free the same memory location twice, resulting in a double-free error. The resulting denial-of-service attack is trivial to execute and works on any default deployment using mod_http2 with a multi-threaded MPM. Attackers can sustain the crash by continuously sending the malicious frame pattern, causing Apache to repeatedly respawn crashed workers and drop requests. Remote code execution becomes possible when the server uses the Apache Portable Runtime mmap allocator, which is the default on Debian-derived systems and official Docker images. Researchers successfully built a proof of concept on x86_64 architectures by placing a fake stream structure at a freed virtual address. They redirected the pool cleanup function to system() and utilized the Apache scoreboard memory as a stable container for the exploit. The scoreboard remains at a fixed address even with ASLR enabled, making the exploitation chain highly practical. While the MPM prefork module is not affected by this flaw, the widespread default configuration of mod_http2 significantly expands the attack surface. Security teams are urged to apply the latest patches to ensure optimal protection against these critical threats.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eVulnerability Overview\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe Apache Software Foundation has released critical security updates for the HTTP Server, addressing a severe flaw in HTTP/2 protocol handling. Tracked as CVE-2026-23918, the vulnerability carries a CVSS score of 8.8 and is officially described as a double-free condition with potential remote code execution implications. The issue affects Apache HTTP Server 2.4.66 and has been patched in version 2.4.67. Bartlomiej Dmitruk and Stanislaw Strzalkowski are credited with discovering and reporting the flaw to the foundation.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTechnical Mechanism\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability resides in the mod_http2 module, specifically within the stream cleanup path of the h2_mplx.c file. It triggers when a client sends an HTTP/2 HEADERS frame immediately followed by a RST_STREAM frame containing a non-zero error code. This sequence occurs before the multiplexer has registered the stream, causing two nghttp2 callbacks to fire sequentially. Both the on_frame_recv_cb and on_stream_close_cb callbacks ultimately invoke the h2_mplx_c1_client_rst function. This function incorrectly pushes the same h2_stream pointer onto the spurge cleanup array twice. When the c1_purge_streams function later iterates through the array, it calls h2_stream_destroy and apr_pool_destroy on each entry. The second call attempts to free memory that has already been deallocated, resulting in a double-free error.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eExploitation Paths\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe denial-of-service impact is trivial to achieve and requires only a single TCP connection and two HTTP/2 frames. This attack works on any default deployment utilizing mod_http2 with a multi-threaded MPM. Attackers can sustain the DoS by continuously sending the malicious frame pattern, causing Apache to repeatedly respawn crashed workers and drop all subsequent requests. Remote code execution becomes possible when the server uses the Apache Portable Runtime mmap allocator, which is the default configuration on Debian-derived systems and official Apache Docker images. Researchers successfully developed a working proof of concept on x86_64 architectures. The exploit chain places a fake h2_stream struct at a freed virtual address through mmap reuse. It then points the pool cleanup function to system() and uses the Apache scoreboard memory as a stable container for the fake structures and command strings. The scoreboard remains at a fixed address for the server\u0026rsquo;s lifetime, bypassing ASLR protections and making the exploitation practical. While practical exploitation requires an info leak for system() and scoreboard offsets, the heap spray is probabilistic but highly effective in lab conditions.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eImpact and Mitigation\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe MPM prefork module is completely unaffected by this vulnerability. However, the attack surface remains large because mod_http2 ships in default builds and HTTP/2 is widely enabled in production environments. Security teams are strongly advised to apply the latest fixes immediately to mitigate both the denial-of-service and potential remote code execution risks.\u003c/p\u003e\n","keyPoints":["Apache HTTP Server 2.4.66 contains a critical HTTP/2 vulnerability tracked as CVE-2026-23918 that enables denial-of-service attacks and potential remote code execution.","The flaw results from a double-free error in the mod_http2 stream cleanup path triggered when a client sends an HTTP/2 HEADERS frame followed immediately by a RST_STREAM frame.","Successful remote code execution requires the Apache Portable Runtime mmap allocator, which is the default configuration on Debian-derived systems and official Docker images.","The MPM prefork module is unaffected by this vulnerability, but mod_http2 ships in default builds and is widely enabled in production environments.","The Apache Software Foundation has released version 2.4.67 to patch the issue and advises all users to apply the update immediately."],"insights":["The remote code execution chain leverages Apache's scoreboard memory, which remains at a fixed address despite ASLR, making exploitation practical.","The MPM prefork module is entirely unaffected by the flaw, providing an immediate configuration-based mitigation without requiring a patch.","The denial-of-service attack requires only a single TCP connection and two specific HTTP/2 frames, allowing attackers to sustainably crash workers on multi-threaded deployments.","The RCE path is specifically enabled by the mmap allocator, which is the default on Debian-derived systems and official Apache Docker images, increasing the attack surface for default deployments."],"referencedReports":[],"body":"\u003cp\u003eThe Apache Software Foundation has released an urgent security update for Apache HTTP Server 2.4.66 to address a critical vulnerability in its HTTP/2 protocol handling. Tracked as CVE-2026-23918, this flaw carries a CVSS score of 8.8 and involves a dangerous double-free condition in the mod_http2 module. Researchers from Striga.ai and ISEC.pl discovered the issue and reported it to the foundation. Exploiting the bug allows attackers to trigger a denial-of-service attack with just a single TCP connection and two HTTP/2 frames. On systems using the mmap allocator, the vulnerability can also be chained into a remote code execution attack. The Apache Portable Runtime scoreboard memory remains at a fixed address despite ASLR, enabling attackers to reliably place fake structures for exploitation. While the MPM prefork module is unaffected, the widespread default use of mod_http2 makes this a high-risk issue for most production deployments. Administrators are strongly advised to upgrade immediately to version 2.4.67 to mitigate these threats.\u003c/p\u003e\n"},{"n":7,"title":"China-Linked UAT-8302 Targets Governments Using Shared APT Malware Across Regions","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/china-linked-uat-8302-targets.html","time":"14:19","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"A China-linked APT group known as UAT-8302 is targeting government agencies across South America and southeastern Europe by deploying custom malware previously used by other Chinese hacking groups, underscoring a growing trend of collaboration and tool-sharing among China-aligned threat actors.","briefOverview":"\u003cp\u003eCisco Talos has attributed a series of attacks against government agencies in South America and southeastern Europe to a China-linked APT group designated UAT-8302. The group has been active since late 2024 and relies heavily on custom malware families that are also utilized by other China-aligned threat clusters. Notable tools include the NetDraft backdoor, the CloudSorcerer backdoor, the SNOWLIGHT stager, and the Draculoader shellcode loader. Initial network access is suspected to involve zero-day and N-day web application exploits, followed by extensive reconnaissance and automated scanning using the open-source gogo tool. Once inside the network, attackers conduct lateral movement and deploy multiple persistent access mechanisms, including proxy and VPN tools like Stowaway and SoftEther VPN. The widespread reuse of these malicious artifacts across different threat groups underscores a growing trend of operational collaboration and tool-sharing among China-nexus actors. This shared infrastructure aligns with industry observations of a Premier Pass-as-a-Service framework that streamlines the initial compromise phase for a restricted circle of hackers.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco Talos researchers have identified a sophisticated China-nexus APT group operating under the name UAT-8302. This threat actor has targeted government entities in South America since late 2024 and has expanded its operations to southeastern Europe in 2025. The group’s post-exploitation activities heavily feature custom malware families that are shared with other China-aligned hacking clusters. Among the most prominent tools is NetDraft, a .NET-based backdoor that serves as a C# variant of FINALDRAFT. This same malware has been previously linked to threat actors known as Ink Dragon, CL-STA-0049, Earth Alux, Jewelbug, and REF7707. ESET tracks the use of this backdoor under the name LongNosedGoblin, while Russian firm Solar associates it with the Erudite Mogwai group targeting Russian IT organizations. Additional tools deployed by UAT-8302 include CloudSorcerer, a backdoor previously seen against Russian entities, and SNOWLIGHT, a VShell stager used by several other Chinese groups. The attackers also utilize Deed RAT, Zingdoor, and Draculoader, a generic shellcode loader that delivers Crowdoor and HemiGate. Initial access is suspected to rely on zero-day and N-day web application exploits. After breaching networks, the group conducts extensive reconnaissance, runs automated scans with the gogo tool, and moves laterally across the environment. The attack chains typically conclude with the deployment of NetDraft, CloudSorcerer version 3.0, and VShell. Notably, UAT-8302 employs a Rust-based variant called SNOWRUST to download and execute the VShell payload from a remote server. Beyond custom malware, the threat actor establishes redundant backdoor access using proxy and VPN solutions like Stowaway and SoftEther VPN. These findings highlight a clear pattern of tool-sharing and close operational relationships among multiple China-aligned groups. This behavior mirrors the Premier Pass-as-a-Service model described by Trend Micro, where initial access is passed between groups to accelerate exploitation and reduce exposure risks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"threat-actor-overview\"\u003eThreat Actor Overview\u003c/h3\u003e\n\n\u003cp\u003eCisco Talos has attributed a series of advanced cyber operations to a China-nexus APT group designated UAT-8302. The group has been actively targeting government entities in South America since late 2024 and has expanded its campaign to include government agencies in southeastern Europe throughout 2025. Researchers Jungsoo An, Asheer Malhotra, and Brandon White documented these activities in a technical report highlighting the group\u0026rsquo;s reliance on shared malicious infrastructure.\u003c/p\u003e\n\n\u003ch3 id=\"malware-ecosystem-and-tool-sharing\"\u003eMalware Ecosystem and Tool Sharing\u003c/h3\u003e\n\n\u003cp\u003eUAT-8302 extensively utilizes custom malware families that overlap significantly with other China-aligned threat clusters. The primary backdoor deployed is NetDraft, also known as NosyDoor. This .NET-based tool is a C# variant of FINALDRAFT and has been previously associated with threat groups including Ink Dragon, CL-STA-0049, Earth Alux, Jewelbug, and REF7707.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eESET tracks the deployment of this backdoor under the moniker LongNosedGoblin.\u003c/li\u003e\n\u003cli\u003eRussian cybersecurity firm Solar links the same malware to the Erudite Mogwai group, which has targeted Russian IT organizations under the name LuckyStrike Agent.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAdditional tools leveraged by UAT-8302 include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCloudSorcerer:\u003c/strong\u003e A backdoor observed targeting Russian entities since May 2024.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSNOWLIGHT:\u003c/strong\u003e A VShell stager utilized by other Chinese groups such as UNC5174, UNC6586, and UAT-6382.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDeed RAT:\u003c/strong\u003e Also known as Snappybee, this remote access tool is a successor to ShadowPad.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eZingdoor:\u003c/strong\u003e A backdoor previously deployed by Earth Estries in late 2024.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDraculoader:\u003c/strong\u003e A generic shellcode loader used to deliver the Crowdoor and HemiGate backdoors.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"tactics-techniques-and-procedures\"\u003eTactics, Techniques, and Procedures\u003c/h3\u003e\n\n\u003cp\u003eThe initial access phase is suspected to involve the exploitation of zero-day and N-day vulnerabilities within web applications. Once a foothold is established, the attackers conduct extensive network reconnaissance and run automated scanning routines using the open-source gogo tool. They then execute lateral movement across the compromised environment before deploying their primary malicious artifacts.\nThe attack chains typically culminate in the installation of NetDraft, CloudSorcerer version 3.0, and VShell. To facilitate payload delivery, the group employs SNOWRUST, a Rust-based variant of SNOWLIGHT, to download and execute the VShell payload from a remote server. Beyond traditional malware, the threat actor establishes persistent access channels using proxy and VPN tools, specifically Stowaway and SoftEther VPN.\u003c/p\u003e\n\n\u003ch3 id=\"industry-context-and-operational-models\"\u003eIndustry Context and Operational Models\u003c/h3\u003e\n\n\u003cp\u003eThe widespread reuse of these technical artifacts indicates a close operating relationship between UAT-8302 and other publicly disclosed threat clusters. This pattern of tool-sharing aligns with the Premier Pass-as-a-Service phenomenon highlighted by Trend Micro in October 2025. Under this model, initial access obtained by groups like Earth Estries is passed to secondary actors such as Earth Naga for follow-on exploitation.\nThis service reduces the time required for reconnaissance, initial exploitation, and lateral movement. Although the full scale of this operational model remains unclear, researchers assess that the high risk of exposure likely restricts its use to a small, tightly-knit circle of threat actors. The findings from UAT-8302 underscore a broader industry trend of advanced collaboration tactics among China-nexus hacking groups.\u003c/p\u003e\n","keyPoints":["Cisco Talos tracks a China-nexus APT group designated UAT-8302 that has targeted government agencies in South America and southeastern Europe since late 2024.","The group utilizes custom malware families including NetDraft, CloudSorcerer, SNOWLIGHT, and Draculoader that are also deployed by other China-aligned threat clusters.","Initial network access is suspected to involve zero-day and N-day web application exploits, followed by extensive reconnaissance and lateral movement.","Attackers establish alternative backdoor access using proxy and VPN tools like Stowaway and SoftEther VPN.","The shared use of malicious artifacts highlights a close operating relationship and tool-sharing model among multiple China-aligned hacking groups."],"insights":["UAT-8302 employs a Rust-based variant of SNOWLIGHT called SNOWRUST to download and execute the VShell payload, indicating a technical shift toward compiled languages for payload delivery.","The group establishes redundant persistent access channels using proxy and VPN tools like Stowaway and SoftEther VPN, bypassing traditional credential-based persistence mechanisms.","Extensive overlap in malware families across multiple China-aligned clusters points to a shared operational model, corroborating the emerging \"Premier Pass-as-a-Service\" framework where tools and initial access are reused across threat actors.","UAT-8302 automates initial network reconnaissance using the open-source gogo scanning tool before lateral movement, streamlining the early compromise phase against government targets."],"referencedReports":[{"title":"Cisco Talos Technical Report on UAT-8302","url":"https://blog.talosintelligence.com/uat-8302/","publisher":"Cisco Talos","context":"The article references this report as the source tracking the China-nexus APT group UAT-8302 targeting government entities."},{"title":"Solar Blog Analysis on LuckyStrike Agent","url":"https://rt-solar.ru/solar-4rays/blog/5603/","publisher":"Solar","context":"The article cites this Russian cybersecurity company's analysis as the source that named the malware deployed by Erudite Mogwai the LuckyStrike Agent."},{"title":"Nviso Analysis of VShell Post-Exploitation Tool","url":"https://www.nviso.eu/blog/nviso-analyzes-vshell-post-exploitation-tool","publisher":"Nviso","context":"The article links to this technical analysis to provide background on VShell, which is used as a stager by the SNOWLIGHT malware."},{"title":"Trend Micro Research on Draculoader and Premier Pass-as-a-Service","url":"https://www.trendmicro.com/en_us/research/25/j/premier-pass-as-a-service.html","publisher":"Trend Micro","context":"The article references this research report to detail Draculoader, a shellcode loader used to deliver other backdoors, and to explain the Premier Pass-as-a-Service operational model."}],"body":"\u003cp\u003eCisco Talos has attributed a series of attacks against government agencies in South America and southeastern Europe to a China-linked APT group designated UAT-8302. The group has been active since late 2024 and relies heavily on custom malware families that are also utilized by other China-aligned threat clusters. Notable tools include the NetDraft backdoor, the CloudSorcerer backdoor, the SNOWLIGHT stager, and the Draculoader shellcode loader. Initial network access is suspected to involve zero-day and N-day web application exploits, followed by extensive reconnaissance and automated scanning using the open-source gogo tool. Once inside the network, attackers conduct lateral movement and deploy multiple persistent access mechanisms, including proxy and VPN tools like Stowaway and SoftEther VPN. The widespread reuse of these malicious artifacts across different threat groups underscores a growing trend of operational collaboration and tool-sharing among China-nexus actors. This shared infrastructure aligns with industry observations of a Premier Pass-as-a-Service framework that streamlines the initial compromise phase for a restricted circle of hackers.\u003c/p\u003e\n"},{"n":1,"title":"Conti, Akira ransomware affiliate given 8-year sentence","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/conti-akira-ransomware-affiliate-sentenced","time":"17:33","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"A key ransomware negotiator for groups like Conti and Akira was sentenced to eight years in prison for orchestrating extortion campaigns that caused tens of millions in losses, underscoring the persistent threat of these highly active criminal networks.","briefOverview":"\u003cp\u003eDeniss Zolotarjovs, a 35-year-old Latvian citizen, was sentenced to 102 months in prison for money laundering and wire fraud related to his role as a ransomware negotiator. He pleaded guilty in July 2025 after being extradited from Georgia to the United States. Zolotarjovs operated for the Karakurt cybercriminal group, which utilized multiple brand names including Conti and Akira to extort victims.\u003c/p\u003e\n\n\u003cp\u003eHis primary responsibilities involved analyzing stolen data and employing aggressive tactics to pressure organizations into paying ransoms. The group extorted over 53 companies between June 2021 and March 2023, causing approximately $56 million in losses. Prosecutors highlighted a particularly egregious incident where Zolotarjovs threatened to distribute stolen pediatric health data to hundreds of patients after a healthcare provider refused to pay. He earned a 10% commission on each ransom payment and was tasked with training other negotiators within the organization. The Justice Department successfully argued for a lengthy sentence to remove a highly skilled operator from the threat landscape.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDeniss Zolotarjovs was sentenced to 102 months in prison after pleading guilty to money laundering and wire fraud charges. The 35-year-old Latvian national was arrested in Georgia and extradited to the United States in August 2024. He served as a key negotiator for the Karakurt ransomware group, which operated out of a St. Petersburg office and included former Russian law enforcement personnel.\u003c/p\u003e\n\n\u003cp\u003eThe organization leveraged its staff\u0026rsquo;s backgrounds to secure recruitment advantages and exemptions from military service and taxes. Between June 2021 and March 2023, the group extorted more than 53 companies, generating roughly \u003cspan class=\"math inline\"\u003e\\(3 million in ransom payments and causing an estimated \\)\u003c/span\u003e56 million in total losses. Zolotarjovs was specifically responsible for analyzing compromised data, researching victim organizations, and applying hardball tactics during negotiations.\u003c/p\u003e\n\n\u003cp\u003eHe typically received a 10% cut of the ransom and was brought in to finalize deals. Prosecutors detailed a severe incident involving a pediatric healthcare company, where Zolotarjovs threatened to leak or sell children’s medical records and actually sent data samples to hundreds of patients. He also trained a co-conspirator who later became the group’s lead negotiator.\u003c/p\u003e\n\n\u003cp\u003eThe Justice Department requested a 126-month sentence, arguing that prolonged incarceration would deprive the public of a skilled operator and allow defensive technologies to evolve. The judge ultimately imposed the 102-month term. Officials noted that the group remains highly active, with Akira ranking as the second most observed malware family in 2025.\u003c/p\u003e\n\n\u003cp\u003eResearchers have linked over 100 attacks this year to the operation, which also successfully forced a government entity’s 911 system offline. Zolotarjovs stands as the only member of his network to face a U.S. court proceeding.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"case-overview-legal-outcome\"\u003eCase Overview \u0026amp; Legal Outcome\u003c/h3\u003e\n\n\u003cp\u003eDeniss Zolotarjovs, a 35-year-old Latvian citizen born in Moscow, was sentenced to 102 months in prison. He pleaded guilty in July 2025 to money laundering and wire fraud charges. The defendant was initially arrested in Georgia before being extradited to the United States in August 2024. Prosecutors charged him with acting as a key ransomware operator who specialized in escalating pressure tactics during victim negotiations. The Justice Department initially argued for a 126-month sentence, emphasizing that removing a trusted and skilled negotiator would benefit the public. The judge ultimately approved the 102-month term. Assistant Attorney General A. Tysen Duva characterized the defendant as a cruel and ruthless international cybercriminal.\u003c/p\u003e\n\n\u003ch3 id=\"criminal-organization-operational-structure\"\u003eCriminal Organization \u0026amp; Operational Structure\u003c/h3\u003e\n\n\u003cp\u003eZolotarjovs worked for a cybercriminal group identified by investigators as Karakurt. The organization operated out of a dedicated office building in St. Petersburg. Its membership included multiple former Russian law enforcement officers. This composition provided the group with distinct advantages, including streamlined recruitment and exemptions from compulsory military service and taxes. The group utilized a rotating list of brand names for extortions, including Conti, Karakurt, Royal, TommyLeaks, SchoolBoys, and Akira. The FBI successfully accessed a chat server used by the organization to coordinate attacks and distribute profits. Zolotarjovs participated in the conspiracy from approximately June 2021 through March 2023. He remains the only member of his network to face a U.S. court proceeding.\u003c/p\u003e\n\n\u003ch3 id=\"modus-operandi-financial-impact\"\u003eModus Operandi \u0026amp; Financial Impact\u003c/h3\u003e\n\n\u003cp\u003eThe defendant’s primary responsibilities involved analyzing stolen data and researching victim companies. He used this intelligence to apply hardball tactics and force payments. Zolotarjovs was typically deployed to close negotiations and received a 10% commission on each ransom. Prosecutors documented that the organization extorted over 53 companies during his tenure. The attacks resulted in the following financial metrics:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApproximately $3 million in direct ransom payments.\u003c/li\u003e\n\u003cli\u003eTotal estimated financial losses of $56 million.\u003c/li\u003e\n\u003cli\u003eA likely severe undercount of actual financial impact.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe defendant’s English proficiency and Western European background made him a valuable asset for reviving stalled negotiations. He also trained a co-conspirator who eventually assumed the role of lead negotiator.\u003c/p\u003e\n\n\u003ch3 id=\"notable-incidents-tactics\"\u003eNotable Incidents \u0026amp; Tactics\u003c/h3\u003e\n\n\u003cp\u003eInvestigators highlighted a particularly aggressive campaign targeting a pediatric healthcare company. When the organization refused to pay the ransom, Zolotarjovs became enraged and escalated his threats. He ordered group members to leak or sell copies of the stolen children’s health information. The situation intensified when he sent samples of the compromised pediatric data to hundreds of patients as a direct threat. The group also successfully targeted a government entity, forcing its 911 emergency system offline. These actions demonstrated the group’s willingness to deploy extreme pressure tactics to maximize extortion revenue.\u003c/p\u003e\n\n\u003ch3 id=\"ongoing-threat-landscape\"\u003eOngoing Threat Landscape\u003c/h3\u003e\n\n\u003cp\u003eDespite Zolotarjovs’s incarceration, prosecutors warned that his former associates remain highly active and prolific. Incident responders from Google identified Akira as the second most frequently observed malware family in 2025. Independent researchers have linked more than 100 attacks this year directly to the operation. The Justice Department emphasized that the criminal network has grown more dangerous, potentially becoming one of the most active ransomware groups globally. The prolonged sentence aims to degrade the network\u0026rsquo;s capabilities while defensive technologies advance past the defendant\u0026rsquo;s specific expertise.\u003c/p\u003e\n","keyPoints":["Deniss Zolotarjovs was sentenced to 102 months in prison for money laundering and wire fraud charges stemming from his role as a ransomware negotiator.","He worked for the Karakurt cybercriminal group, which used names like Conti and Akira to extort over 53 companies and cause approximately $56 million in losses.","Zolotarjovs specialized in analyzing stolen data and employing aggressive tactics to pressure victims into paying ransoms, earning a 10% commission on each payment.","Prosecutors noted that the group remains highly active, with Akira identified as the second most frequently observed malware family in 2025 and linked to over 100 attacks this year."],"insights":["The group maintained a physical office in St. Petersburg staffed by former Russian law enforcement officers, granting them recruitment advantages and exemptions from military service and taxes.","The organization employed a multi-brand extortion strategy by rotating names such as Conti, Akira, and Royal across campaigns, complicating attribution and threat intelligence tracking.","Negotiations were handled by specialized closers who were compensated via a 10% commission model, indicating a highly structured, profit-sharing operational framework rather than a monolithic criminal group."],"referencedReports":[{"title":"M-Trends","url":"https://cloud.google.com/security/resources/m-trends","publisher":"Google Cloud","context":"Cited as the source for Google incident responders' analysis identifying Akira as the second most frequently observed malware family in 2025."},{"title":"Mar 2026 Review of Q1 Cyber Threat Intelligence Report","url":"https://insights.nccgroup.com/l/898251/2026-04-28/31n6mdt/898251/1777381752ayl7Zqps/Mar_2026_Review_of_Q1___Cyber_Threat_Intelligence_Report_FREEMIUM.pdf","publisher":"NCC Group","context":"Referenced by researchers to document over 100 attacks this year attributed to the ransomware operation."}],"body":"\u003cp\u003eDeniss Zolotarjovs, a 35-year-old Latvian citizen, was sentenced to 102 months in prison for money laundering and wire fraud related to his role as a ransomware negotiator. He pleaded guilty in July 2025 after being extradited from Georgia to the United States. Zolotarjovs operated for the Karakurt cybercriminal group, which utilized multiple brand names including Conti and Akira to extort victims.\u003c/p\u003e\n\n\u003cp\u003eHis primary responsibilities involved analyzing stolen data and employing aggressive tactics to pressure organizations into paying ransoms. The group extorted over 53 companies between June 2021 and March 2023, causing approximately $56 million in losses. Prosecutors highlighted a particularly egregious incident where Zolotarjovs threatened to distribute stolen pediatric health data to hundreds of patients after a healthcare provider refused to pay. He earned a 10% commission on each ransom payment and was tasked with training other negotiators within the organization. The Justice Department successfully argued for a lengthy sentence to remove a highly skilled operator from the threat landscape.\u003c/p\u003e\n"},{"n":3,"title":"The EOL Blind Spot in Your CVE Feed: What SCA Tools Don't Check.","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/the-eol-blind-spot-in-your-cve-feed-what-sca-tools-dont-check/","time":"14:00","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"Standard vulnerability scanners miss exploits in abandoned open-source software because CVEs only cover actively supported versions, leaving organizations exposed to unpatched risks. Closing this blind spot requires dedicated EOL scanning tools to detect and remediate legacy dependencies.","briefOverview":"\u003cp\u003eStandard vulnerability scanners and CVE feeds only investigate actively supported software versions, leaving abandoned packages completely unmonitored.\u003c/p\u003e\n\n\u003cp\u003eThis creates a massive blind spot where exploitable vulnerabilities in end-of-life software go entirely unflagged. Research indicates that approximately 80% of CVEs disclosed on supported versions also affect abandoned versions that were never officially investigated.\u003c/p\u003e\n\n\u003cp\u003eThe industry currently tracks only around 7,000 abandoned package versions, while the actual number across major registries exceeds 5.4 million. Transitive dependencies carry the majority of this hidden exposure, meaning organizations often run abandoned libraries without realizing it.\u003c/p\u003e\n\n\u003cp\u003eAs AI-assisted vulnerability research scales, it will increasingly discover exploits in legacy software that will never receive official patches. Security teams must stop treating scanner silence as safety and adopt dedicated EOL scanning tools to identify and remediate these unpatched risks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eWhen security teams evaluate end-of-life open source software, they typically focus only on the cessation of patches, but this overlooks two compounding problems.\u003c/p\u003e\n\n\u003cp\u003eThe first issue is that the CVE ecosystem deliberately avoids investigating unsupported versions due to overwhelming scale and limited bandwidth. Maintainers prioritize actively supported releases, resulting in millions of false negatives where EOL versions fall outside official affected ranges. The second issue is that public tracking sources only account for roughly 7,000 abandoned versions across about 350 projects.\u003c/p\u003e\n\n\u003cp\u003eIn reality, analysis of 12 million package versions reveals that 5.4 million are end-of-life, with npm alone having roughly 25% of its versions abandoned. Transitive dependencies account for the majority of this exposure, meaning 5 to 15 percent of enterprise dependency graphs contain unmonitored legacy code. HeroDevs has confirmed over 81,000 EOL versions with known CVEs and no available fix path, estimating the true figure exceeds 400,000.\u003c/p\u003e\n\n\u003cp\u003eFurthermore, approximately 80 percent of CVEs disclosed on supported versions also impact EOL versions that lack official investigation. The situation is accelerating as the open source ecosystem scales faster than its security monitoring infrastructure. AI-driven vulnerability research will soon surface exploits in abandoned software that will never receive upstream patches.\u003c/p\u003e\n\n\u003cp\u003eSecurity teams must recognize that EOL dates mark the moment risk transfers to the operator. Organizations should immediately implement dedicated EOL scanning solutions to map their true exposure and stop relying on standard scanner alerts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eThis article highlights a critical vulnerability in how security teams monitor open source dependencies. Standard CVE feeds and SCA tools only investigate actively supported software, leaving end-of-life versions exposed to unpatched exploits. The analysis reveals that the industry\u0026rsquo;s tracking mechanisms are fundamentally inadequate for the scale of abandoned software in modern supply chains.\u003c/p\u003e\n\n\u003ch3 id=\"the-cve-investigation-gap\"\u003eThe CVE Investigation Gap\u003c/h3\u003e\n\n\u003cp\u003eThe first major problem stems from how CVEs are filed and consumed. Maintainers determine affected versions based on their active support windows and file advisories accordingly. Every vulnerability scanner and SBOM tool consumes these defined ranges, meaning any version outside the range receives no alert.\u003c/p\u003e\n\n\u003cp\u003eEOL versions fall outside these ranges by default because investigative bandwidth is strictly limited. Global CVE counts have doubled in five years, and unscored CVEs increased 37 times. Maintainers cannot reasonably investigate older release lines, leading to massive blind spots. Sonatype\u0026rsquo;s 2026 report identified 167,286 false negatives in 2025 alone, directly driven by EOL versions being omitted from advisories.\u003c/p\u003e\n\n\u003ch3 id=\"the-scale-of-untracked-abandonment\"\u003eThe Scale of Untracked Abandonment\u003c/h3\u003e\n\n\u003cp\u003eThe second problem is that the industry tracks a tiny fraction of actually abandoned software. Public sources like endoflife.date monitor roughly 350 projects and identify only 7,000 EOL versions. However, comprehensive analysis of 12 million package versions across npm, PyPI, Maven, NuGet, and other registries shows that 5.4 million versions are end-of-life.\u003c/p\u003e\n\n\u003cp\u003eThe breakdown reveals that 25% of npm versions, 18% of NuGet versions, 13% of Cargo versions, 11% of PyPI versions, and 10% of Maven Central versions are abandoned. These versions actively appear in enterprise SBOMs but lack CVE investigation coverage. Transitive dependencies carry the majority of this hidden exposure, with 5 to 15 percent of enterprise dependency graphs containing EOL components. HeroDevs has confirmed over 81,000 EOL versions with known CVEs and no fix path, estimating the actual number exceeds 400,000.\u003c/p\u003e\n\n\u003ch3 id=\"compounding-risks-and-ai-driven-exposure\"\u003eCompounding Risks and AI-Driven Exposure\u003c/h3\u003e\n\n\u003cp\u003eThis dynamic is accelerating due to ecosystem scaling and emerging AI capabilities. The open source ecosystem is growing faster than its security monitoring infrastructure. npm alone recorded over 838,000 releases with critical CVSS 9.0+ scores in 2025, while PyPI downloads grew over 50 percent year over year.\u003c/p\u003e\n\n\u003cp\u003eEvery new version eventually becomes an EOL version, yet investigative capacity remains static. AI-assisted vulnerability research, such as Anthropic\u0026rsquo;s Project Glasswing, will increasingly identify exploits across the entire codebase landscape. For supported software, AI accelerates defense by routing findings to engineers. For EOL software, AI will surface vulnerabilities in versions that no maintainer watches.\u003c/p\u003e\n\n\u003cp\u003eThese findings will not trigger scanner alerts, and no upstream patches will ever address them. The same capability that strengthens defense for active software permanently widens the exposure gap for abandoned packages.\u003c/p\u003e\n\n\u003ch3 id=\"actionable-recommendations\"\u003eActionable Recommendations\u003c/h3\u003e\n\n\u003cp\u003eSecurity teams must fundamentally shift their approach to legacy dependencies. Organizations should start with immediate visibility by using dedicated EOL scanning tools to map their entire stack. These tools can identify both announced and abandoned packages across all major registries in minutes.\u003c/p\u003e\n\n\u003cp\u003eTeams must stop treating scanner silence as safety, as a clean scan against an EOL package simply means it was never checked. The Spring Security CVE-2026-22732 example proves that EOL users remain exposed without warning until third parties investigate and report. EOL dates are not finish lines; they are the exact moment risk transfers from the maintainer to the operator.\u003c/p\u003e\n\n\u003cp\u003eAs AI research scales, the number of undisclosed vulnerabilities in uninvestigated EOL packages will only grow. Immediate adoption of comprehensive EOL monitoring is required to close this critical supply chain blind spot.\u003c/p\u003e\n","keyPoints":["Standard CVE feeds and vulnerability scanners only investigate actively supported software versions, leaving abandoned versions unmonitored and unalerted.","HeroDevs confirmed that approximately 80% of CVEs disclosed on supported versions also affect EOL versions that were never officially investigated.","Public EOL tracking sources only account for roughly 7,000 abandoned versions, while actual EOL versions across major package registries total approximately 5.4 million.","AI-assisted vulnerability research will increasingly discover exploits in EOL software that lack official patches, significantly widening the security exposure gap."],"insights":["A clean vulnerability scan result for an EOL package actually indicates the software was never investigated, not that it is secure.","Public EOL tracking databases cover less than 0.14% of the total abandoned packages across major registries, leaving the vast majority of legacy exposure invisible to standard security tools.","AI-assisted vulnerability research will increasingly discover exploits in abandoned software that will never receive official patches, permanently transferring the mitigation burden to the operator.","Transitive dependencies account for the majority of hidden EOL exposure, meaning organizations likely run abandoned libraries even when their direct dependencies appear fully supported."],"referencedReports":[{"title":"Sonatype's 2026 State of the Software Supply Chain report","url":"https://www.sonatype.com/state-of-the-software-supply-chain/2026/vulnerability-management","publisher":"Sonatype","context":"The article cites this report for data regarding the doubling of global CVE counts over five years and the 37x increase in unscored CVEs."}],"body":"\u003cp\u003eStandard vulnerability scanners and CVE feeds only investigate actively supported software versions, leaving abandoned packages completely unmonitored.\u003c/p\u003e\n\n\u003cp\u003eThis creates a massive blind spot where exploitable vulnerabilities in end-of-life software go entirely unflagged. Research indicates that approximately 80% of CVEs disclosed on supported versions also affect abandoned versions that were never officially investigated.\u003c/p\u003e\n\n\u003cp\u003eThe industry currently tracks only around 7,000 abandoned package versions, while the actual number across major registries exceeds 5.4 million. Transitive dependencies carry the majority of this hidden exposure, meaning organizations often run abandoned libraries without realizing it.\u003c/p\u003e\n\n\u003cp\u003eAs AI-assisted vulnerability research scales, it will increasingly discover exploits in legacy software that will never receive official patches. Security teams must stop treating scanner silence as safety and adopt dedicated EOL scanning tools to identify and remediate these unpatched risks.\u003c/p\u003e\n"},{"n":4,"title":"Student hacked Taiwan high-speed rail to trigger emergency brakes","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/student-hacked-taiwan-high-speed-rail-to-trigger-emergency-brakes/","time":"17:34","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"A student exploited static, unrotated TETRA radio parameters using software-defined radio equipment to spoof emergency signals and halt high-speed trains, exposing critical vulnerabilities in aging infrastructure security.","briefOverview":"\u003cp\u003eA 23-year-old student in Taiwan successfully disrupted high-speed rail operations by hacking the TETRA communication system. Using software-defined radio equipment and handheld transceivers, he intercepted and decoded unrotated network parameters to spoof emergency signals. This attack triggered emergency braking procedures across four trains, causing a 48-minute halt on April 5. An accomplice provided critical network parameters that enabled the unauthorized cloning of legitimate radio beacons. The TETRA system had operated with static parameters for 19 years, allowing the attacker to bypass seven distinct verification layers. Following the incident, railway logs identified the unassigned beacon, prompting a police investigation that led to the suspect\u0026rsquo;s arrest. Authorities seized multiple radios, an SDR device, and a laptop from his residence. The student now faces up to 10 years in prison under Article 184 of the Criminal Law while out on bail.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA 23-year-old university student was arrested for interfering with Taiwan’s high-speed railway network by exploiting its legacy communication infrastructure. On April 5, the student used software-defined radio equipment to intercept and decode TETRA radio parameters, which had remained unchanged for 19 years. He programmed these parameters into handheld radios to impersonate legitimate network beacons and transmit a high-priority General Alarm signal. This spoofing triggered emergency braking procedures that halted four trains for 48 minutes. A 21-year-old accomplice assisted by providing critical THSR parameters that facilitated the attack. The TETRA system, which serves 81.8 million annual riders along a 350-kilometer coastal line, had not rotated its authentication parameters since its deployment. Because the parameters were static, the attacker successfully bypassed seven verification layers without detection. THSR security logs eventually identified the signal originating from an unassigned radio beacon. After confirming the physical device was not missing, investigators concluded the signal resulted from unauthorized cloning and alerted law enforcement. Police combined CCTV footage with network logs to locate the suspect’s residence, where they seized 11 handheld radios, an SDR device, and a laptop. The student was arrested on April 28 and is currently out on NT$100,000 bail. He faces charges under Article 184 of the Criminal Law, which carries a maximum sentence of 10 years imprisonment. While his lawyer claimed the emergency signal transmission was accidental, authorities consider this explanation unconvincing. The incident has drawn criticism from Taiwanese politicians regarding the negligence of responsible oversight bodies.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncident Overview\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eA 23-year-old university student was arrested for halting four high-speed trains on April 5. The suspect, referred to by his surname Lin, used software-defined radio equipment to transmit a high-priority General Alarm signal. This action triggered emergency braking procedures that delayed trains for 48 minutes. The Taiwan high-speed railway network serves 81.8 million passengers annually along a 350-kilometer coastal route. Trains on this state-funded line can reach speeds of up to 300 kilometers per hour.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTechnical Execution and Vulnerabilities\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe attack targeted the TETRA communication system, which had been in operation for 19 years without parameter rotation. Lin intercepted and decoded the radio parameters using software-defined radio equipment purchased online. He then programmed these parameters into handheld radios to impersonate legitimate network beacons. A 21-year-old accomplice provided critical THSR parameters that enabled the unauthorized cloning process. Because the authentication parameters remained static, the attacker successfully bypassed seven verification layers. The system failed to detect the spoofed signal until THSR logs flagged a transmission from an unassigned beacon.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eInvestigation and Seizure\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eTHSR investigators initially checked the network logs and noted the signal originated from an unassigned radio beacon. After confirming the physical device was not missing, they concluded the scenario pointed to unauthorized cloning. Police were immediately alerted and combined CCTV footage with TETRA network logs to trace the source. This investigation led officers to the suspect’s residence, where they seized the following equipment:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e11 handheld radios\u003c/li\u003e\n\u003cli\u003eAn SDR device\u003c/li\u003e\n\u003cli\u003eA laptop\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eLin was formally arrested on April 28 following the equipment seizure.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eLegal and Political Fallout\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe suspect is currently out on NT$100,000 bail while facing charges under Article 184 of the Criminal Law. This statute carries a maximum penalty of 10 years of imprisonment. His legal counsel claimed the transmission of the emergency signal on April 5 was accidental. Authorities have dismissed this claim as unconvincing. The incident has sparked criticism from Taiwanese politicians, who have publicly blamed responsible oversight bodies for systemic negligence.\u003c/p\u003e\n","keyPoints":["A 23-year-old student used software-defined radio equipment to intercept and decode unrotated TETRA parameters, allowing him to spoof emergency signals and halt four high-speed trains.","The student's accomplice provided critical railway network parameters that enabled the unauthorized cloning of legitimate radio beacons.","The TETRA system had not rotated its parameters in 19 years, which allowed the attacker to bypass seven verification layers.","Police seized the suspect's equipment and arrested him under Article 184 of the Criminal Law, which carries a penalty of up to 10 years in prison."],"insig function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);

    el.style.transform = "translateY(8px) scale(0.96)";

    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";

    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";

        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
