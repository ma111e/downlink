window.__DL_ARTICLES = [{"n":2,"title":"Mandiant reveals how Cisco SD-WAN zero-day attacks gained root access","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/mandiant-reveals-how-cisco-sd-wan-zero-day-attacks-gained-root-access/","time":"21:29","priority":"MUST READ","score":93,"tldr":"Mandiant says attackers exploited Cisco Catalyst SD-WAN zero-day CVE-2026-20245 after gaining device access, using a crafted tenant-upload CSV to create a rogue root account and take full control. The attackers also used anti-forensic cleanup and may have relied on rogue peering or previously stolen certificates, so organizations should patch and check SD-WAN devices for unauthorized peering and compromise indicators.","briefOverview":"\u003cp\u003eMandiant revealed new details on how hackers exploited Cisco Catalyst SD-WAN vulnerability CVE-2026-20245 in zero-day attacks to create rogue root accounts on targeted devices. The flaw affects Cisco Catalyst SD-WAN Manager, Controller, and Validator and allows authenticated attackers with local access to execute arbitrary commands as root by uploading a crafted file. Cisco had previously warned that the vulnerability was exploited in a limited number of attacks and released security updates, stating that no workarounds were available.\u003c/p\u003e\n\n\u003cp\u003eAccording to Mandiant, the intrusion began with unauthorized SD-WAN peering connections observed on a service provider\u0026rsquo;s infrastructure. Beginning in March 2026, the threat actor established rogue peer connections and authenticated to affected SD-WAN Manager devices using the \u003ccode\u003evmanage-admin\u003c/code\u003e account. The attackers changed the default admin account password, logged in to the SD-WAN Manager web interface, extracted configuration information, and later restored the original password, likely to reduce detection.\u003c/p\u003e\n\n\u003cp\u003eMandiant said the attackers exploited CVE-2026-20245 through a tenant-upload feature in the SD-WAN command-line interface by uploading a malicious CSV file named \u003ccode\u003eevil_tenant.csv\u003c/code\u003e. The payload backed up system configuration files such as \u003ccode\u003e/etc/passwd\u003c/code\u003e and \u003ccode\u003e/etc/shadow\u003c/code\u003e before creating a new root-level account named \u003ccode\u003etroot\u003c/code\u003e, which the attackers used to gain full control of the device. The attackers also deleted the malicious file, removed temporary files, erased evidence of the rogue root account, and ran a validation script to confirm traces of compromise had been removed.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Mandiant reported that hackers exploited Cisco Catalyst SD-WAN vulnerability CVE-2026-20245 in zero-day attacks to create rogue root accounts on targeted devices.","CVE-2026-20245 is a high-severity command injection flaw in Cisco Catalyst SD-WAN Manager, Controller, and Validator that allows authenticated attackers with local access to execute arbitrary commands as root by uploading a crafted file.","Mandiant said the attackers used a tenant-upload feature in the SD-WAN command-line interface to upload a malicious CSV file named \"evil_tenant.csv\" that created a new root-level account named \"troot.\"","The attackers changed the default admin account password, extracted configuration information for edge devices, controllers, and SD-WAN templates, and later restored the original password to reduce detection.","Mandiant observed anti-forensic activity including restoring modified configuration files, deleting the malicious CSV payload and temporary files, erasing evidence of the rogue root account, and running a validation script to confirm cleanup."],"insights":["CVE-2026-20245 was used after the attackers had already gained access to SD-WAN devices, so patching this flaw alone may not address the initial access path in affected environments.","The attackers restored the default admin password after using it, making password state alone an unreliable indicator of whether the account had been abused.","Mandiant observed rogue peering activity on systems that were not vulnerable to previously disclosed authentication-bypass flaws, and Cisco said stolen certificates from a prior compromise may have been used to regain access.","The attackers ran a validation script to confirm that compromise traces had been removed, so organizations may need to rely on diagnostic data, unauthorized peering checks, and published indicators rather than obvious on-device artifacts."],"referencedReports":[{"title":"Zero-Day Exploitation of Cisco Catalyst SD-WAN Manager","url":"https://cloud.google.com/blog/topics/threat-intelligence/zero-day-exploitation-cisco-catalyst-sd-wan-manager","publisher":"Mandiant","context":"The article says Mandiant published a report revealing how CVE-2026-20245 was exploited as a privilege-escalation vulnerability after attackers had already gained access to targeted SD-WAN devices.","category":"","primary":false},{"title":"Cisco Catalyst SD-WAN Privilege Escalation Vulnerability","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-sdwan-privesc-4uxFrdzx","publisher":"Cisco","context":"The article links to Cisco’s security advisory for CVE-2026-20245 and summarizes Cisco’s description of the flaw, impact, and available software updates.","category":"","primary":false}],"body":"\u003cp\u003eMandiant revealed new details on how hackers exploited Cisco Catalyst SD-WAN vulnerability CVE-2026-20245 in zero-day attacks to create rogue root accounts on targeted devices. The flaw affects Cisco Catalyst SD-WAN Manager, Controller, and Validator and allows authenticated attackers with local access to execute arbitrary commands as root by uploading a crafted file. Cisco had previously warned that the vulnerability was exploited in a limited number of attacks and released security updates, stating that no workarounds were available.\u003c/p\u003e\n\n\u003cp\u003eAccording to Mandiant, the intrusion began with unauthorized SD-WAN peering connections observed on a service provider\u0026rsquo;s infrastructure. Beginning in March 2026, the threat actor established rogue peer connections and authenticated to affected SD-WAN Manager devices using the \u003ccode\u003evmanage-admin\u003c/code\u003e account. The attackers changed the default admin account password, logged in to the SD-WAN Manager web interface, extracted configuration information, and later restored the original password, likely to reduce detection.\u003c/p\u003e\n\n\u003cp\u003eMandiant said the attackers exploited CVE-2026-20245 through a tenant-upload feature in the SD-WAN command-line interface by uploading a malicious CSV file named \u003ccode\u003eevil_tenant.csv\u003c/code\u003e. The payload backed up system configuration files such as \u003ccode\u003e/etc/passwd\u003c/code\u003e and \u003ccode\u003e/etc/shadow\u003c/code\u003e before creating a new root-level account named \u003ccode\u003etroot\u003c/code\u003e, which the attackers used to gain full control of the device. The attackers also deleted the malicious file, removed temporary files, erased evidence of the rogue root account, and ran a validation script to confirm traces of compromise had been removed.\u003c/p\u003e\n"},{"n":5,"title":"Compromised GitHub action codfish/semantic-release-action steals CI/CD secrets","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/compromised-github-action-codfish-steals-secrets","time":"21:06","priority":"MUST READ","score":93,"tldr":"The codfish/semantic-release-action GitHub Action was compromised after attackers force-pushed malicious commits and repointed multiple version tags, causing affected CI workflows to run obfuscated code that could steal release secrets such as GITHUB_TOKEN and NPM_TOKEN. Users should stop using the affected tags, check for the listed malicious commits and payload hash, and rotate any exposed credentials.","briefOverview":"\u003cp\u003eOn Jun 24, 2026, the \u003ccode\u003ecodfish/semantic-release-action\u003c/code\u003e GitHub Action was compromised through an imposter commit attack. An attacker force-pushed two malicious commits into the repository and repointed sixteen tags to them, including \u003ccode\u003ev2\u003c/code\u003e, \u003ccode\u003ev3\u003c/code\u003e, \u003ccode\u003ev4\u003c/code\u003e, and \u003ccode\u003ev5\u003c/code\u003e. Any workflow referencing one of those tags will pull and run the attacker’s code on its next CI run.\u003c/p\u003e\n\n\u003cp\u003eThe action has been a standard way to wire semantic-release into GitHub Actions since 2019 and has over 100 GitHub stars. Workflows using it for automated releases almost always hold a \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e and frequently an \u003ccode\u003eNPM_TOKEN\u003c/code\u003e with publish access. The article says this is exactly the kind of access an attacker wants to land inside.\u003c/p\u003e\n\n\u003cp\u003eThe malicious commits replaced \u003ccode\u003eaction.yml\u003c/code\u003e with a composite action that first called a clean pinned version of the real action, then installed Bun through \u003ccode\u003eoven-sh/setup-bun\u003c/code\u003e, and finally executed an obfuscated \u003ccode\u003eindex.js\u003c/code\u003e payload. The payload contained the string \u003ccode\u003ethebeautifulsnadsoftime\u003c/code\u003e, which the article links to the Miasma credential stealing toolkit and its GitHub public commit search dead drop mechanism. The article lists malicious commits, the \u003ccode\u003eindex.js\u003c/code\u003e SHA-256 hash, affected tags, and confirmed clean versions as indicators of compromise.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["On Jun 24, 2026, the codfish/semantic-release-action GitHub Action was compromised when an attacker force-pushed two malicious commits and repointed sixteen tags, including v2, v3, v4, and v5.","Any workflow referencing the affected tags will pull and run the attacker’s code on its next CI run, and these workflows often contain GITHUB_TOKEN and sometimes NPM_TOKEN credentials with publish access.","The malicious commits changed action.yml from a Docker-based action into a composite action that first ran a clean pinned version of the original action and then installed Bun and executed an obfuscated index.js payload.","The injected index.js payload was 781,580 bytes, had SHA-256 hash 9f93d77d32833a515bc406c46da477142bb1ac2babeecb6aa42f98669a6db015, and contained the dead drop marker string thebeautifulsnadsoftime.","The article links the payload to the Miasma credential stealing toolkit, which uses GitHub’s public commit search API to find marker strings and deliver commands through matching commits."],"insights":["The compromise was designed to preserve normal release behavior by first running a clean pinned version of the real action, making successful workflow runs potentially misleading.","The old Dockerfile and entrypoint files were left in the repository even though they were no longer used, which made a casual file listing less likely to reveal the switch to a composite action.","The attacker exploited the fact that GitHub tags are not protected by default and are resolved when a workflow runs, so previously written workflows could be changed retroactively without modifying the workflow files.","The use of GitHub’s public commit search API as a dead drop channel means the malware can receive commands without relying on traditional attacker-owned infrastructure.","The article identifies specific clean versions, showing that not all releases of codfish/semantic-release-action were affected and that version selection matters for remediation."],"referencedReports":[],"body":"\u003cp\u003eOn Jun 24, 2026, the \u003ccode\u003ecodfish/semantic-release-action\u003c/code\u003e GitHub Action was compromised through an imposter commit attack. An attacker force-pushed two malicious commits into the repository and repointed sixteen tags to them, including \u003ccode\u003ev2\u003c/code\u003e, \u003ccode\u003ev3\u003c/code\u003e, \u003ccode\u003ev4\u003c/code\u003e, and \u003ccode\u003ev5\u003c/code\u003e. Any workflow referencing one of those tags will pull and run the attacker’s code on its next CI run.\u003c/p\u003e\n\n\u003cp\u003eThe action has been a standard way to wire semantic-release into GitHub Actions since 2019 and has over 100 GitHub stars. Workflows using it for automated releases almost always hold a \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e and frequently an \u003ccode\u003eNPM_TOKEN\u003c/code\u003e with publish access. The article says this is exactly the kind of access an attacker wants to land inside.\u003c/p\u003e\n\n\u003cp\u003eThe malicious commits replaced \u003ccode\u003eaction.yml\u003c/code\u003e with a composite action that first called a clean pinned version of the real action, then installed Bun through \u003ccode\u003eoven-sh/setup-bun\u003c/code\u003e, and finally executed an obfuscated \u003ccode\u003eindex.js\u003c/code\u003e payload. The payload contained the string \u003ccode\u003ethebeautifulsnadsoftime\u003c/code\u003e, which the article links to the Miasma credential stealing toolkit and its GitHub public commit search dead drop mechanism. The article lists malicious commits, the \u003ccode\u003eindex.js\u003c/code\u003e SHA-256 hash, affected tags, and confirmed clean versions as indicators of compromise.\u003c/p\u003e\n"},{"n":1,"title":"Malicious Edge extension abuses Native Messaging as bridge to malware","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/malicious-edge-extension-abuses-native-messaging-as-bridge-to-malware/","time":"20:58","priority":"SHOULD READ","score":86,"tldr":"A malicious Microsoft Edge extension called Edgecution is being used in ransomware-linked attacks to abuse Chrome Native Messaging, escape the browser sandbox, and launch a Python backdoor on victim systems. The campaign starts with fake Microsoft update pages promoted through Teams impersonation, highlighting the need to tightly monitor browser extensions and native messaging host configurations.","briefOverview":"\u003cp\u003eA malicious Microsoft Edge extension dubbed Edgecution has been used in a ransomware attack to escape the browser sandbox and deploy a Python-based backdoor. Zscaler researchers believe Edgecution is deployed by an initial access broker connected to the Payouts Kings ransomware operation. The compromise begins with an attacker posing as IT support on Microsoft Teams and directing employees to a fraudulent page under the pretense of installing a spam filter update.\u003c/p\u003e\n\n\u003cp\u003eThe fake Microsoft “Outlook Updates Management Console” presented download buttons for update packs or software verification, but the buttons delivered malicious components, copied scripts to the clipboard, or requested Microsoft 365 and Outlook passwords. The malware components were fetched from the fake Microsoft update site in a ZIP archive with malformed headers to prevent security products from recognizing it as a valid archive. The archive contained an embedded Python version 3.13.3 and two directories named extension and native.\u003c/p\u003e\n\n\u003cp\u003eEdgecution runs in a headless Edge browser and uses Chrome Native Messaging to communicate with a local application. The malicious extension connects to the attacker’s command-and-control endpoint, while the Python-based backdoor can execute shell commands, run PowerShell, run arbitrary Python code, write files, enumerate running processes, and gather system information. Zscaler recommends that organizations strengthen monitoring of browser extensions and enforce strict controls over native messaging host configurations.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A malicious Microsoft Edge extension dubbed Edgecution has been used in a ransomware attack to escape the browser sandbox and deploy a Python-based backdoor.","The attack begins with an attacker posing as IT support personnel on Microsoft Teams and directing employees to a fraudulent page under the pretense of installing a spam filter update.","Zscaler researchers believe Edgecution is deployed by an initial access broker connected to the Payouts Kings ransomware operation.","The malware uses Chrome Native Messaging to let the Edge extension communicate with a local Python-based backdoor that can execute shell commands, run PowerShell, run Python code, write files, enumerate processes, and gather system information.","Zscaler recommends that organizations strengthen monitoring of browser extensions and enforce strict controls over native messaging host configurations."],"insights":["Edgecution’s use of Chrome Native Messaging shows that a browser extension can become a bridge to host-level execution when the required local native messaging manifest and helper application are created.","The attackers used a ZIP archive with malformed headers to make the downloaded malware package harder for security products to recognize as a valid archive.","The campaign offered multiple deployment paths through AutoHotKey, Windows batch scripts, and PowerShell scripts, giving the attacker several ways to install the same malware components.","The malicious extension runs in a headless Microsoft Edge browser, which makes its activity invisible to the user while it communicates with the attacker’s command-and-control endpoint.","Zscaler found unused commands in both malware components, indicating that the existing Edgecution components already contain dormant functionality that could be activated in future versions."],"referencedReports":[{"title":"Payouts King Ransomware Initial Access Broker Deploys New Edgecution","url":"https://www.zscaler.com/blogs/security-research/payouts-king-ransomware-initial-access-broker-deploys-new-edgecution","publisher":"Zscaler","context":"The article cites Zscaler’s technical analysis as the source for details on Edgecution’s deployment, components, capabilities, and indicators of compromise.","category":"","primary":false}],"body":"\u003cp\u003eA malicious Microsoft Edge extension dubbed Edgecution has been used in a ransomware attack to escape the browser sandbox and deploy a Python-based backdoor. Zscaler researchers believe Edgecution is deployed by an initial access broker connected to the Payouts Kings ransomware operation. The compromise begins with an attacker posing as IT support on Microsoft Teams and directing employees to a fraudulent page under the pretense of installing a spam filter update.\u003c/p\u003e\n\n\u003cp\u003eThe fake Microsoft “Outlook Updates Management Console” presented download buttons for update packs or software verification, but the buttons delivered malicious components, copied scripts to the clipboard, or requested Microsoft 365 and Outlook passwords. The malware components were fetched from the fake Microsoft update site in a ZIP archive with malformed headers to prevent security products from recognizing it as a valid archive. The archive contained an embedded Python version 3.13.3 and two directories named extension and native.\u003c/p\u003e\n\n\u003cp\u003eEdgecution runs in a headless Edge browser and uses Chrome Native Messaging to communicate with a local application. The malicious extension connects to the attacker’s command-and-control endpoint, while the Python-based backdoor can execute shell commands, run PowerShell, run arbitrary Python code, write files, enumerate running processes, and gather system information. Zscaler recommends that organizations strengthen monitoring of browser extensions and enforce strict controls over native messaging host configurations.\u003c/p\u003e\n"},{"n":4,"title":"Three ‘cybercrime as a service’ operations undercut by Microsoft, law enforcement","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/stealc-amadey-socgholish-malware-takedown-europol-microsoft","time":"20:00","priority":"SHOULD READ","score":85,"tldr":"Microsoft and international law enforcement disrupted cybercrime-as-a-service infrastructure for SocGholish, Amadey and StealC, seizing hundreds of servers/domains, recovering stolen credentials and identifying €41 million in criminal crypto assets. The operation targeted the malware supply chain used to enable ransomware, fraud and broader intrusions.","briefOverview":"\u003cp\u003eEuropol and Microsoft announced that an international operation over two weeks took over hundreds of domains and servers used by cybercriminals. Law enforcement dismantled 326 servers and 142 domains, reclaimed about 27 million stolen login credentials, and found crypto assets of criminal origin valued at €41 million ($47 million). The operation targeted cybercrime-as-a-service infrastructure used to distribute SocGholish, Amadey and StealC malware.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft described the action as an effort to disrupt the cybercrime “assembly line” rather than only individual services. The company said targeting multiple parts of an operation together makes attacks harder to launch, scale and recover from. Europol said SocGholish is tied to Evil Corp, a Russian cybercrime gang linked to large-scale money laundering and ransomware activities.\u003c/p\u003e\n\n\u003cp\u003eThe article says infostealers like StealC capture passwords, cookies and session tokens, while SocGholish and Amadey are typically used as droppers to allow access for other malicious code. Microsoft researchers used artificial intelligence to find that Amadey and StealC depend on the same infrastructure, and Microsoft said taking both down at once would have an exponential effect. Europol also found 14,971 infected websites belonging to everyday retailers that were infected by the SocGholish variant.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Europol and Microsoft announced that an international two-week operation dismantled 326 servers and 142 domains used by cybercrime-as-a-service operations.","The operation targeted infrastructure used to distribute the SocGholish, Amadey and StealC malware families, which other criminals paid to use for further crimes.","Investigators recovered about 27 million stolen login credentials and identified crypto assets of criminal origin valued at €41 million ($47 million).","Europol said SocGholish was found on 14,971 infected websites belonging to everyday retailers and is tied to the Russian cybercrime gang Evil Corp.","Microsoft said disrupting Amadey and StealC together should have an exponential effect because Amadey is mainly used to break in while StealC steals passwords and other sensitive data."],"insights":["Microsoft framed the operation as a shift from disrupting individual criminal tools to targeting the shared cybercrime supply chain that lets multiple crimes scale from the same infrastructure.","Microsoft researchers used artificial intelligence to identify that Amadey and StealC depended on the same infrastructure, which helped justify taking them down together rather than treating them as separate threats.","The article highlights that Amadey and StealC are especially dangerous in combination because one helps criminals break in while the other steals credentials and sensitive data from the same access.","SocGholish’s use of compromised everyday retail websites shows that ordinary commercial sites can become part of criminal delivery networks without being the final target of the crime."],"referencedReports":[{"title":"StealC and Amadey: Breaking down infostealers and the cybercrime services that deliver them","url":"https://www.microsoft.com/en-us/security/blog/2026/06/24/stealc-and-amadey-breaking-down-infostealers-and-the-cybercrime-services-that-deliver-them/","publisher":"Microsoft","context":"The article says Microsoft posted new research on Amadey and StealC alongside the disruption announcement.","category":"","primary":false}],"body":"\u003cp\u003eEuropol and Microsoft announced that an international operation over two weeks took over hundreds of domains and servers used by cybercriminals. Law enforcement dismantled 326 servers and 142 domains, reclaimed about 27 million stolen login credentials, and found crypto assets of criminal origin valued at €41 million ($47 million). The operation targeted cybercrime-as-a-service infrastructure used to distribute SocGholish, Amadey and StealC malware.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft described the action as an effort to disrupt the cybercrime “assembly line” rather than only individual services. The company said targeting multiple parts of an operation together makes attacks harder to launch, scale and recover from. Europol said SocGholish is tied to Evil Corp, a Russian cybercrime gang linked to large-scale money laundering and ransomware activities.\u003c/p\u003e\n\n\u003cp\u003eThe article says infostealers like StealC capture passwords, cookies and session tokens, while SocGholish and Amadey are typically used as droppers to allow access for other malicious code. Microsoft researchers used artificial intelligence to find that Amadey and StealC depend on the same infrastructure, and Microsoft said taking both down at once would have an exponential effect. Europol also found 14,971 infected websites belonging to everyday retailers that were infected by the SocGholish variant.\u003c/p\u003e\n"},{"n":6,"title":"Trust No One: Automating macOS Privilege Escalation at Scale","source":"xmcyber.com","sourceColorIdx":9,"link":"https://xmcyber.com/blog/faind-my-xpc-breaks-a-key-trust-boundary/","time":"19:01","priority":"SHOULD READ","score":85,"tldr":"Researchers describe a macOS privilege-escalation technique that lets a standard user impersonate trusted app components through CDHash cache and NIB payload abuse to call privileged XPC services, potentially disabling EDR and MDM tools without admin rights. Vendors should harden XPC client validation using active code-signing checks rather than relying on cached trust.","briefOverview":"\u003cp\u003eA novel macOS privilege escalation technique allows standard user accounts to silently disable leading enterprise security products, including EDR and MDM solutions, without administrator credentials, kernel exploits, or security alerts. The article says the technique exploits how trusted application components are identified, how trust relationships are inherited, and how privileged operations are authorized. It was validated against CrowdStrike Falcon Sensor and Kandji MDM Agent, with CrowdStrike adding detections and preventions and Kandji fixing the issue assigned CVE-2026-39118.\u003c/p\u003e\n\n\u003cp\u003eThe attack chains CDHash kernel cache exploitation with NIB payload injection to impersonate trusted application components. After a legitimate signed application binary is launched to populate the kernel cache, the application bundle can be manipulated so injected code runs in the context of the trusted component. From that position, the payload can communicate with privileged background daemons and invoke exposed XPC methods such as \u003ccode\u003erunProcessWithCommand:\u003c/code\u003e, \u003ccode\u003eterminateAppsAndAgents:\u003c/code\u003e, and \u003ccode\u003eceaseSystemExtensionWithReply:\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that relying only on passive CDHash validation in kernel caches is insufficient for securing privileged XPC service boundaries. It recommends that developers explicitly validate client identity inside listener protocol logic, including by using \u003ccode\u003expc_connection_set_peer_code_signing_requirement()\u003c/code\u003e or by revalidating the on-disk signature state with \u003ccode\u003eSecCodeCheckValidity()\u003c/code\u003e and \u003ccode\u003eSecCodeCopyGuestWithAttributes()\u003c/code\u003e using the incoming connection’s audit token. The author also built XPC Hunter, an open-source automated framework intended to discover exploitable XPC privilege escalation surfaces across installed macOS applications at scale.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article describes a macOS privilege escalation technique that allows standard user accounts to silently disable enterprise security products without administrator credentials, kernel exploits, or triggering security alerts.","The technique chains CDHash kernel cache exploitation with NIB payload injection to impersonate trusted application components and invoke privileged XPC methods without authentication.","The research was validated against CrowdStrike Falcon Sensor, where full sensor unloading was achieved from a standard user account, and against Kandji MDM Agent, where permanent agent deactivation was achieved via a two-phase XPC chain.","CrowdStrike has added detections and preventions for all supported versions of the macOS Falcon sensor, and the Kandji issue has been fixed with CVE-2026-39118 assigned.","The author built an open-source automated framework called XPC Hunter to discover exploitable XPC privilege escalation surfaces across installed macOS applications at scale."],"insights":["The article says the core security assumption that only a vendor’s own signed software can communicate with privileged background processes is unreliable when trust is based on cached CDHash validation alone.","The described technique is especially difficult for defenders because it abuses legitimate operating system behavior rather than memory corruption or a conventional exploit path, leaving few obvious forensic traces.","The exposed XPC methods found during testing were not obscure primitives but built-in management functions such as running commands, terminating agents, and stopping system extensions.","The article identifies peer validation at the XPC listener handshake, using active code-signing checks tied to the live connection, as the practical point where developers can break the impersonation chain before privileged methods are exposed."],"referencedReports":[{"title":"CVE-2026-39118","url":"https://www.cve.org/CVERecord?id=CVE-2026-39118","publisher":"CVE Program","context":"The article links to the CVE record when stating that the Kandji MDM Agent issue was fixed and assigned CVE-2026-39118.","category":"","primary":false}],"body":"\u003cp\u003eA novel macOS privilege escalation technique allows standard user accounts to silently disable leading enterprise security products, including EDR and MDM solutions, without administrator credentials, kernel exploits, or security alerts. The article says the technique exploits how trusted application components are identified, how trust relationships are inherited, and how privileged operations are authorized. It was validated against CrowdStrike Falcon Sensor and Kandji MDM Agent, with CrowdStrike adding detections and preventions and Kandji fixing the issue assigned CVE-2026-39118.\u003c/p\u003e\n\n\u003cp\u003eThe attack chains CDHash kernel cache exploitation with NIB payload injection to impersonate trusted application components. After a legitimate signed application binary is launched to populate the kernel cache, the application bundle can be manipulated so injected code runs in the context of the trusted component. From that position, the payload can communicate with privileged background daemons and invoke exposed XPC methods such as \u003ccode\u003erunProcessWithCommand:\u003c/code\u003e, \u003ccode\u003eterminateAppsAndAgents:\u003c/code\u003e, and \u003ccode\u003eceaseSystemExtensionWithReply:\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that relying only on passive CDHash validation in kernel caches is insufficient for securing privileged XPC service boundaries. It recommends that developers explicitly validate client identity inside listener protocol logic, including by using \u003ccode\u003expc_connection_set_peer_code_signing_requirement()\u003c/code\u003e or by revalidating the on-disk signature state with \u003ccode\u003eSecCodeCheckValidity()\u003c/code\u003e and \u003ccode\u003eSecCodeCopyGuestWithAttributes()\u003c/code\u003e using the incoming connection’s audit token. The author also built XPC Hunter, an open-source automated framework intended to discover exploitable XPC privilege escalation surfaces across installed macOS applications at scale.\u003c/p\u003e\n"},{"n":3,"title":"DraftKings hacker 'Snoopy' sentenced to 18 months in prison","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/draftkings-hacker-snoopy-sentenced-to-18-months-in-prison/","time":"21:55","priority":"MAY READ","score":65,"tldr":"Nathan Austad, a 21-year-old hacker known as “Snoopy,” was sentenced to 18 months in prison for helping compromise tens of thousands of DraftKings accounts in a 2022 credential-stuffing scheme that stole about $600,000. He was also ordered to pay forfeiture and restitution totaling nearly $1.8 million.","briefOverview":"\u003cp\u003eNathan Austad, a 21-year-old from Minnesota who used the alias “Snoopy,” was sentenced to 18 months in prison for his role in hacking DraftKings accounts in November 2022. In December 2025, he pleaded guilty to conspiracy to commit computer intrusion and admitted that he and co-conspirators compromised 60,000 DraftKings user accounts. During the attack, the hackers added payment methods under their control to 1,600 accounts and stole $600,000.\u003c/p\u003e\n\n\u003cp\u003eDraftKings had disclosed in November 2022 that hackers accessed customer accounts through credential stuffing attacks that exploited weak passwords or reused login credentials. The company initially reported that less than $300,000 had been stolen from affected customers and later disclosed that 67,995 customer accounts had been compromised. U.S. authorities previously charged Joseph Garrison, Kamerin Stokes, and Austad in connection with the scheme, which involved selling access to hacked DraftKings accounts through online marketplaces such as the “Goat Shop.”\u003c/p\u003e\n\n\u003cp\u003eThe U.S. Department of Justice said Austad operated his own shop, named after the Snoopy character from Peanuts, where he sold access to stolen accounts. The DOJ did not disclose how much the hackers earned from selling access to compromised accounts but said Austad’s cryptocurrency accounts received approximately \u003cspan class=\"math inline\"\u003e\\(465,000 in assets. In addition to prison, Austad received three years of supervised release and was ordered to pay \\)\u003c/span\u003e463,684 in forfeiture and $1,327,061 in restitution.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Nathan Austad, a 21-year-old from Minnesota who used the alias “Snoopy,” was sentenced to 18 months in prison for his role in hacking DraftKings accounts in the November 2022 cyberattack.","Austad pleaded guilty in December 2025 to conspiracy to commit computer intrusion and admitted that he and co-conspirators compromised 60,000 DraftKings user accounts.","During the attack, the hackers added payment methods under their control to 1,600 accounts and stole $600,000.","The U.S. Department of Justice said Austad operated a shop named after Snoopy where he sold access to stolen accounts, and his cryptocurrency accounts received approximately $465,000 in assets.","In addition to prison, Austad received three years of supervised release and was ordered to pay $463,684 in forfeiture and $1,327,061 in restitution."],"insights":["DraftKings initially reported less than $300,000 stolen, but the article says the hackers ultimately stole $600,000, showing that the known financial impact of the incident increased after the first disclosure.","The attack did not require compromising every affected account for direct theft, since payment methods controlled by the hackers were added to 1,600 accounts out of roughly 60,000 compromised accounts.","Austad’s financial penalties were far larger than the amount tied to his cryptocurrency accounts, with forfeiture and restitution totaling about $1.79 million compared with approximately $465,000 received in crypto assets.","The sentencing shows that selling access to compromised accounts through dedicated shops and online marketplaces was treated as a central part of the criminal scheme, not just the account break-ins themselves."],"referencedReports":[],"body":"\u003cp\u003eNathan Austad, a 21-year-old from Minnesota who used the alias “Snoopy,” was sentenced to 18 months in prison for his role in hacking DraftKings accounts in November 2022. In December 2025, he pleaded guilty to conspiracy to commit computer intrusion and admitted that he and co-conspirators compromised 60,000 DraftKings user accounts. During the attack, the hackers added payment methods under their control to 1,600 accounts and stole $600,000.\u003c/p\u003e\n\n\u003cp\u003eDraftKings had disclosed in November 2022 that hackers accessed customer accounts through credential stuffing attacks that exploited weak passwords or reused login credentials. The company initially reported that less than $300,000 had been stolen from affected customers and later disclosed that 67,995 customer accounts had been compromised. U.S. authorities previously charged Joseph Garrison, Kamerin Stokes, and Austad in connection with the scheme, which involved selling access to hacked DraftKings accounts through online marketplaces such as the “Goat Shop.”\u003c/p\u003e\n\n\u003cp\u003eThe U.S. Department of Justice said Austad operated his own shop, named after the Snoopy character from Peanuts, where he sold access to stolen accounts. The DOJ did not disclose how much the hackers earned from selling access to compromised accounts but said Austad’s cryptocurrency accounts received approximately \u003cspan class=\"math inline\"\u003e\\(465,000 in assets. In addition to prison, Austad received three years of supervised release and was ordered to pay \\)\u003c/span\u003e463,684 in forfeiture and $1,327,061 in restitution.\u003c/p\u003e\n"},{"n":8,"title":"Why Is an AI Image Company Building a Body Scanner?","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/why-is-an-ai-image-company-building-a-body-scanner/","time":"19:43","priority":"MAY READ","score":65,"tldr":"Midjourney plans to roll out a consumer full-body ultrasound scanner in spas without FDA clearance, raising major medical-device security, data volume, and regulatory concerns. Health-ISAC warns that spa users may not receive HIPAA protections and that cybersecurity must be addressed early in development.","briefOverview":"\u003cp\u003eMidjourney, the company best known for generating images from text prompts, has announced its first hardware product: a full-body ultrasound scanner. The company plans to deploy the scanner in consumer spas. The article states that the planned consumer rollout does not yet have FDA clearance.\u003c/p\u003e\n\n\u003cp\u003eHealth-ISAC’s Phil Englert said healthcare innovation can come from unusual places, but he raised potential data security concerns about the device. He said a single full-body ultrasound study can produce roughly 800 terabytes of data, about three times what a midsize hospital generates in a day. Because the device is built from thousands of elements that each emit and receive sound, Englert said every element adds to the attack surface.\u003c/p\u003e\n\n\u003cp\u003eEnglert said a threat model would need to account for whether the transducers could be manipulated during a scan. He also said the spa setting does not relax the device’s affects or regulatory obligations, while noting that HIPAA applies only to covered entities and their business associates. A spa that charges customers directly without involving insurance may fall outside those rules, so users should understand whether they are customers or patients and what protections that distinction provides.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Midjourney has announced its first hardware product, a full-body ultrasound scanner that it plans to deploy in consumer spas.","The article states that Midjourney plans a consumer rollout of the scanner with no FDA clearance yet.","Health-ISAC’s Phil Englert raised potential data security concerns, noting that a single full-body ultrasound study can produce roughly 800 terabytes of data.","Englert said every ultrasound element that emits and receives sound adds to the attack surface, and a threat model would need to consider whether transducers could be manipulated during a scan.","Englert warned that a spa charging customers directly without insurance may fall outside HIPAA, so users should understand whether they are customers or patients and what protections apply."],"insights":["A consumer spa setting does not eliminate medical-device security or regulatory concerns, even when the service is sold directly to customers rather than handled through insurance.","The article highlights a privacy gap: HIPAA may not apply if a spa is not a covered entity or business associate, so users may have fewer protections for health-related scan data than they expect.","The scale of data from a single full-body ultrasound study, cited as roughly 800 terabytes, makes storage, transfer, and protection of scan data a central security issue rather than a secondary operational detail.","The scanner’s design could require unusually complex threat modeling because thousands of sound-emitting and receiving elements may each increase the device’s possible points of manipulation.","Englert’s warning that cybersecurity is often left until too late makes early threat modeling and security planning a practical requirement for this kind of device rollout."],"referencedReports":[],"body":"\u003cp\u003eMidjourney, the company best known for generating images from text prompts, has announced its first hardware product: a full-body ultrasound scanner. The company plans to deploy the scanner in consumer spas. The article states that the planned consumer rollout does not yet have FDA clearance.\u003c/p\u003e\n\n\u003cp\u003eHealth-ISAC’s Phil Englert said healthcare innovation can come from unusual places, but he raised potential data security concerns about the device. He said a single full-body ultrasound study can produce roughly 800 terabytes of data, about three times what a midsize hospital generates in a day. Because the device is built from thousands of elements that each emit and receive sound, Englert said every element adds to the attack surface.\u003c/p\u003e\n\n\u003cp\u003eEnglert said a threat model would need to account for whether the transducers could be manipulated during a scan. He also said the spa setting does not relax the device’s affects or regulatory obligations, while noting that HIPAA applies only to covered entities and their business associates. A spa that charges customers directly without involving insurance may fall outside those rules, so users should understand whether they are customers or patients and what protections that distinction provides.\u003c/p\u003e\n"},{"n":7,"title":"How to evaluate Cloud Detection \u0026 Response (CDR) platforms and vendors","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/how-to-evaluate-cdr-vendors-a-practitioners-checklist","time":"21:31","priority":"MAY READ","score":45,"tldr":"The article provides a checklist for evaluating Cloud Detection and Response platforms, emphasizing that buyers should prioritize broad visibility across cloud, SaaS, identity, workloads, and AI systems over feature counts. The key test is whether a CDR platform can measurably reduce detection time, response time, and blast radius in real-world cloud attacks.","briefOverview":"\u003cp\u003eThe article presents a checklist for evaluating Cloud Detection and Response platforms and vendors based on real operational needs rather than feature lists. It says many enterprises have security tools but still lack visibility that matches how cloud, SaaS, identity, and AI systems behave. The article warns that some CDR platforms are posture tools with alerts, while others are legacy detections wrapped in cloud branding.\u003c/p\u003e\n\n\u003cp\u003eThe checklist emphasizes visibility across existing EDR telemetry, cloud control planes, SaaS, identity providers, serverless environments, workloads, storage, databases, APIs, networking logs, and configuration changes. It says attackers move through APIs, tokens, roles, and permissions, and that a platform that cannot correlate identity, SaaS, and cloud control planes is only watching fragments rather than full attacks. It also highlights AI-driven triage, cross-domain correlation, automatic attack path reconstruction, and identity-aware detection as important evaluation areas.\u003c/p\u003e\n\n\u003cp\u003eThe article says CDR platforms should support response and containment without breaking the business, including compromised identity response, SOAR and SOC integrations, context-preserving investigation, and business-impact-aware actions. It also recommends assessing risk-aware prioritization, forensic readiness, long-term data retention, threat hunting, enterprise scalability, predictable telemetry costs, and vendor expertise in cloud investigations. The final decision question is whether the platform measurably reduces time-to-detect, time-to-respond, and blast radius across critical cloud, SaaS, and identity paths.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article says Cloud Detection and Response platforms should be evaluated by real operational needs rather than by feature lists alone.","A CDR platform should provide visibility across cloud control planes, SaaS, identity providers, workloads, storage, databases, APIs, networking logs, and configuration changes.","The article argues that identity telemetry must be central because attackers in cloud environments can use valid credentials and chain access across SaaS, cloud, and workloads.","The checklist says CDR platforms should use AI-driven triage, cross-domain correlation, automatic attack path reconstruction, and machine-speed detection to reduce analyst noise.","The article says the final decision should be based on whether a CDR platform measurably reduces time-to-detect, time-to-respond, and blast radius across critical cloud, SaaS, and identity paths."],"insights":["The article warns that some products marketed as CDR may actually be posture tools with alerts or legacy detection products rebranded for cloud, so buyers should pressure-test vendor claims against operational outcomes.","The checklist treats agentless visibility as essential because important cloud, SaaS, serverless, and identity activity often occurs where traditional security agents cannot run.","The article frames response quality as a balance between speed and business impact, noting that fast containment without context can cause outages while slow containment can lead to breaches.","The article says CDR should function as an intelligence layer that strengthens existing SIEM, EDR/XDR, and SOAR tools rather than becoming another dashboard analysts ignore.","The article highlights forensic readiness as a buying criterion, including long-term data retention independent of native cloud limits and unified audit trails across cloud, identity, and workloads."],"referencedReports":[],"body":"\u003cp\u003eThe article presents a checklist for evaluating Cloud Detection and Response platforms and vendors based on real operational needs rather than feature lists. It says many enterprises have security tools but still lack visibility that matches how cloud, SaaS, identity, and AI systems behave. The article warns that some CDR platforms are posture tools with alerts, while others are legacy detections wrapped in cloud branding.\u003c/p\u003e\n\n\u003cp\u003eThe checklist emphasizes visibility across existing EDR telemetry, cloud control planes, SaaS, identity providers, serverless environments, workloads, storage, databases, APIs, networking logs, and configuration changes. It says attackers move through APIs, tokens, roles, and permissions, and that a platform that cannot correlate identity, SaaS, and cloud control planes is only watching fragments rather than full attacks. It also highlights AI-driven triage, cross-domain correlation, automatic attack path reconstruction, and identity-aware detection as important evaluation areas.\u003c/p\u003e\n\n\u003cp\u003eThe article says CDR platforms should support response and containment without breaking the business, including compromised identity response, SOAR and SOC integrations, context-preserving investigation, and business-impact-aware actions. It also recommends assessing risk-aware prioritization, forensic readiness, long-term data retention, threat hunting, enterprise scalability, predictable telemetry costs, and vendor expertise in cloud investigations. The final decision question is whether the platform measurably reduces time-to-detect, time-to-respond, and blast radius across critical cloud, SaaS, and identity paths.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>

}

}

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
