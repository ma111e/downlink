<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

<script>
window.__DL_ARTICLES = [{"n":3,"title":"Microsoft Details Phishing Campaign Targeting 35,000 Users Across 26 Countries","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/microsoft-details-phishing-campaign.html","time":"06:35","priority":"MUST READ","score":92,"group":null,"groupColor":null,"tldr":"Microsoft disclosed a large-scale phishing campaign targeting over 35,000 users that leverages code-of-conduct lures, CAPTCHA gates, and legitimate email services to bypass MFA and steal credentials. This attack highlights a broader 2026 trend of sophisticated credential harvesting through QR codes, CAPTCHA-gated pages, and weaponized email platforms like Amazon SES.","briefOverview":"\u003cp\u003eMicrosoft has disclosed a large-scale credential theft campaign that operated between April 14 and 16, 2026, targeting over 35,000 users across 26 countries. Approximately 92% of the victims were located in the United States, with the majority belonging to the healthcare, financial services, professional services, and technology sectors. The phishing emails utilized polished, enterprise-style HTML templates and preemptive authenticity statements to mimic legitimate internal communications. Display names such as \u0026ldquo;Internal Regulatory COC\u0026rdquo; and subject lines referencing conduct policy violations were used to create a sense of urgency and pressure. Messages were sent through legitimate email delivery services and included PDF attachments that directed victims to attacker-controlled domains. The attack chain featured multiple CAPTCHA challenges and intermediate pages designed to bypass automated defenses and enhance credibility. Ultimately, the campaign employed adversary-in-the-middle phishing to harvest Microsoft credentials and tokens in real-time, effectively bypassing multi-factor authentication. Microsoft\u0026rsquo;s broader Q1 2026 analysis also highlighted a massive surge in QR code phishing and the rapid evolution of CAPTCHA-gated attacks. Additionally, threat actors are increasingly weaponizing leaked AWS access keys to abuse Amazon Simple Email Service for bypassing email authentication checks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft disclosed a multi-stage credential theft campaign observed between April 14 and 16, 2026, which targeted more than 35,000 users across over 13,000 organizations in 26 countries. Approximately 92% of the targets were located in the United States, with the majority belonging to the healthcare, financial services, professional services, and technology sectors. The phishing emails utilized polished, enterprise-style HTML templates and preemptive authenticity statements to mimic legitimate internal communications. Display names such as \u0026ldquo;Internal Regulatory COC\u0026rdquo; and subject lines referencing conduct policy violations were used to create a sense of urgency and pressure. Messages were sent through legitimate email delivery services and included PDF attachments that directed victims to attacker-controlled domains. The malicious flow incorporated multiple rounds of CAPTCHA and intermediate pages to evade automated defenses while lending the scheme a veneer of legitimacy. The final stage leveraged adversary-in-the-middle phishing tactics to harvest Microsoft credentials and tokens in real-time, successfully bypassing multi-factor authentication. Microsoft\u0026rsquo;s analysis of the January to March 2026 email threat landscape revealed that QR code phishing emerged as the fastest-growing attack vector, with volumes jumping from 7.6 million to 18.7 million. Nearly 80% of the 8.3 billion detected phishing threats were link-based, while malware delivery declined to just 5-6%. Business email compromise attacks also saw significant fluctuations, totaling 10.7 million incidents during the quarter. Operators of the Tycoon 2FA phishing-as-a-service platform shifted hosting providers and domain registration patterns following a coordinated Europol disruption in March 2026. Notable Q1 campaigns included a February operation using SVG attachments to route victims through CAPTCHA checks, and a March campaign involving HTML files that screened visitors before presenting fraudulent sign-in pages. Infrastructure for these attacks was linked to multiple providers, including Tycoon 2FA, Kratos, and EvilTokens. Furthermore, threat actors are abusing leaked AWS access keys to weaponize Amazon Simple Email Service, allowing them to bypass SPF, DKIM, and DMARC checks while sending emails from trusted infrastructure.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"campaign-overview-and-targeting\"\u003eCampaign Overview and Targeting\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft has disclosed details of a large-scale credential theft campaign that operated between April 14 and 16, 2026. The threat actors targeted more than 35,000 users across over 13,000 organizations in 26 countries. Approximately 92% of the victims were located in the United States. The campaign heavily focused on specific high-value sectors, including healthcare and life sciences (19%), financial services (18%), professional services (11%), and technology and software (11%).\u003c/p\u003e\n\n\u003ch3 id=\"lure-construction-and-delivery-mechanisms\"\u003eLure Construction and Delivery Mechanisms\u003c/h3\u003e\n\n\u003cp\u003eThe phishing emails employed sophisticated, enterprise-style HTML templates with structured layouts and preemptive authenticity statements. These design choices made the messages appear more credible than typical phishing attempts. Display names such as \u0026ldquo;Internal Regulatory COC\u0026rdquo; and \u0026ldquo;Workforce Communications\u0026rdquo; were used to reinforce the illusion of internal communications. Subject lines included phrases like \u0026ldquo;Internal case log issued under conduct policy\u0026rdquo; and \u0026ldquo;Reminder: employer opened a non-compliance case log.\u0026rdquo; Messages were dispatched through legitimate email delivery services and featured PDF attachments. These attachments purportedly provided additional information about the conduct review and contained links that initiated the credential harvesting flow.\u003c/p\u003e\n\n\u003ch3 id=\"attack-chain-and-technical-execution\"\u003eAttack Chain and Technical Execution\u003c/h3\u003e\n\n\u003cp\u003eThe malicious workflow was designed to bypass automated security defenses and maintain user engagement through multiple stages. Victims were directed through several rounds of CAPTCHA challenges and intermediate pages. These steps served to lend the scheme a veneer of legitimacy while filtering out automated analysis. The final destination varied depending on whether the malicious flow was triggered from a mobile device or a desktop system. Ultimately, the campaign utilized adversary-in-the-middle (AiTM) phishing tactics to harvest Microsoft credentials and authentication tokens in real-time. This technique effectively allowed threat actors to bypass multi-factor authentication controls.\u003c/p\u003e\n\n\u003ch3 id=\"q1-2026-email-threat-landscape-trends\"\u003eQ1 2026 Email Threat Landscape Trends\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft\u0026rsquo;s analysis of the email threat landscape from January to March 2026 highlighted several significant shifts in attacker behavior. Key trends observed during the quarter include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eQR code phishing emerged as the fastest-growing attack vector, with volumes surging from 7.6 million in January to 18.7 million in March.\u003c/li\u003e\n\u003cli\u003eCAPTCHA-gated phishing evolved rapidly across various payload types, contributing to the 8.3 billion total phishing threats detected.\u003c/li\u003e\n\u003cli\u003eNearly 80% of incidents were link-based, while malware delivery declined sharply to just 5-6% by quarter\u0026rsquo;s end.\u003c/li\u003e\n\u003cli\u003eBusiness email compromise scams totaled 10.7 million attacks, with March volumes crossing the 4 million threshold.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"notable-campaigns-and-phaas-infrastructure\"\u003eNotable Campaigns and PhaaS Infrastructure\u003c/h3\u003e\n\n\u003cp\u003eTwo particularly noteworthy campaigns were identified during the first quarter of 2026. A sustained operation between February 23 and 25 sent over 1.2 million messages to 53,000 organizations across 23 countries, using 401(k), payment, and invoice-themed lures with SVG attachments. A massive campaign on March 17 involved 1.5 million malicious messages sent to 179,000 organizations across 43 countries, primarily utilizing HTML attachments. Both campaigns routed victims through initial screening pages and CAPTCHA challenges before presenting fraudulent sign-in interfaces. Microsoft noted that while the campaigns shared common tooling and delivery characteristics, their infrastructure was linked to multiple different phishing-as-a-service providers. Most endpoints were associated with Tycoon 2FA, with additional activity tied to Kratos and EvilTokens. Following a coordinated disruption operation in March 2026, Tycoon 2FA operators shifted away from Cloudflare hosting and began using alternative platforms to maintain anti-analysis protections.\u003c/p\u003e\n\n\u003ch3 id=\"emerging-abuse-of-trusted-email-infrastructure\"\u003eEmerging Abuse of Trusted Email Infrastructure\u003c/h3\u003e\n\n\u003cp\u003eA critical development in the threat landscape involves the weaponization of Amazon Simple Email Service. Attackers are gaining access to Amazon SES through leaked AWS access keys to bypass SPF, DKIM, and DMARC authentication checks. This method allows threat actors to send thousands of phishing emails without building dubious domains or mail infrastructure from scratch. The messages originate from IP addresses that are unlikely to be blocklisted and pass standard email authentication protocols. By leveraging infrastructure that both users and security systems inherently trust, attackers facilitate credential theft via highly legitimate-looking sign-in pages. This approach significantly reduces the operational overhead required for large-scale phishing campaigns while evading traditional detection mechanisms.\u003c/p\u003e\n","keyPoints":["Microsoft disclosed a multi-stage credential theft campaign targeting over 35,000 users across 26 countries that used code-of-conduct-themed email lures and PDF attachments.","The attack chain utilized CAPTCHA gates and intermediate pages to bypass automated defenses before employing Adversary-in-the-Middle phishing to harvest Microsoft credentials and bypass multi-factor authentication.","Microsoft's Q1 2026 threat analysis identified QR code phishing as the fastest-growing attack vector, with attack volumes increasing by 146% between January and March.","Threat actors are leveraging leaked AWS access keys to abuse Amazon Simple Email Service, allowing them to bypass email authentication checks and send phishing emails from trusted infrastructure.","Operators of the Tycoon 2FA phishing-as-a-service platform shifted hosting providers and domain registration patterns following a coordinated disruption operation in March 2026."],"insights":["Attackers are bypassing traditional email authentication (SPF, DKIM, DMARC) by weaponizing leaked AWS access keys to send phishing emails directly through Amazon SES, leveraging infrastructure that security systems inherently trust.","CAPTCHA gates have evolved into a dual-purpose mechanism that both filters out automated defenses and creates a veneer of legitimacy before redirecting users to credential-harvesting pages.","The campaign exploits organizational trust by using polished, enterprise-style HTML templates with preemptive authenticity statements, making phishing emails appear as legitimate internal regulatory communications rather than external threats.","Phishing-as-a-Service operators are actively evading law enforcement takedowns by rapidly shifting hosting providers and domain registration patterns, demonstrating a resilient infrastructure model designed to maintain operational continuity after disruptions."],"referencedReports":[{"title":"QR Codes as Attack Vector","url":"https://unit42.paloaltonetwork.com/qr-codes-as-attack-vector/","publisher":"Palo Alto Networks Unit 42","context":"The article references a February report highlighting how threat actors abuse QR codes to disguise malicious destinations, steal credentials, and bypass app store security."},{"title":"Amazon SES Phishing and BEC Attacks","url":"https://securelist.com/amazon-ses-phishing-and-bec-attacks/119623/","publisher":"Kaspersky","context":"The article cites Kaspersky's analysis explaining how attackers weaponize Amazon SES infrastructure to bypass email authentication and send phishing emails from trusted domains."}],"body":"\u003cp\u003eMicrosoft has disclosed a large-scale credential theft campaign that operated between April 14 and 16, 2026, targeting over 35,000 users across 26 countries. Approximately 92% of the victims were located in the United States, with the majority belonging to the healthcare, financial services, professional services, and technology sectors. The phishing emails utilized polished, enterprise-style HTML templates and preemptive authenticity statements to mimic legitimate internal communications. Display names such as \u0026ldquo;Internal Regulatory COC\u0026rdquo; and subject lines referencing conduct policy violations were used to create a sense of urgency and pressure. Messages were sent through legitimate email delivery services and included PDF attachments that directed victims to attacker-controlled domains. The attack chain featured multiple CAPTCHA challenges and intermediate pages designed to bypass automated defenses and enhance credibility. Ultimately, the campaign employed adversary-in-the-middle phishing to harvest Microsoft credentials and tokens in real-time, effectively bypassing multi-factor authentication. Microsoft\u0026rsquo;s broader Q1 2026 analysis also highlighted a massive surge in QR code phishing and the rapid evolution of CAPTCHA-gated attacks. Additionally, threat actors are increasingly weaponizing leaked AWS access keys to abuse Amazon Simple Email Service for bypassing email authentication checks.\u003c/p\u003e\n"},{"n":1,"title":"ScarCruft hackers push BirdCall Android malware via game platform","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/scarcruft-hackers-push-birdcall-android-malware-via-game-platform/","time":"09:04","priority":"SHOULD READ","score":85,"group":"S","groupColor":"#2dd4bf","tldr":"North Korean threat actors from the ScarCruft group are using a compromised Chinese gaming platform to distribute a new Android variant of the BirdCall backdoor for espionage and data exfiltration.","briefOverview":"\u003cp\u003eNorth Korean threat actors known as ScarCruft have developed a new Android variant of the BirdCall backdoor to conduct espionage campaigns. The malware was delivered through a supply-chain attack targeting sqgame.net, a Chinese gaming platform that caters to Korean communities in China\u0026rsquo;s Yanbian region.\u003c/p\u003e\n\n\u003cp\u003eThis Android version collects sensitive data including geolocation, contacts, call logs, SMS messages, and detailed device specifications. It also periodically captures screenshots and records audio between 7 pm and 10 pm local time. To avoid detection, the malware plays a silent MP3 loop to prevent Android from suspending its background processes.\u003c/p\u003e\n\n\u003cp\u003eUnlike its Windows counterpart, the Android variant currently lacks advanced capabilities like shell command execution and browser data extraction. Researchers at ESET identified at least seven versions of the malware since its development began in October 2024. Users are advised to only download software from official marketplaces and trusted publisher sites to mitigate these threats.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe North Korean hacker group APT37, also known as ScarCruft and Ricochet Chollima, has been distributing an Android variant of the BirdCall backdoor through a supply-chain attack. The threat actor targeted sqgame.net, a Chinese website hosting games for Android, iOS, and Windows. While the platform supports multiple operating systems, the attacks specifically target Android and Windows users. The campaign caters to Koreans in the autonomous Yanbian region of China, a known crossing point for North Korean defectors and refugees.\u003c/p\u003e\n\n\u003cp\u003eESET researchers noted that the Android variant was created around October 2024 and has evolved through at least seven versions. The malware extracts IP geolocation, contact lists, call logs, SMS messages, and extensive device information such as kernel status, IMEI, and MAC address. It also reports battery temperature, RAM, storage, cloud configuration, and file extensions of interest to its command-and-control server. The spyware periodically takes screenshots and records audio from the microphone between 7 pm and 10 pm local time.\u003c/p\u003e\n\n\u003cp\u003eTo maintain persistence, it plays a silent MP3 in a loop to prevent the operating system from suspending its process. The Android version lacks several commands found in the Windows variant, including shell execution, traffic proxying, browser targeting, file manipulation, and process termination. On Windows systems, the infection chain starts with a trojanized mono.dll file that downloads and executes RokRAT before deploying the BirdCall backdoor. ScarCruft is known for utilizing a wide array of custom malware, such as THUMBSBD for air-gapped networks, KoSpy for Google Play infiltration, M2RAT for Windows Phones, and the Dolphin mobile backdoor. To reduce infection risks, cybersecurity guidance recommends downloading software exclusively from official marketplaces and trusted publishers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"threat-actor-and-campaign-overview\"\u003eThreat Actor and Campaign Overview\u003c/h3\u003e\n\n\u003cp\u003eThe North Korean hacker group APT37, also identified as ScarCruft and Ricochet Chollima, is actively distributing a new Android variant of the BirdCall backdoor. This campaign represents a supply-chain attack that expands the actor\u0026rsquo;s espionage toolkit beyond its previously documented Windows capabilities. ESET researchers documented the development of this Android variant beginning around October 2024. The threat actor has produced at least seven distinct versions of the mobile malware during this development window.\u003c/p\u003e\n\n\u003ch3 id=\"delivery-mechanism-and-targeting\"\u003eDelivery Mechanism and Targeting\u003c/h3\u003e\n\n\u003cp\u003eThe malware is delivered through a compromised Chinese gaming platform known as sqgame.net. This website hosts applications for Android, iOS, and Windows users. However, the ScarCruft attacks specifically target only Android and Windows devices. The platform caters specifically to Korean communities residing in the autonomous Yanbian region of China. This geographic area serves as a known transit point for North Korean defectors and refugees.\u003c/p\u003e\n\n\u003ch3 id=\"android-malware-capabilities\"\u003eAndroid Malware Capabilities\u003c/h3\u003e\n\n\u003cp\u003eThe newly documented Android variant functions as a comprehensive spyware suite. It extracts IP geolocation data alongside contact lists, call logs, and SMS messages. The malware also collects extensive device telemetry, including the operating system version, kernel details, rooting status, IMEI number, MAC address, IP address, and network information. It periodically captures screenshots and records audio from the device microphone between 7 pm and 10 pm local time. To evade background process suspension, the malware plays a silent MP3 file in a continuous loop. It also exfiltrates files from specified directories and sends detailed system reports to its command-and-control server. These reports include battery temperature, RAM usage, storage capacity, cloud configuration, backdoor version, and a list of targeted file extensions.\u003c/p\u003e\n\n\u003ch3 id=\"windows-infection-chain-and-feature-parity\"\u003eWindows Infection Chain and Feature Parity\u003c/h3\u003e\n\n\u003cp\u003eThe Android version of BirdCall does not yet include all commands present in its Windows counterpart. Missing capabilities on the mobile variant include shell command execution, traffic proxying, browser and messenger data targeting, file deletion and dropping, and process termination. On Windows systems, the infection chain initiates with a trojanized mono.dll file. This malicious DLL downloads and executes RokRAT, which subsequently deploys the Windows version of the BirdCall backdoor.\u003c/p\u003e\n\n\u003ch3 id=\"actor-background-and-mitigation-guidance\"\u003eActor Background and Mitigation Guidance\u003c/h3\u003e\n\n\u003cp\u003eScarCruft maintains a reputation for deploying a broad arsenal of custom malware across multiple platforms. Previous tools attributed to the group include THUMBSBD for breaching air-gapped Windows networks, KoSpy for infiltrating Google Play, M2RAT for targeting Windows Phones, and the Dolphin mobile backdoor. To minimize the risk of similar supply-chain infections, users are advised to exclusively download software from official marketplaces and trusted publisher websites.\u003c/p\u003e\n","keyPoints":["North Korean threat actors known as ScarCruft have developed an Android variant of the BirdCall backdoor to conduct espionage campaigns.","The malware is delivered through a supply-chain attack targeting sqgame.net, a Chinese gaming platform hosting applications for Android, iOS, and Windows.","The Android version of BirdCall collects sensitive data including geolocation, contacts, call logs, SMS messages, and device specifications, while also recording audio and taking screenshots.","Researchers identified at least seven versions of the Android malware developed since October 2024, with the Windows infection chain beginning with a trojanized DLL that deploys RokRAT before installing BirdCall."],"insights":["The Android variant employs a silent MP3 loop specifically to bypass Android's background process suspension mechanisms, demonstrating targeted evasion of mobile OS resource management.","The supply-chain attack targets sqgame.net, a platform serving Korean communities in China's Yanbian region, indicating a deliberate focus on victims in a geographic area known for North Korean refugee transit.","Unlike the fully-featured Windows backdoor, the Android variant currently lacks advanced capabilities such as shell command execution, traffic proxying, and browser or messenger data extraction, suggesting it is still in an active development phase."],"referencedReports":[{"title":"ESET Research: Rigged Game - ScarCruft Compromises Gaming Platform Supply Chain Attack","url":"https://www.welivesecurity.com/en/eset-research/rigged-game-scarcruft-compromises-gaming-platform-supply-chain-attack/","publisher":"ESET","context":"The article references this ESET analysis to note that the Android variant of BirdCall lacks certain commands found in the Windows version."}],"body":"\u003cp\u003eNorth Korean threat actors known as ScarCruft have developed a new Android variant of the BirdCall backdoor to conduct espionage campaigns. The malware was delivered through a supply-chain attack targeting sqgame.net, a Chinese gaming platform that caters to Korean communities in China\u0026rsquo;s Yanbian region.\u003c/p\u003e\n\n\u003cp\u003eThis Android version collects sensitive data including geolocation, contacts, call logs, SMS messages, and detailed device specifications. It also periodically captures screenshots and records audio between 7 pm and 10 pm local time. To avoid detection, the malware plays a silent MP3 loop to prevent Android from suspending its background processes.\u003c/p\u003e\n\n\u003cp\u003eUnlike its Windows counterpart, the Android variant currently lacks advanced capabilities like shell command execution and browser data extraction. Researchers at ESET identified at least seven versions of the malware since its development began in October 2024. Users are advised to only download software from official marketplaces and trusted publisher sites to mitigate these threats.\u003c/p\u003e\n"},{"n":4,"title":"ScarCruft Hacks Gaming Platform to Deploy BirdCall Malware on Android and Windows","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/scarcruft-hacks-gaming-platform-to.html","time":"09:07","priority":"SHOULD READ","score":85,"group":"S","groupColor":"#2dd4bf","tldr":"North Korea-aligned ScarCruft hackers compromised a gaming platform to deploy the BirdCall backdoor, enabling multi-platform espionage targeting ethnic Koreans in China and North Korean defectors.","briefOverview":"\u003cp\u003eThe North Korea-aligned state-sponsored hacking group ScarCruft has compromised the sqgame.net gaming platform to deploy a trojanized backdoor known as BirdCall. This supply chain espionage campaign specifically targets ethnic Koreans residing in China’s Yanbian region and North Korean defectors.\u003c/p\u003e\n\n\u003cp\u003eThe malware represents a multi-platform threat, with variants developed for both Windows and Android devices. BirdCall is an advanced evolution of the previously known RokRAT malware family and retains its reliance on legitimate cloud storage services like Dropbox and pCloud for command-and-control communications.\u003c/p\u003e\n\n\u003cp\u003eThe Windows variant uses a multistage loading chain involving encrypted scripts and checks for virtual machine environments before executing shellcode. Meanwhile, the Android variant actively collects personal data, including contact lists, SMS messages, call logs, media files, screenshots, and ambient audio.\u003c/p\u003e\n\n\u003cp\u003eEvidence indicates the attack has been ongoing since late 2024, with poisoned Android APKs and trojanized Windows update packages distributed through the compromised platform. Security researchers from ESET have documented the campaign\u0026rsquo;s technical details and targeting strategy.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe North Korea-aligned state-sponsored hacking group ScarCruft has executed a supply chain espionage attack against sqgame.net, a gaming platform popular among ethnic Koreans in China’s Yanbian region.\u003c/p\u003e\n\n\u003cp\u003eThe platform serves as a high-risk transit point for North Korean defectors crossing the Tumen River, making it a deliberate target for the threat actors. ScarCruft has trojanized both the Windows and Android components of the platform with a backdoor called BirdCall.\u003c/p\u003e\n\n\u003cp\u003eThis campaign is assessed to be an ongoing operation that likely began in late 2024. BirdCall represents a significant evolution of the RokRAT malware family, which has historically targeted Windows users but has since been adapted for macOS and Android.\u003c/p\u003e\n\n\u003cp\u003eThe Windows version of BirdCall is deployed through a multistage loading chain that starts with Ruby or Python scripts. These components are encrypted using computer-specific keys and rely on legitimate cloud services like Dropbox and pCloud for command-and-control communications.\u003c/p\u003e\n\n\u003cp\u003eThe Windows update package delivered a trojanized DLL that includes a downloader designed to analyze running processes and detect virtual machine environments. Once evasion checks pass, the downloader executes shellcode that fetches and installs the BirdCall backdoor.\u003c/p\u003e\n\n\u003cp\u003eThe Android variant, distributed as poisoned APKs, incorporates a subset of the Windows functionality while expanding surveillance capabilities. It actively collects contact lists, SMS messages, call logs, media files, documents, screenshots, and ambient audio recordings.\u003c/p\u003e\n\n\u003cp\u003eLike its Windows counterpart, the Android backdoor utilizes legitimate cloud storage services, including pCloud, Yandex Disk, and Zoho WorkDrive, for command-and-control traffic. Analysis of the malware\u0026rsquo;s lineage has identified seven distinct versions, with the earliest dating back to October 2024.\u003c/p\u003e\n\n\u003cp\u003eThe supply chain attack selectively poisoned Android APKs available for download while leaving the Windows desktop client and iOS games untouched. Evidence shows the malicious Windows DLL was distributed at least since November 2024, though the update package has since been remediated.\u003c/p\u003e\n\n\u003cp\u003eThe Slovakian cybersecurity firm ESET published a detailed report on the campaign, highlighting the deliberate targeting strategy and technical execution.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"campaign-overview\"\u003eCampaign Overview\u003c/h3\u003e\n\n\u003cp\u003eThe North Korea-aligned state-sponsored hacking group known as ScarCruft has conducted a supply chain espionage attack against sqgame.net, a gaming platform dedicated to Yanbian-themed games. The campaign leverages a trojanized backdoor named BirdCall to compromise both Windows and Android components of the platform. This operation represents a deliberate strategy to target ethnic Koreans residing in China’s Yanbian region and North Korean defectors crossing the Tumen River. The attack aligns with ScarCruft\u0026rsquo;s historical focus on North Korean defectors, human rights activists, and university professors.\u003c/p\u003e\n\n\u003ch3 id=\"malware-capabilities-and-evolution\"\u003eMalware Capabilities and Evolution\u003c/h3\u003e\n\n\u003cp\u003eBirdCall is an advanced evolution of the previously known RokRAT malware family. While earlier iterations primarily targeted Windows users, the malware family has been actively maintained and adapted across multiple operating systems, including macOS (CloudMensis) and Android (RambleOn). The backdoor is equipped with standard espionage features, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eScreenshot capture\u003c/li\u003e\n\u003cli\u003eKeystroke logging\u003c/li\u003e\n\u003cli\u003eClipboard content theft\u003c/li\u003e\n\u003cli\u003eShell command execution\u003c/li\u003e\n\u003cli\u003eSystem data gathering\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"windows-variant-technical-details\"\u003eWindows Variant Technical Details\u003c/h3\u003e\n\n\u003cp\u003eThe Windows version of BirdCall is deployed via a multistage loading chain. The initial stage consists of Ruby or Python scripts that download and execute subsequent components. These components are encrypted using computer-specific keys to evade static analysis. The Windows update package delivered a trojanized DLL containing a downloader module. This downloader performs environment analysis by checking for running analysis tools and virtual machine environments. Upon passing these checks, it downloads and executes shellcode that fetches and installs the BirdCall backdoor. Evidence indicates the malicious DLL was distributed at least since November 2024, though the update package has since been cleaned.\u003c/p\u003e\n\n\u003ch3 id=\"android-variant-technical-details\"\u003eAndroid Variant Technical Details\u003c/h3\u003e\n\n\u003cp\u003eThe Android variant of BirdCall was distributed as poisoned APKs available for download from the compromised platform. The attack selectively targeted Android applications, leaving the Windows desktop client and iOS games intact. The Android backdoor incorporates a subset of the Windows functionality while expanding its data collection scope. It actively harvests:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eContact lists\u003c/li\u003e\n\u003cli\u003eSMS messages and call logs\u003c/li\u003e\n\u003cli\u003eMedia files and documents\u003c/li\u003e\n\u003cli\u003eScreenshots and ambient audio recordings\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAnalysis of the malware\u0026rsquo;s lineage has uncovered seven distinct versions, with the earliest iteration dating back to October 2024.\u003c/p\u003e\n\n\u003ch3 id=\"command-and-control-infrastructure\"\u003eCommand and Control Infrastructure\u003c/h3\u003e\n\n\u003cp\u003eBoth the Windows and Android variants of BirdCall rely on legitimate cloud storage services for command-and-control (C2) communications. This operational security measure helps mask malicious traffic within normal user activity. The Windows variant utilizes Dropbox and pCloud for C2. The Android variant expands this infrastructure to include pCloud, Yandex Disk, and Zoho WorkDrive. Zoho WorkDrive has become an increasingly common presence across multiple campaigns attributed to the threat actor.\u003c/p\u003e\n\n\u003ch3 id=\"campaign-timeline-and-distribution\"\u003eCampaign Timeline and Distribution\u003c/h3\u003e\n\n\u003cp\u003eThe supply chain attack is assessed to be ongoing since late 2024. The exact date of the website breach remains unknown, but poisoned Android APKs began distribution around that time. Two specific Android games hosted on the platform were altered to serve malicious APKs:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003esqgame.com.cn/ybht.apk\u003c/li\u003e\n\u003cli\u003esqgame.com.cn/sqybhs.apk\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe Slovakian cybersecurity firm ESET documented the campaign\u0026rsquo;s technical details and targeting strategy in a report shared with The Hacker News. The analysis highlights how ScarCruft exploits niche gaming platforms as supply chain vectors to reach specific demographic targets while maintaining operational security through cloud-based C2 and multi-stage loading chains.\u003c/p\u003e\n","keyPoints":["The North Korea-aligned ScarCruft group compromised the sqgame.net gaming platform to deploy the BirdCall backdoor targeting ethnic Koreans in China and North Korean defectors.","BirdCall is a multi-platform malware family that has evolved from its Windows origins to include Android capabilities for collecting personal data, screenshots, and ambient audio.","The threat actors utilize legitimate cloud storage services such as Dropbox, pCloud, and Zoho WorkDrive for command-and-control communications.","The supply chain attack involved poisoning Android APKs and trojanizing a Windows desktop client update package to deliver the malware starting in late 2024."],"insights":["BirdCall relies on legitimate cloud storage services like Dropbox, pCloud, and Zoho WorkDrive for command-and-control, allowing the malware to blend in with standard user traffic.","The malware employs a multistage loading chain using Ruby or Python scripts and encrypts components with computer-specific keys to evade static analysis.","ScarCruft is exploiting niche gaming platforms as supply chain vectors to target specific demographics (ethnic Koreans in China) while bypassing traditional enterprise security controls.","The Windows variant includes a downloader that checks for running analysis tools and virtual machine environments before executing shellcode, indicating a focus on anti-sandbox evasion."],"referencedReports":[{"title":"Rigged Game: ScarCruft Compromises Gaming Platform Supply Chain Attack","url":"https://www.welivesecurity.com/en/eset-research/rigged-game-scarcruft-compromises-gaming-platform-supply-chain-attack/","publisher":"ESET","context":"The article cites this as a report shared with The Hacker News ahead of publication, detailing the supply chain compromise and BirdCall backdoor deployment."}],"body":"\u003cp\u003eThe North Korea-aligned state-sponsored hacking group ScarCruft has compromised the sqgame.net gaming platform to deploy a trojanized backdoor known as BirdCall. This supply chain espionage campaign specifically targets ethnic Koreans residing in China’s Yanbian region and North Korean defectors.\u003c/p\u003e\n\n\u003cp\u003eThe malware represents a multi-platform threat, with variants developed for both Windows and Android devices. BirdCall is an advanced evolution of the previously known RokRAT malware family and retains its reliance on legitimate cloud storage services like Dropbox and pCloud for command-and-control communications.\u003c/p\u003e\n\n\u003cp\u003eThe Windows variant uses a multistage loading chain involving encrypted scripts and checks for virtual machine environments before executing shellcode. Meanwhile, the Android variant actively collects personal data, including contact lists, SMS messages, call logs, media files, screenshots, and ambient audio.\u003c/p\u003e\n\n\u003cp\u003eEvidence indicates the attack has been ongoing since late 2024, with poisoned Android APKs and trojanized Windows update packages distributed through the compromised platform. Security researchers from ESET have documented the campaign\u0026rsquo;s technical details and targeting strategy.\u003c/p\u003e\n"},{"n":2,"title":"Weaver E-cology RCE Flaw CVE-2026-22679 Actively Exploited via Debug API","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/weaver-e-cology-rce-flaw-cve-2026-22679.html","time":"07:37","priority":"MAY READ","score":0,"group":null,"groupColor":null,"tldr":"","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":[],"insights":[],"referencedReports":[],"body":""}];

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
