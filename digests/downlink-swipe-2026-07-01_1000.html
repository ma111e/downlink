gating whether data was stolen. Nidec disclosed a ransomware breach affecting part of the network at its Taiwanese subsidiary, Nidec Chaun Choung Technology, and the BlackField ransomware group later claimed it stole more than two terabytes of corporate data. KDDI Corporation said attackers exploited a vulnerability in third-party software to access an email system it operates for five Japanese internet service providers, warning that customers’ email addresses and passwords may have been obtained.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Several major Japanese companies disclosed cyber incidents over the past two weeks that exposed customer data, disrupted internal systems, and prompted investigations.","Aflac Life Insurance Japan said hackers compromised its customer portal and other systems, exposing personal information for about 4.38 million policyholders, including names, addresses, and phone numbers.","Sapporo Holdings disclosed suspected unauthorized access affecting Singapore-based Pokka and Canadian brewer Sleeman Breweries, but said it had found no impact on domestic operations.","Nidec disclosed a ransomware breach affecting part of the network at its Taiwanese subsidiary Nidec Chaun Choung Technology, and the BlackField ransomware group later claimed responsibility.","KDDI Corporation said attackers exploited a vulnerability in third-party software to gain unauthorized access to an email system it operates for five Japanese internet service providers."],"insights":["Aflac Japan’s ability to keep handling claims and inquiries through call centers shows that alternate customer service channels can help maintain critical services after parts of digital systems are suspended.","Both Sapporo and Nidec emphasized that affected subsidiaries or networks were separate from broader domestic or corporate operations, highlighting how organizational and network separation can limit wider disruption.","KDDI’s incident affected customers of five different internet service providers because the compromised email system was operated centrally by KDDI, showing how one shared service can create exposure across multiple companies.","The article notes no evidence that the incidents are connected, despite several major Japanese companies disclosing breaches in a short period across insurance, beverages, manufacturing and telecommunications."],"referencedReports":[],"body":"\u003cp\u003eSeveral major Japanese companies disclosed cyber incidents over the past two weeks involving an insurer, a telecommunications provider, an electronic components maker, and a beverage producer. The incidents exposed customer data, disrupted internal systems, and prompted investigations. The article says there is no evidence so far that the incidents are connected or were carried out by the same threat actor.\u003c/p\u003e\n\n\u003cp\u003eAflac Life Insurance Japan reported the largest disclosed breach, saying hackers compromised its customer portal and other systems and exposed personal information for about 4.38 million policyholders. The exposed data included names, addresses, and phone numbers, while about 230,000 customers also had premium payment account information compromised. Aflac said it suspended parts of its systems but continued handling claims and customer inquiries through call centers and other channels, and said the incident was limited to its Japanese operations.\u003c/p\u003e\n\n\u003cp\u003eSapporo Holdings disclosed suspected unauthorized access affecting Singapore-based Pokka and Canadian brewer Sleeman Breweries, and said it shut down affected systems while investigating whether data was stolen. Nidec disclosed a ransomware breach affecting part of the network at its Taiwanese subsidiary, Nidec Chaun Choung Technology, and the BlackField ransomware group later claimed it stole more than two terabytes of corporate data. KDDI Corporation said attackers exploited a vulnerability in third-party software to access an email system it operates for five Japanese internet service providers, warning that customers’ email addresses and passwords may have been obtained.\u003c/p\u003e\n"},{"n":10,"title":"22nd June – Threat Intelligence Report","source":"research.checkpoint.com","sourceColorIdx":4,"link":"https://research.checkpoint.com/2026/22nd-june-threat-intelligence-report/","time":"11:29","priority":"MAY READ","score":40,"tldr":"Check Point’s 22 June threat report highlights a broad surge in cyber risk, including major data breaches, AI-enabled phishing and agent hijacking, actively exploited vulnerabilities in Cisco, Ubiquiti and AI platforms, and large-scale campaigns such as FortiBleed and Turla-linked espionage.","briefOverview":"\u003cp\u003eCheck Point’s 22nd June Threat Intelligence Report summarizes recent attacks, breaches, AI threats, vulnerabilities, and threat intelligence findings. Reported incidents include a third-party breach affecting Texas Parks and Wildlife Department license customers, a ShapedPlugin supply chain attack through official WordPress plugin updates, a cyberattack on iRhythm Technologies involving third-party-hosted business applications, and a Klue breach tied to compromised legacy integration credentials. The Klue incident involved stolen OAuth tokens connected to customer Salesforce environments and affected clients including Huntress, Recorded Future, Tanium, and Jamf.\u003c/p\u003e\n\n\u003cp\u003eThe report highlights several AI-related threats, including EvilTokens, an AI-powered phishing-as-a-service operation abusing device-code authentication to steal Microsoft 365 tokens. Researchers also crafted a fake AI skill that hijacked more than 26,000 AI agents by abusing trusted marketplaces and Instagram ads. LayerX researchers demonstrated BioShocking AI, a technique that tricks agentic browsers into bypassing guardrails and exposing credentials and user data.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability section covers Cisco’s fix for CVE-2026-20245 in Catalyst SD-WAN Manager, Dify’s version 1.14.2 fixes for four AI platform vulnerabilities, exploited flaws in Ubiquiti UniFi OS, and targeting of Langflow through CVE-2026-55255 and CVE-2026-33017. The threat intelligence section describes the FortiBleed campaign compromising FortiGate firewalls to steal credentials, Turla-linked StockStay espionage malware targeting Ukrainian government and defense organizations, DCloud Uni-App’s use in a large scam domain ecosystem, and FulcrumSec activity against cloud-native organizations. The reported impacts include exposed personal data, stolen protected health information, stolen business and customer data, credential theft, cloud data exfiltration, and exploitation of network and AI platforms.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Texas Parks and Wildlife Department was affected by a third-party data breach involving its license system vendor that exposed driver’s license information, passport numbers, emails, phone numbers, and residential addresses for 3,087,721 hunting and fishing license customers.","ShapedPlugin faced a supply chain attack that delivered malicious updates for three paid WordPress plugins through its official updater and installed a hidden fake WooCommerce plugin to steal admin, database, and 2FA credentials.","Researchers reported EvilTokens, an AI-powered phishing-as-a-service operation that abuses device-code authentication to steal Microsoft 365 tokens, amid a 1,380% surge in device-code phishing observed by Huntress in early 2026.","Cisco addressed CVE-2026-20245, a high-severity command injection flaw in Catalyst SD-WAN Manager that attackers exploited as a zero-day for months.","Researchers uncovered the FortiBleed campaign, which converted compromised FortiGate firewalls into passive credential stealers across 24 protocols and siphoned more than 110 million credentials from more than 430,000 devices worldwide."],"insights":["Several incidents involved trusted third parties or integrations, including Texas Parks and Wildlife Department’s license vendor, ShapedPlugin’s official updater, iRhythm’s third-party-hosted business applications, and Klue’s legacy integration credentials.","AI-related threats in the report target both users and AI systems, with EvilTokens abusing Microsoft 365 device-code authentication, a fake AI skill hijacking agents after marketplace approval, and BioShocking AI tricking agentic browsers into exposing credentials and user data.","Some attackers used legitimate or trusted channels to increase impact, such as official plugin updates, trusted marketplaces, Instagram ads, compromised OAuth tokens, and legitimate tools used by FulcrumSec for cloud data exfiltration.","The report shows that credential theft remains a central goal across very different operations, including FortiBleed’s passive credential stealing from FortiGate firewalls, EvilTokens’ Microsoft 365 token theft, and Langflow attacks extracting embedded API keys."],"referencedReports":[{"title":"EvilTokens: AI-Powered Phishing Report","url":"https://www.huntress.com/resources/eviltokens-ai-powered-phishing-report","publisher":"Huntress","context":"The article references Huntress researchers detailing EvilTokens, an AI-powered phishing-as-a-service operation abusing device-code authentication to steal Microsoft 365 tokens.","category":"research","primary":false},{"title":"BioShocking AI: Gaming the AI Browser and Escaping Its Guardrails","url":"https://layerxsecurity.com/blog/bioshocking-ai-gaming-the-ai-browser-and-escaping-its-guardrails/","publisher":"LayerX Security","context":"The article cites LayerX researchers demonstrating BioShocking AI, a technique for tricking agentic browsers into bypassing guardrails.","category":"research","primary":false},{"title":"Understanding Langflow CVE-2026-55255 and Why Higher CVSS Vulnerabilities Aren’t Always the Most Exploited","url":"https://www.sysdig.com/blog/understanding-langflow-cve-2026-55255-and-why-higher-cvss-vulnerabilities-arent-always-the-most-exploited","publisher":"Sysdig","context":"The article references Sysdig’s analysis of targeting against Langflow through CVE-2026-55255 and ongoing mass exploitation of CVE-2026-33017.","category":"research","primary":false},{"title":"From San Pedro to Salinas: How a Chinese Framework, DCloud Uni-App, Powers a Global Scam Economy","url":"https://www.infoblox.com/blog/threat-intelligence/from-san-pedro-to-salinas-how-a-chinese-framework-dcloud-uni-app-powers-a-global-scam-economy/","publisher":"Infoblox","context":"The article cites Infoblox researchers revealing that the Chinese DCloud Uni-App framework powers a large ecosystem of scam domains.","category":"research","primary":false},{"title":"The FulcrumSec Playbook: How to Detect and Stop the Group Behind the Novo Nordisk Breach","url":"https://www.sysdig.com/blog/the-fulcrumsec-playbook-how-to-detect-and-stop-the-group-behind-the-novo-nordisk-breach","publisher":"Sysdig","context":"The article references Sysdig researchers analyzing the FulcrumSec cloud extortion group and its targeting of cloud-native organizations.","category":"research","primary":false}],"body":"\u003cp\u003eCheck Point’s 22nd June Threat Intelligence Report summarizes recent attacks, breaches, AI threats, vulnerabilities, and threat intelligence findings. Reported incidents include a third-party breach affecting Texas Parks and Wildlife Department license customers, a ShapedPlugin supply chain attack through official WordPress plugin updates, a cyberattack on iRhythm Technologies involving third-party-hosted business applications, and a Klue breach tied to compromised legacy integration credentials. The Klue incident involved stolen OAuth tokens connected to customer Salesforce environments and affected clients including Huntress, Recorded Future, Tanium, and Jamf.\u003c/p\u003e\n\n\u003cp\u003eThe report highlights several AI-related threats, including EvilTokens, an AI-powered phishing-as-a-service operation abusing device-code authentication to steal Microsoft 365 tokens. Researchers also crafted a fake AI skill that hijacked more than 26,000 AI agents by abusing trusted marketplaces and Instagram ads. LayerX researchers demonstrated BioShocking AI, a technique that tricks agentic browsers into bypassing guardrails and exposing credentials and user data.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability section covers Cisco’s fix for CVE-2026-20245 in Catalyst SD-WAN Manager, Dify’s version 1.14.2 fixes for four AI platform vulnerabilities, exploited flaws in Ubiquiti UniFi OS, and targeting of Langflow through CVE-2026-55255 and CVE-2026-33017. The threat intelligence section describes the FortiBleed campaign compromising FortiGate firewalls to steal credentials, Turla-linked StockStay espionage malware targeting Ukrainian government and defense organizations, DCloud Uni-App’s use in a large scam domain ecosystem, and FulcrumSec activity against cloud-native organizations. The reported impacts include exposed personal data, stolen protected health information, stolen business and customer data, credential theft, cloud data exfiltration, and exploitation of network and AI platforms.\u003c/p\u003e\n"},{"n":16,"title":"Monthly Newsletter – July 2026","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/monthly-newsletter-july-2026/","time":"13:22","priority":"MAY READ","score":40,"tldr":"Health-ISAC’s July 2026 newsletter highlights upcoming European and Americas Summit deadlines and promotions, plus new cybersecurity resources on autonomous AI vulnerability discovery, third-party IAM, human risk management, and healthcare-focused vulnerabilities.","briefOverview":"\u003cp\u003eHealth-ISAC’s July 2026 newsletter highlights upcoming events, new resources, and recent community activities. It promotes the 2026 Health-ISAC European Summit, scheduled for October 12–16, 2026, in Crete, Greece, with early bird registration and subsidized hotel accommodations. It also describes a Friday post-Summit excursion to Knossos Palace followed by a seaside lunch featuring Cretan cuisine.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also covers regional workshops and the 2026 Health-ISAC Fall Americas Summit, scheduled for November 30–December 4, 2026, in Tucson, Arizona. It states that July 10 is the last day to submit an abstract for the Fall Americas Summit. It also notes that registration opens September 9 with a one-day member sale allowing members to register for US$99.\u003c/p\u003e\n\n\u003cp\u003eSeveral security resources are featured, including joint research by Health-ISAC and Quest Diagnostics on Claude Mythos, an Anthropic AI model described as having autonomous zero-day vulnerability discovery and weaponization capabilities. The newsletter says Mythos could allow non-experts to execute complex exploits independently and that similar tools are projected to proliferate globally by late 2026. Additional resources include a Health-ISAC white paper on managing third-party identity and access management, a Human Risk Management Maturity Model report by Living Security, and an on-demand webinar by Ridge Security on new vulnerabilities aimed at the healthcare industry.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Health-ISAC’s July 2026 newsletter highlights the 2026 Health-ISAC European Summit, scheduled for October 12–16, 2026, in Crete, Greece, with early bird registration and subsidized hotel accommodations.","The newsletter announces a post-Summit Friday excursion to Knossos Palace with an expert guide and a seaside lunch featuring Cretan cuisine.","For the 2026 Health-ISAC Fall Americas Summit in Tucson, Arizona, abstract submissions close on July 10, and registration opens September 9 with a one-day US$99 member sale.","Health-ISAC and Quest Diagnostics conducted joint research on Claude Mythos, an Anthropic AI model described as having autonomous zero-day vulnerability discovery and weaponization capabilities.","The newsletter points to new resources on managing third-party identity and access management, human risk management, and vulnerabilities aimed at the healthcare industry."],"insights":["Health-ISAC frames Claude Mythos as a near-term systemic risk for healthcare by stating that autonomous tools are projected to proliferate globally by late 2026 and could lower the barrier for sophisticated attacks against critical infrastructure.","The newsletter connects third-party identity and access management directly to healthcare risk reduction, emphasizing vendors and partners as a specific area that organizations need to manage appropriately.","Health-ISAC is using event incentives to drive participation, including hotel subsidies for the European Summit and a one-day US$99 member registration sale for the Fall Americas Summit.","The Fall Americas Summit timeline gives prospective speakers a narrow action window, with abstracts due July 10 before registration opens September 9."],"referencedReports":[{"title":"Human Risk Management Maturity Model","url":"https://health-isac.org/claude-mythos-and-its-health-sector-implications/","publisher":"Living Security","context":"The newsletter describes this as a report by Living Security, a Health-ISAC Champion in the Community Services program.","category":"research","primary":false}],"body":"\u003cp\u003eHealth-ISAC’s July 2026 newsletter highlights upcoming events, new resources, and recent community activities. It promotes the 2026 Health-ISAC European Summit, scheduled for October 12–16, 2026, in Crete, Greece, with early bird registration and subsidized hotel accommodations. It also describes a Friday post-Summit excursion to Knossos Palace followed by a seaside lunch featuring Cretan cuisine.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter also covers regional workshops and the 2026 Health-ISAC Fall Americas Summit, scheduled for November 30–December 4, 2026, in Tucson, Arizona. It states that July 10 is the last day to submit an abstract for the Fall Americas Summit. It also notes that registration opens September 9 with a one-day member sale allowing members to register for US$99.\u003c/p\u003e\n\n\u003cp\u003eSeveral security resources are featured, including joint research by Health-ISAC and Quest Diagnostics on Claude Mythos, an Anthropic AI model described as having autonomous zero-day vulnerability discovery and weaponization capabilities. The newsletter says Mythos could allow non-experts to execute complex exploits independently and that similar tools are projected to proliferate globally by late 2026. Additional resources include a Health-ISAC white paper on managing third-party identity and access management, a Human Risk Management Maturity Model report by Living Security, and an on-demand webinar by Ridge Security on new vulnerabilities aimed at the healthcare industry.\u003c/p\u003e\n"},{"n":11,"title":"Martin Lee: Running through the Arctic (and the threat landscape)","source":"blog.talosintelligence.com","sourceColorIdx":6,"link":"https://blog.talosintelligence.com/martin-lee-running-through-the-arctic-and-the-threat-landscape/","time":"10:00","priority":"MAY READ","score":25,"tldr":"Cisco Talos profiles Martin Lee, EMEA Lead, tracing his accidental path from human virus genetics to early internet work and then cybersecurity through spam filtering and early APT detection. His main advice is to stay curious, visible, and open to unexpected career pivots.","briefOverview":"\u003cp\u003eThis article is a Humans of Talos interview with Martin Lee, EMEA Lead at Talos. Lee describes his current job as largely ambassadorial, involving research into changes in the threat landscape and explaining those changes to customers and partners. The article presents his role as a bridge between threat research and the people who need to understand what is important and different.\u003c/p\u003e\n\n\u003cp\u003eLee explains that he began his career researching the genetics of human viruses before discovering the internet very early on. He left academia because he believed the internet would become the biggest invention of his lifetime and wanted to be part of building it. He worked on the early internet and building websites during its rapid growth in the mid to late 1990s.\u003c/p\u003e\n\n\u003cp\u003eAfter the dot-com crash, Lee took a job writing spam filters at a time before spam filters and spam were major problems. In that work, his team began detecting unusual attacks that they later understood were the first APT attacks. The article says this experience launched his cybersecurity career, which has now lasted more than 23 years as the field has grown significantly.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Martin Lee is the EMEA Lead at Talos, where his work is largely ambassadorial and focused on explaining changes in the threat landscape to customers and partners.","Lee began his career researching the genetics of human viruses before leaving academia after discovering the internet early on and deciding it would become a major invention in his lifetime.","After the dot-com crash left him with less work than he wanted, Lee took a job writing spam filters before spam filters and spam itself were major problems.","While writing spam filters, Lee and his team began detecting unusual attacks that they later understood were among the first APT attacks.","The article says Lee’s cybersecurity career began largely by accident and has continued for more than 23 years as the field has grown significantly."],"insights":["Lee’s career path shows that cybersecurity roles can emerge from unexpected backgrounds, including academic research in human viruses and early website-building work.","The article highlights that early spam-filtering work exposed Lee’s team to attacks they did not yet understand, which they later recognized as early APT activity.","Lee’s current role emphasizes that explaining and externalizing threat research to customers and partners is a major part of cybersecurity work, not just conducting the research itself.","The article points to Lee’s use of a sociological lens to examine why some organizations are more resilient than others, showing that security is framed here as partly about organizational behavior."],"referencedReports":[],"body":"\u003cp\u003eThis article is a Humans of Talos interview with Martin Lee, EMEA Lead at Talos. Lee describes his current job as largely ambassadorial, involving research into changes in the threat landscape and explaining those changes to customers and partners. The article presents his role as a bridge between threat research and the people who need to understand what is important and different.\u003c/p\u003e\n\n\u003cp\u003eLee explains that he began his career researching the genetics of human viruses before discovering the internet very early on. He left academia because he believed the internet would become the biggest invention of his lifetime and wanted to be part of building it. He worked on the early internet and building websites during its rapid growth in the mid to late 1990s.\u003c/p\u003e\n\n\u003cp\u003eAfter the dot-com crash, Lee took a job writing spam filters at a time before spam filters and spam were major problems. In that work, his team began detecting unusual attacks that they later understood were the first APT attacks. The article says this experience launched his cybersecurity career, which has now lasted more than 23 years as the field has grown significantly.\u003c/p\u003e\n"}]</script>
