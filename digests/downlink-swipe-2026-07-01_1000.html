<script type="application/json" id="dl-articles">[{"n":1,"title":"Over 900 Oracle E-Business instances exposed to ongoing attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/over-900-oracle-e-business-instances-exposed-to-ongoing-attacks/","time":"12:30","priority":"MUST READ","score":95,"tldr":"Threat actors are actively exploiting CVE-2026-46817, a critical unauthenticated takeover flaw in Oracle E-Business Suite, while Shadowserver reports about 950 EBS instances exposed online. Oracle patched the bug in its May 2026 security update and customers are urged to apply fixes immediately.","briefOverview":"\u003cp\u003eOver 900 Oracle E-Business Suite instances have been found exposed online amid ongoing attacks exploiting a critical flaw tracked as CVE-2026-46817. The vulnerability is in the File Transmission component of the Oracle Payments product and allows malicious actors without privileges and with HTTP network access to take over vulnerable systems through low-complexity attacks. Oracle patched the flaw in its May 2026 Critical Security Patch Update and urged customers to patch immediately.\u003c/p\u003e\n\n\u003cp\u003eThreat intelligence company Defused warned that attackers are actively exploiting CVE-2026-46817, with the first attempts observed over the weekend on Oracle E-Business honeypots. Defused said the vulnerability had no known previous exploitation and no public proof-of-concept code exists. Shadowserver also reported tracking around 950 Oracle E-Business Suite instances exposed online, though the article says it is unknown how many are secured against this flaw.\u003c/p\u003e\n\n\u003cp\u003eThe article places this activity alongside several recent Oracle-related security incidents. CISA recently tagged an older Oracle WebLogic Server flaw as actively exploited, and Oracle also mitigated a critical PeopleSoft Suite zero-day that was used by the ShinyHunters extortion gang to steal data from organizations worldwide. The article also notes that the Clop extortion gang has exploited another Oracle E-Business Suite flaw in zero-day attacks since early August 2025, and that CISA has added 44 Oracle product vulnerabilities to its catalog of actively exploited flaws since November 2021.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Over 900 Oracle E-Business Suite instances have been found exposed online amid ongoing attacks exploiting CVE-2026-46817.","CVE-2026-46817 affects the File Transmission component of Oracle Payments in Oracle E-Business Suite and allows unauthenticated attackers with HTTP network access to take over vulnerable systems through low-complexity attacks.","Oracle patched CVE-2026-46817 in its May 2026 Critical Security Patch Update and urged customers to patch their systems immediately.","Defused reported that it observed an actor exploiting CVE-2026-46817 on Oracle E-Business honeypots over the weekend, while noting that no public proof-of-concept code is known.","Shadowserver said it tracks around 950 Oracle E-Business Suite instances exposed online, but the article says it is unknown how many have been secured against CVE-2026-46817 attacks."],"insights":["Defused reported active exploitation even though Oracle had not yet flagged CVE-2026-46817 as exploited, so defenders cannot rely only on Oracle’s exploitation status when prioritizing this patch.","The reported exploitation occurred despite Defused saying there is no public proof-of-concept code, indicating the activity is not simply copycat use of a widely available exploit.","Shadowserver’s count of around 950 exposed Oracle E-Business Suite instances does not show how many are patched, making external exposure checks and patch verification especially important for affected organizations.","The article places CVE-2026-46817 in a broader pattern of recent Oracle product exploitation, including WebLogic, PeopleSoft, and earlier Oracle E-Business Suite flaws used in data theft and extortion campaigns.","CISA’s catalog includes 44 actively exploited Oracle product vulnerabilities since November 2021, with 13 also abused by ransomware gangs, showing that Oracle enterprise software has repeatedly been targeted in real-world attacks."],"referencedReports":[{"title":"May 2026 Critical Security Patch Update","url":"https://www.oracle.com/security-alerts/cspumay2026.html","publisher":"Oracle","context":"The article says Oracle patched CVE-2026-46817 in its May 2026 Critical Security Patch Update and urged customers to patch immediately.","category":"advisory","primary":false}],"body":"\u003cp\u003eOver 900 Oracle E-Business Suite instances have been found exposed online amid ongoing attacks exploiting a critical flaw tracked as CVE-2026-46817. The vulnerability is in the File Transmission component of the Oracle Payments product and allows malicious actors without privileges and with HTTP network access to take over vulnerable systems through low-complexity attacks. Oracle patched the flaw in its May 2026 Critical Security Patch Update and urged customers to patch immediately.\u003c/p\u003e\n\n\u003cp\u003eThreat intelligence company Defused warned that attackers are actively exploiting CVE-2026-46817, with the first attempts observed over the weekend on Oracle E-Business honeypots. Defused said the vulnerability had no known previous exploitation and no public proof-of-concept code exists. Shadowserver also reported tracking around 950 Oracle E-Business Suite instances exposed online, though the article says it is unknown how many are secured against this flaw.\u003c/p\u003e\n\n\u003cp\u003eThe article places this activity alongside several recent Oracle-related security incidents. CISA recently tagged an older Oracle WebLogic Server flaw as actively exploited, and Oracle also mitigated a critical PeopleSoft Suite zero-day that was used by the ShinyHunters extortion gang to steal data from organizations worldwide. The article also notes that the Clop extortion gang has exploited another Oracle E-Business Suite flaw in zero-day attacks since early August 2025, and that CISA has added 44 Oracle product vulnerabilities to its catalog of actively exploited flaws since November 2021.\u003c/p\u003e\n"},{"n":12,"title":"ARToken: Inside an EvilTokens affiliate panel targeting Microsoft 365","source":"blog.talosintelligence.com","sourceColorIdx":6,"link":"https://blog.talosintelligence.com/artoken-inside-an-eviltokens-affiliate-panel-targeting-microsoft-365/","time":"10:00","priority":"SHOULD READ","score":89,"tldr":"Cisco Talos uncovered ARToken, a sophisticated EvilTokens-linked phishing-as-a-service panel that targets Microsoft 365 with device-code phishing, token theft, PRT persistence, BEC tooling, and SharePoint exfiltration. The research shows the platform has evolved into a full post-compromise operations suite with advanced anti-analysis protections and Cloudflare Workers-based lure infrastructure.","briefOverview":"\u003cp\u003eCisco Talos identified a fully featured phishing-as-a-service operator panel branded ARToken that shares infrastructure, API contracts, and operational patterns with the EvilTokens platform. The panel targets Microsoft 365 and exposes more than 80 API endpoints for device code phishing, Primary Refresh Token persistence, email access, business email compromise operations, and SharePoint exfiltration. Talos found the management panel at dashboard-bl.pamconj[.]com, with its command-and-control API at spx.pamconj[.]com and phishing lures deployed through Cloudflare Workers.\u003c/p\u003e\n\n\u003cp\u003eThe article describes a real lure recovered by Talos that spoofed an accounts-payable contact at a legitimate Wisconsin contractor and targeted an accounts-payable recipient at a U.S. life-sciences company. The messages used an outstanding-invoice theme and displayed what appeared to be a genuine SharePoint tenant link, while the actual link pointed to a near-identical attacker-controlled SharePoint workspace. Talos notes that SPF, DKIM, and DMARC all failed, and that the messages included light per-message mutation such as random hex strings and an inline signature image.\u003c/p\u003e\n\n\u003cp\u003eARToken’s phishing kit uses a seven-layer anti-analysis system that includes user-agent checks, automation detection, browser feature fingerprinting, interaction telemetry, timing gates, and mouse-movement pattern analysis. Its payload extracts the victim email from a URL hint parameter, calls the C2 at /device/start, displays a device code, and directs the victim to microsoft.com/devicelogin. The operator toolkit also includes token refresh and sharing, Outlook inbox access, victim email sending, inbox rule creation, SharePoint and OneDrive operations, Cloudflare Workers deployment management, and a standalone Windows session browser called ARTBrowser.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Cisco Talos identified a phishing-as-a-service operator panel branded ARToken that shares infrastructure, API contracts, and operational patterns with the EvilTokens platform.","The ARToken panel exposes more than 80 API endpoints for device code phishing, Primary Refresh Token persistence, email access, business email compromise operations, and SharePoint exfiltration through a React-based dashboard.","Talos recovered two near-identical phishing messages that spoofed a legitimate Wisconsin contractor and targeted an accounts-payable recipient at a U.S. life-sciences company with an outstanding-invoice lure.","The ARToken phishing kit uses a seven-layer anti-analysis system that includes user-agent checks, automation detection, browser fingerprinting, interaction telemetry, timing gates, and mouse-movement pattern analysis.","The ARToken operator toolkit includes token refresh and sharing, Outlook inbox access, victim email sending, inbox rule creation, SharePoint and OneDrive file operations, Cloudflare Workers deployment management, and a standalone Windows session browser called ARTBrowser."],"insights":["ARToken’s use of genuine SharePoint-hosted links with look-alike tenant names lets phishing destinations inherit SharePoint’s clean reputation while still sending victims to attacker-controlled workspaces.","The article shows that ARToken affiliates can see and use a complete post-compromise workflow from the panel, meaning the operation is designed not just to steal access tokens but to support end-to-end business email compromise activity.","The phishing kit’s client-side behavioral checks are more sophisticated than the server-side anti-bot mechanism previously documented for EvilTokens, indicating that affiliates may deploy upgraded or custom anti-analysis modules independently of the core platform.","The presence of token import and shared access links means ARToken supports collaboration and token reuse across operators, not only tokens captured directly through its own phishing pages.","The kit setting persistAfterPassChange: false indicates operators are explicitly warned that ordinary refresh tokens may be revoked by password resets and that they must either exfiltrate data quickly or escalate to Primary Refresh Token persistence."],"referencedReports":[{"title":"AI-enabled device code phishing campaign April 2026","url":"https://www.microsoft.com/en-us/security/blog/2026/04/06/ai-enabled-device-code-phishing-campaign-april-2026/","publisher":"Microsoft","context":"The article cites Microsoft’s April 2026 publication as confirming the scale of the EvilTokens campaign, including higher success rates, AI-powered lures, and automated device registration for persistent access.","category":"research","primary":true},{"title":"EvilTokens: An AI-Augmented Phishing-as-a-Service for Automating BEC Fraud – Part 2","url":"https://blog.sekoia.io/eviltokens-an-ai-augmented-phishing-as-a-service-for-automating-bec-fraud-part-2/","publisher":"Sekoia","context":"The article references Sekoia’s Part 2 research for previously documented EvilTokens second-stage capabilities, including its AI-augmented BEC pipeline and PRT persistence chain.","category":"research","primary":true}],"body":"\u003cp\u003eCisco Talos identified a fully featured phishing-as-a-service operator panel branded ARToken that shares infrastructure, API contracts, and operational patterns with the EvilTokens platform. The panel targets Microsoft 365 and exposes more than 80 API endpoints for device code phishing, Primary Refresh Token persistence, email access, business email compromise operations, and SharePoint exfiltration. Talos found the management panel at dashboard-bl.pamconj[.]com, with its command-and-control API at spx.pamconj[.]com and phishing lures deployed through Cloudflare Workers.\u003c/p\u003e\n\n\u003cp\u003eThe article describes a real lure recovered by Talos that spoofed an accounts-payable contact at a legitimate Wisconsin contractor and targeted an accounts-payable recipient at a U.S. life-sciences company. The messages used an outstanding-invoice theme and displayed what appeared to be a genuine SharePoint tenant link, while the actual link pointed to a near-identical attacker-controlled SharePoint workspace. Talos notes that SPF, DKIM, and DMARC all failed, and that the messages included light per-message mutation such as random hex strings and an inline signature image.\u003c/p\u003e\n\n\u003cp\u003eARToken’s phishing kit uses a seven-layer anti-analysis system that includes user-agent checks, automation detection, browser feature fingerprinting, interaction telemetry, timing gates, and mouse-movement pattern analysis. Its payload extracts the victim email from a URL hint parameter, calls the C2 at /device/start, displays a device code, and directs the victim to microsoft.com/devicelogin. The operator toolkit also includes token refresh and sharing, Outlook inbox access, victim email sending, inbox rule creation, SharePoint and OneDrive operations, Cloudflare Workers deployment management, and a standalone Windows session browser called ARTBrowser.\u003c/p\u003e\n"},{"n":8,"title":"The SOC Files: ScreenConnect masked as freeware. An inside look at a large-scale campaign","source":"securelist.com","sourceColorIdx":5,"link":"https://securelist.com/tr/the-soc-files-screenconnect-campaign-with-asyncrat/120472/","time":"10:00","priority":"SHOULD READ","score":85,"tldr":"Kaspersky uncovered a large SEO-poisoning campaign in which fake freeware sites distribute trojanized installers that silently install ScreenConnect, enabling attackers to deploy AsyncRAT and maintain remote access. The key risk is that legitimate remote administration tools can be abused at scale while appearing trustworthy to users and enterprise defenses.","briefOverview":"\u003cp\u003eKaspersky Managed Detection and Response investigated an incident where ScreenConnect, a legitimate remote management utility, was used to deploy and execute an AsyncRAT payload. The investigation began with suspicious PowerShell and VBS scripts spawned by a ScreenConnect process and expanded into a broader campaign analysis. Kaspersky found more than 90 spoofed domains localized across 10 languages, with fake sites impersonating popular software such as OBS Studio, DNS Jumper, DS4Windows, Bandicam, Glary Utilities, and Process Hacker.\u003c/p\u003e\n\n\u003cp\u003eThe initial infection was traced to a user-downloaded archive named \u003ccode\u003eobs-studio-windows-x64.zip\u003c/code\u003e from \u003ccode\u003estudioobs.com\u003c/code\u003e, a typosquatted domain mimicking the official OBS Studio site. The archive contained a legitimate Microsoft-signed \u003ccode\u003einstall.exe\u003c/code\u003e, a malicious \u003ccode\u003einstall.res.1033.dll\u003c/code\u003e library loaded through DLL sideloading, and an Assets folder containing both the real impersonated software and ScreenConnect. ScreenConnect was silently installed through \u003ccode\u003emsiexec.exe\u003c/code\u003e while the real software installer ran normally, helping conceal the hidden remote access installation.\u003c/p\u003e\n\n\u003cp\u003eAfter ScreenConnect was installed, it created scripts that added Microsoft Defender exclusions, disabled UAC prompts, decoded and loaded a PE payload, and injected AsyncRAT into \u003ccode\u003eRegAsm.exe\u003c/code\u003e using process hollowing. The malware created a scheduled task named \u003ccode\u003eMasterPackager.Updater\u003c/code\u003e to run every two minutes for persistence and connected to the AsyncRAT C2 domain \u003ccode\u003emora1987.work.gd\u003c/code\u003e. Kaspersky concluded that the campaign targeted both everyday users and corporate networks, with potential objectives including mass credential theft and unauthorized system access for resale on dark web marketplaces.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Kaspersky MDR investigated an incident in which ScreenConnect was used to create and run suspicious PowerShell and VBS scripts that ultimately loaded AsyncRAT into a hollowed RegAsm.exe process.","The initial ScreenConnect installation was traced to a user-downloaded archive named obs-studio-windows-x64.zip from the typosquatted domain studioobs.com, which mimicked the official OBS Studio site.","The malicious archives contained a legitimate Microsoft-signed install.exe file, a rogue install.res.1033.dll library loaded through DLL sideloading, and an Assets folder containing both the impersonated software and ScreenConnect.","Kaspersky identified more than 90 spoofed domains in 10 languages that posed as download sites for popular software such as OBS Studio, DNS Jumper, DS4Windows, Bandicam, Glary Utilities, and Process Hacker.","The malware established persistence with a scheduled task named MasterPackager.Updater and connected to the AsyncRAT command-and-control domain mora1987.work.gd."],"insights":["The campaign’s use of a legitimate, Microsoft-signed install.exe as a consistent component gave investigators a pivot point to uncover related fake installers for multiple unrelated utilities.","The attackers increased the credibility and reach of their fake download pages by using search engine optimization, causing fraudulent sites to appear near the top of organic search results for popular software names.","The installers ran the real requested software alongside ScreenConnect, which could make victims less likely to notice that a remote access tool had also been installed.","ScreenConnect was installed as a service with benign-looking names such as Microsoft Update Service, making new remote administration services with misleading names a practical detection focus.","The campaign separated some landing pages and download hosting across different providers and IP addresses, meaning defenders need to track both spoofed websites and separate archive-hosting domains."],"referencedReports":[],"body":"\u003cp\u003eKaspersky Managed Detection and Response investigated an incident where ScreenConnect, a legitimate remote management utility, was used to deploy and execute an AsyncRAT payload. The investigation began with suspicious PowerShell and VBS scripts spawned by a ScreenConnect process and expanded into a broader campaign analysis. Kaspersky found more than 90 spoofed domains localized across 10 languages, with fake sites impersonating popular software such as OBS Studio, DNS Jumper, DS4Windows, Bandicam, Glary Utilities, and Process Hacker.\u003c/p\u003e\n\n\u003cp\u003eThe initial infection was traced to a user-downloaded archive named \u003ccode\u003eobs-studio-windows-x64.zip\u003c/code\u003e from \u003ccode\u003estudioobs.com\u003c/code\u003e, a typosquatted domain mimicking the official OBS Studio site. The archive contained a legitimate Microsoft-signed \u003ccode\u003einstall.exe\u003c/code\u003e, a malicious \u003ccode\u003einstall.res.1033.dll\u003c/code\u003e library loaded through DLL sideloading, and an Assets folder containing both the real impersonated software and ScreenConnect. ScreenConnect was silently installed through \u003ccode\u003emsiexec.exe\u003c/code\u003e while the real software installer ran normally, helping conceal the hidden remote access installation.\u003c/p\u003e\n\n\u003cp\u003eAfter ScreenConnect was installed, it created scripts that added Microsoft Defender exclusions, disabled UAC prompts, decoded and loaded a PE payload, and injected AsyncRAT into \u003ccode\u003eRegAsm.exe\u003c/code\u003e using process hollowing. The malware created a scheduled task named \u003ccode\u003eMasterPackager.Updater\u003c/code\u003e to run every two minutes for persistence and connected to the AsyncRAT C2 domain \u003ccode\u003emora1987.work.gd\u003c/code\u003e. Kaspersky concluded that the campaign targeted both everyday users and corporate networks, with potential objectives including mass credential theft and unauthorized system access for resale on dark web marketplaces.\u003c/p\u003e\n"},{"n":3,"title":"US lifts export controls on Anthropic’s frontier cybersecurity AI models","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/us-lifts-export-controls-anthropic-cyber-models","time":"13:16","priority":"SHOULD READ","score":82,"tldr":"The U.S. lifted export controls that had forced Anthropic to shut down global access to its Fable 5 cybersecurity AI model, after Anthropic agreed to new safeguards, government testing access, and jailbreak reporting measures. The reversal may shape how frontier cybersecurity AI models are regulated going forward.","briefOverview":"\u003cp\u003eAnthropic restored global access to its Fable 5 model after a roughly three-week shutdown caused by U.S. export controls that barred foreign nationals from accessing the advanced cybersecurity-focused AI tool. The controls were lifted after Anthropic reached a series of agreements with the government. Export controls on the more powerful Mythos 5 model were also fully lifted as of June 30, although access to Mythos 5 remains limited to vetted U.S. organizations through Project Glasswing.\u003c/p\u003e\n\n\u003cp\u003eThe episode was described as the first known use of export control authorities to pull AI software, rather than chips or hardware, from public access. Its reversal may influence how frontier AI models are regulated in the U.S. going forward. The Five Eyes intelligence alliance has warned business leaders that frontier AI models are set to fundamentally transform both offensive and defensive cybersecurity capabilities within months.\u003c/p\u003e\n\n\u003cp\u003eThe initial shutdown was triggered by a technique covered in an Amazon research report, later described by Katie Moussouris of Luta Security as asking the model to fix code with known and planted flaws and then manually assembling outputs into patch-testing scripts. Moussouris argued that this was defensive security work rather than a guardrail bypass, and Anthropic said similar techniques worked against other models including OpenAI\u0026rsquo;s GPT-5.5 and Kimi K2.7. As part of the restoration, Anthropic trained a new safety classifier that blocks the specific technique in more than 99% of cases and committed to measures including expanded government evaluation, rapid jailbreak disclosure, joint research, a shared voluntary standard, and a HackerOne bug bounty program.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Anthropic restored global access to its Fable 5 model after the U.S. government lifted export controls that had barred foreign nationals from accessing the cybersecurity-focused AI tool.","Export controls on Anthropic’s more powerful Mythos 5 model were also fully lifted as of June 30, but access remains restricted to vetted U.S. organizations through Project Glasswing.","The initial shutdown was triggered by a technique described in an Amazon research report, but Katie Moussouris argued that the activity was defensive patch testing rather than a guardrail bypass.","Anthropic said it trained a new safety classifier that blocks the specific technique in more than 99% of cases, and Commerce Department researchers tested and endorsed the updated safeguards.","Anthropic also committed to expanded pre-release government evaluation, rapid disclosure of significant jailbreaks, joint research resources, a shared voluntary security standard, and a HackerOne bug bounty program for cyber jailbreak submissions."],"insights":["The case was the first known use of U.S. export control authorities to remove AI software from public access, rather than restricting chips or hardware.","The technique that triggered the shutdown was later found by Anthropic to work against other models, including OpenAI's GPT-5.5 and Kimi K2.7, which did not face comparable export restrictions.","Katie Moussouris argued that the flagged behavior could not be removed without weakening the model’s usefulness for legitimate defensive security work.","The reversal tied future access to concrete oversight mechanisms, including pre-release government testing, rapid jailbreak disclosure, joint research resources, and a shared voluntary security standard across frontier model providers.","More than 100 cybersecurity professionals warned that restricting Fable 5 could harm defenders because Chinese open-weight models are only months behind the best American models."],"referencedReports":[{"title":"The Fable 5 export controls harm US cyber defense","url":"https://www.lutasecurity.com/post/the-fable-5-export-controls-harm-us-cyber-defense","publisher":"Luta Security","context":"The article says Katie Moussouris of Luta Security described in detail the technique that triggered the shutdown after Anthropic asked her to assess the Amazon research paper.","category":"research","primary":false}],"body":"\u003cp\u003eAnthropic restored global access to its Fable 5 model after a roughly three-week shutdown caused by U.S. export controls that barred foreign nationals from accessing the advanced cybersecurity-focused AI tool. The controls were lifted after Anthropic reached a series of agreements with the government. Export controls on the more powerful Mythos 5 model were also fully lifted as of June 30, although access to Mythos 5 remains limited to vetted U.S. organizations through Project Glasswing.\u003c/p\u003e\n\n\u003cp\u003eThe episode was described as the first known use of export control authorities to pull AI software, rather than chips or hardware, from public access. Its reversal may influence how frontier AI models are regulated in the U.S. going forward. The Five Eyes intelligence alliance has warned business leaders that frontier AI models are set to fundamentally transform both offensive and defensive cybersecurity capabilities within months.\u003c/p\u003e\n\n\u003cp\u003eThe initial shutdown was triggered by a technique covered in an Amazon research report, later described by Katie Moussouris of Luta Security as asking the model to fix code with known and planted flaws and then manually assembling outputs into patch-testing scripts. Moussouris argued that this was defensive security work rather than a guardrail bypass, and Anthropic said similar techniques worked against other models including OpenAI\u0026rsquo;s GPT-5.5 and Kimi K2.7. As part of the restoration, Anthropic trained a new safety classifier that blocks the specific technique in more than 99% of cases and committed to measures including expanded government evaluation, rapid jailbreak disclosure, joint research, a shared voluntary standard, and a HackerOne bug bounty program.\u003c/p\u003e\n"},{"n":9,"title":"Browser-Only Ransomware: From LLM Hallucinations to a Practical Attack Technique","source":"research.checkpoint.com","sourceColorIdx":4,"link":"https://research.checkpoint.com/2026/browser-only-ransomware-from-llm-hallucinations-to-a-practical-attack-technique/","time":"10:05","priority":"SHOULD READ","score":82,"tldr":"Check Point researchers show that LLM-generated malware ideas can turn theoretical browser risks into practical attacks, including a browser-only ransomware technique that abuses Chrome’s File System Access API after a user grants folder access. The most concerning scenario is Android, where fake AI photo tools could persuade users to allow access to photo directories, enabling file theft or encryption without installing an app or exploiting a vulnerability.","briefOverview":"\u003cp\u003eCheck Point Research analyzed nearly 3,000 files attributed to DeepSeek and found a Python Flask sample that implemented a dangerous browser-native technique they call In-Browser Ransomware. The sample, presented as a Discord avatar AI upscaler, was noisy and incomplete, with many claimed capabilities failing at the browser boundary. However, its file-access workflow used real browser features, including \u003ccode\u003eshowOpenFilePicker()\u003c/code\u003e, \u003ccode\u003eshowDirectoryPicker()\u003c/code\u003e, recursive directory traversal, file reading, backend exfiltration, and a ransomware-style warning.\u003c/p\u003e\n\n\u003cp\u003eThe technique abuses the File System Access API, a legitimate browser capability that lets web applications read and modify user-selected files and folders after a permission prompt. Check Point Research said the attack does not require a native payload, APK installation, browser exploit, or root access, but instead relies on social engineering and a legitimate Chrome permission prompt. The article emphasizes that the underlying browser risk was already documented, including in the File System Access specification and the 2023 USENIX Security paper “RoB: Ransomware over Modern Web Browsers.”\u003c/p\u003e\n\n\u003cp\u003eThe researchers used an LLM to build a controlled proof of concept based on the same idea and found the Android scenario especially concerning. Modern Android Chrome exposes the picker-based File System Access API, and the researchers confirmed that Chrome allowed selecting photo directories, including the root of the DCIM folder, during testing. The article states that photo directories can contain highly sensitive personal data, and that a fake AI image-enhancement workflow gives users a plausible reason to approve folder-level access.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Check Point Research analyzed nearly 3,000 files attributed to DeepSeek and found 1,383 files classified as malicious or dangerous by VirusTotal detection or static source analysis.","A DeepSeek-attributed Python Flask sample called InfernoGrabber v9.0 included an incomplete browser-based attack scaffold that used the File System Access API to access local files through a victim-facing Discord avatar AI upscaler lure.","The browser-native ransomware technique relies on social engineering and a legitimate browser permission prompt, rather than a native payload, APK installation, browser exploit, or root access.","Check Point Research tested a controlled proof of concept on Android Chrome and confirmed that Chrome allowed selecting photo directories, including the root of the DCIM folder, for file access after user approval.","The article states that, at the time of analysis, there was no evidence that this browser-native ransomware technique had been adopted as an in-the-wild malware pattern."],"insights":["The article highlights that an AI-generated malware sample can be technically broken yet still reveal a practical abuse path by connecting unrealistic attacker goals to a real browser feature.","The Android case is especially actionable because a fake photo-enhancement workflow gives users a plausible reason to approve folder-level access to high-value photo directories.","The research found that direct ransomware prompts were refused by DeepSeek V4, but removing explicit malicious terms while preserving the same file-processing outcome could still produce harmful browser code.","The article emphasizes that browser folder-access prompts should be treated as security decisions because approving them can give a website meaningful control over sensitive local directories."],"referencedReports":[{"title":"Detecting and Countering Misuse of Claude: August 2025","url":"https://www.anthropic.com/news/detecting-countering-misuse-aug-2025","publisher":"Anthropic","context":"The article cites Anthropic’s published reports on detecting and countering cyber misuse of Claude as an example of AI vendors treating cyber safety as a dedicated control area.","category":"research","primary":false},{"title":"RoB: Ransomware over Modern Web Browsers","url":"https://www.usenix.org/conference/usenixsecurity23/presentation/oz","publisher":"USENIX Security","context":"The article cites this 2023 USENIX Security paper as prior research that studied abuse of the File System Access API to encrypt local files from a malicious web application.","category":"research","primary":true}],"body":"\u003cp\u003eCheck Point Research analyzed nearly 3,000 files attributed to DeepSeek and found a Python Flask sample that implemented a dangerous browser-native technique they call In-Browser Ransomware. The sample, presented as a Discord avatar AI upscaler, was noisy and incomplete, with many claimed capabilities failing at the browser boundary. However, its file-access workflow used real browser features, including \u003ccode\u003eshowOpenFilePicker()\u003c/code\u003e, \u003ccode\u003eshowDirectoryPicker()\u003c/code\u003e, recursive directory traversal, file reading, backend exfiltration, and a ransomware-style warning.\u003c/p\u003e\n\n\u003cp\u003eThe technique abuses the File System Access API, a legitimate browser capability that lets web applications read and modify user-selected files and folders after a permission prompt. Check Point Research said the attack does not require a native payload, APK installation, browser exploit, or root access, but instead relies on social engineering and a legitimate Chrome permission prompt. The article emphasizes that the underlying browser risk was already documented, including in the File System Access specification and the 2023 USENIX Security paper “RoB: Ransomware over Modern Web Browsers.”\u003c/p\u003e\n\n\u003cp\u003eThe researchers used an LLM to build a controlled proof of concept based on the same idea and found the Android scenario especially concerning. Modern Android Chrome exposes the picker-based File System Access API, and the researchers confirmed that Chrome allowed selecting photo directories, including the root of the DCIM folder, during testing. The article states that photo directories can contain highly sensitive personal data, and that a fake AI image-enhancement workflow gives users a plausible reason to approve folder-level access.\u003c/p\u003e\n"},{"n":6,"title":"Microsoft Accelerates Post-Quantum Cryptography Shift to 2029","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/microsoft-accelerates-post-quantum.html","time":"10:41","priority":"SHOULD READ","score":78,"tldr":"Microsoft is accelerating its shift to post-quantum cryptography, aiming to make critical products and services quantum-safe by 2029 as the risk of practical quantum attacks appears to be moving closer. The company says organizations should start building cryptographic inventories and crypto-agile systems now to prepare for migration.","briefOverview":"\u003cp\u003eMicrosoft said it is accelerating its quantum safe security roadmap because advances in quantum computing are shifting the risk timeline. The company aims to transition critical products and services to post-quantum cryptography by 2029. It also plans to incorporate post-quantum cryptography requirements into its Secure Future Initiative.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft identified several focus areas, including upgrading network cryptography by adopting TLS 1.3 and building crypto-agility for stored data. It also plans to transition trust chains such as code signing, certificate issuance, key protection, and update pipelines to post-quantum cryptography. Microsoft said crypto-agility requires removing hard-coded algorithm assumptions and using self-describing cryptographic metadata or versioned ciphertext formats.\u003c/p\u003e\n\n\u003cp\u003eThe announcement comes after a U.S. executive order set deadlines for federal agencies to move high-value assets and high-impact systems to post-quantum cryptography. The article also notes that Google and Cloudflare have committed to moving toward post-quantum cryptography by 2029. The risk includes “harvest now, decrypt later,” where adversaries collect encrypted data now in hopes of decoding it later once large-scale quantum computers become operational.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Microsoft is accelerating its quantum safe security roadmap and aims to transition critical products and services to post-quantum cryptography by 2029.","Microsoft plans to incorporate post-quantum cryptography requirements into its Secure Future Initiative.","Microsoft identified key focus areas including adopting TLS 1.3, building crypto-agility for stored data, and transitioning trust chains such as code signing, certificate issuance, key protection, and update pipelines to post-quantum cryptography.","The development follows a U.S. executive order setting deadlines for federal agencies to move high-value assets and high-impact systems to post-quantum cryptography.","Google and Cloudflare have also announced plans to move toward post-quantum cryptography by 2029."],"insights":["Microsoft frames crypto-agility as a prerequisite for post-quantum migration, specifically calling out the need to remove hard-coded algorithm assumptions and use self-describing metadata or versioned ciphertext formats.","The article highlights trust chains such as code signing, certificate issuance, key protection, and update pipelines as priority areas for post-quantum cryptography, not just encrypted network traffic.","Microsoft says systems should be able to read older ciphertext formats long enough to support migration while writing new data with the newest approved configuration.","The urgency is tied not only to future quantum computers but also to the current risk of “harvest now, decrypt later,” where encrypted data can be collected today for possible decryption later.","Recent research cited in the article suggests quantum attacks against widely used cryptography may require fewer resources than previously realized, including work on breaking ECDLP-256 and potentially RSA-2048 and P-256."],"referencedReports":[{"title":"Post-Quantum Cryptography and Crypto-Agility","url":"https://techcommunity.microsoft.com/blog/post-quantum-crypto-tech-blog/post-quantum-cryptography-and-crypto-agility/4530365","publisher":"Microsoft","context":"The article cites Microsoft’s technical explanation of crypto-agility requirements for post-quantum migration, including metadata and versioned ciphertext formats.","category":"guide","primary":false},{"title":"Safeguarding Cryptocurrency by Disclosing Quantum Vulnerabilities Responsibly","url":"https://research.google/blog/safeguarding-cryptocurrency-by-disclosing-quantum-vulnerabilities-responsibly/","publisher":"Google","context":"The article references Google researchers’ disclosure of improvements to a quantum algorithm for breaking 256-bit elliptic curve cryptography.","category":"research","primary":false},{"title":"New error-correction approach for making Shor’s algorithm practical","url":"https://arxiv.org/abs/2603.28627","publisher":"Caltech and Oratomic","context":"The article cites an academic demonstration of an error-correction approach that could make Shor’s algorithm practical with as few as 10,000 reconfigurable qubits.","category":"research","primary":false}],"body":"\u003cp\u003eMicrosoft said it is accelerating its quantum safe security roadmap because advances in quantum computing are shifting the risk timeline. The company aims to transition critical products and services to post-quantum cryptography by 2029. It also plans to incorporate post-quantum cryptography requirements into its Secure Future Initiative.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft identified several focus areas, including upgrading network cryptography by adopting TLS 1.3 and building crypto-agility for stored data. It also plans to transition trust chains such as code signing, certificate issuance, key protection, and update pipelines to post-quantum cryptography. Microsoft said crypto-agility requires removing hard-coded algorithm assumptions and using self-describing cryptographic metadata or versioned ciphertext formats.\u003c/p\u003e\n\n\u003cp\u003eThe announcement comes after a U.S. executive order set deadlines for federal agencies to move high-value assets and high-impact systems to post-quantum cryptography. The article also notes that Google and Cloudflare have committed to moving toward post-quantum cryptography by 2029. The risk includes “harvest now, decrypt later,” where adversaries collect encrypted data now in hopes of decoding it later once large-scale quantum computers become operational.\u003c/p\u003e\n"},{"n":15,"title":"Where Severity Scores Go Wrong: “Just Add Prototype Pollution”","source":"jfrog.com","sourceColorIdx":8,"link":"https://jfrog.com/blog/where-cve-severity-scores-go-wrong/","time":"13:15","priority":"MAY READ","score":70,"tldr":"JFrog argues that many Axios prototype pollution gadget CVEs are overrated because they are only exploitable when a separate prototype pollution flaw already exists in the same JavaScript runtime. The key takeaway is that severity scores should be treated as a starting point and validated against real-world exploit prerequisites and application context.","briefOverview":"\u003cp\u003eJFrog’s Security Research team examines a recurring problem in vulnerability scoring, using Axios prototype pollution gadget vulnerabilities as a case study. Since April 2026, Axios has released advisories for 10 CVEs that JFrog says all require a pre-existing prototype pollution vulnerability in the same JavaScript process. The article argues that these issues can receive severity ratings from low to critical even when their exploitability depends on additional application-specific conditions.\u003c/p\u003e\n\n\u003cp\u003eThe article demonstrates this with CVE-2026-44494 by chaining a known Lodash prototype pollution vulnerability, CVE-2019-10744, with an Axios proxy injection gadget. In the proof of concept, Lodash 4.17.11 is used to pollute \u003ccode\u003eObject.prototype.proxy\u003c/code\u003e, and Axios then consumes the inherited proxy value when making a request. This causes traffic that would normally go to a legitimate backend server to be routed through an attacker-controlled proxy.\u003c/p\u003e\n\n\u003cp\u003eJFrog emphasizes that Axios does not create the prototype pollution condition, but can turn an already polluted value into a real security impact. In the demonstrated chain, the attacker can intercept, inspect, modify, and potentially steal credentials from HTTP traffic sent through Axios. The broader conclusion is that CVSS and similar scores should be treated as a starting point, because they may reflect the impact of a complete attack chain rather than the standalone risk introduced by a single component.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["JFrog researchers found that 10 Axios CVEs disclosed since April 2026 require a pre-existing prototype pollution vulnerability in the same JavaScript runtime context to be exploitable.","The article’s proof of concept chained Lodash CVE-2019-10744 with Axios CVE-2026-44494 to pollute Object.prototype.proxy and route Axios requests through an attacker-controlled proxy.","JFrog states that Axios is not responsible for creating the prototype pollution condition, but acts as a gadget that consumes a polluted property and turns it into a security impact.","The demonstrated attack chain can enable traffic interception, response modification, and credential theft when sensitive information is transmitted through Axios.","JFrog argues that CVSS and similar severity scores should be treated as a starting point because they may reflect the impact of a complete attack chain rather than the standalone risk introduced by the affected component."],"insights":["JFrog found an additional exploitation prerequisite for CVE-2026-44494 that was not mentioned in the advisory: the user application must not override the attacker-polluted proxy property.","The Axios CVEs show that vulnerabilities with the same underlying dependency on pre-existing prototype pollution can still receive widely different severity ratings, ranging from low to critical.","The proof of concept required Lodash 4.17.11, a version released more than seven years earlier, illustrating how practical exploitability can depend on outdated dependencies beyond the newly reported Axios issue.","JFrog’s reassessment data suggests this scoring problem is broader than Axios, with 96% of NVD critical-severity vulnerabilities and 65% of NVD high-severity vulnerabilities reviewed in 2025 downgraded after practical exploitation factors were considered.","The article highlights a recurring pattern across Axios, DOMPurify, React Router, and Piscina in which gadget-style issues are scored based on their impact inside an already vulnerable environment rather than their standalone exploitability."],"referencedReports":[{"title":"GHSA-35jp-ww65-95wh","url":"https://github.com/axios/axios/security/advisories/GHSA-35jp-ww65-95wh","publisher":"GitHub","context":"The article uses this Axios security advisory as its main example for CVE-2026-44494 and discusses the conditions required for exploitation.","category":"advisory","primary":true},{"title":"GHSA-898c-q2cr-xwhg","url":"https://github.com/axios/axios/security/advisories/GHSA-898c-q2cr-xwhg","publisher":"GitHub","context":"The article cites this Axios advisory for CVE-2026-44490 as another example of an issue that depends on pre-existing prototype pollution.","category":"advisory","primary":true},{"title":"CVE-2024-48910","url":"https://nvd.nist.gov/vuln/detail/CVE-2024-48910","publisher":"NVD","context":"The article references this DOMPurify vulnerability as a prior example of a prototype pollution gadget issue that received a critical severity rating.","category":"advisory","primary":false},{"title":"CVE-2026-42211","url":"https://nvd.nist.gov/vuln/detail/CVE-2026-42211","publisher":"NVD","context":"The article references this React Router vulnerability as another high-severity issue requiring an existing prototype pollution condition.","category":"advisory","primary":false},{"title":"GHSA-x9g3-xrwr-cwfg","url":"https://github.com/advisories/GHSA-x9g3-xrwr-cwfg","publisher":"GitHub","context":"The article references this Piscina advisory as another example of a high-severity prototype pollution gadget vulnerability.","category":"advisory","primary":false}],"body":"\u003cp\u003eJFrog’s Security Research team examines a recurring problem in vulnerability scoring, using Axios prototype pollution gadget vulnerabilities as a case study. Since April 2026, Axios has released advisories for 10 CVEs that JFrog says all require a pre-existing prototype pollution vulnerability in the same JavaScript process. The article argues that these issues can receive severity ratings from low to critical even when their exploitability depends on additional application-specific conditions.\u003c/p\u003e\n\n\u003cp\u003eThe article demonstrates this with CVE-2026-44494 by chaining a known Lodash prototype pollution vulnerability, CVE-2019-10744, with an Axios proxy injection gadget. In the proof of concept, Lodash 4.17.11 is used to pollute \u003ccode\u003eObject.prototype.proxy\u003c/code\u003e, and Axios then consumes the inherited proxy value when making a request. This causes traffic that would normally go to a legitimate backend server to be routed through an attacker-controlled proxy.\u003c/p\u003e\n\n\u003cp\u003eJFrog emphasizes that Axios does not create the prototype pollution condition, but can turn an already polluted value into a real security impact. In the demonstrated chain, the attacker can intercept, inspect, modify, and potentially steal credentials from HTTP traffic sent through Axios. The broader conclusion is that CVSS and similar scores should be treated as a starting point, because they may reflect the impact of a complete attack chain rather than the standalone risk introduced by a single component.\u003c/p\u003e\n"},{"n":7,"title":"Four Days Old, Fully Authenticated: CEO Coaching International Impersonation Targets a Sports Technology Company","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/ceo-coaching-impersonation-collections-pressure-invoice-fraud","time":"11:00","priority":"MAY READ","score":68,"tldr":"Attackers used a four-day-old lookalike domain to impersonate CEO Coaching International and send a fake overdue invoice with collections pressure to a sports technology company. Although SPF, DKIM, and DMARC passed through SendGrid, header inspection revealed the authenticated sending domain did not match the claimed sender, exposing the fraud.","briefOverview":"\u003cp\u003eAttackers registered \u003ccode\u003eceo-coachinginc[.]com\u003c/code\u003e on March 6, 2026, and used it four days later to send an invoice fraud email to a sports-technology company. The message impersonated CEO Coaching International and claimed to come from “Carol Smith, CPA,” a fabricated persona. It included a fake overdue invoice and warned that the matter would be referred to a collections agency if not resolved.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that the email passed SPF, DKIM, and DMARC, but those checks authenticated an unrelated SendGrid sending domain rather than the visible sender domain. The DKIM signing domain and Return-Path were tied to \u003ccode\u003eunrelated-sender[.]example\u003c/code\u003e, while replies were directed to attacker-controlled addresses at \u003ccode\u003eceo-coachinginc[.]com\u003c/code\u003e and \u003ccode\u003eazur-email[.]com\u003c/code\u003e. The article says strict alignment checking between the DKIM signing domain and the From domain would have flagged the mismatch.\u003c/p\u003e\n\n\u003cp\u003eThe attack also used a fabricated prior email thread with inconsistent dates, including references from February 5, 2025, and February 27, 2026. Themis scored the message at 63% confidence, below the threshold that would usually trigger automatic remediation in many deployments. IRONSCALES surfaced it for analyst review by combining signals including the four-day-old lookalike domain, authentication domain mismatch, financial theme, and collections-pressure language.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Attackers registered the lookalike domain ceo-coachinginc.com on March 6, 2026, and used it on March 10, 2026, to send an invoice fraud email to a sports-technology company.","The email impersonated CEO Coaching International and claimed to be from a fabricated persona, Carol Smith, CPA, while pressuring the recipient with an overdue invoice and a collections-agency threat.","The message passed SPF, DKIM, and DMARC, but the DKIM-signing and Return-Path domain was an unrelated SendGrid domain rather than ceo-coachinginc.com.","The Reply-To addresses included carol@ceo-coachinginc.com and admin@azur-email.com, giving the attackers two inboxes to receive responses.","Themis scored the message at 63% confidence, and IRONSCALES surfaced it for analyst review based on combined signals including the new domain, domain mismatch, financial theme, and urgency language."],"insights":["A full SPF, DKIM, and DMARC pass can still be misleading when the authenticated sending domain is unrelated to the visible sender domain.","Strict checking that the DKIM signing domain matches the From domain would have flagged this message before it reached a mailbox.","The fabricated prior thread contained a 13-month gap between adjacent messages, showing that close reading of quoted email history can expose invoice fraud.","The 63% Themis score was below typical automatic remediation thresholds, so the article emphasizes the value of combining weaker signals rather than relying on one decisive indicator.","A second Reply-To address on a separate domain gave the attacker a backup path to capture responses if the victim replied."],"referencedReports":[{"title":"2026 Data Breach Investigations Report","url":"https://www.verizon.com/business/resources/T742/reports/2026-dbir-data-breach-investigations-report.pdf","publisher":"Verizon","context":"The article cites the Verizon DBIR 2026 for its finding that pretexting and BEC represent the highest-value social engineering loss category.","category":"research","primary":false},{"title":"MITRE ATT\u0026CK Technique T1566.001: Spearphishing Attachment","url":"https://attack.mitre.org/techniques/T1566/001/","publisher":"MITRE ATT\u0026CK","context":"The article references MITRE ATT\u0026CK to classify attachment-based invoice delivery as T1566.001.","category":"research","primary":false},{"title":"Recognize and Report Phishing","url":"https://www.cisa.gov/secure-our-world/recognize-and-report-phishing","publisher":"CISA","context":"The article cites CISA guidance advising out-of-band confirmation for payment requests received by email.","category":"guide","primary":false}],"body":"\u003cp\u003eAttackers registered \u003ccode\u003eceo-coachinginc[.]com\u003c/code\u003e on March 6, 2026, and used it four days later to send an invoice fraud email to a sports-technology company. The message impersonated CEO Coaching International and claimed to come from “Carol Smith, CPA,” a fabricated persona. It included a fake overdue invoice and warned that the matter would be referred to a collections agency if not resolved.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that the email passed SPF, DKIM, and DMARC, but those checks authenticated an unrelated SendGrid sending domain rather than the visible sender domain. The DKIM signing domain and Return-Path were tied to \u003ccode\u003eunrelated-sender[.]example\u003c/code\u003e, while replies were directed to attacker-controlled addresses at \u003ccode\u003eceo-coachinginc[.]com\u003c/code\u003e and \u003ccode\u003eazur-email[.]com\u003c/code\u003e. The article says strict alignment checking between the DKIM signing domain and the From domain would have flagged the mismatch.\u003c/p\u003e\n\n\u003cp\u003eThe attack also used a fabricated prior email thread with inconsistent dates, including references from February 5, 2025, and February 27, 2026. Themis scored the message at 63% confidence, below the threshold that would usually trigger automatic remediation in many deployments. IRONSCALES surfaced it for analyst review by combining signals including the four-day-old lookalike domain, authentication domain mismatch, financial theme, and collections-pressure language.\u003c/p\u003e\n"},{"n":13,"title":"StepSecurity Maintained Actions Are Now Free for Public Repos","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/stepsecurity-maintained-actions-are-now-free-for-public-repos","time":"13:41","priority":"MAY READ","score":68,"tldr":"StepSecurity is making its Maintained Actions catalog free for public GitHub repositories, giving open-source projects secure drop-in replacements for risky, abandoned, or compromised third-party GitHub Actions. Private repositories still require a StepSecurity subscription.","briefOverview":"\u003cp\u003eStepSecurity announced that StepSecurity Maintained Actions are now free for public GitHub repositories. The company describes these actions as secure, drop-in replacements for popular third-party GitHub Actions, designed to be API-compatible with the originals so projects can switch by changing workflow references. Private repositories still require a StepSecurity subscription.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the change around the growing risk of third-party GitHub Actions, which can run inside CI/CD environments with access to secrets, cloud credentials, and source code. It highlights the March 2025 compromise of tj-actions/changed-files, used by more than 23,000 repositories, where attackers updated version tags to point to a malicious commit that exposed CI/CD secrets in workflow logs. StepSecurity says its Harden-Runner detected the incident and that its secure replacement, step-security/changed-files, has since been adopted by thousands of enterprises and more than 3,000 open-source projects.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity says its maintained actions use manual secure code review, strict access controls, signed commits, reviewer approvals, security checks, tag protection, secure release workflows, dependency monitoring, and monthly upstream synchronization. The catalog contains 500 maintained actions, including replacements for several archived actions such as 8398a7/action-slack, tibdex/github-app-token, SwiftDocOrg/swift-doc, and actions-rs/toolchain. Enterprise tier customers can also use Policy-Driven PRs to automatically open pull requests that replace supported third-party actions across repositories.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["StepSecurity announced that its Maintained Actions are now free for public GitHub repositories, while private repositories require a StepSecurity subscription.","StepSecurity Maintained Actions are secure, drop-in replacements for popular third-party GitHub Actions and are designed to be API-compatible with the originals.","The March 2025 compromise of tj-actions/changed-files, used by over 23,000 repositories, exposed CI/CD secrets in workflow logs and was detected by StepSecurity's Harden-Runner.","StepSecurity says its maintained actions use controls including manual secure code review, strict access control, branch and tag protection, secure release processes, dependency monitoring, and monthly upstream synchronization.","StepSecurity currently offers 500 maintained actions and provides Policy-Driven PRs for enterprise customers to replace supported third-party actions across repositories automatically."],"insights":["The tj-actions/changed-files compromise showed that changing version tags to point to malicious code can be enough to affect thousands of dependent repositories, so StepSecurity’s maintained actions default to preventing tag creation or changes except during controlled releases.","StepSecurity’s drop-in compatibility means many projects can reduce third-party action risk with a simple workflow reference change rather than redesigning their build or deployment process.","The article highlights abandoned, single-maintainer, low-score, and credential-accessing actions as practical criteria for deciding which GitHub Actions should be replaced first.","Open-source projects can now adopt the same maintained-action replacements that StepSecurity previously limited to enterprise customers, removing cost as a barrier for public repositories that depend on risky third-party actions."],"referencedReports":[],"body":"\u003cp\u003eStepSecurity announced that StepSecurity Maintained Actions are now free for public GitHub repositories. The company describes these actions as secure, drop-in replacements for popular third-party GitHub Actions, designed to be API-compatible with the originals so projects can switch by changing workflow references. Private repositories still require a StepSecurity subscription.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the change around the growing risk of third-party GitHub Actions, which can run inside CI/CD environments with access to secrets, cloud credentials, and source code. It highlights the March 2025 compromise of tj-actions/changed-files, used by more than 23,000 repositories, where attackers updated version tags to point to a malicious commit that exposed CI/CD secrets in workflow logs. StepSecurity says its Harden-Runner detected the incident and that its secure replacement, step-security/changed-files, has since been adopted by thousands of enterprises and more than 3,000 open-source projects.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity says its maintained actions use manual secure code review, strict access controls, signed commits, reviewer approvals, security checks, tag protection, secure release workflows, dependency monitoring, and monthly upstream synchronization. The catalog contains 500 maintained actions, including replacements for several archived actions such as 8398a7/action-slack, tibdex/github-app-token, SwiftDocOrg/swift-doc, and actions-rs/toolchain. Enterprise tier customers can also use Policy-Driven PRs to automatically open pull requests that replace supported third-party actions across repositories.\u003c/p\u003e\n"},{"n":5,"title":"2026 Cybersecurity Assessment: The Gap Between Awareness and Resilience","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/2026-cybersecurity-assessment-gap.html","time":"11:30","priority":"MAY READ","score":58,"tldr":"Bitdefender’s 2026 Cybersecurity Assessment finds that organizations increasingly understand risks like AI misuse, attack surface exposure, and breach transparency, but struggle to turn that awareness into real operational resilience. The biggest gap is not knowing what matters, but having the visibility, resources, and culture to act on it effectively.","briefOverview":"\u003cp\u003eThe article summarizes findings from the 2026 Bitdefender Cybersecurity Assessment, an independent survey of 1,200 IT and cybersecurity professionals across six countries. It argues that organizations are more aware of cyber risk than ever, but still struggle to turn that awareness into operational resilience. The findings highlight contradictions around AI visibility, attack surface reduction, attention to current threats, and transparency after breaches.\u003c/p\u003e\n\n\u003cp\u003eA major theme is that AI has become both a top priority and a blind spot for organizations. While 51.8% of respondents believe they have full visibility into sanctioned and unsanctioned AI use, 47.4% say they have only partial or no visibility into Shadow AI tools or personal AI accounts used for work. The gap is wider between roles, with nearly 58% of managers saying they have complete visibility compared with 45.9% of practitioners.\u003c/p\u003e\n\n\u003cp\u003eThe assessment also finds that organizations understand the importance of reducing attack surfaces but face barriers such as maintaining hardening policies and exceptions, avoiding business disruption, and limited resources. Security professionals ranked AI-related threats as their top concerns, yet Bitdefender Labs found that 84% of high-severity attacks used Living off the Land techniques, while only one in five respondents ranked those attacks among their top three concerns. The article also reports that 55.2% of respondents who experienced a breach said they were instructed to keep it confidential despite believing authorities should have been notified, rising to 68.6% in the United States.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The 2026 Bitdefender Cybersecurity Assessment surveyed 1,200 IT and cybersecurity professionals across six countries and found a gap between cyber risk awareness and operational resilience.","While 51.8% of respondents believe they have full visibility into sanctioned and unsanctioned AI use, 47.4% say they have only partial or no visibility into Shadow AI tools or personal AI accounts used for work.","Respondents identified maintaining hardening policies and exceptions, fear of disrupting business operations, and limited resources as the biggest obstacles to reducing the attack surface.","Security professionals ranked AI-related threats as their top three concerns, but Bitdefender Labs found that 84% of high-severity attacks leveraged Living off the Land techniques while only one in five respondents ranked those attacks among their top three concerns.","More than half of respondents who experienced a breach in the previous twelve months said they were instructed to keep the incident confidential despite believing authorities should have been notified, with the figure rising to 68.6% in the United States."],"insights":["A major visibility gap exists between managers and practitioners on employee AI use, with nearly 58% of managers claiming complete visibility compared with only 45.9% of practitioners.","The article suggests that AI may be pulling attention away from already common and damaging techniques, since AI-related threats dominate concern while Living off the Land techniques appeared in 84% of high-severity attacks.","Attack surface reduction appears to be limited less by lack of agreement and more by execution barriers such as maintaining exceptions, avoiding business disruption, and not knowing which tools users actually need.","Breach response culture remains a resilience problem, as many professionals report being told to keep incidents confidential even when they believe authorities should be notified."],"referencedReports":[],"body":"\u003cp\u003eThe article summarizes findings from the 2026 Bitdefender Cybersecurity Assessment, an independent survey of 1,200 IT and cybersecurity professionals across six countries. It argues that organizations are more aware of cyber risk than ever, but still struggle to turn that awareness into operational resilience. The findings highlight contradictions around AI visibility, attack surface reduction, attention to current threats, and transparency after breaches.\u003c/p\u003e\n\n\u003cp\u003eA major theme is that AI has become both a top priority and a blind spot for organizations. While 51.8% of respondents believe they have full visibility into sanctioned and unsanctioned AI use, 47.4% say they have only partial or no visibility into Shadow AI tools or personal AI accounts used for work. The gap is wider between roles, with nearly 58% of managers saying they have complete visibility compared with 45.9% of practitioners.\u003c/p\u003e\n\n\u003cp\u003eThe assessment also finds that organizations understand the importance of reducing attack surfaces but face barriers such as maintaining hardening policies and exceptions, avoiding business disruption, and limited resources. Security professionals ranked AI-related threats as their top concerns, yet Bitdefender Labs found that 84% of high-severity attacks used Living off the Land techniques, while only one in five respondents ranked those attacks among their top three concerns. The article also reports that 55.2% of respondents who experienced a breach said they were instructed to keep it confidential despite believing authorities should have been notified, rising to 68.6% in the United States.\u003c/p\u003e\n"},{"n":2,"title":"Microsoft fixes GIF functionality in the Windows Emoji Panel","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-fixes-gif-functionality-in-the-windows-emoji-panel/","time":"10:52","priority":"MAY READ","score":55,"tldr":"Microsoft fixed broken GIF search in the Windows 11 Emoji Panel for newer Windows 11 versions by switching from Tenor to GIPHY in the optional KB5095093 update. Windows 11 23H2 and Windows Server 2025 are still awaiting a fix.","briefOverview":"\u003cp\u003eMicrosoft has fixed GIF functionality in the Windows Emoji Panel for Windows 11 users after the previous provider shut down its service. The feature stopped working for some users on June 30, 2026, after Google’s Tenor GIF search engine retired its API. Affected users saw a message saying “GIF service is not available.”\u003c/p\u003e\n\n\u003cp\u003eMicrosoft restored the feature for Windows 11 24H2, 25H2, and 26H1 users by switching to GIPHY in the preview KB5095093 Windows cumulative update released on June 23. The company said users can restore GIF functionality by installing the latest available Windows updates. Microsoft is still working on a fix for Windows 11 23H2 and Windows Server 2025 and has not provided a timeline.\u003c/p\u003e\n\n\u003cp\u003eUsers can install KB5095093 through the Microsoft Update Catalog or by checking for updates in Windows Update. Because it is an optional update, users may need to click “Download and install” unless they have enabled “Get the latest updates as soon as they’re available.” The update also includes the Point-in-Time Restore feature and fixes a Recycle Bin bug that showed internal file names instead of normal filenames in deletion confirmation dialogs.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Microsoft fixed the GIF functionality in the Windows Emoji Panel for Windows 11 24H2, 25H2, and 26H1 users by switching from Tenor to GIPHY in the preview KB5095093 cumulative update released on June 23.","The GIF feature stopped working for some users on June 30 because Google’s Tenor GIF search engine retired its application programming interface on that date.","Microsoft said users can restore GIF functionality by installing the latest available Windows updates, including KB5095093.","Microsoft is still working on a fix for the same issue on Windows 11 23H2 and Windows Server 2025 and has not provided a timeline.","The KB5095093 preview update also includes the Point-in-Time Restore feature and fixes a Recycle Bin confirmation dialog bug that showed internal file names instead of normal filenames."],"insights":["The fix is currently delivered through an optional preview update, so some users may need to manually choose “Download and install” unless they have enabled “Get the latest updates as soon as they're available.”","The same GIF outage has different remediation status across supported Microsoft products, with Windows 11 24H2, 25H2, and 26H1 fixed while Windows 11 23H2 and Windows Server 2025 remain unresolved.","A third-party service retirement directly broke a built-in Windows user interface feature, showing that the Emoji Panel’s GIF search depended on an external provider.","Installing KB5095093 addresses more than the GIF issue, because the update also adds Point-in-Time Restore and fixes the Recycle Bin confirmation dialog filename bug."],"referencedReports":[{"title":"KB5095093","url":"https://support.microsoft.com/help/5095093","publisher":"Microsoft","context":"The article references Microsoft’s KB5095093 preview Windows cumulative update as the update that switches the Windows Emoji Panel GIF provider to GIPHY and restores GIF functionality for Windows 11 24H2, 25H2, and 26H1 users.","category":"advisory","primary":true}],"body":"\u003cp\u003eMicrosoft has fixed GIF functionality in the Windows Emoji Panel for Windows 11 users after the previous provider shut down its service. The feature stopped working for some users on June 30, 2026, after Google’s Tenor GIF search engine retired its API. Affected users saw a message saying “GIF service is not available.”\u003c/p\u003e\n\n\u003cp\u003eMicrosoft restored the feature for Windows 11 24H2, 25H2, and 26H1 users by switching to GIPHY in the preview KB5095093 Windows cumulative update released on June 23. The company said users can restore GIF functionality by installing the latest available Windows updates. Microsoft is still working on a fix for Windows 11 23H2 and Windows Server 2025 and has not provided a timeline.\u003c/p\u003e\n\n\u003cp\u003eUsers can install KB5095093 through the Microsoft Update Catalog or by checking for updates in Windows Update. Because it is an optional update, users may need to click “Download and install” unless they have enabled “Get the latest updates as soon as they’re available.” The update also includes the Point-in-Time Restore feature and fixes a Recycle Bin bug that showed internal file names instead of normal filenames in deletion confirmation dialogs.\u003c/p\u003e\n"},{"n":14,"title":"Secure Registry now tells you which machine pulled a compromised package","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/secure-registry-now-tells-you-which-machine-pulled-a-compromised-package","time":"13:09","priority":"MAY READ","score":55,"tldr":"StepSecurity’s Secure Registry now shows exactly which developer machine or CI pipeline pulled a suspicious or compromised npm/PyPI package, helping teams quickly scope incidents. The feature adds source attribution to package request audit logs so responders can identify and investigate affected systems without searching scattered install logs.","briefOverview":"\u003cp\u003eOn June 17, 2026, an attacker compromised the @mastra npm organization and added easy-day-js, a typosquat of the dayjs date library, as a dependency across more than 140 packages in the Mastra AI framework ecosystem. The malicious version included an obfuscated postinstall dropper that downloaded a second-stage payload from an attacker-controlled server and then deleted itself. Packages with more than 1.1 million combined weekly downloads were exposed before the campaign was caught.\u003c/p\u003e\n\n\u003cp\u003eThe article says the urgent question during incidents like this is where the compromised package landed, including which developer laptops or CI pipelines pulled it. It also notes that two GitHub Actions, codfish/semantic-release-action and simonecorsi/mawesome, were compromised on June 24, reinforcing the need to identify affected environments quickly. StepSecurity says Secure Registry now answers this by adding Source and Source Identifier columns to its Policy Evaluations log for npm and PyPI requests.\u003c/p\u003e\n\n\u003cp\u003eSecure Registry can link requests from developer machines to a device page showing installed IDE extensions, AI agents, MCP servers, OSS packages, and suspicious files. Requests from GitHub Actions can link to a Harden-Runner workflow run with outbound network destinations, file write events, and detections. Attribution is opt-in and works by appending an identifier suffix to the registry auth token, while requests without a suffix continue to work but appear without a source.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["On June 17, 2026, an attacker compromised the @mastra npm organization and added easy-day-js, a typosquat of the dayjs date library, as a dependency across more than 140 packages in the Mastra AI framework ecosystem.","The malicious easy-day-js version included an obfuscated postinstall dropper that downloaded a second-stage payload from an attacker-controlled server and then deleted itself.","StepSecurity’s Secure Registry now adds Source and Source Identifier columns to its audit log to attribute every npm and PyPI request to the machine or pipeline that made it.","A request from a developer machine can link to that device’s page, while a request from GitHub Actions can link to the corresponding Harden-Runner workflow run.","Secure Registry attribution is opt-in and works by appending an identifier suffix to the registry auth token for developer machines or CI/CD pipelines."],"insights":["The article emphasizes that in a package compromise, identifying where the bad package ran is the first practical response question, even before analyzing the payload in detail.","Secure Registry’s attribution can let teams scope exposure by filtering package and version in a central policy log, avoiding the need to search install logs across individual laptops and CI systems.","The feature is designed to preserve existing package workflows because unattributed requests still work normally, while adding a token suffix enables machine or pipeline attribution.","The linked context for each source changes the investigation path: developer machine requests can be reviewed alongside installed tools and suspicious files, while GitHub Actions requests can be reviewed alongside network destinations, file writes, and detections."],"referencedReports":[],"body":"\u003cp\u003eOn June 17, 2026, an attacker compromised the @mastra npm organization and added easy-day-js, a typosquat of the dayjs date library, as a dependency across more than 140 packages in the Mastra AI framework ecosystem. The malicious version included an obfuscated postinstall dropper that downloaded a second-stage payload from an attacker-controlled server and then deleted itself. Packages with more than 1.1 million combined weekly downloads were exposed before the campaign was caught.\u003c/p\u003e\n\n\u003cp\u003eThe article says the urgent question during incidents like this is where the compromised package landed, including which developer laptops or CI pipelines pulled it. It also notes that two GitHub Actions, codfish/semantic-release-action and simonecorsi/mawesome, were compromised on June 24, reinforcing the need to identify affected environments quickly. StepSecurity says Secure Registry now answers this by adding Source and Source Identifier columns to its Policy Evaluations log for npm and PyPI requests.\u003c/p\u003e\n\n\u003cp\u003eSecure Registry can link requests from developer machines to a device page showing installed IDE extensions, AI agents, MCP servers, OSS packages, and suspicious files. Requests from GitHub Actions can link to a Harden-Runner workflow run with outbound network destinations, file write events, and detections. Attribution is opt-in and works by appending an identifier suffix to the registry auth token, while requests without a suffix continue to work but appear without a source.\u003c/p\u003e\n"},{"n":4,"title":"Japanese insurer, brewer, manufacturer and telecom disclose cyber breaches","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/japan-cyber-breaches-aflac-sapporo-nidec-kddi","time":"13:10","priority":"MAY READ","score":40,"tldr":"Several major Japanese companies, including Aflac Japan, Sapporo subsidiaries, Nidec and KDDI, disclosed separate cyber incidents involving exposed customer data, suspected data theft, ransomware claims and compromised email credentials. The largest was Aflac Japan, where personal information for about 4.38 million policyholders was exposed.","briefOverview":"\u003cp\u003eSeveral major Japanese companies disclosed cyber incidents over the past two weeks involving an insurer, a telecommunications provider, an electronic components maker, and a beverage producer. The incidents exposed customer data, disrupted internal systems, and prompted investigations. The article says there is no evidence so far that the incidents are connected or were carried out by the same threat actor.\u003c/p\u003e\n\n\u003cp\u003eAflac Life Insurance Japan reported the largest disclosed breach, saying hackers compromised its customer portal and other systems and exposed personal information for about 4.38 million policyholders. The exposed data included names, addresses, and phone numbers, while about 230,000 customers also had premium payment account information compromised. Aflac said it suspended parts of its systems but continued handling claims and customer inquiries through call centers and other channels, and said the incident was limited to its Japanese operations.\u003c/p\u003e\n\n\u003cp\u003eSapporo Holdings disclosed suspected unauthorized access affecting Singapore-based Pokka and Canadian brewer Sleeman Breweries, and said it shut down affected systems while investi
