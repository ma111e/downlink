"Nimbus RAT: How Threat Actors Are Abusing Microsoft Teams and Google Drive to Deploy a Java RAT","url":"https://www.esentire.com/blog/nimbus-rat-how-threat-actors-are-abusing-microsoft-teams-and-google-drive-to-deploy-a-java-rat","publisher":"eSentire","context":"The article links to this technical analysis when explaining how Microsoft Teams voice phishing and Google Drive were used to deploy Nimbus RAT.","category":"","primary":false},{"title":"FROST: Fingerprinting Remotely using OPFS-based SSD Timing","url":"https://hannesweissteiner.com/pdfs/frost.pdf","publisher":"Graz University of Technology and Liebherr-Transportation Systems GmbH","context":"The article cites this academic study to explain a browser-based side-channel attack that uses SSD timing through OPFS to infer user activity.","category":"","primary":false},{"title":"EvilTokens and OAuth Abuse","url":"https://www.netcraft.com/blog/eviltokens-and-oauth-abuse","publisher":"Netcraft","context":"The article references this report for details on large-scale device code phishing campaigns using the EvilTokens phishing kit.","category":"","primary":false},{"title":"RatPressto Phishing Kit","url":"https://www.fortra.com/blog/ratpressto-phishing-kit","publisher":"Fortra","context":"The article cites this report while describing an active campaign using RatPressto hosted on compromised WordPress sites to deploy ScreenConnect.","category":"","primary":false},{"title":"Inside the Influence and Fraud Patriot Bait Campaign","url":"https://www.trendmicro.com/en_us/research/26/e/inside-the-influence-and-fraud-patriot-bait-campaign.html","publisher":"Trend Micro","context":"The article links to this research on a solo Russian-speaking threat actor that used jailbroken Google Gemini for AI-assisted fraud, credential theft, and influence operations.","category":"","primary":false},{"title":"SonicWall scanning spike echoes pattern that preceded CVE-2026-0400","url":"https://www.greynoise.io/blog/sonicwall-scanning-spike-echoes-pattern-preceded-cve-2026-0400","publisher":"GreyNoise","context":"The article references this analysis to highlight a recent spike in scanning of SonicWall SonicOS management interfaces.","category":"","primary":false},{"title":"Behind Payload: In-Depth Technical Analysis of Payload Ransomware","url":"https://darkatlas.io/blog/behind-payload-in-depth-technical-analysis-of-payload-ransomware","publisher":"Dark Atlas","context":"The article cites this technical analysis when discussing the emergence and victimology of the Payload ransomware family.","category":"","primary":false}],"body":"\u003cp\u003eThis weekly recap highlights a surge of active exploitation, newly disclosed flaws, and AI-enabled cyber activity across enterprise software, developer ecosystems, and phishing operations. The top threat is active exploitation of CVE-2026-0257, an authentication bypass in Palo Alto Networks PAN-OS and Prisma Access that can allow attackers to establish VPN connections under specific GlobalProtect configurations. The article frames the overall pattern as old weaknesses being repackaged and abused faster, with attackers repeatedly succeeding through default settings, exposed services, and low-cost distribution channels.\u003c/p\u003e\n\n\u003cp\u003eThe roundup also emphasizes a critical unpatched zero-day in Gogs that can lead to remote code execution through malicious pull request branch names, coordinated action against the GlassWorm malware operation, and CERT-In guidance urging very rapid patching for exploited vulnerabilities. Several items show AI being woven into campaigns, including GREYVIBE’s use of large language models in operations against Ukraine and phishing or malware delivery campaigns tied to chatbot search manipulation and OAuth device code abuse. Additional coverage spans a newly disclosed Linux local privilege escalation flaw called CIFSwitch, active exploitation of a patched Windows Netlogon bug, broad smishing activity across 19 countries, and the growing use of trusted platforms like Microsoft Teams, Google Drive, and compromised WordPress sites in intrusion chains.\u003c/p\u003e\n"},{"n":21,"title":"The Security Growth Platform: Why MSPs Are Moving Beyond vCISO Tools","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/the-security-growth-platform-why-msps.html","time":"11:30","priority":"MAY READ","score":40,"tldr":"The article argues that MSPs have outgrown traditional vCISO and GRC tools and now need a broader “Security Growth Platform” that combines security management, compliance, multi-tenant operations, and revenue growth features in one system. Its main takeaway is that scaling a modern MSP security practice requires portfolio-level delivery and business intelligence, not just advisory tooling for individual engagements.","briefOverview":"\u003cp\u003eThe article argues that MSPs and MSSPs have outgrown the term and tooling associated with a traditional “vCISO platform” and now require what it calls a “Security Growth Platform.” It says the modern security practice for service providers must combine security program management, CISO-grade decision intelligence, multi-tenant portfolio architecture, and revenue intelligence in a single system. The piece positions this shift as a response to expanding SMB security demand and the limitations of both enterprise-first GRC tools and standalone vCISO products.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, three structural gaps created this new category: enterprise GRC platforms were built for direct end-customer use, standalone vCISO tools lack compliance and automation depth, and enterprise-first compliance platforms often compete with the channel. It defines a Security Growth Platform through five capabilities, including built-in CISO intelligence, unified management across 40+ frameworks, full lifecycle security management, portfolio-level revenue intelligence, and MSP-scale multi-tenant design. Cynomi is presented as the named example of this category, and the article cites partner outcomes such as reduced assessment workload, margin improvement, revenue growth, and shorter discovery time.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article presents a market argument that MSPs and MSSPs in 2026 need something broader than a conventional “vCISO platform.” It introduces the term “Security Growth Platform” to describe software built specifically for service providers that must deliver, scale, and grow security practices across portfolios of SMB clients. In this framing, the key unit of work is no longer a single engagement but the entire client portfolio.\u003c/p\u003e\n\n\u003cp\u003eTo support this shift, the article cites SMB cybersecurity spending projections from Analysys Mason, stating that SMB spending is expected to reach $109 billion in 2026 and account for roughly 60% of global cybersecurity spend. It also notes that many SMBs do not have internal CISO functions, meaning the MSP effectively becomes the security function. The article argues that this operational reality pushes service providers beyond assessment-and-reporting workflows into continuous program management.\u003c/p\u003e\n\n\u003cp\u003eThe piece identifies three structural gaps in existing platform categories. First, it says enterprise compliance automation and GRC platforms were designed around a single customer’s compliance posture, controls, evidence collection, and audit cycle, which does not map well to MSPs operating across dozens or hundreds of clients. Second, it says standalone vCISO tools are centered on consultant-led assessments, advisory frameworks, and reports, but often lack the compliance depth and automation needed for scaled service delivery. Third, it argues that enterprise-first compliance vendors often sell direct to SMBs, treating MSPs as referrals rather than long-term delivery partners.\u003c/p\u003e\n\n\u003cp\u003eThe article then describes a four-tier MSP cybersecurity market in 2026: enterprise compliance automation, Security Growth Platform, MSP-native Cyber GRC and vCISO, and MSP advisory and assessment tools. It distinguishes the Security Growth Platform tier by saying compliance is an outcome of the security program rather than its starting point. Cynomi is named as the example of this category and is described as defining the tier through its design and 100% partner-only model.\u003c/p\u003e\n\n\u003cp\u003eFive capabilities are presented as the defining characteristics of the category. These are built-in CISO intelligence, unified security, risk, and compliance coverage across more than 40 frameworks such as NIST CSF 2.0, CIS Controls, ISO 27001, SOC 2, HIPAA, CMMC, GDPR, NIS2, and DORA, complete security lifecycle management, portfolio-level revenue intelligence, and MSP/MSSP-scale multi-tenant architecture. The article says these features allow service providers to standardize delivery, connect security gaps to their service catalog, and generate executive-ready outputs.\u003c/p\u003e\n\n\u003cp\u003eIn terms of impact, the article claims that MSPs often invest in cybersecurity tools faster than they package and sell security services, creating a gap between delivery capability and recurring-revenue growth. It says the Security Growth Platform category is designed to close that gap by integrating commercialization and portfolio analytics into the platform itself. As evidence, it cites Cynomi benchmark data reporting average outcomes including a 70% reduction in assessment and reporting workload, a 30% margin improvement on security services, 60% security revenue growth, and 90% shorter discovery time.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eThe article argues that the label and software category of the “vCISO platform” no longer fully describe what MSPs and MSSPs need to run cybersecurity practices in 2026. It proposes a new category, the \u003cstrong\u003eSecurity Growth Platform\u003c/strong\u003e, as a more accurate term for platforms that combine security program management, CISO-grade decision intelligence, multi-tenant portfolio architecture, and revenue intelligence in a single system.\u003c/p\u003e\n\n\u003cp\u003eIts central claim is that modern MSP security operations are defined by the \u003cstrong\u003eportfolio\u003c/strong\u003e rather than by individual advisory engagements. In the article’s framing, traditional GRC platforms, standalone vCISO tools, and enterprise compliance platforms each fail to serve that portfolio-based operating model for structural reasons.\u003c/p\u003e\n\n\u003ch1 id=\"why-the-article-says-the-old-category-no-longer-fits\"\u003eWhy the Article Says the Old Category No Longer Fits\u003c/h1\u003e\n\n\u003cp\u003eThe article says the practical question for MSPs a few years ago was which “vCISO platform” to buy, because the scope of work centered on:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eassessments\u003c/li\u003e\n\u003cli\u003eadvisory work\u003c/li\u003e\n\u003cli\u003ereporting\u003c/li\u003e\n\u003cli\u003eoccasional compliance add-ons\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to the piece, that scope has now expanded. It argues that SMBs often do not have internal CISO functions, so the MSP itself becomes the security function. As a result, the work now extends beyond one-off advisory engagements into continuous management of security programs across many clients.\u003c/p\u003e\n\n\u003cp\u003eTo support the business context, the article cites external research stating that:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSMB cybersecurity spending is projected to reach \u003cstrong\u003e$109 billion in 2026\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eSmall and medium businesses account for roughly \u003cstrong\u003e60% of global cybersecurity spend\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe global \u003cstrong\u003evCISO market\u003c/strong\u003e is projected at \u003cstrong\u003e$1.2 billion in 2026\u003c/strong\u003e with a \u003cstrong\u003e6.3% CAGR through 2035\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e85% of organizations\u003c/strong\u003e report that compliance is more complex than it was three years ago.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article uses these figures to argue that the demand for security services has outgrown the software categories previously used to describe the work.\u003c/p\u003e\n\n\u003ch1 id=\"the-three-structural-gaps-identified-in-existing-categories\"\u003eThe Three Structural Gaps Identified in Existing Categories\u003c/h1\u003e\n\n\u003ch2 id=\"1-grc-platforms-were-not-built-for-msp-delivery\"\u003e1. GRC Platforms Were Not Built for MSP Delivery\u003c/h2\u003e\n\n\u003cp\u003eThe article says enterprise compliance automation and GRC platforms were designed for companies with internal security teams. Their architecture is described as being optimized around:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eone customer’s compliance posture\u003c/li\u003e\n\u003cli\u003eone controls library\u003c/li\u003e\n\u003cli\u003eone evidence-collection model\u003c/li\u003e\n\u003cli\u003eone audit cycle\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt argues that this design does not translate well to MSPs managing security programs for 30, 100, or more SMB clients where the provider, not the customer, acts as the security function. The article further notes that recent repositioning around “agentic AI” and “trust automation” reinforces the enterprise end-customer orientation of those platforms rather than adapting them for service-provider delivery.\u003c/p\u003e\n\n\u003ch2 id=\"2-standalone-vciso-tools-lack-compliance-and-automation-depth\"\u003e2. Standalone vCISO Tools Lack Compliance and Automation Depth\u003c/h2\u003e\n\n\u003cp\u003eThe article recognizes that the vCISO services category is real and growing, but says the tools in that category were built primarily for the consultant performing a single engagement. It characterizes those tools as strong in:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eassessment templates\u003c/li\u003e\n\u003cli\u003eadvisory frameworks\u003c/li\u003e\n\u003cli\u003ereporting decks\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt then argues that these strengths do not address the needs of MSPs operating ongoing security programs across large client portfolios. It specifically says those tools often do not provide the compliance depth or automation required for scaled delivery.\u003c/p\u003e\n\n\u003cp\u003eA practical consequence described in the article is that many providers end up using:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eone vCISO tool for advisory work\u003c/li\u003e\n\u003cli\u003eone separate GRC platform for audit and compliance work\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article presents this as a problem because it creates two systems and two sources of truth instead of one unified program.\u003c/p\u003e\n\n\u003ch2 id=\"3-enterprise-first-compliance-platforms-compete-with-the-channel\"\u003e3. Enterprise-First Compliance Platforms Compete with the Channel\u003c/h2\u003e\n\n\u003cp\u003eThe article says enterprise compliance platforms typically sell direct to end customers. In practice, MSPs encounter them when an SMB client is pushed toward a platform because a third party, such as an investor or enterprise buyer, demands compliance such as SOC 2.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that this direct model creates channel conflict because the MSP becomes a referral source rather than the primary service-delivery partner. It describes the resulting white space as a gap left by two structural choices:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eenterprise platforms chose direct sales to end customers\u003c/li\u003e\n\u003cli\u003echannel-native tools chose to remain narrow on compliance\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn the article’s view, this created an opening for a category centered on \u003cstrong\u003epartner-only delivery\u003c/strong\u003e, \u003cstrong\u003eSMB-accessible pricing\u003c/strong\u003e, \u003cstrong\u003eCISO-grade intelligence\u003c/strong\u003e, and \u003cstrong\u003eportfolio-level revenue analytics\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch1 id=\"the-four-tier-msp-cybersecurity-market-in-2026\"\u003eThe Four-Tier MSP Cybersecurity Market in 2026\u003c/h1\u003e\n\n\u003cp\u003eThe article organizes the market into four tiers based on who the platform is built for and how it goes to market:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eEnterprise compliance automation\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBuilt for end customers with internal security teams\u003c/li\u003e\n\u003cli\u003eDirect-first channel model\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eSecurity Growth Platform\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBuilt for service providers delivering, scaling, and growing security practices\u003c/li\u003e\n\u003cli\u003e100% partner-only model\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eMSP-native Cyber GRC and vCISO\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFocused on compliance tracking and audit readiness via MSPs\u003c/li\u003e\n\u003cli\u003eChannel-friendly\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eMSP advisory and assessment tools\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFocused on QBRs, vCIO presentations, and vendor-neutral assessments\u003c/li\u003e\n\u003cli\u003eChannel model\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe article says the Security Growth Platform is distinct because its center of gravity is different from the other tiers. Instead of treating compliance as the entry point, it treats compliance as an outcome of a broader security program.\u003c/p\u003e\n\n\u003ch1 id=\"what-the-article-says-defines-a-security-growth-platform\"\u003eWhat the Article Says Defines a Security Growth Platform\u003c/h1\u003e\n\n\u003cp\u003eThe article lists five required capabilities and says that a platform missing any of them belongs in a different category.\u003c/p\u003e\n\n\u003ch2 id=\"1-ciso-intelligence-built-in\"\u003e1. CISO Intelligence Built In\u003c/h2\u003e\n\n\u003cp\u003eThis is described as the decision-making logic of an experienced security leader embedded into AI infrastructure and guided workflows. The article says this allows trained team members to deliver senior-level advisory outcomes without depending entirely on a single senior consultant.\u003c/p\u003e\n\n\u003cp\u003eIt specifically notes that Cynomi calls this capability \u003cstrong\u003eCISO Intelligence\u003c/strong\u003e, and distinguishes it from generic “AI-powered” claims used elsewhere in the market.\u003c/p\u003e\n\n\u003ch2 id=\"2-unified-security-risk-and-compliance-across-40-frameworks\"\u003e2. Unified Security, Risk, and Compliance Across 40+ Frameworks\u003c/h2\u003e\n\n\u003cp\u003eThe article says one assessment should map controls across frameworks including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNIST CSF 2.0\u003c/li\u003e\n\u003cli\u003eCIS Controls\u003c/li\u003e\n\u003cli\u003eISO 27001\u003c/li\u003e\n\u003cli\u003eSOC 2\u003c/li\u003e\n\u003cli\u003eHIPAA\u003c/li\u003e\n\u003cli\u003eCMMC\u003c/li\u003e\n\u003cli\u003eGDPR\u003c/li\u003e\n\u003cli\u003eNIS2\u003c/li\u003e\n\u003cli\u003eDORA\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis is presented as a way to make compliance an output of the security program rather than a separate parallel track.\u003c/p\u003e\n\n\u003ch2 id=\"3-complete-security-lifecycle-management\"\u003e3. Complete Security Lifecycle Management\u003c/h2\u003e\n\n\u003cp\u003eThe article says the platform should support the full lifecycle, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003econtext-aware onboarding\u003c/li\u003e\n\u003cli\u003erisk-based prioritization\u003c/li\u003e\n\u003cli\u003eautomated remediation roadmaps\u003c/li\u003e\n\u003cli\u003etask-driven execution\u003c/li\u003e\n\u003cli\u003epolicy automation\u003c/li\u003e\n\u003cli\u003ebusiness impact analysis\u003c/li\u003e\n\u003cli\u003ebusiness continuity planning\u003c/li\u003e\n\u003cli\u003ethird-party risk management\u003c/li\u003e\n\u003cli\u003eexecutive dashboards\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that the work should run continuously rather than in bursts tied to audit cycles.\u003c/p\u003e\n\n\u003ch2 id=\"4-portfolio-level-revenue-intelligence\"\u003e4. Portfolio-Level Revenue Intelligence\u003c/h2\u003e\n\n\u003cp\u003eThis capability is described as a multi-tenant view across the provider’s full client base that maps security gaps to the partner’s service catalog and quantifies recurring-revenue expansion opportunities.\u003c/p\u003e\n\n\u003cp\u003eThe article says other tiers do not expose revenue surface area at the portfolio level.\u003c/p\u003e\n\n\u003ch2 id=\"5-built-for-msp-and-mssp-scale\"\u003e5. Built for MSP and MSSP Scale\u003c/h2\u003e\n\n\u003cp\u003eThe article says the platform must include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003emulti-tenant architecture\u003c/li\u003e\n\u003cli\u003ewhite-label outputs\u003c/li\u003e\n\u003cli\u003eno channel conflict\u003c/li\u003e\n\u003cli\u003esupport for portfolios from 15 to more than 500 clients\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt connects this requirement to the distinction between “channel-friendly” platforms and “100% partner-only” platforms.\u003c/p\u003e\n\n\u003ch1 id=\"why-the-article-says-msps-need-more-than-a-vciso-platform\"\u003eWhy the Article Says MSPs Need More Than a vCISO Platform\u003c/h1\u003e\n\n\u003cp\u003eThe article does not dismiss the term “vCISO platform” entirely. Instead, it says the term still fits when the work is centered on individual fractional-CISO engagements delivered one at a time.\u003c/p\u003e\n\n\u003cp\u003eIts argument is that once a provider scales beyond single engagements, the required platform must also include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eportfolio visibility\u003c/li\u003e\n\u003cli\u003eservice-catalog mapping\u003c/li\u003e\n\u003cli\u003eexecutive-ready reporting\u003c/li\u003e\n\u003cli\u003einfrastructure for packaging and pricing services\u003c/li\u003e\n\u003cli\u003einfrastructure for growing the practice commercially\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn the article’s formulation, “vCISO platform” describes the \u003cstrong\u003emethodology\u003c/strong\u003e, while “Security Growth Platform” describes the \u003cstrong\u003esystem\u003c/strong\u003e around that methodology.\u003c/p\u003e\n\n\u003ch1 id=\"practice-growth-and-revenue-as-a-core-theme\"\u003ePractice Growth and Revenue as a Core Theme\u003c/h1\u003e\n\n\u003cp\u003eOne of the article’s main differentiators is its focus on commercialization rather than only delivery. It says industry research from groups including CompTIA and Service Leadership consistently shows that MSPs invest in cybersecurity tools faster than they package, price, and sell security services.\u003c/p\u003e\n\n\u003cp\u003eThe article presents this as the point where many practices stall: they can deliver technical work but lack a system for turning that work into a repeatable recurring-revenue motion. It argues that the Security Growth Platform category exists specifically to close that gap by building commercialization support into the platform itself.\u003c/p\u003e\n\n\u003ch1 id=\"named-example-and-claimed-outcomes\"\u003eNamed Example and Claimed Outcomes\u003c/h1\u003e\n\n\u003cp\u003eThe article identifies \u003cstrong\u003eCynomi\u003c/strong\u003e as the named example of the Security Growth Platform tier and says its design choices, feature set, and partner-only go-to-market model define the category in practice.\u003c/p\u003e\n\n\u003cp\u003eIt cites outcomes that service providers using Cynomi reportedly achieve, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e70% reduction\u003c/strong\u003e in assessment and reporting workload\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e30% margin improvement\u003c/strong\u003e on security services\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e60% security revenue growth\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e90% shorter discovery time\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these figures come from Cynomi’s annual MSP cybersecurity benchmark data and characterizes them as practice-level outcomes rather than pilot metrics.\u003c/p\u003e\n\n\u003ch1 id=\"significance-of-the-article-s-positioning\"\u003eSignificance of the Article’s Positioning\u003c/h1\u003e\n\n\u003cp\u003eThe article is fundamentally a category-definition and market-positioning piece. Its significance lies in how it reframes the software problem for MSPs:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003efrom single-engagement advisory enablement\u003c/li\u003e\n\u003cli\u003eto multi-client security program orchestration\u003c/li\u003e\n\u003cli\u003eand from compliance tracking alone\u003c/li\u003e\n\u003cli\u003eto delivery plus recurring-revenue growth\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt argues that the real differentiator is not only how a platform performs assessments or maps frameworks, but what the provider can do after the assessment at portfolio scale.\u003c/p\u003e\n\n\u003ch1 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h1\u003e\n\n\u003cp\u003eThe core message of the article is that modern MSP and MSSP cybersecurity practices require a platform designed around the portfolio, not the individual engagement. In the article’s framing, that need is not fully met by legacy vCISO tools, enterprise GRC platforms, or direct-sell compliance products, and the proposed answer is a new category: the \u003cstrong\u003eSecurity Growth Platform\u003c/strong\u003e.\u003c/p\u003e\n","keyPoints":["The article argues that MSPs and MSSPs need a new category called a Security Growth Platform because traditional vCISO tools and enterprise GRC platforms do not fully support portfolio-based security delivery.","It says enterprise compliance automation platforms were built for end customers with internal security teams and are not architected for service providers managing security programs across many SMB clients.","The article states that standalone vCISO tools focus on assessments, advisory frameworks, and reporting, but often lack the compliance depth and automation needed for ongoing multi-client security programs.","According to the article, a Security Growth Platform is defined by five capabilities: built-in CISO intelligence, unified security and compliance across 40+ frameworks, complete security lifecycle management, portfolio-level revenue intelligence, and MSP-scale multi-tenant architecture.","The article identifies Cynomi as the named example of this category and cites its reported partner outcomes, including reduced assessment workload, improved margins, revenue growth, and shorter discovery time."],"insights":["The article frames the main architectural gap in existing tools as portfolio management, arguing that the core unit of work for MSP security practices is no longer a single client engagement but an entire multi-client portfolio.","It highlights that many providers have been forced to combine a vCISO tool for advisory work with a separate GRC platform for audit work, creating two systems and two sources of truth instead of one unified security program.","The piece makes a commercial distinction between channel-friendly and 100% partner-only platforms, suggesting that avoiding direct sales to end customers is a defining feature rather than just a go-to-market preference.","A notable claim in the article is that compliance should be treated as an outcome of an ongoing security program rather than the starting point, which differs from how many MSP-native compliance tools are positioned.","The article suggests that one reason MSP security practices stall is not lack of delivery capability but lack of built-in packaging, pricing, and service-catalog mapping needed to turn technical work into repeatable recurring revenue."],"referencedReports":[{"title":"SMB Cybersecurity Spending","url":"https://www.analysysmason.com/research/content/articles/smb-cyber-spending-rsmb1-ren04/","publisher":"analysys mason","context":"The article cites this research to support its claim that SMB cybersecurity spending is projected to reach $109 billion in 2026 and that SMBs account for roughly 60% of global cybersecurity spend.","category":"","primary":false},{"title":"Virtual CISO Market","url":"https://www.businessresearchinsights.com/market-reports/virtual-ciso-market-117910","publisher":"business research insights","context":"The article references this market report to show that the global vCISO market is projected at $1.2 billion in 2026 with a 6.3% CAGR through 2035.","category":"","primary":false},{"title":"PwC Global Compliance Study 2025","url":"https://www.pwc.com/gx/en/issues/risk-regulation/pwc-global-compliance-study-2025.pdf","publisher":"pwc","context":"The article uses this study to support the point that compliance requirements have become more complex, citing that 85% of organizations report greater complexity than three years ago.","category":"","primary":false}],"body":"\u003cp\u003eThe article argues that MSPs and MSSPs have outgrown the term and tooling associated with a traditional “vCISO platform” and now require what it calls a “Security Growth Platform.” It says the modern security practice for service providers must combine security program management, CISO-grade decision intelligence, multi-tenant portfolio architecture, and revenue intelligence in a single system. The piece positions this shift as a response to expanding SMB security demand and the limitations of both enterprise-first GRC tools and standalone vCISO products.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, three structural gaps created this new category: enterprise GRC platforms were built for direct end-customer use, standalone vCISO tools lack compliance and automation depth, and enterprise-first compliance platforms often compete with the channel. It defines a Security Growth Platform through five capabilities, including built-in CISO intelligence, unified management across 40+ frameworks, full lifecycle security management, portfolio-level revenue intelligence, and MSP-scale multi-tenant design. Cynomi is presented as the named example of this category, and the article cites partner outcomes such as reduced assessment workload, margin improvement, revenue growth, and shorter discovery time.\u003c/p\u003e\n"}];

      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
