ure and helped the activity blend into traffic to a legitimate platform.","Because the decoder ignores visible text and only reads six specific invisible Unicode characters, even comments that look harmless or decorative can carry executable payload data without obvious visual indicators.","The malware’s use of standard WordPress APIs and fake disabled logging code means defenders cannot rely only on obvious anomalies and should inspect normal-looking WordPress behavior for hidden abuse.","GoDaddy warned that incomplete cleanup can fail because the backdoor allows attackers to reinstall removed code, making restoration from a known good backup the preferred response.","The article highlights several concrete hunting artifacts beyond the malicious domain, including outbound WordPress connections to Steam, suspicious _transient_caption_ cache entries, disabled SSL verification in cURL requests, and POST requests carrying the authentication cookie or new_code parameter."],"referencedReports":[{"title":"Malware targeting WordPress abuses Steam Community profiles","url":"https://www.godaddy.com/resources/news/malware-targeting-wordpress-abuses-steam-community-profiles","publisher":"godaddy","context":"The article cites GoDaddy’s report as the source for the technical analysis of the WordPress malware campaign and its use of Steam Community comments to hide payloads.","category":"","primary":false}],"body":"\u003cp\u003eGoDaddy security engineers found a malware campaign affecting about 1,980 WordPress websites that hid command-and-control data in Steam Community profile comments. The attackers used invisible Unicode characters embedded in benign-looking text to conceal payloads that were decoded on infected sites. By using Valve’s platform, the campaign avoided maintaining separate C2 infrastructure and made detection more difficult.\u003c/p\u003e\n\n\u003cp\u003eThe first-stage malware reached specific Steam profiles during WordPress page loads and extracted hidden payloads from comments that sometimes appeared as harmless ASCII art. Those payloads built a URL to hello-mywordl.info, which served JavaScript disguised as legitimate libraries and injected it into every frontend WordPress page. The final stage installed a PHP backdoor that accepted base64-encoded code through POST requests when a specific authentication cookie was present.\u003c/p\u003e\n\n\u003cp\u003eGoDaddy said the initial compromise vector remains unclear, but possible causes include stolen admin credentials, compromised FTP or SFTP access, vulnerable themes or plugins, or a supply-chain compromise. The researchers also described evasion methods such as obfuscated strings, randomized function names, fake disabled logging code, and use of standard WordPress APIs. They recommended restoring from a known good backup when possible and looking for signs such as Steam Community URL references, suspicious JavaScript injections, invisible Unicode characters, and requests involving hello-mywordl.info or the malware’s authentication cookies.\u003c/p\u003e\n"},{"n":5,"title":"Microsoft fixes KB5089549 Windows security update install issues","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-fixes-kb5089549-windows-security-update-install-issues/","time":"10:59","priority":"SHOULD READ","score":83,"tldr":"Microsoft fixed the Windows 11 KB5089549 install failures caused by low EFI System Partition space in the KB5089573 preview update, with the broader fix rolling out in June Patch Tuesday updates. Affected users can also use Microsoft's workaround or Known Issue Rollback if they haven’t installed the newer update yet.","briefOverview":"\u003cp\u003eMicrosoft said it has resolved a known issue that caused installation failures and 0x800f0922 errors for the May 2026 Windows 11 security update KB5089549. The company attributed the failures to insufficient free space on the EFI System Partition, which caused the update to roll back on affected systems. Users impacted by the issue could see a message stating, \u0026ldquo;Something didn\u0026rsquo;t go as planned. Undoing changes.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eAccording to Microsoft, the problem especially affected devices with 10 MB or less free on the EFI System Partition, and installation could fail during reboot at about 35 to 36 percent completion. Microsoft said the issue was fixed in the KB5089573 preview cumulative update released on May 26, 2026, and that the fix will also reach all users in the June Patch Tuesday updates. For users who do not want to install the optional preview update, Microsoft said the issue can be mitigated with Known Issue Rollback, while enterprise administrators can use a Group Policy workaround.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has fixed a known issue that caused the May 2026 Windows 11 security update KB5089549 to fail to install on some devices. The failures generated 0x800f0922 errors and triggered an automatic rollback after installation attempts. Microsoft had previously acknowledged the problem and has now said it is resolved.\u003c/p\u003e\n\n\u003cp\u003eThe company explained that the root cause was insufficient free space on the EFI System Partition, also called the ESP. Microsoft said the issue particularly affected devices with 10 MB or less available on that partition. On impacted systems, the update could proceed through the early phases of installation and then fail during the reboot stage at around 35 to 36 percent completion.\u003c/p\u003e\n\n\u003cp\u003eUsers who encountered the issue could see a rollback message saying, \u0026ldquo;Something didn\u0026rsquo;t go as planned. Undoing changes.\u0026rdquo; Microsoft also noted that log entries such as \u0026ldquo;SpaceCheck\u0026rdquo; and \u0026ldquo;ServicingBootFiles failed\u0026rdquo; could indicate that there was not enough free space on the EFI System Partition. These details provide the clearest signs of the specific installation failure described in the article.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the issue was resolved by Windows updates released on May 26, 2026, starting with the Windows 11 KB5089573 preview cumulative update. The company added that the same fix will be available more broadly to users who install the June Patch Tuesday updates later in the month. It recommended installing the latest update because it includes both this fix and other improvements.\u003c/p\u003e\n\n\u003cp\u003eFor users who do not want to install the optional May 2026 preview update, Microsoft said the problem can be mitigated using Known Issue Rollback. In enterprise environments, IT administrators can manually address the issue by installing and configuring a Microsoft-provided Group Policy. The article also points readers to Microsoft guidance for deploying Known Issue Rollback policies.\u003c/p\u003e\n\n\u003cp\u003eThe article further notes that KB5089573 was released for Windows 11 versions 25H2 and 24H2 and included 30 changes related to performance and reliability. It also mentions other recent Microsoft update issues, including backup application failures linked to April 2026 security updates and a Windows Autopatch bug that deployed restricted driver updates on some Autopatch-managed devices in the European Union.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"microsoft-fixes-kb5089549-windows-security-update-install-failures\"\u003eMicrosoft fixes KB5089549 Windows security update install failures\u003c/h1\u003e\n\n\u003cp\u003eMicrosoft said it has resolved a known issue that caused installation failures and 0x800f0922 errors when deploying the May 2026 Windows 11 security update KB5089549. The issue affected Windows 11 devices and caused the update to automatically roll back on impacted systems.\u003c/p\u003e\n\n\u003cp\u003eThe company had previously acknowledged the problem and later announced that it was fixed in a newer update. Microsoft said users who install the newer update no longer need to apply a workaround.\u003c/p\u003e\n\n\u003ch2 id=\"root-cause-identified-by-microsoft\"\u003eRoot cause identified by Microsoft\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft attributed the installation failures to insufficient free space on the EFI System Partition, or ESP. The company said the issue especially affected devices that had 10 MB or less free on that partition.\u003c/p\u003e\n\n\u003cp\u003eAccording to Microsoft, devices experiencing the problem could move through the initial installation stages successfully, but then fail during the reboot phase at approximately 35 to 36 percent completion. When that happened, the update would roll back.\u003c/p\u003e\n\n\u003ch2 id=\"observable-symptoms-on-affected-systems\"\u003eObservable symptoms on affected systems\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft described several signs that users and administrators could see on impacted devices:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA rollback message stating: \u0026ldquo;Something didn\u0026rsquo;t go as planned. Undoing changes.\u0026rdquo;\u003c/li\u003e\n\u003cli\u003eInstallation failures associated with error code 0x800f0922\u003c/li\u003e\n\u003cli\u003eLog entries such as:\n\n\u003cul\u003e\n\u003cli\u003e\u0026ldquo;SpaceCheck\u0026rdquo;\u003c/li\u003e\n\u003cli\u003e\u0026ldquo;ServicingBootFiles failed\u0026rdquo;\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese indicators pointed to insufficient free space on the EFI System Partition as the cause of the failure.\u003c/p\u003e\n\n\u003ch2 id=\"resolution-and-update-path\"\u003eResolution and update path\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said the issue was resolved in Windows updates released on May 26, 2026, beginning with the Windows 11 KB5089573 preview cumulative update. The company also said the fix will become available to all users through the June Patch Tuesday updates later in the month.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft’s release health update stated that users who install KB5089573 or any later update do not need to use a workaround for this issue. The company recommended installing the latest available update because it includes this fix as well as other improvements and issue resolutions.\u003c/p\u003e\n\n\u003ch2 id=\"workarounds-and-enterprise-mitigation\"\u003eWorkarounds and enterprise mitigation\u003c/h2\u003e\n\n\u003cp\u003eFor users who do not want to install the optional May 2026 preview update, Microsoft said the issue can be mitigated through Known Issue Rollback. The article describes Known Issue Rollback as a Windows feature that reverses buggy updates delivered through Windows Update.\u003c/p\u003e\n\n\u003cp\u003eIn enterprise environments managed by IT departments, administrators can manually mitigate the issue by installing and configuring a Microsoft-provided Group Policy. The article also points readers to Microsoft guidance on how to deploy Known Issue Rollback group policies.\u003c/p\u003e\n\n\u003ch2 id=\"related-update-context\"\u003eRelated update context\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that KB5089573 was released on Wednesday, May 26, for Windows 11 versions 25H2 and 24H2. It included 30 changes, among them performance and reliability improvements.\u003c/p\u003e\n\n\u003cp\u003eIt also places this issue among other recent Windows update-related problems Microsoft has addressed. Specifically, the article mentions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApril 2026 security updates causing failures in third-party backup applications that used a vulnerable driver\u003c/li\u003e\n\u003cli\u003eA Windows Autopatch bug that caused driver updates restricted by administrative policies to be deployed on some Autopatch-managed Windows devices in the European Union\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-takeaways-from-the-article\"\u003eKey takeaways from the article\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft resolved the KB5089549 installation issue.\u003c/li\u003e\n\u003cli\u003eThe failures were caused by low free space on the EFI System Partition.\u003c/li\u003e\n\u003cli\u003eDevices with 10 MB or less free on the ESP were especially affected.\u003c/li\u003e\n\u003cli\u003eThe update could fail during reboot at around 35 to 36 percent completion.\u003c/li\u003e\n\u003cli\u003eMicrosoft fixed the problem in KB5089573 and said the fix will also be included in the June Patch Tuesday updates.\u003c/li\u003e\n\u003cli\u003eUsers can rely on Known Issue Rollback if they do not want to install the optional preview update.\u003c/li\u003e\n\u003cli\u003eEnterprise administrators have a Group Policy-based mitigation path available from Microsoft.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Microsoft resolved a known issue that caused installation failures and 0x800f0922 errors when deploying the May 2026 Windows 11 security update KB5089549.","Microsoft said the failures were caused by insufficient free space on the EFI System Partition, especially on devices with 10 MB or less available, and the update could fail during reboot at around 35 to 36 percent completion.","The issue was fixed in the Windows 11 KB5089573 preview cumulative update released on May 26, 2026, and the fix will also be included in the June Patch Tuesday updates.","Users who do not install the optional May 2026 update can mitigate the problem with Known Issue Rollback, and enterprise admins can deploy a Group Policy workaround provided by Microsoft.","Microsoft noted that affected users may see a \"Something didn't go as planned. Undoing changes.\" message and log entries such as \"SpaceCheck\" and \"ServicingBootFiles failed\" when the update rolls back."],"insights":["The install failure was tied specifically to free space on the EFI System Partition, meaning systems could appear healthy yet still fail the update because of a small boot-related partition rather than the main disk.","Microsoft indicated the update often progressed through initial installation and only failed during reboot at roughly 35 to 36 percent completion, which helps narrow troubleshooting to a late-stage boot servicing problem.","Organizations do not have to wait for the next mandatory Patch Tuesday release to address this issue, because Microsoft says installing the optional KB5089573 preview update already resolves it.","Microsoft provided two different mitigation paths depending on environment: Known Issue Rollback for general Windows Update scenarios and a downloadable Group Policy package for IT-managed enterprise devices."],"referencedReports":[{"title":"Windows 11, version 25H2 known issues and notifications","url":"https://learn.microsoft.com/en-us/windows/release-health/status-windows-11-25h2#4854msgdesc:~:text=Resolution","publisher":"microsoft","context":"The article cites Microsoft's Windows release health dashboard entry as the source confirming that the issue was resolved by updates released May 26, 2026 and later.","category":"","primary":false},{"title":"Use Group Policy to deploy a Known Issue Rollback","url":"https://learn.microsoft.com/en-us/troubleshoot/windows-client/group-policy/use-group-policy-to-deploy-known-issue-rollback","publisher":"microsoft","context":"The article links to Microsoft's support guidance for deploying Known Issue Rollback group policies in enterprise environments.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft said it has resolved a known issue that caused installation failures and 0x800f0922 errors for the May 2026 Windows 11 security update KB5089549. The company attributed the failures to insufficient free space on the EFI System Partition, which caused the update to roll back on affected systems. Users impacted by the issue could see a message stating, \u0026ldquo;Something didn\u0026rsquo;t go as planned. Undoing changes.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eAccording to Microsoft, the problem especially affected devices with 10 MB or less free on the EFI System Partition, and installation could fail during reboot at about 35 to 36 percent completion. Microsoft said the issue was fixed in the KB5089573 preview cumulative update released on May 26, 2026, and that the fix will also reach all users in the June Patch Tuesday updates. For users who do not want to install the optional preview update, Microsoft said the issue can be mitigated with Known Issue Rollback, while enterprise administrators can use a Group Policy workaround.\u003c/p\u003e\n"},{"n":13,"title":"Hackers hijack thousands of sites for ClickFix and FakeUpdate attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/hackers-hijack-thousands-of-sites-for-clickfix-and-fakeupdate-attacks/","time":"22:14","priority":"SHOULD READ","score":82,"tldr":"DriveSurge compromised thousands of legitimate websites and used the zTDS traffic system to redirect visitors into ClickFix and fake browser update scams that install malware on Windows and macOS. The key takeaway is that users should only update browsers through official in-app settings and never run copied terminal or PowerShell commands from web prompts.","briefOverview":"\u003cp\u003eSilent Push says a threat actor tracked as DriveSurge has been running large-scale malware distribution campaigns using ClickFix and FakeUpdates on compromised websites. According to the researchers, thousands of legitimate sites were hijacked and used to redirect visitors to malware-delivery infrastructure without the knowledge of site owners or users. The campaign relied on a Traffic Distribution System called zTDS to profile visitors and decide which lure to show.\u003c/p\u003e\n\n\u003cp\u003eThe article says DriveSurge primarily functions as an initial access broker operating on a pay-per-install model. FakeUpdates lures impersonated browser updates for products including Chrome, Firefox, Edge, Safari, Opera, Brave, Yandex, Vivaldi, Samsung Internet, and UC Browser, while ClickFix attacks used PowerShell commands. Silent Push also found an obfuscated JavaScript payload designed for macOS systems, indicating the campaign extends beyond Windows.\u003c/p\u003e\n\n\u003cp\u003eResearchers identified eight technical fingerprints tied to the campaign, including a JavaScript injection pattern using \u003ccode\u003et.js?site=\u0026lt;id\u0026gt;\u003c/code\u003e. They also found more than 80 malicious injection domains and additional pre-weaponized domains not yet used in attacks. The article advises users to update browsers only through official app settings and to avoid executing commands in Windows command prompt or Terminal that they do not fully understand.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSilent Push researchers reported that a threat actor they track as DriveSurge has been operating large-scale malware distribution campaigns through compromised websites. The article says thousands of legitimate websites were hijacked and used to redirect visitors to attacker-controlled malware infrastructure. According to Silent Push, this happened without the knowledge of the website owners or their visitors.\u003c/p\u003e\n\n\u003cp\u003eThe campaign used two common social engineering techniques: ClickFix and FakeUpdates. ClickFix attempts to trick victims into copying and executing malicious commands, often framed as a way to resolve a technical issue. FakeUpdates relies on fraudulent software update prompts, usually impersonating browser updates, to convince users to download and run malicious files.\u003c/p\u003e\n\n\u003cp\u003eSilent Push says DriveSurge primarily functions as an initial access broker using a pay-per-install model, enabling follow-on attacks. Visitors to compromised websites were routed through a Traffic Distribution System called zTDS, which profiled them and selected whether a ClickFix or FakeUpdates lure would be more appropriate. The article notes that zTDS is open source, has existed since at least 2015, and has been used by DriveSurge since at least September 2025.\u003c/p\u003e\n\n\u003cp\u003eThe fake update prompts impersonated updates for multiple browsers, including Chrome, Firefox, Edge, Safari, Opera, Brave, Yandex, Vivaldi, Samsung Internet, and UC Browser. One example in the report involved a fake Firefox update that downloaded a ZIP archive containing multiple DLLs and a malicious executable named \u003ccode\u003eBrowser Update.exe\u003c/code\u003e. In the ClickFix portion of the campaign, attackers used PowerShell commands.\u003c/p\u003e\n\n\u003cp\u003eSilent Push identified eight technical fingerprints associated with the campaign that helped link infrastructure and compromised websites to DriveSurge. One highlighted indicator was a JavaScript injection pattern following \u003ccode\u003et.js?site=\u0026lt;id\u0026gt;\u003c/code\u003e, where each compromised website had its own assigned value. Through this analysis, the researchers found more than 80 malicious injection domains, along with pre-weaponized domains that had not yet been used in attacks.\u003c/p\u003e\n\n\u003cp\u003eThe article also says researchers discovered an obfuscated JavaScript payload aimed specifically at macOS desktop systems. It was delivered through verification-themed ClickFix attacks that hijacked the clipboard, showing that the campaign was not limited to Windows. Users are advised to obtain browser updates only through the application’s own settings and to avoid running commands in Windows command prompt or Terminal unless they fully understand them.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eSilent Push says a threat actor tracked as \u003cstrong\u003eDriveSurge\u003c/strong\u003e has been conducting large-scale malware distribution campaigns using \u003cstrong\u003eClickFix\u003c/strong\u003e and \u003cstrong\u003eFakeUpdates\u003c/strong\u003e techniques on compromised websites. According to the article, \u003cstrong\u003ethousands of websites\u003c/strong\u003e were hijacked and used to redirect visitors to malware-delivery infrastructure. The report frames DriveSurge as an actor that primarily operates as an \u003cstrong\u003einitial access broker (IAB)\u003c/strong\u003e on a \u003cstrong\u003epay-per-install (PPI)\u003c/strong\u003e basis, enabling follow-on attacks.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the campaign abused the trust and reputation of legitimate websites. Silent Push says the redirects occurred silently, without the knowledge of either site owners or visitors.\u003c/p\u003e\n\n\u003ch1 id=\"core-campaign-mechanics\"\u003eCore Campaign Mechanics\u003c/h1\u003e\n\n\u003cp\u003eDriveSurge used a \u003cstrong\u003eTraffic Distribution System (TDS)\u003c/strong\u003e known as \u003cstrong\u003ezTDS\u003c/strong\u003e to manage victim routing. The article says zTDS profiled website visitors and determined whether they should be shown a \u003cstrong\u003eFakeUpdates\u003c/strong\u003e lure or a \u003cstrong\u003eClickFix\u003c/strong\u003e lure.\u003c/p\u003e\n\n\u003cp\u003eSilent Push describes \u003cstrong\u003ezTDS\u003c/strong\u003e as an open-source TDS that has existed since at least \u003cstrong\u003e2015\u003c/strong\u003e and says DriveSurge has been using it since at least \u003cstrong\u003eSeptember 2025\u003c/strong\u003e. This infrastructure played a central role in shaping the campaign by deciding what social engineering method each target encountered.\u003c/p\u003e\n\n\u003ch1 id=\"social-engineering-methods-used\"\u003eSocial Engineering Methods Used\u003c/h1\u003e\n\n\u003ch2 id=\"clickfix\"\u003eClickFix\u003c/h2\u003e\n\n\u003cp\u003eThe article describes \u003cstrong\u003eClickFix\u003c/strong\u003e as a social engineering tactic that tricks victims into copying and executing malicious commands on their own systems. These commands are often presented as if they will fix some kind of technical problem. In this campaign, the ClickFix attacks involved \u003cstrong\u003ePowerShell commands\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eSilent Push also found a variation of this technique tied to \u003cstrong\u003everification-themed prompts\u003c/strong\u003e that hijacked the clipboard.\u003c/p\u003e\n\n\u003ch2 id=\"fakeupdates\"\u003eFakeUpdates\u003c/h2\u003e\n\n\u003cp\u003eThe article says \u003cstrong\u003eFakeUpdates\u003c/strong\u003e attacks enticed victims with fraudulent software update prompts that typically impersonated browser updates. The goal was to get users to download and install malicious payloads under the pretense of keeping software current.\u003c/p\u003e\n\n\u003cp\u003eThe lures in this campaign impersonated updates for a wide set of browsers, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eChrome\u003c/li\u003e\n\u003cli\u003eFirefox\u003c/li\u003e\n\u003cli\u003eEdge\u003c/li\u003e\n\u003cli\u003eSafari\u003c/li\u003e\n\u003cli\u003eOpera\u003c/li\u003e\n\u003cli\u003eBrave\u003c/li\u003e\n\u003cli\u003eYandex\u003c/li\u003e\n\u003cli\u003eVivaldi\u003c/li\u003e\n\u003cli\u003eSamsung Internet\u003c/li\u003e\n\u003cli\u003eUC Browser\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"example-payload-delivery\"\u003eExample Payload Delivery\u003c/h1\u003e\n\n\u003cp\u003eA specific example highlighted by Silent Push involved a \u003cstrong\u003efake Firefox update\u003c/strong\u003e. According to the article, that lure downloaded a \u003cstrong\u003eZIP archive\u003c/strong\u003e containing:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003emultiple DLL files\u003c/li\u003e\n\u003cli\u003ea malicious executable named \u003cstrong\u003e\u003ccode\u003eBrowser Update.exe\u003c/code\u003e\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis example illustrates how the fake update flow moved users from a deceptive browser prompt to executable malware content.\u003c/p\u003e\n\n\u003ch1 id=\"technical-findings-and-infrastructure-mapping\"\u003eTechnical Findings and Infrastructure Mapping\u003c/h1\u003e\n\n\u003cp\u003eSilent Push identified \u003cstrong\u003eeight technical fingerprints\u003c/strong\u003e associated with the campaign. These fingerprints helped the researchers identify both \u003cstrong\u003eDriveSurge infrastructure\u003c/strong\u003e and \u003cstrong\u003ecompromised websites\u003c/strong\u003e participating in the redirects.\u003c/p\u003e\n\n\u003cp\u003eOne of the indicators mentioned in the article is a JavaScript injection pattern that follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003et.js?site=\u0026lt;id\u0026gt;\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article explains that \u003ccode\u003e\u0026lt;id\u0026gt;\u003c/code\u003e is a unique value assigned to each compromised website. This gave researchers a pattern they could use to connect infected sites to the broader operation.\u003c/p\u003e\n\n\u003cp\u003eThrough its analysis, Silent Push found:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003emore than 80 malicious injection domains\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003epre-weaponized domains\u003c/strong\u003e that had not yet been used in attacks\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese findings show that the campaign involved both active infrastructure and additional domains prepared for future use.\u003c/p\u003e\n\n\u003ch1 id=\"platform-scope\"\u003ePlatform Scope\u003c/h1\u003e\n\n\u003cp\u003eAlthough the article discusses \u003cstrong\u003ePowerShell-based ClickFix attacks\u003c/strong\u003e and a Windows-focused fake update example, it also says the campaign was \u003cstrong\u003enot limited to Windows\u003c/strong\u003e. Silent Push discovered an \u003cstrong\u003eobfuscated JavaScript payload\u003c/strong\u003e specifically designed to target \u003cstrong\u003emacOS desktop systems\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, this payload was delivered through \u003cstrong\u003everification-themed ClickFix attacks\u003c/strong\u003e that \u003cstrong\u003ehijacked the clipboard\u003c/strong\u003e. The article presents this as evidence that the operation extends beyond Windows users.\u003c/p\u003e\n\n\u003ch1 id=\"significance\"\u003eSignificance\u003c/h1\u003e\n\n\u003cp\u003eThe significance of the activity described in the article comes from several factors stated directly in the reporting:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ethe campaign compromised \u003cstrong\u003ethousands of legitimate websites\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003evisitors were redirected without the knowledge of site owners or users\u003c/li\u003e\n\u003cli\u003eDriveSurge used \u003cstrong\u003eadaptive lure selection\u003c/strong\u003e through zTDS\u003c/li\u003e\n\u003cli\u003ethe operation supports follow-on intrusions through a \u003cstrong\u003epay-per-install initial access model\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003ethe campaign included \u003cstrong\u003eboth Windows- and macOS-related delivery paths\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article’s framing suggests that DriveSurge’s role is to distribute malware and provide access opportunities for other threat activity.\u003c/p\u003e\n\n\u003ch1 id=\"response-and-user-guidance\"\u003eResponse and User Guidance\u003c/h1\u003e\n\n\u003cp\u003eThe article provides two user recommendations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003edownload browser updates only from the application’s own settings menu, such as \u003cstrong\u003eAbout \u0026gt; Check for Updates\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eavoid executing commands in \u003cstrong\u003eWindows command prompt\u003c/strong\u003e or \u003cstrong\u003eTerminal\u003c/strong\u003e unless they are fully understood\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese recommendations are presented as direct mitigations against the FakeUpdates and ClickFix techniques described in the campaign.\u003c/p\u003e\n\n\u003ch1 id=\"bottom-line\"\u003eBottom Line\u003c/h1\u003e\n\n\u003cp\u003eAccording to Silent Push, DriveSurge used compromised high-reputation websites and the zTDS traffic system to direct users into tailored \u003cstrong\u003eClickFix\u003c/strong\u003e and \u003cstrong\u003eFakeUpdates\u003c/strong\u003e malware lures. The operation was large in scale, tied to more than \u003cstrong\u003e80 malicious injection domains\u003c/strong\u003e, and included artifacts and delivery methods affecting both \u003cstrong\u003eWindows\u003c/strong\u003e and \u003cstrong\u003emacOS\u003c/strong\u003e users. The article presents the campaign as a malware distribution and initial-access operation built on deceptive browser update prompts, malicious command execution, and silent redirects from legitimate websites.\u003c/p\u003e\n","keyPoints":["Silent Push says the threat actor DriveSurge compromised thousands of legitimate websites and redirected visitors to malware delivery infrastructure.","The campaign used the zTDS traffic distribution system to profile visitors and decide whether to show a ClickFix lure or a FakeUpdates prompt.","Silent Push described DriveSurge as primarily functioning as an initial access broker operating on a pay-per-install model.","The fake update lures impersonated browser updates for products including Chrome, Firefox, Edge, Safari, Opera, Brave, Yandex, Vivaldi, Samsung Internet, and UC Browser.","Researchers also found an obfuscated JavaScript payload targeting macOS systems through verification-themed ClickFix attacks that hijack the clipboard."],"insights":["DriveSurge appears to optimize infections by using zTDS to profile visitors and choose between ClickFix and FakeUpdates lures instead of showing the same prompt to everyone.","Silent Push found more than 80 malicious injection domains plus additional pre-weaponized domains, indicating the campaign has both active and standby infrastructure.","The campaign extends beyond Windows, as researchers identified an obfuscated JavaScript payload specifically designed to target macOS desktop systems.","A JavaScript injection pattern using 't.js?site=\u003cid\u003e' gave researchers a reusable fingerprint for linking compromised websites to the same campaign."],"referencedReports":[{"title":"DriveSurge","url":"https://www.silentpush.com/blog/drivesurge/#Analyzing-an-Obfuscated-Payload-Leads-to-macOS-Malware","publisher":"silent-push","context":"The article cites Silent Push's research as the basis for its reporting on the DriveSurge campaign, including infrastructure, techniques, and macOS targeting.","category":"","primary":false}],"body":"\u003cp\u003eSilent Push says a threat actor tracked as DriveSurge has been running large-scale malware distribution campaigns using ClickFix and FakeUpdates on compromised websites. According to the researchers, thousands of legitimate sites were hijacked and used to redirect visitors to malware-delivery infrastructure without the knowledge of site owners or users. The campaign relied on a Traffic Distribution System called zTDS to profile visitors and decide which lure to show.\u003c/p\u003e\n\n\u003cp\u003eThe article says DriveSurge primarily functions as an initial access broker operating on a pay-per-install model. FakeUpdates lures impersonated browser updates for products including Chrome, Firefox, Edge, Safari, Opera, Brave, Yandex, Vivaldi, Samsung Internet, and UC Browser, while ClickFix attacks used PowerShell commands. Silent Push also found an obfuscated JavaScript payload designed for macOS systems, indicating the campaign extends beyond Windows.\u003c/p\u003e\n\n\u003cp\u003eResearchers identified eight technical fingerprints tied to the campaign, including a JavaScript injection pattern using \u003ccode\u003et.js?site=\u0026lt;id\u0026gt;\u003c/code\u003e. They also found more than 80 malicious injection domains and additional pre-weaponized domains not yet used in attacks. The article advises users to update browsers only through official app settings and to avoid executing commands in Windows command prompt or Terminal that they do not fully understand.\u003c/p\u003e\n"},{"n":15,"title":"Microsoft confirms outage affecting MFA, My Sign-Ins platform","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-confirms-outage-affecting-mfa-my-sign-ins-platform/","time":"11:40","priority":"SHOULD READ","score":82,"tldr":"Microsoft says an ongoing outage is preventing some users from setting up MFA or accessing the My Sign-Ins site, with affected customers seeing 504 Gateway Timeout errors. The company has failed over to alternate infrastructure and is still monitoring and applying additional mitigations as elevated error rates continue.","briefOverview":"\u003cp\u003eMicrosoft confirmed an ongoing incident that is preventing some users from setting up multi-factor authentication or accessing the My Sign-Ins platform. The company said affected users may be unable to reach mysignins.microsoft.com and may encounter 504 Gateway Timeout errors. Microsoft acknowledged the issue publicly through its Microsoft 365 Status account and in the admin center under incident MO1329260.\u003c/p\u003e\n\n\u003cp\u003eTo reduce impact, Microsoft said it switched to alternative healthy infrastructure and is monitoring telemetry to confirm recovery. The company also said elevated error rates are still persisting and that it is evaluating additional mitigation options, including optimizing how service requests are processed. Microsoft confirmed the issue around 5 AM ET, but it has not yet shared what regions are affected.\u003c/p\u003e\n\n\u003cp\u003eThe incident was classified as an ongoing incident, which the article notes is commonly used for critical service issues with noticeable user impact. The article also places the outage in the context of other Microsoft service disruptions earlier this year, including issues affecting Teams Free and Outlook.com. The story was still developing at the time of publication.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft is working to address an ongoing outage affecting users who need to set up multi-factor authentication or access the My Sign-Ins platform. The company said some users may be unable to complete MFA setup or reach mysignins.microsoft.com. It first acknowledged the problem through the Microsoft 365 Status account on Twitter.\u003c/p\u003e\n\n\u003cp\u003eAdditional information was shared in the Microsoft admin center under incident MO1329260. According to that notice, affected users may see 504 Gateway Timeout errors when trying to access mysignins.microsoft.com. The article also references external reports from affected users discussing the issue.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said it completed mitigation actions that included failing over to alternate healthy infrastructure. After doing so, the company said it was monitoring service telemetry to ensure full recovery. However, it also noted that elevated error rates were still persisting.\u003c/p\u003e\n\n\u003cp\u003eBecause the initial mitigation did not fully stabilize the service, Microsoft said it was evaluating additional mitigation options. One of the actions under consideration was optimizing how service requests are processed in order to further stabilize the service. This indicates that the company was still actively responding at the time of the report.\u003c/p\u003e\n\n\u003cp\u003eThe company confirmed the issue around 5 AM ET and classified it as an ongoing incident. The article says this label is commonly used for critical service issues with noticeable user impact. Microsoft had not yet disclosed which regions were affected.\u003c/p\u003e\n\n\u003cp\u003eThe report also notes that Microsoft dealt with other service issues earlier this year. Those included a known issue that broke chat and calling for some Microsoft Teams Free users and an Outlook.com outage that caused intermittent sign-in problems and blocked mailbox access. The article states that the MFA and My Sign-Ins disruption remained a developing story.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eMicrosoft confirmed an ongoing outage that is affecting users\u0026rsquo; ability to set up multi-factor authentication (MFA) and access the My Sign-Ins platform. The company said some users may be unable to complete MFA setup or access \u003ccode\u003emysignins.microsoft.com\u003c/code\u003e. According to the article, the issue was publicly acknowledged through Microsoft\u0026rsquo;s Microsoft 365 Status account and in the admin center under incident \u003ccode\u003eMO1329260\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies this as an active service incident rather than a resolved disruption. Microsoft confirmed the issue around 5 AM ET and had not yet disclosed which regions were affected at the time of reporting. The story is described as still developing.\u003c/p\u003e\n\n\u003ch1 id=\"what-users-are-experiencing\"\u003eWhat Users Are Experiencing\u003c/h1\u003e\n\n\u003cp\u003eMicrosoft said affected users may encounter \u003ccode\u003e504 Gateway Timeout\u003c/code\u003e errors when trying to access \u003ccode\u003emysignins.microsoft.com\u003c/code\u003e. The article states that this error condition was explicitly mentioned in the admin center notice.\u003c/p\u003e\n\n\u003cp\u003eThe reported impact includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInability for some users to set up MFA\u003c/li\u003e\n\u003cli\u003eInability for some users to access the My Sign-Ins website\u003c/li\u003e\n\u003cli\u003e504 Gateway Timeout errors on \u003ccode\u003emysignins.microsoft.com\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also references reports from affected users discussing the outage.\u003c/p\u003e\n\n\u003ch1 id=\"microsoft-s-response\"\u003eMicrosoft\u0026rsquo;s Response\u003c/h1\u003e\n\n\u003cp\u003eSince acknowledging the issue, Microsoft said it had taken mitigation steps. According to the article, those actions included switching to alternative healthy infrastructure in an effort to reduce impact.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt completed mitigation actions\u003c/li\u003e\n\u003cli\u003eIt failed over to alternate infrastructure\u003c/li\u003e\n\u003cli\u003eIt was continuing to monitor service telemetry to ensure full recovery\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDespite those steps, the company also said elevated error rates were still persisting. Because of that, Microsoft said it was evaluating additional mitigation options.\u003c/p\u003e\n\n\u003ch1 id=\"ongoing-mitigation-efforts\"\u003eOngoing Mitigation Efforts\u003c/h1\u003e\n\n\u003cp\u003eThe article notes that Microsoft was not treating the failover as the end of the incident. Instead, the company said it was actively considering further stabilization measures.\u003c/p\u003e\n\n\u003cp\u003eOne mitigation path specifically mentioned was:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOptimizing how service requests are processed to further stabilize the service\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis indicates that Microsoft was still in the response and recovery phase at the time the article was published.\u003c/p\u003e\n\n\u003ch1 id=\"severity-and-scope\"\u003eSeverity and Scope\u003c/h1\u003e\n\n\u003cp\u003eMicrosoft classified the issue as an ongoing incident. The article explains that this designation is commonly used for critical service problems with noticeable user impact.\u003c/p\u003e\n\n\u003cp\u003eEven with that classification, some details remained unknown at publication time. In particular, Microsoft had not yet shared which regions were affected by the outage.\u003c/p\u003e\n\n\u003ch1 id=\"context-from-earlier-microsoft-service-issues\"\u003eContext From Earlier Microsoft Service Issues\u003c/h1\u003e\n\n\u003cp\u003eThe article places this outage alongside other Microsoft service disruptions resolved earlier this year. It mentions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA known issue that prevented some Microsoft Teams Free users from chatting and calling others\u003c/li\u003e\n\u003cli\u003eAn Outlook.com outage that caused intermittent sign-in issues and blocked mailbox access\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese examples are presented as prior incidents involving Microsoft services, providing context for the current MFA and My Sign-Ins disruption.\u003c/p\u003e\n\n\u003ch1 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft confirmed an ongoing outage affecting MFA setup and access to the My Sign-Ins platform.\u003c/li\u003e\n\u003cli\u003eAffected users may see 504 Gateway Timeout errors on \u003ccode\u003emysignins.microsoft.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eMicrosoft failed over to alternate infrastructure and is monitoring telemetry.\u003c/li\u003e\n\u003cli\u003eElevated error rates were still persisting after initial mitigation.\u003c/li\u003e\n\u003cli\u003eAdditional mitigation options were under evaluation, including request-processing optimization.\u003c/li\u003e\n\u003cli\u003eThe company had not yet disclosed affected regions.\u003c/li\u003e\n\u003cli\u003eThe article remained a developing story at the time of publication.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Microsoft confirmed an ongoing incident preventing some users from setting up multi-factor authentication or accessing the My Sign-Ins platform.","According to Microsoft 365 Status and the admin center notice MO1329260, affected users may see 504 Gateway Timeout errors when visiting mysignins.microsoft.com.","Microsoft said it completed mitigation actions, including failing over to alternate healthy infrastructure, and is monitoring service telemetry to ensure full recovery.","The company added that elevated error rates persist and that it is evaluating additional mitigation options, including optimizing how service requests are processed.","Microsoft confirmed the issue around 5 AM ET, but it has not yet shared which regions are affected."],"insights":["The outage affects both MFA enrollment and the My Sign-Ins portal, which means users may be blocked from managing authentication settings as well as setting them up.","Microsoft has already failed over to alternate infrastructure, indicating the issue was significant enough to require service migration rather than only routine troubleshooting.","Even after mitigation steps were completed, Microsoft reported elevated error rates were still persisting, showing that the service had not fully stabilized.","Microsoft classified the problem as an ongoing incident, a status the article notes is commonly used for critical issues with noticeable user impact."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft confirmed an ongoing incident that is preventing some users from setting up multi-factor authentication or accessing the My Sign-Ins platform. The company said affected users may be unable to reach mysignins.microsoft.com and may encounter 504 Gateway Timeout errors. Microsoft acknowledged the issue publicly through its Microsoft 365 Status account and in the admin center under incident MO1329260.\u003c/p\u003e\n\n\u003cp\u003eTo reduce impact, Microsoft said it switched to alternative healthy infrastructure and is monitoring telemetry to confirm recovery. The company also said elevated error rates are still persisting and that it is evaluating additional mitigation options, including optimizing how service requests are processed. Microsoft confirmed the issue around 5 AM ET, but it has not yet shared what regions are affected.\u003c/p\u003e\n\n\u003cp\u003eThe incident was classified as an ongoing incident, which the article notes is commonly used for critical service issues with noticeable user impact. The article also places the outage in the context of other Microsoft service disruptions earlier this year, including issues affecting Teams Free and Outlook.com. The story was still developing at the time of publication.\u003c/p\u003e\n"},{"n":16,"title":"Spain arrests doxer leaking sensitive data of govt employees","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/spain-arrests-doxer-leaking-sensitive-data-of-govt-employees/","time":"21:28","priority":"SHOULD READ","score":82,"tldr":"Spanish police arrested a suspected doxer accused of leaking sensitive personal data tied to key government and security institutions, including INCIBE, creating national security concerns. Authorities say the data appears to have been aggregated from existing sources rather than stolen directly from INCIBE systems, and more arrests may follow.","briefOverview":"\u003cp\u003eThe Spanish National Police arrested an individual accused of leaking sensitive personal data tied to several key state organizations, including INCIBE, the State Attorney General\u0026rsquo;s Office, the National Police, the Civil Guard, and the National Security Council. Authorities said the mass dissemination of the data created national security risks because of the people exposed. Police also searched the suspect’s home and seized computers and other electronic devices for forensic analysis.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, INCIBE had previously said there was no direct compromise of its systems and described the incident as a doxing operation involving the targeted collection and publication of data. Potential sources mentioned for the exposed information include older breaches, credential dumps, and OSINT tools, with the records reportedly aggregated and correlated into curated collections. Some leaked records were said to contain outdated information, including names of former employees who had left INCIBE years earlier.\u003c/p\u003e\n\n\u003cp\u003eThe threat group reportedly associated with the leak was “Police-ESP-Doxed,” which allegedly published the material on a BreachForum iteration available at the time. The article also notes that in March, personal data belonging to hundreds of Spanish judges and prosecutors was published on Doxbin, including names, DNI numbers, personal mobile numbers, and professional email addresses. Police are now examining the seized devices for evidence of additional participants, and more arrests may follow.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Spanish National Police announced the arrest of an individual accused of leaking sensitive personal data related to members of several important state organizations. The article says the exposed entities included the State Attorney General\u0026rsquo;s Office, the National Cybersecurity Institute (INCIBE), the National Police, the Civil Guard, and the National Security Council. Authorities described the leak as a serious national security issue because of the nature of the people and institutions exposed.\u003c/p\u003e\n\n\u003cp\u003eThe investigation was overseen by Madrid Investigative Court No. 22 and began after authorities detected the mass dissemination of the data. According to the police statement cited in the article, the leak created an immediate risk to both the affected individuals and the institutions themselves. The operation culminated on Wednesday, May 27, with the suspect’s arrest and a search of the suspect’s home.\u003c/p\u003e\n\n\u003cp\u003eDuring the search, police seized computers and other electronic devices that may contain technical forensic evidence. The article states that authorities are now examining those devices for signs of additional participants, which means more arrests could follow. However, the police press release did not say whether the arrested individual was also responsible for breaching any portals.\u003c/p\u003e\n\n\u003cp\u003eINCIBE had previously addressed the incident in a February post, saying it had not been directly compromised by a cyberattack. Instead, it characterized the event as an ongoing doxing operation involving the targeted collection and publication of data affecting key entities and their employees. The article says possible data sources included older breaches, credential dumps, and OSINT tools, with the information aggregated and correlated into curated collections.\u003c/p\u003e\n\n\u003cp\u003eThe article adds that some of the leaked records reportedly contained outdated information, including names of employees who had left INCIBE years earlier. This detail suggests the leaked material was not entirely current, even though it still exposed sensitive personal information. The article identifies the threat group reportedly responsible for the leak as “Police-ESP-Doxed,” which allegedly published the material on one of BreachForum’s active iterations.\u003c/p\u003e\n\n\u003cp\u003eIn March, the article says the personal data of hundreds of Spanish judges and prosecutors was also published on Doxbin. The exposed information reportedly included full names, DNI numbers, personal mobile phone numbers, and professional email addresses. Together, these disclosures show that the incident extended beyond cybersecurity personnel and affected multiple sensitive parts of Spain’s public sector.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"article-summary\"\u003eArticle Summary\u003c/h1\u003e\n\n\u003cp\u003eThe article reports that the Spanish National Police arrested an individual accused of leaking sensitive personal data connected to several major state organizations in Spain. Authorities said the exposure created national security risks because of the identities and institutions involved. The case centers on a large-scale doxing operation rather than a confirmed direct compromise of INCIBE’s internal systems.\u003c/p\u003e\n\n\u003ch1 id=\"core-event\"\u003eCore Event\u003c/h1\u003e\n\n\u003cp\u003eAccording to the article, the Spanish National Police identified and located the person believed responsible for the leak, then arrested the individual and searched their residence. During the search, officers seized computers and other electronic devices that may contain technical forensic evidence.\u003c/p\u003e\n\n\u003cp\u003eThe investigation was overseen by Madrid Investigative Court No. 22. Police said the case began after authorities detected the mass dissemination of sensitive data and viewed it as an immediate risk to both affected individuals and the institutions involved.\u003c/p\u003e\n\n\u003ch1 id=\"affected-organizations\"\u003eAffected Organizations\u003c/h1\u003e\n\n\u003cp\u003eThe article says the leaked data related to personnel or members of several critical state entities, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe State Attorney General\u0026rsquo;s Office\u003c/li\u003e\n\u003cli\u003eINCIBE\u003c/li\u003e\n\u003cli\u003eThe National Police\u003c/li\u003e\n\u003cli\u003eThe Civil Guard\u003c/li\u003e\n\u003cli\u003eThe National Security Council\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAuthorities described these as key organizations whose exposure raised the seriousness of the incident.\u003c/p\u003e\n\n\u003ch1 id=\"nature-of-the-exposure\"\u003eNature of the Exposure\u003c/h1\u003e\n\n\u003cp\u003eA notable element in the article is that the police press release did not say whether the arrested person was also responsible for breaching any portals. That distinction matters because INCIBE had previously stated in February that it had not suffered a direct compromise.\u003c/p\u003e\n\n\u003cp\u003eInstead, INCIBE characterized the incident as an ongoing doxing operation involving the targeted collection and publication of data affecting key entities and their employees. The article notes several possible sources for the leaked information:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOlder breaches\u003c/li\u003e\n\u003cli\u003eCredential dumps\u003c/li\u003e\n\u003cli\u003eOSINT tools\u003c/li\u003e\n\u003cli\u003eAggregation and correlation of data into curated collections\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also says some leaked records reportedly contained outdated information, including names of employees who had left INCIBE years earlier. That detail supports the article’s description of the data as compiled from multiple existing sources rather than necessarily extracted from a fresh system intrusion.\u003c/p\u003e\n\n\u003ch1 id=\"reported-threat-actor-and-platforms\"\u003eReported Threat Actor and Platforms\u003c/h1\u003e\n\n\u003cp\u003eThe article says the threat group reportedly responsible for the leak was “Police-ESP-Doxed.” It further states that the data was leaked on one of the BreachForum iterations available at the time.\u003c/p\u003e\n\n\u003cp\u003eThe article also references a later development in March, when the personal data of hundreds of Spanish judges and prosecutors was published on Doxbin. According to the report, the exposed information included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFull names\u003c/li\u003e\n\u003cli\u003eDNI numbers\u003c/li\u003e\n\u003cli\u003ePersonal mobile phone numbers\u003c/li\u003e\n\u003cli\u003eProfessional email addresses\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis indicates that the leak activity affected not just cybersecurity-related personnel but also members of the judiciary.\u003c/p\u003e\n\n\u003ch1 id=\"law-enforcement-response\"\u003eLaw Enforcement Response\u003c/h1\u003e\n\n\u003cp\u003ePolice treated the case as urgent because of the potential impact on both people and institutions. The operation culminated on Wednesday, May 27, with the suspect’s arrest and the search of the suspect’s home.\u003c/p\u003e\n\n\u003cp\u003eAuthorities are now examining the seized devices for signs of additional participants. The article says more arrests may follow depending on what forensic evidence is recovered.\u003c/p\u003e\n\n\u003ch1 id=\"significance-in-the-article-s-framing\"\u003eSignificance in the Article’s Framing\u003c/h1\u003e\n\n\u003cp\u003eThe article frames the case as significant for several reasons:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eThe exposed data involved personnel from critical Spanish state institutions.\u003c/li\u003e\n\u003cli\u003eAuthorities explicitly linked the leak to national security risks.\u003c/li\u003e\n\u003cli\u003eThe information may have been assembled from multiple preexisting sources rather than from a single direct compromise.\u003c/li\u003e\n\u003cli\u003eThe operation appears broad enough that investigators are considering the possible involvement of additional participants.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch1 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eSpanish police arrested a suspect in a doxing case involving sensitive data tied to major government and security institutions.\u003c/li\u003e\n\u003cli\u003eThe exposed organizations included INCIBE, the State Attorney General\u0026rsquo;s Office, the National Police, the Civil Guard, and the National Security Council.\u003c/li\u003e\n\u003cli\u003eINCIBE said it was not directly breached and described the incident as targeted collection and publication of data.\u003c/li\u003e\n\u003cli\u003ePossible data sources mentioned in the article include older breaches, credential dumps, and OSINT tools.\u003c/li\u003e\n\u003cli\u003eThe threat group was reportedly “Police-ESP-Doxed,” and the data was allegedly posted on BreachForum.\u003c/li\u003e\n\u003cli\u003eAdditional related disclosures affected Spanish judges and prosecutors via Doxbin.\u003c/li\u003e\n\u003cli\u003ePolice are analyzing seized devices for evidence that could identify more participants and lead to further arrests.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["The Spanish National Police arrested an individual accused of leaking sensitive personal data linked to key state organizations, including INCIBE, the State Attorney General's Office, the National Police, the Civil Guard, and the National Security Council.","Police said the mass dissemination of the data created an immediate risk to the security and integrity of both the affected individuals and the institutions involved.","Authorities raided the suspect’s home and seized computers and other electronic devices for forensic examination.","INCIBE said in February that it had not been directly compromised and that the operation involved the targeted collection and publication of data affecting key entities and their employees.","The threat group reportedly associated with the leak was Police-ESP-Doxed, and police are examining seized devices for evidence of additional participants."],"insights":["The article indicates the leaked records were likely compiled from older breaches, credential dumps, and OSINT sources rather than from a direct compromise of INCIBE systems.","Some leaked records reportedly contained outdated information and names of employees who had left INCIBE years earlier, showing the dataset was not fully current even though it still posed security risks.","The exposure extended beyond cybersecurity staff to judges and prosecutors, with their names, DNI numbers, mobile phone numbers, and professional email addresses later appearing on Doxbin.","Police are using the seized devices not only to investigate the arrested suspect but also to look for evidence of additional participants, suggesting the case may involve more than one person."],"referencedReports":[],"body":"\u003cp\u003eThe Spanish National Police arrested an individual accused of leaking sensitive personal data tied to several key state organizations, including INCIBE, the State Attorney General\u0026rsquo;s Office, the National Police, the Civil Guard, and the National Security Council. Authorities said the mass dissemination of the data created national security risks because of the people exposed. Police also searched the suspect’s home and seized computers and other electronic devices for forensic analysis.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, INCIBE had previously said there was no direct compromise of its systems and described the incident as a doxing operation involving the targeted collection and publication of data. Potential sources mentioned for the exposed information include older breaches, credential dumps, and OSINT tools, with the records reportedly aggregated and correlated into curated collections. Some leaked records were said to contain outdated information, including names of former employees who had left INCIBE years earlier.\u003c/p\u003e\n\n\u003cp\u003eThe threat group reportedly associated with the leak was “Police-ESP-Doxed,” which allegedly published the material on a BreachForum iteration available at the time. The article also notes that in March, personal data belonging to hundreds of Spanish judges and prosecutors was published on Doxbin, including names, DNI numbers, personal mobile numbers, and professional email addresses. Police are now examining the seized devices for evidence of additional participants, and more arrests may follow.\u003c/p\u003e\n"},{"n":2,"title":"Inspector general finds NIST mistakes have made vulnerability database ineffective","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/nist-mistakes-vulnerability-database-inspector-general","time":"20:28","priority":"SHOULD READ","score":78,"tldr":"A Commerce Department watchdog found that NIST’s mismanagement has made the National Vulnerability Database increasingly ineffective, with its backlog of unprocessed flaws growing past 27,000 and duplicate work with CISA wasting resources. The report says NIST needs major process changes, better coordination, and less time spent on low-value severity scoring to restore the database’s usefulness and trust.","briefOverview":"\u003cp\u003eA Department of Commerce inspector general report found that NIST’s National Vulnerability Database has been severely degraded by mismanagement, weak planning, and an expanding processing backlog. According to the report, the backlog grew from 13,000 unprocessed vulnerabilities in February 2024 to more than 27,000 by the end of 2025, undermining the database’s usefulness and public trust. The NVD is widely used by government and industry defenders to prioritize which security flaws should be addressed first.\u003c/p\u003e\n\n\u003cp\u003eThe report says NIST failed to meet its own recovery goals after contractor payment issues disrupted processing in February 2024. It pledged to process about 6,200 vulnerabilities per month by September 2024, but had historically never exceeded 5,000 and did not have a plan to reach the target. The inspector general also found that NIST and CISA duplicated vulnerability-enrichment work at least 21,000 times between May 2024 and December 2025, wasting about $200,000.\u003c/p\u003e\n\n\u003cp\u003eTo improve the situation, the report recommends that NIST reduce time spent on severity scoring and impacted-product labeling, improve communication with stakeholders, and coordinate more closely with CISA. The inspector general said much of NIST’s scoring work is of limited value because 80% of submissions already include severity scores and NIST’s results matched independent assessors only 12% of the time. NIST agreed with the recommendations and said it would begin improving operations immediately.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA new inspector general report from the Department of Commerce says NIST’s National Vulnerability Database has become ineffective because of poor management and strategic failures. The report describes the NVD as a critical part of cybersecurity operations for both government and industry, helping defenders decide which vulnerabilities to prioritize. It says the growing processing backlog has eroded both the utility of the database and public trust in it.\u003c/p\u003e\n\n\u003cp\u003eThe backlog expanded from 13,000 unprocessed vulnerabilities in February 2024 to more than 27,000 by the end of 2025, according to the report. The worsening situation first became serious when NIST stopped paying the contractors who process vulnerabilities in February 2024. NIST later said it would fix the problem by September 2024 and set a goal of processing about 6,200 vulnerabilities per month, but the report says the agency had never previously processed more than 5,000 in a month and had no plan for reaching the new target.\u003c/p\u003e\n\n\u003cp\u003eThe inspector general concluded that NIST does not have sustainable processes to manage NVD submissions and will not be able to eliminate the backlog or prevent future delays without significant changes. The report also found that NIST failed to coordinate effectively with the Cybersecurity and Infrastructure Security Agency. CISA launched its own Vulnrichment program in May 2024, but NIST did not properly engage with the agency even after rehiring the contractors it relies on for NVD maintenance.\u003c/p\u003e\n\n\u003cp\u003eThat lack of coordination led to duplicated effort in at least 21,000 cases between May 2024 and December 2025, the report says. At one point, NIST and CISA even hired the same contractor to perform identical work. The report estimates that processing vulnerabilities already handled by CISA wasted about $200,000 and said the poor communication frustrated stakeholders and reduced confidence in the NVD.\u003c/p\u003e\n\n\u003cp\u003eThe inspector general recommended that NIST become more efficient in severity scoring and identifying affected products. According to the report, NIST could save about $800,000 over the next two years by spending less time on severity scoring, which it said has negligible value because 80% of submissions already include scores and NIST’s own scores only matched those from independent assessors 12% of the time. The report also criticized NIST and the Department of Commerce for failing to respond to an April 2024 open letter from 50 cybersecurity professionals who raised concerns about a lack of transparency around the NVD’s operational decline.\u003c/p\u003e\n\n\u003cp\u003eNIST agreed with the report’s recommendations and said it would begin improving operations immediately, according to an April letter from Acting Director Craig Burkhardt included in the report. The report urges NIST to create a realistic backlog-reduction plan, communicate better with stakeholders, reduce duplicate work with CISA, and scale back low-value scoring activity. Michael Daniel, the president and CEO of the Cyber Threat Alliance, said responsibility for the NVD should be moved to CISA because running a long-term operational program fits CISA’s mission better and NIST has significant resource shortfalls.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eA Department of Commerce inspector general report found that the National Institute of Standards and Technology’s National Vulnerability Database (NVD) has been significantly weakened by mismanagement, weak strategic planning, and poor coordination with other federal stakeholders. The report says these failures caused a severe and growing backlog of unprocessed vulnerabilities, reducing the database’s usefulness and harming public trust.\u003c/p\u003e\n\n\u003cp\u003eThe NVD is described in the article as a key cybersecurity resource used by both industry and government to determine which vulnerabilities should be prioritized for remediation. Because of that central role, delays and quality issues in the database have broad operational consequences for defenders who depend on timely vulnerability information.\u003c/p\u003e\n\n\u003ch1 id=\"core-findings\"\u003eCore Findings\u003c/h1\u003e\n\n\u003cp\u003eAccording to the inspector general, the NVD backlog grew from 13,000 unprocessed security vulnerabilities in February 2024 to more than 27,000 by the end of 2025. The report states that this increase has “undermin[ed] the NVD’s utility and public trust.”\u003c/p\u003e\n\n\u003cp\u003eThe article says the backlog became an acute problem in February 2024 when NIST stopped paying the contractors that process security flaws for inclusion and enrichment in the database. Although NIST later committed to fixing the problem by September 2024, the inspector general found that the agency did not come close to meeting that target.\u003c/p\u003e\n\n\u003cp\u003eThe report specifically criticizes NIST for setting an unrealistic operational goal. NIST aimed to process about 6,200 vulnerabilities per month, but the inspector general noted that the agency had historically never processed more than 5,000 in a month and had no plan explaining how it would achieve the higher rate.\u003c/p\u003e\n\n\u003cp\u003eThe report’s conclusion is blunt: NIST does not currently have sustainable processes to manage NVD submissions and will not be able to clear the backlog or prevent future delays without major changes.\u003c/p\u003e\n\n\u003ch1 id=\"coordination-failures-with-cisa\"\u003eCoordination Failures With CISA\u003c/h1\u003e\n\n\u003cp\u003eA major issue highlighted in the article is NIST’s failure to coordinate with the Cybersecurity and Infrastructure Security Agency (CISA). CISA launched its own Vulnrichment program in May 2024, but the inspector general found that NIST did not effectively collaborate with the agency after bringing back the contractors supporting the NVD.\u003c/p\u003e\n\n\u003cp\u003eThis lack of coordination led to duplicated effort in at least 21,000 instances between May 2024 and December 2025. The report says that in one case the two agencies even hired the same contractor to perform identical work.\u003c/p\u003e\n\n\u003cp\u003eThe inspector general estimated that this overlap wasted about $200,000 since May 2024. Beyond direct cost, the report says the “insufficient communication” frustrated stakeholders and further reduced confidence in the NVD.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that NIST’s lack of engagement became evident when it declined to respond to a CISA invitation to collaborate.\u003c/p\u003e\n\n\u003ch1 id=\"process-and-efficiency-problems\"\u003eProcess and Efficiency Problems\u003c/h1\u003e\n\n\u003cp\u003eThe inspector general recommends that NIST revise how it spends its effort, particularly on severity scoring and identifying affected products. According to the report, NIST could save about $800,000 over the next two years by reducing the amount of time spent assigning severity scores.\u003c/p\u003e\n\n\u003cp\u003eThe report argues that this work has limited value for two reasons:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e80% of vulnerability submissions already include severity scores when submitted.\u003c/li\u003e\n\u003cli\u003eNIST’s own severity scores matched those of independent assessors only 12% of the time.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBased on those findings, the inspector general says NIST can safely reduce its effort in this area and redirect resources toward more critical processing tasks needed to address the backlog.\u003c/p\u003e\n\n\u003ch1 id=\"stakeholder-communication-issues\"\u003eStakeholder Communication Issues\u003c/h1\u003e\n\n\u003cp\u003eThe article also highlights failures in NIST’s communication with external stakeholders. The inspector general cites an April 2024 open letter sent by 50 cybersecurity professionals to Congress and the Secretary of Commerce raising concerns about the “regression on NVD operations” and the “lack of transparent communication.”\u003c/p\u003e\n\n\u003cp\u003eAccording to the report, neither NIST nor the Department of Commerce responded to that letter. The inspector general presents this as further evidence that the agency did not communicate effectively during the database’s operational decline.\u003c/p\u003e\n\n\u003ch1 id=\"recommendations-and-response\"\u003eRecommendations and Response\u003c/h1\u003e\n\n\u003cp\u003eThe report says NIST must take several actions to restore the NVD’s effectiveness:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDevelop a plan to eliminate the backlog and prevent future delays.\u003c/li\u003e\n\u003cli\u003eImprove communication with stakeholders.\u003c/li\u003e\n\u003cli\u003eReduce time spent on low-value severity scoring.\u003c/li\u003e\n\u003cli\u003eCoordinate with CISA to avoid duplicative work.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eNIST concurred with the recommendations. The article says an April letter from Acting Director Craig Burkhardt, included in the report, stated that the agency would begin improving its operations immediately.\u003c/p\u003e\n\n\u003ch1 id=\"outside-reaction\"\u003eOutside Reaction\u003c/h1\u003e\n\n\u003cp\u003eThe article includes a view from Michael Daniel, president and CEO of the Cyber Threat Alliance, who argued that NIST should relinquish responsibility for the NVD to CISA. He said that operating a long-term program like the NVD aligns more naturally with CISA’s mission and that NIST has significant resource shortfalls.\u003c/p\u003e\n\n\u003ch1 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h1\u003e\n\n\u003cp\u003eThe article presents the inspector general’s report as a serious warning about the condition of a core U.S. cybersecurity resource. Its central finding is that NIST’s operational and strategic failures have allowed the National Vulnerability Database backlog to expand dramatically, while poor interagency coordination and inefficient internal processes have compounded the problem. Although NIST says it will act on the recommendations, the report makes clear that substantial changes are needed before the NVD can regain effectiveness and stakeholder trust.\u003c/p\u003e\n","keyPoints":["A Department of Commerce inspector general report found that NIST’s National Vulnerability Database backlog grew from 13,000 unprocessed vulnerabilities in February 2024 to more than 27,000 by the end of 2025, undermining its utility and public trust.","The report says poor planning by NIST contributed to the backlog, including a failed pledge to process about 6,200 vulnerabilities per month despite historically never exceeding 5,000 and lacking a plan to meet the target.","The inspector general found that NIST and CISA duplicated work in at least 21,000 instances between May 2024 and December 2025, wasting about $200,000 because NIST did not coordinate with CISA’s Vulnrichment program.","The report recommends that NIST spend less time assigning severity scores and identifying impacted products, noting that 80% of submissions already include severity scores and that NIST’s scores matched independent assessors only 12% of the time.","NIST concurred with the recommendations and said it would begin improving operations immediately, while Cyber Threat Alliance CEO Michael Daniel argued that responsibility for the NVD should move to CISA."],"insights":["The report suggests NIST could cut costs and improve throughput at the same time by reducing its severity-scoring work, because most submissions already include scores and NIST’s own scores aligned with independent assessors only 12% of the time.","The duplication with CISA was severe enough that the two agencies at one point hired the same contractor to do identical vulnerability-enrichment work, highlighting an operational failure rather than just a coordination gap.","NIST’s inability to reach its processing goal was foreseeable, according to the report, because the agency set a target above its historical monthly maximum without having a documented plan to achieve it.","The article indicates that stakeholder trust issues were worsened not only by the backlog itself but also by NIST and the Department of Commerce failing to respond to an open letter from 50 cybersecurity professionals about the NVD’s operational regression."],"referencedReports":[{"title":"National Institute of Standards and Technology’s (NIST’s) National Vulnerability Database Is in a Backlog Crisis and Lacks Strategic and Sustainable Processes","url":"https://www.oig.doc.gov/wp-content/OIGPublications/OIG-26-020-I-SECURED.pdf","publisher":"office of inspector general, u.s. department of commerce","context":"The article is centered on this inspector general report, which found that NIST mismanagement and weak planning caused a severe backlog in the National Vulnerability Database.","category":"","primary":false}],"body":"\u003cp\u003eA Department of Commerce inspector general report found that NIST’s National Vulnerability Database has been severely degraded by mismanagement, weak planning, and an expanding processing backlog. According to the report, the backlog grew from 13,000 unprocessed vulnerabilities in February 2024 to more than 27,000 by the end of 2025, undermining the database’s usefulness and public trust. The NVD is widely used by government and industry defenders to prioritize which security flaws should be addressed first.\u003c/p\u003e\n\n\u003cp\u003eThe report says NIST failed to meet its own recovery goals after contractor payment issues disrupted processing in February 2024. It pledged to process about 6,200 vulnerabilities per month by September 2024, but had historically never exceeded 5,000 and did not have a plan to reach the target. The inspector general also found that NIST and CISA duplicated vulnerability-enrichment work at least 21,000 times between May 2024 and December 2025, wasting about $200,000.\u003c/p\u003e\n\n\u003cp\u003eTo improve the situation, the report recommends that NIST reduce time spent on severity scoring and impacted-product labeling, improve communication with stakeholders, and coordinate more closely with CISA. The inspector general said much of NIST’s scoring work is of limited value because 80% of submissions already include severity scores and NIST’s results matched independent assessors only 12% of the time. NIST agreed with the recommendations and said it would begin improving operations immediately.\u003c/p\u003e\n"},{"n":6,"title":"Dashlane password manager users locked out by brute force attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/dashlane-password-manager-users-locked-out-by-brute-force-attacks/","time":"18:17","priority":"SHOULD READ","score":78,"tldr":"Dashlane says some user accounts were temporarily suspended after an external brute-force attack triggered its automated protections, and it claims there is no evidence its systems were compromised. Although Dashlane marked the incident resolved and said affected accounts were unsuspended, some users still report login issues.","briefOverview":"\u003cp\u003eDashlane says multiple user accounts were targeted in a brute-force attack by an external party, which triggered the company’s automated security controls and led to temporary account suspensions. The password manager told BleepingComputer there is no evidence its systems were compromised and said the affected accounts were later unsuspended. Users first noticed the issue after receiving emails about suspicious access requests from foreign countries and verification codes for new device registration.\u003c/p\u003e\n\n\u003cp\u003eThe company later responded on Reddit and through its status page, describing the activity as brute-force login attempts rather than a platform breach. Dashlane’s status page shows the incident was investigated on May 31 and marked
