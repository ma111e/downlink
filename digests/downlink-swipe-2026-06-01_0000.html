ccode\u003e@redhat-cloud-services/rule-components\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/remediations-client\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/rbac-client\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"sources-referenced-in-the-article\"\u003eSources Referenced in the Article\u003c/h1\u003e\n\n\u003cp\u003eThe write-up says analyses were published by multiple security organizations, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAikido Security\u003c/li\u003e\n\u003cli\u003eJFrog\u003c/li\u003e\n\u003cli\u003eMicrosoft\u003c/li\u003e\n\u003cli\u003eOX Security\u003c/li\u003e\n\u003cli\u003eSafeDep\u003c/li\u003e\n\u003cli\u003eStepSecurity\u003c/li\u003e\n\u003cli\u003eWiz\u003c/li\u003e\n\u003cli\u003eSocket\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese analyses collectively describe the malicious package behavior and provide details on the malware’s collection, exfiltration, propagation, and persistence mechanisms.\u003c/p\u003e\n\n\u003ch1 id=\"core-malicious-functionality\"\u003eCore Malicious Functionality\u003c/h1\u003e\n\n\u003cp\u003eAccording to the article, the npm packages contain an \u003cstrong\u003eobfuscated preinstall hook\u003c/strong\u003e. This hook is designed to execute at install time and collect sensitive material from affected systems.\u003c/p\u003e\n\n\u003cp\u003eThe targeted information includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGitHub Actions secrets\u003c/li\u003e\n\u003cli\u003enpm tokens\u003c/li\u003e\n\u003cli\u003eCloud credentials\u003c/li\u003e\n\u003cli\u003eKubernetes material\u003c/li\u003e\n\u003cli\u003eVault material\u003c/li\u003e\n\u003cli\u003eSSH keys\u003c/li\u003e\n\u003cli\u003eGit credentials\u003c/li\u003e\n\u003cli\u003eOther sensitive files present on the machine\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that the malware is not limited to passive credential theft. It is also designed to use stolen credentials to continue contaminating the software supply chain.\u003c/p\u003e\n\n\u003ch1 id=\"exfiltration-and-propagation-behavior\"\u003eExfiltration and Propagation Behavior\u003c/h1\u003e\n\n\u003cp\u003eThe malware uses \u003cstrong\u003eencrypted exfiltration logic\u003c/strong\u003e to transmit stolen data to \u003ccode\u003eapi.anthropic.com:443/v1/api\u003c/code\u003e. The article says GitHub serves as a fallback exfiltration channel.\u003c/p\u003e\n\n\u003cp\u003eSocket said the malware can commit an encrypted result envelope through the GitHub API. The article specifically notes that the commit message can include the string:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eIfYouInvalidateThisTokenItWillNukeTheComputerOfTheOwner:\u0026lt;token\u0026gt;\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe write-up describes this as part of an effort to both steal and operationalize credentials.\u003c/p\u003e\n\n\u003cp\u003eSafeDep’s observations, as quoted in the article, add more technical detail for npm-focused behavior. According to that analysis, the payload:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCalls the npm OIDC token exchange endpoint\u003c/li\u003e\n\u003cli\u003eCalls the \u003ccode\u003ewhoami\u003c/code\u003e endpoint\u003c/li\u003e\n\u003cli\u003eRepackages a tarball using \u003ccode\u003eupdateTarball\u003c/code\u003e / \u003ccode\u003epackage-updated.tgz\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eSigns the artifact through \u003cstrong\u003eSigstore\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSafeDep also said stolen credentials are exfiltrated to attacker-created \u003cstrong\u003epublic GitHub repositories\u003c/strong\u003e, which carry the description:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eMiasma: The Spreading Blight\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eOX Security noted that the first commit containing the string \u003ccode\u003eMiasma: The Spreading Blight\u003c/code\u003e appeared on \u003cstrong\u003eMay 29, 2026\u003c/strong\u003e, indicating that either this malware variant was active since then or that the actor had begun testing around that time.\u003c/p\u003e\n\n\u003ch1 id=\"github-specific-abuse\"\u003eGitHub-Specific Abuse\u003c/h1\u003e\n\n\u003cp\u003eThe article describes detailed GitHub abuse carried out by the malware after credentials are stolen. It says the malware:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnumerates repositories the token can write to\u003c/li\u003e\n\u003cli\u003eReads \u003ccode\u003eaction.yml\u003c/code\u003e / \u003ccode\u003eaction.yaml\u003c/code\u003e through GraphQL\u003c/li\u003e\n\u003cli\u003eCommits a workflow through the \u003ccode\u003ecreateCommitOnBranch\u003c/code\u003e mutation\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this is done so that the malicious commit appears as a \u003cstrong\u003everified, signed change\u003c/strong\u003e. This aligns with the campaign’s broader focus on supply chain propagation using trusted development channels.\u003c/p\u003e\n\n\u003ch1 id=\"additional-malware-behaviors\"\u003eAdditional Malware Behaviors\u003c/h1\u003e\n\n\u003cp\u003eThe article highlights several other actions performed by the malware:\u003c/p\u003e\n\n\u003ch2 id=\"privilege-escalation-attempt-in-ci\"\u003ePrivilege Escalation Attempt in CI\u003c/h2\u003e\n\n\u003cp\u003eIt attempts privilege escalation by launching a container that bind-mounts the host \u003ccode\u003e/etc/sudoers.d\u003c/code\u003e and grants the CI runner \u003cstrong\u003epasswordless sudo\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"security-tool-checks\"\u003eSecurity Tool Checks\u003c/h2\u003e\n\n\u003cp\u003eBefore carrying out malicious actions, it checks for endpoint protection or runner hardening from:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCrowdStrike\u003c/li\u003e\n\u003cli\u003eSentinelOne\u003c/li\u003e\n\u003cli\u003eCarbon Black\u003c/li\u003e\n\u003cli\u003eStepSecurity Harden-Runner\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"persistence-mechanisms\"\u003ePersistence Mechanisms\u003c/h2\u003e\n\n\u003cp\u003eThe malware establishes persistence by modifying developer tooling and project settings, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInjecting a \u003ccode\u003eSessionStart\u003c/code\u003e hook into \u003cstrong\u003eAnthropic Claude Code\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eCreating a \u003ccode\u003etasks.json\u003c/code\u003e with \u003ccode\u003e\u0026quot;runOn\u0026quot;: \u0026quot;folderOpen\u0026quot;\u003c/code\u003e for \u003cstrong\u003eMicrosoft Visual Studio Code\u003c/strong\u003e projects\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these changes cause the malware to be automatically launched during future sessions.\u003c/p\u003e\n\n\u003ch1 id=\"geographic-evasion\"\u003eGeographic Evasion\u003c/h1\u003e\n\n\u003cp\u003eAnother behavior noted in the article is that the malware avoids execution on \u003cstrong\u003eRussian-language systems\u003c/strong\u003e. The article says this pattern has also been observed in \u003cstrong\u003eGlassWorm\u003c/strong\u003e supply chain campaigns.\u003c/p\u003e\n\n\u003ch1 id=\"variant-evolution\"\u003eVariant Evolution\u003c/h1\u003e\n\n\u003cp\u003eWiz researchers said this Miasma variant introduces \u003cstrong\u003enew data collectors focused on cloud identities\u003c/strong\u003e. Specifically, it adds collectors for:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGCP identities\u003c/li\u003e\n\u003cli\u003eAzure identities\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to Wiz, previous versions were primarily focused on extracting secrets from these environments, while this version suggests an increased attacker focus on gaining and leveraging access to the cloud itself.\u003c/p\u003e\n\n\u003cp\u003eThe article also says that, unlike previous versions, the malware generates a \u003cstrong\u003euniquely encrypted payload for each infection\u003c/strong\u003e, making detection and version tracking significantly more difficult.\u003c/p\u003e\n\n\u003ch1 id=\"suspected-initial-compromise\"\u003eSuspected Initial Compromise\u003c/h1\u003e\n\n\u003cp\u003eThe article says there is evidence suggesting that a \u003cstrong\u003eRed Hat employee’s GitHub account\u003c/strong\u003e was the patient zero for the campaign. According to the report, that compromised account was used to push \u003cstrong\u003emalicious orphan commits\u003c/strong\u003e into two \u003cstrong\u003eRedHatInsights\u003c/strong\u003e repositories, bypassing code review.\u003c/p\u003e\n\n\u003ch1 id=\"impact-and-risk\"\u003eImpact and Risk\u003c/h1\u003e\n\n\u003cp\u003eThe article presents the campaign as significant because it combines:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCredential theft from developer workstations\u003c/li\u003e\n\u003cli\u003eSecret theft from CI/CD systems\u003c/li\u003e\n\u003cli\u003eGitHub and npm abuse for downstream propagation\u003c/li\u003e\n\u003cli\u003ePersistence through developer tools\u003c/li\u003e\n\u003cli\u003ePossible tampering with build and release pipelines\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBecause the malware can continue operating after installation and may modify local configurations, the impact extends beyond the initial presence of a malicious package in \u003ccode\u003enode_modules\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch1 id=\"recommended-response\"\u003eRecommended Response\u003c/h1\u003e\n\n\u003cp\u003eThe article recommends the following actions for organizations that installed the affected package versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIsolate affected hosts\u003c/li\u003e\n\u003cli\u003eRemove the malicious versions\u003c/li\u003e\n\u003cli\u003eRotate exposed credentials\u003c/li\u003e\n\u003cli\u003eReview for suspicious GitHub activity\u003c/li\u003e\n\u003cli\u003eReview for suspicious npm activity\u003c/li\u003e\n\u003cli\u003eAudit for persistence artifacts\u003c/li\u003e\n\u003cli\u003eEnforce strong access controls\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt specifically mentions reviewing for changes involving these files:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e~/.claude/settings.json\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.vscode/tasks.json\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.github/workflows/codeql.yml\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.github/setup.js\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor CI/CD systems, the article recommends:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSuspending affected workflow runs\u003c/li\u003e\n\u003cli\u003eInvalidating build artifacts produced during the exposure window\u003c/li\u003e\n\u003cli\u003eReviewing whether any release, container image, npm package, or deployment artifact was created after the malicious package was installed\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSocket is quoted as warning that simply uninstalling the npm package or deleting \u003ccode\u003enode_modules\u003c/code\u003e should \u003cstrong\u003enot\u003c/strong\u003e be considered sufficient cleanup because the malware supports background execution and persistence in developer tooling.\u003c/p\u003e\n\n\u003ch1 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h1\u003e\n\n\u003cp\u003eThe article describes Miasma as a supply chain compromise of Red Hat-associated npm packages that goes beyond secret theft by using GitHub, npm, CI/CD access, signed-appearing commits, and developer-tool persistence to support ongoing propagation. It also highlights that the campaign may have started from a compromised Red Hat employee GitHub account and that remediation requires host isolation, credential rotation, artifact review, and checks for persistence rather than package removal alone.\u003c/p\u003e\n","keyPoints":["A supply chain campaign dubbed Miasma compromised multiple @redhat-cloud-services npm packages with a malicious preinstall hook that steals credentials and secrets from developer machines and CI/CD environments.","Researchers said the malware collects GitHub Actions secrets, npm tokens, cloud credentials, Kubernetes and Vault material, SSH keys, Git credentials, and other sensitive files, then exfiltrates them using encrypted logic to api.anthropic.com with GitHub as a fallback.","The malware can enumerate GitHub repositories writable by a stolen token, read workflow files, and commit malicious workflows through the GitHub API to support downstream propagation.","The article states the malware also attempts privilege escalation in CI, checks for protections such as CrowdStrike, SentinelOne, Carbon Black, and StepSecurity Harden-Runner, and establishes persistence through Anthropic Claude Code and Visual Studio Code configuration changes.","Evidence cited in the article suggests a compromised Red Hat employee GitHub account was the initial access point used to inject malicious orphan commits into two RedHatInsights repositories, bypassing code review."],"insights":["The malware is designed not just to steal secrets but to reuse them immediately for software supply chain propagation by repackaging npm tarballs, calling npm OIDC and whoami endpoints, and committing signed-looking GitHub workflow changes through createCommitOnBranch.","Cleanup requires more than removing the affected npm packages because the article says the malware can persist via Anthropic Claude Code session hooks and Visual Studio Code tasks configured to run automatically when a folder is opened.","Detection and tracking are made harder because this variant generates a uniquely encrypted payload for each infection, which the article contrasts with previous versions.","The malware explicitly checks for endpoint and runner protections such as CrowdStrike, SentinelOne, Carbon Black, and StepSecurity Harden-Runner before executing malicious actions, indicating defenders should review whether those controls logged blocked or bypassed activity.","The article highlights that the attacker used malicious orphan commits in RedHatInsights repositories to bypass code review, making repository history review and commit lineage validation especially important in this case."],"referencedReports":[{"title":"Mini Shai-Hulud campaign hits Red Hat cloud services npm packages","url":"https://socket.dev/blog/mini-shai-hulud-campaign-hits-red-hat-cloud-services-npm-packages","publisher":"Socket","context":"The article quotes Socket's analysis directly and uses it as a primary basis for describing the Miasma campaign's tactics and impact.","category":"","primary":false},{"title":"Red Hat npm packages compromised: credential-stealing worm","url":"https://www.aikido.dev/blog/red-hat-npm-packages-compromised-credential-stealing-worm","publisher":"Aikido Security","context":"The article cites Aikido Security as one of the organizations that analyzed the compromised npm packages and their malicious behavior.","category":"","primary":false},{"title":"Shai-Hulud / Miasma targeting Red Hat cloud services","url":"https://research.jfrog.com/post/shai-hulud-miasma-redhat-cloud-services/","publisher":"JFrog","context":"The article references JFrog's analysis among several technical write-ups examining the compromised Red Hat npm packages.","category":"","primary":false},{"title":"New npm supply chain attack: Red Hat cloud services compromised","url":"https://www.ox.security/blog/new-npm-supply-chain-attack-redhat-cloud-services-compromised","publisher":"OX Security","context":"The article cites OX Security for analysis details including timeline observations related to the Miasma campaign.","category":"","primary":false},{"title":"Red Hat Cloud Services hit by Mini Shai-Hulud npm worm","url":"https://safedep.io/redhat-cloud-services-hit-by-mini-shai-hulud-npm-worm/","publisher":"SafeDep","context":"The article references SafeDep's technical analysis for details on npm behavior, tarball repackaging, and Sigstore signing.","category":"","primary":false},{"title":"Multiple RedHat cloud services npm packages compromised","url":"https://www.stepsecurity.io/blog/multiple-redhat-cloud-services-npm-packages-compromised","publisher":"StepSecurity","context":"The article includes StepSecurity among the security firms that published technical analysis of the compromised packages.","category":"","primary":false},{"title":"Miasma supply chain attack targeting Red Hat npm packages","url":"https://www.wiz.io/blog/miasma-supply-chain-attack-targeting-redhat-npm-packages","publisher":"Wiz","context":"The article cites Wiz researchers for observations about newly added cloud identity collectors and uniquely encrypted payloads.","category":"","primary":false}],"body":"\u003cp\u003eA supply chain campaign dubbed \u003cstrong\u003eMiasma\u003c/strong\u003e compromised multiple \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e npm packages with a malicious preinstall hook that steals credentials and secrets from developer machines and CI/CD environments. Socket described it as effectively a Mini Shai-Hulud campaign because it uses install-time execution, credential harvesting, CI/CD targeting, encrypted exfiltration, and possible downstream propagation. The actor behind the activity is unknown, and attribution is complicated because TeamPCP previously open-sourced tools linked to the Shai-Hulud worm.\u003c/p\u003e\n\n\u003cp\u003eResearchers said the malware targets GitHub Actions secrets, npm tokens, cloud credentials, Kubernetes and Vault material, SSH keys, Git credentials, and other sensitive files. It exfiltrates data using encrypted logic to \u003ccode\u003eapi.anthropic.com:443/v1/api\u003c/code\u003e and can use GitHub as a fallback, including committing encrypted result envelopes through the GitHub API. The malware also enumerates repositories writable by a stolen GitHub token, reads workflow files, and commits malicious workflows so signed changes appear verified.\u003c/p\u003e\n\n\u003cp\u003eThe article says the malware attempts privilege escalation in CI, checks for protections such as CrowdStrike, SentinelOne, Carbon Black, and StepSecurity Harden-Runner, and establishes persistence through Anthropic Claude Code and Visual Studio Code configuration changes. Wiz said this variant adds new collectors for GCP and Azure identities and generates a uniquely encrypted payload for each infection. Evidence cited in the article suggests a compromised Red Hat employee GitHub account was the patient zero used to inject malicious orphan commits into two RedHatInsights repositories, bypassing code review.\u003c/p\u003e\n"},{"n":22,"title":"OpenAI Codex Authentication Tokens Stolen in codexui-android npm Supply Chain Attack","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/openai-codex-authentication-tokens.html","time":"09:31","priority":"SHOULD READ","score":87,"tldr":"A popular npm package, codexui-android, and related Android apps were found stealing OpenAI Codex authentication tokens by secretly exfiltrating the local auth.json file to an attacker-controlled server. The key takeaway is that developers using this tool may have exposed long-lived refresh tokens that can enable persistent account access.","briefOverview":"\u003cp\u003eCybersecurity researchers disclosed a supply chain campaign targeting developers who use OpenAI Codex through a package called \u003ccode\u003ecodexui-android\u003c/code\u003e, which was presented as a remote web UI on GitHub and npm. According to Aikido Security, the package silently exfiltrated Codex authentication tokens to an attacker-controlled server for about a month. The package reportedly attracted more than 29,000 weekly downloads and remained available on npm at the time of reporting.\u003c/p\u003e\n\n\u003cp\u003eWhat makes the incident notable is that the malicious functionality was embedded in a working npm package under active development rather than a typosquat or disposable package. Aikido said the package reads \u003ccode\u003e~/.codex/auth.json\u003c/code\u003e and sends \u003ccode\u003eaccess_token\u003c/code\u003e, \u003ccode\u003erefresh_token\u003c/code\u003e, \u003ccode\u003eid_token\u003c/code\u003e, and account ID data to \u003ccode\u003esentry.anyclaw.store\u003c/code\u003e, a domain made to resemble Sentry. The researcher added that the stolen refresh token does not expire, which can allow silent, persistent impersonation of the affected account.\u003c/p\u003e\n\n\u003cp\u003eThe same exfiltration chain was also observed in Android apps including OpenClaw Codex Claude AI Agent and Codex, both linked to an entity called BrutalStrike. Aikido said these apps run the npm package inside a PRoot sandbox after unpacking a Termux-derived Linux environment, and then send the in-app Codex \u003ccode\u003eauth.json\u003c/code\u003e contents after sign-in. The article also notes separate Aikido findings that deleted Google API keys can remain valid for up to 23 minutes, a behavior Google has since decided to treat as a P0 bug.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers have revealed a malicious supply chain campaign that targets developers using OpenAI Codex through a seemingly legitimate remote web UI package named \u003ccode\u003ecodexui-android\u003c/code\u003e. The package is listed on npm and GitHub and was said to be drawing more than 29,000 weekly downloads. Aikido Security reported that the malicious behavior was not part of a classic typosquatting scheme, but instead inserted into a functional package that continued active development while the linked GitHub repository stayed clean.\u003c/p\u003e\n\n\u003cp\u003eAccording to the report, the package was first published and then modified roughly a month later to add credential theft functionality, likely after establishing some degree of trust. Aikido attributed the npm package to the account \u003ccode\u003efriuns\u003c/code\u003e, identified as Igor Levochkin in the article. The package remained available on npm at the time the article was published.\u003c/p\u003e\n\n\u003cp\u003eThe malicious code reportedly reads the local Codex credentials file at \u003ccode\u003e~/.codex/auth.json\u003c/code\u003e and exfiltrates it to \u003ccode\u003esentry.anyclaw.store\u003c/code\u003e, a domain designed to look like the legitimate monitoring platform Sentry. The data sent from the file includes \u003ccode\u003eaccess_token\u003c/code\u003e, \u003ccode\u003erefresh_token\u003c/code\u003e, \u003ccode\u003eid_token\u003c/code\u003e, and account ID. Aikido researcher Charlie Eriksen said the refresh token does not expire, meaning someone who steals it can silently impersonate the affected user indefinitely.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that OpenAI documents that Codex login details are cached locally either in \u003ccode\u003e~/.codex/auth.json\u003c/code\u003e or an operating-system-specific credential store, and warns users to treat the file like a password. This makes the theft of the file particularly serious because it contains active authentication material. Aikido emphasized that the compromise extends beyond a chat interface and provides persistent access to whatever the account can do.\u003c/p\u003e\n\n\u003cp\u003eAikido also found the same exfiltration chain in Android applications distributed through Google Play. One app, OpenClaw Codex Claude AI Agent, reportedly has more than 50,000 downloads and runs the npm package in a PRoot sandbox after extracting a Termux-derived Linux userland on first launch. Because the app did not pin the npm package version, devices fetched the currently published package from npm, and once users signed in through the in-app Codex flow, the app could read the sandboxed \u003ccode\u003eauth.json\u003c/code\u003e and send it to the same endpoint; a second app named Codex, with more than 10,000 downloads, was also flagged.\u003c/p\u003e\n\n\u003cp\u003eWhen contacted through GitHub, the package author initially commented that they had lost access to their npm account, then edited the message and later said they were investigating internally and removing affected functionality and data. The article notes that the author denied sharing credential data with third parties, but did not explain why the code was present only in the npm build or why access to Codex tokens was necessary. It also points to the author’s linked X profile containing the \u003ccode\u003eanyclaw.store\u003c/code\u003e domain and says WHOIS records show the domain was registered two days after the first package version was uploaded.\u003c/p\u003e\n\n\u003cp\u003eSeparately, the article ties this case to a broader pattern of threats against AI developer tooling and workflows by citing Aikido research on Google API key revocation delays. That research found that deleted Google API keys can remain usable for up to 23 minutes, with a median window of about 16 minutes, and that this could expose Gemini-related data if enabled on the project. The article says Google initially did not classify the issue as a security problem, but has since chosen to treat it as a P0 bug, and it compares the finding to a previously observed 4-second window involving deleted AWS access keys.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eCybersecurity researchers disclosed a malicious supply chain campaign targeting developers who use OpenAI Codex through a package called \u003ccode\u003ecodexui-android\u003c/code\u003e. The package was presented on GitHub and npm as a remote web UI for OpenAI Codex and reportedly drew more than 29,000 weekly downloads. According to Aikido Security, the package was quietly exfiltrating Codex authentication tokens to an attacker-controlled server.\u003c/p\u003e\n\n\u003cp\u003eThe package remained available on npm at the time of reporting. The article identifies the npm account associated with the package as \u003ccode\u003efriuns\u003c/code\u003e, also referred to as Igor Levochkin.\u003c/p\u003e\n\n\u003ch1 id=\"why-the-incident-stands-out\"\u003eWhy the Incident Stands Out\u003c/h1\u003e\n\n\u003cp\u003eThe article says this was not a typical typosquatting or throwaway-package operation. Instead, the malicious code was embedded in a working npm package that had undergone active development. At the same time, the corresponding GitHub repository remained clean, making the package appear legitimate to users inspecting the public source repository.\u003c/p\u003e\n\n\u003cp\u003eAikido researcher Charlie Eriksen said that for about a month, every invocation had been exfiltrating Codex authentication tokens to an attacker-controlled server. The article states that the malicious changes were introduced roughly one month after the package was published, likely to build trust and increase adoption before the exfiltration logic was added.\u003c/p\u003e\n\n\u003ch1 id=\"technical-details-of-the-credential-theft\"\u003eTechnical Details of the Credential Theft\u003c/h1\u003e\n\n\u003cp\u003eThe package reportedly contained code that read the local Codex credentials file located at \u003ccode\u003e~/.codex/auth.json\u003c/code\u003e. It then sent the contents to \u003ccode\u003esentry.anyclaw.store\u003c/code\u003e, a domain crafted to resemble the legitimate application monitoring platform Sentry.\u003c/p\u003e\n\n\u003cp\u003eThe article says the stolen data included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eaccess_token\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003erefresh_token\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eid_token\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eaccount ID\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eEriksen stated that the \u003ccode\u003erefresh_token\u003c/code\u003e does not expire. In the article’s framing, this makes the compromise especially serious because anyone holding the token can silently impersonate the user indefinitely.\u003c/p\u003e\n\n\u003ch1 id=\"openai-codex-authentication-context\"\u003eOpenAI Codex Authentication Context\u003c/h1\u003e\n\n\u003cp\u003eThe article notes that every time a user logs in to the Codex app, CLI, or IDE extension using either ChatGPT or an API key, the login details are cached locally. Those credentials are stored either in the plaintext file \u003ccode\u003e~/.codex/auth.json\u003c/code\u003e or in the operating system-specific credential store.\u003c/p\u003e\n\n\u003cp\u003eIt also cites OpenAI documentation warning users to treat \u003ccode\u003e~/.codex/auth.json\u003c/code\u003e like a password because it contains access tokens. OpenAI explicitly advises users not to commit the file, paste it into tickets, or share it in chat.\u003c/p\u003e\n\n\u003ch1 id=\"android-apps-as-an-additional-delivery-vector\"\u003eAndroid Apps as an Additional Delivery Vector\u003c/h1\u003e\n\n\u003cp\u003eThe article says the npm package was not the only mechanism used to target Codex developers. Aikido observed an Android application called \u003cstrong\u003eOpenClaw Codex Claude AI Agent\u003c/strong\u003e with package name \u003ccode\u003egptos.intelligence.assistant\u003c/code\u003e that used the same npm package inside a PRoot sandbox.\u003c/p\u003e\n\n\u003cp\u003eAccording to Eriksen, the Android package looked small and clean in a Google Play pre-publish scan. However, on first launch, it extracted a Termux-derived Linux userland into the app’s private storage and then ran Node.js inside that environment via PRoot.\u003c/p\u003e\n\n\u003cp\u003eAikido said the app did not pin the npm package version, so devices downloaded whatever version was current on npm. The article states that the exfiltration had been present since \u003ccode\u003ecodexui-android@0.1.82\u003c/code\u003e. Once a user signed in through the in-app Codex flow, the package could read the sandboxed \u003ccode\u003eauth.json\u003c/code\u003e file and send the full OAuth data to \u003ccode\u003esentry.anyclaw.store/startlog\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch1 id=\"scale-and-distribution\"\u003eScale and Distribution\u003c/h1\u003e\n\n\u003cp\u003eThe Android application \u003cstrong\u003eOpenClaw Codex Claude AI Agent\u003c/strong\u003e was attributed in the article to an entity named \u003cstrong\u003eBrutalStrike\u003c/strong\u003e and was said to have more than 50,000 downloads. A second Android app linked to BrutalStrike, named \u003cstrong\u003eCodex\u003c/strong\u003e with package name \u003ccode\u003ecodex.app\u003c/code\u003e, was also reported to contain the same exfiltration chain and had more than 10,000 downloads.\u003c/p\u003e\n\n\u003cp\u003eThe article adds that the remaining three apps offered by the same developer did not contain this functionality.\u003c/p\u003e\n\n\u003ch1 id=\"author-response-and-domain-clues\"\u003eAuthor Response and Domain Clues\u003c/h1\u003e\n\n\u003cp\u003eAikido said it contacted the package author through GitHub. According to the article, the author first posted a comment claiming they had lost access to their npm account, then edited the response and later said they were investigating the issue internally and had started removing the affected functionality and related data.\u003c/p\u003e\n\n\u003cp\u003eThe author also claimed that no credential data had been shared with third parties. The article notes, however, that the author did not explain why the malicious code appeared only in the npm package build and not in the GitHub repository, nor why access to Codex tokens was needed.\u003c/p\u003e\n\n\u003cp\u003eThe article further says the X profile linked to the author included the domain \u003ccode\u003eanyclaw.store\u003c/code\u003e. WHOIS records cited in the article show that the domain was registered on April 12, 2026, two days after the first package version, \u003ccode\u003e0.1.72\u003c/code\u003e, was uploaded to npm.\u003c/p\u003e\n\n\u003ch1 id=\"broader-ai-developer-tooling-context\"\u003eBroader AI Developer Tooling Context\u003c/h1\u003e\n\n\u003cp\u003eThe article places the incident within a growing pattern of threats against AI developer tooling and workflows. It highlights that real AI development ecosystems are being targeted for credential theft and deeper access into software supply chains.\u003c/p\u003e\n\n\u003ch1 id=\"related-aikido-finding-on-google-api-keys\"\u003eRelated Aikido Finding on Google API Keys\u003c/h1\u003e\n\n\u003cp\u003eIn addition to the Codex case, the article references a separate Aikido finding involving deleted Google API keys. According to that research, a deleted Google API key can remain valid for up to 23 minutes, with a median revocation window of around 16 minutes.\u003c/p\u003e\n\n\u003cp\u003eThe article quotes researcher Joe Leon saying that an attacker with a leaked key can continue sending requests until one reaches a server that has not yet synchronized the revocation state. It further says that if Gemini is enabled on the project, an attacker could dump uploaded files and exfiltrate cached conversations.\u003c/p\u003e\n\n\u003cp\u003eInitially, Google reportedly said this behavior was a known property of the system and not a security issue. The article states that Google later decided to classify it as a \u003cstrong\u003eP0 bug\u003c/strong\u003e, indicating a severe issue needing immediate attention.\u003c/p\u003e\n\n\u003ch1 id=\"comparison-to-aws-revocation-delay\"\u003eComparison to AWS Revocation Delay\u003c/h1\u003e\n\n\u003cp\u003eThe article compares the Google API key delay to a previously observed \u003cstrong\u003e4-second exploitation window\u003c/strong\u003e involving deleted Amazon Web Services access keys. It says these examples show how credential revocation delays can be exploitable even when defenders assume the credentials have already been invalidated.\u003c/p\u003e\n\n\u003ch1 id=\"main-takeaways-from-the-article\"\u003eMain Takeaways from the Article\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eA popular npm package marketed for OpenAI Codex use was reported to contain hidden credential theft code.\u003c/li\u003e\n\u003cli\u003eThe package allegedly stole Codex authentication material from \u003ccode\u003e~/.codex/auth.json\u003c/code\u003e and sent it to \u003ccode\u003esentry.anyclaw.store\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eThe operation was notable because the npm build was malicious while the public GitHub repository remained clean.\u003c/li\u003e\n\u003cli\u003eAikido tied the same exfiltration chain to Android apps on Google Play that used PRoot and a Termux-derived Linux environment to run the npm package.\u003c/li\u003e\n\u003cli\u003eThe article also connected the case to broader security issues in AI tooling, including revocation delays for deleted Google API keys.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"entities-mentioned-in-the-article\"\u003eEntities Mentioned in the Article\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAikido Security\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCharlie Eriksen\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eJoe Leon\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOpenAI\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOpenAI Codex\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003enpm\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGitHub\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGoogle Play\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBrutalStrike\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003efriuns / Igor Levochkin\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOpenClaw Codex Claude AI Agent\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCodex\u003c/strong\u003e (\u003ccode\u003ecodex.app\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003esentry.anyclaw.store\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eanyclaw.store\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGoogle\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGoogle Gemini\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAmazon Web Services (AWS)\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"conclusion\"\u003eConclusion\u003c/h1\u003e\n\n\u003cp\u003eThe article describes a supply chain compromise in which a legitimate-looking and actively developed package for OpenAI Codex was used to steal long-lived authentication tokens from developers. It also reports that the same credential theft chain appeared in Android apps distributed through Google Play. In parallel, the article highlights separate research showing that deleted cloud credentials may remain usable for a limited period, underscoring broader weaknesses in AI and cloud development workflows.\u003c/p\u003e\n","keyPoints":["Aikido Security reported that the npm package codexui-android, promoted as a remote web UI for OpenAI Codex, has been exfiltrating Codex authentication tokens to the attacker-controlled domain sentry.anyclaw.store.","The malicious code reads the plaintext file ~/.codex/auth.json and sends access_token, refresh_token, id_token, and account ID data to the remote server.","Aikido said the exfiltration was added about a month after the package was first published, and the package's GitHub repository remained clean while the npm build contained the malicious functionality.","The same exfiltration chain was also found in Android apps including OpenClaw Codex Claude AI Agent and Codex, which run the npm package inside a PRoot sandbox and send credentials after users sign in.","The article also notes separate Aikido findings that deleted Google API keys can remain usable for up to 23 minutes, and that Google has since decided to treat the issue as a P0 bug."],"insights":["This campaign stands out because the malicious code was inserted into a functional, actively developed npm package rather than a typosquat or throwaway package, while the public GitHub repository stayed clean.","The article highlights that a stolen Codex refresh token is especially dangerous because Aikido states it does not expire, enabling silent long-term impersonation of the account.","The Android delivery path is notable because the app can appear clean in a Play pre-publish scan while extracting a Termux-derived Linux environment and running the npm package inside a PRoot sandbox after installation.","The Android app did not pin the npm package version, which meant devices automatically pulled whatever version was currently published, including the malicious release.","The article notes a second supply-chain-related risk in AI workflows: even deleted Google API keys may remain valid for up to 23 minutes, creating an exploitable revocation delay."],"referencedReports":[{"title":"Codex Remote UI steals AI tokens","url":"https://www.aikido.dev/blog/codex-remote-ui-steals-ai-tokens","publisher":"aikido-security","context":"The article cites this Aikido Security research as the source detailing how the codexui-android npm package exfiltrates OpenAI Codex authentication tokens.","category":"","primary":false},{"title":"Deleted Google API keys still work","url":"https://www.aikido.dev/blog/google-api-keys-deletion","publisher":"aikido-security","context":"The article references this Aikido Security research to note that deleted Google API keys can remain usable for up to 23 minutes.","category":"","primary":false},{"title":"AWS IAM eventual consistency persistence","url":"https://www.offensai.com/blog/aws-iam-eventual-consistency-persistence","publisher":"offensai","context":"The article mentions this analysis as a similar example of a short exploitation window after deleted AWS access keys remain usable.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers disclosed a supply chain campaign targeting developers who use OpenAI Codex through a package called \u003ccode\u003ecodexui-android\u003c/code\u003e, which was presented as a remote web UI on GitHub and npm. According to Aikido Security, the package silently exfiltrated Codex authentication tokens to an attacker-controlled server for about a month. The package reportedly attracted more than 29,000 weekly downloads and remained available on npm at the time of reporting.\u003c/p\u003e\n\n\u003cp\u003eWhat makes the incident notable is that the malicious functionality was embedded in a working npm package under active development rather than a typosquat or disposable package. Aikido said the package reads \u003ccode\u003e~/.codex/auth.json\u003c/code\u003e and sends \u003ccode\u003eaccess_token\u003c/code\u003e, \u003ccode\u003erefresh_token\u003c/code\u003e, \u003ccode\u003eid_token\u003c/code\u003e, and account ID data to \u003ccode\u003esentry.anyclaw.store\u003c/code\u003e, a domain made to resemble Sentry. The researcher added that the stolen refresh token does not expire, which can allow silent, persistent impersonation of the affected account.\u003c/p\u003e\n\n\u003cp\u003eThe same exfiltration chain was also observed in Android apps including OpenClaw Codex Claude AI Agent and Codex, both linked to an entity called BrutalStrike. Aikido said these apps run the npm package inside a PRoot sandbox after unpacking a Termux-derived Linux environment, and then send the in-app Codex \u003ccode\u003eauth.json\u003c/code\u003e contents after sign-in. The article also notes separate Aikido findings that deleted Google API keys can remain valid for up to 23 minutes, a behavior Google has since decided to treat as a P0 bug.\u003c/p\u003e\n"},{"n":14,"title":"Red Hat npm packages compromised to steal developer credentials","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/red-hat-npm-packages-compromised-to-steal-developer-credentials/","time":"21:38","priority":"SHOULD READ","score":85,"tldr":"Red Hat removed more than 30 compromised npm packages from its @redhat-cloud-services namespace after attackers allegedly hijacked a GitHub account to publish credential-stealing malware targeting developer and cloud secrets. The incident appears linked to a new Shai-Hulud variant called Miasma, and anyone who installed the affected versions should rotate credentials immediately.","briefOverview":"\u003cp\u003eMore than 30 npm packages under Red Hat’s \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e namespace were compromised in a supply-chain attack that delivered a credential-stealing malware variant called Miasma. Security firms Aikido and OX Security discovered the incident and found dozens of backdoored package versions designed to steal developer credentials, cloud secrets, SSH keys, CI/CD tokens, and other sensitive information. Aikido said the affected packages receive roughly 117,000 weekly downloads.\u003c/p\u003e\n\n\u003cp\u003eRed Hat told BleepingComputer that it removed the affected packages from the npm registry after becoming aware of the incident. The company said the compromised packages were limited to internal development tooling and that the malicious code was never published for customer consumption via \u003ccode\u003econsole.redhat.com\u003c/code\u003e. Red Hat also said it had not identified any impact to customer or partner environments or Red Hat production systems, though its investigation is ongoing.\u003c/p\u003e\n\n\u003cp\u003eAccording to Aikido, the attackers allegedly compromised a Red Hat employee’s GitHub account and used it to push malicious commits to multiple repositories. Those changes added a GitHub Actions workflow and a script that used GitHub OIDC tokens and npm trusted publishing to release backdoored packages. The malicious packages contained a \u003ccode\u003epreinstall\u003c/code\u003e script that automatically executed an obfuscated \u003ccode\u003eindex.js\u003c/code\u003e payload that researchers say stole a wide range of credentials and secrets.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMore than 30 npm packages in Red Hat’s \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e namespace were compromised in a supply-chain attack that distributed a credential-stealing malware variant called Miasma. The incident was identified by Aikido and OX Security, which found dozens of malicious package versions aimed at collecting developer credentials, cloud secrets, SSH keys, CI/CD tokens, and other sensitive material. Aikido estimated the affected packages received about 117,000 weekly downloads.\u003c/p\u003e\n\n\u003cp\u003eRed Hat said it removed the affected packages from the npm registry after learning of the issue. In a statement to BleepingComputer, the company said the packages were strictly limited to internal development and that the malicious code was never published for customer consumption through \u003ccode\u003econsole.redhat.com\u003c/code\u003e. Red Hat added that, while its investigation is still underway, it had not found evidence of impact to customer or partner environments or to Red Hat production systems.\u003c/p\u003e\n\n\u003cp\u003eAccording to Aikido, the attackers allegedly gained access to a Red Hat employee’s GitHub account and used that access to push malicious commits directly into multiple repositories. Those commits reportedly added a GitHub Actions workflow and a script that abused npm’s publishing mechanism to release compromised package versions. Aikido said the workflow installed Bun, ran \u003ccode\u003e_index.js\u003c/code\u003e, and used the \u003ccode\u003eid-token: write\u003c/code\u003e permission to request a short-lived OIDC token from GitHub for authentication to npm’s trusted publishing endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe backdoored packages included a malicious \u003ccode\u003epreinstall\u003c/code\u003e script that executed an obfuscated \u003ccode\u003eindex.js\u003c/code\u003e payload when developers installed them. Aikido said the payload was about 4.2 MB in size and was built to steal GitHub Actions secrets, AWS credentials, Google Cloud credentials, Azure service principal credentials, HashiCorp Vault tokens, Kubernetes service account tokens, npm and PyPI publishing tokens, SSH keys, Docker credentials, GPG keys, and \u003ccode\u003e.env\u003c/code\u003e files. The firm said 32 packages and 96 package versions were affected, and advised organizations that installed them to rotate all credentials, secrets, and tokens used by code on infected devices immediately.\u003c/p\u003e\n\n\u003cp\u003eThe article places the incident in the context of recent Shai-Hulud-related supply-chain attacks that have affected projects and organizations including Bitwarden, SAP, Mistral, TanStack, OpenAI, and GitHub. It says TeamPCP publicly released the source code for its Mini Shai-Hulud malware framework in May, making it available to other threat actors. Researchers said the malware used in the Red Hat compromise resembles Mini Shai-Hulud but includes the string “Miasma: The Spreading Blight” in compromised GitHub repositories.\u003c/p\u003e\n\n\u003cp\u003eOX Security said the malware keeps the same credential-stealing functionality as Mini Shai-Hulud while adding more obfuscation, multi-stage payload delivery, and enhanced theft and credential-harvesting capabilities. At the time of writing, the article said 309 GitHub repositories had been compromised by the Miasma campaign. It also noted that it remains unclear whether TeamPCP itself conducted the campaign or whether another actor adapted the leaked malware source code.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eMore than 30 npm packages under Red Hat’s \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e namespace were compromised in a supply-chain attack that distributed a credential-stealing malware variant referred to as \u003cstrong\u003eMiasma\u003c/strong\u003e. The incident was discovered by \u003cstrong\u003eAikido\u003c/strong\u003e and \u003cstrong\u003eOX Security\u003c/strong\u003e, which reported that dozens of package versions had been backdoored to steal developer credentials, cloud secrets, SSH keys, CI/CD tokens, and other sensitive information.\u003c/p\u003e\n\n\u003cp\u003eAccording to Aikido, the compromised packages receive roughly \u003cstrong\u003e117,000 weekly downloads\u003c/strong\u003e. The article presents the event as part of a broader series of recent supply-chain attacks involving malware associated with the \u003cstrong\u003eShai-Hulud\u003c/strong\u003e family.\u003c/p\u003e\n\n\u003ch1 id=\"red-hat-s-response\"\u003eRed Hat’s response\u003c/h1\u003e\n\n\u003cp\u003eRed Hat told BleepingComputer that it became aware of the issue, initiated an investigation, and \u003cstrong\u003eremoved the affected packages from the npm registry\u003c/strong\u003e.\u003c/p\u003e\n\n\u003cp\u003eRed Hat stated:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe packages were \u003cstrong\u003estrictly limited to internal development\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe malicious code was \u003cstrong\u003enever published for customer consumption\u003c/strong\u003e through \u003ccode\u003econsole.redhat.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eThe company had \u003cstrong\u003enot identified any impact\u003c/strong\u003e to customer or partner environments or to Red Hat production systems at the time of its statement.\u003c/li\u003e\n\u003cli\u003eThe investigation was \u003cstrong\u003eongoing\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe company did not answer questions about how the account compromise occurred.\u003c/p\u003e\n\n\u003ch1 id=\"reported-intrusion-path\"\u003eReported intrusion path\u003c/h1\u003e\n\n\u003cp\u003eAccording to Aikido, the attackers allegedly \u003cstrong\u003ecompromised a Red Hat employee’s GitHub account\u003c/strong\u003e and used that access to push malicious commits directly into multiple repositories.\u003c/p\u003e\n\n\u003cp\u003eThose commits reportedly introduced:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA \u003cstrong\u003eGitHub Actions workflow\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eA script that \u003cstrong\u003eabused npm’s publishing mechanism\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eLogic to publish \u003cstrong\u003ebackdoored versions\u003c/strong\u003e of multiple packages\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAikido explained that when the workflow ran, it installed \u003cstrong\u003eBun\u003c/strong\u003e and executed \u003ccode\u003e_index.js\u003c/code\u003e, supplying target packages through the \u003ccode\u003eOIDC_PACKAGES\u003c/code\u003e environment variable.\u003c/p\u003e\n\n\u003cp\u003eThe report says the script used GitHub’s \u003cstrong\u003e\u003ccode\u003eid-token: write\u003c/code\u003e permission\u003c/strong\u003e to obtain a \u003cstrong\u003eshort-lived OIDC token\u003c/strong\u003e, then used that token to authenticate to npm’s \u003cstrong\u003etrusted publishing endpoint\u003c/strong\u003e and release malicious versions of the targeted packages.\u003c/p\u003e\n\n\u003ch1 id=\"malicious-package-behavior\"\u003eMalicious package behavior\u003c/h1\u003e\n\n\u003cp\u003eThe compromised packages contained a malicious \u003ccode\u003epreinstall\u003c/code\u003e script:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-json\"\u003e\u0026quot;scripts\u0026quot;: {\n  \u0026quot;preinstall\u0026quot;: \u0026quot;node index.js\u0026quot;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eThis meant the malicious payload would execute automatically when a developer installed an affected package.\u003c/p\u003e\n\n\u003cp\u003eAikido said the \u003ccode\u003eindex.js\u003c/code\u003e payload was approximately \u003cstrong\u003e4.2 MB\u003c/strong\u003e and \u003cstrong\u003eheavily obfuscated\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch1 id=\"data-targeted-by-the-malware\"\u003eData targeted by the malware\u003c/h1\u003e\n\n\u003cp\u003eAccording to Aikido, the payload was built to steal a broad set of credentials and secrets, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGitHub Actions secrets\u003c/li\u003e\n\u003cli\u003eAWS credentials\u003c/li\u003e\n\u003cli\u003eGoogle Cloud credentials\u003c/li\u003e\n\u003cli\u003eAzure service principal credentials\u003c/li\u003e\n\u003cli\u003eHashiCorp Vault tokens\u003c/li\u003e\n\u003cli\u003eKubernetes service account tokens\u003c/li\u003e\n\u003cli\u003enpm publishing tokens\u003c/li\u003e\n\u003cli\u003ePyPI publishing tokens\u003c/li\u003e\n\u003cli\u003eSSH keys\u003c/li\u003e\n\u003cli\u003eDocker credentials\u003c/li\u003e\n\u003cli\u003eGPG keys\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.env\u003c/code\u003e files\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says Aikido identified \u003cstrong\u003e32 packages\u003c/strong\u003e and \u003cstrong\u003e96 package versions\u003c/strong\u003e as affected by the compromise.\u003c/p\u003e\n\n\u003ch1 id=\"recommended-action-for-affected-organizations\"\u003eRecommended action for affected organizations\u003c/h1\u003e\n\n\u003cp\u003eThe article states that organizations that installed any affected versions should \u003cstrong\u003erotate all credentials, secrets, and tokens\u003c/strong\u003e used by code on the infected device immediately.\u003c/p\u003e\n\n\u003ch1 id=\"link-to-shai-hulud-and-mini-shai-hulud\"\u003eLink to Shai-Hulud and Mini Shai-Hulud\u003c/h1\u003e\n\n\u003cp\u003eThe article connects the Red Hat incident to a recent wave of supply-chain compromises involving \u003cstrong\u003eShai-Hulud\u003c/strong\u003e malware. It notes that similar campaigns have affected well-known projects and organizations including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBitwarden\u003c/li\u003e\n\u003cli\u003eSAP\u003c/li\u003e\n\u003cli\u003eMistral\u003c/li\u003e\n\u003cli\u003eTanStack\u003c/li\u003e\n\u003cli\u003eOpenAI\u003c/li\u003e\n\u003cli\u003eGitHub\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also states that in May, the \u003cstrong\u003eTeamPCP\u003c/strong\u003e threat group publicly released the source code for its \u003cstrong\u003eMini Shai-Hulud\u003c/strong\u003e malware framework, making it available to other threat actors.\u003c/p\u003e\n\n\u003ch1 id=\"why-researchers-call-this-variant-miasma\"\u003eWhy researchers call this variant “Miasma”\u003c/h1\u003e\n\n\u003cp\u003eResearchers said the malware used in the Red Hat compromise shares many similarities with \u003cstrong\u003eMini Shai-Hulud\u003c/strong\u003e, but now includes the phrase \u003cstrong\u003e“Miasma: The Spreading Blight”\u003c/strong\u003e in comments found in compromised GitHub repositories.\u003c/p\u003e\n\n\u003cp\u003eThe article says that while the malware resembles TeamPCP’s Mini Shai-Hulud, it is \u003cstrong\u003eunclear whether TeamPCP conducted the campaign\u003c/strong\u003e or whether another threat actor modified the leaked source code.\u003c/p\u003e\n\n\u003ch1 id=\"ox-security-s-assessment\"\u003eOX Security’s assessment\u003c/h1\u003e\n\n\u003cp\u003eAccording to OX Security, the malware retains the same credential-stealing functionality as Mini Shai-Hulud but adds:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAdditional \u003cstrong\u003eobfuscation layers\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMulti-stage payload delivery mechanisms\u003c/strong\u003e\u003c/li\u003e\n\u003cli\u003eEnhanced \u003cstrong\u003edata theft\u003c/strong\u003e and \u003cstrong\u003ecredential-harvesting\u003c/strong\u003e features\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAt the time of writing, the article states that \u003cstrong\u003e309 GitHub repositories\u003c/strong\u003e had been compromised by the Miasma malware campaign.\u003c/p\u003e\n\n\u003ch1 id=\"key-implications-described-in-the-article\"\u003eKey implications described in the article\u003c/h1\u003e\n\n\u003cp\u003eThe article highlights several notable aspects of the incident:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA compromise of a GitHub account allegedly enabled direct malicious changes to multiple repositories.\u003c/li\u003e\n\u003cli\u003eGitHub Actions and npm trusted publishing were reportedly abused to distribute malicious package versions.\u003c/li\u003e\n\u003cli\u003eThe payload was designed to target a wide range of developer, cloud, and CI/CD secrets.\u003c/li\u003e\n\u003cli\u003eThe incident fits into a broader pattern of software supply-chain attacks associated with leaked Shai-Hulud malware code.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"bottom-line\"\u003eBottom line\u003c/h1\u003e\n\n\u003cp\u003eThe article describes a supply-chain compromise in which more than 30 Red Hat npm packages under the \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e namespace were backdoored to deploy a credential-stealing malware variant called Miasma. Red Hat removed the packages and said they were limited to internal development tooling, while Aikido and OX Security reported that the campaign leveraged a compromised GitHub account, GitHub Actions, and npm trusted publishing to distribute malicious package versions and steal a wide range of secrets. The malware appears closely related to Mini Shai-Hulud, and the broader Miasma campaign had compromised 309 GitHub repositories at the time of publication.\u003c/p\u003e\n","keyPoints":["More than 30 npm packages under Red Hat's @redhat-cloud-services namespace were compromised in a supply-chain attack that distributed a credential-stealing malware variant called Miasma.","Aikido and OX Security found that attackers allegedly used a compromised Red Hat employee GitHub account to push malicious commits, add a GitHub Actions workflow, and publish backdoored package versions through npm trusted publishing.","Red Hat said it removed the affected packages from the npm registry and stated that the compromised packages were limited to internal development tooling and were never published for customer consumption via console.redhat.com.","The malicious packages used a preinstall script to run an obfuscated 4.2 MB index.js payload that Aikido says steals GitHub Actions secrets, cloud credentials, tokens, SSH keys, Docker credentials, GPG keys, and .env files.","Researchers said the malware shares many similarities with Mini Shai-Hulud, while OX Security reported that the Miasma campaign had compromised 309 GitHub repositories at the time of writing."],"insights":["The attackers did not need long-lived npm credentials because the malicious workflow used GitHub's id-token: write permission to obtain a short-lived OIDC token and publish directly through npm's trusted publishing endpoint.","Although the packages were under Red Hat's namespace, Red Hat said the affected packages were limited to internal development tooling and were never published for customer consumption through console.redhat.com.","The malware's use of a preinstall script means it would execute automatically during package installation, increasing the chance of credential theft before a developer notices anything unusual.","Researchers highlighted that Miasma appears to be an evolution of the leaked Mini Shai-Hulud codebase, adding more obfuscation and multi-stage delivery while preserving the same credential-harvesting goals.","Aikido estimated the compromised packages received about 117,000 weekly downloads, indicating that internal development tooling can still create broad exposure when distributed through public package registries."],"referencedReports":[{"title":"Red Hat npm packages compromised | Credential stealing worm published to npm registry","url":"https://www.aikido.dev/blog/red-hat-npm-packages-compromised-credential-stealing-worm","publisher":"aikido","context":"The article says Aikido discovered the incident and provides technical details on how the malicious GitHub Actions workflow used OIDC-based npm trusted publishing to release backdoored packages.","category":"","primary":false},{"title":"New npm supply chain attack: Red Hat cloud services compromised","url":"https://www.ox.security/blog/new-npm-supply-chain-attack-redhat-cloud-services-compromised/","publisher":"ox security","context":"The article cites OX Security as a discovering researcher and references its analysis that the malware adds obfuscation, multi-stage payload delivery, and enhanced credential-harvesting features.","category":"","primary":false},{"title":"Shai-Hulud open source malware on GitHub","url":"https://www.ox.security/blog/shai-hulud-open-source-malware-github/","publisher":"ox security","context":"The article references this OX Security report to support the claim that TeamPCP publicly released the source code for its Mini Shai-Hulud malware framework in May.","category":"","primary":false}],"body":"\u003cp\u003eMore than 30 npm packages under Red Hat’s \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e namespace were compromised in a supply-chain attack that delivered a credential-stealing malware variant called Miasma. Security firms Aikido and OX Security discovered the incident and found dozens of backdoored package versions designed to steal developer credentials, cloud secrets, SSH keys, CI/CD tokens, and other sensitive information. Aikido said the affected packages receive roughly 117,000 weekly downloads.\u003c/p\u003e\n\n\u003cp\u003eRed Hat told BleepingComputer that it removed the affected packages from the npm registry after becoming aware of the incident. The company said the compromised packages were limited to internal development tooling and that the malicious code was never published for customer consumption via \u003ccode\u003econsole.redhat.com\u003c/code\u003e. Red Hat also said it had not identified any impact to customer or partner environments or Red Hat production systems, though its investigation is ongoing.\u003c/p\u003e\n\n\u003cp\u003eAccording to Aikido, the attackers allegedly compromised a Red Hat employee’s GitHub account and used it to push malicious commits to multiple repositories. Those changes added a GitHub Actions workflow and a script that used GitHub OIDC tokens and npm trusted publishing to release backdoored packages. The malicious packages contained a \u003ccode\u003epreinstall\u003c/code\u003e script that automatically executed an obfuscated \u003ccode\u003eindex.js\u003c/code\u003e payload that researchers say stole a wide range of credentials and secrets.\u003c/p\u003e\n"},{"n":7,"title":"WordPress malware campaign hides payloads in Steam profiles","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/wordpress-malware-campaign-hides-payloads-in-steam-profiles/","time":"17:04","priority":"SHOULD READ","score":84,"tldr":"Hackers infected nearly 2,000 WordPress sites with malware that hid its command-and-control payload inside Steam Community profile comments using invisible Unicode characters. The campaign let attackers quietly load malicious JavaScript and maintain a PHP backdoor while blending in with normal WordPress and Steam traffic.","briefOverview":"\u003cp\u003eGoDaddy security engineers found a malware campaign affecting about 1,980 WordPress websites that hid command-and-control data in Steam Community profile comments. The attackers used invisible Unicode characters embedded in benign-looking text to conceal payloads that were decoded on infected sites. By using Valve’s platform, the campaign avoided maintaining separate C2 infrastructure and made detection more difficult.\u003c/p\u003e\n\n\u003cp\u003eThe first-stage malware reached specific Steam profiles during WordPress page loads and extracted hidden payloads from comments that sometimes appeared as harmless ASCII art. Those payloads built a URL to hello-mywordl.info, which served JavaScript disguised as legitimate libraries and injected it into every frontend WordPress page. The final stage installed a PHP backdoor that accepted base64-encoded code through POST requests when a specific authentication cookie was present.\u003c/p\u003e\n\n\u003cp\u003eGoDaddy said the initial compromise vector remains unclear, but possible causes include stolen admin credentials, compromised FTP or SFTP access, vulnerable themes or plugins, or a supply-chain compromise. The researchers also described evasion methods such as obfuscated strings, randomized function names, fake disabled logging code, and use of standard WordPress APIs. They recommended restoring from a known good backup when possible and looking for signs such as Steam Community URL references, suspicious JavaScript injections, invisible Unicode characters, and requests involving hello-mywordl.info or the malware’s authentication cookies.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGoDaddy researchers reported a malware campaign that infected nearly 2,000 WordPress websites and used Steam Community profile comments to hide command-and-control information. According to the article, the campaign was first uncovered in July 2025, and GoDaddy has since found malware on approximately 1,980 sites. The threat actor’s approach relied on Valve’s platform to store hidden payload data instead of operating a traditional standalone C2 server.\u003c/p\u003e\n\n\u003cp\u003eThe initial compromise method is not confirmed in the article. Researchers said the possible infection vectors include stolen WordPress administrator logins, compromised FTP or SFTP credentials, exploitation of a vulnerable WordPress theme or plugin, or a supply-chain compromise. This uncertainty means the campaign’s distribution path is still under investigation even as its later-stage behavior is documented.\u003c/p\u003e\n\n\u003cp\u003eThe first-stage malware on infected websites used WordPress page loads to access specific Steam profiles and extract text from ordinary-looking comments. Within those comments, the attackers embedded invisible Unicode characters that carried a concealed payload, sometimes hidden inside text that looked like ASCII art. GoDaddy said the malware used six invisible Unicode characters, including the zero-width non-joiner, zero-width joiner, function application, invisible times, invisible separator, and invisible plus.\u003c/p\u003e\n\n\u003cp\u003eThe decoder ignored visible characters and mapped only the invisible ones to numeric values, converted them into binary, and reconstructed bytes from the resulting stream. GoDaddy explained that this let binary data be embedded inside otherwise normal-looking text, with the visible text acting as camouflage. Once decoded, the payload built a URL pointing to hello-mywordl.info, which delivered JavaScript disguised with filenames such as asahi-jquery-min-bundle and lodash.core.min.js.\u003c/p\u003e\n\n\u003cp\u003eThat JavaScript was injected into every frontend WordPress page, and the attack chain culminated in a PHP backdoor. The backdoor responded to specially crafted POST requests and, if the tEcaKKXEsb authentication cookie was present, accepted base64-encoded PHP code via a POST parameter. GoDaddy also described additional evasion features, including octal and hex string obfuscation, randomized function names, fake disabled logging code, and use of standard WordPress APIs.\u003c/p\u003e\n\n\u003cp\u003eFor detection and remediation, the article said defenders should look for references to Steam Community URLs, unexpected external JavaScript, outbound WordPress connections to Steam, and scripts loaded from hello-mywordl.info. Other signs include invisible Unicode characters, suspicious _transient\u003cem\u003ecaption\u003c/em\u003e cache entries, disabled SSL verification in cURL requests, and POST requests containing the malware’s authentication cookies or the new_code parameter. GoDaddy recommended restoring from a known good backup before the infection date, warning that incomplete manual cleanup could allow attackers to reinstall removed code through the backdoor.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGoDaddy security engineers identified a malware campaign targeting WordPress websites that hid command-and-control data inside Steam Community profile comments. The article states that nearly 2,000 WordPress sites were infected, with GoDaddy finding malware on about 1,980 websites since the campaign was first uncovered in July 2025.\u003c/p\u003e\n\n\u003cp\u003eA central aspect of the campaign was the attacker’s use of Valve’s Steam platform as an indirect command-and-control mechanism. Instead of relying on a traditional dedicated C2 infrastructure, the threat actor embedded hidden payload data in public-facing Steam profile comments, which helped the activity blend into normal traffic and evade conventional detection methods.\u003c/p\u003e\n\n\u003ch2 id=\"scope-and-affected-environment\"\u003eScope and Affected Environment\u003c/h2\u003e\n\n\u003cp\u003eThe affected environment described in the article is WordPress websites. GoDaddy’s findings indicate that the campaign was not isolated, but spread broadly enough to impact approximately 1,980 sites.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify a named threat group or specific victims beyond the affected WordPress websites. It also does not confirm how the attackers initially compromised the sites.\u003c/p\u003e\n\n\u003ch2 id=\"suspected-initial-access-vectors\"\u003eSuspected Initial Access Vectors\u003c/h2\u003e\n\n\u003cp\u003eAccording to GoDaddy’s assessment, the initial infection vector remains unclear. However, the article lists several possible paths used to breach the websites:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eStolen WordPress administrator credentials\u003c/li\u003e\n\u003cli\u003eCompromised FTP or SFTP credentials\u003c/li\u003e\n\u003cli\u003eExploitation of a vulnerable WordPress theme or plugin\u003c/li\u003e\n\u003cli\u003eA supply-chain compromise\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese possibilities are presented as plausible entry points rather than confirmed facts.\u003c/p\u003e\n\n\u003ch2 id=\"first-stage-malware-behavior\"\u003eFirst-Stage Malware Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe first-stage malware planted on an infected WordPress site used page loads as an opportunity to reach out to specific Steam Community profiles. It then extracted text from comments that appeared benign.\u003c/p\u003e\n\n\u003cp\u003eThe notable technical detail is that the visible comment text was not the actual payload. Instead, the malware searched for hidden Unicode characters embedded within the comments. In some cases, the article says the visible text was made to resemble harmless ASCII art, further concealing the malicious content.\u003c/p\u003e\n\n\u003ch2 id=\"unicode-based-payload-concealment\"\u003eUnicode-Based Payload Concealment\u003c/h2\u003e\n\n\u003cp\u003eGoDaddy reported that the threat actor used six invisible Unicode characters to encode the payload:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eZero-width non-joiner (U+200C)\u003c/li\u003e\n\u003cli\u003eZero-width joiner (U+200D)\u003c/li\u003e\n\u003cli\u003eFunction application (U+2061)\u003c/li\u003e\n\u003cli\u003eInvisible times (U+2062)\u003c/li\u003e\n\u003cli\u003eInvisible separator (U+2063)\u003c/li\u003e\n\u003cli\u003eInvisible plus (U+2064)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe decoding process described in the article worked by ignoring all visible characters and only processing the invisible ones. Those invisible characters were mapped to corresponding numbers, converted into binary form, and then reconstructed into bytes.\u003c/p\u003e\n\n\u003cp\u003eGoDaddy summarized the significance of this method by noting that binary data could be hidden within text that looked normal, with the visible text acting as camouflage while the invisible characters carried the actual payload.\u003c/p\u003e\n\n\u003ch2 id=\"payload-retrieval-and-second-stage-delivery\"\u003ePayload Retrieval and Second-Stage Delivery\u003c/h2\u003e\n\n\u003cp\u003eOnce decoded, the payload was used to construct a URL on the domain hello-mywordl.info. That URL then served JavaScript code to the infected WordPress site.\u003c/p\u003e\n\n\u003cp\u003eThe article says the JavaScript was disguised to look like legitimate library files through names such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003easahi-jquery-min-bundle\u003c/li\u003e\n\u003cli\u003elodash.core.min.js\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis retrieved code was injected into every frontend WordPress page, indicating that site visitors could be exposed to malicious script content whenever they accessed affected pages.\u003c/p\u003e\n\n\u003ch2 id=\"final-stage-backdoor\"\u003eFinal-Stage Backdoor\u003c/h2\u003e\n\n\u003cp\u003eThe final stage of the infection chain was a PHP backdoor. The article describes a specific trigger condition: the backdoor would respond to specially crafted POST requests only when a specific authentication cookie was present.\u003c/p\u003e\n\n\u003cp\u003eGoDaddy said that if the \u003ccode\u003etEcaKKXEsb\u003c/code\u003e cookie was included, the backdoor would accept base64-encoded PHP code via a POST parameter. This mechanism gave the attackers a way to remotely execute or reinstall malicious functionality after the initial compromise.\u003c/p\u003e\n\n\u003ch2 id=\"evasion-and-blending-techniques\"\u003eEvasion and Blending Techniques\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights multiple evasion mechanisms used by the malware:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eObfuscated strings using octal and hex escapes\u003c/li\u003e\n\u003cli\u003eRandomized function names\u003c/li\u003e\n\u003cli\u003eFake disabled logging code\u003c/li\u003e\n\u003cli\u003eUse of standard WordPress APIs\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese choices helped the malware blend into normal application behavior and made obvious detection more difficult.\u003c/p\u003e\n\n\u003ch2 id=\"detection-opportunities-and-indicators\"\u003eDetection Opportunities and Indicators\u003c/h2\u003e\n\n\u003cp\u003eGoDaddy recommended several checks that site owners and defenders can use to identify possible infection. The article specifically mentions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReferences to Steam Community URLs in WordPress code or content\u003c/li\u003e\n\u003cli\u003eSuspicious external JavaScript injections\u003c/li\u003e\n\u003cli\u003eOutbound connections from WordPress servers to Steam\u003c/li\u003e\n\u003cli\u003eUnexpected scripts loaded from \u003ccode\u003ehello-mywordl.info\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eInvisible Unicode characters in suspicious content or code\u003c/li\u003e\n\u003cli\u003eSuspicious \u003ccode\u003e_transient_caption_\u003c/code\u003e cache entries\u003c/li\u003e\n\u003cli\u003eDisabled SSL verification in cURL requests\u003c/li\u003e\n\u003cli\u003ePOST requests containing the malware’s authentication cookies\u003c/li\u003e\n\u003cli\u003ePOST requests containing the \u003ccode\u003enew_code\u003c/code\u003e parameter\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese are presented as practical indicators associated with this campaign.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-remediation-guidance\"\u003eResponse and Remediation Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article says GoDaddy recommends restoring from a known good backup created before the infection date as the preferred remediation option. If that is not possible, manual cleaning must be thorough.\u003c/p\u003e\n\n\u003cp\u003eThe reason for this caution is that any remaining active component of the malware could allow the attackers to use the backdoor to reinstall removed code. In other words, partial cleanup may not be sufficient to fully eradicate the threat.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cp\u003eThe article’s most important findings can be summarized as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNearly 2,000 WordPress sites were found infected in a campaign documented by GoDaddy.\u003c/li\u003e\n\u003cli\u003eThe attackers hid payload data inside Steam Community profile comments using invisible Unicode characters.\u003c/li\u003e\n\u003cli\u003eDecoded data built a URL to \u003ccode\u003ehello-mywordl.info\u003c/code\u003e, which delivered disguised JavaScript.\u003c/li\u003e\n\u003cli\u003eThe malware injected code into frontend WordPress pages and installed a PHP backdoor.\u003c/li\u003e\n\u003cli\u003eGoDaddy advised defenders to prioritize restoration from clean backups and to search for specific indicators such as Steam-related URLs, invisible Unicode characters, suspicious cache entries, and malicious POST activity.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"named-entities-mentioned-in-the-article\"\u003eNamed Entities Mentioned in the Article\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eGoDaddy\u003c/li\u003e\n\u003cli\u003eWordPress\u003c/li\u003e\n\u003cli\u003eSteam Community\u003c/li\u003e\n\u003cli\u003eValve\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ehello-mywordl.info\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003etEcaKKXEsb\u003c/code\u003e authentication cookie\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e_transient_caption_\u003c/code\u003e cache entries\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003enew_code\u003c/code\u003e parameter\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThis article describes a WordPress malware campaign that stood out for hiding its payload instructions in Steam Community profile comments through invisible Unicode characters. GoDaddy’s analysis shows a multi-stage infection chain that used a legitimate platform for concealment, loaded remote JavaScript from \u003ccode\u003ehello-mywordl.info\u003c/code\u003e, and ended with a persistent PHP backdoor. The campaign affected a large number of WordPress sites and prompted strong remediation advice centered on restoring from a known good backup and checking for a defined set of technical indicators.\u003c/p\u003e\n","keyPoints":["GoDaddy researchers found malware on about 1,980 WordPress websites in a campaign that used Steam Community profile comments to hide command-and-control data.","The malware encoded payloads with six invisible Unicode characters embedded in benign-looking Steam comments, allowing visible text to act as camouflage.","The decoded payload built a URL to hello-mywordl.info, which served JavaScript disguised as legitimate library files and injected it into every frontend WordPress page.","The final stage installed a PHP backdoor that accepted base64-encoded code through POST requests when a specific authentication cookie was present.","GoDaddy said defenders should look for references to Steam Community URLs, suspicious external JavaScript injections, invisible Unicode characters, and requests involving hello-mywordl.info or the malware’s authentication cookies."],"insights":["The campaign outsourced part of its command-and-control logic to Steam Community profiles, which let the attacker avoid maintaining separate C2 infrastruct
