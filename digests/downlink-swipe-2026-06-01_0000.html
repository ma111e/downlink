window.__DL_ARTICLES = [{"n":11,"title":"Critical Windows Netlogon RCE flaw now exploited in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/critical-windows-netlogon-remote-code-execution-flaw-now-exploited-in-attacks/","time":"12:30","priority":"MUST READ","score":96,"tldr":"Belgium’s national cybersecurity authority warns that attackers are now actively exploiting CVE-2026-41089, a critical Windows Netlogon remote code execution flaw affecting domain controllers. Organizations should urgently patch supported Windows Server systems, including Windows Server 2025, to reduce the risk of compromise.","briefOverview":"\u003cp\u003eThe Centre for Cybersecurity Belgium (CCB) warned that attackers are now actively exploiting CVE-2026-41089, a critical Windows Netlogon vulnerability, and urged administrators to patch affected systems immediately. Netlogon is a core Windows Server service used to authenticate users and services on Windows domain-based networks. The article says the flaw could lead to remote code execution on domain controllers.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft patched CVE-2026-41089 during the May 2026 Patch Tuesday and described it as a stack-based buffer overflow in Windows Netlogon. According to Microsoft, an attacker could send a specially crafted network request to a Windows server acting as a domain controller and potentially run code without signing in or having prior access. The vulnerability affects all currently supported Windows Server versions, including Windows Server 2025.\u003c/p\u003e\n\n\u003cp\u003eThe CCB did not provide further details about the attacks, and Microsoft had not updated its advisory at the time of reporting to confirm active exploitation. The article also notes that Microsoft said the flaw was discovered by its internal Windows Attack Research \u0026amp; Protection team. It further places this issue alongside several other recently disclosed Windows flaws that are now being exploited in attacks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reports that the Centre for Cybersecurity Belgium (CCB), Belgium’s national authority for cybersecurity, warned on Friday that threat actors are now exploiting CVE-2026-41089 in the wild. The flaw is a critical vulnerability in Windows Netlogon, a remote procedure call interface and core Windows Server service used for authentication in domain-based networks. The CCB urged administrators to patch vulnerable servers as quickly as possible.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft patched CVE-2026-41089 during the May 2026 Patch Tuesday. It described the issue as a stack-based buffer overflow in Windows Netlogon that could let an attacker without privileges achieve remote code execution on targeted domain controllers. Microsoft said an attacker could exploit the bug by sending a specially crafted network request to a Windows server acting as a domain controller.\u003c/p\u003e\n\n\u003cp\u003eThe article says the flaw affects all currently supported Windows Server versions, including Windows Server 2025. Microsoft’s advisory for the issue was published on May 12 and says the vulnerability was discovered by Windows Attack Research \u0026amp; Protection (WARP), an internal Microsoft offensive cybersecurity and engineering research team. The article does not mention any patch bypasses or mitigations beyond applying the vendor’s update.\u003c/p\u003e\n\n\u003cp\u003eThe CCB publicly stated that the vulnerability is actively exploited in the wild and highlighted its CVSS 3.1 score of 9.8. However, the agency did not provide further information on the attacks and did not respond to BleepingComputer’s request for more detail. Microsoft also had not updated its advisory at the time of publication, and a company spokesperson did not reply to a request for confirmation that active exploitation is occurring.\u003c/p\u003e\n\n\u003cp\u003eThe report also connects this development to a broader stream of recently disclosed Windows flaws. It references Microsoft’s mitigation guidance for YellowKey, a Windows BitLocker zero-day disclosed by the researcher known as Nightmare Eclipse, and notes that BlueHammer and RedSun privilege escalation zero-days are now being exploited in attacks. Additional flaws named in the article include GreenPlasma, MiniPlasma, and UnDefend, all associated with disclosures by Nightmare Eclipse.\u003c/p\u003e\n\n\u003cp\u003eFinally, the article notes Microsoft’s public response to Nightmare Eclipse. It says Microsoft first reacted with what the article describes as thinly veiled threats of legal action, followed by a social media statement saying the company will work with law enforcement as appropriate when an individual breaks the law and causes harm to customers. This context is presented alongside the ongoing exploitation warning for CVE-2026-41089.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eThe article says the Centre for Cybersecurity Belgium (CCB), Belgium’s national cybersecurity authority, warned that threat actors are now actively exploiting CVE-2026-41089, a recently patched critical Windows Netlogon vulnerability. The warning was issued on Friday, and the agency urged administrators to patch vulnerable systems immediately.\u003c/p\u003e\n\n\u003cp\u003eThe flaw is described as significant because it affects Windows domain controllers through Netlogon, a core Windows Server authentication service used in domain-based networks. The article frames the issue as a high-severity risk that can lead to remote code execution.\u003c/p\u003e\n\n\u003ch1 id=\"what-the-vulnerability-is\"\u003eWhat the vulnerability is\u003c/h1\u003e\n\n\u003cp\u003eAccording to the article, CVE-2026-41089 is a stack-based buffer overflow in Windows Netlogon. Microsoft patched it during the May 2026 Patch Tuesday.\u003c/p\u003e\n\n\u003cp\u003eThe report says Microsoft described the exploitation path as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn attacker can send a specially crafted network request to a Windows server acting as a domain controller.\u003c/li\u003e\n\u003cli\u003eIf successful, the Netlogon service may improperly handle the request.\u003c/li\u003e\n\u003cli\u003eThat could allow code execution on the affected system.\u003c/li\u003e\n\u003cli\u003eThe attacker does not need to sign in or have prior access.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also states that the vulnerability affects all currently supported Windows Server versions, including Windows Server 2025.\u003c/p\u003e\n\n\u003ch1 id=\"netlogon-context\"\u003eNetlogon context\u003c/h1\u003e\n\n\u003cp\u003eThe article explains that Netlogon is a remote procedure call (RPC) interface and a core Microsoft Windows Server background service. Its role is to authenticate services and users on Windows domain-based networks.\u003c/p\u003e\n\n\u003cp\u003eBecause the flaw is in Netlogon and the article specifically mentions domain controllers, the affected systems are especially important in Windows enterprise environments. The article itself emphasizes the domain controller role rather than broader workstation impact.\u003c/p\u003e\n\n\u003ch1 id=\"timeline-and-source-of-the-patch\"\u003eTimeline and source of the patch\u003c/h1\u003e\n\n\u003cp\u003eMicrosoft released a fix for CVE-2026-41089 during the May 2026 Patch Tuesday. The article links this to Microsoft’s broader Patch Tuesday release and notes that the company disclosed the issue in a security advisory published on May 12.\u003c/p\u003e\n\n\u003cp\u003eThat advisory, according to the article, says the vulnerability was discovered by Windows Attack Research \u0026amp; Protection (WARP), which the article describes as an internal offensive cybersecurity and engineering research team at Microsoft.\u003c/p\u003e\n\n\u003ch1 id=\"active-exploitation-warning\"\u003eActive exploitation warning\u003c/h1\u003e\n\n\u003cp\u003eThe central new development in the article is the warning from the Centre for Cybersecurity Belgium that CVE-2026-41089 is now actively exploited in the wild. The article quotes the agency’s public statement, which says the flaw could lead to remote code execution and lists a CVSS 3.1 score of 9.8.\u003c/p\u003e\n\n\u003cp\u003eThe article says the CCB urged organizations to patch as quickly as possible. However, it also states that the agency did not provide additional details about the attacks and did not respond to a request for more information.\u003c/p\u003e\n\n\u003ch1 id=\"microsoft-s-status-at-the-time-of-reporting\"\u003eMicrosoft’s status at the time of reporting\u003c/h1\u003e\n\n\u003cp\u003eAt the time of publication, Microsoft had not updated its advisory to reflect active exploitation, according to the article. It also says a Microsoft spokesperson did not respond to BleepingComputer’s request for confirmation.\u003c/p\u003e\n\n\u003cp\u003eSo while the article presents the CCB warning as the basis for the active-exploitation claim, it also notes that Microsoft had not publicly confirmed that status in the advisory at that moment.\u003c/p\u003e\n\n\u003ch1 id=\"technical-and-operational-impact-described-in-the-article\"\u003eTechnical and operational impact described in the article\u003c/h1\u003e\n\n\u003cp\u003eThe article explicitly characterizes the impact as remote code execution on targeted domain controllers. It also states that exploitation can be carried out by an attacker without privileges and without prior access.\u003c/p\u003e\n\n\u003cp\u003eThe described conditions and impact in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTarget system: Windows server acting as a domain controller\u003c/li\u003e\n\u003cli\u003eAffected component: Windows Netlogon\u003c/li\u003e\n\u003cli\u003eVulnerability type: stack-based buffer overflow\u003c/li\u003e\n\u003cli\u003eExploitation method: specially crafted network request\u003c/li\u003e\n\u003cli\u003eAuthentication requirement: none stated; the article says no sign-in or prior access is required\u003c/li\u003e\n\u003cli\u003eResult: potential remote code execution\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"related-windows-zero-day-and-exploitation-context-in-the-article\"\u003eRelated Windows zero-day and exploitation context in the article\u003c/h1\u003e\n\n\u003cp\u003eThe article broadens the discussion by referencing several other Windows security issues disclosed in recent months. It says that two weeks earlier, Microsoft shared mitigation measures for YellowKey, identified as CVE-2026-45585, a Windows BitLocker zero-day that grants access to protected drives.\u003c/p\u003e\n\n\u003cp\u003eThat flaw is described in the article as having been disclosed by the anonymous security researcher known as Nightmare Eclipse, who also published a proof-of-concept exploit.\u003c/p\u003e\n\n\u003cp\u003eThe article further says Nightmare Eclipse disclosed several other flaws over recent months, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBlueHammer (CVE-2026-33825)\u003c/strong\u003e, described as a privilege escalation zero-day\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRedSun (CVE-2026-41091)\u003c/strong\u003e, also described as a privilege escalation zero-day\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGreenPlasma\u003c/strong\u003e, described as a zero-day privilege escalation flaw that provides SYSTEM privileges\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMiniPlasma\u003c/strong\u003e, described similarly as a zero-day privilege escalation flaw that provides SYSTEM privileges\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUnDefend (CVE-2026-45498)\u003c/strong\u003e, described as a zero-day that attackers with standard user permissions can exploit to block Microsoft Defender definition updates\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says BlueHammer and RedSun are now being exploited in attacks. It uses these references to place CVE-2026-41089 into a broader pattern of recently disclosed Windows flaws that are also seeing operational use.\u003c/p\u003e\n\n\u003ch1 id=\"microsoft-s-reaction-to-nightmare-eclipse-as-presented-in-the-article\"\u003eMicrosoft’s reaction to Nightmare Eclipse as presented in the article\u003c/h1\u003e\n\n\u003cp\u003eThe article includes Microsoft’s public reaction to the researcher Nightmare Eclipse. It states that Microsoft initially responded with what the article calls thinly veiled threats of legal action.\u003c/p\u003e\n\n\u003cp\u003eIt also references a later statement on social media in which Microsoft said it would work with law enforcement as appropriate when an individual breaks the law and engages in malicious activity causing real harm to customers.\u003c/p\u003e\n\n\u003cp\u003eThis portion of the article is presented as background context on Microsoft’s handling of recent independent disclosures.\u003c/p\u003e\n\n\u003ch1 id=\"key-organizations-and-stakeholders-mentioned\"\u003eKey organizations and stakeholders mentioned\u003c/h1\u003e\n\n\u003cp\u003eThe article names several relevant stakeholders:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCentre for Cybersecurity Belgium (CCB)\u003c/strong\u003e — the national authority that warned of active exploitation\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMicrosoft\u003c/strong\u003e — the vendor that patched the flaw and published the advisory\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWindows Attack Research \u0026amp; Protection (WARP)\u003c/strong\u003e — Microsoft’s internal team credited with discovering the vulnerability\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBleepingComputer\u003c/strong\u003e — the outlet reporting the story and requesting comment from CCB and Microsoft\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNightmare Eclipse\u003c/strong\u003e — the anonymous security researcher associated with other recent Windows zero-day disclosures mentioned for context\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"what-is-known-and-unknown-from-the-article\"\u003eWhat is known and unknown from the article\u003c/h1\u003e\n\n\u003ch2 id=\"known\"\u003eKnown\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-41089 is a critical Windows Netlogon vulnerability.\u003c/li\u003e\n\u003cli\u003eMicrosoft patched it during the May 2026 Patch Tuesday.\u003c/li\u003e\n\u003cli\u003eMicrosoft described it as a stack-based buffer overflow.\u003c/li\u003e\n\u003cli\u003eThe flaw can potentially lead to remote code execution on domain controllers.\u003c/li\u003e\n\u003cli\u003eThe article says exploitation may not require prior access or sign-in.\u003c/li\u003e\n\u003cli\u003eAll supported Windows Server versions, including Windows Server 2025, are affected.\u003c/li\u003e\n\u003cli\u003eBelgium’s CCB warned that the flaw is now actively exploited in the wild.\u003c/li\u003e\n\u003cli\u003eThe CCB urged immediate patching.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"unknown-or-not-provided-in-the-article\"\u003eUnknown or not provided in the article\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eNo details about the threat actors exploiting the flaw\u003c/li\u003e\n\u003cli\u003eNo technical indicators or forensic details about attacks\u003c/li\u003e\n\u003cli\u003eNo victim count or sector-specific targeting information\u003c/li\u003e\n\u003cli\u003eNo confirmation from Microsoft in the advisory at the time of reporting\u003c/li\u003e\n\u003cli\u003eNo additional mitigation guidance beyond patching mentioned in the article\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"bottom-line\"\u003eBottom line\u003c/h1\u003e\n\n\u003cp\u003eThe article’s main message is that CVE-2026-41089 has moved from a critical patched Windows Netlogon flaw to one that Belgium’s national cybersecurity authority says is now being exploited in real-world attacks. Because the issue can affect domain controllers through specially crafted network requests and can potentially enable unauthenticated remote code execution, the article emphasizes urgent patching of all supported Windows Server versions, including Windows Server 2025.\u003c/p\u003e\n","keyPoints":["The Centre for Cybersecurity Belgium warned that CVE-2026-41089, a critical Windows Netlogon flaw, is now being actively exploited in the wild.","Microsoft patched CVE-2026-41089 during the May 2026 Patch Tuesday and described it as a stack-based buffer overflow that can allow remote code execution on domain controllers without authentication.","The vulnerability affects all currently supported Windows Server versions, including Windows Server 2025.","The Belgian cybersecurity authority urged administrators to patch vulnerable servers immediately, but it did not provide additional details about the observed attacks.","Microsoft had not updated its advisory to confirm active exploitation at the time of the report, and the company did not reply to BleepingComputer’s request for confirmation."],"insights":["The active-exploitation warning came from Belgium’s national cybersecurity authority rather than from Microsoft, and Microsoft had not updated its advisory at the time of the report.","Because the flaw affects Windows servers acting as domain controllers and does not require prior access or sign-in, internet-reachable or internally exposed domain controller services warrant immediate attention.","The vulnerability was discovered by Microsoft’s internal Windows Attack Research \u0026 Protection team, showing that a bug found through in-house offensive research is already being exploited in the wild.","The article places CVE-2026-41089 alongside several other recently disclosed Windows flaws that are now being exploited, indicating a broader pattern of rapid weaponization after disclosure."],"referencedReports":[{"title":"CVE-2026-41089","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-41089","publisher":"microsoft","context":"The article cites Microsoft’s security advisory for CVE-2026-41089 and notes it was published on May 12 with details about the vulnerability and its discovery.","category":"","primary":false},{"title":"Warning Microsoft Patch Tuesday May 2026 patches 118 vulnerabilities, 16 critical, 102 important","url":"https://ccb.belgium.be/advisories/warning-microsoft-patch-tuesday-may-2026-patches-118-vulnerabilities-16-critical-102#:~:text=It%20is%20now%20actively%20exploited%20in%20the%20wild","publisher":"centre-for-cybersecurity-belgium","context":"The article relies on this CCB advisory as the source for the claim that CVE-2026-41089 is actively exploited in the wild.","category":"","primary":false}],"body":"\u003cp\u003eThe Centre for Cybersecurity Belgium (CCB) warned that attackers are now actively exploiting CVE-2026-41089, a critical Windows Netlogon vulnerability, and urged administrators to patch affected systems immediately. Netlogon is a core Windows Server service used to authenticate users and services on Windows domain-based networks. The article says the flaw could lead to remote code execution on domain controllers.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft patched CVE-2026-41089 during the May 2026 Patch Tuesday and described it as a stack-based buffer overflow in Windows Netlogon. According to Microsoft, an attacker could send a specially crafted network request to a Windows server acting as a domain controller and potentially run code without signing in or having prior access. The vulnerability affects all currently supported Windows Server versions, including Windows Server 2025.\u003c/p\u003e\n\n\u003cp\u003eThe CCB did not provide further details about the attacks, and Microsoft had not updated its advisory at the time of reporting to confirm active exploitation. The article also notes that Microsoft said the flaw was discovered by its internal Windows Attack Research \u0026amp; Protection team. It further places this issue alongside several other recently disclosed Windows flaws that are now being exploited in attacks.\u003c/p\u003e\n"},{"n":18,"title":"Critical WP Maps Pro Flaw Actively Exploited to Create Admin Accounts","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/critical-wp-maps-pro-flaw-actively.html","time":"08:45","priority":"MUST READ","score":95,"tldr":"Attackers are actively exploiting a critical WP Maps Pro flaw, CVE-2026-8732, to create administrator accounts and fully take over vulnerable WordPress sites. Any site running version 6.1.0 or earlier should update immediately to 6.1.1.","briefOverview":"\u003cp\u003eThreat actors are actively attempting to exploit a critical privilege escalation flaw in the WP Maps Pro WordPress plugin to create malicious administrator accounts on vulnerable sites. The issue affects all plugin versions up to and including 6.1.0 and has been assigned CVE-2026-8732 with a CVSS score of 9.8. According to the article, successful exploitation can allow attackers to take full control of a site.\u003c/p\u003e\n\n\u003cp\u003eWP Maps Pro is a plugin sold on Envato Market with more than 15,000 sales and is used to embed customizable Google Maps and OpenStreetMap features into WordPress sites. The vulnerability stems from a temporary access feature intended for support staff during troubleshooting. Wordfence said the flaw allows unauthenticated users to invoke a support function and create a WordPress user with administrator privileges.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that the vulnerable AJAX action was registered for unauthenticated access and protected only by a nonce that was publicly embedded into frontend pages, making the check ineffective as access control. It also says the exploit path could return a magic login URL that authenticates the attacker as the newly created administrator. The issue was fixed in version 6.1.1, and Wordfence reported blocking 2,858 attacks targeting the flaw in the past 24 hours.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA critical security flaw in the WP Maps Pro WordPress plugin is being actively exploited by threat actors to create administrator accounts on susceptible websites. The vulnerability is tracked as CVE-2026-8732 and carries a CVSS score of 9.8. The article states that this bug can allow unauthenticated attackers to take over a site by creating an administrative user and authenticating as that account.\u003c/p\u003e\n\n\u003cp\u003eWP Maps Pro is described as a plugin that lets site owners embed customizable Google Maps and OpenStreetMap content, including markers, listings, and location features. It is also used as a store locator tool to help users find nearby locations, view listing details, and get directions. The plugin has recorded more than 15,000 sales on the Envato Market.\u003c/p\u003e\n\n\u003cp\u003eThe flaw affects all versions prior to and including 6.1.0 and has been fixed in version 6.1.1. Security researcher David Brown is credited with discovering and reporting the issue. The article says the vulnerability lies in a temporary access feature meant to let support staff log in to customer sites for troubleshooting.\u003c/p\u003e\n\n\u003cp\u003eAccording to Wordfence, the vulnerable process lets unauthenticated users invoke the wpgmp_temp_access_support() function because the wpgmp_temp_access_ajax AJAX action is registered with wp_ajax\u003cem\u003enopriv\u003c/em\u003e. The only protection was a nonce check using fc-call-nonce, but that nonce was publicly embedded into every frontend page through wp_localize_script as part of the wpgmp_local JavaScript object. Wordfence said this made the nonce ineffective as an access control mechanism.\u003c/p\u003e\n\n\u003cp\u003eThe article further states that attackers can call the handler with check_temp=false, causing the plugin to create a new WordPress user with the hardcoded role of administrator via wp_insert_user(). It then returns a magic login URL that triggers wp_set_auth_cookie() and fully authenticates the attacker as the newly created administrator. This sequence results in complete site takeover.\u003c/p\u003e\n\n\u003cp\u003eThe plugin maintainers released a patch on May 20, 2026, to ensure that only authenticated administrators can access the vulnerable endpoint. Despite that fix, the article says the flaw is under active exploitation. Wordfence reported blocking 2,858 attacks aimed at the issue over the previous 24 hours and urged site owners to update to the latest version.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eThe article reports active exploitation of a critical security flaw in the WP Maps Pro WordPress plugin. Threat actors are attempting to abuse the issue to create malicious administrator accounts on vulnerable WordPress sites, which can lead to complete site takeover. The flaw is tracked as CVE-2026-8732 and has a CVSS score of 9.8.\u003c/p\u003e\n\n\u003cp\u003eWP Maps Pro is a plugin used to embed customizable Google Maps and OpenStreetMap into WordPress sites. It supports markers, listings, and advanced location features, and it is also used as a store locator tool so visitors can find nearby locations, review listing details, and get directions. The article notes that the plugin has had more than 15,000 sales on the Envato Market.\u003c/p\u003e\n\n\u003ch1 id=\"affected-versions-and-fix\"\u003eAffected Versions and Fix\u003c/h1\u003e\n\n\u003cp\u003eAccording to the article, the vulnerability affects all versions of WP Maps Pro prior to and including 6.1.0. It was fixed in version 6.1.1. Security researcher David Brown is credited with discovering and reporting the issue.\u003c/p\u003e\n\n\u003cp\u003eThe plugin maintainers released the patch on May 20, 2026. The article says the fix closes the flaw by ensuring that only authenticated administrators can access the vulnerable endpoint.\u003c/p\u003e\n\n\u003ch1 id=\"technical-root-cause\"\u003eTechnical Root Cause\u003c/h1\u003e\n\n\u003cp\u003eThe problem is tied to a \u0026ldquo;temporary access\u0026rdquo; feature intended to let support staff log in to a customer’s site during troubleshooting. The article says this feature could be invoked by unauthenticated users without adequate checks, allowing them to create an administrator user.\u003c/p\u003e\n\n\u003cp\u003eWordfence explained that the vulnerable \u003ccode\u003ewpgmp_temp_access_ajax\u003c/code\u003e AJAX action was registered with \u003ccode\u003ewp_ajax_nopriv_\u003c/code\u003e, making it reachable by unauthenticated users. The action was protected only by a nonce check using \u003ccode\u003efc-call-nonce\u003c/code\u003e. However, that nonce was publicly embedded into every frontend page through \u003ccode\u003ewp_localize_script\u003c/code\u003e as the nonce field of the \u003ccode\u003ewpgmp_local\u003c/code\u003e JavaScript object.\u003c/p\u003e\n\n\u003cp\u003eBecause the nonce was exposed publicly, Wordfence said the check was ineffective as an access control mechanism. This meant unauthenticated attackers could invoke the \u003ccode\u003ewpgmp_temp_access_support()\u003c/code\u003e handler.\u003c/p\u003e\n\n\u003ch1 id=\"exploitation-path\"\u003eExploitation Path\u003c/h1\u003e\n\n\u003cp\u003eThe article provides a detailed description of how the flaw can be exploited:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn unauthenticated attacker reaches the \u003ccode\u003ewpgmp_temp_access_ajax\u003c/code\u003e handler.\u003c/li\u003e\n\u003cli\u003eThe attacker invokes \u003ccode\u003ewpgmp_temp_access_support()\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eBy supplying \u003ccode\u003echeck_temp=false\u003c/code\u003e, the process unconditionally creates a new WordPress user.\u003c/li\u003e\n\u003cli\u003eThe account is created with the hardcoded role of administrator using \u003ccode\u003ewp_insert_user()\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eThe handler then returns a magic login URL.\u003c/li\u003e\n\u003cli\u003eWhen that URL is visited, it calls \u003ccode\u003ewp_set_auth_cookie()\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eThe attacker becomes fully authenticated as the newly created administrator.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to the article, this results in complete site takeover.\u003c/p\u003e\n\n\u003ch1 id=\"active-exploitation\"\u003eActive Exploitation\u003c/h1\u003e\n\n\u003cp\u003eThe article says the vulnerability has already come under active exploitation. Wordfence reported that it blocked 2,858 attacks targeting the flaw over the past 24 hours. This activity underscores the urgency of patching affected systems.\u003c/p\u003e\n\n\u003ch1 id=\"organizations-and-stakeholders-mentioned\"\u003eOrganizations and Stakeholders Mentioned\u003c/h1\u003e\n\n\u003cp\u003eThe article references several entities connected to the issue:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eWP Maps Pro\u003c/strong\u003e as the affected plugin\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWordPress\u003c/strong\u003e as the affected platform\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEnvato Market\u003c/strong\u003e as the marketplace where the plugin has recorded more than 15,000 sales\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWordfence\u003c/strong\u003e as the security company providing technical analysis and exploitation telemetry\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDavid Brown\u003c/strong\u003e as the researcher credited with discovering and reporting the flaw\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe plugin maintainers\u003c/strong\u003e as the party that released version 6.1.1\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"impact-and-response\"\u003eImpact and Response\u003c/h1\u003e\n\n\u003cp\u003eThe reported impact is severe because successful exploitation allows unauthenticated attackers to create administrator accounts and authenticate as those accounts. The article frames this as an avenue to full site compromise.\u003c/p\u003e\n\n\u003cp\u003eThe vendor response was to release version 6.1.1 and limit access to the vulnerable endpoint to authenticated administrators only. The article concludes that site owners should update to the latest version as soon as possible for optimal protection.\u003c/p\u003e\n\n\u003ch1 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-8732 is a critical privilege escalation flaw in WP Maps Pro.\u003c/li\u003e\n\u003cli\u003eIt affects versions up to and including 6.1.0.\u003c/li\u003e\n\u003cli\u003eThe flaw can be exploited by unauthenticated attackers.\u003c/li\u003e\n\u003cli\u003eExploitation allows creation of a WordPress administrator account.\u003c/li\u003e\n\u003cli\u003eA returned magic login URL can then authenticate the attacker as that new administrator.\u003c/li\u003e\n\u003cli\u003eVersion 6.1.1 fixes the issue.\u003c/li\u003e\n\u003cli\u003eWordfence reported blocking 2,858 exploitation attempts in a 24-hour period.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Threat actors are actively attempting to exploit a critical WP Maps Pro vulnerability to create malicious administrator accounts on vulnerable WordPress sites.","The flaw, tracked as CVE-2026-8732 with a CVSS score of 9.8, affects all WP Maps Pro versions up to and including 6.1.0 and was fixed in version 6.1.1.","According to Wordfence, the vulnerability stems from a temporary access feature that lets unauthenticated users invoke the wpgmp_temp_access_support() function and create a new WordPress administrator account.","The plugin maintainers released a patch on May 20, 2026, that restricts access to the vulnerable endpoint to authenticated administrators only.","Wordfence said it blocked 2,858 attacks targeting the issue over the past 24 hours, and urged site owners to update to the latest version."],"insights":["The plugin’s support-oriented \"temporary access\" feature became the path to full site takeover because it could create an administrator account and immediately return a magic login URL for that new user.","The nonce check did not provide meaningful protection because the required fc-call-nonce value was publicly embedded into every frontend page through wp_localize_script.","Attackers did not need to be logged in to reach the vulnerable handler because the AJAX action was registered with wp_ajax_nopriv_.","The vendor’s fix specifically changed access to the endpoint so that only authenticated administrators can use it, directly addressing the missing authorization control rather than just altering the nonce behavior."],"referencedReports":[{"title":"15,000 WordPress Sites Affected by Administrator Account Creation Vulnerability in WP Maps Pro WordPress Plugin","url":"https://www.wordfence.com/blog/2026/05/15000-wordpress-sites-affected-by-administrator-account-creation-vulnerability-in-wp-maps-pro-wordpress-plugin/","publisher":"Wordfence","context":"The article cites this Wordfence technical write-up to explain the root cause and exploitation path of CVE-2026-8732 in WP Maps Pro.","category":"","primary":false},{"title":"WP Maps Pro \u003c= 6.1.0 - Unauthenticated Privilege Escalation via Administrator Account Creation to wpgmp_temp_access_ajax AJAX Action","url":"https://www.wordfence.com/threat-intel/vulnerabilities/wordpress-plugins/wp-google-map-gold/wp-maps-pro-610-unauthenticated-privilege-escalation-via-administrator-account-creation-to-wpgmp-temp-access-ajax-ajax-action","publisher":"Wordfence","context":"The article references this Wordfence vulnerability/advisory entry for active exploitation statistics, including 2,858 blocked attacks in the prior 24 hours.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors are actively attempting to exploit a critical privilege escalation flaw in the WP Maps Pro WordPress plugin to create malicious administrator accounts on vulnerable sites. The issue affects all plugin versions up to and including 6.1.0 and has been assigned CVE-2026-8732 with a CVSS score of 9.8. According to the article, successful exploitation can allow attackers to take full control of a site.\u003c/p\u003e\n\n\u003cp\u003eWP Maps Pro is a plugin sold on Envato Market with more than 15,000 sales and is used to embed customizable Google Maps and OpenStreetMap features into WordPress sites. The vulnerability stems from a temporary access feature intended for support staff during troubleshooting. Wordfence said the flaw allows unauthenticated users to invoke a support function and create a WordPress user with administrator privileges.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that the vulnerable AJAX action was registered for unauthenticated access and protected only by a nonce that was publicly embedded into frontend pages, making the check ineffective as access control. It also says the exploit path could return a magic login URL that authenticates the attacker as the newly created administrator. The issue was fixed in version 6.1.1, and Wordfence reported blocking 2,858 attacks targeting the flaw in the past 24 hours.\u003c/p\u003e\n"},{"n":24,"title":"Multiple redhat-cloud-services npm Packages compromised","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/multiple-redhat-cloud-services-npm-packages-compromised","time":"12:32","priority":"MUST READ","score":95,"tldr":"Multiple @redhat-cloud-services npm packages were compromised and now run a malicious preinstall script that steals CI/CD and cloud credentials, reads GitHub Actions runner memory, and can self-propagate by republishing infected packages with stolen npm tokens. The evidence suggests RedHatInsights’ GitHub Actions publishing pipeline was compromised, making this a serious software supply chain incident.","briefOverview":"\u003cp\u003eOn June 1, 2026, multiple packages in the \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e npm scope were found to contain malicious \u003ccode\u003epreinstall\u003c/code\u003e payloads that execute automatically during \u003ccode\u003enpm install\u003c/code\u003e. The article says the affected releases span the RedHat Cloud Services frontend ecosystem and that all malicious packages were published via GitHub Actions OIDC from the \u003ccode\u003eRedHatInsights/javascript-clients\u003c/code\u003e repository. Based on that publishing path, StepSecurity states the upstream CI/CD pipeline was compromised.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity fully analyzed \u003ccode\u003e@redhat-cloud-services/host-inventory-client@5.0.3\u003c/code\u003e and found a 4.2 MB \u003ccode\u003eindex.js\u003c/code\u003e payload hidden behind three layers of obfuscation, while runtime testing of \u003ccode\u003e@redhat-cloud-services/notifications-client@6.1.4\u003c/code\u003e with Harden-Runner showed suspicious process and file activity. The malware decrypts embedded payloads at runtime, downloads the Bun runtime, and executes a main implant from \u003ccode\u003e/tmp/\u003c/code\u003e. The article says the implant steals credentials from GitHub Actions, cloud providers, Kubernetes, Vault, npm, CircleCI, and developer environments, and it also attempts to evade StepSecurity Harden-Runner detection.\u003c/p\u003e\n\n\u003cp\u003eThe payload also reads GitHub Actions runner memory through \u003ccode\u003e/proc/\u0026lt;pid\u0026gt;/mem\u003c/code\u003e to extract masked secrets from the \u003ccode\u003eRunner.Worker\u003c/code\u003e process after identifying them through the GitHub Actions runtime API. In addition to direct HTTPS exfiltration, it can use the GitHub Contents API as a dead-drop channel and can try to republish malicious npm packages with stolen tokens using npm’s \u003ccode\u003ebypass_2fa\u003c/code\u003e publish parameter. StepSecurity says it filed disclosure issues in three upstream repositories and is working with maintainers to confirm the full scope of the pipeline compromise and coordinate removal of the malicious releases.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reports a software supply-chain compromise affecting multiple packages published under the \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e npm scope. On June 1, 2026, StepSecurity found malicious payloads in packages that trigger through a \u003ccode\u003epreinstall\u003c/code\u003e hook on every \u003ccode\u003enpm install\u003c/code\u003e. The affected versions span a long list of frontend-related packages in the RedHat Cloud Services ecosystem. StepSecurity says all of the malicious packages were published via GitHub Actions OIDC from the \u003ccode\u003eRedHatInsights/javascript-clients\u003c/code\u003e repository, indicating the upstream CI/CD pipeline was compromised.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity says it fully downloaded and statically analyzed \u003ccode\u003e@redhat-cloud-services/host-inventory-client@5.0.3\u003c/code\u003e. Its \u003ccode\u003eindex.js\u003c/code\u003e file, which runs at install time, is 4.2 MB and is hidden behind three layers of obfuscation. The first layer uses a ROT-21 encoded payload reconstructed from a numeric character array and executed within a \u003ccode\u003etry { eval(...) } catch(e) {}\u003c/code\u003e wrapper. Decoding that layer revealed a 1.27 MB JavaScript file that contained two AES-128-GCM encrypted blobs named \u003ccode\u003e_b\u003c/code\u003e and \u003ccode\u003e_p\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, \u003ccode\u003e_b\u003c/code\u003e decrypts into a Bun runtime downloader that fetches \u003ccode\u003ebun-v1.3.13\u003c/code\u003e from GitHub releases, extracts it into a random subdirectory under \u003ccode\u003e/tmp/\u003c/code\u003e, and stores the binary path in \u003ccode\u003eglobalThis.getBunPath\u003c/code\u003e. The \u003ccode\u003e_p\u003c/code\u003e blob is the main implant, which is written to a random file under \u003ccode\u003e/tmp/\u003c/code\u003e and executed through Bun. StepSecurity says the implant itself is obfuscated with obfuscator.io, a modified base64 alphabet, a rotated string table, and an additional custom cipher called B5. The article includes recovered B5 password and salt values and states that C2 domain decryption was still in progress at the time of writing.\u003c/p\u003e\n\n\u003cp\u003eThe payload’s capabilities focus on credential theft and stealth. The article says it reads \u003ccode\u003e/proc/\u0026lt;pid\u0026gt;/mem\u003c/code\u003e to extract live secrets from the \u003ccode\u003eRunner.Worker\u003c/code\u003e process in GitHub Actions runners, using \u003ccode\u003eACTIONS_RUNTIME_TOKEN\u003c/code\u003e to query the GitHub Actions runtime API and determine which environment variables are flagged as \u003ccode\u003eisSecret: true\u003c/code\u003e. It also harvests credentials and sensitive files from AWS, GCP, Azure, Kubernetes, HashiCorp Vault, npm, PyPI, SSH, Docker, GPG, and \u003ccode\u003e.env\u003c/code\u003e files across the filesystem. The article further states that the payload targets \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e, \u003ccode\u003eACTIONS_RUNTIME_TOKEN\u003c/code\u003e, \u003ccode\u003eACTIONS_ID_TOKEN_REQUEST_TOKEN\u003c/code\u003e, and \u003ccode\u003eNPM_TOKEN\u003c/code\u003e among other credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes propagation, exfiltration, and persistence features. Using stolen npm credentials, the malware attempts to publish new backdoored package versions and uses npm’s \u003ccode\u003ebypass_2fa\u003c/code\u003e publish parameter to override two-factor authentication requirements for automation-capable tokens. For exfiltration, it can send data over direct HTTPS or use a GitHub dead-drop channel by creating refs and commits through the GitHub Contents API with stolen \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e values. On developer systems, it persists by injecting a \u003ccode\u003eSessionStart\u003c/code\u003e hook into \u003ccode\u003e~/.claude/settings.json\u003c/code\u003e and writing a \u003ccode\u003efolderOpen\u003c/code\u003e task trigger into \u003ccode\u003e.vscode/tasks.json\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eTo observe runtime behavior, StepSecurity installed \u003ccode\u003e@redhat-cloud-services/notifications-client@6.1.4\u003c/code\u003e in a controlled GitHub Actions workflow with Harden-Runner in audit mode. The tool monitored outbound network connections, process executions, and file writes, and the article shows Harden-Runner detecting access to \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory. StepSecurity says it filed disclosure issues in \u003ccode\u003eRedHatInsights/javascript-clients\u003c/code\u003e, \u003ccode\u003eRedHatInsights/frontend-components\u003c/code\u003e, and \u003ccode\u003eRedHatInsights/platform-frontend-ai-toolkit\u003c/code\u003e, and is working with maintainers to confirm the scope of the compromise and coordinate removal of the malicious releases.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eThe article describes a supply-chain compromise affecting multiple npm packages in the \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e scope. On June 1, 2026, StepSecurity reported that these packages contained malicious payloads that trigger during \u003ccode\u003enpm install\u003c/code\u003e through a \u003ccode\u003epreinstall\u003c/code\u003e hook. The affected releases span a wide range of packages used in the RedHat Cloud Services frontend ecosystem.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity says it fully downloaded and statically analyzed \u003ccode\u003e@redhat-cloud-services/host-inventory-client@5.0.3\u003c/code\u003e, and it also performed runtime analysis of \u003ccode\u003e@redhat-cloud-services/notifications-client@6.1.4\u003c/code\u003e using Harden-Runner. According to the article, the evidence indicates the upstream CI/CD publishing pipeline was compromised because all malicious packages were published via GitHub Actions OIDC from the \u003ccode\u003eRedHatInsights/javascript-clients\u003c/code\u003e repository.\u003c/p\u003e\n\n\u003ch1 id=\"affected-packages\"\u003eAffected Packages\u003c/h1\u003e\n\n\u003cp\u003eThe article lists the following affected packages and versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/chrome 2.3.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/compliance-client 4.0.3\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/config-manager-client 5.0.4\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/entitlements-client 4.0.11\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/eslint-config-redhat-cloud-services 3.2.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/frontend-components 7.7.2\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/frontend-components-advisor-components 3.8.2\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/frontend-components-config 6.11.3\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/frontend-components-config-utilities 4.11.2\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/frontend-components-notifications 6.9.2\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/frontend-components-remediations 4.9.2\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/frontend-components-testing 1.2.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/frontend-components-translations 4.4.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/frontend-components-utilities 7.4.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/hcc-feo-mcp 0.3.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/hcc-kessel-mcp 0.3.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/hcc-pf-mcp 0.6.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/host-inventory-client 5.0.3\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/insights-client 4.0.4\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/integrations-client 6.0.4\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/javascript-clients-shared 2.0.8\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/notifications-client 6.1.4\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/patch-client 4.0.4\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/quickstarts-client 4.0.11\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/rbac-client 9.0.3\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/remediations-client 4.0.4\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/rule-components 4.7.2\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/sources-client 3.0.10\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/topological-inventory-client 3.0.10\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/tsc-transform-imports 1.2.2\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/types 3.6.1\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"runtime-analysis-with-harden-runner\"\u003eRuntime Analysis with Harden-Runner\u003c/h1\u003e\n\n\u003cp\u003eTo observe what the malware did during installation, StepSecurity says it installed \u003ccode\u003e@redhat-cloud-services/notifications-client@6.1.4\u003c/code\u003e in a controlled GitHub Actions workflow with Harden-Runner enabled in audit mode. The article explains that Harden-Runner monitors outbound network connections, process execution, and file writes at the step level.\u003c/p\u003e\n\n\u003cp\u003eThe screenshot and accompanying explanation indicate that the process events included reads from \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory via \u003ccode\u003e/proc/mem\u003c/code\u003e. The article presents this as evidence of the implant’s attempt to access secrets in the GitHub Actions runner environment.\u003c/p\u003e\n\n\u003ch1 id=\"execution-chain\"\u003eExecution Chain\u003c/h1\u003e\n\n\u003ch2 id=\"stage-1-preinstall-hook\"\u003eStage 1: Preinstall Hook\u003c/h2\u003e\n\n\u003cp\u003eEach malicious package reportedly includes a \u003ccode\u003epreinstall\u003c/code\u003e script in \u003ccode\u003epackage.json\u003c/code\u003e:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-json\"\u003e\u0026quot;scripts\u0026quot;: {\n  \u0026quot;preinstall\u0026quot;: \u0026quot;node index.js\u0026quot;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eThe article emphasizes that this causes the malicious code to execute automatically when \u003ccode\u003enpm install\u003c/code\u003e processes the package, before application code runs.\u003c/p\u003e\n\n\u003ch2 id=\"stage-2-rot-21-outer-obfuscation\"\u003eStage 2: ROT-21 Outer Obfuscation\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity says the top-level structure of \u003ccode\u003eindex.js\u003c/code\u003e wraps the payload in a \u003ccode\u003etry { eval(...) } catch(e) {}\u003c/code\u003e block. Inside that wrapper, the content is ROT-21 encoded and reconstructed from a large numeric array using \u003ccode\u003eString.fromCharCode\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that the silent catch block prevents errors from surfacing to the developer console. Decoding this first layer revealed a 1.27 MB JavaScript file containing two AES-128-GCM encrypted payload blobs.\u003c/p\u003e\n\n\u003ch2 id=\"stage-3-aes-128-gcm-decryption\"\u003eStage 3: AES-128-GCM Decryption\u003c/h2\u003e\n\n\u003cp\u003eThe decoded Stage 2 script contains two encrypted blobs:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e_b\u003c/code\u003e: Bun runtime downloader\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e_p\u003c/code\u003e: Main implant\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article provides the hardcoded decryption material for both blobs:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e_b\u003c/code\u003e\n\n\u003cul\u003e\n\u003cli\u003eKey: \u003ccode\u003e4c26cf9791bce1bfd4b84eba80ce2754\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eIV: \u003ccode\u003e1241582f04234f7192feacba\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e_p\u003c/code\u003e\n\n\u003cul\u003e\n\u003cli\u003eKey: \u003ccode\u003eec514c074caf0ffdce6c66a0e95753d8\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eIV: \u003ccode\u003e1251c3b85365f9b56a956c10\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to the article, \u003ccode\u003e_b\u003c/code\u003e decrypts into a small async JavaScript module that downloads \u003ccode\u003ebun-v1.3.13\u003c/code\u003e from the official GitHub releases CDN, extracts it into a randomly named directory under \u003ccode\u003e/tmp/\u003c/code\u003e, and registers the Bun path in \u003ccode\u003eglobalThis.getBunPath\u003c/code\u003e. The \u003ccode\u003e_p\u003c/code\u003e payload is then written to a randomly named JavaScript file in \u003ccode\u003e/tmp/\u003c/code\u003e and executed via the downloaded Bun binary.\u003c/p\u003e\n\n\u003ch2 id=\"stage-4-obfuscator-io-and-b5-cipher\"\u003eStage 4: obfuscator.io and B5 Cipher\u003c/h2\u003e\n\n\u003cp\u003eThe main implant, \u003ccode\u003e_p\u003c/code\u003e, is described as 634 KB after decryption and obfuscated with obfuscator.io. The article says it uses a non-standard base64 alphabet with lowercase letters preceding uppercase letters, and a string table of 2,219 encoded entries that is rotated by 284 push/shift cycles before lookups occur.\u003c/p\u003e\n\n\u003cp\u003eThe most sensitive strings, including C2 domain names, the User-Agent string, and API paths, are additionally encrypted with a custom cipher designated \u003cstrong\u003eB5\u003c/strong\u003e. The article describes B5 as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMaster key derivation via PBKDF2 with:\n\n\u003cul\u003e\n\u003cli\u003e200,000 iterations\u003c/li\u003e\n\u003cli\u003e32-byte output\u003c/li\u003e\n\u003cli\u003eSHA-256\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003ePer-message key derived as \u003ccode\u003eSHA-256(master_key ∥ iv)\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eDecryption involving 3 rounds of inverse Fisher-Yates byte-substitution with XOR feedback chaining\u003c/li\u003e\n\u003cli\u003eCiphertexts stored as standard base64 within the obfuscator.io string table, which itself is custom-base64 encoded\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article provides the recovered B5 parameters:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePassword: \u003ccode\u003eba2c6ddb3672bdd6a611e6850b4f700b52aed3dab2f1b3d5f8c839d4a157a709\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eSalt: \u003ccode\u003e5b26508dc0f1075a7c0b4d8aa464487e\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt states that C2 domain decryption was still in progress and that the post would be updated with confirmed domains.\u003c/p\u003e\n\n\u003ch1 id=\"payload-capabilities\"\u003ePayload Capabilities\u003c/h1\u003e\n\n\u003ch2 id=\"github-actions-runner-memory-extraction\"\u003eGitHub Actions Runner Memory Extraction\u003c/h2\u003e\n\n\u003cp\u003eOne of the most notable capabilities in the article is direct reading of process memory from \u003ccode\u003e/proc/\u0026lt;pid\u0026gt;/mem\u003c/code\u003e. StepSecurity says the implant searches for the \u003ccode\u003eRunner.Worker\u003c/code\u003e process and reads its live memory to recover secrets.\u003c/p\u003e\n\n\u003cp\u003eThe article further explains that the payload uses \u003ccode\u003eACTIONS_RUNTIME_TOKEN\u003c/code\u003e to authenticate to the GitHub Actions runtime API and enumerate environment variables, identifying those flagged with \u003ccode\u003eisSecret: true\u003c/code\u003e. It then targets those specific variables in process memory. The article explicitly states this allows extraction of masked secrets that never appear in logs, bypassing GitHub Actions log masking.\u003c/p\u003e\n\n\u003cp\u003eThe deobfuscated patterns highlighted in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e/proc/*/mem\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eRunner.Worker\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eisSecret\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eACTIONS_RUNTIME_TOKEN\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"multi-cloud-and-developer-credential-harvesting\"\u003eMulti-Cloud and Developer Credential Harvesting\u003c/h2\u003e\n\n\u003cp\u003eThe article says the payload performs a broad credential sweep. It enumerates the following targets and artifacts:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eGitHub Actions\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eACTIONS_RUNTIME_TOKEN\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eACTIONS_ID_TOKEN_REQUEST_TOKEN\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eNPM_TOKEN\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAWS\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eAWS_ACCESS_KEY_ID\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAWS_SECRET_ACCESS_KEY\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAWS_SESSION_TOKEN\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.aws/credentials\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGCP\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003eApplication default credentials\u003c/li\u003e\n\u003cli\u003eService account key files\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAzure\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003eService principal credentials\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAZURE_CLIENT_SECRET\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eManaged identity tokens\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHashiCorp Vault\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eVAULT_TOKEN\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eVAULT_ADDR\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eKubernetes\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003eIn-cluster service account token\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.kube/config\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003enpm\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e~/.npmrc\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePyPI\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e~/.pypirc\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSSH\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e~/.ssh/id_rsa\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.ssh/id_ed25519\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eAll private key files\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDocker\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e~/.docker/config.json\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGPG\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e~/.gnupg/\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGeneral filesystem\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e.env\u003c/code\u003e files throughout the filesystem\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"autonomous-npm-republish\"\u003eAutonomous npm Republish\u003c/h2\u003e\n\n\u003cp\u003eThe article says the malware uses stolen npm authentication tokens to publish new backdoored versions of packages that the victim account can access. It highlights use of npm’s \u003ccode\u003ebypass_2fa\u003c/code\u003e publish parameter to override two-factor authentication requirements for automation tokens.\u003c/p\u003e\n\n\u003cp\u003eThe article characterizes this behavior as turning the malware into a self-propagating supply-chain worm, because each infected environment could seed additional malicious packages without further attacker action.\u003c/p\u003e\n\n\u003ch2 id=\"github-dead-drop-c2\"\u003eGitHub Dead-Drop C2\u003c/h2\u003e\n\n\u003cp\u003eIn addition to HTTPS exfiltration, the implant reportedly supports a GitHub-based exfiltration method. Using a stolen \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e, it interacts with the GitHub Contents API to create refs and commits containing base64-encoded stolen data in victim-controlled repositories.\u003c/p\u003e\n\n\u003cp\u003eThe article says this routes exfiltration through \u003ccode\u003eapi.github.com\u003c/code\u003e, which is often allowed in CI environments, making it blend with normal GitHub activity at the network layer.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-on-developer-workstations\"\u003ePersistence on Developer Workstations\u003c/h2\u003e\n\n\u003cp\u003eThe article describes two persistence mechanisms that survive package removal:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eClaude Code hijack\u003c/strong\u003e via \u003ccode\u003e~/.claude/settings.json\u003c/code\u003e\n\n\u003cul\u003e\n\u003cli\u003eA \u003ccode\u003eSessionStart\u003c/code\u003e hook is injected so attacker-controlled code runs at the start of every Claude Code session.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVS Code task injection\u003c/strong\u003e via \u003ccode\u003e.vscode/tasks.json\u003c/code\u003e\n\n\u003cul\u003e\n\u003cli\u003eA \u003ccode\u003efolderOpen\u003c/code\u003e task trigger is written so attacker-controlled code executes whenever the developer opens a project folder in VS Code.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"indicators-of-compromise-and-technical-observations\"\u003eIndicators of Compromise and Technical Observations\u003c/h1\u003e\n\n\u003cp\u003eThe article explicitly points to several indicators and notable behaviors:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA \u003ccode\u003epreinstall\u003c/code\u003e script calling \u003ccode\u003enode index.js\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eAn anomalously large \u003ccode\u003eindex.js\u003c/code\u003e file at 4.2 MB for a library package\u003c/li\u003e\n\u003cli\u003eROT-21 encoded JavaScript reconstructed from numeric character arrays\u003c/li\u003e\n\u003cli\u003eA silent \u003ccode\u003etry/catch\u003c/code\u003e wrapper around \u003ccode\u003eeval\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eRuntime AES-128-GCM decryption of \u003ccode\u003e_b\u003c/code\u003e and \u003ccode\u003e_p\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eDownload of \u003ccode\u003ebun-v1.3.13\u003c/code\u003e from GitHub releases\u003c/li\u003e\n\u003cli\u003eCreation of random files under \u003ccode\u003e/tmp/\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eReading of \u003ccode\u003e/proc/\u0026lt;pid\u0026gt;/mem\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eTargeting of \u003ccode\u003eRunner.Worker\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eQuerying the GitHub Actions runtime API for \u003ccode\u003eisSecret\u003c/code\u003e variables\u003c/li\u003e\n\u003cli\u003eAccess to developer secrets and cloud credentials across many toolchains\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"upstream-repositories-and-response\"\u003eUpstream Repositories and Response\u003c/h1\u003e\n\n\u003cp\u003eStepSecurity says it opened disclosure issues in three upstream repositories and is coordinating with maintainers:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eRedHatInsights/javascript-clients#492\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eRedHatInsights/frontend-components#2329\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eRedHatInsights/platform-frontend-ai-toolkit#57\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to the article, these disclosures are part of an effort to confirm the scope of the pipeline compromise and remove the malicious releases.\u003c/p\u003e\n\n\u003ch1 id=\"significance-as-presented-in-the-article\"\u003eSignificance as Presented in the Article\u003c/h1\u003e\n\n\u003cp\u003eThe article portrays this incident as significant for several reasons:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eThe malicious code runs automatically during package installation through \u003ccode\u003epreinstall\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eThe packages were published from an upstream GitHub Actions OIDC workflow, indicating CI/CD compromise rather than only a developer endpoint compromise.\u003c/li\u003e\n\u003cli\u003eThe implant targets GitHub Actions runner memory directly to recover masked secrets.\u003c/li\u003e\n\u003cli\u003eThe credential collection spans major cloud, CI/CD, package management, and developer tooling environments.\u003c/li\u003e\n\u003cli\u003eThe malware includes propagation and persistence features, including npm republishing, GitHub-based exfiltration, Claude Code session hooks, and VS Code task injection.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch1 id=\"article-status\"\u003eArticle Status\u003c/h1\u003e\n\n\u003cp\u003eThe article states that analysis of the remaining packages is ongoing and that the post will be updated with:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFull payload deobfuscation\u003c/li\u003e\n\u003cli\u003eRecovery of encrypted C2 domains\u003c/li\u003e\n\u003cli\u003eAdditional indicators of compromise as they are identified\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eOverall, the article presents a detailed technical analysis of malicious npm packages in the \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e scope, describing both the infection chain and the implant’s capabilities while documenting the response underway with the affected upstream maintainers.\u003c/p\u003e\n","keyPoints":["On June 1, 2026, eight packages in the @redhat-cloud-services npm scope were found to contain a malicious preinstall payload that executes on every npm install, and the affected versions span multiple packages in the RedHat Cloud Services frontend ecosystem.","StepSecurity statically analyzed @redhat-cloud-services/host-inventory-client@5.0.3 and found that its 4.2 MB index.js file is a three-layer obfuscated malware payload, while runtime testing of @redhat-cloud-services/notifications-client@6.1.4 with Harden-Runner showed suspicious behavior including reading Runner.Worker process memory.","The malware decrypts two AES-128-GCM blobs at runtime, downloads the Bun runtime from GitHub releases, writes the main implant to a random file under /tmp, and executes it with Bun after additional obfuscation and custom B5 cipher protections.","The payload is designed to harvest secrets from GitHub Actions, AWS, GCP, Azure, Kubernetes, HashiCorp Vault, npm, CircleCI, SSH, Docker, GPG, and .env files, and it reads /proc/\u003cpid\u003e/mem to extract masked GitHub Actions secrets directly from Runner.Worker memory.","The article states that all malicious packages were published via GitHub Actions OIDC from the RedHatInsights/javascript-clients repository, and StepSecurity opened disclosure issues in three upstream repositories while working with maintainers to confirm the scope of the CI/CD pipeline compromise."],"insights":["The malware explicitly targets GitHub Actions’ secret-masking model by using ACTIONS_RUNTIME_TOKEN to identify variables marked isSecret and then reading Runner.Worker process memory from /proc/\u003cpid\u003e/mem to recover those masked values.","The use of npm’s bypass_2fa publish parameter means stolen automation-capable npm tokens can let the malware autonomously republish backdoored packages even when the victim account has two-factor authentication enabled.","By implementing a GitHub Contents API exfiltration path with harvested GITHUB_TOKEN values, the payload can move stolen data through api.github.com, which the article notes is commonly allowed in CI environments and therefore harder to distinguish from normal activity at the network layer.","The malware’s persistence mechanisms extend beyond the infected package itself by modifying ~/.claude/settings.json and .vscode/tasks.json so attacker-controlled code can run again during normal developer tool usage after package removal.","Because the malicious releases were published via GitHub Actions OIDC from the RedHatInsights/javascript-clients repository, the article indicates the compromise likely occurred in the upstream CI/CD publishing pipeline rather than solely in individual developer environments."],"referencedReports":[],"body":"\u003cp\u003eOn June 1, 2026, multiple packages in the \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e npm scope were found to contain malicious \u003ccode\u003epreinstall\u003c/code\u003e payloads that execute automatically during \u003ccode\u003enpm install\u003c/code\u003e. The article says the affected releases span the RedHat Cloud Services frontend ecosystem and that all malicious packages were published via GitHub Actions OIDC from the \u003ccode\u003eRedHatInsights/javascript-clients\u003c/code\u003e repository. Based on that publishing path, StepSecurity states the upstream CI/CD pipeline was compromised.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity fully analyzed \u003ccode\u003e@redhat-cloud-services/host-inventory-client@5.0.3\u003c/code\u003e and found a 4.2 MB \u003ccode\u003eindex.js\u003c/code\u003e payload hidden behind three layers of obfuscation, while runtime testing of \u003ccode\u003e@redhat-cloud-services/notifications-client@6.1.4\u003c/code\u003e with Harden-Runner showed suspicious process and file activity. The malware decrypts embedded payloads at runtime, downloads the Bun runtime, and executes a main implant from \u003ccode\u003e/tmp/\u003c/code\u003e. The article says the implant steals credentials from GitHub Actions, cloud providers, Kubernetes, Vault, npm, CircleCI, and developer environments, and it also attempts to evade StepSecurity Harden-Runner detection.\u003c/p\u003e\n\n\u003cp\u003eThe payload also reads GitHub Actions runner memory through \u003ccode\u003e/proc/\u0026lt;pid\u0026gt;/mem\u003c/code\u003e to extract masked secrets from the \u003ccode\u003eRunner.Worker\u003c/code\u003e process after identifying them through the GitHub Actions runtime API. In addition to direct HTTPS exfiltration, it can use the GitHub Contents API as a dead-drop channel and can try to republish malicious npm packages with stolen tokens using npm’s \u003ccode\u003ebypass_2fa\u003c/code\u003e publish parameter. StepSecurity says it filed disclosure issues in three upstream repositories and is working with maintainers to confirm the full scope of the pipeline compromise and coordinate removal of the malicious releases.\u003c/p\u003e\n"},{"n":19,"title":"Miasma Supply Chain Attack Compromises Red Hat npm Packages with Credential-Stealing Worm","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/miasma-supply-chain-attack-compromises.html","time":"17:40","priority":"SHOULD READ","score":88,"tldr":"Several @redhat-cloud-services npm packages were compromised in a supply chain campaign called Miasma that steals developer and CI/CD secrets, exfiltrates them in encrypted form, and can spread by abusing stolen GitHub and npm credentials. Organizations that installed the affected versions should treat hosts and build artifacts as potentially compromised, rotate credentials, and check for persistence beyond simply removing the packages.","briefOverview":"\u003cp\u003eA supply chain campaign dubbed \u003cstrong\u003eMiasma\u003c/strong\u003e compromised multiple \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e npm packages with a malicious preinstall hook that steals credentials and secrets from developer machines and CI/CD environments. Socket described it as effectively a Mini Shai-Hulud campaign because it uses install-time execution, credential harvesting, CI/CD targeting, encrypted exfiltration, and possible downstream propagation. The actor behind the activity is unknown, and attribution is complicated because TeamPCP previously open-sourced tools linked to the Shai-Hulud worm.\u003c/p\u003e\n\n\u003cp\u003eResearchers said the malware targets GitHub Actions secrets, npm tokens, cloud credentials, Kubernetes and Vault material, SSH keys, Git credentials, and other sensitive files. It exfiltrates data using encrypted logic to \u003ccode\u003eapi.anthropic.com:443/v1/api\u003c/code\u003e and can use GitHub as a fallback, including committing encrypted result envelopes through the GitHub API. The malware also enumerates repositories writable by a stolen GitHub token, reads workflow files, and commits malicious workflows so signed changes appear verified.\u003c/p\u003e\n\n\u003cp\u003eThe article says the malware attempts privilege escalation in CI, checks for protections such as CrowdStrike, SentinelOne, Carbon Black, and StepSecurity Harden-Runner, and establishes persistence through Anthropic Claude Code and Visual Studio Code configuration changes. Wiz said this variant adds new collectors for GCP and Azure identities and generates a uniquely encrypted payload for each infection. Evidence cited in the article suggests a compromised Red Hat employee GitHub account was the patient zero used to inject malicious orphan commits into two RedHatInsights repositories, bypassing code review.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA new supply chain attack campaign named \u003cstrong\u003eMiasma\u003c/strong\u003e has compromised several \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e npm packages to steal credentials and secrets from developer systems and to deliver a self-propagating worm. Socket said the activity is effectively a Mini Shai-Hulud campaign because it mirrors the same core tactics, including install-time execution, credential harvesting, CI/CD targeting, encrypted exfiltration, and possible downstream propagation. The exact actor remains unknown, and the article notes that attribution is harder because TeamPCP has open-sourced tools associated with the Shai-Hulud worm.\u003c/p\u003e\n\n\u003cp\u003eThe affected packages listed in the article include \u003ccode\u003e@redhat-cloud-services/vulnerabilities-client\u003c/code\u003e, \u003ccode\u003etsc-transform-imports\u003c/code\u003e, \u003ccode\u003etopological-inventory-client\u003c/code\u003e, \u003ccode\u003esources-client\u003c/code\u003e, \u003ccode\u003erule-components\u003c/code\u003e, \u003ccode\u003eremediations-client\u003c/code\u003e, and \u003ccode\u003erbac-client\u003c/code\u003e. According to analyses from Aikido Security, JFrog, Microsoft, OX Security, SafeDep, StepSecurity, and Wiz, these packages contain an obfuscated preinstall hook designed to collect a broad range of secrets. The targeted data includes GitHub Actions secrets, npm tokens, cloud credentials, Kubernetes and Vault material, SSH keys, Git credentials, and other sensitive files.\u003c/p\u003e\n\n\u003cp\u003eThe malware includes encrypted exfiltration logic that sends data to \u003ccode\u003eapi.anthropic.com:443/v1/api\u003c/code\u003e and uses GitHub as a fallback mechanism. Socket said the encrypted result envelope can be committed through the GitHub API, and that commit messages may include the string \u003ccode\u003eIfYouInvalidateThisTokenItWillNukeTheComputerOfTheOwner:\u0026lt;token\u0026gt;\u003c/code\u003e. The article says this behavior shows attempts not only to steal credentials but also to weaponize them to poison the software supply chain further.\u003c/p\u003e\n\n\u003cp\u003eSafeDep said that in npm environments the payload calls the OIDC token exchange and \u003ccode\u003ewhoami\u003c/code\u003e endpoints, repackages a tarball, and signs the artifact through Sigstore. OX Security noted that public GitHub repositories used for exfiltration carried the description \u003ccode\u003eMiasma: The Spreading Blight\u003c/code\u003e, and that the first commit with that string appeared on May 29, 2026. The malware also avoids execution on Russian-language systems, a pattern the article compares with GlassWorm supply chain campaigns.\u003c/p\u003e\n\n\u003cp\u003eFor GitHub, the malware enumerates repositories a stolen token can write to, reads \u003ccode\u003eaction.yml\u003c/code\u003e or \u003ccode\u003eaction.yaml\u003c/code\u003e through GraphQL, and commits a workflow through the \u003ccode\u003ecreateCommitOnBranch\u003c/code\u003e mutation so the change appears as a verified, signed commit. The article says the malware also attempts privilege escalation by launching a container that bind-mounts the host \u003ccode\u003e/etc/sudoers.d\u003c/code\u003e to grant a CI runner passwordless sudo. It checks for endpoint protection from CrowdStrike, SentinelOne, Carbon Black, and StepSecurity Harden-Runner before acting, and establishes persistence by modifying Anthropic Claude Code and Visual Studio Code settings.\u003c/p\u003e\n\n\u003cp\u003eWiz researchers said one of the major changes in this variant is the addition of collectors for GCP and Azure identities, indicating more focus on gaining and leveraging cloud access. They also said the malware generates a uniquely encrypted payload for each infection, making detection and version tracking more difficult. Evidence in the article suggests a compromised Red Hat employee GitHub account was the initial access point used to push malicious orphan commits to two RedHatInsights repositories while bypassing code review.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends isolating hosts that installed the affected versions, removing the malicious packages, rotating exposed credentials, and reviewing GitHub and npm activity for suspicious actions. It also advises auditing for persistence artifacts in files such as \u003ccode\u003e~/.claude/settings.json\u003c/code\u003e, \u003ccode\u003e.vscode/tasks.json\u003c/code\u003e, \u003ccode\u003e.github/workflows/codeql.yml\u003c/code\u003e, and \u003ccode\u003e.github/setup.js\u003c/code\u003e, and enforcing strong access controls. Socket emphasized that uninstalling the npm package or deleting \u003ccode\u003enode_modules\u003c/code\u003e is not sufficient cleanup because of the malware’s background execution and developer-tool persistence mechanisms.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview\"\u003eOverview\u003c/h1\u003e\n\n\u003cp\u003eA supply chain attack campaign dubbed \u003cstrong\u003eMiasma\u003c/strong\u003e has compromised multiple \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e npm packages in order to steal credentials and secrets from developer machines and CI/CD environments and to deliver a self-propagating worm. Socket characterized the activity as effectively a \u003cstrong\u003eMini Shai-Hulud\u003c/strong\u003e campaign because it uses the same broad set of tactics: install-time execution, credential harvesting, CI/CD targeting, encrypted exfiltration, and potential downstream propagation.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the actor behind the campaign is currently unknown. It also notes that attribution is complicated because \u003cstrong\u003eTeamPCP\u003c/strong\u003e, a cybercrime group associated with the Shai-Hulud worm, has open-sourced related attack tools, making it easier for other threat actors to carry out similar operations.\u003c/p\u003e\n\n\u003ch1 id=\"affected-packages\"\u003eAffected Packages\u003c/h1\u003e\n\n\u003cp\u003eThe article lists several compromised npm packages under the \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e scope:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/vulnerabilities-client\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/tsc-transform-imports\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/topological-inventory-client\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@redhat-cloud-services/sources-client\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003
