<script type="application/json" id="dl-articles">[{"n":2,"title":"simonecorsi/mawesome GitHub Action has been compromised","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/simonecorsi-mawesome-github-action-has-been-compromised","time":"01:38","priority":"SHOULD READ","score":86,"tldr":"The simonecorsi/mawesome GitHub Action was compromised after an attacker force-pushed malicious code and repointed version tags, causing workflows using those tags to run attacker-controlled code. Users should treat affected runs after June 24, 2026 as potentially compromised.","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["On June 24, 2026, an attacker compromised the simonecorsi/mawesome GitHub repository.","The attacker force-pushed malicious commits and repointed several version tags to the malicious commit.","Workflows running against the affected tags after the compromise executed the attacker’s code inside their GitHub Actions runner.","The article says the attack method is very similar to the codfish/semantic-release-action GitHub Actions compromise reported earlier the same day.","The article describes the situation as a developing story."],"insights":["The compromise affected users through version tags, showing that workflows referencing those tags could run changed code even if the workflow file itself was not modified.","Because several version tags were repointed to the malicious commit, the impact was not limited to a single tagged release of simonecorsi/mawesome.","The article links this incident to a very similar GitHub Actions compromise involving codfish/semantic-release-action earlier the same day, indicating more than one comparable event was reported on June 24, 2026."],"referencedReports":[{"title":"Supply Chain Compromise: codfish/semantic-release-action GitHub Actions compromise","url":"https://www.stepsecurity.io/blog/supply-chain-compromise-codfish-semantic-release-action","publisher":"StepSecurity","context":"The article says the attack method is very similar to the codfish/semantic-release-action GitHub Actions compromise reported earlier the same day.","category":"","primary":false}],"body":""},{"n":1,"title":"Google releases new privacy controls for activity history, personalization","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/google/google-releases-new-privacy-controls-for-activity-history-personalization/","time":"23:46","priority":"MAY READ","score":62,"tldr":"Google is rolling out separate controls for Search and Google Play history and personalization, giving users more granular privacy settings. If Web \u0026 App Activity is enabled, the new Search Services History and its Save Media option may be turned on automatically, so users should review the settings.","briefOverview":"\u003cp\u003eGoogle is rolling out new privacy controls for Search services and Google Play that separate saved history from personalized recommendations. The company said Search services include Search, Maps, Shopping, Hotels, Flights, Translate, and News. Users will see the change in their Google Account over the next few days.\u003c/p\u003e\n\n\u003cp\u003eThe new Search Services History setting will control whether activity from Search services is saved to a user’s Google Account, while Personalized Recommendations will control whether Google uses saved data to tailor the experience. If Web \u0026amp; App Activity is currently turned on, Google says Search Services History will be turned on after the transition, and the Save Media subsetting will also be turned on. Google says changes to Web \u0026amp; App Activity will be separate from the new Search services history and personalization settings.\u003c/p\u003e\n\n\u003cp\u003eSaved media can include images, files, audio, and video from interactions with Search services, such as visual searches with Google Lens or audio from voice-based interactions. Google says saved media may be used to develop and improve Google services and technologies, including AI models and safety measures. Users can turn off Save Media at any time, delete individual pieces of media from history, and adjust or delete activity settings for Search services and Google Play.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Google is rolling out new privacy controls for Search services and Google Play that separate saved history from personalized recommendations.","Search services covered by the new settings include Search, Maps, Shopping, Hotels, Flights, Translate, and News.","If Web \u0026 App Activity is currently turned on, Google says Search Services History and the Save Media subsetting will also be turned on after the transition.","Saved media can include images, files, audio, and video from interactions with Search services, and Google says it can be used to develop and improve services and technologies, including AI models and safety measures.","Google says users can turn off the Save Media option, delete individual pieces of media from their history, and adjust or delete their activity settings at any time."],"insights":["Users who previously enabled Web \u0026 App Activity should specifically review the new settings because Google says the Save Media option will be turned on automatically after the transition.","The new separation means users can choose to keep Search services history for convenience while disabling Personalized Recommendations so that saved data is not used to tailor what they see.","Google says prior auto-delete choices from Web \u0026 App Activity will carry over to Search Services History and Play History, so users do not have to recreate those retention limits unless they want to change them.","The media-saving change is especially important for people using Lens or voice-based Search features because Google says saved media can include images, files, audio, and video from those interactions."],"referencedReports":[],"body":"\u003cp\u003eGoogle is rolling out new privacy controls for Search services and Google Play that separate saved history from personalized recommendations. The company said Search services include Search, Maps, Shopping, Hotels, Flights, Translate, and News. Users will see the change in their Google Account over the next few days.\u003c/p\u003e\n\n\u003cp\u003eThe new Search Services History setting will control whether activity from Search services is saved to a user’s Google Account, while Personalized Recommendations will control whether Google uses saved data to tailor the experience. If Web \u0026amp; App Activity is currently turned on, Google says Search Services History will be turned on after the transition, and the Save Media subsetting will also be turned on. Google says changes to Web \u0026amp; App Activity will be separate from the new Search services history and personalization settings.\u003c/p\u003e\n\n\u003cp\u003eSaved media can include images, files, audio, and video from interactions with Search services, such as visual searches with Google Lens or audio from voice-based interactions. Google says saved media may be used to develop and improve Google services and technologies, including AI models and safety measures. Users can turn off Save Media at any time, delete individual pieces of media from history, and adjust or delete activity settings for Search services and Google Play.\u003c/p\u003e\n"}]</script>
