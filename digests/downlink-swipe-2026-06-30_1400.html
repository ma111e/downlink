<script type="application/json" id="dl-articles">[{"n":4,"title":"Langflow RCE Exploited to Deploy Monero Miner on Exposed AI App Endpoints","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/langflow-rce-exploited-to-deploy-monero.html","time":"15:47","priority":"MUST READ","score":94,"tldr":"Attackers are actively exploiting a critical unauthenticated Langflow RCE flaw to compromise exposed AI application endpoints and deploy a Monero miner. The malware also disables security controls, removes rival miners, establishes persistence, and can spread to other systems via reused SSH keys.","briefOverview":"\u003cp\u003eThreat actors are exploiting CVE-2026-33017, a critical unauthenticated remote code execution vulnerability in Langflow, to deliver a Monero cryptocurrency miner. Trend Micro observed the campaign over a 19-day window between March 27 and April 15, 2026. The activity targets exposed artificial intelligence application endpoints and uses them as an initial access path into enterprise networks.\u003c/p\u003e\n\n\u003cp\u003eThe attack runs attacker-supplied Python code inside an unauthenticated Langflow API endpoint to download and execute a shell script. That script checks for a binary called “lambsys,” downloads it with curl or wget if needed, launches it as a detached process, and spreads to SSH-reachable hosts the victim can authenticate to. The Go-based binary disables security controls including AppArmor, Ubuntu’s Uncomplicated Firewall, iptables, SELinux, the kernel NMI watchdog, and Alibaba Cloud’s Aliyun agent.\u003c/p\u003e\n\n\u003cp\u003eThe malware terminates competing cryptocurrency miners linked to Kinsing, WatchDog, Rocke, and Outlaw, removes rival wallet and key material, deletes system logs, and establishes cron-based persistence. It contacts an external server at 83.142.209[.]214:80 to fetch a TAR archive containing a bespoke XMRig miner, then queries ipinfo[.]io for the host’s public IP address and location. Trend Micro said the campaign shows how exposed AI application endpoints are becoming another route into enterprise environments.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Threat actors are exploiting CVE-2026-33017, a critical unauthenticated remote code execution vulnerability in Langflow, to target exposed AI application endpoints and deploy a Monero cryptocurrency miner.","Trend Micro observed the campaign over a 19-day period between March 27 and April 15, 2026.","The attack uses attacker-supplied Python code in an unauthenticated Langflow API endpoint to download a shell script, fetch a miner binary called lambsys, and launch it as a detached process.","The lambsys malware terminates competing cryptocurrency miners, disables host-level security controls, establishes cron-based persistence, removes system logs, and can spread to SSH-reachable hosts using reused SSH keys.","The final payload contacts an external server to download a TAR archive containing a bespoke XMRig miner and queries ipinfo.io to obtain the victim host’s public IP address and location."],"insights":["The campaign shows that exposed AI application endpoints are being used as an initial access path into enterprise environments, not just as isolated targets for cryptomining.","Lambsys is built to remove competing miners and rival wallet or key material, indicating the operators expect infected systems may already be contested by other cryptojacking groups.","The malware’s use of many short-lived shell subprocesses favors reliability over stealth, allowing individual command failures to occur without stopping the rest of the attack logic.","The request to ipinfo.io supports operational decisions such as selecting nearby mining pools to improve hash rate and excluding victims in certain regions.","Trend Micro found a related binary artifact compiled in May 2024, suggesting the operators have been iterating on this malware family for more than two years."],"referencedReports":[{"title":"From Langflow to Monero: Inside CVE-2026-33017 Cryptominer","url":"https://www.trendmicro.com/en_us/research/26/f/from-langflow-to-monero-inside-cve-2026-33017-cryptominer.html","publisher":"Trend Micro","context":"The article cites a Trend Micro technical report as the source for details on the Langflow exploitation campaign and Lambsys cryptominer behavior.","category":"research","primary":true}],"body":"\u003cp\u003eThreat actors are exploiting CVE-2026-33017, a critical unauthenticated remote code execution vulnerability in Langflow, to deliver a Monero cryptocurrency miner. Trend Micro observed the campaign over a 19-day window between March 27 and April 15, 2026. The activity targets exposed artificial intelligence application endpoints and uses them as an initial access path into enterprise networks.\u003c/p\u003e\n\n\u003cp\u003eThe attack runs attacker-supplied Python code inside an unauthenticated Langflow API endpoint to download and execute a shell script. That script checks for a binary called “lambsys,” downloads it with curl or wget if needed, launches it as a detached process, and spreads to SSH-reachable hosts the victim can authenticate to. The Go-based binary disables security controls including AppArmor, Ubuntu’s Uncomplicated Firewall, iptables, SELinux, the kernel NMI watchdog, and Alibaba Cloud’s Aliyun agent.\u003c/p\u003e\n\n\u003cp\u003eThe malware terminates competing cryptocurrency miners linked to Kinsing, WatchDog, Rocke, and Outlaw, removes rival wallet and key material, deletes system logs, and establishes cron-based persistence. It contacts an external server at 83.142.209[.]214:80 to fetch a TAR archive containing a bespoke XMRig miner, then queries ipinfo[.]io for the host’s public IP address and location. Trend Micro said the campaign shows how exposed AI application endpoints are becoming another route into enterprise environments.\u003c/p\u003e\n"},{"n":5,"title":"Silent Swap Crypto Clipper Uses Fake Google Notes Extension to Replace Wallet Addresses","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/silent-swap-crypto-clipper-uses-fake.html","time":"15:40","priority":"SHOULD READ","score":82,"tldr":"A malware campaign called Silent Swap is using fake browser extensions, including a bogus Google Notes utility, to secretly replace copied cryptocurrency wallet addresses with attacker-controlled ones. The campaign is notable for using blockchain-based C2 lookup and stealthy Chromium extension installation, making takedown and detection harder.","briefOverview":"\u003cp\u003eCybersecurity researchers have flagged an active browser extension campaign called Silent Swap that is designed to steal cryptocurrency by replacing wallet addresses when users initiate transactions. McAfee Labs said the campaign is delivered through unsigned installers observed in .NET and Golang variants, which deploy a malicious Chromium extension pretending to be a benign “Google Notes” utility. The extension requests access to the clipboard, all URLs, and browsing history so it can intercept and manipulate copied wallet addresses.\u003c/p\u003e\n\n\u003cp\u003eThe campaign affects Chromium-based browsers such as Google Chrome, Microsoft Edge, Brave, and Vivaldi by modifying browser Secure Preferences and Preferences files to load the extension without normal store-based installation. McAfee said the malware recalculates and updates browser security verification values after tampering with these files, making the browser treat the extension as legitimately installed. The activity also uses EtherHiding, which relies on a blockchain smart contract to retrieve active command-and-control server details that operators can rotate with a single transaction.\u003c/p\u003e\n\n\u003cp\u003eSilent Swap maps wallet addresses for Bitcoin, Ethereum, Bitcoin Cash, Ripple, and Dash to attacker-controlled addresses on the server side, while submitted Solana addresses resolve to a single attacker address. McAfee reported infections across multiple countries, with a higher concentration in India and other impacted countries including the U.S., Brazil, Indonesia, and Spain. The article also describes Socket’s findings on malicious Chrome and Firefox extensions named “VPN Go: Free VPN,” which provide visible proxy functionality while monitoring and exfiltrating clipboard contents such as passwords, authentication codes, API keys, OAuth tokens, and seed phrases.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["McAfee Labs identified an active cryptocurrency clipper campaign called Silent Swap that uses a malicious Chromium browser extension disguised as a benign “Google Notes” utility.","The Silent Swap installer has been observed in .NET and Golang variants and injects the malicious extension into detected Chromium-based browser profiles by modifying Secure Preferences and Preferences files.","The malicious extension can intercept wallet addresses copied to the clipboard and replace them with attacker-controlled addresses for Bitcoin, Ethereum, Bitcoin Cash, Ripple, Dash, and Solana transactions.","Silent Swap uses EtherHiding to retrieve active command-and-control server details from a blockchain smart contract, allowing operators to rotate infrastructure without redeploying the malware.","Socket reported malicious Chrome and Firefox extensions named “VPN Go: Free VPN” that provide visible proxy functionality while also monitoring and exfiltrating clipboard contents to attacker-controlled infrastructure."],"insights":["Silent Swap’s use of a blockchain smart contract as a lookup point makes the command-and-control infrastructure easier for operators to rotate, because they can change the active server with a single transaction instead of modifying the malware.","The malware recalculates browser security verification values after modifying Chromium settings files, which helps the malicious extension appear legitimately installed and bypass the normal extension store approval flow.","The wallet replacement logic is server-side and deterministic, returning the same attacker-controlled replacement address when the same victim address is submitted again.","The VPN Go extensions used a staged update pattern, first appearing benign in official extension stores before later versions introduced clipboard-stealing behavior.","Users who installed the VPN Go extensions are advised to treat any secrets copied while the extensions were active as compromised, because the clipboard theft was not limited to cryptocurrency wallet addresses."],"referencedReports":[{"title":"Crypto Clipper Wallet Swapping Browser Extension Malware","url":"https://www.mcafee.com/blogs/other-blogs/mcafee-labs/crypto-clipper-wallet-swapping-browser-extension-malware/","publisher":"McAfee Labs","context":"The article cites McAfee Labs' technical report as the source for details on the Silent Swap campaign, including its installers, malicious Chromium extension, EtherHiding use, and wallet substitution behavior.","category":"research","primary":true},{"title":"Chrome and Firefox Extensions Posing as Free VPNs Add Clipboard Stealers","url":"https://socket.dev/blog/chrome-and-firefox-extensions-free-vpns-add-clipboard-stealers?__cf_chl_f_tk=GnkzAeqCUSH2LvW5f.jX55tNL39WkJj59743cbeGocQ-1782793053-1.0.1.1-F8ctGzY0X_JawpS3v_VSCF0hiSblTN4B_EQikSRklGI","publisher":"Socket","context":"The article references Socket's analysis of malicious Chrome and Firefox extensions named “VPN Go: Free VPN” that include clipboard-stealing logic.","category":"research","primary":true}],"body":"\u003cp\u003eCybersecurity researchers have flagged an active browser extension campaign called Silent Swap that is designed to steal cryptocurrency by replacing wallet addresses when users initiate transactions. McAfee Labs said the campaign is delivered through unsigned installers observed in .NET and Golang variants, which deploy a malicious Chromium extension pretending to be a benign “Google Notes” utility. The extension requests access to the clipboard, all URLs, and browsing history so it can intercept and manipulate copied wallet addresses.\u003c/p\u003e\n\n\u003cp\u003eThe campaign affects Chromium-based browsers such as Google Chrome, Microsoft Edge, Brave, and Vivaldi by modifying browser Secure Preferences and Preferences files to load the extension without normal store-based installation. McAfee said the malware recalculates and updates browser security verification values after tampering with these files, making the browser treat the extension as legitimately installed. The activity also uses EtherHiding, which relies on a blockchain smart contract to retrieve active command-and-control server details that operators can rotate with a single transaction.\u003c/p\u003e\n\n\u003cp\u003eSilent Swap maps wallet addresses for Bitcoin, Ethereum, Bitcoin Cash, Ripple, and Dash to attacker-controlled addresses on the server side, while submitted Solana addresses resolve to a single attacker address. McAfee reported infections across multiple countries, with a higher concentration in India and other impacted countries including the U.S., Brazil, Indonesia, and Spain. The article also describes Socket’s findings on malicious Chrome and Firefox extensions named “VPN Go: Free VPN,” which provide visible proxy functionality while monitoring and exfiltrating clipboard contents such as passwords, authentication codes, API keys, OAuth tokens, and seed phrases.\u003c/p\u003e\n"},{"n":6,"title":"GuardFall Exposes Open-Source AI Coding Agents to Decades-Old Shell Injection Risks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/guardfall-exposes-open-source-ai-coding.html","time":"14:26","priority":"SHOULD READ","score":82,"tldr":"Adversa AI’s GuardFall research shows that most tested open-source AI coding agents can be tricked into running dangerous shell commands because their safety filters check raw text instead of what bash actually executes. Users should avoid auto-execution and isolate agents from real home directories and secrets until stronger command parsing protections are added.","briefOverview":"\u003cp\u003eAdversa AI research named GuardFall found that a decades-old shell trick can bypass safety checks in many open-source AI coding and computer-use agents. The bypass worked against ten of the eleven popular agents the firm tested, with only Continue built to defend against it. The affected tools named in the article include opencode, Goose, Cline, Roo-Code, Aider, Plandex, Open Interpreter, OpenHands, SWE-agent, and Hermes.\u003c/p\u003e\n\n\u003cp\u003eThe issue matters because these agents can run shell commands with the user’s full account access. If an agent is pointed at a booby-trapped repository or software package, hidden instructions could lead it to run commands that wipe files or steal secrets such as SSH keys, cloud credentials, or other data in the user’s home folder. Adversa describes the work as lab research, and the article says no public exploitation has been reported.\u003c/p\u003e\n\n\u003cp\u003eThe technical problem is that many agents check commands as plain text against blocklists, while bash rewrites the command before running it by stripping quotes and expanding shortcuts. For example, a filter watching for \u003ccode\u003erm\u003c/code\u003e may not detect \u003ccode\u003er''m\u003c/code\u003e, but bash removes the empty quotes and runs \u003ccode\u003erm\u003c/code\u003e anyway. The article recommends reducing exposure by using a throwaway home folder, turning off auto-execute modes unless necessary, avoiding agents on pull requests from forks, and treating repository configuration files as untrusted code.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Adversa AI’s GuardFall research found that a decades-old shell trick bypassed safety checks in ten of eleven tested open-source coding and computer-use agents, with only Continue built to defend against it.","The bypass works because many agents check commands as plain text against blocklists, while bash later rewrites the text by stripping quotes and expanding shortcuts before execution.","An affected agent could run destructive or secret-stealing commands with the user’s full account access if it is pointed at a booby-trapped repository or software package.","Adversa reported that opencode, Goose, Cline, Roo-Code, Aider, Plandex, Open Interpreter, OpenHands, SWE-agent, and Hermes left the gap open, while Continue’s default editor mode blocked the tested payloads.","The article recommends reducing exposure by using a throwaway home folder, disabling auto-execute modes unless necessary, avoiding agents on pull requests from forks, and treating repository configuration files as untrusted code."],"insights":["Adding more blocked command patterns is not a complete fix because the issue is described as a broader unsafe design pattern where the guard and bash interpret the same command differently.","A malicious command does not need to be presented directly to the AI; the article says it can be hidden inside normal-looking material such as a build file or tool documentation and then emitted as a routine step.","The strongest tested defense was to parse the command the way bash will before deciding whether to run it, and Adversa said this design is portable and could be reimplemented by an experienced engineer in about two days.","Even the agent that performed best, Continue, had weaker protection in its command-line auto-run mode, showing that safety can vary significantly between modes within the same tool.","Repository-supplied configuration files such as .aider.conf.yml are especially risky because the article says a malicious one can trigger the attack on the first accepted edit."],"referencedReports":[{"title":"GuardFall","url":"https://adversa.ai/blog/opensource-ai-coding-agents-shell-injection-vulnerability/","publisher":"Adversa AI","context":"The article is based on Adversa AI research named GuardFall, which found a shell-command safety bypass affecting ten of eleven tested open-source coding and computer-use agents.","category":"research","primary":true},{"title":"TrustFall","url":"https://adversa.ai/blog/trustfall-coding-agent-security-flaw-rce-claude-cursor-gemini-cli-copilot/","publisher":"Adversa AI","context":"The article cites Adversa AI's TrustFall as a related finding that hit Claude Code, Cursor, Gemini CLI, and Copilot CLI.","category":"research","primary":false},{"title":"Claude Code Security Bypass: Deny Rules Disabled","url":"https://adversa.ai/blog/claude-code-security-bypass-deny-rules-disabled/","publisher":"Adversa AI","context":"The article references a separate Adversa AI deny-rule bypass that affected Claude Code as part of a series of similar findings.","category":"research","primary":false}],"body":"\u003cp\u003eAdversa AI research named GuardFall found that a decades-old shell trick can bypass safety checks in many open-source AI coding and computer-use agents. The bypass worked against ten of the eleven popular agents the firm tested, with only Continue built to defend against it. The affected tools named in the article include opencode, Goose, Cline, Roo-Code, Aider, Plandex, Open Interpreter, OpenHands, SWE-agent, and Hermes.\u003c/p\u003e\n\n\u003cp\u003eThe issue matters because these agents can run shell commands with the user’s full account access. If an agent is pointed at a booby-trapped repository or software package, hidden instructions could lead it to run commands that wipe files or steal secrets such as SSH keys, cloud credentials, or other data in the user’s home folder. Adversa describes the work as lab research, and the article says no public exploitation has been reported.\u003c/p\u003e\n\n\u003cp\u003eThe technical problem is that many agents check commands as plain text against blocklists, while bash rewrites the command before running it by stripping quotes and expanding shortcuts. For example, a filter watching for \u003ccode\u003erm\u003c/code\u003e may not detect \u003ccode\u003er''m\u003c/code\u003e, but bash removes the empty quotes and runs \u003ccode\u003erm\u003c/code\u003e anyway. The article recommends reducing exposure by using a throwaway home folder, turning off auto-execute modes unless necessary, avoiding agents on pull requests from forks, and treating repository configuration files as untrusted code.\u003c/p\u003e\n"},{"n":1,"title":"Fake Perplexity extension on Chrome Web Store tracked searches","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/fake-perplexity-extension-on-chrome-web-store-tracked-searches/","time":"15:46","priority":"SHOULD READ","score":80,"tldr":"A fake Chrome extension impersonating Perplexity AI redirected users’ search queries through attacker-controlled infrastructure and collected browsing/search data. Microsoft says users who installed extension ID flkebkiofojicogddingbdmcmkpbplcd should remove it and consider rotating critical passwords.","briefOverview":"\u003cp\u003eA malicious Chrome Web Store extension called “Search for perplexity ai” masqueraded as the Perplexity AI answer engine. Microsoft Threat Intelligence researchers said the extension intercepted search traffic and collected browsing information. It routed search queries and real-time suggestions through its own infrastructure before redirecting users to legitimate search services.\u003c/p\u003e\n\n\u003cp\u003eThe fake extension used similar branding to Perplexity AI and the domain “perplexity-ai[.]online,” instead of the legitimate perplexity.ai domain. Once installed, it changed the browser’s search settings to replace the default search provider. Microsoft said it also intercepted and redirected address-bar queries in a Chromium browser’s Omnibox to intermediary infrastructure not associated with the official vendor domain.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said it found no evidence that the extension stole credentials or other sensitive information. However, the researchers said its permissions would allow the operator to expand the scope of data theft, and that its DNR permissions enabled traffic redirection, URL rewriting, and selective request filtering. Users who installed the extension with the ID “flkebkiofojicogddingbdmcmkpbplcd” should remove it and rotate critical account passwords out of an abundance of caution.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A malicious Chrome Web Store extension called “Search for perplexity ai” masqueraded as the Perplexity AI answer engine.","Microsoft Threat Intelligence said the extension routed search queries and real-time suggestions through its own infrastructure before redirecting users to legitimate search services.","The extension changed browser search settings to replace the default search provider and intercept address-bar queries in Chromium browsers.","Microsoft found no evidence that the extension stole credentials or other sensitive information, but said its permissions would allow the operator to expand the scope of data theft.","Users who installed the extension with the ID “flkebkiofojicogddingbdmcmkpbplcd” should remove it and rotate critical account passwords out of caution."],"insights":["The fake extension used a lookalike domain, “perplexity-ai[.]online,” while the legitimate Perplexity domain is “perplexity.ai,” making the domain difference a concrete warning sign for users.","Microsoft said logging code found on the extension’s server showed the search-data collection was intentionally designed rather than accidental.","The extension’s requested permissions for traffic redirection, URL rewriting, and request filtering were not consistent with expected AI assistant behavior, making its permission set a notable red flag.","Although Microsoft found no credential theft, the extension’s permissions were broad enough that the operator could have expanded collection to more sensitive data."],"referencedReports":[{"title":"Chromium extension uses AI-related branding redirect browser search","url":"https://www.microsoft.com/en-us/security/blog/2026/06/29/chromium-extension-uses-airelated-branding-redirect-browser-search/","publisher":"Microsoft","context":"The article cites Microsoft’s analysis explaining that the fake extension overrode Chromium browser search settings and redirected Omnibox queries through intermediary infrastructure.","category":"research","primary":true}],"body":"\u003cp\u003eA malicious Chrome Web Store extension called “Search for perplexity ai” masqueraded as the Perplexity AI answer engine. Microsoft Threat Intelligence researchers said the extension intercepted search traffic and collected browsing information. It routed search queries and real-time suggestions through its own infrastructure before redirecting users to legitimate search services.\u003c/p\u003e\n\n\u003cp\u003eThe fake extension used similar branding to Perplexity AI and the domain “perplexity-ai[.]online,” instead of the legitimate perplexity.ai domain. Once installed, it changed the browser’s search settings to replace the default search provider. Microsoft said it also intercepted and redirected address-bar queries in a Chromium browser’s Omnibox to intermediary infrastructure not associated with the official vendor domain.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said it found no evidence that the extension stole credentials or other sensitive information. However, the researchers said its permissions would allow the operator to expand the scope of data theft, and that its DNR permissions enabled traffic redirection, URL rewriting, and selective request filtering. Users who installed the extension with the ID “flkebkiofojicogddingbdmcmkpbplcd” should remove it and rotate critical account passwords out of an abundance of caution.\u003c/p\u003e\n"},{"n":3,"title":"House passes kids’ online safety bill, but Senate approval unlikely","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/house-passes-kids-online-safety-bill-senate-unlikely","time":"16:23","priority":"MAY READ","score":65,"tldr":"The House passed the KIDS Act to strengthen children’s online safety rules, including age verification and data broker requirements, but the bill is unlikely to advance in the Senate. Key senators and advocates oppose it for lacking a stronger “duty of care” standard and raising privacy concerns.","briefOverview":"\u003cp\u003eThe House passed the Kids Internet and Digital Safety Act on Monday night with bipartisan support in a 267-117 vote. The margin met the two-thirds majority required under an expedited process that speeds a bill’s path to a vote. The legislation aims to bolster children’s online safety, but it has been criticized by advocates and key senators as privacy invasive and too weak.\u003c/p\u003e\n\n\u003cp\u003eThe bill faces a steep climb in the Senate, where many lawmakers support the competing Kids Online Safety Act. Sens. Richard Blumenthal and Marsha Blackburn criticized the House bill for leaving out a duty of care provision that would require big tech to put children’s safety first in platform design. They pledged to block the KIDS Act, while digital freedoms and civil liberties advocates also condemned its age verification element as a threat to the privacy of all internet users.\u003c/p\u003e\n\n\u003cp\u003eThe KIDS Act would require AI chatbots to disclose they are not human, mandate age verification for users seeking to view porn, and impose requirements on data brokers handling children’s information. The House compromise also allows states to pass more restrictive kids online safety laws, after Democrats objected to an earlier version that included preemption. ParentsSOS said the bill contains meaningful improvements, including protections related to addictive features, geolocation sharing, outreach from unknown adults, targeted ads to minors, and a knowledge standard for big tech.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The House passed the Kids Internet and Digital Safety Act with bipartisan support in a 267-117 vote, meeting the two-thirds majority required under the expedited voting process.","The bill faces a steep climb in the Senate, where many lawmakers support the competing Kids Online Safety Act, which includes a duty of care provision requiring big tech to prioritize children’s safety in platform design.","Sens. Richard Blumenthal and Marsha Blackburn criticized the House bill as a weak substitute for stronger accountability and pledged to block it in the Senate.","The KIDS Act would require AI chatbots to disclose they are not human, mandate age verification for users seeking to view porn, and impose requirements on data brokers handling children’s information.","Digital freedoms and civil liberties advocates condemned the bill’s age verification element as a threat to the privacy of all internet users, while ParentsSOS praised some provisions but said it would keep pushing for a duty of care."],"insights":["The bill’s Senate prospects are weakened not by lack of bipartisan support in the House, but by conflict with a separate Senate-backed proposal that many senators view as stronger.","State-law preemption is a central fault line: the House compromise kept states’ ability to pass stricter kids’ online safety laws, while Republicans and the administration favor preempting some state AI laws.","The same age verification provision meant to restrict children’s access to porn is opposed by digital freedoms and civil liberties advocates because they say it could affect the privacy of all internet users.","ParentsSOS shows that some child-safety advocates may support incremental protections even while openly criticizing the bill for leaving out a duty of care requirement."],"referencedReports":[],"body":"\u003cp\u003eThe House passed the Kids Internet and Digital Safety Act on Monday night with bipartisan support in a 267-117 vote. The margin met the two-thirds majority required under an expedited process that speeds a bill’s path to a vote. The legislation aims to bolster children’s online safety, but it has been criticized by advocates and key senators as privacy invasive and too weak.\u003c/p\u003e\n\n\u003cp\u003eThe bill faces a steep climb in the Senate, where many lawmakers support the competing Kids Online Safety Act. Sens. Richard Blumenthal and Marsha Blackburn criticized the House bill for leaving out a duty of care provision that would require big tech to put children’s safety first in platform design. They pledged to block the KIDS Act, while digital freedoms and civil liberties advocates also condemned its age verification element as a threat to the privacy of all internet users.\u003c/p\u003e\n\n\u003cp\u003eThe KIDS Act would require AI chatbots to disclose they are not human, mandate age verification for users seeking to view porn, and impose requirements on data brokers handling children’s information. The House compromise also allows states to pass more restrictive kids online safety laws, after Democrats objected to an earlier version that included preemption. ParentsSOS said the bill contains meaningful improvements, including protections related to addictive features, geolocation sharing, outreach from unknown adults, targeted ads to minors, and a knowledge standard for big tech.\u003c/p\u003e\n"},{"n":7,"title":"Aikido acquires Root to secure the supply chain","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/aikido-acquires-root","time":"14:23","priority":"MAY READ","score":63,"tldr":"Aikido has acquired Root and is launching Aikido Libraries and Aikido Images, which provide patched drop-in replacements for vulnerable open source libraries and container images without requiring disruptive upgrades or migrations. The company says critical fixes will also be contributed back upstream to strengthen the broader open source ecosystem.","briefOverview":"\u003cp\u003eAikido announced that it has acquired Root, a company focused on addressing software supply chain security challenges. The article says open source powers almost every application in the world and has become a primary entry point for attackers. It also states that attackers are getting faster, with nearly a third of known vulnerabilities exploited on or before the day they are disclosed.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Root as using an agent-native, factory-like system that generates precise CVE patches for the package versions teams actually run. Aikido says this approach produces hundreds of verified CVE patches every day and does not introduce breaking changes. The article contrasts this with the common options of upgrading and risking production, migrating to a locked-down replacement, or continuing to run vulnerable software.\u003c/p\u003e\n\n\u003cp\u003eAikido is bringing Root’s capability into its own products through Aikido Libraries and Aikido Images. These are described as vulnerability-free, drop-in replacement libraries and container images that patch software teams already run without migration or breaking changes. Aikido says critical fixes for actively exploited vulnerabilities will continue to go back to the open source community rather than being locked behind a paywall.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Aikido has acquired Root, a company focused on generating precise CVE patches for the package versions teams actually run.","The article says open source software is a primary entry point for attackers, and nearly a third of known vulnerabilities are exploited on or before the day they are disclosed.","Root uses an agent-native, factory-like system to produce hundreds of verified CVE patches every day without introducing breaking changes, according to the article.","Aikido is launching Aikido Libraries and Aikido Images as vulnerability-free, drop-in replacement libraries and container images for software teams already use.","Aikido says critical fixes for actively exploited vulnerabilities will continue to be contributed back to the open source community rather than being locked behind a paywall."],"insights":["Aikido is positioning patching in place as an alternative to the common remediation choices of upgrading, migrating to a locked-down replacement, or continuing to run vulnerable software.","The article frames speed as the central supply chain security problem, citing that attackers can exploit many disclosed vulnerabilities before teams have time to patch through traditional upgrade processes.","Root’s approach focuses on the exact package versions customers already run, which directly targets the article’s concern that normal dependency updates can introduce unrelated changes or break production.","Aikido is trying to balance a commercial product model with open source ecosystem support by saying critical fixes for actively exploited vulnerabilities will still be contributed upstream."],"referencedReports":[],"body":"\u003cp\u003eAikido announced that it has acquired Root, a company focused on addressing software supply chain security challenges. The article says open source powers almost every application in the world and has become a primary entry point for attackers. It also states that attackers are getting faster, with nearly a third of known vulnerabilities exploited on or before the day they are disclosed.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Root as using an agent-native, factory-like system that generates precise CVE patches for the package versions teams actually run. Aikido says this approach produces hundreds of verified CVE patches every day and does not introduce breaking changes. The article contrasts this with the common options of upgrading and risking production, migrating to a locked-down replacement, or continuing to run vulnerable software.\u003c/p\u003e\n\n\u003cp\u003eAikido is bringing Root’s capability into its own products through Aikido Libraries and Aikido Images. These are described as vulnerability-free, drop-in replacement libraries and container images that patch software teams already run without migration or breaking changes. Aikido says critical fixes for actively exploited vulnerabilities will continue to go back to the open source community rather than being locked behind a paywall.\u003c/p\u003e\n"},{"n":2,"title":"Lessons from the Underground: How to Combat Business Email Compromise","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/lessons-from-the-underground-how-to-combat-business-email-compromise/","time":"14:00","priority":"MAY READ","score":55,"tldr":"Business Email Compromise has evolved into an organized, multi-step operation involving compromised SaaS/mail accounts, AI-generated communications, call-center pressure, and money-mule cash-out networks. Defenders should focus on protecting finance and leadership accounts, monitoring exposed credentials, and strengthening payment verification before fraudulent invoices arrive.","briefOverview":"\u003cp\u003eBusiness Email Compromise is described as more than a simple email scam; the article says it is part of an organized operation that can include account access, mailbox analysis, payment infrastructure, timing, and money movement. Flare researchers analyzed underground posts related to BEC from the past year and found interest in SaaS accounts such as O365, especially accounts belonging to corporate leaders and finance employees. The article says attackers use compromised mailboxes to study procurement processes, vendor communications, invoices, and financial privileges before making fraudulent requests.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights underground discussions in which threat actors focused on practical fraud questions such as when to send an invoice, how to create urgency, what mailbox information to reuse, and what mistakes can ruin an operation. It also says cash-out is a major bottleneck because attackers need reliable business bank accounts, mule networks, or cash-out partners to move stolen funds. Some posts described using call centers to pressure companies into faster payments, showing that BEC can involve phone calls as well as email.\u003c/p\u003e\n\n\u003cp\u003eThe article also says AI is increasingly being adopted in BEC to generate realistic business correspondence, mimic writing styles, and create context-aware payment or invoice fraud messages. It states that defenders should identify likely targets such as leadership, finance staff, and procurement participants, and provide additional training for them. It also recommends paying attention to AI-generated content, call-center pressure tactics, exposed credentials, corporate domains, login portals, SaaS applications, and risky timing such as employee vacations.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Business Email Compromise often begins with access to an organizational mailbox or business SaaS account, after which threat actors study organizational structure, financial privileges, procurement processes, internal conversations, vendor communications, and invoices.","Flare researchers found that underground actors are increasingly using AI to generate realistic business correspondence, mimic writing styles, and create context-aware payment requests or invoice fraud emails.","Threat actors highly value finance department email accounts because they can reveal accounts receivable, accounts payable, payrolls, invoices, overdue payments, and customer payment relationships.","Underground discussions described using call centers to pressure targeted businesses into finalizing fraudulent payments after fake invoices are sent.","The article states that cash-out is a major bottleneck for BEC because attackers need reliable business bank accounts, mule networks, or cash-out partners to move stolen money."],"insights":["BEC defenses should start before any suspicious invoice appears, because attackers first spend time learning the company’s payment process, approval chain, vendor relationships, and timing.","A second communication channel, such as a follow-up phone call, should not be treated as proof that a payment request is legitimate if the requester introduced or controls that channel.","Employee vacations and other timing markers can increase BEC risk because underground actors discuss waiting for moments when approvers are unavailable or processes may be disrupted.","Cash-out limits the success of BEC operations, so signs of mule recruitment or requests for clean business bank accounts can be early indicators of planned fraud."],"referencedReports":[],"body":"\u003cp\u003eBusiness Email Compromise is described as more than a simple email scam; the article says it is part of an organized operation that can include account access, mailbox analysis, payment infrastructure, timing, and money movement. Flare researchers analyzed underground posts related to BEC from the past year and found interest in SaaS accounts such as O365, especially accounts belonging to corporate leaders and finance employees. The article says attackers use compromised mailboxes to study procurement processes, vendor communications, invoices, and financial privileges before making fraudulent requests.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights underground discussions in which threat actors focused on practical fraud questions such as when to send an invoice, how to create urgency, what mailbox information to reuse, and what mistakes can ruin an operation. It also says cash-out is a major bottleneck because attackers need reliable business bank accounts, mule networks, or cash-out partners to move stolen funds. Some posts described using call centers to pressure companies into faster payments, showing that BEC can involve phone calls as well as email.\u003c/p\u003e\n\n\u003cp\u003eThe article also says AI is increasingly being adopted in BEC to generate realistic business correspondence, mimic writing styles, and create context-aware payment or invoice fraud messages. It states that defenders should identify likely targets such as leadership, finance staff, and procurement participants, and provide additional training for them. It also recommends paying attention to AI-generated content, call-center pressure tactics, exposed credentials, corporate domains, login portals, SaaS applications, and risky timing such as employee vacations.\u003c/p\u003e\n"},{"n":9,"title":"What the Black Hat NOC Taught Me About MCP \u0026 Agentic SOCs (Chapter 1 of 4) | Corelight","source":"corelight.com","sourceColorIdx":1,"link":"https://corelight.com/blog/black-hat-noc-mcp-agentic-socs-1-of-4","time":"15:15","priority":"MAY READ","score":45,"tldr":"Corelight argues that lessons from the Black Hat network operations center show agentic SOCs and MCP-based integrations can help analysts work faster, but only if they are grounded in high-quality, trustworthy security telemetry.","briefOverview":"\u003cp\u003eThe article is titled “What the Black Hat NOC Taught Me About MCP \u0026amp; Agentic SOCs” and is published by Corelight. It is identified as Chapter 1 of a four-part series. The title indicates that the piece connects lessons from the Black Hat NOC with MCP and agentic SOCs.\u003c/p\u003e\n\n\u003cp\u003eThe provided article body is not readable as normal text, so no specific incidents, technical findings, examples, or impacts can be extracted from it. The only clear information available is the title, publisher, and series framing. Based on that available information, the article’s significance is that it introduces a multi-part discussion about MCP and agentic SOCs through the lens of Black Hat NOC experience.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article is titled “What the Black Hat NOC Taught Me About MCP \u0026 Agentic SOCs.”","The article is published by Corelight.","The article is presented as Chapter 1 of a four-part series.","The article connects lessons from the Black Hat network operations center with MCP and agentic SOCs."],"insights":["The article frames MCP and agentic SOCs through lessons from the Black Hat NOC, indicating the discussion is grounded in a real-world security operations environment rather than only in theory.","By labeling the piece as Chapter 1 of 4, the article presents MCP and agentic SOCs as a topic broad enough to require a multi-part treatment."],"referencedReports":[],"body":"\u003cp\u003eThe article is titled “What the Black Hat NOC Taught Me About MCP \u0026amp; Agentic SOCs” and is published by Corelight. It is identified as Chapter 1 of a four-part series. The title indicates that the piece connects lessons from the Black Hat NOC with MCP and agentic SOCs.\u003c/p\u003e\n\n\u003cp\u003eThe provided article body is not readable as normal text, so no specific incidents, technical findings, examples, or impacts can be extracted from it. The only clear information available is the title, publisher, and series framing. Based on that available information, the article’s significance is that it introduces a multi-part discussion about MCP and agentic SOCs through the lens of Black Hat NOC experience.\u003c/p\u003e\n"},{"n":8,"title":"Distology becomes Value-Added Distributor of Radiflow in the Benelux","source":"mspbusiness.com","sourceColorIdx":9,"link":"https://mspbusiness.com/security-en-privacy/distology-wordt-value-added-distributor-van-radiflow-in-benelux/#new_tab","time":"16:10","priority":"MAY READ","score":35,"tldr":"Distology is adding Radiflow’s OT cybersecurity platform to its Benelux portfolio as a value-added distributor. The partnership will give resellers and system integrators local access to Radiflow’s industrial threat detection, risk management and compliance tools for critical infrastructure sectors.","briefOverview":"\u003cp\u003eDistology has added Radiflow to its Benelux portfolio as a Value-Added Distributor. Radiflow provides OT cybersecurity solutions for industrial sectors such as energy, utilities, production, transport and chemicals. The partnership follows an earlier joint trajectory between the companies in the United Kingdom.\u003c/p\u003e\n\n\u003cp\u003eRadiflow says its platform provides real-time threat detection based on risk analysis, automated risk management and support for compliance requirements. The company states that its approach combines multiple tools and manual processes into one platform, giving OT security teams a complete overview of industrial networks. Radiflow expects this to help organizations detect threats earlier, limit downtime and maintain operational continuity.\u003c/p\u003e\n\n\u003cp\u003eThrough Distology, Radiflow’s solutions will become available to resellers and system integrators in the Benelux. Distology will support partners with knowledge, training and tools for implementing Radiflow technology at end customers. Radiflow is specifically targeting medium-sized organizations in critical infrastructure and industry that need OT cybersecurity but do not have the resources of large enterprises.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Distology has added Radiflow to its Benelux portfolio as a Value-Added Distributor.","Radiflow provides OT cybersecurity solutions for industrial sectors including energy, utilities, manufacturing, transport and chemicals.","Radiflow says its platform offers real-time threat detection based on risk analysis, automated risk management and support for compliance requirements.","Distology will make Radiflow’s solutions available to resellers and system integrators in the Benelux and support partners with knowledge, training and implementation tools.","Radiflow is targeting medium-sized organizations in critical infrastructure and industry that need OT cybersecurity but lack the resources of large enterprises."],"insights":["The Benelux partnership is not an isolated first step; it follows an earlier joint trajectory between Distology and Radiflow in the United Kingdom.","Radiflow’s stated go-to-market focus is on medium-sized critical infrastructure and industrial organizations that need OT security but do not have the resources of large enterprises.","The article emphasizes consolidation as part of Radiflow’s value proposition, with the platform intended to replace multiple tools and manual processes with a single view of industrial networks.","Distology’s role is not limited to resale, because the article says it will provide partners with knowledge, training and tools for implementing Radiflow technology at end customers."],"referencedReports":[],"body":"\u003cp\u003eDistology has added Radiflow to its Benelux portfolio as a Value-Added Distributor. Radiflow provides OT cybersecurity solutions for industrial sectors such as energy, utilities, production, transport and chemicals. The partnership follows an earlier joint trajectory between the companies in the United Kingdom.\u003c/p\u003e\n\n\u003cp\u003eRadiflow says its platform provides real-time threat detection based on risk analysis, automated risk management and support for compliance requirements. The company states that its approach combines multiple tools and manual processes into one platform, giving OT security teams a complete overview of industrial networks. Radiflow expects this to help organizations detect threats earlier, limit downtime and maintain operational continuity.\u003c/p\u003e\n\n\u003cp\u003eThrough Distology, Radiflow’s solutions will become available to resellers and system integrators in the Benelux. Distology will support partners with knowledge, training and tools for implementing Radiflow technology at end customers. Radiflow is specifically targeting medium-sized organizations in critical infrastructure and industry that need OT cybersecurity but do not have the resources of large enterprises.\u003c/p\u003e\n"}]</script>
