<script>
window.__DL_ARTICLES = [{"n":1,"title":"Thinking Like an Attacker: How to Strengthen Modern Cyber Defence Strategies","source":"cycognito.com","sourceColorIdx":2,"link":"https://www.cycognito.com/blog/thinking-like-an-attacker-how-to-strengthen-modern-cyber-defence-strategies/","time":"08:58","priority":"MAY READ","score":55,"tldr":"CyCognito CEO Rob Gurzeev argues that the biggest breach risks come from unknown internet-facing assets that traditional vulnerability management and pen testing often miss. He says security teams should focus on external attack surface visibility and reducing critical-issue remediation time to hours as AI accelerates attackers’ ability to find and exploit exposed systems.","briefOverview":"\u003cp\u003eThe article presents a Security Strategist podcast conversation between Richard Stiennon of IT-Harvest and Rob Gurzeev, CEO of CyCognito, about external attack surface management. Gurzeev argues that many organizations believe they understand their security posture because they run penetration tests, buy tools, and build security teams. He says breaches can still occur through assets that no one knew existed, which is the gap CyCognito was built to address.\u003c/p\u003e\n\n\u003cp\u003eA central point is that external attack surface management differs from vulnerability management because it focuses on discovering, classifying, and understanding internet-facing assets from an attacker’s perspective. Gurzeev says the highest risk often lies in blind spots, including assets created by subsidiaries, third parties, joint ventures, or business users outside central security control. He describes recall and precision as important measures because teams must find as much of the real attack surface as possible without flooding themselves with wrongly attributed assets.\u003c/p\u003e\n\n\u003cp\u003eThe article also emphasizes that AI is accelerating both the attack surface problem and the need for faster remediation. Gurzeev says AI can help less technical people exploit applications and complex systems within minutes, making mean time to remediation a critical metric. His main recommendation for CISOs and CIOs is to honestly assess whether critical issues are remediated in hours, days, weeks, or months, and whether current processes can reduce that time to one or two hours.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is based on a conversation between Richard Stiennon, Chief Research Analyst and founder of IT-Harvest, and Rob Gurzeev, CEO of CyCognito, on the Security Strategist podcast. The discussion focuses on external attack surface management and why organizations often lack visibility into all internet-facing assets. Gurzeev says many organizations think they understand their security posture because they conduct penetration tests, invest in tools, and build teams, but breaches can still happen through unknown assets.\u003c/p\u003e\n\n\u003cp\u003eGurzeev explains that his background in intelligence work shaped his attacker-oriented view of cybersecurity. He describes attack surface management as finding the path of least resistance into systems, rather than starting from the assets a defender already knows about. He contrasts this with much of the cybersecurity industry, which he says has built layers of defense around assets that organizations already know exist.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies blind spots as a major source of risk in modern environments. Gurzeev says third-party marketing applications, subsidiaries with their own technology stacks, and joint ventures can create or operate assets that are effectively part of an organization’s external presence but are not under direct central control. He says that when CyCognito comes in, between 10 and 50 percent of applications, devices, and cloud assets may not be known by any existing technology or database.\u003c/p\u003e\n\n\u003cp\u003eGurzeev distinguishes vulnerability management from external attack surface management. He says vulnerability scanning and management map potential vulnerabilities, while attack surface management maps, classifies, and understands what an organization has. He adds that internal asset management can rely on integrations with tools such as ServiceNow, endpoint protection platforms, and AWS, but external attack surface management is harder because no one has a definitive internal source of truth for internet-facing reality.\u003c/p\u003e\n\n\u003cp\u003eThe discussion also covers how the attack surface has expanded as it has become easier to build applications and change network configurations. Gurzeev says large companies may have between 100,000 applications, devices, and cloud assets exposed to the internet, and CyCognito’s largest customer has 100 million internet-connected items that external attackers can interact with. He also says tools such as Claude Code or Lovable can allow people in business functions like HR and finance to assemble sensitive information into internet-exposed applications, intentionally or accidentally.\u003c/p\u003e\n\n\u003cp\u003eAI is presented as a force that increases urgency around remediation. Gurzeev says there is now consensus that mean time to remediation for critical issues needs to be measured in hours rather than days, while many companies still take months. His closing recommendation is for CISOs and CIOs to examine how long it really takes to remediate critical issues and ask whether their current efforts, processes, and technologies can reduce that time to one or two hours.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article presents a Security Strategist podcast conversation between Richard Stiennon, Chief Research Analyst and founder of IT-Harvest, and Rob Gurzeev, CEO of CyCognito. The topic is external attack surface management and why it remains difficult for organizations to understand and manage their internet-facing exposure.\u003c/p\u003e\n\n\u003cp\u003eGurzeev’s central argument is that many organizations believe they understand their security posture because they run penetration tests, invest in tools, and build teams, but breaches can still occur through assets that no one knew existed. He says this gap is what CyCognito was built to close.\u003c/p\u003e\n\n\u003ch2 id=\"background-and-perspective\"\u003eBackground and Perspective\u003c/h2\u003e\n\n\u003cp\u003eGurzeev says he did not choose attack surface management so much as it “chose” him. He describes growing up around IRCs and prank-style exploitation among peers, which he characterizes as an early form of penetration-testing experience.\u003c/p\u003e\n\n\u003cp\u003eHe later joined an intelligence agency at age 18, where he worked on what cybersecurity now calls attack surface management. In that context, he focused on finding the path of least resistance into systems to acquire relevant intelligence. He describes the work as fascinating and like puzzle solving, but also stressful because real lives were on the line.\u003c/p\u003e\n\n\u003cp\u003eThis background shaped his view of the difference between attacker and defender perspectives. He says much of the cybersecurity industry has built layers of defense based on deploying tools and knowing where assets are. By contrast, he says his training emphasized that defenders do not always know reality and must look for the path of least resistance.\u003c/p\u003e\n\n\u003ch2 id=\"why-organizations-still-miss-external-assets\"\u003eWhy Organizations Still Miss External Assets\u003c/h2\u003e\n\n\u003cp\u003eGurzeev argues that organizations often focus on known assets and established KPIs rather than asking where their security posture is most likely to fail. He says security and IT teams may not be rewarded for telling boards that existing processes or technologies cover only a small part of the real environment.\u003c/p\u003e\n\n\u003cp\u003eHe gives the example of an organization spending $2 million on manual penetration testing while only testing 1 percent of its internet-facing applications. He says a security leader may not be rewarded for telling a mostly non-technical board that 99 percent of those applications were not tested.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this as an organizational and technical problem. Gurzeev says that attacker-oriented work focuses on the path of least resistance, while defenders are often focused on building systems, completing projects, and meeting KPIs.\u003c/p\u003e\n\n\u003ch2 id=\"growth-of-the-modern-attack-surface\"\u003eGrowth of the Modern Attack Surface\u003c/h2\u003e\n\n\u003cp\u003eGurzeev says the complexity of enterprise attack surfaces has grown significantly. He contrasts the environment 20 years ago, when Apple and Google each had one main website or one internet-connected thing, with modern large companies that may have between 100,000 applications, devices, and cloud assets exposed to the internet.\u003c/p\u003e\n\n\u003cp\u003eHe says CyCognito’s largest customer has 100 million internet-connected items that external attackers can interact with. He notes that manual penetration testing may cover 100, 500, or perhaps 1,000 web applications, leaving open the question of what happens to the rest.\u003c/p\u003e\n\n\u003cp\u003eHe attributes part of the growth to the increased ease of building applications and changing network configurations. Twenty years ago, he says, one person in a company might have had the authority to make major network changes. Now, he says, people in departments such as HR and finance can use tools like Claude Code or Lovable to assemble sensitive information, build applications, and expose them to the internet either intentionally or accidentally.\u003c/p\u003e\n\n\u003ch2 id=\"external-attack-surface-management-versus-vulnerability-management\"\u003eExternal Attack Surface Management Versus Vulnerability Management\u003c/h2\u003e\n\n\u003cp\u003eThe article distinguishes between vulnerability management and external attack surface management while noting that they are adjacent. Gurzeev says vulnerability scanning and management focus on mapping potential vulnerabilities. Attack surface management, in his description, focuses on mapping, classifying, and understanding what an organization has.\u003c/p\u003e\n\n\u003cp\u003eHe says the internal and external views are significantly different. For internal attack surface management, he says teams can use integrations with sources such as ServiceNow, endpoint protection tools, and AWS instances, with deduplication and presentation being major challenges. In that case, he says, the data is there.\u003c/p\u003e\n\n\u003cp\u003eExternal attack surface management is described as much harder because no one knows the full reality. Gurzeev gives examples such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA third party building a marketing campaign application with the company’s logo and customers’ PII.\u003c/li\u003e\n\u003cli\u003eA company having 100 subsidiaries, each with its own technology stack.\u003c/li\u003e\n\u003cli\u003eSubsidiaries that may not cooperate with the global security team.\u003c/li\u003e\n\u003cli\u003eA joint venture in China or an engineer somewhere creating assets outside central visibility.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHe says that between 10 and 50 percent of applications, devices, and cloud assets may not be known by any technology or database when CyCognito begins working with an organization. He emphasizes that only one unknown or undermanaged asset is needed to enable a breach.\u003c/p\u003e\n\n\u003ch2 id=\"recall-precision-and-blind-spots\"\u003eRecall, Precision, and Blind Spots\u003c/h2\u003e\n\n\u003cp\u003eGurzeev uses recall and precision to explain the difficulty of external attack surface management. Recall refers to how much of the real asset base is found. Precision refers to how accurate the attribution is.\u003c/p\u003e\n\n\u003cp\u003eHe explains that finding 99 of 100 assets gives 99 percent recall, but claiming one million assets are owned by the organization when only 100 are truly owned would create poor precision. He says balancing recall and precision is very hard.\u003c/p\u003e\n\n\u003cp\u003eHe criticizes what he calls the “lazy approach” used by many vendors and technologies: asking teams what they already know about their attack surface and then finding adjacent assets. He acknowledges that this has value, but says the greatest risk lies in complete blind spots that no one knows about.\u003c/p\u003e\n\n\u003ch2 id=\"ai-and-the-changing-remediation-timeline\"\u003eAI and the Changing Remediation Timeline\u003c/h2\u003e\n\n\u003cp\u003eThe article says AI is reshaping attack surface discovery, exposure management, and remediation expectations. Gurzeev says there is now consensus that AI changes the conversation on mean time to remediation, which needs to be measured in hours rather than days.\u003c/p\u003e\n\n\u003cp\u003eHe says many companies still take months to remediate even critical issues. He also says that even a person who is not highly technical can now exploit applications and complex systems within minutes.\u003c/p\u003e\n\n\u003cp\u003eThis makes it more important, in his view, for organizations to know what is exposed and to quickly determine where relevant assets are when a new emerging threat appears. He says he hears from customers multiple times per week about code-red emerging threats.\u003c/p\u003e\n\n\u003cp\u003eGurzeev also says CyCognito is spending time expanding deterministic security testing capabilities into AI-enabled creative testing at scale. He describes deep testing of one asset at a time as almost a solved problem with AI, while continuously testing all assets within budget remains the next major problem to solve.\u003c/p\u003e\n\n\u003ch2 id=\"main-recommendation-for-security-leaders\"\u003eMain Recommendation for Security Leaders\u003c/h2\u003e\n\n\u003cp\u003eGurzeev’s closing advice to CISOs and CIOs is to examine mean time to remediation for whatever their organization defines as critical issues. He asks leaders to be honest about whether remediation occurs within a couple of hours, a few days, or a few weeks.\u003c/p\u003e\n\n\u003cp\u003eHe then recommends asking whether current efforts, processes, and technologies can reduce remediation time to one or two hours. If not, he suggests organizations should consider whether they need a different approach.\u003c/p\u003e\n\n\u003ch2 id=\"key-parties-mentioned\"\u003eKey Parties Mentioned\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRob Gurzeev:\u003c/strong\u003e CEO of CyCognito and the primary speaker discussing external attack surface management.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRichard Stiennon:\u003c/strong\u003e Chief Research Analyst and founder of IT-Harvest, and host of the Security Strategist podcast episode.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCyCognito:\u003c/strong\u003e The company described as being built to close the gap around unknown external assets.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIT-Harvest:\u003c/strong\u003e Stiennon’s organization.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEM360Tech:\u003c/strong\u003e Mentioned in connection with the podcast’s social presence.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eServiceNow, AWS, Claude Code, and Lovable:\u003c/strong\u003e Mentioned as examples of platforms or tools in the discussion of asset data, cloud instances, and application creation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eApple and Google:\u003c/strong\u003e Mentioned as examples in the contrast between earlier, simpler internet presences and modern complex attack surfaces.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that external exposure risk often lives outside the assets security teams already know about. Gurzeev argues that traditional penetration testing and vulnerability management do not fully solve this problem because unknown internet-facing assets, third-party applications, subsidiaries, and fast-moving application creation can create unmanaged exposure.\u003c/p\u003e\n\n\u003cp\u003eThe article presents mean time to remediation as the practical metric that matters most. In the context of AI-enabled exploitation and rapidly emerging threats, Gurzeev says organizations should aim to reduce remediation of critical issues to one or two hours.\u003c/p\u003e\n","keyPoints":["Rob Gurzeev says the greatest external attack surface risk often comes from complete blind spots, such as assets that no one in the organization knows exist.","Gurzeev distinguishes vulnerability management as mapping potential vulnerabilities from external attack surface management, which maps, classifies, and understands internet-facing assets from an outside perspective.","The article states that large organizations can have between 100,000 applications, devices, and cloud assets exposed to the internet, while CyCognito’s largest customer has 100 million internet-connected assets.","Gurzeev says AI is accelerating the need for organizations to reduce mean time to remediation for critical issues from days or months to hours.","Gurzeev recommends that CISOs and CIOs assess whether their current processes and technologies can reduce critical-issue remediation time to one or two hours."],"insights":["Gurzeev frames recall and precision as critical measures for external attack surface management, because finding nearly all assets is not enough if the results are polluted with large volumes of incorrectly attributed assets.","The article highlights a governance gap in which third-party marketing campaigns, subsidiaries, and joint ventures can create de facto company applications containing logos or customer PII while remaining outside the direct control of central security teams.","Gurzeev suggests that organizational incentives can suppress attack surface visibility problems, because security leaders may not be rewarded for telling boards that existing processes such as penetration testing cover only a small fraction of internet-facing applications.","The article identifies non-technical business users building internet-exposed applications with tools such as Claude Code or Lovable as a newer source of unmanaged attack surface complexity."],"referencedReports":[],"body":"\u003cp\u003eThe article presents a Security Strategist podcast conversation between Richard Stiennon of IT-Harvest and Rob Gurzeev, CEO of CyCognito, about external attack surface management. Gurzeev argues that many organizations believe they understand their security posture because they run penetration tests, buy tools, and build security teams. He says breaches can still occur through assets that no one knew existed, which is the gap CyCognito was built to address.\u003c/p\u003e\n\n\u003cp\u003eA central point is that external attack surface management differs from vulnerability management because it focuses on discovering, classifying, and understanding internet-facing assets from an attacker’s perspective. Gurzeev says the highest risk often lies in blind spots, including assets created by subsidiaries, third parties, joint ventures, or business users outside central security control. He describes recall and precision as important measures because teams must find as much of the real attack surface as possible without flooding themselves with wrongly attributed assets.\u003c/p\u003e\n\n\u003cp\u003eThe article also emphasizes that AI is accelerating both the attack surface problem and the need for faster remediation. Gurzeev says AI can help less technical people exploit applications and complex systems within minutes, making mean time to remediation a critical metric. His main recommendation for CISOs and CIOs is to honestly assess whether critical issues are remediated in hours, days, weeks, or months, and whether current processes can reduce that time to one or two hours.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  const [theme, setTheme] = React.useState(() => document.documentElement.dataset.theme || 'dark');
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  const applyTheme = (t) => {
    document.documentElement.dataset.theme = t;
    try { localStorage.setItem('downlink.theme', t); } catch(e){}
    setTheme(t);
  };
  return (
    <nav className="swipe-nav" style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span className="swipe-clock" style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <select value={theme} onChange={(e) => applyTheme(e.target.value)} title="Select theme" aria-label="Select theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

}

          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>

        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>

        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"

            letterSpacing: "0.08em", padding: "6px 12px",

      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
