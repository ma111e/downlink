<script type="application/json" id="dl-articles">[{"n":1,"title":"Thinking Like an Attacker: How to Strengthen Modern Cyber Defence Strategies","source":"cycognito.com","sourceColorIdx":2,"link":"https://www.cycognito.com/blog/thinking-like-an-attacker-how-to-strengthen-modern-cyber-defence-strategies/","time":"08:58","priority":"MAY READ","score":55,"tldr":"CyCognito CEO Rob Gurzeev argues that the biggest breach risks come from unknown internet-facing assets that traditional vulnerability management and pen testing often miss. He says security teams should focus on external attack surface visibility and reducing critical-issue remediation time to hours as AI accelerates attackers’ ability to find and exploit exposed systems.","briefOverview":"\u003cp\u003eThe article presents a Security Strategist podcast conversation between Richard Stiennon of IT-Harvest and Rob Gurzeev, CEO of CyCognito, about external attack surface management. Gurzeev argues that many organizations believe they understand their security posture because they run penetration tests, buy tools, and build security teams. He says breaches can still occur through assets that no one knew existed, which is the gap CyCognito was built to address.\u003c/p\u003e\n\n\u003cp\u003eA central point is that external attack surface management differs from vulnerability management because it focuses on discovering, classifying, and understanding internet-facing assets from an attacker’s perspective. Gurzeev says the highest risk often lies in blind spots, including assets created by subsidiaries, third parties, joint ventures, or business users outside central security control. He describes recall and precision as important measures because teams must find as much of the real attack surface as possible without flooding themselves with wrongly attributed assets.\u003c/p\u003e\n\n\u003cp\u003eThe article also emphasizes that AI is accelerating both the attack surface problem and the need for faster remediation. Gurzeev says AI can help less technical people exploit applications and complex systems within minutes, making mean time to remediation a critical metric. His main recommendation for CISOs and CIOs is to honestly assess whether critical issues are remediated in hours, days, weeks, or months, and whether current processes can reduce that time to one or two hours.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is based on a conversation between Richard Stiennon, Chief Research Analyst and founder of IT-Harvest, and Rob Gurzeev, CEO of CyCognito, on the Security Strategist podcast. The discussion focuses on external attack surface management and why organizations often lack visibility into all internet-facing assets. Gurzeev says many organizations think they understand their security posture because they conduct penetration tests, invest in tools, and build teams, but breaches can still happen through unknown assets.\u003c/p\u003e\n\n\u003cp\u003eGurzeev explains that his background in intelligence work shaped his attacker-oriented view of cybersecurity. He describes attack surface management as finding the path of least resistance into systems, rather than starting from the assets a defender already knows about. He contrasts this with much of the cybersecurity industry, which he says has built layers of defense around assets that organizations already know exist.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies blind spots as a major source of risk in modern environments. Gurzeev says third-party marketing applications, subsidiaries with their own technology stacks, and joint ventures can create or operate assets that are effectively part of an organization’s external presence but are not under direct central control. He says that when CyCognito comes in, between 10 and 50 percent of applications, devices, and cloud assets may not be known by any existing technology or database.\u003c/p\u003e\n\n\u003cp\u003eGurzeev distinguishes vulnerability management from external attack surface management. He says vulnerability scanning and management map potential vulnerabilities, while attack surface management maps, classifies, and understands what an organization has. He adds that internal asset management can rely on integrations with tools such as ServiceNow, endpoint protection platforms, and AWS, but external attack surface management is harder because no one has a definitive internal source of truth for internet-facing reality.\u003c/p\u003e\n\n\u003cp\u003eThe discussion also covers how the attack surface has expanded as it has become easier to build applications and change network configurations. Gurzeev says large companies may have between 100,000 applications, devices, and cloud assets exposed to the internet, and CyCognito’s largest customer has 100 million internet-connected items that external attackers can interact with. He also says tools such as Claude Code or Lovable can allow people in business functions like HR and finance to assemble sensitive information into internet-exposed applications, intentionally or accidentally.\u003c/p\u003e\n\n\u003cp\u003eAI is presented as a force that increases urgency around remediation. Gurzeev says there is now consensus that mean time to remediation for critical issues needs to be measured in hours rather than days, while many companies still take months. His closing recommendation is for CISOs and CIOs to examine how long it really takes to remediate critical issues and ask whether their current efforts, processes, and technologies can reduce that time to one or two hours.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article presents a Security Strategist podcast conversation between Richard Stiennon, Chief Research Analyst and founder of IT-Harvest, and Rob Gurzeev, CEO of CyCognito. The topic is external attack surface management and why it remains difficult for organizations to understand and manage their internet-facing exposure.\u003c/p\u003e\n\n\u003cp\u003eGurzeev’s central argument is that many organizations believe they understand their security posture because they run penetration tests, invest in tools, and build teams, but breaches can still occur through assets that no one knew existed. He says this gap is what CyCognito was built to close.\u003c/p\u003e\n\n\u003ch2 id=\"background-and-perspective\"\u003eBackground and Perspective\u003c/h2\u003e\n\n\u003cp\u003eGurzeev says he did not choose attack surface management so much as it “chose” him. He describes growing up around IRCs and prank-style exploitation among peers, which he characterizes as an early form of penetration-testing experience.\u003c/p\u003e\n\n\u003cp\u003eHe later joined an intelligence agency at age 18, where he worked on what cybersecurity now calls attack surface management. In that context, he focused on finding the path of least resistance into systems to acquire relevant intelligence. He describes the work as fascinating and like puzzle solving, but also stressful because real lives were on the line.\u003c/p\u003e\n\n\u003cp\u003eThis background shaped his view of the difference between attacker and defender perspectives. He says much of the cybersecurity industry has built layers of defense based on deploying tools and knowing where assets are. By contrast, he says his training emphasized that defenders do not always know reality and must look for the path of least resistance.\u003c/p\u003e\n\n\u003ch2 id=\"why-organizations-still-miss-external-assets\"\u003eWhy Organizations Still Miss External Assets\u003c/h2\u003e\n\n\u003cp\u003eGurzeev argues that organizations often focus on known assets and established KPIs rather than asking where their security posture is most likely to fail. He says security and IT teams may not be rewarded for telling boards that existing processes or technologies cover only a small part of the real environment.\u003c/p\u003e\n\n\u003cp\u003eHe gives the example of an organization spending $2 million on manual penetration testing while only testing 1 percent of its internet-facing applications. He says a security leader may not be rewarded for telling a mostly non-technical board that 99 percent of those applications were not tested.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this as an organizational and technical problem. Gurzeev says that attacker-oriented work focuses on the path of least resistance, while defenders are often focused on building systems, completing projects, and meeting KPIs.\u003c/p\u003e\n\n\u003ch2 id=\"growth-of-the-modern-attack-surface\"\u003eGrowth of the Modern Attack Surface\u003c/h2\u003e\n\n\u003cp\u003eGurzeev says the complexity of enterprise attack surfaces has grown significantly. He contrasts the environment 20 years ago, when Apple and Google each had one main website or one internet-connected thing, with modern large companies that may have between 100,000 applications, devices, and cloud assets exposed to the internet.\u003c/p\u003e\n\n\u003cp\u003eHe says CyCognito’s largest customer has 100 million internet-connected items that external attackers can interact with. He notes that manual penetration testing may cover 100, 500, or perhaps 1,000 web applications, leaving open the question of what happens to the rest.\u003c/p\u003e\n\n\u003cp\u003eHe attributes part of the growth to the increased ease of building applications and changing network configurations. Twenty years ago, he says, one person in a company might have had the authority to make major network changes. Now, he says, people in departments such as HR and finance can use tools like Claude Code or Lovable to assemble sensitive information, build applications, and expose them to the internet either intentionally or accidentally.\u003c/p\u003e\n\n\u003ch2 id=\"external-attack-surface-management-versus-vulnerability-management\"\u003eExternal Attack Surface Management Versus Vulnerability Management\u003c/h2\u003e\n\n\u003cp\u003eThe article distinguishes between vulnerability management and external attack surface management while noting that they are adjacent. Gurzeev says vulnerability scanning and management focus on mapping potential vulnerabilities. Attack surface management, in his description, focuses on mapping, classifying, and understanding what an organization has.\u003c/p\u003e\n\n\u003cp\u003eHe says the internal and external views are significantly different. For internal attack surface management, he says teams can use integrations with sources such as ServiceNow, endpoint protection tools, and AWS instances, with deduplication and presentation being major challenges. In that case, he says, the data is there.\u003c/p\u003e\n\n\u003cp\u003eExternal attack surface management is described as much harder because no one knows the full reality. Gurzeev gives examples such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA third party building a marketing campaign application with the company’s logo and customers’ PII.\u003c/li\u003e\n\u003cli\u003eA company having 100 subsidiaries, each with its own technology stack.\u003c/li\u003e\n\u003cli\u003eSubsidiaries that may not cooperate with the global security team.\u003c/li\u003e\n\u003cli\u003eA joint venture in China or an engineer somewhere creating assets outside central visibility.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHe says that between 10 and 50 percent of applications, devices, and cloud assets may not be known by any technology or database when CyCognito begins working with an organization. He emphasizes that only one unknown or undermanaged asset is needed to enable a breach.\u003c/p\u003e\n\n\u003ch2 id=\"recall-precision-and-blind-spots\"\u003eRecall, Precision, and Blind Spots\u003c/h2\u003e\n\n\u003cp\u003eGurzeev uses recall and precision to explain the difficulty of external attack surface management. Recall refers to how much of the real asset base is found. Precision refers to how accurate the attribution is.\u003c/p\u003e\n\n\u003cp\u003eHe explains that finding 99 of 100 assets gives 99 percent recall, but claiming one million assets are owned by the organization when only 100 are truly owned would create poor precision. He says balancing recall and precision is very hard.\u003c/p\u003e\n\n\u003cp\u003eHe criticizes what he calls the “lazy approach” used by many vendors and technologies: asking teams what they already know about their attack surface and then finding adjacent assets. He acknowledges that this has value, but says the greatest risk lies in complete blind spots that no one knows about.\u003c/p\u003e\n\n\u003ch2 id=\"ai-and-the-changing-remediation-timeline\"\u003eAI and the Changing Remediation Timeline\u003c/h2\u003e\n\n\u003cp\u003eThe article says AI is reshaping attack surface discovery, exposure management, and remediation expectations. Gurzeev says there is now consensus that AI changes the conversation on mean time to remediation, which needs to be measured in hours rather than days.\u003c/p\u003e\n\n\u003cp\u003eHe says many companies still take months to remediate even critical issues. He also says that even a person who is not highly technical can now exploit applications and complex systems within minutes.\u003c/p\u003e\n\n\u003cp\u003eThis makes it more important, in his view, for organizations to know what is exposed and to quickly determine where relevant assets are when a new emerging threat appears. He says he hears from customers multiple times per week about code-red emerging threats.\u003c/p\u003e\n\n\u003cp\u003eGurzeev also says CyCognito is spending time expanding deterministic security testing capabilities into AI-enabled creative testing at scale. He describes deep testing of one asset at a time as almost a solved problem with AI, while continuously testing all assets within budget remains the next major problem to solve.\u003c/p\u003e\n\n\u003ch2 id=\"main-recommendation-for-security-leaders\"\u003eMain Recommendation for Security Leaders\u003c/h2\u003e\n\n\u003cp\u003eGurzeev’s closing advice to CISOs and CIOs is to examine mean time to remediation for whatever their organization defines as critical issues. He asks leaders to be honest about whether remediation occurs within a couple of hours, a few days, or a few weeks.\u003c/p\u003e\n\n\u003cp\u003eHe then recommends asking whether current efforts, processes, and technologies can reduce remediation time to one or two hours. If not, he suggests organizations should consider whether they need a different approach.\u003c/p\u003e\n\n\u003ch2 id=\"key-parties-mentioned\"\u003eKey Parties Mentioned\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRob Gurzeev:\u003c/strong\u003e CEO of CyCognito and the primary speaker discussing external attack surface management.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRichard Stiennon:\u003c/strong\u003e Chief Research Analyst and founder of IT-Harvest, and host of the Security Strategist podcast episode.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCyCognito:\u003c/strong\u003e The company described as being built to close the gap around unknown external assets.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eIT-Harvest:\u003c/strong\u003e Stiennon’s organization.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEM360Tech:\u003c/strong\u003e Mentioned in connection with the podcast’s social presence.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eServiceNow, AWS, Claude Code, and Lovable:\u003c/strong\u003e Mentioned as examples of platforms or tools in the discussion of asset data, cloud instances, and application creation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eApple and Google:\u003c/strong\u003e Mentioned as examples in the contrast between earlier, simpler internet presences and modern complex attack surfaces.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that external exposure risk often lives outside the assets security teams already know about. Gurzeev argues that traditional penetration testing and vulnerability management do not fully solve this problem because unknown internet-facing assets, third-party applications, subsidiaries, and fast-moving application creation can create unmanaged exposure.\u003c/p\u003e\n\n\u003cp\u003eThe article presents mean time to remediation as the practical metric that matters most. In the context of AI-enabled exploitation and rapidly emerging threats, Gurzeev says organizations should aim to reduce remediation of critical issues to one or two hours.\u003c/p\u003e\n","keyPoints":["Rob Gurzeev says the greatest external attack surface risk often comes from complete blind spots, such as assets that no one in the organization knows exist.","Gurzeev distinguishes vulnerability management as mapping potential vulnerabilities from external attack surface management, which maps, classifies, and understands internet-facing assets from an outside perspective.","The article states that large organizations can have between 100,000 applications, devices, and cloud assets exposed to the internet, while CyCognito’s largest customer has 100 million internet-connected assets.","Gurzeev says AI is accelerating the need for organizations to reduce mean time to remediation for critical issues from days or months to hours.","Gurzeev recommends that CISOs and CIOs assess whether their current processes and technologies can reduce critical-issue remediation time to one or two hours."],"insights":["Gurzeev frames recall and precision as critical measures for external attack surface management, because finding nearly all assets is not enough if the results are polluted with large volumes of incorrectly attributed assets.","The article highlights a governance gap in which third-party marketing campaigns, subsidiaries, and joint ventures can create de facto company applications containing logos or customer PII while remaining outside the direct control of central security teams.","Gurzeev suggests that organizational incentives can suppress attack surface visibility problems, because security leaders may not be rewarded for telling boards that existing processes such as penetration testing cover only a small fraction of internet-facing applications.","The article identifies non-technical business users building internet-exposed applications with tools such as Claude Code or Lovable as a newer source of unmanaged attack surface complexity."],"referencedReports":[],"body":"\u003cp\u003eThe article presents a Security Strategist podcast conversation between Richard Stiennon of IT-Harvest and Rob Gurzeev, CEO of CyCognito, about external attack surface management. Gurzeev argues that many organizations believe they understand their security posture because they run penetration tests, buy tools, and build security teams. He says breaches can still occur through assets that no one knew existed, which is the gap CyCognito was built to address.\u003c/p\u003e\n\n\u003cp\u003eA central point is that external attack surface management differs from vulnerability management because it focuses on discovering, classifying, and understanding internet-facing assets from an attacker’s perspective. Gurzeev says the highest risk often lies in blind spots, including assets created by subsidiaries, third parties, joint ventures, or business users outside central security control. He describes recall and precision as important measures because teams must find as much of the real attack surface as possible without flooding themselves with wrongly attributed assets.\u003c/p\u003e\n\n\u003cp\u003eThe article also emphasizes that AI is accelerating both the attack surface problem and the need for faster remediation. Gurzeev says AI can help less technical people exploit applications and complex systems within minutes, making mean time to remediation a critical metric. His main recommendation for CISOs and CIOs is to honestly assess whether critical issues are remediated in hours, days, weeks, or months, and whether current processes can reduce that time to one or two hours.\u003c/p\u003e\n"}]</script>
