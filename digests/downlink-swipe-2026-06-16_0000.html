<script>
window.__DL_ARTICLES = [{"n":3,"title":"New Rokarolla Android malware targets 217 banking, crypto apps","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-rokarolla-android-malware-targets-217-banking-crypto-apps/","time":"20:04","priority":"MUST READ","score":96,"tldr":"A new Android banking trojan called Rokarolla is spreading through fake Chrome and TikTok downloads and targets 217 banking and crypto apps with phishing overlays and device-control features. Users should avoid sideloading APKs and be especially cautious about granting Accessibility permissions.","briefOverview":"\u003cp\u003eA new Android banking trojan named Rokarolla is targeting 217 banking and cryptocurrency applications. Zimperium reports that the malware uses an extensive set of 137 commands and can take near-complete administrative control of a compromised device. Its primary objective appears to be stealing financial information.\u003c/p\u003e\n\n\u003cp\u003eRokarolla is distributed through malicious websites that pretend to offer Google Chrome or TikTok. During installation, the malicious app acts as a dropper and impersonates Google Play Protect, then requests Accessibility service permissions along with access to notifications, SMS, and calls. Zimperium did not find the malware on Google Play.\u003c/p\u003e\n\n\u003cp\u003eThe malware checks infected devices for targeted apps and downloads matching phishing payloads. When a victim opens a targeted app, Rokarolla displays fake login overlays to steal credentials, credit card information, and other financial data. It also uses overlays to capture lock-screen PINs or patterns, hide malicious activity, and block user interaction.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA new Android banking trojan called Rokarolla is targeting 217 banking and cryptocurrency applications. According to Zimperium, the malware uses 137 commands and can take complete administrative control of a compromised device. The article says its primary objective appears to be financial information theft.\u003c/p\u003e\n\n\u003cp\u003eRokarolla is distributed from malicious websites that claim to provide Google Chrome or TikTok. During installation, the malicious app acts as a dropper and impersonates Google Play Protect, Android’s built-in anti-malware system. It offers users the option to install Chrome or TikTok, which include the Rokarolla malware.\u003c/p\u003e\n\n\u003cp\u003eWhen launched, Rokarolla requests Accessibility service permissions and access to notifications, SMS, and calls. It begins communication with its command-and-control server by sending a basic device profile, including the phone model, Android version, locale, display characteristics, battery level, storage capacity, and available RAM. Zimperium says this information is used to generate a unique identifier for each victim in the campaign.\u003c/p\u003e\n\n\u003cp\u003eThe malware checks infected devices against a list of 217 targeted applications and downloads the phishing payload corresponding to any matching apps. When the victim opens a targeted app, Rokarolla displays a fake login overlay to steal login credentials, credit card information, and other financial data. The article does not name a specific threat actor operating the malware.\u003c/p\u003e\n\n\u003cp\u003eRokarolla also uses overlays to capture lock-screen PINs or patterns and operate the device while it is locked. Additional evasion and control tactics include disabling Google Play Protect, hiding the application icon, silencing audio and vibration, and keeping the screen awake indefinitely. Zimperium did not find the malware on Google Play and recommends avoiding APK files outside Google Play unless the publisher is explicitly trusted.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA new Android banking trojan named Rokarolla is targeting 217 banking and cryptocurrency applications. Zimperium reports that the malware uses an extensive command set of 137 commands. The article says Rokarolla can take complete administrative control of a compromised Android device.\u003c/p\u003e\n\n\u003cp\u003eThe malware’s primary objective appears to be stealing financial information. Its capabilities include stealing lock screen credentials, contact lists, and SMS data, as well as using keyloggers to continuously record user input. The article does not identify a specific threat actor behind the campaign.\u003c/p\u003e\n\n\u003ch2 id=\"distribution-and-installation\"\u003eDistribution and Installation\u003c/h2\u003e\n\n\u003cp\u003eRokarolla is distributed through malicious websites that purport to provide the Google Chrome or TikTok app. During the installation process, the malicious app acts as a dropper. It impersonates Google Play Protect, Android’s built-in anti-malware system.\u003c/p\u003e\n\n\u003cp\u003eThe fake installation flow offers users the option to install Chrome or TikTok. Those installations include the Rokarolla malware. Zimperium did not find the malware on Google Play, the official Android app repository.\u003c/p\u003e\n\n\u003ch2 id=\"permissions-requested\"\u003ePermissions Requested\u003c/h2\u003e\n\n\u003cp\u003eWhen launched on a device, Rokarolla requests several sensitive permissions. According to Zimperium, these include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAccessibility service permissions\u003c/li\u003e\n\u003cli\u003eAccess to notifications\u003c/li\u003e\n\u003cli\u003eAccess to SMS\u003c/li\u003e\n\u003cli\u003eAccess to calls\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article highlights Accessibility permissions as particularly important because they can be abused to bypass standard Android security protections. These permissions can also provide elevated capabilities to interact with the user interface or approve system prompts.\u003c/p\u003e\n\n\u003ch2 id=\"command-and-control-communication\"\u003eCommand-and-Control Communication\u003c/h2\u003e\n\n\u003cp\u003eRokarolla begins communication with its command-and-control server by sending a basic device profile. The profile includes details such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePhone model\u003c/li\u003e\n\u003cli\u003eInstalled Android version\u003c/li\u003e\n\u003cli\u003eLocale\u003c/li\u003e\n\u003cli\u003eDisplay characteristics\u003c/li\u003e\n\u003cli\u003eBattery level\u003c/li\u003e\n\u003cli\u003eStorage capacity\u003c/li\u003e\n\u003cli\u003eAvailable RAM\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eZimperium says this information is used to generate a unique identifier for each victim in the Rokarolla campaign.\u003c/p\u003e\n\n\u003ch2 id=\"targeting-and-financial-data-theft\"\u003eTargeting and Financial Data Theft\u003c/h2\u003e\n\n\u003cp\u003eZimperium says Rokarolla’s primary objective appears to be financial information theft. To carry this out, the malware checks the infected device against a list of 217 targeted applications. It then downloads the phishing payload corresponding to any matching applications.\u003c/p\u003e\n\n\u003cp\u003eWhen the victim opens an application on the target list, Rokarolla displays a fake login overlay. These overlays are used to steal login credentials, credit card information, and other financial data. The targeted applications include banking and cryptocurrency apps.\u003c/p\u003e\n\n\u003ch2 id=\"overlay-abuse-beyond-credential-theft\"\u003eOverlay Abuse Beyond Credential Theft\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that Rokarolla’s use of overlays extends beyond stealing financial data. The malware uses overlays to capture lock-screen PINs or patterns. This allows it to operate the device even when it is locked.\u003c/p\u003e\n\n\u003cp\u003eRokarolla also uses overlays to hide malicious activity and block user interaction. It can display fake installation screens when needed. These overlay capabilities are part of how the malware maintains control over the compromised device.\u003c/p\u003e\n\n\u003ch2 id=\"additional-capabilities-and-evasion-tactics\"\u003eAdditional Capabilities and Evasion Tactics\u003c/h2\u003e\n\n\u003cp\u003eZimperium created a GitHub repository listing all 137 commands available to Rokarolla. The article highlights several data-theft and control commands, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eStealing SMS messages\u003c/li\u003e\n\u003cli\u003eExtracting contact information and WhatsApp contacts\u003c/li\u003e\n\u003cli\u003eCapturing keystrokes\u003c/li\u003e\n\u003cli\u003eRecording on-screen content through UI logging\u003c/li\u003e\n\u003cli\u003eCopying and manipulating clipboard contents\u003c/li\u003e\n\u003cli\u003eBlocking incoming calls and bank fraud alerts\u003c/li\u003e\n\u003cli\u003ePeriodically taking screenshots and uploading them with timestamps\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe malware also uses several evasion or control techniques. These include disabling Google Play Protect, hiding the application icon from the app drawer, silencing audio and vibration, and keeping the screen awake indefinitely.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe combination of Rokarolla’s capabilities gives its operators near-complete administrative control over an infected Android device. The article says this enables advanced financial fraud. The malware can steal credentials, financial details, SMS data, contact information, WhatsApp contacts, keystrokes, clipboard contents, screenshots, and lock-screen credentials.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-guidance-mentioned-in-the-article\"\u003eDefensive Guidance Mentioned in the Article\u003c/h2\u003e\n\n\u003cp\u003eZimperium did not find Rokarolla on Google Play. Users are advised to avoid downloading APK files outside Google Play unless they explicitly trust the publisher.\u003c/p\u003e\n\n\u003cp\u003eThe article also advises users to exercise caution when granting Accessibility permissions. These permissions can be abused by Android malware to bypass standard protections, interact with the user interface, and approve system prompts.\u003c/p\u003e\n","keyPoints":["A new Android banking trojan named Rokarolla targets 217 banking and cryptocurrency applications using 137 commands.","Rokarolla is distributed through malicious websites that pretend to offer Google Chrome or TikTok and impersonates Google Play Protect during installation.","The malware requests Accessibility service permissions and access to notifications, SMS, and calls when launched on an infected device.","Rokarolla uses fake login overlays to steal credentials, credit card information, lock-screen PINs or patterns, and other financial data.","Zimperium did not find Rokarolla on Google Play and recommends avoiding APK downloads outside Google Play unless the publisher is explicitly trusted."],"insights":["Rokarolla’s abuse of Accessibility permissions is especially dangerous because it can use those privileges to approve system prompts and bypass standard Android security protections.","The malware’s overlay capability is used not only for credential theft but also to capture lock-screen PINs or patterns, hide malicious activity, and block user interaction with fake installation screens.","Rokarolla profiles each infected device and uses that information to generate a unique victim identifier before selecting phishing payloads for matching installed apps.","The absence of Rokarolla from Google Play makes sideloaded APKs from fake Chrome or TikTok sites the primary exposure path described in the article."],"referencedReports":[{"title":"Rokarolla Commands","url":"http://github.com/Zimperium/IOC/blob/master/2026-06-Rokarolla/commands.md","publisher":"Zimperium","context":"The article says Zimperium created a GitHub repository listing all 137 commands available to the Rokarolla Android malware.","category":"","primary":false}],"body":"\u003cp\u003eA new Android banking trojan named Rokarolla is targeting 217 banking and cryptocurrency applications. Zimperium reports that the malware uses an extensive set of 137 commands and can take near-complete administrative control of a compromised device. Its primary objective appears to be stealing financial information.\u003c/p\u003e\n\n\u003cp\u003eRokarolla is distributed through malicious websites that pretend to offer Google Chrome or TikTok. During installation, the malicious app acts as a dropper and impersonates Google Play Protect, then requests Accessibility service permissions along with access to notifications, SMS, and calls. Zimperium did not find the malware on Google Play.\u003c/p\u003e\n\n\u003cp\u003eThe malware checks infected devices for targeted apps and downloads matching phishing payloads. When a victim opens a targeted app, Rokarolla displays fake login overlays to steal credentials, credit card information, and other financial data. It also uses overlays to capture lock-screen PINs or patterns, hide malicious activity, and block user interaction.\u003c/p\u003e\n"},{"n":6,"title":"CISA warns of another cPanel plugin flaw exploited in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-warns-of-another-actively-exploited-cpanel-plugin-flaw/","time":"10:47","priority":"MUST READ","score":94,"tldr":"CISA ordered U.S. federal agencies to patch an actively exploited LiteSpeed cPanel plugin flaw within three days, warning it can let attackers with FTP or web shell access gain root privileges on affected shared hosting servers.","briefOverview":"\u003cp\u003eCISA has ordered U.S. Federal Civilian Executive Branch agencies to secure their servers within three days against an actively exploited vulnerability in the LiteSpeed cPanel user-end plugin. The article identifies the issue as CVE-2026-48172 and also links to CVE-2026-54420 in its opening description. CISA added the vulnerability to its Known Exploited Vulnerabilities Catalog, triggering remediation requirements under Binding Operational Directive 26-04.\u003c/p\u003e\n\n\u003cp\u003eThe flaw affects all LiteSpeed cPanel user-end plugin versions before 2.4.8 and stems from a UNIX symlink following weakness. According to the article, attackers with FTP or web shell access can escalate privileges to root on shared hosting servers running CloudLinux/CageFS. LiteSpeed flagged the vulnerability as actively exploited in early June and released urgent security updates.\u003c/p\u003e\n\n\u003cp\u003eLiteSpeed advised users to update the bundled cPanel user-end plugin and provided a command to check logs for possible exploitation. The company said any output from the command may indicate exploitation and recommended examining system logs for actions taken by detected IP addresses. CISA warned that this type of flaw is a frequent attack vector and told agencies to follow BOD 26-04 guidance or discontinue use if mitigations are unavailable.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA has warned U.S. government agencies about an actively exploited vulnerability in the LiteSpeed cPanel user-end plugin and ordered Federal Civilian Executive Branch agencies to secure affected systems within three days. The article describes the vulnerability as CVE-2026-48172 while also linking to CVE-2026-54420 in the opening sentence. CISA added the flaw to its Known Exploited Vulnerabilities Catalog, which requires federal agencies to act under Binding Operational Directive 26-04.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was reported by Namecheap and affects all user-end plugin versions before 2.4.8. It stems from a UNIX symlink following weakness and affects shared hosting servers running CloudLinux/CageFS. The article says attackers with FTP or web shell access can exploit the issue to escalate privileges to root.\u003c/p\u003e\n\n\u003cp\u003eLiteSpeed flagged the vulnerability as actively exploited in early June and released urgent security updates. The company warned users to update the cPanel user-end plugin, which is bundled with the WHM plugin, to the latest version. LiteSpeed also provided a grep command that administrators can use to search cPanel and related logs for signs of possible exploitation.\u003c/p\u003e\n\n\u003cp\u003eAccording to LiteSpeed, if the log-checking command returns output, the vulnerability may have been exploited on the server. The company advised administrators to examine system logs for actions taken by detected IP addresses to determine any damage. No specific threat actor or campaign name is identified in the article.\u003c/p\u003e\n\n\u003cp\u003eCISA said agencies should evaluate internet exposure, exploit automation potential, KEV catalog inclusion, and whether exploitation grants partial or total control when assessing risk under BOD 26-04. The agency warned that this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise. CISA also said agencies should follow applicable cloud guidance or discontinue use of the product if mitigations are unavailable.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA has directed U.S. Federal Civilian Executive Branch agencies to secure systems against an actively exploited vulnerability in the LiteSpeed cPanel user-end plugin within three days. The article describes the flaw as CVE-2026-48172 and also links to CVE-2026-54420 in the opening sentence. CISA added the vulnerability to its Known Exploited Vulnerabilities Catalog, making it subject to remediation requirements under Binding Operational Directive 26-04.\u003c/p\u003e\n\n\u003cp\u003eThe warning concerns shared hosting servers running CloudLinux/CageFS and affected LiteSpeed cPanel user-end plugin versions before 2.4.8. LiteSpeed flagged the vulnerability as actively exploited in early June and released urgent security updates. Users were advised to update the cPanel user-end plugin, which is bundled with the WHM plugin, to the latest version.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability was reported by Namecheap and is described as a high-severity issue. It stems from a UNIX symlink following weakness. According to the article, attackers with FTP or web shell access can use it to escalate privileges to root on shared hosting servers running CloudLinux/CageFS.\u003c/p\u003e\n\n\u003cp\u003eThe affected product is the LiteSpeed cPanel user-end plugin. All versions before 2.4.8 are described as vulnerable. The article emphasizes that the flaw poses a risk to all user-end plugin versions prior to 2.4.8.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-and-detection-guidance\"\u003eExploitation and Detection Guidance\u003c/h2\u003e\n\n\u003cp\u003eLiteSpeed said the vulnerability is being actively exploited. The company provided a command for administrators to check whether a server may have been exploited:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-bash\"\u003egrep -rE 'cpanel_jsonapi_func=(generateEcCert|packageUserSize)|cert_action_entry .*geneccert' /usr/local/cpanel/logs/ /var/cpanel/logs/ 2\u0026gt;/dev/null\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eLiteSpeed said that if this command produces any output, the vulnerability may have been exploited on the server. It advised administrators to examine system logs for any actions taken by the detected IP addresses in order to determine damage.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-response\"\u003eCISA Response\u003c/h2\u003e\n\n\u003cp\u003eCISA added the vulnerability to its Known Exploited Vulnerabilities Catalog on Monday. The agency ordered Federal Civilian Executive Branch agencies to secure their systems within three days. The requirement is tied to Binding Operational Directive 26-04.\u003c/p\u003e\n\n\u003cp\u003eThe article states that BOD 26-04 was issued the previous Wednesday and revoked older BODs 19-02 and 22-01. It requires U.S. federal agencies to prioritize patching based on exploitation risk.\u003c/p\u003e\n\n\u003cp\u003eCISA said agencies should consider several risk factors when assessing affected assets, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhether the flaw is included in CISA\u0026rsquo;s Known Exploited Vulnerabilities Catalog.\u003c/li\u003e\n\u003cli\u003eWhether the asset is publicly exposed online.\u003c/li\u003e\n\u003cli\u003eWhether exploitation can be automated for large-scale attacks.\u003c/li\u003e\n\u003cli\u003eWhether successful exploitation gives attackers partial or total control of the targeted system.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCISA also warned that this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise. The agency told stakeholders to follow applicable BOD 26-04 guidance for cloud services or discontinue use of the product if mitigations are unavailable.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-stakeholders\"\u003eAffected Parties and Stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several stakeholders in the event. CISA is the government agency issuing the federal directive and adding the issue to the Known Exploited Vulnerabilities Catalog. Federal Civilian Executive Branch agencies are required to secure affected systems within three days.\u003c/p\u003e\n\n\u003cp\u003eLiteSpeed is the vendor that flagged the vulnerability as actively exploited and released urgent security updates. Namecheap reported the vulnerability. The affected technical environments include cPanel user-end plugin deployments on shared hosting servers running CloudLinux/CageFS.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actors-and-impact\"\u003eThreat Actors and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article does not name a specific threat actor, group, or campaign exploiting the flaw. It describes the activity only as active exploitation by attackers or malicious cyber actors. The disclosed impact is privilege escalation to root for attackers who already have FTP or web shell access on affected shared hosting servers.\u003c/p\u003e\n\n\u003ch2 id=\"related-context-in-the-article\"\u003eRelated Context in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that CISA warned federal agencies last month to patch another LiteSpeed cPanel vulnerability that unauthenticated attackers exploited to execute arbitrary scripts with root privileges. It identifies that previous vulnerability as CVE-2026-48172 in the related sentence. The article frames the latest action as another CISA warning involving actively exploited cPanel plugin flaws and short federal remediation deadlines.\u003c/p\u003e\n","keyPoints":["CISA ordered Federal Civilian Executive Branch agencies to secure systems within three days against an actively exploited LiteSpeed cPanel user-end plugin vulnerability.","The vulnerability, tracked as CVE-2026-48172, allows attackers with FTP or web shell access to escalate privileges to root on shared hosting servers running CloudLinux/CageFS.","LiteSpeed said the flaw affects all user-end plugin versions before 2.4.8 and stems from a UNIX symlink following weakness.","LiteSpeed released urgent security updates in early June and advised users to update the cPanel user-end plugin to the latest version.","CISA added the vulnerability to its Known Exploited Vulnerabilities Catalog and said agencies must follow BOD 26-04 guidance or discontinue use of the product if mitigations are unavailable."],"insights":["Administrators can perform an immediate compromise check by searching cPanel and CageFS-related logs for the specific generateEcCert and packageUserSize API patterns provided by LiteSpeed.","The flaw is especially impactful in shared hosting environments because attackers who already have limited FTP or web shell access can escalate to root on servers running CloudLinux/CageFS.","CISA’s three-day deadline reflects the newer BOD 26-04 risk-based patching model, which considers KEV inclusion, internet exposure, exploit automation potential, and attacker control after exploitation.","CISA’s guidance explicitly says agencies should discontinue use of the product if mitigations are unavailable, making removal an acceptable response when patching cannot be completed."],"referencedReports":[{"title":"Security Update for LiteSpeed cPanel Plugin","url":"https://blog.litespeedtech.com/2026/06/01/security-update-for-litespeed-cpanel-plugin-2/","publisher":"LiteSpeed Technologies","context":"The article says LiteSpeed released urgent security updates and warned users to update the cPanel user-end plugin to the latest version.","category":"","primary":false},{"title":"CISA Adds Two Known Exploited Vulnerabilities to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/15/cisa-adds-two-known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"The article cites CISA's alert adding the LiteSpeed cPanel plugin flaw to its Known Exploited Vulnerabilities Catalog and requiring federal agencies to secure affected systems.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?field_cve=CVE-2026-48172","publisher":"CISA","context":"The article references CISA's KEV catalog entry for CVE-2026-48172 as the basis for federal remediation requirements.","category":"","primary":false}],"body":"\u003cp\u003eCISA has ordered U.S. Federal Civilian Executive Branch agencies to secure their servers within three days against an actively exploited vulnerability in the LiteSpeed cPanel user-end plugin. The article identifies the issue as CVE-2026-48172 and also links to CVE-2026-54420 in its opening description. CISA added the vulnerability to its Known Exploited Vulnerabilities Catalog, triggering remediation requirements under Binding Operational Directive 26-04.\u003c/p\u003e\n\n\u003cp\u003eThe flaw affects all LiteSpeed cPanel user-end plugin versions before 2.4.8 and stems from a UNIX symlink following weakness. According to the article, attackers with FTP or web shell access can escalate privileges to root on shared hosting servers running CloudLinux/CageFS. LiteSpeed flagged the vulnerability as actively exploited in early June and released urgent security updates.\u003c/p\u003e\n\n\u003cp\u003eLiteSpeed advised users to update the bundled cPanel user-end plugin and provided a command to check logs for possible exploitation. The company said any output from the command may indicate exploitation and recommended examining system logs for actions taken by detected IP addresses. CISA warned that this type of flaw is a frequent attack vector and told agencies to follow BOD 26-04 guidance or discontinue use if mitigations are unavailable.\u003c/p\u003e\n"},{"n":7,"title":"Ransomware gang abuses Microsoft Teams relays to hide malicious traffic","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/ransomware-gang-abuses-microsoft-teams-relays-to-hide-malicious-traffic/","time":"10:18","priority":"MUST READ","score":94,"tldr":"DragonForce ransomware deployed a Go-based backdoor called Backdoor.Turn that hides command-and-control traffic by abusing Microsoft Teams TURN relay infrastructure. Symantec says this is the first known real-world malware use of the technique, seen in a sophisticated attack on a major U.S. services company.","briefOverview":"\u003cp\u003eDragonForce ransomware used a custom Go-based malware named Backdoor.Turn to hide command-and-control traffic inside Microsoft Teams relay infrastructure. The backdoor abuses the Traversal Using Relays around NAT protocol used by Microsoft Teams when a direct client connection is unavailable. Symantec says this is the first known in-the-wild malware to abuse Microsoft Teams TURN relay servers for command-and-control communications.\u003c/p\u003e\n\n\u003cp\u003eSymantec observed the activity in a December 2025 attack against a major U.S. services company. The intrusion likely began with exploitation of an unknown flaw in an SQL or MSSQL server, after which the attackers established persistence, created rogue users, modified firewall rules, and used vulnerable drivers to terminate security tools. The attackers ultimately exfiltrated data, deployed DragonForce ransomware, and encrypted the victim’s systems.\u003c/p\u003e\n\n\u003cp\u003eBackdoor.Turn obtains an anonymous Teams visitor token, uses a legitimate Microsoft TURN relay during connection setup, and then connects to the attacker’s command-and-control server. This causes defenders to see traffic associated with Microsoft Teams infrastructure, allowing the malware to blend into a trusted network. The RAT’s capabilities include command execution, process creation, network scanning, TLS certificate capturing, LDAP/Active Directory searching, website title collection, and browser credential theft.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDragonForce ransomware used a custom malware called Backdoor.Turn to hide command-and-control traffic inside Microsoft Teams relay infrastructure. The malware is Go-based and abuses the Traversal Using Relays around NAT protocol used by Microsoft Teams to relay messages when a direct connection to a client is unavailable. Symantec says Backdoor.Turn is the first known malware observed in the wild abusing Microsoft Teams TURN relay servers to mask command-and-control traffic.\u003c/p\u003e\n\n\u003cp\u003eDragonForce is described as a ransomware operation active since at least 2023. The group has adopted a cartel-style organizational structure and has been linked to the Scattered Spider threat group. Symantec researchers reported the use of Backdoor.Turn in an attack against a major U.S. services company.\u003c/p\u003e\n\n\u003cp\u003eThe attack was observed in December 2025 and likely began with exploitation of an unknown flaw in an SQL or MSSQL server. After gaining a foothold, the attackers downloaded a ZIP archive containing a legitimate VirtualBox/DbgView executable and a malicious DLL used for sideloading. They then strengthened persistence, created rogue users, abused the Windows LimitBlankPassword security policy, and modified firewall rules.\u003c/p\u003e\n\n\u003cp\u003eThe attackers used Bring Your Own Vulnerable Driver techniques with multiple drivers to obtain kernel-level privileges and terminate security tools. The drivers included Huawei’s HWAuidoOs2Ec.sys, Topaz Antifraud wsftprm.sys tied to CVE-2023-52271, Tower of Fantasy GameDriverx64.sys tied to CVE-2025-61155, and K7 Security K7RKScan.sys tied to CVE-2025-1055. They also used ABYSSWORKER, a custom malicious driver masquerading as a legitimate Palo Alto driver.\u003c/p\u003e\n\n\u003cp\u003eBackdoor.Turn was injected into DbgView64.exe after ransomware deployment, which Symantec said suggests it might have been intended for persistence or future access. The malware obtains an anonymous Teams visitor token, uses a legitimate Microsoft TURN relay server during setup, and establishes communication with the attacker’s command-and-control server. Its capabilities include command execution, process creation, network scanning, TLS certificate capturing, LDAP/Active Directory searching, website title collection, and browser credential theft.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that the technique resembles the 2025 Ghost Calls concept, which showed how temporary TURN credentials for Teams and Zoom could be hijacked to create stealthy communication tunnels through trusted conferencing infrastructure. In this incident, DragonForce exfiltrated all data, deployed ransomware, and encrypted the victim’s systems. Symantec published indicators of compromise to help defenders catch and block such attacks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eDragonForce ransomware used a custom Go-based remote access trojan called Backdoor.Turn to hide command-and-control traffic inside Microsoft Teams relay infrastructure. The malware abuses the Traversal Using Relays around NAT protocol used by Microsoft Teams to distribute messages when a direct connection to a client is unavailable, such as when clients are on a private network.\u003c/p\u003e\n\n\u003cp\u003eAccording to Symantec, Backdoor.Turn is the first known malware observed in the wild to abuse Microsoft Teams TURN relay servers for command-and-control communications. By using Microsoft Teams relay infrastructure, the malware causes defenders to see traffic associated with Microsoft Teams, allowing malicious communications to blend into a trusted network.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-context\"\u003eThreat actor context\u003c/h2\u003e\n\n\u003cp\u003eDragonForce is described as a ransomware operation active since at least 2023. The group has adopted a cartel-style organizational structure and has been linked to the Scattered Spider threat group.\u003c/p\u003e\n\n\u003cp\u003eSymantec observed the use of Backdoor.Turn in an attack against a major U.S. services company. The researchers characterized the campaign as using exceptionally sophisticated cyber tradecraft.\u003c/p\u003e\n\n\u003ch2 id=\"abuse-of-microsoft-teams-turn-relays\"\u003eAbuse of Microsoft Teams TURN relays\u003c/h2\u003e\n\n\u003cp\u003eBackdoor.Turn abuses Microsoft Teams TURN infrastructure by obtaining an anonymous Teams visitor token. During connection setup, it uses a legitimate Microsoft TURN relay server and then connects to the attacker’s command-and-control server.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that this behavior makes the traffic appear associated with Microsoft Teams infrastructure. As a result, the malware can hide its communications within a trusted network.\u003c/p\u003e\n\n\u003cp\u003eThe article also references a 2025 technique called Ghost Calls, developed by Praetorian, which demonstrated that temporary TURN credentials for Teams and Zoom could be hijacked to create stealthy communication tunnels through trusted conferencing infrastructure. While Ghost Calls demonstrated the concept, Symantec says Backdoor.Turn is the first known real-world malware to use Microsoft Teams TURN relays for command-and-control traffic.\u003c/p\u003e\n\n\u003ch2 id=\"attack-timeline-and-initial-access\"\u003eAttack timeline and initial access\u003c/h2\u003e\n\n\u003cp\u003eThe attack was observed in December 2025. Symantec says it likely began with exploitation of an unknown flaw in an SQL or MSSQL server.\u003c/p\u003e\n\n\u003cp\u003eAfter establishing a foothold, the attacker downloaded a ZIP archive. The archive contained a legitimate VirtualBox/DbgView executable and a malicious DLL file used for sideloading.\u003c/p\u003e\n\n\u003cp\u003eThe attackers then strengthened persistence and access by taking several actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCreating rogue users.\u003c/li\u003e\n\u003cli\u003eAbusing the Windows LimitBlankPassword security policy for easy access.\u003c/li\u003e\n\u003cli\u003eModifying firewall rules.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"defense-evasion-and-vulnerable-drivers\"\u003eDefense evasion and vulnerable drivers\u003c/h2\u003e\n\n\u003cp\u003eThe attackers used Bring Your Own Vulnerable Driver techniques to gain kernel-level privileges and terminate security tools on the host. Symantec highlighted the exploitation of Huawei’s HWAuidoOs2Ec.sys driver, referred to in the article as “Havoc Process Terminator,” for evasion.\u003c/p\u003e\n\n\u003cp\u003eThe article lists multiple drivers used in the attack:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHuawei HWAuidoOs2Ec.sys.\u003c/li\u003e\n\u003cli\u003eTopaz Antifraud wsftprm.sys, associated with CVE-2023-52271.\u003c/li\u003e\n\u003cli\u003eTower of Fantasy GameDriverx64.sys, associated with CVE-2025-61155.\u003c/li\u003e\n\u003cli\u003eK7 Security K7RKScan.sys, associated with CVE-2025-1055.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe attacker also used ABYSSWORKER, described as a custom malicious driver masquerading as a legitimate Palo Alto driver.\u003c/p\u003e\n\n\u003ch2 id=\"backdoor-turn-deployment-and-capabilities\"\u003eBackdoor.Turn deployment and capabilities\u003c/h2\u003e\n\n\u003cp\u003eBackdoor.Turn was injected into DbgView64.exe after the ransomware was deployed. The article states that this suggests the malware might have been intended for persistence or future access.\u003c/p\u003e\n\n\u003cp\u003eThe malware’s capabilities include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCommand execution.\u003c/li\u003e\n\u003cli\u003eProcess creation.\u003c/li\u003e\n\u003cli\u003eNetwork scanning.\u003c/li\u003e\n\u003cli\u003eTLS certificate capturing.\u003c/li\u003e\n\u003cli\u003eLDAP and Active Directory searching.\u003c/li\u003e\n\u003cli\u003eWebsite title collection.\u003c/li\u003e\n\u003cli\u003eBrowser credential theft.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese capabilities allowed the malware to support reconnaissance, command execution, credential theft, and continued access functions within the victim environment.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and response\u003c/h2\u003e\n\n\u003cp\u003eAfter reconnaissance and defense evasion, the attacker exfiltrated all data, deployed DragonForce ransomware, and encrypted the victim’s systems. The victim is described as a major U.S. services company.\u003c/p\u003e\n\n\u003cp\u003eSymantec published a complete list of indicators of compromise to help defenders catch and block attacks involving this activity.\u003c/p\u003e\n","keyPoints":["DragonForce ransomware used a custom Go-based malware named Backdoor.Turn to hide command-and-control traffic inside Microsoft Teams relay infrastructure.","Symantec says Backdoor.Turn is the first known in-the-wild malware to abuse Microsoft Teams TURN relay servers for command-and-control communications.","The December 2025 attack against a major U.S. services company likely began with exploitation of an unknown flaw in an SQL or MSSQL server.","The attackers used BYOVD techniques with multiple vulnerable drivers, including Huawei’s HWAuidoOs2Ec.sys, Topaz Antifraud wsftprm.sys, Tower of Fantasy GameDriverx64.sys, and K7 Security K7RKScan.sys, to gain kernel-level privileges and terminate security tools.","Backdoor.Turn can execute commands, create processes, scan networks, capture TLS certificates, search LDAP/Active Directory, collect website titles, and steal browser credentials."],"insights":["Defenders may misclassify Backdoor.Turn communications as benign because the malware’s traffic appears associated with trusted Microsoft Teams infrastructure.","The attack shows that a technique previously demonstrated as ‘Ghost Calls’ in 2025 has now moved from proof-of-concept into real-world ransomware operations.","DragonForce used several vulnerable drivers from unrelated vendors in the same intrusion, indicating that blocking a single BYOVD driver would not have fully mitigated the attackers’ defense-evasion approach.","Backdoor.Turn was injected after ransomware deployment, suggesting DragonForce may have used it to preserve access beyond the encryption phase rather than only to support initial intrusion activity."],"referencedReports":[{"title":"DragonForce Abuses Microsoft Teams Infrastructure to Hide Backdoor Traffic","url":"https://www.security.com/threat-intelligence/dragonforce-msteams-backdoor","publisher":"Symantec","context":"The article relies on Symantec researchers’ analysis of DragonForce using Backdoor.Turn to abuse Microsoft Teams TURN relays for command-and-control traffic and cites Symantec’s indicators of compromise.","category":"","primary":false}],"body":"\u003cp\u003eDragonForce ransomware used a custom Go-based malware named Backdoor.Turn to hide command-and-control traffic inside Microsoft Teams relay infrastructure. The backdoor abuses the Traversal Using Relays around NAT protocol used by Microsoft Teams when a direct client connection is unavailable. Symantec says this is the first known in-the-wild malware to abuse Microsoft Teams TURN relay servers for command-and-control communications.\u003c/p\u003e\n\n\u003cp\u003eSymantec observed the activity in a December 2025 attack against a major U.S. services company. The intrusion likely began with exploitation of an unknown flaw in an SQL or MSSQL server, after which the attackers established persistence, created rogue users, modified firewall rules, and used vulnerable drivers to terminate security tools. The attackers ultimately exfiltrated data, deployed DragonForce ransomware, and encrypted the victim’s systems.\u003c/p\u003e\n\n\u003cp\u003eBackdoor.Turn obtains an anonymous Teams visitor token, uses a legitimate Microsoft TURN relay during connection setup, and then connects to the attacker’s command-and-control server. This causes defenders to see traffic associated with Microsoft Teams infrastructure, allowing the malware to blend into a trusted network. The RAT’s capabilities include command execution, process creation, network scanning, TLS certificate capturing, LDAP/Active Directory searching, website title collection, and browser credential theft.\u003c/p\u003e\n"},{"n":12,"title":"Attackers Exploit Three Fortinet FortiSandbox Flaws, One Patched Last Week","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/attackers-exploit-three-fortinet.html","time":"10:30","priority":"MUST READ","score":94,"tldr":"Attackers are actively exploiting three critical Fortinet FortiSandbox vulnerabilities, including one patched only last week, that can enable authentication bypass and unauthenticated command execution. Organizations using affected FortiSandbox products should apply Fortinet’s patches immediately.","briefOverview":"\u003cp\u003eDefused Cyber said it observed exploitation of three Fortinet FortiSandbox vulnerabilities over the past 24 hours. The flaws are CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089, each with a CVSS score of 9.1. One of the vulnerabilities, CVE-2026-25089, was fixed by Fortinet last week.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-39813 is a path traversal flaw in the FortiSandbox JRPC API that could allow unauthenticated authentication bypass through specially crafted HTTP requests. CVE-2026-39808 and CVE-2026-25089 are operating system command injection issues that could allow unauthenticated attackers to execute unauthorized commands or code using crafted HTTP requests. Fortinet patched CVE-2026-39813 and CVE-2026-39808 in April 2026, while CVE-2026-25089 affects FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI.\u003c/p\u003e\n\n\u003cp\u003eDefused Cyber said the exploit for CVE-2026-25089 appears to have been developed using an artificial intelligence model and is faulty. The article states that a working exploit for CVE-2026-25089 has not been publicly disclosed. It also notes that Fortinet appliances have been a frequent target for attackers in recent years.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThreat intelligence firm Defused Cyber said bad actors are exploiting multiple vulnerabilities in Fortinet FortiSandbox. In a post shared on X, the company said it observed exploitation of CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089 over the past 24 hours. All three vulnerabilities are listed in the article with CVSS scores of 9.1.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-39813 is described as a path traversal vulnerability in the FortiSandbox JRPC API. The flaw could allow an unauthenticated attacker to bypass authentication using specially crafted HTTP requests. Fortinet patched this vulnerability in April 2026.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-39808 is described as an operating system command injection vulnerability. It could allow an unauthenticated attacker to execute unauthorized code or commands via crafted HTTP requests. Fortinet also patched CVE-2026-39808 in April 2026.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-25089 was fixed last week and affects FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI. Fortinet described it as an operating system command injection flaw that could allow unauthenticated attackers to execute unauthorized commands through specifically crafted HTTP requests. Defused Cyber said the exploit for CVE-2026-25089 appears to have been developed using an artificial intelligence model and is faulty.\u003c/p\u003e\n\n\u003cp\u003eThe article states that no working exploit for CVE-2026-25089 has been publicly disclosed. It also notes that vulnerabilities in Fortinet appliances have become a lightning rod for attackers in recent years. As an example, it cites Fortinet’s April 2026 out-of-band patches for CVE-2026-35616, a critical FortiClient EMS vulnerability that Fortinet said had been exploited in the wild.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThreat intelligence firm Defused Cyber said attackers are exploiting multiple security vulnerabilities in Fortinet FortiSandbox. The company shared the observation in a post on X, saying it had seen exploitation of three flaws over the past 24 hours.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities named in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-39813\u003c/li\u003e\n\u003cli\u003eCVE-2026-39808\u003c/li\u003e\n\u003cli\u003eCVE-2026-25089\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eEach of the three vulnerabilities is listed with a CVSS score of 9.1.\u003c/p\u003e\n\n\u003ch2 id=\"exploited-fortisandbox-vulnerabilities\"\u003eExploited FortiSandbox vulnerabilities\u003c/h2\u003e\n\n\u003ch3 id=\"cve-2026-39813\"\u003eCVE-2026-39813\u003c/h3\u003e\n\n\u003cp\u003eCVE-2026-39813 is described as a path traversal vulnerability in the FortiSandbox JRPC API. According to the article, the flaw could allow an unauthenticated attacker to bypass authentication.\u003c/p\u003e\n\n\u003cp\u003eThe article states that exploitation would involve specially crafted HTTP requests. Fortinet patched CVE-2026-39813 in April 2026.\u003c/p\u003e\n\n\u003ch3 id=\"cve-2026-39808\"\u003eCVE-2026-39808\u003c/h3\u003e\n\n\u003cp\u003eCVE-2026-39808 is described as an operating system command injection vulnerability. The flaw could allow an unauthenticated attacker to execute unauthorized code or commands.\u003c/p\u003e\n\n\u003cp\u003eThe article says this could be done using crafted HTTP requests. Fortinet patched CVE-2026-39808 in April 2026.\u003c/p\u003e\n\n\u003ch3 id=\"cve-2026-25089\"\u003eCVE-2026-25089\u003c/h3\u003e\n\n\u003cp\u003eCVE-2026-25089 was fixed by Fortinet last week. The article says Fortinet described it as an operating system command injection vulnerability impacting FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI.\u003c/p\u003e\n\n\u003cp\u003eThe flaw could allow an unauthenticated attacker to execute unauthorized commands via specifically crafted HTTP requests. Defused Cyber said the exploit for CVE-2026-25089 shows signs of being developed using an artificial intelligence model, but is also faulty.\u003c/p\u003e\n\n\u003cp\u003eThe article states that a working exploit for CVE-2026-25089 has not been publicly disclosed.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products-and-parties\"\u003eAffected products and parties\u003c/h2\u003e\n\n\u003cp\u003eThe affected Fortinet products named in relation to CVE-2026-25089 are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFortiSandbox\u003c/li\u003e\n\u003cli\u003eFortiSandbox Cloud\u003c/li\u003e\n\u003cli\u003eFortiSandbox PaaS WEB UI\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also discusses FortiSandbox JRPC API in connection with CVE-2026-39813. Defused Cyber is the threat intelligence firm that reported observing exploitation activity.\u003c/p\u003e\n\n\u003ch2 id=\"patch-timeline-mentioned-in-the-article\"\u003ePatch timeline mentioned in the article\u003c/h2\u003e\n\n\u003cp\u003eFortinet patched CVE-2026-39813 and CVE-2026-39808 in April 2026. CVE-2026-25089 was fixed last week.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that in April 2026 Fortinet released out-of-band patches for CVE-2026-35616, a critical flaw affecting FortiClient EMS. Fortinet said that FortiClient EMS flaw had been exploited in the wild.\u003c/p\u003e\n\n\u003ch2 id=\"broader-context\"\u003eBroader context\u003c/h2\u003e\n\n\u003cp\u003eThe article states that vulnerabilities in Fortinet appliances have become a lightning rod for attackers in recent years. It uses the FortiClient EMS vulnerability CVE-2026-35616 as a recent example of a critical Fortinet flaw that had been exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe immediate focus of the article remains the reported exploitation of the three FortiSandbox flaws, including one vulnerability that was patched only last week.\u003c/p\u003e\n","keyPoints":["Defused Cyber said it observed attackers exploiting CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089 in Fortinet FortiSandbox over the past 24 hours.","CVE-2026-39813 is a FortiSandbox JRPC API path traversal vulnerability that could allow an unauthenticated attacker to bypass authentication using specially crafted HTTP requests.","CVE-2026-39808 is an operating system command injection flaw that could allow an unauthenticated attacker to execute unauthorized code or commands through crafted HTTP requests.","Fortinet patched CVE-2026-39813 and CVE-2026-39808 in April 2026, while CVE-2026-25089 was fixed last week.","Defused Cyber said the exploit for CVE-2026-25089 appears to have been developed using an AI model and is faulty, and no working exploit for that vulnerability has been publicly disclosed."],"insights":["The exploitation of CVE-2026-25089 within a week of its patch indicates defenders have a very narrow remediation window for FortiSandbox flaws.","The reported CVE-2026-25089 exploit being faulty despite signs of AI-assisted development suggests attackers may be attempting rapid exploit generation even before reliable public exploit code exists.","Because all three exploited flaws can be triggered through crafted HTTP requests by unauthenticated attackers, internet-exposed FortiSandbox interfaces represent especially urgent patching targets.","The article links the latest FortiSandbox exploitation to a broader pattern of attackers repeatedly targeting Fortinet appliances, including a separate FortiClient EMS flaw exploited earlier in 2026."],"referencedReports":[],"body":"\u003cp\u003eDefused Cyber said it observed exploitation of three Fortinet FortiSandbox vulnerabilities over the past 24 hours. The flaws are CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089, each with a CVSS score of 9.1. One of the vulnerabilities, CVE-2026-25089, was fixed by Fortinet last week.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-39813 is a path traversal flaw in the FortiSandbox JRPC API that could allow unauthenticated authentication bypass through specially crafted HTTP requests. CVE-2026-39808 and CVE-2026-25089 are operating system command injection issues that could allow unauthenticated attackers to execute unauthorized commands or code using crafted HTTP requests. Fortinet patched CVE-2026-39813 and CVE-2026-39808 in April 2026, while CVE-2026-25089 affects FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI.\u003c/p\u003e\n\n\u003cp\u003eDefused Cyber said the exploit for CVE-2026-25089 appears to have been developed using an artificial intelligence model and is faulty. The article states that a working exploit for CVE-2026-25089 has not been publicly disclosed. It also notes that Fortinet appliances have been a frequent target for attackers in recent years.\u003c/p\u003e\n"},{"n":5,"title":"Malicious JetBrains Marketplace plugins steal AI API keys from developers","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/malicious-jetbrains-marketplace-plugins-steal-ai-api-keys-from-developers/","time":"21:54","priority":"SHOULD READ","score":89,"tldr":"Aikido Security found at least 15 malicious JetBrains Marketplace plugins posing as AI coding tools that secretly steal developers’ AI API keys when saved in plugin settings. The plugins had nearly 70,000 reported downloads and some remained available even after the credential-theft behavior was confirmed.","briefOverview":"\u003cp\u003eAikido Security discovered at least 15 malicious plugins on the JetBrains Marketplace that were designed to steal AI API keys from developers. The plugins posed as AI coding assistants, code-review tools, and Git utilities using services such as OpenAI, DeepSeek, and SiliconFlow. Aikido said the plugins were published under seven vendor accounts and had been installed close to 70,000 times.\u003c/p\u003e\n\n\u003cp\u003eThe plugins reportedly worked as advertised while secretly exfiltrating API keys entered into their settings. According to Aikido, the theft occurred when users clicked “Apply” after entering a key, sending the credential over HTTP to a hardcoded server at \u003ccode\u003e39.107.60[.]51\u003c/code\u003e via \u003ccode\u003e/api/software/key\u003c/code\u003e. BleepingComputer said it independently confirmed the credential-theft code in the latest version of DeepSeek AI Assist.\u003c/p\u003e\n\n\u003cp\u003eAikido also found functionality allowing the remote server to send AI API keys back to paid users of the plugins. The researchers said it was unclear where those keys came from, but noted that no legitimate operator would normally provide users with a working, unrestricted paid AI provider key. At publication time, BleepingComputer said the DeepSeek AI Assist plugin remained available on the JetBrains Marketplace.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAikido Security reported a coordinated malware campaign involving at least 15 malicious plugins on the JetBrains Marketplace. The plugins presented themselves as AI coding assistants, code-review tools, and Git utilities powered by popular AI services including OpenAI, DeepSeek, and SiliconFlow. Aikido said the plugins were published under seven vendor accounts and had collectively been installed close to 70,000 times.\u003c/p\u003e\n\n\u003cp\u003eThe malicious plugins were first published in October 2025, with additional plugins continuing to appear as recently as June 10, 2026. Although the plugins functioned as advertised, Aikido found that they also contained hidden behavior to steal AI provider API keys stored in plugin settings. The report said all 15 plugins shared similar code submitted under different Marketplace plugin identities.\u003c/p\u003e\n\n\u003cp\u003eThe credential theft occurred when a user entered an API key in a plugin’s settings and clicked “Apply.” At that point, the key was sent over HTTP to a hardcoded server at \u003ccode\u003e39.107.60[.]51\u003c/code\u003e using the URL \u003ccode\u003ehxxp://39.107.60[.]51/api/software/key\u003c/code\u003e. BleepingComputer said it downloaded and analyzed the latest version of DeepSeek AI Assist and independently confirmed that it still contained the credential-theft code described by Aikido.\u003c/p\u003e\n\n\u003cp\u003eAikido also identified functionality that allowed the remote server to provide AI API keys to paid users. The researchers said it was unclear where those API keys came from, but theorized that the operators may have harvested keys from free users and supplied them to paid users. Aikido described this behavior as bizarre because a legitimate operator would not normally hand a user a working and unrestricted key for a paid AI provider.\u003c/p\u003e\n\n\u003cp\u003eThe campaign included plugins such as DeepSeek AI Assist, CodeGPT AI Assistant, DeepSeek Junit Test, DeepSeek Git Commit, AI Coder Review, and Coding Simple Tool. The two most downloaded plugins listed were DeepSeek AI Assist, with 27,727 downloads, and CodeGPT AI Assistant, with 25,571 downloads. Aikido cautioned that download counts can be manipulated and should not necessarily be treated as unique installations.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer noted that malicious packages are commonly found in repositories such as npm and PyPI, but reports of credential-stealing plugins on the JetBrains Marketplace are less common. The publication contacted JetBrains about the malicious plugins but said it had not received a response by publication. At the time of writing, DeepSeek AI Assist remained available for download through the JetBrains Marketplace.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAikido Security discovered what it described as a coordinated malware campaign on the JetBrains Marketplace involving at least 15 malicious IDE plugins. The plugins were designed to steal AI API keys from developers while presenting themselves as useful development tools. They included AI coding assistants, code-review tools, and Git utilities that referenced popular AI services such as OpenAI, DeepSeek, and SiliconFlow.\u003c/p\u003e\n\n\u003cp\u003eAccording to Aikido, the plugins were published under seven vendor accounts and had been installed close to 70,000 times in total. The researchers said the plugins were first published in October 2025, with new plugins continuing to be published as recently as June 10, 2026.\u003c/p\u003e\n\n\u003ch2 id=\"malicious-behavior\"\u003eMalicious behavior\u003c/h2\u003e\n\n\u003cp\u003eThe plugins reportedly functioned as advertised, but secretly exfiltrated AI API keys that users stored in their plugin settings. Aikido said the theft happened when a user clicked “Apply” after entering an API key. At that point, the credential was transmitted to a hardcoded server.\u003c/p\u003e\n\n\u003cp\u003eThe exfiltration endpoint identified in the article was:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ehxxp://39.107.60[.]51/api/software/key\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the data was sent over HTTP to the IP address \u003ccode\u003e39.107.60[.]51\u003c/code\u003e. Aikido also found that the 15 plugins shared similar code, despite being submitted as different Marketplace plugins.\u003c/p\u003e\n\n\u003ch2 id=\"paid-tier-functionality\"\u003ePaid-tier functionality\u003c/h2\u003e\n\n\u003cp\u003eAikido also discovered functionality that allowed the remote server to provide AI API keys back to paid users. The article says it is unclear where those keys came from. Aikido theorized that the plugin operators may have been harvesting credentials from free users and then providing them to paid users.\u003c/p\u003e\n\n\u003cp\u003eAikido described the behavior as unusual because, in its words, no legitimate operator would simply give a user a working and unrestricted key for a paid AI provider. The article states that, after a user paid a small fee through a donation wall built into the plugin, the server sent an API key down to the client and the plugin used that key for model calls instead of the user’s own key.\u003c/p\u003e\n\n\u003ch2 id=\"independent-confirmation\"\u003eIndependent confirmation\u003c/h2\u003e\n\n\u003cp\u003eBleepingComputer downloaded and analyzed the latest version of the DeepSeek AI Assist plugin, identified by plugin ID \u003ccode\u003eord.cp.code.ai.kit\u003c/code\u003e. The publication said it independently confirmed that the plugin still contained the credential-theft code described in Aikido’s report.\u003c/p\u003e\n\n\u003cp\u003eAt the time of publication, BleepingComputer said the DeepSeek AI Assist plugin remained available for download through the JetBrains Marketplace. BleepingComputer also said it contacted JetBrains about the malicious plugins but had not received a response as of publication.\u003c/p\u003e\n\n\u003ch2 id=\"plugins-named-in-the-campaign\"\u003ePlugins named in the campaign\u003c/h2\u003e\n\n\u003cp\u003eThe campaign plugins identified by Aikido were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDeepSeek Junit Test (\u003ccode\u003eorg.sm.yms.toolkit\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek Git Commit (\u003ccode\u003ecom.json.simple.kit\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek FindBugs (\u003ccode\u003eorg.bug.find.tools\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek AI Chat (\u003ccode\u003eorg.translate.ai.simple\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek Dev AI (\u003ccode\u003ecom.yy.test.ai.simple\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek AI Coding (\u003ccode\u003ecom.dev.ai.toolkit\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eAI FindBugs (\u003ccode\u003ecom.json.view.simple\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eAI Git Commitor (\u003ccode\u003ecom.my.git.ai.kit\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eAI Coder Review (\u003ccode\u003eorg.check.ai.ds\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek Coder AI (\u003ccode\u003ecom.review.tool.code\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eAI Coder Assistant (\u003ccode\u003eorg.code.assist.dev.tool\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek Code Review (\u003ccode\u003ecom.coder.ai.dpt\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eCodeGPT AI Assistant (\u003ccode\u003ecom.my.code.tools\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek AI Assist (\u003ccode\u003eord.cp.code.ai.kit\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eCoding Simple Tool (\u003ccode\u003ecom.dp.git.ai.tool\u003c/code\u003e)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"reported-download-counts\"\u003eReported download counts\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies DeepSeek AI Assist and CodeGPT AI Assistant as the two most downloaded plugins in the campaign. DeepSeek AI Assist had 27,727 downloads, while CodeGPT AI Assistant had 25,571 downloads.\u003c/p\u003e\n\n\u003cp\u003eAikido cautioned that download counts can be manipulated and should not necessarily be treated as unique installations. The article therefore presents the reported installation total as an indicator of scale, while noting that it may not correspond to distinct affected users.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that malicious packages are commonly discovered in repositories such as npm and PyPI. However, it states that reports of credential-stealing plugins distributed through the JetBrains Marketplace are far less common.\u003c/p\u003e\n\n\u003cp\u003eThe central impact described in the article is the theft of developers’ AI provider API keys from plugin settings. The affected ecosystem includes JetBrains Marketplace users who installed the named plugins and entered AI provider API keys into their settings.\u003c/p\u003e\n","keyPoints":["Aikido Security discovered at least 15 malicious JetBrains Marketplace plugins designed to steal AI API keys from developers.","The plugins posed as AI coding assistants, code-review tools, and Git utilities powered by services including OpenAI, DeepSeek, and SiliconFlow.","Aikido said the plugins exfiltrate API keys entered into their settings when users click “Apply,” sending them over HTTP to a hardcoded server at 39.107.60[.]51.","The malicious plugins were published under seven vendor accounts and had been installed close to 70,000 times, according to Aikido.","BleepingComputer independently confirmed that the latest version of the DeepSeek AI Assist plugin still contained the credential theft code and remained available on the JetBrains Marketplace at publication time."],"insights":["The malicious plugins reportedly functioned as advertised, making behavior-based detection harder because users could receive the expected AI coding or Git utility features while their API keys were silently exfiltrated.","The API key theft was triggered when users clicked “Apply” after entering credentials in plugin settings, making plugin configuration changes a specific point where developers should review network activity and revoke exposed keys.","Aikido found shared hidden behavior across plugins published under seven different vendor accounts, indicating that Marketplace publisher identity alone was not a reliable trust signal in this campaign.","The reported paid tier was unusual because the server could send API keys back to clients for model calls, which Aikido noted would be abnormal for a legitimate operator of paid AI-provider access.","BleepingComputer confirmed the credential-theft code in DeepSeek AI Assist while the plugin was still available, showing that users could remain exposed even after public reporting began."],"referencedReports":[{"title":"Multiple JetBrains IDE Plugins Caught Stealing AI Keys","url":"https://www.aikido.dev/blog/multiple-jetbrains-ide-plugins-caught-stealing-ai-keys","publisher":"Aikido Security","context":"The article cites Aikido Security’s report as the source that discovered and analyzed the coordinated malicious JetBrains Marketplace plugin campaign.","category":"","primary":false}],"body":"\u003cp\u003eAikido Security discovered at least 15 malicious plugins on the JetBrains Marketplace that were designed to steal AI API keys from developers. The plugins posed as AI coding assistants, code-review tools, and Git utilities using services such as OpenAI, DeepSeek, and SiliconFlow. Aikido said the plugins were published under seven vendor accounts and had been installed close to 70,000 times.\u003c/p\u003e\n\n\u003cp\u003eThe plugins reportedly worked as advertised while secretly exfiltrating API keys entered into their settings. According to Aikido, the theft occurred when users clicked “Apply” after entering a key, sending the credential over HTTP to a hardcoded server at \u003ccode\u003e39.107.60[.]51\u003c/code\u003e via \u003ccode\u003e/api/software/key\u003c/code\u003e. BleepingComputer said it independently confirmed the credential-theft code in the latest version of DeepSeek AI Assist.\u003c/p\u003e\n\n\u003cp\u003eAikido also found functionality allowing the remote server to send AI API keys back to paid users of the plugins. The researchers said it was unclear where those keys came from, but noted that no legitimate operator would normally provide users with a working, unrestricted paid AI provider key. At publication time, BleepingComputer said the DeepSeek AI Assist plugin remained available on the JetBrains Marketplace.\u003c/p\u003e\n"},{"n":25,"title":"REDCap on the Internet: An Exposure Analysis","source":"censys.com","sourceColorIdx":5,"link":"https://censys.com/blog/redcap-exposure-analysis/","time":"19:01","priority":"SHOULD READ","score":89,"tldr":"Censys found more than 8,500 Internet-facing REDCap servers worldwide after Google linked a year-long PRC-nexus espionage campaign to exploitation of a public REDCap instance. Many deployments appear to be running older versions, making rapid inventory, patching, MFA, and proper server isolation critical for research and medical organizations.","briefOverview":"\u003cp\u003eGoogle’s Threat Intelligence Group attributed a year-plus espionage campaign against North American academic, medical, and military research institutions to UNC6508, a PRC-nexus actor. The article says the consistent initial access vector was an externally facing REDCap server, though the initial access method remains unconfirmed. UNC6508 used the server to drop a webshell and deploy INFINITERED, a PHP backdoor.\u003c/p\u003e\n\n\u003cp\u003eREDCap is a browser-based research data collection and management platform that is often exposed to the Internet to support collaboration and participant access. Censys observed just over 8,500 REDCap instances globally as of June 16, 2026, with the largest share in the United States. The article highlights that REDCap commonly holds clinical trial data, participant records, and other sensitive research information.\u003c/p\u003e\n\n\u003cp\u003eCensys found that version 16.0.17 accounted for just over 30% of Internet-facing REDCap deployments, while the apparent latest version, 17.1.3, was present on only 1.18% of instances. The article recommends that operators inventory REDCap deployments, patch to the latest available version, follow infrastructure security best practices, and enforce multi-factor authentication for administrator accounts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article analyzes Internet-facing REDCap exposure following a Google Threat Intelligence Group report on a year-plus espionage campaign. GTIG attributed the campaign to UNC6508, described as a PRC-nexus actor targeting North American academic, medical, and military research institutions. The campaign’s consistent initial access vector was an externally facing REDCap server, although the specific initial access method was unconfirmed at the time of writing.\u003c/p\u003e\n\n\u003cp\u003eREDCap is a browser-based platform developed and distributed by Vanderbilt University for collecting and managing research data. The article notes that the platform is widely used by academic, healthcare, and non-profit organizations and is often exposed to the Internet to support collaboration and study participant access. It commonly holds sensitive information such as clinical trial data, participant records, and other research data.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, UNC6508 exploited a public-facing REDCap server to drop a webshell and deploy INFINITERED, a PHP backdoor. Using this access, the actor maintained access to sensitive environments for over a year. The article says the actor collected information from sensitive systems, abused administrative tools for data exfiltration, and deployed additional malware.\u003c/p\u003e\n\n\u003cp\u003eCensys observed just over 8,500 REDCap instances globally as of June 16, 2026. The United States accounted for 40% of observed instances, followed by the United Kingdom at 7.4%, Germany at 4.8%, and Australia at 3.9%. The article also notes a long tail of instances across more than 100 countries, including China, India, and South Africa.\u003c/p\u003e\n\n\u003cp\u003eThe article’s version analysis found that REDCap 16.0.17 represented just over 30% of Internet-facing deployments. Version 16.1.4 accounted for 4.93%, version 16.0.15 for 3.34%, and version 17.1.3 appeared to be the latest available version but was present on only 1.18% of observed instances. Censys states that the existence of 17.x.x releases suggests 16.x.x versions may be somewhat outdated.\u003c/p\u003e\n\n\u003cp\u003eFor mitigation, the article recommends that REDCap operators assemble a comprehensive inventory of instances and patch them to the latest available version. It also cites REDCap guidance that much of REDCap security depends on the surrounding IT infrastructure, including separating the web server and database server and placing the database server behind a firewall. The article further recommends enforcing multi-factor authentication on administrator accounts at a minimum.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article examines Internet-facing REDCap exposure in the context of a recently reported espionage campaign. Google’s Threat Intelligence Group attributed the campaign to UNC6508, a PRC-nexus actor. The campaign targeted North American academic, medical, and military research institutions over more than a year.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies externally facing REDCap servers as the consistent initial access vector in the campaign. It also states that the exact initial access method was unconfirmed at the time of writing. After gaining access, UNC6508 dropped a webshell and deployed INFINITERED, described as a PHP backdoor.\u003c/p\u003e\n\n\u003ch2 id=\"redcap-context\"\u003eREDCap Context\u003c/h2\u003e\n\n\u003cp\u003eREDCap, or Research Electronic Data Capture, is a browser-based platform for collecting and managing research data. It was developed and distributed by Vanderbilt University to academic, healthcare, and non-profit organizations. The article notes that REDCap is often exposed to the Internet by design to support collaboration and allow study participants to access the platform.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that REDCap commonly holds sensitive data. Examples given include clinical trial data, participant records, and other sensitive research information. This makes Internet-exposed REDCap deployments significant in the context of espionage activity against research institutions.\u003c/p\u003e\n\n\u003ch2 id=\"reported-campaign-activity\"\u003eReported Campaign Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article cites a June 15, 2026 report from Google Threat Intelligence Group. That report attributed a sophisticated campaign targeting North American academic, medical, and military researchers to UNC6508. UNC6508 is described in the article as a PRC-nexus threat actor.\u003c/p\u003e\n\n\u003cp\u003eThe article states that UNC6508 exploited a public-facing REDCap server. The actor used that access to drop a webshell and deploy INFINITERED malware. INFINITERED is described as a custom PHP backdoor.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the actor maintained access to sensitive environments for over a year. During that time, UNC6508 collected information from sensitive systems, abused administrative tools for data exfiltration, and deployed additional malware. The article does not confirm the original method used to gain initial access.\u003c/p\u003e\n\n\u003ch2 id=\"global-exposure-findings\"\u003eGlobal Exposure Findings\u003c/h2\u003e\n\n\u003cp\u003eCensys observed just over 8,500 REDCap instances globally as of June 16, 2026. The article presents this as an Internet exposure analysis of REDCap deployments. It highlights that REDCap instances are distributed across more than 100 countries.\u003c/p\u003e\n\n\u003cp\u003eThe largest concentration of observed REDCap instances was in the United States, which accounted for 40% of observations. Other major concentrations included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe United Kingdom at 7.4%.\u003c/li\u003e\n\u003cli\u003eGermany at 4.8%.\u003c/li\u003e\n\u003cli\u003eAustralia at 3.9%.\u003c/li\u003e\n\u003cli\u003eChina at 2.5%.\u003c/li\u003e\n\u003cli\u003eIndia at 2.4%.\u003c/li\u003e\n\u003cli\u003eSouth Africa at 2.1%.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the global distribution illustrates REDCap’s wide adoption.\u003c/p\u003e\n\n\u003ch2 id=\"hosting-and-network-distribution\"\u003eHosting and Network Distribution\u003c/h2\u003e\n\n\u003cp\u003eCensys found that a plurality of REDCap instances were cloud deployments. The article specifically names Amazon and Microsoft as primary cloud providers in the observed data. It also lists Alibaba Cloud, OVH, and Digital Ocean among the top autonomous systems where REDCap instances were observed.\u003c/p\u003e\n\n\u003cp\u003eThe article also identifies research and education networks hosting REDCap instances. Examples include the United Kingdom’s Janet Network operated by Jisc, Germany’s National Research and Education Network operated by DFN, and Italy’s Research and Education Network operated by GARR.\u003c/p\u003e\n\n\u003ch2 id=\"version-findings\"\u003eVersion Findings\u003c/h2\u003e\n\n\u003cp\u003eThe article states that REDCap version 16.0.17 was the most commonly observed version. It represented just over 30% of Internet-facing deployments, with the executive summary listing it at about one third of observations and the version table listing 30.1%.\u003c/p\u003e\n\n\u003cp\u003eThe next most common observed versions included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eREDCap 16.1.4 at 4.93%.\u003c/li\u003e\n\u003cli\u003eREDCap 16.0.15 at 3.34%.\u003c/li\u003e\n\u003cli\u003eREDCap 17.1.2 at 3.30%.\u003c/li\u003e\n\u003cli\u003eREDCap 16.0.32 at 1.91%.\u003c/li\u003e\n\u003cli\u003eREDCap 15.5.36 at 1.83%.\u003c/li\u003e\n\u003cli\u003eREDCap 16.0.33 at 1.66%.\u003c/li\u003e\n\u003cli\u003eREDCap 17.1.1 at 1.37%.\u003c/li\u003e\n\u003cli\u003eREDCap 17.1.3 at 1.18%.\u003c/li\u003e\n\u003cli\u003eREDCap 17.0.8 at 1.07%.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says it is unclear from REDCap’s website when each version was released. However, it states that the existence of 17.x.x releases suggests 16.x.x versions may be somewhat outdated. Censys observed that 17.1.3 appeared to be the latest available version, but only 1.18% of observed instances were running it as of June 16, 2026.\u003c/p\u003e\n\n\u003ch2 id=\"patch-management-considerations\"\u003ePatch Management Considerations\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that patch management may be complicated for academic users who maintain self-hosted REDCap installations. It says available versions and rollout methods depend on each institution’s IT team. The article also states that REDCap indicates new long-term support releases are rolled out every six months.\u003c/p\u003e\n\n\u003cp\u003eThis patching context is presented alongside the finding that a large share of observed deployments are not on the apparent latest version. The article does not state that any specific REDCap version is vulnerable. It also does not identify a confirmed v
