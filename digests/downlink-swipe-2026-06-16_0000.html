AI Coder Assistant (\u003ccode\u003eorg.code.assist.dev.tool\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek Code Review (\u003ccode\u003ecom.coder.ai.dpt\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eCodeGPT AI Assistant (\u003ccode\u003ecom.my.code.tools\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek AI Assist (\u003ccode\u003eord.cp.code.ai.kit\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eCoding Simple Tool (\u003ccode\u003ecom.dp.git.ai.tool\u003c/code\u003e)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"vendor-accounts\"\u003eVendor accounts\u003c/h2\u003e\n\n\u003cp\u003eThe affected plugins were published under seven vendor accounts:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCodePilot (\u003ccode\u003emycode\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eStackSmith (\u003ccode\u003emisshewei\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eCodeCrafter (\u003ccode\u003eketeme\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eCodeWeaver (\u003ccode\u003esimpledev\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eJetCode (\u003ccode\u003eskyblue\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDailyCode (\u003ccode\u003edialycode\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eZenCoder (\u003ccode\u003e947cb4c8-5db1-4cf0-8182-0aae7c433bb3\u003c/code\u003e)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article provides one network indicator:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eC2 server IP: \u003ccode\u003e39.107.60[.]51\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the server was hardcoded into the plugins and reached over plain HTTP. It also states that the request used a static hardcoded token.\u003c/p\u003e\n\n\u003ch2 id=\"significance-for-ide-security\"\u003eSignificance for IDE security\u003c/h2\u003e\n\n\u003cp\u003eThe article says IDE plugin ecosystems have become a frequent target of supply chain attacks and mentions GlassWorm as an ongoing campaign affecting VS Code. It explains that developer machines are high-value targets because they can contain source code, cloud credentials, signing keys, and AI service API keys. It also notes that a plugin runs unsandboxed inside the IDE, in a trusted tool that many people leave open all day.\u003c/p\u003e\n\n\u003cp\u003eThe article says JetBrains plugins go through a manual review process before reaching the marketplace. However, it notes that a small piece of logic buried inside an otherwise working plugin can still slip through review. The article advises treating plugins like any dependency that runs with user privileges and being cautious about pasting long-lived secrets into tools that have not been vetted.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-detection-guidance-in-the-article\"\u003eResponse and detection guidance in the article\u003c/h2\u003e\n\n\u003cp\u003eFor Aikido users, the article recommends checking the central feed and filtering for malware issues. It says this campaign will surface as a \u003csup\u003e100\u003c/sup\u003e\u0026frasl;\u003csub\u003e100\u003c/sub\u003e critical issue. Although Aikido rescans nightly, the article recommends triggering a manual rescan.\u003c/p\u003e\n\n\u003cp\u003eFor non-users, the article says Aikido malware coverage is included in its free plan after creating an account and connecting repositories. It also promotes Aikido Device Protection for visibility and control over software packages installed on team devices, including browser extensions, code libraries, IDE plugins, and build dependencies. The article also mentions Aikido Safe Chain, an open-source tool that intercepts npm, npx, yarn, pnpm, and pnpx commands and checks packages against Aikido Intel before installation.\u003c/p\u003e\n","keyPoints":["Aikido detected a coordinated malware campaign on the JetBrains Marketplace involving at least 15 IDE plugins published under seven vendor accounts.","The affected plugins pose as AI coding assistants for DeepSeek and other large language models and have been installed close to 70,000 times.","When a user enters an AI provider API key into a plugin’s settings and clicks Apply, the plugin stores the key and forwards it to a hardcoded server at 39.107.60[.]51 over plain HTTP.","The article lists OpenAI, SiliconFlow, and DeepSeek as examples of AI providers whose API keys users may enter into the affected plugins.","The affected plugins also include a paid tier in which the server sends an API key back to the client, and the plugin uses that server-supplied key for model calls."],"insights":["The plugins functioned as advertised while stealing keys, making the malicious behavior harder for users to notice through normal use.","The exfiltration occurred immediately when users clicked Apply in the settings panel, before any obvious misuse of the AI service would be visible to the user.","The hardcoded destination used plain HTTP and a static token, which gives defenders concrete network indicators for detection and blocking.","The campaign used multiple vendor accounts and repackaged versions of a similar codebase, indicating that checking only a single plugin or publisher would miss related malicious listings.","Marketplace popularity signals are unreliable in this case because the article states that download counts can be inflated and the listings contained fake five-star reviews."],"referencedReports":[],"body":"\u003cp\u003eAikido detected a coordinated malware campaign on the JetBrains Marketplace involving at least 15 IDE plugins published under seven vendor accounts. The plugins posed as AI coding assistants built on DeepSeek and other large language models, offering features such as chat, commit messages, code review, bug finding, and unit tests. Together, the plugins were installed close to 70,000 times, although the article notes that download counts can be inflated and listings contained fake five-star reviews.\u003c/p\u003e\n\n\u003cp\u003eThe malicious behavior centered on AI provider API keys that users pasted into the plugins’ settings. When a user clicked Apply, the plugin stored the key and also sent it to a hardcoded attacker-controlled server at \u003ccode\u003e39.107.60[.]51\u003c/code\u003e over plain HTTP. The article says the plugins otherwise functioned as advertised, making the theft less obvious to users.\u003c/p\u003e\n\n\u003cp\u003eThe earliest versions appeared at the end of October 2025, and new versions were still being released in June 2026. The affected plugins included listings such as CodeGPT AI Assistant, DeepSeek AI Assist, DeepSeek Coder AI, and several other DeepSeek- or AI-themed tools. The article recommends that Aikido users check for malware issues and notes that the campaign illustrates the risk of entering long-lived secrets into unvetted IDE plugins.\u003c/p\u003e\n"},{"n":1,"title":"GhostTree Attack Abused Recursive Windows Junctions to Hide Malware","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/ghosttree-attack-abused-recursive-windows-junctions-to-hide-malware/","time":"14:17","priority":"SHOULD READ","score":82,"tldr":"Varonis described “GhostTree,” a technique that uses recursive NTFS junctions to create effectively endless Windows file paths that can cause recursive scans, including some endpoint security scans, to hang and miss malware in the folder. Microsoft has since patched the reported Windows Defender bypass issue.","briefOverview":"\u003cp\u003eVaronis described a technique called GhostTree that abuses recursive Windows NTFS junctions to hide malware from recursive scanning tools. NTFS junctions allow one directory to point to another, and the article states that any user with write access can create them without administrator privileges. By pointing child junctions back to a parent folder, an attacker can create recursive loops that generate effectively endless valid file paths.\u003c/p\u003e\n\n\u003cp\u003eThe article says these loops can cause tools that recursively scan directories, including EDR products, to follow the loop and never finish. In that situation, malicious files placed in the same parent directory may go unexamined. Varonis said it tested the technique against Windows Defender and confirmed it could be used to evade folder scans.\u003c/p\u003e\n\n\u003cp\u003eGhostTree expands on a simpler technique called GhostBranch by using multiple child junctions instead of one. While Windows path length limits cap recursion depth, the article says two looping child folders can create a binary tree-like set of paths with about 2^126 possible nodes. Varonis reported the issue to Microsoft, and the article states that Microsoft later patched it despite initially closing the ticket.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eVaronis described GhostTree, a technique that abuses recursive NTFS junctions and symbolic-link-like behavior on Windows to interfere with recursive folder scanning. The article explains that junctions are legitimate NTFS reparse points used for directory redirection, backward compatibility, and storage management. A key property highlighted in the article is that any user can create junctions with write access to the target folder, without administrator privileges.\u003c/p\u003e\n\n\u003cp\u003eThe core method involves creating a junction inside a parent directory that points back to the same parent directory. In the simpler GhostBranch example, \u003ccode\u003eC:\\Parent\\Child\u003c/code\u003e points to \u003ccode\u003eC:\\Parent\u003c/code\u003e, making paths such as \u003ccode\u003eC:\\Parent\\Child\\Child\\Program.exe\u003c/code\u003e valid references to the same executable. Because the child directory contains the parent’s contents, including itself, recursive tools can continue traversing the structure.\u003c/p\u003e\n\n\u003cp\u003eGhostTree builds on GhostBranch by creating multiple child junctions that each point back to the parent directory. The article gives examples using \u003ccode\u003eChild1\u003c/code\u003e and \u003ccode\u003eChild2\u003c/code\u003e, where every level in the path can branch through either child while still resolving back to the same parent. This creates many more possible path combinations than a single recursive branch.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Windows path length limits affect how deep these recursive paths can go. It says a single-letter folder approach can produce around 126 unique directory structures in the GhostBranch case under the traditional 260-character path limit. With GhostTree, the maximum depth remains about the same, but each level may use one of two folder names, producing a binary tree-like structure with approximately 2^126 possible nodes.\u003c/p\u003e\n\n\u003cp\u003eVaronis said the practical impact is that recursive scanning tools, including EDR products, may follow the loops and fail to finish scanning the parent directory. An attacker could place malware in the parent directory, create the GhostTree structure, and make the containing folder effectively unscannable according to the article. Varonis reported testing the technique against Windows Defender and said Microsoft later patched the issue after initially closing the ticket with the explanation that bypassing Defender was not crossing a security boundary.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eVaronis described a Windows file system evasion technique called GhostTree. The technique abuses recursive NTFS junctions to create effectively endless valid file paths. The article says this can cause recursive scanning tools, including EDR products, to follow the loop and never finish scanning a directory.\u003c/p\u003e\n\n\u003cp\u003eThe practical concern described in the article is that malicious files placed in the same folder as the recursive junction structure may go unexamined. Varonis said it tested the technique against Windows Defender and confirmed it could be used to evade folder scans. The article states that Varonis reported the issue to Microsoft and that it was subsequently patched.\u003c/p\u003e\n\n\u003ch2 id=\"ntfs-junction-background\"\u003eNTFS Junction Background\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that NTFS junctions and symbolic links allow one directory to point to another, similar to a shortcut that the operating system treats as real. These features have legitimate uses, including backward compatibility, storage management, and redirecting directories without moving files.\u003c/p\u003e\n\n\u003cp\u003eA junction is described as an NTFS reparse point that redirects one directory to another. The article gives the following command as an example:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-cmd\"\u003emklink /J C:\\LinkToFolder C:\\TargetFolder\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eThis creates a junction named \u003ccode\u003eLinkToFolder\u003c/code\u003e that points to \u003ccode\u003eTargetFolder\u003c/code\u003e. Applications accessing the junction see the target directory’s contents as though they were local.\u003c/p\u003e\n\n\u003cp\u003eA central security-relevant detail in the article is that creating these junctions does not require administrator privileges. The article states that any user can create them with write access to the target folder.\u003c/p\u003e\n\n\u003ch2 id=\"path-length-constraints\"\u003ePath Length Constraints\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that classic Windows systems impose a maximum path length of 260 characters. It also says NTFS can technically support longer paths up to 32,767 characters through a registry key. However, many applications and utilities are not equipped to handle paths longer than 260 characters.\u003c/p\u003e\n\n\u003cp\u003eThis path length limit determines how deep the recursive loops can go. It also affects how many unique valid paths GhostBranch and GhostTree can produce.\u003c/p\u003e\n\n\u003ch2 id=\"ghostbranch-technique\"\u003eGhostBranch Technique\u003c/h2\u003e\n\n\u003cp\u003eGhostBranch is presented as the simpler technique. It uses a single child junction that points back to its parent directory.\u003c/p\u003e\n\n\u003cp\u003eThe article gives this initial structure:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-text\"\u003eC:\\Parent\\program.exe\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eThen it creates a junction:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-cmd\"\u003emklink /J C:\\Parent\\Child C:\\Parent\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eThis creates a logical loop because \u003ccode\u003eChild\u003c/code\u003e points back to \u003ccode\u003eParent\u003c/code\u003e. The article explains that the child directory now contains everything the parent does, including itself.\u003c/p\u003e\n\n\u003cp\u003eAs a result, multiple different paths remain valid references to the same executable, such as:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-text\"\u003eC:\\Parent\\Child\\Program.exe\nC:\\Parent\\Child\\Child\\Program.exe\nC:\\Parent\\Child\\Child\\Child\\Child\\Program.exe\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eThe article states that, because of the loop, additional \u003ccode\u003eChild\u003c/code\u003e folders can be added to the path and the path remains valid.\u003c/p\u003e\n\n\u003ch2 id=\"ghosttree-technique\"\u003eGhostTree Technique\u003c/h2\u003e\n\n\u003cp\u003eGhostTree extends GhostBranch by creating multiple child folders instead of one. The article gives this example:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-cmd\"\u003emklink /J C:\\Parent\\Child1 C:\\Parent\nmklink /J C:\\Parent\\Child2 C:\\Parent\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eWith this setup, each level in the path can branch through either \u003ccode\u003eChild1\u003c/code\u003e or \u003ccode\u003eChild2\u003c/code\u003e. Both child folders point back to the parent directory.\u003c/p\u003e\n\n\u003cp\u003eThe article gives examples of valid paths including:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-text\"\u003eC:\\Parent\\Child1\\Program.exe\nC:\\Parent\\Child2\\Program.exe\nC:\\Parent\\Child1\\Child1\\Program.exe\nC:\\Parent\\Child1\\Child2\\Program.exe\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eThis creates a much larger set of possible paths than the single-junction GhostBranch approach.\u003c/p\u003e\n\n\u003ch2 id=\"path-diversity-and-scale\"\u003ePath Diversity and Scale\u003c/h2\u003e\n\n\u003cp\u003eThe article compares the scale of GhostBranch and GhostTree under the traditional Windows 260-character path limit.\u003c/p\u003e\n\n\u003cp\u003eFor GhostBranch, the article describes using a single-letter folder such as \u003ccode\u003eP\u003c/code\u003e directly under the \u003ccode\u003eC:\u003c/code\u003e drive and an executable named \u003ccode\u003e1.exe\u003c/code\u003e. Example paths include:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-text\"\u003eC:\\P\\1.exe\nC:\\P\\P\\1.exe\nC:\\P\\P\\P\\...\\1.exe\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eThe article says this allows for approximately 126 unique directory structures due to path length limitations.\u003c/p\u003e\n\n\u003cp\u003eFor GhostTree, the article describes using two folder names, \u003ccode\u003eP\u003c/code\u003e and \u003ccode\u003eB\u003c/code\u003e. Example paths include:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-text\"\u003eC:\\B\\1.exe\nC:\\P\\B\\1.exe\nC:\\P\\B\\P\\B\\...\\1.exe\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eAlthough the maximum depth remains around 126 folders, each level may be named either \u003ccode\u003eP\u003c/code\u003e or \u003ccode\u003eB\u003c/code\u003e. The article says this creates a binary tree-like structure with a total number of possible nodes calculated as:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-text\"\u003e2^126 ≈ 8.5 × 10^37\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eThe article compares that number to the number of grains of sand on Earth and the number of atoms in a human body.\u003c/p\u003e\n\n\u003ch2 id=\"impact-on-defensive-scanning\"\u003eImpact on Defensive Scanning\u003c/h2\u003e\n\n\u003cp\u003eThe article says GhostTree matters because recursive scanning tools can become trapped following the recursive junction structure. This applies to the \u003ccode\u003edir\u003c/code\u003e command when used recursively and to EDR products that scan folders for malicious files, according to the article.\u003c/p\u003e\n\n\u003cp\u003eThe described attacker workflow is:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePlace malware in the parent directory.\u003c/li\u003e\n\u003cli\u003eCreate the GhostTree recursive junction structure.\u003c/li\u003e\n\u003cli\u003eCause scans of the containing folder to hang or fail to complete.\u003c/li\u003e\n\u003cli\u003eLeave the malicious files unexamined.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eVaronis states that it tested the technique against Windows Defender and confirmed it could be used to evade folder scans.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-response\"\u003eMicrosoft Response\u003c/h2\u003e\n\n\u003cp\u003eVaronis reported the issue to Microsoft. The article says Microsoft closed the ticket with the explanation that “bypassing Defender is not crossing a security boundary.”\u003c/p\u003e\n\n\u003cp\u003eThe article also states that the issue was subsequently patched regardless.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-takeaway-in-the-article\"\u003eDefensive Takeaway in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article frames GhostTree as a reminder that endpoint scanning is only one layer of defense. It says monitoring file system activity at the data layer can catch what scanners miss.\u003c/p\u003e\n\n\u003cp\u003eSpecific detection opportunities mentioned in the article include anomalous junction creation and recursive directory structures that should not exist in normal operations. The article also states that Varonis monitors file access patterns and detects this kind of anomalous activity across file systems and cloud infrastructure.\u003c/p\u003e\n","keyPoints":["Varonis described GhostTree, a technique that abuses recursive NTFS junctions to create effectively endless valid Windows file paths.","The technique works because any user with write access can create NTFS junctions without administrator privileges.","GhostBranch uses one child junction that points back to its parent directory, while GhostTree uses multiple child junctions to create many more possible path combinations.","Varonis said recursive scanning tools, including EDR products, can follow these junction loops and fail to finish scanning the folder, leaving malicious files unexamined.","Varonis reported the issue to Microsoft, and the article states that Microsoft later patched the Windows Defender bypass despite initially closing the ticket."],"insights":["GhostTree requires only two junction-creation commands and ordinary user write access, making it a low-privilege evasion technique rather than an administrator-only abuse case.","Path length limits constrain recursion depth, but adding just a second looping child folder changes the problem from roughly 126 paths to about 2^126 possible path combinations.","Recursive directory scanning logic is the weak point: the same malicious file can remain reachable through countless valid paths while scans of the containing folder never complete.","The article highlights anomalous junction creation and recursive directory structures as detection opportunities that may catch activity missed by endpoint file scanning."],"referencedReports":[],"body":"\u003cp\u003eVaronis described a technique called GhostTree that abuses recursive Windows NTFS junctions to hide malware from recursive scanning tools. NTFS junctions allow one directory to point to another, and the article states that any user with write access can create them without administrator privileges. By pointing child junctions back to a parent folder, an attacker can create recursive loops that generate effectively endless valid file paths.\u003c/p\u003e\n\n\u003cp\u003eThe article says these loops can cause tools that recursively scan directories, including EDR products, to follow the loop and never finish. In that situation, malicious files placed in the same parent directory may go unexamined. Varonis said it tested the technique against Windows Defender and confirmed it could be used to evade folder scans.\u003c/p\u003e\n\n\u003cp\u003eGhostTree expands on a simpler technique called GhostBranch by using multiple child junctions instead of one. While Windows path length limits cap recursion depth, the article says two looping child folders can create a binary tree-like set of paths with about 2^126 possible nodes. Varonis reported the issue to Microsoft, and the article states that Microsoft later patched it despite initially closing the ticket.\u003c/p\u003e\n"},{"n":13,"title":"New Rokarolla Android Malware Steals PINs, SMS Codes, and Crypto Wallet Funds","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/new-rokarolla-android-malware-steals.html","time":"13:10","priority":"SHOULD READ","score":82,"tldr":"Zimperium researchers found Rokarolla, a new Android banking trojan spread through fake app sites that abuses Accessibility access to steal PINs, SMS codes, banking credentials, and crypto funds. Its 137 remote commands let attackers disable Play Protect, overlay fake login screens, intercept messages, rewrite crypto wallet addresses, and remotely control infected phones.","briefOverview":"\u003cp\u003eZimperium’s zLabs documented Rokarolla, a new Android banking trojan targeting 217 banking and cryptocurrency apps. The malware supports 137 remote commands, giving an operator extensive control over infected phones. It can steal lock-screen PINs, read and send SMS messages, rewrite clipboard contents to redirect crypto payments, and disable Google Play Protect.\u003c/p\u003e\n\n\u003cp\u003eRokarolla spreads through malicious websites that impersonate well-known apps such as TikTok and Chrome. The first installed component is a dropper pretending to be Google Play Protect, which helps install the payload and obtain Accessibility access. Once active, the malware uses overlays, keylogging, screen logging, SMS interception, notification scraping, and contact scraping to collect sensitive data.\u003c/p\u003e\n\n\u003cp\u003eThe trojan downloads fake HTML login pages for targeted banking and wallet apps and displays them over legitimate apps to capture credentials and card details. It can also show a fake Android lock screen to capture a PIN, pattern, or password, enabling control even when the device is locked. Zimperium did not attribute Rokarolla to a named group, and the article says there is no patch because this is malware rather than a product flaw.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSecurity researchers at Zimperium’s zLabs documented Rokarolla, a new Android banking trojan named after its command-and-control servers. The malware targets 217 banking and cryptocurrency apps and includes 137 remote commands. According to the article, those commands give an operator near-total control of an infected phone.\u003c/p\u003e\n\n\u003cp\u003eRokarolla is distributed through malicious websites posing as well-known apps, including TikTok and Chrome. The initial dropper pretends to be Google Play Protect and uses that disguise to install the payload and obtain Accessibility access. After the malware is running, one of its commands disables Google Play Protect.\u003c/p\u003e\n\n\u003cp\u003eThe theft workflow relies heavily on overlays. Rokarolla retrieves a target list from its server, downloads fake HTML login pages for apps marked as active, and stores them in a local database. When a victim opens the real banking or wallet app, the malware places the fake page on top to capture typed information, including card details.\u003c/p\u003e\n\n\u003cp\u003eThe malware can also display an overlay mimicking the Android lock screen to capture a PIN, pattern, or password. It reads SMS messages and can send texts, enabling theft of SMS one-time codes used by banks for logins and transactions. By making itself the default app for texts and calls, it can block incoming calls, including warning calls from a bank.\u003c/p\u003e\n\n\u003cp\u003eRokarolla includes a keylogger, screen logger, contact scraping, notification reading, and clipboard rewriting that swaps attacker wallet addresses into copied crypto payments. For surveillance, it avoids MediaProjection prompts by taking screenshots through Accessibility, compressing them to PNG, and sending them out one frame at a time. The article says this is quieter than live hidden VNC approaches seen in families like Klopatra.\u003c/p\u003e\n\n\u003cp\u003eThe malware includes multiple fallback C2 domains and can receive new ones dynamically, reducing the effect of taking down a single server. Zimperium did not link Rokarolla to a named group, but the article says the build shows intent to bypass protections users are told to rely on, including Play Protect and the lock screen. Zimperium says its products detect the family and published indicators of compromise in its GitHub repository.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eZimperium’s zLabs documented Rokarolla, a new Android banking trojan named after its command-and-control servers. The malware targets 217 banking and cryptocurrency apps and contains 137 remote commands. The article describes those commands as giving an operator near-total control of an infected phone.\u003c/p\u003e\n\n\u003cp\u003eRokarolla’s capabilities include stealing lock-screen PINs, reading and sending SMS messages, rewriting clipboard contents to redirect crypto payments, disabling Google Play Protect, logging keystrokes and screens, scraping contacts, and reading notifications. Zimperium did not tie Rokarolla to a named group.\u003c/p\u003e\n\n\u003ch2 id=\"distribution-and-initial-access\"\u003eDistribution and Initial Access\u003c/h2\u003e\n\n\u003cp\u003eRokarolla spreads through malicious websites that pose as well-known apps such as TikTok and Chrome. The first component installed by a victim is a dropper that pretends to be Google Play Protect.\u003c/p\u003e\n\n\u003cp\u003eThe dropper uses the Google Play Protect disguise to help install the payload and obtain Accessibility access. Once the malware is running, one of its commands turns Google Play Protect off.\u003c/p\u003e\n\n\u003ch2 id=\"overlay-based-theft\"\u003eOverlay-Based Theft\u003c/h2\u003e\n\n\u003cp\u003eThe article says Rokarolla’s theft workflow runs through overlays. The malware pulls a target list from its server, and for each app marked active, it downloads a fake HTML login page and stores it in a local database.\u003c/p\u003e\n\n\u003cp\u003eWhen the victim opens a real banking or wallet app, Rokarolla places the fake page on top of the legitimate app. The overlay captures everything typed into it, including card details. The report cited in the article shows one fake page mimicking the banking app imagin.\u003c/p\u003e\n\n\u003cp\u003eRokarolla also uses a separate overlay that mimics the Android lock screen. This overlay captures the victim’s PIN, pattern, or password, which the article says lets the operator control the phone even while it is locked.\u003c/p\u003e\n\n\u003ch2 id=\"sms-calls-and-account-verification-codes\"\u003eSMS, Calls, and Account Verification Codes\u003c/h2\u003e\n\n\u003cp\u003eRokarolla reads every SMS message on the device and can send messages itself. The article states that this is enough to capture SMS one-time codes used by banks to approve logins and transactions.\u003c/p\u003e\n\n\u003cp\u003eThe malware can also make itself the phone’s default app for texts and calls. In that position, it can block incoming calls, which the article notes could stop a warning call from the bank from reaching the victim.\u003c/p\u003e\n\n\u003ch2 id=\"logging-clipboard-hijacking-and-surveillance\"\u003eLogging, Clipboard Hijacking, and Surveillance\u003c/h2\u003e\n\n\u003cp\u003eRokarolla includes a keylogger and screen logger to record what the user types and sees. It also scrapes contacts and reads notifications.\u003c/p\u003e\n\n\u003cp\u003eThe malware silently rewrites clipboard contents, replacing copied cryptocurrency wallet addresses with attacker-controlled wallet addresses. This can cause a copied crypto payment to be sent to the wrong account.\u003c/p\u003e\n\n\u003cp\u003eFor surveillance, Rokarolla avoids the usual MediaProjection screen casting method, which displays a visible recording prompt. Instead, it takes screenshots through Accessibility, compresses them to PNG, and sends them out one frame at a time. The article describes this snapshot approach as simpler and quieter than the live hidden VNC seen in families such as Klopatra.\u003c/p\u003e\n\n\u003ch2 id=\"command-and-control-resilience\"\u003eCommand-and-Control Resilience\u003c/h2\u003e\n\n\u003cp\u003eRokarolla carries multiple fallback command-and-control domains. It can also receive new domains dynamically.\u003c/p\u003e\n\n\u003cp\u003eThe article says this means pulling a single server does little. It also notes that Rokarolla’s 137 commands outnumber the 107 commands Zimperium counted in the HOOK trojan.\u003c/p\u003e\n\n\u003ch2 id=\"broader-pattern-described-in-the-article\"\u003eBroader Pattern Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article places Rokarolla within a wave of Android bankers using a similar playbook. That playbook includes fake-app droppers, Accessibility abuse, and HTML overlays.\u003c/p\u003e\n\n\u003cp\u003eRokarolla is described as being built to beat protections users are told to rely on, including Google Play Protect and the Android lock screen.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-affected-parties\"\u003eImpact and Affected Parties\u003c/h2\u003e\n\n\u003cp\u003eThe affected targets are users of Android devices who install the malicious apps from the fake websites. The malware targets banking and cryptocurrency applications, with 217 banking and crypto apps included in its targeting.\u003c/p\u003e\n\n\u003cp\u003eThe potential impacts described in the article include credential theft, card detail theft, SMS one-time-code theft, lock-screen credential capture, interception or blocking of calls, crypto payment redirection, contact scraping, notification reading, and remote operator control of an infected phone.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-defenses\"\u003eResponse and Defenses\u003c/h2\u003e\n\n\u003cp\u003eThe article says there is no patch to apply because Rokarolla is malware rather than a product flaw. The recommended defenses are described as standard protections against Android bankers: install apps only from Google Play, leave Play Protect enabled, and treat unexpected Accessibility requests as a red flag.\u003c/p\u003e\n\n\u003cp\u003eZimperium says its own products detect the Rokarolla family. The article also states that indicators of compromise are available in Zimperium’s GitHub repository.\u003c/p\u003e\n","keyPoints":["Zimperium's zLabs documented Rokarolla, a new Android banking trojan that targets 217 banking and cryptocurrency apps and supports 137 remote commands.","Rokarolla spreads through malicious websites posing as well-known apps such as TikTok and Chrome, with an initial dropper pretending to be Google Play Protect.","The malware abuses Accessibility access to disable Google Play Protect, capture lock-screen PINs or passwords, deploy fake HTML login overlays, and take screenshots without using MediaProjection.","Rokarolla can read and send SMS messages, make itself the default app for texts and calls, block incoming calls, scrape contacts, read notifications, and log keystrokes and screens.","The trojan silently rewrites clipboard contents to replace copied cryptocurrency wallet addresses with attacker-controlled addresses."],"insights":["Rokarolla’s fake Google Play Protect disguise is especially deceptive because the same trust signal it impersonates is later disabled by the malware once it gains control.","The article emphasizes that there is no patch for Rokarolla because it is not exploiting a product flaw, making app-source hygiene and refusal of unexpected Accessibility requests the primary defenses.","Rokarolla avoids the visible Android screen-recording prompt by using Accessibility-based screenshots instead of MediaProjection, making its surveillance quieter than live hidden VNC approaches described in other Android bankers.","Taking down one command-and-control server is unlikely to stop Rokarolla because it includes multiple fallback C2 domains and can receive new ones dynamically.","By making itself the default app for texts and calls, Rokarolla can both steal SMS one-time codes and prevent bank warning calls from reaching the victim."],"referencedReports":[{"title":"Rokarolla: Android Banker With Complete Device Takeover Capabilities","url":"https://zimperium.com/blog/rokarolla-android-banker-with-complete-device-takeover-capabilities","publisher":"Zimperium zLabs","context":"The article is based on Zimperium zLabs' report documenting the Rokarolla Android banking trojan, its targeted apps, commands, and device-takeover capabilities.","category":"","primary":false}],"body":"\u003cp\u003eZimperium’s zLabs documented Rokarolla, a new Android banking trojan targeting 217 banking and cryptocurrency apps. The malware supports 137 remote commands, giving an operator extensive control over infected phones. It can steal lock-screen PINs, read and send SMS messages, rewrite clipboard contents to redirect crypto payments, and disable Google Play Protect.\u003c/p\u003e\n\n\u003cp\u003eRokarolla spreads through malicious websites that impersonate well-known apps such as TikTok and Chrome. The first installed component is a dropper pretending to be Google Play Protect, which helps install the payload and obtain Accessibility access. Once active, the malware uses overlays, keylogging, screen logging, SMS interception, notification scraping, and contact scraping to collect sensitive data.\u003c/p\u003e\n\n\u003cp\u003eThe trojan downloads fake HTML login pages for targeted banking and wallet apps and displays them over legitimate apps to capture credentials and card details. It can also show a fake Android lock screen to capture a PIN, pattern, or password, enabling control even when the device is locked. Zimperium did not attribute Rokarolla to a named group, and the article says there is no patch because this is malware rather than a product flaw.\u003c/p\u003e\n"},{"n":8,"title":"FTC warns of record $3.5 billion losses to imposter scams in 2025","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/ftc-warns-of-record-35-billion-losses-to-imposter-scams-in-2025/","time":"13:42","priority":"SHOULD READ","score":79,"tldr":"The FTC says Americans lost a record $3.5 billion to imposter scams in 2025, with social media driving a rapidly growing share of losses. Business and government impersonation scams, especially fake bank alerts, remain among the costliest schemes.","briefOverview":"\u003cp\u003eThe U.S. Federal Trade Commission warned that Americans lost $3.5 billion to imposter scams in 2025. Reported losses nearly tripled since 2020, and imposter scams were the most reported fraud category last year. The category accounted for nearly one in three fraud reports filed with the FTC.\u003c/p\u003e\n\n\u003cp\u003eFraudsters reached victims through text messages, phone calls, emails, social media, and search engine results. The costliest schemes typically involved fake bank security alerts that prompted targets to transfer funds to “protect” their accounts. Victims lost nearly \u003cspan class=\"math inline\"\u003e\\(1 billion to business impersonators and approximately \\)\u003c/span\u003e920 million to government impersonators.\u003c/p\u003e\n\n\u003cp\u003eSocial media was the most cost-effective attack vector for impersonators, with more than \u003cspan class=\"math inline\"\u003e\\(2.1 billion in 2025 losses traced to social platforms. Nearly one in three Americans who lost money in these scams were first contacted through social media, and Facebook losses exceeded those from text and email combined. Since its Impersonation Rule took effect in April 2024, the FTC has brought a dozen enforcement actions and secured more than \\)\u003c/span\u003e70 million in consumer redress.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe FTC warned that Americans reported losing $3.5 billion to imposter scams in 2025. The article says reported losses nearly tripled since 2020, making imposter scams the most reported fraud category last year. These scams accounted for nearly one in three fraud reports filed with the FTC.\u003c/p\u003e\n\n\u003cp\u003eThe scams used several contact methods, including text messages, phone calls, emails, social media, and search engine results. The article identifies fake bank security alerts as among the costliest schemes, with victims prompted to transfer funds to “protect” their accounts. Business impersonators caused nearly \u003cspan class=\"math inline\"\u003e\\(1 billion in losses, while government impersonators caused approximately \\)\u003c/span\u003e920 million in losses.\u003c/p\u003e\n\n\u003cp\u003eSocial media played a major role in the reported losses. More than $2.1 billion in 2025 losses were traced to social platforms, an eightfold increase since 2020. Nearly one in three Americans who lost money in such scams were first contacted through social media, with Facebook losses alone exceeding those from text and email combined, while WhatsApp and Instagram ranked second and third.\u003c/p\u003e\n\n\u003cp\u003eThe FTC said it will use every tool available to combat government and business impersonation and protect the integrity of the digital economy. Overall reported fraud losses across all categories reached about $16 billion in 2025, the highest on record and roughly 25% above the prior year. The article also notes that in March 2024, the FTC warned that scammers were impersonating FTC employees to steal money.\u003c/p\u003e\n\n\u003cp\u003eSince the FTC’s Impersonation Rule took effect in April 2024, the agency has brought a dozen enforcement actions. Those actions secured more than $70 million in consumer redress and halted some imposter schemes. The article cites actions involving MediaAlpha, American Tax Service, Blackstone Legal, Click Profit, Accelerated Debt Settlement, and a complaint against Innovative Partners.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe U.S. Federal Trade Commission warned that Americans lost $3.5 billion to imposter scams in 2025. The article states that reported losses nearly tripled since 2020. Imposter scams were also the most reported fraud category last year, accounting for nearly one in three fraud reports filed with the FTC.\u003c/p\u003e\n\n\u003cp\u003eThe broader fraud landscape also reached record levels. Overall reported fraud losses across all categories rose to about $16 billion in 2025, which the article describes as the highest on record and roughly 25% above the prior year.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-scams-reached-victims\"\u003eHow the scams reached victims\u003c/h2\u003e\n\n\u003cp\u003eThe article says fraudsters contacted victims through multiple channels, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eText messages\u003c/li\u003e\n\u003cli\u003ePhone calls\u003c/li\u003e\n\u003cli\u003eEmails\u003c/li\u003e\n\u003cli\u003eSocial media\u003c/li\u003e\n\u003cli\u003eSearch engine results\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe costliest schemes typically involved fake bank security alerts. In those schemes, targets were prompted to transfer funds to “protect” their accounts.\u003c/p\u003e\n\n\u003ch2 id=\"reported-losses-by-impersonation-type\"\u003eReported losses by impersonation type\u003c/h2\u003e\n\n\u003cp\u003eThe FTC reported major losses from both business and government impersonation schemes. Victims lost nearly \u003cspan class=\"math inline\"\u003e\\(1 billion to business impersonators, with bank impersonators described as being behind the most lucrative scams. Victims also lost approximately \\)\u003c/span\u003e920 million to government impersonators.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that in March 2024, the FTC warned that scammers were impersonating FTC employees. Those scams pressured Americans through phone calls, email, or text messages into wiring or transferring money.\u003c/p\u003e\n\n\u003ch2 id=\"social-media-s-role\"\u003eSocial media’s role\u003c/h2\u003e\n\n\u003cp\u003eSocial media was described as the most cost-effective attack vector for impersonators. More than $2.1 billion in 2025 losses were traced to social platforms, an eightfold increase since 2020.\u003c/p\u003e\n\n\u003cp\u003eNearly one in three Americans who lost money in such scams were first contacted through social media. Facebook losses alone exceeded losses from text and email combined. WhatsApp and Instagram ranked second and third.\u003c/p\u003e\n\n\u003ch2 id=\"ftc-response-and-enforcement\"\u003eFTC response and enforcement\u003c/h2\u003e\n\n\u003cp\u003eChristopher Mufarrige, director of the FTC’s Bureau of Consumer Protection, said the FTC will use every available tool to combat government and business impersonation and protect the integrity of the digital economy.\u003c/p\u003e\n\n\u003cp\u003eThe article says the FTC’s Impersonation Rule took effect in April 2024. Since then, the FTC has brought a dozen enforcement actions, secured more than $70 million in consumer redress, and halted some imposter schemes.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several enforcement actions under the rule, including actions involving:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMediaAlpha, described as a government imposter scheme.\u003c/li\u003e\n\u003cli\u003eAmerican Tax Service, described as an IRS imposter scheme.\u003c/li\u003e\n\u003cli\u003eBlackstone Legal, described as a phantom debt business imposter scheme.\u003c/li\u003e\n\u003cli\u003eClick Profit, described as a business imposter money-making scam.\u003c/li\u003e\n\u003cli\u003eAccelerated Debt Settlement, described as a government and business imposter scheme.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe FTC also filed a complaint against Innovative Partners in April 2026. The complaint alleged that the company impersonated the government and insurance carriers to sell fraudulent health plans.\u003c/p\u003e\n\n\u003ch2 id=\"related-cybercrime-loss-reporting\"\u003eRelated cybercrime loss reporting\u003c/h2\u003e\n\n\u003cp\u003eThe article also references the FBI’s 2025 Internet Crime Report. According to the article, the FBI warned that U.S. victims lost almost $21 billion to cyber-enabled crimes throughout last year.\u003c/p\u003e\n","keyPoints":["The FTC warned that Americans lost $3.5 billion to imposter scams in 2025, with reported losses nearly tripling since 2020.","Imposter scams were the most reported fraud category in 2025, accounting for nearly one in three fraud reports filed with the FTC.","Victims lost nearly $1 billion to business impersonators and approximately $920 million to government impersonators, with fake bank security alerts among the costliest schemes.","Social media was linked to more than $2.1 billion in 2025 losses from imposter scams, and nearly one in three victims who lost money were first contacted through social media.","Since its Impersonation Rule took effect in April 2024, the FTC has brought a dozen enforcement actions, secured more than $70 million in consumer redress, and halted some imposter schemes."],"insights":["Facebook generated more reported imposter-scam losses than text messages and email combined, making it a higher-loss channel than two traditional fraud vectors together.","Bank impersonation was the most lucrative type of business impersonation scam, indicating that fake financial security alerts are especially effective at getting victims to move money.","Social media-linked imposter scam losses increased eightfold since 2020, far outpacing the overall near-tripling of imposter scam losses over the same period.","The FTC’s Impersonation Rule has already produced a dozen enforcement actions and more than $70 million in consumer redress, showing that impersonation-specific enforcement is now an active regulatory tool."],"referencedReports":[{"title":"2025 Internet Crime Report","url":"https://www.bleepingcomputer.com/news/security/fbi-americans-lost-a-record-21-billion-to-cybercrime-last-year/","publisher":"FBI","context":"The article says the FBI warned in its 2025 Internet Crime Report that U.S. victims lost almost $21 billion to cyber-enabled crimes last year.","category":"","primary":false}],"body":"\u003cp\u003eThe U.S. Federal Trade Commission warned that Americans lost $3.5 billion to imposter scams in 2025. Reported losses nearly tripled since 2020, and imposter scams were the most reported fraud category last year. The category accounted for nearly one in three fraud reports filed with the FTC.\u003c/p\u003e\n\n\u003cp\u003eFraudsters reached victims through text messages, phone calls, emails, social media, and search engine results. The costliest schemes typically involved fake bank security alerts that prompted targets to transfer funds to “protect” their accounts. Victims lost nearly \u003cspan class=\"math inline\"\u003e\\(1 billion to business impersonators and approximately \\)\u003c/span\u003e920 million to government impersonators.\u003c/p\u003e\n\n\u003cp\u003eSocial media was the most cost-effective attack vector for impersonators, with more than \u003cspan class=\"math inline\"\u003e\\(2.1 billion in 2025 losses traced to social platforms. Nearly one in three Americans who lost money in these scams were first contacted through social media, and Facebook losses exceeded those from text and email combined. Since its Impersonation Rule took effect in April 2024, the FTC has brought a dozen enforcement actions and secured more than \\)\u003c/span\u003e70 million in consumer redress.\u003c/p\u003e\n"},{"n":4,"title":"UK to require ID or face scan before you can make social media accounts","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/uk-to-require-id-or-face-scan-before-you-can-make-social-media-accounts/","time":"14:38","priority":"SHOULD READ","score":78,"tldr":"The UK plans to ban under-16s from major social media platforms by spring 2027, effectively requiring new users to prove their age with ID uploads or facial scans. Security and privacy experts warn the checks are easy to bypass with VPNs while creating major risks for identity and biometric data.","briefOverview":"\u003cp\u003eThe UK government plans to ban under-16s from social media, with regulations due before Christmas and the rules expected to take effect in spring 2027. Platforms will have to age-check users, meaning new account creation will likely require an ID upload or facial age scan. The article says this would effectively end anonymous new account creation in the UK, while long-standing accounts are largely exempt.\u003c/p\u003e\n\n\u003cp\u003eThe rules are modelled on Australia’s under-16 social media ban but are described as going further by restricting high-risk features across a wider range of services. Covered platforms include Instagram, YouTube, TikTok, Snapchat, Facebook and X, while messaging services such as WhatsApp and Signal and YouTube Kids are excluded. Restrictions on stranger contact and livestreaming would also apply by default to 16- and 17-year-olds.\u003c/p\u003e\n\n\u003cp\u003eSecurity and privacy experts cited in the article warn that the verification mechanisms may be easy for motivated minors to bypass and could expose users’ identity documents or biometric data to breaches. The article highlights VPN use as a major loophole because the Online Safety Act targets sites rather than users. It also notes that UK digital identity efforts, including GOV.UK Wallet and a digital driving licence, point toward age proof becoming more common for online access.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe UK government announced plans to ban under-16s from social media, with regulations due before Christmas and implementation expected in spring 2027. Prime Minister Keir Starmer said the government is “going further than any country in the world,” while Technology Secretary Liz Kendall framed the move as taking power away from tech companies and putting it back in parents’ hands. The government said its consultation drew more than 116,000 responses and that nine in ten parents backed an under-16 ban.\u003c/p\u003e\n\n\u003cp\u003eThe ban will cover user-to-user platforms whose purpose is social interaction and that run algorithmic feeds. The article names Instagram, YouTube, TikTok, Snapchat, Facebook and X as covered services, while WhatsApp, Signal and YouTube Kids are excluded. Educational services, e-commerce and music streaming are expected to have narrowly defined exemptions.\u003c/p\u003e\n\n\u003cp\u003eThe enforcement mechanism is age verification, and the article says new social media accounts will likely need to prove the user is over 16 through an ID upload or a facial age scan. Existing accounts may be treated as low-risk if they have been open for more than 16 years, have a credit card attached, are linked to an email already age-verified elsewhere, or were already verified under the Online Safety Act. The article describes this as a grandfathering approach that does little for new users or people seeking fresh pseudonymous accounts.\u003c/p\u003e\n\n\u003cp\u003eThe plan also includes wider restrictions on high-risk features, including livestreaming and strangers being able to contact children, across services such as Roblox. Those stranger-contact and livestreaming restrictions will be enabled by default for 16- and 17-year-olds to avoid what the government calls a “cliff-edge at 16.” AI “romantic companion” chatbots that simulate sexual or roleplay relationships will have to enforce an 18+ minimum, and the government is consulting on overnight curfews and breaks in infinite scrolling for under-18s.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies VPN use as a major enforcement gap because the Online Safety Act targets sites rather than users, meaning connecting through a server outside the UK can sidestep checks. It says VPN providers saw signup spikes of up to 1,800% after adult-site enforcement began, and that research in Australia found more than 60% of children were still using social media months after that country’s ban. The UK government has ruled out a blanket VPN ban but has examined options to age-restrict or limit children’s VPN use.\u003c/p\u003e\n\n\u003cp\u003eSecurity and privacy experts cited in the article argue that the controls create new risks while failing to reliably stop determined users. Dr. Siamak Shahandashti cited empirical work from Politecnico di Milano finding low-to-medium robustness for nearly every deployed age-verification method except credit-card checks. Dr. Richard Gomer warned that age-gating everyone exposes people to risks such as identity theft or blackmail if passports, driving licences, or biometric records leak, while the Open Rights Group warned that over-16s may have to surrender identity documents or biometric data to unregulated age-verification companies.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe UK government plans to ban under-16s from social media, with regulations due before Christmas and the rules expected to take effect in spring 2027. The government says platforms will need to age-check users to enforce the ban. In practice, the article says this means anyone opening a new account will likely need to prove they are over 16 by uploading an ID or passing a facial age scan.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central cybersecurity and privacy concern is that child-protection enforcement will require age-gating mechanisms that affect adults too, especially anyone creating a new account. Long-standing accounts are described as largely exempt, but fresh signups would lack the passive signals that allow platforms to treat an account as low-risk. The article says this effectively ends anonymous account creation in the UK for new social media accounts.\u003c/p\u003e\n\n\u003ch2 id=\"government-announcement-and-stated-rationale\"\u003eGovernment announcement and stated rationale\u003c/h2\u003e\n\n\u003cp\u003ePrime Minister Keir Starmer announced the plan on June 15 after a national consultation that drew more than 116,000 responses from parents, children and experts. The government said nine in ten parents supported an under-16 ban, and two-thirds of young people agreed that under-16s should be kept off at least some platforms.\u003c/p\u003e\n\n\u003cp\u003eStarmer said the UK was “going further than any country in the world” by banning social media for under-16s and adding wider protections. He also said, “Tech giants had their chance and failed.” Technology Secretary Liz Kendall similarly framed the policy as a response to tech companies’ failure to keep children safe and said it would put power back in parents’ hands.\u003c/p\u003e\n\n\u003ch2 id=\"services-and-features-covered\"\u003eServices and features covered\u003c/h2\u003e\n\n\u003cp\u003eThe ban is modelled on Australia’s social media age restrictions, which took effect in December 2025 and were the first of their kind. The UK rules will cover user-to-user platforms whose purpose is to enable social interaction and that run algorithmic feeds.\u003c/p\u003e\n\n\u003cp\u003eThe article names the following services as covered by the government’s description:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInstagram\u003c/li\u003e\n\u003cli\u003eYouTube\u003c/li\u003e\n\u003cli\u003eTikTok\u003c/li\u003e\n\u003cli\u003eSnapchat\u003c/li\u003e\n\u003cli\u003eFacebook\u003c/li\u003e\n\u003cli\u003eX\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says messaging services such as WhatsApp and Signal are explicitly excluded, as is YouTube Kids. It also says there will be a narrowly defined exemption list for educational services, e-commerce and music streaming.\u003c/p\u003e\n\n\u003cp\u003eThe UK says it will go further than Australia by restricting high-risk features across a wider range of services. These include livestreaming and strangers being able to contact children. The article gives Roblox as an example of a gaming site where the platform would remain available but features such as chat would be locked down.\u003c/p\u003e\n\n\u003cp\u003eTo avoid a “cliff-edge at 16,” stranger-contact and livestreaming restrictions will be enabled by default for 16- and 17-year-olds as well. Separately, AI “romantic companion” chatbots that simulate sexual or roleplay relationships will have to enforce an 18+ minimum, and intimate functions will be restricted for under-18s on AI chatbots more broadly. The government is also consulting on overnight curfews and breaks in infinite scrolling for under-18s, with more detail promised in July.\u003c/p\u003e\n\n\u003ch2 id=\"age-verification-and-impact-on-adults\"\u003eAge verification and impact on adults\u003c/h2\u003e\n\n\u003cp\u003eThe article says the government’s reassurance is that most adults will not face a fresh age check. A government fact sheet says an account can be treated as low-risk if it has been open for more than 16 years, has a credit card attached, or is linked to an email already age-verified elsewhere. Anyone already verified under the existing Online Safety Act would not need to verify again.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article emphasizes that this carve-out is effectively a grandfather clause and does not help new accounts. If someone creates a new social media account after the rules take effect, such as for a fresh pseudonymous handle or as a new user, those passive signals may not apply. The fallback described in the article is a facial recognition check or an ID upload.\u003c/p\u003e\n\n\u003cp\u003eThe article compares this to the adult-content regime under the Online Safety Act. Since July 25, 2025, adult and other sensitive sites have had to run “highly effective” age checks, typically an ID upload or facial-age selfie, for every user with no grandfathering. By February 2026, Ofcom had opened investigations into more than 90 platforms and issued six fines, with its remit stretching to Reddit, X, Discord, Bluesky and AI services.\u003c/p\u003e\n\n\u003cp\u003eThe article says the social media age gate does not go as far as the adult-content regime yet, but it normalises the same infrastructure. Ofcom has been asked to run a rapid study on how to verify whether someone is over 16.\u003c/p\u003e\n\n\u003ch2 id=\"vpn-loophole-and-enforcement-limits\"\u003eVPN loophole and enforcement limits\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies VPN use as a well-documented weakness in the enforcement model. Because the Online Safety Act targets sites rather than users, connecting through a server outside the UK can sidestep the check.\u003c/p\u003e\n\n\u003cp\u003eThe article says some VPN providers reported signup spikes of up to 1,800% when adult-site enforcement began. It also says Australia’s experience shows a similar gap, citing research that found more than 60% of children were still using social media months after that country’s ban.\u003c/p\u003e\n\n\u003cp\u003eThe UK government has limited room to close the loophole, according to the article. A blanket VPN ban for the whole population has been ruled out. In October 2025, Baroness Lloyd told the House of Lords there were “no current plans to ban the use of VPNs,” citing legitimate uses.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes a children-specific VPN clampdown as a separate issue. In February 2026, the government said its wellbeing consultation would examine “options to age restrict or limit children’s VPN use.” In January 2026, the House of Lords voted for an amendment that would have required ministers to prohibit VPN providers from serving UK children.\u003c/p\u003e\n\n\u003cp\u003eThe article says sorting children from adults under such a measure would in practice force VPN providers to age-check every user. The Commons rejected the amendment during parliamentary “ping-pong,” and the Act that received Royal Assent in April instead gave ministers broad power to restrict children’s online access by regulation. For now, the article says nothing stops a determined adult or a determined 15-year-old from getting around the rules.\u003c/p\u003e\n\n\u003ch2 id=\"security-and-privacy-concerns\"\u003eSecurity and privacy concerns\u003c/h2\u003e\n\n\u003cp\u003eThe cybersecurity objection described in the article is not to the goal of protecting children, but to the enforcement mechanism. Experts cited in the article argue that age verification creates new risks while the controls themselves do not reliably hold up.\u003c/p\u003e\n\n\u003cp\u003eDr. Siamak Shahandashti of the University of York pointed to empirical work from Politecnico di Milano testing age-verification methods used on adult sites. The researchers found low-to-medium robustness for nearly every method except credit-card checks. The article says most methods could be bypassed with tools and know-how within reach of “motivated minors.”\u003c/p\u003e\n\n\u003cp\u003eShahandashti quoted the researchers’ conclusion that mandated age verification currently functions as “compliance theatre.” He also said checks linked to real, physical ID could be made robust enough if clear standards were set.\u003c/p\u003e\n\n\u003cp\u003eDr. Richard Gomer of the University of Southampton focused on second-order risk. He said enforcing an under-16 ban means age-gating everyone, and that the process is itself dangerous. He warned that handing a passport or driving licence to platforms exposes people to identity theft or blackmail if those records leak.\u003c/p\u003e\n\n\u003cp\u003eThe article says this data-breach risk is not hypothetical. It cites the Open Rights Group warning that over-16s will now have to surrender identity documents or biometric data to unregulated age-verification companies. ORG pointed to Discord as a platform that already suffered a major data leak after introducing age checks.\u003c/p\u003e\n\n\u003cp\u003eJames Baker of ORG’s Platform Power and Freedom of Expression programme argued that the measures chase symptoms rather than the cause, which he identifies as engagement-driven business models that reward harmful content. He has also previously warned that the underlying powers were rushed through without proper time for political scrutiny.\u003c/p\u003e\n\n\u003ch2 id=\"platform-responses-and-alternative-approaches\"\u003ePlatform responses and alternative approaches\u003c/h2\u003e\n\n\u003cp\u003eThe article says platforms are not aligned with the government’s approach. Meta and YouTube argue that bans push teenagers toward less-regulated spaces rather than making them safer.\u003c/p\u003e\n\n\u003cp\u003eMeta also argues that age checks should happen on the device. The article presents this as an alternative to users handing ID to each service separately.\u003c/p\u003e\n\n\u003ch2 id=\"wider-direction-of-travel\"\u003eWider direction of travel\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that, since January 2025, the government has been building a GOV.UK Wallet and a digital driving licence. These are pitched partly as ways to prove age online and in person using facial-recognition features built into modern phones.\u003c/p\u003e\n\n\u003cp\u003eThe article says those efforts are separate from the social media announcement and predate it. However, it presents them together as suggesting a direction in which proving age becomes increasingly necessary for being online in the UK.\u003c/p\u003e\n\n\u003ch2 id=\"key-affected-parties-and-entities\"\u003eKey affected parties and entities\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the following affected or involved parties:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUK government, including Prime Minister Keir Starmer and Technology Secretary Liz Kendall.\u003c/li\u003e\n\u003cli\u003eOfcom, which already enforces Online Safety Act obligations and has been asked to study over-16 verification.\u003c/li\u003e\n\u003cli\u003eSocial media platforms including Instagram, YouTube, TikTok, Snapchat, Facebook and X.\u003c/li\u003e\n\u003cli\u003eMessaging services such as WhatsApp and Signal, which are excluded from the ban.\u003c/li\u003e\n\u003cli\u003eYouTube Kids, which is also excluded.\u003c/li\u003e\n\u003cli\u003eGaming and online services such as Roblox, where certain features may be restricted.\u003c/li\u003e\n\u003cli\u003eAI chatbot services, especially AI “romantic companion” chatbots with sexual or roleplay functions.\u003c/li\u003e\n\u003cli\u003eVPN providers, because VPN use can bypass UK site-based age checks.\u003c/li\u003e\n\u003cli\u003eAge-verification companies that may handle ID documents or biometric data.\u003c/li\u003e\n\u003cli\u003eResearchers and civil society groups including the University of York, University of Southampton, Politecnico di Milano and the Open Rights Group.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall significance\u003c/h2\u003e\n\n\u003cp\u003eThe article frames the proposed under-16 social media ban as both a child-safety measure and a major expansion of online age-verification infrastructure. Its most significant practical effect, as described, is that new UK social media accounts will likely require real-world age proof through ID or facial scanning.\u003c/p\u003e\n\n\u003cp\u003eAt the same time, the article says the approach has a known enforcement gap because VPNs can sidestep checks. It also stresses that the data required for verification creates security and privacy risks, including exposure of identity documents and biometric information if age-verification providers or platforms suffer breaches.\u003c/p\u003e\n","keyPoints":["The UK government plans to ban under-16s from social media, with regulations due before Christmas and the rules expected to take effect in spring 2027.","Platforms covered by the ban will include user-to-user services with algorithmic feeds such as Instagram, YouTube, TikTok, Snapchat, Facebook and X, while messaging services such as WhatsApp and Signal and YouTube Kids are excluded.","New social media accounts in the UK will likely require age verification through methods such as ID uploads or facial age scans, while many long-standing accounts may be treated as low-risk and avoid fresh checks.","The article says VPN use can sidestep age checks because the Online Safety Act targets sites rather than users, and Australia’s under-16 ban has reportedly still left more than 60% of children using social media months after implementation.","Security and privacy experts cited in the article warn that age verification methods can be bypassed by motivated minors and that collecting identity documents or biometric data creates risks of identity theft, blackmail and data breaches."],"insights":["The policy’s adult impact is concentrated on new account creation because older accounts can be treated as low-risk based on signals such as account age, attached credit cards, or prior age verification, while fresh pseudonymous accounts lack those signals.","The article highlights a tension in enforcement: closing the VPN workaround for children would likely require VPN providers to age-check users, extending the same identity-verification burden to another class of online services.","Researchers cited in the article found most deployed age-verification methods had only low-to-medium robustness, with credit-card checks standing out as the main exception.","The UK’s GOV.UK Wallet and digital driving licence efforts, while separate from the social media ban, are presented as part of a broader shift toward age proof becoming a routine prerequisite for online access.","Meta’s position that age checks should happen on-device reflects a privacy-relevant alternative to the current pattern of users submitting identity documents to multiple individual platforms or age-verification providers."],"referencedReports":[{"title":"More than 60% of Australian children still using social media despite ban for under-16s, research shows","url":"http://mollyrosefoundation.org/more-than-60-of-australian-children-still-using-social-media-despite-ban-for-under-16s-research-shows/","publisher":"Molly Rose Foundation","context":"The article cites this research to show that more than 60% of children in Australia were still using social media months after the country’s under-16 ban took effect.","category":"","primary":false},{"title":"Expert reaction to UK government announcing a ban on social media for under-16s","url":"https://www.sciencemediacentre.org/expert-reaction-to-uk-government-announcing-a-ban-on-social-media-for-under-16s-2/","publisher":"Science Media Centre","context":"The article links to this expert reaction while discussing cited empirical work from Politecnico di Milano on the robustness of age-verification methods used on adult sites.","category":"","primary":false}],"body":"\u003cp\u003eThe UK government plans to ban under-16s from social media, with regulations due before Christmas and the rules expected to take effect in spring 2027. Platforms will have to age-check users, meaning new account creation will likely require an ID upload or facial age scan. The article says this would effectively end anonymous new account creation in the UK, while long-standing accounts are largely exempt.\u003c/p\u003e\n\n\u003cp\u003eThe rules are modelled on Australia’s under-16 social media ban but are described as going further by restricting high-risk features across a wider range of services. Covered platforms include Instagram, YouTube, TikTok, Snapchat, Facebook and X, while messaging services such as WhatsApp and Signal and YouTube Kids are excluded. Restrictions on stranger contact and livestreaming would also apply by default to 16- and 17-year-olds.\u003c/p\u003e\n\n\u003cp\u003eSecurity and privacy experts cited in the article warn that the verification mechanisms may be easy for motivated minors to bypass and could expose users’ identity documents or biometric data to breaches. The article highlights VPN use as a major loophole because the Online Safety Act targets sites rather than users. It also notes that UK digital identity efforts, including GOV.UK Wallet and a digital driving licence, point toward age proof becoming more common for online access.\u003c/p\u003e\n"},{"n":27,"title":"Prevent npm and Python Supply Chain Attacks on Developer Machines with Package Configs","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/prevent-npm-and-python-supply-chain-attacks-on-developer-machines-with-package-configs","time":"21:05","priority":"SHOULD READ","score":78,"tldr":"StepSecurity launched Package Configs for Dev Machine Guard to show whether developer machines are actually using protected npm and PyPI registries, cooldown policies, and safe credential handling. The key takeaway is that supply chain defenses only work if every endpoint is correctly configured, because one laptop pointed at the public registry with exposed tokens can let worms like Miasma or Hades spread.","briefOverview":"\u003cp\u003eStepSecurity announced Package Configs, a new Dev Machine Guard feature that audits how developer machines fetch npm and Python packages. The article frames the launch against recent npm and PyPI supply chain attacks, including axios, TanStack, Shai-Hulud, Miasma, and Hades. These attacks share a pattern in which a trusted package ships a malicious version, installs on a developer machine, and runs with that developer’s access to steal secrets.\u003c/p\u003e\n\n\u003cp\u003eThe article says the strongest defenses include routing installs through an internal registry or Secure Registry that blocks known-compromised packages, plus a cooldown policy that delays newly published versions until they have been vetted. Package Configs is designed to show whether those controls are actually in effect across developer machines. It reports the effective registry, cooldown status, and registry credential exposure for npm, pnpm, bun, yarn, and pip configurations.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity says Miasma and Hades demonstrate why endpoint configuration matters, because these worms harvest npm or PyPI publishing tokens and republish infected package versions. The article warns that central policy does not guarantee endpoint enforcement, since project-level or user-level configuration can override registry settings or expose tokens. Package Configs aims to help teams identify machines fetching directly from public registries, lacking cooldown, or storing hardcoded registry tokens.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eStepSecurity introduced Package Configs as part of Dev Machine Guard to help organizations verify how developer machines are configured for npm and Python package installation. The article connects the feature to a series of recent supply chain attacks affecting npm and PyPI, including axios, TanStack, Shai-Hulud, Miasma, and Hades. It states that these campaigns rely on trusted packages shipping malicious versions that execute on developer machines and steal secrets stored there.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes two registry-level controls as the main defenses: internal or Secure Registries that block known-compromised packages, and cooldown policies that hold back newly published package versions until they have aged. According to the article, cooldown is effective because many malicious packages are discovered within roughly 24 hours of publication. However, these protections only help if each developer machine is actually configured to use them.\u003c/p\u003e\n\n\u003cp\u003ePackage Configs inventories package-manager configuration files across developer machines, including .npmrc, bunfig.toml, .yarnrc, .yarnrc.yml, and pip.conf. It covers JavaScript package managers such as npm, pnpm, bun, and yarn, as well as Python pip. The feature resolves the effective registry per device, accounts for precedence across global, user, and project scopes, and identifies where a registry value came from.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights configuration drift as a major risk. A project .npmrc can point npm directly to the public registry instead of an internal mirror, a device can lack cooldown support or configuration, and registry credentials may be hardcoded in config files rather than referenced from environment variables. StepSecurity says these endpoint-level gaps are not visible from a central policy dashboard because they live on individual machines.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed impact of the Miasma and Hades campaigns includes rapid package compromise and token theft. The article says the June 3 npm wave compromised 57 packages across more than 286 malicious versions in under two hours, and that Hades later appeared on PyPI, compromising ensmallen and roughly two dozen related machine-learning and bioinformatics packages. It also says a Miasma-related attack on Microsoft’s Azure organizations disabled 73 repositories on June 5.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity positions Package Configs as a response tool for active supply chain campaigns. It says teams can use it to find machines not behind a gateway, machines without cooldown, and machines carrying exposed static tokens. The feature is available in Dev Machine Guard under Developer Machines and is collected by the same lightweight agent deployed through existing MDM or EDR tooling on macOS, Windows, and Linux.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity announced Package Configs, a new feature in Dev Machine Guard that audits package-manager configuration across developer machines. The article presents the feature as a response to recent npm and PyPI supply chain attacks, including the axios and TanStack compromises, the Shai-Hulud worm, and the Miasma and Hades worms.\u003c/p\u003e\n\n\u003cp\u003eThe central issue described in the article is that malicious package versions can install on developer machines and execute with the developer’s access. These attacks can steal secrets stored on the machine, including registry publishing tokens. StepSecurity argues that the main risk applies to anyone who installs these compromised packages.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-article-says-the-problem-is-urgent\"\u003eWhy the article says the problem is urgent\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Miasma and Hades as self-replicating worms that use package registries as their distribution path. Once the worm lands on a developer machine, it harvests npm or PyPI publishing tokens and republishes infected versions of every package that token can publish. This turns each compromised developer into a new launch point.\u003c/p\u003e\n\n\u003cp\u003eThe article gives several examples of recent campaign activity:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn June 3, the Miasma npm wave compromised 57 packages across more than 286 malicious versions in under two hours.\u003c/li\u003e\n\u003cli\u003eOn June 5, a Miasma-related attack on Microsoft’s Azure organizations disabled 73 repositories.\u003c/li\u003e\n\u003cli\u003eOn June 8, the same actor surfaced on PyPI as Hades.\u003c/li\u003e\n\u003cli\u003eThe Hades campaign compromised ensmallen and roughly two dozen related machine-learning and bioinformatics packages.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eStepSecurity also references its research team’s work on several campaigns, including the Nx / s1ngularity compromise, the chalk and debug compromise, the Shai-Hulud worm, the Miasma npm wave, and the Hades PyPI campaign. The article says the Package Configs feature came directly out of that research.\u003c/p\u003e\n\n\u003ch2 id=\"core-defenses-described-in-the-article\"\u003eCore defenses described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies two registry-level controls as the strongest defenses against these supply chain attacks.\u003c/p\u003e\n\n\u003cp\u003eFirst, organizations can route every install through an internal registry or Secure Registry that blocks known-compromised packages. This creates a controlled path for package installation, where policy can be enforced and audit trails are available instead of every laptop reaching directly to the public registry.\u003c/p\u003e\n\n\u003cp\u003eSecond, organizations can use a cooldown policy that delays newly published package versions unt
