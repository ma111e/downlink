ulnerability or CVE tied to the reported campaign.\u003c/p\u003e\n\n\u003ch2 id=\"mitigation-recommendations\"\u003eMitigation Recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends that REDCap operators assemble a comprehensive inventory of their instances. It also recommends ensuring those instances are patched to the latest available version.\u003c/p\u003e\n\n\u003cp\u003eThe article cites REDCap’s own best-practices documentation, which says much of the security surrounding REDCap depends on the IT infrastructure and environment in which it is installed rather than on the software alone. It highlights the guidance that the web server and database server should typically be separate servers. It also highlights that the database server should be located securely behind a firewall.\u003c/p\u003e\n\n\u003cp\u003eThe article further recommends enforcing multi-factor authentication on administrator accounts at a minimum.\u003c/p\u003e\n\n\u003ch2 id=\"key-significance\"\u003eKey Significance\u003c/h2\u003e\n\n\u003cp\u003eThe main significance of the article is that Internet-facing REDCap servers are widely deployed and can hold sensitive research and clinical data. The article connects this exposure to a reported espionage campaign in which an externally facing REDCap server was used as the consistent initial access vector. It also shows that only a small percentage of observed deployments were running the apparent latest version, while many were running 16.x.x versions.\u003c/p\u003e\n","keyPoints":["Google’s Threat Intelligence Group attributed a year-plus espionage campaign against North American academic, medical, and military research institutions to UNC6508, a PRC-nexus actor.","UNC6508 used an externally facing REDCap server as the consistent initial access vector and deployed a webshell and INFINITERED, a PHP backdoor, although the initial access method is unconfirmed.","As of June 16, 2026, Censys observed just over 8,500 Internet-facing REDCap instances globally, with the largest concentrations in the United States, the United Kingdom, Germany, and Australia.","REDCap version 16.0.17 represented just over 30% of observed Internet-facing deployments, while version 17.1.3 appeared to be the latest available version and was observed on only 1.18% of instances.","The article recommends that REDCap operators inventory their instances, patch to the latest available version, follow infrastructure security best practices, and enforce multi-factor authentication on administrator accounts."],"insights":["REDCap patch management may be especially difficult for self-hosted academic users because available versions and rollout timing depend on each institution’s IT team.","Only 1.18% of observed Internet-facing REDCap instances were running version 17.1.3, which Censys identified as the apparent latest available version.","A plurality of observed REDCap instances were hosted in cloud environments, especially Amazon and Microsoft, rather than only on dedicated research or university networks.","REDCap’s own security guidance emphasizes that much of the platform’s security depends on the surrounding IT infrastructure, including separating web and database servers and placing the database server behind a firewall."],"referencedReports":[{"title":"PRC Targets US Medical Research","url":"http://cloud.google.com/blog/topics/threat-intelligence/prc-targets-us-medical-research","publisher":"Google Threat Intelligence Group","context":"The article cites this June 15, 2026 report as the basis for attributing a campaign against North American academic, medical, and military researchers to UNC6508.","category":"","primary":false}],"body":"\u003cp\u003eGoogle’s Threat Intelligence Group attributed a year-plus espionage campaign against North American academic, medical, and military research institutions to UNC6508, a PRC-nexus actor. The article says the consistent initial access vector was an externally facing REDCap server, though the initial access method remains unconfirmed. UNC6508 used the server to drop a webshell and deploy INFINITERED, a PHP backdoor.\u003c/p\u003e\n\n\u003cp\u003eREDCap is a browser-based research data collection and management platform that is often exposed to the Internet to support collaboration and participant access. Censys observed just over 8,500 REDCap instances globally as of June 16, 2026, with the largest share in the United States. The article highlights that REDCap commonly holds clinical trial data, participant records, and other sensitive research information.\u003c/p\u003e\n\n\u003cp\u003eCensys found that version 16.0.17 accounted for just over 30% of Internet-facing REDCap deployments, while the apparent latest version, 17.1.3, was present on only 1.18% of instances. The article recommends that operators inventory REDCap deployments, patch to the latest available version, follow infrastructure security best practices, and enforce multi-factor authentication for administrator accounts.\u003c/p\u003e\n"},{"n":11,"title":"ClickFix Campaigns Expand Malware Delivery With New Loaders and Fake Update Lures","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/clickfix-campaigns-expand-malware.html","time":"17:41","priority":"SHOULD READ","score":88,"tldr":"ClickFix social-engineering campaigns are expanding to deliver multiple new or evolving loaders, including BabaDeda Loader, Lorem Ipsum Loader, and Potemkin, which then deploy stealers, RATs, and ransomware-linked tooling. The key risk is that attackers are rapidly adapting delivery methods around simple user prompts to run malicious commands, making ClickFix an effective initial access technique across Windows and macOS.","briefOverview":"\u003cp\u003eCybersecurity researchers reported multiple ClickFix campaigns delivering three malware loaders: BabaDeda Loader, Lorem Ipsum Loader, and Potemkin. The activity was described in independent reports from Morphisec, BlueVoyant, and Huntress. The campaigns show continued use of ClickFix social engineering to persuade users to run attacker-supplied commands.\u003c/p\u003e\n\n\u003cp\u003eBabaDeda Loader activity observed in April 2026 targeted education and financial organizations and used PowerShell commands to deliver the loader. The loader can profile hosts, avoid Russian or Belarusian systems, check for security products, and inject payloads into trusted Windows processes such as svchost.exe. It was used to deliver information stealers, remote access trojans, DanaBot, and SectopRAT through techniques including hidden PowerShell, in-memory shellcode, DLL side-loading, and external payload storage.\u003c/p\u003e\n\n\u003cp\u003eOther ClickFix chains delivered Lorem Ipsum Loader through compromised WordPress sites and Potemkin through an MSI and HTA-based chain. Lorem Ipsum Loader was tied by BlueVoyant to Vanilla Tempest and can retrieve a backdoor that runs next-stage payloads, while Potemkin was described by Huntress as a custom x64 loader using a domain generation algorithm to find command-and-control infrastructure. The article states that ClickFix remains effective because it exploits users’ willingness to follow authoritative-looking instructions such as pressing Win+R, pasting a command, and running it.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers flagged several ClickFix campaigns that deliver BabaDeda Loader, Lorem Ipsum Loader, and Potemkin. The findings came from independent reports by Morphisec, BlueVoyant, and Huntress. The article describes ClickFix as a social engineering method that deceives users into running attacker-supplied commands, often presented as legitimate troubleshooting or update steps.\u003c/p\u003e\n\n\u003cp\u003eMorphisec reported BabaDeda Loader activity observed in April 2026 against education and financial organizations. The attack begins with ClickFix instructions that lead users to run PowerShell commands, after which the loader can drop information stealers and remote access trojans. The loader combines techniques such as hidden PowerShell, in-memory shellcode, DLL side-loading, and external payload storage, and it can avoid Russian or Belarusian systems before retrieving and injecting payloads into processes such as svchost.exe.\u003c/p\u003e\n\n\u003cp\u003eOne BabaDeda-delivered malware family is a .NET backdoor and information stealer that can collect system data, discover browser profiles, extract browser artifacts, traverse directories, read and exfiltrate files, capture screenshots, execute shell commands, and communicate with a command-and-control server. A second attack chain drops a ZIP archive that uses DLL side-loading to launch DanaBot and SectopRAT. Morphisec also described a staged loader component called Storage Crypter that reads payload material from external storage-like files such as List.Control.dat.\u003c/p\u003e\n\n\u003cp\u003eBlueVoyant reported that Lorem Ipsum Loader is being delivered through ClickFix lures hosted on at least five compromised WordPress sites spanning architecture, legal services, and construction technology. The campaign uses Microsoft Edge security update lures to run a malicious command that downloads a ZIP file and an outdated Node.js version to execute JavaScript payloads. BlueVoyant attributed the Lorem Ipsum ecosystem with high confidence to Vanilla Tempest, also known as Rapid Brigantine, Vice Society, and Vice Spider, and stated that the chain can culminate in established post-exploitation tooling and ransomware deployments, primarily Rhysida.\u003c/p\u003e\n\n\u003cp\u003eHuntress reported a third ClickFix chain that installs an MSI package and drops Potemkin through an HTML Application payload. Potemkin is described as a custom x64 loader that uses a domain generation algorithm, a built-in 1,000-word dictionary, victim identification through a UUID written to %LOCALAPPDATA%\\hyper-v.ver, task polling, DLL retrieval and execution, and a custom byte cipher. After access was established, the unknown threat actor configured Microsoft Defender exclusions, deployed Chisel reverse SOCKS tunnels, created a Cloudflare tunnel for persistent access, and moved laterally via WMIExec and SMBExec to reach a domain controller and propagate EtherRAT across more than 11 hosts.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that ClickFix remains effective because it relies on human behavior rather than highly complex technical exploitation. Huntress researchers said users may follow clear, authoritative-looking instructions such as pressing Win+R, pasting a command, and hitting Enter. The article also notes that Apple introduced a macOS Tahoe 26.4 security pop-up to warn users who attempt to paste commands into Terminal from websites, chat agents, messaging apps, or email apps.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers reported multiple ClickFix campaigns that deliver three malware loaders: BabaDeda Loader, Lorem Ipsum Loader, and Potemkin. The article cites independent reports from Morphisec, BlueVoyant, and Huntress as the basis for the findings. Across the campaigns, attackers use ClickFix social engineering to persuade users to run attacker-supplied commands that begin the infection chain.\u003c/p\u003e\n\n\u003cp\u003eThe campaigns are significant because they show attackers adapting ClickFix into multiple loader ecosystems. The article describes modern loader frameworks as increasingly modular, separating delivery, storage, execution, and payload deployment into distinct components. This structure is presented as more difficult for forensic visibility and automated analysis than a single monolithic malware component.\u003c/p\u003e\n\n\u003ch2 id=\"babadeda-loader-campaign\"\u003eBabaDeda Loader Campaign\u003c/h2\u003e\n\n\u003cp\u003eMorphisec reported BabaDeda Loader activity observed in April 2026 that targeted education and financial organizations. The attack starts with a ClickFix social engineering lure that deceives users into running attacker-supplied PowerShell commands. The loader is then used to deliver information stealers and remote access trojans.\u003c/p\u003e\n\n\u003cp\u003eThe article says BabaDeda Loader uses several known techniques, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHidden PowerShell.\u003c/li\u003e\n\u003cli\u003eIn-memory shellcode.\u003c/li\u003e\n\u003cli\u003eDLL side-loading.\u003c/li\u003e\n\u003cli\u003eExternal payload storage.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe activity is attributed to BabaDeda, a crypter service first documented by Morphisec in November 2021 in connection with campaigns targeting the cryptocurrency and Web3 sectors. Those earlier campaigns distributed information stealers, remote access trojans, and LockBit ransomware. Morphisec said the new framework keeps the same code genome but expands into a more capable loader built for stealth, evasion, and payload flexibility.\u003c/p\u003e\n\n\u003ch2 id=\"babadeda-loader-capabilities-and-payloads\"\u003eBabaDeda Loader Capabilities and Payloads\u003c/h2\u003e\n\n\u003cp\u003eBabaDeda Loader is designed to profile the host and avoid running on Russian or Belarusian systems. It also performs security product-related checks before retrieving the main payload. The article states that the loader can inject the payload into a trusted Windows process such as svchost.exe.\u003c/p\u003e\n\n\u003cp\u003eOne malware family delivered through BabaDeda Loader is a .NET backdoor and information stealer. It can harvest sensitive data and establish an encrypted channel to a command-and-control server. Its listed functions include collecting system information, discovering browser profiles, extracting browser cookies, browsing history, saved credentials, preferences, and local-state encryption keys, traversing directories, reading and exfiltrating files, capturing screenshots, executing shell commands or external processes, and transferring data to the C2 server.\u003c/p\u003e\n\n\u003cp\u003eA second BabaDeda-related attack chain drops a ZIP archive that uses DLL side-loading to launch DanaBot and SectopRAT, also known as ArechClient. The article highlights a staged loader component called Storage Crypter, which reads payload material from external storage-like files such as List.Control.dat. Morphisec said this design makes the visible application package appear legitimate while malicious payloads remain hidden in external containers until shortly before execution.\u003c/p\u003e\n\n\u003ch2 id=\"lorem-ipsum-loader-campaign\"\u003eLorem Ipsum Loader Campaign\u003c/h2\u003e\n\n\u003cp\u003eBlueVoyant reported an active ClickFix campaign that uses at least five compromised WordPress sites to deliver Lorem Ipsum Loader, described as a nascent loader and backdoor. The compromised sites span architecture, legal services, and construction technology. The article contrasts this campaign with prior opportunistic campaigns that used trojanized Microsoft Teams installers distributed through fake download portals promoted by SEO poisoning and malvertising.\u003c/p\u003e\n\n\u003cp\u003eThe loader is believed to have been active in the wild since February 2026. BlueVoyant said the pivot to ClickFix lures hosted on compromised WordPress sites broadens the potential victim pool and shows that the operators rapidly adapt their initial access techniques. The article links the change in delivery mechanism to Microsoft’s disruption of Fox Tempest, also known as Forging Marauder, which advertised a malware-signing-as-a-service operation using fraudulently signed Microsoft Trusted Signing certificates.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the loss of certificate supply made the previously signed-installer delivery model unviable. The operators then adopted a delivery mechanism that eliminated code signing entirely. The article presents this as an example of threat actors adapting to alternative delivery models after defender and law enforcement disruption efforts.\u003c/p\u003e\n\n\u003ch2 id=\"lorem-ipsum-loader-technical-chain-and-attribution\"\u003eLorem Ipsum Loader Technical Chain and Attribution\u003c/h2\u003e\n\n\u003cp\u003eBlueVoyant attributed the Lorem Ipsum ecosystem with high confidence to Vanilla Tempest, also known as Rapid Brigantine, Vice Society, and Vice Spider. The article states that this financially motivated threat actor is known for deploying ransomware families including Rhysida, BlackCat, Zeppelin, and Quantum Locker.\u003c/p\u003e\n\n\u003cp\u003eThe Lorem Ipsum attack chain uses ClickFix-style Microsoft Edge web browser security update lures. The lure causes users to run a malicious command that downloads a ZIP file and an outdated version of Node.js released in 2017, specifically version 7.10.1. The Node.js component is used to execute JavaScript-based payloads contained in the archive while minimizing chances of detection.\u003c/p\u003e\n\n\u003cp\u003eThe JavaScript payload acts as a dropper that deploys and executes additional malware components. These include a batch script that establishes persistence by launching a DLL side-loading chain. That chain executes a malicious DLL named mscoree.dll or msvcp140.dll, which decodes the embedded Lorem Ipsum Loader payload.\u003c/p\u003e\n\n\u003cp\u003eBlueVoyant said Lorem Ipsum Loader retrieves the next-stage Lorem Ipsum Backdoor from command-and-control infrastructure obtained from attacker-controlled profiles hosted on social networking platforms. The backdoor can run next-stage payloads received from the C2 server. BlueVoyant also said the chain culminates in handoff to Rapid Brigantine’s established post-exploitation tooling and ultimately to documented ransomware deployments, primarily Rhysida.\u003c/p\u003e\n\n\u003ch2 id=\"potemkin-rmmproject-and-etherrat-campaign\"\u003ePotemkin, RMMProject, and EtherRAT Campaign\u003c/h2\u003e\n\n\u003cp\u003eHuntress reported a third ClickFix campaign that installs an MSI package and then drops Potemkin through an HTML Application payload. Potemkin is a previously undocumented loader. It serves as a conduit for EtherRAT and RMMProject.\u003c/p\u003e\n\n\u003cp\u003eRMMProject is described as a Lua-scriptable DLL with modules that enable remote screen control and browser credential theft. The article states that RMMProject can get around Chromium’s App-Bound Encryption protections. It also implements a task dispatcher mechanism.\u003c/p\u003e\n\n\u003cp\u003eRMMProject capabilities described in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRunning a file or process.\u003c/li\u003e\n\u003cli\u003eTaking screenshots.\u003c/li\u003e\n\u003cli\u003eSiphoning browser autofill data.\u003c/li\u003e\n\u003cli\u003eExecuting arbitrary Lua scripts.\u003c/li\u003e\n\u003cli\u003eTerminating browser processes.\u003c/li\u003e\n\u003cli\u003eDownloading and running an additional module from a URL at runtime.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"potemkin-loader-capabilities-and-intrusion-activity\"\u003ePotemkin Loader Capabilities and Intrusion Activity\u003c/h2\u003e\n\n\u003cp\u003eHuntress researchers described Potemkin as a custom x64 loader that uses a domain generation algorithm to find its command-and-control infrastructure. It reflectively loads follow-on modules in memory. The activity was detected by Huntress in the month before the article was published.\u003c/p\u003e\n\n\u003cp\u003eThe loader includes components for several parts of the infection lifecycle. These include DGA-driven C2 discovery using a built-in 1,000-word dictionary, victim identification using a unique UUID written to %LOCALAPPDATA%\\hyper-v.ver, task polling, DLL retrieval and execution, and a custom byte cipher to protect C2 communication and the DGA dictionary.\u003c/p\u003e\n\n\u003cp\u003eAfter access was established, the unknown threat actor engaged in hands-on-keyboard activity. The article says the actor configured Microsoft Defender exclusions, deployed Chisel reverse SOCKS tunnels, conducted additional reconnaissance, set up a Cloudflare tunnel for persistent access, and moved laterally through WMIExec and SMBExec. The actor reached the domain controller and propagated EtherRAT across more than 11 hosts.\u003c/p\u003e\n\n\u003ch2 id=\"clickfix-as-an-enduring-technique\"\u003eClickFix as an Enduring Technique\u003c/h2\u003e\n\n\u003cp\u003eThe article states that ClickFix continues to be an effective method for targeting Windows and macOS users. It cites fraudulent bot verification screens used to deliver payloads such as Phexia Stealer, a macOS infostealer, and HellsUchecker, a backdoor delivered through EtherHiding. HellsUchecker is described as capable of executing files retrieved from C2 and reporting results back.\u003c/p\u003e\n\n\u003cp\u003eClickFix campaigns have also used interest in artificial intelligence tools to distribute fake MSI installers for Claude that run PowerShell payloads. Huntress researchers said ClickFix remains effective because it exploits human nature. They said users may follow clear, authoritative-looking instructions such as pressing Win+R, pasting a command, and hitting Enter.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes a platform response from Apple. Apple introduced a new security pop-up in macOS Tahoe 26.4 that warns users who attempt to paste commands into Terminal from websites, chat agents, messaging apps, or email apps. Apple said scammers use these channels to instruct people to paste malicious commands into Terminal to harm a Mac or compromise privacy.\u003c/p\u003e\n","keyPoints":["Cybersecurity researchers reported multiple ClickFix campaigns delivering three malware loaders named BabaDeda Loader, Lorem Ipsum Loader, and Potemkin.","BabaDeda Loader campaigns observed in April 2026 targeted education and financial organizations and used attacker-supplied PowerShell commands to deliver stealers and remote access trojans.","Lorem Ipsum Loader was delivered through compromised WordPress sites using ClickFix-style Microsoft Edge security update lures, and BlueVoyant attributed the ecosystem with high confidence to Vanilla Tempest.","Huntress reported a ClickFix attack chain that installed an MSI package and dropped the Potemkin loader, which served as a conduit for EtherRAT and RMMProject.","The article states that ClickFix remains effective because it persuades users to follow authoritative-looking instructions to run commands such as pressing Win+R, pasting a command, and hitting Enter."],"insights":["The Lorem Ipsum operators shifted from signed trojanized installers to ClickFix lures after Microsoft disrupted Fox Tempest’s fraudulent certificate supply, showing that takedowns can force rapid changes in initial access methods rather than stopping campaigns outright.","Modern loader frameworks in these campaigns separate delivery, storage, execution, and payload deployment into distinct components, which reduces forensic visibility and complicates automated analysis compared with monolithic malware.","Several chains deliberately use trusted or legitimate-looking components, including outdated Node.js, DLL side-loading, svchost.exe injection, compromised WordPress sites, and external storage-like payload containers, making detection based only on suspicious files or unsigned binaries less reliable.","Potemkin’s use of a domain generation algorithm with a built-in 1,000-word dictionary and custom byte cipher indicates that blocking fixed command-and-control domains may be insufficient against this campaign.","Apple’s new macOS warning for pasted Terminal commands directly targets the same user behavior that makes ClickFix effective: copying commands from websites, chat agents, messaging apps, or email into a command shell."],"referencedReports":[{"title":"What Is the BabaDeda Loader? Analysis of a New ClickFix Malware Campaign","url":"https://www.morphisec.com/blog/what-is-the-babadeda-loader-analysis-of-a-new-clickfix-malware-campaign/","publisher":"Morphisec","context":"The article cites Morphisec as one of the independent reports documenting ClickFix campaigns, specifically the BabaDeda Loader activity.","category":"","primary":false},{"title":"Lorem Ipsum ClickFix Rapid Brigantine","url":"https://www.bluevoyant.com/blog/orem-ipsum-clickfix-rapid-brigantine","publisher":"BlueVoyant","context":"The article cites BlueVoyant as one of the independent reports documenting ClickFix campaigns, specifically the Lorem Ipsum Loader activity.","category":"","primary":false},{"title":"Potemkin Loader, RMMProject, ClickFix Attack","url":"https://www.huntress.com/blog/potemkin-loader-rmmproject-clickfix-attack","publisher":"Huntress","context":"The article cites Huntress as one of the independent reports documenting ClickFix campaigns, specifically the Potemkin loader and RMMProject activity.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers reported multiple ClickFix campaigns delivering three malware loaders: BabaDeda Loader, Lorem Ipsum Loader, and Potemkin. The activity was described in independent reports from Morphisec, BlueVoyant, and Huntress. The campaigns show continued use of ClickFix social engineering to persuade users to run attacker-supplied commands.\u003c/p\u003e\n\n\u003cp\u003eBabaDeda Loader activity observed in April 2026 targeted education and financial organizations and used PowerShell commands to deliver the loader. The loader can profile hosts, avoid Russian or Belarusian systems, check for security products, and inject payloads into trusted Windows processes such as svchost.exe. It was used to deliver information stealers, remote access trojans, DanaBot, and SectopRAT through techniques including hidden PowerShell, in-memory shellcode, DLL side-loading, and external payload storage.\u003c/p\u003e\n\n\u003cp\u003eOther ClickFix chains delivered Lorem Ipsum Loader through compromised WordPress sites and Potemkin through an MSI and HTA-based chain. Lorem Ipsum Loader was tied by BlueVoyant to Vanilla Tempest and can retrieve a backdoor that runs next-stage payloads, while Potemkin was described by Huntress as a custom x64 loader using a domain generation algorithm to find command-and-control infrastructure. The article states that ClickFix remains effective because it exploits users’ willingness to follow authoritative-looking instructions such as pressing Win+R, pasting a command, and running it.\u003c/p\u003e\n"},{"n":22,"title":"Emerging Threat: (CVE-2026-27577) n8n Remote Code Execution via Workflow Expressions","source":"cycognito.com","sourceColorIdx":2,"link":"https://www.cycognito.com/blog/emerging-threat-cve-2026-27577-n8n-remote-code-execution-via-workflow-expressions/","time":"14:14","priority":"SHOULD READ","score":88,"tldr":"CVE-2026-27577 is a critical n8n sandbox-escape vulnerability that lets authenticated workflow editors execute commands on the host, putting exposed self-hosted and cloud instances at risk. Organizations should upgrade to patched versions 1.123.22, 2.9.3, or 2.10.1 or later and restrict access to n8n instances.","briefOverview":"\u003cp\u003eCVE-2026-27577 is a critical code injection flaw in n8n, an open-source workflow automation platform. The article says an authenticated user with permission to create or modify workflows can run system commands on the host through crafted workflow expressions. The vulnerability has a CVSS base score of 9.4 and affects both self-hosted deployments and n8n Cloud instances.\u003c/p\u003e\n\n\u003cp\u003eThe root cause is described as a sandbox escape in the restricted JavaScript environment used for expressions and code nodes. A flaw in the \u003ccode\u003ePrototypeSanitizer\u003c/code\u003e can allow attackers to reach host process internals using techniques such as spread operators and variable shadowing. Successful exploitation can result in full remote code execution with the privileges of the n8n service.\u003c/p\u003e\n\n\u003cp\u003eThe article says affected versions include n8n versions before 1.123.22, versions 2.0.0 through 2.9.2, and version 2.10.0. Patches have been available since February 25, 2026, and users should upgrade to 1.123.22, 2.9.3, 2.10.1, or later. Recommended actions include inventorying n8n instances, restricting workflow edit permissions, removing direct internet exposure, applying least privilege, limiting outbound connectivity, and monitoring execution logs.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCVE-2026-27577 is presented as a critical remote code execution issue in n8n, an open-source workflow automation platform. The vulnerability is a code injection flaw that allows an authenticated user with workflow creation or modification permissions to run system commands through crafted workflow expressions. The article emphasizes that exploitation does not require administrator-level access, only the routine privilege to build or edit workflows.\u003c/p\u003e\n\n\u003cp\u003eThe technical root cause is described as a sandbox escape in n8n’s expression and code-node evaluation environment. n8n evaluates user-supplied expressions and code nodes inside a restricted JavaScript environment, but a flaw in the \u003ccode\u003ePrototypeSanitizer\u003c/code\u003e can let an attacker access host process internals. The article names spread operators and variable shadowing as examples of techniques used to bypass the sandbox.\u003c/p\u003e\n\n\u003cp\u003eThe practical impact is full remote code execution on the host running n8n. According to the article, an attacker who exploits the flaw can execute arbitrary commands with the privileges of the n8n service. From that position, the article says attackers could exfiltrate data, move laterally, and establish persistence in automation infrastructure.\u003c/p\u003e\n\n\u003cp\u003eAffected assets include n8n versions before 1.123.22, versions 2.0.0 through 2.9.2, and version 2.10.0. Both self-hosted deployments and n8n Cloud instances are in scope. The article says exposed n8n instances are commonly reachable over TCP/5678 and may be fronted by a web application hostname.\u003c/p\u003e\n\n\u003cp\u003eThe article reports that CyCognito observed exposure across multiple sectors rather than concentrated in one industry. Industrials led the observed asset set at 17.2%, followed by Communication Services at 16.1%, but no single sector dominated. The article frames this as a visibility problem because self-hosted automation tools may be deployed quickly, remain internet-facing, and fall outside formal asset inventories.\u003c/p\u003e\n\n\u003cp\u003ePatches have been available since February 25, 2026, and the article says users should upgrade to n8n 1.123.22, 2.9.3, 2.10.1, or later. The fixes are documented in GitHub Security Advisories GHSA-v98v-ff95-f3cp and GHSA-vpcf-gvg4-6qwr. Recommended mitigations include inventorying all n8n instances, restricting workflow create and edit permissions, removing direct internet exposure, running n8n with least privilege, limiting outbound connectivity, and monitoring logs for unexpected use of code nodes or expressions.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes CVE-2026-27577 as a critical code injection vulnerability in n8n, an open-source workflow automation platform. It states that the flaw allows an authenticated user with permission to create or modify workflows to run system commands on the host through crafted workflow expressions.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability has a CVSS base score of 9.4, which the article characterizes as Critical. Although exploitation requires authentication, the required access level is only the ability to build or edit workflows, which the article says is a routine privilege for many n8n users.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe root cause is described as a sandbox escape. n8n evaluates user-supplied expressions and code nodes inside a restricted JavaScript environment, but the article says a flaw in the \u003ccode\u003ePrototypeSanitizer\u003c/code\u003e allows an attacker to reach host process internals.\u003c/p\u003e\n\n\u003cp\u003eThe article cites spread operators and variable shadowing as techniques that can be used in the sandbox bypass. Once the sandbox is bypassed, an attacker can execute arbitrary commands with the privileges of the n8n service.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that CVE-2026-27577 follows earlier expression-evaluation issues in the same parser. It frames this as evidence of a recurring weak spot rather than a one-off bug.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe practical impact described in the article is full remote code execution on the underlying host. After gaining command execution, an attacker could exfiltrate data, move laterally, and establish persistence in automation infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that n8n instances can be sensitive because teams use them to connect internal tools, CRMs, databases, and messaging systems. As a result, a single n8n host may hold credentials and have network reach into many other systems.\u003c/p\u003e\n\n\u003ch2 id=\"affected-assets\"\u003eAffected Assets\u003c/h2\u003e\n\n\u003cp\u003eThe article says the vulnerability affects:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003en8n versions before 1.123.22.\u003c/li\u003e\n\u003cli\u003en8n versions 2.0.0 through 2.9.2.\u003c/li\u003e\n\u003cli\u003en8n version 2.10.0.\u003c/li\u003e\n\u003cli\u003eBoth self-hosted deployments and n8n Cloud instances.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn practice, the article defines an affected asset as an n8n instance reachable over the web. It says these instances are commonly served on \u003ccode\u003eTCP/5678\u003c/code\u003e and are often fronted by a web application hostname.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-patterns\"\u003eExposure Patterns\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that observed exposure is spread across sectors. Industrials accounted for 17.2% of observed assets, while Communication Services accounted for 16.1%. No single sector dominated the observed exposure, and the largest named sector represented less than one-fifth of the total.\u003c/p\u003e\n\n\u003cp\u003eThe article says this flat distribution is notable because n8n is general-purpose automation tooling. It appears wherever teams need to connect systems together, so exposure is distributed across sectors with different operating models, including manufacturing, logistics, media, and consumer brands.\u003c/p\u003e\n\n\u003cp\u003eCyCognito frames the issue as a visibility problem rather than a sector-specific problem. The article says self-hosted automation platforms are easy to deploy and easy to forget, and they may not appear in formal asset inventories.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-fixes\"\u003eResponse and Fixes\u003c/h2\u003e\n\n\u003cp\u003eThe article states that n8n released patches on February 25, 2026. Affected users should upgrade to one of the following versions or later:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e1.123.22.\u003c/li\u003e\n\u003cli\u003e2.9.3.\u003c/li\u003e\n\u003cli\u003e2.10.1.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe fixes are documented in GitHub Security Advisories GHSA-v98v-ff95-f3cp and GHSA-vpcf-gvg4-6qwr. The article says CVE-2026-27577 was disclosed alongside a cluster of related expression-evaluation and sandbox-escape vulnerabilities patched in the same release, so one upgrade addresses multiple issues.\u003c/p\u003e\n\n\u003cp\u003eThe article advises defenders to confirm the running version directly rather than assuming a recent install is current. It also says any instance below the patched versions should be treated as exploitable.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-defensive-actions\"\u003eRecommended Defensive Actions\u003c/h2\u003e\n\n\u003cp\u003eUntil patching is confirmed, the article recommends that defenders:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInventory all n8n instances, including self-hosted servers outside central IT.\u003c/li\u003e\n\u003cli\u003eRestrict workflow create and edit permissions to fully trusted users.\u003c/li\u003e\n\u003cli\u003eRemove direct internet exposure and place instances behind a VPN or authenticated proxy.\u003c/li\u003e\n\u003cli\u003eRun n8n under a least-privilege service account with minimal host access.\u003c/li\u003e\n\u003cli\u003eLimit outbound network connectivity from the n8n host.\u003c/li\u003e\n\u003cli\u003eMonitor execution logs for unexpected use of code nodes or expressions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"cycognito-activity\"\u003eCyCognito Activity\u003c/h2\u003e\n\n\u003cp\u003eCyCognito says it published an Emerging Threat Advisory for CVE-2026-27577 in the CyCognito platform. The article also states that CyCognito is actively researching enhanced detection capabilities for this vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe article closes by directing readers to contact CyCognito for a demo to learn how the company can help organizations reduce external exposure and manage emerging threats.\u003c/p\u003e\n","keyPoints":["CVE-2026-27577 is a critical code injection flaw in n8n that allows an authenticated user with workflow create or edit permissions to run system commands on the host through crafted workflow expressions.","The vulnerability is caused by a sandbox escape in n8n’s expression and code-node evaluation environment, involving a flaw in the PrototypeSanitizer that can expose host process internals.","Affected versions include n8n versions before 1.123.22, versions 2.0.0 through 2.9.2, and version 2.10.0, covering both self-hosted deployments and n8n Cloud instances.","n8n released patches on February 25, 2026, and affected users should upgrade to version 1.123.22, 2.9.3, 2.10.1, or later.","The article recommends inventorying all n8n instances, restricting workflow creation and editing permissions, removing direct internet exposure, using least-privilege service accounts, limiting outbound connectivity, and monitoring execution logs."],"insights":["The risk is amplified because routine workflow editor permissions are sufficient for exploitation, meaning the vulnerable capability may be available to many normal n8n users rather than only administrators.","n8n instances can be especially high-value targets because they often store credentials and have network connectivity to CRMs, databases, messaging systems, and other internal tools.","The article highlights a visibility gap: self-hosted automation platforms may be deployed quickly by individual teams, remain internet-facing after their original use ends, and fall outside formal asset inventories.","Exposure is spread across sectors rather than concentrated in one industry, suggesting organizations should look for n8n based on external asset discovery rather than assuming sector-specific risk.","The vulnerability was patched alongside related expression-evaluation and sandbox-escape issues, indicating that upgrading once addresses a broader cluster of flaws in the same weak area."],"referencedReports":[],"body":"\u003cp\u003eCVE-2026-27577 is a critical code injection flaw in n8n, an open-source workflow automation platform. The article says an authenticated user with permission to create or modify workflows can run system commands on the host through crafted workflow expressions. The vulnerability has a CVSS base score of 9.4 and affects both self-hosted deployments and n8n Cloud instances.\u003c/p\u003e\n\n\u003cp\u003eThe root cause is described as a sandbox escape in the restricted JavaScript environment used for expressions and code nodes. A flaw in the \u003ccode\u003ePrototypeSanitizer\u003c/code\u003e can allow attackers to reach host process internals using techniques such as spread operators and variable shadowing. Successful exploitation can result in full remote code execution with the privileges of the n8n service.\u003c/p\u003e\n\n\u003cp\u003eThe article says affected versions include n8n versions before 1.123.22, versions 2.0.0 through 2.9.2, and version 2.10.0. Patches have been available since February 25, 2026, and users should upgrade to 1.123.22, 2.9.3, 2.10.1, or later. Recommended actions include inventorying n8n instances, restricting workflow edit permissions, removing direct internet exposure, applying least privilege, limiting outbound connectivity, and monitoring execution logs.\u003c/p\u003e\n"},{"n":2,"title":"Steam Workshop abused to spread malware via Wallpaper Engine app","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/steam-workshop-abused-to-spread-malware-via-wallpaper-engine-app/","time":"18:27","priority":"SHOULD READ","score":85,"tldr":"Threat actors are abusing Steam Workshop and Wallpaper Engine’s executable “application wallpapers” to deliver malware that steals Steam credentials, installs backdoors, runs miners, and deploys infostealers. Steam removed the samples Kaspersky found, but users should only install trusted Workshop content and scan downloads with updated antivirus tools.","briefOverview":"\u003cp\u003eThreat actors are abusing Steam Workshop, Valve’s community hub for game-related content, to distribute malware hidden in wallpaper packages for the Wallpaper Engine app. Kaspersky researchers said infected wallpapers can hijack Steam accounts, install a backdoor, or run cryptomining processes. The malicious content was found in application wallpapers, a Wallpaper Engine feature that uses executable Windows applications as desktop backgrounds.\u003c/p\u003e\n\n\u003cp\u003eKaspersky reported finding dozens of malicious application wallpapers on Steam Workshop, each already downloaded thousands or tens of thousands of times. The malware was bundled directly in the wallpaper package or placed inside password-protected archives that users were tricked into opening. Payloads could execute automatically when the user installed the wallpaper.\u003c/p\u003e\n\n\u003cp\u003eOne tested wallpaper posed as a game called NTRaholic and launched as expected while installing a DarkKomet backdoor in the background. Kaspersky also observed Lumma, Vidar, cryptocurrency miners, botnet loaders, RanEngine, and ransomware strains. Steam removed the malicious wallpaper applications identified by Kaspersky, but the researchers warned that new submissions are likely.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThreat actors are using Steam Workshop to spread malware through wallpaper packages designed for Wallpaper Engine, a desktop customization application available on Steam. Steam Workshop allows users to upload and download community-created content such as mods, maps, skins, tools, save files, and wallpapers. Kaspersky said the abuse targets Wallpaper Engine users through malicious wallpaper files uploaded to the platform.\u003c/p\u003e\n\n\u003cp\u003eWallpaper Engine supports several wallpaper types, including videos, interactive scenes, web pages, and applications. The application wallpaper type consists of executable Windows applications that Wallpaper Engine can set as the desktop background. Kaspersky warned that this feature represents a built-in security risk because it allows wallpaper content to include executable programs.\u003c/p\u003e\n\n\u003cp\u003eAccording to Kaspersky, attackers have exploited this security gap since at least late 2025 by uploading malicious wallpaper files to Steam Workshop and tricking users into installing them through Wallpaper Engine. The researchers found dozens of malicious application wallpapers, with each already downloaded thousands or tens of thousands of times. The malware was either bundled directly in the package or hidden inside password-protected archives that users were tricked into opening.\u003c/p\u003e\n\n\u003cp\u003eThe payloads reportedly execute automatically when the user installs the wallpaper. In one test case, Kaspersky examined a wallpaper posing as a game called NTRaholic, which launched normally to reduce suspicion while installing a DarkKomet backdoor in the background. The wallpaper also installed a custom version of AggregatorHost.dll that searched for Steam accounts on the computer and stole account credentials.\u003c/p\u003e\n\n\u003cp\u003eKaspersky found other cases involving Lumma, Vidar, cryptocurrency miners, botnet loaders, RanEngine, and ransomware strains, indicating that multiple threat actors abused Wallpaper Engine. The potential impacts included Steam account hijacking, system compromise through a backdoor, and cryptomining activity. Steam identified and removed all malicious wallpaper applications reported by Kaspersky.\u003c/p\u003e\n\n\u003cp\u003eAlthough the identified wallpapers were removed, Kaspersky warned that attackers are likely to submit new malicious wallpapers. The researchers recommended that users download content only from trusted sources and scan anything fetched from Steam Workshop with an up-to-date antivirus product. The article presents the issue as an abuse of Steam Workshop and Wallpaper Engine rather than a single isolated malware family.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThreat actors are abusing Steam Workshop to distribute malware hidden in wallpaper packages for Wallpaper Engine, a desktop customization application available on Steam. Steam Workshop is Valve’s built-in community content-sharing platform where users can upload and download content such as mods, maps, skins, save files, tools, and wallpapers. Kaspersky researchers reported that malicious wallpapers uploaded to Steam Workshop can lead to Steam account hijacking, system compromise through a backdoor, or cryptomining activity.\u003c/p\u003e\n\n\u003ch2 id=\"targeted-platform-and-feature\"\u003eTargeted Platform and Feature\u003c/h2\u003e\n\n\u003cp\u003eThe abuse centers on Wallpaper Engine, which has nearly a million reviews according to the article. Wallpaper Engine supports four wallpaper types:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVideos.\u003c/li\u003e\n\u003cli\u003eInteractive scenes.\u003c/li\u003e\n\u003cli\u003eWeb pages that can play audio and video.\u003c/li\u003e\n\u003cli\u003eApplications.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe application wallpaper type is the key focus of the report. These wallpapers are executable Windows applications that can include games, desktop widgets, and system monitoring tools. Kaspersky warned that this feature creates a built-in security risk because executable applications can be packaged as wallpapers and run on user systems.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-malicious-wallpapers-were-delivered\"\u003eHow the Malicious Wallpapers Were Delivered\u003c/h2\u003e\n\n\u003cp\u003eKaspersky said attackers have taken advantage of this security gap since at least late 2025. The attackers uploaded malicious wallpaper files to Steam Workshop and tricked users into installing them through Wallpaper Engine. The researchers found dozens of malicious application wallpapers on Steam Workshop, and each had already been downloaded thousands or tens of thousands of times.\u003c/p\u003e\n\n\u003cp\u003eThe malware delivery methods observed by Kaspersky included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMalware bundled directly in the wallpaper package.\u003c/li\u003e\n\u003cli\u003eMalware placed inside password-protected archives that users were tricked into opening.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to the researchers, the payloads execute automatically when the user installs the wallpaper.\u003c/p\u003e\n\n\u003ch2 id=\"example-analyzed-by-kaspersky\"\u003eExample Analyzed by Kaspersky\u003c/h2\u003e\n\n\u003cp\u003eKaspersky tested one wallpaper that posed as a game called NTRaholic. The wallpaper launched as expected when executed, which reduced suspicion. At the same time, it installed a backdoor file in the background that belonged to the DarkKomet malware family.\u003c/p\u003e\n\n\u003cp\u003eThe same case also involved a custom version of a system library named AggregatorHost.dll. Kaspersky said this file was installed to search for Steam accounts on the computer and steal account credentials.\u003c/p\u003e\n\n\u003ch2 id=\"malware-families-and-payload-types-observed\"\u003eMalware Families and Payload Types Observed\u003c/h2\u003e\n\n\u003cp\u003eKaspersky found multiple cases involving several malware families and payload types. The article names the following:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDarkKomet.\u003c/li\u003e\n\u003cli\u003eLumma.\u003c/li\u003e\n\u003cli\u003eVidar.\u003c/li\u003e\n\u003cli\u003eCryptocurrency miners.\u003c/li\u003e\n\u003cli\u003eBotnet loaders.\u003c/li\u003e\n\u003cli\u003eRanEngine.\u003c/li\u003e\n\u003cli\u003eRansomware strains.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe variety of payloads showed that Wallpaper Engine was abused by multiple threat actors, according to the article.\u003c/p\u003e\n\n\u003ch2 id=\"impact-on-users\"\u003eImpact on Users\u003c/h2\u003e\n\n\u003cp\u003eThe article describes several potential impacts from infected wallpapers. These include hijacking Steam accounts, compromising systems with a backdoor, and running cryptomining processes. In the NTRaholic example, the malicious wallpaper installed a DarkKomet backdoor and deployed a custom AggregatorHost.dll component intended to steal Steam account credentials.\u003c/p\u003e\n\n\u003cp\u003eBecause some wallpapers had already been downloaded thousands or tens of thousands of times, the malicious packages had reached a significant number of Steam Workshop users before removal.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eSteam identified and removed all malicious wallpaper applications that Kaspersky reported. However, Kaspersky warned that threat actors are likely to submit new malicious wallpaper applications. The article states that users should download content from trusted sources and scan anything fetched from Steam Workshop with an up-to-date antivirus product.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe central issue is that Wallpaper Engine’s application wallpaper feature allows executable Windows applications to be used as desktop backgrounds, and attackers abused that capability through Steam Workshop. Kaspersky’s findings show that malicious wallpapers were used to deliver backdoors, infostealers, miners, botnet loaders, RanEngine, and ransomware strains, with Steam account theft among the observed goals.\u003c/p\u003e\n","keyPoints":["Threat actors are abusing Steam Workshop to distribute malware hidden in wallpaper packages for the Wallpaper Engine application on Steam.","Kaspersky researchers found dozens of malicious application wallpapers on Steam Workshop, with some downloaded thousands or tens of thousands of times.","The malicious wallpapers can execute payloads automatically when installed and have been observed delivering backdoors, infostealers, cryptocurrency miners, botnet loaders, RanEngine, and ransomware strains.","In one tested case, a wallpaper posing as a game called NTRaholic installed a DarkKomet backdoor and a custom AggregatorHost.dll library designed to search for Steam accounts and steal credentials.","Steam identified and removed all malicious wallpaper applications reported by Kaspersky, but Kaspersky warned that threat actors are likely to submit new ones."],"insights":["Wallpaper Engine’s application wallpaper feature creates a distinct risk because these wallpapers are executable Windows applications rather than passive visual assets.","Malicious wallpapers used deception beyond hiding payloads, including launching expected content such as a game to reduce user suspicion while installing malware in the background.","Some payloads were placed in password-protected archives, showing that users may be socially engineered into opening bundled files rather than being compromised only through direct execution.","The abuse was not limited to one malware campaign, as Kaspersky observed multiple malware families and payload types across different malicious wallpapers.","Removal of known malicious wallpapers does not eliminate the risk because Kaspersky warned that attackers are likely to upload new malicious submissions to Steam Workshop."],"referencedReports":[{"title":"Dozens of malicious wallpapers found on Steam Workshop","url":"https://securelist.com/dozens-of-malicious-wallpapers-found-on-steam-workshop/120186/","publisher":"Kaspersky","context":"The article is based on Kaspersky research describing malicious Wallpaper Engine application wallpapers distributed through Steam Workshop.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors are abusing Steam Workshop, Valve’s community hub for game-related content, to distribute malware hidden in wallpaper packages for the Wallpaper Engine app. Kaspersky researchers said infected wallpapers can hijack Steam accounts, install a backdoor, or run cryptomining processes. The malicious content was found in application wallpapers, a Wallpaper Engine feature that uses executable Windows applications as desktop backgrounds.\u003c/p\u003e\n\n\u003cp\u003eKaspersky reported finding dozens of malicious application wallpapers on Steam Workshop, each already downloaded thousands or tens of thousands of times. The malware was bundled directly in the wallpaper package or placed inside password-protected archives that users were tricked into opening. Payloads could execute automatically when the user installed the wallpaper.\u003c/p\u003e\n\n\u003cp\u003eOne tested wallpaper posed as a game called NTRaholic and launched as expected while installing a DarkKomet backdoor in the background. Kaspersky also observed Lumma, Vidar, cryptocurrency miners, botnet loaders, RanEngine, and ransomware strains. Steam removed the malicious wallpaper applications identified by Kaspersky, but the researchers warned that new submissions are likely.\u003c/p\u003e\n"},{"n":14,"title":"Google Vertex AI SDK Flaw Let Attackers Hijack Model Uploads via Bucket Squatting","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/google-vertex-ai-sdk-flaw-let-attackers.html","time":"19:05","priority":"SHOULD READ","score":84,"tldr":"A flaw in the Google Cloud Vertex AI Python SDK allowed attackers to squat predictable staging bucket names, hijack model uploads, and swap in malicious pickle/joblib models that executed code in Google’s serving infrastructure. Google has patched the issue, and users should update to google-cloud-aiplatform 1.148.0 or later and set a staging bucket they control.","briefOverview":"\u003cp\u003eA flaw in the Google Cloud Vertex AI SDK for Python allowed an attacker with no access to a victim’s project to hijack machine learning model uploads and run code inside Google’s serving infrastructure. Palo Alto Networks Unit 42 found and reported the issue through Google’s bug bounty program and called the technique “Pickle in the Middle.” Unit 42 said it saw no exploitation in the wild, and Google has patched the flaw.\u003c/p\u003e\n\n\u003cp\u003eThe issue came from the SDK’s use of predictable temporary Cloud Storage bucket names when users did not set a bucket. Because the SDK checked whether the bucket existed but not whether the victim owned it, an attacker could create the expected bucket first and receive the victim’s uploaded model files. The attacker could then replace the model with a malicious pickle or joblib file that executed code when Vertex AI loaded it.\u003c/p\u003e\n\n\u003cp\u003eUnit 42’s proof of concept used a Cloud Function to replace the uploaded model in 1.4 seconds, within the roughly 2.5-second window before Vertex AI read the file. The payload stole an OAuth token from the serving container’s metadata server, and in Unit 42’s test environment the token could access other artifacts and metadata in the same Google-managed tenant project. Users are advised to update to google-cloud-aiplatform version 1.148.0 or later and set an explicit staging_bucket they control.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA vulnerability in the Google Cloud Vertex AI SDK for Python allowed attackers to hijack machine learning model uploads and execute code inside Google’s serving infrastructure. Palo Alto Networks Unit 42 discovered and reported the flaw through Google’s Vulnerability Reward Program. Unit 42 named the technique “Pickle in the Middle” and said it observed no exploitation in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe attack required only a Google Cloud project controlled by the attacker and the victim’s project ID, which the article says is often public. It did not require credentials, phishing, or an existing foothold in the target environment. The attack worked under specific conditions: the victim’s default staging bucket did not already exist in the region, and the victim left the staging_bucket parameter unset.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerable SDK behavior involved temporary Cloud Storage bucket selection for model uploads. If a user did not set a bucket, the SDK generated a predictable name from the project ID and region, such as project-vertex-staging-region. It checked whether that bucket existed, but not whether the victim owned it, enabling bucket squatting because Cloud Storage bucket names are globally unique.\u003c/p\u003e\n\n\u003cp\u003eAfter creating the expected bucket in their own project, an attacker could receive the victim’s model files and replace them with a malicious model. The article notes that many Python machine learning models use pickle or joblib, which can run code when a file is loaded. When Vertex AI later loaded the swapped model, the attacker’s code executed inside the serving container.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 measured about 2.5 seconds between the victim’s upload and Vertex AI reading the file. In its proof of concept, the attacker used a Cloud Function triggered after upload to replace the model in 1.4 seconds. The payload stole an OAuth token from the serving container’s metadata server, and in Unit 42’s test environment that token could access other model artifacts, BigQuery metadata, access lists, tenant logs, GKE cluster names, and internal container image paths.\u003c/p\u003e\n\n\u003cp\u003eGoogle shipped an initial fix in version 1.144.0 by adding a random uuid4 to the bucket name, then completed the fix in version 1.148.0 by adding bucket ownership verification to Model.upload(). Users are advised to update to version 1.148.0 or later and set an explicit staging_bucket to a Cloud Storage location they control. The article also notes that this was the second predictable-bucket-name flaw to surface in Vertex AI this year, following CVE-2026-2473 in Vertex AI Experiments.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA flaw in the Google Cloud Vertex AI SDK for Python allowed an attacker with no access to a victim’s project to hijack a machine learning model upload and run code inside Google’s serving infrastructure. Palo Alto Networks Unit 42 discovered and reported the bug through Google’s bug bounty program. Unit 42 calls the technique “Pickle in the Middle” and said it saw no exploitation in the wild.\u003c/p\u003e\n\n\u003cp\u003eGoogle has patched the issue. The article advises users of the SDK to update to version 1.148.0 or later.\u003c/p\u003e\n\n\u003ch2 id=\"core-technical-issue\"\u003eCore technical issue\u003c/h2\u003e\n\n\u003cp\u003eThe flaw was in how the SDK selected a temporary Cloud Storage bucket for model uploads. If a user did not set a bucket, the SDK generated a predictable bucket name from the project ID and region, such as project-vertex-staging-region.\u003c/p\u003e\n\n\u003cp\u003eThe SDK checked whether that bucket existed, but it did not verify whether the victim owned it. Because Cloud Storage bucket names are globally unique, an attacker could create the expected bucket first in their own Google Cloud project.\u003c/p\u003e\n\n\u003cp\u003eOnce the attacker created the expected bucket, the victim’s SDK would upload model files to the attacker-controlled bucket. The attacker could then replace the uploaded model with a malicious one.\u003c/p\u003e\n\n\u003ch2 id=\"required-attacker-knowledge-and-conditions\"\u003eRequired attacker knowledge and conditions\u003c/h2\u003e\n\n\u003cp\u003eThe attacker needed only:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA Google Cloud project of their own.\u003c/li\u003e\n\u003cli\u003eThe victim’s project ID, which the article says is often public.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the attacker did not need credentials, phishing, or a foothold in the target.\u003c/p\u003e\n\n\u003cp\u003eThe attack worked only under specific conditions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe victim’s default staging bucket did not already exist in that region.\u003c/li\u003e\n\u003cli\u003eThe victim left the staging_bucket parameter unset.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that the first condition is common for a new project in Vertex AI in a region, while the second depends on the developer relying on the SDK’s default instead of naming their own bucket.\u003c/p\u003e\n\n\u003ch2 id=\"model-replacement-and-code-execution\"\u003eModel replacement and code execution\u003c/h2\u003e\n\n\u003cp\u003eMany Python machine learning models are saved with pickle or joblib. The article notes that these formats can run code when a file is loaded.\u003c/p\u003e\n\n\u003cp\u003eIn this attack path, after the victim uploaded model files to the attacker-controlled bucket, the attacker replaced the model with a malicious pickle or joblib model. When Vertex AI later loaded the swapped model, the attacker’s code executed inside the serving container.\u003c/p\u003e\n\n\u003ch2 id=\"timing-of-the-proof-of-concept\"\u003eTiming of the proof of concept\u003c/h2\u003e\n\n\u003cp\u003eThe attack depended on speed. Unit 42 measured about 2.5 seconds between the victim’s upload and Vertex AI reading the file.\u003c/p\u003e\n\n\u003cp\u003eIn its proof of concept, Unit 42 used a Cloud Function that triggered after upload and replaced the model in 1.4 seconds. This occurred before Vertex AI read the file.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-in-unit-42-s-test-environment\"\u003eDisclosed impact in Unit 42’s test environment\u003c/h2\u003e\n\n\u003cp\u003eThe payload in Unit 42’s proof of concept stole an OAuth token from the serving container’s metadata server and sent it to the attacker. In Unit 42’s test environment, the token was not limited to the compromised deployment.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the token could access other resources in the same Google-managed tenant project, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOther model artifacts.\u003c/li\u003e\n\u003cli\u003eA full TensorFlow model with trained weights.\u003c/li\u003e\n\u003cli\u003eBigQuery metadata.\u003c/li\u003e\n\u003cli\u003eAccess lists.\u003c/li\u003e\n\u003cli\u003eTenant logs.\u003c/li\u003e\n\u003cli\u003eGKE cluster names.\u003c/li\u003e\n\u003cli\u003eInternal container image paths.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"discovery-and-remediation-timeline\"\u003eDiscovery and remediation timeline\u003c/h2\u003e\n\n\u003cp\u003eUnit 42 reported the flaw through Google’s Vulnerability Reward Program on March 5, 2026. It tested versions 1.139.0 and 1.140.0, which were the latest available at the time, and found both vulnerable.\u003c/p\u003e\n\n\u003cp\u003eGoogle shipped an initial fix in version 1.144.0 on March 31. That change added a random uuid4 to the bucket name.\u003c/p\u003e\n\n\u003cp\u003eGoogle completed the fix in version 1.148.0 on April 15. That version added bucket ownership verification to block bucket squatting in Model.upload().\u003c/p\u003e\n\n\u003cp\u003eAs of publication, neither Unit 42 nor Google’s Vertex AI security bulletins listed a CVE for the issue.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions-from-the-article\"\u003eRecommended actions from the article\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends updating to version 1.148.0 or later so the bucket ownership check is active. It also recommends setting an explicit staging_bucket to a Cloud Storage location controlled by the user when uploading models.\u003c/p\u003e\n\n\u003cp\u003eBecause the flawed logic resides in the client SDK, the article says organizations should check the google-cloud-aiplatform version wherever it runs. This includes notebooks, CI jobs, and training pipelines, not only production services.\u003c/p\u003e\n\n\u003ch2 id=\"related-vertex-ai-issue\"\u003eRelated Vertex AI issue\u003c/h2\u003e\n\n\u003cp\u003eThe article states that this is the second predictable-bucket-name flaw to surface in Vertex AI this year. Google patched CVE-2026-2473 in February, a separate bucket-squatting bug in Vertex AI Experiments.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, CVE-2026-2473 also allowed cross-tenant code execution, model theft, and poisoning. The article also references Unit 42’s earlier work on Vertex AI’s default service-agent permissions, which traced a related path from a deployed AI agent into customer and tenant data.\u003c/p\u003e\n","keyPoints":["A flaw in the Google Cloud Vertex AI SDK for Python allowed an attacker with no access to a victim’s project to hijack machine learning model uploads and run code inside Google’s serving infrastructure.","The vulnerability occurred because the SDK generated predictable temporary Cloud Storage bucket names from the project ID and region and checked whether the bucket existed but not whether the victim owned it.","Unit 42 said an attacker could create the expected bucket first, receive the victim’s uploaded model files, and replace them with a malicious pickle or joblib model before Vertex AI loaded the file.","In Unit 42’s proof of concept, the malicious payload stole an OAuth token from the serving container’s metadata server and used it to access other resources in the same Google-managed tenant project.","Google fixed the issue by adding randomness to bucket names in version 1.144.0 and bucket ownership verification in version 1.148.0, and users are advised to update to 1.148.0 or later."],"insights":["The attack required only the victim’s project ID, which is often public, making the barrier to targeting low even without credentials, phishing, or a foothold in the victim environment.","The exploit was time-sensitive but practical, as Unit 42 measured about 2.5 seconds between upload and model loading and replaced the model in 1.4 seconds using a Cloud Function trigger.","The stolen OAuth token in Unit 42’s test was not limited to the compromised deployment and could access other model artifacts and metadata in the same Google-managed tenant project.","The affected SDK may run outside production services, so organizations need to check google-cloud-aiplatform versions in notebooks, CI jobs, and training pipelines as well."],"referencedReports":[{"title":"Hijacking Vertex AI Model Uploads","url":"https://unit42.paloaltonetworks.com/hijacking-vertex-ai-model/","publisher":"Palo Alto Networks Unit 42","context":"The article says Unit 42 found and reported the Vertex AI SDK flaw and links to its technical write-up describing the “Pickle in the Middle” technique.","category":"","primary":false},{"title":"Vertex AI Security Bulletins","url":"https://cloud.google.com/vertex-ai/docs/security-bulletins","publisher":"Google Cloud","context":"The article references Google’s Vertex AI security bulletins when noting that no CVE was listed for this issue and that Google patched CVE-2026-2473 in February.","category":"","primary":false}],"body":"\u003cp\u003eA flaw in the Google Cloud Vertex AI SDK for Python allowed an attacker with no access to a victim’s project to hijack machine learning model uploads and run code inside Google’s serving infrastructure. Palo Alto Networks Unit 42 found and reported the issue through Google’s bug bounty program and called the technique “Pickle in the Middle.” Unit 42 said it saw no exploitation in the wild, and Google has patched the flaw.\u003c/p\u003e\n\n\u003cp\u003eThe issue came from the SDK’s use of predictable temporary Cloud Storage bucket names when users did not set a bucket. Because the SDK checked whether the bucket existed but not whether the victim owned it, an attacker could create the expected bucket first and receive the victim’s uploaded model files. The attacker could then replace the model with a malicious pickle or joblib file that executed code when Vertex AI loaded it.\u003c/p\u003e\n\n\u003cp\u003eUnit 42’s proof of concept used a Cloud Function to replace the uploaded model in 1.4 seconds, within the roughly 2.5-second window before Vertex AI read the file. The payload stole an OAuth token from the serving container’s metadata server, and in Unit 42’s test environment the token could access other artifacts and metadata in the same Google-managed tenant project. Users are advised to update to google-cloud-aiplatform version 1.148.0 or later and set an explicit staging_bucket they control.\u003c/p\u003e\n"},{"n":17,"title":"Multiple JetBrains IDE plugins caught stealing AI keys","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/multiple-jetbrains-ide-plugins-caught-stealing-ai-keys","time":"19:48","priority":"SHOULD READ","score":84,"tldr":"A coordinated malware campaign on the JetBrains Marketplace used at least 15 fake AI assistant plugins to steal users’ AI provider API keys when they were entered into plugin settings. The plugins, installed nearly 70,000 times, exfiltrated keys to a hardcoded attacker server and may have resold stolen access to paying users.","briefOverview":"\u003cp\u003eAikido detected a coordinated malware campaign on the JetBrains Marketplace involving at least 15 IDE plugins published under seven vendor accounts. The plugins posed as AI coding assistants built on DeepSeek and other large language models, offering features such as chat, commit messages, code review, bug finding, and unit tests. Together, the plugins were installed close to 70,000 times, although the article notes that download counts can be inflated and listings contained fake five-star reviews.\u003c/p\u003e\n\n\u003cp\u003eThe malicious behavior centered on AI provider API keys that users pasted into the plugins’ settings. When a user clicked Apply, the plugin stored the key and also sent it to a hardcoded attacker-controlled server at \u003ccode\u003e39.107.60[.]51\u003c/code\u003e over plain HTTP. The article says the plugins otherwise functioned as advertised, making the theft less obvious to users.\u003c/p\u003e\n\n\u003cp\u003eThe earliest versions appeared at the end of October 2025, and new versions were still being released in June 2026. The affected plugins included listings such as CodeGPT AI Assistant, DeepSeek AI Assist, DeepSeek Coder AI, and several other DeepSeek- or AI-themed tools. The article recommends that Aikido users check for malware issues and notes that the campaign illustrates the risk of entering long-lived secrets into unvetted IDE plugins.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAikido reported a coordinated malware campaign on the JetBrains Marketplace involving at least 15 IDE plugins. The plugins were published under seven vendor accounts and shared the same hidden behavior. They were presented as AI coding assistants using DeepSeek and other large language models, and they offered expected features such as chat, commit message generation, code review, bug finding, and unit tests.\u003c/p\u003e\n\n\u003cp\u003eThe central issue was theft of AI provider API keys entered by users into plugin settings. The article states that providers such as OpenAI, SiliconFlow, and DeepSeek were among the services for which users might paste API keys. When a user clicked Apply, the plugin’s settings handler stored the key and also forwarded it to the attacker using a \u003ccode\u003esave()\u003c/code\u003e method.\u003c/p\u003e\n\n\u003cp\u003eThe exfiltration mechanism used a hardcoded destination at \u003ccode\u003e39.107.60[.]51\u003c/code\u003e and sent data over plain HTTP. The network request posted to \u003ccode\u003e/api/software/\u003c/code\u003e and used a static hardcoded \u003ccode\u003eX-Api-Key\u003c/code\u003e token. The article emphasizes that the destination had nothing to do with legitimate AI providers and that the transfer happened without a prompt, consent screen, or UI disclosure.\u003c/p\u003e\n\n\u003cp\u003eThe affected plugins also included a paid tier. After a user paid through a donation wall inside the plugin, the server sent an API key back to the client, and the plugin used that server-supplied key for model calls instead of the user’s own key. The article describes this as bizarre and presents a possible theory that stolen keys from one group of users may have been handed to paying users.\u003c/p\u003e\n\n\u003cp\u003eThe listed plugins had close to 70,000 installs in total, with CodeGPT AI Assistant and DeepSeek AI Assist accounting for the largest listed download counts. The earliest affected plugin was released on 2025-10-31, and new plugins were still appearing in June 2026. Aikido advised its users to check the central feed for malware issues and trigger a manual rescan, while also highlighting device and supply-chain protections offered by its products.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAikido detected a coordinated malware campaign on the JetBrains Marketplace involving at least 15 IDE plugins. The plugins were published under seven vendor accounts and shared a similar codebase that had been renamed and repackaged for each listing. According to the article, the affected plugins were installed close to 70,000 times.\u003c/p\u003e\n\n\u003cp\u003eEach plugin posed as an AI coding assistant built on DeepSeek and other large language models. The plugins offered features such as chat, commit messages, code review, bug finding, and unit tests. The article states that they functioned as advertised, but also exfiltrated AI provider API keys entered by users.\u003c/p\u003e\n\n\u003ch2 id=\"core-malicious-behavior\"\u003eCore malicious behavior\u003c/h2\u003e\n\n\u003cp\u003eThe plugins asked users to enter AI provider API keys into their settings. The article lists OpenAI, SiliconFlow, and DeepSeek as examples of providers whose keys could be entered. This appeared routine because the plugins needed a key to call the model on the user’s behalf.\u003c/p\u003e\n\n\u003cp\u003eThe theft occurred when the user clicked Apply in the settings panel. The settings handler stored the key and also called a \u003ccode\u003esave()\u003c/code\u003e method that forwarded the key to the attacker. The article states that this happened immediately on key entry, with no prompt, no consent screen, and no mention in the user interface.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical details\u003c/h2\u003e\n\n\u003cp\u003eThe exfiltration logic checked whether the key was non-null, started with \u003ccode\u003esk-\u003c/code\u003e, had a length of 51, and had not already been added to an internal set. If those conditions were met, the plugin placed the key into a \u003ccode\u003eSoftwareDto\u003c/code\u003e object and called \u003ccode\u003eBaseUtil.request(\u0026quot;key\u0026quot;, dto)\u003c/code\u003e. The article’s code excerpt shows the API key being assigned through \u003ccode\u003edto.setApiKey(key)\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe network request sent the data to a hardcoded server at \u003ccode\u003e39.107.60[.]51\u003c/code\u003e. The connection used plain HTTP and posted to a path under \u003ccode\u003e/api/software/\u003c/code\u003e. The request also included a hardcoded static \u003ccode\u003eX-Api-Key\u003c/code\u003e token.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that the destination had nothing to do with legitimate AI providers. It also states that the API key was sent in plaintext to the attacker-controlled address.\u003c/p\u003e\n\n\u003ch2 id=\"paid-tier-behavior\"\u003ePaid tier behavior\u003c/h2\u003e\n\n\u003cp\u003eThe plugins also included a paid tier. After a user paid a small fee through a donation wall built into the plugin, the server sent an API key back down to the client. The plugin then used that server-supplied key for model calls instead of the user’s own key.\u003c/p\u003e\n\n\u003cp\u003eThe article describes this design as bizarre because a legitimate operator would not simply hand a user a working and unrestricted key to a paid AI provider. It also provides a possible theory: one group of victims may have pasted in their own keys, which were harvested, while a second group paid the operator and received a working key in return. The article says the keys handed to paying users may have been stolen from others, turning the campaign into a service that resells other people’s API access.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-and-scale\"\u003eTimeline and scale\u003c/h2\u003e\n\n\u003cp\u003eThe earliest affected versions appeared at the end of October 2025. New affected plugins were still being released in June 2026. The article states that the real impact is hard to measure because vendors can inflate download counts and the marketplace listings contained fake five-star reviews.\u003c/p\u003e\n\n\u003cp\u003eThe listed plugins together had close to 70,000 installs. The largest listed download counts were for CodeGPT AI Assistant with 25,571 downloads and DeepSeek AI Assist with 27,727 downloads. Other listed plugins ranged from several hundred to several thousand downloads.\u003c/p\u003e\n\n\u003ch2 id=\"affected-plugins\"\u003eAffected plugins\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following affected plugins and plugin IDs:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDeepSeek Junit Test (\u003ccode\u003eorg.sm.yms.toolkit\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek Git Commit (\u003ccode\u003ecom.json.simple.kit\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek FindBugs (\u003ccode\u003eorg.bug.find.tools\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek AI Chat (\u003ccode\u003eorg.translate.ai.simple\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek Dev AI (\u003ccode\u003ecom.yy.test.ai.simple\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek AI Coding (\u003ccode\u003ecom.dev.ai.toolkit\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eAI FindBugs (\u003ccode\u003ecom.json.view.simple\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eAI Git Commitor (\u003ccode\u003ecom.my.git.ai.kit\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eAI Coder Review (\u003ccode\u003eorg.check.ai.ds\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eDeepSeek Coder AI (\u003ccode\u003ecom.review.tool.code\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003e
