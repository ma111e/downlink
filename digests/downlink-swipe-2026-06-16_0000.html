for hosts, web properties, or certificates. It highlights patterns such as reused certificates, newly exposed services, shared web technologies, infrastructure changes during a campaign window, and service histories associated with staging or payload delivery. For incident response, Censys historical data and rescans are positioned as ways to understand what infrastructure looked like during an incident window and refresh observations when the latest internet view is needed.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article explains how Censys Internet intelligence can be used with Google SecOps to support an AI-enabled security operations center. It is framed around the idea that SOC teams need faster triage, more accurate investigations, broader hunting, and stronger detections, while also using automation and AI. Censys argues that external internet intelligence is a key data source for achieving those goals.\u003c/p\u003e\n\n\u003cp\u003eCensys says it provides internet mapping data that gives Google SecOps users real-time context about:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIP addresses\u003c/li\u003e\n\u003cli\u003eWeb properties\u003c/li\u003e\n\u003cli\u003eCertificates\u003c/li\u003e\n\u003cli\u003eActive DNS\u003c/li\u003e\n\u003cli\u003eHistorical observations\u003c/li\u003e\n\u003cli\u003eAdversary clusters\u003c/li\u003e\n\u003cli\u003eInfrastructure relationships\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the Censys for Google SecOps SOAR integration can enrich alerts with Censys data so analysts can make faster and more accurate decisions inside their existing SecOps workflows.\u003c/p\u003e\n\n\u003ch2 id=\"why-external-infrastructure-context-matters\"\u003eWhy External Infrastructure Context Matters\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that many alerts begin with a limited indicator, such as an IP address, domain, or certificate hash. On its own, that indicator does not answer the questions analysts need to resolve during triage or investigation. The article lists several examples of questions analysts may need to answer, including whether infrastructure is newly created, what services are exposed, whether certificates are associated with it, whether the host is malicious, and whether the infrastructure changed recently.\u003c/p\u003e\n\n\u003cp\u003eCensys argues that without this context, analysts lose time pivoting across tools, ingesting multiple data sources, and manually reconstructing relationships. The article also says that automation and AI do not solve the problem if the contextual data is not available at the start of the decision, investigation, or detection process. It further states that injecting contextualized, evidence-backed data early can reduce AI token costs.\u003c/p\u003e\n\n\u003ch2 id=\"google-secops-integration\"\u003eGoogle SecOps Integration\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Google SecOps as supporting enrichment of indicators, events, and cases through playbooks. The Censys integration extends that model by adding external internet mapping intelligence without requiring analysts to leave their SecOps workflow. Censys actions can be run directly from a SecOps case or triggered automatically through playbooks.\u003c/p\u003e\n\n\u003cp\u003eThe supported integration actions described in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEntity enrichment for hosts, web properties, and certificates, either manually or automatically.\u003c/li\u003e\n\u003cli\u003eRescan actions to refresh Censys observations outside scheduled scans.\u003c/li\u003e\n\u003cli\u003eHistorical lookups to understand how an asset changed over time.\u003c/li\u003e\n\u003cli\u003eRelated infrastructure discovery to identify clusters of interest from an indicator.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these capabilities support triage, threat hunting, detection engineering, and incident response use cases.\u003c/p\u003e\n\n\u003ch2 id=\"use-case-alert-triage\"\u003eUse Case: Alert Triage\u003c/h2\u003e\n\n\u003cp\u003eFor alert triage, the article says Censys helps answer whether an alert is worth investigating. When an alert contains an IP address, domain, web property, or certificate, Google SecOps can invoke Censys enrichment. The enrichment can return external context such as exposed services, certificates, host details, web technologies, and security configurations.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights Censys Reputation Scoring. It says Censys scores IP addresses as malicious, high risk, medium risk, low risk, or benign. If used in automated workflows, the article says analysts can triage large numbers of alerts by ignoring benign and low-risk hosts and focusing on malicious and high-risk hosts.\u003c/p\u003e\n\n\u003ch2 id=\"use-case-threat-hunting\"\u003eUse Case: Threat Hunting\u003c/h2\u003e\n\n\u003cp\u003eThe article states that threat hunters rarely focus on a single IOC in isolation. Instead, value comes from understanding the broader infrastructure cluster around an indicator. Censys supports this by allowing hunters to pivot from one observable IOC into related infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThrough the Google SecOps integration, users can use CensEye to discover related assets for a host, web property, or certificate. The article says this is useful when threat actors reuse infrastructure patterns rather than exact indicators. It gives examples such as certificates, configurations, or naming conventions that may reveal a larger campaign even when a single IP address changes.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this as a shift from isolated IOC investigation to infrastructure-led investigation. It says this supports a more proactive approach in the AI-enabled SOC by helping teams uncover adversary footprints before a related indicator becomes a future alert.\u003c/p\u003e\n\n\u003ch2 id=\"use-case-detection-engineering\"\u003eUse Case: Detection Engineering\u003c/h2\u003e\n\n\u003cp\u003eThe article says detection engineering becomes more powerful when detection rules are informed by external infrastructure context. It notes that Google SecOps supports customer detection authoring using YARA-L and also enables users to use natural language and Gemini to search, iterate, drill down, and create detections. Censys is presented as adding infrastructure intelligence that helps detection engineers understand what to look for and why it matters.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several infrastructure patterns that detection engineers can use Censys to identify:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNewly exposed services associated with suspicious infrastructure.\u003c/li\u003e\n\u003cli\u003eCertificates reused across multiple suspicious hosts.\u003c/li\u003e\n\u003cli\u003eWeb properties sharing technologies with known malicious infrastructure.\u003c/li\u003e\n\u003cli\u003eInfrastructure that appears, disappears, or changes during a campaign window.\u003c/li\u003e\n\u003cli\u003eHosts with service histories that align with attacker staging or payload delivery.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this can help detection teams move beyond static IOC-based detections toward behaviorally informed, infrastructure-aware detections. It emphasizes that the value is not only detecting one bad IP address, but understanding the infrastructure pattern well enough to detect the next one.\u003c/p\u003e\n\n\u003ch2 id=\"use-case-incident-response\"\u003eUse Case: Incident Response\u003c/h2\u003e\n\n\u003cp\u003eFor incident response, the article stresses that timing matters. Responders need to understand what an external host looked like at the time of an event, rather than only seeing its current state. Censys historical data is presented as a way to understand how a host appeared at a particular point in time.\u003c/p\u003e\n\n\u003cp\u003eThe article says Censys scan snapshots and event history can show when services were added, removed, or modified. This is described as important for investigating callbacks, credential theft, phishing infrastructure, or suspicious outbound connections. The article gives examples where an IP may no longer expose the same service, a domain may have changed hosting providers, a service may have appeared briefly and disappeared, or a certificate may have rotated.\u003c/p\u003e\n\n\u003cp\u003eWith Censys historical lookups available through the Google SecOps integration, responders can investigate infrastructure as it existed during the relevant incident window. The article says this gives incident responders better evidence for containment, scoping, and post-incident analysis.\u003c/p\u003e\n\n\u003ch2 id=\"use-case-rescans\"\u003eUse Case: Rescans\u003c/h2\u003e\n\n\u003cp\u003eThe article says internet infrastructure changes constantly, with attackers rotating services, moving infrastructure, updating certificates, and creating short-lived assets. Because of that, analysts may need the latest view of infrastructure rather than observations from hours earlier. Censys rescans allow analysts to scan for changes on demand rather than waiting for scheduled scans.\u003c/p\u003e\n\n\u003cp\u003eThe article says the Censys rescan integration allows Google SecOps to initiate a rescan of all data and return a scan ID that can be used to monitor status. It identifies several situations where rescans are useful:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn alert references infrastructure that may have changed since the last observation.\u003c/li\u003e\n\u003cli\u003eA suspicious service needs to be verified before escalation.\u003c/li\u003e\n\u003cli\u003eA responder wants to confirm whether exposed infrastructure is still active.\u003c/li\u003e\n\u003cli\u003eA hunter wants the freshest possible data before expanding an investigation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article concludes that rescans help ensure AI-enabled SOC workflows rely on current evidence rather than stale observations.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main argument is that the future SOC will depend not just on automation, but on the quality of the data used by automation and AI. Censys and Google SecOps are presented as complementary tools for enriching alerts, supporting threat hunting, improving detection engineering, aiding incident response, and refreshing internet observations when current data is needed.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that using Censys with Google SecOps can help teams move from simply reacting to alerts toward understanding the external infrastructure behind those alerts.\u003c/p\u003e\n","keyPoints":["Censys provides Google SecOps users with real-time context about IPs, web properties, certificates, active DNS, historical data, adversary clusters, and infrastructure relationships.","The Censys for Google SecOps SOAR integration can automatically enrich alerts and cases with external internet intelligence directly inside SecOps workflows.","Censys enrichment can support faster alert triage by returning host details, exposed services, certificates, web technologies, security configurations, and reputation scores for indicators.","The integration supports threat hunting and detection engineering by helping analysts pivot from a single indicator to related infrastructure and identify observable infrastructure patterns.","Censys historical lookups and rescans help incident responders investigate how infrastructure appeared during an incident window and refresh observations when current data is needed."],"insights":["The article argues that adding contextualized Censys data at the start of an investigation can reduce AI token costs by giving automation better evidence before reasoning begins.","Censys Reputation Scores can be used in automated Google SecOps workflows to suppress benign and low-risk hosts so analysts can focus on malicious and high-risk infrastructure.","Historical Censys lookups are positioned as especially important when infrastructure has changed after an incident, such as rotated certificates, moved domains, or short-lived services that disappeared before investigation.","On-demand rescans are presented as a way to keep AI-assisted decisions grounded in current observations rather than stale internet scan data."],"referencedReports":[],"body":"\u003cp\u003eCensys describes how its Internet intelligence can be used with Google SecOps to support an AI-enabled security operations center. The article argues that SOC teams need high-quality external infrastructure context to triage alerts faster, investigate more accurately, and support automation and AI. Censys positions its data as a way to provide real-time context about IPs, web properties, certificates, active DNS, historical observations, adversary clusters, and infrastructure relationships.\u003c/p\u003e\n\n\u003cp\u003eThe Censys for Google SecOps SOAR integration allows teams to enrich alerts, events, indicators, and cases without leaving existing SecOps workflows. Supported actions include entity enrichment for hosts, web properties, and certificates; rescans; historical lookups; and related infrastructure discovery. The article emphasizes use cases including alert triage, threat hunting, detection engineering, incident response, and refreshing observations with on-demand rescans.\u003c/p\u003e\n\n\u003cp\u003eA key technical point is that Censys can provide both current and historical views of external infrastructure, helping analysts understand whether services, certificates, domains, or hosts changed around the time of an incident. The article also highlights Censys Reputation Scoring as a way to classify IP addresses as malicious, high risk, medium risk, low risk, or benign. Censys argues that this kind of contextualized, evidence-backed data can improve AI-assisted SOC decisions and may reduce AI token costs by supplying relevant context earlier in workflows.\u003c/p\u003e\n"},{"n":26,"title":"The VM Category Shift: XM Cyber Wins SC Awards Europe 2026 Best Vulnerability Management Solution","source":"xmcyber.com","sourceColorIdx":9,"link":"https://xmcyber.com/blog/xm-cyber-wins-sc-awards-europe-2026/","time":"11:53","priority":"MAY READ","score":45,"tldr":"XM Cyber won SC Awards Europe 2026 Best Vulnerability Management Solution, signaling a shift from traditional scan-and-patch vulnerability management toward attack-path-led exposure management. The key takeaway is that teams should prioritize vulnerabilities based on whether attackers can use them to reach critical assets, not just severity scores.","briefOverview":"\u003cp\u003eXM Cyber won the SC Awards Europe 2026 Best Vulnerability Management Solution, ending a three-year run in the category by Qualys. The article presents the win as evidence that vulnerability management is shifting away from traditional scan-score-patch approaches. The judges described XM Cyber as “one of the standout submissions across the entire awards programme.”\u003c/p\u003e\n\n\u003cp\u003eThe article says the judges highlighted XM Cyber’s differentiation from conventional vulnerability management tools through attack simulation, attack graph analysis, and CTEM-aligned methodologies. It emphasizes attack-path-led vulnerability management, where teams prioritize exposures based on whether attackers can use them to reach critical assets. XM Cyber’s platform is described as modeling on-prem, cloud, and hybrid environments to trace viable routes from initial access to critical assets.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights XM Cyber’s focus on choke points and closed-loop validation. Choke points are described as single fixes that can disrupt multiple attack paths, while closed-loop validation retests after remediation to confirm that an attack path is actually closed. XM Cyber says it will expand its platform with additional scanning capabilities and remediation integrations.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eXM Cyber won the SC Awards Europe 2026 Best Vulnerability Management Solution, after Qualys had won the category for three consecutive years. The article frames this as a category shift in vulnerability management, from legacy scan-and-patch workflows toward integrated exposure management. It says the judges recognized XM Cyber as an integrated platform built around attack graph analysis for continuous exposure discovery, validation, prioritization, and remediation across hybrid digital environments.\u003c/p\u003e\n\n\u003cp\u003eThe SC Awards write-up praised XM Cyber for “clear differentiation from conventional vulnerability management tools.” According to the article, the judges cited attack simulation, attack graph analysis, and CTEM-aligned methodologies as reasons XM Cyber stood apart. They also noted ROI figures, budget savings, and customer validation from IQUW, a London-based specialty reinsurer.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that the legacy scan-score-patch model can bury security teams in work that does not always map to actual risk. It cites the 2026 Verizon DBIR as finding that only 26% of KEV vulnerabilities were ever fully remediated, while exploitation timelines have compressed to near zero and remediation timelines have grown to 43 days. The article uses these figures to support its argument that vulnerability management must distinguish vulnerabilities that matter from those that do not.\u003c/p\u003e\n\n\u003cp\u003eXM Cyber describes its approach as attack-path-led vulnerability management. Instead of producing only a severity-ranked list of vulnerabilities, the platform models on-prem, cloud, and hybrid environments to identify what an attacker can reach and how they could get there. Vulnerabilities on viable routes to critical assets are prioritized, while vulnerabilities that do not lead to critical assets are treated as dead ends.\u003c/p\u003e\n\n\u003cp\u003eThe judges also highlighted XM Cyber’s ability to identify choke points and provide closed-loop validation. The article defines choke points as single fixes that can disrupt multiple attack paths, and it cites XM Cyber research saying 74% of exposures are on dead ends that cannot reach critical assets. XM Cyber says it will add Discovery Scanning, Network Vulnerability Scanning, Cryptography Scanning, and Container and Cloud Workloads Vulnerability Scanning, while expanding remediation integrations with ticketing systems and SIEM/SOAR solutions.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eXM Cyber won the SC Awards Europe 2026 Best Vulnerability Management Solution. The article presents this result as a notable shift in the vulnerability management category because Qualys had won the award for the previous three consecutive years. XM Cyber is described as an integrated platform built around attack graph analysis for continuous exposure discovery, validation, prioritization, and remediation across hybrid digital environments.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the SC Awards judges called XM Cyber “one of the standout submissions across the entire awards programme.” It frames the award as validation of a broader industry movement away from conventional vulnerability management and toward attack-path-led exposure management.\u003c/p\u003e\n\n\u003ch2 id=\"what-the-judges-recognized\"\u003eWhat the Judges Recognized\u003c/h2\u003e\n\n\u003cp\u003eThe SC Awards write-up praised XM Cyber for “clear differentiation from conventional vulnerability management tools.” According to the article, the judges specifically highlighted:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAttack simulation.\u003c/li\u003e\n\u003cli\u003eAttack graph analysis.\u003c/li\u003e\n\u003cli\u003eCTEM-aligned methodologies.\u003c/li\u003e\n\u003cli\u003eROI figures.\u003c/li\u003e\n\u003cli\u003eDemonstrated budget savings.\u003c/li\u003e\n\u003cli\u003eCustomer validation from IQUW, a London-based specialty reinsurer.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these factors reflect where the vulnerability management category is heading. It contrasts XM Cyber’s approach with the traditional scan-score-patch cycle, which it says often creates work that does not map to actual risk.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-management-context\"\u003eVulnerability Management Context\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that legacy vulnerability management approaches struggle to separate vulnerabilities that matter from those that do not. It cites the 2026 Verizon DBIR as finding that only 26% of KEV vulnerabilities were ever fully remediated. The article says this was not because defenders could not reach the rest, but because many vulnerabilities were not relevant to the paths attackers actually take.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that exploitation timelines have compressed to near zero while remediation timelines have grown to 43 days. It uses these figures to argue that vulnerability management needs a model that can prioritize exposures based on attacker reachability and actual risk to critical assets.\u003c/p\u003e\n\n\u003ch2 id=\"attack-path-led-vulnerability-management\"\u003eAttack-Path-Led Vulnerability Management\u003c/h2\u003e\n\n\u003cp\u003eThe article says the SC judges used the phrase “attack-path-led innovation” to describe XM Cyber’s approach. Traditional vulnerability management tools are described as producing lists of vulnerabilities ranked by severity. In contrast, attack-path-led vulnerability management starts by asking what an attacker can actually reach using a vulnerability or sequence of vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that this approach is not limited to CVEs. XM Cyber’s platform is described as modeling the full environment, including on-premises, cloud, and hybrid environments. It traces viable routes from initial access to critical assets.\u003c/p\u003e\n\n\u003cp\u003eUnder this model:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVulnerabilities that sit on viable attack routes are prioritized.\u003c/li\u003e\n\u003cli\u003eVulnerabilities that do not lead to critical assets are set aside as dead ends.\u003c/li\u003e\n\u003cli\u003eRemediation is guided by attacker reachability rather than severity score alone.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"choke-points-and-remediation-prioritization\"\u003eChoke Points and Remediation Prioritization\u003c/h2\u003e\n\n\u003cp\u003eThe judges also praised XM Cyber’s ability to identify what the company calls choke points. The article defines choke points as single fixes capable of disrupting multiple attack paths at once. It says that where multiple attack paths run through the same vulnerability, one fix can close dozens of paths.\u003c/p\u003e\n\n\u003cp\u003eThe article cites XM Cyber research stating that 74% of exposures are on dead ends that cannot reach critical assets. It says the remaining 26% carry the actual risk. This is presented as a way for teams to focus remediation effort on exposures that materially affect paths to critical assets.\u003c/p\u003e\n\n\u003ch2 id=\"closed-loop-validation\"\u003eClosed-Loop Validation\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies continuous validation as another value proposition highlighted by the judges. XM Cyber’s platform is described as retesting after every remediation action to confirm that an attack path is actually closed. The article contrasts this with simply marking a ticket as resolved.\u003c/p\u003e\n\n\u003cp\u003eThe SC write-up specifically called out “closed-loop validation” as a differentiator. The article defines this as the ability to prove that a fix worked rather than assuming it did.\u003c/p\u003e\n\n\u003ch2 id=\"planned-platform-expansion\"\u003ePlanned Platform Expansion\u003c/h2\u003e\n\n\u003cp\u003eXM Cyber says it will continue expanding platform coverage and capabilities for discovering, prioritizing, and mitigating vulnerabilities as part of the overall threat landscape. The article says four new pillars of visibility will be added to feed into PostureDNA:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDiscovery Scanning.\u003c/li\u003e\n\u003cli\u003eNetwork Vulnerability Scanning.\u003c/li\u003e\n\u003cli\u003eCryptography Scanning.\u003c/li\u003e\n\u003cli\u003eContainer and Cloud Workloads Vulnerability Scanning.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe company also says it will expand remediation integrations with leading ticketing systems and SIEM/SOAR solutions. The article says these integrations will include pre-built playbooks based on complete remediation guidance and remediation confirmation, with the goal of helping security and IT teams close the exposure window.\u003c/p\u003e\n\n\u003ch2 id=\"bottom-line\"\u003eBottom Line\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that the SC Awards Europe 2026 result validates a change in how the vulnerability management problem is being defined. It argues that vulnerability management is no longer just about finding vulnerabilities. Instead, the article says the benchmark is increasingly about understanding which vulnerabilities an attacker can actually use to reach critical assets.\u003c/p\u003e\n","keyPoints":["XM Cyber won the SC Awards Europe 2026 Best Vulnerability Management Solution after Qualys had won the category for three consecutive years.","The SC Awards judges praised XM Cyber for differentiation from conventional vulnerability management tools through attack simulation, attack graph analysis, and CTEM-aligned methodologies.","The article says attack-path-led vulnerability management prioritizes vulnerabilities that sit on viable routes from initial access to critical assets and sets aside vulnerabilities that are dead ends.","The judges highlighted XM Cyber’s ability to identify choke points, where a single fix can disrupt multiple attack paths at once.","XM Cyber plans to add Discovery Scanning, Network Vulnerability Scanning, Cryptography Scanning, and Container and Cloud Workloads Vulnerability Scanning to feed into its PostureDNA."],"insights":["The article highlights a major prioritization gap in legacy vulnerability management: Verizon DBIR data cited in the article says only 26% of KEV vulnerabilities were fully remediated while remediation timelines reached 43 days.","XM Cyber’s cited research suggests remediation effort can be sharply focused because 74% of exposures are described as dead ends that cannot reach critical assets.","The article positions choke points as an actionable remediation strategy because one fix at a convergence point can close dozens of attack paths.","The judges’ emphasis on closed-loop validation indicates that proving a remediation actually broke an attack path is treated as a differentiator from simply closing a ticket."],"referencedReports":[{"title":"2026 Verizon Data Breach Investigations Report","url":"https://www.verizon.com/business/resources/reports/dbir/","publisher":"Verizon","context":"The article cites the 2026 Verizon DBIR as evidence that only 26% of KEV vulnerabilities were fully remediated and that remediation timelines have grown to 43 days.","category":"","primary":false}],"body":"\u003cp\u003eXM Cyber won the SC Awards Europe 2026 Best Vulnerability Management Solution, ending a three-year run in the category by Qualys. The article presents the win as evidence that vulnerability management is shifting away from traditional scan-score-patch approaches. The judges described XM Cyber as “one of the standout submissions across the entire awards programme.”\u003c/p\u003e\n\n\u003cp\u003eThe article says the judges highlighted XM Cyber’s differentiation from conventional vulnerability management tools through attack simulation, attack graph analysis, and CTEM-aligned methodologies. It emphasizes attack-path-led vulnerability management, where teams prioritize exposures based on whether attackers can use them to reach critical assets. XM Cyber’s platform is described as modeling on-prem, cloud, and hybrid environments to trace viable routes from initial access to critical assets.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights XM Cyber’s focus on choke points and closed-loop validation. Choke points are described as single fixes that can disrupt multiple attack paths, while closed-loop validation retests after remediation to confirm that an attack path is actually closed. XM Cyber says it will expand its platform with additional scanning capabilities and remediation integrations.\u003c/p\u003e\n"},{"n":29,"title":"Cyber insurance policyholders facing heavier scrutiny in underwriting, claims","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/cyber-insurance-policyholders-facing-heavier-scrutiny-in-underwriting-claims/","time":"18:05","priority":"MAY READ","score":38,"tldr":"Cyber insurance policyholders are facing tougher underwriting and claims scrutiny as falling rates and fears of large systemic outages push insurers to add more restrictions and exclusions. Organizations are focusing more on resilience planning to keep critical systems running during major IT failures or cyber events.","briefOverview":"\u003cp\u003eEnterprises with cyber insurance policies are facing heavier scrutiny during underwriting and claims. The article says this is happening as insurance rates decline and insurers work to remain profitable. It also states that a multiyear lull in rates and insurers’ dependence on large U.S. policyholders have led to more restrictions and exclusions in coverage.\u003c/p\u003e\n\n\u003cp\u003eThe article says insurers are concerned that large U.S. policyholders make up nearly two-thirds of the global cyber insurance market. They fear that a major supply chain event or outage could escalate and potentially wipe out the cyber insurance industry as a whole. Errol Weiss of Health-ISAC said organizations are examining how to keep major systems running if major IT systems go down because of either a bad actor or a bad update.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reports that enterprises holding cyber insurance policies are facing increased scrutiny in both underwriting and claims. This scrutiny is occurring as cyber insurance rates decline. Insurers are described as trying to remain profitable in this environment.\u003c/p\u003e\n\n\u003cp\u003eA multiyear lull in insurance rates is presented as one factor behind changes in coverage. The article also points to insurers’ over-dependence on large U.S. policyholders. Together, these factors have led to more restrictions and exclusions in cyber insurance coverage.\u003c/p\u003e\n\n\u003cp\u003eThe article says the stakes are high for both insurers and policyholders. Insurance companies around the world are increasingly concerned that their business relies too heavily on large U.S. policyholders. Those policyholders account for nearly two-thirds of global market share, according to the article.\u003c/p\u003e\n\n\u003cp\u003eInsurers fear that one large supply chain event or outage could escalate across the market. The article states that such an event could ultimately wipe out the cyber insurance industry as a whole. No specific incident, threat actor, or technical exploit is identified in the article.\u003c/p\u003e\n\n\u003cp\u003eErrol Weiss, chief security officer at the Health Information Sharing and Analysis Center, is quoted on organizational resilience. He said organizations are considering what they need to do to keep major systems running if major IT systems go down. He framed that risk as applying whether the cause is a bad actor or a bad update.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that cyber insurance policyholders are facing heavier scrutiny from insurers during underwriting and claims. It says this shift is occurring while insurance rates are declining and insurers are trying to remain profitable.\u003c/p\u003e\n\n\u003cp\u003eThe central issue described is a changing cyber insurance market in which insurers are adding more restrictions and exclusions to coverage. The article attributes this to a multiyear lull in insurance rates and insurers’ over-dependence on large U.S. policyholders.\u003c/p\u003e\n\n\u003ch2 id=\"market-context\"\u003eMarket Context\u003c/h2\u003e\n\n\u003cp\u003eThe article states that insurance companies around the world are increasingly worried about their reliance on large U.S. policyholders. These policyholders are described as making up nearly two-thirds of the global cyber insurance market share.\u003c/p\u003e\n\n\u003cp\u003eThis concentration is presented as a risk to insurers. The article says insurers fear that a single large supply chain event or outage could escalate and potentially wipe out the cyber insurance industry as a whole.\u003c/p\u003e\n\n\u003ch2 id=\"impact-on-policyholders\"\u003eImpact on Policyholders\u003c/h2\u003e\n\n\u003cp\u003ePolicyholders are facing greater scrutiny in two areas:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnderwriting.\u003c/li\u003e\n\u003cli\u003eClaims.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this increased scrutiny is happening as rates decline. It also says insurers are responding with more restrictions and exclusions in coverage.\u003c/p\u003e\n\n\u003ch2 id=\"technical-and-operational-risk-framing\"\u003eTechnical and Operational Risk Framing\u003c/h2\u003e\n\n\u003cp\u003eThe article does not describe a specific cyber incident, malware family, vulnerability, or threat actor. Instead, it focuses on systemic risk scenarios, including major supply chain events and outages.\u003c/p\u003e\n\n\u003cp\u003eErrol Weiss, chief security officer at the Health Information Sharing and Analysis Center, is quoted as saying that organizations are evaluating how to keep major systems running if major IT systems go down. He specifically says this applies whether the cause is “a bad guy” or “a bad update.”\u003c/p\u003e\n\n\u003ch2 id=\"named-parties\"\u003eNamed Parties\u003c/h2\u003e\n\n\u003cp\u003eThe article names Errol Weiss, chief security officer at the Health Information Sharing and Analysis Center. It also links to the full article in Cybersecurity Dive.\u003c/p\u003e\n\n\u003cp\u003eThe stakeholders described include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnterprises holding cyber insurance policies.\u003c/li\u003e\n\u003cli\u003eInsurance companies around the world.\u003c/li\u003e\n\u003cli\u003eLarge U.S. policyholders.\u003c/li\u003e\n\u003cli\u003eOrganizations evaluating how to maintain major systems during IT outages.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"disclosed-impact-and-response\"\u003eDisclosed Impact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article’s disclosed impact is market-level and policy-level rather than incident-specific. Policyholders are experiencing greater scrutiny, while coverage is seeing more restrictions and exclusions.\u003c/p\u003e\n\n\u003cp\u003eThe response described from organizations is a focus on resilience planning. According to the quoted Health-ISAC statement, organizations are asking what they need to do to keep major systems running when major IT systems go down.\u003c/p\u003e\n","keyPoints":["Enterprises with cyber insurance policies are facing greater scrutiny in underwriting and claims as rates decline and insurers try to remain profitable.","Cyber insurers are concerned that their business is overly dependent on large U.S. policyholders, which account for nearly two-thirds of the global market share.","Insurers fear that a major supply chain event or outage could escalate and potentially threaten the cyber insurance industry as a whole.","A multiyear lull in insurance rates and insurers’ dependence on large U.S. policyholders have contributed to more restrictions and exclusions in coverage.","Errol Weiss of Health-ISAC said organizations are evaluating how to keep major systems running if major IT systems go down due to a malicious actor or a bad update."],"insights":["Cyber insurance coverage restrictions are being driven not only by individual policyholder risk but also by insurers’ concern that a single widespread supply chain event or outage could destabilize the broader cyber insurance market.","The article highlights a counterintuitive dynamic in which declining cyber insurance rates are coinciding with heavier underwriting and claims scrutiny, as insurers seek profitability despite softer pricing.","Operational resilience planning is becoming relevant to insurance discussions because organizations are focusing on how to keep major systems running whether downtime is caused by a malicious actor or a bad update."],"referencedReports":[],"body":"\u003cp\u003eEnterprises with cyber insurance policies are facing heavier scrutiny during underwriting and claims. The article says this is happening as insurance rates decline and insurers work to remain profitable. It also states that a multiyear lull in rates and insurers’ dependence on large U.S. policyholders have led to more restrictions and exclusions in coverage.\u003c/p\u003e\n\n\u003cp\u003eThe article says insurers are concerned that large U.S. policyholders make up nearly two-thirds of the global cyber insurance market. They fear that a major supply chain event or outage could escalate and potentially wipe out the cyber insurance industry as a whole. Errol Weiss of Health-ISAC said organizations are examining how to keep major systems running if major IT systems go down because of either a bad actor or a bad update.\u003c/p\u003e\n"},{"n":18,"title":"Improving precision in CTEM: How continuous controls validation in Tenable One transforms exposure management","source":"tenable.com","sourceColorIdx":5,"link":"https://www.tenable.com/blog/ctem-exposure-management-validation","time":"12:45","priority":"MAY READ","score":35,"tldr":"Tenable says continuous control validation in Tenable One helps CTEM teams focus on attack paths that are actually reachable and exploitable by factoring in defenses like EDR, MFA and firewalls. The main takeaway is to prioritize validated exposure over theoretical vulnerability lists, especially as AI accelerates vulnerability discovery.","briefOverview":"\u003cp\u003eTenable’s article argues that continuous control validation in Tenable One can improve continuous threat exposure management by distinguishing theoretical risk from actual, accessible exposure. It says security teams often face thousands of vulnerabilities and need context to understand which weaknesses can realistically be combined into attack paths. The article frames this as increasingly urgent because vulnerability exploitation is described as a top initial access vector and frontier AI is accelerating vulnerability discovery.\u003c/p\u003e\n\n\u003cp\u003eThe article says Tenable One maps active controls such as EDR, MFA, firewalls, DLP, SIEM, and endpoint protection onto potential attack paths. This allows teams to deprioritize weaknesses that existing defenses already neutralize and filter attack paths based on whether compensating controls are present. It also describes integrating penetration testing results through the Tenable One Open Connector to combine real-world attack simulations with real-time exposure insights.\u003c/p\u003e\n\n\u003cp\u003eThe main impact described is improved prioritization for exposure management teams. By combining control validation with asset criticality, threat activity, entitlement privileges, and attack pathways, the article says organizations can focus remediation on the most critical and exploitable risks. The article presents Tenable One as a platform for consolidating assets, vulnerabilities, exposure risks, control coverage, and attack path analysis.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article promotes the use of continuous control validation in Tenable One as a way to improve continuous threat exposure management programs. It argues that vulnerability lists and CVSS-based prioritization alone do not show which weaknesses can realistically be used by threat actors. The article says organizations need to validate actual exposure by considering exploitability, accessibility, and the presence of existing security controls.\u003c/p\u003e\n\n\u003cp\u003eTenable frames this need as urgent because vulnerability exploitation is described as the top initial access vector and frontier AI is accelerating vulnerability discovery. The article says the traditional patch-based defense model will be overwhelmed in this environment. It positions exposure management as an evolution from vulnerability management, focused on continual attack surface assessment, risk prioritization, and automated remediation.\u003c/p\u003e\n\n\u003cp\u003eThe article defines validation as one of the five steps in the CTEM lifecycle. It describes validation as providing consistent, continuous, and automated evidence of an attack’s feasibility by stress-testing defenses against real-world attack conditions. According to the article, validation helps confirm whether an exposure is genuinely reachable and exploitable using an organization’s own controls and configurations.\u003c/p\u003e\n\n\u003cp\u003eTenable says Tenable One expands validation with continuous control validation that factors active defenses into exposure prioritization. The article lists examples such as EDR tools blocking LSASS memory dump tools, MFA preventing password guessing, password spraying, or credential stuffing, and firewall or DLP tools preventing data exfiltration. It also says analysts can map controls onto attack paths, inspect individual nodes, identify SIEM-monitored assets, verify Microsoft Defender coverage, and prioritize high-risk paths where controls are absent.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes integrating penetration testing data into Tenable One through the Tenable One Open Connector. It says pentest results can be layered with real-time exposure insights to validate which exposures are exploitable and identify toxic risk combinations that threaten critical business assets. The article concludes that security control validation, asset criticality, threat activity, entitlement privileges, and attack pathways are essential context for prioritizing exposure in the AI era.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Tenable One as an exposure management platform that can improve continuous threat exposure management through continuous control validation. Its central message is that security teams should move beyond managing theoretical vulnerability lists and instead validate which exposures are actually reachable, exploitable, and insufficiently protected by existing defenses.\u003c/p\u003e\n\n\u003cp\u003eThe article says many organizations have thousands, tens of thousands, or hundreds of thousands of vulnerabilities across their environments. It argues that vulnerability severity scores alone do not show which vulnerabilities combine with other weaknesses, such as misconfigured cloud buckets or identity issues, to create realistic attack paths.\u003c/p\u003e\n\n\u003ch2 id=\"why-validation-matters-in-ctem\"\u003eWhy validation matters in CTEM\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies validation as one of the five steps in the CTEM lifecycle. It defines validation as the process of providing consistent, continuous, and automated evidence of an attack’s feasibility.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, validation stress-tests defenses against real-world attack conditions using an organization’s own controls and configurations. The goal is to determine whether an exposure is genuinely reachable and exploitable, rather than merely present in an environment.\u003c/p\u003e\n\n\u003cp\u003eThe article says this approach shifts security teams away from a reactive “patch everything” model and toward a preemptive, evidence-based exposure strategy. It also says validation can confirm which weaknesses existing defenses have already blocked while surfacing the ones that need immediate attention.\u003c/p\u003e\n\n\u003ch2 id=\"context-for-exposure-management\"\u003eContext for exposure management\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that the need for validated exposure management has become more urgent because frontier AI models are accelerating vulnerability discovery. It also says vulnerability exploitation ranks as the top initial access vector.\u003c/p\u003e\n\n\u003cp\u003eIn that context, the article states that the traditional patch-based defense model will get crushed. It says defenders cannot afford inaccurate prioritization or wasted remediation work on low-priority vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eThe article presents exposure management as an evolution of vulnerability management. It describes exposure management as a way to continually assess the attack surface, prioritize risk, and orchestrate automated remediation of security weaknesses at machine speed.\u003c/p\u003e\n\n\u003ch2 id=\"tenable-s-validation-capabilities\"\u003eTenable’s validation capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article says validation is not new to Tenable. It states that Tenable has used validation techniques in its solutions for more than 25 years.\u003c/p\u003e\n\n\u003cp\u003eIt also says Tenable has developed nearly 3,000 direct check plugins. These plugins actively probe a vulnerability and prove exploitability in cases where software version detection is not sufficient for Tenable’s accuracy standards.\u003c/p\u003e\n\n\u003cp\u003eThe article says these plugins mimic attack techniques and monitor a target’s response to confirm the presence of a vulnerability.\u003c/p\u003e\n\n\u003ch2 id=\"continuous-control-validation-in-tenable-one\"\u003eContinuous control validation in Tenable One\u003c/h2\u003e\n\n\u003cp\u003eThe article says the new element in Tenable One is the addition of continuous control validation in the platform. This feature factors in active security controls when prioritizing exposure.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, Tenable One helps reduce noise from theoretically exposed assets that are functionally blocked from exploitation. It says security teams can visually map prevention and detection controls directly onto potential attack paths.\u003c/p\u003e\n\n\u003cp\u003eThe article says teams can automatically prioritize weaknesses while deprioritizing weaknesses that existing controls already neutralize. Analysts can also filter top attack paths based on the presence of security controls and whether attack chains can be prevented.\u003c/p\u003e\n\n\u003ch2 id=\"examples-of-control-validation\"\u003eExamples of control validation\u003c/h2\u003e\n\n\u003cp\u003eThe article provides several examples of compensating controls that can affect exposure prioritization:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEndpoint detection and response tools can block LSASS memory dump tools used to harvest credentials.\u003c/li\u003e\n\u003cli\u003eMulti-factor authentication can prevent unauthorized access through password guessing, password spraying, or credential stuffing.\u003c/li\u003e\n\u003cli\u003eFirewalls and data loss prevention tools can prevent data exfiltration by detecting data staging and enforcing egress rules.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also describes a Tenable One workflow where users can access a unified dashboard consolidating assets, vulnerabilities, and exposure risks. It says users can filter attack paths to find which ones are protected by compensating controls and view the types of controls deployed in the environment.\u003c/p\u003e\n\n\u003ch2 id=\"attack-path-and-asset-level-analysis\"\u003eAttack path and asset-level analysis\u003c/h2\u003e\n\n\u003cp\u003eThe article says Tenable One can be used to review security controls associated with specific attack paths, including SIEM and EDR controls. It describes inspecting individual nodes within attack paths to determine which controls are protecting them.\u003c/p\u003e\n\n\u003cp\u003eIt also says teams can identify assets monitored by SIEM tools such as Splunk. They can verify endpoint protection coverage on assets, including Microsoft Defender installations.\u003c/p\u003e\n\n\u003cp\u003eThe article specifically mentions filtering attack techniques to focus on threats such as LSASS Memory techniques, which extract credentials from compromised systems and can be mitigated by endpoint protection tools. It says teams can identify attack paths and assets lacking appropriate EDR coverage.\u003c/p\u003e\n\n\u003cp\u003eThe article says this supports remediation prioritization by highlighting high-priority attack paths where compensating controls are absent. It also says teams can collaborate with security control owners to confirm coverage and address protection gaps for critical assets.\u003c/p\u003e\n\n\u003ch2 id=\"penetration-testing-integration\"\u003ePenetration testing integration\u003c/h2\u003e\n\n\u003cp\u003eThe article says security teams can also integrate penetration testing results into Tenable One. It describes pentest results as simulations of real-world attacks against cyber defenses.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, this is another way to validate which exposures are truly exploitable and contextualize them against the broader attack surface. The Tenable One Open Connector is described as the mechanism for ingesting the latest penetration test results.\u003c/p\u003e\n\n\u003cp\u003eThe article says these results can be layered with real-time exposure insights. It says this helps turn findings into active, continuous defenses and adds context about toxic risk combinations that threaten critical business assets.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-intended-outcome\"\u003eImpact and intended outcome\u003c/h2\u003e\n\n\u003cp\u003eThe article’s stated impact is improved prioritization for security teams. It says teams can eliminate noise from theoretical risks that are functionally blocked by existing defenses.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that context is essential in exposure management. It identifies security control validation, asset criticality, threat activity, entitlement privileges, and attack pathways as important inputs for identifying the most critical risks.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that in the AI era, security teams cannot waste time on the wrong issues. It presents Tenable One as a platform intended to help teams focus on accessible, exploitable attack paths and prioritize remediation where compensating controls are absent.\u003c/p\u003e\n","keyPoints":["The article says organizations need to shift from managing theoretical cyber risks to validating actual, accessible exposure because vulnerability exploitation is a top initial access vector and frontier AI is accelerating vulnerability discovery.","Tenable One adds continuous control validation by mapping active controls such as EDR, MFA, firewalls, and DLP onto potential attack paths to help deprioritize weaknesses that existing defenses neutralize.","Tenable One allows analysts to filter top attack paths based on the presence of security controls and whether attack chains can be prevented, supporting faster triage and investigation.","The Tenable One Open Connector can ingest penetration testing results and layer them with real-time exposure insights to identify toxic risk combinations affecting critical business assets.","The article states that exposure management context should combine security control validation with asset criticality, threat activity, entitlement privileges, and attack pathways to prioritize the most critical risks."],"insights":["Teams can reduce remediation noise by treating compensating controls as prioritization inputs, not just as separate detection or prevention tools.","Attack path review can be made more actionable by filtering for paths where specific controls are missing, such as assets involved in LSASS memory techniques that lack EDR coverage.","Penetration test findings become more useful when ingested into Tenable One and correlated with live exposure data, because the article says this helps reveal toxic risk combinations around critical assets.","The article positions direct vulnerability checks, control validation, and penetration testing results as complementary validation layers for determining whether exposures are genuinely exploitable."],"referencedReports":[],"body":"\u003cp\u003eTenable’s article argues that continuous control validation in Tenable One can improve continuous threat exposure management by distinguishing theoretical risk from actual, accessible exposure. It says security teams often face thousands of vulnerabilities and need context to understand which weaknesses can realistically be combined into attack paths. The article frames this as increasingly urgent because vulnerability exploitation is described as a top initial access vector and frontier AI is accelerating vulnerability discovery.\u003c/p\u003e\n\n\u003cp\u003eThe article says Tenable One maps active controls such as EDR, MFA, firewalls, DLP, SIEM, and endpoint protection onto potential attack paths. This allows teams to deprioritize weaknesses that existing defenses already neutralize and filter attack paths based on whether compensating controls are present. It also describes integrating penetration testing results through the Tenable One Open Connector to combine real-world attack simulations with real-time exposure insights.\u003c/p\u003e\n\n\u003cp\u003eThe main impact described is improved prioritization for exposure management teams. By combining control validation with asset criticality, threat activity, entitlement privileges, and attack pathways, the article says organizations can focus remediation on the most critical and exploitable risks. The article presents Tenable One as a platform for consolidating assets, vulnerabilities, exposure risks, control coverage, and attack path analysis.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

// Shared card chrome so the front and back faces render identical tokens.
function CardTitle({ children }) {
  return (
    <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 20, lineHeight: 1.3, letterSpacing: "-0.005em", color: "var(--text)" }}>
      {children}

function SourceTag({ article }) {
  const srcColor = `var(--p${article.sourceColorIdx})`;
  return (
    <>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
        {article.source}
      </span>

}

function numberedList(items, accent) {
  return (
    <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
      {(items || []).map((item, i) => (
        <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: accent, marginTop: 3, letterSpacing: "0.04em" }}>
            {String(i + 1).padStart(2, "0")}
          </span>
          <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{item}</span>
        </li>
      ))}
    </ul>
  );
}

function KeyPointsSection({ keyPoints, accent }) {
  if (!keyPoints || keyPoints.length === 0) return null;
  return (
    <div style={{ marginTop: 18 }}>
      <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
      {numberedList(keyPoints, accent)}
    </div>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            {report.primary && <span className="report-primary">PRIMARY</span>}
            <a className="report-link" href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
            {report.category && <span className={"report-cat report-cat-" + report.category}>{report.category}</span>}
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
