<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

<script>
window.__DL_ARTICLES = [{"n":3,"title":"Windows BitLocker zero-day gives access to protected drives, PoC released","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/windows-bitlocker-zero-day-gives-access-to-protected-drives-poc-released/","time":"16:37","priority":"MUST READ","score":92,"group":null,"groupColor":null,"tldr":"A security researcher has publicly released proof-of-concept exploits for two unpatched Windows zero-days, YellowKey and GreenPlasma, which respectively bypass BitLocker encryption and escalate privileges, citing dissatisfaction with Microsoft's vulnerability handling.","briefOverview":"\u003cp\u003eA cybersecurity researcher known as Chaotic Eclipse has publicly released proof-of-concept exploits for two unpatched Windows vulnerabilities named YellowKey and GreenPlasma. YellowKey functions as a BitLocker bypass that allows attackers to gain unrestricted access to encrypted drives by placing crafted files on storage media and triggering a Windows Recovery Environment shell. GreenPlasma is a privilege escalation flaw that enables unprivileged users to create arbitrary memory-section objects, potentially allowing manipulation of privileged services to achieve SYSTEM permissions. Independent security experts have verified the YellowKey exploit and confirmed its technical mechanism involving NTFS transaction replay within the recovery environment. The researcher cited dissatisfaction with Microsoft’s vulnerability handling as the motivation for these public disclosures and hinted at further leaks for upcoming Patch Tuesdays. Microsoft stated it continues to investigate reported issues and supports coordinated disclosure practices.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA cybersecurity researcher operating under the name Chaotic Eclipse has published proof-of-concept exploits for two unpatched Microsoft Windows vulnerabilities, designated YellowKey and GreenPlasma.\u003c/p\u003e\n\n\u003cp\u003eYellowKey operates as a BitLocker bypass that affects Windows 11 and Windows Server 2022 and 2025. The exploit requires placing specially crafted FsTx files on a USB drive or the EFI partition, followed by a reboot into the Windows Recovery Environment. By holding the CTRL key during boot, attackers can trigger a command shell that bypasses BitLocker encryption entirely.\u003c/p\u003e\n\n\u003cp\u003eIndependent researcher Kevin Beaumont confirmed the exploit’s validity and advised organizations to implement a BitLocker PIN alongside a BIOS password. Technical analysis by Will Dormann clarified that YellowKey exploits NTFS transaction replay within the recovery environment to delete the winpeshl.ini file, causing the system to launch a CMD shell instead of the actual recovery interface.\u003c/p\u003e\n\n\u003cp\u003eThe researcher noted that the current public exploit only targets TPM-only auto-unlock configurations and cannot decrypt physically stolen drives, despite claims that it also works in TPM plus PIN environments. GreenPlasma represents a separate privilege escalation flaw described as a Windows CTFMON arbitrary section creation vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThis flaw allows unprivileged users to generate arbitrary memory-section objects within directories writable by SYSTEM, potentially enabling the manipulation of kernel-mode drivers or services. Although the leaked proof-of-concept lacks the final component required for a full SYSTEM shell, the researcher indicated it could be adapted for complete privilege escalation.\u003c/p\u003e\n\n\u003cp\u003eThe researcher’s decision to publicly disclose these vulnerabilities stems from dissatisfaction with Microsoft’s bug reporting processes. Previous leaks attributed to the same source, including BlueHammer and RedSun, were reportedly exploited in the wild shortly after disclosure.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft responded by reaffirming its commitment to investigating security issues and updating affected devices promptly. The company also emphasized its support for coordinated vulnerability disclosure as an industry standard for addressing threats safely.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"overview-of-the-disclosure\"\u003eOverview of the Disclosure\u003c/h3\u003e\n\n\u003cp\u003eA cybersecurity researcher known as Chaotic Eclipse, also operating as Nightmare Eclipse on GitHub, has publicly released proof-of-concept exploits for two unpatched Microsoft Windows vulnerabilities. The vulnerabilities are named YellowKey and GreenPlasma, representing a BitLocker bypass and a local privilege escalation flaw, respectively. This disclosure follows previous public leaks attributed to the same researcher, including BlueHammer and RedSun, which were reportedly exploited in the wild shortly after their initial disclosure.\u003c/p\u003e\n\n\u003ch3 id=\"technical-analysis-of-yellowkey\"\u003eTechnical Analysis of YellowKey\u003c/h3\u003e\n\n\u003cp\u003eYellowKey functions as a BitLocker bypass that impacts Windows 11 and Windows Server 2022 and 2025. The exploitation process involves placing specially crafted FsTx files on an external USB drive or the target drive’s EFI partition. After rebooting into the Windows Recovery Environment, attackers hold down the CTRL key to trigger a command shell. This shell gains unrestricted access to the storage volume protected by BitLocker.\u003c/p\u003e\n\n\u003cp\u003eIndependent analysis confirms that YellowKey exploits NTFS transactions combined with the Windows Recovery image. Specifically, Windows searches for FsTx directories on attached drives and replays NTFS logs, which deletes the winpeshl.ini file. Consequently, the system launches CMD.EXE instead of the actual recovery environment while the disk remains unlocked. The researcher stated that the current public exploit only targets TPM-only auto-unlock configurations and cannot decrypt physically stolen drives. However, the researcher also claimed the vulnerability remains exploitable in TPM plus PIN environments, though they have not released a proof-of-concept for that scenario.\u003c/p\u003e\n\n\u003ch3 id=\"technical-analysis-of-greenplasma\"\u003eTechnical Analysis of GreenPlasma\u003c/h3\u003e\n\n\u003cp\u003eGreenPlasma is classified as a Windows CTFMON arbitrary section creation elevation of privileges vulnerability. This flaw allows an unprivileged user to create arbitrary memory-section objects within directory objects that are writable by SYSTEM. These created objects can potentially manipulate privileged services or drivers that trust specific paths inaccessible to standard users.\u003c/p\u003e\n\n\u003cp\u003eThe leaked proof-of-concept is currently incomplete and lacks the necessary component to achieve a full SYSTEM shell. Despite this limitation, the researcher noted that the vulnerability could be adapted to achieve complete privilege escalation.\u003c/p\u003e\n\n\u003ch3 id=\"researcher-motivation-and-future-threats\"\u003eResearcher Motivation and Future Threats\u003c/h3\u003e\n\n\u003cp\u003eThe researcher explicitly stated that the decision to publicly disclose YellowKey and GreenPlasma, along with exploitation guidance, was driven by dissatisfaction with Microsoft’s handling of bug reports. Chaotic Eclipse has committed to continuing the public leakage of exploits for undocumented Windows vulnerabilities. The researcher also hinted at releasing a “big surprise” targeting Microsoft’s upcoming Patch Tuesday.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, the researcher criticized Microsoft for silently patching the RedSun vulnerability without assigning a CVE identifier. Microsoft responded by reaffirming its commitment to investigating security issues and updating affected devices promptly. The company also emphasized its support for coordinated vulnerability disclosure as an industry standard for addressing threats safely.\u003c/p\u003e\n\n\u003ch3 id=\"independent-verification-and-mitigation\"\u003eIndependent Verification and Mitigation\u003c/h3\u003e\n\n\u003cp\u003eIndependent security researcher Kevin Beaumont verified the YellowKey exploit and confirmed that BitLocker contains a backdoor. Beaumont recommended mitigating the risk by implementing both a BitLocker PIN and a BIOS password. Principal vulnerability analyst Will Dormann confirmed that the exploit works when FsTx files are placed on a USB drive, though he could not reproduce the bug using the EFI partition.\u003c/p\u003e\n\n\u003cp\u003eDormann explained that the exploit leverages the auto-unlock feature on boot, which transparently decrypts disks without user interaction. He noted that testing YellowKey must be performed on the original device where the TPM stores the encryption keys.\u003c/p\u003e\n","keyPoints":["A researcher known as Chaotic Eclipse has publicly released proof-of-concept exploits for two unpatched Windows vulnerabilities named YellowKey and GreenPlasma.","YellowKey acts as a BitLocker bypass that grants unrestricted access to encrypted drives by placing crafted files on storage media and triggering a Windows Recovery Environment shell.","GreenPlasma is a privilege escalation flaw that allows unprivileged users to create arbitrary memory-section objects, potentially enabling manipulation of privileged services to achieve SYSTEM permissions.","Independent researchers have verified the YellowKey exploit, and security experts recommend using a BitLocker PIN combined with a BIOS password as a mitigation strategy."],"insights":["YellowKey exploits NTFS transaction replay within the Windows Recovery Environment to delete the winpeshl.ini file, tricking the system into launching a CMD shell instead of the actual recovery interface.","Independent analysis reveals that YellowKey currently only bypasses TPM-only auto-unlock BitLocker configurations and cannot decrypt physically stolen drives, contradicting the researcher's claim that it works in TPM+PIN environments.","Microsoft silently patched the RedSun zero-day without assigning a CVE identifier, highlighting a pattern of hushed updates that the researcher cites as justification for public exploit disclosure.","GreenPlasma allows unprivileged users to create arbitrary memory-section objects in SYSTEM-writable directories, enabling potential manipulation of kernel-mode drivers or services by forcing them to trust attacker-controlled paths."],"referencedReports":[],"body":"\u003cp\u003eA cybersecurity researcher known as Chaotic Eclipse has publicly released proof-of-concept exploits for two unpatched Windows vulnerabilities named YellowKey and GreenPlasma. YellowKey functions as a BitLocker bypass that allows attackers to gain unrestricted access to encrypted drives by placing crafted files on storage media and triggering a Windows Recovery Environment shell. GreenPlasma is a privilege escalation flaw that enables unprivileged users to create arbitrary memory-section objects, potentially allowing manipulation of privileged services to achieve SYSTEM permissions. Independent security experts have verified the YellowKey exploit and confirmed its technical mechanism involving NTFS transaction replay within the recovery environment. The researcher cited dissatisfaction with Microsoft’s vulnerability handling as the motivation for these public disclosures and hinted at further leaks for upcoming Patch Tuesdays. Microsoft stated it continues to investigate reported issues and supports coordinated disclosure practices.\u003c/p\u003e\n"},{"n":1,"title":"European Commission head pushes creation of new law delaying teens’ social media access","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/european-commission-head-pushes-restriction-teen-social-media","time":"17:38","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"The European Commission is advancing legislation to restrict social media access for young teenagers and regulate addictive design features, signaling a unified EU regulatory crackdown that includes active investigations into major platforms for compliance with existing safety standards.","briefOverview":"\u003cp\u003eThe European Commission is advancing a legislative proposal to restrict social media access for young teenagers, with Commission President Ursula von der Leyen signaling that a minimum age law could emerge as early as this summer. An expert panel appointed by the Commission will soon release recommendations to safeguard children online, which are expected to directly inform the new legal framework. While the Commission only holds the power to recommend legislation and must await parliamentary approval, its stance indicates strong institutional support for age-based restrictions. Several European nations, including Spain, France, Greece, Norway, Denmark, Turkey, and the Netherlands, are already implementing or considering age verification protocols to limit teen access. The Commission’s upcoming Digital Fairness Act will also target addictive and harmful platform design practices, such as attention capture mechanisms and subscription traps. This initiative expands upon the existing Digital Services Act, which currently holds social media companies accountable for hosting unlawful content. The Commission is actively investigating Meta and xAI for potential violations related to minor protection and addictive design features. Ultimately, the push for EU-level regulation aims to prevent fragmented national policies and establish a unified safety standard across the bloc.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eEuropean Commission President Ursula von der Leyen announced plans to push for new legislation that would delay social media access for young teenagers. She stated that an expert panel appointed by the Commission will release recommendations in the coming weeks to better safeguard children online. These recommendations are expected to lead to a formal legal proposal targeting minimum age thresholds as soon as this summer. Although the Commission lacks the authority to pass binding laws and must rely on the European Parliament to enact restrictions, her comments signal a strong shift toward regulatory action. von der Leyen emphasized that technology is advancing at lightning speed and is deeply penetrating childhood and adolescence, making discussions about minimum social media ages impossible to ignore. This push aligns with broader trends across Europe, as countries including Spain, Greece, Norway, France, Denmark, Turkey, and the Netherlands are already implementing or considering age verification systems to restrict young teens. The Commission is also preparing the Digital Fairness Act, which will address addictive and harmful design practices embedded in digital platforms. The act specifically targets mechanisms like attention capture, complex contracts, and subscription traps. This new legislation will build upon the existing Digital Services Act, which currently focuses on holding platforms accountable for hosting harmful or unlawful content. In parallel, the Commission is conducting active investigations into major tech entities. It is examining Meta for potential violations of the Digital Services Act, specifically regarding inadequate minor protection and the use of addictive design features. The Commission has also launched a probe into xAI’s Grok nudification tool under the same regulatory framework. Industry experts note that the Commission’s public stance is designed to coordinate member states and prevent a fragmented regulatory landscape. By asserting EU-level authority over the issue, the Commission aims to establish a cohesive approach that supersedes individual national bans. The overarching goal remains embedding safety into platform design from the start rather than treating it as an afterthought.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eThe European Commission is actively advancing a regulatory framework to restrict social media access for young teenagers and combat addictive platform design. Commission President Ursula von der Leyen outlined a multi-pronged approach that combines legislative proposals, expert panel recommendations, and active enforcement of existing digital safety laws.\u003c/p\u003e\n\n\u003ch3 id=\"legislative-and-policy-developments\"\u003eLegislative and Policy Developments\u003c/h3\u003e\n\n\u003cp\u003eThe Commission plans to introduce a legal proposal this summer that would establish a minimum age threshold for social media access. An expert panel appointed by the Commission will release its recommendations in the coming weeks to guide this legislative effort. While the Commission can only recommend legislation and must await approval from the European Parliament, its public stance indicates a decisive shift toward age-based restrictions. von der Leyen highlighted that technology is advancing at an unprecedented pace and has deeply penetrated every aspect of childhood and adolescence. She stated that discussions regarding a minimum age for social media can no longer be ignored by policymakers or industry leaders.\u003c/p\u003e\n\n\u003ch3 id=\"regional-alignment-and-regulatory-harmonization\"\u003eRegional Alignment and Regulatory Harmonization\u003c/h3\u003e\n\n\u003cp\u003eThe Commission’s push aligns with a growing consensus across Europe, where multiple member states are already taking independent action. Countries including Spain, Greece, Norway, France, Denmark, Turkey, and the Netherlands are either implementing or considering age verification protocols to restrict young teens from accessing social media platforms. Regulatory experts note that the Commission’s intervention is strategically designed to prevent a fragmented landscape of conflicting national laws. By asserting EU-level authority, the Commission aims to standardize safety requirements and streamline compliance for digital platforms operating across the bloc.\u003c/p\u003e\n\n\u003ch3 id=\"the-digital-fairness-act-and-platform-design\"\u003eThe Digital Fairness Act and Platform Design\u003c/h3\u003e\n\n\u003cp\u003eA central component of the Commission’s strategy is the upcoming Digital Fairness Act, which will expand upon the existing Digital Services Act. The new act will specifically target addictive and harmful design practices embedded in digital platforms. von der Leyen emphasized that the legislation will address mechanisms such as attention capture, complex contracts, and subscription traps. The Commission maintains that safety must be integrated into platform architecture from the start rather than treated as an afterthought. This focus on behavioral design marks a significant evolution in how digital platforms are regulated.\u003c/p\u003e\n\n\u003ch3 id=\"active-enforcement-and-investigations\"\u003eActive Enforcement and Investigations\u003c/h3\u003e\n\n\u003cp\u003eThe Commission is simultaneously enforcing existing regulations through targeted investigations. It is currently examining Meta for potential violations of the Digital Services Act, specifically focusing on inadequate minor protection measures and the use of addictive design features. Additionally, the Commission has launched a probe into xAI’s Grok nudification tool under the same regulatory framework. These enforcement actions demonstrate a proactive approach to holding technology companies accountable for compliance with European safety standards.\u003c/p\u003e\n","keyPoints":["The European Commission plans to propose legislation this summer that would delay social media access for young teenagers.","The upcoming Digital Fairness Act will target addictive and harmful design practices on platforms, expanding upon the existing Digital Services Act.","The Commission is currently investigating Meta and xAI for potential violations of the Digital Services Act related to minor protection and addictive design features.","Several European nations are already implementing or considering age verification protocols to restrict young teens from accessing social media."],"insights":["The Commission is actively using existing DSA enforcement to probe platforms for addictive design and minor protection failures, indicating that compliance audits are already underway alongside legislative efforts.","The Digital Fairness Act will explicitly regulate behavioral design patterns like subscription traps and attention capture, shifting regulatory focus from content moderation to platform architecture.","The EU-level age restriction push is explicitly designed to prevent regulatory fragmentation, signaling a move toward a standardized compliance framework that will supersede individual member state bans.","An expert panel’s imminent recommendations are expected to directly trigger a legislative proposal by summer, indicating an accelerated regulatory timeline for implementing teen access delays."],"referencedReports":[],"body":"\u003cp\u003eThe European Commission is advancing a legislative proposal to restrict social media access for young teenagers, with Commission President Ursula von der Leyen signaling that a minimum age law could emerge as early as this summer. An expert panel appointed by the Commission will soon release recommendations to safeguard children online, which are expected to directly inform the new legal framework. While the Commission only holds the power to recommend legislation and must await parliamentary approval, its stance indicates strong institutional support for age-based restrictions. Several European nations, including Spain, France, Greece, Norway, Denmark, Turkey, and the Netherlands, are already implementing or considering age verification protocols to limit teen access. The Commission’s upcoming Digital Fairness Act will also target addictive and harmful platform design practices, such as attention capture mechanisms and subscription traps. This initiative expands upon the existing Digital Services Act, which currently holds social media companies accountable for hosting unlawful content. The Commission is actively investigating Meta and xAI for potential violations related to minor protection and addictive design features. Ultimately, the push for EU-level regulation aims to prevent fragmented national policies and establish a unified safety standard across the bloc.\u003c/p\u003e\n"},{"n":2,"title":"Microsoft fixes Windows Autopatch bug installing restricted drivers","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-fixes-windows-autopatch-bug-installing-restricted-drivers/","time":"14:36","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"Microsoft fixed a Windows Autopatch bug that bypassed administrative restrictions to deploy restricted drivers on some EU Windows 11 devices, resolving the issue server-side without requiring any client action.","briefOverview":"\u003cp\u003eMicrosoft has resolved a Windows Autopatch bug that improperly deployed driver updates restricted by administrative policies. The issue specifically impacted a limited subset of devices running client Windows platforms in the European Union. According to a service alert identified by Microsoft MVP Susan Bradley, the affected systems were running Windows 11 versions 23H2, 24H2, and 25H2.\u003c/p\u003e\n\n\u003cp\u003eThese devices installed recommended driver updates without requiring user approval, directly violating administrative policies that mandated manual IT approval. Consequently, affected machines experienced unexpected reboots and occasional system failures depending on the specific drivers installed.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft addressed the problem through a service-side fix, confirming that no client-side updates or manual interventions are required from customers. This incident follows recent Microsoft updates that caused unintended Windows Server 2025 upgrades and Windows 365 Office installation issues.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has fixed a Windows Autopatch bug that caused driver updates restricted by administrative policies to be deployed on some Autopatch-managed Windows devices in the European Union. According to a service alert spotted by Microsoft MVP Susan Bradley, the problem only affected a limited number of devices running client Windows platforms, specifically Windows 11 versions 23H2, 24H2, and 25H2. Microsoft stated that these impacted devices installed recommended driver updates without user approval, even when IT administrators had configured policies to require manual approval.\u003c/p\u003e\n\n\u003cp\u003eAffected systems also experienced unexpected behavior, including system reboots and, in some instances, complete system failures depending on the installed drivers. The company confirmed that a service-side fix has addressed the bug and emphasized that customers do not need to take any action to resolve the issue. Microsoft clarified that a limited subset of EU devices managed by Windows Autopatch received unexpected driver updates from Windows Update despite configured restrictions.\u003c/p\u003e\n\n\u003cp\u003eThe company reiterated that the service-side fix resolves the matter without requiring client-side updates or further customer steps. This driver deployment issue follows another Microsoft resolution from last month regarding systems running Windows Server 2019 and 2022 unexpectedly upgrading to Windows Server 2025. Microsoft first acknowledged that server upgrade problem in September 2024 after widespread reports from system administrators about servers upgrading overnight to an unlicensed version.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, Microsoft confirmed on Tuesday that some customers face issues installing Office on Windows 365 devices due to a configuration change introduced by a recent service update.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"windows-autopatch-driver-deployment-bug\"\u003eWindows Autopatch Driver Deployment Bug\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft has resolved a Windows Autopatch bug that improperly deployed driver updates restricted by administrative policies. The issue specifically impacted a limited subset of devices running client Windows platforms in the European Union. According to a service alert identified by Microsoft MVP Susan Bradley, the affected systems were running Windows 11 versions 23H2, 24H2, and 25H2.\u003c/p\u003e\n\n\u003ch3 id=\"policy-bypass-and-system-impact\"\u003ePolicy Bypass and System Impact\u003c/h3\u003e\n\n\u003cp\u003eThe bug caused impacted Windows devices to install recommended driver updates without requiring user approval. This occurred even when IT administrators had explicitly configured policies to mandate manual approval for driver deployments. As a result, affected systems experienced unexpected operational behavior. Key impacts included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnauthorized installation of recommended driver updates\u003c/li\u003e\n\u003cli\u003eBypassing of IT-configured manual approval policies\u003c/li\u003e\n\u003cli\u003eUnexpected system reboots\u003c/li\u003e\n\u003cli\u003eOccasional system failures tied to installed drivers\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"resolution-and-required-actions\"\u003eResolution and Required Actions\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft confirmed that the issue has been addressed through a service-side fix. The company emphasized that customers do not need to take any client-side action to resolve the problem. Microsoft stated that no client-side updates or further steps are required from customers to fix the deployment anomaly.\u003c/p\u003e\n\n\u003cp\u003eThe service-side correction ensures that Autopatch-managed devices in the EU region will no longer receive unexpected driver updates despite configured restrictions. This approach eliminates the need for manual IT interventions or endpoint monitoring.\u003c/p\u003e\n\n\u003ch3 id=\"related-microsoft-update-issues\"\u003eRelated Microsoft Update Issues\u003c/h3\u003e\n\n\u003cp\u003eThis driver deployment incident follows another Microsoft resolution from last month regarding unexpected system upgrades. That previous issue caused systems running Windows Server 2019 and Windows Server 2022 to unexpectedly upgrade to Windows Server 2025. Microsoft first acknowledged that server upgrade problem in September 2024 after widespread reports from system administrators.\u003c/p\u003e\n\n\u003cp\u003eThese reports highlighted servers upgrading overnight to a Windows Server version for which they did not hold a license. Additional recent service update issues include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCustomers experiencing difficulties installing Office on Windows 365 devices\u003c/li\u003e\n\u003cli\u003eInstallation failures caused by a configuration change from a recent service update\u003c/li\u003e\n\u003cli\u003eOngoing monitoring of automated update anomalies across Windows and Office ecosystems\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Microsoft fixed a Windows Autopatch bug that deployed restricted driver updates on some EU Windows 11 devices despite administrative policies requiring manual approval.","The bug affected a limited subset of devices running Windows 11 versions 23H2, 24H2, and 25H2, causing unexpected reboots and system failures.","Microsoft addressed the issue via a service-side fix, requiring no client-side updates or further action from customers."],"insights":["The Autopatch service completely bypassed IT-configured administrative policies restricting driver deployment, exposing a critical enforcement gap in Microsoft's automated update logic.","The issue was resolved entirely server-side, meaning enterprise security teams can immediately stop endpoint monitoring and avoid unnecessary manual interventions or policy overrides.","The bug was geographically isolated to the European Union, indicating that region-specific configurations or rollout pipelines in Microsoft's update infrastructure introduce unique failure modes.","The article notes this driver bug follows recent Microsoft issues involving unintended Windows Server 2025 upgrades and Windows 365 installation failures, indicating a recurring pattern of automated update mechanisms causing unintended system behavior."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft has resolved a Windows Autopatch bug that improperly deployed driver updates restricted by administrative policies. The issue specifically impacted a limited subset of devices running client Windows platforms in the European Union. According to a service alert identified by Microsoft MVP Susan Bradley, the affected systems were running Windows 11 versions 23H2, 24H2, and 25H2.\u003c/p\u003e\n\n\u003cp\u003eThese devices installed recommended driver updates without requiring user approval, directly violating administrative policies that mandated manual IT approval. Consequently, affected machines experienced unexpected reboots and occasional system failures depending on the specific drivers installed.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft addressed the problem through a service-side fix, confirming that no client-side updates or manual interventions are required from customers. This incident follows recent Microsoft updates that caused unintended Windows Server 2025 upgrades and Windows 365 Office installation issues.\u003c/p\u003e\n"},{"n":4,"title":"Microsoft fixes BitLocker recovery issue only for Windows 11 users","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-fixes-bitlocker-recovery-issue-only-for-windows-11-users/","time":"15:42","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"Microsoft has released a fix for a BitLocker recovery key prompt bug triggered by April 2026 updates, but it is currently only available for Windows 11 25H2. Windows 10 and Server administrators must wait for a future patch or temporarily disable the conflicting TPM Group Policy setting.","briefOverview":"\u003cp\u003eMicrosoft has released a patch to resolve a BitLocker recovery prompt issue triggered by the April 2026 Windows security updates. The problem primarily impacts enterprise systems configured with an unrecommended BitLocker Group Policy setting. While the issue affects Windows 10, Windows 11, and Windows Server, Microsoft states it is unlikely to impact personal devices. A permanent fix is now available exclusively for Windows 11 25H2 systems through the KB5089549 cumulative update. Administrators running Windows 10 or Windows Server must wait for a future patch to address the underlying conflict. Until those platforms receive an official fix, Microsoft recommends temporarily disabling the TPM platform validation profile Group Policy before deploying security updates. This incident follows a recurring pattern of similar BitLocker prompts caused by TPM validation conflicts in previous Windows updates. The May 2026 Patch Tuesday also addressed 120 vulnerabilities, including 17 critical flaws.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has addressed a known issue that causes certain Windows systems to boot into BitLocker recovery mode after installing the April 2026 security updates. BitLocker is a storage encryption feature that frequently activates recovery mode following hardware changes or Trusted Platform Module updates. Microsoft acknowledged on April 14 that the problem affects Windows 10, Windows 11, and Windows Server devices utilizing an unrecommended BitLocker Group Policy configuration. The company noted that personal devices are unlikely to be impacted since these configurations are typically restricted to enterprise IT environments. A permanent fix has been deployed via the KB5089549 cumulative update, but it is currently limited to Windows 11 25H2 systems. Windows 10 and Windows Server users will need to wait for a future update to receive a complete fix. Microsoft explained that the conflict arises when boot file updates interact with specific TPM validation settings, particularly invalid PCR7 configurations. To mitigate the risk until a comprehensive patch arrives, Windows administrators are advised to remove the TPM platform validation profile Group Policy setting before deploying the April updates. This situation mirrors previous incidents, including a similar BitLocker prompt issue in August 2022 and another in August 2024. An emergency update was also issued in May 2025 to resolve a comparable problem on Windows 10 devices. Meanwhile, Microsoft recently released the May 2026 Patch Tuesday updates, which patched 120 vulnerabilities across the platform.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview\"\u003eIncident Overview\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft has officially addressed a known issue that forces some Windows systems into BitLocker recovery mode following the installation of the April 2026 security updates. BitLocker serves as a critical storage encryption feature designed to protect data from theft. The recovery mode typically activates after hardware modifications or Trusted Platform Module updates, effectively locking users out of their encrypted drives until a recovery key is provided.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft acknowledged the problem on April 14, confirming that it impacts Windows 10, Windows 11, and Windows Server environments. The issue specifically targets devices configured with an unrecommended BitLocker Group Policy setting. Microsoft emphasized that consumer devices are highly unlikely to be affected, as these problematic configurations are almost exclusively found in enterprise IT deployments.\u003c/p\u003e\n\n\u003ch3 id=\"remediation-and-platform-status\"\u003eRemediation and Platform Status\u003c/h3\u003e\n\n\u003cp\u003eA permanent fix has been released through the KB5089549 cumulative update, but it is exclusively available for Windows 11 25H2 systems. Windows 10 and Windows Server administrators must wait for a future update to receive a complete resolution. Microsoft clarified that the conflict occurs when boot file updates interact with certain TPM validation settings, including invalid PCR7 configurations.\u003c/p\u003e\n\n\u003cp\u003eUntil a unified patch is deployed across all affected platforms, Microsoft has provided a temporary mitigation strategy. Windows administrators are advised to remove the \u0026ldquo;Configure TPM platform validation profile for native UEFI firmware configurations\u0026rdquo; Group Policy setting before deploying the April 2026 updates. Additionally, IT teams should ensure that BitLocker bindings utilize the PCR7 profile by following Microsoft\u0026rsquo;s official guidance.\u003c/p\u003e\n\n\u003ch3 id=\"historical-context-and-recent-updates\"\u003eHistorical Context and Recent Updates\u003c/h3\u003e\n\n\u003cp\u003eThis incident follows a recurring pattern of TPM validation conflicts triggering BitLocker prompts across multiple Windows versions. A similar issue caused Windows devices to stall at a recovery prompt after the August 2022 security updates. Microsoft resolved another comparable problem in August 2024 following the July 2024 updates.\u003c/p\u003e\n\n\u003cp\u003eAn emergency out-of-band update was subsequently issued in May 2025 to address a BitLocker key request affecting Windows 10 PCs. In parallel, Microsoft recently released the May 2026 Patch Tuesday security updates, which addressed 120 vulnerabilities. This latest patch cycle included 17 critical flaws and covered a wide range of security improvements across the Windows ecosystem.\u003c/p\u003e\n","keyPoints":["Microsoft has addressed a known issue that causes some Windows 11 systems to enter BitLocker recovery mode after installing the April 2026 security updates.","The problem affects Windows 10, Windows 11, and Windows Server devices that use an unrecommended BitLocker Group Policy configuration.","Microsoft released a fix for Windows 11 25H2 systems, but Windows 10 and Server customers must wait for a future update to resolve the issue.","Administrators are advised to temporarily disable the \"Configure TPM platform validation profile for native UEFI firmware configurations\" Group Policy setting before deploying the April updates on affected platforms."],"insights":["The BitLocker lockout stems from a conflict between boot file updates and specific TPM validation settings (PCR7), allowing IT teams to preemptively deploy a Group Policy workaround before applying security patches.","This marks a recurring pattern of TPM/UEFI validation conflicts triggering BitLocker prompts across multiple Windows versions, suggesting a systemic issue in how Microsoft handles firmware validation during security updates.","The problem exclusively impacts enterprise systems with \"unrecommended\" BitLocker Group Policy configurations, meaning consumer devices are largely insulated while IT administrators face significant deployment risks.","Microsoft's current remediation is fragmented, leaving Windows 10 and Server environments without a patch and forcing reliance on temporary Group Policy modifications until a unified fix is released."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft has released a patch to resolve a BitLocker recovery prompt issue triggered by the April 2026 Windows security updates. The problem primarily impacts enterprise systems configured with an unrecommended BitLocker Group Policy setting. While the issue affects Windows 10, Windows 11, and Windows Server, Microsoft states it is unlikely to impact personal devices. A permanent fix is now available exclusively for Windows 11 25H2 systems through the KB5089549 cumulative update. Administrators running Windows 10 or Windows Server must wait for a future patch to address the underlying conflict. Until those platforms receive an official fix, Microsoft recommends temporarily disabling the TPM platform validation profile Group Policy before deploying security updates. This incident follows a recurring pattern of similar BitLocker prompts caused by TPM validation conflicts in previous Windows updates. The May 2026 Patch Tuesday also addressed 120 vulnerabilities, including 17 critical flaws.\u003c/p\u003e\n"},{"n":5,"title":"Webinar tomorrow: Why security alone won't stop modern attacks","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/webinar-tomorrow-why-security-alone-wont-stop-modern-attacks/","time":"15:45","priority":"MAY READ","score":65,"group":null,"groupColor":null,"tldr":"Modern cyberattacks frequently bypass traditional defenses, requiring organizations to integrate robust backup and recovery strategies alongside security controls to ensure rapid operational restoration after a breach.","briefOverview":"\u003cp\u003eModern cyberattacks are increasingly designed to bypass traditional defenses, disrupt operations, and delay recovery after compromise. Organizations can no longer rely on prevention alone as AI-driven phishing, ransomware, SaaS abuse, and business email compromise evolve rapidly. Attackers frequently leverage trusted infrastructure, legitimate cloud services, and highly personalized campaigns to gain access. Even when suspicious activity is detected, many organizations struggle to contain incidents quickly and restore operations without prolonged downtime. This webinar highlights why cyber resilience now depends on integrating strong security controls with robust backup and recovery strategies. Attendees will learn how to combine prevention, detection, and rapid recovery to maintain business uptime. The session emphasizes that SaaS backups and comprehensive BCDR planning are essential layers of modern cyber resilience. Organizations must prepare not only to defend against attacks but also to recover from them quickly to avoid significant operational and financial disruption.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eModern cyberattacks are increasingly engineered to bypass traditional security defenses, disrupt business operations, and delay recovery after a compromise has occurred. Tomorrow at 2:00 PM ET, BleepingComputer will host a live webinar titled \u0026ldquo;From phishing to fallout: Why MSPs must rethink both security and recovery\u0026rdquo; featuring Austin O\u0026rsquo;Saben and Adam Marget from Kaseya. The session examines why organizations can no longer rely solely on prevention as threats like AI-driven phishing, ransomware, SaaS abuse, and business email compromise evolve faster than many traditional defenses can adapt. Today\u0026rsquo;s threat actors increasingly leverage trusted infrastructure, legitimate cloud services, and highly personalized phishing campaigns to infiltrate business environments. Even when suspicious activity is successfully detected, many organizations still struggle to contain incidents quickly and restore normal operations without significant disruption. Organizations that lack strong recovery strategies frequently face prolonged downtime, operational interruptions, and increased recovery costs even after incidents are identified and contained. Cyber resilience now depends on combining strong security controls with backup and recovery strategies specifically designed to restore operations quickly after an attack. The upcoming webinar will cover why AI-driven phishing and brand impersonation are outpacing traditional email security measures. It will also explain how attackers leverage trusted infrastructure and SaaS platforms to bypass defenses and where many security strategies fail after initial compromise. Furthermore, the session will highlight why SaaS backups and comprehensive BCDR planning are critical layers of cyber resilience. Attendees will learn how organizations can effectively combine prevention, detection, and recovery capabilities to maintain continuous uptime. Kaseya\u0026rsquo;s solutions aim to help organizations strengthen resilience by integrating these capabilities across diverse environments. Ultimately, the webinar emphasizes that organizations must prepare not only to defend against incoming attacks but also to recover from them quickly to minimize business impact.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"article-overview\"\u003eArticle Overview\u003c/h3\u003e\n\n\u003cp\u003eModern cyberattacks are increasingly designed to bypass traditional security defenses, disrupt ongoing operations, and deliberately delay recovery after a compromise. Tomorrow at 2:00 PM ET, BleepingComputer will host a live webinar titled \u0026ldquo;From phishing to fallout: Why MSPs must rethink both security and recovery\u0026rdquo; with speakers Austin O\u0026rsquo;Saben and Adam Marget from Kaseya. The session addresses a critical shift in the threat landscape where organizations can no longer rely on prevention alone.\u003c/p\u003e\n\n\u003ch3 id=\"evolving-threat-vectors\"\u003eEvolving Threat Vectors\u003c/h3\u003e\n\n\u003cp\u003eAI-driven phishing, ransomware, SaaS abuse, and business email compromise are evolving at a pace that outpaces many traditional security controls. Attackers are increasingly leveraging trusted infrastructure, legitimate cloud services, and highly personalized phishing campaigns to infiltrate business environments. Even when suspicious activity is successfully detected, many organizations still struggle to contain incidents quickly and restore operations without significant disruption. This gap between detection and recovery is a primary driver of prolonged downtime and operational failure.\u003c/p\u003e\n\n\u003ch3 id=\"the-cost-of-weak-recovery-strategies\"\u003eThe Cost of Weak Recovery Strategies\u003c/h3\u003e\n\n\u003cp\u003eModern cyberattacks do not end after the initial breach, as ransomware, SaaS compromise, and business email compromise campaigns often continue disrupting operations long after access is gained. Organizations that lack strong recovery strategies frequently face prolonged downtime, operational interruptions, and increased recovery costs even after incidents are identified and contained. Cyber resilience now depends on combining strong security controls with backup and recovery strategies specifically designed to restore operations quickly after an attack occurs.\u003c/p\u003e\n\n\u003ch3 id=\"key-webinar-topics\"\u003eKey Webinar Topics\u003c/h3\u003e\n\n\u003cp\u003eThe upcoming session will cover several critical areas of modern cyber resilience:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhy AI-driven phishing and brand impersonation are outpacing traditional email security\u003c/li\u003e\n\u003cli\u003eHow attackers leverage trusted infrastructure and SaaS platforms to bypass defenses\u003c/li\u003e\n\u003cli\u003eWhere many security strategies fail after initial compromise\u003c/li\u003e\n\u003cli\u003eWhy SaaS backups and BCDR planning are critical layers of cyber resilience\u003c/li\u003e\n\u003cli\u003eHow organizations combine prevention, detection, and recovery to maintain uptime\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"strategic-implications\"\u003eStrategic Implications\u003c/h3\u003e\n\n\u003cp\u003eKaseya provides cybersecurity, backup, and IT management solutions that help organizations strengthen resilience by combining prevention, detection, backup, and rapid recovery capabilities across environments. In this session, attendees will learn why security, backups, and recovery planning now work together as essential parts of modern cyber resilience. The webinar emphasizes that organizations must prepare not only to defend against attacks but also to recover from them quickly to avoid significant business impact.\u003c/p\u003e\n","keyPoints":["Modern attackers increasingly leverage trusted infrastructure, legitimate cloud services, and AI-driven phishing campaigns to bypass traditional defenses.","Organizations lacking strong recovery strategies frequently face prolonged downtime, operational disruption, and increased recovery costs after incidents are contained.","Cyber resilience now depends on combining strong security controls with backup and recovery strategies designed to restore operations quickly.","Traditional security strategies often fail after initial compromise, making rapid recovery planning essential for maintaining business uptime."],"insights":["Attackers are increasingly using legitimate cloud services and trusted infrastructure to bypass traditional defenses, making perimeter security insufficient.","Recovery delays directly cause prolonged downtime and high costs, positioning backup and BCDR planning as essential business continuity layers rather than optional IT tasks.","AI-driven phishing and brand impersonation are outpacing traditional email security, requiring organizations to adopt SaaS-specific backups and rapid recovery protocols.","Modern cyber resilience depends on synchronizing prevention, detection, and recovery capabilities across all environments instead of treating them as separate security functions."],"referencedReports":[],"body":"\u003cp\u003eModern cyberattacks are increasingly designed to bypass traditional defenses, disrupt operations, and delay recovery after compromise. Organizations can no longer rely on prevention alone as AI-driven phishing, ransomware, SaaS abuse, and business email compromise evolve rapidly. Attackers frequently leverage trusted infrastructure, legitimate cloud services, and highly personalized campaigns to gain access. Even when suspicious activity is detected, many organizations struggle to contain incidents quickly and restore operations without prolonged downtime. This webinar highlights why cyber resilience now depends on integrating strong security controls with robust backup and recovery strategies. Attendees will learn how to combine prevention, detection, and rapid recovery to maintain business uptime. The session emphasizes that SaaS backups and comprehensive BCDR planning are essential layers of modern cyber resilience. Organizations must prepare not only to defend against attacks but also to recover from them quickly to avoid significant operational and financial disruption.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function GroupBadge({ group, groupColor }) {
  if (!group || !groupColor) return null;
  const c = groupColor;
  return (
    <span style={{
      display: "inline-block", flexShrink: 0,
      width: 20, height: 20,
      border: "1px solid color-mix(in oklch, " + c + " 45%, transparent)",
      background: "color-mix(in oklch, " + c + " 12%, transparent)",
      borderRadius: 2
    }} />
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
