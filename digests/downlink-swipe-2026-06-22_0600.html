window.__DL_ARTICLES = [{"n":1,"title":"AryStinger Malware Infects 4,300 Legacy Routers to Build Reconnaissance Proxy Network","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/arystinger-malware-infects-4300-legacy.html","time":"06:57","priority":"MUST READ","score":92,"tldr":"AryStinger is infecting thousands of outdated Realtek-based home routers, mainly D-Link devices, to create a distributed reconnaissance and proxy network rather than a typical DDoS botnet. The key defense is to retire end-of-life routers, patch exposed appliances like QNAP NAS devices, and disable remote administration.","briefOverview":"\u003cp\u003eQiAnXin\u0026rsquo;s XLab says a new malware family called \u003cstrong\u003eAryStinger\u003c/strong\u003e has infected at least 4,300 legacy routers, with the number still rising. The infected devices are being used as a distributed reconnaissance and proxy network rather than the DDoS botnet role often associated with compromised routers. AryStinger scans the internet, fingerprints services, enumerates subdomains, tunnels traffic, runs commands on demand, and sends results back to the operator.\u003c/p\u003e\n\n\u003cp\u003eThe campaign targets routers built on Realtek RTL819X chips, especially older D-Link devices, and XLab first observed it spreading from 107.150.106.14 on March 12, 2026. The malware exploits CVE-2013-3307 in Linksys models and CVE-2016-5681 in D-Link models, with the DIR-850L accounting for about 75 percent of the known infected pool. The infections are concentrated mainly in South Korea and China, followed by Sweden, Malaysia, and Singapore.\u003c/p\u003e\n\n\u003cp\u003eXLab also observed a second AryStinger strain targeting QNAP NAS devices through CVE-2025-11837 in QNAP\u0026rsquo;s Malware Remover, though the 4,300 infection count covers only RTL819X routers. The router build is a lightweight C program focused on DNS scanning and tunneling, while the Go-based NAS build can run tools such as fscan, ksubdomain, and httpx and execute attacker-supplied Go, Java, or Python source code. The article recommends checking for AryStinger-related domains, unexpected binaries in /tmp/bin, processes named syswapd0h or syswapd0w, and retiring end-of-life routers that no longer receive firmware updates.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["QiAnXin's XLab says the AryStinger malware has infected at least 4,300 legacy routers and is using them as a distributed reconnaissance and proxy network rather than a typical DDoS botnet.","AryStinger targets routers built on Realtek RTL819X chips and exploits CVE-2013-3307 in Linksys models and CVE-2016-5681 in D-Link models.","The known infected router pool is mostly D-Link devices, with the DIR-850L alone accounting for about 75 percent, and infections are concentrated in South Korea and China.","A second AryStinger strain appeared on April 26 targeting QNAP NAS devices through CVE-2025-11837 in QNAP Malware Remover, but XLab has not measured the number of NAS infections.","XLab says infected nodes communicate with command-and-control servers over HTTP or HTTPS using Protobuf-encoded traffic obfuscated with XOR, and persistence is provided through Dropbear SSH on routers or gs-netcat on NAS devices."],"insights":["AryStinger is notable because its operators use compromised routers for pre-intrusion reconnaissance and traffic relaying, meaning infected home devices can help hide and prepare later attacks rather than simply generate noisy disruption.","The campaign relies on very old flaws in legacy routers, showing that devices that stopped receiving fixes years ago can remain useful attack infrastructure long after vendors have moved on.","The QNAP strain abuses the appliance’s own Malware Remover component, making the entry point especially counterintuitive because it targets a tool meant to help protect the device.","The router and NAS builds are tailored to device capability: the lightweight C router build performs simpler scanning and tunneling, while the Go-based NAS build runs broader reconnaissance tools and attacker-supplied source code.","XLab’s suggested checks are concrete and actionable: look for outbound connections to ajb8.com-related domains, unexpected binaries in /tmp/bin, and processes named syswapd0h or syswapd0w."],"referencedReports":[{"title":"AryStinger Botnet Hijacks Legacy Routers for Global Attacks","url":"https://blog.xlab.qianxin.com/arystinger-botnet-hijacks-legacy-routers-for-global-attacks-en/","publisher":"QiAnXin XLab","context":"The article is based on XLab's analysis of AryStinger infections, capabilities, targets, and indicators of compromise.","category":"","primary":false},{"title":"QSA-25-47","url":"https://www.qnap.com/en/security-advisory/qsa-25-47","publisher":"QNAP","context":"The article references QNAP's advisory for CVE-2025-11837, a code injection flaw in Malware Remover that the second AryStinger strain targets.","category":"","primary":false},{"title":"China-nexus Espionage ORB Networks","url":"https://cloud.google.com/blog/topics/threat-intelligence/china-nexus-espionage-orb-networks","publisher":"Mandiant","context":"The article cites Mandiant's tracking of operational relay box networks as background for how compromised routers and IoT devices are used to scan and relay traffic.","category":"","primary":false}],"body":"\u003cp\u003eQiAnXin\u0026rsquo;s XLab says a new malware family called \u003cstrong\u003eAryStinger\u003c/strong\u003e has infected at least 4,300 legacy routers, with the number still rising. The infected devices are being used as a distributed reconnaissance and proxy network rather than the DDoS botnet role often associated with compromised routers. AryStinger scans the internet, fingerprints services, enumerates subdomains, tunnels traffic, runs commands on demand, and sends results back to the operator.\u003c/p\u003e\n\n\u003cp\u003eThe campaign targets routers built on Realtek RTL819X chips, especially older D-Link devices, and XLab first observed it spreading from 107.150.106.14 on March 12, 2026. The malware exploits CVE-2013-3307 in Linksys models and CVE-2016-5681 in D-Link models, with the DIR-850L accounting for about 75 percent of the known infected pool. The infections are concentrated mainly in South Korea and China, followed by Sweden, Malaysia, and Singapore.\u003c/p\u003e\n\n\u003cp\u003eXLab also observed a second AryStinger strain targeting QNAP NAS devices through CVE-2025-11837 in QNAP\u0026rsquo;s Malware Remover, though the 4,300 infection count covers only RTL819X routers. The router build is a lightweight C program focused on DNS scanning and tunneling, while the Go-based NAS build can run tools such as fscan, ksubdomain, and httpx and execute attacker-supplied Go, Java, or Python source code. The article recommends checking for AryStinger-related domains, unexpected binaries in /tmp/bin, processes named syswapd0h or syswapd0w, and retiring end-of-life routers that no longer receive firmware updates.\u003c/p\u003e\n"},{"n":2,"title":"Canada’s Spy Agency Used First-of-Its-Kind Warrant to Clean Botnet-Infected Devices","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/canadas-spy-agency-used-first-of-its.html","time":"09:11","priority":"SHOULD READ","score":82,"tldr":"Canada’s spy agency obtained a first-of-its-kind warrant to remotely neutralize two foreign-run botnets using infected Canadian routers, servers, and IoT devices as relays. The case shows governments are increasingly using court-approved remote cleanup powers, but owners still need to replace or secure neglected devices to prevent reinfection.","briefOverview":"\u003cp\u003eCanada’s Federal Court authorized the Canadian Security Intelligence Service to remotely neutralize two foreign-run botnets operating through infected devices on Canadian soil. The warrant allowed CSIS to alter, degrade, and destroy botnet data on Canada-based servers, small office and home office routers, and Internet of Things devices such as Ring doorbells, security cameras, TVs, and other Wi-Fi-enabled appliances. The public version of the ruling was released on June 15 and the article says this was the first time CSIS used its threat reduction warrant powers in this way.\u003c/p\u003e\n\n\u003cp\u003eThe court found the threat to Canada clearly established and imminent, and said the measures were necessary, reasonable, and proportional. The ruling stressed that the operation targeted devices rather than people, with no user identities sought, no content intercepted, and any personal data collected incidentally destroyed. The article says CSIS needed the order because reaching into someone else’s device and wiping data would likely have been computer mischief under the Criminal Code without judicial authorization.\u003c/p\u003e\n\n\u003cp\u003eThe botnets used infected Canadian hardware as relay points so foreign state activity could appear to come from ordinary home or internet service provider connections. The court flagged the energy sector among the targets and warned the adversaries could direct the botnets to probe and potentially disrupt Canadian infrastructure. The article also notes that government cleanup does not fix the underlying problem of end-of-life routers, outdated IoT devices, default credentials, and internet-facing management panels that can allow reinfection.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Canada’s Federal Court authorized CSIS to remotely alter, degrade, and destroy botnet data on infected Canada-based servers, SOHO routers, and IoT devices to disconnect them from two foreign-run botnets.","The public ruling said the operation targeted devices rather than people, with no user identities sought, no content intercepted, and any incidentally collected personal data destroyed.","The court found the threat to Canada clearly established and imminent, and it warned that the botnets could be used to probe and potentially disrupt Canadian infrastructure, including the energy sector.","The article compares Canada’s intelligence-service warrant to recent U.S. FBI and DOJ court-ordered botnet cleanups involving China-linked Volt Typhoon’s KV-botnet and Russia’s GRU-linked APT28 network.","The article states that government cleanup does not fix the underlying risks from end-of-life routers, outdated IoT devices, default credentials, or internet-facing management panels."],"insights":["CSIS needed a warrant because remotely wiping botnet data from privately owned devices could otherwise qualify as computer mischief under Canada’s Criminal Code.","The public ruling confirms the botnets were foreign-state linked but redacts which states were behind them, leaving unresolved whether they were Chinese, Russian, or one of each.","Canada’s operation differs from similar U.S. botnet cleanups because it was carried out by an intelligence service using threat reduction powers rather than by law enforcement under search-and-seizure authority.","The cleanup did not solve the underlying device security problem, because outdated hardware, missing firmware updates, default credentials, and exposed management panels can still allow reinfection.","The article highlights an unresolved legal issue because CSIS reportedly relied on warrantless IP address collection shortly after Canada’s Supreme Court held that IP addresses carry a reasonable expectation of privacy."],"referencedReports":[],"body":"\u003cp\u003eCanada’s Federal Court authorized the Canadian Security Intelligence Service to remotely neutralize two foreign-run botnets operating through infected devices on Canadian soil. The warrant allowed CSIS to alter, degrade, and destroy botnet data on Canada-based servers, small office and home office routers, and Internet of Things devices such as Ring doorbells, security cameras, TVs, and other Wi-Fi-enabled appliances. The public version of the ruling was released on June 15 and the article says this was the first time CSIS used its threat reduction warrant powers in this way.\u003c/p\u003e\n\n\u003cp\u003eThe court found the threat to Canada clearly established and imminent, and said the measures were necessary, reasonable, and proportional. The ruling stressed that the operation targeted devices rather than people, with no user identities sought, no content intercepted, and any personal data collected incidentally destroyed. The article says CSIS needed the order because reaching into someone else’s device and wiping data would likely have been computer mischief under the Criminal Code without judicial authorization.\u003c/p\u003e\n\n\u003cp\u003eThe botnets used infected Canadian hardware as relay points so foreign state activity could appear to come from ordinary home or internet service provider connections. The court flagged the energy sector among the targets and warned the adversaries could direct the botnets to probe and potentially disrupt Canadian infrastructure. The article also notes that government cleanup does not fix the underlying problem of end-of-life routers, outdated IoT devices, default credentials, and internet-facing management panels that can allow reinfection.\u003c/p\u003e\n"},{"n":3,"title":"INTERPOL Warns Phishing, Ransomware, and AI Scams Are Rising Across Asia-Pacific","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/interpol-warns-phishing-ransomware-and.html","time":"06:06","priority":"MAY READ","score":58,"tldr":"INTERPOL warns that cybercrime is surging across Asia and the South Pacific, with phishing, ransomware, infostealers, and AI-driven deepfake scams causing major financial losses. The report highlights organized scam operations and ransomware-as-a-service as key drivers, urging stronger regional cooperation and cyber resilience.","briefOverview":"\u003cp\u003eINTERPOL’s \u003csup\u003e2025\u003c/sup\u003e\u0026frasl;\u003csub\u003e2026\u003c/sub\u003e Asia and South Pacific Cyberthreat Assessment Report warns of a dramatic increase in cybercrime across Asia and the South Pacific. The report attributes the rise to rapid digitalization, internet penetration, new technologies, organized criminal networks, and uneven cybersecurity maturity. INTERPOL said more than half of member countries reported that cybercrime accounted for at least 30% of all crimes recorded nationally.\u003c/p\u003e\n\n\u003cp\u003ePhishing is described as the most widespread and financially damaging form of cybercrime in the region, with a third of countries reporting more than 10,000 cases between January 2024 and March 2025. The report also highlights more than 135,000 ransomware-related attacks in 2024, mostly affecting real estate, manufacturing, and financial services. INTERPOL said cybercriminals are using artificial intelligence, ransomware-as-a-service models, and sophisticated social engineering techniques on an industrial scale.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes the industrialization of cyber-enabled scams by organized crime syndicates in Cambodia, Laos, Myanmar, and the Philippines, including scam centers that use forced labor. INTERPOL said organized crime in Myanmar, Cambodia, and Laos used deepfakes in romance baiting scams that contributed to $37 billion in regional cybercrime losses. Other trends include banking trojans and information stealers such as RedLine, Lumma, LokiBot, Negasteal, and ZBot, a 92% rise in DDoS attacks in 2024, and system intrusions accounting for about 80% of data breaches in 2024.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["INTERPOL’s 2025/2026 Asia and South Pacific Cyberthreat Assessment Report says cybercrime has increased dramatically in Asia and the South Pacific due to rapid digitalization, internet penetration, new technologies, organized criminal networks, and uneven cybersecurity maturity.","Phishing is described as the most widespread and financially damaging cybercrime in the region, with one-third of countries reporting more than 10,000 cases between January 2024 and March 2025.","The region recorded more than 135,000 ransomware-related attacks in 2024, with most incidents affecting the real estate, manufacturing, and financial services sectors.","INTERPOL said organized crime groups in Myanmar, Cambodia, and Laos used deepfakes in romance baiting scams that contributed to $37 billion in regional cybercrime losses.","The report identified additional regional trends including banking trojans and information stealers, a 92% rise in DDoS attacks in 2024, and system intrusions accounting for about 80% of data breaches in 2024."],"insights":["Cybercriminals in the region are using companies’ regulatory obligations as leverage during ransomware extortion, showing that legal and compliance pressure has become part of the extortion strategy.","The article links deepfakes not only to business executive impersonation but also to romance baiting scams and sexual exploitation, indicating that AI-generated deception is being used across both corporate fraud and personal coercion.","The report highlights that phishing link click rates in Asia and the South Pacific are nearly double the global average, making phishing a particularly urgent regional risk rather than just a general global problem.","INTERPOL’s response focuses on joint operations, shared investigations, training, and resilience policies, suggesting that the threat is too cross-border and organized for individual countries to address alone."],"referencedReports":[{"title":"2025/2026 Asia and South Pacific Cyberthreat Assessment Report","url":"https://www.interpol.int/News-and-Events/News/2026/New-INTERPOL-report-highlights-escalating-cyber-threats-across-Asia-and-South-Pacific","publisher":"INTERPOL","context":"The article is based on INTERPOL’s report warning of a dramatic increase in cybercrime across Asia and the South Pacific.","category":"","primary":false},{"title":"Threat Labs Report: Asia 2024","url":"https://www.netskope.com/resources/threat-labs-reports/threat-labs-report-asia-2024","publisher":"Netskope","context":"The article cites this report for the statistic that 5.5 out of every 1,000 individuals in Asia and the South Pacific clicked phishing links monthly.","category":"","primary":false}],"body":"\u003cp\u003eINTERPOL’s \u003csup\u003e2025\u003c/sup\u003e\u0026frasl;\u003csub\u003e2026\u003c/sub\u003e Asia and South Pacific Cyberthreat Assessment Report warns of a dramatic increase in cybercrime across Asia and the South Pacific. The report attributes the rise to rapid digitalization, internet penetration, new technologies, organized criminal networks, and uneven cybersecurity maturity. INTERPOL said more than half of member countries reported that cybercrime accounted for at least 30% of all crimes recorded nationally.\u003c/p\u003e\n\n\u003cp\u003ePhishing is described as the most widespread and financially damaging form of cybercrime in the region, with a third of countries reporting more than 10,000 cases between January 2024 and March 2025. The report also highlights more than 135,000 ransomware-related attacks in 2024, mostly affecting real estate, manufacturing, and financial services. INTERPOL said cybercriminals are using artificial intelligence, ransomware-as-a-service models, and sophisticated social engineering techniques on an industrial scale.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes the industrialization of cyber-enabled scams by organized crime syndicates in Cambodia, Laos, Myanmar, and the Philippines, including scam centers that use forced labor. INTERPOL said organized crime in Myanmar, Cambodia, and Laos used deepfakes in romance baiting scams that contributed to $37 billion in regional cybercrime losses. Other trends include banking trojans and information stealers such as RedLine, Lumma, LokiBot, Negasteal, and ZBot, a 92% rise in DDoS attacks in 2024, and system intrusions accounting for about 80% of data breaches in 2024.\u003c/p\u003e\n"},{"n":4,"title":"No ID, No Data For You","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/identify-manage-and-control-ai-agents-with-netskope-and-aembit","time":"07:01","priority":"MAY READ","score":35,"tldr":"AI agents need identity-based access controls tied to both the human user and the agent, plus inline data governance to monitor and restrict what they do. The article promotes combining Aembit’s workload/agent identity controls with Netskope’s AI security policy layer to secure MCP-based agent interactions end to end.","briefOverview":"\u003cp\u003eThe article argues that AI agents are actors that perform work on systems and therefore need identity-based boundaries like humans and devices. It says agents differ from humans because they can be nameless outside their codebases, act unexpectedly, operate at machine speed, scale massively, and make mistakes quickly. Because of these traits, the article says business use of AI agents requires both an identity and access layer and a policy layer around their activities.\u003c/p\u003e\n\n\u003cp\u003eFor identity and access, the article describes Aembit’s approach to workload identity, where credentials are generated just in time and injected into workloads at runtime instead of being stored as static secrets. It says agent access decisions should verify both the human user and the agent together, using a blended identity that asks whether a specific user using a specific agent is authorized to access a specific resource at that moment. It also describes Aembit MCP components that implement OAuth 2.1 functions, dynamically register MCP clients, proxy traffic between agents and MCP servers, and issue short-lived access credentials.\u003c/p\u003e\n\n\u003cp\u003eFor data policy, the article says MCP lacks native visibility, enforcement, and governance for data flows. It presents Netskope’s Agentic Broker, AI Gateway, and AI Guardrails as products that add controls for public MCP servers, privately hosted AI environments, prompt filtering, data loss prevention, prompt injection, and jailbreaking attacks. The article describes a combined Netskope and Aembit deployment in which Aembit Edge injects runtime credentials, Netskope inspects content in transit and logs interactions, and identity-based policies are applied to agent activity.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article argues that AI agents need both an identity and access layer and a policy layer around all activities they take because they can act quickly, scale massively, and make mistakes at machine speed.","Aembit’s IAM for Agentic AI creates a blended identity that combines the human user and the agent to answer whether a specific user using a specific agent is authorized to access a specific resource at a given time.","The article says MCP lacks a native data policy layer and therefore cannot provide visibility, enforcement, or governance of data flows on its own.","Netskope’s AI security products, including Agentic Broker, AI Gateway, and AI Guardrails, are presented as adding policy controls for MCP servers, privately hosted AI environments, and threats such as prompt injection and jailbreaking.","The described end-to-end approach uses Netskope One AI Gateway and Aembit Edge so credentials are injected at runtime, content in transit is inspected, interactions are logged, and identity-based policies can be applied to agent activity."],"insights":["Evaluating only the human user or only the agent is insufficient because the article says policy decisions must distinguish both the specific user and the specific agent involved in an access request.","The article highlights that MCP interactions need added controls because MCP itself does not provide native visibility, enforcement, or governance for data flows.","The article presents short-lived, runtime-injected credentials as a way to avoid deployers creating, storing, or sharing access tokens for agent-to-gateway and gateway-to-LLM interactions.","The article emphasizes that public MCP servers may be useful to companies but require risk scoring, default blocking options, and granular controls before they are connected to enterprise data or allowed to perform autonomous operations.","The article points out that policy enforcement depends on getting inline between MCP clients and servers so agent traffic can be inspected, logged, and governed while it is in transit."],"referencedReports":[{"title":"Emergent Offensive Cyber Behavior in AI Agents","url":"https://www.irregular.com/publications/emergent-offensive-cyber-behavior-in-ai-agents","publisher":"Irregular","context":"The article cites this publication to support its statement that AI agents can find ways to skirt their rules.","category":"","primary":false},{"title":"How We Hacked McKinsey’s AI Platform","url":"https://codewall.ai/blog/how-we-hacked-mckinseys-ai-platform","publisher":"Codewall","context":"The article cites this technical write-up as an example of attackers being motivated to weaponize AI agents.","category":"","primary":false}],"body":"\u003cp\u003eThe article argues that AI agents are actors that perform work on systems and therefore need identity-based boundaries like humans and devices. It says agents differ from humans because they can be nameless outside their codebases, act unexpectedly, operate at machine speed, scale massively, and make mistakes quickly. Because of these traits, the article says business use of AI agents requires both an identity and access layer and a policy layer around their activities.\u003c/p\u003e\n\n\u003cp\u003eFor identity and access, the article describes Aembit’s approach to workload identity, where credentials are generated just in time and injected into workloads at runtime instead of being stored as static secrets. It says agent access decisions should verify both the human user and the agent together, using a blended identity that asks whether a specific user using a specific agent is authorized to access a specific resource at that moment. It also describes Aembit MCP components that implement OAuth 2.1 functions, dynamically register MCP clients, proxy traffic between agents and MCP servers, and issue short-lived access credentials.\u003c/p\u003e\n\n\u003cp\u003eFor data policy, the article says MCP lacks native visibility, enforcement, and governance for data flows. It presents Netskope’s Agentic Broker, AI Gateway, and AI Guardrails as products that add controls for public MCP servers, privately hosted AI environments, prompt filtering, data loss prevention, prompt injection, and jailbreaking attacks. The article describes a combined Netskope and Aembit deployment in which Aembit Edge injects runtime credentials, Netskope inspects content in transit and logs interactions, and identity-based policies are applied to agent activity.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

// Shared card chrome so the front and back faces render identical tokens.
function CardTitle({ children }) {
  return (
    <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 20, lineHeight: 1.3, letterSpacing: "-0.005em", color: "var(--text)" }}>
      {children}
    </h2>
  );
}

function SourceTag({ article }) {
  const srcColor = `var(--p${article.sourceColorIdx})`;
  return (
    <>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
        {article.source}
      </span>
    </>
  );
}

function numberedList(items, accent) {
  return (
    <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
      {(items || []).map((item, i) => (
        <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: accent, marginTop: 3, letterSpacing: "0.04em" }}>
            {String(i + 1).padStart(2, "0")}
          </span>
          <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{item}</span>
        </li>
      ))}
    </ul>
  );
}

function KeyPointsSection({ keyPoints, accent }) {
  if (!keyPoints || keyPoints.length === 0) return null;
  return (
    <div style={{ marginTop: 18 }}>
      <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
      {numberedList(keyPoints, accent)}
    </div>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            {report.primary && <span className="report-primary">PRIMARY</span>}
            <a className="report-link" href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
            {report.category && <span className={"report-cat report-cat-" + report.category}>{report.category}</span>}
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
