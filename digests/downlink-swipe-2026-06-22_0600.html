<script type="application/json" id="dl-articles">[{"n":1,"title":"AryStinger Malware Infects 4,300 Legacy Routers to Build Reconnaissance Proxy Network","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/arystinger-malware-infects-4300-legacy.html","time":"06:57","priority":"MUST READ","score":92,"tldr":"AryStinger is infecting thousands of outdated Realtek-based home routers, mainly D-Link devices, to create a distributed reconnaissance and proxy network rather than a typical DDoS botnet. The key defense is to retire end-of-life routers, patch exposed appliances like QNAP NAS devices, and disable remote administration.","briefOverview":"\u003cp\u003eQiAnXin\u0026rsquo;s XLab says a new malware family called \u003cstrong\u003eAryStinger\u003c/strong\u003e has infected at least 4,300 legacy routers, with the number still rising. The infected devices are being used as a distributed reconnaissance and proxy network rather than the DDoS botnet role often associated with compromised routers. AryStinger scans the internet, fingerprints services, enumerates subdomains, tunnels traffic, runs commands on demand, and sends results back to the operator.\u003c/p\u003e\n\n\u003cp\u003eThe campaign targets routers built on Realtek RTL819X chips, especially older D-Link devices, and XLab first observed it spreading from 107.150.106.14 on March 12, 2026. The malware exploits CVE-2013-3307 in Linksys models and CVE-2016-5681 in D-Link models, with the DIR-850L accounting for about 75 percent of the known infected pool. The infections are concentrated mainly in South Korea and China, followed by Sweden, Malaysia, and Singapore.\u003c/p\u003e\n\n\u003cp\u003eXLab also observed a second AryStinger strain targeting QNAP NAS devices through CVE-2025-11837 in QNAP\u0026rsquo;s Malware Remover, though the 4,300 infection count covers only RTL819X routers. The router build is a lightweight C program focused on DNS scanning and tunneling, while the Go-based NAS build can run tools such as fscan, ksubdomain, and httpx and execute attacker-supplied Go, Java, or Python source code. The article recommends checking for AryStinger-related domains, unexpected binaries in /tmp/bin, processes named syswapd0h or syswapd0w, and retiring end-of-life routers that no longer receive firmware updates.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["QiAnXin's XLab says the AryStinger malware has infected at least 4,300 legacy routers and is using them as a distributed reconnaissance and proxy network rather than a typical DDoS botnet.","AryStinger targets routers built on Realtek RTL819X chips and exploits CVE-2013-3307 in Linksys models and CVE-2016-5681 in D-Link models.","The known infected router pool is mostly D-Link devices, with the DIR-850L alone accounting for about 75 percent, and infections are concentrated in South Korea and China.","A second AryStinger strain appeared on April 26 targeting QNAP NAS devices through CVE-2025-11837 in QNAP Malware Remover, but XLab has not measured the number of NAS infections.","XLab says infected nodes communicate with command-and-control servers over HTTP or HTTPS using Protobuf-encoded traffic obfuscated with XOR, and persistence is provided through Dropbear SSH on routers or gs-netcat on NAS devices."],"insights":["AryStinger is notable because its operators use compromised routers for pre-intrusion reconnaissance and traffic relaying, meaning infected home devices can help hide and prepare later attacks rather than simply generate noisy disruption.","The campaign relies on very old flaws in legacy routers, showing that devices that stopped receiving fixes years ago can remain useful attack infrastructure long after vendors have moved on.","The QNAP strain abuses the appliance’s own Malware Remover component, making the entry point especially counterintuitive because it targets a tool meant to help protect the device.","The router and NAS builds are tailored to device capability: the lightweight C router build performs simpler scanning and tunneling, while the Go-based NAS build runs broader reconnaissance tools and attacker-supplied source code.","XLab’s suggested checks are concrete and actionable: look for outbound connections to ajb8.com-related domains, unexpected binaries in /tmp/bin, and processes named syswapd0h or syswapd0w."],"referencedReports":[{"title":"AryStinger Botnet Hijacks Legacy Routers for Global Attacks","url":"https://blog.xlab.qianxin.com/arystinger-botnet-hijacks-legacy-routers-for-global-attacks-en/","publisher":"QiAnXin XLab","context":"The article is based on XLab's analysis of AryStinger infections, capabilities, targets, and indicators of compromise.","category":"","primary":false},{"title":"QSA-25-47","url":"https://www.qnap.com/en/security-advisory/qsa-25-47","publisher":"QNAP","context":"The article references QNAP's advisory for CVE-2025-11837, a code injection flaw in Malware Remover that the second AryStinger strain targets.","category":"","primary":false},{"title":"China-nexus Espionage ORB Networks","url":"https://cloud.google.com/blog/topics/threat-intelligence/china-nexus-espionage-orb-networks","publisher":"Mandiant","context":"The article cites Mandiant's tracking of operational relay box networks as background for how compromised routers and IoT devices are used to scan and relay traffic.","category":"","primary":false}],"body":"\u003cp\u003eQiAnXin\u0026rsquo;s XLab says a new malware family called \u003cstrong\u003eAryStinger\u003c/strong\u003e has infected at least 4,300 legacy routers, with the number still rising. The infected devices are being used as a distributed reconnaissance and proxy network rather than the DDoS botnet role often associated with compromised routers. AryStinger scans the internet, fingerprints services, enumerates subdomains, tunnels traffic, runs commands on demand, and sends results back to the operator.\u003c/p\u003e\n\n\u003cp\u003eThe campaign targets routers built on Realtek RTL819X chips, especially older D-Link devices, and XLab first observed it spreading from 107.150.106.14 on March 12, 2026. The malware exploits CVE-2013-3307 in Linksys models and CVE-2016-5681 in D-Link models, with the DIR-850L accounting for about 75 percent of the known infected pool. The infections are concentrated mainly in South Korea and China, followed by Sweden, Malaysia, and Singapore.\u003c/p\u003e\n\n\u003cp\u003eXLab also observed a second AryStinger strain targeting QNAP NAS devices through CVE-2025-11837 in QNAP\u0026rsquo;s Malware Remover, though the 4,300 infection count covers only RTL819X routers. The router build is a lightweight C program focused on DNS scanning and tunneling, while the Go-based NAS build can run tools such as fscan, ksubdomain, and httpx and execute attacker-supplied Go, Java, or Python source code. The article recommends checking for AryStinger-related domains, unexpected binaries in /tmp/bin, processes named syswapd0h or syswapd0w, and retiring end-of-life routers that no longer receive firmware updates.\u003c/p\u003e\n"},{"n":2,"title":"Canada’s Spy Agency Used First-of-Its-Kind Warrant to Clean Botnet-Infected Devices","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/canadas-spy-agency-used-first-of-its.html","time":"09:11","priority":"SHOULD READ","score":82,"tldr":"Canada’s spy agency obtained a first-of-its-kind warrant to remotely neutralize two foreign-run botnets using infected Canadian routers, servers, and IoT devices as relays. The case shows governments are increasingly using court-approved remote cleanup powers, but owners still need to replace or secure neglected devices to prevent reinfection.","briefOverview":"\u003cp\u003eCanada’s Federal Court authorized the Canadian Security Intelligence Service to remotely neutralize two foreign-run botnets operating through infected devices on Canadian soil. The warrant allowed CSIS to alter, degrade, and destroy botnet data on Canada-based servers, small office and home office routers, and Internet of Things devices such as Ring doorbells, security cameras, TVs, and other Wi-Fi-enabled appliances. The public version of the ruling was released on June 15 and the article says this was the first time CSIS used its threat reduction warrant powers in this way.\u003c/p\u003e\n\n\u003cp\u003eThe court found the threat to Canada clearly established and imminent, and said the measures were necessary, reasonable, and proportional. The ruling stressed that the operation targeted devices rather than people, with no user identities sought, no content intercepted, and any personal data collected incidentally destroyed. The article says CSIS needed the order because reaching into someone else’s device and wiping data would likely have been computer mischief under the Criminal Code without judicial authorization.\u003c/p\u003e\n\n\u003cp\u003eThe botnets used infected Canadian hardware as relay points so foreign state activity could appear to come from ordinary home or internet service provider connections. The court flagged the energy sector among the targets and warned the adversaries could direct the botnets to probe and potentially disrupt Canadian infrastructure. The article also notes that government cleanup does not fix the underlying problem of end-of-life routers, outdated IoT devices, default credentials, and internet-facing management panels that can allow reinfection.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Canada’s Federal Court authorized CSIS to remotely alter, degrade, and destroy botnet data on infected Canada-based servers, SOHO routers, and IoT devices to disconnect them from two foreign-run botnets.","The public ruling said the operation targeted devices rather than people, with no user identities sought, no content intercepted, and any incidentally collected personal data destroyed.","The court found the threat to Canada clearly established and imminent, and it warned that the botnets could be used to probe and potentially disrupt Canadian infrastructure, including the energy sector.","The article compares Canada’s intelligence-service warrant to recent U.S. FBI and DOJ court-ordered botnet cleanups involving China-linked Volt Typhoon’s KV-botnet and Russia’s GRU-linked APT28 network.","The article states that government cleanup does not fix the underlying risks from end-of-life routers, outdated IoT devices, default credentials, or internet-facing management panels."],"insights":["CSIS needed a warrant because remotely wiping botnet data from privately owned devices could otherwise qualify as computer mischief under Canada’s Criminal Code.","The public ruling confirms the botnets were foreign-state linked but redacts which states were behind them, leaving unresolved whether they were Chinese, Russian, or one of each.","Canada’s operation differs from similar U.S. botnet cleanups because it was carried out by an intelligence service using threat reduction powers rather than by law enforcement under search-and-seizure authority.","The cleanup did not solve the underlying device security problem, because outdated hardware, missing firmware updates, default credentials, and exposed management panels can still allow reinfection.","The article highlights an unresolved legal issue because CSIS reportedly relied on warrantless IP address collection shortly after Canada’s Supreme Court held that IP addresses carry a reasonable expectation of privacy."],"referencedReports":[],"body":"\u003cp\u003eCanada’s Federal Court authorized the Canadian Security Intelligence Service to remotely neutralize two foreign-run botnets operating through infected devices on Canadian soil. The warrant allowed CSIS to alter, degrade, and destroy botnet data on Canada-based servers, small office and home office routers, and Internet of Things devices such as Ring doorbells, security cameras, TVs, and other Wi-Fi-enabled appliances. The public version of the ruling was released on June 15 and the article says this was the first time CSIS used its threat reduction warrant powers in this way.\u003c/p\u003e\n\n\u003cp\u003eThe court found the threat to Canada clearly established and imminent, and said the measures were necessary, reasonable, and proportional. The ruling stressed that the operation targeted devices rather than people, with no user identities sought, no content intercepted, and any personal data collected incidentally destroyed. The article says CSIS needed the order because reaching into someone else’s device and wiping data would likely have been computer mischief under the Criminal Code without judicial authorization.\u003c/p\u003e\n\n\u003cp\u003eThe botnets used infected Canadian hardware as relay points so foreign state activity could appear to come from ordinary home or internet service provider connections. The court flagged the energy sector among the targets and warned the adversaries could direct the botnets to probe and potentially disrupt Canadian infrastructure. The article also notes that government cleanup does not fix the underlying problem of end-of-life routers, outdated IoT devices, default credentials, and internet-facing management panels that can allow reinfection.\u003c/p\u003e\n"},{"n":3,"title":"INTERPOL Warns Phishing, Ransomware, and AI Scams Are Rising Across Asia-Pacific","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/interpol-warns-phishing-ransomware-and.html","time":"06:06","priority":"MAY READ","score":58,"tldr":"INTERPOL warns that cybercrime is surging across Asia and the South Pacific, with phishing, ransomware, infostealers, and AI-driven deepfake scams causing major financial losses. The report highlights organized scam operations and ransomware-as-a-service as key drivers, urging stronger regional cooperation and cyber resilience.","briefOverview":"\u003cp\u003eINTERPOL’s \u003csup\u003e2025\u003c/sup\u003e\u0026frasl;\u003csub\u003e2026\u003c/sub\u003e Asia and South Pacific Cyberthreat Assessment Report warns of a dramatic increase in cybercrime across Asia and the South Pacific. The report attributes the rise to rapid digitalization, internet penetration, new technologies, organized criminal networks, and uneven cybersecurity maturity. INTERPOL said more than half of member countries reported that cybercrime accounted for at least 30% of all crimes recorded nationally.\u003c/p\u003e\n\n\u003cp\u003ePhishing is described as the most widespread and financially damaging form of cybercrime in the region, with a third of countries reporting more than 10,000 cases between January 2024 and March 2025. The report also highlights more than 135,000 ransomware-related attacks in 2024, mostly affecting real estate, manufacturing, and financial services. INTERPOL said cybercriminals are using artificial intelligence, ransomware-as-a-service models, and sophisticated social engineering techniques on an industrial scale.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes the industrialization of cyber-enabled scams by organized crime syndicates in Cambodia, Laos, Myanmar, and the Philippines, including scam centers that use forced labor. INTERPOL said organized crime in Myanmar, Cambodia, and Laos used deepfakes in romance baiting scams that contributed to $37 billion in regional cybercrime losses. Other trends include banking trojans and information stealers such as RedLine, Lumma, LokiBot, Negasteal, and ZBot, a 92% rise in DDoS attacks in 2024, and system intrusions accounting for about 80% of data breaches in 2024.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["INTERPOL’s 2025/2026 Asia and South Pacific Cyberthreat Assessment Report says cybercrime has increased dramatically in Asia and the South Pacific due to rapid digitalization, internet penetration, new technologies, organized criminal networks, and uneven cybersecurity maturity.","Phishing is described as the most widespread and financially damaging cybercrime in the region, with one-third of countries reporting more than 10,000 cases between January 2024 and March 2025.","The region recorded more than 135,000 ransomware-related attacks in 2024, with most incidents affecting the real estate, manufacturing, and financial services sectors.","INTERPOL said organized crime groups in Myanmar, Cambodia, and Laos used deepfakes in romance baiting scams that contributed to $37 billion in regional cybercrime losses.","The report identified additional regional trends including banking trojans and information stealers, a 92% rise in DDoS attacks in 2024, and system intrusions accounting for about 80% of data breaches in 2024."],"insights":["Cybercriminals in the region are using companies’ regulatory obligations as leverage during ransomware extortion, showing that legal and compliance pressure has become part of the extortion strategy.","The article links deepfakes not only to business executive impersonation but also to romance baiting scams and sexual exploitation, indicating that AI-generated deception is being used across both corporate fraud and personal coercion.","The report highlights that phishing link click rates in Asia and the South Pacific are nearly double the global average, making phishing a particularly urgent regional risk rather than just a general global problem.","INTERPOL’s response focuses on joint operations, shared investigations, training, and resilience policies, suggesting that the threat is too cross-border and organized for individual countries to address alone."],"referencedReports":[{"title":"2025/2026 Asia and South Pacific Cyberthreat Assessment Report","url":"https://www.interpol.int/News-and-Events/News/2026/New-INTERPOL-report-highlights-escalating-cyber-threats-across-Asia-and-South-Pacific","publisher":"INTERPOL","context":"The article is based on INTERPOL’s report warning of a dramatic increase in cybercrime across Asia and the South Pacific.","category":"","primary":false},{"title":"Threat Labs Report: Asia 2024","url":"https://www.netskope.com/resources/threat-labs-reports/threat-labs-report-asia-2024","publisher":"Netskope","context":"The article cites this report for the statistic that 5.5 out of every 1,000 individuals in Asia and the South Pacific clicked phishing links monthly.","category":"","primary":false}],"body":"\u003cp\u003eINTERPOL’s \u003csup\u003e2025\u003c/sup\u003e\u0026frasl;\u003csub\u003e2026\u003c/sub\u003e Asia and South Pacific Cyberthreat Assessment Report warns of a dramatic increase in cybercrime across Asia and the South Pacific. The report attributes the rise to rapid digitalization, internet penetration, new technologies, organized criminal networks, and uneven cybersecurity maturity. INTERPOL said more than half of member countries reported that cybercrime accounted for at least 30% of all crimes recorded nationally.\u003c/p\u003e\n\n\u003cp\u003ePhishing is described as the most widespread and financially damaging form of cybercrime in the region, with a third of countries reporting more than 10,000 cases between January 2024 and March 2025. The report also highlights more than 135,000 ransomware-related attacks in 2024, mostly affecting real estate, manufacturing, and financial services. INTERPOL said cybercriminals are using artificial intelligence, ransomware-as-a-service models, and sophisticated social engineering techniques on an industrial scale.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes the industrialization of cyber-enabled scams by organized crime syndicates in Cambodia, Laos, Myanmar, and the Philippines, including scam centers that use forced labor. INTERPOL said organized crime in Myanmar, Cambodia, and Laos used deepfakes in romance baiting scams that contributed to $37 billion in regional cybercrime losses. Other trends include banking trojans and information stealers such as RedLine, Lumma, LokiBot, Negasteal, and ZBot, a 92% rise in DDoS attacks in 2024, and system intrusions accounting for about 80% of data breaches in 2024.\u003c/p\u003e\n"},{"n":4,"title":"No ID, No Data For You","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/identify-manage-and-control-ai-agents-with-netskope-and-aembit","time":"07:01","priority":"MAY READ","score":35,"tldr":"AI agents need identity-based access controls tied to both the human user and the agent, plus inline data governance to monitor and restrict what they do. The article promotes combining Aembit’s workload/agent identity controls with Netskope’s AI security policy layer to secure MCP-based agent interactions end to end.","briefOverview":"\u003cp\u003eThe article argues that AI agents are actors that perform work on systems and therefore need identity-based boundaries like humans and devices. It says agents differ from humans because they can be nameless outside their codebases, act unexpectedly, operate at machine speed, scale massively, and make mistakes quickly. Because of these traits, the article says business use of AI agents requires both an identity and access layer and a policy layer around their activities.\u003c/p\u003e\n\n\u003cp\u003eFor identity and access, the article describes Aembit’s approach to workload identity, where credentials are generated just in time and injected into workloads at runtime instead of being stored as static secrets. It says agent access decisions should verify both the human user and the agent together, using a blended identity that asks whether a specific user using a specific agent is authorized to access a specific resource at that moment. It also describes Aembit MCP components that implement OAuth 2.1 functions, dynamically register MCP clients, proxy traffic between agents and MCP servers, and issue short-lived access credentials.\u003c/p\u003e\n\n\u003cp\u003eFor data policy, the article says MCP lacks native visibility, enforcement, and governance for data flows. It presents Netskope’s Agentic Broker, AI Gateway, and AI Guardrails as products that add controls for public MCP servers, privately hosted AI environments, prompt filtering, data loss prevention, prompt injection, and jailbreaking attacks. The article describes a combined Netskope and Aembit deployment in which Aembit Edge injects runtime credentials, Netskope inspects content in transit and logs interactions, and identity-based policies are applied to agent activity.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article argues that AI agents need both an identity and access layer and a policy layer around all activities they take because they can act quickly, scale massively, and make mistakes at machine speed.","Aembit’s IAM for Agentic AI creates a blended identity that combines the human user and the agent to answer whether a specific user using a specific agent is authorized to access a specific resource at a given time.","The article says MCP lacks a native data policy layer and therefore cannot provide visibility, enforcement, or governance of data flows on its own.","Netskope’s AI security products, including Agentic Broker, AI Gateway, and AI Guardrails, are presented as adding policy controls for MCP servers, privately hosted AI environments, and threats such as prompt injection and jailbreaking.","The described end-to-end approach uses Netskope One AI Gateway and Aembit Edge so credentials are injected at runtime, content in transit is inspected, interactions are logged, and identity-based policies can be applied to agent activity."],"insights":["Evaluating only the human user or only the agent is insufficient because the article says policy decisions must distinguish both the specific user and the specific agent involved in an access request.","The article highlights that MCP interactions need added controls because MCP itself does not provide native visibility, enforcement, or governance for data flows.","The article presents short-lived, runtime-injected credentials as a way to avoid deployers creating, storing, or sharing access tokens for agent-to-gateway and gateway-to-LLM interactions.","The article emphasizes that public MCP servers may be useful to companies but require risk scoring, default blocking options, and granular controls before they are connected to enterprise data or allowed to perform autonomous operations.","The article points out that policy enforcement depends on getting inline between MCP clients and servers so agent traffic can be inspected, logged, and governed while it is in transit."],"referencedReports":[{"title":"Emergent Offensive Cyber Behavior in AI Agents","url":"https://www.irregular.com/publications/emergent-offensive-cyber-behavior-in-ai-agents","publisher":"Irregular","context":"The article cites this publication to support its statement that AI agents can find ways to skirt their rules.","category":"","primary":false},{"title":"How We Hacked McKinsey’s AI Platform","url":"https://codewall.ai/blog/how-we-hacked-mckinseys-ai-platform","publisher":"Codewall","context":"The article cites this technical write-up as an example of attackers being motivated to weaponize AI agents.","category":"","primary":false}],"body":"\u003cp\u003eThe article argues that AI agents are actors that perform work on systems and therefore need identity-based boundaries like humans and devices. It says agents differ from humans because they can be nameless outside their codebases, act unexpectedly, operate at machine speed, scale massively, and make mistakes quickly. Because of these traits, the article says business use of AI agents requires both an identity and access layer and a policy layer around their activities.\u003c/p\u003e\n\n\u003cp\u003eFor identity and access, the article describes Aembit’s approach to workload identity, where credentials are generated just in time and injected into workloads at runtime instead of being stored as static secrets. It says agent access decisions should verify both the human user and the agent together, using a blended identity that asks whether a specific user using a specific agent is authorized to access a specific resource at that moment. It also describes Aembit MCP components that implement OAuth 2.1 functions, dynamically register MCP clients, proxy traffic between agents and MCP servers, and issue short-lived access credentials.\u003c/p\u003e\n\n\u003cp\u003eFor data policy, the article says MCP lacks native visibility, enforcement, and governance for data flows. It presents Netskope’s Agentic Broker, AI Gateway, and AI Guardrails as products that add controls for public MCP servers, privately hosted AI environments, prompt filtering, data loss prevention, prompt injection, and jailbreaking attacks. The article describes a combined Netskope and Aembit deployment in which Aembit Edge injects runtime credentials, Netskope inspects content in transit and logs interactions, and identity-based policies are applied to agent activity.\u003c/p\u003e\n"}]</script>
