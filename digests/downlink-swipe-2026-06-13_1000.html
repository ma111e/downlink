<script type="application/json" id="dl-articles">[{"n":2,"title":"Critical Splunk Enterprise Flaw Lets Attackers Run Code Without Authentication","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/critical-splunk-enterprise-flaw-lets.html","time":"13:23","priority":"MUST READ","score":94,"tldr":"Splunk patched a critical unauthenticated flaw in Splunk Enterprise that can let attackers perform arbitrary file operations and potentially achieve remote code execution. Users of affected 10.0.x and 10.2.x versions should upgrade immediately to 10.0.7 or 10.2.4.","briefOverview":"\u003cp\u003eSplunk has released security updates for a critical Splunk Enterprise vulnerability tracked as CVE-2026-20253. The flaw is rated 9.8 on the CVSS scoring system and can allow unauthenticated file operations and even remote code execution. Splunk said the issue affects Splunk Enterprise versions below 10.2.4 and 10.0.7.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability exists in a PostgreSQL sidecar service endpoint that lacks authentication controls. According to Splunk, an unauthenticated, network-reachable user could create or truncate arbitrary files through the endpoint. Splunk Cloud is not affected because it does not use Postgres sidecars.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr Labs published technical details showing how the flaw could be exploited through the \u003ccode\u003e/v1/postgres/recovery/backup\u003c/code\u003e and \u003ccode\u003e/v1/postgres/recovery/restore\u003c/code\u003e endpoints. The described attack chain can use attacker-controlled database content and Splunk’s local PostgreSQL restore process to achieve controlled file writes. The researchers said this can be escalated to remote code execution by overwriting a Python script that Splunk frequently executes.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSplunk has issued fixes for CVE-2026-20253, a critical vulnerability in Splunk Enterprise with a CVSS score of 9.8. The flaw can allow unauthenticated users to conduct file operations and potentially achieve remote code execution. Splunk described the issue as affecting versions below 10.2.4 and 10.0.7.\u003c/p\u003e\n\n\u003cp\u003eAccording to Splunk, the vulnerability stems from a PostgreSQL sidecar service endpoint that lacks authentication controls. Any network-reachable user could invoke file operations without credentials. Specifically, the company said an unauthenticated user could create or truncate arbitrary files through the endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe affected version ranges are Splunk Enterprise 10.0.0 through 10.0.6 and Splunk Enterprise 10.2.0 through 10.2.3. Splunk fixed the issue in versions 10.0.7 and 10.2.4, while Splunk Enterprise 10.4 is listed as not affected. Splunk Cloud is also not impacted because Postgres sidecars are not used in the product.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr Labs released additional technical details explaining that the vulnerability could be exploited to achieve pre-authenticated remote code execution on susceptible systems. The exploitation path uses the \u003ccode\u003e/v1/postgres/recovery/backup\u003c/code\u003e and \u003ccode\u003e/v1/postgres/recovery/restore\u003c/code\u003e endpoints. The researchers described a chain involving an attacker-controlled database, a local PostgreSQL restore operation, and use of a \u003ccode\u003e.pgpass\u003c/code\u003e file containing the password for the \u003ccode\u003epostgres_admin\u003c/code\u003e user.\u003c/p\u003e\n\n\u003cp\u003eThe technical analysis says an attacker can restore attacker-controlled SQL into the local PostgreSQL instance and gain a controlled file write. The article describes one escalation path in which an attacker overwrites a Python script that Splunk frequently executes, such as \u003ccode\u003e/opt/splunk/etc/apps/splunk_secure_gateway/bin/ssg_enable_modular_input.py\u003c/code\u003e, to include a malicious payload. The article states there is no evidence of exploitation in the wild, but urges users to apply the fixes quickly because exploit specifics are now available.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSplunk has released security updates to address CVE-2026-20253, a critical vulnerability in Splunk Enterprise. The flaw is rated 9.8 on the CVSS scoring system. According to the article, the issue could be exploited to perform unauthenticated file operations and even remote code execution.\u003c/p\u003e\n\n\u003cp\u003eSplunk said the vulnerability affects Splunk Enterprise versions below 10.2.4 and 10.0.7. The company described the vulnerable component as a PostgreSQL sidecar service endpoint that lacks authentication controls. Because of this missing authentication, any network-reachable user could invoke file operations without credentials.\u003c/p\u003e\n\n\u003ch2 id=\"affected-and-fixed-versions\"\u003eAffected and Fixed Versions\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following affected and fixed Splunk Enterprise versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSplunk Enterprise 10.0.0 to 10.0.6 is fixed in 10.0.7.\u003c/li\u003e\n\u003cli\u003eSplunk Enterprise 10.2.0 to 10.2.3 is fixed in 10.2.4.\u003c/li\u003e\n\u003cli\u003eSplunk Enterprise 10.4 is not affected.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSplunk, which is part of Cisco, said Splunk Cloud is not impacted. The reason given is that Postgres sidecars are not used in Splunk Cloud.\u003c/p\u003e\n\n\u003ch2 id=\"root-cause-and-initial-impact\"\u003eRoot Cause and Initial Impact\u003c/h2\u003e\n\n\u003cp\u003eSplunk said an unauthenticated user could create or truncate arbitrary files through a PostgreSQL sidecar service endpoint. The vulnerability exists because that endpoint lacks authentication controls. This allows a network-reachable user to perform file operations without credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the issue as significant because it can go beyond arbitrary file operations. watchTowr Labs reported that the weakness could be exploited to achieve pre-authenticated remote code execution on susceptible systems.\u003c/p\u003e\n\n\u003ch2 id=\"watchtowr-labs-technical-analysis\"\u003ewatchTowr Labs Technical Analysis\u003c/h2\u003e\n\n\u003cp\u003ewatchTowr Labs released additional technical details on CVE-2026-20253. The analysis focused on the \u003ccode\u003e/v1/postgres/recovery/backup\u003c/code\u003e and \u003ccode\u003e/v1/postgres/recovery/restore\u003c/code\u003e endpoints. According to the article, these endpoints can be abused as part of an attack chain leading to pre-authenticated remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe described attack chain works as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn attacker connects Splunk to an attacker-controlled database and dumps its contents into an arbitrary file using the \u003ccode\u003e/backup\u003c/code\u003e endpoint.\u003c/li\u003e\n\u003cli\u003eThe attacker loads the dump of the attacker-controlled database into the local PostgreSQL instance using the \u003ccode\u003e/restore\u003c/code\u003e endpoint.\u003c/li\u003e\n\u003cli\u003eThe restore operation includes a \u003ccode\u003epassfile\u003c/code\u003e argument specifying the path to \u003ccode\u003e/opt/splunk/var/packages/data/postgres/.pgpass\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eThat \u003ccode\u003e.pgpass\u003c/code\u003e file contains the password for the \u003ccode\u003epostgres_admin\u003c/code\u003e user.\u003c/li\u003e\n\u003cli\u003eSQL queries defined in the database dump are executed by Splunk’s PostgreSQL instance.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this process allows attacker-controlled SQL to be restored into the local PostgreSQL instance. watchTowr Labs researchers Piotr Bazydlo and Yordan Ganchev said that once they could restore attacker-controlled SQL, they created a database dump template that provided a controlled file write.\u003c/p\u003e\n\n\u003ch2 id=\"file-write-to-remote-code-execution\"\u003eFile Write to Remote Code Execution\u003c/h2\u003e\n\n\u003cp\u003eThe article describes how an attacker could use PostgreSQL functionality to write attacker-controlled content to the file system. Specifically, it mentions defining a new function that uses \u003ccode\u003elo_export\u003c/code\u003e, a PostgreSQL function used to extract a BLOB from the database and save it as a file. The malicious function can execute during the restoration process.\u003c/p\u003e\n\n\u003cp\u003eWith an arbitrary file write primitive on the Splunk file system, an attacker could escalate further to remote code execution. The article gives the example of overwriting a Python script that Splunk frequently executes. One cited example is \u003ccode\u003e/opt/splunk/etc/apps/splunk_secure_gateway/bin/ssg_enable_modular_input.py\u003c/code\u003e, which could be modified to include a malicious payload.\u003c/p\u003e\n\n\u003ch2 id=\"full-exploitation-sequence-described\"\u003eFull Exploitation Sequence Described\u003c/h2\u003e\n\n\u003cp\u003eThe article summarizes the exploitation sequence as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCreate a database and configure it so that a user can authenticate without a password.\u003c/li\u003e\n\u003cli\u003eGrant that user sufficient permissions to invoke functions such as \u003ccode\u003elo_export\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eUse the \u003ccode\u003e/backup\u003c/code\u003e endpoint to place a dump of the remote database onto the Splunk file system.\u003c/li\u003e\n\u003cli\u003eUse the \u003ccode\u003e/restore\u003c/code\u003e endpoint to load the malicious database dump.\u003c/li\u003e\n\u003cli\u003eTrigger execution of the malicious function during the restore process.\u003c/li\u003e\n\u003cli\u003eWrite an attacker-controlled Python script to the Splunk file system.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"reported-exploitation-status-and-response\"\u003eReported Exploitation Status and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article states that there is no evidence the flaw has been exploited in the wild. However, it also notes that the availability of exploit specifics could be enough to drive opportunistic attempts. The article concludes that users should move quickly to apply the fixes to stay protected.\u003c/p\u003e\n\n\u003cp\u003eSplunk’s response was to release fixed versions for the affected Splunk Enterprise branches. Users of the impacted 10.0.x and 10.2.x versions are directed to upgrade to 10.0.7 or 10.2.4, respectively.\u003c/p\u003e\n","keyPoints":["Splunk released security updates for CVE-2026-20253, a critical Splunk Enterprise vulnerability rated 9.8 on the CVSS scoring system.","The flaw affects Splunk Enterprise versions below 10.2.4 and 10.0.7 and allows an unauthenticated user to create or truncate arbitrary files through a PostgreSQL sidecar service endpoint.","Splunk Enterprise 10.0.0 through 10.0.6 are fixed in 10.0.7, Splunk Enterprise 10.2.0 through 10.2.3 are fixed in 10.2.4, and Splunk Enterprise 10.4 is not affected.","Splunk said Splunk Cloud is not impacted because Postgres sidecars are not used in the product.","watchTowr Labs reported that the vulnerability can be exploited through the /v1/postgres/recovery/backup and /v1/postgres/recovery/restore endpoints to achieve pre-authenticated remote code execution on susceptible systems."],"insights":["The vulnerable PostgreSQL sidecar endpoint lacks authentication entirely, so any network-reachable user can invoke file operations without credentials.","The exploit path does not require direct PostgreSQL credentials at first because the restore flow can be made to use Splunk’s local .pgpass file containing the postgres_admin password.","A controlled file write can become remote code execution by overwriting a Python script that Splunk frequently executes, such as /opt/splunk/etc/apps/splunk_secure_gateway/bin/ssg_enable_modular_input.py.","Although Splunk reported no evidence of exploitation in the wild, watchTowr Labs has published enough technical detail about the /backup and /restore endpoint chain to make rapid patching especially urgent."],"referencedReports":[{"title":"SVD-2026-0603","url":"https://advisory.splunk.com/advisories/SVD-2026-0603","publisher":"Splunk","context":"The article cites Splunk's advisory describing CVE-2026-20253, affected versions, impact, and fixed releases.","category":"","primary":false},{"title":"Why Use App-Level Auth When Every Database Has Auth? Splunk Enterprise CVE-2026-20253 Pre-Auth RCE","url":"https://labs.watchtowr.com/why-use-app-level-auth-when-every-database-has-auth-splunk-enterprise-cve-2026-20253-pre-auth-rce/","publisher":"watchTowr Labs","context":"The article references watchTowr Labs' technical analysis explaining how CVE-2026-20253 can be exploited through Splunk's PostgreSQL recovery backup and restore endpoints.","category":"","primary":false}],"body":"\u003cp\u003eSplunk has released security updates for a critical Splunk Enterprise vulnerability tracked as CVE-2026-20253. The flaw is rated 9.8 on the CVSS scoring system and can allow unauthenticated file operations and even remote code execution. Splunk said the issue affects Splunk Enterprise versions below 10.2.4 and 10.0.7.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability exists in a PostgreSQL sidecar service endpoint that lacks authentication controls. According to Splunk, an unauthenticated, network-reachable user could create or truncate arbitrary files through the endpoint. Splunk Cloud is not affected because it does not use Postgres sidecars.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr Labs published technical details showing how the flaw could be exploited through the \u003ccode\u003e/v1/postgres/recovery/backup\u003c/code\u003e and \u003ccode\u003e/v1/postgres/recovery/restore\u003c/code\u003e endpoints. The described attack chain can use attacker-controlled database content and Splunk’s local PostgreSQL restore process to achieve controlled file writes. The researchers said this can be escalated to remote code execution by overwriting a Python script that Splunk frequently executes.\u003c/p\u003e\n"},{"n":1,"title":"US Gov asks Anthropic to ban 'foreign national' access to Fable, Mythos","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/us-gov-asks-anthropic-to-ban-foreign-national-access-to-fable-mythos/","time":"10:01","priority":"SHOULD READ","score":82,"tldr":"Anthropic suspended global access to its Fable 5 and Mythos 5 models after a U.S. government export-control directive ordered it to block all foreign nationals, which the company says effectively makes the models unavailable to everyone. Anthropic disputes the rationale, saying the cited jailbreak evidence is narrow and insufficient, and is working to restore access.","briefOverview":"\u003cp\u003eAnthropic suspended worldwide access to its Fable 5 and Mythos 5 AI models after receiving a U.S. government export control directive at 5:21pm ET on June 12. The directive cites national security authorities and orders Anthropic to block access by any foreign national, including foreign nationals inside or outside the United States and Anthropic’s own foreign-national employees. Anthropic says the order’s practical effect is that both models must be disabled for all customers.\u003c/p\u003e\n\n\u003cp\u003eThe move came shortly after Anthropic began rolling out Fable 5 on June 9 as a free limited-time model for Pro, Max, and Enterprise customers through June 22. Fable 5 is described as the safeguarded sibling of Mythos 5, with both sharing the same underlying model. Fable blocks or diverts sensitive cybersecurity, biology, and chemistry queries, while Mythos 5 is available only to vetted government cyberdefenders and life sciences partners.\u003c/p\u003e\n\n\u003cp\u003eAnthropic said new sessions would fall back to a user’s default model or Claude Opus 4.8, existing Fable 5 sessions would end with an error, and Platform requests to Fable 5 would fail. The company said it believes the directive stems from a reported way to jailbreak Fable 5, but it disputes that the cited issue justifies recalling a commercial model deployed to hundreds of millions of people. Anthropic says it is complying with the directive while working to restore access and promising more details within 24 hours.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAnthropic suspended access to Fable 5 and Mythos 5 for all users worldwide after receiving a U.S. government export control directive on June 12. The directive cites national security authorities and bars access to both models by foreign nationals inside or outside the United States. Anthropic says the scope also includes its own foreign-national employees, making the models unavailable to everyone in practice.\u003c/p\u003e\n\n\u003cp\u003eThe suspension is significant because Fable 5 had only begun rolling out on June 9 and was offered free to Pro, Max, and Enterprise customers through June 22. The article says the model had been handed to millions for free three days before being taken offline. Other Anthropic models, including Claude Opus 4.8, are not affected.\u003c/p\u003e\n\n\u003cp\u003eFable 5 and Mythos 5 share the same underlying model, but they are deployed with different access controls and safeguards. Fable 5 is the safeguarded version and blocks or diverts sensitive cybersecurity, biology, and chemistry queries. Mythos 5 is described as unrestricted and available only to vetted government cyberdefenders and life sciences partners.\u003c/p\u003e\n\n\u003cp\u003eAnthropic told developers that new sessions would fall back to a user’s default model or Opus 4.8. Existing Fable 5 sessions would end with an error, and Platform requests to Fable 5 would fail. The company advised integrators to migrate to other models.\u003c/p\u003e\n\n\u003cp\u003eAnthropic believes the order stems from a reported jailbreak involving Fable 5. The company said it reviewed a demo and found only minor, already-known bugs, and said the government had only provided verbal evidence of a potential narrow, non-universal jailbreak. Anthropic described the reported method as asking the model to read a specific codebase and fix any software flaws.\u003c/p\u003e\n\n\u003cp\u003eThe impact extended to customers in both the United States and the United Kingdom, according to the U.K.’s Minister for AI and Online Safety, Kanishka Narayan MP. Anthropic said it disagrees that the reported jailbreak should cause a recall of a commercial model deployed to hundreds of millions of people. The company said it is complying with the legal directive, working to restore access, and planning to provide more details within 24 hours.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore event\u003c/h2\u003e\n\n\u003cp\u003eAnthropic suspended access to its Fable 5 and Mythos 5 AI models worldwide after receiving a U.S. government export control directive. The company said it received the directive at 5:21pm ET on June 12. The directive cites national security authorities and requires Anthropic to block access to both models by any foreign national.\u003c/p\u003e\n\n\u003cp\u003eAccording to Anthropic, the directive applies to foreign nationals both inside and outside the United States. It also applies to Anthropic’s own foreign-national employees. Anthropic said the practical result is that it must disable both models for all customers in order to comply.\u003c/p\u003e\n\n\u003cp\u003eAll other Anthropic models are unaffected, including Claude Opus 4.8.\u003c/p\u003e\n\n\u003ch2 id=\"timing-and-customer-impact\"\u003eTiming and customer impact\u003c/h2\u003e\n\n\u003cp\u003eThe shutdown occurred shortly after Fable 5 began rolling out. Anthropic started making Fable 5 available on June 9, free to Pro, Max, and Enterprise customers through June 22. The article states that a model handed to millions for free three days earlier is now offline for everyone.\u003c/p\u003e\n\n\u003cp\u003eAnthropic’s developer notice explained the operational impact:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNew sessions would fall back to the user’s default model or Claude Opus 4.8.\u003c/li\u003e\n\u003cli\u003eExisting Fable 5 sessions would end with an error.\u003c/li\u003e\n\u003cli\u003ePlatform requests to Fable 5 would fail.\u003c/li\u003e\n\u003cli\u003eIntegrators were told to migrate to other models.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe U.K.’s Minister for AI and Online Safety, Kanishka Narayan MP, said the pause affected customers in both the United States and the United Kingdom. He framed the incident as a case for technological sovereignty and pointed to the U.K. government’s £1.1bn AI chip investment.\u003c/p\u003e\n\n\u003ch2 id=\"models-involved\"\u003eModels involved\u003c/h2\u003e\n\n\u003cp\u003eThe affected models are Fable 5 and Mythos 5. The article describes Fable 5 as the safeguarded sibling of Mythos 5. Both models share the same underlying model.\u003c/p\u003e\n\n\u003cp\u003eFable 5 includes safeguards that block or divert sensitive cybersecurity, biology, and chemistry queries. Mythos 5 is described as unrestricted and available only to vetted government cyberdefenders and life sciences partners.\u003c/p\u003e\n\n\u003cp\u003eThe directive affects both versions despite their different access models and safeguard profiles.\u003c/p\u003e\n\n\u003ch2 id=\"government-rationale-as-described-by-anthropic\"\u003eGovernment rationale as described by Anthropic\u003c/h2\u003e\n\n\u003cp\u003eAnthropic said its understanding is that the order stems from a reported way to jailbreak Fable 5. The company said it reviewed a demo and found only minor, already-known bugs. Anthropic also said these were the kind of issues other publicly available models can discover without any bypass.\u003c/p\u003e\n\n\u003cp\u003eAnthropic stated that the government had only provided verbal evidence of a potential narrow, non-universal jailbreak. The company described the potential jailbreak as essentially asking the model to read a specific codebase and fix any software flaws. Anthropic also said it understood that one potential jailbreak had been shared with the government.\u003c/p\u003e\n\n\u003ch2 id=\"anthropic-s-position\"\u003eAnthropic’s position\u003c/h2\u003e\n\n\u003cp\u003eAnthropic said it is complying with the government’s legal directive and removing access to Fable 5 and Mythos 5 for all users. At the same time, the company said it disagrees that the finding of a narrow potential jailbreak should justify recalling a commercial model deployed to hundreds of millions of people.\u003c/p\u003e\n\n\u003cp\u003eAnthropic warned that applying this standard across the industry would, in its view, essentially halt all new model deployments by frontier model providers. The company also said the capability at issue is widely available elsewhere, pointing to OpenAI’s GPT-5.5, and is used by defenders every day.\u003c/p\u003e\n\n\u003cp\u003eAnthropic maintains that the order is a misunderstanding. It said it is working to restore access and promised to provide more details within 24 hours.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-response\"\u003eDisclosed impact and response\u003c/h2\u003e\n\n\u003cp\u003eThe immediate disclosed impact is the global unavailability of Fable 5 and Mythos 5 for all customers. Platform users and developers are directly affected because Fable 5 requests fail and existing sessions error out. Anthropic advised developers and integrators to move to other models.\u003c/p\u003e\n\n\u003cp\u003eClaude Opus 4.8 and other Anthropic models remain available. Anthropic said new sessions would fall back to a user’s default model or Opus 4.8, limiting the disruption for users who can continue work on other available models.\u003c/p\u003e\n","keyPoints":["Anthropic suspended access to its Fable 5 and Mythos 5 AI models worldwide after receiving a U.S. government export control directive ordering it to block access by foreign nationals.","Anthropic said the directive bars access to the models by foreign nationals inside or outside the United States, including the company’s own foreign-national employees, forcing it to disable the models for all customers.","Fable 5 had begun rolling out on June 9 as a free limited-time offering for Pro, Max, and Enterprise customers through June 22 before being taken offline.","Anthropic said new sessions would fall back to a user’s default model or Claude Opus 4.8, existing Fable 5 sessions would end with an error, and Platform requests to Fable 5 would fail.","Anthropic disputed the government’s rationale, saying the order appears to stem from a narrow reported jailbreak involving asking the model to read a specific codebase and fix software flaws."],"insights":["The directive’s wording made a targeted foreign-national access ban operationally equivalent to a global shutdown because Anthropic said it could not keep the models available while complying.","The suspension affected even U.S. and U.K. customers, showing that export-control actions on AI models can disrupt access for domestic and allied users, not only the intended restricted population.","Anthropic framed the government’s cited jailbreak as a capability already available in other public models, highlighting the difficulty of using model-specific recalls when similar cyber-assistance functions exist elsewhere.","The affected models have different access profiles, with Fable 5 broadly available with safeguards and Mythos 5 limited to vetted government cyberdefenders and life sciences partners, yet both were removed under the same directive."],"referencedReports":[],"body":"\u003cp\u003eAnthropic suspended worldwide access to its Fable 5 and Mythos 5 AI models after receiving a U.S. government export control directive at 5:21pm ET on June 12. The directive cites national security authorities and orders Anthropic to block access by any foreign national, including foreign nationals inside or outside the United States and Anthropic’s own foreign-national employees. Anthropic says the order’s practical effect is that both models must be disabled for all customers.\u003c/p\u003e\n\n\u003cp\u003eThe move came shortly after Anthropic began rolling out Fable 5 on June 9 as a free limited-time model for Pro, Max, and Enterprise customers through June 22. Fable 5 is described as the safeguarded sibling of Mythos 5, with both sharing the same underlying model. Fable blocks or diverts sensitive cybersecurity, biology, and chemistry queries, while Mythos 5 is available only to vetted government cyberdefenders and life sciences partners.\u003c/p\u003e\n\n\u003cp\u003eAnthropic said new sessions would fall back to a user’s default model or Claude Opus 4.8, existing Fable 5 sessions would end with an error, and Platform requests to Fable 5 would fail. The company said it believes the directive stems from a reported way to jailbreak Fable 5, but it disputes that the cited issue justifies recalling a commercial model deployed to hundreds of millions of people. Anthropic says it is complying with the directive while working to restore access and promising more details within 24 hours.\u003c/p\u003e\n"},{"n":3,"title":"A Medicare Attestation Request Sent Through Salesforce, Authenticated by the Victim's Own Domain","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/cvs-adobe-brand-impersonation-salesforce-medicare-attestation","time":"11:00","priority":"SHOULD READ","score":78,"tldr":"Attackers used an authenticated Salesforce organization tied to the victim’s domain to send a Medicare-themed phishing email that passed SPF, DKIM, and DMARC, making it appear legitimate. The link led to an Office 365 credential-harvesting page, showing how compromised trusted cloud services can bypass standard email authentication defenses.","briefOverview":"\u003cp\u003eAttackers used a compromised or malicious Salesforce CRM organization to deliver a credential-harvesting email disguised as a Medicare Transaction Facilitator attestation request. The email targeted an employee at a healthcare outcomes management company and used healthcare regulatory compliance language to increase credibility. The message linked to nexaroco[.]com/providerrelations/, which served an Office 365 credential-harvesting page.\u003c/p\u003e\n\n\u003cp\u003eThe attack was significant because the email passed SPF, DKIM, and DMARC, with composite authentication returning compauth=pass. Salesforce was authorized to send for the outcomes[.]com domain, allowing the message to appear authenticated even though it was malicious. The From and To addresses were both aryan@outcomes[.]com, creating a self-send pattern that suggested access to the Salesforce organization associated with the target domain.\u003c/p\u003e\n\n\u003cp\u003eTechnical indicators showed the message was sent through Salesforce Email-as-a-Service infrastructure, including the hostname smtp-053a43a2c9ecc9b54.core1.sfdc-8tgtt5.mta.salesforce.com and IP 18[.]117[.]31[.]220. The email also included a fabricated thread reference in the In-Reply-To header to make it appear like part of an existing conversation. Themis flagged the message at 50% confidence, and the IRONSCALES community added additional signal confirming the phishing classification.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eIn June 2026, IRONSCALES identified a phishing attack targeting an employee at a healthcare outcomes management company. The email was disguised as a Medicare Transaction Facilitator Independent Provider Attestation request. The attack combined healthcare compliance language with the trust of authenticated Salesforce email delivery.\u003c/p\u003e\n\n\u003cp\u003eThe message was sent through Salesforce Email-as-a-Service infrastructure from smtp-053a43a2c9ecc9b54.core1.sfdc-8tgtt5.mta.salesforce.com using IP 18[.]117[.]31[.]220. X-SFDC headers showed an active Salesforce organization and an EmailCategory of quickActionEmail, meaning the send was triggered from within the CRM interface. The article describes the Salesforce organization as compromised or malicious.\u003c/p\u003e\n\n\u003cp\u003eThe email passed SPF, DKIM, and DMARC, and composite authentication returned compauth=pass with reason code 100. DKIM used d=outcomes[.]com because Salesforce was authorized to send for the domain. The From and To addresses were identical, aryan@outcomes[.]com, which the article describes as a self-send pattern indicating access to the Salesforce organization associated with the target domain.\u003c/p\u003e\n\n\u003cp\u003eThe email’s call-to-action button read “Medicare Transaction Facilitator (MTF) Independent Provider Attestation” and linked to nexaroco[.]com/providerrelations/. A screenshot of the landing page showed a standard Office 365 credential-harvesting form rather than an Adobe or DocuSign signing page. The article identifies this mismatch between the stated document platform and the actual landing page as a detection signal.\u003c/p\u003e\n\n\u003cp\u003eThe message also used a fabricated thread reference, with the In-Reply-To header referencing a Message-ID from DS0PR11MB7382, a mailbox server different from the actual sender. The article says this was designed to make the email look like a continuation of an existing conversation. Themis flagged the message at 50% confidence, the IRONSCALES community added additional phishing signal, and one mailbox was quarantined.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eIRONSCALES reported a credential-harvesting phishing attack that used a compromised or malicious Salesforce CRM organization as the delivery mechanism. The email was disguised as a Medicare Transaction Facilitator (MTF) Independent Provider Attestation request and targeted an employee at a healthcare outcomes management company.\u003c/p\u003e\n\n\u003cp\u003eThe article characterizes the incident as high severity and maps it to MITRE ATT\u0026amp;CK techniques for spearphishing links, valid cloud accounts, and impersonation. The central issue was that the email appeared legitimate to authentication systems because it was sent through authorized Salesforce infrastructure for the victim’s domain.\u003c/p\u003e\n\n\u003ch2 id=\"core-attack-flow\"\u003eCore Attack Flow\u003c/h2\u003e\n\n\u003cp\u003eThe phishing email used healthcare regulatory compliance language to create urgency and legitimacy. Its subject referenced a “Medicare Transaction Facilitator (MTF) Independent Provider Attestation,” and the body included a call-to-action button with the same Medicare attestation wording.\u003c/p\u003e\n\n\u003cp\u003eThe call-to-action linked to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003enexaroco[.]com/providerrelations/\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to the article, the landing page displayed a standard Office 365 credential-harvesting form. This did not match the expected Adobe or DocuSign-style signing page implied by the Medicare attestation pretext.\u003c/p\u003e\n\n\u003ch2 id=\"salesforce-delivery-infrastructure\"\u003eSalesforce Delivery Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe email was sent through Salesforce Email-as-a-Service infrastructure. The sending hostname and IP listed in the article were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003esmtp-053a43a2c9ecc9b54.core1.sfdc-8tgtt5.mta.salesforce.com\u003c/li\u003e\n\u003cli\u003e18[.]117[.]31[.]220\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eX-SFDC headers confirmed an active Salesforce organization. The article notes that the EmailCategory was quickActionEmail, indicating that the message was triggered from within the CRM interface itself.\u003c/p\u003e\n\n\u003ch2 id=\"authentication-results\"\u003eAuthentication Results\u003c/h2\u003e\n\n\u003cp\u003eThe message passed all major email authentication checks described in the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSPF passed.\u003c/li\u003e\n\u003cli\u003eDKIM passed.\u003c/li\u003e\n\u003cli\u003eDMARC passed.\u003c/li\u003e\n\u003cli\u003eComposite authentication returned compauth=pass with reason code 100.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe DKIM signing domain was outcomes[.]com, and Salesforce was an authorized sender for that domain. Because of this, the malicious email benefited from the trust normally associated with authenticated Salesforce-originated messages.\u003c/p\u003e\n\n\u003ch2 id=\"self-send-pattern\"\u003eSelf-Send Pattern\u003c/h2\u003e\n\n\u003cp\u003eThe From and To addresses were identical:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003earyan@outcomes[.]com\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article describes this as a self-send pattern. It states that this indicates the attacker had access to the Salesforce organization associated with the target’s domain and was routing messages internally. The article also says this pattern can sidestep external sender banners that Microsoft 365 might display.\u003c/p\u003e\n\n\u003ch2 id=\"fabricated-thread-reference\"\u003eFabricated Thread Reference\u003c/h2\u003e\n\n\u003cp\u003eThe email contained an In-Reply-To header referencing a Message-ID from DS0PR11MB7382. The article states that this was a different mailbox server than the actual sender and describes the reference as fabricated.\u003c/p\u003e\n\n\u003cp\u003eThis thread reference was intended to make the email appear to be part of an existing conversation. The article notes that recipients who see “RE:” in a subject line may be less likely to scrutinize the sender.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eIRONSCALES’ Themis Adaptive AI flagged the message at 50% confidence. The article emphasizes that this was not a high-confidence detection, because several aspects of the message made it appear legitimate:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt passed SPF, DKIM, and DMARC.\u003c/li\u003e\n\u003cli\u003eIt used legitimate Salesforce infrastructure.\u003c/li\u003e\n\u003cli\u003eIt used a healthcare compliance pretext.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe IRONSCALES community provided additional phishing signal and confirmed the phishing classification. One mailbox was quarantined.\u003c/p\u003e\n\n\u003ch2 id=\"detection-signals-highlighted-in-the-article\"\u003eDetection Signals Highlighted in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several signals that helped distinguish the message from legitimate CRM-originated email:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe self-send anomaly involving identical From and To addresses.\u003c/li\u003e\n\u003cli\u003eThe first-time CRM message pattern.\u003c/li\u003e\n\u003cli\u003eThe mismatch between the Medicare attestation pretext and the Office 365 credential-harvesting landing page.\u003c/li\u003e\n\u003cli\u003eThe fabricated In-Reply-To thread reference.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that automated URL scanners may miss this kind of mismatch when the harvesting domain is new and lacks reputation data.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following indicators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSender/target email: aryan@outcomes[.]com\u003c/li\u003e\n\u003cli\u003eSending IP: 18[.]117[.]31[.]220\u003c/li\u003e\n\u003cli\u003eSending hostname: smtp-053a43a2c9ecc9b54.core1.sfdc-8tgtt5.mta.salesforce.com\u003c/li\u003e\n\u003cli\u003eCredential-harvesting domain: nexaroco[.]com\u003c/li\u003e\n\u003cli\u003eCredential-harvesting URL: nexaroco[.]com/providerrelations/\u003c/li\u003e\n\u003cli\u003eDKIM signing domain: outcomes[.]com\u003c/li\u003e\n\u003cli\u003eX-SFDC OrgType: ACTIVE\u003c/li\u003e\n\u003cli\u003eX-SFDC EntityId: 500Vm00000wfFMf\u003c/li\u003e\n\u003cli\u003eFabricated thread reference: DS0PR11MB7382\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK Mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to the following MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eT1566.002: Phishing: Spearphishing Link, for the CRM-delivered email containing a credential-harvesting link.\u003c/li\u003e\n\u003cli\u003eT1078.004: Valid Accounts: Cloud Accounts, for attacker access to the Salesforce organization for the target domain.\u003c/li\u003e\n\u003cli\u003eT1656: Impersonation, for the Medicare compliance pretext and internal sender impersonation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that authenticated CRM-originated messages can still be malicious when the underlying cloud service or organization is compromised or abused. In this case, standard authentication checks passed because Salesforce was authorized to send for the victim’s domain, while behavioral and content mismatches provided the signals needed to identify the phishing attempt.\u003c/p\u003e\n","keyPoints":["Attackers used a compromised or malicious Salesforce CRM organization to send a credential-harvesting email disguised as a Medicare Transaction Facilitator attestation request.","The message passed SPF, DKIM, and DMARC with compauth=pass because Salesforce was an authorized sender for the outcomes.com domain.","The email used identical From and To addresses, aryan@outcomes.com, indicating a self-send pattern through Salesforce.","The call-to-action linked to nexaroco.com/providerrelations/, which served an Office 365 credential-harvesting page.","Themis flagged the message at 50% confidence, and the IRONSCALES community provided additional phishing signal that confirmed the classification."],"insights":["A full SPF, DKIM, DMARC, and composite authentication pass did not indicate safety because Salesforce was already authorized to send for the victim’s domain.","The identical From and To address created an internal self-send pattern that could avoid external sender banners in Microsoft 365.","The fabricated In-Reply-To reference was used to make the message appear to continue an existing conversation, increasing the chance that recipients would trust the email.","The mismatch between the Medicare attestation pretext and the Office 365 credential-harvesting landing page was an important detection signal when the phishing domain had little or no reputation history.","The article highlights that behavioral context, including first-time CRM message patterns and self-send anomalies, helped detect an attack that standard authentication checks treated as legitimate."],"referencedReports":[],"body":"\u003cp\u003eAttackers used a compromised or malicious Salesforce CRM organization to deliver a credential-harvesting email disguised as a Medicare Transaction Facilitator attestation request. The email targeted an employee at a healthcare outcomes management company and used healthcare regulatory compliance language to increase credibility. The message linked to nexaroco[.]com/providerrelations/, which served an Office 365 credential-harvesting page.\u003c/p\u003e\n\n\u003cp\u003eThe attack was significant because the email passed SPF, DKIM, and DMARC, with composite authentication returning compauth=pass. Salesforce was authorized to send for the outcomes[.]com domain, allowing the message to appear authenticated even though it was malicious. The From and To addresses were both aryan@outcomes[.]com, creating a self-send pattern that suggested access to the Salesforce organization associated with the target domain.\u003c/p\u003e\n\n\u003cp\u003eTechnical indicators showed the message was sent through Salesforce Email-as-a-Service infrastructure, including the hostname smtp-053a43a2c9ecc9b54.core1.sfdc-8tgtt5.mta.salesforce.com and IP 18[.]117[.]31[.]220. The email also included a fabricated thread reference in the In-Reply-To header to make it appear like part of an existing conversation. Themis flagged the message at 50% confidence, and the IRONSCALES community added additional signal confirming the phishing classification.\u003c/p\u003e\n"}]</script>
