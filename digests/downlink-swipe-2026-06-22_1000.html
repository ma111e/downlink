<script>
window.__DL_ARTICLES = [{"n":8,"title":"PixelSmash – Critical FFmpeg Vulnerability Turns Media Files into Weapons","source":"jfrog.com","sourceColorIdx":8,"link":"https://jfrog.com/blog/pixelsmash-critical-ffmpeg-vulnerability-turns-media-files-into-weapons/","time":"13:15","priority":"MUST READ","score":94,"tldr":"JFrog found PixelSmash, a critical FFmpeg MagicYUV decoder flaw that lets a crafted media file crash or potentially execute code in apps and services that automatically process video, including Jellyfin and Nextcloud. Users and vendors should upgrade FFmpeg immediately or disable the MagicYUV decoder if it is not needed.","briefOverview":"\u003cp\u003eJFrog Security Research discovered and disclosed PixelSmash, CVE-2026-8461, a heap out-of-bounds write in FFmpeg’s MagicYUV decoder with a CVSS score of 8.8 High. The vulnerability can be triggered when an application using FFmpeg’s libavcodec processes a crafted AVI, MKV, or MOV media file. JFrog says the issue can crash applications that use FFmpeg and demonstrated remote code execution against Jellyfin and Nextcloud by uploading a crafted 50 KB AVI file.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that FFmpeg is bundled or linked by many media-processing applications, including desktop players, file-manager thumbnail generators, media servers, cloud transcoding pipelines, and AI/ML video-processing tools. JFrog confirmed crashes against products including Kodi, mpv, ffmpegthumbnailer, Jellyfin, Emby, Nextcloud, Immich, PhotoPrism, OBS Studio, and vLLM. The researchers describe PixelSmash as a software supply chain vulnerability because downstream projects inherit the vulnerable MagicYUV decoder through FFmpeg rather than introducing the bug themselves.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the flaw is caused by a rounding mismatch in how the MagicYUV decoder handles slice heights for chroma planes, allowing attacker-controlled bytes to be written past the end of a heap buffer. JFrog escalated the bug to code execution by overwriting FFmpeg’s AVBuffer structure so that normal cleanup could call system() with an attacker-controlled command, though the demonstrated Jellyfin exploit required ASLR to be disabled. The article recommends upgrading to the fixed FFmpeg version as soon as possible or disabling the MagicYUV decoder at build time if it is not needed.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["JFrog Security Research discovered and disclosed PixelSmash, CVE-2026-8461, a heap out-of-bounds write in FFmpeg’s MagicYUV decoder with a CVSS score of 8.8 High.","The vulnerability can be triggered by processing a crafted AVI, MKV, or MOV media file in any application that decodes video using FFmpeg’s libavcodec.","JFrog demonstrated remote code execution against Jellyfin via automatic library scanning and against Nextcloud via the video preview provider by uploading a crafted 50 KB AVI file.","The article says the MagicYUV decoder is enabled by default in upstream FFmpeg builds and tested distribution packages before version 9.0, affecting many downstream applications that bundle or link FFmpeg.","Users are advised to upgrade to a fixed FFmpeg version as soon as possible or disable the MagicYUV decoder at build time if it is not needed."],"insights":["The exploit can be triggered without playing the file because thumbnail generation, preview generation, and media library scanning can automatically process a malicious video as soon as it appears in a folder or upload location.","The article highlights that Plex’s approach of building FFmpeg with disabled decoders and a minimal allow-list was the only effective defense the researchers observed, while most tested projects inherited the default MagicYUV decoder exposure.","Jellyfin and Emby sometimes processed the malicious file with exit code 0 and no error output, even though ASAN-instrumented builds confirmed the same out-of-bounds write occurred.","The demonstrated Jellyfin remote code execution required ASLR to be disabled because the exploit used hardcoded addresses, while the article states the MagicYUV flaw alone is sufficient for reliable denial of service against every tested target.","The heap layout needed for the Jellyfin exploit changed based on ffprobe command-line arguments and input file path length, and filenames of equal length produced identical layouts in the researchers’ testing."],"referencedReports":[],"body":"\u003cp\u003eJFrog Security Research discovered and disclosed PixelSmash, CVE-2026-8461, a heap out-of-bounds write in FFmpeg’s MagicYUV decoder with a CVSS score of 8.8 High. The vulnerability can be triggered when an application using FFmpeg’s libavcodec processes a crafted AVI, MKV, or MOV media file. JFrog says the issue can crash applications that use FFmpeg and demonstrated remote code execution against Jellyfin and Nextcloud by uploading a crafted 50 KB AVI file.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that FFmpeg is bundled or linked by many media-processing applications, including desktop players, file-manager thumbnail generators, media servers, cloud transcoding pipelines, and AI/ML video-processing tools. JFrog confirmed crashes against products including Kodi, mpv, ffmpegthumbnailer, Jellyfin, Emby, Nextcloud, Immich, PhotoPrism, OBS Studio, and vLLM. The researchers describe PixelSmash as a software supply chain vulnerability because downstream projects inherit the vulnerable MagicYUV decoder through FFmpeg rather than introducing the bug themselves.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the flaw is caused by a rounding mismatch in how the MagicYUV decoder handles slice heights for chroma planes, allowing attacker-controlled bytes to be written past the end of a heap buffer. JFrog escalated the bug to code execution by overwriting FFmpeg’s AVBuffer structure so that normal cleanup could call system() with an attacker-controlled command, though the demonstrated Jellyfin exploit required ASLR to be disabled. The article recommends upgrading to the fixed FFmpeg version as soon as possible or disabling the MagicYUV decoder at build time if it is not needed.\u003c/p\u003e\n"},{"n":6,"title":"A VBScript campaign distributed through WhatsApp deploying RMM software","source":"securelist.com","sourceColorIdx":5,"link":"https://securelist.com/whatsapp-vbs-rmm-campaign/120290/","time":"10:00","priority":"SHOULD READ","score":86,"tldr":"A still-active campaign is using compromised WhatsApp accounts to send malicious VBScript attachments disguised as financial documents, primarily hitting users in Malaysia. If opened on WhatsApp Desktop or Web, the scripts install a preconfigured ManageEngine Endpoint Central agent that gives attackers remote access to the victim’s Windows system.","briefOverview":"\u003cp\u003eIn June 2026, Kaspersky observed an active malware campaign distributing malicious VBScript files through direct messages in WhatsApp. The campaign affected users in multiple countries and territories, including Malaysia, Brazil, India, Mexico, Singapore, the UK, Spain, Taiwan, Australia, Russia, and Vietnam, with the highest number of victims in Malaysia. The campaign primarily targets users of WhatsApp Desktop and WhatsApp Web, using file names that imitate business and financial documents such as invoices, debt notices, payment records, and bank statements.\u003c/p\u003e\n\n\u003cp\u003eThe infection chain begins when a user downloads and opens the malicious attachment, which is executed through Windows Script Host. The initial VBScript creates a working directory under C:\\Users\\Public\\Documents\\, downloads two additional VBScript payloads, and uses multiple download methods such as curl, bitsadmin, certutil, PowerShell, and direct HTTP requests. One secondary script attempts to modify Windows User Account Control behavior, while another downloads and extracts a ZIP archive containing a preconfigured ManageEngine Endpoint Central deployment package.\u003c/p\u003e\n\n\u003cp\u003eThe final stage silently installs the ManageEngine Endpoint Central agent using bundled configuration files, certificates, and an MSI installer, enabling remote access to the victim’s system through attacker-controlled management servers. The article notes that some infrastructure overlaps with IP addresses previously associated with ValleyRAT and Gh0st RAT activity, but says the evidence is insufficient to attribute the campaign to a known threat actor. Kaspersky assesses with low confidence that the campaign may have been conducted by a Chinese-speaking operator, based on simplified Chinese comments in scripts and related artifacts.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["In June 2026, Kaspersky observed an active campaign distributing malicious VBScript files through direct messages in WhatsApp, affecting users in multiple countries with the highest number of victims in Malaysia.","The campaign primarily targets WhatsApp Desktop and WhatsApp Web users with attachments disguised as business and financial documents such as invoices, debt notices, payment records, and bank statements.","The malicious VBScript creates working directories under C:\\Users\\Public\\Documents\\, downloads additional VBScript payloads, and uses Windows Script Host to continue a multi-stage infection chain.","One secondary script attempts to modify Windows User Account Control behavior, while another downloads and extracts a ZIP archive containing a preconfigured ManageEngine Endpoint Central deployment package.","The final stage silently installs the ManageEngine Endpoint Central agent, enabling remote access to the victim’s system through attacker-controlled management servers."],"insights":["The campaign’s use of compromised WhatsApp accounts makes the malicious attachments more convincing because they arrive from known contacts and, in observed cases, were sent without any accompanying message.","The infection requires two user actions: the recipient first downloads the WhatsApp attachment and then opens it, with WhatsApp Desktop able to launch the VBScript directly from the app’s attachment storage directory.","The attackers abuse legitimate ManageEngine Endpoint Central software rather than deploying only custom malware, allowing the final stage to provide remote access through a real enterprise management tool.","One Stage 2 script repeatedly requests elevated permission to change User Account Control behavior, indicating the attack chain still depends on the victim granting administrative privileges for that change to succeed.","The article assesses attribution only with low confidence despite Chinese-language script comments and infrastructure overlap with ValleyRAT and Gh0st RAT activity, showing that those artifacts were not enough to link the campaign to a known actor."],"referencedReports":[],"body":"\u003cp\u003eIn June 2026, Kaspersky observed an active malware campaign distributing malicious VBScript files through direct messages in WhatsApp. The campaign affected users in multiple countries and territories, including Malaysia, Brazil, India, Mexico, Singapore, the UK, Spain, Taiwan, Australia, Russia, and Vietnam, with the highest number of victims in Malaysia. The campaign primarily targets users of WhatsApp Desktop and WhatsApp Web, using file names that imitate business and financial documents such as invoices, debt notices, payment records, and bank statements.\u003c/p\u003e\n\n\u003cp\u003eThe infection chain begins when a user downloads and opens the malicious attachment, which is executed through Windows Script Host. The initial VBScript creates a working directory under C:\\Users\\Public\\Documents\\, downloads two additional VBScript payloads, and uses multiple download methods such as curl, bitsadmin, certutil, PowerShell, and direct HTTP requests. One secondary script attempts to modify Windows User Account Control behavior, while another downloads and extracts a ZIP archive containing a preconfigured ManageEngine Endpoint Central deployment package.\u003c/p\u003e\n\n\u003cp\u003eThe final stage silently installs the ManageEngine Endpoint Central agent using bundled configuration files, certificates, and an MSI installer, enabling remote access to the victim’s system through attacker-controlled management servers. The article notes that some infrastructure overlaps with IP addresses previously associated with ValleyRAT and Gh0st RAT activity, but says the evidence is insufficient to attribute the campaign to a known threat actor. Kaspersky assesses with low confidence that the campaign may have been conducted by a Chinese-speaking operator, based on simplified Chinese comments in scripts and related artifacts.\u003c/p\u003e\n"},{"n":7,"title":"Operation Endgame Targets SocGholish: What It Means for Defenders","source":"silentpush.com","sourceColorIdx":6,"link":"https://www.silentpush.com/blog/operation-endgame-targets-socgholish-what-it-means-for-defenders/?utm_source=rss\u0026utm_medium=rss\u0026utm_campaign=operation-endgame-targets-socgholish-what-it-means-for-defenders","time":"10:17","priority":"SHOULD READ","score":85,"tldr":"Operation Endgame disrupted infrastructure tied to SocGholish, a TA569-run malware delivery and initial access operation that used compromised websites and fake browser updates. The key takeaway for defenders is that targeting attacker infrastructure can raise criminal costs, disrupt downstream ransomware and cybercrime groups, and create chances to spot successor infrastructure.","briefOverview":"\u003cp\u003eOperation Endgame has targeted infrastructure associated with SocGholish, a malware delivery framework operated by TA569. Authorities announced coordinated actions that included remediation of thousands of compromised websites and disruption of supporting infrastructure used in the malware delivery chain. The article describes this as one of the most significant efforts to date against an ecosystem that refined techniques to evade detection and maintain access at scale.\u003c/p\u003e\n\n\u003cp\u003eSocGholish used compromised legitimate websites, fake browser update prompts, victim filtering mechanisms, traffic distribution systems, and resilient infrastructure to deliver malware and provide access to downstream criminal groups. TA569 specialized in obtaining and monetizing initial access rather than focusing only on ransomware or data theft. The article says this made SocGholish a force multiplier for other criminal groups, including ransomware operators.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that disrupting an initial access provider can have cascading effects across multiple criminal ecosystems that depend on that access. It states that coordinated international actions can increase attackers’ operational costs, reduce attacker efficiency, and create opportunities for defenders to identify successor infrastructure. Silent Push also highlights its prior research into TA569’s infrastructure, traffic distribution systems, victim filtering mechanisms, and criminal partnerships.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Operation Endgame involved coordinated international law enforcement actions targeting infrastructure associated with SocGholish.","Authorities announced remediation of thousands of compromised websites and disruption of supporting infrastructure used in the SocGholish malware delivery chain.","SocGholish is a malware delivery framework operated by TA569 that compromises legitimate websites and serves fake browser update prompts to visitors.","TA569 specialized in obtaining and monetizing initial access, making SocGholish an enabler for downstream criminal groups, including ransomware operators.","The article states that disrupting an initial access provider can increase attacker costs, reduce attacker efficiency, and create opportunities for defenders to identify successor infrastructure."],"insights":["Targeting SocGholish’s infrastructure can affect more than one criminal operation because TA569 functioned as an access supplier for downstream groups rather than as a single-purpose malware operator.","The article emphasizes that infrastructure and delivery mechanisms may remain useful targets for intelligence and disruption even when malware families or payloads change.","Law enforcement disruption can create a defender advantage by exposing opportunities to identify successor infrastructure as actors attempt to rebuild.","SocGholish’s effectiveness depended on a combination of compromised legitimate websites, victim filtering, traffic distribution systems, and criminal partnerships, making its delivery chain broader than a simple fake-update lure."],"referencedReports":[],"body":"\u003cp\u003eOperation Endgame has targeted infrastructure associated with SocGholish, a malware delivery framework operated by TA569. Authorities announced coordinated actions that included remediation of thousands of compromised websites and disruption of supporting infrastructure used in the malware delivery chain. The article describes this as one of the most significant efforts to date against an ecosystem that refined techniques to evade detection and maintain access at scale.\u003c/p\u003e\n\n\u003cp\u003eSocGholish used compromised legitimate websites, fake browser update prompts, victim filtering mechanisms, traffic distribution systems, and resilient infrastructure to deliver malware and provide access to downstream criminal groups. TA569 specialized in obtaining and monetizing initial access rather than focusing only on ransomware or data theft. The article says this made SocGholish a force multiplier for other criminal groups, including ransomware operators.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that disrupting an initial access provider can have cascading effects across multiple criminal ecosystems that depend on that access. It states that coordinated international actions can increase attackers’ operational costs, reduce attacker efficiency, and create opportunities for defenders to identify successor infrastructure. Silent Push also highlights its prior research into TA569’s infrastructure, traffic distribution systems, victim filtering mechanisms, and criminal partnerships.\u003c/p\u003e\n"},{"n":2,"title":"New OXLOADER Loader Uses Malicious Google Ads to Deliver CastleStealer","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/new-oxloader-loader-uses-malicious.html","time":"13:20","priority":"SHOULD READ","score":84,"tldr":"A new Russian-speaking, financially motivated campaign is using malicious Google Ads for fake Node.js downloads to deliver the previously undocumented OXLOADER, which then installs the CastleStealer information stealer. OXLOADER uses heavy obfuscation, anti-VM checks, DLL side-loading, and legitimate services like Storj to evade detection.","briefOverview":"\u003cp\u003eCybersecurity researchers disclosed a new campaign that delivers CastleStealer using a previously unreported malware loader called \u003cstrong\u003eOXLOADER\u003c/strong\u003e. Elastic Security Labs said the campaign, codenamed REF8372, uses malicious Google Ads as the starting point. The threat actor is assessed as likely Russian-speaking and financially motivated because the campaign explicitly avoids infecting machines in the Commonwealth of Independent States region.\u003c/p\u003e\n\n\u003cp\u003eThe attack begins when users search for terms such as “lts version of node.js” and are redirected to a fake website, \u003ccode\u003enode-js[.]prentiva99[.]info\u003c/code\u003e, through bogus ads published under the verified name “ВОЛОДИМИР ТЕРЕЩЕНКО.” Users who interact with the site receive a batch script hosted on Storj, which displays a fake installation wizard while downloading the OXLOADER executable through PowerShell. The executable is run with \u003ccode\u003e-Verb RunAs\u003c/code\u003e, triggering a Windows User Account Control prompt.\u003c/p\u003e\n\n\u003cp\u003eOXLOADER uses DLL side-loading to launch a rogue DLL that decrypts and executes the CastleStealer payload. Elastic said the loader uses multiple obfuscation and evasion techniques, including control-flow flattening, opaque predicates, mixed Boolean-Arithmetic, self-modifying decryption stubs, Windows \u003ccode\u003e.reloc\u003c/code\u003e section abuse, and anti-sandbox checks. Elastic assessed that OXLOADER is in an early operational phase but already has low detection rates across static engines and detonation runs.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Elastic Security Labs disclosed a campaign, codenamed REF8372, that uses malicious Google Ads to deliver CastleStealer through a previously unreported malware loader called OXLOADER.","The campaign redirects users searching for terms such as “lts version of node.js” to a fake website, node-js[.]prentiva99[.]info, through bogus ads published under the verified name “ВОЛОДИМИР ТЕРЕЩЕНКО.”","Users who interact with the fake site receive a batch script hosted on Storj that shows a bogus installation wizard while downloading and running the OXLOADER executable through PowerShell with a Windows User Account Control prompt.","OXLOADER uses DLL side-loading to launch a rogue DLL that decrypts and executes CastleStealer, and it uses obfuscation and anti-sandbox techniques to evade static detection and analysis.","Elastic Security Labs said the threat actor is likely Russian-speaking and financially motivated because the campaign includes explicit exclusions to avoid infecting machines in the Commonwealth of Independent States region."],"insights":["The campaign shows that verified-name Google advertisers can still be used to surface malicious software download sites, as the bogus ads appeared under the verified name “ВОЛОДИМИР ТЕРЕЩЕНКО” before Google removed the account and campaigns on May 14, 2026.","The use of Storj for both the batch script and the OXLOADER executable highlights a practical evasion tactic: hosting malicious stages on legitimate decentralized cloud storage can help bypass domain-based reputation filters.","OXLOADER’s use of the Windows .reloc section to stage shellcode is a notable implementation detail that Elastic described alongside multiple obfuscation layers and self-modifying decryption stubs.","The campaign’s explicit exclusions for machines in the Commonwealth of Independent States region are a concrete indicator Elastic used to assess that the actor is likely Russian-speaking and financially motivated.","Elastic assessed that OXLOADER is still in an early operational phase, but its engineering choices are already producing low detection rates across static engines and detonation runs."],"referencedReports":[{"title":"OXLOADER Malware Loader Infostealer","url":"https://www.elastic.co/security-labs/oxloader-malware-loader-infostealer","publisher":"Elastic Security Labs","context":"The article cites Elastic Security Labs' technical breakdown as the source for details on OXLOADER's obfuscation layers, self-modifying decryption stubs, Windows .reloc abuse, and other evasion techniques.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers disclosed a new campaign that delivers CastleStealer using a previously unreported malware loader called \u003cstrong\u003eOXLOADER\u003c/strong\u003e. Elastic Security Labs said the campaign, codenamed REF8372, uses malicious Google Ads as the starting point. The threat actor is assessed as likely Russian-speaking and financially motivated because the campaign explicitly avoids infecting machines in the Commonwealth of Independent States region.\u003c/p\u003e\n\n\u003cp\u003eThe attack begins when users search for terms such as “lts version of node.js” and are redirected to a fake website, \u003ccode\u003enode-js[.]prentiva99[.]info\u003c/code\u003e, through bogus ads published under the verified name “ВОЛОДИМИР ТЕРЕЩЕНКО.” Users who interact with the site receive a batch script hosted on Storj, which displays a fake installation wizard while downloading the OXLOADER executable through PowerShell. The executable is run with \u003ccode\u003e-Verb RunAs\u003c/code\u003e, triggering a Windows User Account Control prompt.\u003c/p\u003e\n\n\u003cp\u003eOXLOADER uses DLL side-loading to launch a rogue DLL that decrypts and executes the CastleStealer payload. Elastic said the loader uses multiple obfuscation and evasion techniques, including control-flow flattening, opaque predicates, mixed Boolean-Arithmetic, self-modifying decryption stubs, Windows \u003ccode\u003e.reloc\u003c/code\u003e section abuse, and anti-sandbox checks. Elastic assessed that OXLOADER is in an early operational phase but already has low detection rates across static engines and detonation runs.\u003c/p\u003e\n"},{"n":3,"title":"Google Sets Sept. 30 Deadline for Android Developer Verification in Four Countries","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/google-sets-sept-30-deadline-for.html","time":"12:45","priority":"SHOULD READ","score":82,"tldr":"Starting September 30, 2026, certified Android devices in Brazil, Indonesia, Singapore, and Thailand will block normal installs of apps from developers who have not verified their identity with Google, including apps distributed outside Google Play. The move is framed as anti-malware protection but is drawing strong opposition from open-source and independent app distributors like F-Droid.","briefOverview":"\u003cp\u003eGoogle has set September 30, 2026, as the start date for enforcing Android developer verification in Brazil, Indonesia, Singapore, and Thailand. On certified Android phones in those countries, normal installs of apps from developers who have not registered an identity with Google will be blocked. The rule applies whether apps come from Google Play or stores run by Samsung, Xiaomi, OPPO, vivo, Honor, and Transsion.\u003c/p\u003e\n\n\u003cp\u003eThe enforcement check will run on the device through a new system service called Android Developer Verifier, which Google is pushing to phones on Android 8 and newer starting in June 2026. After the deadline, unregistered apps can still be installed through Android Debug Bridge or through an advanced flow that requires developer mode, a restart, a 24-hour wait, and reauthentication. Developers must provide legal name, address, contact details, and sometimes government ID, and they must prove ownership of each app by submitting an APK signed with their private key.\u003c/p\u003e\n\n\u003cp\u003eGoogle says the program is meant to reduce malicious apps and scams, especially those involving victims being convinced to install harmful APKs. Open-source and independent app distribution groups object that the system puts Google in the installation path for most Android devices outside China and creates problems for repositories such as F-Droid, which builds and signs apps from many pseudonymous contributors. The article says unresolved questions remain about appeals, identity data retention, and whether repositories like F-Droid will get a workable path before the global rollout in 2027.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Google will begin enforcing Android developer verification on September 30, 2026, in Brazil, Indonesia, Singapore, and Thailand.","Certified Android phones in those four countries will block normal installs of apps whose developers have not registered an identity with Google, including apps from Google Play and stores run by Samsung, Xiaomi, OPPO, vivo, Honor, and Transsion.","The Android Developer Verifier system service will check on devices running Android 8 and newer whether an app is registered to a verified developer before the app installs.","Unregistered apps can still be installed through Android Debug Bridge or through an advanced flow that requires developer mode, a restart, a 24-hour wait, and reauthentication before sideloading.","F-Droid says the requirement would end its project because it builds and signs apps from many pseudonymous contributors who will not provide Google with a legal identity."],"insights":["The enforcement is not limited to Google Play, because major device-maker app stores from Samsung, Xiaomi, OPPO, vivo, Honor, and Transsion are included from the start.","The verification check happens on the device through the Android Developer Verifier system service, which means the install block applies across normal installation paths on certified Android phones rather than only inside a specific app store.","Google’s limited-distribution option does not resolve the concerns of larger independent repositories, because it is capped at 20 devices and is aimed at students and hobbyists rather than broad public distribution.","The article highlights three unresolved operational questions before the 2027 global rollout: appeals for mistakenly flagged developers, retention of identity registry data, and whether repositories like F-Droid get a workable path under the per-app ownership model."],"referencedReports":[],"body":"\u003cp\u003eGoogle has set September 30, 2026, as the start date for enforcing Android developer verification in Brazil, Indonesia, Singapore, and Thailand. On certified Android phones in those countries, normal installs of apps from developers who have not registered an identity with Google will be blocked. The rule applies whether apps come from Google Play or stores run by Samsung, Xiaomi, OPPO, vivo, Honor, and Transsion.\u003c/p\u003e\n\n\u003cp\u003eThe enforcement check will run on the device through a new system service called Android Developer Verifier, which Google is pushing to phones on Android 8 and newer starting in June 2026. After the deadline, unregistered apps can still be installed through Android Debug Bridge or through an advanced flow that requires developer mode, a restart, a 24-hour wait, and reauthentication. Developers must provide legal name, address, contact details, and sometimes government ID, and they must prove ownership of each app by submitting an APK signed with their private key.\u003c/p\u003e\n\n\u003cp\u003eGoogle says the program is meant to reduce malicious apps and scams, especially those involving victims being convinced to install harmful APKs. Open-source and independent app distribution groups object that the system puts Google in the installation path for most Android devices outside China and creates problems for repositories such as F-Droid, which builds and signs apps from many pseudonymous contributors. The article says unresolved questions remain about appeals, identity data retention, and whether repositories like F-Droid will get a workable path before the global rollout in 2027.\u003c/p\u003e\n"},{"n":5,"title":"A Fake Scotiabank Voicemail Was Actually an HTML File Asking You to Call an Attacker","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/scotiabank-interac-etransfer-voicemail-html-callback-toad","time":"11:00","priority":"SHOULD READ","score":78,"tldr":"A CFO was targeted with a Scotiabank-themed callback phishing email that passed authentication and used an HTML “voicemail” attachment to reinforce the scam. The key risk was not a malicious link or malware, but an attacker-controlled phone number meant to trick the victim into calling a fake fraud line.","briefOverview":"\u003cp\u003eAn attacker impersonating Scotiabank sent a targeted alert to a CFO claiming an unauthorized $3,000 Interac e-Transfer. The message used Scotiabank branding, Interac e-Transfer language, a timestamp, and a last-four account number to resemble a real fraud notification. Its main instruction was to call a toll-free number presented as a fraud response line, but the number was not affiliated with Scotiabank.\u003c/p\u003e\n\n\u003cp\u003eThe email came from a compromised small-business sender domain registered in 2015 and hosted through GoDaddy infrastructure. SPF and DMARC passed, DKIM was absent, and Microsoft 365 delivered the message with an SCL of 1. The article emphasizes that the attacker was not spoofing the sending infrastructure but abusing authenticated credentials from a legitimate account.\u003c/p\u003e\n\n\u003cp\u003eThe attachment was named like a voicemail or MP3 file, but the headers identified it as an HTML file of about 7.5 KB. It contained no malware or traditional payload, and automated scanning returned a clean verdict. IRONSCALES Adaptive AI flagged the message at 60% confidence based on factors such as a first-time external sender, VIP targeting, branded financial urgency, and a phone number as the primary call to action.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["An attacker impersonating Scotiabank sent a targeted alert to a CFO claiming an unauthorized $3,000 Interac e-Transfer and instructing the recipient to call a toll-free number.","The email came from a compromised small-business sender domain registered in 2015, passed SPF and DMARC authentication, and was delivered by Microsoft 365 with an SCL of 1.","The attached “voicemail” was actually an HTML file disguised with an MP3-style filename and returned a clean automated scanning verdict because it hosted no malware or traditional payload.","The toll-free number in the email was not affiliated with Scotiabank and served as the sole real call to action in the callback phishing attack.","IRONSCALES Adaptive AI flagged the message at 60% confidence based on factors including a first-time external sender, a VIP target, branded financial urgency, and a phone number as the primary call to action."],"insights":["Passing SPF and DMARC did not make the message trustworthy because the attacker used authenticated credentials from a compromised small-business account rather than spoofed infrastructure.","The absence of a malicious link or malware was part of the attack design, shifting the dangerous step from the email environment to a phone call where network-based controls have no visibility.","A mismatch between an audio-themed filename and an HTML MIME type is an actionable deception signal that should trigger manual review.","Phone numbers in unsolicited financial alerts should be treated as threat indicators, not neutral contact details, and verified through independently sourced bank contact information.","A combination of weak signals, such as a first-time external sender, executive recipient, financial urgency, brand impersonation, and phone-first call to action, can reveal risk even when individual technical checks return clean."],"referencedReports":[{"title":"Verizon DBIR 2026","url":"https://www.verizon.com/business/resources/T742/reports/2026-dbir-data-breach-investigations-report.pdf","publisher":"Verizon","context":"The article cites the report as noting that social engineering attacks are responsible for a substantial share of financial fraud.","category":"","primary":false},{"title":"MITRE ATT\u0026CK T1566.001: Spearphishing Attachment","url":"https://attack.mitre.org/techniques/T1566/001/","publisher":"MITRE ATT\u0026CK","context":"The article references this technique page as covering spearphishing attachment delivery.","category":"","primary":false},{"title":"Recognize and Report Phishing","url":"https://www.cisa.gov/secure-our-world/recognize-and-report-phishing","publisher":"CISA","context":"The article cites CISA guidance as emphasizing out-of-band verification for financial requests.","category":"","primary":false},{"title":"Microsoft Digital Defense Report 2024","url":"https://www.microsoft.com/en-us/security/security-insider/threat-landscape/microsoft-digital-defense-report-2024","publisher":"Microsoft","context":"The article cites the report as identifying VIP-targeted financial fraud campaigns as a growing attack class and noting why callback phishing is effective.","category":"","primary":false}],"body":"\u003cp\u003eAn attacker impersonating Scotiabank sent a targeted alert to a CFO claiming an unauthorized $3,000 Interac e-Transfer. The message used Scotiabank branding, Interac e-Transfer language, a timestamp, and a last-four account number to resemble a real fraud notification. Its main instruction was to call a toll-free number presented as a fraud response line, but the number was not affiliated with Scotiabank.\u003c/p\u003e\n\n\u003cp\u003eThe email came from a compromised small-business sender domain registered in 2015 and hosted through GoDaddy infrastructure. SPF and DMARC passed, DKIM was absent, and Microsoft 365 delivered the message with an SCL of 1. The article emphasizes that the attacker was not spoofing the sending infrastructure but abusing authenticated credentials from a legitimate account.\u003c/p\u003e\n\n\u003cp\u003eThe attachment was named like a voicemail or MP3 file, but the headers identified it as an HTML file of about 7.5 KB. It contained no malware or traditional payload, and automated scanning returned a clean verdict. IRONSCALES Adaptive AI flagged the message at 60% confidence based on factors such as a first-time external sender, VIP targeting, branded financial urgency, and a phone number as the primary call to action.\u003c/p\u003e\n"},{"n":1,"title":"Stop Your Legacy Infrastructure from Hijacking Your AI Agents","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/stop-your-legacy-infrastructure-from.html","time":"11:58","priority":"MAY READ","score":55,"tldr":"AI agents can be compromised through legacy infrastructure they depend on, such as unpatched servers, Active Directory misconfigurations, overprivileged cloud access, and cached developer credentials. Security teams need to map and fix full attack paths across network, identity, cloud, and AI assets rather than focusing only on AI-layer protections.","briefOverview":"\u003cp\u003eThe article argues that attackers can hijack AI agents by abusing the legacy infrastructure and permissions those agents depend on, rather than attacking the AI systems directly. It says organizations are rapidly adopting AI agents, with many piloting them across enterprise applications and some already using them in production workflows. While security programs focus on model poisoning, prompt injection, and data leakage, the article says unpatched servers, misconfigured Active Directory permissions, and cached credentials can provide a route to the systems AI agents use.\u003c/p\u003e\n\n\u003cp\u003eThe article describes an example enterprise AI agent architecture in which a customer success Co-Pilot hosted on AWS Bedrock queries Salesforce data exported into an S3 bucket and executes tasks through Lambda functions. In the modeled attack path, an external Apache Tomcat server exposed to CVE-2025-24813 lets an attacker dump cached credentials, compromise an Active Directory account, abuse a Resource-Based Constrained Delegation misconfiguration, impersonate a developer, and harvest AWS access keys from his workstation. Those keys then allow access to the production S3 bucket that feeds the Co-Pilot’s knowledge base, meaning the attacker can affect what the agent reads, trusts, and returns to users.\u003c/p\u003e\n\n\u003cp\u003eThe article says the problem is that security tools often assess network, identity, cloud, and AI layers separately, so each issue may appear as only a moderate finding even when the combined path is critical. It recommends treating AI agent dependencies, such as knowledge bases, storage buckets, and Lambda functions, as critical assets and mapping backward to identify connected identities, permissions, and infrastructure exposures. The article concludes that AI guardrails alone are not enough if the broader environment still gives attackers paths from older infrastructure into AI-connected assets.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article argues that attackers can compromise AI agents by abusing legacy infrastructure and connected systems rather than attacking the AI layer directly.","AI agents often rely on existing identity providers, cloud storage, Lambda functions, SaaS integrations, IAM roles, service accounts, and stored credentials, inheriting the security weaknesses already present in those environments.","The example attack path chains an unpatched Apache Tomcat server exposed to CVE-2025-24813, an Active Directory delegation misconfiguration, and a developer’s cached AWS access keys to reach an S3 bucket used by an AWS Bedrock Co-Pilot.","The article states that separate tools may rate the Tomcat vulnerability, Active Directory issue, and overprivileged S3 access as moderate findings, even though together they create a critical path to the AI agent’s knowledge base.","The recommended approach is to treat AI agent dependencies such as knowledge bases, storage buckets, and Lambda functions as critical assets and map backward across network, identity, cloud, and AI layers to identify and block attack paths."],"insights":["The article highlights that 70% of organizations grant AI systems more privileged access than a human in the same role, and those organizations reported a 76% incident rate compared with 17% for organizations enforcing least privilege.","A single low-priority finding may be misleading because the article’s example shows three individually moderate issues combining into a critical path to an AI agent’s knowledge base.","The most effective remediation may not be at the AI layer itself, because the article says choke points can emerge by mapping backward from AI dependencies through identity, permissions, and infrastructure.","The article frames data sources connected to AI agents, such as S3 buckets that feed knowledge bases, as critical assets because compromising them can affect what the agent reads, trusts, and returns to users."],"referencedReports":[{"title":"CVE-2025-24813","url":"https://nvd.nist.gov/vuln/detail/CVE-2025-24813","publisher":"National Vulnerability Database","context":"The article references the NVD entry for CVE-2025-24813 as a remote code execution flaw in Apache Tomcat that was used in the example attack path.","category":"","primary":false}],"body":"\u003cp\u003eThe article argues that attackers can hijack AI agents by abusing the legacy infrastructure and permissions those agents depend on, rather than attacking the AI systems directly. It says organizations are rapidly adopting AI agents, with many piloting them across enterprise applications and some already using them in production workflows. While security programs focus on model poisoning, prompt injection, and data leakage, the article says unpatched servers, misconfigured Active Directory permissions, and cached credentials can provide a route to the systems AI agents use.\u003c/p\u003e\n\n\u003cp\u003eThe article describes an example enterprise AI agent architecture in which a customer success Co-Pilot hosted on AWS Bedrock queries Salesforce data exported into an S3 bucket and executes tasks through Lambda functions. In the modeled attack path, an external Apache Tomcat server exposed to CVE-2025-24813 lets an attacker dump cached credentials, compromise an Active Directory account, abuse a Resource-Based Constrained Delegation misconfiguration, impersonate a developer, and harvest AWS access keys from his workstation. Those keys then allow access to the production S3 bucket that feeds the Co-Pilot’s knowledge base, meaning the attacker can affect what the agent reads, trusts, and returns to users.\u003c/p\u003e\n\n\u003cp\u003eThe article says the problem is that security tools often assess network, identity, cloud, and AI layers separately, so each issue may appear as only a moderate finding even when the combined path is critical. It recommends treating AI agent dependencies, such as knowledge bases, storage buckets, and Lambda functions, as critical assets and mapping backward to identify connected identities, permissions, and infrastructure exposures. The article concludes that AI guardrails alone are not enough if the broader environment still gives attackers paths from older infrastructure into AI-connected assets.\u003c/p\u003e\n"},{"n":4,"title":"⚡ Weekly Recap: Browser Bugs, EDR Killers, TV Botnet, OpenBSD Flaw, Android Trojan, and More","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/weekly-recap-browser-bugs-edr-killers.html","time":"10:55","priority":"MAY READ","score":40,"tldr":"This week’s cyber threats were dominated by familiar but effective tactics: reused or weak credentials, over-permissive integrations and extensions, compromised WordPress sites, and malware abusing trusted tools or user actions. The biggest priority is to lock down exposed systems with MFA, patch urgent flaws, remove risky extensions/integrations, and clean up stale web assets before attackers use them as entry points.","briefOverview":"\u003cp\u003eThis weekly recap covers a broad set of security incidents, including the FortiBleed campaign against Fortinet FortiGate firewall and SSL VPN gateway devices, a Salesforce response to abuse of the Klue Battlecards app integration, active exploitation of a critical Splunk Enterprise flaw, and law enforcement disruption of SocGholish infrastructure. The FortiBleed campaign has identified more than 80,000 devices with working usernames and passwords tested by suspected Russian-speaking threat actors, and CISA urged Fortinet customers to secure internet-accessible appliances. Salesforce said the Klue issue was limited to the app connection and did not arise from a vulnerability in the Salesforce platform.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights ransomware, mobile malware, browser extension risks, and compromised websites used to deliver further attacks. The Gentlemen ransomware-as-a-service operation is developing GentleKiller, an EDR-disabling framework that targets more than 400 processes across 48 security products before encryption. Rokarolla, a new Android trojan distributed through malicious websites while posing as apps like TikTok or Google Chrome, targets 217 cryptocurrency and banking apps and can steal credentials, monitor screens, redirect cryptocurrency transactions, and disable Google Play Protect.\u003c/p\u003e\n\n\u003cp\u003eA major theme across the recap is that attackers are relying on familiar weak points such as reused credentials, overly powerful browser extensions, unsafe downloads, and infected WordPress sites. Operation Endgame disrupted SocGholish by taking down 106 servers and cleaning 14,971 infected WordPress sites, while other campaigns used fake GitHub popularity, AI-narrated tutorials, ClickFix prompts, malicious JavaScript, and typosquatting pages to push malware. The article concludes that many attacks begin with ordinary security gaps such as stale logins, trusted apps, noisy plugins, and users chasing shortcuts.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The FortiBleed campaign has targeted Fortinet FortiGate firewall and SSL VPN gateway devices worldwide, with more than 80,000 devices identified with working usernames and passwords tested by suspected Russian-speaking threat actors.","Salesforce disabled the Klue Battlecards app integration after unusual activity involving the app may have allowed unauthorized access to a subset of customer data through the app’s Salesforce connection.","The Gentlemen ransomware-as-a-service operation is developing GentleKiller, an endpoint security-disabling framework that targets over 400 processes belonging to 48 security products.","Splunk reported limited exploitation of CVE-2026-20253, a critical Splunk Enterprise flaw that can allow unauthenticated file operations and potentially remote code execution.","Dutch, Canadian, German, and U.S. authorities disrupted SocGholish infrastructure, took down 106 related servers, and cleaned nearly 15,000 infected WordPress websites."],"insights":["Several major incidents in the roundup trace back to trusted connections rather than direct platform flaws, including Klue’s Salesforce integration, Okendo’s embedded reviews widget, and over-permissioned Chrome extensions.","WordPress appears repeatedly as both a victim and an attack delivery layer, with SocGholish infections, ClickFix campaigns, ErrTraffic injections, and multiple plugin and theme flaws all highlighted in the same recap.","Attackers are increasingly using social proof and familiar workflows to lower suspicion, including fake GitHub stars, AI-narrated YouTube tutorials, fake Google Play Protect prompts, fake SSL certificate updates, and bogus Microsoft Teams support calls.","Some threats are designed to evade automated defenses by waiting for human involvement or live conditions, including UnregStealer’s operator-triggered credential theft and SmartApeSG’s staged JavaScript loader with environment checks.","Residential proxy behavior is a recurring concern in the article, with Popa and commercial SDK-related cases showing consumer devices being turned into relay nodes for third-party traffic."],"referencedReports":[{"title":"CVE-2026-20253 Splunk Enterprise Pre-Authentication Remote Code Execution","url":"https://www.resecurity.com/blog/article/cve-2026-20253-splunk-enterprise-pre-authentication-remote-code-execution","publisher":"Resecurity","context":"The article cites Resecurity's analysis describing the Splunk Enterprise flaw as remotely exploitable without authentication or user interaction.","category":"","primary":false},{"title":"Spyder and MaXSS Chrome Extension Vulnerabilities Put Millions at Risk","url":"https://rebora.io/blog/spyder-and-maxss-chrome-extension-vulnerabilities-put-mi <script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

    document.documentElement.dataset.theme = t;

          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span className="swipe-clock" style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <select value={theme} onChange={(e) => applyTheme(e.target.value)} title="Select theme" aria-label="Select theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>

          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
