<script>
window.__DL_ARTICLES = [{"n":3,"title":"Over 140 popular Mastra npm Packages Hit by Supply Chain Attack","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/over-140-popular-mastra-npm-packages-hit-by-supply-chain-attack","time":"08:43","priority":"MUST READ","score":95,"tldr":"A supply chain attack compromised 141 packages in the @mastra npm scope by adding a malicious easy-day-js dependency that executed a postinstall payload. The malware downloaded a second-stage RAT, established persistence, and targeted browser-based crypto wallet extensions, making affected installs potentially compromised.","briefOverview":"\u003cp\u003eOn June 17, Aikido detected a large-scale supply chain attack targeting the entire \u003ccode\u003e@mastra\u003c/code\u003e npm scope, a popular open-source AI agent framework. An attacker republished 141 packages between 01:15 and 02:00 UTC and silently injected a malicious dependency into each of them. Affected packages included \u003ccode\u003e@mastra/core\u003c/code\u003e, which the article says has 918K weekly npm downloads, as well as \u003ccode\u003emastra\u003c/code\u003e and \u003ccode\u003ecreate-mastra\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe injected dependency was \u003ccode\u003eeasy-day-js\u003c/code\u003e, described as a malicious clone of the popular date library \u003ccode\u003edayjs\u003c/code\u003e. Its initial version, 1.11.21, was clean, but version 1.11.22 added a \u003ccode\u003epostinstall\u003c/code\u003e hook that ran an obfuscated \u003ccode\u003esetup.cjs\u003c/code\u003e script during installation. The compromised Mastra packages depended on \u003ccode\u003e^1.11.21\u003c/code\u003e, which allowed npm caret resolution to pull in the malicious 1.11.22 version.\u003c/p\u003e\n\n\u003cp\u003eThe postinstall script fetched a second-stage payload from \u003ccode\u003e23[.]254[.]164[.]92:8000\u003c/code\u003e, wrote it to a randomly named JavaScript file in the OS temp directory, spawned it as a detached background process, and self-deleted. The second stage collected system information, targeted over 160 browser-based crypto wallet extensions, and established persistence on macOS, Windows, and Linux. The article compares the playbook to an earlier axios compromise that also used a malicious dependency, install-time execution, a clean decoy version, and self-deleting droppers.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAikido reported that on June 17 it detected a large-scale supply chain attack against the \u003ccode\u003e@mastra\u003c/code\u003e npm scope. The attacker republished 141 packages in a burst between 01:15 and 02:00 UTC. The affected packages included \u003ccode\u003e@mastra/core\u003c/code\u003e, which the article says has 918K weekly npm downloads, along with \u003ccode\u003emastra\u003c/code\u003e and \u003ccode\u003ecreate-mastra\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe attacker did not change the target packages\u0026rsquo; own code directly, according to the article, but added a single new dependency to every affected \u003ccode\u003epackage.json\u003c/code\u003e. That dependency was \u003ccode\u003eeasy-day-js\u003c/code\u003e, a malicious clone of \u003ccode\u003edayjs\u003c/code\u003e published by a separate attacker-controlled account a day before the scope takeover. The first \u003ccode\u003eeasy-day-js\u003c/code\u003e release, 1.11.21, was clean, while 1.11.22 later added a malicious install hook.\u003c/p\u003e\n\n\u003cp\u003eThe compromised Mastra packages specified \u003ccode\u003eeasy-day-js\u003c/code\u003e with the range \u003ccode\u003e^1.11.21\u003c/code\u003e, which caused npm caret resolution to install the malicious 1.11.22 release as the latest version. Version 1.11.22 added a \u003ccode\u003epostinstall\u003c/code\u003e hook that ran an obfuscated \u003ccode\u003esetup.cjs\u003c/code\u003e script automatically during installation. The article notes that auditing the pinned version would not reveal the malicious behavior because the malicious code was in the later resolved version.\u003c/p\u003e\n\n\u003cp\u003eThe postinstall script fetched a second-stage payload from \u003ccode\u003e23[.]254[.]164[.]92:8000\u003c/code\u003e, wrote it to a random \u003ccode\u003e.js\u003c/code\u003e file in the operating system temp directory, and launched it as a fully detached background process. It passed \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e as a second command-and-control host and then self-deleted to remove forensic evidence of the install hook. The second stage was described as a long-lived process that collected system information and targeted more than 160 browser-based crypto wallet extensions, including MetaMask, Keplr, and Coinbase.\u003c/p\u003e\n\n\u003cp\u003eThe article says the second stage established persistence on macOS, Windows, and Linux by disguising itself as node-related tools and phoning home to \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e. It also says the attack closely resembled an earlier axios compromise covered by Aikido in March 2026. Both attacks used malicious dependencies, npm \u003ccode\u003epostinstall\u003c/code\u003e execution, clean decoy versions before malicious releases, self-deleting droppers, and Hostwinds infrastructure on port 8000.\u003c/p\u003e\n\n\u003cp\u003eAikido advised its users to check the central feed for malware issues and trigger a manual rescan, noting that the issue would surface as a \u003csup\u003e100\u003c/sup\u003e\u0026frasl;\u003csub\u003e100\u003c/sub\u003e critical issue. The article also listed network indicators and the affected package versions, including \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e, \u003ccode\u003ecreate-mastra@1.13.1\u003c/code\u003e, \u003ccode\u003emastra@1.13.1\u003c/code\u003e, and many \u003ccode\u003e@mastra\u003c/code\u003e packages. It also mentioned Aikido Safe Chain and Device Protection as protective options, while the core disclosure focused on the supply chain compromise and its indicators of compromise.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAikido reported detecting a large-scale npm supply chain attack on June 17 targeting the entire \u003ccode\u003e@mastra\u003c/code\u003e npm scope. The article describes Mastra as a popular open-source AI agent framework. According to the article, an attacker republished 141 packages between 01:15 and 02:00 UTC and silently added a malicious dependency to every one of them.\u003c/p\u003e\n\n\u003cp\u003eThe affected packages included \u003ccode\u003e@mastra/core\u003c/code\u003e, which the article says has 918K weekly npm downloads. Other named affected packages included \u003ccode\u003emastra\u003c/code\u003e and \u003ccode\u003ecreate-mastra\u003c/code\u003e. The article provides a long list of affected package versions in its Indicators of Compromise section.\u003c/p\u003e\n\n\u003ch2 id=\"malicious-dependency-injection\"\u003eMalicious Dependency Injection\u003c/h2\u003e\n\n\u003cp\u003eThe single new dependency added to the affected packages was \u003ccode\u003eeasy-day-js\u003c/code\u003e. The article describes \u003ccode\u003eeasy-day-js\u003c/code\u003e as a malicious clone of the popular date library \u003ccode\u003edayjs\u003c/code\u003e. It was published by a separate attacker-controlled account a day before the \u003ccode\u003e@mastra\u003c/code\u003e scope takeover.\u003c/p\u003e\n\n\u003cp\u003eA key detail in the article is the two-stage publication pattern for \u003ccode\u003eeasy-day-js\u003c/code\u003e:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eeasy-day-js@1.11.21\u003c/code\u003e was described as completely clean and a straight copy of \u003ccode\u003edayjs\u003c/code\u003e with no install hooks.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e was published the next day, around the time the \u003ccode\u003e@mastra\u003c/code\u003e packages were republished, and added the malicious behavior.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe compromised packages depended on \u003ccode\u003e^1.11.21\u003c/code\u003e. The article emphasizes that npm\u0026rsquo;s caret resolution automatically pulled in the malicious 1.11.22 version as the latest version. It also notes that auditing the pinned version would reveal nothing suspicious.\u003c/p\u003e\n\n\u003ch2 id=\"postinstall-execution\"\u003ePostinstall Execution\u003c/h2\u003e\n\n\u003cp\u003eVersion 1.11.22 of \u003ccode\u003eeasy-day-js\u003c/code\u003e added a \u003ccode\u003epostinstall\u003c/code\u003e hook that ran \u003ccode\u003esetup.cjs\u003c/code\u003e. The article describes this as an obfuscated script that executed automatically at install time without user interaction.\u003c/p\u003e\n\n\u003cp\u003eThe stripped-down logic shown in the article performed the following actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFetched a second-stage payload from \u003ccode\u003ehttps://23[.]254[.]164[.]92:8000/update/49890878\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eWrote the payload to a randomly named \u003ccode\u003e.js\u003c/code\u003e file in the operating system temporary directory.\u003c/li\u003e\n\u003cli\u003eSpawned the payload using the Node.js executable as a fully detached background process.\u003c/li\u003e\n\u003cli\u003ePassed \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e to the spawned payload as a second command-and-control host.\u003c/li\u003e\n\u003cli\u003eUsed ignored standard input/output, \u003ccode\u003ewindowsHide: true\u003c/code\u003e, and \u003ccode\u003edetached: true\u003c/code\u003e to run invisibly across platforms.\u003c/li\u003e\n\u003cli\u003eDeleted its own script file with \u003ccode\u003efs.rmSync(__filename, { force: true })\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article highlights the self-deletion as an attempt to remove forensic evidence of the postinstall hook.\u003c/p\u003e\n\n\u003ch2 id=\"second-stage-behavior\"\u003eSecond-Stage Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe second stage is described as a long-lived background process. According to the article, it collected system information and targeted over 160 browser-based crypto wallet extensions. Named examples included MetaMask, Keplr, and Coinbase.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the second stage established persistence on multiple operating systems:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003emacOS\u003c/li\u003e\n\u003cli\u003eWindows\u003c/li\u003e\n\u003cli\u003eLinux\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also says the malware disguised itself as node-related tools on these platforms. All of the second-stage activity phoned home to \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"similarity-to-the-axios-compromise\"\u003eSimilarity to the Axios Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article compares this attack to an axios compromise that Aikido said it covered in March 2026. It states that the playbook was nearly identical in several respects.\u003c/p\u003e\n\n\u003cp\u003eShared elements described in the article included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe attacker avoided changing the target package\u0026rsquo;s own code.\u003c/li\u003e\n\u003cli\u003eThe attacker injected a malicious dependency instead.\u003c/li\u003e\n\u003cli\u003eThe payload relied on npm\u0026rsquo;s \u003ccode\u003epostinstall\u003c/code\u003e hook to execute automatically during installation.\u003c/li\u003e\n\u003cli\u003eA clean decoy version was published before the malicious one.\u003c/li\u003e\n\u003cli\u003eThe droppers self-deleted after execution.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn the axios compromise, the article says \u003ccode\u003eplain-crypto-js\u003c/code\u003e played the role that \u003ccode\u003eeasy-day-js\u003c/code\u003e played in the Mastra incident. The article also says both attacks used infrastructure with a similar pattern: the axios dropper called back to a Hostwinds VPS on port 8000, while the \u003ccode\u003eeasy-day-js\u003c/code\u003e dropper called \u003ccode\u003e23[.]254[.]164[.]92:8000\u003c/code\u003e on Hostwinds infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article lists two network indicators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e23[.]254[.]164[.]92:8000\u003c/code\u003e — first-stage command-and-control server used for payload download.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e — second-stage callback host passed to the spawned RAT.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also identifies \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e as malicious and lists the affected Mastra-related package versions, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ecreate-mastra@1.13.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003emastra@1.13.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/core@1.42.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/deployer@1.42.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/server@2.1.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eMany additional \u003ccode\u003e@mastra\u003c/code\u003e packages across integrations, deployers, authentication modules, voice packages, storage modules, observability components, and other framework-related packages.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"detection-and-response-guidance-mentioned\"\u003eDetection and Response Guidance Mentioned\u003c/h2\u003e\n\n\u003cp\u003eFor Aikido users, the article says the issue should appear in the central feed when filtering on malware issues. It says the issue will surface as a \u003csup\u003e100\u003c/sup\u003e\u0026frasl;\u003csub\u003e100\u003c/sub\u003e critical issue. Aikido rescans nightly, but the article recommends triggering a manual rescan.\u003c/p\u003e\n\n\u003cp\u003eFor users not already using Aikido, the article says they can create an account and connect repositories, and that malware coverage is included in the free plan. It also mentions Aikido Device Protection for visibility and control over software packages installed on team devices. Finally, it recommends Aikido Safe Chain as an open-source tool that intercepts npm, npx, yarn, pnpm, and pnpx commands and checks packages against Aikido Intel before installation.\u003c/p\u003e\n\n\u003ch2 id=\"core-significance\"\u003eCore Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article\u0026rsquo;s central finding is that a widely used npm scope was compromised through dependency injection rather than direct source-code modification. The attack used npm version resolution and an install-time hook to execute a staged payload automatically. The resulting second-stage malware targeted system information and browser-based crypto wallet extensions while attempting persistence across macOS, Windows, and Linux.\u003c/p\u003e\n","keyPoints":["A supply chain attack targeted the entire @mastra npm scope, with 141 packages republished between 01:15 and 02:00 UTC on June 17.","The compromised packages added a dependency on easy-day-js, a malicious clone of dayjs whose version 1.11.22 included a postinstall hook that ran an obfuscated setup.cjs script.","The postinstall script fetched a second-stage payload from 23[.]254[.]164[.]92:8000, wrote it to a random JavaScript file in the OS temp directory, spawned it as a detached background process, and then self-deleted.","The second-stage payload collected system information, targeted over 160 browser-based crypto wallet extensions, and established persistence on macOS, Windows, and Linux.","The article says the attack closely resembled the earlier axios compromise, including the use of a malicious dependency, a clean decoy version before the malicious release, postinstall execution, and self-deleting droppers."],"insights":["Auditing only the declared dependency version can miss this compromise because the affected packages specified easy-day-js as ^1.11.21 while npm caret resolution pulled the malicious 1.11.22 release.","The attacker avoided modifying the Mastra package code directly, making dependency changes and install-time hooks the critical places to inspect for signs of compromise.","The clean initial release of easy-day-js created a misleading baseline before the malicious version was published, showing that a package’s earlier benign state did not make later resolved versions safe.","The postinstall hook’s self-deletion and detached background execution reduced forensic evidence on disk, so network indicators and running background Node processes may be especially important for investigation."],"referencedReports":[],"body":"\u003cp\u003eOn June 17, Aikido detected a large-scale supply chain attack targeting the entire \u003ccode\u003e@mastra\u003c/code\u003e npm scope, a popular open-source AI agent framework. An attacker republished 141 packages between 01:15 and 02:00 UTC and silently injected a malicious dependency into each of them. Affected packages included \u003ccode\u003e@mastra/core\u003c/code\u003e, which the article says has 918K weekly npm downloads, as well as \u003ccode\u003emastra\u003c/code\u003e and \u003ccode\u003ecreate-mastra\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe injected dependency was \u003ccode\u003eeasy-day-js\u003c/code\u003e, described as a malicious clone of the popular date library \u003ccode\u003edayjs\u003c/code\u003e. Its initial version, 1.11.21, was clean, but version 1.11.22 added a \u003ccode\u003epostinstall\u003c/code\u003e hook that ran an obfuscated \u003ccode\u003esetup.cjs\u003c/code\u003e script during installation. The compromised Mastra packages depended on \u003ccode\u003e^1.11.21\u003c/code\u003e, which allowed npm caret resolution to pull in the malicious 1.11.22 version.\u003c/p\u003e\n\n\u003cp\u003eThe postinstall script fetched a second-stage payload from \u003ccode\u003e23[.]254[.]164[.]92:8000\u003c/code\u003e, wrote it to a randomly named JavaScript file in the OS temp directory, spawned it as a detached background process, and self-deleted. The second stage collected system information, targeted over 160 browser-based crypto wallet extensions, and established persistence on macOS, Windows, and Linux. The article compares the playbook to an earlier axios compromise that also used a malicious dependency, install-time execution, a clean decoy version, and self-deleting droppers.\u003c/p\u003e\n"},{"n":4,"title":"144 Mastra npm Packages Compromised via Hijacked Contributor Account","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/144-mastra-npm-packages-compromised-via.html","time":"07:38","priority":"MUST READ","score":95,"tldr":"Attackers hijacked a former Mastra contributor’s npm account and pushed malicious versions of 144 @mastra packages that added the easy-day-js dependency, triggering an install-time stealer via postinstall. Any systems that installed the affected versions should be treated as potentially compromised, with credentials rotated and hosts audited for persistence.","briefOverview":"\u003cp\u003eAs many as 144 npm packages in the Mastra namespace, used by the open-source JavaScript and TypeScript AI application framework, were compromised in a supply chain attack codenamed easy-day-js. Socket said a single npm account, ehindero, mass-published more than 140 malicious packages across the Mastra scope in a short window on June 17, 2026. The account belonged to a legitimate former Mastra contributor whose scope access had not been revoked.\u003c/p\u003e\n\n\u003cp\u003eThe compromised Mastra packages did not contain malicious code directly; instead, they added a third-party dependency named easy-day-js. SafeDep described easy-day-js as a clone of the dayjs date library that downloads and runs a cryptocurrency-stealing remote access trojan. The payload executed during installation, harvested browser and cryptocurrency wallet extension data, installed persistence across Windows, macOS, and Linux, and exfiltrated data to an attacker-controlled command-and-control server.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAs many as 144 npm packages associated with the Mastra namespace, written as @mastra/*, were compromised in a software supply chain attack codenamed easy-day-js. Mastra is described as a popular open-source JavaScript and TypeScript framework for building AI applications. The findings were reported by JFrog, SafeDep, Socket, and StepSecurity.\u003c/p\u003e\n\n\u003cp\u003eSocket said a single npm account, ehindero, mass-published more than 140 malicious packages across the Mastra scope within a short window on June 17, 2026. The article says the attackers hijacked the ehindero account, which belonged to a legitimate former Mastra contributor whose scope access was never revoked. The automated publishing campaign reportedly spanned 88 minutes.\u003c/p\u003e\n\n\u003cp\u003eThe infected Mastra packages did not include malicious code directly. Instead, the malicious behavior was introduced by adding a third-party dependency named easy-day-js to each package’s dependency list. SafeDep described easy-day-js as a clone of the dayjs date library that was first published as a clean, functional copy by the npm user sergey2016 on June 16, 2026, with malicious changes introduced on June 17, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe easy-day-js package launched an obfuscated payload through a postinstall hook. That loader retrieved a second-stage payload from attacker-controlled infrastructure at 23.254.164[.]92 after disabling TLS certificate validation, executed it as a detached background process, and then attempted to erase itself. The final-stage malware could harvest browser history and data from more than 160 cryptocurrency wallet browser extensions, install persistence on Windows, macOS, and Linux, exfiltrate data to 23.254.164[.]123, and poll the C2 server for additional commands.\u003c/p\u003e\n\n\u003cp\u003eNpm has pulled the malicious versions from the highest-profile packages and reverted their latest tag. SafeDep noted that Mastra’s real releases were shipped from CI through npm’s trusted publisher flow and carried SLSA provenance attestations, but the attacker published from a personal token without provenance. The article advises treating any workstation, CI runner, or build environment that installed affected versions as potentially compromised, rolling back to safe versions, rotating credentials, and auditing hosts for campaign artifacts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAs many as 144 npm packages associated with the Mastra namespace, written as \u003ccode\u003e@mastra/*\u003c/code\u003e, were compromised in a software supply chain attack codenamed \u003ccode\u003eeasy-day-js\u003c/code\u003e. Mastra is described in the article as a popular open-source JavaScript and TypeScript framework for building artificial intelligence applications. The findings were attributed to JFrog, SafeDep, Socket, and StepSecurity.\u003c/p\u003e\n\n\u003cp\u003eSocket said that a single npm account, \u003ccode\u003eehindero\u003c/code\u003e, mass-published more than 140 malicious packages across the Mastra scope within a short window on June 17, 2026. The article states that the publishing activity happened as part of an automated campaign spanning 88 minutes.\u003c/p\u003e\n\n\u003ch2 id=\"compromise-path\"\u003eCompromise Path\u003c/h2\u003e\n\n\u003cp\u003eThe compromised Mastra packages themselves did not contain malicious code. Instead, the malicious behavior was introduced through a third-party dependency named \u003ccode\u003eeasy-day-js\u003c/code\u003e, which was added to each package’s dependency list.\u003c/p\u003e\n\n\u003cp\u003eSafeDep described \u003ccode\u003eeasy-day-js\u003c/code\u003e as a clone of the \u003ccode\u003edayjs\u003c/code\u003e date library. According to the article, the package was published by an npm user named \u003ccode\u003esergey2016\u003c/code\u003e on June 16, 2026, at 7:05 a.m. UTC as a clean, fully functional copy. Malicious changes were then introduced on June 17, 2026, at 1:01 a.m. UTC.\u003c/p\u003e\n\n\u003ch2 id=\"account-and-publishing-details\"\u003eAccount and Publishing Details\u003c/h2\u003e\n\n\u003cp\u003eThe article says the attackers hijacked the \u003ccode\u003eehindero\u003c/code\u003e account. That account belonged to a legitimate former Mastra contributor whose scope access had not been revoked.\u003c/p\u003e\n\n\u003cp\u003eSafeDep said Mastra’s real releases were shipped from CI through npm’s trusted publisher flow and carried SLSA provenance attestations. However, the attacker pushed the malicious versions from a personal token and dropped the provenance. SafeDep further stated that a signature-verifying install, npm audit signatures, or a policy requiring attestations would have rejected every package in the wave.\u003c/p\u003e\n\n\u003ch2 id=\"malware-execution-chain\"\u003eMalware Execution Chain\u003c/h2\u003e\n\n\u003cp\u003eThe \u003ccode\u003eeasy-day-js\u003c/code\u003e package launched an obfuscated payload during a postinstall hook. That payload acted as a dropper or loader for a second-stage payload retrieved from attacker-controlled infrastructure at \u003ccode\u003e23.254.164[.]92\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe loader disabled TLS certificate validation before retrieving the second stage. The payload was then executed as a detached background process. Afterward, the loader attempted to erase itself to reduce the forensic trail.\u003c/p\u003e\n\n\u003ch2 id=\"final-stage-capabilities\"\u003eFinal-Stage Capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe final stage was described as a cross-platform information stealer. Its capabilities included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHarvesting browser history.\u003c/li\u003e\n\u003cli\u003eStealing stored data from more than 160 cryptocurrency wallet browser extensions.\u003c/li\u003e\n\u003cli\u003eInstalling persistence across Windows, macOS, and Linux.\u003c/li\u003e\n\u003cli\u003eExfiltrating captured information to a command-and-control server at \u003ccode\u003e23.254.164[.]123\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003ePolling the C2 server for commands.\u003c/li\u003e\n\u003cli\u003eDownloading and executing modules from attacker-supplied URLs on Windows, Linux, and macOS systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eJFrog said the malware combined a clean decoy version, an obfuscated postinstall loader, runtime payload download, detached execution, self-deletion, Node-themed persistence, and a remote module system.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-risk\"\u003eImpact and Risk\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity said Mastra packages are commonly installed in environments that hold sensitive credentials because Mastra sits at the intersection of AI development and cloud infrastructure. Socket noted that the affected packages include \u003ccode\u003e@mastra/core\u003c/code\u003e, which receives more than 918,000 weekly npm downloads.\u003c/p\u003e\n\n\u003cp\u003eSocket also said that because the payload executes during installation, systems may be exposed before developers import or use the package. JFrog warned that even if the first-stage package is removed after installation, the second-stage process may continue running and may already have installed persistence.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-recommendations\"\u003eResponse and Recommendations\u003c/h2\u003e\n\n\u003cp\u003eNpm has pulled the malicious versions from the highest-profile packages and reverted their latest tag. The article advises that any workstation, CI runner, or build environment that installed the affected versions should be treated as potentially compromised.\u003c/p\u003e\n\n\u003cp\u003eRecommended actions in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRolling back to a safe version.\u003c/li\u003e\n\u003cli\u003eRotating credentials.\u003c/li\u003e\n\u003cli\u003eAuditing affected hosts for artifacts linked to the campaign.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe incident shows how a hijacked contributor account with lingering publishing access could be used to compromise a large package ecosystem through a dependency change. In this case, the added \u003ccode\u003eeasy-day-js\u003c/code\u003e dependency executed malicious code during installation, creating risk for developer workstations, CI runners, and build environments that installed affected Mastra package versions.\u003c/p\u003e\n","keyPoints":["As many as 144 npm packages associated with the Mastra namespace were compromised in a software supply chain attack codenamed easy-day-js.","A hijacked npm account belonging to a legitimate former Mastra contributor mass-published more than 140 malicious packages across the Mastra scope within about 88 minutes.","The compromised Mastra packages did not contain malicious code directly but added a third-party dependency called easy-day-js, which launched an obfuscated postinstall payload.","The final-stage malware could harvest browser history and data from more than 160 cryptocurrency wallet browser extensions, establish persistence on Windows, macOS, and Linux, and exfiltrate data to a command-and-control server.","Any workstation, CI runner, or build environment that installed the affected versions should be treated as potentially compromised, rolled back to a safe version, audited, and have credentials rotated."],"insights":["Mastra’s legitimate CI releases carried SLSA provenance attestations, but because provenance was not required, the attacker could publish malicious versions from a personal token without attestations.","A signature-verifying install or policy requiring attestations would have rejected every malicious package in this campaign, according to SafeDep.","Removing the first-stage easy-day-js package after installation may not fully remediate affected systems because the second-stage process can continue running and may have installed persistence.","The payload executes during package installation, so systems could be compromised before developers import or use any affected Mastra package.","The compromise was enabled by a former contributor’s npm scope access that had not been revoked, allowing a hijacked account to publish across the Mastra namespace."],"referencedReports":[{"title":"easy-day-js","url":"https://research.jfrog.com/post/easy-day-js/","publisher":"JFrog","context":"The article cites JFrog's findings on the easy-day-js software supply chain attack affecting Mastra npm packages.","category":"research","primary":true},{"title":"Mastra npm Scope Takeover Supply Chain Attack","url":"https://safedep.io/mastra-npm-scope-takeover-supply-chain-attack/","publisher":"SafeDep","context":"The article references SafeDep's analysis describing easy-day-js as a dayjs clone that downloads and runs a cryptocurrency-stealing remote access trojan.","category":"research","primary":true},{"title":"Mastra npm Packages Compromised","url":"https://socket.dev/blog/mastra-npm-packages-compromised","publisher":"Socket","context":"The article cites Socket's findings that a single npm account mass-published more than 140 malicious packages across the Mastra scope.","category":"research","primary":true},{"title":"Mastra npm Packages Compromised Using easy-day-js","url":"https://www.stepsecurity.io/blog/mastra-npm-packages-compromised-using-easy-day-js","publisher":"StepSecurity","context":"The article cites StepSecurity's analysis of the Mastra package compromise and its risk to AI development and cloud infrastructure environments.","category":"research","primary":true}],"body":"\u003cp\u003eAs many as 144 npm packages in the Mastra namespace, used by the open-source JavaScript and TypeScript AI application framework, were compromised in a supply chain attack codenamed easy-day-js. Socket said a single npm account, ehindero, mass-published more than 140 malicious packages across the Mastra scope in a short window on June 17, 2026. The account belonged to a legitimate former Mastra contributor whose scope access had not been revoked.\u003c/p\u003e\n\n\u003cp\u003eThe compromised Mastra packages did not contain malicious code directly; instead, they added a third-party dependency named easy-day-js. SafeDep described easy-day-js as a clone of the dayjs date library that downloads and runs a cryptocurrency-stealing remote access trojan. The payload executed during installation, harvested browser and cryptocurrency wallet extension data, installed persistence across Windows, macOS, and Linux, and exfiltrated data to an attacker-controlled command-and-control server.\u003c/p\u003e\n"},{"n":6,"title":"140+ Mastra npm Packages Compromised in Coordinated Supply Chain Attack","source":"socket.dev","sourceColorIdx":2,"link":"https://socket.dev/blog/mastra-npm-packages-compromised?utm_medium=feed","time":"06:03","priority":"MUST READ","score":95,"tldr":"More than 140 Mastra npm packages were compromised by adding a typosquatted dependency, easy-day-js, whose postinstall script automatically deployed a cross-platform infostealer and persistence during installation. Any developer machine or CI system that installed the affected versions should be treated as potentially compromised, with packages removed, persistence cleaned, and credentials rotated.","briefOverview":"\u003cp\u003eSocket detected a coordinated npm supply chain campaign involving compromised \u003ccode\u003e@mastra/*\u003c/code\u003e packages published under the Mastra namespace. On 2026-06-17, a single npm account, \u003ccode\u003eehindero\u003c/code\u003e, published malicious versions of 141 Mastra packages in a short window. The affected set included \u003ccode\u003e@mastra/core\u003c/code\u003e, which the article says receives more than 918,000 weekly npm downloads.\u003c/p\u003e\n\n\u003cp\u003eThe compromised Mastra package code was byte-for-byte identical to the last legitimate builds, but each package added a dependency on the typosquatted package \u003ccode\u003eeasy-day-js\u003c/code\u003e. That dependency contained a malicious \u003ccode\u003epostinstall\u003c/code\u003e hook in version \u003ccode\u003e1.11.22\u003c/code\u003e, causing the payload to run automatically during \u003ccode\u003enpm install\u003c/code\u003e before any developer imported or used the package. Socket said it flagged the malicious \u003ccode\u003eeasy-day-js\u003c/code\u003e within six minutes after publication.\u003c/p\u003e\n\n\u003cp\u003eThe first-stage loader disabled TLS certificate validation, downloaded a second-stage payload from attacker-controlled infrastructure, executed it as a detached process, and deleted itself. Socket analyzed the second stage as a cross-platform Node.js tasking client that installs persistence on Windows, macOS, and Linux, collects browser history, inventories cryptocurrency wallet browser extensions, gathers host reconnaissance, and can run follow-on code returned by the operators.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSocket reported a malicious npm supply chain campaign affecting the Mastra namespace, in which compromised \u003ccode\u003e@mastra/*\u003c/code\u003e packages were published on 2026-06-17. The article states that a single human npm account, \u003ccode\u003eehindero\u003c/code\u003e, published malicious versions of 141 Mastra packages between roughly 01:15 and 02:36 UTC. The affected packages included \u003ccode\u003e@mastra/core\u003c/code\u003e, which receives more than 918,000 weekly npm downloads, creating a large potential blast radius.\u003c/p\u003e\n\n\u003cp\u003eThe Mastra package contents themselves were not modified, aside from a patch version bump, routine manifest re-normalization, and one added dependency. Each compromised manifest added \u003ccode\u003eeasy-day-js\u003c/code\u003e with the dependency range \u003ccode\u003e^1.11.21\u003c/code\u003e. Socket identifies \u003ccode\u003eeasy-day-js\u003c/code\u003e as a typosquat of \u003ccode\u003edayjs\u003c/code\u003e, initially published cleanly by the \u003ccode\u003esergey2016\u003c/code\u003e account before version \u003ccode\u003e1.11.22\u003c/code\u003e added a weaponized \u003ccode\u003epostinstall\u003c/code\u003e script.\u003c/p\u003e\n\n\u003cp\u003eBecause the malicious logic ran through an install hook in a transitive dependency, exposure occurred during package installation rather than at application runtime. The \u003ccode\u003esetup.cjs\u003c/code\u003e loader disabled TLS certificate validation, wrote marker files in the temporary directory, fetched a second-stage payload from \u003ccode\u003ehttps://23.254.164[.]92:8000/update/49890878\u003c/code\u003e, launched it with an exfiltration target of \u003ccode\u003e23.254.164[.]123:443\u003c/code\u003e, and deleted itself. The article emphasizes that source-level review of the compromised \u003ccode\u003e@mastra/*\u003c/code\u003e packages would not reveal the malicious behavior.\u003c/p\u003e\n\n\u003cp\u003eSocket analyzed the second stage, named \u003ccode\u003eprotocal.cjs\u003c/code\u003e, as a roughly 41 KB cross-platform Node.js tasking client. It installs persistence through a Windows Run key, a macOS LaunchAgent, or a Linux systemd user unit, using Node and NVM-themed names such as \u003ccode\u003eNvmProtocal\u003c/code\u003e, \u003ccode\u003ecom.nvm.protocal\u003c/code\u003e, and \u003ccode\u003envmconf.service\u003c/code\u003e. It sends a \u003ccode\u003eStart\u003c/code\u003e beacon, enters a repeated \u003ccode\u003eCheck\u003c/code\u003e polling loop, and can run tasks through built-in Node and Shell runners.\u003c/p\u003e\n\n\u003cp\u003eThe recovered payload collected cryptocurrency wallet extension inventory, browser history from Chrome, Edge, and Brave, and host reconnaissance such as hostname, architecture, platform, user ID, installed applications, and running processes. The article notes that the sample inventories wallet extensions rather than copying their stored LevelDB data, but it also says the tasking channel allows arbitrary follow-on code execution. Socket recommends treating any workstation, CI runner, or build environment that installed the affected versions as potentially compromised, removing persistence and artifacts, clearing caches, rebuilding from clean environments, and rotating exposed credentials.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSocket reported a coordinated npm supply chain campaign involving compromised \u003ccode\u003e@mastra/*\u003c/code\u003e packages published under the Mastra namespace. The campaign occurred on 2026-06-17, when a single human npm account, \u003ccode\u003eehindero\u003c/code\u003e, published malicious versions of 141 Mastra packages in a tight time window between roughly 01:15 and 02:36 UTC.\u003c/p\u003e\n\n\u003cp\u003eThe affected packages included \u003ccode\u003e@mastra/core\u003c/code\u003e, which the article says receives more than 918,000 weekly npm downloads. Socket states that any workstation, CI runner, or build environment that installed the affected versions should be treated as potentially compromised because the payload executed during installation.\u003c/p\u003e\n\n\u003ch2 id=\"delivery-mechanism\"\u003eDelivery Mechanism\u003c/h2\u003e\n\n\u003cp\u003eThe compromised Mastra packages did not contain modified application code. According to Socket, the published \u003ccode\u003e@mastra/*\u003c/code\u003e code was byte-for-byte identical to the last legitimate build, aside from a patch version bump, routine manifest re-normalization, and one functional manifest change.\u003c/p\u003e\n\n\u003cp\u003eThat change was the addition of a dependency:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-json\"\u003e\u0026quot;easy-day-js\u0026quot;: \u0026quot;^1.11.21\u0026quot;\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eSocket identifies \u003ccode\u003eeasy-day-js\u003c/code\u003e as a typosquat of the popular \u003ccode\u003edayjs\u003c/code\u003e library. It was published on 2026-06-16 by a separate npm account, \u003ccode\u003esergey2016\u003c/code\u003e. Version \u003ccode\u003e1.11.21\u003c/code\u003e was a clean copy of \u003ccode\u003edayjs\u003c/code\u003e without an install hook, while version \u003ccode\u003e1.11.22\u003c/code\u003e added a malicious \u003ccode\u003epostinstall\u003c/code\u003e script:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-json\"\u003e\u0026quot;scripts\u0026quot;: { \u0026quot;postinstall\u0026quot;: \u0026quot;node setup.cjs --no-warnings\u0026quot; }\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eBecause the compromised Mastra packages depended on \u003ccode\u003eeasy-day-js\u003c/code\u003e, installing any affected \u003ccode\u003e@mastra/*\u003c/code\u003e package could pull \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e and run \u003ccode\u003esetup.cjs\u003c/code\u003e automatically during \u003ccode\u003enpm install\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"stage-1-loader\"\u003eStage 1 Loader\u003c/h2\u003e\n\n\u003cp\u003eThe first stage, \u003ccode\u003esetup.cjs\u003c/code\u003e, was obfuscated with obfuscator.io techniques including a string array, a custom Base64 decoder, and array rotation. Once deobfuscated, Socket described it as a compact downloader.\u003c/p\u003e\n\n\u003cp\u003eThe loader performed several actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSet \u003ccode\u003eNODE_TLS_REJECT_UNAUTHORIZED=0\u003c/code\u003e, disabling TLS certificate validation.\u003c/li\u003e\n\u003cli\u003eContacted \u003ccode\u003ehttps://23.254.164[.]92:8000/update/49890878\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eWrote \u003ccode\u003e.pkg_history\u003c/code\u003e and \u003ccode\u003e.pkg_logs\u003c/code\u003e files in the temporary directory.\u003c/li\u003e\n\u003cli\u003eDownloaded a second-stage payload.\u003c/li\u003e\n\u003cli\u003eWrote the payload to a randomized \u003ccode\u003e.js\u003c/code\u003e file in the temporary directory.\u003c/li\u003e\n\u003cli\u003eLaunched it as a detached background process.\u003c/li\u003e\n\u003cli\u003ePassed \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e as the second-stage exfiltration target.\u003c/li\u003e\n\u003cli\u003eDeleted itself to limit forensic traces.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe detached execution meant the payload could continue running after the npm install process exited.\u003c/p\u003e\n\n\u003ch2 id=\"stage-2-implant\"\u003eStage 2 Implant\u003c/h2\u003e\n\n\u003cp\u003eSocket recovered and analyzed the second-stage payload, referred to as \u003ccode\u003eprotocal.cjs\u003c/code\u003e. The article describes it as a roughly 41 KB cross-platform Node.js tasking client rather than a one-time stealer.\u003c/p\u003e\n\n\u003cp\u003eThe payload installed persistence across three operating systems:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eWindows:\u003c/strong\u003e created a \u003ccode\u003eNvmProtocal\u003c/code\u003e Run-key value under \u003ccode\u003eHKCU\\...\\CurrentVersion\\Run\u003c/code\u003e, pointing to a hidden PowerShell launch mechanism, and used \u003ccode\u003eC:\\ProgramData\\NodePackages\\\u003c/code\u003e for dropped files.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003emacOS:\u003c/strong\u003e created a LaunchAgent named \u003ccode\u003ecom.nvm.protocal.plist\u003c/code\u003e under \u003ccode\u003e~/Library/LaunchAgents/\u003c/code\u003e, running \u003ccode\u003e~/Library/NodePackages/protocal.cjs\u003c/code\u003e at login.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLinux:\u003c/strong\u003e created a systemd user unit named \u003ccode\u003envmconf.service\u003c/code\u003e, with the payload stored at \u003ccode\u003e~/.config/systemd/nvmconf/protocal.cjs\u003c/code\u003e and configuration under \u003ccode\u003e~/.config/NodePackages/config.json\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that these persistence names are deliberately themed around Node and NVM tooling, including \u003ccode\u003eprotocal.cjs\u003c/code\u003e, \u003ccode\u003eNodePackages\u003c/code\u003e, \u003ccode\u003eNvmProtocal\u003c/code\u003e, \u003ccode\u003ecom.nvm.protocal\u003c/code\u003e, and \u003ccode\u003envmconf.service\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"command-and-control-and-tasking\"\u003eCommand-and-Control and Tasking\u003c/h2\u003e\n\n\u003cp\u003eThe second stage sends a \u003ccode\u003eStart\u003c/code\u003e beacon and then enters a repeated \u003ccode\u003eCheck\u003c/code\u003e polling loop named \u003ccode\u003eCycle\u003c/code\u003e. Tasks returned by the server are dispatched to built-in runners, including a Node runner and a Shell runner. The implant also honors \u003ccode\u003econfig\u003c/code\u003e update and \u003ccode\u003eexit\u003c/code\u003e commands.\u003c/p\u003e\n\n\u003cp\u003eSocket states that this design allows the operator to push and execute arbitrary follow-on code on the host at any time. The article also notes that, although the recovered core does not itself read saved passwords or cookies, credential and secret theft can still occur through later modules delivered over this tasking channel.\u003c/p\u003e\n\n\u003cp\u003eThe second stage exfiltrates data to the command-and-control host passed in by the loader using the bot path \u003ccode\u003e/49890878\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"built-in-collection-capabilities\"\u003eBuilt-In Collection Capabilities\u003c/h2\u003e\n\n\u003cp\u003eSocket identified several built-in collection functions in the recovered second-stage sample.\u003c/p\u003e\n\n\u003ch3 id=\"cryptocurrency-wallet-inventory\"\u003eCryptocurrency Wallet Inventory\u003c/h3\u003e\n\n\u003cp\u003eThe payload contains a hardcoded list of 166 cryptocurrency wallet browser-extension IDs. The article names MetaMask, Phantom, Coinbase Wallet, Binance Wallet, TronLink, and others as examples.\u003c/p\u003e\n\n\u003cp\u003eThe implant lists each browser profile’s \u003ccode\u003eLocal Extension Settings\u003c/code\u003e directory, matches installed extensions against the wallet list, and exfiltrates matched extension IDs and profile paths as \u003ccode\u003eextInfo\u003c/code\u003e in the \u003ccode\u003eStart\u003c/code\u003e beacon. Socket notes that the recovered sample inventories wallet extensions but does not copy or read the wallet extensions’ stored LevelDB data.\u003c/p\u003e\n\n\u003ch3 id=\"browser-history\"\u003eBrowser History\u003c/h3\u003e\n\n\u003cp\u003eThe recovered payload targets browser history from Chrome, Edge, and Brave. It copies each profile’s \u003ccode\u003eHistory\u003c/code\u003e database to a temporary \u003ccode\u003ebrowser-hist-…\u003c/code\u003e directory and reads it using Node’s built-in \u003ccode\u003enode:sqlite\u003c/code\u003e module.\u003c/p\u003e\n\n\u003ch3 id=\"host-reconnaissance\"\u003eHost Reconnaissance\u003c/h3\u003e\n\n\u003cp\u003eThe implant also gathers host reconnaissance data, including hostname, architecture, platform, user ID, installed applications, and running processes.\u003c/p\u003e\n\n\u003ch2 id=\"notable-technical-details\"\u003eNotable Technical Details\u003c/h2\u003e\n\n\u003cp\u003eSocket highlighted several notable details in the malware and campaign:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe second stage uses custom ICAP-style HTTPS POST tasking and exfiltration payloads.\u003c/li\u003e\n\u003cli\u003eThe code includes strings such as \u003ccode\u003ereqmod\u003c/code\u003e, \u003ccode\u003ePrimaryUrl\u003c/code\u003e, \u003ccode\u003eSecondaryUrl\u003c/code\u003e, \u003ccode\u003esub_net_resolve\u003c/code\u003e, and \u003ccode\u003esub_net_splithostport\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eHostname resolution uses \u003ccode\u003enode:dns\u003c/code\u003e, including \u003ccode\u003eresolve4\u003c/code\u003e and \u003ccode\u003eisIPv4\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eTraffic carries a hardcoded spoofed User-Agent string: \u003ccode\u003emozilla/4.0 (compatible; msie 8.0; windows nt 5.1; trident/4.0)\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eBoth the loader and second stage set \u003ccode\u003eNODE_TLS_REJECT_UNAUTHORIZED=0\u003c/code\u003e, disabling TLS certificate validation.\u003c/li\u003e\n\u003cli\u003eAn identical loader sample named \u003ccode\u003ea.js\u003c/code\u003e was first seen on public sandboxes on 2026-05-29, about 19 days before the Mastra publish.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eSocket says it flagged the malicious \u003ccode\u003eeasy-day-js\u003c/code\u003e package within six minutes after publication. Because the malicious behavior was in a dependency install hook, Socket says users were protected automatically, with installs of the compromised packages flagged and blocked before the malicious hook could execute.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends treating any affected system as potentially compromised if it installed one of the impacted \u003ccode\u003e@mastra/*\u003c/code\u003e versions. It specifically states that deleting \u003ccode\u003enode_modules\u003c/code\u003e or uninstalling the npm package is not sufficient because the second-stage payload installs login persistence outside the project directory.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-remediation\"\u003eRecommended Remediation\u003c/h2\u003e\n\n\u003cp\u003eSocket recommends that affected organizations and users:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSearch repositories, lockfiles, CI logs, build artifacts, developer machines, package-manager metadata, package caches, SBOMs, and artifact manifests for affected Mastra packages and \u003ccode\u003eeasy-day-js\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eUse \u003ccode\u003enpm ls easy-day-js\u003c/code\u003e as a fast first check on projects or runners.\u003c/li\u003e\n\u003cli\u003eIsolate affected developer workstations and preserve logs before remediation.\u003c/li\u003e\n\u003cli\u003eSuspend affected CI/CD workflow runs and review whether releases, container images, npm packages, or deployment artifacts were produced after installation.\u003c/li\u003e\n\u003cli\u003eRemove affected versions and remove \u003ccode\u003eeasy-day-js\u003c/code\u003e entirely.\u003c/li\u003e\n\u003cli\u003eReplace affected \u003ccode\u003e@mastra/*\u003c/code\u003e packages with a known-clean prior version after verifying metadata and release provenance.\u003c/li\u003e\n\u003cli\u003eClear local and CI package caches where malicious tarballs may persist.\u003c/li\u003e\n\u003cli\u003eRebuild from clean environments rather than reusing existing runners, workspaces, or \u003ccode\u003enode_modules\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor persistence removal, Socket lists the following artifacts:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eWindows:\u003c/strong\u003e delete the \u003ccode\u003eNvmProtocal\u003c/code\u003e Run-key value and remove \u003ccode\u003eC:\\ProgramData\\NodePackages\\protocal.cjs\u003c/code\u003e and \u003ccode\u003econfig.json\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003emacOS:\u003c/strong\u003e unload and delete \u003ccode\u003e~/Library/LaunchAgents/com.nvm.protocal.plist\u003c/code\u003e and remove \u003ccode\u003e~/Library/NodePackages/protocal.cjs\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLinux:\u003c/strong\u003e disable and delete \u003ccode\u003e~/.config/systemd/user/nvmconf.service\u003c/code\u003e, remove \u003ccode\u003e~/.config/systemd/nvmconf/protocal.cjs\u003c/code\u003e, and remove \u003ccode\u003e~/.config/NodePackages/config.json\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSocket also recommends deleting loader artifacts in the temporary directory, including \u003ccode\u003e.pkg_history\u003c/code\u003e, \u003ccode\u003e.pkg_logs\u003c/code\u003e, randomized \u003ccode\u003e\u0026lt;hex\u0026gt;.js\u003c/code\u003e files, and \u003ccode\u003ebrowser-hist-*\u003c/code\u003e directories, and hunting for detached \u003ccode\u003enode\u003c/code\u003e processes running the dropped script.\u003c/p\u003e\n\n\u003ch2 id=\"credential-and-wallet-risk\"\u003eCredential and Wallet Risk\u003c/h2\u003e\n\n\u003cp\u003eSocket recommends rotating credentials that may have been present in the install context, including npm tokens, GitHub tokens, cloud provider credentials, SSH credentials, Git credentials, CI/CD secrets, and other exposed credentials.\u003c/p\u003e\n\n\u003cp\u003eFor cryptocurrency wallets, the article recommends treating wallet environments as high risk if targeted wallet extensions were present on an affected machine. It says that, despite the recovered sample inventorying wallet extensions rather than copying LevelDB contents, arbitrary install-time execution and dynamic follow-on tasking justify precautionary wallet migration for high-value wallets. Socket recommends moving funds to a new wallet generated from a fresh seed phrase on a clean device, stating that rotating a password is not enough.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article provides network, code, string, and hash indicators.\u003c/p\u003e\n\n\u003ch3 id=\"network-indicators\"\u003eNetwork Indicators\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e23.254.164[.]92\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ehttps://23.254.164[.]92:8000/update/49890878\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e23.254.164[.]123\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ehttps://23.254.164[.]123:443/49890878\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAS54290 (Hostwinds LLC)\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ehwsrv-1327786.hostwindsdns[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ehwsrv-1327785.hostwindsdns[.]com\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"code-and-string-indicators\"\u003eCode and String Indicators\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eNvmProtocal\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecom.nvm.protocal\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003envmconf.service\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eprotocal.cjs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eNodePackages\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.pkg_history\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e.pkg_logs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/update/49890878\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"sha-256-hashes\"\u003eSHA-256 Hashes\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eb122a9873bedf145ae2a7fd024b5f309007dbb025149f4dc4ac3f7e4f32a36a4\u003c/code\u003e — \u003ccode\u003eeasy-day-js setup.cjs\u003c/code\u003e stage-1 loader.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ec38954e85bf5433e61e7c8f4230336695624ae88b6953afabf7bf817aa91b638\u003c/code\u003e — \u003ccode\u003eeasy-day-js@1.11.22 package.json\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecdec8b20338beb708b5be8d3d7a3041a35a8b0fb92f9186262f312d55ff82066\u003c/code\u003e — loader variant.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e9570f77a5e1511869f4e554e7166df9fde081f2583e293c2569621792ed7d9c9\u003c/code\u003e — loader variant.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e221c45a790dec2a296af57969e1165a16f8f49733aeab64c0bbd768d9943badf\u003c/code\u003e — stage-2 stealer.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"ci-cd-and-dependency-control-recommendations\"\u003eCI/CD and Dependency Control Recommendations\u003c/h2\u003e\n\n\u003cp\u003eSocket recommends running dependency installation with lifecycle scripts disabled by default using \u003ccode\u003enpm install --ignore-scripts\u003c/code\u003e, with install scripts allowlisted only for dependencies that need them. It also recommends dependency allowlisting, package cooldown periods, lockfile enforcement, SBOM generation, network egress controls for CI runners and developer build environments, and alerts for outbound connections to raw IP literals or unexpected hosts during dependency installation.\u003c/p\u003e\n\n\u003cp\u003eThe article warns against treating provenance or trusted publishing as a complete control because this incident involved malicious packages published through an account with legitimate publish rights.\u003c/p\u003e\n","keyPoints":["Socket detected a malicious npm supply chain campaign in which the npm account ehindero published malicious versions of 141 @mastra/* packages on 2026-06-17.","The compromised Mastra package code was unchanged, but each package added a dependency on the typosquatted package easy-day-js, whose postinstall hook executed automatically during npm install.","The easy-day-js loader disabled TLS certificate validation, downloaded a second-stage payload from attacker-controlled infrastructure, launched it as a detached background process, and deleted itself.","Socket analyzed the second-stage payload as a cross-platform Node.js tasking client that installs persistence on Windows, macOS, and Linux and can run follow-on code from the operators.","The recovered payload collected cryptocurrency wallet extension inventory, browser history from Chrome, Edge, and Brave, and host reconnaissance data, then exfiltrated data to the operators' command-and-control host."],"insights":["Source-level review of the compromised @mastra/* packages would not reveal the malicious behavior because the package contents were unchanged and the attack was entirely delivered through a transitive dependency install hook.","Deleting node_modules or uninstalling the affected npm packages is insufficient remediation because the second-stage payload creates separate login persistence on Windows, macOS, and Linux.","The easy-day-js package was first published as a clean copy of dayjs before being updated with a malicious postinstall hook, showing that a benign initial package history did not indicate safety.","The recovered second stage inventoried cryptocurrency wallet extensions rather than copying their stored LevelDB data, but its tasking capability allowed operators to deliver and execute arbitrary follow-on code later.","The use of Node and NVM-themed names such as NvmProtocal, com.nvm.protocal, nvmconf.service, and NodePackages was designed to blend into developer systems and provides concrete artifacts for hunting."],"referencedReports":[],"body":"\u003cp\u003eSocket detected a coordinated npm supply chain campaign involving compromised \u003ccode\u003e@mastra/*\u003c/code\u003e packages published under the Mastra namespace. On 2026-06-17, a single npm account, \u003ccode\u003eehindero\u003c/code\u003e, published malicious versions of 141 Mastra packages in a short window. The affected set included \u003ccode\u003e@mastra/core\u003c/code\u003e, which the article says receives more than 918,000 weekly npm downloads.\u003c/p\u003e\n\n\u003cp\u003eThe compromised Mastra package code was byte-for-byte identical to the last legitimate builds, but each package added a dependency on the typosquatted package \u003ccode\u003eeasy-day-js\u003c/code\u003e. That dependency contained a malicious \u003ccode\u003epostinstall\u003c/code\u003e hook in version \u003ccode\u003e1.11.22\u003c/code\u003e, causing the payload to run automatically during \u003ccode\u003enpm install\u003c/code\u003e before any developer imported or used the package. Socket said it flagged the malicious \u003ccode\u003eeasy-day-js\u003c/code\u003e within six minutes after publication.\u003c/p\u003e\n\n\u003cp\u003eThe first-stage loader disabled TLS certificate validation, downloaded a second-stage payload from attacker-controlled infrastructure, executed it as a detached process, and deleted itself. Socket analyzed the second stage as a cross-platform Node.js tasking client that installs persistence on Windows, macOS, and Linux, collects browser history, inventories cryptocurrency wallet browser extensions, gathers host reconnaissance, and can run follow-on code returned by the operators.\u003c/p\u003e\n"},{"n":5,"title":"Malicious JetBrains Plugins Steal AI API Keys as Chrome Extensions Capture Chatbot Chats","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/malicious-jetbrains-plugins-steal-ai.html","time":"09:38","priority":"SHOULD READ","score":85,"tldr":"Researchers found 15 malicious JetBrains Marketplace plugins posing as AI coding assistants that steal users’ AI provider API keys, likely to resell access for LLMjacking. Separately, two Chrome ad blocker extensions were caught secretly collecting users’ private conversations with major AI chatbots.","briefOverview":"\u003cp\u003eCybersecurity researchers flagged a coordinated malware campaign on the JetBrains Marketplace involving at least 15 malicious plugins that pose as AI coding assistants. Aikido Security said the plugins offer features such as chat, commit messages, code review, bug finding, and unit tests, and that they function as advertised. The issue is that the AI provider API keys entered by users are exfiltrated to an attacker-controlled server.\u003c/p\u003e\n\n\u003cp\u003eThe JetBrains campaign has reportedly been ongoing since the end of October 2025, with new plugins released as recently as June 10, 2026. Two plugins, CodeGPT AI Assistant and DeepSeek AI Assist, each show more than 25,000 downloads, although the article says it is unclear whether those counts are authentic or inflated. The stolen keys may be used in an illicit monetization scheme where paying users receive access to AI provider keys while the original key owners pay the bill.\u003c/p\u003e\n\n\u003cp\u003eThe article also reports that two Chrome ad blocker extensions, Smart Adblocker and Adblock for Browser, have been caught collecting users’ conversations with AI chatbots. Researcher Jean-Marie R. named this operation PromptSnatcher and said the extensions capture conversation history, model usage, and subscription tier metadata from major AI platforms. The extensions provide genuine ad-blocking functionality while running an undisclosed telemetry channel.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAikido Security reported a coordinated malware campaign on the JetBrains Marketplace involving no fewer than 15 malicious plugins. The plugins pose as AI coding assistants built around DeepSeek and other large language models, offering features such as chat, commit messages, code review, bug finding, and unit tests. According to researcher Ilyas Makari, they function as advertised, but the AI provider API key entered by the user is exfiltrated to a server controlled by the attacker.\u003c/p\u003e\n\n\u003cp\u003eThe activity is said to have started at the end of October 2025, with new plugins released as recently as June 10, 2026. Two of the plugins, CodeGPT AI Assistant and DeepSeek AI Assist, have more than 25,000 downloads each, though the article notes that it is unclear whether those counts are genuine or inflated to create false popularity. All 15 plugins reportedly share a similar codebase and require users to enter an API key for services such as OpenAI, SiliconFlow, or DeepSeek.\u003c/p\u003e\n\n\u003cp\u003eThe plugins secretly send the provided API key to the remote server 39.107.60[.]51 over plaintext HTTP. Aikido Security also said the plugins include a paid tier in which, after a user pays a small fee through a built-in donation wall, the server sends an API key back to the client and the plugin starts using that key instead of the user’s own. The article says this raises the possibility that the operators are sharing stolen AI provider keys with other threat actors as part of an illicit monetization scheme.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the JetBrains campaign as further evidence that threat actors are increasingly targeting developer environments through the open-source ecosystem. It notes that developer environments can contain source code, cloud credentials, signing keys, and API keys for paid AI services that can be resold for LLMjacking schemes. Aikido Security advised treating plugins like any dependency that runs with the user’s privileges and being cautious about entering long-lived secrets into unvetted tools.\u003c/p\u003e\n\n\u003cp\u003eSeparately, researcher Jean-Marie R. reported that two Chrome ad blocker extensions, Smart Adblocker and Adblock for Browser, were capturing users’ conversations with AI chatbots. The operation, called PromptSnatcher, affects conversations with platforms including ChatGPT, Claude, Gemini, Copilot, Perplexity, DeepSeek, Grok, and Meta AI. The extensions are described as providing genuine ad-blocking utility through public filter lists while also running an undisclosed telemetry channel that records full AI conversation history, model usage, and account-tier metadata.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports two separate findings involving AI-related credential and data theft. The first is a coordinated malware campaign on the JetBrains Marketplace involving at least 15 malicious plugins that masquerade as AI coding assistants. The second concerns two Chrome ad blocker extensions that allegedly capture private conversations with major AI chatbot platforms.\u003c/p\u003e\n\n\u003cp\u003eBoth cases involve tools that provide the functionality they advertise while also performing undisclosed data collection. The JetBrains plugins steal AI provider API keys entered by developers, while the Chrome extensions collect chatbot conversation history and related account metadata. The article presents these findings as part of a broader pattern of threat actors targeting developer environments and AI-related usage.\u003c/p\u003e\n\n\u003ch2 id=\"malicious-jetbrains-marketplace-plugins\"\u003eMalicious JetBrains Marketplace plugins\u003c/h2\u003e\n\n\u003cp\u003eAikido Security researcher Ilyas Makari said the JetBrains Marketplace campaign involved no fewer than 15 malicious plugins. Each plugin poses as an AI coding assistant built on DeepSeek and other large language models. The plugins offer features such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eChat\u003c/li\u003e\n\u003cli\u003eCommit message generation\u003c/li\u003e\n\u003cli\u003eCode review\u003c/li\u003e\n\u003cli\u003eBug finding\u003c/li\u003e\n\u003cli\u003eUnit tests\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to Aikido Security, the plugins function exactly as advertised. However, when users enter an AI provider API key, the key is exfiltrated to a server controlled by the attacker.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-and-download-counts\"\u003eTimeline and download counts\u003c/h2\u003e\n\n\u003cp\u003eThe activity is said to have been ongoing since the end of October 2025. New plugins were released as recently as June 10, 2026. Two of the plugins, CodeGPT AI Assistant and DeepSeek AI Assist, have more than 25,000 downloads each.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that it is not clear whether the reported download counts are authentic. It also raises the possibility that the counts may have been inflated to fake popularity.\u003c/p\u003e\n\n\u003ch2 id=\"listed-malicious-plugins\"\u003eListed malicious plugins\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the following 15 plugins:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDeepSeek Junit Test (org.sm.yms.toolkit)\u003c/li\u003e\n\u003cli\u003eDeepSeek Git Commit (com.json.simple.kit)\u003c/li\u003e\n\u003cli\u003eDeepSeek FindBugs (org.bug.find.tools)\u003c/li\u003e\n\u003cli\u003eDeepSeek AI Chat (org.translate.ai.simple)\u003c/li\u003e\n\u003cli\u003eDeepSeek Dev AI (com.yy.test.ai.simple)\u003c/li\u003e\n\u003cli\u003eDeepSeek AI Coding (com.dev.ai.toolkit)\u003c/li\u003e\n\u003cli\u003eAI FindBugs (com.json.view.simple)\u003c/li\u003e\n\u003cli\u003eAI Git Commitor (com.my.git.ai.kit)\u003c/li\u003e\n\u003cli\u003eAI Coder Review (org.check.ai.ds)\u003c/li\u003e\n\u003cli\u003eDeepSeek Coder AI (com.review.tool.code)\u003c/li\u003e\n\u003cli\u003eAI Coder Assistant (org.code.assist.dev.tool)\u003c/li\u003e\n\u003cli\u003eDeepSeek Code Review (com.coder.ai.dpt)\u003c/li\u003e\n\u003cli\u003eCodeGPT AI Assistant (com.my.code.tools)\u003c/li\u003e\n\u003cli\u003eDeepSeek AI Assist (ord.cp.code.ai.kit)\u003c/li\u003e\n\u003cli\u003eCoding Simple Tool (com.dp.git.ai.tool)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAikido Security said all 15 plugins share a similar codebase. The plugins require users to open a settings panel and enter an API key for an AI provider such as OpenAI, SiliconFlow, or DeepSeek.\u003c/p\u003e\n\n\u003ch2 id=\"api-key-exfiltration-behavior\"\u003eAPI key exfiltration behavior\u003c/h2\u003e\n\n\u003cp\u003eThe plugins were found to covertly siphon the provided API key to a remote server. The server identified in the article is 39.107.60[.]51. The exfiltration takes place over an HTTP request in plaintext format.\u003c/p\u003e\n\n\u003cp\u003eThis is notable because the plugins do not merely fail to work or behave obviously maliciously. They perform their advertised AI coding assistant functions while also secretly sending user-provided credentials to attacker-controlled infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"paid-tier-and-suspected-monetization-model\"\u003ePaid tier and suspected monetization model\u003c/h2\u003e\n\n\u003cp\u003eAikido Security also reported that the plugins include a paid tier. After a user pays a small fee through a donation wall built into the plugin, the server sends an API key back to the client. The plugin then starts using that key for model calls instead of the user’s own key.\u003c/p\u003e\n\n\u003cp\u003eThe article says this behavior is bizarre because no legitimate operator would simply hand a user a working and unrestricted key to a paid AI provider. It raises the possibility that the operators behind the campaign are sharing stolen AI provider API keys with other threat actors as part of an illicit monetization scheme.\u003c/p\u003e\n\n\u003cp\u003eMakari summarized the model by saying that the operator collects money on one side and free credentials on the other, while the genuine key owners pay the bill.\u003c/p\u003e\n\n\u003ch2 id=\"broader-significance-for-developer-environments\"\u003eBroader significance for developer environments\u003c/h2\u003e\n\n\u003cp\u003eThe article frames the campaign as further evidence that threat actors are increasingly targeting developer environments through the open-source ecosystem. These environments are described as lucrative targets because they can host:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSource code\u003c/li\u003e\n\u003cli\u003eCloud credentials\u003c/li\u003e\n\u003cli\u003eSigning keys\u003c/li\u003e\n\u003cli\u003eAPI keys for paid AI services\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article specifically links the theft of paid AI service keys to LLMjacking schemes. Aikido Security advised users to treat plugins the same way they would treat any dependency that runs with their privileges. It also urged caution when pasting long-lived secrets into tools that have not been vetted.\u003c/p\u003e\n\n\u003ch2 id=\"chrome-extensions-stealing-ai-conversations\"\u003eChrome extensions stealing AI conversations\u003c/h2\u003e\n\n\u003cp\u003eThe second development in the article concerns two Google Chrome ad blocker extensions. Researcher Jean-Marie R. reported that the extensions captured users’ conversations with AI chatbots. The data collection operation has been codenamed PromptSnatcher.\u003c/p\u003e\n\n\u003cp\u003eThe article says the affected chatbot platforms include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOpenAI ChatGPT\u003c/li\u003e\n\u003cli\u003eAnthropic Claude\u003c/li\u003e\n\u003cli\u003eGoogle Gemini\u003c/li\u003e\n\u003cli\u003eMicrosoft Copilot\u003c/li\u003e\n\u003cli\u003ePerplexity\u003c/li\u003e\n\u003cli\u003eDeepSeek\u003c/li\u003e\n\u003cli\u003exAI Grok\u003c/li\u003e\n\u003cli\u003eMeta AI\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe two Chrome extensions named in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSmart Adblocker, ID iojpcjjdfhlcbgjnpngcmaojmlokmeii, with 90,000 users and published in October 2022\u003c/li\u003e\n\u003cli\u003eAdblock for Browser, ID jcbjcocinigpbgfpnhlpagidbmlngnnn, with 10,000 users and published in August 2023\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the extensions were still available on the Chrome Web Store at the time of reporting.\u003c/p\u003e\n\n\u003ch2 id=\"promptsnatcher-behavior\"\u003ePromptSnatcher behavior\u003c/h2\u003e\n\n\u003cp\u003eAlthough presented as ad blockers, the extensions reportedly include a custom-built interception engine. This engine records non-public conversations, model usage, and account-tier metadata from major AI platforms. The article says the extensions transmit this data to operator-controlled infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe researcher said the extensions use legitimate public filter lists, including EasyList and IDCAC, as functional cover. This means they provide genuine ad-blocking utility while also running an undisclosed telemetry channel.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that the extensions have been around for several years. It says this indicates that the AI-related updates were introduced through software updates.\u003c/p\u003e\n\n\u003ch2 id=\"prompt-poaching-context\"\u003ePrompt Poaching context\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the Chrome extension behavior as part of an attack technique called Prompt Poaching. It says that, over the past several months, both legitimate and malicious browser extensions have been observed adopting this method to stealthily capture AI chats. The article also says it is unclear whether these practices violate Google’s policies for browser extensions.\u003c/p\u003e\n\n\u003cp\u003eAccording to Jean-Marie R., the extensions intercept full AI conversation history, model usage, and subscription tier from eight platforms. The data is transmitted to operator-controlled infrastructure without notification to the user beyond a generic “Enhanced Protection” consent string.\u003c/p\u003e\n\n\u003ch2 id=\"key-impact-described-in-the-article\"\u003eKey impact described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe JetBrains plugin campaign affects users who entered AI provider API keys into the malicious plugins. Those keys could be used by the attackers or shared with others, while the legitimate owners of the keys pay for usage. The article specifically connects this to potential illicit monetization involving stolen AI provider access.\u003c/p\u003e\n\n\u003cp\u003eThe Chrome extension case affects users whose AI chatbot conversations, model usage, and subscription tier information were collected by the extensions. The extensions are notable because they provided real ad-blocking functionality, which the article says served as cover for the undisclosed telemetry channel.\u003c/p\u003e\n","keyPoints":["Aikido Security reported a coordinated malware campaign on the JetBrains Marketplace involving at least 15 malicious plugins that pose as AI coding assistants and exfiltrate AI provider API keys.","The malicious JetBrains plugins function as advertised but secretly send entered API keys for providers such as OpenAI, SiliconFlow, or DeepSeek to the attacker-controlled server 39.107.60[.]51 over plaintext HTTP.","Two of the malicious JetBrains plugins, CodeGPT AI Assistant and DeepSeek AI Assist, have more than 25,000 downloads each, though the article says it is unclear whether the counts are authentic or inflated.","Researcher Jean-Marie R. reported that two Chrome ad blocker extensions, Smart Adblocker and Adblock for Browser, capture users’ conversations with AI chatbots including ChatGPT, Claude, Gemini, Copilot, Perplexity, DeepSeek, Grok, and Meta AI.","The Chrome extensions provide genuine ad-blocking functionality while running an undisclosed telemetry channel that collects full AI conversation history, model usage, and subscription tier metadata."],"insights":["The malicious JetBrains plugins worked as advertised, showing that functional developer tools can still be credential-stealing malware and should be vetted even when they appear to perform normally.","The campaign’s paid tier was especially suspicious because it sent users a working AI provider API key after payment, which Aikido Security noted is not something a legitimate operator would normally do with an unrestricted paid-provider key.","The Chrome extensions used legitimate public filter lists such as EasyL
