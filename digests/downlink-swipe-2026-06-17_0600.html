ist and IDCAC as functional cover, making their undisclosed AI-chat telemetry harder to notice because the ad-blocking features actually worked.","The Chrome extensions had existed for years before the AI-related data collection was observed, indicating that long-installed browser extensions can become risky through later software updates."],"referencedReports":[{"title":"Multiple JetBrains IDE Plugins Caught Stealing AI Keys","url":"https://www.aikido.dev/blog/multiple-jetbrains-ide-plugins-caught-stealing-ai-keys","publisher":"Aikido Security","context":"The article cites Aikido Security’s research as the source for the finding that 15 JetBrains Marketplace plugins exfiltrated AI provider API keys.","category":"research","primary":true},{"title":"PromptSnatcher","url":"https://malext.io/reports/PromptSnatcher/","publisher":"Jean-Marie R.","context":"The article cites researcher Jean-Marie R.’s PromptSnatcher report as the source for the discovery that two Chrome ad blocker extensions captured users’ AI chatbot conversations.","category":"research","primary":true}],"body":"\u003cp\u003eCybersecurity researchers flagged a coordinated malware campaign on the JetBrains Marketplace involving at least 15 malicious plugins that pose as AI coding assistants. Aikido Security said the plugins offer features such as chat, commit messages, code review, bug finding, and unit tests, and that they function as advertised. The issue is that the AI provider API keys entered by users are exfiltrated to an attacker-controlled server.\u003c/p\u003e\n\n\u003cp\u003eThe JetBrains campaign has reportedly been ongoing since the end of October 2025, with new plugins released as recently as June 10, 2026. Two plugins, CodeGPT AI Assistant and DeepSeek AI Assist, each show more than 25,000 downloads, although the article says it is unclear whether those counts are authentic or inflated. The stolen keys may be used in an illicit monetization scheme where paying users receive access to AI provider keys while the original key owners pay the bill.\u003c/p\u003e\n\n\u003cp\u003eThe article also reports that two Chrome ad blocker extensions, Smart Adblocker and Adblock for Browser, have been caught collecting users’ conversations with AI chatbots. Researcher Jean-Marie R. named this operation PromptSnatcher and said the extensions capture conversation history, model usage, and subscription tier metadata from major AI platforms. The extensions provide genuine ad-blocking functionality while running an undisclosed telemetry channel.\u003c/p\u003e\n"},{"n":2,"title":"Microsoft working on Defender patch for RoguePlanet zero-day","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-working-on-defender-patch-for-rogueplanet-zero-day/","time":"08:32","priority":"SHOULD READ","score":80,"tldr":"Microsoft is working on a patch for the publicly disclosed RoguePlanet zero-day in Microsoft Defender, now tracked as CVE-2026-50656, which can allow attackers to gain SYSTEM privileges on fully patched Windows 10 and 11 systems. The flaw was released amid an ongoing dispute between researcher Nightmare Eclipse and Microsoft over vulnerability disclosure practices.","briefOverview":"\u003cp\u003eMicrosoft confirmed that it is working on a security patch for a Microsoft Defender zero-day vulnerability named RoguePlanet. The flaw was disclosed one week before Microsoft assigned it CVE-2026-50656 and said it is working on a security update. Microsoft described the issue as an elevation of privilege vulnerability in the Microsoft Malware Protection Engine.\u003c/p\u003e\n\n\u003cp\u003eThe researcher Nightmare Eclipse said the RoguePlanet exploit affects fully patched Windows 10 and Windows 11 devices. According to the researcher, the exploit abuses a Microsoft Defender race condition to spawn command prompts with SYSTEM privileges. The researcher also said the proof-of-concept works regardless of whether real-time protection is enabled.\u003c/p\u003e\n\n\u003cp\u003eThe disclosure is part of an ongoing dispute between Nightmare Eclipse and Microsoft over bug bounty and vulnerability disclosure practices. The article says the researcher has publicly leaked multiple Windows zero-day exploits in recent months, including flaws affecting Microsoft Defender, BitLocker, and other Windows components. Microsoft fixed the GreenPlasma, MiniPlasma, and YellowKey flaws in the June 2026 Patch Tuesday updates.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft confirmed that it is working on a patch for RoguePlanet, a publicly disclosed zero-day vulnerability in Microsoft Defender. The flaw was disclosed during the June 2026 Patch Tuesday, which the article says is known as Nightmare Eclipse. One week after the disclosure, Microsoft assigned the vulnerability the identifier CVE-2026-50656.\u003c/p\u003e\n\n\u003cp\u003eThe researcher Nightmare Eclipse said RoguePlanet affects fully patched Windows 10 and Windows 11 devices. The exploit reportedly allows attackers to spawn command prompts with SYSTEM privileges through a Microsoft Defender race condition. Nightmare Eclipse said the exploit is hit-or-miss, reaching a 100% success rate on some machines while struggling on others.\u003c/p\u003e\n\n\u003cp\u003eNightmare Eclipse published a proof-of-concept exploit in a self-hosted Git repository. The researcher said this was because Microsoft had previously targeted and removed repositories hosting exploits on GitHub and GitLab. In a Tuesday update, the researcher added that the RoguePlanet proof-of-concept works regardless of whether real-time protection is enabled.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft initially told BleepingComputer that it was aware of the reported vulnerability and was investigating the validity and potential applicability of the claims. In the later advisory, Microsoft said it was aware of an elevation of privilege in the Microsoft Malware Protection Engine publicly referred to as RoguePlanet. Microsoft said it was working to provide a high-quality security update and would update the CVE when the fix became available.\u003c/p\u003e\n\n\u003cp\u003eThe RoguePlanet release is tied to an ongoing dispute between Nightmare Eclipse and Microsoft over bug bounty and vulnerability disclosure practices. The article says the researcher has leaked multiple Windows zero-day exploits in recent months, including BlueHammer, RedSun, GreenPlasma, MiniPlasma, YellowKey, and UnDefend. Microsoft fixed GreenPlasma, MiniPlasma, and YellowKey as part of the June 2026 Patch Tuesday updates.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft confirmed that it is working on a security patch for a Microsoft Defender zero-day vulnerability named RoguePlanet. The flaw was publicly disclosed one week before Microsoft assigned it the identifier CVE-2026-50656. Microsoft described the issue as an elevation of privilege vulnerability in the Microsoft Malware Protection Engine.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was disclosed by the researcher Nightmare Eclipse during the June 2026 Patch Tuesday, which the article says is known as Nightmare Eclipse. Microsoft said it is working to provide a high-quality security update for the vulnerability and will update the CVE when the fix is available.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-and-reported-impact\"\u003eTechnical Details and Reported Impact\u003c/h2\u003e\n\n\u003cp\u003eAccording to Nightmare Eclipse, RoguePlanet affects fully patched Windows 10 and Windows 11 devices. The researcher said the exploit abuses a Microsoft Defender race condition to spawn command prompts with SYSTEM privileges.\u003c/p\u003e\n\n\u003cp\u003eThe researcher described the exploit as unreliable across systems because it depends on a race condition. Nightmare Eclipse said they achieved a 100% success rate on some machines, while the exploit struggled to work on others.\u003c/p\u003e\n\n\u003cp\u003eNightmare Eclipse also said the proof-of-concept for RoguePlanet works regardless of whether real-time protection is enabled. The article does not state that a patch was available at the time of publication.\u003c/p\u003e\n\n\u003ch2 id=\"proof-of-concept-publication\"\u003eProof-of-Concept Publication\u003c/h2\u003e\n\n\u003cp\u003eNightmare Eclipse published a proof-of-concept exploit for RoguePlanet in a self-hosted Git repository. The researcher said this was because Microsoft had previously targeted and removed repositories hosting exploits on GitHub and GitLab.\u003c/p\u003e\n\n\u003cp\u003eThe article links RoguePlanet to earlier reporting that said the exploit grants SYSTEM privileges. It also says the vulnerability was disclosed during the June 2026 Patch Tuesday cycle.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-response\"\u003eMicrosoft Response\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft first told BleepingComputer that it was aware of the reported vulnerability and was investigating the validity and potential applicability of the claims. The company said it is committed to investigating security issues and updating impacted products to protect customers as soon as possible.\u003c/p\u003e\n\n\u003cp\u003eOne week after the public disclosure, Microsoft assigned the issue CVE-2026-50656. In its advisory, Microsoft said it was aware of an elevation of privilege vulnerability in the Microsoft Malware Protection Engine publicly referred to as RoguePlanet. Microsoft said it was working on a security update and would provide more information in the CVE when the update became available.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that Microsoft did not acknowledge Nightmare Eclipse as the person who found the vulnerability.\u003c/p\u003e\n\n\u003ch2 id=\"broader-disclosure-dispute\"\u003eBroader Disclosure Dispute\u003c/h2\u003e\n\n\u003cp\u003eThe RoguePlanet release is part of an ongoing dispute between Nightmare Eclipse and Microsoft over the company’s bug bounty and vulnerability disclosure practices. The article says that over the past several months, Nightmare Eclipse has publicly leaked multiple Windows zero-day exploits.\u003c/p\u003e\n\n\u003cp\u003eThe listed zero-days include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBlueHammer\u003c/li\u003e\n\u003cli\u003eRedSun\u003c/li\u003e\n\u003cli\u003eGreenPlasma\u003c/li\u003e\n\u003cli\u003eMiniPlasma\u003c/li\u003e\n\u003cli\u003eYellowKey\u003c/li\u003e\n\u003cli\u003eUnDefend\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSome of these zero-days affect Microsoft Defender, while others target BitLocker and other Windows components.\u003c/p\u003e\n\n\u003ch2 id=\"related-microsoft-actions\"\u003eRelated Microsoft Actions\u003c/h2\u003e\n\n\u003cp\u003eThe article says Microsoft reacted to Nightmare Eclipse’s disclosures by issuing warnings of legal action when people engage in “malicious activity causing real harm to our customers.” It also says cybersecurity experts and researchers believed Microsoft was threatening the researcher.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft fixed the GreenPlasma, MiniPlasma, and YellowKey flaws in the June 2026 Patch Tuesday updates. RoguePlanet remained awaiting a patch at the time described in the article.\u003c/p\u003e\n","keyPoints":["Microsoft confirmed it is working on a security patch for the Microsoft Defender zero-day vulnerability named RoguePlanet, which is now tracked as CVE-2026-50656.","The RoguePlanet exploit reportedly affects fully patched Windows 10 and Windows 11 devices and allows attackers to spawn command prompts with SYSTEM privileges through a Microsoft Defender race condition.","The researcher Nightmare Eclipse published a proof-of-concept exploit for RoguePlanet in a self-hosted Git repository and said the exploit can work regardless of whether real-time protection is enabled.","Microsoft said it is aware of an elevation of privilege issue in the Microsoft Malware Protection Engine publicly referred to as RoguePlanet and will update the CVE when a security update is available.","The RoguePlanet disclosure is part of an ongoing dispute between Nightmare Eclipse and Microsoft over bug bounty and vulnerability disclosure practices."],"insights":["The RoguePlanet proof-of-concept is unreliable across systems because it depends on a race condition, with the researcher reporting 100% success on some machines but difficulty on others.","Disabling or enabling Microsoft Defender real-time protection is not described as a reliable mitigation, because the researcher said the RoguePlanet PoC works regardless of that setting.","Microsoft assigned CVE-2026-50656 one week after public disclosure, but the article says no patch was available at the time of publication.","RoguePlanet is part of a broader pattern of public zero-day releases by the same researcher affecting Microsoft Defender, BitLocker, and other Windows components."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft confirmed that it is working on a security patch for a Microsoft Defender zero-day vulnerability named RoguePlanet. The flaw was disclosed one week before Microsoft assigned it CVE-2026-50656 and said it is working on a security update. Microsoft described the issue as an elevation of privilege vulnerability in the Microsoft Malware Protection Engine.\u003c/p\u003e\n\n\u003cp\u003eThe researcher Nightmare Eclipse said the RoguePlanet exploit affects fully patched Windows 10 and Windows 11 devices. According to the researcher, the exploit abuses a Microsoft Defender race condition to spawn command prompts with SYSTEM privileges. The researcher also said the proof-of-concept works regardless of whether real-time protection is enabled.\u003c/p\u003e\n\n\u003cp\u003eThe disclosure is part of an ongoing dispute between Nightmare Eclipse and Microsoft over bug bounty and vulnerability disclosure practices. The article says the researcher has publicly leaked multiple Windows zero-day exploits in recent months, including flaws affecting Microsoft Defender, BitLocker, and other Windows components. Microsoft fixed the GreenPlasma, MiniPlasma, and YellowKey flaws in the June 2026 Patch Tuesday updates.\u003c/p\u003e\n"},{"n":1,"title":"Kodak confirms data breach claimed by ShinyHunters extortion gang","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/kodak-confirms-data-breach-claimed-by-shinyhunters-extortion-gang/","time":"07:07","priority":"MAY READ","score":68,"tldr":"Kodak confirmed that an unauthorized third party temporarily accessed and copied a limited amount of company data, while the ShinyHunters extortion gang claims it stole over 2.2 million records containing customer PII and internal corporate data. Kodak says it is investigating with external cybersecurity experts and law enforcement and that its systems and operations are not currently threatened.","briefOverview":"\u003cp\u003eKodak confirmed it is investigating a security breach after hackers gained access to some company data. The company said an unauthorized third party temporarily accessed a limited amount of data and that external cybersecurity experts are helping determine what was accessed and copied. Kodak also said it is working with law enforcement and is confident there is no threat to its systems or operations.\u003c/p\u003e\n\n\u003cp\u003eThe ShinyHunters extortion group claimed responsibility for the breach on its dark web leak site. The group alleged it stole more than 2.2 million records containing customer personally identifiable information and internal corporate data. ShinyHunters threatened to leak the data on Thursday if Kodak did not contact the group by June 18, 2026.\u003c/p\u003e\n\n\u003cp\u003eKodak has not attributed the breach and has not disclosed how the attackers gained access. The article notes that ShinyHunters has recently claimed attacks against Salesforce customers, Snowflake customers, third-party integration providers, and organizations using Oracle PeopleSoft. One recent series of claimed breaches involved more than 100 organizations after data-theft attacks exploiting a zero-day flaw in Oracle PeopleSoft.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eKodak confirmed that it recently discovered a security breach involving temporary unauthorized access to a limited amount of company data. The company said it promptly engaged external cybersecurity experts to support an investigation into what data was accessed and copied. Kodak also said it is working with law enforcement and is confident there is no threat to its systems or operations.\u003c/p\u003e\n\n\u003cp\u003eKodak, founded in 1880 as the Eastman Kodak Company and headquartered in Rochester, New York, provides commercial print, advanced materials, and chemical products. The article states that Kodak has 79,000 worldwide patents. A company spokesperson told BleepingComputer that attackers accessed only a limited amount of data but did not answer a follow-up question about whether Kodak’s internal network was breached.\u003c/p\u003e\n\n\u003cp\u003eWhile Kodak has not attributed the incident, ShinyHunters claimed responsibility on its dark web leak site. The group alleged it stole more than 2.2 million records containing customer personally identifiable information and internal corporate data. ShinyHunters described the post as a final warning and threatened to leak the data on Thursday unless Kodak reached out by June 18, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe article says Kodak has not disclosed how the threat actors gained access to its systems. It notes that ShinyHunters has also claimed attacks against hundreds of Salesforce customers over the past year, saying it stole more than 1.5 billion records in Salesforce Aura and Salesloft Drift campaigns. The group was also linked to breaches at more than a dozen Snowflake customers and various <script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {

        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>

          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span className="swipe-clock" style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <select value={theme} onChange={(e) => applyTheme(e.target.value)} title="Select theme" aria-label="Select theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
