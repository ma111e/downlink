forensic investigation into the incident. The stated purpose of the investigation is to verify the exact scope of the data accessed. The university said it would provide further updates as its investigation confirms details.\u003c/p\u003e\n\n\u003cp\u003eAt the time described in the article, the university had not yet confirmed the exact scope of the accessed data. It had, however, publicly confirmed that data had been accessed by an external third party and had contacted affected students and alumni directly.\u003c/p\u003e\n\n\u003ch2 id=\"key-impact-described-in-the-article\"\u003eKey impact described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe incident involves a large university population and potentially sensitive personal, academic, and financial information. The article identifies both current and former students as affected groups. It also indicates that affected students and alumni may include people associated with campuses in England, Malaysia, and China.\u003c/p\u003e\n\n\u003cp\u003eThe most specific external assessment cited in the article is HaveIBeenPwned’s analysis of partially published data. That analysis identified about 455,000 unique email addresses and multiple categories of personal and academic information.\u003c/p\u003e\n","keyPoints":["The University of Nottingham confirmed a cyber incident in which a significant amount of data affecting current and former students was accessed by an external third party.","The university said it is still determining what data was accessed and has directly contacted affected students and alumni, potentially including those in Nottingham, Malaysia, and China.","The ShinyHunters cybercrime group claimed on its extortion site that it obtained over 40GB of material, including credit card and payment details.","HaveIBeenPwned analysis of partially published data found about 455,000 unique email addresses along with personal information such as names, addresses, phone numbers, ethnicities, disabilities, passport numbers, academic enrolment information, and fee payment information.","The university said it is working with a third party on a forensic investigation to verify the exact scope of the data accessed."],"insights":["HaveIBeenPwned’s analysis of the partially published data provides an independent indicator that the incident involves large-scale exposure of sensitive personal information, even though the university has not yet verified the exact scope.","The university is treating multiple sensitive categories as potentially accessed on a precautionary basis, including national insurance numbers, protected characteristics, financial information, and student or staff IDs, which suggests affected individuals may need to monitor more than just email account misuse.","ShinyHunters’ claim of obtaining credit card and payment details should be treated cautiously because the article notes the group has previously misrepresented access by using historical datasets or public-domain information.","The incident may extend beyond the university’s Nottingham campus because the university said affected students and alumni could include people from its Malaysia and China campuses."],"referencedReports":[{"title":"University of Nottingham","url":"https://haveibeenpwned.com/Breach/UniversityOfNottingham","publisher":"Have I Been Pwned","context":"The article cites Have I Been Pwned’s analysis of partially published data from the claimed breach, including the number of unique email addresses and types of personal information exposed.","category":"","primary":false}],"body":"\u003cp\u003eThe University of Nottingham in England confirmed a cyber incident in which a “significant amount” of data affecting current and former students was accessed by an external third party. The university said it is still working to determine what data was accessed and has already directly contacted affected students and alumni. Potentially affected individuals may include those connected to its campuses in Nottingham, Malaysia, and China.\u003c/p\u003e\n\n\u003cp\u003eThe ShinyHunters cybercrime group claimed responsibility on its extortion site and said it obtained “over 40GB” of material, including credit card and payment details. HaveIBeenPwned analyzed partially published data and said it includes around 455,000 unique email addresses, along with extensive personal information. The university is working with a third party on a forensic investigation to verify the exact scope of the accessed data.\u003c/p\u003e\n"},{"n":11,"title":"CISA tells govt agencies to patch critical exploited flaws in 3 days","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-tells-govt-agencies-to-patch-critical-exploited-flaws-in-3-days/","time":"12:46","priority":"SHOULD READ","score":82,"tldr":"CISA’s new Binding Operational Directive 26-04 requires U.S. federal civilian agencies to patch the highest-risk exploited vulnerabilities on accelerated timelines, as quickly as three days. Agencies must update vulnerability management processes, asset inventories, and reporting to prioritize remediation based on public exposure, KEV status, automation potential, and system control impact.","briefOverview":"\u003cp\u003eCISA announced Binding Operational Directive 26-04, a new directive that prioritizes security updates for Federal Civilian Executive Branch agencies. The directive is intended to reduce cyberattack risk against the public sector by requiring agencies to remediate high-risk vulnerabilities on accelerated timelines. In the most urgent cases, agencies may have as little as three days to address the issue.\u003c/p\u003e\n\n\u003cp\u003eThe directive bases patching priority on whether an asset is publicly exposed online, whether the vulnerability appears in CISA’s Known Exploited Vulnerabilities catalog, whether exploitation can be automated at scale, and whether exploitation gives attackers partial or total control of a system. Less urgent situations, including cases where automated exploitation is not possible or only partial control is possible, have a two-week remediation timeframe. BOD 26-04 supersedes and revokes BOD 19-02 and BOD 22-01.\u003c/p\u003e\n\n\u003cp\u003eBOD 26-04 applies to U.S. Federal Civilian Executive Branch agencies and the information systems they operate, including on-premise federal systems, third-party hosted systems, and FedRAMP and non-FedRAMP cloud environments. It does not apply to certain military systems operated by the U.S. Department of War, private companies, Intelligence Community systems, or contractors. Agencies must update vulnerability management policies, asset inventories, and KEV status reporting, with 60-day and 180-day implementation requirements described in the directive.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA announced Binding Operational Directive 26-04, which establishes accelerated remediation timelines for high-risk vulnerabilities in Federal Civilian Executive Branch agencies. The directive is designed to reduce the threat of cyberattacks targeting the public sector. In some cases, agencies must remediate vulnerabilities within as little as three days.\u003c/p\u003e\n\n\u003cp\u003eThe new directive supersedes and revokes BOD 19-02 and BOD 22-01, which were introduced in 2019 and 2021. CISA says patching priority will be based on four considerations: whether the asset is publicly exposed online, whether the vulnerability is listed in the Known Exploited Vulnerabilities catalog, whether exploitation can be automated for large-scale attacks, and whether exploitation provides partial or total control of a system. These factors determine how quickly agencies must act.\u003c/p\u003e\n\n\u003cp\u003eThe shortest remediation period under the directive is three days. For less urgent situations, such as cases where automated exploitation is not possible or exploitation only provides partial control, the timeframe is two weeks. The article does not name specific threat actors tied to the directive, but frames the directive as a response to the risk of cyberattacks against the public sector.\u003c/p\u003e\n\n\u003cp\u003eThe directive applies specifically to U.S. Federal Civilian Executive Branch agencies and the information systems they operate. It covers all on-premise federal systems, third-party hosted systems, and FedRAMP and non-FedRAMP cloud environments. It does not apply to certain military systems operated by the U.S. Department of War, private companies, Intelligence Community systems, or contractors.\u003c/p\u003e\n\n\u003cp\u003eAgencies covered by BOD 26-04 must update their vulnerability management policies, update asset inventories, and automate KEV status reporting. Within 60 days, vulnerability management processes must be updated to use CVE and KEV data as the basis for remediation decisions. Within 180 days, agencies must follow the new remediation timelines and continuously monitor and report detailed asset metadata.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA announced Binding Operational Directive 26-04, a new directive that prioritizes security updates for U.S. Federal Civilian Executive Branch agencies. The directive requires agencies to remediate high-risk vulnerabilities within accelerated timeframes, with the shortest deadline being as little as three days.\u003c/p\u003e\n\n\u003cp\u003eThe stated goal is to reduce the threat of cyberattacks targeting the public sector. CISA says BOD 26-04 supersedes and revokes BOD 19-02 and BOD 22-01, which were introduced in 2019 and 2021.\u003c/p\u003e\n\n\u003ch2 id=\"remediation-prioritization-criteria\"\u003eRemediation Prioritization Criteria\u003c/h2\u003e\n\n\u003cp\u003eCISA’s directive prioritizes patching based on four considerations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhether the affected asset is publicly exposed online.\u003c/li\u003e\n\u003cli\u003eWhether the vulnerability is present in CISA’s Known Exploited Vulnerabilities catalog.\u003c/li\u003e\n\u003cli\u003eWhether exploitation can be automated for large-scale attacks.\u003c/li\u003e\n\u003cli\u003eWhether exploitation gives attackers partial or total control of a system.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese factors determine how quickly agencies must address a vulnerability. The article states that the shortest remediation period is three days.\u003c/p\u003e\n\n\u003ch2 id=\"remediation-timelines\"\u003eRemediation Timelines\u003c/h2\u003e\n\n\u003cp\u003eBOD 26-04 introduces accelerated timeframes for remediating high-risk vulnerabilities. In the most urgent cases, agencies may have as little as three days to remediate a vulnerability.\u003c/p\u003e\n\n\u003cp\u003eFor less urgent situations, the directive sets a two-week timeframe. The article describes these less urgent cases as situations where automated exploitation is not possible or where exploitation only provides partial control.\u003c/p\u003e\n\n\u003ch2 id=\"scope-of-the-directive\"\u003eScope of the Directive\u003c/h2\u003e\n\n\u003cp\u003eThe directive applies specifically to U.S. Federal Civilian Executive Branch agencies and the information systems they operate. This includes government agencies and departments covered by the directive.\u003c/p\u003e\n\n\u003cp\u003eThe directive applies to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn-premise federal systems.\u003c/li\u003e\n\u003cli\u003eThird-party hosted systems.\u003c/li\u003e\n\u003cli\u003eFedRAMP cloud environments.\u003c/li\u003e\n\u003cli\u003eNon-FedRAMP cloud environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the directive does not apply to certain military systems operated by the U.S. Department of War, private companies, Intelligence Community systems, and contractors.\u003c/p\u003e\n\n\u003ch2 id=\"required-agency-actions\"\u003eRequired Agency Actions\u003c/h2\u003e\n\n\u003cp\u003eAgencies bound by BOD 26-04 are expected to update their vulnerability management policies. They must also update asset inventories and automate KEV status reporting.\u003c/p\u003e\n\n\u003cp\u003eThe directive includes specific implementation milestones. Within 60 days, agencies must update vulnerability management processes to use CVE and KEV data as the basis for remediation decisions.\u003c/p\u003e\n\n\u003cp\u003eWithin 180 days, all covered agencies must follow the new remediation timelines. They must also continuously monitor and report detailed asset metadata.\u003c/p\u003e\n\n\u003ch2 id=\"broader-significance\"\u003eBroader Significance\u003c/h2\u003e\n\n\u003cp\u003eAlthough BOD 26-04 applies specifically to Federal Civilian Executive Branch agencies, the article says that, like previous directives, the framework is expected to influence the broader cybersecurity industry. It is also expected to provide a broader patching priority signal.\u003c/p\u003e\n\n\u003cp\u003eThe directive emphasizes vulnerability remediation urgency based on exposure, known exploitation, automation potential, and attacker control. Its requirements place particular operational importance on asset inventory accuracy, KEV status reporting, and CVE- and KEV-based remediation workflows.\u003c/p\u003e\n","keyPoints":["CISA announced Binding Operational Directive 26-04, which requires Federal Civilian Executive Branch agencies to remediate high-risk vulnerabilities within accelerated timeframes, in some cases as little as three days.","The directive prioritizes patching based on whether an asset is publicly exposed, whether the vulnerability is in CISA’s Known Exploited Vulnerabilities catalog, whether exploitation can be automated, and whether exploitation gives attackers partial or total control of a system.","For less urgent cases where automated exploitation is not possible or exploitation only provides partial control, agencies have two weeks to remediate vulnerabilities.","BOD 26-04 applies to on-premise federal systems, third-party hosted systems, and FedRAMP and non-FedRAMP cloud environments operated by Federal Civilian Executive Branch agencies.","Agencies must update vulnerability management processes within 60 days to use CVE and KEV data for remediation decisions, and within 180 days they must follow the new timelines and continuously monitor and report detailed asset metadata."],"insights":["The shortest three-day remediation deadline is driven by a combination of risk factors, making internet exposure, KEV listing, automation potential, and attacker control level operationally critical fields in agency asset and vulnerability inventories.","The directive broadens implementation beyond traditional on-premise systems by explicitly covering third-party hosted systems and both FedRAMP and non-FedRAMP cloud environments.","Agencies have a near-term 60-day requirement to make CVE and KEV data central to remediation decisions before the full 180-day deadline for adopting the new timelines and detailed asset metadata reporting.","Although the directive applies only to Federal Civilian Executive Branch agencies, CISA expects it to influence the broader cybersecurity industry as a patching priority signal."],"referencedReports":[],"body":"\u003cp\u003eCISA announced Binding Operational Directive 26-04, a new directive that prioritizes security updates for Federal Civilian Executive Branch agencies. The directive is intended to reduce cyberattack risk against the public sector by requiring agencies to remediate high-risk vulnerabilities on accelerated timelines. In the most urgent cases, agencies may have as little as three days to address the issue.\u003c/p\u003e\n\n\u003cp\u003eThe directive bases patching priority on whether an asset is publicly exposed online, whether the vulnerability appears in CISA’s Known Exploited Vulnerabilities catalog, whether exploitation can be automated at scale, and whether exploitation gives attackers partial or total control of a system. Less urgent situations, including cases where automated exploitation is not possible or only partial control is possible, have a two-week remediation timeframe. BOD 26-04 supersedes and revokes BOD 19-02 and BOD 22-01.\u003c/p\u003e\n\n\u003cp\u003eBOD 26-04 applies to U.S. Federal Civilian Executive Branch agencies and the information systems they operate, including on-premise federal systems, third-party hosted systems, and FedRAMP and non-FedRAMP cloud environments. It does not apply to certain military systems operated by the U.S. Department of War, private companies, Intelligence Community systems, or contractors. Agencies must update vulnerability management policies, asset inventories, and KEV status reporting, with 60-day and 180-day implementation requirements described in the directive.\u003c/p\u003e\n"},{"n":13,"title":"Authorities dismantle 'AudiA6' ransomware crypto-laundering service","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/legal/authorities-dismantle-audia6-ransomware-crypto-laundering-service/","time":"15:55","priority":"SHOULD READ","score":82,"tldr":"Authorities dismantled AudiA6, a cryptocurrency laundering service allegedly used by ransomware gangs and other cybercriminals to wash more than $380 million. Two alleged administrators were arrested in Georgia, with domains, assets, crypto, and Telegram accounts seized or frozen.","briefOverview":"\u003cp\u003eLaw enforcement has dismantled AudiA6, a cryptocurrency service allegedly used by ransomware actors and other cybercriminals to launder more than $380 million. Europol said the service was linked to more than 15 international investigations involving ransomware attacks and large-scale cryptocurrency theft. The platform is believed to have operated as a central money laundering hub between 2022 and 2025.\u003c/p\u003e\n\n\u003cp\u003eEuropol described AudiA6 as an industrial-scale cryptocurrency laundering operation built around thousands of fraudulent exchange accounts opened with stolen or purchased identities. The service was marketed as a professional cryptocurrency mixing service, but allegedly moved cybercrime proceeds through complex transaction routes and returned “cleaned” funds in about an hour for a 3% to 10% commission. Authorities said the operation involved money mule accounts and Russian-speaking intermediaries recruited for that purpose.\u003c/p\u003e\n\n\u003cp\u003eThe action resulted in two arrests in Georgia, searches of three properties, the seizure of 25 domains, 80 vehicles and properties, and cryptocurrency seizures and freezes. The U.S. Department of Justice named Ruslan Igorevich Tkachuk and Alexander Vladimirovich Ledenev as senior members of AudiA6. Authorities also blocked Telegram accounts used by the network and retrieved 6,000 Know-Your-Customer records linked to money mule accounts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAuthorities have dismantled AudiA6, a cryptocurrency service allegedly used by ransomware actors and other cybercriminals to launder more than $380 million. Europol said the service was connected to more than 15 international investigations involving ransomware attacks and large-scale cryptocurrency theft. Investigators believe AudiA6 acted as a central money laundering hub between 2022 and 2025.\u003c/p\u003e\n\n\u003cp\u003eEuropol described the operation as industrial-scale and said it was built around thousands of fraudulent cryptocurrency exchange accounts. These accounts were allegedly opened using stolen or purchased identities. The service was marketed as a professional cryptocurrency mixing service, but investigators said it accepted cybercrime proceeds, moved them through complex transaction routes to obscure their origin, and returned “cleaned” funds in about an hour after charging a 3% to 10% commission.\u003c/p\u003e\n\n\u003cp\u003eThe investigation involved authorities from 11 countries across Europe, America, and Asia, supported by Europol and Eurojust. Europol said the action was made possible by the September 2025 arrest in Poland of a Ukrainian national linked to AudiA6. Forensic examination of that suspect’s devices helped investigators identify key individuals behind the operation and eventually locate and arrest them in Georgia.\u003c/p\u003e\n\n\u003cp\u003eAuthorities arrested two individuals in Georgia, searched three properties, seized 25 domains, seized 80 vehicles and properties, seized €86,000 in cryptocurrency, froze €692,000 in cryptocurrency, and blocked Telegram accounts used by the network. The two arrested individuals, a Ukrainian and a Russian national, are believed to be administrators of AudiA6 and the underground forum Dark2Web. Both AudiA6 and Dark2Web websites now display a seizure notice.\u003c/p\u003e\n\n\u003cp\u003eThe U.S. Department of Justice named Ruslan Igorevich Tkachuk, 37, and Alexander Vladimirovich Ledenev, 25, as senior members of the AudiA6 platform. The two are in the custody of Georgian authorities and face sentences of up to 20 years in prison for facilitating cybercrime laundering operations. Authorities also retrieved 6,000 Know-Your-Customer records linked to money mule accounts, which Europol said were created using stolen or purchased identities and were often connected to Russian-speaking intermediaries.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eLaw enforcement has dismantled AudiA6, a cryptocurrency service allegedly used by ransomware actors and other cybercriminals to launder more than $380 million. Europol said the service was linked to more than 15 international investigations involving ransomware attacks and large-scale cryptocurrency theft.\u003c/p\u003e\n\n\u003cp\u003eInvestigators believe AudiA6 acted as a central money laundering hub between 2022 and 2025. The platform was marketed as a “professional cryptocurrency mixing service,” but authorities said it handled cybercrime proceeds and moved funds through complex transaction routes intended to obscure their origin.\u003c/p\u003e\n\n\u003ch2 id=\"alleged-laundering-model\"\u003eAlleged laundering model\u003c/h2\u003e\n\n\u003cp\u003eEuropol described AudiA6 as an “industrial-scale cryptocurrency laundering operation” built around thousands of fraudulent exchange accounts. According to the article, these accounts were opened using stolen or purchased identities.\u003c/p\u003e\n\n\u003cp\u003eThe service allegedly accepted proceeds from cybercrime, moved the money through complex transaction routes, and returned the funds “cleaned” to holders in about an hour. AudiA6 reportedly charged a 3% to 10% commission for this laundering service.\u003c/p\u003e\n\n\u003cp\u003eThe article also says past reports from Intel471 and blockchain investigator ZachXBT had exposed AudiA6 for facilitating illegal activity.\u003c/p\u003e\n\n\u003ch2 id=\"international-investigation-and-arrests\"\u003eInternational investigation and arrests\u003c/h2\u003e\n\n\u003cp\u003eThe investigation involved authorities from 11 countries across Europe, America, and Asia, with support from Europol and Eurojust. Europol said the action was possible because of the September 2025 arrest in Poland of a Ukrainian national linked to AudiA6.\u003c/p\u003e\n\n\u003cp\u003eForensic examination of that suspect’s devices helped investigators identify key individuals behind the operation. Investigators then located and arrested them in Georgia.\u003c/p\u003e\n\n\u003cp\u003eTwo individuals were arrested in Georgia. The article says the two arrested individuals, a Ukrainian and a Russian national, are believed to be administrators of AudiA6 and of the underground forum Dark2Web, which cybercriminals used to advertise illicit services.\u003c/p\u003e\n\n\u003ch2 id=\"enforcement-results\"\u003eEnforcement results\u003c/h2\u003e\n\n\u003cp\u003eAs a result of the action, authorities reported the following outcomes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e2 individuals arrested in Georgia.\u003c/li\u003e\n\u003cli\u003e3 properties searched.\u003c/li\u003e\n\u003cli\u003e25 domains seized.\u003c/li\u003e\n\u003cli\u003e80 vehicles and properties seized.\u003c/li\u003e\n\u003cli\u003e€86,000, or about $99,000, in cryptocurrency seized.\u003c/li\u003e\n\u003cli\u003e€692,000, or about $798,000, in cryptocurrency frozen.\u003c/li\u003e\n\u003cli\u003eTelegram accounts used by the network blocked.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBoth the AudiA6 and Dark2Web websites now display a seizure notice to visitors.\u003c/p\u003e\n\n\u003ch2 id=\"named-individuals-and-legal-exposure\"\u003eNamed individuals and legal exposure\u003c/h2\u003e\n\n\u003cp\u003eThe U.S. Department of Justice named Ruslan Igorevich Tkachuk, age 37, and Alexander Vladimirovich Ledenev, age 25, as senior members of the AudiA6 platform. The two individuals are currently in the custody of Georgian authorities.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, they face sentences of up to 20 years in prison for facilitating cybercrime laundering operations.\u003c/p\u003e\n\n\u003cp\u003eThe Department of Justice said that out of approximately 10,333 bitcoin deposited, approximately 393.39 BTC were received directly from known darknet markets, ransomware organizations, cybercrime services, and other illicit sources. The DOJ valued those direct illicit deposits at around $19,234,331 at the time of the transactions, and said additional funds were deposited indirectly from illicit sources into AudiA6 wallets.\u003c/p\u003e\n\n\u003ch2 id=\"money-mule-and-kyc-infrastructure\"\u003eMoney mule and KYC infrastructure\u003c/h2\u003e\n\n\u003cp\u003eAuthorities also retrieved 6,000 Know-Your-Customer records linked to money mule accounts. Europol said these accounts were created using stolen or purchased identities.\u003c/p\u003e\n\n\u003cp\u003eThe article states that many of the accounts were connected to Russian-speaking intermediaries who recruited them specifically for this purpose. Europol also said the money mule network used multiple domains to register accounts on cryptocurrency exchanges.\u003c/p\u003e\n\n\u003cp\u003eEuropol published information about those domains to raise awareness and help cryptocurrency platforms block them.\u003c/p\u003e\n","keyPoints":["Law enforcement dismantled the AudiA6 cryptocurrency service, which Europol says was used by ransomware actors and other cybercriminals to launder more than $380 million.","Europol said AudiA6 was linked to more than 15 international investigations involving ransomware attacks and large-scale cryptocurrency theft.","Authorities arrested two individuals in Georgia, seized 25 domains, seized 80 vehicles and properties, seized €86,000 in cryptocurrency, froze €692,000 in cryptocurrency, and blocked Telegram accounts used by the network.","The U.S. Department of Justice named Ruslan Igorevich Tkachuk and Alexander Vladimirovich Ledenev as senior members of the AudiA6 platform.","Authorities also retrieved 6,000 Know-Your-Customer records linked to money mule accounts allegedly created using stolen or purchased identities."],"insights":["The takedown was enabled by forensic examination of devices from a Ukrainian national arrested in Poland in September 2025, showing that one suspect’s seized devices exposed the broader AudiA6 operation and led investigators to alleged administrators in Georgia.","AudiA6 relied on thousands of fraudulent exchange accounts created with stolen or purchased identities, making KYC abuse and money mule recruitment central to the laundering operation rather than incidental activity.","Europol published domains used by the money mule network specifically to help cryptocurrency platforms identify and block related exchange registrations.","The service reportedly returned “cleaned” cryptocurrency in about an hour while charging a 3% to 10% commission, indicating a fast, fee-based laundering pipeline designed for operational use by cybercriminals."],"referencedReports":[],"body":"\u003cp\u003eLaw enforcement has dismantled AudiA6, a cryptocurrency service allegedly used by ransomware actors and other cybercriminals to launder more than $380 million. Europol said the service was linked to more than 15 international investigations involving ransomware attacks and large-scale cryptocurrency theft. The platform is believed to have operated as a central money laundering hub between 2022 and 2025.\u003c/p\u003e\n\n\u003cp\u003eEuropol described AudiA6 as an industrial-scale cryptocurrency laundering operation built around thousands of fraudulent exchange accounts opened with stolen or purchased identities. The service was marketed as a professional cryptocurrency mixing service, but allegedly moved cybercrime proceeds through complex transaction routes and returned “cleaned” funds in about an hour for a 3% to 10% commission. Authorities said the operation involved money mule accounts and Russian-speaking intermediaries recruited for that purpose.\u003c/p\u003e\n\n\u003cp\u003eThe action resulted in two arrests in Georgia, searches of three properties, the seizure of 25 domains, 80 vehicles and properties, and cryptocurrency seizures and freezes. The U.S. Department of Justice named Ruslan Igorevich Tkachuk and Alexander Vladimirovich Ledenev as senior members of AudiA6. Authorities also blocked Telegram accounts used by the network and retrieved 6,000 Know-Your-Customer records linked to money mule accounts.\u003c/p\u003e\n"},{"n":19,"title":"npm v12 delivers one of the biggest security improvements in years","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/npm-v12-block-postinstall","time":"15:16","priority":"SHOULD READ","score":82,"tldr":"npm v12 will stop running dependency install scripts by default, blocking a major supply-chain attack path used by recent npm worms and credential stealers. Developers should start testing npm 11.16.0 warnings and approve only trusted packages before the default changes in July 2026.","briefOverview":"\u003cp\u003enpm v12, scheduled to land in July 2026, will stop running dependency install scripts by default. The article calls this one of the most useful security changes npm could make because recent supply chain attacks have heavily abused install-time execution. Packages will only be allowed to run install scripts if they are added to a committed allowlist.\u003c/p\u003e\n\n\u003cp\u003eToday, npm automatically runs preinstall, install, and postinstall lifecycle scripts from any package in the dependency tree during npm install. The article says this means malicious code can execute before a developer imports a package or runs their own code. npm v12 will also restrict Git dependencies and remote-URL dependencies unless users explicitly pass \u0026ndash;allow-git or \u0026ndash;allow-remote.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights attacks including Nx s1ngularity, Shai-Hulud, the axios hijack, and Mini Shai-Hulud as examples of malware or credential theft that ran during installation. It also notes that implicit node-gyp rebuilds triggered by binding.gyp will be treated like declared scripts and blocked unless approved. Developers are advised to test the changes now in npm 11.16.0 or later and use npm approve-scripts to identify trusted packages.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003enpm v12, scheduled for July 2026, will stop running dependency install scripts by default. The article describes this as a major security improvement because the npm community has faced a sustained wave of supply chain attacks that abused postinstall and related scripts. Under the new model, scripts will only run for packages that developers explicitly place on an allowlist.\u003c/p\u003e\n\n\u003cp\u003eThe current npm behavior runs preinstall, install, and postinstall scripts automatically for packages anywhere in the dependency tree. The article emphasizes that this code executes as soon as npm install runs, before the package is imported or the user’s own code executes. In npm v12, developers will build the allowlist with npm approve-scripts, block packages with npm deny-scripts, and commit the configuration alongside the project.\u003c/p\u003e\n\n\u003cp\u003eThe release also changes how Git and remote-URL dependencies resolve. Git dependencies will no longer resolve unless \u0026ndash;allow-git is passed, addressing a path where a Git dependency’s npmrc could override the Git executable and run code even with \u0026ndash;ignore-scripts set. Remote-URL dependencies such as HTTPS tarballs will also require \u0026ndash;allow-remote, limiting a path where an attacker could point a dependency at an external URL they control and swap the payload.\u003c/p\u003e\n\n\u003cp\u003eThe allowlist also covers implicit install-time execution from native builds. The article explains that packages containing binding.gyp can trigger npm to run an implicit node-gyp rebuild, even if the package.json has no scripts field. npm v12 will treat that build behavior like a declared script and block it unless the package is approved.\u003c/p\u003e\n\n\u003cp\u003eThe article lists multiple recent attacks that used install-time execution, including Nx s1ngularity, Shai-Hulud, the axios hijack, Mini Shai-Hulud, and a recent attack on a Red Hat package. It says attackers typically compromise a trusted package, publish a new version with an install hook, and use that hook to fingerprint machines, download payloads, and steal credentials or other secrets. The recommended response is to upgrade to npm 11.16.0 or later, review warnings, run npm approve-scripts \u0026ndash;allow-scripts-pending, and approve only trusted packages before v12 changes the default.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003enpm v12, scheduled to land in July 2026, will stop running dependency install scripts by default. The article describes this as one of npm’s most important security improvements in years because install scripts have been a major supply chain attack vector. It says recent attacks such as Nx s1ngularity and Shai-Hulud exploited postinstall scripts to run malicious code during installation.\u003c/p\u003e\n\n\u003cp\u003eThe central change is that dependency install scripts will no longer execute automatically for every package in a project’s dependency tree. Instead, scripts will only run for packages explicitly added to an allowlist. The article says this allowlist can be built with npm approve-scripts, undesired scripts can be blocked with npm deny-scripts, and the resulting configuration should be committed with the rest of the project.\u003c/p\u003e\n\n\u003ch2 id=\"current-npm-behavior\"\u003eCurrent npm behavior\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that when npm install runs today, any package anywhere in the dependency tree can define lifecycle scripts called preinstall, install, or postinstall. npm runs those scripts automatically. This means code can execute immediately during installation, before the user imports the package or runs their own code.\u003c/p\u003e\n\n\u003cp\u003eThis behavior has been heavily abused in recent supply chain attacks. The article says many recent worms and credential stealers ran at install time rather than runtime. As a result, users did not have to import or use a compromised package to be affected; they only had to run npm install while the package was infected.\u003c/p\u003e\n\n\u003ch2 id=\"npm-v12-script-allowlisting\"\u003enpm v12 script allowlisting\u003c/h2\u003e\n\n\u003cp\u003enpm v12 changes the default so install scripts only run for packages on an allowlist. If a malicious package is not on the committed allowlist, the article says the install would stop at that package and the malicious content would remain inert files in node_modules. The attacker could still publish a poisoned version, but npm v12’s default behavior would prevent automatic execution unless the package had been approved.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends that developers test the upcoming behavior before v12 arrives. npm 11.16.0 already includes the changes behind warnings, allowing teams to see what would break. Developers are advised to run npm approve-scripts \u0026ndash;allow-scripts-pending to see which packages would be blocked and to approve legitimate packages that need install scripts for native builds or setup.\u003c/p\u003e\n\n\u003ch2 id=\"git-and-remote-url-dependency-changes\"\u003eGit and remote-URL dependency changes\u003c/h2\u003e\n\n\u003cp\u003enpm v12 also restricts Git dependencies. According to the article, Git dependencies will no longer resolve unless the user passes \u0026ndash;allow-git. This closes a quieter execution path where a Git dependency’s npmrc could override the Git executable and run code even when \u0026ndash;ignore-scripts was set.\u003c/p\u003e\n\n\u003cp\u003eRemote-URL dependencies are also affected. Dependencies such as HTTPS tarballs will no longer resolve unless the user passes \u0026ndash;allow-remote. The article says this closes a path where an attacker could point a dependency at an external URL under their control and swap the payload at any time.\u003c/p\u003e\n\n\u003ch2 id=\"implicit-node-gyp-rebuilds-and-binding-gyp\"\u003eImplicit node-gyp rebuilds and binding.gyp\u003c/h2\u003e\n\n\u003cp\u003eThe allowlist will also cover code execution that does not appear in the scripts field. The article explains that when a package ships a binding.gyp file, npm runs an implicit node-gyp rebuild during installation. This means a dependency with a package.json that appears to contain no scripts can still execute code just by including that build file.\u003c/p\u003e\n\n\u003cp\u003enpm v12 will treat that implicit build behavior like a declared script. The build will be blocked unless the package is on the allowlist. The article references prior research by the author’s research team into the unusual and dangerous nature of this potential attack path.\u003c/p\u003e\n\n\u003ch2 id=\"recent-attacks-cited-by-the-article\"\u003eRecent attacks cited by the article\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a broader wave of postinstall script attacks that started the previous fall and had not stopped. It specifically mentions a recent attack on a Red Hat package and lists several larger incidents:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNx s1ngularity, in August 2025, involved a stolen publish token used to push malicious Nx versions whose postinstall script, telemetry.js, ran during installation. The article says it scraped GitHub tokens, npm credentials, SSH keys, and crypto wallets, then uploaded them to public GitHub repositories. It harvested roughly 2,300 credentials, which the article says seeded future attacks.\u003c/li\u003e\n\u003cli\u003eShai-Hulud, in November 2025, was described as a self-replicating worm that hit close to 500 packages across Zapier, ENS, PostHog, Postman, and AsyncAPI. It installed the Bun runtime during setup, ran TruffleHog to scrape secrets, and dumped them into public GitHub repositories.\u003c/li\u003e\n\u003cli\u003eThe axios hijack, in March 2026, involved a hijacked maintainer account that shipped a dependency designed to run a postinstall hook and drop a cross-platform RAT. The article notes that axios has about 100 million downloads per week.\u003c/li\u003e\n\u003cli\u003eMini Shai-Hulud, in May 2026, was a spinoff worm that planted a preinstall hook, pulled the Bun runtime, and ran a credential stealer. It moved through more than a hundred packages across TanStack, UiPath, and Mistral AI and was described as the first npm worm to publish malware carrying valid build provenance.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"typical-postinstall-attack-pattern\"\u003eTypical postinstall attack pattern\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a common pattern behind these incidents. Attackers first take over a trusted package, usually by phishing a maintainer’s npm account or stealing a publish token. They then publish a new version with a postinstall script added to package.json, often leaving the real source code untouched so the change is less obvious.\u003c/p\u003e\n\n\u003cp\u003eWhen a user runs npm install, npm executes the malicious script automatically as that user. The script fingerprints the machine, downloads a real payload from an attacker-controlled server, runs it, and deletes itself. The payload then scans for tokens, SSH keys, and other valuable data and exfiltrates them.\u003c/p\u003e\n\n\u003ch2 id=\"broader-ecosystem-context\"\u003eBroader ecosystem context\u003c/h2\u003e\n\n\u003cp\u003eThe article says this issue is not limited to npm, although npm is described as the biggest target. It gives PHP’s Composer ecosystem as another example, citing more than 200 Laravel-Lang versions that were rewritten in May to automatically run a credential stealer through the autoloader. The article also notes that Composer now has native malware filtering powered by Aikido to protect downstream users.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions\"\u003eRecommended actions\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends upgrading to npm 11.16.0 or later because the three major changes are already present behind warnings. It also notes that \u0026ndash;allow-git is available in npm 11.15.0 and later, and \u0026ndash;allow-remote has been available since npm 11.15.0, so teams can begin locking down those dependency types before npm v12.\u003c/p\u003e\n\n\u003cp\u003eFor install scripts, the article recommends running npm approve-scripts \u0026ndash;allow-scripts-pending to see what would be blocked. Developers should approve packages they trust and commit the updated package.json. The article warns that many legitimate packages use install scripts for native builds and setup, so teams need to review what will require approval before the default behavior changes.\u003c/p\u003e\n\n\u003cp\u003eThe article also mentions Safe Chain by Aikido, described as a free secure wrapper for npm, npx, and yarn that checks packages for malware before installation. It says Safe Chain can block accidental malware installation and enforce a waiting period on new package versions.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that npm v12 will make install-time code execution opt-in rather than automatic. This directly addresses a major technique used in recent npm supply chain attacks, including worms and credential stealers that relied on preinstall or postinstall hooks. The article argues that safer defaults are important because most users do not read changelogs and that npm’s default change is overdue but welcome.\u003c/p\u003e\n","keyPoints":["npm v12, scheduled for July 2026, will stop running dependency install scripts by default unless packages are added to an allowlist.","The change blocks automatic execution of preinstall, install, postinstall, and implicit node-gyp rebuild behavior from unapproved dependencies during npm install.","npm v12 will also require explicit flags for Git dependencies and remote-URL dependencies through --allow-git and --allow-remote.","The article says recent supply chain attacks such as Nx s1ngularity, Shai-Hulud, the axios hijack, and Mini Shai-Hulud abused install-time scripts to steal credentials or run malware.","The article recommends upgrading to npm 11.16.0 or later and using npm approve-scripts to identify and approve legitimate packages before npm v12 changes the default behavior."],"insights":["A package can execute code during installation even without a scripts field because npm implicitly runs node-gyp rebuild when binding.gyp is present, and npm v12 will block this unless the package is allowlisted.","Git dependencies had a separate execution path where a dependency’s npmrc could override the Git executable and run code even when --ignore-scripts was set, which npm v12 addresses by requiring --allow-git.","Remote-URL dependencies are being restricted because an attacker could point a dependency to an external URL they control and swap the payload at any time.","The article emphasizes that victims of recent npm supply chain attacks did not need to import or use a compromised package; running npm install while the package was infected was enough.","Developers can test the upcoming npm v12 behavior now because npm 11.16.0 already includes the changes behind warnings."],"referencedReports":[],"body":"\u003cp\u003enpm v12, scheduled to land in July 2026, will stop running dependency install scripts by default. The article calls this one of the most useful security changes npm could make because recent supply chain attacks have heavily abused install-time execution. Packages will only be allowed to run install scripts if they are added to a committed allowlist.\u003c/p\u003e\n\n\u003cp\u003eToday, npm automatically runs preinstall, install, and postinstall lifecycle scripts from any package in the dependency tree during npm install. The article says this means malicious code can execute before a developer imports a package or runs their own code. npm v12 will also restrict Git dependencies and remote-URL dependencies unless users explicitly pass \u0026ndash;allow-git or \u0026ndash;allow-remote.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights attacks including Nx s1ngularity, Shai-Hulud, the axios hijack, and Mini Shai-Hulud as examples of malware or credential theft that ran during installation. It also notes that implicit node-gyp rebuilds triggered by binding.gyp will be treated like declared scripts and blocked unless approved. Developers are advised to test the changes now in npm 11.16.0 or later and use npm approve-scripts to identify trusted packages.\u003c/p\u003e\n"},{"n":3,"title":"The Rise of CalPhishing Attacks in the Health Sector","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/the-rise-of-calphishing-attacks-in-the-health-sector/","time":"17:55","priority":"SHOULD READ","score":80,"tldr":"Health-ISAC warns that attackers are using malicious calendar invites and .ics files to place phishing links directly into healthcare workers’ calendars, where reminders can persist even after the original email is deleted. Organizations should disable automatic processing of external invites, inspect calendar files, restrict device-code authentication, and hard-delete malicious calendar events during remediation.","briefOverview":"\u003cp\u003eHealth-ISAC reported on June 11, 2026, that it observed an emerging social engineering threat known as CalPhishing, or Calendar Phishing. The threat targets enterprise calendar applications such as Microsoft Outlook and Google Calendar by using calendar invites or iCalendar (.ics) files to place malicious links directly into employees’ schedules. Health-ISAC said the technique poses a risk to Protected Health Information and requires immediate attention from health sector security teams.\u003c/p\u003e\n\n\u003cp\u003eThe attack relies on the automatic processing features of enterprise email and calendar clients, which may add tentative meetings to a victim’s calendar without the victim opening the original email. The calendar event then presents urgent lures such as “Mandatory Security Briefing,” “Invoice Signature Required,” or “IT Admin Alert,” along with a malicious link. The article notes that recent campaigns use ConsentFix, described as device code phishing, to capture session tokens and bypass Multi-Factor Authentication.\u003c/p\u003e\n\n\u003cp\u003eHealth-ISAC emphasized that CalPhishing can persist because the calendar event may remain even if the original email is deleted or marked as junk. Desktop and mobile reminders can continue prompting the user until the event is hard-deleted. Recommended mitigations include disabling automatic processing of external calendar invites, inspecting .ics files, restricting device code authentication flows, updating remediation workflows, and training staff to scrutinize unexpected meeting invites.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eHealth-ISAC observed an emerging and highly evasive social engineering threat called CalPhishing, or Calendar Phishing, on June 11, 2026. The article says threat actors are exploiting automatic processing features in enterprise calendar applications such as Microsoft Outlook and Google Calendar. Their goal is to deliver malicious links directly into employees’ daily schedules using iCalendar (.ics) files or direct calendar invites.\u003c/p\u003e\n\n\u003cp\u003eThe article frames CalPhishing as a health sector concern because it poses a risk to Protected Health Information and affects healthcare environments where staff may be fast-paced and alert-fatigued. It says users implicitly trust their work calendars, making calendar entries an effective delivery point for phishing content. Health-ISAC stated that the threat requires immediate attention from health sector security teams.\u003c/p\u003e\n\n\u003cp\u003eThe described attack chain begins with an email carrying an attached .ics file or a direct calendar invite. The email body is often minimal, which the article says helps evade standard spam and phishing filters. Enterprise email clients may automatically process the .ics file and place a tentative meeting on the victim’s calendar without the user opening the delivery email.\u003c/p\u003e\n\n\u003cp\u003eOnce on the calendar, the lure uses urgent event descriptions such as “Mandatory Security Briefing,” “Invoice Signature Required,” or “IT Admin Alert.” The event includes a malicious link that redirects the user to a spoofed login page. The article says recent campaigns use ConsentFix, described as device code phishing, to capture session tokens, bypass Multi-Factor Authentication, and gain persistent, password-less access to enterprise cloud environments.\u003c/p\u003e\n\n\u003cp\u003eA key concern in the article is persistence. Even if the original email is deleted or marked as junk, the calendar event may remain active and continue generating desktop and mobile reminders. Health-ISAC says the threat is only neutralized if the malicious event is hard-deleted.\u003c/p\u003e\n\n\u003cp\u003eHealth-ISAC recommends several defensive measures for members and health sector organizations. These include disabling automatic processing of external calendar invites, requiring users to manually review and accept external .ics attachments, inspecting calendar files for embedded URLs and suspicious domains, restricting device code authentication flows, and updating incident response procedures to hard-delete malicious calendar artifacts. The article also recommends targeted awareness training so medical and administrative staff scrutinize unexpected meeting invites and delete suspicious events directly from their calendars.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eHealth-ISAC reported on June 11, 2026, that it observed an emerging social engineering threat called CalPhishing, also referred to as Calendar Phishing. The article describes CalPhishing as a highly evasive threat that abuses enterprise calendar applications, including Microsoft Outlook and Google Calendar, to deliver malicious links into employees’ daily schedules.\u003c/p\u003e\n\n\u003cp\u003eThe technique uses iCalendar (.ics) files or direct calendar invites to embed phishing URLs and credential-harvesting mechanisms. Health-ISAC states that this approach can bypass traditional email security gateways and poses a risk to Protected Health Information. The article calls for immediate attention from health sector security teams.\u003c/p\u003e\n\n\u003ch2 id=\"health-sector-significance\"\u003eHealth Sector Significance\u003c/h2\u003e\n\n\u003cp\u003eHealth-ISAC frames the threat as especially relevant to healthcare environments. The article says CalPhishing exploits the implicit trust users place in work calendars and the fast-paced, alert-fatigued nature of healthcare operations.\u003c/p\u003e\n\n\u003cp\u003eThe affected audience described in the article includes Health-ISAC members and health sector organizations. The article specifically recommends awareness training for medical and administrative staff, indicating that both clinical and non-clinical personnel may encounter these malicious calendar events.\u003c/p\u003e\n\n\u003ch2 id=\"attack-chain-described-by-health-isac\"\u003eAttack Chain Described by Health-ISAC\u003c/h2\u003e\n\n\u003cp\u003eThe article lays out a typical CalPhishing attack chain:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eInitial delivery:\u003c/strong\u003e An attacker sends an email with an attached .ics file or a direct calendar invite.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMinimal email content:\u003c/strong\u003e The delivery email often contains a minimal body to evade standard spam and phishing filters.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAuto-processing:\u003c/strong\u003e Enterprise email clients may automatically process the .ics file and place a tentative meeting on the victim’s calendar without requiring the victim to open the delivery email.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCalendar lure:\u003c/strong\u003e The event description contains urgent messaging and a malicious link.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCredential or token theft:\u003c/strong\u003e Clicking the link redirects the user to a spoofed login page.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePersistence:\u003c/strong\u003e The malicious calendar event may remain active even if the original email is deleted or marked as junk.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"lures-and-social-engineering-content\"\u003eLures and Social Engineering Content\u003c/h2\u003e\n\n\u003cp\u003eHealth-ISAC provides examples of urgent event descriptions used in CalPhishing campaigns. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e“Mandatory Security Briefing”\u003c/li\u003e\n\u003cli\u003e“Invoice Signature Required”\u003c/li\u003e\n\u003cli\u003e“IT Admin Alert”\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article presents these lures as part of the event description rather than the email body. This matters because the malicious prompt appears inside the user’s calendar workflow, where the user may already expect reminders, meeting details, and action items.\u003c/p\u003e\n\n\u003ch2 id=\"token-theft-and-consentfix\"\u003eToken Theft and ConsentFix\u003c/h2\u003e\n\n\u003cp\u003eThe article states that recent campaigns leverage a technique called ConsentFix, described as device code phishing. According to Health-ISAC, this technique is used to capture session tokens.\u003c/p\u003e\n\n\u003cp\u003eHealth-ISAC says the use of ConsentFix allows attackers to bypass Multi-Factor Authentication and gain persistent, password-less access to enterprise cloud environments. The article does not name a specific threat actor or campaign operator, but it does describe threat actors as the parties conducting the activity.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-of-calendar-artifacts\"\u003ePersistence of Calendar Artifacts\u003c/h2\u003e\n\n\u003cp\u003eA central concern in the article is the persistence of malicious calendar entries. Health-ISAC says that even if the original delivery email is deleted or flagged as junk by the user, the calendar event can remain active.\u003c/p\u003e\n\n\u003cp\u003eThe remaining event can continue to trigger desktop and mobile reminders. Health-ISAC states that this gives the attacker a longer window for user interaction. The article says the threat is only neutralized if the event is hard-deleted.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-defensive-measures\"\u003eRecommended Defensive Measures\u003c/h2\u003e\n\n\u003cp\u003eHealth-ISAC recommends that health sector organizations implement several defenses against CalPhishing.\u003c/p\u003e\n\n\u003ch3 id=\"disable-automatic-processing\"\u003eDisable automatic processing\u003c/h3\u003e\n\n\u003cp\u003eOrganizations should configure enterprise email settings to disable automatic processing of external calendar invites. Health-ISAC recommends requiring users to manually review and accept external .ics attachments.\u003c/p\u003e\n\n\u003ch3 id=\"inspect-calendar-files\"\u003eInspect calendar files\u003c/h3\u003e\n\n\u003cp\u003eThe article says organizations should treat .ics files as active content. Email security gateways should be updated to deeply inspect calendar attachments for embedded URLs, suspicious domains, and malicious data.\u003c/p\u003e\n\n\u003ch3 id=\"harden-access-controls\"\u003eHarden access controls\u003c/h3\u003e\n\n\u003cp\u003eHealth-ISAC recommends implementing conditional access policies to restrict device code authentication flows. The article says these flows are heavily abused in campaigns that steal session tokens.\u003c/p\u003e\n\n\u003ch3 id=\"update-remediation-workflows\"\u003eUpdate remediation workflows\u003c/h3\u003e\n\n\u003cp\u003eIncident response procedures should explicitly include hard-delete actions to remove malicious calendar artifacts from affected inboxes. Health-ISAC warns against relying solely on purging the initial delivery emails.\u003c/p\u003e\n\n\u003ch3 id=\"conduct-targeted-awareness-training\"\u003eConduct targeted awareness training\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends educating medical and administrative staff specifically about calendar phishing. Employees should be trained to scrutinize unexpected meeting invites, verify external senders, and delete suspicious events directly from their calendars rather than only ignoring the email.\u003c/p\u003e\n\n\u003ch2 id=\"additional-reference\"\u003eAdditional Reference\u003c/h2\u003e\n\n\u003cp\u003eHealth-ISAC directs readers to “Health Industry Cybersecurity Practices (HICP): Managing Threats and Protecting Patients” for more information. The article presents this reference after its recommendations and states that Health-ISAC provides the information to help prevent successful exploitation and disruption of security operations.\u003c/p\u003e\n","keyPoints":["Health-ISAC observed an emerging social engineering threat called CalPhishing, or Calendar Phishing, on June 11, 2026.","Threat actors use iCalendar .ics files or direct calendar invites to deliver malicious links into employees’ enterprise calendar applications such as Microsoft Outlook and Google Calendar.","CalPhishing can bypass traditional email security gateways because enterprise email clients may automatically process .ics files and place tentative meetings on a victim’s calendar without the victim opening the delivery email.","Recent campaigns use ConsentFix, described as device code phishing, to capture session tokens and bypass Multi-Factor Authentication for persistent, password-less access to enterprise cloud environments.","Health-ISAC recommends disabling automatic processing of external calendar invites, inspecting .ics files for embedded URLs and suspicious domains, restricting device code authentication flows, hard-deleting malicious calendar artifacts, and training staff to scrutinize unexpected meeting invites."],"insights":["Deleting or junking the original phishing email is insufficient because the malicious calendar event can remain active and continue triggering desktop and mobile reminders until it is hard-deleted.","The minimal email body used in CalPhishing reduces reliance on email content for detection, making inspection of .ics attachments and embedded calendar-event URLs especially important.","Calendar-based lures exploit operational urgency in healthcare environments by presenting prompts such as mandatory security briefings, invoice signature requests, or IT admin alerts inside a trusted scheduling workflow.","Restricting device code authentication flows is a specific defensive priority because the article says recent campaigns use ConsentFix to capture session tokens and bypass MFA."],"referencedReports":[{"title":"Health Industry Cybersecurity Practices (HICP): Managing Threats and Protecting Patients","url":"https://405d.hhs.gov/Documents/HICP-Main-508.pdf","publisher":"405(d) Program / HHS","context":"The article directs readers to this document for more information after listing mitigations for CalPhishing in the health sector.","category":"","primary":false}],"body":"\u003cp\u003eHealth-ISAC reported on June 11, 2026, that it observed an emerging social engineering threat known as CalPhishing, or Calendar Phishing. The threat targets enterprise calendar applications such as Microsoft Outlook and Google Calendar by using calendar invites or iCalendar (.ics) files to place malicious links directly into employees’ schedules. Health-ISAC said the technique poses a risk to Protected Health Information and requires immediate attention from health sector security teams.\u003c/p\u003e\n\n\u003cp\u003eThe attack relies on the automatic processing features of enterprise email and calendar clients, which may add tentative meetings to a victim’s calendar without the victim opening the original email. The calendar event then presents urgent lures such as “Mandatory Security Briefing,” “Invoice Signature Required,” or “IT Admin Alert,” along with a malicious link. The article notes that recent campaigns use ConsentFix, described as device code phishing, to capture session tokens and bypass Multi-Factor Authentication.\u003c/p\u003e\n\n\u003cp\u003eHealth-ISAC emphasized that CalPhishing can persist because the calendar event may remain even if the original email is deleted or marked as junk. Desktop and mobile reminders can continue prompting the user until the event is hard-deleted. Recommended mitigations include disabling automatic processing of external calendar invites, inspecting .ics files, restricting device code authentication flows, updating remediation workflows, and training staff to scrutinize unexpected meeting invites.\u003c/p\u003e\n"},{"n":5,"title":"Cyber Force not included in Senate defense policy roadmap","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/cyber-force-not-included-senate-defense-roadmap","time":"16:47","priority":"MAY READ","score":72,"tldr":"A Senate Armed Services Committee proposal to create a U.S. Cyber Force failed by a narrow 14-13 vote, with lawmakers opting to wait for a pending feasibility study. The defense bill instead advances a major Pentagon cyber leadership reorganization to reduce friction between existing cyber and CIO offices.","briefOverview":"\u003cp\u003eA proposal to create a U.S. Cyber Force was narrowly defeated in the Senate Armed Services Committee during consideration of the fiscal 2027 national defense authorization bill. Sen. Kirsten Gillibrand’s amendment failed 14-13, with nine Democrats and four Republicans voting in favor. The main argument against the proposal was that lawmakers should wait for a National Academy of Sciences, Engineering, and Medicine feasibility study expected later this year.\u003c/p\u003e\n\n\u003cp\u003eThe vote was notable because the article says Congress has not studied the Cyber Force idea in depth and because it reflected bipartisan frustration over the military services’ failure to provide U.S. Cyber Command with personnel ready for online conflict with countries such as China and Russia. Sen. Mike Rounds said lawmakers have been reviewing the issue but are unsure whether this is the right time, citing the pending study and the role of artificial intelligence in cyber discussions. An independent commission recently estimated that a new Cyber Force could cost up to $11 billion and include about 33,000 troops.\u003c/p\u003e\n\n\u003cp\u003eAlthough the Cyber Force was not included, the Senate defense bill contains a major reorganization of the Defense Department’s cyber offices. It would create a Senate-confirmed Under Secretary of Defense for Cyber, Information, and Networks, dual-hatted as the Pentagon’s Chief Information Officer and principal cyber advisor to the Secretary of Defense. The change is intended to reduce friction between the CIO and the assistant secretary of defense for cyber policy over responsibility for cyber operations and cybersecurity.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Senate Armed Services Committee rejected an amendment that would have created a U.S. Cyber Force as a new military branch. The amendment, offered by Sen. Kirsten Gillibrand, was defeated 14-13 during closed-door consideration of the chamber’s fiscal 2027 national defense authorization bill. According to congressional sources, nine Democrats and four Republicans supported the amendment.\u003c/p\u003e\n\n\u003cp\u003eThe central objection to moving forward was that policymakers should first wait for the results of a National Academy of Sciences, Engineering, and Medicine study on the feasibility of establishing a Cyber Force. That study, which Gillibrand also championed and which was included in a previous defense roadmap, is expected to conclude later this year. Sen. Mike Rounds said the idea has been under review but added that lawmakers are not sure this is the right time.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the close vote as surprising because Congress has not studied the Cyber Force proposal in depth. It also frames the vote as evidence of bipartisan frustration with the existing military services’ chronic failure to provide U.S. Cyber Command with personnel ready to conduct online operations against adversaries such as China and Russia. Rounds also cited the changing nature of cyber security issues and said artificial intelligence is a major part of the discussion.\u003c/p\u003e\n\n\u003cp\u003eEarlier in the month, an independent commission issued a report describing how the U.S. could eventually establish a seventh military branch. The commission estimated that such a branch could cost up to $11 billion and include about 33,000 troops, including 20,000 active-duty members. Gillibrand’s amendment had not been released publicly, but the article says it was widely believed to mirror the commission’s recommendations, including placing the Cyber Force within the Army in a structure similar to the Space Force’s placement under the Air Force.\u003c/p\u003e\n\n\u003cp\u003eWhile the Cyber Force proposal was not included, the defense bill would reorganize Defense Department cyber leadership. It would create a new Under Secretary of Defense for Cyber, Information, and Networks, dual-hatted as both the Pentagon’s Chief Information Officer and the principal cyber advisor to the Secretary of Defense. The provision, set to take effect in two years, is intended to address tensions and overlapping responsibilities between the CIO and the assistant secretary of defense for cyber policy.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore event\u003c/h2\u003e\n\n\u003cp\u003eThe Senate Armed Services Committee rejected a proposal to create a U.S. Cyber Force as the country’s newest military branch. The proposal came through an amendment by Sen. Kirsten Gillibrand to the Senate’s fiscal 2027 national defense authorization bill. The amendment was defeated 14-13 during the committee’s closed-door consideration of the nearly $1.2 trillion defense policy legislation.\u003c/p\u003e\n\n\u003cp\u003eAccording to multiple congressional sources cited in the article, nine Democrats and four Republicans voted in favor of the amendment. Gillibrand’s office said the senator remains optimistic about the Cyber Force proposal and will continue pushing for its creation.\u003c/p\u003e\n\n\u003ch2 id=\"reason-the-proposal-failed\"\u003eReason the proposal failed\u003c/h2\u003e\n\n\u003cp\u003eThe main argument against the amendment was timing. Opponents argued that lawmakers should wait for the National Academy of Sciences, Engineering, and Medicine to finish a feasibility study on creating a Cyber Force before moving ahead. That study was included in a previous defense roadmap and is expected to conclude later this year.\u003c/p\u003e\n\n\u003cp\u003eSen. Mike Rounds, who chairs the Senate Armed Services cyber subcommittee, said the Cyber Force idea has been under review but that lawmakers are not sure the current moment is the right time. He cited the pending NASEM review and said the changing nature of cyber security issues, including artificial intelligence, is part of the discussion.\u003c/p\u003e\n\n\u003ch2 id=\"significance-of-the-close-vote\"\u003eSignificance of the close vote\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the close 14-13 vote as surprising because Congress has not deeply studied the possibility of creating a Cyber Force. It also presents the vote as a clear example of bipartisan frustration on Capitol Hill with the existing military services. Specifically, the article says lawmakers are frustrated by the services’ chronic failure to provide U.S. Cyber Command with personnel ready to fight foreign adversaries online, including China and Russia.\u003c/p\u003e\n\n\u003cp\u003eThe bipartisan nature of the vote is emphasized by the fact that both Democrats and Republicans supported the amendment. However, the proposal still failed narrowly and was not included in the Senate defense policy roadmap.\u003c/p\u003e\n\n\u003ch2 id=\"independent-commission-findings\"\u003eIndependent commission findings\u003c/h2\u003e\n\n\u003cp\u003eEarlier in the month, an independent commission published a report describing how the United States should proceed if it eventually establishes a seventh military branch. The commission found that a new Cyber Force could cost up to $11 billion to create. It also estimated that the branch would include about 33,000 troops, including 20,000 active-duty personnel.\u003c/p\u003e\n\n\u003cp\u003eGillibrand’s amendment has not been released publicly. However, the article says it was widely believed to mirror the commission’s recommendations. Those recommendations included nesting the Cyber Force within the Army, similar to how the Space Force sits under the Air Force.\u003c/p\u003e\n\n\u003ch2 id=\"defense-department-cyber-reorganization-in-the-bill\"\u003eDefense Department cyber reorganization in the bill\u003c/h2\u003e\n\n\u003cp\u003eAlthough the Cyber Force proposal was not included, the Senate defense bill does contain a major reorganization of the Defense Department’s cyber offices. The bill would create a new Under Secretary of Defense for Cyber, Information, and Networks. That official would also serve as the Pentagon’s Chief Information Officer and as the principal cyber advisor to the Secretary of Defense.\u003c/p\u003e\n\n\u003cp\u003eThe provision would take effect in two years. The article says lawmakers are using the measure to get ahead of ongoing tensions between the Pentagon CIO and the assistant secretary of defense for cyber policy.\u003c/p\u003e\n\n\u003ch2 id=\"source-of-internal-pentagon-friction\"\u003eSource of internal Pentagon friction\u003c/h2\u003e\n\n\u003cp\u003eThe dispute between the CIO and the assistant secretary’s office centers on differing views of what counts as cyber operations. According to multiple military, civilian and congressional sources cited in the article, the assistant secretary’s office has argued that such activities belong to it under statute. The CIO, by contrast, views those activities as part of cybersecurity as a whole, making them the responsibility of her organization.\u003c/p\u003e\n\n\u003cp\u003eA congressional official said the new office is meant to create alignment and unity of policy and compliance mechanisms for protecting networks. The official also said lawmakers identified friction and gaps between the CIO and principal cyber advisor roles as those positions matured over time.\u003c/p\u003e\n\n\u003ch2 id=\"role-of-artificial-intelligence-and-network-security\"\u003eRole of artificial intelligence and network security\u003c/h2\u003e\n\n\u003cp\u003eArtificial intelligence is presented as a factor in the evolving cyber policy debate. Sen. Rounds said AI is a major part of the discussion about how to address cyber security issues. A congressional official also referred to “Mythos and various other highly capable artificial intelligence models in the cyber and networking domain” when discussing the need to align policy and compliance mechanisms for protecting Defense Department networks.\u003c/p\u003e\n\n\u003ch2 id=\"expected-impact-of-the-proposed-leadership-change\"\u003eExpected impact of the proposed leadership change\u003c/h2\u003e\n\n\u003cp\u003eThe new Under Secretary of Defense for Cyber, Information, and Networks would be a Senate-confirmed position. Rounds said the role would bring cyber back to a higher level than it currently occupies and eliminate friction between two offices. He described one office as focused on identifying offensive and defensive operations and the CIO as responsible for the platforms on which those activities live.\u003c/p\u003e\n\n\u003cp\u003eIn effect, the bill would not create a separate Cyber Force, but it would elevate and consolidate cyber leadership inside the Defense Department. The article presents this reorganization as the major cyber-related change that survived in the Senate defense bill after the Cyber Force amendment failed.\u003c/p\u003e\n","keyPoints":["Sen. Kirsten Gillibrand’s amendment to create a U.S. Cyber Force was defeated 14-13 in the Senate Armed Services Committee during consideration of the fiscal 2027 defense authorization bill.","Opponents argued that lawmakers should wait for a National Academy of Sciences, Engineering, and Medicine feasibility study on creating a Cyber Force, which is expected to conclude later this year.","The close vote reflected bipartisan frustration over the existing military services’ repeated failure to provide U.S. Cyber Command with personnel ready for online operations against adversaries such as China and Russia.","An independent commission recently reported that a new Cyber Force could cost up to $11 billion and include about 33,000 troops, with 20,000 active-duty members.","The Senate defense bill would create a new Under Secretary of Defense for Cyber, Information, and Networks, dual-hatted as the Pentagon’s Chief Information Officer and principal cyber advisor to the Secretary of Defense."],"insights":["The Cyber Force amendment’s 14-13 defeat shows the proposal has significant bipartisan support despite not being included in the defense bill, with nine Democrats and four Republicans voting in favor.","Lawmakers’ decision to wait for the NASEM study indicates that the pending feasibility review is a central gating factor for further congressional action on a Cyber Force.","The bill’s proposed dual-hatted cyber leadership role reflects congressional concern that overlapping responsibilities between the Pentagon CIO and the assistant secretary for cyber policy have created operational friction.","Sen. Mike Rounds linked the timing of Cyber Force decisions to the changing nature of cyber defense, specifically citing artificial intelligence as a major part of the discussion."],"referencedReports":[],"body":"\u003cp\u003eA proposal to create a U.S. Cyber Force was narrowly defeated in the Senate Armed Services Committee during consideration of the fiscal 2027 national defense authorization bill. Sen. Kirsten Gillibrand’s amendment failed 14-13, with nine Democrats and four Republicans voting in favor. The main argument against the proposal was that lawmakers should wait for a National Academy of Sciences, Engineering, and Medicine feasibility study expected later this year.\u003c/p\u003e\n\n\u003cp\u003eThe vote was notable because the article says Congress has not studied the Cyber Force idea in depth and because it reflected bipartisan frustration over the military services’ failure to provide U.S. Cyber Command with personnel ready for online conflict with countries such as China and Russia. Sen. Mike Rounds said lawmakers have been reviewing the issue but are unsure whether this is the right time, citing the pending study and the role of artificial intelligence in cyber discussions. An independent commission recently estimated that a new Cyber Force could cost up to $11 billion and include about 33,000 troops.\u003c/p\u003e\n\n\u003cp\u003eAlthough the Cyber Force was not included, the Senate defense bill contains a major reorganization of the Defense Department’s cyber offices. It would create a Senate-confirmed Under Secretary of Defense for Cyber, Information, and Networks, dual-hatted as the Pentagon’s Chief Information Officer and principal cyber advisor to the Secretary of Defense. The change is intended to reduce friction between the CIO and the assistant secretary of defense for cyber policy over responsibility for cyber operations and cybersecurity.\u003c/p\u003e\n"},{"n":10,"title":"The Geek Squad Invoice That Forgot Which Brand It Was Pretending to Be","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/geek-squad-toad-callback-image-invoice-brand-mismatch","time":"11:00","priority":"MAY READ","score":72,"tldr":"Attackers sent a blank email with a JPEG-only fake Geek Squad invoice to lure the recipient into calling a scam phone number, bypassing defenses that rely on links or text scanning. The key warning sign was an image-based callback phishing payload with mismatched branding, showing the need for OCR and behavioral detection.","briefOverview":"\u003cp\u003eA community healthcare organization received a callback phishing email with an empty subject line, no body text, and a single JPEG attachment. The attachment contained a fabricated Geek Squad renewal invoice for $270, a 24-hour cancellation deadline, and a callback phone number. The article describes the attack as Telephone-Oriented Attack Delivery because the recipient was pushed to call rather than click a link.\u003c/p\u003e\n\n\u003cp\u003eThe attack was significant because the entire phishing payload existed inside an image, leaving no URLs, body text, or executable attachment content for common scanners to inspect. OCR analysis revealed a mismatch between the invoice’s Geek Squad branding and a footer reading “Copyright 2026 Windows Defender.” The article says this mismatch indicated a recycled template from another campaign.\u003c/p\u003e\n\n\u003cp\u003eThe email was sent from a Hotmail account and relayed through a FortiMail cloud gateway, which caused SPF to fail at the final hop while DKIM and DMARC passed through Hotmail. Microsoft assigned SCL=5 with a CAT=PHISH designation. Themis flagged the message at 90% confidence as a vishing and image-based attack based on behavioral signals and image analysis.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA community healthcare organization received an email with no subject line, no body text, and one JPEG attachment named \u003ccode\u003e34GE1RIEDYLJ.jpg\u003c/code\u003e. The attachment contained a fake Geek Squad “Renewal Confirmation” invoice for $270.00. The invoice included a 24-hour cancellation warning and the callback number \u003ccode\u003e828-424-4048\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies the technique as Telephone-Oriented Attack Delivery, or TOAD. The attacker did not include links, URLs, or scannable text in the email body. Instead, the full phishing message was embedded in im
