<style>

<script>
window.__DL_ARTICLES = [{"n":15,"title":"Oracle mitigates PeopleSoft zero-day exploited in data theft attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/oracle-mitigates-peoplesoft-zero-day-exploited-in-data-theft-attacks/","time":"19:39","priority":"MUST READ","score":98,"tldr":"Oracle issued emergency mitigations for a critical PeopleSoft PeopleTools zero-day, CVE-2026-35273, that enables unauthenticated remote code execution. The flaw is reportedly being actively exploited by ShinyHunters to steal data from PeopleSoft instances, so affected organizations should apply mitigations and check logs for related indicators.","briefOverview":"\u003cp\u003eOracle is warning customers about CVE-2026-35273, a critical zero-day vulnerability in Oracle PeopleSoft PeopleTools. The flaw is remotely exploitable without authentication and can result in remote code execution. Oracle says PeopleSoft Enterprise Applications customers may also be affected.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability has a CVSS base score of 9.8 and affects PeopleSoft Enterprise PeopleTools versions 8.61 and 8.62. Oracle has released emergency mitigations and says a patch is coming soon. The disclosure follows reports that a PeopleSoft zero-day was used in data theft attacks attributed to ShinyHunters.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer reported that CVE-2026-35273 is the zero-day exploited in those attacks, and Mandiant’s Charles Carmakal also confirmed active exploitation on LinkedIn. ShinyHunters claimed it used a “gadget chain” of old and zero-day flaws to breach PeopleSoft instances. The group allegedly stole data from 300 instances across more than 100 organizations.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOracle issued a security alert for CVE-2026-35273, a critical zero-day vulnerability in Oracle PeopleSoft PeopleTools. The flaw has a CVSS base score of 9.8 and is remotely exploitable without authentication. Oracle said successful exploitation may result in remote code execution.\u003c/p\u003e\n\n\u003cp\u003eOracle confirmed that the vulnerability affects PeopleSoft Enterprise PeopleTools versions 8.61 and 8.62. The company released emergency mitigations to address the flaw and said a patch is coming soon. Oracle also noted that PeopleSoft Enterprise Applications customers may be affected.\u003c/p\u003e\n\n\u003cp\u003eThe disclosure came after BleepingComputer reported that Oracle PeopleSoft servers had been targeted in data theft attacks involving a PeopleSoft zero-day. BleepingComputer later said it learned that CVE-2026-35273 is the zero-day exploited in those attacks. Charles Carmakal, CTO at Mandiant - Google Cloud, also confirmed on LinkedIn that the vulnerability is actively exploited and said Oracle had released mitigations.\u003c/p\u003e\n\n\u003cp\u003eThe attacks are attributed in the article to the ShinyHunters extortion gang, which BleepingComputer says confirmed it was behind them. ShinyHunters claimed it used a “gadget chain” of old and zero-day flaws to breach PeopleSoft instances. The group allegedly stole data from 300 instances across more than 100 organizations.\u003c/p\u003e\n\n\u003cp\u003eThe article says ShinyHunters is known for breaching cloud SaaS instances, CRMs, and enterprise platforms that store large volumes of corporate data. After gaining access, the group downloads data and demands a ransom to prevent public leaks. The article also links the group to high-profile attacks involving SnowFlake, Salesforce, and third-party integration providers over the past year.\u003c/p\u003e\n\n\u003cp\u003eCybersecurity researcher Michael R found exposed online directories containing attack-related tooling and shared IP addresses used in the attacks. The article advises organizations running Oracle PeopleSoft to analyze logs for connections from those IP addresses to determine whether they were targeted. BleepingComputer said it contacted Oracle with questions about the vulnerability and attacks but had not received a response.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOracle is warning about CVE-2026-35273, a critical zero-day vulnerability in Oracle PeopleSoft PeopleTools. The vulnerability allows unauthenticated remote code execution and has a CVSS base score of 9.8. Oracle said the vulnerability is remotely exploitable without authentication and that successful exploitation may result in remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe article reports that the flaw is being actively exploited in ShinyHunters data theft attacks. Although Oracle’s advisory does not state that the vulnerability is actively exploited, BleepingComputer says it learned that CVE-2026-35273 is the zero-day used in the attacks. Charles Carmakal, CTO at Mandiant - Google Cloud, also confirmed on LinkedIn that the vulnerability is actively exploited.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products\"\u003eAffected Products\u003c/h2\u003e\n\n\u003cp\u003eOracle confirmed that CVE-2026-35273 affects Oracle PeopleSoft Enterprise PeopleTools versions 8.61 and 8.62. Oracle also stated that PeopleSoft Enterprise Applications customers may be affected by the vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe affected product and versions identified in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOracle PeopleSoft Enterprise PeopleTools 8.61\u003c/li\u003e\n\u003cli\u003eOracle PeopleSoft Enterprise PeopleTools 8.62\u003c/li\u003e\n\u003cli\u003ePotentially affected Oracle PeopleSoft Enterprise Applications customers\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"oracle-response\"\u003eOracle Response\u003c/h2\u003e\n\n\u003cp\u003eOracle released emergency mitigations for CVE-2026-35273. The company said a patch is coming soon.\u003c/p\u003e\n\n\u003cp\u003eOracle’s advisory states that the vulnerability is remotely exploitable without authentication. It also states that successful exploitation may result in remote code execution.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer said it contacted Oracle with questions about the vulnerability and the attacks but had not received a response.\u003c/p\u003e\n\n\u003ch2 id=\"reported-exploitation\"\u003eReported Exploitation\u003c/h2\u003e\n\n\u003cp\u003eThe article says the Oracle disclosure followed BleepingComputer’s earlier report that ShinyHunters was exploiting a PeopleSoft zero-day vulnerability to breach instances and steal data. BleepingComputer later said it learned that CVE-2026-35273 is that zero-day.\u003c/p\u003e\n\n\u003cp\u003eCharles Carmakal of Mandiant - Google Cloud also confirmed on LinkedIn that CVE-2026-35273 is actively exploited. He also stated that Oracle released mitigations for the flaw.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-activity\"\u003eThreat Actor Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article attributes the data theft attacks to ShinyHunters. BleepingComputer says ShinyHunters confirmed that it was behind the attacks.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, ShinyHunters claimed it used a “gadget chain” of old and zero-day flaws to breach PeopleSoft instances. The threat actor allegedly stole data from 300 instances across more than 100 organizations.\u003c/p\u003e\n\n\u003cp\u003eThe article describes ShinyHunters as a well-known extortion gang that commonly breaches cloud SaaS instances, CRMs, and enterprise platforms that host large volumes of corporate data. After gaining access to an instance, the group downloads the data and demands a ransom to prevent public leaking.\u003c/p\u003e\n\n\u003cp\u003eThe article also says ShinyHunters has been linked to high-profile attacks targeting:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSnowFlake\u003c/li\u003e\n\u003cli\u003eSalesforce\u003c/li\u003e\n\u003cli\u003eThird-party integration providers\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-and-investigation-guidance\"\u003eIndicators and Investigation Guidance\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researcher Michael R found several exposed online directories containing attack-related tooling. The researcher shared IP addresses that were used in the attacks.\u003c/p\u003e\n\n\u003cp\u003eThe IP addresses listed in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e142.11.200[.]186\u003c/li\u003e\n\u003cli\u003e142.11.200[.]187\u003c/li\u003e\n\u003cli\u003e142.11.200[.]188\u003c/li\u003e\n\u003cli\u003e142.11.200[.]189\u003c/li\u003e\n\u003cli\u003e142.11.200[.]190\u003c/li\u003e\n\u003cli\u003e108.174.202[.]99\u003c/li\u003e\n\u003cli\u003e176.120.22[.]24\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article strongly advises organizations running Oracle PeopleSoft to analyze logs for connections from those IP addresses. The stated purpose is to determine whether they were targeted in the attacks.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability is significant because it is a critical unauthenticated remote code execution flaw in Oracle PeopleSoft PeopleTools. It affects PeopleTools versions 8.61 and 8.62 and may also impact PeopleSoft Enterprise Applications customers.\u003c/p\u003e\n\n\u003cp\u003eThe reported exploitation is tied to data theft and extortion activity. The article says ShinyHunters allegedly stole data from 300 instances across more than 100 organizations using a “gadget chain” of old and zero-day flaws.\u003c/p\u003e\n\n\u003cp\u003eOracle has made emergency mitigations available while a full patch is still pending. Organizations running Oracle PeopleSoft are advised in the article to apply the mitigations and review logs for the listed IP addresses.\u003c/p\u003e\n","keyPoints":["Oracle warned about CVE-2026-35273, a critical zero-day vulnerability in PeopleSoft PeopleTools that allows unauthenticated remote code execution and has a CVSS base score of 9.8.","Oracle confirmed that CVE-2026-35273 affects PeopleSoft Enterprise PeopleTools versions 8.61 and 8.62 and released emergency mitigations, with a patch coming soon.","BleepingComputer reported that CVE-2026-35273 is the zero-day exploited in ShinyHunters data theft attacks against Oracle PeopleSoft instances.","ShinyHunters claimed it used a “gadget chain” of old and zero-day flaws to breach PeopleSoft instances and allegedly stole data from 300 instances across more than 100 organizations.","Cybersecurity researcher Michael R found exposed online directories containing attack-related tooling and shared IP addresses that organizations running Oracle PeopleSoft are advised to check in their logs."],"insights":["Oracle’s advisory does not state that CVE-2026-35273 is actively exploited, but BleepingComputer and Mandiant’s Charles Carmakal both identified it as the PeopleSoft zero-day used in ongoing attacks.","The article provides seven specific IP addresses linked to the attacks, giving PeopleSoft operators concrete indicators to search for in logs: 142.11.200.186 through 142.11.200.190, 108.174.202.99, and 176.120.22.24.","Because Oracle has released emergency mitigations while a full patch is still pending, affected PeopleSoft Enterprise PeopleTools 8.61 and 8.62 customers have an interim defensive action available immediately.","ShinyHunters claimed it used a “gadget chain” combining old and zero-day flaws, indicating organizations should not limit reviews to CVE-2026-35273 alone when investigating possible PeopleSoft compromise."],"referencedReports":[{"title":"Oracle Security Alert for CVE-2026-35273","url":"https://support.oracle.com/support/?documentId=CPU187","publisher":"Oracle","context":"The article cites Oracle’s advisory and emergency mitigations for the PeopleSoft PeopleTools zero-day vulnerability CVE-2026-35273.","category":"","primary":false}],"body":"\u003cp\u003eOracle is warning customers about CVE-2026-35273, a critical zero-day vulnerability in Oracle PeopleSoft PeopleTools. The flaw is remotely exploitable without authentication and can result in remote code execution. Oracle says PeopleSoft Enterprise Applications customers may also be affected.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability has a CVSS base score of 9.8 and affects PeopleSoft Enterprise PeopleTools versions 8.61 and 8.62. Oracle has released emergency mitigations and says a patch is coming soon. The disclosure follows reports that a PeopleSoft zero-day was used in data theft attacks attributed to ShinyHunters.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer reported that CVE-2026-35273 is the zero-day exploited in those attacks, and Mandiant’s Charles Carmakal also confirmed active exploitation on LinkedIn. ShinyHunters claimed it used a “gadget chain” of old and zero-day flaws to breach PeopleSoft instances. The group allegedly stole data from 300 instances across more than 100 organizations.\u003c/p\u003e\n"},{"n":22,"title":"ShinyHunters Exploits Oracle PeopleSoft Zero-Day (CVE-2026-35273) to Breach Universities","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/shinyhunters-exploits-oracle-peoplesoft.html","time":"20:29","priority":"MUST READ","score":96,"tldr":"ShinyHunters exploited a zero-day remote code execution flaw in Oracle PeopleSoft to breach universities and steal data before Oracle disclosed the issue. Organizations running PeopleSoft should urgently restrict or disable exposed PSEMHUB endpoints, check for compromise, and apply Oracle fixes when available.","briefOverview":"\u003cp\u003eShinyHunters exploited an unpatched Oracle PeopleSoft flaw to break into enterprise systems, steal data, and demand payment to keep it private. Google’s Mandiant attributes the campaign to UNC6240 and dates the activity between May 27 and June 9. Oracle published its advisory on June 10, meaning the bug was a zero-day during the observed activity.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability, CVE-2026-35273, is a 9.8-rated remote code execution flaw in PeopleSoft Enterprise PeopleTools. It requires no login or user interaction and can be exploited over HTTP when the Environment Management Hub is reachable from the network. Oracle lists PeopleTools 8.61 and 8.62 as affected and says earlier unsupported versions are probably vulnerable too.\u003c/p\u003e\n\n\u003cp\u003eMandiant notified more than 100 organizations whose IP addresses matched vulnerable endpoints, with 68% in higher education and most in the United States. The University of Nottingham is one confirmed victim, with Have I Been Pwned counting about 455,000 unique email addresses in the leaked data set. Oracle recommends disabling or removing the Environment Management Hub/PSEMHUB exposure where possible, or blocking external access to key endpoints while organizations hunt for signs of compromise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eShinyHunters exploited CVE-2026-35273, an unpatched Oracle PeopleSoft zero-day, to breach enterprise systems, steal data, and demand payment to keep it private. Google’s Mandiant attributes the activity to UNC6240 and says it occurred between May 27 and June 9. Oracle did not publish its advisory until June 10, so the vulnerability was a zero-day throughout the campaign.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-35273 is a remote code execution flaw in PeopleSoft Enterprise PeopleTools rated 9.8 out of 10. It requires no login and no user interaction, only network access over HTTP, to take over the server. The flaw is in the Updates Environment Management component behind the Environment Management Hub, or PSEMHUB, and Oracle lists PeopleTools 8.61 and 8.62 as affected.\u003c/p\u003e\n\n\u003cp\u003eOperational details became public because the attackers left infrastructure exposed. Mandiant examined five sequential IP addresses running Python’s SimpleHTTP server on port 8888 and found staging files including a shared .bash_history, custom MeshCentral remote-management agents disguised as Microsoft Azure binaries, and a lateral-movement script. The agents called home to azurenetfiles.net, a domain chosen to resemble Azure NetApp Files.\u003c/p\u003e\n\n\u003cp\u003eThe lateral-movement script, named [victim]_fanout.sh, spread over SSH by spraying hardcoded usernames and passwords against internal hosts from /etc/hosts. It dropped a marker file named README-IF-YOU-SEE-THIS-YOUVE-BEEN-HACKED.TXT into PeopleSoft directories. The command history showed data compressed with zstd and an outbound SSH connection to the server hosting the public mirror of the ShinyHunters leak site.\u003c/p\u003e\n\n\u003cp\u003eMandiant notified more than 100 organizations with vulnerable endpoints, and 68% were in higher education, mostly in the United States. Some organizations blocked the activity, while others were compromised and had data posted to the leak site. The University of Nottingham confirmed a breach, and Have I Been Pwned counted about 455,000 unique email addresses in the leaked set, along with names, addresses, phone numbers, passport numbers, and details on ethnicity and disabilities.\u003c/p\u003e\n\n\u003cp\u003eOracle recommends disabling the Environment Management Hub service on multi-server setups or removing the PSEMHUB application on single-server setups. If that is not possible, organizations should block external access to /PSEMHUB/*, especially /PSEMHUB/hub, and /PSIGW/HttpListeningConnector at the perimeter. Mandiant warns that WAF body-inspection rules alone are insufficient because they can be bypassed, and the article says restricting these endpoints does not break normal user sessions.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eShinyHunters exploited an unpatched Oracle PeopleSoft vulnerability to compromise enterprise systems, steal data, and demand payment to keep the data private. Google’s Mandiant attributes the campaign to the group it tracks as UNC6240. The activity took place between May 27 and June 9, while Oracle published its advisory on June 10, meaning the flaw was used as a zero-day during the campaign.\u003c/p\u003e\n\n\u003cp\u003eThe campaign hit universities hardest. Mandiant notified more than 100 organizations whose IP addresses matched vulnerable endpoints, and 68% were in higher education, mostly in the United States. Some organizations blocked the activity, while others were compromised and had data posted to the ShinyHunters leak site.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-details\"\u003eVulnerability Details\u003c/h2\u003e\n\n\u003cp\u003eThe exploited flaw is CVE-2026-35273, a remote code execution vulnerability in Oracle PeopleSoft Enterprise PeopleTools. It is rated 9.8 out of 10 and requires no login or user interaction. The article states that an attacker only needs network access over HTTP to take over the server.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability sits in the Updates Environment Management component, which is the piece behind the Environment Management Hub, also referred to as PSEMHUB. Oracle lists PeopleTools 8.61 and 8.62 as affected and says earlier unsupported versions are probably vulnerable too. Oracle credits researchers from TrendAI Zero Day Initiative and TrendAI Research for the report.\u003c/p\u003e\n\n\u003cp\u003eThe key exposure described in the article is PeopleSoft with the Environment Management Hub reachable from outside. The article says organizations in that position should immediately lock those endpoints down.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-and-attacker-infrastructure\"\u003eExploitation and Attacker Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eMandiant CTO Charles Carmakal confirmed that the bug is being exploited in the wild. Oracle’s advisory points to a patch availability document behind a support login, and the article says it is unclear whether a full fix is broadly available. For now, the article says the guidance centers on mitigation.\u003c/p\u003e\n\n\u003cp\u003eOperational details became public because the attackers left their own gear exposed. Researcher @nahamike01 publicly flagged open directories, after which Mandiant triaged five sequential IP addresses running Python’s SimpleHTTP server on port 8888. Those servers exposed staging files used in the operation.\u003c/p\u003e\n\n\u003cp\u003eThe exposed materials included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA shared .bash_history file.\u003c/li\u003e\n\u003cli\u003eCustom MeshCentral remote-management agents disguised as Microsoft Azure binaries.\u003c/li\u003e\n\u003cli\u003eA lateral-movement script.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe MeshCentral agents called home to azurenetfiles.net, a domain selected to look like Azure NetApp Files. The lateral-movement script was named [victim]_fanout.sh. It spread over SSH by spraying a hardcoded list of usernames and passwords against internal hosts pulled from /etc/hosts.\u003c/p\u003e\n\n\u003cp\u003eThe script also dropped a marker file named README-IF-YOU-SEE-THIS-YOUVE-BEEN-HACKED.TXT into PeopleSoft directories. The command history showed data compressed with zstd and an outbound SSH connection to the server hosting the public mirror of the ShinyHunters leak site.\u003c/p\u003e\n\n\u003ch2 id=\"affected-organizations-and-confirmed-impact\"\u003eAffected Organizations and Confirmed Impact\u003c/h2\u003e\n\n\u003cp\u003eMandiant notified more than 100 organizations whose IP addresses matched vulnerable endpoints. Sixty-eight percent were in higher education, and most were in the United States. The article says some organizations blocked the activity, while others were compromised and had data posted to the leak site.\u003c/p\u003e\n\n\u003cp\u003eThe University of Nottingham is one of the first confirmed victims. Have I Been Pwned counted about 455,000 unique email addresses in the leaked set. The exposed data covered current students and alumni and included names, addresses, phone numbers, passport numbers, and details on ethnicity and disabilities.\u003c/p\u003e\n\n\u003cp\u003eThe University of Nottingham confirmed the breach. The article also says ShinyHunters claims victim outreach has only just started and that it has not posted most of the organizations it claims.\u003c/p\u003e\n\n\u003ch2 id=\"mitigation-guidance\"\u003eMitigation Guidance\u003c/h2\u003e\n\n\u003cp\u003eOracle’s guidance is to disable the Environment Management Hub service on multi-server setups. On single-server setups, Oracle recommends removing the PSEMHUB application outright. If organizations cannot do either, the article says they should block external access at the perimeter to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e/PSEMHUB/*\u003c/li\u003e\n\u003cli\u003e/PSEMHUB/hub in particular\u003c/li\u003e\n\u003cli\u003e/PSIGW/HttpListeningConnector\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMandiant warns that WAF body-inspection rules alone are not enough because they can be bypassed. The article also states that restricting these endpoints does not break normal user sessions. Organizations are advised to apply Oracle’s update for their PeopleTools version once they confirm it is available in My Oracle Support.\u003c/p\u003e\n\n\u003ch2 id=\"compromise-hunting-guidance\"\u003eCompromise Hunting Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several indicators and behaviors organizations should investigate for signs of compromise. These include WebLogic access logs showing external POST requests to /PSEMHUB/hub or /PSIGW/HttpListeningConnector. Organizations should also look for unexpected .jsp files under the PSEMHUB.war web application directory.\u003c/p\u003e\n\n\u003cp\u003eAdditional signs include odd folders named logs, persistantstorage, or scratchpad under PSEMHUB paths. The article also calls out recently changed .xml files under the web document root’s envmetadata/data/environment path, which can be abused for XMLDecoder persistence that triggers on the next restart.\u003c/p\u003e\n\n\u003cp\u003eAnother sign is outbound SMB traffic on port 445 from PeopleSoft hosts to external destinations. The article says the exploit chain may use that traffic to capture machine-account NetNTLM hashes.\u003c/p\u003e\n\n\u003ch2 id=\"broader-significance-described-in-the-article\"\u003eBroader Significance Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article contrasts this operation with ShinyHunters’ recent activity involving vishing, stolen tokens, and weak access controls used to steal data from SaaS and education platforms. It cites prior targeting involving Salesforce customers and Canvas. The article describes the use of a server-side zero-day in on-premises ERP software as a step up from those methods, aimed at the same data-rich targets.\u003c/p\u003e\n\n\u003cp\u003eThe article closes by identifying an unresolved question: whether this was a one-off borrowed zero-day or the beginning of ShinyHunters moving into ERP exploitation.\u003c/p\u003e\n","keyPoints":["Google's Mandiant attributes the campaign to ShinyHunters, tracked as UNC6240, and says the activity occurred between May 27 and June 9 before Oracle published its advisory on June 10.","CVE-2026-35273 is a 9.8-rated remote code execution flaw in Oracle PeopleSoft Enterprise PeopleTools that requires no login or user interaction and affects PeopleTools 8.61 and 8.62, with earlier unsupported versions likely vulnerable.","Mandiant notified more than 100 organizations with vulnerable endpoints, and 68% of them were in higher education, mostly in the United States.","The University of Nottingham confirmed a breach, and Have I Been Pwned counted about 455,000 unique email addresses in the leaked data set.","Oracle recommends disabling the Environment Management Hub service or removing the PSEMHUB application, and if that is not possible, blocking external access to /PSEMHUB/* and /PSIGW/HttpListeningConnector."],"insights":["Restricting access to /PSEMHUB/* and /PSIGW/HttpListeningConnector is presented as a mitigation that does not break normal PeopleSoft user sessions, making perimeter blocking a low-disruption emergency control.","Mandiant warns that WAF body-inspection rules alone are insufficient because they can be bypassed, so endpoint access restriction is more reliable than relying only on request inspection.","The attackers exposed their own staging infrastructure, revealing operational artifacts such as MeshCentral agents disguised as Microsoft Azure binaries, a hardcoded SSH credential-spraying script, and command history showing data compression with zstd.","The exploit chain may leave multiple distinct traces beyond web logs, including unexpected JSP files, suspicious PSEMHUB subdirectories, modified XML files used for XMLDecoder persistence, and outbound SMB traffic to external destinations."],"referencedReports":[{"title":"ShinyHunters Targets Education Sector Using Oracle PeopleSoft Exploit","url":"https://cloud.google.com/blog/topics/threat-intelligence/shinyhunters-targets-education-sector-oracle-exploit/","publisher":"Google Cloud Mandiant","context":"The article cites Mandiant for attribution to UNC6240, the campaign timeline, victim notifications, attacker infrastructure, and compromise details.","category":"","primary":false},{"title":"Oracle Security Alert Advisory - CVE-2026-35273","url":"https://www.oracle.com/security-alerts/alert-cve-2026-35273.html","publisher":"Oracle","context":"The article cites Oracle's advisory for the PeopleSoft vulnerability details, affected PeopleTools versions, severity rating, and mitigation guidance.","category":"","primary":false}],"body":"\u003cp\u003eShinyHunters exploited an unpatched Oracle PeopleSoft flaw to break into enterprise systems, steal data, and demand payment to keep it private. Google’s Mandiant attributes the campaign to UNC6240 and dates the activity between May 27 and June 9. Oracle published its advisory on June 10, meaning the bug was a zero-day during the observed activity.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability, CVE-2026-35273, is a 9.8-rated remote code execution flaw in PeopleSoft Enterprise PeopleTools. It requires no login or user interaction and can be exploited over HTTP when the Environment Management Hub is reachable from the network. Oracle lists PeopleTools 8.61 and 8.62 as affected and says earlier unsupported versions are probably vulnerable too.\u003c/p\u003e\n\n\u003cp\u003eMandiant notified more than 100 organizations whose IP addresses matched vulnerable endpoints, with 68% in higher education and most in the United States. The University of Nottingham is one confirmed victim, with Have I Been Pwned counting about 455,000 unique email addresses in the leaked data set. Oracle recommends disabling or removing the Environment Management Hub/PSEMHUB exposure where possible, or blocking external access to key endpoints while organizations hunt for signs of compromise.\u003c/p\u003e\n"},{"n":27,"title":"Miasma and Hades Are Spreading Now: Detect Them on Developer Machines with Suspicious Files","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/miasma-and-hades-are-spreading-now-detect-them-on-developer-machines-with-suspicious-files","time":"16:11","priority":"MUST READ","score":92,"tldr":"StepSecurity warns that the Miasma npm worm and Hades PyPI campaign are actively spreading by running on project open or package import, stealing developer secrets and publishing tokens from machines. The article promotes Dev Machine Guard’s Suspicious Files feature as a way to detect the dropped files these attacks leave across developer fleets.","briefOverview":"\u003cp\u003eStepSecurity says the Miasma worm and its PyPI branch, Hades, are actively spreading across the npm and PyPI ecosystems. The article says these campaigns do not rely only on a build step or a careless install, but can run when a developer opens a project or imports a package. StepSecurity frames the urgent question for security teams as identifying which developer machines are affected right now.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Miasma and Hades as self-replicating campaigns that search for npm and PyPI publishing tokens and then republish infected versions of every package that token can publish. Miasma reportedly compromised 57 npm packages across more than 286 malicious versions on June 3, 2026, while Hades surfaced on PyPI on June 8 by compromising ensmallen and roughly two dozen related machine-learning and bioinformatics packages. StepSecurity also says the campaign reached Microsoft’s Azure GitHub organizations on June 5 and spread across 73 repositories in under two minutes.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the article says Miasma uses a small binding.gyp file in a technique called “Phantom Gyp,” while Hades uses an obfuscated hook in a package’s \u003cstrong\u003einit\u003c/strong\u003e.py that downloads a standalone Bun runtime and runs a JavaScript payload. StepSecurity argues that registry gateways, EDR, and SCA scanners can miss these attacks because they focus on installs, process behavior, or dependency manifests rather than suspicious files on developer machines. The article promotes Dev Machine Guard’s Suspicious Files feature as a way to detect files associated with these supply chain campaigns across enrolled developer machines.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eStepSecurity reports that the Miasma worm and its PyPI branch, Hades, are actively spreading across npm and PyPI. The article says the company’s research team tracked the Miasma npm wave on June 3, the attack on Microsoft’s Azure organizations on June 5, and the Hades PyPI campaign on June 8. It emphasizes that there were three waves in five days across two ecosystems. The main operational concern presented is quickly determining which developer machines are currently affected.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Miasma and Hades as worms that search for npm and PyPI publishing tokens once they land on a developer machine. It says the worms then republish infected versions of every package that a discovered token can publish. On June 3, 2026, Miasma reportedly compromised 57 npm packages across more than 286 malicious versions in under two hours, including @vapi-ai/server-sdk, which the article says had more than 408,000 monthly downloads. On June 8, Hades reportedly compromised ensmallen and roughly two dozen related machine-learning and bioinformatics packages on PyPI.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights a shift from install-time execution to open-time and import-time execution. Miasma’s npm variant is described as using “Phantom Gyp,” a 157-byte binding.gyp file that triggers code execution during npm install through the native build step while bypassing install-script security checks. The same actor is also described as infecting repositories so payloads run when a folder is opened in an IDE or AI coding assistant. Hades is described as executing on import through an obfuscated one-line hook embedded in \u003cstrong\u003einit\u003c/strong\u003e.py, which downloads a standalone Bun runtime and runs a JavaScript payload.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity argues that common defenses have blind spots against these campaigns. Registry gateways and cooldown policies are described as operating at install time, while these attacks may execute through binding.gyp files, import hooks, or repository files that run on folder open. EDR is described as less effective because Hades reads secrets directly from process memory, uses a legitimate signed Bun runtime downloaded on the fly, and lacks a classic malware binary or obvious disk-write pattern. SCA and dependency scanners are described as missing the relevant files because binding.gyp, \u003cstrong\u003einit\u003c/strong\u003e.py hooks, and editor configuration files may not appear in package manifests or lockfiles.\u003c/p\u003e\n\n\u003cp\u003eThe article presents StepSecurity’s Dev Machine Guard Suspicious Files feature as a response to this gap. It says the feature detects files associated with known supply chain attacks across enrolled developer machines, with rules authored and maintained by StepSecurity’s research team. The article lists coverage for Miasma and Hades artifacts including malicious binding.gyp files, editor and AI-tool configuration files, and auto-executing files such as .claude/setup.mjs, .cursor/rules/setup.mdc, .gemini/settings.json, .vscode/tasks.json, .vscode/setup.mjs, and .github/setup.js. StepSecurity says the feature provides detection records with file path, device, campaign, confidence level, SHA-256, matched rule, timestamps, and a condition breakdown.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity says the Miasma worm and its PyPI branch, Hades, are actively spreading across the npm and PyPI ecosystems. The article emphasizes that these campaigns do not only depend on a developer running an install or triggering a build step. Instead, the payloads can run when a developer opens a project or imports a package.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the central security problem as visibility into developer machines. It says the worms read secrets from process memory and target developer systems that may contain npm and PyPI publishing tokens, SSH keys, GitHub credentials, and CI/CD access. StepSecurity argues that the urgent question for security teams is which developer machines are affected right now.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-and-scope-described-in-the-article\"\u003eTimeline and scope described in the article\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity says its research team tracked multiple waves of the campaign over five days:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn June 3, 2026, the Miasma npm wave compromised 57 npm packages across more than 286 malicious versions.\u003c/li\u003e\n\u003cli\u003eOn June 5, the campaign hit Microsoft’s Azure GitHub organizations and disabled 73 repositories.\u003c/li\u003e\n\u003cli\u003eOn June 8, the Hades PyPI campaign compromised ensmallen and roughly two dozen related machine-learning and bioinformatics packages.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the Miasma npm campaign lasted under two hours and that the largest named victim was @vapi-ai/server-sdk, with more than 408,000 monthly downloads. It also says researchers counted hundreds of malicious artifacts across npm and PyPI. The Microsoft Azure-related wave is described as spreading across 73 repositories in under two minutes, with the broader campaign infecting more than 113 repositories across dozens of accounts.\u003c/p\u003e\n\n\u003ch2 id=\"worm-behavior-and-propagation\"\u003eWorm behavior and propagation\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Miasma and Hades as self-replicating worms. Once the malware lands on a developer machine, it searches for npm and PyPI publishing tokens. If it finds a token, it republishes infected versions of every package that token can publish.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity says this behavior makes each newly compromised developer or account a potential spreader. The article emphasizes that speed is a core feature of the campaign, because the package count can rise quickly as additional publishing tokens are exposed.\u003c/p\u003e\n\n\u003ch2 id=\"technical-execution-shift\"\u003eTechnical execution shift\u003c/h2\u003e\n\n\u003cp\u003eThe article states that traditional supply chain defenses often focus on install-time execution, especially malicious preinstall and postinstall lifecycle scripts in package.json. Miasma and Hades are described as moving execution to places those tools may not monitor. The article identifies the important shift as moving from install time to open time and import time.\u003c/p\u003e\n\n\u003ch3 id=\"miasma-and-phantom-gyp\"\u003eMiasma and “Phantom Gyp”\u003c/h3\u003e\n\n\u003cp\u003eMiasma’s npm variant is described as using a technique StepSecurity calls “Phantom Gyp.” Instead of using a lifecycle script, it ships a 157-byte binding.gyp file. The article says this triggers code execution during npm install through the native build step and bypasses install-script security checks.\u003c/p\u003e\n\n\u003cp\u003eThe article also says the same actor later infected repositories so the payload can run when a folder is opened in an IDE or AI coding assistant. This means the developer does not necessarily need to perform an npm install for the repository-based payload to execute.\u003c/p\u003e\n\n\u003ch3 id=\"hades-import-time-execution\"\u003eHades import-time execution\u003c/h3\u003e\n\n\u003cp\u003eHades, the PyPI branch, is described as executing on import. The malicious code is described as an obfuscated one-line hook embedded in a package’s \u003cstrong\u003einit\u003c/strong\u003e.py. When a developer imports the package, the hook downloads a standalone Bun runtime and runs a JavaScript payload.\u003c/p\u003e\n\n\u003cp\u003eThe article says this means a developer does not need to intentionally run anything malicious. Opening a project in VS Code or importing a dependency that has been used for years is described as enough to trigger execution.\u003c/p\u003e\n\n\u003ch2 id=\"files-and-execution-surfaces-highlighted\"\u003eFiles and execution surfaces highlighted\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity says the artifacts carrying these payloads can sit in the project tree and may not appear in package manifests or lockfile diffs. The article specifically names the following kinds of files and paths:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ebinding.gyp\u003c/li\u003e\n\u003cli\u003einjected \u003cstrong\u003einit\u003c/strong\u003e.py\u003c/li\u003e\n\u003cli\u003e.vscode/tasks.json\u003c/li\u003e\n\u003cli\u003e.claude/setup.mjs\u003c/li\u003e\n\u003cli\u003e.claude/settings.json\u003c/li\u003e\n\u003cli\u003e.cursor/rules/setup.mdc\u003c/li\u003e\n\u003cli\u003e.gemini/settings.json\u003c/li\u003e\n\u003cli\u003e.vscode/setup.mjs\u003c/li\u003e\n\u003cli\u003e.github/setup.js\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article highlights editor and AI-tool integration points as attractive to attackers because they execute with the developer’s own access and may require no package install. It names Anthropic Claude Code, Cursor, Google Gemini, Visual Studio Code, and GitHub Actions in connection with specific configuration or setup files.\u003c/p\u003e\n\n\u003ch2 id=\"why-stepsecurity-says-common-defenses-miss-the-campaigns\"\u003eWhy StepSecurity says common defenses miss the campaigns\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several defensive blind spots.\u003c/p\u003e\n\n\u003ch3 id=\"registry-gateways-and-cooldown-policies\"\u003eRegistry gateways and cooldown policies\u003c/h3\u003e\n\n\u003cp\u003eRegistry gateways and cooldown policies are described as install-time controls. They decide which package versions a client can fetch from the registry. StepSecurity argues that this is the wrong checkpoint for Miasma and Hades because the relevant execution may occur through a binding.gyp file, an import hook, or a repository file that runs when a folder is opened.\u003c/p\u003e\n\n\u003ch3 id=\"edr\"\u003eEDR\u003c/h3\u003e\n\n\u003cp\u003eEDR is described as being built to detect suspicious process behavior and known-bad binaries. The article says Hades was designed to slip past this model by reading secrets directly from process memory, without writing them to disk or making an obviously suspicious network connection. It also says Hades runs through a legitimate, signed Bun runtime downloaded on the fly, leaving no malware binary to fingerprint and no classic disk-write or exfiltration pattern to alert on.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that the Hades campaign includes AI prompt-injection content intended to misdirect automated AI triage systems that attempt to analyze it.\u003c/p\u003e\n\n\u003ch3 id=\"sca-and-dependency-scanners\"\u003eSCA and dependency scanners\u003c/h3\u003e\n\n\u003cp\u003eSCA and dependency scanners are described as inventorying what is declared in manifests and lockfiles. StepSecurity argues that the files carrying these payloads are not declared dependencies. A binding.gyp file, injected import hook, or editor configuration file may not show up in package.json or requirements.txt, leaving dependency-graph-based scanners with nothing to flag.\u003c/p\u003e\n\n\u003ch2 id=\"stepsecurity-s-promoted-response-suspicious-files\"\u003eStepSecurity’s promoted response: Suspicious Files\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Suspicious Files as a feature of StepSecurity’s Dev Machine Guard. It says the feature flags files associated with known supply chain attacks across enrolled developer machines. The detection rules are authored and maintained by StepSecurity’s research team and updated centrally.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity says current coverage includes artifacts behind the Miasma and Hades campaigns. The article specifically mentions detection of malicious binding.gyp files using the Phantom Gyp technique and editor or AI-tool configuration files that auto-execute when a project is opened or an AI coding session starts.\u003c/p\u003e\n\n\u003cp\u003eThe article says Suspicious Files works out of the box and does not require customers to write, tune, or maintain rules. It also says that when actors mutate, StepSecurity updates detection rules centrally and enrolled fleets are evaluated against them automatically.\u003c/p\u003e\n\n\u003ch2 id=\"detection-record-details\"\u003eDetection record details\u003c/h2\u003e\n\n\u003cp\u003eWhen a file is flagged, the article says the dashboard provides a full detection record including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe file path and the device where it was found.\u003c/li\u003e\n\u003cli\u003eThe attack campaign associated with the matching rule.\u003c/li\u003e\n\u003cli\u003eA confidence level for the detection.\u003c/li\u003e\n\u003cli\u003eThe file’s SHA-256 for correlation and threat-intelligence lookups.\u003c/li\u003e\n\u003cli\u003eThe matched rule and file-path pattern.\u003c/li\u003e\n\u003cli\u003eWhen the file was first and most recently seen on the device.\u003c/li\u003e\n\u003cli\u003eA condition breakdown showing which indicators matched and which were required.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that the condition breakdown is intended to make detections explainable rather than black-box alerts. StepSecurity says this helps validation and triage during a live incident.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-significance\"\u003eImpact and significance\u003c/h2\u003e\n\n\u003cp\u003eThe article says a compromised developer machine is a valuable foothold because it can contain publishing tokens, SSH keys, GitHub credentials with elevated scopes, and access to CI/CD systems. In the case of Miasma and Hades, the article says the worms immediately use publishing tokens they find to spread further. This makes developer workstations both a target and a propagation point.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity argues that traditional MDM tools understand device posture rather than developer workflows, EDR understands process behavior rather than supply chain tradecraft, and registry gateways understand installs rather than imports. The article positions malicious files on developer disks as falling between these existing controls.\u003c/p\u003e\n\n\u003ch2 id=\"availability-and-rollout\"\u003eAvailability and rollout\u003c/h2\u003e\n\n\u003cp\u003eSuspicious Files is described as part of Dev Machine Guard and as running on the same lightweight agent that customers already deploy through existing MDM or EDR tooling. The article says it supports macOS, Windows, and Linux. StepSecurity says there is no new agent to install and no detection content for customers to manage.\u003c/p\u003e\n\n\u003cp\u003eFor existing Dev Machine Guard users, the article says Suspicious Files is available in the dashboard under Developer Machines. For organizations not yet using Dev Machine Guard, the article points to StepSecurity’s Installation Script documentation and a demo request option.\u003c/p\u003e\n","keyPoints":["StepSecurity says the Miasma worm and its PyPI branch, Hades, are actively spreading across the npm and PyPI ecosystems by running when developers open projects or import packages.","Miasma compromised 57 npm packages across more than 286 malicious versions on June 3, 2026, while Hades later compromised ensmallen and roughly two dozen related machine-learning and bioinformatics packages on PyPI.","The article says Miasma uses a small binding.gyp file to trigger code execution during npm install, while Hades uses an obfuscated hook in __init__.py that downloads a Bun runtime and runs a JavaScript payload on import.","StepSecurity argues that registry gateways, EDR, and SCA scanners can miss these attacks because they focus on installs, process behavior, or declared dependencies rather than suspicious files on developer machines.","StepSecurity’s Dev Machine Guard Suspicious Files feature detects files associated with known supply chain attacks, including Miasma and Hades artifacts, using centrally managed detection rules maintained by StepSecurity."],"insights":["The campaign has shifted the critical detection point from package installation to developer workstation file state, because some payloads run when a folder is opened in an IDE or AI coding assistant rather than during a package install.","The article highlights AI coding tool configuration files, such as Claude Code, Cursor, Gemini, and VS Code settings or task files, as execution surfaces that attackers are using because they run with the developer’s own access.","Hades is described as using a legitimate, signed Bun runtime downloaded on the fly, which makes classic malware-binary fingerprinting less useful for detection.","The dashboard’s condition breakdown is positioned as an incident-response aid because it shows exactly which file indicators matched, allowing teams to validate suspicious-file detections during an active campaign."],"referencedReports":[],"body":"\u003cp\u003eStepSecurity says the Miasma worm and its PyPI branch, Hades, are actively spreading across the npm and PyPI ecosystems. The article says these campaigns do not rely only on a build step or a careless install, but can run when a developer opens a project or imports a package. StepSecurity frames the urgent question for security teams as identifying which developer machines are affected right now.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Miasma and Hades as self-replicating campaigns that search for npm and PyPI publishing tokens and then republish infected versions of every package that token can publish. Miasma reportedly compromised 57 npm packages across more than 286 malicious versions on June 3, 2026, while Hades surfaced on PyPI on June 8 by compromising ensmallen and roughly two dozen related machine-learning and bioinformatics packages. StepSecurity also says the campaign reached Microsoft’s Azure GitHub organizations on June 5 and spread across 73 repositories in under two minutes.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the article says Miasma uses a small binding.gyp file in a technique called “Phantom Gyp,” while Hades uses an obfuscated hook in a package’s \u003cstrong\u003einit\u003c/strong\u003e.py that downloads a standalone Bun runtime and runs a JavaScript payload. StepSecurity argues that registry gateways, EDR, and SCA scanners can miss these attacks because they focus on installs, process behavior, or dependency manifests rather than suspicious files on developer machines. The article promotes Dev Machine Guard’s Suspicious Files feature as a way to detect files associated with these supply chain campaigns across enrolled developer machines.\u003c/p\u003e\n"},{"n":16,"title":"From SQLi to RCE – Exploiting LangGraph’s Checkpointer","source":"research.checkpoint.com","sourceColorIdx":4,"link":"https://research.checkpoint.com/2026/from-sqli-to-rce-exploiting-langgraphs-checkpointer/","time":"13:37","priority":"SHOULD READ","score":88,"tldr":"Check Point Research found that LangGraph’s SQLite and Redis checkpointers could be abused through user-controlled state-history filters, with the SQLite SQL injection chaining into unsafe msgpack deserialization for remote code execution. Self-hosted users should upgrade to the patched LangGraph checkpoint packages immediately.","briefOverview":"\u003cp\u003eCheck Point Research analyzed LangGraph, an open-source framework for stateful AI agents, and uncovered three vulnerabilities in its persistence layer. Two vulnerabilities can be chained into remote code execution: a SQL injection in the SQLite checkpointer, tracked as CVE-2025-67644, and unsafe msgpack deserialization, tracked as CVE-2026-28277. A third issue, CVE-2026-27022, introduces the same injection class into the Redis checkpointer.\u003c/p\u003e\n\n\u003cp\u003eThe main risk applies to teams self-hosting LangGraph with the SQLite or Redis checkpointer when their application exposes \u003ccode\u003eget_state_history()\u003c/code\u003e with a user-controlled \u003ccode\u003efilter\u003c/code\u003e. In the SQLite chain, an attacker can use SQL injection to inject a fake checkpoint row containing attacker-controlled serialized data, which is then deserialized by LangGraph. LangChain patched the issues and users are advised to update to \u003ccode\u003elanggraph-checkpoint-sqlite 3.0.1+\u003c/code\u003e, \u003ccode\u003elanggraph 1.0.10+\u003c/code\u003e, and \u003ccode\u003elanggraph-checkpoint-redis 1.0.2+\u003c/code\u003e.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCheck Point Research reported three vulnerabilities in LangGraph’s checkpointer persistence layer. LangGraph is an open-source framework for building stateful, multi-agent AI systems and is described in the article as an extension of LangChain with over 50 million monthly downloads according to PyPI stats. The issues affect the SQLite and Redis checkpointer implementations used to store execution state.\u003c/p\u003e\n\n\u003cp\u003eThe first vulnerability, CVE-2025-67644, is a SQL injection in the SQLite checkpointer. It occurs when the \u003ccode\u003efilter\u003c/code\u003e parameter passed into the checkpointer’s \u003ccode\u003elist()\u003c/code\u003e function is processed by \u003ccode\u003e_metadata_predicate\u003c/code\u003e. The vulnerable code interpolates attacker-controlled filter keys into a JSON path inside a SQL \u003ccode\u003eWHERE\u003c/code\u003e clause.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that this SQL injection can be used to inject a \u003ccode\u003eUNION SELECT\u003c/code\u003e statement that returns a fake checkpoint row. That row can include attacker-controlled serialized data in the checkpoint BLOB field. When LangGraph processes the query results, it calls \u003ccode\u003eself.serde.loads_typed((type, checkpoint))\u003c/code\u003e, causing the supplied checkpoint data to be deserialized.\u003c/p\u003e\n\n\u003cp\u003eThe second vulnerability, CVE-2026-28277, is unsafe msgpack deserialization. LangGraph’s msgpack extension hook can import a module, retrieve a named function, and call it with attacker-controlled data. The article demonstrates that a crafted msgpack payload can use \u003ccode\u003eos\u003c/code\u003e, \u003ccode\u003esystem\u003c/code\u003e, and a command string to execute shell commands.\u003c/p\u003e\n\n\u003cp\u003eThe third issue, CVE-2026-27022, affects \u003ccode\u003elanggraph-checkpoint-redis\u003c/code\u003e and involves user-controlled keys in the \u003ccode\u003efilter\u003c/code\u003e dictionary being interpolated directly into a query instead of being bound as parameters. The article states that the same preconditions apply: an application must expose \u003ccode\u003eget_state_history()\u003c/code\u003e with a user-controlled filter and use the Redis checkpointer. LangChain patched the issues in \u003ccode\u003elanggraph-checkpoint-sqlite 3.0.1+\u003c/code\u003e, \u003ccode\u003elanggraph 1.0.10+\u003c/code\u003e, and \u003ccode\u003elanggraph-checkpoint-redis 1.0.2+\u003c/code\u003e, while LangSmith Deployment is not vulnerable because it runs PostgreSQL.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCheck Point Research analyzed LangGraph’s persistence layer and reported three vulnerabilities affecting its checkpointer implementations. LangGraph is described as an open-source framework for building stateful, multi-agent AI systems with built-in persistence. The article says it is an extension of LangChain and has over 50 million monthly downloads according to PyPI stats.\u003c/p\u003e\n\n\u003cp\u003eTwo of the vulnerabilities can be chained into remote code execution. These are CVE-2025-67644, a SQL injection in the SQLite checkpointer, and CVE-2026-28277, an unsafe msgpack deserialization issue. A third vulnerability, CVE-2026-27022, introduces the same injection class into the Redis checkpointer.\u003c/p\u003e\n\n\u003ch2 id=\"affected-configurations\"\u003eAffected configurations\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the main at-risk users as teams self-hosting LangGraph with the SQLite or Redis checkpointer. The stated precondition is that the application exposes \u003ccode\u003eget_state_history()\u003c/code\u003e with a user-controlled \u003ccode\u003efilter\u003c/code\u003e. LangChain’s managed cloud service, LangSmith Deployment, formerly LangGraph Platform, is not vulnerable because it runs PostgreSQL.\u003c/p\u003e\n\n\u003cp\u003eThe article states that LangChain patched all three issues. Users are advised to update to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003elanggraph-checkpoint-sqlite 3.0.1+\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003elanggraph 1.0.10+\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003elanggraph-checkpoint-redis 1.0.2+\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"langgraph-checkpointers\"\u003eLangGraph checkpointers\u003c/h2\u003e\n\n\u003cp\u003eLangGraph checkpointers are the framework’s persistence layer for storing execution state at each step. The article says LangGraph supports SQLite and PostgreSQL checkpointer implementations, and later discusses a Redis checkpointer package. The SQLite checkpointer stores checkpoint data in a \u003ccode\u003echeckpoints\u003c/code\u003e table.\u003c/p\u003e\n\n\u003cp\u003eThe SQLite table includes fields such as \u003ccode\u003ethread_id\u003c/code\u003e, \u003ccode\u003echeckpoint_ns\u003c/code\u003e, \u003ccode\u003echeckpoint_id\u003c/code\u003e, \u003ccode\u003eparent_checkpoint_id\u003c/code\u003e, \u003ccode\u003etype\u003c/code\u003e, \u003ccode\u003echeckpoint\u003c/code\u003e, and \u003ccode\u003emetadata\u003c/code\u003e. The \u003ccode\u003emetadata\u003c/code\u003e column stores contextual information in JSON format. The \u003ccode\u003echeckpoint\u003c/code\u003e column contains serialized checkpoint data that is later deserialized when results are processed.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2025-67644-sqlite-checkpointer-sql-injection\"\u003eCVE-2025-67644: SQLite checkpointer SQL injection\u003c/h2\u003e\n\n\u003cp\u003eCVE-2025-67644 is a SQL injection in the SQLite checkpointer. The vulnerable flow begins with the \u003ccode\u003elist()\u003c/code\u003e function, which accepts a \u003ccode\u003efilter\u003c/code\u003e parameter used to query checkpoints based on metadata. This filter is passed to an internal function called \u003ccode\u003e_metadata_predicate\u003c/code\u003e, which constructs SQL predicates.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights the vulnerable line:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003ejson_extract(CAST(metadata AS TEXT), '$.{query_key}') {operator}\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe problem is that \u003ccode\u003equery_key\u003c/code\u003e comes from the filter dictionary and is interpolated into the SQL expression. An attacker-controlled key containing a quote character can escape the JSON path string and inject SQL code.\u003c/p\u003e\n\n\u003ch2 id=\"from-sql-injection-to-arbitrary-deserialization\"\u003eFrom SQL injection to arbitrary deserialization\u003c/h2\u003e\n\n\u003cp\u003eThe SQL query used by \u003ccode\u003elist()\u003c/code\u003e selects checkpoint records from the \u003ccode\u003echeckpoints\u003c/code\u003e table, including the \u003ccode\u003etype\u003c/code\u003e, \u003ccode\u003echeckpoint\u003c/code\u003e, and \u003ccode\u003emetadata\u003c/code\u003e columns. After results are retrieved, LangGraph processes each row and calls \u003ccode\u003eself.serde.loads_typed((type, checkpoint))\u003c/code\u003e. This means that checkpoint data returned by the SQL query is deserialized.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that an attacker can use the SQL injection to add a \u003ccode\u003eUNION SELECT\u003c/code\u003e that returns a fake checkpoint row. In that injected row, the attacker can supply values for fields such as \u003ccode\u003ethread_id\u003c/code\u003e, \u003ccode\u003echeckpoint_ns\u003c/code\u003e, \u003ccode\u003echeckpoint_id\u003c/code\u003e, \u003ccode\u003etype\u003c/code\u003e, \u003ccode\u003echeckpoint\u003c/code\u003e, and \u003ccode\u003emetadata\u003c/code\u003e. If the fake row specifies a serialized payload in the \u003ccode\u003echeckpoint\u003c/code\u003e column, LangGraph will deserialize that attacker-controlled data while processing the query results.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2026-28277-unsafe-msgpack-deserialization\"\u003eCVE-2026-28277: Unsafe msgpack deserialization\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-28277 is an unsafe msgpack deserialization issue in LangGraph’s serialization logic. The article reviews the \u003ccode\u003eloads_typed()\u003c/code\u003e function, which handles multiple serialization types. It supports \u003ccode\u003enull\u003c/code\u003e, \u003ccode\u003ebytes\u003c/code\u003e, \u003ccode\u003ebytearray\u003c/code\u003e, \u003ccode\u003ejson\u003c/code\u003e, \u003ccode\u003emsgpack\u003c/code\u003e, and, if enabled, \u003ccode\u003epickle\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that pickle fallback is disabled by default and that JSON deserialization with an object hook does not lead to code execution in this case. The relevant path is msgpack, where the code calls \u003ccode\u003eormsgpack.unpackb()\u003c/code\u003e with a custom extension hook. That hook is used by LangGraph to support custom Python objects.\u003c/p\u003e\n\n\u003cp\u003eFor msgpack extension data using \u003ccode\u003eEXT_CONSTRUCTOR_SINGLE_ARG\u003c/code\u003e, the hook unpacks a tuple and executes:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003egetattr(importlib.import_module(tup[0]), tup[1])(tup[2])\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe article states that if an attacker controls the serialized data, they control the extension code and the data bytes. By supplying a tuple such as \u003ccode\u003eos\u003c/code\u003e, \u003ccode\u003esystem\u003c/code\u003e, and a command string like \u003ccode\u003eecho PWN \u0026gt; /tmp/pwned.txt\u003c/code\u003e, the deserialization path imports \u003ccode\u003eos\u003c/code\u003e, retrieves \u003ccode\u003esystem\u003c/code\u003e, and calls it with the attacker-controlled command.\u003c/p\u003e\n\n\u003ch2 id=\"combined-attack-chain\"\u003eCombined attack chain\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the attack chain as beginning when a developer exposes \u003ccode\u003eget_state_history()\u003c/code\u003e. That method internally calls the checkpointer’s \u003ccode\u003elist()\u003c/code\u003e method to retrieve historical checkpoints. If the \u003ccode\u003efilter\u003c/code\u003e parameter comes from user input without sanitization, an attacker controls dictionary keys passed into the SQL injection vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe described attack flow is:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe attacker crafts a malicious msgpack payload containing instructions to execute arbitrary code.\u003c/li\u003e\n\u003cli\u003eThe attacker sends a malicious \u003ccode\u003efilter\u003c/code\u003e parameter that exploits the SQL injection vulnerability.\u003c/li\u003e\n\u003cli\u003eThe SQL injection adds a fake checkpoint row to the database query results, with the checkpoint column containing the malicious msgpack payload.\u003c/li\u003e\n\u003cli\u003eThe application processes the query results and deserializes the malicious checkpoint.\u003c/li\u003e\n\u003cli\u003eThe unsafe deserialization executes the payload, resulting in remote code execution on the server.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"cve-2026-27022-redis-checkpointer-injection\"\u003eCVE-2026-27022: Redis checkpointer injection\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-27022 affects \u003ccode\u003elanggraph-checkpoint-redis\u003c/code\u003e. The article says the same injection class affects the Redis checkpointer because user-controlled keys in the \u003ccode\u003efilter\u003c/code\u003e dictionary are interpolated directly into the query instead of being bound as parameters. The stated preconditions match CVE-2025-67644: the application exposes \u003ccode\u003eget_state_history()\u003c/code\u003e with a user-controlled filter and uses the Redis checkpointer.\u003c/p\u003e\n\n\u003cp\u003eThe Redis issue was patched in \u003ccode\u003elanggraph-checkpoint-redis 1.0.2\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"additional-sql-injection-findings\"\u003eAdditional SQL injection findings\u003c/h2\u003e\n\n\u003cp\u003eThe article also describes additional defense-in-depth SQL injection issues in both SQLite and PostgreSQL checkpointers. These involved direct concatenation of integer values, including \u003ccode\u003eLIMIT\u003c/code\u003e and \u003ccode\u003ettl\u003c/code\u003e parameters, into SQL queries instead of using parameterized bindings. The article notes that Python does not enforce type hints at runtime, so those parameters could still accept malicious string input.\u003c/p\u003e\n\n\u003cp\u003eCheck Point Research says it worked with the LangChain team during disclosure to remediate these issues using parameterized queries.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-response\"\u003eDisclosure and response\u003c/h2\u003e\n\n\u003cp\u003eThe article provides the following disclosure timeline:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e2025-11-19: CVE-2025-67644, CVE-2026-28227, and CVE-2026-27022 were disclosed to the LangChain team.\u003c/li\u003e\n\u003cli\u003e2025-12-10: CVE-2025-67644 was fixed and publicly released in \u003ccode\u003elanggraph-checkpoint-sqlite 3.0.1\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e2026-02-20: CVE-2026-27022 was fixed and publicly released in \u003ccode\u003elanggraph-checkpoint-redis 1.0.2\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e2026-03-05: CVE-2026-28277 was fixed and publicly released in \u003ccode\u003elanggraph-checkpoint 4.0.1\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the LangChain team responded quickly to fix the critical SQL injection vulnerability, which effectively breaks the attack chain described in the research. It also says the team continued working on additional remediation efforts, including the msgpack deserialization issue.\u003c/p\u003e\n\n\u003ch2 id=\"additional-research-note\"\u003eAdditional research note\u003c/h2\u003e\n\n\u003cp\u003eThe article says there was significant community research into LangGraph security during November and December 2025. It also states that other security researchers independently discovered CVE-2025-67644 and CVE-2026-28277. The article says full credits can be found in LangChain’s security advisories.\u003c/p\u003e\n","keyPoints":["Check Point Research analyzed LangGraph’s persistence layer and uncovered three vulnerabilities affecting its checkpointer implementations.","CVE-2025-67644 is a SQL injection in the SQLite checkpointer caused by attacker-controlled filter keys being interpolated into a JSON path in the SQL WHERE clause.","CVE-2026-28277 is an unsafe msgpack deserialization issue where crafted extension data can import a module and call a function such as os.system with attacker-controlled input.","The SQLite SQL injection can be chained with the msgpack deserialization issue to achieve remote code execution when an application exposes get_state_history() with a user-controlled filter.","LangChain patched the issues and advised users to update to langgraph-checkpoint-sqlite 3.0.1+, langgraph 1.0.10+, and langgraph-checkpoint-redis 1.0.2+."],"insights":["The attack chain depends on applications exposing get_state_history() with a user-controlled filter, so restricting or validating that filter can reduce exposure even before considering the deserialization flaw.","LangChain’s managed LangSmith Deployment is not affected because it runs PostgreSQL rather than the vulnerable SQLite or Redis checkpointer configurations described in the article.","The SQL injection is especially dangerous because it can inject a UNION SELECT row that never needs to exist in the checkpoints table but is still deserialized as if it were legitimate checkpoint data.","The article notes additional defense-in-depth SQL injection issues involving integer parameters such as LIMIT and ttl, highlighting that Python type hints alone did not prevent malicious string input at runtime."],"referencedReports":[{"title":"LangGrinch LangChain Core CVE-2025-68664","url":"https://cyata.ai/blog/langgrinch-langchain-core-cve-2025-68664/","publisher":"Cyata","context":"The article references this LangGrinch research when discussing LangGraph’s JSON deserialization behavior and noting that it does not lead to code execution in this case.","category":"","primary":false}],"body":"\u003cp\u003eCheck Point Research analyzed LangGraph, an open-source framework for stateful AI agents, and uncovered three vulnerabilities in its persistence layer. Two vulnerabilities can be chained into remote code execution: a SQL injection in the SQLite checkpointer, tracked as CVE-2025-67644, and unsafe msgpack deserialization, tracked as CVE-2026-28277. A third issue, CVE-2026-27022, introduces the same injection class into the Redis checkpointer.\u003c/p\u003e\n\n\u003cp\u003eThe main risk applies to teams self-hosting LangGraph with the SQLite or Redis checkpointer when their application exposes \u003ccode\u003eget_state_history()\u003c/code\u003e with a user-controlled \u003ccode\u003efilter\u003c/code\u003e. In the SQLite chain, an attacker can use SQL injection to inject a fake checkpoint row containing attacker-controlled serialized data, which is then deserialized by LangGraph. LangChain patched the issues and users are advised to update to \u003ccode\u003elanggraph-checkpoint-sqlite 3.0.1+\u003c/code\u003e, \u003ccode\u003elanggraph 1.0.10+\u003c/code\u003e, and \u003ccode\u003elanggraph-checkpoint-redis 1.0.2+\u003c/code\u003e.\u003c/p\u003e\n"},{"n":20,"title":"The Gentlemen Ransomware Claims 478 Victims, Can Spread Like a Worm","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/the-gentlemen-ransomware-claims-478.html","time":"16:50","priority":"SHOULD READ","score":88,"tldr":"The Gentlemen ransomware group has rapidly grown into a major RaaS operation with 478 claimed victims, evolving from affiliate activity into an independent program led by a Russian-speaking actor tied to prior ransomware crews. Its Go-based ransomware can spread worm-like across networks, supports multiple platforms, and is backed by mature affiliate support, BYOVD evasion, and aggressive double-extortion tactics.","briefOverview":"\u003cp\u003eA PRODAFT analysis says The Gentlemen ransomware operation, tracked by the company as Phantom Mantis, evolved from an affiliate conducting double-extortion attacks into an independent partnership program in July 2025. The group previously leveraged resources from RaaS schemes including LockBit, Qilin, and Medusa. The Gentlemen has been active since March 2025 and has claimed 478 victims to date, according to Ransomware.Live data cited in the article.\u003c/p\u003e\n\n\u003cp\u003ePRODAFT attributes leadership of the group to a Russian-speaking cybercriminal it tracks as LARVA-368, who used aliases including hastalamuerte, ArmCorp, zeta88, nobody0, and santamuerte. The article says cybersecurity journalist Brian Krebs identified the individual as Alexander Andreevich Yapaev from Izhevsk, Russia, and PRODAFT told The Hacker News its findings match that persona with high confidence. The group reportedly offers affiliates a 90% profit share and requires applicants to submit at least 1GB of stolen victim data before receiving affiliate panel access.\u003c/p\u003e\n\n\u003cp\u003eTechnically, The Gentlemen supports ransomware variants for Windows, Linux, ESXi, Windows XP+, and Logical Volume Manager environments. Microsoft tracks the cluster as Storm-2697 and says its Go-based Windows ransomware is obfuscated with Garble and can become self-propagating when run with the \u0026ndash;spread argument. The article also describes use of BYOVD-based EDR killing, edge-device access through platforms such as Cisco and Fortinet FortiGate, Windows log clearing, Microsoft Defender disabling, and multi-channel extortion pressure.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA new PRODAFT report describes The Gentlemen ransomware operation as the result of an evolution by Phantom Mantis, a financially motivated threat group that initially acted as an affiliate for double-extortion attacks. The group used resources from RaaS operations such as LockBit, Qilin, and Medusa before becoming an independent partnership program in July 2025. The Gentlemen has been active since March 2025 and has claimed 478 victims, according to Ransomware.Live data cited in the article.\u003c/p\u003e\n\n\u003cp\u003ePRODAFT says Phantom Mantis is led by a Russian-speaking cybercriminal it tracks as LARVA-368, who has used aliases including hastalamuerte, ArmCorp, zeta88, nobody0, and santamuerte. The article says LARVA-368 was previously a member of the Embargo ransomware group before launching ArmCorp, which was later rebranded as The Gentlemen. Brian Krebs identified the individual as Alexander Andreevich Yapaev from Izhevsk, Russia, and PRODAFT told The Hacker News its findings matched that persona with high confidence.\u003c/p\u003e\n\n\u003cp\u003eThe group’s move away from Qilin coincided with a payment dispute in which LARVA-368 accused the RaaS operation of an exit scam and of defrauding them of $48,000. PRODAFT also noted claims from LARVA-368 and LARVA-367 that Qilin was scamming affiliates and had an alleged backdoor in affiliate-panel victim chats, though PRODAFT said it could not confirm those claims. The article says the claims may have been disinformation intended to recruit Qilin affiliates by discrediting the group.\u003c/p\u003e\n\n\u003cp\u003eThe Gentlemen operates a structured affiliate model with a 90% affiliate and 10% operator split, support through Tox, SimpleX Chat, and Ricochet Refresh, and an affiliate panel for user management, target configuration, and ransomware downloads. Applicants must provide at least 1GB of exfiltrated victim data before gaining panel access, a measure described as intended to keep out researchers and law enforcement. The group provides ransomware versions for Windows, Linux, ESXi, Windows XP+, and Logical Volume Manager.\u003c/p\u003e\n\n\u003cp\u003eThe article summarizes a broad intrusion toolkit and tactics, including initial access through edge devices such as VPN appliances, firewalls, Cisco systems, and Fortinet FortiGate. It cites use of tools such as NetExec, RelayKing, TaskHound, PrivHound, CertiHound, EDRStartupHinder, gfreeze, glinker, DumpBrowserSecrets, and Velociraptor. Reported behaviors include BYOVD-based EDR killing, Active Directory discovery, certificate abuse, privilege escalation, file share discovery, clearing Windows Event Logs, disabling Microsoft Defender, and adding antivirus exclusions.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft tracks the cluster as Storm-2697 and says the ransomware is written in Go, obfuscated with Garble, and can turn into a self-propagating worm when launched with the \u0026ndash;spread argument. The ransomware uses X25519 key exchange and XChaCha20 symmetric encryption, and a \u0026ndash;wipe option can remove recoverable artifacts after encryption. Other cited research describes multi-channel extortion using email and phone pressure, a same-day patch after a decryptor appeared in April 2026, average dwell times of two to six weeks, and a focus on organizations running VMware infrastructure.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003ePRODAFT published a detailed analysis of The Gentlemen ransomware operation, which it tracks as Phantom Mantis. The report says the financially motivated group initially operated as an affiliate conducting double-extortion attacks while using resources from RaaS schemes including LockBit, Qilin, and Medusa. In July 2025, Phantom Mantis transitioned into The Gentlemen, an independent partnership program no longer dependent on other RaaS groups.\u003c/p\u003e\n\n\u003cp\u003eThe Gentlemen has been active since March 2025 and has claimed 478 victims to date, according to Ransomware.Live data cited in the article. The article also cites other reporting that described the group as one of the most active ransomware actors, accounting for 10% of ransomware activity in April 2026. Victims are reported across multiple regions, with only about 13% based in the United States and many concentrated in Thailand, the United Kingdom, Brazil, Germany, and India.\u003c/p\u003e\n\n\u003ch2 id=\"actor-attribution-and-evolution\"\u003eActor Attribution and Evolution\u003c/h2\u003e\n\n\u003cp\u003ePRODAFT says Phantom Mantis is led by a Russian-speaking cybercriminal it tracks as LARVA-368. The individual has used online aliases including hastalamuerte, ArmCorp, zeta88, nobody0, and santamuerte. The article says LARVA-368 relies heavily on artificial intelligence for ransomware and tool development, maintenance, and post-exploitation assistance.\u003c/p\u003e\n\n\u003cp\u003eThe article says LARVA-368 is assessed to have been a member of the Embargo ransomware group before launching an operation under the name ArmCorp. ArmCorp was later rebranded as The Gentlemen. Cybersecurity journalist Brian Krebs identified the individual as 36-year-old Alexander Andreevich Yapaev from Izhevsk, Russia, and PRODAFT told The Hacker News that its findings match the same persona with high confidence.\u003c/p\u003e\n\n\u003cp\u003eThe shift toward The Gentlemen reportedly coincided with a dispute between LARVA-368 and Qilin. LARVA-368 accused Qilin of conducting an exit scam and defrauding them of $48,000. PRODAFT also described claims from LARVA-368 and LARVA-367, also known as DevMan, that Qilin was scamming affiliates and had an alleged backdoor in affiliate-panel victim chats; PRODAFT said it could not confirm those claims and noted they may have been disinformation intended to recruit Qilin affiliates.\u003c/p\u
