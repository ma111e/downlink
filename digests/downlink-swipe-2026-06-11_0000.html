003e\n\n\u003ch2 id=\"affiliate-program-and-operations\"\u003eAffiliate Program and Operations\u003c/h2\u003e\n\n\u003cp\u003eThe Gentlemen operates as a RaaS-style partnership program. The article says it courts affiliates with an aggressive profit-sharing model of 90% for affiliates and 10% for the operator. Support for affiliates is provided through The Gentlemen IM app accounts and through messaging platforms including Tox, SimpleX Chat, and Ricochet Refresh.\u003c/p\u003e\n\n\u003cp\u003eThe group reportedly uses an affiliate panel that supports user management, configuring new targets, and downloading ransomware tied to a specific target. To gain access, potential affiliates must provide at least 1GB of exfiltrated victim data to the administrator. The article says this requirement is designed to prevent researchers and law enforcement from gaining access to the infrastructure while posing as affiliates.\u003c/p\u003e\n\n\u003cp\u003eThe group has also been observed paying for Premium accounts on underground forums to increase visibility and fend off competition. A separate Russian-speaking persona named The Gentlemen Data handles communication and technical support. The group provides five ransomware versions designed for Windows, Linux, ESXi, Windows XP+, and Logical Volume Manager environments.\u003c/p\u003e\n\n\u003ch2 id=\"technical-capabilities\"\u003eTechnical Capabilities\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft tracks the cluster as Storm-2697 and says the Windows ransomware is written in Go and obfuscated with Garble. The ransomware can be run with a \u0026ndash;spread argument, which Microsoft said turns it from a single-host encryptor into a self-propagating worm that attempts to deploy the encryptor to every reachable system on the network. A \u0026ndash;wipe argument triggers an additional post-encryption routine to eliminate recoverable artifacts from disk.\u003c/p\u003e\n\n\u003cp\u003eThe ransomware uses a hybrid cryptographic scheme. The article cites X25519 key exchange combined with XChaCha20 symmetric encryption. LevelBlue\u0026rsquo;s Cybereason team described The Gentlemen as a highly adaptive, fast-moving ransomware operation that combines mature ransomware techniques with RaaS features, double extortion, cross-platform lockers, flexible propagation, and affiliate support.\u003c/p\u003e\n\n\u003cp\u003eThe group is also described as having a highly responsive development cycle. ZeroFox reported that the group released a same-day patch after a decryptor was released in April 2026. This is presented in the article as an example of how quickly the operation adapts its tooling.\u003c/p\u003e\n\n\u003ch2 id=\"intrusion-chain-and-tooling\"\u003eIntrusion Chain and Tooling\u003c/h2\u003e\n\n\u003cp\u003eInitial access is obtained through edge devices such as VPN appliances, firewalls, and other internet-facing systems. The article specifically mentions a focus on platforms such as Cisco and Fortinet FortiGate. NCC Group said The Gentlemen follows an enterprise-focused chain beginning with initial access through vulnerable internet-facing services or stolen credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several tools used during infection chains and post-exploitation activity:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNetExec, RelayKing, TaskHound, PrivHound, and CertiHound for Active Directory discovery, certificate abuse, privilege escalation, and file share discovery.\u003c/li\u003e\n\u003cli\u003eEDRStartupHinder, gfreeze, glinker, and DumpBrowserSecrets for evasion of security programs and credential-related activity.\u003c/li\u003e\n\u003cli\u003eVelociraptor for command-and-control.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe attacks attempt to clear System, Application, and Security Windows Event Logs. They also disable Microsoft Defender and add antivirus exclusions. LARVA-368 provides EDR killers to affiliates to bypass security tools using the bring your own vulnerable driver technique.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerabilities-and-infrastructure\"\u003eVulnerabilities and Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eA leaked internal Rocket.Chat database used by the group contained 3,366 messages from November 2025 to late April 2026. The article says the leak showed details about the group’s internal workings, including use of known flaws in VMware Aria Operations, Fortinet, Cisco, and Microsoft software. It also described a criminal enterprise with a clear division of roles and responsibilities.\u003c/p\u003e\n\n\u003cp\u003eCheck Point said the group tracks and evaluates modern vulnerabilities, including CVE-2024-55591, CVE-2025-32433, and CVE-2025-33073. The group combines these with technique-driven paths such as backup abuse, management-controller abuse, and NTLM relay workflows. The article describes this as giving the group a flexible exploitation pipeline.\u003c/p\u003e\n\n\u003cp\u003eIn March 2026, Hunt.io discovered an open directory hosted at 176.120.22[.]127:80 on the Russian bulletproof hosting provider Proton66. The directory exposed 126 files that contained a complete ransomware operator toolkit attributed to a The Gentlemen RaaS affiliate. The toolkit included files for reconnaissance, privilege escalation, defense evasion, credential theft, lateral movement, persistence, and pre-encryption preparation.\u003c/p\u003e\n\n\u003ch2 id=\"victims-impact-and-extortion-model\"\u003eVictims, Impact, and Extortion Model\u003c/h2\u003e\n\n\u003cp\u003eThe Gentlemen has claimed 478 victims to date. According to the article, victim distribution includes Thailand, the United Kingdom, Brazil, Germany, and India, while approximately 13% of victims are based in the United States. The group focuses particularly on organizations running VMware infrastructure, according to Red Piranha.\u003c/p\u003e\n\n\u003cp\u003eThe article says the average dwell time of an intrusion ranges from two to six weeks from initial access to encryption. ZeroFox assessed that the group likely runs a multi-channel extortion operation that combines ransomware attacks with email outreach and phone-based pressure against victims. The group’s double-extortion activity is part of its operating model, and its affiliate program supports target configuration and deployment of ransomware for specific victims.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article presents The Gentlemen as a fast-growing and technically adaptable ransomware operation that has moved from affiliate work to an independent RaaS program. Its significance comes from its large claimed victim count, multi-platform ransomware, affiliate structure, and ability to support worm-like spreading when the \u0026ndash;spread option is enabled. The group also shows operational maturity through affiliate vetting, technical support, rapid tooling updates, and a broad toolkit spanning the intrusion lifecycle.\u003c/p\u003e\n\n\u003cp\u003eThe central finding is that The Gentlemen is not simply a renamed ransomware strain but a developed criminal ecosystem. The article ties together leadership attribution, affiliate recruitment, technical capabilities, leaked internal communications, tooling exposure, and multiple third-party analyses to show how the group operates. PRODAFT concludes that LARVA-368 has been active in extortion-related activity since at least 2020 and used expertise from earlier RaaS collaborations to establish The Gentlemen RaaS.\u003c/p\u003e\n","keyPoints":["PRODAFT tracks The Gentlemen operation as Phantom Mantis and says it transitioned in July 2025 from an affiliate using other RaaS resources into an independent partnership program.","The Gentlemen has claimed 478 victims to date, and reports cited in the article say it accounted for 10% of ransomware activity in April 2026.","Microsoft tracks the cluster as Storm-2697 and says its Go-based ransomware can become self-propagating across reachable network systems when run with the --spread argument.","The group provides Windows, Linux, ESXi, Windows XP+, and Logical Volume Manager ransomware versions and offers affiliates a 90% profit share.","The article says The Gentlemen uses tactics and tools including BYOVD-based EDR killing, vulnerable edge-device access, red team utilities, log clearing, Microsoft Defender disabling, and multi-channel extortion."],"insights":["The Gentlemen uses an anti-infiltration affiliate vetting process that requires applicants to provide at least 1GB of stolen victim data before accessing the affiliate panel.","LARVA-368 reportedly relies heavily on artificial intelligence to develop and maintain ransomware and tools, as well as to assist with post-exploitation procedures.","The group demonstrated a highly responsive development cycle by releasing a same-day patch after a decryptor became available in April 2026.","The leaked internal Rocket.Chat database showed that the group actively evaluates modern vulnerabilities and combines them with techniques such as backup abuse, management-controller abuse, and NTLM relay workflows.","The ransomware’s --wipe option performs an additional post-encryption routine to remove recoverable artifacts from disk, making recovery harder after encryption."],"referencedReports":[{"title":"Inside the Phantom Mantis Operation","url":"https://catalyst.prodaft.com/public/report/inside-the-phantom-mantis-operation/overview","publisher":"PRODAFT","context":"The article says a detailed PRODAFT report revealed that Phantom Mantis evolved from an affiliate operation into The Gentlemen independent RaaS program.","category":"","primary":false},{"title":"The Gentlemen Ransomware","url":"https://www.cybereason.com/blog/the-gentlemen-ransomware","publisher":"LevelBlue Cybereason","context":"The article cites Cybereason's analysis describing The Gentlemen as a highly adaptive ransomware operation with RaaS features and flexible propagation.","category":"","primary":false},{"title":"Threat Assessment: The Gentlemen Ransomware Group","url":"https://www.halcyon.ai/ransomware-research-reports/threat-assessment-the-gentlemen-ransomware-group","publisher":"Halcyon","context":"The article references Halcyon's threat assessment while discussing The Gentlemen's emergence as one of the most active ransomware actors.","category":"","primary":false},{"title":"NCC Group Monthly Threat Pulse Review of April 2026","url":"https://www.nccgroup.com/newsroom/ncc-group-monthly-threat-pulse-review-of-april-2026/","publisher":"NCC Group","context":"The article quotes NCC Group's monthly threat pulse on The Gentlemen's enterprise-focused attack chain and adaptive tactics.","category":"","primary":false},{"title":"Gentlemen Ransomware Leak","url":"https://socradar.io/blog/gentlemen-ransomware-leak/","publisher":"SOCRadar","context":"The article cites SOCRadar for victim geography, including that about 13% of The Gentlemen's victims are based in the U.S.","category":"","primary":false},{"title":"The Gentlemen Ransomware Defense Evasion TTPs","url":"https://www.huntress.com/blog/the-gentlemen-ransomware-defense-evasion-ttps","publisher":"Huntress","context":"The article references Huntress research on The Gentlemen's attempts to clear Windows Event Logs, disable Microsoft Defender, and add antivirus exclusions.","category":"","primary":false},{"title":"The Gentlemen Russia RaaS Operation Rocket Leak Analysis","url":"https://falconfeeds.io/blogs/the-gentlemen-russia-raas-operation-rocket-leak-analysis/","publisher":"FalconFeeds","context":"The article cites FalconFeeds for details on The Gentlemen ransomware's hybrid cryptographic scheme using X25519 and XChaCha20.","category":"","primary":false},{"title":"The Gentlemen Ransomware: Dissecting a Self-Propagating Go Encryptor","url":"https://www.microsoft.com/en-us/security/blog/2026/05/28/the-gentlemen-ransomware-dissecting-a-self-propagating-go-encryptor/","publisher":"Microsoft","context":"The article cites Microsoft research tracking the cluster as Storm-2697 and describing the ransomware's Go implementation, Garble obfuscation, spread mode, and wipe option.","category":"","primary":false},{"title":"The Gentlemen: A ZeroFox Intelligence Threat Actor Profile","url":"https://www.zerofox.com/reports/the-gentlemen-a-zerofox-intelligence-threat-actor-profile/","publisher":"ZeroFox","context":"The article references ZeroFox's intelligence profile for The Gentlemen's multi-channel extortion tactics and rapid same-day patch after a decryptor release.","category":"","primary":false},{"title":"The Gentlemen Ransomware Analysis","url":"https://redpiranha.net/news/the-gentlemen-ransomware-analysis","publisher":"Red Piranha","context":"The article cites Red Piranha for average intrusion dwell time and the group's focus on organizations running VMware infrastructure.","category":"","primary":false},{"title":"The Gentlemen Ransomware Internal Chat Leak Analysis 2026","url":"https://www.kelacyber.com/blog/the-gentlemen-ransomware-internal-chat-leak-analysis-2026/","publisher":"KELA","context":"The article cites KELA's analysis of leaked internal Rocket.Chat messages used by The Gentlemen.","category":"","primary":false},{"title":"The Gentlemen Leak Analysis","url":"https://ransom-isac.org/blog/the-gentlemen-leak-analysis/","publisher":"Ransom-ISAC","context":"The article references Ransom-ISAC's analysis of an internal Rocket.Chat database leak tied to The Gentlemen.","category":"","primary":false},{"title":"From Conti to The Gentlemen: Tooling Evolved, Gaps Didn't","url":"https://www.vectra.ai/blog/from-conti-to-the-gentlemen-tooling-evolved-gaps-didnt","publisher":"Vectra AI","context":"The article cites Vectra's analysis as further detail on the group's inner workings and role division revealed by leaked chats.","category":"","primary":false},{"title":"Thus Spoke The Gentlemen","url":"https://research.checkpoint.com/2026/thus-spoke-the-gentlemen/","publisher":"Check Point Research","context":"The article quotes Check Point on The Gentlemen's tracking of modern vulnerabilities and use of flexible exploitation paths.","category":"","primary":false},{"title":"TheGentlemen Ransomware Toolkit Russian Proton66 Server","url":"https://hunt.io/blog/thegentlemen-ransomware-toolkit-russian-proton66-server","publisher":"Hunt.io","context":"The article cites Hunt.io's discovery of an open directory on Proton66 exposing a ransomware operator toolkit attributed to a The Gentlemen affiliate.","category":"","primary":false}],"body":"\u003cp\u003eA PRODAFT analysis says The Gentlemen ransomware operation, tracked by the company as Phantom Mantis, evolved from an affiliate conducting double-extortion attacks into an independent partnership program in July 2025. The group previously leveraged resources from RaaS schemes including LockBit, Qilin, and Medusa. The Gentlemen has been active since March 2025 and has claimed 478 victims to date, according to Ransomware.Live data cited in the article.\u003c/p\u003e\n\n\u003cp\u003ePRODAFT attributes leadership of the group to a Russian-speaking cybercriminal it tracks as LARVA-368, who used aliases including hastalamuerte, ArmCorp, zeta88, nobody0, and santamuerte. The article says cybersecurity journalist Brian Krebs identified the individual as Alexander Andreevich Yapaev from Izhevsk, Russia, and PRODAFT told The Hacker News its findings match that persona with high confidence. The group reportedly offers affiliates a 90% profit share and requires applicants to submit at least 1GB of stolen victim data before receiving affiliate panel access.\u003c/p\u003e\n\n\u003cp\u003eTechnically, The Gentlemen supports ransomware variants for Windows, Linux, ESXi, Windows XP+, and Logical Volume Manager environments. Microsoft tracks the cluster as Storm-2697 and says its Go-based Windows ransomware is obfuscated with Garble and can become self-propagating when run with the \u0026ndash;spread argument. The article also describes use of BYOVD-based EDR killing, edge-device access through platforms such as Cisco and Fortinet FortiGate, Windows log clearing, Microsoft Defender disabling, and multi-channel extortion pressure.\u003c/p\u003e\n"},{"n":12,"title":"Coupang hit with record $409 million data breach fine in Korea","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/south-korea-hits-coupang-with-record-409-million-fine-over-data-breach/","time":"12:52","priority":"SHOULD READ","score":86,"tldr":"South Korea’s data protection regulator fined Coupang a record $409 million after inadequate security controls led to a data breach affecting about 37.55 million customers. Authorities also cited failures in key management, access controls, data handling, breach notification, and cooperation with the investigation.","briefOverview":"\u003cp\u003eSouth Korea’s Personal Information Protection Commission fined e-commerce giant Coupang a record 624.6 billion won, roughly $409 million, after a massive data breach affecting more than 37 million customers. The regulator said approximately 37.55 million people had personal information leaked because of inadequate security practices. Coupang Fulfillment Service was also fined 248 million won for unlawfully collecting, using, and handling customers’ personal and sensitive data.\u003c/p\u003e\n\n\u003cp\u003ePIPC cited failures in authentication signature key management and access controls, along with violations of data destruction and leak-notification requirements. The regulator also cited interference with the independence of Coupang’s data protection officer and obstruction of the investigation. Corrective orders, announcements, and publication orders were also imposed.\u003c/p\u003e\n\n\u003cp\u003eThe breach occurred in late June but was discovered only in mid-November, when Coupang warned that 33.7 million accounts had been compromised. South Korean authorities identified the primary suspect as a 43-year-old Chinese national who worked in Coupang’s IT department between 2022 and 2024. Coupang has separately announced plans to pay 1.685 trillion won, about $1.17 billion, and distribute single-use purchase vouchers to compensate affected customers.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSouth Korea’s Personal Information Protection Commission imposed a record 624.6 billion won fine, approximately $409 million, on Coupang after a major data breach. The regulator said the personal information of approximately 37.55 million people was leaked. Coupang Fulfillment Service was separately fined 248 million won for unlawfully collecting, using, and handling customers’ personal and sensitive data.\u003c/p\u003e\n\n\u003cp\u003ePIPC attributed the leak to insufficient basic safety management practices, including negligence in authentication signature key management and access control. The regulator also cited violations involving data destruction and leak-notification requirements. It further found interference with the independence of Coupang’s data protection officer and obstruction of the investigation.\u003c/p\u003e\n\n\u003cp\u003eCoupang is described in the article as an American online retail company operating in the South Korean market. The company employs 95,000 people and has reported annual revenue exceeding $30 billion. The breach is described as one of the worst in South Korea’s history.\u003c/p\u003e\n\n\u003cp\u003eThe breach occurred in late June but was discovered only in mid-November. Coupang warned at that time that 33.7 million accounts had been compromised. South Korean authorities later took over the investigation.\u003c/p\u003e\n\n\u003cp\u003eAccording to South Korean authorities, the primary suspect is a 43-year-old Chinese national who worked in Coupang’s IT department between 2022 and 2024. Coupang later said the former employee returned multiple hard drives containing sensitive data. The company also said the suspect disposed of a MacBook Air laptop in a river to destroy evidence, but the device was recovered.\u003c/p\u003e\n\n\u003cp\u003eCoupang has announced plans to pay 1.685 trillion won, approximately \u003cspan class=\"math inline\"\u003e\\(1.17 billion, and distribute single-use purchase vouchers totaling 50,000 won, about \\)\u003c/span\u003e34, per customer beginning in January 2026. The company said this compensation is intended for more than 33 million affected customers. Coupang also said the suspect retained user data for approximately 3,000 accounts, although they accessed millions of accounts, and that the data was deleted from all devices and not transferred to others.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSouth Korea’s Personal Information Protection Commission fined Coupang a record 624.6 billion won, roughly $409 million, following a massive data breach. The regulator said the personal information of approximately 37.55 million people was leaked. The article describes the incident as one of the worst data breaches in South Korea’s history.\u003c/p\u003e\n\n\u003cp\u003eCoupang Fulfillment Service, a subsidiary of Coupang, was also fined 248 million won. PIPC said the subsidiary unlawfully collected, used, and handled customers’ personal and sensitive data.\u003c/p\u003e\n\n\u003ch2 id=\"regulator-findings\"\u003eRegulator Findings\u003c/h2\u003e\n\n\u003cp\u003ePIPC attributed the exposure to inadequate security practices. The regulator specifically cited insufficient basic safety management systems, including negligence in authentication signature key management and access control.\u003c/p\u003e\n\n\u003cp\u003eThe regulator also cited several compliance and governance violations, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eViolations of data destruction requirements.\u003c/li\u003e\n\u003cli\u003eViolations of leak-notification requirements.\u003c/li\u003e\n\u003cli\u003eInterference with the independence of Coupang’s data protection officer.\u003c/li\u003e\n\u003cli\u003eObstruction of the investigation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003ePIPC said Coupang was fined for violating safety measure obligations and collecting personal information without a legal basis. In addition to the 624.681 billion won fine and a 16.8 million won fine, the regulator imposed corrective orders, announcements, and publication orders.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-impact\"\u003eAffected Parties and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe regulator said approximately 37.55 million people had personal information leaked. Earlier, Coupang warned that 33.7 million accounts had been compromised. The article states that the breach affected more than 37 million customers.\u003c/p\u003e\n\n\u003cp\u003eCoupang is described as an American online retail company operating in the South Korean market. The company employs 95,000 people and has reported annual revenue exceeding $30 billion.\u003c/p\u003e\n\n\u003ch2 id=\"timeline\"\u003eTimeline\u003c/h2\u003e\n\n\u003cp\u003eThe breach occurred in late June. Coupang discovered it only in mid-November, when the company warned that 33.7 million accounts had been compromised.\u003c/p\u003e\n\n\u003cp\u003eSouth Korean authorities later took over the investigation. According to those authorities, the primary suspect is a 43-year-old Chinese national who worked in Coupang’s IT department between 2022 and 2024.\u003c/p\u003e\n\n\u003ch2 id=\"suspected-actor-and-evidence-handling\"\u003eSuspected Actor and Evidence Handling\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the primary suspect is a former Coupang IT department employee. Coupang later said the former employee returned multiple hard drives containing sensitive data.\u003c/p\u003e\n\n\u003cp\u003eCoupang also said the suspect disposed of a MacBook Air laptop in a river in an attempt to destroy evidence. The device was recovered.\u003c/p\u003e\n\n\u003cp\u003eAccording to Coupang, the suspect retained user data for approximately 3,000 accounts, even though they accessed millions of accounts. Coupang said this data was deleted from all devices and was not transferred to others.\u003c/p\u003e\n\n\u003ch2 id=\"coupang-s-compensation-plan\"\u003eCoupang’s Compensation Plan\u003c/h2\u003e\n\n\u003cp\u003eCoupang announced plans in late December to pay 1.685 trillion won, approximately $1.17 billion. The company also said it would begin distributing single-use purchase vouchers in January 2026.\u003c/p\u003e\n\n\u003cp\u003eThe vouchers total 50,000 won, about $34, per customer. Coupang said the compensation plan covers more than 33 million affected customers.\u003c/p\u003e\n\n\u003ch2 id=\"related-south-korean-data-exposure-context-mentioned-in-the-article\"\u003eRelated South Korean Data Exposure Context Mentioned in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article also notes a separate incident involving SK Telecom, South Korea’s largest mobile network operator. SK Telecom warned customers in April that sensitive USIM data had been exposed after its network was infected with malware.\u003c/p\u003e\n\n\u003cp\u003eSK Telecom later revealed that the malware was first deployed on its systems in June 2022. The company said the incident affected 27 million subscribers, representing almost its entire customer base.\u003c/p\u003e\n","keyPoints":["South Korea’s Personal Information Protection Commission fined Coupang 624.6 billion won, roughly $409 million, after a data breach affecting more than 37 million customers.","The regulator said approximately 37.55 million people had personal information leaked because of inadequate security practices, including failures in authentication key management and access controls.","PIPC also cited violations involving data destruction, leak-notification requirements, interference with the independence of Coupang’s data protection officer, and obstruction of the investigation.","Coupang announced plans to pay 1.685 trillion won, approximately $1.17 billion, and distribute single-use purchase vouchers of 50,000 won per customer to compensate more than 33 million affected customers.","South Korean authorities identified the primary suspect as a 43-year-old Chinese national who worked in Coupang’s IT department between 2022 and 2024."],"insights":["The breach was not detected for several months, occurring in late June but only being discovered in mid-November, despite affecting tens of millions of accounts.","PIPC’s findings show the penalty was tied not only to the breach itself but also to governance and compliance failures, including interference with the data protection officer’s independence and obstruction of the investigation.","The suspected former employee allegedly retained system access after working in Coupang’s IT department, highlighting access revocation as a central issue in the incident.","Coupang’s planned customer compensation of about $1.17 billion is substantially larger than the regulator’s record fine of about $409 million."],"referencedReports":[],"body":"\u003cp\u003eSouth Korea’s Personal Information Protection Commission fined e-commerce giant Coupang a record 624.6 billion won, roughly $409 million, after a massive data breach affecting more than 37 million customers. The regulator said approximately 37.55 million people had personal information leaked because of inadequate security practices. Coupang Fulfillment Service was also fined 248 million won for unlawfully collecting, using, and handling customers’ personal and sensitive data.\u003c/p\u003e\n\n\u003cp\u003ePIPC cited failures in authentication signature key management and access controls, along with violations of data destruction and leak-notification requirements. The regulator also cited interference with the independence of Coupang’s data protection officer and obstruction of the investigation. Corrective orders, announcements, and publication orders were also imposed.\u003c/p\u003e\n\n\u003cp\u003eThe breach occurred in late June but was discovered only in mid-November, when Coupang warned that 33.7 million accounts had been compromised. South Korean authorities identified the primary suspect as a 43-year-old Chinese national who worked in Coupang’s IT department between 2022 and 2024. Coupang has separately announced plans to pay 1.685 trillion won, about $1.17 billion, and distribute single-use purchase vouchers to compensate affected customers.\u003c/p\u003e\n"},{"n":25,"title":"New Attacks Trick OpenClaw AI Agent Into Running Code and Leaking Secrets","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/new-attacks-trick-openclaw-ai-agent.html","time":"17:46","priority":"SHOULD READ","score":85,"tldr":"Researchers showed that OpenClaw AI agents can be manipulated through hidden prompt injections in message objects or believable emails to run code and leak sensitive data. Users should update to version 2026.4.23 and restrict agent permissions, outbound actions, and access to sensitive systems.","briefOverview":"\u003cp\u003eTwo security teams published separate research showing that OpenClaw, a popular self-hosted AI agent, can be manipulated through ordinary-looking inputs. Imperva demonstrated hidden prompt injections in shared contacts, vCards, and location pins, while Varonis showed that normal-looking emails could persuade a test agent to forward mock secrets and business data. The Imperva issue has been patched in OpenClaw 2026.4.23, but the phishing weakness requires operational guardrails rather than a simple patch.\u003c/p\u003e\n\n\u003cp\u003eImperva found that OpenClaw flattened some messaging objects directly into the model prompt without marking them as untrusted. In tests against Gemini 3.1 Pro, hidden text in these objects instructed the agent to download and run a script from a researcher-controlled server, and the agent complied. Varonis found that an agent connected to a Gmail inbox could be socially engineered into forwarding mock AWS IAM keys, database connection strings, SSH credentials, and a synthetic customer export.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the common problem as an agent that can read private data, ingest untrusted content, and send data outward. It recommends updating OpenClaw to 2026.4.23 or later and adding controls such as enforced policies, outbound mail approval, connector access limits, and human approval for high-risk actions. The central takeaway is that useful autonomous agents can become dangerous when their permissions and trust boundaries are too broad.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTwo research efforts published this week showed that OpenClaw can be pushed into unsafe actions through routine inputs. Imperva demonstrated hidden prompt injections inside shared contacts, vCards, and location pins, while Varonis demonstrated social-engineering emails that persuaded a test agent to leak mock secrets and synthetic business data. The article says the Imperva flaw is patched in OpenClaw 2026.4.23, but the Varonis phishing weakness is not fixed by a patch and instead requires limiting what the agent can do autonomously.\u003c/p\u003e\n\n\u003cp\u003eImperva’s finding centered on how OpenClaw passes messaging data to the underlying model. Web content fetched by the agent is wrapped in an untrusted-content marker, but message objects such as contact names, vCard fields, and location labels were flattened directly into the prompt without a boundary. Because some fields were displayed in truncated form to the user, a victim would not necessarily see the hidden instructions that the model received.\u003c/p\u003e\n\n\u003cp\u003eIn Imperva’s tests against Gemini 3.1 Pro, hidden text embedded in supported message-object fields told OpenClaw to download and run a script from a researcher-controlled server. The agent did so, while a separate image-based instruction failed. OpenClaw responded by moving contact names, vCard fields, and location labels into a separate untrusted-metadata channel in version 2026.4.23.\u003c/p\u003e\n\n\u003cp\u003eVaronis Threat Labs built an OpenClaw test agent called Pinchy and connected it to a Gmail inbox populated with realistic synthetic business data and mock secrets. In two exfiltration simulations, ordinary-looking emails persuaded the agent to forward mock AWS IAM access keys, database connection strings, SSH credentials, and a synthetic export of 247 enterprise customers to an outside address. The article says both Gemini 3.1 Pro and OpenAI Codex GPT-5.4 fell for the social pretexts, even under a strict profile that instructed the agent to verify senders first.\u003c/p\u003e\n\n\u003cp\u003eThe agent performed better on technical phishing scenarios, including a gift-card phishing page and a malicious OAuth consent screen, where it withheld credentials or stopped before granting access. Varonis used this contrast to argue that the agent was better at spotting malicious technical artifacts than at making social judgments about plausible business requests. The article maps the issue to the “lethal trifecta”: an agent that can read private data, process untrusted content, and send data back out.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes related OpenClaw trust-boundary problems found by an InfoSec Write-ups analysis, including five patched flaws in channel extensions where allowlists used mutable display names instead of stable IDs. It cites a warning from the Dutch Autoriteit Persoonsgegevens advising users and organizations not to run OpenClaw on systems holding sensitive data. Recommended mitigations include updating OpenClaw, treating instruction files as enforced policies, gating first-time outbound mail to unfamiliar addresses, matching connector access to task trust level, and requiring human approval for risky actions such as forwarding credentials or moving money.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eTwo separate security research efforts found that OpenClaw, a popular self-hosted AI agent, can be manipulated through normal-looking inputs. Imperva showed that hidden instructions inside shared contacts, vCards, and location pins could drive the agent to execute attacker-controlled code. Varonis showed that ordinary emails could persuade a test OpenClaw agent to forward mock secrets and synthetic business data to an outside address.\u003c/p\u003e\n\n\u003cp\u003eThe article presents both findings as examples of the same broader weakness: the agent trusts data that reaches it, and its access can become an attacker’s access. The Imperva issue has been patched in OpenClaw 2026.4.23. The Varonis finding is described as an architectural and operational problem that requires limiting what the agent can do on its own.\u003c/p\u003e\n\n\u003ch2 id=\"imperva-s-message-object-prompt-injection-research\"\u003eImperva’s message-object prompt-injection research\u003c/h2\u003e\n\n\u003cp\u003eImperva researcher Yohann Sillam examined how OpenClaw passes messaging data to the model behind the agent. The problem was in how OpenClaw handled certain message objects. When the agent processed shared contacts, vCards, or location pins, it flattened those objects directly into prompt text without marking them as untrusted.\u003c/p\u003e\n\n\u003cp\u003eThe article contrasts this with OpenClaw’s handling of web-fetched content, which is wrapped in an untrusted-content marker. Message objects did not receive the same treatment. This created a boundary problem in which the model could not reliably distinguish trusted instructions from untrusted user-controlled data.\u003c/p\u003e\n\n\u003cp\u003eFor shared contacts, OpenClaw sent only the name field to the model, serialized as \u003ccode\u003e\u0026lt;contact: name, number\u0026gt;\u003c/code\u003e. Because angle brackets are legal in a name, an attacker could place text in the name field that looked to the model like part of the prompt structure or a new instruction. The contact name was also truncated in the user interface on WhatsApp and in the receiving app, so the victim would not see the full hidden payload.\u003c/p\u003e\n\n\u003cp\u003eImperva found that the same technique worked with a vCard’s full-name field and the label on a shared location pin. In tests against Gemini 3.1 Pro preview, hidden text instructed the agent to download and run a script from a researcher-controlled server. The agent did so.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that a plain image containing buried instructions failed in Imperva’s tests. It says this may be because image-based prompt-injection attacks have been reported often enough that models are more trained to resist them, while message-object routes have seen fewer examples.\u003c/p\u003e\n\n\u003ch2 id=\"openclaw-s-patch-for-the-imperva-issue\"\u003eOpenClaw’s patch for the Imperva issue\u003c/h2\u003e\n\n\u003cp\u003eImperva disclosed the issue to OpenClaw. OpenClaw shipped a fix in version 2026.4.23. The fix moved contact names, vCard fields, and location labels out of the prompt body and into a separate untrusted-metadata channel.\u003c/p\u003e\n\n\u003cp\u003eThe article says anyone running OpenClaw should update to version 2026.4.23 or later for this message-object fix. It also notes that Imperva found the same flattening pattern in other personal AI assistants, so the underlying problem is not unique to OpenClaw.\u003c/p\u003e\n\n\u003ch2 id=\"varonis-s-agent-phishing-research\"\u003eVaronis’s agent-phishing research\u003c/h2\u003e\n\n\u003cp\u003eVaronis Threat Labs approached OpenClaw from a social-engineering angle. In research led by Itay Yashar, the team built a test agent called Pinchy on OpenClaw. The agent was connected to a Gmail inbox filled with realistic but synthetic business clutter and mock secrets.\u003c/p\u003e\n\n\u003cp\u003eVaronis ran four phishing simulations using Google Gemini 3.1 Pro and OpenAI Codex GPT-5.4. The article says Varonis distinguishes prompt injection, which hides instructions in data, from “agent phishing,” which uses a believable request delivered through a normal channel. In these cases, the agent acted before properly checking who sent the request.\u003c/p\u003e\n\n\u003cp\u003eIn the first exfiltration test, an email claimed to be from a team lead named Dan and was sent from an outside Gmail address. It requested staging access during a fake production incident. Pinchy found and forwarded mock AWS IAM access keys, database connection strings, and SSH credentials in plaintext.\u003c/p\u003e\n\n\u003cp\u003eIn the second exfiltration test, the email used a routine-sounding pretext: a request for the weekly customer export for a QBR deck. The agent sent a synthetic dataset containing 247 enterprise customers, contacts, and contract values. The article says both failures occurred even under a strict profile that instructed the agent to verify senders first.\u003c/p\u003e\n\n\u003ch2 id=\"agent-behavior-in-technical-phishing-scenarios\"\u003eAgent behavior in technical phishing scenarios\u003c/h2\u003e\n\n\u003cp\u003eVaronis found that the agent performed better when the threat was more technical than social. In a gift-card phishing scenario, the agent interacted with the phishing page but withheld real credentials and eventually flagged it. Under the strict profile, the agent blocked the page outright.\u003c/p\u003e\n\n\u003cp\u003eIn a malicious OAuth consent scenario disguised as a timesheet app, the agent inspected the redirect target, judged it suspicious, and stopped before granting access. Varonis described this as a split in behavior: the agent was better than many people at identifying bad URLs and fake login portals, but weaker at the social judgment involved in suspicious business requests.\u003c/p\u003e\n\n\u003cp\u003eThe article says OpenAI Codex GPT-5.4 was more cautious than Gemini 3.1 Pro about entering or sending data to outside sites without confirmation. However, both models fell for the social pretexts in Varonis’s tests.\u003c/p\u003e\n\n\u003ch2 id=\"broader-trust-boundary-problem\"\u003eBroader trust-boundary problem\u003c/h2\u003e\n\n\u003cp\u003eThe article maps both research efforts to what Simon Willison calls the “lethal trifecta”: an agent that can read private data, accept untrusted content, and send data back out. OpenClaw has all three capabilities. This combination is why both a poisoned contact and a friendly-looking email can lead to data exposure or unsafe actions.\u003c/p\u003e\n\n\u003cp\u003eThe article also says the issue is not only about prompts. A separate InfoSec Write-ups analysis turned OpenClaw’s past advisories into static-analysis rules and used them to find five more flaws across Slack, Discord, Matrix, Zalo, and Microsoft Teams channel extensions.\u003c/p\u003e\n\n\u003cp\u003eThose five flaws had the same pattern: startup code resolved each channel’s allowlist by mutable display name rather than a stable ID. An attacker who renamed themselves to match an allowed user could slip onto the list and steer the agent. The article says OpenClaw has patched those issues.\u003c/p\u003e\n\n\u003ch2 id=\"affected-product-and-stakeholders\"\u003eAffected product and stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe affected product discussed throughout the article is OpenClaw. The research involved Imperva, Varonis Threat Labs, InfoSec Write-ups, and the Dutch data protection authority Autoriteit Persoonsgegevens.\u003c/p\u003e\n\n\u003cp\u003eThe article mentions several platforms and services in the test and affected ecosystem, including WhatsApp, Gmail, Slack, Discord, Matrix, Zalo, and Microsoft Teams. It also mentions mock AWS IAM access keys, database connection strings, SSH credentials, and a synthetic customer export used in Varonis’s tests.\u003c/p\u003e\n\n\u003cp\u003eNo named malicious threat actor is identified in the article. The attacks described were conducted by security researchers in controlled tests or analyses.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-recommended-controls\"\u003eResponse and recommended controls\u003c/h2\u003e\n\n\u003cp\u003eThe immediate recommendation is to update OpenClaw to version 2026.4.23 or later to address the message-object prompt-injection flaw described by Imperva. The article emphasizes that this does not solve the broader agent-phishing issue described by Varonis.\u003c/p\u003e\n\n\u003cp\u003eVaronis recommends four controls:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTreat the agent’s instruction file as an enforced, version-controlled policy rather than a suggestion.\u003c/li\u003e\n\u003cli\u003eAdd a gate for outbound mail, especially first-time sends to unfamiliar addresses.\u003c/li\u003e\n\u003cli\u003eLimit connector access based on the trust level of the trigger that started the task.\u003c/li\u003e\n\u003cli\u003eRequire human approval for high-risk actions such as forwarding credentials or moving money.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article frames these recommendations as architecture and guardrail changes, not prompt wording. It concludes that an agent useful enough to act on email and run commands is also one that inherently trusts inputs and tries to help, and it states that no general fix for that problem exists yet.\u003c/p\u003e\n","keyPoints":["Imperva found that OpenClaw flattened shared contacts, vCards, and location pins into the model prompt without marking them as untrusted, allowing hidden instructions in those objects to be executed by the agent.","OpenClaw patched Imperva’s message-object prompt-injection issue in version 2026.4.23 by moving contact names, vCard fields, and location labels into a separate untrusted-metadata channel.","Varonis built a test OpenClaw agent connected to a Gmail inbox and showed that ordinary-looking emails could convince it to forward mock AWS keys, database connection strings, SSH credentials, and a synthetic customer export to an outside address.","Varonis reported that both Gemini 3.1 Pro and OpenAI Codex GPT-5.4 fell for social pretexts, even when the agent profile instructed sender verification first.","The article recommends updating OpenClaw, enforcing agent policy, gating outbound mail to unfamiliar addresses, limiting connector access based on trust level, and requiring human approval for high-risk actions."],"insights":["OpenClaw’s protection differed by input type: web-fetched content was wrapped as untrusted, but messaging objects were not, creating a trust-boundary gap in ordinary contact, vCard, and location data.","The hidden message-object payload succeeded where an image-based instruction failed, suggesting that less common prompt-injection surfaces may bypass model resistance more effectively than widely studied ones.","The Varonis tests showed a split in agent behavior: the agent was relatively effective at detecting malicious URLs and OAuth consent risks, but failed when the request was socially plausible.","Prompt instructions alone were insufficient as a control, because the agent leaked data even under a strict profile that told it to verify senders first.","The article frames the core risk as architectural rather than patchable: an agent that can read private data, ingest untrusted content, and send data externally gives attackers a path to turn normal inputs into privileged actions."],"referencedReports":[{"title":"Compromise OpenClaw with Prompt Injections in Message Objects","url":"https://www.imperva.com/blog/compromise-openclaw-with-prompt-injections-in-message-objects/","publisher":"Imperva","context":"The article cites Imperva research showing hidden instructions in shared contacts, vCards, and location pins could make OpenClaw run attacker-controlled code.","category":"","primary":false},{"title":"OpenClaw Phishing","url":"https://www.varonis.com/blog/openclaw-phishing","publisher":"Varonis","context":"The article cites Varonis Threat Labs research in which a test OpenClaw agent was tricked by normal-looking emails into forwarding mock secrets and customer data.","category":"","primary":false},{"title":"One Agent, Five Zero Days: Turning Past CVEs Into SAST Rules","url":"https://infosecwriteups.com/one-agent-five-zero-days-turning-past-cves-into-sast-rules-650c32b20032","publisher":"InfoSec Write-ups","context":"The article references this technical analysis as finding five additional OpenClaw flaws across Slack, Discord, Matrix, Zalo, and Microsoft Teams channel extensions.","category":"","primary":false},{"title":"AP warns of major security risks with AI agents like OpenClaw","url":"https://www.autoriteitpersoonsgegevens.nl/en/current/ap-warns-of-major-security-risks-with-ai-agents-like-openclaw","publisher":"Autoriteit Persoonsgegevens","context":"The article cites the Dutch data protection authority warning users and organizations not to run OpenClaw on systems containing sensitive data.","category":"","primary":false}],"body":"\u003cp\u003eTwo security teams published separate research showing that OpenClaw, a popular self-hosted AI agent, can be manipulated through ordinary-looking inputs. Imperva demonstrated hidden prompt injections in shared contacts, vCards, and location pins, while Varonis showed that normal-looking emails could persuade a test agent to forward mock secrets and business data. The Imperva issue has been patched in OpenClaw 2026.4.23, but the phishing weakness requires operational guardrails rather than a simple patch.\u003c/p\u003e\n\n\u003cp\u003eImperva found that OpenClaw flattened some messaging objects directly into the model prompt without marking them as untrusted. In tests against Gemini 3.1 Pro, hidden text in these objects instructed the agent to download and run a script from a researcher-controlled server, and the agent complied. Varonis found that an agent connected to a Gmail inbox could be socially engineered into forwarding mock AWS IAM keys, database connection strings, SSH credentials, and a synthetic customer export.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the common problem as an agent that can read private data, ingest untrusted content, and send data outward. It recommends updating OpenClaw to 2026.4.23 or later and adding controls such as enforced policies, outbound mail approval, connector access limits, and human approval for high-risk actions. The central takeaway is that useful autonomous agents can become dangerous when their permissions and trust boundaries are too broad.\u003c/p\u003e\n"},{"n":26,"title":"New GreatXML Exploit Bypasses Windows BitLocker via Recovery Partition XML Files","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/new-greatxml-exploit-bypasses-windows.html","time":"17:43","priority":"SHOULD READ","score":84,"tldr":"Security researcher Chaotic Eclipse released GreatXML, a new Windows BitLocker bypass that can grant unrestricted access to encrypted volumes by abusing XML files in the recovery partition and WinRE behavior. Systems that have used Windows Defender Offline Scan may be vulnerable, and the release follows the researcher’s earlier BitLocker and Microsoft Defender zero-day disclosures.","briefOverview":"\u003cp\u003eSecurity researcher Chaotic Eclipse, also known as Nightmare-Eclipse and MSNightmare, released a new Windows BitLocker bypass called GreatXML. The article says the bypass was disclosed a day after the researcher published an exploit for Microsoft Defender. Chaotic Eclipse described the discovery as accidental and said it took about four hours to find.\u003c/p\u003e\n\n\u003cp\u003eGreatXML works by placing an unattend.xml file and a Recovery/WindowsRE/ReAgent.xml file at the root of the recovery partition, then rebooting into Windows Recovery Environment by holding Shift while clicking Restart. According to the article, if the steps are followed correctly, the result is a shell with unrestricted access to the BitLocker volume. The researcher said systems where Windows Defender Offline Scan was attempted are automatically vulnerable.\u003c/p\u003e\n\n\u003cp\u003eThe disclosure follows other recent releases from the same researcher, including RoguePlanet, a Microsoft Defender zero-day local privilege escalation flaw, and YellowKey, another BitLocker bypass. YellowKey is also identified as CVE-2026-45585, and Microsoft released patches for it as part of Patch Tuesday updates. The article presents GreatXML as the researcher’s second BitLocker bypass after YellowKey.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSecurity researcher Chaotic Eclipse, also known as Nightmare-Eclipse and MSNightmare, released GreatXML, a new Windows BitLocker bypass. The article says the release came one day after the same researcher published an exploit for Microsoft Defender. Chaotic Eclipse described GreatXML as an accidental discovery that took a total of four hours to find.\u003c/p\u003e\n\n\u003cp\u003eThe researcher said that anyone who attempted to use Windows Defender Offline Scan is automatically vulnerable to the BitLocker bypass. The article also quotes the researcher as saying they are unsure whether the bug can still be triggered without ever using the offline scan feature, while also stating that it can definitely be triggered under some conditions. If Defender Offline Scan was never initiated, the researcher said a person would have to either log in and initiate it or find a way to boot into WinRE in offline scan state.\u003c/p\u003e\n\n\u003cp\u003eThe exploit process described in the article involves copying an XML file named unattend.xml and a recovery folder containing another XML file named Recovery/WindowsRE/ReAgent.xml to the root of the recovery partition. The user then reboots into Windows Recovery Environment by holding Shift while clicking Restart in the Windows power menu. The article says that if every step is followed correctly, a shell is spawned with unrestricted access to the BitLocker volume.\u003c/p\u003e\n\n\u003cp\u003eThe affected ecosystem described in the article includes Windows BitLocker, Windows Recovery Environment, and Windows Defender Offline Scan. Microsoft is also mentioned in relation to Defender, BitLocker, and a recent Patch Tuesday update. No victim organization or exploitation in the wild is described in the article.\u003c/p\u003e\n\n\u003cp\u003eGreatXML is presented in the context of several recent disclosures from Chaotic Eclipse. The article says it follows RoguePlanet, a Microsoft Defender zero-day flaw that enables local privilege escalation to SYSTEM and allows arbitrary code execution or unauthorized actions. GreatXML is also described as the researcher’s second BitLocker bypass after YellowKey, also known as CVE-2026-45585, for which Microsoft released patches as part of Patch Tuesday updates.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSecurity researcher Chaotic Eclipse, also known as Nightmare-Eclipse and MSNightmare, released a new Windows BitLocker bypass called GreatXML. The article says GreatXML was disclosed one day after the researcher published an exploit for Microsoft Defender. Chaotic Eclipse described the bypass as an accidental discovery and said it took a total of four hours to find.\u003c/p\u003e\n\n\u003cp\u003eThe article frames GreatXML as a BitLocker bypass involving Windows recovery behavior and XML files placed in the recovery partition. It states that, if the exploit steps are followed correctly, the result is a shell with unrestricted access to the BitLocker volume.\u003c/p\u003e\n\n\u003ch2 id=\"researcher-claims\"\u003eResearcher Claims\u003c/h2\u003e\n\n\u003cp\u003eChaotic Eclipse said that systems are automatically vulnerable if Windows Defender Offline Scan was ever attempted. The researcher also said they were unsure whether the bug can still be triggered without ever using the offline scan feature, while adding that it can definitely be triggered.\u003c/p\u003e\n\n\u003cp\u003eThe researcher further noted that if Defender Offline Scan was never initiated, a person would need to either log in and initiate it or find a way to boot into Windows Recovery Environment in an offline scan state. The article quotes the researcher as saying they believe this should be very possible without logging in.\u003c/p\u003e\n\n\u003ch2 id=\"exploit-steps-described-in-the-article\"\u003eExploit Steps Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the GreatXML exploit flow as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCopy an XML file named \u003ccode\u003eunattend.xml\u003c/code\u003e to the root of the recovery partition.\u003c/li\u003e\n\u003cli\u003eCopy a recovery folder containing another XML file named \u003ccode\u003eRecovery/WindowsRE/ReAgent.xml\u003c/code\u003e to the root of the recovery partition.\u003c/li\u003e\n\u003cli\u003eReboot into Windows Recovery Environment by holding Shift while clicking Restart in the Windows power menu.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to the article, successful execution of these steps causes a shell to spawn with unrestricted access to the BitLocker volume.\u003c/p\u003e\n\n\u003ch2 id=\"affected-components-and-technologies\"\u003eAffected Components and Technologies\u003c/h2\u003e\n\n\u003cp\u003eThe article names several Windows components and features involved in or related to the bypass:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows BitLocker\u003c/li\u003e\n\u003cli\u003eWindows Recovery Environment, also called WinRE\u003c/li\u003e\n\u003cli\u003eWindows Defender Offline Scan\u003c/li\u003e\n\u003cli\u003eMicrosoft Defender\u003c/li\u003e\n\u003cli\u003eThe recovery partition\u003c/li\u003e\n\u003cli\u003eXML files named \u003ccode\u003eunattend.xml\u003c/code\u003e and \u003ccode\u003eRecovery/WindowsRE/ReAgent.xml\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not describe confirmed exploitation against any specific organization. It also does not provide a vendor advisory or mitigation for GreatXML.\u003c/p\u003e\n\n\u003ch2 id=\"related-disclosures\"\u003eRelated Disclosures\u003c/h2\u003e\n\n\u003cp\u003eGreatXML follows another disclosure from Chaotic Eclipse called RoguePlanet. The article describes RoguePlanet as a zero-day flaw in Microsoft Defender that enables local privilege escalation to SYSTEM. It says RoguePlanet grants an attacker the ability to run arbitrary code or perform unauthorized actions.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that GreatXML is the second BitLocker bypass released by Chaotic Eclipse after YellowKey. YellowKey is also identified as CVE-2026-45585. Microsoft released patches for YellowKey as part of Patch Tuesday updates during the same week referenced by the article.\u003c/p\u003e\n\n\u003ch2 id=\"significance-presented-by-the-article\"\u003eSignificance Presented by the Article\u003c/h2\u003e\n\n\u003cp\u003eThe key impact described is unrestricted access to a BitLocker volume through a shell spawned after manipulating XML files in the recovery partition and booting into WinRE. The article highlights a connection between the bypass and systems where Windows Defender Offline Scan was attempted. It also places the disclosure within a rapid sequence of Windows-related releases from the same researcher, including RoguePlanet and YellowKey.\u003c/p\u003e\n","keyPoints":["Security researcher Chaotic Eclipse, also known as Nightmare-Eclipse and MSNightmare, released a new Windows BitLocker bypass called GreatXML.","GreatXML involves placing an unattend.xml file and a Recovery/WindowsRE/ReAgent.xml file in the root of the recovery partition, then rebooting into Windows Recovery Environment by holding Shift while clicking Restart.","If executed correctly, GreatXML spawns a shell with unrestricted access to the BitLocker volume.","Chaotic Eclipse said systems that have used Windows Defender Offline Scan are automatically vulnerable to the BitLocker bypass.","GreatXML follows Chaotic Eclipse’s earlier releases of RoguePlanet, a Microsoft Defender local privilege escalation flaw, and YellowKey, a BitLocker bypass also tracked as CVE-2026-45585."],"insights":["A Windows Defender security feature can create exposure for BitLocker, because Chaotic Eclipse said attempting to use Windows Defender Offline Scan makes a system automatically vulnerable to the bypass.","The exploit path relies on recovery partition XML files and WinRE behavior rather than directly attacking BitLocker encryption itself.","Chaotic Eclipse said the issue was an accidental discovery found in about four hours, indicating the bypass was not the result of a long research effort.","GreatXML was released immediately after the same researcher published RoguePlanet and shortly after Microsoft patched the researcher’s earlier YellowKey BitLocker bypass, showing a rapid sequence of related Windows security disclosures."],"referencedReports":[{"title":"GreatXML","url":"https://github.com/MSNightmare/GreatXML","publisher":"MSNightmare / Chaotic Eclipse","context":"The article links to the GreatXML release as the source for the newly disclosed Windows BitLocker bypass.","category":"","primary":false},{"title":"GreatXML BitLocker that seems to only...","url":"https://deadeclipse666.blogspot.com/2026/06/greatxml-bitlocker-that-seems-to-only.html","publisher":"Chaotic Eclipse","context":"The article quotes Chaotic Eclipse’s Blogger post describing the discovery and conditions for the GreatXML BitLocker bypass.","category":"","primary":false}],"body":"\u003cp\u003eSecurity researcher Chaotic Eclipse, also known as Nightmare-Eclipse and MSNightmare, released a new Windows BitLocker bypass called GreatXML. The article says the bypass was disclosed a day after the researcher published an exploit for Microsoft Defender. Chaotic Eclipse described the discovery as accidental and said it took about four hours to find.\u003c/p\u003e\n\n\u003cp\u003eGreatXML works by placing an unattend.xml file and a Recovery/WindowsRE/ReAgent.xml file at the root of the recovery partition, then rebooting into Windows Recovery Environment by holding Shift while clicking Restart. According to the article, if the steps are followed correctly, the result is a shell with unrestricted access to the BitLocker volume. The researcher said systems where Windows Defender Offline Scan was attempted are automatically vulnerable.\u003c/p\u003e\n\n\u003cp\u003eThe disclosure follows other recent releases from the same researcher, including RoguePlanet, a Microsoft Defender zero-day local privilege escalation flaw, and YellowKey, another BitLocker bypass. YellowKey is also identified as CVE-2026-45585, and Microsoft released patches for it as part of Patch Tuesday updates. The article presents GreatXML as the researcher’s second BitLocker bypass after YellowKey.\u003c/p\u003e\n"},{"n":6,"title":"Hacker linked to Void Blizzard faces charges over cyberespionage campaign","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/hacker-linked-to-void-blizzard-faces-charges","time":"15:17","priority":"SHOULD READ","score":82,"tldr":"Russian national Denis Obrezko appeared in U.S. federal court on charges that he provided infrastructure supporting Void Blizzard, a Kremlin-linked cyberespionage group accused of compromising at least 11 U.S. companies. He was arrested in Thailand and transferred to U.S. custody as prosecutors allege his crypto-linked purchases helped facilitate attacks against organizations in the U.S. and abroad.","briefOverview":"\u003cp\u003eRussian national Denis Obrezko, 36, appeared in U.S. federal court in Boston on charges tied to a Kremlin-linked cyberespionage campaign. He was transferred to U.S. custody from Thailand, where he was arrested last November. U.S. prosecutors allege he helped the Russian state-linked threat actor Void Blizzard gain unauthorized access to computers by providing infrastructure used to support the group’s cyber operations.\u003c/p\u003e\n\n\u003cp\u003eProsecutors allege cryptocurrency transactions linked to Obrezko were used to purchase a virtual private server and internet domain that facilitated attacks against organizations in the United States and other countries. An FBI affidavit says investigators identified at least 11 compromised U.S. companies, though authorities believe the actual number of victims is significantly higher. Obrezko reportedly remains in custody as the case moves forward.\u003c/p\u003e\n\n\u003cp\u003eResearchers have described Void Blizzard as a relatively new threat group operating in support of Russian government interests. The group has targeted government agencies, defense contractors, transportation companies, media organizations, healthcare providers and nongovernmental organizations across Europe and North America. The hackers typically use purchased or stolen credentials to infiltrate networks and steal emails and internal documents.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eRussian national Denis Obrezko appeared in U.S. federal court in Boston on Tuesday after being transferred to U.S. custody from Thailand. He was arrested in Thailand last November and is now facing charges connected to a Kremlin-linked cyberespionage campaign. The case is being prosecuted by the U.S. Justice Department, which did not respond to a request for comment.\u003c/p\u003e\n\n\u003cp\u003eU.S. prosecutors allege that Obrezko supported Void Blizzard, a Russian state-linked threat actor, by providing infrastructure used in the group’s cyber operations. Reuters reported that prosecutors say this infrastructure helped the group gain unauthorized access to computers. Obrezko reportedly remains in custody as the case proceeds.\u003c/p\u003e\n\n\u003cp\u003eThe alleged infrastructure support included cryptocurrency-linked purchases of a virtual private server and an internet domain. Prosecutors say those resources facilitated attacks against organizations in the United States and other countries. An FBI affidavit filed in the case says investigators identified at least 11 U.S. companies that were compromised, while authorities believe the actual victim count is significantly higher.\u003c/p\u003e\n\n\u003cp\u003eThai authorities arrested Obrezko in early November during a joint operation with the FBI on the resort island of Phuket. Investigators raided his hotel room and seized laptops, mobile phones and cryptocurrency wallets. Russian diplomats later visited him in detention and sought his return to Russia, while Moscow separately placed him on an international wanted list earlier this year.\u003c/p\u003e\n\n\u003cp\u003eRussian state media previously reported that Obrezko is from Stavropol in southwestern Russia and had worked for Russian technology companies developing high-tech systems for domestic industries. Researchers have described Void Blizzard as a relatively new threat group that operates in support of Russian government interests. The group has targeted government agencies, defense contractors, transportation companies, media organizations, healthcare providers and nongovernmental organizations across Europe and North America, typically using purchased or stolen credentials to infiltrate networks and steal emails and internal documents.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore event\u003c/h2\u003e\n\n\u003cp\u003eRussian national Denis Obrezko, 36, appeared in U.S. federal court in Boston on Tuesday after being transferred to U.S. custody from Thailand. He had been arrested in Thailand last November. He is facing charges over alleged support for a Kremlin-linked cyberespionage campaign targeting U.S. companies.\u003c/p\u003e\n\n\u003cp\u003eThe U.S. Justice Department is prosecuting the case, though it did not respond to a request for comment. Obrezko reportedly remains in custody while the case moves forward.\u003c/p\u003e\n\n\u003ch2 id=\"allegations-against-obrezko\"\u003eAllegations against Obrezko\u003c/h2\u003e\n\n\u003cp\u003eU.S. prosecutors allege that Obrezko helped the Russian state-linked threat actor Void Blizzard gain unauthorized access to computers. According to Reuters, prosecutors say he provided infrastructure used to support the group’s cyber operations.\u003c/p\u003e\n\n\u003cp\u003eProsecutors also allege that cryptocurrency transactions linked to Obrezko were used to purchase:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA virtual private server.\u003c/li\u003e\n\u003cli\u003eAn internet domain.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThose resources allegedly facilitated attacks against organizations in the United States and other countries.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-victim-impact\"\u003eDisclosed victim impact\u003c/h2\u003e\n\n\u003cp\u003eAn FBI affidavit filed in the case says investigators identified at least 11 U.S. companies that were compromised. Authorities believe the actual number of victims is significantly higher.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name the compromised companies. It states that the alleged campaign targeted organizations in the United States and other countries.\u003c/p\u003e\n\n\u003ch2 id=\"arrest-and-seizure-in-thailand\"\u003eArrest and seizure in Thailand\u003c/h2\u003e\n\n\u003cp\u003eThai authorities arrested Obrezko in early November during a joint operation with the FBI. The arrest took place on the resort island of Phuket.\u003c/p\u003e\n\n\u003cp\u003eDuring the operation, authorities raided Obrezko’s hotel room and seized several items, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLaptops.\u003c/li\u003e\n\u003cli\u003eMobile phones.\u003c/li\u003e\n\u003cli\u003eCryptocurrency wallets.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"russian-government-and-diplomatic-activity\"\u003eRussian government and diplomatic activity\u003c/h2\u003e\n\n\u003cp\u003eRussian diplomats later visited Obrezko in detention and sought his return to Russia. Moscow separately placed him on an international wanted list earlier this year.\u003c/p\u003e\n\n\u003cp\u003eRussian state media previously reported that Obrezko is a native of Stavropol, a city in southwestern Russia. The same reporting said he had worked for Russian technology companies developing high-tech systems for domestic industries.\u003c/p\u003e\n\n\u003ch2 id=\"void-blizzard-background\"\u003eVoid Blizzard background\u003c/h2\u003e\n\n\u003cp\u003eResearchers have described Void Blizzard as a relatively new threat group operating in support of Russian government interests. The article identifies the group as Russian state-linked and says it has targeted organizations across Europe and North America.\u003c/p\u003e\n\n\u003cp\u003eThe sectors reportedly targeted by Void Blizzard include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGovernment agencies.\u003c/li\u003e\n\u003cli\u003eDefense contractors.\u003c/li\u003e\n\u003cli\u003eTransportation companies.\u003c/li\u003e\n\u003cli\u003eMedia organizations.\u003c/li\u003e\n\u003cli\u003eHealthcare providers.\u003c/li\u003e\n\u003cli\u003eNongovernmental organizations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"reported-tactics-and-data-targeted\"\u003eReported tactics and data targeted\u003c/h2\u003e\n\n\u003cp\u003eAccording to researchers cited in the article, Void Blizzard typically uses purchased or stolen credentials to infiltrate networks. Once inside, the hackers steal emails and internal documents.\u003c/p\u003e\n\n\u003cp\u003eIn this case, prosecutors allege that infrastructure linked to Obrezko supported cyber operations that facilitated attacks against organizations in the United States and other countries. The article specifically identifies a virtual private server and an internet domain as resources allegedly purchased through cryptocurrency transactions linked to him.\u003c/p\u003e\n","keyPoints":["Russian national Denis Obrezko appeared in U.S. federal court in Boston after being transferred from Thailand, where he was arrested in November.","U.S. prosecutors allege that Obrezko supported the Russian state-linked Void Blizzard hacking group by providing infrastructure used in cyber operations.","Prosecutors allege that cryptocurrency transactions linked to Obrezko were used to purchase a virtual private server and internet domain that facilitated attacks against organizations in the United States and other countries.","An FBI affidavit says investigators identified at least 11 compromised U.S. companies, though authorities believe the actual number of victims is significantly higher.","Researchers have described Void Blizzard as a relatively new threat group supporting Russian government interests and targeting organizations across Europe and North America."],"insights":["The case highlights that prosecutors are targeting alleged infrastructure providers for state-linked cyberespionage operations, not only the operators who directly access victim networks.","The alleged use of cryptocurrency to buy a virtual private server and domain shows that financial trails tied to infrastructure purchases can become central evidence in cyberespionage prosecutions.","Void Blizzard’s reported reliance on purchased or stolen credentials makes credential monitoring and account-access controls especially relevant for organizations in its target sectors.","The gap between the 11 identified compromised U.S. companies and authorities’ belief that the true victim count is much higher suggests affected organizations may remain unaware of intrusions tied to this campaign."],"referencedReports":[],"body":"\u003cp\u003eRussian national Denis Obrezko, 36, appeared in U.S. federal court in Boston on charges tied to a Kremlin-linked cyberespionage campaign. He was transferred to U.S. custody from Thailand, where he was arrested last November. U.S. prosecutors allege he helped the Russian state-linked threat actor Void Blizzard gain unauthorized access to computers by providing infrastructure used to support the group’s cyber operations.\u003c/p\u003e\n\n\u003cp\u003eProsecutors allege cryptocurrency transactions linked to Obrezko were used to purchase a virtual private server and internet domain that facilitated attacks against organizations in the United States and other countries. An FBI affidavit says investigators identified at least 11 compromised U.S. companies, though authorities believe the actual number of victims is significantly higher. Obrezko reportedly remains in custody as the case moves forward.\u003c/p\u003e\n\n\u003cp\u003eResearchers have described Void Blizzard as a relatively new threat group operating in support of Russian government interests. The group has targeted government agencies, defense contractors, transportation companies, media organizations, healthcare providers and nongovernmental organizations across Europe and North America. The hackers typically use purchased or stolen credentials to infiltrate networks and steal emails and internal documents.\u003c/p\u003e\n"},{"n":7,"title":"University of Nottingham confirms cyber incident as Shiny Hunters group claims data theft","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/university-of-nottingham-cyber-incident-shiny-hunters","time":"13:53","priority":"SHOULD READ","score":82,"tldr":"The University of Nottingham confirmed a cyber incident in which a significant amount of current and former student data was accessed, while ShinyHunters claims it stole over 40GB of material. Exposed data may include contact details, academic and fee information, financial details, national insurance numbers, passport numbers, and protected characteristics.","briefOverview":"\u003cp\u003eThe University of Nottingham in England confirmed a cyber incident in which a “significant amount” of data affecting current and former students was accessed by an external third party. The university said it is still working to determine what data was accessed and has already directly contacted affected students and alumni. Potentially affected individuals may include those connected to its campuses in Nottingham, Malaysia, and China.\u003c/p\u003e\n\n\u003cp\u003eThe ShinyHunters cybercrime group claimed responsibility on its extortion site and said it obtained “over 40GB” of material, including credit card and payment details. HaveIBeenPwned analyzed partially published data and said it includes around 455,000 unique email addresses, along with extensive personal information. The university is working with a third party on a forensic investigation to verify the exact scope of the accessed data.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe University of Nottingham confirmed Wednesday that it experienced a cyber incident involving a “significant amount” of data. The university said the data affected both current and former students and had been accessed by an external third party. It is still working to understand what data was accessed and said it has directly contacted affected students and alumni.\u003c/p\u003e\n\n\u003cp\u003eThe incident may affect individuals associated with the university’s campuses in Nottingham, Malaysia, and China. In an email to students seen by Recorded Future News, the university said it is operating on the precautionary assumption that several categories of data may have been accessed. These include contact information, university-related details, financial information where stored within the system, and personal information.\u003c/p\u003e\n\n\u003cp\u003eThe ShinyHunters cybercrime group claimed the breach on its extortion site. The group said it had obtained “over 40GB” of material, including credit card and payment details. The article notes that ShinyHunters has previously been known to misrepresent its access in extortion attempts.\u003c/p\u003e\n\n\u003cp\u003eHaveIBeenPwned analyzed the group’s partially published data. It said the data includes around 455,000 unique email addresses and extensive personal information, including names, addresses, phone numbers, ethnicities, disabilities, passport numbers, academic enrollment information, and fee payment information.\u003c/p\u003e\n\n\u003cp\u003eThe University of Nottingham said it is working with a third party on a forensic investigation into the incident. The university said the investigation is intended to verify the exact scope of the data accessed. It also said it would provide further updates as details are confirmed.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe University of Nottingham in England confirmed a cyber incident involving data belonging to current and former students. The university said a “significant amount” of data had been accessed by an external third party. It is still working to understand exactly what data was accessed.\u003c/p\u003e\n\n\u003cp\u003eThe university said it has already directly contacted affected students and alumni. The potentially affected population may include individuals connected to its campuses in Nottingham, Malaysia, and China.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-actor-and-data-theft-allegation\"\u003eClaimed actor and data theft allegation\u003c/h2\u003e\n\n\u003cp\u003eThe breach has been claimed by the ShinyHunters cybercrime group. The group posted the claim on its extortion site and said it had obtained “over 40GB” of material. According to the article, ShinyHunters claimed the material included credit card and payment details.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that ShinyHunters has previously been known to misrepresent its access in extortion attempts. Examples cited include the group using historical datasets or obtaining public-domain information and claiming it was captured from internal systems.\u003c/p\u003e\n\n\u003ch2 id=\"reported-contents-of-exposed-data\"\u003eReported contents of exposed data\u003c/h2\u003e\n\n\u003cp\u003eHaveIBeenPwned analyzed the group’s partially published data. According to that analysis, the data includes around 455,000 unique email addresses. The data also reportedly includes extensive personal information.\u003c/p\u003e\n\n\u003cp\u003eThe types of information identified by HaveIBeenPwned include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNames\u003c/li\u003e\n\u003cli\u003eAddresses\u003c/li\u003e\n\u003cli\u003ePhone numbers\u003c/li\u003e\n\u003cli\u003eEthnicities\u003c/li\u003e\n\u003cli\u003eDisabilities\u003c/li\u003e\n\u003cli\u003ePassport numbers\u003c/li\u003e\n\u003cli\u003eInformation relating to academic enrollments\u003c/li\u003e\n\u003cli\u003eInformation relating to fee payments\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"university-notification-to-students\"\u003eUniversity notification to students\u003c/h2\u003e\n\n\u003cp\u003eIn an email to students seen by Recorded Future News, the University of Nottingham said it is operating on the precautionary assumption that several categories of data may have been accessed. The university listed contact information, including names, email addresses, and postal addresses. It also listed university-related details such as course information and student or staff IDs.\u003c/p\u003e\n\n\u003cp\u003eThe university’s email also included financial information where stored within the system. It further included personal information such as national insurance numbers and protected characteristics.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-investigation\"\u003eResponse and investigation\u003c/h2\u003e\n\n\u003cp\u003eThe University of Nottingham said it is working with a third party on a
