or arbitrary command execution."],"insights":["The campaign’s Russian-language JavaScript comments and its explicit Russian keyboard-layout exclusion make the CIS geofencing especially actionable for attribution and detection triage, since skipped hosts still generate C2 telemetry through a cis_blocked event.","The malware’s wallet-app tampering extends compromise beyond one-time data theft because it replaces Electron app.asar files and ad-hoc re-signs the bundles, so affected wallet applications should be treated as untrusted even after credentials are rotated.","The fake Apple persistence label com.apple.accountsd is a high-value forensic indicator because it impersonates a legitimate Apple account synchronization daemon while using LaunchDaemon or LaunchAgent persistence with a 60-second heartbeat.","The article identifies the delivery layer as the best intervention point because all active lure variants shared the same /links/page-loader.js path and populated clipboard commands from links/data.txt across rotating domains."],"referencedReports":[],"body":"\u003cp\u003eNetskope Threat Labs reported a new macOS ClickFix campaign observed on May 31, 2026, following earlier April 2026 ClickFix activity that delivered an AppleScript-based infostealer. The newer campaign is attributed in the article to a Russian-speaking attacker and upgrades the payload from a simple stealer to a full-featured remote access trojan. Netskope telemetry showed activity across short-lived lure domains, with victims mainly in Asia, North America, and Oceania.\u003c/p\u003e\n\n\u003cp\u003eThe campaign uses social engineering to make users copy and run a Terminal command from fake macOS utility, fake GitHub, or localized IT support pages. The infection chain remains fileless until persistence is installed, using a gzip-compressed stager and piping the second-stage AppleScript directly into osascript memory. The stage 1 loader checks for Russian keyboard input and exits if detected, while still reporting telemetry to the command-and-control server.\u003c/p\u003e\n\n\u003cp\u003eThe AppleScript payload, internally labeled “Meow (DEBUG),” steals credentials, browser data, cookies, keychain contents, cryptocurrency wallet data, messaging sessions, gaming account data, files, and Apple Notes. After exfiltration, it can replace app.asar files in selected desktop cryptocurrency wallets and re-sign modified app bundles. It also installs persistence under the deceptive label com.apple.accountsd, beaconing every 60 seconds for command execution.\u003c/p\u003e\n"},{"n":12,"title":"CISA orders feds to patch max severity Joomla plugin flaw by Friday","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-orders-feds-to-patch-max-severity-joomla-plugin-flaw-by-friday/","time":"10:09","priority":"MUST READ","score":93,"tldr":"CISA has ordered U.S. federal agencies to patch an actively exploited maximum-severity Joomla Content Editor plugin flaw, CVE-2026-48907, by Friday. The bug allows unauthenticated attackers to upload and execute PHP code, and sites compromised before patching must be cleaned manually.","briefOverview":"\u003cp\u003eCISA has ordered U.S. federal agencies to patch CVE-2026-48907, a maximum-severity flaw in the Widget Factory Joomla Content Editor plugin that is being actively exploited in the wild. The order applies to Federal Civilian Executive Branch agencies and requires them to secure affected systems by Friday under Binding Operational Directive 26-04. CISA added the vulnerability to its Known Exploited Vulnerabilities Catalog on Tuesday.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is an improper access control issue that can allow unauthenticated attackers to upload and execute PHP code. It affects Joomla deployments using the JCE WYSIWYG editor plugin, and CISA warned that this type of flaw is a frequent attack vector that poses significant risk to the federal enterprise. The JCE security team said exploit code is public and attacks are automated, meaning sites without public registration are still not safe.\u003c/p\u003e\n\n\u003cp\u003eThe JCE security team fixed the issue in JCE Pro 2.9.99.6 and urged users to update immediately. It also warned that patching only closes the entry point and does not clean sites that were already compromised. Administrators of affected sites are advised to preserve rogue profiles for investigation, update, delete attacker-created profiles, change passwords, and run a full server-side malware scan.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA has ordered U.S. Federal Civilian Executive Branch agencies to patch CVE-2026-48907, a maximum-severity vulnerability in the Widget Factory Joomla Content Editor plugin. The agency added the flaw to its Known Exploited Vulnerabilities Catalog on Tuesday and set a Friday deadline for agencies to secure affected systems. The requirement is tied to Binding Operational Directive 26-04, which directs agencies to prioritize remediation based on exploitation risk.\u003c/p\u003e\n\n\u003cp\u003eThe flaw affects Joomla deployments using the JCE WYSIWYG editor plugin. CISA described it as an improper access control vulnerability that could allow unauthenticated users to create new editor profiles and upload and execute PHP code. The article states that attackers can exploit it without privileges through low-complexity attacks.\u003c/p\u003e\n\n\u003cp\u003eThe JCE security team addressed the vulnerability in early June with the release of JCE Pro 2.9.99.6. It warned users to patch immediately because the flaw is actively exploited, working exploit code is public, and attacks are automated. The team specifically said that a site with no public registration is not safe.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify any named threat actor behind the exploitation. It refers generally to threat actors and malicious cyber actors exploiting the issue in the wild. The disclosed impact is potential code execution on Joomla sites using the affected plugin.\u003c/p\u003e\n\n\u003cp\u003eThe JCE security team emphasized that updating only closes the entry point and does not remove attacker artifacts from already compromised sites. It advised administrators to back up rogue profiles for investigation, update to JCE 2.9.99.6 or later, delete the attacker’s profile, change all relevant passwords, and run a full server-side malware scan. CISA also instructed stakeholders to evaluate internet exposure, follow BOD 26-04 guidance for cloud services, or discontinue use of the product if mitigations are unavailable.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA has ordered U.S. federal agencies to patch CVE-2026-48907, a maximum-severity vulnerability in the Widget Factory Joomla Content Editor plugin. The vulnerability is being actively exploited in the wild and affects Joomla deployments that use the JCE WYSIWYG editor plugin.\u003c/p\u003e\n\n\u003cp\u003eCISA added the flaw to its Known Exploited Vulnerabilities Catalog on Tuesday. Under Binding Operational Directive 26-04, Federal Civilian Executive Branch agencies must secure affected systems by Friday.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-48907 is described by CISA as an improper access control vulnerability in the Widget Factory Joomla Content Editor. According to the article, the flaw can allow unauthenticated users to create new editor profiles and upload and execute PHP code.\u003c/p\u003e\n\n\u003cp\u003eThe article states that threat actors can exploit the vulnerability without privileges. It also describes the attacks as low-complexity and capable of achieving code execution against Joomla deployments using the vulnerable JCE plugin.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-status\"\u003eExploitation Status\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability is actively exploited in the wild. The JCE security team warned that working exploit code is public and that the attacks are automated.\u003c/p\u003e\n\n\u003cp\u003eThe JCE security team also stated that sites with no public registration are not safe. This is because the vulnerability can allow unauthenticated users to create new editor profiles.\u003c/p\u003e\n\n\u003cp\u003eNo named threat actor or group is identified in the article. The activity is attributed generally to threat actors and malicious cyber actors.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-products\"\u003eAffected Parties and Products\u003c/h2\u003e\n\n\u003cp\u003eThe affected product is the Widget Factory Joomla Content Editor, also referred to as the JCE WYSIWYG editor plugin for Joomla. The article specifically references JCE Pro and says the issue was addressed in JCE Pro 2.9.99.6.\u003c/p\u003e\n\n\u003cp\u003eAffected parties include Joomla site administrators using the vulnerable plugin and U.S. Federal Civilian Executive Branch agencies with impacted systems. CISA’s directive applies to federal agencies, but the JCE security team’s warning is directed broadly at users of the plugin.\u003c/p\u003e\n\n\u003ch2 id=\"vendor-response\"\u003eVendor Response\u003c/h2\u003e\n\n\u003cp\u003eThe JCE security team addressed the vulnerability in early June with the release of JCE Pro 2.9.99.6. It urged users who had not updated to do so immediately.\u003c/p\u003e\n\n\u003cp\u003eThe team also emphasized that updating does not clean a site that was already compromised. It said the update closes the entry point but does not remove anything an attacker may have left behind.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-remediation\"\u003eRecommended Remediation\u003c/h2\u003e\n\n\u003cp\u003eFor compromised sites, the JCE security team advised administrators to take several recovery steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBack up rogue profiles for further investigation.\u003c/li\u003e\n\u003cli\u003eUpdate to JCE 2.9.99.6 or later.\u003c/li\u003e\n\u003cli\u003eDelete the attacker’s profile.\u003c/li\u003e\n\u003cli\u003eChange all passwords, including the administrator account, the site database, and the hosting account.\u003c/li\u003e\n\u003cli\u003eRun a full server-side malware scan to confirm that no other malicious tools or implants were planted.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese steps distinguish between patching the vulnerability and cleaning up an existing compromise. The article explicitly states that patching alone will not remove attacker artifacts left before the update.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-directive-and-federal-requirements\"\u003eCISA Directive and Federal Requirements\u003c/h2\u003e\n\n\u003cp\u003eCISA ordered Federal Civilian Executive Branch agencies to secure affected systems by Friday. The order falls under Binding Operational Directive 26-04, which was issued the previous Wednesday.\u003c/p\u003e\n\n\u003cp\u003eThe directive requires U.S. government agencies to prioritize patching based on each vulnerability’s risk of exploitation. The article lists key risk factors including whether a vulnerability is in CISA’s Known Exploited Vulnerabilities Catalog, whether vulnerable assets are publicly exposed online, whether exploitation can be automated for large-scale attacks, and whether exploitation grants attackers partial or total control of the targeted system.\u003c/p\u003e\n\n\u003cp\u003eCISA warned that this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise. It also instructed stakeholders to follow applicable BOD 26-04 guidance for cloud services or discontinue use of the product if mitigations are unavailable.\u003c/p\u003e\n","keyPoints":["CISA ordered U.S. Federal Civilian Executive Branch agencies to secure systems affected by CVE-2026-48907 by Friday under Binding Operational Directive 26-04.","CVE-2026-48907 is a maximum-severity improper access control vulnerability in the Widget Factory Joomla Content Editor plugin that can allow unauthenticated attackers to upload and execute PHP code.","The JCE security team fixed the vulnerability in JCE Pro 2.9.99.6 and warned that it is actively exploited, public exploit code is available, and attacks are automated.","The JCE security team said updating closes the entry point but does not clean sites that were compromised before patching.","Users of compromised sites are advised to back up rogue profiles, update to JCE 2.9.99.6 or later, delete the attacker’s profile, change all passwords, and run a full server-side malware scan."],"insights":["Sites with public registration disabled are still at risk because the exploit can create new editor profiles for unauthenticated users and attacks are automated.","Patching to JCE 2.9.99.6 or later only closes the entry point, so administrators must separately investigate and remove any attacker-created profiles or implants left before the update.","The recommended recovery steps extend beyond Joomla itself, requiring password changes for the administrator account, site database, and hosting account, plus a full server-side malware scan.","CISA’s deadline reflects BOD 26-04’s risk-based prioritization, where known exploitation, public exposure, automation potential, and attacker control influence how quickly agencies must remediate."],"referencedReports":[{"title":"Known Exploited Vulnerabilities Catalog: CVE-2026-48907","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?field_cve=CVE-2026-48907","publisher":"CISA","context":"The article cites CISA's KEV Catalog entry warning that the Joomla Content Editor flaw is actively exploited and requires remediation.","category":"advisory","primary":true},{"title":"JCE Security Update and a Free Patch for Older Sites","url":"https://www.joomlacontenteditor.net/news/jce-security-update-and-a-free-patch-for-older-sites","publisher":"JCE Security Team","context":"The article references the JCE security team's warning that the vulnerability is actively exploited, public exploit code exists, and patching does not clean already compromised sites.","category":"advisory","primary":true},{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/16/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article cites CISA's alert announcing the addition of CVE-2026-48907 to its Known Exploited Vulnerabilities Catalog.","category":"advisory","primary":true}],"body":"\u003cp\u003eCISA has ordered U.S. federal agencies to patch CVE-2026-48907, a maximum-severity flaw in the Widget Factory Joomla Content Editor plugin that is being actively exploited in the wild. The order applies to Federal Civilian Executive Branch agencies and requires them to secure affected systems by Friday under Binding Operational Directive 26-04. CISA added the vulnerability to its Known Exploited Vulnerabilities Catalog on Tuesday.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is an improper access control issue that can allow unauthenticated attackers to upload and execute PHP code. It affects Joomla deployments using the JCE WYSIWYG editor plugin, and CISA warned that this type of flaw is a frequent attack vector that poses significant risk to the federal enterprise. The JCE security team said exploit code is public and attacks are automated, meaning sites without public registration are still not safe.\u003c/p\u003e\n\n\u003cp\u003eThe JCE security team fixed the issue in JCE Pro 2.9.99.6 and urged users to update immediately. It also warned that patching only closes the entry point and does not clean sites that were already compromised. Administrators of affected sites are advised to preserve rogue profiles for investigation, update, delete attacker-created profiles, change passwords, and run a full server-side malware scan.\u003c/p\u003e\n"},{"n":1,"title":"ClickFix Campaign Generated Via AI Delivers SmartRAT","source":"zscaler.com","sourceColorIdx":5,"link":"https://www.zscaler.com/blogs/security-research/clickfix-campaign-generated-ai-delivers-smartrat","time":"17:58","priority":"MUST READ","score":90,"tldr":"Zscaler ThreatLabz found an AI-generated ClickFix phishing site impersonating a Brazilian bank that tricks users into running PowerShell and installs SmartRAT, a banking RAT with remote control, keylogging, fake bank overlays, QR-code interception, and persistence. The campaign shows how AI-built lures can rapidly enable convincing malware delivery at scale.","briefOverview":"\u003cp\u003eZscaler ThreatLabz observed a March 2026 ClickFix campaign using a likely AI-generated website to impersonate a Brazilian bank. The typosquatting domain cartaobb[.]com mimicked the bank’s official domain and advertised a credit card application. The page used a fake Cloudflare CAPTCHA followed by a fullscreen fake BSOD recovery screen to pressure victims into executing a PowerShell command.\u003c/p\u003e\n\n\u003cp\u003eThe command downloaded a staged PowerShell payload from 64[.]95[.]13[.]238 and ultimately executed a PowerShell-based RAT that ThreatLabz named SmartRAT. SmartRAT is focused on banking fraud and remote access, with capabilities including encrypted C2 communications, screen and input control, keylogging, fake bank-branded overlays, QR code interception, and persistence through scheduled tasks and a Windows service. Trend Micro had previously written about the same malware family under the name Banana RAT, but with a different attack path.\u003c/p\u003e\n\n\u003cp\u003eSmartRAT monitors banking, payment, and cryptocurrency-related activity by checking foreground window titles for targeted keywords. It can alert operators when victims interact with financial services and then display bank-branded forms or overlays to capture data. ThreatLabz also found that the SmartRAT web-based C2 panel had a client-side authentication weakness that allowed the login screen to be bypassed by setting localStorage values.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eZscaler ThreatLabz reported multiple instances of typosquatting domains hosting malicious content generated with AI-powered website creation tools in March 2026. One investigated campaign impersonated a Brazilian bank using the domain cartaobb[.]com, which resembled the bank’s official domain cartaobrb[.]com[.]br. The fraudulent page promoted a credit card application and used a fake Cloudflare CAPTCHA as part of a ClickFix infection chain.\u003c/p\u003e\n\n\u003cp\u003eAfter a victim clicked the fake CAPTCHA, the page copied a PowerShell command to the clipboard, forced the browser into fullscreen mode, and displayed a fake Blue Screen of Death system recovery screen. The page also included anti-inspection and lockdown measures, such as blocking DevTools shortcuts, clearing the console, restricting keyboard input, refocusing the window, and repeatedly enforcing fullscreen mode. The copied PowerShell command downloaded st.txt from 64[.]95[.]13[.]238, which then retrieved payload.php and executed an encrypted PowerShell RAT payload.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz named the malware SmartRAT, while noting that Trend Micro had previously written about the same malware family as Banana RAT using a different attack path. SmartRAT is implemented entirely in PowerShell and contains the embedded string SMART_V25. Its capabilities include encrypted command-and-control communication, remote screen and input control, arbitrary PowerShell execution, keylogging, fake bank-branded overlays, QR code interception, file browsing and exfiltration, process and service listing, and persistence mechanisms.\u003c/p\u003e\n\n\u003cp\u003eSmartRAT decrypts two C2 configurations: c[.]windowsupdate-cdn[.]com and the fallback IP address 162[.]141[.]111[.]227, communicating over TCP port 51888. It creates identity and install tokens, uses a hardcoded master key for HMAC and AES key derivation, and encrypts C2 command traffic using AES-CBC. For persistence, it copies itself to a Microsoft Diagnosis ETW path, creates a scheduled task named MicrosoftEdgeUpdateCore, falls back to an HKCU Run key if needed, and attempts to install a Windows service with the same name if UAC elevation is approved.\u003c/p\u003e\n\n\u003cp\u003eThe malware tracks financial activity by monitoring foreground window titles for keywords tied to Brazilian banks, payment platforms, credit unions, cryptocurrency exchanges, and generic banking terms. When a match occurs, SmartRAT sends a BrowserAlert to the C2 so an operator can issue commands such as displaying a bank-branded data entry form or overlay. ThreatLabz also found that the web-based C2 panel’s login relied only on client-side localStorage values, allowing the login screen to be bypassed by setting arbitrary authToken and currentUser entries.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eZscaler ThreatLabz analyzed a March 2026 ClickFix campaign that used a likely AI-generated typosquatting website to impersonate a Brazilian bank and deliver a PowerShell-based RAT named SmartRAT. The fraudulent site used the domain cartaobb[.]com, which impersonated the bank’s official domain cartaobrb[.]com[.]br. The page advertised a credit card application and presented a fake Cloudflare CAPTCHA, mimicking a legitimate security check.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz stated that it observed multiple instances of typosquatting domains hosting malicious content generated with AI-powered website creation tools. The article emphasizes that threat actors are using website builders to create convincing lures quickly and at scale. In this campaign, the lure progressed from a fake CAPTCHA to a fullscreen fake BSOD and system recovery prompt designed to pressure victims into running a PowerShell command.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz noted that Trend Micro had previously written about the same malware family under the name Banana RAT, but with a different attack path.\u003c/p\u003e\n\n\u003ch2 id=\"ai-generated-lure-and-anti-inspection-behavior\"\u003eAI-generated lure and anti-inspection behavior\u003c/h2\u003e\n\n\u003cp\u003eThe fraudulent bank page contained source-code comments that ThreatLabz assessed as likely generated by an AI tool. The comments included generic section headers with a templated structure that is commonly seen in AI-generated webpages where sections are labeled for later developer integration.\u003c/p\u003e\n\n\u003cp\u003eThe page also contained anti-inspection measures. Its script intercepted keyboard shortcuts for DevTools, Console, Inspector, and page source viewing by using capture-phase keydown handlers and calling preventDefault() and stopPropagation(). Every three seconds, the script logged a crafted Image object whose getter triggered console.clear(), repeatedly wiping the console while DevTools was open.\u003c/p\u003e\n\n\u003ch2 id=\"clickfix-infection-flow\"\u003eClickFix infection flow\u003c/h2\u003e\n\n\u003cp\u003eAfter the victim clicked the fake CAPTCHA, the page copied a malicious PowerShell command to the clipboard, placed the browser into fullscreen mode, and displayed a fake BSOD system recovery page. A lockdown routine attempted to keep the victim trapped in the tab or window, restrict keyboard input, and enforce fullscreen mode.\u003c/p\u003e\n\n\u003cp\u003eThe lockdown routine first attempted to use navigator.keyboard.lock(). It then registered a capture-phase keydown handler that blocked most keystrokes while temporarily allowing the keystrokes needed for the ClickFix flow, including Win+R, Ctrl+V, and Enter. It also listened for window.blur and repeatedly called window.focus() to regain focus if the victim switched away.\u003c/p\u003e\n\n\u003cp\u003eTo enforce fullscreen, the script checked fullscreen state every 50 milliseconds and called requestFullscreen, with fallbacks to webkitRequestFullscreen and mozRequestFullScreen. The PowerShell command copied to the clipboard included a random number of trailing spaces, which ThreatLabz noted was likely intended to bloat the payload and/or evade detection because a single added space changes the hash value.\u003c/p\u003e\n\n\u003ch2 id=\"payload-delivery-chain\"\u003ePayload delivery chain\u003c/h2\u003e\n\n\u003cp\u003eThe copied PowerShell command downloaded and executed the next stage from 64[.]95[.]13[.]238:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt retrieved st.txt from the hardcoded IP address.\u003c/li\u003e\n\u003cli\u003est.txt functioned as a stealth PowerShell dropper.\u003c/li\u003e\n\u003cli\u003eThe dropper used Windows API calls to hide its console window.\u003c/li\u003e\n\u003cli\u003eIt downloaded payload.php from the same IP address.\u003c/li\u003e\n\u003cli\u003eIt saved the downloaded content as C:\\Users\\Public\\Documents\\msedge.txt.\u003c/li\u003e\n\u003cli\u003eIt immediately executed the saved script as a script block.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe payload.php file contained another PowerShell script. This script suppressed errors, decoded hardcoded Base64 strings to obtain an AES key and IV, decrypted an AES-CBC encrypted blob, and executed it with ScriptBlock::Create(). The decrypted blob was the PowerShell RAT that ThreatLabz named SmartRAT.\u003c/p\u003e\n\n\u003ch2 id=\"smartrat-purpose-and-configuration\"\u003eSmartRAT purpose and configuration\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT is a Brazil-focused banking RAT implemented entirely in PowerShell and identified by the embedded string SMART_V25. Its stated objective is remote access and financial data theft using features such as fake bank-branded password forms, keylogging, and QR code interception.\u003c/p\u003e\n\n\u003cp\u003eSmartRAT decrypts two C2 configurations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe primary C2 domain is c[.]windowsupdate-cdn[.]com, decrypted using XOR with the key 2.\u003c/li\u003e\n\u003cli\u003eThe fallback C2 is 162[.]141[.]111[.]227, decrypted using XOR with the key 233.\u003c/li\u003e\n\u003cli\u003eThe malware communicates on port 51888.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSmartRAT hides its PowerShell window using user32.dll’s ShowWindow function. It writes debug logs to C:\\ProgramData or %APPDATA%\\Microsoft\\Diagnosis\\ETW\\client_debug.log, with a fallback to %TEMP%\\client\u003cem\u003edebug.log. It also creates a per-process log at C:\\ProgramData\\Microsoft\\Diagnosis\\ETW\\process\u003c/em\u003e\u003cPID\u003e.log to record RAT activity.\u003c/p\u003e\n\n\u003ch2 id=\"identity-encryption-and-c2-security-model\"\u003eIdentity, encryption, and C2 security model\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT generates a unique identity token by hashing the machine GUID, MAC address, UTC ticks, a newly generated GUID, and the computer name with SHA-256. It stores the token in etw.dat and install.token.\u003c/p\u003e\n\n\u003cp\u003eIt then computes an HMAC-SHA256 of the token using the hardcoded master key iuhbdaubdvauygd5562\u003cspan class=\"math inline\"\u003e\\(3@##\\)\u003c/span\u003er. The same hardcoded master key is used in two ways: the raw UTF-8 bytes of the plaintext key are used as the HMAC secret, while the SHA-256 hash of the string is used to derive the 32-byte AES encryption key.\u003c/p\u003e\n\n\u003cp\u003eC2 command traffic is encrypted and decrypted with AES-CBC. The encryption function generates a fresh IV for each message using GenerateIV(), hex-encodes the IV and ciphertext separately, and returns them as a colon-delimited string. The decryption function splits the colon-delimited value, hex-decodes the IV and ciphertext, and decrypts the command with the same AES key.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-and-privilege-strategy\"\u003ePersistence and privilege strategy\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT checks whether it is running as LocalSystem by comparing the current Windows identity SID to S-1-5-18, or whether it was launched with the -ServiceMode flag. If either condition is true, it connects to the C2 immediately. Otherwise, it performs persistence and elevation steps.\u003c/p\u003e\n\n\u003cp\u003eThe malware copies itself to %APPDATA%\\Microsoft\\Diagnosis\\ETW\\msedgeupdate.txt. It attempts to create a logon-triggered scheduled task named MicrosoftEdgeUpdateCore. If scheduled task creation fails, it writes a MicrosoftEdgeUpdateCore value under HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Run to re-execute the malware at user logon.\u003c/p\u003e\n\n\u003cp\u003eSmartRAT then prompts for UAC elevation. If elevation is approved, it compiles inline C# service code using csc.exe and installs a Windows service named MicrosoftEdgeUpdateCore under %ProgramData%\\Microsoft\\Diagnosis\\ETW\\. The service is configured to run with System privileges, and a watchdog checks every five seconds to ensure the SmartRAT PowerShell process continues running.\u003c/p\u003e\n\n\u003cp\u003eIf UAC elevation is denied, SmartRAT does not create the Windows service. Instead, it launches a hidden PowerShell process that bypasses the UAC logic and beacons to the C2, while the scheduled task can prompt for UAC elevation again at the next logon.\u003c/p\u003e\n\n\u003cp\u003eThe malware also compiles a C# component that uses DuplicateTokenEx and CreateProcessAsUser to spawn a new PowerShell process in the current user’s session, even when the RAT is running as SYSTEM.\u003c/p\u003e\n\n\u003ch2 id=\"supported-command-line-parameters\"\u003eSupported command-line parameters\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT supports command-line parameters for installation, service control, cleanup, and execution mode. The article lists the following parameters:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e-InstallService installs and starts the MicrosoftEdgeUpdateCore Windows service.\u003c/li\u003e\n\u003cli\u003e-UninstallService stops and deletes the Windows service and its executable.\u003c/li\u003e\n\u003cli\u003e-Uninstall removes persistence, including scheduled tasks, registry keys, and files.\u003c/li\u003e\n\u003cli\u003e-Reinstall uninstalls and then reinstalls SmartRAT.\u003c/li\u003e\n\u003cli\u003e-ServiceMode runs SmartRAT as a service and verifies internet connectivity by resolving google.com before execution.\u003c/li\u003e\n\u003cli\u003e-ServiceStatus displays the current status of the service and scheduled tasks.\u003c/li\u003e\n\u003cli\u003e-ScriptPath \u003cpath\u003e defines the source file location for installation.\u003c/li\u003e\n\u003cli\u003e-Force kills other PowerShell instances except itself and deletes lock PID files.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSmartRAT outputs the string SMART_V25 with the current timestamp as confirmation that it executed successfully.\u003c/p\u003e\n\n\u003ch2 id=\"embedded-c-components-and-victim-interaction\"\u003eEmbedded C# components and victim interaction\u003c/h2\u003e\n\n\u003cp\u003eBefore connecting to the C2, SmartRAT compiles and loads several embedded C# classes into memory:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNativeInput handles mouse and keyboard input, including freezing victim input.\u003c/li\u003e\n\u003cli\u003eWinEUpjgHelper captures the screen using BitBlt, although the article states this class is compiled but not invoked at runtime.\u003c/li\u003e\n\u003cli\u003eWindowMonitor retrieves the foreground window title and process name.\u003c/li\u003e\n\u003cli\u003eInputTracker acts as a high-priority keylogger.\u003c/li\u003e\n\u003cli\u003eIdleDetector tracks user inactivity with GetLastInputInfo.\u003c/li\u003e\n\u003cli\u003eQRDetector detects QR codes using pixel pattern analysis.\u003c/li\u003e\n\u003cli\u003eDisplayOverlay renders fullscreen fake overlays such as Windows Update, BSOD, and bank-branded security screens.\u003c/li\u003e\n\u003cli\u003eQROverlay displays fake overlays with bank branding.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSmartRAT enumerates connected monitors to map screen coordinates and resolutions. It calls SetProcessDpiAwareness from shcore.dll to bypass DPI scaling and obtain true physical pixel values. The malware stores monitor results in a global array so the operator can select a monitor index and align overlays and screen captures accurately.\u003c/p\u003e\n\n\u003ch2 id=\"financial-activity-monitoring\"\u003eFinancial activity monitoring\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT monitors window titles for keywords associated with banks, payment platforms, credit unions, cryptocurrency exchanges, and generic banking terms. The monitored terms include Santander, Bradesco, Itau, Caixa, bb.com.br, bancodobrasil, Nubank, Inter, C6 Bank, Safra, BTG, Sicoob, Sicredi, Mercado Pago, PicPay, PagSeguro, PayPal, Binance, Mercado Bitcoin, bank, and banco.\u003c/p\u003e\n\n\u003cp\u003eWhen a foreground window title matches the watchlist, SmartRAT logs the title, keyword, process name, and timestamp. It sends the information to the C2 as a BrowserAlert message with type 0x80. The article states that this alerts the operator that the victim is interacting with a financial application.\u003c/p\u003e\n\n\u003cp\u003eAfter receiving this alert, the operator can issue a dataEntry command containing bank-specific branding parameters, including name, color palette, prompt text, and input length. SmartRAT can then launch a fullscreen overlay such as a bank verification prompt, and the captured information is exfiltrated to the C2.\u003c/p\u003e\n\n\u003ch2 id=\"c2-communication-and-message-handling\"\u003eC2 communication and message handling\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT attempts to connect to its C2 server indefinitely. If domain resolution fails, it falls back to the hardcoded IP address. Once connected, it communicates over a raw TCP socket on port 51888 using a binary-framed message format.\u003c/p\u003e\n\n\u003cp\u003eDuring connection and setup, SmartRAT sends or handles these message types:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eClientHello, type 0x01, sends version string 7.3 to the server.\u003c/li\u003e\n\u003cli\u003eGuestInfo, type 0xE6, sends victim profile JSON including OS, username, host, privilege, session ID, install token, and HMAC.\u003c/li\u003e\n\u003cli\u003eSession negotiation uses message types 0x06, 0xE0, and 0xE1.\u003c/li\u003e\n\u003cli\u003eMonitor List, type 0x14, sends monitor layout information.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAfter connecting, SmartRAT enters a continuous loop. It pauses screen capture after more than 20 minutes of inactivity and resumes when activity returns. It also processes up to 20 C2 packets per main loop iteration.\u003c/p\u003e\n\n\u003ch2 id=\"smartrat-c2-commands-and-capabilities\"\u003eSmartRAT C2 commands and capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article lists a wide range of commands supported by SmartRAT, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePing and pong handling.\u003c/li\u003e\n\u003cli\u003eMouse movement, mouse button actions, mouse wheel scrolling, and keyboard injection.\u003c/li\u003e\n\u003cli\u003eArbitrary PowerShell execution through Invoke-Expression.\u003c/li\u003e\n\u003cli\u003eBuilt-in system commands for overlays, input blocking, crop areas, data entry, lock-screen interaction, logoff, restart, shutdown, client restart, and uninstall.\u003c/li\u003e\n\u003cli\u003eClipboard writing.\u003c/li\u003e\n\u003cli\u003eFile browsing and file exfiltration up to 50 MB.\u003c/li\u003e\n\u003cli\u003eImmediate screenshots and screen-stream quality changes.\u003c/li\u003e\n\u003cli\u003eMonitor switching.\u003c/li\u003e\n\u003cli\u003eFake Windows Security chat popups.\u003c/li\u003e\n\u003cli\u003eQR auto-detection toggling and QR overlay display or hiding.\u003c/li\u003e\n\u003cli\u003eKeylogger start and stop.\u003c/li\u003e\n\u003cli\u003eProcess list and service list retrieval.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSmartRAT also supports automatic screen streaming, with the default interval set to 12 milliseconds. It can continuously upload victim keystrokes to the C2.\u003c/p\u003e\n\n\u003ch2 id=\"qr-code-interception-workflow\"\u003eQR code interception workflow\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT includes QR auto-detection functionality. When enabled by the C2 with the AutoQRToggle command, the client scans all connected monitors every three seconds using a heuristic pixel-contrast and clustering algorithm to locate QR-code-shaped regions.\u003c/p\u003e\n\n\u003cp\u003eWhen it detects a QR region, it captures the full monitor as a JPEG, computes the QR bounding box, and sends the screenshot, region coordinates, monitor offset, and a deduplication hash to the C2 using the QRCodeDetected packet. The article states that in QR-swap workflows, the C2 performs the QR decoding server-side.\u003c/p\u003e\n\n\u003cp\u003eThe C2 can then respond with a ShowQROverlay command containing an attacker-supplied QR image. The client renders the QR image as a borderless TopMost window at the exact pixel coordinates of the original QR, effectively replacing the legitimate banking QR with the threat actor’s QR. The overlay remains until removed by the HideQROverlay command, and failed-decode regions are blacklisted for 30 to 60 seconds to avoid repeated transmissions.\u003c/p\u003e\n\n\u003ch2 id=\"c2-panel-weakness\"\u003eC2 panel weakness\u003c/h2\u003e\n\n\u003cp\u003eSmartRAT is managed from a web-based C2 panel. ThreatLabz observed verbose explanatory comments and frequent emoticons in the panel’s page source, which the article says suggests the use of AI tools during development.\u003c/p\u003e\n\n\u003cp\u003eThe panel had a critical authentication weakness. Its authentication logic relied only on the presence of two browser localStorage values, authToken and currentUser, to hide the login overlay. The article states that there was no server-side validation of these values before access to the panel UI was granted.\u003c/p\u003e\n\n\u003cp\u003eBecause this check was entirely client-side, a user could bypass the login screen by setting arbitrary values for authToken and currentUser in the browser’s localStorage. ThreatLabz showed the panel administration page with the sidebar populated with threat actor-controlled values.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-and-detection-coverage\"\u003eIndicators and detection coverage\u003c/h2\u003e\n\n\u003cp\u003eZscaler stated that its Cloud Sandbox detected SmartRAT and that its multilayered cloud security platform identifies indicators related to the campaign under these threat names:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePS.RAT.SmartRAT\u003c/li\u003e\n\u003cli\u003eHTML.Phish.Typosquat.RC.M.TS\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article listed the following indicators of compromise:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ecrefisa[.]online, fraudulent domain.\u003c/li\u003e\n\u003cli\u003evfsgloball[.]net, fraudulent domain.\u003c/li\u003e\n\u003cli\u003ecartaobb.com, fraudulent domain.\u003c/li\u003e\n\u003cli\u003ewindowsupdate-cdn[.]com, C2 domain.\u003c/li\u003e\n\u003cli\u003e297eb45f028d44d750297d2f932b9c91, st.txt.\u003c/li\u003e\n\u003cli\u003e6bf4d4c62b5138ace281ce3d08297787, payload.php.\u003c/li\u003e\n\u003cli\u003e3c72e1f37f115b00c3ad6ed31bacfe8a, PowerShell RAT.\u003c/li\u003e\n\u003cli\u003eb17ccdb5531555e43f082d6e77c07227, PowerShell RAT.\u003c/li\u003e\n\u003cli\u003e64[.]95[.]13[.]238, C2 IP.\u003c/li\u003e\n\u003cli\u003e162[.]141[.]111[.]227, C2 IP.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article mapped the campaign to several MITRE ATT\u0026amp;CK tactics and techniques, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInitial Access: T1566 Phishing.\u003c/li\u003e\n\u003cli\u003eExecution: T1059 Command and Scripting Interpreter, T1059.001 PowerShell, and T1569.002 Service Execution.\u003c/li\u003e\n\u003cli\u003ePersistence: T1543.003 Create or Modify System Process: Windows Service.\u003c/li\u003e\n\u003cli\u003ePrivilege Escalation: T1543.003 Create or Modify System Process: Windows Service.\u003c/li\u003e\n\u003cli\u003eDefense Evasion: T1036 Masquerading and T1070.004 Indicator Removal: File Deletion.\u003c/li\u003e\n\u003cli\u003eDiscovery: T1082 System Information Discovery.\u003c/li\u003e\n\u003cli\u003eCommand and Control: T1071 Application Layer Protocol.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that AI-powered website builders are enabling cybercriminals to generate fraudulent pages quickly, with high-fidelity visuals and at scale. In this case, threat actors used a website builder to create a fake page impersonating a Brazilian bank and used the ClickFix technique to deploy SmartRAT. Once installed, SmartRAT enabled remote access and data theft through capabilities tailored to banking activity, including overlays, keylogging, QR interception, and encrypted C2 communication.\u003c/p\u003e\n","keyPoints":["Zscaler ThreatLabz observed a March 2026 ClickFix campaign using an AI-generated typosquatting website impersonating a Brazilian bank to deliver the PowerShell-based SmartRAT malware.","The fake website displayed a fraudulent Cloudflare CAPTCHA and then a fullscreen fake BSOD recovery prompt to pressure victims into running a PowerShell command that downloaded and executed the malware.","SmartRAT supports encrypted command-and-control communications, remote screen and input control, credential theft through keylogging and fake bank-branded overlays, QR code interception, and persistence through scheduled tasks and a Windows service.","SmartRAT monitors window titles for Brazilian banking, payment, and cryptocurrency-related activity and can alert the operator when a victim interacts with targeted financial services.","ThreatLabz found that the SmartRAT web-based C2 panel had a client-side authentication weakness that allowed the login screen to be bypassed by setting arbitrary localStorage values."],"insights":["The lure’s JavaScript deliberately allows only the keystrokes needed for the ClickFix flow, such as Win+R, Ctrl+V, and Enter, while blocking most other input and repeatedly forcing fullscreen mode.","SmartRAT uses random trailing spaces in the copied PowerShell command, so even minor whitespace changes can alter hashes and potentially complicate hash-based detection.","SmartRAT’s C2 panel authentication depended only on browser localStorage values, meaning the administrative interface could be exposed by setting arbitrary authToken and currentUser values client-side.","SmartRAT can detect QR-code-shaped regions on banking pages and replace them with attacker-supplied QR overlays at the same screen coordinates, enabling QR-swap fraud workflows.","If UAC elevation is denied, SmartRAT still launches a hidden PowerShell process to beacon to the C2 and relies on the scheduled task to prompt for elevation again at the next logon."],"referencedReports":[],"body":"\u003cp\u003eZscaler ThreatLabz observed a March 2026 ClickFix campaign using a likely AI-generated website to impersonate a Brazilian bank. The typosquatting domain cartaobb[.]com mimicked the bank’s official domain and advertised a credit card application. The page used a fake Cloudflare CAPTCHA followed by a fullscreen fake BSOD recovery screen to pressure victims into executing a PowerShell command.\u003c/p\u003e\n\n\u003cp\u003eThe command downloaded a staged PowerShell payload from 64[.]95[.]13[.]238 and ultimately executed a PowerShell-based RAT that ThreatLabz named SmartRAT. SmartRAT is focused on banking fraud and remote access, with capabilities including encrypted C2 communications, screen and input control, keylogging, fake bank-branded overlays, QR code interception, and persistence through scheduled tasks and a Windows service. Trend Micro had previously written about the same malware family under the name Banana RAT, but with a different attack path.\u003c/p\u003e\n\n\u003cp\u003eSmartRAT monitors banking, payment, and cryptocurrency-related activity by checking foreground window titles for targeted keywords. It can alert operators when victims interact with financial services and then display bank-branded forms or overlays to capture data. ThreatLabz also found that the SmartRAT web-based C2 panel had a client-side authentication weakness that allowed the login screen to be bypassed by setting localStorage values.\u003c/p\u003e\n"},{"n":17,"title":"From Stars to Upvotes: Fake Reputation Fueling a Crypto Clipboard Hijacker","source":"research.checkpoint.com","sourceColorIdx":4,"link":"https://research.checkpoint.com/2026/from-stars-to-upvotes-fake-reputation-fueling-a-crypto-clipboard-hijacker/","time":"13:38","priority":"MUST READ","score":90,"tldr":"Check Point researchers found a Rust-based crypto clipboard hijacker distributed through fake “trading” and gambling tools, with the operator using inflated GitHub/SourceForge engagement, AI YouTube videos, news-site posts, and VirusTotal upvotes to make the malware look legitimate. The campaign targets Windows and macOS users and replaces copied cryptocurrency wallet addresses with attacker-controlled ones to steal funds.","briefOverview":"\u003cp\u003eCheck Point Research analyzed a campaign distributing Rust-based cryptocurrency clipboard hijackers disguised as “solutions” and “tools” promising unfair advantages, including Solana and Pump.fun sniper bots, Aviator Predictor, and crash-game predictors. The operation targets crypto owners, gamblers, and traders attracted by promises of quick profits and predictable outcomes. A WordPress phishing site acts as the central hub and links victims to GitHub, SourceForge, and YouTube content controlled or promoted by the actor.\u003c/p\u003e\n\n\u003cp\u003eThe campaign’s significance lies in its use of fake reputation across multiple platforms to make the malware appear legitimate. The actor inflates engagement through GitHub stars and forks, SourceForge ratings and downloads, YouTube views and comments, VirusTotal benign votes and “safe” comments, and promotional posts on news sites and forums. The article links several parts of the ecosystem to the Telegram handle and WordPress author name \u003ccode\u003e@JoseCmanXD\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe payloads are Rust-based clipboard hijackers for Windows and macOS. They monitor copied cryptocurrency wallet addresses and replace them with attacker-controlled addresses embedded in the binaries. The Windows version installs persistence via \u003ccode\u003e%APPDATA%\\\\silke\\\\silke.exe\u003c/code\u003e and a Startup shortcut, while the macOS version uses an “unlocker.command” script to remove quarantine attributes and a LaunchAgent plist to persist and relaunch.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCheck Point Research describes a campaign in which malicious “tools” are promoted as ways to gain an unfair advantage in cryptocurrency trading and online crash-style gambling games. The advertised tools include Solana and Pump.fun sniper bots, Aviator Predictor, and multiple crash-game predictors. The operation mainly targets users seeking shortcuts and quick profits, especially crypto owners, gamblers, and traders. The actual payloads delivered to victims are Rust-based cryptocurrency clipboard hijackers for Windows and macOS.\u003c/p\u003e\n\n\u003cp\u003eThe campaign uses a WordPress phishing website as its main landing page and extends across GitHub, SourceForge, YouTube, forums, and legitimate news websites. The WordPress author is \u003ccode\u003e@JoseCmanXD\u003c/code\u003e, and the same name appears as the Telegram contact on the site. The YouTube channel contact details also link back to the WordPress site and the Telegram account, tying the platforms together. The article says the actor appears to operate at least six GitHub accounts, including \u003ccode\u003eDecryptor-j\u003c/code\u003e, \u003ccode\u003ecrash-predictor1\u003c/code\u003e, \u003ccode\u003eroblox-script1\u003c/code\u003e, \u003ccode\u003ehack-scripts\u003c/code\u003e, and \u003ccode\u003estake-mines\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eA major part of the operation is the creation of false trust signals. GitHub repositories show inflated stars, forks, and downloads, while SourceForge projects show highly positive feedback and suspicious download statistics. YouTube videos use AI-generated narrators, suspicious view spikes, and highly positive comments, while some VirusTotal samples receive benign votes and comments claiming the binaries are safe. The article says these signals create a misleading impression of safety, especially when combined with low antivirus detection rates.\u003c/p\u003e\n\n\u003cp\u003eThe Windows version is delivered in ZIP archives containing a .NET loader that executes a Rust clipper stored in nested folders such as \u003ccode\u003esrc/config/silkebin.exe\u003c/code\u003e. The malware copies itself to \u003ccode\u003e%APPDATA%\\\\silke\\\\silke.exe\u003c/code\u003e, creates a Startup folder shortcut, registers as a clipboard listener, and uses Windows APIs including \u003ccode\u003eAddClipboardFormatListener\u003c/code\u003e, \u003ccode\u003eOpenClipboard\u003c/code\u003e, \u003ccode\u003eGetClipboardData\u003c/code\u003e, \u003ccode\u003eEmptyClipboard\u003c/code\u003e, and \u003ccode\u003eSetClipboardData\u003c/code\u003e. When it detects wallet-like strings using regular expressions, it replaces them with attacker-controlled wallet addresses. The newer Windows variant contains more than 15,500 embedded wallet addresses, including about 15,000 Bitcoin-related addresses and roughly 500 Ethereum addresses.\u003c/p\u003e\n\n\u003cp\u003eThe macOS version is distributed through the same ecosystem and includes instructions telling users to run \u003ccode\u003eunlocker.command\u003c/code\u003e if the app is blocked. The script removes macOS quarantine attributes with \u003ccode\u003exattr -cr\u003c/code\u003e and launches the application, helping users bypass Gatekeeper-style warnings. The Rust payload monitors the macOS pasteboard for wallet-like strings and replaces them with hardcoded attacker-controlled addresses. For persistence, it writes \u003ccode\u003e~/launch.sh\u003c/code\u003e and installs a LaunchAgent plist at \u003ccode\u003e~/Library/LaunchAgents/com.example..plist\u003c/code\u003e with \u003ccode\u003eRunAtLoad\u003c/code\u003e and \u003ccode\u003eKeepAlive\u003c/code\u003e, while a watchdog loop rewrites the files and reclones the binary.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCheck Point Research analyzed a campaign that distributes cryptocurrency clipboard hijackers disguised as tools that promise users unfair advantages. The promoted “solutions” include Solana and Pump.fun sniper bots, Aviator Predictor, and multiple crash-game predictors. The article says the operation mainly targets crypto owners, online crash-game gamblers, and traders who are looking for shortcuts, automated gains, and supposedly predictable outcomes.\u003c/p\u003e\n\n\u003cp\u003eThe campaign combines malware delivery with an extensive fake-reputation ecosystem. A WordPress phishing site acts as the main landing page, while GitHub, SourceForge, YouTube, forums, legitimate news websites, and VirusTotal are used to reinforce the appearance of legitimacy. The article describes this as an updated “Ghost Networks” model that repeatedly exposes victims to positive trust signals before they run the malware.\u003c/p\u003e\n\n\u003ch2 id=\"promotion-and-distribution-ecosystem\"\u003ePromotion and Distribution Ecosystem\u003c/h2\u003e\n\n\u003cp\u003eThe central phishing website promotes tools that claim to automate or predict profitable activity in cryptocurrency and gambling contexts. It advertises Solana, Pump.fun, and DEX sniper bots, along with Aviator Predictor and crash-game predictors. Victims are generally funneled to the site through links shared on social media, crypto forums, and Telegram channels.\u003c/p\u003e\n\n\u003cp\u003eThe WordPress author is identified as \u003ccode\u003e@JoseCmanXD\u003c/code\u003e, and the same name is used as the Telegram contact on the phishing page. The site links to GitHub, SourceForge, and YouTube, where related content shows signs of inflated engagement. Check Point Research says this activity appears to rely on Ghost Networks made up of fake or low-quality accounts and channels that promote the tools, boost views, and generate likes or comments.\u003c/p\u003e\n\n\u003ch2 id=\"github-and-sourceforge-activity\"\u003eGitHub and SourceForge Activity\u003c/h2\u003e\n\n\u003cp\u003eThe actor appears to operate at least six GitHub accounts to promote and distribute the malicious software. The main accounts attributed to the actor are \u003ccode\u003eDecryptor-j\u003c/code\u003e, \u003ccode\u003ecrash-predictor1\u003c/code\u003e, \u003ccode\u003eroblox-script1\u003c/code\u003e, \u003ccode\u003ehack-scripts\u003c/code\u003e, and \u003ccode\u003estake-mines\u003c/code\u003e. These accounts appear to collaborate with each other because they are sometimes listed as contributors to one another’s repositories.\u003c/p\u003e\n\n\u003cp\u003eMany repositories associated with these accounts received multiple stars and forks from various accounts. The article attributes this activity to GitHub Ghost Networks, where controlled or fake accounts repeatedly star and fork repositories to create the illusion of popularity and trustworthiness. Check Point Research observed just over 5,000 downloads and potential infections from the GitHub accounts, including more than 1,250 downloads associated with the macOS version of Aviator Predictor.\u003c/p\u003e\n\n\u003cp\u003eSourceForge is also used to promote the malicious tools. The article says SourceForge projects show fake or coordinated positive feedback similar to other platforms that support user engagement. SourceForge download statistics appear highly manipulated, with a total of 44,485 downloads, most reportedly originating from Pakistan and India.\u003c/p\u003e\n\n\u003cp\u003eA particularly suspicious SourceForge detail is that 37,460 downloads appear to come from Android devices, even though the developer offers only Windows and macOS versions. The article says a plausible explanation is the use of an Android farm to artificially inflate SourceForge download counts, while noting that this cannot be fully confirmed.\u003c/p\u003e\n\n\u003ch2 id=\"youtube-and-ai-generated-promotion\"\u003eYouTube and AI-Generated Promotion\u003c/h2\u003e\n\n\u003cp\u003eThe phishing site also promotes a YouTube channel that showcases the advertised software. The videos have relatively high view and like counts, which the article says likely helps attract victims and convinces them of the tools’ supposed effectiveness. Some older videos appear to target Russian-speaking audiences, while more recent videos use English and appear aimed at a broader global audience.\u003c/p\u003e\n\n\u003cp\u003eThe YouTube account includes contact details that link the channel back to the WordPress site and the Telegram account \u003ccode\u003e@JoseCmanXD\u003c/code\u003e. The article says the videos show suspicious spikes in views rather than organic growth, consistent with the use of YouTube Ghost Networks. The comment sections contain highly positive engagement that appears designed to build trust, alongside comments from potentially real users complaining about the tools’ effectiveness.\u003c/p\u003e\n\n\u003cp\u003eThe videos are styled as personal tutorials. They show desktop activity and mouse movements as if a real user is demonstrating the software in real time. At the same time, an AI-generated narrator appears in the bottom-right corner and provides instructions, which the article says is likely used to make the demonstration feel more authentic and convincing.\u003c/p\u003e\n\n\u003ch2 id=\"virustotal-reputation-manipulation\"\u003eVirusTotal Reputation Manipulation\u003c/h2\u003e\n\n\u003cp\u003eCheck Point Research observed VirusTotal accounts posting community comments and casting benign votes to portray malicious indicators as harmless. Some samples from this campaign had low detection rates and also showed positive engagement on VirusTotal, including upvotes and comments describing the binaries as safe. The article says this combination can create a misleading impression of safety for users and may influence reputation-based detection systems.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the low detection rate is not caused by the positive engagement. Instead, the risk comes from the combination of low detections and seemingly positive community feedback. This creates a false sense of trust around the malicious files.\u003c/p\u003e\n\n\u003ch2 id=\"promotion-through-news-sites-and-forums\"\u003ePromotion Through News Sites and Forums\u003c/h2\u003e\n\n\u003cp\u003eWhile searching for the Telegram handle \u003ccode\u003e@JoseCmanXD\u003c/code\u003e, Check Point Research found references on legitimate news websites. These posts appeared to be advertisements promoting the tool’s alleged capabilities and linking back to the phishing page. The article says this type of exposure can mislead users because the malicious tool appears alongside trusted news content.\u003c/p\u003e\n\n\u003cp\u003eAdditional related posts were found on other news-oriented sources, all apparently published on April 27, 2026. Most of these posts were later taken down and remain only as remnants in Google search results. The article says it is unclear whether they were paid advertisements later removed after notification, or whether a malicious service or compromised news outlets enabled the fraudulent promotion.\u003c/p\u003e\n\n\u003cp\u003eThe actor also promoted the malicious tool on forums used by the target audience, including cryptocurrency-focused communities. One example is BitcoinTalk.org, where the actor posted promotional content. The article also identifies earlier activity on a hacking forum, where the same user had been active since 2019 and in 2022 posted a thread titled \u003ccode\u003eBLACKHAT | Bitcoin Stealer | Advanced Builder | Tutorial | Clipper [Address Changer]+Re-Fud method\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"windows-malware-behavior\"\u003eWindows Malware Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe Windows “solutions” are downloaded as ZIP archives containing multiple files, most of which are unused during execution. The victim runs a file such as \u003ccode\u003eSniperBot_Premium(Free).exe\u003c/code\u003e, depending on the promoted tool name. This file is described as a simple .NET loader that executes another file located at \u003ccode\u003esrc/config/silkebin.exe\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe executed Windows binary is a Rust-built cryptocurrency clipboard hijacker. It installs persistence by copying itself to \u003ccode\u003e%APPDATA%\\\\silke\\\\silke.exe\u003c/code\u003e and creating a shortcut in the Startup folder so it runs automatically at logon. It then creates a hidden window and registers as a clipboard listener.\u003c/p\u003e\n\n\u003cp\u003eThe malware uses Windows APIs such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eAddClipboardFormatListener\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eOpenClipboard\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eGetClipboardData\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eEmptyClipboard\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eSetClipboardData\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eWhenever the clipboard changes, the malware checks whether the new text matches cryptocurrency wallet address patterns using regular expressions. If a supported wallet format is detected, the malware replaces the copied text with an attacker-controlled address from an internal list.\u003c/p\u003e\n\n\u003ch2 id=\"windows-wallet-targeting\"\u003eWindows Wallet Targeting\u003c/h2\u003e\n\n\u003cp\u003eThe latest Windows version contains more than 15,500 attacker-controlled wallet addresses. According to the article, about 15,000 are Bitcoin-related, including 5,000 Bitcoin bech32 addresses, 5,000 Bitcoin legacy addresses, and 5,000 Bitcoin P2SH addresses. Roughly 500 are Ethereum addresses, and the rest include Bitcoin Cash, Bitcoin Gold, Monero, Dogecoin, Cardano, Litecoin, Tron, XRP, Zcash, Stellar, and other formats.\u003c/p\u003e\n\n\u003cp\u003eThe article says the attacker’s wallets appear to be replaced frequently. In many cases, once a malicious transaction is completed, the attacker appears to swap the used wallet for a new, clean one. Older samples of this variant contained fewer attacker-controlled wallets, typically only one per targeted currency, and targeted fewer cryptocurrencies overall.\u003c/p\u003e\n\n\u003cp\u003eThe newer Windows variant expands targeting to additional cryptocurrencies such as Bitcoin Gold, Stellar, Cardano legacy/Byron, and Dogecoin. At the same time, it removed support for Binance Chain compared with earlier behavior described in the article.\u003c/p\u003e\n\n\u003ch2 id=\"macos-malware-behavior\"\u003emacOS Malware Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe campaign also targets macOS users through the same website, GitHub repositories, and SourceForge projects. The macOS packages are aimed at the same audience as the Windows versions and have the same goal of stealing cryptocurrency. Victims download a ZIP file that includes an instruction file named \u003ccode\u003e!!! READ THIS - RUN UNLOCKER IF APP IS BLOCKED.txt\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe instruction file tells users to run \u003ccode\u003eunlocker.command\u003c/code\u003e if the app is blocked. The script searches for \u003ccode\u003e.app\u003c/code\u003e bundles in the same folder or uses an app dragged onto it, removes the macOS quarantine attribute using \u003ccode\u003exattr -cr\u003c/code\u003e, and opens the selected application. The article says the dialogs and messages make it easier for non-technical users to bypass Gatekeeper warnings and run the malicious app.\u003c/p\u003e\n\n\u003cp\u003eLike the Windows version, the macOS main program is a loader that executes another file from nested folders. The executed file is a Rust-based macOS clipboard hijacker. It monitors the macOS pasteboard, detects wallet-like strings using embedded regular expressions, and replaces them with hardcoded attacker-controlled wallet addresses bundled inside the binary.\u003c/p\u003e\n\n\u003ch2 id=\"macos-persistence\"\u003emacOS Persistence\u003c/h2\u003e\n\n\u003cp\u003eThe macOS malware maintains persistence by writing a shell script wrapper to \u003ccode\u003e~/launch.sh\u003c/code\u003e. It also installs a LaunchAgent plist at \u003ccode\u003e~/Library/LaunchAgents/com.example..plist\u003c/code\u003e. The plist uses \u003ccode\u003eRunAtLoad\u003c/code\u003e and \u003ccode\u003eKeepAlive\u003c/code\u003e, causing \u003ccode\u003elaunchd\u003c/code\u003e to silently re-execute the binary on login and restart it if it dies.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes a 30-second watchdog loop named \u003ccode\u003emw_watchdog_copy_and_relaunch\u003c/code\u003e. This loop continuously rewrites both persistence files and clones the binary using \u003ccode\u003efcopyfile\u003c/code\u003e. As a result, the persistence is self-healing against manual removal unless the running process is killed first.\u003c/p\u003e\n\n\u003cp\u003eThe macOS variant appears closer in design to the older Windows version. Each regular expression pattern is associated with only one attacker-controlled wallet address, rather than the newer Windows version’s large per-currency address lists.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-indicators\"\u003eImpact and Indicators\u003c/h2\u003e\n\n\u003cp\u003eThe article says attacker-controlled cryptocurrency wallets appear to have received multiple transactions, providing the actor with notable illicit gains. GitHub alone accounted for just over 5,000 downloads and potential infections from the identified accounts, while SourceForge showed 44,485 downloads. The total number of downloads and potential infections is described as significantly higher when downloads from other platforms and the phishing site are included.\u003c/p\u003e\n\n\u003cp\u003eCheck Point Research provides indicators of compromise for several components, including Windows clipboard hijacking malware, .NET loaders, macOS clipboard hijacking malware, and macOS loaders. The listed hashes include multiple Windows malware samples, two .NET loader hashes, one macOS clipboard hijacking malware hash, and one macOS loader hash.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that the operation combines relatively simple malware with aggressive social engineering and cross-platform reputation manipulation. The actor uses fake engagement on GitHub, SourceForge, YouTube, VirusTotal, news sites, and forums to make malicious tools appear popular, safe, and legitimate. Check Point Research frames the campaign as an example of how threat actors can manipulate crowd-sourced trust and reputation systems to lower suspicion and attract more victims.\u003c/p\u003e\n","keyPoints":["Check Point Research analyzed a campaign distributing Rust-based cryptocurrency clipboard hijackers disguised as tools such as Solana and Pump.fun sniper bots, Aviator Predictor, and crash-game predictors.","The threat actor used a WordPress phishing site as a central landing page and promoted the malicious tools through GitHub, SourceForge, YouTube, crypto forums, and posts on legitimate news websites.","The campaign inflated trust signals with fake or coordinated engagement, including GitHub stars and forks, SourceForge ratings and downloads, YouTube views and comments, and benign VirusTotal votes and comments.","The Windows payload persists by copying itself to %APPDATA%\\\\silke\\\\silke.exe and creating a Startup folder shortcut, then monitors the clipboard and replaces cryptocurrency wallet addresses with attacker-controlled addresses.","The macOS payload uses an “unlocker.command” script to remove quarantine attributes and installs a LaunchAgent plist with RunAtLoad and KeepAlive to maintain persistence while monitoring and replacing wallet addresses in the pasteboard."],"insights":["The campaign attempts to manipulate not only user-facing reputation signals such as GitHub stars and YouTube comments, but also VirusTotal community votes and “safe” comments, which the article notes may influence reputation-based detection decisions when antivirus detections are already low.","SourceForge download statistics showed 37,460 downloads from Android devices even though the actor only offered Windows and macOS versions, which the article describes as highly suspicious and potentially consistent with artificial download inflation.","The Windows variant expanded from older versions that used only a few attacker-controlled wallets to a newer version containing more than 15,500 embedded wallet addresses, including about 15,000 Bitcoin-related addresses and roughly 500 Ethereum addresses.","The macOS package includes user-facing instructions and an “unlocker.command” script that specifically guides victims through bypassing Gatekeeper-style blocking by removing the quarantine attribute before launching the malicious app.","The same Telegram handle, @JoseCmanXD, links the WordPress phishing site, YouTube channel, news-site promotions, and earlier hacking-forum activity involving a crypto clipper and interest in generating unlimited YouTube views."],"referencedReports":[],"body":"\u003cp\u003eCheck Point Research analyzed a campaign distributing Rust-based cryptocurrency clipboard hijackers disguised as “solutions” and “tools” promising unfair advantages, including Solana and Pump.fun sniper bots, Aviator Predictor, and crash-game predictors. The operation targets crypto owners, gamblers, and traders attracted by promises of quick profits and predictable outcomes. A WordPress phishing site acts as the central hub and links victims to GitHub, SourceForge, and YouTube content controlled or promoted by the actor.\u003c/p\u003e\n\n\u003cp\u003eThe campaign’s significance lies in its use of fake reputation across multiple platforms to make the malware appear legitimate. The actor inflates engagement through GitHub stars and forks, SourceForge ratings and downloads, YouTube views and comments, VirusTotal benign votes and “safe” comments, and promotional posts on news sites and forums. The article links several parts of the ecosystem to the Telegram handle and WordPress author name \u003ccode\u003e@JoseCmanXD\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe payloads are Rust-based clipboard hijackers for Windows and macOS. They monitor copied cryptocurrency wallet addresses and replace them with attacker-controlled addresses embedded in the binaries. The Windows version installs persistence via \u003ccode\u003e%APPDATA%\\\\silke\\\\silke.exe\u003c/code\u003e and a Startup shortcut, while the macOS version uses an “unlocker.command” script to remove quarantine attributes and a LaunchAgent plist to persist and relaunch.\u003c/p\u003e\n"},{"n":6,"title":"Hostile states behind three-quarters of attacks on Britain's critical infrastructure, cyber chief warns","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/britain-nation-state-cyberattacks-richard-horne-rusi","time":"17:55","priority":"SHOULD READ","score":85,"tldr":"The UK’s cyber chief warned that hostile states are behind about three-quarters of cyber incidents affecting Britain’s critical infrastructure, with adversaries already prepositioning for potential future conflict. He urged organizations to treat cybersecurity as an ongoing contest against capable opponents, not just a risk-management exercise.","briefOverview":"\u003cp\u003eRichard Horne, chief executive of the UK’s National Cyber Security Centre, warned that hostile states are responsible for about three-quarters of attacks affecting Britain’s critical national infrastructure. He said the NCSC handled more than 200 incidents affecting critical infrastructure and its supporting ecosystem in the year to May. The warning builds on his earlier disclosure that the agency was handling four nationally significant cyber incidents a week.\u003c/p\u003e\n\n\u003cp\u003eHorne said adversaries are establishing footholds in technology underpinning critical infrastructure so they can enable rapid exploitation and cause mass disruption during a conflict. He cited Volt Typhoon, a Chinese state-linked campaign exposed against U.S. infrastructure, as the clearest example of this tactic. He also warned that intelligence gathered today could shape kinetic targeting in future conflicts.\u003c/p\u003e\n\n\u003cp\u003eThe speech marked a shift in tone from treating cybersecurity as a manageable risk to describing it as a continuous contest. Horne said organizations should compare their defenses against adversaries rather than industry peers and that cybersecurity investment will never be finished. The remarks came as the UK advances the Cyber Security and Resilience Bill and prepares a new National Cyber Action Plan expected in early July.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe UK’s cyber chief, Richard Horne, warned that Britain is already experiencing the opening exchanges of future conflicts in cyberspace. Speaking at the Royal United Services Institute, he said the National Cyber Security Centre handled more than 200 incidents affecting critical national infrastructure and its supporting ecosystem in the year to May. About 75% of those incidents were believed to be the work of state actors.\u003c/p\u003e\n\n\u003cp\u003eHorne said the NCSC is regularly finding and stopping breaches before their intent becomes clear. He warned that adversaries are prepositioning throughout British critical infrastructure by establishing footholds in the technology that underpins it. According to Horne, such footholds could enable rapid exploitation and mass disruption in a time of conflict.\u003c/p\u003e\n\n\u003cp\u003eThe speech referred to Volt Typhoon, the Chinese state-linked campaign exposed against U.S. infrastructure, as the clearest example of this prepositioning tactic. The article notes that this reference is significant because British intelligence has generally been more guarded than Washington about publicly naming such intrusions. Horne also said kinetic targeting in any future conflict would be based on intelligence gathered today.\u003c/p\u003e\n\n\u003cp\u003eHorne’s remarks shifted away from the NCSC’s long-standing vocabulary of cybersecurity as risk management. He argued that cybersecurity should instead be understood as a contest, saying that the only meaningful benchmark is how an organization’s capability and performance compare with its opponent. He also said executives asking when cybersecurity investment will be complete should understand that the answer is never.\u003c/p\u003e\n\n\u003cp\u003eThe speech aligns with broader Western government language describing cyberspace as a permanently contested environment, including NATO’s 2022 strategic concept and statements from U.S. Cyber Command officials. Horne repeated his call for a “full court press” across near, mid and far spaces of cyberspace. He also said artificial intelligence would sharpen the threat, citing a new NCSC assessment that it is highly likely AI tools will be used by 2028 to exploit known weaknesses in ageing technology across critical infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe warning comes as the UK government moves to complete passage of the Cyber Security and Resilience Bill, which would use regulation to compel improvements at operators of essential services. The government is also planning a new National Cyber Action Plan, which Recorded Future News understands is currently set to be published in early July. Horne concluded that there are no spectators in the contest and that all parties must embrace the urgency of the challenge.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eRichard Horne, chief executive of the UK’s National Cyber Security Centre, warned that hostile states are behind about three-quarters of cyber incidents affecting Britain’s critical national infrastructure. He said the NCSC handled more than 200 incidents affecting critical infrastructure and its supporting ecosystem in the year to May, and that approximately 75% were believed to be the work of state actors.\u003c/p\u003e\n\n\u003cp\u003eHorne delivered the remarks during the annual security lecture at the Royal United Services Institute. The article says the disclosure builds on his earlier statement that the NCSC was handling four nationally significant cyber incidents per week, with the majority traced to what are believed to be hostile governments rather than criminal hackers.\u003c/p\u003e\n\n\u003ch2 id=\"core-warning\"\u003eCore warning\u003c/h2\u003e\n\n\u003cp\u003eHorne said the UK is not merely preparing for future conflict in cyberspace, but is already fighting some of its opening exchanges. He stated that the NCSC is “regularly finding and stopping breaches, before their intent becomes clear.”\u003c/p\u003e\n\n\u003cp\u003eHe warned that adversaries are prepositioning throughout British critical infrastructure. He described this as establishing footholds within technology that underpins critical national infrastructure, which could allow rapid exploitation and mass disruption during a conflict.\u003c/p\u003e\n\n\u003cp\u003eHorne also said that “kinetic targeting in any conflict tomorrow will be based on intelligence gathered today.” This framed current intrusions not only as immediate cybersecurity incidents, but as activity that may support future physical or military targeting.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actors-and-referenced-campaigns\"\u003eThreat actors and referenced campaigns\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies hostile states as responsible for the majority of the incidents Horne discussed, but it does not provide detailed attribution for the UK incidents. Horne cited Volt Typhoon, a Chinese state-linked campaign exposed against U.S. infrastructure, as the clearest example of the prepositioning tactic he described.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that the reference to Volt Typhoon is significant because British intelligence has generally been more guarded than Washington about naming such intrusions. It says one reason for this caution is that public acknowledgment could inadvertently assist the perpetrators.\u003c/p\u003e\n\n\u003ch2 id=\"critical-infrastructure-impact\"\u003eCritical infrastructure impact\u003c/h2\u003e\n\n\u003cp\u003eThe incidents described affected Britain’s critical national infrastructure and its supporting ecosystem. The article does not detail the specific breaches, affected sectors, or operational consequences. It emphasizes the strategic concern that access to infrastructure technology could be used to cause mass disruption during a conflict.\u003c/p\u003e\n\n\u003cp\u003eThe NCSC’s role, as described in the article, included finding and stopping breaches before their intent became clear. Horne’s comments suggest concern over intrusions whose objectives may not be immediately visible at the time they are detected.\u003c/p\u003e\n\n\u003ch2 id=\"shift-in-cybersecurity-framing\"\u003eShift in cybersecurity framing\u003c/h2\u003e\n\n\u003cp\u003eA major theme of the speech was a change in how cybersecurity should be discussed and managed. Horne argued that it should no longer be treated as a “risk” to be managed and tolerated, but as a “contest” to be fought.\u003c/p\u003e\n\n\u003cp\u003eThe article contrasts this with the NCSC’s previous language, noting that risk management has long been central to British cyber advice. It points to the NCSC’s Cyber Assessment Framework, which opens with an objective titled “managing security risk,” and to existing NCSC guidance on risk assessment, risk quantification and risk appetite.\u003c/p\u003e\n\n\u003cp\u003eHorne said that when executives ask when they will be done investing in cybersecurity, the answer is “never.” He also said that benchmarking defenses against industry rivals is inadequate, arguing that the only benchmark that matters is how an organization’s capability and performance compare to that of its opponent.\u003c/p\u003e\n\n\u003ch2 id=\"alignment-with-allied-cyber-doctrine\"\u003eAlignment with allied cyber doctrine\u003c/h2\u003e\n\n\u003cp\u003eThe article says Horne’s shift in tone places the NCSC’s vocabulary in line with broader Western government descriptions of cyberspace. NATO’s 2022 strategic concept declared that cyberspace is “contested at all times,” and allied officials have since echoed the view that cyberspace is a permanently contested environment.\u003c/p\u003e\n\n\u003cp\u003eSenior figures at U.S. Cyber Command have made similar arguments, warning that a steady pattern of attacks below the threshold of war is still producing “strategically conse
