<script>
window.__DL_ARTICLES = [{"n":16,"title":"FortiBleed leak exposes Fortinet VPN credentials for 73,000 devices.","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/fortibleed-leak-exposes-fortinet-vpn-credentials-for-73-000-devices/","time":"15:12","priority":"MUST READ","score":100,"tldr":"A leaked dataset dubbed FortiBleed appears to expose valid Fortinet/FortiGate VPN and admin credentials for about 74,000 firewall URLs worldwide, including major enterprises and government-linked organizations. Affected organizations should immediately rotate Fortinet passwords, enable MFA, and review logs for compromise.","briefOverview":"\u003cp\u003eA newly discovered leak dubbed “FortiBleed” exposed what appears to be Fortinet and FortiGate VPN credentials for 73,932 firewall URLs at organizations worldwide. Security researcher Bob Diachenko said he found a server containing usernames, email addresses, and plaintext passwords. The exposed entries reportedly included major organizations such as Chevron, Samsung, Foxconn, Comcast, AT\u0026amp;T, Mercedes-Benz, Toyota, Sinopec, and State Grid.\u003c/p\u003e\n\n\u003cp\u003eDiachenko later said the operation appeared to involve a Russian-speaking multi-operator threat group harvesting credentials for FortiGate SSL VPN devices. He claimed the attackers conducted about 1.16 billion credential attempts against 320,777 FortiGate targets and 2.1 billion attempts against 163,650 Microsoft SQL Server systems. He also said additional exposed files included artifacts, connection strings, tooling, scripts, analytics, bash histories, and logs.\u003c/p\u003e\n\n\u003cp\u003eHudson Rock and cybersecurity researcher Kevin Beaumont reviewed the dataset and said it appears to contain real compromised Fortinet-related credentials. Beaumont said the data likely came from exported Fortinet configurations and that many affected devices remain online. Organizations listed in the dataset are advised to rotate Fortinet VPN and administrative passwords, enforce MFA, inspect gateway logs, and monitor for exposed employee credentials.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA data leak called “FortiBleed” exposed what appears to be a collection of Fortinet and FortiGate VPN credentials for 73,932 firewall URLs across organizations worldwide. Security researcher Bob Diachenko discovered the exposed server and said it contained usernames, email addresses, and plaintext passwords. Screenshots and information he shared showed entries for organizations including Chevron, Samsung, Foxconn, Comcast, AT\u0026amp;T, Mercedes-Benz, Toyota, Sinopec, State Grid, and others.\u003c/p\u003e\n\n\u003cp\u003eDiachenko described the exposure as part of a massive Fortinet and FortiGate bruteforce and active exploitation campaign. He later said the operation was conducted by a Russian-speaking multi-operator threat group that harvested credentials for FortiGate SSL VPN devices. According to his investigation, the attackers made roughly 1.16 billion credential attempts against 320,777 FortiGate targets and 2.1 billion attempts against 163,650 Microsoft SQL Server systems.\u003c/p\u003e\n\n\u003cp\u003eDiachenko said the attackers intercepted SSL VPN authentication hashes, cracked them using a 45-GPU cluster managed through Hashtopolis, and used recovered credentials to move laterally into internal Active Directory environments. He told BleepingComputer that these details came from files accidentally left exposed on the same server, including artifacts, connection strings, tooling, scripts, cron job analytics, bash histories, and logs. He also said several organizations in Japan, Taiwan, Vietnam, Iraq, and Turkey were fully compromised, including a Turkish NATO defense contractor from which classified documents were allegedly stolen.\u003c/p\u003e\n\n\u003cp\u003eHudson Rock published its own analysis after receiving the dataset from Diachenko and described it as one of the largest known troves of compromised Fortinet-related credentials. The company said the dataset contains 73,932 unique firewall URLs across 194 countries and affects 21,632 unique domains. It reported that listed organizations span nearly every major industry sector, including telecommunications, IT services, financial services, government, healthcare, education, and manufacturing.\u003c/p\u003e\n\n\u003cp\u003eCybersecurity researcher Kevin Beaumont independently reviewed portions of the exposed data and said he confirmed the authenticity of some admin logins and passwords. Beaumont later said the dataset contains credentials for roughly 75,000 Fortinet devices, most of which remain online, and that the data appears to have originated from exported Fortinet configurations. The source of the configuration data remains unknown, and organizations in the dataset are advised to rotate Fortinet VPN and administrative passwords, enforce MFA, examine gateway logs, and monitor for exposed employee credentials.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA newly discovered data leak dubbed “FortiBleed” exposed what appears to be Fortinet and FortiGate VPN credentials for 73,932 firewall URLs at organizations worldwide. The data was first discovered by security researcher Bob Diachenko, who said he found a server containing apparently valid Fortinet VPN credentials. The exposed data included usernames, email addresses, and plaintext passwords.\u003c/p\u003e\n\n\u003cp\u003eAccording to screenshots and information shared by Diachenko, the dataset included entries for major organizations such as Chevron, Samsung, Foxconn, Comcast, AT\u0026amp;T, Mercedes-Benz, Toyota, Sinopec, State Grid, and others. The exposed data also contained comments listing each organization’s industry, revenue, and number of employees, which the article says was likely for planning attacks.\u003c/p\u003e\n\n\u003ch2 id=\"reported-campaign-details\"\u003eReported Campaign Details\u003c/h2\u003e\n\n\u003cp\u003eDiachenko described the incident as a “Massive Fortinet/FortiGate bruteforce/active exploitation campaign” in a LinkedIn post. He said thousands of top vendor instances were listed in the files and noted that one file alone contained 21,634 domain names. He also said the data included potentially working passwords to FortiGate appliances obtained through various means.\u003c/p\u003e\n\n\u003cp\u003eDiachenko later shared additional information claiming that the operation was conducted by a Russian-speaking multi-operator threat group. He said the group harvested credentials for FortiGate SSL VPN devices.\u003c/p\u003e\n\n\u003cp\u003eAccording to Diachenko’s investigation, the attackers allegedly conducted:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApproximately 1.16 billion credential attempts against 320,777 FortiGate targets.\u003c/li\u003e\n\u003cli\u003eAn additional 2.1 billion attempts against 163,650 Microsoft SQL Server systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDiachenko further claimed that the threat actors intercepted SSL VPN authentication hashes, cracked them with a 45-GPU cluster managed through Hashtopolis, and used recovered credentials to move laterally into internal Active Directory environments.\u003c/p\u003e\n\n\u003ch2 id=\"exposed-attacker-infrastructure-and-files\"\u003eExposed Attacker Infrastructure and Files\u003c/h2\u003e\n\n\u003cp\u003eDiachenko told BleepingComputer that he obtained additional details by analyzing files inadvertently exposed on the same server. He said the operators accidentally left an open directory containing artifacts, connection strings, tooling, scripts, and data. He also said analytics from cron jobs, bash histories, and logs were exposed.\u003c/p\u003e\n\n\u003cp\u003eThe researcher stated that multiple organizations in Japan, Taiwan, Vietnam, Iraq, and Turkey were fully compromised. He also said a Turkish NATO defense contractor was among the affected organizations and that classified documents were allegedly stolen from it.\u003c/p\u003e\n\n\u003ch2 id=\"hudson-rock-analysis\"\u003eHudson Rock Analysis\u003c/h2\u003e\n\n\u003cp\u003eThreat intelligence company Hudson Rock later published its own analysis after receiving the dataset from Diachenko. Hudson Rock described the collection as one of the largest known troves of compromised Fortinet-related credentials.\u003c/p\u003e\n\n\u003cp\u003eAccording to Hudson Rock, the dataset contains:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e73,932 unique firewall URLs.\u003c/li\u003e\n\u003cli\u003eAffected systems across 194 countries.\u003c/li\u003e\n\u003cli\u003e21,632 unique impacted domains.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHudson Rock said the attackers maintained detailed logs of successful compromises and assembled a database of verified credentials for organizations across nearly every major industry sector. The company said organizations appearing in the dataset include Foxconn, Samsung, Comcast, Siemens, Lenovo, PwC, Accenture, Oracle, government agencies, and critical infrastructure operators.\u003c/p\u003e\n\n\u003cp\u003eHudson Rock also released statistics showing that the highest number of affected devices was in India, the United States, Taiwan, Mexico, Turkey, Thailand, Colombia, Malaysia, Chile, and the United Arab Emirates. It said the most common sectors among listed companies were telecommunications, IT services, financial services, government organizations, healthcare providers, educational institutions, and manufacturing.\u003c/p\u003e\n\n\u003ch2 id=\"unusual-password-findings\"\u003eUnusual Password Findings\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that one unusual aspect of the leak is that many exposed credentials were long, complex passwords. These would ordinarily be considered difficult to crack. The article does not identify a confirmed method by which those credentials were originally obtained.\u003c/p\u003e\n\n\u003ch2 id=\"beaumont-review-and-configuration-data-findings\"\u003eBeaumont Review and Configuration Data Findings\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researcher Kevin Beaumont independently reviewed portions of the exposed data and told BleepingComputer that some of the credentials are authentic. He said he was able to confirm the authenticity of some admin logins and passwords and described the material as a real dump.\u003c/p\u003e\n\n\u003cp\u003eAfter reviewing data shared by Hudson Rock, Beaumont published additional findings indicating that the dataset contains credentials for roughly 75,000 Fortinet devices. He said most of those devices remain online.\u003c/p\u003e\n\n\u003cp\u003eBeaumont said the data appears to have originated from exported Fortinet configurations. He based this on the presence of information, including email addresses, that is typically accessible only through configurations.\u003c/p\u003e\n\n\u003cp\u003eHe also said the affected IP addresses differ from those in the 2025 Belsen Group Fortinet leak. According to the article, this further indicates that FortiBleed is a more recent and larger collection of compromised devices.\u003c/p\u003e\n\n\u003cp\u003eBeaumont said multiple organizations listed in the dataset were using valid credentials. He also observed that many affected devices were running relatively recent FortiOS versions.\u003c/p\u003e\n\n\u003ch2 id=\"internet-exposure-and-scope\"\u003eInternet Exposure and Scope\u003c/h2\u003e\n\n\u003cp\u003eBased on Shodan network data, Beaumont said the leak contains approximately half of all internet-accessible Fortinet firewalls. He also said that a majority of the affected devices expose their FortiGate management interfaces directly to the internet.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the source of the configuration data remains unknown. It is unclear whether the data was stolen through previously disclosed Fortinet vulnerabilities, a newly discovered flaw, or another method. Diachenko, Hudson Rock, and Beaumont have not identified how the configuration data was originally obtained.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions\"\u003eRecommended Actions\u003c/h2\u003e\n\n\u003cp\u003eThe article says Hudson Rock created a free FortiBleed lookup tool for organizations to check whether they are impacted. It also says organizations in the dataset should immediately take response steps.\u003c/p\u003e\n\n\u003cp\u003eRecommended actions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRotating passwords associated with Fortinet VPN and administrative interfaces.\u003c/li\u003e\n\u003cli\u003eEnforcing MFA.\u003c/li\u003e\n\u003cli\u003eExamining gateway logs for suspicious activity.\u003c/li\u003e\n\u003cli\u003eMonitoring for exposed employee credentials.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"fortinet-response-status\"\u003eFortinet Response Status\u003c/h2\u003e\n\n\u003cp\u003eBleepingComputer said it contacted Fortinet regarding the exposed dataset. The article states that it will be updated if a response is received.\u003c/p\u003e\n","keyPoints":["A newly discovered data leak dubbed FortiBleed exposed what appears to be Fortinet and FortiGate VPN credentials for 73,932 firewall URLs at organizations worldwide.","Security researcher Bob Diachenko said he found a server containing usernames, email addresses, and plaintext passwords, with entries referencing companies such as Chevron, Samsung, Foxconn, Comcast, AT\u0026T, Mercedes-Benz, Toyota, Sinopec, and State Grid.","Diachenko claimed the operation was conducted by a Russian-speaking multi-operator threat group that made about 1.16 billion credential attempts against 320,777 FortiGate targets and 2.1 billion attempts against 163,650 Microsoft SQL Server systems.","Cybersecurity researcher Kevin Beaumont said he confirmed the authenticity of some admin logins and passwords and found the dataset appears to have originated from exported Fortinet configurations.","Organizations in the dataset are advised to rotate Fortinet VPN and administrative passwords, enforce MFA, examine gateway logs for suspicious activity, and monitor for exposed employee credentials."],"insights":["The presence of long, complex passwords in the leaked dataset suggests that password strength alone may not have protected affected Fortinet devices from compromise.","Kevin Beaumont said the data appears to come from exported Fortinet configurations because it includes information such as email addresses that is typically only accessible through configs.","Beaumont estimated from Shodan data that the leak contains approximately half of all internet-accessible Fortinet firewalls, and that most affected devices expose FortiGate management interfaces directly to the internet.","The exposed files allegedly included comments about each organization’s industry, revenue, and employee count, indicating the data may have been organized to help prioritize follow-on attacks.","The affected IP addresses reportedly differ from those in the 2025 Belsen Group Fortinet leak, indicating this is a separate and larger collection rather than a duplicate of the earlier leak."],"referencedReports":[{"title":"FortiBleed: 75,000 Fortinet Firewalls Compromised, Global Enterprises Exposed","url":"http://www.infostealers.com/article/fortibleed-75000-fortinet-firewalls-compromised-global-enterprises-exposed-claim-your-ethical-disclosure/","publisher":"Hudson Rock","context":"The article says Hudson Rock published its own analysis of the exposed Fortinet credential dataset after receiving it from Bob Diachenko.","category":"research","primary":true},{"title":"FortiBleed: 75k Fortinet firewalls have admin passwords cracked","url":"https://doublepulsar.com/fortibleed-75k-fortinet-firewalls-have-admin-passwords-cracked-60299faa65f8?postPublishedType=initial","publisher":"Kevin Beaumont / DoublePulsar","context":"The article says Kevin Beaumont published additional findings after reviewing the data shared by Hudson Rock, including observations about the dataset’s apparent origin and affected devices.","category":"research","primary":true}],"body":"\u003cp\u003eA newly discovered leak dubbed “FortiBleed” exposed what appears to be Fortinet and FortiGate VPN credentials for 73,932 firewall URLs at organizations worldwide. Security researcher Bob Diachenko said he found a server containing usernames, email addresses, and plaintext passwords. The exposed entries reportedly included major organizations such as Chevron, Samsung, Foxconn, Comcast, AT\u0026amp;T, Mercedes-Benz, Toyota, Sinopec, and State Grid.\u003c/p\u003e\n\n\u003cp\u003eDiachenko later said the operation appeared to involve a Russian-speaking multi-operator threat group harvesting credentials for FortiGate SSL VPN devices. He claimed the attackers conducted about 1.16 billion credential attempts against 320,777 FortiGate targets and 2.1 billion attempts against 163,650 Microsoft SQL Server systems. He also said additional exposed files included artifacts, connection strings, tooling, scripts, analytics, bash histories, and logs.\u003c/p\u003e\n\n\u003cp\u003eHudson Rock and cybersecurity researcher Kevin Beaumont reviewed the dataset and said it appears to contain real compromised Fortinet-related credentials. Beaumont said the data likely came from exported Fortinet configurations and that many affected devices remain online. Organizations listed in the dataset are advised to rotate Fortinet VPN and administrative passwords, enforce MFA, inspect gateway logs, and monitor for exposed employee credentials.\u003c/p\u003e\n"},{"n":18,"title":"Mastra npm Scope Takeover: 140+ Packages Compromised via easy-day-js Dropper","source":"mend.io","sourceColorIdx":0,"link":"https://www.mend.io/blog/mastra-npm-scope-takeover-easy-day-js/","time":"10:32","priority":"MUST READ","score":95,"tldr":"An attacker compromised the @mastra npm scope by republishing 140+ packages with a malicious easy-day-js dependency that runs a postinstall dropper to steal secrets and crypto wallets. Any machine or CI system that installed affected packages should be treated as fully compromised, cleaned for persistence, and have credentials rotated.","briefOverview":"\u003cp\u003eAn attacker republished more than 140 packages in the \u003ccode\u003e@mastra\u003c/code\u003e npm scope, each with a malicious dependency named \u003ccode\u003eeasy-day-js\u003c/code\u003e. The compromised versions were observed on 2026-06-17. Installing any affected \u003ccode\u003e@mastra\u003c/code\u003e package caused npm to resolve \u003ccode\u003eeasy-day-js\u003c/code\u003e to version \u003ccode\u003e1.11.22\u003c/code\u003e, which contained an obfuscated \u003ccode\u003epostinstall\u003c/code\u003e dropper.\u003c/p\u003e\n\n\u003cp\u003eThe incident is significant because Mastra is described as a widely adopted TypeScript framework for building AI agents and applications, and its users often hold cloud keys, LLM provider keys, database credentials, and source-control tokens. Mend records over 20 million downloads for \u003ccode\u003e@mastra/core\u003c/code\u003e and over 19 million for \u003ccode\u003e@mastra/schema-compat\u003c/code\u003e. The article states that any project auto-updating these packages is in scope.\u003c/p\u003e\n\n\u003cp\u003eThe malicious \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e package downloaded a second-stage Node.js payload from \u003ccode\u003e23[.]254[.]164[.]92:8000/update/49890878\u003c/code\u003e and launched it as a detached, hidden process. The second stage communicated with \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e, harvested environment secrets and cryptocurrency wallet data, and installed persistence across macOS, Linux, and Windows. The article recommends treating any machine that installed an affected package as fully compromised.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAn attacker obtained publish access to the \u003ccode\u003e@mastra\u003c/code\u003e npm scope and republished more than 140 packages with one added dependency, \u003ccode\u003eeasy-day-js\u003c/code\u003e. The affected versions were observed on 2026-06-17. The carrier \u003ccode\u003e@mastra\u003c/code\u003e packages were not described as having modified application source; the functional change was the injected dependency and a version bump.\u003c/p\u003e\n\n\u003cp\u003eThe attack depended on the dependency declaration \u003ccode\u003e\u0026quot;easy-day-js\u0026quot;: \u0026quot;^1.11.21\u0026quot;\u003c/code\u003e. Version \u003ccode\u003e1.11.21\u003c/code\u003e of \u003ccode\u003eeasy-day-js\u003c/code\u003e was described as a clean prior release with no install hook, while version \u003ccode\u003e1.11.22\u003c/code\u003e added an obfuscated \u003ccode\u003epostinstall\u003c/code\u003e dropper. Because npm resolves caret ranges to the newest matching version at install time, fresh installs pulled the malicious \u003ccode\u003e1.11.22\u003c/code\u003e release.\u003c/p\u003e\n\n\u003cp\u003eThe \u003ccode\u003epostinstall\u003c/code\u003e hook executed \u003ccode\u003enode setup.cjs --no-warnings\u003c/code\u003e, causing the dropper to run automatically during installation. The dropper disabled TLS certificate verification by setting \u003ccode\u003eNODE_TLS_REJECT_UNAUTHORIZED=0\u003c/code\u003e, wrote marker files in the OS temp directory, fetched a second-stage payload from \u003ccode\u003ehxxps://23[.]254[.]164[.]92:8000/update/49890878\u003c/code\u003e, and staged it as a randomly named 24-hex-character \u003ccode\u003e.js\u003c/code\u003e file. It then launched the payload with Node as a detached, hidden background process and passed \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e as the second-stage C2 address.\u003c/p\u003e\n\n\u003cp\u003eThe second stage is described as a remote-access tool that harvests sensitive credentials and cryptocurrency-wallet data from the host and exfiltrates them to its C2. Targeted data included environment secrets such as \u003ccode\u003eOPENAI_API_KEY\u003c/code\u003e, \u003ccode\u003eANTHROPIC_API_KEY\u003c/code\u003e, \u003ccode\u003eGOOGLE_API_KEY\u003c/code\u003e, AWS keys, Azure tenant information, GitHub and npm tokens, and database connection strings. It also scanned browser wallet extensions including MetaMask, Phantom, Solflare, Coinbase Wallet, OKX, and Keplr in Chrome, Brave, and Edge.\u003c/p\u003e\n\n\u003cp\u003eThe article lists persistence artifacts for macOS, Linux, and Windows, including \u003ccode\u003e~/Library/LaunchAgents/com.nvm.protocal.plist\u003c/code\u003e, \u003ccode\u003e~/.config/systemd/user/nvmconf.service\u003c/code\u003e, and \u003ccode\u003eC:\\ProgramData\\NodePackages\u003c/code\u003e. Remediation guidance includes removing persistence artifacts before rotating tokens, blocking \u003ccode\u003e23[.]254[.]164[.]92\u003c/code\u003e and \u003ccode\u003e23[.]254[.]164[.]123\u003c/code\u003e, auditing lockfiles and dependency trees, and searching for temp-directory artifacts. Mend.io issued advisories \u003ccode\u003eMSC-2026-6172\u003c/code\u003e and \u003ccode\u003eMSC-2026-6173\u003c/code\u003e covering the affected packages.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAn attacker republished more than 140 packages in the \u003ccode\u003e@mastra\u003c/code\u003e npm scope, each carrying a single malicious dependency named \u003ccode\u003eeasy-day-js\u003c/code\u003e. The malicious versions were observed on 2026-06-17. The article describes this as a scope takeover in which publish access to the trusted \u003ccode\u003e@mastra\u003c/code\u003e scope allowed the attacker to fan out one malicious dependency across many packages.\u003c/p\u003e\n\n\u003cp\u003eMastra is described as a widely adopted TypeScript framework for building AI agents and applications. Its scope includes the \u003ccode\u003emastra\u003c/code\u003e and \u003ccode\u003ecreate-mastra\u003c/code\u003e entry points, \u003ccode\u003e@mastra/core\u003c/code\u003e, database and vector connectors, auth integrations, deployers, and provider SDKs. The article emphasizes that developers using this framework often hold high-value secrets, including cloud keys, LLM provider keys, database credentials, and source-control tokens.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-incident-matters\"\u003eWhy the Incident Matters\u003c/h2\u003e\n\n\u003cp\u003eThe affected packages are described as heavily used. Mend records over 20 million downloads for \u003ccode\u003e@mastra/core\u003c/code\u003e and over 19 million downloads for \u003ccode\u003e@mastra/schema-compat\u003c/code\u003e. The article states that any project that auto-updates these packages is in scope.\u003c/p\u003e\n\n\u003cp\u003eThe attack did not require malicious application code to be inserted into each \u003ccode\u003e@mastra\u003c/code\u003e package. Instead, each compromised release differed from its clean predecessor by a single functional change: an added dependency on \u003ccode\u003eeasy-day-js\u003c/code\u003e. This design meant the malicious code lived in the dependency, while the carrier packages could appear clean to per-package scanning.\u003c/p\u003e\n\n\u003ch2 id=\"initial-attack-vector\"\u003eInitial Attack Vector\u003c/h2\u003e\n\n\u003cp\u003eThe payload reached victim machines through normal npm dependency resolution. The attacker added the following dependency pattern to compromised \u003ccode\u003e@mastra\u003c/code\u003e packages:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e\u0026quot;easy-day-js\u0026quot;: \u0026quot;^1.11.21\u0026quot;\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article identifies \u003ccode\u003eeasy-day-js\u003c/code\u003e as a typosquat of the \u003ccode\u003edayjs\u003c/code\u003e date library. Version \u003ccode\u003e1.11.21\u003c/code\u003e of \u003ccode\u003eeasy-day-js\u003c/code\u003e was a clean prior release with no install hook. Version \u003ccode\u003e1.11.22\u003c/code\u003e added the malicious obfuscated \u003ccode\u003epostinstall\u003c/code\u003e dropper.\u003c/p\u003e\n\n\u003cp\u003eThe caret range was central to the attack. Because npm resolves \u003ccode\u003e^1.11.21\u003c/code\u003e to the newest matching version at install time, a fresh install of any affected \u003ccode\u003e@mastra\u003c/code\u003e package pulled \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e even though the declared version range referenced the clean \u003ccode\u003e1.11.21\u003c/code\u003e line.\u003c/p\u003e\n\n\u003ch2 id=\"stage-1-postinstall-execution\"\u003eStage 1: Postinstall Execution\u003c/h2\u003e\n\n\u003cp\u003eThe malicious \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e package added a lifecycle script to its \u003ccode\u003epackage.json\u003c/code\u003e:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003epostinstall\u003c/code\u003e: \u003ccode\u003enode setup.cjs --no-warnings\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis script ran automatically when the package was installed. The \u003ccode\u003e--no-warnings\u003c/code\u003e flag suppressed Node runtime warnings so that unusual behavior would not appear in install output. The executed file, \u003ccode\u003esetup.cjs\u003c/code\u003e, acted as the dropper.\u003c/p\u003e\n\n\u003ch2 id=\"stage-2-dropper-behavior\"\u003eStage 2: Dropper Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe \u003ccode\u003esetup.cjs\u003c/code\u003e dropper was obfuscated with \u003ccode\u003ejavascript-obfuscator\u003c/code\u003e. The article describes several obfuscation details, including a rotated 40-entry string array, a custom-alphabet base64 decoder, and an XOR-encoded byte array that reconstructed the marker string \u003ccode\u003eeasy-day-js\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eAfter deobfuscation, the dropper performed a short sequence of actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt disabled TLS certificate verification by setting \u003ccode\u003eprocess.env.NODE_TLS_REJECT_UNAUTHORIZED = '0'\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eIt wrote two marker files into the OS temp directory.\u003c/li\u003e\n\u003cli\u003eIt fetched a second-stage payload from \u003ccode\u003ehxxps://23[.]254[.]164[.]92:8000/update/49890878\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eIt wrote the downloaded payload to a randomly named 24-hex-character \u003ccode\u003e.js\u003c/code\u003e file in the OS temp directory.\u003c/li\u003e\n\u003cli\u003eIt launched the payload with the installer’s Node binary as a detached, hidden background process.\u003c/li\u003e\n\u003cli\u003eIt passed \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e as the second-stage C2 argument.\u003c/li\u003e\n\u003cli\u003eIt deleted \u003ccode\u003esetup.cjs\u003c/code\u003e from disk after spawning the second stage.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe dropper also wrote \u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_history\u003c/code\u003e, containing the package install path, and \u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_logs\u003c/code\u003e, containing \u003ccode\u003eeasy-day-js\u003c/code\u003e stored as an XOR-0x80 byte sequence.\u003c/p\u003e\n\n\u003ch2 id=\"stage-3-second-stage-payload\"\u003eStage 3: Second-Stage Payload\u003c/h2\u003e\n\n\u003cp\u003eThe dropper downloaded the second stage at install time rather than embedding it in the npm package. The article states that this allowed the operator to update or replace the second stage remotely. The second stage was a Node.js script staged in the OS temp directory and launched using the installer’s own Node binary.\u003c/p\u003e\n\n\u003cp\u003eThe second stage ran as a detached and hidden process, allowing the npm install process to finish while the malware continued running. It inherited the disabled TLS setting and communicated with \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e without certificate validation.\u003c/p\u003e\n\n\u003cp\u003eFunctionally, the article describes the second stage as a remote-access tool. It harvested sensitive credentials and cryptocurrency wallet data from the host, exfiltrated them to the C2, and could receive follow-up commands.\u003c/p\u003e\n\n\u003ch2 id=\"targeted-data\"\u003eTargeted Data\u003c/h2\u003e\n\n\u003cp\u003eThe article lists targeted environment variables and credential types, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eOPENAI_API_KEY\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eANTHROPIC_API_KEY\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eGOOGLE_API_KEY\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAWS_ACCESS_KEY_ID\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAWS_SECRET_ACCESS_KEY\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAZURE_TENANT_ID\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eNPM_TOKEN\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eDatabase connection strings\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also lists targeted wallet extensions scanned in Chrome, Brave, and Edge:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMetaMask\u003c/li\u003e\n\u003cli\u003ePhantom\u003c/li\u003e\n\u003cli\u003eSolflare\u003c/li\u003e\n\u003cli\u003eCoinbase Wallet\u003c/li\u003e\n\u003cli\u003eOKX\u003c/li\u003e\n\u003cli\u003eKeplr\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"persistence-and-durability\"\u003ePersistence and Durability\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies two factors that made the compromise durable. First, the second stage was delivered at runtime from attacker-controlled infrastructure rather than embedded in the published npm package. Second, the detached, hidden launch behavior and the use of \u003ccode\u003ewindowsHide\u003c/code\u003e showed the payload was built to run unattended across platforms, including Windows.\u003c/p\u003e\n\n\u003cp\u003ePersistence artifacts listed in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003emacOS: \u003ccode\u003e~/Library/LaunchAgents/com.nvm.protocal.plist\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003emacOS: \u003ccode\u003e~/Library/NodePackages/protocal.cjs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eLinux: \u003ccode\u003e~/.config/systemd/user/nvmconf.service\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eLinux: \u003ccode\u003e~/.config/NodePackages\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eWindows: \u003ccode\u003eC:\\ProgramData\\NodePackages\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that any machine that installed an affected package should be treated as fully compromised.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003ch3 id=\"network-indicators\"\u003eNetwork Indicators\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eStage-one URL: \u003ccode\u003ehxxps://23[.]254[.]164[.]92:8000/update/49890878\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eStage-one C2: \u003ccode\u003e23[.]254[.]164[.]92\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eStage-two C2: \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eCampaign ID: \u003ccode\u003e49890878\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"filesystem-indicators\"\u003eFilesystem Indicators\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_history\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_logs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;tmpdir\u0026gt;/^[0-9a-f]{24}\\.js$\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eRuntime flag: \u003ccode\u003eNODE_TLS_REJECT_UNAUTHORIZED=0\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003emacOS persistence: \u003ccode\u003e~/Library/LaunchAgents/com.nvm.protocal.plist\u003c/code\u003e, \u003ccode\u003e~/Library/NodePackages/protocal.cjs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eLinux persistence: \u003ccode\u003e~/.config/systemd/user/nvmconf.service\u003c/code\u003e, \u003ccode\u003e~/.config/NodePackages\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eWindows persistence: \u003ccode\u003eC:\\ProgramData\\NodePackages\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"package-indicators\"\u003ePackage Indicators\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eMalicious package: \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eClean bait package: \u003ccode\u003eeasy-day-js@1.11.21\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eInjected dependency: \u003ccode\u003e\u0026quot;easy-day-js\u0026quot;: \u0026quot;^1.11.21\u0026quot;\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e1.11.22\u003c/code\u003e tarball SHA256: \u003ccode\u003e4a8860240e4231c3a74c81949be655a28e096a7d72f38fbe84e5b37636b98417\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e1.11.21\u003c/code\u003e tarball SHA256: \u003ccode\u003eae70dd4f6bc0d1c8c2848e4e6b51934626c4818dcb5af99d080ddbd7dc337185\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"detection-and-remediation-guidance\"\u003eDetection and Remediation Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends removing persistence artifacts before rotating tokens. It specifically advises checking for and deleting the macOS LaunchAgent, Linux systemd user service, and Windows \u003ccode\u003eC:\\ProgramData\\NodePackages\u003c/code\u003e payload listed in the filesystem indicators.\u003c/p\u003e\n\n\u003cp\u003eIt also recommends blocking the C2 infrastructure at DNS and HTTPS proxy layers:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e23[.]254[.]164[.]92\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e23[.]254[.]164[.]123\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor exposure identification, the article recommends auditing lockfiles, dependency trees, and install logs for any resolved \u003ccode\u003eeasy-day-js\u003c/code\u003e package and for \u003ccode\u003e@mastra/*\u003c/code\u003e versions carrying the injected dependency. It also recommends searching for \u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_history\u003c/code\u003e, \u003ccode\u003e\u0026lt;tmpdir\u0026gt;/.pkg_logs\u003c/code\u003e, and randomly named 24-hex \u003ccode\u003e.js\u003c/code\u003e files in the temp directory.\u003c/p\u003e\n\n\u003cp\u003eFor credential recovery, the article recommends rotating every credential reachable from any machine or CI runner that installed an affected package, including cloud keys, LLM provider keys, database credentials, npm tokens, and GitHub tokens. As durable defenses, it recommends pinning versions and installing with \u003ccode\u003e--ignore-scripts\u003c/code\u003e, because the campaign abused a caret range on a freshly published transitive dependency and depended on lifecycle script execution.\u003c/p\u003e\n\n\u003ch2 id=\"mend-io-coverage\"\u003eMend.io Coverage\u003c/h2\u003e\n\n\u003cp\u003eMend.io issued two MSC advisories covering all affected packages:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eMSC-2026-6172\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eMSC-2026-6173\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe campaign used publish access to a trusted npm scope to turn more than 140 packages into carriers for a single malicious dependency. The malicious execution path depended on npm dependency resolution, a typosquatted package, and an automatic \u003ccode\u003epostinstall\u003c/code\u003e lifecycle script. The article concludes that the separation of carrier packages and payload allowed the attacker to reach machines likely to contain high-value cloud, AI, and source-control secrets while the \u003ccode\u003e@mastra\u003c/code\u003e packages themselves appeared largely clean.\u003c/p\u003e\n","keyPoints":["An attacker republished more than 140 packages in the @mastra npm scope with a single added dependency, easy-day-js, and the malicious versions were observed on 2026-06-17.","The easy-day-js package version 1.11.22 added an obfuscated postinstall dropper, while version 1.11.21 was a clean prior release with no install hook.","Installing an affected @mastra package resolves easy-day-js ^1.11.21 to the malicious 1.11.22 version, causing the postinstall script to run automatically during installation.","The dropper downloads a second-stage Node.js payload from 23.254.164.92:8000/update/49890878 and launches it as a detached, hidden process that communicates with 23.254.164.123:443.","The second stage harvests environment secrets and cryptocurrency wallet data, and the article says any machine that installed an affected package should be treated as fully compromised."],"insights":["The compromised @mastra packages could appear clean to per-package source scanning because the attacker changed only package metadata by adding the easy-day-js dependency and did not modify the application source in the carrier packages.","The caret dependency range \"^1.11.21\" made the clean easy-day-js 1.11.21 release part of the trap because fresh installs resolved to the malicious 1.11.22 release at install time.","The dropper disabled TLS certificate verification with NODE_TLS_REJECT_UNAUTHORIZED=0 before spawning the second stage, allowing the attacker’s infrastructure to use an invalid certificate without interrupting execution.","The article recommends removing persistence artifacts before rotating tokens because a still-persistent second stage could otherwise capture newly rotated credentials.","Disabling npm lifecycle scripts with --ignore-scripts would block this campaign’s execution path because the malicious code depended on an automatic postinstall hook."],"referencedReports":[],"body":"\u003cp\u003eAn attacker republished more than 140 packages in the \u003ccode\u003e@mastra\u003c/code\u003e npm scope, each with a malicious dependency named \u003ccode\u003eeasy-day-js\u003c/code\u003e. The compromised versions were observed on 2026-06-17. Installing any affected \u003ccode\u003e@mastra\u003c/code\u003e package caused npm to resolve \u003ccode\u003eeasy-day-js\u003c/code\u003e to version \u003ccode\u003e1.11.22\u003c/code\u003e, which contained an obfuscated \u003ccode\u003epostinstall\u003c/code\u003e dropper.\u003c/p\u003e\n\n\u003cp\u003eThe incident is significant because Mastra is described as a widely adopted TypeScript framework for building AI agents and applications, and its users often hold cloud keys, LLM provider keys, database credentials, and source-control tokens. Mend records over 20 million downloads for \u003ccode\u003e@mastra/core\u003c/code\u003e and over 19 million for \u003ccode\u003e@mastra/schema-compat\u003c/code\u003e. The article states that any project auto-updating these packages is in scope.\u003c/p\u003e\n\n\u003cp\u003eThe malicious \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e package downloaded a second-stage Node.js payload from \u003ccode\u003e23[.]254[.]164[.]92:8000/update/49890878\u003c/code\u003e and launched it as a detached, hidden process. The second stage communicated with \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e, harvested environment secrets and cryptocurrency wallet data, and installed persistence across macOS, Linux, and Windows. The article recommends treating any machine that installed an affected package as fully compromised.\u003c/p\u003e\n"},{"n":19,"title":"Over 140 popular Mastra npm Packages Hit by Supply Chain Attack","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/over-140-popular-mastra-npm-packages-hit-by-supply-chain-attack","time":"08:43","priority":"MUST READ","score":95,"tldr":"A supply chain attack compromised 141 packages in the @mastra npm scope by adding a malicious easy-day-js dependency that executed a postinstall payload. The malware downloaded a second-stage RAT, established persistence, and targeted browser-based crypto wallet extensions, making affected installs potentially compromised.","briefOverview":"\u003cp\u003eOn June 17, Aikido detected a large-scale supply chain attack targeting the entire \u003ccode\u003e@mastra\u003c/code\u003e npm scope, a popular open-source AI agent framework. An attacker republished 141 packages between 01:15 and 02:00 UTC and silently injected a malicious dependency into each of them. Affected packages included \u003ccode\u003e@mastra/core\u003c/code\u003e, which the article says has 918K weekly npm downloads, as well as \u003ccode\u003emastra\u003c/code\u003e and \u003ccode\u003ecreate-mastra\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe injected dependency was \u003ccode\u003eeasy-day-js\u003c/code\u003e, described as a malicious clone of the popular date library \u003ccode\u003edayjs\u003c/code\u003e. Its initial version, 1.11.21, was clean, but version 1.11.22 added a \u003ccode\u003epostinstall\u003c/code\u003e hook that ran an obfuscated \u003ccode\u003esetup.cjs\u003c/code\u003e script during installation. The compromised Mastra packages depended on \u003ccode\u003e^1.11.21\u003c/code\u003e, which allowed npm caret resolution to pull in the malicious 1.11.22 version.\u003c/p\u003e\n\n\u003cp\u003eThe postinstall script fetched a second-stage payload from \u003ccode\u003e23[.]254[.]164[.]92:8000\u003c/code\u003e, wrote it to a randomly named JavaScript file in the OS temp directory, spawned it as a detached background process, and self-deleted. The second stage collected system information, targeted over 160 browser-based crypto wallet extensions, and established persistence on macOS, Windows, and Linux. The article compares the playbook to an earlier axios compromise that also used a malicious dependency, install-time execution, a clean decoy version, and self-deleting droppers.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAikido reported that on June 17 it detected a large-scale supply chain attack against the \u003ccode\u003e@mastra\u003c/code\u003e npm scope. The attacker republished 141 packages in a burst between 01:15 and 02:00 UTC. The affected packages included \u003ccode\u003e@mastra/core\u003c/code\u003e, which the article says has 918K weekly npm downloads, along with \u003ccode\u003emastra\u003c/code\u003e and \u003ccode\u003ecreate-mastra\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe attacker did not change the target packages\u0026rsquo; own code directly, according to the article, but added a single new dependency to every affected \u003ccode\u003epackage.json\u003c/code\u003e. That dependency was \u003ccode\u003eeasy-day-js\u003c/code\u003e, a malicious clone of \u003ccode\u003edayjs\u003c/code\u003e published by a separate attacker-controlled account a day before the scope takeover. The first \u003ccode\u003eeasy-day-js\u003c/code\u003e release, 1.11.21, was clean, while 1.11.22 later added a malicious install hook.\u003c/p\u003e\n\n\u003cp\u003eThe compromised Mastra packages specified \u003ccode\u003eeasy-day-js\u003c/code\u003e with the range \u003ccode\u003e^1.11.21\u003c/code\u003e, which caused npm caret resolution to install the malicious 1.11.22 release as the latest version. Version 1.11.22 added a \u003ccode\u003epostinstall\u003c/code\u003e hook that ran an obfuscated \u003ccode\u003esetup.cjs\u003c/code\u003e script automatically during installation. The article notes that auditing the pinned version would not reveal the malicious behavior because the malicious code was in the later resolved version.\u003c/p\u003e\n\n\u003cp\u003eThe postinstall script fetched a second-stage payload from \u003ccode\u003e23[.]254[.]164[.]92:8000\u003c/code\u003e, wrote it to a random \u003ccode\u003e.js\u003c/code\u003e file in the operating system temp directory, and launched it as a fully detached background process. It passed \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e as a second command-and-control host and then self-deleted to remove forensic evidence of the install hook. The second stage was described as a long-lived process that collected system information and targeted more than 160 browser-based crypto wallet extensions, including MetaMask, Keplr, and Coinbase.\u003c/p\u003e\n\n\u003cp\u003eThe article says the second stage established persistence on macOS, Windows, and Linux by disguising itself as node-related tools and phoning home to \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e. It also says the attack closely resembled an earlier axios compromise covered by Aikido in March 2026. Both attacks used malicious dependencies, npm \u003ccode\u003epostinstall\u003c/code\u003e execution, clean decoy versions before malicious releases, self-deleting droppers, and Hostwinds infrastructure on port 8000.\u003c/p\u003e\n\n\u003cp\u003eAikido advised its users to check the central feed for malware issues and trigger a manual rescan, noting that the issue would surface as a \u003csup\u003e100\u003c/sup\u003e\u0026frasl;\u003csub\u003e100\u003c/sub\u003e critical issue. The article also listed network indicators and the affected package versions, including \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e, \u003ccode\u003ecreate-mastra@1.13.1\u003c/code\u003e, \u003ccode\u003emastra@1.13.1\u003c/code\u003e, and many \u003ccode\u003e@mastra\u003c/code\u003e packages. It also mentioned Aikido Safe Chain and Device Protection as protective options, while the core disclosure focused on the supply chain compromise and its indicators of compromise.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAikido reported detecting a large-scale npm supply chain attack on June 17 targeting the entire \u003ccode\u003e@mastra\u003c/code\u003e npm scope. The article describes Mastra as a popular open-source AI agent framework. According to the article, an attacker republished 141 packages between 01:15 and 02:00 UTC and silently added a malicious dependency to every one of them.\u003c/p\u003e\n\n\u003cp\u003eThe affected packages included \u003ccode\u003e@mastra/core\u003c/code\u003e, which the article says has 918K weekly npm downloads. Other named affected packages included \u003ccode\u003emastra\u003c/code\u003e and \u003ccode\u003ecreate-mastra\u003c/code\u003e. The article provides a long list of affected package versions in its Indicators of Compromise section.\u003c/p\u003e\n\n\u003ch2 id=\"malicious-dependency-injection\"\u003eMalicious Dependency Injection\u003c/h2\u003e\n\n\u003cp\u003eThe single new dependency added to the affected packages was \u003ccode\u003eeasy-day-js\u003c/code\u003e. The article describes \u003ccode\u003eeasy-day-js\u003c/code\u003e as a malicious clone of the popular date library \u003ccode\u003edayjs\u003c/code\u003e. It was published by a separate attacker-controlled account a day before the \u003ccode\u003e@mastra\u003c/code\u003e scope takeover.\u003c/p\u003e\n\n\u003cp\u003eA key detail in the article is the two-stage publication pattern for \u003ccode\u003eeasy-day-js\u003c/code\u003e:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eeasy-day-js@1.11.21\u003c/code\u003e was described as completely clean and a straight copy of \u003ccode\u003edayjs\u003c/code\u003e with no install hooks.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e was published the next day, around the time the \u003ccode\u003e@mastra\u003c/code\u003e packages were republished, and added the malicious behavior.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe compromised packages depended on \u003ccode\u003e^1.11.21\u003c/code\u003e. The article emphasizes that npm\u0026rsquo;s caret resolution automatically pulled in the malicious 1.11.22 version as the latest version. It also notes that auditing the pinned version would reveal nothing suspicious.\u003c/p\u003e\n\n\u003ch2 id=\"postinstall-execution\"\u003ePostinstall Execution\u003c/h2\u003e\n\n\u003cp\u003eVersion 1.11.22 of \u003ccode\u003eeasy-day-js\u003c/code\u003e added a \u003ccode\u003epostinstall\u003c/code\u003e hook that ran \u003ccode\u003esetup.cjs\u003c/code\u003e. The article describes this as an obfuscated script that executed automatically at install time without user interaction.\u003c/p\u003e\n\n\u003cp\u003eThe stripped-down logic shown in the article performed the following actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFetched a second-stage payload from \u003ccode\u003ehttps://23[.]254[.]164[.]92:8000/update/49890878\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eWrote the payload to a randomly named \u003ccode\u003e.js\u003c/code\u003e file in the operating system temporary directory.\u003c/li\u003e\n\u003cli\u003eSpawned the payload using the Node.js executable as a fully detached background process.\u003c/li\u003e\n\u003cli\u003ePassed \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e to the spawned payload as a second command-and-control host.\u003c/li\u003e\n\u003cli\u003eUsed ignored standard input/output, \u003ccode\u003ewindowsHide: true\u003c/code\u003e, and \u003ccode\u003edetached: true\u003c/code\u003e to run invisibly across platforms.\u003c/li\u003e\n\u003cli\u003eDeleted its own script file with \u003ccode\u003efs.rmSync(__filename, { force: true })\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article highlights the self-deletion as an attempt to remove forensic evidence of the postinstall hook.\u003c/p\u003e\n\n\u003ch2 id=\"second-stage-behavior\"\u003eSecond-Stage Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe second stage is described as a long-lived background process. According to the article, it collected system information and targeted over 160 browser-based crypto wallet extensions. Named examples included MetaMask, Keplr, and Coinbase.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the second stage established persistence on multiple operating systems:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003emacOS\u003c/li\u003e\n\u003cli\u003eWindows\u003c/li\u003e\n\u003cli\u003eLinux\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also says the malware disguised itself as node-related tools on these platforms. All of the second-stage activity phoned home to \u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"similarity-to-the-axios-compromise\"\u003eSimilarity to the Axios Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article compares this attack to an axios compromise that Aikido said it covered in March 2026. It states that the playbook was nearly identical in several respects.\u003c/p\u003e\n\n\u003cp\u003eShared elements described in the article included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe attacker avoided changing the target package\u0026rsquo;s own code.\u003c/li\u003e\n\u003cli\u003eThe attacker injected a malicious dependency instead.\u003c/li\u003e\n\u003cli\u003eThe payload relied on npm\u0026rsquo;s \u003ccode\u003epostinstall\u003c/code\u003e hook to execute automatically during installation.\u003c/li\u003e\n\u003cli\u003eA clean decoy version was published before the malicious one.\u003c/li\u003e\n\u003cli\u003eThe droppers self-deleted after execution.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn the axios compromise, the article says \u003ccode\u003eplain-crypto-js\u003c/code\u003e played the role that \u003ccode\u003eeasy-day-js\u003c/code\u003e played in the Mastra incident. The article also says both attacks used infrastructure with a similar pattern: the axios dropper called back to a Hostwinds VPS on port 8000, while the \u003ccode\u003eeasy-day-js\u003c/code\u003e dropper called \u003ccode\u003e23[.]254[.]164[.]92:8000\u003c/code\u003e on Hostwinds infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article lists two network indicators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e23[.]254[.]164[.]92:8000\u003c/code\u003e — first-stage command-and-control server used for payload download.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e23[.]254[.]164[.]123:443\u003c/code\u003e — second-stage callback host passed to the spawned RAT.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also identifies \u003ccode\u003eeasy-day-js@1.11.22\u003c/code\u003e as malicious and lists the affected Mastra-related package versions, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ecreate-mastra@1.13.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003emastra@1.13.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/core@1.42.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/deployer@1.42.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@mastra/server@2.1.1\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eMany additional \u003ccode\u003e@mastra\u003c/code\u003e packages across integrations, deployers, authentication modules, voice packages, storage modules, observability components, and other framework-related packages.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"detection-and-response-guidance-mentioned\"\u003eDetection and Response Guidance Mentioned\u003c/h2\u003e\n\n\u003cp\u003eFor Aikido users, the article says the issue should appear in the central feed when filtering on malware issues. It says the issue will surface as a \u003csup\u003e100\u003c/sup\u003e\u0026frasl;\u003csub\u003e100\u003c/sub\u003e critical issue. Aikido rescans nightly, but the article recommends triggering a manual rescan.\u003c/p\u003e\n\n\u003cp\u003eFor users not already using Aikido, the article says they can create an account and connect repositories, and that malware coverage is included in the free plan. It also mentions Aikido Device Protection for visibility and control over software packages installed on team devices. Finally, it recommends Aikido Safe Chain as an open-source tool that intercepts npm, npx, yarn, pnpm, and pnpx commands and checks packages against Aikido Intel before installation.\u003c/p\u003e\n\n\u003ch2 id=\"core-significance\"\u003eCore Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article\u0026rsquo;s central finding is that a widely used npm scope was compromised through dependency injection rather than direct source-code modification. The attack used npm version resolution and an install-time hook to execute a staged payload automatically. The resulting second-stage malware targeted system information and browser-based crypto wallet extensions while attempting persistence across macOS, Windows, and Linux.\u003c/p\u003e\n","keyPoints":["A supply chain attack targeted the entire @mastra npm scope, with 141 packages republished between 01:15 and 02:00 UTC on June 17.","The compromised packages added a dependency on easy-day-js, a malicious clone of dayjs whose version 1.11.22 included a postinstall hook that ran an obfuscated setup.cjs script.","The postinstall script fetched a second-stage payload from 23[.]254[.]164[.]92:8000, wrote it to a random JavaScript file in the OS temp directory, spawned it as a detached background process, and then self-deleted.","The second-stage payload collected system information, targeted over 160 browser-based crypto wallet extensions, and established persistence on macOS, Windows, and Linux.","The article says the attack closely resembled the earlier axios compromise, including the use of a malicious dependency, a clean decoy version before the malicious release, postinstall execution, and self-deleting droppers."],"insights":["Auditing only the declared dependency version can miss this compromise because the affected packages specified easy-day-js as ^1.11.21 while npm caret resolution pulled the malicious 1.11.22 release.","The attacker avoided modifying the Mastra package code directly, making dependency changes and install-time hooks the critical places to inspect for signs of compromise.","The clean initial release of easy-day-js created a misleading baseline before the malicious version was published, showing that a package’s earlier benign state did not make later resolved versions safe.","The postinstall hook’s self-deletion and detached background execution reduced forensic evidence on disk, so network indicators and running background Node processes may be especially important for investigation."],"referencedReports":[],"body":"\u003cp\u003eOn June 17, Aikido detected a large-scale supply chain attack targeting the entire \u003ccode\u003e@mastra\u003c/code\u003e npm scope, a popular open-source AI agent framework. An attacker republished 141 packages between 01:15 and 02:00 UTC and silently injected a malicious dependency into each of them. Affected packages included \u003ccode\u003e@mastra/core\u003c/code\u003e, which the article says has 918K weekly npm downloads, as well as \u003ccode\u003emastra\u003c/code\u003e and \u003ccode\u003ecreate-mastra\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe injected dependency was \u003ccode\u003eeasy-day-js\u003c/code\u003e, described as a malicious clone of the popular date library \u003ccode\u003edayjs\u003c/code\u003e. Its initial version, 1.11.21, was clean, but version 1.11.22 added a \u003ccode\u003epostinstall\u003c/code\u003e hook that ran an obfuscated \u003ccode\u003esetup.cjs\u003c/code\u003e script during installation. The compromised Mastra packages depended on \u003ccode\u003e^1.11.21\u003c/code\u003e, which allowed npm caret resolution to pull in the malicious 1.11.22 version.\u003c/p\u003e\n\n\u003cp\u003eThe postinstall script fetched a second-stage payload from \u003ccode\u003e23[.]254[.]164[.]92:8000\u003c/code\u003e, wrote it to a randomly named JavaScript file in the OS temp directory, spawned it as a detached background process, and self-deleted. The second stage collected system information, targeted over 160 browser-based crypto wallet extensions, and established persistence on macOS, Windows, and Linux. The article compares the playbook to an earlier axios compromise that also used a malicious dependency, install-time execution, a clean decoy version, and self-deleting droppers.\u003c/p\u003e\n"},{"n":26,"title":"macOS ClickFix Lures Deploy AppleScript Stealer \u0026 Persistent RAT","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/macos-clickfix-lures-deploy-applescript-stealer-persistent-rat","time":"15:23","priority":"MUST READ","score":95,"tldr":"Netskope found a new macOS ClickFix campaign that tricks users into running a fileless command, then deploys the “Meow” AppleScript stealer plus a persistent RAT. The malware steals credentials, browser and wallet data, modifies desktop crypto wallet apps, and installs a fake Apple accounts service for ongoing remote command execution.","briefOverview":"\u003cp\u003eNetskope Threat Labs reported a new macOS ClickFix campaign observed on May 31, 2026, following earlier April 2026 ClickFix activity that delivered an AppleScript-based infostealer. The newer campaign is attributed in the article to a Russian-speaking attacker and upgrades the payload from a simple stealer to a full-featured remote access trojan. Netskope telemetry showed activity across short-lived lure domains, with victims mainly in Asia, North America, and Oceania.\u003c/p\u003e\n\n\u003cp\u003eThe campaign uses social engineering to make users copy and run a Terminal command from fake macOS utility, fake GitHub, or localized IT support pages. The infection chain remains fileless until persistence is installed, using a gzip-compressed stager and piping the second-stage AppleScript directly into osascript memory. The stage 1 loader checks for Russian keyboard input and exits if detected, while still reporting telemetry to the command-and-control server.\u003c/p\u003e\n\n\u003cp\u003eThe AppleScript payload, internally labeled “Meow (DEBUG),” steals credentials, browser data, cookies, keychain contents, cryptocurrency wallet data, messaging sessions, gaming account data, files, and Apple Notes. After exfiltration, it can replace app.asar files in selected desktop cryptocurrency wallets and re-sign modified app bundles. It also installs persistence under the deceptive label com.apple.accountsd, beaconing every 60 seconds for command execution.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eNetskope Threat Labs described an upgraded macOS ClickFix campaign intercepted on May 31, 2026, after prior April 2026 activity involving an AppleScript-based infostealer. The newer campaign delivers a payload self-labeled “Meow (DEBUG)” and adds persistent remote access trojan functionality. Netskope telemetry showed the active variant across 25 short-lived lure domains, with victims mainly in Asia, North America, and Oceania, especially in technology, media, and business services sectors.\u003c/p\u003e\n\n\u003cp\u003eThe delivery relies on ClickFix-style social engineering in which victims are shown fake pages and instructed to copy and run a Terminal command. Observed lures included a fake macOS utility page, a fake GitHub repository page, and a localized macOS support and IT services page based in Berlin. Active variants used the same /links/page-loader.js path to fetch a payload command from links/data.txt and place it into the victim’s clipboard when they clicked a copy button.\u003c/p\u003e\n\n\u003cp\u003eThe stage 1 loader is delivered as a gzip-compressed, base64-encoded heredoc and runs in memory. It checks the macOS keyboard input source list in ~/Library/Preferences/com.apple.HIToolbox.plist for Russian input and exits if found, after posting a cis_blocked event to the C2. It also sends telemetry including external IP, locale details, hostname, OS version, CIS status, and a campaign build hash before fetching the AppleScript payload and piping it directly into osascript.\u003c/p\u003e\n\n\u003cp\u003eThe stage 2 AppleScript payload uses a fake System Preferences dialog to obtain the user’s login password, validating it with dscl. It collects browser credentials and cookies from many Chromium-based browsers, Firefox, and Safari, and uses the harvested password to unlock the login keychain for Safe Storage key extraction on macOS Tahoe. It also targets over 100 cryptocurrency wallet browser extension IDs, 25 desktop wallet directories, Telegram Desktop sessions, Discord token storage, Steam session files, selected files from Desktop and Documents, and Apple Notes data.\u003c/p\u003e\n\n\u003cp\u003eAfter exfiltrating collected data to the C2 gate endpoint, the malware attempts to modify selected desktop cryptocurrency wallet applications. It downloads replacement app.asar archives for Exodus, Atomic Wallet, Ledger Wallet, Ledger Live, and Trezor Suite, kills running processes, overwrites application bundle files, and performs ad-hoc re-signing with codesign. For persistence, it installs either a root LaunchDaemon or user LaunchAgent labeled com.apple.accountsd, which polls the C2 every 60 seconds and executes base64-decoded commands through a temporary /tmp/.c.sh file.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eNetskope Threat Labs reported an upgraded macOS ClickFix campaign intercepted on May 31, 2026. The campaign follows earlier April 2026 ClickFix activity that delivered an AppleScript-based infostealer to macOS users through a persistent fake system dialog. In the newer campaign, the payload expands beyond a stealer and includes a persistent remote access trojan.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the campaign came from a Russian-speaking attacker. Netskope telemetry showed the active variant across 25 short-lived lure domains, with victims mainly in Asia, North America, and Oceania. The sectors most represented in the telemetry were technology, media, and business services.\u003c/p\u003e\n\n\u003ch2 id=\"delivery-and-lure-infrastructure\"\u003eDelivery and lure infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe campaign uses ClickFix-style social engineering. Victims are directed to compromised or attacker-controlled websites and instructed to copy and execute a Terminal command manually. Netskope observed three landing page variations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA fake macOS utility page branded as “StellarScan Solutions.”\u003c/li\u003e\n\u003cli\u003eA fake GitHub repository page that mimics a trusted code repository layout.\u003c/li\u003e\n\u003cli\u003eA localized IT support page masquerading as a macOS support and IT services provider based in Berlin.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAll active variants served the same JavaScript file, /links/page-loader.js, across active lure domains. The script fetched the payload command from links/data.txt and populated it into a #cmd DOM element. When the victim clicked #copyBtn, the page used the Web Clipboard API to write the execution string to the user’s clipboard.\u003c/p\u003e\n\n\u003cp\u003eThe JavaScript contained Russian inline comments. The article connects this with the loader’s CIS geofencing behavior and revisits it in relation to attribution.\u003c/p\u003e\n\n\u003ch2 id=\"fileless-execution-chain\"\u003eFileless execution chain\u003c/h2\u003e\n\n\u003cp\u003eThe infection chain is designed to remain fileless until persistence is installed. The clipboard command fetches a zsh script embedded as a gzip-compressed, base64-encoded heredoc and immediately evaluates the content. This keeps the decoded stage 1 loader in memory and avoids writing it to disk.\u003c/p\u003e\n\n\u003cp\u003eThe stage 1 loader performs several steps before destructive behavior:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt checks the macOS keyboard input source list from ~/Library/Preferences/com.apple.HIToolbox.plist.\u003c/li\u003e\n\u003cli\u003eIt searches for a Russian keyboard layout.\u003c/li\u003e\n\u003cli\u003eIf Russian input is enabled, it sends a cis_blocked event to the C2 and exits silently.\u003c/li\u003e\n\u003cli\u003eIt sends a telemetry beacon before fetching the next payload.\u003c/li\u003e\n\u003cli\u003eIt fetches the AppleScript stage with a spoofed Chrome user-agent and pipes it directly into osascript.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe telemetry beacon is sent to hxxps://qwqerrqwr2145qw[.]com/api/debug/event. It includes the victim’s external IP address, locale details, hostname, OS version, CIS status, and the build hash 3447ad192726ee391881be6e86c7eeab.\u003c/p\u003e\n\n\u003ch2 id=\"stage-2-payload-meow-debug\"\u003eStage 2 payload: “Meow (DEBUG)”\u003c/h2\u003e\n\n\u003cp\u003eThe second-stage AppleScript payload is internally labeled “Meow (DEBUG).” The article states that it was not seen on VirusTotal at the time of discovery. It executes through osascript entirely in memory.\u003c/p\u003e\n\n\u003cp\u003eThe payload first attempts to obtain the user’s login password through a spoofed macOS system dialog. The dialog impersonates System Preferences, uses the legitimate LockedIcon.icns system icon, and asks the user to enter a password to “update settings.” The password is validated using dscl . authonly with the username and entered password, and the payload retries up to 10 times before giving up.\u003c/p\u003e\n\n\u003cp\u003eIf a valid password is obtained, it is written to the staging directory and used to unlock the login keychain. The payload then extracts Safe Storage keys for Chrome, Brave, and Microsoft Edge, including behavior described as relevant beginning with macOS Tahoe 26.\u003c/p\u003e\n\n\u003ch2 id=\"data-theft-capabilities\"\u003eData theft capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe payload targets a wide range of browsers and data stores. The article lists Chrome, Brave, Edge, Opera, OperaGX, Vivaldi, Orion, Sidekick, Chrome Canary, Chromium, Chrome Dev, Arc, Coccoc, Chrome Beta, Firefox, and Safari.\u003c/p\u003e\n\n\u003cp\u003eFor Chromium profiles, it copies items including Login Data, Cookies, Network/Cookies, Web Data, Local Extension Settings, and IndexedDB. For Firefox, it copies cookies.sqlite, logins.json, key4.db, cert9.db, places.sqlite, and formhistory.sqlite. For Safari, it copies Cookies.binarycookies, Form Values, and History.db.\u003c/p\u003e\n\n\u003cp\u003eThe payload also targets cryptocurrency-related data. It collects data associated with more than 100 Chromium cryptocurrency wallet extension IDs, including MetaMask. It also expands the standalone desktop wallet collection to 25 wallets and copies wallet directories that can contain active wallet files, transaction histories, seed phrases, or private keys left in configuration files.\u003c/p\u003e\n\n\u003cp\u003eAdditional targeted data includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTelegram Desktop tdata directories, including 16-character hexadecimal subdirectories and key_datas.\u003c/li\u003e\n\u003cli\u003eDiscord Local Storage/leveldb directories across discord, discordcanary, discordptb, and discorddevelopment.\u003c/li\u003e\n\u003cli\u003eSteam loginusers.vdf, config.vdf, and ssfn files.\u003c/li\u003e\n\u003cli\u003eFiles from ~/Desktop and ~/Documents to a depth of three directories, including document, credential, key, JSON, RDP, and PNG file types.\u003c/li\u003e\n\u003cli\u003eApple Notes data from NoteStore.sqlite and associated media attachments up to 30MB total.\u003c/li\u003e\n\u003cli\u003eThe full ~/Library/Keychains/ directory.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCollected data is staged under /tmp/shub_\u003c7-digit-random\u003e/ and compressed to /tmp/shub_log.zip using ditto. The archive is posted to \u003ca href=\"https://qwqerrqwr2145qw[.]com/gate\" target=\"_blank\"\u003ehttps://qwqerrqwr2145qw[.]com/gate\u003c/a\u003e with an API key and build ID listed in the article.\u003c/p\u003e\n\n\u003ch2 id=\"wallet-application-injection\"\u003eWallet application injection\u003c/h2\u003e\n\n\u003cp\u003eAfter exfiltration, the malware attempts to modify desktop cryptocurrency wallet applications. It targets Exodus, Atomic Wallet, Ledger Wallet, Ledger Live, and Trezor Suite.\u003c/p\u003e\n\n\u003cp\u003eFor each targeted wallet, the injection sequence checks whether the application is installed, downloads a zip archive from the C2 gate, extracts a replacement app.asar file, kills the running application with pkill -9, overwrites the application bundle’s app.asar, and performs ad-hoc re-signing. The endpoints named in the article include /exodus-asar, /atomic-asar, /ledger-asar, /ledgerlive-asar, and /trezor-asar.\u003c/p\u003e\n\n\u003cp\u003eThe re-signing uses codesign -f -d -s to force an ad-hoc signature. The article states that this restores a structurally valid signature so the modified bundle can launch cleanly without triggering native Gatekeeper warnings. Netskope states that it did not have the contents of the injected app.asar files and makes no claims about their specific behavior beyond what the injection code shows.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-and-remote-access\"\u003ePersistence and remote access\u003c/h2\u003e\n\n\u003cp\u003eThe malware installs persistence after exfiltration. The persistence method depends on whether a valid password was obtained.\u003c/p\u003e\n\n\u003cp\u003eIf a valid password is obtained, the malware writes a LaunchDaemon to /Library/LaunchDaemons/com.apple.accountsd.plist and places a service binary at /Library/Application Support/.com.apple.accountsd/.service. If no valid password is obtained, it falls back to a user-level LaunchAgent at ~/Library/LaunchAgents/com.apple.accountsd.plist.\u003c/p\u003e\n\n\u003cp\u003eIn both cases, the plist label is com.apple.accountsd, matching Apple’s legitimate account synchronization daemon name. The StartInterval is set to 60 seconds.\u003c/p\u003e\n\n\u003cp\u003eThe persistence script posts heartbeats to the C2 endpoint /api/bot/heartbeat. Each beacon includes the host’s IOPlatformUUID as the bot identifier, along with build ID, hostname, IP, and OS version. If the C2 response contains a code field, the payload base64-decodes it, writes it to /tmp/.c.sh, executes it, and deletes it, giving the operator arbitrary command execution on the host.\u003c/p\u003e\n\n\u003ch2 id=\"infrastructure-and-indicators\"\u003eInfrastructure and indicators\u003c/h2\u003e\n\n\u003cp\u003eThe article lists 24 confirmed lure domains, while also stating that the active variant expanded across 25 short-lived lure domains. All listed domains proxy through Cloudflare. The article states that the lure domains share the same registrar admin contact email, which also ties the two C2 domains qwqerrqwr2145qw[.]com and scope-quest[.]com to the same operator.\u003c/p\u003e\n\n\u003cp\u003eThe domain naming clusters include file* domains and cyberdrift, stellar, and tensorforge naming patterns. The article also identifies meadowfileengine[.]com and pa2373[.]com as outliers, and crystalfilehaven[.]com as a fake-GitHub variant.\u003c/p\u003e\n\n\u003cp\u003eNotable forensic indicators identified in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ecom.apple.accountsd LaunchDaemon or LaunchAgent entries.\u003c/li\u003e\n\u003cli\u003e/Library/Application Support/.com.apple.accountsd/.\u003c/li\u003e\n\u003cli\u003e/tmp/shub_ staging directory patterns.\u003c/li\u003e\n\u003cli\u003e/tmp/.c.sh temporary command execution pattern.\u003c/li\u003e\n\u003cli\u003eLure delivery through /links/page-loader.js and links/data.txt.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"defensive-emphasis-and-response-guidance-in-the-article\"\u003eDefensive emphasis and response guidance in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that detecting the campaign at the delivery layer is the most effective intervention point. It specifically highlights intercepting lure domains and page-loader.js before a user copies the clipboard command.\u003c/p\u003e\n\n\u003cp\u003eFor hosts that may already be compromised, the article identifies the com.apple.accountsd LaunchDaemon or LaunchAgent as a reliable forensic indicator. It also recommends treating any desktop wallet installation on a potentially affected Mac as untrusted and reinstalling it from a verified source.\u003c/p\u003e\n","keyPoints":["Netskope Threat Labs observed a new macOS ClickFix campaign on May 31, 2026 that delivers an upgraded AppleScript-based payload self-labeled “Meow (DEBUG)” with remote access trojan capabilities.","The infection chain is fileless until persistence is established, with victims socially engineered into running a curl command that fetches a gzip-compressed stager and pipes a second-stage AppleScript directly into osascript memory.","The stage 1 loader checks the macOS keyboard layout for Russian input in com.apple.HIToolbox.plist, reports a cis_blocked event to the C2 if Russian input is found, and exits silently.","The payload steals the user’s login password through a fake System Preferences dialog and collects browser credentials, cookies, keychain contents, crypto wallet data, messaging sessions, gaming account data, files, and Apple Notes.","After exfiltration, the malware can overwrite app.asar files in selected desktop cryptocurrency wallets and installs a LaunchDaemon or LaunchAgent labeled com.apple.accountsd that beacons to the C2 every 60 seconds f
