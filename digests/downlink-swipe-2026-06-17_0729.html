an open HTTP directory, including a Linux installer that deployed `timesync.bin` and established 12 persistence mechanisms.","The article states that operators who changed the `Server` header could still be detected because they left the default 404 body string, `You need to enter the correct connection details.`, intact."],"insights":["Layered detection is necessary because at least one operator deliberately changed the `Server` header to `TestCoonection` while leaving the default 404 page body intact, so body-based matching catches evasion that header-only scans miss.","Beacon listener clusters can be separated from teamservers by their high callback ports and shared TLS certificate patterns, which helps analysts distinguish operator API infrastructure from agent callback infrastructure in passive scan data.","The default OpenSSL certificate value `C=AU, ST=Some-State, O=Internet Widgits Pty Ltd` appeared across multiple AdaptixC2 listener clusters, making TLS certificate reuse an actionable clustering signal for identifying related callback servers.","BeaconDNS deployments may be visible even when BeaconHTTP is absent because the DNS extender returns `TXT \"OK\"` for short or unrecognized queries and sets the authoritative-answer bit on every response.","Recovered AdaptixC2 Beacon binaries can reveal C2 servers, callback URIs, and listener RC4 keys through static extraction because the encrypted configuration blob stores the RC4 key inside the binary itself."],"referencedReports":[],"body":"\u003cp\u003eCensys analyzed AdaptixC2, an open-source post-exploitation C2 framework whose default configuration makes deployed servers easy to identify through passive scanning. The framework’s default error responses include branded HTTP headers, including \u003ccode\u003eServer: AdaptixC2\u003c/code\u003e and \u003ccode\u003eAdaptix-Version: v1.2\u003c/code\u003e, on unauthenticated requests. As of 16 June 2026, Censys tracked 412 web properties across 236 hosts running AdaptixC2 with default or near-default settings.\u003c/p\u003e\n\n\u003cp\u003eThe research found both teamserver and beacon listener infrastructure, including three notable listener clusters hosted by Hivelocity, M247, and PSB Hosting. These clusters used multiple IPs across adjacent subnets and identical default TLS certificates, suggesting coordinated, redundant callback infrastructure. The article also describes one active deployment at \u003ccode\u003e2.26.229[.]254\u003c/code\u003e that publicly served AdaptixC2 payloads, including a Linux installer with 12 persistence mechanisms and Russian-language comments.\u003c/p\u003e\n\n\u003cp\u003eThe article’s most actionable detection point is that operators who modify the \u003ccode\u003eServer\u003c/code\u003e header may still leave the default 404 page body intact. Censys recommends using both header-based and body-based queries, along with a DNS listener signal where applicable. All detections are available in Censys under the \u003ccode\u003eAdaptix C2\u003c/code\u003e threat label, THREAT-0210.\u003c/p\u003e\n"},{"n":2,"title":"What the ThreatLabz 2026 Phishing and Initial Access Report Means for the Public Sector","source":"zscaler.com","sourceColorIdx":5,"link":"https://www.zscaler.com/blogs/security-research/what-threatlabz-2026-phishing-and-initial-access-report-means-public-sector","time":"14:28","priority":"SHOULD READ","score":78,"tldr":"ThreatLabz says phishing targeting the public sector is becoming more AI-generated, targeted, and capable of bypassing legacy defenses, even as overall volume declines. Government, healthcare, and education should prioritize encrypted traffic inspection, phishing-resistant authentication, reduced exposed attack surface, and broader visibility beyond email.","briefOverview":"\u003cp\u003eThe article summarizes public sector implications from the ThreatLabz 2026 Phishing and Initial Access Report. It says overall phishing volume in the Zscaler cloud fell 20% year over year, but remaining campaigns are more targeted, more AI-powered, and harder to distinguish from legitimate activity. ThreatLabz identified 413,524 AI-generated site instances during the analysis period and flagged 9% as malicious.\u003c/p\u003e\n\n\u003cp\u003eGovernment, healthcare, and education each faced different phishing trends, but the article says all three are affected by a broader shift toward targeted, high-conversion initial access. Government phishing attempts rose 50% year over year to 138.5 million hits in 2025, while healthcare saw lower phishing volume but high consequences from credential and session theft. Education phishing attempts dropped 65.6%, but the sector still experienced roughly 1.6 billion encrypted attack hits.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that public sector defenders need visibility beyond the inbox because phishing and initial access activity occurs through encrypted traffic, browsers, SaaS sessions, authentication flows, and public-facing portals. It recommends consistent SSL/TLS inspection, phishing-resistant authentication, reduced application exposure, monitoring for AI-generated phishing infrastructure, and broader visibility across the path from lure to compromise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reviews findings from the ThreatLabz 2026 Phishing and Initial Access Report and focuses on what they mean for government, healthcare, and education organizations. It states that phishing remains a major initial access risk even though overall phishing volume in the Zscaler cloud fell 20% year over year. The remaining campaigns are described as more targeted, more AI-powered, and harder to distinguish from legitimate activity.\u003c/p\u003e\n\n\u003cp\u003eA key technical theme is the rapid creation of phishing infrastructure using AI-powered site builders. ThreatLabz identified 413,524 AI-generated site instances during the analysis period and flagged 9% as malicious. The article names Manus AI, BlackBox AI, Anything AI, and DeepSite AI as platforms used to create convincing phishing infrastructure or replicas of official portals.\u003c/p\u003e\n\n\u003cp\u003eGovernment was one of the most affected sectors in the article, with phishing attempts increasing 50% year over year to 138.5 million phishing hits in 2025. The article describes a campaign impersonating Brazilian government services that used AI-powered site builders, SEO poisoning, and a process that mirrored a legitimate public service interaction before requesting payment through a trusted instant payment system. It also notes that the IRS has warned about impersonation scams using email, SMS, and QR codes to mimic official communications and direct users to fraudulent portals.\u003c/p\u003e\n\n\u003cp\u003eHealthcare saw comparatively lower phishing hit counts in the Zscaler cloud, but the article says the consequences remain high because credential theft and session compromise can affect patient data and clinical operations. It notes that healthcare recorded 1.58 million encrypted attack hits and that 95.2% of all phishing activity is now delivered over encrypted channels. The article also highlights adversary-in-the-middle and browser-in-the-middle phishing kits that can capture credentials and MFA tokens during active login flows.\u003c/p\u003e\n\n\u003cp\u003eEducation organizations experienced a 65.6% year-over-year drop in phishing attempts, but the article warns that this does not eliminate initial access risk. Education still saw roughly 1.6 billion encrypted attack hits, representing 6% of encrypted attack activity in the Zscaler cloud. The article also cites 89.9 million hostile interactions with external decoys in six months as evidence of reconnaissance against internet-facing assets.\u003c/p\u003e\n\n\u003cp\u003eThe article’s recommended response is a Zero Trust architecture that verifies every connection, inspects encrypted traffic inline, minimizes exposed attack surface, and enforces least-privilege access. It specifically calls for consistent encrypted traffic inspection, phishing-resistant authentication such as FIDO2-based credentials, reduced application exposure, monitoring for AI-generated phishing infrastructure, and visibility beyond email into browsers, authentication flows, SaaS usage, and encrypted channels.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article summarizes the public sector implications of the ThreatLabz 2026 Phishing and Initial Access Report. Its central message is that phishing remains a critical initial access risk even as overall phishing volume in the Zscaler cloud declined 20% year over year. The article says the campaigns that remain are more targeted, more AI-powered, and harder to distinguish from legitimate activity.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz identified 413,524 AI-generated site instances during the analysis period and flagged 9% as malicious. The article says platforms including Manus AI, BlackBox AI, Anything AI, and DeepSite AI can allow attackers to create high-fidelity phishing infrastructure in minutes rather than days.\u003c/p\u003e\n\n\u003ch2 id=\"public-sector-significance\"\u003ePublic sector significance\u003c/h2\u003e\n\n\u003cp\u003eThe article focuses on three public sector environments:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGovernment services\u003c/li\u003e\n\u003cli\u003eHealthcare operations\u003c/li\u003e\n\u003cli\u003eEducation environments\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt says these sectors depend on digital trust and that attackers are exploiting that trust through AI-generated content, brand impersonation, credential theft, encrypted delivery channels, and real-time session hijacking that can defeat traditional MFA. The article states that one successful lure can lead to account takeover, data exposure, service disruption, and loss of public trust.\u003c/p\u003e\n\n\u003cp\u003eAlthough the article presents different data for government, healthcare, and education, it says the underlying shift is consistent across all three: attackers are moving toward targeted, high-conversion initial access.\u003c/p\u003e\n\n\u003ch2 id=\"government-findings\"\u003eGovernment findings\u003c/h2\u003e\n\n\u003cp\u003eGovernment phishing attempts increased 50% year over year, which the article describes as one of the largest sector increases reported. Government recorded 138.5 million phishing hits in 2025 and ranked as the third-most targeted industry overall in the Zscaler cloud.\u003c/p\u003e\n\n\u003cp\u003eThe article says attackers are turning public trust into an initial access opportunity. Citizens expect to use online government services for activities such as paying taxes, accessing benefits, renewing licenses, or resolving administrative issues. Attackers exploit that expectation by impersonating official services and creating workflows that appear legitimate.\u003c/p\u003e\n\n\u003ch3 id=\"brazilian-government-impersonation-campaign\"\u003eBrazilian government impersonation campaign\u003c/h3\u003e\n\n\u003cp\u003eThe article describes a campaign impersonating Brazilian government services. In that campaign, attackers used AI-powered site builders, including DeepSite AI and BlackBox AI, to create convincing replicas of official portals. They also used SEO poisoning and guided users through a process that resembled a legitimate public service interaction before requesting payment through a trusted instant payment system.\u003c/p\u003e\n\n\u003cp\u003eThe article presents this as an example of a new template for government-targeted phishing: AI-generated, workflow-aware, and designed to pass human trust checks.\u003c/p\u003e\n\n\u003ch3 id=\"irs-impersonation-warning\"\u003eIRS impersonation warning\u003c/h3\u003e\n\n\u003cp\u003eThe article also says the IRS has warned about impersonation scams that use email, SMS, and QR codes. These scams mimic official communications and direct users to fraudulent portals designed to steal credentials and financial data.\u003c/p\u003e\n\n\u003ch3 id=\"government-security-implications\"\u003eGovernment security implications\u003c/h3\u003e\n\n\u003cp\u003eFor government agencies, the article says protection must cover the full citizen-facing experience, not only the inbox. It calls for detecting lookalike domains and fake portals, inspecting web and encrypted traffic, reducing exposure across public-facing services and applications, and applying identity controls that prevent credential theft from becoming account takeover.\u003c/p\u003e\n\n\u003ch2 id=\"healthcare-findings\"\u003eHealthcare findings\u003c/h2\u003e\n\n\u003cp\u003eThe article says healthcare had comparatively lower phishing hit counts in the Zscaler cloud in 2025, along with 1.58 million encrypted attack hits. It cautions that lower volume does not mean lower consequence.\u003c/p\u003e\n\n\u003cp\u003eFor healthcare security teams, a convincing login page or trusted brand impersonation can provide a path to credentials, sessions, and application access. The article says this can put patient care at risk.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that 95.2% of all phishing activity is now delivered over encrypted channels. It says campaigns that reach healthcare users are already bypassing legacy defenses that do not inspect TLS traffic.\u003c/p\u003e\n\n\u003ch3 id=\"brand-impersonation-and-mfa-token-theft\"\u003eBrand impersonation and MFA token theft\u003c/h3\u003e\n\n\u003cp\u003eThe article identifies Microsoft and Google as the top two most-imitated brands in the report. It notes that both brands are common entry points into cloud productivity and collaboration environments used by healthcare users.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights adversary-in-the-middle and browser-in-the-middle phishing kits. These kits are described as being able to capture credentials and MFA tokens during the active login flow, turning a single click into session-level compromise even when MFA is enabled.\u003c/p\u003e\n\n\u003ch3 id=\"healthcare-security-implications\"\u003eHealthcare security implications\u003c/h3\u003e\n\n\u003cp\u003eThe article says lower phishing volume changes the scale of the problem, not the stakes. For healthcare organizations, the priority is to stop credential capture, session theft, and malicious redirects before a successful lure becomes access to patient data and clinical operations.\u003c/p\u003e\n\n\u003ch2 id=\"education-findings\"\u003eEducation findings\u003c/h2\u003e\n\n\u003cp\u003eThe article says phishing attempts against education organizations dropped 65.6% year over year. It describes education as losing more absolute phishing volume than any other tracked industry in the Zscaler cloud.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article says the risk has not disappeared. Education experienced roughly 1.6 billion encrypted attack hits in the past year, representing 6% of encrypted attack activity in the Zscaler cloud.\u003c/p\u003e\n\n\u003cp\u003eThe article says this contrast matters because lower phishing volume in the inbox can coexist with significant malicious activity moving through TLS sessions, web traffic, cloud applications, and authentication flows. These are channels where traditional email security has no visibility.\u003c/p\u003e\n\n\u003ch3 id=\"reconnaissance-against-public-facing-assets\"\u003eReconnaissance against public-facing assets\u003c/h3\u003e\n\n\u003cp\u003eThe article also discusses attackers probing exposed entry points outside the inbox. ThreatLabz recorded 89.9 million hostile interactions with external decoys in six months, which the article uses to show the scale of reconnaissance against internet-facing assets.\u003c/p\u003e\n\n\u003cp\u003eEducation environments are described as having broad public-facing infrastructure, including portals, LMS platforms, and federated authentication systems. The article says these assets create a large reconnaissance target.\u003c/p\u003e\n\n\u003ch3 id=\"education-security-implications\"\u003eEducation security implications\u003c/h3\u003e\n\n\u003cp\u003eThe article says a drop in phishing volume should be treated as a positive signal, not proof that initial access risk is declining. Education teams need visibility into activity that follows or bypasses the phish, including encrypted traffic, authentication flows, SaaS usage, browser behavior, and compromised credential use.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions-for-public-sector-security-teams\"\u003eRecommended actions for public sector security teams\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several priorities for reducing initial access risk across government, healthcare, and education.\u003c/p\u003e\n\n\u003ch3 id=\"inspect-encrypted-traffic-consistently\"\u003eInspect encrypted traffic consistently\u003c/h3\u003e\n\n\u003cp\u003eThe article states that 95.2% of phishing is delivered over TLS. It says any gap in SSL/TLS inspection is a blind spot attackers will exploit. It recommends inline inspection across web, SaaS, and cloud application traffic, not only email.\u003c/p\u003e\n\n\u003ch3 id=\"deploy-phishing-resistant-authentication\"\u003eDeploy phishing-resistant authentication\u003c/h3\u003e\n\n\u003cp\u003eThe article says adversary-in-the-middle and browser-in-the-middle kits can defeat legacy MFA in real time. It recommends transitioning to FIDO2-based, phishing-resistant credentials to remove the path from a click to session compromise.\u003c/p\u003e\n\n\u003ch3 id=\"reduce-application-exposure\"\u003eReduce application exposure\u003c/h3\u003e\n\n\u003cp\u003eThe article says attackers map environments before the first lure is sent. It recommends minimizing discoverable attack surface by making applications invisible to the internet and enforcing identity-based access only after verification.\u003c/p\u003e\n\n\u003ch3 id=\"monitor-for-ai-generated-phishing-infrastructure\"\u003eMonitor for AI-generated phishing infrastructure\u003c/h3\u003e\n\n\u003cp\u003eThe article says AI site builders are compressing the time from campaign idea to live phishing page to minutes. It recommends detection that accounts for rapidly rotating, high-fidelity lookalike domains and portals, rather than relying only on known-bad indicators.\u003c/p\u003e\n\n\u003ch3 id=\"extend-visibility-beyond-the-inbox\"\u003eExtend visibility beyond the inbox\u003c/h3\u003e\n\n\u003cp\u003eThe article says phishing is the entry point, but initial access is won in browsers, authentication flows, SaaS sessions, and encrypted channels. It recommends visibility and control across the full path from lure to compromise.\u003c/p\u003e\n\n\u003ch2 id=\"zero-trust-framing\"\u003eZero Trust framing\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that a Zero Trust architecture provides the most effective foundation for disrupting attackers at multiple stages. It describes this architecture as verifying every connection, inspecting encrypted traffic inline, minimizing exposed attack surface, and enforcing least-privilege access.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, these controls can disrupt the attacker’s path from reconnaissance through credential theft to lateral movement.\u003c/p\u003e\n","keyPoints":["The ThreatLabz 2026 Phishing and Initial Access Report found that overall phishing volume in the Zscaler cloud fell 20% year over year, while remaining campaigns became more targeted, AI-powered, and harder to distinguish from legitimate activity.","ThreatLabz identified 413,524 AI-generated site instances during the analysis period and flagged 9% of them as malicious, with platforms such as Manus AI, BlackBox AI, and Anything AI used to create phishing infrastructure quickly.","Phishing attempts against the government sector increased 50% year over year, reaching 138.5 million phishing hits in 2025 and making government the third-most targeted industry overall in the Zscaler cloud.","Healthcare had comparatively lower phishing hit counts in 2025, but the article states that 95.2% of all phishing activity was delivered over encrypted channels and that adversary-in-the-middle and browser-in-the-middle phishing kits can capture credentials and MFA tokens during active login flows.","Phishing attempts against education organizations dropped 65.6% year over year, but education still experienced roughly 1.6 billion encrypted attack hits, representing 6% of encrypted attack activity in the Zscaler cloud."],"insights":["A decline in overall phishing volume should not be treated as reduced risk, because the article emphasizes that remaining campaigns are more targeted, AI-generated, and designed for higher-conversion initial access.","Public sector defenses need to extend beyond email security, since the article describes phishing risk moving through encrypted web traffic, SaaS sessions, browser activity, authentication flows, and fake citizen-facing portals.","Legacy MFA is not sufficient against the phishing kits described in the article, because adversary-in-the-middle and browser-in-the-middle techniques can capture credentials and MFA tokens during active login sessions.","Government agencies must secure the full online service workflow, not just agency-branded domains, because attackers are replicating realistic public service interactions and pairing fake portals with SEO poisoning and trusted payment mechanisms.","Education organizations should interpret falling phishing volumes cautiously, because the article shows that large-scale encrypted attack activity and reconnaissance against public-facing assets can persist even when inbox phishing drops sharply."],"referencedReports":[],"body":"\u003cp\u003eThe article summarizes public sector implications from the ThreatLabz 2026 Phishing and Initial Access Report. It says overall phishing volume in the Zscaler cloud fell 20% year over year, but remaining campaigns are more targeted, more AI-powered, and harder to distinguish from legitimate activity. ThreatLabz identified 413,524 AI-generated site instances during the analysis period and flagged 9% as malicious.\u003c/p\u003e\n\n\u003cp\u003eGovernment, healthcare, and education each faced different phishing trends, but the article says all three are affected by a broader shift toward targeted, high-conversion initial access. Government phishing attempts rose 50% year over year to 138.5 million hits in 2025, while healthcare saw lower phishing volume but high consequences from credential and session theft. Education phishing attempts dropped 65.6%, but the sector still experienced roughly 1.6 billion encrypted attack hits.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that public sector defenders need visibility beyond the inbox because phishing and initial access activity occurs through encrypted traffic, browsers, SaaS sessions, authentication flows, and public-facing portals. It recommends consistent SSL/TLS inspection, phishing-resistant authentication, reduced application exposure, monitoring for AI-generated phishing infrastructure, and broader visibility across the path from lure to compromise.\u003c/p\u003e\n"},{"n":29,"title":"Socket Firewall Now Blocks Malicious VS Code and Open VSX Extensions","source":"socket.dev","sourceColorIdx":2,"link":"https://socket.dev/blog/socket-firewall-blocks-malicious-code-extensions?utm_medium=feed","time":"20:18","priority":"SHOULD READ","score":78,"tldr":"Socket Firewall now supports blocking malicious VS Code Marketplace and Open VSX extensions at install and update time, before they can run in developer environments. The move targets growing risks from compromised editor extensions like Nx Console and GlassWorm campaigns.","briefOverview":"\u003cp\u003eSocket announced that Socket Firewall now supports VS Code Marketplace and Open VSX extension installs. The feature is intended to help organizations block malicious editor extensions before they reach developer environments. Socket says the same enforcement layer already used for package installs can now sit in front of editor extension traffic.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the launch around recent extension-related incidents, including GitHub’s May 2026 disclosure that attackers compromised an employee device through a poisoned third-party VS Code extension and exfiltrated roughly 3,800 GitHub-internal repositories. It also cites Socket research on repeated GlassWorm attacks across Open VSX. The article emphasizes that editor extensions can access source code, terminals, files, credentials, tokens, and internal systems.\u003c/p\u003e\n\n\u003cp\u003eTechnically, Socket Firewall routes editor marketplace requests through Socket’s proxy, forwards them to the real registry, and filters responses based on threat verdicts. It can also check verdicts before forwarding VSIX downloads from extension asset domains, providing a second enforcement point beyond marketplace search results. The Extension Firewall capability is available in beta for Socket Enterprise customers.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSocket announced beta support for editor extension protection in Socket Firewall. The new capability covers VS Code Marketplace and Open VSX extension installs, with the goal of blocking malicious extensions before they install or update in developer environments. Socket describes this as an extension of the same prevention model it already applies to package manager traffic across ecosystems such as npm, PyPI, Go, and Maven.\u003c/p\u003e\n\n\u003cp\u003eThe article uses recent incidents to explain why editor extensions are a security concern. It references GitHub’s May 2026 disclosure that attackers compromised an employee device through a poisoned third-party VS Code extension and exfiltrated roughly 3,800 GitHub-internal repositories. It identifies the extension as Nx Console 18.95.0, a malicious release that reached both the Visual Studio Marketplace and Open VSX before removal.\u003c/p\u003e\n\n\u003cp\u003eSocket also points to its researchers’ documentation of repeated GlassWorm attacks across Open VSX. Those attacks involved malicious and compromised extensions designed to steal developer credentials and spread through trusted editor marketplaces. The article argues that many teams underestimate the access editor extensions have inside developer environments, including access to source code, terminals, files, credentials, tokens, and internal systems.\u003c/p\u003e\n\n\u003cp\u003eSocket Firewall works by placing Socket’s proxy in the path of marketplace requests. When a developer browses, installs, or updates an extension, Socket forwards the request to the real registry and filters the response against threat verdicts. Flagged extensions are blocked before installation or update, while clean extensions remain available to developers.\u003c/p\u003e\n\n\u003cp\u003eThe article stresses that inventory tools are insufficient as a prevention mechanism because malicious extension code has already run by the time it appears in an installed-extension inventory. Socket says its approach provides install-time and update-time enforcement, including checks on CDN and VSIX download paths to reduce the chance of indirect downloads. The beta supports marketplace filtering, VSIX download blocking, and rollout through editor configuration, DNS override, and enterprise egress forwarding.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSocket announced that Socket Firewall now supports protection for editor extension installs from the VS Code Marketplace and Open VSX. The feature is designed to help organizations block malicious editor extensions before they reach developer environments. Socket says the same enforcement layer already used to protect package installs can now sit in front of editor extension traffic.\u003c/p\u003e\n\n\u003cp\u003eThe article presents this as an install-time and update-time control point for editor extensions. Rather than relying only on post-install visibility, Socket Firewall filters marketplace results and blocks extension downloads based on threat verdicts. The Extension Firewall capability is available in beta for Socket Enterprise customers.\u003c/p\u003e\n\n\u003ch2 id=\"security-context\"\u003eSecurity Context\u003c/h2\u003e\n\n\u003cp\u003eThe article cites GitHub’s May 2026 disclosure that attackers compromised an employee device through a poisoned third-party VS Code extension. According to the article, that compromise allowed attackers to exfiltrate roughly 3,800 GitHub-internal repositories. The extension was Nx Console 18.95.0, described as a malicious release that reached both the Visual Studio Marketplace and Open VSX before removal.\u003c/p\u003e\n\n\u003cp\u003eSocket also references research by its own researchers on repeated GlassWorm attacks across Open VSX. The article says those attacks included malicious and compromised extensions designed to steal developer credentials and spread through trusted editor marketplaces. These examples are used to argue that editor extensions should be treated as significant supply chain risk.\u003c/p\u003e\n\n\u003ch2 id=\"why-editor-extensions-matter\"\u003eWhy Editor Extensions Matter\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that code editor extensions are third-party code running inside developer environments. It says these extensions often have access to source code, terminals, files, credentials, tokens, and internal systems. Socket argues that organizations standardizing on AI-first editors inherit a marketplace they cannot fully gate.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that developer extension risk is not limited to one editor. It identifies the VS Code Marketplace as used by Visual Studio Code and Open VSX as used by Cursor, Windsurf, VSCodium, Antigravity, and other VS Code-based editors. Socket says security teams need one enforcement model that can cover both marketplace ecosystems.\u003c/p\u003e\n\n\u003ch2 id=\"inventory-versus-prevention\"\u003eInventory Versus Prevention\u003c/h2\u003e\n\n\u003cp\u003eSocket distinguishes between extension inventory and extension prevention. The article says inventory tools can tell a security team which extensions are already installed and can help with visibility, cleanup, and compliance. However, it argues that inventory starts too late because a malicious extension has already run by the time it appears in inventory.\u003c/p\u003e\n\n\u003cp\u003eSocket positions Firewall as a way to close that gap. The product provides an enforcement point when an editor browses, installs, or updates an extension. This makes installation and update the moments where policy can be applied before extension code runs in a developer environment.\u003c/p\u003e\n\n\u003ch2 id=\"technical-operation\"\u003eTechnical Operation\u003c/h2\u003e\n\n\u003cp\u003eAccording to the article, Socket Firewall places Socket’s proxy in the path between the editor and the extension registry. When a developer searches for, installs, or updates an extension, the editor’s marketplace request flows through the proxy. Socket then forwards the request to the real registry and checks extension verdicts.\u003c/p\u003e\n\n\u003cp\u003eBased on those verdicts, Socket filters or blocks flagged extensions during the marketplace flow. Clean extensions remain available to developers, while flagged extensions are blocked from installation. The firewall enforces policy in the path between the editor and the extension registry.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes a second enforcement point beyond marketplace search results. Socket’s proxy sits in front of each registry’s extension asset domains and checks verdicts before forwarding VSIX downloads. This is intended to help block malicious extensions even when an install flow reaches an underlying download URL.\u003c/p\u003e\n\n\u003ch2 id=\"supported-ecosystems\"\u003eSupported Ecosystems\u003c/h2\u003e\n\n\u003cp\u003eSocket Firewall already protects package manager traffic across ecosystems such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003enpm\u003c/li\u003e\n\u003cli\u003ePyPI\u003c/li\u003e\n\u003cli\u003eGo\u003c/li\u003e\n\u003cli\u003eMaven\u003c/li\u003e\n\u003cli\u003eOther package ecosystems\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe new beta expands that prevention model to two editor extension ecosystems:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVS Code Marketplace, used by Visual Studio Code\u003c/li\u003e\n\u003cli\u003eOpen VSX, used by Cursor, Windsurf, VSCodium, Antigravity, and other VS Code-based editors\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"product-characteristics-claimed-by-socket\"\u003eProduct Characteristics Claimed by Socket\u003c/h2\u003e\n\n\u003cp\u003eSocket highlights several characteristics of the Firewall approach:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnforcement happens at the proxy without deploying agent or endpoint software on every developer device.\u003c/li\u003e\n\u003cli\u003eDownloads are blocked, not just marketplace listings.\u003c/li\u003e\n\u003cli\u003eVerdicts are checked multiple times on the CDN and VSIX path to reduce the chance of indirect downloads.\u003c/li\u003e\n\u003cli\u003eThe feature covers both VS Code Marketplace and Open VSX.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor developers, Socket says the workflow remains simple because safe extensions continue to work while malicious extensions are blocked before install or update.\u003c/p\u003e\n\n\u003ch2 id=\"availability-and-deployment\"\u003eAvailability and Deployment\u003c/h2\u003e\n\n\u003cp\u003eExtension Firewall is available in beta for Socket Enterprise customers. The article says the feature supports marketplace filtering and VSIX download blocking. It also supports multiple rollout paths, including editor configuration, DNS override, and enterprise egress forwarding.\u003c/p\u003e\n\n\u003cp\u003eSocket directs interested organizations to contact its sales team to turn on access and learn more about deploying Socket Firewall for editor extensions.\u003c/p\u003e\n","keyPoints":["Socket Firewall now supports VS Code Marketplace and Open VSX extension installs to help organizations block malicious editor extensions before they reach developer environments.","The article cites GitHub’s May 2026 disclosure that attackers compromised an employee device through a poisoned third-party VS Code extension and exfiltrated roughly 3,800 GitHub-internal repositories.","Socket Firewall routes editor marketplace requests through Socket’s proxy, forwards them to the real registry, checks threat verdicts, and filters or blocks flagged extensions during search, install, or update flows.","Socket Firewall provides a second enforcement point by checking verdicts before forwarding VSIX downloads from extension asset domains, helping block malicious extensions even if an install flow reaches an underlying download URL.","Extension Firewall is available in beta for Socket Enterprise customers and supports marketplace filtering, VSIX download blocking, and deployment through editor configuration, DNS override, or enterprise egress forwarding."],"insights":["Inventory-based extension security is reactive because a malicious extension has already executed by the time it appears in an installed-extension list.","Editor extensions should be treated as high-risk third-party code because they can access source code, terminals, files, credentials, tokens, and internal systems from developer environments.","Marketplace search filtering alone is not enough, since Socket added verdict checks on CDN and VSIX download paths to block indirect extension downloads.","Organizations using AI-first editors and VS Code forks face extension risk beyond Microsoft’s marketplace because many of those tools rely on Open VSX."],"referencedReports":[{"title":"Investigating unauthorized access to GitHub’s internal repositories","url":"https://github.blog/security/investigating-unauthorized-access-to-githubs-internal-repositories/","publisher":"GitHub","context":"The article references GitHub’s May 2026 disclosure that attackers compromised an employee device through a poisoned third-party VS Code extension and exfiltrated roughly 3,800 internal repositories.","category":"news","primary":false},{"title":"GHSA-c9j4-9m59-847w","url":"https://github.com/nrwl/nx-console/security/advisories/GHSA-c9j4-9m59-847w","publisher":"Nx","context":"The article links to the security advisory for Nx Console 18.95.0, which it describes as a malicious release that reached both the Visual Studio Marketplace and Open VSX before removal.","category":"advisory","primary":false}],"body":"\u003cp\u003eSocket announced that Socket Firewall now supports VS Code Marketplace and Open VSX extension installs. The feature is intended to help organizations block malicious editor extensions before they reach developer environments. Socket says the same enforcement layer already used for package installs can now sit in front of editor extension traffic.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the launch around recent extension-related incidents, including GitHub’s May 2026 disclosure that attackers compromised an employee device through a poisoned third-party VS Code extension and exfiltrated roughly 3,800 GitHub-internal repositories. It also cites Socket research on repeated GlassWorm attacks across Open VSX. The article emphasizes that editor extensions can access source code, terminals, files, credentials, tokens, and internal systems.\u003c/p\u003e\n\n\u003cp\u003eTechnically, Socket Firewall routes editor marketplace requests through Socket’s proxy, forwards them to the real registry, and filters responses based on threat verdicts. It can also check verdicts before forwarding VSIX downloads from extension asset domains, providing a second enforcement point beyond marketplace search results. The Extension Firewall capability is available in beta for Socket Enterprise customers.\u003c/p\u003e\n"},{"n":24,"title":"Crypto Clipper Campaign Abuses Fake Reviews, AI Narrators, and VirusTotal Comments","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/crypto-clipper-campaign-abuses-fake.html","time":"18:14","priority":"SHOULD READ","score":76,"tldr":"Check Point says an unknown threat actor is using fake reviews, inflated downloads, AI-narrated YouTube tutorials, VirusTotal comments, and syndicated press releases to make malicious crypto tools look trustworthy. The downloads deliver a Rust-based clipboard hijacker for Windows and macOS that swaps copied crypto wallet addresses with attacker-controlled ones.","briefOverview":"\u003cp\u003eCheck Point Research reported that an unknown threat actor is promoting malicious cryptocurrency-related tools through a broad fake reputation campaign. The actor uses paid or promoted posts on legitimate news websites, a WordPress phishing page, GitHub and SourceForge projects, a YouTube channel, and coordinated VirusTotal activity. The campaign is designed to make malicious downloads appear popular, safe, and trustworthy.\u003c/p\u003e\n\n\u003cp\u003eThe malware being distributed is a Rust-based cryptocurrency clipboard hijacker hidden inside Solana and Pump.fun sniper bots and crash-game predictors. It targets Windows and macOS systems and monitors the clipboard for cryptocurrency wallet address patterns. When it finds a match, it replaces the copied wallet address with one controlled by the attacker, redirecting digital assets to the attacker.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is notable for abusing reputation systems across multiple platforms rather than relying only on a malicious download page. Check Point said the actor used inflated download counts, coordinated five-star reviews, AI-generated tutorial videos, positive comments, upvotes, GitHub stars, and press release syndication. The activity shows how attackers can manufacture trust across platforms that users often check before downloading software.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCheck Point Research disclosed a campaign in which an unknown threat actor is using fake reputation signals to promote malicious cryptocurrency tools. The actor has used paid or promoted posts on legitimate news websites, along with a dedicated WordPress phishing page that functions as a central hub. The operation also spans GitHub, SourceForge, YouTube, and VirusTotal.\u003c/p\u003e\n\n\u003cp\u003eThe campaign’s goal is to distribute a cryptocurrency clipboard hijacker disguised as Solana and Pump.fun sniper bots and crash-game predictors. The article says this indicates the targets are cryptocurrency asset holders and online gamblers looking for shortcuts and quick profits. The promoted tools are presented as legitimate or useful software, while the downloaded files contain malware.\u003c/p\u003e\n\n\u003cp\u003eThe clipper is written in Rust and targets both Windows and macOS systems. It continuously monitors clipboard contents for text matching cryptocurrency wallet address patterns. When a wallet address is detected, the malware swaps it for an attacker-controlled address from a hard-coded list, causing assets to be routed to the attacker.\u003c/p\u003e\n\n\u003cp\u003eA central feature of the campaign is the use of so-called Ghost Networks to manipulate reputation-driven platforms. On VirusTotal, coordinated accounts post upvotes and highly positive comments intended to misclassify malicious files as safe. On GitHub, at least six accounts are used to cross-promote and distribute the malware, and one repository had 146 stars and 62 forks.\u003c/p\u003e\n\n\u003cp\u003eThe campaign also uses SourceForge and YouTube to reinforce perceived legitimacy. Check Point noted that SourceForge showed 44,485 downloads, including 37,460 supposedly from Android devices even though only Windows and macOS versions were offered, which it said could indicate an Android farm inflating download numbers. A dedicated YouTube channel with more than 91,000 subscribers promotes the tools using tutorial-style videos with AI-generated narrators and positive comments.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor also used EIN Presswire to promote the tool’s claimed capabilities through a press release that was syndicated across partner news websites, mainly the USA TODAY Network. Check Point said manipulating sentiment and reputation across crowd-sourced platforms marks a meaningful shift in how attackers build trust. The company warned that the same cross-platform promotion playbook could be used to distribute information stealers or ransomware to higher-value targets over time.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCheck Point Research reported that an unknown threat actor is running a cross-platform fake reputation campaign to promote malicious cryptocurrency-related tools. The campaign uses the same kinds of trust-building signals often associated with legitimate software promotion, including inflated download counts, coordinated five-star reviews, tutorial-style videos, and promotion on platforms users may instinctively trust.\u003c/p\u003e\n\n\u003cp\u003eThe operation is designed to push a cryptocurrency clipboard hijacker concealed inside tools advertised as Solana and Pump.fun sniper bots and crash-game predictors. According to the article, this suggests the intended targets are cryptocurrency asset holders and online gamblers seeking shortcuts and quick profits.\u003c/p\u003e\n\n\u003ch2 id=\"distribution-and-promotion-infrastructure\"\u003eDistribution and Promotion Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe threat actor uses a dedicated WordPress phishing page as a central hub. The campaign is also promoted through GitHub and SourceForge projects operated or boosted by fake accounts. In addition, the actor uses a YouTube channel and a cluster of VirusTotal accounts engaged in coordinated activity.\u003c/p\u003e\n\n\u003cp\u003eThe article says the actor has also leveraged paid or promoted posts on legitimate news websites to create buzz for the warez. Check Point described the overall result as a fake reputation economy spanning every platform a curious victim might check before clicking download.\u003c/p\u003e\n\n\u003ch2 id=\"malware-behavior\"\u003eMalware Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe payload is a Rust-based cryptocurrency clipboard hijacker. It targets both Windows and macOS systems.\u003c/p\u003e\n\n\u003cp\u003eThe malware continuously monitors the clipboard for content matching a cryptocurrency wallet address pattern. When it detects a matching address, it replaces the copied wallet address with an attacker-controlled address selected from a hard-coded list. This causes digital assets intended for the victim’s chosen recipient to be routed to the attacker instead.\u003c/p\u003e\n\n\u003ch2 id=\"abuse-of-reputation-systems\"\u003eAbuse of Reputation Systems\u003c/h2\u003e\n\n\u003cp\u003eA notable part of the activity is the use of Ghost Networks to manipulate reputation-driven systems. On VirusTotal, coordinated accounts post upvotes and highly positive comments in an effort to reduce suspicion and increase trust in malicious files. The article says these accounts are used with the intent to misclassify malicious files as safe.\u003c/p\u003e\n\n\u003cp\u003eThe same pattern extends to GitHub. The actor operates at least six GitHub accounts that cross-promote and distribute the malware. One repository cited in the article had 146 stars and 62 forks, creating the appearance of legitimacy and community interest.\u003c/p\u003e\n\n\u003ch2 id=\"sourceforge-activity\"\u003eSourceForge Activity\u003c/h2\u003e\n\n\u003cp\u003eThe campaign also relies on SourceForge to host or promote the malicious software. Check Point reported that the SourceForge download counter reached 44,485. Of those, 37,460 downloads were supposedly from Android devices even though the developer only offered Windows and macOS versions.\u003c/p\u003e\n\n\u003cp\u003eCheck Point said a plausible explanation for this mismatch is the use of an Android farm to artificially inflate the SourceForge download count. This inflated activity served the broader goal of making the tools appear widely used.\u003c/p\u003e\n\n\u003ch2 id=\"youtube-promotion\"\u003eYouTube Promotion\u003c/h2\u003e\n\n\u003cp\u003eThe malicious tools are promoted through a dedicated YouTube channel with more than 91,000 subscribers. The channel was created in July 2020 and claims to be strictly for educational purposes only.\u003c/p\u003e\n\n\u003cp\u003eThe videos are tutorial-style and feature AI-generated narrators. Positive comments are used to reinforce the appearance that the tools are popular and trustworthy.\u003c/p\u003e\n\n\u003ch2 id=\"press-release-syndication\"\u003ePress Release Syndication\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights the actor’s use of EIN Presswire as an unusual part of the campaign. The press release promoted the tool’s claimed capabilities and was later syndicated across the service’s partner news websites.\u003c/p\u003e\n\n\u003cp\u003eThe syndication primarily involved the USA TODAY Network, according to the article. This gave the promoted material additional visibility through sites that appear to be legitimate news outlets.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eCheck Point said the campaign marks a meaningful shift in how attackers build trust by manipulating sentiment and reputation across crowd-sourced platforms. Rather than relying on a single malicious site, the actor created a coordinated appearance of legitimacy across multiple independent platforms.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that this same fake reputation and aggressive cross-platform promotion playbook could be used over time to distribute information stealers or ransomware to higher-value targets. In this campaign, the disclosed impact centers on the distribution of a crypto clipboard hijacker that can redirect cryptocurrency transfers by replacing copied wallet addresses.\u003c/p\u003e\n","keyPoints":["Check Point Research reported that an unknown threat actor is promoting malicious crypto-related tools using paid or promoted posts on legitimate news websites, fake reviews, inflated download counts, and tutorial-style videos.","The campaign distributes a Rust-based cryptocurrency clipboard hijacker disguised as Solana and Pump.fun sniper bots and crash-game predictors.","The malware targets Windows and macOS systems and replaces copied cryptocurrency wallet addresses with attacker-controlled addresses from a hard-coded list.","The threat actor uses coordinated accounts on VirusTotal and at least six GitHub accounts to post positive comments, upvotes, stars, and forks that make malicious files and repositories appear trustworthy.","The campaign also uses SourceForge, a dedicated YouTube channel with AI-generated narrators, a WordPress phishing page, and EIN Presswire press release syndication to promote the malicious tools."],"insights":["The campaign shows that attackers are not only abusing hosting platforms but also manipulating trust signals across VirusTotal, GitHub, SourceForge, YouTube, and news syndication to reduce suspicion before victims download files.","SourceForge telemetry contained an inconsistency that can be used as a detection clue: 37,460 of 44,485 downloads reportedly came from Android devices even though only Windows and macOS builds were offered.","VirusTotal comments and upvotes are being used as part of the attacker’s reputation-building infrastructure, so positive community feedback on scanned files should not be treated as reliable evidence of safety.","The use of EIN Presswire and USA TODAY Network syndication indicates that press release distribution channels can amplify malicious software promotion while making it appear associated with legitimate news outlets."],"referencedReports":[{"title":"From Stars to Upvotes: Fake Reputation Fueling a Crypto Clipboard Hijacker","url":"https://research.checkpoint.com/2026/from-stars-to-upvotes-fake-reputation-fueling-a-crypto-clipboard-hijacker/","publisher":"Check Point Research","context":"The article cites Check Point Research’s report as the source of findings about a campaign using fake reputation signals to distribute a crypto clipboard hijacker.","category":"research","primary":true}],"body":"\u003cp\u003eCheck Point Research reported that an unknown threat actor is promoting malicious cryptocurrency-related tools through a broad fake reputation campaign. The actor uses paid or promoted posts on legitimate news websites, a WordPress phishing page, GitHub and SourceForge projects, a YouTube channel, and coordinated VirusTotal activity. The campaign is designed to make malicious downloads appear popular, safe, and trustworthy.\u003c/p\u003e\n\n\u003cp\u003eThe malware being distributed is a Rust-based cryptocurrency clipboard hijacker hidden inside Solana and Pump.fun sniper bots and crash-game predictors. It targets Windows and macOS systems and monitors the clipboard for cryptocurrency wallet address patterns. When it finds a match, it replaces the copied wallet address with one controlled by the attacker, redirecting digital assets to the attacker.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is notable for abusing reputation systems across multiple platforms rather than relying only on a malicious download page. Check Point said the actor used inflated download counts, coordinated five-star reviews, AI-generated tutorial videos, positive comments, upvotes, GitHub stars, and press release syndication. The activity shows how attackers can manufacture trust across platforms that users often check before downloading software.\u003c/p\u003e\n"},{"n":3,"title":"Operationalize CISA BOD 26-04 with Tenable One","source":"tenable.com","sourceColorIdx":5,"link":"https://www.tenable.com/blog/cisa-bod-26-04-tenable-helps-federal-agencies-comply","time":"18:15","priority":"MAY READ","score":74,"tldr":"CISA BOD 26-04 pushes federal agencies away from static CVSS-based patching toward continuous, risk-based vulnerability prioritization using asset exposure, KEV status, exploit automation, and technical impact. Tenable argues that Tenable One can operationalize these requirements through continuous asset visibility, threat intelligence, cloud exposure management, and AI-driven automation.","briefOverview":"\u003cp\u003eCISA’s Binding Operational Directive 26-04 supersedes BOD 19-02 and BOD 22-01 and changes how federal agencies prioritize vulnerability remediation. The article says the directive ends reliance on static severity scores such as CVSS and requires a dynamic, risk-based model based on real-world asset and threat context. Tenable presents Tenable One as a platform intended to help agencies operationalize these requirements.\u003c/p\u003e\n\n\u003cp\u003eThe directive’s remediation timelines are driven by four risk variables: asset exposure, KEV status, exploit automation, and technical impact. The article maps Tenable One capabilities to those variables, including attack surface management, integration with CISA’s KEV catalog, Vulnerability Priority Rating, Asset Exposure Score, and CVSS-based impact context. It emphasizes that compliance is continuous because timelines can shift when variables change, such as when an asset becomes internet-facing or a CVE is added to KEV.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights BOD 26-04’s phased implementation requirements and its coverage of federal information systems, including third-party and cloud environments. Tenable says Hexa AI, API integrations, automated asset tagging, CDM Dashboard integration, and Tenable One Cloud Exposure can help agencies meet process, tagging, remediation, and cloud oversight requirements. It further argues that BOD 26-04 accelerates the shift from vulnerability management to exposure management.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA’s BOD 26-04 is described as a major shift in federal vulnerability management because it supersedes BOD 19-02 and BOD 22-01 and consolidates federal guidelines into a unified framework. The article says the directive moves agencies away from prioritizing remediation by static severity scores such as CVSS. Instead, agencies must use a dynamic risk-based vulnerability prioritization model based on asset and threat context.\u003c/p\u003e\n\n\u003cp\u003eThe directive uses four variables to determine remediation timelines: asset exposure, KEV status, exploit automation, and technical impact. Tenable says Tenable One can assess whether assets are internet-facing through sensors, third-party connectors, Asset Criticality Rating, and Attack Surface Management. The article states that Tenable’s analysis found asset exposure to be the highest-leverage compliance variable, with removal from public exposure able to shift 76.7% of CVEs from compressed timelines to the deferral tier.\u003c/p\u003e\n\n\u003cp\u003eFor KEV status and exploit automation, the article says Tenable integrates CISA’s KEV catalog into Vulnerability Priority Rating and compliance workflows. It also says Tenable Vulnerability Watch can identify vulnerabilities exploited in the wild before they appear in KEV. Tenable’s analysis of more than 154,000 enriched CVEs in the CISA Vulnrichment corpus found that 61% of actively exploited vulnerabilities cannot be automated, which the article uses to argue that automation alone is not enough for prioritization.\u003c/p\u003e\n\n\u003cp\u003eFor technical impact, the article says Tenable integrates CVSS base scores and severity assessments to distinguish between partial and total control of an asset. It states that 83% of actively exploited CVEs yield total system control, which makes BOD 26-04’s forensic triage requirement operationally significant. Under the directive, KEV vulnerabilities that yield total system control require agencies to assess whether compromise has occurred while also remediating within three days.\u003c/p\u003e\n\n\u003cp\u003eThe article frames Tenable One as the mechanism for meeting BOD 26-04 at scale. It says Tenable Hexa AI can automate security workflows, and Tenable APIs can support automated asset tagging and integration with the federal CDM Dashboard. It also states that Tenable One Cloud Exposure helps agencies validate BOD 26-04 alignment across cloud and third-party environments, including certified and non-certified cloud infrastructures.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article explains how Tenable positions the Tenable One Exposure Management Platform as a way for U.S. federal agencies to operationalize CISA Binding Operational Directive 26-04. CISA’s BOD 26-04 supersedes BOD 19-02 and BOD 22-01 and consolidates federal vulnerability management guidance into a single framework. The article says the directive ends reliance on static vulnerability severity scores, including CVSS, as the main basis for remediation urgency.\u003c/p\u003e\n\n\u003cp\u003eInstead, BOD 26-04 requires agencies to use a dynamic, risk-based vulnerability prioritization model. The model is driven by real-world threat context and asset context rather than treating all vulnerabilities equally. Tenable argues that federal agencies need continuous asset discovery, threat validation, and automated orchestration to meet the directive’s requirements.\u003c/p\u003e\n\n\u003ch2 id=\"core-change-introduced-by-bod-26-04\"\u003eCore change introduced by BOD 26-04\u003c/h2\u003e\n\n\u003cp\u003eThe article describes BOD 26-04 as a shift from vulnerability management based on static CVE checklists to exposure-driven prioritization. It states that this shift is driven by the acceleration of AI-powered threats and increasingly sophisticated adversary campaigns. The directive requires vulnerability remediation timelines to be determined by four variables:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAsset exposure\u003c/li\u003e\n\u003cli\u003eKEV status\u003c/li\u003e\n\u003cli\u003eExploit automation\u003c/li\u003e\n\u003cli\u003eTechnical impact\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that these variables are not static. Timelines can change when a CVE is added to CISA’s KEV catalog, when an asset becomes exposed to the internet, or when CISA Vulnrichment metadata changes. Tenable says compliance under BOD 26-04 is therefore a continuous state rather than a point-in-time assessment.\u003c/p\u003e\n\n\u003ch2 id=\"variable-1-asset-exposure\"\u003eVariable 1: Asset exposure\u003c/h2\u003e\n\n\u003cp\u003eThe first BOD 26-04 variable is whether a vulnerable asset is publicly exposed to the internet. Tenable says Tenable One provides multiple ways to identify externally accessible assets, including sensors and third-party data connectors that determine whether a device is internet-facing or has a public IP address. The article also says Tenable’s Asset Criticality Rating incorporates external exposure context by considering asset location, network connectivity, and the presence of security controls.\u003c/p\u003e\n\n\u003cp\u003eTenable One Attack Surface Management is described as providing continuous discovery and identification of internet-facing assets. The article contrasts this continuous outside-in visibility with point-in-time snapshots. It says Tenable’s analysis of the full CISA Vulnrichment corpus found asset exposure to be the highest-leverage compliance variable.\u003c/p\u003e\n\n\u003cp\u003eA notable figure in the article is that removing an asset from public exposure can shift 76.7% of CVEs from compressed remediation timelines to the deferral tier. The article frames attack surface reduction as both a security improvement and an efficient path to compliance under BOD 26-04.\u003c/p\u003e\n\n\u003ch2 id=\"variable-2-kev-status\"\u003eVariable 2: KEV status\u003c/h2\u003e\n\n\u003cp\u003eThe second variable is whether a vulnerability is listed in CISA’s Known Exploited Vulnerabilities catalog. The article says Tenable integrates the KEV catalog directly into its Vulnerability Priority Rating scoring and compliance workflows. It also says Tenable Vulnerability Watch provides early identification of vulnerabilities being exploited in the wild before they appear in the KEV catalog.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that early exploitation tracking gives agencies a compliance advantage. Once a CVE is added to KEV, the remediation timeline compresses immediately. Tenable says agencies with advance warning can begin remediation before the mandatory clock starts.\u003c/p\u003e\n\n\u003ch2 id=\"variable-3-exploit-automation\"\u003eVariable 3: Exploit automation\u003c/h2\u003e\n\n\u003cp\u003eThe third variable is whether an adversary can fully automate all steps required to exploit a vulnerability. The article says Tenable VPR assesses exploit maturity by evaluating whether functional exploit code exists, whether exploitation has been observed at scale, and how accessible the exploitation path is. It also says Tenable’s Asset Exposure Score contextualizes risk by evaluating the combined exposure posture of each asset within the organization’s environment.\u003c/p\u003e\n\n\u003cp\u003eTenable’s analysis of more than 154,000 enriched CVEs in the CISA Vulnrichment corpus found that 61% of actively exploited vulnerabilities cannot be automated. The article uses this finding to argue that most real-world exploitation is targeted rather than mass-automated. It says organizations that focus remediation only on automatable vulnerabilities will miss the majority of active threats.\u003c/p\u003e\n\n\u003ch2 id=\"variable-4-technical-impact\"\u003eVariable 4: Technical impact\u003c/h2\u003e\n\n\u003cp\u003eThe fourth variable is whether exploitation grants an attacker partial or total control of the asset. The article says Tenable integrates CVSS base scores and severity assessments for every CVE to provide impact context aligned with this requirement. It also says Tenable One can identify the technical impact variable at platform scale.\u003c/p\u003e\n\n\u003cp\u003eThe article states that 83% of actively exploited CVEs yield total system control. Under BOD 26-04, total control combined with KEV status on an internet-facing asset triggers the most aggressive compliance tier: three days with mandatory forensic triage. Tenable argues that agencies should plan for forensic triage as a routine operational demand rather than an edge case.\u003c/p\u003e\n\n\u003ch2 id=\"tenable-vulnerability-research-and-predictive-prioritization\"\u003eTenable vulnerability research and predictive prioritization\u003c/h2\u003e\n\n\u003cp\u003eThe article says Tenable has identified more than 4,400 vulnerabilities with a high-risk technical profile that are not yet listed in KEV. These vulnerabilities are described as automatable, capable of total system control, and having proof-of-concept availability. If confirmed exploitation evidence appears, the article says these CVEs could immediately move into the most aggressive BOD timeline.\u003c/p\u003e\n\n\u003cp\u003eTenable Vulnerability Watch and VPR scoring are described as tools that flag CVEs based on exploit maturity, proof-of-concept availability, and technical impact severity. The article says this gives security teams a prioritized remediation queue that anticipates KEV additions rather than reacting to them. It also describes Tenable’s research methodology as assessing vulnerabilities, threat actors, campaigns, and environmental exposures as related but independent risk dimensions.\u003c/p\u003e\n\n\u003cp\u003eThe article says Tenable tracks persistent exploitation at three levels:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIndividual CVEs\u003c/li\u003e\n\u003cli\u003eVendor product lines\u003c/li\u003e\n\u003cli\u003eEntire technology classes\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eWhen a new vulnerability is disclosed in a product family already under sustained attack, Tenable says its persistent targeting data can elevate urgency before exploitation of that specific CVE is confirmed.\u003c/p\u003e\n\n\u003ch2 id=\"forensic-triage-requirement\"\u003eForensic triage requirement\u003c/h2\u003e\n\n\u003cp\u003eBOD 26-04 introduces a forensic triage requirement for CVEs that are both listed in KEV and yield total system control. The article cites Table 1 rows 1, 3, and 9 of the directive as the relevant cases. Agencies must assess whether compromise has already occurred while also remediating within three days.\u003c/p\u003e\n\n\u003cp\u003eThe article says this requirement is not a niche edge case because Tenable data shows that 83% of actively exploited CVEs yield total system control. It says effective forensic triage requires knowing what to look for. Tenable says it provides threat attribution and campaign context, including which actor is exploiting a vulnerability, what tools and infrastructure signatures they use, and whether exploitation is part of a coordinated campaign targeting the agency’s sector.\u003c/p\u003e\n\n\u003ch2 id=\"phased-implementation-and-automation\"\u003ePhased implementation and automation\u003c/h2\u003e\n\n\u003cp\u003eThe article states that BOD 26-04 includes phased implementation requirements. Agencies must update policies immediately in Phase 1, update processes within 60 days in Phase 2, and actively remediate assets and tag metadata within 180 days in Phase 3. Tenable argues that manually evaluating four variables across thousands of vulnerabilities and assets is not feasible for human analysts.\u003c/p\u003e\n\n\u003cp\u003eTenable Hexa AI is described as an agentic AI engine available in Tenable One that orchestrates automated security workflows. The article says it applies risk intelligence at platform scale and surfaces the vulnerabilities that matter most. Tenable presents this as a way for agencies to meet compressed remediation timelines without scaling security teams linearly.\u003c/p\u003e\n\n\u003cp\u003eThe article also says Phase 3 requires agencies to continuously identify and tag all assets reachable outside the internal network with metadata including organization, environment, exposure, and asset type. Tenable says its API integrations automate metadata tagging and feed structured data into the federal Continuous Diagnostics and Mitigation Dashboard.\u003c/p\u003e\n\n\u003ch2 id=\"third-party-and-cloud-environments\"\u003eThird-party and cloud environments\u003c/h2\u003e\n\n\u003cp\u003eThe article states that BOD 26-04 applies to all federal information systems, including those hosted in third-party and cloud environments. It says agencies remain responsible for ensuring underlying infrastructure follows the directive, whether they work with the FedRAMP PMO for certified offerings or directly with cloud service providers for non-certified environments.\u003c/p\u003e\n\n\u003cp\u003eTenable One Cloud Exposure is described as helping agencies audit and validate that cloud service provider infrastructures align with BOD 26-04. The article says Tenable One unifies data across internet-facing assets, traditional IT, and cloud environments to provide centralized exposure oversight.\u003c/p\u003e\n\n\u003ch2 id=\"tenable-product-positioning\"\u003eTenable product positioning\u003c/h2\u003e\n\n\u003cp\u003eThe article distinguishes between existing Tenable vulnerability management tools and Tenable One. It says Tenable Security Center and Tenable One Vulnerability Management can natively support core baseline requirements such as KEV status integration and static asset segmentation. However, it says BOD 26-04 requires localized context and tracking of CISA Stakeholder Specific Vulnerability Categorization Vulnrichment metadata, including exploit automation and technical impact keys.\u003c/p\u003e\n\n\u003cp\u003eThe article says manually importing, filtering, and cross-referencing CISA’s public enriched vulnerability data against an enterprise network requires the scale of Tenable One. It describes Tenable One as an ingestion and orchestration engine for the advanced data requirements of BOD 26-04. Specific capabilities cited include native Vulnrichment filtering and dynamic merging of internal vulnerability data with continuous Attack Surface Management data.\u003c/p\u003e\n\n\u003ch2 id=\"overall-conclusion\"\u003eOverall conclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that BOD 26-04 accelerates federal agencies’ movement from vulnerability management to exposure management. It says agencies must move beyond static compliance and adopt dynamic context and validation. Tenable presents Tenable One as a platform for continuous asset discovery, threat validation, automated remediation workflows, cloud exposure management, and metadata integration needed to support BOD 26-04 compliance.\u003c/p\u003e\n","keyPoints":["CISA BOD 26-04 supersedes BOD 19-02 and BOD 22-01 and shifts federal vulnerability management from static severity-score prioritization to dynamic, risk-based prioritization using real-world asset and threat context.","The directive bases remediation timelines on four risk variables: asset exposure, KEV status, exploit automation, and technical impact.","Tenable One is presented as a platform that maps to the directive’s risk variables through continuous asset discovery, attack surface management, KEV integration, Vulnerability Priority Rating, and technical impact context.","The article states that BOD 26-04 introduces a forensic triage requirement for KEV vulnerabilities that yield total system control, alongside three-day remediation for the highest-severity cases.","Tenable says Tenable Hexa AI, API integrations, automated asset tagging, and CDM Dashboard integration can help agencies meet the directive’s phased implementation requirements and metadata-tagging obligations."],"insights":["Tenable’s analysis found that removing assets from public exposure could move 76.7% of CVEs from compressed remediation timelines to the deferral tier, making attack surface reduction a high-leverage compliance strategy under BOD 26-04.","The article states that 61% of actively exploited vulnerabilities in the CISA Vulnrichment corpus cannot be automated, meaning a remediation strategy focused only on automatable exploits would miss most active threats.","Tenable identified more than 4,400 vulnerabilities with an automatable, total-system-control, proof-of-concept-available profile that are not yet in CISA’s KEV catalog, making them candidates for the most aggressive BOD timeline if exploitation is confirmed.","Because Tenable says 83% of actively exploited CVEs yield total system control, the directive’s forensic triage requirement should be treated as a routine operational workload rather than an exceptional case."],"referencedReports":[{"title":"Binding Operational Directive 26-04: Prioritizing Security Updates Based on Risk","url":"https://www.cisa.gov/news-events/directives/bod-26-04-prioritizing-security-updates-based-risk","publisher":"Cybersecurity and Infrastructure Security Agency","context":"The article is built around CISA’s BOD 26-04 and explains how Tenable One can help federal agencies operationalize its requirements.","category":"advisory","primary":true}],"body":"\u003cp\u003eCISA’s Binding Operational Directive 26-04 supersedes BOD 19-02 and BOD 22-01 and changes how federal agencies prioritize vulnerability remediation. The article says the directive ends reliance on static severity scores such as CVSS and requires a dynamic, risk-based model based on real-world asset and threat context. Tenable presents Tenable One as a platform intended to help agencies operationalize these requirements.\u003c/p\u003e\n\n\u003cp\u003eThe directive’s remediation timelines are driven by four risk variables: asset exposure, KEV status, exploit automation, and technical impact. The article maps Tenable One capabilities to those variables, including attack surface management, integration with CISA’s KEV catalog, Vulnerability Priority Rating, Asset Exposure Score, and CVSS-based impact context. It emphasizes that compliance is continuous because timelines can shift when variables change, such as when an asset becomes internet-facing or a CVE is added to KEV.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights BOD 26-04’s phased implementation requirements and its coverage of federal information systems, including third-party and cloud environments. Tenable says Hexa AI, API integrations, automated asset tagging, CDM Dashboard integration, and Tenable One Cloud Exposure can help agencies meet process, tagging, remediation, and cloud oversight requirements. It further argues that BOD 26-04 accelerates the shift from vulnerability management to exposure management.\u003c/p\u003e\n"},{"n":9,"title":"The Invoice Portal Link That Didn't Need a Password","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/jwt-token-invoice-portal-ecocert-mailgun-iban-payment","time":"11:00","priority":"MAY READ","score":73,"tldr":"A fully authenticated invoice email from a legitimate Ecocert accounting subdomain used a tokenized Upflow billing portal link that granted passwordless access via a long-lived JWT. The key risk is that valid authentication and clean URLs can still expose billing portals and enable invoice fraud when access tokens are embedded directly in emailed links.","briefOverview":"\u003cp\u003eA French-language invoice notification arrived from comptabilitegreenlife@accounting.ecocert.com, a subdomain of the legitimate Ecocert domain. The message was delivered through Mailgun infrastructure and passed SPF, DKIM, and DMARC authentication with compauth=100. The article describes the case as a high-severity invoice fraud and credential-harvesting pattern mapped to spearphishing link, valid accounts, and victim identity information gathering techniques.\u003c/p\u003e\n\n\u003cp\u003eThe email directed recipients to an Upflow customer billing portal through a redirect at upflow-email.accounting.ecocert.com. The destination URL contained a JWT with portal.view permissions, a customer identifier, and a 60-day expiration window, allowing anyone with the link to access the portal without entering credentials. The article emphasizes that URL scanners passed the link because it pointed to a real billing portal on a real platform.\u003c/p\u003e\n\n\u003cp\u003eThe attached PDF invoice requested a 380 euro payment and included French IBAN and BIC payment details. The email also contained a 1x1 tracking pixel from the same upflow-email subdomain, which confirmed mailbox activity when the message was rendered. Themis flagged the invoice phishing pattern at 71% confidence and quarantined four affected mailboxes automatically.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes a French-language invoice notification sent from comptabilitegreenlife@accounting.ecocert.com to a global specialty ingredients manufacturer. Ecocert is described as a legitimate international organic certification body with a domain registered since 1998. The message was delivered through Mailgun infrastructure and passed SPF, DKIM, and DMARC authentication with compauth=100.\u003c/p\u003e\n\n\u003cp\u003eThe email contained a link to a customer billing portal hosted at app.upflow.io and routed through a redirect at upflow-email.accounting.ecocert.com. The destination URL included a JWT access token with portal.view permissions, a customer identifier, and a 60-day expiration window. Decoding the token showed that anyone who clicked or possessed the link received authenticated read access to the billing portal without entering credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights this as a legitimate transactional email design pattern with a security problem. Billing platforms may embed session tokens so customers can review invoices without logging in. In this case, the same token worked for anyone who had the URL, meaning that forwarding, interception, or delivery to a mailbox controlled by an attacker would grant the same billing portal view as the intended recipient.\u003c/p\u003e\n\n\u003cp\u003eThe attached PDF invoice was named Facture-FR03IN26001665.pdf, was 91KB, and was declared clean by scanners. It referenced invoice number FR03IN26001665 for 380 euros and included French IBAN and BIC payment details at a major European bank. The email body also offered credit card and SEPA direct debit as payment options through the portal.\u003c/p\u003e\n\n\u003cp\u003eThe message also included a 1x1 tracking pixel loaded from the upflow-email subdomain, which confirmed that the mailbox was active and that the message was rendered. A subtle mismatch existed between the From address, comptabilitegreenlife@accounting.ecocert.com, and the Reply-To address, comptabilitegreenlife@ecocert.com. The email security gateway saw clean links, valid authentication, and a known billing platform, while Themis identified the invoice phishing pattern and quarantined four affected mailboxes automatically.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a high-severity invoice fraud and credential-harvesting case involving a French-language invoice notification sent to a global specialty ingredients manufacturer. The email came from \u003ccode\u003ecomptabilitegreenlife@accounting.ecocert.com\u003c/code\u003e, using a subdomain of Ecocert, which the article identifies as a legitimate international organic certification body with a domain registered since 1998.\u003c/p\u003e\n\n\u003cp\u003eThe message was sent through Mailgun infrastructure and passed all major email authentication checks. SPF, DKIM, and DMARC all passed, and the message received a compauth score of 100. The article emphasizes that every technical authentication check confirmed that the sending domain authorized the email.\u003c/p\u003e\n\n\u003ch2 id=\"core-significance\"\u003eCore Significance\u003c/h2\u003e\n\n\u003cp\u003eThe central issue was not a visibly malicious URL or a failed authentication result. The email linked to a real billing portal on a real platform and passed every URL scanner. The article states that the link did not need a password to work.\u003c/p\u003e\n\n\u003cp\u003eThe destination was an Upflow customer billing portal at \u003ccode\u003eapp.upflow.io\u003c/code\u003e, reached through a redirect at \u003ccode\u003eupflow-email.accounting.ecocert.com\u003c/code\u003e. The portal URL contained a JWT access token with \u003ccode\u003eportal.view\u003c/code\u003e permissions, a customer identifier, and a 60-day expiration window.\u003c/p\u003e\n\n\u003ch2 id=\"passwordless-portal-access-via-jwt\"\u003ePasswordless Portal Access via JWT\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that decoding the JWT revealed the full permission structure. Anyone who clicked or possessed the link received authenticated read access to the billing portal without entering credentials. This made the tokenized URL function as access to the portal view.\u003c/p\u003e\n\n\u003cp\u003eThe article describes this as a common pattern in legitimate transactional email. Billing platforms embed session tokens so
