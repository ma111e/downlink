 customers can review invoices without logging in. The security problem identified in the article is that the same token works for anyone who possesses the URL.\u003c/p\u003e\n\n\u003cp\u003eThe article specifically notes that if the email is forwarded, intercepted, or delivered to a mailbox controlled by an attacker, the token grants access to the same billing view as the intended recipient.\u003c/p\u003e\n\n\u003ch2 id=\"invoice-and-payment-details\"\u003eInvoice and Payment Details\u003c/h2\u003e\n\n\u003cp\u003eThe email included an attached PDF invoice named \u003ccode\u003eFacture-FR03IN26001665.pdf\u003c/code\u003e. The attachment was 91KB and was declared clean by scanners. The invoice referenced invoice number \u003ccode\u003eFR03IN26001665\u003c/code\u003e for a 380 euro payment.\u003c/p\u003e\n\n\u003cp\u003eThe PDF included French IBAN and BIC payment details at a major European bank. The body of the email also offered credit card and SEPA direct debit as payment options through the portal.\u003c/p\u003e\n\n\u003ch2 id=\"tracking-pixel-and-mailbox-activity\"\u003eTracking Pixel and Mailbox Activity\u003c/h2\u003e\n\n\u003cp\u003eThe email contained a 1x1 tracking pixel loaded from \u003ccode\u003eupflow-email.accounting.ecocert.com\u003c/code\u003e. According to the article, this confirmed that the mailbox was active and that the message was rendered.\u003c/p\u003e\n\n\u003cp\u003eThis tracking component appeared alongside the tokenized portal link and the invoice attachment. The article presents the tracking pixel as part of the observable pattern in the email.\u003c/p\u003e\n\n\u003ch2 id=\"authentication-infrastructure-and-header-details\"\u003eAuthentication, Infrastructure, and Header Details\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several indicators tied to the message and infrastructure:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSending domain: \u003ccode\u003eaccounting.ecocert.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSending address: \u003ccode\u003ecomptabilitegreenlife@accounting.ecocert.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eDisplay name: \u003ccode\u003eGREENLIFE\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eReply-To address: \u003ccode\u003ecomptabilitegreenlife@ecocert.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSending infrastructure: Mailgun host \u003ccode\u003ev5226.v57ae4e16.euw1.send.eu.mailgun.net\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSending IP: \u003ccode\u003e161.38.204.226\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eDKIM selector: \u003ccode\u003emguf\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eDKIM signing domain: \u003ccode\u003eaccounting.ecocert.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eAuthentication results: SPF pass, DKIM pass, DMARC pass, and compauth=100.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that the Reply-To address differed from the From address, creating a subtle subdomain mismatch between \u003ccode\u003eaccounting.ecocert.com\u003c/code\u003e and \u003ccode\u003eecocert.com\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the email security gateway saw clean links, valid authentication, and a known billing platform. Despite this, Themis identified the invoice phishing pattern and quarantined four affected mailboxes automatically.\u003c/p\u003e\n\n\u003cp\u003eThemis flagged the pattern at 71% confidence. The article does not identify a named threat actor or group behind the activity.\u003c/p\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK Mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to three MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eT1566.002\u003c/code\u003e — Phishing: Spearphishing Link, because of the tokenized portal URL with an embedded JWT.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eT1078\u003c/code\u003e — Valid Accounts, because the JWT granted portal access without credentials.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eT1589.001\u003c/code\u003e — Gather Victim Identity Information: Credentials, because the tracking pixel confirmed an active mailbox.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article provides the following indicators and contexts:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eaccounting.ecocert.com\u003c/code\u003e: sending domain and subdomain of \u003ccode\u003eecocert.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecomptabilitegreenlife@accounting.ecocert.com\u003c/code\u003e: sending address with display name \u003ccode\u003eGREENLIFE\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecomptabilitegreenlife@ecocert.com\u003c/code\u003e: Reply-To address, noted as a subdomain mismatch with the From address.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ev5226.v57ae4e16.euw1.send.eu.mailgun.net\u003c/code\u003e: Mailgun sending infrastructure.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e161.38.204.226\u003c/code\u003e: sending IP address.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003emguf\u003c/code\u003e: DKIM selector.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eapp.upflow.io/customers/[uuid]?token=[JWT]\u003c/code\u003e: portal URL pattern containing a JWT with \u003ccode\u003eportal.view\u003c/code\u003e scope and a 60-day TTL.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eupflow-email.accounting.ecocert.com/o/[encoded]\u003c/code\u003e: tracking pixel URL pattern.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eFacture-FR03IN26001665.pdf\u003c/code\u003e: PDF attachment containing IBAN and BIC payment details.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that valid authentication, clean scanner results, and a legitimate billing platform did not prevent the email from creating risk. The passwordless JWT-based portal link allowed access to the billing portal by anyone who had the URL. The case demonstrates how a legitimate transactional email pattern can create exposure when long-lived bearer-style portal links are delivered through email.\u003c/p\u003e\n","keyPoints":["A French-language invoice notification was sent from comptabilitegreenlife@accounting.ecocert.com through Mailgun and passed SPF, DKIM, and DMARC authentication with compauth=100.","The email linked to an Upflow customer billing portal through a redirect on upflow-email.accounting.ecocert.com, and the destination URL contained a JWT with portal.view permissions, a customer identifier, and a 60-day expiration.","Anyone possessing the tokenized URL could access the billing portal without entering credentials.","The attached PDF invoice, Facture-FR03IN26001665.pdf, requested a 380 euro payment and included French IBAN and BIC payment details.","A 1x1 tracking pixel from the upflow-email subdomain confirmed mailbox activity, and Themis quarantined four affected mailboxes after flagging the invoice phishing pattern at 71% confidence."],"insights":["Email authentication controls were not useful for detecting this case because the message was sent from authorized Mailgun infrastructure for a legitimate Ecocert accounting subdomain and passed SPF, DKIM, and DMARC.","URL scanning was ineffective because the link resolved to a real Upflow billing portal rather than an obviously malicious site.","The portal’s passwordless access model made the emailed JWT equivalent to a bearer credential, so forwarding or exposure of the email would also expose billing portal access.","The subtle mismatch between the From address on accounting.ecocert.com and the Reply-To address on ecocert.com was one of the few observable anomalies despite otherwise legitimate infrastructure.","The combination of a tracking pixel and a tokenized billing link allowed mailbox activity confirmation and portal access without requiring malware or a credential-harvesting page."],"referencedReports":[],"body":"\u003cp\u003eA French-language invoice notification arrived from comptabilitegreenlife@accounting.ecocert.com, a subdomain of the legitimate Ecocert domain. The message was delivered through Mailgun infrastructure and passed SPF, DKIM, and DMARC authentication with compauth=100. The article describes the case as a high-severity invoice fraud and credential-harvesting pattern mapped to spearphishing link, valid accounts, and victim identity information gathering techniques.\u003c/p\u003e\n\n\u003cp\u003eThe email directed recipients to an Upflow customer billing portal through a redirect at upflow-email.accounting.ecocert.com. The destination URL contained a JWT with portal.view permissions, a customer identifier, and a 60-day expiration window, allowing anyone with the link to access the portal without entering credentials. The article emphasizes that URL scanners passed the link because it pointed to a real billing portal on a real platform.\u003c/p\u003e\n\n\u003cp\u003eThe attached PDF invoice requested a 380 euro payment and included French IBAN and BIC payment details. The email also contained a 1x1 tracking pixel from the same upflow-email subdomain, which confirmed mailbox activity when the message was rendered. Themis flagged the invoice phishing pattern at 71% confidence and quarantined four affected mailboxes automatically.\u003c/p\u003e\n"},{"n":22,"title":"Junior Hacker Used Tailscale and OpenSSH to Keep Access After His C2 Went Offline","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/junior-hacker-used-tailscale-and.html","time":"16:00","priority":"MAY READ","score":71,"tldr":"A low-skill attacker maintained access to a French small business even after his Havoc C2 went offline by installing OpenSSH and Tailscale as a separate backdoor. The key lesson is that taking down C2 infrastructure is not enough remediation unless defenders also hunt for alternate persistence paths like legitimate remote-access tools, scheduled tasks, and keyloggers.","briefOverview":"\u003cp\u003eA French-speaking attacker using the handle “Poisson” compromised a small French automotive business, planted a keylogger, and stole banking and email credentials. Cato Networks captured the operation command by command, totaling 339 commands over 33 days, after the operator left SSH keys and a step-by-step playbook in an open storage bucket. The article emphasizes that the attacker was not described as an APT and appeared to be a junior operator using free-tier and low-cost infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe most important move came near the end of the intrusion, when Poisson installed OpenSSH Server and Tailscale on a victim machine before his Havoc command-and-control server went offline. This gave him an access path that did not depend on the C2 server, and when the Havoc infrastructure went down the next day, his access remained. When the C2 returned 18 days later, the agents reconnected automatically and he continued operating.\u003c/p\u003e\n\n\u003cp\u003eThe intrusion chain included a VBScript stager, a PowerShell loader, a .NET loader, Havoc’s Demon agent, scheduled-task persistence, Explorer.exe injection, RustDesk, and a simple Python keylogger. Cato’s hunting recommendations included watching for OpenSSH Server on Windows workstations, unexpected tailscale.exe use, ssh -R reverse tunnels, suspicious wscript.exe execution, high-privilege scheduled tasks launching script interpreters, powercfg changes that prevent sleep, and DuckDNS usage.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA French-speaking attacker known as “Poisson” broke into a small French automotive business, installed a keylogger, and stole banking and email credentials. Cato Networks documented the operation from the attacker’s command activity, capturing 339 commands over 33 days. The visibility came after the operator left SSH keys and a step-by-step playbook in an open storage bucket.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Poisson as a junior operator rather than an APT actor. Researchers noted that he appeared to work on a school-like schedule, was active after 3 p.m. CET with a long midday gap, and relied on free-tier or inexpensive infrastructure including DuckDNS, Backblaze B2, and an IONOS VPS in Berlin. His tradecraft was described as thin, including leaked home directories, storage buckets named after his handle, and a test file containing his own repeated keystrokes inside the keylogger package.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the malware ran mostly in memory. A VBScript stager with a sandbox-evasion delay decrypted a PowerShell loader, which downloaded a .NET loader that ran Havoc’s Demon agent without dropping the implant to disk. For elevation, Poisson used Start-Process -Verb RunAs, which triggered a Windows consent prompt rather than silently bypassing UAC, and on one victim required a dozen attempts across two days.\u003c/p\u003e\n\n\u003cp\u003eAfter initial access and elevation, the attacker established persistence and collection mechanisms. He created a scheduled task that ran at every logon with highest privileges, injected shellcode into Explorer.exe, and deployed a custom-built RustDesk as a backup channel. His credential grabber was a roughly 70-line Python keylogger that wrote keystrokes to a local file, which he manually collected after logging in, and he used powercfg to keep machines from sleeping.\u003c/p\u003e\n\n\u003cp\u003eThe major significance of the case was the attacker’s use of OpenSSH Server and Tailscale as an access path independent of Havoc. On April 7, he installed both tools, joined the victim’s machine to his private Tailscale network, configured key-based SSH, and set up a reverse tunnel. When the Havoc C2 went offline the next day, that separate path remained available, and when the C2 returned on April 26 the agents reconnected automatically.\u003c/p\u003e\n\n\u003cp\u003eCato’s response guidance focused on finding this kind of quiet persistence rather than treating C2 takedown as remediation. The article lists alerts for OpenSSH Server installations on Windows workstations, tailscale.exe on machines without a VPN need, ssh -R reverse tunnels, wscript.exe running VBS files from user staging folders, high-privilege scheduled tasks launching script interpreters, powercfg standby-timeout changes, and DuckDNS blocking. The article concludes that defenders should assume a discovered C2 may be only one access route and should hunt for additional persistence layers behind it.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA French-speaking attacker using the handle “Poisson” compromised a small French automotive business, installed a keylogger, and stole banking and email credentials. The operation was documented by Cato Networks, which captured 339 attacker commands over 33 days. The article says Cato gained this visibility after the operator left SSH keys and a step-by-step playbook in an open storage bucket.\u003c/p\u003e\n\n\u003cp\u003eThe central lesson of the case is that taking a command-and-control server offline is not sufficient remediation if the attacker has established another access path. Before his Havoc C2 went dark, Poisson installed OpenSSH Server and Tailscale on a victim machine. That gave him a way back in that did not rely on the C2 infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"actor-profile\"\u003eActor Profile\u003c/h2\u003e\n\n\u003cp\u003eThe attacker is identified by the handle “Poisson.” Researchers described him as a junior operator rather than an APT actor. The article says he appeared to operate on what looked like a school schedule, with activity after 3 p.m. CET and a long midday gap.\u003c/p\u003e\n\n\u003cp\u003ePoisson used free-tier and low-cost infrastructure, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDuckDNS\u003c/li\u003e\n\u003cli\u003eBackblaze B2\u003c/li\u003e\n\u003cli\u003eA cheap IONOS VPS in Berlin\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also describes several signs of weak tradecraft. Poisson leaked his home directory five times, named storage buckets after his own handle, and left a test file of his own repeated keystrokes inside the keylogger package. The article says he failed at roughly half of what he tried but still compromised four machines.\u003c/p\u003e\n\n\u003ch2 id=\"victim-and-impact\"\u003eVictim and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe victim described in the article was a small French automotive business. Poisson installed a keylogger and stole banking and email credentials. The article says there was no sign of ransomware, lateral movement, Mimikatz use, or theft of the documents he browsed, which included tax records and insurance materials.\u003c/p\u003e\n\n\u003cp\u003eThe attacker’s apparent objective was narrow: capturing what users typed. The article specifically mentions banking logins, email passwords, and government portals. For a small business owner, the article characterizes this as direct financial exposure.\u003c/p\u003e\n\n\u003ch2 id=\"intrusion-chain\"\u003eIntrusion Chain\u003c/h2\u003e\n\n\u003cp\u003eThe malware chain ran largely in memory. A VBScript stager with a sandbox-evasion delay decrypted a PowerShell loader. That PowerShell loader then retrieved a .NET loader, which ran Havoc’s Demon agent without dropping the implant to disk.\u003c/p\u003e\n\n\u003cp\u003eFor elevation, Poisson used \u003ccode\u003eStart-Process -Verb RunAs\u003c/code\u003e. The article notes that this is not a silent UAC bypass because it causes the Windows consent prompt to appear and waits for the user to click Yes. On one victim, this reportedly took a dozen attempts over two days.\u003c/p\u003e\n\n\u003cp\u003eAfter elevation, Poisson established persistence and backup access. The article lists several mechanisms:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA scheduled task running at every logon with highest privileges.\u003c/li\u003e\n\u003cli\u003eShellcode injected into \u003ccode\u003eExplorer.exe\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eA custom-built RustDesk instance as a backup channel.\u003c/li\u003e\n\u003cli\u003eA simple Python keylogger for credential capture.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"keylogger-and-manual-collection\"\u003eKeylogger and Manual Collection\u003c/h2\u003e\n\n\u003cp\u003eThe credential grabber was described as a 70-line Python keylogger. It wrote keystrokes to a local file and did not include a beacon or exfiltration server. Instead, Poisson logged in manually, collected the file himself, and used \u003ccode\u003epowercfg\u003c/code\u003e to prevent machines from sleeping so that harvesting would not pause.\u003c/p\u003e\n\n\u003cp\u003eThis manual approach is one reason the article presents the operation as relatively low-sophistication. However, the same operation still produced real credential theft and persistent access.\u003c/p\u003e\n\n\u003ch2 id=\"the-openssh-and-tailscale-persistence-layer\"\u003eThe OpenSSH and Tailscale Persistence Layer\u003c/h2\u003e\n\n\u003cp\u003eThe most notable action occurred on April 7 during a five-hour overnight session. Poisson installed OpenSSH Server and Tailscale, joined the victim’s machine to his private Tailscale network, configured key-based SSH, and set up a reverse tunnel. This created an encrypted mesh access path with no exposed ports and no dependence on Havoc.\u003c/p\u003e\n\n\u003cp\u003eThe next day, the Havoc infrastructure went offline. Cato did not state why it went offline, and the article says the reason barely mattered because the Tailscale path existed on a separate network. As a result, Poisson’s access survived the C2 outage.\u003c/p\u003e\n\n\u003cp\u003eWhen the C2 returned on April 26, the agents reconnected automatically. The attacker did not need to re-compromise the environment. Over the final five days, he executed 145 more commands.\u003c/p\u003e\n\n\u003ch2 id=\"later-activity\"\u003eLater Activity\u003c/h2\u003e\n\n\u003cp\u003eAfter the C2 returned, Poisson continued operating. The article says he probed smart-card and certificate stores, which Cato interpreted as a sign that he was eyeing certificate-based logins. He also ran two unexplained executables from a file named \u003ccode\u003eThales.zip\u003c/code\u003e for about 32 minutes total.\u003c/p\u003e\n\n\u003cp\u003eBefore going quiet on May 1, he deleted 17 files. The article states that what was inside \u003ccode\u003eThales.zip\u003c/code\u003e and what those programs did during their 32 minutes on the machine remained an open question from Cato’s write-up.\u003c/p\u003e\n\n\u003ch2 id=\"tools-and-infrastructure-mentioned\"\u003eTools and Infrastructure Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article names several tools, services, and techniques used in the operation:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHavoc Demon agent\u003c/li\u003e\n\u003cli\u003eOpenSSH Server\u003c/li\u003e\n\u003cli\u003eTailscale\u003c/li\u003e\n\u003cli\u003eRustDesk\u003c/li\u003e\n\u003cli\u003eDuckDNS\u003c/li\u003e\n\u003cli\u003eBackblaze B2\u003c/li\u003e\n\u003cli\u003eIONOS VPS in Berlin\u003c/li\u003e\n\u003cli\u003eVBScript stager\u003c/li\u003e\n\u003cli\u003ePowerShell loader\u003c/li\u003e\n\u003cli\u003e.NET loader\u003c/li\u003e\n\u003cli\u003ePython keylogger\u003c/li\u003e\n\u003cli\u003eScheduled-task persistence\u003c/li\u003e\n\u003cli\u003eExplorer.exe shellcode injection\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eStart-Process -Verb RunAs\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003essh -R\u003c/code\u003e reverse tunnel\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003epowercfg\u003c/code\u003e standby-timeout changes\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also notes that legitimate remote-access tools are used by other actors. It says China’s APT31 used Tailscale through 2024 and 2025 to tunnel out of Russian IT firms, Scattered Spider has used legitimate remote-access tools such as Ngrok and Fleetdeck, and RustDesk has appeared in recent Akira ransomware intrusions.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-hunting-guidance\"\u003eDetection and Hunting Guidance\u003c/h2\u003e\n\n\u003cp\u003eCato’s hunting guidance focuses on the behaviors and access paths that allowed the attacker to persist beyond the C2 outage. The article lists the following concrete items to watch:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAlert when OpenSSH Server is installed on a Windows workstation.\u003c/li\u003e\n\u003cli\u003eWatch for \u003ccode\u003etailscale.exe\u003c/code\u003e on machines that have no reason to run a VPN.\u003c/li\u003e\n\u003cli\u003eLook for \u003ccode\u003essh -R\u003c/code\u003e reverse tunnels to outside hosts.\u003c/li\u003e\n\u003cli\u003eCheck for \u003ccode\u003ewscript.exe\u003c/code\u003e running \u003ccode\u003e.vbs\u003c/code\u003e files from user staging folders.\u003c/li\u003e\n\u003cli\u003eFlag scheduled tasks set to highest privileges that launch script interpreters.\u003c/li\u003e\n\u003cli\u003eWatch for \u003ccode\u003epowercfg\u003c/code\u003e standby-timeout changes that keep machines awake.\u003c/li\u003e\n\u003cli\u003eBlock DuckDNS.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe broader guidance is to assume that a discovered C2 server may not be the attacker’s only way into the environment. The article stresses that defenders should hunt for quiet persistence layers such as OpenSSH, Tailscale, scheduled tasks, and keyloggers rather than stopping at C2 disruption.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main significance is not that Poisson used novel malware or highly advanced techniques. It emphasizes that familiar, legitimate tools can preserve attacker access even when obvious C2 infrastructure disappears. Because tools like OpenSSH, Tailscale, and RustDesk are legitimate and signed, detection focused only on malicious files may miss the behavior.\u003c/p\u003e\n\n\u003cp\u003eThe case provides command-level evidence that this approach can outlive a C2 takedown. The article concludes that the C2 was only one way into the intrusion, not the intrusion itself. If defenders remove the C2 but leave OpenSSH, Tailscale, the scheduled task, and the keylogger in place, the attacker still has a path back in.\u003c/p\u003e\n","keyPoints":["A French-speaking attacker known as \"Poisson\" compromised a small French automotive business, installed a keylogger, and stole banking and email credentials.","Before his Havoc command-and-control server went offline, Poisson installed OpenSSH Server and Tailscale on a victim machine to maintain access outside the C2 channel.","Cato Networks captured 339 commands over 33 days after the operator left SSH keys and a step-by-step playbook in an open storage bucket.","The intrusion used a VBScript stager, PowerShell loader, .NET loader, Havoc Demon agent, scheduled-task persistence, Explorer.exe injection, RustDesk, and a Python keylogger.","Cato Networks recommended hunting for OpenSSH Server on Windows workstations, tailscale.exe on unexpected machines, ssh -R reverse tunnels, suspicious wscript.exe activity, high-privilege scheduled tasks launching script interpreters, powercfg standby-timeout changes, and DuckDNS usage."],"insights":["C2 takedown alone is ineffective if an attacker has already deployed legitimate remote-access tools such as OpenSSH and Tailscale as an independent persistence layer.","Even a junior operator with poor tradecraft and frequent operational mistakes can maintain meaningful access by combining free-tier infrastructure, signed legitimate tools, and simple manual credential theft.","Behavioral detections are more important than file reputation in this case because the attacker relied on legitimate binaries such as Tailscale, OpenSSH, and RustDesk rather than only obviously malicious files.","Windows workstation installation of OpenSSH Server, unexpected tailscale.exe execution, and ssh -R reverse tunnels are high-value signals because they can reveal attacker-controlled access paths that do not depend on the primary C2 infrastructure."],"referencedReports":[{"title":"Operation Poisson: Analyzing a Cybercriminal’s Entire Operation","url":"https://www.catonetworks.com/blog/cato-ctrl-operation-poisson-analyzing-a-cybercriminals-entire-operation/","publisher":"Cato Networks / Cato CTRL","context":"The article says Cato CTRL researcher Vitaly Simonovich published a write-up capturing the attacker’s operation command by command over 33 days.","category":"research","primary":true}],"body":"\u003cp\u003eA French-speaking attacker using the handle “Poisson” compromised a small French automotive business, planted a keylogger, and stole banking and email credentials. Cato Networks captured the operation command by command, totaling 339 commands over 33 days, after the operator left SSH keys and a step-by-step playbook in an open storage bucket. The article emphasizes that the attacker was not described as an APT and appeared to be a junior operator using free-tier and low-cost infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe most important move came near the end of the intrusion, when Poisson installed OpenSSH Server and Tailscale on a victim machine before his Havoc command-and-control server went offline. This gave him an access path that did not depend on the C2 server, and when the Havoc infrastructure went down the next day, his access remained. When the C2 returned 18 days later, the agents reconnected automatically and he continued operating.\u003c/p\u003e\n\n\u003cp\u003eThe intrusion chain included a VBScript stager, a PowerShell loader, a .NET loader, Havoc’s Demon agent, scheduled-task persistence, Explorer.exe injection, RustDesk, and a simple Python keylogger. Cato’s hunting recommendations included watching for OpenSSH Server on Windows workstations, unexpected tailscale.exe use, ssh -R reverse tunnels, suspicious wscript.exe execution, high-privilege scheduled tasks launching script interpreters, powercfg changes that prevent sleep, and DuckDNS usage.\u003c/p\u003e\n"},{"n":10,"title":"Google to use UK and EU user IP addresses for ad personalization","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/google-to-use-uk-and-eu-user-ip-addresses-for-ad-personalization/","time":"21:02","priority":"MAY READ","score":70,"tldr":"Google will begin using UK, EEA, and Swiss users’ IP addresses for ad measurement and personalization from around August 3, 2026, making IP-based device identification part of its ad targeting in regions where IP addresses are regulated as personal data. The move raises consent and fingerprinting concerns under UK and EU privacy rules, with Google placing responsibility on advertisers to obtain valid user consent.","briefOverview":"\u003cp\u003eGoogle has begun notifying advertisers that it will start using IP addresses for ad measurement and personalization across the European Economic Area, the UK, and Switzerland on or shortly after August 3, 2026. The article says Google already receives these IP addresses through customer tags, SDKs, HTTP calls, and uploads, but the change is that the same addresses will be used to identify devices for measurement and ad personalization.\u003c/p\u003e\n\n\u003cp\u003eThe significance is that IP addresses are regulated as personal data in the UK and EU, and the article describes device identification based on IP addresses as a building block of fingerprinting. Google will register under IAB Europe’s Transparency and Consent Framework for Feature 3, which covers identifying devices based on automatically transmitted information, including IP addresses.\u003c/p\u003e\n\n\u003cp\u003eGoogle says the change is framed around privacy-enhancing technologies such as on-device processing, trusted execution environments, and secure multi-party computation. Google’s customer email reminds advertisers that they remain bound by its EU User Consent Policy and must obtain valid consent from users in the affected regions.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGoogle has notified advertisers that it will begin using IP addresses for ad measurement and personalization in the European Economic Area, the UK, and Switzerland on or shortly after August 3, 2026. The article says IP addresses are received by online services on nearly every request and that Google already receives them to route traffic and deliver ads. The change is the purpose of use: the same IP addresses will be used to identify devices for measurement and ad personalization.\u003c/p\u003e\n\n\u003cp\u003eGoogle will register under IAB Europe’s Transparency and Consent Framework for Feature 3, which is described as identifying devices based on information transmitted automatically. The article says Feature 3 includes IP addresses and is not a consent step by itself. Instead, it attaches to personalization purposes, which require user consent rather than legitimate interest.\u003c/p\u003e\n\n\u003cp\u003eThe article says the affected regions are different from much of the world because IP addresses are personal data under GDPR, and using them to identify a device is a building block of fingerprinting. It notes that Google previously took the view that fingerprinting subverts user choice because users cannot clear it the way they can clear cookies. Google reversed its stance in December 2024 by dropping its prohibition on fingerprinting for advertisers.\u003c/p\u003e\n\n\u003cp\u003eThe UK Information Commissioner’s Office called Google’s reversal “irresponsible” within a day, according to the article. The timing is described as awkward because the ICO published advice to the UK government on May 18, 2026, about possible changes to online advertising consent rules. The article says the ICO’s preferred approach would keep consent mandatory for tracking that profiles people across services.\u003c/p\u003e\n\n\u003cp\u003eGoogle’s customer email places compliance responsibility on advertisers by reminding them that they remain bound by Google’s EU User Consent Policy and must obtain valid consent from users in the affected regions. The user-facing choice for IP-based personalization will not arrive until later in Google’s rollout. Until then, the article says users can decline non-essential cookies and consent prompts and review ad personalization settings in their Google account at myadcenter.google.com.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGoogle has begun notifying advertisers that it will start using IP addresses for ad measurement and personalization across the European Economic Area, the UK, and Switzerland on or shortly after August 3, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe article says Google already receives IP addresses through customer tags, SDKs, HTTP calls, and uploads. Google already uses these addresses to route traffic and deliver ads, but the change is that the same IP addresses will be used to identify devices for measurement and ad personalization.\u003c/p\u003e\n\n\u003ch2 id=\"what-is-changing\"\u003eWhat is changing\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that the main change is not the receipt of IP addresses, but the purpose for which they will be used.\u003c/p\u003e\n\n\u003cp\u003eGoogle will use IP addresses to identify devices for:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAd measurement.\u003c/li\u003e\n\u003cli\u003eAd personalization.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this use triggers consent requirements under UK and EU law.\u003c/p\u003e\n\n\u003cp\u003eGoogle will also register under IAB Europe’s Transparency and Consent Framework for Feature 3, “Identify devices based on information transmitted automatically.” Under the framework, Feature 3 is described as the method for distinguishing a device from the data it sends automatically, including the IP address.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that Feature 3 is not a consent step by itself. It attaches to personalization purposes, which require user consent rather than legitimate interest.\u003c/p\u003e\n\n\u003ch2 id=\"regions-and-affected-parties\"\u003eRegions and affected parties\u003c/h2\u003e\n\n\u003cp\u003eThe affected regions are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe European Economic Area.\u003c/li\u003e\n\u003cli\u003eThe UK.\u003c/li\u003e\n\u003cli\u003eSwitzerland.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe affected ecosystem includes Google, advertisers using Google advertising systems, users in the affected regions, IAB Europe’s Transparency and Consent Framework, and regulators such as the UK Information Commissioner’s Office.\u003c/p\u003e\n\n\u003cp\u003eThe article says Google’s customer email reminds advertisers that they remain bound by Google’s EU User Consent Policy and must obtain valid consent from users in the affected regions.\u003c/p\u003e\n\n\u003ch2 id=\"privacy-and-technical-context\"\u003ePrivacy and technical context\u003c/h2\u003e\n\n\u003cp\u003eThe article says IP addresses are received by online services on nearly every request and that the practice is routine across much of the world. However, it states that the EEA, the UK, and Switzerland are different because an IP address is personal data under GDPR.\u003c/p\u003e\n\n\u003cp\u003eThe article describes using an IP address to identify a device as a building block of fingerprinting. It says fingerprinting is the practice of tracking a device when cookies are blocked or cleared.\u003c/p\u003e\n\n\u003cp\u003eGoogle frames the change around privacy-enhancing technologies, or PETs. The technologies listed in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn-device processing.\u003c/li\u003e\n\u003cli\u003eTrusted execution environments.\u003c/li\u003e\n\u003cli\u003eSecure multi-party computation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSome personalization features will not arrive until later this year or early next, according to the article. Google says that when those features arrive, it will let users on its own properties make a choice about IP-based personalization.\u003c/p\u003e\n\n\u003ch2 id=\"google-s-prior-position-and-reversal\"\u003eGoogle’s prior position and reversal\u003c/h2\u003e\n\n\u003cp\u003eThe article says Google previously took a different view of fingerprinting. In 2019, then Chrome engineering director Justin Schuh wrote that fingerprinting subverts user choice and is wrong because users cannot clear it the way they can clear cookies.\u003c/p\u003e\n\n\u003cp\u003eThe article says Google reversed that stance in December 2024 by dropping its prohibition on fingerprinting for advertisers. The UK Information Commissioner’s Office called that reversal “irresponsible” within a day.\u003c/p\u003e\n\n\u003ch2 id=\"regulatory-timing\"\u003eRegulatory timing\u003c/h2\u003e\n\n\u003cp\u003eThe timing is described as awkward because the ICO published advice to the UK government on May 18, 2026, about possible changes to online advertising rules.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the ICO’s preferred approach would allow some advertising without consent only when it is based on the context being viewed, not on a person’s activity over time. The article says the ICO would keep consent mandatory for tracking that profiles people across services.\u003c/p\u003e\n\n\u003cp\u003eThe article states that IP-based personalization across surfaces sits on the consent-required side of that line. It also says the ICO has stressed that nothing has changed yet and that existing rules still apply.\u003c/p\u003e\n\n\u003ch2 id=\"user-options-described-in-the-article\"\u003eUser options described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article says the user-facing choice over IP-based personalization will not arrive until later in Google’s rollout.\u003c/p\u003e\n\n\u003cp\u003eUntil then, the available controls are described as the familiar ones:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDeclining non-essential cookies and consent prompts.\u003c/li\u003e\n\u003cli\u003eReviewing ad personalization settings under a Google account at myadcenter.google.com.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article closes by saying that whether the rollout squares with the ICO’s May advice is the question now raised by Google’s plan.\u003c/p\u003e\n","keyPoints":["Google has notified advertisers that it will start using IP addresses for ad measurement and personalization across the EEA, the UK, and Switzerland on or shortly after August 3, 2026.","The change means IP addresses that Google already receives for routing traffic and delivering ads will also be used to identify devices for measurement and ad personalization.","Google will register under IAB Europe’s Transparency and Consent Framework for Feature 3, which covers identifying devices based on information transmitted automatically, including IP addresses.","The article says IP addresses are personal data under GDPR in the EEA, the UK, and Switzerland, and that using them to identify a device is a building block of fingerprinting.","Google’s customer email says advertisers remain bound by its EU User Consent Policy and must obtain valid consent from users in the affected regions."],"insights":["Google is changing the stated purpose of IP address use in the affected regions, not merely collecting a new type of data, which is why the same technical signal now triggers consent requirements.","Google’s registration for IAB Europe TCF Feature 3 does not itself create a consent step; consent is tied to the personalization purposes that use device identification.","The rollout comes shortly after the UK ICO advised that cross-service profiling should continue to require consent, making Google’s IP-based personalization plan especially sensitive from a compliance standpoint.","Google previously described fingerprinting as subverting user choice, but its current rollout follows a December 2024 reversal of its earlier prohibition on fingerprinting for advertisers.","Users will not receive Google’s specific choice for IP-based personalization until later in the rollout, so current practical controls are limited to rejecting non-essential consent prompts and reviewing Google ad personalization settings."],"referencedReports":[{"title":"Our advice to Government on potential changes to online advertising rules","url":"https://ico.org.uk/about-the-ico/media-centre/news-and-blogs/2026/05/our-advice-to-government-on-potential-changes-to-online-advertising-rules/","publisher":"Information Commissioner's Office","context":"The article says the ICO published advice to the UK government on changing consent rules for online advertising, including that cross-service profiling should still require consent.","category":"advisory","primary":false}],"body":"\u003cp\u003eGoogle has begun notifying advertisers that it will start using IP addresses for ad measurement and personalization across the European Economic Area, the UK, and Switzerland on or shortly after August 3, 2026. The article says Google already receives these IP addresses through customer tags, SDKs, HTTP calls, and uploads, but the change is that the same addresses will be used to identify devices for measurement and ad personalization.\u003c/p\u003e\n\n\u003cp\u003eThe significance is that IP addresses are regulated as personal data in the UK and EU, and the article describes device identification based on IP addresses as a building block of fingerprinting. Google will register under IAB Europe’s Transparency and Consent Framework for Feature 3, which covers identifying devices based on automatically transmitted information, including IP addresses.\u003c/p\u003e\n\n\u003cp\u003eGoogle says the change is framed around privacy-enhancing technologies such as on-device processing, trusted execution environments, and secure multi-party computation. Google’s customer email reminds advertisers that they remain bound by its EU User Consent Policy and must obtain valid consent from users in the affected regions.\u003c/p\u003e\n"},{"n":13,"title":"Microsoft confirms Office apps launch issues after June updates","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-confirms-office-apps-launch-issues-after-june-updates/","time":"11:54","priority":"MAY READ","score":70,"tldr":"Microsoft says Windows updates released on or after June 9, 2026 can prevent some third-party apps using OLE automation from launching Office apps or opening Office documents. There is no fix yet, but users can work around it by opening Office apps or documents directly while Microsoft prepares a future Windows update.","briefOverview":"\u003cp\u003eMicrosoft is investigating a newly confirmed issue that prevents some third-party applications from launching Microsoft Office applications or opening Office documents on fully updated Windows systems. The problem appears after installing Windows updates released on or after June 9, 2026. Affected Office applications include Word, Excel, PowerPoint, Access, and other Microsoft Office apps.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the issue affects certain third-party applications that use OLE automation to interact with Office. In some cases, the Office application or document may fail to open without displaying an error message. Reported affected applications include CCH Engagement, Zotero, Workpaper Manager, Dentrix, Softdent, and similar software.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft has not yet released a fix, but said a resolution is in progress and will be included in a future Windows update. The company advised affected users to open Office apps or documents directly instead of launching them through the affected third-party applications. Enterprise customers can contact Microsoft Support for Business for a separate workaround that can be applied across an organization.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft confirmed it is investigating an issue affecting up-to-date Windows systems after the Windows updates released on or after June 9, 2026. The issue can stop third-party applications from launching Microsoft Office applications or opening Office documents. Microsoft described the problem in updated advisories and said it has received reports from affected users.\u003c/p\u003e\n\n\u003cp\u003eThe known issue affects Microsoft Office applications including Word, Excel, PowerPoint, Access, and other Office apps. The failures occur when Office applications or documents are launched from within certain third-party applications. Microsoft said that in some cases the affected Office application or document may fail to open without showing an error message.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft identified the technical trigger as involving third-party applications that use OLE automation to interact with Microsoft Office applications. The article cites user reports naming CCH Engagement, Zotero, Workpaper Manager, Dentrix, Softdent, and other similar applications as impacted. The issue is therefore tied to how some external applications automate or invoke Office rather than to users opening Office directly.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft has not yet provided a fix for the problem. As a workaround, the company advised affected customers to open Office apps or documents directly instead of launching them from impacted third-party applications. Microsoft also said enterprise customers can contact Microsoft Support for Business for a separate workaround that can be applied across an entire organization.\u003c/p\u003e\n\n\u003cp\u003eThe company said a resolution is in progress and will be included in a future Windows update, with more information to be shared when available. The article also notes that Microsoft has recently addressed other Office and Windows-related issues, including Office for the web file access problems, Windows 365 Office installation issues, WUSA installation failures, and a Windows Server 2025 BitLocker recovery bug.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft is investigating a known issue that can prevent certain third-party applications from launching Microsoft Office applications or opening Office documents on up-to-date Windows systems. The problem occurs after installing Windows updates released on or after June 9, 2026. Microsoft confirmed the issue in updated advisories after receiving reports from affected users.\u003c/p\u003e\n\n\u003cp\u003eThe issue affects Office applications including Word, Excel, PowerPoint, Access, and other Microsoft Office applications. The failure occurs when those Office applications or documents are opened from within affected third-party applications. Microsoft said that in some cases the Office application or document may fail to open without displaying an error message.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said the issue affects certain third-party applications that use OLE automation to interact with Microsoft Office applications. OLE automation is the mechanism specifically cited in the article as the common factor among the affected third-party applications. The article does not describe a specific vulnerability, exploit, or security compromise.\u003c/p\u003e\n\n\u003cp\u003eThe reported behavior is that a third-party application attempts to launch an Office application or open a document, but the Office application or document may not open. Microsoft noted that the failure may occur silently, without an error message. This can make the issue appear as a failed launch rather than an explicit Office or Windows error.\u003c/p\u003e\n\n\u003ch2 id=\"affected-applications-and-parties\"\u003eAffected Applications and Parties\u003c/h2\u003e\n\n\u003cp\u003eThe affected Microsoft applications include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWord\u003c/li\u003e\n\u003cli\u003eExcel\u003c/li\u003e\n\u003cli\u003ePowerPoint\u003c/li\u003e\n\u003cli\u003eAccess\u003c/li\u003e\n\u003cli\u003eOther Microsoft Office applications\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article cites user reports identifying several impacted third-party applications, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCCH Engagement\u003c/li\u003e\n\u003cli\u003eZotero\u003c/li\u003e\n\u003cli\u003eWorkpaper Manager\u003c/li\u003e\n\u003cli\u003eDentrix\u003c/li\u003e\n\u003cli\u003eSoftdent\u003c/li\u003e\n\u003cli\u003eOther similar applications\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe affected parties are users and organizations that rely on these third-party applications to open Office applications or documents. Enterprise customers are specifically mentioned because Microsoft says they can contact Microsoft Support for Business for a separate organization-wide workaround.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe impact is operational disruption rather than a described security breach. Users may be unable to launch Office applications or open Office documents through affected third-party software after installing the relevant Windows updates. In some cases, the failure may happen without an error message, according to Microsoft.\u003c/p\u003e\n\n\u003cp\u003eThe issue is tied to systems that have installed Windows updates released on or after June 9, 2026. The article does not state that directly opening Office applications or documents is broken. Instead, Microsoft recommends direct opening as the current workaround.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-response\"\u003eMicrosoft’s Response\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said it is still working to resolve the issue and does not yet have a fix. The company advised affected customers to open Office applications or documents directly rather than launching them through affected third-party applications. Enterprise customers can contact Microsoft Support for Business for a separate workaround that can be deployed across an organization.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said a resolution is in progress and will be included in a future Windows update. The company said more information will be shared when it becomes available.\u003c/p\u003e\n\n\u003ch2 id=\"related-microsoft-issues-mentioned\"\u003eRelated Microsoft Issues Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article also notes several other recent Microsoft issues and fixes. Microsoft recently addressed an issue that prevented users of Office for the web from opening Excel and PowerPoint files. It also addressed another issue that blocked Windows 365 users from downloading and installing the Office suite.\u003c/p\u003e\n\n\u003cp\u003eMore recently, Microsoft fixed a known issue that caused Windows updates released since May 2025 to fail when installed using the Windows Update Standalone Installer, or WUSA. The article also mentions a bug that caused Windows Server 2025 devices to boot into BitLocker recovery after installing the April 2026 security update.\u003c/p\u003e\n","keyPoints":["Microsoft is investigating an issue where certain third-party applications cannot launch Microsoft Office applications or open documents after installing Windows updates released on or after June 9, 2026.","The issue affects Office applications including Word, Excel, PowerPoint, Access, and other Microsoft Office apps when launched from impacted third-party applications.","Microsoft said the problem affects certain third-party applications that use OLE automation to interact with Microsoft Office applications, and the Office app or document may fail to open without an error message.","User reports identify affected third-party applications including CCH Engagement, Zotero, Workpaper Manager, Dentrix, Softdent, and similar applications.","Microsoft advised affected users to open Office applications or documents directly as a workaround while it works on a resolution for a future Windows update."],"insights":["Because failures may occur without any error message, affected organizations may need to correlate Office launch problems with the June 9, 2026 or later Windows updates rather than relying on visible application errors.","The impact is concentrated in third-party applications that automate Office through OLE automation, making specialized business tools such as CCH Engagement, Zotero, Workpaper Manager, Dentrix, and Softdent especially relevant for triage.","Enterprise customers have an additional remediation path beyond the user-level workaround, as Microsoft says they can contact Microsoft Support for Business for a separate organization-wide workaround.","The available user workaround avoids the affected third-party launch path by opening Office applications or documents directly until Microsoft ships a fix in a future Windows update."],"referencedReports":[{"title":"June 9, 2026—KB5095051 (OS Build 28000.2269)","url":"https://support.microsoft.com/en-us/topic/june-9-2026-kb5095051-os-build-28000-2269-08941082-395f-4fb3-963e-5ca0ef067856","publisher":"Microsoft","context":"The article cites Microsoft’s updated advisory as the source confirming that Windows updates released on or after June 9, 2026 can prevent some third-party applications from launching Office apps or opening documents.","category":"advisory","primary":true}],"body":"\u003cp\u003eMicrosoft is investigating a newly confirmed issue that prevents some third-party applications from launching Microsoft Office applications or opening Office documents on fully updated Windows systems. The problem appears after installing Windows updates released on or after June 9, 2026. Affected Office applications include Word, Excel, PowerPoint, Access, and other Microsoft Office apps.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the issue affects certain third-party applications that use OLE automation to interact with Office. In some cases, the Office application or document may fail to open without displaying an error message. Reported affected applications include CCH Engagement, Zotero, Workpaper Manager, Dentrix, Softdent, and similar software.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft has not yet released a fix, but said a resolution is in progress and will be included in a future Windows update. The company advised affected users to open Office apps or documents directly instead of launching them through the affected third-party applications. Enterprise customers can contact Microsoft Support for Business for a separate workaround that can be applied across an organization.\u003c/p\u003e\n"},{"n":5,"title":"EU grants Ukraine access to cybersecurity reserve for major attacks","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/ukraine-access-eu-cybersecurity-reserve","time":"16:33","priority":"MAY READ","score":69,"tldr":"Ukraine has been granted access to the EU Cybersecurity Reserve, allowing it to request EU-approved experts for major cyberattacks that exceed its own response capacity. The move deepens EU-Ukraine security cooperation and integrates Kyiv further into Europe’s collective cyber defense framework.","briefOverview":"\u003cp\u003eUkraine has been granted access to the European Union\u0026rsquo;s Cybersecurity Reserve, allowing Kyiv to call on EU-approved experts during major cyberattacks. The European Commission said EU member states approved Ukraine\u0026rsquo;s participation in the reserve, which is a pool of private cybersecurity companies that can be rapidly deployed to help governments and critical infrastructure operators. The reserve is managed by ENISA and is intended for cyber incidents that exceed a participating country\u0026rsquo;s own capabilities.\u003c/p\u003e\n\n\u003cp\u003eThe decision has both practical and political significance for Ukraine as it continues to face cyberattacks during the war with Russia. Natalia Tkachuk of Ukraine\u0026rsquo;s National Security and Defense Council said Ukraine is becoming part of the EU\u0026rsquo;s collective cyber defense mechanism before obtaining formal EU membership. The move comes as EU member states agreed to launch formal accession negotiations with Kyiv.\u003c/p\u003e\n\n\u003cp\u003eUkraine will be able to request emergency European assistance for digital forensics, incident response, and system recovery if its own teams are overwhelmed. The Cyber Reserve can also support post-incident recovery, system modernization, threat intelligence sharing, and improvements to national cyber incident response capabilities. Ukraine also expects the relationship to be reciprocal, with Ukrainian agencies sharing intelligence on Russian hacking techniques and participating in joint investigations with European partners.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eUkraine has been granted access to the European Union\u0026rsquo;s Cybersecurity Reserve, giving Kyiv the ability to request EU-approved experts during major cyberattacks. The European Commission announced that EU member states had approved Ukraine\u0026rsquo;s participation in the reserve. The reserve is a pool of private cybersecurity companies that can be rapidly deployed to help governments and critical infrastructure operators respond to large-scale cyber incidents.\u003c/p\u003e\n\n\u003cp\u003eThe EU Cybersecurity Reserve is managed by the European Union Agency for Cybersecurity, known as ENISA. It was established to provide incident response, technical expertise, and recovery support to participating countries facing cyberattacks that exceed their own capabilities. Moldova became the first non-EU country to gain access to the reserve last year because of increasing Moscow-linked cyberthreats and influence operations.\u003c/p\u003e\n\n\u003cp\u003eFor Ukraine, the article says the decision has political significance as well as practical benefits because the country continues to face relentless cyberattacks during the war with Russia. Natalia Tkachuk, head of cyber and information security at Ukraine\u0026rsquo;s National Security and Defense Council, said Ukraine is becoming part of the EU\u0026rsquo;s collective cyber defense mechanism even before formal EU membership. The move also follows an agreement by EU member states to launch formal accession negotiations with Kyiv.\u003c/p\u003e\n\n\u003cp\u003eAccording to Tkachuk, Ukraine will be able to request emergency European assistance if a cyberattack exceeds the capacity of its own incident response teams. Specialized experts from across the EU could provide digital forensics, incident response, and system recovery support. The Cyber Reserve can also help with post-incident recovery, system modernization, cyberthreat intelligence sharing, and strengthening national cyber incident response capabilities.\u003c/p\u003e\n\n\u003cp\u003eThe relationship is expected to be reciprocal rather than one-way assistance. Tkachuk said Ukrainian agencies already share intelligence on Russian hacking techniques with European partners and participate in joint cybercrime investigations and attribution efforts with Europol and other European authorities. The article also says years of responding to Russian cyberattacks have strengthened Ukraine\u0026rsquo;s government and private-sector cyber capabilities.\u003c/p\u003e\n\n\u003cp\u003eUkraine hopes its own cybersecurity companies will eventually be able to join the Cyber Reserve as trusted service providers under the EU\u0026rsquo;s Cyber Solidarity Act. European Commission Executive Vice President Henna Virkkunen said welcoming Ukraine into the reserve strengthens collective defenses and reaffirms European digital solidarity. The article notes that the EU has become one of Ukraine\u0026rsquo;s closest cybersecurity partners since Russia\u0026rsquo;s 2022 invasion, including through bilateral security agreements and the Tallinn Mechanism.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eUkraine has been granted access to the European Union\u0026rsquo;s Cybersecurity Reserve, enabling Kyiv to call on EU-approved experts during major cyberattacks. The European Commission announced that EU member states approved Ukraine\u0026rsquo;s participation in the reserve. The decision gives Ukraine access to a mechanism designed to support governments and critical infrastructure operators during large-scale cyber incidents.\u003c/p\u003e\n\n\u003cp\u003eThe reserve is managed by the European Union Agency for Cybersecurity, or ENISA. It consists of private cybersecurity companies that can be rapidly deployed when participating countries face cyber incidents that exceed their own response capabilities. The reserve provides incident response, technical expertise, and recovery support.\u003c/p\u003e\n\n\u003ch2 id=\"significance-for-ukraine\"\u003eSignificance for Ukraine\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the decision as both politically significant and practically beneficial for Ukraine. Ukraine continues to face relentless cyberattacks during the ongoing war with Russia. Natalia Tkachuk, head of cyber and information security at Ukraine\u0026rsquo;s National Security and Defense Council, said Ukraine is becoming part of the EU\u0026rsquo;s collective cyber defense mechanism even before formal EU membership.\u003c/p\u003e\n\n\u003cp\u003eThe move comes shortly after EU member states agreed to launch formal accession negotiations with Kyiv. The article presents Ukraine\u0026rsquo;s access to the reserve as another sign of deepening security cooperation between Brussels and Kyiv as Ukraine moves closer to eventual EU membership.\u003c/p\u003e\n\n\u003ch2 id=\"what-ukraine-can-request\"\u003eWhat Ukraine Can Request\u003c/h2\u003e\n\n\u003cp\u003eAccording to Tkachuk, Ukraine will be able to officially request emergency European assistance if a cyberattack exceeds the capacity of its own incident response teams. In such cases, specialized experts from across the EU could provide support in several areas:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDigital forensics.\u003c/li\u003e\n\u003cli\u003eIncident response.\u003c/li\u003e\n\u003cli\u003eSystem recovery.\u003c/li\u003e\n\u003cli\u003ePost-incident recovery.\u003c/li\u003e\n\u003cli\u003eModernizing systems to strengthen defenses.\u003c/li\u003e\n\u003cli\u003eSharing cyberthreat intelligence.\u003c/li\u003e\n\u003cli\u003eImproving national cyber incident response capabilities.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe reserve is intended for major incidents that surpass a country\u0026rsquo;s own ability to respond. Its support can therefore apply not only during an active cyberattack but also after an incident, when recovery and defensive improvements are needed.\u003c/p\u003e\n\n\u003ch2 id=\"reciprocal-role-for-ukraine\"\u003eReciprocal Role for Ukraine\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that Ukraine is not expected to be only a recipient of cybersecurity assistance. Tkachuk said Ukraine already shares intelligence on Russian hacking techniques with European partners. Ukrainian agencies also participate in joint cybercrime investigations and attribution efforts alongside Europol and other European authorities.\u003c/p\u003e\n\n\u003cp\u003eYears of responding to Russian cyberattacks have strengthened Ukraine\u0026rsquo;s cyber capabilities. The article says this has given Ukraine\u0026rsquo;s government and private sector extensive experience in detecting, mitigating, and recovering from large-scale cyber incidents. Ukraine also hopes that its own cybersecurity companies will eventually be able to join the Cyber Reserve as trusted service providers under the EU\u0026rsquo;s Cyber Solidarity Act.\u003c/p\u003e\n\n\u003ch2 id=\"broader-eu-cybersecurity-context\"\u003eBroader EU Cybersecurity Context\u003c/h2\u003e\n\n\u003cp\u003eMoldova became the first non-EU country granted access to the Cybersecurity Reserve last year. The article says that decision was due to the increasing number of Moscow-linked cyberthreats and influence operations. Ukraine\u0026rsquo;s inclusion extends the reserve\u0026rsquo;s role in supporting non-EU countries facing significant cyber pressure.\u003c/p\u003e\n\n\u003cp\u003eEuropean Commission Executive Vice President Henna Virkkunen said that welcoming Ukraine into the EU Cybersecurity Reserve strengthens collective defenses and reaffirms the principle of solidarity at the heart of Europe\u0026rsquo;s digital future. The article also notes that the EU has become one of Ukraine\u0026rsquo;s closest cybersecurity partners since Russia\u0026rsquo;s invasion in 2022.\u003c/p\u003e\n\n\u003ch2 id=\"related-cooperation-mechanisms\"\u003eRelated Cooperation Mechanisms\u003c/h2\u003e\n\n\u003cp\u003eThe article places the reserve access within a broader pattern of EU-Ukraine cybersecurity cooperation. It mentions bilateral security agreements and international initiatives such as the Tallinn Mechanism. These efforts are presented as part of the EU\u0026rsquo;s growing role as a cybersecurity partner for Ukraine during the war with Russia.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eUkraine\u0026rsquo;s access to the EU Cybersecurity Reserve gives it a formal channel to request emergency cyber support from EU-approved experts during major cyberattacks. At the same time, the article presents the move as a step toward deeper integration with Europe\u0026rsquo;s collective cyber defense structures, with Ukraine also contributing experience and intelligence gained from years of responding to Russian cyber activity.\u003c/p\u003e\n","keyPoints":["Ukraine has been granted access to the European Union's Cybersecurity Reserve, allowing Kyiv to call on EU-approved experts during major cyberattacks.","The EU Cybersecurity Reserve is managed by ENISA and provides incident response, technical expertise, and recovery support to participating countries facing cyber incidents beyond their own capabilities.","Ukraine will be able to request European assistance for digital forensics, incident response, and system recovery if a cyberattack exceeds the capacity of its own teams.","Natalia Tkachuk said Ukraine already shares intelligence on Russian hacking techniques with European partners and participates in joint cybercrime investigations and attribution efforts.","Ukraine hopes its cybersecurity companies will eventually be able to join the Cyber Reserve as trusted service providers under the EU's Cyber Solidarity Act."],"insights":["Ukraine’s access to the EU Cybersecurity Reserve gives it a role in an EU collective defense mechanism before formal EU membership, making the move politically significant as well as operationally useful.","The reserve arrangement is expected to be reciprocal, with Ukraine contributing intelligence on Russian hacking techniques and experience from years of responding to large-scale cyber incidents.","Ukraine’s participation could eventually create a path for Ukrainian cybersecurity companies to become trusted service providers in the EU Cybersecurity Reserve under the Cyber Solidarity Act.","The EU’s earlier inclusion of Moldova shows the reserve is being extended beyond EU members to countries facing Moscow-linked cyberthreats and influence operations."],"referencedReports":[],"body":"\u003cp\u003eUkraine has been granted access to the European Union\u0026rsquo;s Cybersecurity Reserve, allowing Kyiv to call on EU-approved experts during major cyberattacks. The European Commission said EU member states approved Ukraine\u0026rsquo;s participation in the reserve, which is a pool of private cybersecurity companies that can be rapidly deployed to help governments and critical infrastructure operators. The reserve is managed by ENISA and is intended for cyber incidents that exceed a participating country\u0026rsquo;s own capabilities.\u003c/p\u003e\n\n\u003cp\u003eThe decision has both practical and political significance for Ukraine as it continues to face cyberattacks during the war with Russia. Natalia Tkachuk of Ukraine\u0026rsquo;s National Security and Defense Council said Ukraine is becoming part of the EU\u0026rsquo;s collective cyber defense mechanism before obtaining formal EU membership. The move comes as EU member states agreed to launch formal accession negotiations with Kyiv.\u003c/p\u003e\n\n\u003cp\u003eUkraine will be able to request emergency European assistance for digital forensics, incident response, and system recovery if its own teams are overwhelmed. The Cyber Reserve can also support post-incident recovery, system modernization, threat intelligence sharing, and improvements to national cyber incident response capabilities. Ukraine also expects the relationship to be reciprocal, with Ukrainian agencies sharing intelligence on Russian hacking techniques and participating in joint investigations with European partners.\u003c/p\u003e\n"},{"n":4,"title":"Warner warns of CISA cuts, staffing gaps in letter to acting chief","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/warner-warns-of-cisa-cuts-staffing-shortages","time":"10:30","priority":"MAY READ","score":66,"tldr":"Sen. Mark Warner warned CISA’s acting director that major staff cuts, leadership vacancies, regional staffing gaps and loss of MS-ISAC funding are undermining the agency’s ability to support state and local critical infrastructure cybersecurity. He is pressing DHS and CISA for staffing, service-delivery and hiring details while urging renewed funding for the MS-ISAC.","briefOverview":"\u003cp\u003eSen. Mark Warner sent CISA Acting Director Nick Andersen a letter expressing alarm over widespread cuts at the Cybersecurity and Infrastructure Security Agency. Warner cited short-staffed regional divisions, high turnover, leadership vacancies, and the disbanding of the MS-ISAC information sharing and analysis center that supports state and local critical infrastructure operators. The article says the administration has cut about one-third of CISA’s staff and proposed more than $700 million in fiscal year 2027 budget cuts.\u003c/p\u003e\n\n\u003cp\u003eWarner said governors, mayors, state chief information officers, school leaders, law enforcement, cybersecurity experts, and other stakeholders have raised concerns about CISA’s ability to function. Industry leaders and state and local officials told his office they have seen reduced responsiveness and support from CISA. Andersen recently said CISA is hiring more than 300 workers and emphasized the importance of maintaining a ready cyber defense agency for the nation.\u003c/p\u003e\n\n\u003cp\u003eWarner asked CISA for detailed organizational charts, vacancy explanations, regional service metrics, and information on how many new hires will go to regional roles. He also wrote to DHS Secretary Markwayne Mullin urging DHS to prioritize CISA and fund the MS-ISAC. In addition, he sent letters to all 50 governors warning of risks to critical infrastructure in their states from the agency’s restructuring.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSen. Mark Warner sent a letter to CISA Acting Director Nick Andersen warning that cuts, staffing gaps, and leadership vacancies are weakening the agency. The article says Warner expressed alarm over short-staffed regional divisions and the disbanding of the MS-ISAC, which supports state and local critical infrastructure operators. Warner also pointed to the loss of about one-third of CISA’s staff and more than $700 million in proposed fiscal year 2027 budget cuts.\u003c/p\u003e\n\n\u003cp\u003eWarner’s concerns extend beyond CISA headquarters to the agency’s regional structure. The article says five of CISA’s 10 regional directors are serving in an acting capacity, and a regional website includes the misspelled name of one acting director. Warner also cited high turnover and persistent vacancies in CISA’s headquarters leadership.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the MS-ISAC funding dispute as a central part of Warner’s response. Warner introduced the Guaranteeing Universal Access to Cybersecurity Act to fund the MS-ISAC after former DHS Secretary Kristi Noem stopped paying for the program and blocked federal grant funding from being used by state and local governments to participate. Warner also wrote to DHS Secretary Markwayne Mullin to say DHS must prioritize CISA and pay for the MS-ISAC.\u003c/p\u003e\n\n\u003cp\u003eWarner said governors, mayors, city and county executives, state chief information officers, school district leaders, education advocates, law enforcement, and cybersecurity experts have expressed grave concern about CISA’s ability to function. Industry leaders and state and local officials told his office they have experienced reduced responsiveness and support from CISA. Warner said staffing turbulence has disrupted CISA’s service delivery and operations.\u003c/p\u003e\n\n\u003cp\u003eCISA Acting Director Nick Andersen recently announced that the agency is hiring more than 300 additional workers, with some already having started. In a speech, Andersen said CISA would continue making significant investments and said a ready and available cyber defense agency is critical. A CISA spokesperson said the agency does not reply to congressional correspondence in the press and works directly with Congress to address questions.\u003c/p\u003e\n\n\u003cp\u003eWarner asked CISA to provide organizational charts for regional offices and headquarters as of January 20, 2025, October 1, 2025, and currently, including vacancies and explanations for why individuals left. He also requested regional data on CISA security services, including vulnerability scans, risk assessments, incident response, inbound service requests, completed requests, and average response time. Warner further asked how many of the soon-to-be-hired employees are earmarked for regional jobs and what experience they have.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSen. Mark Warner sent CISA Acting Director Nick Andersen a letter expressing alarm about widespread cuts at the Cybersecurity and Infrastructure Security Agency. The letter focused on short-staffed regional divisions, high turnover, persistent vacancies, and the disbanding of an information sharing and analysis center that supports state and local critical infrastructure operators.\u003c/p\u003e\n\n\u003cp\u003eThe article says the administration has cut about one-third of CISA’s staff, with many laid-off workers coming from the agency’s senior staff. Warner also pointed to a proposed cut of more than $700 million in CISA’s fiscal year 2027 budget, which his letter said demonstrates “a dangerous underestimation of the threats facing our nation.”\u003c/p\u003e\n\n\u003ch2 id=\"ms-isac-funding-dispute\"\u003eMS-ISAC funding dispute\u003c/h2\u003e\n\n\u003cp\u003eA major focus of Warner’s concern is the MS-ISAC, an information sharing and analysis center that supports state and local critical infrastructure operators. Last week, Warner introduced legislation called the Guaranteeing Universal Access to Cybersecurity Act, which would fund the MS-ISAC.\u003c/p\u003e\n\n\u003cp\u003eThe article says Warner introduced the legislation after former DHS Secretary Kristi Noem stopped paying for the program and blocked federal grant funding from being used by state and local governments to participate. Warner also wrote a letter to DHS Secretary Markwayne Mullin underscoring that DHS must prioritize CISA and pay for the MS-ISAC.\u003c/p\u003e\n\n\u003cp\u003eWarner additionally sent letters to all 50 governors outlining risks he believes critical infrastructure in their states face as a result of the carving up of the agency.\u003c/p\u003e\n\n\u003ch2 id=\"reported-impact-on-cisa-operations\"\u003eReported impact on CISA operations\u003c/h2\u003e\n\n\u003cp\u003eWarner told Andersen that a wide range of stakeholders have expressed grave concern about CISA and its ability to function. Those stakeholders include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGovernors\u003c/li\u003e\n\u003cli\u003eMayors\u003c/li\u003e\n\u003cli\u003eCity and county executives\u003c/li\u003e\n\u003cli\u003eState chief information officers\u003c/li\u003e\n\u003cli\u003eSchool district leaders and education advocates\u003c/li\u003e\n\u003cli\u003eLaw enforcement\u003c/li\u003e\n\u003cli\u003eCybersecurity experts\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to Warner, industry leaders and state and local officials have told his office that they have seen reduced responsiveness and support from CISA. They also said staffing turbulence at CISA has disrupted the agency’s service delivery and operations.\u003c/p\u003e\n\n\u003ch2 id=\"leadership-and-staffing-gaps\"\u003eLeadership and staffing gaps\u003c/h2\u003e\n\n\u003cp\u003eThe article says five of CISA’s 10 regional directors are serving in an acting capacity. It also notes that a regional website includes the misspelled name of one acting director.\u003c/p\u003e\n\n\u003cp\u003eWarner also raised concerns about high turnover and persistent vacancies in CISA’s headquarters leadership. CISA has been without a permanent director since January 2025. Nominee Sean Plankey withdrew from consideration after senior senators blocked the vote for months.\u003c/p\u003e\n\n\u003cp\u003eNick Andersen took over as acting director in February and then faced a record-setting shutdown during which a large percentage of employees were furloughed. Officials have not commented on when they will select a nominee.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-s-response-and-hiring-plans\"\u003eCISA’s response and hiring plans\u003c/h2\u003e\n\n\u003cp\u003eAndersen recently announced that CISA is hiring more than 300 additional workers, with some already having started. In a speech last week, Andersen said CISA will “continue to make these significant investments as the secretary indicated to Congress just in these last couple of weeks.”\u003c/p\u003e\n\n\u003cp\u003eAndersen also said, “Making sure that we have a ready and available cyber defense agency for the nation is critical.”\u003c/p\u003e\n\n\u003cp\u003eA CISA spokesperson said the agency does not “reply to congressional correspondence in the press and works directly with Congress to address their questions.”\u003c/p\u003e\n\n\u003ch2 id=\"information-warner-requested-from-cisa\"\u003eInformation Warner requested from CISA\u003c/h2\u003e\n\n\u003cp\u003eWarner’s letter asked CISA to produce organizational charts for both regional offices and headquarters as they existed on:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eJanuary 20, 2025\u003c/li\u003e\n\u003cli\u003eOctober 1, 2025\u003c/li\u003e\n\u003cli\u003eThe current date\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHe asked that the charts include enumerated vacancies and explanations for why individuals left.\u003c/p\u003e\n\n\u003cp\u003eWarner also requested a regional breakdown of the “security serv
