<script type="application/json" id="dl-articles">[{"n":1,"title":"Cisco Catalyst SD-WAN Zero-Day CVE-2026-20245 Exploited to Gain Root Access","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cisco-catalyst-sd-wan-zero-day-cve-2026.html","time":"05:46","priority":"MUST READ","score":94,"tldr":"Mandiant says an unknown actor exploited Cisco Catalyst SD-WAN flaw CVE-2026-20245 as a zero-day to escalate from a compromised admin account to root access at a communications service provider. The attackers used stealthy anti-forensic steps, including restoring changed passwords and deleting evidence, highlighting the risk of zero-day exploitation on edge network devices.","briefOverview":"\u003cp\u003eMandiant reported that an unknown threat actor exploited CVE-2026-20245, a high-severity flaw in Cisco Catalyst SD-WAN, as a zero-day at least two months before it was publicly disclosed. The vulnerability allows an authenticated local attacker to execute arbitrary commands with elevated privileges by supplying a crafted file to an affected system. Cisco said successful exploitation requires netadmin privileges on the affected system.\u003c/p\u003e\n\n\u003cp\u003eThe incident targeted an unspecified communications service provider and was used to elevate a compromised admin account to full root-level access. Mandiant identified two distinct periods of unauthorized activity, one between late 2025 and January 2026 and another in March 2026, though it is unclear whether the same actor was responsible for both. The first wave likely involved unauthorized peering connections exploiting one of two then-undisclosed Cisco Catalyst SD-WAN controller flaws, CVE-2026-20127 or CVE-2026-20182.\u003c/p\u003e\n\n\u003cp\u003eIn March 2026, rogue peering connections targeted a device running a newer software version patched against CVE-2026-20127, and Cisco confirmed the activity did not leverage CVE-2026-20182. Mandiant said the attacker changed default admin credentials, exploited CVE-2026-20245 through a malicious CSV upload named evil_tenant.csv, and created a rogue user account called “troot” with full root-level shell control. The attacker also used anti-forensic techniques including deleting files, reversing configuration changes, restoring the original admin password, and running a validation script to confirm their indicators were gone.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Mandiant reported that an unknown threat actor exploited Cisco Catalyst SD-WAN vulnerability CVE-2026-20245 as a zero-day at least two months before public disclosure.","CVE-2026-20245 allows an authenticated local attacker with netadmin privileges to execute arbitrary commands with elevated privileges by supplying a crafted file to an affected system.","The incident targeted an unspecified communications service provider and involved elevating a compromised admin account to full root-level access.","Mandiant observed two distinct periods of unauthorized activity, one between late 2025 and January 2026 and another in March 2026, but it is unclear whether the two events are connected.","The attacker used anti-forensic techniques including deleting files, reversing configuration changes, restoring a changed admin password, and running a validation script to confirm indicators were gone."],"insights":["The attacker restored the default admin password after changing it and exfiltrating the SD-WAN fabric configuration, showing that normal-looking credentials could not be relied on as evidence that no intrusion occurred.","The March 2026 activity targeted a device already patched against CVE-2026-20127 and Cisco confirmed it did not use CVE-2026-20182, making stolen certificates from an earlier breach a possible initial access path according to the article.","Mandiant’s findings show that the same victim environment may have faced multiple zero-day-related unauthorized peering events before CVE-2026-20245 was used for root access.","Google highlighted that SD-WAN and similar edge devices are attractive targets because they often lack the telemetry needed for deep forensic analysis while providing visibility into internal traffic across the fabric."],"referencedReports":[{"title":"Zero-Day Exploitation of Cisco Catalyst SD-WAN Manager","url":"https://cloud.google.com/blog/topics/threat-intelligence/zero-day-exploitation-cisco-catalyst-sd-wan-manager","publisher":"Mandiant / Google Cloud","context":"The article cites Mandiant’s findings on zero-day exploitation of CVE-2026-20245 in Cisco Catalyst SD-WAN and quotes its researchers describing the attacker’s anti-forensic activity.","category":"","primary":false}],"body":"\u003cp\u003eMandiant reported that an unknown threat actor exploited CVE-2026-20245, a high-severity flaw in Cisco Catalyst SD-WAN, as a zero-day at least two months before it was publicly disclosed. The vulnerability allows an authenticated local attacker to execute arbitrary commands with elevated privileges by supplying a crafted file to an affected system. Cisco said successful exploitation requires netadmin privileges on the affected system.\u003c/p\u003e\n\n\u003cp\u003eThe incident targeted an unspecified communications service provider and was used to elevate a compromised admin account to full root-level access. Mandiant identified two distinct periods of unauthorized activity, one between late 2025 and January 2026 and another in March 2026, though it is unclear whether the same actor was responsible for both. The first wave likely involved unauthorized peering connections exploiting one of two then-undisclosed Cisco Catalyst SD-WAN controller flaws, CVE-2026-20127 or CVE-2026-20182.\u003c/p\u003e\n\n\u003cp\u003eIn March 2026, rogue peering connections targeted a device running a newer software version patched against CVE-2026-20127, and Cisco confirmed the activity did not leverage CVE-2026-20182. Mandiant said the attacker changed default admin credentials, exploited CVE-2026-20245 through a malicious CSV upload named evil_tenant.csv, and created a rogue user account called “troot” with full root-level shell control. The attacker also used anti-forensic techniques including deleting files, reversing configuration changes, restoring the original admin password, and running a validation script to confirm their indicators were gone.\u003c/p\u003e\n"},{"n":2,"title":"AI Turned The Patch Window Into The Threat Window","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/ai-turned-the-patch-window-into-the-threat-window","time":"05:02","priority":"MAY READ","score":58,"tldr":"AI is making vulnerability discovery and exploitation far faster than organizations can patch, turning the traditional patch window into an AI-speed threat window. The key takeaway is to stop relying on patching alone and prioritize data-centric controls, zero trust access, and visibility into AI apps and agents to limit what attackers can reach before fixes land.","briefOverview":"\u003cp\u003eThe article argues that AI has turned the traditional patch window into an AI-speed threat window. It begins with Anthropic’s Project Glasswing, which reportedly surfaced 10,000 high- or critical-severity vulnerabilities across critical enterprise software in a single month, while one partner organization found 2,000 bugs in its own systems over thirty days. The author says this kind of progress can overwhelm defenders because the median time to remediate a high-severity vulnerability is two weeks, and open-source maintainers have already asked Anthropic to slow disclosures because they cannot absorb the volume.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central argument is that organizations should not focus only on patching faster, because the attack surface is too large and the throughput will not catch up. Instead, the author says organizations should control what can be reached while waiting for patches to land, using existing zero trust, ZTNA, and SASE investments as part of a data-centered approach. The article emphasizes that vulnerabilities matter because they can let bad actors access, view, change, lock, or steal infrastructure or data.\u003c/p\u003e\n\n\u003cp\u003eThe article also says AI applications and agents create new risks because many organizations lack visibility and control over them. It cites Netskope’s AI Risk and Readiness Report, saying 98% of organizations report unmanaged AI use, only 12% can detect all shadow AI activity, and 91% cannot reliably stop a risky AI-driven action before it executes. As a concrete example, it cites CVE-2025-32711, a zero-click prompt injection in Microsoft 365 Copilot that used a crafted email to extract data from OneDrive, SharePoint, and Teams and exfiltrate it through a trusted Microsoft domain.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Anthropic’s Project Glasswing reportedly surfaced 10,000 high- or critical-severity vulnerabilities across critical enterprise software in a single month.","The article says the median time to remediate a high-severity vulnerability is two weeks, while AI can reduce work such as mapping an environment, chaining attack paths, and developing an exploit from weeks to minutes.","The author argues that organizations should not focus only on patching faster, but should control what can be reached while waiting for patches to land.","The article states that 98% of organizations report unmanaged AI use, only 12% can detect all shadow AI activity, and 91% cannot reliably stop a risky AI-driven action before it executes.","The article cites CVE-2025-32711 as a zero-click prompt injection in Microsoft 365 Copilot that used a crafted email to extract data from OneDrive, SharePoint, and Teams and exfiltrate it through a trusted Microsoft domain."],"insights":["The article frames AI-driven vulnerability discovery as an operational capacity problem, because even valid findings can become harmful if defenders and maintainers cannot absorb the volume.","The author argues that existing zero trust, ZTNA, and SASE investments remain useful, but they must be extended from access control toward protecting data inside sessions and workflows.","The Microsoft 365 Copilot example shows that trusted domains and normal content-handling workflows can become exfiltration paths when AI systems process malicious natural-language instructions.","The article highlights authority drift as a quiet risk because permissions can expand through inheritance, integrations, and convenience without a single approval or alert marking the change.","A central actionable shift in the article is to prioritize limiting reachable data and services during the patch delay, rather than treating faster patching as the main answer to AI-speed exploitation."],"referencedReports":[{"title":"Project Glasswing","url":"https://www.anthropic.com/news/project-glasswing","publisher":"Anthropic","context":"The article cites Anthropic’s Project Glasswing as having surfaced 10,000 high- or critical-severity vulnerabilities across critical enterprise software in a single month.","category":"","primary":false},{"title":"AI Risk and Readiness Report","url":"https://www.netskope.com/resources/reports-guides/ai-risk-and-readiness-report","publisher":"Netskope","context":"The article references Netskope’s report for statistics on unmanaged AI use, shadow AI detection, and organizations’ inability to stop risky AI-driven actions before execution.","category":"","primary":false}],"body":"\u003cp\u003eThe article argues that AI has turned the traditional patch window into an AI-speed threat window. It begins with Anthropic’s Project Glasswing, which reportedly surfaced 10,000 high- or critical-severity vulnerabilities across critical enterprise software in a single month, while one partner organization found 2,000 bugs in its own systems over thirty days. The author says this kind of progress can overwhelm defenders because the median time to remediate a high-severity vulnerability is two weeks, and open-source maintainers have already asked Anthropic to slow disclosures because they cannot absorb the volume.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central argument is that organizations should not focus only on patching faster, because the attack surface is too large and the throughput will not catch up. Instead, the author says organizations should control what can be reached while waiting for patches to land, using existing zero trust, ZTNA, and SASE investments as part of a data-centered approach. The article emphasizes that vulnerabilities matter because they can let bad actors access, view, change, lock, or steal infrastructure or data.\u003c/p\u003e\n\n\u003cp\u003eThe article also says AI applications and agents create new risks because many organizations lack visibility and control over them. It cites Netskope’s AI Risk and Readiness Report, saying 98% of organizations report unmanaged AI use, only 12% can detect all shadow AI activity, and 91% cannot reliably stop a risky AI-driven action before it executes. As a concrete example, it cites CVE-2025-32711, a zero-click prompt injection in Microsoft 365 Copilot that used a crafted email to extract data from OneDrive, SharePoint, and Teams and exfiltrate it through a trusted Microsoft domain.\u003c/p\u003e\n"},{"n":3,"title":"The Parable of the Bullet Holes: AI Security Edition","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/the-parable-of-the-bullet-holes-ai-security-edition","time":"05:19","priority":"MAY READ","score":45,"tldr":"The article argues that AI security teams risk survivorship bias by focusing only on issues visible in sanctioned enterprise LLMs while missing bigger risks from public LLM use, shadow AI, and unmonitored SaaS AI. Organizations should prioritize finding and controlling these unseen AI data exposure paths.","briefOverview":"\u003cp\u003eThe article uses the World War II story of Abraham Wald and bomber bullet holes to explain survivorship bias in AI security. Returning planes showed damage on wings, fuselage, and tail, but Wald argued that the undamaged-looking areas in the data, such as engines, cockpit, and fuel tanks, were the places where hits were catastrophic. The article applies this lesson to enterprise Large Language Model security, warning that visible problems in monitored systems may not show the most serious risks.\u003c/p\u003e\n\n\u003cp\u003eThe article says organizations often protect enterprise LLMs with PII filters, data governance policies, and monitoring systems that log violations. Audits may reveal only minor policy infractions or sanitized PII, leading teams to patch those visible issues and conclude the system is secure. It argues this can be misleading because the audit only reflects what happens inside sanctioned and monitored systems.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies unmonitored risks such as employees pasting customer PII into public LLMs and development teams creating unapproved cloud LLM instances using proprietary source code for fine-tuning. These failures may occur outside enterprise logging and therefore never appear in an internal audit. The article concludes that organizations should look for unmonitored services, embedded AI in SaaS, shadow AI, and personal public LLM accounts rather than focusing only on visible issues in approved systems.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article uses Abraham Wald’s World War II analysis of bomber bullet holes as an analogy for survivorship bias in AI security.","Organizations may focus on minor policy violations and sanitized PII found in monitored enterprise LLM systems while concluding that their systems are secure.","The article identifies public LLM use by employees and unapproved cloud LLM instances created by development teams as unmonitored AI risks.","Sensitive customer PII and proprietary source code can be exposed outside enterprise monitoring systems, leaving major failures invisible to audits.","The article argues that AI security efforts should focus on finding unmonitored services, embedded AI in SaaS, shadow AI, and personal public LLM accounts."],"insights":["A clean enterprise LLM audit can be misleading because it may only reflect activity inside sanctioned systems, not whether sensitive data has been exposed elsewhere.","Minor logged violations can create a false sense of progress if security teams treat them as the main risk instead of evidence that monitoring only covers survivable failures.","The article frames public LLM accounts, shadow AI, and embedded SaaS AI as the AI-security equivalent of bomber engines and cockpits: areas where failures are most damaging precisely because they may leave no internal record.","The most actionable shift proposed is to spend security effort discovering unmonitored AI use, rather than only strengthening controls around already-approved tools."],"referencedReports":[],"body":"\u003cp\u003eThe article uses the World War II story of Abraham Wald and bomber bullet holes to explain survivorship bias in AI security. Returning planes showed damage on wings, fuselage, and tail, but Wald argued that the undamaged-looking areas in the data, such as engines, cockpit, and fuel tanks, were the places where hits were catastrophic. The article applies this lesson to enterprise Large Language Model security, warning that visible problems in monitored systems may not show the most serious risks.\u003c/p\u003e\n\n\u003cp\u003eThe article says organizations often protect enterprise LLMs with PII filters, data governance policies, and monitoring systems that log violations. Audits may reveal only minor policy infractions or sanitized PII, leading teams to patch those visible issues and conclude the system is secure. It argues this can be misleading because the audit only reflects what happens inside sanctioned and monitored systems.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies unmonitored risks such as employees pasting customer PII into public LLMs and development teams creating unapproved cloud LLM instances using proprietary source code for fine-tuning. These failures may occur outside enterprise logging and therefore never appear in an internal audit. The article concludes that organizations should look for unmonitored services, embedded AI in SaaS, shadow AI, and personal public LLM accounts rather than focusing only on visible issues in approved systems.\u003c/p\u003e\n"}]</script>
