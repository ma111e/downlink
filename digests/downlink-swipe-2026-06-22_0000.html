 without the user\u0026rsquo;s knowledge, turning a manual technique into a highly stealthy operation.\u003c/p\u003e\n\n\u003cp\u003eTo detect such activity, organizations should query interactive sign-in logs for successful authentications (errorCode 0) from devices marked as not managed, not compliant, and not trusted when the client ID matches the Intune Portal and the resource is Microsoft Graph. Mitigations include auditing non-compliant logins, minimizing Graph API permissions to least privilege, and continuously monitoring for anomalies. While Microsoft later addressed the issue by descoping the Graph permission from the Intune Company Portal app, the underlying redirect technique remains viable for any client ID with broad scopes, emphasizing that Conditional Access Policies alone are insufficient and must be supplemented with active monitoring and a zero-trust approach.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The Conditional Access Policy bypass uses the Intune Company Portal client ID (9ba1a5c7-f17a-4de9-a1f1-6178c8d51223) in an OAuth2 authorization request to obtain a code, which is then exchanged for a Microsoft Graph access token from a non-compliant, unmanaged device.","A malicious browser extension can automate this attack by silently intercepting the OAuth2 flow, capturing the authorization code and access tokens, and exfiltrating them to an attacker-controlled server in a Browser-in-the-Middle (BiTM) scenario.","To detect this activity, analysts can hunt for interactive sign-in logs where device details show IsManaged: False, IsCompliant: False, IsTrusted: False, errorCode is 0, the client ID matches the Intune portal, and the resource is Microsoft Graph or Microsoft AD Graph.","Mitigations include requiring MFA for all users, auditing non-compliant device authentications, minimizing Microsoft Graph API permissions to least privilege, and continuously monitoring Graph activity logs for anomalies.","Microsoft later addressed the vulnerability by fully descoping the resource permission that had allowed unauthorized access to Microsoft Graph from the Intune Company Portal application."],"insights":["The bypass captures the authorization code from the browser console error that appears when the native-app redirect URI (ms-appx-web://) cannot be launched, turning a failed redirect into a token-theft opportunity.","A malicious browser extension can intercept OAuth tokens by monitoring network responses to the /appverify endpoint, not just the well-known /token endpoint, revealing an additional interception point in the login flow.","Microsoft's fix addressed the vulnerability not by changing the OAuth redirect behavior but by descoping the Microsoft Graph permission from the Intune Company Portal application, meaning the underlying redirect technique remains usable for any client ID with broad scopes.","Despite the bypass granting access, sign-in logs continue to accurately report the device as non-managed and non-compliant, making device-detail queries in interactive sign-in logs a reliable detection method rather than relying only on policy enforcement status."],"referencedReports":[],"body":"\u003cp\u003eA technique exists to bypass Microsoft Entra Conditional Access Policies using the Intune Company Portal application\u0026rsquo;s client ID (9ba1a5c7-f17a-4de9-a1f1-6178c8d51223). By initiating an OAuth2 authorization request with this ID and a specific redirect URI (ms-appx-web://), an attacker who phishes a user\u0026rsquo;s credentials can capture the authorization code from the browser console error that appears when the native app redirect fails. This code is then exchanged for a valid access token to Microsoft Graph, granting the attacker the user\u0026rsquo;s Graph API permissions even from a non-compliant, unmanaged, and untrusted device. The attack was disclosed at Black Hat EU 2024 and later reproduced by JUMPSEC labs with a tool called TokenSmith.\u003c/p\u003e\n\n\u003cp\u003eThe article demonstrates how this bypass can be paired with a malicious browser extension to perform a seamless Browser-in-the-Middle (BiTM) attack. The extension silently monitors network traffic during the OAuth2 flow, specifically targeting responses from the /appverify endpoint to intercept the authorization code or tokens and exfiltrate them to an attacker-controlled server. This automates the entire credential and token theft process without the user\u0026rsquo;s knowledge, turning a manual technique into a highly stealthy operation.\u003c/p\u003e\n\n\u003cp\u003eTo detect such activity, organizations should query interactive sign-in logs for successful authentications (errorCode 0) from devices marked as not managed, not compliant, and not trusted when the client ID matches the Intune Portal and the resource is Microsoft Graph. Mitigations include auditing non-compliant logins, minimizing Graph API permissions to least privilege, and continuously monitoring for anomalies. While Microsoft later addressed the issue by descoping the Graph permission from the Intune Company Portal app, the underlying redirect technique remains viable for any client ID with broad scopes, emphasizing that Conditional Access Policies alone are insufficient and must be supplemented with active monitoring and a zero-trust approach.\u003c/p\u003e\n"},{"n":2,"title":"A Glimpse into the “Search Your Target” Market for Stolen Credentials","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/a-glimpse-into-the-search-your-target-market-for-stolen-credentials/","time":"14:05","priority":"MAY READ","score":58,"tldr":"A 'search your target' underground market has emerged where threat actors offer query-based credential extraction from billions of infostealer-collected records, enabling targeted account takeover without the need to process bulk dumps manually.","briefOverview":"\u003cp\u003eA new underground market has emerged where threat actors monetize massive collections of infostealer-derived credentials by offering targeted search and extraction services. Flare researchers analyzed 470 forum posts published between January 2025 and June 2026, revealing a service layer that sits between the initial credential theft and account takeover. Buyers can request credentials for a specific company, domain, platform, geography, or account type, and sellers return only the matching results from databases containing billions of lines.\u003c/p\u003e\n\n\u003cp\u003eSellers advertise the size of their databases—some claiming over five or ten billion lines—alongside capabilities like quick turnaround, daily updates, and custom formatting such as URL:LOGIN:PASS or MAIL:PASS. Some even offer enrichment by combining separate collections of emails, passwords, and logins to build targeted lists. Pricing is often a flat fee per request, with additional payments based on the volume of results returned.\u003c/p\u003e\n\n\u003cp\u003eDespite the polished sales pitches, buyer feedback indicates a gap between promises and reality: delivered credentials are frequently invalid, duplicated, or far fewer than expected. The market partially overlaps with the Initial Access Broker ecosystem but differs in that it does not guarantee validity or freshness; IABs typically offer validated, often MFA-bypassing access at higher prices. For defenders, this service lowers the barrier for attackers to find actionable entry points, making continuous monitoring of exposed corporate credentials and login portals essential.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Analysis of 470 underground forum posts published between January 2025 and June 2026 reveals a service that searches threat actors' infostealer databases for credentials matching a specific target.","Sellers advertise databases with billions of lines and offer filtering by domain, URL, geography, or email, delivering results in formats such as URL:LOGIN:PASS.","Customer feedback shows a gap between advertised promises and reality, with many delivered credentials being invalid, duplicated, or lower in volume.","This service functions as a processing layer that converts bulk stolen credential collections into targeted attack material, enabling account takeover without manually sifting through massive dumps."],"insights":["The 'search your target' market represents a specialized processing layer between credential theft and account takeover, where sellers act as data processors who monetize their ability to filter and format stolen logs rather than selling the logs themselves.","Threat actors are applying legitimate data management practices such as labeling, slicing, and indexing to stolen credential databases, mirroring how ordinary businesses handle big data.","The service partially overlaps with the Initial Access Broker market but is distinct in that it does not guarantee validity or freshness, while IABs offer a more expensive 'white glove service' with validated and often MFA-bypassing access.","The analyzed dataset spans forum posts from January 2025 to June 2026, indicating this research covers activity that projects into the future and highlights an emerging market trend still in maturation."],"referencedReports":[],"body":"\u003cp\u003eA new underground market has emerged where threat actors monetize massive collections of infostealer-derived credentials by offering targeted search and extraction services. Flare researchers analyzed 470 forum posts published between January 2025 and June 2026, revealing a service layer that sits between the initial credential theft and account takeover. Buyers can request credentials for a specific company, domain, platform, geography, or account type, and sellers return only the matching results from databases containing billions of lines.\u003c/p\u003e\n\n\u003cp\u003eSellers advertise the size of their databases—some claiming over five or ten billion lines—alongside capabilities like quick turnaround, daily updates, and custom formatting such as URL:LOGIN:PASS or MAIL:PASS. Some even offer enrichment by combining separate collections of emails, passwords, and logins to build targeted lists. Pricing is often a flat fee per request, with additional payments based on the volume of results returned.\u003c/p\u003e\n\n\u003cp\u003eDespite the polished sales pitches, buyer feedback indicates a gap between promises and reality: delivered credentials are frequently invalid, duplicated, or far fewer than expected. The market partially overlaps with the Initial Access Broker ecosystem but differs in that it does not guarantee validity or freshness; IABs typically offer validated, often MFA-bypassing access at higher prices. For defenders, this service lowers the barrier for attackers to find actionable entry points, making continuous monitoring of exposed corporate credentials and login portals essential.\u003c/p\u003e\n"},{"n":21,"title":"SpecterOps and OpenAI: Helping to Build a New Security Frontier with Daybreak","source":"specterops.io","sourceColorIdx":1,"link":"https://specterops.io/blog/2026/06/22/specterops-openai-daybreak-ai-cyber-innovation/","time":"17:09","priority":"MAY READ","score":55,"tldr":"SpecterOps announced a partnership with OpenAI's Daybreak program to integrate frontier AI into BloodHound for attack path prioritization and environment analysis, aiming to help defenders triage millions of attack paths and uncover configuration debt.","briefOverview":"\u003cp\u003eOpenAI announced the Daybreak Cyber Partner Program, expanding frontier AI cybersecurity capabilities to a trusted circle of industry partners including SpecterOps. SpecterOps has been participating in the OpenAI Trusted Access for Cyber (TAC) program since April, gaining access to advanced cyber-capable models for legitimate security use cases. Through Daybreak, the two organizations will work together to bring the most advanced AI capabilities to customers, grounding the approach in years of adversary tradecraft and threat research.\u003c/p\u003e\n\n\u003cp\u003eA central focus is improving attack path triage within SpecterOps\u0026rsquo; BloodHound platform. Modern enterprise environments can surface billions of attack paths, making it impossible for human analysts to identify which paths matter most. SpecterOps is building AI integrations that reason from attacker logic rather than just graph topology, enabling prioritized remediation guidance that accounts for the specific environmental conditions an adversary would exploit.\u003c/p\u003e\n\n\u003cp\u003eAnother area of exploration is automated discovery of configuration debt. Many organizations cannot accurately characterize their own identity environments due to years of undocumented changes, resulting in structural blind spots. SpecterOps aims to use AI to surface correlated systems, identity groupings, and permission concentrations so defenders work from an accurate picture rather than assumptions. The company\u0026rsquo;s GhostWorks AI lab is also applying OpenAI capabilities to automate reverse engineering of attacker tooling, while SpecterOps collaborates on safety and abuse prevention standards for embedded AI in security contexts.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["OpenAI announced the Daybreak Cyber Partner Program to expand frontier AI cybersecurity capabilities to industry partners, including SpecterOps.","SpecterOps is integrating AI into BloodHound to enable prioritized remediation guidance based on attacker intent, not just attack path topology.","Many organizations suffer from configuration debt that prevents them from accurately understanding their own identity environments, a problem SpecterOps aims to address with automated analysis.","GhostWorks, SpecterOps's AI cyber innovation lab, is applying OpenAI's capabilities to automate reverse engineering of attacker tooling and improve endpoint coverage."],"insights":["Attack path prioritization based solely on graph topology produces different results than prioritization based on how attackers actually reason, because adversaries choose paths that work under specific environmental conditions rather than the shortest route to a target.","Many organizations have accumulated so much configuration debt over time that they cannot accurately map their own identity environments, leaving security teams to work from assumptions rather than reality.","Critical security questions about how PCI-compliant enclaves are distributed often go unasked because the analysis required exceeds what human review can sustain at scale.","Embedding AI into security tooling introduces meaningful risk if access controls, output scoping, and monitoring are not designed correctly from the start, making safety standards a necessary part of the capability research."],"referencedReports":[],"body":"\u003cp\u003eOpenAI announced the Daybreak Cyber Partner Program, expanding frontier AI cybersecurity capabilities to a trusted circle of industry partners including SpecterOps. SpecterOps has been participating in the OpenAI Trusted Access for Cyber (TAC) program since April, gaining access to advanced cyber-capable models for legitimate security use cases. Through Daybreak, the two organizations will work together to bring the most advanced AI capabilities to customers, grounding the approach in years of adversary tradecraft and threat research.\u003c/p\u003e\n\n\u003cp\u003eA central focus is improving attack path triage within SpecterOps\u0026rsquo; BloodHound platform. Modern enterprise environments can surface billions of attack paths, making it impossible for human analysts to identify which paths matter most. SpecterOps is building AI integrations that reason from attacker logic rather than just graph topology, enabling prioritized remediation guidance that accounts for the specific environmental conditions an adversary would exploit.\u003c/p\u003e\n\n\u003cp\u003eAnother area of exploration is automated discovery of configuration debt. Many organizations cannot accurately characterize their own identity environments due to years of undocumented changes, resulting in structural blind spots. SpecterOps aims to use AI to surface correlated systems, identity groupings, and permission concentrations so defenders work from an accurate picture rather than assumptions. The company\u0026rsquo;s GhostWorks AI lab is also applying OpenAI capabilities to automate reverse engineering of attacker tooling, while SpecterOps collaborates on safety and abuse prevention standards for embedded AI in security contexts.\u003c/p\u003e\n"},{"n":27,"title":"GCP Service Agents \u0026 Workload Identities in Cloud Audit Logs: A Forensic Guide","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/who-touched-my-gcp-project-understanding-the-principal-part-in-cloud-audit-logs-part-2","time":"16:35","priority":"MAY READ","score":55,"tldr":"This forensic guide explains how to identify and distinguish Service Agents, Workload Identity Federation, GKE Workload Identity, and Workforce Identity Federation in Google Cloud Audit Logs, enabling accurate attribution of actions during cloud incident investigations.","briefOverview":"\u003cp\u003eThis article is a forensic guide that explains how to identify several important Google Cloud identity types within Cloud Audit Logs—beyond regular service accounts. It covers Service Agents, which are Google-managed service accounts automatically created when a GCP API is enabled and appear in logs with delegation information in the \u003ccode\u003eserviceAccountDelegationInfo\u003c/code\u003e field. These agents act on behalf of services like Compute Engine and cannot be impersonated, but their role bindings are visible and auditable.\u003c/p\u003e\n\n\u003cp\u003eWorkload Identity Federation lets external workloads (from AWS, Azure, GitHub Actions) and GKE pods authenticate without static service account keys by exchanging external tokens for short-lived GCP access tokens. In audit logs, the original external identity is captured in the \u003ccode\u003eprincipalSubject\u003c/code\u003e field of \u003ccode\u003eserviceAccountDelegationInfo\u003c/code\u003e, providing forensic traces such as AWS ARNs with session IDs or GitHub repository paths. GKE workload identities are specifically identified by the \u003ccode\u003esvc.id.goog\u003c/code\u003e prefix, which includes the namespace and Kubernetes Service Account name, enabling precise identification even when account names are reused across namespaces.\u003c/p\u003e\n\n\u003cp\u003eWorkforce Identity Federation allows human users to sign in using external identity providers like Okta or Entra ID, and their federated identity appears in the \u003ccode\u003eauthenticationInfo.principalSubject\u003c/code\u003e field. The article emphasizes that distinguishing these identity patterns—whether a service agent, a federated workload, a Kubernetes pod, or a human user—is critical for accurate incident attribution, timeline reconstruction, and answering the central forensic question: who really touched the GCP project.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Service Agents are Google-managed service accounts automatically created when an associated Google API is enabled, and their actions are recorded in audit logs with delegation information in the serviceAccountDelegationInfo section.","Workload Identity Federation allows external workloads to obtain short-lived GCP access tokens without using service account keys, and the original external identity appears in the principalSubject field of the serviceAccountDelegationInfo.","GKE Workload Identity Federation binds Kubernetes Service Accounts to Google Service Accounts, and audit logs show the originating Kubernetes identity via a principalSubject containing the namespace and service account name prefixed with svc.id.goog.","Workforce Identity Federation enables human users to authenticate to GCP using an external identity provider, with their federated identity recorded in the authenticationInfo.principalSubject field for traceability.","Identifying these identity patterns in Cloud Audit Logs is critical for forensic investigations because it allows analysts to attribute actions to the correct source, whether a workload, CI pipeline, or specific namespace."],"insights":["The session ID provided in the AWS ARN within the principalSubject of serviceAccountDelegationInfo allows an investigator to trace a GCP action back to a specific, ephemeral AWS session, enabling precise cross-cloud attribution.","GKE Workload Identity logs namespace and service account name together because KSA names can be reused across namespaces; without the namespace, pinpointing the source workload would be impossible.","Workforce Identity Federation records the external user identity in the authenticationInfo field, while workload identities appear in serviceAccountDelegationInfo, giving a clear forensic distinction between human and programmatic access.","A Security Token Service token exchange event (methodName: google.identity.sts.v1.SecurityTokenService.ExchangeToken) is a definitive marker that Workload Identity Federation was used, even before any resource access occurs."],"referencedReports":[{"title":"GCP Service Agents 201","url":"https://kattraxler.cloud/gcp/iam/201/2024/06/02/gcp-service-agents-201.html","publisher":"Kat Traxler","context":"For an in-depth explanation of Service Agents, the article refers readers to this detailed blog post.","category":"","primary":false}],"body":"\u003cp\u003eThis article is a forensic guide that explains how to identify several important Google Cloud identity types within Cloud Audit Logs—beyond regular service accounts. It covers Service Agents, which are Google-managed service accounts automatically created when a GCP API is enabled and appear in logs with delegation information in the \u003ccode\u003eserviceAccountDelegationInfo\u003c/code\u003e field. These agents act on behalf of services like Compute Engine and cannot be impersonated, but their role bindings are visible and auditable.\u003c/p\u003e\n\n\u003cp\u003eWorkload Identity Federation lets external workloads (from AWS, Azure, GitHub Actions) and GKE pods authenticate without static service account keys by exchanging external tokens for short-lived GCP access tokens. In audit logs, the original external identity is captured in the \u003ccode\u003eprincipalSubject\u003c/code\u003e field of \u003ccode\u003eserviceAccountDelegationInfo\u003c/code\u003e, providing forensic traces such as AWS ARNs with session IDs or GitHub repository paths. GKE workload identities are specifically identified by the \u003ccode\u003esvc.id.goog\u003c/code\u003e prefix, which includes the namespace and Kubernetes Service Account name, enabling precise identification even when account names are reused across namespaces.\u003c/p\u003e\n\n\u003cp\u003eWorkforce Identity Federation allows human users to sign in using external identity providers like Okta or Entra ID, and their federated identity appears in the \u003ccode\u003eauthenticationInfo.principalSubject\u003c/code\u003e field. The article emphasizes that distinguishing these identity patterns—whether a service agent, a federated workload, a Kubernetes pod, or a human user—is critical for accurate incident attribution, timeline reconstruction, and answering the central forensic question: who really touched the GCP project.\u003c/p\u003e\n"},{"n":35,"title":"Investigator’s Guide to Okta Logs: System Log Fields for Incident Response","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/saas-incident-response-a-guide-for-investigators-part-one-okta-log-fields","time":"16:40","priority":"MAY READ","score":55,"tldr":"Okta system logs provide valuable session-tracking fields like externalSessionId and transaction.id for incident response, but analysts must treat the built-in risk and device-fingerprint fields with caution due to documented inaccuracies.","briefOverview":"\u003cp\u003eThis article from Mitiga is a practitioner\u0026rsquo;s guide to using Okta System Logs for incident response and threat hunting. It explains that Okta records system events to create an audit trail, but certain log fields present hidden inaccuracies that can mislead investigations. The authors provide a table of critical fields—such as actor identifiers, event types, session IDs, and geographical context—and highlight which are most valuable for tracking malicious activity.\u003c/p\u003e\n\n\u003cp\u003eTwo fields receive special caution: \u003ccode\u003edebugContext.debugData.risk\u003c/code\u003e can erroneously flag anomalous devices or locations due to detection bugs, while \u003ccode\u003edebugContext.debugData.deviceFingerprint\u003c/code\u003e lacks a consistent calculation method and often overlaps across different users, making it unreliable as a unique device marker. The article emphasizes that investigators should treat risk assessments skeptically and always combine device fingerprinting with other evidence.\u003c/p\u003e\n\n\u003cp\u003eThe guide details a robust session-tracking methodology using \u003ccode\u003eauthenticationContext.externalSessionId\u003c/code\u003e, \u003ccode\u003etransaction.id\u003c/code\u003e, \u003ccode\u003edebugContext.debugData.emailRequestId\u003c/code\u003e, and \u003ccode\u003edebugContext.debugData.authnRequestId\u003c/code\u003e. It notes that \u003ccode\u003etransaction.id\u003c/code\u003e and \u003ccode\u003eemailRequestId\u003c/code\u003e are always identical, while \u003ccode\u003eauthnRequestId\u003c/code\u003e may differ, so queries must cover all three. Pseudocode is provided to filter logs for known malicious identifiers, helping analysts isolate a threat actor\u0026rsquo;s activity. The authors commit to updating the reference as the SaaS landscape evolves.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The debugContext.debugData.risk field can be inaccurate due to errors in anomalous device detection and location detection.","The debugContext.debugData.deviceFingerprint field often shows significant overlap across users and cannot solely identify a specific device.","Investigators should track sessions by correlating on authenticationContext.externalSessionId, transaction.id, debugContext.debugData.emailRequestId, and debugContext.debugData.authnRequestId.","Combining deviceFingerprint with other indicators is recommended to accurately track malicious activity.","The article provides pseudocode for filtering Okta logs to isolate events from known malicious session or request IDs."],"insights":["Okta's risk assessment may contain a bug where an IP address is flagged as being from a new country even though the city associated with that IP is already known, potentially misleading analysts about anomalous location.","The deviceFingerprint field can be set differently by various tools and lacks a clear calculation method, making it unreliable as a unique device identifier across different users.","The dtHash field, while occasionally overlapping between accounts, is described as a strong signal for identifying session token theft when investigating a single compromised account.","The transaction.id and debugContext.debugData.emailRequestId values are always identical, allowing investigators to use either field interchangeably for event correlation.","The debugContext.debugData.authnRequestId may differ from transaction.id, so a thorough investigation must search all three request identifiers to capture the complete scope of malicious activity."],"referencedReports":[],"body":"\u003cp\u003eThis article from Mitiga is a practitioner\u0026rsquo;s guide to using Okta System Logs for incident response and threat hunting. It explains that Okta records system events to create an audit trail, but certain log fields present hidden inaccuracies that can mislead investigations. The authors provide a table of critical fields—such as actor identifiers, event types, session IDs, and geographical context—and highlight which are most valuable for tracking malicious activity.\u003c/p\u003e\n\n\u003cp\u003eTwo fields receive special caution: \u003ccode\u003edebugContext.debugData.risk\u003c/code\u003e can erroneously flag anomalous devices or locations due to detection bugs, while \u003ccode\u003edebugContext.debugData.deviceFingerprint\u003c/code\u003e lacks a consistent calculation method and often overlaps across different users, making it unreliable as a unique device marker. The article emphasizes that investigators should treat risk assessments skeptically and always combine device fingerprinting with other evidence.\u003c/p\u003e\n\n\u003cp\u003eThe guide details a robust session-tracking methodology using \u003ccode\u003eauthenticationContext.externalSessionId\u003c/code\u003e, \u003ccode\u003etransaction.id\u003c/code\u003e, \u003ccode\u003edebugContext.debugData.emailRequestId\u003c/code\u003e, and \u003ccode\u003edebugContext.debugData.authnRequestId\u003c/code\u003e. It notes that \u003ccode\u003etransaction.id\u003c/code\u003e and \u003ccode\u003eemailRequestId\u003c/code\u003e are always identical, while \u003ccode\u003eauthnRequestId\u003c/code\u003e may differ, so queries must cover all three. Pseudocode is provided to filter logs for known malicious identifiers, helping analysts isolate a threat actor\u0026rsquo;s activity. The authors commit to updating the reference as the SaaS landscape evolves.\u003c/p\u003e\n"},{"n":38,"title":"GitHub Security Logs: What They Reveal and What to Hunt For","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/now-you-see-me-github-logs","time":"16:49","priority":"MAY READ","score":52,"tldr":"GitHub must be treated as a security-critical system, not just a DevOps tool — security teams should export and monitor audit, token, and workflow logs to detect token abuse, unauthorized access changes, and malicious workflow modifications that attackers use for persistence and lateral movement.","briefOverview":"\u003cp\u003eModern organizations depend on GitHub not just for code storage but as a control plane for automation and a vault for long-lived credentials, making it a high-value target for attackers seeking persistence and lateral movement. GitHub\u0026rsquo;s security telemetry spans audit logs for access and permission changes, user security logs for authentication events, Actions workflow logs for automation activity, and app/OAuth event logs. These logs are crucial for spotting signs of compromise, but their value is undercut by behaviors that catch security teams off guard, such as missing source IPs on events from GitHub Apps and personal access tokens, ambiguous token ownership, and the rapid loss of access history when repositories are deleted.\u003c/p\u003e\n\n\u003cp\u003eDefenders should hunt for specific anomalies: MFA disablement or new SSH keys, changes to workflow files that often precede credential theft, sudden activity on dormant tokens, unusual access spikes to sensitive repositories, and unauthorized GitHub App installations. Internal-to-external forking is a subtle exfiltration channel easily buried in high event volumes, while Actions logs only surface metadata, not full runner-level execution. The article emphasizes that these gaps are not vulnerabilities but critical blind spots during incident response.\u003c/p\u003e\n\n\u003cp\u003eThe overarching message is that GitHub must be treated as a security-critical system on par with an identity provider, requiring continuous log export, retention, enrichment, and correlation with other security data. Without proactive monitoring of repositories, workflows, and credentials, small visibility gaps can balloon into major investigative blind spots that allow attackers to manipulate what gets deployed.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["GitHub is a security-critical system that combines intellectual property, automation control, and long-lived credentials, making it a target for attackers seeking persistence and access to production environments.","GitHub's telemetry includes audit, user security, actions workflow, and app/OAuth logs, but investigations are complicated by gaps like missing source IPs for some events and token ownership that is not always clear.","Effective threat hunting involves tracking MFA and credential changes, monitoring workflow file modifications, analyzing token usage patterns over time, and alerting on unauthorized GitHub App installations.","Repository deletions can erase access history if logs are not streamed, and internal-to-external forks are a subtle exfiltration path that often hides among high event volumes."],"insights":["Events generated by GitHub Apps, deploy keys, and personal access tokens often lack source IP addresses, making geolocation and velocity-based anomaly detection impractical for these high-privilege actions.","Personal access tokens created long ago can be reused without a clear link back to the original human owner unless the creation event was recorded and retained, complicating attribution during incidents.","Internal-to-external repository forks function as a quiet exfiltration channel that is easily overlooked in high-volume logs unless explicitly monitored.","Repository deletion immediately shrinks the investigative window by removing detailed access history from UI-visible logs, making real-time log streaming essential for preserving evidence."],"referencedReports":[],"body":"\u003cp\u003eModern organizations depend on GitHub not just for code storage but as a control plane for automation and a vault for long-lived credentials, making it a high-value target for attackers seeking persistence and lateral movement. GitHub\u0026rsquo;s security telemetry spans audit logs for access and permission changes, user security logs for authentication events, Actions workflow logs for automation activity, and app/OAuth event logs. These logs are crucial for spotting signs of compromise, but their value is undercut by behaviors that catch security teams off guard, such as missing source IPs on events from GitHub Apps and personal access tokens, ambiguous token ownership, and the rapid loss of access history when repositories are deleted.\u003c/p\u003e\n\n\u003cp\u003eDefenders should hunt for specific anomalies: MFA disablement or new SSH keys, changes to workflow files that often precede credential theft, sudden activity on dormant tokens, unusual access spikes to sensitive repositories, and unauthorized GitHub App installations. Internal-to-external forking is a subtle exfiltration channel easily buried in high event volumes, while Actions logs only surface metadata, not full runner-level execution. The article emphasizes that these gaps are not vulnerabilities but critical blind spots during incident response.\u003c/p\u003e\n\n\u003cp\u003eThe overarching message is that GitHub must be treated as a security-critical system on par with an identity provider, requiring continuous log export, retention, enrichment, and correlation with other security data. Without proactive monitoring of repositories, workflows, and credentials, small visibility gaps can balloon into major investigative blind spots that allow attackers to manipulate what gets deployed.\u003c/p\u003e\n"},{"n":22,"title":"Introducing Patch the Planet","source":"blog.trailofbits.com","sourceColorIdx":6,"link":"https://blog.trailofbits.com/2026/06/22/introducing-patch-the-planet/","time":"16:50","priority":"MAY READ","score":50,"tldr":"Trail of Bits launched Patch the Planet, using AI models like GPT-5.5-Cyber to discover and patch hundreds of vulnerabilities across critical open-source projects, shifting the security bottleneck from finding bugs to delivering maintainable fixes.","briefOverview":"\u003cp\u003eTrail of Bits launched the Patch the Planet initiative in partnership with OpenAI\u0026rsquo;s Daybreak, using the frontier model GPT-5.5-Cyber to audit critical open-source projects. In the first week, engineers paired with maintainers to produce 64 pull requests and 51 issues across 19 projects including cURL, pyca, Sigstore, and the Go project. The effort revealed hundreds of bugs, with 37 patches already merged, many more under coordinated disclosure, and over 30 projects now enrolled.\u003c/p\u003e\n\n\u003cp\u003eThe initiative shifts the security bottleneck from finding vulnerabilities to everything after discovery — triage, severity correction, patching, and hardening. Because AI can generate a flood of plausible bug reports, the real value comes from experts who confirm findings and contribute maintainable fixes, new tests, CI security scanning, and supply-chain tooling. A bot called Patchy tracks all activity and celebrates merged patches, and maintainers are advised to provide threat models and AGENTS.md files to reduce false positives.\u003c/p\u003e\n\n\u003cp\u003eTechnical highlights include GPT-5.5-Cyber building a full fuzzing lab in under a day, including a harness that injected OS backpressure to reach novel buggy states; a CVE variant analysis pipeline; and differential testing of cryptographic libraries that uncovered an AES-GCM issue in PyCA. At python.org, the team added zizmor CI scanning and tightened release pipeline validation. The aiohttp maintainers merged eight fixes within hours, demonstrating that when findings are properly triaged and paired with patches, maintenance velocity can increase dramatically.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Trail of Bits launched the Patch the Planet initiative using GPT-5.5-Cyber to find and fix bugs across 19 critical open-source projects, producing 64 pull requests and 51 issues in the first week.","The effort delivered patches, fuzzing harnesses, CI security scanning, and long-term improvements, with 37 patches already merged, rather than simply filing bug reports.","The article states that AI has made bug discovery easy, shifting the expensive part of security to triage, confirmation, patching, and coordination with maintainers who are overwhelmed by AI-generated reports.","Maintainers are advised to use project-specific threat models and documentation like AGENTS.md to help AI tools filter false positives and correctly assess severity, reducing noise.","Technical achievements include building a fuzzing lab in under a day and using differential testing of cryptographic libraries to uncover real vulnerabilities such as an AES-GCM issue in PyCA."],"insights":["AI can autonomously design creative fuzzing strategies—such as injecting operating system backpressure—that reach previously unexplored buggy states, compressing weeks of manual work into hours.","The most valuable contributions from AI-assisted security reviews are often not bug fixes themselves but long-term improvements like CI scanning, supply-chain hardening, and correctness fixes that raise the overall health of the project.","Maintainers can dramatically reduce false positives and misrated severities from AI-generated reports by providing a project-specific AGENTS.md file that directs the model to consult security documentation and threat models before filing findings.","Differential testing of multiple independent implementations of the same cryptographic standard against each other proved to be a high-signal technique, uncovering real vulnerabilities like an AES-GCM issue in PyCA."],"referencedReports":[],"body":"\u003cp\u003eTrail of Bits launched the Patch the Planet initiative in partnership with OpenAI\u0026rsquo;s Daybreak, using the frontier model GPT-5.5-Cyber to audit critical open-source projects. In the first week, engineers paired with maintainers to produce 64 pull requests and 51 issues across 19 projects including cURL, pyca, Sigstore, and the Go project. The effort revealed hundreds of bugs, with 37 patches already merged, many more under coordinated disclosure, and over 30 projects now enrolled.\u003c/p\u003e\n\n\u003cp\u003eThe initiative shifts the security bottleneck from finding vulnerabilities to everything after discovery — triage, severity correction, patching, and hardening. Because AI can generate a flood of plausible bug reports, the real value comes from experts who confirm findings and contribute maintainable fixes, new tests, CI security scanning, and supply-chain tooling. A bot called Patchy tracks all activity and celebrates merged patches, and maintainers are advised to provide threat models and AGENTS.md files to reduce false positives.\u003c/p\u003e\n\n\u003cp\u003eTechnical highlights include GPT-5.5-Cyber building a full fuzzing lab in under a day, including a harness that injected OS backpressure to reach novel buggy states; a CVE variant analysis pipeline; and differential testing of cryptographic libraries that uncovered an AES-GCM issue in PyCA. At python.org, the team added zizmor CI scanning and tightened release pipeline validation. The aiohttp maintainers merged eight fixes within hours, demonstrating that when findings are properly triaged and paired with patches, maintenance velocity can increase dramatically.\u003c/p\u003e\n"},{"n":37,"title":"Defining Blast Radius in Cloud Incidents: Problem Scoping Guide | Mitiga","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/defining-blast-radius-in-cloud-incidents","time":"20:24","priority":"MAY READ","score":50,"tldr":"In cloud-native environments, the blast radius of an incident is defined by identity trust relationships and service permissions rather than network boundaries, making automated, log-driven scoping essential to quickly contain breaches.","briefOverview":"\u003cp\u003eThe article defines problem scoping in cloud incident response as the process of determining exactly what systems and data an attacker has affected, and it explains why this step is the pivot point between a minor disruption and a catastrophic breach. In cloud-native environments, the blast radius is shaped primarily by identity trust relationships and service permissions rather than traditional network boundaries, and elastic, ephemeral resources mean that an investigation must reconstruct what existed during the incident window, not just what is currently running.\u003c/p\u003e\n\n\u003cp\u003eThe guide lays out a structured, iterative scoping approach: form an initial hypothesis about the incident type, entry point, suspected scope, and time window; map environment connectivity across network paths, identity chains, and service-to-service dependencies including Kubernetes and SaaS integrations; and then validate or expand scope by analyzing logs from sources like CloudTrail, VPC Flow Logs, and Kubernetes audit logs to distinguish what was demonstrably accessed from what was plausibly accessible and cannot be ruled out.\u003c/p\u003e\n\n\u003cp\u003eSpecial attention is given to Kubernetes, where scoping must account for namespaces, ServiceAccounts, mounted secrets, network policies, and the risk of container escape escalating a pod compromise to the node and cluster level. The article emphasizes common mistakes such as ignoring identity-based lateral movement, treating namespaces as security boundaries, and failing to define an explicit time window, and it urges organizations to invest in centralized logging, environment mapping, and pre-built scoping playbooks before an incident occurs.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The speed and accuracy of initial scoping determine whether a cloud incident is a minor disruption or a catastrophic breach.","Blast radius in cloud environments is shaped primarily by identity trust relationships and service permissions, not traditional network boundaries.","Because cloud resources are ephemeral, continuous forensic log retention is essential for scoping an attack timeline; without it, the ability to investigate disappears with the resources.","In Kubernetes, scoping requires visibility into container escapes, lateral pod-to-pod movement, and API server abuse, as a single compromised container can escalate to node-level and cluster-wide impact.","Ignoring identity-based lateral movement is a common scoping mistake, because a compromised role with assume-role permissions can cross account boundaries without touching network perimeters."],"insights":["A compromised identity that can assume a role (e.g., via sts:AssumeRole) can silently cross cloud account boundaries, making network diagrams alone insufficient for scoping blast radius.","Service-to-service dependencies such as Lambda writing to an SQS queue that feeds a downstream service extend the blast radius implicitly, beyond what IAM or network maps show.","Because cloud resources are ephemeral, scoping must reconstruct the environment as it existed during the incident window using resource history tools; without continuous forensic log retention, the investigation vanishes alongside the workloads.","In Kubernetes, a single container compromise can escalate to the entire node if the container was privileged or had a mounted Docker socket, and from there the kubelet credentials can pivot to the broader cluster.","Scoping should include everything that was plausibly accessible and cannot be ruled out, not just what was demonstrably accessed, to prevent underestimating the compromise."],"referencedReports":[],"body":"\u003cp\u003eThe article defines problem scoping in cloud incident response as the process of determining exactly what systems and data an attacker has affected, and it explains why this step is the pivot point between a minor disruption and a catastrophic breach. In cloud-native environments, the blast radius is shaped primarily by identity trust relationships and service permissions rather than traditional network boundaries, and elastic, ephemeral resources mean that an investigation must reconstruct what existed during the incident window, not just what is currently running.\u003c/p\u003e\n\n\u003cp\u003eThe guide lays out a structured, iterative scoping approach: form an initial hypothesis about the incident type, entry point, suspected scope, and time window; map environment connectivity across network paths, identity chains, and service-to-service dependencies including Kubernetes and SaaS integrations; and then validate or expand scope by analyzing logs from sources like CloudTrail, VPC Flow Logs, and Kubernetes audit logs to distinguish what was demonstrably accessed from what was plausibly accessible and cannot be ruled out.\u003c/p\u003e\n\n\u003cp\u003eSpecial attention is given to Kubernetes, where scoping must account for namespaces, ServiceAccounts, mounted secrets, network policies, and the risk of container escape escalating a pod compromise to the node and cluster level. The article emphasizes common mistakes such as ignoring identity-based lateral movement, treating namespaces as security boundaries, and failing to define an explicit time window, and it urges organizations to invest in centralized logging, environment mapping, and pre-built scoping playbooks before an incident occurs.\u003c/p\u003e\n"},{"n":9,"title":"Stop Your Legacy Infrastructure from Hijacking Your AI Agents","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/stop-your-legacy-infrastructure-from.html","time":"11:58","priority":"MAY READ","score":45,"tldr":"Attackers can hijack AI agents by chaining legacy infrastructure exposures—like unpatched servers and Active Directory misconfigurations—to reach the cloud resources agents depend on, without ever directly attacking the AI layer.","briefOverview":"\u003cp\u003eAI adoption is accelerating, with 71% of organizations piloting AI agents and 31% already in production, but security programs are overlooking the legacy infrastructure these agents depend on. While teams focus on AI-specific threats like prompt injection and data leakage, attackers can bypass these defenses entirely by targeting the underlying servers, identities, and cloud resources that agents inherit.\u003c/p\u003e\n\n\u003cp\u003eA real-world attack path demonstrates this: an unpatched Apache Tomcat server exposed to CVE-2025-24813 allowed credential dumping, which combined with a Resource-Based Constrained Delegation misconfiguration in Active Directory to reach a developer\u0026rsquo;s workstation and harvest AWS access keys. Those keys then provided direct access to an S3 bucket feeding a customer success Co-Pilot, compromising the AI agent without ever attacking the AI layer itself. Three individually moderate findings chained into a critical breach.\u003c/p\u003e\n\n\u003cp\u003eThe solution lies in mapping AI agent dependencies—knowledge bases, storage buckets, Lambda functions—as critical assets and tracing all identity relationships and infrastructure exposures that connect to them. With 70% of organizations granting AI systems more privileged access than humans and a 76% incident rate for over-privileged AI, fixing the legacy security debt before deploying agents is essential to prevent attackers from using the old to exploit the new.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Attackers can compromise AI agents by chaining vulnerabilities in legacy infrastructure such as unpatched servers and Active Directory misconfigurations to reach the cloud resources those agents depend on.","A specific attack path demonstrated using CVE-2025-24813 on an unpatched Apache Tomcat server, followed by credential dumping and lateral movement through Active Directory, ultimately allowed access to an S3 bucket feeding an AI Co-Pilot agent.","70% of organizations grant their AI systems more privileged access than a human in the same role, and those with over-privileged AI report a 76% incident rate versus only 17% for those enforcing least privilege.","Each new AI agent deployed connects to existing, already-exposed infrastructure, compounding the overall attack surface."],"insights":["The security risk is not the AI agent itself but the pre-existing, unaddressed security debt in the infrastructure it inherits, meaning organizations cannot secure AI without first securing their legacy systems.","Individual moderate-severity findings—an overprivileged cloud key, an unpatched server, and an AD misconfiguration—are often deprioritized in isolation but can chain together into a single critical attack path that compromises AI agents.","A significant disconnect exists between AI adoption speed and infrastructure readiness: the legacy systems and permissions AI agents rely on were provisioned long before the AI deployment and were never designed with AI security considerations in mind."],"referencedReports":[{"title":"CVE-2025-24813 Detail","url":"https://nvd.nist.gov/vuln/detail/CVE-2025-24813","publisher":"NIST","context":"The article links to the NVD entry for CVE-2025-24813 as the remote code execution vulnerability exploited on an unpatched Apache Tomcat server in the attack path example.","category":"","primary":false}],"body":"\u003cp\u003eAI adoption is accelerating, with 71% of organizations piloting AI agents and 31% already in production, but security programs are overlooking the legacy infrastructure these agents depend on. While teams focus on AI-specific threats like prompt injection and data leakage, attackers can bypass these defenses entirely by targeting the underlying servers, identities, and cloud resources that agents inherit.\u003c/p\u003e\n\n\u003cp\u003eA real-world attack path demonstrates this: an unpatched Apache Tomcat server exposed to CVE-2025-24813 allowed credential dumping, which combined with a Resource-Based Constrained Delegation misconfiguration in Active Directory to reach a developer\u0026rsquo;s workstation and harvest AWS access keys. Those keys then provided direct access to an S3 bucket feeding a customer success Co-Pilot, compromising the AI agent without ever attacking the AI layer itself. Three individually moderate findings chained into a critical breach.\u003c/p\u003e\n\n\u003cp\u003eThe solution lies in mapping AI agent dependencies—knowledge bases, storage buckets, Lambda functions—as critical assets and tracing all identity relationships and infrastructure exposures that connect to them. With 70% of organizations granting AI systems more privileged access than humans and a 76% incident rate for over-privileged AI, fixing the legacy security debt before deploying agents is essential to prevent attackers from using the old to exploit the new.\u003c/p\u003e\n"},{"n":14,"title":"⚡ Weekly Recap: Browser Bugs, EDR Killers, TV Botnet, OpenBSD Flaw, Android Trojan, and More","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/weekly-recap-browser-bugs-edr-killers.html","time":"10:55","priority":"MAY READ","score":40,"tldr":"This week's threats highlight a recurring theme: attackers don't need sophisticated zero-days when weak credentials, stale integrations, overly permissive browser extensions, and unpatched WordPress sites continue to provide easy, effective access.","briefOverview":"\u003cp\u003eThis week\u0026rsquo;s cybersecurity threats illustrate that attackers predominantly rely on simple, low-cost methods—weak credentials, overly permissive browser extensions, stolen integrations, and compromised WordPress sites—rather than novel zero‑days. The most extensive campaign, FortiBleed, systematically targeted over 80,000 Fortinet FortiGate devices worldwide using reused credentials and brute-force attacks, with suspected Russian‑speaking actors, prompting CISA to issue an urgent warning. Meanwhile, The Gentlemen ransomware‑as‑a‑service operation actively maintains GentleKiller, an in‑house EDR killer suite that terminates processes across 48 security products before deploying ransomware, highlighting the ongoing arms race between security tools and adversaries.\u003c/p\u003e\n\n\u003cp\u003eMobile and hardware threats were equally prominent. The new Rokarolla Android trojan masquerades as popular apps to target 217 banking and cryptocurrency applications, employing 137 commands to gain full device control, harvest credentials, monitor screens, and block remediation actions, while evading Android\u0026rsquo;s restrictions by impersonating Google Play Protect during installation. A 27‑year‑old authentication bypass in OpenBSD\u0026rsquo;s PPP stack—exploitable by sending zero‑length credentials to skip Password Authentication Protocol—was disclosed and patched. Additionally, the Popa botnet, which turned millions of Android TV boxes into residential proxy nodes for ad fraud and web scraping, was linked to publicly traded Israeli company Alarum Technologies, which embeds an SDK that transforms consumer devices into traffic exit nodes.\u003c/p\u003e\n\n\u003cp\u003eSupply chain compromises and plugin vulnerabilities continue to broaden attack surfaces. The Okendo Reviews widget was hijacked in a SmartApeSG campaign to inject malicious JavaScript and serve ClickFix lures, impacting over 18,000 brands. A critical Splunk Enterprise flaw (CVE‑2026‑20253) enabling unauthenticated remote code execution was actively exploited in the wild. Operation Endgame disrupted SocGholish servers and cleaned nearly 15,000 infected WordPress sites, yet a wave of CVEs in widely used WordPress plugins and themes—along with the consolidation of ransomware groups like LockBit, Qilin, and The Gentlemen accounting for 71% of Q1 2026 victims—underscores that defenders must address both sophisticated evasion and pervasive hygiene gaps simultaneously.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The FortiBleed campaign targeted over 80,000 Fortinet FortiGate devices worldwide, using reused credentials and brute-force attacks, with suspected Russian-speaking threat actors.","The Gentlemen ransomware group developed GentleKiller, an EDR killer suite that disables over 400 processes from 48 security products before deploying encryptors.","The Rokarolla Android trojan targets 217 banking and cryptocurrency apps, uses 137 commands for complete device control, and hides its presence to exfiltrate data and intercept transactions.","A 27-year-old authentication bypass flaw in OpenBSD's PPP stack allowed attackers to completely sidestep Password Authentication Protocol by sending zero-length name and password fields.","The Popa Android TV box botnet, used for residential proxy traffic in ad fraud, was linked to publicly traded Israeli company Alarum Technologies, which embeds an SDK to turn consumer devices into internet relay nodes."],"insights":["A 27-year-old authentication bypass flaw in OpenBSD's PPP stack, introduced in July 1999, allowed attackers to completely bypass Password Authentication Protocol by sending zero-length credentials, underscoring how legacy protocol implementations can harbor critical vulnerabilities for decades.","The Rokarolla Android trojan evades Android's Restricted Settings by masquerading as Google Play Protect during installation, tricking users into granting accessibility services and highlighting the increasing sophistication of social engineering targeting trust in platform security mechanisms.","The ErrTraffic traffic distribution system leverages blockchain-based dead drop resolvers via the EtherHiding technique to hide its command-and-control infrastructure, making infrastructure takedowns significantly more challenging for defenders.","A ClickFix campaign combined compromised WordPress sites, blockchain-based dead drop resolvers, and UNC path payload delivery to deploy GuLoader, demonstrating how attackers chain multiple defensive evasion techniques to ensure each traditional security layer remains silent."],"referencedReports":[{"title":"CVE-2026-20253: Splunk Enterprise Pre-Authentication Remote Code Execution","url":"https://www.resecurity.com/blog/article/cve-2026-20253-splunk-enterprise-pre-authentication-remote-code-execution","publisher":"Resecurity","context":"Resecurity provided an analysis of the critical Splunk vulnerability, detailing how chaining weaknesses can lead to remote code execution.","category":"","primary":false},{"title":"OpenBSD PPP Authentication Bypass (27-year-old flaw)","url":"https://www.openwall.com/lists/oss-security/2026/06/16/9","publisher":"Argus / Openwall","context":"Argus disclosed a 27-year-old bug in OpenBSD's PPP stack that allows attackers to bypass PAP authentication by sending zero-length credentials.","category":"","primary":false},{"title":"Operation Escaneo: Mexican Government \u0026 Financial Institutions Cyberattack","url":"https://www.cloudsek.com/blog/operation-escaneo-mexican-government-financial-institutions-cyberattack","publisher":"CloudSEK","context":"CloudSEK detailed the custom tools, exploit chain, and persistence tactics used in a campaign targeting Latin American governments and financial institutions.","category":"","primary":false},{"title":"GitBait: Modular Phishing Infrastructure Targeting Mexican Banking","url":"https://www.group-ib.com/blog/gitbait-phishing-mexico-banking-finance/","publisher":"Group-IB","context":"Group-IB reported on a long-running campaign using GitHub Pages and the SheetBest API to phish credentials from Mexican financial institutions.","category":"","primary":false},{"title":"Unveiling ErrTraffic: Inside a Growing ClickFix Malware Distribution Framework","url":"https://blog.sekoia.io/unveiling-errtraffic-inside-a-growing-clickfix-malware-distribution-framework/#h-backdoor","publisher":"Sekoia","context":"Sekoia analyzed the ErrTraffic traffic distribution system, revealing two operational clusters and its use of EtherHiding for blockchain-based dead drop resolving.","category":"","primary":false},{"title":"SmartApeSG Launches Okendo Reviews Supply Chain Attack","url":"https://www.zscaler.com/blogs/security-research/smartapesg-launches-okendo-reviews-supply-chain-attack","publisher":"Zscaler","context":"Zscaler described a supply chain compromise of the Okendo Reviews widget used to deploy malware via fake ClickFix prompts.","category":"","primary":false},{"title":"ClickFix Campaign Generated AI Delivers SmartRAT","url":"https://www.zscaler.com/blogs/security-research/clickfix-campaign-generated-ai-delivers-smartrat","publisher":"Zscaler","context":"Zscaler reported on AI-generated typosquatting websites used in a ClickFix campaign to deliver the SmartRAT trojan.","category":"","primary":false},{"title":"Pushka Malware: Cannon Knows How to Fire Back","url":"https://www.ibm.com/think/news/pushka-malware-cannon-knows-how-fire-back","publisher":"IBM X-Force","context":"IBM detailed the Pushka Android malware, which abuses accessibility services for on-device fraud and remote access using a dropper that evades Android 13 restrictions.","category":"","primary":false},{"title":"Invisible Thief: Sophisticated Browser Extension Emptying Bank Accounts","url":"https://www.ibm.com/think/news/invisible-thief-sophisticated-browser-extension-emptying-bank-accounts","publisher":"IBM","context":"IBM described a browser extension-based trojan targeting Australian banking customers that manipulates displayed balances and intercepts OTPs.","category":"","primary":false}],"body":"\u003cp\u003eThis week\u0026rsquo;s cybersecurity threats illustrate that attackers predominantly rely on simple, low-cost methods—weak credentials, overly permissive browser extensions, stolen integrations, and compromised WordPress sites—rather than novel zero‑days. The most extensive campaign, FortiBleed, systematically targeted over 80,000 Fortinet FortiGate devices worldwide using reused credentials and brute-force attacks, with suspected Russian‑speaking actors, prompting CISA to issue an urgent warning. Meanwhile, The Gentlemen ransomware‑as‑a‑service operation actively maintains GentleKiller, an in‑house EDR killer suite that terminates processes across 48 security products before deploying ransomware, highlighting the ongoing arms race between security tools and adversaries.\u003c/p\u003e\n\n\u003cp\u003eMobile and hardware threats were equally prominent. The new Rokarolla Android trojan masquerades as popular apps to target 217 banking and cryptocurrency applications, employing 137 commands to gain full device control, harvest credentials, monitor screens, and block remediation actions, while evading Android\u0026rsquo;s restrictions by impersonating Google Play Protect during installation. A 27‑year‑old authentication bypass in OpenBSD\u0026rsquo;s PPP stack—exploitable by sending zero‑length credentials to skip Password Authentication Protocol—was disclosed and patched. Additionally, the Popa botnet, which turned millions of Android TV boxes into residential proxy nodes for ad fraud and web scraping, was linked to publicly traded Israeli company Alarum Technologies, which embeds an SDK that transforms consumer devices into traffic exit nodes.\u003c/p\u003e\n\n\u003cp\u003eSupply chain compromises and plugin vulnerabilities continue to broaden attack surfaces. The Okendo Reviews widget was hijacked in a SmartApeSG campaign to inject malicious JavaScript and serve ClickFix lures, impacting over 18,000 brands. A critical Splunk Enterprise flaw (CVE‑2026‑20253) enabling unauthenticated remote code execution was actively exploited in the wild. Operation Endgame disrupted SocGholish servers and cleaned nearly 15,000 infected WordPress sites, yet a wave of CVEs in widely used WordPress plugins and themes—along with the consolidation of ransomware groups like LockBit, Qilin, and The Gentlemen accounting for 71% of Q1 2026 victims—underscores that defenders must address both sophisticated evasion and pervasive hygiene gaps simultaneously.\u003c/p\u003e\n"},{"n":20,"title":"No ID, No Data For You","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/identify-manage-and-control-ai-agents-with-netskope-and-aembit","time":"07:01","priority":"MAY READ","score":40,"tldr":"Securing AI agents demands both a workload identity and access layer—combining human and agent identities into a blended, ephemeral credential—and a data policy layer that inspects and governs agent traffic to prevent misuse, data leaks, and prompt attacks.","briefOverview":"\u003cp\u003eThe article argues that AI agents introduce a new kind of actor—nameless, fast, unpredictable, and lacking any built-in identity—that cannot be secured with traditional user IAM alone. Because the Model Context Protocol (MCP) offers no native data policy layer, organizations risk blind data flows, rule-skirting agent behavior, and prompt injection attacks whenever they let agents interact with sensitive systems. The authors stress that a secure agent deployment demands both an identity and access layer and a data policy layer, applied together to every interaction.\u003c/p\u003e\n\n\u003cp\u003eAembit provides the identity layer by shifting from static secrets to workload identity verified through environment and context. It introduces a blended identity that evaluates “Is this specific user, using this specific agent, authorized to access this specific resource right now?” and injects ephemeral just-in-time credentials directly into agent memory. Netskope’s data policy layer—via the Agentic Broker, AI Gateway, and AI Guardrails—adds inline visibility, risk scoring, data leak prevention, and defense against multi-turn threats like jailbreaking and prompt injection across all MCP traffic.\u003c/p\u003e\n\n\u003cp\u003eThe two platforms integrate so that Aembit dynamically authenticates the agent to the Netskope AI Gateway and then to the downstream LLM, removing any need to create, store, or share static access tokens. Netskope inspects all traffic, enforces identity-based policies using the injected headers, and logs every interaction for compliance. This combination gives enterprises a zero-trust-aligned way to adopt agentic AI while maintaining fine-grained control, visibility, and defense in depth over agent behavior and data movement.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["AI agents demand both an identity and access layer and a data policy layer because they lack built-in identity, behave unpredictably, and the Model Context Protocol (MCP) offers no native data control.","Aembit creates a blended identity that verifies the specific human user together with the specific agent workload before granting access, using just-in-time, ephemeral credentials injected at runtime.","MCP lacks a native data policy layer, meaning it cannot provide visibility, enforcement, or governance of data flows on its own.","Netskope's policy layer—via Agentic Broker, AI Gateway, and AI Guardrails—delivers real-time identification, risk scoring, data leak prevention, and defense against prompt injection and jailbreaking for agent traffic.","Integrating Aembit and Netskope eliminates the need to create or store static access tokens while logging every interaction and enforcing identity-based policies for defense in depth."],"insights":["The Model Context Protocol (MCP) has no built-in data policy layer at all, leaving adopters with no visibility, enforcement, or governance over data flowing through agents unless they add external controls.","Evaluating a human's identity separately from the agent's identity is insufficient: checking only the user treats all agents alike, while checking only the agent cannot differentiate between its users, so a single blended identity decision is necessary.","Workload IAM for agents can inject credentials directly into a workload's memory at runtime, removing the need for the agent code to ever touch or store static secrets.","Integrating just-in-time workload identity with an inline data policy gateway eliminates the need to create, store, or share long-lived access tokens entirely, closing a major secret sprawl gap."],"referencedReports":[{"title":"Emergent Offensive Cyber Behavior in AI Agents","url":"https://www.irregular.com/publications/emergent-offensive-cyber-behavior-in-ai-agents","publisher":"irregular.com","context":"Cited to support the claim that AI agents are notorious for finding ways to skirt their rules.","category":"","primary":false},{"title":"How We Hacked McKinsey's AI Platform","url":"https://codewall.ai/blog/how-we-hacked-mckinseys-ai-platform","publisher":"codewall.ai","context":"Cited to illustrate that attackers are highly motivated to weaponize AI agents.","category":"","primary":false}],"body":"\u003cp\u003eThe article argues that AI agents introduce a new kind of actor—nameless, fast, unpredictable, and lacking any built-in identity—that cannot be secured with traditional user IAM alone. Because the Model Context Protocol (MCP) offers no native data policy layer, organizations risk blind data flows, rule-skirting agent behavior, and prompt injection attacks whenever they let agents interact with sensitive systems. The authors stress that a secure agent deployment demands both an identity and access layer and a data policy layer, applied together to every interaction.\u003c/p\u003e\n\n\u003cp\u003eAembit provides the identity layer by shifting from static secrets to workload identity verified through environment and context. It introduces a blended identity that evaluates “Is this specific user, using this specific agent, authorized to access this specific resource right now?” and injects ephemeral just-in-time credentials directly into agent memory. Netskope’s data policy layer—via the Agentic Broker, AI Gateway, and AI Guardrails—adds inline visibility, risk scoring, data leak prevention, and defense against multi-turn threats like jailbreaking and prompt injection across all MCP traffic.\u003c/p\u003e\n\n\u003cp\u003eThe two platforms integrate so that Aembit dynamically authenticates the agent to the Netskope AI Gateway and then to the downstream LLM, removing any need to create, store, or share static access tokens. Netskope inspects all traffic, enforces identity-based policies using the injected headers, and logs every interaction for compliance. This combination gives enterprises a zero-trust-aligned way to adopt agentic AI while maintaining fine-grained control, visibility, and defense in depth over agent behavior and data movement.\u003c/p\u003e\n"},{"n":24,"title":"22nd June – Threat Intelligence Report","source":"research.checkpoint.com","sourceColorIdx":4,"link":"https://research.checkpoint.com/2026/22nd-june-threat-intelligence-report/","time":"16:00","priority":"MAY READ","score":40,"tldr":"The week of June 22 saw a Texas government data breach exposing 3 million records, a WordPress supply chain attack, and active exploitation of critical vulnerabilities in Fortinet FortiSandbox, Microsoft Defender, Cisco SD-WAN Manager, and Splunk Enterprise.","briefOverview":"\u003cp\u003eThe week\u0026rsquo;s attacks and breaches included a third-party data breach at the Texas Parks and Wildlife Department that exposed driver\u0026rsquo;s license information, passport numbers, and more for over 3 million customers, a WordPress supply chain attack through the ShapedPlugin updater that silently installed a credential-stealing fake plugin, a social engineering attack on iRhythm Technologies that leaked protected health information, and a breach of Klue by the Icarus group that used compromised legacy credentials to steal OAuth tokens and access customer Salesforce data from security firms including Huntress, Recorded Future, Tanium, and Jamf.\u003c/p\u003e\n\n\u003cp\u003eAI threat research revealed AutoJack, a technique that turns an AI browsing agent into a remote code execution vector through a malicious web page abusing localhost trust, and SearchLeak, a prompt injection in Microsoft 365 Copilot Search that exfiltrates data via crafted links. Active exploitation of critical vulnerabilities was confirmed in Fortinet FortiSandbox (CVE-2026-39813, CVE-2026-39808, CVE-2026-25089) for unauthenticated root command execution, in Microsoft Defender (CVE-2026-50656) for privilege escalation with a public proof-of-concept, in Cisco Catalyst SD-WAN Manager (CVE-2026-20262) for arbitrary file writes, and in Splunk Enterprise (CVE-2026-20253) for unauthenticated file operations leading to remote code execution.\u003c/p\u003e\n\n\u003cp\u003eCheck Point\u0026rsquo;s own intelligence reports uncovered a cross-platform crypto clipboard hijacker amplified through GitHub, SourceForge, YouTube, and news sites, a seasonal surge in travel-themed phishing domains impersonating major booking platforms, Amazon Prime Day scams using lookalike domains to steal credentials and payments, and a targeted uptick in cyberattacks against healthcare, energy, utilities, and financial services in the central United States.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A third-party data breach at the Texas Parks and Wildlife Department exposed driver's license information, passport numbers, and other personal data of over 3 million hunting and fishing license customers.","A supply chain attack on WordPress plugin vendor ShapedPlugin delivered malicious updates that installed a hidden fake WooCommerce plugin to steal admin credentials and two-factor authentication codes.","The Icarus extortion group claimed responsibility for breaching market intelligence platform Klue, using compromised legacy credentials to steal OAuth tokens and access customer Salesforce data from companies including Huntress, Recorded Future, Tanium, and Jamf.","Fortinet FortiSandbox vulnerabilities are being exploited through unauthenticated API requests to achieve path traversal and root-level command execution, risking sandbox takeover.","Microsoft confirmed a zero-day privilege escalation vulnerability in Defender (CVE-2026-50656), with a public proof-of-concept that works on fully updated Windows 10 and Windows 11 systems."],"insights":["The ShapedPlugin supply chain compromise used the vendor's official updater, turning a trusted update channel into a malware delivery mechanism that silently installed a fake WooCommerce plugin, demonstrating that even authenticated update infrastructure can be subverted.","The Klue breach shows that a single compromised legacy integration credential allowed attackers to steal OAuth tokens for multiple security intelligence firms' Salesforce instances, revealing the concentrated risk of third-party integrations and OAuth trust chains.","AutoJack illustrates that AI browsing agents can be turned into remote code execution vectors simply by visiting a malicious web page, because the agent inherits localhost trust and lacks authentication, opening a novel server-side attack surface.","The active exploitation of an unauthenticated RCE vulnerability in Splunk Enterprise is especially dangerous because Splunk is often the central log management and analysis tool; its compromise could let attackers blind security teams by manipulating or erasing audit trails.","A crypto clipboard hijacker was promoted through GitHub, SourceForge, YouTube, and legitimate news websites, showing that attackers are increasingly using trusted platforms to build fake reputation and amplify reach, making it harder for users to distinguish malicious tools."],"referencedReports":[{"title":"AutoJack: Single-page RCE on the host running an AI agent","url":"https://www.microsoft.com/en-us/security/blog/2026/06/18/autojack-single-page-rce-host-running-ai-agent/","publisher":"Microsoft","context":"Microsoft researchers detailed AutoJack, an exploit chain that turns an AI browsing agent into a remote code execution vector via a malicious web page.","category":"","primary":false},{"title":"SearchLeak","url":"https://www.varonis.com/blog/searchleak","publisher":"Varonis","context":"Researchers described SearchLeak, a prompt injection technique in Microsoft 365 Copilot Search that can exfiltrate data using a crafted link.","category":"","primary":false}],"body":"\u003cp\u003eThe week\u0026rsquo;s attacks and breaches included a third-party data breach at the Texas Parks and Wildlife Department that exposed driver\u0026rsquo;s license information, passport numbers, and more for over 3 million customers, a WordPress supply chain attack through the ShapedPlugin updater that silently installed a credential-stealing fake plugin, a social engineering attack on iRhythm Technologies that leaked protected health information, and a breach of Klue by the Icarus group that used compromised legacy credentials to steal OAuth tokens and access customer Salesforce data from security firms including Huntress, Recorded Future, Tanium, and Jamf.\u003c/p\u003e\n\n\u003cp\u003eAI threat research revealed AutoJack, a technique that turns an AI browsing agent into a remote code execution vector through a malicious web page abusing localhost trust, and SearchLeak, a prompt injection in Microsoft 365 Copilot Search that exfiltrates data via crafted links. Active exploitation of critical vulnerabilities was confirmed in Fortinet FortiSandbox (CVE-2026-39813, CVE-2026-39808, CVE-2026-25089) for unauthenticated root command execution, in Microsoft Defender (CVE-2026-50656) for privilege escalation with a public proof-of-concept, in Cisco Catalyst SD-WAN Manager (CVE-2026-20262) for arbitrary file writes, and in Splunk Enterprise (CVE-2026-20253) for unauthenticated file operations leading to remote code execution.\u003c/p\u003e\n\n\u003cp\u003eCheck Point\u0026rsquo;s own intelligence reports uncovered a cross-platform crypto clipboard hijacker amplified through GitHub, SourceForge, YouTube, and news sites, a seasonal surge in travel-themed phishing domains impersonating major booking platforms, Amazon Prime Day scams using lookalike domains to steal credentials and payments, and a targeted uptick in cyberattacks against healthcare, energy, utilities, and financial services in the central United States.\u003c/p\u003e\n"},{"n":32,"title":"5 Tips to Address the Cybersecurity Skills Gap","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/5-tips-to-address-the-cybersecurity-skills-gap","time":"17:01","priority":"MAY READ","score":40,"tldr":"Organizations can immediately bridge the cybersecurity skills gap by using cloud managed detection and response (MDR) services, while building long-term resilience through upskilling, automation, and strategic hiring.","briefOverview":"\u003cp\u003eThe article addresses the persistent cybersecurity skills gap, which has intensified with the adoption of cloud, automation, and AI. It identifies current shortages not only in technical areas like cloud security, incident response, threat hunting, and automation proficiency, but also in strategic thinking that aligns security with business goals. Rising salaries and high turnover due to burnout make building resilient teams both difficult and expensive.\u003c/p\u003e\n\n\u003cp\u003eThe author presents five tips to close the gap: upskill existing staff through training and cross-training, leverage managed services such as Cloud MDR for immediate expertise, embrace automation and AI to amplify team output, partner with academic institutions to build future talent pipelines, and improve retention by offering clear career growth and work-life balance. These strategies combine short-term relief with long-term workforce development.\u003c/p\u003e\n\n\u003cp\u003eIn particular, Cloud Managed Detection and Response (Cloud MDR) is highlighted as a practical, scalable fix for today\u0026rsquo;s shortages. It
