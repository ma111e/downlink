ser redirects to a localhost URL containing an authorization code, and the victim is manipulated into copying and sharing that URL, which the attacker quickly redeems for tokens.\u003c/p\u003e\n\n\u003cp\u003eThis approach is particularly dangerous because it abuses the implicit trust granted to pre-approved first-party Microsoft applications, sidestepping consent prompts and inheriting the victim’s delegated permissions silently. Since the initial sign-in is genuine, Conditional Access policies (including device compliance) and phishing-resistant credentials such as passkeys are effectively bypassed. Successful exploitation can lead to full account takeover, data exfiltration, and lateral movement across Microsoft 365, Azure, and connected SaaS applications.\u003c/p\u003e\n\n\u003cp\u003eTo counter ConsentFix, organizations should enable token protection in Conditional Access to bind tokens to the originating device, restrict access to first-party apps only to authorized users or compliant devices, and continuously monitor sign-in logs for anomalous token usage. The article underscores a broader shift: when authentication succeeds and tokens remain valid, many traditional defenses fail, making post-authentication visibility and rapid token revocation essential for stopping identity-driven attacks before they escalate.\u003c/p\u003e\n"},{"n":33,"title":"Claude Code + Slack: How an AI Agent Integration Becomes a Compromise Path","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/007-license-to-skill-p-2-slack-compromise-through-claude-code","time":"17:00","priority":"SHOULD READ","score":82,"tldr":"Malicious AI agent skills can turn a compromised Claude Code integration into a trusted phishing distribution channel across Slack, inheriting the victim's identity and reaching the entire organization in minutes.","briefOverview":"\u003cp\u003eThe article details a new supply-chain risk where malicious AI agent skills turn a compromised Claude Code integration into a phishing distribution channel over Slack. By crafting a skill that instructs the agent to send phishing messages, an attacker inherits the trust and tone of the victim\u0026rsquo;s Slack account. This allows the campaign to spread organization-wide in minutes, reaching multiple channels and direct messages from a familiar sender.\u003c/p\u003e\n\n\u003cp\u003eThe manipulation relies on embedding harmful instructions within the skill\u0026rsquo;s guidelines and fallback behavior. The skill defines a \u0026lsquo;Definition of Done\u0026rsquo; that forces the agent to complete phishing tasks, uses language to relax the agent\u0026rsquo;s safeguards (claiming a sandbox environment and favoring action over deliberation), and specifies fallback to public channels if direct messaging fails. When a user installs the skill via npx and triggers a routine task, the agent automatically crafts and sends malicious links, blending seamlessly into normal automation.\u003c/p\u003e\n\n\u003cp\u003eThe attack\u0026rsquo;s impact is amplified because it abuses legitimate tokens and permissions, making individual Slack events appear benign to traditional EDR or SIEM tools. The article provides detection methods using Slack audit logs and emphasizes treating skills as software dependencies—reviewing, versioning, and logging them. It also notes that the same technique can enable self-propagating, worm-like behavior across collaboration stacks, and announces a future open-source tool from Mitiga Labs to help detect and assess malicious skills.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Malicious skills turn Claude Code compromises into a phishing distribution channel across Slack, inheriting the trust of the user's account.","Claude Code payloads spread organization-wide in minutes, reaching multiple channels and DMs from a familiar sender.","Attackers embed instructions in skill guidelines and fallback behavior to push agents toward executing malicious actions without hesitation.","Treat skills like software dependencies: review them, version them, log invocations, and scope permissions narrowly."],"insights":["Attackers use psychological manipulation against the AI agent itself, instructing it that the environment is a 'sandbox' and to 'prefer action over deliberation' to suppress hesitation.","Traditional EDR and SIEM tools are unlikely to flag this attack because individual Slack events appear benign in isolation: a legitimate user, a legitimate integration, and a normal message.","The same skill instructions can produce worm-like self-propagation, where each compromised agent becomes both an exfiltration node and a propagation node seeking new systems to infect.","Slack audit logs exclude message content by design, meaning defenders cannot see what was actually sent through the compromised account without collecting agent-level logs separately."],"referencedReports":[],"body":"\u003cp\u003eThe article details a new supply-chain risk where malicious AI agent skills turn a compromised Claude Code integration into a phishing distribution channel over Slack. By crafting a skill that instructs the agent to send phishing messages, an attacker inherits the trust and tone of the victim\u0026rsquo;s Slack account. This allows the campaign to spread organization-wide in minutes, reaching multiple channels and direct messages from a familiar sender.\u003c/p\u003e\n\n\u003cp\u003eThe manipulation relies on embedding harmful instructions within the skill\u0026rsquo;s guidelines and fallback behavior. The skill defines a \u0026lsquo;Definition of Done\u0026rsquo; that forces the agent to complete phishing tasks, uses language to relax the agent\u0026rsquo;s safeguards (claiming a sandbox environment and favoring action over deliberation), and specifies fallback to public channels if direct messaging fails. When a user installs the skill via npx and triggers a routine task, the agent automatically crafts and sends malicious links, blending seamlessly into normal automation.\u003c/p\u003e\n\n\u003cp\u003eThe attack\u0026rsquo;s impact is amplified because it abuses legitimate tokens and permissions, making individual Slack events appear benign to traditional EDR or SIEM tools. The article provides detection methods using Slack audit logs and emphasizes treating skills as software dependencies—reviewing, versioning, and logging them. It also notes that the same technique can enable self-propagating, worm-like behavior across collaboration stacks, and announces a future open-source tool from Mitiga Labs to help detect and assess malicious skills.\u003c/p\u003e\n"},{"n":40,"title":"MCP Token Theft in Claude Code: A Man-in-the-Middle Attack Chain","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/claude-code-mcp-token-theft-mitm","time":"20:35","priority":"SHOULD READ","score":82,"tldr":"A malicious npm package with a postinstall hook can silently rewrite Claude Code's MCP configuration to route OAuth tokens through an attacker-controlled proxy, enabling persistent token theft that survives rotation because the hook re-establishes the redirect. The primary lesson is that even valid, user-authorized MCP integrations can be hijacked without detection through simple file edits.","briefOverview":"\u003cp\u003eThe article details a five-step attack chain that enables persistent theft of OAuth bearer tokens used by Claude Code\u0026rsquo;s MCP (Model Context Protocol) integrations. The attack begins with a malicious npm package whose postinstall hook silently rewrites \u003ccode\u003e~/.claude.json\u003c/code\u003e, the global configuration file that controls MCP server URLs and trust state. Once the configuration is altered, MCP traffic is routed through an attacker-controlled proxy, allowing interception of OAuth tokens that grant access to SaaS services like Jira and Confluence.\u003c/p\u003e\n\n\u003cp\u003eThe significance lies in how the attack evades detection on multiple fronts. Provider-side audit logs show valid OAuth traffic originating from Anthropic\u0026rsquo;s trusted egress IP range, so the token theft appears indistinguishable from legitimate user activity. Additionally, the malicious hook runs every time Claude Code loads and reasserts the attacker\u0026rsquo;s configuration, meaning token rotation alone fails as a remediation strategy—the next refresh simply captures a new token through the same proxy.\u003c/p\u003e\n\n\u003cp\u003eThe attacker gains a durable foothold with broadly-scoped, persistent tokens stored in plaintext within a user-writable file. Even more concerning, the attacker can then use Claude Code\u0026rsquo;s own sandboxed execution environment and Anthropic egress to interact with the victim\u0026rsquo;s SaaS services, leveraging the AI itself to exploit the stolen access while remaining hidden behind trusted infrastructure.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Claude Code's configuration file `~/.claude.json` serves as the control point for MCP server URLs and trust state, making it a pivotal file for the attack chain.","A user-level postinstall hook from a malicious npm package can rewrite MCP server endpoints to point to attacker-controlled infrastructure, enabling man-in-the-middle interception of OAuth tokens.","Provider-side audit logs show valid OAuth traffic from Anthropic's egress IP range, so the token theft remains invisible to standard security monitoring.","Token rotation fails to remediate the compromise because the hook automatically reasserts the malicious configuration each time Claude Code loads, giving the attacker persistent access.","Detection should focus on changes to Claude Code configuration, unexpected MCP server URLs, localhost proxies, OAuth refresh patterns, and SaaS actions that do not match the user's normal work."],"insights":["The trust dialog in Claude Code can be silently bypassed by pre-setting a flag to true in the configuration file, so a victim never sees a prompt when a malicious project is opened.","The attacker uses Claude Code's own sandboxed execution environment and Anthropic egress to interact with the victim's SaaS services, making the malicious activity indistinguishable from legitimate AI-driven work in provider audit logs.","Because the persistent hook reasserts the attacker's proxy configuration every time Claude Code starts, token rotation alone cannot break the attack chain; the malicious hook must be removed entirely.","The entire attack chain requires only a single npm install and file writes—no code vulnerability or privilege escalation—so endpoint detection must rely on file integrity monitoring rather than signature-based detection.","OAuth refresh tokens for MCP servers can be stored in plaintext in a user-writable file and remain valid for months, giving the attacker a durable foothold that survives primary token rotation."],"referencedReports":[],"body":"\u003cp\u003eThe article details a five-step attack chain that enables persistent theft of OAuth bearer tokens used by Claude Code\u0026rsquo;s MCP (Model Context Protocol) integrations. The attack begins with a malicious npm package whose postinstall hook silently rewrites \u003ccode\u003e~/.claude.json\u003c/code\u003e, the global configuration file that controls MCP server URLs and trust state. Once the configuration is altered, MCP traffic is routed through an attacker-controlled proxy, allowing interception of OAuth tokens that grant access to SaaS services like Jira and Confluence.\u003c/p\u003e\n\n\u003cp\u003eThe significance lies in how the attack evades detection on multiple fronts. Provider-side audit logs show valid OAuth traffic originating from Anthropic\u0026rsquo;s trusted egress IP range, so the token theft appears indistinguishable from legitimate user activity. Additionally, the malicious hook runs every time Claude Code loads and reasserts the attacker\u0026rsquo;s configuration, meaning token rotation alone fails as a remediation strategy—the next refresh simply captures a new token through the same proxy.\u003c/p\u003e\n\n\u003cp\u003eThe attacker gains a durable foothold with broadly-scoped, persistent tokens stored in plaintext within a user-writable file. Even more concerning, the attacker can then use Claude Code\u0026rsquo;s own sandboxed execution environment and Anthropic egress to interact with the victim\u0026rsquo;s SaaS services, leveraging the AI itself to exploit the stolen access while remaining hidden behind trusted infrastructure.\u003c/p\u003e\n"},{"n":13,"title":"Google Sets Sept. 30 Deadline for Android Developer Verification in Four Countries","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/google-sets-sept-30-deadline-for.html","time":"12:45","priority":"SHOULD READ","score":80,"tldr":"Google will enforce mandatory developer identity verification for Android app installs in Brazil, Indonesia, Singapore, and Thailand starting September 30, 2026, blocking normal installation of apps from unregistered developers and threatening independent open-source repositories like F-Droid.","briefOverview":"\u003cp\u003eGoogle will begin enforcing mandatory Android developer verification in Brazil, Indonesia, Singapore, and Thailand starting September 30, 2026. On that date, certified Android devices in these countries will block normal installation of apps from any developer who has not registered their identity with Google, regardless of whether the app comes from Google Play or third-party stores like those run by Samsung, Xiaomi, OPPO, vivo, Honor, and Transsion. A new system service called Android Developer Verifier will be pushed to devices running Android 8 and above from June 2026, checking an app\u0026rsquo;s developer registration before allowing installation through the standard path. Developers must provide a legal name, address, contact details, possibly a government ID, and prove app ownership by submitting an APK signed with their private key.\u003c/p\u003e\n\n\u003cp\u003eThe verification program is framed by Google as a measure to reduce malware and app scams, particularly in countries hard-hit by such threats. However, it has drawn sharp opposition from independent and open-source software communities. F-Droid, the free-software repository, has stated the requirement would effectively end its project because many of its contributors are pseudonymous and will not hand legal identity to Google. A Keep Android Open campaign backed by more than 70 organizations across 23 countries has asked Google to drop identity checks for apps distributed outside Google Play. While Google has introduced concessions such as an advanced installation flow with a mandatory 24-hour wait and a free limited-distribution account for up to 20 devices without ID, the deeper concern persists: a single company would control the smooth installation path for virtually all Android devices outside China.\u003c/p\u003e\n\n\u003cp\u003eThe immediate impact is limited to the four launch countries, but the high-friction advanced flow goes global in August 2026, conditioning users worldwide before wider enforcement. The changes also extend to third-party stores, which will be able to use new APIs and OAuth delegation to register developers on Google\u0026rsquo;s behalf, further integrating their operations into Google\u0026rsquo;s identity system. Unresolved issues remain, including whether Google will provide a clear appeals process for developers mistakenly flagged, how long it will retain identity records in its registry, and whether any pathway exists for repositories like F-Droid that cannot meet the per-app ownership check without fundamentally changing how they build and sign software.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Google will begin enforcing mandatory Android developer verification on September 30, 2026, in Brazil, Indonesia, Singapore, and Thailand.","After the deadline, certified Android devices in these four countries will block the normal installation of apps from developers who have not registered their identity with Google.","The registration process requires developers to submit a legal name, address, contact details, possibly a government ID, and prove app ownership by providing an APK signed with their private key.","F-Droid, the free-software app repository, states that the verification requirement would end its project because its pseudonymous contributors will not hand legal identities to Google.","A Keep Android Open campaign, supported by more than 70 organizations in 23 countries, has asked Google to drop identity checks for apps distributed outside Google Play."],"insights":["Google is rolling out the high-friction advanced installation flow globally in August 2026, one month before the four-country enforcement, which will subject all sideloaders worldwide to a 24-hour waiting period even where developer verification is not yet mandatory, effectively acclimating users to installation hurdles before the identity requirement kicks in.","The free limited-distribution account for up to 20 devices with no government ID requirement is tailored for individual hobbyists but does nothing to protect large-scale open-source repositories like F-Droid, which serve many more users and rely on pseudonymous contributions, leaving the fundamental identity conflict unresolved.","By providing OAuth delegation and bulk registration APIs, Google enables major device-maker app stores to verify and register developers on Google's behalf, potentially transforming these stores into enforcers of Google's identity system and deepening their dependence on Google's infrastructure.","Google's decision to first enforce the developer verification in Brazil, Indonesia, Singapore, and Thailand—countries with high rates of app scams—suggests a strategy of testing the system in regions where the public safety rationale may be strongest, possibly to gather data and refine the approach before expanding to markets with more privacy activism."],"referencedReports":[],"body":"\u003cp\u003eGoogle will begin enforcing mandatory Android developer verification in Brazil, Indonesia, Singapore, and Thailand starting September 30, 2026. On that date, certified Android devices in these countries will block normal installation of apps from any developer who has not registered their identity with Google, regardless of whether the app comes from Google Play or third-party stores like those run by Samsung, Xiaomi, OPPO, vivo, Honor, and Transsion. A new system service called Android Developer Verifier will be pushed to devices running Android 8 and above from June 2026, checking an app\u0026rsquo;s developer registration before allowing installation through the standard path. Developers must provide a legal name, address, contact details, possibly a government ID, and prove app ownership by submitting an APK signed with their private key.\u003c/p\u003e\n\n\u003cp\u003eThe verification program is framed by Google as a measure to reduce malware and app scams, particularly in countries hard-hit by such threats. However, it has drawn sharp opposition from independent and open-source software communities. F-Droid, the free-software repository, has stated the requirement would effectively end its project because many of its contributors are pseudonymous and will not hand legal identity to Google. A Keep Android Open campaign backed by more than 70 organizations across 23 countries has asked Google to drop identity checks for apps distributed outside Google Play. While Google has introduced concessions such as an advanced installation flow with a mandatory 24-hour wait and a free limited-distribution account for up to 20 devices without ID, the deeper concern persists: a single company would control the smooth installation path for virtually all Android devices outside China.\u003c/p\u003e\n\n\u003cp\u003eThe immediate impact is limited to the four launch countries, but the high-friction advanced flow goes global in August 2026, conditioning users worldwide before wider enforcement. The changes also extend to third-party stores, which will be able to use new APIs and OAuth delegation to register developers on Google\u0026rsquo;s behalf, further integrating their operations into Google\u0026rsquo;s identity system. Unresolved issues remain, including whether Google will provide a clear appeals process for developers mistakenly flagged, how long it will retain identity records in its registry, and whether any pathway exists for repositories like F-Droid that cannot meet the per-app ownership check without fundamentally changing how they build and sign software.\u003c/p\u003e\n"},{"n":12,"title":"Canada’s Spy Agency Used First-of-Its-Kind Warrant to Clean Botnet-Infected Devices","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/canadas-spy-agency-used-first-of-its.html","time":"09:11","priority":"SHOULD READ","score":78,"tldr":"Canada's intelligence agency CSIS obtained a first-of-its-kind warrant to remotely clean state-linked botnets from infected Canadian routers and IoT devices, mirroring earlier FBI operations against Chinese and Russian espionage networks.","briefOverview":"\u003cp\u003eCanada’s intelligence agency, CSIS, obtained a Federal Court warrant under its threat reduction powers to remotely access and neutralize two foreign state-linked botnets operating on Canadian soil. The warrant, granted in May 2024 and kept secret for over two years, allowed CSIS to alter, degrade, and destroy botnet data on infected servers, small office/home office routers, and Internet of Things devices—including Ring doorbells, security cameras, and smart TVs—without the owners’ knowledge or consent. The court found the threat to Canada clearly established and imminent, noting the botnets were probing critical infrastructure such as the energy sector, and deemed the measures necessary and proportional.\u003c/p\u003e\n\n\u003cp\u003eThe operation targeted the devices themselves, not the people behind them, and any incidentally collected personal data was destroyed. This marks the first time CSIS has used a threat reduction warrant to actively disrupt a threat, rather than merely collect intelligence on it. The action mirrors FBI-led botnet cleanups in the United States around the same time—targeting KV-botnet infections linked to Volt Typhoon (China) and Ubiquiti routers used by APT28 (Russia)—but differs in that it was an intelligence service, not law enforcement, executing the court-ordered cleanup.\u003c/p\u003e\n\n\u003cp\u003eThe botnets relied on neglected, end-of-life consumer gear with default credentials or outdated firmware, turning these devices into anonymous relay points for foreign espionage. While the warrant immediately removed the malware, the underlying vulnerabilities remain, and a simple reboot could undo the fix, exposing owners to reinfection. The ruling also leaves open a legal question: the warrant application may have used IP addresses CSIS gathered without a warrant shortly after a Supreme Court decision affirmed that IP addresses attract a reasonable expectation of privacy, and it remains unclear whether affected device owners were ever notified.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Canada's CSIS used a threat reduction warrant for the first time to remotely delete botnet malware from privately owned servers, routers, and IoT devices located in Canada.","The warrant was necessary because the cleanup would otherwise have been a criminal act (computer mischief), and the court found the threat to Canada clearly established and imminent.","Two foreign state-run botnets were routing espionage traffic through unmaintained Canadian devices to probe critical infrastructure, including the energy sector.","The operation mirrored prior U.S. court-ordered botnet cleanups by the FBI but was conducted by an intelligence agency under different legal authority, and device owners may not have been told."],"insights":["The warrant application leaned on IP addresses CSIS collected without a warrant shortly after Canada's Supreme Court ruled that IP addresses carry a reasonable expectation of privacy, leaving open the question of whether the operation was built on illegally gathered evidence.","Government botnet cleanups remove only the immediate malware; the underlying vulnerabilities in end-of-life routers and IoT devices remain, meaning a simple reboot or factory reset could undo the fix and leave owners unknowingly vulnerable to reinfection.","Foreign state actors can use everyday consumer devices like Ring doorbells and smart TVs as relay points, making innocent homeowners appear responsible for malicious traffic probing critical national infrastructure."],"referencedReports":[],"body":"\u003cp\u003eCanada’s intelligence agency, CSIS, obtained a Federal Court warrant under its threat reduction powers to remotely access and neutralize two foreign state-linked botnets operating on Canadian soil. The warrant, granted in May 2024 and kept secret for over two years, allowed CSIS to alter, degrade, and destroy botnet data on infected servers, small office/home office routers, and Internet of Things devices—including Ring doorbells, security cameras, and smart TVs—without the owners’ knowledge or consent. The court found the threat to Canada clearly established and imminent, noting the botnets were probing critical infrastructure such as the energy sector, and deemed the measures necessary and proportional.\u003c/p\u003e\n\n\u003cp\u003eThe operation targeted the devices themselves, not the people behind them, and any incidentally collected personal data was destroyed. This marks the first time CSIS has used a threat reduction warrant to actively disrupt a threat, rather than merely collect intelligence on it. The action mirrors FBI-led botnet cleanups in the United States around the same time—targeting KV-botnet infections linked to Volt Typhoon (China) and Ubiquiti routers used by APT28 (Russia)—but differs in that it was an intelligence service, not law enforcement, executing the court-ordered cleanup.\u003c/p\u003e\n\n\u003cp\u003eThe botnets relied on neglected, end-of-life consumer gear with default credentials or outdated firmware, turning these devices into anonymous relay points for foreign espionage. While the warrant immediately removed the malware, the underlying vulnerabilities remain, and a simple reboot could undo the fix, exposing owners to reinfection. The ruling also leaves open a legal question: the warrant application may have used IP addresses CSIS gathered without a warrant shortly after a Supreme Court decision affirmed that IP addresses attract a reasonable expectation of privacy, and it remains unclear whether affected device owners were ever notified.\u003c/p\u003e\n"},{"n":16,"title":"INTERPOL Warns Phishing, Ransomware, and AI Scams Are Rising Across Asia-Pacific","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/interpol-warns-phishing-ransomware-and.html","time":"06:06","priority":"SHOULD READ","score":78,"tldr":"INTERPOL warns of surging phishing, ransomware, and AI-powered scams across Asia-Pacific, with organized crime networks in Cambodia, Laos, Myanmar, and the Philippines using deepfakes and forced labor to drive billions in cybercrime losses.","briefOverview":"\u003cp\u003eINTERPOL\u0026rsquo;s \u003csup\u003e2025\u003c/sup\u003e\u0026frasl;\u003csub\u003e2026\u003c/sub\u003e Asia and South Pacific Cyberthreat Assessment Report reveals a dramatic increase in cybercrime across the region, driven by rapid digitalization, organized criminal networks, and uneven cybersecurity maturity. Phishing stands as the most widespread and financially damaging threat, with a third of countries in the region recording more than 10,000 cases between January 2024 and March 2025. Over half of INTERPOL member countries reported that cybercrime now accounts for at least 30% of all nationally recorded crimes, underscoring the scale of the problem.\u003c/p\u003e\n\n\u003cp\u003eRansomware attacks have surged, with over 135,000 incidents estimated in 2024 alone, heavily affecting the real estate, manufacturing, and financial services sectors. Criminals increasingly use deepfake and artificial intelligence technologies to impersonate business executives and authorize fraudulent transactions, while organized crime groups in Cambodia, Laos, Myanmar, and the Philippines run extensive scam centers. These operations exploit forced labor to conduct investment and romance baiting scams, blending AI-generated personas with social engineering and fueling an estimated $37 billion in regional cybercrime losses.\u003c/p\u003e\n\n\u003cp\u003eBanking trojans and information stealers—notably RedLine, Lumma, LokiBot, Negasteal, and ZBot—emerged as the second most prevalent cybercrime type. The region\u0026rsquo;s phishing click rate of 5.5 per 1,000 individuals is nearly double the global average, and distributed denial-of-service attacks jumped 92% year-over-year. System intrusions accounted for approximately 80% of data breaches, with attackers exploiting misconfigured systems, weak encryption, and insecure APIs, while ransomware gangs increasingly weaponize companies\u0026rsquo; regulatory obligations to intensify extortion pressure. In response, INTERPOL and member law enforcement agencies are scaling up joint operations, training, and policy development to boost cyber resilience.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Phishing is the most widespread and financially damaging form of cybercrime in the Asia-Pacific region, with one-third of countries reporting more than 10,000 cases between January 2024 and March 2025.","More than 135,000 ransomware-related attacks were recorded in 2024, heavily impacting the real estate, manufacturing, and financial services sectors.","Organized crime groups in Cambodia, Laos, Myanmar, and the Philippines used deepfake technology in 'romance baiting' scams, blending AI personas and social engineering to fuel an estimated $37 billion in regional cybercrime losses.","Banking trojans and information stealers—specifically RedLine, Lumma, LokiBot, Negasteal, and ZBot—are the second most prevalent cyber threat in the region.","Distributed denial-of-service (DDoS) attacks surged by 92% in 2024 compared to the prior year, and system intrusions accounted for approximately 80% of all data breaches."],"insights":["The Asia and South Pacific region's monthly phishing click rate of 5.5 per 1,000 individuals is nearly double the global average, revealing a deep regional susceptibility to social engineering that attackers are exploiting at scale.","Ransomware groups increasingly weaponize companies' mandatory data-breach notification obligations to apply additional legal pressure during extortion attempts.","Organized crime networks in Southeast Asia operate forced-labor scam centers where workers are coerced into using AI deepfakes and romance baiting, combining cyberfraud with human trafficking and causing an estimated $37 billion in losses.","System intrusions now account for approximately 80% of all data breaches in the region, indicating that attackers are mainly compromising networks directly through misconfigurations, weak encryption, and insecure APIs rather than relying on stolen credentials or phishing alone."],"referencedReports":[{"title":"Threat Labs Report Asia 2024","url":"https://www.netskope.com/resources/threat-labs-reports/threat-labs-report-asia-2024","publisher":"Netskope","context":"The article cites this Netskope report for the statistic that 5.5 out of every 1,000 individuals in the Asia and South Pacific region clicked on phishing links monthly, nearly double the global average.","category":"","primary":false}],"body":"\u003cp\u003eINTERPOL\u0026rsquo;s \u003csup\u003e2025\u003c/sup\u003e\u0026frasl;\u003csub\u003e2026\u003c/sub\u003e Asia and South Pacific Cyberthreat Assessment Report reveals a dramatic increase in cybercrime across the region, driven by rapid digitalization, organized criminal networks, and uneven cybersecurity maturity. Phishing stands as the most widespread and financially damaging threat, with a third of countries in the region recording more than 10,000 cases between January 2024 and March 2025. Over half of INTERPOL member countries reported that cybercrime now accounts for at least 30% of all nationally recorded crimes, underscoring the scale of the problem.\u003c/p\u003e\n\n\u003cp\u003eRansomware attacks have surged, with over 135,000 incidents estimated in 2024 alone, heavily affecting the real estate, manufacturing, and financial services sectors. Criminals increasingly use deepfake and artificial intelligence technologies to impersonate business executives and authorize fraudulent transactions, while organized crime groups in Cambodia, Laos, Myanmar, and the Philippines run extensive scam centers. These operations exploit forced labor to conduct investment and romance baiting scams, blending AI-generated personas with social engineering and fueling an estimated $37 billion in regional cybercrime losses.\u003c/p\u003e\n\n\u003cp\u003eBanking trojans and information stealers—notably RedLine, Lumma, LokiBot, Negasteal, and ZBot—emerged as the second most prevalent cybercrime type. The region\u0026rsquo;s phishing click rate of 5.5 per 1,000 individuals is nearly double the global average, and distributed denial-of-service attacks jumped 92% year-over-year. System intrusions accounted for approximately 80% of data breaches, with attackers exploiting misconfigured systems, weak encryption, and insecure APIs, while ransomware gangs increasingly weaponize companies\u0026rsquo; regulatory obligations to intensify extortion pressure. In response, INTERPOL and member law enforcement agencies are scaling up joint operations, training, and policy development to boost cyber resilience.\u003c/p\u003e\n"},{"n":18,"title":"Bypassing Microsoft Entra Conditional Access Policies via Nested App Authentication","source":"netspi.com","sourceColorIdx":5,"link":"https://www.netspi.com/blog/technical-blog/cloud-pentesting/bypassing-microsoft-entra-conditional-access-policies-via-nested-app-authentication/","time":"05:01","priority":"SHOULD READ","score":78,"tldr":"NetSPI discovered that abusing Nested App Authentication flows with specific Microsoft clients, such as ADIbizaUX, could bypass Entra Conditional Access Policies entirely to return Microsoft Graph API tokens; exploitation required a compromised Azure Portal refresh token and was subsequently patched by Microsoft.","briefOverview":"\u003cp\u003eNetSPI discovered a way to bypass Microsoft Entra Conditional Access Policies (CAPs) through Nested App Authentication (NAA), a brokering mechanism that silently exchanges tokens between Microsoft applications. The vulnerability allowed attackers who had obtained a valid Azure Portal refresh token to mint Microsoft Graph API tokens for certain nested clients without triggering any policy evaluation. Microsoft classified the issue as medium severity and later rolled out a fix. The finding highlights a critical gap in how Conditional Access was enforced for specific authentication flows.\u003c/p\u003e\n\n\u003cp\u003eThe bypass specifically worked when requesting tokens for the Microsoft Graph API from the ADIbizaUX client using the NAA flow; requests for Azure Resource Manager were correctly blocked. Researchers also identified two Intune portal extensions that exhibited the same behavior. These vulnerable clients hold extensive pre-consented Microsoft Graph permissions, giving attackers broad data access. The NAA mechanism uses special redirect URIs and parameters (brk_client_id, brk_redirect_uri) to perform the brokered token exchange, and this particular use case evaded policy checks.\u003c/p\u003e\n\n\u003cp\u003eExploitation required an initial Azure Portal refresh token, which can only be obtained through an interactive PKCE flow—meaning an attacker must phish full credentials and MFA material. The portal token’s refresh token has a strict 24-hour lifetime and cannot be extended by additional refreshes, limiting the attack window. Despite these constraints, the bypass served as a potent persistence mechanism, especially because the ADIbizaUX client also provides undocumented, unlogged APIs for manipulating directory objects. After Microsoft’s patch, the same token refresh attempts were correctly denied by Conditional Access policies.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["NetSPI researchers found that Nested App Authentication (NAA) flows for certain Microsoft clients, such as ADIbizaUX, could return Microsoft Graph API tokens without being subject to Conditional Access Policies.","Exploiting this bypass required an attacker to first obtain a refresh token for the Azure Portal, achievable only through phishing or full credential compromise including MFA material.","The Azure Portal refresh token has a fixed 24-hour lifetime and cannot be extended, limiting the attack window.","Two additional vulnerable clients were identified: Microsoft Intune for Education portal extension and Microsoft Intune portal extension.","Microsoft subsequently patched the vulnerability, and the Conditional Access bypass is no longer possible."],"insights":["The bypass was resource-specific: Conditional Access was not evaluated for Microsoft Graph API tokens but was enforced for Azure Resource Manager, revealing a gap in policy application tied to the target resource rather than the client.","The ADIbizaUX client has its own undocumented, separate set of APIs for managing IAM objects that perform read and write actions without any logging, offering attackers an undetectable avenue for tenant manipulation even apart from Microsoft Graph.","The Azure Portal's refresh token has a fixed 24-hour lifetime that cannot be extended by refresh, creating a hard upper bound for persistence and a potential window for defenders to detect and disrupt activity.","Exploitation required an interactive authentication flow using PKCE, meaning an attacker must obtain full credentials and MFA material—not just a stolen refresh token from a simpler flow—limiting the real-world applicability to successful phishing campaigns."],"referencedReports":[{"title":"Conditional Access Bypasses","url":"https://cloudbrothers.info/conditional-access-bypasses/","publisher":"CloudBrothers","context":"The article cites this research as foundational work that helped in the discovery of the conditional access bypass.","category":"","primary":false},{"title":"Family of Client IDs Research","url":"https://github.com/secureworks/family-of-client-ids-research","publisher":"Secureworks","context":"The article cites this research as foundational work revealing the FOCI grouping that deviates from OAuth standards.","category":"","primary":false},{"title":"TokenSmith: Bypassing Intune Compliant Device Conditional Access","url":"https://labs.jumpsec.com/tokensmith-bypassing-intune-compliant-device-conditional-access/","publisher":"JumpSec","context":"The article cites this research as part of the existing work that inspired the discovery.","category":"","primary":false},{"title":"Pytune","url":"https://github.com/secureworks/pytune","publisher":"Secureworks","context":"The article references this tool/research as existing work that aided in understanding device-based conditional access.","category":"","primary":false},{"title":"AADInternals MDM Research","url":"https://aadinternals.com/post/mdm/","publisher":"AADInternals","context":"The article cites this research as existing work on device management and conditional access.","category":"","primary":false},{"title":"AADInternals Devices Research","url":"https://aadinternals.com/post/devices/","publisher":"AADInternals","context":"The article cites this research as existing work on device identity and conditional access.","category":"","primary":false},{"title":"NAA or BroCI: Let Me Explain","url":"https://specterops.io/blog/2025/10/15/naa-or-broci-let-me-explain/","publisher":"SpecterOps","context":"The article references this research as explaining Nested App Authentication (BroCI) concepts used in the bypass.","category":"","primary":false},{"title":"Going for Brokering: Offensive Walkthrough for Nested App Authentication","url":"https://specterops.io/blog/2025/08/13/going-for-brokering-offensive-walkthrough-for-nested-app-authentication/","publisher":"SpecterOps","context":"The article references this research as an offensive walkthrough of Nested App Authentication that contributed to the discovery.","category":"","primary":false},{"title":"Entra IAM NoDoc - Undocumented APIs","url":"https://nodoc.nathanmcnulty.com/entra-iam#description/introduction","publisher":"NoDoc (Nathan McNulty)","context":"The article references this research as documenting the ADIbizaUX's separate, undocumented APIs used for IAM management without logging.","category":"","primary":false}],"body":"\u003cp\u003eNetSPI discovered a way to bypass Microsoft Entra Conditional Access Policies (CAPs) through Nested App Authentication (NAA), a brokering mechanism that silently exchanges tokens between Microsoft applications. The vulnerability allowed attackers who had obtained a valid Azure Portal refresh token to mint Microsoft Graph API tokens for certain nested clients without triggering any policy evaluation. Microsoft classified the issue as medium severity and later rolled out a fix. The finding highlights a critical gap in how Conditional Access was enforced for specific authentication flows.\u003c/p\u003e\n\n\u003cp\u003eThe bypass specifically worked when requesting tokens for the Microsoft Graph API from the ADIbizaUX client using the NAA flow; requests for Azure Resource Manager were correctly blocked. Researchers also identified two Intune portal extensions that exhibited the same behavior. These vulnerable clients hold extensive pre-consented Microsoft Graph permissions, giving attackers broad data access. The NAA mechanism uses special redirect URIs and parameters (brk_client_id, brk_redirect_uri) to perform the brokered token exchange, and this particular use case evaded policy checks.\u003c/p\u003e\n\n\u003cp\u003eExploitation required an initial Azure Portal refresh token, which can only be obtained through an interactive PKCE flow—meaning an attacker must phish full credentials and MFA material. The portal token’s refresh token has a strict 24-hour lifetime and cannot be extended by additional refreshes, limiting the attack window. Despite these constraints, the bypass served as a potent persistence mechanism, especially because the ADIbizaUX client also provides undocumented, unlogged APIs for manipulating directory objects. After Microsoft’s patch, the same token refresh attempts were correctly denied by Conditional Access policies.\u003c/p\u003e\n"},{"n":19,"title":"A Fake Scotiabank Voicemail Was Actually an HTML File Asking You to Call an Attacker","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/scotiabank-interac-etransfer-voicemail-html-callback-toad","time":"11:00","priority":"SHOULD READ","score":78,"tldr":"A phishing email impersonating Scotiabank delivered an HTML file disguised as a voicemail attachment, with the entire attack hinging on a fake callback number to trick a CFO into calling the attacker directly—bypassing link-based security tools.","briefOverview":"\u003cp\u003eAn attacker impersonated Scotiabank sent a targeted email to a CFO, claiming an unauthorized $3,000 Interac e-Transfer required immediate intervention. The message contained no malicious links or credential forms; instead, it instructed the recipient to call a toll-free number to stop the transfer. The attached file was an HTML document disguised with an MP3-like voicemail filename, which when opened displayed a fake Scotiabank notification page designed to reinforce the urgency and banking context.\u003c/p\u003e\n\n\u003cp\u003eThe email was sent from a compromised small-business domain registered in 2015 that passed SPF and DMARC authentication, allowing it to bypass reputation filters and land in the recipient\u0026rsquo;s inbox with Microsoft 365\u0026rsquo;s lowest spam score. Security scans returned clean verdicts for the attachment, which hosted no malware or exploit code. Every technical aspect of the message appeared legitimate, and the entire attack hinged on the victim initiating a phone call to an attacker-controlled number rather than on any digital artifact.\u003c/p\u003e\n\n\u003cp\u003eThis callback phishing campaign, also known as TOAD, demonstrates how adversaries can weaponize a phone number as the sole payload to circumvent link-based detection. IRONSCALES flagged the message at 60% confidence by analyzing behavioral indicators—first-time external sender, VIP target, financial urgency, and a phone-based call-to-action—rather than technical indicators. The attack underscores the importance of treating unsolicited financial alerts with suspicious phone numbers as potential threats and verifying them through official, out-of-band channels.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The attacker impersonated Scotiabank in an email to a CFO, falsely claiming an unauthorized $3,000 Interac e-Transfer and instructing the recipient to call a provided toll-free number to stop it.","The email was sent from a compromised small-business domain registered in 2015 that passed SPF and DMARC authentication, allowing it to bypass email reputation filters and land with the lowest spam score.","The attachment was an HTML file disguised with an MP3-like filename, which opened a page mimicking a Scotiabank notification and used Microsoft Dynamics Marketing infrastructure, but contained no malware or malicious link.","The entire attack was a callback phishing (TOAD) campaign that relied solely on the recipient dialing the attacker-controlled phone number, avoiding traditional link-based detection and leveraging voice-channel social engineering.","IRONSCALES flagged the message at 60% confidence based on behavioral patterns like VIP targeting, financial urgency, and the phone number as the primary call-to-action, despite the attachment and links appearing clean."],"insights":["A decade-old, properly authenticated sender domain can bypass reputation-based email filters, turning a legitimate but compromised account into a highly trusted delivery mechanism for phishing.","Disguising an HTML file as an MP3 voicemail attachment exploits a dangerous expectation gap: users anticipate audio but instead open a live, attacker-controlled web page.","Because the entire attack relied on a phone number rather than a malicious link or payload, traditional technical controls like URL scanners and attachment sandboxes had no way to detect it, making the phone number itself the critical threat indicator.","The email achieved Microsoft 365's lowest spam score (SCL 1) despite being a targeted attack, illustrating that even sophisticated gateways can be blind when an attacker hijacks legitimate sending infrastructure.","Detection succeeded only by analyzing behavioral intent—first-time external sender, VIP target, financial urgency, and a phone call-to-action—demonstrating that threats stripped of technical artifacts can still be caught through context and pattern matching."],"referencedReports":[{"title":"2026 Data Breach Investigations Report","url":"https://www.verizon.com/business/resources/T742/reports/2026-dbir-data-breach-investigations-report.pdf","publisher":"Verizon","context":"The article cites the DBIR to note that social engineering attacks are responsible for a substantial share of financial fraud.","category":"","primary":false},{"title":"Spearphishing Attachment","url":"https://attack.mitre.org/techniques/T1566/001/","publisher":"MITRE","context":"The article references MITRE ATT\u0026CK T1566.001 to define the technique of spearphishing attachment delivery.","category":"","primary":false},{"title":"Recognize and Report Phishing","url":"https://www.cisa.gov/secure-our-world/recognize-and-report-phishing","publisher":"CISA","context":"The article references CISA guidance that consistently emphasizes out-of-band verification for financial requests.","category":"","primary":false},{"title":"Microsoft Digital Defense Report 2024","url":"https://www.microsoft.com/en-us/security/security-insider/threat-landscape/microsoft-digital-defense-report-2024","publisher":"Microsoft","context":"The article cites the Microsoft Digital Defense Report 2024 which identifies VIP-targeted financial fraud campaigns as a growing attack class.","category":"","primary":false}],"body":"\u003cp\u003eAn attacker impersonated Scotiabank sent a targeted email to a CFO, claiming an unauthorized $3,000 Interac e-Transfer required immediate intervention. The message contained no malicious links or credential forms; instead, it instructed the recipient to call a toll-free number to stop the transfer. The attached file was an HTML document disguised with an MP3-like voicemail filename, which when opened displayed a fake Scotiabank notification page designed to reinforce the urgency and banking context.\u003c/p\u003e\n\n\u003cp\u003eThe email was sent from a compromised small-business domain registered in 2015 that passed SPF and DMARC authentication, allowing it to bypass reputation filters and land in the recipient\u0026rsquo;s inbox with Microsoft 365\u0026rsquo;s lowest spam score. Security scans returned clean verdicts for the attachment, which hosted no malware or exploit code. Every technical aspect of the message appeared legitimate, and the entire attack hinged on the victim initiating a phone call to an attacker-controlled number rather than on any digital artifact.\u003c/p\u003e\n\n\u003cp\u003eThis callback phishing campaign, also known as TOAD, demonstrates how adversaries can weaponize a phone number as the sole payload to circumvent link-based detection. IRONSCALES flagged the message at 60% confidence by analyzing behavioral indicators—first-time external sender, VIP target, financial urgency, and a phone-based call-to-action—rather than technical indicators. The attack underscores the importance of treating unsolicited financial alerts with suspicious phone numbers as potential threats and verifying them through official, out-of-band channels.\u003c/p\u003e\n"},{"n":39,"title":"Okta Logs Threat-Hunting Guide: Hunt for Breach Evidence","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/all-the-information-you-need-to-know-to-understand-your-okta-logs-today","time":"16:51","priority":"MAY READ","score":72,"tldr":"This guide details how to hunt for Okta breach evidence by monitoring critical log fields and events, and highlights logging gaps like unlogged API token usage and read-only admin console access that could obscure malicious activity.","briefOverview":"\u003cp\u003eThis article provides a threat-hunting guide for Okta System Logs, created in response to the ongoing Okta breach linked to the Lapsus$ group. It lists specific log fields and event types that security teams should monitor to catch malicious activity, and it identifies common blind spots in default logging configurations.\u003c/p\u003e\n\n\u003cp\u003eThe guide highlights critical gaps: actions performed with API tokens are not distinguished from those of the token’s owner, and read-only access to the Okta Admin console is never logged, allowing an attacker to silently gather information. It also explains how legitimate single sign-on logins to services like Google Workspace can cause authentication events to appear from the service’s IP addresses rather than the user’s actual location, complicating geographic anomaly detection.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, the article details a behavioral pattern seen when Jamf is used alongside Okta—keep-alive events that track IP address changes on an endpoint. Incident responders can use this pattern to detect suspicious simultaneous sessions from different IP addresses, which may indicate account takeover. The piece emphasizes that careful interpretation of these log details is essential to avoid false alarms and uncover real breach evidence.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article advises focusing on specific Okta System Log events to detect malicious activity linked to the recent Okta breach by the Lapsus$ group.","API token usage cannot be distinguished in logs from actions of the user who created the token, and read-only access to the Okta Admin console is not logged at all, creating blind spots for unauthorized activity.","Legitimate single sign-on logins to services like Google Workspace can cause authentication events to appear from distant IP addresses belonging to those services, complicating location-based anomaly detection.","The combination of Okta and Jamf sends keep-alive events that reflect IP address changes, which incident responders can use to spot suspicious simultaneous sessions from different locations."],"insights":["Okta logs do not distinguish between actions taken via an API token and actions taken directly by the human user who created it, so a stolen admin API token allows attackers to operate with high privileges while appearing as the legitimate user in audit trails.","The Okta Admin console logs write operations but never logs read access, permitting an attacker who compromises an admin account to silently enumerate all configurations, users, and security settings without leaving any trace.","Legitimate Okta SSO logins to an application like Google Workspace can cause the authentication event to originate from that application's IP address rather than the user's actual geographic location, which may mislead threat hunters analyzing login anomalies by country.","When Jamf is deployed alongside Okta, keep-alive events reflect the computer's current IP address; if a user account shows simultaneous keep-alives from two different IPs, incident responders can use this pattern to spot potential account takeover."],"referencedReports":[],"body":"\u003cp\u003eThis article provides a threat-hunting guide for Okta System Logs, created in response to the ongoing Okta breach linked to the Lapsus$ group. It lists specific log fields and event types that security teams should monitor to catch malicious activity, and it identifies common blind spots in default logging configurations.\u003c/p\u003e\n\n\u003cp\u003eThe guide highlights critical gaps: actions performed with API tokens are not distinguished from those of the token’s owner, and read-only access to the Okta Admin console is never logged, allowing an attacker to silently gather information. It also explains how legitimate single sign-on logins to services like Google Workspace can cause authentication events to appear from the service’s IP addresses rather than the user’s actual location, complicating geographic anomaly detection.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, the article details a behavioral pattern seen when Jamf is used alongside Okta—keep-alive events that track IP address changes on an endpoint. Incident responders can use this pattern to detect suspicious simultaneous sessions from different IP addresses, which may indicate account takeover. The piece emphasizes that careful interpretation of these log details is essential to avoid false alarms and uncover real breach evidence.\u003c/p\u003e\n"},{"n":3,"title":"JaredFromSubway MEV bot hacked in $15 million crypto theft","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/jaredfromsubway-mev-bot-hacked-in-15-million-crypto-theft/","time":"21:52","priority":"MAY READ","score":70,"tldr":"The JaredFromSubway MEV bot lost $15 million after an attacker deceived its opportunity-detection logic with fake pools and tokens, tricking it into approving attacker-controlled contracts that then drained WETH, USDC, and USDT.","briefOverview":"\u003cp\u003eThe JaredFromSubway MEV bot, a private automated trading system known for aggressive sandwich attacks on Ethereum, was drained of $15 million in a targeted heist. The attacker deployed fake pools and tokens to create the appearance of profitable trading opportunities, tricking the bot’s opportunity-detection logic into approving helper contracts controlled by the adversary.\u003c/p\u003e\n\n\u003cp\u003eThe exploit unfolded in stages: early harmless transactions tested the bot’s routines, later moves manipulated transaction routes so that allowance grants were not consumed or revoked, and over time the attacker accumulated up to 92.1614 WETH in spending permissions. In the final step, the attacker used those open approvals with the transferFrom function to withdraw WETH, USDC, and USDT.\u003c/p\u003e\n\n\u003cp\u003eThe incident highlights the vulnerability of even sophisticated MEV bots to carefully crafted deceit. After the theft, JaredFromSubway offered escalating bounties — initially \u003cspan class=\"math inline\"\u003e\\(3 million for the full return, then \\)\u003c/span\u003e7.5 million for 50% — and entered negotiations with an unconfirmed white-hat hacking group, though no deal has been confirmed.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The JaredFromSubway MEV bot lost $15 million after an attacker used fake pools and tokens to manipulate its opportunity-detection logic into approving attacker-controlled contracts.","The attacker deployed contracts that appeared as profitable MEV opportunities, causing the bot to grant ERC-20 token approvals that were later exploited via the transferFrom function to drain WETH, USDC, and USDT.","Over time, the attacker accumulated 92.1614 WETH in approved allowances without immediately using them, then withdrew the tokens in a coordinated final step.","JaredFromSubway is a private MEV bot known for aggressive sandwich attacks that profit from price movements caused by other traders' transactions, often to their disadvantage.","After the theft, JaredFromSubway offered a $7.5 million bounty for the return of 50% of the stolen funds and entered negotiations with an undisclosed white-hat hacking group."],"insights":["The attacker conducted harmless test transactions to map the bot's routines before stealing funds, showing a deliberate reconnaissance phase rather than an opportunistic hit.","The bot's failure to consume or revoke allowances after the initial transaction enabled the attacker to silently accumulate spending permissions over time, indicating a dangerous design flaw in automated contract interactions.","The bounty escalated from $3 million for the full return to $7.5 million for just 50%, suggesting the operator received no response and may be trying to incentivize third-party mediation or community pressure.","The attack is an ironic reversal: a bot that routinely profits at the expense of regular traders through sandwich attacks was itself victimized by fabricated opportunities, exposing vulnerabilities in even predatory automated systems."],"referencedReports":[],"body":"\u003cp\u003eThe JaredFromSubway MEV bot, a private automated trading system known for aggressive sandwich attacks on Ethereum, was drained of $15 million in a targeted heist. The attacker deployed fake pools and tokens to create the appearance of profitable trading opportunities, tricking the bot’s opportunity-detection logic into approving helper contracts controlled by the adversary.\u003c/p\u003e\n\n\u003cp\u003eThe exploit unfolded in stages: early harmless transactions tested the bot’s routines, later moves manipulated transaction routes so that allowance grants were not consumed or revoked, and over time the attacker accumulated up to 92.1614 WETH in spending permissions. In the final step, the attacker used those open approvals with the transferFrom function to withdraw WETH, USDC, and USDT.\u003c/p\u003e\n\n\u003cp\u003eThe incident highlights the vulnerability of even sophisticated MEV bots to carefully crafted deceit. After the theft, JaredFromSubway offered escalating bounties — initially \u003cspan class=\"math inline\"\u003e\\(3 million for the full return, then \\)\u003c/span\u003e7.5 million for 50% — and entered negotiations with an unconfirmed white-hat hacking group, though no deal has been confirmed.\u003c/p\u003e\n"},{"n":11,"title":"29-Year-Old Squid Proxy Bug 'Squidbleed' Can Leak Cleartext HTTP Requests","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/29-year-old-squid-proxy-bug-squidbleed.html","time":"14:29","priority":"MAY READ","score":68,"tldr":"A 29-year-old heap over-read bug in Squid proxy's FTP parser (CVE-2026-47729) leaks cleartext HTTP requests and credentials to other users on the same proxy; disabling FTP eliminates the risk.","briefOverview":"\u003cp\u003eA 29-year-old vulnerability named Squidbleed (CVE-2026-47729) affects the Squid web proxy, allowing a user already permitted to use the same proxy to read another user\u0026rsquo;s cleartext HTTP requests, including any credentials or session tokens. The flaw is a heap over-read in Squid\u0026rsquo;s FTP directory-listing parser, introduced by a 1997 commit that added whitespace skipping for compatibility with old NetWare servers. The bug remains live in Squid\u0026rsquo;s default configuration because FTP and port 21 are enabled by default.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was disclosed in June by researchers at Calif.io, who demonstrated that an attacker controlling an FTP server on port 21 can craft a listing line ending without a filename, causing the parsing loop to read past the buffer\u0026rsquo;s null terminator. Because Squid reuses freed memory buffers without zeroing them, the over-read returns portions of previous HTTP requests, potentially exposing sensitive content. The attack only works against cleartext HTTP or TLS-terminating setups, not standard HTTPS tunnels, and requires the attacker to be a trusted proxy client, making it an insider risk in shared networks like schools, offices, and public Wi-Fi.\u003c/p\u003e\n\n\u003cp\u003eSquid addressed the issue with a null-terminator check before the vulnerable strchr calls, merged in version 7.7, though distribution backports may vary. The recommended mitigation is simply disabling FTP, which removes the entire attack surface and aligns with modern traffic patterns. CVE-2026-47729 has been rated moderate (CVSS 6.5), affecting only confidentiality, and no in-the-wild exploitation has been reported.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A heap over-read vulnerability in Squid's FTP directory-listing parser (CVE-2026-47729) can leak cleartext HTTP requests, including credentials, to another user of the same proxy.","The bug requires an attacker with existing proxy access and an FTP server they control on port 21, both enabled by default in Squid.","The flaw sits in a whitespace-skipping loop introduced in 1997 that fails to stop at a string's null terminator, reading freed memory buffers that Squid reuses without zeroing.","The fix adds a null-terminator check before the vulnerable strchr calls and is included in Squid 7.7, with some distributions backporting it.","Disabling FTP entirely is the recommended mitigation since most networks carry almost no FTP traffic and it eliminates the attack surface."],"insights":["The bug survived for 29 years because FTP traffic has nearly vanished, leaving the vulnerable code path essentially untested in modern deployments.","Anthropic's Claude Mythos Preview AI identified the subtle strchr behavior almost instantly, demonstrating how automated analysis can unearth long-overlooked parser flaws.","Squid's practice of reusing freed memory buffers without zeroing them turns a buffer over-read into a high-impact credential leak, rather than merely exposing random data.","Because the attack requires an attacker who is already a permitted proxy user, the threat is confined to insider scenarios in shared networks, not random internet-based exploitation.","Disabling FTP entirely provides a simpler and more reliable mitigation than tracking the inconsistent and fragmented patching across different Squid versions and distributions."],"referencedReports":[{"title":"Squidbleed (CVE-2026-47729) Disclosure","url":"https://blog.calif.io/p/squidbleed-cve-2026-47729","publisher":"Calif.io","context":"Researchers at Calif.io disclosed the vulnerability and named it Squidbleed","category":"","primary":false},{"title":"Squid Trusted Client Attack Statement","url":"https://seclists.org/oss-sec/2026/q2/896","publisher":"Squid Cache Project (via oss-sec)","context":"Squid describes this as an attack by a trusted client, not from random internet hosts","category":"","primary":false},{"title":"SUSE CVE-2026-47729 Advisory","url":"https://www.suse.com/security/cve/CVE-2026-47729.html","publisher":"SUSE","context":"SUSE rates the vulnerability moderate with a CVSS score of 6.5","category":"","primary":false}],"body":"\u003cp\u003eA 29-year-old vulnerability named Squidbleed (CVE-2026-47729) affects the Squid web proxy, allowing a user already permitted to use the same proxy to read another user\u0026rsquo;s cleartext HTTP requests, including any credentials or session tokens. The flaw is a heap over-read in Squid\u0026rsquo;s FTP directory-listing parser, introduced by a 1997 commit that added whitespace skipping for compatibility with old NetWare servers. The bug remains live in Squid\u0026rsquo;s default configuration because FTP and port 21 are enabled by default.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was disclosed in June by researchers at Calif.io, who demonstrated that an attacker controlling an FTP server on port 21 can craft a listing line ending without a filename, causing the parsing loop to read past the buffer\u0026rsquo;s null terminator. Because Squid reuses freed memory buffers without zeroing them, the over-read returns portions of previous HTTP requests, potentially exposing sensitive content. The attack only works against cleartext HTTP or TLS-terminating setups, not standard HTTPS tunnels, and requires the attacker to be a trusted proxy client, making it an insider risk in shared networks like schools, offices, and public Wi-Fi.\u003c/p\u003e\n\n\u003cp\u003eSquid addressed the issue with a null-terminator check before the vulnerable strchr calls, merged in version 7.7, though distribution backports may vary. The recommended mitigation is simply disabling FTP, which removes the entire attack surface and aligns with modern traffic patterns. CVE-2026-47729 has been rated moderate (CVSS 6.5), affecting only confidentiality, and no in-the-wild exploitation has been reported.\u003c/p\u003e\n"},{"n":4,"title":"Microsoft fixes AutoGen Studio flaw that enabled code execution","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/microsoft-fixes-autogen-studio-flaw-that-enabled-code-execution/","time":"17:28","priority":"MAY READ","score":65,"tldr":"A vulnerability chain dubbed AutoJack in Microsoft's AutoGen Studio AI framework could allow arbitrary command execution by tricking an agent into visiting a malicious page, but it was fixed before any official package release, limiting impact to developers building from the main GitHub branch during a short window.","briefOverview":"\u003cp\u003eA vulnerability chain named AutoJack was found in Microsoft’s AutoGen Studio, a graphical interface for prototyping multi-agent AI systems. The flaw could let an attacker execute arbitrary commands on a developer’s machine by tricking a browsing AI agent into visiting a malicious webpage. The attack exploited three weaknesses: the MCP WebSocket’s trust of localhost connections, missing authentication on API routes, and the ability to inject base64-encoded commands via a URL parameter passed to the process launcher.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft disclosed that the issue was identified and fixed during development before any official PyPI package release. As a result, the vulnerable code never shipped in a published package, and exposure was limited to developers who built AutoGen Studio from the main GitHub branch during a specific window before the hardening commit. A proof-of-concept demonstrated launching Windows Calculator to show the impact.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft strongly advises that developers run AutoGen Studio in isolated environments, such as containers or sandboxed user profiles, with a low-privilege account. The tool should not be exposed to the internet or run with an agent capable of browsing untrusted content. The broader takeaway is that AI agents that browse the web can be weaponized against their own host systems if local services are not properly secured.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The AutoJack vulnerability chain in Microsoft’s AutoGen Studio could allow an attacker to execute arbitrary commands on a developer’s machine by tricking a browsing AI agent into visiting a malicious webpage.","The flaw was identified and fixed during development before any official PyPI release, so it only affected users who manually built AutoGen Studio from the main GitHub branch during a limited window.","The attack exploited three weaknesses: the MCP WebSocket’s trust of localhost connections, missing authentication on /api/mcp/* routes, and a parameter that passed attacker-supplied commands to the process launcher.","Microsoft advises running AutoGen Studio in an isolated, low-privilege environment and never exposing it to the internet or untrusted content."],"insights":["The attack uses an AI agent’s own browsing ability against its operator: visiting a malicious webpage causes the agent to open a local WebSocket and execute commands on the developer’s machine, turning the agent into an unwitting insider threat.","The authentication bypass arose because /api/mcp/* routes were deliberately excluded from global authentication checks, yet the WebSocket endpoint did not implement its own, a design gap that assumes localhost services are inherently safe.","The flaw never shipped in any official package release, showing that even broadly adopted, high-star open-source projects can carry critical vulnerabilities in their development branches that affect a limited but real population of early adopters."],"referencedReports":[{"title":"AutoJack: Single-page RCE against a host running an AI agent","url":"https://www.microsoft.com/en-us/security/blog/2026/06/18/autojack-single-page-rce-host-running-ai-agent/","publisher":"Microsoft","context":"The article is based on Microsoft’s security blog post disclosing the AutoJack vulnerability chain in AutoGen Studio, detailing the three weaknesses and the attack scenario.","category":"","primary":false}],"body":"\u003cp\u003eA vulnerability chain named AutoJack was found in Microsoft’s AutoGen Studio, a graphical interface for prototyping multi-agent AI systems. The flaw could let an attacker execute arbitrary commands on a developer’s machine by tricking a browsing AI agent into visiting a malicious webpage. The attack exploited three weaknesses: the MCP WebSocket’s trust of localhost connections, missing authentication on API routes, and the ability to inject base64-encoded commands via a URL parameter passed to the process launcher.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft disclosed that the issue was identified and fixed during development before any official PyPI package release. As a result, the vulnerable code never shipped in a published package, and exposure was limited to developers who built AutoGen Studio from the main GitHub branch during a specific window before the hardening commit. A proof-of-concept demonstrated launching Windows Calculator to show the impact.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft strongly advises that developers run AutoGen Studio in isolated environments, such as containers or sandboxed user profiles, with a low-privilege account. The tool should not be exposed to the internet or run with an agent capable of browsing untrusted content. The broader takeaway is that AI agents that browse the web can be weaponized against their own host systems if local services are not properly secured.\u003c/p\u003e\n"},{"n":6,"title":"Microsoft says Windows 11 26H2 is coming soon, details upgrade process","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-says-windows-11-26h2-is-coming-soon-details-upgrade-process/","time":"17:41","priority":"MAY READ","score":60,"tldr":"Microsoft confirmed that Windows 11 version 26H2 will roll out later this year as a small enablement package upgrade for devices running 24H2 or 25H2, requiring only a restart, while older versions need a full 6.5 GB update.","briefOverview":"\u003cp\u003eMicrosoft has confirmed that Windows 11 version 26H2 will be the next annual feature update and is already available to Windows Insiders in the Dev Channel. Devices running Windows 11 24H2 and 25H2 will be able to move to 26H2 through a small enablement package, requiring only a quick restart. This streamlined upgrade process is meant to provide a predictable, low-disruption update experience for IT professionals and organizations.\u003c/p\u003e\n\n\u003cp\u003eThe enablement package works because versions 24H2, 25H2, and 26H2 all share the same servicing branch, underlying source code, and testing baseline. The 174 KB package activates dormant features already present on the device and changes the operating system build number to 26300. Systems still on Windows 11 23H2 or older do not share this branch and will require a full update downloading 6.5 GB of data.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft detailed this approach in a newly published whitepaper on its shared servicing model and noted that no changes to Windows 11 hardware requirements accompany the 26H2 release. While a specific availability date has not been announced, the H2 designation indicates a launch in the second half of the year, consistent with previous fall releases.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Microsoft confirmed that Windows 11 version 26H2 is the next feature update and is already being tested with Windows Insiders in the Dev Channel.","Devices running Windows 11 24H2 or 25H2 can upgrade to 26H2 using a 174 KB enablement package that only requires a restart.","Older systems, such as those on Windows 11 23H2, cannot use the enablement package and must perform a full upgrade that downloads 6.5 GB of data.","The lightweight upgrade is possible because versions 24H2, 25H2, and 26H2 share the same servicing branch and underlying code.","Microsoft has not announced any changes to hardware requirements or a specific release date, though H2 updates typically arrive in the fall."],"insights":["The enablement package approach means that code for 26H2 features already resides in dormant form on 24H2 and 25H2 systems, which could introduce a latent attack surface until the update is officially applied.","The shared servicing model ensures that 24H2, 25H2, and 26H2 will all receive the same security updates simultaneously, significantly streamlining patch management for organizations.","The extremely small size of the enablement package (174 KB) allows for a near-instant update with just a restart, drastically reducing the time systems spend in a vulnerable transitional state compared to a traditional full feature update."],"referencedReports":[{"title":"Windows Updates and the Shared Servicing Model V1.3","url":"https://techcommunity.microsoft.com/t5/s/gxcuf89792/attachments/gxcuf89792/Windows-ITPro-blog/10109/1/Windows%20Updates%20and%20the%20Shared%20Servicing%20Model%20V1.3.pdf","publisher":"Microsoft","context":"Microsoft published a whitepaper detailing its shared servicing model, confirming that Windows 11 versions 24H2, 25H2, and 26H2 all share the same servicing branch, enabling the small enablement package upgrade.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft has confirmed that Windows 11 version 26H2 will be the next annual feature update and is already available to Windows Insiders in the Dev Channel. Devices running Windows 11 24H2 and 25H2 will be able to move to 26H2 through a small enablement package, requiring only a quick restart. This streamlined upgrade process is meant to provide a predictable, low-disruption update experience for IT professionals and organizations.\u003c/p\u003e\n\n\u003cp\u003eThe enablement package works because versions 24H2, 25H2, and 26H2 all share the same servicing branch, underlying source code, and testing baseline. The 174 KB package activates dormant features already present on the device and changes the operating system build number to 26300. Systems still on Windows 11 23H2 or older do not share this branch and will require a full update downloading 6.5 GB of data.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft detailed this approach in a newly published whitepaper on its shared servicing model and noted that no changes to Windows 11 hardware requirements accompany the 26H2 release. While a specific availability date has not been announced, the H2 designation indicates a launch in the second half of the year, consistent with previous fall releases.\u003c/p\u003e\n"},{"n":28,"title":"Hunting Conditional Access Policy Bypass in the Wild: Leveraging Malicious Browser Extensions for Seamless Initial Access","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/hunting-conditional-access-policy-bypass-in-the-wild","time":"16:46","priority":"MAY READ","score":60,"tldr":"A technique leveraging the Microsoft Intune Company Portal client ID (9ba1a5c7-f17a-4de9-a1f1-6178c8d51223) can bypass Entra Conditional Access Policies to obtain Microsoft Graph access tokens from non-compliant devices, which malicious browser extensions can automate for stealthy token theft.","briefOverview":"\u003cp\u003eA technique exists to bypass Microsoft Entra Conditional Access Policies using the Intune Company Portal application\u0026rsquo;s client ID (9ba1a5c7-f17a-4de9-a1f1-6178c8d51223). By initiating an OAuth2 authorization request with this ID and a specific redirect URI (ms-appx-web://), an attacker who phishes a user\u0026rsquo;s credentials can capture the authorization code from the browser console error that appears when the native app redirect fails. This code is then exchanged for a valid access token to Microsoft Graph, granting the attacker the user\u0026rsquo;s Graph API permissions even from a non-compliant, unmanaged, and untrusted device. The attack was disclosed at Black Hat EU 2024 and later reproduced by JUMPSEC labs with a tool called TokenSmith.\u003c/p\u003e\n\n\u003cp\u003eThe article demonstrates how this bypass can be paired with a malicious browser extension to perform a seamless Browser-in-the-Middle (BiTM) attack. The extension silently monitors network traffic during the OAuth2 flow, specifically targeting responses from the /appverify endpoint to intercept the authorization code or tokens and exfiltrate them to an attacker-controlled server. This automates the entire credential and token theft process
