nt was intentionally excluded from authentication checks, demonstrating how new features can inadvertently expand an application's attack surface when security controls are not uniformly applied.","The vulnerability was discovered and remediated entirely within the development phase on GitHub, never reaching a PyPI release, yet still impacted developers who built from the main branch, underscoring the risks of using unreleased code in any environment that can be exposed to untrusted content."],"referencedReports":[{"title":"AutoJack: Single Page RCE on a Host Running an AI Agent","url":"https://www.microsoft.com/en-us/security/blog/2026/06/18/autojack-single-page-rce-host-running-ai-agent/","publisher":"Microsoft","context":"Microsoft's detailed technical analysis of the AutoJack vulnerability chain, including the three weaknesses and a proof-of-concept demonstration.","category":"advisory","primary":true}],"body":"\u003cp\u003eMicrosoft publicly detailed a vulnerability chain named AutoJack in its AutoGen Studio, a graphical interface for the open-source AutoGen multi-agent AI framework. The flaw could allow an attacker to execute arbitrary commands on a developer\u0026rsquo;s machine by tricking an AI agent into visiting a malicious webpage. Crucially, the vulnerability was discovered and fixed during development before any published PyPI release, so it never shipped in a package and only affected those who built directly from the GitHub main branch within a limited window.\u003c/p\u003e\n\n\u003cp\u003eThe AutoJack attack exploits three separate weaknesses. First, the MCP WebSocket server trusts connections originating from localhost, enabling a local browsing agent to be tricked into loading attacker-controlled JavaScript that appears to come from a trusted local source. Second, the authentication middleware deliberately excludes routes under /api/mcp/* from checks, and the MCP WebSocket endpoint itself does not implement its own authentication, leaving it accessible without credentials. Third, the WebSocket accepts a base64-encoded server_params value from the URL and passes it directly to the process-launching code, allowing an attacker to specify arbitrary PowerShell, Bash commands, or executables.\u003c/p\u003e\n\n\u003cp\u003eIn a demonstration, a malicious webpage caused the browsing agent to open a WebSocket connection to the local MCP endpoint and launch Windows Calculator with the developer\u0026rsquo;s privileges. The vulnerability\u0026rsquo;s impact was limited to developers who built from the main branch during the MCP plugin landing window; users installing from PyPI (including version 0.4.2.2) were never exposed. Microsoft advises deploying AutoGen Studio only as an isolated developer prototype, never exposing it to the internet, and running it under a low-privilege account in a sandboxed environment to contain any future agent-driven remote code execution.\u003c/p\u003e\n"},{"n":2,"title":"A Glimpse into the “Search Your Target” Market for Stolen Credentials","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/a-glimpse-into-the-search-your-target-market-for-stolen-credentials/","time":"14:05","priority":"MAY READ","score":60,"tldr":"A 'search your target' underground market lets attackers pay to query huge infostealer credential databases for specific companies or users, bypassing bulk dumps and enabling targeted account takeovers with minimal effort.","briefOverview":"\u003cp\u003eThe article describes an underground “search your target” market where threat actors turn massive infostealer credential collections into paid, on-demand search services. Based on an analysis of 470 forum posts from January 2025 to June 2026, researchers found dedicated sellers who act as credential brokers, sitting between raw log trading and account takeover. Buyers submit a specific company domain, login URL, geographic region, or email list, and sellers return matching username-password pairs and other credential formats filtered from databases claiming billions of lines.\u003c/p\u003e\n\n\u003cp\u003eSellers advertise daily updates, quick response times, and advanced enrichment that can combine separate email, password, and phone collections to provide tailored results. However, buyer feedback reveals a gap between marketing and delivery: actual record volumes are often far lower than promised, contain many duplicates, and include stale or dead credentials, sometimes sourced from freely distributed combo lists rather than exclusive fresh data.\u003c/p\u003e\n\n\u003cp\u003eThis outsourced searching capability lowers the effort and cost for attackers to obtain targeted access materials, overlapping with but distinct from the more expensive Initial Access Broker market, which sells validated, often MFA-bypassing access. Defenders face the challenge of identifying exposed credentials and access points before they are weaponized, and the article highlights that monitoring such underground channels can help organizations detect and close exposure paths earlier.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Researchers analyzed 470 underground forum posts and found an active service that lets buyers pay to search vast infostealer credential databases and receive only records matching a specific company, domain, platform, or geography.","Sellers advertise collections containing billions of lines and highlight daily updates and custom formatting, but buyers report that delivered results often have far lower volume, many duplicates, and stale or invalid credentials.","The service acts as a middle processing layer between raw malware-collected logs and account takeover, turning noisy credential dumps into targeted attack material.","While this market overlaps with the Initial Access Broker ecosystem, it typically provides cheaper, unvalidated credentials rather than the confirmed, often MFA-bypassing access sold by IABs.","The existence of this outsourced searching capability lowers the barrier for attackers to find usable credentials for specific targets, increasing the threat of account-based fraud and intrusion."],"insights":["A distinct middleman economy has emerged where specialized brokers operate a search-and-extract service that transforms torrents of infostealer logs into targeted credential lists, creating a processing layer that sits between raw data theft and account takeover.","Buyer feedback consistently shows that despite sellers advertising fresh, massive databases, delivered results are often riddled with duplicates, expired credentials, and data lifted from freely available combo lists, challenging the assumption that paid underground searches yield higher-quality access.","Service operators are adopting relational data techniques—combining separate email, phone, login, and password collections to enrich queries—so that even a narrow buyer input can be turned into a more complete set of access materials, increasing the danger from partial data.","The credential market is splitting into a low-cost, unvalidated 'search' service layer and a high-cost, white-glove Initial Access Broker tier that offers verified, MFA-bypassing corporate access, reflecting a stratified economy that caters to both opportunistic and well-funded attackers."],"referencedReports":[],"body":"\u003cp\u003eThe article describes an underground “search your target” market where threat actors turn massive infostealer credential collections into paid, on-demand search services. Based on an analysis of 470 forum posts from January 2025 to June 2026, researchers found dedicated sellers who act as credential brokers, sitting between raw log trading and account takeover. Buyers submit a specific company domain, login URL, geographic region, or email list, and sellers return matching username-password pairs and other credential formats filtered from databases claiming billions of lines.\u003c/p\u003e\n\n\u003cp\u003eSellers advertise daily updates, quick response times, and advanced enrichment that can combine separate email, password, and phone collections to provide tailored results. However, buyer feedback reveals a gap between marketing and delivery: actual record volumes are often far lower than promised, contain many duplicates, and include stale or dead credentials, sometimes sourced from freely distributed combo lists rather than exclusive fresh data.\u003c/p\u003e\n\n\u003cp\u003eThis outsourced searching capability lowers the effort and cost for attackers to obtain targeted access materials, overlapping with but distinct from the more expensive Initial Access Broker market, which sells validated, often MFA-bypassing access. Defenders face the challenge of identifying exposed credentials and access points before they are weaponized, and the article highlights that monitoring such underground channels can help organizations detect and close exposure paths earlier.\u003c/p\u003e\n"},{"n":3,"title":"JaredFromSubway MEV bot hacked in $15 million crypto theft","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/jaredfromsubway-mev-bot-hacked-in-15-million-crypto-theft/","time":"21:52","priority":"MAY READ","score":60,"tldr":"The JaredFromSubway Ethereum MEV bot was tricked into granting token approvals to a malicious contract through fake profitable trading opportunities, resulting in a $15 million theft of WETH, USDC, and USDT.","briefOverview":"\u003cp\u003eThe Ethereum MEV bot known as JaredFromSubway suffered a $15 million loss after an attacker exploited its automated trade-detection logic. Blockchain security firm Blockaid detected the incident, and the bot\u0026rsquo;s operator confirmed the attacker used fabricated pools and tokens to trick the system into granting ERC-20 token approvals to malicious helper contracts.\u003c/p\u003e\n\n\u003cp\u003eThe attacker conducted careful reconnaissance, first sending harmless test transactions to map the bot\u0026rsquo;s routines. Over time, they accumulated valid spending permissions, at one point securing approval for 92.1614 WETH, without immediately using them. Eventually, the attacker executed a series of drain transactions via the transferFrom function, siphoning WETH, USDC, and USDT from the bot\u0026rsquo;s contract.\u003c/p\u003e\n\n\u003cp\u003eJaredFromSubway is one of Ethereum\u0026rsquo;s most aggressive sandwich bots, profiting by front-running ordinary traders\u0026rsquo; transactions. Following the theft, the operator offered a \u003cspan class=\"math inline\"\u003e\\(3 million bounty for the full return of funds, later increasing it to \\)\u003c/span\u003e7.5 million for half, and entered negotiations with a white-hat hacking group, though no deal has been confirmed.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The JaredFromSubway MEV bot lost $15 million after an attacker manipulated its opportunity-detection logic with fake pools and tokens.","The attacker tricked the bot into granting ERC-20 token approvals to helper contracts, accumulating valid permissions without immediately using them.","After building up allowances, the attacker drained WETH, USDC, and USDT from the bot contract using the transferFrom function.","JaredFromSubway initially offered a $3 million bounty, then raised it to $7.5 million for returning 50% of the funds, and is currently negotiating with a white-hat group."],"insights":["The attacker first sent harmless test transactions to confirm the bot's automated routines before executing the actual theft, demonstrating careful reconnaissance against an automated system.","The attacker accumulated spending permissions incrementally up to 92.1614 WETH without immediately using them, avoiding early detection before the final drain.","Even aggressive MEV bots that profit by exploiting regular traders' transactions can themselves fall victim to the same automated approval mechanisms they depend on.","Despite the sophistication of on-chain automation, recovery of stolen funds still relies on informal negotiation and bounties rather than any technical reversal capability.","The attack targeted the bot's core opportunity-detection logic rather than a key compromise or phishing vector, exploiting the very automation meant to generate profit."],"referencedReports":[],"body":"\u003cp\u003eThe Ethereum MEV bot known as JaredFromSubway suffered a $15 million loss after an attacker exploited its automated trade-detection logic. Blockchain security firm Blockaid detected the incident, and the bot\u0026rsquo;s operator confirmed the attacker used fabricated pools and tokens to trick the system into granting ERC-20 token approvals to malicious helper contracts.\u003c/p\u003e\n\n\u003cp\u003eThe attacker conducted careful reconnaissance, first sending harmless test transactions to map the bot\u0026rsquo;s routines. Over time, they accumulated valid spending permissions, at one point securing approval for 92.1614 WETH, without immediately using them. Eventually, the attacker executed a series of drain transactions via the transferFrom function, siphoning WETH, USDC, and USDT from the bot\u0026rsquo;s contract.\u003c/p\u003e\n\n\u003cp\u003eJaredFromSubway is one of Ethereum\u0026rsquo;s most aggressive sandwich bots, profiting by front-running ordinary traders\u0026rsquo; transactions. Following the theft, the operator offered a \u003cspan class=\"math inline\"\u003e\\(3 million bounty for the full return of funds, later increasing it to \\)\u003c/span\u003e7.5 million for half, and entered negotiations with a white-hat hacking group, though no deal has been confirmed.\u003c/p\u003e\n"},{"n":6,"title":"Microsoft says Windows 11 26H2 is coming soon, details upgrade process","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-says-windows-11-26h2-is-coming-soon-details-upgrade-process/","time":"17:41","priority":"MAY READ","score":60,"tldr":"Microsoft announced Windows 11 26H2 as the next feature update, which will roll out via a small enablement package for devices already on 24H2 or 25H2, while older versions require a full upgrade.","briefOverview":"\u003cp\u003eMicrosoft has announced Windows 11 version 26H2 as the upcoming annual feature update. It is currently being tested with Windows Insiders in the Dev Channel, and the company says the release is coming soon, continuing a focus on predictable, low-disruption update experiences for IT professionals and organizations. No general availability date has been set, but previous H2 releases arrived in the fall.\u003c/p\u003e\n\n\u003cp\u003eA key detail is the upgrade path: devices already running Windows 11 24H2 or 25H2 can move to 26H2 via a tiny 174 KB enablement package that simply activates dormant features already present on the system. This is possible because versions 24H2, 25H2, and 26H2 all share the same underlying servicing branch and codebase. The update requires only a quick restart and changes the OS build number to 26300.\u003c/p\u003e\n\n\u003cp\u003eSystems still on Windows 11 23H2 or older do not share that common branch and must download a full 6.5 GB update. Microsoft has not announced any changes to Windows 11 hardware requirements for 26H2, and the new servicing model is detailed in a freshly published whitepaper on shared servicing. This approach dramatically reduces bandwidth and downtime for devices that have kept pace with recent updates.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Microsoft is testing Windows 11 version 26H2 with Windows Insiders in the Dev Channel ahead of its upcoming release.","Devices running Windows 11 24H2 or 25H2 can upgrade to 26H2 through a 174 KB enablement package that requires only a restart, while older versions need a full 6.5 GB update.","Windows 11 versions 24H2, 25H2, and 26H2 share the same servicing branch, which allows the lightweight enablement package upgrade.","Microsoft has not announced any changes to Windows 11's hardware requirements for version 26H2."],"insights":["Windows 11 24H2 and 25H2 share the same servicing branch as 26H2, enabling a direct upgrade from 24H2 to 26H2 without installing the intermediate 25H2 release first.","The upgrade for devices already on that branch uses a 174 KB enablement package that simply toggles dormant features, meaning the full 26H2 feature set is already present on those systems.","Microsoft’s silence on hardware requirement changes for 26H2 suggests current minimum specs remain unchanged, extending the support runway for existing machines."],"referencedReports":[{"title":"Windows Updates and the Shared Servicing Model V1.3","url":"https://techcommunity.microsoft.com/t5/s/gxcuf89792/attachments/gxcuf89792/Windows-ITPro-blog/10109/1/Windows%20Updates%20and%20the%20Shared%20Servicing%20Model%20V1.3.pdf","publisher":"Microsoft","context":"The article references this whitepaper as the source for the shared servicing model confirming that Windows 11 versions 24H2, 25H2, and 26H2 share the same servicing branch, enabling the small enablement package upgrade path.","category":"research","primary":true}],"body":"\u003cp\u003eMicrosoft has announced Windows 11 version 26H2 as the upcoming annual feature update. It is currently being tested with Windows Insiders in the Dev Channel, and the company says the release is coming soon, continuing a focus on predictable, low-disruption update experiences for IT professionals and organizations. No general availability date has been set, but previous H2 releases arrived in the fall.\u003c/p\u003e\n\n\u003cp\u003eA key detail is the upgrade path: devices already running Windows 11 24H2 or 25H2 can move to 26H2 via a tiny 174 KB enablement package that simply activates dormant features already present on the system. This is possible because versions 24H2, 25H2, and 26H2 all share the same underlying servicing branch and codebase. The update requires only a quick restart and changes the OS build number to 26300.\u003c/p\u003e\n\n\u003cp\u003eSystems still on Windows 11 23H2 or older do not share that common branch and must download a full 6.5 GB update. Microsoft has not announced any changes to Windows 11 hardware requirements for 26H2, and the new servicing model is detailed in a freshly published whitepaper on shared servicing. This approach dramatically reduces bandwidth and downtime for devices that have kept pace with recent updates.\u003c/p\u003e\n"},{"n":9,"title":"Stop Your Legacy Infrastructure from Hijacking Your AI Agents","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/stop-your-legacy-infrastructure-from.html","time":"11:58","priority":"MAY READ","score":60,"tldr":"Attackers can compromise AI agents by chaining legacy infrastructure exposures—unpatched servers, Active Directory misconfigurations, and overprivileged cloud credentials—to reach the data and permissions agents depend on, without ever directly attacking the AI layer itself.","briefOverview":"\u003cp\u003eAI agents rely on existing enterprise infrastructure—Active Directory, cloud IAM, service accounts, and stored credentials—that was never designed for them and often carries unaddressed security debt. As organizations rapidly deploy AI agents, many overlook this blind spot, focusing on AI-specific threats while attackers exploit the legacy layers underneath. The author highlighted this at the Gartner Security \u0026amp; Risk Management Summit, noting that 71% of organizations are piloting AI agents and 31% have moved them into production workflows.\u003c/p\u003e\n\n\u003cp\u003eAn example attack path shows how an unpatched Apache Tomcat server vulnerable to CVE-2025-24813 on the perimeter allows an attacker to dump cached credentials, abuse an Active Directory Resource-Based Constrained Delegation misconfiguration to move laterally, harvest AWS keys from a developer’s machine, and access a production S3 bucket that feeds an AI Co-Pilot’s knowledge base. None of the AI stack was directly targeted; instead, three moderate findings—an overprivileged cloud key, an unpatched web server, and an AD misconfiguration—chained into a critical compromise that lets the attacker control what the agent reads and returns.\u003c/p\u003e\n\n\u003cp\u003eThe article underscores that 70% of organizations grant AI systems more privileged access than a human in the same role, leading to a 76% incident rate versus 17% when enforcing least privilege. To address these risks, security teams should treat AI agent dependencies as critical assets and map backward through identity, permissions, and infrastructure to identify exploitable connections. Finding choke points—places where a single fix severs multiple attack paths—is essential, because each new AI agent compounds the attack surface by connecting to already exposed legacy environments.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["AI agents inherit existing security debt because they depend on identity providers, cloud storage, Lambda functions, and IAM roles that were provisioned long before AI deployment and were not designed with AI agents in mind.","An attacker can compromise an AI agent by exploiting a chain of legacy exposures—a vulnerable Apache Tomcat server (CVE-2025-24813), an Active Directory Resource-Based Constrained Delegation misconfiguration, and overprivileged AWS keys—to access the S3 bucket that feeds the agent’s knowledge base, without ever attacking the AI layer directly.","Most security programs assess network, identity, cloud, and AI layers independently, causing individual moderate findings such as an unpatched server, an AD misconfiguration, and excessive S3 permissions to go unrecognized as a combined critical attack path.","Organizations can block these attack paths by treating AI agent dependencies as critical assets and mapping backward from them to identify exploitable connections and choke points where a single fix can sever multiple routes.","The attack surface compounds with every new AI agent deployed because each agent connects to infrastructure that is already exposed, handing attackers a way to use old techniques against new AI systems."],"insights":["Attackers can compromise an AI agent's output by poisoning its knowledge base through legacy infrastructure, without ever targeting the AI model itself, making AI security fundamentally an infrastructure problem.","Three individually moderate findings—an unpatched CVE, an AD delegation misconfiguration, and excessive S3 permissions—combine into a critical attack path that security programs miss because they assess network, identity, and cloud layers independently.","Organizations that grant AI systems more privileges than a human in the same role suffer a 76% incident rate versus 17% for those enforcing least privilege, suggesting that right-sizing AI access is one of the most impactful risk reduction steps available.","Mapping attack paths backward from AI agent dependencies to legacy infrastructure reveals choke points where a single fix severs multiple routes, providing a remediation strategy that does not require AI-specific security tooling.","Every new AI agent deployed connects to infrastructure that is almost certainly already exposed, causing the overall attack surface to compound with each deployment and giving attackers a way to reach AI assets through old vulnerabilities."],"referencedReports":[],"body":"\u003cp\u003eAI agents rely on existing enterprise infrastructure—Active Directory, cloud IAM, service accounts, and stored credentials—that was never designed for them and often carries unaddressed security debt. As organizations rapidly deploy AI agents, many overlook this blind spot, focusing on AI-specific threats while attackers exploit the legacy layers underneath. The author highlighted this at the Gartner Security \u0026amp; Risk Management Summit, noting that 71% of organizations are piloting AI agents and 31% have moved them into production workflows.\u003c/p\u003e\n\n\u003cp\u003eAn example attack path shows how an unpatched Apache Tomcat server vulnerable to CVE-2025-24813 on the perimeter allows an attacker to dump cached credentials, abuse an Active Directory Resource-Based Constrained Delegation misconfiguration to move laterally, harvest AWS keys from a developer’s machine, and access a production S3 bucket that feeds an AI Co-Pilot’s knowledge base. None of the AI stack was directly targeted; instead, three moderate findings—an overprivileged cloud key, an unpatched web server, and an AD misconfiguration—chained into a critical compromise that lets the attacker control what the agent reads and returns.\u003c/p\u003e\n\n\u003cp\u003eThe article underscores that 70% of organizations grant AI systems more privileged access than a human in the same role, leading to a 76% incident rate versus 17% when enforcing least privilege. To address these risks, security teams should treat AI agent dependencies as critical assets and map backward through identity, permissions, and infrastructure to identify exploitable connections. Finding choke points—places where a single fix severs multiple attack paths—is essential, because each new AI agent compounds the attack surface by connecting to already exposed legacy environments.\u003c/p\u003e\n"},{"n":40,"title":"MCP Token Theft in Claude Code: A Man-in-the-Middle Attack Chain","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/claude-code-mcp-token-theft-mitm","time":"20:35","priority":"MAY READ","score":55,"tldr":"An attacker who compromises a developer's machine (e.g., via a malicious npm package) can silently rewrite Claude Code's MCP server config to proxy OAuth tokens through attacker infrastructure, surviving token rotation and appearing as legitimate traffic from Anthropic's egress IPs.","briefOverview":"\u003cp\u003eA malicious npm package can exploit its postinstall lifecycle hook to silently modify the Claude Code configuration file (~/.claude.json). The hook seeds a pre-approved trust state for specific project directories and rewrites MCP server URLs to point to an attacker-controlled proxy. This redirection means that when Claude Code performs an OAuth flow for services like Jira or Confluence, the bearer token transits the attacker\u0026rsquo;s infrastructure, giving the adversary a valid, long-lived credential that appears legitimate to the provider.\u003c/p\u003e\n\n\u003cp\u003ePersistence is built into the attack because the injected hook runs every time Claude Code loads, reasserting the proxy configuration and re-capturing tokens even after rotation. The token theft is especially dangerous because all subsequent MCP requests appear to come from Anthropic\u0026rsquo;s egress IP addresses, making the malicious activity indistinguishable from normal usage in SaaS audit logs. The attacker can then use the stolen token to interact with connected applications, staying hidden while abusing the victim\u0026rsquo;s access.\u003c/p\u003e\n\n\u003cp\u003eDefenders face a detection challenge because the chain uses only expected OS operations and file edits, avoiding privilege escalation or memory exploits. Anthropic classified the issue as out-of-scope, as initial code execution on the endpoint is required, but security teams are advised to monitor for changes to Claude Code configuration, unexpected MCP endpoints, new localhost proxies, and anomalous SaaS activity that doesn\u0026rsquo;t match the user\u0026rsquo;s typical work patterns.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A malicious npm package can use its postinstall hook to rewrite the MCP server URLs inside the user's ~/.claude.json file, pointing them to an attacker-controlled proxy.","The proxy captures OAuth bearer tokens for services like Atlassian Jira and Confluence, giving the attacker authenticated access to the victim's SaaS accounts.","The attack persists through token rotation because the hook rewrites the proxy configuration on every Claude Code session start, intercepting each new OAuth refresh flow.","The stolen session traffic exits through Anthropic's egress IPs, making unauthorized actions look like legitimate, trusted activity in SaaS audit logs.","Anthropic deemed the issue out-of-scope because it requires initial user-level code execution, but defenders are advised to monitor for config changes, unexpected MCP endpoints, and unusual SaaS activity."],"insights":["A single user-writable configuration file (~/.claude.json) controls both OAuth token storage and security prompts, making it a high-value target for attackers.","The use of Anthropic's egress IPs means that even geographically anomalous access patterns are masked, as all traffic appears to originate from trusted infrastructure.","The attack's reliance on standard file operations and config edits means it can bypass endpoint protection systems that look for privileged escalation or memory exploits."],"referencedReports":[],"body":"\u003cp\u003eA malicious npm package can exploit its postinstall lifecycle hook to silently modify the Claude Code configuration file (~/.claude.json). The hook seeds a pre-approved trust state for specific project directories and rewrites MCP server URLs to point to an attacker-controlled proxy. This redirection means that when Claude Code performs an OAuth flow for services like Jira or Confluence, the bearer token transits the attacker\u0026rsquo;s infrastructure, giving the adversary a valid, long-lived credential that appears legitimate to the provider.\u003c/p\u003e\n\n\u003cp\u003ePersistence is built into the attack because the injected hook runs every time Claude Code loads, reasserting the proxy configuration and re-capturing tokens even after rotation. The token theft is especially dangerous because all subsequent MCP requests appear to come from Anthropic\u0026rsquo;s egress IP addresses, making the malicious activity indistinguishable from normal usage in SaaS audit logs. The attacker can then use the stolen token to interact with connected applications, staying hidden while abusing the victim\u0026rsquo;s access.\u003c/p\u003e\n\n\u003cp\u003eDefenders face a detection challenge because the chain uses only expected OS operations and file edits, avoiding privilege escalation or memory exploits. Anthropic classified the issue as out-of-scope, as initial code execution on the endpoint is required, but security teams are advised to monitor for changes to Claude Code configuration, unexpected MCP endpoints, new localhost proxies, and anomalous SaaS activity that doesn\u0026rsquo;t match the user\u0026rsquo;s typical work patterns.\u003c/p\u003e\n"},{"n":21,"title":"SpecterOps and OpenAI: Helping to Build a New Security Frontier with Daybreak","source":"specterops.io","sourceColorIdx":1,"link":"https://specterops.io/blog/2026/06/22/specterops-openai-daybreak-ai-cyber-innovation/","time":"17:09","priority":"MAY READ","score":54,"tldr":"SpecterOps is partnering with OpenAI to embed frontier AI into BloodHound, letting defenders prioritize attack paths based on adversarial intent rather than graph structure, and to surface configuration debt that makes identity environments unclear to their own operators.","briefOverview":"\u003cp\u003eSpecterOps has deepened its collaboration with OpenAI, moving from the Trusted Access for Cyber program into the newly announced Daybreak Cyber Partner Program. The partnership gives SpecterOps researchers access to frontier AI models for defensive cybersecurity use cases, with a focus on embedding those capabilities into the BloodHound attack path management platform. The goal is to solve the triage problem that arises when environments surface millions or billions of attack paths: helping defenders understand which paths matter most and in what order to close them.\u003c/p\u003e\n\n\u003cp\u003eThe core technical shift is moving away from prioritization based purely on graph structure and toward reasoning from adversary intent. By applying AI that understands how attackers make decisions in context—what credentials are accessible, where monitoring exists, how trust relationships create compound risk—BloodHound can surface prioritized remediation guidance and identify enclaves worth protecting. In parallel, SpecterOps is exploring automated discovery of configuration debt that obscures the true shape of identity environments, and its GhostWorks lab is using OpenAI capabilities to reverse engineer attacker tooling. Underpinning this work is a joint effort to define safety and abuse prevention standards for embedded AI in security tooling, reflecting the recognition that adversaries using AI will compress attack timelines, and defenders must adopt the same capabilities or fall behind.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["SpecterOps is expanding its collaboration with OpenAI through the new Daybreak Cyber Partner Program, building on its earlier participation in the Trusted Access for Cyber program.","The partnership focuses on integrating AI into BloodHound to triage attack paths by reasoning from adversary intent, rather than relying solely on graph structure, to surface prioritized remediation guidance.","SpecterOps is exploring automated discovery of configuration debt within BloodHound to help organizations accurately characterize their identity environments, including identifying correlated systems, dense identity groupings, and structural blind spots.","The GhostWorks AI cyber innovation lab is using OpenAI's frontier capabilities to automate reverse engineering of attacker tooling and implanted software, with the goal of improving endpoint coverage.","SpecterOps is working with OpenAI to define safety and abuse prevention standards for embedding AI inside security tooling, including access controls, output scoping, and monitoring."],"insights":["Prioritizing attack paths by reasoning from adversary intent, instead of graph topology, can yield radically different and more operationally relevant risk conclusions than structural analysis alone.","Many organizations have accumulated so much undocumented configuration debt over a decade of incremental changes that they cannot accurately characterize the shape of their own identity environment, leaving them to secure a network they do not fully understand.","Embedding AI into security tooling introduces control and safety risks that must be solved at the design stage—through access scoping, output filtering, and monitoring—rather than added after the fact.","AI is compressing the time between initial access and material impact, meaning defenders who do not adopt frontier AI capabilities will be outpaced by adversaries who do."],"referencedReports":[],"body":"\u003cp\u003eSpecterOps has deepened its collaboration with OpenAI, moving from the Trusted Access for Cyber program into the newly announced Daybreak Cyber Partner Program. The partnership gives SpecterOps researchers access to frontier AI models for defensive cybersecurity use cases, with a focus on embedding those capabilities into the BloodHound attack path management platform. The goal is to solve the triage problem that arises when environments surface millions or billions of attack paths: helping defenders understand which paths matter most and in what order to close them.\u003c/p\u003e\n\n\u003cp\u003eThe core technical shift is moving away from prioritization based purely on graph structure and toward reasoning from adversary intent. By applying AI that understands how attackers make decisions in context—what credentials are accessible, where monitoring exists, how trust relationships create compound risk—BloodHound can surface prioritized remediation guidance and identify enclaves worth protecting. In parallel, SpecterOps is exploring automated discovery of configuration debt that obscures the true shape of identity environments, and its GhostWorks lab is using OpenAI capabilities to reverse engineer attacker tooling. Underpinning this work is a joint effort to define safety and abuse prevention standards for embedded AI in security tooling, reflecting the recognition that adversaries using AI will compress attack timelines, and defenders must adopt the same capabilities or fall behind.\u003c/p\u003e\n"},{"n":14,"title":"⚡ Weekly Recap: Browser Bugs, EDR Killers, TV Botnet, OpenBSD Flaw, Android Trojan, and More","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/weekly-recap-browser-bugs-edr-killers.html","time":"10:55","priority":"MAY READ","score":40,"tldr":"This week's cyber threats used basic, low-effort tactics such as stolen credentials, abused app integrations, and compromised WordPress plugins, proving that most attacks don't require sophistication—just a missed basic hygiene step.","briefOverview":"\u003cp\u003eThis week’s cyber threat landscape was dominated by attacks that required little sophistication—just stale credentials, abused app integrations, and compromised websites. The FortiBleed campaign systematically scanned and compromised over 80,000 Fortinet VPN and firewall devices by reusing leaked passwords and brute-forcing systems that lacked multi-factor authentication. The Gentlemen ransomware group distributed an in-house tool called GentleKiller to affiliates, capable of terminating processes of 48 different endpoint detection and response products before encryption begins.\u003c/p\u003e\n\n\u003cp\u003eA supply chain attack hijacked the Okendo Reviews widget, used by more than 18,000 brands, to inject malicious JavaScript that ultimately delivered malware through fake browser update prompts. Separately, a 27-year-old authentication bypass in OpenBSD’s PPP stack was discovered, allowing attackers to skip password checks entirely by simply sending zero-length username and password fields. These incidents demonstrate that even foundational, long-trusted software components can hide critical vulnerabilities for decades.\u003c/p\u003e\n\n\u003cp\u003eThe Popa Android botnet, attributed to a publicly traded Israeli company, transformed millions of TV boxes into residential proxy exit nodes for ad fraud and web scraping, blurring the boundary between commercial services and malware. Mobile trojans like Rokarolla misused Android accessibility services and fake overlay screens to steal banking and cryptocurrency credentials, even disguising the infection as a Google Play Protect prompt. Across every campaign, the common thread was that attackers exploited small gaps—weak passwords, over-privileged plugins, unpatched systems—and therefore basic security hygiene remains the most effective defense.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The FortiBleed campaign compromised over 80,000 Fortinet devices by exploiting reused credentials and brute-forcing passwords on systems without multi-factor authentication.","The Gentlemen ransomware group developed an EDR killer framework called GentleKiller that can terminate security processes from 48 different products, including CrowdStrike and Microsoft Defender.","A 27-year-old authentication bypass flaw in OpenBSD's PPP stack allows attackers to completely skip password authentication by sending zero-length name and password fields.","The Popa Android TV box botnet turned millions of consumer devices into residential proxy nodes for ad fraud and scraping, and was linked to the publicly traded Israeli company Alarum Technologies.","The Rokarolla Android trojan targets 217 banking and cryptocurrency apps using fake overlay screens and accessibility services to steal credentials and give attackers full remote control."],"insights":["A 27-year-old authentication bypass in OpenBSD's PPP stack went undetected for decades, proving that even mature, trusted code can harbor critical flaws, and underscoring the need to audit legacy components.","The Popa botnet operated as a commercial residential proxy SDK by a publicly traded company, blurring the line between legitimate services and malware and complicating efforts to detect and attribute malicious infrastructure.","The ErrTraffic traffic distribution system uses EtherHiding to store command-and-control locations on the blockchain, creating a decentralized dead drop that resists traditional takedown methods.","A supply chain attack hijacked the Okendo Reviews widget—used by 18,000+ brands—to load malicious JavaScript and ultimately deliver malware, showing how compromising a single trusted third-party integration can expose many organizations.","The Rokarolla Android trojan disguises its installation process as Google Play Protect, tricking users into granting accessibility permissions and bypassing Android security prompts that would otherwise block the malware."],"referencedReports":[{"title":"CVE-2026-20253: Splunk Enterprise Pre-Authentication Remote Code Execution","url":"https://www.resecurity.com/blog/article/cve-2026-20253-splunk-enterprise-pre-authentication-remote-code-execution","publisher":"Resecurity","context":"In an analysis of the vulnerability, Resecurity described it as 'particularly dangerous' and explained how chaining weaknesses could lead to remote code execution.","category":"research","primary":false},{"title":"Spyder and MaXSS Chrome Extension Vulnerabilities Put Millions at Risk","url":"https://rebora.io/blog/spyder-and-maxss-chrome-extension-vulnerabilities-put-millions-at-risk/","publisher":"Rebora","context":"Rebora disclosed critical vulnerabilities in SiderAI (Spyder) and MaxAI (MaXSS) Chrome extensions that could allow arbitrary screenshots, code execution, and account takeover.","category":"research","primary":false},{"title":"Finding Popa","url":"https://www.qurium.org/forensics/finding-popa/","publisher":"Qurium","context":"Qurium identified the Popa residential proxy botnet and traced its operation, collaborating with other researchers.","category":"research","primary":false},{"title":"RoboVPN \u0026 NeuNative Report","url":"https://github.com/deepfield/public-research/blob/main/reports/2026-06-18-robovpn-neunative.md","publisher":"Nokia Deepfield Emergency Response Team","context":"Nokia Deepfield published a report on the Popa botnet, describing it as residential proxy software that turns consumer devices into internet relay nodes.","category":"research","primary":false},{"title":"Popa: From Sourcing to Distribution","url":"https://synthient.com/blog/popa-from-sourcing-to-distribution","publisher":"Synthient","context":"Synthient analyzed the Popa botnet's sourcing and distribution network as part of the coordinated investigation.","category":"research","primary":false},{"title":"Prinz Eugen Ransomware: A Deep Dive into a New Go-based Encryptor","url":"https://www.threatdown.com/blog/prinz-eugen-ransomware-a-deep-dive-into-a-new-go-based-encryptor/","publisher":"Malwarebytes Threatdown","context":"Malwarebytes detailed the Prinz Eugen ransomware, which targets recently modified files and uses ChaCha20-Poly1305 encryption, attributed to the actor ROOTBOY.","category":"research","primary":false},{"title":"SmartApeSG Launches Okendo Reviews Supply Chain Attack","url":"https://www.zscaler.com/blogs/security-research/smartapesg-launches-okendo-reviews-supply-chain-attack","publisher":"Zscaler","context":"Zscaler reported on the compromise of the Okendo Reviews widget by SmartApeSG, which injected malicious JavaScript to deploy malware via fake ClickFix prompts.","category":"research","primary":false},{"title":"ClickFix Campaign Generated by AI Delivers SmartRAT","url":"https://www.zscaler.com/blogs/security-research/clickfix-campaign-generated-ai-delivers-smartrat","publisher":"Zscaler","context":"Zscaler described a ClickFix campaign using AI-generated typosquatting websites to deliver the SmartRAT (Banana RAT) malware.","category":"research","primary":false},{"title":"UnregStealer: Human-Operated Browser Credential Theft Targeting Brazilian Banking","url":"https://www.ibm.com/think/news/unregstealer-human-operated-browser-credential-theft-targeting-brazilian-banking","publisher":"IBM X-Force","context":"IBM X-Force revealed the UnregStealer trojan, a human-operated campaign that uses social engineering and a malicious Chrome extension to steal credentials from Brazilian banks.","category":"research","primary":false},{"title":"OverlordMX: New Social Engineering Campaign Targeting LATAM","url":"https://www.ibm.com/think/news/overlordmx-new-social-engineering-campaign-targeting-latam","publisher":"IBM X-Force","context":"IBM X-Force reported on OverlordMX, an adversary-in-the-middle JavaScript framework that uses a human operator to trigger fake login overlays for LATAM financial institutions.","category":"research","primary":false},{"title":"Pushka Malware: Cannon Knows How to Fire Back","url":"https://www.ibm.com/think/news/pushka-malware-cannon-knows-how-fire-back","publisher":"IBM X-Force","context":"IBM X-Force detailed Pushka, an Android malware that uses fake TV apps as droppers to perform on-device fraud and remote access via accessibility services.","category":"research","primary":false},{"title":"Invisible Thief: Sophisticated Browser Extension Emptying Bank Accounts","url":"https://www.ibm.com/think/news/invisible-thief-sophisticated-browser-extension-emptying-bank-accounts","publisher":"IBM X-Force","context":"IBM X-Force described a sophisticated browser extension trojan targeting Australian banking customers by altering displayed balances and intercepting OTPs within authenticated sessions.","category":"research","primary":false},{"title":"More Sophistication, Less Slop: Russian and Chinese Malign Influence Actors Are Working Smarter in the Age of AI","url":"https://twosixtech.com/blog/more-sophistication-less-slop-russian-and-chinese-malign-influence-actors-are-working-smarter-in-the-age-of-ai/","publisher":"Two Six Technologies","context":"Two Six Technologies found that Russian and Chinese influence operations are using AI to improve content quality, reduce bot-like behavior, and mimic human activity.","category":"research","primary":false},{"title":"Operation Escaneo: Mexican Government \u0026 Financial Institutions Cyberattack","url":"https://www.cloudsek.com/blog/operation-escaneo-mexican-government-financial-institutions-cyberattack","publisher":"CloudSEK","context":"CloudSEK exposed Operation Escaneo, a sophisticated campaign targeting Mexican government and financial organizations using a proprietary reconnaissance engine and multiple persistence mechanisms.","category":"research","primary":false},{"title":"OpenBSD PAP 27-Year Auth Bypass","url":"https://blog.argus-systems.ai/blog/openbsd-pap-27-year-auth-bypass.html","publisher":"Argus Systems","context":"Argus discovered a 27-year-old authentication bypass flaw in OpenBSD's PPP stack that completely sidesteps Password Authentication Protocol by sending zero-length credentials.","category":"research","primary":false},{"title":"Oops… I Weaponized the Database: Abusing AI Features in MSSQL 2025","url":"https://specterops.io/blog/2026/06/10/oops-i-weaponized-the-database-abusing-ai-features-in-mssql-2025/#h-defensive-considerations","publisher":"SpecterOps","context":"SpecterOps demonstrated that native AI features in Microsoft SQL Server 2025 can be abused for command-and-control and data exfiltration by an attacker with sysadmin privileges.","category":"research","primary":false},{"title":"Unveiling ErrTraffic: Inside a Growing ClickFix Malware Distribution Framework","url":"https://blog.sekoia.io/unveiling-errtraffic-inside-a-growing-clickfix-malware-distribution-framework/#h-backdoor","publisher":"Sekoia","context":"Sekoia analyzed the ErrTraffic traffic distribution system, which uses EtherHiding and compromised WordPress sites to distribute stealers and loaders via ClickFix lures.","category":"research","primary":false},{"title":"Malicious LNK Files Disguised as Resumes Deliver Xctdoor Malware","url":"https://asec.ahnlab.com/ko/94163/","publisher":"AhnLab","context":"AhnLab disclosed a campaign using malicious shortcuts disguised as resumes to drop additional scripts and deploy the Xctdoor backdoor via DLL side-loading.","category":"research","primary":false},{"title":"Bypassing Microsoft Entra Conditional Access Policies via Nested App Authentication","url":"https://www.netspi.com/blog/technical-blog/cloud-pentesting/bypassing-microsoft-entra-conditional-access-policies-via-nested-app-authentication/","publisher":"NetSPI","context":"NetSPI found a flaw in Microsoft Entra that allowed bypassing Conditional Access Policies using nested app authentication flows, which could serve as a persistence mechanism.","category":"research","primary":false},{"title":"GitBait: Phishing Campaign Targeting Mexican Banking \u0026 Finance","url":"https://www.group-ib.com/blog/gitbait-phishing-mexico-banking-finance/","publisher":"Group-IB","context":"Group-IB reported on a three-year-old phishing campaign called GitBait that abuses GitHub Pages and a serverless architecture to steal financial credentials from Mexican banks.","category":"research","primary":false},{"title":"Anatomy of a Deno RAT","url":"https://labs.infoguard.ch/posts/anatomy_deno_rat/","publisher":"InfoGuard Labs","context":"InfoGuard Labs analyzed a Deno-based remote access trojan and TCP proxy framework delivered via email bombing and fake Microsoft Teams calls.","category":"research","primary":false}],"body":"\u003cp\u003eThis week’s cyber threat landscape was dominated by attacks that required little sophistication—just stale credentials, abused app integrations, and compromised websites. The FortiBleed campaign systematically scanned and compromised over 80,000 Fortinet VPN and firewall devices by reusing leaked passwords and brute-forcing systems that lacked multi-factor authentication. The Gentlemen ransomware group distributed an in-house tool called GentleKiller to affiliates, capable of terminating processes of 48 different endpoint detection and response products before encryption begins.\u003c/p\u003e\n\n\u003cp\u003eA supply chain attack hijacked the Okendo Reviews widget, used by more than 18,000 brands, to inject malicious JavaScript that ultimately delivered malware through fake browser update prompts. Separately, a 27-year-old authentication bypass in OpenBSD’s PPP stack was discovered, allowing attackers to skip password checks entirely by simply sending zero-length username and password fields. These incidents demonstrate that even foundational, long-trusted software components can hide critical vulnerabilities for decades.\u003c/p\u003e\n\n\u003cp\u003eThe Popa Android botnet, attributed to a publicly traded Israeli company, transformed millions of TV boxes into residential proxy exit nodes for ad fraud and web scraping, blurring the boundary between commercial services and malware. Mobile trojans like Rokarolla misused Android accessibility services and fake overlay screens to steal banking and cryptocurrency credentials, even disguising the infection as a Google Play Protect prompt. Across every campaign, the common thread was that attackers exploited small gaps—weak passwords, over-privileged plugins, unpatched systems—and therefore basic security hygiene remains the most effective defense.\u003c/p\u003e\n"},{"n":24,"title":"22nd June – Threat Intelligence Report","source":"research.checkpoint.com","sourceColorIdx":4,"link":"https://research.checkpoint.com/2026/22nd-june-threat-intelligence-report/","time":"16:00","priority":"MAY READ","score":40,"tldr":"A third-party breach exposed over 3 million Texans' driver's license data, while active exploitation of critical vulnerabilities in FortiSandbox, Microsoft Defender, Cisco SD-WAN Manager, and Splunk Enterprise demands immediate patching.","briefOverview":"\u003cp\u003eThe week\u0026rsquo;s most impactful incident is a third-party data breach at the Texas Parks and Wildlife Department that exposed driver\u0026rsquo;s license numbers, passport details, phone numbers, and residential addresses of over 3 million hunting and fishing license holders. A supply chain attack against WordPress plugin vendor ShapedPlugin used the official update mechanism to deliver malware that stole admin and database credentials along with two-factor authentication tokens. Meanwhile, market intelligence platform Klue confirmed attackers leveraged compromised legacy integration credentials to steal OAuth tokens and exfiltrate sales data from clients including Huntress, Recorded Future, Tanium, and Jamf, with the Icarus extortion group claiming responsibility.\u003c/p\u003e\n\n\u003cp\u003eActive exploitation of critical vulnerabilities demands immediate attention: unauthenticated API requests can achieve root-level command execution on Fortinet FortiSandbox, a publicly demonstrated zero-day in Microsoft Defender enables privilege escalation to SYSTEM on fully updated Windows 10 and 11, and authenticated attackers can exploit an arbitrary file write in Cisco Catalyst SD-WAN Manager to potentially reach root. Additionally, a critical Splunk Enterprise flaw is under limited exploitation and can lead to remote code execution through file operations. All four products have patches available or in development.\u003c/p\u003e\n\n\u003cp\u003eThe report also details emerging AI threats, most notably AutoJack—a technique allowing a malicious web page to turn an AI browsing agent into a remote code execution vector by abusing localhost trust and missing authentication in AutoGen Studio\u0026rsquo;s WebSocket interface. Separately, the SearchLeak prompt injection method exfiltrated emails, authentication codes, and SharePoint files via a crafted link sent to Microsoft 365 Copilot Search. Check Point\u0026rsquo;s own research contributions unmask a Rust-based crypto clipboard hijacker promoted through fake reputation and amplifies awareness of seasonal travel phishing and Amazon Prime Day scams.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A third-party data breach at the Texas Parks and Wildlife Department exposed driver's license numbers, passport numbers, and other personal data of over 3 million hunting and fishing license customers.","Multiple vulnerabilities are under active exploitation, including critical flaws in Fortinet FortiSandbox (root command execution), Microsoft Defender (privilege escalation), Cisco Catalyst SD-WAN Manager (arbitrary file write), and Splunk Enterprise (remote code execution via file operations).","A supply chain attack on ShapedPlugin's WordPress update mechanism delivered malware that stole administrator credentials, database credentials, and two-factor authentication codes through a hidden fake WooCommerce plugin.","Klue confirmed a breach where attackers used compromised legacy credentials to steal OAuth tokens and exfiltrate sales and customer data from clients including Huntress, Recorded Future, Tanium, and Jamf; the Icarus group claimed responsibility.","Microsoft detailed AutoJack, an exploit chain that turns an AI browsing agent into a remote code execution vector by abusing localhost trust and missing authentication in AutoGen Studio's WebSocket interface."],"insights":["The AutoJack exploit chain shows that an AI browsing agent can be turned into a remote code execution vector by a malicious web page, exploiting trust in localhost and missing authentication in the agent's WebSocket interface.","The ShapedPlugin supply chain attack demonstrates that compromising a vendor's release infrastructure allows malware to be delivered through official update channels, making it nearly indistinguishable from legitimate software updates.","The Klue breach highlights how attackers can abuse compromised legacy integration credentials to steal OAuth tokens and gain access to downstream customer SaaS environments without directly targeting those customers.","The SearchLeak technique exploits Microsoft 365 Copilot's search function by using a crafted link to trigger hidden instructions and exfiltrate emails, authentication codes, and SharePoint files through an image fetch request.","The crypto clipboard hijacker's promotion through fake stars, upvotes, and placement on trusted platforms like GitHub and legitimate news sites shows that attackers are manipulating reputation signals to distribute malware at scale."],"referencedReports":[{"title":"AutoJack: single-page RCE host running AI agent","url":"https://www.microsoft.com/en-us/security/blog/2026/06/18/autojack-single-page-rce-host-running-ai-agent/","publisher":"Microsoft","context":"The article summarizes Microsoft's technical analysis of an exploit chain that turns an AI browsing agent into a remote code execution vector.","category":"research","primary":true},{"title":"SearchLeak: Exfiltrating Data from Microsoft 365 Copilot via Prompt Injection","url":"https://www.varonis.com/blog/searchleak","publisher":"Varonis","context":"The article references Varonis research detailing a prompt injection technique that uses a crafted link to exfiltrate data from Copilot Search.","category":"research","primary":true}],"body":"\u003cp\u003eThe week\u0026rsquo;s most impactful incident is a third-party data breach at the Texas Parks and Wildlife Department that exposed driver\u0026rsquo;s license numbers, passport details, phone numbers, and residential addresses of over 3 million hunting and fishing license holders. A supply chain attack against WordPress plugin vendor ShapedPlugin used the official update mechanism to deliver malware that stole admin and database credentials along with two-factor authentication tokens. Meanwhile, market intelligence platform Klue confirmed attackers leveraged compromised legacy integration credentials to steal OAuth tokens and exfiltrate sales data from clients including Huntress, Recorded Future, Tanium, and Jamf, with the Icarus extortion group claiming responsibility.\u003c/p\u003e\n\n\u003cp\u003eActive exploitation of critical vulnerabilities demands immediate attention: unauthenticated API requests can achieve root-level command execution on Fortinet FortiSandbox, a publicly demonstrated zero-day in Microsoft Defender enables privilege escalation to SYSTEM on fully updated Windows 10 and 11, and authenticated attackers can exploit an arbitrary file write in Cisco Catalyst SD-WAN Manager to potentially reach root. Additionally, a critical Splunk Enterprise flaw is under limited exploitation and can lead to remote code execution through file operations. All four products have patches available or in development.\u003c/p\u003e\n\n\u003cp\u003eThe report also details emerging AI threats, most notably AutoJack—a technique allowing a malicious web page to turn an AI browsing agent into a remote code execution vector by abusing localhost trust and missing authentication in AutoGen Studio\u0026rsquo;s WebSocket interface. Separately, the SearchLeak prompt injection method exfiltrated emails, authentication codes, and SharePoint files via a crafted link sent to Microsoft 365 Copilot Search. Check Point\u0026rsquo;s own research contributions unmask a Rust-based crypto clipboard hijacker promoted through fake reputation and amplifies awareness of seasonal travel phishing and Amazon Prime Day scams.\u003c/p\u003e\n"},{"n":35,"title":"Investigator’s Guide to Okta Logs: System Log Fields for Incident Response","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/saas-incident-response-a-guide-for-investigators-part-one-okta-log-fields","time":"16:40","priority":"MAY READ","score":36,"tldr":"This guide details key Okta System Log fields for incident response, warns of inaccuracies in risk assessment and device fingerprinting data, and provides a session-tracking method using specific session and request identifiers to isolate malicious activity.","briefOverview":"\u003cp\u003eThis article, part of a series on SaaS incident response, serves as a practical guide for security professionals investigating compromises within Okta. It emphasizes that while Okta System Logs provide a rich audit trail, responders must navigate specific pitfalls to avoid misdirecting an investigation. The guide focuses on the most relevant log fields for tracking attacker activity, offering both a reference table and detailed caveats for fields with known inaccuracies.\u003c/p\u003e\n\n\u003cp\u003eTwo fields are highlighted as particularly unreliable: \u003ccode\u003edebugContext.debugData.risk\u003c/code\u003e may falsely flag anomalous locations due to bugs, and \u003ccode\u003edebugContext.debugData.deviceFingerprint\u003c/code\u003e exhibits significant overlap between users due to an unclear calculation method. The article warns that interpreting these fields without corroboration can lead to flawed severity assessments or incorrect attribution. Instead, investigators are advised to treat these risk indicators with caution and combine them with other evidence.\u003c/p\u003e\n\n\u003cp\u003eThe core of the guide details a session-tracking methodology built on four identifiers: \u003ccode\u003eauthenticationContext.externalSessionId\u003c/code\u003e, \u003ccode\u003etransaction.id\u003c/code\u003e, \u003ccode\u003edebugContext.debugData.emailRequestId\u003c/code\u003e, and \u003ccode\u003edebugContext.debugData.authnRequestId\u003c/code\u003e. By matching known malicious values of these fields against all events, responders can reconstruct a threat actor\u0026rsquo;s actions across authenticated and pre-authentication stages. Provided pseudocode demonstrates how to implement this filtering, ensuring a comprehensive view of malicious activity even when individual identifier values differ across events.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["To track a threat actor's actions, investigators should pivot on the fields authenticationContext.externalSessionId, transaction.id, debugContext.debugData.emailRequestId, and debugContext.debugData.authnRequestId.","The debugContext.debugData.risk field may contain inaccuracies, such as false indications of an anomalous location due to bugs, and should be interpreted with caution.","The debugContext.debugData.deviceFingerprint field is unreliable for unique device identification because of significant overlap between users and an unclear calculation method.","A pseudocode filter is provided that matches known malicious session IDs and request IDs across these four fields to isolate related malicious events."],"insights":["Okta's risk assessment field can incorrectly flag logins as coming from a new country due to bugs, so a 'new location' alert may be a false positive that misleads investigators if not verified against actual IP geolocation data.","The device fingerprint field frequently overlaps across different users, meaning that seeing the same fingerprint for multiple accounts does not reliably indicate they share a physical device, and using it as a sole pivot can create false associations.","The authnRequestId does not consistently match transaction.id, so reconstructing a full threat-actor session requires pivoting on all four session/request ID fields; relying on just transaction.id risks missing related events."],"referencedReports":[],"body":"\u003cp\u003eThis article, part of a series on SaaS incident response, serves as a practical guide for security professionals investigating compromises within Okta. It emphasizes that while Okta System Logs provide a rich audit trail, responders must navigate specific pitfalls to avoid misdirecting an investigation. The guide focuses on the most relevant log fields for tracking attacker activity, offering both a reference table and detailed caveats for fields with known inaccuracies.\u003c/p\u003e\n\n\u003cp\u003eTwo fields are highlighted as particularly unreliable: \u003ccode\u003edebugContext.debugData.risk\u003c/code\u003e may falsely flag anomalous locations due to bugs, and \u003ccode\u003edebugContext.debugData.deviceFingerprint\u003c/code\u003e exhibits significant overlap between users due to an unclear calculation method. The article warns that interpreting these fields without corroboration can lead to flawed severity assessments or incorrect attribution. Instead, investigators are advised to treat these risk indicators with caution and combine them with other evidence.\u003c/p\u003e\n\n\u003cp\u003eThe core of the guide details a session-tracking methodology built on four identifiers: \u003ccode\u003eauthenticationContext.externalSessionId\u003c/code\u003e, \u003ccode\u003etransaction.id\u003c/code\u003e, \u003ccode\u003edebugContext.debugData.emailRequestId\u003c/code\u003e, and \u003ccode\u003edebugContext.debugData.authnRequestId\u003c/code\u003e. By matching known malicious values of these fields against all events, responders can reconstruct a threat actor\u0026rsquo;s actions across authenticated and pre-authentication stages. Provided pseudocode demonstrates how to implement this filtering, ensuring a comprehensive view of malicious activity even when individual identifier values differ across events.\u003c/p\u003e\n"},{"n":27,"title":"GCP Service Agents \u0026 Workload Identities in Cloud Audit Logs: A Forensic Guide","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/who-touched-my-gcp-project-understanding-the-principal-part-in-cloud-audit-logs-part-2","time":"16:35","priority":"MAY READ","score":34,"tldr":"This forensic guide explains how to trace Service Agents, Workload Identity Federation, GKE Workload Identities, and Workforce Identity Federation in GCP Cloud Audit Logs, enabling accurate attribution of actions to their true source during investigations.","briefOverview":"\u003cp\u003eThis article is the second part of a series on understanding principals and identities in Google Cloud Platform (GCP) Cloud Audit Logs. It focuses on four additional identity categories beyond regular service accounts: Service Agents, Workload Identities via Workload Identity Federation, GKE Workload Identities, and Workforce Identities via Workforce Identity Federation. These identities often represent background services, external workloads, containerized applications, or federated human users, each leaving distinct traces in audit logs.\u003c/p\u003e\n\n\u003cp\u003eThe guide details how each identity type appears in log entries. Service Agents are Google-managed accounts that show up in the \u003ccode\u003eserviceAccountDelegationInfo\u003c/code\u003e section when they impersonate a default service account. Workload Identity Federation exchanges external credentials (e.g., AWS ARNs, Azure object IDs, GitHub repository paths) for GCP tokens, and the original identity is captured in \u003ccode\u003eprincipalSubject\u003c/code\u003e during token exchange and subsequent impersonation. GKE Workload Identity Federation similarly records a \u003ccode\u003eprincipalSubject\u003c/code\u003e containing \u003ccode\u003esvc.id.goog\u003c/code\u003e with the Kubernetes namespace and service account name, providing granular container-level attribution.\u003c/p\u003e\n\n\u003cp\u003eUnderstanding these log patterns is critical for forensic investigations. The delegation chain in \u003ccode\u003eserviceAccountDelegationInfo\u003c/code\u003e allows an analyst to trace an impersonated action back to an AWS session ID, a GitHub pull request event, or a specific Kubernetes namespace. Workforce Identity Federation records the external human user identity in \u003ccode\u003eauthenticationInfo.principalSubject\u003c/code\u003e, clearly separating people from machine identities. This traceability enables accurate reconstruction of timelines, impact assessment, and answering the central question: \u0026ldquo;Who touched my GCP project?\u0026rdquo;.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Service Agents are automatically created Google-managed service accounts that appear in the serviceAccountDelegationInfo section of audit logs.","Workload Identity Federation records the external identity (e.g., AWS ARN or Azure object ID) in the principalSubject field of Cloud Audit Logs during token exchange.","GKE Workload Identity Federation binds Kubernetes Service Accounts to Google Service Accounts, and logs capture the source Kubernetes namespace and service account name via a principalSubject containing 'svc.id.goog'.","Workforce Identity Federation allows human users to authenticate with external identity providers without Google accounts, and their identity appears in the authenticationInfo.principalSubject field of audit logs.","The serviceAccountDelegationInfo field provides a traceable chain from the impersonated service account back to the original identity, enabling forensic attribution of actions in GCP."],"insights":["Service Agents appear in the serviceAccountDelegationInfo field of regular service account actions, revealing that the operation was actually performed by a Google-managed background service.","AWS Workload Identity Federation logs the full session ARN—including the session ID—in the principalSubject field, allowing analysts to correlate GCP activity with a specific AWS session or user in CloudTrail.","GitHub Actions workload identities include the repository path and trigger type (e.g., pull_request) in the principalSubject, making it possible to trace GCP actions back to exact GitHub CI/CD events.","GKE Workload Identity logs include the Kubernetes namespace alongside the service account name in the principalSubject, which is critical because KSA names can be reused across namespaces and would otherwise be ambiguous.","Workforce Identity Federation records the federated user's identity directly in authenticationInfo.principalSubject, providing a clear separation between human external users and machine identities for audit and investigation purposes."],"referencedReports":[{"title":"GCP Service Agents 201","url":"https://kattraxler.cloud/gcp/iam/201/2024/06/02/gcp-service-agents-201.html","publisher":"Kat Traxler","context":"The article refers to this detailed blog post for an in-depth explanation of Service Agents.","category":"guide","primary":false}],"body":"\u003cp\u003eThis article is the second part of a series on understanding principals and identities in Google Cloud Platform (GCP) Cloud Audit Logs. It focuses on four additional identity categories beyond regular service accounts: Service Agents, Workload Identities via Workload Identity Federation, GKE Workload Identities, and Workforce Identities via Workforce Identity Federation. These identities often represent background services, external workloads, containerized applications, or federated human users, each leaving distinct traces in audit logs.\u003c/p\u003e\n\n\u003cp\u003eThe guide details how each identity type appears in log entries. Service Agents are Google-managed accounts that show up in the \u003ccode\u003eserviceAccountDelegationInfo\u003c/code\u003e section when they impersonate a default service account. Workload Identity Federation exchanges external credentials (e.g., AWS ARNs, Azure object IDs, GitHub repository paths) for GCP tokens, and the original identity is captured in \u003ccode\u003eprincipalSubject\u003c/code\u003e during token exchange and subsequent impersonation. GKE Workload Identity Federation similarly records a \u003ccode\u003eprincipalSubject\u003c/code\u003e containing \u003ccode\u003esvc.id.goog\u003c/code\u003e with the Kubernetes namespace and service account name, providing granular container-level attribution.\u003c/p\u003e\n\n\u003cp\u003eUnderstanding these log patterns is critical for forensic investigations. The delegation chain in \u003ccode\u003eserviceAccountDelegationInfo\u003c/code\u003e allows an analyst to trace an impersonated action back to an AWS session ID, a GitHub pull request event, or a specific Kubernetes namespace. Workforce Identity Federation records the external human user identity in \u003ccode\u003eauthenticationInfo.principalSubject\u003c/code\u003e, clearly separating people from machine identities. This traceability enables accurate reconstruction of timelines, impact assessment, and answering the central question: \u0026ldquo;Who touched my GCP project?\u0026rdquo;.\u003c/p\u003e\n"},{"n":32,"title":"5 Tips to Address the Cybersecurity Skills Gap","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/5-tips-to-address-the-cybersecurity-skills-gap","time":"17:01","priority":"MAY READ","score":33,"tldr":"Security leaders can combat the cybersecurity skills gap by upskilling their existing teams and immediately bridging critical expertise shortages with managed detection and response services and increased automation.","briefOverview":"\u003cp\u003eThe article examines the persistent cybersecurity skills gap, which has worsened with the widespread adoption of cloud technologies, automation, and artificial intelligence. It notes that the shortage now extends beyond technical certifications to include capabilities like cloud security architecture, hands-on incident response, proactive threat hunting, strategic alignment with business goals, and automation proficiency. This imbalance drives up salaries and leaves many organizations exposed to evolving threats.\u003c/p\u003e\n\n\u003cp\u003eThe author presents five practical tips for security leaders. These include investing in the professional development of existing staff through certifications, cross-training, and on-the-job learning; using managed services such as Cloud Managed Detection and Response to instantly access external expertise; and automating repetitive tasks like log analysis and alert triage to multiply the effectiveness of current teams. Additional long-term measures involve partnering with academic institutions to build a talent pipeline and prioritizing employee wellness and clear career paths to reduce costly turnover.\u003c/p\u003e\n\n\u003cp\u003eCloud MDR is positioned as an immediate, scalable fix that provides round-the-clock monitoring, advanced incident response, and proactive threat hunting without requiring new in-house hires. By combining seasoned experts with advanced technology, such services enhance security posture while freeing internal teams to concentrate on strategic, business-critical work. The article concludes that although the skills gap is multifaceted, a blend of short-term outsourced support and long-term talent development can overcome it.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The cybersecurity skills gap has widened due to demand for expertise in cloud security, incident response, threat hunting, strategic thinking, and automation.","Upskilling existing employees through certifications, cross-training, and on-the-job learning can improve team versatility and resilience.","Leveraging managed services like Cloud Managed Detection and Response (Cloud MDR) provides immediate access to continuous monitoring, incident response, and threat hunting without additional in-house hiring.","Automation and AI can multiply a team's effectiveness by handling repetitive tasks such as log analysis, alert triage, and workflow orchestration.","Retaining cybersecurity talent requires clear career growth paths, a culture of recognition, and preventing burnout through work-life balance."],"insights":["The skills gap now includes non-technical capabilities like strategic thinking and automation proficiency, not just traditional security certifications.","Rotating existing team members through different roles is a cost-effective way to build versatility and resilience without expanding headcount.","Cloud MDR services allow organizations to immediately outsource around-the-clock threat monitoring and incident response, freeing internal staff to focus on business-aligned strategic work.","Retention strategies such as clear career paths and work-life balance are just as critical as recruitment, because high turnover directly widens the existing skills gap."],"referencedReports":[],"body":"\u003cp\u003eThe article examines the persistent cybersecurity skills gap, which has worsened with the widespread adoption of cloud technologies, automation, and artificial intelligence. It notes that the shortage now extends beyond technical certifications to include capabilities like cloud security architecture, hands-on incident response, proactive threat hunting, strategic alignment with business goals, and automation proficiency. This imbalance drives up salaries and leaves many organizations exposed to evolving threats.\u003c/p\u003e\n\n\u003cp\u003eThe author presents five practical tips for security leaders. These include investing in the professional development of existing staff through certifications, cross-training, and on-the-job learning; using managed services such as Cloud Managed Detection and Response to instantly access external expertise; and automating repetitive tasks like log analysis and alert triage to multiply the effectiveness of current teams. Additional long-term measures involve partnering with academic institutions to build a talent pipeline and prioritizing employee wellness and clear career paths to reduce costly turnover.\u003c/p\u003e\n\n\u003cp\u003eCloud MDR is positioned as an immediate, scalable fix that provides round-the-clock monitoring, advanced incident response, and proactive threat hunting without requiring new in-house hires. By combining seasoned experts with advanced technology, such services enhance security posture while freeing internal teams to concentrate on strategic, business-critical work. The article concludes that although the skills gap is multifaceted, a blend of short-term outsourced support and long-term talent development can overcome it.\u003c/p\u003e\n"},{"n":37,"title":"Defining Blast Radius in Cloud Incidents: Problem Scoping Guide | Mitiga","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/defining-blast-radius-in-cloud-incidents","time":"20:24","priority":"MAY READ","score":29,"tldr":"Scoping the blast radius in cloud incidents hinges on tracing identity and service trust relationships—not network perimeters—and requires automated, iterative analysis of logs and ephemeral resources to contain breaches before they spread.","briefOverview":"\u003cp\u003eThis guide details a structured approach for scoping the blast radius during cloud security incidents, asserting that accurate and rapid scoping is the decisive factor between a contained event and a catastrophic breach. It explains that in cloud-native environments, identity trust relationships and service permissions have replaced network boundaries as the true perimeter, and that the ephemeral nature of cloud resources means forensic log retention must be continuous, or the ability to trace an attack disappears with the resources themselves.\u003c/p\u003e\n\n\u003cp\u003eThe scoping process begins by defining an initial hypothesis around entry point, incident type, suspected blast radius, and time window. Analysts then map the environment across three dimensions: network connectivity (VPC peering, firewalls), identity connectivity (IAM roles, cross-account trusts), and service connectivity (queues, APIs, SaaS integrations). Log analysis follows to confirm what was actually accessed, while also accounting for everything plausibly reachable. Special attention is given to Kubernetes clusters, where blasted radius hinges on namespace isolation, mounted secrets, ServiceAccount permissions, and
