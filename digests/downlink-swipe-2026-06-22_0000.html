the risk of container escapes that elevate compromise from a single pod to an entire node and its kubelet credentials.\u003c/p\u003e\n\n\u003cp\u003eThe guide emphasizes that scoping must be iterative until evidence stabilizes, after which a formal scope statement documents affected accounts, identities, resources, time window, exposed data, and explicit boundaries. Common mistakes include scoping too narrowly from initial alerts, ignoring identity-based lateral movement, and treating Kubernetes namespaces as security boundaries. It concludes that building automated environment mapping and scoping playbooks before an incident occurs is essential, as defenders must move from manual log aggregation to AI-native scoping to keep pace with AI-driven attackers.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Modern blast radius in cloud environments is defined by identity trust relationships and service permissions rather than traditional network boundaries.","Cloud resources are ephemeral, and without continuous forensic log retention, the ability to scope an attack timeline can vanish alongside the compromised assets.","Within Kubernetes clusters, determining blast radius requires deep visibility into container escapes, lateral movement between pods, and API server abuse.","Scoping must include everything that was demonstrably accessed plus everything that was plausibly accessible and cannot be ruled out, using logs and environment mapping.","A well-documented scope statement captures affected accounts, compromised identities, the incident time window, exposed data, and a clear boundary with rationale for out-of-scope items."],"insights":["The speed and accuracy of initial scoping directly dictates whether a cloud incident escalates into a catastrophic breach, making it the pivotal moment in incident response.","Without continuous forensic log retention, ephemeral cloud resources that vanish in seconds can permanently erase the ability to scope an attack timeline.","Kubernetes namespaces provide only cosmetic isolation; without enforced NetworkPolicies and strict RBAC, the network blast radius extends to the entire cluster.","Effective scoping must encompass not only what was demonstrably accessed, but also everything that was plausibly accessible and cannot be ruled out, to prevent leaving hidden compromise paths open."],"referencedReports":[],"body":"\u003cp\u003eThis guide details a structured approach for scoping the blast radius during cloud security incidents, asserting that accurate and rapid scoping is the decisive factor between a contained event and a catastrophic breach. It explains that in cloud-native environments, identity trust relationships and service permissions have replaced network boundaries as the true perimeter, and that the ephemeral nature of cloud resources means forensic log retention must be continuous, or the ability to trace an attack disappears with the resources themselves.\u003c/p\u003e\n\n\u003cp\u003eThe scoping process begins by defining an initial hypothesis around entry point, incident type, suspected blast radius, and time window. Analysts then map the environment across three dimensions: network connectivity (VPC peering, firewalls), identity connectivity (IAM roles, cross-account trusts), and service connectivity (queues, APIs, SaaS integrations). Log analysis follows to confirm what was actually accessed, while also accounting for everything plausibly reachable. Special attention is given to Kubernetes clusters, where blasted radius hinges on namespace isolation, mounted secrets, ServiceAccount permissions, and the risk of container escapes that elevate compromise from a single pod to an entire node and its kubelet credentials.\u003c/p\u003e\n\n\u003cp\u003eThe guide emphasizes that scoping must be iterative until evidence stabilizes, after which a formal scope statement documents affected accounts, identities, resources, time window, exposed data, and explicit boundaries. Common mistakes include scoping too narrowly from initial alerts, ignoring identity-based lateral movement, and treating Kubernetes namespaces as security boundaries. It concludes that building automated environment mapping and scoping playbooks before an incident occurs is essential, as defenders must move from manual log aggregation to AI-native scoping to keep pace with AI-driven attackers.\u003c/p\u003e\n"},{"n":20,"title":"No ID, No Data For You","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/identify-manage-and-control-ai-agents-with-netskope-and-aembit","time":"07:01","priority":"MAY READ","score":25,"tldr":"Secure AI agent adoption demands a combined identity layer that blends human and agent credentials with an inline data policy layer that inspects traffic, preventing data leaks and enforcing acceptable behavior.","briefOverview":"\u003cp\u003eThe article argues that AI agents, unlike humans or devices, operate without inherent identity or accountability, making them a security risk when they access enterprise systems. Because agents act at machine speed, scale massively, and bear no legal responsibility, their use demands a specialized IAM layer that can cryptographically verify both the human user and the agent workload together. Aembit addresses this by creating a blended identity through its IAM for Workloads and IAM for Agentic AI, dynamically injecting short-lived credentials into agents at runtime and enforcing access policies that combine user and agent context.\u003c/p\u003e\n\n\u003cp\u003eThe Model Context Protocol (MCP), which agents rely on to interact with resources, lacks any native data policy layer — it cannot monitor, classify, or govern data flows. Netskope fills this gap by inserting an inline policy layer consisting of an AI Gateway, Agentic Broker, and AI Guardrails. These components identify MCP servers and clients, apply risk scoring, manage access with granular controls, prevent data leaks, and constrain agent behavior against threats such as prompt injection and jailbreaking attacks.\u003c/p\u003e\n\n\u003cp\u003eIn a combined deployment, Aembit’s Edge injects credentials that authenticate the agent to the Netskope One AI Gateway and onward to the downstream LLM, removing the need for stored secrets. Netskope inspects all traffic and logs every interaction, applying identity-based policies while Aembit provides complementary auditing. Together, these layers allow organizations to incorporate agentic AI into a zero trust strategy, ensuring that data stays where it belongs and that agent actions are governed by both identity and acceptable-use policies.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["AI agents operate at machine speed without legal or moral responsibility, so any business use requires both an identity and access layer and a data policy layer around all agent activities.","Aembit creates a blended identity that cryptographically verifies the specific human user together with the specific agent, enabling access policies that distinguish 'this user, this agent, this resource right now.'","The Model Context Protocol (MCP) lacks native data policy capabilities, meaning it cannot natively offer visibility, enforcement, or governance of data flows between agents and resources.","Netskope fills the data policy gap by inserting an AI Gateway, Agentic Broker, and AI Guardrails inline between agents and MCP servers to inspect traffic, prevent data leaks, and constrain agent behavior against prompt injection and jailbreaking.","In the combined deployment, Aembit injects short-lived credentials at runtime into the agent, authenticating it to the Netskope AI Gateway and from there to the downstream LLM, while Netskope logs all interactions and applies identity-based policies for defense in depth."],"insights":["Traditional IAM that authenticates either a human or a workload in isolation fails for AI agents because it cannot answer the combined question of which specific user is invoking which specific agent, making blended identity a necessity rather than an optimization.","Because agents bear no legal or moral responsibility, every unexpected action or data leak directly exposes the deploying organization to liability, elevating real-time behavioral governance and content moderation to the same urgency as access control.","Shifting authentication from static secrets to cryptographically verified runtime context not only eliminates secret sprawl but also enables a just-in-time credential model that aligns with the short-lived, dynamic nature of agent sessions."],"referencedReports":[],"body":"\u003cp\u003eThe article argues that AI agents, unlike humans or devices, operate without inherent identity or accountability, making them a security risk when they access enterprise systems. Because agents act at machine speed, scale massively, and bear no legal responsibility, their use demands a specialized IAM layer that can cryptographically verify both the human user and the agent workload together. Aembit addresses this by creating a blended identity through its IAM for Workloads and IAM for Agentic AI, dynamically injecting short-lived credentials into agents at runtime and enforcing access policies that combine user and agent context.\u003c/p\u003e\n\n\u003cp\u003eThe Model Context Protocol (MCP), which agents rely on to interact with resources, lacks any native data policy layer — it cannot monitor, classify, or govern data flows. Netskope fills this gap by inserting an inline policy layer consisting of an AI Gateway, Agentic Broker, and AI Guardrails. These components identify MCP servers and clients, apply risk scoring, manage access with granular controls, prevent data leaks, and constrain agent behavior against threats such as prompt injection and jailbreaking attacks.\u003c/p\u003e\n\n\u003cp\u003eIn a combined deployment, Aembit’s Edge injects credentials that authenticate the agent to the Netskope One AI Gateway and onward to the downstream LLM, removing the need for stored secrets. Netskope inspects all traffic and logs every interaction, applying identity-based policies while Aembit provides complementary auditing. Together, these layers allow organizations to incorporate agentic AI into a zero trust strategy, ensuring that data stays where it belongs and that agent actions are governed by both identity and acceptable-use policies.\u003c/p\u003e\n"},{"n":29,"title":"IaaS vs PaaS vs SaaS vs CaaS: Cloud Models Compared","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/iaas-vs-paas-vs-saas-what-are-the-differences","time":"16:25","priority":"MAY READ","score":25,"tldr":"Understanding the differences between IaaS, PaaS, SaaS, and CaaS helps businesses choose the right cloud model based on control, technical expertise, and security needs; most enterprises use a combination of models to optimize costs and avoid vendor lock-in.","briefOverview":"\u003cp\u003eThis guide breaks down the four primary cloud service models—IaaS, PaaS, SaaS, and CaaS—by explaining who controls what and how much users manage. IaaS gives full virtual infrastructure control but requires operating system and security management. PaaS provides ready-made development platforms so teams can code without server upkeep, while SaaS delivers applications like email or CRM through a web browser with no maintenance. CaaS fits between IaaS and PaaS, managing containerized applications where users deploy and scale containers without owning the orchestration layer.\u003c/p\u003e\n\n\u003cp\u003eSecurity responsibilities shift dramatically across these models: IaaS demands a full security stack and is prone to misconfiguration breaches, PaaS exposes dependency and API risks (with 49% of cloud incidents involving API issues), SaaS relies almost entirely on provider controls and limits user visibility to activity and configuration logs, and CaaS requires image scanning and runtime protection. The article notes that 90% of cloud security failures are projected to stem from misconfigurations by 2026, emphasizing the need for automated enforcement tools regardless of the chosen model.\u003c/p\u003e\n\n\u003cp\u003eMost enterprises use all four models together—89% operate in multi-cloud environments to optimize costs and avoid vendor lock-in—and the average organization now uses nearly five different cloud platforms. The selection process involves honestly assessing team expertise, compliance requirements (HIPAA, GDPR, etc.), total cost of ownership, and application needs. The practical takeaway is to start small, often with SaaS for standard tasks, then add PaaS or IaaS as development and infrastructure demands grow, while continuously aligning security strategies with the specific logging and control limitations of each service model.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The four cloud service models—IaaS, PaaS, SaaS, and CaaS—differ in how much control and responsibility customers have over infrastructure, development platforms, or ready-to-use applications.","IaaS gives full control over virtual servers and storage but requires users to manage operating systems, applications, and security themselves.","SaaS delivers fully functional software accessible via web browser with no installation or maintenance needed, making it the easiest model for beginners.","CaaS lets users deploy and manage containerized applications without handling the underlying container orchestration platform, sitting between IaaS and PaaS in complexity.","Most cloud security failures are projected to result from misconfigurations, and security responsibilities shift significantly across models—IaaS demands a full security stack while SaaS relies mostly on provider controls."],"insights":["Most cloud security failures (90%) are projected to be caused by user misconfigurations by 2026, not provider weaknesses, making automated configuration enforcement and vigilant setup the real battleground for cloud security.","89% of enterprises already use multiple cloud service models at the same time, showing that real-world adoption is not about picking one model but about blending IaaS, PaaS, SaaS, and CaaS together.","SaaS drastically limits your visibility: you typically only see user activity and configuration change logs, while losing access to infrastructure, application, or network-level logs that are available in IaaS and CaaS."],"referencedReports":[],"body":"\u003cp\u003eThis guide breaks down the four primary cloud service models—IaaS, PaaS, SaaS, and CaaS—by explaining who controls what and how much users manage. IaaS gives full virtual infrastructure control but requires operating system and security management. PaaS provides ready-made development platforms so teams can code without server upkeep, while SaaS delivers applications like email or CRM through a web browser with no maintenance. CaaS fits between IaaS and PaaS, managing containerized applications where users deploy and scale containers without owning the orchestration layer.\u003c/p\u003e\n\n\u003cp\u003eSecurity responsibilities shift dramatically across these models: IaaS demands a full security stack and is prone to misconfiguration breaches, PaaS exposes dependency and API risks (with 49% of cloud incidents involving API issues), SaaS relies almost entirely on provider controls and limits user visibility to activity and configuration logs, and CaaS requires image scanning and runtime protection. The article notes that 90% of cloud security failures are projected to stem from misconfigurations by 2026, emphasizing the need for automated enforcement tools regardless of the chosen model.\u003c/p\u003e\n\n\u003cp\u003eMost enterprises use all four models together—89% operate in multi-cloud environments to optimize costs and avoid vendor lock-in—and the average organization now uses nearly five different cloud platforms. The selection process involves honestly assessing team expertise, compliance requirements (HIPAA, GDPR, etc.), total cost of ownership, and application needs. The practical takeaway is to start small, often with SaaS for standard tasks, then add PaaS or IaaS as development and infrastructure demands grow, while continuously aligning security strategies with the specific logging and control limitations of each service model.\u003c/p\u003e\n"},{"n":38,"title":"GitHub Security Logs: What They Reveal and What to Hunt For","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/now-you-see-me-github-logs","time":"16:49","priority":"MAY READ","score":25,"tldr":"Treat GitHub as a security-critical system and actively monitor its audit, token, and workflow logs to detect unauthorized access, privilege changes, and credential misuse that can lead to supply chain or CI/CD compromise.","briefOverview":"\u003cp\u003eGitHub functions as more than a development platform; it is a security-critical system that houses intellectual property, serves as a control plane for automation, and holds long-lived credentials that often escape traditional monitoring. The platform\u0026rsquo;s logs—audit, user security, Actions workflows, and OAuth events—provide telemetry that defenders can use to detect unauthorized access, permission shifts, and token misuse. Attackers targeting GitHub can achieve persistence, pivot into CI/CD pipelines, and manipulate deployed software, making log visibility essential.\u003c/p\u003e\n\n\u003cp\u003eSeveral logging behaviors catch teams off guard, including missing source IPs for events from GitHub Apps and PATs, unclear mappings between tokens and their human owners, and loss of detailed access history when repositories are deleted. Internal-to-external forking can serve as an overlooked exfiltration channel, and Actions logs reveal only metadata rather than full command-level activity inside runners. These gaps become critical during incident timeline reconstruction.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends monitoring for authentication changes like MFA disablement, new SSH keys, or unusual SSO activity; workflow modifications that precede privilege escalation; abnormal token usage over time; access spikes to sensitive repos; and new GitHub App installations. Exporting and retaining audit, token, and workflow logs in a central location enables enrichment, correlation, and alerting on high-risk events that could otherwise become major blind spots.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["GitHub is a security-critical system that holds intellectual property, acts as a control plane for automation, and contains long-lived credentials often outside traditional security visibility.","Attackers compromising GitHub can gain persistence, pivot to CI/CD systems, and manipulate deployments, making GitHub logs essential for incident response.","Key logging gaps that catch security teams off guard include missing source IPs for app-generated events, unclear token ownership, loss of detailed access history after repo deletions, and incomplete command-level visibility for GitHub Actions runners.","Defenders should monitor for authentication and MFA changes, workflow modifications, token behavior anomalies, access spikes to critical repositories, and new GitHub App installations as high-priority signals."],"insights":["Deleted repositories erase their detailed access history along with the repo itself, so without streaming logs you permanently lose the ability to reconstruct who accessed what before deletion.","Personal access tokens created long ago frequently lose a direct trace back to the human owner, creating an attribution gap that can hide malicious use behind an old, forgotten token.","Internal-to-external forks are a stealthy exfiltration path that is logged but easily missed in high-volume event streams, allowing code theft to hide in plain sight.","GitHub Actions logs provide only metadata about workflow runs, not full command-level activity inside ephemeral runners, leaving a significant blind spot in what actually executed."],"referencedReports":[],"body":"\u003cp\u003eGitHub functions as more than a development platform; it is a security-critical system that houses intellectual property, serves as a control plane for automation, and holds long-lived credentials that often escape traditional monitoring. The platform\u0026rsquo;s logs—audit, user security, Actions workflows, and OAuth events—provide telemetry that defenders can use to detect unauthorized access, permission shifts, and token misuse. Attackers targeting GitHub can achieve persistence, pivot into CI/CD pipelines, and manipulate deployed software, making log visibility essential.\u003c/p\u003e\n\n\u003cp\u003eSeveral logging behaviors catch teams off guard, including missing source IPs for events from GitHub Apps and PATs, unclear mappings between tokens and their human owners, and loss of detailed access history when repositories are deleted. Internal-to-external forking can serve as an overlooked exfiltration channel, and Actions logs reveal only metadata rather than full command-level activity inside runners. These gaps become critical during incident timeline reconstruction.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends monitoring for authentication changes like MFA disablement, new SSH keys, or unusual SSO activity; workflow modifications that precede privilege escalation; abnormal token usage over time; access spikes to sensitive repos; and new GitHub App installations. Exporting and retaining audit, token, and workflow logs in a central location enables enrichment, correlation, and alerting on high-risk events that could otherwise become major blind spots.\u003c/p\u003e\n"},{"n":34,"title":"Why Legacy SIEMs Fail: The Move Toward a Security Data Lake | Mitiga","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/beyond-standard-data-lakes-why-we-built-the-backbone-of-the-zero-impact-soc","time":"19:47","priority":"MAY READ","score":18,"tldr":"Mitiga built a purpose-built security data lake orchestration layer that cuts compute costs by over 50%, allowing full-fidelity log retention and preemptive forensic enrichment to stop breaches before they cause damage.","briefOverview":"\u003cp\u003eMitiga built its own security data lake orchestration layer because general-purpose platforms like Snowflake and Databricks imposed prohibitive compute costs when processing full-fidelity cloud security logs at scale. Standard data lakes optimize for analytics, not forensics, so vendors often sample or drop data to protect margins—a business decision that leaves security teams with partial visibility. Mitiga refused that compromise, aiming instead for Zero-Impact Breach Prevention built on complete, immutable log retention and preemptive enrichment.\u003c/p\u003e\n\n\u003cp\u003eThe engine uses intelligent fleet orchestration via Airflow to provision specialized EMR clusters for continuous streaming and deep nightly enrichment, with strict tenant isolation and custom Spark configurations tuned for irregular security log patterns. This design achieved over a 50% reduction in compute costs, making full-fidelity, multi-year retention economically viable and removing the historic trade-off between cost and completeness.\u003c/p\u003e\n\n\u003cp\u003eBeyond current cost and investigative speed, Mitiga positions its enriched data lake as essential infrastructure for the coming autonomous, agentic SOC. AI agents reasoning on partial or poorly structured data would hallucinate and miss threats, so the platform’s preemptively enriched, investigation-ready data becomes the fuel for reliable AI-driven operations. The architecture thus addresses today’s SOC needs while laying the foundation for next-generation automated breach prevention.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["General-purpose data lakes are optimized for analytics, not forensics, so they fail to support security teams that need to reconstruct attacks from complete logs.","Security vendors often sample or drop logs as a business decision to protect margins, leading to partial data and partial security.","Mitiga built a proprietary compute orchestration layer that cuts compute costs by over 50%, making full-fidelity log retention economically viable.","The engine continuously enriches raw logs with investigation-ready insights and forensic context, enabling Zero-Impact Breach Prevention.","Full-fidelity, enriched data is the essential foundation for future autonomous SOCs because AI agents would hallucinate or miss threats on incomplete data."],"insights":["Alert fatigue stems from uncontextualized signals, not from the volume of stored data, so adding more context-rich data can reduce analyst noise rather than increase it.","When vendors sample logs or drop 'noisy' events, it is a business decision to protect margins, not a security decision, leaving defenders with only partial visibility.","Building a purpose-built compute orchestration layer specifically for security workloads can reduce cloud data processing costs by over 50% compared to general-purpose platforms.","Strict multi-tenant isolation via dedicated cluster fleets lets organizations retain full logs for extended periods while still meeting strict data privacy and compliance requirements.","Full-fidelity, pre-enriched data is not just a cost issue today; it is a prerequisite for future autonomous SOCs because AI agents will hallucinate and miss threats on incomplete data."],"referencedReports":[{"title":"Data Lakes Market - Size, Share \u0026 Trends Analysis Report","url":"https://www.mordorintelligence.com/industry-reports/data-lakes-market","publisher":"Mordor Intelligence","context":"The article cites a market size of $16.68 billion in 2025 and 22.6% CAGR through 2031 for the data lakes market from Mordor Intelligence.","category":"research","primary":false}],"body":"\u003cp\u003eMitiga built its own security data lake orchestration layer because general-purpose platforms like Snowflake and Databricks imposed prohibitive compute costs when processing full-fidelity cloud security logs at scale. Standard data lakes optimize for analytics, not forensics, so vendors often sample or drop data to protect margins—a business decision that leaves security teams with partial visibility. Mitiga refused that compromise, aiming instead for Zero-Impact Breach Prevention built on complete, immutable log retention and preemptive enrichment.\u003c/p\u003e\n\n\u003cp\u003eThe engine uses intelligent fleet orchestration via Airflow to provision specialized EMR clusters for continuous streaming and deep nightly enrichment, with strict tenant isolation and custom Spark configurations tuned for irregular security log patterns. This design achieved over a 50% reduction in compute costs, making full-fidelity, multi-year retention economically viable and removing the historic trade-off between cost and completeness.\u003c/p\u003e\n\n\u003cp\u003eBeyond current cost and investigative speed, Mitiga positions its enriched data lake as essential infrastructure for the coming autonomous, agentic SOC. AI agents reasoning on partial or poorly structured data would hallucinate and miss threats, so the platform’s preemptively enriched, investigation-ready data becomes the fuel for reliable AI-driven operations. The architecture thus addresses today’s SOC needs while laying the foundation for next-generation automated breach prevention.\u003c/p\u003e\n"}];

function priorityColor(p) {

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {

}

function pointList(items) {

}

function ReportsPanel({ reports }) {

}

function AnalysisTabs({ article }) {

  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
