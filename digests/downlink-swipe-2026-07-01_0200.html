<script type="application/json" id="dl-articles">[{"n":2,"title":"Azure CLI Password Spray Hits at Least 78 Microsoft Accounts in 81M+ Attempts","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/azure-cli-password-spray-hits-at-least.html","time":"05:46","priority":"MUST READ","score":92,"tldr":"Huntress says attackers made over 81 million Azure CLI login attempts and compromised at least 78 Microsoft accounts by using old breached credentials and the deprecated ROPC OAuth flow. The key takeaway is that MFA and Conditional Access can be bypassed if not applied to all users, cloud apps, and client app types, including Azure CLI logins.","briefOverview":"\u003cp\u003eCybersecurity researchers at Huntress warned of a massive, ongoing, automated password spray attack aimed at Microsoft’s Azure command-line interface. Between June 12 and June 26, the threat actor made more than 81 million login attempts and compromised at least 78 Microsoft accounts across 64 organizations. Huntress said the targeting appeared to be based on password prevalence in compromised password combo lists, rather than a specific business type or industry.\u003c/p\u003e\n\n\u003cp\u003eThe activity largely originated from the IPv6 range 2a0a:d683::/32, which is controlled by internet infrastructure provider LSHIY LLC. Some IP addresses resolved to the United States, while a few resolved to China. Huntress said the campaign was part of a larger wave of credential spray attacks across several ASNs, with credential spray volume across its customer base increasing by more than 155 times.\u003c/p\u003e\n\n\u003cp\u003eA notable technical detail is that the attackers used the deprecated Resource Owner Password Credentials OAuth flow, known as ROPC, to bypass some Conditional Access Policy protections. Microsoft recommends against using ROPC and says it is incompatible with multi-factor authentication. Huntress said organizations should require MFA for all users, all cloud apps, and all client app types, restrict Azure CLI for non-admin users, and prioritize response based on credential validity.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Huntress warned of a massive, ongoing, automated password spray attack against Microsoft's Azure command-line interface that made more than 81 million login attempts between June 12 and June 26.","The campaign compromised at least 78 Microsoft accounts across 64 organizations, with targeting based on password prevalence in compromised password combo lists rather than business type or industry.","The activity originated largely from the IPv6 range 2a0a:d683::/32 controlled by LSHIY LLC, with some IP addresses resolving to the United States and a few to China.","The attackers leveraged the deprecated Resource Owner Password Credentials OAuth flow to bypass some poorly configured Conditional Access policies, including cases where MFA was not applied to all cloud apps, all users, or all client app types.","Huntress advised organizations to require MFA for all users, all cloud apps, and all client app types, restrict the Azure CLI application for non-admin users, and prioritize response by credential validity."],"insights":["The campaign shows that Conditional Access policies can leave a major gap when MFA is scoped only to certain apps, user groups, or locations instead of covering All Users, All Cloud Apps, and All Client App types.","The use of the deprecated ROPC flow was especially significant because it can avoid the authorization endpoint where some Conditional Access policies are enforced, allowing attackers to get in even where MFA existed.","The attacks appear to have succeeded by using old breached username-and-password combinations that had never been rotated, making credential age and validity a practical response priority.","The spike on June 22, when 30 identities across 23 businesses were impacted, indicates the campaign’s success rate was not steady and could escalate sharply within a single day.","Eight affected businesses had no MFA policy at all, but Huntress emphasized that the broader lesson is not that MFA fails, but that incomplete MFA coverage creates exploitable openings."],"referencedReports":[{"title":"LSHIY Password Spray Attack","url":"https://www.huntress.com/blog/lshiy-password-spray-attack","publisher":"Huntress","context":"The article cites Huntress as the source reporting the Azure CLI password spray campaign, including the scale of login attempts, affected accounts, and abuse of the ROPC flow.","category":"research","primary":true}],"body":"\u003cp\u003eCybersecurity researchers at Huntress warned of a massive, ongoing, automated password spray attack aimed at Microsoft’s Azure command-line interface. Between June 12 and June 26, the threat actor made more than 81 million login attempts and compromised at least 78 Microsoft accounts across 64 organizations. Huntress said the targeting appeared to be based on password prevalence in compromised password combo lists, rather than a specific business type or industry.\u003c/p\u003e\n\n\u003cp\u003eThe activity largely originated from the IPv6 range 2a0a:d683::/32, which is controlled by internet infrastructure provider LSHIY LLC. Some IP addresses resolved to the United States, while a few resolved to China. Huntress said the campaign was part of a larger wave of credential spray attacks across several ASNs, with credential spray volume across its customer base increasing by more than 155 times.\u003c/p\u003e\n\n\u003cp\u003eA notable technical detail is that the attackers used the deprecated Resource Owner Password Credentials OAuth flow, known as ROPC, to bypass some Conditional Access Policy protections. Microsoft recommends against using ROPC and says it is incompatible with multi-factor authentication. Huntress said organizations should require MFA for all users, all cloud apps, and all client app types, restrict Azure CLI for non-admin users, and prioritize response based on credential validity.\u003c/p\u003e\n"},{"n":1,"title":"Researcher Analyzes 3,000 Live ClickFix Payloads, Exposing API-Driven Malware Delivery","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/researcher-analyzes-3000-live-clickfix.html","time":"05:32","priority":"SHOULD READ","score":88,"tldr":"ClickFix campaigns have evolved into API-driven malware delivery platforms that generate unique, obfuscated payloads for each visitor, making detection harder. Researchers also found a newer Downloads-folder method designed to bypass clipboard and script-scanning defenses, so defenders should focus on suspicious process chains rather than clipboard contents alone.","briefOverview":"\u003cp\u003eSecurity researcher Bert-Jan Pals analyzed roughly 3,000 payloads from live ClickFix campaigns and found that the technique has evolved into an API-driven malware delivery setup. ClickFix uses fake CAPTCHA or error pages to trick people into pasting and running commands that execute malware themselves. Pals found backend servers that check access tokens, log callers, and return freshly scrambled commands for each request.\u003c/p\u003e\n\n\u003cp\u003eIn one test, a server returned 100 different payloads for 100 requests, using rotating combinations of Base64, AES, TripleDES, Rijndael, and Deflate. After the wrapping was removed, the payloads unpacked to the same script, which ran in memory through a PowerShell runspace. The platform also serves lures in 25 languages, matches commands to the visitor’s operating system, and includes macOS versions alongside Windows versions.\u003c/p\u003e\n\n\u003cp\u003eThe research also found a newer Downloads-folder method that quietly downloads a file and copies only a short command that moves, unpacks, and runs it, which is designed to avoid clipboard-focused detection and slip past Windows script scanning. The article says defenders should focus on process chains such as explorer.exe or WindowsTerminal.exe launching powershell.exe, cmd.exe, or msiexec.exe and making network connections soon afterward. Pals also listed comicstar[.]lat, babybon[.]cfd, and merkantalolol[.]asia as payload servers observed during the research, while noting that a connection to one of them does not prove infection.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Security researcher Bert-Jan Pals analyzed roughly 3,000 payloads from live ClickFix campaigns and found that malicious commands are being delivered by API-driven backend servers.","One ClickFix server returned 100 different payload wrappers for 100 requests, using rotating combinations of Base64, AES, TripleDES, Rijndael, and Deflate while unpacking to the same script at the time of the research.","Newer ClickFix pages can quietly download a file to the Downloads folder and copy a short command that moves, unpacks, and runs the file, a method designed to avoid clipboard-focused detection and slip past Windows script scanning.","ClickFix lures are served in 25 languages, can match commands to a visitor’s operating system, and include macOS versions alongside Windows versions.","The article says defenders should focus on process chains such as explorer.exe or WindowsTerminal.exe launching powershell.exe, cmd.exe, or msiexec.exe and making network connections soon afterward."],"insights":["ClickFix has moved beyond static lure pages into a commercialized, on-demand delivery model, making it cheap for attackers to keep changing payload disguises when defenders catch up.","Clipboard monitoring alone is no longer a reliable detection strategy because newer ClickFix pages can copy only a harmless-looking orchestrator command while keeping the malicious code in a downloaded file.","Windows Terminal use is notable for investigations because, unlike the older Windows+R Run-box method, it does not leave evidence in the RunMRU registry key that investigators normally check.","A connection to one of the listed payload servers indicates that a command was most likely placed in a user's clipboard, but the article warns it does not by itself prove infection.","ClickFix is no longer limited to ordinary cybercriminal campaigns, because Proofpoint tied Russia-, Iran-, and North Korea-backed groups including APT28, MuddyWater, and Kimsuky to its use."],"referencedReports":[{"title":"ClickFix: The Gift That Keeps on Giving","url":"https://kqlquery.com/posts/clickfix-gift-that-keeps-on-giving/","publisher":"Bert-Jan Pals / KQLQuery","context":"The article is based primarily on Bert-Jan Pals' published analysis of roughly 3,000 live ClickFix payloads and several ClickFix platforms.","category":"research","primary":true},{"title":"ESET Threat Report H1 2025","url":"https://web-assets.esetstatic.com/wls/en/papers/threat-reports/eset-threat-report-h12025.pdf","publisher":"ESET","context":"The article cites ESET's report for its measurement of a 517% jump in ClickFix activity from late 2024 into the first half of 2025.","category":"research","primary":false},{"title":"Microsoft Digital Defense Report 2025","url":"https://www.microsoft.com/en-us/security/security-insider/threat-landscape/microsoft-digital-defense-report-2025","publisher":"Microsoft","context":"The article cites Microsoft's report for its finding that ClickFix accounted for 47% of initial-access cases seen by its Defender Experts team.","category":"research","primary":false},{"title":"Around the World in 90 Days: State-Sponsored Actors Try ClickFix","url":"https://www.proofpoint.com/us/blog/threat-insight/around-world-90-days-state-sponsored-actors-try-clickfix","publisher":"Proofpoint","context":"The article references Proofpoint's analysis tying Russia-, Iran-, and North Korea-backed groups, including APT28, MuddyWater, and Kimsuky, to ClickFix campaigns.","category":"research","primary":false}],"body":"\u003cp\u003eSecurity researcher Bert-Jan Pals analyzed roughly 3,000 payloads from live ClickFix campaigns and found that the technique has evolved into an API-driven malware delivery setup. ClickFix uses fake CAPTCHA or error pages to trick people into pasting and running commands that execute malware themselves. Pals found backend servers that check access tokens, log callers, and return freshly scrambled commands for each request.\u003c/p\u003e\n\n\u003cp\u003eIn one test, a server returned 100 different payloads for 100 requests, using rotating combinations of Base64, AES, TripleDES, Rijndael, and Deflate. After the wrapping was removed, the payloads unpacked to the same script, which ran in memory through a PowerShell runspace. The platform also serves lures in 25 languages, matches commands to the visitor’s operating system, and includes macOS versions alongside Windows versions.\u003c/p\u003e\n\n\u003cp\u003eThe research also found a newer Downloads-folder method that quietly downloads a file and copies only a short command that moves, unpacks, and runs it, which is designed to avoid clipboard-focused detection and slip past Windows script scanning. The article says defenders should focus on process chains such as explorer.exe or WindowsTerminal.exe launching powershell.exe, cmd.exe, or msiexec.exe and making network connections soon afterward. Pals also listed comicstar[.]lat, babybon[.]cfd, and merkantalolol[.]asia as payload servers observed during the research, while noting that a connection to one of them does not prove infection.\u003c/p\u003e\n"},{"n":3,"title":"Citrix Patches Six NetScaler Flaws Allowing File Read and Denial-of-Service","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/citrix-patches-six-netscaler-flaws.html","time":"03:54","priority":"SHOULD READ","score":88,"tldr":"Citrix released patches for six NetScaler ADC and Gateway vulnerabilities that could allow arbitrary file reads, memory overreads, or denial-of-service under certain configurations. Customers should upgrade to fixed versions immediately and, for CVE-2026-13474, ensure the HTTP/2 small-window timeout setting is configured as required.","briefOverview":"\u003cp\u003eCitrix released security updates for six vulnerabilities in NetScaler ADC and NetScaler Gateway that could be exploited to read arbitrary files or cause denial-of-service conditions. The flaws affect several configurations, including SAML IDP, Gateway or AAA virtual server, Oracle load balancing, DNS proxy or recursive resolver deployments, TCP Timestamp, and HTTP/2 profiles. Citrix said there is no evidence that the issues have been exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe fixed versions include NetScaler ADC and NetScaler Gateway 14.1-72.61 and later, 13.1-63.18 and later, NetScaler ADC 14.1-FIPS 14.1-72.61 FIPS and later, and NetScaler ADC 13.1-FIPS and 13.1-NDcPP 13.1.37.272 and later. For CVE-2026-13474, Citrix also advised customers to update the Http2SmallWndTimeout setting, because appliances not using HTTP Strict Profiles have a default value of 0 and upgrading alone will not completely address the vulnerability. Citrix credited Michael Tucker from the XOR team at JPMorgan Chase, Aliz Hammond of watchTowr, and Maxim Suhanov for reporting the vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr Labs said CVE-2026-8451 was discovered while attempting to reproduce CVE-2026-3055, an earlier insufficient input validation flaw. The company said the issue comes from how NetScaler parses SAML authentication requests and can result in out-of-bounds memory reads when malformed SAML requests are sent. watchTowr noted that the newer issue leaks less data than CVE-2026-3055, but still raised concern about a broader pattern of fragile memory management in Citrix NetScaler appliances.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Citrix released security updates for six vulnerabilities in NetScaler ADC and NetScaler Gateway that could enable arbitrary file reads or denial-of-service conditions.","The affected issues include CVE-2026-8451, CVE-2026-8452, CVE-2026-8655, CVE-2026-10816, CVE-2026-10817, and CVE-2026-13474, with CVSS scores ranging from 6.9 to 8.8.","Patches are available in NetScaler ADC and NetScaler Gateway 14.1-72.61 and later, 13.1-63.18 and later, NetScaler ADC 14.1-FIPS 14.1-72.61 FIPS and later, and NetScaler ADC 13.1-FIPS and 13.1-NDcPP 13.1.37.272 and later.","For CVE-2026-13474, Citrix advised customers not using HTTP Strict Profiles to manually set Http2SmallWndTimeout to 30 seconds after upgrading, because the default value is 0.","Citrix said there is no evidence that the vulnerabilities have been exploited in the wild."],"insights":["For CVE-2026-13474, upgrading alone may not fully fix the issue on appliances that are not using HTTP Strict Profiles, because customers must also manually set Http2SmallWndTimeout to 30 seconds.","watchTowr found CVE-2026-8451 while trying to reproduce CVE-2026-3055, and said the new SAML parsing issue shares the same root cause as the earlier flaw.","watchTowr reported that CVE-2026-8451 leaks less data than CVE-2026-3055, but varying the request length still allowed researchers to consistently extract a few bytes from the server.","The listed vulnerabilities are tied to specific NetScaler configurations, such as SAML IDP, Gateway or AAA virtual server, Oracle load balancing, DNS proxy or recursive resolver, TCP Timestamp, and HTTP/2 profiles.","The article emphasizes urgency because Citrix appliances have repeatedly been targeted in recent years, including by threat actors deploying ransomware."],"referencedReports":[{"title":"NetScaler ADC and NetScaler Gateway Security Bulletin (CTX696604)","url":"https://support.citrix.com/support-home/kbsearch/article?articleNumber=CTX696604","publisher":"Citrix","context":"The article cites Citrix's security update bulletin as the source for the NetScaler ADC and NetScaler Gateway vulnerabilities, affected versions, fixed releases, and mitigation guidance.","category":"advisory","primary":true},{"title":"CitrixBleed to Infinity and Beyond: Citrix NetScaler Pre-Auth Memory Overread CVE-2026-8451","url":"https://labs.watchtowr.com/citrixbleed-to-infinity-and-beyond-citrix-netscaler-pre-auth-memory-overread-cve-2026-8451/","publisher":"watchTowr Labs","context":"The article references watchTowr Labs' technical write-up explaining the SAML parsing issue behind CVE-2026-8451 and comparing it with CVE-2026-3055.","category":"research","primary":false}],"body":"\u003cp\u003eCitrix released security updates for six vulnerabilities in NetScaler ADC and NetScaler Gateway that could be exploited to read arbitrary files or cause denial-of-service conditions. The flaws affect several configurations, including SAML IDP, Gateway or AAA virtual server, Oracle load balancing, DNS proxy or recursive resolver deployments, TCP Timestamp, and HTTP/2 profiles. Citrix said there is no evidence that the issues have been exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe fixed versions include NetScaler ADC and NetScaler Gateway 14.1-72.61 and later, 13.1-63.18 and later, NetScaler ADC 14.1-FIPS 14.1-72.61 FIPS and later, and NetScaler ADC 13.1-FIPS and 13.1-NDcPP 13.1.37.272 and later. For CVE-2026-13474, Citrix also advised customers to update the Http2SmallWndTimeout setting, because appliances not using HTTP Strict Profiles have a default value of 0 and upgrading alone will not completely address the vulnerability. Citrix credited Michael Tucker from the XOR team at JPMorgan Chase, Aliz Hammond of watchTowr, and Maxim Suhanov for reporting the vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr Labs said CVE-2026-8451 was discovered while attempting to reproduce CVE-2026-3055, an earlier insufficient input validation flaw. The company said the issue comes from how NetScaler parses SAML authentication requests and can result in out-of-bounds memory reads when malformed SAML requests are sent. watchTowr noted that the newer issue leaks less data than CVE-2026-3055, but still raised concern about a broader pattern of fragile memory management in Citrix NetScaler appliances.\u003c/p\u003e\n"},{"n":4,"title":"And another one. GitHub ships break-glass credential revocation","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/github-break-glass-credential-revocation","time":"04:06","priority":"SHOULD READ","score":82,"tldr":"GitHub’s new enterprise break-glass credential revocation lets owners quickly cut off compromised PATs, SSH keys, and OAuth tokens across an organization, addressing a gap that enabled recent repeat compromises like Trivy, Checkmarx, and Microsoft durabletask. The key takeaway is to assign the required permission and understand the feature before an incident, because fast bulk revocation can stop credential reuse even if it temporarily breaks CI/CD.","briefOverview":"\u003cp\u003eGitHub released self-service credential revocation for Enterprise, giving organization owners a break-glass way to cut off compromised credentials across an organization in one action. Enterprise owners with the \u0026ldquo;Manage enterprise credentials\u0026rdquo; permission can bulk-revoke or delete credentials for all users in an organization, or target a specific account. The feature covers SSO authorizations for Personal Access Tokens, SSH keys, and OAuth tokens, and actions create audit log entries and send email notifications to affected users.\u003c/p\u003e\n\n\u003cp\u003eThe article argues this matters because recent incidents showed how slow or incomplete credential cleanup can let attackers return. Microsoft’s \u003ccode\u003edurabletask\u003c/code\u003e package and related GitHub repository were compromised through the same account after earlier malicious PyPI package versions had been pulled, and GitHub disabled 73 repositories across four Microsoft GitHub organizations. Aqua Security’s Trivy compromise also returned after incomplete rotation, and stolen credentials from affected pipelines were later used to poison Checkmarx’s GitHub Actions.\u003c/p\u003e\n\n\u003cp\u003eThe article says true atomic credential rotation is unrealistic at large scale, but instantly killing every credential in scope is the one action that can be made atomic during an incident. This can break CI/CD, but the article frames that tradeoff as worthwhile when the priority is getting an attacker out of infrastructure. It recommends assigning the \u0026ldquo;Manage enterprise credentials\u0026rdquo; permission before an incident, reviewing Settings \u0026gt; Credentials, and pinning GitHub Actions to full commit SHAs rather than version tags.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["GitHub released self-service credential revocation for Enterprise, allowing organization owners with the \"Manage enterprise credentials\" permission to bulk-revoke or delete credentials for all users in an organization or target a specific account.","The feature covers SSO authorizations for Personal Access Tokens, SSH keys, and OAuth tokens, creates audit log entries, and sends email notifications to affected users.","The article says recent compromises involving Microsoft durabletask, Aqua Security’s Trivy, and Checkmarx showed that slow or incomplete credential rotation can allow attackers to reuse surviving credentials.","GitHub Actions tokens are out of scope for this revocation feature because they are minted per job and expire when the job ends.","The article recommends assigning the \"Manage enterprise credentials\" permission before an incident, reviewing Settings \u003e Credentials, and pinning GitHub Actions to full commit SHAs rather than version tags."],"insights":["The article frames break-glass revocation as more realistic than true atomic credential rotation, because killing every credential in scope at once is executable under pressure even if it breaks CI/CD temporarily.","The Trivy-to-Checkmarx chain shows that an incomplete cleanup after one compromise can turn a single surviving credential into a multi-organization supply chain incident.","The durabletask case highlights that pulling malicious packages quickly is not enough if the same compromised account can later be used to modify the related GitHub repository.","The credential revocation API’s usefulness was limited in compromised-account scenarios because it required already having the token string, while the new feature can act across credentials tied to an account or organization.","Pinning GitHub Actions to full commit SHAs directly addresses the force-pushed tag technique used in the Trivy compromise, where version tags were moved to malicious commits."],"referencedReports":[{"title":"GHSA-69fq-xp46-6x23","url":"https://github.com/aquasecurity/trivy/security/advisories/GHSA-69fq-xp46-6x23","publisher":"Aqua Security / GitHub Security Advisories","context":"The article cites this advisory when describing attackers force-pushing 75 of 76 trivy-action version tags to malicious commits.","category":"advisory","primary":false}],"body":"\u003cp\u003eGitHub released self-service credential revocation for Enterprise, giving organization owners a break-glass way to cut off compromised credentials across an organization in one action. Enterprise owners with the \u0026ldquo;Manage enterprise credentials\u0026rdquo; permission can bulk-revoke or delete credentials for all users in an organization, or target a specific account. The feature covers SSO authorizations for Personal Access Tokens, SSH keys, and OAuth tokens, and actions create audit log entries and send email notifications to affected users.\u003c/p\u003e\n\n\u003cp\u003eThe article argues this matters because recent incidents showed how slow or incomplete credential cleanup can let attackers return. Microsoft’s \u003ccode\u003edurabletask\u003c/code\u003e package and related GitHub repository were compromised through the same account after earlier malicious PyPI package versions had been pulled, and GitHub disabled 73 repositories across four Microsoft GitHub organizations. Aqua Security’s Trivy compromise also returned after incomplete rotation, and stolen credentials from affected pipelines were later used to poison Checkmarx’s GitHub Actions.\u003c/p\u003e\n\n\u003cp\u003eThe article says true atomic credential rotation is unrealistic at large scale, but instantly killing every credential in scope is the one action that can be made atomic during an incident. This can break CI/CD, but the article frames that tradeoff as worthwhile when the priority is getting an attacker out of infrastructure. It recommends assigning the \u0026ldquo;Manage enterprise credentials\u0026rdquo; permission before an incident, reviewing Settings \u0026gt; Credentials, and pinning GitHub Actions to full commit SHAs rather than version tags.\u003c/p\u003e\n"}]</script>
