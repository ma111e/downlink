design\"\u003eStealth, Propagation, and Operational Design\u003c/h2\u003e\n\n\u003cp\u003eThe article says fast16 was crafted not to infect computers that had certain security products installed. This indicates that the malware included logic to avoid particular defensive environments. The article does not name the specific security products.\u003c/p\u003e\n\n\u003cp\u003eFast16 also automatically spread to other endpoints on the same network. The stated purpose was to ensure that any machine used to run the simulations would generate the same tampered outputs. This behavior meant the sabotage was not limited to a single workstation if other endpoints on the network were used for the targeted simulation workloads.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe findings indicate that strategic industrial sabotage using malware was being conducted by nation-state actors as far back as 20 years ago. The article contrasts this with Stuxnet, which was later used to damage uranium enrichment centrifuges at Iran’s Natanz nuclear plant by injecting malicious code into Siemens programmable logic controllers. Fast16 is presented as predating the earliest known version of Stuxnet.\u003c/p\u003e\n\n\u003cp\u003eSymantec and Carbon Black said fast16 belongs to the same conceptual lineage as Stuxnet. In their description, this lineage involves malware tailored not only to a vendor’s product but also to a specific physical process being simulated or controlled by that product. In fast16’s case, the specific process involved nuclear weapons-related high-explosive and uranium-compression simulations.\u003c/p\u003e\n\n\u003ch2 id=\"expertise-required\"\u003eExpertise Required\u003c/h2\u003e\n\n\u003cp\u003eVikram Thakur, technical director for Symantec, told cybersecurity journalist Kim Zetter that the level of expertise and understanding needed to design fast16 in 2005 was “mind-blowing.” The article quotes Symantec and Carbon Black as saying that the framework required unusual domain knowledge for any era and especially for 2005. Examples included understanding which equation-of-state forms matter, which calling conventions are produced by which compilers, and which classes of simulation should or should not activate the malware.\u003c/p\u003e\n\n\u003cp\u003eThe article says it is not known whether a modern-day version of fast16 exists in the wild. It does not report a disclosed remediation action or identify a current active victim. The disclosed impact is that the malware was designed to generate tampered outputs in targeted nuclear weapons simulation environments.\u003c/p\u003e\n","keyPoints":["Symantec and Carbon Black analyzed the Lua-based fast16 malware and concluded it was designed to tamper with nuclear weapons testing simulations.","Fast16 targeted LS-DYNA and AUTODYN simulations and activated only during full-scale transient blast and detonation runs involving high-density material conditions associated with uranium shock compression.","The malware used 101 hook rules across multiple groups to alter mathematical calculations in different builds of the targeted simulation software.","Researchers said fast16 avoided infecting systems with certain security products installed and could automatically spread to other endpoints on the same network.","The findings indicate that strategic industrial sabotage using malware was being conducted by nation-state actors as early as around 2005, before Stuxnet was used against Iranian uranium enrichment centrifuges."],"insights":["Fast16’s activation condition was highly selective, using a material density threshold above 30 g/cm³ so that tampering would occur only in simulations consistent with uranium under implosion-device shock compression.","The malware’s hook groups appear to track multiple LS-DYNA and AUTODYN builds, indicating its operators adapted the tool as simulation software versions changed over time.","Fast16 was designed to produce consistent tampered outputs across a network by spreading to other endpoints that might run the same simulations.","The malware’s avoidance of systems with certain security products shows that stealth and operational security were built into the sabotage framework, not just the simulation-tampering logic.","Researchers emphasized that fast16 required unusually deep domain expertise for 2005, including knowledge of equation-of-state forms, compiler calling conventions, and which simulation classes should trigger the malware."],"referencedReports":[{"title":"Fast16 Nuclear Sabotage","url":"https://www.security.com/threat-intelligence/fast16-nuclear-sabotage","publisher":"Symantec and Carbon Black Threat Hunter Team","context":"The article cites this analysis as confirming that fast16 targeted LS-DYNA and AUTODYN to tamper with high-explosive nuclear weapons simulations.","category":"","primary":false}],"body":"\u003cp\u003eA new analysis by Symantec and Carbon Black says the Lua-based fast16 malware was a cyber sabotage tool built to tamper with nuclear weapons testing simulations. The researchers said it was engineered to corrupt uranium-compression simulations central to nuclear weapon design. The findings place fast16 in the same conceptual lineage as Stuxnet, but with components that may date back to 2005.\u003c/p\u003e\n\n\u003cp\u003eFast16 targeted LS-DYNA and AUTODYN, two applications used for real-world simulations such as material modeling and explosive simulation. Its hook engine was selectively interested in high-explosive simulations and activated only when material density passed 30 g/cm³, a threshold the article says uranium can reach under shock compression in an implosion device. The malware used 101 hook rules to tamper with mathematical calculations during full-scale transient blast and detonation runs.\u003c/p\u003e\n\n\u003cp\u003eThe article says the malware avoided infecting computers with certain security products and could spread automatically to other endpoints on the same network. Researchers said this ensured that machines used to run the targeted simulations would generate the same tampered outputs. The findings suggest strategic industrial sabotage using malware was being conducted by nation-state actors as far back as 20 years ago, before Stuxnet was used at Iran’s Natanz nuclear plant.\u003c/p\u003e\n"},{"n":4,"title":"IT threat evolution in Q1 2026. Non-mobile statistics","source":"securelist.com","sourceColorIdx":5,"link":"https://securelist.com/malware-report-q1-2026-pc-iot-statistics/119828/","time":"12:00","priority":"SHOULD READ","score":80,"tldr":"In Q1 2026, Kaspersky saw a broad rise in non-mobile threats, blocking over 343 million web attacks while ransomware remained highly active with 77,000+ users hit and Clop leading victim disclosures. Attackers continued to exploit zero-days and network appliances, while miners, IoT botnets, macOS threats, and local infections remained significant worldwide.","briefOverview":"\u003cp\u003eKaspersky’s Q1 2026 non-mobile threat statistics show substantial activity across web attacks, ransomware, miners, macOS threats, IoT threats, and local infections. Kaspersky products blocked more than 343 million attacks originating from online resources, and Web Anti-Virus responded to nearly 50 million unique links. File Anti-Virus detected more than 15.8 million malicious and potentially unwanted objects during the quarter.\u003c/p\u003e\n\n\u003cp\u003eRansomware remained a major category, with 2,938 new ransomware variants detected and 77,319 unique users protected from ransomware attacks. Clop led the reviewed ransomware data leak site rankings with 14.42% of published victims, followed by Qilin and The Gentlemen. The report also highlights law enforcement actions affecting ransomware forums, administrators, negotiators, and initial access brokers.\u003c/p\u003e\n\n\u003cp\u003eThe report identifies continued technical pressure from zero-day exploitation, miners, IoT botnets, and macOS threats. Interlock exploited CVE-2026-20131 in Cisco Secure FMC to achieve arbitrary Java code execution with root privileges, while miner attacks affected 260,588 unique Kaspersky users. IoT honeypot data showed Mirai variants dominating delivered threats, and macOS threats included cryptocurrency theft campaigns, exploit chains, and a supply chain attack involving the Axios npm package.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eKaspersky’s Q1 2026 non-mobile statistics describe a broad threat landscape across web, file, ransomware, miner, macOS, and IoT categories. During the quarter, Kaspersky products blocked 343,823,407 attacks launched from internet resources worldwide. Web Anti-Virus was triggered by 49,983,611 unique URLs, and File Anti-Virus detected 15,831,319 malicious and potentially unwanted objects.\u003c/p\u003e\n\n\u003cp\u003eRansomware activity remained prominent, with six new ransomware families and 2,938 new modifications detected in Q1 2026. Kaspersky protected 77,319 unique users from ransomware, with March seeing the highest monthly activity at 35,056 unique users encountering such attacks. By victim listings on reviewed data leak sites, Clop ranked first with 14.42%, followed by Qilin at 12.34% and The Gentlemen at 9.25%.\u003c/p\u003e\n\n\u003cp\u003eThe report notes multiple law enforcement-related developments affecting the ransomware ecosystem. These included the reported FBI seizure of RAMP cybercrime forum domains, the apprehension in Poland of a man suspected of links to Phobos, a Phobos ransomware administrator pleading guilty, charges against a ransomware negotiator linked by prosecutors to BlackCat, and an 81-month sentence for an initial access broker associated with Yanluowang. The article presents these as disruptions involving ransomware developers, affiliates, negotiators, and access brokers.\u003c/p\u003e\n\n\u003cp\u003eA key technical highlight was Interlock’s exploitation of CVE-2026-20131, a zero-day vulnerability in Cisco Secure FMC firewall management software. The vulnerability enabled arbitrary Java code execution with root privileges on affected devices. The report says this campaign demonstrates continued reliance on zero-days for initial access, attention to network appliances as entry points, and rapid weaponization of new vulnerabilities within the ransomware ecosystem.\u003c/p\u003e\n\n\u003cp\u003eOther non-mobile threats were also significant in Q1 2026. Kaspersky detected 3,485 new miner modifications and attacks using miners on 260,588 unique users’ computers worldwide. On macOS, the report describes a cryptocurrency theft campaign, an in-the-wild exploit chain affecting iOS and macOS, and a supply chain attack involving the Axios npm package that led to deployment of a backdoor on macOS devices.\u003c/p\u003e\n\n\u003cp\u003eIoT honeypot statistics showed a significant increase in the share of devices attacking via SSH compared with the previous reporting period, while the distribution of attacks between Telnet and SSH maintained the Q4 2025 ratio. Mirai botnet variants continued to account for the majority of top IoT threats delivered, with a new Mirai.kl variant appearing in the rankings and NyaDrop activity declining. For web and local threats, the average worldwide share of users facing at least one Malware web attack was 4.73%, while local Malware threats were detected at least once on 11.55% of users’ computers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eKaspersky’s Q1 2026 non-mobile threat statistics cover ransomware, miners, macOS threats, IoT threats, web-based attacks, and local infections. The statistics are based on detection verdicts returned by Kaspersky products, using data from users who consented to share statistical information.\u003c/p\u003e\n\n\u003cp\u003eDuring the quarter, Kaspersky products blocked more than 343 million attacks originating from online resources. Web Anti-Virus responded to 50 million unique links, and File Anti-Virus blocked nearly 15 million malicious and potentially unwanted objects. The detailed figures later in the report state that Kaspersky blocked 343,823,407 web attacks, Web Anti-Virus was triggered by 49,983,611 unique URLs, and File Anti-Virus detected 15,831,319 malicious and potentially unwanted objects.\u003c/p\u003e\n\n\u003ch2 id=\"ransomware-activity\"\u003eRansomware activity\u003c/h2\u003e\n\n\u003cp\u003eKaspersky detected six new ransomware families and 2,938 new ransomware modifications in Q1 2026. The report states that ransomware modification volumes returned to Q3 2025 levels after a surge in Q4 2025.\u003c/p\u003e\n\n\u003cp\u003eKaspersky solutions protected 77,319 unique users from ransomware attacks during the quarter. Ransomware activity was highest in March, when 35,056 unique users encountered such attacks.\u003c/p\u003e\n\n\u003cp\u003eThe most common ransomware verdicts by affected users were led by generic detections. The top entries included Trojan-Ransom.Win32.Gen at 33.90%, Trojan-Ransom.Win32.Crypren at 6.38%, WannaCry at 5.87%, Trojan-Ransom.Win32.Encoder at 4.68%, and Trojan-Ransom.Win32.Agent at 3.80%.\u003c/p\u003e\n\n\u003ch2 id=\"ransomware-groups-and-data-leak-site-activity\"\u003eRansomware groups and data leak site activity\u003c/h2\u003e\n\n\u003cp\u003eThe report ranks ransomware groups by the number of victims added to each group’s data leak site as a share of all victims published on the reviewed leak sites. In Q1 2026, Clop returned to the top position with 14.42% of listed victims. Qilin, which had led in the previous reporting period, ranked second with 12.34%.\u003c/p\u003e\n\n\u003cp\u003eThe Gentlemen ranked third with 9.25%. The article says this group emerged no later than July 2025 and had already surpassed established groups including Akira, which had 7.25%, and INC Ransom, which had 6.13%.\u003c/p\u003e\n\n\u003ch2 id=\"law-enforcement-developments-affecting-ransomware\"\u003eLaw enforcement developments affecting ransomware\u003c/h2\u003e\n\n\u003cp\u003eThe report highlights several law enforcement-related developments during Q1 2026.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIn January 2026, it was reported that the FBI had seized domains of the RAMP cybercrime forum, described as a major platform used by ransomware developers to advertise RaaS programs and recruit affiliates.\u003c/li\u003e\n\u003cli\u003eThe article states there had been no official FBI statement and that it was unclear whether RAMP servers were seized.\u003c/li\u003e\n\u003cli\u003eA RAMP moderator reportedly mentioned on an external website that law enforcement agencies had gained control over the forum.\u003c/li\u003e\n\u003cli\u003eThe report says the takedown disrupted a key element of the RaaS ecosystem, affecting ransomware operators, affiliates, and initial access brokers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also describes several cases involving individuals linked to ransomware activity.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA man suspected of links to the Phobos group was apprehended in Poland and charged with creation, acquisition, and distribution of software designed for unlawfully obtaining information, including data enabling unauthorized access to computer systems.\u003c/li\u003e\n\u003cli\u003eIn March, a Phobos ransomware administrator pleaded guilty to creation and distribution of the Trojan, which had been used in international attacks dating back to at least November 2020.\u003c/li\u003e\n\u003cli\u003eIn March, the U.S. Department of Justice charged a man who had acted as a negotiator for ransomware groups and worked for a company specializing in cyberincident investigations.\u003c/li\u003e\n\u003cli\u003eProsecutors alleged that the negotiator colluded with the BlackCat threat actor by sharing privileged insight into negotiation progress and had previously acted directly as a BlackCat affiliate.\u003c/li\u003e\n\u003cli\u003eA U.S. court sentenced an initial access broker associated with Yanluowang ransomware to 81 months in prison. According to the U.S. Department of Justice, the person facilitated dozens of ransomware attacks across the United States, causing over \u003cspan class=\"math inline\"\u003e\\(9 million in actual losses and more than \\)\u003c/span\u003e24 million in intended losses.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"zero-day-exploitation-and-network-appliance-targeting\"\u003eZero-day exploitation and network appliance targeting\u003c/h2\u003e\n\n\u003cp\u003eA major technical case in the ransomware section involved the Interlock group. The article says Interlock heavily exploited CVE-2026-20131, a zero-day vulnerability in Cisco Secure FMC firewall management software, since at least January 26, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability enabled arbitrary Java code execution with root privileges on affected devices. The report states that this campaign demonstrates continued reliance on zero-day vulnerabilities for initial access, focus on network appliances as high-value entry points, and rapid weaponization of new vulnerabilities within the ransomware ecosystem.\u003c/p\u003e\n\n\u003ch2 id=\"ransomware-geography\"\u003eRansomware geography\u003c/h2\u003e\n\n\u003cp\u003eThe report lists the top countries and territories attacked by ransomware Trojans based on the share of unique Kaspersky users attacked by ransomware Trojans among all unique Kaspersky users in each location. Countries and territories with fewer than 50,000 Kaspersky users were excluded.\u003c/p\u003e\n\n\u003cp\u003eThe top 10 were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePakistan: 0.79%\u003c/li\u003e\n\u003cli\u003eSouth Korea: 0.64%\u003c/li\u003e\n\u003cli\u003eChina: 0.52%\u003c/li\u003e\n\u003cli\u003eTajikistan: 0.40%\u003c/li\u003e\n\u003cli\u003eLibya: 0.38%\u003c/li\u003e\n\u003cli\u003eTurkmenistan: 0.36%\u003c/li\u003e\n\u003cli\u003eIraq: 0.35%\u003c/li\u003e\n\u003cli\u003eBangladesh: 0.33%\u003c/li\u003e\n\u003cli\u003eRwanda: 0.30%\u003c/li\u003e\n\u003cli\u003eCameroon: 0.28%\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"miner-activity\"\u003eMiner activity\u003c/h2\u003e\n\n\u003cp\u003eKaspersky detected 3,485 new miner modifications in Q1 2026. Miner attacks were detected on the computers of 260,588 unique Kaspersky users worldwide.\u003c/p\u003e\n\n\u003cp\u003eThe countries and territories with the highest shares of Kaspersky users attacked by miners were listed as follows, excluding locations with fewer than 50,000 Kaspersky users:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSenegal: 3.19%\u003c/li\u003e\n\u003cli\u003eTurkmenistan: 3.06%\u003c/li\u003e\n\u003cli\u003eMali: 2.63%\u003c/li\u003e\n\u003cli\u003eTanzania: 1.62%\u003c/li\u003e\n\u003cli\u003eBangladesh: 1.06%\u003c/li\u003e\n\u003cli\u003eEthiopia: 0.95%\u003c/li\u003e\n\u003cli\u003ePanama: 0.88%\u003c/li\u003e\n\u003cli\u003eAfghanistan: 0.79%\u003c/li\u003e\n\u003cli\u003eKazakhstan: 0.77%\u003c/li\u003e\n\u003cli\u003eBolivia: 0.75%\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"macos-threats\"\u003emacOS threats\u003c/h2\u003e\n\n\u003cp\u003eThe macOS section describes multiple threat developments in Q1 2026. Google uncovered a cryptocurrency theft campaign in which scammers directed victims to a fraudulent video call and prompted them to execute malicious scripts under the guise of technical support fixes for connection problems.\u003c/p\u003e\n\n\u003cp\u003eIn March, researchers with Google Threat Intelligence Group and iVerify reported an in-the-wild exploit chain targeting both iOS and macOS devices. The exploit kit was apparently marketed on the dark web and provided spyware capabilities alongside specialized cryptocurrency exfiltration modules. The exploit was delivered through drive-by downloads when victims visited compromised websites.\u003c/p\u003e\n\n\u003cp\u003eKaspersky’s analysis confirmed that the toolkit included an updated version of a component previously identified in the Operation Triangulation attack chain. The report also states that macOS devices were impacted by the supply chain attack targeting the Axios npm package, a widely used HTTP client for JavaScript. Installation of the infected package led to deployment of a backdoor on macOS devices.\u003c/p\u003e\n\n\u003cp\u003eIn macOS threat rankings, the report says PasivRobber spyware attacks were beginning to decline, giving way to more traditional adware and Monitor-class software capable of tracking user activity. The Amos stealer remained present in the top 20 macOS threats.\u003c/p\u003e\n\n\u003ch2 id=\"macos-threat-geography\"\u003emacOS threat geography\u003c/h2\u003e\n\n\u003cp\u003eThe report provides the top countries and territories by share of attacked macOS users, comparing Q4 2025 with Q1 2026. The Q1 2026 figures were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eChina: 1.97%\u003c/li\u003e\n\u003cli\u003eFrance: 1.07%\u003c/li\u003e\n\u003cli\u003eBrazil: 0.98%\u003c/li\u003e\n\u003cli\u003eThe Netherlands: 0.75%\u003c/li\u003e\n\u003cli\u003eHong Kong: 0.53%\u003c/li\u003e\n\u003cli\u003eMexico: 0.52%\u003c/li\u003e\n\u003cli\u003eIndia: 0.48%\u003c/li\u003e\n\u003cli\u003eGermany: 0.45%\u003c/li\u003e\n\u003cli\u003eRussian Federation: 0.37%\u003c/li\u003e\n\u003cli\u003eThailand: 0.27%\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe metric represents unique users who encountered macOS threats as a percentage of all unique Kaspersky users in each country or territory.\u003c/p\u003e\n\n\u003ch2 id=\"iot-threat-statistics\"\u003eIoT threat statistics\u003c/h2\u003e\n\n\u003cp\u003eThe IoT section is based on attacks targeting Kaspersky IoT honeypots. Geographic data on attack sources is based on IP addresses of attacking devices.\u003c/p\u003e\n\n\u003cp\u003eIn Q1 2026, the share of devices attacking Kaspersky honeypots via SSH increased significantly compared with the previous reporting period. The report also states that the distribution of attacks between Telnet and SSH maintained the ratio observed in Q4 2025.\u003c/p\u003e\n\n\u003cp\u003eMirai botnet variants continued to account for the majority of the top IoT threats delivered to infected devices after successful attacks. The report also notes that a new variant, Mirai.kl, appeared in the rankings. NyaDrop botnet activity declined significantly during the quarter.\u003c/p\u003e\n\n\u003ch2 id=\"iot-attack-source-geography\"\u003eIoT attack-source geography\u003c/h2\u003e\n\n\u003cp\u003eFor SSH-based attacks on Kaspersky IoT honeypots, the United States, the Netherlands, and Germany accounted for the highest proportions in Q1 2026.\u003c/p\u003e\n\n\u003cp\u003eThe listed SSH-based attack shares for Q1 2026 were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnited States: 23.74%\u003c/li\u003e\n\u003cli\u003eThe Netherlands: 17.57%\u003c/li\u003e\n\u003cli\u003eGermany: 10.34%\u003c/li\u003e\n\u003cli\u003ePanama: 6.34%\u003c/li\u003e\n\u003cli\u003eIndia: 6.05%\u003c/li\u003e\n\u003cli\u003eRomania: 5.82%\u003c/li\u003e\n\u003cli\u003eAustralia: 4.61%\u003c/li\u003e\n\u003cli\u003eVietnam: 3.50%\u003c/li\u003e\n\u003cli\u003eRussian Federation: 2.35%\u003c/li\u003e\n\u003cli\u003eSweden: 2.09%\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor Telnet attacks, China continued to account for the largest proportion, while the article notes a marked increase in activity originating from Pakistan.\u003c/p\u003e\n\n\u003cp\u003eThe listed Telnet attack shares for Q1 2026 were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eChina: 39.54%\u003c/li\u003e\n\u003cli\u003ePakistan: 27.31%\u003c/li\u003e\n\u003cli\u003eRussian Federation: 8.25%\u003c/li\u003e\n\u003cli\u003eIndonesia: 6.71%\u003c/li\u003e\n\u003cli\u003eIndia: 4.66%\u003c/li\u003e\n\u003cli\u003eBrazil: 3.30%\u003c/li\u003e\n\u003cli\u003eArgentina: 2.51%\u003c/li\u003e\n\u003cli\u003eNigeria: 1.38%\u003c/li\u003e\n\u003cli\u003eThailand: 0.55%\u003c/li\u003e\n\u003cli\u003eSweden: 0.55%\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"web-based-attacks\"\u003eWeb-based attacks\u003c/h2\u003e\n\n\u003cp\u003eThe web attack statistics are based on Web Anti-Virus detections when suspicious objects are downloaded from malicious or infected web pages. These pages may be deliberately created by cybercriminals, while compromised legitimate websites and sites hosting user-generated content can also become infected.\u003c/p\u003e\n\n\u003cp\u003eIn Q1 2026, Kaspersky solutions blocked 343,823,407 attacks launched from internet resources worldwide. Web Anti-Virus was triggered by 49,983,611 unique URLs.\u003c/p\u003e\n\n\u003cp\u003eTo identify geographic sources of web attacks, Kaspersky matched domain names to the real IP addresses where domains were hosted and then identified those IP locations using GeoIP. The report also calculates where users faced the greatest risk of online infection by measuring the share of Kaspersky users in each location whose computers triggered Web Anti-Virus during the period.\u003c/p\u003e\n\n\u003cp\u003eThe online infection-risk ranking includes only malicious objects classified as Malware and excludes detections of potentially dangerous or unwanted programs such as RiskTool or adware. On average, 4.73% of users’ computers worldwide were subjected to at least one Malware web attack during the quarter.\u003c/p\u003e\n\n\u003cp\u003eThe top 20 countries and territories by share of users targeted by web-based Malware attacks included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVenezuela: 9.33%\u003c/li\u003e\n\u003cli\u003eHungary: 8.16%\u003c/li\u003e\n\u003cli\u003eItaly: 7.58%\u003c/li\u003e\n\u003cli\u003eTajikistan: 7.48%\u003c/li\u003e\n\u003cli\u003eIndia: 7.21%\u003c/li\u003e\n\u003cli\u003eGreece: 7.13%\u003c/li\u003e\n\u003cli\u003ePortugal: 7.10%\u003c/li\u003e\n\u003cli\u003eFrance: 7.05%\u003c/li\u003e\n\u003cli\u003eBelgium: 6.83%\u003c/li\u003e\n\u003cli\u003eSlovakia: 6.80%\u003c/li\u003e\n\u003cli\u003eVietnam: 6.62%\u003c/li\u003e\n\u003cli\u003eBosnia and Herzegovina: 6.57%\u003c/li\u003e\n\u003cli\u003eCanada: 6.56%\u003c/li\u003e\n\u003cli\u003eSerbia: 6.50%\u003c/li\u003e\n\u003cli\u003eTunisia: 6.36%\u003c/li\u003e\n\u003cli\u003eQatar: 6.01%\u003c/li\u003e\n\u003cli\u003eSpain: 5.95%\u003c/li\u003e\n\u003cli\u003eGermany: 5.95%\u003c/li\u003e\n\u003cli\u003eSri Lanka: 5.89%\u003c/li\u003e\n\u003cli\u003eBrazil: 5.88%\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCountries and territories with fewer than 10,000 Kaspersky users were excluded from this ranking.\u003c/p\u003e\n\n\u003ch2 id=\"local-threats\"\u003eLocal threats\u003c/h2\u003e\n\n\u003cp\u003eThe local threats section covers malicious objects that reached computers through infected files, removable media, or non-open forms such as complex installers and encrypted files. The statistics are based on detections by File Anti-Virus through On-Access Scan and On-Demand Scan modules, including detections on hard drives and removable storage media such as flash drives, camera memory cards, phones, and external hard drives.\u003c/p\u003e\n\n\u003cp\u003eIn Q1 2026, File Anti-Virus detected 15,831,319 malicious and potentially unwanted objects. The local infection-risk ranking includes only malicious objects classified as Malware and excludes detections of potentially dangerous or unwanted programs such as RiskTool or adware.\u003c/p\u003e\n\n\u003cp\u003eOn average worldwide, Malware local threats were detected at least once on 11.55% of users’ computers during Q1. Russia scored 11.92% in these rankings.\u003c/p\u003e\n\n\u003cp\u003eThe top 20 countries and territories by share of users whose computers had local Malware threats blocked were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTurkmenistan: 47.96%\u003c/li\u003e\n\u003cli\u003eTajikistan: 31.48%\u003c/li\u003e\n\u003cli\u003eCuba: 31.03%\u003c/li\u003e\n\u003cli\u003eYemen: 29.59%\u003c/li\u003e\n\u003cli\u003eAfghanistan: 28.47%\u003c/li\u003e\n\u003cli\u003eBurundi: 26.93%\u003c/li\u003e\n\u003cli\u003eUzbekistan: 24.81%\u003c/li\u003e\n\u003cli\u003eSyria: 23.08%\u003c/li\u003e\n\u003cli\u003eNicaragua: 21.97%\u003c/li\u003e\n\u003cli\u003eCameroon: 21.60%\u003c/li\u003e\n\u003cli\u003eChina: 21.09%\u003c/li\u003e\n\u003cli\u003eMozambique: 21.02%\u003c/li\u003e\n\u003cli\u003eAlgeria: 20.64%\u003c/li\u003e\n\u003cli\u003eDemocratic Republic of the Congo: 20.63%\u003c/li\u003e\n\u003cli\u003eBangladesh: 20.44%\u003c/li\u003e\n\u003cli\u003eMali: 20.35%\u003c/li\u003e\n\u003cli\u003eRepublic of the Congo: 20.23%\u003c/li\u003e\n\u003cli\u003eMadagascar: 20.00%\u003c/li\u003e\n\u003cli\u003eBelarus: 19.78%\u003c/li\u003e\n\u003cli\u003eTanzania: 19.52%\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCountries and territories with fewer than 10,000 Kaspersky users were excluded from this ranking.\u003c/p\u003e\n\n\u003ch2 id=\"key-impacts-captured-in-the-report\"\u003eKey impacts captured in the report\u003c/h2\u003e\n\n\u003cp\u003eThe report’s impact figures show substantial activity across multiple non-mobile threat categories in Q1 2026.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMore than 343 million web attacks were blocked by Kaspersky products.\u003c/li\u003e\n\u003cli\u003eNearly 50 million unique URLs triggered Web Anti-Virus.\u003c/li\u003e\n\u003cli\u003eMore than 15.8 million malicious and potentially unwanted objects were detected by File Anti-Virus.\u003c/li\u003e\n\u003cli\u003e77,319 unique users were protected from ransomware attacks.\u003c/li\u003e\n\u003cli\u003e260,588 unique users were attacked by miner programs.\u003c/li\u003e\n\u003cli\u003eMalware web attacks affected an average of 4.73% of users’ computers worldwide.\u003c/li\u003e\n\u003cli\u003eMalware local threats were detected at least once on 11.55% of users’ computers worldwide.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-picture\"\u003eOverall picture\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Q1 2026 as a quarter with continued high-volume non-mobile threat activity across web resources, local files, ransomware, miners, IoT devices, and macOS systems. Ransomware remained prominent through new variants, user attacks, data leak site activity, zero-day exploitation, and law enforcement actions against several parts of the ransomware ecosystem.\u003c/p\u003e\n\n\u003cp\u003eThe technical details emphasized include Interlock’s exploitation of CVE-2026-20131 in Cisco Secure FMC, macOS and iOS exploit-chain activity, a macOS-impacting supply chain attack involving Axios, and IoT honeypot activity dominated by Mirai variants. The report also provides geographic rankings showing where Kaspersky users most often encountered ransomware, miners, macOS threats, web-based Malware attacks, and local Malware threats.\u003c/p\u003e\n","keyPoints":["In Q1 2026, Kaspersky products blocked 343,823,407 attacks launched from internet resources worldwide and Web Anti-Virus was triggered by 49,983,611 unique URLs.","Kaspersky detected six new ransomware families and 2,938 new ransomware modifications in Q1 2026, while protecting 77,319 unique users from ransomware attacks.","Clop was the most prolific ransomware group by data leak site victim listings in Q1 2026, accounting for 14.42% of victims published on the reviewed leak sites.","Kaspersky detected attacks using miner programs on the computers of 260,588 unique users worldwide and identified 3,485 new miner modifications in Q1 2026.","In Q1 2026, File Anti-Virus detected 15,831,319 malicious and potentially unwanted objects, and local Malware threats were detected at least once on 11.55% of users’ computers worldwide."],"insights":["Law enforcement activity in Q1 2026 targeted multiple parts of the ransomware ecosystem, including a cybercrime forum used for RaaS recruitment, a suspected Phobos-linked actor, a Phobos administrator, a ransomware negotiator, and an initial access broker.","The Interlock campaign’s exploitation of CVE-2026-20131 in Cisco Secure FMC shows that ransomware operators used a zero-day in firewall management software to gain root-level code execution on network appliances.","The ransomware leaderboard shifted notably, with Clop returning to first place, Qilin dropping from the lead, and the newer group The Gentlemen reaching third place ahead of established groups such as Akira and INC Ransom.","macOS threats in Q1 2026 included not only adware and stealers but also a drive-by exploit chain with links to Operation Triangulation and a supply chain attack involving the infected Axios npm package.","IoT attack sources differed sharply by protocol: the United States led SSH-based attacks, while China remained the largest source of Telnet attacks despite a marked increase from Pakistan."],"referencedReports":[{"title":"Amazon Threat Intelligence teams identify Interlock ransomware campaign targeting enterprise firewalls","url":"https://aws.amazon.com/blogs/security/amazon-threat-intelligence-teams-identify-interlock-ransomware-campaign-targeting-enterprise-firewalls/","publisher":"Amazon Web Services (AWS)","context":"The article cites this analysis when describing Interlock ransomware exploitation of CVE-2026-20131 in Cisco Secure FMC firewall management software.","category":"","primary":false},{"title":"UNC1069 targets cryptocurrency and AI with social engineering","url":"https://cloud.google.com/blog/topics/threat-intelligence/unc1069-targets-cryptocurrency-ai-social-engineering/","publisher":"Google Cloud","context":"The article references Google’s findings on a cryptocurrency theft campaign that tricked victims into running malicious scripts during fraudulent video calls.","category":"","primary":false},{"title":"CORUNA: A Powerful iOS Exploit Kit","url":"https://cloud.google.com/blog/topics/threat-intelligence/coruna-powerful-ios-exploit-kit","publisher":"Google Threat Intelligence Group","context":"The article cites GTIG reporting on an in-the-wild exploit chain targeting iOS and macOS devices.","category":"","primary":false},{"title":"CORUNA: Inside the Nation-State-Grade iOS Exploit Kit We’ve Been Tracking","url":"https://iverify.io/blog/coruna-inside-the-nation-state-grade-ios-exploit-kit-we-ve-been-tracking","publisher":"iVerify","context":"The article cites iVerify research on the CORUNA exploit kit and its spyware and cryptocurrency exfiltration capabilities.","category":"","primary":false},{"title":"North Korea threat actor targets Axios npm package","url":"https://cloud.google.com/blog/topics/threat-intelligence/north-korea-threat-actor-targets-axios-npm-package","publisher":"Google Cloud","context":"The article references this analysis when noting that macOS devices were affected by a supply chain attack involving the Axios npm package.","category":"","primary":false}],"body":"\u003cp\u003eKaspersky’s Q1 2026 non-mobile threat statistics show substantial activity across web attacks, ransomware, miners, macOS threats, IoT threats, and local infections. Kaspersky products blocked more than 343 million attacks originating from online resources, and Web Anti-Virus responded to nearly 50 million unique links. File Anti-Virus detected more than 15.8 million malicious and potentially unwanted objects during the quarter.\u003c/p\u003e\n\n\u003cp\u003eRansomware remained a major category, with 2,938 new ransomware variants detected and 77,319 unique users protected from ransomware attacks. Clop led the reviewed ransomware data leak site rankings with 14.42% of published victims, followed by Qilin and The Gentlemen. The report also highlights law enforcement actions affecting ransomware forums, administrators, negotiators, and initial access brokers.\u003c/p\u003e\n\n\u003cp\u003eThe report identifies continued technical pressure from zero-day exploitation, miners, IoT botnets, and macOS threats. Interlock exploited CVE-2026-20131 in Cisco Secure FMC to achieve arbitrary Java code execution with root privileges, while miner attacks affected 260,588 unique Kaspersky users. IoT honeypot data showed Mirai variants dominating delivered threats, and macOS threats included cryptocurrency theft campaigns, exploit chains, and a supply chain attack involving the Axios npm package.\u003c/p\u003e\n"},{"n":1,"title":"Experts warn of privacy risks as AI firms looks to connect to financial accounts","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/experts-warn-of-privacy-cyer-risks-ai-finance","time":"16:10","priority":"SHOULD READ","score":78,"tldr":"OpenAI is adding a ChatGPT feature that connects to users’ financial accounts for personalized finance advice, but privacy and security experts warn it could centralize highly sensitive data and create a valuable target for account takeovers. Even view-only access may expose detailed information about users’ balances, spending, debts and financial habits if misused or breached.","briefOverview":"\u003cp\u003eOpenAI announced a new ChatGPT feature that allows users to connect their financial accounts to the chatbot for personal finance advice. The feature is supported by Plaid and is expected to be powered in the future by Intuit. It is currently available to paid ChatGPT Pro subscribers and is planned for rollout to Plus users, with a stated goal of eventually making it available to everyone.\u003c/p\u003e\n\n\u003cp\u003eThe platform can integrate information from more than 12,000 financial institutions, including Robinhood, Bank of America, American Express, and Charles Schwab. OpenAI says connected accounts will let users view a dashboard covering portfolio performance, spending, subscriptions, upcoming payments, and other financial details. The company says recent improvements in GPT-5.5 support the feature’s ability to analyze complex, multi-step financial tasks.\u003c/p\u003e\n\n\u003cp\u003ePrivacy and cybersecurity experts warned that connecting financial accounts to ChatGPT could expose highly sensitive information even if the tool has view-only access. Experts cited risks including account takeover, centralized financial data becoming a high-value target, and the possibility that collected financial information could reveal personal habits, vulnerabilities, relationships, debts, and financial history. OpenAI says users can disconnect accounts, delete conversations, erase financial memories, and use temporary chats that do not access financial accounts or save in chat history.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOpenAI announced that it is rolling out a ChatGPT feature that lets users connect all of their financial accounts to the chatbot for personal finance advice. The feature is supported by Plaid, which connects bank accounts to third-party financial apps. OpenAI said the platform will also be powered by Intuit in the near future.\u003c/p\u003e\n\n\u003cp\u003eThe feature is available now for paid ChatGPT Pro subscribers and is planned for future rollout to Plus users. OpenAI said its goal is to make the feature available to everyone. The platform can integrate data from more than 12,000 financial institutions, including Robinhood, Bank of America, American Express, and Charles Schwab.\u003c/p\u003e\n\n\u003cp\u003eOnce accounts are connected, users can access a dashboard showing an up-to-date view of portfolio performance, spending, subscriptions, upcoming payments, and related financial information. OpenAI said more than 200 million people a month already come to ChatGPT for budgeting, investment, and other financial advice. The company said recent improvements in GPT-5.5 support the feature by enabling analysis of complicated and multi-step tasks.\u003c/p\u003e\n\n\u003cp\u003eOpenAI said users will remain in control of their data through options such as disconnecting accounts, deleting individual conversations, erasing financial memories, and using temporary chats. The company said conversation history will remain intact after accounts are disconnected, though users can delete individual conversations. Temporary chats will not access financial accounts and will not save in users’ histories.\u003c/p\u003e\n\n\u003cp\u003ePrivacy and cybersecurity experts raised concerns that the safeguards may not fully protect users. Ridhi Shetty of the Center for Democracy and Technology’s Privacy \u0026amp; Data Project said collected financial information can reveal deeply personal details about a person’s life, habits, vulnerabilities, and relationships. She also said OpenAI’s announcement does not address whether the data could eventually support advertising or other commercial targeting.\u003c/p\u003e\n\n\u003cp\u003eCybersecurity experts warned that view-only access does not eliminate risk. Diana Kelley of Noma Security said an attacker who takes over a ChatGPT account could see a consolidated picture of a user’s balances, spending, investments, debts, goals, and financial history. Ram Varadarajan of Acalvio said centralizing financial data inside one platform creates a high-value target because a single breach could provide hackers with a detailed map of users’ net worth and spending habits.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOpenAI announced a new ChatGPT feature that allows users to connect all of their financial accounts to the chatbot for personal finance advice. The rollout is supported by Plaid, a financial technology company that connects individuals’ bank accounts to third-party financial apps. OpenAI said the financial planning platform will also be powered by Intuit in the near future.\u003c/p\u003e\n\n\u003cp\u003eThe feature is currently available for paid ChatGPT Pro subscribers. OpenAI said it will be rolled out to Plus users in the future, with a goal of eventually making it available to everyone.\u003c/p\u003e\n\n\u003ch2 id=\"financial-account-connectivity\"\u003eFinancial Account Connectivity\u003c/h2\u003e\n\n\u003cp\u003eThe platform can integrate information from more than 12,000 financial institutions. The article names several examples, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRobinhood\u003c/li\u003e\n\u003cli\u003eBank of America\u003c/li\u003e\n\u003cli\u003eAmerican Express\u003c/li\u003e\n\u003cli\u003eCharles Schwab\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eOnce users connect their accounts, ChatGPT will provide access to a dashboard intended to give an up-to-date view of financial information. OpenAI said the dashboard can show portfolio performance, spending, subscriptions, upcoming payments, and other related financial details.\u003c/p\u003e\n\n\u003ch2 id=\"role-of-ai-capabilities\"\u003eRole of AI Capabilities\u003c/h2\u003e\n\n\u003cp\u003eOpenAI said more than 200 million people a month already come to ChatGPT for budgeting, investment, and other financial advice. The company said recent improvements in GPT-5.5 support the new feature. According to the article, GPT-5.5 is an advanced model that can analyze complicated and multi-step tasks.\u003c/p\u003e\n\n\u003cp\u003eOpenAI said that when users connect financial accounts, ChatGPT can combine its reasoning capabilities with users’ real financial context and with information they have shared about their goals, lifestyle, and priorities. The company said this can help users spot patterns, understand tradeoffs, and plan for major decisions in a more personal and complete way.\u003c/p\u003e\n\n\u003ch2 id=\"data-controls-described-by-openai\"\u003eData Controls Described by OpenAI\u003c/h2\u003e\n\n\u003cp\u003eOpenAI said the feature will allow users to stay in control of their data. The article describes several user controls included in the offering:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUsers can disconnect their financial accounts whenever they want.\u003c/li\u003e\n\u003cli\u003eIf accounts are disconnected, ChatGPT conversation history remains intact.\u003c/li\u003e\n\u003cli\u003eUsers can delete individual conversations.\u003c/li\u003e\n\u003cli\u003eUsers can erase “financial memories,” which store key details about financial goals, investments, and overall financial positioning.\u003c/li\u003e\n\u003cli\u003eUsers can use temporary chats that do not access financial accounts and do not save in chat histories.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese controls are presented by OpenAI as safeguards around user data, but the article notes that privacy and cybersecurity experts said they may not be enough to shield users.\u003c/p\u003e\n\n\u003ch2 id=\"privacy-concerns\"\u003ePrivacy Concerns\u003c/h2\u003e\n\n\u003cp\u003eRidhi Shetty, senior policy counsel at the Center for Democracy and Technology’s Privacy \u0026amp; Data Project, warned that the collected financial information can reveal deeply personal details. She said this remains true even if the feature does not access full account numbers or have the ability to make changes to financial accounts.\u003c/p\u003e\n\n\u003cp\u003eAccording to Shetty, the information collected could reveal details about a person’s life, habits, vulnerabilities, and relationships. She also said OpenAI’s announcement does not address whether financial data could eventually be used to support advertising or other commercial targeting, despite incentives to do so.\u003c/p\u003e\n\n\u003cp\u003eShetty also questioned the reliability of chatbot-provided financial guidance. She noted that the tool does not abide by the same obligations that professional financial advisors have to protect clients’ privacy and act in their best interests.\u003c/p\u003e\n\n\u003ch2 id=\"cybersecurity-risks\"\u003eCybersecurity Risks\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity experts also raised concerns about the feature. Diana Kelley, chief information security officer at Noma Security, said the platform’s view-only design is meaningfully safer than an agent that can move money or change accounts. However, she emphasized that view-only access does not mean low risk.\u003c/p\u003e\n\n\u003cp\u003eKelley warned that if someone takes over a user’s ChatGPT account, they may gain a consolidated picture of that user’s financial life. The information exposed could include balances, spending, investments, debts, goals, and financial history.\u003c/p\u003e\n\n\u003cp\u003eRam Varadarajan, CEO at Acalvio, warned that centralizing financial data inside a single platform is risky. He said this creates a high-value target for account takeover attacks because a single security breach could give hackers a detailed map of users’ net worth and spending habits.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-user-safeguards\"\u003eRecommended User Safeguards\u003c/h2\u003e\n\n\u003cp\u003eThe article includes several precautions from Kelley for users of the feature. She advised users to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUse multi-factor authentication.\u003c/li\u003e\n\u003cli\u003eLog out of other sessions.\u003c/li\u003e\n\u003cli\u003eReview memory settings.\u003c/li\u003e\n\u003cli\u003eDisable training for sensitive chats.\u003c/li\u003e\n\u003cli\u003eDelete chats and memories when they no longer need the stored information.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese recommendations are framed as ways to reduce risk when sensitive financial information is connected to ChatGPT.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-stakeholders\"\u003eAffected Parties and Stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe most directly affected parties are ChatGPT users who connect financial accounts to the platform. At launch, this includes paid ChatGPT Pro subscribers, with Plus users expected to gain access later. OpenAI’s stated goal is to make the feature available to everyone.\u003c/p\u003e\n\n\u003cp\u003eOther entities involved include Plaid, which supports account connectivity, and Intuit, which is expected to power the financial planning platform in the near future. Financial institutions whose data can be integrated include more than 12,000 organizations, with the article specifically naming Robinhood, Bank of America, American Express, and Charles Schwab.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify a specific threat actor or an active breach. The cybersecurity concerns described are focused on risks such as account takeover, centralized sensitive data, and the exposure of financial information if a ChatGPT account is compromised.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-response\"\u003eDisclosed Impact and Response\u003c/h2\u003e\n\n\u003cp\u003eNo actual compromise, breach, or user harm is reported in the article. The disclosed impact is prospective and risk-focused: experts warn that the feature could expose sensitive financial information if misused, accessed through account takeover, or targeted because of centralized data.\u003c/p\u003e\n\n\u003cp\u003eOpenAI’s response, as described in the article, centers on user controls such as account disconnection, deletion of conversations, erasure of financial memories, and temporary chats. Privacy and cybersecurity experts argue that these measures may not fully address the sensitivity of the data, the potential for commercial targeting, the lack of professional financial advisor obligations, and the security risks of centralizing users’ financial details in one platform.\u003c/p\u003e\n","keyPoints":["OpenAI is rolling out a ChatGPT feature that lets users connect financial accounts to the chatbot for personal finance advice, with support from Plaid and future integration with Intuit.","The feature can integrate information from more than 12,000 financial institutions, including Robinhood, Bank of America, American Express, and Charles Schwab.","OpenAI says users can disconnect accounts, delete individual conversations, erase financial memories, and use temporary chats that do not access financial accounts or save in chat history.","Privacy expert Ridhi Shetty warned that the financial information collected could reveal deeply personal details about a person’s life, habits, vulnerabilities, and relationships.","Cybersecurity experts warned that even view-only access could expose a consolidated picture of users’ finances if a ChatGPT account is taken over, and that centralizing financial data creates a high-value target for attackers."],"insights":["The article highlights that disconnecting financial accounts does not automatically remove related ChatGPT conversation history, so users may need to separately delete chats and financial memories to reduce retained sensitive information.","A key security takeaway is that view-only access still creates serious exposure because an account takeover could reveal a consolidated picture of balances, spending, investments, debts, goals, and financial history.","The article notes a regulatory and trust gap: ChatGPT may provide financial guidance without being bound by the same privacy and best-interest obligations that apply to professional financial advisors.","Experts specifically recommend practical safeguards such as using multi-factor authentication, logging out of other sessions, reviewing memory settings, disabling training for sensitive chats, and deleting chats and memories when no longer needed.","The article flags that OpenAI’s announcement does not address whether collected financial data could later support advertising or other commercial targeting."],"referencedReports":[],"body":"\u003cp\u003eOpenAI announced a new ChatGPT feature that allows users to connect their financial accounts to the chatbot for personal finance advice. The feature is supported by Plaid and is expected to be powered in the future by Intuit. It is currently available to paid ChatGPT Pro subscribers and is planned for rollout to Plus users, with a stated goal of eventually making it available to everyone.\u003c/p\u003e\n\n\u003cp\u003eThe platform can integrate information from more than 12,000 financial institutions, including Robinhood, Bank of America, American Express, and Charles Schwab. OpenAI says connected accounts will let users view a dashboard covering portfolio performance, spending, subscriptions, upcoming payments, and other financial details. The company says recent improvements in GPT-5.5 support the feature’s ability to analyze complex, multi-step financial tasks.\u003c/p\u003e\n\n\u003cp\u003ePrivacy and cybersecurity experts warned that connecting financial accounts to ChatGPT could expose highly sensitive information even if the tool has view-only access. Experts cited risks including account takeover, centralized financial data becoming a high-value target, and the possibility that collected financial information could reveal personal habits, vulnerabilities, relationships, debts, and financial history. OpenAI says users can disconnect accounts, delete conversations, erase financial memories, and use temporary chats that do not access financial accounts or save in chat history.\u003c/p\u003e\n"},{"n":7,"title":"Microsoft confirms Windows 11 security update install issues","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-confirms-kb5089549-windows-11-security-update-install-issues/","time":"08:33","priority":"SHOULD READ","score":78,"tldr":"Microsoft confirmed that the May 2026 Windows 11 security update KB5089549 may fail with error 0x800f0922 and roll back on systems with too little free space on the EFI System Partition. Microsoft is working on a fix and recommends using Known Issue Rollback, with enterprise admins able to deploy a temporary Group Policy mitigation.","briefOverview":"\u003cp\u003eMicrosoft confirmed that the May 2026 Windows 11 security update KB5089549 fails to install on some systems and triggers 0x800f0922 errors. The issue causes the update to automatically roll back on affected devices. Users may see the message “Something didn\u0026rsquo;t go as planned. Undoing changes.”\u003c/p\u003e\n\n\u003cp\u003eThe known issue is caused by insufficient free space on the EFI System Partition, especially on devices with 10 MB or less available. Microsoft said installation may proceed through initial phases but fail during the reboot phase at about 35–36% completion. Logs may reference insufficient ESP free space or failures servicing boot files.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft is still working to resolve the issue and advised affected customers to use Known Issue Rollback as a mitigation. Enterprise administrators can install and configure a provided Group Policy to apply the rollback in managed environments. Microsoft said affected devices must be restarted for the Group Policy setting to apply.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft confirmed that the May 2026 Windows 11 security update KB5089549 can fail to install on some systems. The failed installations trigger 0x800f0922 errors and roll back automatically on affected devices. Users may see the message “Something didn\u0026rsquo;t go as planned. Undoing changes.”\u003c/p\u003e\n\n\u003cp\u003eThe issue is tied to insufficient free space on the EFI System Partition. Microsoft said it particularly affects devices with limited ESP free space, especially when 10 MB or less is available. On affected systems, the update may progress through the initial installation stages before failing during reboot at approximately 35–36% completion.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft listed several log entries that may appear on affected devices. These include “SpaceCheck: Insufficient free space,” “ServicingBootFiles failed. Error = 0x70,” and “SpaceCheck: \u003cvalue\u003e used by third-party/OEM files outside of Microsoft boot directories.” These entries point to problems related to available ESP space and boot file servicing.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft is still working to resolve the issue. In the meantime, it advised affected customers to use Known Issue Rollback, a Windows feature that reverses buggy updates pushed via Windows Update. For enterprise-managed environments, administrators can manually mitigate the problem by installing and configuring Microsoft’s provided Group Policy.\u003c/p\u003e\n\n\u003cp\u003eThe Group Policy applies to Windows 11 24H2, Windows 11 25H2, and Windows Server 2025 for KB5089549. Microsoft said admins need to install and configure the policy for their Windows version and restart affected devices to apply the setting. The article does not identify any threat actor; it describes a Windows update installation issue and Microsoft’s response.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft confirmed that the May 2026 Windows 11 security update KB5089549 fails to install on some systems. The installation failures trigger 0x800f0922 errors and cause the update to automatically roll back on affected devices.\u003c/p\u003e\n\n\u003cp\u003eThe issue is described as a known issue and is caused by insufficient free space on the EFI System Partition, or ESP. Microsoft said affected users may see the message “Something didn\u0026rsquo;t go as planned. Undoing changes.” when the update rolls back.\u003c/p\u003e\n\n\u003ch2 id=\"technical-cause\"\u003eTechnical Cause\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft attributed the issue to limited free space on the EFI System Partition. The company said the problem especially affects devices with 10 MB or less space available on the ESP.\u003c/p\u003e\n\n\u003cp\u003eAccording to Microsoft, affected installations may proceed through the initial phases but fail during the reboot phase. The failure occurs at approximately 35–36% completion.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-in-logs\"\u003eIndicators in Logs\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several log entries that may appear on affected devices and point to insufficient ESP space. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e“SpaceCheck: Insufficient free space”\u003c/li\u003e\n\u003cli\u003e“ServicingBootFiles failed. Error = 0x70”\u003c/li\u003e\n\u003cli\u003e“SpaceCheck: \u003cvalue\u003e used by third-party/OEM files outside of Microsoft boot directories”\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese entries are presented as examples of logs that users may find when the installation problem occurs.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties\"\u003eAffected Parties\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the issue affects some systems installing the May 2026 Windows 11 security update KB5089549. Microsoft specifically highlighted devices with limited free space on the EFI System Partition, especially those with 10 MB or less available.\u003c/p\u003e\n\n\u003cp\u003eThe article also addresses enterprise-managed environments where IT departments control Windows updates. In those environments, administrators can apply Microsoft’s mitigation manually using a provided Group Policy.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-mitigation-guidance\"\u003eMicrosoft’s Mitigation Guidance\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said it is still working to resolve the issue. In the meantime, it advised affected customers to mitigate the problem using Known Issue Rollback.\u003c/p\u003e\n\n\u003cp\u003eKnown Issue Rollback is described in the article as a Windows feature that reverses buggy updates pushed via Windows Update. Microsoft said the Group Policy mitigation temporarily disables the change causing the issue.\u003c/p\u003e\n\n\u003cp\u003eFor enterprise-managed environments, Microsoft provided a Group Policy package for Windows 11 24H2, Windows 11 25H2, and Windows Server 2025 related to KB5089549. Microsoft said administrators need to install and configure the Group Policy for their Windows version and restart the affected devices to apply the setting.\u003c/p\u003e\n\n\u003ch2 id=\"related-update-context\"\u003eRelated Update Context\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft released the KB5089549 cumulative update the previous week. The article states that it was released with dozens of other bug fixes, security patches, and improvements.\u003c/p\u003e\n\n\u003cp\u003eThe update also included a fix for another known issue that caused some Windows 11 systems to boot into BitLocker recovery after installing the April 2026 Windows security updates. The article also notes that Microsoft recently addressed a Windows Autopatch bug that caused driver updates restricted by administrative policies to be deployed on some Autopatch-managed Windows devices across the European Union.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also confirmed that the April 2026 security updates caused failures in third-party backup applications using a vulnerable driver. These items are presented as related Microsoft update issues and fixes.\u003c/p\u003e\n\n\u003ch2 id=\"actors-and-impact\"\u003eActors and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article does not identify any threat actor or malicious activity. It describes a Windows update installation problem caused by insufficient EFI System Partition space.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed impact is that KB5089549 may fail to install, trigger error 0x800f0922, and roll back automatically. Affected users may observe the rollback message and related log entries, while enterprise administrators are directed to apply a Known Issue Rollback Group Policy and restart affected devices.\u003c/p\u003e\n","keyPoints":["Microsoft confirmed that the May 2026 Windows 11 security update KB5089549 fails to install on some systems and triggers 0x800f0922 errors.","The issue is caused by insufficient free space on the EFI System Partition, especially on devices with 10 MB or less available.","Affected devices may fail during the reboot phase at approximately 35–36% completion and display the message \"Something didn't go as planned. Undoing changes.\"","Microsoft advised affected customers to mitigate the issue using Known Issue Rollback while it works on a resolution.","Enterprise administrators can manually mitigate the issue by installing and configuring Microsoft’s Known Issue Rollback Group Policy and restarting affected devices."],"insights":["Checking update logs for entries such as \"SpaceCheck: Insufficient free space,\" \"ServicingBootFiles failed. Error = 0x70,\" or third-party/OEM files outside Microsoft boot directories can help confirm whether the KB5089549 failure is tied to EFI System Partition space.","The installation failure can appear late in the update process, during the reboot phase at about 35–36% completion, so an initially progressing install does not indicate the device is unaffected.","Microsoft’s mitigation does not require uninstalling the update manually; it uses Known Issue Rollback to temporarily disable the specific change causing the failure.","Enterprise environments must both install and configure the provided Known Issue Rollback Group Policy and restart affected devices for the mitigation to apply."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft confirmed that the May 2026 Windows 11 security update KB5089549 fails to install on some systems and triggers 0x800f0922 errors. The issue causes the update to automatically roll back on affected devices. Users may see the message “Something didn\u0026rsquo;t go as planned. Undoing changes.”\u003c/p\u003e\n\n\u003cp\u003eThe known issue is caused by insufficient free space on the EFI System Partition, especially on devices with 10 MB or less available. Microsoft said installation may proceed through initial phases but fail during the reboot phase at about 35–36% completion. Logs may reference insufficient ESP free space or failures servicing boot files.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft is still working to resolve the issue and advised affected customers to use Known Issue Rollback as a mitigation. Enterprise administrators can install and configure a provided Group Policy to apply the rollback in managed environments. Microsoft said affected devices must be restarted for the Group Policy setting to apply.\u003c/p\u003e\n"},{"n":8,"title":"Exploit available for new DirtyDecrypt Linux root escalation flaw","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/exploit-available-for-new-dirtydecrypt-linux-root-escalation-flaw/","time":"07:18","priority":"SHOULD READ","score":78,"tldr":"A proof-of-concept exploit is now available for DirtyDecrypt, a recently patched Linux kernel flaw that can let local attackers gain root on systems with RXGK enabled, especially fast-moving distros like Fedora, Arch, and openSUSE Tumbleweed. Users should install the latest kernel updates immediately or apply the temporary module-blocking mitigation if they cannot patch.","briefOverview":"\u003cp\u003eA proof-of-concept exploit is now available for DirtyDecrypt, also known as DirtyCBC, a recently patched local privilege escalation vulnerability in the Linux kernel\u0026rsquo;s rxgk module. The flaw can allow attackers to gain root access on some Linux systems. The article says there is no official CVE ID associated with the flaw, though Will Dormann said the details align with CVE-2026-31635, which was patched on April 25.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation requires a Linux kernel built with the CONFIG_RXGK option, which enables RxGK security support for the Andrew File System client and network transport. The article says this limits the attack surface to Linux distributions that closely follow the latest upstream kernel releases, including Fedora, Arch Linux, and openSUSE Tumbleweed. V12\u0026rsquo;s proof-of-concept exploit has only been tested against Fedora and the mainline Linux kernel.\u003c/p\u003e\n\n\u003cp\u003eLinux users on potentially affected distributions are advised to install the latest kernel updates as soon as possible. For systems that cannot immediately be patched, the article provides a mitigation that blocks esp4, esp6, and rxrpc modules, but warns that it will also break IPsec VPNs and AFS distributed network file systems. The disclosure follows other recent Linux root-escalation flaws, including Dirty Frag, Fragnesia, Copy Fail, and Pack2TheRoot.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA proof-of-concept exploit has been released for DirtyDecrypt, also known as DirtyCBC, a local privilege escalation vulnerability in the Linux kernel\u0026rsquo;s rxgk module. The article says the flaw was recently patched and can allow attackers to gain root access on some Linux systems. It describes the issue as an rxgk pagecache write caused by a missing copy-on-write guard in rxgk_decrypt_skb.\u003c/p\u003e\n\n\u003cp\u003eThe V12 security team said it found and reported the flaw on May 9, 2026, but maintainers informed the team that the issue was a duplicate already patched in the mainline kernel. The article says there is no official CVE ID associated with DirtyDecrypt. However, Will Dormann, principal vulnerability analyst at Tharros, said the researchers\u0026rsquo; information aligns with CVE-2026-31635, which was patched on April 25.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation requires a Linux kernel with the CONFIG_RXGK configuration option enabled. That option enables RxGK security support for the Andrew File System client and network transport. The article says this requirement limits exposure to Linux distributions that closely follow the latest upstream kernel releases, including Fedora, Arch Linux, and openSUSE Tumbleweed.\u003c/p\u003e\n\n\u003cp\u003eThe proof-of-concept exploit from V12 has only been tested against Fedora and the mainline Linux kernel, according to the article. DirtyDecrypt is described as belonging to the same vulnerability class as several other root-escalation flaws disclosed in recent weeks, including Dirty Frag, Fragnesia, and Copy Fail. The article does not identify any actor exploiting DirtyDecrypt in the wild.\u003c/p\u003e\n\n\u003cp\u003eUsers on potentially affected Linux distributions are advised to install the latest kernel updates as soon as possible. For systems that cannot immediately be patched, the article provides a mitigation previously used for Dirty Frag that disables esp4, esp6, and rxrpc loading and removes those modules where possible. The article warns that this mitigation will also break IPsec VPNs and AFS distributed network file systems.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that attackers are actively exploiting the Copy Fail vulnerability in the wild. CISA added Copy Fail to its Known Exploited Vulnerabilities list on May 1 and ordered federal agencies to secure Linux devices by May 15. In April, Linux distributions also rolled out patches for Pack2TheRoot, a root privilege escalation vulnerability in the PackageKit daemon that had gone unnoticed for almost 12 years.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA proof-of-concept exploit is available for DirtyDecrypt, also known as DirtyCBC, a recently patched local privilege escalation flaw in the Linux kernel\u0026rsquo;s rxgk module. The article says exploitation can allow attackers to gain root access on some Linux systems. The flaw was also autonomously found and reported by the V12 security team earlier in May 2026.\u003c/p\u003e\n\n\u003cp\u003eV12 said it reported the issue on May 9, 2026, but maintainers informed the team that it was a duplicate already patched in the mainline kernel. V12 described the vulnerability as an rxgk pagecache write caused by a missing copy-on-write guard in rxgk_decrypt_skb. The article states that there is no official CVE ID associated with DirtyDecrypt.\u003c/p\u003e\n\n\u003ch2 id=\"cve-and-patch-context\"\u003eCVE and Patch Context\u003c/h2\u003e\n\n\u003cp\u003eThe article says Will Dormann, principal vulnerability analyst at Tharros, assessed that the researchers\u0026rsquo; information aligns with CVE-2026-31635. That CVE was patched on April 25, according to the article. This creates a naming and tracking issue in which the article identifies DirtyDecrypt as having no official CVE ID while also noting that it appears to match the details of a patched vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe flaw had already been patched in the mainline kernel when V12 reported it, according to the maintainers\u0026rsquo; response described by V12. The article does not provide details on which specific Linux kernel versions are patched or vulnerable. It advises users on potentially affected distributions to install the latest kernel updates as soon as possible.\u003c/p\u003e\n\n\u003ch2 id=\"technical-conditions-for-exploitation\"\u003eTechnical Conditions for Exploitation\u003c/h2\u003e\n\n\u003cp\u003eSuccessful exploitation requires a Linux kernel built with the CONFIG_RXGK configuration option. The article says CONFIG_RXGK enables RxGK security support for the Andrew File System client and network transport. Because of that requirement, the article says the attack surface is limited to Linux distributions that closely follow the latest upstream kernel releases.\u003c/p\u003e\n\n\u003cp\u003eThe distributions specifically named as potentially affected are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFedora\u003c/li\u003e\n\u003cli\u003eArch Linux\u003c/li\u003e\n\u003cli\u003eopenSUSE Tumbleweed\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also states that V12\u0026rsquo;s proof-of-concept exploit has only been tested against Fedora and the mainline Linux kernel. It does not state that the exploit has been tested on Arch Linux or openSUSE Tumbleweed.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe disclosed impact is local privilege escalation to root on some Linux systems. The article frames this as a root escalation flaw rather than a remote code execution issue. It does not report active exploitation of DirtyDecrypt in the wild.\u003c/p\u003e\n\n\u003cp\u003eDirtyDecrypt is described as belonging to the same vulnerability class as several other recently disclosed Linux root-escalation flaws. The article names Dirty Frag, Fragnesia, and Copy Fail as related examples disclosed in recent weeks. It also notes another recent root-privilege escalation vulnerability, Pack2TheRoot, in the PackageKit daemon.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eThe primary recommended response is to install the latest kernel updates as soon as possible on potentially affected Linux distributions. For systems that cannot immediately be patched, the article provides a mitigation that blocks the esp4, esp6, and rxrpc modules and removes them if loaded. The mitigation command also drops caches through /proc/sys/vm/drop_caches.\u003c/p\u003e\n\n\u003cp\u003eThe article warns that this temporary mitigation has functional impact. It will break IPsec VPNs and AFS distributed network file systems. This is the same mitigation the article says was used for Dirty Frag.\u003c/p\u003e\n\n\u003ch2 id=\"related-vulnerability-activity\"\u003eRelated Vulnerability Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article places DirtyDecrypt in a broader series of recent Linux root-escalation disclosures. It mentions Dirty Frag, Fragnesia, and Copy Fail as flaws in the same vulnerability class. It also says attackers are actively exploiting Copy Fail in the wild.\u003c/p\u003e\n\n\u003cp\u003eCISA added Copy Fail to its list of flaws exploited in attacks on May 1. The agency ordered federal agencies to secure their Linux devices within two weeks, by May 15. CISA warned that this type of vulnerability is a frequent attack vector for malicious cyber actors and poses significant risks to the federal enterprise.\u003c/p\u003e\n\n\u003ch2 id=\"other-recent-linux-privilege-escalation-issue\"\u003eOther Recent Linux Privilege Escalation Issue\u003c/h2\u003e\n\n\u003cp\u003eThe article also references Pack2TheRoot, a root-privilege escalation vulnerability in the PackageKit daemon. It says Linux distributions rolled out patches for Pack2TheRoot in April. The vulnerability had gone unnoticed for almost 12 years, according to the article.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eDirtyDecrypt is a recently patched Linux kernel rxgk module privilege escalation flaw with a public proof-of-concept exploit.\u003c/li\u003e\n\u003cli\u003eExploitation requires CONFIG_RXGK, limiting exposure to systems with RxGK support enabled.\u003c/li\u003e\n\u003cli\u003eFedora, Arch Linux, and openSUSE Tumbleweed are named as potentially affected because they closely follow upstream kernel releases.\u003c/li\u003e\n\u003cli\u003eThe proof-of-concept has only been tested against Fedora and the mainline Linux kernel.\u003c/li\u003e\n\u003cli\u003eThe recommended action is to install the latest kernel updates, with a temporary mitigation available for systems that cannot patch immediately.\u003c/li\u003e\n\u003cli\u003eThe mitigation can break IPsec VPNs and AFS distributed network file systems.\u003c/li\u003e\n\u003cli\u003eThe article does not report active exploitation of DirtyDecrypt, but it does report active exploitation of the related Copy Fail vulnerability.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["A proof-of-concept exploit is available for DirtyDecrypt, a recently patched local privilege escalation flaw in the Linux kernel's rxgk module that can allow attackers to gain root access on some Linux systems.","The V12 security team reported the flaw on May 9, 2026, and said maintainers informed them it was a duplicate that had already been patched in the mainline kernel.","Successful exploitation requires a Linux kernel built with the CONFIG_RXGK configuration option, which enables RxGK security support for the Andrew File System client and network transport.","The affected attack surface is limited to Linux distributions that closely follow the latest upstream kernel releases, including Fedora, Arch Linux, and openSUSE Tumbleweed.","Linux users on potentially affected distributions are advised to install the latest kernel updates as soon as possible, or use the provided temporary mitigation if they cannot immediately patch."],"insights":["DirtyDecrypt has no official CVE ID in the article, but Will Dormann said its details align with CVE-2026-31635, so defenders may need to verify kernel patch status rather than relying only on the DirtyDecrypt name.","The temporary mitigation blocks esp4, esp6, and rxrpc modules, but the article warns that this will also break IPsec VPNs and AFS distributed network file systems.","Although Fedora, Arch Linux, and openSUSE Tumbleweed are listed as potentially affected because they track upstream kernels closely, the proof-of-concept exploit has only been tested against Fedora and the mainline Linux kernel.","The article places DirtyDecrypt among several recently disclosed Linux root-escalation flaws in the same vulnerability class, while noting that one of them, Copy Fail, is already being actively exploited in the wild."],"referencedReports":[{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/05/01/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"Cybersecurity and Infrastructure Security Agency (CISA)","context":"The article references this CISA alert when noting that CISA added the Copy Fail vulnerability to its catalog of flaws exploited in attacks and ordered federal agencies to secure affected Linux devices.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?search=CVE-2026-32202\u0026field_date_added_wrapper=all\u0026field_cve=\u0026sort_by=field_date_added\u0026items_per_page=20\u0026url=","publisher":"Cybersecurity and Infrastructure Security Agency (CISA)","context":"The article links to CISA’s catalog entry search for CVE-2026-32202 while discussing Copy Fail being listed as a known exploited vulnerability.","category":"","primary":false}],"body":"\u003cp\u003eA proof-of-concept exploit is now available for DirtyDecrypt, also known as DirtyCBC, a recently patched local privilege escalation vulnerability in the Linux kernel\u0026rsquo;s rxgk module. The flaw can allow attackers to gain root access on some Linux systems. The article says there is no official CVE ID associated with the flaw, though Will Dormann said the details align with CVE-2026-31635, which was patched on April 25.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation requires a Linux kernel built with the CONFIG_RXGK option, which enables RxGK security support for the Andrew File System client and network transport. The article says this limits the attack surface to Linux distributions that closely follow the latest upstream kernel releases, including Fedora, Arch Linux, and openSUSE Tumbleweed. V12\u0026rsquo;s proof-of-concept exploit has only been tested against Fedora and the mainline Linux kernel.\u003c/p\u003e\n\n\u003cp\u003eLinux users on potentially affected distributions are advised to install the latest kernel updates as soon as possible. For systems that cannot immediately be patched, the article provides a mitigation that blocks esp4, esp6, and rxrpc modules, but warns that it will also break IPsec VPNs and AFS distributed network file systems. The disclosure follows other recent Linux root-escalation flaws, including Dirty Frag, Fragnesia, Copy Fail, and Pack2TheRoot.\u003c/p\u003e\n"},{"n":17,"title":"INTER
