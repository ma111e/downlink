3e\n\n\u003cp\u003eThe threat actor used the npm account \u003ccode\u003edeadcode09284814\u003c/code\u003e to publish four malicious packages. The packages were designed to steal developer credentials, secrets, cryptocurrency wallet data, account information, and configuration files. One of the packages also included functionality that could turn an infected system into a bot for distributed denial-of-service activity.\u003c/p\u003e\n\n\u003ch2 id=\"malicious-npm-packages-identified\"\u003eMalicious npm packages identified\u003c/h2\u003e\n\n\u003cp\u003eOXsecurity identified four rogue npm packages:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003echalk-tempalte\u003c/code\u003e — described as a Shai-Hulud clone and information stealer.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@deadcode09284814/axios-util\u003c/code\u003e — described as a credential and cloud configuration stealer.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eaxois-utils\u003c/code\u003e — described as an infostealer plus persistent DDoS botnet, with references to a “phantom bot.”\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecolor-style-utils\u003c/code\u003e — described as a basic infostealer targeting cryptocurrency wallets and IP information.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the threat actor used misspelled package names, including typosquatting targeting Axios users, along with some generic package names. All four packages included routines that exfiltrated information such as credentials and configuration files.\u003c/p\u003e\n\n\u003ch2 id=\"shai-hulud-clone-in-chalk-tempalte\"\u003eShai-Hulud clone in \u003ccode\u003echalk-tempalte\u003c/code\u003e\u003c/h2\u003e\n\n\u003cp\u003eAccording to OXsecurity, the \u003ccode\u003echalk-tempalte\u003c/code\u003e package contained a clone of the Shai-Hulud malware. The malware is attributed in origin to the TeamPCP hacker group, which the article says is responsible for the recent Mini Shai-Hulud software supply-chain attack.\u003c/p\u003e\n\n\u003cp\u003eThe malware emerged on GitHub the previous week with a message allegedly from TeamPCP saying, “Here We Go Again - Let the Carnage Continue. A Gift from TeamPCP.” OXsecurity said \u003ccode\u003echalk-tempalte\u003c/code\u003e appears to be the first documented case of a Shai-Hulud clone deployed on npm.\u003c/p\u003e\n\n\u003cp\u003eOXsecurity also said the package was not a sophisticated example. The article states that it used an unmodified copy of the leaked source code without protection. OXsecurity noted that the code was an almost exact copy of the leaked source code and lacked obfuscation techniques that would make the final version visually different from the original.\u003c/p\u003e\n\n\u003ch2 id=\"actor-assessment-in-the-article\"\u003eActor assessment in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article distinguishes the npm publisher from TeamPCP based on OXsecurity’s analysis. OXsecurity described the near-exact, non-obfuscated copy of the leaked source code as incriminating evidence that the npm campaign was conducted by a different actor from TeamPCP.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify the actor beyond the npm account \u003ccode\u003edeadcode09284814\u003c/code\u003e. It frames the campaign as an example of threat actors quickly copying leaked Shai-Hulud source code and using or modifying it.\u003c/p\u003e\n\n\u003ch2 id=\"data-theft-and-exfiltration-behavior\"\u003eData theft and exfiltration behavior\u003c/h2\u003e\n\n\u003cp\u003eThe malware in \u003ccode\u003echalk-tempalte\u003c/code\u003e stole credentials, secrets, cryptocurrency wallet data, and account information. The article says this data was exfiltrated to a command-and-control server at \u003ccode\u003e87e0bbc636999b[.]lhr[.]life\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe code also retained GitHub publishing functionality. As described in the article, this meant it could upload stolen credentials to public, auto-generated repositories. This behavior mirrors part of the broader Shai-Hulud campaign history described in the article, where exfiltrated information was exposed in public GitHub repositories after developer credentials were stolen.\u003c/p\u003e\n\n\u003ch2 id=\"ddos-functionality-in-axois-utils\"\u003eDDoS functionality in \u003ccode\u003eaxois-utils\u003c/code\u003e\u003c/h2\u003e\n\n\u003cp\u003eAmong the other three packages, \u003ccode\u003eaxois-utils\u003c/code\u003e stood out because it included DDoS capability in addition to information-stealing functionality. The article says the package supported several attack types:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHTTP floods.\u003c/li\u003e\n\u003cli\u003eTCP floods.\u003c/li\u003e\n\u003cli\u003eUDP floods.\u003c/li\u003e\n\u003cli\u003eTCP reset attacks.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eOXsecurity also found internal references to a “phantom bot.” The article describes this package as combining infostealing with persistent DDoS botnet functionality.\u003c/p\u003e\n\n\u003ch2 id=\"broader-shai-hulud-campaign-context\"\u003eBroader Shai-Hulud campaign context\u003c/h2\u003e\n\n\u003cp\u003eThe article says the Shai-Hulud campaign has had multiple iterations since September 2025. Those campaigns stole developers’ data by injecting malware into legitimate projects. After credentials for accounts with publishing rights were stolen, the exfiltrated information was exposed in public GitHub repositories.\u003c/p\u003e\n\n\u003cp\u003eThe campaigns were attributed to the TeamPCP hacker group. The article also cites a previous OXsecurity report saying threat actors quickly copied the Shai-Hulud malware source code and began modifying it to extend its capabilities.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and response\u003c/h2\u003e\n\n\u003cp\u003eOXsecurity reported that the four malicious packages had a combined download count of 2,678. The article does not provide a breakdown of downloads per package.\u003c/p\u003e\n\n\u003cp\u003eOXsecurity recommended that developers who downloaded the infected npm packages remove them immediately. The company also recommended rotating credentials and API keys on affected systems.\u003c/p\u003e\n","keyPoints":["The leaked Shai-Hulud malware is being used in new attacks on the npm index, with infected packages appearing over the weekend.","A threat actor using the npm account deadcode09284814 published four malicious packages that exfiltrated information such as credentials, configuration files, secrets, cryptocurrency wallet data, and account information.","OXsecurity found that the chalk-tempalte package contained an almost exact, non-obfuscated copy of the leaked Shai-Hulud source code and exfiltrated data to a command-and-control server at 87e0bbc636999b[.]lhr[.]life.","The axois-utils package included information-stealing functionality and DDoS capabilities, including HTTP, TCP, and UDP floods and TCP reset attacks.","OXsecurity recommended that developers who downloaded the infected npm packages remove them immediately and rotate their credentials and API keys on affected systems."],"insights":["The chalk-tempalte package’s near-exact, non-obfuscated copy of the leaked Shai-Hulud source code is cited by OXsecurity as evidence that the npm attacks were likely conducted by a different actor than TeamPCP.","The cloned Shai-Hulud code retained GitHub publishing functionality, meaning stolen credentials could be uploaded to public, auto-generated repositories rather than only sent to a command-and-control server.","The malicious packages used misspelled names such as chalk-tempalte and axois-utils to target developers who might accidentally install typosquatted npm packages.","The axois-utils package expanded beyond credential theft by adding HTTP, TCP, and UDP flood capabilities and TCP reset attacks, with internal references to a “phantom bot.”"],"referencedReports":[{"title":"Shai-Hulud Open Source Malware GitHub","url":"http://www.ox.security/blog/shai-hulud-open-source-malware-github/","publisher":"OXsecurity","context":"The article describes this as a previous OXsecurity report stating that threat actors quickly copied the Shai-Hulud malware source code and began modifying it to extend its capabilities.","category":"","primary":false}],"body":"\u003cp\u003eThe leaked Shai-Hulud malware is now being used in new attacks on the Node Package Manager index, with infected npm packages appearing over the weekend. OXsecurity found that a threat actor using the account \u003ccode\u003edeadcode09284814\u003c/code\u003e published four malicious packages. The packages targeted developer credentials, secrets, cryptocurrency wallet data, account information, and configuration files.\u003c/p\u003e\n\n\u003cp\u003eOne package, \u003ccode\u003echalk-tempalte\u003c/code\u003e, contained what OXsecurity described as an almost exact, non-obfuscated copy of the leaked Shai-Hulud source code. Another package, \u003ccode\u003eaxois-utils\u003c/code\u003e, combined infostealing with DDoS capabilities, including HTTP, TCP, and UDP floods and TCP reset attacks. OXsecurity said the four packages had a combined download count of 2,678 and recommended that affected developers remove them and rotate credentials and API keys.\u003c/p\u003e\n"},{"n":18,"title":"Introducing Secure Registry: install-time defense for the npm supply chain","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/introducing-secure-registry-install-time-defense-for-the-npm-supply-chain","time":"15:16","priority":"SHOULD READ","score":84,"tldr":"StepSecurity launched Secure Registry, an authenticated npm proxy that enforces security controls at install time so malicious or too-new packages can be blocked before they reach CI, developer machines, or artifact managers. The key takeaway is that PR-based scanning is no longer enough against fast, self-propagating supply chain attacks like Mini Shai-Hulud.","briefOverview":"\u003cp\u003eLast week, the TeamPCP threat group published malicious versions of several @tanstack npm packages that are collectively downloaded millions of times per week. The packages carried a self-propagating worm called Mini Shai-Hulud that steals CI/CD credentials and uses them to publish infected versions of every package the compromised maintainer controls. The worm then spread to packages from UiPath, DraftLab, and other maintainers.\u003c/p\u003e\n\n\u003cp\u003eThe article presents Mini Shai-Hulud as a sign of a faster and more severe supply chain threat model. The compromised packages carried valid SLSA Build Level 3 provenance attestations, which the article says made this the first documented npm worm to produce validly attested malicious packages. StepSecurity argues that traditional pull-request-stage controls are insufficient because malicious versions can be installed within hours or minutes of publication.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity announced Secure Registry, an authenticated upstream registry that sits between developers, CI runners, artifact managers, and public package registries. It evaluates every npm metadata request and tarball download against configured security controls before returning a response. Its first available control is a configurable Cooldown Period that blocks packages published within a selected number of days, with Compromised Packages and Typosquatting Protection controls coming soon.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes a recent npm supply chain attack in which the TeamPCP threat group published malicious versions of several @tanstack packages. These packages were collectively downloaded millions of times per week and included a self-propagating worm called Mini Shai-Hulud. The worm steals CI/CD credentials and uses them to publish infected versions of every package controlled by a compromised maintainer.\u003c/p\u003e\n\n\u003cp\u003eMini Shai-Hulud spread beyond the initial @tanstack packages to packages from UiPath, DraftLab, and other maintainers. The article highlights an unusually severe escalation: the compromised packages carried valid SLSA Build Level 3 provenance attestations. It states that this made Mini Shai-Hulud the first documented npm worm to produce validly attested malicious packages.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity frames the attack as evidence that modern supply chain attacks are fast, self-propagating, and capable of bypassing controls that many teams rely on. The article says malicious versions can be pulled into thousands of builds within hours or minutes of landing on the registry. It also argues that by the time a security tool flags a malicious version, CI may already have installed it.\u003c/p\u003e\n\n\u003cp\u003eIn response, StepSecurity announced Secure Registry, an authenticated upstream registry that sits between developers, CI runners, artifact managers, and public package registries. Every npm metadata request and tarball download flows through Secure Registry and is evaluated against configured security controls before a response is returned. Requests that violate controls are blocked or modified at install time across CI, developer laptops, and artifact managers.\u003c/p\u003e\n\n\u003cp\u003eSecure Registry launches with a Cooldown Period control that blocks packages published within a configurable number of days, with a default of 10 days recommended for most environments. When cooldown filters a metadata request, Secure Registry returns a modified response with recent versions removed so the client resolves dependencies against older versions. StepSecurity says Compromised Packages and Typosquatting Protection controls are coming soon, and that Secure Registry is available today for Enterprise customers with npm support generally available and PyPI support coming soon.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article announces StepSecurity Secure Registry, a product designed to enforce package security controls at install time for the npm supply chain. The announcement is framed around a recent attack in which the TeamPCP threat group published malicious versions of several @tanstack npm packages. Those packages are described as being collectively downloaded millions of times per week.\u003c/p\u003e\n\n\u003cp\u003eThe malicious packages carried a self-propagating worm called Mini Shai-Hulud. According to the article, the worm steals CI/CD credentials and uses them to publish infected versions of every package controlled by a compromised maintainer. It then spread to packages from UiPath, DraftLab, and other maintainers.\u003c/p\u003e\n\n\u003ch2 id=\"significance-of-the-mini-shai-hulud-attack\"\u003eSignificance of the Mini Shai-Hulud attack\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Mini Shai-Hulud as an example of the new shape of supply chain attacks. These attacks are characterized as fast, self-propagating, and capable of bypassing commonly used controls. The article states that the gap between a malicious version landing on the registry and being pulled into thousands of builds is often hours and sometimes minutes.\u003c/p\u003e\n\n\u003cp\u003eA key escalation in this incident was that the compromised packages carried valid SLSA Build Level 3 provenance attestations. The article states that this made Mini Shai-Hulud the first documented npm worm to produce validly attested malicious packages. StepSecurity uses this point to emphasize that some existing trust and verification mechanisms did not prevent malicious packages from appearing validly attested.\u003c/p\u003e\n\n\u003ch2 id=\"limits-of-pull-request-stage-controls\"\u003eLimits of pull-request-stage controls\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that most supply chain controls in the industry today operate at the pull-request stage. In that model, a scanner inspects manifest and lockfile changes, flags a known-bad package, and fails a check. StepSecurity says this works well when dependencies enter the codebase through reviewed code changes.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article identifies several install-time events that pull-request-stage scanning may not see:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA developer runs \u003ccode\u003enpm install\u003c/code\u003e locally with a floating semver range and pulls in a fresh version that was not in the lockfile.\u003c/li\u003e\n\u003cli\u003eA CI job runs on a clean checkout and resolves dependencies without going through PR review.\u003c/li\u003e\n\u003cli\u003eAn ad-hoc script in a workflow installs a tool globally.\u003c/li\u003e\n\u003cli\u003eA new repository is bootstrapped from a template before PR controls are configured.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also states that PR controls generally catch known-bad packages after they have already been reported, analyzed, and added to a database. StepSecurity says the Mini Shai-Hulud attack moved faster than that database could update. This is the basis for the article’s argument that enforcement must happen at install time as well as during code review.\u003c/p\u003e\n\n\u003ch2 id=\"secure-registry-architecture-and-operation\"\u003eSecure Registry architecture and operation\u003c/h2\u003e\n\n\u003cp\u003eSecure Registry is described as an authenticated upstream registry that sits between developers, CI runners, artifact managers, and public package registries. It evaluates every npm metadata request and tarball download against configured security controls before returning a response. Requests that violate a control are blocked or modified at install time.\u003c/p\u003e\n\n\u003cp\u003eThe article says Secure Registry can protect multiple package access paths with one configuration, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCI runners.\u003c/li\u003e\n\u003cli\u003eDeveloper laptops.\u003c/li\u003e\n\u003cli\u003eArtifact managers.\u003c/li\u003e\n\u003cli\u003eDirect npm client configurations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe integration model is presented as intentionally simple. Users point npm clients, CI runners, or artifact repository managers such as JFrog Artifactory or Google Artifact Registry at the Secure Registry URL as the upstream registry. The article says users do not change how developers or CI install packages, only where the requests go.\u003c/p\u003e\n\n\u003ch2 id=\"logging-and-setup\"\u003eLogging and setup\u003c/h2\u003e\n\n\u003cp\u003eEvery request evaluated by Secure Registry is logged in the StepSecurity dashboard. The article says each request and its evaluation result appears in the Policy Evaluations log. Setup instructions are available in-app under the Setup Guide tab.\u003c/p\u003e\n\n\u003cp\u003eThe Setup Guide includes three integration paths depending on how packages reach the environment:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eJFrog Artifactory.\u003c/li\u003e\n\u003cli\u003eGoogle Artifact Registry.\u003c/li\u003e\n\u003cli\u003eDirect \u003ccode\u003e.npmrc\u003c/code\u003e configuration.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also states that the Setup Guide includes a short test sequence to confirm that requests are flowing through Secure Registry. Primary and secondary API keys are supported so customers can rotate credentials without downtime.\u003c/p\u003e\n\n\u003ch2 id=\"security-controls-at-launch\"\u003eSecurity controls at launch\u003c/h2\u003e\n\n\u003cp\u003eSecure Registry launches with a layered set of controls that can be toggled per ecosystem. The first available control is Cooldown Period. Two additional controls, Compromised Packages and Typosquatting Protection, are described as coming soon.\u003c/p\u003e\n\n\u003ch3 id=\"cooldown-period\"\u003eCooldown Period\u003c/h3\u003e\n\n\u003cp\u003eCooldown Period blocks packages published within a configurable number of days. The stated purpose is to give the community and StepSecurity’s SOC time to vet new releases before they reach a customer environment. The article calls cooldown the most effective first line of defense against zero-day supply chain attacks.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity’s reasoning is that most malicious npm packages are discovered within 24 hours of publication, either by community researchers or by automated analysis pipelines like StepSecurity’s. A multi-day cooldown moves the discovery window outside the installation window. By the time the environment is allowed to install a new version, the package has already been seen, scanned, and either confirmed safe or flagged as malicious.\u003c/p\u003e\n\n\u003cp\u003eThe cooldown window is configurable. The default is 10 days, which the article says StepSecurity recommends for most environments. Teams that need access to the latest releases for specific packages can adjust the window, scope cooldown by ecosystem, or pair it with other controls.\u003c/p\u003e\n\n\u003cp\u003eWhen a metadata request is filtered by cooldown, Secure Registry returns a modified response with recent versions removed. The client sees only versions older than the cooldown window. Dependency resolution then proceeds normally against those older versions, without requiring client-side changes.\u003c/p\u003e\n\n\u003ch3 id=\"compromised-packages\"\u003eCompromised Packages\u003c/h3\u003e\n\n\u003cp\u003eThe Compromised Packages control is described as coming soon. It will block packages flagged as compromised or reported as malicious by StepSecurity’s SOC and the broader security community. The article says this control acts on the discovery itself by blocking confirmed malicious packages outright, even if they fall outside the cooldown period.\u003c/p\u003e\n\n\u003ch3 id=\"typosquatting-protection\"\u003eTyposquatting Protection\u003c/h3\u003e\n\n\u003cp\u003eTyposquatting Protection is also described as coming soon. It will block packages whose names closely resemble popular packages. The article gives examples such as packages named \u003ccode\u003elodahs\u003c/code\u003e or \u003ccode\u003ereqeusts\u003c/code\u003e, which could be used in attacks where an attacker waits for a typo in an install command.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-github-checks\"\u003eRelationship to GitHub Checks\u003c/h2\u003e\n\n\u003cp\u003eThe article says Secure Registry complements rather than replaces StepSecurity’s existing GitHub Checks controls. It specifically mentions Package Cooldown and Package Compromised Updates, which scan pull requests for similar risks. The difference is that GitHub Checks enforce at pull-request time, while Secure Registry enforces at package install time.\u003c/p\u003e\n\n\u003cp\u003eGitHub Checks see manifest and lockfile changes in pull requests for repositories under StepSecurity GitHub Checks. Secure Registry sees every install request from configured clients, including CI runners, developer machines, and artifact managers configured to use it. When GitHub Checks detect a violation, the PR check fails and can block merge; when Secure Registry detects a violation, the request is blocked or the response is modified at install time.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends using both layers together. GitHub Checks catch risks when they are introduced into a codebase and provide PR context and a remediation path. Secure Registry catches installs that bypass PR review, including fresh clones with floating versions, developer machines, and ad-hoc workflow scripts.\u003c/p\u003e\n\n\u003ch2 id=\"availability\"\u003eAvailability\u003c/h2\u003e\n\n\u003cp\u003eSecure Registry is available today for Enterprise customers. npm support is generally available, and PyPI support is coming soon. The article directs customers to the Secure Registry page in the StepSecurity dashboard and its in-app Setup Guide to get started.\u003c/p\u003e\n\n\u003cp\u003eFor organizations not yet on the Enterprise tier, the article says they can start a 14-day free trial to evaluate Secure Registry. StepSecurity concludes that supply chain defenses need to operate at the same layer as the attacks. In the install-time context, the article argues that this requires a registry-level checkpoint.\u003c/p\u003e\n","keyPoints":["TeamPCP published malicious versions of several @tanstack npm packages containing the Mini Shai-Hulud worm, which steals CI/CD credentials and publishes infected versions of packages controlled by compromised maintainers.","The compromised packages carried valid SLSA Build Level 3 provenance attestations, making Mini Shai-Hulud the first documented npm worm to produce validly attested malicious packages.","StepSecurity announced Secure Registry, an authenticated upstream registry that evaluates npm metadata requests and tarball downloads against configured security controls before returning a response.","Secure Registry enforces controls at install time across CI runners, developer laptops, and artifact managers, covering install events that pull-request scanning may not see.","Secure Registry launches with a configurable Cooldown Period control that blocks packages published within a set number of days, while Compromised Packages and Typosquatting Protection controls are coming soon."],"insights":["Valid SLSA Build Level 3 provenance did not prevent the Mini Shai-Hulud compromise, showing that provenance attestations alone may not distinguish trusted builds from malicious releases when maintainer credentials or publishing workflows are compromised.","A configurable cooldown period is presented as an actionable defense because most malicious npm packages are discovered within 24 hours, while the default 10-day delay keeps newly published versions out of environments during the highest-risk discovery window.","Secure Registry can modify npm metadata responses by removing versions that violate cooldown rules, allowing dependency resolution to continue against older versions instead of simply failing every install.","Install-time enforcement addresses gaps left by pull-request scanning, including floating semver installs, clean CI dependency resolution, global tool installs in workflows, and newly bootstrapped repositories before PR controls are configured.","Secure Registry is positioned as complementary to GitHub Checks rather than a replacement, with one layer enforcing during code review and the other enforcing across every configured package installation path."],"referencedReports":[],"body":"\u003cp\u003eLast week, the TeamPCP threat group published malicious versions of several @tanstack npm packages that are collectively downloaded millions of times per week. The packages carried a self-propagating worm called Mini Shai-Hulud that steals CI/CD credentials and uses them to publish infected versions of every package the compromised maintainer controls. The worm then spread to packages from UiPath, DraftLab, and other maintainers.\u003c/p\u003e\n\n\u003cp\u003eThe article presents Mini Shai-Hulud as a sign of a faster and more severe supply chain threat model. The compromised packages carried valid SLSA Build Level 3 provenance attestations, which the article says made this the first documented npm worm to produce validly attested malicious packages. StepSecurity argues that traditional pull-request-stage controls are insufficient because malicious versions can be installed within hours or minutes of publication.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity announced Secure Registry, an authenticated upstream registry that sits between developers, CI runners, artifact managers, and public package registries. It evaluates every npm metadata request and tarball download against configured security controls before returning a response. Its first available control is a configurable Cooldown Period that blocks packages published within a selected number of days, with Compromised Packages and Typosquatting Protection controls coming soon.\u003c/p\u003e\n"},{"n":2,"title":"Grafana refuses to pay ransom after codebase theft","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/grafana-refuses-to-pay-ransom-codebase-theft","time":"17:50","priority":"SHOULD READ","score":82,"tldr":"Grafana Labs said attackers used a stolen GitHub token to download its codebase, but found no evidence that customer data or systems were affected. The company refused to pay the extortion demand and says it has revoked the compromised credentials while continuing its investigation.","briefOverview":"\u003cp\u003eGrafana Labs confirmed that hackers breached its systems and downloaded the company’s codebase. The company said an unauthorized party obtained a token with access to its GitHub environment. Grafana Labs also said it refused to pay a ransom demanded by the hackers.\u003c/p\u003e\n\n\u003cp\u003eThe company stated that its investigation found no customer data or personal information was accessed. It also said it found no evidence of impact to customer systems or operations. Grafana Labs said it believes it has identified the source of the credential leak, invalidated the compromised credentials, and took additional steps to secure its systems.\u003c/p\u003e\n\n\u003cp\u003eThe incident surfaced after an extortion group known as CoinbaseCartel claimed to have stolen information from Grafana Labs. The article describes CoinbaseCartel as a data theft offshoot of the larger Scattered Lapsus$ Hunters cybercriminal collective. The group is described as relying on stolen credentials and social engineering rather than ransomware.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGrafana Labs confirmed that hackers breached its systems and downloaded the company’s codebase. The company released a statement saying an unauthorized party obtained a token with access to the Grafana Labs GitHub environment. The access enabled the threat actor to download the codebase.\u003c/p\u003e\n\n\u003cp\u003eGrafana Labs said its investigation determined that no customer data or personal information was accessed during the incident. The company also said it found no evidence of impact to customer systems or operations. Grafana is described in the article as a popular analytics and visualization web application used by more than 7,000 customers to create dashboards that track metrics and other information.\u003c/p\u003e\n\n\u003cp\u003eThe company said it is still investigating but believes it has identified the source of the credential leak. Grafana Labs said the compromised credentials have been invalidated. It also said it took other measures to secure its systems.\u003c/p\u003e\n\n\u003cp\u003eThe incident became public after an extortion group known as CoinbaseCartel claimed to have stolen information from Grafana Labs. Grafana Labs confirmed that the hackers attempted to blackmail the company to prevent release of its codebase. The company said it decided not to pay the ransom, citing longstanding FBI guidance that paying cybercriminals does not guarantee anything.\u003c/p\u003e\n\n\u003cp\u003eGrafana Labs did not respond to questions about what it will do if or when the codebase is released. The company also did not respond to questions about whether the hackers have been fully evicted from its systems. The article says the company plans to share additional information from its post-incident review when investigations are complete.\u003c/p\u003e\n\n\u003cp\u003eCoinbaseCartel is described as having emerged last year as a data theft offshoot of the larger Scattered Lapsus$ Hunters cybercriminal collective. Cybersecurity experts at Halcyon said the group has attempted to extort more than 100 companies across several industries since September. The article says the group does not use ransomware during attacks and instead relies on stolen credentials and social engineering to gain access to victim networks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGrafana Labs confirmed that hackers breached its systems and downloaded the company’s codebase. The company said the incident involved an unauthorized party obtaining a token with access to the Grafana Labs GitHub environment. That access enabled the threat actor to download the codebase.\u003c/p\u003e\n\n\u003cp\u003eGrafana Labs disclosed the incident in a statement released on Saturday night. The company also outlined its decision not to pay a ransom issued by the hackers behind the attack. It said the investigation is still ongoing.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-disclosed\"\u003eTechnical Details Disclosed\u003c/h2\u003e\n\n\u003cp\u003eThe key technical detail disclosed by Grafana Labs is that the attacker obtained a token with access to the company’s GitHub environment. According to the company, that token enabled the threat actor to download the codebase.\u003c/p\u003e\n\n\u003cp\u003eGrafana Labs said it believes it has identified the source of the credential leak. The company said the compromised credentials have been invalidated. It also said it took other measures to secure its systems.\u003c/p\u003e\n\n\u003cp\u003eThe article does not provide additional technical details about how the token was obtained. It also does not provide details on which parts of the codebase were downloaded.\u003c/p\u003e\n\n\u003ch2 id=\"reported-impact\"\u003eReported Impact\u003c/h2\u003e\n\n\u003cp\u003eGrafana Labs said its investigation determined that no customer data or personal information was accessed during the incident. The company also said it found no evidence of impact to customer systems or operations.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Grafana as a popular analytics and visualization web application. It says Grafana has more than 7,000 customers that use it to create dashboards for tracking metrics and other information.\u003c/p\u003e\n\n\u003ch2 id=\"extortion-attempt-and-company-response\"\u003eExtortion Attempt and Company Response\u003c/h2\u003e\n\n\u003cp\u003eGrafana Labs confirmed that the hackers attempted to blackmail the company to prevent release of its codebase. The company said it decided not to pay the ransom.\u003c/p\u003e\n\n\u003cp\u003eGrafana Labs cited longstanding FBI guidance that paying cybercriminals does not guarantee anything. The company said its standard security practices include sharing additional information from a post-incident review when investigations are complete.\u003c/p\u003e\n\n\u003cp\u003eThe company did not respond to questions about what it will do if or when the codebase is released. It also did not respond to questions about whether the hackers have been fully evicted from its systems.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-mentioned\"\u003eThreat Actor Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe incident emerged publicly after an extortion group known as CoinbaseCartel claimed to have stolen information from Grafana Labs. The article says CoinbaseCartel emerged last year as a data theft offshoot of the larger Scattered Lapsus$ Hunters cybercriminal collective.\u003c/p\u003e\n\n\u003cp\u003eCybersecurity experts at Halcyon said CoinbaseCartel has attempted to extort more than 100 companies across several industries since September. The article states that the group does not use ransomware during attacks.\u003c/p\u003e\n\n\u003cp\u003eInstead, the group is described as relying on stolen credentials and social engineering to gain access to victim networks.\u003c/p\u003e\n\n\u003ch2 id=\"key-facts-from-the-article\"\u003eKey Facts From the Article\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eGrafana Labs confirmed that its codebase was downloaded by hackers.\u003c/li\u003e\n\u003cli\u003eThe company said the attackers obtained a token with access to its GitHub environment.\u003c/li\u003e\n\u003cli\u003eGrafana Labs said no customer data or personal information was accessed.\u003c/li\u003e\n\u003cli\u003eThe company said it found no evidence of impact to customer systems or operations.\u003c/li\u003e\n\u003cli\u003eGrafana Labs said it invalidated the compromised credentials and took additional security measures.\u003c/li\u003e\n\u003cli\u003eThe company refused to pay the ransom.\u003c/li\u003e\n\u003cli\u003eCoinbaseCartel claimed to have stolen information from Grafana Labs.\u003c/li\u003e\n\u003cli\u003eThe article says CoinbaseCartel relies on stolen credentials and social engineering rather than ransomware.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Grafana Labs confirmed that an unauthorized party obtained a token with access to its GitHub environment and downloaded the company’s codebase.","Grafana Labs said its investigation found no customer data or personal information was accessed and no evidence of impact to customer systems or operations.","The company said it identified the likely source of the credential leak, invalidated the compromised credentials, and took additional measures to secure its systems.","Grafana Labs refused to pay the ransom demanded by the hackers, citing FBI guidance that paying cybercriminals does not guarantee anything.","The extortion group CoinbaseCartel claimed responsibility for the theft and is described as relying on stolen credentials and social engineering rather than ransomware."],"insights":["The incident shows that extortion can follow from source code theft alone, even when a victim reports no customer data exposure or operational disruption.","The attackers’ access path centered on a token for Grafana Labs’ GitHub environment, making credential and token security a central issue in this breach.","CoinbaseCartel’s activity described in the article highlights a non-ransomware extortion model based on stolen credentials and social engineering.","The article notes that CoinbaseCartel has attempted to extort more than 100 companies across several industries since September, indicating the group’s campaign is broad rather than limited to Grafana Labs."],"referencedReports":[],"body":"\u003cp\u003eGrafana Labs confirmed that hackers breached its systems and downloaded the company’s codebase. The company said an unauthorized party obtained a token with access to its GitHub environment. Grafana Labs also said it refused to pay a ransom demanded by the hackers.\u003c/p\u003e\n\n\u003cp\u003eThe company stated that its investigation found no customer data or personal information was accessed. It also said it found no evidence of impact to customer systems or operations. Grafana Labs said it believes it has identified the source of the credential leak, invalidated the compromised credentials, and took additional steps to secure its systems.\u003c/p\u003e\n\n\u003cp\u003eThe incident surfaced after an extortion group known as CoinbaseCartel claimed to have stolen information from Grafana Labs. The article describes CoinbaseCartel as a data theft offshoot of the larger Scattered Lapsus$ Hunters cybercriminal collective. The group is described as relying on stolen credentials and social engineering rather than ransomware.\u003c/p\u003e\n"},{"n":3,"title":"IT threat evolution in Q1 2026. Mobile statistics","source":"securelist.com","sourceColorIdx":5,"link":"https://securelist.com/malware-report-q1-2026-mobile-statistics/119819/","time":"12:00","priority":"SHOULD READ","score":82,"tldr":"Mobile attack volumes fell in Q1 2026, mainly due to fewer adware and RiskTool detections, but the risk to users remains high because mobile banking Trojans surged. Banking Trojan packages rose 50% to 162,275, with Mamont variants dominating detections.","briefOverview":"\u003cp\u003eKaspersky reported that mobile attacks using malware, adware, or unwanted software decreased in Q1 2026, with 2,676,328 attacks prevented compared with 3,239,244 in the previous quarter. The decline was attributed mainly to reduced adware and RiskTool detections. However, the report states that this did not necessarily mean lower risk for mobile users, because the number of unique users targeted by these threats remained relatively stable.\u003c/p\u003e\n\n\u003cp\u003eMobile banking Trojans were the most prominent malicious category in Q1 2026, accounting for 10.86% of total detections. Kaspersky detected 306,070 malicious and potentially unwanted Android installation packages, including 162,275 related to mobile banking Trojans and 439 related to mobile ransomware Trojans. Banking Trojan packages rose 50% from the previous quarter, with Mamont variants dominating both package volume and affected-user rankings.\u003c/p\u003e\n\n\u003cp\u003eThe report also highlighted several notable mobile threat developments. Kaspersky found apps on Google Play and the App Store containing a new version of the SparkCat crypto stealer, with Android code concealed in an obfuscated Rust library decrypted through a custom Dalvik-like virtual machine. On iOS, the attackers changed the malware and began using Apple’s Vision framework for optical character recognition.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eKaspersky’s Q1 2026 mobile threat statistics are based on Kaspersky Security Network data, following a methodology update introduced in Q3 2025. The company recalculated data from prior quarters to allow comparison under the new methodology. In Q1 2026, Kaspersky prevented 2,676,328 attacks involving malware, adware, or unwanted mobile software, down from 3,239,244 in Q4 2025.\u003c/p\u003e\n\n\u003cp\u003eThe overall decline in attack volume was mainly linked to fewer adware and RiskTool detections. Kaspersky emphasized that the reduction in attack count did not mean mobile users faced lower risk, because the number of unique users targeted by those threats remained relatively stable. Adware and RiskTool apps still outpaced banking Trojans when measured by total affected users.\u003c/p\u003e\n\n\u003cp\u003eKaspersky detected 306,070 malicious and potentially unwanted Android installation packages during the quarter. Of these, 162,275 were associated with mobile banking Trojans, and 439 were associated with mobile ransomware Trojans. Banking Trojan package volume increased by 50% compared with the previous quarter, repeating similar growth seen in Q4 2025.\u003c/p\u003e\n\n\u003cp\u003eMamont variants dominated the mobile banking Trojan landscape. The report states that Mamont variants accounted for 73.5% of banking Trojan detections, while other affected users encountered Faketoken, Rewardsteal, Creduz, and other families. In the top 10 mobile bankers list, most entries were Mamont variants, including Mamont.jo, Mamont.jx, and Mamont.jg.\u003c/p\u003e\n\n\u003cp\u003eThe top mobile malware ranking was led by Backdoor.AndroidOS.Triada.ag, a pre-installed backdoor similar to the older Triada.z version previously documented by Kaspersky. The report explains that Triada.ag reached the top position because the same variant was pre-installed across a wide range of devices, aggregating the affected user count. Other pre-installed Triada variants, including Triada.z, Triada.ae, Triada.ab, and Triada.ad, also appeared in the rankings.\u003c/p\u003e\n\n\u003cp\u003eThe quarter also included notable research and discovery highlights. Synthient researchers identified a link between the Kimwolf botnet and the IPIDEA proxy network, which was later taken down in cooperation with GTIG. Kaspersky also discovered apps on Google Play and the App Store containing a new SparkCat crypto stealer version, including Android malware hidden through an obfuscated Rust library and an iOS version that used Apple’s Vision framework for OCR.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eKaspersky’s Q1 2026 mobile threat statistics describe a quarter in which overall mobile attack volume declined, while banking Trojan activity continued to rise sharply. According to Kaspersky Security Network, 2,676,328 attacks using malware, adware, or unwanted mobile software were prevented in Q1 2026. This was down from 3,239,244 attacks in the previous quarter.\u003c/p\u003e\n\n\u003cp\u003eThe report states that the decrease was driven primarily by reduced detections of adware and RiskTool-type unwanted apps. However, Kaspersky cautioned that the drop in attack volume did not mean a lower level of risk for mobile users. The number of unique users targeted by these threats remained relatively stable.\u003c/p\u003e\n\n\u003ch2 id=\"methodology-context\"\u003eMethodology context\u003c/h2\u003e\n\n\u003cp\u003eKaspersky noted that it updated the methodology for calculating statistical indicators based on Kaspersky Security Network in Q3 2025. The changes affected all sections of the report except statistics on installation packages, which remained unchanged. Kaspersky also recalculated data for previous quarters so that comparisons in this report use the same methodology.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that the Kaspersky Security Network is a global network for analyzing anonymized threat information voluntarily shared by users of Kaspersky solutions. Unless otherwise stated, the report’s statistics are based on KSN data.\u003c/p\u003e\n\n\u003ch2 id=\"quarter-in-numbers\"\u003eQuarter in numbers\u003c/h2\u003e\n\n\u003cp\u003eKaspersky reported the following Q1 2026 figures:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMore than 2.67 million attacks using malware, adware, or unwanted mobile software were prevented.\u003c/li\u003e\n\u003cli\u003eThe Trojan-Banker category was the most prevalent mobile malware threat, with a 10.86% share of total detections.\u003c/li\u003e\n\u003cli\u003eKaspersky detected 306,070 malicious and potentially unwanted Android installation packages.\u003c/li\u003e\n\u003cli\u003eOf those packages, 162,275 were related to mobile banking Trojans.\u003c/li\u003e\n\u003cli\u003e439 packages were related to mobile ransomware Trojans.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-mobile-threat-trends\"\u003eOverall mobile threat trends\u003c/h2\u003e\n\n\u003cp\u003eThe number of attacks against users of Kaspersky mobile solutions fell from 3,239,244 in Q4 2025 to 2,676,328 in Q1 2026. Kaspersky attributed the overall reduction mainly to fewer adware and RiskTool detections. Even so, these two categories remained highly significant when measured by affected users.\u003c/p\u003e\n\n\u003cp\u003eThe report states that adware and RiskTool-type unwanted apps still outpaced banking Trojans by total number of affected users. The most common adware detections were HiddenAd, at 44.9%, and MobiDash, at 38.1%. The most frequently observed RiskTool apps were Revpn, at 67%, and SpyLoan, at 20.5%.\u003c/p\u003e\n\n\u003ch2 id=\"banking-trojan-surge\"\u003eBanking Trojan surge\u003c/h2\u003e\n\n\u003cp\u003eMobile banking Trojans were one of the central trends in the report. Kaspersky detected 162,275 mobile banking Trojan installation packages in Q1 2026, a 50% increase from the prior quarter. The report also notes that a similar 50% increase occurred in the previous quarter.\u003c/p\u003e\n\n\u003cp\u003eBecause of this growth, banking Trojans accounted for more than half of all detected installation packages. The rise in banking Trojan installation packages also corresponded with an increase in associated attacks. As a result, Trojan-Banker apps moved up one position in the ranking by share of targeted users.\u003c/p\u003e\n\n\u003cp\u003eMamont variants dominated this category. The article states that Mamont variants accounted for 73.5% of banking Trojan detections. Other users encountered families including Faketoken, Rewardsteal, Creduz, and others.\u003c/p\u003e\n\n\u003ch2 id=\"top-mobile-bankers\"\u003eTop mobile bankers\u003c/h2\u003e\n\n\u003cp\u003eThe top mobile banking Trojan detections by affected users were heavily represented by Mamont variants. The top 10 list included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTrojan-Banker.AndroidOS.Mamont.jo, with 15.75% in Q1 2026.\u003c/li\u003e\n\u003cli\u003eTrojan-Banker.AndroidOS.Mamont.jx, with 9.22%.\u003c/li\u003e\n\u003cli\u003eTrojan-Banker.AndroidOS.Mamont.jg, with 7.08%.\u003c/li\u003e\n\u003cli\u003eTrojan-Banker.AndroidOS.Mamont.gg, with 4.48%.\u003c/li\u003e\n\u003cli\u003eTrojan-Banker.AndroidOS.Mamont.ks, with 3.98%.\u003c/li\u003e\n\u003cli\u003eTrojan-Banker.AndroidOS.Agent.ws, with 3.78%.\u003c/li\u003e\n\u003cli\u003eTrojan-Banker.AndroidOS.Mamont.hl, with 3.27%.\u003c/li\u003e\n\u003cli\u003eTrojan-Banker.AndroidOS.Mamont.iv, with 3.08%.\u003c/li\u003e\n\u003cli\u003eTrojan-Banker.AndroidOS.Mamont.jb, with 3.07%.\u003c/li\u003e\n\u003cli\u003eTrojan-Banker.AndroidOS.Mamont.jv, with 2.79%.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe table measures unique users who encountered each banker as a percentage of all users of Kaspersky mobile security solutions who encountered banking threats.\u003c/p\u003e\n\n\u003ch2 id=\"top-mobile-malware-detections\"\u003eTop mobile malware detections\u003c/h2\u003e\n\n\u003cp\u003eThe report’s top 20 mobile malware ranking excludes riskware and potentially unwanted software such as RiskTool and adware. Backdoor.AndroidOS.Triada.ag ranked first in Q1 2026 with 7.09%, rising from 2.62% in Q4 2025. Kaspersky described Triada.ag as a pre-installed backdoor similar to the older Triada.z version it had previously documented.\u003c/p\u003e\n\n\u003cp\u003eKaspersky explained that Triada.ag rose to the top because the same variant was pre-installed across a wide range of devices. This caused the total number of affected users to be aggregated under that single variant. The report also states that Triada outpaced Mamont in this ranking because users encountered multiple Mamont variants, spreading the banking Trojan’s share across several rows.\u003c/p\u003e\n\n\u003cp\u003eOther pre-installed Triada variants also appeared in the ranking, including Triada.z, Triada.ae, Triada.ab, and Triada.ad. Kaspersky also observed increased activity from the Keenadu.a backdoor, while multiple embedded Triada Trojan variants remained in the rankings.\u003c/p\u003e\n\n\u003ch2 id=\"sparkcat-crypto-stealer-activity\"\u003eSparkCat crypto stealer activity\u003c/h2\u003e\n\n\u003cp\u003eKaspersky reported that in early 2026 it found several apps on Google Play and the App Store containing a new version of the SparkCat crypto stealer. The Android version included Trojan code that was carefully concealed inside infected apps. The obfuscated malicious Rust library was decrypted using a custom Dalvik-like virtual machine built by the attackers.\u003c/p\u003e\n\n\u003cp\u003eThe iOS version of the malware also changed. According to the report, attackers began using Apple’s proprietary Vision framework for optical character recognition. The article identifies this as part of the new SparkCat version’s evolution.\u003c/p\u003e\n\n\u003ch2 id=\"kimwolf-and-ipidea-reference\"\u003eKimwolf and IPIDEA reference\u003c/h2\u003e\n\n\u003cp\u003eThe report also mentioned external research by Synthient. In Q1 2026, Synthient researchers identified a link between the Kimwolf botnet and the IPIDEA proxy network. The article states that the IPIDEA proxy network was later taken down in cooperation with GTIG.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-affected-parties\"\u003eImpact and affected parties\u003c/h2\u003e\n\n\u003cp\u003eThe affected population described in the report consists of users of Kaspersky mobile security solutions whose anonymized threat data is included in Kaspersky Security Network. The article does not provide a total global victim count outside Kaspersky’s telemetry. It reports attacks prevented, installation packages detected, and the share of users who encountered specific malware or threat categories.\u003c/p\u003e\n\n\u003cp\u003eThe impact described includes exposure to malware, adware, unwanted mobile software, banking Trojans, ransomware Trojans, pre-installed backdoors, and crypto-stealing malware. For banking Trojans, the report highlights a significant increase in installation packages and attack activity. For pre-installed backdoors, it highlights broad distribution across device models as a factor in the high ranking of Triada.ag.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central finding is that Q1 2026 showed fewer overall mobile attacks but rising banking Trojan activity. The most notable shift was the continued surge in banking Trojan packages, especially Mamont variants, while adware and RiskTool apps continued to affect large numbers of users. The report also underscored technically significant activity involving pre-installed Triada backdoors and a new SparkCat crypto stealer version found in apps on both Google Play and the App Store.\u003c/p\u003e\n","keyPoints":["Kaspersky Security Network recorded 2,676,328 attacks using malware, adware, or unwanted mobile software in Q1 2026, down from 3,239,244 in Q4 2025.","Kaspersky detected 306,070 malicious and potentially unwanted Android installation packages in Q1 2026, including 162,275 mobile banking Trojan packages and 439 mobile ransomware Trojan packages.","Mobile banking Trojan packages increased by 50% compared with the previous quarter, and the Trojan-Banker category accounted for 10.86% of total detections.","Mamont variants were the most prevalent mobile banking Trojans in Q1 2026, accounting for 73.5% of banking Trojan detections.","Kaspersky discovered apps on Google Play and the App Store in early 2026 that contained a new version of the SparkCat crypto stealer."],"insights":["The decline in total mobile attack volume did not indicate a proportional reduction in user risk, because the article states that the number of unique users targeted by adware and RiskTool threats remained relatively stable.","Mobile banking Trojans became disproportionately prominent in Q1 2026, with their installation packages rising 50% for the second consecutive quarter and accounting for more than half of all detected installation packages.","Pre-installed malware was a major driver of detected mobile threats, as Triada.ag reached the top malware ranking because the same backdoor variant was pre-installed across a wide range of devices.","Official app stores were not immune to advanced mobile threats, as Kaspersky found Google Play and App Store apps containing a new SparkCat crypto stealer version that used obfuscated code and OCR-related techniques.","Comparisons with earlier Kaspersky mobile threat reports require caution, because the company changed its Kaspersky Security Network statistical methodology in Q3 2025 and recalculated prior-quarter data for this report."],"referencedReports":[{"title":"A Broken System Fueling Botnets","url":"https://synthient.com/blog/a-broken-system-fueling-botnets","publisher":"Synthient","context":"The article cites Synthient researchers as identifying a link between the Kimwolf botnet and the IPIDEA proxy network.","category":"","primary":false}],"body":"\u003cp\u003eKaspersky reported that mobile attacks using malware, adware, or unwanted software decreased in Q1 2026, with 2,676,328 attacks prevented compared with 3,239,244 in the previous quarter. The decline was attributed mainly to reduced adware and RiskTool detections. However, the report states that this did not necessarily mean lower risk for mobile users, because the number of unique users targeted by these threats remained relatively stable.\u003c/p\u003e\n\n\u003cp\u003eMobile banking Trojans were the most prominent malicious category in Q1 2026, accounting for 10.86% of total detections. Kaspersky detected 306,070 malicious and potentially unwanted Android installation packages, including 162,275 related to mobile banking Trojans and 439 related to mobile ransomware Trojans. Banking Trojan packages rose 50% from the previous quarter, with Mamont variants dominating both package volume and affected-user rankings.\u003c/p\u003e\n\n\u003cp\u003eThe report also highlighted several notable mobile threat developments. Kaspersky found apps on Google Play and the App Store containing a new version of the SparkCat crypto stealer, with Android code concealed in an obfuscated Rust library decrypted through a custom Dalvik-like virtual machine. On iOS, the attackers changed the malware and began using Apple’s Vision framework for optical character recognition.\u003c/p\u003e\n"},{"n":10,"title":"Hackers earn $1,298,250 for 47 zero-days at Pwn2Own Berlin 2026","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/hackers-earn-1-298-250-for-47-zero-days-at-pwn2own-berlin-2026/","time":"05:33","priority":"SHOULD READ","score":82,"tldr":"Researchers earned $1.29 million at Pwn2Own Berlin 2026 for exploiting 47 zero-day vulnerabilities in fully patched enterprise, AI, OS, browser, and virtualization products. DEVCORE won the contest, including a $200,000 Microsoft Exchange exploit chain that achieved SYSTEM-level remote code execution.","briefOverview":"\u003cp\u003eThe Pwn2Own Berlin 2026 hacking contest concluded with security researchers earning $1,298,250 for exploiting 47 zero-day flaws. The competition took place at the OffensiveCon conference from May 14 to May 16. It focused on enterprise technologies and artificial intelligence.\u003c/p\u003e\n\n\u003cp\u003eResearchers targeted fully patched products across categories including web browsers, enterprise applications, local privilege escalation, servers, local inference, cloud-native and container environments, virtualization, and LLMs. DEVCORE won the event with 50.5 Master of Pwn points and \u003cspan class=\"math inline\"\u003e\\(505,000 in rewards after hacking Microsoft SharePoint, Microsoft Exchange, Microsoft Edge, and Windows 11. The highest single reward was \\)\u003c/span\u003e200,000 for a Microsoft Exchange exploit chain that achieved remote code execution with SYSTEM privileges.\u003c/p\u003e\n\n\u003cp\u003eAcross the three days, competitors earned \u003cspan class=\"math inline\"\u003e\\(523,000 on day one, \\)\u003c/span\u003e385,750 on day two, and $389,500 on day three. Demonstrated targets included Windows 11, Red Hat Enterprise Linux for Workstations, Microsoft Exchange, Microsoft Edge, VMware ESXi, NVIDIA Container Toolkit, and multiple AI coding agents. Vendors have 90 days after Pwn2Own ends to release patches before Trend Micro\u0026rsquo;s Zero Day Initiative publicly discloses the vulnerabilities.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ePwn2Own Berlin 2026 concluded with researchers collecting $1,298,250 after exploiting 47 zero-day flaws. The competition was held at OffensiveCon from May 14 to May 16. The article says the contest focused on enterprise technologies and artificial intelligence.\u003c/p\u003e\n\n\u003cp\u003eThe targets were fully patched products across web browsers, enterprise applications, local privilege escalation, servers, local inference, cloud-native and container environments, virtualization, and LLM categories. Competitors earned \u003cspan class=\"math inline\"\u003e\\(523,000 for 24 unique zero-days on the first day and \\)\u003c/span\u003e385,750 for 15 zero-days on the second day. On the third day, they earned $389,500 for eight additional zero-days.\u003c/p\u003e\n\n\u003cp\u003eDEVCORE won Pwn2Own Berlin 2026 with 50.5 Master of Pwn points and \u003cspan class=\"math inline\"\u003e\\(505,000 in rewards. The team hacked Microsoft SharePoint, Microsoft Exchange, Microsoft Edge, and Windows 11 during the three-day contest. STARLabs SG placed behind DEVCORE with \\)\u003c/span\u003e242,500 and 25 points, while Out Of Bounds earned $95,750 and 12.75 points.\u003c/p\u003e\n\n\u003cp\u003eThe highest reward was \u003cspan class=\"math inline\"\u003e\\(200,000, awarded to Cheng-Da Tsai, also known as Orange Tsai, of the DEVCORE Research Team. He chained three bugs to gain remote code execution with SYSTEM privileges on Microsoft Exchange. On the first day, he also earned \\)\u003c/span\u003e175,000 for a Microsoft Edge sandbox escape that chained four logic bugs.\u003c/p\u003e\n\n\u003cp\u003eOther demonstrations included Windows 11 being hacked three times on the first day and additional Windows 11 local privilege escalation on the second day. Valentina Palmiotti, also known as chompie, of IBM X-Force Offensive Research earned $70,000 for rooting Red Hat Linux for Workstations and exploiting an NVIDIA Container Toolkit zero-day. The second day also included zero-days in multiple AI coding agents, while the final day included additional Windows 11 and Red Hat Enterprise Linux for Workstations hacks and a VMware ESXi exploit using a memory corruption bug.\u003c/p\u003e\n\n\u003cp\u003eAfter Pwn2Own ends, vendors have 90 days to release security patches before Trend Micro\u0026rsquo;s Zero Day Initiative publicly discloses the flaws. The article compares the 2026 event with the prior Pwn2Own Berlin contest, where STAR Labs SG won and ZDI awarded $1,078,750 for 29 zero-day flaws and some bug collisions.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003ePwn2Own Berlin 2026 concluded with security researchers earning $1,298,250 in rewards. The payouts were awarded after competitors exploited 47 zero-day flaws. The contest took place from May 14 to May 16 at the OffensiveCon conference.\u003c/p\u003e\n\n\u003cp\u003eThe article states that this year\u0026rsquo;s Pwn2Own Berlin focused on enterprise technologies and artificial intelligence. Competitors targeted fully patched products during the event. The contest covered a broad set of categories, including web browsers, enterprise applications, local privilege escalation, servers, local inference, cloud-native and container environments, virtualization, and LLMs.\u003c/p\u003e\n\n\u003ch2 id=\"contest-results\"\u003eContest Results\u003c/h2\u003e\n\n\u003cp\u003eAcross the three-day event, researchers demonstrated dozens of zero-day exploits and earned rewards each day:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn the first day, competitors earned $523,000 for 24 unique zero-days.\u003c/li\u003e\n\u003cli\u003eOn the second day, they earned $385,750 for exploiting 15 zero-days.\u003c/li\u003e\n\u003cli\u003eOn the third day, they earned $389,500 for eight more zero-days.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn total, the event produced $1,298,250 in rewards for 47 zero-day flaws.\u003c/p\u003e\n\n\u003ch2 id=\"winner-and-leaderboard\"\u003eWinner and Leaderboard\u003c/h2\u003e\n\n\u003cp\u003eDEVCORE won Pwn2Own Berlin 2026. The team finished with 50.5 Master of Pwn points and $505,000 in rewards. According to the article, DEVCORE earned its points and rewards after hacking Microsoft SharePoint, Microsoft Exchange, Microsoft Edge, and Windows 11.\u003c/p\u003e\n\n\u003cp\u003eSTARLabs SG placed behind DEVCORE with \u003cspan class=\"math inline\"\u003e\\(242,500 and 25 points. Out Of Bounds followed with \\)\u003c/span\u003e95,750 and 12.75 points.\u003c/p\u003e\n\n\u003ch2 id=\"highest-value-exploit\"\u003eHighest-Value Exploit\u003c/h2\u003e\n\n\u003cp\u003eThe highest single reward at the contest was $200,000. It was awarded to Cheng-Da Tsai, also known as Orange Tsai, of the DEVCORE Research Team.\u003c/p\u003e\n\n\u003cp\u003eThe article says Orange Tsai chained three bugs to gain remote code execution with SYSTEM privileges on Microsoft Exchange. This was the largest individual payout mentioned in the article.\u003c/p\u003e\n\n\u003ch2 id=\"day-one-highlights\"\u003eDay-One Highlights\u003c/h2\u003e\n\n\u003cp\u003eOn the first day, Orange Tsai earned another $175,000. That reward came from a Microsoft Edge sandbox escape that chained four logic bugs.\u003c/p\u003e\n\n\u003cp\u003eWindows 11 was hacked three times on the first day. Valentina Palmiotti, also known as chompie, of IBM X-Force Offensive Research collected $70,000 for rooting Red Hat Linux for Workstations and exploiting an NVIDIA Container Toolkit zero-day.\u003c/p\u003e\n\n\u003ch2 id=\"day-two-highlights\"\u003eDay-Two Highlights\u003c/h2\u003e\n\n\u003cp\u003eOn the second day, researchers demonstrated another Windows 11 local privilege escalation vulnerability. They also demonstrated a root-privilege escalation vulnerability in Red Hat Enterprise Linux for Workstations.\u003c/p\u003e\n\n\u003cp\u003eThe article also says the second day included zero-days in multiple AI coding agents. These demonstrations were part of the contest\u0026rsquo;s broader focus on enterprise technologies and artificial intelligence.\u003c/p\u003e\n\n\u003ch2 id=\"day-three-highlights\"\u003eDay-Three Highlights\u003c/h2\u003e\n\n\u003cp\u003eOn the third and final day, competitors again hacked Windows 11 and Red Hat Enterprise Linux for Workstations. They also exploited VMware ESXi using a memory corruption bug.\u003c/p\u003e\n\n\u003cp\u003eThe third day produced \u003cspan class=\"math inline\"\u003e\\(389,500 in rewards for eight zero-days. This brought the event total to 47 zero-day flaws and \\)\u003c/span\u003e1,298,250 in payouts.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products-and-categories-mentioned\"\u003eAffected Products and Categories Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article names several products and technology areas that were targeted or exploited during the contest. These included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft SharePoint\u003c/li\u003e\n\u003cli\u003eMicrosoft Exchange\u003c/li\u003e\n\u003cli\u003eMicrosoft Edge\u003c/li\u003e\n\u003cli\u003eWindows 11\u003c/li\u003e\n\u003cli\u003eRed Hat Linux for Workstations\u003c/li\u003e\n\u003cli\u003eRed Hat Enterprise Linux for Workstations\u003c/li\u003e\n\u003cli\u003eNVIDIA Container Toolkit\u003c/li\u003e\n\u003cli\u003eVMware ESXi\u003c/li\u003e\n\u003cli\u003eMultiple AI coding agents\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe broader contest categories included web browsers, enterprise applications, local privilege escalation, servers, local inference, cloud-native and container environments, virtualization, and LLMs.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-vendor-response-timeline\"\u003eDisclosure and Vendor Response Timeline\u003c/h2\u003e\n\n\u003cp\u003eThe article states that after Pwn2Own ends, vendors have 90 days to release security patches. After that period, Trend Micro\u0026rsquo;s Zero Day Initiative publicly discloses the vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eNo individual patch releases are described in the article. The stated response process is the 90-day window before public disclosure by ZDI.\u003c/p\u003e\n\n\u003ch2 id=\"comparison-with-the-previous-pwn2own-berlin\"\u003eComparison With the Previous Pwn2Own Berlin\u003c/h2\u003e\n\n\u003cp\u003eThe article compares the 2026 event with the prior Pwn2Own Berlin contest. Last year\u0026rsquo;s contest was won by STAR Labs SG.\u003c/p\u003e\n\n\u003cp\u003eDuring that previous event, ZDI awarded \u003cspan class=\"math inline\"\u003e\\(1,078,750 for 29 zero-day flaws and some bug collisions. In the 2026 event, the total increased to \\)\u003c/span\u003e1,298,250 for 47 zero-day flaws.\u003c/p\u003e\n","keyPoints":["The Pwn2Own Berlin 2026 contest concluded with researchers earning $1,298,250 for exploiting 47 zero-day vulnerabilities.","The competition ran from May 14 to May 16 at OffensiveCon and focused on enterprise technologies and artificial intelligence.","DEVCORE won Pwn2Own Berlin 2026 with 50.5 Master of Pwn points and $505,000 in rewards after hacking Microsoft SharePoint, Microsoft Exchange, Microsoft Edge, and Windows 11.","Cheng-Da Tsai of DEVCORE received the highest single reward of $200,000 for chaining three bugs to achieve remote code execution with SYSTEM privileges on Microsoft Exchange.","Vendors have 90 days after Pwn2Own ends to release security patches before Trend Micro's Zero Day Initiative publicly discloses the vulnerabilities."],"insights":["Fully patched products were still compromised across every day of the contest, including Windows 11, Red Hat Enterprise Linux for Workstations, Microsoft Edge, Microsoft Exchange, and VMware ESXi.","DEVCORE accounted for nearly 39% of the total prize pool, earning $505,000 out of the $1,298,250 awarded.","AI-related targets were not just included as contest categories; competitors demonstrated zero-days in multiple AI coding agents during the second day.","Windows 11 and Red Hat Enterprise Linux for Workstations were both successfully hacked on multiple days of the three-day contest."],"referencedReports":[],"body":"\u003cp\u003eThe Pwn2Own Berlin 2026 hacking contest concluded with security researchers earning $1,298,250 for exploiting 47 zero-day flaws. The competition took place at the OffensiveCon conference from May 14 to May 16. It focused on enterprise technologies and artificial intelligence.\u003c/p\u003e\n\n\u003cp\u003eResearchers targeted fully patched products across categories including web browsers, enterprise applications, local privilege escalation, servers, local inference, cloud-native and container environments, virtualization, and LLMs. DEVCORE won the event with 50.5 Master of Pwn points and \u003cspan class=\"math inline\"\u003e\\(505,000 in rewards after hacking Microsoft SharePoint, Microsoft Exchange, Microsoft Edge, and Windows 11. The highest single reward was \\)\u003c/span\u003e200,000 for a Microsoft Exchange exploit chain that achieved remote code execution with SYSTEM privileges.\u003c/p\u003e\n\n\u003cp\u003eAcross the three days, competitors earned \u003cspan class=\"math inline\"\u003e\\(523,000 on day one, \\)\u003c/span\u003e385,750 on day two, and $389,500 on day three. Demonstrated targets included Windows 11, Red Hat Enterprise Linux for Workstations, Microsoft Exchange, Microsoft Edge, VMware ESXi, NVIDIA Container Toolkit, and multiple AI coding agents. Vendors have 90 days after Pwn2Own ends to release patches before Trend Micro\u0026rsquo;s Zero Day Initiative publicly discloses the vulnerabilities.\u003c/p\u003e\n"},{"n":16,"title":"Pre-Stuxnet Fast16 Malware Tampered with Nuclear Weapons Simulations","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/pre-stuxnet-fast16-malware-tampered.html","time":"06:46","priority":"SHOULD READ","score":82,"tldr":"Researchers say the pre-Stuxnet fast16 malware was a nation-state sabotage tool designed to secretly corrupt nuclear weapons simulation results in LS-DYNA and AUTODYN, activating only during uranium-related high-explosive detonation models. The findings suggest highly targeted cyber sabotage of nuclear weapons research was underway as early as 2005.","briefOverview":"\u003cp\u003eA new analysis by Symantec and Carbon Black says the Lua-based fast16 malware was a cyber sabotage tool built to tamper with nuclear weapons testing simulations. The researchers said it was engineered to corrupt uranium-compression simulations central to nuclear weapon design. The findings place fast16 in the same conceptual lineage as Stuxnet, but with components that may date back to 2005.\u003c/p\u003e\n\n\u003cp\u003eFast16 targeted LS-DYNA and AUTODYN, two applications used for real-world simulations such as material modeling and explosive simulation. Its hook engine was selectively interested in high-explosive simulations and activated only when material density passed 30 g/cm³, a threshold the article says uranium can reach under shock compression in an implosion device. The malware used 101 hook rules to tamper with mathematical calculations during full-scale transient blast and detonation runs.\u003c/p\u003e\n\n\u003cp\u003eThe article says the malware avoided infecting computers with certain security products and could spread automatically to other endpoints on the same network. Researchers said this ensured that machines used to run the targeted simulations would generate the same tampered outputs. The findings suggest strategic industrial sabotage using malware was being conducted by nation-state actors as far back as 20 years ago, before Stuxnet was used at Iran’s Natanz nuclear plant.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSymantec and Carbon Black analyzed the Lua-based fast16 malware and concluded that it was designed to tamper with nuclear weapons testing simulations. The article says the pre-Stuxnet tool was engineered to corrupt uranium-compression simulations that are central to nuclear weapon design. Researchers described fast16 as selectively interested in high-explosive simulations inside LS-DYNA and AUTODYN.\u003c/p\u003e\n\n\u003cp\u003eThe analysis follows earlier work by SentinelOne, which described fast16 as a sabotage framework whose components may have been developed as early as 2005. SentinelOne connected the name fast16 to a string found in a text file leaked by The Shadow Brokers in 2017. That file was part of a tranche of hacking tools and exploits allegedly used by the Equation Group, a state-sponsored threat actor with suspected ties to the U.S. National Security Agency.\u003c/p\u003e\n\n\u003cp\u003eTechnically, fast16 contained 101 rules designed to tamper with mathematical calculations in engineering and simulation programs used at the time. SentinelOne had identified LS-DYNA version 970, Practical Structural Design and Construction Software, and Modelo Hidrodinâmico as probable candidates, while the newer Symantec and Carbon Black analysis confirmed LS-DYNA and AUTODYN as targets. The malware’s hooks used three attack strategies and activated only during full-scale transient blast and detonation runs.\u003c/p\u003e\n\n\u003cp\u003eThe article says fast16 checked the density of simulated material and only acted when the value exceeded 30 g/cm³. Symantec and Carbon Black said this was a threshold associated with uranium under shock compression from an implosion device. They also said the 101 hook rules could be grouped into 9 to 10 hook groups that targeted different builds of LS-DYNA or AUTODYN.\u003c/p\u003e\n\n\u003cp\u003eThe researchers said the hook groups suggest the developers tracked software updates and added support for different versions over time. They noted that one hook group appeared to be added for an older software version after a newer one, raising the possibility that a simulation user reverted after seeing an anomaly before that version was also targeted. The article says fast16 also avoided infecting systems with certain security products and spread automatically to other endpoints on the same network.\u003c/p\u003e\n\n\u003cp\u003eThe findings indicate that malware-based strategic industrial sabotage was occurring well before Stuxnet was used to damage uranium enrichment centrifuges at Iran’s Natanz nuclear plant. Symantec technical director Vikram Thakur told Kim Zetter that the expertise required to build such malware in 2005 was “mind-blowing.” The article says it is not known whether a modern-day version of fast16 exists in the wild.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSymantec and Carbon Black analyzed the Lua-based fast16 malware and concluded that it was a cyber sabotage tool designed to tamper with nuclear weapons testing simulations. The article says the malware was engineered to corrupt uranium-compression simulations that are central to nuclear weapon design. Researchers described it as a pre-Stuxnet tool and linked it to a broader history of highly targeted cyber-physical sabotage.\u003c/p\u003e\n\n\u003cp\u003eThe analysis says fast16 targeted LS-DYNA and AUTODYN, two software applications used to simulate real-world problems including vehicle crashworthiness, material modeling, and explosive simulation. Symantec and Carbon Black said the malware’s hook engine was selectively interested in high-explosive simulations inside those applications. The tampering activated only during full-scale transient blast and detonation runs.\u003c/p\u003e\n\n\u003ch2 id=\"context-and-prior-research\"\u003eContext and Prior Research\u003c/h2\u003e\n\n\u003cp\u003eThe article says Symantec and Carbon Black’s findings came weeks after SentinelOne presented an analysis of fast16. SentinelOne described fast16 as the first sabotage framework whose components may have been developed as early as 2005. That timeline would place fast16 before the earliest known version of Stuxnet, also known as Stuxnet 0.5, by two years.\u003c/p\u003e\n\n\u003cp\u003eSentinelOne’s evidence included a reference to the string “fast16” in a text file leaked by The Shadow Brokers in 2017. The article says the file was part of a large collection of hacking tools and exploits allegedly used by the Equation Group. The Equation Group is described in the article as a state-sponsored threat actor with suspected ties to the U.S. National Security Agency.\u003c/p\u003e\n\n\u003cp\u003eSentinelOne had previously identified three probable software candidates affected by fast16: LS-DYNA version 970, Practical Structural Design and Construction Software, and Modelo Hidrodinâmico. The article says Symantec’s latest analysis confirmed LS-DYNA and AUTODYN as the two applications targeted by fast16. It also says the exact binaries patched by the malware were unclear in the earlier SentinelOne analysis.\u003c/p\u003e\n\n\u003ch2 id=\"technical-behavior\"\u003eTechnical Behavior\u003c/h2\u003e\n\n\u003cp\u003eFast16 contained 101 hook rules designed to tamper with mathematical calculations performed by certain engineering and simulation programs. Symantec and Carbon Black said these hook rules were associated with three attack strategies. The article states that the hooks were placed inside the simulation programs and activated only under specific simulation conditions.\u003c/p\u003e\n\n\u003cp\u003eA central trigger was material density. According to the article, fast16 checked whether the density of the simulated material passed 30 g/cm³. The researchers said this threshold could only be reached by uranium under the shock compression of an implosion device.\u003c/p\u003e\n\n\u003cp\u003eThe malware was not broadly disruptive across all simulations. Instead, it was selectively focused on high-explosive simulations within LS-DYNA and AUTODYN. Symantec and Carbon Black said the tampering only activated during full-scale transient blast and detonation runs.\u003c/p\u003e\n\n\u003ch2 id=\"targeted-software-and-version-tracking\"\u003eTargeted Software and Version Tracking\u003c/h2\u003e\n\n\u003cp\u003eThe 101 hook rules could be categorized into 9 to 10 hook groups. Each group targeted different builds of LS-DYNA or AUTODYN. The article says this suggests the malware developers tracked software updates and added support for different versions over time.\u003c/p\u003e\n\n\u003cp\u003eResearchers said the ordering of these hook groups was notable. They observed that a hook group for a previous software version appeared after one for a newer version. The article quotes the researchers as saying that a simulation user may have reverted to an older version after encountering an anomaly, before that older version was also targeted.\u003c/p\u003e\n\n\u003cp\u003eThis pattern led the researchers to describe the operation as methodical and sustained. The article also notes that support for up to 10 versions of simulation software suggests the user updated versions semi-frequently. These observations are presented as evidence of ongoing adaptation by the malware developers.\u003c/p\u003e\n\n\u003ch2 id=\"stealth-propagation-and-operational-
