<script>
window.__DL_ARTICLES = [{"n":12,"title":"18th May – Threat Intelligence Report","source":"research.checkpoint.com","sourceColorIdx":4,"link":"https://research.checkpoint.com/2026/18th-may-threat-intelligence-report/","time":"14:58","priority":"MUST READ","score":94,"tldr":"This week’s threat landscape was dominated by major ransomware and data theft incidents, AI-enabled phishing/malware abuse, and several critical vulnerabilities including actively exploited Cisco SD-WAN flaws and unpatched Windows zero-days. Organizations should prioritize patching exposed systems and monitoring for ransomware, credential theft, and AI-assisted attack activity.","briefOverview":"\u003cp\u003eThe 18th May Threat Intelligence Report summarizes a week of major cyber incidents, AI-related threats, critical vulnerabilities, and ransomware research. Reported attacks included a Vodafone source code leak claimed by Lapsus\u003cspan class=\"math inline\"\u003e\\(, a \\)\u003c/span\u003e10.7M theft from THORChain, ransomware disruption at West Pharmaceutical Services, and a cyberattack affecting Foxconn’s North American operations. Several incidents involved operational disruption, data theft claims, or compromised development and production environments.\u003c/p\u003e\n\n\u003cp\u003eThe report highlights AI as both a target and an enabler of cyber threats. Researchers disclosed four chainable vulnerabilities in OpenClaw, described an AI-assisted macOS kernel exploit, documented phishing pages mass-produced through Vercel’s v0.dev, and found malware hidden in a popular Hugging Face repository. These cases included sandbox bypass, secret leakage, credential theft, infostealer deployment, and exploit development acceleration.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability section includes unpatched Windows zero-days, a critical NGINX memory flaw, an actively exploited Cisco SD-WAN authentication bypass, and an Apple Wi-Fi kernel-privilege issue. Check Point Research also reported on The Gentlemen ransomware operation, Q1 2026 ransomware trends, World Cup 2026-themed cyber activity, and a FamousSparrow intrusion against an Azerbaijani oil and gas company. The report emphasizes active exploitation, public proof-of-concept code, and ransomware consolidation as notable developments.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe report covers several significant attacks and breaches affecting telecommunications, cryptocurrency, pharmaceutical manufacturing, and electronics manufacturing organizations. Vodafone confirmed limited GitHub file access through compromised third-party development software after a source code leak was claimed by Lapsus\u003cspan class=\"math inline\"\u003e\\(, while stating that customer data and core network infrastructure were not affected. THORChain reported a breach involving one compromised vault and approximately \\)\u003c/span\u003e10.7M in stolen protocol-owned assets across several blockchains. West Pharmaceutical Services disclosed ransomware-related encryption and data theft that disrupted shipping, manufacturing, and shared service functions.\u003c/p\u003e\n\n\u003cp\u003eFoxconn confirmed a cyberattack on its North American operations after the Nitrogen ransomware group claimed to have stolen 8TB of data. The company said some factories were disrupted and that affected facilities were resuming normal production. No ransomware group had publicly claimed responsibility for the West Pharmaceutical Services incident at the time described in the article. Together, these incidents show a mix of data exposure, operational disruption, and ransomware activity across major global organizations.\u003c/p\u003e\n\n\u003cp\u003eThe AI threats section highlights multiple ways AI-related platforms and tooling were involved in security risks. Researchers unveiled “Claw Chain,” four chainable vulnerabilities in OpenClaw that could bypass sandbox controls, expose restricted files, leak secrets, and provide owner-level access, including critical CVE-2026-44112 with a CVSS score of 9.6. Other researchers developed an AI-assisted macOS kernel exploit that bypassed Apple’s Memory Integrity Enforcement on M5 chips and granted full system control on macOS 26.4.1. The findings were privately reported to Apple before public disclosure.\u003c/p\u003e\n\n\u003cp\u003eThe report also describes abuse of AI and developer platforms for phishing and malware distribution. Threat actors used Vercel’s AI website generator, v0.dev, to mass-produce realistic phishing pages imitating brands such as Microsoft and Spotify, with Telegram bots used to capture credentials and payment details in real time. A popular Hugging Face repository posing as OpenAI’s privacy filter was found to contain Windows-targeting malware after more than 200,000 downloads. The malware harvested browser passwords, cookies, SSH keys, VPN configurations, and cryptocurrency wallets before exfiltrating the data.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability and patching section identifies several high-impact flaws. YellowKey and GreenPlasma are unpatched Windows zero-days affecting Windows 11 and recent Windows Server versions, with public proof-of-concept code available. F5 fixed CVE-2026-42945, an 18-year-old critical memory flaw in the NGINX rewrite module affecting versions 0.6.27 through 1.30.0, while Cisco addressed CVE-2026-20182, a critical Catalyst SD-WAN authentication bypass being actively exploited. Apple also released updates for CVE-2026-28819, an out-of-bounds write flaw in the Wi-Fi component affecting iOS, iPadOS, and macOS.\u003c/p\u003e\n\n\u003cp\u003eThe threat intelligence reports section focuses on ransomware, themed cyber activity, and a targeted intrusion. Check Point Research analyzed an internal leak from The Gentlemen ransomware operation and also summarized Q1 2026 ransomware trends, including 2,122 leak-site victims and the top 10 groups accounting for 71% of victims. Check Point Research also quantified World Cup 2026-related cyber activity, including 9,741 FIFA-themed domains in April and one in 41 being malicious by early May. Bitdefender researchers attributed a months-long intrusion against an Azerbaijani oil and gas company to the Chinese-linked FamousSparrow group, involving exploitation of an unpatched Microsoft Exchange server, web shells, Deed RAT, and TernDoor.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe 18th May Threat Intelligence Report summarizes cyber activity across four major areas: top attacks and breaches, AI-related threats, vulnerabilities and patches, and threat intelligence research. The article describes incidents affecting major organizations including Vodafone, THORChain, West Pharmaceutical Services, and Foxconn. It also highlights AI platform vulnerabilities, AI-assisted exploit work, phishing page generation, malicious packages, critical software flaws, and ransomware trends.\u003c/p\u003e\n\n\u003cp\u003eThe report’s most prominent themes are operational disruption, data theft or data exposure, active exploitation, and the growing role of AI-related systems in both attack development and attack delivery. Several items include known or claimed actors, such as Lapsus$, Nitrogen ransomware, The Gentlemen ransomware operation, and the Chinese-linked FamousSparrow group. Other items focus on technical vulnerabilities and defensive responses, including vendor fixes, public proof-of-concept code, and CISA-directed patching for federal agencies.\u003c/p\u003e\n\n\u003ch2 id=\"top-attacks-and-breaches\"\u003eTop Attacks and Breaches\u003c/h2\u003e\n\n\u003ch3 id=\"vodafone-source-code-leak\"\u003eVodafone source code leak\u003c/h3\u003e\n\n\u003cp\u003eVodafone, described as a major international telecom, sustained a source code leak claimed by the Lapsus$ extortion group. The company confirmed limited access to GitHub files through compromised third-party development software. Vodafone stated that customer data and core network infrastructure were not affected by the incident.\u003c/p\u003e\n\n\u003ch3 id=\"thorchain-cryptocurrency-theft\"\u003eTHORChain cryptocurrency theft\u003c/h3\u003e\n\n\u003cp\u003eTHORChain, a Switzerland-based cryptocurrency platform, encountered a security breach that led to the theft of about $10.7M. Trading was halted after one of six vaults was compromised. The company said losses were limited to protocol-owned assets across several blockchains.\u003c/p\u003e\n\n\u003ch3 id=\"west-pharmaceutical-services-ransomware-attack\"\u003eWest Pharmaceutical Services ransomware attack\u003c/h3\u003e\n\n\u003cp\u003eWest Pharmaceutical Services, a global manufacturer of drug delivery components, experienced a ransomware attack. The incident disrupted shipping, manufacturing, and shared service functions. The company disclosed that some systems were encrypted and data was stolen, but no ransomware group had publicly claimed responsibility.\u003c/p\u003e\n\n\u003ch3 id=\"foxconn-cyberattack\"\u003eFoxconn cyberattack\u003c/h3\u003e\n\n\u003cp\u003eFoxconn, a global electronics manufacturer, confirmed a cyberattack on its North American operations. The confirmation followed a claim by the Nitrogen ransomware group that it had stolen 8TB of data. Foxconn confirmed disruption at some factories and said affected facilities were resuming normal production.\u003c/p\u003e\n\n\u003ch2 id=\"ai-threats\"\u003eAI Threats\u003c/h2\u003e\n\n\u003ch3 id=\"openclaw-claw-chain-vulnerabilities\"\u003eOpenClaw “Claw Chain” vulnerabilities\u003c/h3\u003e\n\n\u003cp\u003eResearchers unveiled “Claw Chain,” a set of four vulnerabilities in OpenClaw, an autonomous AI agent platform. The flaws allow attackers to bypass sandbox controls, expose restricted files, leak secrets, and gain owner-level access. One of the flaws is CVE-2026-44112, described as critical and rated CVSS 9.6.\u003c/p\u003e\n\n\u003ch3 id=\"ai-assisted-macos-kernel-exploit\"\u003eAI-assisted macOS kernel exploit\u003c/h3\u003e\n\n\u003cp\u003eResearchers developed an AI-assisted macOS kernel exploit that bypasses Apple’s Memory Integrity Enforcement on M5 chips. The exploit grants full system control on macOS 26.4.1. Anthropic’s Mythos Preview reportedly accelerated bug discovery, and the findings were privately reported to Apple before public disclosure.\u003c/p\u003e\n\n\u003ch3 id=\"vercel-v0-dev-abuse-for-phishing\"\u003eVercel v0.dev abuse for phishing\u003c/h3\u003e\n\n\u003cp\u003eResearchers detailed how threat actors abuse Vercel’s AI website generator, v0.dev, to mass-produce realistic phishing pages. The phishing pages mimic brands such as Microsoft and Spotify. The campaigns use Telegram bots to capture credentials and payment details in real time.\u003c/p\u003e\n\n\u003ch3 id=\"malware-in-hugging-face-repository\"\u003eMalware in Hugging Face repository\u003c/h3\u003e\n\n\u003cp\u003eResearchers found a popular Hugging Face repository hiding Windows-targeting malware after it amassed more than 200,000 downloads. The package posed as OpenAI’s privacy filter. It installed an infostealer that harvested browser passwords, cookies, SSH keys, VPN configurations, and cryptocurrency wallets before exfiltrating the data.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerabilities-and-patches\"\u003eVulnerabilities and Patches\u003c/h2\u003e\n\n\u003ch3 id=\"windows-yellowkey-and-greenplasma-zero-days\"\u003eWindows YellowKey and GreenPlasma zero-days\u003c/h3\u003e\n\n\u003cp\u003eTwo Windows zero-day vulnerabilities, YellowKey and GreenPlasma, affect Windows 11 and recent Windows Server versions. YellowKey allows BitLocker bypass through Windows Recovery Environment with physical access. GreenPlasma abuses the CTFMON framework to escalate privileges to SYSTEM.\u003c/p\u003e\n\n\u003cp\u003eProof-of-concept code for these vulnerabilities is public. The vulnerabilities are still unpatched, according to the article.\u003c/p\u003e\n\n\u003ch3 id=\"nginx-cve-2026-42945\"\u003eNGINX CVE-2026-42945\u003c/h3\u003e\n\n\u003cp\u003eF5 fixed CVE-2026-42945, a critical memory flaw in the NGINX rewrite module. The flaw affects NGINX versions 0.6.27 through 1.30.0 and is described as an 18-year-old bug. It enables denial of service and, under specific configurations, possible remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe article states that public exploit code requires memory protections to be disabled. It also notes that Check Point IPS provides protection against Nginx Heap Overflow identified as CVE-2026-42945.\u003c/p\u003e\n\n\u003ch3 id=\"cisco-catalyst-sd-wan-cve-2026-20182\"\u003eCisco Catalyst SD-WAN CVE-2026-20182\u003c/h3\u003e\n\n\u003cp\u003eCisco addressed CVE-2026-20182, a critical authentication bypass in Catalyst SD-WAN controllers. The flaw is being actively exploited and allows remote, unauthenticated attackers to gain full administrative control of affected systems. CISA ordered federal agencies to patch vulnerable devices following Cisco’s fixes.\u003c/p\u003e\n\n\u003ch3 id=\"apple-cve-2026-28819\"\u003eApple CVE-2026-28819\u003c/h3\u003e\n\n\u003cp\u003eApple released security updates for CVE-2026-28819. The vulnerability is an out-of-bounds write flaw in the Wi-Fi component affecting iOS, iPadOS, and macOS. Successful exploitation could allow an app to execute code with kernel privileges, and Apple addressed the issue with improved bounds checking.\u003c/p\u003e\n\n\u003ch2 id=\"threat-intelligence-reports\"\u003eThreat Intelligence Reports\u003c/h2\u003e\n\n\u003ch3 id=\"the-gentlemen-ransomware-operation\"\u003eThe Gentlemen ransomware operation\u003c/h3\u003e\n\n\u003cp\u003eCheck Point Research analyzed an internal leak from The Gentlemen ransomware operation. The analysis exposed chats, infrastructure details, affiliate roles, and ransom negotiations. The report links the zeta88 account to the administrator and maps eight affiliate TOX IDs.\u003c/p\u003e\n\n\u003cp\u003eThe report also details the use of Fortinet and Cisco vulnerabilities, NTLM relay, and OWA/M365 for initial access in attacks. The article states that Check Point Threat Emulation and Harmony Endpoint provide protection against this threat.\u003c/p\u003e\n\n\u003ch3 id=\"q1-2026-ransomware-trends\"\u003eQ1 2026 ransomware trends\u003c/h3\u003e\n\n\u003cp\u003eCheck Point Research summarized Q1 2026 ransomware trends. The research recorded 2,122 leak-site victims, which the article says is the second-highest Q1 on record. The report also described renewed consolidation, with the top 10 groups responsible for 71% of victims.\u003c/p\u003e\n\n\u003cp\u003eQilin led with 338 victims. The Gentlemen rose to third place, and LockBit 5.0 returned with 163 victims.\u003c/p\u003e\n\n\u003ch3 id=\"world-cup-2026-cyber-activity\"\u003eWorld Cup 2026 cyber activity\u003c/h3\u003e\n\n\u003cp\u003eCheck Point Research quantified a World Cup 2026-driven surge in cyber activity. Weekly attacks per organization rose in Mexico, Canada, and the United States in April. The affected sectors included media, hospitality, transportation, and travel.\u003c/p\u003e\n\n\u003cp\u003eFIFA-themed domains reached 9,741 in April. By early May, one in 41 of those domains were malicious.\u003c/p\u003e\n\n\u003ch3 id=\"famoussparrow-intrusion-against-azerbaijani-oil-and-gas-company\"\u003eFamousSparrow intrusion against Azerbaijani oil and gas company\u003c/h3\u003e\n\n\u003cp\u003eResearchers attributed a months-long intrusion against an Azerbaijani oil and gas company to the Chinese-linked FamousSparrow group. The attackers exploited an unpatched Microsoft Exchange server to deploy web shells. They then alternated between Deed RAT and TernDoor across three waves of persistent activity.\u003c/p\u003e\n\n\u003ch2 id=\"notable-impacts-and-responses\"\u003eNotable Impacts and Responses\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eVodafone said customer data and core network infrastructure were not affected by the confirmed limited GitHub file access.\u003c/li\u003e\n\u003cli\u003eTHORChain halted trading after one of six vaults was compromised and reported about $10.7M in stolen protocol-owned assets.\u003c/li\u003e\n\u003cli\u003eWest Pharmaceutical Services reported encrypted systems, stolen data, and disruption to shipping, manufacturing, and shared services.\u003c/li\u003e\n\u003cli\u003eFoxconn confirmed factory disruption in North America and said affected facilities were resuming normal production.\u003c/li\u003e\n\u003cli\u003eCisco fixed an actively exploited Catalyst SD-WAN authentication bypass, and CISA ordered federal agencies to patch vulnerable devices.\u003c/li\u003e\n\u003cli\u003eApple released security updates for a Wi-Fi component flaw that could allow kernel-privilege code execution by an app.\u003c/li\u003e\n\u003cli\u003eF5 fixed a critical NGINX rewrite module memory flaw affecting versions 0.6.27 through 1.30.0.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article presents a broad threat picture involving major breaches, ransomware disruption, AI-related security risks, and critical vulnerabilities. It includes both immediate operational impacts, such as halted trading and disrupted manufacturing, and technical risks, such as public proof-of-concept code, active exploitation, and kernel-level code execution. The report also emphasizes ransomware activity through The Gentlemen leak analysis and Q1 2026 ransomware statistics, including 2,122 leak-site victims and concentration among the top 10 ransomware groups.\u003c/p\u003e\n","keyPoints":["Vodafone confirmed a source code leak after compromised third-party development software allowed limited access to GitHub files, while stating that customer data and core network infrastructure were not affected.","THORChain suffered a breach that led to the theft of about $10.7 million after one of six vaults was compromised, causing trading to be halted.","Researchers disclosed multiple AI-related threats, including vulnerabilities in OpenClaw, an AI-assisted macOS kernel exploit, phishing pages generated with Vercel’s v0.dev, and malware hidden in a popular Hugging Face repository.","Two unpatched Windows zero-day vulnerabilities, YellowKey and GreenPlasma, affect Windows 11 and recent Windows Server versions, with public proof-of-concept code available.","Cisco fixed CVE-2026-20182, a critical authentication bypass in Catalyst SD-WAN controllers that is being actively exploited and can allow remote unauthenticated attackers to gain full administrative control."],"insights":["AI platforms and repositories are emerging as both attack surfaces and attack enablers, with the article citing exploitable flaws in OpenClaw, AI-assisted exploit development, AI-generated phishing pages, and malware hidden in a Hugging Face repository.","Several high-impact incidents involved third-party or ecosystem exposure rather than direct compromise of core assets, including Vodafone’s GitHub access through compromised third-party development software and Hugging Face users downloading a malicious repository posing as a privacy filter.","Operational disruption remained a major consequence even when companies limited public claims about data impact, as West Pharmaceutical reported disrupted shipping, manufacturing, and shared services, while Foxconn confirmed factory disruption in North America.","Public exploit availability increases urgency for defenders because the article notes proof-of-concept code is public for the unpatched Windows YellowKey and GreenPlasma zero-days, and public exploit code exists for the NGINX CVE-2026-42945 under specific conditions.","Ransomware activity showed both persistence and consolidation, with Check Point Research reporting 2,122 leak-site victims in Q1 2026 and the top 10 groups accounting for 71% of victims."],"referencedReports":[{"title":"Claw Chain: Cyera Research Unveil Four Chainable Vulnerabilities in OpenClaw","url":"https://www.cyera.com/blog/claw-chain-cyera-research-unveil-four-chainable-vulnerabilities-in-openclaw","publisher":"Cyera","context":"The article references Cyera research that unveiled four chainable vulnerabilities in OpenClaw, including critical CVE-2026-44112.","category":"","primary":false},{"title":"Steal Smarter, Not Harder: Malicious Use of Vercel for Credential Phishing","url":"https://cofense.com/blog/steal-smarter-not-harder-malicious-use-of-vercel-for-credential-phishing","publisher":"Cofense","context":"The article cites Cofense research detailing how threat actors abuse Vercel’s v0.dev to create realistic phishing pages.","category":"","primary":false},{"title":"Malware Found in Trending Hugging Face Repository: open_oss_privacy_filter","url":"https://www.hiddenlayer.com/research/malware-found-in-trending-hugging-face-repository-open-oss-privacy-filter","publisher":"HiddenLayer","context":"The article references HiddenLayer research that found Windows-targeting malware hidden in a popular Hugging Face repository.","category":"","primary":false},{"title":"FamousSparrow APT Targets Azerbaijani Oil \u0026 Gas Industry","url":"https://www.bitdefender.com/en-us/blog/businessinsights/famoussparrow-apt-targets-azerbaijani-oil-gas-industry","publisher":"Bitdefender","context":"The article cites Bitdefender research attributing a months-long intrusion against an Azerbaijani oil and gas company to the Chinese-linked FamousSparrow group.","category":"","primary":false}],"body":"\u003cp\u003eThe 18th May Threat Intelligence Report summarizes a week of major cyber incidents, AI-related threats, critical vulnerabilities, and ransomware research. Reported attacks included a Vodafone source code leak claimed by Lapsus\u003cspan class=\"math inline\"\u003e\\(, a \\)\u003c/span\u003e10.7M theft from THORChain, ransomware disruption at West Pharmaceutical Services, and a cyberattack affecting Foxconn’s North American operations. Several incidents involved operational disruption, data theft claims, or compromised development and production environments.\u003c/p\u003e\n\n\u003cp\u003eThe report highlights AI as both a target and an enabler of cyber threats. Researchers disclosed four chainable vulnerabilities in OpenClaw, described an AI-assisted macOS kernel exploit, documented phishing pages mass-produced through Vercel’s v0.dev, and found malware hidden in a popular Hugging Face repository. These cases included sandbox bypass, secret leakage, credential theft, infostealer deployment, and exploit development acceleration.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability section includes unpatched Windows zero-days, a critical NGINX memory flaw, an actively exploited Cisco SD-WAN authentication bypass, and an Apple Wi-Fi kernel-privilege issue. Check Point Research also reported on The Gentlemen ransomware operation, Q1 2026 ransomware trends, World Cup 2026-themed cyber activity, and a FamousSparrow intrusion against an Azerbaijani oil and gas company. The report emphasizes active exploitation, public proof-of-concept code, and ransomware consolidation as notable developments.\u003c/p\u003e\n"},{"n":15,"title":"Ivanti, Fortinet, SAP, VMware, n8n Patch RCE, SQL Injection, Privilege Escalation Flaws","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/ivanti-fortinet-sap-vmware-n8n-patch.html","time":"10:54","priority":"MUST READ","score":92,"tldr":"Ivanti, Fortinet, SAP, VMware, and n8n released patches for several critical and high-severity flaws enabling remote code execution, SQL injection, authentication bypass, information disclosure, and privilege escalation. Organizations should prioritize updates for affected Ivanti Xtraction, Fortinet, SAP S/4HANA/Commerce, VMware Fusion, and n8n deployments.","briefOverview":"\u003cp\u003eIvanti, Fortinet, n8n, SAP, and VMware released security fixes for vulnerabilities that could be exploited to bypass authentication and execute arbitrary code. The article highlights multiple critical flaws with CVSS scores above 9.0, including issues in Ivanti Xtraction, FortiAuthenticator, FortiSandbox, SAP S/4HANA, SAP Commerce cloud configuration, and n8n. Broadcom also addressed a high-severity VMware Fusion flaw that could allow local privilege escalation.\u003c/p\u003e\n\n\u003cp\u003eThe most severe issues include unauthenticated code or command execution paths in Fortinet products and a missing authentication check in SAP Commerce cloud configuration. Ivanti Xtraction’s CVE-2026-8043 could allow a remote authenticated attacker to read sensitive files and write arbitrary HTML files to a web directory. n8n fixed five critical vulnerabilities that could allow authenticated users with workflow permissions to achieve remote code execution, read arbitrary files, or compromise the n8n host.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that many other vendors released security updates over the past several weeks. These include major software, hardware, cloud, operating system, and industrial technology vendors. The main response across affected vendors is to apply the fixed versions identified in the advisories.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eIvanti, Fortinet, SAP, VMware, and n8n issued patches for vulnerabilities that could allow authentication bypass, arbitrary code execution, SQL injection, information disclosure, and privilege escalation. Several of the flaws are rated critical, with CVSS scores of 9.1, 9.4, or 9.6. The article presents the fixes as part of a broader set of security updates released by many vendors over recent weeks.\u003c/p\u003e\n\n\u003cp\u003eIvanti addressed CVE-2026-8043 in Ivanti Xtraction before version 2026.2, a critical flaw with a CVSS score of 9.6. Ivanti said the issue involves external control of a file name and allows a remote authenticated attacker to read sensitive files and write arbitrary HTML files to a web directory. The impact includes information disclosure and possible client-side attacks.\u003c/p\u003e\n\n\u003cp\u003eFortinet published advisories for two critical vulnerabilities affecting FortiAuthenticator and FortiSandbox products. CVE-2026-44277 in FortiAuthenticator is an improper access control issue that may let an unauthenticated attacker execute unauthorized code or commands via crafted requests. CVE-2026-26083 is a missing authorization vulnerability in FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI that may allow unauthenticated code or command execution via HTTP requests.\u003c/p\u003e\n\n\u003cp\u003eSAP shipped fixes for two critical vulnerabilities: CVE-2026-34260 in SAP S/4HANA and CVE-2026-34263 in SAP Commerce cloud configuration. Onapsis said CVE-2026-34263 is caused by an overly permissive security configuration with improper rule ordering, allowing unauthenticated malicious configuration upload and code injection that results in arbitrary server-side code execution. Pathlock said CVE-2026-34260 allows a low-privileged, authenticated attacker to inject malicious SQL code, potentially exposing sensitive database information and crashing the application.\u003c/p\u003e\n\n\u003cp\u003eBroadcom released a fix for CVE-2026-41702 in VMware Fusion, a high-severity TOCTOU vulnerability in an operation performed by a SETUID binary. Broadcom said a malicious actor with local non-administrative user privileges could exploit it to escalate privileges to root on a system where Fusion is installed. The flaw was addressed in VMware Fusion version 26H1.\u003c/p\u003e\n\n\u003cp\u003en8n released fixes for five critical vulnerabilities with CVSS scores of 9.4. These issues involve prototype pollution, a bypass for a prior vulnerability, an unvalidated pagination parameter, and CLI flag injection in the Git node’s Push operation. The article does not identify any specific known threat actor or confirmed exploitation, but says the vulnerabilities could be exploited by bad actors and lists fixed n8n versions for each advisory.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eIvanti, Fortinet, n8n, SAP, and VMware released security fixes for multiple vulnerabilities that could be exploited to bypass authentication and execute arbitrary code. The article highlights several critical vulnerabilities with CVSS scores ranging from 9.1 to 9.6, as well as a high-severity VMware Fusion privilege escalation issue rated 7.8. The affected products include Ivanti Xtraction, FortiAuthenticator, FortiSandbox, SAP S/4HANA, SAP Commerce cloud configuration, VMware Fusion, and n8n.\u003c/p\u003e\n\n\u003cp\u003eThe article frames these updates as part of a broader patching wave across many vendors. It also lists numerous additional vendors that released security updates over the past several weeks, including ABB, Adobe, Amazon Web Services, AMD, Apple, Atlassian, Cisco, Dell, GitLab, Google, Microsoft, Mozilla, NVIDIA, Palo Alto Networks, Siemens, Zoom, Zyxel, and many others.\u003c/p\u003e\n\n\u003ch2 id=\"ivanti-xtraction\"\u003eIvanti Xtraction\u003c/h2\u003e\n\n\u003cp\u003eIvanti fixed a critical vulnerability in Ivanti Xtraction tracked as CVE-2026-8043. The flaw has a CVSS score of 9.6 and affects Ivanti Xtraction before version 2026.2.\u003c/p\u003e\n\n\u003cp\u003eIvanti described the issue as external control of a file name. According to the advisory cited in the article, a remote authenticated attacker could exploit the flaw to read sensitive files and write arbitrary HTML files to a web directory. The stated impact includes information disclosure and possible client-side attacks.\u003c/p\u003e\n\n\u003ch2 id=\"fortinet-fortiauthenticator-and-fortisandbox\"\u003eFortinet FortiAuthenticator and FortiSandbox\u003c/h2\u003e\n\n\u003cp\u003eFortinet published advisories for two critical vulnerabilities affecting FortiAuthenticator and FortiSandbox-related products. Both flaws have CVSS scores of 9.1 and may allow unauthenticated attackers to execute unauthorized code or commands.\u003c/p\u003e\n\n\u003cp\u003eThe first vulnerability is CVE-2026-44277, an improper access control issue in FortiAuthenticator. The article says it may allow an unauthenticated attacker to execute unauthorized code or commands via crafted requests. Fortinet fixed the issue in FortiAuthenticator versions 6.5.7, 6.6.9, and 8.0.3.\u003c/p\u003e\n\n\u003cp\u003eThe second vulnerability is CVE-2026-26083, a missing authorization vulnerability in the FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI. The article says it may allow an unauthenticated attacker to execute unauthorized code or commands via HTTP requests. It was fixed in FortiSandbox versions 4.4.9 and 5.0.2, FortiSandbox Cloud version 5.0.6, and FortiSandbox PaaS versions 4.4.9 and 5.0.2.\u003c/p\u003e\n\n\u003ch2 id=\"sap-s-4hana-and-sap-commerce-cloud-configuration\"\u003eSAP S/4HANA and SAP Commerce Cloud Configuration\u003c/h2\u003e\n\n\u003cp\u003eSAP shipped fixes for two critical vulnerabilities, both with CVSS scores of 9.6. These are CVE-2026-34260 in SAP S/4HANA and CVE-2026-34263 in SAP Commerce cloud configuration.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-34260 is an SQL injection vulnerability in SAP S/4HANA. The article says it could be exploited by an attacker to inject malicious SQL statements and potentially impact the confidentiality and availability of the application. It also states that because the affected code only allows read access to data, the vulnerability does not compromise application integrity.\u003c/p\u003e\n\n\u003cp\u003ePathlock said CVE-2026-34260 allows a low-privileged, authenticated attacker to inject malicious SQL code through user-controlled input. According to Pathlock, the issue could expose sensitive database information and crash the application.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-34263 is a missing authentication check in SAP Commerce cloud configuration. Onapsis said the vulnerability is caused by an overly permissive security configuration with improper rule ordering. According to Onapsis, it allows an unauthenticated user to perform malicious configuration upload and code injection, resulting in arbitrary server-side code execution.\u003c/p\u003e\n\n\u003ch2 id=\"vmware-fusion\"\u003eVMware Fusion\u003c/h2\u003e\n\n\u003cp\u003eBroadcom released patches for CVE-2026-41702 in VMware Fusion. The flaw is rated high severity with a CVSS score of 7.8 and was addressed in VMware Fusion version 26H1.\u003c/p\u003e\n\n\u003cp\u003eBroadcom described the issue as a TOCTOU, or Time-of-check Time-of-use, vulnerability. The vulnerability occurs during an operation performed by a SETUID binary. According to Broadcom, a malicious actor with local non-administrative user privileges may exploit the flaw to escalate privileges to root on a system where Fusion is installed.\u003c/p\u003e\n\n\u003ch2 id=\"n8n-critical-vulnerabilities\"\u003en8n Critical Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article lists five critical vulnerabilities affecting n8n. Each has a CVSS score of 9.4, and the impacts include remote code execution, arbitrary file reading, and full compromise of the n8n server or host.\u003c/p\u003e\n\n\u003cp\u003eThe first issue is CVE-2026-42231. It affects the xml2js library used to parse XML request bodies in n8n’s webhook handler. A crafted XML payload can allow prototype pollution, enabling an authenticated user with permission to create or modify workflows to achieve remote code execution on the n8n host. The issue was fixed in n8n versions 1.123.32, 2.17.4, and 2.18.1.\u003c/p\u003e\n\n\u003cp\u003eThe second issue is CVE-2026-42232. It allows an authenticated user with permission to create or modify workflows to achieve global prototype pollution via the XML Node. The article says this can lead to remote code execution when combined with other nodes exploiting the prototype pollution. It was fixed in n8n versions 1.123.32, 2.17.4, and 2.18.1.\u003c/p\u003e\n\n\u003cp\u003eThe third issue is CVE-2026-44791. The article describes it as a bypass for CVE-2026-42232 that could result in remote code execution on the n8n host. It was fixed in n8n versions 1.123.43, 2.20.7, and 2.22.1.\u003c/p\u003e\n\n\u003cp\u003eThe fourth issue is CVE-2026-44789. It allows an authenticated user with permission to create or modify workflows to achieve global prototype pollution through an unvalidated pagination parameter in the HTTP Request node. The article says this can lead to remote code execution on the n8n host. It was fixed in n8n versions 1.123.43, 2.20.7, and 2.22.1.\u003c/p\u003e\n\n\u003cp\u003eThe fifth issue is CVE-2026-44790. It allows an authenticated user with permission to create or modify workflows to inject CLI flags on the Git node’s Push operation. According to the article, this enables an attacker to read arbitrary files from the n8n server and results in full compromise. It was fixed in n8n versions 1.123.43, 2.20.7, and 2.22.1.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-response\"\u003eAffected Parties and Response\u003c/h2\u003e\n\n\u003cp\u003eThe affected parties are users and organizations running the impacted products and versions identified in the article. These include Ivanti Xtraction before version 2026.2, specified versions of FortiAuthenticator and FortiSandbox products before their fixed releases, SAP S/4HANA and SAP Commerce cloud configuration, VMware Fusion before version 26H1, and vulnerable n8n versions.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed response from vendors is the release of security fixes and advisories. The article provides fixed versions for Fortinet, VMware Fusion, and n8n, and it references SAP and Ivanti advisories for their respective fixes.\u003c/p\u003e\n\n\u003ch2 id=\"actors-and-disclosed-impact\"\u003eActors and Disclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article says the vulnerabilities could be exploited by bad actors to bypass authentication and execute arbitrary code. It does not identify any specific known or suspected threat actor. It also does not state that any of the vulnerabilities are known to have been exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed potential impacts include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInformation disclosure in Ivanti Xtraction.\u003c/li\u003e\n\u003cli\u003ePossible client-side attacks through arbitrary HTML file writes in Ivanti Xtraction.\u003c/li\u003e\n\u003cli\u003eUnauthorized code or command execution in Fortinet products.\u003c/li\u003e\n\u003cli\u003eSQL injection in SAP S/4HANA.\u003c/li\u003e\n\u003cli\u003eArbitrary server-side code execution in SAP Commerce cloud configuration.\u003c/li\u003e\n\u003cli\u003eLocal privilege escalation to root in VMware Fusion.\u003c/li\u003e\n\u003cli\u003eRemote code execution, arbitrary file reads, and full compromise in n8n.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"other-vendor-patch-activity\"\u003eOther Vendor Patch Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article closes by noting that many other vendors released security updates over the past several weeks. It lists vendors across enterprise software, cloud services, operating systems, networking, mobile platforms, industrial systems, and hardware. The list includes Linux distributions, Google Android and Pixel, Google Chrome, Microsoft, Mozilla Firefox, Firefox ESR, Thunderbird, Cisco, Dell, HP Enterprise, IBM, Intel, NVIDIA, Palo Alto Networks, Siemens, Schneider Electric, Sophos, Zoom, and Zyxel, among many others.\u003c/p\u003e\n","keyPoints":["Ivanti fixed CVE-2026-8043 in Ivanti Xtraction, a critical flaw that allows a remote authenticated attacker to read sensitive files and write arbitrary HTML files to a web directory.","Fortinet patched critical vulnerabilities in FortiAuthenticator and FortiSandbox products that could allow unauthenticated attackers to execute unauthorized code or commands via crafted or HTTP requests.","SAP released fixes for CVE-2026-34260, an SQL injection vulnerability in SAP S/4HANA, and CVE-2026-34263, a missing authentication check in SAP Commerce cloud configuration that can lead to arbitrary server-side code execution.","Broadcom patched CVE-2026-41702 in VMware Fusion, a high-severity TOCTOU vulnerability that could allow a local non-administrative user to escalate privileges to root.","n8n released fixes for five critical vulnerabilities that could allow authenticated users with workflow permissions to achieve remote code execution, read arbitrary files, or compromise the n8n host."],"insights":["Several of the most severe flaws do not require prior authentication, including the FortiAuthenticator and FortiSandbox vulnerabilities and the SAP Commerce cloud configuration issue, making exposed management or web interfaces especially urgent to patch.","The n8n advisories show that users with permission to create or modify workflows can become a critical attack path, as multiple vulnerabilities let such authenticated users escalate from workflow control to remote code execution or full host compromise.","CVE-2026-44791 is explicitly described as a bypass for an earlier n8n fix, so organizations running n8n should verify they are on the later fixed versions rather than assuming the initial CVE-2026-42232 patch is sufficient.","The SAP S/4HANA SQL injection flaw is limited to read access according to the article, but it can still expose sensitive database information and crash the application, so it remains a high-priority confidentiality and availability risk."],"referencedReports":[{"title":"Security Advisory - Ivanti Xtraction CVE-2026-8043","url":"https://hub.ivanti.com/s/article/Security-Advisory---Ivanti-Xtraction-CVE-2026-8043?language=en_US","publisher":"Ivanti","context":"The article cites Ivanti's advisory describing CVE-2026-8043 in Ivanti Xtraction and its impact.","category":"","primary":false},{"title":"FG-IR-26-128","url":"https://www.fortiguard.com/psirt/FG-IR-26-128","publisher":"Fortinet","context":"The article references Fortinet's advisory for CVE-2026-44277 affecting FortiAuthenticator.","category":"","primary":false},{"title":"FG-IR-26-136","url":"https://www.fortiguard.com/psirt/FG-IR-26-136","publisher":"Fortinet","context":"The article references Fortinet's advisory for CVE-2026-26083 affecting FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS.","category":"","primary":false},{"title":"SAP Security Notes and News: May 2026","url":"https://support.sap.com/en/my-support/knowledge-base/security-notes-news/may-2026.html","publisher":"SAP","context":"The article cites SAP's May 2026 security notes as the source for fixes for two critical SAP vulnerabilities.","category":"","primary":false},{"title":"SAP Security Patch Day May 2026","url":"https://onapsis.com/blog/sap-security-patch-day-may-2026/","publisher":"Onapsis","context":"The article quotes Onapsis's analysis of CVE-2026-34263 in SAP Commerce cloud configuration.","category":"","primary":false},{"title":"SAP Patch Day May 2026","url":"https://pathlock.com/blog/security-alerts/sap-patch-day-may-2026/","publisher":"Pathlock","context":"The article quotes Pathlock's analysis of the SAP S/4HANA SQL injection vulnerability CVE-2026-34260.","category":"","primary":false},{"title":"VMware Fusion Security Advisory","url":"https://support.broadcom.com/web/ecx/support-content-notification/-/external/content/SecurityAdvisories/0/37454","publisher":"Broadcom","context":"The article cites Broadcom's advisory describing CVE-2026-41702, a VMware Fusion privilege escalation flaw.","category":"","primary":false},{"title":"GHSA-q5f4-99jv-pgg5","url":"https://github.com/n8n-io/n8n/security/advisories/GHSA-q5f4-99jv-pgg5","publisher":"n8n","context":"The article links to n8n's security advisory for CVE-2026-42231 involving xml2js prototype pollution and remote code execution.","category":"","primary":false},{"title":"GHSA-hqr4-h3xv-9m3r","url":"https://github.com/n8n-io/n8n/security/advisories/GHSA-hqr4-h3xv-9m3r","publisher":"n8n","context":"The article links to n8n's security advisory for CVE-2026-42232 involving prototype pollution through the XML Node.","category":"","primary":false},{"title":"GHSA-wrwr-h859-xh2r","url":"https://github.com/n8n-io/n8n/security/advisories/GHSA-wrwr-h859-xh2r","publisher":"n8n","context":"The article links to n8n's security advisory for CVE-2026-44791, described as a bypass for CVE-2026-42232.","category":"","primary":false},{"title":"GHSA-c8xv-5998-g76h","url":"https://github.com/n8n-io/n8n/security/advisories/GHSA-c8xv-5998-g76h","publisher":"n8n","context":"The article links to n8n's security advisory for CVE-2026-44789 involving an unvalidated pagination parameter in the HTTP Request node.","category":"","primary":false},{"title":"GHSA-57g9-58c2-xjg3","url":"https://github.com/n8n-io/n8n/security/advisories/GHSA-57g9-58c2-xjg3","publisher":"n8n","context":"The article links to n8n's security advisory for CVE-2026-44790 involving CLI flag injection in the Git node's Push operation.","category":"","primary":false}],"body":"\u003cp\u003eIvanti, Fortinet, n8n, SAP, and VMware released security fixes for vulnerabilities that could be exploited to bypass authentication and execute arbitrary code. The article highlights multiple critical flaws with CVSS scores above 9.0, including issues in Ivanti Xtraction, FortiAuthenticator, FortiSandbox, SAP S/4HANA, SAP Commerce cloud configuration, and n8n. Broadcom also addressed a high-severity VMware Fusion flaw that could allow local privilege escalation.\u003c/p\u003e\n\n\u003cp\u003eThe most severe issues include unauthenticated code or command execution paths in Fortinet products and a missing authentication check in SAP Commerce cloud configuration. Ivanti Xtraction’s CVE-2026-8043 could allow a remote authenticated attacker to read sensitive files and write arbitrary HTML files to a web directory. n8n fixed five critical vulnerabilities that could allow authenticated users with workflow permissions to achieve remote code execution, read arbitrary files, or compromise the n8n host.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that many other vendors released security updates over the past several weeks. These include major software, hardware, cloud, operating system, and industrial technology vendors. The main response across affected vendors is to apply the fixed versions identified in the advisories.\u003c/p\u003e\n"},{"n":9,"title":"New Windows 'MiniPlasma' zero-day exploit gives SYSTEM access, PoC released","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/new-windows-miniplasma-zero-day-exploit-gives-system-access-poc-released/","time":"22:30","priority":"SHOULD READ","score":88,"tldr":"A public proof-of-concept exploit called MiniPlasma reportedly lets standard Windows users gain SYSTEM privileges on fully patched Windows 11 systems by abusing the Cloud Filter driver. Microsoft previously marked the underlying issue as fixed in 2020, but researchers say it remains exploitable and Microsoft has not yet responded.","briefOverview":"\u003cp\u003eA cybersecurity researcher known as Chaotic Eclipse, or Nightmare Eclipse, released a proof-of-concept exploit for a Windows privilege escalation zero-day called MiniPlasma. The exploit reportedly allows attackers to gain SYSTEM privileges on fully patched Windows systems. The researcher published both source code and a compiled executable on GitHub after claiming Microsoft failed to properly patch a previously reported 2020 vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe flaw affects the Windows Cloud Filter driver \u003ccode\u003ecldflt.sys\u003c/code\u003e and its \u003ccode\u003eHsmOsBlockPlaceholderAccess\u003c/code\u003e routine. BleepingComputer tested the exploit on a fully patched Windows 11 Pro system with the May 2026 Patch Tuesday updates and said it opened a command prompt with SYSTEM privileges from a standard user account. Will Dormann of Tharros also confirmed the exploit worked on the latest public Windows 11 version, but said it did not work on the latest Windows 11 Insider Preview Canary build.\u003c/p\u003e\n\n\u003cp\u003eThe issue is tied to CVE-2020-17103, which Google Project Zero researcher James Forshaw originally reported to Microsoft in September 2020 and Microsoft reportedly fixed in December 2020. Chaotic Eclipse claims the same issue is still present and that the original Google proof of concept worked without changes. Microsoft had not responded to BleepingComputer’s request for comment at the time of publication.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA researcher known as Chaotic Eclipse, or Nightmare Eclipse, released a proof-of-concept exploit for a Windows zero-day privilege escalation vulnerability dubbed MiniPlasma. The exploit was published on GitHub as both source code and a compiled executable. According to the article, it allows attackers to gain SYSTEM privileges on fully patched Windows systems.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects the Windows Cloud Filter driver \u003ccode\u003ecldflt.sys\u003c/code\u003e, specifically the \u003ccode\u003eHsmOsBlockPlaceholderAccess\u003c/code\u003e routine. The issue was originally reported to Microsoft in September 2020 by Google Project Zero researcher James Forshaw and was assigned CVE-2020-17103. Microsoft reportedly fixed the flaw in December 2020, but Chaotic Eclipse claims the exact same issue remains present and unpatched.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer tested MiniPlasma on a fully patched Windows 11 Pro system running the latest May 2026 Patch Tuesday updates. In that test, a standard user account ran the exploit and it opened a command prompt with SYSTEM privileges. Will Dormann, principal vulnerability analyst at Tharros, also confirmed the exploit worked on the latest public Windows 11 version.\u003c/p\u003e\n\n\u003cp\u003eDormann said the flaw did not work in the latest Windows 11 Insider Preview Canary build. The article says the exploit appears to abuse how the Windows Cloud Filter driver handles registry key creation through an undocumented \u003ccode\u003eCfAbortHydration\u003c/code\u003e API. Forshaw’s original report said the flaw could allow arbitrary registry keys to be created in the \u003ccode\u003e.DEFAULT\u003c/code\u003e user hive without proper access checks, potentially enabling privilege escalation.\u003c/p\u003e\n\n\u003cp\u003eMiniPlasma is part of a recent series of Windows zero-day disclosures by the same researcher. Earlier disclosures included BlueHammer, tracked as CVE-2026-33825, RedSun, and a Windows Defender denial-of-service tool called UnDefend, all of which were later spotted being exploited in attacks. The researcher also released two additional exploits named YellowKey and GreenPlasma, and has said the disclosures are in protest of Microsoft’s bug bounty and vulnerability-handling process.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer contacted Microsoft about the MiniPlasma zero-day and said it would update the story if a response was received. The article also notes that Microsoft previously told BleepingComputer it supports coordinated vulnerability disclosure and is committed to investigating reported security issues and protecting customers through updates.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA cybersecurity researcher known as Chaotic Eclipse, or Nightmare Eclipse, released a proof-of-concept exploit for a Windows privilege escalation zero-day dubbed MiniPlasma. The exploit reportedly gives attackers SYSTEM privileges on fully patched Windows systems.\u003c/p\u003e\n\n\u003cp\u003eThe researcher published both the source code and a compiled executable on GitHub. According to the article, the release followed the researcher’s claim that Microsoft failed to properly patch a vulnerability that had previously been reported in 2020.\u003c/p\u003e\n\n\u003ch2 id=\"reported-vulnerability\"\u003eReported Vulnerability\u003c/h2\u003e\n\n\u003cp\u003eThe flaw affects the Windows Cloud Filter driver, identified in the article as \u003ccode\u003ecldflt.sys\u003c/code\u003e. The affected routine is named \u003ccode\u003eHsmOsBlockPlaceholderAccess\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe issue was originally reported to Microsoft by Google Project Zero researcher James Forshaw in September 2020. At the time, the flaw was assigned the identifier CVE-2020-17103 and was reportedly fixed by Microsoft in December 2020.\u003c/p\u003e\n\n\u003cp\u003eChaotic Eclipse claims the same issue is still present and unpatched. The researcher also said the original Google proof of concept worked without any changes.\u003c/p\u003e\n\n\u003ch2 id=\"exploit-behavior-and-impact\"\u003eExploit Behavior and Impact\u003c/h2\u003e\n\n\u003cp\u003eBleepingComputer tested the MiniPlasma exploit on a fully patched Windows 11 Pro system running the latest May 2026 Patch Tuesday updates. The test used a standard user account.\u003c/p\u003e\n\n\u003cp\u003eAfter running the exploit, BleepingComputer said it opened a command prompt with SYSTEM privileges. The article includes this as evidence that MiniPlasma successfully gave Windows SYSTEM privileges in the test environment.\u003c/p\u003e\n\n\u003cp\u003eWill Dormann, principal vulnerability analyst at Tharros, also confirmed that the exploit worked in his tests on the latest public version of Windows 11. However, Dormann said the flaw did not work in the latest Windows 11 Insider Preview Canary build.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-included-in-the-article\"\u003eTechnical Details Included in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe exploit appears to abuse how the Windows Cloud Filter driver handles registry key creation through an undocumented \u003ccode\u003eCfAbortHydration\u003c/code\u003e API.\u003c/p\u003e\n\n\u003cp\u003eForshaw’s original report said the flaw could allow arbitrary registry keys to be created in the \u003ccode\u003e.DEFAULT\u003c/code\u003e user hive without proper access checks. The article says this could potentially enable privilege escalation.\u003c/p\u003e\n\n\u003cp\u003eThe article links the current MiniPlasma disclosure to CVE-2020-17103, which Microsoft had reported as fixed as part of the December 2020 Microsoft Patch Tuesday updates.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-status-and-response\"\u003eMicrosoft Status and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article says Microsoft reported having fixed the bug in December 2020. Chaotic Eclipse now claims the vulnerability can still be exploited.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer contacted Microsoft about this additional zero-day. At the time of the article, BleepingComputer had not received a response and said it would update the story if Microsoft responded.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that Microsoft previously told BleepingComputer it supports coordinated vulnerability disclosure. Microsoft also said it is committed to investigating reported security issues and protecting customers through updates.\u003c/p\u003e\n\n\u003ch2 id=\"researcher-and-disclosure-context\"\u003eResearcher and Disclosure Context\u003c/h2\u003e\n\n\u003cp\u003eMiniPlasma is described as the latest in a string of Windows zero-day disclosures by Chaotic Eclipse over several weeks.\u003c/p\u003e\n\n\u003cp\u003eThe article says the disclosure spree began in April with BlueHammer, a Windows local privilege escalation flaw tracked as CVE-2026-33825. It was followed by another privilege escalation vulnerability named RedSun and a Windows Defender denial-of-service tool named UnDefend.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, all three of those vulnerabilities were spotted being exploited in attacks after their disclosure. The researcher claimed Microsoft silently patched the RedSun issue without assigning it a CVE identifier.\u003c/p\u003e\n\n\u003cp\u003eThis month, the researcher also released two additional exploits named YellowKey and GreenPlasma. YellowKey is described as a BitLocker bypass affecting Windows 11 and Windows Server \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2025\u003c/sub\u003e that spawns a command shell giving access to unlocked drives protected by TPM-only BitLocker configurations.\u003c/p\u003e\n\n\u003ch2 id=\"researcher-s-stated-motivation\"\u003eResearcher’s Stated Motivation\u003c/h2\u003e\n\n\u003cp\u003eChaotic Eclipse has said they are publicly disclosing these Windows zero-days in protest of Microsoft’s bug bounty and vulnerability-handling process.\u003c/p\u003e\n\n\u003cp\u003eThe article quotes the researcher alleging that Microsoft threatened to ruin their life and that the company’s handling of the situation caused severe harm. The researcher described the experience as involving “childish” behavior and said it appeared to be a collective decision.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eMiniPlasma is a public Windows privilege escalation proof of concept that reportedly grants SYSTEM privileges.\u003c/li\u003e\n\u003cli\u003eBleepingComputer and Will Dormann confirmed the exploit worked on fully patched public Windows 11 systems.\u003c/li\u003e\n\u003cli\u003eThe flaw is tied to \u003ccode\u003ecldflt.sys\u003c/code\u003e, \u003ccode\u003eHsmOsBlockPlaceholderAccess\u003c/code\u003e, and the earlier CVE-2020-17103 issue reported in 2020.\u003c/li\u003e\n\u003cli\u003eMicrosoft previously reported the issue fixed in December 2020, but Chaotic Eclipse claims it remains exploitable.\u003c/li\u003e\n\u003cli\u003eThe exploit did not work in Dormann’s test on the latest Windows 11 Insider Preview Canary build.\u003c/li\u003e\n\u003cli\u003eMiniPlasma is part of a broader series of recent Windows zero-day disclosures by the same researcher.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["A researcher known as Chaotic Eclipse, or Nightmare Eclipse, released proof-of-concept source code and a compiled executable for a Windows privilege escalation zero-day dubbed MiniPlasma.","BleepingComputer tested the exploit on a fully patched Windows 11 Pro system with May 2026 Patch Tuesday updates and said it opened a command prompt with SYSTEM privileges from a standard user account.","The reported flaw affects the Windows Cloud Filter driver cldflt.sys and its HsmOsBlockPlaceholderAccess routine, which was originally reported to Microsoft by Google Project Zero researcher James Forshaw in September 2020.","Microsoft assigned the original issue CVE-2020-17103 and reported it fixed in December 2020, but Chaotic Eclipse claims the same issue remains unpatched and exploitable.","Will Dormann confirmed the exploit worked on the latest public version of Windows 11, but said it did not work on the latest Windows 11 Insider Preview Canary build."],"insights":["The exploit was validated on a fully patched Windows 11 Pro system with the latest May 2026 Patch Tuesday updates, so applying current public updates was not sufficient to prevent exploitation in BleepingComputer's test.","Will Dormann reported that the exploit did not work on the latest Windows 11 Insider Preview Canary build, while it did work on the latest public Windows 11 version.","The release includes both source code and a compiled executable on GitHub, lowering the barrier for others to test or misuse the exploit.","The same researcher’s earlier disclosed Windows issues, including BlueHammer, RedSun, and UnDefend, were later spotted being exploited in attacks, making this disclosure pattern especially actionable for defenders to monitor."],"referencedReports":[{"title":"Google Project Zero issue 42451192","url":"https://project-zero.issues.chromium.org/issues/42451192","publisher":"Google Project Zero","context":"The article says the cldflt.sys Cloud Filter driver flaw and HsmOsBlockPlaceholderAccess routine were originally reported to Microsoft by Google Project Zero researcher James Forshaw in September 2020.","category":"","primary":false},{"title":"CVE-2020-17103","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2020-17103","publisher":"Microsoft Security Response Center","context":"The article says the flaw was assigned the CVE-2020-17103 identifier and reportedly fixed by Microsoft in December 2020.","category":"","primary":false}],"body":"\u003cp\u003eA cybersecurity researcher known as Chaotic Eclipse, or Nightmare Eclipse, released a proof-of-concept exploit for a Windows privilege escalation zero-day called MiniPlasma. The exploit reportedly allows attackers to gain SYSTEM privileges on fully patched Windows systems. The researcher published both source code and a compiled executable on GitHub after claiming Microsoft failed to properly patch a previously reported 2020 vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe flaw affects the Windows Cloud Filter driver \u003ccode\u003ecldflt.sys\u003c/code\u003e and its \u003ccode\u003eHsmOsBlockPlaceholderAccess\u003c/code\u003e routine. BleepingComputer tested the exploit on a fully patched Windows 11 Pro system with the May 2026 Patch Tuesday updates and said it opened a command prompt with SYSTEM privileges from a standard user account. Will Dormann of Tharros also confirmed the exploit worked on the latest public Windows 11 version, but said it did not work on the latest Windows 11 Insider Preview Canary build.\u003c/p\u003e\n\n\u003cp\u003eThe issue is tied to CVE-2020-17103, which Google Project Zero researcher James Forshaw originally reported to Microsoft in September 2020 and Microsoft reportedly fixed in December 2020. Chaotic Eclipse claims the same issue is still present and that the original Google proof of concept worked without changes. Microsoft had not responded to BleepingComputer’s request for comment at the time of publication.\u003c/p\u003e\n"},{"n":6,"title":"Grafana says stolen GitHub token let hackers steal codebase","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/grafana-says-stolen-github-token-let-hackers-steal-codebase/","time":"13:46","priority":"SHOULD READ","score":86,"tldr":"Grafana Labs says attackers used a stolen GitHub access token to download its source code, but found no evidence customer data, personal information, or customer systems were affected. The company refused to pay the CoinbaseCartel extortion gang’s ransom demand and invalidated the compromised credentials.","briefOverview":"\u003cp\u003eGrafana Labs disclosed that hackers downloaded its source code after breaching its GitHub environment with a stolen access token. The company said forensic analysis identified the source of the leaked credentials, and it invalidated the compromised credentials. Grafana said it also implemented additional security measures to prevent future unauthorized access.\u003c/p\u003e\n\n\u003cp\u003eGrafana Labs said its investigation found no evidence that customer data or personal information was exposed. The company also said customer systems remained unaffected. The incident is significant because Grafana is a widely used open-source analytics, monitoring, and real-time data visualization platform used by more than 7,000 organizations, including 70% of Fortune 50 companies.\u003c/p\u003e\n\n\u003cp\u003eThe extortion gang CoinbaseCartel claimed the attack by listing Grafana on its data leak site, although no data had been leaked at publication time. The attacker demanded payment in exchange for not publishing the stolen source code. Grafana said it would not pay the ransom, citing FBI guidance that paying does not guarantee data recovery and encourages further illegal activity.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGrafana Labs disclosed that attackers downloaded its source code after breaching the company’s GitHub environment using a stolen access token. The company behind Grafana said its forensic investigation revealed the source of the leaked credentials. Grafana invalidated the compromised credentials and implemented additional security measures intended to prevent future unauthorized access.\u003c/p\u003e\n\n\u003cp\u003eThe company said it found no evidence that customer data or personal information was exposed during the incident. Grafana also said customer systems were not affected. It said more details would be released after completion of its post-incident investigation.\u003c/p\u003e\n\n\u003cp\u003eThe incident affects Grafana Labs, the company behind the widely used open-source platform for analytics, monitoring, and real-time data visualization. The article notes that Grafana’s paying customers include large enterprises, cloud providers, telecoms, banks, governments, e-commerce platforms, and infrastructure operators. Grafana says more than 7,000 organizations use the product, including 70% of Fortune 50 companies.\u003c/p\u003e\n\n\u003cp\u003eA relatively new extortion gang called CoinbaseCartel claimed responsibility by adding Grafana to its data leak site. At the time of publication, no data had been leaked. The attacker attempted to extort Grafana by demanding payment in exchange for not publishing the stolen source code.\u003c/p\u003e\n\n\u003cp\u003eGrafana said it chose not to pay the ransom based on its operational experience and the published stance of the FBI. The company quoted FBI guidance that paying a ransom does not guarantee data recovery and incentivizes others to participate in illegal activity. BleepingComputer said it contacted Grafana for additional details but had not received a response by publication time.\u003c/p\u003e\n\n\u003cp\u003eThe article says CoinbaseCartel launched last September and has been active this year, announcing more than 100 victims on its data leak portal. It also says the gang focuses on data theft and uses its leak site to pressure victims into paying. According to multiple researchers cited in the article, CoinbaseCartel consists of ShinyHunters and Lapsus$ affiliates that gain access through social engineering, phishing, and compromised credentials.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGrafana Labs disclosed that hackers downloaded its source code after breaching its GitHub environment. According to the article, the attackers gained access using a stolen access token. Grafana Labs said forensic analysis identified the source of the leaked credentials, after which the company invalidated the compromised credentials and implemented additional security measures.\u003c/p\u003e\n\n\u003cp\u003eThe company said its investigation found no evidence that customer data or personal information was exposed. It also said customer systems remained unaffected. Grafana stated that it would release more details after completing its post-incident investigation.\u003c/p\u003e\n\n\u003ch2 id=\"significance-of-the-target\"\u003eSignificance of the Target\u003c/h2\u003e\n\n\u003cp\u003eGrafana Labs is the company behind Grafana, an open-source platform for analytics, monitoring, and real-time data visualization. The article describes Grafana as popular and widely used. Grafana’s paying customers include large enterprises, cloud providers, telecoms, banks, governments, e-commerce platforms, and infrastructure operators.\u003c/p\u003e\n\n\u003cp\u003eThe article states that more than 7,000 organizations use Grafana. It also notes that Grafana says its users include 70% of Fortune 50 companies. This broad enterprise usage makes the breach notable even though the company said customer data and systems were not affected.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-disclosed\"\u003eTechnical Details Disclosed\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the initial access mechanism as a stolen GitHub access token. That token was used to breach Grafana’s GitHub environment and download source code. The article does not provide additional technical details about how the token was stolen.\u003c/p\u003e\n\n\u003cp\u003eGrafana said forensic analysis revealed the source of the leaked credentials. The company said it invalidated the compromised credentials. It also said it implemented additional security measures to prevent future unauthorized access, but the article does not specify what those additional measures were.\u003c/p\u003e\n\n\u003ch2 id=\"impact-reported-by-grafana\"\u003eImpact Reported by Grafana\u003c/h2\u003e\n\n\u003cp\u003eGrafana said it found no evidence that customer data or personal information was exposed. The company also said customer systems remained unaffected. The article frames the confirmed theft as the downloading of source code from Grafana’s GitHub environment.\u003c/p\u003e\n\n\u003cp\u003eNo leaked data had been published by the extortion group at the time of the article. BleepingComputer said it contacted Grafana for additional details about the breach. The publication said it had not received a response by publishing time.\u003c/p\u003e\n\n\u003ch2 id=\"extortion-attempt-and-grafana-s-response\"\u003eExtortion Attempt and Grafana’s Response\u003c/h2\u003e\n\n\u003cp\u003eThe attacker attempted to extort Grafana Labs. According to the article, the demand was for payment in exchange for not publishing the stolen source code. Grafana said it decided not to pay the ransom.\u003c/p\u003e\n\n\u003cp\u003eGrafana cited its operational experience and the published stance of the FBI in explaining the decision. The company quoted the FBI position that paying a ransom does not guarantee an organization will get data back. Grafana also said payment would incentivize others to engage in similar illegal activity.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-actor-coinbasecartel\"\u003eClaimed Actor: CoinbaseCartel\u003c/h2\u003e\n\n\u003cp\u003eA relatively new extortion gang called CoinbaseCartel claimed the attack. The group added Grafana to its data leak site, although no data had been leaked at the time of publication. The article says CoinbaseCartel launched last September and has been active this year.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, CoinbaseCartel has announced more than 100 victims on its data leak portal. The gang focuses on data theft and uses its leak site to pressure victims into paying ransoms. The article also says the gang announced on its site that it is “behind on many leaks,” indicating increased breaches that may not yet have reached the public space.\u003c/p\u003e\n\n\u003ch2 id=\"reported-links-to-other-threat-actors-and-tooling\"\u003eReported Links to Other Threat Actors and Tooling\u003c/h2\u003e\n\n\u003cp\u003eThe article states that, according to multiple researchers, CoinbaseCartel consists of ShinyHunters and Lapsus$ affiliates. These affiliates reportedly gain access to target networks using social engineering, various forms of phishing, and compromised credentials. The article does not provide further detail on whether those methods were used in the Grafana incident beyond the stolen GitHub token.\u003c/p\u003e\n\n\u003cp\u003eThreat intelligence specialist Joe Shenouda is cited as claiming that the gang also deploys an in-memory tool called “shinysp1d3r.” The article says this tool is used to encrypt VMware ESXi targets and disable snapshots. It also notes that BleepingComputer previously analyzed a ShinySp1d3r Windows encryptor developed by the ShinyHunters extortion group, and that at the time the threat actor said it was working on Linux and ESXi versions.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eGrafana Labs said attackers used a stolen GitHub access token to access its GitHub environment and download source code.\u003c/li\u003e\n\u003cli\u003eGrafana said it found no evidence of exposed customer data or personal information.\u003c/li\u003e\n\u003cli\u003eGrafana said customer systems were unaffected.\u003c/li\u003e\n\u003cli\u003eThe company invalidated the compromised credentials and implemented additional security measures.\u003c/li\u003e\n\u003cli\u003eCoinbaseCartel claimed the attack by listing Grafana on its data leak site, but no data had been leaked at publication time.\u003c/li\u003e\n\u003cli\u003eGrafana refused to pay the ransom, citing FBI guidance that payment does not guarantee recovery and encourages further illegal activity.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Grafana Labs disclosed that hackers downloaded its source code after breaching its GitHub environment using a stolen access token.","Grafana Labs said its investigation found no evidence that customer data or personal information was exposed and said customer systems were unaffected.","The attacker attempted to extort Grafana Labs by demanding payment in exchange for not publishing the stolen source code.","Grafana Labs said it chose not to pay the ransom, citing FBI guidance that paying does not guarantee data recovery and incentivizes further attacks.","The extortion gang CoinbaseCartel claimed the attack by listing Grafana on its data leak site, although no data had been leaked at the time of publication."],"insights":["The incident shows that an extortion attempt can proceed even when a company reports no evidence of customer data exposure, with the threatened publication of source code serving as the pressure point.","CoinbaseCartel’s statement that it is “behind on many leaks” indicates that some of its claimed breaches may not yet have appeared publicly on its data leak site.","The article links CoinbaseCartel to ShinyHunters and Lapsus$ affiliates and says researchers associate the group with social engineering, phishing, compromised credentials, and an in-memory ESXi encryption tool.","Grafana explicitly tied its refusal to pay to FBI guidance, making its response a public example of following law-enforcement recommendations against ransom payment."],"referencedReports":[],"body":"\u003cp\u003eGrafana Labs disclosed that hackers downloaded its source code after breaching its GitHub environment with a stolen access token. The company said forensic analysis identified the source of the leaked credentials, and it invalidated the compromised credentials. Grafana said it also implemented additional security measures to prevent future unauthorized access.\u003c/p\u003e\n\n\u003cp\u003eGrafana Labs said its investigation found no evidence that customer data or personal information was exposed. The company also said customer systems remained unaffected. The incident is significant because Grafana is a widely used open-source analytics, monitoring, and real-time data visualization platform used by more than 7,000 organizations, including 70% of Fortune 50 companies.\u003c/p\u003e\n\n\u003cp\u003eThe extortion gang CoinbaseCartel claimed the attack by listing Grafana on its data leak site, although no data had been leaked at publication time. The attacker demanded payment in exchange for not publishing the stolen source code. Grafana said it would not pay the ransom, citing FBI guidance that paying does not guarantee data recovery and encourages further illegal activity.\u003c/p\u003e\n"},{"n":11,"title":"Leaked Shai-Hulud malware fuels new npm infostealer campaign","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/leaked-shai-hulud-malware-fuels-new-npm-infostealer-campaign/","time":"17:28","priority":"SHOULD READ","score":86,"tldr":"A copycat threat actor is using leaked Shai-Hulud malware in new malicious npm packages that steal developer credentials, secrets, crypto wallet data, and in one case add DDoS bot capabilities. Developers who installed the affected packages should remove them immediately and rotate credentials and API keys.","briefOverview":"\u003cp\u003eThe leaked Shai-Hulud malware is now being used in new attacks on the Node Package Manager index, with infected npm packages appearing over the weekend. OXsecurity found that a threat actor using the account \u003ccode\u003edeadcode09284814\u003c/code\u003e published four malicious packages. The packages targeted developer credentials, secrets, cryptocurrency wallet data, account information, and configuration files.\u003c/p\u003e\n\n\u003cp\u003eOne package, \u003ccode\u003echalk-tempalte\u003c/code\u003e, contained what OXsecurity described as an almost exact, non-obfuscated copy of the leaked Shai-Hulud source code. Another package, \u003ccode\u003eaxois-utils\u003c/code\u003e, combined infostealing with DDoS capabilities, including HTTP, TCP, and UDP floods and TCP reset attacks. OXsecurity said the four packages had a combined download count of 2,678 and recommended that affected developers remove them and rotate credentials and API keys.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Shai-Hulud malware leaked last week is being used in a new npm-focused infostealer campaign. According to the article, infected packages emerged over the weekend on the Node Package Manager index. OXsecurity discovered the malicious uploads and reported that they were published by an actor using the npm account \u003ccode\u003edeadcode09284814\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe four packages identified were \u003ccode\u003echalk-tempalte\u003c/code\u003e, \u003ccode\u003e@deadcode09284814/axios-util\u003c/code\u003e, \u003ccode\u003eaxois-utils\u003c/code\u003e, and \u003ccode\u003ecolor-style-utils\u003c/code\u003e. OXsecurity said the actor used misspelled names, including typosquatting aimed at Axios users, as well as generic package names. All four packages contained routines to exfiltrate information such as credentials and configuration files.\u003c/p\u003e\n\n\u003cp\u003eThe \u003ccode\u003echalk-tempalte\u003c/code\u003e package contained a Shai-Hulud clone attributed in origin to malware linked to the TeamPCP hacker group’s recent Mini Shai-Hulud software supply-chain attack. OXsecurity said this appeared to be the first documented case of a Shai-Hulud clone deployed on npm. The company also said the package was not sophisticated because it used an unmodified copy of the leaked source code without protection or obfuscation.\u003c/p\u003e\n\n\u003cp\u003eOXsecurity cited the near-exact copy of the leaked code as evidence that the actor behind these npm packages was different from TeamPCP. The malware stole credentials, secrets, cryptocurrency wallet data, and account information, and exfiltrated data to a command-and-control server at \u003ccode\u003e87e0bbc636999b[.]lhr[.]life\u003c/code\u003e. The code also retained GitHub publishing functionality, allowing stolen credentials to be uploaded to public, auto-generated repositories.\u003c/p\u003e\n\n\u003cp\u003eThe \u003ccode\u003eaxois-utils\u003c/code\u003e package stood out because it added DDoS capabilities in addition to infostealing functionality. The article says it supported HTTP, TCP, and UDP floods, as well as TCP reset attacks, and contained internal references to a “phantom bot.” OXsecurity recommended that developers who downloaded the infected packages remove them immediately and rotate credentials and API keys on affected systems.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that leaked Shai-Hulud malware is now being used in new attacks against the Node Package Manager index. Infected npm packages appeared over the weekend after the malware source code leaked the previous week. OXsecurity, a company that secures applications from code to runtime, discovered the malicious uploads.\u003c/p\u00
