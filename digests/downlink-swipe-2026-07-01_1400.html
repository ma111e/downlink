<script type="application/json" id="dl-articles">[{"n":2,"title":"Hackers target Microsoft 365 accounts with 81 million login attempts","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/hackers-target-microsoft-365-accounts-with-81-million-login-attempts/","time":"16:38","priority":"MUST READ","score":92,"tldr":"A large password-spraying campaign hit Microsoft 365 tenants with over 81 million login attempts, compromising 78 accounts across 64 organizations. Attackers abused Azure CLI and the ROPC OAuth flow to bypass MFA where Conditional Access policies were misconfigured or incomplete.","briefOverview":"\u003cp\u003eAn aggressive password-spraying campaign targeting Microsoft 365 environments generated more than 81 million login attempts over a two-week period. Huntress observed the activity against its customers between June 12 and 26 and confirmed that 78 Microsoft accounts were compromised across 64 organizations. The attacker used still-valid username and password combinations that had been exposed in past breaches.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor attempted to authenticate through Microsoft’s Azure command-line interface and then used the ROPC OAuth mechanism when a valid username and password pair was found. Huntress said many impacted organizations had multi-factor authentication configured through Conditional Access policies, but those policies did not cover the specific flow the attackers used. ROPC sends the password directly to the token endpoint and does not provide an interactive MFA prompt.\u003c/p\u003e\n\n\u003cp\u003eHuntress highlighted several policy weaknesses, including MFA applied only to specific applications, enforced only for selected user groups, required only from untrusted locations, or left in report-only mode. In some impacted cases, there was no MFA policy at all. Huntress also reported a more than 155-fold increase in password-spraying attacks and said the activity originated from an IPv6 range owned by LSHIY LLC, which had not responded to its abuse report at the time of publication.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["An aggressive password-spraying campaign targeting Microsoft 365 environments generated more than 81 million login attempts over a two-week period.","The threat actor attempted authentication through Microsoft's Azure command-line interface using still-valid username and password combinations exposed in past breaches.","Huntress observed the campaign between June 12 and 26 and confirmed that 78 Microsoft accounts were compromised across 64 organizations.","Huntress said many affected businesses had multi-factor authentication configured through Conditional Access policies, but those policies did not cover the ROPC authentication flow used by the attackers.","Huntress reported that the activity originated from an IPv6 range owned by LSHIY LLC and said it had not received a response after reporting the findings through the company's abuse portal."],"insights":["MFA coverage can fail if Conditional Access policies are scoped only to certain apps, groups, or locations rather than applying to All Cloud Apps.","ROPC is especially risky in this campaign because it sends passwords directly to the token endpoint without an interactive MFA prompt.","Policies set to report-only mode did not protect organizations because they were not actually enforced.","Traffic appearing to come from trusted locations allowed some attackers to avoid MFA requirements when policies only required MFA from untrusted locations."],"referencedReports":[{"title":"LSHIY Password Spray Attack","url":"https://www.huntress.com/blog/lshiy-password-spray-attack","publisher":"Huntress","context":"The article cites Huntress's findings on the Microsoft 365 password-spraying campaign, including MFA Conditional Access policy gaps and the LSHIY LLC IPv6 range.","category":"research","primary":true}],"body":"\u003cp\u003eAn aggressive password-spraying campaign targeting Microsoft 365 environments generated more than 81 million login attempts over a two-week period. Huntress observed the activity against its customers between June 12 and 26 and confirmed that 78 Microsoft accounts were compromised across 64 organizations. The attacker used still-valid username and password combinations that had been exposed in past breaches.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor attempted to authenticate through Microsoft’s Azure command-line interface and then used the ROPC OAuth mechanism when a valid username and password pair was found. Huntress said many impacted organizations had multi-factor authentication configured through Conditional Access policies, but those policies did not cover the specific flow the attackers used. ROPC sends the password directly to the token endpoint and does not provide an interactive MFA prompt.\u003c/p\u003e\n\n\u003cp\u003eHuntress highlighted several policy weaknesses, including MFA applied only to specific applications, enforced only for selected user groups, required only from untrusted locations, or left in report-only mode. In some impacted cases, there was no MFA policy at all. Huntress also reported a more than 155-fold increase in password-spraying attacks and said the activity originated from an IPv6 range owned by LSHIY LLC, which had not responded to its abuse report at the time of publication.\u003c/p\u003e\n"},{"n":6,"title":"Critical Cursor Flaws Could Let Prompt Injection Escape Sandbox and Run Commands","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/critical-cursor-flaws-could-let-prompt.html","time":"14:42","priority":"MUST READ","score":92,"tldr":"Two critical Cursor flaws dubbed DuneSlide could let a hidden prompt injection escape the editor’s sandbox and run arbitrary commands on a developer’s machine without user approval. The bugs affect all versions before Cursor 3.0, so users should update immediately.","briefOverview":"\u003cp\u003eCato AI Labs found two critical flaws in Cursor, an AI code editor, that could let a single ordinary-looking prompt escape the editor’s sandbox and run commands on a developer’s computer. The flaws are named DuneSlide and tracked as CVE-2026-50548 and CVE-2026-50549, both rated 9.8 out of 10 under CVSS 3.x. Every Cursor version before 3.0 is affected, and Cursor 3.0, released April 2, includes fixes.\u003c/p\u003e\n\n\u003cp\u003eThe attack works through prompt injection, where hidden instructions are planted in something the Cursor agent reads, such as a connected service through the Model Context Protocol or a page returned by a web search. The article says the attack needs no click or approval from the user, making it “zero-click.” Both flaws use the same basic approach: get the agent to write a file it should not be allowed to write, then use that write to turn off the sandbox.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-50548 abuses Cursor’s handling of the \u003ccode\u003eworking_directory\u003c/code\u003e parameter for terminal commands, while CVE-2026-50549 abuses a fallback in Cursor’s symlink safety check. In both cases, the attacker can target files such as the macOS Cursor sandbox helper, after which later commands run without the sandbox. The article says there is no sign the flaws have been used in real attacks, and it presents DuneSlide as part of a broader pattern of Cursor bugs where poisoned prompts led to code execution.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Cato AI Labs found two critical flaws in Cursor, named DuneSlide and tracked as CVE-2026-50548 and CVE-2026-50549, that could let an ordinary-looking prompt escape the editor’s sandbox and run commands on a developer’s computer.","Both vulnerabilities affect every Cursor version before 3.0, and Cursor patched them in version 3.0 released on April 2.","The attack can be triggered through hidden instructions in content the Cursor agent reads, such as a connected service through the Model Context Protocol or a page returned by a web search, without requiring a user click or approval.","CVE-2026-50548 abuses Cursor’s handling of the run_terminal_cmd working_directory parameter to allow writes outside the intended project area, including to the macOS sandbox helper file.","CVE-2026-50549 abuses a faulty symlink safety check that can fall back to trusting an in-project shortcut path and write through it to a target outside the project."],"insights":["The attack path is especially actionable because it does not require the victim to approve a prompt or click anything; the malicious instructions can be hidden in material the agent reads on the user’s behalf.","The sandbox meant to protect users could be disabled by a single unauthorized file write, showing that its security depended heavily on preventing writes to specific helper or startup files.","Cursor initially rejected the reports because it said its threat model did not cover misuse of MCP servers, but later reopened the reports and shipped fixes after Cato escalated.","DuneSlide follows several earlier Cursor issues where poisoned prompts led to code execution, indicating that the new sandbox in the 2.x line was a response to prior flaws but did not fully solve the problem.","There is no sign the flaws were used in real attacks, so the article presents the issue as research and coordinated patching rather than an active campaign."],"referencedReports":[{"title":"DuneSlide: Two Critical RCE Vulnerabilities","url":"https://www.catonetworks.com/blog/duneslide-two-critical-rce-vulnerabilities/","publisher":"Cato AI Labs","context":"The article says Cato AI Labs found the two Cursor flaws and named them DuneSlide, linking to its research write-up.","category":"research","primary":true},{"title":"Cursor advisory for the symlink bug","url":"https://github.com/cursor/cursor/security/advisories/GHSA-3v8f-48vw-3mjx","publisher":"Cursor","context":"The article says Cursor published its own advisory for the symlink bug.","category":"advisory","primary":false},{"title":"CVE-2026-50549 NVD record","url":"https://nvd.nist.gov/vuln/detail/CVE-2026-50549","publisher":"National Vulnerability Database","context":"The article notes that the NVD record for CVE-2026-50549 is live.","category":"advisory","primary":false}],"body":"\u003cp\u003eCato AI Labs found two critical flaws in Cursor, an AI code editor, that could let a single ordinary-looking prompt escape the editor’s sandbox and run commands on a developer’s computer. The flaws are named DuneSlide and tracked as CVE-2026-50548 and CVE-2026-50549, both rated 9.8 out of 10 under CVSS 3.x. Every Cursor version before 3.0 is affected, and Cursor 3.0, released April 2, includes fixes.\u003c/p\u003e\n\n\u003cp\u003eThe attack works through prompt injection, where hidden instructions are planted in something the Cursor agent reads, such as a connected service through the Model Context Protocol or a page returned by a web search. The article says the attack needs no click or approval from the user, making it “zero-click.” Both flaws use the same basic approach: get the agent to write a file it should not be allowed to write, then use that write to turn off the sandbox.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-50548 abuses Cursor’s handling of the \u003ccode\u003eworking_directory\u003c/code\u003e parameter for terminal commands, while CVE-2026-50549 abuses a fallback in Cursor’s symlink safety check. In both cases, the attacker can target files such as the macOS Cursor sandbox helper, after which later commands run without the sandbox. The article says there is no sign the flaws have been used in real attacks, and it presents DuneSlide as part of a broader pattern of Cursor bugs where poisoned prompts led to code execution.\u003c/p\u003e\n"},{"n":7,"title":"Adobe Patches 7 CVSS 10.0 Flaws in ColdFusion and Campaign Classic","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/adobe-patches-7-cvss-100-flaws-in.html","time":"15:25","priority":"MUST READ","score":92,"tldr":"Adobe released urgent patches for seven maximum-severity CVSS 10.0 flaws in ColdFusion and Campaign Classic that could allow arbitrary code execution. The company says no exploitation has been observed, but affected ColdFusion and on-premise Campaign Classic users should update immediately.","briefOverview":"\u003cp\u003eAdobe released patches for multiple maximum-severity security flaws affecting Adobe ColdFusion and Adobe Campaign Classic. The ColdFusion update addresses critical and important vulnerabilities that could lead to arbitrary code execution, privilege escalation, arbitrary file system read, and security feature bypass. The fixed ColdFusion issues include several CVSS 10.0 flaws involving unrestricted file upload, improper input validation, and path traversal.\u003c/p\u003e\n\n\u003cp\u003eThe ColdFusion flaws were addressed in ColdFusion 2023 Update 21 and ColdFusion 2025 Update 10. Adobe also fixed CVE-2026-48286, a CVSS 10.0 incorrect authorization flaw in Adobe Campaign Classic that could allow arbitrary code execution. The Campaign Classic issue affects ACC v7: 7.4.3 build 9396 and earlier for Windows and Linux, and it was patched in ACC v7: 7.4.3 build 9397.\u003c/p\u003e\n\n\u003cp\u003eAdobe said CVE-2026-48286 affects only on-premise Adobe Campaign instances, including fully on-premise deployments and on-premise components in hybrid deployments, while Adobe-hosted instances have already been updated. The company said it has not found any exploitation in the wild for the issues addressed in the two updates. Adobe also said it will move from monthly to twice-monthly security bulletins starting July 14, 2026, citing accelerated vulnerability discovery using AI models.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Adobe released patches for multiple maximum-severity security flaws affecting Adobe ColdFusion and Adobe Campaign Classic.","The ColdFusion vulnerabilities could lead to arbitrary code execution, privilege escalation, arbitrary file system read, and security feature bypass, and they were fixed in ColdFusion 2023 Update 21 and ColdFusion 2025 Update 10.","Adobe Campaign Classic flaw CVE-2026-48286 has a CVSS score of 10.0 and could allow arbitrary code execution on affected systems due to incorrect authorization.","CVE-2026-48286 affects on-premise Adobe Campaign instances, including fully on-premise deployments and on-premise components in hybrid deployments, while Adobe-hosted instances have already been updated.","Adobe said it has not found any in-the-wild exploits for the issues and will move to twice-monthly security bulletins starting July 14, 2026."],"insights":["Adobe’s note that Campaign Classic CVE-2026-48286 affects only on-premise and hybrid on-premise components makes deployment model the key factor in whether customers need to take action.","ColdFusion received multiple separate CVSS 10.0 fixes in one update, showing that the latest ColdFusion patches address several independent paths to arbitrary code execution rather than a single flaw.","Adobe is explicitly changing its security bulletin schedule because it says AI is shortening the time between public disclosure and active exploitation from days to hours.","Although Adobe has seen no exploitation in the wild, the combination of maximum severity ratings and arbitrary code execution outcomes makes the updates time-sensitive for affected deployments."],"referencedReports":[{"title":"Security updates available for Adobe ColdFusion | APSB26-68","url":"https://helpx.adobe.com/security/products/coldfusion/apsb26-68.html","publisher":"Adobe","context":"The article cites Adobe's ColdFusion security advisory as the source for the listed vulnerabilities and fixed versions.","category":"advisory","primary":true},{"title":"Security updates available for Adobe Campaign | APSB26-69","url":"https://helpx.adobe.com/security/products/campaign/apsb26-69.html","publisher":"Adobe","context":"The article cites Adobe's Campaign Classic security advisory as the source for the critical CVE-2026-48286 fix and affected versions.","category":"advisory","primary":true}],"body":"\u003cp\u003eAdobe released patches for multiple maximum-severity security flaws affecting Adobe ColdFusion and Adobe Campaign Classic. The ColdFusion update addresses critical and important vulnerabilities that could lead to arbitrary code execution, privilege escalation, arbitrary file system read, and security feature bypass. The fixed ColdFusion issues include several CVSS 10.0 flaws involving unrestricted file upload, improper input validation, and path traversal.\u003c/p\u003e\n\n\u003cp\u003eThe ColdFusion flaws were addressed in ColdFusion 2023 Update 21 and ColdFusion 2025 Update 10. Adobe also fixed CVE-2026-48286, a CVSS 10.0 incorrect authorization flaw in Adobe Campaign Classic that could allow arbitrary code execution. The Campaign Classic issue affects ACC v7: 7.4.3 build 9396 and earlier for Windows and Linux, and it was patched in ACC v7: 7.4.3 build 9397.\u003c/p\u003e\n\n\u003cp\u003eAdobe said CVE-2026-48286 affects only on-premise Adobe Campaign instances, including fully on-premise deployments and on-premise components in hybrid deployments, while Adobe-hosted instances have already been updated. The company said it has not found any exploitation in the wild for the issues addressed in the two updates. Adobe also said it will move from monthly to twice-monthly security bulletins starting July 14, 2026, citing accelerated vulnerability discovery using AI models.\u003c/p\u003e\n"},{"n":3,"title":"DHS confirms hackers breached HSIN info-sharing platform","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/dhs-confirms-hackers-breached-hsin-info-sharing-platform/","time":"17:32","priority":"SHOULD READ","score":88,"tldr":"DHS confirmed hackers breached an unclassified Homeland Security Information Network environment used for sensitive information sharing among government and private-sector partners. The agency says it isolated affected systems, mitigated the vulnerability, and found no indication classified networks were impacted, while the scope of any stolen data remains unclear.","briefOverview":"\u003cp\u003eThe Department of Homeland Security is investigating a cyberattack that compromised the Homeland Security Information Network, or HSIN. HSIN is a sensitive but unclassified information-sharing platform used by federal, state, local, international, and private-sector partners. The intrusion was reportedly carried out by an unknown threat actor in recent weeks and is believed to have occurred sometime between late May and early June.\u003c/p\u003e\n\n\u003cp\u003eAccording to Nextgov’s sources, the attackers targeted HSIN servers as well as a SharePoint system used for collaboration efforts. DHS said the incident involved a specific, unclassified legacy information-sharing environment and that it immediately isolated affected systems, mitigated the vulnerability, and launched a forensic investigation. The department said there is no indication that classified networks were impacted, and the system remains operational for partners.\u003c/p\u003e\n\n\u003cp\u003eIt remains unclear whether any documents were stolen, and DHS has not attributed the attack to a specific threat actor or foreign government. HSIN is used to access data, coordinate operations, manage incidents, share alerts, and exchange information about persons of interest and potential threats. The article notes concerns that the breach could have exposed security planning, interagency coordination, or response procedures as the United States oversees security for World Cup games hosted across the country.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The Department of Homeland Security is investigating a cyberattack that compromised the Homeland Security Information Network, an information-sharing platform used by federal, state, local, international, and private-sector partners.","The intrusion was reportedly carried out by an unknown threat actor in recent weeks and is believed to have occurred sometime between late May and early June.","DHS said the incident involved a specific, unclassified legacy information-sharing environment and that there is no indication classified networks were impacted.","According to Nextgov’s sources, the attackers targeted HSIN servers as well as a SharePoint system used for collaboration efforts.","It remains unclear whether any documents were stolen from the system, and DHS has not attributed the attack to any specific threat actor or foreign government."],"insights":["DHS described the affected environment as both unclassified and legacy, which narrows the incident away from classified networks while still involving a platform used to share sensitive operational information.","The article highlights that unclassified systems can still carry high real-world risk because HSIN is used for incident response, planned-event security, partner coordination, and information about persons of interest and potential threats.","The reported targeting of both HSIN servers and a SharePoint collaboration system suggests the incident was not limited to a single information repository but involved systems used for interagency collaboration.","The 2023 HSIN-Intel exposure shows this is not the first security issue involving HSIN access to sensitive information, with the earlier incident caused by a contractor coding error that set permissions too broadly."],"referencedReports":[],"body":"\u003cp\u003eThe Department of Homeland Security is investigating a cyberattack that compromised the Homeland Security Information Network, or HSIN. HSIN is a sensitive but unclassified information-sharing platform used by federal, state, local, international, and private-sector partners. The intrusion was reportedly carried out by an unknown threat actor in recent weeks and is believed to have occurred sometime between late May and early June.\u003c/p\u003e\n\n\u003cp\u003eAccording to Nextgov’s sources, the attackers targeted HSIN servers as well as a SharePoint system used for collaboration efforts. DHS said the incident involved a specific, unclassified legacy information-sharing environment and that it immediately isolated affected systems, mitigated the vulnerability, and launched a forensic investigation. The department said there is no indication that classified networks were impacted, and the system remains operational for partners.\u003c/p\u003e\n\n\u003cp\u003eIt remains unclear whether any documents were stolen, and DHS has not attributed the attack to a specific threat actor or foreign government. HSIN is used to access data, coordinate operations, manage incidents, share alerts, and exchange information about persons of interest and potential threats. The article notes concerns that the breach could have exposed security planning, interagency coordination, or response procedures as the United States oversees security for World Cup games hosted across the country.\u003c/p\u003e\n"},{"n":5,"title":"Ousaban Banking Trojan Targets Iberian Bank Users with Fake PDF Lures","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/ousaban-banking-trojan-targets-iberian.html","time":"15:26","priority":"SHOULD READ","score":84,"tldr":"The Ousaban banking trojan is targeting Windows users in Spain and Portugal with fake corrupted PDF lures that geofence victims, hide the payload in an image, and rotate command servers daily. Once installed, it monitors banking sessions to steal credentials and enable account takeover.","briefOverview":"\u003cp\u003eA Brazilian banking trojan called \u003cstrong\u003eOusaban\u003c/strong\u003e is targeting Windows users who bank in Spain and Portugal, according to Fortinet\u0026rsquo;s FortiGuard Labs, which identified the campaign in May 2026. The attack begins with a phishing PDF disguised as a corrupted file and uses checks to make sure visitors are in Spain or Portugal before delivering malware. Its goal is to steal banking logins and take over accounts.\u003c/p\u003e\n\n\u003cp\u003eOnce installed, Ousaban waits for the user to open a targeted banking site and can capture screenshots and keystrokes, tamper with the clipboard, show fake messages, and give the attacker remote control. It watches for more than two dozen banks across Spain and Portugal, including Banco Santander, BBVA, CaixaBank, Bankinter, and Caixa Geral de Depósitos. The campaign affects Windows systems and is designed to hijack live banking sessions.\u003c/p\u003e\n\n\u003cp\u003eThe delivery chain hides the payload inside an image that looks like a PDF icon but contains a ZIP file, then deletes the image, ZIP, and script after running. Ousaban adds a Windows startup registry entry named \u003cstrong\u003eFinanceiro\u003c/strong\u003e and uses a command-server setup that includes a decoy Pastebin link while the real server changes daily. Fortinet says defenders should watch for the Financeiro registry Run key and files dropped to \u003ccode\u003eC:\\\\SysMain\\_5874288\u003c/code\u003e, and notes that automated sandbox checks may only receive an access-denied page instead of the malware.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Fortinet's FortiGuard Labs identified a May 2026 Ousaban campaign targeting Windows users who bank in Spain and Portugal.","The campaign starts with a phishing PDF disguised as a corrupted file that prompts the victim to press an “Atualizar” button, which opens a malicious webpage.","The malicious page screens visitors and shows an access denied notice to users outside Spain or Portugal instead of delivering malware.","After passing the check, a script downloads an image that looks like a PDF icon but hides a ZIP file containing Ousaban, then unpacks and runs the trojan.","Once running, Ousaban waits for users to open targeted banking sites and can capture screenshots and keystrokes, tamper with the clipboard, show fake messages, and give attackers remote control."],"insights":["Automated sandbox checks may miss this campaign because server-side screening can return only a Spanish access-denied page instead of the malware.","Blocking a single command server address is unlikely to be effective because Ousaban derives a new real server address each day using the current date and a fixed secret.","A useful local detection clue is the persistence entry named “Financeiro” in the Windows registry Run key, along with files dropped to C:\\\\SysMain\\_5874288.","The Pastebin-linked command server address embedded in Ousaban is a decoy, so defenders should not treat it as the malware’s actual control endpoint.","The campaign combines older Brazilian banking-trojan behavior with newer delivery protections, including country filtering, hidden payloads, and throwaway daily infrastructure."],"referencedReports":[{"title":"Analysis of Ongoing Ousaban Attacks Targeting the Iberian Peninsula","url":"https://www.fortinet.com/blog/threat-research/analysis-of-ongoing-ousaban-attacks-targeting-the-iberian-peninsula","publisher":"Fortinet FortiGuard Labs","context":"The article says Fortinet's FortiGuard Labs identified the May 2026 Ousaban campaign and references its report for campaign details and indicators.","category":"research","primary":true},{"title":"The Tetrade: Brazilian banking malware goes global","url":"https://securelist.com/the-tetrade-brazilian-banking-malware/97779/","publisher":"Kaspersky Securelist","context":"The article cites Kaspersky's earlier research that labeled Ousaban/Javali, Grandoreiro, Guildma, and Melcoz as part of the “Tetrade” group of Brazilian banking trojans.","category":"research","primary":false}],"body":"\u003cp\u003eA Brazilian banking trojan called \u003cstrong\u003eOusaban\u003c/strong\u003e is targeting Windows users who bank in Spain and Portugal, according to Fortinet\u0026rsquo;s FortiGuard Labs, which identified the campaign in May 2026. The attack begins with a phishing PDF disguised as a corrupted file and uses checks to make sure visitors are in Spain or Portugal before delivering malware. Its goal is to steal banking logins and take over accounts.\u003c/p\u003e\n\n\u003cp\u003eOnce installed, Ousaban waits for the user to open a targeted banking site and can capture screenshots and keystrokes, tamper with the clipboard, show fake messages, and give the attacker remote control. It watches for more than two dozen banks across Spain and Portugal, including Banco Santander, BBVA, CaixaBank, Bankinter, and Caixa Geral de Depósitos. The campaign affects Windows systems and is designed to hijack live banking sessions.\u003c/p\u003e\n\n\u003cp\u003eThe delivery chain hides the payload inside an image that looks like a PDF icon but contains a ZIP file, then deletes the image, ZIP, and script after running. Ousaban adds a Windows startup registry entry named \u003cstrong\u003eFinanceiro\u003c/strong\u003e and uses a command-server setup that includes a decoy Pastebin link while the real server changes daily. Fortinet says defenders should watch for the Financeiro registry Run key and files dropped to \u003ccode\u003eC:\\\\SysMain\\_5874288\u003c/code\u003e, and notes that automated sandbox checks may only receive an access-denied page instead of the malware.\u003c/p\u003e\n"},{"n":9,"title":"Healthcare’s Governance Needs To Speed Up To Combat Unsanctioned AI Usage","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/healthcares-governance-needs-to-speed-up-to-combat-unsanctioned-ai-usage/","time":"17:04","priority":"MAY READ","score":45,"tldr":"Healthcare organizations are facing growing risks from unsanctioned “shadow AI” use as employees adopt tools faster than governance and security controls can keep up. The key takeaway is that hospitals need faster, practical AI governance to close the gap between formal policy and real-world AI usage.","briefOverview":"\u003cp\u003eThe article says healthcare governance needs to speed up to combat unsanctioned AI usage. It states that hospitals have spent the last decade modernizing their digital infrastructure. It also says formal adoption of new tools has been difficult because of technical and regulatory hurdles and, at times, resistance from employees.\u003c/p\u003e\n\n\u003cp\u003eErrol Weiss, chief security officer at Health-ISAC, says there is a widening gap between how health sector organizations want to use AI and how the technology is actually being used inside and outside their walls. The article frames this issue around an unofficial AI ecosystem, shadow AI risks, evolving governance, closing the gap, and a shift underway. It directs readers to the full article in Electronic Health Reporter for more detail.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article argues that healthcare governance needs to speed up to address unsanctioned AI usage.","Hospitals have spent the last decade modernizing their digital infrastructure.","Formal adoption of new tools in hospitals has been difficult because of technical and regulatory hurdles and sometimes resistance from employees.","Errol Weiss of Health-ISAC says there is a widening gap between how health sector organizations want to use AI and how AI is actually being used inside and outside their walls.","The article identifies shadow AI, governance, and closing the gap as major themes."],"insights":["Digital modernization alone has not made hospitals able to formally adopt new tools quickly, because technical hurdles, regulatory hurdles, and employee resistance still slow adoption.","The article frames unsanctioned AI as an issue occurring both inside and outside healthcare organizations’ walls, making governance a broader problem than internal tool approval alone.","The article’s emphasis on “closing the gap” suggests the practical priority is aligning official AI plans with how employees and others are already using AI in reality."],"referencedReports":[],"body":"\u003cp\u003eThe article says healthcare governance needs to speed up to combat unsanctioned AI usage. It states that hospitals have spent the last decade modernizing their digital infrastructure. It also says formal adoption of new tools has been difficult because of technical and regulatory hurdles and, at times, resistance from employees.\u003c/p\u003e\n\n\u003cp\u003eErrol Weiss, chief security officer at Health-ISAC, says there is a widening gap between how health sector organizations want to use AI and how the technology is actually being used inside and outside their walls. The article frames this issue around an unofficial AI ecosystem, shadow AI risks, evolving governance, closing the gap, and a shift underway. It directs readers to the full article in Electronic Health Reporter for more detail.\u003c/p\u003e\n"},{"n":1,"title":"Webinar: Why traditional email security is no longer enough","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/webinar-why-traditional-email-security-is-no-longer-enough/","time":"16:54","priority":"MAY READ","score":35,"tldr":"BleepingComputer is hosting a July 8 webinar on how modern phishing, BEC, and account takeover attacks bypass traditional email security by abusing trusted identities and workflows. The session will focus on using behavioral AI to automate detection, investigation, and remediation.","briefOverview":"\u003cp\u003eBleepingComputer will host a live webinar on July 8, 2026 at 2 PM ET titled \u0026ldquo;Stop chasing alerts: Automating email security with behavioral AI.\u0026rdquo; The webinar will be presented by Dan Nickolaisen, Solutions Architect Manager at Abnormal AI, and Eric Danneker, Director of Cyber Vigilance and Defense at Novant Health. It will examine how modern phishing, business email compromise, and account takeover attacks bypass traditional email defenses.\u003c/p\u003e\n\n\u003cp\u003eThe article says organizations have long relied on secure email gateways, reputation services, and signature-based detection, but today’s threats increasingly exploit trusted identities and legitimate business workflows. Many attacks do not rely on malicious attachments, known malware, or suspicious domains, and instead impersonate trusted colleagues, vendors, and business partners. The webinar will also cover why techniques such as Device Code phishing can circumvent traditional detection methods.\u003c/p\u003e\n\n\u003cp\u003eThe article describes how these attacks create lengthy investigations for security teams trying to determine whether an email is malicious, whether an account has been compromised, and what containment actions are needed. Abnormal AI applies behavioral AI to analyze communication patterns and account activity, helping organizations identify suspicious behavior, reduce manual investigations, and accelerate response workflows. Attendees are expected to learn practical approaches for identifying sophisticated email threats that traditional controls may overlook while improving email security operations through automation.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["BleepingComputer will host a live webinar on July 8, 2026 at 2 PM ET titled \"Stop chasing alerts: Automating email security with behavioral AI.\"","The webinar will be presented by Dan Nickolaisen of Abnormal AI and Eric Danneker of Novant Health.","The webinar will examine how modern phishing, business email compromise, and account takeover attacks bypass traditional email defenses.","The article says many current email attacks impersonate trusted colleagues, vendors, and business partners instead of relying on malicious attachments, known malware, or suspicious domains.","The webinar will cover how behavioral AI can automate detection, investigation, and remediation workflows for email security teams."],"insights":["Email defenses that focus on malicious attachments, known malware, suspicious domains, reputations, or signatures may miss attacks that look like normal business communication.","The article highlights Device Code phishing as a technique that can circumvent traditional detection methods by abusing legitimate authentication workflows.","A major operational burden described in the article is not just detecting a suspicious email, but determining whether an account was compromised and what containment steps are needed.","Behavioral AI is presented as useful because it analyzes communication patterns and account activity rather than relying only on whether an email contains obviously malicious technical indicators."],"referencedReports":[],"body":"\u003cp\u003eBleepingComputer will host a live webinar on July 8, 2026 at 2 PM ET titled \u0026ldquo;Stop chasing alerts: Automating email security with behavioral AI.\u0026rdquo; The webinar will be presented by Dan Nickolaisen, Solutions Architect Manager at Abnormal AI, and Eric Danneker, Director of Cyber Vigilance and Defense at Novant Health. It will examine how modern phishing, business email compromise, and account takeover attacks bypass traditional email defenses.\u003c/p\u003e\n\n\u003cp\u003eThe article says organizations have long relied on secure email gateways, reputation services, and signature-based detection, but today’s threats increasingly exploit trusted identities and legitimate business workflows. Many attacks do not rely on malicious attachments, known malware, or suspicious domains, and instead impersonate trusted colleagues, vendors, and business partners. The webinar will also cover why techniques such as Device Code phishing can circumvent traditional detection methods.\u003c/p\u003e\n\n\u003cp\u003eThe article describes how these attacks create lengthy investigations for security teams trying to determine whether an email is malicious, whether an account has been compromised, and what containment actions are needed. Abnormal AI applies behavioral AI to analyze communication patterns and account activity, helping organizations identify suspicious behavior, reduce manual investigations, and accelerate response workflows. Attendees are expected to learn practical approaches for identifying sophisticated email threats that traditional controls may overlook while improving email security operations through automation.\u003c/p\u003e\n"},{"n":8,"title":"What Is Agentic Runtime Security?","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/what-is-agentic-runtime-security","time":"17:39","priority":"MAY READ","score":35,"tldr":"Mitiga argues that traditional EDR is no longer enough because modern attacks move through cloud, SaaS, identity, AI agents, and third-party services where endpoint tools have little visibility. Its Agentic Runtime Security offering is positioned as log-based runtime detection and response for stopping active attacks across that broader infrastructure before business impact.","briefOverview":"\u003cp\u003eMitiga introduced Agentic Runtime Security for modern infrastructure, describing it as runtime detection and response across cloud, SaaS, identity, AI, and third-party services. The article argues that EDR protects endpoints and workloads, while Mitiga’s approach protects the areas where endpoint tools cannot see. It says the modern business environment now depends on services, cloud platforms, SaaS applications, identity providers, AI, and third-party connections rather than only devices and servers.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that attackers are moving faster than many defenses can respond, citing a 22-second median handoff time for initial access in 2025 and a 29-minute average eCrime breakout time. It contrasts those figures with a median dwell time of 14 days and an average breach identification and containment time of 241 days. Mitiga argues that this gap cannot be closed by watching endpoints harder because attacks now cross cloud, SaaS, identity, AI, and third-party services.\u003c/p\u003e\n\n\u003cp\u003eTechnically, Agentic Runtime Security is presented as log-based rather than agent-based, using the audit trails emitted by each platform where there is no workload to instrument. Mitiga says its Cloud Security Data Lake provides long-horizon, forensic-grade context across cloud, SaaS, identity, AI, and third-party services to reconstruct and stop attacks while they are happening. The article also highlights coverage for shadow SaaS, AI-era SaaS risks such as meeting transcription tools, and non-human identities including chatbots, copilots, autonomous agents, OAuth apps, and API tokens.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Mitiga describes Agentic Runtime Security as runtime detection and response across cloud, SaaS, identity, AI, and third-party services that anticipates, detects, interrupts, and stops active attacks before they reach the business.","The article argues that EDR protects endpoints and workloads, while Agentic Runtime Security uses platform audit logs to protect areas where endpoint agents cannot operate.","Mitiga says modern attackers move quickly across cloud, SaaS, identity, AI, and third-party services, citing figures such as a 22-second median handoff time for initial access in 2025 and a 29-minute average eCrime breakout time.","The article states that Mitiga’s approach depends on a forensic-grade, long-horizon data layer because cloud and service environments do not provide disk images or memory dumps like endpoints do.","Mitiga positions its Helios AIDR model around three pillars: Defend with AI, Defend from AI, and Defend the AI, all built on an AI-native foundation."],"insights":["The article highlights a major timing mismatch: attackers may move or hand off access in seconds, while defenders still often identify and contain breaches over days or months.","Mitiga argues that many organizations can believe they have adequate visibility through posture tools, prevention controls, compliance dashboards, and SIEM logs, yet still lack the cross-domain awareness needed to catch active misuse in real time.","The article treats unsanctioned AI-enabled SaaS differently from older shadow SaaS because a single meeting transcription tool can expose conversations from many people who never installed or approved the tool.","The article emphasizes that non-human identities such as chatbots, copilots, OAuth apps, and API tokens are now important security subjects because they can act with their own credentials and permissions inside business systems.","Mitiga’s examples suggest that endpoint-based tools may miss unauthorized SaaS activity because that activity can be driven by identity and cloud services rather than by signals on a user’s device."],"referencedReports":[],"body":"\u003cp\u003eMitiga introduced Agentic Runtime Security for modern infrastructure, describing it as runtime detection and response across cloud, SaaS, identity, AI, and third-party services. The article argues that EDR protects endpoints and workloads, while Mitiga’s approach protects the areas where endpoint tools cannot see. It says the modern business environment now depends on services, cloud platforms, SaaS applications, identity providers, AI, and third-party connections rather than only devices and servers.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that attackers are moving faster than many defenses can respond, citing a 22-second median handoff time for initial access in 2025 and a 29-minute average eCrime breakout time. It contrasts those figures with a median dwell time of 14 days and an average breach identification and containment time of 241 days. Mitiga argues that this gap cannot be closed by watching endpoints harder because attacks now cross cloud, SaaS, identity, AI, and third-party services.\u003c/p\u003e\n\n\u003cp\u003eTechnically, Agentic Runtime Security is presented as log-based rather than agent-based, using the audit trails emitted by each platform where there is no workload to instrument. Mitiga says its Cloud Security Data Lake provides long-horizon, forensic-grade context across cloud, SaaS, identity, AI, and third-party services to reconstruct and stop attacks while they are happening. The article also highlights coverage for shadow SaaS, AI-era SaaS risks such as meeting transcription tools, and non-human identities including chatbots, copilots, autonomous agents, OAuth apps, and API tokens.\u003c/p\u003e\n"},{"n":4,"title":"Turning Indicators into Intelligence in OpenCTI with Criminal IP","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/turning-indicators-into-intelligence-in-opencti-with-criminal-ip/","time":"14:01","priority":"MAY READ","score":25,"tldr":"Criminal IP’s OpenCTI integration enriches IPs, domains, and URLs with reputation scores, infrastructure context, vulnerability data, behavioral signals, and phishing analysis. The goal is to turn isolated indicators into connected intelligence inside OpenCTI for faster triage, investigation, and prioritization.","briefOverview":"\u003cp\u003eThe article describes the Criminal IP integration with OpenCTI, which enriches IP addresses, domains, and URLs with additional threat intelligence. It adds reputation scoring, infrastructure intelligence, vulnerability data, behavioral signals, and phishing analysis to indicators that are ingested into OpenCTI. The enriched information is structured as OpenCTI entities and relationships so analysts can investigate connected infrastructure, correlate indicators, and prioritize high-risk items.\u003c/p\u003e\n\n\u003cp\u003eA key feature is Criminal IP’s dual-perspective risk scoring for IP addresses, which reflects both how an IP is targeted and how it behaves externally. The integration also creates graph relationships involving CVEs, Autonomous Systems, geolocation, observed services, and resolved IP infrastructure. For domains, Criminal IP performs URL analysis to detect phishing activity, credential harvesting, suspicious files, and impersonation techniques, with confidence scores tied to phishing probability.\u003c/p\u003e\n\n\u003cp\u003eThe article presents the integration as useful for SOC triage, alert validation, threat hunting, infrastructure pivoting, and phishing campaign analysis. Analysts can use the enriched relationships to uncover related infrastructure, identify potential attack surfaces, and understand hosting or regional patterns across indicators. The article is sponsored and written by Criminal IP.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The Criminal IP integration with OpenCTI enriches IP addresses, domains, and URLs with reputation scoring, infrastructure intelligence, vulnerability data, behavioral signals, and phishing analysis.","Criminal IP provides dual-perspective risk scoring for IP addresses, reflecting both inbound targeting and outbound behavior.","The integration structures enriched data as OpenCTI entities and relationships, including CVEs, Autonomous Systems, geolocation, and resolved IP infrastructure.","For domains, Criminal IP performs full URL analysis to detect phishing activity, credential harvesting, suspicious files, and impersonation techniques.","The article identifies SOC triage, threat hunting, infrastructure pivoting, and phishing campaign analysis as key use cases for the integration."],"insights":["Analysts can prioritize IP addresses more precisely because Criminal IP separates inbound risk from outbound behavior instead of relying on a single reputation score.","The integration makes infrastructure pivoting more practical by connecting indicators to CVEs, Autonomous Systems, geolocation, and resolved IP infrastructure inside the OpenCTI graph.","Phishing investigations can be quantified because domain confidence scores are tied directly to phishing probability.","The connector can help distinguish merely suspicious infrastructure from potentially exploitable infrastructure by correlating observed services with known CVEs."],"referencedReports":[],"body":"\u003cp\u003eThe article describes the Criminal IP integration with OpenCTI, which enriches IP addresses, domains, and URLs with additional threat intelligence. It adds reputation scoring, infrastructure intelligence, vulnerability data, behavioral signals, and phishing analysis to indicators that are ingested into OpenCTI. The enriched information is structured as OpenCTI entities and relationships so analysts can investigate connected infrastructure, correlate indicators, and prioritize high-risk items.\u003c/p\u003e\n\n\u003cp\u003eA key feature is Criminal IP’s dual-perspective risk scoring for IP addresses, which reflects both how an IP is targeted and how it behaves externally. The integration also creates graph relationships involving CVEs, Autonomous Systems, geolocation, observed services, and resolved IP infrastructure. For domains, Criminal IP performs URL analysis to detect phishing activity, credential harvesting, suspicious files, and impersonation techniques, with confidence scores tied to phishing probability.\u003c/p\u003e\n\n\u003cp\u003eThe article presents the integration as useful for SOC triage, alert validation, threat hunting, infrastructure pivoting, and phishing campaign analysis. Analysts can use the enriched relationships to uncover related infrastructure, identify potential attack surfaces, and understand hosting or regional patterns across indicators. The article is sponsored and written by Criminal IP.\u003c/p\u003e\n"}]</script>
