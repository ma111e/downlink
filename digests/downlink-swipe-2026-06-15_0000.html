ut clarifying operational impact. The proposed remedy is to translate technical exposure into production, safety, and quality consequences through continuous assessment, passive monitoring, and clearer communication.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article presents OT cyber security as a prioritisation problem caused by invisible risk. A vulnerable device in an industrial network can look harmless because production continues, PLCs still run, and nothing visibly fails. By contrast, a broken machine draws immediate attention because its impact is obvious and disruptive.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasises that this invisibility does not mean operational leaders are indifferent to cyber security. It says they must balance cyber risk against production schedules and the possibility that an attempted fix could create a bigger problem. Examples include obsolete PLCs, devices that are difficult to touch safely, and uncertainty about the operational effects of intervention.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that the common cyber security response of adding more information can worsen the problem in OT environments. More dashboards, alerts, and lengthy technical reports do not necessarily help operational teams act. A list of CVEs ranked by technical severity may not tell a plant manager what matters during live production or ahead of a maintenance window.\u003c/p\u003e\n\n\u003cp\u003eInstead, the article says OT teams need clearer information that connects vulnerabilities to specific operational consequences. Relevant questions include whether a vulnerability could affect production, compromise safety, or create a quality issue. The article describes the most useful work in OT cyber security as translation from technical exposure into operational impact.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies continuous assessment, passive monitoring, and operationally meaningful reporting as key parts of this approach. Passive monitoring is described as a way to build a live picture of the network without touching operational devices. It frames Radiflow’s approach as providing a clearer view of what matters, why it matters, and what can sensibly be done next.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article discusses why cyber risk in operational technology environments is difficult to prioritise. Its central point is that OT vulnerabilities can remain invisible because affected devices may continue working normally. A vulnerable device can sit inside an industrial network while the screen still works, the PLC still runs, and products continue leaving the factory.\u003c/p\u003e\n\n\u003cp\u003eThis invisibility makes OT cyber security compete with problems that are easier to see and therefore easier to prioritise. When a machine stops working, people immediately respond because the problem is physically and operationally obvious. Cyber risk, by contrast, can remain quiet for months unless someone has examined the right data carefully.\u003c/p\u003e\n\n\u003ch2 id=\"why-ot-cyber-risk-is-hard-to-prioritise\"\u003eWhy OT Cyber Risk Is Hard to Prioritise\u003c/h2\u003e\n\n\u003cp\u003eThe article says visible problems get attention because they demand attention. A machine stoppage triggers phone calls, meetings, and engineer involvement because the impact is immediate. A vulnerability does not create the same urgency if the plant continues operating.\u003c/p\u003e\n\n\u003cp\u003eThe article stresses that this is not because operational leaders do not care about cyber security. It says experienced operational leaders often care deeply, but they must balance many competing risks. These include security, production schedules, the need to fix issues, and the possibility that fixing something badly could create a bigger problem.\u003c/p\u003e\n\n\u003cp\u003eThe article gives examples of difficult OT realities, including a 20-year-old obsolete PLC and devices that nobody wants to touch because the consequences are uncertain. In such environments, intervening in an invisible risk can introduce immediate operational problems. Taking a plant down to patch something affects everyone immediately, while leaving the vulnerability in place allows the day to continue for the moment.\u003c/p\u003e\n\n\u003ch2 id=\"critique-of-common-cyber-security-responses\"\u003eCritique of Common Cyber Security Responses\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that the instinct in cyber security is often to add more information. It lists more dashboards, more alerts, and lengthy reports full of technical findings as typical responses. In OT environments, the article says this can make the problem worse rather than better.\u003c/p\u003e\n\n\u003cp\u003eOperational teams do not simply need more information; they need clearer information. A long list of CVEs ranked by technical severity does not help a plant manager decide what to do during live production or when the maintenance window is weeks away. The article presents technical severity alone as insufficient for OT decision-making.\u003c/p\u003e\n\n\u003ch2 id=\"what-ot-teams-need-instead\"\u003eWhat OT Teams Need Instead\u003c/h2\u003e\n\n\u003cp\u003eThe article says OT teams need to understand which vulnerabilities matter in their specific environment. The relevant concern is whether a vulnerability could affect production, compromise safety, or create a quality issue. The article also says teams need to know what a sensible first step looks like.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the most useful work in OT cyber security as translation. This means connecting technical exposure to operational consequences that teams already understand. Rather than presenting cyber findings in isolation, the article argues for mapping vulnerabilities to business and operational impact.\u003c/p\u003e\n\n\u003ch2 id=\"technical-and-operational-approach-described\"\u003eTechnical and Operational Approach Described\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies continuous assessment as important for understanding how vulnerabilities map to actual operational impact. It says this should go beyond severity scores and focus on real business consequences. This includes determining how technical exposure relates to production, safety, and quality.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights passive monitoring. It describes passive monitoring as a way to build a live picture of the network without touching a single operational device. This matters in the article’s framing because some OT devices may be obsolete, fragile, or operationally risky to interfere with.\u003c/p\u003e\n\n\u003cp\u003eClear communication is another major theme. The article says findings should be presented in language that makes sense to the people who have to act on them. This means reporting should support operational decisions rather than simply deliver technical data.\u003c/p\u003e\n\n\u003ch2 id=\"radiflow-s-positioning\"\u003eRadiflow’s Positioning\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Radiflow is built around the approach of making OT cyber risk clearer and more operationally meaningful. It characterises this as not adding more noise, but providing a clearer view of what matters, why it matters, and what can sensibly be done next.\u003c/p\u003e\n\n\u003cp\u003eThe article does not describe a specific incident, threat actor, vulnerability disclosure, or patch. Its focus is a best-practice perspective on how OT cyber risk should be prioritised and communicated. The core message is that OT cyber security must translate invisible technical exposure into visible operational impact before it can compete effectively with other plant priorities.\u003c/p\u003e\n","keyPoints":["OT cyber risk is difficult to prioritise because a vulnerable device can continue operating normally without visible signs of failure.","Operational leaders must balance cyber security against production schedules and the risk that a poorly executed fix could create a bigger problem.","The article argues that more dashboards, alerts, and lengthy technical reports can make OT cyber security harder rather than easier for operational teams.","Plant managers need to know which vulnerabilities matter in their specific environment and which could affect production, safety, or quality.","The article says useful OT cyber security work translates technical exposure into operational impact through continuous assessment, passive monitoring, and clear language."],"insights":["In OT environments, leaving a vulnerability unpatched can appear operationally safer in the short term than taking a plant down to fix it, because the impact of downtime is immediate while the cyber risk remains invisible.","Technical severity rankings alone are insufficient for OT prioritisation because they do not tell plant managers whether a vulnerability could affect production, safety, or product quality in their environment.","Passive monitoring is presented as a practical way to improve OT visibility because it can build a live picture of the network without interacting with operational devices.","Effective OT cyber security depends on translating technical exposure into operational consequences that align with how operational teams already make risk decisions."],"referencedReports":[],"body":"\u003cp\u003eThe article argues that OT cyber risk is difficult to prioritise because vulnerabilities can remain invisible while industrial systems continue to function normally. A device may be vulnerable even though screens, PLCs, and production lines appear unaffected. This makes cyber security compete with more visible operational problems that demand immediate attention.\u003c/p\u003e\n\n\u003cp\u003eThe article says operational leaders often care about cyber security but must balance it against production schedules, maintenance windows, and the risk of disrupting fragile or obsolete systems. It criticises approaches that add more dashboards, alerts, and technical CVE lists without clarifying operational impact. The proposed remedy is to translate technical exposure into production, safety, and quality consequences through continuous assessment, passive monitoring, and clearer communication.\u003c/p\u003e\n"},{"n":24,"title":"The Onboarding Password Mistake That Creates Unnecessary Risk","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/the-onboarding-password-mistake-that.html","time":"11:30","priority":"MAY READ","score":45,"tldr":"The article warns that sharing temporary onboarding passwords by email, SMS, or phone creates avoidable risk because those credentials can be intercepted, mishandled, or left unchanged. It promotes letting new employees securely create their own first-day passwords to reduce exposure and simplify onboarding.","briefOverview":"\u003cp\u003eThe article argues that employee onboarding creates avoidable password risk when IT teams distribute temporary “first-day” credentials by email, SMS, or phone. These credentials can be intercepted, forwarded, accessed on unsecured devices, or mishandled when passed through managers or third parties. The central concern is that passwords meant to be temporary may never be changed and can become a long-term weakness.\u003c/p\u003e\n\n\u003cp\u003eThe article presents Specops First Day Password, available as part of Specops uReset, as a way to avoid distributing temporary credentials altogether. New employees instead receive an enrollment link or use a reset option on a domain-joined device, verify their identity with a personal email address or mobile number, and create a password that meets organizational policy. The article supports its argument with examples involving Cyber Av3ngers exploiting Unitronics PLCs using the default credential “1111” and researchers accessing McDonald’s McHire platform through a weak legacy administrator account reportedly using “123456.”\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article focuses on the risk created during employee onboarding when organizations give new starters temporary first-day passwords. IT teams often need to provide devices, accounts, access permissions, and credentials quickly, which leads many organizations to send temporary passwords through email or SMS. The article states that these passwords may be reused, intercepted, forwarded, accessed on unsecured devices, or never changed.\u003c/p\u003e\n\n\u003cp\u003eIt explains that verbal password sharing can reduce the risk of digital interception but creates operational and security problems of its own. IT teams and new employees must coordinate schedules, and credentials may be relayed by managers or third parties. The article emphasizes that the more people involved in handling a password, the greater the chance of mishandling or disclosure.\u003c/p\u003e\n\n\u003cp\u003eAs an alternative, the article promotes Specops First Day Password, available as part of Specops uReset. Instead of receiving a temporary password by email, SMS, or phone, users can set their own password through a secure enrollment process. The process uses an enrollment link sent to a personal email address or text message, or a “reset my password” option on a domain-joined device, followed by identity verification using a personal email address or mobile number.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights that temporary credentials can become dangerous when they remain active after onboarding. It says first-day passwords are often simpler, more predictable, or generated in bulk to speed up onboarding. If onboarding workflows do not enforce a reset or users delay changing the password, those credentials can become a low-effort route into corporate systems.\u003c/p\u003e\n\n\u003cp\u003eTwo examples are used to illustrate the broader risk of unchanged default or temporary credentials. In November 2023, the Iranian-linked Cyber Av3ngers group exploited Unitronics PLCs protected by the default credential “1111” at the Municipal Water Authority of Aliquippa in Pennsylvania, prompting CISA to alert other facilities. In 2025, researchers found that McDonald’s McHire platform, operated by Paradox.ai, could be accessed through a weak legacy administrator account reportedly using “123456” as both the username and password; Paradox.ai responded after responsible disclosure by resolving the vulnerability and updating its security policies.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that the way many organizations handle first-day passwords during employee onboarding creates unnecessary security risk. During onboarding, IT teams must quickly provide new employees with devices, accounts, access permissions, and passwords. To keep the process moving, organizations often share temporary credentials that are intended to be changed after first login.\u003c/p\u003e\n\n\u003cp\u003eThe article’s main point is that these temporary credentials often do not remain temporary. They may be sent over email or SMS, reused across accounts, or left unchanged. According to the article, this can give attackers an easy route into corporate systems.\u003c/p\u003e\n\n\u003ch2 id=\"risk-in-common-onboarding-practices\"\u003eRisk in common onboarding practices\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies plain-text delivery by email or SMS as the most common way organizations share initial credentials with new employees. This approach is described as quick and convenient, especially during busy onboarding periods. However, it creates an exposure point if messages are intercepted, forwarded, or accessed on an unsecured device.\u003c/p\u003e\n\n\u003cp\u003eThe article also discusses verbal password sharing, either in person or over the phone. This can reduce the risk of digital interception, but it introduces operational problems. IT teams and new starters must coordinate schedules, and the process can break down when managers or third parties are asked to relay credentials on IT’s behalf.\u003c/p\u003e\n\n\u003cp\u003eThe article states that involving more people in password handling increases the chance that a password will be mishandled or disclosed. It concludes that neither email/SMS nor verbal sharing is a secure or scalable way to manage onboarding credentials.\u003c/p\u003e\n\n\u003ch2 id=\"proposed-alternative-specops-first-day-password\"\u003eProposed alternative: Specops First Day Password\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Specops First Day Password, available as part of Specops uReset, as a more secure approach to onboarding passwords. The stated goal is to remove the need to distribute first-day passwords altogether. Instead of receiving a temporary credential over email, SMS, or phone, new employees create their own password through a secure enrollment process.\u003c/p\u003e\n\n\u003cp\u003eThe described process includes several possible starting points:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn enrollment link sent to a personal email address.\u003c/li\u003e\n\u003cli\u003eAn enrollment link sent by text message.\u003c/li\u003e\n\u003cli\u003eA “reset my password” option on a domain-joined device.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAfter beginning enrollment, the user verifies their identity using a personal email address or mobile number. They then create a password that meets the organization’s policy requirements from the outset. The article says this reduces the risk of intercepted or mishandled onboarding credentials while making the process easier for both IT teams and new starters.\u003c/p\u003e\n\n\u003ch2 id=\"temporary-passwords-becoming-permanent\"\u003eTemporary passwords becoming permanent\u003c/h2\u003e\n\n\u003cp\u003eA central concern in the article is that onboarding credentials are usually designed to be temporary, but may remain active. Employees may miss or delay the step of changing their password after first login. Onboarding workflows may also fail to enforce a reset, or temporary credentials may remain active without anyone noticing.\u003c/p\u003e\n\n\u003cp\u003eThe article states that first-day passwords are rarely designed with long-term security in mind. They may be simpler, more predictable, or generated in bulk to speed up onboarding. If those credentials stay active, the article says they become an easy target for attackers looking for low-effort access to corporate systems.\u003c/p\u003e\n\n\u003ch2 id=\"example-municipal-water-authority-of-aliquippa\"\u003eExample: Municipal Water Authority of Aliquippa\u003c/h2\u003e\n\n\u003cp\u003eThe article cites a November 2023 incident involving the Municipal Water Authority of Aliquippa in Pennsylvania, USA. The Iranian-linked hacktivist group Cyber Av3ngers targeted the authority and exploited programmable logic controllers protected by the default credential “1111.” This allowed the hackers to gain control of a remote booster station serving two townships.\u003c/p\u003e\n\n\u003cp\u003eThe article says there was no risk to the water supply. However, it notes that the severity of the risk was highlighted by CISA alerting other facilities to update default credentials in similar systems and disconnect PLCs from the open internet.\u003c/p\u003e\n\n\u003cp\u003eThe article uses this incident as an example of how setup credentials can become a long-term security weakness. A password intended for initial deployment or testing remained active on production systems, giving attackers a direct path into operational technology environments.\u003c/p\u003e\n\n\u003ch2 id=\"example-mcdonald-s-mchire-platform\"\u003eExample: McDonald’s McHire platform\u003c/h2\u003e\n\n\u003cp\u003eThe article also cites a 2025 discovery involving McDonald’s AI-powered hiring platform, McHire. Researchers found that the platform could be accessed through a weak legacy administrator account reportedly using “123456” as both the username and password. The platform was operated by Paradox.ai and handled large volumes of applicant information as part of recruitment and onboarding.\u003c/p\u003e\n\n\u003cp\u003eUsing the default credentials, the researchers accessed a test “restaurant” environment within the McHire platform. From there, they could view chat interactions linked to more than 64 million job applications. The article says Paradox.ai responded quickly after responsible disclosure, resolved the vulnerability, and updated its security policies.\u003c/p\u003e\n\n\u003cp\u003eThe article uses the McHire case to show how forgotten default or test credentials can create serious exposure when they remain connected to live systems.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that passwords remain important in onboarding and access management even as passkeys and passwordless authentication gain popularity. Because passwords continue to play a central role, organizations need secure ways to manage credentials across the user lifecycle, including the very first password a user receives.\u003c/p\u003e\n\n\u003cp\u003eThe key message is that sharing temporary credentials or failing to reset default passwords creates avoidable risk. The article recommends allowing users to securely create their own passwords from day one as a way to improve security while keeping onboarding manageable for IT teams.\u003c/p\u003e\n","keyPoints":["Organizations often send temporary first-day passwords to new employees by email, SMS, or phone, which can expose credentials if messages are intercepted, forwarded, accessed on unsecured devices, or relayed by third parties.","The article says temporary onboarding passwords can become long-term weaknesses when users do not change them, workflows fail to enforce resets, or the credentials remain active unnoticed.","Specops First Day Password, available as part of Specops uReset, lets new employees set their own password through a secure enrollment process instead of receiving a temporary credential.","In November 2023, Cyber Av3ngers exploited Unitronics PLCs using the default credential “1111” at the Municipal Water Authority of Aliquippa in Pennsylvania.","In 2025, researchers found that McDonald’s McHire platform could be accessed through a weak legacy administrator account reportedly using “123456” as both the username and password."],"insights":["Verbal password sharing reduces digital interception risk but can still increase exposure when managers or third parties relay credentials on IT’s behalf.","The article frames the main onboarding risk as the need to distribute a temporary password at all, rather than only the channel used to send it.","First-day passwords are especially risky if left active because they are often simpler, more predictable, or generated in bulk to speed onboarding.","The Aliquippa and McHire examples show that setup, test, or default credentials can remain connected to production or live environments long after their intended short-term use."],"referencedReports":[{"title":"Water Utility Control System Cyber Incident Advisory: ICS/SCADA Incident, Municipal Water Authority of Aliquippa","url":"https://www.waterisac.org/tlpclear-water-utility-control-system-cyber-incident-advisory-icsscada-incident-municipal","publisher":"WaterISAC","context":"The article cites this advisory as the source for the Aliquippa water authority incident involving Unitronics PLCs protected by the default credential “1111.”","category":"","primary":false},{"title":"Exploitation of Unitronics PLCs used in Water and Wastewater Systems","url":"https://www.cisa.gov/news-events/alerts/2023/11/28/exploitation-unitronics-plcs-used-water-and-wastewater-systems","publisher":"CISA","context":"The article references this CISA alert as warning other facilities to update default credentials and disconnect PLCs from the open internet after the Aliquippa incident.","category":"","primary":false},{"title":"McHire exposed 64 million applicants","url":"https://ian.sh/mcdonalds","publisher":"Ian Carroll","context":"The article cites this researcher write-up for the discovery that McDonald’s McHire platform could be accessed through a weak legacy administrator account.","category":"","primary":false}],"body":"\u003cp\u003eThe article argues that employee onboarding creates avoidable password risk when IT teams distribute temporary “first-day” credentials by email, SMS, or phone. These credentials can be intercepted, forwarded, accessed on unsecured devices, or mishandled when passed through managers or third parties. The central concern is that passwords meant to be temporary may never be changed and can become a long-term weakness.\u003c/p\u003e\n\n\u003cp\u003eThe article presents Specops First Day Password, available as part of Specops uReset, as a way to avoid distributing temporary credentials altogether. New employees instead receive an enrollment link or use a reset option on a domain-joined device, verify their identity with a personal email address or mobile number, and create a password that meets organizational policy. The article supports its argument with examples involving Cyber Av3ngers exploiting Unitronics PLCs using the default credential “1111” and researchers accessing McDonald’s McHire platform through a weak legacy administrator account reportedly using “123456.”\u003c/p\u003e\n"},{"n":20,"title":"15th June – Threat Intelligence Report","source":"research.checkpoint.com","sourceColorIdx":4,"link":"https://research.checkpoint.com/2026/15th-june-threat-intelligence-report/","time":"13:40","priority":"MAY READ","score":40,"tldr":"Check Point’s 15 June threat intelligence report highlights a busy week of major breaches, active zero-day exploitation, AI-related security risks, and critical patches, including ShinyHunters’ Oracle PeopleSoft attacks, a Check Point VPN authentication bypass tied to Qilin ransomware, and Microsoft’s record Patch Tuesday. Organizations should prioritize patching exposed enterprise systems and reviewing AI, supply-chain, and remote-access risks.","briefOverview":"\u003cp\u003eCheck Point Research’s 15 June Threat Intelligence Report summarizes major cyber incidents, AI-related threats, vulnerabilities, patches, and recent threat intelligence findings. The report highlights breaches at the University of Nottingham and Novo Nordisk, an operational disruption at Mackay Sugar, and active exploitation affecting Check Point Remote Access VPN and Mobile Access deployments. It also notes Microsoft’s largest Patch Tuesday update to date, covering more than 200 Windows and Defender vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eA major theme is the exploitation of critical enterprise technologies and remote-access systems. ShinyHunters accessed the University of Nottingham’s student records system in an incident affecting about 454,600 current and former students, while analysts linked related education-sector attacks to exploitation of CVE-2026-35273 in Oracle PeopleSoft. Check Point Research also identified active exploitation of CVE-2026-50751, an authentication bypass affecting Check Point Remote Access VPN and Mobile Access deployments using the deprecated IKEv1 key exchange protocol.\u003c/p\u003e\n\n\u003cp\u003eThe report also covers AI and software supply-chain risks. Check Point Research demonstrated flaws in LangGraph that chained SQL injection and unsafe deserialization to achieve remote code execution, while researchers warned that prompt injection against Anthropic’s Claude Code GitHub Action could expose CI/CD workflow secrets. Other findings include a compromise of Arch User Repository packages, abuse of NinjaOne remote management software in a Brazilian phishing campaign, and continued exploitation of WinRAR flaw CVE-2025-8088 by Russia-linked groups targeting Ukrainian military and government organizations.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCheck Point Research’s 15 June Threat Intelligence Report presents a weekly roundup of significant attacks, AI threats, vulnerabilities, patches, and threat intelligence findings. The top incidents include a breach at the University of Nottingham, a cyberattack against Mackay Sugar in Australia, and a data exposure at Novo Nordisk. The report also highlights active exploitation of vulnerabilities affecting Oracle PeopleSoft, Check Point Remote Access VPN and Mobile Access, Microsoft Windows and Defender, and Veeam Backup \u0026amp; Replication.\u003c/p\u003e\n\n\u003cp\u003eThe University of Nottingham breach involved ShinyHunters accessing the university’s student records system. The incident affected about 454,600 current and former students and exposed contact details, passport numbers, enrollment information, and fee payment records that later appeared online. Analysts described the breach as part of a wider ShinyHunters campaign targeting more than 100 organizations through CVE-2026-35273, a critical Oracle PeopleSoft zero-day vulnerability allowing remote code execution.\u003c/p\u003e\n\n\u003cp\u003eSeveral other organizations reported operational or data impacts. Mackay Sugar, Australia’s second-largest sugar producer, was hit by a cyberattack that disrupted operations and shut down its Farleigh and Racecourse mills in Queensland. Novo Nordisk disclosed that attackers accessed internal IT systems and copied pseudonymized clinical trial data from research systems, including patient IDs, trial participation details, limited health data, and some healthcare professionals’ contact information.\u003c/p\u003e\n\n\u003cp\u003eAI-related risks included both vulnerabilities in AI infrastructure and misuse of AI tools. Check Point Research demonstrated exploitable LangGraph flaws by chaining SQL injection and unsafe deserialization to achieve remote code execution, with patches issued for SQLite, core, and Redis checkpointer components. Researchers also described a China-based phishing-as-a-service network called Outsider that allegedly used Gemini to generate fake websites and support SMS phishing campaigns, and warned that prompt injection against Anthropic’s Claude Code GitHub Action could leak CI/CD workflow secrets.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities and patches section focused on active exploitation and large-scale remediation. Check Point Research identified exploitation of CVE-2026-50751, a critical authentication bypass affecting Check Point Remote Access VPN and Mobile Access deployments configured to use deprecated IKEv1, with one case tied to Qilin ransomware activity. Microsoft released its largest Patch Tuesday update to date, addressing more than 200 Windows and Defender vulnerabilities, while Veeam issued security updates for a critical Backup \u0026amp; Replication flaw that could allow an authenticated domain user to execute code remotely on a domain-joined backup server.\u003c/p\u003e\n\n\u003cp\u003eThe report’s threat intelligence section described broader attack trends and specific campaigns. Check Point Research’s May 2026 attack trends report found that organizations averaged 2,055 weekly attacks, down 7% month over month, while ransomware incidents rose 48% year over year. Researchers also reported a supply-chain compromise in the Arch User Repository, a Brazilian phishing campaign abusing NinjaOne remote management software, and ongoing exploitation of WinRAR flaw CVE-2025-8088 by Russia-linked groups targeting Ukrainian military and government organizations.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCheck Point Research’s 15 June Threat Intelligence Report summarizes notable cyber incidents, AI-related threats, vulnerabilities, patches, and threat intelligence findings from the week of 15 June. The report covers breaches and disruptions affecting education, manufacturing, pharmaceuticals, software supply chains, remote access infrastructure, AI agent frameworks, and developer workflows.\u003c/p\u003e\n\n\u003cp\u003eThe article also includes several Check Point IPS protection notes for specific threats. These include Oracle PeopleSoft Enterprise PeopleTools Server-Side Request Forgery tied to CVE-2026-35273, LangChain LangGraph SQL Injection tied to CVE-2026-27022, and IKEv1 Remote Access Authentication Bypass tied to CVE-2026-50751.\u003c/p\u003e\n\n\u003ch2 id=\"top-attacks-and-breaches\"\u003eTop attacks and breaches\u003c/h2\u003e\n\n\u003ch3 id=\"university-of-nottingham-and-shinyhunters\"\u003eUniversity of Nottingham and ShinyHunters\u003c/h3\u003e\n\n\u003cp\u003eThe University of Nottingham, a UK research university, suffered a data breach after ShinyHunters accessed its student records system. The incident affected about 454,600 current and former students.\u003c/p\u003e\n\n\u003cp\u003eThe exposed data included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eContact details.\u003c/li\u003e\n\u003cli\u003ePassport numbers.\u003c/li\u003e\n\u003cli\u003eEnrollment information.\u003c/li\u003e\n\u003cli\u003eFee payment records.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the exposed records later appeared online. Analysts described the incident as part of a larger wave of attacks by ShinyHunters targeting more than 100 organizations. That wave was linked to exploitation of CVE-2026-35273, a critical zero-day vulnerability in Oracle PeopleSoft that allows remote code execution.\u003c/p\u003e\n\n\u003ch3 id=\"mackay-sugar-disruption\"\u003eMackay Sugar disruption\u003c/h3\u003e\n\n\u003cp\u003eMackay Sugar, Australia’s second-largest sugar producer, was hit by a cyberattack that disrupted operations. The attack shut down its Farleigh and Racecourse mills in Queensland.\u003c/p\u003e\n\n\u003cp\u003eThe company instructed growers to stop harvesting and suspended cane haulage. The article says temporary measures were deployed to maintain essential operations.\u003c/p\u003e\n\n\u003ch3 id=\"novo-nordisk-breach\"\u003eNovo Nordisk breach\u003c/h3\u003e\n\n\u003cp\u003eNovo Nordisk disclosed a breach after attackers accessed internal IT systems. The attackers copied pseudonymized clinical trial data from research systems.\u003c/p\u003e\n\n\u003cp\u003eThe exposed information included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePatient IDs.\u003c/li\u003e\n\u003cli\u003eTrial participation details.\u003c/li\u003e\n\u003cli\u003eLimited health data.\u003c/li\u003e\n\u003cli\u003eSome healthcare professionals’ contact information.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"ai-threats\"\u003eAI threats\u003c/h2\u003e\n\n\u003ch3 id=\"langgraph-flaws-demonstrated-by-check-point-research\"\u003eLangGraph flaws demonstrated by Check Point Research\u003c/h3\u003e\n\n\u003cp\u003eCheck Point Research demonstrated exploitable flaws in LangGraph, an open-source framework for stateful AI agents. Researchers chained SQL injection and unsafe deserialization issues to achieve remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe article says patches were issued for affected deployments. The patched areas included SQLite, core, and Redis checkpointer components.\u003c/p\u003e\n\n\u003ch3 id=\"outsider-phishing-as-a-service-network-and-gemini\"\u003eOutsider phishing-as-a-service network and Gemini\u003c/h3\u003e\n\n\u003cp\u003eResearchers highlighted a China-based phishing-as-a-service network called Outsider. The article says the network allegedly used Gemini to generate fake websites and support SMS phishing campaigns.\u003c/p\u003e\n\n\u003cp\u003eGoogle filed a lawsuit after linking the operation to thousands of phishing sites. The article also says the operation was linked to more than 1.5 million URLs and large-scale victim targeting.\u003c/p\u003e\n\n\u003ch3 id=\"prompt-injection-against-claude-code-github-action\"\u003ePrompt injection against Claude Code GitHub Action\u003c/h3\u003e\n\n\u003cp\u003eResearchers warned that prompt-injection attacks against Anthropic’s Claude Code GitHub Action could leak CI/CD workflow secrets. The article says malicious issue or pull request text can instruct the agent to read environment variables and expose API keys.\u003c/p\u003e\n\n\u003cp\u003eThe reported impact includes workflow abuse and impersonation inside software repositories.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerabilities-and-patches\"\u003eVulnerabilities and patches\u003c/h2\u003e\n\n\u003ch3 id=\"cve-2026-50751-affecting-check-point-remote-access-vpn-and-mobile-access\"\u003eCVE-2026-50751 affecting Check Point Remote Access VPN and Mobile Access\u003c/h3\u003e\n\n\u003cp\u003eCheck Point Research identified active exploitation of CVE-2026-50751. The article describes it as a critical authentication bypass vulnerability affecting Check Point Remote Access VPN and Mobile Access deployments configured to use the deprecated IKEv1 key exchange protocol.\u003c/p\u003e\n\n\u003cp\u003eAttacks began in May and increased in early June. The article says a limited number of organizations were affected, with one case tied to Qilin ransomware activity.\u003c/p\u003e\n\n\u003ch3 id=\"microsoft-patch-tuesday\"\u003eMicrosoft Patch Tuesday\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft released its largest Patch Tuesday update to date. The update addressed more than 200 Windows and Defender vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eThe article says the release came amid an AI-driven surge in vulnerability discovery. The fixes included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-45657, a critical Windows flaw with a CVSS score of 9.8 that could enable network-based propagation.\u003c/li\u003e\n\u003cli\u003eCVE-2026-41091, which has been actively exploited to gain full system control.\u003c/li\u003e\n\u003cli\u003eCVE-2026-50507, a BitLocker bypass vulnerability.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"veeam-backup-replication\"\u003eVeeam Backup \u0026amp; Replication\u003c/h3\u003e\n\n\u003cp\u003eVeeam released security updates for a critical flaw affecting Backup \u0026amp; Replication. The vulnerability allows an authenticated domain user to execute code remotely on a domain-joined backup server.\u003c/p\u003e\n\n\u003cp\u003eThe article says this exposure affects sensitive backup infrastructure and recovery systems.\u003c/p\u003e\n\n\u003ch2 id=\"threat-intelligence-reports-and-campaign-findings\"\u003eThreat intelligence reports and campaign findings\u003c/h2\u003e\n\n\u003ch3 id=\"check-point-research-may-2026-attack-trends\"\u003eCheck Point Research May 2026 attack trends\u003c/h3\u003e\n\n\u003cp\u003eCheck Point Research’s May 2026 attack trends report found that organizations experienced an average of 2,055 weekly attacks. This was down 7% month over month.\u003c/p\u003e\n\n\u003cp\u003eThe same report found that ransomware incidents increased 48% year over year. It also highlighted continued GenAI exposure across enterprise environments, including risks linked to business-related prompts.\u003c/p\u003e\n\n\u003ch3 id=\"arch-user-repository-supply-chain-compromise\"\u003eArch User Repository supply-chain compromise\u003c/h3\u003e\n\n\u003cp\u003eResearchers detected a supply-chain compromise in the Arch User Repository. Attackers seized hundreds of packages and modified build scripts to install credential-stealing malware.\u003c/p\u003e\n\n\u003cp\u003eThe campaign deployed malicious dependencies and a Rust stealer. With administrative privileges, it also deployed an eBPF rootkit on Linux systems.\u003c/p\u003e\n\n\u003ch3 id=\"brazilian-phishing-campaign-abusing-ninjaone\"\u003eBrazilian phishing campaign abusing NinjaOne\u003c/h3\u003e\n\n\u003cp\u003eResearchers analyzed a Brazilian phishing campaign that abused the legitimate NinjaOne remote management agent. The campaign used fake Portuguese business portals and phone-based social engineering.\u003c/p\u003e\n\n\u003cp\u003eThe goal was to install a signed agent connected to attacker-controlled infrastructure on victim endpoints.\u003c/p\u003e\n\n\u003ch3 id=\"winrar-cve-2025-8088-exploitation-targeting-ukraine\"\u003eWinRAR CVE-2025-8088 exploitation targeting Ukraine\u003c/h3\u003e\n\n\u003cp\u003eResearchers described ongoing exploitation of WinRAR flaw CVE-2025-8088 by Russia-linked groups. The targeting focused on Ukrainian military and government organizations.\u003c/p\u003e\n\n\u003cp\u003eThe campaign used spear-phishing archives to plant hidden files that run at login. The deployed stealers targeted browser passwords, cookies, VPN configurations, and other credentials on affected Windows systems.\u003c/p\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall significance\u003c/h2\u003e\n\n\u003cp\u003eThe report shows multiple concurrent areas of risk: large data breaches, operational disruption, active exploitation of remote-access technologies, AI framework vulnerabilities, prompt-injection risks in developer workflows, and software supply-chain compromise. It also highlights that attackers are targeting high-value systems such as student records platforms, clinical trial research systems, backup servers, CI/CD workflows, Linux package ecosystems, and remote management tools.\u003c/p\u003e\n\n\u003cp\u003eAcross the incidents, the article identifies both known threat actors and named campaigns, including ShinyHunters, Qilin ransomware activity, the Outsider phishing-as-a-service network, and Russia-linked groups exploiting WinRAR CVE-2025-8088. The disclosed impacts include exposed personal and clinical trial data, disrupted industrial operations, remote code execution paths, leaked CI/CD secrets, credential theft, and malware installation through compromised packages.\u003c/p\u003e\n","keyPoints":["ShinyHunters breached the University of Nottingham’s student records system, affecting about 454,600 current and former students and exposing contact details, passport numbers, enrollment information, and fee payment records.","Check Point Research identified active exploitation of CVE-2026-50751, a critical authentication bypass affecting Check Point Remote Access VPN and Mobile Access deployments using the deprecated IKEv1 key exchange protocol.","Microsoft released its largest Patch Tuesday update to date, addressing more than 200 Windows and Defender vulnerabilities, including CVE-2026-45657, CVE-2026-41091, and CVE-2026-50507.","Check Point Research demonstrated exploitable flaws in LangGraph by chaining SQL injection and unsafe deserialization issues to achieve remote code execution.","Researchers detected a supply-chain compromise in the Arch User Repository in which attackers modified hundreds of packages to install credential-stealing malware."],"insights":["Deprecated technology is a recurring risk factor, as both the Check Point VPN attacks and the University of Nottingham breach involved exploitation paths tied to older or vulnerable enterprise platforms: IKEv1 in the VPN case and Oracle PeopleSoft in the education-sector campaign.","AI-related risk in the report is not limited to model misuse, but also includes weaknesses in AI development frameworks and agent integrations, such as LangGraph flaws enabling remote code execution and prompt injection against Claude Code GitHub Action leaking CI/CD secrets.","Legitimate administrative and developer ecosystems are being abused as attack channels, including NinjaOne remote management software in a phishing campaign, Arch User Repository packages in a supply-chain compromise, and GitHub Actions workflows through prompt injection.","Several incidents directly affect recovery or trust infrastructure, including Veeam Backup \u0026 Replication exposure to remote code execution and the Arch User Repository compromise installing credential-stealing malware and an eBPF rootkit when administrative privileges are available."],"referencedReports":[{"title":"ShinyHunters Targets Education Sector via Oracle Exploit","url":"https://cloud.google.com/blog/topics/threat-intelligence/shinyhunters-targets-education-sector-oracle-exploit","publisher":"Google Cloud Threat Intelligence","context":"The article cites this analysis to say the University of Nottingham breach was part of a larger ShinyHunters campaign targeting more than 100 organizations via CVE-2026-35273 in Oracle PeopleSoft.","category":"","primary":false}],"body":"\u003cp\u003eCheck Point Research’s 15 June Threat Intelligence Report summarizes major cyber incidents, AI-related threats, vulnerabilities, patches, and recent threat intelligence findings. The report highlights breaches at the University of Nottingham and Novo Nordisk, an operational disruption at Mackay Sugar, and active exploitation affecting Check Point Remote Access VPN and Mobile Access deployments. It also notes Microsoft’s largest Patch Tuesday update to date, covering more than 200 Windows and Defender vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eA major theme is the exploitation of critical enterprise technologies and remote-access systems. ShinyHunters accessed the University of Nottingham’s student records system in an incident affecting about 454,600 current and former students, while analysts linked related education-sector attacks to exploitation of CVE-2026-35273 in Oracle PeopleSoft. Check Point Research also identified active exploitation of CVE-2026-50751, an authentication bypass affecting Check Point Remote Access VPN and Mobile Access deployments using the deprecated IKEv1 key exchange protocol.\u003c/p\u003e\n\n\u003cp\u003eThe report also covers AI and software supply-chain risks. Check Point Research demonstrated flaws in LangGraph that chained SQL injection and unsafe deserialization to achieve remote code execution, while researchers warned that prompt injection against Anthropic’s Claude Code GitHub Action could expose CI/CD workflow secrets. Other findings include a compromise of Arch User Repository packages, abuse of NinjaOne remote management software in a Brazilian phishing campaign, and continued exploitation of WinRAR flaw CVE-2025-8088 by Russia-linked groups targeting Ukrainian military and government organizations.\u003c/p\u003e\n"},{"n":28,"title":"⚡ Weekly Recap: Chrome 0-Day, UniFi Exploits, macOS Stealers, VPN Flaw and More","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/weekly-recap-chrome-0-day-unifi.html","time":"13:49","priority":"MAY READ","score":40,"tldr":"Attackers are actively exploiting fresh and neglected weaknesses across widely used platforms, including Chrome, Oracle PeopleSoft, Check Point VPN, UniFi OS, and abandoned Arch Linux AUR packages. The key takeaway is to patch urgent CVEs quickly and audit deprecated, exposed, or forgotten software before it becomes an entry point.","briefOverview":"\u003cp\u003eThis weekly recap highlights multiple active cybersecurity issues, led by Google’s patch for an actively exploited Chrome zero-day, CVE-2026-11645. The flaw is an out-of-bounds memory access issue in Chrome’s V8 JavaScript and WebAssembly engine, and Google said an exploit exists in the wild. The update addressed 74 vulnerabilities in total and marked the fifth actively exploited Chrome zero-day patched since the start of 2026.\u003c/p\u003e\n\n\u003cp\u003eOther major items include ShinyHunters exploiting an Oracle PeopleSoft zero-day, more than 1,500 compromised Arch User Repository packages, and active exploitation of a critical Check Point Remote Access VPN and Mobile Access flaw. The article also covers the takedown of the Outsider phishing-as-a-service operation, which was linked to millions of stolen credit cards and billions in estimated losses. Across the roundup, a recurring theme is that attackers are abusing exposed legacy features, abandoned software, phishing kits, fake installers, and trusted services to gain access, steal data, and deploy malware.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe recap’s main threat is Google’s emergency Chrome update for CVE-2026-11645, a high-severity out-of-bounds memory access vulnerability in V8. Google said an exploit for the bug exists in the wild but withheld further details to allow users time to update. The Chrome release fixed 74 vulnerabilities and brought the number of actively exploited Chrome zero-days patched in 2026 to five.\u003c/p\u003e\n\n\u003cp\u003eThe article also reports that ShinyHunters, also tracked as UNC6240, exploited CVE-2026-35273, a critical Oracle PeopleSoft zero-day with a CVSS score of 9.8. Google Mandiant observed exploitation between May 27 and June 9, 2026, and Rapid7 said the activity targeted PeopleSoft Environment Management Hub endpoints. The campaign mainly affected higher education, with 68% of more than 100 notified organizations being universities and colleges, and stolen data was published on the ShinyHunters data leak site.\u003c/p\u003e\n\n\u003cp\u003eA major software supply chain incident affected the Arch User Repository, where unknown actors compromised legitimate but abandoned packages. The malicious changes used preinstall scripts to download and execute an npm package called atomic-lockfile, which Sonatype said contained a bundled Linux payload tied to credential harvesting, stealth, anti-debugging, and possible data exfiltration. The number of affected packages rose from about 400 to more than 1,500, and Arch Linux developers deleted malicious commits they were aware of by June 12, 2026.\u003c/p\u003e\n\n\u003cp\u003eCheck Point warned that CVE-2026-50751 is being actively exploited against Remote Access VPN and Mobile Access deployments configured to use the deprecated IKEv1 key exchange protocol. The vulnerability is a logic flow weakness in certificate validation that can allow an unauthenticated remote attacker to establish a VPN connection without a valid user password. Check Point said exploitation was limited to a few dozen targeted organizations globally, and one post-exploitation case was linked to a Qilin ransomware affiliate.\u003c/p\u003e\n\n\u003cp\u003eThe recap also covers a broad range of campaigns and tools, including the FBI takedown of domains linked to the Outsider phishing-as-a-service kit and Google’s legal action against its operators. Microsoft reported AI-themed phishing, malvertising, and SEO-driven attacks, while Huntress described fake macOS installers delivering infostealers. Other items include UniFi OS exploitation, Cambodian government espionage involving NIGHTFORGE and Havoc Demon, cloud logging abuse scenarios, Operation TaxShadow, MagicAd on Android, Google Sheets-based RAT activity, malicious npm and PyPI packages, and an Akira ransomware incident using Easyupload.io for data exfiltration.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThis article is a weekly cybersecurity recap covering active exploitation, software supply chain compromises, phishing-as-a-service, ransomware activity, malware campaigns, and newly highlighted vulnerabilities. Its central message is that attackers continue to benefit from old code, deprecated features, abandoned packages, exposed services, and social engineering lures.\u003c/p\u003e\n\n\u003cp\u003eThe lead item is Google’s patch for CVE-2026-11645, an actively exploited Chrome zero-day in V8. The broader roundup also includes exploitation of Oracle PeopleSoft and Check Point flaws, compromised Arch Linux AUR packages, the takedown of the Outsider phishing-as-a-service operation, and multiple malware and espionage campaigns.\u003c/p\u003e\n\n\u003ch2 id=\"threat-of-the-week-chrome-zero-day-cve-2026-11645\"\u003eThreat of the Week: Chrome Zero-Day CVE-2026-11645\u003c/h2\u003e\n\n\u003cp\u003eGoogle released security updates for Chrome that addressed 74 vulnerabilities. The most notable issue is CVE-2026-11645, a high-severity vulnerability with a CVSS score of 8.8.\u003c/p\u003e\n\n\u003cp\u003eThe flaw is described as an out-of-bounds memory access issue in V8, Chrome’s JavaScript and WebAssembly engine. Google acknowledged that an exploit for CVE-2026-11645 exists in the wild, but did not provide additional details to avoid enabling further exploitation before most users apply the update.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that Google has patched five actively exploited Chrome zero-days since the start of 2026. The previous Chrome zero-days listed are CVE-2026-2441, CVE-2026-3909, CVE-2026-3910, and CVE-2026-5281.\u003c/p\u003e\n\n\u003ch2 id=\"oracle-peoplesoft-zero-day-exploited-by-shinyhunters\"\u003eOracle PeopleSoft Zero-Day Exploited by ShinyHunters\u003c/h2\u003e\n\n\u003cp\u003eThe ShinyHunters group, also known as UNC6240, exploited an unpatched Oracle PeopleSoft flaw tracked as CVE-2026-35273. The vulnerability has a CVSS score of 9.8 and relates to missing authentication for a critical function.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, exploitation could allow an unauthenticated attacker to take over PeopleSoft Enterprise PeopleTools. Google Mandiant observed exploitation between May 27 and June 9, 2026.\u003c/p\u003e\n\n\u003cp\u003eAfter compromise, attackers were observed conducting targeted internal reconnaissance using MeshCentral, lateral movement, and data exfiltration. Rapid7 said the activity targeted PeopleSoft Environment Management Hub endpoints, and data stolen during the campaign was published on the ShinyHunters Data Leak Site on June 9, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe campaign mainly targeted higher education. The article says 68% of more than 100 notified organizations were universities and colleges.\u003c/p\u003e\n\n\u003cp\u003eCISA added CVE-2026-35273 to its Known Exploited Vulnerabilities catalog. Federal Civilian Executive Branch agencies were given until June 15, 2026, to apply fixes.\u003c/p\u003e\n\n\u003ch2 id=\"arch-linux-aur-package-compromise\"\u003eArch Linux AUR Package Compromise\u003c/h2\u003e\n\n\u003cp\u003eUnknown threat actors compromised hundreds of legitimate but abandoned packages in the Arch User Repository. The attackers modified them with preinstall scripts that downloaded and executed a malicious npm package called atomic-lockfile.\u003c/p\u003e\n\n\u003cp\u003eSonatype named the campaign Atomic Arch. Its analysis found that atomic-lockfile contained a bundled Linux payload with functionality tied to credential harvesting, stealth, anti-debugging, and possible data exfiltration.\u003c/p\u003e\n\n\u003cp\u003eThe initial number of affected packages was about 400, but the article says the number later rose to more than 1,500. As of June 12, 2026, Arch Linux developers had deleted all malicious commits they were aware of.\u003c/p\u003e\n\n\u003ch2 id=\"outsider-phishing-as-a-service-takedown\"\u003eOutsider Phishing-as-a-Service Takedown\u003c/h2\u003e\n\n\u003cp\u003eThe FBI took down a number of domains linked to Outsider, a Chinese phishing-as-a-service software kit. The article says Outsider was linked to an estimated 3,870,000 stolen credit cards and estimated losses of $1.9 billion since July 2023.\u003c/p\u003e\n\n\u003cp\u003eGoogle said it is pursuing legal action against the operators. According to the article, the operators weaponized Gemini to help generate fraudulent phishing pages and deploy large SMS phishing attacks, including messages impersonating legitimate brands and referencing brokerage account issues or mobile carrier rewards.\u003c/p\u003e\n\n\u003cp\u003eGoogle’s complaint described the operation as a turn-key online software suite that enables criminals, regardless of technical skill, to publish fraudulent websites. The kit costs \u003cspan class=\"math inline\"\u003e\\(88 per week or \\)\u003c/span\u003e200 per month and provides access to more than 290 pre-built templates that mimic legitimate websites.\u003c/p\u003e\n\n\u003cp\u003eThe goal of the toolkit is to steal passwords, multi-factor authentication codes, and financial information in real time.\u003c/p\u003e\n\n\u003ch2 id=\"check-point-vpn-flaw-cve-2026-50751\"\u003eCheck Point VPN Flaw CVE-2026-50751\u003c/h2\u003e\n\n\u003cp\u003eCheck Point warned of active exploitation of CVE-2026-50751, a critical flaw with a CVSS score of 9.3. The issue affects Remote Access VPN and Mobile Access deployments configured to use the deprecated IKEv1 key exchange protocol.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is described as a logic flow weakness in certificate validation. It can allow an unauthenticated remote attacker to bypass user authentication and establish a remote access VPN connection without a valid user password.\u003c/p\u003e\n\n\u003cp\u003eCheck Point first observed signs of suspicious activity on June 4, 2026, while the earliest observed exploitation dated back to May 7, 2026. Exploitation increased starting in June and was limited to a few dozen targeted organizations globally.\u003c/p\u003e\n\n\u003cp\u003eIn one case, the post-exploitation phase was associated with a Qilin ransomware affiliate.\u003c/p\u003e\n\n\u003ch2 id=\"the-gentlemen-ransomware\"\u003eThe Gentlemen Ransomware\u003c/h2\u003e\n\n\u003cp\u003eThe article summarizes analysis of The Gentlemen ransomware operation, which has claimed 478 victims. The operation is associated with a financially motivated threat group tracked as Phantom Mantis.\u003c/p\u003e\n\n\u003cp\u003eThe group is led by a Russian-speaking cybercriminal tracked as LARVA-368, who uses the online aliases hastalamuerte, ArmCorp, zeta88, nobody0, and santamuerte. The operation has been active since March 2025.\u003c/p\u003e\n\n\u003cp\u003eThe article says The Gentlemen initially operated as an affiliate conducting double extortion attacks and used resources from ransomware-as-a-service schemes such as LockBit, Qilin, and Medusa. Microsoft tracks the cluster as Storm-2697 and said the operation began as a closed ransomware group before offering ransomware-as-a-service to affiliates in September 2025.\u003c/p\u003e\n\n\u003ch2 id=\"trending-vulnerabilities\"\u003eTrending Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article lists a large set of notable CVEs and vulnerabilities for the week. It emphasizes that the gap between patch release and exploitation is shrinking.\u003c/p\u003e\n\n\u003cp\u003eHighlighted issues include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-11645 in Google Chrome.\u003c/li\u003e\n\u003cli\u003eCVE-2026-50751 in Check Point Remote Access VPN and Mobile Access.\u003c/li\u003e\n\u003cli\u003eCVE-2026-35273 in Oracle PeopleSoft.\u003c/li\u003e\n\u003cli\u003eCVE-2026-5027 in Langflow.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44963 in Veeam Backup \u0026amp; Replication.\u003c/li\u003e\n\u003cli\u003eCVE-2026-23111 in the Linux kernel.\u003c/li\u003e\n\u003cli\u003eCVE-2026-45447 in OpenSSL.\u003c/li\u003e\n\u003cli\u003eMultiple SAP vulnerabilities affecting NetWeaver AS ABAP, ABAP Platform, SAP Commerce Cloud, SAP Data Hub, and NetWeaver Application Server Java Web Container.\u003c/li\u003e\n\u003cli\u003eCVE-2026-10520 in Ivanti Sentry.\u003c/li\u003e\n\u003cli\u003eMultiple Trane Tracer SC+ HVAC controller vulnerabilities.\u003c/li\u003e\n\u003cli\u003eCVE-2025-46412 and CVE-2025-41426 in Vertiv Liebert IS-UNITY-DP network cards.\u003c/li\u003e\n\u003cli\u003eCVE-2026-0274 in Palo Alto Networks Cortex XSOAR and Cortex XSIAM.\u003c/li\u003e\n\u003cli\u003eCVE-2026-20253 in Splunk Enterprise.\u003c/li\u003e\n\u003cli\u003eCVE-2026-9648 in the Haskell TLS software stack.\u003c/li\u003e\n\u003cli\u003eCVE-2026-45034 in PhpSpreadsheet.\u003c/li\u003e\n\u003cli\u003ephpBB authentication bypass issues.\u003c/li\u003e\n\u003cli\u003eA maximum-severity code injection vulnerability in Wazuh without a CVE.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"ai-themed-social-engineering\"\u003eAI-Themed Social Engineering\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft warned that threat actors are using interest in artificial intelligence as a social engineering lure. The article says these campaigns include phishing, malvertising, and SEO-driven attacks.\u003c/p\u003e\n\n\u003cp\u003eThe campaigns lead to credential theft, financial fraud, or malware infection. Examples include a ChatGPT-themed lure that leads to a phishing kit collecting credit card data, a Claude-themed phishing campaign collecting credentials and access tokens, an “Awesome AI Windows Plugin” malvertising campaign deploying Vidar Stealer, and fake DeepSeek V4 installers on GitHub delivering Vidar Stealer.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also observed the initial access broker Storm-3075 using AI-themed malvertising to deliver payloads, including malware signed through a malware-signing-as-a-service offering attributed to Fox Tempest.\u003c/p\u003e\n\n\u003ch2 id=\"macos-infostealers-via-fake-installers\"\u003emacOS Infostealers via Fake Installers\u003c/h2\u003e\n\n\u003cp\u003eHuntress reported that deceptive installers for popular software are being used to deliver information stealers to macOS users. The infection chain typically starts in a web browser.\u003c/p\u003e\n\n\u003cp\u003eThreat actors use SEO poisoning to hijack search results or place compromised links on torrent networks and cracked software forums. Users then download what they believe is a legitimate installer.\u003c/p\u003e\n\n\u003cp\u003eThe downloaded DMG files attempt to bypass Apple Gatekeeper protections. The article states that in 2024, more than 65% of newly reported macOS malware was classified as infostealers.\u003c/p\u003e\n\n\u003ch2 id=\"chinese-language-guarantee-marketplaces\"\u003eChinese-Language Guarantee Marketplaces\u003c/h2\u003e\n\n\u003cp\u003eFlare analyzed the guarantee model used by illicit online Telegram marketplaces such as HuiOne Guarantee and Tudou Guarantee. These marketplaces act as third-party escrow services for illicit transactions.\u003c/p\u003e\n\n\u003cp\u003eMarketplace operators hold buyers’ funds in escrow, release them after delivery is confirmed, and adjudicate disputes. They collect vendor deposits, transaction fees, and revenue from paid promotional placements.\u003c/p\u003e\n\n\u003cp\u003eThe model is used to facilitate the sale of money laundering services, stolen data, fraud kits, fake identity documents, recruitment for scam compounds, retail fraud, deepfake services, and infrastructure supporting human trafficking and forced-labor compounds.\u003c/p\u003e\n\n\u003cp\u003eThe article says law enforcement crackdowns have caused fragmentation but not elimination. More than 30 successor marketplaces have emerged after the takedown of HuiOne and Xinbi, including Tiancheng, Dabai, Ouyi, Yinuo, Jin Bo, Haihua, Timi, and Lao Niu.\u003c/p\u003e\n\n\u003ch2 id=\"unifi-os-exploitation\"\u003eUniFi OS Exploitation\u003c/h2\u003e\n\n\u003cp\u003eThe article says the UniFi OS Server remote code execution chain is being actively exploited. The chain includes CVE-2026-34908, CVE-2026-34909, and CVE-2026-34910.\u003c/p\u003e\n\n\u003cp\u003eBishop Fox previously reported how the three flaws could be chained to achieve unauthenticated code execution as root. The observed attacks culminated in deployment of commodity malware.\u003c/p\u003e\n\n\u003ch2 id=\"khmer-shadow-campaign-against-cambodian-government-entities\"\u003eKhmer Shadow Campaign Against Cambodian Government Entities\u003c/h2\u003e\n\n\u003cp\u003eA targeted cyber espionage campaign against Cambodian government entities used a meeting-themed SFX archive. The archive sideloaded a custom C++ loader called NIGHTFORGE.\u003c/p\u003e\n\n\u003cp\u003eNIGHTFORGE decrypted and executed a Havoc Demon payload in memory. Acronis said NIGHTFORGE uses techniques such as NTDLL unhooking and Hell’s Gate syscall resolution, while also showing operational shortcomings suggesting the tool is still under active development.\u003c/p\u003e\n\n\u003cp\u003eThe activity has not been attributed to a known threat group. The article says it is likely aligned with regional intelligence collection interests in Southeast Asia.\u003c/p\u003e\n\n\u003ch2 id=\"cloud-logging-abuse-scenarios\"\u003eCloud Logging Abuse Scenarios\u003c/h2\u003e\n\n\u003cp\u003ePalo Alto Networks Unit 42 warned that attackers could exploit cloud logging services to create weak spots, evade detection, or establish continuous visibility in a target environment. The article notes that cloud logging services are important for security monitoring.\u003c/p\u003e\n\n\u003cp\u003eAttackers could disable, alter, delete, or impair logs to hide activity. They could also attempt to route logs to their own accounts, enabling continuous visibility, discovery, and passive monitoring of activity in the victim’s environment.\u003c/p\u003e\n\n\u003ch2 id=\"operation-taxshadow\"\u003eOperation TaxShadow\u003c/h2\u003e\n\n\u003cp\u003eCYFIRMA reported an Indian tax-themed phishing campaign delivering a multi-stage malware framework. The campaign begins with a fraudulent tax notification email impersonating an official Indian tax authority.\u003c/p\u003e\n\n\u003cp\u003eThe lure uses government branding, urgency-based messaging, and compliance-related threats to push victims to a malicious phishing website. Victims are then instructed to download a ZIP archive containing three staged payload components: कर विवरण.exe, SbieDll.dll, and SbieDll.bin.\u003c/p\u003e\n\n\u003cp\u003eThe malware uses a modular architecture with defense-evasion and anti-analysis techniques. It launches a payload in memory and establishes persistent WebSocket-based communications.\u003c/p\u003e\n\n\u003ch2 id=\"magicad-android-trojan\"\u003eMagicAd Android Trojan\u003c/h2\u003e\n\n\u003cp\u003eDoctor Web reported a new Android trojan called MagicAd. It bypasses operating system restrictions to display background ads.\u003c/p\u003e\n\n\u003cp\u003eThe malware uses one universal method and other methods tailored to devices from specific manufacturers. It is distributed through apps on GetApps, Xiaomi’s official app catalog, and has been found in more than 50 games and apps.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is assessed to have begun in 2025. The threat actors also used the Samsung Galaxy Store as a distribution mechanism, but the article says none of the apps are currently available for download.\u003c/p\u003e\n\n\u003ch2 id=\"residential-proxies\"\u003eResidential Proxies\u003c/h2\u003e\n\n\u003cp\u003eInfoblox reported growth in DNS queries to residential proxy domains across its customer base. Monthly queries increased from nearly 400 billion to more than 500 billion between January 2025 and April 2026, an increase of about 25%.\u003c/p\u003e\n\n\u003cp\u003eResidential proxies relay traffic through consumer devices such as home routers, mobile devices, IoT devices, and devices with proxyware-enabled applications. Some application developers embed SDKs from residential proxy networks to monetize installations.\u003c/p\u003e\n\n\u003cp\u003eInfoblox said AI-related training and website scraping are likely drivers of residential proxy demand. Commonly observed proxy services included Bright Data, Hola VPN, Oxylabs Proxy, Honeygain, and Grass.\u003c/p\u003e\n\n\u003ch2 id=\"sheet-creep-and-google-sheets-command-and-control\"\u003eSHEET#CREEP and Google Sheets Command-and-Control\u003c/h2\u003e\n\n\u003cp\u003eSecuronix described an ongoing cyber espionage campaign called SHEET#CREEP. The campaign uses a diplomatic-themed ISO phishing lure to distribute a C# remote access trojan.\u003c/p\u003e\n\n\u003cp\u003eThe activity had previously been flagged by Zscaler and Bitdefender and attributed to Transparent Tribe. The RAT abuses the Google Sheets API as a command-and-control channel, authenticating through an embedded GCP service account private key.\u003c/p\u003e\n\n\u003cp\u003eThe campaign uses separate spreadsheet tabs per victim for bidirectional communication. The LNK file launches a C# dropper that extracts a bait PDF, places the RAT in the Windows Vault directory, creates persistence through a scheduled task, and self-deletes.\u003c/p\u003e\n\n\u003cp\u003eSecuronix identified 91 active victim tabs in the command-and-control spreadsheet, including a high-confidence target in Pakistan.\u003c/p\u003e\n\n\u003ch2 id=\"malicious-npm-and-pypi-packages\"\u003eMalicious npm and PyPI Packages\u003c/h2\u003e\n\n\u003cp\u003eThe article describes multiple software supply chain campaigns involving npm and PyPI packages. CYFIRMA reported a cryptocurrency-focused campaign using malicious npm packages for credential harvesting, wallet theft, remote payload delivery, and blockchain-based command-and-control.\u003c/p\u003e\n\n\u003cp\u003eThe capabilities included cryptocurrency wallet interception, private key and mnemonic phrase theft, SSH credential harvesting, environment variable collection, sensitive file discovery, remote activation, infrastructure retrieval through blockchain, and multi-stage malware deployment.\u003c/p\u003e\n\n\u003cp\u003eJFrog reported a second campaign called Solana FakeFix that targeted Solana developers with 20 bogus npm and PyPI packages. These packages were used to steal wallet keys, cloud credentials, source-control tokens, SSH keys, and environment secrets.\u003c/p\u003e\n\n\u003cp\u003eA third campaign, called CMS Windows Loader, used five npm packages to dynamically load remote executables and JavaScript code. The article also notes that two versions of the dbmux npm package, 2.2.5 and 1.0.5, were flagged for containing malware, and affected systems should be considered fully compromised according to a GitHub advisory.\u003c/p\u003e\n\n\u003ch2 id=\"akira-ransomware-and-easyupload-io\"\u003eAkira Ransomware and Easyupload.io\u003c/h2\u003e\n\n\u003cp\u003eHuntress investigated a ransomware attack in which a threat actor accessed a victim’s hypervisor and created a new virtual machine as a staging location. The attacker then launched Akira ransomware.\u003c/p\u003e\n\n\u003cp\u003eThe attacker disabled Microsoft Defender and installed WinRAR to stage data. The threat actor used Microsoft Edge to search Bing for “eayupload” before settling on Easyupload.io, a drag-and-drop file upload site.\u003c/p\u003e\n\n\u003cp\u003eShortly after accessing the LimeWire website, likely to exfiltrate staged archives, the attacker launched the akira.exe encryptor against several mounted shares.\u003c/p\u003e\n\n\u003ch2 id=\"tools-mentioned\"\u003eTools Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights two cybersecurity tools:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSpooNMAP: A Python tool that wraps Nmap and Masscan to simplify and speed up port scanning. It supports multiple scan sizes, custom scans, banner grabbing with Nmap, and scanning IPs or CIDR ranges from a file.\u003c/li\u003e\n\u003cli\u003eCVE MCP Server: A tool that connects Claude to 27 security intelligence tools across 21 data sources. It supports CVE lookup, EPSS and CISA KEV checks, proof-of-concept discovery, dependency scanning, IP reputation review, and risk report generation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article includes a disclaimer that these tools are for research and learning, have not gone through a formal security audit, and should be tested in a sandbox before use.\u003c/p\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s conclusion is that attackers do not need novel capabilities when old code, busy teams, weak defaults, and forgotten systems remain available. Across the recap, incidents repeatedly involve deprecated protocols, abandoned packages, exposed endpoints, fake installers, phishing kits, trusted services, and commodity or modular malware.\u003c/p\u003e\n\n\u003cp\u003eThe recurring defensive implication in the article is to patch known issues, check urgent CVEs, and pay attention to overlooked parts of the technology stack. The article closes by warning that the next major incident may already be present in an organization’s environment, “quietly working as designed.”\u003c/p\u003e\n","keyPoints":["Google released Chrome security updates for 74 vulnerabilities, including the actively exploited V8 zero-day CVE-2026-11645.","ShinyHunters exploited an unpatched Oracle PeopleSoft zero-day, CVE-2026-35273, in attacks that mainly targeted the higher education sector.","Unknown threat actors compromised more than 1,500 abandoned Arch User Repository packages with malicious preinstall scripts that downloaded and executed the atomic-lockfile npm package.","Check Point warned that CVE-2026-50751 is being actively exploited against Remote Access VPN and Mobile Access deployments configured to use the deprecated IKEv1 protocol.","Microsoft warned that threat actors are using AI-themed lures in phishing, malvertising, and SEO-driven campaigns that lead to credential theft, financial fraud, or malware infection."],"insights":["Several incidents show that deprecated or abandoned components remain high-risk entry points, including Check Point deployments still using IKEv1, abandoned Arch AUR packages, and old PeopleSoft access paths.","The Outsider phishing-as-a-service kit illustrates how low-cost criminal tooling can scale major fraud, offering more than 290 templates for $88 per week or $200 per month while being linked to millions of stolen cards.","AI branding is being used as effective bait across multiple delivery methods, including phishing kits, malvertising, fake installers, and SEO-driven attacks, even when the legitimate AI services themselves are not compromised.","Attackers are increasingly abusing legitimate infrastructure and services for operations, including Google Sheets for command-and-control, Easyupload.io for data exfiltration, and cloud logging services for stealth or visibility.","The Arch AUR compromise expanded from an initial estimate of 400 affected packages to more than 1,500, showing how quickly software supply chain incidents can grow when abandoned packages are targeted."],"referencedReports":[{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/12/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article says CISA added the Oracle PeopleSoft flaw CVE-2026-35273 to its Known Exploited Vulnerabilities catalog.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"The article links to CISA's KEV catalog while discussing active exploitation of CVE-2026-35273.","category":"","primary":false},{"title":"ETR: Active Exploitation of Oracle PeopleSoft Zero-Day CVE-2026-35273","url":"https://www.rapid7.com/blog/post/etr-active-exploitation-of-oracle-peoplesoft-zero-day-cve-2026-35273/","publisher":"Rapid7","context":"The article cites Rapid7's analysis of exploitation targeting PeopleSoft Environment Management Hub endpoints.","category":"","primary":false},{"title":"AI Brands as Bait: How Threat Actors Are Using the AI Hype in Social Engineering","url":"https://www.microsoft.com/en-us/security/blog/2026/06/08/ai-brands-as-bait-how-threat-actors-are-using-the-ai-hype-in-social-engineering/","publisher":"Microsoft","context":"The article references Microsoft's warning about AI-themed phishing, malvertising, and SEO-driven campaigns.","category":"","primary":false},{"title":"Deceptive Installers and macOS Infostealers","url":"https://www.huntress.com/blog/deceptive-installers-macos-infostealers","publisher":"Huntress","context":"The article cites Huntress research on fake installers distributing macOS information stealers.","category":"","primary":false},{"title":"Prehistory of Chinese-Language Guarantee Marketplaces","url":"https://flare.io/learn/resources/blog/prehistory-chinese-language-guarantee-marketplaces","publisher":"Flare","context":"The article references Flare's analysis of the guarantee marketplace model used by illicit Telegram marketplaces.","category":"","primary":false},{"title":"Popping Root on UniFi OS Server: Unauthenticated RCE Chain Detection Analysis","url":"https://bishopfox.com/blog/popping-root-on-unifi-os-server-unauthenticated-rce-chain-detection-analysis","publisher":"Bishop Fox","context":"The article cites Bishop Fox's report describing how three UniFi OS Server flaws can be chained for unauthenticated root code execution.","category":"","primary":false},{"title":"Behind Khmer Shadow: Targeted Espionage Against Cambodian Government Entities","url":"https://www.acronis.com/en/tru/posts/behind-khmer-shadow-targeted-espionage-against-cambodian-government-entities/","publisher":"Acronis","context":"The article references Acronis research on a campaign using NIGHTFORGE and Havoc Demon against Cambodian government entities.","category":"","primary":false},{"title":"Cloud Logging Defense Evasion","url":"https://unit42.paloaltonetworks.com/cloud-logging-defense-evasion/","publisher":"Palo Alto Networks Unit 42","context":"The article cites Unit 42's warning that attackers could abuse cloud logging services to evade detection or gain visibility.","category":"","primary":false},{"title":"Operation TaxShadow: Multi-Region Tax Phishing In-Memory Malware Campaign","url":"https://www.cyfirma.com/research/operation-taxshadow-multi-region-tax-phishing-in-memory-malware-campaign/","publisher":"CYFIRMA","context":"The article references CYFIRMA's research on an Indian tax-themed phishing campaign delivering a multi-stage malware framework.","category":"","primary":false},{"title":"Android.Spy.4498 and Android.HiddenAds.8116.origin in GetApps","url":"https://news.drweb.com/show/?i=15262\u0026lng=en\u0026c=9","publisher":"Doctor Web","context":"The article cites Doctor Web's findings about the MagicAd Android trojan distributed through apps on GetApps.","category":"","primary":false},{"title":"Residential Proxies in the Wild","url":"https://www.infoblox.com/blog/threat-intelligence/residential-proxies-in-the-wild/","publisher":"Infoblox","context":"The article references Infoblox's analysis of residential proxy domain query growth across its customer base.","category":"","primary":false},{"title":"SHEET#CREEP: Evolved Google Sheets RAT","url":"https://www.securonix.com/blog/sheetcreep-evolved-google-sheets-rat/","publisher":"Securonix","context":"The article cites Securonix research on a cyber espionage campaign using Google Sheets as a command-and-control channel.","category":"","primary":false},{"title":"New npm Supply Chain Campaign Identified: A Multi-Stage Cryptocurrency Malware With More Than 2.7 Million Downloads","url":"https://www.cyfirma.com/research/new-npm-supply-chain-campaign-identified-a-multi-stage-cryptocurrency-malware-with-more-than-2-7-million-downloads/","publisher":"CYFIRMA","context":"The article references CYFIRMA's research on malicious npm packages targeting cryptocurrency users and developers.","category":"","primary":false},{"title":"Solana FakeFix","url":"https://research.jfrog.com/post/solana-fakefix/","publisher":"JFrog","context":"The article cites JFrog's Solana FakeFix research on bogus npm and PyPI packages stealing developer secrets.","category":"","primary":false},{"title":"Akira Ransomware and LimeWire Data Exfiltration","url":"https://www.huntress.com/blog/akira-ransomware-limewire-data-exfiltration","publisher":"Huntress","context":"The article references Huntress's analysis of an Akira ransomware attack that used Easyupload.io for data exfiltration.","category":"","primary":false},{"title":"Turning Up the Heat: Hacking Trane HVAC Controllers","url":"https://claroty.com/team82/research/turning-up-the-heat-hackin
