g-trane-hvac-controllers","publisher":"Claroty Team82","context":"The article links this research in its list of trending CVEs affecting Trane Tracer SC+ HVAC controllers.","category":"","primary":false},{"title":"Attacking UPS Network Cards to Take Down Data Centers","url":"https://claroty.com/team82/research/attacking-ups-network-cards-to-take-down-data-centers","publisher":"Claroty Team82","context":"The article links this research in its list of trending CVEs affecting Vertiv Liebert IS-UNITY-DP network cards.","category":"","primary":false},{"title":"CVE-2026-45034 PhpSpreadsheet RCE Patch Bypass","url":"https://orca.security/resources/blog/cve-2026-45034-phpspreadsheet-rce-patch-bypass/","publisher":"Orca Security","context":"The article links Orca Security's analysis of CVE-2026-45034 in PhpSpreadsheet in its trending CVEs section.","category":"","primary":false},{"title":"phpBB Authentication Bypass","url":"https://pentest-tools.com/research/phpbb-authentication-bypass","publisher":"Pentest-Tools.com","context":"The article links Pentest-Tools.com's research on phpBB authentication bypass issues in its trending CVEs section.","category":"","primary":false},{"title":"phpBB Authentication Bypass RCE","url":"https://www.aikido.dev/blog/phpbb-authentication-bypass-rce","publisher":"Aikido","context":"The article links Aikido's write-up on a phpBB authentication bypass vulnerability in its trending CVEs section.","category":"","primary":false},{"title":"Wazuh Security Advisory GHSA-ff9g-85jq-r3g3","url":"https://github.com/wazuh/wazuh/security/advisories/GHSA-ff9g-85jq-r3g3","publisher":"Wazuh","context":"The article links a GitHub security advisory for a maximum-severity code injection vulnerability in Wazuh.","category":"","primary":false}],"body":"\u003cp\u003eThis weekly recap highlights multiple active cybersecurity issues, led by Google’s patch for an actively exploited Chrome zero-day, CVE-2026-11645. The flaw is an out-of-bounds memory access issue in Chrome’s V8 JavaScript and WebAssembly engine, and Google said an exploit exists in the wild. The update addressed 74 vulnerabilities in total and marked the fifth actively exploited Chrome zero-day patched since the start of 2026.\u003c/p\u003e\n\n\u003cp\u003eOther major items include ShinyHunters exploiting an Oracle PeopleSoft zero-day, more than 1,500 compromised Arch User Repository packages, and active exploitation of a critical Check Point Remote Access VPN and Mobile Access flaw. The article also covers the takedown of the Outsider phishing-as-a-service operation, which was linked to millions of stolen credit cards and billions in estimated losses. Across the roundup, a recurring theme is that attackers are abusing exposed legacy features, abandoned software, phishing kits, fake installers, and trusted services to gain access, steal data, and deploy malware.\u003c/p\u003e\n"},{"n":13,"title":"Webinar: How behavioral AI stops phishing and account takeovers","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/webinar-how-behavioral-ai-stops-phishing-and-account-takeovers/","time":"12:12","priority":"MAY READ","score":25,"tldr":"BleepingComputer is hosting a July 8, 2026 webinar on how behavioral AI can help detect and automate response to phishing, business email compromise, and account takeover attacks that bypass traditional email security and MFA controls.","briefOverview":"\u003cp\u003eBleepingComputer will host a live webinar on July 8, 2026 titled \u003cstrong\u003e\u0026ldquo;Stop chasing alerts: Automating email security with behavioral AI.\u0026rdquo;\u003c/strong\u003e The session will be presented by Dan Nickolaisen, Solutions Architect Manager at Abnormal AI, and Eric Danneker, Director of Cyber Vigilance and Defense at Novant Health. The webinar focuses on how phishing, business email compromise, and account takeover attacks bypass traditional email defenses.\u003c/p\u003e\n\n\u003cp\u003eThe article says email attacks are becoming harder to detect because attackers use AI-generated phishing campaigns, trusted business identities, and authentication workflows that appear legitimate. It highlights that secure email gateways, MFA, and credential monitoring tools may not be enough when attackers abuse legitimate authentication flows and compromised accounts. The webinar will discuss how behavioral AI can automate detection, investigation, and remediation while reducing manual work and alert fatigue.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eBleepingComputer announced a live webinar scheduled for July 8, 2026 called \u003cstrong\u003e\u0026ldquo;Stop chasing alerts: Automating email security with behavioral AI.\u0026rdquo;\u003c/strong\u003e The webinar will be presented by Dan Nickolaisen of Abnormal AI and Eric Danneker of Novant Health. The session is positioned around the challenge of detecting modern email attacks that appear legitimate to users and security tools.\u003c/p\u003e\n\n\u003cp\u003eThe article states that phishing, business email compromise, and account takeover attacks increasingly bypass traditional email defenses. Attackers are described as using AI-generated phishing campaigns, trusted business identities, and authentication workflows that look legitimate. The webinar will also cover why Device Code phishing can evade MFA and credential monitoring protections.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies several operational challenges for security teams. Even when organizations deploy secure email gateways, MFA, and credential monitoring tools, attackers may abuse legitimate authentication flows and compromised accounts to evade detection and maintain persistent access. Security teams can be left manually triaging alerts, investigating suspicious activity, and coordinating remediation across multiple platforms.\u003c/p\u003e\n\n\u003cp\u003eAbnormal AI is described as using behavioral AI to identify anomalous activity across inbound email threats and compromised accounts. The article says this approach can help organizations accelerate response efforts and reduce operational overhead. The webinar will explore how behavioral AI can automate detection, investigation, and remediation workflows.\u003c/p\u003e\n\n\u003cp\u003eAttendees are expected to learn practical approaches for reducing manual investigation work and improving detection accuracy. The webinar will also cover the operational impact of alert fatigue, investigation backlogs, and response delays. The article invites readers to register for the session to learn how organizations can improve response times against increasingly sophisticated email attacks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eBleepingComputer will host a live webinar on July 8, 2026 titled \u003cstrong\u003e\u0026ldquo;Stop chasing alerts: Automating email security with behavioral AI.\u0026rdquo;\u003c/strong\u003e The session will be presented by Dan Nickolaisen, Solutions Architect Manager at Abnormal AI, and Eric Danneker, Director of Cyber Vigilance and Defense at Novant Health.\u003c/p\u003e\n\n\u003cp\u003eThe webinar focuses on how phishing, business email compromise, and account takeover attacks bypass traditional email defenses. It will examine how behavioral AI can help security teams automate detection, investigation, and remediation workflows.\u003c/p\u003e\n\n\u003ch2 id=\"core-security-problem\"\u003eCore Security Problem\u003c/h2\u003e\n\n\u003cp\u003eThe article says email attacks have become increasingly difficult to detect. It attributes this to attackers using:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAI-generated phishing campaigns.\u003c/li\u003e\n\u003cli\u003eTrusted business identities.\u003c/li\u003e\n\u003cli\u003eAuthentication workflows that appear legitimate to users and security tools.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that many organizations already deploy secure email gateways, MFA, and credential monitoring tools. However, attackers are increasingly abusing legitimate authentication flows and compromised accounts to evade detection and maintain persistent access.\u003c/p\u003e\n\n\u003ch2 id=\"attack-types-discussed\"\u003eAttack Types Discussed\u003c/h2\u003e\n\n\u003cp\u003eThe webinar will address several types of email and identity-related threats:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePhishing.\u003c/li\u003e\n\u003cli\u003eBusiness email compromise.\u003c/li\u003e\n\u003cli\u003eAccount takeover.\u003c/li\u003e\n\u003cli\u003eDevice Code phishing.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDevice Code phishing is specifically mentioned as a technique that can evade MFA and credential monitoring protections. The article does not provide a step-by-step technical breakdown of the technique, but it identifies it as one of the areas the webinar will cover.\u003c/p\u003e\n\n\u003ch2 id=\"operational-impact-on-security-teams\"\u003eOperational Impact on Security Teams\u003c/h2\u003e\n\n\u003cp\u003eThe article describes operational strain on security teams as a major theme. It says teams are often left manually triaging alerts, investigating suspicious activity, and coordinating remediation across multiple platforms.\u003c/p\u003e\n\n\u003cp\u003eThis creates several challenges highlighted in the webinar agenda:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAlert fatigue.\u003c/li\u003e\n\u003cli\u003eInvestigation backlogs.\u003c/li\u003e\n\u003cli\u003eResponse delays.\u003c/li\u003e\n\u003cli\u003eManual investigation work.\u003c/li\u003e\n\u003cli\u003eOperational overhead across multiple platforms.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article frames these challenges as part of the reason organizations need faster and more automated email security workflows.\u003c/p\u003e\n\n\u003ch2 id=\"behavioral-ai-approach\"\u003eBehavioral AI Approach\u003c/h2\u003e\n\n\u003cp\u003eAbnormal AI is described as using behavioral AI to identify anomalous activity across inbound email threats and compromised accounts. According to the article, this can help organizations accelerate response efforts and reduce operational overhead.\u003c/p\u003e\n\n\u003cp\u003eThe webinar will explore how behavioral AI can help security teams:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIdentify abnormal behavior patterns.\u003c/li\u003e\n\u003cli\u003eAutomate investigations.\u003c/li\u003e\n\u003cli\u003eAccelerate remediation.\u003c/li\u003e\n\u003cli\u003eImprove detection accuracy.\u003c/li\u003e\n\u003cli\u003eReduce manual investigation work.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article positions behavioral AI as a way to address threats that can appear legitimate to traditional security controls.\u003c/p\u003e\n\n\u003ch2 id=\"webinar-agenda\"\u003eWebinar Agenda\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several topics the webinar will cover:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHow modern phishing, business email compromise, and account takeover attacks bypass traditional email security controls.\u003c/li\u003e\n\u003cli\u003eWhy Device Code phishing can evade MFA and credential monitoring protections.\u003c/li\u003e\n\u003cli\u003eThe operational impact of alert fatigue, investigation backlogs, and response delays.\u003c/li\u003e\n\u003cli\u003eHow behavioral AI can automate detection, investigation, and remediation workflows.\u003c/li\u003e\n\u003cli\u003ePractical techniques for improving resilience against compromised accounts and inbound threats.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-and-involved-parties\"\u003eAffected and Involved Parties\u003c/h2\u003e\n\n\u003cp\u003eThe involved organizations named in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBleepingComputer\u003c/strong\u003e, which will host the webinar.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAbnormal AI\u003c/strong\u003e, represented by Dan Nickolaisen and described as using behavioral AI for email security and compromised account detection.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNovant Health\u003c/strong\u003e, represented by Eric Danneker.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe affected parties discussed broadly are organizations and security teams dealing with inbound email threats, compromised accounts, phishing, business email compromise, and account takeover activity. The article does not name a specific victim organization or incident.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-response\"\u003eDisclosed Impact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article does not report a specific breach, campaign, or incident impact. Instead, it describes the broader impact of modern email attacks on security operations, including alert fatigue, manual triage, investigation backlogs, and delayed response.\u003c/p\u003e\n\n\u003cp\u003eThe response discussed is educational and operational: the webinar aims to show how behavioral AI can automate parts of email threat detection, investigation, and remediation. Attendees are invited to register to learn ways to reduce manual work and improve response times against increasingly sophisticated email attacks.\u003c/p\u003e\n","keyPoints":["BleepingComputer will host a live webinar on July 8, 2026 titled \"Stop chasing alerts: Automating email security with behavioral AI.\"","The webinar will examine how phishing, business email compromise, and account takeover attacks bypass traditional email defenses.","The article says attackers increasingly abuse legitimate authentication flows and compromised accounts to evade detection and maintain persistent access.","The webinar will discuss how behavioral AI can automate detection, investigation, and remediation workflows across inbound email threats and compromised accounts.","Attendees will learn approaches for reducing manual investigation work, improving detection accuracy, and building a faster automated approach to email security."],"insights":["Security teams should not rely on MFA and credential monitoring alone, because the webinar specifically highlights Device Code phishing as a technique that can evade those protections.","Compromised-account activity is presented as both an inbound email threat and an identity-security problem, so response workflows may need to span multiple platforms rather than remain limited to email gateways.","The article frames alert fatigue and investigation backlogs as operational security risks because they slow remediation when attackers use legitimate authentication flows and trusted identities.","Behavioral baselining is positioned as a way to detect abuse of legitimate accounts and workflows that may appear normal to traditional email defenses."],"referencedReports":[],"body":"\u003cp\u003eBleepingComputer will host a live webinar on July 8, 2026 titled \u003cstrong\u003e\u0026ldquo;Stop chasing alerts: Automating email security with behavioral AI.\u0026rdquo;\u003c/strong\u003e The session will be presented by Dan Nickolaisen, Solutions Architect Manager at Abnormal AI, and Eric Danneker, Director of Cyber Vigilance and Defense at Novant Health. The webinar focuses on how phishing, business email compromise, and account takeover attacks bypass traditional email defenses.\u003c/p\u003e\n\n\u003cp\u003eThe article says email attacks are becoming harder to detect because attackers use AI-generated phishing campaigns, trusted business identities, and authentication workflows that appear legitimate. It highlights that secure email gateways, MFA, and credential monitoring tools may not be enough when attackers abuse legitimate authentication flows and compromised accounts. The webinar will discuss how behavioral AI can automate detection, investigation, and remediation while reducing manual work and alert fatigue.\u003c/p\u003e\n"}];

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
