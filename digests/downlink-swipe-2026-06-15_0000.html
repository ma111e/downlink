the WordPress dashboard. Site owners should inspect wp-content/plugins for content-delivery-helper or database-optimizer, remove suspicious admin accounts such as developer_api1 or dev_xxxxxx patterns, and review logs from June 12 to 14 UTC for tidio.cc or 84.201.6.54. If indicators are found, the article says to assume broader compromise and rotate admin passwords, API keys, database credentials, and wp-config.php salts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAn attacker tampered with trusted JavaScript files used by WordPress sites running PushEngage, OptinMonster, and TrustPulse. The modified scripts were designed to act only when loaded by a logged-in WordPress administrator. In that situation, the code used the administrator’s existing session to create an attacker-controlled admin account and install a hidden plugin that opened a backdoor.\u003c/p\u003e\n\n\u003cp\u003eThe article says ordinary visitors did not trigger the malicious behavior. Any site that was hit should be treated as compromised because the installed hidden plugin created a web shell, allowing remote command execution on the server.\u003c/p\u003e\n\n\u003ch2 id=\"affected-plugins-and-ecosystem\"\u003eAffected plugins and ecosystem\u003c/h2\u003e\n\n\u003cp\u003eThe three affected plugins are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePushEngage\u003c/li\u003e\n\u003cli\u003eOptinMonster\u003c/li\u003e\n\u003cli\u003eTrustPulse\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAll three are run by Awesome Motive. PushEngage had issued its own incident notice, while the article says Awesome Motive had not commented on OptinMonster and TrustPulse as of June 15.\u003c/p\u003e\n\n\u003cp\u003eSansec estimated that the three plugins reach more than 1.2 million sites combined. The article emphasizes that this is reach, not confirmed damage, because it counts sites running the plugins rather than sites proven to have been compromised. OptinMonster accounts for most of that reach, with over a million active installs, while the PushEngage WordPress plugin has more than 9,000.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-timeline\"\u003eDisclosure and timeline\u003c/h2\u003e\n\n\u003cp\u003eSansec disclosed the wider campaign on June 13 after finding the same malicious code in JavaScript served for all three plugins. PushEngage followed on June 14 with an incident notice confirming that tampered copies of its script had been served and that sites loading them could be taken over.\u003c/p\u003e\n\n\u003cp\u003eThe exposure window varied by plugin:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSansec saw malicious code in OptinMonster and TrustPulse for about 25 minutes on June 12, first around 22:17 UTC and gone by 22:42 UTC.\u003c/li\u003e\n\u003cli\u003ePushEngage exposure lasted several hours on June 12.\u003c/li\u003e\n\u003cli\u003ePushEngage’s script was still being served from some CDN servers into June 14.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that OptinMonster and TrustPulse had the largest site reach but the shortest observed exposure window, while PushEngage had the longest exposure window.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-malicious-script-worked\"\u003eHow the malicious script worked\u003c/h2\u003e\n\n\u003cp\u003eThe poisoned JavaScript did not act on normal page views. It activated only when a logged-in WordPress administrator loaded it. The malicious code then used the administrator’s active session to perform actions with full permissions.\u003c/p\u003e\n\n\u003cp\u003ePushEngage described the sequence as follows:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eThe script used the logged-in administrator’s session to act with full permissions.\u003c/li\u003e\n\u003cli\u003eIt created a new administrator account controlled by the attacker.\u003c/li\u003e\n\u003cli\u003eIt installed a plugin that does not appear in the WordPress dashboard.\u003c/li\u003e\n\u003cli\u003eIt sent the new login details and site information to tidio.cc, a fake domain resembling tidio.com.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eSansec found the same sequence across all three plugins. The article says tidio.cc was registered on April 28, weeks before the attack.\u003c/p\u003e\n\n\u003ch2 id=\"backdoor-and-persistence-risk\"\u003eBackdoor and persistence risk\u003c/h2\u003e\n\n\u003cp\u003eThe hidden plugin is described as the main objective of the attack. It opened a web shell, which the article defines as a remote command channel that lets someone who knows the right URL run code on the server without logging in.\u003c/p\u003e\n\n\u003cp\u003eFrom that position, the attacker could:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRead or change files.\u003c/li\u003e\n\u003cli\u003eCopy the database.\u003c/li\u003e\n\u003cli\u003ePlant more backdoors.\u003c/li\u003e\n\u003cli\u003eInject card-skimming code.\u003c/li\u003e\n\u003cli\u003eRedirect visitors.\u003c/li\u003e\n\u003cli\u003eSteal data.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe extra administrator account provided another way back in if the hidden plugin was removed but the account remained. The article says removing the named plugin and account may not be enough because the attacker could have used code execution to create additional persistence.\u003c/p\u003e\n\n\u003ch2 id=\"delivery-infrastructure\"\u003eDelivery infrastructure\u003c/h2\u003e\n\n\u003cp\u003eFor PushEngage, the tampered files were its normal embeds:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003epushengage-web-sdk.js\u003c/li\u003e\n\u003cli\u003epushengage-subscription.js\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese were served from clientcdn.pushengage.com, the content-delivery network used to deliver PushEngage scripts to customer sites. OptinMonster and TrustPulse were affected through separate Awesome Motive CDN endpoints.\u003c/p\u003e\n\n\u003cp\u003ePushEngage said the rest of its systems were untouched. It reported no sign that its main application or the servers holding customer data were reached.\u003c/p\u003e\n\n\u003ch2 id=\"disputed-or-unsettled-entry-point\"\u003eDisputed or unsettled entry point\u003c/h2\u003e\n\n\u003cp\u003eThe article says PushEngage and Sansec differ on how the attacker gained access.\u003c/p\u003e\n\n\u003cp\u003ePushEngage said the attacker first compromised the server running its marketing website through a known flaw in UpdraftPlus, a WordPress backup plugin. According to PushEngage, that server was separate from systems running the product and holding customer data, but it contained a CDN API key. With that key, the attacker could change files already being delivered by the CDN to customer sites.\u003c/p\u003e\n\n\u003cp\u003eSansec was not convinced that the entry point was settled. It said the breached system remained unknown, with Awesome Motive’s own servers the most likely place, the CDN account possible, and CDN provider BunnyNet unlikely.\u003c/p\u003e\n\n\u003cp\u003eThe article also mentions a separate UpdraftPlus authentication-bypass bug, CVE-2026-10795, rated high severity by Wordfence and now patched. Wordfence has reported attacks against that bug, but the article states that whether it had anything to do with this incident is unconfirmed.\u003c/p\u003e\n\n\u003ch2 id=\"response-described-in-the-article\"\u003eResponse described in the article\u003c/h2\u003e\n\n\u003cp\u003ePushEngage said it had replaced the bad files, cleared the CDN cache, changed the CDN key and related credentials, and moved the marketing site to new infrastructure. The article stresses that these actions do not clean a customer site that was already taken over.\u003c/p\u003e\n\n\u003cp\u003eSansec’s timeline indicated that OptinMonster and TrustPulse files were clean by June 13. PushEngage said it was still determining the exact exposure window.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-remediation-guidance-in-the-article\"\u003eDetection and remediation guidance in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the WordPress dashboard cannot reliably show whether a site was hit because the backdoor is designed to stay out of admin screens. It says the only dependable check is on the server itself.\u003c/p\u003e\n\n\u003cp\u003eRecommended actions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRun a server-side scan if the site had PushEngage, OptinMonster, or TrustPulse active during the exposure window.\u003c/li\u003e\n\u003cli\u003eInspect the filesystem rather than relying on the WordPress dashboard.\u003c/li\u003e\n\u003cli\u003eCheck under wp-content/plugins for folders named content-delivery-helper or database-optimizer.\u003c/li\u003e\n\u003cli\u003eDelete admin accounts that were not intentionally created, especially developer_api1 or names matching dev_xxxxxx.\u003c/li\u003e\n\u003cli\u003eReview web server access logs from June 12 to 14 UTC for outbound traffic to tidio.cc, including /cdn-cgi/ paths.\u003c/li\u003e\n\u003cli\u003eReview logs for traffic to 84.201.6.54.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIf any evidence is found, the article says to assume the worst. It recommends rotating admin passwords, API keys, database credentials, and the secret keys, or salts, in wp-config.php. It also warns that additional persistence may remain because the attacker had code execution on the server.\u003c/p\u003e\n","keyPoints":["An attacker tampered with trusted JavaScript files used by WordPress sites running PushEngage, OptinMonster, and TrustPulse to create attacker-controlled admin accounts and install hidden backdoor plugins when loaded by logged-in administrators.","Sansec reported that malicious code appeared in OptinMonster and TrustPulse scripts for about 25 minutes on June 12, while PushEngage exposure lasted several hours and persisted on some CDN servers into June 14.","PushEngage said the attacker used a CDN API key obtained from its separate marketing website server to alter files delivered to customer sites, but Sansec said the exact breached system remains unsettled.","The malicious code sent new login details and site information to tidio.cc, a fake domain registered weeks before the attack and made to resemble the real tidio.com.","Sites that ran any of the three plugins during the exposure window should be scanned server-side because the hidden backdoor is designed not to appear in the WordPress dashboard."],"insights":["The WordPress dashboard cannot reliably show whether a site was compromised because the backdoor was designed to stay hidden from admin screens, making filesystem-level inspection necessary.","The attack only triggered when a logged-in WordPress administrator loaded the poisoned script, so ordinary visitor traffic alone would not indicate whether the payload executed.","Removing the named hidden plugin or suspicious admin account may not fully remediate an affected site because the installed web shell could have enabled additional backdoors or changes.","The reported compromise path shows how a key stored on a separate marketing website could be enough to alter CDN-delivered scripts without direct access to the main product or customer-data systems.","OptinMonster and TrustPulse users had no official guidance from their vendor as of June 15 despite Sansec finding the same malicious code in scripts for those plugins."],"referencedReports":[{"title":"OptinMonster Supply-Chain Attack","url":"https://sansec.io/research/optinmonster-supply-chain-attack","publisher":"Sansec","context":"The article says Sansec disclosed the wider campaign on June 13 and found the same malicious code in JavaScript served for PushEngage, OptinMonster, and TrustPulse.","category":"","primary":false},{"title":"Security Incident: Tampered Script Served via PushEngage","url":"https://www.pushengage.com/security-incident-tampered-script-served-via-pushengage/","publisher":"PushEngage","context":"The article says PushEngage published an incident notice confirming that tampered copies of its script were served and could allow sites loading them to be taken over.","category":"","primary":false}],"body":"\u003cp\u003eAn attacker tampered with trusted JavaScript files used by WordPress sites running PushEngage, OptinMonster, and TrustPulse. When a logged-in WordPress administrator loaded the poisoned script, it could create an attacker-controlled admin account and install a hidden plugin that opened a backdoor. Ordinary visitors did not trigger the code.\u003c/p\u003e\n\n\u003cp\u003eSansec disclosed the broader campaign on June 13, reporting the same malicious code in JavaScript served for all three plugins. OptinMonster and TrustPulse were reportedly affected for about 25 minutes on June 12, while PushEngage exposure lasted several hours and some CDN servers continued serving its script into June 14. The three plugins together reach more than 1.2 million sites, but that figure reflects potential reach rather than confirmed compromises.\u003c/p\u003e\n\n\u003cp\u003ePushEngage said the attacker used a CDN API key obtained after compromising its separate marketing website server, while Sansec said the entry point remains unsettled. The article says affected sites should be treated as compromised and checked server-side because the backdoor is designed to stay hidden from the WordPress dashboard. Recommended checks include looking for hidden plugin folders, suspicious admin accounts, and traffic to tidio.cc or 84.201.6.54.\u003c/p\u003e\n"},{"n":29,"title":"LiteLLM Vulnerability Chain Lets Low-Privilege Users Take Over AI Gateway Servers","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/litellm-vulnerability-chain-lets-low.html","time":"16:39","priority":"MUST READ","score":93,"tldr":"A chain of three LiteLLM vulnerabilities lets a low-privilege user become admin and execute code on the AI gateway server, exposing provider keys, stored secrets, prompts, and responses. Users should upgrade to LiteLLM v1.83.14-stable or later and audit admin accounts, callbacks, guardrails, and credentials.","briefOverview":"\u003cp\u003eObsidian Security disclosed a three-vulnerability chain in LiteLLM that can allow a default low-privilege internal_user on a LiteLLM proxy to escalate to full admin and run code on the server. LiteLLM is described as a widely deployed open-source AI gateway that brokers calls to more than 100 model providers behind one OpenAI-compatible interface. Obsidian rates the full chain CVSS 9.9, and BerriAI included the complete fix set in LiteLLM v1.83.14-stable.\u003c/p\u003e\n\n\u003cp\u003eThe chain consists of CVE-2026-47101, an authorization bypass involving unchecked allowed_routes values; CVE-2026-47102, a privilege escalation through unrestricted self-updates to user_role; and CVE-2026-40217, a Custom Code Guardrail sandbox escape enabling server-side code execution. The article says a compromised proxy can expose the master key, salt key, database URL, configured provider keys, stored credentials, prompts, and responses. If LiteLLM is also used as a Model Context Protocol or agent gateway, OAuth tokens and tool credentials may also be in scope.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the proxy’s position between AI agents and models makes compromise especially serious because attackers can rewrite responses in transit. Obsidian demonstrated response manipulation against Claude Code routed through a compromised proxy by using LiteLLM’s callback mechanism to swap a model response for a forged tool call. Users are advised to upgrade to v1.83.14-stable or later, audit proxy_admin accounts, review Custom Code Guardrails and callbacks, verify deployed code integrity, and rotate credentials if exposure is suspected.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eObsidian Security disclosed a LiteLLM vulnerability chain that can let a default low-privilege account take over an AI gateway server. LiteLLM is described as a widely deployed open-source AI gateway that brokers calls to more than 100 model providers behind one OpenAI-compatible interface. Obsidian rates the complete chain CVSS 9.9, and BerriAI shipped the complete fix set in LiteLLM v1.83.14-stable, which GitHub lists as released May 2.\u003c/p\u003e\n\n\u003cp\u003eThe first issue, CVE-2026-47101, is an authorization bypass involving the allowed_routes field used when a regular internal_user generates a virtual API key. LiteLLM stored the caller-supplied field without checking it against the user’s role, and the proxy treated it as a fallback grant. This meant a non-admin could mint a key with allowed_routes set to [\u0026ldquo;/*\u0026rdquo;], reaching admin-only routes.\u003c/p\u003e\n\n\u003cp\u003eThe second issue, CVE-2026-47102, is a privilege escalation in the /user/update endpoint. The endpoint lets a user edit their own record but did not restrict which fields they could write, allowing a self-update that sets user_role to \u0026ldquo;proxy_admin\u0026rdquo;. The article says an org_admin can reach this endpoint through a legitimate code path without the bypass, while a default internal_user reaches it after CVE-2026-47101.\u003c/p\u003e\n\n\u003cp\u003eThe third issue, CVE-2026-40217, is a sandbox escape in LiteLLM’s Custom Code Guardrail, which compiles and runs admin-supplied Python. Production endpoints ran code through exec() without source-level filtering, and Python injected the full builtins module when exec() received a globals dictionary without \u003cstrong\u003ebuiltins\u003c/strong\u003e. The article says this gave code access to \u003cstrong\u003eimport\u003c/strong\u003e, open, and eval, making a payload calling os.system enough for a reverse shell.\u003c/p\u003e\n\n\u003cp\u003eA full compromise can expose the LiteLLM master key, salt key, database URL, configured provider keys for services such as OpenAI, Anthropic, Gemini, Bedrock, and Azure, and all prompts and responses passing through the gateway. Keys stored in config or environment are plaintext, while database-stored keys are encrypted but recoverable with the salt key. If the proxy also runs as a Model Context Protocol or agent gateway, OAuth tokens and tool credentials are also in scope.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that the attacker’s ability to rewrite traffic may be sharper than the data exposure itself. Obsidian demonstrated this against Claude Code routed through a compromised proxy by using LiteLLM’s built-in callback mechanism, which fires on every request and does not appear in the admin UI, to replace a response with a forged tool call. The recommended response is to upgrade to v1.83.14-stable or later, audit proxy_admin accounts, review Custom Code Guardrails and config.yaml callbacks, verify deployed code integrity, and rotate provider keys, database credentials, and stored MCP tokens if exposure is suspected.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eObsidian Security disclosed a three-vulnerability chain in LiteLLM that can allow a default low-privilege user on a LiteLLM proxy to escalate to full admin and execute code on the server. LiteLLM is described in the article as a widely deployed open-source AI gateway that brokers calls to more than 100 model providers behind one OpenAI-compatible interface.\u003c/p\u003e\n\n\u003cp\u003eThe article says a successful server takeover exposes every provider key the gateway holds, the secrets that decrypt stored credentials, and every prompt and response passing through the proxy. Obsidian rates the full chain CVSS 9.9, in the Critical range.\u003c/p\u003e\n\n\u003cp\u003eBerriAI, the maintainer, included the complete fix set in LiteLLM v1.83.14-stable, which GitHub lists as released May 2. The article recommends upgrading to that release or later.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-chain\"\u003eVulnerability Chain\u003c/h2\u003e\n\n\u003cp\u003eThe chain contains three vulnerabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-47101, an authorization bypass.\u003c/li\u003e\n\u003cli\u003eCVE-2026-47102, a privilege escalation flaw.\u003c/li\u003e\n\u003cli\u003eCVE-2026-40217, a Custom Code Guardrail sandbox escape.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eTogether, these issues allow a low-privilege internal_user to bypass route restrictions, reach administrative functionality, promote itself to proxy_admin, and execute server-side code.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2026-47101-authorization-bypass\"\u003eCVE-2026-47101: Authorization Bypass\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-47101 is described as the first link in the chain. When a regular user, identified in the article as an internal_user, generates a virtual API key, LiteLLM stores the caller-supplied allowed_routes field without checking it against the user’s role.\u003c/p\u003e\n\n\u003cp\u003eThe allowed_routes field is supposed to narrow what a key can do. Instead, the proxy also treats it as a fallback grant. Because of that behavior, a non-admin can mint a key with allowed_routes set to [\u0026ldquo;/*\u0026rdquo;], a wildcard that reaches every route, including admin-only routes.\u003c/p\u003e\n\n\u003cp\u003eThe article says the same unchecked write appears on other key-management endpoints. It also says the fix required three pull requests to land.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2026-47102-privilege-escalation\"\u003eCVE-2026-47102: Privilege Escalation\u003c/h2\u003e\n\n\u003cp\u003eOnce the route gate is bypassed, administrative handlers become reachable. CVE-2026-47102 is a privilege escalation issue in the /user/update endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe endpoint lets a user edit their own record, but it did not restrict which fields they could write. A self-update with user_role set to \u0026ldquo;proxy_admin\u0026rdquo; was accepted and saved, promoting the caller to full proxy admin.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that an org_admin can hit this endpoint through a legitimate, intended code path with no bypass required. A default internal_user reaches it after exploiting CVE-2026-47101. VulnCheck, which assigned the CVE, scores it 8.7 under CVSS 4.0 and 8.8 under CVSS 3.1.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2026-40217-custom-code-guardrail-sandbox-escape\"\u003eCVE-2026-40217: Custom Code Guardrail Sandbox Escape\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-40217 is a sandbox escape in LiteLLM’s Custom Code Guardrail. The article describes this feature as compiling and running admin-supplied Python.\u003c/p\u003e\n\n\u003cp\u003eThe production endpoints ran the code through exec() with no source-level filtering. When exec() receives a globals dictionary without \u003cstrong\u003ebuiltins\u003c/strong\u003e, Python silently injects the full builtins module. This gives the executed code access to \u003cstrong\u003eimport\u003c/strong\u003e, open, and eval.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, a plain payload calling os.system was then enough for a reverse shell. The article also says X41 D-Sec independently found a separate path on the /guardrails/test_custom_code playground endpoint that defeated a regex deny-list through runtime bytecode rewriting. Both paths resulted in server-side code execution.\u003c/p\u003e\n\n\u003ch2 id=\"exposed-data-and-credentials\"\u003eExposed Data and Credentials\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that LiteLLM sits at a chokepoint, making compromise especially broad in impact. A full chain exposes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe master key.\u003c/li\u003e\n\u003cli\u003eThe salt key used to decrypt stored credentials.\u003c/li\u003e\n\u003cli\u003eThe database URL.\u003c/li\u003e\n\u003cli\u003eConfigured provider keys.\u003c/li\u003e\n\u003cli\u003eStored credentials.\u003c/li\u003e\n\u003cli\u003ePrompts and responses passing through the gateway.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article specifically names OpenAI, Anthropic, Gemini, Bedrock, and Azure among the provider keys that may be exposed. Keys in config or environment are plaintext. Keys in the database are encrypted but recoverable with the salt key.\u003c/p\u003e\n\n\u003cp\u003eThe article also says that prompts and responses in real deployments can include PII, source code, internal tickets, and pasted secrets. If the proxy also runs as a Model Context Protocol or agent gateway, OAuth tokens and tool credentials are in scope too.\u003c/p\u003e\n\n\u003ch2 id=\"response-manipulation-risk\"\u003eResponse Manipulation Risk\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the sharper risk is not only what an attacker can read, but what they can rewrite. Because the gateway sits between an AI agent and the model, a compromise lets an attacker alter responses in transit.\u003c/p\u003e\n\n\u003cp\u003eObsidian demonstrated this against Claude Code routed through a compromised proxy. The article stresses that this is not prompt injection. Instead of persuading the model to misbehave, the attacker uses LiteLLM’s built-in callback mechanism.\u003c/p\u003e\n\n\u003cp\u003eThe callback mechanism is described as an extension point that fires on every request and never shows up in the admin UI. In Obsidian’s demonstration, the callback swapped the model’s response for a forged tool call and rewrote the safety-check context so the action appeared approved. In the demo, the developer typed one word, \u0026ldquo;hello,\u0026rdquo; and the attacker obtained a reverse shell on the developer’s machine.\u003c/p\u003e\n\n\u003ch2 id=\"mcp-related-code-execution-context\"\u003eMCP-Related Code Execution Context\u003c/h2\u003e\n\n\u003cp\u003eSeparate from the three-vulnerability chain, the article says LiteLLM gives a proxy_admin an intentional code-execution path. Its Model Context Protocol support lets an admin register stdio MCP servers that the proxy launches as local subprocesses.\u003c/p\u003e\n\n\u003cp\u003eThe article describes this as a design trade-off rather than a bug, and says the patches do not change it. As a result, reaching admin is effectively reaching code execution.\u003c/p\u003e\n\n\u003cp\u003eObsidian reproduced a reverse shell this way on v1.88.0. The article also mentions CVE-2026-42271, a separate bug in the same stdio-MCP machinery that let callers spawn subprocesses through LiteLLM’s MCP preview endpoints. That issue was exploited in the wild and added to CISA’s Known Exploited Vulnerabilities catalog earlier this month.\u003c/p\u003e\n\n\u003ch2 id=\"prior-litellm-security-issues-mentioned\"\u003ePrior LiteLLM Security Issues Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article says this is not LiteLLM’s first rough stretch this year. It cites a March supply-chain compromise that backdoored two LiteLLM releases on PyPI. It also cites an April critical SQL injection that was exploited within 36 hours of disclosure.\u003c/p\u003e\n\n\u003cp\u003eFor the vulnerability chain discussed in this article, Obsidian frames it as a disclosed flaw with a working demo, not as exploitation seen in the wild. The article says the proxy’s position keeps making it a target.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions\"\u003eRecommended Actions\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends upgrading to LiteLLM v1.83.14-stable or later, the first release with the full fix set. It also recommends auditing the environment after upgrading.\u003c/p\u003e\n\n\u003cp\u003eSpecific actions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRe-verify every account holding proxy_admin.\u003c/li\u003e\n\u003cli\u003eTreat the proxy_admin role as host-level access.\u003c/li\u003e\n\u003cli\u003eReview every Custom Code Guardrail on the proxy.\u003c/li\u003e\n\u003cli\u003eCheck callbacks loaded from config.yaml under litellm_settings.callbacks.\u003c/li\u003e\n\u003cli\u003eVerify the integrity of the deployed code, not just the configuration.\u003c/li\u003e\n\u003cli\u003eIf exposure is suspected, rotate provider keys, database credentials, and any stored MCP tokens.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article concludes that a compromised LiteLLM proxy does not just leak data. Because it sits between the agent and the model, it can forge the responses that the agent acts on. It characterizes the vulnerability chain as misplaced trust at multiple layers: the route gate trusted a caller-supplied field, the handlers trusted the route gate, and nobody actually checked.\u003c/p\u003e\n","keyPoints":["Obsidian Security disclosed a three-vulnerability LiteLLM proxy chain, rated CVSS 9.9, that can let a default low-privilege internal_user escalate to full admin and run code on the server.","The chain includes CVE-2026-47101, an authorization bypass via unchecked allowed_routes values, CVE-2026-47102, a privilege escalation through unrestricted /user/update fields, and CVE-2026-40217, a Custom Code Guardrail sandbox escape enabling server-side code execution.","BerriAI fixed the complete three-CVE chain in LiteLLM v1.83.14-stable, which GitHub lists as released May 2, and users are advised to upgrade to that release or later.","A successful takeover can expose LiteLLM’s master key, salt key, database URL, configured provider keys, stored credentials, prompts, responses, and, when used as an MCP or agent gateway, OAuth tokens and tool credentials.","The article recommends auditing proxy_admin accounts, reviewing Custom Code Guardrails and callbacks in config.yaml, verifying deployed code integrity, and rotating provider keys, database credentials, and stored MCP tokens if exposure is suspected."],"insights":["LiteLLM callbacks loaded from config.yaml are especially important to audit because they fire on every request, do not appear in the admin UI, and were used in Obsidian’s demo to replace a model response with a forged tool call.","The proxy_admin role should be treated as host-level access because LiteLLM’s MCP support intentionally allows admins to register stdio MCP servers that the proxy launches as local subprocesses, and the patches do not change this behavior.","Encrypted provider credentials stored in the LiteLLM database may still be recoverable after compromise because the same takeover can expose the salt key used to decrypt them.","CVE-2026-47102 is reachable by an org_admin through an intended code path without needing the authorization bypass, while a default internal_user can reach it only after exploiting CVE-2026-47101."],"referencedReports":[{"title":"LiteLLM Privilege Escalation RCE","url":"https://www.obsidiansecurity.com/blog/litellm-privilege-escalation-rce","publisher":"Obsidian Security","context":"The article cites Obsidian Security’s disclosure and demonstration of the LiteLLM vulnerability chain, including response tampering against Claude Code through a compromised proxy.","category":"","primary":false},{"title":"X41-2026-001 LiteLLM","url":"https://www.x41-dsec.de/lab/advisories/x41-2026-001-litellm/","publisher":"X41 D-Sec","context":"The article references X41 D-Sec’s independently found advisory on a /guardrails/test_custom_code sandbox escape path using runtime bytecode rewriting.","category":"","primary":false}],"body":"\u003cp\u003eObsidian Security disclosed a three-vulnerability chain in LiteLLM that can allow a default low-privilege internal_user on a LiteLLM proxy to escalate to full admin and run code on the server. LiteLLM is described as a widely deployed open-source AI gateway that brokers calls to more than 100 model providers behind one OpenAI-compatible interface. Obsidian rates the full chain CVSS 9.9, and BerriAI included the complete fix set in LiteLLM v1.83.14-stable.\u003c/p\u003e\n\n\u003cp\u003eThe chain consists of CVE-2026-47101, an authorization bypass involving unchecked allowed_routes values; CVE-2026-47102, a privilege escalation through unrestricted self-updates to user_role; and CVE-2026-40217, a Custom Code Guardrail sandbox escape enabling server-side code execution. The article says a compromised proxy can expose the master key, salt key, database URL, configured provider keys, stored credentials, prompts, and responses. If LiteLLM is also used as a Model Context Protocol or agent gateway, OAuth tokens and tool credentials may also be in scope.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the proxy’s position between AI agents and models makes compromise especially serious because attackers can rewrite responses in transit. Obsidian demonstrated response manipulation against Claude Code routed through a compromised proxy by using LiteLLM’s callback mechanism to swap a model response for a forged tool call. Users are advised to upgrade to v1.83.14-stable or later, audit proxy_admin accounts, review Custom Code Guardrails and callbacks, verify deployed code integrity, and rotate credentials if exposure is suspected.\u003c/p\u003e\n"},{"n":27,"title":"North Korean Hackers Are Turning Developer Tools Into Malware Delivery Channels","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/north-korean-hackers-are-turning.html","time":"19:32","priority":"MUST READ","score":92,"tldr":"North Korea-linked hackers are increasingly weaponizing developer tools like GitHub repositories, VS Code projects, extensions, npm packages, and Git hooks to infect developers across platforms and steal credentials and cryptocurrency wallets. The campaigns show a shift toward scaled, industrialized phishing and supply-chain tactics that can turn compromised developers and their repositories into further malware delivery channels.","briefOverview":"\u003cp\u003eCybersecurity researchers reported two malicious campaigns with similarities to the North Korea-linked Contagious Interview cluster, also known as Famous Chollima, HexagonalRodent, and Void Dokkaebi. Proofpoint detailed one campaign, tracked as UNK_DeadDrop, that used developer recruitment and code review themes to target nearly 100 organizations across finance, cryptocurrency, education, technology, and other sectors. The activity sent more than 250 emails over six weeks, with over 75% of targeted entities located in the United States.\u003c/p\u003e\n\n\u003cp\u003eThe UNK_DeadDrop campaign used links to actor-controlled GitHub repositories posing as technical assignments or cryptocurrency projects. Targets were instructed to clone the repositories and open them in VS Code or Cursor, where VS Code project behavior such as the “runOn: folderOpen” technique could trigger malicious code execution without further user interaction. The resulting infection chains delivered cross-platform loaders for macOS, Linux, and Windows and installed a malicious VS Code extension masquerading as a legitimate Google service.\u003c/p\u003e\n\n\u003cp\u003eThe malware supported remote command execution, system reconnaissance, and data theft from browser wallet extensions, credentials, and desktop wallet apps. Linux and macOS infections led to a custom version of the open-source Overlord framework, while the Windows chain used VBScript and CMD files to install the extension and exfiltrate ZIP files before cleaning up. The article also describes related malicious VS Code extensions, npm packages, Git hooks, Packagist compromise, and macOS social engineering campaigns tied or compared to North Korean developer-targeting operations.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eResearchers flagged malicious developer-focused campaigns that show similarities to the North Korea-linked Contagious Interview cluster, also known as Famous Chollima, HexagonalRodent, and Void Dokkaebi. Proofpoint named one campaign UNK_DeadDrop and said it used developer role recruitment or code review themes to target nearly 100 organizations. The targeted sectors included finance, cryptocurrency, education, technology, and several others.\u003c/p\u003e\n\n\u003cp\u003eProofpoint said the infection chain began with emails linking to actor-controlled GitHub repositories hosting malicious scripts. The repositories masqueraded as technical assignments or cryptocurrency-related projects and instructed recipients to clone the code and open it in VS Code or Cursor. More than 250 emails were sent over a six-week period, and over 75% of targeted entities were in the United States, followed by countries including the United Kingdom, Australia, France, Brazil, Germany, India, Israel, Japan, and the Netherlands.\u003c/p\u003e\n\n\u003cp\u003eA key technical link to prior North Korean activity was the use of VS Code projects employing the “runOn: folderOpen” technique, which can trigger malicious code execution when the editor is opened without requiring user interaction. The campaign delivered operating system-specific loaders for Linux, macOS, and Windows. The loaders installed a malicious VS Code extension posing as a legitimate Google service and communicated with an external server to support remote command execution, reconnaissance, and exfiltration.\u003c/p\u003e\n\n\u003cp\u003eThe Linux and macOS infection chains led to a custom version of the open-source Overlord framework with data-theft capabilities, and the malware also displayed a fake security pop-up prompting users for their system password. The Windows infection chain used a VBScript payload to run a CMD file that installed the extension. The stated goal was to steal credentials and data from wallet browser extensions and desktop wallet applications, then exfiltrate the results to 23.137.105[.]75:5173 through an HTTP POST request.\u003c/p\u003e\n\n\u003cp\u003eThe article also cites Yeeth Security’s discovery of three malicious VS Code extensions on the official marketplace that posed as Jupyter Notebook productivity tools. Those extensions used SharePoint as a command queue, victim registry, and exfiltration channel, with Microsoft Graph API and SharePoint handling command-and-control communication. The piece places these findings alongside multiple recent North Korea-linked campaigns involving malicious npm packages, VS Code task files, Git hooks, compromised Packagist packages, macOS lures, and updated malware families such as BeaverTail, InvisibleFerret, OtterCookie, DEV#POPPER RAT, Cabbage RAT, and Mach-O Man.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers reported two malicious cyber campaigns that exhibit similarities with the persistent North Korean threat cluster known as Contagious Interview, also called Famous Chollima, HexagonalRodent, and Void Dokkaebi. The article’s main focus is Proofpoint’s reporting on a campaign tracked as UNK_DeadDrop, which targeted developers through recruitment and code review themes.\u003c/p\u003e\n\n\u003cp\u003eProofpoint said UNK_DeadDrop targeted nearly 100 organizations in finance, cryptocurrency, education, technology, and other sectors. The activity involved more than 250 emails sent over a six-week period to individuals at almost 100 organizations. More than 75% of the targeted entities were located in the United States, followed by the United Kingdom, Australia, France, Brazil, Germany, India, Israel, Japan, and the Netherlands.\u003c/p\u003e\n\n\u003ch2 id=\"unk-deaddrop-initial-access-and-lures\"\u003eUNK_DeadDrop initial access and lures\u003c/h2\u003e\n\n\u003cp\u003eThe UNK_DeadDrop infection chain began with emails containing links to actor-controlled GitHub repositories. These repositories hosted malicious scripts and were presented as technical assignments or cryptocurrency-related projects. Recipients were instructed to clone the repository and open it in VS Code or Cursor.\u003c/p\u003e\n\n\u003cp\u003eProofpoint observed that later lures in May 2026 shifted toward asking targets to review open-source projects. The article states that the campaign used developer role recruitment and code review themes, which aligns with the broader pattern of developer-focused targeting described throughout the piece.\u003c/p\u003e\n\n\u003ch2 id=\"vs-code-abuse-and-automatic-execution\"\u003eVS Code abuse and automatic execution\u003c/h2\u003e\n\n\u003cp\u003eA central technical element was the use of Microsoft Visual Studio Code projects that employed the “runOn: folderOpen” technique. The article says this technique can trigger malicious code execution every time the editor is opened without requiring user interaction. It also notes that Contagious Interview actors have used this approach since December 2025.\u003c/p\u003e\n\n\u003cp\u003eThe GitHub repositories led to operating system-specific malware loaders for Linux, macOS, and Windows. For macOS and Linux, the loader was a shell script. For Windows, the loader was a VBScript that ran a CMD file.\u003c/p\u003e\n\n\u003ch2 id=\"malware-behavior-and-data-theft\"\u003eMalware behavior and data theft\u003c/h2\u003e\n\n\u003cp\u003eThe loaders installed a malicious VS Code extension in VSIX format that masqueraded as a legitimate Google service. The extension communicated with an external server and enabled remote command execution, system reconnaissance, and data exfiltration. The targeted data included browser wallet extension data, credentials, and desktop wallet application data.\u003c/p\u003e\n\n\u003cp\u003eThe Linux and macOS infection chains led to a custom version of the open-source Go framework Overlord, with capabilities to enable data theft. The malware also prompted users to enter their system password through a fake security pop-up. The Windows chain installed the extension through VBScript and CMD components and did not maintain a persistent connection; it uploaded ZIP files, performed cleanup, and terminated.\u003c/p\u003e\n\n\u003cp\u003eProofpoint identified the exfiltration destination as 23.137.105[.]75:5173, using an HTTP POST request. The article says the end goal was to steal credentials and data from wallet browser extensions and applications and send the results to that server.\u003c/p\u003e\n\n\u003ch2 id=\"attribution-framing\"\u003eAttribution framing\u003c/h2\u003e\n\n\u003cp\u003eProofpoint tracked UNK_DeadDrop as distinct from Contagious Interview, despite similarities to North Korean activity. The stated reasons included differences in initial access methods, with LinkedIn associated with Contagious Interview and email used in UNK_DeadDrop, as well as UNK_DeadDrop’s use of the Overlord framework. The article contrasts Overlord with malware families traditionally used by the North Korean group, including BeaverTail, InvisibleFerret, and OtterCookie.\u003c/p\u003e\n\n\u003cp\u003eProofpoint said UNK_DeadDrop suggests North Korea-aligned operations targeting developers for financial gain are maturing and evolving. The company also said the move from active social engineering on social media and fake interviews to broader recruitment-themed phishing emails with links to malicious repositories could indicate industrialization and scaling.\u003c/p\u003e\n\n\u003ch2 id=\"malicious-vs-code-extensions-found-by-yeeth-security\"\u003eMalicious VS Code extensions found by Yeeth Security\u003c/h2\u003e\n\n\u003cp\u003eThe article also describes findings from Yeeth Security involving three malicious VS Code extensions on the official marketplace. The extensions were named “ByteBinTools.jupyter-powerdev-2026.6.8.vsix,” “ToolCraft.jupyter-powertools-3.21.0.vsix,” and “OLDev.markdown-mode-devtools-2.1.0.vsix.” They were presented as Jupyter Notebook productivity tools but were described as a sophisticated, multi-stage backdoor.\u003c/p\u003e\n\n\u003cp\u003eYeeth Security said the malware included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA SharePoint site used as a command queue, victim registry, and exfiltration channel.\u003c/li\u003e\n\u003cli\u003eA JavaScript layer handling command-and-control communication through Microsoft Graph API and SharePoint.\u003c/li\u003e\n\u003cli\u003eComponents for arbitrary file read, write, and exfiltration, along with code execution using a Windows executable and a Python script for Linux and macOS.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe C2 channel could run commands or scripts and also issue a “host_action” command type. That command type supported file system operations such as pwd, ls, cd, and cat, as well as uploads and downloads. Yeeth Security said there was no direct overlap with any publicly documented North Korean campaign, but it noted similarities to Contagious Interview in the JavaScript and Python developer-tooling split, and similarities to Lazarus Group’s Dream Job attacks in the Microsoft Graph API authentication mechanism.\u003c/p\u003e\n\n\u003ch2 id=\"related-north-korea-linked-developer-and-supply-chain-activity\"\u003eRelated North Korea-linked developer and supply chain activity\u003c/h2\u003e\n\n\u003cp\u003eThe article places UNK_DeadDrop and the malicious VS Code extensions in the context of many recent campaigns linked to North Korean threat actors. These included malicious npm packages, compromised package ecosystems, repository-based delivery, IDE abuse, and macOS-focused social engineering.\u003c/p\u003e\n\n\u003cp\u003eExamples described in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA follow-up to the Axios supply chain attack using malicious npm packages named redeem-onchain-sdk@1.0.7, nicegui@0.1.4, and period-newline@0.1.0, which delivered an information stealer and were listed as dependencies in GitHub projects disguised as cryptocurrency trading bots.\u003c/li\u003e\n\u003cli\u003eTaskJacker, a campaign that dropped malicious VS Code task files into GitHub users’ repositories and used VS Code’s tasks.json auto-execution behavior.\u003c/li\u003e\n\u003cli\u003eContagious Interview’s use of Git hooks, specifically “.githooks/pre-commit,” to execute malicious code when a target cloned a coding assessment repository.\u003c/li\u003e\n\u003cli\u003eContagious Interview’s use of a compromised Packagist package, “roberts/leads,” to target PHP developers with a JavaScript loader that fetched and executed a next-stage payload.\u003c/li\u003e\n\u003cli\u003eActor tampering with commits and injecting multi-stage obfuscated JavaScript into source files in compromised developer repositories.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that Trend Micro described Void Dokkaebi operations as extending beyond a single infected developer. According to the quoted Trend Micro assessment, a compromised machine can become a launchpad, with the victim’s repositories and code contributions becoming infection vectors for downstream developers.\u003c/p\u003e\n\n\u003ch2 id=\"malware-families-and-evolving-capabilities\"\u003eMalware families and evolving capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several malware families and toolsets associated with these campaigns. These include BeaverTail, InvisibleFerret, OtterCookie, DEV#POPPER RAT, Cabbage RAT, Mach-O Man, PromptMink, and ClipViper. It also describes the Overlord framework as part of the UNK_DeadDrop infection chain for Linux and macOS.\u003c/p\u003e\n\n\u003cp\u003eTrend Micro was cited as saying Contagious Interview migrated InvisibleFerret from readable Python scripts to Cython-compiled binaries, distributing the malware as .pyd files on Windows and .so files on macOS. The article says this added an evasion layer while preserving capabilities such as backdoor access, browser credential theft, clipboard monitoring, keylogging, and cryptocurrency wallet targeting. It also says BeaverTail expanded from a downloader and stealer role into broader malware with overlapping functions including credential harvesting and wallet trojanization.\u003c/p\u003e\n\n\u003ch2 id=\"macos-and-financial-sector-targeting\"\u003emacOS and financial-sector targeting\u003c/h2\u003e\n\n\u003cp\u003eThe article describes BlueNoroff, also known as Sapphire Sleet and UNC1069, targeting macOS environments in high-value financial sectors. The targets included individuals in cryptocurrency, investment, and Web3 areas. Some campaigns used fake Zoom and Microsoft Teams meeting-themed lures, ClickFix-style prompts, and instructions to install supposed missing meeting SDKs.\u003c/p\u003e\n\n\u003cp\u003eThe article says these attacks led to deployment of updated Cabbage RAT variants, PowerShell implants capable of credential and data theft, or a newly identified macOS data-stealing toolkit known as Mach-O Man. Microsoft was quoted as saying Sapphire Sleet persuaded users to manually run AppleScript or Terminal commands, shifting execution into a user-initiated context and allowing activity to proceed outside macOS protections such as TCC, Gatekeeper, quarantine enforcement, and notarization checks.\u003c/p\u003e\n\n\u003ch2 id=\"scale-and-financial-impact-cited-in-the-article\"\u003eScale and financial impact cited in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article cites Expel as saying Contagious Interview used generative artificial intelligence to assist in loader development for BeaverTail and OtterCookie and to set up front companies for job listings and social engineering outreach through fake LinkedIn accounts. Expel said these campaigns were likely carried out by multiple teams, each with several members.\u003c/p\u003e\n\n\u003cp\u003eThe article reports that the campaigns resulted in the theft of $12 million in cryptocurrency in the first three months of 2026. It also quotes Expel’s Marcus Hutchins as saying the threat actor’s campaigns exfiltrated 26,584 cryptocurrency wallets from 2,726 infected developers’ systems.\u003c/p\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall significance\u003c/h2\u003e\n\n\u003cp\u003eThe article presents a picture of North Korea-linked operations increasingly focused on developers, developer tools, and software supply chain paths. The key mechanisms described include malicious GitHub repositories, VS Code project behavior, VS Code extensions, npm packages, Git hooks, Packagist packages, and social engineering lures around jobs, code reviews, cryptocurrency projects, and meetings.\u003c/p\u003e\n\n\u003cp\u003eThe main technical concern is that routine developer actions, such as cloning a repository and opening it in an IDE, can trigger malicious execution in these campaigns. The article also emphasizes that compromised developer systems and repositories can become further distribution channels, turning developer workflows into malware delivery mechanisms.\u003c/p\u003e\n","keyPoints":["Proofpoint reported a phishing campaign called UNK_DeadDrop that used developer recruitment and code review themes to target nearly 100 organizations in sectors including finance, cryptocurrency, education, and technology.","The UNK_DeadDrop emails linked to actor-controlled GitHub repositories that masqueraded as technical assignments or cryptocurrency projects and instructed recipients to open them in VS Code or Cursor.","The malicious repositories used VS Code projects with the \"runOn: folderOpen\" technique to execute code when the editor opened, leading to OS-specific malware loaders for macOS, Linux, and Windows.","The loaders installed a malicious VS Code extension posing as a legitimate Google service and enabled remote command execution, system reconnaissance, and theft of data from browser wallet extensions, credentials, and desktop wallet apps.","Yeeth Security also found three malicious VS Code extensions on the official marketplace that posed as Jupyter Notebook productivity tools but functioned as a multi-stage backdoor using SharePoint and Microsoft Graph API for command-and-control and exfiltration."],"insights":["Developer IDE behavior is a critical control point because the campaigns abuse VS Code features such as \"runOn: folderOpen\" and tasks.json auto-execution, allowing compromise when a cloned repository is simply opened in the editor.","North Korea-aligned actors are shifting from one-to-one social engineering on platforms like LinkedIn to broader email campaigns and repository-based delivery, which Proofpoint said may indicate an effort to industrialize and scale developer targeting.","Compromised developer machines can become downstream distribution points because the actors have used victim repositories and code contributions to propagate malicious code to other developers.","The campaigns repeatedly replace exposed delivery mechanisms with alternatives, as shown by the rapid follow-up npm packages after the Axios packages were removed and UNK_DeadDrop’s move away from a Windows Go binary of Overlord to a different Windows infection method.","Defenders should treat marketplace-listed developer extensions and familiar cloud services with caution because the malicious VS Code extensions found by Yeeth Security used the official marketplace and relied on SharePoint and Microsoft Graph API for command-and-control and exfiltration."],"referencedReports":[{"title":"Don't Fear the Repo: UNK_DeadDrop Phishing Campaign Targets Developers to Steal Cryptocurrency","url":"https://www.proofpoint.com/us/blog/threat-insight/dont-fear-repo-unkdeaddrop-phishing-campaign-targets-developers-steal","publisher":"Proofpoint","context":"The article cites Proofpoint's report as the source for the UNK_DeadDrop phishing campaign targeting developers with malicious GitHub repositories.","category":"","primary":false},{"title":"Jupyter PowerDev Backdoor","url":"https://yeethsecurity.com/blog/2026-06-09-jupyter-powerdev-backdoor","publisher":"Yeeth Security","context":"The article cites Yeeth Security's research on three malicious VS Code extensions posing as Jupyter Notebook productivity tools.","category":"","primary":false},{"title":"Axios Supply Chain Attack: TA444 / BlueNoroff","url":"https://hunt.io/blog/axios-supply-chain-attack-ta444-bluenoroff","publisher":"Hunt.io","context":"The article references Hunt.io's analysis of the Axios supply chain attack linked to North Korean threat activity.","category":"","primary":false},{"title":"Pipeline Security Lessons from March Supply Chain Incidents","url":"https://about.gitlab.com/blog/pipeline-security-lessons-from-march-supply-chain-incidents/","publisher":"GitLab","context":"The article links to GitLab's analysis while discussing the Axios supply chain attack and related npm package activity.","category":"","primary":false},{"title":"Axios Attacker Additional NPM Packages","url":"https://opensourcemalware.com/blog/axios-attacker-additional-npm-packages","publisher":"OpenSourceMalware","context":"The article cites OpenSourceMalware's findings on follow-up malicious npm packages deployed after the Axios packages were removed.","category":"","primary":false},{"title":"TaskJacker","url":"https://opensourcemalware.com/blog/tasksjacker-blog-post","publisher":"OpenSourceMalware","context":"The article references OpenSourceMalware's analysis of the TaskJacker campaign that weaponized VS Code task files in GitHub repositories.","category":"","primary":false},{"title":"DPRK Git Hooks Malware","url":"https://opensourcemalware.com/blog/dprk-git-hooks-malware","publisher":"OpenSourceMalware","context":"The article links to OpenSourceMalware's analysis of Contagious Interview using Git hooks to execute malicious code in coding assessment repositories.","category":"","primary":false},{"title":"Famous Chollima Targets PHP Developers Through Compromised Packagist Package","url":"https://socket.dev/blog/famous-chollima-targets-php-developers-through-compromised-packagist-package","publisher":"Socket","context":"The article references Socket's research on a compromised Packagist package used to target PHP developers.","category":"","primary":false},{"title":"Void Dokkaebi Uses Fake Job Interview Lure to Spread Malware via Code Repositories","url":"https://www.trendmicro.com/en_us/research/26/d/void-dokkaebi-uses-fake-job-interview-lure-to-spread-malware-via-code-repositories.html","publisher":"Trend Micro","context":"The article cites Trend Micro's research describing how Void Dokkaebi uses compromised developer systems and repositories as propagation vectors.","category":"","primary":false},{"title":"Analyzing Void Dokkaebi InvisibleFerret Malware","url":"https://www.trendmicro.com/en_us/research/26/e/analyzing-void-dokkaebi-invisibleferret-malware.html","publisher":"Trend Micro","context":"The article references Trend Micro's analysis of Contagious Interview's migration of InvisibleFerret from Python scripts to Cython-compiled binaries.","category":"","primary":false},{"title":"North Korean NPM Infostealer RAT","url":"https://www.ox.security/blog/north-korean-npm-infostealer-rat/","publisher":"OX Security","context":"The article cites OX Security's research on the malicious npm package terminal-logger-utils targeting Telegram data, SSH keys, crypto wallets, cloud configurations, and environment variables.","category":"","primary":false},{"title":"microsoftsystem64 Binary Payload Analysis","url":"https://safedep.io/microsoftsystem64-binary-payload-analysis/","publisher":"SafeDep","context":"The article references SafeDep's analysis of the js-logger-pack npm package delivering an ELF infostealer and RAT payload.","category":"","primary":false},{"title":"Sapphire Sleet Targets macOS in Multi-Stage Intrusion Campaign","url":"https://www.levelblue.com/blogs/spiderlabs-blog/sapphire-sleet-targets-macos-in-multi-stage-intrusion-campaign","publisher":"LevelBlue","context":"The article links to LevelBlue's research on BlueNoroff targeting macOS environments in high-value financial sectors.","category":"","primary":false},{"title":"Dissecting Sapphire Sleet's macOS Intrusion from Lure to Compromise","url":"https://www.microsoft.com/en-us/security/blog/2026/04/16/dissecting-sapphire-sleets-macos-intrusion-from-lure-to-compromise/","publisher":"Microsoft","context":"The article cites Microsoft's analysis of Sapphire Sleet's macOS intrusion techniques, including user-executed AppleScript or Terminal commands.","category":"","primary":false},{"title":"Inside Lazarus: How North Korea Uses AI to Industrialize Attacks on Developers","url":"https://expel.com/blog/inside-lazarus-how-north-korea-uses-ai-to-industrialize-attacks-on-developers/","publisher":"Expel","context":"The article cites Expel's research on North Korean use of generative AI, front companies, and developer-focused cryptocurrency theft campaigns.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers reported two malicious campaigns with similarities to the North Korea-linked Contagious Interview cluster, also known as Famous Chollima, HexagonalRodent, and Void Dokkaebi. Proofpoint detailed one campaign, tracked as UNK_DeadDrop, that used developer recruitment and code review themes to target nearly 100 organizations across finance, cryptocurrency, education, technology, and other sectors. The activity sent more than 250 emails over six weeks, with over 75% of targeted entities located in the United States.\u003c/p\u003e\n\n\u003cp\u003eThe UNK_DeadDrop campaign used links to actor-controlled GitHub repositories posing as technical assignments or cryptocurrency projects. Targets were instructed to clone the repositories and open them in VS Code or Cursor, where VS Code project behavior such as the “runOn: folderOpen” technique could trigger malicious code execution without further user interaction. The resulting infection chains delivered cross-platform loaders for macOS, Linux, and Windows and installed a malicious VS Code extension masquerading as a legitimate Google service.\u003c/p\u003e\n\n\u003cp\u003eThe malware supported remote command execution, system reconnaissance, and data theft from browser wallet extensions, credentials, and desktop wallet apps. Linux and macOS infections led to a custom version of the open-source Overlord framework, while the Windows chain used VBScript and CMD files to install the extension and exfiltrate ZIP files before cleaning up. The article also describes related malicious VS Code extensions, npm packages, Git hooks, Packagist compromise, and macOS social engineering campaigns tied or compared to North Korean developer-targeting operations.\u003c/p\u003e\n"},{"n":9,"title":"New attack turned Microsoft 365 Copilot into 1-click data theft tool","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-attack-turned-microsoft-365-copilot-into-1-click-data-theft-tool/","time":"13:00","priority":"SHOULD READ","score":88,"tldr":"Microsoft fixed a critical Microsoft 365 Copilot Enterprise flaw chain called SearchLeak that could let attackers steal emails, files, and other enterprise data when a victim clicked a crafted URL. The attack combined prompt injection, an HTML rendering race condition, and a Bing SSRF/CSP bypass to silently exfiltrate data through Copilot Search.","briefOverview":"\u003cp\u003eA critical vulnerability chain dubbed SearchLeak in Microsoft 365 Copilot Enterprise could allow attackers to steal sensitive data from a target’s mailbox, OneDrive, or SharePoint account through a specially crafted URL. The exfiltrated data could include email content such as access codes and passwords, calendar events and meeting details, documents, and other content accessible through Copilot Enterprise Search. Microsoft addressed the issue at the beginning of the month and assigned it CVE-2026-42824 with a critical severity rating.\u003c/p\u003e\n\n\u003cp\u003eVaronis researchers developed SearchLeak by chaining three weaknesses that were not sufficient for a meaningful attack on their own. The chain combined parameter-to-prompt injection, an HTML rendering race condition, and a content-security-policy bypass enabled by Bing server-side request forgery. The attack could begin when a victim clicked a crafted link, with Copilot then searching enterprise data sources and embedding stolen information into an image URL.\u003c/p\u003e\n\n\u003cp\u003eThe attack used Microsoft 365 Copilot Search’s q URL parameter to pass instructions without requiring the victim to type anything. While Copilot streamed its output, raw HTML could briefly render before being neutralized, allowing an image request to trigger. Bing’s Search by Image feature then fetched the attacker’s URL, bypassing CSP protections and allowing the attacker to read the stolen data from server request logs.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA critical vulnerability chain called SearchLeak affected Microsoft 365 Copilot Enterprise and could enable theft of sensitive data through a specially crafted URL. The data at risk included mailbox contents, OneDrive files, SharePoint content, calendar events, meeting details, documents, access codes, and passwords accessible through Copilot Enterprise Search. Microsoft fixed the issue at the beginning of the month and assigned it CVE-2026-42824 with a critical severity rating.\u003c/p\u003e\n\n\u003cp\u003eThe attack was developed by researchers at Varonis, who chained three flaws that were individually insufficient to enable a meaningful attack. The chain consisted of a parameter-to-prompt injection, an HTML rendering race condition, and a content-security-policy bypass enabled by Bing server-side request forgery. The researchers emphasized that familiar bug classes can become more powerful when prompt injection is possible in AI systems.\u003c/p\u003e\n\n\u003cp\u003eThe first stage exploited how Microsoft 365 Copilot Search accepts the q URL parameter for search queries. An attacker could craft a URL that instructed Copilot to search the user’s emails, extract data, and embed it in an image URL. The victim did not need to type a prompt; clicking the link was enough to start the chain.\u003c/p\u003e\n\n\u003cp\u003eThe second stage used an HTML rendering race condition during Copilot’s streamed response. Raw HTML could be temporarily rendered by the browser before it was wrapped inside neutralized code blocks. This allowed attacker-controlled HTML containing an image tag to execute and trigger outbound requests before sanitization completed.\u003c/p\u003e\n\n\u003cp\u003eThe third stage relied on an SSRF issue in Bing’s Search by Image feature, which fetched an image from the attacker’s endpoint. Because Bing made the request to retrieve content for Copilot to analyze, CSP protections were bypassed. The stolen data was embedded in the URL, and the attacker could read it from their server logs.\u003c/p\u003e\n\n\u003cp\u003eFrom the victim’s perspective, the article says the only visible sign was Copilot “thinking” for a moment, with no indication that data was being exfiltrated. No named threat actor was linked to the vulnerability chain in the article. Since Microsoft has fixed CVE-2026-42824, the article states that no user action is required to mitigate the threat.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSearchLeak is a critical vulnerability chain in Microsoft 365 Copilot Enterprise that could allow attackers to steal sensitive data from a target’s mailbox, OneDrive, or SharePoint account through a specially crafted URL. The issue was assigned CVE-2026-42824 and given a critical severity rating by Microsoft.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft addressed SearchLeak at the beginning of the month. The article states that, with Microsoft having fixed CVE-2026-42824, there is no user action required to mitigate the threat.\u003c/p\u003e\n\n\u003ch2 id=\"potentially-exposed-data\"\u003ePotentially Exposed Data\u003c/h2\u003e\n\n\u003cp\u003eThe article says the exfiltrated information could include data accessible through Copilot Enterprise Search, such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEmail content, including access codes and passwords.\u003c/li\u003e\n\u003cli\u003eCalendar events and meeting details.\u003c/li\u003e\n\u003cli\u003eDocuments.\u003c/li\u003e\n\u003cli\u003eContent from a victim’s mailbox, OneDrive, or SharePoint account.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis matters because Microsoft Copilot Enterprise Search is designed to search company data in emails, meetings, SharePoint files, and OneDrive rather than simply generate content like regular Copilot.\u003c/p\u003e\n\n\u003ch2 id=\"researcher-findings\"\u003eResearcher Findings\u003c/h2\u003e\n\n\u003cp\u003eResearchers at the enterprise data security company Varonis developed the SearchLeak attack chain. According to the article, they chained three weaknesses that were individually insufficient to enable a meaningful attack.\u003c/p\u003e\n\n\u003cp\u003eThe three components were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eParameter-to-prompt injection.\u003c/li\u003e\n\u003cli\u003eAn HTML rendering race condition.\u003c/li\u003e\n\u003cli\u003eA content-security-policy bypass enabled by Bing server-side request forgery.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eVaronis concluded that Bing became an unwitting exfiltration proxy because of an SSRF condition behind a CSP allowlist entry.\u003c/p\u003e\n\n\u003ch2 id=\"stage-one-parameter-to-prompt-injection\"\u003eStage One: Parameter-to-Prompt Injection\u003c/h2\u003e\n\n\u003cp\u003eThe first stage exploited how Microsoft 365 Copilot Search accepts the q URL parameter for search queries. An attacker could craft a URL that included instructions for Copilot to execute.\u003c/p\u003e\n\n\u003cp\u003eThe article gives an example in which the URL tells Copilot to search the user’s emails, extract the title, and embed it in an image URL. The victim would not need to type anything; clicking the link would cause Copilot to process the attacker’s instructions.\u003c/p\u003e\n\n\u003cp\u003eThis allowed an attacker to direct Copilot to search the victim’s mailbox or other data sources and format results in a specific way.\u003c/p\u003e\n\n\u003ch2 id=\"stage-two-html-rendering-race-condition\"\u003eStage Two: HTML Rendering Race Condition\u003c/h2\u003e\n\n\u003cp\u003eThe second stage exploited an HTML rendering race condition while Copilot streamed its output. According to the article, raw HTML was temporarily rendered by the browser before being wrapped inside neutralized code blocks.\u003c/p\u003e\n\n\u003cp\u003eThis temporary rendering window allowed attacker-controlled HTML containing an image tag to execute. The image tag could trigger outbound requests before the sanitization process completed.\u003c/p\u003e\n\n\u003ch2 id=\"stage-three-bing-ssrf-and-csp-bypass\"\u003eStage Three: Bing SSRF and CSP Bypass\u003c/h2\u003e\n\n\u003cp\u003eThe third stage used an SSRF issue in Bing’s Search by Image feature. In this part of the chain, Bing was used to fetch an image from the attacker’s endpoint.\u003c/p\u003e\n\n\u003cp\u003eBecause Bing made the request to retrieve content that Copilot should analyze, the content-security-policy protection was bypassed. The stolen data was embedded in the URL, and the attacker could retrieve it from server request logs.\u003c/p\u003e\n\n\u003ch2 id=\"end-to-end-attack-flow\"\u003eEnd-to-End Attack Flow\u003c/h2\u003e\n\n\u003cp\u003eThe complete attack chain began when the victim clicked a crafted link that launched Microsoft 365 Copilot Search. The link included instructions in the q parameter to search the victim’s mailbox or other data sources.\u003c/p\u003e\n\n\u003cp\u003eCopilot then generated a response containing an image tag, with the stolen information placed into the URL. While the response was being streamed, the browser rendered the image and sent a request to Bing.\u003c/p\u003e\n\n\u003cp\u003eBing then fetched the attacker’s URL, which included the stolen data. From the victim’s perspective, the article says Copilot appeared to be “thinking” briefly, with no indication that data was being exfiltrated.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-response\"\u003eAffected Parties and Response\u003c/h2\u003e\n\n\u003cp\u003eThe affected product was Microsoft 365 Copilot Enterprise, specifically the Copilot Enterprise Search functionality described in the article. The data sources potentially involved included mailbox content, OneDrive, and SharePoint.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft fixed CVE-2026-42824 at the beginning of the month. The article states that no user action is required to mitigate the threat because Microsoft has addressed it.\u003c/p\u003e\n\n\u003ch2 id=\"broader-security-significance-stated-in-the-article\"\u003eBroader Security Significance Stated in the Article\u003c/h2\u003e\n\n\u003cp\u003eVaronis emphasized that familiar, easily contained bug classes such as SSRF and HTML injection race conditions can become potent attacks when prompt injection is possible. The article concludes that AI systems have created new pathways to exploit older bug classes in contexts where they previously would not have been as impactful.\u003c/p\u003e\n\n\u003cp\u003eNo named threat actor is identified in the article as exploiting SearchLeak. The article focuses on the vulnerability chain, the research by Varonis, the technical mechanics of the attack, and Microsoft’s fix.\u003c/p\u003e\n","keyPoints":["A vulnerability chain dubbed SearchLeak in Microsoft 365 Copilot Enterprise could allow attackers to steal sensitive data from a victim's mailbox, OneDrive, or SharePoint account through a specially crafted URL.","Microsoft addressed SearchLeak at the beginning of the month and assigned it CVE-2026-42824 with a critical severity rating.","Varonis researchers developed SearchLeak by chaining a parameter-to-prompt injection, an HTML rendering race condition, and a content-security-policy bypass enabled by Bing server-side request forgery.","In the attack chain, a victim clicking a crafted link launches Microsoft 365 Copilot Search with instructions in the q parameter to search the victim’s data sources and generate a response containing an image tag with stolen information in the URL.","Because Bing fetches the attacker’s URL during the image request, the attacker can read the exfiltrated data from their server’s request logs."],"insights":["SearchLeak showed that individually limited issues, including SSRF and HTML injection race conditions, can become critical when combined with prompt injection in AI systems.","The attack required only a victim click on a crafted URL and did not require the victim to type a prompt or knowingly interact with sensitive data.","Microsoft 365 Copilot Search’s access to enterprise content made the impact broader than a traditional chatbot issue because the exfiltration target could include emails, calendar details, OneDrive files, and SharePoint content.","The CSP protection was undermined because Bing, an allowed service, acted as the request intermediary to the attacker-controlled endpoint."],"referencedReports":[],"body":"\u003cp\u003eA critical vulnerability chain dubbed SearchLeak in Microsoft 365 Copilot Enterprise could allow attackers to steal sensitive data from a target’s mailbox, OneDrive, or SharePoint account through a specially crafted URL. The exfiltrated data could include email content such as access codes and passwords, calendar events and meeting details, documents, and other content accessible through Copilot Enterprise Search. Microsoft addressed the issue at the beginning of the month and assigned it CVE-2026-42824 with a critical severity rating.\u003c/p\u003e\n\n\u003cp\u003eVaronis researchers developed SearchLeak by chaining three weaknesses that were not sufficient for a meaningful attack on their own. The chain combined parameter-to-prompt injection, an HTML rendering race condition, and a content-security-policy bypass enabled by Bing server-side request forgery. The attack could begin when a victim clicked a crafted link, with Copilot then searching enterprise data sources and embedding stolen information into an image URL.\u003c/p\u003e\n\n\u003cp\u003eThe attack used Microsoft 365 Copilot Search’s q URL parameter to pass instructions without requiring the victim to type anything. While Copilot streamed its output, raw HTML could briefly render before being neutralized, allowing an image request to trigger. Bing’s Search by Image feature then fetched the attacker’s URL, bypassing CSP protections and allowing the attacker to read the stolen data from server request logs.\u003c/p\u003e\n"},{"n":1,"title":"Emerging Threat: (CVE-2026-49975) Apache HTTP Server Denial of Service via HTTP/2 Memory Exhaustion","source":"cycognito.com","sourceColorIdx":2,"link":"https://www.cycognito.com/blog/emerging-threat-cve-2026-49975-apache-http-server-denial-of-service-via-http-2-memory-exhaustion/","time":"09:51","priority":"SHOULD READ","score":86,"tldr":"CVE-2026-49975 is a high-impact denial-of-service flaw in Apache HTTP Server’s HTTP/2 module that can let an unauthenticated remote attacker exhaust server memory with crafted requests. Organizations should upgrade Apache to 2.4.68 or later, verify downstream vendor patches, and mitigate exposed HTTP/2 services if patching is not immediately possible.","briefOverview":"\u003cp\u003eCVE-2026-49975 is a memory exhaustion vulnerability in the \u003ccode\u003emod_http2\u003c/code\u003e module of Apache HTTP Server that can allow a remote attacker to cause denial of service using malicious HTTP/2 requests. The issue is classified as CWE-789 and was publicly disclosed as part of an attack technique nicknamed the “HTTP/2 Bomb.” It has a CVSS v3.1 base score of 7.5, with an availability-only impact that can result in full loss of service.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects Apache HTTP Server versions 2.4.17 through 2.4.67, especially internet-facing web servers or reverse proxies with HTTP/2 enabled. The attack chains an HPACK compression bomb with an HTTP/2 flow-control hold to expand small compressed headers into larger internal objects and keep those memory allocations alive. Public reporting cited in the article says the attack can be launched from a single modest connection rather than a large botnet.\u003c/p\u003e\n\n\u003cp\u003eApache released version 2.4.68 on June 8, 2026, to fix CVE-2026-49975 along with other vulnerabilities. The article says distribution-level patching is uneven, with Red Hat and Debian issuing updates while related nginx handling has seen patch instability in at least one downstream package. Recommended actions include inventorying HTTP/2-enabled Apache httpd and nginx servers, limiting streams and headers, monitoring for held-open streams with memory growth, and disabling HTTP/2 where systems cannot be patched promptly.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCVE-2026-49975 is a denial-of-service vulnerability in Apache HTTP Server’s \u003ccode\u003emod_http2\u003c/code\u003e module. It allows an unauthenticated remote attacker with network access to a server with HTTP/2 enabled to trigger memory exhaustion through crafted HTTP/2 requests. The issue is classified as CWE-789, Memory Allocation with Excessive Size Value, and is associated with the “HTTP/2 Bomb” attack technique.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability has a CVSS v3.1 base score of 7.5, which the article describes as High in the National Vulnerability Database, while the Apache Software Foundation rated it Moderate in its own advisory. The scoring reflects an availability-only impact, with no confidentiality or integrity loss but a full loss of service. The article states that a server can become unresponsive within seconds.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the attack combines two legitimate HTTP/2 behaviors. An HPACK compression bomb causes the server to expand small compressed header inputs into much larger internal objects, while an HTTP/2 flow-control hold keeps the allocations alive instead of allowing them to be reclaimed. The article compares the flow-control hold aspect to a Slowloris-style approach and says public reporting indicates the attack can be launched from a single modest connection.\u003c/p\u003e\n\n\u003cp\u003eAffected Apache assets include versions 2.4.17 through 2.4.67, typically internet-facing web servers or reverse proxies with HTTP/2 enabled on TLS-terminated \u003ccode\u003eTCP/443\u003c/code\u003e. The article notes that HTTP/2 is on by default in many modern configurations, meaning exposure can exist even without explicit administrator opt-in. It also states that the broader HTTP/2 Bomb disclosure described similar behavior affecting other major server stacks, including nginx, Microsoft IIS, Envoy, and Cloudflare Pingora, though CVE-2026-49975 is the Apache-specific identifier.\u003c/p\u003e\n\n\u003cp\u003eCyCognito’s observed exposure data shows Communication Services leading at 24.9% of observed assets, followed by Information Technology at 18.0% and Health Care at 17.0%, with an “Others” bucket of 40.1%. The article attributes the Communication Services concentration to large, distributed web footprints and early adoption of HTTP/2 for performance. More broadly, it says the exposure pattern reflects the widespread deployment of Apache httpd and nginx as general-purpose web infrastructure.\u003c/p\u003e\n\n\u003cp\u003eApache HTTP Server 2.4.68, released on June 8, 2026, fixes CVE-2026-49975. The article says Red Hat issued updated \u003ccode\u003ehttpd\u003c/code\u003e packages for Red Hat Enterprise Linux and Debian published a security update through its LTS channel, but also warns that downstream fixes are uneven and should be verified by platform. Recommended actions include inventorying HTTP/2-enabled internet-facing servers, identifying endpoints advertising \u
