<script>
window.__DL_ARTICLES = [{"n":11,"title":"Cisco fixes SD-WAN vManage flaw exploited in zero-day attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisco-fixes-sd-wan-vmanage-flaw-exploited-in-zero-day-attacks/","time":"17:12","priority":"MUST READ","score":94,"tldr":"Cisco patched a Catalyst SD-WAN Manager zero-day, CVE-2026-20262, that attackers were exploiting to escalate to root privileges by abusing insufficient file upload validation. Customers are strongly urged to update affected deployments and check logs for suspicious index.jsp or .war file upload attempts.","briefOverview":"\u003cp\u003eCisco released security updates for a Catalyst SD-WAN Manager vulnerability tracked as CVE-2026-20262. The flaw was exploited in attacks to escalate to root privileges. Cisco said its Product Security Incident Response Team became aware of exploitation earlier this month and strongly advised customers to patch affected systems.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects all deployment types regardless of device configuration. This includes on-prem deployments, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud (Cisco Managed), and Cisco SD-WAN for Government (FedRAMP). Catalyst SD-WAN Manager, formerly SD-WAN vManage, is used by administrators to manage up to 6,000 SD-WAN devices from a single dashboard.\u003c/p\u003e\n\n\u003cp\u003eCisco said the issue stems from insufficient validation of user-supplied input during file uploads. A low-privilege remote attacker could send crafted HTTP requests to an affected API endpoint to create or overwrite files on the underlying operating system. Cisco also shared indicators of compromise and advised administrators to check specific SD-WAN logs for attempts to upload index.jsp and .war files.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco patched CVE-2026-20262, a vulnerability in Cisco Catalyst SD-WAN Manager that was exploited in zero-day attacks. The flaw could be used to escalate to root privileges on affected systems. Catalyst SD-WAN Manager was formerly known as SD-WAN vManage and allows administrators to manage up to 6,000 SD-WAN devices from one dashboard.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects all Catalyst SD-WAN Manager deployment types, regardless of device configuration. The affected deployment types named in the article include on-prem deployments, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud (Cisco Managed), and Cisco SD-WAN for Government (FedRAMP). Cisco listed fixed releases across multiple Catalyst SD-WAN release branches.\u003c/p\u003e\n\n\u003cp\u003eCisco said CVE-2026-20262 is caused by insufficient validation of user-supplied input during file uploads. According to Cisco, an authenticated remote attacker could exploit the web UI flaw by sending a crafted HTTP request to an affected API endpoint. A successful exploit could allow the attacker to create or overwrite any file on the filesystem, and that file could later be used to elevate to root.\u003c/p\u003e\n\n\u003cp\u003eCisco’s Product Security Incident Response Team became aware of exploitation of CVE-2026-20262 earlier this month. The company did not share details about the attacks, but it strongly advised customers to patch their systems. Cisco also provided indicators of compromise for administrators to review.\u003c/p\u003e\n\n\u003cp\u003eThe indicators of compromise focused on attempts to upload index.jsp and .war files. Cisco advised administrators to check SD-WAN vmanage-server, vmanage-appserver, and serviceproxy-access logs for those attempts. The article also notes that several other Cisco Catalyst SD-WAN flaws were flagged as exploited earlier in 2026, including CVE-2026-20133, CVE-2026-20128, CVE-2026-20122, CVE-2026-20182, and CVE-2026-20245.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCisco released security updates for a vulnerability in Cisco Catalyst SD-WAN Manager, tracked as CVE-2026-20262. The vulnerability was exploited in attacks to escalate to root privileges. Catalyst SD-WAN Manager was formerly known as SD-WAN vManage and is network management software that allows administrators to manage up to 6,000 SD-WAN devices from a single dashboard.\u003c/p\u003e\n\n\u003cp\u003eCisco said its Product Security Incident Response Team became aware of exploitation of CVE-2026-20262 earlier this month. The company strongly advised customers to patch their systems. Cisco did not share details about the attacks.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products-and-deployments\"\u003eAffected Products and Deployments\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the now-patched zero-day affects all deployment types, regardless of device configuration. The affected deployment types include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn-prem deployments\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud-Pro\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud (Cisco Managed)\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN for Government (FedRAMP)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCisco also listed fixed releases for multiple Catalyst SD-WAN release branches. The article identifies the following first fixed releases:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e20.9.9.2 for 20.9.9.1 and earlier\u003c/li\u003e\n\u003cli\u003e20.12.7.2 for 20.12.7.1 and earlier\u003c/li\u003e\n\u003cli\u003e20.15.4.5 for 20.15.4.4 and earlier\u003c/li\u003e\n\u003cli\u003e20.15.5.3 for 20.15.5.2 and earlier\u003c/li\u003e\n\u003cli\u003e20.18.3.1 for 20.18.3\u003c/li\u003e\n\u003cli\u003e26.1.1.2 for 26.1.1.1 and earlier\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eCisco said the issue stems from insufficient validation of user-supplied input during file uploads. The vulnerability is in the web UI of Cisco Catalyst SD-WAN Manager. Cisco said it could allow an authenticated, remote attacker to create a file or overwrite any file on the filesystem of an affected system.\u003c/p\u003e\n\n\u003cp\u003eAccording to Cisco, an attacker could exploit the vulnerability by sending a crafted HTTP request to an affected API endpoint. A successful exploit could allow the attacker to create or overwrite any file on the underlying operating system. Cisco said this file could later be used to elevate to root.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that low-privilege remote attackers could execute arbitrary commands as root by sending crafted HTTP requests to an affected API endpoint. The exploitation path described in the article involves file upload handling and the ability to create or overwrite files.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise-and-detection-guidance\"\u003eIndicators of Compromise and Detection Guidance\u003c/h2\u003e\n\n\u003cp\u003eCisco shared indicators of compromise even though it did not disclose details about the attacks. The article says administrators should check the following SD-WAN logs:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003evmanage-server logs\u003c/li\u003e\n\u003cli\u003evmanage-appserver logs\u003c/li\u003e\n\u003cli\u003eserviceproxy-access logs\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCisco warned administrators to look for attempts to upload the following file types or names:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eindex.jsp\u003c/li\u003e\n\u003cli\u003e.war files\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"response\"\u003eResponse\u003c/h2\u003e\n\n\u003cp\u003eCisco released security updates to address CVE-2026-20262. The company strongly advised customers to patch affected systems after becoming aware of exploitation. The article presents patching and log review as the main disclosed response actions.\u003c/p\u003e\n\n\u003ch2 id=\"related-cisco-sd-wan-exploitation-context\"\u003eRelated Cisco SD-WAN Exploitation Context\u003c/h2\u003e\n\n\u003cp\u003eThe article places CVE-2026-20262 among several other Cisco Catalyst SD-WAN vulnerabilities that were reported as exploited in 2026. In February, Cisco patched another Catalyst SD-WAN Manager information disclosure flaw, CVE-2026-20133, which was later flagged as actively exploited in late April.\u003c/p\u003e\n\n\u003cp\u003eTwo weeks after that, Cisco warned of two more flaws, CVE-2026-20128 and CVE-2026-20122, that were abused in the wild. Last month, Cisco also tagged a maximum-severity Catalyst SD-WAN Controller authentication-bypass flaw, CVE-2026-20182, as actively exploited as a zero-day to gain admin privileges on unpatched devices.\u003c/p\u003e\n\n\u003cp\u003eMore recently, in early June, Cisco warned of another unpatched Catalyst SD-WAN Manager zero-day, CVE-2026-20245, that was exploited in attacks and allowed attackers to gain root privileges.\u003c/p\u003e\n\n\u003ch2 id=\"broader-cisa-context\"\u003eBroader CISA Context\u003c/h2\u003e\n\n\u003cp\u003eThe article states that over the last several years, the Cybersecurity and Infrastructure Security Agency tagged 91 Cisco vulnerabilities as abused in the wild. Five of those were in Cisco Catalyst SD-WAN Manager. Six others were exploited in ransomware attacks.\u003c/p\u003e\n","keyPoints":["Cisco released security updates for CVE-2026-20262, a Catalyst SD-WAN Manager vulnerability that was exploited in attacks to escalate to root privileges.","CVE-2026-20262 affects all Catalyst SD-WAN Manager deployment types, including on-prem deployments, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government.","Cisco said the vulnerability is caused by insufficient validation of user-supplied input during file uploads, allowing low-privilege remote attackers to create or overwrite files by sending crafted HTTP requests to an affected API endpoint.","Cisco strongly advised customers to patch their systems after its Product Security Incident Response Team became aware of exploitation earlier this month.","Cisco shared indicators of compromise advising administrators to check SD-WAN vmanage-server, vmanage-appserver, and serviceproxy-access logs for attempts to upload index.jsp and .war files."],"insights":["Administrators should treat exposure broadly because Cisco says CVE-2026-20262 affects all deployment types regardless of device configuration.","The most actionable detection guidance in the article is to review vmanage-server, vmanage-appserver, and serviceproxy-access logs specifically for index.jsp and .war upload attempts.","This flaw is part of a repeated pattern of actively exploited Catalyst SD-WAN vulnerabilities in 2026, including CVE-2026-20133, CVE-2026-20128, CVE-2026-20122, CVE-2026-20182, and CVE-2026-20245.","The vulnerability can be exploited by a low-privilege authenticated remote attacker, making compromised or misused non-admin accounts a potential path to root access."],"referencedReports":[{"title":"Cisco Catalyst SD-WAN Manager Arbitrary File Write Vulnerability","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-sdwan-arbfw-c2rZvQ","publisher":"Cisco","context":"The article cites Cisco's Monday advisory as the source describing CVE-2026-20262 and how attackers could create or overwrite files on affected systems.","category":"","primary":false}],"body":"\u003cp\u003eCisco released security updates for a Catalyst SD-WAN Manager vulnerability tracked as CVE-2026-20262. The flaw was exploited in attacks to escalate to root privileges. Cisco said its Product Security Incident Response Team became aware of exploitation earlier this month and strongly advised customers to patch affected systems.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects all deployment types regardless of device configuration. This includes on-prem deployments, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud (Cisco Managed), and Cisco SD-WAN for Government (FedRAMP). Catalyst SD-WAN Manager, formerly SD-WAN vManage, is used by administrators to manage up to 6,000 SD-WAN devices from a single dashboard.\u003c/p\u003e\n\n\u003cp\u003eCisco said the issue stems from insufficient validation of user-supplied input during file uploads. A low-privilege remote attacker could send crafted HTTP requests to an affected API endpoint to create or overwrite files on the underlying operating system. Cisco also shared indicators of compromise and advised administrators to check specific SD-WAN logs for attempts to upload index.jsp and .war files.\u003c/p\u003e\n"},{"n":16,"title":"OptinMonster WordPress plugin hacked in CDN supply-chain attack","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/optinmonster-wordpress-plugin-hacked-in-cdn-supply-chain-attack/","time":"17:37","priority":"MUST READ","score":94,"tldr":"Awesome Motive’s CDN was compromised after attackers stole a CDN API key, causing OptinMonster, TrustPulse, and PushEngage sites to load malicious JavaScript that created rogue WordPress admin accounts and backdoors. Site owners should check for unauthorized admin users and hidden plugins, run malware scans, and rotate credentials.","briefOverview":"\u003cp\u003eWordPress plugins OptinMonster, TrustPulse, and PushEngage were compromised in a supply-chain attack involving Awesome Motive’s content distribution network. OptinMonster is the most widely used of the three, with at least 1.2 million websites using it. Sansec discovered the attack over the weekend and reported that malicious scripts were served to affected users during specific time windows.\u003c/p\u003e\n\n\u003cp\u003eThe malicious code activated when a WordPress administrator visited a page on an infected website. It collected authentication tokens and nonces, used them to create a rogue administrator account, and then installed a self-hiding backdoor plugin. The backdoor provided remote access capabilities, including a web shell named “WPM File Manager \u0026amp; Shell” and arbitrary PHP code execution.\u003c/p\u003e\n\n\u003cp\u003eAwesome Motive said attackers gained access to a marketing server by exploiting a known flaw in the UpdraftPlus WordPress plugin and then stole credentials for the company’s CDN account. Using the stolen CDN API key, the attackers modified JavaScript files served through Awesome Motive’s CDN. The company said it remediated the marketing site, moved it to a new server, rotated credentials, and found no evidence that account data or personal details held by it were accessed.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eWordPress plugins OptinMonster, TrustPulse, and PushEngage were compromised in a supply-chain attack affecting Awesome Motive’s content distribution network. OptinMonster is described as a lead-generation and conversion optimization platform used by at least 1.2 million websites. Sansec discovered the attack over the weekend and reported that malicious scripts were served to unsuspecting OptinMonster and TrustPulse users on Friday between 22:17 UTC and 22:42 UTC.\u003c/p\u003e\n\n\u003cp\u003ePushEngage continued to serve malicious JavaScript code until 19:02 UTC on Saturday. The malware triggered only when a WordPress administrator visited a page on an infected website. It collected authentication tokens and nonces and used them to create a rogue administrator account.\u003c/p\u003e\n\n\u003cp\u003eAfter creating access, the intruders installed a self-hiding backdoor plugin and established communication with a domain impersonating Tidio to send newly captured data. The plugin provided full remote access capabilities, including a web shell called “WPM File Manager \u0026amp; Shell” and arbitrary PHP code execution. Sansec said the operator rotated the plugin’s disguise while keeping the logic byte-identical, observing names such as “Content Delivery Helper” and “Database Optimizer.”\u003c/p\u003e\n\n\u003cp\u003eAwesome Motive published a security advisory saying hackers accessed a server in its environment after exploiting a known flaw in the UpdraftPlus WordPress plugin. The server hosted a marketing website and was not connected to the company’s production infrastructure or data systems, but it contained credentials for the company’s CDN account. The attackers stole the CDN API key and used it to modify JavaScript files distributed via Awesome Motive’s CDN.\u003c/p\u003e\n\n\u003cp\u003eAwesome Motive listed affected OptinMonster and TrustPulse CDN JavaScript files and said the malicious scripts were served for a short period on June 12 for OptinMonster and TrustPulse, without confirming the PushEngage impact. The company said it remediated the marketing site, migrated it to a new server, and rotated all credentials, including the CDN API key. It also stated that its application servers, source code, plugin hosting servers, and systems storing OptinMonster and TrustPulse account information were not breached.\u003c/p\u003e\n\n\u003cp\u003eSite owners who may have been affected were advised to remove rogue administrator accounts named “developer_api1” or “dev_xxxxxx,” inspect wp-content/plugins for hidden backdoor plugins, run server-side malware scans, and rotate administrator passwords, API keys, database credentials, and WordPress security salts. The article notes that although the malicious CDN content was removed, attackers may still retain access where rogue administrator accounts and hidden backdoor plugins remain present.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eWordPress plugins OptinMonster, TrustPulse, and PushEngage were compromised in a supply-chain attack impacting Awesome Motive’s content distribution network. OptinMonster is the most popular of the three affected products and is used by at least 1.2 million websites.\u003c/p\u003e\n\n\u003cp\u003eE-commerce security firm Sansec discovered the attack over the weekend. According to the article, malicious scripts were served to unsuspecting OptinMonster and TrustPulse users on Friday between 22:17 UTC and 22:42 UTC. PushEngage continued to serve malicious JavaScript code until 19:02 UTC on Saturday.\u003c/p\u003e\n\n\u003ch2 id=\"attack-behavior\"\u003eAttack behavior\u003c/h2\u003e\n\n\u003cp\u003eThe malware triggered only when a WordPress administrator visited a page on an infected website. Once triggered, it collected authentication tokens and nonces and used them to create a rogue administrator account.\u003c/p\u003e\n\n\u003cp\u003eThe intruders then installed a self-hiding backdoor plugin. They also established a communication channel with a domain impersonating Tidio to send newly captured data.\u003c/p\u003e\n\n\u003cp\u003eThe backdoor plugin provided full remote access capabilities, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA web shell named “WPM File Manager \u0026amp; Shell.”\u003c/li\u003e\n\u003cli\u003eArbitrary PHP code execution.\u003c/li\u003e\n\u003cli\u003eFull control of compromised websites.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSansec said the operator rotated the plugin’s disguise while keeping the logic byte-identical across renames. The backdoor was observed shipping as “Content Delivery Helper” with the slug \u003ccode\u003econtent-delivery-helper\u003c/code\u003e and version 2.7.1, and currently as “Database Optimizer” with the slug \u003ccode\u003edatabase-optimizer\u003c/code\u003e and version 2.9.4.\u003c/p\u003e\n\n\u003ch2 id=\"how-awesome-motive-said-the-compromise-happened\"\u003eHow Awesome Motive said the compromise happened\u003c/h2\u003e\n\n\u003cp\u003eAwesome Motive published a security advisory explaining that hackers gained access to a server in its environment after exploiting a known flaw in the UpdraftPlus WordPress plugin. The server hosted a marketing website and was not connected to the company’s production infrastructure or data systems.\u003c/p\u003e\n\n\u003cp\u003eHowever, that server hosted credentials for the company’s CDN account. The hackers stole those credentials, including the CDN API key, and used the stolen CDN API key to modify JavaScript files distributed via Awesome Motive’s CDN.\u003c/p\u003e\n\n\u003cp\u003eAs a result, websites silently loaded malicious code directly from the CDN.\u003c/p\u003e\n\n\u003ch2 id=\"affected-cdn-files\"\u003eAffected CDN files\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the affected files as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003ea.omappapi.com/app/js/api.min.js\u003c/code\u003e for OptinMonster.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ea.opmnstr.com/app/js/api.min.js\u003c/code\u003e for OptinMonster.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ea.optnmstr.com/app/js/api.min.js\u003c/code\u003e for OptinMonster.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ea.trstplse.com/app/js/api.min.js\u003c/code\u003e for TrustPulse.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAwesome Motive said the malicious scripts were served for a short period on June 12 for OptinMonster and TrustPulse. The article notes that Awesome Motive did not confirm the impact on PushEngage, while Sansec reported PushEngage served malicious JavaScript until 19:02 UTC on Saturday.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-response-and-impact\"\u003eDisclosed response and impact\u003c/h2\u003e\n\n\u003cp\u003eAwesome Motive said it remediated the marketing site, migrated it to a new server, and rotated all credentials, including the CDN API key. The company also said its application servers, source code, and plugin hosting servers were not compromised.\u003c/p\u003e\n\n\u003cp\u003eAwesome Motive stated that the systems storing OptinMonster and TrustPulse account information are hosted separately and were not breached. It also said it had no evidence that account data or personal details held by the company were accessed.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions-for-site-owners\"\u003eRecommended actions for site owners\u003c/h2\u003e\n\n\u003cp\u003eThe article says potentially affected site owners are recommended to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCheck for and remove rogue administrator accounts named \u003ccode\u003edeveloper_api1\u003c/code\u003e or \u003ccode\u003edev_xxxxxx\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eInspect the filesystem directly under \u003ccode\u003ewp-content/plugins\u003c/code\u003e for hidden backdoor plugins.\u003c/li\u003e\n\u003cli\u003eRun server-side malware scans.\u003c/li\u003e\n\u003cli\u003eRotate administrator passwords, API keys, database credentials, and WordPress security salts.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAlthough the malicious CDN content has been removed, the article emphasizes that attackers can continue to access compromised websites if the rogue administrator accounts and hidden backdoor plugins remain in place.\u003c/p\u003e\n","keyPoints":["WordPress plugins OptinMonster, TrustPulse, and PushEngage were compromised in a supply-chain attack affecting Awesome Motive's content distribution network.","Sansec found that malicious scripts were served to OptinMonster and TrustPulse users on Friday between 22:17 UTC and 22:42 UTC, while PushEngage continued serving malicious JavaScript until 19:02 UTC on Saturday.","The malware triggered when a WordPress administrator visited an infected site, collected authentication tokens and nonces, and used them to create a rogue administrator account.","Attackers installed a self-hiding backdoor plugin with remote access features including a web shell named “WPM File Manager \u0026 Shell” and arbitrary PHP code execution.","Awesome Motive said attackers exploited a known flaw in the UpdraftPlus WordPress plugin on a marketing server, stole a CDN API key, and used it to modify JavaScript files served through its CDN."],"insights":["The malicious JavaScript only activated when a WordPress administrator visited an infected site, making administrator activity the trigger for account takeover and backdoor installation.","Removing the tampered CDN content is not sufficient because attackers may retain access through rogue administrator accounts and hidden backdoor plugins already deployed on compromised sites.","The backdoor plugin changed its visible name and disguise, including “Content Delivery Helper” and “Database Optimizer,” while keeping the same underlying logic.","A server described as separate from production still exposed the broader ecosystem because it contained CDN account credentials that attackers could use to alter scripts served to customer websites."],"referencedReports":[{"title":"OptinMonster supply-chain attack","url":"https://sansec.io/research/optinmonster-supply-chain-attack","publisher":"Sansec","context":"The article cites Sansec’s research for details on the malicious scripts, backdoor plugin behavior, and plugin disguises used in the campaign.","category":"","primary":false},{"title":"Security Incident: Tampered Script Served via OptinMonster and TrustPulse","url":"https://optinmonster.com/security-incident-tampered-script-served-via-optinmonster-and-trustpulse/","publisher":"Awesome Motive","context":"The article references Awesome Motive’s security advisory explaining how attackers obtained the CDN API key and what systems were or were not compromised.","category":"","primary":false}],"body":"\u003cp\u003eWordPress plugins OptinMonster, TrustPulse, and PushEngage were compromised in a supply-chain attack involving Awesome Motive’s content distribution network. OptinMonster is the most widely used of the three, with at least 1.2 million websites using it. Sansec discovered the attack over the weekend and reported that malicious scripts were served to affected users during specific time windows.\u003c/p\u003e\n\n\u003cp\u003eThe malicious code activated when a WordPress administrator visited a page on an infected website. It collected authentication tokens and nonces, used them to create a rogue administrator account, and then installed a self-hiding backdoor plugin. The backdoor provided remote access capabilities, including a web shell named “WPM File Manager \u0026amp; Shell” and arbitrary PHP code execution.\u003c/p\u003e\n\n\u003cp\u003eAwesome Motive said attackers gained access to a marketing server by exploiting a known flaw in the UpdraftPlus WordPress plugin and then stole credentials for the company’s CDN account. Using the stolen CDN API key, the attackers modified JavaScript files served through Awesome Motive’s CDN. The company said it remediated the marketing site, moved it to a new server, rotated credentials, and found no evidence that account data or personal details held by it were accessed.\u003c/p\u003e\n"},{"n":30,"title":"Chinese Hackers Abused Google Workspace Rules to Steal Research and Defense Emails","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/chinese-hackers-abused-google-workspace.html","time":"19:44","priority":"MUST READ","score":94,"tldr":"A China-linked group, UNC6508, compromised REDCap research servers at North American medical, academic, and military-related organizations, then used stolen admin access to create Google Workspace content compliance rules that silently copied sensitive emails to an attacker-controlled inbox. The key lesson is to audit built-in cloud mail routing and forwarding rules, because legitimate admin features can become stealthy exfiltration channels once attackers gain privileged access.","briefOverview":"\u003cp\u003eA China-linked espionage group tracked by Google as UNC6508 compromised North American medical, academic, and military research networks for more than a year. Google’s Threat Intelligence Group said the campaign targeted organizations in the United States and Canada, including clinical providers, academic centers, military health institutions, advocacy groups, and health regulators. Google said it notified affected organizations and disrupted the group’s infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe entry point was compromised externally facing REDCap research servers, where the attackers deployed custom malware called INFINITERED. The malware trojanized REDCap system files, harvested usernames and passwords from the login page, and acted as a backdoor using HTTP cookies. After moving through internal networks and obtaining administrator access, the attackers abused Google Workspace content compliance rules to silently copy keyword-matching emails to an attacker-controlled Gmail account.\u003c/p\u003e\n\n\u003cp\u003eThe email theft was notable because it used a legitimate cloud mail feature rather than a separate exfiltration tool or unusual network traffic. The rule watched for nearly 150 keywords, search terms, and email addresses tied to topics such as military strategy, advanced technology, offensive cyber programs, and medical research. The article recommends patching and removing old REDCap versions, reviewing Workspace content compliance and forwarding rules, checking admin audit logs, hunting for INFINITERED indicators, and using phishing-resistant MFA for administrator accounts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGoogle’s Threat Intelligence Group reported that a China-linked espionage cluster it tracks as UNC6508 hid inside North American medical, academic, and military research networks for more than a year. The campaign affected multiple organizations across the United States and Canada, including clinical providers, academic centers, military health institutions, advocacy groups, and health regulators. Google said it notified the victims and disrupted the group’s infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe attackers gained access through externally facing REDCap servers, a platform used by hospitals and universities to build and manage study databases. Google has not identified the initial access vector, named a specific CVE, or listed affected versions, though it observed the group probing older vulnerable versions. The earliest known compromise dates to September 2023, and activity continued through November 2025.\u003c/p\u003e\n\n\u003cp\u003eAround three months after initial access, UNC6508 deployed custom malware that GTIG calls INFINITERED. The malware trojanized REDCap system files, hijacked the upgrade process so new REDCap versions reinjected the malicious code, harvested usernames and passwords from the login page, and acted as a backdoor that accepted commands through HTTP cookies. Once on the server, the group conducted reconnaissance and credential discovery, collected database and service account credentials, and moved into the internal network and then to a domain administrator account.\u003c/p\u003e\n\n\u003cp\u003eWith administrator access, UNC6508 abused Google Workspace content compliance rules to exfiltrate email. The attackers created a rule misspelled “Patroit” that monitored nearly 150 keywords, search terms, and email addresses, then silently BCC’d matching messages to an attacker-controlled Gmail address. Google has since disabled that Gmail account.\u003c/p\u003e\n\n\u003cp\u003eThe rule’s terms aligned with the group’s collection priorities, including geo-strategic policy, military strategy and equipment, advanced technology such as AI and uncrewed vehicles, offensive cyber programs, and medical research. One specific term was chikungunya, a mosquito-borne virus connected in the article to a 2025 outbreak in China’s Guangdong province. GTIG noted that MITRE already catalogs email-forwarding-rule abuse, but said this use of domain content compliance rules was a method it had not seen from a China-linked actor before.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends patching externally facing REDCap servers and removing old versions, because REDCap can allow legacy versions to run side-by-side with current builds. It also recommends reviewing Google Workspace or equivalent content compliance and forwarding rules for external rerouting, checking admin audit logs for rule changes, using GTIG’s indicators to hunt for INFINITERED, and applying phishing-resistant MFA to administrator accounts. The central defensive concern is that once attackers obtain admin access, a built-in cloud mail feature can become a quiet email exfiltration path.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGoogle’s Threat Intelligence Group reported a China-linked espionage campaign attributed with high confidence to a cluster it tracks as UNC6508. The group compromised North American medical, academic, and military research networks and remained inside some environments for more than a year. The campaign focused on stealing sensitive research and defense-related email.\u003c/p\u003e\n\n\u003cp\u003eThe affected organizations were not named. Google described them as multiple organizations across the United States and Canada, including clinical providers, academic centers, military health institutions, advocacy groups, and health regulators. Google said it notified affected organizations and disrupted the group’s infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"initial-access-and-redcap-compromise\"\u003eInitial Access and REDCap Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe entry point was REDCap, or Research Electronic Data Capture, a web platform used by hospitals and universities to build and manage study databases. UNC6508 compromised externally facing REDCap servers. Google has not identified the initial access vector, named a specific CVE, or listed affected REDCap versions, although it observed the group probing older vulnerable versions.\u003c/p\u003e\n\n\u003cp\u003eThe earliest known compromise dates to September 2023, with activity continuing through November 2025. Around three months after gaining access, UNC6508 deployed custom malware that Google calls INFINITERED.\u003c/p\u003e\n\n\u003ch2 id=\"infinitered-malware-capabilities\"\u003eINFINITERED Malware Capabilities\u003c/h2\u003e\n\n\u003cp\u003eINFINITERED trojanized REDCap’s own system files and performed three main functions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt hijacked the REDCap upgrade process so that each new REDCap version reinjected the malicious code instead of removing it.\u003c/li\u003e\n\u003cli\u003eIt harvested usernames and passwords from the login page and stored them, encrypted, in local database tables.\u003c/li\u003e\n\u003cli\u003eIt acted as a backdoor by accepting commands through HTTP cookies and running on every page load.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAfter establishing access on the REDCap server, UNC6508 performed internal reconnaissance and credential discovery. The group collected database and service account credentials, used those logins to move into the internal network, and ultimately reached a domain administrator account. Google did not describe the exact path used to obtain the administrator account.\u003c/p\u003e\n\n\u003ch2 id=\"email-exfiltration-through-google-workspace-rules\"\u003eEmail Exfiltration Through Google Workspace Rules\u003c/h2\u003e\n\n\u003cp\u003eThe most notable part of the campaign was the email exfiltration method. Instead of using malware on the mail server, a separate exfiltration tool, or traffic that would appear unusual on the network, UNC6508 abused a legitimate Google Workspace administrative feature.\u003c/p\u003e\n\n\u003cp\u003eThe group used content compliance rules, which can scan mail for keywords and copy or forward matching messages. The attackers created a rule misspelled “Patroit” that watched for nearly 150 keywords, search terms, and email addresses. When a message matched the rule, Google Workspace silently BCC’d it to an attacker-controlled Gmail address, which Google later disabled.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that similar features exist in other cloud mail suites. It also states that MITRE already catalogs email-forwarding-rule abuse as a known technique, but GTIG identified the use of domain content compliance rules as a method it had not previously seen from a China-linked actor.\u003c/p\u003e\n\n\u003ch2 id=\"collection-priorities-reflected-in-keywords\"\u003eCollection Priorities Reflected in Keywords\u003c/h2\u003e\n\n\u003cp\u003eThe Workspace rule’s keywords reflected UNC6508’s collection priorities. The article lists several targeted themes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGeo-strategic policy.\u003c/li\u003e\n\u003cli\u003eMilitary strategy and equipment.\u003c/li\u003e\n\u003cli\u003eAdvanced technology, including AI and uncrewed vehicles.\u003c/li\u003e\n\u003cli\u003eOffensive cyber programs.\u003c/li\u003e\n\u003cli\u003eMedical research.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eOne keyword stood out for its specificity: chikungunya. The article describes chikungunya as a mosquito-borne virus behind a 2025 outbreak in China’s Guangdong province.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe campaign enabled the theft of sensitive research and defense email from targeted organizations. The article emphasizes that the exfiltration path used the victims’ own Google Workspace rules, making the activity different from malware-based mail theft or network-heavy data exfiltration.\u003c/p\u003e\n\n\u003cp\u003eGoogle said it notified affected organizations, disrupted UNC6508’s infrastructure, and disabled the attacker-controlled Gmail address used for receiving copied messages.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-recommendations-in-the-article\"\u003eDefensive Recommendations in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends starting with REDCap security. Organizations should patch externally facing REDCap servers and remove old versions rather than only installing current builds alongside them. This is important because REDCap can allow legacy versions to run side-by-side, enabling downgrade attacks in which attackers force software back to a known-vulnerable release.\u003c/p\u003e\n\n\u003cp\u003eThe article also recommends reviewing cloud mail configurations. For Google Workspace or equivalent environments, defenders should inspect content compliance rules and mail-forwarding rules for any configuration that BCCs or reroutes mail to external addresses. The article specifically says defenders should check admin audit logs to determine when rules changed, not just review the current rule state.\u003c/p\u003e\n\n\u003cp\u003eAdditional recommended actions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePulling GTIG’s published indicators and hunting for INFINITERED.\u003c/li\u003e\n\u003cli\u003eApplying phishing-resistant MFA to administrator accounts.\u003c/li\u003e\n\u003cli\u003eAuditing built-in cloud mail features as potential exfiltration paths once attackers obtain administrative access.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe campaign shows that after obtaining administrator access, attackers can turn legitimate cloud administration features into quiet exfiltration mechanisms. In this case, UNC6508 used compromised REDCap servers and INFINITERED to collect credentials and move through victim environments, then used Google Workspace content compliance rules to copy sensitive emails matching targeted keywords to an attacker-controlled inbox.\u003c/p\u003e\n","keyPoints":["Google's Threat Intelligence Group attributed a campaign against North American medical, academic, and military research networks with high confidence to the China-linked cluster UNC6508.","UNC6508 compromised externally facing REDCap servers and deployed custom malware called INFINITERED, which trojanized REDCap system files, harvested usernames and passwords, and acted as a backdoor through HTTP cookies.","The earliest known compromise dates to September 2023, with activity continuing through November 2025 across multiple organizations in the United States and Canada.","After gaining administrator access, UNC6508 abused Google Workspace content compliance rules to silently BCC messages matching nearly 150 keywords, search terms, and email addresses to an attacker-controlled Gmail account.","Google said it notified affected organizations, disrupted the group's infrastructure, and disabled the attacker-controlled Gmail address used for email exfiltration."],"insights":["The exfiltration method was difficult to detect through network monitoring because it used a legitimate Google Workspace admin feature rather than malware, a separate exfiltration tool, or unusual outbound traffic.","REDCap legacy versions can remain usable side-by-side with current versions, making removal of old versions as important as patching to prevent downgrade-based abuse.","Auditing current mail rules alone is insufficient because the article specifically recommends checking admin audit logs to identify when content compliance or forwarding rules were changed.","The attackers’ keyword list revealed collection priorities beyond general espionage, including a highly specific medical-research interest in chikungunya during a 2025 Guangdong outbreak."],"referencedReports":[{"title":"PRC Targets US Medical Research","url":"https://cloud.google.com/blog/topics/threat-intelligence/prc-targets-us-medical-research","publisher":"Google Threat Intelligence Group","context":"The article says Google Threat Intelligence Group laid out the UNC6508 campaign in this report and uses it as the main source for the described activity.","category":"","primary":false}],"body":"\u003cp\u003eA China-linked espionage group tracked by Google as UNC6508 compromised North American medical, academic, and military research networks for more than a year. Google’s Threat Intelligence Group said the campaign targeted organizations in the United States and Canada, including clinical providers, academic centers, military health institutions, advocacy groups, and health regulators. Google said it notified affected organizations and disrupted the group’s infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe entry point was compromised externally facing REDCap research servers, where the attackers deployed custom malware called INFINITERED. The malware trojanized REDCap system files, harvested usernames and passwords from the login page, and acted as a backdoor using HTTP cookies. After moving through internal networks and obtaining administrator access, the attackers abused Google Workspace content compliance rules to silently copy keyword-matching emails to an attacker-controlled Gmail account.\u003c/p\u003e\n\n\u003cp\u003eThe email theft was notable because it used a legitimate cloud mail feature rather than a separate exfiltration tool or unusual network traffic. The rule watched for nearly 150 keywords, search terms, and email addresses tied to topics such as military strategy, advanced technology, offensive cyber programs, and medical research. The article recommends patching and removing old REDCap versions, reviewing Workspace content compliance and forwarding rules, checking admin audit logs, hunting for INFINITERED indicators, and using phishing-resistant MFA for administrator accounts.\u003c/p\u003e\n"},{"n":6,"title":"Splunk Enterprise Unauthenticated Arbitrary File Operations/RCE (CVE-2026-20253): Overview and Takeaways","source":"netspi.com","sourceColorIdx":5,"link":"https://www.netspi.com/blog/executive-blog/critical-vulnerability/cve-2026-20253-splunk-enterprise-overview-and-takeaways/","time":"17:52","priority":"MUST READ","score":93,"tldr":"Splunk disclosed a critical unauthenticated file operation vulnerability in Splunk Enterprise 10.0.x and 10.2.x that can be chained to remote code execution, with public proof-of-concept code available. Affected organizations should upgrade immediately to 10.0.7 or 10.2.4, as Splunk says there are no workarounds.","briefOverview":"\u003cp\u003eSplunk disclosed CVE-2026-20253 on June 10, 2026, affecting Splunk Enterprise versions in the 10.0.x and 10.2.x branches. The vulnerability is rated critical with a CVSSv3.1 score of 9.8. It is an unauthenticated network issue requiring no user interaction.\u003c/p\u003e\n\n\u003cp\u003eThe flaw stems from a PostgreSQL sidecar service endpoint that lacks authentication controls. The article says any network-reachable attacker can invoke arbitrary file creation or truncation operations without credentials. Researchers have demonstrated that this file-write primitive can be chained into remote code execution by abusing PostgreSQL’s \u003ccode\u003elo_export\u003c/code\u003e function to write and execute malicious scripts on the Splunk server.\u003c/p\u003e\n\n\u003cp\u003eAffected Splunk Enterprise 10.2.x deployments should upgrade to 10.2.4 or later, and affected 10.0.x deployments should upgrade to 10.0.7 or later. Splunk Enterprise 10.4.x and Splunk Cloud Platform are not affected, with the article noting that Splunk Cloud does not use PostgreSQL sidecars. Splunk has stated that no mitigations or workarounds exist, making patching the only remediation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSplunk disclosed CVE-2026-20253 on June 10, 2026, as a critical vulnerability affecting Splunk Enterprise versions in the 10.0.x and 10.2.x branches. The article describes the issue as an unauthenticated arbitrary file operations vulnerability that can lead to remote code execution. Splunk assigned it a CVSSv3.1 score of 9.8, with network attack vector, low complexity, no privileges required, and no user interaction required.\u003c/p\u003e\n\n\u003cp\u003eThe root cause is missing authentication for a critical function, tracked as CWE-306. Specifically, a PostgreSQL sidecar service endpoint performs no credential verification. Because of this, any network-reachable user can invoke file operations without credentials, including arbitrary file creation and truncation on the Splunk server filesystem.\u003c/p\u003e\n\n\u003cp\u003eThe article states that researchers demonstrated a path from the file-write primitive to remote code execution. The chain abuses PostgreSQL’s \u003ccode\u003elo_export\u003c/code\u003e function to write malicious scripts and subsequently execute them on the Splunk server. The potential impact also includes service disruption through destruction or corruption of critical database files and potential lateral movement from a compromised Splunk server into monitored environments.\u003c/p\u003e\n\n\u003cp\u003eThe affected products are Splunk Enterprise 10.2.0 through 10.2.3, fixed in 10.2.4, and Splunk Enterprise 10.0.0 through 10.0.6, fixed in 10.0.7. Splunk Enterprise 10.4.x is not affected, with 10.4.0 described as the baseline fixed version. Splunk Cloud Platform is also not affected because it does not use PostgreSQL sidecars.\u003c/p\u003e\n\n\u003cp\u003eNo active exploitation in the wild had been reported at the time of writing, but the article notes that a public proof of concept is available on GitHub. It says exploitation attempts are a near-term probability for internet-exposed or inadequately segmented Splunk deployments. Splunk has not published indicators of compromise, so the article recommends log review, filesystem auditing, and process monitoring.\u003c/p\u003e\n\n\u003cp\u003eThe response guidance emphasizes immediate patching because Splunk has stated that no mitigations or workarounds exist. If patching is delayed, the article recommends restricting network access to Splunk management interfaces and the PostgreSQL sidecar service to trusted IP ranges only. It also recommends network segmentation, filesystem monitoring, and treating affected internet-facing or insufficiently segmented instances as high risk until patched.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSplunk disclosed CVE-2026-20253 on June 10, 2026. The vulnerability affects Splunk Enterprise versions in the 10.0.x and 10.2.x branches. The article describes it as an unauthenticated arbitrary file operations vulnerability that can be chained into remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability has a critical severity rating of 9.8 under CVSSv3.1. The listed vector is AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H, meaning the issue is network-exploitable, low complexity, requires no privileges, and requires no user interaction. The article emphasizes that no active exploitation in the wild had been reported at the time of writing, but a public proof of concept is available on GitHub.\u003c/p\u003e\n\n\u003ch2 id=\"technical-cause\"\u003eTechnical Cause\u003c/h2\u003e\n\n\u003cp\u003eThe root cause is missing authentication for a critical function, identified as CWE-306. The article states that a PostgreSQL sidecar service endpoint completely lacks authentication controls. As a result, any network-reachable attacker can invoke arbitrary file creation or truncation operations without credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that the vulnerable endpoint allows arbitrary file creation and truncation on the Splunk server filesystem. This creates a file-write primitive that researchers have demonstrated can be chained into remote code execution. The demonstrated chain abuses PostgreSQL’s \u003ccode\u003elo_export\u003c/code\u003e function to write malicious scripts and subsequently execute them on the Splunk server.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several impacts from CVE-2026-20253:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnauthenticated arbitrary file creation and truncation on the Splunk server filesystem.\u003c/li\u003e\n\u003cli\u003eRemote code execution via PostgreSQL \u003ccode\u003elo_export\u003c/code\u003e abuse and malicious database restoration.\u003c/li\u003e\n\u003cli\u003eService disruption through destruction or corruption of critical database files.\u003c/li\u003e\n\u003cli\u003ePotential lateral movement from a compromised Splunk server into monitored environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article frames internet-exposed or inadequately segmented Splunk deployments as particularly concerning because the vulnerability is unauthenticated, network-reachable, and has a public proof of concept available.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products\"\u003eAffected Products\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the affected and unaffected product versions as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSplunk Enterprise 10.2.0 through 10.2.3 are affected and fixed in 10.2.4.\u003c/li\u003e\n\u003cli\u003eSplunk Enterprise 10.0.0 through 10.0.6 are affected and fixed in 10.0.7.\u003c/li\u003e\n\u003cli\u003eSplunk Enterprise 10.4.x is not affected, and 10.4.0 is described as the baseline fixed version.\u003c/li\u003e\n\u003cli\u003eSplunk Cloud Platform is not affected because it does not use PostgreSQL sidecars.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exploitation-status\"\u003eExploitation Status\u003c/h2\u003e\n\n\u003cp\u003eAt the time of writing, the article says there were no reports of active exploitation in the wild. However, it also states that a public proof of concept is available on GitHub. Because of that availability, the article says exploitation attempts are a near-term probability for any internet-exposed or inadequately segmented Splunk deployment.\u003c/p\u003e\n\n\u003cp\u003eNo specific threat actors or named groups are identified in the article. The article discusses attackers in general terms as any network-reachable user or attacker able to reach the vulnerable endpoint.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-audit-guidance\"\u003eDetection and Audit Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends reviewing Splunk server logs for unexpected access to the PostgreSQL sidecar service endpoint. It also recommends looking for anomalous file creation activity and unexpected database backup or restore operations, since these may indicate exploitation attempts.\u003c/p\u003e\n\n\u003cp\u003eThe article further recommends monitoring for unexpected process execution from within the Splunk service context. It specifically calls out Python script execution not initiated by a known user or scheduled search. It notes that Splunk has not published indicators of compromise, so detection depends on log review, file system auditing, and process monitoring.\u003c/p\u003e\n\n\u003ch2 id=\"remediation-guidance\"\u003eRemediation Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s primary remediation guidance is immediate patching. Splunk Enterprise 10.2.x users should upgrade to 10.2.4 or later. Splunk Enterprise 10.0.x users should upgrade to 10.0.7 or later.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Splunk Enterprise 10.4.x does not require action for this CVE because version 10.4.0 is not affected. It also states that Splunk Cloud instances are not affected and do not require action for this CVE. The article refers readers to Splunk Security Advisory SVD-2026-0603 for full patch guidance.\u003c/p\u003e\n\n\u003cp\u003eSplunk has stated that no mitigations or workarounds exist, according to the article. Therefore, the article says patching is the only remediation.\u003c/p\u003e\n\n\u003ch2 id=\"risk-reduction-if-patching-is-delayed\"\u003eRisk Reduction if Patching Is Delayed\u003c/h2\u003e\n\n\u003cp\u003eAlthough the article states that there are no mitigations or workarounds, it provides risk-reduction steps if patching is delayed. It recommends restricting network access to Splunk management interfaces and the PostgreSQL sidecar service to trusted IP ranges only. It also states that the PostgreSQL sidecar endpoint must not be reachable from untrusted networks or the public internet.\u003c/p\u003e\n\n\u003cp\u003eThe article also recommends network segmentation to isolate Splunk infrastructure from broader enterprise environments. This is intended to limit blast radius if exploitation occurs. It further recommends monitoring filesystem activity on Splunk servers for unauthorized file creation, especially in directories accessible to the Splunk service account.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that any internet-facing or insufficiently segmented Splunk Enterprise instance running an affected version should be treated as high risk until patched. This assessment is tied to the availability of a public proof of concept.\u003c/p\u003e\n\n\u003ch2 id=\"netspi-coverage-and-references\"\u003eNetSPI Coverage and References\u003c/h2\u003e\n\n\u003cp\u003eThe article states that NetSPI’s External Attack Surface Management has released a detection for this CVE. The detection is named “Vulnerable Version – Splunk Enterprise – Arbitrary File Operations (CVE-2026-20253).” It also says NetSPI’s Penetration Testing Services can help identify exposure to these vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several additional resources, including the NVD entry for CVE-2026-20253, the MITRE CVE entry, Splunk Security Advisory SVD-2026-0603, and release notes for Splunk Enterprise 10.2.4 and 10.0.7.\u003c/p\u003e\n","keyPoints":["Splunk disclosed CVE-2026-20253 on June 10, 2026, affecting Splunk Enterprise versions in the 10.0.x and 10.2.x branches.","CVE-2026-20253 is a critical unauthenticated network vulnerability caused by missing authentication on a PostgreSQL sidecar service endpoint, allowing arbitrary file creation or truncation without credentials.","Researchers demonstrated that the file-write primitive can be chained into remote code execution by abusing PostgreSQL’s lo_export function to write and execute malicious scripts on the Splunk server.","Splunk Enterprise 10.2.0 through 10.2.3 are fixed in 10.2.4, and Splunk Enterprise 10.0.0 through 10.0.6 are fixed in 10.0.7.","Splunk stated that no mitigations or workarounds exist, so patching is the only remediation for affected Splunk Enterprise versions."],"insights":["Any affected Splunk Enterprise instance that is internet-facing or insufficiently segmented should be treated as high risk even though no active exploitation has been reported, because a public proof of concept is available.","Detection cannot rely on vendor-provided indicators of compromise because Splunk has not published any, so organizations must use log review, filesystem auditing, and process monitoring.","Splunk Cloud Platform does not require action for this CVE because it does not use PostgreSQL sidecars.","Restricting network access to Splunk management interfaces and the PostgreSQL sidecar endpoint is only a risk-reduction measure if patching is delayed, not a vendor-supported workaround."],"referencedReports":[{"title":"Splunk Security Advisory — SVD-2026-0603","url":"https://advisory.splunk.com/advisories/SVD-2026-0603","publisher":"Splunk","context":"The article directs readers to the Splunk vendor advisory for full patch guidance on CVE-2026-20253.","category":"","primary":false}],"body":"\u003cp\u003eSplunk disclosed CVE-2026-20253 on June 10, 2026, affecting Splunk Enterprise versions in the 10.0.x and 10.2.x branches. The vulnerability is rated critical with a CVSSv3.1 score of 9.8. It is an unauthenticated network issue requiring no user interaction.\u003c/p\u003e\n\n\u003cp\u003eThe flaw stems from a PostgreSQL sidecar service endpoint that lacks authentication controls. The article says any network-reachable attacker can invoke arbitrary file creation or truncation operations without credentials. Researchers have demonstrated that this file-write primitive can be chained into remote code execution by abusing PostgreSQL’s \u003ccode\u003elo_export\u003c/code\u003e function to write and execute malicious scripts on the Splunk server.\u003c/p\u003e\n\n\u003cp\u003eAffected Splunk Enterprise 10.2.x deployments should upgrade to 10.2.4 or later, and affected 10.0.x deployments should upgrade to 10.0.7 or later. Splunk Enterprise 10.4.x and Splunk Cloud Platform are not affected, with the article noting that Splunk Cloud does not use PostgreSQL sidecars. Splunk has stated that no mitigations or workarounds exist, making patching the only remediation.\u003c/p\u003e\n"},{"n":12,"title":"Chinese hackers breach REDCap servers, steal medical research","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/chinese-hackers-breach-redcap-servers-steal-medical-research/","time":"14:00","priority":"MUST READ","score":93,"tldr":"Google says China-linked hackers tracked as UNC6508 breached exposed REDCap servers at medical research organizations in North America, deployed custom InfiniteRed malware, and stole sensitive research data while remaining undetected for over a year. Administrators should update REDCap, remove legacy deployments, and check Google’s IoCs for signs of compromise.","briefOverview":"\u003cp\u003eA China-linked espionage campaign targeted exposed REDCap servers and deployed custom malware called InfiniteRed to steal sensitive data from a medical institution in North America. Google Threat Intelligence Group attributes the activity to UNC6508, which remained undetected in the victim network for more than a year. REDCap is widely used in medical and scientific research to build and manage databases and surveys that comply with research regulations.\u003c/p\u003e\n\n\u003cp\u003eGoogle said the compromise occurred in September 2023 and malicious activity continued through November 2025. The researchers could not determine the exact initial compromise vector, but observed UNC6508 probing older, vulnerable REDCap versions. Three months after the initial compromise, the attackers deployed InfiniteRed and hid its components by trojanizing the server’s system files.\u003c/p\u003e\n\n\u003cp\u003eInfiniteRed includes a persistence and update module, a credential harvester, and a backdoor that receives commands via HTTP cookies. The attackers also used a legitimate content compliance rules feature in cloud-based enterprise productivity tools to exfiltrate data over email. Google notified multiple organizations in the United States and Canada that were compromised and recommended REDCap upgrades, removal of legacy deployments, MFA or 2SV for high-privilege accounts, and Device Bound Session Credentials.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGoogle Threat Intelligence Group reported a China-linked espionage campaign against exposed REDCap servers used by medical and scientific research organizations. The activity is attributed to UNC6508, which remained undetected for more than a year in the network of a medical research organization in North America. REDCap is widely used to build and manage databases and surveys for regulated medical and scientific research.\u003c/p\u003e\n\n\u003cp\u003eThe researchers could not determine the exact initial compromise vector, but observed UNC6508 probing older, vulnerable versions of REDCap. Based on Google’s investigation, the compromise occurred in September 2023 and malicious activity continued through November 2025. Three months after initial compromise, UNC6508 deployed custom malware called InfiniteRed, which was designed specifically for REDCap systems.\u003c/p\u003e\n\n\u003cp\u003eInfiniteRed consists of a persistence and update module, a credential harvester, and a backdoor. The credential harvester captures usernames and passwords submitted through REDCap login pages, then encrypts and stores them in local REDCap database tables for later retrieval. The backdoor receives commands via HTTP cookies and can execute shell commands, upload and download files, run arbitrary SQL queries, retrieve stolen credentials, delete stolen credential records, and return system and database information.\u003c/p\u003e\n\n\u003cp\u003eGoogle highlighted the attackers’ use of a legitimate content compliance rules feature in cloud-based enterprise productivity tools as a notable technique that is new for China-linked threat actors. After gaining administrator access, UNC6508 created a rule named “Patroit” that scanned for specific keywords, content patterns, email addresses, and phone numbers. Matches were automatically sent as a blind carbon copy to a Gmail address that Google has since disabled.\u003c/p\u003e\n\n\u003cp\u003eGTIG observed strong operational security across the campaign, including the use of U.S.-based residential proxy infrastructure, compromised routers, VPS, credential replay, and dedicated infrastructure for data exfiltration. Google notified multiple organizations in the United States and Canada that were compromised with InfiniteRed. The affected research areas included molecular discovery, clinical drug trials, state-level public health policy, and military readiness.\u003c/p\u003e\n\n\u003cp\u003eREDCap administrators are advised to upgrade to the latest available versions and remove legacy deployments. Google also recommends MFA or 2SV on high-privilege accounts and Device Bound Session Credentials to help prevent session hijacking. The Google report includes YARA rules and indicators of compromise to help organizations scan for InfiniteRed infections.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGoogle Threat Intelligence Group reported a China-linked espionage campaign that targeted exposed REDCap servers and deployed custom malware called InfiniteRed. The campaign focused on stealing sensitive data from a medical institution in North America.\u003c/p\u003e\n\n\u003cp\u003eGoogle attributes the activity to a threat actor tracked as UNC6508. According to the article, UNC6508 remained undetected in the victim network for more than a year.\u003c/p\u003e\n\n\u003cp\u003eREDCap is widely used in medical and scientific research to build and manage databases and surveys that comply with regulations for medical and scientific research.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-and-initial-access\"\u003eTimeline and Initial Access\u003c/h2\u003e\n\n\u003cp\u003eGoogle researchers could not determine the exact initial compromise vector. However, they observed UNC6508 probing older, vulnerable versions of REDCap.\u003c/p\u003e\n\n\u003cp\u003eBased on the investigation, the compromise of the medical research organization occurred in September 2023. Malicious activity continued for more than a year, through November 2025.\u003c/p\u003e\n\n\u003cp\u003eThree months after the initial compromise, the attackers deployed InfiniteRed, a custom malware family designed specifically for REDCap systems. The attackers hid InfiniteRed components by trojanizing the server’s system files.\u003c/p\u003e\n\n\u003ch2 id=\"infinitered-malware\"\u003eInfiniteRed Malware\u003c/h2\u003e\n\n\u003cp\u003eInfiniteRed has three components:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA persistence and update module.\u003c/li\u003e\n\u003cli\u003eA credential harvester.\u003c/li\u003e\n\u003cli\u003eA backdoor.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe credential harvester captures usernames and passwords submitted through REDCap login pages. It then encrypts the credentials and stores them in local REDCap database tables for future retrieval.\u003c/p\u003e\n\n\u003cp\u003eThe backdoor receives commands through HTTP cookies. According to the article, it gives UNC6508 the ability to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExecute shell commands.\u003c/li\u003e\n\u003cli\u003eUpload files to the REDCap server.\u003c/li\u003e\n\u003cli\u003eDownload files from the server.\u003c/li\u003e\n\u003cli\u003eRun arbitrary SQL queries.\u003c/li\u003e\n\u003cli\u003eRetrieve stolen credentials.\u003c/li\u003e\n\u003cli\u003eDelete stolen credential records.\u003c/li\u003e\n\u003cli\u003eReturn system and database information.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"email-based-data-exfiltration-technique\"\u003eEmail-Based Data Exfiltration Technique\u003c/h2\u003e\n\n\u003cp\u003eGoogle identified the use of legitimate content compliance rules in cloud-based enterprise productivity tools as a notable technique in the campaign. The article says this technique is new for China-linked threat actors.\u003c/p\u003e\n\n\u003cp\u003eAfter gaining administrator access, UNC6508 created a content compliance rule named “Patroit.” The rule scanned the organization for specific keywords, content patterns, email addresses, and phone numbers.\u003c/p\u003e\n\n\u003cp\u003eWhen the rule found matches, the content was automatically sent as a blind carbon copy to the Gmail address “BebitaBarefoot774@gmail.com.” Google has disabled that Gmail address.\u003c/p\u003e\n\n\u003cp\u003eThe keywords used for exfiltration related to medical research, advanced technology, military topics, and geo-strategic policy.\u003c/p\u003e\n\n\u003ch2 id=\"operational-security-and-infrastructure\"\u003eOperational Security and Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eGoogle observed a high level of operational security across the campaign. The attackers used U.S.-based residential proxy infrastructure, compromised routers, VPS, credential replay, and dedicated infrastructure for data exfiltration.\u003c/p\u003e\n\n\u003cp\u003eThe article does not state the exact initial compromise method. It does state that Google observed UNC6508 probing older, vulnerable REDCap versions.\u003c/p\u003e\n\n\u003ch2 id=\"affected-organizations-and-impact\"\u003eAffected Organizations and Impact\u003c/h2\u003e\n\n\u003cp\u003eGoogle notified multiple organizations in the United States and Canada that were compromised with InfiniteRed malware. The article says the compromised organizations’ research areas spanned a broad range of modern medicine.\u003c/p\u003e\n\n\u003cp\u003eThose areas included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMolecular discovery.\u003c/li\u003e\n\u003cli\u003eClinical drug trials.\u003c/li\u003e\n\u003cli\u003eState-level public health policy.\u003c/li\u003e\n\u003cli\u003eMilitary readiness.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article describes the stolen data as sensitive and related to medical research. It also states that the campaign targeted exposed REDCap servers used in medical and scientific research.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-recommendations\"\u003eDefensive Recommendations\u003c/h2\u003e\n\n\u003cp\u003eREDCap administrators are advised to upgrade their instances to the latest available versions. Google also recommends removing legacy REDCap deployments.\u003c/p\u003e\n\n\u003cp\u003eGoogle advises using MFA or 2SV on high-privilege accounts. It also recommends Device Bound Session Credentials to prevent session hijacking.\u003c/p\u003e\n\n\u003cp\u003eThe Google report includes YARA rules and indicators of compromise to help organizations scan their environments for InfiniteRed malware infections.\u003c/p\u003e\n","keyPoints":["Google Threat Intelligence Group attributes the campaign to China-linked threat actor UNC6508, which targeted exposed REDCap servers and remained undetected in a North American medical research organization for more than a year.","UNC6508 deployed the custom InfiniteRed malware on REDCap systems, using components for persistence and updates, credential harvesting, and backdoor access.","The InfiniteRed backdoor can execute shell commands, upload and download files, run arbitrary SQL queries, retrieve stolen credentials, delete stolen credential records, and return system and database information.","UNC6508 used a legitimate content compliance rules feature in cloud-based enterprise productivity tools to exfiltrate data over email by automatically BCCing matched content to a Gmail address.","Google notified multiple organizations in the United States and Canada that were compromised with InfiniteRed and recommended REDCap upgrades, removal of legacy deployments, MFA or 2SV on high-privilege accounts, and Device Bound Session Credentials."],"insights":["The campaign shows that REDCap administrators should treat legacy or exposed deployments as high-risk even when the exact initial compromise vector is unknown, because Google observed UNC6508 probing older vulnerable REDCap versions.","InfiniteRed’s credential harvester stored encrypted stolen credentials inside local REDCap database tables, making database inspection for unusual REDCap table contents an important detection step in addition to file-based malware scanning.","UNC6508’s use of a legitimate content compliance rule named “Patroit” for BCC-based exfiltration means defenders should audit enterprise productivity compliance rules for unauthorized forwarding or keyword-matching rules, not only mailbox forwarding settings.","The attackers hid InfiniteRed components by trojanizing server system files, so integrity checks of REDCap server files may be necessary to detect compromise that could evade routine monitoring.","Google specifically recommends Device Bound Session Credentials alongside MFA or 2SV, indicating that session hijacking and credential replay were relevant enough in this campaign to require controls beyond standard multifactor authentication."],"referencedReports":[{"title":"PRC Targeting of REDCap Servers","url":"https://cloud.google.com/blog/topics/threat-intelligence/prc-target","publisher":"Google Threat Intelligence Group","context":"The article cites Google Threat Intelligence Group’s report for details on UNC6508’s REDCap intrusions, InfiniteRed malware, exfiltration technique, YARA rules, and indicators of compromise.","category":"","primary":false}],"body":"\u003cp\u003eA China-linked espionage campaign targeted exposed REDCap servers and deployed custom malware called InfiniteRed to steal sensitive data from a medical institution in North America. Google Threat Intelligence Group attributes the activity to UNC6508, which remained undetected in the victim network for more than a year. REDCap is widely used in medical and scientific research to build and manage databases and surveys that comply with research regulations.\u003c/p\u003e\n\n\u003cp\u003eGoogle said the compromise occurred in September 2023 and malicious activity continued through November 2025. The researchers could not determine the exact initial compromise vector, but observed UNC6508 probing older, vulnerable REDCap versions. Three months after the initial compromise, the attackers deployed InfiniteRed and hid its components by trojanizing the server’s system files.\u003c/p\u003e\n\n\u003cp\u003eInfiniteRed includes a persistence and update module, a credential harvester, and a backdoor that receives commands via HTTP cookies. The attackers also used a legitimate content compliance rules feature in cloud-based enterprise productivity tools to exfiltrate data over email. Google notified multiple organizations in the United States and Canada that were compromised and recommended REDCap upgrades, removal of legacy deployments, MFA or 2SV for high-privilege accounts, and Device Bound Session Credentials.\u003c/p\u003e\n"},{"n":26,"title":"Popular WordPress Plugin Scripts Tampered to Plant Hidden Backdoors on Sites","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/popular-wordpress-plugin-scripts.html","time":"09:59","priority":"MUST READ","score":93,"tldr":"Tampered JavaScript served through PushEngage, OptinMonster, and TrustPulse could create attacker-controlled WordPress admin accounts and hidden web shells when loaded by logged-in site admins. Any site using these plugins during the June 12–14 exposure window should be treated as potentially compromised and scanned server-side, since the backdoor may not appear in the WordPress dashboard.","briefOverview":"\u003cp\u003eAn attacker tampered with trusted JavaScript files used by WordPress sites running PushEngage, OptinMonster, and TrustPulse. When a logged-in WordPress administrator loaded the poisoned script, it could create an attacker-controlled admin account and install a hidden plugin that opened a backdoor. Ordinary visitors did not trigger the code.\u003c/p\u003e\n\n\u003cp\u003eSansec disclosed the broader campaign on June 13, reporting the same malicious code in JavaScript served for all three plugins. OptinMonster and TrustPulse were reportedly affected for about 25 minutes on June 12, while PushEngage exposure lasted several hours and some CDN servers continued serving its script into June 14. The three plugins together reach more than 1.2 million sites, but that figure reflects potential reach rather than confirmed compromises.\u003c/p\u003e\n\n\u003cp\u003ePushEngage said the attacker used a CDN API key obtained after compromising its separate marketing website server, while Sansec said the entry point remains unsettled. The article says affected sites should be treated as compromised and checked server-side because the backdoor is designed to stay hidden from the WordPress dashboard. Recommended checks include looking for hidden plugin folders, suspicious admin accounts, and traffic to tidio.cc or 84.201.6.54.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAn attacker tampered with JavaScript files used by WordPress sites running PushEngage, OptinMonster, and TrustPulse, all associated with Awesome Motive. The malicious code only acted when a logged-in WordPress administrator loaded the script, using that session to create a new admin account and install a hidden plugin. The hidden plugin provided a web shell, giving the attacker a remote command channel on the server.\u003c/p\u003e\n\n\u003cp\u003eSansec disclosed the wider campaign on June 13 after finding the same malicious code in JavaScript served for all three plugins. PushEngage published its own incident notice a day later, confirming that tampered copies of its scripts had been served and that sites loading them could be taken over. As of June 15, the article says Awesome Motive had not commented on the two larger plugins, OptinMonster and TrustPulse.\u003c/p\u003e\n\n\u003cp\u003eThe exposure window differed across the products. Sansec saw the malicious code in OptinMonster and TrustPulse for about 25 minutes on June 12, from around 22:17 UTC to 22:42 UTC. PushEngage’s exposure lasted several hours on June 12, and its script was still served from some CDN servers into June 14.\u003c/p\u003e\n\n\u003cp\u003eIn PushEngage’s case, the tampered files were pushengage-web-sdk.js and pushengage-subscription.js served from clientcdn.pushengage.com. The malicious sequence created an attacker-controlled admin user, installed a plugin hidden from the dashboard, and sent site and login details to tidio.cc, a fake domain made to resemble tidio.com. Sansec found the same sequence across all three plugins, and the article notes that tidio.cc was registered on April 28.\u003c/p\u003e\n\n\u003cp\u003ePushEngage said the attacker first compromised the server running its marketing website through a known UpdraftPlus flaw and then used a CDN API key found there to alter files delivered to customers. Sansec did not endorse that explanation and said the breached system remained unknown, with Awesome Motive’s own servers most likely, the CDN account possible, and BunnyNet unlikely. The article also notes that a separate UpdraftPlus authentication-bypass bug, CVE-2026-10795, is patched and has reportedly been attacked, but whether it was involved in this incident is unconfirmed.\u003c/p\u003e\n\n\u003cp\u003eThe article advises anyone who ran PushEngage, OptinMonster, or TrustPulse during the threat window to run server-side scans rather than rely on
