e\n\n\u003ch2 id=\"end-to-end-flow\"\u003eEnd-to-end flow\u003c/h2\u003e\n\n\u003cp\u003eThe article summarizes the combined flow as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe victim clicks a crafted Microsoft Copilot Search link.\u003c/li\u003e\n\u003cli\u003eCopilot searches the victim’s data.\u003c/li\u003e\n\u003cli\u003eThe response embeds a value, such as an email subject, into a Bing image URL.\u003c/li\u003e\n\u003cli\u003eThe browser calls Bing while the response is still streaming.\u003c/li\u003e\n\u003cli\u003eBing pulls the attacker-controlled URL containing the stolen text.\u003c/li\u003e\n\u003cli\u003eThe attacker reads the stolen value from their own server logs.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article gives an example of a request path containing a security code, such as /Your_Security_Code_847291/img.png.\u003c/p\u003e\n\n\u003ch2 id=\"potential-data-exposure\"\u003ePotential data exposure\u003c/h2\u003e\n\n\u003cp\u003eThe article says Copilot Enterprise can access whatever the signed-in user can reach through Microsoft Graph. As a result, the attacker could inherit that reach without logging in.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights time-sensitive inbox contents as especially valuable, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOne-time codes.\u003c/li\u003e\n\u003cli\u003eMFA codes.\u003c/li\u003e\n\u003cli\u003ePassword-reset links.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt states that these items are often valid for only a few minutes, but a script reading them from logs during that window could take over an account before anyone notices.\u003c/p\u003e\n\n\u003cp\u003eThe same access could also reach:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCalendar invites.\u003c/li\u003e\n\u003cli\u003eMeeting notes.\u003c/li\u003e\n\u003cli\u003eSharePoint files indexed by Copilot.\u003c/li\u003e\n\u003cli\u003eOneDrive files indexed by Copilot.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that such indexed files may include salary data, earnings figures, and acquisition plans.\u003c/p\u003e\n\n\u003ch2 id=\"related-research-and-prior-patterns\"\u003eRelated research and prior patterns\u003c/h2\u003e\n\n\u003cp\u003eThe article says SearchLeak is the second time Varonis has shown this one-click pattern. It references an earlier Reprompt attack against Copilot Personal demonstrated by Varonis researcher Dolev Taler. According to the article, the technique held up against Copilot Enterprise Search despite the additional guardrails that tier was supposed to enforce.\u003c/p\u003e\n\n\u003cp\u003eThe article also compares the pattern to EchoLeak, CVE-2025-32711, a zero-click Copilot data-leak bug disclosed by Aim Security in 2025.\u003c/p\u003e\n\n\u003cp\u003eIt describes SSRF and sanitizer races as old bug classes. The new part, according to the article, is prompt injection, which makes those older classes reachable again.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-response\"\u003eAffected parties and response\u003c/h2\u003e\n\n\u003cp\u003eThe affected product described in the article is Microsoft 365 Copilot Enterprise Search. Microsoft assigned CVE-2026-42824 and mitigated the flaw on its backend.\u003c/p\u003e\n\n\u003cp\u003eBecause Copilot Enterprise is a managed service, the article says tenant admins cannot patch or reconfigure the components that failed. The article says customers have nothing to worry about after Microsoft’s backend mitigation, and it also states that Varonis presented a proof-of-concept rather than observed exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-monitoring-and-containment\"\u003eRecommended monitoring and containment\u003c/h2\u003e\n\n\u003cp\u003eAlthough tenant admins cannot patch the failed service components themselves, the article says they can watch and contain. It recommends looking for Copilot Search URLs that carry encoded payloads or HTML in the q parameter.\u003c/p\u003e\n\n\u003cp\u003eIt also recommends watching for unusual outbound requests to Bing’s image endpoints. Finally, it advises tightening data-access governance so Copilot indexes less data, reducing what any future leak could reach.\u003c/p\u003e\n","keyPoints":["Varonis Threat Labs chained three bugs into a one-click exfiltration path in Microsoft 365 Copilot Enterprise Search called SearchLeak.","The attack used the q parameter in Copilot Enterprise Search URLs to inject instructions that caused Copilot to search the victim’s data and embed results in an image URL.","A rendering race condition allowed an injected img tag to send a request before Microsoft’s guardrail wrapped Copilot output in code blocks.","The attack bypassed the page’s Content Security Policy by using Bing’s Search by Image endpoint as a server-side exfiltration proxy.","Microsoft assigned CVE-2026-42824 to the flaw, marked it critical, mitigated it on the backend, and Varonis reported no observed exploitation."],"insights":["The attack link used a real microsoft.com domain, making traditional anti-phishing and URL filtering tools unlikely to detect it.","Copilot Enterprise Search could expose any data reachable through the signed-in user’s Microsoft Graph access, so excessive mailbox, SharePoint, or OneDrive permissions directly increase the blast radius of similar flaws.","Bing’s Search by Image endpoint became an exfiltration proxy because it was allowlisted by the Microsoft 365 Content Security Policy, showing that trusted third-party or same-vendor services can undermine CSP protections.","Tenant admins could not patch or reconfigure the vulnerable Copilot Enterprise components because Microsoft mitigated the issue on the backend, leaving monitoring and data-access governance as the main customer-side controls.","Time-sensitive inbox contents such as MFA codes and password-reset links were highlighted as especially valuable because attackers could use them before they expired."],"referencedReports":[{"title":"CVE-2026-42824","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-42824","publisher":"Microsoft Security Response Center","context":"The article says Microsoft assigned CVE-2026-42824, marked it critical, and described the flaw in its advisory as a command injection that can expose information over a network.","category":"","primary":false},{"title":"SearchLeak","url":"https://www.varonis.com/blog/searchleak","publisher":"Varonis Threat Labs","context":"The article relies on Varonis Threat Labs’ SearchLeak research describing how three bugs were chained into a one-click Microsoft 365 Copilot Enterprise Search exfiltration path.","category":"","primary":false}],"body":"\u003cp\u003eVaronis Threat Labs demonstrated a one-click exfiltration path in Microsoft 365 Copilot Enterprise Search called SearchLeak. A victim clicking a trusted Microsoft link could have allowed an attacker to pull emails, calendar details, and indexed files through Copilot. Microsoft assigned CVE-2026-42824, marked it critical, and mitigated the issue on its backend.\u003c/p\u003e\n\n\u003cp\u003eSearchLeak chained three issues: Parameter-to-Prompt injection in the Copilot Enterprise Search q parameter, a rendering race condition, and a Content Security Policy bypass using Bing’s Search by Image endpoint. The attack could cause Copilot to search the signed-in user’s data, embed stolen text into an image URL, and route the exfiltration through Bing. Varonis presented a proof-of-concept and reported no observed exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Copilot Enterprise can access whatever the signed-in user can reach through Microsoft Graph. That includes inbox contents such as one-time codes, MFA codes, and password-reset links, as well as calendar invites, meeting notes, and SharePoint or OneDrive files indexed by Copilot. Because Copilot Enterprise is managed by Microsoft, tenant admins cannot patch the failed components directly, but they can monitor suspicious Copilot Search URLs and tighten data-access governance.\u003c/p\u003e\n"},{"n":5,"title":"Anthropic says US government forced it to disable cybersecurity AI models","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/anthropic-says-gov-forced-it-to-disable-cyber-ai-models","time":"12:31","priority":"SHOULD READ","score":82,"tldr":"Anthropic says a U.S. government export-control directive forced it to disable its Fable 5 and Mythos 5 cybersecurity AI models for all customers, including due to restrictions on foreign nationals. The company disputes the government’s stated jailbreak concerns and says the action lacks a transparent, technically grounded process.","briefOverview":"\u003cp\u003eAnthropic said it disabled two of its most advanced cybersecurity-focused AI models, Fable 5 and Mythos 5, after receiving a U.S. government export control directive. The company said the directive barred any foreign national from accessing the models, including foreign nationals inside the United States, abroad, and among Anthropic’s own employees. Anthropic said it had to disable the models for all customers to ensure compliance.\u003c/p\u003e\n\n\u003cp\u003eThe directive has not been made public, but Anthropic said it cited national security authorities. The company said this appears to be the first time such authorities have been used to curtail the export of AI models rather than chips or hardware. Anthropic said it believes the government acted because of a reported method for bypassing or “jailbreaking” Fable 5.\u003c/p\u003e\n\n\u003cp\u003eAnthropic disputed the basis for the directive while saying it would comply. The company said it reviewed what it believes is the underlying report and found the identified vulnerabilities were minor, previously known, and reproducible using other publicly available models including OpenAI’s GPT-5.5. Anthropic apologized for customer disruption and said it is working to restore access as soon as possible.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAnthropic said the U.S. government forced it to disable two advanced cybersecurity-focused AI models, Fable 5 and Mythos 5. The company said it received an export control directive barring foreign nationals from accessing the models. Anthropic said the restriction applied both inside the United States and abroad, including to its own employees.\u003c/p\u003e\n\n\u003cp\u003eBecause of the directive’s scope, Anthropic said it had to abruptly disable Fable 5 and Mythos 5 for all customers to ensure compliance. The directive itself has not been made public. According to Anthropic, it cited national security authorities and appears to be the first use of such authorities to restrict AI model exports rather than chips or hardware.\u003c/p\u003e\n\n\u003cp\u003eAnthropic said its understanding is that the government believes it became aware of a method for bypassing, or “jailbreaking,” Fable 5. The company said the government provided only verbal evidence of the technique. Anthropic said it reviewed what it believes is the underlying report and found that the vulnerabilities were minor, previously known, and reproducible using other publicly available models, including OpenAI’s GPT-5.5.\u003c/p\u003e\n\n\u003cp\u003eThe company said it is complying with the directive but disagrees with its basis. Anthropic argued that a narrow potential jailbreak should not justify recalling a commercial model deployed to hundreds of millions of people. It also warned that applying the same standard across the industry could essentially halt all new model deployments by frontier model providers.\u003c/p\u003e\n\n\u003cp\u003eThe directive came two days after Anthropic CEO Dario Amodei published a policy essay calling for the government to have legal authority to block unsafe AI deployments. Anthropic said it still supports such authority, but only through a statutory process that is transparent, fair, clear, and grounded in technical facts. The company said this action did not follow those principles and that it is working to restore access as soon as possible.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAnthropic said it disabled two of its most advanced cybersecurity-focused AI models, Fable 5 and Mythos 5, after receiving a U.S. government export control directive. The company said the directive barred any foreign national from accessing the models. This restriction applied to foreign nationals inside the United States as well as abroad, including Anthropic’s own employees.\u003c/p\u003e\n\n\u003cp\u003eAnthropic said the “net effect” of the order was that it had to abruptly disable Fable 5 and Mythos 5 for all customers to ensure compliance. The company apologized for the disruption to customers. It said it believes the situation is a misunderstanding and is working to restore access as soon as possible.\u003c/p\u003e\n\n\u003ch2 id=\"directive-and-significance\"\u003eDirective and Significance\u003c/h2\u003e\n\n\u003cp\u003eThe directive itself has not been made public. Anthropic said the directive cited national security authorities. The article states that it appears to be the first time such authorities have been used to curtail the export of AI models rather than chips or hardware.\u003c/p\u003e\n\n\u003cp\u003eAnthropic framed the action as a major departure from prior export-control focus. The company said the order’s broad restriction on foreign-national access meant it could not keep the models available to customers while remaining compliant. As a result, all customers lost access to Fable 5 and Mythos 5.\u003c/p\u003e\n\n\u003ch2 id=\"technical-basis-cited-by-anthropic\"\u003eTechnical Basis Cited by Anthropic\u003c/h2\u003e\n\n\u003cp\u003eAnthropic said its understanding is that the government believes it became aware of a method of bypassing, or “jailbreaking,” Fable 5. The company said the government provided only verbal evidence of this technique. Anthropic then reviewed what it believes is the underlying report.\u003c/p\u003e\n\n\u003cp\u003eAccording to Anthropic, its review found that the identified vulnerabilities were minor and previously known. The company also said the issues were reproducible using other publicly available models. Anthropic specifically named OpenAI’s GPT-5.5 as one of the models where similar behavior could be reproduced.\u003c/p\u003e\n\n\u003ch2 id=\"anthropic-s-position\"\u003eAnthropic’s Position\u003c/h2\u003e\n\n\u003cp\u003eAnthropic said it is complying with the directive while disputing its basis. The company stated that it disagrees that a narrow potential jailbreak should be cause for recalling a commercial model deployed to hundreds of millions of people. It said that if the same standard were applied across the industry, it could essentially halt all new model deployments for all frontier model providers.\u003c/p\u003e\n\n\u003cp\u003eAnthropic also said it supports giving the government authority to block unsafe AI deployments. However, it argued that such authority should operate through “a statutory process that is transparent, fair, clear, and grounded in technical facts.” The company said the current action does not adhere to those principles.\u003c/p\u003e\n\n\u003ch2 id=\"policy-and-political-context\"\u003ePolicy and Political Context\u003c/h2\u003e\n\n\u003cp\u003eThe directive was issued two days after Anthropic chief executive Dario Amodei published a policy essay calling for the government to have legal authority to block unsafe AI deployments. Anthropic’s statement distinguished its support for government blocking authority from its criticism of the current directive. The company’s objection focused on the process and technical basis it said were lacking.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes escalating tensions between Anthropic and the Trump administration. In February, Defense Secretary Pete Hegseth designated Anthropic a “supply chain risk” after contract negotiations over military use of Claude broke down. The article notes that this label has historically been applied to companies such as Huawei.\u003c/p\u003e\n\n\u003ch2 id=\"business-context-and-impact\"\u003eBusiness Context and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe models affected were Fable 5 and Mythos 5, described as two of Anthropic’s most advanced cybersecurity-focused AI models. Anthropic said the directive forced it to disable them for all customers, not only for the foreign nationals specifically covered by the order. The disclosed impact was abrupt customer disruption and the loss of access to those models.\u003c/p\u003e\n\n\u003cp\u003eEarlier in the month, Anthropic filed for an initial public offering, with investors anticipating that it would value the company above $1 trillion, as reported by the Financial Times. Anthropic said the draft registration statement gave it the option to go public depending on market conditions and other factors. The article presents this as part of the broader backdrop surrounding the company at the time of the directive.\u003c/p\u003e\n\n\u003ch2 id=\"key-parties-named\"\u003eKey Parties Named\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAnthropic, the company that disabled Fable 5 and Mythos 5.\u003c/li\u003e\n\u003cli\u003eThe U.S. government, which Anthropic said issued the export control directive.\u003c/li\u003e\n\u003cli\u003eForeign nationals, who were barred from accessing the models under the directive.\u003c/li\u003e\n\u003cli\u003eAnthropic employees, some of whom were affected by the foreign-national access restriction.\u003c/li\u003e\n\u003cli\u003eOpenAI, whose GPT-5.5 model Anthropic said could reproduce similar vulnerabilities.\u003c/li\u003e\n\u003cli\u003eDario Amodei, Anthropic’s chief executive, who had recently published a policy essay on government authority to block unsafe AI deployments.\u003c/li\u003e\n\u003cli\u003ePete Hegseth, the Defense Secretary who designated Anthropic a “supply chain risk” in February.\u003c/li\u003e\n\u003cli\u003eThe Trump administration, described in the article as being in escalating tension with Anthropic.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"bottom-line\"\u003eBottom Line\u003c/h2\u003e\n\n\u003cp\u003eAnthropic says it disabled Fable 5 and Mythos 5 because a U.S. government export control directive barred foreign nationals from accessing them. The company disputes the directive’s technical basis, saying the cited jailbreak issues were minor, previously known, and reproducible in other publicly available models. Anthropic is complying while arguing that any government authority to block unsafe AI deployments should be transparent, fair, clear, and grounded in technical facts.\u003c/p\u003e\n","keyPoints":["Anthropic disabled its Fable 5 and Mythos 5 cybersecurity-focused AI models after receiving a U.S. government export control directive barring foreign nationals from accessing them.","Anthropic said the directive applied to foreign nationals both inside the United States and abroad, including the company’s own employees.","Anthropic said the government appears to believe it learned of a method for jailbreaking Fable 5, but the company said it received only verbal evidence of the technique.","Anthropic said its review found the identified vulnerabilities were minor, previously known, and reproducible using other publicly available models including OpenAI's GPT-5.5.","Anthropic said it is complying with the directive while disputing its basis and working to restore access as soon as possible."],"insights":["The directive appears to mark a shift in U.S. export-control use from restricting AI chips or hardware to restricting access to AI models themselves.","The order’s scope was broad enough that Anthropic disabled the models for all customers rather than attempting to separate access by nationality or location.","Anthropic’s objection centers less on whether government blocking authority should exist and more on the lack of a transparent statutory process grounded in technical evidence.","The dispute highlights a potential industry-wide concern because Anthropic says applying the same jailbreak standard across providers could effectively halt new frontier model deployments."],"referencedReports":[],"body":"\u003cp\u003eAnthropic said it disabled two of its most advanced cybersecurity-focused AI models, Fable 5 and Mythos 5, after receiving a U.S. government export control directive. The company said the directive barred any foreign national from accessing the models, including foreign nationals inside the United States, abroad, and among Anthropic’s own employees. Anthropic said it had to disable the models for all customers to ensure compliance.\u003c/p\u003e\n\n\u003cp\u003eThe directive has not been made public, but Anthropic said it cited national security authorities. The company said this appears to be the first time such authorities have been used to curtail the export of AI models rather than chips or hardware. Anthropic said it believes the government acted because of a reported method for bypassing or “jailbreaking” Fable 5.\u003c/p\u003e\n\n\u003cp\u003eAnthropic disputed the basis for the directive while saying it would comply. The company said it reviewed what it believes is the underlying report and found the identified vulnerabilities were minor, previously known, and reproducible using other publicly available models including OpenAI’s GPT-5.5. Anthropic apologized for customer disruption and said it is working to restore access as soon as possible.\u003c/p\u003e\n"},{"n":2,"title":"Cyberattack on Russian tech firm Astral disrupts business, government services for week","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/cyberattack-on-russian-tech-firm-astral-disrupts-business-government-services","time":"15:07","priority":"SHOULD READ","score":78,"tldr":"Russian software firm Kaluga Astral said a cyberattack disrupted its tax reporting, document management and other business services for about a week, affecting business and government customers. The company said it found no evidence customer data was compromised and has not attributed the attack.","briefOverview":"\u003cp\u003eRussian software company Kaluga Astral said it was hit by a cyberattack earlier this month that disrupted several services for about a week. The outage affected customers that rely on its software for tax reporting, electronic document management and other business operations. Astral said Russian government agencies are involved in the investigation, limiting what it can publicly say about the incident.\u003c/p\u003e\n\n\u003cp\u003eThe company said it is bringing services back online only after completing full security reviews, which has made recovery slower than it would like. Astral’s internal investigation found no evidence that customer data had been leaked or compromised. The company did not attribute the attack to any hacking group and disclosed no technical details or motive.\u003c/p\u003e\n\n\u003cp\u003eCustomer complaints cited disruptions to cash register operations, sales of some regulated goods, customer portals, corporate email, electronic HR document management systems and authentication using digital certificates. Astral develops electronic document management software, digital reporting systems for government agencies and cybersecurity products. The company has previously reported a DDoS attack in 2022, and the IT Army of Ukraine listed Astral among its intended targets in 2023, though the article says there is no evidence linking that group to the latest incident.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eKaluga Astral, a Russian software company, said it was hit by a cyberattack earlier this month that disrupted several services for about a week. The affected services are used by customers for tax reporting, electronic document management and other business operations. Astral said it is restoring services only after completing a full security review for each one.\u003c/p\u003e\n\n\u003cp\u003eThe company said the recovery process is taking longer than it would like because it is not willing to compromise security for speed. Russian government agencies are involved in the investigation, which Astral said limits its ability to comment publicly. The company’s internal investigation found no evidence that customer data had been leaked or compromised.\u003c/p\u003e\n\n\u003cp\u003eAstral did not attribute the attack to any hacking group. It also did not disclose technical details about the incident or identify a possible motive. The article does not report the use of any named malware, exploit or specific intrusion technique in the latest incident.\u003c/p\u003e\n\n\u003cp\u003eCustomer complaints described a broad set of operational effects from the disruption. These included interruptions in cash register operations, difficulties selling certain regulated goods, loss of access to customer portals and corporate email, and problems with electronic human resources document management systems. Complaints also cited authentication issues involving digital certificates.\u003c/p\u003e\n\n\u003cp\u003eKaluga Astral develops electronic document management software, digital reporting systems for government agencies and cybersecurity products. Founded in 1993, the company reportedly serves government institutions, banks and large state-owned enterprises, including Russian Post and Moscow public transport operator Mosgortrans. The incident therefore affected a vendor whose services are used across business and government-related workflows.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that Astral has faced cyber disruption before. In 2022, the company said a distributed denial-of-service attack disrupted some services and interfered with customers’ reporting processes, with the threat actor remaining unknown. In 2023, the IT Army of Ukraine listed Astral among its intended targets, but the article states it is unclear whether the group ever successfully attacked the company and that there is no evidence linking it to the latest incident.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eRussian software company Kaluga Astral said it was hit by a cyberattack earlier this month that disrupted several of its services for about a week. The affected services are used by customers for tax reporting, electronic document management and other business operations. Astral said it is restoring each service only after completing a full security review.\u003c/p\u003e\n\n\u003cp\u003eThe company said it is not willing to compromise security for speed, which is why recovery is taking longer than it would like. Russian government agencies are involved in the investigation, and Astral said that involvement limits its ability to comment publicly on the attack.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed impact\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the disruption affected customers that rely on Astral’s software for core administrative and business processes. According to customer complaints cited in the article, the disruption affected a range of services used by businesses.\u003c/p\u003e\n\n\u003cp\u003eReported customer impacts included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInterruptions in cash register operations.\u003c/li\u003e\n\u003cli\u003eDifficulties selling certain regulated goods.\u003c/li\u003e\n\u003cli\u003eLoss of access to customer portals.\u003c/li\u003e\n\u003cli\u003eLoss of access to corporate email.\u003c/li\u003e\n\u003cli\u003eProblems with electronic human resources document management systems.\u003c/li\u003e\n\u003cli\u003eProblems with authentication using digital certificates.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAstral said its internal investigation found no evidence that customer data had been leaked or compromised.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-and-attribution\"\u003eTechnical details and attribution\u003c/h2\u003e\n\n\u003cp\u003eAstral did not disclose technical details about the cyberattack. The article does not identify a specific malware family, vulnerability, exploit method or intrusion technique associated with the latest incident.\u003c/p\u003e\n\n\u003cp\u003eThe company also did not attribute the attack to any hacking group. It disclosed no possible motive behind the incident.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-recovery\"\u003eResponse and recovery\u003c/h2\u003e\n\n\u003cp\u003eAstral said it is bringing services back online only after completing a full security review for each service. The company explicitly said it is prioritizing security over speed during the restoration process.\u003c/p\u003e\n\n\u003cp\u003eThis approach has extended the recovery timeline, according to Astral’s statement. The company said the recovery process is taking longer than it would like because it is not willing to compromise security for faster restoration.\u003c/p\u003e\n\n\u003ch2 id=\"affected-organization-and-customer-base\"\u003eAffected organization and customer base\u003c/h2\u003e\n\n\u003cp\u003eKaluga Astral develops electronic document management software, digital reporting systems for government agencies and cybersecurity products. The company was founded in 1993.\u003c/p\u003e\n\n\u003cp\u003eThe article says Astral reportedly serves government institutions, banks and large state-owned enterprises. Named customers or users cited in the article include Russian Post and Moscow public transport operator Mosgortrans.\u003c/p\u003e\n\n\u003ch2 id=\"prior-incidents-and-related-context\"\u003ePrior incidents and related context\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that this is not the first cyberattack to affect Astral. In 2022, the company said it was hit by a distributed denial-of-service attack that disrupted some services and interfered with customers’ reporting processes. The threat actor behind that 2022 attack remains unknown.\u003c/p\u003e\n\n\u003cp\u003eIn 2023, the IT Army of Ukraine, described in the article as a volunteer hacktivist collective, listed Astral among its intended targets. The article states that it remains unclear whether the group ever successfully attacked the company. It also states that there is no evidence linking the IT Army of Ukraine to the latest incident.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eKaluga Astral experienced a cyberattack that disrupted multiple services for about a week.\u003c/li\u003e\n\u003cli\u003eThe disruption affected business functions tied to tax reporting, document management, cash registers, regulated goods sales, corporate email, HR systems and digital certificate authentication.\u003c/li\u003e\n\u003cli\u003eAstral said no evidence has been found that customer data was leaked or compromised.\u003c/li\u003e\n\u003cli\u003eThe company has not attributed the attack and has not released technical details.\u003c/li\u003e\n\u003cli\u003eRussian government agencies are involved in the investigation, limiting Astral’s public comments.\u003c/li\u003e\n\u003cli\u003eAstral is restoring services only after full security reviews, making recovery slower than the company would like.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Russian software company Kaluga Astral said it was hit by a cyberattack that disrupted several services for about a week.","The disrupted services affected customers that use Astral software for tax reporting, electronic document management and other business operations.","Astral said it is restoring each service only after completing a full security review, which has slowed the recovery process.","The company said its internal investigation found no evidence that customer data had been leaked or compromised.","Astral did not attribute the attack to any hacking group and did not disclose technical details or a possible motive."],"insights":["The outage affected operational functions such as cash registers, sales of regulated goods, corporate email and certificate-based authentication, showing that Astral’s service disruption had consequences beyond routine tax reporting.","Russian government agencies are involved in the investigation, and Astral said this limits what it can publicly disclose about the incident.","Although Astral was previously disrupted by a DDoS attack in 2022 and was listed as an intended target by the IT Army of Ukraine in 2023, the article states there is no evidence linking those events to the latest incident.","Astral’s decision to restore services only after full security reviews means customers may face longer outages when the company prioritizes secure recovery over speed."],"referencedReports":[],"body":"\u003cp\u003eRussian software company Kaluga Astral said it was hit by a cyberattack earlier this month that disrupted several services for about a week. The outage affected customers that rely on its software for tax reporting, electronic document management and other business operations. Astral said Russian government agencies are involved in the investigation, limiting what it can publicly say about the incident.\u003c/p\u003e\n\n\u003cp\u003eThe company said it is bringing services back online only after completing full security reviews, which has made recovery slower than it would like. Astral’s internal investigation found no evidence that customer data had been leaked or compromised. The company did not attribute the attack to any hacking group and disclosed no technical details or motive.\u003c/p\u003e\n\n\u003cp\u003eCustomer complaints cited disruptions to cash register operations, sales of some regulated goods, customer portals, corporate email, electronic HR document management systems and authentication using digital certificates. Astral develops electronic document management software, digital reporting systems for government agencies and cybersecurity products. The company has previously reported a DDoS attack in 2022, and the IT Army of Ukraine listed Astral among its intended targets in 2023, though the article says there is no evidence linking that group to the latest incident.\u003c/p\u003e\n"},{"n":3,"title":"Finland brings charges against cargo ship officers for cutting submarine cables","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/finland-brings-charges-against-cargo-ship-undersea-cables","time":"13:30","priority":"SHOULD READ","score":78,"tldr":"Finnish prosecutors charged the captain and bosun of the cargo ship Fitburg with damaging two Baltic Sea subsea telecom cables and attempting to damage eight more by dragging an anchor for at least 130 kilometers. The defendants deny the charges and are expected to challenge Finland’s jurisdiction because the damage occurred outside Finnish territorial waters.","briefOverview":"\u003cp\u003eThe Finnish Prosecution Service announced charges against the captain and bosun of the cargo vessel Fitburg after several submarine cable faults were detected in the Baltic Sea on New Year’s Eve. Prosecutors said the officers are accused of damaging two subsea telecommunications cables and attempting to damage eight other subsea connections. The Fitburg had been transporting sanctioned steel products from Russia to Israel, according to Finnish Customs, before Finnish authorities seized it.\u003c/p\u003e\n\n\u003cp\u003eProsecutors said the ship is believed to have dragged its damaged anchor along the seabed for at least 130 kilometers before Finnish authorities halted its movement. Both defendants deny the offenses and are expected to argue that Finland lacks jurisdiction because the cable damage occurred outside Finnish territorial waters. The Helsinki District Court will determine the hearing date and consider the jurisdiction issue.\u003c/p\u003e\n\n\u003cp\u003eThe case follows an earlier Finnish attempt to prosecute senior officers of the Russia-linked Eagle S oil tanker, which damaged multiple cables on Christmas Day 2024 but collapsed amid legal rulings disputing Finland’s jurisdiction. Recent Baltic Sea cable faults prompted NATO to increase patrols with frigates, maritime patrol aircraft, and naval drones. Officials from several European countries have told Recorded Future News that their governments increasingly believe the incidents were accidental rather than Kremlin-directed sabotage.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Finnish Prosecution Service said it is bringing charges against the captain and bosun of the cargo vessel Fitburg over damage to submarine cables in the Baltic Sea. The vessel was seized by Finnish authorities after cable faults were detected in the region, and two crew members were later arrested. According to Finnish Customs, the Fitburg had been transporting sanctioned steel products from Russia to Israel.\u003c/p\u003e\n\n\u003cp\u003eDeputy prosecutor general officials said the ship’s officers are charged with damaging two subsea telecommunications cables and attempting to damage eight other subsea connections. The ship is believed to have dragged its damaged anchor along the seabed for at least 130 kilometers. Prosecutors said the vessel’s movement continued until Finnish authorities took measures to halt it.\u003c/p\u003e\n\n\u003cp\u003eBoth defendants deny committing the offenses. They are also expected to argue that Finland lacks jurisdiction because the cable damage locations are outside Finnish territorial waters. The Helsinki District Court will determine the hearing date, including consideration of the jurisdiction question, and prosecutors said trial materials will be made public at the start of the hearing unless the court decides otherwise.\u003c/p\u003e\n\n\u003cp\u003eThe Fitburg case comes more than a year after Finnish armed police detained the Eagle S, a Russia-linked oil tanker that damaged multiple cables on Christmas Day 2024. Finland’s effort to prosecute senior officers from the Eagle S collapsed after legal rulings disputed Finnish jurisdiction. In that case, the tanker was carrying unleaded petrol and diesel from Russia, activity sanctioned by the European Union, but was allowed to continue because the cargo was being transferred outside the EU.\u003c/p\u003e\n\n\u003cp\u003eThe Eagle S cable breaks were among the most scrutinized incidents in a series of recent Baltic Sea cable faults that raised fears of a Russian sabotage campaign. In response, NATO announced increased Baltic Sea patrols involving frigates, maritime patrol aircraft, and a small fleet of naval drones. However, officials from several European countries around the North Sea and Baltic Sea previously told Recorded Future News there is growing confidence that the incidents were accidental and not directed by the Kremlin.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore event\u003c/h2\u003e\n\n\u003cp\u003eThe Finnish Prosecution Service announced that it is bringing charges against the captain and bosun of the cargo vessel Fitburg. The charges relate to submarine cable damage in the Baltic Sea on New Year’s Eve. Finnish authorities seized the vessel after cable faults were detected in the region, and two crew members were subsequently arrested.\u003c/p\u003e\n\n\u003cp\u003eAccording to Finnish Customs, the Fitburg had been transporting sanctioned steel products from Russia to Israel. The prosecution concerns damage to subsea infrastructure rather than the cargo itself, but the article notes the sanctioned nature of the cargo as part of the vessel’s background.\u003c/p\u003e\n\n\u003ch2 id=\"alleged-conduct-and-technical-detail\"\u003eAlleged conduct and technical detail\u003c/h2\u003e\n\n\u003cp\u003eProsecutors said the ship’s officers are accused of:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDamaging two subsea telecommunications cables.\u003c/li\u003e\n\u003cli\u003eAttempting to damage a total of eight other subsea connections.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe ship is believed to have dragged its damaged anchor along the seabed for at least 130 kilometers. Prosecutors said this continued until Finnish authorities took measures that halted the vessel’s movement. The article identifies anchor dragging across the seabed as the mechanism linked to the cable damage.\u003c/p\u003e\n\n\u003ch2 id=\"legal-posture\"\u003eLegal posture\u003c/h2\u003e\n\n\u003cp\u003eBoth defendants have denied committing the offenses. They are also expected to argue that Finland lacks jurisdiction in the case. According to prosecutors, this argument is based on the fact that the cable damage locations are outside Finnish territorial waters.\u003c/p\u003e\n\n\u003cp\u003eThe Helsinki District Court will determine the hearing date. The court will also address the issue of Finnish jurisdiction. Prosecutors said trial materials will be made public at the beginning of the hearing unless the District Court decides otherwise.\u003c/p\u003e\n\n\u003ch2 id=\"prior-related-case-eagle-s\"\u003ePrior related case: Eagle S\u003c/h2\u003e\n\n\u003cp\u003eThe Fitburg seizure occurred more than a year after Finnish armed police detained the Eagle S, a Russia-linked oil tanker that damaged multiple cables on Christmas Day 2024. Finland’s attempt to prosecute the ship’s senior officers collapsed after legal rulings disputed Finland’s jurisdiction over the case.\u003c/p\u003e\n\n\u003cp\u003eThe Eagle S had been carrying unleaded petrol and diesel from Russia. The article says this activity was also sanctioned by the European Union, but the tanker was allowed to continue because the cargo was being transferred outside the EU.\u003c/p\u003e\n\n\u003ch2 id=\"broader-baltic-sea-cable-fault-context\"\u003eBroader Baltic Sea cable-fault context\u003c/h2\u003e\n\n\u003cp\u003eThe cable breaks caused by the Eagle S were among the most scrutinized in a series of recent Baltic Sea cable faults. Those incidents alarmed observers who feared they might be part of a Russian sabotage campaign.\u003c/p\u003e\n\n\u003cp\u003eIn response to these incidents, NATO announced increased patrols of the Baltic Sea. The announced measures involved frigates, maritime patrol aircraft, and “a small fleet of naval drones.”\u003c/p\u003e\n\n\u003ch2 id=\"assessments-described-in-the-article\"\u003eAssessments described in the article\u003c/h2\u003e\n\n\u003cp\u003eOfficials from several European countries on the North Sea and Baltic Sea previously told Recorded Future News that there is increasing confidence among their governments that the incidents were accidental and not directed by the Kremlin. The article does not state that this view has been legally established in the Fitburg case.\u003c/p\u003e\n\n\u003cp\u003eOne European official said they had been briefed that on ships with limited professionalism, incompetent ship-masters sometimes avoid the effort of sending crew to the bow in bad weather to hoist the anchor. The official linked that behavior to anchors being dragged across the seabed, where most of the reported damage has occurred.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article presents the Fitburg case as both a specific criminal prosecution and part of a wider pattern of Baltic Sea subsea cable incidents. The most important unresolved issue is whether Finnish courts will accept jurisdiction over alleged damage that occurred outside Finnish territorial waters. That same jurisdictional issue was central to the earlier failed prosecution involving the Eagle S.\u003c/p\u003e\n","keyPoints":["The Finnish Prosecution Service announced charges against the captain and bosun of the cargo vessel Fitburg for damaging two subsea telecommunications cables and attempting to damage eight other subsea connections in the Baltic Sea.","Finnish authorities seized the Fitburg after cable faults were detected, and two crew members were later arrested.","Prosecutors said the ship is believed to have dragged its damaged anchor along the seabed for at least 130 kilometers until Finnish authorities halted the vessel’s movement.","Both defendants deny the offenses and are expected to argue that Finland lacks jurisdiction because the cable damage occurred outside Finnish territorial waters.","The case follows Finland’s failed attempt to prosecute senior officers of the Eagle S, a Russia-linked oil tanker that damaged multiple cables on Christmas Day 2024, after courts disputed Finnish jurisdiction."],"insights":["Jurisdiction is a central obstacle for Finland’s cable-damage prosecutions, as the article notes both the current Fitburg case and the earlier Eagle S case involve disputed Finnish authority over damage outside territorial waters.","The article indicates a shift in European assessments of Baltic cable incidents, with officials from several countries saying governments increasingly view the damage as accidental rather than Kremlin-directed sabotage.","NATO’s response shows that even incidents increasingly assessed as accidental have driven expanded Baltic Sea patrols using frigates, maritime patrol aircraft, and naval drones.","The article highlights that sanctioned cargo movements are a recurring feature in the cases, as both the Fitburg and Eagle S were transporting Russian-origin products subject to sanctions-related scrutiny."],"referencedReports":[],"body":"\u003cp\u003eThe Finnish Prosecution Service announced charges against the captain and bosun of the cargo vessel Fitburg after several submarine cable faults were detected in the Baltic Sea on New Year’s Eve. Prosecutors said the officers are accused of damaging two subsea telecommunications cables and attempting to damage eight other subsea connections. The Fitburg had been transporting sanctioned steel products from Russia to Israel, according to Finnish Customs, before Finnish authorities seized it.\u003c/p\u003e\n\n\u003cp\u003eProsecutors said the ship is believed to have dragged its damaged anchor along the seabed for at least 130 kilometers before Finnish authorities halted its movement. Both defendants deny the offenses and are expected to argue that Finland lacks jurisdiction because the cable damage occurred outside Finnish territorial waters. The Helsinki District Court will determine the hearing date and consider the jurisdiction issue.\u003c/p\u003e\n\n\u003cp\u003eThe case follows an earlier Finnish attempt to prosecute senior officers of the Russia-linked Eagle S oil tanker, which damaged multiple cables on Christmas Day 2024 but collapsed amid legal rulings disputing Finland’s jurisdiction. Recent Baltic Sea cable faults prompted NATO to increase patrols with frigates, maritime patrol aircraft, and naval drones. Officials from several European countries have told Recorded Future News that their governments increasingly believe the incidents were accidental rather than Kremlin-directed sabotage.\u003c/p\u003e\n"},{"n":8,"title":"DOJ seizes CFAKE, SOCFAKE deepfake nude sites under TAKE IT DOWN Act","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/doj-seizes-cfake-socfake-deepfake-nude-sites-under-take-it-down-act/","time":"21:56","priority":"SHOULD READ","score":78,"tldr":"The DOJ seized CFAKE.com and SOCFAKE.com for allegedly hosting nonconsensual AI-generated nude deepfakes, marking what appears to be the first publicly announced domain seizure under the TAKE IT DOWN Act. The operation involved U.S., Italian, and French authorities and included an arrest in France.","briefOverview":"\u003cp\u003eThe U.S. Department of Justice announced that it seized the CFAKE.com and SOCFAKE.com domains, which allegedly hosted nonconsensual AI-generated nude images and videos of women. The sites allegedly shared sexually explicit digital forgeries depicting politicians, celebrities, athletes, musicians, royalty, journalists, television presenters, and others from multiple countries. The DOJ said the domains were seized after a federal judge found probable cause that they were being used to violate the TAKE IT DOWN Act.\u003c/p\u003e\n\n\u003cp\u003eThe action appears to be the first publicly announced domain seizure under the TAKE IT DOWN Act, which was signed into law in May 2025. The law makes it a federal crime to publish sexually explicit altered images depicting identifiable individuals without consent and requires online platforms to remove reported intimate images and deepfakes within 48 hours of a valid victim request. The seizure banner on the sites cites violations of 47 U.S.C. § 223 and warns that violators can face fines, imprisonment, or both.\u003c/p\u003e\n\n\u003cp\u003eThe investigation began after Italy\u0026rsquo;s Postal and Cybersecurity Police alerted U.S. authorities to the websites. Italian authorities previously obtained a court order blocking access to the sites in Italy, while evidence gathered by U.S. law enforcement was later shared with French authorities. French prosecutors and investigators arrested a suspect in Nice, France, on June 10 and seized cryptocurrency allegedly connected to the operation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe U.S. Department of Justice announced the seizure of CFAKE.com and SOCFAKE.com, two websites that allegedly hosted nonconsensual AI-generated nude images and videos of women. The DOJ said the sites shared sexually explicit digital images, or deepfakes, depicting politicians, celebrities, athletes, musicians, royalty, and other public-facing women from multiple countries. According to the probable cause affidavit cited by the DOJ, the digital forgeries were made to appear to be sexual images of famous women, including politicians, first ladies, journalists, television presenters, athletes, entertainers, and others.\u003c/p\u003e\n\n\u003cp\u003eThe domains were seized on Thursday by the DOJ and Homeland Security Investigations after a federal judge found probable cause that they were being used to violate the TAKE IT DOWN Act. The sites now display a seizure notice stating that they were taken offline pursuant to a warrant issued by the U.S. District Court for the District of New Jersey. The banner identifies coordinated actions involving U.S., Italian, and French law enforcement agencies and cites violations of 47 U.S.C. § 223.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that a deepfake is AI-generated or AI-manipulated media that depicts a person saying, doing, or appearing in ways that never occurred. It notes that deepfake images and videos can be created from existing photos, videos, or audio recordings. The article also states that deepfakes are commonly used to generate nonconsensual nude content, impersonation scams, phishing attacks, and cryptocurrency fraud.\u003c/p\u003e\n\n\u003cp\u003eThe investigation began after Italy\u0026rsquo;s Postal and Cybersecurity Police alerted U.S. authorities to the websites. Italian media reports said investigators opened an inquiry in October 2025 after receiving complaints about AI-generated sexually explicit images depicting women from politics, sports, entertainment, and other public-facing professions. Italian authorities later obtained a court order blocking access to the websites within Italy while continuing their investigation.\u003c/p\u003e\n\n\u003cp\u003eThe DOJ said evidence gathered by U.S. law enforcement was later shared with French authorities. French prosecutors and investigators conducted an investigation that led to the arrest of a suspect in Nice, France, on June 10. Authorities also seized cryptocurrency allegedly connected to the operation.\u003c/p\u003e\n\n\u003cp\u003eThe TAKE IT DOWN Act was signed into law in May 2025 to combat the spread of nonconsensual imagery, including AI-generated deepfake pornography. The DOJ said the seizure of CFAKE.com and SOCFAKE.com appears to be the first publicly announced use of the law to target websites allegedly used to distribute deepfake pornography. The article also notes that the law was previously used against an Ohio man who pleaded guilty to charges related to creating AI-generated sexually explicit images.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe U.S. Department of Justice announced that it seized the CFAKE.com and SOCFAKE.com websites, which allegedly hosted nonconsensual AI-generated nude images and videos of women. The DOJ described the sites as sharing sexually explicit digital images, or deepfakes, depicting women from multiple countries.\u003c/p\u003e\n\n\u003cp\u003eAccording to the DOJ announcement cited in the article, the digital forgeries were allegedly made to appear to be sexual images of famous women. The named categories of depicted individuals included politicians, first ladies of multiple countries, royalty, journalists, television presenters, athletes, entertainers, musicians, celebrities, and others.\u003c/p\u003e\n\n\u003cp\u003eThe seizure appears to be the first publicly announced domain seizure under the TAKE IT DOWN Act.\u003c/p\u003e\n\n\u003ch2 id=\"legal-basis-and-seizure-action\"\u003eLegal basis and seizure action\u003c/h2\u003e\n\n\u003cp\u003eThe CFAKE.com and SOCFAKE.com domains were seized by the DOJ and Homeland Security Investigations after a federal judge found probable cause that the domains were being used to violate the TAKE IT DOWN Act.\u003c/p\u003e\n\n\u003cp\u003eThe sites now display a seizure banner stating that the domains were taken offline pursuant to a seizure warrant issued by the U.S. District Court for the District of New Jersey. The banner says the action was part of coordinated law enforcement activity involving:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHomeland Security Investigations New Jersey Field Office\u003c/li\u003e\n\u003cli\u003eFrench National Police\u003c/li\u003e\n\u003cli\u003eParis Prosecutor\u0026rsquo;s Office\u003c/li\u003e\n\u003cli\u003eItaly\u0026rsquo;s Polizia di Stato - Postal and Cybersecurity Police\u003c/li\u003e\n\u003cli\u003eU.S. Department of Justice Computer Crime and Intellectual Property Section\u003c/li\u003e\n\u003cli\u003eU.S. Attorney\u0026rsquo;s Office for the District of New Jersey\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe seizure banner cites violations of 47 U.S.C. § 223. It also states that the TAKE IT DOWN Act prohibits the nonconsensual publication of intimate imagery and digital forgeries, including deepfakes, and that violators may face fines, imprisonment, or both.\u003c/p\u003e\n\n\u003ch2 id=\"deepfake-context-described-in-the-article\"\u003eDeepfake context described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article defines a deepfake as AI-generated or AI-manipulated media that depicts a person saying, doing, or appearing in ways that never occurred. It states that deepfake images and videos can be created from existing photos, videos, or audio recordings.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that deepfakes are commonly used for several purposes, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNonconsensual nude content\u003c/li\u003e\n\u003cli\u003eImpersonation scams\u003c/li\u003e\n\u003cli\u003ePhishing attacks\u003c/li\u003e\n\u003cli\u003eCryptocurrency fraud\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn this case, the websites allegedly distributed nonconsensual sexually explicit digital forgeries of women.\u003c/p\u003e\n\n\u003ch2 id=\"international-investigation\"\u003eInternational investigation\u003c/h2\u003e\n\n\u003cp\u003eThe investigation began after Italy\u0026rsquo;s Postal and Cybersecurity Police alerted U.S. authorities to CFAKE.com and SOCFAKE.com. Italian media reports cited in the article said investigators opened an inquiry in October 2025 after receiving complaints about AI-generated sexually explicit images depicting women from politics, sports, entertainment, and other public-facing professions.\u003c/p\u003e\n\n\u003cp\u003eItalian authorities later obtained a court order blocking access to the websites within Italy while continuing their investigation.\u003c/p\u003e\n\n\u003cp\u003eThe DOJ said evidence gathered by U.S. law enforcement was later shared with French authorities. French prosecutors and investigators then conducted an investigation that led to the arrest of a suspect in Nice, France, on June 10. Authorities also seized cryptocurrency allegedly connected to the operation.\u003c/p\u003e\n\n\u003ch2 id=\"take-it-down-act-significance\"\u003eTAKE IT DOWN Act significance\u003c/h2\u003e\n\n\u003cp\u003eThe bipartisan TAKE IT DOWN Act was signed into law in May 2025 to combat the spread of nonconsensual imagery, including AI-generated deepfake pornography. The article states that First Lady Melania Trump championed the legislation as part of her \u0026ldquo;Be Best\u0026rdquo; initiative.\u003c/p\u003e\n\n\u003cp\u003eThe law makes it a federal crime to publish sexually explicit altered images depicting identifiable individuals without their consent. It also requires online platforms to remove reported intimate images and deepfakes within 48 hours of receiving a valid request from a victim.\u003c/p\u003e\n\n\u003cp\u003eActing Attorney General Todd Blanche described the domain seizures as a significant victory in the fight against deepfake pornography. He said the law gives authorities tools to combat the abuse and exploitation of women and children through fabricated images.\u003c/p\u003e\n\n\u003ch2 id=\"prior-use-of-the-law\"\u003ePrior use of the law\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the TAKE IT DOWN Act was previously used against an Ohio man who pleaded guilty to charges related to creating AI-generated sexually explicit images.\u003c/p\u003e\n\n\u003cp\u003eHowever, the seizure of CFAKE.com and SOCFAKE.com appears to be the first publicly announced use of the law to target websites allegedly used to distribute deepfake pornography.\u003c/p\u003e\n","keyPoints":["The U.S. Department of Justice seized the CFAKE.com and SOCFAKE.com domains, which allegedly hosted nonconsensual AI-generated nude images and videos of women.","The DOJ said the sites shared sexually explicit digital forgeries depicting famous women, including politicians, first ladies, royalty, journalists, television presenters, athletes, entertainers, and others.","The domains were seized after a federal judge found probable cause that they were being used to violate the TAKE IT DOWN Act, which prohibits nonconsensual publication of intimate imagery and digital forgeries.","The investigation began after Italy's Postal and Cybersecurity Police alerted U.S. authorities, and French investigators later arrested a suspect in Nice, France, on June 10.","The seizure of CFAKE.com and SOCFAKE.com appears to be the first publicly announced use of the TAKE IT DOWN Act to target websites allegedly used to distribute deepfake pornography."],"insights":["The case shows the TAKE IT DOWN Act being used not only for prosecution but also as a basis for domain seizure against websites allegedly distributing nonconsensual deepfake pornography.","The investigation was triggered by Italian authorities rather than U.S. victims or agencies, highlighting that foreign law enforcement referrals can lead to U.S. domain seizures when the domains fall under U.S. jurisdiction.","The coordinated action combined multiple enforcement measures across countries, including domain seizures in the United States, prior access blocking in Italy, an arrest in France, and cryptocurrency seizure tied to the alleged operation.","The seizure banner explicitly cites 47 U.S.C. § 223 and warns that violators of the TAKE IT DOWN Act can face fines, imprisonment, or both, indicating authorities are using seized domains to publicize legal consequences."],"referencedReports":[],"body":"\u003cp\u003eThe U.S. Department of Justice announced that it seized the CFAKE.com and SOCFAKE.com domains, which allegedly hosted nonconsensual AI-generated nude images and videos of women. The sites allegedly shared sexually explicit digital forgeries depicting politicians, celebrities, athletes, musicians, royalty, journalists, television presenters, and others from multiple countries. The DOJ said the domains were seized after a federal judge found probable cause that they were being used to violate the TAKE IT DOWN Act.\u003c/p\u003e\n\n\u003cp\u003eThe action appears to be the first publicly announced domain seizure under the TAKE IT DOWN Act, which was signed into law in May 2025. The law makes it a federal crime to publish sexually explicit altered images depicting identifiable individuals without consent and requires online platforms to remove reported intimate images and deepfakes within 48 hours of a valid victim request. The seizure banner on the sites cites violations of 47 U.S.C. § 223 and warns that violators can face fines, imprisonment, or both.\u003c/p\u003e\n\n\u003cp\u003eThe investigation began after Italy\u0026rsquo;s Postal and Cybersecurity Police alerted U.S. authorities to the websites. Italian authorities previously obtained a court order blocking access to the sites in Italy, while evidence gathered by U.S. law enforcement was later shared with French authorities. French prosecutors and investigators arrested a suspect in Nice, France, on June 10 and seized cryptocurrency allegedly connected to the operation.\u003c/p\u003e\n"},{"n":25,"title":"152 Chrome Wallpaper Extensions with 105K Installs Linked to Adware and Fake Traffic","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/152-chrome-wallpaper-extensions-with.html","time":"11:07","priority":"SHOULD READ","score":78,"tldr":"Researchers found 152 Chrome live-wallpaper extensions with about 105,000 installs that behaved like adware by tracking users despite store claims and generating fake “organic” Google traffic. The campaign appears financially motivated, using install and uninstall redirects to manipulate traffic attribution and share data with ad partners.","briefOverview":"\u003cp\u003eCybersecurity researchers discovered a network of 152 Google Chrome extensions that posed as new tab live wallpaper add-ons while distributing a potentially unwanted program family. The extensions collectively had 105,000 installs and were spread across 38 Chrome Web Store publisher accounts. The cluster used three brand backends: tabplugins.com, yowgames.com, and chromewallpaper.com.\u003c/p\u003e\n\n\u003cp\u003eSocket reported that the extensions’ Chrome Web Store listings said they would not collect or use user data, while their linked privacy policies said they logged IP addresses, ISP, click counts, and referrers. Those policies also said the data was shared with Google AdSense, DoubleClick, and third-party ad partners. The campaign was assessed as a financially motivated commercial adware and traffic-attribution-fraud affiliate operation.\u003c/p\u003e\n\n\u003cp\u003eA sub-cluster of the extensions used hard-coded install and uninstall URLs in a JavaScript file named js/bg.js. The install URL included UTM parameters to make the extension’s tab opening appear like Google organic search traffic, while the uninstall URL used a google.com/url redirect wrapper to resemble genuine Google Search activity. The JavaScript files also contained a dormant capability to enumerate and delete IndexedDB databases on service worker start.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers identified 152 Google Chrome extensions that acted as new tab live wallpaper add-ons and distributed a potentially unwanted program family. The extensions were collectively installed 105,000 times. They were spread across 38 Chrome Web Store publisher accounts and connected to three brand backends: tabplugins.com, yowgames.com, and chromewallpaper.com.\u003c/p\u003e\n\n\u003cp\u003eThe extensions used popular wallpaper themes, including football, anime, cars, games, and characters. Examples named in the article include Neymar - Football Live Wallpaper, Satoru Gojo Manga Live Wallpaper, Porsche 911 - Sports Car Live Wallpaper, Hello Kitty Wallpapers HD New Tab, and Spider-Man Miles Morales Swing Live Wallpaper. Several extension IDs were also listed for these examples.\u003c/p\u003e\n\n\u003cp\u003eSocket security researcher Kush Pandya said every Chrome Web Store listing declared that it would not collect or use user data. However, the linked privacy policy said the extensions logged IP addresses, ISP, click counts, and referrers. The policy also said that data was shared with Google AdSense, DoubleClick, and third-party ad partners.\u003c/p\u003e\n\n\u003cp\u003eA sub-cluster of the extensions defined two hard-coded URLs in js/bg.js that were triggered during install and uninstall operations. The install URL included UTM parameters such as utm_source=google, utm_medium=organic, and a campaign value tied to a wallpaper theme, making the extension’s tab opening appear as organic search traffic. The uninstall URL used a google.com/url redirect wrapper to make the event look like Google Search activity.\u003c/p\u003e\n\n\u003cp\u003eSocket said the campaign’s purpose was to artificially create the signal that traffic came from Google organic search, even though the visit was caused by the extension opening a tab on its own. The uninstall flow went further by using the google.com/url format associated with real search-result clicks, including ved and usg tokens. The JavaScript files also included a dormant capability to enumerate and delete IndexedDB databases when a service worker starts.\u003c/p\u003e\n\n\u003cp\u003eThe campaign was assessed as a financially motivated commercial adware and traffic-attribution-fraud affiliate operation. Its exact provenance remains unknown. The article says available circumstantial indicators suggest it could have originated from Turkey.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers discovered a network of 152 Google Chrome extensions that presented themselves as new tab live wallpaper add-ons. According to the article, the extensions distributed a potentially unwanted program family and were collectively installed 105,000 times.\u003c/p\u003e\n\n\u003cp\u003eThe cluster spanned 38 separate Chrome Web Store publisher accounts and used three brand backends:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003etabplugins.com\u003c/li\u003e\n\u003cli\u003eyowgames.com\u003c/li\u003e\n\u003cli\u003echromewallpaper.com\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe campaign was assessed as a financially motivated commercial adware and traffic-attribution-fraud affiliate operation. The article states that its exact provenance remains unknown, though available circumstantial indicators suggest it could have originated from Turkey.\u003c/p\u003e\n\n\u003ch2 id=\"extension-cluster-and-examples\"\u003eExtension Cluster and Examples\u003c/h2\u003e\n\n\u003cp\u003eThe extensions were themed around popular characters, sports, anime, cars, games, and wallpapers. The article lists examples such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNeymar - Football Live Wallpaper\u003c/li\u003e\n\u003cli\u003eSatoru Gojo Manga Live Wallpaper\u003c/li\u003e\n\u003cli\u003ePorsche 911 - Sports Car Live Wallpaper\u003c/li\u003e\n\u003cli\u003eSatoru Gojo Live Wallpaper\u003c/li\u003e\n\u003cli\u003eHello Kitty Wallpapers HD New Tab\u003c/li\u003e\n\u003cli\u003ePusheen Cat Wallpapers HD New Tab\u003c/li\u003e\n\u003cli\u003eSpider-Man Miles Morales Swing Live Wallpaper\u003c/li\u003e\n\u003cli\u003eBMW M3 Neon Night Drive Live Wallpaper\u003c/li\u003e\n\u003cli\u003eDeath Note Anime Wallpapers HD New Tab\u003c/li\u003e\n\u003cli\u003eTanjiro - Demon Slayer Live Wallpaper\u003c/li\u003e\n\u003cli\u003eMinecraft Sakura Pond Live Wallpaper\u003c/li\u003e\n\u003cli\u003eZenitsu Agatsuma Live Wallpaper\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also includes extension IDs for the named examples, indicating that the researchers identified specific Chrome Web Store extensions in the cluster.\u003c/p\u003e\n\n\u003ch2 id=\"data-collection-and-privacy-policy-conflict\"\u003eData Collection and Privacy Policy Conflict\u003c/h2\u003e\n\n\u003cp\u003eSocket security researcher Kush Pandya said the extensions’ Chrome Web Store listings all declared that they would not collect or use user data. However, the linked privacy policies admitted the opposite.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, those privacy policies said the extensions logged:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIP addresses\u003c/li\u003e\n\u003cli\u003eISP information\u003c/li\u003e\n\u003cli\u003eClick counts\u003c/li\u003e\n\u003cli\u003eReferrers\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe same policies also said that data was shared with Google AdSense, DoubleClick, and third-party ad partners. This created a direct discrepancy between what the Chrome Web Store listings claimed and what the linked privacy policies disclosed.\u003c/p\u003e\n\n\u003ch2 id=\"install-and-uninstall-traffic-attribution-behavior\"\u003eInstall and Uninstall Traffic Attribution Behavior\u003c/h2\u003e\n\n\u003cp\u003eA sub-cluster of the identified extensions contained two hard-coded URLs in a JavaScript file named \u003ccode\u003ejs/bg.js\u003c/code\u003e. These URLs were activated during install and uninstall operations.\u003c/p\u003e\n\n\u003cp\u003eThe install URL included Urchin Tracking Module parameters, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eutm_source=google\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eutm_medium=organic\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eutm_campaign=tanjiro-demon-slayer-live-wallpaper\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this disguised the extension opening a tab on install as an “organic” search. Socket explained that the visit was not caused by a person searching Google, but by the extension opening a tab on its own and marking it as having arrived from Google organic search.\u003c/p\u003e\n\n\u003cp\u003eThe uninstall URL used a \u003ccode\u003egoogle.com/url\u003c/code\u003e redirect wrapper. The article says this masqueraded the uninstall as genuine Google Search activity. Socket said the uninstall ping used the exact \u003ccode\u003egoogle.com/url\u003c/code\u003e format Google uses for real search-result clicks, including signed \u003ccode\u003eved\u003c/code\u003e and \u003ccode\u003eusg\u003c/code\u003e tokens, so the hit looked like a human clicking a Google result.\u003c/p\u003e\n\n\u003ch2 id=\"purpose-of-the-traffic-behavior\"\u003ePurpose of the Traffic Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that organic search refers to unpaid search engine listings generated by algorithms and placed based on factors such as relevance, authority, and search engine optimization. Socket said the extensions attempted to artificially create that signal.\u003c/p\u003e\n\n\u003cp\u003eThe article describes this as fabricating the origin of the extensions’ own traffic. Rather than a real user arriving from Google Search, the extension opened a tab automatically and made the traffic appear to come from Google organic search.\u003c/p\u003e\n\n\u003ch2 id=\"dormant-indexeddb-capability\"\u003eDormant IndexedDB Capability\u003c/h2\u003e\n\n\u003cp\u003eThe JavaScript files also contained a dormant capability related to IndexedDB. According to the article, the code could enumerate and delete every IndexedDB database it could find when a service worker starts.\u003c/p\u003e\n\n\u003cp\u003eThe article does not state that this capability was actively used, only that it was present in dormant form.\u003c/p\u003e\n\n\u003ch2 id=\"assessment-and-impact\"\u003eAssessment and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe campaign was characterized as a financially motivated commercial adware and traffic-attribution-fraud affiliate operation. The direct measured impact stated in the article was that the 152 extensions had been collectively installed 105,000 times.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify a named threat actor. It says the campaign’s exact provenance is unknown, while available circumstantial indicators suggest it could have originated from Turkey.\u003c/p\u003e\n","keyPoints":["Cybersecurity researchers discovered 152 Google Chrome extensions posing as new tab live wallpaper add-ons that distribute a potentially unwanted program family.","The extensions span 38 Chrome Web Store publisher accounts, use the tabplugins.com, yowgames.com, and chromewallpaper.com backends, and have been installed 105,000 times collectively.","Socket said the Chrome Web Store listings claimed the extensions did not collect or use user data, while linked privacy policies stated that they log IP addresses, ISP, click counts, and referrers and share data with ad partners.","Some extensions used hard-coded install and uninstall URLs to make extension-driven visits appear as Google organic search traffic or genuine Google Search activity.","Socket assessed the campaign as a financially motivated commercial adware and traffic-attribution-fraud affiliate operation, with circumstantial indicators suggesting a possible origin in Turkey."],"insights":["The extensions’ Chrome Web Store privacy declarations conflicted with their linked privacy policies, making policy mismatches a practical signal for identifying suspicious browser extensions.","The campaign used Google-style attribution artifacts, including UTM parameters and google.com/url redirect wrappers with ved and usg tokens, to make automated extension activity resemble legitimate organic search behavior.","A dormant function in the JavaScript files could enumerate and delete IndexedDB databases on service worker start, indicating the extensions contained capabilities beyond wallpaper customization and traffic generation.","The operation spread across 38 publisher accounts and three backend domains, showing that the campaign was structured to distribute risk and scale beyond a single Chrome Web Store identity."],"referencedReports":[{"title":"152 Chrome Live Wallpaper Extensions Hid Ad Tracking","url":"https://socket.dev/blog/152-chrome-live-wallpaper-extensions-hid-ad-tracking#Attribution","publisher":"Socket","context":"The article cites Socket security researcher Kush Pandya and relies on Socket’s analysis of the Chrome extension cluster, its privacy-policy discrepancies, and traffic-attribution-fraud behavior.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers discovered a network of 152 Google Chrome extensions that posed as new tab live wallpaper add-ons while distributing a potentially unwanted program family. The extensions collectively had 105,000 installs and were spread across 38 Chrome Web Store publisher accounts. The cluster used three brand backends: tabplugins.com, yowgames.com, and chromewallpaper.com.\u003c/p\u003e\n\n\u003cp\u003eSocket reported that the extensions’ Chrome Web Store listings said they would not collect or use user data, while their linked privacy policies said they logged IP addresses, ISP, click counts, and referrers. Those policies also said the data was shared with Google AdSense, DoubleClick, and third-party ad partners. The campaign was assessed as a financially motivated commercial adware and traffic-attribution-fraud affiliate operation.\u003c/p\u003e\n\n\u003cp\u003eA sub-cluster of the extensions used hard-coded install and uninstall URLs in a JavaScript file named js/bg.js. The install URL included UTM parameters to make the extension’s tab opening appear like Google organic search traffic, while the uninstall URL used a google.com/url redirect wrapper to resemble genuine Google Search activity. The JavaScript files also contained a dormant capability to enumerate and delete IndexedDB databases on service worker start.\u003c/p\u003e\n"},{"n":14,"title":"FBI: Fraudsters use couriers to steal money in crypto scams","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/fbi-fraudsters-use-couriers-to-steal-money-in-crypto-scams/","time":"15:30","priority":"MAY READ","score":72,"tldr":"The FBI warns that crypto investment scammers are using in-person couriers to collect cash from victims after banks block suspicious transfers. Victims are told to verify couriers with passwords or dollar bill serial numbers, then are shown fake wallet gains and pressured for more money.","briefOverview":"\u003cp\u003eThe FBI warned that criminals are using couriers to collect cash from victims of cryptocurrency investment scams, including pig butchering and romance baiting schemes. These scams often begin through social media, dating sites, or messaging apps, where fraudsters build trust before steering victims into fake investment opportunities. Instead of investing the money, scammers move funds into accounts they control.\u003c/p\u003e\n\n\u003cp\u003eAccording to the FBI, scammers are turning to in-person cash pickups after legitimate financial institutions block suspicious transfers. Couriers are authenticated using an agreed-upon password, code, or a specific U.S. dollar bill serial number. After victims hand over cash, scammers show fake increases in virtual wallet balances and may demand more money for fraudulent taxes or penalties.\u003c/p\u003e\n\n\u003cp\u003eThe FBI advised people to research cryptocurrency platforms before investing, avoid sharing home addresses, and never give cash to unknown individuals. Victims are urged to file a complaint with the FBI’s Internet Crime Complaint Center and provide details such as criminal names, communication methods, and bank accounts used. The article notes that U.S. victims lost nearly \u003cspan class=\"math inline\"\u003e\\(21 billion to cyber-enabled crimes last year, with investment scams causing \\)\u003c/span\u003e8.6 billion in losses.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe FBI issued a public service announcement warning that fraudsters are using couriers to collect money from victims of cryptocurrency investment scams. These scams are also described as pig butchering or romance baiting. They typically begin when criminals contact targets through social media, dating sites, or messaging apps and build trust before directing them to fake investment schemes.\u003c/p\u003e\n\n\u003cp\u003eThe FBI said scammers are pushing victims toward in-person cash pickups when legitimate financial institutions block suspicious money transfers. In some cases, scammers claim that a victim’s account has been “flagged” to justify the shift. Victims are then instructed to obtain cash and inform the primary scammer when they have the funds.\u003c/p\u003e\n\n\u003cp\u003eOnce the victim has cash, the scammer arranges for couriers to retrieve it at the victim’s home or at public locations. The couriers authenticate themselves using a U.S. dollar bill serial number, password, or other code provided in advance by the scammer. This process is presented to the victim as proof that the courier is affiliated with the scammer.\u003c/p\u003e\n\n\u003cp\u003eAfter the pickup, victims see a simulated increase in the balance of their virtual wallet. When they try to withdraw supposed winnings, the scammers restart the cycle and demand additional cash fo
