<script type="application/json" id="dl-articles">[{"n":3,"title":"Critical SimpleHelp flaw exploited to deploy new stealer malware","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/hackers-exploit-critical-simplehelp-flaw-deploy-new-djinn-infostealer-taskweaver-malware/","time":"14:00","priority":"MUST READ","score":95,"tldr":"Attackers are exploiting a critical authentication bypass in SimpleHelp (CVE-2026-48558) to deploy TaskWeaver and the new cross-platform Djinn Stealer, which steals cloud, developer, and AI coding assistant credentials from Windows, macOS, and Linux systems.","briefOverview":"\u003cp\u003eHackers are actively exploiting a critical authentication bypass vulnerability (CVE-2026-48558) in SimpleHelp, a remote monitoring and management platform used by MSPs and IT teams. The flaw, detailed earlier by Horizon3.ai, allows unauthenticated creation of privileged technician accounts on servers using the OpenID Connect protocol. An incident response investigation by Blackpoint found that a threat actor leveraged this vulnerability to establish an authenticated technician session on an exposed SimpleHelp server, then deployed previously unseen malware.\u003c/p\u003e\n\n\u003cp\u003eThe attacker used a JavaScript loader called TaskWeaver, delivered as an obfuscated file named \u0026lsquo;jquery.js\u0026rsquo;, which fingerprints the host and retrieves additional modules from a command-and-control server. TaskWeaver then dropped Djinn Stealer, a cross-platform information stealer that collects credentials and sensitive data from Windows, macOS, and Linux machines. Djinn Stealer targets cloud provider credentials, AI assistant configuration files (including Model Context Protocol settings), SSH keys, Git tokens, package registry credentials, cryptocurrency wallets, and on Linux it reads running process command lines and environment variables for secrets.\u003c/p\u003e\n\n\u003cp\u003eBlackpoint highlights that stealing AI developer tool credentials could let attackers inherit the access developers granted their assistants to repositories, cloud resources, and internal APIs. The stolen data is packed, compressed, and encrypted with AES-256-GCM using an RSA-2048 public key embedded in the loader before exfiltration. Administrators should immediately update SimpleHelp instances, terminate unrecognized technician sessions, and rotate all credentials and API keys if a compromise is suspected.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A threat actor exploited CVE-2026-48558, an authentication bypass in SimpleHelp, to create an unauthorized technician session on an internet-facing server.","The attacker deployed two previously undocumented pieces of malware: TaskWeaver, a JavaScript-based loader, and Djinn Stealer, a cross-platform information stealer that harvests credentials from Windows, macOS, and Linux.","Djinn Stealer targets AI development tools, cloud provider credentials, Git configurations, SSH keys, package managers, and cryptocurrency wallets.","The malware encrypts the collected data with AES-256-GCM using an RSA-2048 public key embedded in the loader before sending it to a command-and-control server.","Blackpoint warns that stealing local AI assistant configuration files could grant attackers the same downstream access to repositories, cloud accounts, and internal APIs that developers granted to their AI agents."],"insights":["The stealer specifically targets local Model Context Protocol (MCP) configuration files, which could grant attackers downstream access to all resources the developer had connected to their AI coding assistant, not just the AI service itself.","On Linux, the malware harvests secrets from the /proc filesystem by reading command-line arguments and environment variables of running processes, expanding credential theft beyond static configuration files.","The data exfiltration routine uses an AES-256-GCM key encrypted with an RSA-2048 public key embedded in the loader, ensuring only the attacker can decrypt the stolen information and complicating incident response."],"referencedReports":[{"title":"A Djinn in the Machine: TaskWeaver's Node.js Intrusion Chain","url":"https://blackpointcyber.com/blog/a-djinn-in-the-machine-taskweavers-node-js-intrusion-chain","publisher":"Blackpoint Cyber","context":"Blackpoint's investigation into the exploitation of CVE-2026-48558 and deployment of TaskWeaver and Djinn Stealer, including malware analysis and IoCs.","category":"research","primary":true}],"body":"\u003cp\u003eHackers are actively exploiting a critical authentication bypass vulnerability (CVE-2026-48558) in SimpleHelp, a remote monitoring and management platform used by MSPs and IT teams. The flaw, detailed earlier by Horizon3.ai, allows unauthenticated creation of privileged technician accounts on servers using the OpenID Connect protocol. An incident response investigation by Blackpoint found that a threat actor leveraged this vulnerability to establish an authenticated technician session on an exposed SimpleHelp server, then deployed previously unseen malware.\u003c/p\u003e\n\n\u003cp\u003eThe attacker used a JavaScript loader called TaskWeaver, delivered as an obfuscated file named \u0026lsquo;jquery.js\u0026rsquo;, which fingerprints the host and retrieves additional modules from a command-and-control server. TaskWeaver then dropped Djinn Stealer, a cross-platform information stealer that collects credentials and sensitive data from Windows, macOS, and Linux machines. Djinn Stealer targets cloud provider credentials, AI assistant configuration files (including Model Context Protocol settings), SSH keys, Git tokens, package registry credentials, cryptocurrency wallets, and on Linux it reads running process command lines and environment variables for secrets.\u003c/p\u003e\n\n\u003cp\u003eBlackpoint highlights that stealing AI developer tool credentials could let attackers inherit the access developers granted their assistants to repositories, cloud resources, and internal APIs. The stolen data is packed, compressed, and encrypted with AES-256-GCM using an RSA-2048 public key embedded in the loader before exfiltration. Administrators should immediately update SimpleHelp instances, terminate unrecognized technician sessions, and rotate all credentials and API keys if a compromise is suspected.\u003c/p\u003e\n"},{"n":4,"title":"Nissan discloses employee data breach linked to Oracle zero-day attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/nissan-discloses-employee-data-breach-linked-to-oracle-zero-day-attacks/","time":"20:40","priority":"MUST READ","score":95,"tldr":"Nissan disclosed a data breach affecting current and former employees after ShinyHunters exploited a zero-day in Oracle PeopleSoft (CVE-2026-35273) to steal sensitive personal and financial information.","briefOverview":"\u003cp\u003eNissan has begun notifying current and former employees of a data breach after threat actors exploited a zero-day vulnerability in Oracle PeopleSoft, tracked as CVE-2026-35273. The attack is linked to the ShinyHunters extortion group and is believed to have exposed sensitive personal information including Social Security numbers, banking details, and dependent data. Affected individuals are located in the United States, Canada, Mexico, and Brazil. Nissan says it is still in the early stages of its investigation and has not yet determined the full scope of compromised records.\u003c/p\u003e\n\n\u003cp\u003eThe breach is part of a larger campaign in which ShinyHunters claimed responsibility for compromising over 300 PeopleSoft instances across more than 100 organizations. Oracle later disclosed the critical vulnerability and provided emergency mitigations, while Mandiant independently confirmed active zero-day exploitation took place between May 27 and June 9. Other confirmed victims include Nottingham University and the National Association of Insurance Commissioners, and ShinyHunters has already begun leaking stolen data on its extortion site.\u003c/p\u003e\n\n\u003cp\u003eIn response, Nissan restricted access to employee pay slips and direct deposit changes to internal networks or secured VPN connections, and added identity verification steps before processing payroll requests. The company is also offering free credit and dark web monitoring services to affected employees where available. Importantly, Oracle privately informed Nissan that personnel records from hundreds of companies may have been obtained, indicating a gap between the vendor\u0026rsquo;s private customer warnings and its public disclosures about the exploited vulnerability.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Nissan is notifying current and former employees of a data breach after threat actors exploited an Oracle PeopleSoft vulnerability in a campaign linked to the ShinyHunters extortion group.","The exposed personal information includes Social Security numbers, banking details, contact information, and dependent data, affecting employees in the United States, Canada, Mexico, and Brazil.","Oracle confirmed the zero-day vulnerability as CVE-2026-35273 and released emergency mitigations after Mandiant reported exploitation between May 27 and June 9.","ShinyHunters claimed responsibility for breaching over 300 PeopleSoft instances across more than 100 organizations, and has since started leaking stolen data from other victims."],"insights":["Oracle privately disclosed to Nissan that the personnel records of hundreds of companies may have been obtained, even though the company has still not publicly confirmed that the zero-day was exploited—showing a mismatch between customer notifications and public transparency.","Nissan’s immediate step of restricting payroll slip and direct deposit change access to internal networks or VPNs, combined with added identity verification before processing requests, provides a concrete defensive measure other organizations can adopt after a similar HR system breach.","Mandiant independently verified active exploitation of the CVE-2026-35273 zero-day from May 27 to June 9, giving a two-week exposure window during which organizations relying solely on Oracle’s public statements were left vulnerable."],"referencedReports":[{"title":"Data Breach Notification – Nissan Americas (SB24-625558)","url":"https://oag.ca.gov/ecrime/databreach/reports/sb24-625558","publisher":"California Attorney General's Office","context":"Nissan filed breach notifications with the California AG's office detailing the PeopleSoft data theft attack and affected employee data.","category":"advisory","primary":true},{"title":"Oracle Security Alert CVE-2026-35273","url":"https://www.oracle.com/security-alerts/alert-cve-2026-35273.html","publisher":"Oracle","context":"Oracle disclosed the critical PeopleSoft PeopleTools vulnerability and issued emergency mitigations.","category":"advisory","primary":false},{"title":"ShinyHunters Targets Education Sector with Oracle Exploit","url":"https://cloud.google.com/blog/topics/threat-intelligence/shinyhunters-targets-education-sector-oracle-exploit","publisher":"Mandiant (Google Cloud)","context":"Mandiant confirmed that threat actors exploited CVE-2026-35273 as a zero-day in data theft attacks from May 27 to June 9.","category":"research","primary":false}],"body":"\u003cp\u003eNissan has begun notifying current and former employees of a data breach after threat actors exploited a zero-day vulnerability in Oracle PeopleSoft, tracked as CVE-2026-35273. The attack is linked to the ShinyHunters extortion group and is believed to have exposed sensitive personal information including Social Security numbers, banking details, and dependent data. Affected individuals are located in the United States, Canada, Mexico, and Brazil. Nissan says it is still in the early stages of its investigation and has not yet determined the full scope of compromised records.\u003c/p\u003e\n\n\u003cp\u003eThe breach is part of a larger campaign in which ShinyHunters claimed responsibility for compromising over 300 PeopleSoft instances across more than 100 organizations. Oracle later disclosed the critical vulnerability and provided emergency mitigations, while Mandiant independently confirmed active zero-day exploitation took place between May 27 and June 9. Other confirmed victims include Nottingham University and the National Association of Insurance Commissioners, and ShinyHunters has already begun leaking stolen data on its extortion site.\u003c/p\u003e\n\n\u003cp\u003eIn response, Nissan restricted access to employee pay slips and direct deposit changes to internal networks or secured VPN connections, and added identity verification steps before processing payroll requests. The company is also offering free credit and dark web monitoring services to affected employees where available. Importantly, Oracle privately informed Nissan that personnel records from hundreds of companies may have been obtained, indicating a gap between the vendor\u0026rsquo;s private customer warnings and its public disclosures about the exploited vulnerability.\u003c/p\u003e\n"},{"n":8,"title":"U.S. offers $10 million for hackers targeting WhatsApp, Signal users","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/us-offers-10-million-for-hackers-targeting-whatsapp-signal-users/","time":"15:09","priority":"MUST READ","score":95,"tldr":"The U.S. State Department is offering a $10 million reward for information on Russian threat groups UNC5792 and UNC4221, which are conducting phishing campaigns to steal Signal and WhatsApp backups from U.S. and allied government, military, and diplomatic personnel.","briefOverview":"\u003cp\u003eThe U.S. State Department is offering up to $10 million through its Rewards for Justice program for information leading to the identification or location of members of UNC5792 and UNC4221, two threat groups linked to Russian intelligence and military services. UNC5792 is associated with the Russian Federal Security Service (FSB) Border Guards, while UNC4221 works on behalf of Russian military services. Both groups have conducted widespread phishing campaigns targeting the Signal and WhatsApp accounts of U.S. government officials, military leadership, and allied personnel.\u003c/p\u003e\n\n\u003cp\u003eThe attackers impersonate Signal support agents and trick targets into revealing their data backup recovery keys, granting access to previous communications. This technique has compromised thousands of individual accounts across messaging platforms despite the underlying encryption remaining intact. The phishing activity has predominantly targeted U.S. and NATO diplomatic, defense, and intelligence officials, as well as journalists covering Russia/Ukraine, NGOs supporting Ukraine, and security researchers.\u003c/p\u003e\n\n\u003cp\u003eThe FBI and CISA recently updated an advisory highlighting these tactics, emphasizing that real support teams never request verification codes or account recovery via direct message. The large-scale compromise demonstrates that even the most secure communication tools are vulnerable to social engineering, as the hackers relied entirely on impersonation rather than technical exploitation to collect sensitive data from high-value individuals.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The U.S. Department of State is offering a reward of up to $10 million for information that helps identify or locate members of the UNC5792 and UNC4221 threat groups.","UNC5792 is associated with Russia's FSB Border Guards, while UNC4221 works on behalf of Russian military services.","The groups conducted phishing campaigns targeting Signal and WhatsApp accounts, tricking users into revealing backup recovery keys to access past communications.","Thousands of accounts were compromised, with targets including U.S. and NATO government, diplomatic, defense, and intelligence officials, as well as journalists and Ukraine-supporting NGOs.","The platforms' underlying encryption was not broken; the attackers relied on impersonating support agents and social engineering to obtain backup keys."],"insights":["Attackers specifically target Signal backup recovery keys, which provide access to past messages, rather than attempting to compromise live accounts or break encryption.","Thousands of individual accounts were compromised, demonstrating a large-scale and coordinated phishing operation against high-value targets.","One threat group is linked to Russia's FSB Border Guards, showing that cyber espionage capabilities are being leveraged by branches of Russian security services beyond traditional intelligence agencies.","The underlying encryption of Signal and WhatsApp was not broken; the attacks succeeded purely through social engineering, emphasizing that even the most secure platforms are vulnerable to human-targeted phishing."],"referencedReports":[],"body":"\u003cp\u003eThe U.S. State Department is offering up to $10 million through its Rewards for Justice program for information leading to the identification or location of members of UNC5792 and UNC4221, two threat groups linked to Russian intelligence and military services. UNC5792 is associated with the Russian Federal Security Service (FSB) Border Guards, while UNC4221 works on behalf of Russian military services. Both groups have conducted widespread phishing campaigns targeting the Signal and WhatsApp accounts of U.S. government officials, military leadership, and allied personnel.\u003c/p\u003e\n\n\u003cp\u003eThe attackers impersonate Signal support agents and trick targets into revealing their data backup recovery keys, granting access to previous communications. This technique has compromised thousands of individual accounts across messaging platforms despite the underlying encryption remaining intact. The phishing activity has predominantly targeted U.S. and NATO diplomatic, defense, and intelligence officials, as well as journalists covering Russia/Ukraine, NGOs supporting Ukraine, and security researchers.\u003c/p\u003e\n\n\u003cp\u003eThe FBI and CISA recently updated an advisory highlighting these tactics, emphasizing that real support teams never request verification codes or account recovery via direct message. The large-scale compromise demonstrates that even the most secure communication tools are vulnerable to social engineering, as the hackers relied entirely on impersonation rather than technical exploitation to collect sensitive data from high-value individuals.\u003c/p\u003e\n"},{"n":20,"title":"Hijacked npm and Go Packages Use VS Code Tasks to Deploy Python Infostealer","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/hijacked-npm-and-go-packages-use-vs.html","time":"05:36","priority":"MUST READ","score":95,"tldr":"North Korean-linked attackers hijacked npm and Go packages to hide malicious code inside a VS Code task that auto-runs when the project folder is opened, ultimately deploying a Python infostealer and socket.io backdoor to harvest credentials, cryptocurrency wallets, and developer data.","briefOverview":"\u003cp\u003eCybersecurity researchers uncovered two compromised npm packages—html-to-gutenberg and fetch-page-assets—and a cluster of 16 Go packages that delivered a Python-based information stealer by abusing a hidden Visual Studio Code task. The malware was activated when a developer opened the malicious project folder in an IDE like VS Code or Cursor, avoiding the typical npm lifecycle scripts likely to be restricted in future npm versions.\u003c/p\u003e\n\n\u003cp\u003eThe attack, attributed to a North Korean threat actor and a variant of the Contagious Interview campaign dubbed “Fake Font,” disguised initial JavaScript payloads as font files and used blockchain transactions on TronGrid and Aptos as a resilient dead drop resolver to fetch next-stage code. From there, a socket.io backdoor was established for remote shell access, file operations, and arbitrary JavaScript execution, while a Python loader installed an infostealer.\u003c/p\u003e\n\n\u003cp\u003eThe stealer targeted browser credentials, cryptocurrency wallets, developer tools (Git credentials, GitHub Desktop logs, VS Code global storage), OS credential stores (Windows Credential Manager, Linux Secret Service, macOS Keychain, KDE Wallet), and cloud storage metadata for services like Dropbox and Google Drive. Exfiltrated archives were sent to both the command-and-control server and, if configured, a Telegram bot, making the campaign a dual threat of immediate theft and ongoing interactive access.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Two hijacked npm packages (html-to-gutenberg and fetch-page-assets) and 16 Go packages were found to deploy a Python-based information stealer through a hidden VS Code task that runs automatically when a project folder is opened.","The attack, attributed to North Korea-linked Fake Font variant of the Contagious Interview campaign, disguises malicious JavaScript as a font file and uses blockchain transactions on TronGrid and Aptos as a dead drop resolver to retrieve the next-stage payload.","The malware sets up a Socket.io backdoor that gives the attacker remote control over the infected host and a Python stealer that harvests browser credentials, cryptocurrency wallets, password managers, developer tools data, OS credential stores, and cloud storage metadata.","The malicious packages were uploaded to npm on May 25, 2026, and are no longer available for download; users are advised to immediately remove the packages, check for hidden VS Code folder-open tasks, and rotate all credentials, tokens, and wallet keys."],"insights":["The attackers deliberately bypassed npm lifecycle scripts, likely to anticipate and evade npm v12's upcoming security hardenings, instead embedding code in a VS Code task that auto-executes when the project folder is opened—a subtle but effective shift in initial access strategy.","The malware uses blockchain transaction data (TronGrid with Aptos as fallback) as a dead drop resolver to fetch encrypted payloads, making the command-and-control chain exceptionally resilient to infrastructure takedowns and domain blocking.","Many of the Go packages were not newly created malicious libraries but legitimate projects whose latest releases had been compromised to include the malware alongside their original functionality, indicating a broader and stealthier supply chain infiltration.","The Python infostealer aggressively targets developer tooling such as Git credentials, GitHub Desktop logs, VS Code global storage, and cloud storage metadata (iCloud, Google Drive, OneDrive, etc.), underscoring that developer environments are now prime targets for credential harvesting.","Stolen data is exfiltrated back to the attacker not only through the primary C2 server but also via a Telegram bot if the attacker supplies a bot token at runtime, providing a secondary, harder-to-monitor data leak channel."],"referencedReports":[{"title":"Hijacked npm VS Code Tasks Blockchain","url":"https://research.jfrog.com/post/hijacked-npm-vscode-tasks-blockchain/","publisher":"JFrog","context":"JFrog's technical analysis forms the core of the article, providing the discovery and breakdown of the hijacked npm packages, VS Code task abuse, blockchain dead drop resolver, and the multi-stage infection chain.","category":"research","primary":true},{"title":"DPRK Contagious Interview Campaign: Fake Font Uses Malicious VS Code Fonts","url":"https://opensourcemalware.com/blog/dprk-contagious-interview-campaign-fake-font-uses-malicious-vs-code-fonts","publisher":"OpenSourceMalware","context":"Security researcher Paul McCarty's earlier analysis linked the Fake Font technique and InvisibleFerret backdoor to the Contagious Interview campaign, providing attribution context for the npm/Go campaign.","category":"research","primary":false}],"body":"\u003cp\u003eCybersecurity researchers uncovered two compromised npm packages—html-to-gutenberg and fetch-page-assets—and a cluster of 16 Go packages that delivered a Python-based information stealer by abusing a hidden Visual Studio Code task. The malware was activated when a developer opened the malicious project folder in an IDE like VS Code or Cursor, avoiding the typical npm lifecycle scripts likely to be restricted in future npm versions.\u003c/p\u003e\n\n\u003cp\u003eThe attack, attributed to a North Korean threat actor and a variant of the Contagious Interview campaign dubbed “Fake Font,” disguised initial JavaScript payloads as font files and used blockchain transactions on TronGrid and Aptos as a resilient dead drop resolver to fetch next-stage code. From there, a socket.io backdoor was established for remote shell access, file operations, and arbitrary JavaScript execution, while a Python loader installed an infostealer.\u003c/p\u003e\n\n\u003cp\u003eThe stealer targeted browser credentials, cryptocurrency wallets, developer tools (Git credentials, GitHub Desktop logs, VS Code global storage), OS credential stores (Windows Credential Manager, Linux Secret Service, macOS Keychain, KDE Wallet), and cloud storage metadata for services like Dropbox and Google Drive. Exfiltrated archives were sent to both the command-and-control server and, if configured, a Telegram bot, making the campaign a dual threat of immediate theft and ongoing interactive access.\u003c/p\u003e\n"},{"n":25,"title":"Public PoC Released for Critical libssh2 CVE-2026-55200 Client-Side SSH Flaw","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/public-poc-released-for-critical.html","time":"07:06","priority":"MUST READ","score":95,"tldr":"A public proof-of-concept exploit has been released for a critical memory corruption vulnerability (CVE-2026-55200) in the widely embedded libssh2 SSH client library, allowing malicious servers to potentially execute code on connecting clients; urgent patching or outbound SSH restriction is needed, especially given libssh2's hidden presence in many applications.","briefOverview":"\u003cp\u003eA public proof-of-concept has been released for CVE-2026-55200, a critical vulnerability in the libssh2 SSH client library. The flaw, rated CVSS 4.0 score 9.2, allows a malicious or compromised SSH server to trigger memory corruption on any connecting client with no credentials or user interaction. All libssh2 versions up to and including 1.11.1 are affected.\u003c/p\u003e\n\n\u003cp\u003eThe bug resides in the ssh2_transport_read() function in transport.c, where the incoming packet_length field was not checked for an upper bound. By supplying a length of 0xffffffff, an attacker can cause a 32-bit integer overflow that wraps to a tiny value, leading to an undersized allocation and an out-of-bounds heap write. The fix adds a check to reject packet lengths above LIBSSH2_PACKET_MAXPAYLOAD, and is available via commit 97acf3d, though no tagged release exists yet.\u003c/p\u003e\n\n\u003cp\u003eBecause libssh2 is embedded in widely used software like curl, Git, and PHP—often as a statically linked copy—many deployments are invisible to standard package updates and remain vulnerable. NHS England Digital has issued an urgent cyber alert, and distributions like Debian are backporting the patch. Until patched, organizations are advised to restrict outbound SSH connections to trusted servers and watch for oversized-packet anomalies or unexpected crashes.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A public proof-of-concept has been released for CVE-2026-55200, a critical vulnerability in the libssh2 client-side SSH library that allows a malicious server to corrupt memory and possibly execute code on connecting clients without any user interaction.","libssh2 is embedded in many widely used applications such as curl, Git, and PHP, and is often statically linked, so standard operating system updates may not patch it.","The flaw is an integer overflow in packet length handling that leads to an out-of-bounds heap write, a bug class that previously affected libssh2 in CVE-2019-3855.","No official fixed release of libssh2 is available yet, but distributions like Debian have backported the patch, and NHS England Digital has issued a cyber alert urging organizations to apply the fix.","While the proof-of-concept demonstrates the issue, reliable remote code execution depends on the target environment, and no active exploitation in the wild has been reported."],"insights":["The same integer-overflow-to-buffer-overflow bug class in transport.c was fixed in libssh2 version 1.8.1 in 2019 (CVE-2019-3855), yet a near-identical flaw reappeared seven years later, indicating insufficient regression testing or code hardening after the previous critical patch.","Although CISA's current exploitation rating for CVE-2026-55200 is 'none' and no wild exploitation is reported, the library's pervasive static linking means many organizations remain unknowingly exposed, creating a high-stakes risk that official metrics do not capture.","The public proof-of-concept was posted in an 'exploitarium' repository without prior reporting, and the author admits entries are incomplete and AI-assisted, lowering the bar for attack development despite not being a turnkey remote exploit.","No tagged release of libssh2 with the fix yet exists, forcing downstream distributions and projects like Debian to backport the patch themselves, which may lead to inconsistent or delayed patching across the ecosystem.","The UK's NHS England Digital issued a specific cyber alert, underscoring that critical healthcare infrastructure relies on applications that embed libssh2, making patient-facing systems a potential attack surface from untrusted SSH endpoints."],"referencedReports":[{"title":"libssh2 Out-of-Bounds Write via Unchecked Packet Length in Transport C","url":"https://www.vulncheck.com/advisories/libssh2-out-of-bounds-write-via-unchecked-packet-length-in-transport-c","publisher":"VulnCheck","context":"The article cites this advisory for the CVSS 4.0 score of 9.2 and details of CVE-2026-55200.","category":"advisory","primary":false},{"title":"Cyber alert CC-4799","url":"https://digital.nhs.uk/cyber-alerts/2026/cc-4799","publisher":"NHS England Digital","context":"The article notes that NHS England Digital issued an advisory urging organizations to update vulnerable libssh2 installations.","category":"advisory","primary":false}],"body":"\u003cp\u003eA public proof-of-concept has been released for CVE-2026-55200, a critical vulnerability in the libssh2 SSH client library. The flaw, rated CVSS 4.0 score 9.2, allows a malicious or compromised SSH server to trigger memory corruption on any connecting client with no credentials or user interaction. All libssh2 versions up to and including 1.11.1 are affected.\u003c/p\u003e\n\n\u003cp\u003eThe bug resides in the ssh2_transport_read() function in transport.c, where the incoming packet_length field was not checked for an upper bound. By supplying a length of 0xffffffff, an attacker can cause a 32-bit integer overflow that wraps to a tiny value, leading to an undersized allocation and an out-of-bounds heap write. The fix adds a check to reject packet lengths above LIBSSH2_PACKET_MAXPAYLOAD, and is available via commit 97acf3d, though no tagged release exists yet.\u003c/p\u003e\n\n\u003cp\u003eBecause libssh2 is embedded in widely used software like curl, Git, and PHP—often as a statically linked copy—many deployments are invisible to standard package updates and remain vulnerable. NHS England Digital has issued an urgent cyber alert, and distributions like Debian are backporting the patch. Until patched, organizations are advised to restrict outbound SSH connections to trusted servers and watch for oversized-packet anomalies or unexpected crashes.\u003c/p\u003e\n"},{"n":5,"title":"NAIC says public data stolen in ShinyHunters' PeopleSoft breach","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/naic-says-public-data-stolen-in-shinyhunters-peoplesoft-breach/","time":"20:30","priority":"MUST READ","score":94,"tldr":"The NAIC confirmed a breach by ShinyHunters exploiting an Oracle PeopleSoft zero-day, but insists only publicly available data and outdated logs were stolen, directly disputing the hackers' claims of compromising sensitive regulatory systems.","briefOverview":"\u003cp\u003eThe National Association of Insurance Commissioners (NAIC) was breached by the ShinyHunters extortion group, who exploited a zero-day vulnerability in Oracle PeopleSoft (CVE-2026-35273). NAIC detected the unauthorized access on June 11 and later confirmed that the attackers stole data, but insists it was limited to publicly available statutory financial reports, credit rating agency data, outdated logs, and configuration files. The organization found no evidence that personally identifiable information or sensitive financial data was exposed, directly disputing ShinyHunters\u0026rsquo; claims of compromising critical insurance regulatory platforms.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters updated their claims on June 25, asserting they hold 3.1 TB of data and 105,000 files, including 264,000 insurer regulatory filing PDFs and stored credentials for production environments. The threat actor admitted that a previous summary of the stolen data had been exaggerated due to the use of AI hallucinations when evaluating files, and that the latest inventory was verified by a human. Despite NAIC\u0026rsquo;s assertions, the incident still caused operational disruptions, with credit rating agencies temporarily suspending data feeds and NAIC pausing its investment designation work.\u003c/p\u003e\n\n\u003cp\u003eThe zero-day exploitation campaign has allegedly affected more than 100 organizations, many in the education sector, and involved re-victimization of previously extorted entities. BleepingComputer reported on the attacks before Oracle publicly disclosed the vulnerability, and NAIC states that all affected systems have been remediated with additional defenses now being implemented.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["ShinyHunters breached NAIC systems by exploiting a zero-day vulnerability (CVE-2026-35273) in Oracle PeopleSoft.","NAIC disputes the hackers' claims, stating only publicly available data, outdated logs, and configuration files were stolen and no personally identifiable or financial data was exposed.","The ShinyHunters group claims to hold 3.1 TB of stolen data including 264,000 insurer regulatory filing PDFs, but admitted their initial data summary was exaggerated due to AI hallucinations.","The same PeopleSoft zero-day was used to target more than 100 organizations, many in the education sector, according to the threat actor."],"insights":["The ShinyHunters group publicly admitted that its initial exaggerated data inventory was caused by using AI that hallucinated when analyzing stolen files, revealing that threat actors are now employing AI tools that can introduce inaccuracies into extortion claims.","The zero-day was deliberately used to re-compromise organizations, predominantly in education, that ShinyHunters had already extorted in the past, indicating a deliberate re-victimization strategy rather than mass-scanning.","Despite NAIC's assertion that no sensitive personal data was stolen, the incident still prompted credit rating agencies to suspend data feeds and forced the association to pause investment designation work, showing how even a limited breach can disrupt critical regulatory operations.","BleepingComputer reported on the zero-day attacks before Oracle publicly disclosed the vulnerability, highlighting the media's role in forcing faster transparency around exploitation campaigns."],"referencedReports":[],"body":"\u003cp\u003eThe National Association of Insurance Commissioners (NAIC) was breached by the ShinyHunters extortion group, who exploited a zero-day vulnerability in Oracle PeopleSoft (CVE-2026-35273). NAIC detected the unauthorized access on June 11 and later confirmed that the attackers stole data, but insists it was limited to publicly available statutory financial reports, credit rating agency data, outdated logs, and configuration files. The organization found no evidence that personally identifiable information or sensitive financial data was exposed, directly disputing ShinyHunters\u0026rsquo; claims of compromising critical insurance regulatory platforms.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters updated their claims on June 25, asserting they hold 3.1 TB of data and 105,000 files, including 264,000 insurer regulatory filing PDFs and stored credentials for production environments. The threat actor admitted that a previous summary of the stolen data had been exaggerated due to the use of AI hallucinations when evaluating files, and that the latest inventory was verified by a human. Despite NAIC\u0026rsquo;s assertions, the incident still caused operational disruptions, with credit rating agencies temporarily suspending data feeds and NAIC pausing its investment designation work.\u003c/p\u003e\n\n\u003cp\u003eThe zero-day exploitation campaign has allegedly affected more than 100 organizations, many in the education sector, and involved re-victimization of previously extorted entities. BleepingComputer reported on the attacks before Oracle publicly disclosed the vulnerability, and NAIC states that all affected systems have been remediated with additional defenses now being implemented.\u003c/p\u003e\n"},{"n":16,"title":"Microsoft Removes 119 Edge Extensions That Hid Malware in Images and Fonts","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/microsoft-removes-119-edge-extensions.html","time":"08:32","priority":"MUST READ","score":94,"tldr":"Microsoft removed 119 malicious Edge extensions that used steganography to hide code in images and fonts for ad fraud and credential theft, linked to the Chinese DarkSpectre threat group.","briefOverview":"\u003cp\u003eMicrosoft removed 119 malicious browser extensions from the Edge Add-ons store that used steganography to conceal executable code inside normal-looking image and font files, calling the campaign StegoAd. The extensions—masked as ad blockers, VPNs, translators, and downloaders—had up to 2.6 million installs and operated undetected since at least 2021. The attack is notable for employing steganography at scale in the browser extension ecosystem, a technique rarely seen in such campaigns.\u003c/p\u003e\n\n\u003cp\u003eThe payloads stayed dormant for days after installation and employed multiple evasion checks, including detection of open DevTools and server-side fingerprinting, so only a fraction of installs were actually compromised. When triggered, the extensions delivered ad fraud by injecting ads and hijacking affiliate commissions, while also running a remote code execution backdoor capable of stealing Google credentials, two-factor codes, WordPress admin logins, and browser cookies for session hijacking. The operators even embedded covert telemetry inside Google Analytics IDs to monitor the campaign through Google\u0026rsquo;s own infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe operation is linked through shared infrastructure and techniques to the Chinese DarkSpectre threat group, overlapping with the GhostPoster and ShadyPanda extension campaigns. Microsoft suspended over 90 developer accounts, published a full list of extension IDs, and noted the actor remains active. Affected users should change passwords for critical accounts and adopt hardware-based two-factor authentication to resist this type of credential theft.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Microsoft removed 119 malicious Edge Add-ons that hid their payloads inside ordinary image and font files using steganography.","The extensions delayed execution for days and used server-side checks, so only a fraction of the up to 2.6 million installs were actually compromised.","Once active, payloads performed ad fraud by injecting ads and hijacking affiliate commissions, and harvested Google credentials, two-factor codes, WordPress logins, and browser cookies for session hijacking.","The operation shares infrastructure and techniques with the Chinese DarkSpectre group and overlaps with the GhostPoster and ShadyPanda extension campaigns.","Microsoft suspended over 90 associated developer accounts and published a full list of extension IDs along with indicators of compromise for Chrome, Firefox, and Edge."],"insights":["Steganography at this scale is rare in the browser extension ecosystem, indicating a threat actor with advanced evasion capabilities that static scanners are not equipped to detect.","The operators embedded covert telemetry inside Google Analytics IDs, allowing them to monitor the campaign in near real-time through Google's own legitimate infrastructure without raising suspicion.","The malicious extensions actively checked for open DevTools and extended their dormancy if they detected an analyst inspecting them, demonstrating deliberate counter-forensics.","The campaign operated a polymorphic framework across roughly 66 extensions with at least 15 naming variants, revealing industrialized, scalable development practices designed to automate repackaging and evade blocklists.","The same actor behind StegoAd is linked through shared domains and techniques to the GhostPoster and ShadyPanda campaigns, showing a persistent, adaptive Chinese threat group that has been recycling methods for years."],"referencedReports":[{"title":"Inside StegoAd: How We Disrupted a Massive Malicious Extension Campaign","url":"https://microsoftedge.github.io/edgevr/posts/Inside-StegoAd-How-We-Disrupted-a-Massive-Malicious-Extension-Campaign/","publisher":"Microsoft","context":"The article references this blog post as the official technical deep-dive and source for details on the StegoAd operation.","category":"research","primary":true},{"title":"Microsoft Edge Security StegoAd Technical Report","url":"https://microsoftedge.github.io/edgevr/assets/files/stego_ad/Microsoft_Edge_Security_StegoAd.pdf","publisher":"Microsoft","context":"The article states the full list of malicious extension IDs is in this technical report and that the report contains indicators of compromise.","category":"research","primary":true}],"body":"\u003cp\u003eMicrosoft removed 119 malicious browser extensions from the Edge Add-ons store that used steganography to conceal executable code inside normal-looking image and font files, calling the campaign StegoAd. The extensions—masked as ad blockers, VPNs, translators, and downloaders—had up to 2.6 million installs and operated undetected since at least 2021. The attack is notable for employing steganography at scale in the browser extension ecosystem, a technique rarely seen in such campaigns.\u003c/p\u003e\n\n\u003cp\u003eThe payloads stayed dormant for days after installation and employed multiple evasion checks, including detection of open DevTools and server-side fingerprinting, so only a fraction of installs were actually compromised. When triggered, the extensions delivered ad fraud by injecting ads and hijacking affiliate commissions, while also running a remote code execution backdoor capable of stealing Google credentials, two-factor codes, WordPress admin logins, and browser cookies for session hijacking. The operators even embedded covert telemetry inside Google Analytics IDs to monitor the campaign through Google\u0026rsquo;s own infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe operation is linked through shared infrastructure and techniques to the Chinese DarkSpectre threat group, overlapping with the GhostPoster and ShadyPanda extension campaigns. Microsoft suspended over 90 developer accounts, published a full list of extension IDs, and noted the actor remains active. Affected users should change passwords for critical accounts and adopt hardware-based two-factor authentication to resist this type of credential theft.\u003c/p\u003e\n"},{"n":21,"title":"Mustang Panda Uses Zoho WorkDrive as Command Channel in Indian Government Attacks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/mustang-panda-uses-zoho-workdrive-as.html","time":"15:03","priority":"MUST READ","score":94,"tldr":"China-linked threat actor Mustang Panda is compromising Indian government and hydropower targets with novel malware that abuses Zoho WorkDrive as a stealth command-and-control channel, blending malicious traffic into legitimate cloud activity.","briefOverview":"\u003cp\u003eThe China-aligned espionage group Mustang Panda conducted two campaigns targeting Indian government and hydropower organizations, leveraging spear-phishing emails with lures themed around a hydropower cooperation proposal and a memorandum of understanding between Indian and Taiwanese institutions. The attacks delivered ZIP archives containing hidden malicious DLLs that sideloaded through legitimate signed binaries, including Solid PDF Creator and Citrix Receiver executables. Acronis Threat Research Unit identified active compromises on machines used by senior administrative staff within Indian government networks and collaborated with CERT-In to notify victims and clean up the infections.\u003c/p\u003e\n\n\u003cp\u003eThree new malware tools were deployed: SHARDLOADER acts as a loader via DLL sideloading, MINIRECON is a reworked variant of the Toneshell backdoor beaconing over a WebSocket HTTPS connection, and ZOHOMURK abuses a legitimate Zoho WorkDrive cloud account as a dead-drop command-and-control channel. ZOHOMURK uses hardcoded OAuth credentials to read attacker commands from a WorkDrive inbox folder and write stolen data to an outbox folder, blending its traffic with ordinary cloud activity. Thin operational security, including hardcoded tokens, plaintext identifiers, reused infrastructure, and a persistent “RunOnece” typo across implants, allowed analysts to attribute the activity to Mustang Panda with high confidence.\u003c/p\u003e\n\n\u003cp\u003eThe goal was to collect intelligence on India’s hydropower plans and its defense ties with Taiwan, continuing a Chinese espionage interest in India’s power sector previously seen in the RedEcho campaign targeting the electricity grid with ShadowPad. By transforming a trusted cloud platform into a stealthy command channel, the attackers bypass traditional network defenses, making detection reliant on spotting the initial delivery or anomalous cloud API usage. Acronis published specific detection indicators, including a scheduled task named SolidPDFPcl2Bmp, the C2 domain couldinstallup[.]com, and Zoho user agents appearing on non-browser processes.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Mustang Panda is a China-aligned cyber espionage group running two campaigns against Indian government and hydropower targets.","The group deployed a new malware called ZOHOMURK that abuses Zoho WorkDrive, a common cloud storage platform in India’s government sector, to relay commands and exfiltrate stolen data while blending into normal cloud traffic.","The attack campaigns were delivered as ZIP archives with hidden malicious DLLs, likely through spear-phishing emails using lures themed around a hydropower cooperation proposal and an India-Taiwan memorandum of understanding.","Acronis Threat Research Unit discovered active compromises on machines used by senior administrative staff in Indian government networks and collaborated with CERT-In to notify victims and clean up the infections.","The operations aimed to collect intelligence on India’s hydropower plans and defense ties with Taiwan, and attribution to Mustang Panda was based on reused sideloading chains, code overlap with the Toneshell backdoor, shared infrastructure, and a persistent typo across implants."],"insights":["Zoho WorkDrive, a legitimate cloud storage service commonly used in India’s government sector, was weaponized as a dead-drop command channel, making the malicious traffic indistinguishable from normal user activity.","The attackers left behind hardcoded OAuth tokens, plaintext identifiers, and the persistent typo 'RunOnece' across implants, turning a sophisticated campaign into one that was quickly attributable and trackable.","ZOHOMURK malware uses only the WorkDrive inbox and outbox folders to receive commands and exfiltrate data, completely eliminating the need for a traditional external command-and-control server.","Persistence was achieved through a scheduled task named SolidPDFPcl2Bmp, which mimics a legitimate PDF tool, providing a precise detection signature for defenders to hunt for in their environments."],"referencedReports":[{"title":"Mustang Panda targets India’s government and energy sectors","url":"https://www.acronis.com/en/tru/posts/mustang-panda-targets-indias-government-and-energy-sectors/","publisher":"Acronis Threat Research Unit","context":"The article is based on this research, which discovered the active compromises, detailed the malware tools SHARDLOADER, MINIRECON, and ZOHOMURK, and provided attribution and technical indicators.","category":"research","primary":true},{"title":"Hive0154 Drops Updated Toneshell Backdoor","url":"https://www.ibm.com/think/x-force/hive0154-drops-updated-toneshell-backdoor","publisher":"IBM X-Force","context":"The article states that MINIRECON is a reworked variant of the Toneshell backdoor previously documented by IBM X-Force.","category":"research","primary":false},{"title":"RedEcho: Targeting the Indian Power Sector","url":"https://www.recordedfuture.com/research/redecho-targeting-indian-power-sector","publisher":"Recorded Future","context":"The article references this research to show that China-linked interest in India's power sector dates back to the 2021 RedEcho campaign targeting the electricity grid with ShadowPad.","category":"research","primary":false}],"body":"\u003cp\u003eThe China-aligned espionage group Mustang Panda conducted two campaigns targeting Indian government and hydropower organizations, leveraging spear-phishing emails with lures themed around a hydropower cooperation proposal and a memorandum of understanding between Indian and Taiwanese institutions. The attacks delivered ZIP archives containing hidden malicious DLLs that sideloaded through legitimate signed binaries, including Solid PDF Creator and Citrix Receiver executables. Acronis Threat Research Unit identified active compromises on machines used by senior administrative staff within Indian government networks and collaborated with CERT-In to notify victims and clean up the infections.\u003c/p\u003e\n\n\u003cp\u003eThree new malware tools were deployed: SHARDLOADER acts as a loader via DLL sideloading, MINIRECON is a reworked variant of the Toneshell backdoor beaconing over a WebSocket HTTPS connection, and ZOHOMURK abuses a legitimate Zoho WorkDrive cloud account as a dead-drop command-and-control channel. ZOHOMURK uses hardcoded OAuth credentials to read attacker commands from a WorkDrive inbox folder and write stolen data to an outbox folder, blending its traffic with ordinary cloud activity. Thin operational security, including hardcoded tokens, plaintext identifiers, reused infrastructure, and a persistent “RunOnece” typo across implants, allowed analysts to attribute the activity to Mustang Panda with high confidence.\u003c/p\u003e\n\n\u003cp\u003eThe goal was to collect intelligence on India’s hydropower plans and its defense ties with Taiwan, continuing a Chinese espionage interest in India’s power sector previously seen in the RedEcho campaign targeting the electricity grid with ShadowPad. By transforming a trusted cloud platform into a stealthy command channel, the attackers bypass traditional network defenses, making detection reliant on spotting the initial delivery or anomalous cloud API usage. Acronis published specific detection indicators, including a scheduled task named SolidPDFPcl2Bmp, the C2 domain couldinstallup[.]com, and Zoho user agents appearing on non-browser processes.\u003c/p\u003e\n"},{"n":6,"title":"Hackers now exploit critical Oracle E-Business flaw in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-oracle-e-business-suite-flaw-now-exploited-in-attacks/","time":"13:46","priority":"MUST READ","score":93,"tldr":"Attackers are now actively exploiting the critical Oracle E-Business Suite vulnerability CVE-2026-46817, enabling unauthenticated system takeover. Organizations should patch immediately to prevent compromise.","briefOverview":"\u003cp\u003eAttackers have begun actively exploiting a critical vulnerability, CVE-2026-46817, in the Oracle E-Business Suite financial application, according to threat intelligence firm Defused. The flaw resides in the File Transmission component of the Oracle Payments product and allows unauthenticated attackers with HTTP network access to completely take over vulnerable systems via low-complexity attacks. Oracle released a fix in its May 2026 Critical Security Patch Update and urged immediate patching.\u003c/p\u003e\n\n\u003cp\u003eShadowserver is tracking over 450 Oracle EBS instances still exposed online, with nearly 200 located in the United States and in Europe, though the patching status of these systems is unknown. The exploitation was first observed over the weekend on Defused’s honeypots, with no prior public exploits or known in-the-wild activity. Despite this, Oracle has not yet flagged CVE-2026-46817 as exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eOracle continues to receive reports of attempts to exploit already-patched vulnerabilities, and attributes successful attacks to customers failing to apply available patches. The company strongly recommends staying on actively supported versions and applying security fixes without delay. This incident follows a pattern of Oracle product exploitation, including a previous Oracle EBS zero-day used by the Clop extortion gang to steal data from universities and corporations, as well as other Oracle WebLogic and PeopleSoft flaws recently leveraged in attacks.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Attackers are actively exploiting a critical vulnerability tracked as CVE-2026-46817 in the Oracle E-Business Suite, which allows unauthenticated system takeover through low-complexity HTTP attacks.","Oracle released a security fix for this flaw in its May 2026 Critical Security Patch Update and strongly urged customers to apply the patch without delay.","Threat intelligence company Defused observed an actor exploiting the vulnerability on its Oracle E-Business honeypots over the weekend, with no prior known exploitation or public proof-of-concept code.","Shadowserver is currently tracking over 450 Oracle E-Business Suite instances exposed online, with nearly 200 located in the United States and in Europe.","The Clop extortion gang previously exploited another Oracle EBS vulnerability (CVE-2025-61882) in zero-day attacks against U.S. universities, the Washington Post, Logitech, and GlobalLogic."],"insights":["Exploitation began without any prior known exploitation or public proof-of-concept code, indicating the attacker likely developed a weaponized exploit privately after the patch was released.","Oracle has yet to flag CVE-2026-46817 as exploited in the wild, even as a threat intelligence firm observed active attacks, highlighting a potential lag in official threat confirmation.","The Clop gang's earlier exploitation of a different Oracle E-Business Suite flaw for extortion against universities and corporations reveals a recurring interest by financially motivated groups in these applications.","Over 450 Oracle E-Business Suite instances remain directly exposed online, with no indication of patching status, suggesting a large and persistent attack surface for this vulnerability.","The detection of in-the-wild attempts via honeypots demonstrates how proactive deception infrastructure can provide early warning of zero-day or newly weaponized exploits before they are widely reported."],"referencedReports":[{"title":"Oracle Critical Patch Update Advisory - May 2026","url":"https://www.oracle.com/security-alerts/cspumay2026.html","publisher":"Oracle","context":"The article references Oracle's May 2026 Critical Security Patch Update advisory, which includes the fix for CVE-2026-46817.","category":"advisory","primary":true}],"body":"\u003cp\u003eAttackers have begun actively exploiting a critical vulnerability, CVE-2026-46817, in the Oracle E-Business Suite financial application, according to threat intelligence firm Defused. The flaw resides in the File Transmission component of the Oracle Payments product and allows unauthenticated attackers with HTTP network access to completely take over vulnerable systems via low-complexity attacks. Oracle released a fix in its May 2026 Critical Security Patch Update and urged immediate patching.\u003c/p\u003e\n\n\u003cp\u003eShadowserver is tracking over 450 Oracle EBS instances still exposed online, with nearly 200 located in the United States and in Europe, though the patching status of these systems is unknown. The exploitation was first observed over the weekend on Defused’s honeypots, with no prior public exploits or known in-the-wild activity. Despite this, Oracle has not yet flagged CVE-2026-46817 as exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eOracle continues to receive reports of attempts to exploit already-patched vulnerabilities, and attributes successful attacks to customers failing to apply available patches. The company strongly recommends staying on actively supported versions and applying security fixes without delay. This incident follows a pattern of Oracle product exploitation, including a previous Oracle EBS zero-day used by the Clop extortion gang to steal data from universities and corporations, as well as other Oracle WebLogic and PeopleSoft flaws recently leveraged in attacks.\u003c/p\u003e\n"},{"n":15,"title":"US posts $10 million reward over Russian cyber campaign targeting Signal, WhatsApp","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/10million-reward-us-russian-hackers-unc4221-unc5792","time":"15:20","priority":"MUST READ","score":93,"tldr":"The U.S. government is offering up to $10 million for information on two Russian intelligence-linked groups that compromise Signal and WhatsApp accounts through social engineering to steal backup recovery keys and access private communications, targeting government officials, journalists, and activists.","briefOverview":"\u003cp\u003eThe United States is offering a $10 million reward through the Rewards for Justice program for information on two Russian state-backed hacking groups, UNC5792 and UNC4221, that are compromising Signal and WhatsApp accounts belonging to government officials, journalists, and other high-profile individuals. The FBI issued a public advisory describing how these groups have evolved their espionage campaigns to increasingly target backup recovery keys for encrypted messaging applications. The groups are linked to Russia\u0026rsquo;s Federal Security Service (FSB), Border Guards, and military intelligence, and the campaign was uncovered in cooperation with Ukraine\u0026rsquo;s Security Service (SBU).\u003c/p\u003e\n\n\u003cp\u003eThe core technique involves social engineering: attackers trick victims into disclosing verification codes, account PINs, and backup recovery keys, enabling them to access private message histories and, in some cases, fully take over accounts. A particularly dangerous aspect is that stolen backup recovery keys can remain valid indefinitely, even after victims create new accounts using the same phone number, allowing attackers to regain access to future conversations. In some instances, attackers also altered legitimate Signal group invitation pages to redirect victims to malicious links that connected attacker-controlled devices to their accounts.\u003c/p\u003e\n\n\u003cp\u003eThe campaign targets sensitive military, political, and economic information exchanged through encrypted chats, posing a persistent espionage threat. By focusing on compromising individual accounts rather than exploiting platform vulnerabilities, the attackers maintain stealth and long-term access. This method of stealing backup keys rather than just live credentials represents a strategic shift toward resilient surveillance, making it exceptionally difficult for victims to permanently sever the intruders\u0026rsquo; access.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The U.S. is offering up to $10 million through its Rewards for Justice program for information leading to the identification of members of Russian hacking groups UNC5792 and UNC4221.","The hackers use social engineering to trick victims into revealing verification codes, PINs, and backup recovery keys for encrypted messaging apps like Signal and WhatsApp.","Compromised backup recovery keys can remain valid even after victims create new accounts with the same phone number, potentially allowing attackers to regain access in the future.","The campaign, uncovered in collaboration with Ukraine's Security Service (SBU), has targeted government officials, military personnel, politicians, journalists, and activists across the U.S., Ukraine, and Europe.","One common method involves text messages that impersonate official messaging platform support services to urge users to disclose account credentials."],"insights":["Compromised backup recovery keys can remain valid even after victims create new accounts with the same phone number, enabling attackers to regain access and intercept future conversations indefinitely.","The attackers went beyond simple phishing by altering legitimate Signal group invitation pages to redirect victims to malicious links, weaponizing a trusted feature to connect attacker-controlled devices.","The FBI noted that the campaign has specifically evolved to increasingly target backup recovery keys rather than just live account credentials, highlighting a strategic shift toward long-term, resilient surveillance."],"referencedReports":[{"title":"FBI Public Service Announcement PSA260626","url":"https://www.ic3.gov/PSA/2026/PSA260626","publisher":"FBI","context":"The FBI issued a public advisory warning about Russian state-backed hacking groups targeting encrypted messaging accounts and increasingly stealing backup recovery keys.","category":"advisory","primary":true}],"body":"\u003cp\u003eThe United States is offering a $10 million reward through the Rewards for Justice program for information on two Russian state-backed hacking groups, UNC5792 and UNC4221, that are compromising Signal and WhatsApp accounts belonging to government officials, journalists, and other high-profile individuals. The FBI issued a public advisory describing how these groups have evolved their espionage campaigns to increasingly target backup recovery keys for encrypted messaging applications. The groups are linked to Russia\u0026rsquo;s Federal Security Service (FSB), Border Guards, and military intelligence, and the campaign was uncovered in cooperation with Ukraine\u0026rsquo;s Security Service (SBU).\u003c/p\u003e\n\n\u003cp\u003eThe core technique involves social engineering: attackers trick victims into disclosing verification codes, account PINs, and backup recovery keys, enabling them to access private message histories and, in some cases, fully take over accounts. A particularly dangerous aspect is that stolen backup recovery keys can remain valid indefinitely, even after victims create new accounts using the same phone number, allowing attackers to regain access to future conversations. In some instances, attackers also altered legitimate Signal group invitation pages to redirect victims to malicious links that connected attacker-controlled devices to their accounts.\u003c/p\u003e\n\n\u003cp\u003eThe campaign targets sensitive military, political, and economic information exchanged through encrypted chats, posing a persistent espionage threat. By focusing on compromising individual accounts rather than exploiting platform vulnerabilities, the attackers maintain stealth and long-term access. This method of stealing backup keys rather than just live credentials represents a strategic shift toward resilient surveillance, making it exceptionally difficult for victims to permanently sever the intruders\u0026rsquo; access.\u003c/p\u003e\n"},{"n":17,"title":"236,000 DCloud Uni-App Sites Used in Crypto Scams, Phishing, and Wallet Drainers","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/236000-dcloud-uni-app-sites-used-in.html","time":"11:57","priority":"MUST READ","score":93,"tldr":"Infoblox researchers uncovered over 236,000 live scam websites built on the legitimate Chinese DCloud Uni-App framework, powering fake crypto exchanges, wallet drainers, and phishing operations—including Argentina's RainbowEx Ponzi scheme—with some operators stripping the framework's fingerprint to evade detection.","briefOverview":"\u003cp\u003eInfoblox\u0026rsquo;s threat intelligence research has uncovered more than 236,000 distinct second-level domains using the legitimate Chinese open-source DCloud Uni-App framework to power a sprawling global scam economy. These sites, which span every continent and target speakers of at least eight languages, host fake cryptocurrency exchanges, multi-language pig-butchering operations, WhatsApp phishing networks, fake gambling platforms, brand-impersonation storefronts, and cryptocurrency wallet drainers. The scams have been active since mid-2022 and include the infamous RainbowEx Ponzi scheme that defrauded tens of thousands of people in San Pedro, Argentina.\u003c/p\u003e\n\n\u003cp\u003eA closer analysis reveals two overlapping populations of DCloud-fingerprinted sites: one with the default framework signatures that includes both legitimate businesses and malicious operations, and a larger, more evasive subset where operators have stripped the default scaffolding to avoid fingerprint-based detection. These evasive sites use bulletproof hosting at roughly double the rate of vanilla-fingerprinted sites, indicating that more sophisticated actors seek infrastructure resistant to takedown requests. The majority of domains are hosted on legitimate providers such as Cloudflare, Alibaba Cloud, Tencent Cloud, and AWS, while about six percent rely on bulletproof hosting providers like CTG Server Limited (AS152194).\u003c/p\u003e\n\n\u003cp\u003eFurther investigation suggests possible centralized ownership across a significant portion of the DCloud investment scam infrastructure, evidenced by synchronized drops in new domain registrations and shared technical fingerprints, communication patterns, and hosting decisions. The scam templates consistently employ an invitation-code gate that converts victims into recruiters, building pyramid structures. The same playbook has surfaced in publicly known U.S. operations, including the LSSC electric scooter sharing investment scam and an ongoing bicycle-sharing scam fronted by a U.K.-registered company with a genuine U.S. federal money-services license.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Infoblox identified 236,493 second-level domains using the DCloud Uni-App framework to run investment scams, including fake cryptocurrency exchanges, wallet drainers, WhatsApp phishing, and fake gambling platforms.","The RainbowEx cryptocurrency Ponzi scheme that defrauded tens of thousands of people in San Pedro, Argentina, was built on this framework.","Sophisticated operators strip the default DCloud framework fingerprints to evade detection, and these evasive sites use bulletproof hosting at roughly double the rate of sites that retain the fingerprint.","The LSSC electric scooter sharing investment scam, which triggered a major federal-and-state fraud investigation in the United States, also used a Uni-App template, and a similar bicycle sharing scam is currently operating under a U.K.-registered front.","Most DCloud scam domains are hosted on legitimate providers such as Cloudflare and AWS, but about 6% rely on bulletproof hosting providers like CTG Server Limited (AS152194)."],"insights":["The full population of DCloud investment scam sites is larger than fingerprint-based scans suggest because sophisticated operators strip the default framework signatures to evade detection, and those evasive sites use bulletproof hosting at roughly double the rate of sites that retain the fingerprint.","A substantial portion of the DCloud scam ecosystem likely operates under centralized control, indicated by synchronized drops in new domain registrations across diverse hosting providers simultaneously.","Every investment scam site built on the Uni-App template requires an invitation code from an existing affiliate to create an account, automatically converting victims into recruiters and enforcing pyramid structure from the moment of onboarding.","The same Uni-App scam template was used to build a bicycle-sharing investment fraud that operates behind a U.K.-registered company with a genuine U.S. federal money-services license, demonstrating how legitimate financial infrastructure is being weaponized to appear credible."],"referencedReports":[{"title":"From San Pedro to Salinas: How a Chinese Framework DCloud Uni-App Powers a Global Scam Economy","url":"https://www.infoblox.com/blog/threat-intelligence/from-san-pedro-to-salinas-how-a-chinese-framework-dcloud-uni-app-powers-a-global-scam-economy/","publisher":"Infoblox","context":"Infoblox said in an exhaustive report published last week","category":"research","primary":true}],"body":"\u003cp\u003eInfoblox\u0026rsquo;s threat intelligence research has uncovered more than 236,000 distinct second-level domains using the legitimate Chinese open-source DCloud Uni-App framework to power a sprawling global scam economy. These sites, which span every continent and target speakers of at least eight languages, host fake cryptocurrency exchanges, multi-language pig-butchering operations, WhatsApp phishing networks, fake gambling platforms, brand-impersonation storefronts, and cryptocurrency wallet drainers. The scams have been active since mid-2022 and include the infamous RainbowEx Ponzi scheme that defrauded tens of thousands of people in San Pedro, Argentina.\u003c/p\u003e\n\n\u003cp\u003eA closer analysis reveals two overlapping populations of DCloud-fingerprinted sites: one with the default framework signatures that includes both legitimate businesses and malicious operations, and a larger, more evasive subset where operators have stripped the default scaffolding to avoid fingerprint-based detection. These evasive sites use bulletproof hosting at roughly double the rate of vanilla-fingerprinted sites, indicating that more sophisticated actors seek infrastructure resistant to takedown requests. The majority of domains are hosted on legitimate providers such as Cloudflare, Alibaba Cloud, Tencent Cloud, and AWS, while about six percent rely on bulletproof hosting providers like CTG Server Limited (AS152194).\u003c/p\u003e\n\n\u003cp\u003eFurther investigation suggests possible centralized ownership across a significant portion of the DCloud investment scam infrastructure, evidenced by synchronized drops in new domain registrations and shared technical fingerprints, communication patterns, and hosting decisions. The scam templates consistently employ an invitation-code gate that converts victims into recruiters, building pyramid structures. The same playbook has surfaced in publicly known U.S. operations, including the LSSC electric scooter sharing investment scam and an ongoing bicycle-sharing scam fronted by a U.K.-registered company with a genuine U.S. federal money-services license.\u003c/p\u003e\n"},{"n":29,"title":"The Gentlemen are knocking: сustom backdoors and evolving tactics","source":"securelist.com","sourceColorIdx":5,"link":"https://securelist.com/the-gentlemen-raas/120447/","time":"10:00","priority":"MUST READ","score":93,"tldr":"The Gentlemen ransomware group is rapidly evolving its custom toolset with new Go and C implants, advanced reconnaissance, and lateral movement via GPO and PsExec, posing a significant threat to large organizations worldwide.","briefOverview":"\u003cp\u003eThe Gentlemen are a ransomware-as-a-service (RaaS) group that has rapidly escalated their operations since early 2026, frequently targeting large enterprises and critical infrastructure across diverse industries. According to public data, they rank among the top 10 ransomware actors by victim announcements on their data leak site. The group often gains initial access through exploiting vulnerabilities in internet-facing services or using stolen credentials, and they appear to work with initial access brokers, sometimes lingering in networks long before deploying ransomware.\u003c/p\u003e\n\n\u003cp\u003eTheir technical arsenal includes custom implants like a Go-based backdoor for command execution and SOCKS proxying, as well as two ransomware variants: a widely used Go version and a developing C version. The Go ransomware requires a password (CbdU8EgF) to execute as an anti-sandbox measure, encrypts files with Curve25519 and XChaCha20, and spreads laterally via Group Policy Objects (GPO) and PsExec. It aggressively disables security products through Bring Your Own Vulnerable Driver (BYOVD) attacks using drivers such as ProcessMonitorDriver.sys and wamsdk.sys, registry modifications, and PowerShell commands that turn off Windows Defender.\u003c/p\u003e\n\n\u003cp\u003eThe group’s reconnaissance and lateral movement capabilities are extensive, using tools like SharpADWS, NetScan, Advanced IP Scanner, and netsh for packet capture to map networks and steal credentials. The in-development C ransomware switches to AES256-GCM + RSA encryption and replaces Tox-based negotiation with email communication, while still missing several planned features. Observed intrusions heavily affect organizations in Brazil, China, Indonesia, Taiwan, and Thailand, underscoring the global reach and adaptive nature of this threat.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The Gentlemen group uses custom Go and C-based ransomware implants, along with a Go backdoor, to enable remote command execution and lateral movement within victim networks.","They disable security products by exploiting vulnerable drivers (e.g., ProcessMonitorDriver.sys, wamsdk.sys) through Bring Your Own Vulnerable Driver (BYOVD) techniques, and by modifying Windows registry settings and PowerShell commands to turn off Windows Defender.","The Go ransomware encrypts files using Curve25519 and XChaCha20, requires a password (CbdU8EgF) for execution, and spreads via Group Policy Objects and PsExec, while the in-development C variant uses AES256-GCM with RSA and shifts victim communication from Tox to email.","A custom Go backdoor uses the Yamux library to maintain a persistent connection to a C2 server at 81.177.215.15:9443, supporting command execution and SOCKS proxy functionality for network pivoting.","The group targets a wide range of industries worldwide, with manufacturing, healthcare, and financial services among the affected, and heavily impacted countries include Brazil, China, Indonesia, Taiwan, and Thailand."],"insights":["The Go ransomware uses a previously unknown custom obfuscator that renames symbols, source files, and function signatures, indicating a dedicated anti-analysis development effort.","In some attacks, access to victim systems had been established long before ransomware deployment, suggesting the group likely collaborates with other actors or initial access brokers rather than always performing the initial breach themselves.","The C-based ransomware's event log clearing function incorrectly uses 'S' as a log category, likely due to a typo or missing parameter, which could leave forensic traces on compromised systems.","The custom Go backdoor was deployed a day before the ransomware attack, establishing persistent command execution and SOCKS proxy capabilities as part of a staged, intelligence-gathering intrusion.","The group is actively developing a C ransomware variant, with multiple unimplemented parameters and a smaller file denylist observed in limited live attacks, indicating real-world testing on victims."],"referencedReports":[{"title":"Ransomware Live Stats 2026","url":"https://ransomware.live/stats/2026","publisher":"Ransomware.live","context":"The article cites public reports from this source to show The Gentlemen's ranking among top ransomware actors in early 2026.","category":"research","primary":false},{"title":"Hasta la muerte: The Gentlemen RaaS TTPs uncovered","url":"https://www.group-ib.com/blog/hastalamuerte-gentlemen-raas-ttps/","publisher":"Group-IB","context":"The article references this Group-IB blog as a previous report on The Gentlemen's initial infection vectors and TTPs from multiple cybersecurity vendors.","category":"research","primary":false}],"body":"\u003cp\u003eThe Gentlemen are a ransomware-as-a-service (RaaS) group that has rapidly escalated their operations since early 2026, frequently targeting large enterprises and critical infrastructure across diverse industries. According to public data, they rank among the top 10 ransomware actors by victim announcements on their data leak site. The group often gains initial access through exploiting vulnerabilities in internet-facing services or using stolen credentials, and they appear to work with initial access brokers, sometimes lingering in networks long before deploying ransomware.\u003c/p\u003e\n\n\u003cp\u003eTheir technical arsenal includes custom implants like a Go-based backdoor for command execution and SOCKS proxying, as well as two ransomware variants: a widely used Go version and a developing C version. The Go ransomware requires a password (CbdU8EgF) to execute as an anti-sandbox measure, encrypts files with Curve25519 and XChaCha20, and spreads laterally via Group Policy Objects (GPO) and PsExec. It aggressively disables security products through Bring Your Own Vulnerable Driver (BYOVD) attacks using drivers such as ProcessMonitorDriver.sys and wamsdk.sys, registry modifications, and PowerShell commands that turn off Windows Defender.\u003c/p\u003e\n\n\u003cp\u003eThe group’s reconnaissance and lateral movement capabilities are extensive, using tools like SharpADWS, NetScan, Advanced IP Scanner, and netsh for packet capture to map networks and steal credentials. The in-development C ransomware switches to AES256-GCM + RSA encryption and replaces Tox-based negotiation with email communication, while still missing several planned features. Observed intrusions heavily affect organizations in Brazil, China, Indonesia, Taiwan, and Thailand, underscoring the global reach and adaptive nature of this threat.\u003c/p\u003e\n"},{"n":27,"title":"Accelerating EDR Evasion with LLM-Driven Analysis","source":"specterops.io","sourceColorIdx":1,"link":"https://specterops.io/blog/2026/06/29/llm-power
