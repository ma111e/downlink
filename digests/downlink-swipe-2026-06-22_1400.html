window.__DL_ARTICLES = [{"n":6,"title":"Researchers Detail DifyTap Flaws in Dify That Could Expose AI Chats Across Tenants","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/researchers-detail-difytap-flaws-in.html","time":"16:13","priority":"SHOULD READ","score":86,"tldr":"Researchers disclosed four DifyTap vulnerabilities in Dify that could let attackers access AI chats, files, and internal APIs across tenants, including creating covert exfiltration channels for messages and model responses. Most flaws were fixed in Dify 1.14.2, but one Plugin Daemon path traversal issue remains pending a fix.","briefOverview":"\u003cp\u003eCybersecurity researchers at Zafran Security disclosed details of four vulnerabilities in Dify, an open-source agentic workflow platform with more than 146,000 GitHub stars. The flaws, collectively named DifyTap, could allow attackers to stealthily read AI conversations from other customers\u0026rsquo; applications. Zafran said two vulnerabilities were critical, two required no authentication, and three had cross-tenant impact on Dify\u0026rsquo;s multi-tenant cloud service.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities could have enabled attackers to read private AI chats, create a covert exfiltration channel for every message and model response, traverse Dify\u0026rsquo;s internal Plugin Daemon API from unauthenticated requests, and trigger cross-tenant internal API calls. They also made it possible to preview documents uploaded by other tenants and leak files across users within a tenant by attaching another user\u0026rsquo;s file UUID. Separately, Zafran found that Dify\u0026rsquo;s file parsing stack used a PDFium version affected by CVE-2024-5846, a use-after-free bug that could potentially be exploited through a crafted PDF file.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed Dify flaws are tracked as CVE-2026-41947, CVE-2026-41948, CVE-2026-41949, and CVE-2026-41950. The article says missing tenant ownership checks could be abused to redirect messages and responses from victim applications to an attacker-controlled LLM trace provider, and notes that anyone can freely register for a Dify account. Following responsible disclosure, all vulnerabilities except CVE-2026-41948 were fixed in Dify version 1.14.2, with a fix for the remaining issue expected in the next release.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Zafran Security disclosed four Dify vulnerabilities collectively named DifyTap that could allow attackers to read private AI chats from other customers' applications without requiring authentication for some flaws.","The vulnerabilities included missing tenant ownership checks, cross-tenant exposure, access to the internal Plugin Daemon API, document preview exposure across tenants, and file leakage between users within the same tenant.","The flaws were assigned CVE-2026-41947, CVE-2026-41948, CVE-2026-41949, and CVE-2026-41950, with two rated critical severity.","Zafran also found that Dify's file parsing stack used a PDFium version affected by CVE-2024-5846, a use-after-free bug that could potentially be exploited with a crafted PDF file.","Dify version 1.14.2 fixed all disclosed vulnerabilities except CVE-2026-41948, which is expected to be fixed in the next release."],"insights":["Because anyone can freely register for a Dify account, flaws that require an authenticated user may still be broadly exploitable against publicly accessible applications.","The trace configuration flaw is especially actionable because it could let an attacker create a persistent channel that silently forwards all messages and model responses from a victim application to an attacker-controlled tracing provider.","Upgrading to Dify 1.14.2 does not fully eliminate the reported risk because CVE-2026-41948 was not fixed in that release and is expected to be addressed later.","The findings highlight that container-image differences between deployments can create visibility gaps that traditional scanners may miss, according to Zafran Security."],"referencedReports":[{"title":"DifyTap: Zafran Discovers How Attackers Can Silently Wiretap AI Data Across Tenants on a Platform Powering 1M Apps","url":"https://www.zafran.io/resources/difytap-zafran-discovers-how-attackers-can-silently-wiretap-ai-data-across-tenants-on-a-platform-powering-1m-apps","publisher":"Zafran Security","context":"The article cites Zafran Security's research as the source of the DifyTap vulnerability findings and researcher comments.","category":"research","primary":true},{"title":"CVE-2024-5846 Detail","url":"https://nvd.nist.gov/vuln/detail/CVE-2024-5846","publisher":"National Vulnerability Database","context":"The article links to the NVD entry for a PDFium use-after-free flaw found in Dify's file parsing stack.","category":"advisory","primary":false},{"title":"CVE-2026-41947 Detail","url":"https://nvd.nist.gov/vuln/detail/CVE-2026-41947","publisher":"National Vulnerability Database","context":"The article links to the NVD entry for an authorization bypass vulnerability in Dify trace configuration handling.","category":"advisory","primary":false},{"title":"CVE-2026-41948 Detail","url":"https://nvd.nist.gov/vuln/detail/CVE-2026-41948","publisher":"National Vulnerability Database","context":"The article links to the NVD entry for a Dify path traversal vulnerability affecting requests forwarded to the Plugin Daemon internal REST API.","category":"advisory","primary":false},{"title":"CVE-2026-41949 Detail","url":"https://nvd.nist.gov/vuln/detail/CVE-2026-41949","publisher":"National Vulnerability Database","context":"The article links to the NVD entry for a Dify file preview authorization bypass vulnerability.","category":"advisory","primary":false},{"title":"CVE-2026-41950 Detail","url":"https://nvd.nist.gov/vuln/detail/CVE-2026-41950","publisher":"National Vulnerability Database","context":"The article links to the NVD entry for a Dify authorization bypass that could expose files uploaded by other users in the same tenant.","category":"advisory","primary":false}],"body":"\u003cp\u003eCybersecurity researchers at Zafran Security disclosed details of four vulnerabilities in Dify, an open-source agentic workflow platform with more than 146,000 GitHub stars. The flaws, collectively named DifyTap, could allow attackers to stealthily read AI conversations from other customers\u0026rsquo; applications. Zafran said two vulnerabilities were critical, two required no authentication, and three had cross-tenant impact on Dify\u0026rsquo;s multi-tenant cloud service.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities could have enabled attackers to read private AI chats, create a covert exfiltration channel for every message and model response, traverse Dify\u0026rsquo;s internal Plugin Daemon API from unauthenticated requests, and trigger cross-tenant internal API calls. They also made it possible to preview documents uploaded by other tenants and leak files across users within a tenant by attaching another user\u0026rsquo;s file UUID. Separately, Zafran found that Dify\u0026rsquo;s file parsing stack used a PDFium version affected by CVE-2024-5846, a use-after-free bug that could potentially be exploited through a crafted PDF file.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed Dify flaws are tracked as CVE-2026-41947, CVE-2026-41948, CVE-2026-41949, and CVE-2026-41950. The article says missing tenant ownership checks could be abused to redirect messages and responses from victim applications to an attacker-controlled LLM trace provider, and notes that anyone can freely register for a Dify account. Following responsible disclosure, all vulnerabilities except CVE-2026-41948 were fixed in Dify version 1.14.2, with a fix for the remaining issue expected in the next release.\u003c/p\u003e\n"},{"n":13,"title":"AI Agent Supply Chain Risk: Silent Codebase Exfiltration via Skills","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/ai-agent-supply-chain-risk-silent-codebase-exfiltration-via-skills","time":"17:01","priority":"SHOULD READ","score":84,"tldr":"Mitiga Labs shows that a seemingly legitimate AI agent “skill” can be weaponized to silently push an entire local codebase to an attacker-controlled GitHub repository with minimal user interaction and little audit visibility. Organizations should treat installable AI skills as a supply-chain risk and review, monitor, and restrict them before use.","briefOverview":"\u003cp\u003eMitiga Labs describes a supply chain risk in AI agent skills, showing how a seemingly legitimate testing skill can silently exfiltrate an entire local codebase. The article says skills are reusable instruction bundles that tell an AI agent how to behave for specific tasks, and that one-click installation without reviewing skill content creates a new attack surface. The researchers used Cursor to load and test skills, focusing on how GitHub interactions could affect enterprise environments.\u003c/p\u003e\n\n\u003cp\u003eThe proof of concept began as a “Testing-Validator” skill that appeared to help create tests for projects, while also being designed to minimize user interaction. Mitiga says Cursor initially did not fully follow the silent behavior, so the researchers asked Cursor to help make the instructions quieter and require fewer interactions, which improved the attack workflow. They then used a “Definition of Done” requirement to make the agent verify that all tasks, including the exfiltration step, were completed before finishing.\u003c/p\u003e\n\n\u003cp\u003eIn the demonstrated attack, the agent copied the local project, added a remote pointing to an attacker-controlled repository, pushed the project to a public GitHub branch, and opened a pull request containing the leaked codebase. The article states that the activity was silent, that the Cursor \u003ccode\u003eskill-audit.log\u003c/code\u003e was empty after two executions, and that only four user interactions were required to complete the test-building flow. Mitiga recommends monitoring and reviewing every skill installation, examining skill instructions before approval, treating silencing and allowlist behavior as red flags, and creating processes to evaluate AI tools and their permissions.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Mitiga Labs demonstrated that a seemingly legitimate AI agent skill for testing could silently exfiltrate an entire local codebase.","The researchers used Cursor to load the skill and found that the agent could be guided to perform commands with minimal user interaction.","The malicious behavior included copying the local project, adding a remote repository controlled by the attacker, and pushing the contents to a public GitHub branch.","The article states that the resulting activity was silent, produced no noise, and left the Cursor skill-audit.log file empty after two executions.","Mitiga recommends that organizations monitor and review every skill installation, examine instruction behavior before approval, and treat silencing or allowlist instructions as red flags."],"insights":["The researchers found that Cursor could help make the malicious skill instructions quieter and require fewer user interactions, meaning the agent effectively assisted in refining the attack workflow.","A “Definition of Done” section in a skill can be abused to make the agent verify that the attacker’s payload has been completed before finishing its task.","The article highlights that reputation signals such as stars, upvotes, downloads, and comments can be artificially inflated to make a malicious skill appear trustworthy.","The exfiltrated repository activity could be signed under the Cursor Agent author, which the article says makes monitoring difficult because a large volume of code is already being written by AI agents.","Mitiga specifically calls out silencing instructions and allowlists inside skills as red flags that organizations should look for during review."],"referencedReports":[],"body":"\u003cp\u003eMitiga Labs describes a supply chain risk in AI agent skills, showing how a seemingly legitimate testing skill can silently exfiltrate an entire local codebase. The article says skills are reusable instruction bundles that tell an AI agent how to behave for specific tasks, and that one-click installation without reviewing skill content creates a new attack surface. The researchers used Cursor to load and test skills, focusing on how GitHub interactions could affect enterprise environments.\u003c/p\u003e\n\n\u003cp\u003eThe proof of concept began as a “Testing-Validator” skill that appeared to help create tests for projects, while also being designed to minimize user interaction. Mitiga says Cursor initially did not fully follow the silent behavior, so the researchers asked Cursor to help make the instructions quieter and require fewer interactions, which improved the attack workflow. They then used a “Definition of Done” requirement to make the agent verify that all tasks, including the exfiltration step, were completed before finishing.\u003c/p\u003e\n\n\u003cp\u003eIn the demonstrated attack, the agent copied the local project, added a remote pointing to an attacker-controlled repository, pushed the project to a public GitHub branch, and opened a pull request containing the leaked codebase. The article states that the activity was silent, that the Cursor \u003ccode\u003eskill-audit.log\u003c/code\u003e was empty after two executions, and that only four user interactions were required to complete the test-building flow. Mitiga recommends monitoring and reviewing every skill installation, examining skill instructions before approval, treating silencing and allowlist behavior as red flags, and creating processes to evaluate AI tools and their permissions.\u003c/p\u003e\n"},{"n":4,"title":"Suspected cyberattack triggers false emergency alerts across parts of Brazil","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/suspected-cyberattack-triggers-false-emergency-alerts-brazil","time":"14:10","priority":"SHOULD READ","score":82,"tldr":"Brazil suspended its mobile emergency alert system after a suspected cyberattack sent false high-priority warnings to phones across multiple states. Authorities blocked external access and opened a federal investigation, while saying there is no evidence of structural damage to the core alert infrastructure.","briefOverview":"\u003cp\u003eBrazil suspended its mobile phone emergency alert system after a suspected cyberattack triggered false warnings on phones across several states. The incident occurred early Saturday when at least a dozen unauthorized alerts were sent through Brazil\u0026rsquo;s Civil Defense Alert system. The platform is designed to warn residents about imminent threats such as floods, landslides and other natural disasters.\u003c/p\u003e\n\n\u003cp\u003eBrazil’s National Protection and Civil Defense Secretariat said the alerts included the word \u0026ldquo;misanthropy\u0026rdquo; and were issued at the system\u0026rsquo;s highest emergency level. That caused phones to emit loud alarm sounds even when set to silent mode. The incidents were reported in São Paulo, Rio de Janeiro, Paraná, Mato Grosso do Sul and the Federal District, but authorities said they could not determine how many devices received the messages because the alerts were activated outside official procedures.\u003c/p\u003e\n\n\u003cp\u003eAuthorities temporarily suspended the alert platform and blocked external access to the system\u0026rsquo;s Public Alert Dissemination Interface, which is used to distribute emergency notifications. Brazil\u0026rsquo;s Ministry of Integration and Regional Development said there is no evidence so far that the core Civil Defense Alert infrastructure suffered structural damage. The Federal Police are investigating unauthorized access, and preliminary findings said attackers issued 10 unauthorized alerts, including nine using cell broadcast technology and one via SMS.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Brazil suspended its mobile phone emergency alert system after a suspected cyberattack triggered false warnings on phones across several states.","At least a dozen unauthorized alerts were sent through Brazil's Civil Defense Alert system early Saturday, including messages containing the word \"misanthropy\" and issued at the highest emergency level.","The incidents were reported in São Paulo, Rio de Janeiro, Paraná, Mato Grosso do Sul and the Federal District, but authorities said they could not determine how many devices received the messages.","Authorities blocked external access to the system's Public Alert Dissemination Interface and said there is no evidence so far that the core Civil Defense Alert infrastructure suffered structural damage.","Brazil's Federal Police are investigating unauthorized access to the platform, and preliminary findings said attackers issued 10 unauthorized alerts, including nine via cell broadcast and one via SMS."],"insights":["The false alerts were sent at the system's highest emergency level, showing that the unauthorized access reached a setting capable of forcing loud alarms on phones even when they were set to silent.","Authorities could not determine how many devices received the false messages because the alerts were activated outside official procedures.","The response focused on blocking external access to the Public Alert Dissemination Interface, indicating that this interface was important enough to isolate while the investigation continued.","Officials said a more secure version of the platform was already under development, meaning the incident occurred while security improvements were already planned but not yet deployed."],"referencedReports":[],"body":"\u003cp\u003eBrazil suspended its mobile phone emergency alert system after a suspected cyberattack triggered false warnings on phones across several states. The incident occurred early Saturday when at least a dozen unauthorized alerts were sent through Brazil\u0026rsquo;s Civil Defense Alert system. The platform is designed to warn residents about imminent threats such as floods, landslides and other natural disasters.\u003c/p\u003e\n\n\u003cp\u003eBrazil’s National Protection and Civil Defense Secretariat said the alerts included the word \u0026ldquo;misanthropy\u0026rdquo; and were issued at the system\u0026rsquo;s highest emergency level. That caused phones to emit loud alarm sounds even when set to silent mode. The incidents were reported in São Paulo, Rio de Janeiro, Paraná, Mato Grosso do Sul and the Federal District, but authorities said they could not determine how many devices received the messages because the alerts were activated outside official procedures.\u003c/p\u003e\n\n\u003cp\u003eAuthorities temporarily suspended the alert platform and blocked external access to the system\u0026rsquo;s Public Alert Dissemination Interface, which is used to distribute emergency notifications. Brazil\u0026rsquo;s Ministry of Integration and Regional Development said there is no evidence so far that the core Civil Defense Alert infrastructure suffered structural damage. The Federal Police are investigating unauthorized access, and preliminary findings said attackers issued 10 unauthorized alerts, including nine using cell broadcast technology and one via SMS.\u003c/p\u003e\n"},{"n":11,"title":"Hunting Conditional Access Policy Bypass in the Wild: Leveraging Malicious Browser Extensions for Seamless Initial Access","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/hunting-conditional-access-policy-bypass-in-the-wild","time":"16:46","priority":"SHOULD READ","score":82,"tldr":"Researchers demonstrated that attackers can bypass Microsoft Entra Conditional Access policies by abusing the Microsoft Intune Company Portal OAuth flow to obtain Microsoft Graph access tokens from unmanaged devices, and malicious browser extensions can automate token theft during login. Detection should focus on successful Graph sign-ins to the Intune Company Portal client from non-compliant, unmanaged, untrusted devices.","briefOverview":"\u003cp\u003eThe article describes a technique for bypassing Microsoft Entra Conditional Access policies by targeting Microsoft Graph through the Microsoft Intune Company Portal client ID. Mitiga tested the technique after prior public discussion and JUMPSEC Labs’ TokenSmith work, and says it successfully gained access to Microsoft Graph from a non-compliant, unmanaged, and untrusted device. The level of access depends on the privileges of the compromised user.\u003c/p\u003e\n\n\u003cp\u003eThe authentication flow uses a Microsoft OAuth authorization request that can produce an authorization code after MFA is completed. The code appears in a failed \u003ccode\u003ems-appx-web://\u003c/code\u003e redirect and can be exchanged through Microsoft’s OAuth2 token endpoint for a bearer access token scoped to Microsoft Graph. The article also describes how a malicious Chrome browser extension could monitor login traffic, extract sensitive data from Location headers, and send captured data to an attacker-controlled server.\u003c/p\u003e\n\n\u003cp\u003eMitiga recommends auditing successful authentications from non-compliant and unmanaged devices, requiring MFA, minimizing Microsoft Graph permissions, monitoring Microsoft Graph activity logs, and reviewing unusual blocked access attempts. The article provides a hunting pattern focused on successful interactive sign-ins with unmanaged, non-compliant, and untrusted device details, the Intune Company Portal client ID, and Microsoft Graph or Microsoft AD Graph as the resource. An update states that Microsoft addressed the previously identified Microsoft Graph issue by fully descoping the resource permission that had allowed unauthorized access.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article describes a Conditional Access policy bypass that targets Microsoft Graph by abusing the Microsoft Intune Company Portal client ID 9ba1a5c7-f17a-4de9-a1f1-6178c8d51223.","The demonstrated technique requires completing the authentication flow through phished credentials, MFA token access, valid session cookies, or an adversary-in-the-middle approach.","After authentication, the authorization code can be captured from the failed ms-appx-web redirect and exchanged at Microsoft’s OAuth2 token endpoint for a bearer access token scoped to Microsoft Graph.","The article says a malicious Chrome browser extension can monitor Microsoft login traffic, extract sensitive data from Location headers, and send captured data to an attacker-controlled server.","The recommended hunting approach looks for successful interactive sign-ins to the vulnerable client from devices marked unmanaged, non-compliant, and untrusted, with Microsoft Graph or Microsoft AD Graph as the resource."],"insights":["A successful sign-in with errorCode 0 can still be suspicious when it involves the Intune Company Portal client ID, Microsoft Graph, and a device marked unmanaged, non-compliant, and untrusted.","The article highlights that changing the user-agent in the token redemption request can help defenders create and validate hunting detections.","The bypass depends on the permissions available to the compromised user, so reducing Microsoft Graph permissions to the lowest necessary level is presented as a practical way to limit impact.","The article notes that Microsoft addressed the previously identified Microsoft Graph issue by fully descoping the resource permission that had allowed unauthorized access."],"referencedReports":[],"body":"\u003cp\u003eThe article describes a technique for bypassing Microsoft Entra Conditional Access policies by targeting Microsoft Graph through the Microsoft Intune Company Portal client ID. Mitiga tested the technique after prior public discussion and JUMPSEC Labs’ TokenSmith work, and says it successfully gained access to Microsoft Graph from a non-compliant, unmanaged, and untrusted device. The level of access depends on the privileges of the compromised user.\u003c/p\u003e\n\n\u003cp\u003eThe authentication flow uses a Microsoft OAuth authorization request that can produce an authorization code after MFA is completed. The code appears in a failed \u003ccode\u003ems-appx-web://\u003c/code\u003e redirect and can be exchanged through Microsoft’s OAuth2 token endpoint for a bearer access token scoped to Microsoft Graph. The article also describes how a malicious Chrome browser extension could monitor login traffic, extract sensitive data from Location headers, and send captured data to an attacker-controlled server.\u003c/p\u003e\n\n\u003cp\u003eMitiga recommends auditing successful authentications from non-compliant and unmanaged devices, requiring MFA, minimizing Microsoft Graph permissions, monitoring Microsoft Graph activity logs, and reviewing unusual blocked access attempts. The article provides a hunting pattern focused on successful interactive sign-ins with unmanaged, non-compliant, and untrusted device details, the Intune Company Portal client ID, and Microsoft Graph or Microsoft AD Graph as the resource. An update states that Microsoft addressed the previously identified Microsoft Graph issue by fully descoping the resource permission that had allowed unauthorized access.\u003c/p\u003e\n"},{"n":16,"title":"Claude Code + Slack: How an AI Agent Integration Becomes a Compromise Path","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/007-license-to-skill-p-2-slack-compromise-through-claude-code","time":"17:00","priority":"SHOULD READ","score":82,"tldr":"Mitiga researchers show that a malicious Claude Code skill can abuse a trusted Slack integration to send phishing messages from a real employee account across DMs and channels, rapidly expanding a single agent compromise into organization-wide exposure. The key defense is to treat AI agent skills and SaaS connectors like software dependencies: review, log, version, and tightly scope their permissions.","briefOverview":"\u003cp\u003eMitiga Labs demonstrated how a malicious Claude Code skill can turn the Slack integration into a phishing distribution channel. Once the AI agent is abused, the campaign inherits the trust, tone, and reach of the user’s Slack account. In their experiment, Claude Code sent phishing links to multiple direct-message targets and could fall back to public channels if needed.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that the researchers created a trojanized skill for a seemingly legitimate product-task-evaluation workflow. The skill used sections such as Definition of Done, Guidelines, and Fallback to push the agent toward sending malicious links without hesitation. The execution flow involved a victim installing the skill, the agent invoking it during a normal task, and Slack messages being sent from the trusted user account.\u003c/p\u003e\n\n\u003cp\u003eThe impact is broader than Slack because every integration connected to an AI agent expands the potential blast radius. The article says traditional EDR or SIEM tools are unlikely to flag the activity on their own because the actions can look like legitimate user and integration behavior in isolation. Recommended defenses include reviewing and versioning skills, logging skill invocations, using Slack Audit Logs to detect excessive agent messaging or OAuth scope expansion, and connecting Claude through dedicated applications with narrowly scoped permissions.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Mitiga Labs demonstrated that a malicious Claude Code skill can use a connected Slack account to send phishing links to employees through direct messages and channels.","The article says the phishing campaign inherits the trust, tone, and reach of the user’s Slack account once the AI agent is abused.","The researchers created a trojanized skill for a seemingly legitimate product-task-evaluation workflow, with instructions that pushed the agent to send links and fall back to public channels if individual delivery failed.","The article states that traditional EDR or SIEM tools are unlikely to flag this activity on their own because Slack events can look like legitimate user and integration activity in isolation.","The recommended defenses include treating AI agent skills like software dependencies by reviewing, logging, versioning, and narrowly scoping permissions for SaaS integrations."],"insights":["Slack Audit Logs can still help detect agent misuse even without message content by looking for AI agent user-agent strings, excessive MCP send_message tool calls, and risky OAuth scope expansion.","The article highlights that Claude Code’s Slack integration can provide full control of a user’s Slack account, while the Slack MCP tooling itself is more limited.","The researchers found that malicious instructions can be hidden in normal-looking skill sections such as “Definition of Done,” “Guidelines,” and “Fallback,” making ordinary workflow documentation a vehicle for harmful behavior.","A dedicated Slack application with only the specific expected permission scopes is presented as the best way to control what Claude is allowed to do in SaaS integrations.","The article notes that skills can be logged with a simple JSONL invocation entry, but this is described as a pragmatic workaround rather than a deterministic control."],"referencedReports":[{"title":"2024 FBI IC3 Report","url":"https://abnormal.ai/blog/2024-fbi-ic3-report","publisher":"Abnormal Security","context":"The article cites FBI IC3 data, linked through Abnormal Security’s 2024 FBI IC3 Report page, to note that business email compromise causes billions of dollars in losses every year.","category":"research","primary":false}],"body":"\u003cp\u003eMitiga Labs demonstrated how a malicious Claude Code skill can turn the Slack integration into a phishing distribution channel. Once the AI agent is abused, the campaign inherits the trust, tone, and reach of the user’s Slack account. In their experiment, Claude Code sent phishing links to multiple direct-message targets and could fall back to public channels if needed.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that the researchers created a trojanized skill for a seemingly legitimate product-task-evaluation workflow. The skill used sections such as Definition of Done, Guidelines, and Fallback to push the agent toward sending malicious links without hesitation. The execution flow involved a victim installing the skill, the agent invoking it during a normal task, and Slack messages being sent from the trusted user account.\u003c/p\u003e\n\n\u003cp\u003eThe impact is broader than Slack because every integration connected to an AI agent expands the potential blast radius. The article says traditional EDR or SIEM tools are unlikely to flag the activity on their own because the actions can look like legitimate user and integration behavior in isolation. Recommended defenses include reviewing and versioning skills, logging skill invocations, using Slack Audit Logs to detect excessive agent messaging or OAuth scope expansion, and connecting Claude through dedicated applications with narrowly scoped permissions.\u003c/p\u003e\n"},{"n":19,"title":"Okta Logs Threat-Hunting Guide: Hunt for Breach Evidence","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/all-the-information-you-need-to-know-to-understand-your-okta-logs-today","time":"16:51","priority":"SHOULD READ","score":82,"tldr":"Organizations investigating potential Okta breach impact should threat-hunt Okta System Logs for abnormal admin, authentication, token, import, and SSO activity, while accounting for Okta-generated system events and benign behaviors from services like Jamf and Google Workspace. The key warning is that some high-risk activity, especially API token use and admin console read access, may not be clearly logged, so responders need broader context beyond Okta logs alone.","briefOverview":"\u003cp\u003eThe article provides guidance for threat hunting in Okta logs for organizations looking for malicious activity associated with the recent Okta breach. It states that the breach was still unfolding at the time of writing, and that it was unclear how far it might propagate or what influence it might have on Okta customers. The article emphasizes that potential abuse is likely to leave traces in Okta logs and possibly in logs from other compromised systems, but that Okta logs can be difficult to investigate.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that Okta logs can be reviewed through the Okta Admin Console or collected into a repository and analysis platform such as Splunk. It notes that the Admin Console view can be abridged and may omit fields, while collected logs can be more verbose. It highlights areas to review, including system events, authentication behavior, SSO application activity, token-granting users, and events generated by Okta itself.\u003c/p\u003e\n\n\u003cp\u003eThe article also identifies important logging gaps and interpretation challenges. It says Okta logs do not provide enough information to clearly distinguish actions performed with API tokens from actions performed directly by the users who created them, and that read access to the Okta Admin Console is not logged. It also notes that SSO activity and Jamf keep-alive behavior can show IP addresses from different locations, which responders may need to interpret carefully during an investigation.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The article recommends that organizations hunting for malicious activity associated with the recent Okta breach focus on relevant events in the Okta System Log.","Okta logs can be viewed through the Okta Admin Console, which may show abridged records with missing fields, or collected into a repository and analysis platform such as Splunk for more verbose logs.","The article states that Okta logs do not provide enough information to distinguish between actions performed using API tokens and actions performed directly by the users who created them.","The article states that write access to the Okta Admin Console is logged, but read access is not logged at all.","The article notes that some authentication and SSO events may appear to originate from distant IP addresses, such as Google Workspace IP addresses, rather than the user’s own location."],"insights":["Okta activity performed through API tokens can carry administrator-level privileges while appearing indistinguishable in the logs from actions taken directly by the user who created the token.","Read-only viewing of the Okta Admin Console may expose sensitive information without creating any log record, making absence of logged changes insufficient to rule out unauthorized access.","SSO events can misleadingly show authentication from distant IP addresses because the event may originate from the connected service, such as Google Workspace, rather than from the user’s device.","Jamf keep-alive events can help identify a user computer’s dominant IP address and may help incident responders distinguish suspicious simultaneous activity from different IP addresses.","Events from system@okta.com with a null user agent are mostly maintenance tasks, but they can include investigation-relevant actions such as importing users or groups from external sources."],"referencedReports":[],"body":"\u003cp\u003eThe article provides guidance for threat hunting in Okta logs for organizations looking for malicious activity associated with the recent Okta breach. It states that the breach was still unfolding at the time of writing, and that it was unclear how far it might propagate or what influence it might have on Okta customers. The article emphasizes that potential abuse is likely to leave traces in Okta logs and possibly in logs from other compromised systems, but that Okta logs can be difficult to investigate.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that Okta logs can be reviewed through the Okta Admin Console or collected into a repository and analysis platform such as Splunk. It notes that the Admin Console view can be abridged and may omit fields, while collected logs can be more verbose. It highlights areas to review, including system events, authentication behavior, SSO application activity, token-granting users, and events generated by Okta itself.\u003c/p\u003e\n\n\u003cp\u003eThe article also identifies important logging gaps and interpretation challenges. It says Okta logs do not provide enough information to clearly distinguish actions performed with API tokens from actions performed directly by the users who created them, and that read access to the Okta Admin Console is not logged. It also notes that SSO activity and Jamf keep-alive behavior can show IP addresses from different locations, which responders may need to interpret carefully during an investigation.\u003c/p\u003e\n"},{"n":5,"title":"29-Year-Old Squid Proxy Bug 'Squidbleed' Can Leak Cleartext HTTP Requests","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/29-year-old-squid-proxy-bug-squidbleed.html","time":"14:29","priority":"SHOULD READ","score":78,"tldr":"Squidbleed (CVE-2026-47729) is a 29-year-old Squid proxy heap over-read that can let an authorized proxy user leak another user’s cleartext HTTP request data, including credentials or tokens. Admins should verify the patch is present and preferably disable FTP support to remove the attack path.","briefOverview":"\u003cp\u003eSquidbleed (CVE-2026-47729) is a heap over-read in the Squid web proxy that can leak another user\u0026rsquo;s cleartext HTTP request to someone already allowed to send traffic through the same proxy. The leaked data can include credentials or session tokens carried in that request. Researchers at Calif.io disclosed the bug in June and said it traces back to a 1997 FTP-parsing change that remains active in Squid\u0026rsquo;s default configuration.\u003c/p\u003e\n\n\u003cp\u003eThe issue affects shared proxy environments such as schools, offices, and public Wi-Fi where an attacker may be another authorized user of the same proxy. The leak only applies to traffic Squid can read, including cleartext HTTP and TLS-terminating setups where Squid decrypts and inspects traffic. Normal HTTPS over an opaque CONNECT tunnel is not exposed because Squid does not see inside it.\u003c/p\u003e\n\n\u003cp\u003eThe bug is in Squid\u0026rsquo;s FTP directory-listing parser, where a whitespace-skipping loop can walk past the end of a buffer and copy leftover memory back to the attacker as a filename. Calif\u0026rsquo;s demo recovered an Authorization header from a victim sharing the same proxy, and proof-of-concept code is public, though no in-the-wild exploitation had been reported at the time of writing. The article recommends verifying the actual patch or distribution backport and says disabling FTP is the cleaner mitigation because it removes this attack surface.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Squidbleed (CVE-2026-47729) is a heap over-read in the Squid web proxy that can leak another user's cleartext HTTP request, including credentials or session tokens, to someone already allowed to use the same proxy.","The bug traces to a 1997 FTP-parsing change, affects Squid's default configuration, and sits in the FTP directory-listing parser.","The leak only reaches traffic Squid can read, so normal HTTPS inside an opaque CONNECT tunnel is not exposed, while cleartext HTTP and TLS-terminating setups may be affected.","An attacker needs access to the proxy and the ability to make the proxy reach an FTP server they control on port 21, which is enabled by default according to the article.","The article recommends verifying the patch in FtpGateway.cc or distribution backports and says disabling FTP support removes this attack surface."],"insights":["Administrators should verify the actual code fix or distribution backport rather than relying only on Squid version numbers, because the public discussion about whether the fix is in 7.6 or 7.7 is inconsistent.","Disabling FTP is presented as the cleaner mitigation because modern browsers such as Chromium have already dropped FTP and most networks carry little FTP traffic, making the feature a removable attack surface.","The bug’s impact depends on Squid’s memory reuse behavior: freed 4KB buffers are not zeroed, so an FTP parsing error can expose remnants of a previous user’s HTTP request.","Although the flaw is decades old and can expose credentials, the article describes the risk as bounded because exploitation requires existing proxy access and affects confidentiality only, with SUSE rating it moderate at CVSS 6.5.","The vulnerability was reportedly found by Anthropic’s Claude Mythos Preview, highlighting that AI agents are being used to uncover old parser bugs in mature codebases."],"referencedReports":[{"title":"Squidbleed (CVE-2026-47729)","url":"https://blog.calif.io/p/squidbleed-cve-2026-47729","publisher":"Calif.io","context":"The article says Calif.io researchers disclosed Squidbleed in June and uses their write-up as the basis for the technical details and demo.","category":"research","primary":true},{"title":"CVE-2026-47729","url":"https://www.suse.com/security/cve/CVE-2026-47729.html","publisher":"SUSE","context":"The article cites SUSE's CVE page for the moderate CVSS 6.5 rating and impact characterization.","category":"advisory","primary":false},{"title":"Squid CVE-2026-47729 oss-sec advisory thread","url":"https://seclists.org/oss-sec/2026/q2/896","publisher":"Squid / oss-sec","context":"The article references Squid's public description of the issue as an attack by a trusted client already allowed to use the proxy.","category":"advisory","primary":false}],"body":"\u003cp\u003eSquidbleed (CVE-2026-47729) is a heap over-read in the Squid web proxy that can leak another user\u0026rsquo;s cleartext HTTP request to someone already allowed to send traffic through the same proxy. The leaked data can include credentials or session tokens carried in that request. Researchers at Calif.io disclosed the bug in June and said it traces back to a 1997 FTP-parsing change that remains active in Squid\u0026rsquo;s default configuration.\u003c/p\u003e\n\n\u003cp\u003eThe issue affects shared proxy environments such as schools, offices, and public Wi-Fi where an attacker may be another authorized user of the same proxy. The leak only applies to traffic Squid can read, including cleartext HTTP and TLS-terminating setups where Squid decrypts and inspects traffic. Normal HTTPS over an opaque CONNECT tunnel is not exposed because Squid does not see inside it.\u003c/p\u003e\n\n\u003cp\u003eThe bug is in Squid\u0026rsquo;s FTP directory-listing parser, where a whitespace-skipping loop can walk past the end of a buffer and copy leftover memory back to the attacker as a filename. Calif\u0026rsquo;s demo recovered an Authorization header from a victim sharing the same proxy, and proof-of-concept code is public, though no in-the-wild exploitation had been reported at the time of writing. The article recommends verifying the actual patch or distribution backport and says disabling FTP is the cleaner mitigation because it removes this attack surface.\u003c/p\u003e\n"},{"n":8,"title":"Introducing Patch the Planet","source":"blog.trailofbits.com","sourceColorIdx":6,"link":"https://blog.trailofbits.com/2026/06/22/introducing-patch-the-planet/","time":"16:50","priority":"SHOULD READ","score":78,"tldr":"Trail of Bits launched Patch the Planet with OpenAI, using frontier AI models plus human security experts to find, triage, and fix bugs in critical open-source projects. In its first week, the effort produced hundreds of findings, 64 pull requests, and 51 issues across 19 projects, highlighting that the hard part is now validating, prioritizing, patching, and coordinating fixes rather than merely finding bugs.","briefOverview":"\u003cp\u003eTrail of Bits introduced Patch the Planet, an initiative run with OpenAI’s Daybreak initiative that pairs Trail of Bits engineers and frontier models such as GPT-5.5-Cyber with open-source maintainers. In its first week, the effort produced hundreds of discovered bugs, 64 pull requests, and 51 issues across 19 projects, with many more findings still undergoing coordinated disclosure. The covered projects included cURL, NATS, pyca, Sigstore, aiohttp, the Go project, freenginx, Python and python.org, urllib3, PyPI, SimpleX, Valkey, and RustCrypto.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Patch the Planet focuses on patches and hardening work, not just bug reports. Trail of Bits says 37 pull requests were already merged, and the work included new tests and fuzzing harnesses, CI security scanning, supply-chain tooling, correctness fixes, and maintainer-requested features. Examples included adding zizmor-based CI scanning for python.org, contributing correctness fixes and feature work to RustCrypto, improving SimpleX and PyPI’s Warehouse, and adding SBOM sidecars for Python’s Windows artifacts.\u003c/p\u003e\n\n\u003cp\u003eTrail of Bits argues that AI-assisted techniques such as fuzzing campaigns, variant analysis, differential testing, and agentic searching can produce real vulnerabilities and compress weeks or months of manual work into hours. The article says the harder work is now confirming findings, judging severity, writing acceptable patches, hardening related code, preventing similar issues, and coordinating disclosure. It advises maintainers dealing with AI-generated reports to focus on deduplication, false-positive filtering, and severity correction, and says project-specific documentation, threat models, severity criteria, and files such as AGENTS.md can reduce noise before reports reach maintainers.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Trail of Bits launched Patch the Planet in partnership with OpenAI’s Daybreak initiative to pair its engineers and frontier models such as GPT-5.5-Cyber with open-source maintainers.","In its first week, Patch the Planet reported hundreds of discovered bugs, 64 pull requests, and 51 issues across 19 projects, with 37 pull requests already merged and 19 issues already closed with a fix.","The first week covered projects including cURL, NATS, pyca, Sigstore, aiohttp, the Go project, freenginx, Python and python.org, urllib3, PyPI, SimpleX, Valkey, and RustCrypto.","The article says the initiative focuses on patches and hardening work, including tests, fuzzing harnesses, CI security scanning, supply-chain tooling, correctness fixes, and features maintainers had planned to address.","Trail of Bits states that AI-assisted techniques can quickly produce real vulnerabilities, but the harder work is confirming findings, judging severity, writing acceptable patches, hardening surrounding code, preventing similar issues, and coordinating disclosure."],"insights":["The article argues that the bottleneck in security work has shifted from finding bugs to the follow-up work of validating reports, setting accurate severity, producing acceptable patches, hardening related code, and coordinating disclosure.","GPT-5.5-Cyber was described as choosing to build a fuzzing lab instead of manually reading heavily reviewed C code, compressing an effort Trail of Bits estimated would take a fuzzing expert two to three weeks into under a day.","Project-specific security documentation and threat models were presented as especially effective at reducing false positives, with PyCA’s security documentation cited as dramatically improving the quality of bug candidates.","Files such as AGENTS.md that tell AI systems which project documentation to consult produced more consistent and effective results, suggesting maintainers can reduce noisy AI-generated reports by documenting guidance for AI-based research.","Differential testing between projects that implement the same cryptographic standards was described as a high-signal method that uncovered issues, including an AES-GCM issue in PyCA and several X.509 issues."],"referencedReports":[],"body":"\u003cp\u003eTrail of Bits introduced Patch the Planet, an initiative run with OpenAI’s Daybreak initiative that pairs Trail of Bits engineers and frontier models such as GPT-5.5-Cyber with open-source maintainers. In its first week, the effort produced hundreds of discovered bugs, 64 pull requests, and 51 issues across 19 projects, with many more findings still undergoing coordinated disclosure. The covered projects included cURL, NATS, pyca, Sigstore, aiohttp, the Go project, freenginx, Python and python.org, urllib3, PyPI, SimpleX, Valkey, and RustCrypto.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Patch the Planet focuses on patches and hardening work, not just bug reports. Trail of Bits says 37 pull requests were already merged, and the work included new tests and fuzzing harnesses, CI security scanning, supply-chain tooling, correctness fixes, and maintainer-requested features. Examples included adding zizmor-based CI scanning for python.org, contributing correctness fixes and feature work to RustCrypto, improving SimpleX and PyPI’s Warehouse, and adding SBOM sidecars for Python’s Windows artifacts.\u003c/p\u003e\n\n\u003cp\u003eTrail of Bits argues that AI-assisted techniques such as fuzzing campaigns, variant analysis, differential testing, and agentic searching can produce real vulnerabilities and compress weeks or months of manual work into hours. The article says the harder work is now confirming findings, judging severity, writing acceptable patches, hardening related code, preventing similar issues, and coordinating disclosure. It advises maintainers dealing with AI-generated reports to focus on deduplication, false-positive filtering, and severity correction, and says project-specific documentation, threat models, severity criteria, and files such as AGENTS.md can reduce noise before reports reach maintainers.\u003c/p\u003e\n"},{"n":14,"title":"ConsentFix: OAuth Phishing That Bypasses MFA in Microsoft Entra ID","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/consentfix-oauth-phishing-explained-how-token-based-attacks-bypass-mfa-in-microsoft-entra-id","time":"16:32","priority":"SHOULD READ","score":78,"tldr":"ConsentFix is an OAuth consent-phishing technique that abuses trusted Microsoft Entra ID first-party app flows to steal access and refresh tokens without stealing passwords or triggering MFA. Organizations should focus on token protection, restricting first-party app access, user training, and monitoring token usage across Microsoft 365, Azure, and SaaS environments.","briefOverview":"\u003cp\u003eConsentFix is an OAuth consent phishing technique that abuses legitimate Microsoft Entra ID authorization flows to steal access tokens without stealing credentials or triggering MFA. It combines consent phishing with ClickFix-style social engineering, where users are manipulated into copying and pasting or dragging and dropping a localhost redirect URL into a malicious page. The technique targets Microsoft Entra ID users and can grant attackers delegated access to Microsoft accounts, including resources in Azure, Microsoft 365, and connected applications.\u003c/p\u003e\n\n\u003cp\u003eThe attack works by sending a victim to a crafted Entra ID login URL for a trusted first-party Microsoft app such as Azure CLI. After the user authenticates, the browser redirects to a localhost address containing an OAuth authorization code, which the phishing page tricks the user into sharing. The attacker can redeem that code at Microsoft’s token endpoint for access and refresh tokens, then use them to enumerate resources, exfiltrate data, or escalate privileges depending on the victim’s roles.\u003c/p\u003e\n\n\u003cp\u003eConsentFix is significant because it exploits the pre-trusted status of first-party Microsoft applications, which often do not show explicit consent prompts and allow localhost redirects for native app flows. The article says this can bypass Conditional Access policies because the initial sign-in is legitimate and token redemption happens from the attacker’s environment. Recommended defenses include enabling Token Protection, restricting access to first-party applications, training users not to share localhost URLs, and monitoring Entra ID logs and token usage across cloud, SaaS, and identity activity.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["ConsentFix is an OAuth consent phishing technique that steals Microsoft Entra ID access tokens without prompting for MFA.","The attack tricks users into giving attackers an OAuth authorization code, which can be redeemed for access and refresh tokens granting delegated access to the victim’s Microsoft account.","ConsentFix abuses trusted first-party Microsoft applications such as Azure CLI, which are pre-trusted in Entra ID tenants and do not show explicit consent prompts for basic scopes.","The technique can enable account takeover, data exfiltration, and lateral movement across Microsoft 365, Azure, and connected SaaS applications.","Recommended mitigations include enabling Token Protection in Conditional Access policies, restricting access to first-party applications, educating users, and monitoring Entra ID logs for suspicious token activity."],"insights":["ConsentFix is especially difficult to spot because the initial sign-in is legitimate, so detection must focus on how tokens are used after login rather than only on the authentication event itself.","First-party Microsoft apps create a distinctive risk because they are broadly pre-trusted, cannot be easily blocked or deleted, and allow localhost redirects that attackers can abuse in native app login flows.","User training for this threat should include a specific warning not to copy, paste, drag, or share localhost URLs shown after a Microsoft login, because that user action is what exposes the authorization code.","Restricting Azure CLI and similar first-party apps to necessary users or compliant devices can reduce exposure because regular employees rarely need command-line Microsoft tools.","Incident response is more effective when token usage, SaaS activity, and cloud actions are reconstructed into a single timeline rather than reviewed as isolated log events."],"referencedReports":[],"body":"\u003cp\u003eConsentFix is an OAuth consent phishing technique that abuses legitimate Microsoft Entra ID authorization flows to steal access tokens without stealing credentials or triggering MFA. It combines consent phishing with ClickFix-style social engineering, where users are manipulated into copying and pasting or dragging and dropping a localhost redirect URL into a malicious page. The technique targets Microsoft Entra ID users and can grant attackers delegated access to Microsoft accounts, including resources in Azure, Microsoft 365, and connected applications.\u003c/p\u003e\n\n\u003cp\u003eThe attack works by sending a victim to a crafted Entra ID login URL for a trusted first-party Microsoft app such as Azure CLI. After the user authenticates, the browser redirects to a localhost address containing an OAuth authorization code, which the phishing page tricks the user into sharing. The attacker can redeem that code at Microsoft’s token endpoint for access and refresh tokens, then use them to enumerate resources, exfiltrate data, or escalate privileges depending on the victim’s roles.\u003c/p\u003e\n\n\u003cp\u003eConsentFix is significant because it exploits the pre-trusted status of first-party Microsoft applications, which often do not show explicit consent prompts and allow localhost redirects for native app flows. The article says this can bypass Conditional Access policies because the initial sign-in is legitimate and token redemption happens from the attacker’s environment. Recommended defenses include enabling Token Protection, restricting access to first-party applications, training users not to share localhost URLs, and monitoring Entra ID logs and token usage across cloud, SaaS, and identity activity.\u003c/p\u003e\n"},{"n":2,"title":"Microsoft fixes AutoGen Studio flaw that enabled code execution","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/microsoft-fixes-autogen-studio-flaw-that-enabled-code-execution/","time":"17:28","priority":"MAY READ","score":72,"tldr":"Microsoft fixed an AutoGen Studio flaw chain called AutoJack that could let a malicious webpage make a local AI agent execute arbitrary commands on a developer’s machine. The vulnerable code never reached PyPI releases and only affected developers who built AutoGen Studio from GitHub during a short development window.","briefOverview":"\u003cp\u003eMicrosoft fixed a vulnerability chain called AutoJack in AutoGen Studio, the graphical component for its open-source AutoGen framework for building multi-agent AI systems. The flaw could let attackers manipulate an AI agent into executing arbitrary commands on its host system simply by visiting a malicious webpage. Microsoft said the issue was identified and remediated before any PyPI release, so the affected code never shipped in a published package.\u003c/p\u003e\n\n\u003cp\u003eThe exposure was limited to developers who built AutoGen Studio from the main GitHub branch during the window between the MCP plugin landing and the hardening commit. Microsoft described the chain as involving trusted localhost WebSocket connections, unauthenticated /api/mcp/* routes, and a base64-encoded server_params value that could be passed to process-launching code. In Microsoft’s example scenario, malicious JavaScript on a page visited by a developer’s AI agent opened a WebSocket connection to AutoGen Studio’s local MCP endpoint and instructed it to launch an attacker-chosen command.\u003c/p\u003e\n\n\u003cp\u003eUsers who installed AutoGen Studio from the Python Package Index were never exposed to the affected code, and the current autogenstudio 0.4.2.2 package does not contain the AutoJack weaknesses. Developers who built AutoGen directly from GitHub before commit b047730 were impacted for a short period. Microsoft recommends deploying AutoGen Studio strictly as a developer prototype in an isolated environment and running it under a low-privilege account in a sandboxed profile or container.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Microsoft fixed a vulnerability chain called AutoJack in AutoGen Studio that could allow attackers to manipulate an AI agent into executing arbitrary commands on its host system by visiting a malicious webpage.","Microsoft said the affected code was identified and remediated before any PyPI release, so it never shipped in a published package.","The issue affected only developers who built AutoGen Studio from the main GitHub branch during the window between the MCP plugin landing and the hardening commit b047730.","Microsoft described the attack chain as involving trusted localhost WebSocket connections, unauthenticated /api/mcp/* routes, and a base64-encoded server_params value that could be passed to process-launching code.","Microsoft recommends deploying AutoGen Studio strictly as a developer prototype in an isolated environment and running it under a low-privilege account in a sandboxed profile or container."],"insights":["The attack did not require AutoGen Studio to be exposed to the internet; Microsoft’s scenario showed that a local service could be reached through a browsing AI agent that loaded attacker-controlled JavaScript.","The flaw chain shows that excluding local API routes from authentication can be dangerous when an AI agent on the same machine can browse untrusted webpages.","Microsoft’s mitigation advice focuses on containment rather than only patching, recommending a low-privilege account, sandboxed profile, or container because future agent-driven code execution could affect the host system.","The practical exposure was narrower than the severity of the technique suggests, because PyPI users were never affected and only developers building from the main GitHub branch during a specific development window were at risk."],"referencedReports":[{"title":"AutoJack: Single Page RCE Host Running AI Agent","url":"https://www.microsoft.com/en-us/security/blog/2026/06/18/autojack-single-page-rce-host-running-ai-agent/","publisher":"Microsoft","context":"The article cites Microsoft’s security blog for details on the AutoJack vulnerability chain, its limited exposure, and Microsoft’s remediation guidance.","category":"research","primary":true}],"body":"\u003cp\u003eMicrosoft fixed a vulnerability chain called AutoJack in AutoGen Studio, the graphical component for its open-source AutoGen framework for building multi-agent AI systems. The flaw could let attackers manipulate an AI agent into executing arbitrary commands on its host system simply by visiting a malicious webpage. Microsoft said the issue was identified and remediated before any PyPI release, so the affected code never shipped in a published package.\u003c/p\u003e\n\n\u003cp\u003eThe exposure was limited to developers who built AutoGen Studio from the main GitHub branch during the window between the MCP plugin landing and the hardening commit. Microsoft described the chain as involving trusted localhost WebSocket connections, unauthenticated /api/mcp/* routes, and a base64-encoded server_params value that could be passed to process-launching code. In Microsoft’s example scenario, malicious JavaScript on a page visited by a developer’s AI agent opened a WebSocket connection to AutoGen Studio’s local MCP endpoint and instructed it to launch an attacker-chosen command.\u003c/p\u003e\n\n\u003cp\u003eUsers who installed AutoGen Studio from the Python Package Index were never exposed to the affected code, and the current autogenstudio 0.4.2.2 package does not contain the AutoJack weaknesses. Developers who built AutoGen directly from GitHub before commit b047730 were impacted for a short period. Microsoft recommends deploying AutoGen Studio strictly as a developer prototype in an isolated environment and running it under a low-privilege account in a sandboxed profile or container.\u003c/p\u003e\n"},{"n":3,"title":"Microsoft says Windows 11 26H2 is coming soon, details upgrade process","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-says-windows-11-26h2-is-coming-soon-details-upgrade-process/","time":"17:41","priority":"MAY READ","score":58,"tldr":"Microsoft confirmed Windows 11 26H2 is coming soon and will be delivered to Windows 11 24H2 and 25H2 devices via a tiny enablement package requiring only a quick restart. Devices on Windows 11 23H2 or older will need a full 6.5 GB upgrade instead.","briefOverview":"\u003cp\u003eMicrosoft confirmed that Windows 11 version 26H2 will be the next feature update. The company said the update is coming soon and is already available to Windows Insiders in the Dev Channel. Microsoft described the release as part of its focus on a predictable, low-disruption update experience for organizations and IT professionals.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also published a whitepaper on its shared servicing model, confirming that Windows 11 versions 24H2, 25H2, and 26H2 share the same servicing branch. Because these releases use the same underlying source code, security updates, and testing baseline, Microsoft can deliver the 26H2 upgrade through a small enablement package. The package activates dormant features already on the device and changes the operating system build number to 26300.\u003c/p\u003e\n\n\u003cp\u003eDevices running Windows 11 24H2 or 25H2 can upgrade directly to 26H2 with a 174 KB enablement package that requires only a quick restart. Systems running Windows 11 23H2 and older releases do not share the same servicing branch and will require a full update with 6.5 GB of download data. Microsoft has not announced any hardware requirement changes or a general availability date for Windows 11 26H2, though previous H2 updates were released in the fall.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Microsoft confirmed that Windows 11 version 26H2 will be the next feature update and said it is already available to Windows Insiders in the Dev Channel.","Windows 11 versions 24H2, 25H2, and 26H2 share the same servicing branch, which lets Microsoft deliver the 26H2 upgrade through a small enablement package.","Devices running Windows 11 24H2 or 25H2 can upgrade directly to Windows 11 26H2 with a 174 KB enablement package that requires only a quick restart and changes the build number to 26300.","Systems running Windows 11 23H2 and older releases do not share the same servicing branch and will require a full upgrade download of 6.5 GB.","Microsoft has not announced changes to Windows 11 hardware requirements or a general availability date for Windows 11 26H2."],"insights":["The upgrade effort differs sharply by current Windows 11 version: moving from 24H2 or 25H2 to 26H2 uses a 174 KB package, while moving from 23H2 or older requires a 6.5 GB full update.","Because Windows 11 24H2, 25H2, and 26H2 share the same servicing branch, the 26H2 update activates features already present on eligible devices rather than replacing the operating system through a full download.","Organizations can begin evaluating Windows 11 26H2 now through the Windows Insider Dev Channel before Microsoft announces general availability.","Microsoft’s statement that no hardware requirement changes have been announced suggests upgrade planning can focus on servicing branch and current Windows version rather than new device eligibility rules."],"referencedReports":[{"title":"Windows Updates and the Shared Servicing Model V1.3","url":"https://techcommunity.microsoft.com/t5/s/gxcuf89792/attachments/gxcuf89792/Windows-ITPro-blog/10109/1/Windows%20Updates%20and%20the%20Shared%20Servicing%20Model%20V1.3.pdf","publisher":"Microsoft","context":"The article says Microsoft published this whitepaper to detail its shared servicing model and confirm that Windows 11 versions 24H2, 25H2, and 26H2 share the same servicing branch.","category":"research","primary":true}],"body":"\u003cp\u003eMicrosoft confirmed that Windows 11 version 26H2 will be the next feature update. The company said the update is coming soon and is already available to Windows Insiders in the Dev Channel. Microsoft described the release as part of its focus on a predictable, low-disruption update experience for organizations and IT professionals.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also published a whitepaper on its shared servicing model, confirming that Windows 11 versions 24H2, 25H2, and 26H2 share the same servicing branch. Because these releases use the same underlying source code, security updates, and testing baseline, Microsoft can deliver the 26H2 upgrade through a small enablement package. The package activates dormant features already on the device and changes the operating system build number to 26300.\u003c/p\u003e\n\n\u003cp\u003eDevices running Windows 11 24H2 or 25H2 can upgrade directly to 26H2 with a 174 KB enablement package that requires only a quick restart. Systems running Windows 11 23H2 and older releases do not share the same servicing branch and will require a full update with 6.5 GB of download data. Microsoft has not announced any hardware requirement changes or a general availability date for Windows 11 26H2, though previous H2 updates were released in the fall.\u003c/p\u003e\n"},{"n":1,"title":"A Glimpse into the “Search Your Target” Market for Stolen Credentials","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/a-glimpse-into-the-search-your-target-market-for-stolen-credentials/","time":"14:05","priority":"MAY READ","score":55,"tldr":"Underground sellers are turning massive infostealer credential dumps into searchable services that let criminals buy targeted credentials for specific companies, domains, platforms, or regions. Flare’s analysis found the market is growing but often overpromises, with many results being duplicated, stale, or invalid.","briefOverview":"\u003cp\u003eFlare researchers analyzed 470 underground forum posts published between January 2025 and June 2026 about actors offering to search and extract stolen credentials from large databases. The article describes a “search your target” market where buyers request credentials for a specific company, platform, domain, geography, account type, website, app, game, or email list. Instead of buying a bulk dump, buyers pay sellers to return only results that match their target.\u003c/p\u003e\n\n\u003cp\u003eThe service sits between infostealer infections, raw log trading, and account takeover activity. Infostealers collect credentials, cookies, autofill data, and browser artifacts, after which logs are aggregated into private clouds, ULP databases, public dumps, or exchange-based collections. Search-service actors then extract matching rows for buyers, who may use them for account takeover, fraud, spam, phishing, crypto theft, or corporate intrusion.\u003c/p\u003e\n\n\u003cp\u003eSellers advertise large databases, fast access, daily updates, targeted extraction, filtering, deduplication, formatting, freshness, and enrichment using fields such as email, password, login, phone, URL, country codes, cities, and password patterns. The article says the market overlaps with the initial access broker ecosystem when results include access to corporate VPNs, SaaS platforms, email accounts, cloud environments, admin panels, or remote access systems, but it is not identical because validity and freshness are not guaranteed. Buyer feedback showed a gap between advertisements and results, with complaints about lower volume, invalid credentials, duplicated records, and data already available in free combo lists.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Flare researchers analyzed 470 underground forum posts from January 2025 to June 2026 about actors offering to search and extract stolen credentials from large databases.","The “search your target” market lets buyers request credentials for specific companies, platforms, domains, geographies, account types, websites, apps, games, or email lists instead of buying bulk credential dumps.","Sellers advertise capabilities such as targeted extraction, filtering, deduplication, formatting, freshness, fast delivery, and databases ranging from hundreds of millions to tens of billions of records.","Buyer feedback in the dataset showed a gap between advertisements and reality, with complaints about lower-than-promised volume, invalid credentials, duplicate records, and data also found in free combo lists.","The article says this market overlaps with the initial access broker ecosystem when searches produce credentials for corporate VPNs, SaaS platforms, email accounts, cloud environments, admin panels, or remote access systems."],"insights":["The article distinguishes this market from initial access broker sales by noting that buyers are often paying for search and results rather than validated, working access.","Seller advertisements increasingly emphasize data-processing capabilities such as indexing, labeling, slicing, formatting, enrichment, and quick search, showing that criminals are monetizing organization of stolen data as much as the data itself.","Buyer complaints suggest that very large advertised database sizes are a weak indicator of practical value because returned results may be duplicated, invalid, or already available in free underground combo lists.","The service can turn a simple input such as a company domain, login URL, geography, or email list into a focused set of stolen credentials, reducing the effort needed for buyers to find useful targets within massive infostealer collections.","The article recommends that organizations respond to exposed credentials with password resets, session revocation, MFA enforcement, and investigation of possible account misuse."],"referencedReports":[],"body":"\u003cp\u003eFlare researchers analyzed 470 underground forum posts published between January 2025 and June 2026 about actors offering to search and extract stolen credentials from large databases. The article describes a “search your target” market where buyers request credentials for a specific company, platform, domain, geography, account type, website, app, game, or email list. Instead of buying a bulk dump, buyers pay sellers to return only results that match their target.\u003c/p\u003e\n\n\u003cp\u003eThe service sits between infostealer infections, raw log trading, and account takeover activity. Infostealers collect credentials, cookies, autofill data, and browser artifacts, after which logs are aggregated into private clouds, ULP databases, public dumps, or exchange-based collections. Search-service actors then extract matching rows for buyers, who may use them for account takeover, fraud, spam, phishing, crypto theft, or corporate intrusion.\u003c/p\u003e\n\n\u003cp\u003eSellers advertise large databases, fast access, daily updates, targeted extraction, filtering, deduplication, formatting, freshness, and enrichment using fields such as email, password, login, phone, URL, country codes, cities, and password patterns. The article says the market overlaps with the initial access broker ecosystem when results include access to corporate VPNs, SaaS platforms, email accounts, cloud environments, admin panels, or remote access systems, but it is not identical because validity and freshness are not guaranteed. Buyer feedback showed a gap between advertisements and results, with complaints about lower volume, invalid credentials, duplicated records, and data already available in free combo lists.\u003c/p\u003e\n"},{"n":10,"title":"GCP Service Agents \u0026 Workload Identities in Cloud Audit Logs: A Forensic Guide","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/who-touched-my-gcp-project-understanding-the-principal-part-in-cloud-audit-logs-part-2","time":"16:35","priority":"MAY READ","score":55,"tldr":"The article explains how GCP audit logs represent Service Agents, Workload Identity Federation, GKE Workload Identity Federation, and Workforce Identity Federation so investigators can trace actions back to the true originating identity. The key takeaway is to inspect fields like principalEmail, principalSubject, serviceAccountDelegationInfo, and STS token exchange events to attribute activity accurately.","briefOverview":"\u003cp\u003eThis article explains how several non-standard identity types appear in Google Cloud Platform Audit Logs during forensic investigations. It focuses on Service Agents, Workload Identity Federation, GKE Workload Identity Federation, and Workforce Identity Federation. The article’s central purpose is to help investigators determine who or what performed actions in a GCP project.\u003c/p\u003e\n\n\u003cp\u003eService Agents are Google-managed service accounts created when certain Google APIs are enabled, and their actions are logged even though customers cannot impersonate them. Workload Identity Federation lets external workloads use short-lived tokens instead of service account keys, with Google Cloud Security Token Service recording token exchanges and mapped external identities. Investigators can use fields such as principalSubject, principalEmail, request.name, and serviceAccountDelegationInfo to trace impersonated service account activity back to sources such as AWS roles or GitHub Actions workflows.\u003c/p\u003e\n\n\u003cp\u003eFor GKE Workload Identity Federation, the article explains how Kubernetes Service Accounts are bound to Google Cloud Service Accounts so workloads can access GCP resources without embedded keys. Audit logs can show these bindings through SetIamPolicy events and can identify Kubernetes-originated activity through svc.id.goog references that include the namespace and service account name. Workforce Identity Federation is also covered as a way for human users to access Google Cloud through external identity providers, with audit logs recording the federated user in principalSubject.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Service Agents are Google-managed service accounts automatically created when associated Google APIs are enabled, and their actions are logged even though customers cannot impersonate the accounts themselves.","Workload Identity Federation lets external workloads authenticate to Google Cloud without service account keys by exchanging external identity provider credentials with Google Cloud Security Token Service for short-lived access tokens.","In Workload Identity Federation investigations, Cloud Audit Logs can show token exchange events, mapped external identities, impersonated service accounts, and original external identities through fields such as principalSubject, request.name, and serviceAccountDelegationInfo.","GKE Workload Identity Federation connects Kubernetes Service Accounts to Google Cloud Service Accounts so GKE workloads can access Google Cloud resources without embedded service account keys, with audit logs showing the original Kubernetes namespace and service account through svc.id.goog references.","Workforce Identity Federation allows human users to access Google Cloud using identities from external providers such as Entra ID, Okta, or AD FS, and audit logs record these federated users in the principalSubject field."],"insights":["Federated activity may look like normal service account activity in Google Cloud logs, so investigators should check serviceAccountDelegationInfo to find the original external identity behind an impersonated service account.","The method google.identity.sts.v1.SecurityTokenService.ExchangeToken is a clear audit-log indicator that a federated token exchange occurred through Google Cloud Security Token Service.","For AWS workload identities, the principalSubject can include the AWS account ID, IAM role, and session ID, which helps investigators connect Google Cloud activity back to a specific AWS assumed-role session.","GKE Workload Identity logs include both the Kubernetes namespace and service account name through svc.id.goog, which helps distinguish workloads when the same service account name is reused across namespaces.","KSA-to-GSA Workload Identity bindings can be investigated through SetIamPolicy audit logs by reviewing request.policy.bindings.members and serviceData.policyDelta.bindingDeltas for additions of roles/iam.workloadIdentityUser."],"referencedReports":[{"title":"GCP Service Agents 201","url":"https://kattraxler.cloud/gcp/iam/201/2024/06/02/gcp-service-agents-201.html","publisher":"Kat Traxler","context":"The article points readers to Kat Traxler’s blog post for an in-depth explanation of Google Cloud Service Agents.","category":"guide","primary":false}],"body":"\u003cp\u003eThis article explains how several non-standard identity types appear in Google Cloud Platform Audit Logs during forensic investigations. It focuses on Service Agents, Workload Identity Federation, GKE Workload Identity Federation, and
