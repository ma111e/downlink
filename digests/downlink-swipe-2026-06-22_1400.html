 Workforce Identity Federation. The article’s central purpose is to help investigators determine who or what performed actions in a GCP project.\u003c/p\u003e\n\n\u003cp\u003eService Agents are Google-managed service accounts created when certain Google APIs are enabled, and their actions are logged even though customers cannot impersonate them. Workload Identity Federation lets external workloads use short-lived tokens instead of service account keys, with Google Cloud Security Token Service recording token exchanges and mapped external identities. Investigators can use fields such as principalSubject, principalEmail, request.name, and serviceAccountDelegationInfo to trace impersonated service account activity back to sources such as AWS roles or GitHub Actions workflows.\u003c/p\u003e\n\n\u003cp\u003eFor GKE Workload Identity Federation, the article explains how Kubernetes Service Accounts are bound to Google Cloud Service Accounts so workloads can access GCP resources without embedded keys. Audit logs can show these bindings through SetIamPolicy events and can identify Kubernetes-originated activity through svc.id.goog references that include the namespace and service account name. Workforce Identity Federation is also covered as a way for human users to access Google Cloud through external identity providers, with audit logs recording the federated user in principalSubject.\u003c/p\u003e\n"},{"n":17,"title":"Investigator’s Guide to Okta Logs: System Log Fields for Incident Response","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/saas-incident-response-a-guide-for-investigators-part-one-okta-log-fields","time":"16:40","priority":"MAY READ","score":55,"tldr":"Mitiga’s guide explains which Okta System Log fields are most useful for incident response, especially for tracking compromised sessions across authentication, transaction, and request IDs. It warns investigators to treat Okta risk and device fingerprint fields cautiously because they can be inaccurate or misleading without corroborating indicators.","briefOverview":"\u003cp\u003eMitiga’s article is an investigator’s guide to Okta System Logs for incident response in cloud-based and cloud-native environments. It explains that Okta System Logs record organization-related system events and can support both forensic investigation and detection. The guide focuses on key log fields that can help responders investigate SaaS compromises, while also warning that some fields have pitfalls.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights important fields such as actor identity, client IP address, user agent, geographic context, event type, outcome, transaction ID, external session ID, and multiple debug data fields. It specifically cautions that \u003ccode\u003edebugContext.debugData.risk\u003c/code\u003e may be affected by inaccurate anomalous device or anomalous location detections. It also warns that \u003ccode\u003edebugContext.debugData.deviceFingerprint\u003c/code\u003e can overlap across users and should be combined with other indicators rather than treated as a reliable unique device identifier.\u003c/p\u003e\n\n\u003cp\u003eFor session tracking during an Okta account compromise, the article recommends using \u003ccode\u003eauthenticationContext.externalSessionId\u003c/code\u003e, \u003ccode\u003etransaction.id\u003c/code\u003e, \u003ccode\u003edebugContext.debugData.emailRequestId\u003c/code\u003e, and \u003ccode\u003edebugContext.debugData.authnRequestId\u003c/code\u003e. It says investigators should identify unique values from confirmed malicious events and use them as pivot points to find related activity. The article notes that \u003ccode\u003etransaction.id\u003c/code\u003e and \u003ccode\u003edebugContext.debugData.emailRequestId\u003c/code\u003e always share identical values, while \u003ccode\u003edebugContext.debugData.authnRequestId\u003c/code\u003e may only occasionally match.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Mitiga’s article focuses on Okta System Logs and identifies key fields that incident responders can use for forensic investigation, detection, session tracking, hunting, and investigating Okta compromises.","The article warns that debugContext.debugData.risk should be interpreted with caution because historical examination found issues such as error-prone anomalous device detection and possible bugs affecting anomalous location detection.","The article warns that debugContext.debugData.deviceFingerprint can have significant overlap and unclear calculation methods, so investigators should combine it with other indicators rather than treating it as a reliable unique device identifier.","For tracking malicious Okta activity, the article recommends pivoting on authenticationContext.externalSessionId, transaction.id, debugContext.debugData.emailRequestId, and debugContext.debugData.authnRequestId associated with confirmed malicious events.","The article states that transaction.id and debugContext.debugData.emailRequestId always share identical values, while debugContext.debugData.authnRequestId might only occasionally match them."],"insights":["Investigators should not assume that Okta’s anomalous device and anomalous location risk signals are reliable on their own, because the article describes known inaccuracies that can misdirect an investigation.","The deviceFingerprint field can misleadingly suggest that multiple users used the same device, so the article recommends treating it only as a supporting indicator alongside other evidence.","A practical way to expand the scope of a confirmed malicious Okta event is to collect all related external session, transaction, email request, and authentication request IDs, then search across all of those fields rather than only the field where the ID was first found.","The dtHash field may be more useful than deviceFingerprint for investigating possible theft of session tokens affecting a single account, even though overlap across multiple user accounts is still possible."],"referencedReports":[],"body":"\u003cp\u003eMitiga’s article is an investigator’s guide to Okta System Logs for incident response in cloud-based and cloud-native environments. It explains that Okta System Logs record organization-related system events and can support both forensic investigation and detection. The guide focuses on key log fields that can help responders investigate SaaS compromises, while also warning that some fields have pitfalls.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights important fields such as actor identity, client IP address, user agent, geographic context, event type, outcome, transaction ID, external session ID, and multiple debug data fields. It specifically cautions that \u003ccode\u003edebugContext.debugData.risk\u003c/code\u003e may be affected by inaccurate anomalous device or anomalous location detections. It also warns that \u003ccode\u003edebugContext.debugData.deviceFingerprint\u003c/code\u003e can overlap across users and should be combined with other indicators rather than treated as a reliable unique device identifier.\u003c/p\u003e\n\n\u003cp\u003eFor session tracking during an Okta account compromise, the article recommends using \u003ccode\u003eauthenticationContext.externalSessionId\u003c/code\u003e, \u003ccode\u003etransaction.id\u003c/code\u003e, \u003ccode\u003edebugContext.debugData.emailRequestId\u003c/code\u003e, and \u003ccode\u003edebugContext.debugData.authnRequestId\u003c/code\u003e. It says investigators should identify unique values from confirmed malicious events and use them as pivot points to find related activity. The article notes that \u003ccode\u003etransaction.id\u003c/code\u003e and \u003ccode\u003edebugContext.debugData.emailRequestId\u003c/code\u003e always share identical values, while \u003ccode\u003edebugContext.debugData.authnRequestId\u003c/code\u003e may only occasionally match.\u003c/p\u003e\n"},{"n":18,"title":"GitHub Security Logs: What They Reveal and What to Hunt For","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/now-you-see-me-github-logs","time":"16:49","priority":"MAY READ","score":55,"tldr":"GitHub should be monitored like a critical security control plane because its logs can reveal risky changes to access, tokens, apps, and workflows that attackers use for persistence and CI/CD compromise. Security teams should export and correlate GitHub audit, token, and workflow logs to avoid visibility gaps during incidents.","briefOverview":"\u003cp\u003eGitHub is presented as a security-critical DevOps platform that manages code, permissions, automation, integrations, and credentials connected to enterprise production environments. The article argues that attackers target GitHub not only to steal code, but also to gain persistence, pivot into CI/CD systems, and manipulate what gets deployed. For this reason, GitHub logs are relevant to security teams and should be treated as part of an organization’s security scope.\u003c/p\u003e\n\n\u003cp\u003eThe article describes several useful GitHub telemetry sources, including organization and enterprise audit logs, user security logs, Actions workflow logs, and app and OAuth events. It says the most valuable logs during incidents are audit events related to access changes, token and OAuth activity, and Actions workflow runs. These events can reveal shifts in identities, automation, and permissions that defenders should investigate.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights logging limitations that can affect incident response, such as missing source IPs for some GitHub App, deploy key, and personal access token events, unclear token ownership, reduced visibility after repository deletion, overlooked internal-to-external forks, and incomplete command-level visibility in Actions runners. It recommends monitoring for MFA disablement, new SSH keys, unusual SSO interactions, workflow modifications, token behavior changes, access spikes to sensitive repositories, and new GitHub App installations. The article concludes that organizations should export and retain GitHub audit, token, and workflow logs so they can be enriched, correlated, and searched with other security data.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["GitHub is a security-critical DevOps platform because it manages code, permissions, automation, integrations, and credentials that can connect to enterprise production environments.","GitHub logs include audit logs, user security logs, Actions workflow logs, and app and OAuth events that can help defenders investigate access, authentication, repository settings, token activity, and workflow runs.","The article says GitHub logging has important limitations, including attribution gaps for some app, deploy key, and personal access token events, unclear token ownership, limited details after repository deletion, overlooked internal-to-external forks, and incomplete visibility into commands executed inside Actions runners.","Security teams should look for MFA disablement, new SSH keys, unusual SSO interactions, new or changed workflow files, token behavior changes, access spikes to sensitive repositories, and new GitHub App installations.","The article recommends exporting and retaining GitHub audit, token, and workflow logs so they can be enriched, correlated, and searched alongside other security-relevant data."],"insights":["Events generated by GitHub Apps, deploy keys, and personal access tokens may lack source IP addresses, which weakens geolocation and velocity-based detections.","A personal access token used today may not clearly map back to its human owner unless its creation event was tracked when it was made.","Repository deletion can sharply reduce the investigation window because audit logs may show the deletion while detailed historical access is no longer available without streamed logs.","Internal-to-external repository forks are logged and can represent exfiltration, but they may be easy to miss among high-volume daily events.","GitHub Actions logs provide metadata about workflow activity but do not show all command-level activity that runs inside ephemeral runners."],"referencedReports":[],"body":"\u003cp\u003eGitHub is presented as a security-critical DevOps platform that manages code, permissions, automation, integrations, and credentials connected to enterprise production environments. The article argues that attackers target GitHub not only to steal code, but also to gain persistence, pivot into CI/CD systems, and manipulate what gets deployed. For this reason, GitHub logs are relevant to security teams and should be treated as part of an organization’s security scope.\u003c/p\u003e\n\n\u003cp\u003eThe article describes several useful GitHub telemetry sources, including organization and enterprise audit logs, user security logs, Actions workflow logs, and app and OAuth events. It says the most valuable logs during incidents are audit events related to access changes, token and OAuth activity, and Actions workflow runs. These events can reveal shifts in identities, automation, and permissions that defenders should investigate.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights logging limitations that can affect incident response, such as missing source IPs for some GitHub App, deploy key, and personal access token events, unclear token ownership, reduced visibility after repository deletion, overlooked internal-to-external forks, and incomplete command-level visibility in Actions runners. It recommends monitoring for MFA disablement, new SSH keys, unusual SSO interactions, workflow modifications, token behavior changes, access spikes to sensitive repositories, and new GitHub App installations. The article concludes that organizations should export and retain GitHub audit, token, and workflow logs so they can be enriched, correlated, and searched with other security data.\u003c/p\u003e\n"},{"n":7,"title":"SpecterOps and OpenAI: Helping to Build a New Security Frontier with Daybreak","source":"specterops.io","sourceColorIdx":1,"link":"https://specterops.io/blog/2026/06/22/specterops-openai-daybreak-ai-cyber-innovation/","time":"17:09","priority":"MAY READ","score":52,"tldr":"SpecterOps is joining OpenAI’s Daybreak Cyber Partner Program to embed frontier AI capabilities into BloodHound and related services, focusing on attack path triage, environment discovery, and responsible AI controls for defenders.","briefOverview":"\u003cp\u003eOpenAI announced expanded access to its frontier AI cybersecurity capabilities through the OpenAI Daybreak Cyber Partner Program, including SpecterOps as an industry partner. SpecterOps says it has participated since April in OpenAI’s Trusted Access for Cyber program, which gives its researchers access to advanced cyber-capable models for legitimate security use cases. Through Daybreak, SpecterOps plans to work with OpenAI to bring advanced AI capabilities to customers using an approach informed by adversary tradecraft and threat research.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that modern enterprise environments have become too large and complex for human analysis alone, with potentially millions or billions of attack paths across Active Directory, Entra, Okta, and cloud infrastructure. SpecterOps identifies triage as the hard problem in attack path management: defenders need to know which paths matter most and what order to close them in. The company says it is building AI integrations for BloodHound that reason from attacker logic, including prioritized remediation guidance and automated analysis to identify enclaves worth protecting.\u003c/p\u003e\n\n\u003cp\u003eSpecterOps also says its GhostWorks AI cyber innovation lab is applying OpenAI’s frontier cyber capabilities to automating reverse engineering of attacker tooling and implanted software. That work is intended to help understand evasion techniques and improve endpoint coverage. The article adds that SpecterOps is working with OpenAI to codify safety and abuse prevention standards for embedded AI access, including access controls, output scoping, and monitoring.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["OpenAI announced expanded access to its frontier AI cybersecurity capabilities through the OpenAI Daybreak Cyber Partner Program, with SpecterOps included among the trusted industry partners.","SpecterOps has participated in OpenAI’s Trusted Access for Cyber program since April, giving its researchers access to advanced cyber-capable models for legitimate security use cases.","SpecterOps is focusing its Daybreak work on agent interactions with BloodHound for prioritized remediation guidance and automated analysis to identify enclaves worth protecting.","SpecterOps says GhostWorks is applying OpenAI’s frontier cyber capabilities to automating reverse engineering of attacker tooling and implanted software to understand evasion techniques and improve endpoint coverage.","SpecterOps is working with OpenAI to codify safety and abuse prevention standards for embedded AI access in security contexts."],"insights":["SpecterOps frames the main value of AI in security as triage rather than replacement, because enterprise environments can contain millions or billions of possible attack paths that humans cannot fully evaluate unaided.","The article emphasizes that useful attack-path prioritization must account for attacker intent and real-world operating conditions, not just the shortest or most obvious technical path through a system graph.","SpecterOps identifies configuration debt as a major hidden risk, noting that many organizations may not accurately understand the structure of long-running identity environments shaped by years of undocumented decisions.","The Daybreak work treats access controls, output limits, and monitoring for embedded AI as part of the core research problem, not as an after-the-fact safety layer."],"referencedReports":[],"body":"\u003cp\u003eOpenAI announced expanded access to its frontier AI cybersecurity capabilities through the OpenAI Daybreak Cyber Partner Program, including SpecterOps as an industry partner. SpecterOps says it has participated since April in OpenAI’s Trusted Access for Cyber program, which gives its researchers access to advanced cyber-capable models for legitimate security use cases. Through Daybreak, SpecterOps plans to work with OpenAI to bring advanced AI capabilities to customers using an approach informed by adversary tradecraft and threat research.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that modern enterprise environments have become too large and complex for human analysis alone, with potentially millions or billions of attack paths across Active Directory, Entra, Okta, and cloud infrastructure. SpecterOps identifies triage as the hard problem in attack path management: defenders need to know which paths matter most and what order to close them in. The company says it is building AI integrations for BloodHound that reason from attacker logic, including prioritized remediation guidance and automated analysis to identify enclaves worth protecting.\u003c/p\u003e\n\n\u003cp\u003eSpecterOps also says its GhostWorks AI cyber innovation lab is applying OpenAI’s frontier cyber capabilities to automating reverse engineering of attacker tooling and implanted software. That work is intended to help understand evasion techniques and improve endpoint coverage. The article adds that SpecterOps is working with OpenAI to codify safety and abuse prevention standards for embedded AI access, including access controls, output scoping, and monitoring.\u003c/p\u003e\n"},{"n":12,"title":"IaaS vs PaaS vs SaaS vs CaaS: Cloud Models Compared","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/iaas-vs-paas-vs-saas-what-are-the-differences","time":"16:25","priority":"MAY READ","score":45,"tldr":"IaaS, PaaS, SaaS, and CaaS differ mainly in how much control and security responsibility the customer retains versus the provider. Most organizations should choose based on technical expertise, compliance needs, and workload type, often using multiple models together.","briefOverview":"\u003cp\u003eThe article explains the differences between IaaS, PaaS, SaaS, and CaaS as cloud service models with different levels of customer control and provider responsibility. IaaS provides virtual infrastructure such as servers, storage, and networks while requiring the customer to manage operating systems, applications, and security. PaaS gives developers platforms for building and deploying applications without managing servers, while SaaS delivers ready-to-use applications through a browser. CaaS sits between IaaS and PaaS by supporting containerized applications while the provider handles the container platform and underlying servers.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that choosing the right model matters because it affects cost, technical complexity, security responsibility, and compliance. It says most enterprises use multiple service models together, such as SaaS for productivity tools, IaaS for infrastructure, PaaS for development, and CaaS for application modernization. Deployment choices such as public, private, and hybrid cloud also affect cost, control, and security. Regulated industries such as financial services and healthcare often choose private or hybrid approaches because of regulatory complexity and sensitive data needs.\u003c/p\u003e\n\n\u003cp\u003eSecurity responsibilities and visibility differ across the models. IaaS requires monitoring infrastructure, network, and access logs and addressing risks such as misconfigurations and exposed resources, while SaaS security depends more on provider controls, user activity logs, access controls, and third-party risk assessments. PaaS introduces concerns around APIs, dependencies, and limited infrastructure visibility, while CaaS requires container image scanning, runtime monitoring, network isolation, and secure secrets management. The article recommends choosing models by assessing team expertise, security and compliance requirements, total cost of ownership, application needs, and the ability to start small and scale.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["IaaS gives customers virtual servers, storage, and networking while requiring them to manage operating systems, databases, applications, and security.","PaaS provides development tools and platforms so developers can build, test, and deploy applications without managing servers or middleware.","SaaS delivers fully functional applications over the internet, with the provider handling installation, updates, maintenance, and most underlying security controls.","CaaS sits between IaaS and PaaS by letting organizations deploy, scale, and manage containerized applications while the provider handles the container platform and underlying servers.","The article says most large enterprises use multiple cloud service models together and choose among them based on technical expertise, security and compliance requirements, application needs, and total cost of ownership."],"insights":["Security planning should change by service model because IaaS requires the customer to manage the full security stack, while SaaS relies much more heavily on provider controls and allowed monitoring.","The article recommends calculating total cost of ownership beyond subscription fees, including staff time, security tools, and training, because lower upfront costs may not reflect the real operating cost.","Organizations can reduce risk by matching workloads to service models instead of standardizing on one model, such as using IaaS for legacy systems, PaaS for new development, SaaS for business tools, and CaaS for modernization.","Cloud security efforts should prioritize configuration management because the article says most cloud security failures are projected to result from misconfigurations by 2026.","CaaS requires specific safeguards that differ from traditional cloud hosting, including scanning container images before deployment, monitoring runtime behavior, isolating container communications, and storing secrets outside container images."],"referencedReports":[],"body":"\u003cp\u003eThe article explains the differences between IaaS, PaaS, SaaS, and CaaS as cloud service models with different levels of customer control and provider responsibility. IaaS provides virtual infrastructure such as servers, storage, and networks while requiring the customer to manage operating systems, applications, and security. PaaS gives developers platforms for building and deploying applications without managing servers, while SaaS delivers ready-to-use applications through a browser. CaaS sits between IaaS and PaaS by supporting containerized applications while the provider handles the container platform and underlying servers.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that choosing the right model matters because it affects cost, technical complexity, security responsibility, and compliance. It says most enterprises use multiple service models together, such as SaaS for productivity tools, IaaS for infrastructure, PaaS for development, and CaaS for application modernization. Deployment choices such as public, private, and hybrid cloud also affect cost, control, and security. Regulated industries such as financial services and healthcare often choose private or hybrid approaches because of regulatory complexity and sensitive data needs.\u003c/p\u003e\n\n\u003cp\u003eSecurity responsibilities and visibility differ across the models. IaaS requires monitoring infrastructure, network, and access logs and addressing risks such as misconfigurations and exposed resources, while SaaS security depends more on provider controls, user activity logs, access controls, and third-party risk assessments. PaaS introduces concerns around APIs, dependencies, and limited infrastructure visibility, while CaaS requires container image scanning, runtime monitoring, network isolation, and secure secrets management. The article recommends choosing models by assessing team expertise, security and compliance requirements, total cost of ownership, application needs, and the ability to start small and scale.\u003c/p\u003e\n"},{"n":15,"title":"5 Tips to Address the Cybersecurity Skills Gap","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/5-tips-to-address-the-cybersecurity-skills-gap","time":"17:01","priority":"MAY READ","score":45,"tldr":"Cybersecurity leaders can address the 2025 skills gap by upskilling existing teams, using automation, improving retention, and building talent pipelines. For immediate coverage, the article recommends managed cloud detection and response services to supplement scarce in-house expertise.","briefOverview":"\u003cp\u003eThe article discusses the cybersecurity skills gap facing CISOs and security leaders in 2025. It says demand for skilled security professionals continues to outpace supply as threats evolve and technology changes quickly. The article highlights that rising salaries make recruitment and retention more expensive, leaving organizations vulnerable and forcing leaders to build resilient teams within budget limits.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies missing skills in cloud security, incident response, threat hunting, strategic thinking, and automation proficiency. It says the gap has intensified with the rapid adoption of cloud technologies, automation, and artificial intelligence. It recommends upskilling existing staff through certifications, cross-training, and hands-on exercises such as threat hunting and simulated attacks.\u003c/p\u003e\n\n\u003cp\u003eThe article also recommends using managed services such as Cloud Managed Detection and Response for immediate support, especially for resource-constrained teams. It says Cloud MDR can provide continuous monitoring, advanced incident response, proactive cloud-focused threat hunting, and round-the-clock response capabilities. Longer-term recommendations include embracing automation and AI, partnering with academic institutions and upskilling platforms, and improving wellness and retention to reduce burnout.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The cybersecurity skills gap in 2025 has intensified due to rapid adoption of cloud technologies, automation, and artificial intelligence.","The article identifies missing skills including cloud security knowledge, incident response expertise, threat hunting skills, strategic thinking, and automation proficiency.","The article recommends upskilling existing staff through training programs, cross-training, and on-the-job learning such as threat hunting exercises or simulated attacks.","The article says managed services such as Cloud Managed Detection and Response can provide continuous monitoring, advanced incident response, and proactive threat hunting for resource-constrained teams.","The article recommends improving retention by providing clear career growth paths, recognizing and rewarding employees, and supporting work-life balance to reduce burnout."],"insights":["The article frames managed Cloud MDR as a short-term bridge for teams that cannot afford or hire every needed security skill immediately, rather than as a replacement for long-term team development.","The skills gap is presented as extending beyond technical know-how, with strategic thinking and the ability to align security work with business objectives included among the missing capabilities.","The article suggests cross-training and role rotation as a way to increase team resilience, meaning existing staff can cover more areas without requiring immediate new hires nd Amazon-themed scams ahead of Prime Day. The travel-themed activity included 47,318 travel-related domains registered in May 2026, while the Amazon campaigns included newly registered domains and lookalike internationalized domains. The report also assesses elevated cyberattack volumes against Central US healthcare, energy, utilities, and financial services organizations.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Texas Parks and Wildlife Department was affected by a third-party data breach involving its license system vendor that exposed driver’s license information, passport numbers, emails, phone numbers, and residential addresses for 3,087,721 hunting and fishing license customers.","ShapedPlugin faced a supply chain attack that delivered malicious updates for three paid WordPress plugins through its official updater and installed a hidden fake WooCommerce plugin to steal admin, database, and 2FA credentials.","Researchers reported AI-related threats including AutoJack, SearchLeak in Microsoft 365 Copilot Search, and OpenClaw AI agent flaws that could enable remote code execution, data exfiltration, or data leaks through prompt injection and unsafe agent workflows.","Fortinet FortiSandbox flaws, Microsoft Defender CVE-2026-50656, Cisco Catalyst SD-WAN Manager CVE-2026-20262, and Splunk Enterprise CVE-2026-20253 were reported as actively exploited or confirmed zero-day vulnerabilities with patches or updates available or in development.","Check Point Research reported travel-themed cybercrime, Amazon Prime Day scams, and a crypto clipboard hijacker promoted through multiple platforms, including GitHub, SourceForge, YouTube, and legitimate news websites."],"insights":["Several incidents involved trusted intermediaries rather than direct compromise of the final target, including a license system vendor, ShapedPlugin’s release infrastructure, third-party-hosted business applications at iRhythm, and Klue’s legacy integration c e customers, a ShapedPlugin supply chain attack against paid WordPress plugins, an iRhythm Technologies cyberattack involving third-party-hosted business applications, and a Klue breach involving compromised legacy integration credentials. The impacts described include exposed driver’s license and passport data, stolen protected health information and proprietary data, stolen Salesforce-connected customer data, and credential theft from affected websites.\u003c/p\u003e\n\n\u003cp\u003eThe report highlights several AI-related threats, including Microsoft’s AutoJack exploit chain, SearchLeak in Microsoft 365 Copilot Search, and OpenClaw AI agent flaws. These issues involved malicious web pages, crafted links, hidden contacts, or phishing emails that could trigger prompt injections, code execution, data leaks, or data exfiltration. The article also notes actively exploited or confirmed vulnerabilities affecting Fortinet FortiSandbox, Microsoft Defender, Cisco Catalyst SD-WAN Manager, and Splunk Enterprise, with impacts including command execution, privilege escalation, arbitrary file writes, and possible remote code execution.\u003c/p\u003e\n\n\u003cp\u003eCheck Point Research also reports on broader cybercrime campaigns and targeting patterns, including a crypto clipboard hijacker promoted through multiple platforms, travel-themed phishing campaigns using Booking.com, Airbnb, and Skyscanner lookalikes, and Amazon-themed scams ahead of Prime Day. The travel-themed activity included 47,318 travel-related domains registered in May 2026, while the Amazon campaigns included newly registered domains and lookalike internationalized domains. The report also assesses elevated cyberattack volumes against Central US healthcare, energy, utilities, and financial services organizations.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;

const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>

      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
