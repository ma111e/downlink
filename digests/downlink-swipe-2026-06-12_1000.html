<script type="application/json" id="dl-articles">[{"n":4,"title":"Agentjacking Attack Tricks AI Coding Agents Into Running Malicious Code","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/agentjacking-attack-tricks-ai-coding.html","time":"12:04","priority":"SHOULD READ","score":84,"tldr":"Researchers described “Agentjacking,” a technique that abuses fake Sentry error reports to make AI coding agents like Claude Code and Cursor treat attacker-supplied instructions as trusted fixes and run malicious code on developers’ machines. The issue stems from AI agents trusting external MCP-fed data, potentially exposing credentials and other sensitive developer information without compromising the target’s infrastructure.","briefOverview":"\u003cp\u003eTenet Security researchers described Agentjacking, a new class of attack that can trick AI coding agents into running arbitrary code on developer machines. The attack is triggered through a fake Sentry error report crafted using Sentry, an open-source error-tracking and performance-monitoring platform. The researchers said it exploits the intersection of Sentry’s event ingestion, which accepts arbitrary payloads from anyone with the DSN, and the Sentry MCP server, which returns that data to AI agents as trusted system output.\u003c/p\u003e\n\n\u003cp\u003eThe attack works by injecting crafted input into Sentry error events that coding agents such as Claude Code and Cursor can interpret as legitimate diagnostic resolution steps. When a developer asks an AI coding agent to fix unresolved Sentry issues, the agent may query Sentry via MCP, receive the malicious event, and execute attacker-controlled code with the developer’s privileges. Tenet said a successful attack can expose environment variables, Git credentials, private repository URLs, and developer identities.\u003c/p\u003e\n\n\u003cp\u003eTenet Security said it found at least 2,388 organizations exposed with valid injectable DSNs and tested the attack in a controlled manner against more than 100 organizations. The company reported an 85% exploitation success rate against injected errors across some widely used AI coding assistants. Sentry acknowledged the issue but opted not to fix it, saying it is “technically not defensible,” while reportedly activating a global content filter that blocks a specific payload string.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers at Tenet Security described Agentjacking as a new class of attack that can trick AI coding agents into running arbitrary code on developer machines. The attack can be triggered through a fake error report crafted using Sentry, an open-source error-tracking and performance-monitoring platform. The article says the issue arises from a critical architectural flaw at the intersection of Sentry’s event ingestion and the Sentry MCP server.\u003c/p\u003e\n\n\u003cp\u003eAccording to the researchers, Sentry event ingestion accepts arbitrary payloads from anyone with the Sentry Data Source Name, or DSN. The Sentry MCP server can then return that data to AI agents as trusted system output. Because an AI agent cannot distinguish between a real application crash and an attacker-injected event, crafted input can be interpreted as legitimate diagnostic guidance.\u003c/p\u003e\n\n\u003cp\u003eThe attack chain starts when an attacker finds a target’s public, write-only Sentry DSN, which may be embedded in websites. The attacker sends a malicious error event to Sentry’s ingest endpoint via a POST request using the DSN. The injected event contains carefully formatted markdown in the message field and context key names, making it appear visually identical to Sentry’s system template when returned by the Sentry MCP server.\u003c/p\u003e\n\n\u003cp\u003eWhen a developer asks an AI coding agent such as Claude Code or Cursor to fix unresolved Sentry issues, the agent queries Sentry via MCP and receives the malicious event. The article says the agent may then run the attacker’s command as trusted guidance, executing malicious code with the developer’s full privileges on the developer’s own machine. Tenet said the attacker does not need to touch the victim’s infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article says a successful Agentjacking attack can expose sensitive data such as environment variables, Git credentials, private repository URLs, and developer identities. Tenet Security said it found at least 2,388 organizations exposed with valid injectable DSNs and tested the attack in a controlled manner against over 100 organizations. The company reported an 85% exploitation success rate against injected errors across some widely used AI coding assistants.\u003c/p\u003e\n\n\u003cp\u003eSentry acknowledged the issue but opted not to fix it, stating that it is “technically not defensible.” The article says Sentry activated a global content filter that blocks a specific payload string. Tenet characterized the research as evidence that AI coding agents themselves are becoming an attack surface because they can be turned against developers through trusted data flows.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eTenet Security researchers described Agentjacking as a new class of attack that can trick artificial intelligence coding agents into running arbitrary code on developer machines. The attack can be triggered using a fake Sentry error report, crafted through Sentry, an open-source error-tracking and performance-monitoring platform.\u003c/p\u003e\n\n\u003cp\u003eThe researchers said the attack exploits a critical architectural flaw at the intersection of Sentry’s event ingestion and the Sentry MCP server. In their description, Sentry’s event ingestion accepts arbitrary payloads from anyone with the DSN, while the Sentry MCP server returns that data to AI agents as trusted system output.\u003c/p\u003e\n\n\u003ch2 id=\"core-technical-issue\"\u003eCore Technical Issue\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the problem as rooted in implicit trust when AI agents connect to external services using Model Context Protocol, or MCP. Because an AI agent cannot distinguish between an error event generated by a real application crash and an event injected by an attacker, the agent may treat attacker-controlled content as legitimate diagnostic information.\u003c/p\u003e\n\n\u003cp\u003eTenet Security said the attack uses crafted input in Sentry error events. Those events are then interpreted by coding agents such as Claude Code and Cursor as legitimate diagnostic resolution steps. If the agent follows those steps, it can run attacker-controlled code.\u003c/p\u003e\n\n\u003ch2 id=\"attack-chain\"\u003eAttack Chain\u003c/h2\u003e\n\n\u003cp\u003eThe attack chain described by Tenet Security includes the following steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn attacker finds a target’s Sentry Data Source Name, or DSN, which the article describes as a public, write-only credential embedded in websites.\u003c/li\u003e\n\u003cli\u003eThe attacker sends a malicious error event to Sentry’s ingest endpoint through a POST request using the DSN.\u003c/li\u003e\n\u003cli\u003eThe injected event includes carefully formatted markdown in the message field and context key names.\u003c/li\u003e\n\u003cli\u003eWhen the Sentry MCP server returns the event to an AI agent, the content is rendered as structured material that appears visually identical to Sentry’s system template.\u003c/li\u003e\n\u003cli\u003eWhen a developer asks an AI coding agent to fix unresolved Sentry issues, the agent queries Sentry through MCP and receives the malicious event.\u003c/li\u003e\n\u003cli\u003eThe agent executes malicious code with the developer’s full privileges.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe researchers emphasized that the attacker does not need to touch the victim’s infrastructure. The malicious instruction arrives as part of an ordinary error event, disguised as a legitimate resolution. When the developer asks the AI agent to fix the Sentry issue, the agent reads the attacker’s command as trusted guidance and runs it on the developer’s machine.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe article says a successful Agentjacking attack can expose sensitive information. Examples listed include environment variables, Git credentials, private repository URLs, and developer identities.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that the attack does not rely on phishing or prior server compromise. Instead, it uses data that organizations publish about themselves, specifically the Sentry DSN, and the trust relationship between MCP-connected external services and AI coding agents.\u003c/p\u003e\n\n\u003ch2 id=\"affected-tools-and-stakeholders\"\u003eAffected Tools and Stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe article specifically names AI coding agents including Claude Code and Cursor as examples of tools that can interpret the injected Sentry events as legitimate diagnostic guidance. Sentry is central to the described attack path because the fake error report is sent through Sentry ingestion and returned through the Sentry MCP server.\u003c/p\u003e\n\n\u003cp\u003eTenet Security is the research organization that described the attack. The article also states that Tenet found at least 2,388 organizations exposed with valid injectable DSNs. Tenet said it tested the attack in a controlled manner against more than 100 organizations.\u003c/p\u003e\n\n\u003ch2 id=\"reported-testing-results\"\u003eReported Testing Results\u003c/h2\u003e\n\n\u003cp\u003eTenet Security said it achieved an 85% exploitation success rate against injected errors across some of the most widely used AI coding assistants. The article does not name a threat actor exploiting the technique in the wild. It presents the activity as research conducted by Tenet Security.\u003c/p\u003e\n\n\u003ch2 id=\"sentry-s-response\"\u003eSentry’s Response\u003c/h2\u003e\n\n\u003cp\u003eSentry acknowledged the issue, according to the article, but opted not to fix it. The article quotes Sentry as saying the issue is “technically not defensible.”\u003c/p\u003e\n\n\u003cp\u003eThe article also says Sentry activated a global content filter that blocks a specific payload string. No broader remediation from Sentry is described in the article.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eTenet Security said Agentjacking stands out because it targets the AI agent that a developer trusts and uses a Sentry DSN as a starting point. The markdown injection is rendered in a way that the agent cannot distinguish from legitimate Sentry guidance.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that AI coding agents are becoming part of the attack surface. Tenet said the attack can bypass EDR, WAF, IAM, VPN, Cloudflare, and firewalls because every action in the chain is authorized.\u003c/p\u003e\n","keyPoints":["Tenet Security researchers described Agentjacking as a new class of attack that can trick AI coding agents into running arbitrary code on developer machines.","The attack uses a fake Sentry error report containing crafted markdown that is returned through the Sentry MCP server and interpreted by AI agents as trusted diagnostic guidance.","The attack chain begins with an attacker finding a target’s public Sentry DSN and sending a malicious error event to Sentry’s ingest endpoint.","When a developer asks an AI coding agent such as Claude Code or Cursor to fix unresolved Sentry issues, the agent can query Sentry via MCP and execute the attacker-controlled code with the developer’s privileges.","Tenet Security said it found at least 2,388 organizations exposed with valid injectable DSNs and achieved an 85% exploitation success rate in controlled testing against injected errors across widely used AI coding assistants."],"insights":["A public, write-only Sentry DSN can become an initial access vector for influencing AI coding agents, even though it does not provide read access to the target’s Sentry data.","The attack does not require compromising the victim’s servers or directly contacting the developer, because the malicious instruction is delivered through an ordinary Sentry error event that the developer’s AI agent later retrieves.","The markdown injection is effective because the malicious content can be rendered visually like legitimate Sentry system guidance, making it difficult for the AI agent to distinguish attacker-controlled data from trusted output.","Sentry acknowledged the issue but said it is “technically not defensible,” indicating that organizations using AI agents with MCP-connected external services may need to rely on their own controls rather than expecting a complete platform-side fix.","Traditional controls such as EDR, WAF, IAM, VPNs, Cloudflare, and firewalls may not catch this attack path because the article says every action in the chain is authorized."],"referencedReports":[{"title":"Agentjacking: Coding Agents with Fake Sentry Errors","url":"https://tenetsecurity.ai/blog/agentjacking-coding-agents-with-fake-sentry-errors/","publisher":"Tenet Security","context":"The article is based on Tenet Security research describing how fake Sentry error events can trick AI coding agents into running attacker-controlled code.","category":"","primary":false}],"body":"\u003cp\u003eTenet Security researchers described Agentjacking, a new class of attack that can trick AI coding agents into running arbitrary code on developer machines. The attack is triggered through a fake Sentry error report crafted using Sentry, an open-source error-tracking and performance-monitoring platform. The researchers said it exploits the intersection of Sentry’s event ingestion, which accepts arbitrary payloads from anyone with the DSN, and the Sentry MCP server, which returns that data to AI agents as trusted system output.\u003c/p\u003e\n\n\u003cp\u003eThe attack works by injecting crafted input into Sentry error events that coding agents such as Claude Code and Cursor can interpret as legitimate diagnostic resolution steps. When a developer asks an AI coding agent to fix unresolved Sentry issues, the agent may query Sentry via MCP, receive the malicious event, and execute attacker-controlled code with the developer’s privileges. Tenet said a successful attack can expose environment variables, Git credentials, private repository URLs, and developer identities.\u003c/p\u003e\n\n\u003cp\u003eTenet Security said it found at least 2,388 organizations exposed with valid injectable DSNs and tested the attack in a controlled manner against more than 100 organizations. The company reported an 85% exploitation success rate against injected errors across some widely used AI coding assistants. Sentry acknowledged the issue but opted not to fix it, saying it is “technically not defensible,” while reportedly activating a global content filter that blocks a specific payload string.\u003c/p\u003e\n"},{"n":1,"title":"Pharma giant Novo Nordisk discloses breach of clinical trials data","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/pharmaceutical-giant-novo-nordisk-discloses-security-breach/","time":"10:13","priority":"SHOULD READ","score":82,"tldr":"Novo Nordisk disclosed that attackers accessed internal systems and copied pseudonymized clinical trial patient data, along with contact details for some healthcare professionals. The company says patients cannot be directly identified from the exposed trial data, but affected healthcare professionals may face phishing attempts.","briefOverview":"\u003cp\u003eDanish pharmaceutical giant Novo Nordisk disclosed a data breach affecting patient information from some clinical trials. The company said attackers gained access to internal IT systems and copied certain non-public data externally without authorization. Novo Nordisk is the world’s largest producer of insulin and the maker of Wegovy and Ozempic.\u003c/p\u003e\n\n\u003cp\u003eThe exposed clinical trial data included pseudonymized patient IDs and information such as trial participation, sex, year of birth, biomarkers, health and immunogenicity data, and lifestyle factors including smoking, alcohol use, and BMI. Novo Nordisk said the information was not directly linked to patients by name or other direct identifiers, and that it does not consider the incident to enable third parties to identify clinical trial participants. The breach also affected an undisclosed number of healthcare professionals whose contact and registration details were exposed.\u003c/p\u003e\n\n\u003cp\u003eNovo Nordisk took compromised internal IT systems offline and said core business operations were not impacted. The company is investigating the incident with external cybersecurity experts and is working to bring affected systems back online in a controlled and safe manner. Novo Nordisk has not disclosed when the breach was detected or how many individuals were affected.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eNovo Nordisk disclosed that attackers accessed internal IT systems and copied certain non-public data, including personal data, without authorization. The Danish pharmaceutical company said the incident affected patient information from some clinical trials. Novo Nordisk employs around 67,900 people across 80 offices worldwide and is the world’s largest producer of insulin.\u003c/p\u003e\n\n\u003cp\u003eThe clinical trial data exposed in the incident included patient IDs described as random alphanumeric strings. Other exposed data included information on trial participation, sex, year of birth, biomarkers, health and immunogenicity data, and lifestyle factors such as smoking, alcohol use, and BMI. Novo Nordisk said this data was pseudonymized.\u003c/p\u003e\n\n\u003cp\u003eAccording to Novo Nordisk, the exposed clinical trial information was not directly linked to patient names or other direct identifiers. The company said identity information would require access to underlying information identifying patients by name, and that this underlying information was not exposed. Novo Nordisk therefore said it does not consider the incident to enable third parties to identify participants in its clinical trials.\u003c/p\u003e\n\n\u003cp\u003eThe breach also affected an undisclosed number of healthcare professionals. Exposed healthcare professional information included names, registration numbers, email addresses, phone numbers, WhatsApp details, and office locations. Novo Nordisk warned affected healthcare professionals to be wary of unexpected messages or calls, including phishing attempts through email, phone, WhatsApp, or fraudulent messages impersonating colleagues.\u003c/p\u003e\n\n\u003cp\u003eNovo Nordisk took the compromised internal IT systems offline and said its core business operations were not impacted. The company is investigating the incident with external cybersecurity experts to assess the full impact and scope of the breach. It said affected systems are being brought back online in a controlled and safe manner, but acknowledged the process takes time.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Novo Nordisk has not disclosed when the breach was detected or how many individuals had personal and patient data exposed. When BleepingComputer asked for more details, a Novo Nordisk spokesperson referred the publication back to the company’s press release. No named threat actor was identified in the article.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eNovo Nordisk disclosed a data breach involving access to its internal IT systems and the unauthorized external copying of certain non-public data. The incident affected patient information from some clinical trials, as well as data belonging to an undisclosed number of healthcare professionals.\u003c/p\u003e\n\n\u003cp\u003eNovo Nordisk is described in the article as a Danish pharmaceutical giant, the world’s largest producer of insulin, and the maker of Wegovy and Ozempic. Founded in 1923, the company employs around 67,900 people across 80 offices worldwide.\u003c/p\u003e\n\n\u003ch2 id=\"what-novo-nordisk-disclosed\"\u003eWhat Novo Nordisk Disclosed\u003c/h2\u003e\n\n\u003cp\u003eNovo Nordisk said attackers gained access to internal IT systems and copied certain non-public data externally without authorization. The company stated that it is informing impacted parties as appropriate while its investigation and response continue.\u003c/p\u003e\n\n\u003cp\u003eThe company has not disclosed when the breach was detected. It has also not disclosed how many individuals had personal or patient data exposed.\u003c/p\u003e\n\n\u003ch2 id=\"clinical-trial-patient-data-involved\"\u003eClinical Trial Patient Data Involved\u003c/h2\u003e\n\n\u003cp\u003eThe breach affected data related to patients participating in some clinical trials. The exposed clinical trial data included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePatient IDs described as random alphanumeric strings.\u003c/li\u003e\n\u003cli\u003eInformation on clinical trial participation.\u003c/li\u003e\n\u003cli\u003eSex.\u003c/li\u003e\n\u003cli\u003eYear of birth.\u003c/li\u003e\n\u003cli\u003eBiomarkers.\u003c/li\u003e\n\u003cli\u003eHealth and immunogenicity data.\u003c/li\u003e\n\u003cli\u003eLifestyle factors, including smoking, alcohol use, and BMI.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eNovo Nordisk said the clinical trial data was pseudonymized. The company stated that the information was not directly linked to patients by name or other direct identifiers.\u003c/p\u003e\n\n\u003ch2 id=\"novo-nordisk-s-position-on-patient-identification\"\u003eNovo Nordisk’s Position on Patient Identification\u003c/h2\u003e\n\n\u003cp\u003eNovo Nordisk said the exposed clinical trial information does not directly identify patients. According to the company, identifying patients by name would require access to underlying identity information, and that underlying information was not exposed.\u003c/p\u003e\n\n\u003cp\u003eThe company therefore said it does not consider the incident to enable any third party to identify participants in its clinical trials.\u003c/p\u003e\n\n\u003ch2 id=\"healthcare-professionals-affected\"\u003eHealthcare Professionals Affected\u003c/h2\u003e\n\n\u003cp\u003eThe breach also affected an undisclosed number of healthcare professionals. The exposed information for healthcare professionals included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNames.\u003c/li\u003e\n\u003cli\u003eRegistration numbers.\u003c/li\u003e\n\u003cli\u003eEmail addresses.\u003c/li\u003e\n\u003cli\u003ePhone numbers.\u003c/li\u003e\n\u003cli\u003eWhatsApp details.\u003c/li\u003e\n\u003cli\u003eOffice locations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eNovo Nordisk warned affected healthcare professionals to be cautious of unexpected messages or calls. The company specifically warned that they may be targeted in phishing attacks through email, phone, WhatsApp, or fraudulent messages impersonating colleagues.\u003c/p\u003e\n\n\u003ch2 id=\"systems-and-operational-impact\"\u003eSystems and Operational Impact\u003c/h2\u003e\n\n\u003cp\u003eNovo Nordisk took the compromised internal IT systems offline. The company said its core business operations were not impacted and remain up and running.\u003c/p\u003e\n\n\u003cp\u003eNovo Nordisk said it is working to bring affected systems back online in a controlled and safe manner. The company also acknowledged that this process takes time.\u003c/p\u003e\n\n\u003ch2 id=\"investigation-and-response\"\u003eInvestigation and Response\u003c/h2\u003e\n\n\u003cp\u003eNovo Nordisk is investigating the incident with the help of external cybersecurity experts. The stated purpose of the investigation is to assess the full impact and scope of the breach.\u003c/p\u003e\n\n\u003cp\u003eThe company’s public statements indicate that its investigation and response remain ongoing. When BleepingComputer reached out for more details, a Novo Nordisk spokesperson referred the publication back to the company’s press release.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-information\"\u003eThreat Actor Information\u003c/h2\u003e\n\n\u003cp\u003eThe article does not name or attribute the incident to any specific threat actor or group. It refers only to attackers who gained access to Novo Nordisk’s internal IT systems.\u003c/p\u003e\n\n\u003ch2 id=\"known-unknowns\"\u003eKnown Unknowns\u003c/h2\u003e\n\n\u003cp\u003eSeveral important details were not disclosed in the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhen the breach was detected.\u003c/li\u003e\n\u003cli\u003eHow many clinical trial patients were affected.\u003c/li\u003e\n\u003cli\u003eHow many healthcare professionals were affected.\u003c/li\u003e\n\u003cli\u003eHow the attackers gained access to the internal IT systems.\u003c/li\u003e\n\u003cli\u003eWhether any specific threat actor is suspected.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eNovo Nordisk disclosed that attackers accessed internal IT systems and copied pseudonymized clinical trial data and healthcare professional contact details, but the company said the exposed trial data was not directly linked to patient names or other direct identifiers. The company took affected systems offline, said core operations were not impacted, and is investigating the breach with external cybersecurity experts.\u003c/p\u003e\n","keyPoints":["Novo Nordisk disclosed that attackers gained access to internal IT systems and copied non-public data related to patients participating in some clinical trials.","The exposed clinical trial data included pseudonymized patient IDs, trial participation details, sex, year of birth, biomarkers, health and immunogenicity data, and lifestyle factors such as smoking, alcohol use, and BMI.","Novo Nordisk said the exposed clinical trial information was not directly linked to patient names or other direct identifiers and does not enable third parties to identify participants.","The breach also exposed information for an undisclosed number of healthcare professionals, including names, registration numbers, email addresses, phone numbers, WhatsApp details, and office locations.","Novo Nordisk took the compromised internal IT systems offline and said its core business operations were not impacted."],"insights":["The exposed healthcare professional data includes multiple communication channels and office locations, making Novo Nordisk’s warning about phishing via email, phone, WhatsApp, or colleague impersonation especially actionable.","Novo Nordisk’s assessment that trial participants cannot be identified depends on the underlying identity-linking information not having been exposed.","The company has not disclosed when the breach was detected or how many individuals were affected, leaving the incident’s scale and exposure window unclear.","Novo Nordisk said affected systems are being restored in a controlled manner, indicating some internal IT systems may remain offline even though core business operations continue."],"referencedReports":[],"body":"\u003cp\u003eDanish pharmaceutical giant Novo Nordisk disclosed a data breach affecting patient information from some clinical trials. The company said attackers gained access to internal IT systems and copied certain non-public data externally without authorization. Novo Nordisk is the world’s largest producer of insulin and the maker of Wegovy and Ozempic.\u003c/p\u003e\n\n\u003cp\u003eThe exposed clinical trial data included pseudonymized patient IDs and information such as trial participation, sex, year of birth, biomarkers, health and immunogenicity data, and lifestyle factors including smoking, alcohol use, and BMI. Novo Nordisk said the information was not directly linked to patients by name or other direct identifiers, and that it does not consider the incident to enable third parties to identify clinical trial participants. The breach also affected an undisclosed number of healthcare professionals whose contact and registration details were exposed.\u003c/p\u003e\n\n\u003cp\u003eNovo Nordisk took compromised internal IT systems offline and said core business operations were not impacted. The company is investigating the incident with external cybersecurity experts and is working to bring affected systems back online in a controlled and safe manner. Novo Nordisk has not disclosed when the breach was detected or how many individuals were affected.\u003c/p\u003e\n"},{"n":5,"title":"The FedEx Freight Invoice That Came From Inside the CRM","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/fedex-freight-invoice-rebill-salesforce-securence-relay","time":"11:00","priority":"SHOULD READ","score":82,"tldr":"A phishing email sent from FedEx Freight’s legitimate Salesforce CRM passed DKIM and DMARC checks while asking a logistics company to change the bill-to entity on a freight invoice. The key takeaway is that authenticated, trusted infrastructure can still be abused for invoice fraud, so financial change requests from first-time senders must be verified out of band.","briefOverview":"\u003cp\u003eAn attacker used FedEx Freight\u0026rsquo;s Salesforce CRM to send an invoice rebill request to a logistics and distribution company. The email was addressed to three employees and asked for a change to the bill-to entity on freight invoice #0584162950. The article characterizes the event as high-severity invoice fraud and business email compromise.\u003c/p\u003e\n\n\u003cp\u003eThe message was significant because it was sent through FedEx Freight\u0026rsquo;s legitimate CRM infrastructure rather than spoofed infrastructure. It passed DKIM with a signature aligned to fedexfreight.com, passed DMARC, and returned compauth=100. The message contained no malicious links or attachments, making the text of the request itself the payload.\u003c/p\u003e\n\n\u003cp\u003eThe email originated from Salesforce Email-as-a-Service infrastructure and was dispatched via Salesforce Quick Action, as indicated by the X-SFDC-EmailCategory header. It was later relayed through a Securence gateway, which caused an SPF softfail at the final receiving server. Themis flagged the message at 83% confidence as invoice phishing, and four mailboxes were quarantined.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA freight invoice rebill request arrived at a logistics and distribution company and was addressed to three employees. The sender appeared as \u0026ldquo;Coordinator23\u0026rdquo; at coordinator23@fedexfreight.com, and the subject referenced a specific case number and FedEx Freight invoice. The article describes the message as an invoice fraud and business email compromise attempt.\u003c/p\u003e\n\n\u003cp\u003eThe email was not presented as a simple spoofing attempt. It originated from Salesforce Email-as-a-Service infrastructure and was sent through FedEx Freight\u0026rsquo;s own Salesforce CRM instance. The X-SFDC-EmailCategory header was set to quickActionEmail, indicating use of Salesforce Quick Action from case management.\u003c/p\u003e\n\n\u003cp\u003eAuthentication results were clean at key points in the delivery path. DKIM passed with a selector under d=fedexfreight.com, DMARC passed, and CompAuth returned reason=100. The article states that the Salesforce entity ID and long Salesforce VERP bounce address confirmed the message was generated inside a real Salesforce org.\u003c/p\u003e\n\n\u003cp\u003eThe email contained no malicious links or attachments. Its payload was the operational request to change the bill-to entity on invoice #0584162950. The article emphasizes that freight invoice adjustments, rebills, and bill-to changes are normal logistics communications, which made the request appear routine.\u003c/p\u003e\n\n\u003cp\u003eThe email was later relayed through a Securence gateway, and the final receiving server recorded an SPF softfail because the Securence relay IP was not in the original sender\u0026rsquo;s SPF record. The article describes this as a known gateway-relaying artifact rather than an attacker-introduced detection signal. Themis scored the message at 83% confidence as invoice phishing, and four mailboxes were quarantined.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAn attacker used FedEx Freight\u0026rsquo;s Salesforce CRM to send a freight invoice rebill request to a logistics and distribution company. The email was sent to three employees and came from \u0026ldquo;Coordinator23\u0026rdquo; at coordinator23@fedexfreight.com. The subject referenced a specific case number and FedEx Freight invoice.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the incident as high-severity invoice fraud and business email compromise. The requested action was to change the bill-to entity on freight invoice #0584162950. The article states that the payload was the text itself, not a malicious file or link.\u003c/p\u003e\n\n\u003ch2 id=\"delivery-through-legitimate-infrastructure\"\u003eDelivery Through Legitimate Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe email originated from Salesforce Email-as-a-Service infrastructure at smtp-0e846264ca9e07764.core1.sfdc-yfeipo.mta.salesforce.com, with IP address 23.23.72.98. The article states that the message was sent through FedEx Freight\u0026rsquo;s own Salesforce CRM instance. It was dispatched via Salesforce Quick Action, a case management feature that lets agents send emails from case records.\u003c/p\u003e\n\n\u003cp\u003eThe X-SFDC-EmailCategory header was set to quickActionEmail. The article also cites a Salesforce entity ID, 500QU00001PKr4X, and a long Salesforce VERP bounce address in the Return-Path as evidence that the message was generated inside a real Salesforce org.\u003c/p\u003e\n\n\u003ch2 id=\"authentication-and-routing\"\u003eAuthentication and Routing\u003c/h2\u003e\n\n\u003cp\u003eThe email passed DKIM with a valid signature aligned to fedexfreight.com. The DKIM selector was sfafxfpr03112026 under d=fedexfreight.com. DMARC passed, and CompAuth returned reason=100.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that this was not an attacker spoofing FedEx Freight. Instead, the message passed through FedEx Freight\u0026rsquo;s actual CRM sending infrastructure and carried a valid cryptographic signature for the FedEx Freight domain.\u003c/p\u003e\n\n\u003cp\u003eAfter leaving Salesforce infrastructure, the email was relayed through a Securence gateway at maild8110391.static.msp.securence.com, with IP address 216.17.3.145. SPF passed at the Securence hop for the Salesforce bounce domain, but the final receiving server recorded an SPF softfail because the Securence relay IP was not in the original sender\u0026rsquo;s SPF record. The article describes this SPF softfail as a known artifact of gateway relaying rather than a detection signal intentionally introduced by the attacker.\u003c/p\u003e\n\n\u003ch2 id=\"payload-and-social-engineering\"\u003ePayload and Social Engineering\u003c/h2\u003e\n\n\u003cp\u003eThe message contained no malicious links and no attachments. The only link noted in the article was the target company\u0026rsquo;s own website. There was nothing for URL reputation tools to check and no attachment to detonate.\u003c/p\u003e\n\n\u003cp\u003eThe operational request was the payload. The email asked the recipient to rebill a freight invoice to a different entity. The article notes that freight invoice adjustments, rebills, and bill-to changes are normal operational traffic in logistics, which made the request resemble legitimate business communication.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eThemis scored the message at 83% confidence with an \u0026ldquo;Invoice Phishing\u0026rdquo; label. Four mailboxes were quarantined. The Securence gateway\u0026rsquo;s Bayesian classifier scored the message at 5.2, which the article describes as an elevated risk signal that did not trigger a block.\u003c/p\u003e\n\n\u003cp\u003eThe article states that detection was driven by behavioral analysis. The relevant pattern was a first-time sender addressing multiple recipients with a financial action request, combined with an invoice modification pattern targeting a logistics company. The technical authentication was clean, and the infrastructure was legitimate.\u003c/p\u003e\n\n\u003ch2 id=\"affected-and-involved-entities\"\u003eAffected and Involved Entities\u003c/h2\u003e\n\n\u003cp\u003eKey organizations and platforms mentioned in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFedEx Freight, whose Salesforce CRM infrastructure was used to send the email.\u003c/li\u003e\n\u003cli\u003eA logistics and distribution company that received the invoice rebill request.\u003c/li\u003e\n\u003cli\u003eSalesforce, whose Email-as-a-Service infrastructure and Quick Action feature were involved in message generation and delivery.\u003c/li\u003e\n\u003cli\u003eSecurence, whose gateway relayed the message and introduced the SPF softfail artifact.\u003c/li\u003e\n\u003cli\u003eIRONSCALES and Themis, which identified and scored the email as invoice phishing.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-listed-in-the-article\"\u003eIndicators Listed in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article provides the following indicators and contextual details:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSender email: coordinator23@fedexfreight.com.\u003c/li\u003e\n\u003cli\u003eSalesforce MTA: smtp-0e846264ca9e07764.core1.sfdc-yfeipo.mta.salesforce.com.\u003c/li\u003e\n\u003cli\u003eSalesforce IP: 23.23.72.98.\u003c/li\u003e\n\u003cli\u003eDKIM selector: sfafxfpr03112026 with d=fedexfreight.com.\u003c/li\u003e\n\u003cli\u003eSalesforce entity: 500QU00001PKr4X.\u003c/li\u003e\n\u003cli\u003eSecurence gateway: maild8110391.static.msp.securence.com.\u003c/li\u003e\n\u003cli\u003eSecurence IP: 216.17.3.145.\u003c/li\u003e\n\u003cli\u003eInvoice number: 0584162950.\u003c/li\u003e\n\u003cli\u003eCase number: 03276500.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping-in-the-article\"\u003eMITRE ATT\u0026amp;CK Mapping in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to the following MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eT1566.002, Phishing: Spearphishing Link, described as targeted email delivered via CRM case management infrastructure.\u003c/li\u003e\n\u003cli\u003eT1586.002, Compromise Accounts: Email Accounts, described as access to a FedEx Freight Salesforce org to send authenticated email.\u003c/li\u003e\n\u003cli\u003eT1656, Impersonation, described as operational role impersonation as a freight coordinator.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommended-watch-point\"\u003eRecommended Watch Point\u003c/h2\u003e\n\n\u003cp\u003eThe article advises that when a freight invoice rebill or bill-to change arrives from a first-time sender, the request should be verified through a known contact at the carrier rather than by replying to the email. It concludes that legitimate CRM infrastructure does not make a request legitimate.\u003c/p\u003e\n","keyPoints":["An attacker used FedEx Freight's Salesforce CRM to send an invoice rebill request to a logistics and distribution company.","The email was dispatched via Salesforce Quick Action, had a valid DKIM signature for fedexfreight.com, passed DMARC, and returned compauth=100.","The message contained no malicious links or attachments, and its payload was a text request to change the bill-to entity on freight invoice #0584162950.","The email was relayed through a Securence gateway, which introduced an SPF softfail because the relay IP was not in the original sender's SPF record.","Themis scored the message at 83% confidence as invoice phishing and four mailboxes were quarantined."],"insights":["Clean authentication results did not indicate legitimacy in this case because the message was sent through FedEx Freight's actual Salesforce infrastructure with a valid domain-aligned DKIM signature.","The SPF softfail was not the attacker’s main evasion or delivery mechanism, but a relay artifact introduced when the message passed through the Securence gateway.","The absence of links and attachments made the email’s social-engineering content itself the payload, limiting the usefulness of URL reputation checks and attachment detonation.","The most actionable anomaly was relational rather than technical: a first-time sender addressed multiple recipients with a financial invoice-change request.","The article recommends verifying freight invoice rebill or bill-to change requests through a known carrier contact instead of replying to the email, even when the email originates from legitimate CRM infrastructure."],"referencedReports":[],"body":"\u003cp\u003eAn attacker used FedEx Freight\u0026rsquo;s Salesforce CRM to send an invoice rebill request to a logistics and distribution company. The email was addressed to three employees and asked for a change to the bill-to entity on freight invoice #0584162950. The article characterizes the event as high-severity invoice fraud and business email compromise.\u003c/p\u003e\n\n\u003cp\u003eThe message was significant because it was sent through FedEx Freight\u0026rsquo;s legitimate CRM infrastructure rather than spoofed infrastructure. It passed DKIM with a signature aligned to fedexfreight.com, passed DMARC, and returned compauth=100. The message contained no malicious links or attachments, making the text of the request itself the payload.\u003c/p\u003e\n\n\u003cp\u003eThe email originated from Salesforce Email-as-a-Service infrastructure and was dispatched via Salesforce Quick Action, as indicated by the X-SFDC-EmailCategory header. It was later relayed through a Securence gateway, which caused an SPF softfail at the final receiving server. Themis flagged the message at 83% confidence as invoice phishing, and four mailboxes were quarantined.\u003c/p\u003e\n"},{"n":6,"title":"Factoring \"short-sleeve\" RSA keys with polynomials","source":"blog.trailofbits.com","sourceColorIdx":6,"link":"https://blog.trailofbits.com/2026/06/12/factoring-short-sleeve-rsa-keys-with-polynomials/","time":"11:00","priority":"SHOULD READ","score":82,"tldr":"Researchers found hundreds of real-world RSA and DSA keys with structured zero-bit patterns that made them quickly recoverable, including keys generated by vulnerable versions of CompleteFTP. The flaw came from a big-integer type mismatch in CompleteFTP’s key generation code, and affected users should check and regenerate their keys.","briefOverview":"\u003cp\u003eTrail of Bits and Hanno Böck of the badkeys project found hundreds of real-world RSA keys whose bits were heavily biased toward 0 and whose private keys could be quickly recovered. The keys showed structured blocks of zero bits, which the researchers call “short-sleeve” patterns because only part of each big-integer limb contained random-looking data. They recovered private keys for 603 unique RSA public keys and 74 DSA keys generated by vulnerable CompleteFTP versions, plus 26 RSA keys with an unidentified short-sleeve pattern.\u003c/p\u003e\n\n\u003cp\u003eThe researchers developed a polynomial-based cryptanalytic technique that exploits the repeated zero-bit structure in RSA moduli. By representing the modulus as a polynomial with small coefficients and factoring that polynomial, they could recover the RSA factors in cases where the private factors had the same short-sleeve structure. This approach does not work against correctly generated RSA keys because their prime factors typically do not produce such small-coefficient polynomials.\u003c/p\u003e\n\n\u003cp\u003eOne identified cause was a type mismatch in old CompleteFTP big-integer key-generation code from EnterpriseDT. The vulnerable function copied 8-bit random values into 32-bit big-integer limbs, leaving large portions of each limb as zeros. EnterpriseDT released CompleteFTP v26.1.0 and a standalone KeyChecker tool to detect vulnerable RSA or DSA keys and alert users to regenerate them.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTrail of Bits, working with Hanno Böck of the badkeys project, identified real-world RSA public keys with unusually sparse moduli and structured blocks of zero bits. These “short-sleeve” keys appeared in two main patterns, both involving regularly spaced zero blocks interleaved with apparently random data. The researchers found that many of these keys could be factored quickly, allowing recovery of corresponding private keys.\u003c/p\u003e\n\n\u003cp\u003eThe analysis was based on a large corpus of public keys collected by badkeys from sources including Certificate Transparency logs, internet-wide TLS and SSH scans, PGP keys, and other public sources. Pattern 1 appeared in Certificate Transparency logs for certificates issued to organizations including Yahoo and Verizon and on some devices running NetApp software, but its underlying cause remains unexplained. Pattern 2 appeared on SSH hosts running EnterpriseDT’s CompleteFTP software.\u003c/p\u003e\n\n\u003cp\u003eThe main technical contribution was a polynomial-based factorization method for RSA moduli with short-sleeve structure. The researchers represented integers using base values corresponding to limb sizes, turning them into polynomials whose coefficients were small when the underlying limbs contained large zero regions. Factoring the polynomial could reveal polynomial representations of the RSA prime factors, which could then be evaluated back into integers to recover the private key.\u003c/p\u003e\n\n\u003cp\u003eFor CompleteFTP, the researchers reverse-engineered the software and found a bug in a big-integer random-bit generation function. The function allocated one byte of random output per 32-bit limb and used Array.Copy in a way that implicitly cast each 8-bit random value into a 32-bit limb, leaving most bits in each limb unset. The article states that RSA keys generated by CompleteFTP versions 10.0.0 through 12.0.0 and DSA keys generated by versions 10.0.0 through 23.0.4 were affected.\u003c/p\u003e\n\n\u003cp\u003eThe researchers recovered private keys for 603 unique RSA public keys and 74 DSA keys generated by vulnerable CompleteFTP versions, as well as 26 RSA keys with the unidentified short-sleeve pattern. EnterpriseDT responded during disclosure and released CompleteFTP v26.1.0, which checks for vulnerable RSA or DSA keys and alerts users if regeneration is needed. EnterpriseDT also released a standalone KeyChecker tool, and badkeys added support for detecting vulnerable short-sleeve RSA keys.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eTrail of Bits and Hanno Böck of the badkeys project investigated RSA public keys whose moduli showed an unusual bias toward zero bits. The researchers found hundreds of unique keys in the wild that not only had detectable zero-bit structure but could also be quickly factored. They refer to these as “short-sleeve” keys because the zero bits do not fully cover the limbs of the big integers; instead, only a small contiguous part of each limb contains random-looking bits.\u003c/p\u003e\n\n\u003cp\u003eThe work combined large-scale public-key discovery, cryptanalysis, and reverse engineering. The researchers identified two recurring short-sleeve patterns in real-world RSA moduli. One pattern remains unexplained, while the other was traced to a type mismatch in old CompleteFTP big-integer key-generation code.\u003c/p\u003e\n\n\u003ch2 id=\"discovery-and-affected-key-patterns\"\u003eDiscovery and affected key patterns\u003c/h2\u003e\n\n\u003cp\u003eThe badkeys project collects public keys from sources such as Certificate Transparency logs, internet-wide TLS and SSH scans, PGP keys, and other public datasets. By searching this dataset for unexpectedly sparse RSA moduli, the researchers found keys with regularly spaced blocks of zeros. These blocks appeared between sections of apparently random data.\u003c/p\u003e\n\n\u003cp\u003eThe article describes two main patterns:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePattern 1 appeared in Certificate Transparency logs for certificates issued to several large organizations, including Yahoo and Verizon, and on some devices running NetApp software.\u003c/li\u003e\n\u003cli\u003ePattern 2 appeared on SSH hosts running EnterpriseDT’s CompleteFTP software.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe certificates associated with Pattern 1 had already expired, and the researchers shared findings with the companies involved. However, they did not identify the product or implementation responsible for generating Pattern 1 keys. Pattern 2 was traced to CompleteFTP.\u003c/p\u003e\n\n\u003ch2 id=\"polynomial-based-rsa-factorization-technique\"\u003ePolynomial-based RSA factorization technique\u003c/h2\u003e\n\n\u003cp\u003eThe researchers exploited the mathematical structure created by repeated zero-bit blocks in big-integer limbs. Big integers are commonly represented as arrays of smaller machine-sized values called limbs. For the observed short-sleeve RSA keys, interpreting the modulus using the relevant limb size revealed that each limb contained a small random-looking region and a larger zero-filled region.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that an integer can be represented as a polynomial by treating the digits in its base-B representation as polynomial coefficients. In this representation, an integer such as a = sum a_i B^i corresponds to a polynomial f_a(x) = sum a_i x^i, and evaluating f_a(B) converts the polynomial back into the integer.\u003c/p\u003e\n\n\u003cp\u003eFor short-sleeve RSA moduli, choosing a base corresponding to the limb size produces polynomials with unusually small coefficients. If the hidden RSA prime factors p and q also have this short-sleeve structure, their polynomial representations can multiply to the polynomial representation of n. Because factoring polynomials over the integers is easy compared with factoring general RSA moduli, this can reveal polynomial forms of p and q, which can then be evaluated back into integer factors.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that this does not break properly generated RSA keys. For correctly generated prime factors, the polynomial coefficients are typically full limb-sized values, so the small-coefficient structure needed for the attack is absent.\u003c/p\u003e\n\n\u003ch2 id=\"completeftp-root-cause\"\u003eCompleteFTP root cause\u003c/h2\u003e\n\n\u003cp\u003eThe researchers reverse-engineered CompleteFTP after observing that the second short-sleeve pattern appeared on SSH hosts running that software. Dynamically generated RSA keys in the latest version did not show the vulnerable pattern, so they decompiled the .NET code with ILSpy and investigated older key-generation logic.\u003c/p\u003e\n\n\u003cp\u003eThey found a vulnerable function called \u003ccode\u003egenRandomBits\u003c/code\u003e that was intended to fill a big integer with random bits of a requested length. The function calculated the number of 32-bit limbs, allocated a byte array of that length, filled that byte array with nonzero random bytes, and copied the array into the big-integer limb array.\u003c/p\u003e\n\n\u003cp\u003eThe bug was a mismatch between the size of the random output and the size of the limbs. Each limb required 32 bits of randomness, but the code generated only one 8-bit value per limb. The \u003ccode\u003eArray.Copy\u003c/code\u003e behavior implicitly cast each 8-bit array element into its own 32-bit limb element, leaving most bits in each limb as zeros.\u003c/p\u003e\n\n\u003cp\u003eThis behavior matched the observed CompleteFTP short-sleeve key pattern. The researchers also determined that the vulnerable function was compiled into newer versions but was unreachable there, because later versions had refactored key generation to use standard .NET cryptographic APIs.\u003c/p\u003e\n\n\u003ch2 id=\"completeftp-rsa-and-dsa-impact\"\u003eCompleteFTP RSA and DSA impact\u003c/h2\u003e\n\n\u003cp\u003eThe article states that CompleteFTP RSA key generation was affected in versions 10.0.0 through 12.0.0, covering December 2016 through March 2019. DSA key generation was affected in versions 10.0.0 through 23.0.4, covering December 2016 through December 2023.\u003c/p\u003e\n\n\u003cp\u003eThe researchers found that DSA key generation also used the vulnerable random-bit function. In that case, the 160-bit DSA private key x was generated with the flawed function, and because the public key and parameters include g and y = g^x, the private key could be recovered using baby-step giant-step. The article notes that Diffie-Hellman key exchange also used the vulnerable function with a 2048-bit exponent, but the researchers believe those DH exchanges are still cryptographically secure.\u003c/p\u003e\n\n\u003cp\u003eIn total, the researchers recovered:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e603 unique RSA private keys generated by vulnerable CompleteFTP versions.\u003c/li\u003e\n\u003cli\u003e74 DSA private keys generated by vulnerable CompleteFTP versions.\u003c/li\u003e\n\u003cli\u003e26 RSA private keys with the unidentified short-sleeve Pattern 1.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that the researchers’ data sources are heavily biased toward RSA SSH keys, so these numbers do not reflect actual prevalence.\u003c/p\u003e\n\n\u003ch2 id=\"historical-trend-and-containment\"\u003eHistorical trend and containment\u003c/h2\u003e\n\n\u003cp\u003eThe researchers used historical and contemporary SSH scan data from Prof. Nadia Heninger’s collection to examine how the CompleteFTP issue changed over time. The data showed a consistent increase in hosts with vulnerable keys after the RSA vulnerability was introduced in December 2016. After CompleteFTP’s rewritten RSA code was released in March 2019, the trend stopped immediately.\u003c/p\u003e\n\n\u003cp\u003eHowever, the proportion of affected keys later plateaued. The article explains this as consistent with customers who update their software regularly but generate host keys only once. This means that even after vulnerable software versions decline, old vulnerable keys can remain deployed.\u003c/p\u003e\n\n\u003cp\u003eEnterpriseDT was described as responsive during disclosure. On May 8, 2026, it released CompleteFTP v26.1.0, which automatically checks whether the system is using a vulnerable RSA or DSA key and alerts the user if regeneration is needed. EnterpriseDT also released a standalone KeyChecker tool, and the badkeys website and standalone tool added detection for vulnerable short-sleeve RSA keys.\u003c/p\u003e\n\n\u003ch2 id=\"other-implementation-issues-mentioned\"\u003eOther implementation issues mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article also mentions a separate CompleteFTP RSA key-generation issue on Linux. In that issue, the private exponent was set to 65537 and the public exponent was large. Trail of Bits disclosed it, and it was fixed in CompleteFTP v26.0.2.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, EnterpriseDT believes no production users were affected by the Linux issue, based on license data. The researchers’ scans supported that claim because they found no keys in the wild with that property.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central finding is that structured randomness failures in cryptographic key generation can produce public keys that are not only detectable at scale but also practically breakable. The short-sleeve structure created by biased big-integer limbs enabled a specialized polynomial factorization technique to recover RSA private keys.\u003c/p\u003e\n\n\u003cp\u003eThe work also shows that similar failures appeared in independent cryptographic implementations. Pattern 1 remains unexplained, and Pattern 2 was traced to CompleteFTP, indicating that this type of implementation mistake may not be isolated to a single product. The article argues that observing real-world cryptographic failures can inspire more capable cryptanalytic algorithms, which in turn can uncover additional vulnerable systems.\u003c/p\u003e\n","keyPoints":["Researchers found hundreds of unique RSA public keys in real-world datasets whose private keys had biased, structured zero-bit patterns and could be quickly factored.","The researchers developed a polynomial-based cryptanalytic technique that exploits regularly spaced zero-bit blocks in RSA moduli to recover the private factors.","One identified source of vulnerable keys was a type mismatch in big-integer code in CompleteFTP, where 8-bit random values were copied into 32-bit big-integer limbs during key generation.","CompleteFTP versions 10.0.0 through 12.0.0 generated vulnerable RSA keys, and versions 10.0.0 through 23.0.4 generated vulnerable DSA keys.","The researchers recovered private keys for 603 unique RSA public keys and 74 DSA keys generated by vulnerable CompleteFTP versions, and EnterpriseDT released updated detection and checking tools."],"insights":["The same class of biased-limb key generation failure appeared in independent RSA implementations, suggesting that scanning for structured zero-bit patterns can uncover additional weak keys beyond the known CompleteFTP cases.","CompleteFTP’s RSA key generation refactor in March 2019 stopped new vulnerable RSA keys from appearing, but many hosts continued using old vulnerable keys after software updates because keys were generated only once.","The public key bit patterns were detectable at internet scale before factoring, enabling projects like badkeys to identify vulnerable short-sleeve RSA keys from public datasets.","The CompleteFTP DSA issue persisted much longer than the RSA issue, affecting DSA keys generated through December 2023 even though RSA generation had been fixed years earlier.","The vulnerable CompleteFTP code remained compiled into newer versions but was unreachable, showing why reverse engineering older versions was necessary to identify the historical key-generation bug."],"referencedReports":[{"title":"Extended Hidden Number Problem and Its Cryptanalytic Applications","url":"https://doi.org/10.1007/978-3-540-74462-7_9","publisher":"Hlaváč and Rosa","context":"The article cites this paper as prior work on exploiting ECDSA nonces with multiple blocks of unknown bits at arbitrary locations.","category":"","primary":false},{"title":"Solving Linear Equations Modulo Divisors: On Factoring Given Any Bits","url":"https://doi.org/10.1007/978-3-540-89255-7","publisher":"Herrmann and May","context":"The article cites this paper as prior work on factoring RSA when one factor has multiple contiguous blocks of unknown bits.","category":"","primary":false},{"title":"Broken SSH RSA signatures","url":"https://eprint.iacr.org/2023/1711","publisher":"IACR Cryptology ePrint Archive","context":"The article references this research while explaining the historical SSH scan dataset used in the short-sleeve key analysis.","category":"","primary":false}],"body":"\u003cp\u003eTrail of Bits and Hanno Böck of the badkeys project found hundreds of real-world RSA keys whose bits were heavily biased toward 0 and whose private keys could be quickly recovered. The keys showed structured blocks of zero bits, which the researchers call “short-sleeve” patterns because only part of each big-integer limb contained random-looking data. They recovered private keys for 603 unique RSA public keys and 74 DSA keys generated by vulnerable CompleteFTP versions, plus 26 RSA keys with an unidentified short-sleeve pattern.\u003c/p\u003e\n\n\u003cp\u003eThe researchers developed a polynomial-based cryptanalytic technique that exploits the repeated zero-bit structure in RSA moduli. By representing the modulus as a polynomial with small coefficients and factoring that polynomial, they could recover the RSA factors in cases where the private factors had the same short-sleeve structure. This approach does not work against correctly generated RSA keys because their prime factors typically do not produce such small-coefficient polynomials.\u003c/p\u003e\n\n\u003cp\u003eOne identified cause was a type mismatch in old CompleteFTP big-integer key-generation code from EnterpriseDT. The vulnerable function copied 8-bit random values into 32-bit big-integer limbs, leaving large portions of each limb as zeros. EnterpriseDT released CompleteFTP v26.1.0 and a standalone KeyChecker tool to detect vulnerable RSA or DSA keys and alert users to regenerate them.\u003c/p\u003e\n"},{"n":2,"title":"Microsoft fixes Windows update failures linked to WUSA installer","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-fixes-windows-update-failures-linked-to-wusa-installer/","time":"11:44","priority":"MAY READ","score":72,"tldr":"Microsoft fixed a Windows Update Standalone Installer (WUSA) issue that caused Windows 11 24H2/25H2 and Windows Server 2025 updates to fail when installed from network shares containing multiple .msu files. The fix is included in the June 2026 cumulative updates, with a workaround to install .msu files locally if using older updates.","briefOverview":"\u003cp\u003eMicrosoft has fixed a known issue that caused Windows updates released since May 2025 to fail when installed via the Windows Update Standalone Installer, or WUSA, from a network share. The problem affected Windows 11 24H2/25H2 and Windows Server 2025 devices on enterprise networks. Microsoft said WUSA is not a common update installation method for home devices.\u003c/p\u003e\n\n\u003cp\u003eThe failure could occur with ERROR_BAD_PATHNAME when an update was installed using WUSA or by double-clicking a .msu file from a network share containing multiple .msu files. Microsoft said the bug did not occur with a single .msu file or when the files were stored locally. The issue affected devices that installed updates released May 28, 2025, KB5058499, and later.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft addressed the issue for all affected systems in the June 2026 Patch Tuesday cumulative updates for Windows 11, KB5079391, and Windows Server 2025, KB5094125. For systems using updates released before the fix, Microsoft said users can work around the issue by saving .msu files locally before installing them. Microsoft also advised waiting 15 minutes or more after restarting Windows before checking the Settings app’s Update History page for the result of a WUSA installation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has fixed a Windows update installation issue tied to the Windows Update Standalone Installer, known as WUSA. The issue caused Windows updates released since May 2025 to fail when installed from a network share. WUSA is a built-in Windows command-line tool used to install and uninstall Microsoft Standalone Update .msu files through the Windows Update Agent API.\u003c/p\u003e\n\n\u003cp\u003eThe known issue affected Windows 11 24H2/25H2 and Windows Server 2025 devices on enterprise networks. Microsoft noted that WUSA is not commonly used to install updates on home devices. The company also said the issue did not occur when only a single .msu file was involved or when update files were stored locally.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the failure could happen with ERROR_BAD_PATHNAME when an update was installed using WUSA or by double-clicking a .msu file from a network share containing multiple .msu files. The issue could occur on devices that had installed updates released May 28, 2025, KB5058499, and later. Microsoft acknowledged the issue in August 2025.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft first mitigated the problem automatically on home and non-managed business devices through a Known Issue Rollback Group Policy beginning in September 2025. The full fix was later delivered in the June 2026 Patch Tuesday cumulative updates. The relevant cumulative updates are KB5079391 for Windows 11 and KB5094125 for Windows Server 2025.\u003c/p\u003e\n\n\u003cp\u003eFor users still using updates released before the fix, Microsoft said the workaround is to save the .msu files locally on the device and install them from that local location. Microsoft also said that after restarting Windows following installation of an .msu file via WUSA, users should wait at least 15 minutes before checking the Update History page in Settings. After that delay, the Settings app should properly show whether the update installed successfully.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes other recent Windows update installation problems Microsoft addressed or warned about. Microsoft resolved an April 2025 issue that prevented enterprise customers from installing April 2025 security updates via Windows Server Update Services, and an identical bug that caused August 2025 Windows 11 updates to fail with 0x80240069 errors. Earlier in the week, Microsoft also warned that some Windows devices upgraded to Windows 11 24H2 or 25H2 may have issues installing the latest monthly updates.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft has fixed a known Windows update installation issue linked to the Windows Update Standalone Installer, or WUSA. The issue caused Windows updates released since May 2025 to fail when installed via WUSA from a network share. The fix was delivered as part of the June 2026 Patch Tuesday cumulative updates.\u003c/p\u003e\n\n\u003cp\u003eWUSA is a built-in Windows command-line tool. It helps administrators install and uninstall Microsoft Standalone Update .msu files through the Windows Update Agent API. The tool is used to deploy or remove patches, updates, and hotfixes.\u003c/p\u003e\n\n\u003ch2 id=\"affected-systems\"\u003eAffected systems\u003c/h2\u003e\n\n\u003cp\u003eThe issue affected enterprise network environments rather than typical home-device update scenarios. Microsoft said WUSA is not a common method for installing updates on home devices.\u003c/p\u003e\n\n\u003cp\u003eAffected platforms included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows 11 24H2\u003c/li\u003e\n\u003cli\u003eWindows 11 25H2\u003c/li\u003e\n\u003cli\u003eWindows Server 2025\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft said the problem could occur on devices that installed updates released May 28, 2025, KB5058499, and later.\u003c/p\u003e\n\n\u003ch2 id=\"failure-conditions-and-technical-details\"\u003eFailure conditions and technical details\u003c/h2\u003e\n\n\u003cp\u003eThe failure was tied to installing updates from a network share under specific conditions. Microsoft said Windows updates installed using WUSA could fail with ERROR_BAD_PATHNAME when the update was installed using WUSA or by double-clicking a .msu file from a network share that contained multiple .msu files.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also stated that the bug did not occur in two cases:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhen using a single .msu file.\u003c/li\u003e\n\u003cli\u003eWhen the update files were stored locally.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis made the issue especially relevant to administrators using network shares to host multiple standalone update packages for enterprise deployment.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-response\"\u003eMicrosoft’s response\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft acknowledged the issue in August 2025. Beginning in September 2025, Microsoft first mitigated the known issue automatically on home and non-managed business devices through a Known Issue Rollback Group Policy.\u003c/p\u003e\n\n\u003cp\u003eThe company later addressed the issue for all affected systems in the June 2026 Patch Tuesday cumulative updates. The fixes were included in:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eKB5079391 for Windows 11.\u003c/li\u003e\n\u003cli\u003eKB5094125 for Windows Server 2025.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"workaround-for-systems-not-yet-updated\"\u003eWorkaround for systems not yet updated\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft provided a workaround for users running updates released before the June 2026 fix. If users experience the issue, Microsoft said they can save the .msu files locally on the device and install the update from that local location.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also gave additional guidance about checking installation status after using WUSA. If Windows has been restarted after installing an .msu file via WUSA, Microsoft said users should wait 15 minutes or more before checking the Update History page in Settings. After that delay, the Settings app should properly indicate whether the update installed successfully.\u003c/p\u003e\n\n\u003ch2 id=\"related-windows-update-issues-mentioned\"\u003eRelated Windows update issues mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article also references other recent Windows update installation problems addressed or disclosed by Microsoft. In April 2025, Microsoft resolved an issue preventing enterprise customers from installing April 2025 security updates through Windows Server Update Services, or WSUS. The article also notes an identical bug that caused August 2025 Windows 11 updates to fail with 0x80240069 errors.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also warned earlier in the same week that some Windows devices upgraded to Windows 11 24H2 or 25H2 may have problems installing the latest monthly updates.\u003c/p\u003e\n\n\u003ch2 id=\"key-impact\"\u003eKey impact\u003c/h2\u003e\n\n\u003cp\u003eThe central impact was failed update installation for affected enterprise systems using WUSA from network shares containing multiple .msu files. The issue applied to Windows 11 24H2/25H2 and Windows Server 2025 devices and was tied to updates released from May 28, 2025, onward. Microsoft’s June 2026 cumulative updates provided the fix, while local installation of .msu files remained the recommended workaround for systems using earlier updates.\u003c/p\u003e\n","keyPoints":["Microsoft has fixed a known issue that caused Windows updates released since May 2025 to fail when installed via the Windows Update Standalone Installer from a network share.","The issue affected Windows 11 24H2/25H2 and Windows Server 2025 devices on enterprise networks, and Microsoft said it did not occur with a single .msu file or when files were stored locally.","The failure could occur with error ERROR_BAD_PATHNAME when WUSA or double-clicking a .msu file was used from a network share containing multiple .msu files.","Microsoft addressed the issue for affected systems in the June 2026 cumulative updates for Windows 11, KB5079391, and Windows Server 2025, KB5094125.","Microsoft said users of updates released before the fix can work around the issue by saving the .msu files locally on the device and installing the update from that location."],"insights":["Administrators can avoid the WUSA failure condition without applying the June 2026 fix by copying .msu files from the network share to the local device before installation.","The bug is narrowly triggered by a network share containing multiple .msu files, so using a single .msu file or local storage changes the outcome according to Microsoft.","After installing an .msu file via WUSA and restarting Windows, administrators should wait at least 15 minutes before relying on the Settings app's Update History page to confirm installation status.","Microsoft's recent update-installation problems affected more than one enterprise deployment path, including WUSA from network shares and Windows Server Update Services installations that failed with 0x80240069 errors."],"referencedReports":[{"title":"KB5079391","url":"https://support.microsoft.com/help/5079391","publisher":"Microsoft","context":"The article cites this Microsoft Windows 11 cumulative update as containing the fix for the WUSA network-share installation issue.","category":"","primary":false},{"title":"KB5094125","url":"https://support.microsoft.com/help/5094125","publisher":"Microsoft","context":"The article cites this Microsoft Windows Server 2025 cumulative update as containing the fix for the WUSA network-share installation issue.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft has fixed a known issue that caused Windows updates released since May 2025 to fail when installed via the Windows Update Standalone Installer, or WUSA, from a network share. The problem affected Windows 11 24H2/25H2 and Windows Server 2025 devices on enterprise networks. Microsoft said WUSA is not a common update installation method for home devices.\u003c/p\u003e\n\n\u003cp\u003eThe failure could occur with ERROR_BAD_PATHNAME when an update was installed using WUSA or by double-clicking a .msu file from a network share containing multiple .msu files. Microsoft said the bug did not occur with a single .msu file or when the files were stored locally. The issue affected devices that installed updates released May 28, 2025, KB5058499, and later.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft addressed the issue for all affected systems in the June 2026 Patch Tuesday cumulative updates for Windows 11, KB5079391, and Windows Server 2025, KB5094125. For systems using updates released before the fix, Microsoft said users can work around the issue by saving .msu files locally before installing them. Microsoft also advised waiting 15 minutes or more after restarting Windows before checking the Settings app’s Update History page for the result of a WUSA installation.\u003c/p\u003e\n"},{"n":3,"title":"Rethinking MDR as Attackers and Defenders Embrace AI","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/rethinking-mdr-as-attackers-and.html","time":"11:00","priority":"MAY READ","score":45,"tldr":"Traditional MDR services are increasingly inadequate against AI-accelerated threats because human triage leaves many low-severity alerts unreviewed, where real incidents can hide. The article argues for AI-driven SOC operations that investigate every alert with consistent forensic depth and escalate only the few cases needing human action.","briefOverview":"\u003cp\u003eThe article argues that traditional managed detection and response is no longer sufficient for a threat landscape where attackers use AI to accelerate phishing, reconnaissance, and malware variation. It says MDR was designed to solve staffing and \u003csup\u003e24\u003c/sup\u003e\u0026frasl;\u003csub\u003e7\u003c/sub\u003e coverage problems, but still depends on human analysts triaging queues. The core concern is that human capacity limits leave large numbers of lower-severity alerts unreviewed.\u003c/p\u003e\n\n\u003cp\u003eThe article cites Intezer platform analysis of 25 million alerts in 2025 and states that about 60% of alerts go unreviewed across the industry. It says real threats can originate in low-severity and informational alerts, creating a blind spot where roughly one real incident per week could sit in a deprioritized queue for a large enterprise with 450,000 annual alerts. It also highlights inconsistent investigation quality, limited customer visibility into MDR decisions, and vendor ownership of detection logic and case history.\u003c/p\u003e\n\n\u003cp\u003eAs an alternative, the article promotes an AI SOC model in which AI performs alert investigation and humans supervise decisions. It says this model can triage endpoint, identity, cloud, network, phishing, and SIEM alerts automatically, apply forensic depth, and escalate only a small minority of cases to humans. The article emphasizes memory forensics, binary analysis, code reuse detection, closed-loop detection engineering, and customer ownership of detection rules and investigation evidence.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article presents a critique of the traditional MDR model, arguing that it was useful when organizations mainly needed around-the-clock staffing and help with alert queues. It says the model has not adapted quickly enough to an environment where attackers use AI for faster reconnaissance, more convincing phishing, and malware variants that evade signature-based detection. It also says the attack surface now spans endpoint, cloud, identity, and network at the same time.\u003c/p\u003e\n\n\u003cp\u003eA major claim is that MDR’s \u003csup\u003e24\u003c/sup\u003e\u0026frasl;\u003csub\u003e7\u003c/sub\u003e promise does not mean all alerts are investigated. The article states that approximately 60% of alerts go unreviewed across the industry because human teams prioritize P1 and P2 alerts while P3 and P4 alerts accumulate. It cites analysis of 25 million alerts across global enterprises in 2025 and says real threats can originate in low-severity and informational alerts.\u003c/p\u003e\n\n\u003cp\u003eThe article describes several operational weaknesses in MDR. It says investigation quality varies based on the analyst on duty, queue depth, time of day, and staffing levels. It also argues that detection engineering is often not a closed loop because analyst findings do not consistently feed back into rule tuning, telemetry fixes, or new detection coverage.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights transparency and ownership concerns. It says many MDR services operate as a black box where customers receive escalations and summaries but cannot inspect investigation logic, evidence trails, or analyst reasoning. It argues that detection rules, triage logic, case history, and investigation learnings often remain inside the MDR vendor’s platform, creating switching costs and limiting an organization’s ability to build AI-enabled security operations using tools such as Claude.\u003c/p\u003e\n\n\u003cp\u003eThe article proposes an AI SOC operating model in which AI investigates every alert and humans supervise decisions. It says Intezer’s platform data across 25 million alerts showed less than 2% of alerts required human escalation, with more than 98% resolved autonomously, sub-minute median triage time, and 98% verdict accuracy. It says trustworthy AI autonomy depends on forensic-level investigation, including memory forensics, binary analysis, and code reuse detection, rather than only alert summarization or threat intelligence enrichment.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that organizations may not need to replace MDR immediately but can augment an existing MDR contract with AI investigation and compare results before renewal. It argues that security leaders should evaluate how many unreviewed alerts may contain real threats. Its central message is that AI-era security operations require full alert coverage, forensic depth, closed-loop detection engineering, transparent evidence, and customer ownership of accumulated security knowledge.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that managed detection and response was designed for a period when organizations mainly needed \u003csup\u003e
