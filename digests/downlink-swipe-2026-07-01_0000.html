<script type="application/json" id="dl-articles">[{"n":2,"title":"Over 900 Oracle E-Business instances exposed to ongoing attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/over-900-oracle-e-business-instances-exposed-to-ongoing-attacks/","time":"12:30","priority":"MUST READ","score":95,"tldr":"Over 900 Oracle E-Business Suite instances are exposed online as attackers actively exploit CVE-2026-46817, a critical unauthenticated HTTP takeover flaw in Oracle Payments. Oracle patched the issue in its May 2026 update and is urging customers to apply fixes immediately.","briefOverview":"\u003cp\u003eOver 900 Oracle E-Business Suite instances have been found exposed online amid ongoing attacks exploiting CVE-2026-46817. The flaw affects the File Transmission component of the Oracle Payments product and allows unauthenticated attackers with HTTP network access to take over vulnerable systems through low-complexity attacks. Oracle patched the issue in its May 2026 Critical Security Patch Update and urged customers to patch immediately.\u003c/p\u003e\n\n\u003cp\u003eDefused warned that attackers are actively exploiting CVE-2026-46817, with the first attempts observed over the weekend against Oracle E-Business honeypots. The company said the vulnerability had no known previous exploitation and no public proof-of-concept code. Shadowserver also warned that it tracks around 950 Oracle E-Business Suite instances exposed online, though it is not known how many have been secured against this flaw.\u003c/p\u003e\n\n\u003cp\u003eThe article places the activity in the context of recent Oracle-related exploitation. It notes that CISA recently tagged an Oracle WebLogic Server flaw as actively exploited, Oracle mitigated a PeopleSoft Suite zero-day exploited by ShinyHunters, and Clop has exploited another Oracle E-Business Suite flaw in attacks since early August 2025. CISA has added 44 vulnerabilities across Oracle products to its catalog of actively exploited flaws since November 2021, including 13 abused by ransomware gangs.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Over 900 Oracle E-Business Suite instances have been found exposed online amid ongoing attacks exploiting CVE-2026-46817.","CVE-2026-46817 affects the File Transmission component of Oracle Payments in Oracle E-Business Suite and allows unauthenticated attackers with HTTP network access to take over vulnerable systems through low-complexity attacks.","Oracle patched CVE-2026-46817 in its May 2026 Critical Security Patch Update and urged customers to patch their systems immediately.","Defused said it observed exploitation attempts against Oracle E-Business honeypots over the weekend and noted that there was no known previous exploitation or public proof-of-concept code.","Shadowserver reported tracking around 950 Oracle E-Business Suite instances exposed online, but the article says it is unknown how many have been secured against CVE-2026-46817."],"insights":["Defused reported exploitation even though it said there was no public proof-of-concept code and no known previous exploitation, showing that attackers had operationalized the flaw before public exploit details were available.","Oracle had already patched CVE-2026-46817 in May 2026, so the ongoing exposure of around 950 internet-facing Oracle E-Business Suite instances highlights a gap between patch availability and real-world remediation.","Oracle has not yet flagged CVE-2026-46817 as exploited in attacks, but two independent security organizations, Defused and Shadowserver, have issued warnings tied to exploitation activity and exposed instances.","The article places CVE-2026-46817 in a broader pattern of recent Oracle-related exploitation, including PeopleSoft attacks by ShinyHunters and Oracle E-Business Suite attacks by Clop against universities and major organizations."],"referencedReports":[{"title":"May 2026 Critical Security Patch Update","url":"https://www.oracle.com/security-alerts/cspumay2026.html","publisher":"Oracle","context":"The article says Oracle patched CVE-2026-46817 in security updates released as part of this Critical Security Patch Update and urged customers to patch immediately.","category":"advisory","primary":false},{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?search=\u0026field_date_added_wrapper=all\u0026field_cve=\u0026sort_by=field_date_added\u0026items_per_page=All\u0026url=\u0026f%5B0%5D=vendor_project%3A827","publisher":"CISA","context":"The article references CISA's catalog to state that 44 vulnerabilities across Oracle products have been added as actively exploited flaws since November 2021.","category":"advisory","primary":false}],"body":"\u003cp\u003eOver 900 Oracle E-Business Suite instances have been found exposed online amid ongoing attacks exploiting CVE-2026-46817. The flaw affects the File Transmission component of the Oracle Payments product and allows unauthenticated attackers with HTTP network access to take over vulnerable systems through low-complexity attacks. Oracle patched the issue in its May 2026 Critical Security Patch Update and urged customers to patch immediately.\u003c/p\u003e\n\n\u003cp\u003eDefused warned that attackers are actively exploiting CVE-2026-46817, with the first attempts observed over the weekend against Oracle E-Business honeypots. The company said the vulnerability had no known previous exploitation and no public proof-of-concept code. Shadowserver also warned that it tracks around 950 Oracle E-Business Suite instances exposed online, though it is not known how many have been secured against this flaw.\u003c/p\u003e\n\n\u003cp\u003eThe article places the activity in the context of recent Oracle-related exploitation. It notes that CISA recently tagged an Oracle WebLogic Server flaw as actively exploited, Oracle mitigated a PeopleSoft Suite zero-day exploited by ShinyHunters, and Clop has exploited another Oracle E-Business Suite flaw in attacks since early August 2025. CISA has added 44 vulnerabilities across Oracle products to its catalog of actively exploited flaws since November 2021, including 13 abused by ransomware gangs.\u003c/p\u003e\n"},{"n":5,"title":"FortiBleed credential-theft campaign linked to Lynx ransomware","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/fortibleed-credential-theft-campaign-linked-to-lynx-ransomware/","time":"21:37","priority":"MUST READ","score":94,"tldr":"Researchers linked the FortiBleed credential-theft campaign, which stole credentials from tens of thousands of Fortinet devices, to the INC and Lynx ransomware operations. The findings suggest the stolen FortiGate access was being used to support future ransomware intrusions.","briefOverview":"\u003cp\u003eThe FortiBleed credential-theft campaign has been linked to the INC and Lynx ransomware operations, suggesting stolen Fortinet credentials were intended to support future network intrusions. The campaign came to light after a server exposed on the internet was found containing credentials stolen from more than 73,000 Fortinet devices. Researchers found downloaded FortiGate configuration files, harvested credentials, and infrastructure used to crack password hashes and perform credential-stuffing attacks.\u003c/p\u003e\n\n\u003cp\u003eSOCRadar said its Threat Research Unit tied the operation to INC and Lynx after identifying a Windows server used in the FortiBleed infrastructure. The company said artifacts on that server showed the threat actor had accessed ransomware negotiation panels for both Lynx and INC, including dashboards with victim chats used during negotiations. SOCRadar also reported overlaps between victim information harvested during FortiBleed and organizations later listed on the INC ransomware leak site.\u003c/p\u003e\n\n\u003cp\u003eThe campaign used a custom tool called “FortiGate Sniffer” on compromised FortiGate firewalls to intercept VPN credentials and other authentication data from network traffic. SOCRadar said the operation targeted more than 430,000 FortiGate firewalls worldwide, deployed traffic sniffers on about 19,000 devices, and still had around 11,000 compromised devices after impacted organizations were notified. The researchers also said they identified roughly 500 servers used by the operation, persistent backdoor accounts named “adminin,” and evidence suggesting the attackers exploited a previously undisclosed Nextcloud zero-day vulnerability.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["SOCRadar linked the FortiBleed credential-theft campaign to members of the INC and Lynx ransomware-as-a-service groups after analyzing a Windows server used in the campaign’s infrastructure.","Researchers found that the FortiBleed operation used a custom tool called “FortiGate Sniffer” on compromised FortiGate firewalls to intercept VPN credentials and other authentication data from network traffic.","SOCRadar said the campaign targeted more than 430,000 FortiGate firewalls worldwide and deployed traffic sniffers on about 19,000 devices, with roughly 11,000 devices still compromised after notifications.","The investigation identified more than 200 additional operational servers beyond those originally associated with the campaign and roughly 500 servers used by the operation overall.","SOCRadar said it found persistent backdoor accounts using the username “adminin” on compromised systems and evidence suggesting the attackers exploited a previously undisclosed Nextcloud zero-day vulnerability."],"insights":["The link to INC and Lynx was based on browser sessions from FortiBleed infrastructure accessing both ransomware groups’ negotiation panels, which ties the credential-theft operation to ransomware activity beyond just possession of stolen Fortinet data.","SOCRadar said the number of compromised devices dropped from about 19,000 to around 11,000 after impacted organizations were notified, indicating that notification and remediation efforts had a measurable effect.","The reported overlap between FortiBleed-harvested victim information and organizations later listed on the INC ransomware leak site suggests the stolen Fortinet credentials were not only collected at scale but also connected to later extortion activity.","The discovery of persistent backdoor accounts using the username “adminin” gives defenders a concrete artifact to check for on compromised systems mentioned in the investigation.","SOCRadar’s finding of more than 200 additional operational servers and roughly 500 servers overall shows the campaign’s infrastructure was far larger than initially understood."],"referencedReports":[{"title":"FortiBleed INC Lynx Ransomware Link","url":"https://socradar.io/blog/fortibleed-inc-lynx-ransomware-link/","publisher":"SOCRadar Threat Research Unit","context":"The article says SOCRadar’s latest research ties the FortiBleed credential-theft operation directly to members of the INC and Lynx ransomware-as-a-service groups.","category":"research","primary":true},{"title":"INC Ransomware Rebrand to Lynx","url":"https://unit42.paloaltonetworks.com/inc-ransomware-rebrand-to-lynx/","publisher":"Palo Alto Networks Unit 42","context":"The article cites security researchers’ belief that Lynx is a rebrand of the INC ransomware gang rather than a new extortion group.","category":"research","primary":false}],"body":"\u003cp\u003eThe FortiBleed credential-theft campaign has been linked to the INC and Lynx ransomware operations, suggesting stolen Fortinet credentials were intended to support future network intrusions. The campaign came to light after a server exposed on the internet was found containing credentials stolen from more than 73,000 Fortinet devices. Researchers found downloaded FortiGate configuration files, harvested credentials, and infrastructure used to crack password hashes and perform credential-stuffing attacks.\u003c/p\u003e\n\n\u003cp\u003eSOCRadar said its Threat Research Unit tied the operation to INC and Lynx after identifying a Windows server used in the FortiBleed infrastructure. The company said artifacts on that server showed the threat actor had accessed ransomware negotiation panels for both Lynx and INC, including dashboards with victim chats used during negotiations. SOCRadar also reported overlaps between victim information harvested during FortiBleed and organizations later listed on the INC ransomware leak site.\u003c/p\u003e\n\n\u003cp\u003eThe campaign used a custom tool called “FortiGate Sniffer” on compromised FortiGate firewalls to intercept VPN credentials and other authentication data from network traffic. SOCRadar said the operation targeted more than 430,000 FortiGate firewalls worldwide, deployed traffic sniffers on about 19,000 devices, and still had around 11,000 compromised devices after impacted organizations were notified. The researchers also said they identified roughly 500 servers used by the operation, persistent backdoor accounts named “adminin,” and evidence suggesting the attackers exploited a previously undisclosed Nextcloud zero-day vulnerability.\u003c/p\u003e\n"},{"n":28,"title":"Progress Kemp LoadMaster Pre-Auth RCE Flaw Faces Active Exploitation Attempts","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/latest-progress-kemp-loadmaster-pre.html","time":"13:56","priority":"MUST READ","score":94,"tldr":"Progress Kemp LoadMaster’s critical pre-auth command injection flaw CVE-2026-8037 is now seeing active exploitation attempts, though observed attacks have reportedly failed so far. With PoC details available, exposed appliances should be patched urgently.","briefOverview":"\u003cp\u003eA critical security flaw affecting Progress Kemp LoadMaster is seeing active exploitation attempts, according to an advisory from eSentire\u0026rsquo;s Threat Response Unit. The vulnerability, tracked as CVE-2026-8037, has a CVSS score of 9.6 and is described as an operating system command injection flaw. eSentire said exploitation activity began on June 29, 2026, and observed attempts came from three listed IP addresses.\u003c/p\u003e\n\n\u003cp\u003eProgress said the flaw affects the LoadMaster API and allows an unauthenticated attacker with permissions to execute arbitrary commands by exploiting unsanitized input. watchTowr Labs described the issue as rooted in the escape_quotes() function, which failed to properly null-terminate sanitized strings and caused an out-of-bounds read into adjacent heap memory. The article says attackers could use specially crafted requests to the /accessv2 endpoint to manipulate heap memory and enable command injection.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation could allow an unauthenticated attacker to run arbitrary commands on a vulnerable LoadMaster appliance without valid credentials. eSentire noted that the exploitation attempts it observed failed, so no post-compromise activity occurred. The article warns that the availability of a proof-of-concept exploit and detailed technical information is expected to drive malicious activity against CVE-2026-8037 in the immediate future.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["eSentire's Threat Response Unit reported active exploitation attempts targeting CVE-2026-8037, a critical Progress Kemp LoadMaster vulnerability, beginning on June 29, 2026.","CVE-2026-8037 is an operating system command injection flaw with a CVSS score of 9.6 that can allow an unauthenticated attacker to execute arbitrary commands on susceptible LoadMaster appliances.","Progress said the vulnerability exists in the LoadMaster API and is caused by unsanitized input that can be exploited by an unauthenticated attacker with permissions to execute arbitrary commands.","watchTowr Labs analyzed the flaw as involving improper null-termination in the escape_quotes() function, enabling specially crafted requests to the /accessv2 endpoint to manipulate heap memory and achieve command injection.","eSentire said the exploitation attempts it observed failed and produced no post-compromise activity, but warned that the availability of a proof-of-concept exploit and technical details is expected to drive further malicious activity."],"insights":["The article provides three source IP addresses tied to observed exploitation attempts, giving defenders concrete indicators to check in logs: 192.42.116[.]58, 192.42.116[.]105, and 146.70.139[.]154.","The /accessv2 endpoint is specifically identified as part of the exploit path, making requests to that endpoint a notable focus for investigation on exposed LoadMaster appliances.","The flaw is not only a simple input-filtering issue; watchTowr Labs linked it to improper null-termination in escape_quotes(), which can cause an out-of-bounds read into adjacent heap memory before command injection becomes possible.","This is the second Progress Kemp LoadMaster operating system command injection flaw cited in the article as facing active exploitation efforts, following CVE-2024-1212."],"referencedReports":[{"title":"Progress Kemp LoadMaster Vulnerability Targeted: CVE-2026-8037","url":"https://www.esentire.com/security-advisories/progress-kemp-loadmaster-vulnerability-targeted-cve-2026-8037","publisher":"eSentire Threat Response Unit","context":"The article cites eSentire's advisory as the source reporting active exploitation attempts against CVE-2026-8037.","category":"advisory","primary":true},{"title":"LoadMaster Critical Security Bulletin June 2026 CVE-2026-8037 CVE-2026-33691","url":"https://community.progress.com/s/article/LoadMaster-Critical-Security-Bulletin-June-2026-CVE-2026-8037-CVE-2026-33691","publisher":"Progress","context":"The article quotes Progress's advisory describing the unauthenticated command injection vulnerability in the LoadMaster API.","category":"advisory","primary":false},{"title":"Progress Kemp LoadMaster Flaw Could Let Attackers Execute Arbitrary Commands","url":"https://thehackernews.com/2026/06/progress-kemp-loadmaster-flaw-could-let.html","publisher":"watchTowr Labs","context":"The article references a technical analysis by watchTowr Labs explaining the escape_quotes() flaw and how crafted requests to /accessv2 can enable command injection.","category":"research","primary":false}],"body":"\u003cp\u003eA critical security flaw affecting Progress Kemp LoadMaster is seeing active exploitation attempts, according to an advisory from eSentire\u0026rsquo;s Threat Response Unit. The vulnerability, tracked as CVE-2026-8037, has a CVSS score of 9.6 and is described as an operating system command injection flaw. eSentire said exploitation activity began on June 29, 2026, and observed attempts came from three listed IP addresses.\u003c/p\u003e\n\n\u003cp\u003eProgress said the flaw affects the LoadMaster API and allows an unauthenticated attacker with permissions to execute arbitrary commands by exploiting unsanitized input. watchTowr Labs described the issue as rooted in the escape_quotes() function, which failed to properly null-terminate sanitized strings and caused an out-of-bounds read into adjacent heap memory. The article says attackers could use specially crafted requests to the /accessv2 endpoint to manipulate heap memory and enable command injection.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation could allow an unauthenticated attacker to run arbitrary commands on a vulnerable LoadMaster appliance without valid credentials. eSentire noted that the exploitation attempts it observed failed, so no post-compromise activity occurred. The article warns that the availability of a proof-of-concept exploit and detailed technical information is expected to drive malicious activity against CVE-2026-8037 in the immediate future.\u003c/p\u003e\n"},{"n":41,"title":"PolinRider: North Korea-Linked Supply Chain Campaign Expands Across Open Source Ecosystems","source":"socket.dev","sourceColorIdx":2,"link":"https://socket.dev/blog/polinrider-north-korea-linked-supply-chain-campaign-expands?utm_medium=feed","time":"17:53","priority":"MUST READ","score":94,"tldr":"Socket researchers found the North Korea-linked PolinRider supply chain campaign has expanded beyond npm into Packagist, Go modules, and Chrome extensions, with 162 malicious artifacts across 108 packages and extensions. The campaign compromises legitimate repositories, hides JavaScript loaders in config files or fake font files, and can deliver malware such as DEV#POPPER and OmniStealer, so affected developer environments should be treated as compromised.","briefOverview":"\u003cp\u003eSocket Threat Research Team identified 162 malicious release artifacts across 108 packages and extensions linked to PolinRider, a supply chain campaign associated with North Korean threat actors and the broader Contagious Interview / Famous Chollima activity cluster. The campaign has expanded beyond npm into Packagist, Go modules, and Chrome extensions, with compromise traces in 80 Go modules, 10 Packagist packages, and one Chrome extension. Socket says the campaign remains active and that new malicious packages are likely to continue appearing as threat actors compromise maintainer accounts, modify legitimate repositories, and publish infected versions where they have registry access.\u003c/p\u003e\n\n\u003cp\u003eThe campaign’s core methods include planting obfuscated JavaScript loaders in legitimate repositories, hiding code through whitespace padding or fake \u003ccode\u003e.woff2\u003c/code\u003e font files, and triggering execution through developer tooling such as VS Code task files. The threat actors also use Git history rewriting, including force pushes and anti-dated commits, to make malicious changes appear older and less suspicious. The article highlights examples involving the Xpos587 GitHub account and the 7span organization, where visible repository history could appear benign while GitHub Activity logs showed signs of later modification.\u003c/p\u003e\n\n\u003cp\u003eOnce deobfuscated, the loader reaches out to blockchain and public RPC infrastructure, including TRON, Aptos, and BNB Smart Chain services, retrieves encrypted second-stage payload material, decrypts it with embedded XOR keys, and executes it with \u003ccode\u003eeval()\u003c/code\u003e. Observed payloads include DEV#POPPER and OmniStealer, but the article says the loader-based design should be treated as capable of delivering additional malware. Teams that installed affected package or extension versions are advised to treat the environment as compromised, preserve forensic artifacts, rebuild from known-good lockfiles, rotate exposed secrets from a clean machine, and audit developer workstations and repositories for hidden execution paths.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Socket Threat Research Team identified 162 malicious release artifacts across 108 unique packages and extensions in npm, Packagist, Go modules, and Chrome extensions linked to the North Korea-associated PolinRider campaign.","PolinRider threat actors compromise legitimate GitHub repositories, plant obfuscated JavaScript loaders, and use Git history rewriting, force pushes, and anti-dated commits to make malicious changes appear older and less suspicious.","Observed PolinRider payloads are hidden either in configuration files such as vite.config.js or in fake .woff2 font files that can be executed through VS Code task files configured to run when a folder opens.","After deobfuscation, the loader contacts blockchain and public RPC infrastructure including TRON, Aptos, and BNB Smart Chain services, retrieves encrypted second-stage payload material, decrypts it with embedded XOR keys, and executes it with eval().","The article advises teams that installed affected package or extension versions to treat the environment as compromised, preserve forensic artifacts, rebuild from known-good lockfiles, rotate exposed secrets from a clean machine, and audit developer machines and repositories for hidden execution paths."],"insights":["Visible GitHub commit history is not reliable for this campaign because the attackers used force pushes and anti-dated commits, so defenders need to review GitHub Activity logs and package release metadata instead of trusting the repository landing page.","Partial cleanup can leave an organization exposed because 7span maintainers removed fake .woff2 payloads but some obfuscated JavaScript hidden in configuration files remained present.","Registry impact depends on which credentials the attackers obtained, as the article observed malicious Go module releases from Xpos587 but no malicious PyPI releases from that maintainer and no corresponding malicious npm releases from 7span.","VS Code folder-open tasks are a high-value audit target because PolinRider can turn files that appear to be static font assets into code execution paths by running fake .woff2 files with Node.js."],"referencedReports":[{"title":"North Korean APT Malware Analysis: DEV#POPPER RAT and OmniStealer: Everyday I’m Shufflin","url":"https://www.esentire.com/blog/north-korean-apt-malware-analysis-dev-popper-rat-and-omnistealer-everyday-im-shufflin","publisher":"eSentire","context":"The article cites this analysis when describing observed follow-on payloads including DEV#POPPER and OmniStealer and their capabilities.","category":"research","primary":false}],"body":"\u003cp\u003eSocket Threat Research Team identified 162 malicious release artifacts across 108 packages and extensions linked to PolinRider, a supply chain campaign associated with North Korean threat actors and the broader Contagious Interview / Famous Chollima activity cluster. The campaign has expanded beyond npm into Packagist, Go modules, and Chrome extensions, with compromise traces in 80 Go modules, 10 Packagist packages, and one Chrome extension. Socket says the campaign remains active and that new malicious packages are likely to continue appearing as threat actors compromise maintainer accounts, modify legitimate repositories, and publish infected versions where they have registry access.\u003c/p\u003e\n\n\u003cp\u003eThe campaign’s core methods include planting obfuscated JavaScript loaders in legitimate repositories, hiding code through whitespace padding or fake \u003ccode\u003e.woff2\u003c/code\u003e font files, and triggering execution through developer tooling such as VS Code task files. The threat actors also use Git history rewriting, including force pushes and anti-dated commits, to make malicious changes appear older and less suspicious. The article highlights examples involving the Xpos587 GitHub account and the 7span organization, where visible repository history could appear benign while GitHub Activity logs showed signs of later modification.\u003c/p\u003e\n\n\u003cp\u003eOnce deobfuscated, the loader reaches out to blockchain and public RPC infrastructure, including TRON, Aptos, and BNB Smart Chain services, retrieves encrypted second-stage payload material, decrypts it with embedded XOR keys, and executes it with \u003ccode\u003eeval()\u003c/code\u003e. Observed payloads include DEV#POPPER and OmniStealer, but the article says the loader-based design should be treated as capable of delivering additional malware. Teams that installed affected package or extension versions are advised to treat the environment as compromised, preserve forensic artifacts, rebuild from known-good lockfiles, rotate exposed secrets from a clean machine, and audit developer workstations and repositories for hidden execution paths.\u003c/p\u003e\n"},{"n":26,"title":"Adobe Patches 7 CVSS 10.0 Flaws in ColdFusion and Campaign Classic","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/adobe-patches-7-cvss-100-flaws-in.html","time":"15:25","priority":"MUST READ","score":93,"tldr":"Adobe released urgent patches for multiple critical flaws in ColdFusion and Adobe Campaign Classic, including seven CVSS 10.0 vulnerabilities that could allow arbitrary code execution. The company says there is no evidence of exploitation in the wild, but affected on-premise systems should be updated immediately.","briefOverview":"\u003cp\u003eAdobe released patches for multiple maximum-severity security flaws affecting Adobe ColdFusion and Adobe Campaign Classic. The ColdFusion updates address critical and important vulnerabilities that could lead to arbitrary code execution, privilege escalation, arbitrary file system read, and security feature bypass. The issues were fixed in ColdFusion 2023 Update 21 and ColdFusion 2025 Update 10.\u003c/p\u003e\n\n\u003cp\u003eThe ColdFusion flaws include CVE-2026-48276 and CVE-2026-48283, which involve unrestricted upload of files with dangerous types and have CVSS scores of 10.0. Other CVSS 10.0 ColdFusion issues include improper input validation vulnerabilities tracked as CVE-2026-48277, CVE-2026-48281, and CVE-2026-48316, as well as a path traversal vulnerability tracked as CVE-2026-48282. Adobe also fixed CVE-2026-48313, a path traversal issue that could allow arbitrary file system read, and CVE-2026-48315, an improper input validation issue that could lead to privilege escalation.\u003c/p\u003e\n\n\u003cp\u003eAdobe also patched CVE-2026-48286 in Adobe Campaign Classic, a CVSS 10.0 incorrect authorization flaw that could allow arbitrary code execution. The issue affects ACC v7 version 7.4.3 build 9396 and earlier on Windows and Linux, but only for on-premise instances and on-premise components in hybrid deployments; Adobe-hosted instances have already been updated. Adobe said it has not found any exploits in the wild for the issues, and it also announced plans to publish security bulletins twice monthly starting July 14, 2026, citing accelerated vulnerability discovery using AI models.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Adobe released patches for multiple maximum-severity security flaws affecting Adobe ColdFusion and Adobe Campaign Classic.","The ColdFusion update fixes critical and important issues that could lead to arbitrary code execution, privilege escalation, arbitrary file system read, and security feature bypass.","ColdFusion flaws addressed include several CVSS 10.0 vulnerabilities involving unrestricted file upload, improper input validation, and path traversal.","Adobe Campaign Classic flaw CVE-2026-48286 has a CVSS score of 10.0 and affects on-premise ACC v7 version 7.4.3 build 9396 and earlier on Windows and Linux.","Adobe said it has not found any exploits in the wild for the issues addressed in these updates."],"insights":["Adobe Campaign Classic exposure is limited to on-premise deployments and on-premise components in hybrid deployments, while Adobe-hosted instances have already been updated and require no action.","Adobe is moving from monthly to twice-monthly security bulletins starting July 14, 2026, because it says AI-accelerated vulnerability discovery is compressing the time between public disclosure and active exploitation from days to hours.","The ColdFusion update is especially urgent because it fixes multiple separate CVSS 10.0 paths to arbitrary code execution, including dangerous file uploads, improper input validation, and path traversal.","Although Adobe reported no known exploitation in the wild, its own stated concern about faster exploitation after disclosure makes prompt patching particularly actionable for affected ColdFusion and on-premise Campaign Classic users."],"referencedReports":[{"title":"Adobe ColdFusion Security Update APSB26-68","url":"https://helpx.adobe.com/security/products/coldfusion/apsb26-68.html","publisher":"Adobe","context":"The article cites Adobe's ColdFusion security advisory as the source for the listed vulnerabilities and fixed versions.","category":"advisory","primary":true},{"title":"Adobe Campaign Classic Security Update APSB26-69","url":"https://helpx.adobe.com/security/products/campaign/apsb26-69.html","publisher":"Adobe","context":"The article cites Adobe's Campaign Classic security advisory for details on CVE-2026-48286 and the patched ACC v7 build.","category":"advisory","primary":true}],"body":"\u003cp\u003eAdobe released patches for multiple maximum-severity security flaws affecting Adobe ColdFusion and Adobe Campaign Classic. The ColdFusion updates address critical and important vulnerabilities that could lead to arbitrary code execution, privilege escalation, arbitrary file system read, and security feature bypass. The issues were fixed in ColdFusion 2023 Update 21 and ColdFusion 2025 Update 10.\u003c/p\u003e\n\n\u003cp\u003eThe ColdFusion flaws include CVE-2026-48276 and CVE-2026-48283, which involve unrestricted upload of files with dangerous types and have CVSS scores of 10.0. Other CVSS 10.0 ColdFusion issues include improper input validation vulnerabilities tracked as CVE-2026-48277, CVE-2026-48281, and CVE-2026-48316, as well as a path traversal vulnerability tracked as CVE-2026-48282. Adobe also fixed CVE-2026-48313, a path traversal issue that could allow arbitrary file system read, and CVE-2026-48315, an improper input validation issue that could lead to privilege escalation.\u003c/p\u003e\n\n\u003cp\u003eAdobe also patched CVE-2026-48286 in Adobe Campaign Classic, a CVSS 10.0 incorrect authorization flaw that could allow arbitrary code execution. The issue affects ACC v7 version 7.4.3 build 9396 and earlier on Windows and Linux, but only for on-premise instances and on-premise components in hybrid deployments; Adobe-hosted instances have already been updated. Adobe said it has not found any exploits in the wild for the issues, and it also announced plans to publish security bulletins twice monthly starting July 14, 2026, citing accelerated vulnerability discovery using AI models.\u003c/p\u003e\n"},{"n":22,"title":"Critical Cursor Flaws Could Let Prompt Injection Escape Sandbox and Run Commands","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/critical-cursor-flaws-could-let-prompt.html","time":"14:42","priority":"MUST READ","score":92,"tldr":"Two critical Cursor flaws dubbed DuneSlide could let hidden prompt-injection instructions escape the editor’s sandbox and run commands on a developer’s machine without any user approval. The issues affect all versions before Cursor 3.0, so users should update immediately.","briefOverview":"\u003cp\u003eCato AI Labs found two critical flaws in Cursor, an AI code editor, that could let a single ordinary-looking prompt escape the editor’s sandbox and run commands on a developer’s computer. The flaws are named DuneSlide and tracked as CVE-2026-50548 and CVE-2026-50549, both rated 9.8 under CVSS 3.1 or 9.3 under CVSS 4.0. All Cursor versions before 3.0 are affected, and Cursor 3.0, released April 2, includes fixes.\u003c/p\u003e\n\n\u003cp\u003eThe attack works through prompt injection, where hidden instructions are planted in something the Cursor agent reads, such as a connected Model Context Protocol service or a web search result. The article describes the attack as zero-click because it requires no user approval or click. Both flaws use the same general approach: get the agent to write a file it should not be allowed to write, then use that write to turn off the sandbox.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-50548 abuses Cursor’s \u003ccode\u003eworking_directory\u003c/code\u003e parameter to add an attacker-chosen path to the allowed-write list, while CVE-2026-50549 abuses a failed symlink safety check that falls back to trusting an in-project path. In both cases, the attacker can target files such as Cursor’s sandbox helper, so later commands run without sandbox restrictions. The article says there is no sign the flaws have been used in real attacks, but successful exploitation could give control of the developer’s machine and any cloud or SaaS workspaces the editor is signed into.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Cato AI Labs found two critical flaws in Cursor, named DuneSlide and tracked as CVE-2026-50548 and CVE-2026-50549, that could let a prompt injection escape the editor’s sandbox and run commands on a developer’s computer.","Both vulnerabilities affect every Cursor version before 3.0, and Cursor 3.0, released April 2, includes fixes for both issues.","The attack can be triggered by hidden instructions inside content the Cursor agent reads, such as a connected Model Context Protocol service or a web search result, without requiring a user click or approval.","CVE-2026-50548 abuses Cursor’s working_directory parameter to add an attacker-chosen path to the allowed-write list, while CVE-2026-50549 abuses a symlink safety-check fallback that can trust an in-project path when destination verification fails.","Once the sandbox is neutralized, later commands can run as the user, potentially giving control of the developer’s machine and any cloud or SaaS workspaces the editor is signed into."],"insights":["The flaws show that Cursor’s 2.x sandbox, which was introduced as a defense after earlier prompt-to-command-execution bugs, could itself be bypassed by getting the agent to write a single unauthorized file.","The attack path did not require a malicious user to type into Cursor directly, because the hidden instructions could be planted in external content the agent reads on the user’s behalf, such as an MCP-connected service or web search result.","Cursor initially rejected Cato’s reports because it said misuse of MCP servers was outside its threat model, but later reopened the reports, triaged them, and shipped fixes in Cursor 3.0.","The article notes a recurring pattern across multiple Cursor issues in which poisoned prompts defeat different guardrails, suggesting that patching individual bugs has not eliminated the broader risk for coding agents that read external content."],"referencedReports":[{"title":"DuneSlide: Two Critical RCE Vulnerabilities","url":"https://www.catonetworks.com/blog/duneslide-two-critical-rce-vulnerabilities/","publisher":"Cato AI Labs","context":"The article says Cato AI Labs found the two Cursor flaws, named them DuneSlide, and presented them as research.","category":"research","primary":true},{"title":"GHSA-3v8f-48vw-3mjx","url":"https://github.com/cursor/cursor/security/advisories/GHSA-3v8f-48vw-3mjx","publisher":"Cursor","context":"The article says Cursor published its own advisory for the symlink bug.","category":"advisory","primary":false},{"title":"CVE-2026-50549","url":"https://nvd.nist.gov/vuln/detail/CVE-2026-50549","publisher":"National Vulnerability Database","context":"The article notes that the NVD record for the Cursor symlink bug is live.","category":"advisory","primary":false}],"body":"\u003cp\u003eCato AI Labs found two critical flaws in Cursor, an AI code editor, that could let a single ordinary-looking prompt escape the editor’s sandbox and run commands on a developer’s computer. The flaws are named DuneSlide and tracked as CVE-2026-50548 and CVE-2026-50549, both rated 9.8 under CVSS 3.1 or 9.3 under CVSS 4.0. All Cursor versions before 3.0 are affected, and Cursor 3.0, released April 2, includes fixes.\u003c/p\u003e\n\n\u003cp\u003eThe attack works through prompt injection, where hidden instructions are planted in something the Cursor agent reads, such as a connected Model Context Protocol service or a web search result. The article describes the attack as zero-click because it requires no user approval or click. Both flaws use the same general approach: get the agent to write a file it should not be allowed to write, then use that write to turn off the sandbox.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-50548 abuses Cursor’s \u003ccode\u003eworking_directory\u003c/code\u003e parameter to add an attacker-chosen path to the allowed-write list, while CVE-2026-50549 abuses a failed symlink safety check that falls back to trusting an in-project path. In both cases, the attacker can target files such as Cursor’s sandbox helper, so later commands run without sandbox restrictions. The article says there is no sign the flaws have been used in real attacks, but successful exploitation could give control of the developer’s machine and any cloud or SaaS workspaces the editor is signed into.\u003c/p\u003e\n"},{"n":27,"title":"Azure CLI Password Spray Hits at Least 78 Microsoft Accounts in 81M+ Attempts","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/azure-cli-password-spray-hits-at-least.html","time":"05:46","priority":"MUST READ","score":92,"tldr":"Huntress says attackers made over 81 million Azure CLI login attempts and compromised at least 78 Microsoft accounts by using old breached credentials and the deprecated ROPC OAuth flow. The key takeaway is that MFA and Conditional Access can be bypassed if not applied to all users, cloud apps, and client app types, including Azure CLI logins.","briefOverview":"\u003cp\u003eCybersecurity researchers at Huntress warned of a massive, ongoing, automated password spray attack aimed at Microsoft’s Azure command-line interface. Between June 12 and June 26, the threat actor made more than 81 million login attempts and compromised at least 78 Microsoft accounts across 64 organizations. Huntress said the targeting appeared to be based on password prevalence in compromised password combo lists, rather than a specific business type or industry.\u003c/p\u003e\n\n\u003cp\u003eThe activity largely originated from the IPv6 range 2a0a:d683::/32, which is controlled by internet infrastructure provider LSHIY LLC. Some IP addresses resolved to the United States, while a few resolved to China. Huntress said the campaign was part of a larger wave of credential spray attacks across several ASNs, with credential spray volume across its customer base increasing by more than 155 times.\u003c/p\u003e\n\n\u003cp\u003eA notable technical detail is that the attackers used the deprecated Resource Owner Password Credentials OAuth flow, known as ROPC, to bypass some Conditional Access Policy protections. Microsoft recommends against using ROPC and says it is incompatible with multi-factor authentication. Huntress said organizations should require MFA for all users, all cloud apps, and all client app types, restrict Azure CLI for non-admin users, and prioritize response based on credential validity.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Huntress warned of a massive, ongoing, automated password spray attack against Microsoft's Azure command-line interface that made more than 81 million login attempts between June 12 and June 26.","The campaign compromised at least 78 Microsoft accounts across 64 organizations, with targeting based on password prevalence in compromised password combo lists rather than business type or industry.","The activity originated largely from the IPv6 range 2a0a:d683::/32 controlled by LSHIY LLC, with some IP addresses resolving to the United States and a few to China.","The attackers leveraged the deprecated Resource Owner Password Credentials OAuth flow to bypass some poorly configured Conditional Access policies, including cases where MFA was not applied to all cloud apps, all users, or all client app types.","Huntress advised organizations to require MFA for all users, all cloud apps, and all client app types, restrict the Azure CLI application for non-admin users, and prioritize response by credential validity."],"insights":["The campaign shows that Conditional Access policies can leave a major gap when MFA is scoped only to certain apps, user groups, or locations instead of covering All Users, All Cloud Apps, and All Client App types.","The use of the deprecated ROPC flow was especially significant because it can avoid the authorization endpoint where some Conditional Access policies are enforced, allowing attackers to get in even where MFA existed.","The attacks appear to have succeeded by using old breached username-and-password combinations that had never been rotated, making credential age and validity a practical response priority.","The spike on June 22, when 30 identities across 23 businesses were impacted, indicates the campaign’s success rate was not steady and could escalate sharply within a single day.","Eight affected businesses had no MFA policy at all, but Huntress emphasized that the broader lesson is not that MFA fails, but that incomplete MFA coverage creates exploitable openings."],"referencedReports":[{"title":"LSHIY Password Spray Attack","url":"https://www.huntress.com/blog/lshiy-password-spray-attack","publisher":"Huntress","context":"The article cites Huntress as the source reporting the Azure CLI password spray campaign, including the scale of login attempts, affected accounts, and abuse of the ROPC flow.","category":"research","primary":true}],"body":"\u003cp\u003eCybersecurity researchers at Huntress warned of a massive, ongoing, automated password spray attack aimed at Microsoft’s Azure command-line interface. Between June 12 and June 26, the threat actor made more than 81 million login attempts and compromised at least 78 Microsoft accounts across 64 organizations. Huntress said the targeting appeared to be based on password prevalence in compromised password combo lists, rather than a specific business type or industry.\u003c/p\u003e\n\n\u003cp\u003eThe activity largely originated from the IPv6 range 2a0a:d683::/32, which is controlled by internet infrastructure provider LSHIY LLC. Some IP addresses resolved to the United States, while a few resolved to China. Huntress said the campaign was part of a larger wave of credential spray attacks across several ASNs, with credential spray volume across its customer base increasing by more than 155 times.\u003c/p\u003e\n\n\u003cp\u003eA notable technical detail is that the attackers used the deprecated Resource Owner Password Credentials OAuth flow, known as ROPC, to bypass some Conditional Access Policy protections. Microsoft recommends against using ROPC and says it is incompatible with multi-factor authentication. Huntress said organizations should require MFA for all users, all cloud apps, and all client app types, restrict Azure CLI for non-admin users, and prioritize response based on credential validity.\u003c/p\u003e\n"},{"n":40,"title":"Emerging Threat: (CVE-2026-55957) Apache Tomcat Authentication Bypass via JNDIRealm GSSAPI Binds","source":"cycognito.com","sourceColorIdx":2,"link":"https://www.cycognito.com/blog/emerging-threat-cve-2026-55957-apache-tomcat-authentication-bypass-via-jndirealm-gssapi-binds/","time":"09:18","priority":"MUST READ","score":92,"tldr":"CVE-2026-55957 is a critical Apache Tomcat authentication bypass affecting JNDIRealm configurations that use GSSAPI LDAP binds, allowing pre-authentication access without the correct password. Organizations should upgrade to Tomcat 11.0.5, 10.1.37, or 9.0.101 and urgently identify any exposed directory-integrated Tomcat instances.","briefOverview":"\u003cp\u003eCVE-2026-55957 is a critical Apache Tomcat authentication bypass affecting JNDIRealm when it is configured to authenticate LDAP binds using GSSAPI. The vulnerability has a CVSS v3.1 base score of 9.8, while Apache classifies it as “Important” because exploitation depends on a specific deployment configuration. Exploitation is pre-authentication and can allow an attacker to authenticate without the correct password.\u003c/p\u003e\n\n\u003cp\u003eThe affected condition applies to Tomcat instances that delegate authentication to an LDAP or Active Directory server through JNDIRealm with GSSAPI selected as the bind mechanism. A successful bypass grants access according to the directory-backed identity used inside the application, exposing resources protected by that authentication boundary. Affected versions include Tomcat 11.0.0-M1 through 11.0.4, 10.1.0-M1 through 10.1.36, 9.0.0.M1 through 9.0.100, 8.5.0 through 8.5.100, and 7.0.0 through 7.0.109.\u003c/p\u003e\n\n\u003cp\u003eApache has released fixed versions for supported branches: Tomcat 11.0.5, 10.1.37, and 9.0.101. The article says Apache lists no workaround other than upgrading, and organizations on end-of-life 8.5.x or 7.0.x branches should treat migration to a supported branch as part of remediation. Recommended actions include inventorying affected JNDIRealm and GSSAPI configurations, restricting network access, monitoring directory server logs, auditing recent access, disabling GSSAPI-authenticated binds where immediate upgrade is not feasible, and confirming fixes in third-party platforms that bundle Tomcat.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["CVE-2026-55957 is an Apache Tomcat authentication bypass in JNDIRealm when it is configured to authenticate LDAP binds using GSSAPI.","The vulnerability is pre-authentication and can allow an attacker to authenticate without supplying the correct password, gaining access based on the affected directory-backed identity.","Affected releases include Apache Tomcat 11.0.0-M1 through 11.0.4, 10.1.0-M1 through 10.1.36, 9.0.0.M1 through 9.0.100, 8.5.0 through 8.5.100, and 7.0.0 through 7.0.109.","Apache Software Foundation has released patched versions for supported branches: Tomcat 11.0.5, 10.1.37, and 9.0.101.","The article recommends inventorying Tomcat instances using JNDIRealm with GSSAPI binds, restricting network access, monitoring directory logs, auditing recent access, disabling GSSAPI-authenticated binds where upgrades are not immediately feasible, and confirming fixes in third-party platforms that bundle Tomcat."],"insights":["Apache rates the issue as “Important” despite its 9.8 critical CVSS score because exploitation depends on a specific JNDIRealm configuration using GSSAPI-authenticated binds.","The article highlights Consumer Discretionary organizations as the largest observed exposure group at 57.1%, linking this to distributed franchise, subsidiary, and e-commerce environments with historically separate directory integrations.","The risk is amplified because directory-integrated Tomcat instances were often built for internal use but may later become reachable through VPN gateways, reverse proxies, or forgotten firewall rules.","Apache lists no workaround other than upgrading, so organizations running end-of-life Tomcat 8.5.x or 7.0.x are expected to migrate to a supported branch as part of remediation."],"referencedReports":[],"body":"\u003cp\u003eCVE-2026-55957 is a critical Apache Tomcat authentication bypass affecting JNDIRealm when it is configured to authenticate LDAP binds using GSSAPI. The vulnerability has a CVSS v3.1 base score of 9.8, while Apache classifies it as “Important” because exploitation depends on a specific deployment configuration. Exploitation is pre-authentication and can allow an attacker to authenticate without the correct password.\u003c/p\u003e\n\n\u003cp\u003eThe affected condition applies to Tomcat instances that delegate authentication to an LDAP or Active Directory server through JNDIRealm with GSSAPI selected as the bind mechanism. A successful bypass grants access according to the directory-backed identity used inside the application, exposing resources protected by that authentication boundary. Affected versions include Tomcat 11.0.0-M1 through 11.0.4, 10.1.0-M1 through 10.1.36, 9.0.0.M1 through 9.0.100, 8.5.0 through 8.5.100, and 7.0.0 through 7.0.109.\u003c/p\u003e\n\n\u003cp\u003eApache has released fixed versions for supported branches: Tomcat 11.0.5, 10.1.37, and 9.0.101. The article says Apache lists no workaround other than upgrading, and organizations on end-of-life 8.5.x or 7.0.x branches should treat migration to a supported branch as part of remediation. Recommended actions include inventorying affected JNDIRealm and GSSAPI configurations, restricting network access, monitoring directory server logs, auditing recent access, disabling GSSAPI-authenticated binds where immediate upgrade is not feasible, and confirming fixes in third-party platforms that bundle Tomcat.\u003c/p\u003e\n"},{"n":7,"title":"Adobe patches seven max severity ColdFusion, Campaign flaws","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/adobe-patches-seven-max-severity-coldfusion-campaign-flaws/","time":"07:34","priority":"SHOULD READ","score":89,"tldr":"Adobe released urgent patches for seven maximum-severity flaws in ColdFusion and Campaign Classic that could allow remote or arbitrary code execution, urging administrators to update quickly despite no known active exploitation. The affected products include ColdFusion 2025.9, 2023.20 and earlier, and on-premises Campaign Classic 7.4.3 build 9396 and earlier.","briefOverview":"\u003cp\u003eAdobe released security patches for seven maximum-severity vulnerabilities in ColdFusion and Campaign Classic. The flaws can be exploited in low-complexity attacks that do not require user interaction and were assigned Adobe priority 1, indicating a high risk of being targeted. Adobe recommends administrators install the updates as soon as possible, such as within 72 hours, while also saying it is not aware of any exploits in the wild for the issues addressed.\u003c/p\u003e\n\n\u003cp\u003eSix critical ColdFusion flaws affect versions 2025.9, 2023.20, and earlier, and can allow attackers without privileges to gain remote code execution on unpatched systems. The Campaign Classic vulnerability, tracked as CVE-2026-48286, affects versions 7.4.3 build 9396 and earlier and could lead to arbitrary code execution in the current user\u0026rsquo;s context. Adobe said CVE-2026-48286 affects on-premises Adobe Campaign instances, including fully on-premises deployments and on-premises components in hybrid deployments, while Adobe-hosted instances have already been patched.\u003c/p\u003e\n\n\u003cp\u003eAdobe Chief Security Officer Aanchal Gupta also said the company will move from monthly to twice-monthly security bulletins starting July 14, 2026, with advisories published on the second and fourth Tuesday of each month. Adobe said its out-of-band response process will remain in effect for actively exploited vulnerabilities or externally discovered zero-day vulnerabilities. The article also notes that CISA has added 79 Adobe product flaws to its catalog of actively exploited vulnerabilities over the last five years, including 10 that were also abused by ransomware gangs.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Adobe released security patches for seven maximum-severity vulnerabilities in ColdFusion and Campaign Classic.","The vulnerabilities can be exploited in low-complexity attacks that do not require user interaction and were assigned Adobe priority 1.","Adobe said it is not aware of any exploits in the wild for the issues addressed in these updates.","The ColdFusion flaws affect versions 2025.9, 2023.20, and earlier and can allow attackers without privileges to gain remote code execution on unpatched systems.","The Campaign Classic flaw CVE-2026-48286 affects on-premises versions 7.4.3 build 9396 and earlier and could lead to arbitrary code execution in the current user's context."],"insights":["Adobe assigned the updates priority 1 even while saying it has not seen exploitation, meaning the company still considers these flaws at high risk of being targeted and recommends installing fixes within 72 hours.","The Campaign Classic issue is specifically an on-premises risk, because Adobe says Adobe-hosted instances have already been patched.","Adobe is moving from monthly to twice-monthly security bulletins starting July 14, 2026, to deploy security updates faster.","CISA has added 79 Adobe product flaws to its catalog of actively exploited vulnerabilities over the last five years, including 10 that were also abused by ransomware gangs."],"referencedReports":[{"title":"Security update available for Adobe ColdFusion | APSB26-68","url":"https://helpx.adobe.com/security/products/coldfusion/apsb26-68.html","publisher":"Adobe","context":"The article cites Adobe's ColdFusion security advisory as the source for affected ColdFusion versions and the related CVEs.","category":"advisory","primary":true},{"title":"Security update available for Adobe Campaign | APSB26-69","url":"https://helpx.adobe.com/security/products/campaign/apsb26-69.html","publisher":"Adobe","context":"The article cites Adobe's Campaign Classic security advisory for CVE-2026-48286, affected versions, and deployment scope.","category":"advisory","primary":true},{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?search=\u0026field_date_added_wrapper=all\u0026field_cve=\u0026sort_by=field_date_added\u0026items_per_page=All\u0026url=\u0026f%5B0%5D=vendor_project%3A791","publisher":"Cybersecurity and Infrastructure Security Agency","context":"The article references CISA's catalog to state that 79 Adobe product flaws have been added as actively exploited vulnerabilities over the last five years.","category":"advisory","primary":false}],"body":"\u003cp\u003eAdobe released security patches for seven maximum-severity vulnerabilities in ColdFusion and Campaign Classic. The flaws can be exploited in low-complexity attacks that do not require user interaction and were assigned Adobe priority 1, indicating a high risk of being targeted. Adobe recommends administrators install the updates as soon as possible, such as within 72 hours, while also saying it is not aware of any exploits in the wild for the issues addressed.\u003c/p\u003e\n\n\u003cp\u003eSix critical ColdFusion flaws affect versions 2025.9, 2023.20, and earlier, and can allow attackers without privileges to gain remote code execution on unpatched systems. The Campaign Classic vulnerability, tracked as CVE-2026-48286, affects versions 7.4.3 build 9396 and earlier and could lead to arbitrary code execution in the current user\u0026rsquo;s context. Adobe said CVE-2026-48286 affects on-premises Adobe Campaign instances, including fully on-premises deployments and on-premises components in hybrid deployments, while Adobe-hosted instances have already been patched.\u003c/p\u003e\n\n\u003cp\u003eAdobe Chief Security Officer Aanchal Gupta also said the company will move from monthly to twice-monthly security bulletins starting July 14, 2026, with advisories published on the second and fourth Tuesday of each month. Adobe said its out-of-band response process will remain in effect for actively exploited vulnerabilities or externally discovered zero-day vulnerabilities. The article also notes that CISA has added 79 Adobe product flaws to its catalog of actively exploited vulnerabilities over the last five years, including 10 that were also abused by ransomware gangs.\u003c/p\u003e\n"},{"n":39,"title":"ARToken: Inside an EvilTokens affiliate panel targeting Microsoft 365","source":"blog.talosintelligence.com","sourceColorIdx":6,"link":"https://blog.talosintelligence.com/artoken-inside-an-eviltokens-affiliate-panel-targeting-microsoft-365/","time":"10:00","priority":"SHOULD READ","score":89,"tldr":"Cisco Talos uncovered ARToken, a sophisticated EvilTokens-linked phishing-as-a-service panel that targets Microsoft 365 with device-code phishing, token theft, PRT persistence, BEC tooling, and SharePoint exfiltration. The research shows the platform has evolved into a full post-compromise operations suite with advanced anti-analysis protections and Cloudflare Workers-based lure infrastructure.","briefOverview":"\u003cp\u003eCisco Talos identified a fully featured phishing-as-a-service operator panel branded ARToken that shares infrastructure, API contracts, and operational patterns with the EvilTokens platform. The panel targets Microsoft 365 and exposes more than 80 API endpoints for device code phishing, Primary Refresh Token persistence, email access, business email compromise operations, and SharePoint exfiltration. Talos found the management panel at dashboard-bl.pamconj[.]com, with its command-and-control API at spx.pamconj[.]com and phishing lures deployed through Cloudflare Workers.\u003c/p\u003e\n\n\u003cp\u003eThe article describes a real lure recovered by Talos that spoofed an accounts-payable contact at a legitimate Wisconsin contractor and targeted an accounts-payable recipient at a U.S. life-sciences company. The messages used an outstanding-invoice theme and displayed what appeared to be a genuine SharePoint tenant link, while the actual link pointed to a near-identical attacker-controlled SharePoint workspace. Talos notes that SPF, DKIM, and DMARC all failed, and that the messages included light per-message mutation such as random hex strings and an inline signature image.\u003c/p\u003e\n\n\u003cp\u003eARToken’s phishing kit uses a seven-layer anti-analysis system that includes user-agent checks, automation detection, browser feature fingerprinting, interaction telemetry, timing gates, and mouse-movement pattern analysis. Its payload extracts the victim email from a URL hint parameter, calls the C2 at /device/start, displays a device code, and directs the victim to microsoft.com/devicelogin. The operator toolkit also includes token refresh and sharing, Outlook inbox access, victim email sending, inbox rule creation, SharePoint and OneDrive operations, Cloudflare Workers deployment management, and a standalone Windows session browser called ARTBrowser.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Cisco Talos identified a phishing-as-a-service operator panel branded ARToken that shares infrastructure, API contracts, and operational patterns with the EvilTokens platform.","The ARToken panel exposes more than 80 API endpoints for device code phishing, Primary Refresh Token persistence, email access, business email compromise operations, and SharePoint exfiltration through a React-based dashboard.","Talos recovered two near-identical phishing messages that spoofed a legitimate Wisconsin contractor and targeted an accounts-payable recipient at a U.S. life-sciences company with an outstanding-invoice lure.","The ARToken phishing kit uses a seven-layer anti-analysis system that includes user-agent checks, automation detection, browser fingerprinting, interaction telemetry, timing gates, and mouse-movement pattern analysis.","The ARToken operator toolkit includes token refresh and sharing, Outlook inbox access, victim email sending, inbox rule creation, SharePoint and OneDrive file operations, Cloudflare Workers deployment management, and a standalone Windows session browser called ARTBrowser."],"insights":["ARToken’s use of genuine SharePoint-hosted links with look-alike tenant names lets phishing destinations inherit SharePoint’s clean reputation while still sending victims to attacker-controlled workspaces.","The article shows that ARToken affiliates can see and use a complete post-compromise workflow from the panel, meaning the operation is designed not just to steal access tokens but to support end-to-end business email compromise activity.","The phishing kit’s client-side behavioral checks are more sophisticated than the server-side anti-bot mechanism previously documented for EvilTokens, indicating that affiliates may deploy upgraded or custom anti-analysis modules independently of the core platform.","The presence of token import and shared access links means ARToken supports collaboration and token reuse across operators, not only tokens captured directly through its own phishing pages.","The kit setting persistAfterPassChange: false indicates operators are explicitly warned that ordinary refresh tokens may be revoked by password resets and that they must either exfiltrate data quickly or escalate to Primary Refresh Token persistence."],"referencedReports":[{"title":"AI-enabled device code phishing campaign April 2026","url":"https://www.microsoft.com/en-us/security/blog/2026/04/06/ai-enabled-device-code-phishing-campaign-april-2026/","publisher":"Microsoft","context":"The article cites Microsoft’s April 2026 publication as confirming the scale of the EvilTokens campaign, including higher success rates, AI-powered lures, and automated device registration for persistent access.","category":"research","primary":true},{"title":"EvilTokens: An AI-Augmented Phishing-as-a-Service for Automating BEC Fraud – Part 2","url":"https://blog.sekoia.io/eviltokens-an-ai-augmented-phishing-as-a-service-for-automating-bec-fraud-part-2/","publisher":"Sekoia","context":"The article references Sekoia’s Part 2 research for previously documented EvilTokens second-stage capabilities, including its AI-augmented BEC pipeline and PRT persistence chain.","category":"research","primary":true}],"body":"\u003cp\u003eCisco Talos identified a fully featured phishing-as-a-service operator panel branded ARToken that shares infrastructure, API contracts, and operational patterns with the EvilTokens platform. The panel targets Microsoft 365 and exposes more than 80 API endpoints for device code phishing, Primary Refresh Token persistence, email access, business email compromise operations, and SharePoint exfiltration. Talos found the management panel at dashboard-bl.pamconj[.]com, with its command-and-control API at spx.pamconj[.]com and phishing lures deployed through Cloudflare Workers.\u003c/p\u003e\n\n\u003cp\u003eThe article describes a real lure recovered by Talos that spoofed an accounts-payable contact at a legitimate Wisconsin contractor and targeted an accounts-payable recipient at a U.S. life-sciences company. The messages used an outstanding-invoice theme and displayed what appeared to be a genuine SharePoint tenant link, while the actual link pointed to a near-identical attacker-controlled SharePoint workspace. Talos notes that SPF, DKIM, and DMARC all failed, and that the messages included light per-message mutation such as random hex strings and an inline signature image.\u003c/p\u003e\n\n\u003cp\u003eARToken’s phishing kit uses a seven-layer anti-analysis system that includes user-agent checks, automation detection, browser feature fingerprinting, interaction telemetry, timing gates, and mouse-movement pattern analysis. Its payload extracts the victim email from a URL hint parameter, calls the C2 at /device/start, displays a device code, and directs the victim to microsoft.com/devicelogin. The operator toolkit also includes token refresh and sharing, Outlook inbox access, victim email sending, inbox rule creation, SharePoint and OneDrive operations, Cloudflare Workers deployment management, and a standalone Windows session browser called ARTBrowser.\u003c/p\u003e\n"},{"n":25,"title":"Researcher Analyzes 3,000 Live ClickFix Payloads, Exposing API-Driven Malware Delivery","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/researcher-analyzes-3000-live-clickfix.html","time":"05:32","priority":"SHOULD READ","score":88,"tldr":"ClickFix campaigns have evolved into API-driven malware delivery platforms that generate unique, obfuscated payloads for each visitor, making detection harder. Researchers also found a newer Downloads-folder method designed to bypass clipboard and script-scanning defenses, so defenders should focus on suspicious process chains rather than clipboard contents alone.","briefOverview":"\u003cp\u003eSecurity researcher Bert-Jan Pals analyzed roughly 3,000 payloads from live ClickFix campaigns and found that the technique has evolved into an API-driven malware delivery setup. ClickFix uses fake CAPTCHA or error pages to trick people into pasting and running commands that execute malware themselves. Pals found backend servers that check access tokens, log callers, and return freshly scrambled commands for each request.\u003c/p\u003e\n\n\u003cp\u003eIn one test, a server returned 100 different payloads for 100 requests, using rotating combinations of Base64, AES, TripleDES, Rijndael, and Deflate. After the wrapping was removed, the payloads unpacked to the same script, which ran in memory through a PowerShell runspace. The platform also serves lures in 25 languages, matches commands to the visitor’s operating system, and includes macOS versions alongside Windows versions.\u003c/p\u003e\n\n\u003cp\u003eThe research also found a newer Downloads-folder method that quietly downloads a file and copies only a short command that moves, unpacks, and runs it, which is designed to avoid clipboard-focused detection and slip past Windows script scanning. The article says defenders should focus on process chains such as explorer.exe or WindowsTerminal.exe launching powershell.exe, cmd.exe, or msiexec.exe and making network connections soon afterward. Pals also listed comicstar[.]lat, babybon[.]cfd, and merkantalolol[.]asia as payload servers observed during the research, while noting that a connection to one of them does not prove infection.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Security researcher Bert-Jan Pals analyzed roughly 3,000 payloads from live ClickFix campaigns and found that malicious commands are being delivered by API-driven backend servers.","One ClickFix server returned 100 different payload wrappers for 100 requests, using rotating combinations of Base64, AES, TripleDES, Rijndael, and Deflate while unpacking to the same script at the time of the research.","Newer ClickFix pages can quietly download a file to the Downloads folder and copy a short command that moves, unpacks, and runs the file, a method designed to avoid clipboard-focused detection and slip past Windows script scanning.","ClickFix lures are served in 25 languages, can match commands to a visitor’s operating system, and include macOS versions alongside Windows versions.","The article says defenders should focus on process chains such as explorer.exe or WindowsTerminal.exe launching powershell.exe, cmd.exe, or msiexec.exe and making network connections soon afterward."],"insights":["ClickFix has moved beyond static lure pages into a commercialized, on-demand delivery model, making it cheap for attackers to keep changing payload disguises when defenders catch up.","Clipboard monitoring alone is no longer a reliable detection strategy because newer ClickFix pages can copy only a harmless-looking orchestrator command while keeping the malicious code in a downloaded file.","Windows Terminal use is notable for investigations because, unlike the older Windows+R Run-box method, it does not leave evidence in the RunMRU registry key that investigators normally check.","A connection to one of the listed payload servers indicates that a command was most likely placed in a user's clipboard, but the article warns it does not by itself prove infection.","ClickFix is no longer limited to ordinary cybercriminal campaigns, because Proofpoint tied Russia-, Iran-, and North Korea-backed groups including APT28, MuddyWater, and Kimsuky to its use."],"referencedReports":[{"title":"ClickFix: The Gift That Keeps on Giving","url":"https://kqlquery.com/posts/clickfix-gift-that-keeps-on-giving/","publisher":"Bert-Jan Pals / KQLQuery","context":"The article is based primarily on Bert-Jan Pals' published analysis of roughly 3,000 live ClickFix payloads and several ClickFix platforms.","category":"research","primary":true},{"title":"ESET Threat Report H1 2025","url":"https://web-assets.esetstatic.com/wls/en/papers/threat-reports/eset-threat-report-h12025.pdf","publisher":"ESET","context":"The article cites ESET's report for its measurement of a 517% jump in ClickFix activity from late 2024 into the first half of 2025.","category":"research","primary":false},{"title":"Microsoft Digital Defense Report 2025","url":"https://www.microsoft.com/en-us/security/security-insider/threat-landscape/microsoft-digital-defense-report-2025","publisher":"Microsoft","context":"The article cites Microsoft's report for its finding that ClickFix accounted for 47% of initial-access cases seen by its Defender Experts team.","category":"research","primary":false},{"title":"Around the World in 90 Days: State-Sponsored Actors Try ClickFix","url":"https://www.proofpoint.com/us/blog/threat-insight/around-world-90-days-state-sponsored-actors-try-clickfix","publisher":"Proofpoint","context":"The article references Proofpoint's analysis tying Russia-, Iran-, and North Korea-backed groups, including APT28, MuddyWater, and Kimsuky, to ClickFix campaigns.","category":"research","primary":false}],"body":"\u003cp\u003eSecurity researcher Bert-Jan Pals analyzed roughly 3,000 payloads from live ClickFix campaigns and found that the technique has evolved into an API-driven malware delivery setup. ClickFix uses fake CAPTCHA or error pages to trick people into pasting and running commands that execute malware themselves. Pals found backend servers that check access tokens, log callers, and return freshly scrambled commands for each request.\u003c/p\u003e\n\n\u003cp\u003eIn one test, a server returned 100 different payloads for 100 requests, using rotating combinations of Base64, AES, TripleDES, Rijndael, and Deflate. After the wrapping was removed, the payloads unpacked to the same script, which ran in memory through a PowerShell runspace. The platform also serves lures in 25 languages, matches commands to the visitor’s operating system, and includes macOS versions alongside Windows versions.\u003c/p\u003e\n\n\u003cp\u003eThe research also found a newer Downloads-folder method that quietly downloads a file and copies only a short command that moves, unpacks, and runs it, which is designed to avoid clipboard-focused detection and slip past Windows script scanning. The article says defenders should focus on process chains such as explorer.exe or WindowsTerminal.exe launching powershell.exe, cmd.exe, or msiexec.exe and making network connections soon afterward. Pals also listed comicstar[.]lat, babybon[.]cfd, and merkantalolol[.]asia as payload servers observed during the research, while noting that a connection to one of them does not prove infection.\u003c/p\u003e\n"},{"n":30,"title":"Unpatched Argo CD Repo-Server Flaw Could Let Attackers Take Over Kubernetes Clusters","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/unpatched-argo-cd-repo-server-flaw.html","time":"19:40","priority":"SHOULD READ","score":88,"tldr":"Argo CD’s repo-server has an unpatched unauthenticated RCE flaw that can let an attacker with internal network access execute code and potentially take over Kubernetes clusters. Until a fix is available, users should enable strict Kubernetes network policies to isolate repo-server and Redis from other pods.","briefOverview":"\u003cp\u003eArgo CD has an unpatched flaw in its repo-server component that can let an unauthenticated attacker run code if they can reach the component’s internal network port. Synacktiv found the bug, reported it to Argo CD’s maintainers in January 2025, and says it remains unpatched roughly eighteen months later with no CVE. The firm says the issue can lead to a full Kubernetes cluster takeover.\u003c/p\u003e\n\n\u003cp\u003eThe flaw affects repo-server, which reads Git repositories and builds Kubernetes manifests. Synacktiv says the internal gRPC service has no authentication, and a crafted GenerateManifest request can abuse kustomize’s \u0026ndash;helm-command option to execute a script from an attacker-controlled Git repository instead of the helm binary. The attack was demonstrated against Argo CD v2.13.3, but the article says no full list of affected versions has been published.\u003c/p\u003e\n\n\u003cp\u003eThe article says the main defense is network isolation because no patched version is available. Argo CD ships Kubernetes network policies that restrict repo-server access, but the Helm chart leaves them disabled by default with networkPolicy.create set to false. Synacktiv showed that code execution on repo-server could be used to read the Redis password, poison Argo CD’s cached deployment data, and cause Argo CD to deploy an attacker-supplied workload on the next automatic sync.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Synacktiv reported an unpatched flaw in Argo CD’s repo-server component that can let an unauthenticated attacker run code if they can reach the component’s internal network port.","The flaw abuses kustomize’s --helm-command option through the repo-server’s GenerateManifest service to execute a script from an attacker-controlled Git repository instead of the helm binary.","Synacktiv demonstrated the attack against Argo CD v2.13.3 and said there is no patched release and no CVE for the issue.","The Helm chart for Argo CD leaves Kubernetes network policies disabled by default, which can allow an attacker who compromises a single pod in the cluster to reach the repo-server and trigger the bug.","The article recommends enabling Kubernetes network policies so only Argo CD’s own components can reach the repo-server and Redis ports."],"insights":["Argo CD includes Kubernetes network policy files that restrict repo-server access, but Helm-based installations do not enable them by default because networkPolicy.create is set to false.","The article says the earlier Redis cache-poisoning issue was only partially mitigated by adding a Redis password, because stealing that password from the repo-server can reopen the same path to attacker-controlled deployments.","Administrators can quickly check whether the main mitigation is active by running kubectl get networkpolicy -A and confirming that policies exist for components including repo-server and Redis.","Synacktiv is withholding its automated attack tool, argo-cdown, temporarily to give defenders time to enable network isolation before the tool is published."],"referencedReports":[{"title":"Caught in the Octopus Trap: Unauthenticated RCE in Argo CD with CodeQL","url":"https://www.synacktiv.com/en/publications/caught-in-the-octopus-trap-unauthenticated-rce-in-argo-cd-with-codeql","publisher":"Synacktiv","context":"The article is based on Synacktiv’s research describing an unpatched unauthenticated remote code execution issue in Argo CD repo-server.","category":"research","primary":true},{"title":"Revealing Argo CD Critical Vulnerability","url":"https://cycode.com/blog/revealing-argo-cd-critical-vulnerability/","publisher":"Cycode","context":"The article references Cycode’s 2024 research on CVE-2024-31989, a Redis cache-poisoning issue in Argo CD.","category":"research","primary":false},{"title":"CVE-2025-55190","url":"https://github.com/argoproj/argo-cd/security/advisories/GHSA-786q-9hcg-v9ff","publisher":"Argo CD","context":"The article references this Argo CD advisory as a prior issue where a low-privilege API token could retrieve Git repository credentials.","category":"advisory","primary":false},{"title":"CVE-2026-42880","url":"https://github.com/argoproj/argo-cd/security/advisories/GHSA-3v3m-wc6v-x4x3","publisher":"Argo CD","context":"The article references this Argo CD advisory as a later issue that allowed read-only users to read plaintext Kubernetes secrets.","category":"advisory","primary":false}],"body":"\u003cp\u003eArgo CD has an unpatched flaw in its repo-server component that can let an unauthenticated attacker run code if they can reach the component’s internal network port. Synacktiv found the bug, reported it to Argo CD’s maintainers in January 2025, and says it remains unpatched roughly eighteen months later with no CVE. The firm says the issue can lead to a full Kubernetes clust
