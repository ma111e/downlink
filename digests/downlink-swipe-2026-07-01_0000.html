er takeover.\u003c/p\u003e\n\n\u003cp\u003eThe flaw affects repo-server, which reads Git repositories and builds Kubernetes manifests. Synacktiv says the internal gRPC service has no authentication, and a crafted GenerateManifest request can abuse kustomize’s \u0026ndash;helm-command option to execute a script from an attacker-controlled Git repository instead of the helm binary. The attack was demonstrated against Argo CD v2.13.3, but the article says no full list of affected versions has been published.\u003c/p\u003e\n\n\u003cp\u003eThe article says the main defense is network isolation because no patched version is available. Argo CD ships Kubernetes network policies that restrict repo-server access, but the Helm chart leaves them disabled by default with networkPolicy.create set to false. Synacktiv showed that code execution on repo-server could be used to read the Redis password, poison Argo CD’s cached deployment data, and cause Argo CD to deploy an attacker-supplied workload on the next automatic sync.\u003c/p\u003e\n"},{"n":31,"title":"Citrix Patches Six NetScaler Flaws Allowing File Read and Denial-of-Service","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/citrix-patches-six-netscaler-flaws.html","time":"03:54","priority":"SHOULD READ","score":88,"tldr":"Citrix released patches for six NetScaler ADC and Gateway vulnerabilities that could allow arbitrary file reads, memory overreads, or denial-of-service under certain configurations. Customers should upgrade to fixed versions immediately and, for CVE-2026-13474, ensure the HTTP/2 small-window timeout setting is configured as required.","briefOverview":"\u003cp\u003eCitrix released security updates for six vulnerabilities in NetScaler ADC and NetScaler Gateway that could be exploited to read arbitrary files or cause denial-of-service conditions. The flaws affect several configurations, including SAML IDP, Gateway or AAA virtual server, Oracle load balancing, DNS proxy or recursive resolver deployments, TCP Timestamp, and HTTP/2 profiles. Citrix said there is no evidence that the issues have been exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe fixed versions include NetScaler ADC and NetScaler Gateway 14.1-72.61 and later, 13.1-63.18 and later, NetScaler ADC 14.1-FIPS 14.1-72.61 FIPS and later, and NetScaler ADC 13.1-FIPS and 13.1-NDcPP 13.1.37.272 and later. For CVE-2026-13474, Citrix also advised customers to update the Http2SmallWndTimeout setting, because appliances not using HTTP Strict Profiles have a default value of 0 and upgrading alone will not completely address the vulnerability. Citrix credited Michael Tucker from the XOR team at JPMorgan Chase, Aliz Hammond of watchTowr, and Maxim Suhanov for reporting the vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr Labs said CVE-2026-8451 was discovered while attempting to reproduce CVE-2026-3055, an earlier insufficient input validation flaw. The company said the issue comes from how NetScaler parses SAML authentication requests and can result in out-of-bounds memory reads when malformed SAML requests are sent. watchTowr noted that the newer issue leaks less data than CVE-2026-3055, but still raised concern about a broader pattern of fragile memory management in Citrix NetScaler appliances.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Citrix released security updates for six vulnerabilities in NetScaler ADC and NetScaler Gateway that could enable arbitrary file reads or denial-of-service conditions.","The affected issues include CVE-2026-8451, CVE-2026-8452, CVE-2026-8655, CVE-2026-10816, CVE-2026-10817, and CVE-2026-13474, with CVSS scores ranging from 6.9 to 8.8.","Patches are available in NetScaler ADC and NetScaler Gateway 14.1-72.61 and later, 13.1-63.18 and later, NetScaler ADC 14.1-FIPS 14.1-72.61 FIPS and later, and NetScaler ADC 13.1-FIPS and 13.1-NDcPP 13.1.37.272 and later.","For CVE-2026-13474, Citrix advised customers not using HTTP Strict Profiles to manually set Http2SmallWndTimeout to 30 seconds after upgrading, because the default value is 0.","Citrix said there is no evidence that the vulnerabilities have been exploited in the wild."],"insights":["For CVE-2026-13474, upgrading alone may not fully fix the issue on appliances that are not using HTTP Strict Profiles, because customers must also manually set Http2SmallWndTimeout to 30 seconds.","watchTowr found CVE-2026-8451 while trying to reproduce CVE-2026-3055, and said the new SAML parsing issue shares the same root cause as the earlier flaw.","watchTowr reported that CVE-2026-8451 leaks less data than CVE-2026-3055, but varying the request length still allowed researchers to consistently extract a few bytes from the server.","The listed vulnerabilities are tied to specific NetScaler configurations, such as SAML IDP, Gateway or AAA virtual server, Oracle load balancing, DNS proxy or recursive resolver, TCP Timestamp, and HTTP/2 profiles.","The article emphasizes urgency because Citrix appliances have repeatedly been targeted in recent years, including by threat actors deploying ransomware."],"referencedReports":[{"title":"NetScaler ADC and NetScaler Gateway Security Bulletin (CTX696604)","url":"https://support.citrix.com/support-home/kbsearch/article?articleNumber=CTX696604","publisher":"Citrix","context":"The article cites Citrix's security update bulletin as the source for the NetScaler ADC and NetScaler Gateway vulnerabilities, affected versions, fixed releases, and mitigation guidance.","category":"advisory","primary":true},{"title":"CitrixBleed to Infinity and Beyond: Citrix NetScaler Pre-Auth Memory Overread CVE-2026-8451","url":"https://labs.watchtowr.com/citrixbleed-to-infinity-and-beyond-citrix-netscaler-pre-auth-memory-overread-cve-2026-8451/","publisher":"watchTowr Labs","context":"The article references watchTowr Labs' technical write-up explaining the SAML parsing issue behind CVE-2026-8451 and comparing it with CVE-2026-3055.","category":"research","primary":false}],"body":"\u003cp\u003eCitrix released security updates for six vulnerabilities in NetScaler ADC and NetScaler Gateway that could be exploited to read arbitrary files or cause denial-of-service conditions. The flaws affect several configurations, including SAML IDP, Gateway or AAA virtual server, Oracle load balancing, DNS proxy or recursive resolver deployments, TCP Timestamp, and HTTP/2 profiles. Citrix said there is no evidence that the issues have been exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe fixed versions include NetScaler ADC and NetScaler Gateway 14.1-72.61 and later, 13.1-63.18 and later, NetScaler ADC 14.1-FIPS 14.1-72.61 FIPS and later, and NetScaler ADC 13.1-FIPS and 13.1-NDcPP 13.1.37.272 and later. For CVE-2026-13474, Citrix also advised customers to update the Http2SmallWndTimeout setting, because appliances not using HTTP Strict Profiles have a default value of 0 and upgrading alone will not completely address the vulnerability. Citrix credited Michael Tucker from the XOR team at JPMorgan Chase, Aliz Hammond of watchTowr, and Maxim Suhanov for reporting the vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr Labs said CVE-2026-8451 was discovered while attempting to reproduce CVE-2026-3055, an earlier insufficient input validation flaw. The company said the issue comes from how NetScaler parses SAML authentication requests and can result in out-of-bounds memory reads when malformed SAML requests are sent. watchTowr noted that the newer issue leaks less data than CVE-2026-3055, but still raised concern about a broader pattern of fragile memory management in Citrix NetScaler appliances.\u003c/p\u003e\n"},{"n":6,"title":"Hackers target Microsoft 365 accounts with 81 million login attempts","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/hackers-target-microsoft-365-accounts-with-81-million-login-attempts/","time":"16:38","priority":"SHOULD READ","score":86,"tldr":"A large password-spraying campaign generated over 81 million Microsoft 365 login attempts and compromised 78 accounts across 64 organizations. Many victims had MFA, but misconfigured Conditional Access policies failed to cover Azure CLI/ROPC authentication, letting attackers bypass MFA.","briefOverview":"\u003cp\u003eAn aggressive password-spraying campaign targeted Microsoft 365 environments and generated more than 81 million login attempts over a two-week period. Huntress observed the campaign against its customers between June 12 and 26 and confirmed that 78 Microsoft accounts across 64 organizations were compromised. The company also reported a more than 155-fold increase in password-spraying attacks, with organizations now averaging 1,964 failed login attempts per tenant each month.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor tried to authenticate through Microsoft’s Azure command-line interface using still-valid username and password combinations exposed in past breaches. Once a valid pair was found, the attacker used the Resource Owner Password Credentials OAuth mechanism, which Huntress said can bypass multi-factor authentication in many environments when Conditional Access policies are insecurely configured. Huntress highlighted misconfigurations such as MFA not applying to all cloud apps, only covering selected user groups, depending on trusted locations, or remaining in report-only mode.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["An aggressive password-spraying campaign targeting Microsoft 365 environments generated more than 81 million login attempts over a two-week period.","The threat actor attempted to authenticate through Microsoft’s Azure command-line interface using still-valid username and password combinations exposed in past breaches.","Huntress observed the campaign between June 12 and 26 and confirmed that 78 Microsoft accounts across 64 organizations were compromised.","Huntress said many compromised businesses had multi-factor authentication configured through Conditional Access policies, but those policies did not cover the ROPC authentication flow used by the attackers.","Huntress reported that the activity originated from an IPv6 range owned by LSHIY LLC and that it had not received a response after reporting the findings through the company’s abuse portal."],"insights":["Having MFA enabled was not enough for several impacted organizations because their Conditional Access policies did not apply to the specific ROPC authentication flow used in the campaign.","MFA policies limited to specific applications, selected user groups, or untrusted locations can leave exploitable gaps even when organizations believe they have MFA coverage.","Conditional Access policies set to report-only mode provided no protection in this campaign because they were not actually enforced.","ROPC is especially risky in this context because it sends the password directly to the token endpoint without an interactive MFA prompt.","Huntress observed a more than 155-fold increase in password-spraying attacks, indicating a sharp rise in this type of activity against its monitored organizations."],"referencedReports":[{"title":"LSHIY Password Spray Attack","url":"https://www.huntress.com/blog/lshiy-password-spray-attack","publisher":"Huntress","context":"The article cites Huntress's analysis as the source for details on the Microsoft 365 password-spraying campaign, compromised accounts, and Conditional Access policy weaknesses.","category":"research","primary":true}],"body":"\u003cp\u003eAn aggressive password-spraying campaign targeted Microsoft 365 environments and generated more than 81 million login attempts over a two-week period. Huntress observed the campaign against its customers between June 12 and 26 and confirmed that 78 Microsoft accounts across 64 organizations were compromised. The company also reported a more than 155-fold increase in password-spraying attacks, with organizations now averaging 1,964 failed login attempts per tenant each month.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor tried to authenticate through Microsoft’s Azure command-line interface using still-valid username and password combinations exposed in past breaches. Once a valid pair was found, the attacker used the Resource Owner Password Credentials OAuth mechanism, which Huntress said can bypass multi-factor authentication in many environments when Conditional Access policies are insecurely configured. Huntress highlighted misconfigurations such as MFA not applying to all cloud apps, only covering selected user groups, depending on trusted locations, or remaining in report-only mode.\u003c/p\u003e\n"},{"n":10,"title":"DHS confirms hackers breached HSIN info-sharing platform","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/dhs-confirms-hackers-breached-hsin-info-sharing-platform/","time":"17:32","priority":"SHOULD READ","score":86,"tldr":"DHS confirmed hackers breached the unclassified Homeland Security Information Network, a sensitive information-sharing platform used by government and private-sector partners. The agency says it isolated affected systems and found no indication classified networks were impacted, but it remains unclear whether documents were stolen.","briefOverview":"\u003cp\u003eThe Department of Homeland Security is investigating a cyberattack that compromised the Homeland Security Information Network, a sensitive but unclassified information-sharing platform. The intrusion was first reported by Nextgov and is believed to have occurred sometime between late May and early June, according to two people familiar with the matter. DHS has not attributed the attack to any specific threat actor or foreign government, and it remains unclear whether any documents were stolen.\u003c/p\u003e\n\n\u003cp\u003eNextgov’s sources said the threat actors targeted HSIN servers as well as a SharePoint system used for collaboration. DHS said it immediately isolated the affected systems, mitigated the vulnerability, and launched a comprehensive forensic investigation. The department said there is no indication that classified networks were impacted and that the system remains operational for partners.\u003c/p\u003e\n\n\u003cp\u003eHSIN is used by federal, state, local, international, and private-sector partners to share sensitive but unclassified information, coordinate operations, manage incidents, and exchange information about potential threats. The article notes concern that the breach could have exposed security planning, interagency coordination, or response procedures while the United States is overseeing security for World Cup games. HSIN also had a previous security incident in 2023, when a contractor coding error exposed restricted HSIN-Intel data to all HSIN users by setting access permissions to “everyone.”\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The Department of Homeland Security is investigating a cyberattack that compromised the Homeland Security Information Network, a sensitive but unclassified information-sharing platform.","The intrusion was carried out by an unknown threat actor in recent weeks and is believed to have occurred sometime between late May and early June, according to Nextgov sources.","DHS said it isolated the affected systems, mitigated the vulnerability, and launched a comprehensive forensic investigation.","DHS said there is no indication that classified networks were impacted and that the system remains operational for partners.","It remains unclear whether any documents were stolen from the system."],"insights":["The affected environment was described by DHS as a “legacy” information-sharing system, indicating the incident involved an older unclassified platform that still remains operational for partners.","The reported targeting of both HSIN servers and a SharePoint collaboration system suggests the investigation is not limited to a single application but includes systems used for interagency collaboration.","The breach is especially sensitive because HSIN is used to coordinate safety, security, incident response, and information about potential threats during a period when the United States is overseeing security for World Cup games.","This is not HSIN’s first security issue, as a 2023 contractor coding error previously exposed restricted HSIN-Intel data to all HSIN users by setting access permissions to “everyone.”"],"referencedReports":[],"body":"\u003cp\u003eThe Department of Homeland Security is investigating a cyberattack that compromised the Homeland Security Information Network, a sensitive but unclassified information-sharing platform. The intrusion was first reported by Nextgov and is believed to have occurred sometime between late May and early June, according to two people familiar with the matter. DHS has not attributed the attack to any specific threat actor or foreign government, and it remains unclear whether any documents were stolen.\u003c/p\u003e\n\n\u003cp\u003eNextgov’s sources said the threat actors targeted HSIN servers as well as a SharePoint system used for collaboration. DHS said it immediately isolated the affected systems, mitigated the vulnerability, and launched a comprehensive forensic investigation. The department said there is no indication that classified networks were impacted and that the system remains operational for partners.\u003c/p\u003e\n\n\u003cp\u003eHSIN is used by federal, state, local, international, and private-sector partners to share sensitive but unclassified information, coordinate operations, manage incidents, and exchange information about potential threats. The article notes concern that the breach could have exposed security planning, interagency coordination, or response procedures while the United States is overseeing security for World Cup games. HSIN also had a previous security incident in 2023, when a contractor coding error exposed restricted HSIN-Intel data to all HSIN users by setting access permissions to “everyone.”\u003c/p\u003e\n"},{"n":20,"title":"Phantom Squatting Uses AI-Hallucinated Domains for Phishing and Malware","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/phantom-squatting-uses-ai-hallucinated.html","time":"07:20","priority":"SHOULD READ","score":86,"tldr":"Attackers are registering domains that AI models hallucinate and using them for phishing and malware, exploiting users’ trust in AI-generated links before reputation systems can flag the sites. Defenders can reduce risk by monitoring likely hallucinated domains and treating all AI-provided links as unverified until confirmed.","briefOverview":"\u003cp\u003ePalo Alto Networks\u0026rsquo; Unit 42 says attackers are using a tactic it calls \u003cstrong\u003ephantom squatting\u003c/strong\u003e, where they register web domains that large language models invent and then host phishing pages or malware on them. The issue matters because people and AI assistants may treat model-provided links as trustworthy, even when the domain did not exist before. Whoever registers an invented domain first can benefit from that misplaced trust without needing a phishing email or malicious ad.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 tested two AI models with 685,339 questions about 913 well-known brands and received 2.1 million links. Threat intelligence had already flagged 13,229 of those links as malicious, and roughly 250,000 invented domains had no owner. The article says newly registered phantom domains are hard for reputation systems to catch at first because they have no prior history of bad behavior.\u003c/p\u003e\n\n\u003cp\u003eThe article describes two observed cases involving hallucinated postal-service domains that Unit 42 flagged before attackers registered them. In one case, an attacker registered a predicted domain 23 days later and used the Montana Empire phishing kit to steal card numbers, bank-transfer details, and national ID data; in another, an attacker registered a domain 51 days after it was flagged and used it to push a malicious Android app. The article advises people not to trust links just because AI provided them, to verify official domains, and to prevent AI agents from automatically opening or downloading from model-generated links without checks.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Palo Alto Networks' Unit 42 calls the practice of registering AI-hallucinated web domains for phishing and malware \"phantom squatting\" and says it is already occurring in the wild.","Unit 42 asked two AI models 685,339 questions about 913 well-known brands, receiving 2.1 million links, including 13,229 flagged as malicious and roughly 250,000 invented domains with no owner.","In one observed case, an attacker registered an AI-predicted fake domain resembling a national postal service's online marketplace 23 days after Unit 42 predicted it and used the Montana Empire phishing kit to steal card numbers, bank-transfer details, and national ID data.","In another observed case, Unit 42 flagged a hallucinated postal-service domain 51 days before an attacker registered it, cloned a brand site, added fake credibility claims, and used it to push a malicious Android app.","The article advises users not to trust links just because an AI provided them, to verify official domains before entering passwords, and to prevent AI agents from automatically opening or downloading from model-generated links without checks."],"insights":["The article highlights that different AI models can invent the same fake domain for the same question, making future abuse predictable enough for defenders to monitor likely hallucinated domains before attackers register them.","Newly registered hallucinated domains are especially dangerous because they start with no reputation history, leaving blocklists and threat feeds with little to flag until after victims may already have been sent there.","The observed cases show that both attackers and defenders can reach the same fake domains by asking AI systems, turning model behavior itself into a way to identify likely phishing infrastructure in advance.","The risk increases when AI agents automatically open or download from model-generated links, because an agent may act on an invented address without the hesitation or verification a person might apply."],"referencedReports":[{"title":"Phantom Squatting: Hallucinated Web Domains","url":"https://unit42.paloaltonetworks.com/phantom-squatting-hallucinated-web-domains/","publisher":"Palo Alto Networks Unit 42","context":"The article is based on Unit 42 research that defines phantom squatting and reports evidence that attackers are registering AI-hallucinated domains for phishing and malware.","category":"research","primary":true},{"title":"USENIX study on code-generating models suggesting nonexistent package names","url":"https://www.usenix.org/conference/usenixsecurity25/presentation/spracklen","publisher":"USENIX","context":"The article cites this study as evidence that code-generating models routinely suggest software package names that do not exist, connecting phantom squatting to slopsquatting.","category":"research","primary":false}],"body":"\u003cp\u003ePalo Alto Networks\u0026rsquo; Unit 42 says attackers are using a tactic it calls \u003cstrong\u003ephantom squatting\u003c/strong\u003e, where they register web domains that large language models invent and then host phishing pages or malware on them. The issue matters because people and AI assistants may treat model-provided links as trustworthy, even when the domain did not exist before. Whoever registers an invented domain first can benefit from that misplaced trust without needing a phishing email or malicious ad.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 tested two AI models with 685,339 questions about 913 well-known brands and received 2.1 million links. Threat intelligence had already flagged 13,229 of those links as malicious, and roughly 250,000 invented domains had no owner. The article says newly registered phantom domains are hard for reputation systems to catch at first because they have no prior history of bad behavior.\u003c/p\u003e\n\n\u003cp\u003eThe article describes two observed cases involving hallucinated postal-service domains that Unit 42 flagged before attackers registered them. In one case, an attacker registered a predicted domain 23 days later and used the Montana Empire phishing kit to steal card numbers, bank-transfer details, and national ID data; in another, an attacker registered a domain 51 days after it was flagged and used it to push a malicious Android app. The article advises people not to trust links just because AI provided them, to verify official domains, and to prevent AI agents from automatically opening or downloading from model-generated links without checks.\u003c/p\u003e\n"},{"n":13,"title":"Teen suspect in Scattered Spider hacks is extradited to US","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/teen-suspect-in-scattered-spider-hacks-extradited-to-us","time":"20:13","priority":"SHOULD READ","score":85,"tldr":"A 19-year-old dual U.S.-Estonian citizen accused of being part of Scattered Spider was extradited from Finland to Chicago to face charges tied to alleged hacks, including an $8 million extortion attempt against a luxury jewelry retailer. The FBI says the group used social engineering to reset credentials, compromise privileged accounts, and cause about $2 million in losses.","briefOverview":"\u003cp\u003eA 19-year-old man with dual U.S. and Estonian citizenship, Peter Stokes, was extradited from Finland to Chicago to face criminal charges tied to alleged participation in Scattered Spider hacks. The Department of Justice said he made an initial appearance Tuesday in federal court in the Northern District of Illinois. The FBI’s criminal complaint accuses him of conspiracy, cyber intrusion and fraud.\u003c/p\u003e\n\n\u003cp\u003eThe complaint centers on a May 2025 breach of an unspecified luxury-jewelry retailer referred to as Company F. The FBI alleges that Stokes and possibly other Scattered Spider members stole data from the company and demanded an \u003cspan class=\"math inline\"\u003e\\(8 million cryptocurrency ransom. The company did not pay, but the FBI said losses from business disruption, investigation and mitigation were about \\)\u003c/span\u003e2 million, with further losses expected.\u003c/p\u003e\n\n\u003cp\u003eAccording to the complaint, the suspects pretended to be company employees and asked the IT help desk to reset passwords and mobile devices used for multifactor authentication. They allegedly used Google Voice numbers for the calls, compromised three user accounts within about two to three hours, and accessed two IT administrator accounts with high privileges. The complaint also says the suspects used ngrok to maintain unauthorized access, and the U.S. government estimates Scattered Spider has been involved in more than 100 network intrusions and collected more than $100 million in ransom payments.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Peter Stokes, a 19-year-old with dual U.S. and Estonian citizenship, was extradited from Finland to Chicago to face charges related to alleged participation in Scattered Spider hacks.","The FBI’s complaint accuses Stokes of conspiracy, cyber intrusion and fraud, including a May 2025 breach of an unspecified luxury jewelry retailer referred to as Company F.","The FBI alleges that Stokes and possibly other Scattered Spider members stole data from the jewelry retailer and demanded an $8 million cryptocurrency ransom.","The complaint says the suspects used Google Voice numbers to call the company’s IT help desk, request credential resets, compromise three user accounts, and access high-privilege administrator accounts.","The U.S. government estimates that Scattered Spider has been involved in more than 100 network intrusions and collected more than $100 million in ransom payments."],"insights":["The jewelry retailer’s compromise escalated quickly because password and multifactor authentication resets through the help desk gave the suspects access to three accounts within about two to three hours, including two IT administrator accounts.","The suspects allegedly used ordinary services and tools, including Google Voice for help-desk calls and ngrok for persistent access, showing that legitimate technology was central to the alleged intrusion.","Even without paying the $8 million ransom, the victim company still reported about $2 million in losses from business disruption, investigation, and mitigation, with further losses expected.","The complaint links the same defendant not only to the 2025 jewelry retailer incident but also to unauthorized access at an online-communication platform in March 2023, indicating the charges cover activity spanning multiple years."],"referencedReports":[],"body":"\u003cp\u003eA 19-year-old man with dual U.S. and Estonian citizenship, Peter Stokes, was extradited from Finland to Chicago to face criminal charges tied to alleged participation in Scattered Spider hacks. The Department of Justice said he made an initial appearance Tuesday in federal court in the Northern District of Illinois. The FBI’s criminal complaint accuses him of conspiracy, cyber intrusion and fraud.\u003c/p\u003e\n\n\u003cp\u003eThe complaint centers on a May 2025 breach of an unspecified luxury-jewelry retailer referred to as Company F. The FBI alleges that Stokes and possibly other Scattered Spider members stole data from the company and demanded an \u003cspan class=\"math inline\"\u003e\\(8 million cryptocurrency ransom. The company did not pay, but the FBI said losses from business disruption, investigation and mitigation were about \\)\u003c/span\u003e2 million, with further losses expected.\u003c/p\u003e\n\n\u003cp\u003eAccording to the complaint, the suspects pretended to be company employees and asked the IT help desk to reset passwords and mobile devices used for multifactor authentication. They allegedly used Google Voice numbers for the calls, compromised three user accounts within about two to three hours, and accessed two IT administrator accounts with high privileges. The complaint also says the suspects used ngrok to maintain unauthorized access, and the U.S. government estimates Scattered Spider has been involved in more than 100 network intrusions and collected more than $100 million in ransom payments.\u003c/p\u003e\n"},{"n":35,"title":"The SOC Files: ScreenConnect masked as freeware. An inside look at a large-scale campaign","source":"securelist.com","sourceColorIdx":5,"link":"https://securelist.com/tr/the-soc-files-screenconnect-campaign-with-asyncrat/120472/","time":"10:00","priority":"SHOULD READ","score":85,"tldr":"Kaspersky uncovered a large SEO-poisoning campaign that uses fake freeware download sites to install legitimate ScreenConnect remote access software via DLL sideloading, then deploy AsyncRAT for persistence and control. The key risk is that trusted remote administration tools can be silently abused at scale to compromise both consumers and corporate endpoints.","briefOverview":"\u003cp\u003eKaspersky Managed Detection and Response investigated an incident in which the legitimate ScreenConnect remote access tool was used to deploy and execute AsyncRAT. The investigation expanded from a single case into a large campaign using malicious installer archives hosted on spoofed websites. Kaspersky uncovered more than 90 domain names localized across 10 languages, with fake sites impersonating software such as OBS Studio, DNS Jumper, DS4Windows, Bandicam, Glary Utilities, and Process Hacker.\u003c/p\u003e\n\n\u003cp\u003eIn the initial incident, ScreenConnect spawned suspicious PowerShell and VBS scripts that changed Microsoft Defender exclusions, disabled User Account Control prompts, and launched a loader chain from the C:\\Users\\Public directory. The loader decrypted a PE binary from encoded data, reflectively loaded it, and used process hollowing to run AsyncRAT inside RegAsm.exe. Persistence was established through a scheduled task named MasterPackager.Updater that ran every two minutes, and the resulting RegAsm.exe process connected to the AsyncRAT C2 domain mora1987[.]work[.]gd.\u003c/p\u003e\n\n\u003cp\u003eKaspersky traced the ScreenConnect installation to an archive downloaded from a typosquatted OBS Studio site, studioobs[.]com, which appeared in search engine results. The archive contained a legitimate Microsoft-signed install.exe, a malicious install.res.1033.dll loaded through DLL sideloading, and renamed MSI packages that installed both ScreenConnect and the impersonated software. The article states that the campaign affects both everyday consumers and corporate networks, and that its potential objective is credential theft and unauthorized access for later resale on dark web marketplaces.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Kaspersky MDR investigated an incident in which ScreenConnect was used to deploy and execute an AsyncRAT payload on a compromised system.","The investigation traced the ScreenConnect installation to a user-downloaded archive from a typosquatted OBS Studio website, studioobs.com, which appeared in search engine results.","The malicious archives contained a legitimate Microsoft-signed install.exe file and a rogue install.res.1033.dll library that was loaded through DLL sideloading to install ScreenConnect and the impersonated software.","After ScreenConnect ran, it created PowerShell and VBScript files that changed Microsoft Defender exclusions, disabled UAC prompts, loaded a decrypted PE file, injected AsyncRAT into RegAsm.exe, and created a scheduled task named MasterPackager.Updater for persistence.","Kaspersky identified more than 90 localized fake domains across 10 languages that impersonated popular software and used ScreenConnect command-and-control infrastructure to maintain access to compromised endpoints."],"insights":["The campaign’s use of a legitimate, signed Microsoft install.exe as a shared component gave investigators a reliable pivot for finding related fake installers across multiple software brands.","The attackers renamed MSI installer packages as .dll files, so defenders should not rely on file extensions alone when assessing installer archives.","The fake sites often appeared at the top of organic search results, showing that users could reach the malware through ordinary software searches rather than suspicious links or ads.","ScreenConnect activity became suspicious not simply because the tool was present, but because it ran as an Access or Support service with explicit server parameters and spawned tools such as PowerShell, schtasks, msiexec, and rundll32.","The loader chain deliberately excluded RegAsm.exe and broad disk paths from Microsoft Defender scanning before injecting AsyncRAT into RegAsm.exe, making Defender exclusion changes and unusual RegAsm.exe behavior especially important signals."],"referencedReports":[],"body":"\u003cp\u003eKaspersky Managed Detection and Response investigated an incident in which the legitimate ScreenConnect remote access tool was used to deploy and execute AsyncRAT. The investigation expanded from a single case into a large campaign using malicious installer archives hosted on spoofed websites. Kaspersky uncovered more than 90 domain names localized across 10 languages, with fake sites impersonating software such as OBS Studio, DNS Jumper, DS4Windows, Bandicam, Glary Utilities, and Process Hacker.\u003c/p\u003e\n\n\u003cp\u003eIn the initial incident, ScreenConnect spawned suspicious PowerShell and VBS scripts that changed Microsoft Defender exclusions, disabled User Account Control prompts, and launched a loader chain from the C:\\Users\\Public directory. The loader decrypted a PE binary from encoded data, reflectively loaded it, and used process hollowing to run AsyncRAT inside RegAsm.exe. Persistence was established through a scheduled task named MasterPackager.Updater that ran every two minutes, and the resulting RegAsm.exe process connected to the AsyncRAT C2 domain mora1987[.]work[.]gd.\u003c/p\u003e\n\n\u003cp\u003eKaspersky traced the ScreenConnect installation to an archive downloaded from a typosquatted OBS Studio site, studioobs[.]com, which appeared in search engine results. The archive contained a legitimate Microsoft-signed install.exe, a malicious install.res.1033.dll loaded through DLL sideloading, and renamed MSI packages that installed both ScreenConnect and the impersonated software. The article states that the campaign affects both everyday consumers and corporate networks, and that its potential objective is credential theft and unauthorized access for later resale on dark web marketplaces.\u003c/p\u003e\n"},{"n":3,"title":"New ChocoPoC malware targets researchers via trojanized PoC exploits","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-chocopoc-malware-targets-researchers-via-trojanized-poc-exploits/","time":"20:08","priority":"SHOULD READ","score":82,"tldr":"Attackers are targeting cybersecurity researchers with GitHub proof-of-concept exploits that look legitimate but install malicious PyPI dependencies delivering the ChocoPoC RAT. Researchers should treat unverified PoCs as hostile and run them only in isolated environments.","briefOverview":"\u003cp\u003eMultiple weaponized proof-of-concept exploits on GitHub were found delivering a Python-based remote access trojan named ChocoPoC. The campaign is believed to target cybersecurity researchers who download and test PoC exploits. Sekoia identified at least seven GitHub repositories distributing ChocoPoC through exploits for vulnerabilities affecting FortiWeb, React2Shell, MongoBleed, PAN-OS, Ivanti Sentry, Check Point VPN, and Joomla SP Page Builder.\u003c/p\u003e\n\n\u003cp\u003eChocoPoC stands out because the malware is not embedded directly in the exploit file. Instead, malicious Python packages are added to the PoC dependency list, with a trojanized package named frint pulling a malicious dependency named skytext from PyPI. When the PoC runs, a compiled native Python extension decrypts embedded Python code, triggers a downloader, and retrieves the final ChocoPoC payload from a Mapbox dataset.\u003c/p\u003e\n\n\u003cp\u003eThe RAT can execute shell commands and Python code, upload files and directories, collect browser passwords, cookies, autofill data, and browsing history, search for documents and database files, gather shell history and network configuration, and enumerate running processes. Sekoia found that skytext was downloaded 2,400 times, mostly on Linux-based systems, with download surges after disclosure of a popular vulnerability. The researchers assessed with high confidence that the attacker primarily used compromised accounts to publish malicious PyPI packages and PoC repositories, and they recommend running unverified code only in isolated environments.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Multiple weaponized proof-of-concept exploits on GitHub were found delivering a Python-based remote access trojan named ChocoPoC in a campaign believed to target cybersecurity researchers.","ChocoPoC is delivered through malicious Python packages added to the proof-of-concept dependency list, rather than by embedding the malware directly in the exploit file.","Sekoia identified at least seven GitHub proof-of-concept repositories distributing ChocoPoC for vulnerabilities affecting FortiWeb, React2Shell, MongoBleed, PAN-OS, Ivanti Sentry, Check Point VPN, and Joomla SP Page Builder.","The skytext package used in the campaign was downloaded 2,400 times, mostly on Linux-based systems, with download spikes following disclosure of a popular vulnerability.","Sekoia assessed with high confidence that the attacker primarily used compromised accounts to publish malicious PyPI packages and proof-of-concept repositories."],"insights":["The campaign’s delivery method is harder to spot because the exploit code can remain intact while the malicious behavior is shifted into seemingly harmless dependency packages.","The attackers used PyPI as part of the infection chain, meaning reviewing only the GitHub repository code may not reveal the malware risk.","Mapbox datasets were used both to retrieve the final ChocoPoC payload and to exfiltrate data, showing that legitimate online services can be abused in multiple stages of the same campaign.","Download spikes after disclosure of a popular vulnerability show that newly publicized flaws can quickly become lures for researchers seeking proof-of-concept code.","Sekoia’s findings indicate that compromised accounts were likely used to publish the malicious packages and repositories, reducing the reliability of judging a project by account identity alone."],"referencedReports":[{"title":"Don’t eat the ChocoPOCs: How vulnerability researchers were repeatedly targeted by trojanised exploits","url":"https://www.sekoia.com/blog/dont-eat-the-chocopocs-how-vulnerability-researchers-were-repeatedly-targeted-by-trojanised-exploits","publisher":"Sekoia","context":"The article cites Sekoia’s research as the source for findings on the ChocoPoC campaign, malicious PyPI packages, GitHub repositories, download counts, and attacker account usage.","category":"research","primary":true}],"body":"\u003cp\u003eMultiple weaponized proof-of-concept exploits on GitHub were found delivering a Python-based remote access trojan named ChocoPoC. The campaign is believed to target cybersecurity researchers who download and test PoC exploits. Sekoia identified at least seven GitHub repositories distributing ChocoPoC through exploits for vulnerabilities affecting FortiWeb, React2Shell, MongoBleed, PAN-OS, Ivanti Sentry, Check Point VPN, and Joomla SP Page Builder.\u003c/p\u003e\n\n\u003cp\u003eChocoPoC stands out because the malware is not embedded directly in the exploit file. Instead, malicious Python packages are added to the PoC dependency list, with a trojanized package named frint pulling a malicious dependency named skytext from PyPI. When the PoC runs, a compiled native Python extension decrypts embedded Python code, triggers a downloader, and retrieves the final ChocoPoC payload from a Mapbox dataset.\u003c/p\u003e\n\n\u003cp\u003eThe RAT can execute shell commands and Python code, upload files and directories, collect browser passwords, cookies, autofill data, and browsing history, search for documents and database files, gather shell history and network configuration, and enumerate running processes. Sekoia found that skytext was downloaded 2,400 times, mostly on Linux-based systems, with download surges after disclosure of a popular vulnerability. The researchers assessed with high confidence that the attacker primarily used compromised accounts to publish malicious PyPI packages and PoC repositories, and they recommend running unverified code only in isolated environments.\u003c/p\u003e\n"},{"n":14,"title":"US lifts export controls on Anthropic’s frontier cybersecurity AI models","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/us-lifts-export-controls-anthropic-cyber-models","time":"13:16","priority":"SHOULD READ","score":82,"tldr":"The U.S. lifted export controls on Anthropic’s Fable 5 and Mythos 5 cybersecurity AI models after Anthropic agreed to new safeguards, government pre-release testing, and jailbreak reporting measures. The reversal may shape how frontier AI cybersecurity tools are regulated going forward.","briefOverview":"\u003cp\u003eAnthropic restored global access to its Fable 5 model after the U.S. government lifted export controls that had barred foreign nationals from accessing the advanced cybersecurity-focused AI tool. The restrictions had led Anthropic to disable access for all customers for roughly three weeks to ensure compliance. Export controls on the more powerful Mythos 5 model were also fully lifted as of June 30, though access remains limited to vetted U.S. organizations through Project Glasswing.\u003c/p\u003e\n\n\u003cp\u003eThe episode was significant because it marked the first known use of export control authorities to remove AI software, rather than chips or hardware, from public access. Anthropic said the initial shutdown was triggered by a jailbreak technique covered in an Amazon research report, but Katie Moussouris of Luta Security argued that the described process was normal defensive work: finding, fixing, and testing code. Anthropic also said its testing found the same technique worked against other models, including OpenAI’s GPT-5.5 and Kimi K2.7, which did not face comparable restrictions.\u003c/p\u003e\n\n\u003cp\u003eAs part of the agreement to restore Fable 5 access, Anthropic trained a new safety classifier that it says blocks the specific technique in more than 99% of cases. The company also committed to expanded pre-release government evaluation, rapid disclosure of significant jailbreaks, joint research resources, participation in a voluntary security standard, and a HackerOne bug bounty program for cyber jailbreak submissions. More than 100 cybersecurity professionals had signed an open letter warning that the controls could harm defenders while adversaries’ models continue to advance.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Anthropic restored global access to its Fable 5 model after the U.S. government lifted export controls that had forced a roughly three-week shutdown.","Export controls on Anthropic’s Mythos 5 model were also fully lifted as of June 30, but access remains limited to vetted U.S. organizations through Project Glasswing.","Anthropic said the initial shutdown was triggered by a jailbreak technique from an Amazon research report, but later testing found the same technique worked against other models including OpenAI’s GPT-5.5 and Kimi K2.7.","As part of the agreement to restore access, Anthropic trained a new safety classifier that it says blocks the specific technique in more than 99% of cases and committed to expanded government evaluation and rapid jailbreak disclosure.","More than 100 cybersecurity professionals signed an open letter warning that the export controls could do more harm than good by removing advanced defensive capabilities while adversaries’ models continue to improve."],"insights":["The reversal may set a precedent for regulating frontier AI models in the U.S. because the original action was the first known use of export control authorities to remove AI software, rather than chips or hardware, from public access.","The disputed “jailbreak” centered on using AI to find, fix, and test vulnerable code, which Katie Moussouris argued is also one of the model’s core defensive uses and cannot be removed without reducing its value to legitimate security work.","Anthropic’s testing weakened the case for model-specific restrictions by finding that the same technique worked against OpenAI’s GPT-5.5 and Kimi K2.7, which did not face comparable export controls.","The agreement points toward a regulatory model based on pre-release government testing, rapid jailbreak disclosure, bug bounties, and shared severity scoring rather than a broad shutdown of model access.","The open letter’s concern was not just about Anthropic’s access but about competitive defensive capability, arguing that Chinese open-weight models are only months behind leading U.S. models."],"referencedReports":[{"title":"The Fable 5 Export Controls Harm US Cyber Defense","url":"https://www.lutasecurity.com/post/the-fable-5-export-controls-harm-us-cyber-defense","publisher":"Luta Security","context":"The article cites Katie Moussouris of Luta Security as describing in detail the technique that triggered the initial shutdown and arguing it was not a guardrail bypass.","category":"opinion","primary":false}],"body":"\u003cp\u003eAnthropic restored global access to its Fable 5 model after the U.S. government lifted export controls that had barred foreign nationals from accessing the advanced cybersecurity-focused AI tool. The restrictions had led Anthropic to disable access for all customers for roughly three weeks to ensure compliance. Export controls on the more powerful Mythos 5 model were also fully lifted as of June 30, though access remains limited to vetted U.S. organizations through Project Glasswing.\u003c/p\u003e\n\n\u003cp\u003eThe episode was significant because it marked the first known use of export control authorities to remove AI software, rather than chips or hardware, from public access. Anthropic said the initial shutdown was triggered by a jailbreak technique covered in an Amazon research report, but Katie Moussouris of Luta Security argued that the described process was normal defensive work: finding, fixing, and testing code. Anthropic also said its testing found the same technique worked against other models, including OpenAI’s GPT-5.5 and Kimi K2.7, which did not face comparable restrictions.\u003c/p\u003e\n\n\u003cp\u003eAs part of the agreement to restore Fable 5 access, Anthropic trained a new safety classifier that it says blocks the specific technique in more than 99% of cases. The company also committed to expanded pre-release government evaluation, rapid disclosure of significant jailbreaks, joint research resources, participation in a voluntary security standard, and a HackerOne bug bounty program for cyber jailbreak submissions. More than 100 cybersecurity professionals had signed an open letter warning that the controls could harm defenders while adversaries’ models continue to advance.\u003c/p\u003e\n"},{"n":16,"title":"AI-Generated Browser Ransomware Abuses Chromium API on Windows and Android","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/ai-generated-browser-ransomware-abuses.html","time":"12:59","priority":"SHOULD READ","score":82,"tldr":"Check Point researchers found AI-generated malware dubbed InfernoGrabber that uses Chromium’s File System Access API to run browser-only ransomware on Windows and Android after tricking users into granting folder access. The key concern is that LLMs like DeepSeek may lower the skill needed to discover and build novel attack chains using legitimate browser features.","briefOverview":"\u003cp\u003eCheck Point researchers flagged a malware artifact generated using DeepSeek that created a working browser-only ransomware technique for Windows and Android devices. The sample is a Python Flask application named “deepseek_python_20260125_da0631.py,” uploaded to VirusTotal on January 25, 2026, and described there as a fully functional information stealer and ransomware toolkit. The malware author named it InfernoGrabber v9.0, and the application is designed to operate as a malicious web server using a fake Discord avatar AI upscaler as a lure.\u003c/p\u003e\n\n\u003cp\u003eThe article says the technique tricks a user into granting file system access to a web page, after which the page can enumerate files in the selected folder, read and exfiltrate their contents, encrypt and overwrite them, and display an extortion note. Check Point emphasized that this can occur without installing a native payload, exploiting a browser vulnerability, or requiring root access. The approach is limited to browsers exposing the picker-based File System Access API, including Google Chrome and other Chromium-based browsers on Windows and Android, and there is no evidence that this browser-native ransomware pattern has been abused in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe broader significance is that Check Point says DeepSeek helped bridge a gap between a theoretical browser-only ransomware risk and a practical attack chain. The article states that DeepSeek’s models have lower refusal rates for malicious cyber requests compared with Western counterparts from Anthropic, Google, or OpenAI, and that the sample could be generated from a single broad prompt. Check Point argues this shows AI can lower the expertise needed to produce offensive code and may surface unusual attack techniques by combining legitimate platform features in unexpected ways.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Check Point researchers flagged a malware artifact generated using DeepSeek that combines unrealistic browser-malware concepts with a real browser capability to create a working ransomware technique running entirely inside the browser on Windows and Android devices.","The sample, named InfernoGrabber v9.0 by its author, is a Python Flask application uploaded to VirusTotal on January 25, 2026 and described as a fully functional information stealer and ransomware toolkit.","The malicious web server lures victims with a fake Discord avatar AI upscaler while including functions to steal Discord tokens, harvest credit card numbers and cryptocurrency seed phrases, log keystrokes, capture webcam and microphone feeds, and exfiltrate data through a hard-coded Discord webhook.","The browser-only ransomware technique tricks users into granting file system access to a web page, then enumerates files in the selected folder, reads and exfiltrates their contents, encrypts and overwrites them, and displays an extortion note without installing a native payload, exploiting a browser vulnerability, or requiring root access.","Check Point said the approach is limited to browsers exposing the picker-based File System Access API, including Google Chrome and other Chromium-based browsers on Windows and Android, and there is no evidence the browser-native ransomware pattern has been abused in the wild."],"insights":["The article highlights that the ransomware path does not depend on a browser flaw; it abuses a legitimate permission prompt, making user consent to file access the critical security decision.","Check Point’s analysis suggests that a broad malicious prompt can be enough for an AI model to surface an attack technique the requester may not know exists, shifting discovery of novel methods away from only skilled human attackers.","DeepSeek is presented as a particular concern because the article says it has lower refusal rates for malicious cyber requests than Western models and can generate a working malicious application from a single broad prompt.","The technique is especially notable because it affects both Windows and Android through Chromium-based browsers, extending the concern beyond traditional desktop ransomware scenarios.","The article says there is no evidence this browser-native ransomware pattern has been used in the wild, which makes the finding an early warning rather than a report of an active campaign."],"referencedReports":[{"title":"Browser-Only Ransomware: From LLM Hallucinations to a Practical Attack Technique","url":"https://research.checkpoint.com/2026/browser-only-ransomware-from-llm-hallucinations-to-a-practical-attack-technique/","publisher":"Check Point Research","context":"The article cites Check Point’s research as the basis for the findings about AI-generated browser-only ransomware abusing Chromium’s File System Access API.","category":"research","primary":true}],"body":"\u003cp\u003eCheck Point researchers flagged a malware artifact generated using DeepSeek that created a working browser-only ransomware technique for Windows and Android devices. The sample is a Python Flask application named “deepseek_python_20260125_da0631.py,” uploaded to VirusTotal on January 25, 2026, and described there as a fully functional information stealer and ransomware toolkit. The malware author named it InfernoGrabber v9.0, and the application is designed to operate as a malicious web server using a fake Discord avatar AI upscaler as a lure.\u003c/p\u003e\n\n\u003cp\u003eThe article says the technique tricks a user into granting file system access to a web page, after which the page can enumerate files in the selected folder, read and exfiltrate their contents, encrypt and overwrite them, and display an extortion note. Check Point emphasized that this can occur without installing a native payload, exploiting a browser vulnerability, or requiring root access. The approach is limited to browsers exposing the picker-based File System Access API, including Google Chrome and other Chromium-based browsers on Windows and Android, and there is no evidence that this browser-native ransomware pattern has been abused in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe broader significance is that Check Point says DeepSeek helped bridge a gap between a theoretical browser-only ransomware risk and a practical attack chain. The article states that DeepSeek’s models have lower refusal rates for malicious cyber requests compared with Western counterparts from Anthropic, Google, or OpenAI, and that the sample could be generated from a single broad prompt. Check Point argues this shows AI can lower the expertise needed to produce offensive code and may surface unusual attack techniques by combining legitimate platform features in unexpected ways.\u003c/p\u003e\n"},{"n":17,"title":"Ousaban Banking Trojan Targets Iberian Bank Users with Fake PDF Lures","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/ousaban-banking-trojan-targets-iberian.html","time":"15:26","priority":"SHOULD READ","score":82,"tldr":"Ousaban, a Brazilian banking trojan, is targeting Windows users in Spain and Portugal with fake corrupted-PDF lures that geofence victims and hide the payload inside an image. Once installed, it waits for banking sessions to steal credentials and enable account takeover.","briefOverview":"\u003cp\u003eA Brazilian banking trojan called \u003cstrong\u003eOusaban\u003c/strong\u003e is targeting Windows users who bank in Spain and Portugal, according to a May 2026 campaign identified by Fortinet\u0026rsquo;s FortiGuard Labs. The campaign begins with a phishing PDF disguised as a corrupted file that prompts the victim to press an \u0026ldquo;Atualizar\u0026rdquo; button. The goal is to steal banking logins and take over accounts.\u003c/p\u003e\n\n\u003cp\u003eOusaban waits quietly on an infected Windows PC until the user opens a targeted banking site. When a target bank loads, it can capture screenshots and keystrokes, tamper with the clipboard, show fake messages, and give the attacker remote control. The malware watches for more than two dozen banks across Spain and Portugal, including Banco Santander, BBVA, CaixaBank, Bankinter, and Caixa Geral de Depósitos.\u003c/p\u003e\n\n\u003cp\u003eThe delivery chain screens visitors so that users outside Spain or Portugal receive a Spanish \u0026ldquo;access denied\u0026rdquo; notice instead of malware. If the visitor passes the check, a script downloads an image that looks like a PDF icon but hides a ZIP file containing Ousaban, then runs the malware and deletes the image, ZIP, and script. Fortinet says defenders should watch for a registry Run key named \u003cstrong\u003eFinanceiro\u003c/strong\u003e and files dropped to \u003ccode\u003eC:\\SysMain\\_5874288\u003c/code\u003e.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Fortinet's FortiGuard Labs identified a May 2026 campaign in which the Brazilian banking trojan Ousaban targets Windows users who bank in Spain and Portugal.","The attack begins with a phishing PDF disguised as a corrupted file that prompts the victim to press an \"Atualizar\" button, which opens a malicious webpage.","The campaign screens visitors so that users outside Spain or Portugal receive a Spanish \"access denied\" notice instead of the malware.","After passing the screening, a script downloads an image that looks like a PDF icon but hides a ZIP file containing Ousaban, then runs the malware and deletes evidence of the download.","Once installed, Ousaban waits for the user to open targeted banking sites and can capture screenshots and keystrokes, tamper with the clipboard, show fake messages, and give attackers remote control."],"insights":["Automated sandbox checks may miss the campaign because the operators moved visitor screening to the server side, meaning a sandbox that only fetches the link may see only an \"access denied\" page instead of the malware.","Blocking a single command server address is unlikely to be effective because Ousaban generates a new real server location each day using the current date from a Google page and a fixed secret.","The Pastebin-based server address embedded in Ousaban is a decoy, so defenders should not assume that the visible command server reference is the real control infrastructure.","The persistence artifact is unusually specific and actionable: Fortinet says defenders should watch for a Windows registry Run key named \"Financeiro\" and files dropped under C:\\SysMain\\_5874288.","The campaign combines older Ousaban behavior with a newer delivery wrapper that uses geofencing, a hidden payload inside an image, and throwaway daily infrastructure to limit exposure to non-victims and security tools."],"referencedReports":[{"title":"Analysis of Ongoing Ousaban Attacks Targeting the Iberian Peninsula","url":"https://www.fortinet.com/blog/threat-research/analysis-of-ongoing-ousaban-attacks-targeting-the-iberian-peninsula","publisher":"Fortinet FortiGuard Labs","context":"The article says Fortinet's FortiGuard Labs identified the May 2026 Ousaban campaign and later cites Fortinet's findings on screening, infrastructure, indicators, and detections.","category":"research","primary":true},{"title":"The Tetrade: Brazilian banking malware","url":"https://securelist.com/the-tetrade-brazilian-banking-malware/97779/","publisher":"Kaspersky Securelist","context":"The article references Kaspersky's earlier labeling of Ousaban/Javali, Grandoreiro, Guildma, and Melcoz as the \"Tetrade\" of Brazilian banking trojans.","category":"research","primary":false}],"body":"\u003cp\u003eA Brazilian banking trojan called \u003cstrong\u003eOusaban\u003c/strong\u003e is targeting Windows users who bank in Spain and Portugal, according to a May 2026 campaign identified by Fortinet\u0026rsquo;s FortiGuard Labs. The campaign begins with a phishing PDF disguised as a corrupted file that prompts the victim to press an \u0026ldquo;Atualizar\u0026rdquo; button. The goal is to steal banking logins and take over accounts.\u003c/p\u003e\n\n\u003cp\u003eOusaban waits quietly on an infected Windows PC until the user opens a targeted banking site. When a target bank loads, it can capture screenshots and keystrokes, tamper with the clipboard, show fake messages, and give the attacker remote control. The malware watches for more than two dozen banks across Spain and Portugal, including Banco Santander, BBVA, CaixaBank, Bankinter, and Caixa Geral de Depósitos.\u003c/p\u003e\n\n\u003cp\u003eThe delivery chain screens visitors so that users outside Spain or Portugal receive a Spanish \u0026ldquo;access denied\u0026rdquo; notice instead of malware. If the visitor passes the check, a script downloads an image that looks like a PDF icon but hides a ZIP file containing Ousaban, then runs the malware and deletes the image, ZIP, and script. Fortinet says defenders should watch for a registry Run key named \u003cstrong\u003eFinanceiro\u003c/strong\u003e and files dropped to \u003ccode\u003eC:\\SysMain\\_5874288\u003c/code\u003e.\u003c/p\u003e\n"},{"n":19,"title":"19-Year-Old Scattered Spider Suspect Extradited to Face U.S. Hacking Charges","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/19-year-old-scattered-spider-suspect.html","time":"19:28","priority":"SHOULD READ","score":82,"tldr":"A 19-year-old alleged Scattered Spider member has been extradited from Finland to the U.S. to face hacking, fraud, and extortion charges tied to multiple intrusions. The case highlights a widening law-enforcement crackdown on the social-engineering crew behind major attacks on casinos, retailers, insurers, and airlines.","briefOverview":"\u003cp\u003ePeter Stokes, a 19-year-old dual U.S. and Estonian citizen accused of belonging to Scattered Spider, has been extradited from Finland to face U.S. charges of conspiracy, computer intrusion, and fraud. The U.S. Department of Justice announced the extradition on July 1, and Stokes appeared in a Chicago federal court on June 30, where a judge ordered him held in custody. Finnish police arrested him in April on an Interpol Red Notice before his extradition in late June.\u003c/p\u003e\n\n\u003cp\u003eCourt records identify Stokes by the online handle “Bouquet” and describe at least four intrusions, the first when he was 16. In one May 2025 case, prosecutors say he and others broke into a luxury jewelry retailer, copied its data, and demanded about \u003cspan class=\"math inline\"\u003e\\(8 million in cryptocurrency. The retailer refused to pay, removed the intruders, and spent at least \\)\u003c/span\u003e2 million cleaning up, while Finnish officers seized two 2-terabyte hard drives when they stopped Stokes at Helsinki airport.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Scattered Spider as a loose, mostly English-speaking group of young people tracked under names including Octo Tempest, UNC3944, and 0ktapus. Its members often gain access by calling company IT help desks, pretending to be locked-out workers, and persuading staff to reset passwords or approve logins. The group has been linked to attacks on casinos, retailers, insurers, and airlines, and the article frames Stokes’s case as part of a wider law enforcement crackdown on members of the crew.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Peter Stokes, a 19-year-old dual U.S. and Estonian citizen accused of belonging to Scattered Spider, was extradited from Finland to face U.S. charges of conspiracy, computer intrusion, and fraud.","Court records identify Stokes by the online handle \"Bouquet\" and describe at least four intrusions, including a May 2025 intrusion at a luxury jewelry retailer where attackers allegedly demanded about $8 million in cryptocurrency.","Scattered Spider is described as a loose, mostly English-speaking group of young people that uses help desk impersonation to gain access to company systems, steal files, and threaten leaks unless paid.","The group has been linked to major attacks on MGM Resorts and Caesars Entertainment in 2023 and later attacks on U.K. retailers, U.S. insurers, and airlines.","Recent arrests and guilty pleas involving alleged Scattered Spider members in the U.S. and U.K. show a broader law enforcement crackdown on the group."],"insights":["The article emphasizes that Scattered Spider’s most important weakness to exploit is often the help desk rather than the firewall, making stricter identity checks before password resets a practical defensive priority.","The group’s methods have continued to matter even after arrests, because Mandiant reported that other crews are already copying Scattered Spider’s playbook.","A joint advisory cited in the article warns that intruders may join a company’s internal chat tools and breach-response calls, allowing them to watch the people trying to remove them.","Devices seized from one alleged member, such as the two 2-terabyte hard drives taken from Stokes in Helsinki, may be valuable to investigators because they can lead to other members."],"referencedReports":[{"title":"Scattered Spider","url":"https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-320a","publisher":"CISA","context":"The article cites a joint U.S. and international advisory warning that Scattered Spider intruders may monitor company chat tools and join breach-response calls.","category":"advisory","primary":false}],"body":"\u003cp\u003ePeter Stokes, a 19-year-old dual U.S. and Estonian citizen accused of belonging to Scattered Spider, has been extradited from Finland to face U.S. charges of conspiracy, computer intrusion, and fraud. The U.S. Department of Justice announced the extradition on July 1, and Stokes appeared in a Chicago federal court on June 30, where a judge ordered him held in custody. Finnish police arrested him in April on an Interpol Red Notice before his extradition in late June.\u003c/p\u003e\n\n\u003cp\u003eCourt records identify Stokes by the online handle “Bouquet” and describe at least four intrusions, the first when he was 16. In one May 2025 case, prosecutors say he and others broke into a luxury jewelry retailer, copied its data, and demanded about \u003cspan class=\"math inline\"\u003e\\(8 million in cryptocurrency. The retailer refused to pay, removed the intruders, and spent at least \\)\u003c/span\u003e2 million cleaning up, while Finnish officers seized two 2-terabyte hard drives when they stopped Stokes at Helsinki airport.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Scattered Spider as a loose, mostly English-speaking group of young people tracked under names including Octo Tempest, UNC3944, and 0ktapus. Its members often gain access by calling company IT help desks, pretending to be locked-out workers, and persuading staff to reset passwords or approve logins. The group has been linked to attacks on casinos, retailers, insurers, and airlines, and the article frames Stokes’s case as part of a wider law enforcement crackdown on members of the crew.\u003c/p\u003e\n"},{"n":21,"title":"Anthropic Restores Claude Fable 5 After U.S. Lifts Jailbreak-Linked Export Controls","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/anthropic-restores-claude-fable-5-after.html","time":"06:46","priority":"SHOULD READ","score":82,"tldr":"Anthropic restored global access to Claude Fable 5 after the U.S. lifted emergency export controls triggered by a jailbreak concern, following new safety filters and government commitments. The episode highlights Washington’s still-improvised approach to regulating powerful dual-use AI models.","briefOverview":"\u003cp\u003eAnthropic is restoring Claude Fable 5 worldwide on July 1 after the U.S. Commerce Department lifted export controls imposed about two and a half weeks earlier. The June 12 order had required Anthropic to cut off Fable 5 and Mythos 5 for any foreign national, including non-citizen staff inside or outside the United States. Because Anthropic said it could not reliably check every user’s nationality in real time, it shut both models down for everyone.\u003c/p\u003e\n\n\u003cp\u003eThe controls were triggered by a jailbreak found by Amazon researchers, which Anthropic says made Fable 5 flag some software flaws and, in one case, write code showing how a flaw could be abused. Anthropic trained a new classifier to detect the reported technique and says it now blocks it in more than 99% of attempts. Blocked requests are routed to the weaker Claude Opus 4.8, with users notified, though Anthropic says the change creates more false alarms for normal coding and debugging.\u003c/p\u003e\n\n\u003cp\u003eMythos 5 remains more restricted, with access restored June 26 for roughly 100 U.S. companies and federal agencies that defend critical infrastructure. Anthropic also agreed to look for security problems, coordinate with the government on future launches, report malicious use, and give the U.S. government earlier access to test future frontier models. The article says the episode shows that when Washington wants to move quickly on a frontier model, it still lacks a binding process and instead used improvised export controls.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Anthropic is restoring Claude Fable 5 worldwide on July 1 after the U.S. Commerce Department lifted export controls imposed on Fable 5 and Mythos 5 about two and a half weeks earlier.","The June 12 order required Anthropic to cut off both models for any foreign national, and the company shut both models down for everyone because it could not reliably verify every user’s nationality in real time.","The controls were triggered by a jailbreak found by Amazon researchers that Anthropic says made Fable 5 flag some software flaws and, in one case, write code showing how a flaw could be abused.","Anthropic trained a new classifier that it says blocks the reported jailbreak technique in more than 99% of attempts, while blocked requests are handed to Claude Opus 4.8 and users are told.","Mythos 5 access returned on June 26 for roughly 100 U.S. companies and federal agencies that defend critical infrastructure, while Anthropic continues working with the government to widen access."],"insights":["The government used export controls as an emergency workaround because, according to the article, Washington still lacks a binding process for quickly regulating frontier AI model releases.","Anthropic’s mitigation does not simply block risky requests; it routes blocked Fable 5 requests to the weaker Claude Opus 4.8 and tells the user, accepting more false alarms on normal coding and debugging.","The same underlying model is being treated differently based on safety guardrails and user group, with Fable 5 restored worldwide while Mythos 5 remains limited to about 100 U.S. companies and federal agencies defending critical infrastructure.","Anthropic is pushing for jailbreaks to be ranked by practical harm, including capability gain, breadth, ease of weaponization, and discoverability, rather than treating every safety bypass as equally severe.","Competitive pressure shaped the policy debate, as the article says the pause came while cheap, capable Chinese open-source models were gaining ground and executives warned that freezing U.S. models gave rivals time to catch up."],"referencedReports":[],"body":"\u003cp\u003eAnthropic is restoring Claude Fable 5 worldwide on July 1 after the U.S. Commerce Department lifted export controls imposed about two and a half weeks earlier. The June 12 order had required Anthropic to cut off Fable 5 and Mythos 5 for any foreign national, including non-citizen staff inside or outside the United States. Because Anthropic said it could not reliably check every user’s nationality in real time, it shut both models down for everyone.\u003c/p\u003e\n\n\u003cp\u003eThe controls were triggered by a jailbreak found by Amazon researchers, which Anthropic says made Fable 5 flag some software flaws and, in one case, write code showing how a flaw could be abused. Anthropic trained a new classifier to detect the reported technique and says it now blocks it in more than 99% of attempts. Blocked requests are routed to the weaker Claude Opus 4.8, with users notified, though Anthropic says the change creates more false alarms for normal coding and debugging.\u003c/p\u003e\n\n\u003cp\u003eMythos 5 remains more restricted, with access restored June 26 for roughly 100 U.S. companies and federal agencies that defend critical infrastructure. Anthropic also agreed to look for security problems, coordinate with the government on future launches, report malicious use, and give the U.S. government earlier access to test future frontier models. The article says the episode shows that when Washington wants to move quickly on a frontier model, it still lacks a binding process and instead used improvised export controls.\u003c/p\u003e\n"},{"n":23,"title":"VEIL#DROP Malware Chain Uses Blogger Platform to Deliver PureLogs Stealer","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/07/veildrop-malware-chain-uses-blogger.html","time":"17:18","priority":"SHOULD READ","score":82,"tldr":"Researchers uncovered a multi-stage malware chain called VEIL#DROP that uses deceptive JavaScript files, PowerShell, and Blogger-hosted payloads to secretly deliver the PureLogs information stealer. The campaign abuses trusted services and living-off-the-land binaries to evade detection and reduce forensic traces.","briefOverview":"\u003cp\u003eCybersecurity researchers have identified a new multi-stage malware delivery chain called VEIL#DROP that uses social engineering and Blogger pages to deliver the PureLogs information stealer. Securonix suspects the initial payloads are distributed through spear-phishing or drive-by compromise. The chain begins with a JavaScript file disguised as a document, such as transcript.pdf.js, which runs through Windows Script Host and launches PowerShell with execution policy bypasses enabled.\u003c/p\u003e\n\n\u003cp\u003eThe PowerShell script retrieves a next-stage payload from a Blogger page, allowing attackers to abuse Google’s trusted infrastructure as a staging mechanism and blend in with legitimate web activity. The loader can display a benign page like Google to make it appear that a PDF document opened while the infection continues in the background. It also attempts to allow unrestricted PowerShell execution, terminate selected processes such as wscript.exe, delete the original JavaScript file, and decrypt an embedded payload.\u003c/p\u003e\n\n\u003cp\u003eSecuronix said the loader uses XOR decryption, dynamic Blogspot URL construction, runtime mutation, in-memory execution, and reflective .NET loading to reduce detection and forensic artifacts. If direct in-memory execution is blocked, it can fall back to Microsoft-signed binaries including regsvcs.exe, installutil.exe, msbuild.exe, and aspnet_compiler.exe. The article notes that PureLogs Stealer can harvest sensitive data from compromised hosts, and that stolen data may help attackers move deeper into an environment, establish persistence, perform lateral movement, or breach cloud infrastructure.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Securonix identified a new multi-stage malware delivery chain called VEIL#DROP that uses social engineering and Blogger pages to deliver the PureLogs information stealer.","The infection chain begins with a JavaScript file disguised as a document, such as transcript.pdf.js, which runs through Windows Script Host and launches PowerShell with execution policy bypasses enabled.","The PowerShell script retrieves a next-stage payload from a Blogger-hosted page, allowing the attackers to abuse Google’s trusted infrastructure as a staging mechanism.","The loader uses techniques including XOR decryption, dynamic Blogspot URL construction, runtime mutation, in-memory execution, and reflective .NET loading to evade detection and reduce disk artifacts.","If direct in-memory execution is blocked, the loader can fall back to Microsoft-signed binaries such as regsvcs.exe, installutil.exe, msbuild.exe, and aspnet_compiler.exe to execute the recovered .NET assemblies."],"insights":["The use of Blogger as a staging point lets the attackers blend malicious traffic with ordinary access to Google-owned infrastructure, making reputation-based blocking less reliable.","The loader changes its Blogspot URL format by inserting random forward slashes, so defenses that rely on exact URL matches or static indicators may miss related executions.","The malware does not depend on a single trusted Windows binary for fallback execution; it tries multiple Microsoft-signed tools in sequence, increasing the chance that at least one method will work.","The fake document behavior includes opening a benign page such as Google, which can make victims believe the file opened normally while the infection continues in the background.","The article highlights that PureLogs infections can have conseque
