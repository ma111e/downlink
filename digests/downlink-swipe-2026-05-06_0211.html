<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }

window.__DL_ARTICLES = [{"n":1,"title":"Copy Fail: What You Need to Know About the Most Severe Linux Threat in Years","source":"unit42.paloaltonetworks.com","sourceColor":"#c084fc","link":"https://unit42.paloaltonetworks.com/cve-2026-31431-copy-fail/","time":"23:00","priority":"MUST READ","score":96,"group":null,"groupColor":null,"tldr":"A highly reliable deterministic Linux kernel vulnerability (CVE-2026-31431) allows unprivileged users to consistently escalate to root across virtually all modern Linux distributions by exploiting a cryptographic subsystem flaw. Organizations must immediately apply vendor kernel patches or disable the vulnerable algif_aead module to prevent exploitation.","briefOverview":"\u003cp\u003eOn April 29, 2026, researchers publicly disclosed CVE-2026-31431, a critical local privilege escalation vulnerability known as Copy Fail. This deterministic logic flaw resides in the Linux kernel\u0026rsquo;s cryptographic subsystem and allows unprivileged users to consistently gain root access across virtually all major Linux distributions released since 2017. The vulnerability stems from a buggy in-place optimization introduced in 2017 that improperly chains page cache pages into a writable scatterlist during cryptographic operations. Attackers can exploit this flaw by manipulating the AF_ALG socket interface and the splice() system call to overwrite four bytes in the in-memory page cache of setuid-root binaries. Because the corruption occurs entirely in RAM, traditional file integrity monitoring tools remain blind to the compromise. A single 732-byte Python script successfully exploits the flaw on the first attempt without requiring race conditions or kernel-specific offsets. Palo Alto Networks strongly recommends applying vendor-issued kernel updates immediately, or disabling the vulnerable algif_aead module as an interim mitigation. Security teams should also monitor for anomalous process launches and proof-of-concept execution patterns to detect active exploitation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ePalo Alto Networks Unit 42 has published a detailed technical analysis of CVE-2026-31431, widely known as Copy Fail. This vulnerability represents one of the most severe Linux threats in recent years due to its exceptional reliability and broad impact. Publicly disclosed on April 29, 2026, the flaw enables unprivileged local attackers to consistently escalate privileges to root across virtually all major Linux distributions. The vulnerability affects Linux kernels ranging from version 4.14 to 6.19.12, impacting mainstream platforms such as Ubuntu, Red Hat Enterprise Linux, Debian, SUSE, Amazon Linux, and AlmaLinux. The root cause traces back to a combination of three independent kernel updates spanning from 2011 to 2017. A fatal in-place optimization introduced in 2017 causes the authencesn algorithm to improperly use the destination buffer as a scratch pad. During cryptographic operations, this bug writes four controlled bytes past the legitimate output region directly into the system\u0026rsquo;s file page cache. The vulnerability is located specifically within the algif_aead module of the AF_ALG user-space crypto API interface. Exploitation relies on misusing the interaction between the AF_ALG socket interface and the splice() system call. An attacker can supply a controlled four-byte overwrite value by manipulating the seqno_lo parameter inside the Associated Authenticated Data during a sendmsg() call. This overwrite targets the page cache of any readable setuid-root binary, such as /usr/bin/su or sudo. By injecting shellcode into the cached binary, the attacker forces the system to execute malicious code with superuser privileges. Unlike previous kernel exploits, Copy Fail is completely deterministic and does not rely on race conditions or memory offsets. A standalone 732-byte Python script can successfully exploit the flaw on the first attempt across different distributions without modification. The in-memory nature of the corruption ensures stealth, as physical files on disk remain unchanged and bypass traditional virtual file system integrity checks. Palo Alto Networks strongly urges organizations to apply vendor-issued kernel updates immediately. If patching is not feasible, administrators should implement an interim mitigation by disabling the algif_aead module using specific modprobe commands. The Linux Foundation has also published an official advisory detailing mitigation steps. Security teams can leverage Unit 42 managed threat hunting queries to detect exploitation attempts, including anomalous su process launches and correlated curl executions. Palo Alto Networks customers benefit from built-in protections through Cortex XDR, XSIAM, and Cortex Cloud endpoint security products.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary-vulnerability-overview\"\u003eExecutive Summary \u0026amp; Vulnerability Overview\u003c/h3\u003e\n\n\u003cp\u003ePalo Alto Networks Unit 42 has issued a comprehensive advisory regarding CVE-2026-31431, a critical local privilege escalation vulnerability commonly referred to as Copy Fail. Publicly disclosed on April 29, 2026, this flaw represents a severe and highly reliable threat to Linux environments. The vulnerability enables unprivileged local attackers to consistently escalate their access to root privileges across virtually all major Linux distributions released since 2017. It impacts Linux kernels ranging from version 4.14 to 6.19.12, affecting mainstream platforms including Ubuntu, Amazon Linux, Red Hat Enterprise Linux, Debian, SUSE, and AlmaLinux.\u003c/p\u003e\n\n\u003ch3 id=\"root-cause-technical-mechanism\"\u003eRoot Cause \u0026amp; Technical Mechanism\u003c/h3\u003e\n\n\u003cp\u003eThe vulnerability originates from a deterministic logic flaw within the Linux kernel\u0026rsquo;s cryptographic subsystem. Specifically, the issue resides in the algif_aead module of the AF_ALG interface, which serves as a user-space cryptographic API. The flaw resulted from a combination of three independent kernel updates:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe addition of the authencesn algorithm in 2011\u003c/li\u003e\n\u003cli\u003eThe AF_ALG interface gaining AEAD support in 2015\u003c/li\u003e\n\u003cli\u003eA fatal in-place optimization introduced in 2017 that improperly chains page cache pages into a writable scatterlist\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDuring cryptographic operations, the 2017 optimization bug causes the authencesn algorithm to misuse the destination buffer as a scratch pad. This error writes four controlled bytes past the legitimate output region directly into the system\u0026rsquo;s file page cache. The official patch resolves the issue by reverting the module to out-of-place operation, effectively separating the source and destination scatterlists to keep page cache pages strictly read-only.\u003c/p\u003e\n\n\u003ch3 id=\"exploitation-methodology-impact\"\u003eExploitation Methodology \u0026amp; Impact\u003c/h3\u003e\n\n\u003cp\u003eAttackers exploit this memory handling error by misusing the interaction between the AF_ALG socket interface and the splice() system call. When splice() hands page-cache pages into the crypto subsystem, the vulnerability allows the attacker to direct a four-byte overwrite straight into the kernel\u0026rsquo;s file page cache. The exploitation process involves the following steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe attacker controls the exact overwrite value by supplying the seqno_lo parameter inside bytes 4–7 of the Associated Authenticated Data during a sendmsg() call.\u003c/li\u003e\n\u003cli\u003eThe overwrite targets the page cache of any readable setuid-root binary, such as /usr/bin/su, sudo, or passwd.\u003c/li\u003e\n\u003cli\u003eBy manipulating the splice offset, splice length, and assoclen parameters, the attacker injects shellcode directly into the .text section of the cached binary.\u003c/li\u003e\n\u003cli\u003eWhen the binary executes, it grants the attacker UID 0 privileges, effectively breaking kernel trust boundaries.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe impact extends beyond simple privilege escalation. Because the kernel and page cache are shared across an entire node, this flaw allows attackers to easily break out of Kubernetes containers, overtake multi-tenant hosts, and compromise continuous integration and continuous delivery pipelines. The exploit is exceptionally severe due to its 100% reliability, deterministic nature, and lack of reliance on race conditions or kernel offsets. A single 732-byte Python script successfully exploits the flaw on the first attempt across different distributions without requiring compilation or external dependencies. Furthermore, the corruption occurs entirely in RAM, meaning physical files on disk remain unmodified and bypass traditional virtual file system integrity monitoring tools.\u003c/p\u003e\n\n\u003ch3 id=\"mitigation-detection-guidance\"\u003eMitigation \u0026amp; Detection Guidance\u003c/h3\u003e\n\n\u003cp\u003ePalo Alto Networks strongly recommends applying vendor-issued kernel updates immediately to resolve the vulnerability. If immediate patching is not feasible, administrators should implement an interim mitigation by disabling the affected algif_aead module. This can be accomplished by running the following commands as root:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eecho \u0026ldquo;install algif_aead /bin/false\u0026rdquo; \u0026gt; /etc/modprobe.d/disable-algif.conf\u003c/li\u003e\n\u003cli\u003ermmod algif_aead\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe Linux Foundation has also published an official advisory detailing mitigation steps for CVE-2026-31431. Security teams can leverage Unit 42 managed threat hunting queries to detect exploitation attempts across their environments. Recommended detection strategies include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMonitoring for non-root users launching the su process via an uncommon parent process\u003c/li\u003e\n\u003cli\u003eIdentifying correlated curl and su process executions within a two-minute window to flag proof-of-concept activity\u003c/li\u003e\n\u003cli\u003eUtilizing Cortex XDR and XSIAM behavioral threat protection modules to identify malicious operations targeting Linux endpoints\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"palo-alto-networks-protections\"\u003ePalo Alto Networks Protections\u003c/h3\u003e\n\n\u003cp\u003ePalo Alto Networks customers are protected against CVE-2026-31431 through multiple security products. Cortex XDR and XSIAM provide multi-layered defense using Advanced WildFire, Endpoint Protection Modules, Behavioral Threat Protection, and the Local Analysis module. Cortex Cloud endpoint protection leverages behavioral and AI-enabled analytics to detect and prevent malicious operations on Linux endpoints, including containers and virtual machines. Additionally, Cortex Cloud 2.1 can detect misused cloud platform IAM policies and alert teams when assets are vulnerable to these threats. Organizations requiring immediate assistance can engage the Unit 42 Incident Response team for proactive assessments or compromise remediation.\u003c/p\u003e\n","keyPoints":["CVE-2026-31431, commonly referred to as Copy Fail, is a deterministic local privilege escalation vulnerability in the Linux kernel's cryptographic subsystem that allows unprivileged attackers to consistently gain root access across virtually all major Linux distributions released since 2017.","The vulnerability originates from a buggy in-place optimization in the algif_aead module that improperly chains page cache pages into a writable scatterlist, allowing attackers to overwrite four bytes in the page cache of setuid-root binaries to inject shellcode.","The exploit is highly reliable and portable, as a single 732-byte Python script can successfully escalate privileges on the first attempt without requiring compilation or external dependencies.","Organizations are strongly advised to apply vendor-issued kernel updates immediately, or implement an interim mitigation by disabling the vulnerable algif_aead module if patching is not feasible."],"insights":["The vulnerability bypasses traditional file integrity monitoring and leaves no disk traces because it corrupts the in-memory page cache of setuid binaries rather than modifying the actual files on disk.","The flaw stems from a combination of three separate kernel updates across 2011, 2015, and 2017, where a 2017 in-place optimization bug improperly chains page cache pages into a writable scatterlist.","The shared nature of the kernel and page cache across an entire node allows this single vulnerability to facilitate container escapes in Kubernetes environments and compromise multi-tenant hosts.","Security teams can detect potential exploitation by monitoring for non-root users launching the su process via unexpected parent processes or looking for correlated curl and su executions within a two-minute window."],"referencedReports":[{"title":"Linux Foundation Advisory on CVE-2026-31431","url":"https://lore.kernel.org/linux-cve-announce/2026042214-CVE-2026-31431-3d65@gregkh/","publisher":"Linux Foundation","context":"The article explicitly cites this as an official advisory posted by the Linux Foundation containing mitigation details for the vulnerability."},{"title":"CVE-2026-31431 Copy Fail Vulnerability Enables Linux Root Privilege Escalation","url":"https://www.microsoft.com/en-us/security/blog/2026/05/01/cve-2026-31431-copy-fail-vulnerability-enables-linux-root-privilege-escalation/","publisher":"Microsoft Security","context":"The article references this Microsoft Security blog post to support claims regarding the vulnerability's deterministic nature and its consistent ability to escalate privileges across major Linux distributions."}],"body":"\u003cp\u003eOn April 29, 2026, researchers publicly disclosed CVE-2026-31431, a critical local privilege escalation vulnerability known as Copy Fail. This deterministic logic flaw resides in the Linux kernel\u0026rsquo;s cryptographic subsystem and allows unprivileged users to consistently gain root access across virtually all major Linux distributions released since 2017. The vulnerability stems from a buggy in-place optimization introduced in 2017 that improperly chains page cache pages into a writable scatterlist during cryptographic operations. Attackers can exploit this flaw by manipulating the AF_ALG socket interface and the splice() system call to overwrite four bytes in the in-memory page cache of setuid-root binaries. Because the corruption occurs entirely in RAM, traditional file integrity monitoring tools remain blind to the compromise. A single 732-byte Python script successfully exploits the flaw on the first attempt without requiring race conditions or kernel-specific offsets. Palo Alto Networks strongly recommends applying vendor-issued kernel updates immediately, or disabling the vulnerable algif_aead module as an interim mitigation. Security teams should also monitor for anomalous process launches and proof-of-concept execution patterns to detect active exploitation.\u003c/p\u003e\n"},{"n":2,"title":"New stealthy Quasar Linux malware targets software developers","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/new-stealthy-quasar-linux-malware-targets-software-developers/","time":"22:01","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"Quasar Linux (QLNX) is a stealthy, fileless malware implant targeting developer workstations and DevOps environments to steal credentials and facilitate supply-chain attacks through highly persistent, undetectable operations.","briefOverview":"\u003cp\u003eA previously undocumented Linux implant named Quasar Linux (QLNX) is actively targeting developer workstations and DevOps environments. The malware operates as a fileless, in-memory tool that dynamically compiles rootkit and backdoor modules on the host using gcc. It employs seven distinct persistence mechanisms, including LD_PRELOAD, systemd, and crontab, to ensure continuous operation even if the process is terminated. QLNX features a comprehensive suite of capabilities designed for stealth, credential harvesting, and lateral movement across networks. By compromising developer systems, threat actors can bypass enterprise security controls and steal credentials used in software delivery pipelines. This approach enables supply-chain attacks where malicious packages are published to platforms like npm, PyPI, and GitHub. Trend Micro researchers analyzed the implant and noted that it currently evades detection by most security vendors. Only four security solutions flag the QLNX binary as malicious at this time. The company has released indicators of compromise to help defenders identify and mitigate infections.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA previously undocumented Linux implant named Quasar Linux (QLNX) is targeting software developers and DevOps environments across multiple code distribution platforms. The malware kit is deployed through npm, PyPI, GitHub, AWS, Docker, and Kubernetes to facilitate supply-chain attacks. Researchers at Trend Micro analyzed the QLNX implant and discovered that it dynamically compiles rootkit shared objects and PAM backdoor modules on the target host using gcc. The malware is engineered for stealth and long-term persistence by running entirely in memory, deleting its original binary, wiping logs, spoofing process names, and clearing forensic environment variables. It utilizes seven distinct persistence mechanisms, including LD_PRELOAD, systemd, crontab, init.d scripts, XDG autostart, and bashrc injection. QLNX is structured around multiple functional blocks that serve as a complete attack toolkit. Its RAT core provides a 58-command framework for interactive shell access, file management, and persistent C2 communication over custom TCP/TLS or HTTP/S channels. A dual-layer rootkit combines a userland LD_PRELOAD component with a kernel-level eBPF module to hide files, processes, and network ports. The credential access layer harvests SSH keys, browser data, cloud configurations, and /etc/shadow while intercepting plaintext authentication via PAM backdoors. Additional modules enable keylogging, screenshot capture, clipboard monitoring, TCP tunneling, SOCKS proxying, and SSH-based lateral movement. The execution engine supports process injection and in-memory payload execution, while a filesystem monitoring module tracks activity via inotify. After establishing a fileless foothold, QLNX deploys these stealth mechanisms and proceeds to harvest developer and cloud credentials. This strategy allows attackers to bypass enterprise security controls and access the credentials that secure software delivery pipelines. The approach mirrors recent supply chain incidents where compromised developer accounts were used to publish trojanized packages to public repositories. Trend Micro has not disclosed specific attack details or attribution, leaving the deployment volume and activity levels unclear. Currently, only four security solutions detect the QLNX binary, and the company has published indicators of compromise for defensive use.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"introduction-and-targeting\"\u003eIntroduction and Targeting\u003c/h3\u003e\n\n\u003cp\u003eA previously undocumented Linux implant named Quasar Linux (QLNX) is actively targeting software developers and DevOps environments. The malware kit is designed to operate across development and DevOps ecosystems, specifically leveraging npm, PyPI, GitHub, AWS, Docker, and Kubernetes. This deployment strategy enables threat actors to execute supply-chain attacks by publishing malicious packages directly to code distribution platforms.\u003c/p\u003e\n\n\u003ch3 id=\"stealth-and-persistence-architecture\"\u003eStealth and Persistence Architecture\u003c/h3\u003e\n\n\u003cp\u003eResearchers at Trend Micro analyzed the QLNX implant and documented its highly evasive operational characteristics. The malware maintains a fileless foothold by running exclusively in memory and immediately deleting its original binary from disk. It actively wipes system logs, spoofs process names, and clears forensic environment variables to avoid detection. QLNX employs seven distinct persistence mechanisms to guarantee long-term survival, including LD_PRELOAD, systemd, crontab, init.d scripts, XDG autostart, and bashrc injection. These methods ensure the malware loads into every dynamically linked process and automatically respawns if terminated.\u003c/p\u003e\n\n\u003ch3 id=\"functional-modules-and-capabilities\"\u003eFunctional Modules and Capabilities\u003c/h3\u003e\n\n\u003cp\u003eQLNX operates as a complete attack toolkit composed of multiple specialized functional blocks. Its RAT core features a 58-command framework that provides interactive shell access, file and process management, and persistent command-and-control communication over custom TCP/TLS or HTTP/S channels. A dual-layer rootkit combines a userland LD_PRELOAD component with a kernel-level eBPF module to conceal files, processes, and network ports at both the application and operating system levels. The credential access layer systematically harvests SSH keys, browser data, cloud configurations, and /etc/shadow files while intercepting plaintext authentication data through PAM-based backdoors. Surveillance capabilities include keylogging, screenshot capture, and clipboard monitoring. Networking features support TCP tunneling, SOCKS proxying, port scanning, SSH-based lateral movement, and peer-to-peer mesh networking. An execution engine handles process injection via ptrace and /proc/pid/mem, alongside in-memory execution of shared objects and BOF/COFF payloads. A filesystem monitoring module tracks real-time file activity using inotify.\u003c/p\u003e\n\n\u003ch3 id=\"operational-impact-and-detection-status\"\u003eOperational Impact and Detection Status\u003c/h3\u003e\n\n\u003cp\u003eAfter initial access, QLNX establishes its stealth mechanisms and proceeds to harvest developer and cloud credentials. Compromising developer workstations allows attackers to bypass enterprise security controls and access the credentials that secure software delivery pipelines. This methodology mirrors recent supply chain incidents where stolen developer accounts were used to publish trojanized packages to public repositories. Trend Micro has not disclosed specific attack details or threat actor attribution, leaving the exact deployment volume and activity levels unclear. At the time of publication, only four security solutions detect the QLNX binary as malicious. The company has released indicators of compromise to assist defenders in detecting infections and implementing protective measures.\u003c/p\u003e\n","keyPoints":["QLNX is a stealthy Linux malware implant targeting developer workstations and DevOps environments that could enable supply-chain attacks through malicious packages published on code distribution platforms.","The malware maintains long-term persistence and evades detection by running entirely in memory, dynamically compiling rootkit components, wiping logs, and utilizing seven distinct persistence mechanisms.","QLNX features a comprehensive suite of capabilities including a dual-layer rootkit, credential harvesting, surveillance modules, and lateral movement tools to steal developer and cloud credentials.","Researchers at Trend Micro identified the implant but noted that only four security solutions currently detect it, with no specific attacks or threat actor attribution disclosed."],"insights":["QLNX dynamically compiles its rootkit and PAM backdoor modules on the target host using gcc, enabling it to operate as a fileless, in-memory implant that deletes its original binary from disk.","The malware achieves dual-layer stealth by combining a userland LD_PRELOAD rootkit with a kernel-level eBPF component to simultaneously hide files, processes, and network ports at both the application and OS levels.","By targeting developer workstations and DevOps environments like npm and GitHub, QLNX bypasses enterprise security controls to harvest credentials that directly enable supply-chain attacks through malicious package publication."],"referencedReports":[],"body":"\u003cp\u003eA previously undocumented Linux implant named Quasar Linux (QLNX) is actively targeting developer workstations and DevOps environments. The malware operates as a fileless, in-memory tool that dynamically compiles rootkit and backdoor modules on the host using gcc. It employs seven distinct persistence mechanisms, including LD_PRELOAD, systemd, and crontab, to ensure continuous operation even if the process is terminated. QLNX features a comprehensive suite of capabilities designed for stealth, credential harvesting, and lateral movement across networks. By compromising developer systems, threat actors can bypass enterprise security controls and steal credentials used in software delivery pipelines. This approach enables supply-chain attacks where malicious packages are published to platforms like npm, PyPI, and GitHub. Trend Micro researchers analyzed the implant and noted that it currently evades detection by most security vendors. Only four security solutions flag the QLNX binary as malicious at this time. The company has released indicators of compromise to help defenders identify and mitigate infections.\u003c/p\u003e\n"}];

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";

    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;

    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
