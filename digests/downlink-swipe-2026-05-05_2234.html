 resilience rather than assigning individual or corporate blame. Minister Tony Burke appointed seven members to the board, which is majority female and chaired by Telstra’s global CISO, Narelle Devine. The initiative follows significant breaches at Medibank and Optus that pressured Canberra to harden its cyber defenses. Unlike the voluntary US Cyber Safety Review Board, Australia’s new board can legally compel information from uncooperative entities. The US board, which was disbanded by the Trump administration after producing reports on Microsoft and the Log4j vulnerability, faced criticism for its voluntary cooperation model. Meanwhile, the European Union has established a similar review mechanism under the Cyber Solidarity Act, though it has yet to exercise this function.\u003c/p\u003e\n"},{"n":10,"title":"Vimeo data breach exposes personal information of 119,000 people","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/vimeo-data-breach-exposes-personal-information-of-119-000-people/","time":"13:03","priority":"MAY READ","score":72,"group":null,"groupColor":null,"tldr":"The ShinyHunters extortion gang stole and leaked the personal data of approximately 119,200 Vimeo users after compromising the platform through a third-party vendor breach, though financial and login credentials remained secure.","briefOverview":"\u003cp\u003eThe ShinyHunters extortion gang compromised Vimeo\u0026rsquo;s systems in April by exploiting a breach at third-party vendor Anodot. According to Have I Been Pwned, the attack exposed the email addresses and names of 119,200 individuals. Vimeo disclosed the incident on April 27, noting that the accessed databases primarily contained technical data, video titles, metadata, and some customer emails.\u003c/p\u003e\n\n\u003cp\u003eThe company emphasized that user credentials, financial information, and actual video content remained secure. After failing to reach an extortion agreement, the group leaked a 106GB archive of the stolen documents on their dark web leak site. Vimeo promptly disabled the compromised Anodot credentials, severed the integration, and engaged security experts to assist with the investigation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe ShinyHunters cybercrime group successfully accessed Vimeo\u0026rsquo;s databases in April through a supply chain compromise involving the data anomaly detection company Anodot. Have I Been Pwned analyzed the stolen data and determined that the breach exposed the email addresses and, in some cases, the names of 119,200 people. Vimeo publicly disclosed the unauthorized access on April 27, clarifying that the compromised databases contained technical data, video titles, metadata, and limited customer email addresses.\u003c/p\u003e\n\n\u003cp\u003eThe company explicitly stated that the attack did not disrupt its services, nor did it compromise valid user login credentials or payment card information. Upon detecting the intrusion, Vimeo immediately disabled all Anodot credentials, removed the vendor integration from its systems, and notified law enforcement. The extortion gang subsequently leaked a 106GB archive of the stolen documents on their dark web leak site after failing to secure a ransom agreement.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claimed the compromise was facilitated by stolen Anodot authentication tokens that granted access to Vimeo\u0026rsquo;s Snowflake and BigQuery instances. The group previously reported stealing data from dozens of other companies using similar Anodot tokens and noted that attempts to breach Salesforce instances were blocked by AI-based detection mechanisms. ShinyHunters is also known for conducting widespread vishing campaigns against employees and business process outsourcing agents to steal Microsoft Entra, Okta, and Google single sign-on accounts.\u003c/p\u003e\n\n\u003cp\u003eOnce corporate SSO accounts are compromised, the gang exfiltrates data from connected SaaS applications such as Salesforce, SAP, Slack, Adobe, Atlassian, Zendesk, Dropbox, Microsoft 365, and Google Workspace. In recent weeks, the group has claimed responsibility for data breaches at numerous major organizations, including the European Commission, Rockstar Games, McGraw Hill, Medtronic, Carnival, Zara, 7-Eleven, and Udemy.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncident Overview and Vendor Compromise\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe ShinyHunters extortion gang executed a supply chain attack against Vimeo in April by leveraging compromised credentials from the data anomaly detection firm Anodot. Have I Been Pwned evaluated the exfiltrated data and confirmed that the breach compromised the email addresses and, in some instances, the names of 119,200 individuals.\u003c/p\u003e\n\n\u003cp\u003eVimeo officially disclosed the unauthorized access on April 27, specifying that the targeted databases held technical data, video titles, metadata, and a subset of customer email addresses. The company stressed that the incident caused no operational disruptions and did not expose valid user credentials or financial information.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eRemediation and Data Exfiltration\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eVimeo\u0026rsquo;s response included the immediate revocation of all Anodot credentials and the complete removal of the vendor integration from its infrastructure. The organization also retained third-party security experts to support the investigation and formally notified law enforcement agencies.\u003c/p\u003e\n\n\u003cp\u003eFollowing the disclosure, ShinyHunters published a 106GB archive of the stolen documents on their dark web leak site after extortion negotiations failed. The gang explicitly stated that the compromise was achieved through stolen Anodot authentication tokens that provided access to Vimeo\u0026rsquo;s Snowflake and BigQuery instances.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTactical Methodology and Broader Campaign\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eShinyHunters has a documented history of exploiting Anodot authentication tokens to access data across dozens of corporate environments. The group previously attempted to breach Salesforce instances but reported being blocked by AI-based detection mechanisms.\u003c/p\u003e\n\n\u003cp\u003eBeyond supply chain attacks, ShinyHunters conducts extensive vishing campaigns targeting employees and business process outsourcing agents. These campaigns aim to steal single sign-on credentials from Microsoft Entra, Okta, and Google platforms.\u003c/p\u003e\n\n\u003cp\u003eOnce SSO accounts are compromised, the threat actors systematically exfiltrate data from connected SaaS ecosystems, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSalesforce\u003c/li\u003e\n\u003cli\u003eSAP\u003c/li\u003e\n\u003cli\u003eSlack\u003c/li\u003e\n\u003cli\u003eAdobe\u003c/li\u003e\n\u003cli\u003eAtlassian\u003c/li\u003e\n\u003cli\u003eZendesk\u003c/li\u003e\n\u003cli\u003eDropbox\u003c/li\u003e\n\u003cli\u003eMicrosoft 365\u003c/li\u003e\n\u003cli\u003eGoogle Workspace\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eRelated Breaches and Industry Impact\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe group has recently claimed responsibility for a wide array of high-profile data breaches across multiple sectors. Recent claims include unauthorized access to systems at the European Commission, Rockstar Games, and edtech giant McGraw Hill.\u003c/p\u003e\n\n\u003cp\u003eAdditional targeted organizations include medical device manufacturer Medtronic, cruise operator Carnival, fashion retailer Zara, convenience chain 7-Eleven, and online training platform Udemy. This pattern demonstrates ShinyHunters\u0026rsquo; reliance on credential theft and SaaS integration vulnerabilities to maximize data exfiltration at scale.\u003c/p\u003e\n","keyPoints":["The ShinyHunters extortion gang accessed Vimeo's databases through a compromise at third-party vendor Anodot, exposing the email addresses and names of 119,200 individuals.","Vimeo confirmed that the breach only exposed technical data, video metadata, and some customer emails, while user credentials and financial information remained secure.","After failing to reach an extortion agreement, the group leaked a 106GB archive of the stolen documents on their dark web leak site.","ShinyHunters routinely targets corporate SSO accounts to steal data from connected SaaS applications and has recently claimed responsibility for breaches at companies such as Rockstar Games and Medtronic."],"insights":["ShinyHunters accessed Vimeo's Snowflake and BigQuery instances via compromised Anodot authentication tokens.","ShinyHunters leverages compromised SSO credentials obtained through vishing campaigns to access a broad ecosystem of connected SaaS applications, including Salesforce, SAP, and Microsoft 365.","The data exposure was restricted to technical metadata and email addresses, confirming that valid user credentials and financial data remained secure and were not part of the exfiltrated archive."],"referencedReports":[],"body":"\u003cp\u003eThe ShinyHunters extortion gang compromised Vimeo\u0026rsquo;s systems in April by exploiting a breach at third-party vendor Anodot. According to Have I Been Pwned, the attack exposed the email addresses and names of 119,200 individuals. Vimeo disclosed the incident on April 27, noting that the accessed databases primarily contained technical data, video titles, metadata, and some customer emails.\u003c/p\u003e\n\n\u003cp\u003eThe company emphasized that user credentials, financial information, and actual video content remained secure. After failing to reach an extortion agreement, the group leaked a 106GB archive of the stolen documents on their dark web leak site. Vimeo promptly disabled the compromised Anodot credentials, severed the integration, and engaged security experts to assist with the investigation.\u003c/p\u003e\n"},{"n":19,"title":"Weaver E-cology RCE Flaw CVE-2026-22679 Actively Exploited via Debug API","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/weaver-e-cology-rce-flaw-cve-2026-22679.html","time":"07:37","priority":"MAY READ","score":0,"group":null,"groupColor":null,"tldr":"","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":[],"insights":[],"referencedReports":[],"body":""}];

      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function SwipeCard({ article, isTop, depth, onSwipe }) {
  const [dx, setDx]             = React.useState(0);
  const [dy, setDy]             = React.useState(0);
  const [dragging, setDragging] = React.useState(false);
  const [flying, setFlying]     = React.useState(null);
  const [flipped, setFlipped]   = React.useState(false);
  const startRef = React.useRef({ x: 0, y: 0 });

  React.useEffect(() => {
    if (isTop && !flipped) {
      window.__downlinkFlipTop = () => setFlipped(true);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const onPointerDown = (e) => {
    if (!isTop || flipped || flying) return;
    setDragging(true);
    startRef.current = { x: e.clientX, y: e.clientY };
    e.target.setPointerCapture && e.target.setPointerCapture(e.pointerId);
  };
  const onPointerMove = (e) => {
    if (!dragging) return;
    setDx(e.clientX - startRef.current.x);
    setDy(e.clientY - startRef.current.y);
  };
  const onPointerUp = () => {
    if (!dragging) return;
    setDragging(false);
    const threshold = 110;
    if (dx > threshold) {
      setFlying("right");
      setTimeout(() => { setFlipped(true); setDx(0); setDy(0); setFlying(null); }, 280);
    } else if (dx < -threshold) {
      setFlying("left");
      setTimeout(() => onSwipe("left"), 380);
    } else {
      setDx(0); setDy(0);
    }
  };

  let transform; let opacity = 1;
  if (flying === "left")       { transform = "translate(-140%, " + (dy * 1.5) + "px) rotate(-22deg)"; opacity = 0; }
  else if (flying === "right") { transform = "translate(60%, " + dy + "px) rotate(12deg) scale(0.95)"; }
  else if (dragging)           { transform = "translate(" + dx + "px, " + (dy * 0.4) + "px) rotate(" + (dx * 0.05) + "deg)"; }
  else if (depth > 0)          { transform = "translateY(" + (depth * 8) + "px) scale(" + (1 - depth * 0.04) + ")"; }
  else                         { transform = "translate(0, 0) rotate(0)"; }

  const skipOpacity = !flipped && dx < 0 ? Math.min(1, -dx / 100) : 0;
  const readOpacity = !flipped && dx > 0 ? Math.min(1, dx / 100) : 0;
  const cardClass   = "swipe-card " + (dragging ? "dragging" : flying ? "fly-out" : "snap-back");

  return (
    <div className={cardClass}
      style={{ transform, opacity, zIndex: 100 - depth, cursor: isTop && !flipped ? "grab" : "default", pointerEvents: isTop ? "auto" : "none" }}
      onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={onPointerUp}>
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      {!flipped && (
        <>
          <div className="stamp skip" style={{ opacity: skipOpacity }}>SKIP</div>
          <div className="stamp read" style={{ opacity: readOpacity }}>READ</div>
        </>
      )}
    </div>
  );
}

function App() {
  const [index, setIndex] = React.useState(0);
  const [tick, setTick]   = React.useState(0);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  { setIndex(i => i + 1); setTick(t => t + 1); }
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished]);

  const advance = () => { setIndex(i => i + 1); setTick(t => t + 1); };

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setTick(0); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + tick + "-" + realDepth}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onSwipe={(dir) => { if (dir === "left") advance(); }}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Skip (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--text3)", letterSpacing: "0.12em", textAlign: "center", lineHeight: 1.7 }}>
              <div>&#8592; SKIP · READ &#8594;</div>
              <div style={{ opacity: 0.6, marginTop: 2 }}>SWIPE OR CLICK</div>
            </div>
            <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="Read details (ArrowRight)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
