ans for analysis tools like Wireshark, Fiddler, Procmon, and Sysmon. The loader also searches for virtual machine and sandbox-related strings.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"malware-capabilities-network-evasion\"\u003eMalware Capabilities \u0026amp; Network Evasion\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eBeyond the Pheno plugin, CloudZ can target data stored in web browsers and profile host systems. The RAT supports file management operations, including deleting, downloading, and writing files. It can also execute shell commands, start screen recordings, and manage its own plugins by loading, removing, or saving them to disk.\u003c/li\u003e\n\u003cli\u003eThe malware includes a command to terminate its own process. To mask its network activity, CloudZ rotates between three hardcoded user-agent strings to make HTTP traffic appear as legitimate browser requests. Each HTTP request includes anti-caching headers to prevent proxies and content delivery networks from caching command-and-control or staging server details.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"defensive-recommendations-indicators\"\u003eDefensive Recommendations \u0026amp; Indicators\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco Talos has published a set of indicators of compromise to help defenders protect their environments. These indicators include URLs, hashes for malicious components, domains, and IP addresses. Security researchers strongly advise against using SMS-based OTP services.\u003c/li\u003e\n\u003cli\u003eInstead, they recommend switching to authenticator apps that do not require push notifications, which could be intercepted by this method. For highly sensitive information, organizations should adopt phishing-resistant solutions such as hardware keys.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["The CloudZ remote access tool now includes a new plugin called Pheno that hijacks Microsoft Phone Link to steal SMS messages and one-time passwords from Windows machines.","Pheno intercepts sensitive data by monitoring active Phone Link sessions and accessing the application's local SQLite database without requiring compromise of the victim's mobile device.","The infection chain begins with a fake ScreenConnect update that drops a Rust-based loader, which subsequently deploys a .NET loader to install the CloudZ RAT and establish persistence through a scheduled task.","The .NET loader employs anti-analysis techniques to evade detection, including time-based sandbox evasion and checks for virtual machines and security analysis tools.","Researchers recommend avoiding SMS-based OTP services and instead using authenticator apps or phishing-resistant hardware keys to protect against this type of credential theft."],"insights":["Pheno steals OTPs by directly accessing the Phone Link SQLite database on Windows, allowing credential theft without ever compromising the victim's mobile device.","CloudZ attaches anti-caching headers to every HTTP request to prevent proxies and CDNs from caching C2 or staging server details, complicating network-level blocking.","The .NET loader implements granular anti-analysis checks, including time-based sandbox evasion and explicit detection of monitoring tools like Wireshark, Fiddler, Procmon, and Sysmon.","Defense guidance explicitly recommends abandoning SMS-based OTPs in favor of authenticator apps that avoid push notifications or upgrading to phishing-resistant hardware keys to directly counter this interception method."],"referencedReports":[{"title":"CloudZ Pheno Infostealer Report","url":"https://blog.talosintelligence.com/cloudz-pheno-infostealer/","publisher":"Cisco Talos","context":"The article cites this Cisco Talos report to explain how the Pheno plugin monitors active Phone Link sessions and accesses the local SQLite database to intercept SMS and OTP messages."}],"body":"\u003cp\u003eA new version of the CloudZ remote access tool is deploying a previously unseen malicious plugin called Pheno. This component hijacks the Microsoft Phone Link application installed on Windows 10 and 11. By monitoring active Phone Link sessions, Pheno accesses the local SQLite database to steal SMS messages and one-time passwords.\u003c/p\u003e\n\n\u003cp\u003eCisco Talos researchers identified the campaign, noting that the threat actor has been active since at least January. The infection begins when a user runs a fake ScreenConnect update that drops a Rust-based loader. This loader deploys a .NET loader that installs the CloudZ RAT and establishes persistence through a scheduled task.\u003c/p\u003e\n\n\u003cp\u003eThe .NET loader includes anti-analysis checks to evade sandboxes and security tools. To defend against this threat, researchers recommend avoiding SMS-based OTPs and switching to phishing-resistant hardware keys. Cisco Talos has published indicators of compromise to help defenders protect their environments.\u003c/p\u003e\n"},{"n":15,"title":"We Scanned 1 Million Exposed AI Services. Here's How Bad the Security Actually Is","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/we-scanned-1-million-exposed-ai.html","time":"10:30","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"Rushed AI adoption has left millions of services exposed, unauthenticated, and configured with insecure defaults, creating a massive attack surface that organizations must immediately audit and harden.","briefOverview":"\u003cp\u003eThe Intruder team scanned over one million exposed AI services and found that rapid adoption has severely compromised security across the sector. Many deployments ship with authentication disabled by default, leaving user conversations, API keys, and system controls openly accessible to anyone on the internet. Exposed chatbots frequently reveal sensitive enterprise data and allow malicious actors to bypass safety guardrails without fear of repercussions. Agent management platforms like Flowise and n8n were discovered with their business logic, credential lists, and dangerous local functions fully exposed.\u003c/p\u003e\n\n\u003cp\u003eOver ninety instances across government, marketing, and finance sectors were found to be completely open to unauthorized modification and data exfiltration. Testing of more than five thousand Ollama APIs revealed that thirty-one percent responded to prompts without authentication, often providing access to wrapped paid frontier models. Lab analysis confirmed that these systems suffer from insecure defaults, hardcoded credentials, applications running as root, and weak sandboxing. Ultimately, the pressure to ship AI features quickly has caused vendors to abandon decades of security best practices, leaving organizations vulnerable to immediate compromise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe software industry has made significant strides in secure development, but the rapid pace of AI adoption is actively undermining that progress. Driven by the promise of AI as a force multiplier and intense market pressure, businesses are hastily deploying self-hosted LLM infrastructure without adequate security measures. To investigate the resulting attack surface, the Intruder team utilized certificate transparency logs to identify and scan over one million exposed services. The findings revealed that AI infrastructure is significantly more vulnerable, exposed, and misconfigured than any other software category previously investigated.\u003c/p\u003e\n\n\u003cp\u003eA primary concern was the widespread lack of default authentication, which left real user data and company tooling completely open to unauthorized access. Many chatbot instances exposed full conversation histories, while others allowed unrestricted access to multimodal models that could be jailbroken for malicious purposes. Some deployments even disclosed plaintext API keys and sensitive personal conversations. Beyond chatbots, agent management platforms such as n8n and Flowise were found exposed without authentication.\u003c/p\u003e\n\n\u003cp\u003eOne Flowise instance revealed an entire business logic structure, credential lists, and dangerous local functions capable of server-side code execution. Researchers identified over ninety exposed instances across government, marketing, and finance, all of which allowed attackers to modify workflows, redirect traffic, or poison responses. Testing of more than five thousand Ollama APIs showed that thirty-one percent responded to prompts without authentication, often providing access to wrapped paid frontier models. While Ollama does not store conversation data, the exposed compute resources and model access present significant abuse risks.\u003c/p\u003e\n\n\u003cp\u003eLab analysis confirmed that these applications consistently exhibit insecure design patterns, including misconfigured Docker setups, hardcoded credentials, and applications running as root. Fresh installs frequently drop users into high-privilege accounts with full management access, and new technical vulnerabilities like arbitrary code execution were discovered within days of testing. Weak sandboxing and the absence of network segmentation further amplify the potential blast radius of these misconfigurations. The article concludes that vendors have largely abandoned established security best practices in favor of rapid deployment, urging organizations to proactively scan for external misconfigurations before attackers exploit them.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"introduction-and-research-methodology\"\u003eIntroduction and Research Methodology\u003c/h3\u003e\n\n\u003cp\u003eThe article highlights how the rapid adoption of AI infrastructure is outpacing established security practices, creating a massive and vulnerable attack surface. To quantify this risk, the Intruder team leveraged certificate transparency logs to identify approximately two million hosts, ultimately scanning over one million exposed AI services. The investigation concluded that AI infrastructure is significantly more vulnerable, exposed, and misconfigured than any other software category previously analyzed by the team.\u003c/p\u003e\n\n\u003ch3 id=\"lack-of-default-authentication-and-exposed-chatbots\"\u003eLack of Default Authentication and Exposed Chatbots\u003c/h3\u003e\n\n\u003cp\u003eA pervasive finding across the scan was the absence of authentication on fresh deployments. Many projects ship with security disabled by default, leaving enterprise data and system controls openly accessible to anyone on the internet. The research identified several critical exposure scenarios:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eConversation History Leakage:\u003c/strong\u003e Instances based on OpenUI exposed complete LLM conversation histories, which can reveal sensitive enterprise information.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eUnrestricted Model Access:\u003c/strong\u003e Generic chatbots hosted multimodal LLMs freely, allowing malicious actors to jailbreak safety guardrails for illegal or harmful content generation without detection.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePlaintext Credential Disclosure:\u003c/strong\u003e Some deployments exposed large volumes of personal conversations alongside plaintext API keys embedded in the software.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThird-Party Abuse Vectors:\u003c/strong\u003e The article references real-world cases where users abuse exposed company chatbots to access premium models without payment or account logging.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"agent-management-platform-vulnerabilities\"\u003eAgent Management Platform Vulnerabilities\u003c/h3\u003e\n\n\u003cp\u003eThe scan also uncovered exposed agent management platforms, specifically n8n and Flowise, which were deployed internally but accessible from the public internet without authentication. These platforms present unique risks due to their integration capabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBusiness Logic and Credential Exposure:\u003c/strong\u003e One Flowise instance fully exposed its chatbot business logic and stored credential lists, enabling attackers to leverage connected tools for data exfiltration.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDangerous Function Execution:\u003c/strong\u003e Configurations revealed internet parsing tools and local functions capable of file writes and code interpretation, making server-side code execution highly probable.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCross-Sector Impact:\u003c/strong\u003e Researchers identified over ninety exposed instances across government, marketing, and finance sectors. Attackers could easily modify workflows, redirect traffic, expose user data, or poison AI responses.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"ollama-api-exposure-and-model-wrapping\"\u003eOllama API Exposure and Model Wrapping\u003c/h3\u003e\n\n\u003cp\u003eTesting focused heavily on Ollama APIs, querying more than five thousand servers that listed connected models. Thirty-one percent of these servers responded to a simple prompt without requiring authentication. While Ollama does not store conversation messages directly, the responses revealed diverse use cases ranging from health assistance to cloud infrastructure management. Critically, many instances were wrapping paid frontier models from providers like Anthropic, Deepseek, Moonshot, Google, and OpenAI. In total, 518 wrapped frontier models were identified across the scanned servers, creating significant opportunities for compute abuse and unauthorized model access.\u003c/p\u003e\n\n\u003ch3 id=\"insecure-design-patterns-and-lab-analysis\"\u003eInsecure Design Patterns and Lab Analysis\u003c/h3\u003e\n\n\u003cp\u003eLab-based analysis of a subset of applications confirmed that insecure defaults are systemic rather than isolated incidents. The research documented several recurring misconfiguration patterns:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePoor Deployment Practices:\u003c/strong\u003e Applications frequently run as root, utilize misconfigured Docker setups, and expose insecure defaults.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eStatic and Hardcoded Credentials:\u003c/strong\u003e Setup examples and docker-compose files contain embedded credentials rather than dynamically generated tokens.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHigh-Privilege Fresh Installs:\u003c/strong\u003e New installations often bypass authentication entirely, dropping users into accounts with full management access.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRapid Vulnerability Emergence:\u003c/strong\u003e Technical flaws, including arbitrary code execution, were discovered within days of initial lab testing.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExpanded Attack Surface:\u003c/strong\u003e Weak sandboxing and the lack of DMZ placement significantly increase the blast radius when agents are granted access to code interpretation tools.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"root-causes-and-mitigation-recommendations\"\u003eRoot Causes and Mitigation Recommendations\u003c/h3\u003e\n\n\u003cp\u003eThe article attributes these widespread vulnerabilities to a fundamental shift in development priorities, where vendors have abandoned decades of security best practices to accelerate AI feature delivery. Market pressure and the demand for rapid time-to-market are driving organizations to prioritize speed over security. To combat this, the article emphasizes that organizations should not wait for adversaries to discover exposed infrastructure. Instead, companies are advised to proactively use security scanning tools to identify external misconfigurations and harden their AI deployments before exploitation occurs.\u003c/p\u003e\n","keyPoints":["A scan of over one million exposed AI services revealed that many are deployed with no authentication enabled by default, leaving user data and system controls openly accessible.","Exposed chatbots and agent management platforms frequently disclose sensitive information, including API keys, conversation histories, and business logic, while allowing unauthorized users to execute code or bypass safety guardrails.","Testing of more than 5,200 exposed Ollama APIs showed that 31% responded to prompts without requiring authentication, often providing access to wrapped paid frontier models.","The underlying AI infrastructure consistently exhibits insecure design patterns, including hardcoded credentials, applications running as root, and weak sandboxing that increases the blast radius of potential attacks."],"insights":["The absence of access management controls in AI tooling means that compromising a single bot often grants access to all connected third-party systems and tools.","Exposed Ollama instances often wrap paid frontier models, allowing attackers to abuse expensive compute resources without the risk of conversation data exposure.","Arbitrary code execution vulnerabilities were discovered in popular AI projects within days of lab analysis, highlighting the rapid emergence of technical flaws in new AI infrastructure."],"referencedReports":[{"title":"Jailbreaking Every LLM with One Simple Click","url":"https://www.cyberark.com/resources/threat-research-blog/jailbreaking-every-llm-with-one-simple-click","publisher":"CyberArk","context":"Referenced to illustrate how attackers can bypass LLM safety guardrails to perform nefarious tasks."},{"title":"Amazon Chatbot Gone Wrong","url":"https://www.lasso.security/blog/amazon-chatbot-gone-wrong","publisher":"Lasso Security","context":"Cited to demonstrate real-world examples of users abusing exposed company chatbots to access premium models without payment or account logging."}],"body":"\u003cp\u003eThe Intruder team scanned over one million exposed AI services and found that rapid adoption has severely compromised security across the sector. Many deployments ship with authentication disabled by default, leaving user conversations, API keys, and system controls openly accessible to anyone on the internet. Exposed chatbots frequently reveal sensitive enterprise data and allow malicious actors to bypass safety guardrails without fear of repercussions. Agent management platforms like Flowise and n8n were discovered with their business logic, credential lists, and dangerous local functions fully exposed.\u003c/p\u003e\n\n\u003cp\u003eOver ninety instances across government, marketing, and finance sectors were found to be completely open to unauthorized modification and data exfiltration. Testing of more than five thousand Ollama APIs revealed that thirty-one percent responded to prompts without authentication, often providing access to wrapped paid frontier models. Lab analysis confirmed that these systems suffer from insecure defaults, hardcoded credentials, applications running as root, and weak sandboxing. Ultimately, the pressure to ship AI features quickly has caused vendors to abandon decades of security best practices, leaving organizations vulnerable to immediate compromise.\u003c/p\u003e\n"},{"n":22,"title":"China-Linked UAT-8302 Targets Governments Using Shared APT Malware Across Regions","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/china-linked-uat-8302-targets.html","time":"14:19","priority":"SHOULD READ","score":88,"group":"I","groupColor":"#a78bfa","tldr":"A China-linked APT group known as UAT-8302 is targeting government agencies across South America and southeastern Europe by deploying custom malware previously used by other Chinese hacking groups, underscoring a growing trend of collaboration and tool-sharing among China-aligned threat actors.","briefOverview":"\u003cp\u003eCisco Talos has attributed a series of attacks against government agencies in South America and southeastern Europe to a China-linked APT group designated UAT-8302. The group has been active since late 2024 and relies heavily on custom malware families that are also utilized by other China-aligned threat clusters. Notable tools include the NetDraft backdoor, the CloudSorcerer backdoor, the SNOWLIGHT stager, and the Draculoader shellcode loader. Initial network access is suspected to involve zero-day and N-day web application exploits, followed by extensive reconnaissance and automated scanning using the open-source gogo tool. Once inside the network, attackers conduct lateral movement and deploy multiple persistent access mechanisms, including proxy and VPN tools like Stowaway and SoftEther VPN. The widespread reuse of these malicious artifacts across different threat groups underscores a growing trend of operational collaboration and tool-sharing among China-nexus actors. This shared infrastructure aligns with industry observations of a Premier Pass-as-a-Service framework that streamlines the initial compromise phase for a restricted circle of hackers.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco Talos researchers have identified a sophisticated China-nexus APT group operating under the name UAT-8302. This threat actor has targeted government entities in South America since late 2024 and has expanded its operations to southeastern Europe in 2025. The group’s post-exploitation activities heavily feature custom malware families that are shared with other China-aligned hacking clusters. Among the most prominent tools is NetDraft, a .NET-based backdoor that serves as a C# variant of FINALDRAFT. This same malware has been previously linked to threat actors known as Ink Dragon, CL-STA-0049, Earth Alux, Jewelbug, and REF7707. ESET tracks the use of this backdoor under the name LongNosedGoblin, while Russian firm Solar associates it with the Erudite Mogwai group targeting Russian IT organizations. Additional tools deployed by UAT-8302 include CloudSorcerer, a backdoor previously seen against Russian entities, and SNOWLIGHT, a VShell stager used by several other Chinese groups. The attackers also utilize Deed RAT, Zingdoor, and Draculoader, a generic shellcode loader that delivers Crowdoor and HemiGate. Initial access is suspected to rely on zero-day and N-day web application exploits. After breaching networks, the group conducts extensive reconnaissance, runs automated scans with the gogo tool, and moves laterally across the environment. The attack chains typically conclude with the deployment of NetDraft, CloudSorcerer version 3.0, and VShell. Notably, UAT-8302 employs a Rust-based variant called SNOWRUST to download and execute the VShell payload from a remote server. Beyond custom malware, the threat actor establishes redundant backdoor access using proxy and VPN solutions like Stowaway and SoftEther VPN. These findings highlight a clear pattern of tool-sharing and close operational relationships among multiple China-aligned groups. This behavior mirrors the Premier Pass-as-a-Service model described by Trend Micro, where initial access is passed between groups to accelerate exploitation and reduce exposure risks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"threat-actor-overview\"\u003eThreat Actor Overview\u003c/h3\u003e\n\n\u003cp\u003eCisco Talos has attributed a series of advanced cyber operations to a China-nexus APT group designated UAT-8302. The group has been actively targeting government entities in South America since late 2024 and has expanded its campaign to include government agencies in southeastern Europe throughout 2025. Researchers Jungsoo An, Asheer Malhotra, and Brandon White documented these activities in a technical report highlighting the group\u0026rsquo;s reliance on shared malicious infrastructure.\u003c/p\u003e\n\n\u003ch3 id=\"malware-ecosystem-and-tool-sharing\"\u003eMalware Ecosystem and Tool Sharing\u003c/h3\u003e\n\n\u003cp\u003eUAT-8302 extensively utilizes custom malware families that overlap significantly with other China-aligned threat clusters. The primary backdoor deployed is NetDraft, also known as NosyDoor. This .NET-based tool is a C# variant of FINALDRAFT and has been previously associated with threat groups including Ink Dragon, CL-STA-0049, Earth Alux, Jewelbug, and REF7707.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eESET tracks the deployment of this backdoor under the moniker LongNosedGoblin.\u003c/li\u003e\n\u003cli\u003eRussian cybersecurity firm Solar links the same malware to the Erudite Mogwai group, which has targeted Russian IT organizations under the name LuckyStrike Agent.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAdditional tools leveraged by UAT-8302 include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCloudSorcerer:\u003c/strong\u003e A backdoor observed targeting Russian entities since May 2024.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSNOWLIGHT:\u003c/strong\u003e A VShell stager utilized by other Chinese groups such as UNC5174, UNC6586, and UAT-6382.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDeed RAT:\u003c/strong\u003e Also known as Snappybee, this remote access tool is a successor to ShadowPad.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eZingdoor:\u003c/strong\u003e A backdoor previously deployed by Earth Estries in late 2024.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDraculoader:\u003c/strong\u003e A generic shellcode loader used to deliver the Crowdoor and HemiGate backdoors.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"tactics-techniques-and-procedures\"\u003eTactics, Techniques, and Procedures\u003c/h3\u003e\n\n\u003cp\u003eThe initial access phase is suspected to involve the exploitation of zero-day and N-day vulnerabilities within web applications. Once a foothold is established, the attackers conduct extensive network reconnaissance and run automated scanning routines using the open-source gogo tool. They then execute lateral movement across the compromised environment before deploying their primary malicious artifacts.\nThe attack chains typically culminate in the installation of NetDraft, CloudSorcerer version 3.0, and VShell. To facilitate payload delivery, the group employs SNOWRUST, a Rust-based variant of SNOWLIGHT, to download and execute the VShell payload from a remote server. Beyond traditional malware, the threat actor establishes persistent access channels using proxy and VPN tools, specifically Stowaway and SoftEther VPN.\u003c/p\u003e\n\n\u003ch3 id=\"industry-context-and-operational-models\"\u003eIndustry Context and Operational Models\u003c/h3\u003e\n\n\u003cp\u003eThe widespread reuse of these technical artifacts indicates a close operating relationship between UAT-8302 and other publicly disclosed threat clusters. This pattern of tool-sharing aligns with the Premier Pass-as-a-Service phenomenon highlighted by Trend Micro in October 2025. Under this model, initial access obtained by groups like Earth Estries is passed to secondary actors such as Earth Naga for follow-on exploitation.\nThis service reduces the time required for reconnaissance, initial exploitation, and lateral movement. Although the full scale of this operational model remains unclear, researchers assess that the high risk of exposure likely restricts its use to a small, tightly-knit circle of threat actors. The findings from UAT-8302 underscore a broader industry trend of advanced collaboration tactics among China-nexus hacking groups.\u003c/p\u003e\n","keyPoints":["Cisco Talos tracks a China-nexus APT group designated UAT-8302 that has targeted government agencies in South America and southeastern Europe since late 2024.","The group utilizes custom malware families including NetDraft, CloudSorcerer, SNOWLIGHT, and Draculoader that are also deployed by other China-aligned threat clusters.","Initial network access is suspected to involve zero-day and N-day web application exploits, followed by extensive reconnaissance and lateral movement.","Attackers establish alternative backdoor access using proxy and VPN tools like Stowaway and SoftEther VPN.","The shared use of malicious artifacts highlights a close operating relationship and tool-sharing model among multiple China-aligned hacking groups."],"insights":["UAT-8302 employs a Rust-based variant of SNOWLIGHT called SNOWRUST to download and execute the VShell payload, indicating a technical shift toward compiled languages for payload delivery.","The group establishes redundant persistent access channels using proxy and VPN tools like Stowaway and SoftEther VPN, bypassing traditional credential-based persistence mechanisms.","Extensive overlap in malware families across multiple China-aligned clusters points to a shared operational model, corroborating the emerging \"Premier Pass-as-a-Service\" framework where tools and initial access are reused across threat actors.","UAT-8302 automates initial network reconnaissance using the open-source gogo scanning tool before lateral movement, streamlining the early compromise phase against government targets."],"referencedReports":[{"title":"Cisco Talos Technical Report on UAT-8302","url":"https://blog.talosintelligence.com/uat-8302/","publisher":"Cisco Talos","context":"The article references this report as the source tracking the China-nexus APT group UAT-8302 targeting government entities."},{"title":"Solar Blog Analysis on LuckyStrike Agent","url":"https://rt-solar.ru/solar-4rays/blog/5603/","publisher":"Solar","context":"The article cites this Russian cybersecurity company's analysis as the source that named the malware deployed by Erudite Mogwai the LuckyStrike Agent."},{"title":"Nviso Analysis of VShell Post-Exploitation Tool","url":"https://www.nviso.eu/blog/nviso-analyzes-vshell-post-exploitation-tool","publisher":"Nviso","context":"The article links to this technical analysis to provide background on VShell, which is used as a stager by the SNOWLIGHT malware."},{"title":"Trend Micro Research on Draculoader and Premier Pass-as-a-Service","url":"https://www.trendmicro.com/en_us/research/25/j/premier-pass-as-a-service.html","publisher":"Trend Micro","context":"The article references this research report to detail Draculoader, a shellcode loader used to deliver other backdoors, and to explain the Premier Pass-as-a-Service operational model."}],"body":"\u003cp\u003eCisco Talos has attributed a series of attacks against government agencies in South America and southeastern Europe to a China-linked APT group designated UAT-8302. The group has been active since late 2024 and relies heavily on custom malware families that are also utilized by other China-aligned threat clusters. Notable tools include the NetDraft backdoor, the CloudSorcerer backdoor, the SNOWLIGHT stager, and the Draculoader shellcode loader. Initial network access is suspected to involve zero-day and N-day web application exploits, followed by extensive reconnaissance and automated scanning using the open-source gogo tool. Once inside the network, attackers conduct lateral movement and deploy multiple persistent access mechanisms, including proxy and VPN tools like Stowaway and SoftEther VPN. The widespread reuse of these malicious artifacts across different threat groups underscores a growing trend of operational collaboration and tool-sharing among China-nexus actors. This shared infrastructure aligns with industry observations of a Premier Pass-as-a-Service framework that streamlines the initial compromise phase for a restricted circle of hackers.\u003c/p\u003e\n"},{"n":2,"title":"Conti, Akira ransomware affiliate given 8-year sentence","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/conti-akira-ransomware-affiliate-sentenced","time":"17:33","priority":"SHOULD READ","score":85,"group":"U","groupColor":"#c084fc","tldr":"A key ransomware negotiator for groups like Conti and Akira was sentenced to eight years in prison for orchestrating extortion campaigns that caused tens of millions in losses, underscoring the persistent threat of these highly active criminal networks.","briefOverview":"\u003cp\u003eDeniss Zolotarjovs, a 35-year-old Latvian citizen, was sentenced to 102 months in prison for money laundering and wire fraud related to his role as a ransomware negotiator. He pleaded guilty in July 2025 after being extradited from Georgia to the United States. Zolotarjovs operated for the Karakurt cybercriminal group, which utilized multiple brand names including Conti and Akira to extort victims.\u003c/p\u003e\n\n\u003cp\u003eHis primary responsibilities involved analyzing stolen data and employing aggressive tactics to pressure organizations into paying ransoms. The group extorted over 53 companies between June 2021 and March 2023, causing approximately $56 million in losses. Prosecutors highlighted a particularly egregious incident where Zolotarjovs threatened to distribute stolen pediatric health data to hundreds of patients after a healthcare provider refused to pay. He earned a 10% commission on each ransom payment and was tasked with training other negotiators within the organization. The Justice Department successfully argued for a lengthy sentence to remove a highly skilled operator from the threat landscape.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDeniss Zolotarjovs was sentenced to 102 months in prison after pleading guilty to money laundering and wire fraud charges. The 35-year-old Latvian national was arrested in Georgia and extradited to the United States in August 2024. He served as a key negotiator for the Karakurt ransomware group, which operated out of a St. Petersburg office and included former Russian law enforcement personnel.\u003c/p\u003e\n\n\u003cp\u003eThe organization leveraged its staff\u0026rsquo;s backgrounds to secure recruitment advantages and exemptions from military service and taxes. Between June 2021 and March 2023, the group extorted more than 53 companies, generating roughly \u003cspan class=\"math inline\"\u003e\\(3 million in ransom payments and causing an estimated \\)\u003c/span\u003e56 million in total losses. Zolotarjovs was specifically responsible for analyzing compromised data, researching victim organizations, and applying hardball tactics during negotiations.\u003c/p\u003e\n\n\u003cp\u003eHe typically received a 10% cut of the ransom and was brought in to finalize deals. Prosecutors detailed a severe incident involving a pediatric healthcare company, where Zolotarjovs threatened to leak or sell children’s medical records and actually sent data samples to hundreds of patients. He also trained a co-conspirator who later became the group’s lead negotiator.\u003c/p\u003e\n\n\u003cp\u003eThe Justice Department requested a 126-month sentence, arguing that prolonged incarceration would deprive the public of a skilled operator and allow defensive technologies to evolve. The judge ultimately imposed the 102-month term. Officials noted that the group remains highly active, with Akira ranking as the second most observed malware family in 2025.\u003c/p\u003e\n\n\u003cp\u003eResearchers have linked over 100 attacks this year to the operation, which also successfully forced a government entity’s 911 system offline. Zolotarjovs stands as the only member of his network to face a U.S. court proceeding.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"case-overview-legal-outcome\"\u003eCase Overview \u0026amp; Legal Outcome\u003c/h3\u003e\n\n\u003cp\u003eDeniss Zolotarjovs, a 35-year-old Latvian citizen born in Moscow, was sentenced to 102 months in prison. He pleaded guilty in July 2025 to money laundering and wire fraud charges. The defendant was initially arrested in Georgia before being extradited to the United States in August 2024. Prosecutors charged him with acting as a key ransomware operator who specialized in escalating pressure tactics during victim negotiations. The Justice Department initially argued for a 126-month sentence, emphasizing that removing a trusted and skilled negotiator would benefit the public. The judge ultimately approved the 102-month term. Assistant Attorney General A. Tysen Duva characterized the defendant as a cruel and ruthless international cybercriminal.\u003c/p\u003e\n\n\u003ch3 id=\"criminal-organization-operational-structure\"\u003eCriminal Organization \u0026amp; Operational Structure\u003c/h3\u003e\n\n\u003cp\u003eZolotarjovs worked for a cybercriminal group identified by investigators as Karakurt. The organization operated out of a dedicated office building in St. Petersburg. Its membership included multiple former Russian law enforcement officers. This composition provided the group with distinct advantages, including streamlined recruitment and exemptions from compulsory military service and taxes. The group utilized a rotating list of brand names for extortions, including Conti, Karakurt, Royal, TommyLeaks, SchoolBoys, and Akira. The FBI successfully accessed a chat server used by the organization to coordinate attacks and distribute profits. Zolotarjovs participated in the conspiracy from approximately June 2021 through March 2023. He remains the only member of his network to face a U.S. court proceeding.\u003c/p\u003e\n\n\u003ch3 id=\"modus-operandi-financial-impact\"\u003eModus Operandi \u0026amp; Financial Impact\u003c/h3\u003e\n\n\u003cp\u003eThe defendant’s primary responsibilities involved analyzing stolen data and researching victim companies. He used this intelligence to apply hardball tactics and force payments. Zolotarjovs was typically deployed to close negotiations and received a 10% commission on each ransom. Prosecutors documented that the organization extorted over 53 companies during his tenure. The attacks resulted in the following financial metrics:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApproximately $3 million in direct ransom payments.\u003c/li\u003e\n\u003cli\u003eTotal estimated financial losses of $56 million.\u003c/li\u003e\n\u003cli\u003eA likely severe undercount of actual financial impact.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe defendant’s English proficiency and Western European background made him a valuable asset for reviving stalled negotiations. He also trained a co-conspirator who eventually assumed the role of lead negotiator.\u003c/p\u003e\n\n\u003ch3 id=\"notable-incidents-tactics\"\u003eNotable Incidents \u0026amp; Tactics\u003c/h3\u003e\n\n\u003cp\u003eInvestigators highlighted a particularly aggressive campaign targeting a pediatric healthcare company. When the organization refused to pay the ransom, Zolotarjovs became enraged and escalated his threats. He ordered group members to leak or sell copies of the stolen children’s health information. The situation intensified when he sent samples of the compromised pediatric data to hundreds of patients as a direct threat. The group also successfully targeted a government entity, forcing its 911 emergency system offline. These actions demonstrated the group’s willingness to deploy extreme pressure tactics to maximize extortion revenue.\u003c/p\u003e\n\n\u003ch3 id=\"ongoing-threat-landscape\"\u003eOngoing Threat Landscape\u003c/h3\u003e\n\n\u003cp\u003eDespite Zolotarjovs’s incarceration, prosecutors warned that his former associates remain highly active and prolific. Incident responders from Google identified Akira as the second most frequently observed malware family in 2025. Independent researchers have linked more than 100 attacks this year directly to the operation. The Justice Department emphasized that the criminal network has grown more dangerous, potentially becoming one of the most active ransomware groups globally. The prolonged sentence aims to degrade the network\u0026rsquo;s capabilities while defensive technologies advance past the defendant\u0026rsquo;s specific expertise.\u003c/p\u003e\n","keyPoints":["Deniss Zolotarjovs was sentenced to 102 months in prison for money laundering and wire fraud charges stemming from his role as a ransomware negotiator.","He worked for the Karakurt cybercriminal group, which used names like Conti and Akira to extort over 53 companies and cause approximately $56 million in losses.","Zolotarjovs specialized in analyzing stolen data and employing aggressive tactics to pressure victims into paying ransoms, earning a 10% commission on each payment.","Prosecutors noted that the group remains highly active, with Akira identified as the second most frequently observed malware family in 2025 and linked to over 100 attacks this year."],"insights":["The group maintained a physical office in St. Petersburg staffed by former Russian law enforcement officers, granting them recruitment advantages and exemptions from military service and taxes.","The organization employed a multi-brand extortion strategy by rotating names such as Conti, Akira, and Royal across campaigns, complicating attribution and threat intelligence tracking.","Negotiations were handled by specialized closers who were compensated via a 10% commission model, indicating a highly structured, profit-sharing operational framework rather than a monolithic criminal group."],"referencedReports":[{"title":"M-Trends","url":"https://cloud.google.com/security/resources/m-trends","publisher":"Google Cloud","context":"Cited as the source for Google incident responders' analysis identifying Akira as the second most frequently observed malware family in 2025."},{"title":"Mar 2026 Review of Q1 Cyber Threat Intelligence Report","url":"https://insights.nccgroup.com/l/898251/2026-04-28/31n6mdt/898251/1777381752ayl7Zqps/Mar_2026_Review_of_Q1___Cyber_Threat_Intelligence_Report_FREEMIUM.pdf","publisher":"NCC Group","context":"Referenced by researchers to document over 100 attacks this year attributed to the ransomware operation."}],"body":"\u003cp\u003eDeniss Zolotarjovs, a 35-year-old Latvian citizen, was sentenced to 102 months in prison for money laundering and wire fraud related to his role as a ransomware negotiator. He pleaded guilty in July 2025 after being extradited from Georgia to the United States. Zolotarjovs operated for the Karakurt cybercriminal group, which utilized multiple brand names including Conti and Akira to extort victims.\u003c/p\u003e\n\n\u003cp\u003eHis primary responsibilities involved analyzing stolen data and employing aggressive tactics to pressure organizations into paying ransoms. The group extorted over 53 companies between June 2021 and March 2023, causing approximately $56 million in losses. Prosecutors highlighted a particularly egregious incident where Zolotarjovs threatened to distribute stolen pediatric health data to hundreds of patients after a healthcare provider refused to pay. He earned a 10% commission on each ransom payment and was tasked with training other negotiators within the organization. The Justice Department successfully argued for a lengthy sentence to remove a highly skilled operator from the threat landscape.\u003c/p\u003e\n"},{"n":3,"title":"UAT-8302 and its box full of malware","source":"blog.talosintelligence.com","sourceColor":"#60a5fa","link":"https://blog.talosintelligence.com/uat-8302/","time":"10:00","priority":"SHOULD READ","score":85,"group":"I","groupColor":"#a78bfa","tldr":"UAT-8302 is a China-nexus APT group targeting government entities in South America and southeastern Europe since late 2024, leveraging a diverse arsenal of custom and known malware families alongside open-source reconnaissance tools to establish persistent network access.","briefOverview":"\u003cp\u003eCisco Talos disclosed UAT-8302, a China-nexus APT group actively targeting government entities in South America and southeastern Europe since late 2024. Following initial compromise, the group conducts extensive network reconnaissance and credential extraction using open-source utilities and custom PowerShell scripts. They proliferate across compromised networks by leveraging Impacket, WMI, and credential dumping from tools like MobaXterm. The threat actor deploys a diverse arsenal of malware families, including the .NET-based NetDraft backdoor, CloudSorcerer version 3, and the VSHELL implant. UAT-8302 also establishes persistent access through proxy servers and VPN clients while utilizing tooling that closely mirrors other known China-nexus threat clusters.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco Talos has disclosed UAT-8302, a China-nexus advanced persistent threat group that has targeted government entities in South America and southeastern Europe since at least late 2024.\u003c/p\u003e\n\n\u003cp\u003eUpon gaining initial access, the group executes comprehensive reconnaissance using red-teaming utilities like Impacket and custom PowerShell scripts to map network topology and system configurations. They actively scan for live endpoints and open SMB shares before downloading open-source network scanning engines such as gogo, QScan, and naabu.\u003c/p\u003e\n\n\u003cp\u003eThe operator extracts sensitive data by querying Active Directory objects, collecting event logs, and capturing Azure AD Connect credentials. Lateral movement is achieved through WMI and scheduled task execution, alongside credential extraction from the MobaXterm SSH client.\u003c/p\u003e\n\n\u003cp\u003eUAT-8302 deploys multiple custom and publicly disclosed malware families to maintain persistence and control. The group utilizes NetDraft, a .NET variant of the FinalDraft backdoor that relies on the Microsoft Graph API and OneDrive for command-and-control communications. They also deploy CloudSorcerer version 3, which dynamically retrieves its C2 infrastructure by parsing data blobs from GitHub repositories or GameSpot profiles.\u003c/p\u003e\n\n\u003cp\u003eAdditional implants include the VSHELL backdoor delivered via SNOWLIGHT and a new Rust-based stager tracked as SNOWRUST. In some campaigns, the group pairs SNAPPYBEE/DeedRAT with the ZingDoor DLL implant, a tactic previously observed with the Earth Estries cluster. The operator further hardens its presence by deploying a native kernel driver from the open-source Hades HIDS/HIPS framework to monitor and hide system events.\u003c/p\u003e\n\n\u003cp\u003eTo facilitate external communication, UAT-8302 configures proxy servers using Stowaway and anyproxy, alongside SoftEther VPN clients. Cisco Talos has published ClamAV signatures and Snort rules to detect these malicious artifacts, alongside a comprehensive list of file hashes and network indicators of compromise.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"uat-8302-threat-actor-overview\"\u003eUAT-8302 Threat Actor Overview\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco Talos identifies UAT-8302 as a China-nexus APT group tasked with obtaining and maintaining long-term access to government and related entities globally.\u003c/li\u003e\n\u003cli\u003eThe group has been active since at least late 2024, primarily targeting government entities in South America and government agencies in southeastern Europe in 2025.\u003c/li\u003e\n\u003cli\u003ePost-compromise activities focus on information collection, credential extraction, and network proliferation using open-source tooling and custom-built malware.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"malware-arsenal\"\u003eMalware Arsenal\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eNetDraft (NosyDoor):\u003c/strong\u003e A .NET-based C# variant of the FinalDraft/SquidDoor family. It uses a benign executable to side-load a malicious DLL loader, which decrypts the implant from a data file. NetDraft leverages the Microsoft Graph API and OneDrive for command-and-control communications. It includes an embedded helper library named FringePorch that handles file management, command execution, and plugin loading.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCloudSorcerer Version 3:\u003c/strong\u003e A backdoor utilizing a side-loading triad of a benign executable, a malicious DLL loader, and an encrypted shellcode INI file. Depending on the host process (e.g., dpapimig.exe, spoolsv.exe, mspaint.exe), it performs system enumeration, file operations, and process injection. It retrieves C2 information by reading data blobs from GitHub repositories or GameSpot user profiles.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVSHELL \u0026amp; Stagers:\u003c/strong\u003e Delivered via a side-loading DLL that injects position-independent shellcode into explorer.exe. The payload uses a single-byte XOR key (0x99) to decode the VSHELL implant. UAT-8302 utilizes SNOWLIGHT, a lightweight downloader, alongside a new Rust-based variant tracked as SNOWRUST that uses the LexiCrypt obfuscator.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSNAPPYBEE/DeedRAT \u0026amp; ZingDoor:\u003c/strong\u003e The group deploys SNAPPYBEE/DeedRAT before rapidly switching to the ZingDoor DLL implant. Both families are attributed to the Earth Estries cluster.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHades HIDS/HIPS Driver:\u003c/strong\u003e UAT-8302 deploys a native kernel driver from the open-source Hades framework to register callbacks for process, thread, registry, and file events, allowing the operator to monitor, block, or hide system artifacts.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"tactics-techniques-and-procedures-ttps\"\u003eTactics, Techniques, and Procedures (TTPs)\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eReconnaissance \u0026amp; Scanning:\u003c/strong\u003e Operators run PowerShell scripts like \u003ccode\u003ewhatpc.ps1\u003c/code\u003e to collect system information and persist via scheduled tasks. They execute ping sweeps, NBT scans, and port scans to discover live endpoints and open SMB shares. Open-source scanning tools including gogo, QScan, naabu, dddd, PortQry, and httpx are downloaded and executed to map network services.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCredential Access \u0026amp; Information Collection:\u003c/strong\u003e The group queries Active Directory objects, collects security and system event logs, and captures audit policies. They extract Azure AD Connect credentials using adconnectdump.py and capture domain login IPs using a custom tool named SharpGetUserLoginIPRP. Credentials are also dumped from the MobaXterm SSH client to pivot across the network.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLateral Movement \u0026amp; Proliferation:\u003c/strong\u003e Movement is achieved through Impacket and WMI-based remote process creation. Executables are pushed to target systems via scheduled tasks or direct command execution to run accompanying malware scripts.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePersistence \u0026amp; Defense:\u003c/strong\u003e Backdoor access is maintained through proxy servers configured with Stowaway and anyproxy. The group also deploys SoftEther VPN clients to establish tunneling capabilities. NetDraft persists by creating malicious scheduled tasks that run hourly under the SYSTEM account.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"threat-actor-overlaps-tooling-connections\"\u003eThreat Actor Overlaps \u0026amp; Tooling Connections\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eUAT-8302 shares significant tooling overlap with multiple China-nexus clusters, indicating close operational relationships.\u003c/li\u003e\n\u003cli\u003eNetDraft connects to the Jewelbug/REF7707/CL-STA-0049 cluster and the LongNosedGoblin group.\u003c/li\u003e\n\u003cli\u003eCloudSorcerer v3 links to the EastWind APT campaign documented by Kaspersky.\u003c/li\u003e\n\u003cli\u003eSNOWLIGHT and Draculoader are shared with UAT-6382, UNC5174, UNC6586, Earth Estries, and Earth Naga.\u003c/li\u003e\n\u003cli\u003eSNAPPYBEE/DeedRAT and ZingDoor are attributed to Earth Estries.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"detection-coverage-indicators-of-compromise\"\u003eDetection Coverage \u0026amp; Indicators of Compromise\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco Talos has released ClamAV signatures and Snort rules to detect and block UAT-8302 artifacts.\u003c/li\u003e\n\u003cli\u003eFile hashes are provided for NetDraft, FringePorch, VSHELL, ZingDoor, gogo, Stowaway, anyproxy, QScan, Draculoader, dddd, httpx, SoftEther VPN, SharpGetUserLoginIPRP, Naabu, PortQry, and MobaXtermDecryptor.\u003c/li\u003e\n\u003cli\u003eNetwork indicators include domains like drivelivelime.com, msiidentity.com, trafficmanagerupdate.com, and update-kaspersky.workers.dev, alongside IP addresses such as 85.209.156.3, 185.238.189.41, and 103.27.108.55.\u003c/li\u003e\n\u003cli\u003eFull IOCs are available on the Cisco Talos GitHub repository.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["UAT-8302 is a China-nexus APT group that has targeted government entities in South America and southeastern Europe since at least late 2024.","The group deploys multiple malware families including NetDraft, CloudSorcerer version 3, VSHELL, SNAPPYBEE, and ZingDoor to establish persistent access.","Post-compromise operations involve extensive network reconnaissance, credential extraction from Active Directory and Azure AD, and lateral movement using Impacket and WMI.","UAT-8302 leverages open-source tools like gogo, QScan, Stowaway, and SoftEther VPN for network scanning, proxying, and establishing backdoor access.","The group's tooling overlaps with other China-nexus threat clusters such as Jewelbug, LongNosedGoblin, and Earth Estries, indicating close operational relationships."],"insights":["UAT-8302 abuses the Microsoft Graph API and OneDrive infrastructure as command-and-control channels for its NetDraft backdoor to blend malicious traffic with legitimate enterprise services.","The group deploys a native kernel driver from the open-source Hades HIDS/HIPS framework to monitor and potentially hide process, thread, registry, and file events from endpoint security solutions.","UAT-8302 extracts plaintext credentials directly from the MobaXterm SSH client to facilitate lateral movement across compromised networks without requiring password cracking.","CloudSorcerer version 3 dynamically retrieves its command-and-control addresses by parsing data blobs from GitHub repositories or GameSpot user profiles instead of relying on hardcoded domains.","The threat actor utilizes a Rust-based stager (SNOWRUST) built on the LexiCrypt obfuscator to deploy VSHELL, indicating a shift toward compiled, heavily obfuscated delivery mechanisms."],"referencedReports":[{"title":"LongNosedGoblin tries to sniff out governmental affairs in Southeast Asia and Japan","url":"https://www.welivesecurity.com/en/eset-research/longnosedgoblin-tries-sniff-out-governmental-affairs-southeast-asia-japan/","publisher":"ESET","context":"The article cites this research to attribute the NosyDoor/NetDraft malware to the LongNosedGoblin cluster targeting government organizations."},{"title":"EastWind APT Campaign","url":"https://securelist.com/eastwind-apt-campaign/113345/","publisher":"Kaspersky","context":"This report discloses the CloudSorcerer backdoor family and documents its use in attacks against Russian government entities in 2024."},{"title":"Breaking Down Earth Estries' Persistent TTPs in Prolonged Cyber Operations","url":"https://www.trendmicro.com/en_us/research/24/k/breaking-down-earth-estries-persistent-ttps-in-prolonged-cyber-o.html","publisher":"Trend Micro","context":"The article references this analysis to highlight the SNAPPYBEE/DeedRAT and ZingDoor malware combination attributed to the Earth Estries threat actor."},{"title":"Advanced Backdoor: SquidDoor","url":"https://unit42.paloaltonetworks.com/advanced-backdoor-squidoor/","publisher":"Palo Alto Networks Unit 42","context":"Cited as a reference for the CL-STA-0049 cluster that exclusively operates the FinalDraft/SquidDoor malware family."},{"title":"Initial Access Brokers Exploit F5 ScreenConnect","url":"https://cloud.google.com/blog/topics/threat-intelligence/initial-access-brokers-exploit-f5-screenconnect","publisher":"Google Cloud Threat Intelligence","context":"The article uses this report to document UNC5174 exploiting a zero-day vulnerability to target critical infrastructure organizations in the Americas."}],"body":"\u003cp\u003eCisco Talos disclosed UAT-8302, a China-nexus APT group actively targeting government entities in South America and southeastern Europe since late 2024. Following initial compromise, the group conducts extensive network reconnaissance and credential extraction using open-source utilities and custom PowerShell scripts. They proliferate across compromised networks by leveraging Impacket, WMI, and credential dumping from tools like MobaXterm. The threat actor deploys a diverse arsenal of malware families, including the .NET-based NetDraft backdoor, CloudSorcerer version 3, and the VSHELL implant. UAT-8302 also establishes persistent access through proxy servers and VPN clients while utilizing tooling that closely mirrors other known China-nexus threat clusters.\u003c/p\u003e\n"},{"n":5,"title":"FTC to ban data broker Kochava from selling Americans’ location data","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/ftc-to-ban-data-broker-kochava-from-selling-americans-location-data/","time":"14:39","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"The FTC has ordered data broker Kochava and its subsidiary to permanently stop selling precise location data without explicit consumer consent, following allegations of illegal tracking of sensitive locations. The settlement establishes strict consent verification, consumer data rights, and mandatory privacy controls to prevent future surveillance abuses.","briefOverview":"\u003cp\u003eThe Federal Trade Commission has ordered data broker Kochava and its subsidiary Collective Data Solutions to stop selling precise location data without explicit consumer consent. This settlement resolves charges filed nearly four years ago after the FTC alleged the company collected and monetized geolocation data from hundreds of millions of mobile devices. The data enabled clients to track individuals visiting sensitive locations like mental health clinics, places of worship, and domestic violence shelters. Kochava previously charged clients a $25,000 subscription fee to access this information through an AWS Marketplace data feed. The FTC found that consumers were unaware of the tracking and faced risks like stalking, discrimination, and physical violence. Under the new order, the companies must verify consent through supplier assessments, establish data retention schedules, and report any third-party misuse. The settlement aligns with broader FTC enforcement actions against other data brokers who harvested location tracking information.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Federal Trade Commission will prohibit data broker Kochava and its subsidiary Collective Data Solutions from selling precise location data without consumers\u0026rsquo; explicit consent.\u003c/p\u003e\n\n\u003cp\u003eThis decision settles charges brought nearly four years ago after the FTC sued the Idaho-based company in August 2022. The lawsuit alleged that Kochava collected and sold highly precise geolocation data from hundreds of millions of mobile devices. This information allowed purchasers to track users traveling to and from sensitive locations, such as addiction recovery facilities, reproductive health clinics, places of worship, and shelters for homeless individuals and domestic violence survivors.\u003c/p\u003e\n\n\u003cp\u003eClients accessed the data through a user-friendly feed on the Amazon Web Services Marketplace by paying a $25,000 subscription fee. Kochava claimed the feed processed over 94 billion geo transactions monthly across 125 million active users, with each device generating roughly 90 daily location pings. The FTC stated that affected consumers never consented to the sharing, leaving them vulnerable to stalking, discrimination, and physical violence. In response to the allegations, Kochava filed a lawsuit against the FTC and announced a new \u0026ldquo;Privacy Block\u0026rdquo; feature to restrict health service location data one day before the complaint was filed.\u003c/p\u003e\n\n\u003cp\u003eThe proposed court order now mandates that the companies cannot sell, license, transfer, or disclose precise location data unless affirmative express consent is obtained and the data supports a directly requested service. Beyond the sales ban, the settlement requires the implementation of a sensitive location data program and a supplier assessment protocol to independently verify consumer consent. Companies must also enable consumers to request disclosure of who received their data and withdraw consent at any time. Additionally, the firms must submit incident reports to the FTC whenever third parties misuse the information and establish a strict data retention and deletion schedule.\u003c/p\u003e\n\n\u003cp\u003eThe proposed order will become legally binding once approved by a U.S. District Court judge in Idaho. This case follows the FTC\u0026rsquo;s August 2022 announcement exploring new rules to crack down on mass commercial surveillance and lax data security practices. The agency previously warned that it would strictly enforce laws against companies illegally sharing sensitive consumer information. In 2024, the FTC expanded its enforcement efforts by banning several other data brokers, including InMarket Media, Outlogic, Gravy Analytics, and Mobilewalla, from harvesting and selling Americans\u0026rsquo; location tracking data.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"overview-of-the-ftc-enforcement-action\"\u003eOverview of the FTC Enforcement Action\u003c/h1\u003e\n\n\u003cp\u003eThe Federal Trade Commission has issued a proposed order to ban data broker Kochava and its subsidiary, Collective Data Solutions, from selling precise location data without explicit consumer consent. This settlement resolves legal charges initiated nearly four years ago. The FTC originally sued the Idaho-based company in August 2022, alleging widespread collection and monetization of geolocation data from hundreds of millions of mobile devices.\u003c/p\u003e\n\n\u003ch2 id=\"nature-and-scale-of-the-data-collection\"\u003eNature and Scale of the Data Collection\u003c/h2\u003e\n\n\u003cp\u003eThe data in question enabled clients to track the movements of individuals to and from highly sensitive locations. These locations included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMental health and addiction recovery facilities\u003c/li\u003e\n\u003cli\u003eReproductive health clinics\u003c/li\u003e\n\u003cli\u003ePlaces of worship\u003c/li\u003e\n\u003cli\u003eShelters for homeless individuals and domestic violence survivors\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eKochava distributed this information through a data feed hosted on the Amazon Web Services Marketplace. Clients paid a $25,000 subscription fee to access the feed. The company claimed the feed delivered approximately 94 billion geo transactions per month, tracked 125 million monthly active users, and monitored 35 million daily active users. On average, each device generated more than 90 daily location transactions.\u003c/p\u003e\n\n\u003ch2 id=\"consumer-impact-and-company-response\"\u003eConsumer Impact and Company Response\u003c/h2\u003e\n\n\u003cp\u003eThe FTC determined that affected consumers were completely unaware of the data collection and had not provided consent. This lack of transparency exposed individuals to significant harms, including stalking, discrimination, and physical violence. In response to the impending legal action, Kochava filed a lawsuit against the FTC, alleging government overreach. One day before the FTC filed its complaint, Kochava announced a new \u0026ldquo;Privacy Block\u0026rdquo; feature designed to block health services locations from its marketplace.\u003c/p\u003e\n\n\u003ch2 id=\"settlement-requirements-and-compliance-mandates\"\u003eSettlement Requirements and Compliance Mandates\u003c/h2\u003e\n\n\u003cp\u003eThe proposed order, filed in the U.S. District Court for the District of Idaho, establishes strict operational requirements. The companies are prohibited from selling, licensing, transferring, or disclosing precise location data unless they obtain affirmative express consent. Furthermore, the data can only be used to provide services that consumers directly requested. Additional compliance mandates include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEstablishing a dedicated sensitive location data program\u003c/li\u003e\n\u003cli\u003eImplementing a supplier assessment program to independently verify consumer consent\u003c/li\u003e\n\u003cli\u003eProviding consumers the ability to request disclosure of who received their data and withdraw consent\u003c/li\u003e\n\u003cli\u003eSubmitting incident reports to the FTC whenever third parties misuse the location data\u003c/li\u003e\n\u003cli\u003eCreating a comprehensive data retention and deletion schedule\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe order will carry the force of law once approved by the presiding judge.\u003c/p\u003e\n\n\u003ch2 id=\"broader-regulatory-context\"\u003eBroader Regulatory Context\u003c/h2\u003e\n\n\u003cp\u003eThis enforcement action aligns with the FTC\u0026rsquo;s broader strategy to regulate commercial surveillance. In August 2022, the agency announced it was exploring new rules to crack down on businesses engaged in mass commercial surveillance and lax data security practices. A month prior, the FTC warned that it would fully enforce existing laws against companies illegally sharing or using sensitive consumer information. The Kochava settlement follows a pattern of recent enforcement, as the agency banned multiple other data brokers in 2024, including InMarket Media, Outlogic, Gravy Analytics, and Mobilewalla, for harvesting and selling Americans\u0026rsquo; location tracking data.\u003c/p\u003e\n","keyPoints":["The FTC will ban data broker Kochava and its subsidiary from selling precise location data without consumers' explicit consent.","The agency's 2022 lawsuit alleged the company collected and sold geolocation data that revealed visits to sensitive locations like health clinics, places of worship, and shelters.","The proposed settlement requires the companies to implement a sensitive location data program, verify consumer consent, and establish data retention and deletion schedules.","This enforcement action follows similar FTC bans against other data brokers, including InMarket Media, Outlogic, Gravy Analytics, and Mobilewalla, for harvesting location tracking data."],"insights":["The data feed processed roughly 94 billion monthly geo transactions across 125 million users, averaging over 90 daily location pings per device, which reveals the extreme granularity of tracking enabled by standard mobile SDKs.","The settlement mandates a supplier assessment program to independently verify consumer consent before data sharing, placing the compliance burden on Kochava to audit its downstream partners.","Companies must submit incident reports to the FTC whenever third parties misuse the location data, establishing a continuous enforcement feedback loop rather than relying on static compliance checks.","Kochava announced a \"Privacy Block\" for health service locations just one day before the FTC filed its complaint, indicating a reactive attempt to mitigate regulatory scrutiny rather than proactive privacy design."],"referencedReports":[],"body":"\u003cp\u003eThe Federal Trade Commission has ordered data broker Kochava and its subsidiary Collective Data Solutions to stop selling precise location data without explicit consumer consent. This settlement resolves charges filed nearly four years ago after the FTC alleged the company collected and monetized geolocation data from hundreds of millions of mobile devices. The data enabled clients to track individuals visiting sensitive locations like mental health clinics, places of worship, and domestic violence shelters. Kochava previously charged clients a $25,000 subscription fee to access this information through an AWS Marketplace data feed. The FTC found that consumers were unaware of the tracking and faced risks like stalking, discrimination, and physical violence. Under the new order, the companies must verify consent through supplier assessments, establish data retention schedules, and report any third-party misuse. The settlement aligns with broader FTC enforcement actions against other data brokers who harvested location tracking information.\u003c/p\u003e\n"},{"n":6,"title":"The EOL Blind Spot in Your CVE Feed: What SCA Tools Don't Check.","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/the-eol-blind-spot-in-your-cve-feed-what-sca-tools-dont-check/","time":"14:00","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"Standard vulnerability scanners miss exploits in abandoned open-source software because CVEs only cover actively supported versions, leaving organizations exposed to unpatched risks. Closing this blind spot requires dedicated EOL scanning tools to detect and remediate legacy dependencies.","briefOverview":"\u003cp\u003eStandard vulnerability scanners and CVE feeds only investigate actively supported software versions, leaving abandoned packages completely unmonitored.\u003c/p\u003e\n\n\u003cp\u003eThis creates a massive blind spot where exploitable vulnerabilities in end-of-life software go entirely unflagged. Research indicates that approximately 80% of CVEs disclosed on supported versions also affect abandoned versions that were never officially investigated.\u003c/p\u003e\n\n\u003cp\u003eThe industry currently tracks only around 7,000 abandoned package versions, while the actual number across major registries exceeds 5.4 million. Transitive dependencies carry the majority of this hidden exposure, meaning organizations often run abandoned libraries without realizing it.\u003c/p\u003e\n\n\u003cp\u003eAs AI-assisted vulnerability research scales, it will increasingly discover exploits in legacy software that will never receive official patches. Security teams must stop treating scanner silence as safety and adopt dedicated EOL scanning tools to identify and remediate these unpatched risks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eWhen security teams evaluate end-of-life open source software, they typically focus only on the cessation of patches, but this overlooks two compounding problems.\u003c/p\u003e\n\n\u003cp\u003eThe first issue is that the CVE ecosystem deliberately avoids investigating unsupported versions due to overwhelming scale and limited bandwidth. Maintainers prioritize actively supported releases, resulting in millions of false negatives where EOL versions fall outside official affected ranges. The second issue is that public tracking sources only account for roughly 7,000 abandoned versions across about 350 projects.\u003c/p\u003e\n\n\u003cp\u003eIn reality, analysis of 12 million package versions reveals that 5.4 million are end-of-life, with npm alone having roughly 25% of its versions abandoned. Transitive dependencies account for the majority of this exposure, meaning 5 to 15 percent of enterprise dependency graphs contain unmonitored legacy code. HeroDevs has confirmed over 81,000 EOL versions with known CVEs and no available fix path, estimating the true figure exceeds 400,000.\u003c/p\u003e\n\n\u003cp\u003eFurthermore, approximately 80 percent of CVEs disclosed on supported versions also impact EOL versions that lack official investigation. The situation is accelerating as the open source ecosystem scales faster than its security monitoring infrastructure. AI-driven vulnerability research will soon surface exploits in abandoned software that will never receive upstream patches.\u003c/p\u003e\n\n\u003cp\u003eSecurity teams must recognize that EOL dates mark the moment risk transfers to the operator. Organizations should immediately implement dedicated EOL scanning solutions to map their true exposure and stop relying on standard scanner alerts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eThis article highlights a critical vulnerability in how security teams monitor open source dependencies. Standard CVE feeds and SCA tools only investigate actively supported software, leaving end-of-life versions exposed to unpatched exploits. The analysis reveals that the industry\u0026rsquo;s tracking mechanisms are fundamentally inadequate for the scale of abandoned software in modern supply chains.\u003c/p\u003e\n\n\u003ch3 id=\"the-cve-investigation-gap\"\u003eThe CVE Investigation Gap\u003c/h3\u003e\n\n\u003cp\u003eThe first major problem stems from how CVEs are filed and consumed. Maintainers determine affected versions based on their active support windows and file advisories accordingly. Every vulnerability scanner and SBOM tool consumes these defined ranges, meaning any version outside the range receives no alert.\u003c/p\u003e\n\n\u003cp\u003eEOL versions fall outside these ranges by default because investigative bandwidth is strictly limited. Global CVE counts have doubled in five years, and unscored CVEs increased 37 times. Maintainers cannot reasonably investigate older release lines, leading to massive blind spots. Sonatype\u0026rsquo;s 2026 report identified 167,286 false negatives in 2025 alone, directly driven by EOL versions being omitted from advisories.\u003c/p\u003e\n\n\u003ch3 id=\"the-scale-of-untracked-abandonment\"\u003eThe Scale of Untracked Abandonment\u003c/h3\u003e\n\n\u003cp\u003eThe second problem is that the industry tracks a tiny fraction of actually abandoned software. Public sources like endoflife.date monitor roughly 350 projects and identify only 7,000 EOL versions. However, comprehensive analysis of 12 million package versions across npm, PyPI, Maven, NuGet, and other registries shows that 5.4 million versions are end-of-life.\u003c/p\u003e\n\n\u003cp\u003eThe breakdown reveals that 25% of npm versions, 18% of NuGet versions, 13% of Cargo versions, 11% of PyPI versions, and 10% of Maven Central versions are abandoned. These versions actively appear in enterprise SBOMs but lack CVE investigation coverage. Transitive dependencies carry the majority of this hidden exposure, with 5 to 15 percent of enterprise dependency graphs containing EOL components. HeroDevs has confirmed over 81,000 EOL versions with known CVEs and no fix path, estimating the actual number exceeds 400,000.\u003c/p\u003e\n\n\u003ch3 id=\"compounding-risks-and-ai-driven-exposure\"\u003eCompounding Risks and AI-Driven Exposure\u003c/h3\u003e\n\n\u003cp\u003eThis dynamic is accelerating due to ecosystem scaling and emerging AI capabilities. The open source ecosystem is growing faster than its security monitoring infrastructure. npm alone recorded over 838,000 releases with critical CVSS 9.0+ scores in 2025, while PyPI downloads grew over 50 percent year over year.\u003c/p\u003e\n\n\u003cp\u003eEvery new version eventually becomes an EOL version, yet investigative capacity remains static. AI-assisted vulnerability research, such as Anthropic\u0026rsquo;s Project Glasswing, will increasingly identify exploits across the entire codebase landscape. For supported software, AI accelerates defense by routing findings to engineers. For EOL software, AI will surface vulnerabilities in versions that no maintainer watches.\u003c/p\u003e\n\n\u003cp\u003eThese findings will not trigger scanner alerts, and no upstream patches will ever address them. The same capability that strengthens defense for active software permanently widens the exposure gap for abandoned packages.\u003c/p\u003e\n\n\u003ch3 id=\"actionable-recommendations\"\u003eActionable Recommendations\u003c/h3\u003e\n\n\u003cp\u003eSecurity teams must fundamentally shift their approach to legacy dependencies. Organizations should start with immediate visibility by using dedicated EOL scanning tools to map their entire stack. These tools can identify both announced and abandoned packages across all major registries in minutes.\u003c/p\u003e\n\n\u003cp\u003eTeams must stop treating scanner silence as safety, as a clean scan against an EOL package simply means it was never checked. The Spring Security CVE-2026-22732 example proves that EOL users remain exposed without warning until third parties investigate and report. EOL dates are not finish lines; they are the exact moment risk transfers from the maintainer to the operator.\u003c/p\u003e\n\n\u003cp\u003eAs AI research scales, the number of undisclosed vulnerabilities in uninvestigated EOL packages will only grow. Immediate adoption of comprehensive EOL monitoring is required to close this critical supply chain blind spot.\u003c/p\u003e\n","keyPoints":["Standard CVE feeds and vulnerability scanners only investigate actively supported software versions, leaving abandoned versions unmonitored and unalerted.","HeroDevs confirmed that approximately 80% of CVEs disclosed on supported versions also affect EOL versions that were never officially investigated.","Public EOL tracking sources only account for roughly 7,000 abandoned versions, while actual EOL versions across major package registries total approximately 5.4 million.","AI-assisted vulnerability research will increasingly discover exploits in EOL software that lack official patches, significantly widening the security exposure gap."],"insights":["A clean vulnerability scan result for an EOL package actually indicates the software was never investigated, not that it is secure.","Public EOL tracking databases cover less than 0.14% of the total abandoned packages across major registries, leaving the vast majority of legacy exposure invisible to standard security tools.","AI-assisted vulnerability research will increasingly discover exploits in abandoned software that will never receive official patches, permanently transferring the mitigation burden to the operator.","Transitive dependencies account for the majority of hidden EOL exposure, meaning organizations likely run abandoned libraries even when their direct dependencies appear fully supported."],"referencedReports":[{"title":"Sonatype's 2026 State of the Software Supply Chain report","url":"https://www.sonatype.com/state-of-the-software-supply-chain/2026/vulnerability-management","publisher":"Sonatype","context":"The article cites this report for data regarding the doubling of global CVE counts over five years and the 37x increase in unscored CVEs."}],"body":"\u003cp\u003eStandard vulnerability scanners and CVE feeds only investigate actively supported software versions, leaving abandoned packages completely unmonitored.\u003c/p\u003e\n\n\u003cp\u003eThis creates a massive blind spot where exploitable vulnerabilities in end-of-life software go entirely unflagged. Research indicates that approximately 80% of CVEs disclosed on supported versions also affect abandoned versions that were never officially investigated.\u003c/p\u003e\n\n\u003cp\u003eThe industry currently tracks only around 7,000 abandoned package versions, while the actual number across major registries exceeds 5.4 million. Transitive dependencies carry the majority of this hidden exposure, meaning organizations often run abandoned libraries without realizing it.\u003c/p\u003e\n\n\u003cp\u003eAs AI-assisted vulnerability research scales, it will increasingly discover exploits in legacy software that will never receive official patches. Security tea
