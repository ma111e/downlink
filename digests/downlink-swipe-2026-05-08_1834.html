<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

<script>
window.__DL_ARTICLES = [{"n":1,"title":"Multiple universities forced to reschedule final exams after Canvas cyber incident","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/universities-forced-to-reschedule-exams-canvas-incident","time":"15:48","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"A second cyberattack by the ShinyHunters group on the Canvas education platform forced dozens of U.S. universities to reschedule final exams and temporarily shut down the system, though no new data was stolen and the platform has since been restored.","briefOverview":"\u003cp\u003eA second cyberattack by the ShinyHunters group on the Canvas education platform forced dozens of U.S. universities to reschedule final exams and temporarily shut down the system. Instructure took the platform offline after hackers defaced login pages with a ransom demand tied to a previous breach. The company confirmed the incident exploited vulnerabilities in its Free-For-Teacher accounts and stated that no new data was stolen during this specific incident.\u003c/p\u003e\n\n\u003cp\u003eWhile the first attack compromised 3.6 terabytes of information from over 9,000 schools, Instructure has since restored full access and confirmed the threat actors no longer have platform access. The FBI and CISA have been notified, and cybersecurity experts warn that the primary long-term risk involves delayed phishing campaigns rather than immediate identity theft.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eUniversities across the United States were forced to delay final exams following a cyberattack on Canvas, a widely used educational platform developed by Instructure. On Thursday, students encountered a defacement message from the ShinyHunters cybercriminal gang demanding ransom negotiations by May 12. This incident followed a previous breach discovered on April 29, during which hackers stole 3.6 terabytes of data from over 9,000 schools. Instructure confirmed that the same threat actors remained inside its systems as of May 7 and executed the latest defacement.\u003c/p\u003e\n\n\u003cp\u003eThe company immediately took Canvas offline and shut down its Free-For-Teacher accounts to contain the breach and initiate a forensic investigation. Instructure has notified the FBI, the Cybersecurity and Infrastructure Security Agency, and international law enforcement agencies regarding the incident. External cybersecurity experts have since found no evidence that the threat actor currently maintains access to the platform. While the initial attack compromised names, email addresses, student ID numbers, and user messages, no new data was exfiltrated during the Thursday incident.\u003c/p\u003e\n\n\u003cp\u003eInstructure removed the hackers from their leak site on Thursday night and has since fully restored Canvas to the public. Social media was flooded with student reactions ranging from jokes to genuine concern over academic impacts and potential phishing risks. Adam Marrè, CISO at Arctic Wolf, noted that centralized platforms like Canvas are prime targets because a single breach simultaneously pressures thousands of organizations. He emphasized that the most significant post-incident threat involves sophisticated phishing campaigns that emerge weeks or months later. The ShinyHunters group has a documented history of targeting high-profile sectors, including airlines, insurance companies, home security firms, and major educational publishers. Instructure’s spokesperson confirmed that the unauthorized changes were limited to the login pages of affected accounts. The company continues to work with cybersecurity experts to ensure platform security while resuming normal operations.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eIncident Overview\u003c/strong\u003e\nA second cyberattack by the ShinyHunters cybercriminal group targeted Canvas, the educational platform created by Instructure. The incident forced dozens of U.S. universities and K-12 school districts to reschedule final exams and issue security warnings to their communities. On Thursday, students navigating Canvas encountered a defacement message from the hackers demanding ransom negotiations by May 12. The message claimed the group breached Instructure \u0026ldquo;again\u0026rdquo; after the company refused to negotiate a ransom following a prior incident. Instructure quickly removed the message and replaced it with an \u0026ldquo;under maintenance\u0026rdquo; landing page.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTechnical Details and Data Impact\u003c/strong\u003e\nInstructure confirmed that the attackers exploited a vulnerability specific to the platform\u0026rsquo;s Free-For-Teacher accounts. The company immediately took the entire Canvas platform offline to contain access and initiated a forensic investigation. External cybersecurity experts have since found no evidence that the threat actor currently maintains access to the platform. The incident is directly tied to a previous breach discovered on April 29, during which hackers stole 3.6 terabytes of data from more than 9,000 schools. That initial compromise included names, email addresses, student ID numbers, and messages between users. Instructure explicitly stated that no new data was exfiltrated during the Thursday defacement incident. The company also removed itself from the ShinyHunters leak site on Thursday night.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eOrganizational Response and Law Enforcement\u003c/strong\u003e\nInstructure notified the FBI, the Cybersecurity and Infrastructure Security Agency (CISA), and international law enforcement agencies. The FBI declined to comment, and CISA did not respond to requests for information. As a precautionary measure, Instructure temporarily shut down all Free-For-Teacher accounts to restore platform security. The company hired external cyber experts to conduct a thorough investigation and has since fully restored Canvas to the public. Instructure published a detailed FAQ outlining the timeline and security measures taken. The company did not respond to requests for comment regarding potential ransom payments.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eIndustry Impact and Expert Analysis\u003c/strong\u003e\nThe outage disrupted academic operations at major institutions, including Baylor University, the University of Texas, the University of Pennsylvania, Iowa State, Duke, the University of Oklahoma, the University of Florida, Northwestern, Princeton, and Ohio State. Social media was inundated with student reactions, ranging from humor to genuine concern over academic impacts and potential grade disruptions. Adam Marrè, CISO at Arctic Wolf, highlighted that centralized educational platforms are highly attractive targets because a single breach simultaneously exposes thousands of organizations. He warned that the most significant long-term risk is not immediate identity theft, but rather sophisticated phishing campaigns that surface weeks or months later. The ShinyHunters group has a documented history of high-profile attacks over the past two years, including incidents targeting Hawaiian Airlines, insurance companies, Harvard, the University of Pennsylvania, ADT, McGraw Hill, and Rockstar Games.\u003c/p\u003e\n","keyPoints":["The ShinyHunters cybercriminal group defaced the Canvas platform with a ransom demand, prompting Instructure to temporarily take the system offline and shut down Free-For-Teacher accounts.","Dozens of U.S. universities and K-12 districts were forced to reschedule final exams and warn students about the outage and potential phishing risks.","Instructure confirmed the attack exploited vulnerabilities in Free-For-Teacher accounts and stated that no new data was stolen during this incident.","This incident follows a previous breach by the same group last week that compromised data from over 9,000 schools and resulted in the theft of 3.6 TB of information."],"insights":["The breach specifically exploited \"Free-For-Teacher\" accounts, highlighting a critical vulnerability in the platform's widely used, less-secured tier that requires immediate access review.","Threat actors maintained persistent access to Instructure's systems for over a week after the initial breach, demonstrating that simple credential revocation is insufficient for full threat eradication.","The primary post-incident risk is not immediate data exposure but delayed phishing campaigns that leverage stolen institutional data to target victims weeks or months later.","Centralized educational platforms like Canvas create a single point of failure where one compromise simultaneously pressures thousands of institutions, maximizing extortion leverage and financial impact."],"referencedReports":[],"body":"\u003cp\u003eA second cyberattack by the ShinyHunters group on the Canvas education platform forced dozens of U.S. universities to reschedule final exams and temporarily shut down the system. Instructure took the platform offline after hackers defaced login pages with a ransom demand tied to a previous breach. The company confirmed the incident exploited vulnerabilities in its Free-For-Teacher accounts and stated that no new data was stolen during this specific incident.\u003c/p\u003e\n\n\u003cp\u003eWhile the first attack compromised 3.6 terabytes of information from over 9,000 schools, Instructure has since restored full access and confirmed the threat actors no longer have platform access. The FBI and CISA have been notified, and cybersecurity experts warn that the primary long-term risk involves delayed phishing campaigns rather than immediate identity theft.\u003c/p\u003e\n"},{"n":2,"title":"Why More Analysts Won’t Solve Your SOC’s Alert Problem","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/why-more-analysts-wont-solve-your-socs-alert-problem/","time":"14:02","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"Security teams cannot hire their way out of modern alert overload because the underlying operating model is broken; adopting AI automation for routine investigations is the only viable path to clear backlogs, reduce costs, and free human analysts for complex, context-driven threats.","briefOverview":"\u003cp\u003eSecurity spending has roughly doubled over the past six years, yet detection and containment timelines remain stagnant because SOCs rely on an outdated human-driven triage model. The volume of alerts exceeding human investigation capacity cannot be resolved by simply hiring more analysts. Instead, organizations must shift their operating architecture to automate routine investigations. AI platforms process alerts at machine speed, returning thousands of analyst hours daily and significantly reducing SIEM storage costs. This automation clears backlogs and forces teams to investigate lower-severity alerts where attackers typically hide. Human analysts should remain focused on complex insider threats, novel attack techniques, and environments with strict data residency requirements. Ultimately, changing the underlying architecture is the only viable path to resolving alert overload and improving security metrics.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSecurity spending has doubled in six years, but time-to-detect and contain breaches has not improved at the same pace. Global median dwell time sits at 14 days, while the hand-off window between initial access and secondary threat transfer has collapsed to just 22 seconds. IBM research indicates that the average time to identify and contain a breach is 241 days, costing $4.88 million on average. Despite these metrics, SOC teams have already implemented standard efficiency moves like severity tiering, auto-closing benign alerts, and suppressing noisy rules. The fundamental issue is that post-tiering alert volumes consistently exceed human investigation capacity. The article provides a four-question diagnostic to evaluate SOC capacity blind spots, including investigation coverage rates, undocumented rule suppressions, senior analyst turnover, and capacity limits under doubled volume. If multiple answers raise concerns, the program must move beyond hiring and address its underlying architecture. AI investigation platforms resolve this gap by processing alerts at machine speed. Case studies show platforms handling thousands of investigations in weeks, returning over a thousand analyst hours and reducing SIEM costs by thirty to sixty percent through optional telemetry ingestion. Funding these platforms typically comes from offsetting unapproved headcount budgets, capturing SIEM storage savings, or displacing existing SOAR tools. However, humans must still lead investigations involving insider threats with non-technical context, novel attack techniques, and highly regulated environments with strict data residency rules. Buyers should also verify vendor data portability, runbook independence, and contractual continuity during potential acquisitions or wind-down events. When AI handles routine investigations, the audit trail becomes a complete chain of reasoning rather than brief case notes, satisfying regulatory and board demands. Detection engineering shifts upstream, using comprehensive AI investigation data to proactively tune rules instead of relying on manual triage feedback. Procurement cycles often involve security, IT, compliance, legal, and procurement teams, so cross-functional planning is essential to avoid delays. Ultimately, the operating model must change from human-driven triage to AI-augmented investigation to clear backlogs and scale security operations effectively.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"core-problem-the-broken-operating-model\"\u003eCore Problem: The Broken Operating Model\u003c/h3\u003e\n\n\u003cp\u003eSecurity spending has roughly doubled over the past six years, yet detection and containment timelines remain stagnant. Global median dwell time is currently 14 days, and the hand-off window between initial access and secondary threat transfer has collapsed to just 22 seconds. IBM research indicates that the average time to identify and contain a breach is 241 days, costing $4.88 million on average. Despite these metrics, SOC teams have already implemented standard efficiency moves like severity tiering, auto-closing benign alerts, and suppressing noisy rules. The fundamental issue is that post-tiering alert volumes consistently exceed human investigation capacity.\u003c/p\u003e\n\n\u003ch3 id=\"capacity-analysis-and-diagnostic-framework\"\u003eCapacity Analysis and Diagnostic Framework\u003c/h3\u003e\n\n\u003cp\u003ePost-tiering queues typically generate 120 to 150 alerts daily, requiring 40 to 50 analyst hours. Even teams with five to ten analysts cannot cover this volume at the required depth during business hours. The article outlines a four-question diagnostic to identify capacity blind spots:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhat percentage of alerts above the investigation threshold were actually investigated last quarter?\u003c/li\u003e\n\u003cli\u003eHow many detection rules were suppressed without engineering tickets to replace the coverage?\u003c/li\u003e\n\u003cli\u003eWhat was the senior analyst turnover rate and ramp time for replacements?\u003c/li\u003e\n\u003cli\u003eWhat operational task would be cut first if alert volume doubled tomorrow?\nIf three or more answers raise concerns, the program must shift from hiring to architectural changes.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"ai-automation-and-operational-outcomes\"\u003eAI Automation and Operational Outcomes\u003c/h3\u003e\n\n\u003cp\u003eAI investigation platforms resolve the capacity gap by processing alerts at machine speed. Case studies demonstrate significant operational shifts:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eJB Poindexter Co processed 4,407 investigations in 60 days with a mean investigation time under four minutes, returning 1,469 analyst hours.\u003c/li\u003e\n\u003cli\u003eCabinetworks processed 3,200 alerts in 33 days, resulting in a 90% reduction in SIEM costs by making raw telemetry ingestion optional.\u003c/li\u003e\n\u003cli\u003eClearing the queue forces teams to investigate low and medium severity alerts, which is where attackers typically hide while defenders are buried in critical noise.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"funding-strategies-and-procurement-considerations\"\u003eFunding Strategies and Procurement Considerations\u003c/h3\u003e\n\n\u003cp\u003eCISOs typically fund AI SOC platforms through three distinct paths:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnapproved Headcount Budget: Replacing pending Tier 2 analyst roles, which typically cost \u003cspan class=\"math inline\"\u003e\\(180K to \\)\u003c/span\u003e300K fully loaded.\u003c/li\u003e\n\u003cli\u003eSIEM Cost Reduction: Cutting ingest and storage tiers when AI handles pivots directly against source systems, often saving 30 to 60 percent of total SIEM spend.\u003c/li\u003e\n\u003cli\u003eTool Displacement: Replacing existing SOAR, case management, or managed services, though this requires significant change management.\nProcurement often involves security, IT, compliance, legal, and procurement teams. Bringing compliance and legal into the evaluation early typically halves the closing time. Buyers must also verify vendor data portability, runbook independence, and contractual continuity during potential acquisitions or wind-down events.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"human-oversight-and-detection-engineering-evolution\"\u003eHuman Oversight and Detection Engineering Evolution\u003c/h3\u003e\n\n\u003cp\u003eHumans must remain in the lead for three specific categories:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInsider threats where the deciding signal exists in non-technical human context rather than logs.\u003c/li\u003e\n\u003cli\u003eNovel tactics and techniques that lack historical analogs in training data.\u003c/li\u003e\n\u003cli\u003eHighly regulated environments where data residency rules dictate strict cloud or country boundaries.\nWhen AI handles routine investigations, the audit trail becomes a complete chain of reasoning, satisfying regulatory and board demands for defensible documentation. Detection engineering shifts upstream, using comprehensive AI investigation data to proactively tune rules instead of relying on manual triage feedback. Teams that fail to operationalize this shift experience detection quality drift, while those that do see intentional improvement. Ultimately, changing the underlying architecture from human-driven triage to AI-augmented investigation is the only viable path to resolving alert overload and scaling security operations effectively.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Security spending has roughly doubled in six years, but detection and containment timelines have not improved because SOCs rely on an outdated human-driven triage model.","Post-tiering alert volumes consistently exceed human investigation capacity, meaning hiring more analysts cannot resolve backlog-driven security gaps.","AI investigation platforms process alerts at machine speed, returning hundreds of analyst hours daily and reducing SIEM costs by eliminating unnecessary telemetry ingestion.","CISOs typically fund AI SOC platforms by offsetting unapproved headcount budgets, capturing SIEM storage savings, or displacing existing SOAR tools.","Human analysts must still lead investigations involving insider threats with non-technical context, novel attack techniques, and environments with strict data residency rules."],"insights":["Suppressing noisy detection rules without engineering tickets to replace the coverage creates undocumented attack surface debt.","When AI handles investigation pivots directly against source systems, the SIEM ingest tier becomes optional, often yielding 30-60% storage savings that exceed the AI platform cost.","Clearing the alert backlog forces teams to investigate low and medium severity alerts, which is where attackers typically hide while defenders are buried in critical noise.","Vendor procurement should prioritize contractual continuity clauses for acquisition or wind-down events, as most vendors lack clean answers for service obligations during corporate transitions."],"referencedReports":[{"title":"M-Trends 2026","url":"https://cloud.google.com/blog/topics/threat-intelligence/m-trends-2026","publisher":"Google Cloud / Mandiant","context":"Cited to provide statistics on global median dwell time and the collapsing hand-off window between initial access and secondary threat group transfer."},{"title":"Cost of a Data Breach","url":"https://www.ibm.com/reports/data-breach","publisher":"IBM","context":"Referenced for data on the average time to identify and contain breaches, as well as the associated financial costs."}],"body":"\u003cp\u003eSecurity spending has roughly doubled over the past six years, yet detection and containment timelines remain stagnant because SOCs rely on an outdated human-driven triage model. The volume of alerts exceeding human investigation capacity cannot be resolved by simply hiring more analysts. Instead, organizations must shift their operating architecture to automate routine investigations. AI platforms process alerts at machine speed, returning thousands of analyst hours daily and significantly reducing SIEM storage costs. This automation clears backlogs and forces teams to investigate lower-severity alerts where attackers typically hide. Human analysts should remain focused on complex insider threats, novel attack techniques, and environments with strict data residency requirements. Ultimately, changing the underlying architecture is the only viable path to resolving alert overload and improving security metrics.\u003c/p\u003e\n"},{"n":4,"title":"Fake Call History Apps Stole Payments From Users After 7.3 Million Play Store Downloads","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/fake-call-history-apps-stole-payments.html","time":"15:08","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"Cybersecurity researchers uncovered the CallPhantom campaign, where 28 fake Google Play apps tricked users into paying for fabricated call history data, resulting in over 7.3 million downloads and widespread financial losses across Asia.","briefOverview":"\u003cp\u003eCybersecurity researchers from ESET have identified a fraudulent campaign dubbed CallPhantom, involving 28 Android apps on the Google Play Store that falsely promised access to call histories, SMS records, and WhatsApp logs for any phone number. These applications collectively amassed over 7.3 million downloads before removal, primarily targeting users in India and the Asia-Pacific region. Instead of delivering real data, the apps required users to pay subscription fees ranging from \u003cspan class=\"math inline\"\u003e\\(6 to \\)\u003c/span\u003e80 to access entirely fabricated information generated by the developers. Some apps even impersonated official government domains to build false trust, while others used deceptive exit notifications to force users back to the paywall. Payments were processed through Google Play billing, third-party UPI applications, or direct credit card forms, with Google only able to issue refunds for transactions made through its official system. The article also notes a separate but contemporaneous fraud campaign by Group-IB, where threat actors stole approximately $2 million from Indonesian users by impersonating the CoreTax platform and distributing malware through social engineering and malicious APKs.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers have uncovered a fraudulent app campaign known as CallPhantom, involving 28 applications on the Google Play Store that falsely promised access to call histories and SMS records for any phone number.\u003c/p\u003e\n\n\u003cp\u003eThese applications collectively amassed over 7.3 million downloads before removal, primarily targeting Android users in India and the Asia-Pacific region.\u003c/p\u003e\n\n\u003cp\u003eInstead of providing real data, the apps required users to pay subscription fees ranging from \u003cspan class=\"math inline\"\u003e\\(6 to \\)\u003c/span\u003e80 to unlock fabricated information.\u003c/p\u003e\n\n\u003cp\u003eOne application attempted to build trust by publishing under the developer name \u0026ldquo;Indian gov.in\u0026rdquo;, while others used deceptive exit notifications to force users back to the paywall.\u003c/p\u003e\n\n\u003cp\u003eThe malicious software operated without requesting sensitive permissions and contained no actual functionality to retrieve call or message data.\u003c/p\u003e\n\n\u003cp\u003ePayment collection relied on Google Play billing, third-party UPI applications, or direct credit card forms, with Google only able to refund transactions made through its official system.\u003c/p\u003e\n\n\u003cp\u003eThe article also documents a separate financial fraud campaign by Group-IB targeting Indonesian users through the impersonation of the CoreTax platform.\u003c/p\u003e\n\n\u003cp\u003eThis operation, dubbed GoldFactory, has stolen an estimated $2 million since July 2025 by combining phishing, WhatsApp social engineering, and malicious APK distribution.\u003c/p\u003e\n\n\u003cp\u003eOnce installed, the malware deployed remote access trojans like Gigabud and MMRat to harvest sensitive data for unauthorized financial transfers.\u003c/p\u003e\n\n\u003cp\u003eThe attackers have leveraged this infrastructure to abuse over 16 trusted brands, actively targeting Indonesia\u0026rsquo;s population of approximately 287 million people.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"campaign-overview-and-scope\"\u003eCampaign Overview and Scope\u003c/h3\u003e\n\n\u003cp\u003eCybersecurity researchers from ESET have identified a fraudulent application campaign codenamed CallPhantom. The operation involved 28 distinct Android apps distributed through the official Google Play Store. These applications falsely advertised the ability to retrieve call histories, SMS records, and WhatsApp logs for any given phone number. Collectively, the apps accumulated more than 7.3 million downloads prior to their removal, with a single application accounting for over three million. The campaign primarily targeted Android users across India and the broader Asia-Pacific region. Evidence suggests the malicious activity has been active since at least November 2025.\u003c/p\u003e\n\n\u003ch3 id=\"deceptive-tactics-and-payment-mechanisms\"\u003eDeceptive Tactics and Payment Mechanisms\u003c/h3\u003e\n\n\u003cp\u003eThe developers behind these applications employed several psychological tricks to extract payments from unsuspecting users. Subscribers were charged fees ranging from approximately \u003cspan class=\"math inline\"\u003e\\(6 to \\)\u003c/span\u003e80 to access the promised data. Upon payment, users received entirely fabricated phone numbers and names that were hardcoded directly into the app\u0026rsquo;s source code. One flagged application attempted to establish institutional credibility by publishing under the developer name \u0026ldquo;Indian gov.in\u0026rdquo;. A secondary cluster of apps prompted users to enter their email address for data delivery, yet withheld all information until a payment was processed. Additionally, the apps implemented a behavioral manipulation tactic that triggered a fake notification claiming call history had been emailed to the user when they attempted to exit without paying. Clicking this notification redirected the user directly back to the subscription screen.\u003c/p\u003e\n\n\u003ch3 id=\"technical-characteristics-and-user-impact\"\u003eTechnical Characteristics and User Impact\u003c/h3\u003e\n\n\u003cp\u003eDespite their deceptive nature, the applications maintained a remarkably simple user interface and avoided requesting any sensitive device permissions. The apps contained absolutely no functional code capable of querying or retrieving real call, SMS, or WhatsApp data. Payments were processed through three distinct methods, each with different platform implications:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGoogle Play Store\u0026rsquo;s official billing system\u003c/li\u003e\n\u003cli\u003eThird-party applications supporting the Unified Payments Interface, including Google Pay, PhonePe, and Paytm\u003c/li\u003e\n\u003cli\u003ePayment card checkout forms embedded directly within the applications\nBoth the third-party UPI and direct card methods violate Google\u0026rsquo;s developer policies.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"refund-policies-and-platform-response\"\u003eRefund Policies and Platform Response\u003c/h3\u003e\n\n\u003cp\u003eGoogle has since removed the flagged applications from its official storefront. Users who subscribed through the official Google Play billing system are eligible for refunds under Google\u0026rsquo;s standard refund policies. However, purchases made via third-party payment applications or direct credit card entries cannot be refunded by Google. These users must rely on external payment providers or the developers themselves to recover their funds. The apps were taken down after cybersecurity researchers documented their fraudulent behavior and shared findings with media outlets.\u003c/p\u003e\n\n\u003ch3 id=\"related-fraud-campaigns-and-infrastructure\"\u003eRelated Fraud Campaigns and Infrastructure\u003c/h3\u003e\n\n\u003cp\u003eThe disclosure coincides with a separate financial fraud campaign documented by Group-IB, which targeted Indonesian users through the impersonation of the CoreTax platform. This operation, dubbed GoldFactory, has stolen an estimated $2 million since July 2025. The attack chain integrates phishing websites, WhatsApp social engineering, malicious APK sideloading, and voice phishing to achieve full device compromise. Once installed, the malicious applications deploy remote access trojans such as Gigabud RAT, MMRat, and Taotie. These tools are capable of harvesting sensitive data and downloading additional malicious components. The stolen information is subsequently used to conduct account takeover attacks and execute unauthorized financial transfers. The malware infrastructure supporting this campaign actively abuses more than 16 trusted brands to target Indonesia\u0026rsquo;s population of approximately 287 million people.\u003c/p\u003e\n","keyPoints":["Twenty-eight fraudulent Android apps on the Google Play Store, collectively named CallPhantom, tricked users into paying for fabricated call history data after accumulating over 7.3 million downloads.","The apps falsely promised access to call logs, SMS records, and WhatsApp data for any phone number but only delivered randomly generated information after users purchased subscriptions ranging from $6 to $80.","Payments were processed through Google Play billing, third-party UPI applications, or direct credit card forms, with Google only able to refund purchases made through its official billing system.","One app impersonated the official Indian government domain \"gov.in\" to gain user trust, while the malicious applications required no sensitive permissions and contained no actual functionality to retrieve real call data."],"insights":["The apps bypassed standard security scrutiny by requesting no sensitive permissions and containing zero actual data-retrieval functionality, relying entirely on deceptive paywalls.","Third-party payment methods like UPI apps and direct card forms violate Google's policies but completely bypass Google's refund system, leaving victims dependent on external payment providers.","A behavioral manipulation tactic forces users back to the paywall by displaying a fake notification claiming call history was sent to their email when they attempt to exit without paying.","Threat actors successfully bypassed user skepticism by publishing apps under the official-looking developer name \"Indian gov.in\" to fabricate institutional trust."],"referencedReports":[{"title":"Fake call logs, real payments: how CallPhantom tricks Android users","url":"https://www.welivesecurity.com/en/eset-research/fake-call-logs-real-payments-how-callphantom-tricks-android-users/","publisher":"ESET","context":"The article cites this report as the source for the researcher Lukáš Štefanko's statements regarding the CallPhantom campaign."}],"body":"\u003cp\u003eCybersecurity researchers from ESET have identified a fraudulent campaign dubbed CallPhantom, involving 28 Android apps on the Google Play Store that falsely promised access to call histories, SMS records, and WhatsApp logs for any phone number. These applications collectively amassed over 7.3 million downloads before removal, primarily targeting users in India and the Asia-Pacific region. Instead of delivering real data, the apps required users to pay subscription fees ranging from \u003cspan class=\"math inline\"\u003e\\(6 to \\)\u003c/span\u003e80 to access entirely fabricated information generated by the developers. Some apps even impersonated official government domains to build false trust, while others used deceptive exit notifications to force users back to the paywall. Payments were processed through Google Play billing, third-party UPI applications, or direct credit card forms, with Google only able to issue refunds for transactions made through its official system. The article also notes a separate but contemporaneous fraud campaign by Group-IB, where threat actors stole approximately $2 million from Indonesian users by impersonating the CoreTax platform and distributing malware through social engineering and malicious APKs.\u003c/p\u003e\n"},{"n":5,"title":"One Click, Total Shutdown: The \"Patient Zero\" Webinar on Killing Stealth Breaches","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/one-click-total-shutdown-patient-zero.html","time":"14:01","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"This webinar teaches you how to instantly isolate and recover from the first compromised device to prevent AI-driven phishing attacks from escalating into a catastrophic network-wide breach.","briefOverview":"\u003cp\u003eThe article emphasizes that the most challenging aspect of cybersecurity is managing human behavior rather than technology. Most major breaches originate from a single employee clicking a malicious link, creating a \u0026ldquo;Patient Zero\u0026rdquo; device. Attackers rapidly move through networks to locate sensitive data, passwords, and backups once inside. In 2026, threat actors are leveraging generative AI to craft phishing emails that bypass traditional detection filters.\u003c/p\u003e\n\n\u003cp\u003eThe upcoming webinar focuses on technical strategies to instantly contain and recover from these initial compromises. It highlights the critical five-minute window where rapid isolation determines whether a minor incident escalates into a catastrophic breach. Traditional security tools often fail against stealthy, custom attacks tailored to specific organizations. The training advocates for a Zero Trust approach that assumes a breach will occur and prevents lateral movement.\u003c/p\u003e\n\n\u003cp\u003eParticipants will learn actionable recovery blueprints to minimize financial and operational damage. By shifting from perfect prevention to rapid containment, organizations can ensure that a single compromised laptop does not destroy the entire company.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article identifies human error as the primary vulnerability in modern cybersecurity defenses. Every significant breach typically begins when one employee interacts with a deceptive email, resulting in a \u0026ldquo;Patient Zero\u0026rdquo; infection. Once an attacker gains access to this initial device, they quickly pivot to harvest data, credentials, and backup systems. Threat actors are increasingly utilizing generative artificial intelligence to automate phishing campaigns that evade current security filters.\u003c/p\u003e\n\n\u003cp\u003eThe author argues that conventional antivirus solutions are insufficient against stealthy, custom-built attacks designed specifically for target environments. To counter this, a specialized webinar titled \u0026ldquo;The Patient Zero Playbook\u0026rdquo; offers a technical deep dive into breach response. The curriculum covers how AI-driven phishing operates and why the first five minutes of an infection are decisive. Attendees will learn how to implement Zero Trust principles to instantly isolate compromised endpoints.\u003c/p\u003e\n\n\u003cp\u003eThe training also provides a structured recovery blueprint for immediate post-detection actions. This approach shifts security strategy from relying on perfect prevention to ensuring rapid containment. By assuming that a malicious link will eventually be clicked, organizations can build defenses that prevent catastrophic network-wide failures. The webinar aims to equip security teams with the tactical knowledge needed to stop breaches at their source.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eOverview and Core Premise\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe article establishes that the most difficult challenge in cybersecurity is managing people rather than technology. It notes that nearly every major breach follows a predictable pattern: a single employee clicks a malicious link, creating a \u0026ldquo;Patient Zero\u0026rdquo; device. This initial compromise serves as the entry point for attackers who rapidly move laterally to locate sensitive data, passwords, and backup systems.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eEmerging Threat Landscape\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eBy 2026, threat actors are deploying generative artificial intelligence to automate phishing campaigns. These AI-generated emails are designed to bypass existing security filters and are nearly impossible for users to detect. Traditional security tools struggle to identify these stealthy, custom-made attacks tailored specifically for targeted organizations. Consequently, defensive strategies must evolve beyond relying on known threat signatures.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eWebinar Curriculum and Technical Focus\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe promoted webinar, \u0026ldquo;The Patient Zero Playbook,\u0026rdquo; provides a technical deep dive into modern breach vectors and immediate response tactics. The curriculum is structured around four primary modules:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eThe AI Phish:\u003c/strong\u003e An analysis of how generative AI is used to craft deceptive emails that evade current detection mechanisms.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe 5-Minute Window:\u003c/strong\u003e An explanation of why the initial minutes after infection dictate whether an incident remains internal or becomes public.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eZero Trust in Action:\u003c/strong\u003e Practical guidance on isolating compromised devices to prevent lateral movement and contain the threat.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eThe Recovery Blueprint:\u003c/strong\u003e Step-by-step procedures to execute immediately upon detecting a Patient Zero infection.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eStrategic Defense Recommendations\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that organizations must adopt a defensive posture that assumes a breach will inevitably occur. Rather than relying solely on prevention, security teams should focus on building rapid containment capabilities. Implementing Zero Trust architecture ensures that an infected device cannot communicate with the broader network. This approach minimizes the risk of catastrophic financial and operational damage. The webinar registration link directs attendees to access these tactical playbooks for immediate implementation.\u003c/p\u003e\n","keyPoints":["Every major breach usually starts with one employee clicking a clever email, creating a \"Patient Zero\" device that attackers quickly use to find data and passwords.","Hackers are now using generative AI to make phishing emails nearly impossible to spot and bypass current security filters.","The webinar covers a technical deep dive into isolating infected devices through Zero Trust principles and executing a recovery blueprint within the critical first five minutes.","Traditional security tools struggle with stealthy attacks, so organizations need a defense strategy that assumes a bad link will be clicked and prevents it from costing millions."],"insights":["Attackers prioritize locating data, passwords, and backups immediately after compromising the first device, rather than remaining stationary.","Traditional security tools are ineffective against stealthy, custom-made attacks designed specifically for the target organization.","The first five minutes of an infection constitute the critical window that determines whether a breach becomes public."],"referencedReports":[],"body":"\u003cp\u003eThe article emphasizes that the most challenging aspect of cybersecurity is managing human behavior rather than technology. Most major breaches originate from a single employee clicking a malicious link, creating a \u0026ldquo;Patient Zero\u0026rdquo; device. Attackers rapidly move through networks to locate sensitive data, passwords, and backups once inside. In 2026, threat actors are leveraging generative AI to craft phishing emails that bypass traditional detection filters.\u003c/p\u003e\n\n\u003cp\u003eThe upcoming webinar focuses on technical strategies to instantly contain and recover from these initial compromises. It highlights the critical five-minute window where rapid isolation determines whether a minor incident escalates into a catastrophic breach. Traditional security tools often fail against stealthy, custom attacks tailored to specific organizations. The training advocates for a Zero Trust approach that assumes a breach will occur and prevents lateral movement.\u003c/p\u003e\n\n\u003cp\u003eParticipants will learn actionable recovery blueprints to minimize financial and operational damage. By shifting from perfect prevention to rapid containment, organizations can ensure that a single compromised laptop does not destroy the entire company.\u003c/p\u003e\n"},{"n":3,"title":"NVIDIA confirms GeForce NOW data breach affecting Armenian users","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/nvidia-confirms-geforce-now-data-breach-affecting-armenian-users/","time":"16:18","priority":"MAY READ","score":0,"group":null,"groupColor":null,"tldr":"","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":[],"insights":[],"referencedReports":[],"body":""}];

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function CardFront({ article }) {

      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
