t attribute the campaign to a specific threat actor, although researchers observed signs of Chinese language use and infrastructure overlap with IPs previously associated with ValleyRAT and Gh0st RAT activity. The article says there is not enough evidence for high-confidence attribution. It advises WhatsApp users to be cautious even with files sent by trusted contacts and to verify suspicious files through secondary means. It also recommends scanning downloaded files with up-to-date antivirus software before executing them.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Kaspersky reported an ongoing campaign in which compromised WhatsApp accounts send heavily obfuscated VBScript files disguised as business and financial documents to contacts.","If a victim opens the file on Windows, the script downloads additional files, disables UAC protections through Registry changes, and installs ManageEngine Endpoint Central to give attackers remote administration access.","Kaspersky telemetry indicates the campaign has affected users in Brazil, India, Mexico, Singapore, the UK, Spain, Taiwan, Australia, Russia, Vietnam, and Malaysia.","The malicious file must be downloaded when delivered through WhatsApp Web, but in the WhatsApp Desktop client it can be executed directly by Windows Script Host.","Kaspersky found signs of Chinese language use and infrastructure overlap with IPs previously linked to ValleyRAT and Gh0st RAT activity, but said there is not enough evidence for high-confidence attribution."],"insights":["The campaign relies on messages sent from already compromised WhatsApp accounts, which makes the malicious files appear to come from trusted contacts rather than unknown senders.","Attackers are using a legitimate IT administration product, ManageEngine Endpoint Central, as the final payload, showing that normal remote-management software can be repurposed to provide unauthorized access.","The delivery path changes the risk: files sent through WhatsApp Web have to be downloaded before use, while in the WhatsApp Desktop client they can be executed directly by Windows Script Host.","The use of localized filenames for fake financial and business documents indicates the campaign was tailored for targets in multiple countries rather than a single region."],"referencedReports":[{"title":"whatsapp-vbs-rmm-campaign","url":"https://securelist.com/whatsapp-vbs-rmm-campaign/120290/","publisher":"kaspersky","context":"The article cites Kaspersky's technical analysis as the basis for details about the WhatsApp-delivered VBScript campaign, its infection chain, and observed infrastructure overlaps.","category":"","primary":false}],"body":"\u003cp\u003eAn ongoing malware campaign is targeting WhatsApp users in multiple countries with deceptive messages that deliver heavily obfuscated VBScript files. The files are disguised as business and financial documents and are sent from compromised WhatsApp accounts to the contacts of those users. Kaspersky telemetry shows activity in Brazil, India, Mexico, Singapore, the UK, Spain, Taiwan, Australia, Russia, Vietnam, and Malaysia. The article says the exact method used to compromise the WhatsApp accounts is still unknown.\u003c/p\u003e\n\n\u003cp\u003eIf a recipient downloads and opens the file on Windows, it starts an infection chain that fetches additional scripts from attacker-controlled infrastructure. Those scripts disable UAC protections through Registry modifications and then download a ZIP archive containing ManageEngine Endpoint Central. The software is silently installed and configured to connect to attacker-controlled management servers, giving the attackers remote administration access to the victim’s computer. Kaspersky also notes that files delivered via WhatsApp Web must be downloaded, while in the WhatsApp Desktop client they can be executed directly by Windows Script Host.\u003c/p\u003e\n\n\u003cp\u003eKaspersky did not attribute the campaign to a specific threat actor, although researchers observed signs of Chinese language use and infrastructure overlap with IPs previously associated with ValleyRAT and Gh0st RAT activity. The article says there is not enough evidence for high-confidence attribution. It advises WhatsApp users to be cautious even with files sent by trusted contacts and to verify suspicious files through secondary means. It also recommends scanning downloaded files with up-to-date antivirus software before executing them.\u003c/p\u003e\n"}]</script>
