<script type="application/json" id="dl-articles">[{"n":1,"title":"An Employment Verification Request That Passed DMARC REJECT, Then Sent Replies to Someone Else","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/informdata-employment-verification-sendgrid-reply-to-diversion","time":"11:00","priority":"SHOULD READ","score":78,"tldr":"Attackers used authorized SendGrid infrastructure to impersonate InformData in an employment verification phishing email that passed SPF, DKIM, and DMARC REJECT, while diverting replies and clicks to attacker-controlled domains. The key takeaway is that perfect email authentication does not prove message intent, so defenders must also inspect reply-to domains, link destinations, and sender behavior.","briefOverview":"\u003cp\u003eAttackers sent an employment verification request impersonating InformData, a legitimate background check company, to an employee at a sports data technology company. The message came from verifications@international.informdata[.]com and passed SPF, DKIM, and DMARC with a REJECT enforcement policy. IRONSCALES flagged the message in June 2026, a colleague at the target organization reported it, and one mailbox was quarantined.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that DMARC REJECT did not stop the attack because the message was sent through SendGrid infrastructure that was authorized for international.informdata[.]com. The DKIM signature used selector s1 under that domain, and the Return-Path used a SendGrid subdomain tied to international.informdata[.]com. The article says the attacker either compromised the InformData SendGrid account or configured a new SendGrid identity that could sign for the domain.\u003c/p\u003e\n\n\u003cp\u003eThe malicious elements were in the Reply-To and link destinations rather than in email authentication failures. The Reply-To pointed to support@verifying[.]you, and the “Review Employment” button linked to verify.zippedscript[.]com, both described as attacker-controlled domains. The article says defenders should review whether Reply-To domains match the From domain and whether call-to-action links resolve to the sender’s actual infrastructure.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eIn June 2026, IRONSCALES flagged a phishing attack targeting an employee at a sports data technology company. The email claimed to be an “Employment Verification Request” from verifications@international.informdata[.]com, a domain belonging to the legitimate background check company InformData. A colleague at the same target organization reported the email, and one mailbox was quarantined.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central point is that the email passed all major authentication checks. SPF passed, DKIM passed, and DMARC passed under a REJECT enforcement policy, including p=REJECT and sp=REJECT. The article describes DMARC REJECT as the strictest available enforcement policy, but says it did not help because the sending infrastructure was authorized for the domain.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the message was sent through SendGrid infrastructure using hostname wfbtrqkw.outbound-mail.sendgrid.net and IP address 159[.]183[.]84[.]25. The DKIM signature used selector s1 under international.informdata[.]com, and the Return-Path pointed to a VERP-encoded address at em8327.international.informdata[.]com. The article says this alignment allowed DMARC to do what it was designed to do: verify authorized sending infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe phishing indicators appeared in the routing of replies and clicks. The Reply-To header pointed to support@verifying[.]you, and the “Review Employment” button linked to verify.zippedscript[.]com/verify/employment/51d4ba99721cdbdbe83cc09a15f3d76b. The unsubscribe link also pointed to verify.zippedscript[.]com/unsubscribe, which the article says confirmed attacker control of the link infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that the employment verification pretext works because such requests are routine in business operations and recipients may feel pressure to avoid delaying a colleague’s onboarding. IRONSCALES’ Themis Adaptive AI labeled the recipient as a VIP and flagged the message based on behavioral signals, including a Reply-To domain mismatch, first-time sender pattern, and a disconnect between the legitimate brand identity and link destinations. The attack is mapped to MITRE ATT\u0026amp;CK techniques T1566.002, T1036.005, and T1598.003.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eIRONSCALES reported a phishing attack in which attackers impersonated InformData, a legitimate background check company, using an employment verification pretext. The email was sent to an employee at a sports data technology company and claimed to be an “Employment Verification Request.” A colleague at the same organization reported the message, and one mailbox was quarantined.\u003c/p\u003e\n\n\u003cp\u003eThe message appeared to come from \u003ccode\u003everifications@international.informdata[.]com\u003c/code\u003e, a domain belonging to the real company. The article states that SPF, DKIM, and DMARC all passed, and that DMARC was configured with the strictest enforcement policy: \u003ccode\u003ep=REJECT sp=REJECT\u003c/code\u003e. Despite these authentication results, the message was malicious.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-attack-was-significant\"\u003eWhy the Attack Was Significant\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights that email authentication succeeded because the attackers sent the message through infrastructure authorized for \u003ccode\u003einternational.informdata[.]com\u003c/code\u003e. The sending infrastructure was SendGrid, specifically \u003ccode\u003ewfbtrqkw.outbound-mail.sendgrid.net\u003c/code\u003e with IP address \u003ccode\u003e159[.]183[.]84[.]25\u003c/code\u003e. The DKIM signature used selector \u003ccode\u003es1\u003c/code\u003e under \u003ccode\u003einternational.informdata[.]com\u003c/code\u003e, and the Return-Path pointed to a VERP-encoded address at \u003ccode\u003eem8327.international.informdata[.]com\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article says DMARC did exactly what it was designed to do: verify that the sending infrastructure was authorized for the domain. The failure was not an authentication failure but a mismatch between authorization and intent. According to the article, the attacker either compromised the InformData SendGrid account or configured a new SendGrid identity that could sign for the domain.\u003c/p\u003e\n\n\u003ch2 id=\"phishing-mechanics\"\u003ePhishing Mechanics\u003c/h2\u003e\n\n\u003cp\u003eThe malicious content was visible in the reply and link infrastructure. The Reply-To header pointed to \u003ccode\u003esupport@verifying[.]you\u003c/code\u003e, which the article identifies as attacker-controlled. The “Review Employment” call-to-action linked to \u003ccode\u003everify.zippedscript[.]com/verify/employment/51d4ba99721cdbdbe83cc09a15f3d76b\u003c/code\u003e, also described as attacker-controlled.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that the long hash in the URL path functioned as a per-recipient tracking token, allowing the attacker to correlate clicks with specific email addresses. WHOIS information for \u003ccode\u003ezippedscript[.]com\u003c/code\u003e showed Cloudflare nameservers and privacy-protected registration. The unsubscribe link also pointed to \u003ccode\u003everify.zippedscript[.]com/unsubscribe\u003c/code\u003e, which the article says confirmed attacker control of the entire link infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"social-engineering-pretext\"\u003eSocial Engineering Pretext\u003c/h2\u003e\n\n\u003cp\u003eThe lure relied on an employment verification request, a routine business process associated with hiring and background checks. The article explains that recipients may expect such messages during hiring cycles because companies like InformData regularly send verification requests. It also states that the pretext creates professional pressure because ignoring or delaying a verification can slow a colleague’s onboarding.\u003c/p\u003e\n\n\u003cp\u003eThe message therefore combined a legitimate brand identity, authenticated sending infrastructure, and a business-process pretext. The article frames this as a high-severity credential harvesting and social engineering attack. It maps the activity to MITRE ATT\u0026amp;CK techniques for spearphishing links, masquerading, and phishing for information.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eIRONSCALES detected the message as a first-time sender flagged as high risk. Themis, the IRONSCALES Adaptive AI, labeled the recipient as a VIP and flagged the email based on behavioral indicators. These indicators included the Reply-To domain mismatch, the first-time sender pattern, and the disconnect between the legitimate brand identity and the link destinations.\u003c/p\u003e\n\n\u003cp\u003eThe detection did not rely on failed authentication checks because there were none. The article specifically states that defenders reviewing employment verification emails should verify whether the Reply-To domain matches the From domain and whether call-to-action links resolve to the sender’s actual infrastructure. It concludes that when a background check company’s email routes replies and clicks to entirely different domains, the verification request is the attack.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following indicators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSender email: \u003ccode\u003everifications@international.informdata[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eReply-To email: \u003ccode\u003esupport@verifying[.]you\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eCredential harvesting domain: \u003ccode\u003everify.zippedscript[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eCredential harvesting URL: \u003ccode\u003everify.zippedscript[.]com/verify/employment/51d4ba99721cdbdbe83cc09a15f3d76b\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eAlternate link domain: \u003ccode\u003everifying[.]you\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eUnsubscribe URL: \u003ccode\u003everify.zippedscript[.]com/unsubscribe\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eSending IP: \u003ccode\u003e159[.]183[.]84[.]25\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eSending hostname: \u003ccode\u003ewfbtrqkw.outbound-mail.sendgrid.net\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eDKIM selector: \u003ccode\u003es1\u003c/code\u003e with \u003ccode\u003ed=international.informdata[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eReturn-Path domain: \u003ccode\u003eem8327.international.informdata[.]com\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK Mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to three MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eT1566.002\u003c/code\u003e, Phishing: Spearphishing Link, because the message used an employment verification email with a credential harvesting link.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eT1036.005\u003c/code\u003e, Masquerading: Match Legitimate Name or Location, because the attackers impersonated InformData, a real background check company.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eT1598.003\u003c/code\u003e, Phishing for Information: Spearphishing Link, because the URL included per-recipient tracking tokens for target validation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe core lesson in the article is that passing SPF, DKIM, and DMARC, even with a DMARC REJECT policy, does not prove that a message is benign. In this case, authentication showed that the sending infrastructure was authorized for the domain, but the Reply-To address and call-to-action links led to attacker-controlled infrastructure. The article presents Reply-To mismatches, first-time sender behavior, and link destination mismatches as important detection signals when authentication checks pass.\u003c/p\u003e\n","keyPoints":["Attackers sent an employment verification request impersonating InformData through SendGrid infrastructure, and the email passed SPF, DKIM, and DMARC with a REJECT enforcement policy.","The Reply-To header pointed to support@verifying[.]you, and the call-to-action linked to verify.zippedscript[.]com, both described as attacker-controlled domains.","The attacker used SendGrid host wfbtrqkw.outbound-mail.sendgrid.net and IP 159[.]183[.]84[.]25, which were configured as authorized sending infrastructure for international.informdata[.]com.","IRONSCALES flagged the phishing attack in June 2026 after a colleague at the target sports data technology company reported the email, and one mailbox was quarantined.","The article says DMARC did not help because it verified authorized sending infrastructure for the domain, but authorization did not establish the intent or legitimacy of the message."],"insights":["A DMARC REJECT policy can still allow a phishing message when the attacker sends through infrastructure that is legitimately authorized for the impersonated domain.","Reply-To and CTA domain mismatches can reveal malicious intent even when SPF, DKIM, and DMARC all pass.","The employment verification theme is especially effective because recipients may feel pressure to respond quickly to avoid delaying a colleague's onboarding.","The long hash in the phishing URL path served as a per-recipient tracking token, allowing the attacker to correlate clicks with specific email addresses.","An attacker-controlled unsubscribe link can indicate that the entire link infrastructure, not just the main call-to-action, is part of the phishing operation."],"referencedReports":[],"body":"\u003cp\u003eAttackers sent an employment verification request impersonating InformData, a legitimate background check company, to an employee at a sports data technology company. The message came from verifications@international.informdata[.]com and passed SPF, DKIM, and DMARC with a REJECT enforcement policy. IRONSCALES flagged the message in June 2026, a colleague at the target organization reported it, and one mailbox was quarantined.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that DMARC REJECT did not stop the attack because the message was sent through SendGrid infrastructure that was authorized for international.informdata[.]com. The DKIM signature used selector s1 under that domain, and the Return-Path used a SendGrid subdomain tied to international.informdata[.]com. The article says the attacker either compromised the InformData SendGrid account or configured a new SendGrid identity that could sign for the domain.\u003c/p\u003e\n\n\u003cp\u003eThe malicious elements were in the Reply-To and link destinations rather than in email authentication failures. The Reply-To pointed to support@verifying[.]you, and the “Review Employment” button linked to verify.zippedscript[.]com, both described as attacker-controlled domains. The article says defenders should review whether Reply-To domains match the From domain and whether call-to-action links resolve to the sender’s actual infrastructure.\u003c/p\u003e\n"}]</script>
