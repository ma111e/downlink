<script type="application/json" id="dl-articles">[{"n":1,"title":"Silent Ransom Group targets law firms with fake IT support calls","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/silent-ransom-group-targets-law-firms-with-fake-it-support-calls/","time":"14:09","priority":"SHOULD READ","score":88,"tldr":"Silent Ransom Group is targeting U.S. law firms with fake IT support calls that trick employees into granting remote access, enabling attackers to steal sensitive client and financial data within hours. The group now focuses on rapid data-theft extortion rather than ransomware encryption, using aggressive ransom demands and threats to contact clients directly.","briefOverview":"\u003cp\u003eSilent Ransom Group is actively targeting U.S. law firms and professional services organizations with social engineering attacks that can lead to data theft within hours of first contact, according to Mandiant. The group is tracked as UNC3753, Luna Moth, and Chatty Spider, and Mandiant said it targeted dozens of organizations in the legal, financial, and professional services sectors between January and May 2026. The report follows an FBI FLASH advisory warning that the group was targeting U.S. law firms through social engineering and even in-person data theft attacks.\u003c/p\u003e\n\n\u003cp\u003eThe attacks begin with invoice-themed phishing emails from consumer email accounts that contain no malicious links or attachments. Attackers then follow up by phone while impersonating corporate IT staff and convince employees to join remote support sessions using platforms such as Microsoft Teams, Zoom, Quick Assist, or Microsoft Terminal Services. During those sessions, victims are tricked into installing remote monitoring and management tools such as AnyDesk, Zoho Assist, Bomgar, or SuperOps.\u003c/p\u003e\n\n\u003cp\u003eOnce inside a network, the group searches for sensitive legal and financial documents, including contracts, tax records, Social Security numbers, and merger or acquisition files. Mandiant said the attackers commonly target document management platforms and cloud storage repositories before exfiltrating data with tools such as WinSCP or Rclone. The extortion operation is described as highly aggressive, with ransom demands often arriving within 30 minutes of the attackers leaving the victim environment.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMandiant reported that Silent Ransom Group is actively targeting U.S. law firms and professional services organizations in social engineering attacks that can lead to data theft within hours. The group is tracked as UNC3753, Luna Moth, and Chatty Spider, and Mandiant said it targeted dozens of organizations across the legal, financial, and professional services sectors between January and May 2026. The report follows an FBI FLASH advisory that warned the group was targeting U.S. law firms with social engineering and in-person data theft attacks.\u003c/p\u003e\n\n\u003cp\u003eMandiant said legal services firms are high-value targets because they maintain sensitive client transaction files, merger and acquisition plans, trade secrets, and corporate regulatory reports. The report states that threat groups recognize legal entities face reputational and regulatory exposure and may be motivated to resolve extortion situations quietly. This makes law firms especially attractive for data-theft extortion operations.\u003c/p\u003e\n\n\u003cp\u003eThe attacks start with invoice-themed phishing emails sent from consumer email accounts, but the emails do not include malicious links or attachments. Instead, they act as a precursor to follow-up calls from attackers impersonating corporate IT staff. The attackers then convince employees to join remote support sessions through Microsoft Teams, Zoom, Quick Assist, or Microsoft Terminal Services.\u003c/p\u003e\n\n\u003cp\u003eDuring the remote sessions, the attackers trick targets into installing remote monitoring and management tools such as AnyDesk, Zoho Assist, Bomgar, or SuperOps. Mandiant also identified phishing domains that impersonate internal IT portals using naming patterns such as organization-specific IT desk or help desk domains. The attackers also use privnote.com to share installation links and commands, which Mandiant said helps reduce forensic artifacts in browser histories or corporate chat logs.\u003c/p\u003e\n\n\u003cp\u003eAfter gaining access, the group searches for sensitive legal and financial documents, including contracts, tax records, Social Security numbers, and merger or acquisition files. The attackers commonly target document management platforms and cloud storage repositories and exfiltrate data using tools such as WinSCP or Rclone. Mandiant said ransom demands often arrive within 30 minutes after the attackers leave the victim environment and give organizations three days to respond.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that the FBI warned of suspected in-person data theft activity in which attackers impersonate internal IT staff and attempt to physically visit offices to image computers or create backups while stealing files. Mandiant said there was limited forensic evidence, but the suspected in-person activity is likely linked to UNC3753 based on similarities in targeting, timelines, and operational behavior. Resecurity separately reported that the group uses DNS fast-flux infrastructure with residential IP addresses across multiple countries and ISPs to protect data-leak platforms.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSilent Ransom Group is actively targeting U.S. law firms and professional services organizations in social engineering attacks, according to a new report from Mandiant. The attacks often lead to data theft within hours of initial contact. Mandiant tracks the group as UNC3753, Luna Moth, and Chatty Spider.\u003c/p\u003e\n\n\u003cp\u003eThe report follows an FBI FLASH advisory published the previous week that warned Silent Ransom Group was targeting U.S. law firms through social engineering and even in-person data theft attacks. Mandiant’s report adds technical details about how these intrusions are carried out. The firm said the group targeted dozens of organizations across the legal, financial, and professional services sectors between January and May 2026.\u003c/p\u003e\n\n\u003ch2 id=\"why-law-firms-are-being-targeted\"\u003eWhy law firms are being targeted\u003c/h2\u003e\n\n\u003cp\u003eMandiant said legal firms remain especially attractive to extortion actors because they store large volumes of highly sensitive client information. The report specifically cites client transaction files, merger and acquisition plans, client trade secrets, and corporate regulatory reports as examples of sensitive data held by legal services firms.\u003c/p\u003e\n\n\u003cp\u003eMandiant also said threat groups recognize that legal entities face heavy reputational and regulatory exposure. According to the report, these pressures may make legal organizations more motivated to resolve extortion situations quietly in order to protect their professional standing.\u003c/p\u003e\n\n\u003ch2 id=\"initial-contact-and-social-engineering-flow\"\u003eInitial contact and social engineering flow\u003c/h2\u003e\n\n\u003cp\u003eThe attacks begin with invoice-themed phishing emails sent from consumer email accounts. These emails do not contain malicious links or attachments. Instead, they serve as a precursor for follow-up phone calls from attackers impersonating corporate IT staff.\u003c/p\u003e\n\n\u003cp\u003eMandiant described the activity as part of a long-running voice-based tactic used by these actors. The article notes that the group previously used BazarCall social engineering campaigns tied to Ryuk and Conti ransomware attacks. In the current campaign, the attackers impersonate IT help desks and convince employees to join remote support sessions.\u003c/p\u003e\n\n\u003cp\u003eRemote support sessions may be conducted through:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft Teams\u003c/li\u003e\n\u003cli\u003eZoom\u003c/li\u003e\n\u003cli\u003eQuick Assist\u003c/li\u003e\n\u003cli\u003eMicrosoft Terminal Services\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDuring these sessions, the attackers trick targets into installing remote monitoring and management tools that provide initial access to the corporate network. Tools named in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAnyDesk\u003c/li\u003e\n\u003cli\u003eZoho Assist\u003c/li\u003e\n\u003cli\u003eBomgar\u003c/li\u003e\n\u003cli\u003eSuperOps\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"phishing-domains-and-use-of-self-destructing-messages\"\u003ePhishing domains and use of self-destructing messages\u003c/h2\u003e\n\n\u003cp\u003eMandiant identified phishing domains tied to the campaign that impersonate internal IT portals. The article lists naming patterns such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;organization\u0026gt;-itdesk[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;organization\u0026gt;-it[.]com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e\u0026lt;organization\u0026gt;-helpdesk[.]com\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe attackers also use privnote.com, a self-destructing messaging service, to share installation links and commands with targets during remote support sessions. Mandiant said this tactic helps reduce forensic artifacts left in browser histories or corporate chat logs.\u003c/p\u003e\n\n\u003ch2 id=\"data-discovery-and-exfiltration\"\u003eData discovery and exfiltration\u003c/h2\u003e\n\n\u003cp\u003eOnce inside a network, Silent Ransom Group searches for sensitive legal and financial documents. The article names contracts, tax records, Social Security numbers, and merger or acquisition files as targeted data types.\u003c/p\u003e\n\n\u003cp\u003eThe attackers commonly target document management platforms and cloud storage repositories. Mandiant said the group exfiltrates data using tools such as WinSCP or Rclone.\u003c/p\u003e\n\n\u003ch2 id=\"extortion-behavior\"\u003eExtortion behavior\u003c/h2\u003e\n\n\u003cp\u003eMandiant described the group’s extortion operation as highly aggressive. Ransom demands often arrive within 30 minutes of the attackers leaving the victim environment.\u003c/p\u003e\n\n\u003cp\u003eThe extortion letters give organizations a three-day deadline to respond and begin ransom negotiations. If the victim does not respond, the attackers threaten to call and email target employees and external clients directly to alert them of the data breach.\u003c/p\u003e\n\n\u003cp\u003eAccording to Mandiant, the extortion letters explicitly emphasize that the leak will compromise client trust, invite substantial regulatory fines, and suggest that external clients sue the victim organization for data mishandling.\u003c/p\u003e\n\n\u003ch2 id=\"fbi-warning-on-in-person-activity\"\u003eFBI warning on in-person activity\u003c/h2\u003e\n\n\u003cp\u003eThe article also references the FBI’s recent advisory about in-person data theft attacks linked to Silent Ransom Group. According to the FBI, attackers impersonate internal IT staff over phone calls and emails and then attempt to gain remote access or physically visit offices.\u003c/p\u003e\n\n\u003cp\u003eDuring these physical visits, attackers allegedly attempt to “image” computers or create backups while secretly stealing files. Mandiant said there was limited forensic evidence, but the researchers believe these in-person attacks are likely linked to UNC3753 based on similarities in targeting, timelines, and operational behavior.\u003c/p\u003e\n\n\u003ch2 id=\"group-background-and-evolution\"\u003eGroup background and evolution\u003c/h2\u003e\n\n\u003cp\u003eSilent Ransom Group has been active since at least 2022, when it was part of the Ryuk and Conti cybercrime syndicate. The article says the actors were previously linked to BazarCall callback phishing campaigns that provided initial access in Conti and Ryuk ransomware attacks.\u003c/p\u003e\n\n\u003cp\u003eAfter the Conti syndicate shut down in 2022, the group shifted to standalone data theft and extortion operations under the Silent Ransom Group branding. Researchers said the group no longer relies on traditional ransomware encryption and instead focuses entirely on data-theft extortion, stealing sensitive data and pressuring victims to pay to prevent leaks.\u003c/p\u003e\n\n\u003ch2 id=\"fast-flux-infrastructure\"\u003eFast-flux infrastructure\u003c/h2\u003e\n\n\u003cp\u003eA separate report released by Resecurity found that the gang is operating fast-flux infrastructure to hide and protect its data-leak platforms. The article explains DNS fast flux as a method in which attackers constantly rotate a domain’s IP addresses through a large pool of compromised devices to hide infrastructure and make takedowns or blocking more difficult.\u003c/p\u003e\n\n\u003cp\u003eResecurity said the infrastructure uses residential IP addresses across multiple countries and ISPs. The company also said the group’s \u003ccode\u003ebusiness-data-leaks[.]com\u003c/code\u003e leak site and related infrastructure rely on residential proxy networks spread across Latin America, Eastern Europe, Central Asia, the Middle East, and Asia. Resecurity also linked the infrastructure to other cybercrime-related services and domains.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-defenses\"\u003eRecommended defenses\u003c/h2\u003e\n\n\u003cp\u003eMandiant and the FBI recommend several defensive measures for organizations facing this activity. The article lists the following recommendations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eImplement strict verification procedures for IT support interactions.\u003c/li\u003e\n\u003cli\u003eLimit remote access tools.\u003c/li\u003e\n\u003cli\u003eEnforce multifactor authentication.\u003c/li\u003e\n\u003cli\u003eRestrict USB storage devices.\u003c/li\u003e\n\u003cli\u003eTrain employees to recognize voice phishing attempts.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese recommendations directly address the group’s use of fake IT support calls, remote access tooling, and possible physical office visits.\u003c/p\u003e\n","keyPoints":["Mandiant reported that the Silent Ransom Group, tracked as UNC3753, Luna Moth, and Chatty Spider, targeted dozens of legal, financial, and professional services organizations between January and May 2026.","The attacks begin with invoice-themed phishing emails from consumer email accounts, followed by phone calls in which attackers impersonate corporate IT staff.","Attackers convince employees to join remote support sessions through tools such as Microsoft Teams, Zoom, Quick Assist, or Microsoft Terminal Services and install remote monitoring and management tools such as AnyDesk, Zoho Assist, Bomgar, or SuperOps.","Once inside a network, the group searches for sensitive legal and financial documents and exfiltrates data using tools such as WinSCP or Rclone.","Mandiant said ransom demands often arrive within 30 minutes of the attackers leaving the victim environment and give organizations three days to respond."],"insights":["Because the initial phishing emails contain no malicious links or attachments, defenses that rely mainly on scanning email payloads may miss the early stage of these attacks.","The use of privnote.com to share installation links and commands is specifically intended to reduce forensic artifacts in browser histories and corporate chat logs.","The group’s extortion strategy is built around legal firms’ reputational and regulatory exposure, with threats to contact employees and external clients directly if victims do not respond within three days.","The reported in-person office visits show that verification procedures for IT support interactions need to cover both remote help desk requests and physical access requests.","Resecurity found that the group uses DNS fast-flux infrastructure with residential IP addresses across multiple countries and ISPs, making takedowns and blocking more difficult."],"referencedReports":[{"title":"Targeted Campaign Against U.S. Law Firms","url":"http://cloud.google.com/blog/topics/threat-intelligence/targeted-campaign-us-law-firms","publisher":"Mandiant","context":"The article is based on Mandiant's report describing Silent Ransom Group activity against legal, financial, and professional services organizations and explaining the intrusion methods.","category":"","primary":false},{"title":"Silent Ransom Group (SRG): Uncovering DNS Fast-Flux Infrastructure","url":"https://www.resecurity.com/blog/article/silent-ransom-group-srg-uncovering-dns-fast-flux-infrastructure","publisher":"Resecurity","context":"The article cites Resecurity's separate report on Silent Ransom Group's DNS fast-flux infrastructure used to hide and protect data-leak platforms.","category":"","primary":false}],"body":"\u003cp\u003eSilent Ransom Group is actively targeting U.S. law firms and professional services organizations with social engineering attacks that can lead to data theft within hours of first contact, according to Mandiant. The group is tracked as UNC3753, Luna Moth, and Chatty Spider, and Mandiant said it targeted dozens of organizations in the legal, financial, and professional services sectors between January and May 2026. The report follows an FBI FLASH advisory warning that the group was targeting U.S. law firms through social engineering and even in-person data theft attacks.\u003c/p\u003e\n\n\u003cp\u003eThe attacks begin with invoice-themed phishing emails from consumer email accounts that contain no malicious links or attachments. Attackers then follow up by phone while impersonating corporate IT staff and convince employees to join remote support sessions using platforms such as Microsoft Teams, Zoom, Quick Assist, or Microsoft Terminal Services. During those sessions, victims are tricked into installing remote monitoring and management tools such as AnyDesk, Zoho Assist, Bomgar, or SuperOps.\u003c/p\u003e\n\n\u003cp\u003eOnce inside a network, the group searches for sensitive legal and financial documents, including contracts, tax records, Social Security numbers, and merger or acquisition files. Mandiant said the attackers commonly target document management platforms and cloud storage repositories before exfiltrating data with tools such as WinSCP or Rclone. The extortion operation is described as highly aggressive, with ransom demands often arriving within 30 minutes of the attackers leaving the victim environment.\u003c/p\u003e\n"},{"n":2,"title":"C0XMO botnet spreads via DD-WRT router flaw, kills rival malware","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/c0xmo-botnet-spreads-via-dd-wrt-router-flaw-kills-rival-malware/","time":"14:17","priority":"SHOULD READ","score":84,"tldr":"A new Gafgyt variant called C0XMO is exploiting a DD-WRT router flaw to infect devices across multiple CPU architectures, spread via scanning and weak SSH/Telnet credentials, and launch DDoS attacks. It also removes rival malware and persistence mechanisms, showing more sophistication than typical IoT botnets.","briefOverview":"\u003cp\u003eA new variant of the Gafgyt botnet called C0XMO is targeting DD-WRT router firmware and can spread to other device types across multiple CPU architectures. Fortinet researchers found samples for ARM, MIPS, PowerPC, SuperH, x86, x86_64, and other architectures. The botnet was seen targeting a Japanese technology company, while the observed source IP address belonged to a device in Germany.\u003c/p\u003e\n\n\u003cp\u003eC0XMO is delivered by exploiting CVE-2021-27137, an unauthenticated buffer overflow vulnerability caused by insufficient user input that can allow arbitrary code execution. The malware uses a Python scanner to find internet-facing systems, brute-force weak Telnet and SSH credentials, detect CPU architecture, and deploy a compatible binary. It also establishes persistence through hidden file locations, cron jobs, and shell startup modifications.\u003c/p\u003e\n\n\u003cp\u003eThe botnet’s main purpose is launching distributed denial-of-service attacks, with 19 supported methods including UDP, TCP, SYN, and ICMP floods, as well as NTP and Memcached amplification. C0XMO also kills rival botnet clients and removes persistence mechanisms that may interfere with its operation. Fortinet described it as more advanced and operationally sophisticated than typical Gafgyt malware.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eFortinet researchers discovered C0XMO, a new variant of the Gafgyt botnet that targets DD-WRT router firmware and can move to other device types. The researchers found samples built for multiple CPU architectures, including ARM, MIPS, PowerPC, SuperH, x86, and x86_64. The botnet was observed targeting a Japanese technology company, though the source IP address was associated with a device located in Germany.\u003c/p\u003e\n\n\u003cp\u003eThe malware is delivered through exploitation of CVE-2021-27137, a buffer overflow vulnerability caused by insufficient user input. According to the article, the flaw can be exploited without authentication and can lead to arbitrary code execution. C0XMO’s modular design allows operators to update exploitation techniques, add or remove targeted architectures, and expand lateral movement capabilities separately from the main payload.\u003c/p\u003e\n\n\u003cp\u003eFor wider distribution, C0XMO downloads a Python script that installs packages including requests, paramiko, and beautifulsoup4. The scanner uses worker threads to randomly scan internet-facing systems on ports such as 22, 23, 80, 443, 7547, 8080, 8443, and 8888. After identifying a target, it attempts to brute-force weak Telnet and SSH credentials, detects the CPU architecture, and deploys a compatible C0XMO binary.\u003c/p\u003e\n\n\u003cp\u003eAfter gaining access, the malware copies itself to hidden paths such as /tmp/.sys, /var/tmp/.sys, and /dev/shm/.sys. It creates cron jobs to relaunch itself every 15 minutes and modifies shell startup files to enable automatic execution. C0XMO also scans running processes to identify competitor botnet clients, red-team tools, programming tools, and network services that may interfere with its operation.\u003c/p\u003e\n\n\u003cp\u003eThe botnet connects to a hardcoded command-and-control address using a custom multi-stage handshake involving magic strings and shared secrets. Its supported commands include heartbeat checks, starting and stopping scans, and launching DDoS attacks using one of 19 methods. Fortinet said the malware has a considerably more advanced architecture and feature set than earlier IoT botnets, and recommended keeping devices updated, using unique admin credentials, and disabling unnecessary remote access capabilities.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eFortinet researchers discovered C0XMO, a new variant of the Gafgyt botnet that targets DD-WRT router firmware. The malware can move beyond DD-WRT routers to other device types and supports a wide range of CPU architectures. Researchers found samples for ARM, MIPS, PowerPC, SuperH, x86, x86_64, and other architectures.\u003c/p\u003e\n\n\u003cp\u003eThe botnet was observed targeting a Japanese technology company. However, the article states that the source IP address was associated with a device located in Germany. The article does not identify the botnet operators.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eC0XMO is described as a DDoS-focused botnet with a more advanced architecture and feature set than earlier IoT botnets. Fortinet researchers said its overall design shows greater operational sophistication and complexity than typical Gafgyt malware. Its modular structure allows operators to update exploitation techniques, add or remove supported architectures, and expand lateral movement capabilities independently of the main payload.\u003c/p\u003e\n\n\u003ch2 id=\"initial-access-and-vulnerability\"\u003eInitial Access and Vulnerability\u003c/h2\u003e\n\n\u003cp\u003eC0XMO is delivered by exploiting CVE-2021-27137. The article describes this as a buffer overflow vulnerability caused by insufficient user input. It can be exploited without authentication and can lead to arbitrary code execution.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies DD-WRT router firmware as a key target for this activity. It also states that the malware includes exploits for DVRs, routers, video management platforms, and Android-based devices.\u003c/p\u003e\n\n\u003ch2 id=\"scanning-and-spread\"\u003eScanning and Spread\u003c/h2\u003e\n\n\u003cp\u003eFor broader distribution, C0XMO downloads a Python script that installs additional packages. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003erequests\u003c/li\u003e\n\u003cli\u003eparamiko\u003c/li\u003e\n\u003cli\u003ebeautifulsoup4\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these packages are used for network scanning and communication, as well as for activity over SSH and Telnet protocols. The scanner uses worker threads to randomly scan internet-facing systems on common ports, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e22 for SSH\u003c/li\u003e\n\u003cli\u003e23 for Telnet\u003c/li\u003e\n\u003cli\u003e80 and 443 for HTTP and HTTPS\u003c/li\u003e\n\u003cli\u003e7547\u003c/li\u003e\n\u003cli\u003e8080\u003c/li\u003e\n\u003cli\u003e8443\u003c/li\u003e\n\u003cli\u003e8888\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAfter finding a target, the malware attempts to brute-force weak Telnet and SSH credentials. It then detects the target device’s CPU architecture and deploys a compatible C0XMO binary.\u003c/p\u003e\n\n\u003cp\u003eThe Python script contains almost two dozen functions for scanning, exploiting HTTP and ADB-based vulnerabilities, detecting CPU architecture, logging in over SSH and Telnet, and checking IP addresses. The article states that its main purpose is lateral movement on the network.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-and-host-control\"\u003ePersistence and Host Control\u003c/h2\u003e\n\n\u003cp\u003eOnce C0XMO gains access to a device, it copies itself to hidden locations. The article names these paths:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e/tmp/.sys\u003c/li\u003e\n\u003cli\u003e/var/tmp/.sys\u003c/li\u003e\n\u003cli\u003e/dev/shm/.sys\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt then creates cron jobs that relaunch the malware every 15 minutes. The malware also modifies shell startup files to enable automatic execution.\u003c/p\u003e\n\n\u003ch2 id=\"removal-of-rival-malware-and-tools\"\u003eRemoval of Rival Malware and Tools\u003c/h2\u003e\n\n\u003cp\u003eC0XMO scans running processes to identify competitor botnet clients on the host. It also looks for red-team tools, programming tools, and network services that may interfere with its operation. When it finds these, it terminates them.\u003c/p\u003e\n\n\u003cp\u003eThe malware also deletes binaries and removes persistence mechanisms. The article specifically names cron jobs, init scripts, system services, and shell profile entries as persistence mechanisms that C0XMO removes.\u003c/p\u003e\n\n\u003ch2 id=\"command-and-control-and-capabilities\"\u003eCommand-and-Control and Capabilities\u003c/h2\u003e\n\n\u003cp\u003eAfter establishing itself, C0XMO connects to a hardcoded command-and-control address. The connection uses a custom multi-stage handshake that includes magic strings and shared secrets. The malware then waits for commands.\u003c/p\u003e\n\n\u003cp\u003eSupported commands include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHeartbeat checks\u003c/li\u003e\n\u003cli\u003eStarting scans\u003c/li\u003e\n\u003cli\u003eStopping scans\u003c/li\u003e\n\u003cli\u003eLaunching DDoS attacks\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eC0XMO supports 19 DDoS methods. The article lists methods including UDP, TCP, SYN, and ICMP floods, “ping of death,” NTP and Memcached amplification, Discord voice UDP floods, and Valve-specific floods.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-guidance-mentioned-in-the-article\"\u003eDefensive Guidance Mentioned in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article gives general recommendations for defending against C0XMO and other botnet malware. These include keeping devices up to date, using unique administrator credentials, and disabling remote access capabilities when they are not needed.\u003c/p\u003e\n\n\u003ch2 id=\"reported-impact-and-affected-parties\"\u003eReported Impact and Affected Parties\u003c/h2\u003e\n\n\u003cp\u003eThe article states that C0XMO was seen targeting a Japanese technology company. It also states that the source IP address was tied to a device located in Germany. The broader affected ecosystem includes DD-WRT router firmware and other device types such as DVRs, routers, video management platforms, and Android-based devices.\u003c/p\u003e\n","keyPoints":["Fortinet researchers discovered a new Gafgyt variant called C0XMO that targets DD-WRT router firmware and supports multiple CPU architectures, including ARM, MIPS, PowerPC, SuperH, x86, and x86_64.","C0XMO is delivered by exploiting CVE-2021-27137, an unauthenticated buffer overflow vulnerability that can lead to arbitrary code execution.","The botnet downloads a Python scanner that scans internet-facing systems, brute-forces weak Telnet and SSH credentials, detects CPU architecture, and deploys a compatible C0XMO binary.","After gaining access, C0XMO copies itself to hidden locations, creates cron jobs for persistence, and modifies shell startup files for automatic execution.","C0XMO can terminate competitor botnet clients and interfering tools, then connects to a hardcoded command-and-control server to receive commands including DDoS attacks using 19 supported methods."],"insights":["C0XMO’s modular design lets operators update exploitation techniques, change targeted CPU architectures, and expand lateral movement capabilities independently of the main payload.","Defenders should treat unexplained removal of cron jobs, init scripts, system services, or shell profile entries as potentially malicious because C0XMO deletes rival malware and its persistence mechanisms.","The botnet’s scanner targets both standard remote access ports and less common service ports such as 7547, 8443, and 8888, making exposed device management interfaces a practical hardening priority.","C0XMO’s use of a German source IP while targeting a Japanese technology company shows that observed attack traffic may originate from already-compromised third-party devices rather than the operators’ location."],"referencedReports":[],"body":"\u003cp\u003eA new variant of the Gafgyt botnet called C0XMO is targeting DD-WRT router firmware and can spread to other device types across multiple CPU architectures. Fortinet researchers found samples for ARM, MIPS, PowerPC, SuperH, x86, x86_64, and other architectures. The botnet was seen targeting a Japanese technology company, while the observed source IP address belonged to a device in Germany.\u003c/p\u003e\n\n\u003cp\u003eC0XMO is delivered by exploiting CVE-2021-27137, an unauthenticated buffer overflow vulnerability caused by insufficient user input that can allow arbitrary code execution. The malware uses a Python scanner to find internet-facing systems, brute-force weak Telnet and SSH credentials, detect CPU architecture, and deploy a compatible binary. It also establishes persistence through hidden file locations, cron jobs, and shell startup modifications.\u003c/p\u003e\n\n\u003cp\u003eThe botnet’s main purpose is launching distributed denial-of-service attacks, with 19 supported methods including UDP, TCP, SYN, and ICMP floods, as well as NTP and Memcached amplification. C0XMO also kills rival botnet clients and removes persistence mechanisms that may interfere with its operation. Fortinet described it as more advanced and operationally sophisticated than typical Gafgyt malware.\u003c/p\u003e\n"}]</script>
