<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }

<script>
window.__DL_ARTICLES = [{"n":1,"title":"Microsoft warns of Exchange zero-day flaw exploited in attacks","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-warns-of-exchange-zero-day-flaw-exploited-in-attacks/","time":"09:40","priority":"MUST READ","score":95,"group":"O","groupColor":"#c084fc","tldr":"Microsoft has released an emergency mitigation service to automatically protect on-premises Exchange servers from an actively exploited zero-day XSS vulnerability until official patches are released. Administrators should immediately enable the service or run the manual mitigation script to prevent arbitrary code execution through malicious emails.","briefOverview":"\u003cp\u003eMicrosoft has issued urgent mitigations for CVE-2026-42897, a high-severity vulnerability actively exploited in attacks against Exchange Server 2016, 2019, and Subscription Edition. The flaw enables threat actors to execute arbitrary JavaScript through cross-site scripting when users open specially crafted emails in Outlook Web Access. Since permanent patches are not yet available, Microsoft recommends immediately enabling the Exchange Emergency Mitigation Service to automatically protect on-premises deployments.\u003c/p\u003e\n\n\u003cp\u003eAdministrators managing air-gapped environments should instead apply the mitigation manually using the Exchange on-premises Mitigation Tool. Microsoft plans to release official updates for all affected versions, though patches for the unsupported 2016 and 2019 releases will be restricted to customers enrolled in the Period 2 Extended Support Update program. This vulnerability follows recent guidance from CISA and the NSA aimed at hardening Exchange servers after they reached their end-of-support dates.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft recently disclosed CVE-2026-42897, a critical security flaw affecting Exchange Server 2016, Exchange Server 2019, and the Exchange Server Subscription Edition. This vulnerability is classified as a spoofing issue that allows attackers to execute arbitrary code via cross-site scripting. The exploitation chain begins when a threat actor sends a maliciously crafted email to a targeted recipient. Execution only occurs when the user opens the message in Outlook Web Access and meets specific interaction conditions. This browser-based code execution allows threat actors to bypass server-side controls and compromise the user session directly.\u003c/p\u003e\n\n\u003cp\u003eBecause permanent security patches are not yet released, Microsoft has directed organizations to immediately enable the Exchange Emergency Mitigation Service. This automated service applies interim protections to on-premises Exchange servers running the Mailbox role. Administrators must verify that their servers are running at least the March 2023 version, as older instances cannot receive new mitigation checks. For environments that are air-gapped or lack automatic service connectivity, IT teams can deploy the Exchange on-premises Mitigation Tool manually. This requires running a PowerShell script through an elevated Exchange Management Shell with specific CVE parameters.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft has outlined plans to release official patches for Exchange SE RTM, Exchange 2016 CU23, and Exchange Server 2019 CU14 and CU15. Notably, the company specified that updates for Exchange 2016 and 2019 will only be distributed to subscribers of the Period 2 Exchange Server ESU program. The urgency of this mitigation follows the October end-of-support date for Exchange 2016 and 2019. In response to that milestone, CISA and the NSA previously issued joint guidance to help administrators harden their Exchange infrastructure. The Exchange Emergency Mitigation Service itself was originally launched in September 2021 to counter high-risk zero-days like ProxyLogon and ProxyShell. It runs continuously as a Windows service to secure internet-exposed servers against actively exploited vulnerabilities.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eVulnerability Overview and Exploitation Mechanics\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eMicrosoft has identified CVE-2026-42897 as a high-severity spoofing vulnerability impacting Exchange Server 2016, Exchange Server 2019, and Exchange Server Subscription Edition. The flaw operates through a cross-site scripting pathway that enables arbitrary JavaScript execution within a user\u0026rsquo;s browser context. Attackers initiate the exploit by delivering a specially crafted email payload to a targeted recipient. Execution only occurs when the user opens the message in Outlook Web Access and meets specific interaction conditions. This browser-based code execution allows threat actors to bypass server-side controls and compromise the user session directly.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eImmediate Mitigation Strategies\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eSince permanent security patches are not yet released, Microsoft has prioritized the deployment of interim protections. The primary recommendation is to enable the Exchange Emergency Mitigation Service immediately. This feature was originally introduced in September 2021 following the ProxyLogon and ProxyShell zero-day campaigns. EEMS runs as a background Windows service on Exchange Mailbox servers and automatically applies protections against high-risk, actively exploited vulnerabilities. Administrators must ensure their servers are running at least the March 2023 version, as older builds cannot process new mitigation checks.\u003c/p\u003e\n\n\u003cp\u003eFor organizations operating air-gapped environments or disconnected networks, manual intervention is required. IT staff should download the latest Exchange on-premises Mitigation Tool and execute it via an elevated Exchange Management Shell. The deployment supports two primary execution methods:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSingle server mitigation using the command \u003ccode\u003e.\\EOMT.ps1 -CVE \u0026quot;CVE-2026-42897\u0026quot;\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eBulk server mitigation using the pipeline \u003ccode\u003eGet-ExchangeServer | Where-Object { $_.ServerRole -ne \u0026quot;Edge\u0026quot; } | .\\EOMT.ps1 -CVE \u0026quot;CVE-2026-42897\u0026quot;\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003ePatch Availability and Support Restrictions\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eMicrosoft has scheduled the release of official patches for Exchange SE RTM, Exchange 2016 CU23, and Exchange Server 2019 CU14 and CU15. However, access to these updates is strictly gated behind licensing and support agreements. Patches for Exchange 2016 and 2019 will exclusively be distributed to customers enrolled in the Period 2 Exchange Server Extended Support Update program. This restriction aligns with the October end-of-support milestone for both legacy platforms. Following that date, CISA and the NSA jointly released hardening guidance to assist administrators in securing exposed Exchange infrastructure against advanced persistent threats.\u003c/p\u003e\n","keyPoints":["Microsoft is addressing CVE-2026-42897, a high-severity vulnerability in Exchange Server 2016, 2019, and Subscription Edition that allows arbitrary JavaScript execution via cross-site scripting.","Organizations should immediately enable the Exchange Emergency Mitigation Service to automatically protect on-premises servers until official patches are released.","Administrators managing air-gapped environments can apply the mitigation manually by running the Exchange on-premises Mitigation Tool script through an elevated Exchange Management Shell.","Microsoft plans to release official patches for affected versions, though updates for Exchange 2016 and 2019 will only be available to customers enrolled in the Period 2 Extended Support Update program."],"insights":["Microsoft's emergency mitigation service automatically activates on servers with the Mailbox role, but will fail to apply new protections on any Exchange instance older than March 2023.","Official patches for unsupported Exchange versions are strictly restricted to Period 2 Extended Support Update subscribers, making the emergency mitigation service the only viable defense for non-paying organizations.","Exploitation requires specific user interaction within Outlook Web Access, meaning automated background processing or non-browser email clients do not trigger the vulnerability."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft has issued urgent mitigations for CVE-2026-42897, a high-severity vulnerability actively exploited in attacks against Exchange Server 2016, 2019, and Subscription Edition. The flaw enables threat actors to execute arbitrary JavaScript through cross-site scripting when users open specially crafted emails in Outlook Web Access. Since permanent patches are not yet available, Microsoft recommends immediately enabling the Exchange Emergency Mitigation Service to automatically protect on-premises deployments.\u003c/p\u003e\n\n\u003cp\u003eAdministrators managing air-gapped environments should instead apply the mitigation manually using the Exchange on-premises Mitigation Tool. Microsoft plans to release official updates for all affected versions, though patches for the unsupported 2016 and 2019 releases will be restricted to customers enrolled in the Period 2 Extended Support Update program. This vulnerability follows recent guidance from CISA and the NSA aimed at hardening Exchange servers after they reached their end-of-support dates.\u003c/p\u003e\n"},{"n":2,"title":"On-Prem Microsoft Exchange Server CVE-2026-42897 Exploited via Crafted Email","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/on-prem-microsoft-exchange-server-cve.html","time":"06:19","priority":"MUST READ","score":95,"group":"O","groupColor":"#c084fc","tldr":"Microsoft urges immediate mitigation for CVE-2026-42897, a critical vulnerability actively exploited in the wild that enables arbitrary JavaScript execution on on-premise Exchange Server versions 2016, 2019, and Subscription Edition. Administrators must deploy the Exchange Emergency Mitigation Service or run the EOMT script to block the attack, while Exchange Online remains unaffected.","briefOverview":"\u003cp\u003eMicrosoft has disclosed CVE-2026-42897, a critical security flaw actively exploited in the wild that impacts on-premises versions of Exchange Server.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability, rated with a CVSS score of 8.1, stems from a cross-site scripting bug that allows unauthorized attackers to perform spoofing over a network.\u003c/p\u003e\n\n\u003cp\u003eWhen a user opens a crafted email in Outlook Web Access under specific interaction conditions, arbitrary JavaScript code can be executed in the browser context.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft has tagged this issue with an \u0026ldquo;Exploitation Detected\u0026rdquo; assessment and is urging immediate action.\u003c/p\u003e\n\n\u003cp\u003eAdministrators should deploy the Exchange Emergency Mitigation Service, which automatically applies a URL rewrite configuration to block the threat.\u003c/p\u003e\n\n\u003cp\u003eFor air-gapped environments, the company provides a mitigation script that can be run through the Exchange Management Shell.\u003c/p\u003e\n\n\u003cp\u003eExchange Online remains unaffected by this vulnerability.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft is currently investigating the threat actor and attack scale while organizations apply the recommended fixes.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has publicly disclosed CVE-2026-42897, a security vulnerability actively exploited in the wild that affects on-premises Exchange Server installations.\u003c/p\u003e\n\n\u003cp\u003eThe flaw carries a CVSS score of 8.1 and is classified as a spoofing bug originating from a cross-site scripting defect.\u003c/p\u003e\n\n\u003cp\u003eAn anonymous researcher credited with the discovery reported that improper input neutralization during web page generation enables network-based spoofing.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft has assigned an \u0026ldquo;Exploitation Detected\u0026rdquo; severity rating to the issue.\u003c/p\u003e\n\n\u003cp\u003eAttackers can weaponize the vulnerability by distributing a crafted email that triggers arbitrary JavaScript execution when opened in Outlook Web Access.\u003c/p\u003e\n\n\u003cp\u003eThis execution requires the victim to meet certain additional interaction conditions within the web interface.\u003c/p\u003e\n\n\u003cp\u003eRedmond is offering a temporary mitigation through the Exchange Emergency Mitigation Service, which is enabled by default and applies a URL rewrite configuration.\u003c/p\u003e\n\n\u003cp\u003eOrganizations unable to use the service due to air-gap restrictions must download the Exchange on-premises Mitigation Tool.\u003c/p\u003e\n\n\u003cp\u003eAdministrators can apply the fix to a single server or all internal servers simultaneously using a script in the Exchange Management Shell.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft has acknowledged a cosmetic issue where the tool displays \u0026ldquo;Mitigation invalid for this exchange version,\u0026rdquo; but confirmed the fix still applies successfully when the status reads \u0026ldquo;Applied.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eThe affected systems include Exchange Server 2016, Exchange Server 2019, and the Subscription Edition at any update level.\u003c/p\u003e\n\n\u003cp\u003eExchange Online is explicitly stated as not being impacted by this defect.\u003c/p\u003e\n\n\u003cp\u003eThere are currently no publicly available details regarding the exploitation methodology, the identity of the threat actor, or the scale of the campaign.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft continues to investigate the incident and recommends that all administrators immediately implement the provided mitigations.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"vulnerability-overview\"\u003eVulnerability Overview\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft has disclosed CVE-2026-42897, a critical security defect impacting on-premises versions of Exchange Server.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability carries a CVSS score of 8.1 and is officially classified as a spoofing bug rooted in a cross-site scripting flaw.\u003c/p\u003e\n\n\u003cp\u003eAn anonymous researcher discovered and reported the issue to Microsoft.\u003c/p\u003e\n\n\u003cp\u003eThe vendor describes the defect as an improper neutralization of input during web page generation that allows unauthorized attackers to perform spoofing over a network.\u003c/p\u003e\n\n\u003ch3 id=\"exploitation-mechanics\"\u003eExploitation Mechanics\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft has tagged the vulnerability with an \u0026ldquo;Exploitation Detected\u0026rdquo; assessment, confirming active real-world abuse.\u003c/p\u003e\n\n\u003cp\u003eThe attack vector involves an attacker sending a crafted email to a target user.\u003c/p\u003e\n\n\u003cp\u003eWhen the recipient opens the message in Outlook Web Access, arbitrary JavaScript code can be executed within the web browser context.\u003c/p\u003e\n\n\u003cp\u003eThis execution is not automatic and requires the victim to interact with the email under specific, additional conditions outlined by the vendor.\u003c/p\u003e\n\n\u003ch3 id=\"affected-systems-and-scope\"\u003eAffected Systems and Scope\u003c/h3\u003e\n\n\u003cp\u003eThe vulnerability impacts the following on-premises Exchange Server versions at any update level:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExchange Server 2016\u003c/li\u003e\n\u003cli\u003eExchange Server 2019\u003c/li\u003e\n\u003cli\u003eExchange Server Subscription Edition\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft explicitly states that Exchange Online is not affected by this vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe scope of the active exploitation remains unclear, as the company has not disclosed the identity of the threat actor, the specific exploitation techniques used, or the scale of the campaign.\u003c/p\u003e\n\n\u003cp\u003eIt is also unknown whether any specific targets have been successfully compromised.\u003c/p\u003e\n\n\u003ch3 id=\"mitigation-strategies\"\u003eMitigation Strategies\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft is providing immediate protection through the Exchange Emergency Mitigation Service.\u003c/p\u003e\n\n\u003cp\u003eThis service is enabled by default and automatically applies a URL rewrite configuration to block the vulnerability.\u003c/p\u003e\n\n\u003cp\u003eAdministrators are advised to ensure the Windows service is running if it is not already active.\u003c/p\u003e\n\n\u003cp\u003eFor environments with air-gap restrictions that prevent service deployment, Microsoft recommends using the Exchange on-premises Mitigation Tool.\u003c/p\u003e\n\n\u003cp\u003eThe tool can be downloaded from a Microsoft-provided URL and executed via an elevated Exchange Management Shell.\u003c/p\u003e\n\n\u003cp\u003eSingle servers can be patched using a direct command, while all internal servers can be remediated simultaneously through a pipeline script.\u003c/p\u003e\n\n\u003ch3 id=\"known-issues-and-recommendations\"\u003eKnown Issues and Recommendations\u003c/h3\u003e\n\n\u003cp\u003eMicrosoft has documented a cosmetic bug in the mitigation tool where the description field incorrectly displays \u0026ldquo;Mitigation invalid for this exchange version.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eThe vendor clarifies that this message is purely cosmetic and does not indicate a failure, provided the status field shows \u0026ldquo;Applied.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eThe Exchange Team is actively investigating how to correct this display error.\u003c/p\u003e\n\n\u003cp\u003eIn the absence of detailed threat intelligence or a permanent patch, Microsoft strongly recommends that all administrators immediately apply the available mitigations to secure their on-premises Exchange environments.\u003c/p\u003e\n","keyPoints":["Microsoft has disclosed CVE-2026-42897, a critical vulnerability actively exploited in the wild that allows arbitrary JavaScript execution on on-premise Exchange Server versions 2016, 2019, and Subscription Edition.","The cross-site scripting flaw can be triggered by opening a crafted email in Outlook Web Access under specific interaction conditions.","Administrators should deploy the Exchange Emergency Mitigation Service or run the Exchange on-premises Mitigation Tool script to automatically apply a URL rewrite configuration that blocks the vulnerability.","Exchange Online remains unaffected by this issue, and a cosmetic error message during mitigation does not prevent the fix from successfully applying."],"insights":["Microsoft's emergency response bypasses traditional patching by deploying protection through a URL rewrite configuration, allowing immediate mitigation while a permanent fix is developed.","The remediation script explicitly filters out Edge transport servers, indicating the vulnerability is isolated to internal Exchange roles rather than perimeter mail gateways.","A known cosmetic bug causes the mitigation tool to display \"Mitigation invalid\" in the description field, requiring administrators to verify the \"Applied\" status field to confirm protection is active.","Exploitation requires specific \"certain interaction conditions\" beyond simply opening a crafted email, meaning attackers must trigger precise UI states within Outlook Web Access to execute arbitrary JavaScript.","Microsoft has not yet disclosed the threat actor, attack scale, or specific targets, leaving organizations to rely exclusively on vendor mitigations without intelligence on adversary behavior or objectives."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft has disclosed CVE-2026-42897, a critical security flaw actively exploited in the wild that impacts on-premises versions of Exchange Server.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability, rated with a CVSS score of 8.1, stems from a cross-site scripting bug that allows unauthorized attackers to perform spoofing over a network.\u003c/p\u003e\n\n\u003cp\u003eWhen a user opens a crafted email in Outlook Web Access under specific interaction conditions, arbitrary JavaScript code can be executed in the browser context.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft has tagged this issue with an \u0026ldquo;Exploitation Detected\u0026rdquo; assessment and is urging immediate action.\u003c/p\u003e\n\n\u003cp\u003eAdministrators should deploy the Exchange Emergency Mitigation Service, which automatically applies a URL rewrite configuration to block the threat.\u003c/p\u003e\n\n\u003cp\u003eFor air-gapped environments, the company provides a mitigation script that can be run through the Exchange Management Shell.\u003c/p\u003e\n\n\u003cp\u003eExchange Online remains unaffected by this vulnerability.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft is currently investigating the threat actor and attack scale while organizations apply the recommended fixes.\u003c/p\u003e\n"}];

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function GroupBadge({ group, groupColor }) {
  if (!group || !groupColor) return null;
  const c = groupColor;
  return (
    <span style={{
      display: "inline-block", flexShrink: 0,
      width: 20, height: 20,
      border: "1px solid color-mix(in oklch, " + c + " 45%, transparent)",
      background: "color-mix(in oklch, " + c + " 12%, transparent)",
      borderRadius: 2
    }} />
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
