<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

<script>
window.__DL_ARTICLES = [{"n":3,"title":"cPanel, WHM emergency update fixes critical auth bypass bug","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/cpanel-whm-emergency-update-fixes-critical-auth-bypass-bug/","time":"15:51","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"A critical authentication bypass vulnerability in cPanel and WHM allows unauthorized access to hosting environments, requiring administrators to immediately run /scripts/upcp –force to apply an emergency patch to supported versions.","briefOverview":"\u003cp\u003eA critical authentication bypass vulnerability has been identified in cPanel and WHM, affecting all currently supported versions except the latest releases. The flaw allows attackers to gain unauthorized access to the control panel without valid credentials. Exploiting this issue could grant threat actors complete control over hosting accounts and entire servers, enabling them to plant backdoors, steal sensitive data, and use the infrastructure for spam or botnet activities. To address the issue, cPanel has released an emergency update that administrators must manually apply by running the /scripts/upcp –force command. The vendor has published a security bulletin listing the specific patched versions required to resolve the vulnerability. Hosting providers like Namecheap have already taken proactive measures by temporarily blocking ports 2083 and 2087 to protect their customers. Servers running unsupported software versions are not eligible for these security updates and should be upgraded immediately. No public attribution or tracking identifier has been assigned to this vulnerability yet.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA critical security vulnerability affecting cPanel and the WebHost Manager (WHM) dashboard has been disclosed, with the flaw capable of bypassing authentication entirely. This issue impacts all currently supported versions of the software except the very latest releases. The vulnerability enables unauthorized access to the control panel, granting attackers the ability to manipulate hosting environments without credentials. Once inside, threat actors can control websites, databases, and email systems, plant backdoors or web shells, and redirect users to malicious sites. They can also steal sensitive configuration files, send spam or phishing emails, and use the compromised servers for proxy traffic, malware delivery, or botnet operations. WHM access extends to the entire server, allowing attackers to create or delete accounts and establish persistent machine-level access. To mitigate the risk, cPanel has issued an emergency update that requires administrators to manually execute the /scripts/upcp –force command. This command forces the update process to run even if the system believes it is already on the latest version. The vendor has published a security bulletin detailing the exact patched versions, including 11.110.0.97, 11.118.0.63, 11.126.0.54, 11.132.0.29, 11.136.0.5, and 11.134.0.20. Hosting providers have responded quickly, with Namecheap temporarily blocking ports 2083 and 2087 to shield customers until patches were distributed. Administrators running unsupported cPanel versions are explicitly ineligible for security updates and are advised to upgrade to a supported release as soon as possible. The vulnerability currently lacks an official tracking identifier and has not been publicly attributed to any specific threat actor. Website owners relying on these management interfaces must ensure their systems have been updated to a patched version to prevent exploitation.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"vulnerability-overview\"\u003eVulnerability Overview\u003c/h3\u003e\n\n\u003cp\u003eA critical authentication bypass flaw has been identified in cPanel and the WebHost Manager (WHM) dashboard, affecting all currently supported versions except the latest releases. The vulnerability allows attackers to obtain access to the control panel without requiring valid authentication credentials. No public attribution or official tracking identifier has been assigned to this issue yet.\u003c/p\u003e\n\n\u003ch3 id=\"impact-and-exploitation-risks\"\u003eImpact and Exploitation Risks\u003c/h3\u003e\n\n\u003cp\u003eCompromising cPanel grants attackers full control over everything within a hosting account, including websites, data, and email systems. Threat actors can plant backdoors or web shells, redirect users to malicious destinations, and steal sensitive files from configuration data. They may also use the compromised accounts to send spam or phishing emails.\u003c/p\u003e\n\n\u003cp\u003eAccess through WHM extends to the entire server and all hosted websites. Attackers can create or delete cPanel accounts, establish persistent machine-level access, and leverage the infrastructure for proxy traffic, spam campaigns, malware distribution, or botnet operations.\u003c/p\u003e\n\n\u003ch3 id=\"mitigation-and-vendor-response\"\u003eMitigation and Vendor Response\u003c/h3\u003e\n\n\u003cp\u003ecPanel has addressed the issue through an emergency update that requires manual intervention. Administrators must run the /scripts/upcp –force command to retrieve and install the patched software. This command forces the update process to execute even if the system detects that it is already running the latest available version.\u003c/p\u003e\n\n\u003cp\u003eThe vendor has published a security bulletin specifying the exact patched versions required for each supported branch:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e11.110.0.97\u003c/li\u003e\n\u003cli\u003e11.118.0.63\u003c/li\u003e\n\u003cli\u003e11.126.0.54\u003c/li\u003e\n\u003cli\u003e11.132.0.29\u003c/li\u003e\n\u003cli\u003e11.136.0.5\u003c/li\u003e\n\u003cli\u003e11.134.0.20\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHosting providers have taken immediate defensive measures. Namecheap temporarily blocked ports 2083 and 2087, which are used for WHM and cPanel access, to protect customers until the patches became available.\u003c/p\u003e\n\n\u003ch3 id=\"version-support-and-upgrade-recommendations\"\u003eVersion Support and Upgrade Recommendations\u003c/h3\u003e\n\n\u003cp\u003eServers operating on unsupported versions of cPanel are explicitly ineligible for security updates. Administrators managing these legacy systems are strongly advised to upgrade to a supported version as soon as possible. Website owners using the affected management interfaces should verify their software versions and apply the emergency patch immediately to prevent unauthorized access.\u003c/p\u003e\n","keyPoints":["A critical authentication bypass vulnerability in cPanel and WHM allows unauthorized access to control panels without requiring valid credentials.","Administrators must manually execute the /scripts/upcp –force command to apply the emergency patch to supported software versions.","The vulnerability affects all currently supported versions except the latest releases, and servers running unsupported versions are ineligible for security updates.","Exploiting this flaw enables attackers to control hosting accounts, plant backdoors, steal sensitive data, and use compromised servers for malicious activities like spam or botnets.","Hosting providers like Namecheap temporarily blocked ports 2083 and 2087 to protect customers until patched versions were available."],"insights":["Administrators must run /scripts/upcp –force to bypass normal update checks, requiring deliberate manual override rather than relying on automatic patch deployment.","Compromise grants both account-level and server-level access, allowing threat actors to control hosting environments, create or delete accounts, and use the infrastructure for proxy traffic, spam, or malware delivery.","Major providers like Namecheap proactively blocked ports 2083 and 2087, demonstrating that network-level isolation was used as an emergency mitigation before software patches were distributed.","Unsupported versions are explicitly ineligible for security updates, meaning legacy deployments remain permanently exposed until administrators perform a full version upgrade rather than just applying patches."],"referencedReports":[{"title":"cPanel WHM Security Update 04-28-2026","url":"https://support.cpanel.net/hc/en-us/articles/40073787579671-cPanel-WHM-Security-Update-04-28-2026","publisher":"cPanel","context":"The article references this as the official security bulletin published by cPanel detailing the specific patched product versions required to mitigate the authentication bypass vulnerability."}],"body":"\u003cp\u003eA critical authentication bypass vulnerability has been identified in cPanel and WHM, affecting all currently supported versions except the latest releases. The flaw allows attackers to gain unauthorized access to the control panel without valid credentials. Exploiting this issue could grant threat actors complete control over hosting accounts and entire servers, enabling them to plant backdoors, steal sensitive data, and use the infrastructure for spam or botnet activities. To address the issue, cPanel has released an emergency update that administrators must manually apply by running the /scripts/upcp –force command. The vendor has published a security bulletin listing the specific patched versions required to resolve the vulnerability. Hosting providers like Namecheap have already taken proactive measures by temporarily blocking ports 2083 and 2087 to protect their customers. Servers running unsupported software versions are not eligible for these security updates and should be upgraded immediately. No public attribution or tracking identifier has been assigned to this vulnerability yet.\u003c/p\u003e\n"},{"n":6,"title":"New Wave of DPRK Attacks Uses AI-Inserted npm Malware, Fake Firms, and RATs","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/04/new-wave-of-dprk-attacks-uses-ai.html","time":"14:43","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"North Korean threat actors are using AI-generated code, layered npm dependencies, and fake corporate fronts to deploy sophisticated malware and remote access trojans targeting developers and cryptocurrency ecosystems.","briefOverview":"\u003cp\u003eNorth Korean threat actors, specifically the group known as Famous Chollima, are launching a new wave of supply chain attacks targeting developers and cryptocurrency ecosystems. These campaigns leverage AI-generated code and layered npm dependencies to bypass detection and steal sensitive credentials. The PromptMink campaign uses benign first-layer packages to dynamically download malicious second-layer payloads that exfiltrate cryptocurrency wallets and funds. Attackers are also employing fake companies and fraudulent job interviews to trick developers into installing remote access trojans through GitHub projects. Recent iterations have evolved from simple JavaScript stealers to multi-platform Rust-compiled payloads capable of dropping SSH backdoors and harvesting entire source code repositories. The threat actors continuously adapt their tactics by rotating command-and-control infrastructure and utilizing typosquatting techniques. These operations highlight a maturing threat landscape where state-aligned actors are increasingly targeting open-source repositories and automated coding assistants.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eNorth Korean state-aligned threat actors, primarily tracked as Famous Chollima, are orchestrating a multi-vector supply chain attack campaign targeting developers and cryptocurrency ecosystems. The activity spans several codenamed operations, including PromptMink, Contagious Interview, Contagious Trader, and graphalgo. These campaigns demonstrate a rapid evolution from simple JavaScript-based infostealers to sophisticated remote access trojans. Researchers from ReversingLabs, JFrog, SafeDep, BlueVoyant, and Hunt.io have documented the escalating sophistication of these groups. The PromptMink campaign introduces malicious npm packages that leverage AI-generated code to bypass detection mechanisms. A primary example is the @validate-sdk/v2 package, which falsely advertises itself as a validation SDK but actually exfiltrates sensitive secrets and cryptocurrency funds. The attack utilizes a phased dependency model where benign first-layer packages dynamically import malicious second-layer dependencies. This architecture allows attackers to swiftly replace compromised payloads and maintain persistent access. Parallel campaigns distribute Remote Access Trojans through trojanized npm packages and Matryoshka Doll-style dependency chains. Packages such as express-session-js and bjs-biginteger act as droppers that fetch obfuscated payloads from paste services. Once executed, the malware connects to command-and-control servers using legitimate libraries like socket.io-client. The trojans possess extensive capabilities, including browser credential theft, crypto wallet extraction, screenshot capture, keylogging, and interactive mouse and keyboard control. The graphalgo campaign employs advanced social engineering to compromise developers through fraudulent job assessments. Operators create networks of fake companies, complete with registered U.S. LLCs and convincing profiles on development platforms. Targets are tricked into downloading GitHub-hosted projects that contain malicious dependencies hosted as release artifacts. Recent iterations have expanded beyond npm to target the Python Package Index and successfully compromised highly popular libraries like axios through the UNC1069 cluster. The continuous adaptation of these campaigns underscores the escalating threat posed by state-aligned actors targeting the open-source ecosystem.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"campaign-overview-and-threat-actor-attribution\"\u003eCampaign Overview and Threat Actor Attribution\u003c/h3\u003e\n\n\u003cp\u003eNorth Korean state-aligned threat actors, primarily tracked as Famous Chollima, are orchestrating a multi-vector supply chain attack campaign targeting developers and cryptocurrency ecosystems. The activity spans several codenamed operations, including PromptMink, Contagious Interview, Contagious Trader, and graphalgo. These campaigns demonstrate a rapid evolution from simple JavaScript-based infostealers to sophisticated remote access trojans. Researchers from ReversingLabs, JFrog, SafeDep, BlueVoyant, and Hunt.io have documented the escalating sophistication of these groups.\u003c/p\u003e\n\n\u003ch3 id=\"promptmink-and-layered-dependency-strategies\"\u003ePromptMink and Layered Dependency Strategies\u003c/h3\u003e\n\n\u003cp\u003eThe PromptMink campaign introduces malicious npm packages that leverage AI-generated code to bypass detection mechanisms. A primary example is the @validate-sdk/v2 package, which falsely advertises itself as a validation SDK but actually exfiltrates sensitive secrets and cryptocurrency funds. The attack utilizes a phased dependency model where benign first-layer packages dynamically import malicious second-layer dependencies. This architecture allows attackers to swiftly replace compromised payloads and maintain persistent access. The threat actors have also adapted their tooling, shifting from large Node.js executables to compact Rust-compiled NAPI-RS add-ons to reduce payload size.\u003c/p\u003e\n\n\u003ch3 id=\"contagious-interview-and-contagious-trader-operations\"\u003eContagious Interview and Contagious Trader Operations\u003c/h3\u003e\n\n\u003cp\u003eParallel campaigns distribute Remote Access Trojans through trojanized npm packages and Matryoshka Doll-style dependency chains. Packages such as express-session-js and bjs-biginteger act as droppers that fetch obfuscated payloads from paste services. Once executed, the malware connects to command-and-control servers using legitimate libraries like socket.io-client. The trojans possess extensive capabilities, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBrowser credential theft and crypto wallet extraction\u003c/li\u003e\n\u003cli\u003eScreenshot capture, keylogging, and clipboard monitoring\u003c/li\u003e\n\u003cli\u003eInteractive mouse and keyboard control via specialized packages\nResearchers note that the actors are actively leveraging AI-generated code to deceive automated coding assistants.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"graphalgo-campaign-and-social-engineering-tactics\"\u003eGraphalgo Campaign and Social Engineering Tactics\u003c/h3\u003e\n\n\u003cp\u003eThe graphalgo campaign employs advanced social engineering to compromise developers through fraudulent job assessments. Operators create networks of fake companies, complete with registered U.S. LLCs and convincing profiles on development platforms. Targets are tricked into downloading GitHub-hosted projects that contain malicious dependencies hosted as release artifacts. This technique buries the malicious reference deep within package-lock.json files, directing package managers to fetch payloads directly from crafted repositories. The resulting remote access trojans can enumerate systems, manipulate file structures, and exfiltrate entire source code repositories.\u003c/p\u003e\n\n\u003ch3 id=\"recent-evolution-and-infrastructure-adaptation\"\u003eRecent Evolution and Infrastructure Adaptation\u003c/h3\u003e\n\n\u003cp\u003eRecent iterations have expanded beyond npm to target the Python Package Index and have successfully compromised highly popular libraries like axios through the UNC1069 cluster. The actors behind the axios breach published an updated payload that substitutes traditional droppers for specialized data stealers. These updated payloads target AWS keys, GitHub tokens, and .npmrc configurations. Command-and-control infrastructure has frequently rotated through Vercel-hosted domains and external servers. The continuous adaptation of these campaigns underscores the escalating threat posed by state-aligned actors targeting the open-source ecosystem.\u003c/p\u003e\n","keyPoints":["North Korean threat actors are deploying AI-generated npm packages that use layered dependencies to steal cryptocurrency wallets and sensitive credentials.","The graphalgo campaign uses fake companies and fraudulent job interviews to trick developers into downloading GitHub projects containing malicious dependencies that install remote access trojans.","Attackers employ techniques such as typosquatting, transitive dependencies, and Vercel-hosted command-and-control infrastructure to evade detection and maintain persistent access.","The malware has evolved from simple JavaScript stealers to multi-platform Rust-compiled payloads capable of dropping SSH backdoors and exfiltrating entire source code repositories.","Recent campaigns have expanded beyond npm to include PyPI and targeted popular libraries like axios, highlighting the growing threat to open-source ecosystems."],"insights":["Attackers are leveraging AI-generated code to deceive automated coding assistants, indicating a shift toward targeting AI-driven development workflows rather than just human developers.","The campaign employs a benign first-layer package to dynamically download and swap out malicious second-layer dependencies, allowing attackers to bypass detection and rapidly rotate payloads.","Threat actors circumvent npm registry detection by hosting malicious dependencies as GitHub release artifacts, with package-lock.json files directing package managers to these crafted repositories.","The malware evolved from a 5.1KB JavaScript stealer to an 85MB Node.js executable, prompting attackers to switch to Rust-compiled NAPI-RS add-ons to reduce payload size and improve stealth."],"referencedReports":[{"title":"Claude PromptMink Malware Report","url":"https://www.reversinglabs.com/blog/claude-promptmink-malware-crypto","publisher":"ReversingLabs","context":"Cited as a report shared with The Hacker News detailing how attackers used an AI-generated commit to inject malicious dependencies."},{"title":"New Crypto Stealer NPM Research","url":"https://research.jfrog.com/post/new-crypto-stealer-npm/","publisher":"JFrog","context":"Documented the threat actor's use of transitive dependencies to execute malicious code on developer systems and exfiltrate valuable data."},{"title":"JustJoin Landing Page Linked to Suspected DPRK Activity Resurfaces Report","url":"https://hunt.io/blog/justjoin-landing-page-linked-to-suspected-dprk-activity-resurfaces","publisher":"Hunt.io","context":"Tied the axios supply chain compromise and RAT similarities to the BlueNoroff sub-cluster in a detailed technical report."},{"title":"Malicious NPM Package express-session-js Analysis","url":"https://safedep.io/malicious-npm-package-express-session-js/","publisher":"SafeDep","context":"Analyzed the static deobfuscation of a stage-2 payload revealing a full Remote Access Trojan and information stealer with multiple exfiltration capabilities."},{"title":"OtterCookie \u0026 Shifty Corsair Bifurcated Attack Strategy Research","url":"https://www.bluevoyant.com/blog/ottercookie-shifty-corsair-bifurcated-attack-strategy","publisher":"BlueVoyant","context":"Provided researcher analysis on the escalating threat of DPRK state-aligned cyber operations and their rapid operational maturation."}],"body":"\u003cp\u003eNorth Korean threat actors, specifically the group known as Famous Chollima, are launching a new wave of supply chain attacks targeting developers and cryptocurrency ecosystems. These campaigns leverage AI-generated code and layered npm dependencies to bypass detection and steal sensitive credentials. The PromptMink campaign uses benign first-layer packages to dynamically download malicious second-layer payloads that exfiltrate cryptocurrency wallets and funds. Attackers are also employing fake companies and fraudulent job interviews to trick developers into installing remote access trojans through GitHub projects. Recent iterations have evolved from simple JavaScript stealers to multi-platform Rust-compiled payloads capable of dropping SSH backdoors and harvesting entire source code repositories. The threat actors continuously adapt their tactics by rotating command-and-control infrastructure and utilizing typosquatting techniques. These operations highlight a maturing threat landscape where state-aligned actors are increasingly targeting open-source repositories and automated coding assistants.\u003c/p\u003e\n"},{"n":2,"title":"European Commission accuses Meta of breaching child safety rules","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/european-commission-accuses-meta-of-breaching-digital-child-safety-laws","time":"15:47","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"The European Commission accuses Meta of violating the Digital Services Act by relying on self-declared age verification, allowing children under 13 to access Instagram and Facebook. Meta faces potential fines of up to 6% of its annual revenue and must implement robust age verification mechanisms to prevent underage access.","briefOverview":"\u003cp\u003eThe European Commission has formally accused Meta of violating the Digital Services Act by failing to prevent children under the age of 13 from accessing Instagram and Facebook. The platform owner relies entirely on self-declared age verification, which lacks any enforcement mechanism to stop users from submitting fake birthdates. Consequently, Meta does not adequately identify or remove underage users who manage to bypass these basic checks.\u003c/p\u003e\n\n\u003cp\u003eThe Commission argues that Meta ignored readily available scientific evidence regarding the heightened vulnerability of younger children to online harms. If the findings stand, Meta could face fines reaching 6% of its annual core business revenue, alongside periodic penalties to ensure ongoing compliance. The company has been given the opportunity to review the investigative documents and submit rebuttals before a final ruling is issued.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe European Commission issued a formal accusation against Meta for breaching child safety regulations under the Digital Services Act. The investigation highlights that Instagram and Facebook have consistently failed to block children under 13 from accessing their services. Meta currently enforces a minimum age requirement through self-declaration, but the company lacks any technical enforcement mechanism to verify these claims or prevent fake birthdates.\u003c/p\u003e\n\n\u003cp\u003eFurthermore, the Commission notes that Meta does not take sufficient action to identify and remove underage users once they have gained access. Meta’s internal responses to the inquiry directly contradict external data indicating that approximately 10 to 12 percent of children under 13 actively use these platforms. The Commission emphasizes that Meta disregarded established scientific evidence concerning the increased vulnerability of younger children to digital harms.\u003c/p\u003e\n\n\u003cp\u003eShould the Commission finalize its findings, Meta faces potential penalties of up to 6% of its annual core business revenue. The regulator also retains the authority to issue periodic fines to compel ongoing compliance with the Digital Services Act. Meta has been granted a formal opportunity to study the investigative documents and rebut the preliminary findings before a final decision is made.\u003c/p\u003e\n\n\u003cp\u003eThe Commission is mandating that Meta completely overhaul its risk assessment methodologies and implement stricter controls to prevent underage access. The probe, which commenced in May 2024, involved a thorough examination of Meta’s risk assessment reports, internal documents, and responses to information requests. In addition to the child safety violation, the Commission is conducting a separate investigation into whether Meta complies with DSA design requirements aimed at preventing addiction and protecting user mental health.\u003c/p\u003e\n\n\u003cp\u003eMeanwhile, other European nations are advancing their own legislative measures, with France recently voting to ban children under 15 from social media. Spain, the Netherlands, the United Kingdom, and Norway have similarly introduced or proposed restrictions on youth access to digital platforms.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"executive-summary\"\u003eExecutive Summary\u003c/h3\u003e\n\n\u003cp\u003eThe European Commission has formally accused Meta of violating the Digital Services Act by failing to implement adequate safeguards against underage access on Instagram and Facebook. The investigation centers on Meta’s reliance on self-declared age verification, which lacks technical enforcement to prevent children under 13 from bypassing minimum age requirements. The Commission argues that Meta ignored established scientific evidence regarding the heightened vulnerability of younger children to online harms.\u003c/p\u003e\n\n\u003cp\u003eIf the preliminary findings are finalized, Meta could face penalties of up to 6% of its annual core business revenue, along with periodic fines to ensure ongoing compliance. Meta has been granted a formal opportunity to review the investigative documents and submit rebuttals before a final ruling is issued.\u003c/p\u003e\n\n\u003ch3 id=\"core-violations-and-regulatory-findings\"\u003eCore Violations and Regulatory Findings\u003c/h3\u003e\n\n\u003cp\u003eThe Commission’s press release outlines several specific failures by Meta regarding child safety protocols. The company’s terms of service mandate a minimum age of 13, yet the platform relies exclusively on users self-declaring their age without verification mechanisms. This approach allows children to easily submit fake birthdates and gain unauthorized access.\u003c/p\u003e\n\n\u003cp\u003eFurthermore, Meta does not sufficiently identify or remove underage users once they have successfully registered accounts. The Commission explicitly states that Meta’s responses to its inquiry contradict widespread evidence showing that 10 to 12 percent of children under 13 actively use Instagram and Facebook. The regulator emphasizes that Meta disregarded readily available scientific research indicating that younger children are disproportionately vulnerable to digital harms.\u003c/p\u003e\n\n\u003ch3 id=\"potential-penalties-and-compliance-requirements\"\u003ePotential Penalties and Compliance Requirements\u003c/h3\u003e\n\n\u003cp\u003eMeta faces significant financial and operational consequences if the Commission upholds its findings. The maximum penalty for DSA violations reaches 6% of Meta’s annual revenue from core business activities. Additionally, the Commission reserves the right to issue periodic fines to force ongoing compliance with regulatory mandates.\u003c/p\u003e\n\n\u003cp\u003eThe Commission mandates several immediate operational changes for Meta to align with DSA requirements. These required actions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOverhauling risk assessment methodologies to properly evaluate threats to minors.\u003c/li\u003e\n\u003cli\u003eImplementing stricter access controls to prevent children under 13 from registering accounts.\u003c/li\u003e\n\u003cli\u003eEstablishing more efficient systems to identify and remove underage users who bypass verification.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe regulator also notes that age verification measures remain a recommended compliance pathway under current DSA guidelines.\u003c/p\u003e\n\n\u003ch3 id=\"broader-regulatory-landscape-and-ongoing-investigations\"\u003eBroader Regulatory Landscape and Ongoing Investigations\u003c/h3\u003e\n\n\u003cp\u003eThe probe into Meta’s child safety practices began in May 2024 and involved a comprehensive review of internal documents, risk assessment reports, and responses to information requests. Beyond the immediate child safety allegations, the Commission is simultaneously investigating whether Meta adheres to DSA design requirements aimed at mitigating addiction and safeguarding user mental health across all age groups.\u003c/p\u003e\n\n\u003cp\u003eThis regulatory action occurs against a backdrop of accelerating legislative efforts across Europe. The French Senate recently voted to ban children under 15 from using social media, with negotiations continuing in the National Assembly. Similar restrictions are being developed or implemented in Spain, the Netherlands, the United Kingdom, and Norway, signaling a coordinated regional shift toward stricter digital youth protections.\u003c/p\u003e\n","keyPoints":["The European Commission accuses Meta of violating the Digital Services Act by failing to prevent children under 13 from accessing Instagram and Facebook.","Meta relies on self-declared age verification without enforcement mechanisms to prevent children from providing fake birthdates.","Meta faces potential fines of up to 6% of its annual core business revenue and must overhaul its risk assessment processes.","The Commission requires Meta to implement stricter age verification measures and improve its ability to identify and remove underage users."],"insights":["The Commission can issue periodic fines to compel ongoing compliance, rather than relying solely on a one-time penalty.","A separate investigation is actively examining whether Meta’s platform design meets DSA requirements to prevent addiction and safeguard mental health.","Meta’s internal responses to the EU inquiry directly contradict external evidence showing that 10–12% of children under 13 use the platforms."],"referencedReports":[],"body":"\u003cp\u003eThe European Commission has formally accused Meta of violating the Digital Services Act by failing to prevent children under the age of 13 from accessing Instagram and Facebook. The platform owner relies entirely on self-declared age verification, which lacks any enforcement mechanism to stop users from submitting fake birthdates. Consequently, Meta does not adequately identify or remove underage users who manage to bypass these basic checks.\u003c/p\u003e\n\n\u003cp\u003eThe Commission argues that Meta ignored readily available scientific evidence regarding the heightened vulnerability of younger children to online harms. If the findings stand, Meta could face fines reaching 6% of its annual core business revenue, alongside periodic penalties to ensure ongoing compliance. The company has been given the opportunity to review the investigative documents and submit rebuttals before a final ruling is issued.\u003c/p\u003e\n"},{"n":1,"title":"Swiss police arrest 10 suspected members of Nigeria-linked crime group Black Axe","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/black-axe-switzerland-germany-cyber","time":"14:15","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"Swiss and German law enforcement arrested 10 suspects linked to the transnational Black Axe network for orchestrating romance scams and money laundering, marking a key development in the coordinated international effort to dismantle West African cyber-enabled fraud operations across Europe.","briefOverview":"\u003cp\u003eSwiss and German law enforcement have arrested ten suspected members of the Black Axe network, including a regional leader overseeing Southern European operations. The arrests followed coordinated house searches across multiple Swiss cantons and target individuals aged between 32 and 54. These suspects face accusations of orchestrating romance scams that caused millions of Swiss francs in financial losses. Authorities allege they also managed international money-laundering operations to route illicit profits through global financial channels. Black Axe operates as a highly structured transnational organization with approximately 30,000 registered members worldwide. Europol estimates the group generates billions of euros annually through thousands of small-scale criminal activities.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSwiss and German law enforcement agencies have arrested ten suspected members of the Nigerian-linked Black Axe network, including a regional leader responsible for overseeing operations across Southern Europe. The arrests were executed following house searches conducted across several Swiss cantons. The suspects, ranging in age from 32 to 54, are accused of conducting romance scams that have caused millions of Swiss francs in losses. Authorities allege that these individuals also managed money-laundering operations designed to route illicit profits through international financial networks. Black Axe is formally connected to the Neo-Black Movement of Africa and is classified by law enforcement as a highly structured transnational criminal organization. The network maintains a global footprint by dividing its territory into approximately 60 operational zones in Nigeria and about 35 zones abroad. Each operational zone is estimated to contain around 200 members, contributing to a total of roughly 30,000 registered members worldwide. The organization relies heavily on extensive networks of associates, money mules, and facilitators to move stolen funds. These arrests are part of a wider international effort to dismantle West African organized crime groups operating within Europe. Earlier this year, Spanish police detained 34 suspected Black Axe members in a separate operation. A coordinated international crackdown in 2023 resulted in more than 100 arrests and the seizure of over 200 bank accounts linked to online fraud networks. The group enforces strict internal hierarchies, ritualized initiation practices, and formal codes of conduct to maintain tight operational control. Black Axe is linked to a wide range of illicit activities, including cyber-enabled fraud, drug trafficking, human trafficking, kidnapping, and armed robbery. Europol estimates that the network generates billions of euros annually through thousands of small-scale criminal operations. The organization traces its origins to a Nigerian student fraternity founded in the late 1970s, which gradually evolved into a violent criminal enterprise focused on online financial scams and transnational crimes.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eOperational Breakdown and Recent Enforcement Actions\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eSwiss and German law enforcement agencies have arrested ten suspected members of the Black Axe criminal network, including a regional leader responsible for overseeing operations in Southern Europe. The arrests were carried out following coordinated house searches across multiple Swiss cantons. The suspects, aged between 32 and 54, face accusations of orchestrating romance scams that have caused millions of Swiss francs in financial losses. Authorities allege that these individuals also managed complex money-laundering operations designed to route illicit profits through international financial networks.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eNetwork Structure and Global Footprint\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eBlack Axe is formally linked to the Neo-Black Movement of Africa and is classified by law enforcement as a highly structured transnational criminal organization with a global presence. The network divides its territory into dozens of operational zones, comprising roughly 60 zones in Nigeria and about 35 zones abroad. Each operational zone is estimated to include around 200 members, contributing to a total of approximately 30,000 registered members worldwide. The organization maintains extensive networks of associates, money mules, and facilitators to support its financial operations. Key structural elements include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA decentralized zone-based operational model spanning Nigeria and international territories.\u003c/li\u003e\n\u003cli\u003eA membership base of roughly 30,000 individuals supported by auxiliary financial facilitators.\u003c/li\u003e\n\u003cli\u003eStrict internal hierarchies and ritualized initiation practices that enforce operational discipline.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eEnforcement Context and Historical Evolution\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThese arrests are part of a broader international crackdown targeting West African organized crime groups operating across Europe. Earlier this year, Spanish police detained 34 suspected Black Axe members in a separate operation. A coordinated international crackdown in 2023 led to more than 100 arrests and the seizure of over 200 bank accounts linked to online fraud networks. The group enforces strict internal hierarchies, ritualized initiation practices, and formal codes of conduct to maintain tight operational control. Black Axe traces its origins to a Nigerian student fraternity founded in the late 1970s known as the Neo-Black Movement of Africa. Over several decades, authorities state that the organization evolved into a violent criminal network heavily involved in online financial scams and other transnational crimes.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eScope of Criminal Activities and Financial Impact\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe network is linked to a broad spectrum of illicit activities, including cyber-enabled fraud, drug trafficking, human trafficking, kidnapping, and armed robbery. Europol estimates that the organization generates billions of euros annually through thousands of small-scale criminal operations. The group\u0026rsquo;s financial model relies on decentralized, high-volume fraud schemes supported by international money laundering infrastructure. Law enforcement continues to view the network as a persistent threat requiring sustained cross-border cooperation to dismantle its operational zones and financial channels.\u003c/p\u003e\n","keyPoints":["Swiss and German law enforcement arrested 10 suspected members of the Nigerian-linked Black Axe network, including a regional leader overseeing Southern European operations.","The suspects are accused of orchestrating romance scams that caused millions of Swiss francs in losses and conducting international money laundering operations.","Black Axe functions as a highly structured transnational organization with approximately 30,000 registered members worldwide divided into dozens of operational zones.","Europol estimates the network generates billions of euros annually through thousands of small-scale criminal operations, including cyber-enabled fraud, drug trafficking, and human trafficking."],"insights":["The network generates billions annually through thousands of small-scale operations, indicating a decentralized revenue model that relies heavily on money mules and facilitators rather than centralized large-scale heists.","Black Axe enforces strict internal control through ritualized initiation practices and formal codes of conduct, reflecting a highly institutionalized structure that standardizes criminal behavior across dozens of global zones.","The group's financial operations are explicitly designed to move illicit profits through international networks, highlighting the critical role of cross-border money laundering infrastructure in sustaining their romance scam and fraud activities."],"referencedReports":[],"body":"\u003cp\u003eSwiss and German law enforcement have arrested ten suspected members of the Black Axe network, including a regional leader overseeing Southern European operations. The arrests followed coordinated house searches across multiple Swiss cantons and target individuals aged between 32 and 54. These suspects face accusations of orchestrating romance scams that caused millions of Swiss francs in financial losses. Authorities allege they also managed international money-laundering operations to route illicit profits through global financial channels. Black Axe operates as a highly structured transnational organization with approximately 30,000 registered members worldwide. Europol estimates the group generates billions of euros annually through thousands of small-scale criminal activities.\u003c/p\u003e\n"},{"n":4,"title":"European police dismantles €50 million crypto investment fraud ring","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/european-police-dismantles-50-million-crypto-investment-fraud-ring/","time":"14:27","priority":"MAY READ","score":0,"group":null,"groupColor":null,"tldr":"","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":[],"insights":[],"referencedReports":[],"body":""},{"n":5,"title":"SAP-Related npm Packages Compromised in Credential-Stealing Supply Chain Attack","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/04/sap-npm-packages-compromised-by-mini.html","time":"16:26","priority":"MAY READ","score":0,"group":null,"groupColor":null,"tldr":"","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":[],"insights":[],"referencedReports":[],"body":""}];

  const initialTab = tabs[0] ? tabs[0].id : "source";

      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {article.group && <GroupBadge group={article.group} groupColor={article.groupColor} />}
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
