,"primary":false},{"title":"Global Report by Kaspersky Security Services","url":"https://securelist.com/global-report-security-services-2026/119233/","publisher":"Kaspersky (Securelist)","context":"Cited as the source for the increase in trusted relationship attacks from 12.7% in 2024 to 15.5% in 2025, reinforcing the risk that SMBs can be stepping stones to larger enterprises.","category":"research","primary":true}],"body":"\u003cp\u003eIn the first four months of 2026, Kaspersky detected a dramatic shift in the SMB threat landscape: attacks where malware or potentially unwanted applications masqueraded as popular AI tools surged almost fivefold year-over-year, reaching 33,352 detections. This eclipsed the previously widespread tactic of disguising threats as office and collaboration suites (over 24,000 attacks) and rivaled the persistent abuse of fake messenger and video conferencing apps (nearly 415,000 attacks). New AI brands that gained popularity in 2026, such as Claude and OpenClaw, were already among the lures, demonstrating how quickly attackers align with hype cycles to compromise small businesses.\u003c/p\u003e\n\n\u003cp\u003eBeyond malware, phishing and scam campaigns targeted SMB credentials and funds through fraudulent AI contractor services, fake bank account offers for entrepreneurs, and bogus Facebook business page violation warnings that harvested passwords. Email remained a primary delivery channel, with schemes that exploited legitimate third-party platforms to bypass filters: one campaign sent fake OneDrive document notifications, another impersonated Apple about a nonexistent compliance issue, and a two-stage attack used a real Zoom Docs page to hide a phishing link behind a seemingly safe invitation to a nonexistent meeting. Malicious attachments with trivial lures, such as requests for the best quote on attached items, continued to deliver Trojans.\u003c/p\u003e\n\n\u003cp\u003eAnalysis of dark web forums showed that over half of all initial access offers for sale in early 2026 related to small and medium-sized organizations, although posts grew more targeted—those not specifying a region dropped by 56%. Regionally, posts concerning the Middle East, Africa, and Latin America increased, while those for Europe and APAC declined. This access can be used for ransomware, data theft, or as entry points into larger enterprises via trusted relationship attacks, which rose from 12.7% to 15.5% of initial vectors in 2025, underscoring that the poor security posture of SMBs poses risks far beyond the businesses themselves.\u003c/p\u003e\n"},{"n":2,"title":"Microsoft quietly extends free Windows 10 ESU support to October 2027","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-quietly-extends-free-windows-10-esu-support-to-october-2027/","time":"18:29","priority":"SHOULD READ","score":78,"tldr":"Microsoft has quietly extended the free Windows 10 Extended Security Updates program for consumers by one year, now covering security updates until October 12, 2027, to give users more time to upgrade to Windows 11.","briefOverview":"\u003cp\u003eAlthough Windows 10 reached end of support on October 14, 2025, Microsoft originally offered consumers a free Extended Security Updates (ESU) program that would expire on October 12, 2026. The company has now quietly extended that program by an additional year, making security updates available through October 12, 2027. The change appeared without a formal announcement, only noted in updates to Microsoft’s official documentation and in an editor’s note on a Windows Experience Blog post dated June 25, 2026. Microsoft explained that the extension gives customers more time to find the best PC for their needs while keeping them protected.\u003c/p\u003e\n\n\u003cp\u003eConsumers can obtain the free ESU through several methods: paying $30, backing up their Windows settings to their Microsoft account, redeeming 1,000 Microsoft Reward points, or, for those in the European Economic Area, by signing into Windows 10 with a Microsoft account. A single ESU license can cover up to 10 devices associated with the same Microsoft account, and users already enrolled will automatically remain covered until the new October 2027 end date. The program is strictly for personal devices, excluding systems joined to Active Directory domains, Microsoft Entra, or managed via Mobile Device Management, although Microsoft Entra-registered devices are eligible.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Microsoft quietly extended the free Windows 10 Extended Security Updates (ESU) program for consumers by an additional year, now available until October 12, 2027.","The extension was made without a formal announcement, appearing only in updates to Microsoft's ESU documentation and as an editor's note on a Windows Experience Blog post.","Consumers can receive the free ESU by paying $30, backing up their Windows settings to a Microsoft account, redeeming 1,000 Microsoft reward points, or, in the European Economic Area, by logging in to Windows 10 with a Microsoft account.","The consumer ESU program is only for personal devices and is not available for systems joined to Active Directory domains, Microsoft Entra, or managed through Mobile Device Management (though Microsoft Entra-registered devices are eligible).","Users already enrolled in the ESU program will automatically remain covered until the new October 2027 end date, and a single ESU license can be used on up to ten devices associated with the same Microsoft account."],"insights":["Microsoft's quiet extension, without a formal announcement, suggests a deliberate effort to avoid highlighting the ongoing reliance on Windows 10, which could undermine the urgency to upgrade to Windows 11 or Copilot+ PCs.","The requirement to back up settings to a Microsoft account or redeem Rewards points for free ESU reveals that Microsoft is leveraging security updates to drive adoption of its account ecosystem and increase user engagement.","Excluding domain-joined, Entra-joined, and MDM-managed devices from the consumer ESU program creates a protection gap for small businesses using these identity and management tools, forcing them to either alter device management practices or pay for enterprise ESU.","By coupling the free extension with language promoting 'new Copilot+ PCs,' Microsoft turns a security measure into a subtle marketing channel, framing hardware upgrades as the ultimate resolution to security concerns."],"referencedReports":[{"title":"Test every layer before attackers do","url":"https://hubs.li/Q04jQ9z40","publisher":"Picus","context":"The article includes a promotional section linking to a Picus whitepaper that demonstrates how breach and attack simulation tests SIEM and EDR rules to prevent threats from going undetected.","category":"guide","primary":false}],"body":"\u003cp\u003eAlthough Windows 10 reached end of support on October 14, 2025, Microsoft originally offered consumers a free Extended Security Updates (ESU) program that would expire on October 12, 2026. The company has now quietly extended that program by an additional year, making security updates available through October 12, 2027. The change appeared without a formal announcement, only noted in updates to Microsoft’s official documentation and in an editor’s note on a Windows Experience Blog post dated June 25, 2026. Microsoft explained that the extension gives customers more time to find the best PC for their needs while keeping them protected.\u003c/p\u003e\n\n\u003cp\u003eConsumers can obtain the free ESU through several methods: paying $30, backing up their Windows settings to their Microsoft account, redeeming 1,000 Microsoft Reward points, or, for those in the European Economic Area, by signing into Windows 10 with a Microsoft account. A single ESU license can cover up to 10 devices associated with the same Microsoft account, and users already enrolled will automatically remain covered until the new October 2027 end date. The program is strictly for personal devices, excluding systems joined to Active Directory domains, Microsoft Entra, or managed via Mobile Device Management, although Microsoft Entra-registered devices are eligible.\u003c/p\u003e\n"},{"n":24,"title":"Your Employees Logged In Without Issue; Attackers Logged In Too.","source":"constella.ai","sourceColorIdx":4,"link":"https://constella.ai/blog/your-employees-logged-in-without-issue-attackers-logged-in-too/","time":"18:53","priority":"SHOULD READ","score":78,"tldr":"Attackers are increasingly stealing authenticated session cookies to bypass MFA and silently access enterprise platforms like Workday and Snowflake, and organizations must add cookie monitoring to detect these exposures before they lead to breaches.","briefOverview":"\u003cp\u003eIn January 2026, security firm Socket discovered five malicious Chrome extensions on the Chrome Web Store that posed as productivity or security tools for Workday, NetSuite, and SAP SuccessFactors. The extensions silently extracted authentication session cookies from these platforms every 60 seconds and transmitted them to attacker-controlled servers. Two of the extensions went further by blocking access to Workday\u0026rsquo;s security administration pages, specifically targeting session controls and authentication policies to hinder detection. Because a stolen session cookie can be imported into any browser to assume a fully authenticated session, attackers bypass login, MFA, and create no authentication events, leaving no trace of a credential-based attack.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights session cookies as the new master key: over 90 billion browser cookies are circulating in criminal marketplaces, and the infostealer pipeline is the primary delivery mechanism. Infostealers harvest entire browser cookie stores from compromised devices, often personal or unmanaged endpoints where corporate EDR has no visibility, exposing corporate SaaS sessions. The Snowflake campaign of 2024-2025 illustrated the pattern at scale, where infostealer-harvested credentials and session tokens gave attackers access to environments of over 160 organizations, including Ticketmaster, Santander Bank, and AT\u0026amp;T. Credential monitoring misses these tokens because they are not passwords and expire quickly, making cookie-specific detection essential.\u003c/p\u003e\n\n\u003cp\u003eExisting controls such as MFA, credential monitoring, zero trust access, and EDR are designed to protect the authentication event, not the subsequent session token. The article argues that security teams must add session cookie exposure monitoring to detect active tokens in infostealer packages before attackers use them, prioritize platforms with long-lived sessions, and establish session invalidation as the primary response protocol. Password resets do not revoke an already active session; immediate invalidation and forced re-authentication are required to disrupt the attack.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["In January 2026, five malicious Chrome extensions were found stealing session cookies from Workday, NetSuite, and SAP SuccessFactors every 60 seconds and sending them to attacker servers.","A stolen session cookie lets an attacker bypass login and MFA entirely by importing it into a browser, gaining immediate authenticated access without triggering alert events.","Infostealer malware commonly harvests entire browser cookie stores, and infections on personal or unmanaged devices can capture corporate session tokens without IT visibility.","The Snowflake campaign of 2024-2025 used infostealer-harvested credentials and session tokens to compromise over 160 organizations, including Ticketmaster, Santander Bank, and AT\u0026T.","MFA, credential monitoring, zero trust access controls, and EDR all fail to stop session cookie theft because they protect the authentication event rather than the session token that follows."],"insights":["Two of the malicious extensions actively blocked administrators' access to Workday security pages—including session controls and authentication policies—directly suppressing the ability to detect and respond to the ongoing theft.","Over 90 billion browser cookies are currently circulating in cybercriminal marketplaces, and infostealer package processing rose 72% year-over-year to 51.7 million in 2025, revealing a massive, growing supply of hijackable sessions.","A password reset does nothing to stop an attacker using a stolen session cookie because the session remains active; the correct response is immediate session invalidation followed by forced re-authentication.","Infostealer infections on employees' personal devices harvest corporate SaaS session cookies without any corporate endpoint detection, meaning the first sign of compromise may be the attacker's access days later."],"referencedReports":[],"body":"\u003cp\u003eIn January 2026, security firm Socket discovered five malicious Chrome extensions on the Chrome Web Store that posed as productivity or security tools for Workday, NetSuite, and SAP SuccessFactors. The extensions silently extracted authentication session cookies from these platforms every 60 seconds and transmitted them to attacker-controlled servers. Two of the extensions went further by blocking access to Workday\u0026rsquo;s security administration pages, specifically targeting session controls and authentication policies to hinder detection. Because a stolen session cookie can be imported into any browser to assume a fully authenticated session, attackers bypass login, MFA, and create no authentication events, leaving no trace of a credential-based attack.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights session cookies as the new master key: over 90 billion browser cookies are circulating in criminal marketplaces, and the infostealer pipeline is the primary delivery mechanism. Infostealers harvest entire browser cookie stores from compromised devices, often personal or unmanaged endpoints where corporate EDR has no visibility, exposing corporate SaaS sessions. The Snowflake campaign of 2024-2025 illustrated the pattern at scale, where infostealer-harvested credentials and session tokens gave attackers access to environments of over 160 organizations, including Ticketmaster, Santander Bank, and AT\u0026amp;T. Credential monitoring misses these tokens because they are not passwords and expire quickly, making cookie-specific detection essential.\u003c/p\u003e\n\n\u003cp\u003eExisting controls such as MFA, credential monitoring, zero trust access, and EDR are designed to protect the authentication event, not the subsequent session token. The article argues that security teams must add session cookie exposure monitoring to detect active tokens in infostealer packages before attackers use them, prioritize platforms with long-lived sessions, and establish session invalidation as the primary response protocol. Password resets do not revoke an already active session; immediate invalidation and forced re-authentication are required to disrupt the attack.\u003c/p\u003e\n"},{"n":13,"title":"Ukraine's state postal operator reports app disruption after cyberattack","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/ukraine-state-postal-operator-reports-disruption","time":"12:16","priority":"SHOULD READ","score":75,"tldr":"Ukraine's state postal operator Ukrposhta suffered a mobile app outage following a cyberattack claimed by the pro-Russian hacktivist group IT Army of Russia, which alleges it exfiltrated user data, though this remains unverified.","briefOverview":"\u003cp\u003eUkraine\u0026rsquo;s state-owned postal operator, Ukrposhta, reported that its mobile application is experiencing temporary disruptions following an overnight \u0026ldquo;enemy\u0026rdquo; attack on its IT systems. The company said its specialists are working to restore the service and that no other disruptions have been noted. Ukrposhta did not identify the attacker or confirm whether any data was compromised, and it has not provided further details beyond the app outage.\u003c/p\u003e\n\n\u003cp\u003eA pro-Russian hacktivist group calling itself the IT Army of Russia claimed responsibility for the attack, alleging it breached Ukrposhta\u0026rsquo;s infrastructure several weeks earlier, accessed a server, and exfiltrated a database containing user information along with other internal data. Recorded Future News could not independently verify these claims, and Ukrposhta has not commented on them.\u003c/p\u003e\n\n\u003cp\u003eThe IT Army of Russia emerged in March 2025 and has since claimed numerous attacks on Ukrainian organizations, using cybercrime forums and Telegram to publish stolen data and recruit insiders within critical infrastructure. Ukrposhta, one of Ukraine\u0026rsquo;s largest employers with roughly 32,000 workers and over 6,000 post offices, has previously experienced cyber incidents, including a 2024 attack on a partner that disrupted payment processing and parcel deliveries. Ukraine\u0026rsquo;s largest private postal operator, Nova Poshta, has also reported repeated Russia-linked cyberattacks in recent years.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Ukraine’s state postal operator Ukrposhta reported that its mobile app experienced temporary disruption following an overnight cyberattack on its IT systems.","The pro-Russian hacktivist group IT Army of Russia claimed responsibility and alleged it had exfiltrated a database of user information, though this claim has not been independently verified.","Ukrposhta did not disclose the attacker’s identity or confirm whether any data was compromised, and stated no other services were affected beyond the app.","The IT Army of Russia emerged in March 2025 and uses cybercrime forums and Telegram to publish stolen data, recruit insiders, and solicit intelligence on Ukrainian infrastructure.","Ukrposhta had previously experienced a cyber incident in 2024 that disrupted payment processing and parcel deliveries through an attack on a partner’s IT infrastructure."],"insights":["Despite the IT Army of Russia claiming weeks-long network access and data exfiltration, the observable disruption was confined to the mobile app, not the nationwide mail operations, suggesting either rapid containment or exaggeration of the breach.","The group’s explicit tactic of recruiting insiders within critical infrastructure highlights a persistent human-centric threat that could have contributed to the Ukrposhta breach.","Because the threat actor is known to publish stolen data, Ukrposhta customers should be on alert for potential identity theft or spear-phishing if the claimed database is released."],"referencedReports":[],"body":"\u003cp\u003eUkraine\u0026rsquo;s state-owned postal operator, Ukrposhta, reported that its mobile application is experiencing temporary disruptions following an overnight \u0026ldquo;enemy\u0026rdquo; attack on its IT systems. The company said its specialists are working to restore the service and that no other disruptions have been noted. Ukrposhta did not identify the attacker or confirm whether any data was compromised, and it has not provided further details beyond the app outage.\u003c/p\u003e\n\n\u003cp\u003eA pro-Russian hacktivist group calling itself the IT Army of Russia claimed responsibility for the attack, alleging it breached Ukrposhta\u0026rsquo;s infrastructure several weeks earlier, accessed a server, and exfiltrated a database containing user information along with other internal data. Recorded Future News could not independently verify these claims, and Ukrposhta has not commented on them.\u003c/p\u003e\n\n\u003cp\u003eThe IT Army of Russia emerged in March 2025 and has since claimed numerous attacks on Ukrainian organizations, using cybercrime forums and Telegram to publish stolen data and recruit insiders within critical infrastructure. Ukrposhta, one of Ukraine\u0026rsquo;s largest employers with roughly 32,000 workers and over 6,000 post offices, has previously experienced cyber incidents, including a 2024 attack on a partner that disrupted payment processing and parcel deliveries. Ukraine\u0026rsquo;s largest private postal operator, Nova Poshta, has also reported repeated Russia-linked cyberattacks in recent years.\u003c/p\u003e\n"},{"n":3,"title":"PirloTV sports piracy network disrupted as 44 domains seized","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/pirlotv-sports-piracy-network-disrupted-as-44-domains-seized/","time":"15:36","priority":"MAY READ","score":68,"tldr":"Authorities seized 44 domains linked to the PirloTV sports piracy network, which generated over 950 million annual visits, in a joint operation by ACE, UEFA, UC3, and Mexican agencies ahead of major soccer events.","briefOverview":"\u003cp\u003eA coalition of anti-piracy groups and authorities took down 44 domains tied to the PirloTV network, a major sports streaming piracy operation. The action was led by the Alliance for Creativity and Entertainment (ACE), together with UEFA, UC3, and Mexican law enforcement. PirloTV does not host streams directly but aggregates and embeds links to unauthorized live sports broadcasts, primarily soccer matches from various licensed broadcasters.\u003c/p\u003e\n\n\u003cp\u003eCollectively, the seized domains attracted over 950 million visits each year, with around 230 million coming from Mexico alone. The network primarily served viewers across Latin America, while also drawing significant traffic from Spain and the United States. The domain seizures were timed ahead of the UEFA Champions League final and during the ongoing FIFA World Cup, aiming to disrupt illicit viewing at peak demand. Despite the operation, PirloTV is known for quickly migrating to new domains, and at the time of writing some domains remained indexed and still offered live streams.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A coalition including ACE, UEFA, UC3, and Mexican authorities seized 44 domains linked to the PirloTV sports piracy network.","The targeted domains collectively generated more than 950 million visits per year, with approximately 230 million of those coming from Mexico.","The domain seizures occurred ahead of the UEFA Champions League final on May 30 and during the ongoing FIFA World Cup, potentially affecting illegal streaming access across Latin America.","Despite the takedown, PirloTV is known for quickly migrating to new domains, and some domains still indexed at the time of writing continued to offer live sports streams from broadcasters like ESPN and Fox Sports.","The action marks the first collaboration between ACE and Mexico's Institute of Industrial Property under a newly signed anti-piracy Memorandum of Understanding."],"insights":["PirloTV does not host or stream content directly but operates as an aggregator of embedded links to unauthorized streams, which may make it harder to permanently dismantle since the actual video sources remain distributed across other infrastructure.","Despite the coordinated seizure of 44 domains, the article notes that other PirloTV-linked domains remained indexed and operational at the time of writing, underscoring the limited impact of domain-level takedowns against a platform built for rapid migration.","The article highlights that PirloTV gained particular traction among mobile users in Latin America because legal access to World Cup matches is fragmented by broadcasting rights and platform restrictions, suggesting piracy demand is partly fueled by gaps in legitimate service availability.","UEFA became the first sports rights holder to join ACE in October 2025, marking a strategic expansion of the anti-piracy coalition beyond film and television into live sports enforcement."],"referencedReports":[],"body":"\u003cp\u003eA coalition of anti-piracy groups and authorities took down 44 domains tied to the PirloTV network, a major sports streaming piracy operation. The action was led by the Alliance for Creativity and Entertainment (ACE), together with UEFA, UC3, and Mexican law enforcement. PirloTV does not host streams directly but aggregates and embeds links to unauthorized live sports broadcasts, primarily soccer matches from various licensed broadcasters.\u003c/p\u003e\n\n\u003cp\u003eCollectively, the seized domains attracted over 950 million visits each year, with around 230 million coming from Mexico alone. The network primarily served viewers across Latin America, while also drawing significant traffic from Spain and the United States. The domain seizures were timed ahead of the UEFA Champions League final and during the ongoing FIFA World Cup, aiming to disrupt illicit viewing at peak demand. Despite the operation, PirloTV is known for quickly migrating to new domains, and at the time of writing some domains remained indexed and still offered live streams.\u003c/p\u003e\n"},{"n":11,"title":"Another Russian dairy company reportedly disrupted by cyberattack","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/russia-dairy-producter-cyberattack-ufa","time":"14:45","priority":"MAY READ","score":68,"tldr":"A cyberattack on Russian dairy producer Ufagormolzavod disrupted logistics and accounting, forcing manual operations, and adds to a growing series of cyber incidents targeting the country's dairy sector.","briefOverview":"\u003cp\u003eA cyberattack disrupted logistics and accounting at Ufagormolzavod, a dairy producer in Russia\u0026rsquo;s Bashkortostan region. Employees were forced to process shipments and paperwork manually, though production itself was not stopped. The company\u0026rsquo;s chief executive stated the workforce was mobilized to keep operations running but did not disclose who was responsible, whether data was compromised, or when systems would be restored.\u003c/p\u003e\n\n\u003cp\u003eEarlier that week, the website of state-run dairy provider Molochnaya Kukhnya was compromised. Attackers posted fabricated claims of widespread power outages and bacterial contamination of products. It is not known whether the two incidents in Bashkortostan are connected.\u003c/p\u003e\n\n\u003cp\u003eThe attack adds to a string of cyber disruptions targeting Russia\u0026rsquo;s dairy sector. A June attack on the electronic veterinary certification system forced a return to paper documentation and caused logistical bottlenecks at major retailers. Ransomware also hit the Semyonishna dairy plant in southern Siberia and Kabosh, a large cheese producer, leaving facilities unable to operate for weeks.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A cyberattack on dairy producer Ufagormolzavod in Russia's Bashkortostan region disrupted logistics and accounting, forcing manual processing of shipments, though production continued.","The company did not disclose the attackers, whether data was compromised, or when IT systems would be restored.","Earlier the same week, the website of state-owned dairy provider Molochnaya Kukhnya was compromised and false claims of power outages and bacterial contamination were posted.","The incident adds to a series of cyberattacks on Russia's dairy sector, including a past disruption of the veterinary certification system and ransomware attacks on Semyonishna and Kabosh."],"insights":["Despite the cyberattack, Ufagormolzavod's production systems were not affected, while logistics and accounting were specifically crippled, indicating a focused disruption of business operations rather than a complete shutdown.","The Molochnaya Kukhnya website compromise included fabricated claims of bacterial contamination, showing attackers deployed disinformation tactics alongside technical disruption to damage public trust in food safety.","The earlier shutdown of the electronic veterinary certification system forced a sector-wide return to paper documentation, demonstrating how an attack on a single digital platform can cascade into supply chain interruptions across multiple retailers."],"referencedReports":[],"body":"\u003cp\u003eA cyberattack disrupted logistics and accounting at Ufagormolzavod, a dairy producer in Russia\u0026rsquo;s Bashkortostan region. Employees were forced to process shipments and paperwork manually, though production itself was not stopped. The company\u0026rsquo;s chief executive stated the workforce was mobilized to keep operations running but did not disclose who was responsible, whether data was compromised, or when systems would be restored.\u003c/p\u003e\n\n\u003cp\u003eEarlier that week, the website of state-run dairy provider Molochnaya Kukhnya was compromised. Attackers posted fabricated claims of widespread power outages and bacterial contamination of products. It is not known whether the two incidents in Bashkortostan are connected.\u003c/p\u003e\n\n\u003cp\u003eThe attack adds to a string of cyber disruptions targeting Russia\u0026rsquo;s dairy sector. A June attack on the electronic veterinary certification system forced a return to paper documentation and caused logistical bottlenecks at major retailers. Ransomware also hit the Semyonishna dairy plant in southern Siberia and Kabosh, a large cheese producer, leaving facilities unable to operate for weeks.\u003c/p\u003e\n"},{"n":20,"title":"A Compromised Vendor Account Sent an ACH Redirect With a Fabricated Closure Deadline and Mismatched Phone Numbers","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/vendor-ach-redirect-compromised-account-fabricated-urgency-mismatched-signatures","time":"11:00","priority":"MAY READ","score":68,"tldr":"An attacker used a compromised 26-year-old vendor account to send an ACH banking-change request with a fabricated same-day deadline; the tell was two signature blocks with phone numbers differing by one digit.","briefOverview":"\u003cp\u003eA compromised vendor email account, active on a domain registered in February 2000, sent an ACH banking-change request to a construction firm\u0026rsquo;s accounts payable contact. The message fabricated a same-day account closure deadline (March 31, 2026) to create urgency, but provided no invoice, purchase order, or prior billing context. The email passed SPF and DMARC authentication, though it lacked DKIM because the message was relayed through a legitimate third-party email signature service, CodeTwo, which explained the non-matching relay IP.\u003c/p\u003e\n\n\u003cp\u003eThe attacker\u0026rsquo;s most concrete forensic artifact was a duplicate signature block: the email contained two versions of the vendor contact\u0026rsquo;s signature with phone numbers differing by one digit, indicating the attacker had inserted a fabricated number that was later overwritten by the signature service\u0026rsquo;s template. This mismatch provides a clear indicator of tampering, even when all authentication checks pass.\u003c/p\u003e\n\n\u003cp\u003eIRONSCALES Adaptive AI flagged the message at 68% confidence based on behavioral signals—first contact to AP, sensitive process request, fabricated time pressure, and missing contextual documentation—rather than any malicious link. The article emphasizes that vendor ACH redirect fraud exploits administrative processes, making out-of-band callback verification using a known contract number the primary defense, and it notes that compromised sender accounts like this are consistent with high-value business email compromise attacks tracked in the Verizon DBIR and MITRE ATT\u0026amp;CK.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["An attacker used a compromised vendor email account from a 26-year-old domain to request an ACH banking change from a construction firm's accounts payable contact.","The email fabricated a same-day account closure deadline (March 31, 2026) to create urgency, with no invoice or prior billing context.","The message contained two signature blocks for the same person with phone numbers differing by one digit, indicating at least one was fabricated.","IRONSCALES Adaptive AI detected the message at 68% confidence based on behavioral signals without any malicious link.","The primary defense recommended is an out-of-band callback to the vendor using a known number sourced outside the email."],"insights":["The 26-year-old domain's age caused reputation scoring systems and threat-intelligence databases to treat the sender as trusted, demonstrating how attackers exploit compromised legacy accounts to bypass gateway scrutiny.","The third-party email signature service (CodeTwo) relayed the message, which explained the absence of DKIM and the non-matching relay IP; these are legitimate artifacts that can mask compromised account activity.","The duplicate signature block with phone numbers differing by one digit became a unique forensic indicator because the attacker's fabricated number was appended alongside the legitimate template-based signature.","An out-of-band callback to a known vendor number, sourced from a contract or public listing rather than the email, makes display-name-level and compromised-account impersonation ineffective for ACH fraud, providing a simple but powerful defense."],"referencedReports":[{"title":"Verizon DBIR 2026","url":"https://www.verizon.com/business/resources/T742/reports/2026-dbir-data-breach-investigations-report.pdf","publisher":"Verizon","context":"Cited to support that vendor email compromise is a highest-value social engineering attack class by per-incident financial impact.","category":"research","primary":false},{"title":"CISA Guidance on Recognizing and Reporting Phishing","url":"https://www.cisa.gov/secure-our-world/recognize-and-report-phishing","publisher":"CISA","context":"Referenced for its recommendation of independent verification of all payment-change requests.","category":"advisory","primary":false},{"title":"Microsoft Digital Defense Report 2024","url":"https://www.microsoft.com/en-us/security/security-insider/threat-landscape/microsoft-digital-defense-report-2024","publisher":"Microsoft","context":"Cited for noting that financially motivated BEC continues to outpace malware-delivery attacks in total reported losses.","category":"research","primary":false}],"body":"\u003cp\u003eA compromised vendor email account, active on a domain registered in February 2000, sent an ACH banking-change request to a construction firm\u0026rsquo;s accounts payable contact. The message fabricated a same-day account closure deadline (March 31, 2026) to create urgency, but provided no invoice, purchase order, or prior billing context. The email passed SPF and DMARC authentication, though it lacked DKIM because the message was relayed through a legitimate third-party email signature service, CodeTwo, which explained the non-matching relay IP.\u003c/p\u003e\n\n\u003cp\u003eThe attacker\u0026rsquo;s most concrete forensic artifact was a duplicate signature block: the email contained two versions of the vendor contact\u0026rsquo;s signature with phone numbers differing by one digit, indicating the attacker had inserted a fabricated number that was later overwritten by the signature service\u0026rsquo;s template. This mismatch provides a clear indicator of tampering, even when all authentication checks pass.\u003c/p\u003e\n\n\u003cp\u003eIRONSCALES Adaptive AI flagged the message at 68% confidence based on behavioral signals—first contact to AP, sensitive process request, fabricated time pressure, and missing contextual documentation—rather than any malicious link. The article emphasizes that vendor ACH redirect fraud exploits administrative processes, making out-of-band callback verification using a known contract number the primary defense, and it notes that compromised sender accounts like this are consistent with high-value business email compromise attacks tracked in the Verizon DBIR and MITRE ATT\u0026amp;CK.\u003c/p\u003e\n"},{"n":12,"title":"DHS chief says president has met with potential CISA nominee; agency plans to hire 600","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/cisa-director-nominee-workforce-hires-mullin-house-hearing","time":"18:47","priority":"MAY READ","score":65,"tldr":"DHS Secretary Markwayne Mullin said the president has met with a potential CISA director and the agency plans to hire 600 people to rebuild after workforce cuts, while also expressing concern about cybersecurity threats from China.","briefOverview":"\u003cp\u003eHomeland Security Secretary Markwayne Mullin testified before a House Appropriations subcommittee that the president has met with a potential nominee to lead CISA, signaling a likely pick despite earlier White House remarks that Shyam Sankar was not a top contender. Mullin said confirmation of a director is essential to begin rebuilding the agency, which has been without a Senate-confirmed leader since January 2025, and he did not publicly name the candidate at the hearing.\u003c/p\u003e\n\n\u003cp\u003eMullin stated that CISA needs about 600 new hires after workforce reductions, but he emphasized hiring talented individuals with state and local partnerships over simply filling positions. He estimated the rebuild would take roughly a year, with the possibility of significant progress in the first three months, while Acting Director Nick Andersen has noted that hiring is already underway with around 300 new staff expected soon.\u003c/p\u003e\n\n\u003cp\u003eThe secretary voiced deep concern about China\u0026rsquo;s persistent attempts to penetrate U.S. systems, asserting that CISA will be critical in defense because private companies cannot bear the burden alone. He urged Congress to clarify the boundaries of CISA\u0026rsquo;s authority and also highlighted the department\u0026rsquo;s priority investment in cutting-edge, AI-enabled counter-drone technology to address surveillance and security gaps.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Homeland Security Secretary Markwayne Mullin testified that the president has met with a potential CISA director, with Palantir CTO Shyam Sankar considered the likely nominee.","Mullin said CISA needs about 600 new hires after workforce cuts and that rebuilding the agency will probably take a year once a director is confirmed.","Mullin highlighted daily efforts by China to breach U.S. systems and said CISA will be crucial in defending them, noting that private companies cannot do it alone.","Mullin requested new clarity from Congress on the limits of CISA’s authority in cybersecurity."],"insights":["Despite the White House previously saying Shyam Sankar is not a top contender “at this time,” Secretary Mullin's testimony strongly implies he is the planned nominee, revealing conflicting signals within the administration.","Mullin’s refusal to simply fill vacancies with “bodies” signals a deliberate talent-first rebuild, which may exclude many former CISA employees even as the agency needs hundreds of new staff.","The Secretary's explicit request for “new clarity from Congress on how far CISA can go” indicates that the agency’s current legal boundaries are unclear, potentially limiting its ability to act proactively."],"referencedReports":[],"body":"\u003cp\u003eHomeland Security Secretary Markwayne Mullin testified before a House Appropriations subcommittee that the president has met with a potential nominee to lead CISA, signaling a likely pick despite earlier White House remarks that Shyam Sankar was not a top contender. Mullin said confirmation of a director is essential to begin rebuilding the agency, which has been without a Senate-confirmed leader since January 2025, and he did not publicly name the candidate at the hearing.\u003c/p\u003e\n\n\u003cp\u003eMullin stated that CISA needs about 600 new hires after workforce reductions, but he emphasized hiring talented individuals with state and local partnerships over simply filling positions. He estimated the rebuild would take roughly a year, with the possibility of significant progress in the first three months, while Acting Director Nick Andersen has noted that hiring is already underway with around 300 new staff expected soon.\u003c/p\u003e\n\n\u003cp\u003eThe secretary voiced deep concern about China\u0026rsquo;s persistent attempts to penetrate U.S. systems, asserting that CISA will be critical in defense because private companies cannot bear the burden alone. He urged Congress to clarify the boundaries of CISA\u0026rsquo;s authority and also highlighted the department\u0026rsquo;s priority investment in cutting-edge, AI-enabled counter-drone technology to address surveillance and security gaps.\u003c/p\u003e\n"},{"n":26,"title":"Introduction to COM usage by Windows threats","source":"blog.talosintelligence.com","sourceColorIdx":6,"link":"https://blog.talosintelligence.com/introduction-to-com-usage-by-windows-threats/","time":"10:00","priority":"MAY READ","score":60,"tldr":"Malware often leverages Windows COM interfaces for persistence, lateral movement, and evasion, requiring analysts to map CLSIDs, IIDs, and vtable calls to understand hidden functionality.","briefOverview":"\u003cp\u003eThe Component Object Model (COM) is a core Windows technology that allows software components written in different languages to communicate through binary interfaces. Threat actors regularly abuse COM and its distributed variant DCOM to leverage built-in Windows services for lateral movement, persistence, execution, and data exfiltration while avoiding security monitoring. Malware uses COM classes identified by CLSIDs and interfaces identified by IIDs, with calls routed through virtual function tables (vtables), making static analysis more difficult because malicious functionality hides behind indirect calls. DCOM extends this model across the network, enabling remote object activation via RPC, which is recognized as MITRE ATT\u0026amp;CK technique T1021.003.\u003c/p\u003e\n\n\u003cp\u003eAnalysts can recover meaningful behavior by identifying COM activation APIs such as CoCreateInstance and CoCreateInstanceEx, extracting the CLSID and IID values, and then mapping vtable offsets to method names using tools like OleView.NET, ComView, and IDA Pro’s COM Helper. The article walks through a sample that creates a scheduled task via COM to demonstrate how indirect calls resolve to methods like ITaskService.Connect and ITaskService.RegisterTaskDefinition once the correct interface type is applied. A Qakbot DLL analysis shows the same workflow for WMI, where ConnectServer is identified after applying the IWbemLocatorVtbl type. Plugins like COMIDA, COM Code Helper, and Binary Ninja’s COM companion further accelerate this process.\u003c/p\u003e\n\n\u003cp\u003eSeveral malware families illustrate real-world abuse: Gh0stRAT creates scheduled tasks through COM instead of spawning schtasks.exe, thus evading process creation telemetry; Attor uses Background Intelligent Transfer Service (BITS) COM interfaces and WMI for C2 and reconnaissance; and WarmCookie employs the older Task Scheduler 1.0 COM class for persistence. Hunting for such activity relies on searching binaries for ProgID strings or little-endian byte patterns of CLSIDs and IIDs, followed by YARA rules that incorporate prevalence and context to reduce false positives. Analysts do not need to master COM entirely but must be able to recognize and recover the interfaces being used to understand the malware’s behavior.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Windows COM technology enables communication between programs in different languages and is abused by threat actors for lateral movement, execution, persistence, and evasion.","Malware families such as Gh0stRAT, WarmCookie, Attor, and Qakbot leverage COM interfaces to interact with Task Scheduler, BITS, and WMI, avoiding detection by using indirect vtable calls instead of spawning command-line tools.","Reverse engineers can recover meaningful class, interface, and method names from opaque GUIDs and indirect calls by using tools like OleView.NET, ComView, and IDA Pro's COM Helper.","Analysts can hunt for COM usage by searching for ProgID strings or little-endian byte patterns of CLSIDs and IIDs in binaries, then filter results with context to distinguish malware from legitimate software.","DCOM extends COM across the network, allowing remote object activation over RPC for lateral movement, recognized as MITRE ATT\u0026CK technique T1021.003."],"insights":["Malware that uses COM to interact with system services like Task Scheduler avoids spawning new processes, so the malicious activity may not appear in process-creation telemetry and can evade EDR detection.","When writing YARA rules to hunt for COM usage in binaries, analysts must search for the little-endian byte representation of GUIDs, not the familiar string-form, because the first three fields are stored in little-endian order in executables.","Some malware families dynamically construct GUID structures on the stack before calling CoCreateInstance, intentionally obfuscating COM class and interface identification during static analysis."],"referencedReports":[{"title":"ESET discovers Attor spy platform","url":"https://www.welivesecurity.com/2019/10/10/eset-discovers-attor-spy-platform/","publisher":"ESET","context":"The article references ESET's 2019 public documentation as the first exposure of the Attor spy platform, which is used as a case study for COM abuse.","category":"research","primary":true},{"title":"Hunting COM Objects","url":"https://cloud.google.com/blog/topics/threat-intelligence/hunting-com-objects/","publisher":"Mandiant/Google Cloud","context":"Listed in the further reading section as a resource for hunting COM objects.","category":"research","primary":false},{"title":"Hunting COM Objects, Part Two","url":"https://cloud.google.com/blog/topics/threat-intelligence/hunting-com-objects-part-two","publisher":"Mandiant/Google Cloud","context":"Listed in the further reading section alongside part one as a resource for hunting COM objects.","category":"research","primary":false}],"body":"\u003cp\u003eThe Component Object Model (COM) is a core Windows technology that allows software components written in different languages to communicate through binary interfaces. Threat actors regularly abuse COM and its distributed variant DCOM to leverage built-in Windows services for lateral movement, persistence, execution, and data exfiltration while avoiding security monitoring. Malware uses COM classes identified by CLSIDs and interfaces identified by IIDs, with calls routed through virtual function tables (vtables), making static analysis more difficult because malicious functionality hides behind indirect calls. DCOM extends this model across the network, enabling remote object activation via RPC, which is recognized as MITRE ATT\u0026amp;CK technique T1021.003.\u003c/p\u003e\n\n\u003cp\u003eAnalysts can recover meaningful behavior by identifying COM activation APIs such as CoCreateInstance and CoCreateInstanceEx, extracting the CLSID and IID values, and then mapping vtable offsets to method names using tools like OleView.NET, ComView, and IDA Pro’s COM Helper. The article walks through a sample that creates a scheduled task via COM to demonstrate how indirect calls resolve to methods like ITaskService.Connect and ITaskService.RegisterTaskDefinition once the correct interface type is applied. A Qakbot DLL analysis shows the same workflow for WMI, where ConnectServer is identified after applying the IWbemLocatorVtbl type. Plugins like COMIDA, COM Code Helper, and Binary Ninja’s COM companion further accelerate this process.\u003c/p\u003e\n\n\u003cp\u003eSeveral malware families illustrate real-world abuse: Gh0stRAT creates scheduled tasks through COM instead of spawning schtasks.exe, thus evading process creation telemetry; Attor uses Background Intelligent Transfer Service (BITS) COM interfaces and WMI for C2 and reconnaissance; and WarmCookie employs the older Task Scheduler 1.0 COM class for persistence. Hunting for such activity relies on searching binaries for ProgID strings or little-endian byte patterns of CLSIDs and IIDs, followed by YARA rules that incorporate prevalence and context to reduce false positives. Analysts do not need to master COM entirely but must be able to recognize and recover the interfaces being used to understand the malware’s behavior.\u003c/p\u003e\n"},{"n":6,"title":"Webinar: Why account takeovers remain one of the hardest threats to stop","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/webinar-why-account-takeovers-remain-one-of-the-hardest-threats-to-stop/","time":"12:12","priority":"MAY READ","score":55,"tldr":"Account takeover attacks remain hard to detect because they blend in with normal business activity using legitimate credentials, but behavioral AI can automate detection and response to help security teams limit the damage faster.","briefOverview":"\u003cp\u003eBleepingComputer is hosting a live webinar on July 8, 2026, titled “Stop chasing alerts: Automating email security with behavioral AI,” featuring Dan Nickolaisen from Abnormal AI and Eric Danneker from Novant Health. The session will focus on why account takeover attacks persist as a top security challenge despite investments in phishing defenses, identity protection, and multi-factor authentication.\u003c/p\u003e\n\n\u003cp\u003eAccount takeover attacks are exceptionally difficult to detect because they often rely on legitimate credentials, trusted devices, and normal business communications. Attackers can blend into everyday operations by using compromised business accounts and legitimate cloud services, leaving security teams to investigate suspicious activity only after the attackers have already established a foothold.\u003c/p\u003e\n\n\u003cp\u003eThe webinar will demonstrate how behavioral AI can help automate detection, investigation, and remediation workflows, enabling faster identification of compromised accounts. Attendees will learn practical approaches for spotting account compromise earlier, reducing manual investigation effort, and shrinking the window of opportunity for attackers to expand their access.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Account takeover attacks often rely on legitimate credentials, trusted devices, and normal business communications, making them difficult to distinguish from normal user activity.","Because attackers can blend into normal business operations, traditional security controls often struggle to detect account compromise quickly.","Behavioral AI can automate the detection of unusual behavior patterns, investigation, and remediation workflows, helping security teams respond faster.","The webinar will examine how phishing, business email compromise, and account takeover attacks lead to compromised business accounts and present practical techniques for reducing response times."],"insights":["Attackers' increasing reliance on legitimate identities and trusted cloud services represents a shift from technical exploits to credential-based blending, undermining perimeter and signature-based defenses.","The time security teams spend manually investigating suspicious messages and user reports becomes a window of opportunity that attackers actively exploit to expand their access.","Automating the investigation workflow itself is presented as a distinct risk-reduction measure, separate from detection, targeting the human bottleneck in response processes."],"referencedReports":[],"body":"\u003cp\u003eBleepingComputer is hosting a live webinar on July 8, 2026, titled “Stop chasing alerts: Automating email security with behavioral AI,” featuring Dan Nickolaisen from Abnormal AI and Eric Danneker from Novant Health. The session will focus on why account takeover attacks persist as a top security challenge despite investments in phishing defenses, identity protection, and multi-factor authentication.\u003c/p\u003e\n\n\u003cp\u003eAccount takeover attacks are exceptionally difficult to detect because they often rely on legitimate credentials, trusted devices, and normal business communications. Attackers can blend into everyday operations by using compromised business accounts and legitimate cloud services, leaving security teams to investigate suspicious activity only after the attackers have already established a foothold.\u003c/p\u003e\n\n\u003cp\u003eThe webinar will demonstrate how behavioral AI can help automate detection, investigation, and remediation workflows, enabling faster identification of compromised accounts. Attendees will learn practical approaches for spotting account compromise earlier, reducing manual investigation effort, and shrinking the window of opportunity for attackers to expand their access.\u003c/p\u003e\n"},{"n":21,"title":"AI Turned The Patch Window Into The Threat Window","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/ai-turned-the-patch-window-into-the-threat-window","time":"05:02","priority":"MAY READ","score":55,"tldr":"AI-driven vulnerability discovery is outpacing remediation, so organizations must shift from trying to patch everything to enforcing data-centric security and zero-trust access controls that limit exposure while patches are developed.","briefOverview":"\u003cp\u003eThe article opens with the author recalling a customer meeting where Anthropic’s Project Glasswing had just surfaced 10,000 high- or critical-severity vulnerabilities across critical enterprise software in a single month. Instead of sharing the author’s excitement, the customer appeared exhausted, recognizing that this torrent of findings would create an unmanageable queue. With a median remediation time of two weeks for high-severity issues, and open-source maintainers already asking Anthropic to slow disclosures, the volume far exceeds most organizations’ capacity to patch.\u003c/p\u003e\n\n\u003cp\u003eAttackers also possess advanced AI models, so the same speed that uncovers flaws can also craft exploits in minutes, turning the traditional patch window into a race defenders cannot win by patching alone. Concrete examples underscore the danger: CVE-2025-32711, a zero-click prompt injection in Microsoft 365 Copilot, silently exfiltrated data from OneDrive, SharePoint, and Teams through a trusted Microsoft domain without triggering antivirus or firewall alerts. Meanwhile, a Netskope report states that 98% of organizations have unmanaged AI use, only 12% detect all shadow AI activity, and 91% cannot reliably stop a risky AI-driven action before it executes.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that instead of chasing every vulnerability, organizations should refocus on controlling what can be reached while awaiting patches. Existing zero-trust architectures and secure access technologies remain essential, but they must be extended to cover AI applications and the data layer, where over-provisioned permissions and AI agents create blast radii that perimeter controls never inspect. Ultimately, the prescription is to secure data itself, enforce least-privilege access for both people and agents, and accept that the race to patch everything is already lost.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Anthropic's Project Glasswing surfaced 10,000 high- or critical-severity vulnerabilities across critical enterprise software in a single month, highlighting that vulnerability discovery is far outpacing remediation.","The median time to remediate a high-severity vulnerability is two weeks, making it impossible to patch everything as AI-driven disclosures accelerate.","Attackers also have access to advanced AI models, shrinking the patch window and turning it into a race that defenders cannot win by patching alone.","CVE-2025-32711, a zero-click prompt injection in Microsoft 365 Copilot, demonstrates how AI-enabled attacks can exfiltrate data silently, bypassing traditional perimeter and signature-based defenses.","98% of organizations report unmanaged AI use, and only 12% can detect all shadow AI activity, according to a Netskope report."],"insights":["Open-source maintainers have already asked Anthropic to slow vulnerability disclosures because they cannot absorb the volume, showing that even highly motivated defenders are overwhelmed by AI-driven discovery.","98% of organizations report unmanaged AI use, yet only 12% can detect all shadow AI activity, making it likely that AI-driven data exfiltration through trusted channels goes unnoticed.","AI agents operate beyond initial access checks, chaining across services inside the session at the data layer, which perimeter controls cannot inspect, as demonstrated by the zero-click CVE-2025-32711 that exfiltrated data via a trusted Microsoft domain.","Defenders should abandon the race to patch everything and instead enforce strict data reachability and least-privilege access to limit what attackers can touch while awaiting patches."],"referencedReports":[{"title":"Project Glasswing field report","url":"https://www.anthropic.com/news/project-glasswing","publisher":"Anthropic","context":"The article references Anthropic's Project Glasswing report, which surfaced 10,000 high- or critical-severity vulnerabilities in a single month, as the catalyst for discussing the overwhelmed patching process.","category":"research","primary":true},{"title":"AI Risk and Readiness Report","url":"https://www.netskope.com/resources/reports-guides/ai-risk-and-readiness-report","publisher":"Netskope","context":"The article cites statistics from Netskope's report, including 98% of organizations reporting unmanaged AI use and only 12% detecting all shadow AI activity.","category":"research","primary":false}],"body":"\u003cp\u003eThe article opens with the author recalling a customer meeting where Anthropic’s Project Glasswing had just surfaced 10,000 high- or critical-severity vulnerabilities across critical enterprise software in a single month. Instead of sharing the author’s excitement, the customer appeared exhausted, recognizing that this torrent of findings would create an unmanageable queue. With a median remediation time of two weeks for high-severity issues, and open-source maintainers already asking Anthropic to slow disclosures, the volume far exceeds most organizations’ capacity to patch.\u003c/p\u003e\n\n\u003cp\u003eAttackers also possess advanced AI models, so the same speed that uncovers flaws can also craft exploits in minutes, turning the traditional patch window into a race defenders cannot win by patching alone. Concrete examples underscore the danger: CVE-2025-32711, a zero-click prompt injection in Microsoft 365 Copilot, silently exfiltrated data from OneDrive, SharePoint, and Teams through a trusted Microsoft domain without triggering antivirus or firewall alerts. Meanwhile, a Netskope report states that 98% of organizations have unmanaged AI use, only 12% detect all shadow AI activity, and 91% cannot reliably stop a risky AI-driven action before it executes.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that instead of chasing every vulnerability, organizations should refocus on controlling what can be reached while awaiting patches. Existing zero-trust architectures and secure access technologies remain essential, but they must be extended to cover AI applications and the data layer, where over-provisioned permissions and AI agents create blast radii that perimeter controls never inspect. Ultimately, the prescription is to secure data itself, enforce least-privilege access for both people and agents, and accept that the race to patch everything is already lost.\u003c/p\u003e\n"},{"n":30,"title":"Maven Support Comes to GitHub Checks and OSS Package Search","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/maven-support-comes-to-github-checks-and-oss-package-search","time":"15:21","priority":"MAY READ","score":50,"tldr":"StepSecurity now extends its real-time compromised-package blocking and cooldown controls to Maven, enabling Java teams to catch malicious dependencies at pull request time before they reach builds, just as already done for npm and PyPI.","briefOverview":"\u003cp\u003eSupply chain attacks previously concentrated in npm and PyPI have now reached the Java ecosystem, with two recent incidents demonstrating the risk. The Shai-Hulud worm resurfaced on Maven Central after an automated process re-published compromised npm packages as Maven artifacts, and a malicious lookalike of the popular Jackson JSON library was uploaded to Maven Central, using namespace impersonation and a multi-stage payload to deliver Cobalt Strike to build environments. In response, StepSecurity has added first-class Maven support to its GitHub Checks and OSS Package Search products, extending the same real-time defense capabilities already available for npm and PyPI.\u003c/p\u003e\n\n\u003cp\u003eTwo new pull request content security controls now protect Maven dependencies. Maven Package Compromised Updates blocks any pull request that introduces a dependency flagged in StepSecurity\u0026rsquo;s real-time compromised-packages database, often before an official CVE is published. Maven Package Cooldown blocks newly published package versions until they pass a configurable cooldown window, giving threat intelligence time to detect and respond to freshly released malicious packages. Both controls can be set to Required or Optional, and the Approve All override applies when a critical patch must ship during the cooldown.\u003c/p\u003e\n\n\u003cp\u003eBy closing the gap between publication and detection for Java dependencies, StepSecurity addresses a blind spot that traditional vulnerability scanners, which wait for CVEs, cannot cover. Java\u0026rsquo;s deep transitive dependency trees amplify the attack surface, making early blocking at the pull request level especially impactful. OSS Package Search now indexes Maven, enabling teams to locate compromised packages across pull requests, default branches, and developer machines. Upcoming expansions to Secure Registry and Dev Machine Guard will further extend the defense to install time and developer fleet auditing, mirroring the existing npm and PyPI protections.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The Shai-Hulud worm resurfaced on Maven Central after compromised npm packages were automatically republished as Maven artifacts.","A malicious lookalike of the Jackson JSON library was published to Maven Central, using namespace impersonation and a multi-stage payload to deliver Cobalt Strike.","StepSecurity's GitHub Checks now include Maven Package Compromised Updates, blocking pull requests that introduce dependencies flagged in its real-time compromised-packages database.","The Maven Package Cooldown control blocks pull requests that add recent Maven package versions until they pass a configurable cooldown period, preventing rapid exploitation of newly published malicious releases.","StepSecurity's OSS Package Search now supports Maven, enabling organizations to locate a compromised Maven package across all pull requests, default branches, and developer machines."],"insights":["Many Java development teams incorrectly assumed that supply chain attacks were confined to the JavaScript and Python ecosystems, leaving them unprepared for similar threats targeting Maven.","Automated mirroring of npm packages into Maven Central can inadvertently propagate compromised packages across ecosystems before either community detects them.","Attackers in Maven Central are now employing namespace impersonation of widely trusted libraries like Jackson to deliver post-exploitation frameworks such as Cobalt Strike, signaling a direct threat to Java build environments.","Traditional vulnerability scanners that rely on CVE publication are effectively blind to newly published malicious packages because a CVE may not be assigned until long after an attack begins.","A short cooldown of just one to two days on newly published package versions can block the vast majority of malicious releases, making it a practical and high-impact defense."],"referencedReports":[],"body":"\u003cp\u003eSupply chain attacks previously concentrated in npm and PyPI have now reached the Java ecosystem, with two recent incidents demonstrating the risk. The Shai-Hulud worm resurfaced on Maven Central after an automated process re-published compromised npm packages as Maven artifacts, and a malicious lookalike of the popular Jackson JSON library was uploaded to Maven Central, using namespace impersonation and a multi-stage payload to deliver Cobalt Strike to build environments. In response, StepSecurity has added first-class Maven support to its GitHub Checks and OSS Package Search products, extending the same real-time defense capabilities already available for npm and PyPI.\u003c/p\u003e\n\n\u003cp\u003eTwo new pull request content security controls now protect Maven dependencies. Maven Package Compromised Updates blocks any pull request that introduces a dependency flagged in StepSecurity\u0026rsquo;s real-time compromised-packages database, often before an official CVE is published. Maven Package Cooldown blocks newly published package versions until they pass a configurable cooldown window, giving threat intelligence time to detect and respond to freshly released malicious packages. Both controls can be set to Required or Optional, and the Approve All override applies when a critical patch must ship during the cooldown.\u003c/p\u003e\n\n\u003cp\u003eBy closing the gap between publication and detection for Java dependencies, StepSecurity addresses a blind spot that traditional vulnerability scanners, which wait for CVEs, cannot cover. Java\u0026rsquo;s deep transitive dependency trees amplify the attack surface, making early blocking at the pull request level especially impactful. OSS Package Search now indexes Maven, enabling teams to locate compromised packages across pull requests, default branches, and developer machines. Upcoming expansions to Secure Registry and Dev Machine Guard will further extend the defense to install time and developer fleet auditing, mirroring the existing npm and PyPI protections.\u003c/p\u003e\n"},{"n":31,"title":"Cloud Security Incident Response: 7 Best Practices | Mitiga","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/7-best-practices-for-cloud-incident-response","time":"16:43","priority":"MAY READ","score":50,"tldr":"Effective cloud incident response hinges on centralizing cloud-native control-plane and identity logs before they expire, adopting least privilege and zero trust to limit blast radius, and proactively testing response plans that account for shared responsibility boundaries where traditional disk forensics don't apply.","briefOverview":"\u003cp\u003eThis article outlines seven best practices for cloud security incident response, reflecting the reality that breaches in software-as-a-service, platform-as-a-service, and infrastructure-as-a-service environments unfold very differently from on-premises attacks. Because cloud environments often lack traditional endpoints to image, investigators depend on cloud-native telemetry — control-plane logs, identity events, and API activity — as well as a clear understanding of the shared responsibility model, in which the provider secures the cloud itself and the customer secures their identities and data.\u003c/p\u003e\n\n\u003cp\u003eThe guidance emphasizes that organizations should apply least privilege and zero-trust principles to limit blast radius, centralize and retain logs (ideally for a year or longer) to ensure evidence is not lost, and leverage built-in detection tools like AWS GuardDuty and CloudWatch that benefit from the provider\u0026rsquo;s broad threat visibility. Specific evidence-preservation steps, such as capturing EC2 instance metadata and EBS snapshots, replace traditional forensic disk imaging, and incident response plans must be regularly tested through tabletop exercises that address cloud-native attack scenarios like token theft and SaaS data exfiltration rather than generic ransomware.\u003c/p\u003e\n\n\u003cp\u003eFinally, the article notes that many organizations lack a dedicated incident response team or find internal resources fully stretched, making a cloud incident response partner valuable for improving readiness and minimizing incident impact. Because cloud attacks move through identities and API calls, an effective response strategy centers on control-plane visibility, pre-authorized containment actions, and a plan that assigns ownership of each step, allowing teams to contain threats without waiting on change tickets.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Cloud incident response depends on cloud-native telemetry such as control-plane logs, identity events, and API activity because there is often no endpoint to image.","Under the shared responsibility model, the cloud provider is responsible for security 'of' the cloud, while the customer is responsible for security 'in' the cloud, including their information and identities.","Logs are critical for cloud environments, and organizations should configure, centralize, and securely retain them for a sufficient period—likely one year or longer—to ensure they are available during an investigation.","Applying the principle of least privilege and zero trust limits the damage if credentials are compromised by giving users and resources only the access they need and continuously verifying every transaction.","Preserving evidence in a cloud incident may require storing EC2 instance metadata, EBS disk snapshots, and various logs, rather than creating traditional forensic disk images."],"insights":["Because the average time to identify and contain a breach can exceed a year for non-ransomware incidents, retaining cloud logs for at least a year is a critical but often overlooked requirement","Cloud-native threat detection tools benefit from a unique detection advantage: providers see adversarial patterns across millions of customer environments, giving them more threat visibility than any single organization","Traditional on-premises incident response tabletops are insufficient for cloud because they rarely cover identity-based attacks such as token theft or SaaS data exfiltration, which are the dominant cloud threats","Preserving evidence in cloud forensics requires capturing easily overlooked ephemeral data like EC2 instance metadata and EBS snapshots, rather than the full disk images common in on-premises investigations"],"referencedReports":[],"body":"\u003cp\u003eThis article outlines seven best practices for cloud security incident response, reflecting the reality that breaches in software-as-a-service, platform-as-a-service, and infrastructure-as-a-service environments unfold very differently from on-premises attacks. Because cloud environments often lack traditional endpoints to image, investigators depend on cloud-native telemetry — control-plane logs, identity events, and API activity — as well as a clear understanding of the shared responsibility model, in which the provider secures the cloud itself and the customer secures their identities and data.\u003c/p\u003e\n\n\u003cp\u003eThe guidance emphasizes that organizations should apply least privilege and zero-trust principles to limit blast radius, centralize and retain logs (ideally for a year or longer) to ensure evidence is not lost, and leverage built-in detection tools like AWS GuardDuty and CloudWatch that benefit from the provider\u0026rsquo;s broad threat visibility. Specific evidence-preservation steps, such as capturing EC2 instance metadata and EBS snapshots, replace traditional forensic disk imaging, and incident response plans must be regularly tested through tabletop exercises that address cloud-native attack scenarios like token theft and SaaS data exfiltration rather than generic ransomware.\u003c/p\u003e\n\n\u003cp\u003eFinally, the article notes that many organizations lack a dedicated incident response team or find internal resources fully stretched, making a cloud incident response partner valuable for improving readiness and minimizing incident impact. Because cloud attacks move through identities and API calls, an effective response strategy centers on control-plane visibility, pre-authorized containment actions, and a plan that assigns ownership of each step, allowing teams to contain threats without waiting on change tickets.\u003c/p\u003e\n"},{"n":22,"title":"The Parable of the Bullet Holes: AI Security Edition","source":"netskope.com","sourceColorIdx":2,"link":"https://www.netskope.com/blog/the-parable-of-the-bullet-holes-ai-security-edition","time":"05:19","priority":"MAY READ","score":45,"tldr":"Organizations suffer from survivorship bias by only monitoring sanctioned AI systems for minor incidents, while catastrophic data leaks happen unseen in public LLMs and shadow AI that are never inspected.","briefOverview":"\u003cp\u003eThe article tells the story of statistician Abraham Wald during World War II, who realized that bullet holes on returning bombers only showed where a plane could be hit and still survive. The undamaged areas—engines, cockpit, fuel tanks—were the fatal hits because those planes never returned. This survivorship bias led the military to mistakenly reinforce the wrong parts, and the article extends this error to modern AI security.\u003c/p\u003e\n\n\u003cp\u003eOrganizations monitor their sanctioned enterprise LLMs and find minor policy violations—\u0026rdquo;bullet holes\u0026rdquo;—like sanitized PII logs, then conclude their system is secure. The article warns that the real catastrophic breaches happen outside this monitored view: employees inadvertently paste full customer PII into public LLMs, and development teams create shadow AI instances that fine-tune on proprietary source code, leaving no audit trail.\u003c/p\u003e\n\n\u003cp\u003eBecause survivorship bias makes companies optimize for the visible, survivable incidents, the most dangerous AI threats remain invisible. The article urges security teams to become like Wald and focus defenses on what they don\u0026rsquo;t see—unmonitored services, shadow AI, and personal LLM accounts—to prevent the data breaches that never return to the hangar.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["During World War II, statistician Abraham Wald revealed survivorship bias by showing that bullet holes on returning planes only indicated non-critical hit areas, while catastrophic damage to engines and cockpits left no survivors in the data.","Companies monitoring only their approved enterprise LLMs for minor policy violations repeat this bias, treating visible 'bullet holes' as all risks while ignoring the fact that fatal breaches occur outside the monitored systems.","The most dangerous missing data includes employees inadvertently pasting customer PII into public LLMs and development teams fine-tuning unauthorized AI instances with proprietary source code, neither of which appears in enterprise audit logs.","Survivorship bias makes organizations optimize for survival in their sanctioned systems rather than preventing the catastrophic, invisible breaches from shadow AI and unmonitored services.","The article calls for security teams to become like Abraham Wald and actively hunt for critical gaps in what is not being monitored, such as personal accounts and embedded AI in SaaS."],"insights":["An empty audit log might not mean your AI systems are secure; it could mean the truly catastrophic breaches are occurring entirely outside your monitored environment, leaving no trace.","Fortifying the sanctioned systems against minor violations can worsen survivorship bias by diverting attention from the invisible, fatal threat of unapproved public LLM and shadow AI usage.","The most impactful security measure is not better monitoring of the enterprise LLM, but actively hunting for the AI tools and accounts you don't know exist."],"referencedReports":[],"body":"\u003cp\u003eThe article tells the story of statistician Abraham Wald during World War II, who realized that bullet holes on returning bombers only showed where a plane could be hit and still survive. The undamaged areas—engines, cockpit, fuel tanks—were the fatal hits because those planes never returned. This survivorship bias led the military to mistakenly reinforce the wrong parts, and the article extends this error to modern AI security.\u003c/p\u003e\n\n\u003cp\u003eOrganizations monitor their sanctioned enterprise LLMs and find minor policy violations—\u0026rdquo;bullet holes\u0026rdquo;—like sanitized PII logs, then conclude their system is secure. The article warns that the real catastrophic breaches happen outside this monitored view: employees inadvertently paste full customer PII into public LLMs, and development teams create shadow AI instances that fine-tune on proprietary source code, leaving no audit trail.\u003c/p\u003e\n\n\u003cp\u003eBecause survivorship bias makes companies optimize for the visible, survivable incidents, the most dangerous AI threats remain invisible. The article urges security teams to become like Wald and focus defenses on what they don\u0026rsquo;t see—unmonitored services, shadow AI, and personal LLM accounts—to prevent the data breaches that never return to the hangar.\u003c/p\u003e\n"},{"n":32,"title":"Rural Hospitals Turn to Threat Intelligence Networks to Strengthen Cybersecurity Defenses","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/rural-hospitals-turn-to-threat-intelligence-networks-to-strengthen-cybersecurity-defenses/","time":"20:06","priority":"MAY READ","score":45,"tldr":"Resource-constrained rural hospitals can meaningfully improve their cybersecurity by joining collaborative threat intelligence networks and adopting basic cyber hygiene practices, rather than relying solely on in-house defenses they cannot afford.","briefOverview":"\u003cp\u003eMore than 2,000 rural hospitals across the United States serve as a critical healthcare lifeline for large swaths of the population, yet they are chronically underfunded and understaffed. With limited budgets and lean IT teams forced to prioritize patient care, cybersecurity often takes a back seat. This resource gap leaves these hospitals with far fewer defenses, making them attractive targets for ransomware and phishing attacks.\u003c/p\u003e\n\n\u003cp\u003eIn response, rural hospitals are increasingly turning to collaborative threat intelligence networks and basic cyber hygiene practices to close dangerous security gaps. Threat intelligence sharing allows even resource-constrained organizations to tap into collective knowledge about current threats, while fundamental hygiene steps provide practical defense without requiring large budgets. The article underscores the systemic neglect of rural facilities in cybersecurity investment and policy, and highlights how these low-cost approaches can make a meaningful difference in protecting patient data and ensuring continuity of care.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["More than 2,000 rural hospitals in the United States a
