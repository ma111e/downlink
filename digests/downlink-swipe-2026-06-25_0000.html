t edge devices like SD-WAN managers that lack native endpoint detection, enabling persistent visibility into internal network traffic and complicating forensic analysis.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Mandiant discovered that CVE-2026-20245 in Cisco Catalyst SD-WAN Manager was exploited as a zero-day at least two months before public disclosure.","The initial compromise likely involved earlier zero-day authentication bypass flaws CVE-2026-20127 or CVE-2026-20182 to establish unauthorized peering connections.","After regaining access via stolen certificates from a prior breach, the attacker exploited CVE-2026-20245 by uploading a malicious CSV file (evil_tenant.csv) to create a hidden root account named 'troot'.","The threat actor used anti-forensic techniques, including deleting files, restoring original configurations, and resetting the admin password to its default to remain undetected.","The incident highlights a continuing trend of adversaries targeting edge devices like SD-WAN that lack endpoint detection, allowing persistent visibility into internal network traffic."],"insights":["The attacker carefully reset the compromised admin password back to its original value after using it, specifically to avoid raising suspicion if the legitimate administrator logged in later.","Even after the victim patched one of the initial zero-days, the attacker regained access using stolen certificates from the earlier breach, demonstrating that patching alone is insufficient when persistent credentials remain uncompromised.","The two distinct periods of unauthorized activity may or may not be connected, suggesting either a single threat actor with broken persistence or two separate groups targeting the same device at different times."],"referencedReports":[{"title":"Zero-day exploitation of Cisco Catalyst SD-WAN Manager","url":"https://cloud.google.com/blog/topics/threat-intelligence/zero-day-exploitation-cisco-catalyst-sd-wan-manager","publisher":"Google Cloud / Mandiant","context":"The article relies on Mandiant's findings that CVE-2026-20245 was exploited as a zero-day, detailing the attacker's tactics and anti-forensic measures.","category":"research","primary":true}],"body":"\u003cp\u003eAn unknown threat actor exploited the high-severity vulnerability CVE-2026-20245 in Cisco Catalyst SD-WAN Manager as a zero-day at least two months before public disclosure, according to a Mandiant investigation. The attacker targeted an unspecified communications service provider, ultimately gaining full root-level control on the compromised device.\u003c/p\u003e\n\n\u003cp\u003eThe intrusion occurred in two distinct waves. The first, between late 2025 and January 2026, used one of two previously undisclosed authentication bypass flaws (CVE-2026-20127 or CVE-2026-20182) to establish unauthorized peering connections. In March 2026, after the device had been patched against CVE-2026-20127, the attacker returned using stolen certificates from the earlier breach and then exploited CVE-2026-20245 by uploading a malicious CSV file called \u003ccode\u003eevil_tenant.csv\u003c/code\u003e. This exploit escalated privileges and created a hidden root account named \u003ccode\u003etroot\u003c/code\u003e in \u003ccode\u003e/etc/passwd\u003c/code\u003e and \u003ccode\u003e/etc/shadow\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor consistently employed anti-forensic methods to avoid detection, deleting files they touched, restoring original configuration files, and even changing a compromised admin password back to its default value to prevent suspicion. The incident underscores a broader trend in which advanced adversaries target edge devices like SD-WAN managers that lack native endpoint detection, enabling persistent visibility into internal network traffic and complicating forensic analysis.\u003c/p\u003e\n"},{"n":27,"title":"Miasma Mini Shai-Hulud Hits LeoPlatform npm Packages and GitHub Actions, Expands to the Go Ecosystem","source":"socket.dev","sourceColorIdx":2,"link":"https://socket.dev/blog/miasma-mini-shai-hulud-hits-leoplatform-npm-packages-go-ecosystem?utm_medium=feed","time":"17:44","priority":"MUST READ","score":95,"tldr":"A supply chain attack campaign tied to the Miasma family has compromised numerous npm packages and a Go module, using novel install-trigger techniques and targeting developer CI/CD environments, GitHub Actions, and AI coding assistants to steal credentials and propagate.","briefOverview":"\u003cp\u003eA new supply chain attack wave tied to the Miasma, Mini Shai-Hulud, and Hades malware family has compromised 23 npm packages across the LeoPlatform and RStreams ecosystems, as well as a third-party Go module for the Verana Blockchain project. The attackers published malicious package versions on npm on June 24, 2026, and planted similar payloads in a source-repository archive, extending the campaign beyond the JavaScript ecosystem.\u003c/p\u003e\n\n\u003cp\u003eThe attack uses a novel install-trigger technique by adding a \u003ccode\u003ebinding.gyp\u003c/code\u003e file that causes npm to automatically invoke \u003ccode\u003enode-gyp\u003c/code\u003e, which in turn executes a shell expansion that launches a heavily obfuscated multi-stage JavaScript loader. The payload decrypts embedded AES-GCM blobs, ensures the Bun runtime is available, and then runs a credential stealer that collects secrets from \u003ccode\u003e.env\u003c/code\u003e files, package registry tokens, GitHub tokens, cloud credentials, SSH keys, Kubernetes configs, Docker authentication files, and AI coding assistant configurations. The malware actively targets GitHub Actions workflows, searching for publishing tokens, dumping runner secrets, and uploading them via GitHub APIs, while also planting persistence hooks for tools like Claude, VS Code, Cursor, and Gemini to re-infect developer machines whenever a poisoned repository is opened.\u003c/p\u003e\n\n\u003cp\u003eThe campaign\u0026rsquo;s tradecraft overlaps heavily with earlier compromises, most notably the codfish/semantic-release-action incident, and shares the operational marker \u003ccode\u003eRevokeAndItGoesKaboom\u003c/code\u003e, which links all these events into a single campaign cluster. Defenders are urged to rotate all exposed secrets, audit repositories for injected workflows or AI-agent hooks, and treat any environment that installed the affected packages as compromised, because the malicious code is designed to spread from developer machines to GitHub repositories and CI/CD pipelines, creating a self-propagating threat to software supply chains.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The latest Miasma wave compromised 23 npm packages and a Go module by adding a malicious binding.gyp file that triggers hidden JavaScript execution during installation.","The payload steals a broad set of credentials from developer machines and CI/CD environments, including npm/PyPI tokens, GitHub tokens, cloud keys, SSH keys, and Kubernetes configs.","Attackers heavily target GitHub Actions workflows to harvest secrets, upload stolen data, and plant malicious repository branches and workflows disguised as Dependabot activity.","Persistence hooks are embedded for AI coding assistants and IDEs (Claude, VS Code, Cursor, Gemini), causing the malware to execute when a poisoned repository is opened locally.","The campaign marker 'RevokeAndItGoesKaboom' directly ties this wave to earlier GitHub Actions compromises, such as the codfish/semantic-release-action incident, confirming shared attacker tradecraft."],"insights":["The malware achieves install-time execution without a preinstall script by adding a binding.gyp file, exploiting npm's automatic node-gyp invocation, which evades many package scan tools that only look for lifecycle scripts.","The payload specifically plants persistence hooks for AI coding assistants (Claude, Gemini, Cursor) and IDEs (VS Code), so that simply opening a poisoned repository in a developer's editor triggers the malware anew, even after the original package compromise is cleaned.","Attackers use a dead-drop channel by searching GitHub commits for the marker string 'RevokeAndItGoesKaboom' to receive operator instructions, a method observed across multiple incidents and linking this wave to earlier GitHub Actions compromises.","The malware includes a Russian locale check to skip execution on systems set to Russian, indicating a likely geographic targeting preference and providing an operational clue that defenders can use for campaign attribution."],"referencedReports":[],"body":"\u003cp\u003eA new supply chain attack wave tied to the Miasma, Mini Shai-Hulud, and Hades malware family has compromised 23 npm packages across the LeoPlatform and RStreams ecosystems, as well as a third-party Go module for the Verana Blockchain project. The attackers published malicious package versions on npm on June 24, 2026, and planted similar payloads in a source-repository archive, extending the campaign beyond the JavaScript ecosystem.\u003c/p\u003e\n\n\u003cp\u003eThe attack uses a novel install-trigger technique by adding a \u003ccode\u003ebinding.gyp\u003c/code\u003e file that causes npm to automatically invoke \u003ccode\u003enode-gyp\u003c/code\u003e, which in turn executes a shell expansion that launches a heavily obfuscated multi-stage JavaScript loader. The payload decrypts embedded AES-GCM blobs, ensures the Bun runtime is available, and then runs a credential stealer that collects secrets from \u003ccode\u003e.env\u003c/code\u003e files, package registry tokens, GitHub tokens, cloud credentials, SSH keys, Kubernetes configs, Docker authentication files, and AI coding assistant configurations. The malware actively targets GitHub Actions workflows, searching for publishing tokens, dumping runner secrets, and uploading them via GitHub APIs, while also planting persistence hooks for tools like Claude, VS Code, Cursor, and Gemini to re-infect developer machines whenever a poisoned repository is opened.\u003c/p\u003e\n\n\u003cp\u003eThe campaign\u0026rsquo;s tradecraft overlaps heavily with earlier compromises, most notably the codfish/semantic-release-action incident, and shares the operational marker \u003ccode\u003eRevokeAndItGoesKaboom\u003c/code\u003e, which links all these events into a single campaign cluster. Defenders are urged to rotate all exposed secrets, audit repositories for injected workflows or AI-agent hooks, and treat any environment that installed the affected packages as compromised, because the malicious code is designed to spread from developer machines to GitHub repositories and CI/CD pipelines, creating a self-propagating threat to software supply chains.\u003c/p\u003e\n"},{"n":28,"title":"Mass npm Supply Chain Attack: 20 Leo Platform Packages Compromised","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/mass-npm-supply-chain-attack-20-leo-platform-packages-compromised","time":"08:52","priority":"MUST READ","score":95,"tldr":"On June 24, 2026, an attacker published malicious versions of 20 Leo Platform npm packages within a three-second burst, deploying the same Miasma campaign toolkit that steals GitHub Actions secrets, cloud credentials, and password manager data, and then spreads via a supply chain worm.","briefOverview":"\u003cp\u003eOn June 24, 2026, an attacker breached the Leo Platform ecosystem and published malicious versions of 20 npm packages in a coordinated burst lasting less than three seconds. The attack used the same “Phantom Gyp” install hook and three-layer obfuscation chain first documented in the Miasma campaign three weeks earlier. The malicious payload steals a broad range of secrets from GitHub Actions runners, cloud credential stores, package registries, and password managers, then exfiltrates them by committing encrypted data to GitHub using the victim’s own access token.\u003c/p\u003e\n\n\u003cp\u003eThe payload also includes a supply chain worm that bypasses npm two-factor authentication to automatically publish compromised versions of any package the victim controls, spreading the infection further. All 20 packages were published at the exact same timestamp, confirming a single automated operation with improved tooling over the earlier Miasma campaign. The payload reads secrets directly from the Runner.Worker process memory via \u003ccode\u003e/proc/{pid}/mem\u003c/code\u003e, accessing masked values that are normally invisible to child processes and logs.\u003c/p\u003e\n\n\u003cp\u003eThe affected packages collectively receive about 13,600 weekly downloads, placing a significant number of developers and CI/CD pipelines at risk. Indicators of compromise include the 3-second publish window on June 24 at 23:04:55 UTC, a unique 1.5-million-element character array in \u003ccode\u003eindex.js\u003c/code\u003e, and the \u003ccode\u003ebinding.gyp\u003c/code\u003e hook that executes arbitrary commands at install time without a \u003ccode\u003escripts\u003c/code\u003e entry. StepSecurity’s Harden-Runner can detect the anomalous process chain and memory access, terminating the workflow to prevent secrets theft, while a cooldown policy on new package versions can stop such attacks before they reach end users.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["On June 24, 2026, an attacker published malicious versions of 20 Leo Platform npm packages within a three-second burst, confirming a single automated operation.","The payload uses a 'Phantom Gyp' install hook and a three-layer obfuscation chain to steal secrets from GitHub Actions runners, cloud credential stores, package registries, and password managers, then exfiltrates them via the victim's own GitHub token.","If an npm token is found, the payload automatically publishes malicious versions of any package the victim controls by bypassing two-factor authentication, spreading the attack further.","The 20 compromised packages collectively receive approximately 13,600 downloads per week, putting a significant number of developers and CI/CD pipelines at risk.","StepSecurity's Harden-Runner detects the anomalous process chain and unauthorized memory access, terminating the workflow run to prevent secret extraction."],"insights":["The attacker exfiltrates stolen credentials by using the victim's own GitHub token to commit encrypted data to GitHub, meaning no external attacker-controlled domain ever appears in network logs.","A cooldown policy that delays serving newly published package versions can prevent exposure to such supply chain attacks even when no prior threat intelligence exists, as demonstrated by StepSecurity's Secure Registry.","The 20 packages were published within a 3-second burst, showing that the attacker built a faster, more refined automated publishing pipeline compared to the earlier Miasma campaign that took under two hours.","The payload reads secrets directly from the GitHub Actions Runner.Worker process memory, bypassing both workflow log masking and the limitation that child processes cannot see masked secrets."],"referencedReports":[],"body":"\u003cp\u003eOn June 24, 2026, an attacker breached the Leo Platform ecosystem and published malicious versions of 20 npm packages in a coordinated burst lasting less than three seconds. The attack used the same “Phantom Gyp” install hook and three-layer obfuscation chain first documented in the Miasma campaign three weeks earlier. The malicious payload steals a broad range of secrets from GitHub Actions runners, cloud credential stores, package registries, and password managers, then exfiltrates them by committing encrypted data to GitHub using the victim’s own access token.\u003c/p\u003e\n\n\u003cp\u003eThe payload also includes a supply chain worm that bypasses npm two-factor authentication to automatically publish compromised versions of any package the victim controls, spreading the infection further. All 20 packages were published at the exact same timestamp, confirming a single automated operation with improved tooling over the earlier Miasma campaign. The payload reads secrets directly from the Runner.Worker process memory via \u003ccode\u003e/proc/{pid}/mem\u003c/code\u003e, accessing masked values that are normally invisible to child processes and logs.\u003c/p\u003e\n\n\u003cp\u003eThe affected packages collectively receive about 13,600 weekly downloads, placing a significant number of developers and CI/CD pipelines at risk. Indicators of compromise include the 3-second publish window on June 24 at 23:04:55 UTC, a unique 1.5-million-element character array in \u003ccode\u003eindex.js\u003c/code\u003e, and the \u003ccode\u003ebinding.gyp\u003c/code\u003e hook that executes arbitrary commands at install time without a \u003ccode\u003escripts\u003c/code\u003e entry. StepSecurity’s Harden-Runner can detect the anomalous process chain and memory access, terminating the workflow to prevent secrets theft, while a cooldown policy on new package versions can stop such attacks before they reach end users.\u003c/p\u003e\n"},{"n":29,"title":"simonecorsi/mawesome GitHub Action has been compromised","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/simonecorsi-mawesome-github-action-has-been-compromised","time":"01:38","priority":"MUST READ","score":95,"tldr":"The simonecorsi/mawesome GitHub Action was compromised on June 24, 2026, via force-pushed malicious commits and tag repointing, mirroring a similar attack on codfish/semantic-release-action, allowing attacker code execution in any workflow using the affected tags.","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["On June 24, 2026, an attacker compromised the simonecorsi/mawesome GitHub repository.","The attacker force-pushed malicious commits and repointed several version tags to the malicious commit.","Any GitHub Actions workflow running against those tags after the compromise executed the attacker's code inside its runner.","This attack method is very similar to the codfish/semantic-release-action compromise from earlier the same day."],"insights":["The same-day occurrence of an almost identical attack on another GitHub Action (codfish/semantic-release-action) suggests a deliberate campaign or copycat wave targeting the GitHub Actions supply chain.","Repointing existing version tags to malicious commits means even workflows that pinned to a specific tag (not a branch) executed attacker code, exploiting the mutable nature of Git tags.","The compromise was discovered and shared by a community member (Sean Smith), indicating that manual detection and reporting remain critical for identifying supply chain attacks on open-source repositories."],"referencedReports":[{"title":"Supply Chain Compromise of codfish/semantic-release-action","url":"https://www.stepsecurity.io/blog/supply-chain-compromise-codfish-semantic-release-action","publisher":"StepSecurity","context":"The article references this blog post to note the attack method is very similar to the compromise of simonecorsi/mawesome, which happened earlier the same day.","category":"news","primary":false}],"body":""},{"n":4,"title":"Bluekit phishing kit adopts browser-in-the-middle for login theft","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/bluekit-phishing-kit-adopts-browser-in-the-middle-for-login-theft/","time":"15:00","priority":"MUST READ","score":92,"tldr":"The Bluekit phishing kit now uses the legitimate rrweb library to perform browser-in-the-middle attacks, relaying victim inputs to an attacker-controlled browser to steal session tokens and bypass multi-factor authentication.","briefOverview":"\u003cp\u003eThe Bluekit phishing-as-a-service platform has added browser-in-the-middle (BitM) capabilities, moving from adversary-in-the-middle attacks to a method where the victim’s interactions with a fake login page are relayed through an attacker-controlled browser. By using the legitimate open-source rrweb library to serialize and stream the DOM over WebSocket, Bluekit gives attackers the victim’s keystrokes and inputs while presenting a fully real-looking login page from the targeted service. Authentication completes inside the attacker’s browser, yielding a valid session token and granting unrestricted account access, effectively bypassing multi-factor authentication.\u003c/p\u003e\n\n\u003cp\u003eTo evade detection, Bluekit now deploys a comprehensive set of anti-analysis measures: randomized CSS filters that thwart screenshot-based scanning, a large and frequently changing obfuscated JavaScript bundle, custom CAPTCHA imitating Cloudflare or the target brand, browser fingerprinting based on hardware and software characteristics, and WebRTC-based IP mismatch detection to identify researchers and proxies. The kit also retains the live victim-monitoring dashboard previously reported, allowing operators to watch victims in real time as they are tricked into the login session.\u003c/p\u003e\n\n\u003cp\u003eOver a single week Netcraft identified nearly 70 new Bluekit hostnames, demonstrating rapid operational scaling. While the presence of rrweb alone is not a compromise indicator, defenders can flag unexplained keyboard or mouse input delays on login pages as a practical sign of a BitM attack. Bluekit’s adoption of a technique first publicly demonstrated in 2022 signals a wider threat to accounts on services such as Outlook, Gmail, Yahoo, iCloud, and GitHub, making this a significant escalation in phishing sophistication.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Bluekit has shifted from adversary-in-the-middle to browser-in-the-middle (BitM) using the open-source rrweb library to relay victims’ DOM and keystrokes to an attacker-controlled browser.","The BitM technique allows attackers to steal valid session tokens and gain unlimited account access even when multi-factor authentication is in place.","Bluekit employs multiple anti-analysis measures, including randomized CSS filters, obfuscated JavaScript bundles, custom CAPTCHA, browser fingerprinting, and WebRTC IP mismatch detection.","Netcraft reported nearly 70 new Bluekit hostnames identified over a single week, indicating active and rapid deployment of the phishing kit."],"insights":["The presence of the rrweb library in a web session, while used by Bluekit for browser-in-the-middle attacks, is not by itself an indicator of compromise because rrweb is a legitimate tool for session replay and analytics.","Delays in keyboard input and mouse clicks on login pages can serve as a practical red flag for browser-in-the-middle attacks due to the inherent latency of forwarding inputs through the attacker’s browser.","Bluekit’s use of randomized CSS filters is designed to defeat screenshot-based detection, potentially blinding automated analysis tools that rely on visual captures of phishing pages.","The victim qualification system uses WebRTC-based IP mismatch detection to identify researchers and crawlers behind proxies or VPNs, actively preventing analysis of the phishing infrastructure from those connections."],"referencedReports":[{"title":"Bluekit phishing-as-a-service threat","url":"https://www.netcraft.com/blog/bluekit-phishing-as-a-service-threat","publisher":"Netcraft","context":"Netcraft warns that Bluekit has switched to a browser-in-the-middle mechanism using the rrweb library and provides details on anti-analysis measures.","category":"research","primary":true}],"body":"\u003cp\u003eThe Bluekit phishing-as-a-service platform has added browser-in-the-middle (BitM) capabilities, moving from adversary-in-the-middle attacks to a method where the victim’s interactions with a fake login page are relayed through an attacker-controlled browser. By using the legitimate open-source rrweb library to serialize and stream the DOM over WebSocket, Bluekit gives attackers the victim’s keystrokes and inputs while presenting a fully real-looking login page from the targeted service. Authentication completes inside the attacker’s browser, yielding a valid session token and granting unrestricted account access, effectively bypassing multi-factor authentication.\u003c/p\u003e\n\n\u003cp\u003eTo evade detection, Bluekit now deploys a comprehensive set of anti-analysis measures: randomized CSS filters that thwart screenshot-based scanning, a large and frequently changing obfuscated JavaScript bundle, custom CAPTCHA imitating Cloudflare or the target brand, browser fingerprinting based on hardware and software characteristics, and WebRTC-based IP mismatch detection to identify researchers and proxies. The kit also retains the live victim-monitoring dashboard previously reported, allowing operators to watch victims in real time as they are tricked into the login session.\u003c/p\u003e\n\n\u003cp\u003eOver a single week Netcraft identified nearly 70 new Bluekit hostnames, demonstrating rapid operational scaling. While the presence of rrweb alone is not a compromise indicator, defenders can flag unexplained keyboard or mouse input delays on login pages as a practical sign of a BitM attack. Bluekit’s adoption of a technique first publicly demonstrated in 2022 signals a wider threat to accounts on services such as Outlook, Gmail, Yahoo, iCloud, and GitHub, making this a significant escalation in phishing sophistication.\u003c/p\u003e\n"},{"n":17,"title":"New Mistic Backdoor Linked to KongTuke in ClickFix and ModeloRAT Campaigns","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/new-mistic-backdoor-linked-to-kongtuke.html","time":"08:54","priority":"MUST READ","score":91,"tldr":"A new stealthy backdoor named Mistic, linked to the KongTuke initial access broker, has been deployed in opportunistic ClickFix campaigns since April 2026 to establish low-visibility persistence and has ties to Qilin ransomware deployment.","briefOverview":"\u003cp\u003eA novel and stealthy backdoor tracked as Mistic (or MLTBackdoor) has been used in financially motivated attacks since April 2026, targeting organizations across insurance, education, IT, and professional services. Symantec and Carbon Black\u0026rsquo;s Threat Hunter Team attribute the malware to the initial access broker KongTuke, also known as Woodgnat, and note it is deployed alongside the Python-based ModeloRAT remote access trojan. The attackers deliver Mistic through ClickFix campaigns that trick users into executing malicious commands under the guise of fixing a browser crash or performing a security scan.\u003c/p\u003e\n\n\u003cp\u003eThe backdoor employs DLL side-loading via the legitimate Microsoft endpoint security binary MpExtMs.exe, allowing it to blend into normal system activity and avoid detection. It runs entirely in memory, supports commands to upload, download, move, rename, or delete files, and includes a kill switch to delete itself without leaving artifacts on disk. Additionally, it can load Beacon Object Files (BOFs) to dynamically extend its capabilities and modify the polling interval for command-and-control communication, while one campaign variant used DNS lookups as a lightweight signaling channel.\u003c/p\u003e\n\n\u003cp\u003eThe attacks appear opportunistic, aiming to establish long-term, low-visibility access that can then be sold to other criminals, with ModeloRAT already linked to Qilin ransomware deployments. KongTuke\u0026rsquo;s evolving tactics have ranged from malicious Chrome extensions to fake Microsoft Teams messages from an IT Support account, underlining the group\u0026rsquo;s adaptability. Broadcom\u0026rsquo;s assessment suggests Woodgnat may be the developer behind both ModeloRAT and Mistic, reflecting a trend where access brokers create custom, stealthy tools rather than relying on commodity malware.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A stealthy backdoor named Mistic (MLTBackdoor) has been deployed in attacks since April 2026 targeting multiple sectors including insurance, education, IT, and professional services.","Mistic is linked to the initial access broker KongTuke (Woodgnat) and is delivered alongside ModeloRAT through ClickFix campaigns that trick users into running malicious commands.","The malware uses DLL side-loading via the trusted Microsoft binary MpExtMs.exe, runs payloads in memory, and can delete itself via a kill switch to avoid leaving forensic traces.","The threat actor operates a traffic distribution system on compromised WordPress sites and also uses fake Microsoft Teams messages from an IT Support account to distribute malware.","ModeloRAT has been observed in incidents that led to Qilin ransomware deployment, showing the group provides access to ransomware affiliates."],"insights":["Mistic uses DLL side-loading via the trusted Microsoft endpoint security binary MpExtMs.exe, allowing it to blend into legitimate antivirus processes and evade detection.","One ClickFix variant uses DNS queries as a staging channel, turning a normally benign protocol into a stealthy command-and-control signaling path that can bypass network monitoring.","The backdoor includes the ability to load Beacon Object Files (BOFs) directly in memory, indicating interoperability with red-teaming frameworks like Cobalt Strike and enabling flexible, diskless expansion of capabilities.","The threat actor has rapidly evolved its social engineering from fake browser crashes to Microsoft Teams messages from a fake IT Support account, demonstrating adaptiveness that broadens its compromise surface.","Broadcom's assessment that Woodgnat is possibly the developer behind both ModeloRAT and Mistic suggests a single, skilled IAB group produces custom stealth tools rather than relying on commodity malware, raising the sophistication of the access marketplace."],"referencedReports":[{"title":"New Mistic Backdoor and ModeloRAT","url":"https://www.security.com/threat-intelligence/new-mistic-backdoor-modeloRAT","publisher":"Broadcom (Symantec)","context":"The report details the Mistic backdoor and its deployment alongside ModeloRAT in ClickFix campaigns, as shared with The Hacker News.","category":"research","primary":true}],"body":"\u003cp\u003eA novel and stealthy backdoor tracked as Mistic (or MLTBackdoor) has been used in financially motivated attacks since April 2026, targeting organizations across insurance, education, IT, and professional services. Symantec and Carbon Black\u0026rsquo;s Threat Hunter Team attribute the malware to the initial access broker KongTuke, also known as Woodgnat, and note it is deployed alongside the Python-based ModeloRAT remote access trojan. The attackers deliver Mistic through ClickFix campaigns that trick users into executing malicious commands under the guise of fixing a browser crash or performing a security scan.\u003c/p\u003e\n\n\u003cp\u003eThe backdoor employs DLL side-loading via the legitimate Microsoft endpoint security binary MpExtMs.exe, allowing it to blend into normal system activity and avoid detection. It runs entirely in memory, supports commands to upload, download, move, rename, or delete files, and includes a kill switch to delete itself without leaving artifacts on disk. Additionally, it can load Beacon Object Files (BOFs) to dynamically extend its capabilities and modify the polling interval for command-and-control communication, while one campaign variant used DNS lookups as a lightweight signaling channel.\u003c/p\u003e\n\n\u003cp\u003eThe attacks appear opportunistic, aiming to establish long-term, low-visibility access that can then be sold to other criminals, with ModeloRAT already linked to Qilin ransomware deployments. KongTuke\u0026rsquo;s evolving tactics have ranged from malicious Chrome extensions to fake Microsoft Teams messages from an IT Support account, underlining the group\u0026rsquo;s adaptability. Broadcom\u0026rsquo;s assessment suggests Woodgnat may be the developer behind both ModeloRAT and Mistic, reflecting a trend where access brokers create custom, stealthy tools rather than relying on commodity malware.\u003c/p\u003e\n"},{"n":19,"title":"New Gaslight macOS Malware Uses Prompt Injection to Disrupt AI-Assisted Analysis","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/new-gaslight-macos-malware-uses-prompt.html","time":"09:23","priority":"SHOULD READ","score":88,"tldr":"A newly discovered North Korean macOS backdoor, Gaslight, uses prompt injection to trick AI analysts into aborting their review, while exfiltrating browser data and keychain contents via Telegram.","briefOverview":"\u003cp\u003eA newly discovered macOS backdoor and information stealer named Gaslight has been attributed with high confidence to a North Korean threat actor. Its most distinctive feature is an embedded prompt injection payload that feeds fabricated system-failure messages into large language model (LLM) assisted analysis tools, aiming to trick the AI into aborting or refusing its investigation. The malware, written in Rust, uses a Telegram bot API for command-and-control, supporting an interactive shell that allows operators to execute commands, kill processes, and exfiltrate files.\u003c/p\u003e\n\n\u003cp\u003eGaslight persists on the victim’s machine through a LaunchAgent disguised as a legitimate Apple service, and it deploys a Python-based stealer script via a separate bash installer. The stealer collects terminal histories, installed application lists, running processes, system profiles, the macOS Keychain, and data from Chrome, Brave, Firefox, and Safari, then compresses and uploads the results through Telegram. Notably, the bot token and other configuration details are supplied at runtime rather than hardcoded, and the implant actively redacts its own token from any output to prevent extraction from logs or crash artifacts.\u003c/p\u003e\n\n\u003cp\u003eThe malware embeds a cascade of 38 fake system messages—covering token expiry, out-of-memory kills, disk exhaustion, and repeated operation failures—inside a Markdown-fenced block to manipulate AI triage agents. This represents a shift in evasion tactics, targeting the analyst’s perceptual tools rather than the sandbox environment itself. By weaponizing the LLM-assisted reverse-engineering pipelines that are increasingly common in security workflows, Gaslight raises new challenges for incident response and highlights how threat actors are adapting their techniques to the AI-integrated analysis landscape.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Gaslight is a Rust-based macOS backdoor and information stealer attributed with high confidence to a North Korean threat actor.","The malware embeds prompt injection payloads that feed fabricated system-failure messages into AI-assisted analysis tools, aiming to make them abort or refuse inspection.","It uses a Telegram bot API for command and control, supporting commands such as shell execution, process termination, and file exfiltration, and maintains persistence via a LaunchAgent.","An embedded Python stealer collects terminal history, installed applications, running processes, system profile, macOS Keychain, and browser data from Chrome, Brave, Firefox, and Safari, then exfiltrates it as a ZIP archive over Telegram.","The implant supplies its Telegram bot token at runtime rather than hardcoding it, and self-redacts that token from its own output to avoid exposure in logs or crash artifacts."],"insights":["The malware shifts the target of prompt injection from the sandbox to the analyst, feeding fabricated system-failure messages specifically to an LLM-assisted triage agent rather than attempting traditional sandbox evasion.","The implant self-redacts its own Telegram bot token from runtime output, preventing token extraction even if an analyst captures logs or crash artifacts, which raises the bar for incident response.","The stealer component and its installer show signs of being generated by a large language model (llm), including emojis and extensive comments, indicating that threat actors are already leveraging generative AI to produce operational malware."],"referencedReports":[{"title":"macOS Gaslight Rust Backdoor Turns Prompt Injection on the Analyst, Not the Sandbox","url":"https://www.sentinelone.com/labs/macos-gaslight-rust-backdoor-turns-prompt-injection-on-the-analyst-not-the-sandbox/","publisher":"SentinelOne","context":"The article is based on a SentinelOne technical report that details the Gaslight malware and its prompt injection technique, as cited in the text.","category":"research","primary":true}],"body":"\u003cp\u003eA newly discovered macOS backdoor and information stealer named Gaslight has been attributed with high confidence to a North Korean threat actor. Its most distinctive feature is an embedded prompt injection payload that feeds fabricated system-failure messages into large language model (LLM) assisted analysis tools, aiming to trick the AI into aborting or refusing its investigation. The malware, written in Rust, uses a Telegram bot API for command-and-control, supporting an interactive shell that allows operators to execute commands, kill processes, and exfiltrate files.\u003c/p\u003e\n\n\u003cp\u003eGaslight persists on the victim’s machine through a LaunchAgent disguised as a legitimate Apple service, and it deploys a Python-based stealer script via a separate bash installer. The stealer collects terminal histories, installed application lists, running processes, system profiles, the macOS Keychain, and data from Chrome, Brave, Firefox, and Safari, then compresses and uploads the results through Telegram. Notably, the bot token and other configuration details are supplied at runtime rather than hardcoded, and the implant actively redacts its own token from any output to prevent extraction from logs or crash artifacts.\u003c/p\u003e\n\n\u003cp\u003eThe malware embeds a cascade of 38 fake system messages—covering token expiry, out-of-memory kills, disk exhaustion, and repeated operation failures—inside a Markdown-fenced block to manipulate AI triage agents. This represents a shift in evasion tactics, targeting the analyst’s perceptual tools rather than the sandbox environment itself. By weaponizing the LLM-assisted reverse-engineering pipelines that are increasingly common in security workflows, Gaslight raises new challenges for incident response and highlights how threat actors are adapting their techniques to the AI-integrated analysis landscape.\u003c/p\u003e\n"},{"n":10,"title":"Russia used Cellebrite phone-hacking tool to crack down on dissident after firm cut off country","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/russia-used-cellebrite-tool-after-company-pulled-out-of-country","time":"12:15","priority":"SHOULD READ","score":85,"tldr":"Despite Cellebrite cutting off Russia in March 2021, authorities used the company's legacy UFED tool to extract data from dissident Andrey Pivovarov's iPhone three months later, underscoring the firm's inability to disable existing hardware and prevent continued abuse by repressive regimes.","briefOverview":"\u003cp\u003eIn June 2021, Russian authorities used a Cellebrite Universal Forensic Extraction Device (UFED) to break into the iPhone 12 of prominent political activist Andrey Pivovarov, even though the Israeli company had announced it would stop working with Russia three months earlier due to human rights concerns. Forensic analysis by Citizen Lab discovered USB connections with a Host ID previously linked to Cellebrite hardware, confirming the extraction took place while Pivovarov’s device was in official custody. The activist was never asked for consent and did not provide his passwords.\u003c/p\u003e\n\n\u003cp\u003eThe extracted data was used in court to build a case that led to Pivovarov’s four-year prison sentence in July 2022 for carrying out the activities of an “undesirable” organization. Cellebrite executives asserted that any use of legacy hardware in Russia after March 2021 was entirely unauthorized and that older devices would be incompatible with modern phones, but the iPhone 12 extraction shows that functionality persisted without updates or technical support. Citizen Lab noted that Cellebrite’s architecture historically included an offline mode, making it difficult for the company to meaningfully cut off abusive customers and creating a platform for plausible deniability.\u003c/p\u003e\n\n\u003cp\u003eThis incident adds to a growing list of documented cases where repressive regimes—including Serbia, Jordan, and Kenya—have leveraged Cellebrite technology against civil society. Civil society groups Access Now and Citizen Lab urged Cellebrite to implement human rights due diligence, stop sales to regimes with abuse histories, and remotely disable tools after credible reports of misuse. Researchers also raised concerns that planned AI features for efficient social graph extraction could further empower political prosecutions.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Russian authorities used Cellebrite's UFED to extract data from dissident Andrey Pivovarov's iPhone12 in June 2021, three months after Cellebrite cut off Russia over human rights concerns.","Forensic analysis of MobileLockdown records revealed USB connections to a device with a Host ID previously attributed to Cellebrite, confirming the tool's use.","Court records show that documents extracted from Pivovarov's phone using the UFED were used to build a case against him, leading to a four-year prison sentence in July 2022.","Cellebrite management stated that any use of legacy hardware in Russia after March 2021 was unauthorized, but Citizen Lab said the technology's architecture made it difficult to meaningfully cut off abusive customers.","Citizen Lab and Access Now sent a letter to Cellebrite urging the company to stop selling to regimes with histories of abuse and to conduct human rights due diligence."],"insights":["Cellebrite's legacy offline mode and architecture meant that even after the company cut off Russia, UFED units continued to function without technical support or updates, revealing a systemic inability to remotely disable tools sold to abusive customers.","Despite Cellebrite's claim that legacy hardware would be incompatible with modern devices, the UFED successfully extracted data from an iPhone12 in mid-2021, demonstrating that older tools can still compromise contemporary phones.","Russian authorities used the UFED not just for extraction but to actively search for specific political terms on the cracked phone, highlighting how forensic tools are deployed to build targeted political cases through content-based searches.","Cellebrite's planned AI features focused on efficient social graph extraction could significantly worsen the repressive capabilities of its tools by enabling faster and more detailed mapping of dissident networks."],"referencedReports":[{"title":"Russia Breaks into Human Rights Activist's Phone with Cellebrite","url":"https://citizenlab.ca/research/russia-breaks-into-human-rights-activists-phone-with-cellebrite/","publisher":"Citizen Lab","context":"The article is based entirely on this Citizen Lab report, which details the forensic evidence that Russian authorities used Cellebrite UFED to extract data from activist Andrey Pivovarov's iPhone three months after Cellebrite cut off Russia.","category":"research","primary":true}],"body":"\u003cp\u003eIn June 2021, Russian authorities used a Cellebrite Universal Forensic Extraction Device (UFED) to break into the iPhone 12 of prominent political activist Andrey Pivovarov, even though the Israeli company had announced it would stop working with Russia three months earlier due to human rights concerns. Forensic analysis by Citizen Lab discovered USB connections with a Host ID previously linked to Cellebrite hardware, confirming the extraction took place while Pivovarov’s device was in official custody. The activist was never asked for consent and did not provide his passwords.\u003c/p\u003e\n\n\u003cp\u003eThe extracted data was used in court to build a case that led to Pivovarov’s four-year prison sentence in July 2022 for carrying out the activities of an “undesirable” organization. Cellebrite executives asserted that any use of legacy hardware in Russia after March 2021 was entirely unauthorized and that older devices would be incompatible with modern phones, but the iPhone 12 extraction shows that functionality persisted without updates or technical support. Citizen Lab noted that Cellebrite’s architecture historically included an offline mode, making it difficult for the company to meaningfully cut off abusive customers and creating a platform for plausible deniability.\u003c/p\u003e\n\n\u003cp\u003eThis incident adds to a growing list of documented cases where repressive regimes—including Serbia, Jordan, and Kenya—have leveraged Cellebrite technology against civil society. Civil society groups Access Now and Citizen Lab urged Cellebrite to implement human rights due diligence, stop sales to regimes with abuse histories, and remotely disable tools after credible reports of misuse. Researchers also raised concerns that planned AI features for efficient social graph extraction could further empower political prosecutions.\u003c/p\u003e\n"},{"n":14,"title":"Chrome Ad Blocker with 10M+ Installs Found with Dormant Script Injection Capability","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/chrome-ad-blocker-with-10m-installs.html","time":"14:12","priority":"SHOULD READ","score":85,"tldr":"A Chrome ad-blocking extension with over 10 million installs contains dormant, server-activated script injection capabilities that could execute arbitrary JavaScript on any website without user notice or a store review, though no malicious payload has been observed yet.","briefOverview":"\u003cp\u003eResearch by Island revealed that the Chrome extension \u0026ldquo;Adblock for YouTube\u0026rdquo; (ID: cmedhionkhpnakcndndgjdbohmhepckk), with over 10 million installs and a Featured badge, contains a dormant capability to execute arbitrary JavaScript on any website. This can be activated by a single server-side configuration change, requiring no extension update or Chrome Web Store review, and would leave no visible sign to the user. Although no malicious payload has been distributed through this path, the extension\u0026rsquo;s history includes a change of ownership in 2018, the removal of an ad-injection SDK in June 2024, and the addition of the dormant script injection infrastructure in February 2025.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the extension uses a custom scriptlet rule named \u0026ldquo;trusted-create-element\u0026rdquo; that allows the creation of arbitrary \u003ccode\u003e\u0026lt;script\u0026gt;\u003c/code\u003e elements, which could then access sensitive data like cookies, account sessions, and page content. While the extension is intended to run only on YouTube, its activation check merely verifies if the string \u0026ldquo;youtube.com\u0026rdquo; appears anywhere in the URL, ignoring hostname or frame origin. This can be easily bypassed on any website by including that string in a path or query parameter, effectively granting the extension the ability to operate on all visited sites.\u003c/p\u003e\n\n\u003cp\u003eThe risk is compounded by the fact that three related extensions from the same owner—Adblock for Chrome, Adblock for You, and AdBlock Suite—were previously removed from the Chrome Web Store for malware. Island notes that the concern lies not in a single line of code but in the combination of a high-install extension with all-site access, a remote-controlled injection path, prior ad-injection infrastructure, and a history of malicious extensions. Additionally, the article mentions a separate advisory from Palo Alto Networks Unit 42 about 18 browser extensions impersonating brands for affiliate marketing fraud, highlighting the broader issue of trust in browser extension supply chains.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Adblock for YouTube, a Chrome extension with over 10 million installs, contains a dormant capability to execute arbitrary JavaScript on any website through a server-side configuration change without requiring an extension update or store review.","The extension's check to limit its function to YouTube only looks for the string 'youtube.com' anywhere in a URL, allowing it to be trivially bypassed on any site.","No malicious payload has been observed using this dormant script injection path, but three related extensions from the same owner were previously removed from the Chrome Web Store for malware.","Separately, Palo Alto Networks Unit 42 identified 18 browser extensions impersonating consumer brands to carry out affiliate marketing fraud."],"insights":["The extension's restriction to YouTube uses a simple substring match for 'youtube.com' anywhere in the URL, meaning it can be activated on any website simply by including that string, effectively giving it permission to run on all sites the user visits.","After removing an ad-injection SDK in June 2024, the extension's new owner added the dormant script injection capability in February 2025, indicating a strategic pivot from visible ad fraud to a stealthier, remotely activated backdoor.","Because the backdoor can be activated by a single server-side configuration change without any extension update or store review, it completely bypasses Chrome Web Store security oversight, staying invisible to both users and Google."],"referencedReports":[{"title":"BadBlocker: 11 Million Users, One Server Call Away from Compromise","url":"https://www.island.io/blog/badblocker-11-million-users-one-server-call-away-from-compromise","publisher":"Island","context":"The article's analysis of the Adblock for YouTube extension's dormant script injection capability and bypassable domain check is based on this research report.","category":"research","primary":true},{"title":"Affiliate Marketing Fraud via Brand Impersonation Extension Farm","url":"https://github.com/PaloAltoNetworks/Unit42-timely-threat-intel/blob/main/2026-06-24-affiliate-marketing-fraud-via-brand-impersonation-extension-farm.txt","publisher":"Palo Alto Networks Unit 42","context":"The article mentions this advisory as a concurrent finding of 18 browser extensions impersonating consumer brands for affiliate marketing fraud.","category":"advisory","primary":false}],"body":"\u003cp\u003eResearch by Island revealed that the Chrome extension \u0026ldquo;Adblock for YouTube\u0026rdquo; (ID: cmedhionkhpnakcndndgjdbohmhepckk), with over 10 million installs and a Featured badge, contains a dormant capability to execute arbitrary JavaScript on any website. This can be activated by a single server-side configuration change, requiring no extension update or Chrome Web Store review, and would leave no visible sign to the user. Although no malicious payload has been distributed through this path, the extension\u0026rsquo;s history includes a change of ownership in 2018, the removal of an ad-injection SDK in June 2024, and the addition of the dormant script injection infrastructure in February 2025.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the extension uses a custom scriptlet rule named \u0026ldquo;trusted-create-element\u0026rdquo; that allows the creation of arbitrary \u003ccode\u003e\u0026lt;script\u0026gt;\u003c/code\u003e elements, which could then access sensitive data like cookies, account sessions, and page content. While the extension is intended to run only on YouTube, its activation check merely verifies if the string \u0026ldquo;youtube.com\u0026rdquo; appears anywhere in the URL, ignoring hostname or frame origin. This can be easily bypassed on any website by including that string in a path or query parameter, effectively granting the extension the ability to operate on all visited sites.\u003c/p\u003e\n\n\u003cp\u003eThe risk is compounded by the fact that three related extensions from the same owner—Adblock for Chrome, Adblock for You, and AdBlock Suite—were previously removed from the Chrome Web Store for malware. Island notes that the concern lies not in a single line of code but in the combination of a high-install extension with all-site access, a remote-controlled injection path, prior ad-injection infrastructure, and a history of malicious extensions. Additionally, the article mentions a separate advisory from Palo Alto Networks Unit 42 about 18 browser extensions impersonating brands for affiliate marketing fraud, highlighting the broader issue of trust in browser extension supply chains.\u003c/p\u003e\n"},{"n":1,"title":"Order-tracking app Shop abused to push callback phishing attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/order-tracking-app-shop-abused-to-push-callback-phishing-attacks/","time":"19:45","priority":"SHOULD READ","score":82,"tldr":"Threat actors are abusing Shopify's popular Shop order-tracking app to inject fake purchase receipts into users' histories, making callback phishing scams appear more legitimate and tricking victims into divulging sensitive information or installing remote access software.","briefOverview":"\u003cp\u003eThreat actors are injecting fake purchase receipts into the order history of the Shop app, a legitimate order-tracking tool from Shopify. The fraudulent receipts impersonate brands like Norton, McAfee, Apple, and PayPal and display a phone number that victims call to dispute the supposed charges. When users call, they reach a scammer posing as a support agent who uses social engineering to steal account credentials, payment card details, one-time authentication codes, or trick them into installing remote access software.\u003c/p\u003e\n\n\u003cp\u003eThis attack represents a more effective evolution of callback phishing, because the fake receipts appear inside a trusted app that has over 50 million downloads on Google Play and 7 million ratings on Apple\u0026rsquo;s App Store. The inherent trust users place in the Shop app, combined with the shock of a large unauthorized purchase, makes them far more likely to respond and overlook red flags such as poor grammar.\u003c/p\u003e\n\n\u003cp\u003eResearchers from Gen Digital note that the exact method of inserting the fake receipts remains unknown, though Shop can aggregate order data from email parsing, account associations, and order workflows. No evidence indicates that Shop, Shopify, or any impersonated company has been compromised. Users are strongly advised not to call the listed numbers and instead to verify any suspicious charges directly with their bank, and those who have already disclosed sensitive information should immediately reset passwords and contact their card issuer.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Threat actors are inserting fake purchase receipts into the order history of the Shop app, a legitimate order-tracking app from Shopify.","The fake receipts impersonate brands like Norton, McAfee, Apple, and PayPal and display phone numbers that lead to scammers posing as support agents.","Scammers use these calls to trick victims into revealing account credentials, payment card details, authentication codes, or to install remote access software.","The abuse is a callback phishing technique that is more effective than email-based methods because users inherently trust the Shop app.","Users are advised not to call the numbers on suspicious receipts and to verify any alleged charges directly with their bank."],"insights":["The exact method by which scammers inject fake receipts into the Shop app remains unknown, even though it is being actively exploited, exposing a potential blind spot in how the app aggregates order data from email and other sources.","Because users inherently trust the Shop app, fake receipts appearing there are far more effective than traditional email-based callback phishing, marking a shift in the vectors attackers rely on to establish legitimacy.","Scammers exploit the shock of seeing a large unauthorized charge to override a victim's scrutiny, causing them to miss obvious red flags like poor grammar that would normally raise suspicion."],"referencedReports":[{"title":"Fake invoices in shopping apps","url":"https://www.gendigital.com/blog/insights/research/fake-invoices-shopping-apps","publisher":"Gen Digital","context":"The article reports on Gen Digital's findings that scammers are inserting fake purchase receipts into the Shop app to conduct callback phishing attacks.","category":"research","primary":true}],"body":"\u003cp\u003eThreat actors are injecting fake purchase receipts into the order history of the Shop app, a legitimate order-tracking tool from Shopify. The fraudulent receipts impersonate brands like Norton, McAfee, Apple, and PayPal and display a phone number that victims call to dispute the supposed charges. When users call, they reach a scammer posing as a support agent who uses social engineering to steal account credentials, payment card details, one-time authentication codes, or trick them into installing remote access software.\u003c/p\u003e\n\n\u003cp\u003eThis attack represents a more effective evolution of callback phishing, because the fake receipts appear inside a trusted app that has over 50 million downloads on Google Play and 7 million ratings on Apple\u0026rsquo;s App Store. The inherent trust users place in the Shop app, combined with the shock of a large unauthorized purchase, makes them far more likely to respond and overlook red flags such as poor grammar.\u003c/p\u003e\n\n\u003cp\u003eResearchers from Gen Digital note that the exact method of inserting the fake receipts remains unknown, though Shop can aggregate order data from email parsing, account associations, and order workflows. No evidence indicates that Shop, Shopify, or any impersonated company has been compromised. Users are strongly advised not to call the listed numbers and instead to verify any suspicious charges directly with their bank, and those who have already disclosed sensitive information should immediately reset passwords and contact their card issuer.\u003c/p\u003e\n"},{"n":7,"title":"New macOS malware embeds fake errors to confuse AI analysis tools","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-macos-malware-embeds-fake-errors-to-confuse-ai-analysis-tools/","time":"16:23","priority":"SHOULD READ","score":82,"tldr":"A new macOS malware named Gaslight embeds fake error messages and prompt injection strings to confuse AI-assisted analysis tools, attributed to a North Korean threat actor and demonstrating experimental AI-specific evasion techniques.","briefOverview":"\u003cp\u003eA new macOS malware named \u0026ldquo;Gaslight\u0026rdquo; was discovered that embeds a cascade of fabricated system-failure messages directly into its executable. These strings mimic developer logs, crash reports, and debugging output, using Markdown formatting and template placeholders to impersonate legitimate analysis data. The malware is a Rust binary with backdoor and information-stealing capabilities, but its most notable feature is the 3.5 KB payload of 38 fake \u0026ldquo;system\u0026rdquo; messages designed to interfere with AI-assisted malware analysis tools.\u003c/p\u003e\n\n\u003cp\u003eThe fake messages are intended as prompt injection content that causes LLM-based analysis pipelines to doubt the integrity of their own session. They include falsified token-expiration warnings, out-of-memory kills, Redis connection failures, and SQL injection alerts, all crafted to push an AI agent into aborting, truncating, or refusing analysis. SentinelOne, which identified the malware, attributes it with high confidence to a North Korean-linked threat actor and notes that the goal is not sandbox evasion but direct manipulation of the AI analyst\u0026rsquo;s perception.\u003c/p\u003e\n\n\u003cp\u003eThe findings indicate that threat actors are now experimenting with anti-analysis methods specifically tailored to undermine AI-powered security platforms. While the actual effectiveness of these techniques in bypassing real-world AI analysis has not been demonstrated, the approach marks a shift from traditional evasion toward adversarial confusion of automated reasoning systems. The discovery underscores the emerging risk that defenders\u0026rsquo; own AI tools may be targeted as an attack surface.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A newly discovered macOS malware named 'Gaslight' embeds fake system error messages and prompt injection strings within its binary to confuse AI-assisted malware analysis tools.","The malware contains 38 fabricated messages, such as crash reports and token-expiration warnings, designed to make AI analysis tools doubt the validity of their own session and abort or truncate analysis.","SentinelOne attributes the malware with high confidence to a North Korean-linked threat actor.","The technique represents experimental anti-analysis effort aimed at bypassing AI-assisted security platforms, though its effectiveness has not been demonstrated."],"insights":["By embedding fake system messages like token-expiration warnings and out-of-memory kills, the malware exploits the AI analysis tool's tendency to trust its own environment context, making it question the validity of its session and potentially abort analysis prematurely.","The technique marks a deliberate shift from traditional sandbox evasion to adversarial manipulation of LLM-based security tools, indicating that threat actors see AI-assisted analysis as a new attack surface rather than just a defensive enhancement.","The presence of 38 distinct fabricated messages covering diverse failure scenarios suggests a systematic effort to probe and overwhelm the reasoning boundaries of AI analysis pipelines, rather than relying on a single deceptive prompt."],"referencedReports":[{"title":"macOS.Gaslight: Rust Backdoor Turns Prompt Injection on the Analyst, Not the Sandbox","url":"https://www.sentinelone.com/labs/macos-gaslight-rust-backdoor-turns-prompt-injection-on-the-analyst-not-the-sandbox/","publisher":"SentinelOne","context":"The article is based on SentinelOne's discovery and technical analysis of the Gaslight malware, which is the primary source for the reported details.","category":"research","primary":true}],"body":"\u003cp\u003eA new macOS malware named \u0026ldquo;Gaslight\u0026rdquo; was discovered that embeds a cascade of fabricated system-failure messages directly into its executable. These strings mimic developer logs, crash reports, and debugging output, using Markdown formatting and template placeholders to impersonate legitimate analysis data. The malware is a Rust binary with backdoor and information-stealing capabilities, but its most notable feature is the 3.5 KB payload of 38 fake \u0026ldquo;system\u0026rdquo; messages designed to interfere with AI-assisted malware analysis tools.\u003c/p\u003e\n\n\u003cp\u003eThe fake messages are intended as prompt injection content that causes LLM-based analysis pipelines to doubt the integrity of their own session. They include falsified token-expiration warnings, out-of-memory kills, Redis connection failures, and SQL injection alerts, all crafted to push an AI agent into aborting, truncating, or refusing analysis. SentinelOne, which identified the malware, attributes it with high confidence to a North Korean-linked threat actor and notes that the goal is not sandbox evasion but direct manipulation of the AI analyst\u0026rsquo;s perception.\u003c/p\u003e\n\n\u003cp\u003eThe findings indicate that threat actors are now experimenting with anti-analysis methods specifically tailored to undermine AI-powered security platforms. While the actual effectiveness of these techniques in bypassing real-world AI analysis has not been demonstrated, the approach marks a shift from traditional evasion toward adversarial confusion of automated reasoning systems. The discovery underscores the emerging risk that defenders\u0026rsquo; own AI tools may be targeted as an attack surface.\u003c/p\u003e\n"},{"n":9,"title":"From San Pedro to Salinas: How a Chinese Framework “DCloud Uni-App” Powers a Global Scam Economy","source":"infoblox.com","sourceColorIdx":2,"link":"https://www.infoblox.com/blog/threat-intelligence/from-san-pedro-to-salinas-how-a-chinese-framework-dcloud-uni-app-powers-a-global-scam-economy/","time":"12:58","priority":"SHOULD READ","score":82,"tldr":"The Chinese DCloud Uni-App framework serves as the technical backbone for a massive, globally distributed scam economy encompassing over 236,000 domains, allowing centralized operators to rapidly build and deploy fraudulent investment platforms, pig-butchering schemes, and other scams; security teams can use its distinct code signatures to track and block this infrastructure.","briefOverview":"\u003cp\u003eInfoblox Threat Intel researchers have uncovered that the legitimate Chinese cross-platform development framework DCloud Uni-App serves as the technical foundation for a massive global scam economy, powering at least 236,493 fraudulent second-level domains since mid-2022. The framework\u0026rsquo;s reusable code fingerprints, which ship by default with every Uni-App project, allow researchers to track a vast population of scam sites spanning fake cryptocurrency exchanges, pig-butchering operations, wallet drainers, phishing templates, and rigged gambling platforms targeting victims in at least eight languages across every continent.\u003c/p\u003e\n\n\u003cp\u003eThe scam ecosystem gained momentum after the RainbowEx crypto Ponzi scheme—which defrauded roughly 20% of the population of San Pedro, Argentina—was publicly linked to DCloud in October 2024, after which new scam site registrations surged from a few thousand to approximately 15,000 per month. The template has since fueled physical-world fraud in the United States, including the Lightning Shared Scooter Co. investment scam that opened storefronts in at least eight U.S. cities and recruited local officials as unwitting promoters, and the currently active Yuechi Sharing Technology Ltd. bicycle scam, which weaponized a genuine U.S. Treasury FinCEN money-services business registration as a convincing legitimacy prop to deceive American victims.\u003c/p\u003e\n\n\u003cp\u003eTechnical analysis reveals that a significant share of this infrastructure appears to be centrally controlled, with coordinated domain registration dips suggesting large-scale operators responding to disruptions, while more sophisticated actors who strip DCloud\u0026rsquo;s default fingerprints to evade detection host on bulletproof providers like Hong Kong-based CTG Server at roughly double the rate of less-evasive operators. Enterprise exposure is diffuse but substantial: over 985 distinct enterprise customers across 25 industries generated more than five million DNS queries to DCloud-built scam domains, representing individual employees encountering these scams on personal devices during corporate network use, enabling defenders to block this fraud ecosystem at the DNS layer before users reach the malicious sites.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The DCloud Uni-App framework has been used to build at least 236,493 distinct second-level domain scam sites since 2022, with a steep increase in new registrations after the RainbowEx scam gained international media attention.","The same investment scam template family has fueled physical-world fraud operations in the United States, including the Lightning Shared Scooter Co. (LSSC) scooter scam and the currently active Yuechi Sharing Technology Ltd. bicycle scam, which obtained a genuine U.S. Treasury FinCEN MSB registration to appear legitimate.","Technical fingerprints, hosting patterns, and coordinated domain registration dips suggest one or more large centralized operators control a significant share of the DCloud-built investment scam infrastructure, with more evasive operators favoring bulletproof providers such as CTG Server.","Enterprise exposure is widespread but diffuse: over 985 distinct enterprise customers' devices generated more than five million DNS queries to DCloud-built scam domains, indicating employees are encountering these scams on personal devices and corporate networks.","The reusable code fingerprints of the DCloud framework and additional scam-specific markers give defenders a reliable way to detect and block this fraud ecosystem at the DNS layer before users can reach the scam websites."],"insights":["International press coverage of the RainbowEx scam's use of DCloud in October 2024 appears to have inadvertently advertised the framework to other criminals, causing a dramatic surge in new DCloud-built scam sites from a few thousand to approximately 15,000 per month.","Sophisticated scam operators now proactively obtain genuine U.S. Treasury FinCEN money-services business registrations not to actually run money businesses but as a convincing legitimacy prop, effectively weaponizing the government registration's own consumer-warning disclaimer.","Across multiple seemingly unrelated scam brands, the off-platform customer support chat uses a nearly identical script that funnels victims back to their \"recommender teacher\" instead of resolving issues, providing a behavioral fingerprint that defenders can use to link operations even when technical indicators vary.","DCloud scam operators who strip the framework's default fingerprints to evade detection host on bulletproof providers at roughly double the rate of less-evasive operators, indicating that operational security sophistication and infrastructure resilience go hand in hand."],"referencedReports":[{"title":"Spamhaus DROP ASN List","url":"https://www.spamhaus.org/drop/","publisher":"Spamhaus","context":"Used to identify bulletproof hosting providers (AS152194 CTG Server) among DCloud-built investment scam infrastructure.","category":"advisory","primary":true},{"title":"FinCEN Alert on Fraud Schemes Abusing Its Name (December 2024)","url":"https://www.fincen.gov/sites/default/files/2024-12/Alert-FinCEN-Scams-FINAL508.pdf","publisher":"Financial Crimes Enforcement Network (FinCEN)","context":"FinCEN published an alert warning that its MSB registration process was being abused by fraudsters, referenced in the context of Yuechi's legitimacy deceptions.","category":"advisory","primary":false},{"title":"BBB Warning: Pyramid Scheme Masquerading as Scooter Investment","url":"https://www.bbb.org/article/warnings/32252-bbb-warning-pyramid-scheme-masquerading-as-scooter-investment","publisher":"Better Business Bureau","context":"The BBB formally labeled Lightning Shared Scooter Co. (LSSC) a pyramid scheme, confirming the domains used.","category":"advisory","primary":false},{"title":"Caution – Lightning Shared Scooter Co. (LSSC)","url":"https://fcnb.ca/en/news-alerts/caution-lightning-shared-scooter-co-lssc","publisher":"Financial and Consumer Services Commission of New Brunswick","context":"A Canadian regulator issued a consumer alert confirming that LSSC was a scam, referenced among sources verifying the operation.","category":"advisory","primary":false},{"title":"Attorney General Ellison Warns Minnesotans About Electric Scooter Investment Scam","url":"https://www.ag.state.mn.us/Office/Communications/2025/07/23_ElectricScooterScam.asp","publisher":"Minnesota Attorney General's Office","context":"The Minnesota AG's office warned about LSSC, confirming its fraudulent nature.","category":"advisory","primary":false},{"title":"How I Got Approached by Yuechi Sharing Technology Ltd (YST) and Uncovered a Likely Ponzi Operation","url":"https://www.dehek.com/general/how-i-got-approached-by-yuechi-sharing-technology-ltd-ys-and-uncovered-a-likely-ponzi-operation/","publisher":"Danny De Hek","context":"An independent investigator's documented report walking through the YST recruitment funnel, used to corroborate the scheme's mechanics.","category":"research","primary":false}],"body":"\u003cp\u003eInfoblox Threat Intel researchers have uncovered that the legitimate Chinese cross-platform development framework DCloud Uni-App serves as the technical foundation for a massive global scam economy, powering at least 236,493 fraudulent second-level domains since mid-2022. The framework\u0026rsquo;s reusable code fingerprints, which ship by default with every Uni-App project, allow researchers to track a vast population of scam sites spanning fake cryptocurrency exchanges, pig-butchering operations, wallet drainers, phishing templates, and rigged gambling platforms targeting victims in at least eight languages across every continent.\u003c/p\u003e\n\n\u003cp\u003eThe scam ecosystem gained momentum after the RainbowEx crypto Ponzi scheme—which defrauded roughly 20% of the population of San Pedro, Argentina—was publicly linked to DCloud in October 2024, after which new scam site registrations surged from a few thousand to approximately 15,000 per month. The template has since fueled physical-world fraud in the United States, including the Lightning Shared Scooter Co. investment scam that opened storefronts in at least eight U.S. cities and recruited local officials as unwitting promoters, and the currently active Yuechi Sharing Technology Ltd. bicycle scam, which weaponized a genuine U.S. Treasury FinCEN money-services business registration as a convincing legitimacy prop to deceive American victims.\u003c/p\u003e\n\n\u003cp\u003eTechnical analysis reveals that a significant share of this infrastructure appears to be centrally controlled, with coordinated domain registration dips suggesting large-scale operators responding to disruptions, while more sophisticated actors who strip DCloud\u0026rsquo;s default fingerprints to evade detection host on bulletproof providers like Hong Kong-based CTG Server at roughly double the rate of less-evasive operators. Enterprise exposure is diffuse but substantial: over 985 distinct enterprise customers across 25 industries generated more than five million DNS queries to DCloud-built scam domains, representing individual employees encountering these scams on personal devices during corporate network use, enabling defenders to block this fraud ecosystem at the DNS layer before users reach the malicious sites.\u003c/p\u003e\n"},{"n":23,"title":"Inside the 2026 SMB threat landscape: From phishing and scams to fake AI tools","source":"securelist.com","sourceColorIdx":5,"link":"https://securelist.com/smb-threat-report-2026/120357/","time":"10:00","priority":"SHOULD READ","score":82,"tldr":"In 2026, attackers are exploiting the AI hype by disguising malware as popular AI tools—attacks on SMBs using such lures surged nearly 5x—while SMBs remain the primary target for initial access sales on dark web forums, often as stepping stones to larger enterprises.","briefOverview":"\u003cp\u003eIn the first four months of 2026, Kaspersky detected a dramatic shift in the SMB threat landscape: attacks where malware or potentially unwanted applications masqueraded as popular AI tools surged almost fivefold year-over-year, reaching 33,352 detections. This eclipsed the previously widespread tactic of disguising threats as office and collaboration suites (over 24,000 attacks) and rivaled the persistent abuse of fake messenger and video conferencing apps (nearly 415,000 attacks). New AI brands that gained popularity in 2026, such as Claude and OpenClaw, were already among the lures, demonstrating how quickly attackers align with hype cycles to compromise small businesses.\u003c/p\u003e\n\n\u003cp\u003eBeyond malware, phishing and scam campaigns targeted SMB credentials and funds through fraudulent AI contractor services, fake bank account offers for entrepreneurs, and bogus Facebook business page violation warnings that harvested passwords. Email remained a primary delivery channel, with schemes that exploited legitimate third-party platforms to bypass filters: one campaign sent fake OneDrive document notifications, another impersonated Apple about a nonexistent compliance issue, and a two-stage attack used a real Zoom Docs page to hide a phishing link behind a seemingly safe invitation to a nonexistent meeting. Malicious attachments with trivial lures, such as requests for the best quote on attached items, continued to deliver Trojans.\u003c/p\u003e\n\n\u003cp\u003eAnalysis of dark web forums showed that over half of all initial access offers for sale in early 2026 related to small and medium-sized organizations, although posts grew more targeted—those not specifying a region dropped by 56%. Regionally, posts concerning the Middle East, Africa, and Latin America increased, while those for Europe and APAC declined. This access can be used for ransomware, data theft, or as entry points into larger enterprises via trusted relationship attacks, which rose from 12.7% to 15.5% of initial vectors in 2025, underscoring that the poor security posture of SMBs poses risks far beyond the businesses themselves.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["From January to April 2026, Kaspersky solutions detected 33,352 attacks on SMBs that used malware disguised as five popular AI tools, an almost fivefold increase from the same period in 2025.","Kaspersky blocked 414,736 attacks on SMB users where malicious software or potentially unwanted applications were disguised as popular communication apps, showing that fake messenger and video conferencing software remains a widespread threat.","More than half of dark web forum posts offering initial access to corporate infrastructures in early 2026 related to small and medium-sized businesses, likely because they are less protected and can serve as trusted third parties for larger organizations.","Phishing and scam campaigns in 2026 used fake AI services, fake compliance issues from companies like Apple, and fraudulent online document notifications to steal business credentials, personal data, and money."],"insights":["AI-tool bait has overtaken traditional fake office and collaboration apps as the most common lure for malware targeting SMBs, reflecting how rapidly attackers adapt to the latest technology hype cycles.","Dark web posts offering initial access to companies became more targeted: posts that did not specify a region dropped by 56%, suggesting initial access brokers are moving toward tailored, unique offers rather than generic ones.","A notable phishing scheme uses a legitimate Zoom Docs page as an intermediate step, hiding the final phishing link behind a trusted cloud service to bypass email filters and lower victim suspicion."],"referencedReports":[{"title":"New SBE Council Survey: Small Businesses Confident About 2025 Year-End Performance; AI, Digital Tools and Multi-Channel Strategies Driving Growth and Competitiveness","url":"https://sbecouncil.org/2025/10/23/new-sbe-council-survey-small-businesses-confident-about-2025-year-end-performance-ai-digital-tools-and-multi-channel-strategies-driving-growth-and-competitiveness/","publisher":"Small Business \u0026 Entrepreneurship Council (SBE Council)","context":"Used to support the observation that attackers exploit SMBs' growing embrace of AI tools.","category":"research"
