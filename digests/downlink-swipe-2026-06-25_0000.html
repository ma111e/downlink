re chronically underfunded and understaffed, leading cybersecurity to be deprioritized and exposing them to cyberattacks.","Cybersecurity experts and threat intelligence initiatives tend to focus on high-value health-sector targets like major hospital networks and insurance companies, overlooking rural hospitals.","Limited cybersecurity resources mean fewer defenses, making rural hospitals attractive targets for ransomware and phishing attacks.","Rural hospitals are increasingly leveraging collaborative threat intelligence networks and basic cyber hygiene practices to close security gaps and better protect patient data."],"insights":["Rural hospitals, despite being lifelines for millions of Americans, are systematically overlooked by cybersecurity investment and policy, creating a dangerous blind spot that attackers actively exploit.","Collaborative threat intelligence networks, typically associated with well-resourced organizations, can provide a significant defensive lift even for hospitals with minimal budgets and lean IT staff.","Basic cyber hygiene practices, often neglected due to competing priorities, can close critical security gaps in rural healthcare environments without requiring large financial outlays."],"referencedReports":[],"body":"\u003cp\u003eMore than 2,000 rural hospitals across the United States serve as a critical healthcare lifeline for large swaths of the population, yet they are chronically underfunded and understaffed. With limited budgets and lean IT teams forced to prioritize patient care, cybersecurity often takes a back seat. This resource gap leaves these hospitals with far fewer defenses, making them attractive targets for ransomware and phishing attacks.\u003c/p\u003e\n\n\u003cp\u003eIn response, rural hospitals are increasingly turning to collaborative threat intelligence networks and basic cyber hygiene practices to close dangerous security gaps. Threat intelligence sharing allows even resource-constrained organizations to tap into collective knowledge about current threats, while fundamental hygiene steps provide practical defense without requiring large budgets. The article underscores the systemic neglect of rural facilities in cybersecurity investment and policy, and highlights how these low-cost approaches can make a meaningful difference in protecting patient data and ensuring continuity of care.\u003c/p\u003e\n"},{"n":16,"title":"ThreatsDay Bulletin: Smart TV Proxyware, 24-Year curl Bug, AI Crime Forums + 13 More Stories","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/threatsday-bulletin-smart-tv-proxyware.html","time":"12:24","priority":"MAY READ","score":40,"tldr":"This week's threats underscore that attackers don't need advanced techniques—forgotten credentials, hidden proxyware in smart TV apps, fake updates, and phishing through collaboration tools are still highly effective for compromise.","briefOverview":"\u003cp\u003eThis week\u0026rsquo;s ThreatDay bulletin illustrates how attackers continue to exploit mundane, forgotten weaknesses rather than sophisticated zero-days. Over a third of LG and Samsung smart TV apps reviewed by Spur Intelligence hide residential proxy SDKs from providers like Bright Data, Massive, and Oxylabs, silently selling the user\u0026rsquo;s internet connection without meaningful consent—LG and Samsung still lack policies to block this. At the same time, a 24-year-old flaw in curl (CVE-2026-8932) was disclosed that allows mTLS connection reuse when configuration options have changed, the oldest vulnerability ever reported in the library.\u003c/p\u003e\n\n\u003cp\u003eSeveral other incidents show the cost of overlooked credentials and configuration flaws. A single credential from a 2022 pilot was used by the Icarus extortionists to breach Salesforce data from over a dozen companies, including multiple cybersecurity firms like HackerOne and Recorded Future. Meanwhile, a maximum-severity mass assignment bug in self-hosted Hoppscotch (CVE-2026-50160) lets an unauthenticated attacker overwrite JWT signing keys and gain full server compromise in one HTTP request. Attacks are also increasingly abusing trusted workflows: an IAB linked to Payouts King ransomware uses fake Microsoft Teams IT calls to push the Edgecution browser extension, which exploits Chrome\u0026rsquo;s native messaging protocol to execute arbitrary commands on the host, and a separate phishing campaign weaponizes Outlook Groups and Microsoft 365 collaboration features.\u003c/p\u003e\n\n\u003cp\u003eThe bulletin also highlights a blurring of state and criminal operations, with NCC Group noting nation-state actors deliberately operating behind ransomware brands and sharing infrastructure to hide espionage. In the cybercrime underground, AI is a growing topic—threat actors discuss AI-enabled malware like ApexAI and PolyEngine, while others fear it will devalue their work. These developments, alongside exposed REDCap research data instances, BitB malware lures, and the conviction of Scattered Spider members for the $38M TfL hack, reinforce that the most dangerous threats exploit routine trust gaps rather than novel attack vectors.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Over one-third of LG and Samsung smart TV apps reviewed by Spur Intelligence contain hidden proxyware that can relay third-party traffic through the TV owner's internet connection without meaningful owner awareness or consent.","AISLE discovered six security flaws in curl, including CVE-2026-8932, the oldest reported curl vulnerability, which has been present in releases since March 2001.","A maximum-severity flaw (CVE-2026-50160) in self-hosted Hoppscotch allows an unauthenticated attacker to overwrite the JWT signing key via a single HTTP request, leading to complete server compromise.","Klue revealed that a stolen credential from a 2022 pilot was used by the Icarus extortionists to breach Salesforce data from numerous corporate customers, including multiple cybersecurity companies.","NCC Group reports that nation-state actors are increasingly adopting cybercriminal tactics and sharing infrastructure with ransomware groups to disguise espionage operations."],"insights":["Despite Amazon and Roku explicitly banning proxy services in their app stores, LG and Samsung have no equivalent policy, allowing over a third of reviewed smart TV apps to turn devices into residential proxy hosts without meaningful owner awareness.","The Icarus extortionists used a single credential from a 2022 pilot that was never revoked to breach Salesforce data from numerous cybersecurity companies, demonstrating how a forgotten temporary access can cause widespread damage years later.","The maximum-severity Hoppscotch vulnerability combines four independent weaknesses to let an unauthenticated attacker overwrite the JWT signing key and gain full server compromise in a single request, highlighting how mass assignment flaws can still slip through in modern frameworks.","A logic bug in curl (CVE-2026-8932) persisted unnoticed since March 2001, revealing that even foundational internet libraries can harbor critical oversights for decades.","Nation-state actors are deliberately operating behind established ransomware brands and sharing infrastructure with cybercriminal groups, deliberately blurring the line between espionage and financially motivated attacks to obscure attribution."],"referencedReports":[{"title":"AISLE Discovers 6 New CVEs in curl Including the Oldest Issue Ever Reported","url":"https://aisle.com/blog/aisle-discovers-6-new-cves-in-curl-including-the-oldest-issue-ever-reported","publisher":"AISLE","context":"AISLE published a blog detailing six newly discovered vulnerabilities in curl, including the oldest reported issue dating back to 2001.","category":"research","primary":false},{"title":"Hoppscotch CVE-2026-50160: Unauthenticated Takeover via Mass Assignment","url":"https://www.offgridsec.com/blog-hoppscotch-cve-2026-50160.html","publisher":"OffGrid Security","context":"OffGrid Security released a technical analysis of the critical Hoppscotch vulnerability discovered by their autonomous AI agent Kiro.","category":"research","primary":false},{"title":"GHSA-j542-4rch-8hwf: Unauthenticated Takeover in Self-Hosted Hoppscotch","url":"https://github.com/hoppscotch/hoppscotch/security/advisories/GHSA-j542-4rch-8hwf","publisher":"Hoppscotch Project Maintainers","context":"The Hoppscotch project's own security advisory disclosed the maximum-severity unauthenticated takeover flaw.","category":"advisory","primary":false},{"title":"Smart TV Apps Residential Proxy SDKs","url":"https://spur.us/blog/smart-tv-apps-residential-proxy-sdks","publisher":"Spur Intelligence","context":"Spur Intelligence's report revealed that over one-third of reviewed LG and Samsung smart TV apps contain hidden proxy software.","category":"research","primary":false},{"title":"Payouts King Ransomware IAB Deploys Edgecution Malware","url":"https://www.zscaler.com/blogs/security-research/payouts-king-ransomware-initial-access-broker-deploys-new-edgecution","publisher":"Zscaler ThreatLabz","context":"Zscaler ThreatLabz analyzed the Edgecution malware deployed by a Payouts King ransomware initial access broker via malicious Microsoft Teams messages.","category":"research","primary":false},{"title":"NCC Group Monthly Threat Pulse – Review of May 2026","url":"https://www.nccgroup.com/newsroom/ncc-group-monthly-threat-pulse-review-of-may-2026/","publisher":"NCC Group","context":"NCC Group's monthly threat intelligence report highlighted the growing convergence of nation-state and cybercriminal tactics.","category":"research","primary":false},{"title":"ClickFix Campaign Delivers macOS Infostealer via DMG","url":"https://github.com/PaloAltoNetworks/Unit42-timely-threat-intel/blob/main/2026-06-20-ClickFix-campaign-delivers-macOS-infostealer-via-DMG.txt","publisher":"Palo Alto Networks Unit 42","context":"Unit 42 documented a new ClickFix attack that tricks users into mounting a malicious DMG to install an Atomic macOS Stealer variant.","category":"research","primary":false},{"title":"Evasive ClickFix Injection Delivers RAT","url":"https://github.com/PaloAltoNetworks/Unit42-timely-threat-intel/blob/main/2026-06-05-%20Evasive-ClickFix-Injection-Delivers-RAT.txt","publisher":"Palo Alto Networks Unit 42","context":"Unit 42 detailed a separate multi-step ClickFix campaign using brandsquatting to deliver a cross-platform trojan.","category":"research","primary":false},{"title":"Phishing Through Collaboration","url":"https://www.fortra.com/blog/phishing-through-collaboration","publisher":"Fortra","context":"Fortra described a phishing campaign that abuses Microsoft 365 Groups and collaboration features to make malicious activity appear routine.","category":"research","primary":false},{"title":"AI in the Underground: Curiosity, Claims, and Concerns","url":"https://www.sophos.com/en-us/blog/ai-in-the-underground-curiosity-claims-and-concerns","publisher":"Sophos","context":"Sophos published an analysis revealing how cybercriminals are discussing and using AI in underground forums, alongside skepticism and economic concerns.","category":"research","primary":false},{"title":"REDCap Exposure Analysis","url":"https://censys.com/blog/redcap-exposure-analysis/","publisher":"Censys","context":"Censys uncovered over 8,500 exposed REDCap instances worldwide, providing context for recent espionage campaigns targeting research institutions.","category":"research","primary":false},{"title":"Bulgaria Licensed Surveillance Exports to Rights Violators","url":"https://www.hrw.org/news/2026/06/18/bulgaria-licensed-surveillance-exports-to-rights-violators","publisher":"Human Rights Watch","context":"Human Rights Watch published a report revealing Bulgaria issued export licenses for surveillance technology to countries with records of serious human rights violations.","category":"research","primary":false},{"title":"Malware Distribution via Browser-in-the-Browser Kit","url":"https://github.com/PaloAltoNetworks/Unit42-timely-threat-intel/blob/main/2026-06-22-malware-distribution-via-browser-in-the-browser-kit.txt","publisher":"Palo Alto Networks Unit 42","context":"Unit 42 reported a brandsquatting campaign using a reusable Browser-in-the-Browser phishing kit to distribute malware via fake update warnings.","category":"research","primary":false},{"title":"Browser-in-the-Browser Phishing Campaign","url":"https://github.com/PaloAltoNetworks/Unit42-timely-threat-intel/blob/main/2026-06-08-Browser-In-The-Browser-Pishing-Campaign.txt","publisher":"Palo Alto Networks Unit 42","context":"Unit 42 disclosed an earlier BitB campaign using OS-fingerprinted pop-ups to harvest Microsoft 365 credentials.","category":"research","primary":false}],"body":"\u003cp\u003eThis week\u0026rsquo;s ThreatDay bulletin illustrates how attackers continue to exploit mundane, forgotten weaknesses rather than sophisticated zero-days. Over a third of LG and Samsung smart TV apps reviewed by Spur Intelligence hide residential proxy SDKs from providers like Bright Data, Massive, and Oxylabs, silently selling the user\u0026rsquo;s internet connection without meaningful consent—LG and Samsung still lack policies to block this. At the same time, a 24-year-old flaw in curl (CVE-2026-8932) was disclosed that allows mTLS connection reuse when configuration options have changed, the oldest vulnerability ever reported in the library.\u003c/p\u003e\n\n\u003cp\u003eSeveral other incidents show the cost of overlooked credentials and configuration flaws. A single credential from a 2022 pilot was used by the Icarus extortionists to breach Salesforce data from over a dozen companies, including multiple cybersecurity firms like HackerOne and Recorded Future. Meanwhile, a maximum-severity mass assignment bug in self-hosted Hoppscotch (CVE-2026-50160) lets an unauthenticated attacker overwrite JWT signing keys and gain full server compromise in one HTTP request. Attacks are also increasingly abusing trusted workflows: an IAB linked to Payouts King ransomware uses fake Microsoft Teams IT calls to push the Edgecution browser extension, which exploits Chrome\u0026rsquo;s native messaging protocol to execute arbitrary commands on the host, and a separate phishing campaign weaponizes Outlook Groups and Microsoft 365 collaboration features.\u003c/p\u003e\n\n\u003cp\u003eThe bulletin also highlights a blurring of state and criminal operations, with NCC Group noting nation-state actors deliberately operating behind ransomware brands and sharing infrastructure to hide espionage. In the cybercrime underground, AI is a growing topic—threat actors discuss AI-enabled malware like ApexAI and PolyEngine, while others fear it will devalue their work. These developments, alongside exposed REDCap research data instances, BitB malware lures, and the conviction of Scattered Spider members for the $38M TfL hack, reinforce that the most dangerous threats exploit routine trust gaps rather than novel attack vectors.\u003c/p\u003e\n"},{"n":25,"title":"Beyond IOCs: AI-enabled threat intelligence","source":"blog.talosintelligence.com","sourceColorIdx":6,"link":"https://blog.talosintelligence.com/beyond-iocs-ai-enabled-threat-intelligence/","time":"18:00","priority":"MAY READ","score":40,"tldr":"AI, particularly large language models, can solve the threat intelligence indexing problem by cross-referencing unstructured strategic reports, enabling defenders to turn vague queries into tailored, actionable advice faster.","briefOverview":"\u003cp\u003eThe article argues that AI\u0026rsquo;s true advantage for defenders lies not in generating indicators but in solving the long-standing problem of indexing unstructured threat intelligence reports. While IOCs are easily shared in structured formats, the strategic and operational context needed to guide real-world responses remains locked in natural-language briefings with inconsistent naming. Large language models can identify synonyms and relate entities across disparate reports, enabling defenders to turn vague queries into tailored, actionable advice, provided we carefully manage the veracity of ingested data and the confidentiality of queries.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter\u0026rsquo;s featured technical deep-dive highlights how Windows threats increasingly abuse the Component Object Model (COM) to hide malicious activity. Malware such as Qakbot and WarmCookie leverages COM\u0026rsquo;s opaque GUIDs and indirect function calls for lateral movement, persistence, and evasion, making manual analysis extremely labor-intensive. Defenders are urged to prioritize COM triage and use specialist tools like OleView.NET, IDA’s COM Helper, and DispatchLogger to translate indirect calls into clear behaviors, alongside building static hunting rules for COM-based abuse.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, the article covers several breaking security stories: the FortiBleed campaign used custom FortiGate sniffers to steal credentials, two Scattered Spider members pleaded guilty in the UK for an attack on Transport for London, a 2022 credential at Klue led to customer data breaches, a new exploit chains a USB controller bug to bypass Apple’s SecureROM boot defenses, and a Windows 11 update introduces a Point-in-Time Restore feature.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The cybersecurity industry is effective at sharing atomic indicators of compromise but struggles to index and cross-reference the natural language content of strategic and operational threat intelligence reports.","Large language models (LLMs) can identify synonyms and relate entities across vast, unstructured threat intelligence datasets, making it easier to retrieve relevant reports and generate actionable advice.","Windows threats, including Qakbot and WarmCookie, increasingly abuse the Component Object Model (COM) to execute malicious activities while making manual analysis labor-intensive.","The FortiBleed campaign targeting Fortinet FortiGate devices used custom sniffers to harvest authentication secrets and steal credentials from compromised firewalls.","Two individuals associated with the Scattered Spider group pleaded guilty in the United Kingdom to charges from a 2024 cyber attack affecting Transport for London."],"insights":["The real breakthrough for AI in threat intelligence is not in generating detection rules, but in indexing and cross-referencing unstructured strategic reports that are currently siloed by inconsistent naming conventions, making vague queries suddenly actionable.","Defenders routinely overlook critical pieces of an infection chain because they do not prioritize COM analysis during triage; malicious COM usage hides behind opaque GUIDs and indirect function calls that blend in with legitimate system activity.","The promise of personal, domain-specific LLMs lies in returning tailored, specific advice from even the vaguest natural-language queries, but this will only be safe if the ingested data's accuracy and the confidentiality of queries are rigorously managed."],"referencedReports":[],"body":"\u003cp\u003eThe article argues that AI\u0026rsquo;s true advantage for defenders lies not in generating indicators but in solving the long-standing problem of indexing unstructured threat intelligence reports. While IOCs are easily shared in structured formats, the strategic and operational context needed to guide real-world responses remains locked in natural-language briefings with inconsistent naming. Large language models can identify synonyms and relate entities across disparate reports, enabling defenders to turn vague queries into tailored, actionable advice, provided we carefully manage the veracity of ingested data and the confidentiality of queries.\u003c/p\u003e\n\n\u003cp\u003eThe newsletter\u0026rsquo;s featured technical deep-dive highlights how Windows threats increasingly abuse the Component Object Model (COM) to hide malicious activity. Malware such as Qakbot and WarmCookie leverages COM\u0026rsquo;s opaque GUIDs and indirect function calls for lateral movement, persistence, and evasion, making manual analysis extremely labor-intensive. Defenders are urged to prioritize COM triage and use specialist tools like OleView.NET, IDA’s COM Helper, and DispatchLogger to translate indirect calls into clear behaviors, alongside building static hunting rules for COM-based abuse.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, the article covers several breaking security stories: the FortiBleed campaign used custom FortiGate sniffers to steal credentials, two Scattered Spider members pleaded guilty in the UK for an attack on Transport for London, a 2022 credential at Klue led to customer data breaches, a new exploit chains a USB controller bug to bypass Apple’s SecureROM boot defenses, and a Windows 11 update introduces a Point-in-Time Restore feature.\u003c/p\u003e\n"},{"n":33,"title":"Health-ISAC AAMI eXhange Interview – Medical Device Security","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/health-isac-aami-exhange-interview-medical-device-security/","time":"20:42","priority":"MAY READ","score":40,"tldr":"Health-ISAC’s Medical Device Security Analyst Taylor Porter discussed the latest threats facing medical devices during an interview at the AAMI eXchange conference.","briefOverview":"\u003cp\u003eOn June 25, 2026, Health-ISAC’s Medical Device Security Analyst Taylor Porter participated in an interview at the AAMI eXchange conference. Speaking with AAMI Connect hosts Danielle McGeary and Robert Burroughs, Porter addressed the latest threats confronting medical device security. The conversation brought together industry stakeholders to share real-world intelligence on evolving risks to connected healthcare devices.\u003c/p\u003e\n\n\u003cp\u003eThe article positions this interview within a broader collection of related resources. Those resources span topics such as rural hospital threat intelligence adoption, FDA draft guidance on AI medical devices, nation-state threat campaigns, and GenAI chat tool oversight. This grouping reflects the increasingly interconnected nature of medical device security with AI governance, geopolitical threats, and healthcare infrastructure resilience.\u003c/p\u003e\n\n\u003cp\u003eWhile the article does not disclose the specific threats discussed, it underscores the importance of cross-sector information sharing. The AAMI eXchange forum provides a venue for healthcare delivery organizations, device manufacturers, and security analysts to align on emerging threats. The inclusion of resource links suggests that the interview is part of a wider effort to guide the healthcare sector\u0026rsquo;s defense posture against both conventional and AI-related device security challenges.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Health-ISAC's Medical Device Security Analyst Taylor Porter participated in an interview at the AAMI eXchange conference on June 25, 2026.","During the interview with AAMI Connect, Porter discussed the latest threats affecting medical device security.","AAMI Connect hosts Danielle McGeary and Robert Burroughs were pictured alongside the interview coverage.","The article provides links to related resources on topics such as rural hospital cybersecurity, AI adoption in healthcare, and China-nexus threat groups."],"insights":["The related resources list connects medical device security directly to AI governance concerns — including FDA draft guidance on AI devices and a VA OIG report on GenAI chat tools — indicating that emerging device threats increasingly involve AI-specific risks rather than just traditional cybersecurity vulnerabilities.","The inclusion of a resource about China-nexus threat groups targeting US and Canadian medical research alongside device security content signals that nation-state actors are now viewed as relevant to the medical device threat conversation, not only to data theft or espionage.","The pairing of rural hospital threat intelligence adoption with medical device security coverage highlights a recognized disparity: smaller healthcare facilities with limited resources face the same device security challenges as larger institutions but may lack equivalent defenses."],"referencedReports":[],"body":"\u003cp\u003eOn June 25, 2026, Health-ISAC’s Medical Device Security Analyst Taylor Porter participated in an interview at the AAMI eXchange conference. Speaking with AAMI Connect hosts Danielle McGeary and Robert Burroughs, Porter addressed the latest threats confronting medical device security. The conversation brought together industry stakeholders to share real-world intelligence on evolving risks to connected healthcare devices.\u003c/p\u003e\n\n\u003cp\u003eThe article positions this interview within a broader collection of related resources. Those resources span topics such as rural hospital threat intelligence adoption, FDA draft guidance on AI medical devices, nation-state threat campaigns, and GenAI chat tool oversight. This grouping reflects the increasingly interconnected nature of medical device security with AI governance, geopolitical threats, and healthcare infrastructure resilience.\u003c/p\u003e\n\n\u003cp\u003eWhile the article does not disclose the specific threats discussed, it underscores the importance of cross-sector information sharing. The AAMI eXchange forum provides a venue for healthcare delivery organizations, device manufacturers, and security analysts to align on emerging threats. The inclusion of resource links suggests that the interview is part of a wider effort to guide the healthcare sector\u0026rsquo;s defense posture against both conventional and AI-related device security challenges.\u003c/p\u003e\n"},{"n":8,"title":"Breach At The Beach: The Ultimate Entra ID Training Experience","source":"varonis.com","sourceColorIdx":9,"link":"https://www.varonis.com/blog/breach-at-the-beach-ctf","time":"13:02","priority":"MAY READ","score":35,"tldr":"Varonis Threat Labs launched Breach at the Beach, a free online CTF that trains defenders to detect real-world Entra ID attack techniques, offering CPE credits and in-person prizes at Black Hat USA and DEF CON.","briefOverview":"\u003cp\u003eVaronis Threat Labs researchers Doron Kapah and Mark Vaitsman created Breach at the Beach, a free online CTF designed to give security practitioners hands-on experience detecting real-world Entra ID attack techniques. The game follows Pixel, Varonis’ threat-detecting cat, as she investigates a breach in Entra ID, guiding players through challenges based on actual cases the researchers have encountered in customer environments.\u003c/p\u003e\n\n\u003cp\u003eThe CTF emphasizes recognizing when threat actors weaponize legitimate Entra ID features rather than exploiting misconfigurations. It was deliberately constructed to resist solution by AI assistants, ensuring players absorb the lessons directly. The challenges reflect modern concerns such as the rapid growth of non-human identities expanding the attack surface, and the pressure on organizations to adopt AI while security infrastructure lags behind.\u003c/p\u003e\n\n\u003cp\u003eThe experience awards one CPE credit per completed stage, a themed badge, and a certificate of completion. Players who finish by August 6, 2026, are entered into a drawing for a $2,000 gift card, and the researchers will host in-person sessions at Black Hat USA 2026 and DEF CON 34’s Cloud Village, where top competitors can win additional prizes.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Varonis Threat Labs researchers Doron Kapah and Mark Vaitsman created Breach at the Beach, a free online CTF that lets security practitioners practice detecting real-world Entra ID attack techniques through hands-on challenges.","The CTF is designed to teach players how threats abuse legitimate Entra ID features, not misconfigurations, and was intentionally built to prevent AI assistants from solving the challenges so that participants genuinely absorb the lessons.","Completing all four stages of the CTF awards participants CPE credits, a certificate of completion, and entry into a drawing for a $2,000 gift card if finished by August 6 during Black Hat USA.","The exercise is grounded in actual attacks investigated by Varonis researchers, covering modern concerns like non-human identities and AI-related visibility gaps that many defenders miss in their daily work.","The researchers will present and assist players in person at Black Hat USA 2026 and DEF CON 34’s Cloud Village, where top DEF CON participants can also compete for prizes."],"insights":["The CTF was deliberately designed to resist solution by LLMs, a precaution that reflects how rapidly AI assistance has become a concern in training and education, as it was not a consideration for researchers just a year or two ago.","The challenges focus on detecting when attackers weaponize otherwise legitimate Entra ID features, shifting the emphasis away from misconfigurations and toward recognizing abuse of intended functionality.","Organizations are under pressure to adopt AI quickly while their security infrastructure lags behind, creating a complexity that fundamentally reshapes how defenders must approach protection and visibility.","Non-human identities are proliferating faster than human identities, expanding the attack surface and introducing monitoring and detection difficulties that many security practitioners do not regularly encounter."],"referencedReports":[],"body":"\u003cp\u003eVaronis Threat Labs researchers Doron Kapah and Mark Vaitsman created Breach at the Beach, a free online CTF designed to give security practitioners hands-on experience detecting real-world Entra ID attack techniques. The game follows Pixel, Varonis’ threat-detecting cat, as she investigates a breach in Entra ID, guiding players through challenges based on actual cases the researchers have encountered in customer environments.\u003c/p\u003e\n\n\u003cp\u003eThe CTF emphasizes recognizing when threat actors weaponize legitimate Entra ID features rather than exploiting misconfigurations. It was deliberately constructed to resist solution by AI assistants, ensuring players absorb the lessons directly. The challenges reflect modern concerns such as the rapid growth of non-human identities expanding the attack surface, and the pressure on organizations to adopt AI while security infrastructure lags behind.\u003c/p\u003e\n\n\u003cp\u003eThe experience awards one CPE credit per completed stage, a themed badge, and a certificate of completion. Players who finish by August 6, 2026, are entered into a drawing for a $2,000 gift card, and the researchers will host in-person sessions at Black Hat USA 2026 and DEF CON 34’s Cloud Village, where top competitors can win additional prizes.\u003c/p\u003e\n"},{"n":5,"title":"The Four Elevations of Effective Fraud Prevention","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/the-four-elevations-of-effective-fraud-prevention/","time":"14:01","priority":"MAY READ","score":30,"tldr":"Effective fraud prevention requires monitoring at transaction, account, platform, and network levels to detect sophisticated schemes like account takeovers early, using behavioral signals and shared intelligence.","briefOverview":"\u003cp\u003eThe article presents a framework for fraud prevention built on four elevations: transaction, account, platform, and network monitoring. It argues that relying solely on isolated transaction checks allows sophisticated attackers to mimic legitimate behavior and evade detection. The approach calls for continuous visibility across every customer touchpoint, from account creation to customer service, to build a complete behavioral profile.\u003c/p\u003e\n\n\u003cp\u003eA detailed bank fraud case illustrates the gaps. A fraudster calls customer service, passes knowledge-based verification using purchased identity data, resets access, adds an authorized user, and moves funds in amounts that mirror the legitimate account holder’s past transactions. At the transaction level, nothing triggers an alert, but account-level signals—new phone numbers, updated contact details, fast-timeline card orders, and unfamiliar devices—make the attack obvious when viewed together. Platform-level correlation across multiple accounts further reveals shared addresses, devices, and geolocations, uncovering fraud rings operating in parallel.\u003c/p\u003e\n\n\u003cp\u003eThe highest elevation, the network layer, lets organizations leverage threat intelligence from peer institutions. Suspicious phone numbers, devices, shipping addresses, and authorized user names reported by one victim platform can be used to block attacks in real time at another. This shared visibility reduces the window of exposure and prevents fraudsters from reusing the same tools across targets, dramatically improving the accuracy and speed of fraud responses without increasing customer friction.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Effective fraud prevention requires monitoring every customer touchpoint, from account creation to checkout and customer service interactions.","Four elevations are necessary: transaction, account, platform, and network levels, each providing deeper context to detect advanced fraud methods.","Account-level monitoring contrasts a fraudster's behavior against historical trusted activity, quickly revealing suspicious actions like changing contact info or ordering additional cards.","Platform-level monitoring groups accounts to identify fraud rings and multi-account attacks using shared geolocation, device intelligence, and IP resolution.","Network-level partnerships allow organizations to act on known fraud indicators (e.g., phone numbers, devices, addresses) reported by peers, stopping attacks immediately."],"insights":["Customer service channels are an underserved fraud vector where attackers exploit weak knowledge-based verifications to reset access and add authorized users.","Fraudsters carefully mimic historical transaction amounts to avoid tripping siloed fraud checks, making behavioral mimicry a compelling evasion technique.","Sharing fraud indicators across platforms via network partnerships allows organizations to stop attacks instantly using data first seen by peers, dramatically reducing exposure time."],"referencedReports":[],"body":"\u003cp\u003eThe article presents a framework for fraud prevention built on four elevations: transaction, account, platform, and network monitoring. It argues that relying solely on isolated transaction checks allows sophisticated attackers to mimic legitimate behavior and evade detection. The approach calls for continuous visibility across every customer touchpoint, from account creation to customer service, to build a complete behavioral profile.\u003c/p\u003e\n\n\u003cp\u003eA detailed bank fraud case illustrates the gaps. A fraudster calls customer service, passes knowledge-based verification using purchased identity data, resets access, adds an authorized user, and moves funds in amounts that mirror the legitimate account holder’s past transactions. At the transaction level, nothing triggers an alert, but account-level signals—new phone numbers, updated contact details, fast-timeline card orders, and unfamiliar devices—make the attack obvious when viewed together. Platform-level correlation across multiple accounts further reveals shared addresses, devices, and geolocations, uncovering fraud rings operating in parallel.\u003c/p\u003e\n\n\u003cp\u003eThe highest elevation, the network layer, lets organizations leverage threat intelligence from peer institutions. Suspicious phone numbers, devices, shipping addresses, and authorized user names reported by one victim platform can be used to block attacks in real time at another. This shared visibility reduces the window of exposure and prevents fraudsters from reusing the same tools across targets, dramatically improving the accuracy and speed of fraud responses without increasing customer friction.\u003c/p\u003e\n"},{"n":15,"title":"Surviving the Mythos Era: Richard Bejtlich on the Case for NDR","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/surviving-mythos-era-richard-bejtlich.html","time":"11:17","priority":"MAY READ","score":30,"tldr":"Security teams should adopt network detection and response (NDR) with hypothesis-driven threat hunting to improve interdiction and gather defensible evidence during investigations.","briefOverview":"\u003cp\u003eThe article presents the case for network detection and response (NDR) as a crucial component of modern security operations, arguing that traditional alert-based defenses are failing in an era of accelerated vulnerability discovery. It introduces Richard Bejtlich’s free guide, \u003cem\u003eNDR Essentials: A Practical Guide to Network Detection and Response\u003c/em\u003e, published in partnership with Corelight, as a resource to help teams adopt evidence-driven investigations. The piece explains that many security teams cannot answer fundamental questions — what happened, what evidence exists, and whether they have the full picture — because they rely on alerts rather than defensible network evidence.\u003c/p\u003e\n\n\u003cp\u003eA central concept promoted is interdiction: disrupting malicious activity after initial compromise but before attackers achieve their objectives. The article explains that NDR enables this by providing visibility through full packet captures, extracted files, transaction logs, and detections, which together allow analysts to isolate and contain threats. It emphasizes that prevention alone is insufficient, as demonstrated by the frequent success of stolen credentials, malware, and data exfiltration.\u003c/p\u003e\n\n\u003cp\u003eAdditional technical insights include a shift to hypothesis-driven threat hunting, where analysts query network logs to validate theories about adversarial techniques, and the integration of AI to optimize alert frameworks, automate triage, and coordinate tools while retaining human verification. Operational recommendations such as a zero-baseline alert strategy and treating every alert as an investigation trigger are offered to reduce fatigue and improve evidence collection, ultimately helping practitioners answer the key investigative questions with confidence.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Alerts are becoming less useful as vulnerability discovery accelerates, so security teams need validated evidence of active exploit and exposure rather than just more raw telemetry.","Resilient security programs should focus on interdiction — identifying and disrupting malicious activity before attackers achieve their objectives.","Threat hunting must start with a hypothesis about adversarial techniques, then analysts query network logs and sessions to validate or disprove that theory.","AI can assist network detection and response by optimizing alert frameworks, enabling agentic triage, and coordinating tools, but human verification remains a critical control point.","A 'zero-baseline' strategy for initial alert rules prevents alert fatigue, and every alert should be treated as the start of an investigation, not a conclusive definition of an event."],"insights":["Adopting a 'zero-baseline' strategy—disabling all pre-enabled alert rules and only activating those proven valuable—preempts alert fatigue and makes investigations more effective.","Security programs that prioritize interdiction, isolating attackers after initial compromise rather than relying solely on prevention, can stop breaches before critical assets are exfiltrated or destroyed.","AI-assisted triage with autonomous agents handles playbook execution so that human analysts can concentrate on higher-level strategic decisions, upgrading the overall capability of the SOC.","Treating every alert as an investigation trigger rather than a definitive finding forces teams to gather evidence across network, endpoint, and cloud sources, ensuring they can conclusively answer investigative questions."],"referencedReports":[],"body":"\u003cp\u003eThe article presents the case for network detection and response (NDR) as a crucial component of modern security operations, arguing that traditional alert-based defenses are failing in an era of accelerated vulnerability discovery. It introduces Richard Bejtlich’s free guide, \u003cem\u003eNDR Essentials: A Practical Guide to Network Detection and Response\u003c/em\u003e, published in partnership with Corelight, as a resource to help teams adopt evidence-driven investigations. The piece explains that many security teams cannot answer fundamental questions — what happened, what evidence exists, and whether they have the full picture — because they rely on alerts rather than defensible network evidence.\u003c/p\u003e\n\n\u003cp\u003eA central concept promoted is interdiction: disrupting malicious activity after initial compromise but before attackers achieve their objectives. The article explains that NDR enables this by providing visibility through full packet captures, extracted files, transaction logs, and detections, which together allow analysts to isolate and contain threats. It emphasizes that prevention alone is insufficient, as demonstrated by the frequent success of stolen credentials, malware, and data exfiltration.\u003c/p\u003e\n\n\u003cp\u003eAdditional technical insights include a shift to hypothesis-driven threat hunting, where analysts query network logs to validate theories about adversarial techniques, and the integration of AI to optimize alert frameworks, automate triage, and coordinate tools while retaining human verification. Operational recommendations such as a zero-baseline alert strategy and treating every alert as an investigation trigger are offered to reduce fatigue and improve evidence collection, ultimately helping practitioners answer the key investigative questions with confidence.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;

const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>

      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

// Shared card chrome so the front and back faces render identical tokens.
function CardTitle({ children }) {
  return (

function numberedList(items, accent) {
  return (
    <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>

    </ul>
  );
}

  return (

          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <SourceTag article={article} />
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <CardTitle>{article.title}</CardTitle>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
        <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <div style={{ marginBottom: 12 }}>
          <CardTitle>{article.title}</CardTitle>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <SourceTag article={article} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
