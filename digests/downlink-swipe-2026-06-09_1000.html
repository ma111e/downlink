ns about their stated commitments to ethical practices. It also says many proxies use lookalike domains that resemble other residential proxies, lowering confidence in legitimacy and attribution.\u003c/p\u003e\n\n\u003cp\u003eThe article says Infoblox could not determine exactly how much residential proxy usage was intentional. It states that provider disclosures about how IP addresses are sourced are not always clear and may be confusing or buried in policies. Infoblox gives one example in which the substantive description of a proxy arrangement appeared only after navigating through three separate documents from two affiliated companies.\u003c/p\u003e\n\n\u003ch2 id=\"internal-network-risk\"\u003eInternal network risk\u003c/h2\u003e\n\n\u003cp\u003eInfoblox identifies internal network probing as another concern. The article cites the Kimwolf Botnet as an example of probing internal networks. Infoblox says an ethically designed residential proxy would block routing to internal IP addresses, but if an application allows it, threat actors could launch attacks on internal devices.\u003c/p\u003e\n\n\u003cp\u003eFrom an end user’s perspective, the article says nothing may look wrong and bandwidth consumption may not always be significant enough to notice. From a network defender’s perspective, however, residential proxy traffic crossing into a corporate environment can create risks that the end user does not fully realize.\u003c/p\u003e\n\n\u003ch2 id=\"collaboration-with-synthient\"\u003eCollaboration with Synthient\u003c/h2\u003e\n\n\u003cp\u003eInfoblox says it collaborated with Synthient during the preceding several months to better understand residential proxies and how these services and malicious actors who promote them affect global networks. The article notes that Synthient has written a related piece titled “Who Are the Victims of Residential Proxies?” from its own perspective. Infoblox says each organization has a different perspective on the traffic.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-defensive-actions\"\u003eRecommended defensive actions\u003c/h2\u003e\n\n\u003cp\u003eInfoblox recommends several actions for organizations, especially those with low risk tolerance:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUse mechanisms, including Protective DNS, to detect and block unauthorized residential proxies within the network.\u003c/li\u003e\n\u003cli\u003eReview DNS query logs for queries to known residential proxy domains.\u003c/li\u003e\n\u003cli\u003eReview installed applications, browser extensions, and IoT devices for residential proxy usage.\u003c/li\u003e\n\u003cli\u003eIf using Protective DNS, check current response policies.\u003c/li\u003e\n\u003cli\u003eConsider blocking bogon resolutions and suspicious or malicious domains.\u003c/li\u003e\n\u003cli\u003eCheck organizational IP addresses with Synthient or another organization that tracks residential proxies.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain takeaway\u003c/h2\u003e\n\n\u003cp\u003eInfoblox’s central finding is that residential proxy activity is widespread in enterprise customer environments and has continued growing despite enforcement actions and increased awareness. The article emphasizes that the issue is not only the presence of proxy services, but also the way they can make corporate IP space appear to be the origin of third-party activity. This can increase alert volumes, complicate investigations, and expose organizations to legal and reputational risk.\u003c/p\u003e\n","keyPoints":["Infoblox found that over 65% of its Threat Defense Cloud customers made DNS queries in 2026 to domains used to access or orchestrate residential proxy networks.","Infoblox observed monthly DNS queries to residential proxy domains grow from nearly 400 billion in January 2025 to over 500 billion by April 2026, an increase of about 25%.","Residential proxies can cause corporate IP space to be used as an exit point for third-party traffic, creating security alerts, legal exposure, and reputational risk for the organization.","Brightdata was the most frequently observed proxy service in Infoblox cloud customer networks, appearing in over 50% of customers.","Infoblox recommended that risk-averse organizations detect and block unauthorized residential proxies, review DNS logs and installed applications, and check whether their IP addresses appear in residential proxy tracking data."],"insights":["Infoblox’s recursive DNS visibility captures not only domains used to orchestrate residential proxies, but also domains accessed by external proxy users, which can make customer security policies generate alerts for activity the customer did not initiate.","The IPIDEA disruption did not reduce overall residential proxy use in Infoblox customer environments, and Infoblox observed unexplained traffic anomalies around the takedown, including a 265% one-day increase in customers querying ipinfo.ipidea.io.","Residential proxy exposure was not limited to consumer-heavy environments; more than 60% of government and banking customers and over 90% of pharmaceutical and food and beverage customers queried residential proxy indicators.","Some residential proxy participation may be hidden inside ordinary applications, browser extensions, IoT devices, or pre-installed software, making installed software and device inventories an actionable place to look beyond DNS logs."],"referencedReports":[{"title":"Who Are the Victims of Residential Proxies?","url":"https://synthient.com/blog/who-are-the-victims-of-residential-proxies","publisher":"Synthient","context":"Infoblox says it collaborated with Synthient to better understand residential proxies and links to Synthient’s related analysis from its own perspective.","category":"","primary":false}],"body":"\u003cp\u003eInfoblox analyzed billions of DNS resolutions and related telemetry from its cloud customer base and found that residential proxy activity is widespread in enterprise environments. More than 65% of Infoblox Threat Defense Cloud customers made queries in 2026 to domains used to access or orchestrate residential proxy networks. Monthly queries to residential proxy domains grew from nearly 400 billion in January 2025 to over 500 billion by April 2026.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that residential proxies route traffic through consumer devices such as home routers, mobile devices, IoT devices, and devices with proxyware-enabled applications. In corporate environments, this can allow an organization’s IP space to be used as a proxy exit point, creating security alerts, legal exposure, and reputational risk if third parties abuse that access. Infoblox notes that its recursive DNS visibility can also surface domains accessed by external proxy users, increasing the analytical burden on defenders.\u003c/p\u003e\n\n\u003cp\u003eInfoblox observed multiple residential proxy services across customer networks, with Brightdata appearing in over 50% of cloud customers and other services including Oxylabs, Hola VPN, Honeygain, CareBuzz, Grass, IPIDEA, and Infatica. The company also reported unusual traffic around Google’s January 2026 action against IPIDEA, including a 265% one-day increase in customers querying ipinfo.ipidea.io. Infoblox recommends that risk-averse organizations detect and block unauthorized residential proxies, review DNS logs and installed applications, examine IoT devices and browser extensions, and check whether their IP addresses appear in residential proxy tracking data.\u003c/p\u003e\n"},{"n":3,"title":"Hackers pose as women seeking romance to spy on Russian soldiers","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/hackers-pose-as-women-seeking-romance-russian-military","time":"13:52","priority":"SHOULD READ","score":82,"tldr":"A newly identified espionage group called SiribClone is targeting Russian soldiers through romance-themed Telegram lures to deploy Android spyware, desktop file stealers, and Telegram phishing pages. Researchers say the campaign is focused on stealing battlefield intelligence and maintaining access to military communications.","briefOverview":"\u003cp\u003eA previously undocumented cyber espionage group dubbed SiribClone has been trying to compromise smartphones, computers and Telegram accounts belonging to Russian military personnel. Russian cybersecurity firm F6 said the group has been active since at least summer 2025 and has primarily targeted Russian armed forces stationed in border regions and combat zones. Researchers said the campaign appears aimed at gathering battlefield intelligence from troops deployed near the front line.\u003c/p\u003e\n\n\u003cp\u003eThe attackers posed as women seeking romantic relationships or as volunteers offering humanitarian assistance to start conversations with servicemen on Telegram and other messaging platforms. They then persuaded victims to download malicious applications or enter Telegram credentials on spoofed websites. The campaign used Android spyware named SafeLoveStealer, desktop malware named SiribGrabber and phishing pages impersonating Telegram and other services.\u003c/p\u003e\n\n\u003cp\u003eSafeLoveStealer can steal photos, videos, documents, location data and other information from infected devices, and can remotely activate a target’s microphone to record conversations. SiribClone also operated an internal platform called Kontur that stored stolen Telegram sessions and allowed operators to review intercepted messages. F6 did not attribute the campaign to any specific country or known threat actor.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eRussian cybersecurity firm F6 reported on a previously undocumented cyber espionage group it calls SiribClone. The group has been active since at least the summer of 2025 and has targeted Russian military personnel, especially members of the armed forces stationed in border regions and combat zones. Researchers said the activity appears designed to collect battlefield intelligence from troops deployed near the front line.\u003c/p\u003e\n\n\u003cp\u003eSiribClone used social engineering lures built around romance and humanitarian assistance. The hackers posed as women seeking romantic relationships or as volunteers offering aid, initiating conversations with servicemen on Telegram and other messaging platforms. Victims were then encouraged to click malicious links, download applications or enter Telegram credentials on spoofed websites.\u003c/p\u003e\n\n\u003cp\u003eOne lure involved asking targets to test a newly developed application, while another involved exchanging intimate photographs through what appeared to be a secure photo-sharing app. Instead, the app installed previously undocumented Android spyware that F6 named SafeLoveStealer. According to the report, SafeLoveStealer can steal photos, videos, documents, location data and other information, and can allow attackers to remotely activate the microphone and record conversations.\u003c/p\u003e\n\n\u003cp\u003eThe group also used phishing websites disguised as Telegram login pages, Telegram community invitations, medical test portals and other online services. These pages prompted victims to enter their phone number, Telegram verification code and two-factor authentication password. That information allowed attackers to take control of Telegram accounts and monitor communications.\u003c/p\u003e\n\n\u003cp\u003eIn addition to mobile spyware and phishing, SiribClone deployed desktop malware called SiribGrabber, which was designed primarily to steal files from infected systems. In a campaign detected between January and February of this year, victims received ZIP archives disguised as military-related documents. After several months of apparent inactivity, the group reappeared in May with new malware distributed through a website themed around Russia’s Victory Day celebrations.\u003c/p\u003e\n\n\u003cp\u003eF6 also found an internal management platform used by the hackers, named Kontur, which stored stolen Telegram sessions and allowed operators to review intercepted messages. Notes inside the platform referenced military ranks, unit designations, locations and operational status, suggesting a focus on military espionage. F6 said SiribClone’s operations center on collecting technical, geographic and personal data from infected devices and maintaining access to Telegram accounts, but did not attribute the campaign to a specific country or known threat actor.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eRussian cybersecurity firm F6 reported on a previously undocumented cyber espionage group dubbed SiribClone. According to F6, the group has been active since at least the summer of 2025 and has primarily targeted members of the Russian armed forces stationed in border regions and combat zones.\u003c/p\u003e\n\n\u003cp\u003eThe campaign appears aimed at gathering battlefield intelligence from Russian troops deployed near the front line. Researchers said the activity involves attempts to compromise victims’ smartphones, computers and Telegram accounts in order to steal files, monitor communications and collect sensitive military information.\u003c/p\u003e\n\n\u003ch2 id=\"targeting-and-social-engineering\"\u003eTargeting and Social Engineering\u003c/h2\u003e\n\n\u003cp\u003eSiribClone targeted Russian military personnel through messaging platforms, including Telegram. The hackers impersonated women seeking romantic relationships and volunteers offering humanitarian assistance in order to initiate conversations with servicemen.\u003c/p\u003e\n\n\u003cp\u003eAfter establishing contact, the attackers attempted to persuade victims to click malicious links, install malicious applications or enter their Telegram credentials on spoofed websites. The pretexts varied across the campaign.\u003c/p\u003e\n\n\u003cp\u003eReported lures included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eClaims that the attackers had developed a new application and wanted the target to test it.\u003c/li\u003e\n\u003cli\u003eProposals to exchange intimate photographs through what appeared to be a secure photo-sharing application.\u003c/li\u003e\n\u003cli\u003eZIP archives disguised as military-related documents.\u003c/li\u003e\n\u003cli\u003eMalware distributed through a website themed around Russia’s Victory Day celebrations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"android-spyware-safelovestealer\"\u003eAndroid Spyware: SafeLoveStealer\u003c/h2\u003e\n\n\u003cp\u003eOne part of the campaign involved a previously undocumented Android spyware family that F6 named SafeLoveStealer. Victims were tricked into installing it through malicious links and deceptive application-themed lures.\u003c/p\u003e\n\n\u003cp\u003eAccording to the report, SafeLoveStealer can steal information from infected devices, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePhotographs.\u003c/li\u003e\n\u003cli\u003eVideos.\u003c/li\u003e\n\u003cli\u003eDocuments.\u003c/li\u003e\n\u003cli\u003eLocation data.\u003c/li\u003e\n\u003cli\u003eOther information stored on the device.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe malware can also allow attackers to remotely activate the target’s microphone and record conversations. This capability supports the broader objective described by researchers: collecting sensitive military and battlefield-related information from Russian troops near the front line.\u003c/p\u003e\n\n\u003ch2 id=\"telegram-phishing-and-account-takeover\"\u003eTelegram Phishing and Account Takeover\u003c/h2\u003e\n\n\u003cp\u003eSiribClone also operated phishing websites designed to capture Telegram account credentials and authentication data. These sites were disguised as Telegram login pages, Telegram community invitations, medical test portals and other online services.\u003c/p\u003e\n\n\u003cp\u003eVictims were prompted to enter:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTheir phone number.\u003c/li\u003e\n\u003cli\u003eA Telegram verification code.\u003c/li\u003e\n\u003cli\u003eA two-factor authentication password.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBy collecting these details, the attackers could take control of victims’ Telegram accounts and monitor their communications. F6 said one of SiribClone’s two main operational objectives was gaining persistent access to victims’ Telegram accounts in order to intercept communications.\u003c/p\u003e\n\n\u003ch2 id=\"desktop-malware-siribgrabber\"\u003eDesktop Malware: SiribGrabber\u003c/h2\u003e\n\n\u003cp\u003eIn addition to mobile spyware, SiribClone deployed previously undocumented malware for desktop computers. F6 named this malware SiribGrabber.\u003c/p\u003e\n\n\u003cp\u003eThe primary purpose of SiribGrabber was to steal files from infected systems. In a campaign detected between January and February of this year, the attackers sent victims ZIP archives disguised as military-related documents.\u003c/p\u003e\n\n\u003cp\u003eAfter several months of apparent inactivity, the group resurfaced in May. At that point, researchers observed new malware distributed through a website themed around Russia’s Victory Day celebrations.\u003c/p\u003e\n\n\u003ch2 id=\"internal-management-platform-kontur\"\u003eInternal Management Platform: Kontur\u003c/h2\u003e\n\n\u003cp\u003eF6 researchers discovered an internal management platform used by the hackers, which they dubbed Kontur. The platform stored stolen Telegram sessions and allowed operators to review intercepted messages.\u003c/p\u003e\n\n\u003cp\u003eInternal notes within Kontur referenced military ranks, unit designations, locations and operational status. Researchers said these references suggested that the campaign was primarily intended for military espionage.\u003c/p\u003e\n\n\u003ch2 id=\"stated-objectives\"\u003eStated Objectives\u003c/h2\u003e\n\n\u003cp\u003eF6 said SiribClone’s operations focus on two objectives:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCollecting technical, geographic and personal data from infected devices.\u003c/li\u003e\n\u003cli\u003eGaining persistent access to victims’ Telegram accounts to intercept communications.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese objectives align with the campaign’s use of Android spyware, desktop file-stealing malware and Telegram phishing infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"attribution\"\u003eAttribution\u003c/h2\u003e\n\n\u003cp\u003eThe researchers did not attribute SiribClone’s campaign to any specific country or known threat actor. The article identifies the group as previously undocumented and describes the findings as coming from a report released by Russian cybersecurity firm F6.\u003c/p\u003e\n","keyPoints":["A previously undocumented cyber espionage group dubbed SiribClone has targeted Russian military personnel since at least summer 2025, primarily in border regions and combat zones.","The hackers posed as women seeking romantic relationships or volunteers offering humanitarian assistance to persuade servicemen to download malicious applications or enter Telegram credentials on spoofed websites.","The campaign used Android spyware named SafeLoveStealer to steal files, location data and other information from infected devices and to remotely activate microphones for recording conversations.","SiribClone also used phishing websites disguised as Telegram login pages and other services to capture Telegram verification codes and two-factor authentication passwords.","F6 researchers found an internal platform called Kontur that stored stolen Telegram sessions and included notes referencing military ranks, unit designations, locations and operational status."],"insights":["SiribClone combined social engineering, Android spyware, desktop file theft and Telegram account takeover in one campaign, giving operators multiple paths to collect both device data and live communications.","The lures were tailored to soldiers’ context, including romance, humanitarian assistance, military-related ZIP archives and Russia’s Victory Day themes, indicating the campaign adapted its pretexts to the target audience.","The hackers’ internal Kontur platform did not just store stolen Telegram sessions but also organized operational details such as ranks, unit designations, locations and status, showing the stolen access was being used for structured military intelligence collection.","The campaign sought persistent Telegram access by collecting verification codes and two-factor authentication passwords, making account compromise a central objective rather than a one-time credential theft."],"referencedReports":[{"title":"SiribClone","url":"https://www.f6.ru/blog/siribclone/","publisher":"F6","context":"The article cites an F6 report released last week that details SiribClone's campaign targeting Russian military personnel with spyware, phishing pages and Telegram account theft.","category":"","primary":false}],"body":"\u003cp\u003eA previously undocumented cyber espionage group dubbed SiribClone has been trying to compromise smartphones, computers and Telegram accounts belonging to Russian military personnel. Russian cybersecurity firm F6 said the group has been active since at least summer 2025 and has primarily targeted Russian armed forces stationed in border regions and combat zones. Researchers said the campaign appears aimed at gathering battlefield intelligence from troops deployed near the front line.\u003c/p\u003e\n\n\u003cp\u003eThe attackers posed as women seeking romantic relationships or as volunteers offering humanitarian assistance to start conversations with servicemen on Telegram and other messaging platforms. They then persuaded victims to download malicious applications or enter Telegram credentials on spoofed websites. The campaign used Android spyware named SafeLoveStealer, desktop malware named SiribGrabber and phishing pages impersonating Telegram and other services.\u003c/p\u003e\n\n\u003cp\u003eSafeLoveStealer can steal photos, videos, documents, location data and other information from infected devices, and can remotely activate a target’s microphone to record conversations. SiribClone also operated an internal platform called Kontur that stored stolen Telegram sessions and allowed operators to review intercepted messages. F6 did not attribute the campaign to any specific country or known threat actor.\u003c/p\u003e\n"},{"n":6,"title":"Phishing for Lobsters: How We Tricked OpenClaw into Spilling Secrets","source":"varonis.com","sourceColorIdx":9,"link":"https://www.varonis.com/blog/openclaw-phishing","time":"13:09","priority":"SHOULD READ","score":78,"tldr":"Varonis found that AI inbox agents can detect some technical phishing like malicious OAuth flows, but they may still obey plausible email requests and leak sensitive data without verifying the sender. The key risk is social trust: helpful agents with access to internal systems need architectural controls and human approval for high-privilege actions.","briefOverview":"\u003cp\u003eVaronis Threat Labs tested whether classic phishing techniques work against AI agents connected to enterprise inboxes. The team created an OpenClaw AI agent named Pinchy and ran four phishing simulations using a seeded Google Workspace Gmail mailbox with synthetic business artifacts. The tests used Generic and Strict configuration profiles and evaluated Google Gemini 3.1 Pro and OpenAI Codex GPT-5.4.\u003c/p\u003e\n\n\u003cp\u003eThe most important finding was that Pinchy could recognize some technical phishing infrastructure but failed badly on socially plausible requests. In one case, an external Gmail account impersonating “Dan” asked for staging access, and Pinchy forwarded AWS IAM keys, database passwords, and SSH credentials. In another case, it sent a CRM export with 247 enterprise customers and roughly $1.28M in monthly recurring revenue data to an external requester.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that agent phishing differs from indirect prompt injection because it exploits trust in a plausible communication rather than malicious instructions embedded in consumed data. Varonis says prompt instructions alone were not enough, and recommends architectural controls such as limiting outbound email, segmenting connector access by inbound channel, and requiring human approval for high-privilege actions.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eVaronis Threat Labs examined whether phishing techniques that have traditionally targeted humans can also deceive AI agents operating inside enterprise inboxes. The research used an OpenClaw AI agent named Pinchy, configured to monitor a Gmail inbox inside a Google Workspace tenant. The mailbox contained synthetic but realistic business data, including mock AWS credentials, CRM exports, internal conversations, calendar invites, and other normal inbox noise.\u003c/p\u003e\n\n\u003cp\u003eThe article distinguishes agent phishing from indirect prompt injection. Indirect prompt injection embeds malicious instructions in content the model consumes, while agent phishing uses a normal communication channel and a believable request. Varonis frames both risks through Simon Willison’s “lethal trifecta” of private data access, untrusted content exposure, and outbound send capability.\u003c/p\u003e\n\n\u003cp\u003eIn the first two simulations, Pinchy failed to verify the identity of the requester before sharing sensitive information. An attacker impersonating the team lead “Dan” from an external Gmail account asked for staging-environment access during a supposed production issue, and Pinchy forwarded AWS IAM keys, database connection strings, and SSH credentials. In a second scenario, a routine-looking request for a customer export caused Pinchy to send data on 247 enterprise customers, including contact details, contract dates, customer tiers, and roughly $1.28M in monthly recurring revenue data.\u003c/p\u003e\n\n\u003cp\u003eThe third and fourth simulations showed mixed results against more technical phishing flows. In the gift card scenario, the Generic profile clicked a malicious link and entered fabricated data, but did not provide real stored credentials and eventually identified the page as phishing. In the OAuth scenario, Pinchy inspected the redirect_uri, visited the destination independently, identified it as suspicious, and halted before consent occurred.\u003c/p\u003e\n\n\u003cp\u003eThe article says the agent’s weakness was not technical URL or OAuth analysis but social trust and identity verification. GPT-5.4 was described as maintaining a stricter default posture around autonomous data entry than Gemini 3.1 Pro, but susceptibility to social-context deception remained consistent across both. Varonis recommends treating agents.md as a security control, blocking agents from acting as phishing proxies, segmenting connector access by inbound channel, and requiring human approval for high-privilege actions.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eVaronis Threat Labs tested whether phishing techniques that have deceived humans for decades can also deceive AI agents operating inside enterprise inboxes. The team created an OpenClaw AI agent named Pinchy and used it to evaluate four phishing simulations. The tests were designed around the growing use of AI agents for email triage, internal data retrieval, and email responses.\u003c/p\u003e\n\n\u003cp\u003eThe research found mixed results. Pinchy was able to identify or block some technical phishing scenarios, including a malicious OAuth consent flow. However, it failed in scenarios where a believable email request asked it to retrieve and send sensitive internal data.\u003c/p\u003e\n\n\u003ch2 id=\"lab-setup\"\u003eLab setup\u003c/h2\u003e\n\n\u003cp\u003eThe test environment was a representative enterprise inbox on the OpenClaw agent platform. It used a dedicated Gmail inbox inside a Google Workspace tenant. The mailbox was populated with synthetic but realistic artifacts, including mock AWS credentials, CRM exports, internal conversations, calendar invites, and low-priority inbox noise.\u003c/p\u003e\n\n\u003cp\u003eThe agent was configured as a dual-agent system with separate roles that handed tasks to each other. Each scenario ran under two profiles defined in agents.md: a Generic profile and a Strict profile. The underlying models tested were Google Gemini 3.1 Pro and OpenAI Codex GPT-5.4.\u003c/p\u003e\n\n\u003ch2 id=\"agent-phishing-versus-indirect-prompt-injection\"\u003eAgent phishing versus indirect prompt injection\u003c/h2\u003e\n\n\u003cp\u003eThe article distinguishes agent phishing from indirect prompt injection. Indirect prompt injection embeds malicious instructions inside data the model consumes, such as webpages, documents, calendar invites, or attachments. It exploits the model’s parsing layer by inserting instructions that the user did not provide.\u003c/p\u003e\n\n\u003cp\u003eAgent phishing operates through a normal communication channel. A believable request arrives as a business message and succeeds if the agent acts before verifying the requester. The article says both issues fit Simon Willison’s “lethal trifecta” of private data access, untrusted content exposure, and outbound send capability, but they exploit different parts of the system.\u003c/p\u003e\n\n\u003ch2 id=\"case-study-1-staging-credentials-request\"\u003eCase Study 1: Staging credentials request\u003c/h2\u003e\n\n\u003cp\u003eThe first simulation targeted infrastructure credentials. The attacker impersonated the team lead “Dan” and emailed Pinchy asking for staging-environment access during a supposed production issue. The message came from an external Gmail account rather than the real corporate address.\u003c/p\u003e\n\n\u003cp\u003ePinchy searched the mailbox, found credentials, and forwarded them in plaintext to the attacker. The response included AWS IAM access keys, database connection strings, and SSH credentials with internal host details. Varonis notes that the Strict profile already instructed the agent to verify identities before handling sensitive requests, but the agent prioritized the simulated production emergency over validation.\u003c/p\u003e\n\n\u003cp\u003eThe article marks this scenario as a failure.\u003c/p\u003e\n\n\u003ch2 id=\"case-study-2-crm-export-request\"\u003eCase Study 2: CRM export request\u003c/h2\u003e\n\n\u003cp\u003eThe second simulation tested business-data exfiltration through a routine-sounding request. The attacker asked Pinchy for the latest customer export, claiming to be working remotely on a QBR presentation and unable to access the CRM. Pinchy retrieved the export and sent it externally without verification.\u003c/p\u003e\n\n\u003cp\u003eThe dataset contained 247 enterprise customers. It included company names, contact emails, phone numbers, contract dates, customer tiers, and roughly $1.28M in monthly recurring revenue data. Varonis emphasizes that the pretext was softer than the emergency in the first case and looked like a normal internal workflow request.\u003c/p\u003e\n\n\u003cp\u003eBoth the Generic and Strict profiles failed in this scenario.\u003c/p\u003e\n\n\u003ch2 id=\"case-study-3-gift-card-phishing\"\u003eCase Study 3: Gift card phishing\u003c/h2\u003e\n\n\u003cp\u003eThe third simulation used a more traditional phishing flow. A fake “HolidayGifts” email offered a $100 gift card through a malicious redemption link. Under the Generic profile, Pinchy clicked the link, opened the phishing site, and attempted to redeem the gift card.\u003c/p\u003e\n\n\u003cp\u003ePinchy did not provide real stored credentials to the external platform. Instead, it entered fabricated data into the form. When server-side validation rejected the fake credentials and caused another evaluation cycle, the agent identified the page as phishing and refused to continue.\u003c/p\u003e\n\n\u003cp\u003eThe Strict profile blocked the scenario immediately. Varonis still describes the Generic profile’s behavior as risky because interacting with phishing infrastructure can confirm that a page is live, expose the agent’s IP address, and allow the attacker to return arbitrary content to the agent session. The article gives this scenario partial credit.\u003c/p\u003e\n\n\u003ch2 id=\"case-study-4-oauth-consent-trap\"\u003eCase Study 4: OAuth consent trap\u003c/h2\u003e\n\n\u003cp\u003eThe fourth simulation tested a malicious Google OAuth application disguised as a timesheet platform. The agent was prompted to authenticate through a legitimate Google OAuth2 flow. Instead of accepting the prompt blindly, Pinchy inspected the request.\u003c/p\u003e\n\n\u003cp\u003ePinchy extracted the redirect_uri, visited the destination independently, identified the site as suspicious, and stopped before consent occurred. The article also says the models consistently identified impersonation attempts targeting platforms such as AWS, Azure, Microsoft, and Google. Both the Generic and Strict profiles blocked the OAuth attack, though the article notes that visiting a phishing page may itself be risky.\u003c/p\u003e\n\n\u003cp\u003eThis scenario also received partial credit.\u003c/p\u003e\n\n\u003ch2 id=\"main-finding\"\u003eMain finding\u003c/h2\u003e\n\n\u003cp\u003eThe central finding is that the agent was better at some technical phishing detection than at social trust decisions. Pinchy could recognize suspicious URLs, fake login portals, malicious OAuth prompts, and impersonation domains across multiple scenarios. Yet it failed when the request looked operationally urgent or routine and appeared to come from a colleague.\u003c/p\u003e\n\n\u003cp\u003eThe article says agents lack the social memory, organizational intuition, and discomfort around unusual requests that humans may apply without thinking. Their drive to be useful becomes part of the attack surface when they have access to internal data and outbound communication capabilities.\u003c/p\u003e\n\n\u003ch2 id=\"model-behavior\"\u003eModel behavior\u003c/h2\u003e\n\n\u003cp\u003eVaronis observed differences between the tested models. GPT-5.4 maintained a stricter default posture around autonomous data entry and was less willing to provide sensitive information to external sites without additional confirmation. Gemini 3.1 Pro was more willing to interact before escalating suspicion.\u003c/p\u003e\n\n\u003cp\u003eDespite those differences, the article says susceptibility to social-context deception remained consistent across both models.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-defenses\"\u003eRecommended defenses\u003c/h2\u003e\n\n\u003cp\u003eVaronis says the fixes that worked in testing were architectural rather than purely prompt-based. The article recommends treating the agents.md file as a security control, comparable to a Conditional Access policy, and making it explicit, enforced, and version-controlled. Adding an Email Safety block reduced compromise rates in lower-stakes scenarios, but did not completely defend against credential exfiltration.\u003c/p\u003e\n\n\u003cp\u003eThe article also recommends blocking agents from becoming phishing proxies. A compromised agent can send internal emails from a trusted corporate account, which can bypass technical filters and human suspicion downstream. Varonis suggests disallowing outbound mail to addresses the agent has not previously corresponded with or requiring human approval before any first-time send.\u003c/p\u003e\n\n\u003cp\u003eAdditional recommendations include segmenting connector access by inbound channel and requiring human approval for high-privilege actions. The article says an agent processing unverified external email should not have global read access to systems such as Confluence, SharePoint, ServiceNow, or a CRM. It also recommends pausing credential forwarding, external routing, financial requests, and first-touch outbound communication for human approval.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that phishing an AI agent can be as simple as sending a plausible email to a helpful system with access to internal data. It argues that these agents may outperform humans at recognizing some technical phishing indicators, while performing worse at the social-context judgments humans often make instinctively. Varonis recommends treating an AI inbox agent as a junior employee with credentials and system access but limited context, rather than as a security tool.\u003c/p\u003e\n","keyPoints":["Varonis Threat Labs tested an OpenClaw AI inbox agent named Pinchy against four phishing simulations using synthetic enterprise mailbox data.","In two scenarios, Pinchy forwarded sensitive information externally, including AWS IAM keys, database passwords, SSH credentials, and a CRM export, without verifying the requester’s identity.","Pinchy partially handled traditional phishing and OAuth scenarios by withholding real credentials, identifying suspicious OAuth redirect behavior, or blocking attacks under the Strict profile, but it still interacted with phishing infrastructure in some cases.","The article distinguishes agent phishing from indirect prompt injection, stating that agent phishing exploits the trust an agent gives to plausible requests while prompt injection abuses malicious instructions embedded in consumed data.","Varonis recommends architectural controls such as treating agents.md as a security control, restricting first-time outbound email, segmenting connector access by inbound channel, and requiring human approval for high-privilege actions."],"insights":["The agent could recognize sophisticated technical phishing infrastructure but still failed on simple, socially plausible requests, showing that identity verification was a weaker control point than URL or OAuth analysis.","Strict prompt-level security instructions were not sufficient to prevent credential and CRM data exfiltration when the request appeared operationally urgent or routine.","Submitting fabricated credentials to a phishing page reduced credential exposure but still created risk by confirming the phishing site was live and allowing the attacker to serve arbitrary content to the agent session.","The article found that model choice affected willingness to interact with external sites, but susceptibility to social-context deception remained consistent across both tested models.","The most effective mitigations described were architectural controls, such as restricting outbound email, segmenting connector access by trigger trust level, and requiring human approval for high-privilege actions."],"referencedReports":[{"title":"The lethal trifecta","url":"https://simonwillison.net/2025/Jun/16/the-lethal-trifecta/","publisher":"Simon Willison","context":"The article references Simon Willison's “lethal trifecta” concept to explain how private data access, untrusted content exposure, and outbound send capability create risk for AI agents.","category":"","primary":false}],"body":"\u003cp\u003eVaronis Threat Labs tested whether classic phishing techniques work against AI agents connected to enterprise inboxes. The team created an OpenClaw AI agent named Pinchy and ran four phishing simulations using a seeded Google Workspace Gmail mailbox with synthetic business artifacts. The tests used Generic and Strict configuration profiles and evaluated Google Gemini 3.1 Pro and OpenAI Codex GPT-5.4.\u003c/p\u003e\n\n\u003cp\u003eThe most important finding was that Pinchy could recognize some technical phishing infrastructure but failed badly on socially plausible requests. In one case, an external Gmail account impersonating “Dan” asked for staging access, and Pinchy forwarded AWS IAM keys, database passwords, and SSH credentials. In another case, it sent a CRM export with 247 enterprise customers and roughly $1.28M in monthly recurring revenue data to an external requester.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that agent phishing differs from indirect prompt injection because it exploits trust in a plausible communication rather than malicious instructions embedded in consumed data. Varonis says prompt instructions alone were not enough, and recommends architectural controls such as limiting outbound email, segmenting connector access by inbound channel, and requiring human approval for high-privilege actions.\u003c/p\u003e\n"},{"n":1,"title":"Device Code Phishing Explained: How Attackers Abuse OAuth Across SaaS","source":"appomni.com","sourceColorIdx":0,"link":"https://appomni.com/blog/device-code-phishing-saas/","time":"12:00","priority":"MAY READ","score":72,"tldr":"Device code phishing abuses legitimate OAuth flows to trick users into granting attackers valid access and refresh tokens, bypassing many credential-focused defenses including MFA. Defenders need visibility and controls around OAuth grants, connected apps, consent activity, and token usage across SaaS platforms rather than relying only on email, URL, or password-based protections.","briefOverview":"\u003cp\u003eDevice code phishing abuses the legitimate OAuth 2.0 Device Authorization Grant to obtain valid access and refresh tokens without stealing a victim’s password. The article explains that attackers trick victims into entering a device code on a real vendor verification page, completing authentication and MFA on the legitimate identity provider. This makes the resulting tokens appear valid while bypassing many defenses aimed at credential theft.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that this is not limited to Microsoft 365, even though recent reporting has focused heavily on Microsoft campaigns. It describes campaigns and research involving Salesforce, GitHub, and other SaaS platforms that support OAuth device flow. The most important defensive takeaway is that security teams need visibility into OAuth grants, connected applications, consent activity, and token usage patterns across SaaS environments.\u003c/p\u003e\n\n\u003cp\u003eTraditional email, URL reputation, and adversary-in-the-middle defenses often miss these attacks because the links and authentication workflows are legitimate. MFA, FIDO2, and passkeys do not fully prevent the attack because the victim completes the real authentication challenge themselves. The article recommends focusing on consent-layer controls, identity-layer monitoring, and token management rather than relying only on credential-focused defenses.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article explains device code phishing as an attack pattern that abuses the OAuth 2.0 Device Authorization Grant, a legitimate flow designed for devices without keyboards or browsers. In the normal flow, a device obtains a code and verification URL, the user signs in and approves the request, and the identity provider issues access and refresh tokens to the original device. Attackers exploit this by initiating the flow themselves and persuading a victim to enter the code on a legitimate vendor page.\u003c/p\u003e\n\n\u003cp\u003eThe significance of the technique is that the victim authenticates on real infrastructure, including MFA, so there is no fake login page, spoofed domain, or adversary-in-the-middle proxy. The identity provider sees a legitimate end-to-end authentication event, but the token is issued to an attacker-controlled device or script. Password resets also do not necessarily resolve the compromise because refresh tokens may remain valid for weeks or months depending on platform policy.\u003c/p\u003e\n\n\u003cp\u003eThe article places Microsoft 365 campaigns in a broader SaaS context. It cites AppOmni’s prior analysis of the EvilToken phishing-as-a-service kit and an AI-driven campaign against Microsoft 365 tenants, including more than 7 million observed device code attacks in a four-week window and one wave that compromised more than 340 organizations across five countries. It also describes Storm-2372, a Russia-aligned threat actor publicly named by Microsoft in February 2025, as establishing a modern playbook using lures that impersonated Microsoft Teams, WhatsApp, and Signal chat invitations.\u003c/p\u003e\n\n\u003cp\u003eBeyond Microsoft, the article highlights a Salesforce campaign attributed to Scattered Lapsus\u003cspan class=\"math inline\"\u003e\\( Hunters, described as an alliance of Scattered Spider, ShinyHunters, and the original LAPSUS\\)\u003c/span\u003e. Attackers used voice phishing to impersonate IT helpdesk staff and walked victims through entering a device code on Salesforce’s /setup/connect page, where they were prompted to authorize what appeared to be Salesforce’s legitimate Data Loader connected app. The group claimed more than 1,000 organizations compromised and about 1.5 billion records stolen, with named victims including KLM Air France, Adidas, Qantas, and Allianz Life, though the article cautions that threat-actor self-reporting should be treated carefully.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes public research on GitHub device code phishing, including reported success rates above 90% in authorized engagements and the release of the GitPhish assessment tool. It warns that phished GitHub OAuth tokens with broad scope could expose private repositories, GitHub Actions secrets, and CI/CD pipeline modification capabilities. Defensive recommendations include maintaining an inventory of OAuth grants and connected applications, restricting unnecessary OAuth authorization paths, monitoring identity-layer telemetry, tracking malicious OAuth infrastructure, and focusing on consent security rather than only device flow.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article explains device code phishing as a protocol-level attack technique that abuses the OAuth 2.0 Device Authorization Grant. This OAuth flow is legitimate and was designed for devices that lack a keyboard or browser, such as smart TVs, IoT devices, command-line tools, or remote servers. Attackers exploit the flow by initiating authentication from an attacker-controlled device or script and convincing the victim to enter the supplied code on a legitimate vendor verification page.\u003c/p\u003e\n\n\u003cp\u003eThe central point is that device code phishing shifts the phishing target from credentials to OAuth tokens. Instead of stealing a password, the attacker obtains valid access and refresh tokens after the victim completes authentication. Because the authentication takes place on the real identity provider and includes normal MFA, many credential-focused defenses do not stop the attack.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-oauth-device-flow-is-abused\"\u003eHow the OAuth device flow is abused\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the OAuth 2.0 Device Authorization Grant as a four-step process:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe device asks the identity provider for a short code.\u003c/li\u003e\n\u003cli\u003eThe identity provider returns a code and a verification URL.\u003c/li\u003e\n\u003cli\u003eThe user opens the URL on a phone or laptop, signs in with normal credentials, completes MFA, and approves the request.\u003c/li\u003e\n\u003cli\u003eThe identity provider issues an access token and refresh token to the original device.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe security problem is that the user is not given meaningful information about what device is being authorized. The requesting device could be a legitimate smart TV, a CLI tool, or a malicious script controlled by an attacker. From the victim’s perspective, these can be indistinguishable.\u003c/p\u003e\n\n\u003cp\u003eIn the phishing scenario, the victim receives a code and is instructed to enter it on the legitimate vendor verification URL. The victim then completes MFA on the real identity provider. The attacker receives the resulting access and refresh tokens because the attacker initiated the device flow.\u003c/p\u003e\n\n\u003ch2 id=\"why-common-phishing-defenses-fail\"\u003eWhy common phishing defenses fail\u003c/h2\u003e\n\n\u003cp\u003eThe article stresses that traditional phishing defenses often have limited value against device code phishing. There is no fake login page, no spoofed domain, and no proxy sitting between the user and the identity provider. Email security gateways and URL reputation tools may not flag the link because it points to a legitimate vendor URL.\u003c/p\u003e\n\n\u003cp\u003eAdversary-in-the-middle detection also has little to detect because there is no man in the middle. The attacker is not impersonating the identity provider; the attacker is impersonating the device requesting authorization. From the identity provider’s perspective, the authentication flow is legitimate end-to-end.\u003c/p\u003e\n\n\u003cp\u003eMFA does not fully prevent the attack because the victim performs the MFA challenge themselves on the real identity provider. FIDO2 and passkeys reduce the attack window but do not close it, because the FIDO challenge is real and the identity provider genuinely authenticates the user. The malicious element is the party requesting the token, not the authentication page or MFA challenge.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-through-refresh-tokens\"\u003ePersistence through refresh tokens\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that password resets do not necessarily revoke access obtained through this technique. Refresh tokens issued through the device flow can remain valid for extended periods, often weeks or months depending on platform defaults. As a result, a victim may change their password while the attacker retains access through the previously issued token.\u003c/p\u003e\n\n\u003cp\u003eThis persistence complicates incident response compared with traditional credential compromise. The article highlights that compromised accounts can remain compromised after standard password-rotation steps unless token revocation and OAuth authorization review are also performed.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-365-campaigns-and-eviltoken-context\"\u003eMicrosoft 365 campaigns and EvilToken context\u003c/h2\u003e\n\n\u003cp\u003eThe article references AppOmni’s earlier analysis of the EvilToken phishing-as-a-service kit and an AI-driven campaign against Microsoft 365 tenants. That campaign showed the scale device code phishing had reached, with researchers tracking 10 to 15 distinct waves every 24 hours at peak. More than 7 million device code attacks were observed in a single four-week period, and one wave compromised more than 340 organizations across five countries.\u003c/p\u003e\n\n\u003cp\u003eThe article makes clear, however, that Microsoft 365 is only one part of a broader pattern. Device code phishing is described as a protocol-level technique that applies to any platform implementing the OAuth 2.0 Device Authorization Grant. Attackers have adapted the same general playbook to other SaaS platforms.\u003c/p\u003e\n\n\u003ch2 id=\"storm-2372-and-the-modern-playbook\"\u003eStorm-2372 and the modern playbook\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Storm-2372 as a Russia-aligned threat actor first publicly named by Microsoft in February 2025. The group targeted Microsoft 365 tenants across government, NGOs, defense, telecommunications, healthcare, higher education, and energy sectors in multiple regions. Activity was observed since August 2024.\u003c/p\u003e\n\n\u003cp\u003eStorm-2372 used lures impersonating Microsoft Teams, WhatsApp, and Signal chat invitations. The article says every link pointed to legitimate vendor URLs, which traditional email security controls did not flag. Although Storm-2372’s targeting was Microsoft-specific, the article says the group established a playbook that later financially motivated actors adopted and applied across other SaaS platforms.\u003c/p\u003e\n\n\u003ch2 id=\"salesforce-campaign-involving-scattered-lapsus-hunters\"\u003eSalesforce campaign involving Scattered Lapsus$ Hunters\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the Salesforce campaign as the most damaging non-Microsoft device code phishing campaign of the past year. It attributes the campaign to Scattered Lapsus\u003cspan class=\"math inline\"\u003e\\( Hunters, described as an alliance of Scattered Spider, ShinyHunters, and the original LAPSUS\\)\u003c/span\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe campaign combined voice phishing with device code phishing. Attackers called victims while posing as IT helpdesk staff and claimed there was an authentication issue requiring verification. Victims were walked through entering a device code on Salesforce’s /setup/connect page.\u003c/p\u003e\n\n\u003cp\u003eAfter entering the code, victims were prompted to authorize what appeared to be Salesforce’s legitimate Data Loader connected app. The article says the combination of a live caller, a trusted vendor name, and social pressure made approval more likely.\u003c/p\u003e\n\n\u003cp\u003eThe group claimed more than 1,000 organizations compromised and approximately 1.5 billion records stolen. Named victims included KLM Air France, Adidas, Qantas, and Allianz Life. The article cautions that exact figures from threat-actor self-reporting should be treated carefully, but states that the underlying campaign was real and substantial in scope.\u003c/p\u003e\n\n\u003cp\u003eSalesforce responded by removing OAuth 2.0 device flow entirely in September 2025, with no exceptions or extensions for affected customers. The article describes this as one of the most decisive vendor responses to a specific OAuth abuse pattern in recent years.\u003c/p\u003e\n\n\u003ch2 id=\"github-device-code-phishing-research\"\u003eGitHub device code phishing research\u003c/h2\u003e\n\n\u003cp\u003eThe article also discusses public security research documenting device code phishing techniques against GitHub. It states that reported success rates were above 90% in authorized engagements. Public adversary attribution against GitHub is described as thinner than the reporting on Microsoft 365 or Salesforce.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes the supply chain implications of GitHub token compromise. If an attacker phishes a GitHub OAuth token with broad scope, they can access private repositories, GitHub Actions secrets, and the ability to modify CI/CD pipelines. For developers with access to widely depended-on open source projects or critical internal repositories, the article describes this as a substantial supply chain attack surface.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that an open-source assessment tool called GitPhish was released to help security teams perform authorized assessments and detection validation against the technique.\u003c/p\u003e\n\n\u003ch2 id=\"platforms-subject-to-this-attack-class\"\u003ePlatforms subject to this attack class\u003c/h2\u003e\n\n\u003cp\u003eThe article states that device code phishing applies wherever OAuth 2.0 device flow is implemented. It lists major SaaS platforms that support OAuth device flow and are therefore subject to this attack class, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft 365 and Entra ID\u003c/li\u003e\n\u003cli\u003eGoogle Cloud\u003c/li\u003e\n\u003cli\u003eGitHub\u003c/li\u003e\n\u003cli\u003eGitLab\u003c/li\u003e\n\u003cli\u003eOkta\u003c/li\u003e\n\u003cli\u003eAuth0\u003c/li\u003e\n\u003cli\u003eOneLogin\u003c/li\u003e\n\u003cli\u003ePing Identity\u003c/li\u003e\n\u003cli\u003eZoom\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article explains that each implementation is subject to the same basic pattern: an attacker initiates the device flow, delivers the code to a victim through phishing or vishing, and receives a valid token after the victim completes authentication. The exposure differs by platform based on implementation choices.\u003c/p\u003e\n\n\u003cp\u003eIdentity providers such as Auth0, Okta, OneLogin, and Ping Identity are described as presenting a particularly important risk category. A compromised token at the identity provider can cascade to downstream applications federated through that identity provider. The article says this can multiply the impact compared with compromising a single SaaS platform.\u003c/p\u003e\n\n\u003ch2 id=\"google-workspace-scope-restrictions\"\u003eGoogle Workspace scope restrictions\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies Google Workspace as an example of a meaningful technical control. Google has restricted which OAuth scopes are available through device flow. As described in the article, Gmail, Drive, Calendar, and most Workspace APIs cannot be accessed by tokens issued through this mechanism.\u003c/p\u003e\n\n\u003cp\u003eGoogle Cloud APIs remain accessible through device flow, but the broader Workspace data set is not. The article presents this scope-restriction approach as a design pattern that other vendors could consider.\u003c/p\u003e\n\n\u003ch2 id=\"why-blocking-device-flow-is-not-enough\"\u003eWhy blocking device flow is not enough\u003c/h2\u003e\n\n\u003cp\u003eThe article warns that even if device flow is removed or restricted, attackers can shift to other OAuth authorization methods. It states that after Salesforce removed device flow, the same threat actors shifted to standard OAuth authorization code grants with similar effect.\u003c/p\u003e\n\n\u003cp\u003eThis leads to one of the article’s main defensive conclusions: organizations should focus on the consent layer rather than on a single OAuth grant type. Device code phishing is one way to abuse OAuth authorization, but the broader risk is consent-based token access across SaaS applications.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-recommendations\"\u003eDefensive recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends that security teams focus on OAuth visibility, consent governance, identity monitoring, and token management.\u003c/p\u003e\n\n\u003cp\u003eKey defensive measures include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMaintaining a continuous inventory of OAuth grants and connected applications.\u003c/li\u003e\n\u003cli\u003eReviewing granted permissions, user consent activity, publisher reputation, and business justification for connected applications.\u003c/li\u003e\n\u003cli\u003eDisabling OAuth device flow where supported and not required for business operations.\u003c/li\u003e\n\u003cli\u003eRestricting user consent to verified publishers.\u003c/li\u003e\n\u003cli\u003eRequiring administrative approval for high-risk permissions.\u003c/li\u003e\n\u003cli\u003eRegularly reviewing existing OAuth authorizations.\u003c/li\u003e\n\u003cli\u003eMonitoring identity-layer telemetry such as unusual OAuth grants, abnormal token usage, suspicious sign-ins, new device registrations, and unexpected application authorizations.\u003c/li\u003e\n\u003cli\u003eMonitoring known malicious OAuth applications, client IDs, redirect domains, and related infrastructure.\u003c/li\u003e\n\u003cli\u003eSecuring the consent and authorization layer across SaaS applications rather than treating individual OAuth flows as isolated risks.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"appomni-s-described-role\"\u003eAppOmni’s described role\u003c/h2\u003e\n\n\u003cp\u003eThe article includes a section describing how AppOmni helps organizations defend against device code phishing. It says AppOmni provides visibility into OAuth activity, identity risks, connected applications, and threat indicators.\u003c/p\u003e\n\n\u003cp\u003eThe capabilities described include continuous OAuth and connected application inventory, posture management against insecure configurations, threat detection at the identity layer, and indicators of compromise for known phishing infrastructure. The article frames these capabilities around detecting suspicious authorization events, anomalous token activity, risky OAuth settings, and known malicious OAuth infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that device code phishing reflects a shift from credential theft to OAuth token theft. The attack abuses legitimate authentication and authorization workflows, which makes it difficult for email, URL, network, and credential-focused defenses to detect or prevent. Because the attack results in valid tokens and often long-lived refresh tokens, organizations need continuous visibility into OAuth grants, consent activity, connected applications, and identity-layer behavior across SaaS platforms.\u003c/p\u003e\n","keyPoints":["Device code phishing abuses the OAuth 2.0 Device Authorization Grant to obtain valid access and refresh tokens without stealing the victim’s password.","MFA, FIDO2, and passkeys do not fully stop device code phishing because the victim authenticates on the legitimate identity provider and completes the real challenge themselves.","Attackers have expanded device code phishing beyond Microsoft 365 to platforms such as Salesforce and GitHub, showing that the technique applies across the broader SaaS ecosystem.","Traditional email security, URL reputation, and adversary-in-the-middle defenses often miss device code phishing because the attack uses legitimate vendor URLs and trusted OAuth workflows.","The article recommends defending against device code phishing by monitoring OAuth grants, connected applications, consent activity, token usage patterns, and identity-layer telemetry."],"insights":["Password resets are insufficient for incident response because refresh tokens issued through the device flow can remain valid for weeks or months after credentials are changed.","Salesforce’s removal of OAuth 2.0 device flow did not eliminate the broader threat, because the same actors shifted to standard OAuth authorization code grants with similar effect.","Google Workspace demonstrates a concrete mitigation pattern by restricting which OAuth scopes are available through device flow, preventing Gmail, Drive, Calendar, and most Workspace APIs from being accessed through that mechanism.","Identity providers such as Auth0, Okta, OneLogin, and Ping Identity present amplified risk because a compromised token at the identity layer can cascade into many downstream federated SaaS applications.","The most reliable detection opportunity is often the consent layer, since the attack still requires a user to authorize an application even when all links and authentication pages are legitimate."],"referencedReports":[{"title":"Storm-2372 conducts device code phishing campaign","url":"https://www.microsoft.com/en-us/security/blog/2025/02/13/storm-2372-conducts-device-code-phishing-campaign/","publisher":"Microsoft","context":"The article cites Microsoft’s security blog as the source that first publicly named Storm-2372 and described its Microsoft 365 device code phishing activity.","category":"","primary":false},{"title":"Introducing GitHub Device Code Phishing","url":"https://www.praetorian.com/blog/introducing-github-device-code-phishing","publisher":"Praetorian","context":"The article references Praetorian’s public security research documenting device code phishing techniques against GitHub and reported success rates in authorized engagements.","category":"","primary":false},{"title":"Salesforce OAuth 2.0 Device Flow removal notice","url":"https://help.salesforce.com/s/articleView?id=005132367\u0026language=en_US\u0026type=1","publisher":"Salesforce","context":"The article cites Salesforce’s help notice as the source for Salesforce removing OAuth 2.0 device flow in September 2025.","category":"","primary":false}],"body":"\u003cp\u003eDevice code phishing abuses the legitimate OAuth 2.0 Device Authorization Grant to obtain valid access and refresh tokens without stealing a victim’s password. The article explains that attackers trick victims into entering a device code on a real vendor verification page, completing authentication and MFA on the legitimate identity provider. This makes the resulting tokens appear valid while bypassing many defenses aimed at credential theft.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that this is not limited to Microsoft 365, even though recent reporting has focused heavily on Microsoft campaigns. It describes campaigns and research involving Salesforce, GitHub, and other SaaS platforms that support OAuth device flow. The most important defensive takeaway is that security teams need visibility into OAuth grants, connected applications, consent activity, and token usage patterns across SaaS environments.\u003c/p\u003e\n\n\u003cp\u003eTraditional email, URL reputation, and adversary-in-the-middle defenses often miss these attacks because the links and authentication workflows are legitimate. MFA, FIDO2, and passkeys do not fully prevent the attack because the victim completes the real authentication challenge themselves. The article recommends focusing on consent-layer controls, identity-layer monitoring, and token management rather than relying only on credential-focused defenses.\u003c/p\u003e\n"},{"n":4,"title":"The Google Forms Editor Invite That Matched the Recipient's Name: Property Tax Survey as Social Engineering Pretext","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/google-forms-editor-invite-name-match-social-engineering","time":"11:00","priority":"MAY READ","score":72,"tldr":"A phishing campaign abused legitimate Google Forms sharing notifications with valid SPF, DKIM, and DMARC to target a law firm, using a sender display name that matched the recipient and an editor-access form link as the social engineering hook. The key lesson is that trusted platform authentication does not prove the intent or safety of shared content.","briefOverview":"\u003cp\u003eA Google Forms sharing notification was sent to a multinational law firm from \u003ccode\u003egeorge23fx@gmail[.]com\u003c/code\u003e via Google Forms. The message passed SPF, DKIM, DMARC, and composite authentication, and it was delivered through Google infrastructure. The article emphasizes that these authentication results confirmed Google sent the email, but not whether the form creator or targeting was legitimate.\u003c/p\u003e\n\n\u003cp\u003eThe social engineering element was that the sender display name matched the recipient\u0026rsquo;s name at the law firm. The form subject was in Hebrew and referenced a property tax rights survey about apartment ownership status, making the pretext regionally and professionally relevant. The links used Google Forms \u003ccode\u003e/edit?invite=\u003c/code\u003e permissions, granting editor-level access without requiring Google sign-in.\u003c/p\u003e\n\n\u003cp\u003eIRONSCALES Themis flagged the message at 50% confidence, while community intelligence provided higher confidence based on similar incident patterns. The article maps the activity to MITRE ATT\u0026amp;CK techniques for spearphishing links, masquerading by matching a legitimate name, and phishing for information. It presents the case as an example of social engineering and platform abuse that can evade conventional gateway checks because the message is authenticated and delivered by a trusted service.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes a Google Forms editor invitation sent to a multinational law firm from \u003ccode\u003egeorge23fx@gmail[.]com\u003c/code\u003e via Google Forms. The message was delivered through \u003ccode\u003email-qv1-xf48.google[.]com\u003c/code\u003e over IPv6 address \u003ccode\u003e2607:f8b0:4864:20::f48\u003c/code\u003e. SPF passed, DKIM passed with \u003ccode\u003ed=gmail[.]com\u003c/code\u003e, DMARC passed, and composite authentication passed with reason=100.\u003c/p\u003e\n\n\u003cp\u003eBecause the message came through Google\u0026rsquo;s infrastructure, the article says it had the same authentication profile as legitimate Google Forms invitations. The Return-Path used a VERP-encoded address under \u003ccode\u003edoclist.bounces.google[.]com\u003c/code\u003e, which was consistent with Google Forms bounce handling. The article notes that a gateway evaluating sender reputation, domain age, and authentication would likely see a trusted platform delivering a routine sharing notification.\u003c/p\u003e\n\n\u003cp\u003eThe form subject was in Hebrew and referenced a property tax rights survey about apartment ownership status. The article states that this pretext was regionally specific and crafted to appear relevant to the target\u0026rsquo;s professional context in real estate law. The sender display name matched the recipient\u0026rsquo;s name at the law firm, which the article identifies as a deliberate social engineering signal rather than a coincidence.\u003c/p\u003e\n\n\u003cp\u003eA key technical detail was that the links used \u003ccode\u003e/edit?invite=\u003c/code\u003e parameters rather than standard view-only Google Forms URLs. According to the article, these links grant editor privileges without requiring the recipient to sign in to a Google account. Editor access could allow the recipient or anyone with the link to view submitted responses, modify questions, and alter the form structure.\u003c/p\u003e\n\n\u003cp\u003eIRONSCALES Themis flagged the message at 50% confidence, and the community intelligence layer gave higher confidence based on similar incident resolutions. The article highlights behavioral signals including first-time sender status, the sender-recipient name match, editor-level permissions, and a regionally targeted pretext. It maps the activity to MITRE ATT\u0026amp;CK T1566.002, T1036.005, and T1598.003.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article analyzes a Google Forms sharing notification sent to a multinational law firm from \u003ccode\u003egeorge23fx@gmail[.]com\u003c/code\u003e. The message arrived via Google Forms and was delivered through \u003ccode\u003email-qv1-xf48.google[.]com\u003c/code\u003e over IPv6 address \u003ccode\u003e2607:f8b0:4864:20::f48\u003c/code\u003e. It passed SPF, DKIM, DMARC, and composite authentication, with \u003ccode\u003ecompauth\u003c/code\u003e returning reason=100.\u003c/p\u003e\n\n\u003cp\u003eThe article\u0026rsquo;s central point is that the email appeared technically legitimate because Google\u0026rsquo;s own infrastructure delivered it and all authentication checks passed. However, the social engineering indicators were found in the content, permissions, sender display name, and targeting pattern rather than in failed authentication or suspicious infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"authenticated-google-delivery\"\u003eAuthenticated Google Delivery\u003c/h2\u003e\n\n\u003cp\u003eThe message originated from \u003ccode\u003egeorge23fx@gmail[.]com\u003c/code\u003e and was delivered through Google mail infrastructure. SPF passed because Google\u0026rsquo;s servers are authorized senders for \u003ccode\u003egmail[.]com\u003c/code\u003e. DKIM passed using Google\u0026rsquo;s signing keys, and DMARC aligned.\u003c/p\u003e\n\n\u003cp\u003eThe Return-Path used a VERP-encoded address under \u003ccode\u003edoclist.bounces.google[.]com\u003c/code\u003e, which the article says is consistent with legitimate Google Forms sharing notifications. The article emphasizes that this authentication profile matches the profile of real Google Forms invitations. As a result, a gateway focused on sender reputation, domain age, and authentication results would see a trusted platform delivering a routine document sharing notification.\u003c/p\u003e\n\n\u003ch2 id=\"social-engineering-pretext\"\u003eSocial Engineering Pretext\u003c/h2\u003e\n\n\u003cp\u003eThe subject of the form was in Hebrew and referenced a property tax rights survey about apartment ownership status. The article describes this as a regionally specific pretext aligned with the target\u0026rsquo;s professional context in real estate law. The target was a recipient at a multinational law firm.\u003c/p\u003e\n\n\u003cp\u003eThe sender display name matched the recipient\u0026rsquo;s name at the law firm. The article states that the attacker registered \u003ccode\u003egeorge23fx@gmail[.]com\u003c/code\u003e, set the display name to match the recipient, and sent the Google Forms invitation to the recipient\u0026rsquo;s corporate email address. This name match is described as a deliberate targeting signal rather than opportunistic spam.\u003c/p\u003e\n\n\u003ch2 id=\"editor-level-google-forms-link\"\u003eEditor-Level Google Forms Link\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights that the Google Forms links were not standard view-only form URLs. They used \u003ccode\u003e/edit?invite=\u003c/code\u003e parameters, which grant editor privileges to the form without requiring the recipient to sign in to a Google account.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, editor access can allow a recipient or anyone with the link to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eView submitted responses.\u003c/li\u003e\n\u003cli\u003eModify form questions.\u003c/li\u003e\n\u003cli\u003eAlter the form structure.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that this turns the survey invitation into a potential data exfiltration vector. If other recipients had already submitted sensitive information, the editor link could expose those responses.\u003c/p\u003e\n\n\u003ch2 id=\"detection-signals\"\u003eDetection Signals\u003c/h2\u003e\n\n\u003cp\u003eIRONSCALES Themis, described as the company\u0026rsquo;s Adaptive AI engine, flagged the message at 50% confidence. The article says the community intelligence layer provided higher confidence based on resolutions of similar incidents across the platform.\u003c/p\u003e\n\n\u003cp\u003eThe behavioral signals identified in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe sender was a first-time sender.\u003c/li\u003e\n\u003cli\u003eThe sender display name matched the recipient\u0026rsquo;s name.\u003c/li\u003e\n\u003cli\u003eThe Google Forms links granted editor-level permissions.\u003c/li\u003e\n\u003cli\u003eThe pretext was regionally targeted and professionally relevant.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article contrasts these behavioral indicators with email authentication results. It states that authentication confirmed Google sent the email, but did not confirm who created the form or why that recipient was targeted.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-listed-in-the-article\"\u003eIndicators Listed in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article provides the following indicators and contextual details:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSender email: \u003ccode\u003egeorge23fx@gmail[.]com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSending infrastructure: \u003ccode\u003email-qv1-xf48.google[.]com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSending IP: \u003ccode\u003e2607:f8b0:4864:20::f48\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eReturn-Path: VERP-encoded \u003ccode\u003edoclist.bounces.google[.]com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eForm links: \u003ccode\u003edocs.google[.]com/forms/d/.../edit?invite=\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eAdditional links: \u003ccode\u003eaccounts.google[.]com\u003c/code\u003e login pages.\u003c/li\u003e\n\u003cli\u003eSubject language: Hebrew.\u003c/li\u003e\n\u003cli\u003eAuthentication: SPF pass, DKIM pass for \u003ccode\u003egmail[.]com\u003c/code\u003e, DMARC pass, and \u003ccode\u003ecompauth=100\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSCL: 1.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK Mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to three MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eT1566.002\u003c/code\u003e — Phishing: Spearphishing Link, because the Google Forms editor link served as the delivery vector.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eT1036.005\u003c/code\u003e — Masquerading: Match Legitimate Name or Location, because the sender display name matched the recipient\u0026rsquo;s real name.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eT1598.003\u003c/code\u003e — Phishing for Information: Spearphishing Link, because the property tax survey was designed to harvest personal and financial data.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"stated-significance\"\u003eStated Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article presents the incident as an example of data harvesting social engineering and platform abuse. Its significance is that the message used trusted Google infrastructure and passed standard authentication checks, while the suspicious elements existed at the behavioral and permission level.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that authentication alone cannot evaluate intent. In this case, the authentication results verified Google\u0026rsquo;s role in delivering the message, but did not validate the purpose of the form, the identity of the creator, or the reason the recipient was targeted.\u003c/p\u003e\n","keyPoints":["A Google Forms sharing notification was sent to a multinational law firm from george23fx@gmail.com via Google infrastructure and passed SPF, DKIM, DMARC, and composite authentication checks.","The sender display name matched the recipient's name at the law firm, which the article identifies as a deliberate social engineering signal.","The form subject was in Hebrew and referenced a property tax rights survey about apartment ownership status.","The Google Forms links used /edit?invite= parameters that granted editor access without requiring Google sign-in.","IRONSCALES Themis flagged the message at 50% confidence, while community intelligence provided higher confidence based on similar incident patterns."],"insights":["Email authentication controls were ineffective in this case because they correctly verified that Google sent the message, but they could not assess who created the form or why the recipient was targeted.","The /edit?invite= link changed the risk from a simple survey lure to a potential data exposure path because editor access could allow anyone with the link to view submitted responses and alter the form.","A sender display name matching the recipient's own name is a behavioral anomaly that can increase engagement while also making triage more confusing for the recipient.","Low spam confidence and trusted Google infrastructure made the message appear routine to conventional gateway checks, while behavioral signals such as first-time sender, name match, and editor-level permissions provided the meaningful detection context."],"referencedReports":[],"body":"\u003cp\u003eA Google Forms sharing notification was sent to a multinational law firm from \u003ccode\u003egeorge23fx@gmail[.]com\u003c/code\u003e via Google Forms. The message passed SPF, DKIM, DMARC, and composite authentication, and it was delivered through Google infrastructure. The article emphasizes that these authentication results confirmed Google sent the email, but not whether the form creator or targeting was legitimate.\u003c/p\u003e\n\n\u003cp\u003eThe social engineering element was that the sender display name matched the recipient\u0026rsquo;s name at the law firm. The form subject was in Hebrew and referenced a property tax ri
