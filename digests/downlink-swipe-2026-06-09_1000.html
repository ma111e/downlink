ghts survey about apartment ownership status, making the pretext regionally and professionally relevant. The links used Google Forms \u003ccode\u003e/edit?invite=\u003c/code\u003e permissions, granting editor-level access without requiring Google sign-in.\u003c/p\u003e\n\n\u003cp\u003eIRONSCALES Themis flagged the message at 50% confidence, while community intelligence provided higher confidence based on similar incident patterns. The article maps the activity to MITRE ATT\u0026amp;CK techniques for spearphishing links, masquerading by matching a legitimate name, and phishing for information. It presents the case as an example of social engineering and platform abuse that can evade conventional gateway checks because the message is authenticated and delivered by a trusted service.\u003c/p\u003e\n"},{"n":8,"title":"The Hidden Security Risk in Modern Networks: The Work Between Tools","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/the-hidden-security-risk-in-modern.html","time":"11:30","priority":"MAY READ","score":45,"tldr":"Modern network security risk increasingly comes from the manual, fragmented work between tools rather than lack of detection or visibility. The article argues that intelligent workflows combining automation, AI, and human oversight can reduce delays, errors, alert fatigue, and compliance gaps.","briefOverview":"\u003cp\u003eThe article argues that modern network security teams often have strong visibility and extensive tooling, but still struggle with execution. It says outages, slow threat response, misconfigurations, human error, alert fatigue, and burnout persist because the work between tools remains fragmented and manual. The core issue is framed as the operational gap between detection and execution.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies alert triage and incident response, access and change management, and hybrid or multi-environment operations as areas where manual coordination creates risk. It describes teams moving between SIEM, firewalls, IAM systems, ITSM, monitoring platforms, cloud and on-prem environments, and collaboration tools to gather context, route work, request approvals, implement changes, and log evidence. These disconnected processes can lead to missed threats, overprivileged access, misconfigurations, audit gaps, configuration drift, and delayed responses.\u003c/p\u003e\n\n\u003cp\u003eAs a solution, the article promotes intelligent workflows that orchestrate how work moves across systems, teams, approvals, automation, and decision-making. It says these workflows combine deterministic automation, AI, and human judgment to handle end-to-end processes such as alert triage and incident response. The claimed benefits include faster coordination, reduced MTTR, automatic evidence logging, standardization, reduced analyst burden, and more consistent execution at scale.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article says organizations now have more visibility, larger technology stacks, and increasing use of AI and automation, but core operational problems remain. It highlights ongoing outages, financial losses, operational disruption, reputational impact, slow MTTR, misconfigurations, human error, and analyst burnout. The article’s central argument is that detection and tooling are not the main problem; the real risk lies in execution work that happens between tools.\u003c/p\u003e\n\n\u003cp\u003eIt describes a hidden operational layer in which network security teams must gather context, validate ownership and severity, route tickets, request approvals, implement changes manually, and log evidence. This work spans SIEM, firewalls, IAM systems, ITSM, monitoring platforms, cloud, on-prem, hybrid environments, and messaging or collaboration applications. The article states that this manual work is time-consuming and increases opportunities for inconsistencies, missed steps, compliance gaps, and compounding risk.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies three workflows where disconnected processes create risk. In alert triage and incident response, automated detection is often followed by manual investigation and coordination, which can delay escalation, containment, and remediation while contributing to missed threats and alert fatigue. In access and change management, manual approvals and separate IT and security systems can cause inconsistent validation, duplicate work, delayed provisioning, overprivileged access, misconfigurations, and audit gaps.\u003c/p\u003e\n\n\u003cp\u003eThe third area is hybrid and multi-environment operations, where fragmented technology and ownership models increase context switching and operational overhead. The article says inconsistent processes and visibility gaps make it harder to maintain accountability, enforce standards, and execute reliably across systems. It links this fragmentation to configuration drift, delayed threat and incident response, and inconsistent policy enforcement across environments.\u003c/p\u003e\n\n\u003cp\u003eThe proposed response is not to replace tools, but to orchestrate how work moves across them through intelligent workflows. These workflows are described as combining deterministic automation for predictable tasks, AI for context assessment and autonomous decisions, and humans for high-impact tasks requiring judgment and creativity. The article presents alert triage as an example in which AI enriches and prioritizes an alert, automation triggers containment or remediation when conditions are met, humans are engaged when judgment is needed, and all actions and evidence are logged for audit and compliance.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that the major operational security risk in modern networks is not a lack of detection, visibility, or tooling. Instead, it identifies the primary problem as the manual and fragmented work that happens between tools after alerts are generated or changes are needed.\u003c/p\u003e\n\n\u003cp\u003eIt states that organizations have more visibility than ever through expanding technology stacks, and that network security teams are increasingly using AI and automation for routine tasks. Despite this, outages still last for hours, threat response and mean time to remediate remain slow, misconfigurations and human error continue to cause major incidents, and teams remain overwhelmed and burned out.\u003c/p\u003e\n\n\u003ch2 id=\"the-hidden-operational-layer\"\u003eThe Hidden Operational Layer\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a recurring operational layer that appears whenever an alert fires. Network security teams must manually perform tasks such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGathering context across systems\u003c/li\u003e\n\u003cli\u003eValidating ownership and severity\u003c/li\u003e\n\u003cli\u003eRouting tickets to the right people\u003c/li\u003e\n\u003cli\u003eRequesting approvals\u003c/li\u003e\n\u003cli\u003eImplementing changes manually\u003c/li\u003e\n\u003cli\u003eLogging evidence\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis work requires analysts to switch between many systems and environments, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSIEM\u003c/li\u003e\n\u003cli\u003eFirewalls\u003c/li\u003e\n\u003cli\u003eIdentity and access management systems\u003c/li\u003e\n\u003cli\u003eITSM\u003c/li\u003e\n\u003cli\u003eMonitoring platforms\u003c/li\u003e\n\u003cli\u003eCloud, on-prem, and hybrid environments\u003c/li\u003e\n\u003cli\u003eMessaging and collaboration applications\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these manual processes are not only time- and labor-intensive, but also create opportunities for human error. It specifically mentions inconsistencies, missed steps, and compliance gaps as risks that can compound quickly.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-problem-is-growing\"\u003eWhy the Problem Is Growing\u003c/h2\u003e\n\n\u003cp\u003eThe article says recent industry shifts have worsened the problem. Distributed infrastructure, API sprawl, and increasingly interconnected tooling have expanded the number and complexity of systems that teams must coordinate across.\u003c/p\u003e\n\n\u003cp\u003eIt also says attack velocity is increasing and threats are becoming more sophisticated. At the same time, AI is accelerating operations and raising expectations for scale and speed, which puts teams under more pressure to deliver with limited capacity.\u003c/p\u003e\n\n\u003cp\u003eThe article’s key conclusion is that environments may be more technically connected, but the workflows beneath them remain fragmented. This fragmentation creates bottlenecks, slows response times, and limits security’s business impact.\u003c/p\u003e\n\n\u003ch2 id=\"workflow-areas-where-risk-appears\"\u003eWorkflow Areas Where Risk Appears\u003c/h2\u003e\n\n\u003ch3 id=\"alert-triage-and-incident-response\"\u003eAlert Triage and Incident Response\u003c/h3\u003e\n\n\u003cp\u003eThe article says detection may be automated, but investigation and coordination often are not. Teams still manually gather context across systems to enrich alerts and dismiss false positives.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, these manual processes increase investigation time and consume resources that could otherwise be used for more complex problems. The risks it identifies include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDelays in identifying, escalating, containing, and remediating issues\u003c/li\u003e\n\u003cli\u003eMissed threats that become real security incidents\u003c/li\u003e\n\u003cli\u003eAlert fatigue that leads to poorer analysis, missed true positives, and team burnout\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"access-and-change-management\"\u003eAccess and Change Management\u003c/h3\u003e\n\n\u003cp\u003eThe article states that security-sensitive access and network change processes still often rely on humans as the integration layer. Access requests and network changes require manual approvals, which can create inconsistent validation and gaps in policy enforcement.\u003c/p\u003e\n\n\u003cp\u003eIt also says security and IT often operate in separate systems. This separation can lead to duplicate work, delayed provisioning, and poor visibility into changes.\u003c/p\u003e\n\n\u003cp\u003eAt scale, the article says these issues can cause:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOverprivileged access that violates least-privilege and Zero Trust principles\u003c/li\u003e\n\u003cli\u003eMisconfigurations that create security vulnerabilities and outages\u003c/li\u003e\n\u003cli\u003eAudit and compliance gaps that expose organizations to regulatory risk\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"hybrid-and-multi-environment-operations\"\u003eHybrid and Multi-Environment Operations\u003c/h3\u003e\n\n\u003cp\u003eThe article describes hybrid and multi-environment operations as another area where fragmented work creates risk. Analysts must switch between different tools and ownership models, increasing complexity and operational overhead.\u003c/p\u003e\n\n\u003cp\u003eIt says inconsistent processes and visibility gaps between teams make it difficult to maintain accountability, enforce standards, and execute reliably across systems. The article identifies the resulting risks as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eConfiguration drift that creates network instability and compliance risks\u003c/li\u003e\n\u003cli\u003eDelayed responses to threats and incidents\u003c/li\u003e\n\u003cli\u003eSecurity gaps due to inconsistent policy enforcement across environments\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"proposed-solution-intelligent-workflows\"\u003eProposed Solution: Intelligent Workflows\u003c/h2\u003e\n\n\u003cp\u003eThe article says the solution is not replacing existing tools, but orchestrating how work moves across them. It presents intelligent workflows as an operational layer that connects systems, teams, approvals, automation, and decision-making across environments.\u003c/p\u003e\n\n\u003cp\u003eThe article says intelligent workflows combine three types of workflow:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDeterministic automation for predictable, reliable, and controlled tasks\u003c/li\u003e\n\u003cli\u003eAI to assess context, make decisions, and execute tasks autonomously\u003c/li\u003e\n\u003cli\u003eHumans for high-impact or high-stakes tasks that require judgment and creativity\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt contrasts intelligent workflows with automation alone. According to the article, automation handles discrete and isolated tasks, while intelligent workflows orchestrate entire processes from beginning to end while preserving flexibility, control, and oversight.\u003c/p\u003e\n\n\u003ch2 id=\"example-alert-triage-and-incident-response\"\u003eExample: Alert Triage and Incident Response\u003c/h2\u003e\n\n\u003cp\u003eThe article gives an example of how an intelligent workflow could operate during alert triage and incident response. In this example, a monitoring tool detects unusual activity and creates an alert.\u003c/p\u003e\n\n\u003cp\u003eAI then pulls context from multiple systems to triage, enrich, and prioritize the alert based on severity and risk. If the alert meets specific predefined conditions, the workflow automatically triggers actions such as containment or remediation.\u003c/p\u003e\n\n\u003cp\u003eIf human judgment is required, the workflow routes the issue to the appropriate analyst for deeper investigation or approval. All actions, decisions, and evidence are automatically logged to support audit and compliance requirements.\u003c/p\u003e\n\n\u003cp\u003eThe article says this approach can help teams move from detection to execution faster. It also says it can reduce MTTR and relieve strain on analysts.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-benefits-for-network-security-teams\"\u003eClaimed Benefits for Network Security Teams\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several benefits that intelligent workflows can provide for network security teams:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eStandardization that reduces inconsistencies, missed steps, and errors\u003c/li\u003e\n\u003cli\u003eAutomatic evidence logging that reduces manual effort and improves auditability\u003c/li\u003e\n\u003cli\u003eShared workflows that provide cross-functional visibility, alignment, and accountability\u003c/li\u003e\n\u003cli\u003eReduced operational burden that helps relieve analyst fatigue\u003c/li\u003e\n\u003cli\u003eMore time for high-impact work, such as complex investigations or strategy\u003c/li\u003e\n\u003cli\u003eConsistent execution that strengthens security posture and reduces risk\u003c/li\u003e\n\u003cli\u003eFaster coordination that reduces response times and improves operational resilience\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also says these benefits allow network security teams to operate at scale and extend capacity without adding headcount.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central takeaway is that the biggest operational risk in modern networks is the gap between detection and execution. It argues that improving security and operational resilience requires organizations to improve how work moves across their environments, rather than simply adding more technology.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that as network and security environments become more complex, operational coordination will become as important as visibility. It positions intelligent workflows as a way to orchestrate the work between tools so teams can operate securely, consistently, and at scale.\u003c/p\u003e\n","keyPoints":["The article argues that the main security problem in modern networks is the fragmented execution work that happens between tools, not a lack of detection or tooling.","Network security teams often manually gather context, validate severity and ownership, route tickets, request approvals, implement changes, and log evidence across systems such as SIEM, firewalls, IAM, ITSM, monitoring platforms, cloud environments, and messaging apps.","Manual coordination between systems can create delays, missed threats, alert fatigue, overprivileged access, misconfigurations, audit gaps, configuration drift, and inconsistent policy enforcement.","The article says organizations are adopting intelligent workflows to connect systems, teams, approvals, automation, and decision-making across environments.","Intelligent workflows combine deterministic automation, AI, and human involvement to orchestrate end-to-end processes such as alert triage and incident response while logging actions and evidence for audit and compliance."],"insights":["Organizations may already have sufficient visibility and tooling, but still experience long outages and slow MTTR because operational handoffs between tools remain manual and fragmented.","Security-sensitive workflows such as access approvals and network changes are especially risky when humans serve as the integration layer between IT and security systems, because this can create inconsistent validation and policy enforcement gaps.","Intelligent workflows are presented as more than task automation because they coordinate deterministic automation, AI decisions, and human judgment across an entire process from detection through remediation and evidence logging.","Automatic evidence logging is an actionable way to reduce both analyst workload and compliance risk during incident response and change-management workflows."],"referencedReports":[],"body":"\u003cp\u003eThe article argues that modern network security teams often have strong visibility and extensive tooling, but still struggle with execution. It says outages, slow threat response, misconfigurations, human error, alert fatigue, and burnout persist because the work between tools remains fragmented and manual. The core issue is framed as the operational gap between detection and execution.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies alert triage and incident response, access and change management, and hybrid or multi-environment operations as areas where manual coordination creates risk. It describes teams moving between SIEM, firewalls, IAM systems, ITSM, monitoring platforms, cloud and on-prem environments, and collaboration tools to gather context, route work, request approvals, implement changes, and log evidence. These disconnected processes can lead to missed threats, overprivileged access, misconfigurations, audit gaps, configuration drift, and delayed responses.\u003c/p\u003e\n\n\u003cp\u003eAs a solution, the article promotes intelligent workflows that orchestrate how work moves across systems, teams, approvals, automation, and decision-making. It says these workflows combine deterministic automation, AI, and human judgment to handle end-to-end processes such as alert triage and incident response. The claimed benefits include faster coordination, reduced MTTR, automatic evidence logging, standardization, reduced analyst burden, and more consistent execution at scale.\u003c/p\u003e\n"}];

<script type="text/babel">

function AnalysisTabs({ article }) {

  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>

    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}

}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
