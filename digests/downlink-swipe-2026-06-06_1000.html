<script>
window.__DL_ARTICLES = [{"n":2,"title":"Miasma Worm Hits Microsoft Again: Azure Functions Action and 72 Other Repositories Disabled After Supply Chain Attack Targeting AI Coding Agents","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/miasma-worm-hits-microsoft-again-azure-functions-action-and-72-other-repositories-disabled-after-supply-chain-attack-targeting-ai-coding-agents","time":"11:10","priority":"MUST READ","score":96,"tldr":"The Miasma worm campaign hit Microsoft’s Azure GitHub repositories by planting malicious editor and AI-coding-agent configuration files that executed a credential-stealing payload when developers opened affected repos. GitHub disabled 73 Microsoft-related repositories, including Azure/functions-action, disrupting CI/CD pipelines and highlighting a shift from package-install attacks to “folder-open” supply chain compromise.","briefOverview":"\u003cp\u003eOn June 5, 2026, the Miasma worm campaign reached Microsoft’s Azure GitHub organizations when a malicious commit was pushed to Azure/durabletask using a previously compromised contributor account. The commit planted configuration files that executed or prompted execution of a credential-harvesting payload when developers opened the repository in Claude Code, Gemini CLI, Cursor, or VS Code. GitHub later disabled 73 repositories across four Microsoft GitHub organizations in a 105-second automated sweep.\u003c/p\u003e\n\n\u003cp\u003eThe incident is significant because it shifted the attack surface from package installation to repository opening in developer tools and AI coding agents. The article contrasts this with the May 19 compromise of Microsoft’s durabletask PyPI package, where malicious versions were uploaded directly to PyPI using a compromised publishing token. The June 5 attack added five files, including a 4.6 MB obfuscated JavaScript payload at .github/setup.js and tool-specific configuration files that pointed to it.\u003c/p\u003e\n\n\u003cp\u003eOne major impact was the disabling of Azure/functions-action, the official GitHub Action used to deploy Azure Functions. Workflows referencing Azure/functions-action@v1 stopped resolving, causing CI/CD failures reported by developers in a Microsoft Learn Q\u0026amp;A thread. The article recommends treating systems as compromised if affected repositories were opened in the targeted tools, rotating credentials, auditing repositories and package releases, and pinning GitHub Actions to commit SHAs instead of mutable tags.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reports that on June 5, 2026, the Miasma worm campaign hit Microsoft’s Azure GitHub organizations through a malicious commit to Azure/durabletask. The commit was pushed using a previously compromised contributor account that was also tied to the May 19 durabletask PyPI compromise. Instead of poisoning a package registry, the June 5 attack planted configuration files that triggered execution when a developer opened the repository in supported tools.\u003c/p\u003e\n\n\u003cp\u003eThe malicious commit, identified as 5f456b8, carried several red flags described in the article. Its message claimed “Switched DataConverter to OrchestrationContext [skip ci],” but it modified no source code and added only tool configuration files and the payload. The timestamp was backdated to 2020-03-09T15:59:47Z, and the “[skip ci]” flag suppressed CI pipeline execution.\u003c/p\u003e\n\n\u003cp\u003eThe commit added five files that targeted Claude Code, Gemini CLI, Cursor, and VS Code. The .claude/settings.json and .gemini/settings.json files used SessionStart hooks to run node .github/setup.js, while .cursor/rules/setup.mdc instructed the Cursor AI agent to run the same file as a project setup requirement. A .vscode/tasks.json file defined a task with runOn set to folderOpen, and .github/setup.js was a single-line, 4,643,745-byte obfuscated JavaScript credential harvester.\u003c/p\u003e\n\n\u003cp\u003eGitHub disabled 73 repositories across Azure, microsoft, Azure-Samples, and MicrosoftDocs in a 105-second automated enforcement window. The article says all disabled repositories returned HTTP 403 with a Terms of Service reason when checked through the GitHub API, and that the list was first reported by OpenSource Malware before being independently verified by the authors. The disabled set included Azure Functions runtime, language workers, SDKs, Durable Task repositories, AI-related samples, connector projects, and MicrosoftDocs/windows-driver-docs.\u003c/p\u003e\n\n\u003cp\u003eThe disabling of Azure/functions-action caused immediate CI/CD breakage because workflows referencing Azure/functions-action@v1 could no longer resolve the action. A Microsoft Learn Q\u0026amp;A thread gathered reports from developers, and Microsoft described the repository’s disabled state first as a GitHub policy violation and later as an “internal management issue” under investigation. The article uses this impact to highlight the risk of mutable tags and recommends pinning actions to commit SHAs.\u003c/p\u003e\n\n\u003cp\u003eThe article connects the June 5 repository injection to the May 19 PyPI attack through the same compromised contributor account and to the broader Miasma worm campaign, which it says has infected 113 or more GitHub repositories. It also states that the May 19 payload connected to TeamPCP infrastructure through t.m-kosche[.]com. Recommended actions include rotating credentials, auditing repositories for suspicious tool configuration files, checking package registries for unauthorized publishes, monitoring for specified domains, requiring pull request reviews, using PyPI Trusted Publishing, and restricting outbound network access from CI/CD runners.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that the Miasma worm campaign reached Microsoft’s Azure GitHub organizations on June 5, 2026. A malicious commit was pushed to the Azure/durabletask repository using a previously compromised contributor account. GitHub later disabled 73 repositories across four Microsoft GitHub organizations in a 105-second automated sweep.\u003c/p\u003e\n\n\u003cp\u003eThe core significance of the incident is the attack’s move from package registry poisoning to developer-tool and AI-coding-agent hijacking. The article describes this as a shift from “execute on package install” to “execute on folder open.” In this case, cloning the repository was described as safe, while opening it in targeted tools was not.\u003c/p\u003e\n\n\u003ch2 id=\"background-may-19-durabletask-pypi-compromise\"\u003eBackground: May 19 durabletask PyPI compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article links the June 5 incident to an earlier compromise on May 19, 2026. In that earlier incident, three malicious versions of Microsoft’s durabletask PyPI package were uploaded during a 35-minute window. Those packages planted a credential-harvesting payload that stole secrets from AWS, Azure, GCP, Kubernetes, and more than 90 developer tool configurations.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the attacker bypassed the repository’s CI/CD pipeline and uploaded directly to PyPI using a compromised publishing token. The June 5 incident reused the same compromised contributor account, but used GitHub source repository injection rather than package registry poisoning.\u003c/p\u003e\n\n\u003ch2 id=\"the-malicious-azure-durabletask-commit\"\u003eThe malicious Azure/durabletask commit\u003c/h2\u003e\n\n\u003cp\u003eThe malicious commit was identified as 5f456b8 and was pushed to Azure/durabletask. The article highlights several suspicious properties in the commit metadata:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe commit message was “Switched DataConverter to OrchestrationContext [skip ci].”\u003c/li\u003e\n\u003cli\u003eThe commit added five files and modified no source code files.\u003c/li\u003e\n\u003cli\u003eThe commit timestamp was backdated to 2020-03-09T15:59:47Z.\u003c/li\u003e\n\u003cli\u003eThe “[skip ci]” flag suppressed CI pipeline execution.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that the commit message claimed a code change, but no source code was modified. All added files were either tool configuration files or the malicious payload itself.\u003c/p\u003e\n\n\u003ch2 id=\"planted-files-and-targeted-tools\"\u003ePlanted files and targeted tools\u003c/h2\u003e\n\n\u003cp\u003eThe commit added five files intended to trigger execution across four developer tools or AI coding environments.\u003c/p\u003e\n\n\u003ch3 id=\"claude-code\"\u003eClaude Code\u003c/h3\u003e\n\n\u003cp\u003eThe .claude/settings.json file defined a SessionStart hook. That hook matched all sessions and executed the command:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003enode .github/setup.js\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe article states that this caused the payload to execute automatically whenever a Claude Code session started in the repository.\u003c/p\u003e\n\n\u003ch3 id=\"gemini-cli\"\u003eGemini CLI\u003c/h3\u003e\n\n\u003cp\u003eThe .gemini/settings.json file used the same structure as the Claude Code hook. It also triggered on Gemini CLI session start and ran the same payload.\u003c/p\u003e\n\n\u003ch3 id=\"cursor\"\u003eCursor\u003c/h3\u003e\n\n\u003cp\u003eThe .cursor/rules/setup.mdc file was described as a prompt injection. It contained an alwaysApply rule instructing the Cursor AI agent to run:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003enode .github/setup.js\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe article says the instruction framed execution as required for project setup and IDE integration. The alwaysApply flag made the rule active regardless of which file the developer was working on.\u003c/p\u003e\n\n\u003ch3 id=\"vs-code\"\u003eVS Code\u003c/h3\u003e\n\n\u003cp\u003eThe .vscode/tasks.json file defined a shell task named “Setup.” Its command was:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003enode .github/setup.js\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe task used runOptions with runOn set to folderOpen, which the article says caused it to run automatically when a developer opened the folder in VS Code.\u003c/p\u003e\n\n\u003ch3 id=\"payload-file\"\u003ePayload file\u003c/h3\u003e\n\n\u003cp\u003eThe shared payload was stored at .github/setup.js. The article describes it as a single-line, 4,643,745-byte obfuscated JavaScript file containing the credential harvester. All four configuration paths pointed to this file.\u003c/p\u003e\n\n\u003ch2 id=\"disabled-repositories\"\u003eDisabled repositories\u003c/h2\u003e\n\n\u003cp\u003eAfter the malicious commit, GitHub disabled 73 repositories across four Microsoft GitHub organizations. The article says the disabled repositories returned HTTP 403 with a Terms of Service reason when checked through the GitHub API. It also says the list was first reported by OpenSource Malware and independently verified by the article’s authors.\u003c/p\u003e\n\n\u003cp\u003eThe block timestamps ranged from 16:00:50 to 16:02:35 UTC on June 5. The article describes two waves separated by a 56-second gap, concluding that the enforcement was automated rather than manual.\u003c/p\u003e\n\n\u003ch3 id=\"wave-1\"\u003eWave 1\u003c/h3\u003e\n\n\u003cp\u003eThe first wave occurred from 16:00:50 to 16:01:28 UTC and disabled 39 repositories in 38 seconds. Repositories in this wave included Azure Functions tooling, WebJobs components, Durable Task projects, Azure-Samples projects, and MicrosoftDocs/windows-driver-docs.\u003c/p\u003e\n\n\u003ch3 id=\"wave-2\"\u003eWave 2\u003c/h3\u003e\n\n\u003cp\u003eThe second wave occurred from 16:02:24 to 16:02:35 UTC and disabled 34 repositories in 11 seconds. Repositories in this wave included Azure/azure-functions-host, Azure/durabletask, Azure/azure-functions-durable-extension, language workers, extension projects, connector SDKs, and several Azure-Samples repositories.\u003c/p\u003e\n\n\u003ch3 id=\"organizations-affected\"\u003eOrganizations affected\u003c/h3\u003e\n\n\u003cp\u003eThe article groups the 73 disabled repositories across four organizations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAzure: 49 repositories.\u003c/li\u003e\n\u003cli\u003emicrosoft: 10 repositories.\u003c/li\u003e\n\u003cli\u003eAzure-Samples: 13 repositories.\u003c/li\u003e\n\u003cli\u003eMicrosoftDocs: 1 repository.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe affected Azure repositories included Azure Functions runtime, worker, SDK, extension, deployment action, connector, Durable Task, and AI-related repositories. The affected microsoft repositories included Durable Task SDKs and backends, DurableFunctionsMonitor, Microsoft-Performance-Tools-Apple, and secure-azureai-agent. The affected Azure-Samples repositories included AI, OpenAI, connector, container apps, and Azure Functions samples. The affected MicrosoftDocs repository was windows-driver-docs.\u003c/p\u003e\n\n\u003ch2 id=\"ci-cd-impact-from-azure-functions-action\"\u003eCI/CD impact from Azure/functions-action\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies Azure/functions-action as the most immediately damaging repository to be disabled. Azure/functions-action is described as the official GitHub Action used to deploy Azure Functions. When the repository was disabled, workflows referencing Azure/functions-action@v1 stopped resolving.\u003c/p\u003e\n\n\u003cp\u003eThe article says a Microsoft Learn Q\u0026amp;A thread opened within hours, with more than 20 developers reporting broken CI/CD pipelines. Microsoft initially described the issue as a GitHub policy violation. Twelve minutes later, a revised response characterized it as an “internal management issue” under investigation and recommended alternative deployment methods such as Azure CLI, Azure DevOps Pipelines, VS Code deployment, Zip Deploy, or Azure Pipelines.\u003c/p\u003e\n\n\u003cp\u003eThe article uses this incident to discuss the mutable-tag problem. It states that workflows referencing @v1 depend on whatever GitHub serves for that tag, and when the repository disappears, the tag evaporates and dependent pipelines fail. It recommends pinning to a specific commit SHA when the action is restored.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-the-broader-campaign\"\u003eRelationship to the broader campaign\u003c/h2\u003e\n\n\u003cp\u003eThe article links the June 5 repository injection to the May 19 PyPI attack through the same compromised contributor account. It says the contributor’s personal fork of Azure/azure-functions-durable-extension was also blocked during the same sweep, which the authors say confirmed the account’s involvement.\u003c/p\u003e\n\n\u003cp\u003eThe article lays out three possibilities for how the account was used again:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe account’s credentials may not have been fully rotated after May 19, leaving the attacker with a working GitHub token.\u003c/li\u003e\n\u003cli\u003eThe contributor may have been re-compromised through the worm’s propagation loop after opening an infected repository in an AI coding tool.\u003c/li\u003e\n\u003cli\u003eA different contributor’s token may have been used with commit author metadata spoofed through the Git Data API.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article connects the incident to the broader Miasma worm campaign, which it says has infected more than 113 GitHub repositories across dozens of accounts. It also states that the May 19 payload connected to the TeamPCP threat group through the secondary C2 domain t.m-kosche[.]com, described as known TeamPCP infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article further states that TeamPCP has previously targeted TanStack, Mistral AI, the @antv ecosystem, the @redhat-cloud-services npm scope, LiteLLM, Telnyx, and Checkmarx.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-described-in-the-article\"\u003eTimeline described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article provides a timeline covering both the May 19 and June 5 activity. Key entries include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMay 16, 2026: rope.pyz core modules were authored, and git-service[.]com infrastructure was registered and certified.\u003c/li\u003e\n\u003cli\u003eMay 19, 2026: malicious durabletask PyPI versions 1.4.1, 1.4.2, and 1.4.3 were uploaded.\u003c/li\u003e\n\u003cli\u003eMay 19, 2026: GitHub Issue #137 reported the PyPI compromise, and Microsoft confirmed the packages were yanked.\u003c/li\u003e\n\u003cli\u003eJune 3, 2026: a second wave of dead-drop repositories began with Miasma-themed naming.\u003c/li\u003e\n\u003cli\u003eJune 5, 2026: malicious commit 5f456b8 was pushed to Azure/durabletask.\u003c/li\u003e\n\u003cli\u003eJune 5, 2026 16:00:50 to 16:02:35 UTC: GitHub disabled 73 Microsoft-related repositories.\u003c/li\u003e\n\u003cli\u003eJune 5, 2026 around 19:00 UTC: a Microsoft Learn Q\u0026amp;A thread opened about broken CI/CD.\u003c/li\u003e\n\u003cli\u003eJune 5, 2026 around 19:57 UTC: Microsoft characterized the incident as an “internal management issue.”\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommended-actions-in-the-article\"\u003eRecommended actions in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends that anyone who cloned affected repositories after June 2 and opened them in VS Code, Claude Code, Cursor, or Gemini CLI treat the system as compromised. It advises rotating all credentials accessible from the system, including GitHub tokens, npm tokens, AWS keys, Azure service principals, GCP service accounts, SSH keys, Kubernetes secrets, Docker configs, environment variables, and shell history contents.\u003c/p\u003e\n\n\u003cp\u003eIt also recommends auditing repositories for unexpected commits containing:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e.claude/\u003c/li\u003e\n\u003cli\u003e.gemini/\u003c/li\u003e\n\u003cli\u003e.cursor/\u003c/li\u003e\n\u003cli\u003e.vscode/tasks.json\u003c/li\u003e\n\u003cli\u003e.github/setup.js\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article further recommends auditing npm and PyPI packages for unauthorized version publishes and checking network logs for connections to check.git-service[.]com and t.m-kosche[.]com.\u003c/p\u003e\n\n\u003cp\u003eFor CI/CD users referencing Azure/functions-action@v1, the article recommends switching to alternative deployment methods while the repository remains disabled. It also recommends pinning to a specific commit SHA instead of a mutable tag after the action is restored.\u003c/p\u003e\n\n\u003cp\u003eFor prevention, the article recommends inspecting cloned repositories for suspicious AI tool and editor configuration files before opening them, enabling branch protection rules requiring pull request reviews, using PyPI Trusted Publishing instead of long-lived API tokens, pinning GitHub Actions to commit SHAs, restricting outbound network access from CI/CD runners, and monitoring for PyPI or npm releases without matching GitHub tags or CI runs.\u003c/p\u003e\n","keyPoints":["On June 5, 2026, a malicious commit was pushed to the Azure/durabletask repository using a previously compromised contributor account.","The commit added configuration files for Claude Code, Gemini CLI, Cursor, and VS Code that executed or instructed execution of a credential-harvesting payload when the repository was opened.","GitHub disabled 73 repositories across the Azure, microsoft, Azure-Samples, and MicrosoftDocs GitHub organizations in a 105-second automated enforcement window.","The disabling of Azure/functions-action caused GitHub workflows referencing Azure/functions-action@v1 to stop resolving, breaking CI/CD pipelines for developers.","The article links the June 5 repository injection to the May 19 durabletask PyPI compromise through the same compromised contributor account."],"insights":["The attack bypassed traditional package-install defenses by using editor and AI-agent startup mechanisms, making simply opening an infected repository in a supported tool sufficient to trigger the payload.","The malicious commit used multiple evasion signals at once, including a misleading code-change message, a backdated timestamp, no source-code modifications, and a “[skip ci]” flag to suppress automated checks.","The incident shows that repository-local AI tool configuration files such as .claude/settings.json, .gemini/settings.json, and .cursor/rules/setup.mdc should be treated as supply-chain risk indicators rather than harmless editor metadata.","The outage of Azure/functions-action demonstrates that GitHub Actions workflows pinned to mutable tags like @v1 can fail globally when an upstream repository is disabled, even without any change in the dependent project.","The reuse of the same compromised contributor account across the PyPI compromise and the GitHub repository injection indicates that credential rotation or account remediation after the earlier incident was not sufficient to prevent a second delivery channel from being abused."],"referencedReports":[{"title":"Miasma Reaches Azure","url":"https://opensourcemalware.org/blog/miasma-reaches-azure","publisher":"OpenSource Malware","context":"The article says OpenSource Malware first reported the list of 73 Microsoft repositories disabled by GitHub during the Miasma incident.","category":"","primary":false}],"body":"\u003cp\u003eOn June 5, 2026, the Miasma worm campaign reached Microsoft’s Azure GitHub organizations when a malicious commit was pushed to Azure/durabletask using a previously compromised contributor account. The commit planted configuration files that executed or prompted execution of a credential-harvesting payload when developers opened the repository in Claude Code, Gemini CLI, Cursor, or VS Code. GitHub later disabled 73 repositories across four Microsoft GitHub organizations in a 105-second automated sweep.\u003c/p\u003e\n\n\u003cp\u003eThe incident is significant because it shifted the attack surface from package installation to repository opening in developer tools and AI coding agents. The article contrasts this with the May 19 compromise of Microsoft’s durabletask PyPI package, where malicious versions were uploaded directly to PyPI using a compromised publishing token. The June 5 attack added five files, including a 4.6 MB obfuscated JavaScript payload at .github/setup.js and tool-specific configuration files that pointed to it.\u003c/p\u003e\n\n\u003cp\u003eOne major impact was the disabling of Azure/functions-action, the official GitHub Action used to deploy Azure Functions. Workflows referencing Azure/functions-action@v1 stopped resolving, causing CI/CD failures reported by developers in a Microsoft Learn Q\u0026amp;A thread. The article recommends treating systems as compromised if affected repositories were opened in the targeted tools, rotating credentials, auditing repositories and package releases, and pinning GitHub Actions to commit SHAs instead of mutable tags.\u003c/p\u003e\n"},{"n":1,"title":"Four Domains, One Email: The DocuSign Homoglyph That Rode a CDR Allow-List","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/docusign-homoglyph-triple-domain-mismatch-mailchimp-vishing","time":"11:00","priority":"MAY READ","score":72,"tldr":"A phishing email impersonating DocuSign and Vantage Bank bypassed authentication failures because it passed through an allow-listed Votiro CDR relay, turning a clearly suspicious multi-domain message into trusted delivery. The key lesson is that allow-listed security relays should not automatically override authentication and behavioral checks.","briefOverview":"\u003cp\u003eA phishing email used the display name “Vantage via D0cuSign,” with a zero replacing the letter O in DocuSign, and impersonated Vantage Bank while using multiple unrelated domains. The From address was account@yshfoodsupply[.]com, the Return-Path was postmaster@hansabusad[.]com, the Reply-To was support@vantage[.]bank, and the X-Relaying-Domain header referenced candybreak[.]net. The article describes the message as a credential-harvesting and brand-impersonation attack.\u003c/p\u003e\n\n\u003cp\u003eThe message failed or lacked standard authentication signals, with SPF, DKIM, DMARC, and CompAuth all returning none or fail, including CompAuth reason=405. Despite this, it was delivered with SCL=-1 because it passed through a Votiro CDR relay at 44[.]206[.]213[.]130 that was on the recipient organization’s allow-list. The article emphasizes that the allow-list converted total authentication failure into delivery.\u003c/p\u003e\n\n\u003cp\u003eThe email included a “Review Document” call to action routed through the Mailchimp redirect domain us[.]list-manage[.]com, an invite.ics calendar attachment, and a document.png attachment served as image/jpeg. Themis scored the message at 66% confidence, identified the recipient as a VIP, and one mailbox was quarantined. The article recommends auditing CDR relay allow-lists and treating multiple unrelated email domains as a high-confidence warning sign.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article analyzes a phishing email that impersonated Vantage Bank and DocuSign using the display name “Vantage via D0cuSign.” The use of a zero in “D0cuSign” was a homoglyph technique, but the article presents the broader infrastructure mismatch as the more important part of the attack. The email involved four unrelated domains across the From, Return-Path, Reply-To, and relaying headers. It was categorized as critical credential harvesting and brand impersonation.\u003c/p\u003e\n\n\u003cp\u003eThe From address was account@yshfoodsupply[.]com, using a food supply company’s domain, while the Return-Path pointed to postmaster@hansabusad[.]com, described as an Estonian business domain. The Reply-To address used support@vantage[.]bank, the real bank being impersonated. A fourth domain, candybreak[.]net, appeared in the X-Relaying-Domain header. The article also notes Gmail infrastructure in the relay chain at 209[.]85[.]218[.]98.\u003c/p\u003e\n\n\u003cp\u003eAuthentication results gave no support to the message’s legitimacy. SPF returned none, DKIM returned none, DMARC returned none, and CompAuth returned none with reason=405. However, the message was still delivered with SCL=-1 because it transited a Votiro CDR relay at 44[.]206[.]213[.]130. That relay was on the recipient organization’s allow-list, which caused the gateway to trust the relay’s judgment and suppress its own authentication verdict.\u003c/p\u003e\n\n\u003cp\u003eThe payload included two attachments and a link-based call to action. The “Review Document” CTA routed through us[.]list-manage[.]com, a Mailchimp redirect domain. The attachments were invite.ics, a 580-byte calendar file, and document.png, a 339KB file served with a JPEG content type despite the PNG extension. The article describes the MIME mismatch as a minor evasion technique and the calendar invite as a way to create a persistent calendar event with attacker-controlled content.\u003c/p\u003e\n\n\u003cp\u003eThemis scored the message at 66% confidence and flagged the recipient as a VIP. One mailbox was quarantined. The X-Mailer header claimed “iPhone Mail (18E212),” but the article states that the relay chain and multi-domain infrastructure contradicted the casual mobile-send appearance. The recommended watch points include auditing CDR relay allow-lists, inspecting display names character by character, and treating three or more unrelated domains across From, Return-Path, and Reply-To as a high-confidence indicator regardless of SCL score.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article examines a phishing email that used the display name “Vantage via D0cuSign,” replacing the letter O in DocuSign with a zero. The message impersonated Vantage Bank and DocuSign while relying on several unrelated domains and a trusted relay path. The article describes the case as critical credential harvesting and brand impersonation.\u003c/p\u003e\n\n\u003cp\u003eThe central issue was not only the homoglyph in the display name, but the way the email reached the recipient despite total authentication failure. SPF, DKIM, DMARC, and CompAuth all returned none or fail, with CompAuth reporting reason=405. Even so, the message was delivered with SCL=-1 because it passed through a Votiro CDR relay that was on the recipient organization’s allow-list.\u003c/p\u003e\n\n\u003ch2 id=\"email-identity-and-domain-mismatches\"\u003eEmail Identity and Domain Mismatches\u003c/h2\u003e\n\n\u003cp\u003eThe email used four unrelated domains across different parts of the message structure:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe From address was account@yshfoodsupply[.]com, using a food supply company domain.\u003c/li\u003e\n\u003cli\u003eThe Return-Path was postmaster@hansabusad[.]com, described as an Estonian business domain.\u003c/li\u003e\n\u003cli\u003eThe Reply-To was support@vantage[.]bank, the real bank being impersonated.\u003c/li\u003e\n\u003cli\u003eThe X-Relaying-Domain header referenced candybreak[.]net.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article presents this mismatch as a key detection surface. Each individual domain relationship might be explainable in isolation, but together they formed a suspicious structure. The article specifically says that three or more unrelated domains in From, Return-Path, and Reply-To fields is a high-confidence indicator regardless of SCL score.\u003c/p\u003e\n\n\u003ch2 id=\"authentication-failure-and-allow-list-bypass\"\u003eAuthentication Failure and Allow-List Bypass\u003c/h2\u003e\n\n\u003cp\u003eThe message did not pass standard authentication checks. The article states that SPF returned none, DKIM returned none, DMARC returned none, and CompAuth returned none with reason=405. By the article’s assessment, the message should have been rejected or quarantined by authentication standards.\u003c/p\u003e\n\n\u003cp\u003eInstead, the message was delivered with SCL=-1. The reason given is that the email transited a Votiro CDR relay at 44[.]206[.]213[.]130. That relay was on the recipient organization’s allow-list, causing the gateway to trust the relay’s judgment and suppress its own authentication verdict.\u003c/p\u003e\n\n\u003cp\u003eThe article characterizes this as an allow-list converting total authentication failure into unconditional delivery. It recommends auditing CDR relay allow-lists and evaluating whether messages passing through those relays should still undergo authentication checks rather than inheriting blanket trust.\u003c/p\u003e\n\n\u003ch2 id=\"payload-and-delivery-elements\"\u003ePayload and Delivery Elements\u003c/h2\u003e\n\n\u003cp\u003eThe email contained both link-based and attachment-based elements. The primary call to action was labeled “Review Document” and routed through us[.]list-manage[.]com, a Mailchimp redirect domain. The article identifies this as part of the credential-harvesting flow.\u003c/p\u003e\n\n\u003cp\u003eThe message also carried two attachments:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003einvite.ics, a 580-byte calendar file.\u003c/li\u003e\n\u003cli\u003edocument.png, a 339KB file served with a JPEG content type despite having a PNG extension.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article explains that the calendar file could create persistence because a calendar entry may remain after the email is deleted, retaining attacker-controlled content, links, and reminders. It also describes the document.png MIME mismatch as a minor evasion technique, because some attachment scanners may make filtering decisions based on declared content type rather than file signature.\u003c/p\u003e\n\n\u003ch2 id=\"brand-confusion-and-presentation\"\u003eBrand Confusion and Presentation\u003c/h2\u003e\n\n\u003cp\u003eThe message combined several elements intended to appear legitimate or familiar. The visible display name referred to both Vantage and DocuSign, with the DocuSign name altered as “D0cuSign.” The Reply-To address used the real impersonated bank domain, support@vantage[.]bank.\u003c/p\u003e\n\n\u003cp\u003eThe article also says the email contained blocks referencing multiple financial brands and a survey platform. This created multi-brand confusion and made it harder for recipients to determine which organization had actually sent the message. The X-Mailer header claimed “iPhone Mail (18E212),” suggesting a casual mobile send, but the article says the relay chain and multi-domain infrastructure contradicted that claim.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-impact\"\u003eDetection and Impact\u003c/h2\u003e\n\n\u003cp\u003eThemis scored the message at 66% confidence and flagged the recipient as a VIP. One mailbox was quarantined. The article states that the detection surface was structural rather than authentication-based, because authentication returned nothing useful.\u003c/p\u003e\n\n\u003cp\u003eThe behavioral indicators included the four mismatched domains, the homoglyph in the display name, the Mailchimp redirect CTA, and the combination of a calendar file with an image attachment. The article emphasizes that while each element might be explainable alone, the combined pattern allowed behavioral analysis to act when authentication could not.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following indicators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFrom Address: account@yshfoodsupply[.]com\u003c/li\u003e\n\u003cli\u003eReturn-Path: postmaster@hansabusad[.]com\u003c/li\u003e\n\u003cli\u003eReply-To: support@vantage[.]bank\u003c/li\u003e\n\u003cli\u003eRelaying Domain: candybreak[.]net\u003c/li\u003e\n\u003cli\u003eCDR Relay IP: 44[.]206[.]213[.]130\u003c/li\u003e\n\u003cli\u003eGmail Relay IP: 209[.]85[.]218[.]98\u003c/li\u003e\n\u003cli\u003eCTA Domain: us[.]list-manage[.]com\u003c/li\u003e\n\u003cli\u003eAttachment: invite.ics, 580 bytes\u003c/li\u003e\n\u003cli\u003eAttachment: document.png, 339KB, served as image/jpeg\u003c/li\u003e\n\u003cli\u003eDisplay Name: Vantage via D0cuSign\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK Mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to four MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eT1566.001, Phishing: Spearphishing Attachment, for the ICS calendar invite and image attachment.\u003c/li\u003e\n\u003cli\u003eT1566.002, Phishing: Spearphishing Link, for the Mailchimp redirect CTA used for credential harvesting.\u003c/li\u003e\n\u003cli\u003eT1036.005, Masquerading: Match Legitimate Name or Location, for the homoglyph substitution in the DocuSign display name.\u003c/li\u003e\n\u003cli\u003eT1204.001, User Execution: Malicious Link, for the “Review Document” CTA requiring recipient click-through.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommended-watch-points\"\u003eRecommended Watch Points\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends auditing CDR relay allow-lists to determine whether relayed messages should receive blanket trust. It also recommends continuing to run authentication checks on messages passing through such relays. Another recommended watch point is to inspect display names character by character, since the zero in “D0cuSign” can be difficult to notice at reading speed.\u003c/p\u003e\n\n\u003cp\u003eThe article further recommends treating three or more unrelated domains in the From, Return-Path, and Reply-To fields as a high-confidence indicator. In this case, the suspicious structure remained <script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>

          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>

      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{

      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",

      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"

      {priorityShort(priority)}
    </span>

}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">

}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
