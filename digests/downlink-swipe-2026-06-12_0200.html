<script>
window.__DL_ARTICLES = [{"n":2,"title":"Marking Your Own Homework (Check Point Remote Access VPN IKEv1 Authentication Bypass CVE-2026-50751)","source":"labs.watchtowr.com","sourceColorIdx":8,"link":"https://labs.watchtowr.com/marking-your-own-homework-check-point-remote-access-vpn-ikev1-authentication-bypass-cve-2026-50751/","time":"05:17","priority":"MUST READ","score":96,"tldr":"watchTowr Labs found that CVE-2026-50751 in Check Point Remote Access VPN lets an attacker use client-controlled IKEv1 Vendor ID flags to skip certificate and signature validation, allowing login as a valid user with a self-signed certificate and random signature. The flaw affects legacy IKEv1 remote access paths, including UDP 500 and TCP 443 Visitor Mode, and is fixed by Check Point hotfix sk185033.","briefOverview":"\u003cp\u003ewatchTowr Labs analyzed CVE-2026-50751, a CVSS 9.3 authentication bypass in Check Point Mobile Access/SSL VPN, Remote Access VPN, and Spark Firewall products. Check Point released hotfixes on June 8, 2026, and the article says the flaw had reportedly been exploited in the wild since May 7, 2026. The affected code is in deprecated IKEv1 VPN functionality across multiple Gaia versions.\u003c/p\u003e\n\n\u003cp\u003eThe core issue is that the gateway allowed a client-controlled IKEv1 Vendor ID payload to influence whether authentication checks were performed. watchTowr found that a VPNExtFeatures Vendor ID could write flags into the negotiation state, causing certificate processing and phase-1 signature verification to be skipped. In the researchers’ test, a vulnerable gateway accepted a random signature and created a phase-1 IKE SA, while a patched gateway rejected the same attempt.\u003c/p\u003e\n\n\u003cp\u003eThe researchers demonstrated that an attacker could authenticate as a provisioned Remote Access user by using a valid username, the ICA organization string from the gateway’s public TLS certificate, a self-signed certificate, and an invalid signature. They also reported that exploitation worked over UDP 500 and over TCP 443 using Check Point Visitor Mode. The article states the bypass affected Certificate, Certificate with enrollment, and Mixed authentication modes, while Legacy username/password mode still required a real XAUTH password.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ewatchTowr Labs published a technical analysis of CVE-2026-50751, an authentication bypass in Check Point’s Mobile Access/SSL VPN, Remote Access VPN, and Spark Firewall products. Check Point released hotfixes for this and another issue on June 8, 2026, affecting deprecated IKEv1 VPN code. The article lists affected Gaia releases including R80.20.X, R80.40, R81, R81.10, R81.10.X, R81.20, R82, R82.00.X, and R82.10.\u003c/p\u003e\n\n\u003cp\u003eThe article says the vulnerability had reportedly been exploited in the wild since May 7, 2026, about a month before patches were available. It also says Check Point described “a few dozen targeted organizations,” and that at least one incident had been linked to a Qilin ransomware affiliate. The advisory was described as identifying a logic flaw in certificate validation during the IKEv1 key exchange.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr’s diffing compared R82.10 Jumbo Hotfix Take 19 against Take 19 plus the sk185033 hotfix. The researchers initially examined vpnd, but found that on R81.10 and later the IKE negotiation is handled by iked, which listens internally on UDP 30500. The important code changes appeared in ikeMainMode.cc, ikeAggressive.cc, and machine_cert_utils.cc, including removal of a process_cert_payloads argument that had controlled whether machine certificate payloads were processed.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerable path used a client-influenced flag word at state offset 0x4bc4 to decide whether authentication checks should run. In process_auth_pl, bit 0x2 controlled whether a 0xF9 signature payload was processed, and in verify_peer_auth, bit 0x4 could short-circuit verifyMessagePhase1 and return authentication success. watchTowr found that processVendorIDPayload wrote this flag word from four bytes supplied after the VPNExtFeatures Vendor ID magic value.\u003c/p\u003e\n\n\u003cp\u003eThe researchers proved the bypass by sending the VPNExtFeatures Vendor ID with bit 0x4 set, completing Diffie-Hellman, and sending a random HASH_I in the encrypted fifth Main Mode message. The vulnerable gateway logged that the peer was not a Check Point peer but still created a phase-1 SA and saved the user, while the patched gateway logged an authentication failure and rejected the attempt. They later showed certificate-authentication bypass using an ID distinguished name for a provisioned user, a newly minted self-signed X.509 certificate, and a random signature.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, an attacker needed a valid username and the ICA organization string, with the latter available from the gateway’s public TLS certificate. The same probe could act as a username oracle because wrong guesses failed at user lookup while right ones succeeded. watchTowr also reported that the bypass worked over both UDP 500 and TCP 443 Visitor Mode, and across Certificate, Certificate with enrollment, and Mixed authentication modes, while Legacy username/password mode was not bypassable because XAUTH still required a password.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003ewatchTowr Labs analyzed CVE-2026-50751, a Check Point Remote Access VPN IKEv1 authentication bypass with a CVSS score of 9.3. The vulnerability affects Check Point Mobile Access/SSL VPN, Remote Access VPN, and Spark Firewall products, specifically in deprecated IKEv1 VPN code. Check Point released hotfixes on June 8, 2026 through sk185033.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the vulnerability had reportedly been exploited in the wild since May 7, 2026, roughly a month before patches were available. It also says Check Point reported “a few dozen targeted organizations,” and that at least one incident had been linked to a Qilin ransomware affiliate. The vulnerability was described as a logic flaw in how certificates are validated during the IKEv1 key exchange.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products-and-preconditions\"\u003eAffected Products and Preconditions\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the affected Gaia versions as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eR80.20.X\u003c/li\u003e\n\u003cli\u003eR80.40\u003c/li\u003e\n\u003cli\u003eR81\u003c/li\u003e\n\u003cli\u003eR81.10\u003c/li\u003e\n\u003cli\u003eR81.10.X\u003c/li\u003e\n\u003cli\u003eR81.20\u003c/li\u003e\n\u003cli\u003eR82\u003c/li\u003e\n\u003cli\u003eR82.00.X\u003c/li\u003e\n\u003cli\u003eR82.10\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003ewatchTowr says exploitation depends on several conditions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe target accepts legacy Remote Access clients.\u003c/li\u003e\n\u003cli\u003eIKEv1 is permitted rather than IKEv2-only.\u003c/li\u003e\n\u003cli\u003eMachine certificate authentication is not mandatory.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that these prerequisites may still leave many potential targets because legacy client support is common in enterprise environments.\u003c/p\u003e\n\n\u003ch2 id=\"research-method\"\u003eResearch Method\u003c/h2\u003e\n\n\u003cp\u003ewatchTowr compared R82.10 Jumbo Hotfix Take 19, which they describe as vulnerable, against the same build with the sk185033 hotfix applied. The researchers first examined vpnd, but found that vpnd did not bind UDP 500 or UDP 4500. They then determined that on R81.10 and later, Check Point redirects IKE negotiation to a newer daemon, iked, which listens internally on UDP 30500.\u003c/p\u003e\n\n\u003cp\u003eAfter diffing the correct binary, the changed code appeared in:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eikeMainMode.cc\u003c/li\u003e\n\u003cli\u003eikeAggressive.cc\u003c/li\u003e\n\u003cli\u003emachine_cert_utils.cc\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eA key change was the removal of a trailing integer argument from process_cert_payloads. In the vulnerable version, that argument controlled whether machine certificate payloads were processed. In the patched version, the function instead consults the appliance’s own machine certificate policy from the negotiation state.\u003c/p\u003e\n\n\u003ch2 id=\"root-cause\"\u003eRoot Cause\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerable code allowed the decision to process certificate material and validate authentication to depend on flags that could be influenced by the client. In process_cert_payloads, the vulnerable implementation used a caller-supplied process_machine_certs flag to decide whether to process Check Point machine certificate payloads of type 0xF6. The patched version removed that argument and used a field populated from the gateway’s configured machine certificate policy.\u003c/p\u003e\n\n\u003cp\u003eThe more important issue appeared in the caller process_auth_pl and in verify_peer_auth. In process_auth_pl, the code read a flags dword from state offset 0x4bc4 and tested bit 0x2. If this bit was not set, the code did not call seekPayload for the 0xF9 signature payload and did not call processSigPayload.\u003c/p\u003e\n\n\u003cp\u003eIn verify_peer_auth, the same flag word controlled whether verifyMessagePhase1 ran. If bit 0x4 was set, an OR condition short-circuited and the function returned authentication success without calling verifyMessagePhase1. The article identifies verifyMessagePhase1 as the phase-1 signature check.\u003c/p\u003e\n\n\u003ch2 id=\"client-controlled-authentication-flags\"\u003eClient-Controlled Authentication Flags\u003c/h2\u003e\n\n\u003cp\u003ewatchTowr searched for writes to state offset 0x4bc4 and found two. One was initialization in FwIkeNewPhase1State, which zeroed the field for a new negotiation. The other was in processVendorIDPayload.\u003c/p\u003e\n\n\u003cp\u003eThe Vendor ID involved was the 16-byte value:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e3c f1 87 b2 47 40 29 ea 46 ac 7f d0 ea f2 89 f5\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe gateway logged this as VPNExtFeatures. According to the article, processVendorIDPayload required at least four bytes after the 16-byte magic value, read those four attacker-supplied bytes, byte-swapped them, and stored them directly into state + 0x4bc4. This meant the client could provide the flags used by the gateway to decide whether to perform authentication checks.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights an additional inconsistency: a peer that sent only the VPNExtFeatures Vendor ID was logged by the gateway as “not a Check Point peer,” while the gateway still honored the client-supplied flag that disabled authentication verification.\u003c/p\u003e\n\n\u003ch2 id=\"proof-of-concept-behavior\"\u003eProof of Concept Behavior\u003c/h2\u003e\n\n\u003cp\u003eTo prove the issue, watchTowr wrote a minimal IKEv1 Main Mode client using AES-256, SHA1, Diffie-Hellman group 2, and Check Point’s 0xFADD hybrid authentication method. They sent the VPNExtFeatures Vendor ID with the four trailing bytes set to 0x00000004, setting bit 0x4. They then completed Diffie-Hellman and sent a completely random HASH_I in encrypted message 5.\u003c/p\u003e\n\n\u003cp\u003eThey tested identical packets against two gateways:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA vulnerable R82.10 Take 19 appliance.\u003c/li\u003e\n\u003cli\u003eA patched Take 19 appliance with sk185033.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe vulnerable gateway logged that the peer was not a Check Point peer, proceeded through MMCreate6, and saved the user in IkeSAFromState. The patched gateway logged an authentication failure with hybrid and sent an authentication failed notification. The article says the vulnerable gateway created a phase-1 SA based on a signature generated with os.urandom.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr also performed negative controls:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVPNExtFeatures with capability 0x00000004 skipped verifyMessagePhase1 and produced the bypass.\u003c/li\u003e\n\u003cli\u003eVPNExtFeatures with capability 0x00000000 caused verifyMessagePhase1 to run and resulted in rejection.\u003c/li\u003e\n\u003cli\u003eNo Vendor ID caused verifyMessagePhase1 to run and resulted in rejection.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"authentication-as-a-provisioned-user\"\u003eAuthentication as a Provisioned User\u003c/h2\u003e\n\n\u003cp\u003eThe researchers then moved from proving acceptance of invalid phase-1 data to showing authentication as a provisioned Remote Access user. They switched from the hybrid method to RSA signature authentication, IKE authentication method 3, using the certificate path.\u003c/p\u003e\n\n\u003cp\u003eThe credentials they presented were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn ID payload containing a distinguished name in the form CN=\u003cusername\u003e,OU=users,O=\u003cICA-O\u003e.\u003c/li\u003e\n\u003cli\u003eA self-signed X.509 certificate minted by the researchers.\u003c/li\u003e\n\u003cli\u003eA signature payload containing 256 bytes of os.urandom.\u003c/li\u003e\n\u003cli\u003eThe VPNExtFeatures Vendor ID with bit 0x4 set.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBecause verifyMessagePhase1 was skipped, the gateway did not verify the signature and did not validate the certificate trust chain. The article states that the gateway only checked whether the subject distinguished name resolved to a provisioned Remote Access user.\u003c/p\u003e\n\n\u003cp\u003eAccording to watchTowr, an attacker needed two pieces of information:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA valid username.\u003c/li\u003e\n\u003cli\u003eThe ICA organization string for the distinguished name.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the ICA organization string is present in the gateway’s public TLS certificate and can be read from there. It also says a wrong username fails at user lookup while a correct username succeeds, making the same probe a username oracle.\u003c/p\u003e\n\n\u003cp\u003eIn their demonstration, watchTowr’s tool authenticated as the user “watchtowr” with a forged certificate and invalid signature, decrypted the gateway’s final phase-1 message, and retrieved the gateway internal IP and VPN certificate. The gateway also logged that the user CN=watchtowr,OU=users,O=watchtowr was saved.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-over-udp-and-tcp-443\"\u003eExploitation Over UDP and TCP 443\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the vulnerability was exploitable over UDP 500. It also says watchTowr was able to exploit it over TCP 443.\u003c/p\u003e\n\n\u003cp\u003eWhen UDP 500 and UDP 4500 are filtered, Check Point clients can fall back to Visitor Mode. Visitor Mode tunnels the same IKE exchange over a raw TCP stream on port 443 using a framing protocol called TCPT. watchTowr says they reversed the protocol enough to demonstrate that the same bypass worked over this path.\u003c/p\u003e\n\n\u003ch2 id=\"authentication-modes\"\u003eAuthentication Modes\u003c/h2\u003e\n\n\u003cp\u003ewatchTowr reports that the vulnerability appeared exploitable across several Check Point certificate modes for SSL Network Extender user authentication. Their table states:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCertificate mode was bypassed over UDP 500 and TCP 443.\u003c/li\u003e\n\u003cli\u003eCertificate with enrollment mode was bypassed over UDP 500 and TCP 443.\u003c/li\u003e\n\u003cli\u003eMixed mode was bypassed over UDP 500 and TCP 443.\u003c/li\u003e\n\u003cli\u003eLegacy username/password mode was not bypassable.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article explains that Legacy username/password mode still required a real password through XAUTH, so the bypass did not remove that gate.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-detection-artifact\"\u003eResponse and Detection Artifact\u003c/h2\u003e\n\n\u003cp\u003eCheck Point released hotfixes through sk185033 on June 8, 2026. The patched code removed the client-controlled process_machine_certs function argument and instead based machine certificate processing on the gateway’s own configured policy. The patched gateway in watchTowr’s test rejected the malicious exchange with an authentication failure.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr also released a Detection Artefact Generator at the GitHub repository watchtowrlabs/watchTowr-vs-Check-Point-CVE-2026-50751. The article says the decision to release it was based on the attackers having already had the vulnerability for a month.\u003c/p\u003e\n","keyPoints":["Check Point released hotfixes on June 8, 2026 for CVE-2026-50751, a 9.3 CVSS authentication bypass affecting Mobile Access/SSL VPN, Remote Access VPN, and Spark Firewall products in deprecated IKEv1 VPN code.","watchTowr Labs found that the vulnerable IKEv1 implementation allowed a client-supplied VPNExtFeatures Vendor ID payload to write authentication flags that could cause certificate signature checks to be skipped.","The researchers demonstrated that a vulnerable gateway accepted a random HASH_I and created a phase-1 IKE SA, while a patched gateway rejected the same attempt with an authentication failure.","The article states that an attacker could authenticate as a provisioned Remote Access user by presenting a matching subject distinguished name, a self-signed X.509 certificate, and an invalid signature, because the gateway did not verify the signature or certificate trust chain.","watchTowr Labs reported that the bypass worked over both UDP 500 and TCP 443 Visitor Mode, and across the Certificate, Certificate with enrollment, and Mixed user authentication modes."],"insights":["The vulnerable gateway could log a peer as “not a Check Point peer” while still honoring that peer’s client-supplied flag to skip authentication checks.","The bypass required only a valid username and the ICA organization string, and the article states the ICA organization value could be obtained from the gateway’s public TLS certificate.","Wrong username guesses failed at user lookup while valid usernames succeeded, making the same authentication probe usable as a username oracle.","Filtering UDP 500 or UDP 4500 was not sufficient mitigation in the researchers’ testing because the same IKEv1 exchange could be tunneled over TCP 443 using Check Point Visitor Mode.","The plain Legacy username/password mode was described as not bypassable because XAUTH still required a real password, while the certificate-based modes were bypassed."],"referencedReports":[{"title":"sk185033","url":"https://support.checkpoint.com/results/sk/sk185033?_gl=1%2A5pnkru%2A_gcl_au%2AMjEzOTk1NjU4Ni4xNzgwOTI0NTY5\u0026ref=labs.watchtowr.com","publisher":"Check Point","context":"The article cites Check Point’s June 8, 2026 hotfix advisory for vulnerabilities in Mobile Access/SSL VPN, Remote Access VPN, and Spark Firewall products, including CVE-2026-50751.","category":"advisory","primary":true}],"body":"\u003cp\u003ewatchTowr Labs analyzed CVE-2026-50751, a CVSS 9.3 authentication bypass in Check Point Mobile Access/SSL VPN, Remote Access VPN, and Spark Firewall products. Check Point released hotfixes on June 8, 2026, and the article says the flaw had reportedly been exploited in the wild since May 7, 2026. The affected code is in deprecated IKEv1 VPN functionality across multiple Gaia versions.\u003c/p\u003e\n\n\u003cp\u003eThe core issue is that the gateway allowed a client-controlled IKEv1 Vendor ID payload to influence whether authentication checks were performed. watchTowr found that a VPNExtFeatures Vendor ID could write flags into the negotiation state, causing certificate processing and phase-1 signature verification to be skipped. In the researchers’ test, a vulnerable gateway accepted a random signature and created a phase-1 IKE SA, while a patched gateway rejected the same attempt.\u003c/p\u003e\n\n\u003cp\u003eThe researchers demonstrated that an attacker could authenticate as a provisioned Remote Access user by using a valid username, the ICA organization string from the gateway’s public TLS certificate, a self-signed certificate, and an invalid signature. They also reported that exploitation worked over UDP 500 and over TCP 443 using Check Point Visitor Mode. The article states the bypass affected Certificate, Certificate with enrollment, and Mixed authentication modes, while Legacy username/password mode still required a real XAUTH password.\u003c/p\u003e\n"},{"n":1,"title":"Borrowed Trust – Systematic Exploitation of Abandoned Cloud DNS Delegations to serve Thai Gambling SEO Content","source":"cyble.com","sourceColorIdx":0,"link":"https://cyble.com/blog/borrowed-trust-cloud-dns-takeover-thai-gambling-seo-poisoning/","time":"05:36","priority":"SHOULD READ","score":88,"tldr":"Cyble found a large SEO-poisoning campaign abusing abandoned cloud DNS delegations, mainly Azure DNS zones, to host Thai gambling pages on trusted enterprise subdomains with valid TLS certificates. The key takeaway is that stale NS delegations left after cloud decommissioning can be reclaimed by attackers, so organizations must audit and remove abandoned DNS delegations before their domain trust is hijacked.","briefOverview":"\u003cp\u003eCyble Research \u0026amp; Intelligence Labs identified an active SEO poisoning campaign that abused abandoned cloud DNS zone delegations to serve Thai-language gambling content under trusted enterprise domains. The campaign compromised 163 organizations across more than 30 countries, including federal government agencies, national healthcare systems, financial institutions, critical infrastructure operators, and major universities. At the time of publication, 161 organizations remained actively compromised.\u003c/p\u003e\n\n\u003cp\u003eThe primary mechanism was Azure DNS zone takeover, where NS delegations to deleted or abandoned Azure DNS zones remained in parent DNS zones and were later claimed by the actor under a new Azure subscription. The actor added wildcard records, obtained valid Let’s Encrypt wildcard TLS certificates, and deployed a Next.js gambling kit that appeared under the victim organization’s own domain. Other observed mechanisms included DigitalOcean DNS zone takeover, direct wildcard DNS misconfiguration, and more than 1,000 individually named A records in a Verizon subdomain environment.\u003c/p\u003e\n\n\u003cp\u003eCyble linked the campaign to three OVH delivery nodes and a separate 103-node backend fleet in Hong Kong under AS398478. The campaign used affiliate redirects, server-side Thailand-focused referrer verification, and tracking codes such as ibiza99vip1, bigwinv1, link99, and seven77vip1. The article emphasizes that valid TLS certificates, clean IP reputation, trusted domains, and legitimate infrastructure caused conventional security controls to produce little or no signal.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCyble Research \u0026amp; Intelligence Labs reported an active SEO poisoning campaign that systematically exploited abandoned cloud DNS delegations to serve Thai-language gambling content from reputable enterprise domains. The investigation began with anomalous DNS resolution in the cardsforheroes.verizon.com subdomain environment, where more than 1,000 individually named gambling-themed subdomains resolved to a single OVH IP. From that starting point, Cyble pivoted to 162 additional compromised organizations, bringing the confirmed victim count to 163 organizations across more than 30 countries.\u003c/p\u003e\n\n\u003cp\u003eThe article describes abandoned cloud DNS delegation as the central vulnerability class. Organizations had delegated subdomains to Azure DNS or other cloud DNS providers during project provisioning, but when infrastructure was decommissioned, the parent-zone NS records were often left in place. In Azure cases, the actor could claim the orphaned zone under a fresh Azure subscription, add wildcard A records, and obtain Let’s Encrypt wildcard certificates for the victim subdomain.\u003c/p\u003e\n\n\u003cp\u003eCyble identified four compromise mechanisms across the victim set. More than 150 organizations were affected through Azure DNS zone takeover, two through DigitalOcean DNS zone takeover, two through direct wildcard DNS records in organizational DNS zones, and one through per-subdomain A records. The Verizon environment was distinct because it used more than 1,000 individually named A records instead of a wildcard, implying bulk record creation through DNS API access or DNS management credentials.\u003c/p\u003e\n\n\u003cp\u003eThe delivered content was a consistent Thai-language Next.js gambling kit with the build ID QQOrXCFjoI6C9oF-4YVhl and the favicon path /img/ib99-hq.ico. The pages used valid TLS certificates, Thai-language SEO content, Schema.org FAQ data, AMP alternate links, and static assets served from the compromised enterprise domains. Outbound redirects carried affiliate codes including ibiza99vip1, bigwinv1, link99, and seven77vip1, and a server-side layer verified Thailand-origin traffic before redirecting users.\u003c/p\u003e\n\n\u003cp\u003eCyble attributed the infrastructure to three OVH delivery nodes and a 103-node backend fleet hosted in Hong Kong within AS398478, PEG TECH INC. The backend fleet shared multiple technical indicators, including the broker-xm.com certificate, an identical HTTP body MD5 hash across all 103 nodes, an Envoy proxy fingerprint, MySQL 5.7.44-log, BT-Panel certificate details, and a uniform JARM fingerprint. The article recommends removing abandoned NS delegations, reporting abandoned Azure zones to Microsoft MSRC, revoking affected Let’s Encrypt certificates, auditing cloud-delegated subdomains, and using Certificate Transparency monitoring and wildcard DNS testing for detection.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCyble Research \u0026amp; Intelligence Labs identified an active SEO poisoning campaign abusing abandoned cloud DNS zone delegations to serve Thai-language gambling content under trusted enterprise domains. The campaign compromised 163 organizations across more than 30 countries, including federal government agencies, national healthcare systems, financial institutions, critical infrastructure operators, and major universities. At the time of publication, Cyble stated that 161 organizations remained actively compromised.\u003c/p\u003e\n\n\u003cp\u003eThe campaign’s core mechanism was the takeover of abandoned cloud DNS zones, especially Azure DNS zones. When organizations decommissioned cloud infrastructure but left NS delegations in their parent DNS zones, the actor identified those stale delegations, claimed the orphaned zones under a new Azure subscription, and used the victim’s domain authority to serve gambling SEO content. The pages were reachable with valid Let’s Encrypt wildcard TLS certificates and appeared under legitimate enterprise-owned domains.\u003c/p\u003e\n\n\u003ch2 id=\"initial-discovery\"\u003eInitial Discovery\u003c/h2\u003e\n\n\u003cp\u003eCyble first identified anomalous DNS resolution in the cardsforheroes.verizon.com subdomain environment during an ongoing vulnerability assessment. The Verizon environment contained more than 1,000 individually named subdomains serving Thai-language online gambling content under Verizon’s trusted domain authority. Each subdomain followed gambling brand keyword patterns with URL-encoded Thai characters, and all resolved to 51.79.199.51 at OVH SAS, AS16276.\u003c/p\u003e\n\n\u003cp\u003eA representative endpoint loaded a fully rendered Next.js gambling application with outbound affiliate redirect links. Cyble found that the endpoint shared structural similarities with 97 other enterprise subdomains across unrelated organizations. The article states that affiliate referral parameters on every redirect established the campaign’s monetization intent as gambling registration commission rather than defacement or malware delivery.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-class-abandoned-cloud-dns-delegation\"\u003eVulnerability Class: Abandoned Cloud DNS Delegation\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a DNS misconfiguration that occurs when enterprises delegate subdomains to Azure DNS zones for project environments and later delete the cloud resources without removing the NS delegation from the parent DNS zone. The parent zone continues pointing queries for that subdomain to Azure nameservers, even though the original Azure DNS zone no longer exists. Cyble observed cases where these delegations had remained in place for more than six years.\u003c/p\u003e\n\n\u003cp\u003eThe exploitability depends on whether the DNS zone name can be claimed by a new subscriber. According to the article, Microsoft’s zone-creation model has historically allowed a subscriber to register a zone by name under their own subscription. If a zone was abandoned with a canceled subscription and the parent-zone NS delegation was not removed, a third party could recreate the zone and inherit delegated DNS authority for that subdomain.\u003c/p\u003e\n\n\u003ch2 id=\"dns-compromise-mechanisms\"\u003eDNS Compromise Mechanisms\u003c/h2\u003e\n\n\u003cp\u003eCyble identified four distinct mechanisms accounting for the 163 confirmed victim organizations.\u003c/p\u003e\n\n\u003ch3 id=\"azure-dns-zone-takeover\"\u003eAzure DNS Zone Takeover\u003c/h3\u003e\n\n\u003cp\u003eMore than 150 organizations were affected through Azure DNS zone takeover. The actor identified subdomains whose NS records still pointed to Azure DNS nameservers after the underlying subscription or zone had been canceled or abandoned. The actor then created a new Azure subscription, claimed the orphaned zone by name, added wildcard A records pointing all subdomains to a delivery IP, and used ACME HTTP-01 validation to obtain Let’s Encrypt wildcard certificates.\u003c/p\u003e\n\n\u003cp\u003eCyble cites authoritative DNS evidence from Microsoft nameserver infrastructure showing the actor’s wildcard A records. Zone SOA serials of 1 on confirmed victims indicated that the zones were created from scratch by the actor rather than modified from an existing state. Certificate Transparency logs showed long dormancy gaps, including a pharmaceutical company pilot subdomain with a last legitimate certificate in October 2019 and an actor certificate on April 11, 2026.\u003c/p\u003e\n\n\u003ch3 id=\"digitalocean-dns-zone-takeover\"\u003eDigitalOcean DNS Zone Takeover\u003c/h3\u003e\n\n\u003cp\u003eTwo organizations were affected through DigitalOcean DNS zone takeover: a U.S. luxury furniture retailer and an Indian university. Their compromised subdomains were delegated to DigitalOcean nameservers rather than Azure. Both had wildcard records resolving to 38.127.8.49.\u003c/p\u003e\n\n\u003cp\u003eThe article states that DigitalOcean’s zone-claiming model carries the same structural vulnerability when abandoned DNS zones in canceled accounts become available for re-registration. Cyble concluded that the actor’s tooling targeted multiple cloud DNS providers.\u003c/p\u003e\n\n\u003ch3 id=\"direct-wildcard-misconfiguration\"\u003eDirect Wildcard Misconfiguration\u003c/h3\u003e\n\n\u003cp\u003eTwo organizations were affected through direct wildcard DNS misconfiguration: a U.S. energy company’s development subdomain and a mobile payments platform’s development subdomain. These subdomains resolved via wildcard to 139.99.82.106 despite not using cloud DNS zone delegation. Both used their own organizational nameservers, making cloud zone takeover mechanically impossible in those cases.\u003c/p\u003e\n\n\u003cp\u003eCyble states that the wildcard records resolved from within the parent zone. The article says this indicated either an orphaned wildcard A record left in the organization’s DNS console when a project was decommissioned, or a direct DNS management access path exploited by the actor.\u003c/p\u003e\n\n\u003ch3 id=\"per-subdomain-a-records\"\u003ePer-Subdomain A Records\u003c/h3\u003e\n\n\u003cp\u003eThe Verizon environment represented a distinct mechanism. Instead of a single wildcard record, it contained more than 1,000 individually named A records pointing gambling-keyword subdomains to 51.79.199.51. Cyble states that this implied either an automated DNS API script with zone-write access or a compromised DNS management credential enabling bulk record creation.\u003c/p\u003e\n\n\u003ch2 id=\"pivoting-and-infrastructure-discovery\"\u003ePivoting and Infrastructure Discovery\u003c/h2\u003e\n\n\u003cp\u003eCyble pivoted from the initial Verizon endpoint to a broader victim set using passive DNS data, page fingerprinting, and infrastructure indicators. The primary delivery IP, 51.79.199.51, revealed more than 90 enterprise subdomains serving identical content. These matched on the Next.js build ID QQOrXCFjoI6C9oF-4YVhl, the favicon path /img/ib99-hq.ico, and outbound affiliate redirects to the same three destination domains.\u003c/p\u003e\n\n\u003cp\u003ePassive DNS data against AS16276, OVH, surfaced two additional delivery IPs: 139.99.82.106 and 38.127.8.49. Both served the same gambling kit with the same build fingerprint across a partially overlapping but distinct victim set. Together, the three OVH delivery nodes accounted for the full 163-organization victim estate described in the article.\u003c/p\u003e\n\n\u003cp\u003eA JARM TLS fingerprinting pivot from the primary delivery node exposed 38.173.56.218 in Hong Kong under AS398478, PEG TECH INC. Unlike thousands of generic shared-hosting JARM matches, this host presented a ThinkPHP application framework error on port 443, a Chinese server management panel certificate identity on port 21, and MySQL 5.7.44-log on port 3306. Cyble described this as the entry point from the OVH delivery layer into the backend infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"affiliate-monetization-architecture\"\u003eAffiliate Monetization Architecture\u003c/h2\u003e\n\n\u003cp\u003eThe campaign monetized traffic through gambling affiliate redirects. Every destination redirect carried a ?rc= affiliate code, including ibiza99vip1, bigwinv1, link99, or seven77vip1. The article states that these codes attributed completed registrations to the actor and triggered commission payouts from the destination platform.\u003c/p\u003e\n\n\u003cp\u003eCyble observed a server-side verification layer before redirect issuance. A POST request at a live endpoint returned a response including status “ok,” the message “TH - Referrer verified,” and data containing the referrer “link99.” The article states that the backend validated geographic origin server-side and did not redirect requests from outside Thailand.\u003c/p\u003e\n\n\u003cp\u003eThe article describes link99 as a sub-affiliate publisher ID that sits above the ?rc= codes in the platform’s tracking hierarchy. Cyble states that the actor earned at both tiers: publisher-level credit under link99 for delivering Thai traffic and per-registration payout under the ?rc= code for each conversion. The two layers were described as independent, allowing campaign codes to rotate while link99 persisted as the actor’s platform identity.\u003c/p\u003e\n\n\u003ch2 id=\"destination-platforms-and-gambling-kit\"\u003eDestination Platforms and Gambling Kit\u003c/h2\u003e\n\n\u003cp\u003eCyble confirmed four destination platforms: ibiza99.autos, big888.store, seven77.click, and stillsunday.pl. The article states that these domains were white-label deployments on a shared codebase, supported by identical CSS hashes and JavaScript resilience logic across all three except big888.store. Big888.store carried active Google Search Console verification, which Cyble said indicated that the platform operator ran its own independent SEO operation beyond this campaign.\u003c/p\u003e\n\n\u003cp\u003eThe gambling kit served from compromised enterprise subdomains returned a fully rendered Next.js page when requested with Thai locale headers. The pages included lang=\u0026ldquo;th\u0026rdquo;, Thai-language gambling branding, valid Let’s Encrypt wildcard TLS certificates matching victim subdomains, Schema.org FAQ structured data, AMP alternate links, and static assets served from paths under the compromised domain. The article states that the minimum deposit advertised across variants was 1 Thai Baht, approximately $0.03 USD.\u003c/p\u003e\n\n\u003cp\u003eThe kit fingerprint was consistent across the victim estate regardless of the victim domain or OVH delivery node. Cyble states that this confirmed centralized build and deployment by a single operator.\u003c/p\u003e\n\n\u003ch2 id=\"backend-infrastructure\"\u003eBackend Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe three OVH delivery nodes handled content distribution, while the application layer was hosted in a separate backend fleet in Hong Kong. Cyble identified 103 backend nodes distributed across seven /24 subnets within 38.173.0.0/16, all under AS398478, PEG TECH INC. The fleet was discovered by pivoting on a Let’s Encrypt certificate issued to broker-xm.com that was deployed across the nodes.\u003c/p\u003e\n\n\u003cp\u003eCyble listed multiple evidence points supporting single-operator control of the backend fleet:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn identical HTTP body MD5 hash, 7df3d7cf3358af3f470ac7229387ef94, across all 103 nodes on port 80.\u003c/li\u003e\n\u003cli\u003eA shared broker-xm.com Let’s Encrypt certificate across all 103 servers.\u003c/li\u003e\n\u003cli\u003eAn identical Envoy proxy 503 error string on port 443 across all nodes.\u003c/li\u003e\n\u003cli\u003eA uniform MySQL version, 5.7.44-log, with binary replication logging enabled.\u003c/li\u003e\n\u003cli\u003eBT-Panel provisioning details showing admin@bt.cn and Dongguan, Guangdong, on FTP certificates.\u003c/li\u003e\n\u003cli\u003eA uniform JARM fingerprint across the fleet.\u003c/li\u003e\n\u003cli\u003eNo PTR records on any of the 103 IPs.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"detection-and-hunting-guidance\"\u003eDetection and Hunting Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that standard security controls produced little or no signal because the campaign used valid TLS certificates, clean IP reputation, trusted domain names, and no exploit delivery. Cyble identifies Certificate Transparency monitoring as the most reliable early indicator. Unexpected Let’s Encrypt wildcard certificates on corporate-owned subdomains, especially after a period of no certificate issuance, were presented as an anomaly that would have detected every Azure takeover victim at issuance time.\u003c/p\u003e\n\n\u003cp\u003eCyble recommends auditing Azure DNS zone delegations by enumerating NS delegation records in parent DNS zones and verifying that corresponding Azure DNS zones exist in subscriptions the organization owns and manages. The article also recommends wildcard DNS testing by querying randomized nonsense hostnames under Azure-delegated subdomains. If such a hostname resolves unexpectedly, the zone should be treated as compromised until proven otherwise.\u003c/p\u003e\n\n\u003cp\u003eThe article provides detection indicators including DNS answers resolving to 51.79.199.51, 139.99.82.106, or 38.127.8.49; URL parameters containing rc=ibiza99vip1, rc=bigwinv1, rc=seven77vip1, or rc=link99; HTTP requests to /img/ib99-hq.ico; and outbound connections to seven AS398478 backend subnets. It also lists internet scanning pivots such as the HTTP body MD5 7df3d7cf3358af3f470ac7229387ef94, TLS certificate CN broker-xm.com, and ASN AS398478.\u003c/p\u003e\n\n\u003ch2 id=\"remediation-guidance\"\u003eRemediation Guidance\u003c/h2\u003e\n\n\u003cp\u003eFor Azure DNS zone takeover victims, Cyble recommends removing the NS delegation from the parent DNS zone immediately. The article states that this severs the attack chain regardless of what the actor maintains inside the Azure zone, because that zone is under the actor’s control and cannot be directly modified by the victim organization. Cyble also recommends reporting the abandoned zone to Microsoft MSRC with the zone name and evidence.\u003c/p\u003e\n\n\u003cp\u003eThe article further recommends requesting revocation of any Let’s Encrypt certificates issued against compromised subdomains using serial numbers from crt.sh. Organizations are advised to audit remaining subdomains for environment-style entries such as dev, uat, staging, preprod, pilot, lab, test, and sandbox, especially where they carry NS delegations to cloud providers. For DigitalOcean takeover victims, Cyble recommends removing the NS delegation from the parent zone and verifying whether the DigitalOcean zone exists in an account the organization owns.\u003c/p\u003e\n\n\u003cp\u003eFor direct wildcard misconfiguration victims, Cyble recommends removing the wildcard A record from the DNS management console. If the origin of the record cannot be identified, the article says the DNS management credential should be treated as compromised and rotated immediately.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-significance\"\u003eImpact and Significance\u003c/h2\u003e\n\n\u003cp\u003eCyble states that the actor did not breach a perimeter or exploit an application vulnerability. Instead, the actor claimed abandoned DNS infrastructure and built a commercial affiliate operation on top of it. A single wildcard record beneath an abandoned Azure delegation could expose an unlimited subdomain namespace while inheriting the TLS-verified authority of the victim’s brand.\u003c/p\u003e\n\n\u003cp\u003eThe campaign’s scale was described as the result of automated scanning applied to one vulnerability class rather than 163 separate attacks. Its use of OVH delivery nodes, Let’s Encrypt certificates, victim-owned domains, and organic search rankings allowed it to operate within legitimate infrastructure. The article concludes that abandoned NS delegations pointing to cloud providers remain candidates for future exploitation if organizations do not audit and remove them.\u003c/p\u003e\n\n\u003ch2 id=\"mitre-att-ck-techniques-cited\"\u003eMITRE ATT\u0026amp;CK Techniques Cited\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the campaign to several MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eResource Development — Acquire Infrastructure, T1583.003, for OVH VPS delivery and PEG TECH INC backend infrastructure.\u003c/li\u003e\n\u003cli\u003eResource Development — Compromise Infrastructure, T1584, for Azure DNS zone takeover of legitimate enterprise subdomains.\u003c/li\u003e\n\u003cli\u003eInitial Access — Drive-by Compromise, T1189, for Thai users directed to compromised enterprise subdomains via organic search.\u003c/li\u003e\n\u003cli\u003ePersistence — Valid Accounts, T1078, for DNS management credentials implied by Verizon per-subdomain record creation.\u003c/li\u003e\n\u003cli\u003eDefense Evasion — Impersonation, T1656, for gambling content served under legitimate enterprise TLS certificates.\u003c/li\u003e\n\u003cli\u003eDefense Evasion — Valid Accounts: Cloud Accounts, T1078.004, for Azure accounts used to claim abandoned DNS zones.\u003c/li\u003e\n\u003cli\u003eCollection — Adversary-in-the-Middle, T1557, for server-side affiliate referrer verification.\u003c/li\u003e\n\u003cli\u003eExfiltration — Web Service, T1567, for user registration data and financial transactions sent to gambling platforms.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise-highlighted\"\u003eIndicators of Compromise Highlighted\u003c/h2\u003e\n\n\u003cp\u003eThe article lists delivery infrastructure including 51.79.199.51, 139.99.82.106, and 38.127.8.49, plus backend CIDR ranges in 38.173.30.0/24, 38.173.37.0/24, 38.173.56.0/24, 38.173.57.0/24, 38.173.235.0/24, 38.173.236.0/24, and 38.173.239.0/24. It also identifies the broker-xm.com certificate, JARM fingerprint 07d14d16d21d21d07c42d43d000000270a013a3e21e28897e76e8fe13e2f7d, and HTTP body hash 7df3d7cf3358af3f470ac7229387ef94.\u003c/p\u003e\n\n\u003cp\u003eCampaign kit indicators include the Next.js build ID QQOrXCFjoI6C9oF-4YVhl, the path /img/ib99-hq.ico, CSS hash main.af42a497.css, and Cloudflare R2 bucket pub-a4952b46ff9c4f6b8d5529cd21f9a1e3.r2.dev. Affiliate and destination infrastructure includes ibiza99.autos, big888.store, seven77.click, link99.nova555.rest, appbox.7y6texmeyy.com, appbox.devh5api27.xyz, and appbox.55u4g5g4k2.com. The article also lists 99997778.com and bevictor.com as parallel operations associated with AS398478.\u003c/p\u003e\n","keyPoints":["Cyble Research \u0026 Intelligence Labs identified an SEO poisoning campaign that compromised 163 organizations across more than 30 countries by serving Thai-language gambling content under trusted enterprise domains.","The primary technique was Azure DNS zone takeover, where abandoned NS delegations to deleted Azure DNS zones were reclaimed by the actor under a new Azure subscription.","The campaign also used DigitalOcean DNS zone takeovers, direct wildcard DNS misconfigurations, and individually created A records in at least one Verizon subdomain environment.","The gambling kit used valid Let’s Encrypt wildcard TLS certificates, a consistent Next.js build fingerprint, Thai-language SEO content, and affiliate redirects with codes such as ibiza99vip1, bigwinv1, link99, and seven77vip1.","Cyble linked the operation to three OVH delivery nodes and a 103-node backend fleet in Hong Kong under AS398478, with shared fingerprints including a broker-xm.com certificate and identical HTTP body hash."],"insights":["Certificate Transparency monitoring for unexpected Let’s Encrypt wildcard certificates on corporate subdomains would have detected every Azure takeover victim at certificate issuance, especially where there had been a long gap since legitimate certificate activity.","A single abandoned Azure NS delegation can expose an unlimited subdomain namespace because the actor can add a wildcard A record after reclaiming the orphaned zone.","Randomized nonsense-hostname DNS queries against Azure-delegated subdomains are an actionable validation method, because unexpected resolution can indicate an actor-controlled wildcard zone.","The campaign avoided many conventional security signals because it used valid TLS certificates, clean IP reputation, victim-owned domains, and legitimate cloud or hosting infrastructure rather than malware delivery.","The repeated SOA serial value of 1 on confirmed Azure takeover victims showed that the actor created the DNS zones from scratch rather than modifying existing victim-managed zones."],"referencedReports":[],"body":"\u003cp\u003eCyble Research \u0026amp; Intelligence Labs identified an active SEO poisoning campaign that abused abandoned cloud DNS zone delegations to serve Thai-language gambling content under trusted enterprise domains. The campaign compromised 163 organizations across more than 30 countries, including federal government agencies, national healthcare systems, financial institutions, critical infrastructure operators, and major universities. At the time of publication, 161 organizations remained actively compromised.\u003c/p\u003e\n\n\u003cp\u003eThe primary mechanism was Azure DNS zone takeover, where NS delegations to deleted or abandoned Azure DNS zones remained in parent DNS zones and were later claimed by the actor under a new Azure subscription. The actor added wildcard records, obtained valid Let’s Encrypt wildcard TLS certificates, and deployed a Next.js gambling kit that appeared under the victim organization’s own domain. Other observed mechanisms included DigitalOcean DNS zone takeover, direct wildcard DNS misconfiguration, and more than 1,000 individually named A records in a Verizon subdomain environment.\u003c/p\u003e\n\n\u003cp\u003eCyble linked the campaign to three OVH delivery nodes and a separate 103-node backend fleet in Hong Kong under AS398478. The campaign used affiliate redirects, server-side Thailand-focused referrer verification, and tracking codes such as ibiza99vip1, bigwinv1, link99, and seven77vip1. The article emphasizes that valid TLS certificates, clean IP reputation, trusted domains, and legitimate infrastructure caused conventional security controls to produce little or no signal.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  const [theme, setTheme] = React.useState(() => document.documentElement.dataset.theme || 'dark');
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  const applyTheme = (t) => {
    document.documentElement.dataset.theme = t;
    try { localStorage.setItem('downlink.theme', t); } catch(e){}
    setTheme(t);
  };
  return (
    <nav className="swipe-nav" style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span className="swipe-clock" style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <select value={theme} onChange={(e) => applyTheme(e.target.value)} title="Select theme" aria-label="Select theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
