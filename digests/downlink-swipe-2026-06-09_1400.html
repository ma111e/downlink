window.__DL_ARTICLES = [{"n":7,"title":"New Veeam vulnerability exposes backup servers to RCE attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-veeam-vulnerability-exposes-backup-servers-to-rce-attacks/","time":"14:27","priority":"MUST READ","score":94,"tldr":"Veeam patched a critical Backup \u0026 Replication flaw, CVE-2026-44963, that lets any low-privileged domain user gain remote code execution on domain-joined backup servers. Organizations running VBR 12.x should update to 12.3.2.4854 immediately, as Veeam backup servers are frequent ransomware targets.","briefOverview":"\u003cp\u003eVeeam released security updates for a critical Veeam Backup \u0026amp; Replication flaw that can be exploited for remote code execution on domain-joined backup servers. The vulnerability is tracked as CVE-2026-44963 and was reported by WatchTowr security researcher Sina Kheirkhah. Veeam said the issue affects VBR 12.3.2.4465 and all earlier version 12 builds, and it is fixed in version 12.3.2.4854.\u003c/p\u003e\n\n\u003cp\u003eThe flaw can be exploited by an authenticated domain user with low privileges, but only impacts Veeam Backup \u0026amp; Replication installations joined to a domain. Veeam said version 13.x builds are not affected because of architectural changes starting in version 13. The company warned that attackers may reverse-engineer disclosed patches to target unpatched deployments, although there are no reports of active exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Veeam backup servers are often targeted in ransomware attacks because they can help attackers steal sensitive data, move within breached networks, and delete backups to block recovery. CISA has previously flagged four Veeam Backup \u0026amp; Replication flaws as actively exploited in attacks, all of which the article says were abused by ransomware gangs. Veeam products are used by more than 550,000 customers worldwide, including 82% of Fortune 500 companies and 74% of Global 2,000 firms.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eVeeam has released security updates to address a critical remote code execution vulnerability in Veeam Backup \u0026amp; Replication. The flaw, tracked as CVE-2026-44963, affects domain-joined backup servers and was reported by WatchTowr security researcher Sina Kheirkhah. Veeam fixed the issue in VBR version 12.3.2.4854.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects Veeam Backup \u0026amp; Replication 12.3.2.4465 and all earlier version 12 builds. Veeam said it allows remote code execution on the Backup Server by an authenticated domain user. The article notes that any low-privileged domain user can exploit it, but only installations joined to a domain are impacted.\u003c/p\u003e\n\n\u003cp\u003eVeeam stated that version 13.x builds of Backup \u0026amp; Replication are not affected because of architectural changes beginning in version 13. The article also notes that many companies have joined their Veeam servers to a Windows domain despite Veeam’s long-standing best practices. Veeam warned customers to update quickly because attackers often try to reverse-engineer patches after vulnerabilities are disclosed.\u003c/p\u003e\n\n\u003cp\u003eThere are no reports of active exploitation of CVE-2026-44963 at the time described in the article. However, the article highlights that Veeam backup servers are often targeted by ransomware gangs. Ransomware operators have previously told BleepingComputer that they target Veeam backup servers to steal sensitive data, move within breached networks, and delete backups to prevent restoration.\u003c/p\u003e\n\n\u003cp\u003eThe article cites a history of attacks against Veeam Backup \u0026amp; Replication flaws. CISA has flagged four VBR flaws as actively exploited in attacks, and the article says all four were abused by ransomware gangs. It also references prior activity involving Akira, Fog, Frag, FIN7, and the Cuba ransomware gang targeting or weaponizing Veeam Backup \u0026amp; Replication vulnerabilities.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eVeeam released security updates for a critical vulnerability in Veeam Backup \u0026amp; Replication that can allow remote code execution on backup servers. The vulnerability is tracked as CVE-2026-44963 and was reported by WatchTowr security researcher Sina Kheirkhah. Veeam fixed the issue in version 12.3.2.4854.\u003c/p\u003e\n\n\u003cp\u003eThe issue affects Veeam Backup \u0026amp; Replication 12.3.2.4465 and all earlier version 12 builds. According to Veeam, the vulnerability allows remote code execution on the Backup Server by an authenticated domain user. The article states that any domain user with low privileges can exploit the flaw, but only Veeam Backup \u0026amp; Replication installations joined to a domain are impacted.\u003c/p\u003e\n\n\u003ch2 id=\"affected-and-unaffected-versions\"\u003eAffected and Unaffected Versions\u003c/h2\u003e\n\n\u003cp\u003eThe affected product line is Veeam Backup \u0026amp; Replication version 12. The vulnerable versions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVeeam Backup \u0026amp; Replication 12.3.2.4465\u003c/li\u003e\n\u003cli\u003eAll earlier version 12 builds\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe fixed version is:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVeeam Backup \u0026amp; Replication 12.3.2.4854\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eVeeam said the vulnerability does not affect any version 13.x build of Veeam Backup \u0026amp; Replication. The company attributed this to architectural changes starting in version 13.\u003c/p\u003e\n\n\u003ch2 id=\"domain-joined-server-requirement\"\u003eDomain-Joined Server Requirement\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability only affects Veeam Backup \u0026amp; Replication installations that are joined to a domain. The article notes that an authenticated domain user with low privileges can exploit the flaw. This means the vulnerable configuration is specifically tied to domain-joined backup servers.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that many companies have joined their Veeam servers to a Windows domain. It frames this as contrary to Veeam’s long-standing best practices.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-status-and-patch-urgency\"\u003eExploitation Status and Patch Urgency\u003c/h2\u003e\n\n\u003cp\u003eThe article says there are no reports of active exploitation of CVE-2026-44963. However, Veeam warned that attackers often begin developing exploits after patches are released. The company specifically warned that attackers may reverse-engineer the patch to exploit unpatched Veeam deployments.\u003c/p\u003e\n\n\u003cp\u003eVeeam used that warning to emphasize the importance of using the latest versions of its software and installing updates and patches without delay.\u003c/p\u003e\n\n\u003ch2 id=\"ransomware-relevance\"\u003eRansomware Relevance\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights that Veeam Backup \u0026amp; Replication servers are often targeted in ransomware attacks. Ransomware gangs have previously told BleepingComputer that they target Veeam backup servers because doing so can help them:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSteal sensitive data\u003c/li\u003e\n\u003cli\u003eMove within breached networks\u003c/li\u003e\n\u003cli\u003eBlock restoration efforts by deleting victims’ backups\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also states that CISA has flagged four Veeam Backup \u0026amp; Replication flaws as actively exploited in attacks in recent years. It says all of those flaws have been abused by ransomware gangs.\u003c/p\u003e\n\n\u003ch2 id=\"previously-cited-threat-activity\"\u003ePreviously Cited Threat Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article provides several examples of prior threat activity involving Veeam Backup \u0026amp; Replication flaws. In November 2024, Sophos X-Ops reported that several ransomware operations had weaponized another critical VBR remote code execution flaw, CVE-2024-40711. The article identifies Akira, Fog, and Frag as ransomware operations involved in that activity.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that the financially motivated FIN7 threat group and the Cuba ransomware gang have been linked to attacks targeting Veeam Backup \u0026amp; Replication security flaws. It notes that FIN7 often collaborated with the Maze, Egregor, Conti, REvil, and BlackBasta ransomware groups.\u003c/p\u003e\n\n\u003ch2 id=\"scale-of-exposure\"\u003eScale of Exposure\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Veeam products are used by more than 550,000 customers worldwide. It also says Veeam’s customer base includes 82% of Fortune 500 companies and 74% of Global 2,000 firms.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe central issue is that Veeam patched CVE-2026-44963, a critical remote code execution flaw affecting domain-joined Veeam Backup \u0026amp; Replication 12.x servers. Although no active exploitation has been reported, Veeam urged rapid patching because attackers may reverse-engineer released patches, and the article emphasizes that Veeam backup servers are frequent ransomware targets.\u003c/p\u003e\n","keyPoints":["Veeam released security updates for a critical Backup \u0026 Replication vulnerability, CVE-2026-44963, that can allow remote code execution on domain-joined backup servers.","The flaw affects Veeam Backup \u0026 Replication 12.3.2.4465 and all earlier version 12 builds, and it was fixed in version 12.3.2.4854.","Veeam said any low-privileged authenticated domain user can exploit the vulnerability, but only installations joined to a domain are affected.","Veeam stated that version 13.x builds of Veeam Backup \u0026 Replication are not affected because of architectural changes starting in version 13.","Veeam warned that attackers may reverse-engineer disclosed patches to exploit unpatched deployments, although there are no reports of active exploitation."],"insights":["The vulnerability is especially actionable for organizations that joined Veeam backup servers to a Windows domain despite Veeam's long-standing best practice recommending against that configuration.","Veeam emphasized urgency because attackers often reverse-engineer newly released patches to build exploits for unpatched deployments after disclosure.","Backup servers are high-value ransomware targets because attackers can use them to steal sensitive data, move within networks, and delete backups to block recovery.","CISA has previously flagged four Veeam Backup \u0026 Replication flaws as actively exploited, and the article notes that all of them have been abused by ransomware gangs."],"referencedReports":[{"title":"Veeam Advisory for CVE-2026-44963","url":"https://www.veeam.com/kb4869","publisher":"Veeam","context":"The article cites Veeam's Tuesday advisory describing the remote code execution vulnerability affecting domain-joined Backup \u0026 Replication servers.","category":"","primary":false},{"title":"Workgroup or Domain","url":"https://bp.veeam.com/security/Design-and-implementation/Hardening/Workgroup_or_Domain.html#best-practice","publisher":"Veeam","context":"The article references Veeam's long-standing best practices that advise on whether Veeam servers should be joined to a Windows domain.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?f%5B0%5D=vendor_project%3A931","publisher":"Cybersecurity and Infrastructure Security Agency","context":"The article cites CISA's catalog as flagging four Veeam Backup \u0026 Replication flaws as actively exploited in attacks.","category":"","primary":false}],"body":"\u003cp\u003eVeeam released security updates for a critical Veeam Backup \u0026amp; Replication flaw that can be exploited for remote code execution on domain-joined backup servers. The vulnerability is tracked as CVE-2026-44963 and was reported by WatchTowr security researcher Sina Kheirkhah. Veeam said the issue affects VBR 12.3.2.4465 and all earlier version 12 builds, and it is fixed in version 12.3.2.4854.\u003c/p\u003e\n\n\u003cp\u003eThe flaw can be exploited by an authenticated domain user with low privileges, but only impacts Veeam Backup \u0026amp; Replication installations joined to a domain. Veeam said version 13.x builds are not affected because of architectural changes starting in version 13. The company warned that attackers may reverse-engineer disclosed patches to target unpatched deployments, although there are no reports of active exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Veeam backup servers are often targeted in ransomware attacks because they can help attackers steal sensitive data, move within breached networks, and delete backups to block recovery. CISA has previously flagged four Veeam Backup \u0026amp; Replication flaws as actively exploited in attacks, all of which the article says were abused by ransomware gangs. Veeam products are used by more than 550,000 customers worldwide, including 82% of Fortune 500 companies and 74% of Global 2,000 firms.\u003c/p\u003e\n"},{"n":8,"title":"Microsoft June 2026 Patch Tuesday fixes 3 zero-day, 200 flaws","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-june-2026-patch-tuesday-fixes-3-zero-day-200-flaws/","time":"17:57","priority":"MUST READ","score":94,"tldr":"Microsoft’s June 2026 Patch Tuesday fixes 200 vulnerabilities, including 33 critical flaws and three publicly disclosed zero-days affecting Windows CTFMON, HTTP.sys, and BitLocker. None of the zero-days are known to have been exploited, but organizations should prioritize applying the updates due to the volume and severity of remote code execution and privilege escalation issues.","briefOverview":"\u003cp\u003eMicrosoft’s June 2026 Patch Tuesday delivers security updates for 200 flaws, including three publicly disclosed zero-day vulnerabilities. Microsoft says none of the zero-days are known to have been exploited in attacks. The release includes 33 critical vulnerabilities, with most of those classified as remote code execution issues.\u003c/p\u003e\n\n\u003cp\u003eThe three zero-days affect Windows Collaborative Translation Framework, HTTP.sys, and Windows BitLocker. The HTTP.sys issue is the publicly disclosed “HTTP/2 Bomb” denial-of-service flaw, while the BitLocker issue is identified by BleepingComputer as a fix for the YellowKey vulnerability. Microsoft also introduced a new MaxHeadersCount registry setting to help limit HTTP/2 and HTTP/3 request headers accepted by Windows HTTP servers.\u003c/p\u003e\n\n\u003cp\u003eThe Patch Tuesday count excludes some Microsoft fixes released earlier in the month and 360 Microsoft Edge/Chromium flaws fixed by Google. Microsoft also released Windows 11 cumulative updates, while the article notes that other vendors including Cisco, Fortinet, Google, Ivanti, SAP, Ubiquiti, and Veeam issued security updates or advisories around the same period.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft’s June 2026 Patch Tuesday fixes 200 vulnerabilities and three publicly disclosed zero-days. The update includes 33 critical vulnerabilities, broken down by Microsoft as 28 remote code execution flaws, four elevation of privilege flaws, and one information disclosure flaw. Across all categories, the article lists 65 elevation of privilege, 19 security feature bypass, 55 remote code execution, 30 information disclosure, seven denial of service, and 27 spoofing vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer states that its Patch Tuesday count includes only security updates released by Microsoft that day. It excludes flaws in Mariner, Azure HorizonDB, Microsoft Copilot, Copilot Chat, M365 Copilot, Microsoft Exchange Online, and Microsoft Graph that Microsoft fixed earlier in the month. It also excludes 360 Microsoft Edge/Chromium flaws fixed by Google during the month.\u003c/p\u003e\n\n\u003cp\u003eThe first publicly disclosed zero-day is CVE-2026-45586, a Windows Collaborative Translation Framework, or CTFMON, elevation of privilege vulnerability. Microsoft says improper link resolution before file access allows an authorized attacker to elevate privileges locally. The flaw grants SYSTEM privileges, and Microsoft credited it to an anonymous researcher without sharing disclosure details.\u003c/p\u003e\n\n\u003cp\u003eThe second zero-day is CVE-2026-49160, an HTTP.sys denial-of-service vulnerability tied to the “HTTP/2 Bomb” attack. The article says the issue was disclosed by researchers at the offensive security firm Calif and can allow an unauthorized attacker to deny service over a network through uncontrolled resource consumption in HTTP/2. Microsoft introduced a MaxHeadersCount registry setting to limit the number of headers accepted in HTTP/2 and HTTP/3 requests, and the flaw was attributed to Quang Luong and Codex of Calif.io.\u003c/p\u003e\n\n\u003cp\u003eThe third zero-day is CVE-2026-50507, a Windows BitLocker security feature bypass vulnerability. Microsoft says it allows an unauthorized attacker to bypass a security feature with a physical attack, and BleepingComputer reports that it is a fix for the YellowKey vulnerability disclosed by Nightmare Eclipse. The flaw primarily affects systems using TPM-only BitLocker protection on Windows 11 and Windows Server \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2025\u003c/sub\u003e, and Microsoft previously shared mitigations including TPM+PIN authentication.\u003c/p\u003e\n\n\u003cp\u003eThe article also summarizes recent updates from other vendors, including Acer, Check Point, Cisco, Fortinet, Google, Ivanti, Ubiquiti, SAP, and Veeam. These include fixes or advisories for router flaws, VPN and mobile access issues, Cisco product vulnerabilities, Android and Chrome flaws, Ivanti EPMM and Sentry vulnerabilities, UniFi OS issues, SAP critical flaws, and a Veeam Backup \u0026amp; Replication remote code execution issue.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft’s June 2026 Patch Tuesday addresses 200 security flaws and three publicly disclosed zero-day vulnerabilities. Microsoft says none of the three zero-days are known to have been exploited in attacks. The release includes 33 vulnerabilities rated critical.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the critical issues consist of:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e28 remote code execution vulnerabilities.\u003c/li\u003e\n\u003cli\u003eFour elevation of privilege vulnerabilities.\u003c/li\u003e\n\u003cli\u003eOne information disclosure vulnerability.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also provides a broader category breakdown for the 200 flaws:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e65 elevation of privilege vulnerabilities.\u003c/li\u003e\n\u003cli\u003e19 security feature bypass vulnerabilities.\u003c/li\u003e\n\u003cli\u003e55 remote code execution vulnerabilities.\u003c/li\u003e\n\u003cli\u003e30 information disclosure vulnerabilities.\u003c/li\u003e\n\u003cli\u003eSeven denial of service vulnerabilities.\u003c/li\u003e\n\u003cli\u003e27 spoofing vulnerabilities.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"scope-of-the-patch-tuesday-count\"\u003eScope of the Patch Tuesday count\u003c/h2\u003e\n\n\u003cp\u003eBleepingComputer states that it only counts Patch Tuesday security updates released by Microsoft on the day of publication. As a result, the 200-flaw total does not include some Microsoft vulnerabilities fixed earlier in the month.\u003c/p\u003e\n\n\u003cp\u003eExcluded Microsoft fixes include flaws in:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMariner.\u003c/li\u003e\n\u003cli\u003eAzure HorizonDB.\u003c/li\u003e\n\u003cli\u003eMicrosoft Copilot.\u003c/li\u003e\n\u003cli\u003eCopilot Chat.\u003c/li\u003e\n\u003cli\u003eM365 Copilot.\u003c/li\u003e\n\u003cli\u003eMicrosoft Exchange Online.\u003c/li\u003e\n\u003cli\u003eMicrosoft Graph.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also excludes 360 Microsoft Edge/Chromium flaws fixed by Google during the month. It separately points readers to coverage of the Windows 11 KB5094126 and KB5093998 cumulative updates for non-security update details.\u003c/p\u003e\n\n\u003ch2 id=\"publicly-disclosed-zero-days\"\u003ePublicly disclosed zero-days\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft fixed three publicly disclosed zero-day vulnerabilities in this Patch Tuesday release. The article notes that Microsoft defines a zero-day as a flaw that is publicly disclosed or actively exploited while no official fix is available. None of the three zero-days fixed in this release are known to have been exploited in attacks.\u003c/p\u003e\n\n\u003ch3 id=\"cve-2026-45586-windows-collaborative-translation-framework-elevation-of-privilege\"\u003eCVE-2026-45586: Windows Collaborative Translation Framework elevation of privilege\u003c/h3\u003e\n\n\u003cp\u003eCVE-2026-45586 affects the Windows Collaborative Translation Framework, also identified in the article as CTFMON. Microsoft says the vulnerability involves improper link resolution before file access, also described as “link following.”\u003c/p\u003e\n\n\u003cp\u003eThe flaw allows an authorized attacker to elevate privileges locally. The article states that the vulnerability grants SYSTEM privileges. Microsoft credited the issue to an anonymous researcher but did not share details about how it was disclosed.\u003c/p\u003e\n\n\u003ch3 id=\"cve-2026-49160-http-sys-denial-of-service-and-http-2-bomb\"\u003eCVE-2026-49160: HTTP.sys denial of service and HTTP/2 Bomb\u003c/h3\u003e\n\n\u003cp\u003eCVE-2026-49160 is an HTTP.sys denial-of-service vulnerability. The article says it is the publicly disclosed “HTTP/2 Bomb” issue disclosed by researchers at the offensive security firm Calif.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft describes the issue as uncontrolled resource consumption in HTTP/2 that allows an unauthorized attacker to deny service over a network. The article explains that HTTP/2 Bomb abuses how HTTP/2 compresses and manages web traffic headers. Attackers can send very small amounts of data that force servers to allocate disproportionately large amounts of memory.\u003c/p\u003e\n\n\u003cp\u003eThe article further states that attackers can keep memory tied up by manipulating flow-control settings. This can prevent the server from freeing resources and may cause performance issues or outages.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft introduced a new MaxHeadersCount registry setting in response. This setting limits the number of headers accepted in HTTP/2 and HTTP/3 requests by the HTTP server. Microsoft also published a support bulletin about controlling the maximum number of HTTP/2 and HTTP/3 request headers in Windows clients and servers.\u003c/p\u003e\n\n\u003cp\u003eThe flaw was attributed to Quang Luong and Codex of Calif.io.\u003c/p\u003e\n\n\u003ch3 id=\"cve-2026-50507-windows-bitlocker-security-feature-bypass\"\u003eCVE-2026-50507: Windows BitLocker security feature bypass\u003c/h3\u003e\n\n\u003cp\u003eCVE-2026-50507 is a Windows BitLocker security feature bypass vulnerability. Microsoft says the issue involves a protection mechanism failure that allows an unauthorized attacker to bypass a security feature through a physical attack.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft attributed the vulnerability to an anonymous researcher. However, BleepingComputer reports that it learned this patch fixes the YellowKey vulnerability publicly disclosed the previous month by a cybersecurity researcher named Nightmare Eclipse.\u003c/p\u003e\n\n\u003cp\u003eThe article says YellowKey could be exploited by placing specially crafted files on a USB drive or EFI partition and booting into the Windows Recovery Environment, or WinRE. Holding down the CTRL key in that environment triggered a command shell with unrestricted access to encrypted BitLocker-protected drives.\u003c/p\u003e\n\n\u003cp\u003eThe flaw primarily affects systems using TPM-only BitLocker protection on Windows 11 and Windows Server \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2025\u003c/sub\u003e devices. Microsoft had previously shared temporary mitigations, including enabling TPM+PIN authentication instead of relying only on TPM protection.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that Nightmare Eclipse has released several Windows zero-day vulnerabilities, including BlueHammer, MiniPlasma, RedSun, and UnDefend. These releases were described as a protest of Microsoft’s handling of its bug bounty and vulnerability disclosure programs.\u003c/p\u003e\n\n\u003ch2 id=\"other-notable-microsoft-vulnerabilities-and-affected-products\"\u003eOther notable Microsoft vulnerabilities and affected products\u003c/h2\u003e\n\n\u003cp\u003eThe full vulnerability list includes issues across many Microsoft products and Windows components. The article’s list includes vulnerabilities in .NET, Active Directory Domain Services, ASP.NET Core, Azure Stack Edge, Azure Kubernetes Service, Microsoft Defender for Endpoint, Microsoft Dynamics 365 on-premises, Microsoft Exchange Server, Microsoft Office, SharePoint, Remote Desktop Client, Hyper-V, Visual Studio Code, Windows Kernel, Windows Kerberos, Windows DHCP Client, Windows Secure Boot, Windows UEFI, and many other components.\u003c/p\u003e\n\n\u003cp\u003eExamples of critical vulnerabilities listed in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-45648 in Windows Active Directory Domain Services.\u003c/li\u003e\n\u003cli\u003eCVE-2026-32193 in Azure Kubernetes Service.\u003c/li\u003e\n\u003cli\u003eSeveral Microsoft Office remote code execution vulnerabilities.\u003c/li\u003e\n\u003cli\u003eMultiple Remote Desktop Client remote code execution vulnerabilities.\u003c/li\u003e\n\u003cli\u003eWindows Hyper-V remote code execution vulnerabilities.\u003c/li\u003e\n\u003cli\u003eCVE-2026-47291 in HTTP.sys.\u003c/li\u003e\n\u003cli\u003eCVE-2026-47288 in Windows Kerberos Key Distribution Center.\u003c/li\u003e\n\u003cli\u003eCVE-2026-45657 in Windows Kernel.\u003c/li\u003e\n\u003cli\u003eCVE-2026-48574 in Windows Media.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44812 and CVE-2026-44803 in Windows Graphics Component.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also lists numerous important-severity vulnerabilities across Exchange Server, SharePoint Server, Visual Studio Code, BitLocker, Secure Boot, Windows DWM Core Library, Windows Push Notifications, Windows TCP/IP, and other components.\u003c/p\u003e\n\n\u003ch2 id=\"recent-updates-from-other-vendors\"\u003eRecent updates from other vendors\u003c/h2\u003e\n\n\u003cp\u003eThe article includes a section summarizing recent security updates and advisories from other companies in May 2026. These are presented separately from Microsoft’s Patch Tuesday release.\u003c/p\u003e\n\n\u003cp\u003eVendors and updates mentioned include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAcer warned about two maximum-severity unpatched flaws in Acer Wave 7 Routers that could be used to hijack routers.\u003c/li\u003e\n\u003cli\u003eCheck Point released security updates for a Remote Access VPN and Mobile Access flaw exploited in Qilin ransomware attacks.\u003c/li\u003e\n\u003cli\u003eCisco released security updates for numerous products, including a Unified CM flaw with proof-of-concept exploit code and an SD-WAN zero-day exploited in attacks.\u003c/li\u003e\n\u003cli\u003eFortinet released security updates for flaws in FortiOS, FortiSandbox, and FortiProxy.\u003c/li\u003e\n\u003cli\u003eGoogle released Android’s June security bulletin, fixing 124 flaws and one actively exploited vulnerability, and also fixed a Google Chrome zero-day exploited in attacks.\u003c/li\u003e\n\u003cli\u003eIvanti released security updates for Ivanti Endpoint Manager Mobile and Ivanti Sentry, with none exploited in the wild.\u003c/li\u003e\n\u003cli\u003eUbiquiti released security updates for three maximum-severity vulnerabilities that could lead to remote code execution.\u003c/li\u003e\n\u003cli\u003eSAP released June security updates that include fixes for four critical flaws.\u003c/li\u003e\n\u003cli\u003eVeeam released security updates for a critical Backup \u0026amp; Replication flaw that can be exploited for remote code execution on domain-joined backup servers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe central significance of the article is that Microsoft’s June 2026 Patch Tuesday is a large security release covering 200 flaws, including 33 critical issues and three publicly disclosed zero-days. The zero-days span local privilege escalation, denial of service, and physical security feature bypass scenarios.\u003c/p\u003e\n\n\u003cp\u003eThe HTTP.sys issue is notable because Microsoft added a new registry-based mitigation option, MaxHeadersCount, to limit accepted HTTP/2 and HTTP/3 request headers. The BitLocker issue is notable because BleepingComputer connects it to YellowKey, a publicly disclosed vulnerability affecting TPM-only BitLocker configurations on Windows 11 and Windows Server \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2025\u003c/sub\u003e devices.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft states that none of the three zero-days are known to have been exploited in attacks. The article nevertheless presents the updates as part of Microsoft’s regular Patch Tuesday process and includes a complete list of resolved vulnerabilities for the June 2026 release.\u003c/p\u003e\n","keyPoints":["Microsoft’s June 2026 Patch Tuesday includes security updates for 200 flaws and three publicly disclosed zero-day vulnerabilities.","The update addresses 33 critical vulnerabilities, including 28 remote code execution flaws, four elevation of privilege flaws, and one information disclosure flaw.","Microsoft said none of the three publicly disclosed zero-day vulnerabilities are known to have been exploited in attacks.","The patched zero-days are CVE-2026-45586 in Windows Collaborative Translation Framework, CVE-2026-49160 in HTTP.sys, and CVE-2026-50507 in Windows BitLocker.","Microsoft introduced a new MaxHeadersCount registry setting to help mitigate the HTTP/2 Bomb denial-of-service issue affecting HTTP.sys."],"insights":["Organizations running HTTP/2 or HTTP/3 services on Windows can reduce exposure to the HTTP/2 Bomb issue by configuring Microsoft’s new MaxHeadersCount registry setting to limit accepted request headers.","Systems using TPM-only BitLocker protection on Windows 11 and Windows Server 2022/2025 were specifically called out as primarily affected by the YellowKey-related BitLocker bypass, and Microsoft had previously recommended TPM+PIN as a temporary mitigation.","The 200-flaw Patch Tuesday total excludes several Microsoft fixes released earlier in the month as well as 360 Microsoft Edge/Chromium flaws fixed by Google, so the broader June patching workload is larger than the headline count.","The zero-day fixes were for publicly disclosed issues rather than vulnerabilities known to be exploited in attacks, which makes rapid patching a preemptive risk-reduction step rather than a response to confirmed in-the-wild exploitation."],"referencedReports":[{"title":"Cisco Security Advisories","url":"https://sec.cloudapps.cisco.com/security/center/publicationListing.x","publisher":"Cisco","context":"The article says Cisco released security updates for numerous products in June 2026.","category":"","primary":false},{"title":"Fortinet PSIRT Advisories","url":"https://www.fortiguard.com/psirt","publisher":"Fortinet","context":"The article says Fortinet released security updates for numerous flaws in FortiOS, FortiSandbox, and FortiProxy.","category":"","primary":false},{"title":"Android Security Bulletin—June 2026","url":"https://www.bleepingcomputer.com/news/security/google-fixes-one-actively-exploited-android-zero-day-124-flaws/","publisher":"Google","context":"The article references Google’s Android June security bulletin, which fixed 124 flaws and one actively exploited vulnerability.","category":"","primary":false},{"title":"June 2026 Security Update","url":"https://www.ivanti.com/blog/june-2026-security-update","publisher":"Ivanti","context":"The article says Ivanti released security updates for vulnerabilities in Ivanti Endpoint Manager Mobile and Ivanti Sentry.","category":"","primary":false},{"title":"SAP Security Notes and News—June 2026","url":"https://support.sap.com/en/my-support/knowledge-base/security-notes-news/june-2026.html","publisher":"SAP","context":"The article says SAP released June security updates that include fixes for four critical flaws.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft’s June 2026 Patch Tuesday delivers security updates for 200 flaws, including three publicly disclosed zero-day vulnerabilities. Microsoft says none of the zero-days are known to have been exploited in attacks. The release includes 33 critical vulnerabilities, with most of those classified as remote code execution issues.\u003c/p\u003e\n\n\u003cp\u003eThe three zero-days affect Windows Collaborative Translation Framework, HTTP.sys, and Windows BitLocker. The HTTP.sys issue is the publicly disclosed “HTTP/2 Bomb” denial-of-service flaw, while the BitLocker issue is identified by BleepingComputer as a fix for the YellowKey vulnerability. Microsoft also introduced a new MaxHeadersCount registry setting to help limit HTTP/2 and HTTP/3 request headers accepted by Windows HTTP servers.\u003c/p\u003e\n\n\u003cp\u003eThe Patch Tuesday count excludes some Microsoft fixes released earlier in the month and 360 Microsoft Edge/Chromium flaws fixed by Google. Microsoft also released Windows 11 cumulative updates, while the article notes that other vendors including Cisco, Fortinet, Google, Ivanti, SAP, Ubiquiti, and Veeam issued security updates or advisories around the same period.\u003c/p\u003e\n"},{"n":9,"title":"Microsoft Restores Some GitHub Repos, Keeps Others Offline as Miasma Probe Continues","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/microsoft-restores-some-github-repos.html","time":"16:34","priority":"MUST READ","score":94,"tldr":"Microsoft temporarily removed dozens of GitHub repositories after the Miasma supply-chain campaign compromised 73 open-source projects to inject an info-stealer, restoring some while keeping others offline for investigation. The malware targets developers and CI/CD environments, including via poisoned PyPI packages and IDE/AI-coding-tool execution paths, to steal secrets and spread downstream.","briefOverview":"\u003cp\u003eMicrosoft confirmed that it temporarily removed some GitHub repositories after a recent security incident compromised 73 of its open-source projects and injected an information stealer into code. The company said some repositories have been restored after review, while others may remain offline as investigation work continues. Microsoft also notified a small number of customers who may have pulled content from the affected repositories.\u003c/p\u003e\n\n\u003cp\u003eThe incident is tied to an ongoing software supply chain campaign codenamed Miasma. One affected project was “durabletask,” a Python package that was first compromised last month by a cybercrime group known as TeamPCP to deliver an information stealer for Linux systems. Further analysis found that the Miasma payload can trigger automatic code execution when a developer opens a repository in an AI-powered coding tool or integrated development environment.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes a newer PyPI wave tied to Mini Shai-Hulud, Miasma, and Hades that infected 23 additional packages. These included bioinformatics-related libraries, AI and Model Context Protocol-themed packages, and typosquat-style packages impersonating requests and flask. Socket said the newer cluster uses different payload delivery mechanisms, including trojanized native .abi3.so extensions and .pth startup hook loader variants.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft said it temporarily removed some GitHub repositories while investigating a security incident that compromised 73 open-source projects and injected an information stealer into code. A company spokesperson said the removals were intended to protect customers and the broader ecosystem. Some repositories were restored after review, while others may remain offline as work continues.\u003c/p\u003e\n\n\u003cp\u003eThe company also said it notified a small number of customers who may have pulled content from affected repositories. Microsoft stated it will continue investigating and will reach out through established support channels if anything further is identified that requires customer action. The removals followed reports that dozens of Microsoft open-source projects hosted on GitHub were compromised as part of the Miasma software supply chain campaign.\u003c/p\u003e\n\n\u003cp\u003eAmong the infected projects was “durabletask,” a Python package that the article says was first compromised last month by a cybercrime group known as TeamPCP. That compromise was used to deliver an information stealer designed for Linux systems. Further analysis of the Miasma payload found it could trigger automatic code execution when a developer opens the repository in an AI-powered coding tool or integrated development environment.\u003c/p\u003e\n\n\u003cp\u003eThe article places the incident within a broader software supply chain campaign affecting open-source packages. It says a newer PyPI wave tied to Mini Shai-Hulud, Miasma, and Hades infected 23 additional packages, including bioinformatics-related libraries used in graph learning, patient phenotyping, phenopacket tooling, and scientific workflows. The affected set also included AI and Model Context Protocol-themed packages and typosquat-style packages such as rsquests, tlask, and rlask.\u003c/p\u003e\n\n\u003cp\u003eSocket reported that the newer cluster uses a new payload delivery mechanism and reflects threat actors adapting and experimenting with different methods. Earlier packages used executable .pth startup hooks to bootstrap Bun and run an obfuscated JavaScript stealer, while later variants used trojanized native .abi3.so extensions or .pth loaders that search sys.path for “_index.js.” The malware targets developer workstations and CI/CD environments to harvest high-value secrets and exfiltrate them to a public GitHub repository.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft confirmed that it temporarily removed some GitHub repositories in response to a recent security incident involving its open-source projects. According to the article, 73 Microsoft open-source projects were compromised to inject an information stealer into their code. Microsoft said its priority was to protect customers and the broader ecosystem.\u003c/p\u003e\n\n\u003cp\u003eThe company said some repositories have been restored after review, while others may remain offline while the investigation continues. Microsoft also said it notified a small number of customers who may have pulled content from the affected repositories. It stated that if further issues requiring customer action are identified, it will contact customers directly through established support channels.\u003c/p\u003e\n\n\u003ch2 id=\"connection-to-the-miasma-campaign\"\u003eConnection to the Miasma Campaign\u003c/h2\u003e\n\n\u003cp\u003eThe repository removals followed reports that dozens of Microsoft open-source projects hosted on GitHub were compromised as part of an ongoing software supply chain campaign codenamed Miasma. The article describes the activity as part of a sustained campaign against widely used open-source packages. These packages were breached to plant malware capable of propagating to downstream users and beyond.\u003c/p\u003e\n\n\u003cp\u003eOne affected project was “durabletask,” a Python package. The article says durabletask was first compromised last month by a cybercrime group known as TeamPCP. That compromise was used to deliver an information stealer designed for Linux systems.\u003c/p\u003e\n\n\u003ch2 id=\"technical-findings-on-the-miasma-payload\"\u003eTechnical Findings on the Miasma Payload\u003c/h2\u003e\n\n\u003cp\u003eFurther analysis of the Miasma payload embedded into the compromised projects found that it can trigger automatic code execution under specific development conditions. The article says this execution can occur when an unsuspecting developer opens the repository in an artificial intelligence-powered coding tool or integrated development environment. This adds developer tooling and AI-powered coding environments to the set of environments directly relevant to the campaign.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that the malware targets developer workstations and CI/CD environments. Its goal is to harvest high-value secrets and exfiltrate them to a public GitHub repository. This impact is described as consistent across the different payload delivery methods used in the newer cluster.\u003c/p\u003e\n\n\u003ch2 id=\"newer-pypi-wave\"\u003eNewer PyPI Wave\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a newer PyPI wave tied to the broader Mini Shai-Hulud, Miasma, and Hades waves. This wave infected an additional set of 23 packages. Some of the affected packages included bioinformatics-related libraries used in graph learning, patient phenotyping, phenopacket tooling, and scientific workflows.\u003c/p\u003e\n\n\u003cp\u003eThe article also says the affected packages included AI and Model Context Protocol-themed packages. It additionally identifies typosquat-style packages that impersonate requests and flask, including rsquests, tlask, and rlask. A package named langchain-core-mcp is also called out.\u003c/p\u003e\n\n\u003cp\u003eThe listed packages and versions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003edreamgen 1.8.1\u003c/li\u003e\n\u003cli\u003eembiggen 0.11.97\u003c/li\u003e\n\u003cli\u003eensmallen 0.8.101\u003c/li\u003e\n\u003cli\u003egpsea 0.9.14\u003c/li\u003e\n\u003cli\u003einstructor-mcp 1.15.2 and 1.15.3\u003c/li\u003e\n\u003cli\u003elangchain-core-mcp 1.4.2 and 1.4.3\u003c/li\u003e\n\u003cli\u003emem8 6.0.1\u003c/li\u003e\n\u003cli\u003emflux-streamlit 0.0.3 and 0.0.4\u003c/li\u003e\n\u003cli\u003eopenai-mcp 2.41.1 and 2.41.2\u003c/li\u003e\n\u003cli\u003eorchestr8-platform 3.3.2\u003c/li\u003e\n\u003cli\u003ephenopacket-store-toolkit 0.1.7\u003c/li\u003e\n\u003cli\u003eppkt2synergy 0.1.1\u003c/li\u003e\n\u003cli\u003epyphetools 0.9.120\u003c/li\u003e\n\u003cli\u003eray-mcp-server 0.2.1\u003c/li\u003e\n\u003cli\u003erlask 3.1.7\u003c/li\u003e\n\u003cli\u003ersquests 2.34.3\u003c/li\u003e\n\u003cli\u003etiktoken-mcp 0.13.1 and 0.13.2\u003c/li\u003e\n\u003cli\u003etlask 3.1.4\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"payload-delivery-mechanisms\"\u003ePayload Delivery Mechanisms\u003c/h2\u003e\n\n\u003cp\u003eSocket said the new cluster uses a new payload delivery mechanism, indicating that the threat actors are adapting and actively experimenting with different methods. The article describes the broader activity as a “fast-moving supply chain campaign.”\u003c/p\u003e\n\n\u003cp\u003eEarlier packages used executable .pth startup hooks to bootstrap Bun and run an obfuscated JavaScript stealer. The latest set uses different approaches, including trojanized native .abi3.so extensions that execute the stealer when the package is imported. Another approach is a .pth startup hook loader variant that searches sys.path for the “_index.js” payload instead of bundling the payload in the same wheel.\u003c/p\u003e\n\n\u003cp\u003eSocket told The Hacker News that the sys.path loader variant separates the loader from the JavaScript payload. Socket said this separation could make the package look less obviously malicious during static analysis.\u003c/p\u003e\n\n\u003ch2 id=\"ai-scanner-and-copilot-evasion\"\u003eAI Scanner and Copilot Evasion\u003c/h2\u003e\n\n\u003cp\u003eThe article says a key capability of the bioinformatics package is its ability to derail and bypass AI-powered scanners and analyst copilots. It does this through an adversarial prompt injection embedded within a JavaScript block comment. The article notes that this feature had been previously detailed by StepSecurity.\u003c/p\u003e\n\n\u003cp\u003eSocket researcher Kirill Boychenko said the Hades branch of the Shai-Hulud and Miasma activity is best understood as a fast-moving supply chain campaign rather than a single package incident. He also said the langchain-core-mcp variant goes further by installing a .pth loader that searches sys.path for _index.js. According to the article, this means the loader and payload do not need to live in the same wheel.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-disclosed-impact\"\u003eResponse and Disclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft’s disclosed response included temporarily removing repositories, reviewing them, restoring some, and keeping others offline while work continues. The company also notified a small number of customers who may have pulled down content from affected repositories. Microsoft said it would reach out directly if further investigation identifies anything requiring customer action.\u003c/p\u003e\n\n\u003cp\u003eThe article does not state that all affected repositories have been restored. It also does not provide a final timeline for completing Microsoft’s investigation. The disclosed impact centers on compromised open-source projects, poisoned PyPI packages, developer and CI/CD secret harvesting, and potential exposure for users who pulled affected content.\u003c/p\u003e\n","keyPoints":["Microsoft confirmed it temporarily removed some GitHub repositories after a security incident in which 73 of its open-source projects were compromised to inject an information stealer into the code.","Microsoft said some repositories have been restored after review, while others may remain offline as the investigation continues.","Microsoft notified a small number of customers who may have pulled content from the affected repositories and said it will contact customers through established support channels if further action is required.","Analysis of the Miasma payload found it can trigger automatic code execution when a developer opens an affected repository in an AI-powered coding tool or integrated development environment.","A newer PyPI wave tied to Mini Shai-Hulud, Miasma, and Hades infected 23 additional packages, including bioinformatics-related libraries, AI and Model Context Protocol-themed packages, and typosquat-style packages."],"insights":["The campaign is experimenting with multiple payload delivery methods, including trojanized native .abi3.so extensions and .pth startup hook loaders, which means defenders cannot rely on detecting only one packaging pattern.","One newer loader separates the .pth startup hook from the JavaScript payload by searching sys.path for _index.js, making malicious packages less obvious during static analysis.","The malware specifically targets developer workstations and CI/CD environments for high-value secrets, making recent pulls from affected repositories and packages especially important to audit.","The bioinformatics package variant includes adversarial prompt injection designed to derail or bypass AI-powered scanners and analyst copilots, showing that defensive AI tooling itself is being targeted."],"referencedReports":[{"title":"Mini Shai-Hulud, Miasma, and Hades Worms Target Bioinformatics and MCP Developers via Malicious","url":"https://socket.dev/blog/mini-shai-hulud-miasma-and-hades-worms-target-bioinformatics-and-mcp-developers-via-malicious","publisher":"Socket","context":"The article cites Socket’s analysis for the newer PyPI cluster’s payload delivery mechanisms and quotes Socket on how the loader and payload separation may hinder static analysis.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft confirmed that it temporarily removed some GitHub repositories after a recent security incident compromised 73 of its open-source projects and injected an information stealer into code. The company said some repositories have been restored after review, while others may remain offline as investigation work continues. Microsoft also notified a small number of customers who may have pulled content from the affected repositories.\u003c/p\u003e\n\n\u003cp\u003eThe incident is tied to an ongoing software supply chain campaign codenamed Miasma. One affected project was “durabletask,” a Python package that was first compromised last month by a cybercrime group known as TeamPCP to deliver an information stealer for Linux systems. Further analysis found that the Miasma payload can trigger automatic code execution when a developer opens a repository in an AI-powered coding tool or integrated development environment.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes a newer PyPI wave tied to Mini Shai-Hulud, Miasma, and Hades that infected 23 additional packages. These included bioinformatics-related libraries, AI and Model Context Protocol-themed packages, and typosquat-style packages impersonating requests and flask. Socket said the newer cluster uses different payload delivery mechanisms, including trojanized native .abi3.so extensions and .pth startup hook loader variants.\u003c/p\u003e\n"},{"n":6,"title":"GitHub disables Microsoft repos pushing password-stealing malware","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/github-disables-microsoft-repos-pushing-password-stealing-malware/","time":"15:42","priority":"SHOULD READ","score":89,"tldr":"Microsoft temporarily disabled 73 GitHub repositories after suspected malicious content tied to the Miasma/Shai-Hulud supply-chain campaign, disrupting CI workflows including Azure Functions deployments. The repos have since been restored, and Microsoft says it notified a small number of potentially affected customers.","briefOverview":"\u003cp\u003eMicrosoft removed 73 repositories across its Azure, microsoft, Azure-Samples, and MicrosoftDocs organizations on GitHub on June 5. The company told BleepingComputer the repositories were removed due to concerns that they distributed “potential malicious content.” The incident was contained within 105 seconds, but it disrupted continuous integration pipelines.\u003c/p\u003e\n\n\u003cp\u003eMultiple researchers said the repositories were pulled after a compromise during a Miasma/Shai-Hulud supply-chain campaign. The most significant immediate effect was the loss of access to Azure/functions-action, a GitHub Action used by many developers to deploy Azure Functions. Workflows referencing it stopped working because the specified repository could not resolve the action.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said all repositories have been restored and are considered clean and safe to use. The company said it notified a small number of customers who may have pulled content from affected repositories. Researchers linked the activity to broader supply-chain incidents involving Red Hat npm packages, Microsoft GitHub resources, and compromised PyPI packages such as durabletask.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft temporarily removed 73 repositories from its Azure, microsoft, Azure-Samples, and MicrosoftDocs GitHub organizations on June 5. The company said the action was taken while it investigated potential malicious content. GitHub displayed a message saying the repositories had been disabled by GitHub Staff due to a violation of GitHub’s terms of service. Microsoft later described the issue in a community discussion as “an internal management issue” while an investigation was underway.\u003c/p\u003e\n\n\u003cp\u003eThe incident was contained within 105 seconds, but it disrupted continuous integration pipelines. The most visible impact was the temporary unavailability of Azure/functions-action, a GitHub Action used by many developers to deploy Azure Functions. Workflows referencing the action failed because there was nothing in the specified repository to resolve. The outage caused confusion among affected users.\u003c/p\u003e\n\n\u003cp\u003eMultiple researchers confirmed that the repositories were pulled after a compromise during a Miasma/Shai-Hulud supply-chain campaign. OpenSourceMalware reported that the durabletask repository in Microsoft’s Azure organization had been compromised in May, and suggested that incomplete cleanup may have allowed the threat actor to return, though the article says this has not been confirmed. The platform also noted that the durabletask package on PyPI had three malicious versions, 1.4.1, 1.4.2, and 1.4.3, pushed in May.\u003c/p\u003e\n\n\u003cp\u003eSecurity engineer Adnan Khan said the June 5 incident affecting Microsoft repositories appeared to be part of the Miasma campaign that infected 32 Red Hat npm packages. Cloudsmith concluded that Microsoft’s Azure environment on GitHub and the durabletask repository were compromised via Miasma, which targeted AI coding tools including Claude Code, Gemini CLI, VS Code, and Cursor. Cloudsmith said the hacker pivoted from Red Hat’s npm packages to Microsoft’s GitHub resources.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said all repositories have been restored and are considered clean and safe to use. The company said it notified a small number of customers who may have pulled down content from affected repositories. Microsoft also said it would continue investigating and would contact customers through established support channels if further customer action is required. The article advises developers to lock dependencies, add multi-day delays before fetching new package updates, and test new builds in isolated environments.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft temporarily removed 73 repositories from GitHub across its Azure, microsoft, Azure-Samples, and MicrosoftDocs organizations on June 5. The company told BleepingComputer that the repositories were removed because of concerns that they distributed “potential malicious content.” The incident was contained within 105 seconds, but it disrupted continuous integration pipelines.\u003c/p\u003e\n\n\u003cp\u003eImmediately after the removals, GitHub displayed a message saying the repositories had been disabled by GitHub Staff “due to a violation of GitHub’s terms of service.” In a community discussion, a Microsoft representative told users the repositories were disabled because of “an internal management issue” and that an investigation was underway.\u003c/p\u003e\n\n\u003ch2 id=\"operational-impact\"\u003eOperational Impact\u003c/h2\u003e\n\n\u003cp\u003eThe most significant immediate impact was the loss of access to \u003ccode\u003eAzure/functions-action\u003c/code\u003e, a GitHub Action used by many developers to deploy Azure Functions. Workflows that referenced this action stopped working because there was nothing available in the specified repository to resolve the action.\u003c/p\u003e\n\n\u003cp\u003eAlthough the takedown lasted only 105 seconds, the article says it disrupted CI pipelines and caused confusion. At the time of writing, all repositories had been restored and were considered clean and safe to use.\u003c/p\u003e\n\n\u003ch2 id=\"suspected-supply-chain-campaign\"\u003eSuspected Supply-Chain Campaign\u003c/h2\u003e\n\n\u003cp\u003eMultiple researchers said the repositories were removed after a compromise during a Miasma/Shai-Hulud supply-chain campaign. Security engineer Adnan Khan said the June 5 incident affecting Microsoft repositories appeared to be part of the Miasma malware campaign that infected 32 Red Hat npm packages.\u003c/p\u003e\n\n\u003cp\u003eCloudsmith concluded that Microsoft’s Azure environment on GitHub and the \u003ccode\u003edurabletask\u003c/code\u003e repository were compromised via Miasma. According to the article, Cloudsmith said Miasma targeted AI coding tools including Claude Code, Gemini CLI, VS Code, and Cursor. The article says the hacker pivoted from Red Hat’s npm packages to Microsoft’s GitHub resources.\u003c/p\u003e\n\n\u003ch2 id=\"durabletask-and-pypi-details\"\u003eDurabletask and PyPI Details\u003c/h2\u003e\n\n\u003cp\u003eOpenSourceMalware reported that \u003ccode\u003edurabletask\u003c/code\u003e, a repository in Microsoft’s Azure organization on GitHub, had been compromised in May. The platform indicated that incomplete cleanup may have allowed the threat actor to return with a new compromise, though the article states this has not been confirmed.\u003c/p\u003e\n\n\u003cp\u003eOpenSourceMalware also noted that the \u003ccode\u003edurabletask\u003c/code\u003e package on the Python Package Index had been compromised in May. According to the article, the threat actor pushed three malicious versions of the package: \u003ccode\u003e1.4.1\u003c/code\u003e, \u003ccode\u003e1.4.2\u003c/code\u003e, and \u003ccode\u003e1.4.3\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"reported-technique-in-related-miasma-activity\"\u003eReported Technique in Related Miasma Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article quotes Cloudsmith as saying the worm initially struck the \u003ccode\u003e@redhat-cloud-services\u003c/code\u003e npm namespace by compromising a Red Hat employee’s GitHub account. Cloudsmith said the threat actors pushed unreviewed orphan commits to internal repositories and injected a minimal workflow that requested GitHub OIDC tokens.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this as part of a broader software supply-chain campaign that moved from Red Hat npm packages to Microsoft GitHub resources.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-response\"\u003eMicrosoft’s Response\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said it temporarily removed some repositories while investigating potential malicious content. The company said all repositories had been restored and that it notified a small number of customers who may have pulled down content from the affected repositories.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also said it would continue investigating. If anything further is identified that requires customer action, the company said it will contact customers directly through established support channels.\u003c/p\u003e\n\n\u003ch2 id=\"related-supply-chain-activity\"\u003eRelated Supply-Chain Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article places the Microsoft incident in the context of continuing attacks against open-source ecosystems. It notes that Socket reported a new Shai-Hulud attack over the weekend involving a new delivery mechanism. It also cites StepSecurity’s report on a Shai-Hulud attack affecting \u003ccode\u003ePythagora-io/gpt-pilot\u003c/code\u003e, an open-source AI developer tool with more than 33,700 GitHub stars and over 3,500 forks.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-developer-actions-in-the-article\"\u003eRecommended Developer Actions in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends that software developers consider several precautions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLocking project dependencies.\u003c/li\u003e\n\u003cli\u003eAdding multi-day delays before fetching new package updates.\u003c/li\u003e\n\u003cli\u003eTesting new builds in isolated environments.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Microsoft removed 73 repositories across its Azure, microsoft, Azure-Samples, and MicrosoftDocs GitHub organizations on June 5 due to concerns they distributed potential malicious content.","The repositories were disabled for 105 seconds, disrupting continuous integration workflows, including access to the Azure/functions-action GitHub Action used to deploy Azure Functions.","Multiple researchers said the removals followed a compromise during a Miasma/Shai-Hulud supply-chain campaign, though Microsoft described the action as part of an investigation into potential malicious content.","Microsoft said all repositories have been restored, are considered clean and safe to use, and that it notified a small number of customers who may have pulled content from affected repositories.","Researchers linked the incident to broader supply-chain activity involving Red Hat npm packages, Microsoft GitHub resources, and compromised packages such as durabletask on PyPI."],"insights":["Even a very short repository takedown can create significant downstream disruption when widely used GitHub Actions such as Azure/functions-action are referenced directly in CI workflows.","The article highlights incomplete cleanup as a potential supply-chain risk, noting that OpenSourceMalware reported a prior compromise of the durabletask repository in May before the June incident.","Researchers described Miasma activity as targeting AI coding tools such as Claude Code, Gemini CLI, VS Code, and Cursor, indicating that developer tooling itself was a focus of the campaign.","The recommended mitigations emphasize slowing dependency adoption, including locking project dependencies, adding multi-day delays before fetching new package updates, and testing builds in isolated environments."],"referencedReports":[{"title":"Miasma Reaches Azure","url":"https://opensourcemalware.com/blog/miasma-reaches-azure","publisher":"OpenSourceMalware","context":"The article cites OpenSourceMalware as noting that Microsoft's durabletask repository and durabletask package on PyPI had been compromised in connection with the Miasma activity.","category":"","primary":false},{"title":"Miasma: Worm’s Path of Destruction","url":"https://cloudsmith.com/blog/miasma-worms-path-of-destruction","publisher":"Cloudsmith","context":"The article cites a Cloudsmith report concluding that Microsoft's Azure environment on GitHub and the durabletask repository were compromised via Miasma.","category":"","primary":false},{"title":"Mini Shai-Hulud, Miasma, and Hades Worms Target Bioinformatics and MCP Developers via Malicious Packages","url":"https://socket.dev/blog/mini-shai-hulud-miasma-and-hades-worms-target-bioinformatics-and-mcp-developers-via-malicious","publisher":"Socket","context":"The article references Socket's report on a new Shai-Hulud attack that used a new delivery mechanism over the weekend.","category":"","primary":false},{"title":"Pythagora-io/gpt-pilot Compromised on GitHub: Shai-Hulud Credential Stealer Blocked by Python Linter","url":"https://www.stepsecurity.io/blog/pythagora-io-gpt-pilot-compromised-on-github-shai-hulud-credential-stealer-blocked-by-python-linter","publisher":"StepSecurity","context":"The article cites a StepSecurity report about a Shai-Hulud attack affecting the Pythagora-io/gpt-pilot open-source AI developer tool.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft removed 73 repositories across its Azure, microsoft, Azure-Samples, and MicrosoftDocs organizations on GitHub on June 5. The company told BleepingComputer the repositories were removed due to concerns that they distributed “potential malicious content.” The incident was contained within 105 seconds, but it disrupted continuous integration pipelines.\u003c/p\u003e\n\n\u003cp\u003eMultiple researchers said the repositories were pulled after a compromise during a Miasma/Shai-Hulud supply-chain campaign. The most significant immediate effect was the loss of access to Azure/functions-action, a GitHub Action used by many developers to deploy Azure Functions. Workflows referencing it stopped working because the specified repository could not resolve the action.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said all repositories have been restored and are considered clean and safe to use. The company said it notified a small number of customers who may have pulled content from affected repositories. Researchers linked the activity to broader supply-chain incidents involving Red Hat npm packages, Microsoft GitHub resources, and compromised PyPI packages such as durabletask.\u003c/p\u003e\n"},{"n":1,"title":"Technical Analysis of MLTBackdoor","source":"zscaler.com","sourceColorIdx":5,"link":"https://www.zscaler.com/blogs/security-research/technical-analysis-mltbackdoor","time":"16:26","priority":"SHOULD READ","score":86,"tldr":"Zscaler ThreatLabz analyzed MLTBackdoor, a newly identified and heavily obfuscated backdoor likely tied to ransomware activity that is delivered through a ClickFix infection chain. Its key risk is that it maintains resilient C2 access via DGA and encrypted communications while using a BOF loader to dynamically expand post-exploitation capabilities.","briefOverview":"\u003cp\u003eZscaler ThreatLabz identified a new malware family in May 2026 that it tracks as MLTBackdoor. The malware is likely leveraged by a ransomware-related threat actor and was observed being delivered through a multi-stage ClickFix infection chain. ThreatLabz describes it as a post-exploitation backdoor that can establish a foothold for lateral movement.\u003c/p\u003e\n\n\u003cp\u003eMLTBackdoor includes built-in filesystem commands such as downloading, uploading, listing, deleting, renaming, and creating files or folders. Its most significant extensibility feature is a Beacon Object File loader, which allows the malware to dynamically add new capabilities. The loader is compatible with a subset of Cobalt Strike-style Beacon imports and also routes additional Beacon-prefixed imports to MLTBackdoor’s own indirect system call wrappers.\u003c/p\u003e\n\n\u003cp\u003eThe malware is heavily obfuscated using Mixed Boolean-Arithmetic and Control Flow Flattening, and it uses stack-built strings, API hashing, and indirect system calls to complicate analysis and evade user-mode hooks. It also performs multiple anti-analysis checks and sends the results as a bitmask during its initial communication. Its command-and-control traffic uses a custom encrypted binary protocol over TLS on port 443, with ECDH key exchange, AES-256-GCM encryption, hardcoded domains, and in some samples a date-based DGA for resilience.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eZscaler ThreatLabz reported that it identified MLTBackdoor in May 2026 as a new malware family likely used by a ransomware-related threat actor. The malware was observed in a multi-stage ClickFix infection chain that began on an automotive-related web page. If the victim copied, pasted, and executed the lure content, commands downloaded an archive containing endpointdlp.dll and an encrypted data.bin payload.\u003c/p\u003e\n\n\u003cp\u003eThe first-stage endpointdlp.dll decrypts the RC4-encrypted data.bin file, whose header contains the payload size, a 32-byte RC4 key, and the encrypted payload. The decrypted payload is MLTBackdoor itself. The malware first performs a self-update, then reuses the endpointdlp.dll filename and sideloads it through the legitimate signed Microsoft Defender executable mpextms.exe.\u003c/p\u003e\n\n\u003cp\u003eMLTBackdoor is designed to make static and dynamic analysis difficult. It uses an LLVM-based obfuscator with extensive Mixed Boolean-Arithmetic and Control Flow Flattening, and the article states that around 95% of its code consists of extra unnecessary calculations. It also constructs strings byte-by-byte on the stack, resolves APIs at runtime using DJB2 hashing, and uses a Hell’s Gate-style indirect system call technique.\u003c/p\u003e\n\n\u003cp\u003eThe malware includes several anti-analysis checks, including hypervisor detection, timing checks, debugger detection, process and window-title checks, sandbox driver checks, RAM and CPU-count checks, and uptime checks. Detection does not stop execution; instead, MLTBackdoor aggregates the results of 10 checks into a bitmask and sends it as part of its initial request. ThreatLabz also provided cracked SHA256 hashes for process names used in these checks.\u003c/p\u003e\n\n\u003cp\u003eMLTBackdoor supports a small set of built-in commands for filesystem operations, including download, upload, ls, delete, rename, and mkdir. Its BOF loader expands those capabilities by mapping and executing Microsoft COFF Beacon Object Files inside its own process. The loader handles sections, symbols, relocations, memory permissions, crashes, entry-point location, and cleanup.\u003c/p\u003e\n\n\u003cp\u003eFor command-and-control, MLTBackdoor uses a custom encrypted binary protocol over TLS on port 443 with the path /api/v1/telemetry and the User-Agent Microsoft-Delivery-Optimization/10.1. It performs an ECDH key exchange using NIST P-256 and derives an AES-256-GCM session key for subsequent encrypted messages. Some samples use hardcoded C2 domains, some use a date-based DGA, and others use both; ThreatLabz listed several indicators including file hashes and domains such as hrs2y15sungu[.]com, carrolc[.]com, cwrtwright[.]com, thomphon[.]com, and powwowski[.]com/payloads/update.zip.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eZscaler ThreatLabz identified a new malware family in May 2026 that it tracks as MLTBackdoor. The article describes MLTBackdoor as likely leveraged by a ransomware-related threat actor. ThreatLabz observed the malware being delivered through a multi-stage ClickFix infection chain.\u003c/p\u003e\n\n\u003cp\u003eMLTBackdoor provides built-in filesystem-related capabilities and can expand its functionality by loading Beacon Object Files. The article characterizes this BOF loader as one of the malware’s most powerful features. ThreatLabz also emphasizes the malware’s heavy obfuscation, anti-analysis features, encrypted network protocol, and use of a domain generation algorithm.\u003c/p\u003e\n\n\u003ch2 id=\"initial-infection-chain\"\u003eInitial infection chain\u003c/h2\u003e\n\n\u003cp\u003eThe observed infection chain begins with a ClickFix lure on an automotive-related web page. If a victim copies, pastes, and executes the ClickFix content, commands are run through conhost.exe and cmd to create a temporary directory, download a file with curl, extract it with tar, delete the archive, and execute endpointdlp.dll with rundll32.\u003c/p\u003e\n\n\u003cp\u003eThe downloaded archive contains two files:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003edata.bin\u003c/li\u003e\n\u003cli\u003eendpointdlp.dll\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe endpointdlp.dll file decrypts the RC4-encrypted data.bin file. The article states that the decryption key is stored in the payload header, which contains a payload size, a 32-byte RC4 key, and the encrypted payload. The decrypted payload is MLTBackdoor itself.\u003c/p\u003e\n\n\u003cp\u003eAfter decryption, MLTBackdoor performs a self-update. It then reuses the endpointdlp.dll filename and sideloads it through a legitimate signed Microsoft Defender executable named mpextms.exe.\u003c/p\u003e\n\n\u003ch2 id=\"obfuscation-and-analysis-resistance\"\u003eObfuscation and analysis resistance\u003c/h2\u003e\n\n\u003cp\u003eMLTBackdoor uses several methods to hinder analysis. The article says it uses indirect system calls, API hashing, and obfuscation methods applied at compilation time with an LLVM-based obfuscator.\u003c/p\u003e\n\n\u003ch3 id=\"mixed-boolean-arithmetic\"\u003eMixed Boolean-Arithmetic\u003c/h3\u003e\n\n\u003cp\u003eMLTBackdoor uses Mixed Boolean-Arithmetic obfuscation to rewrite simple arithmetic expressions into mathematically equivalent but much more complex expressions. ThreatLabz provides examples showing that noisy multi-line expressions collapse into simple operations after replacing bitwise-not expressions such as \u003ccode\u003e~x\u003c/code\u003e with \u003ccode\u003e-x - 1\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article states that MLTBackdoor uses MBA so extensively that around 95% of its code consists of extra, unnecessary calculations. This makes the malware’s logic harder to follow during reverse engineering.\u003c/p\u003e\n\n\u003ch3 id=\"control-flow-flattening\"\u003eControl Flow Flattening\u003c/h3\u003e\n\n\u003cp\u003eMLTBackdoor also uses Control Flow Flattening. This technique replaces normal conditional logic with a large loop and switch-based state machine, which obscures the real execution order of code blocks.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz notes two additional complications in MLTBackdoor’s CFF implementation:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe state value is stored at a stack offset and XORed before each comparison.\u003c/li\u003e\n\u003cli\u003eThe calculation of the next state is wrapped in MBA.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"stack-built-strings\"\u003eStack-built strings\u003c/h3\u003e\n\n\u003cp\u003eThe malware does not generally encrypt or encode strings. Instead, it constructs strings at runtime byte-by-byte on the stack.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that this becomes more difficult to analyze when combined with MBA and CFF. For example, a C2 domain such as cwrtwright[.]com may be constructed through multiple functions and stitched together, while the flattened state machine fragments the string-building logic. ThreatLabz states that this defeats tools such as FLOSS that look for consecutive characters in memory.\u003c/p\u003e\n\n\u003ch2 id=\"api-resolution-and-indirect-system-calls\"\u003eAPI resolution and indirect system calls\u003c/h2\u003e\n\n\u003cp\u003eMLTBackdoor resolves Win32 APIs, system calls, and Beacon Object File symbols at runtime using DJB2 hashing. ThreatLabz observed three hashing patterns:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNormal WinAPI lookups, such as \u003ccode\u003edjb2(\u0026quot;WinHttpConnect\u0026quot;)\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eLowercase API name lookups, such as \u003ccode\u003edjb2(\u0026quot;enumwindows\u0026quot;)\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eBeacon-prefixed lookups, such as \u003ccode\u003edjb2(\u0026quot;BeaconNtCreateFile\u0026quot;)\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe malware also uses a Hell’s Gate-style indirect system call technique. At startup, it walks ntdll exports, matches them against a list of 31 Nt-function hashes, and builds a runtime table containing hashes, system service numbers, and syscall gadget addresses. When it needs to call a Windows API function, it calls its own wrapper, looks up the hash, retrieves the system service number and gadget address, and jumps to the corresponding ntdll system call address.\u003c/p\u003e\n\n\u003cp\u003eThe article lists the Nt APIs covered by the malware’s resolved hashes, including NtAllocateVirtualMemory, NtProtectVirtualMemory, NtFreeVirtualMemory, NtWriteVirtualMemory, NtCreateThreadEx, NtQueryInformationProcess, NtQuerySystemInformation, NtOpenProcess, NtClose, NtOpenFile, NtCreateFile, NtReadFile, NtWriteFile, and several registry-related calls.\u003c/p\u003e\n\n\u003ch2 id=\"anti-analysis-behavior\"\u003eAnti-analysis behavior\u003c/h2\u003e\n\n\u003cp\u003eMLTBackdoor includes multiple anti-analysis techniques for detecting debuggers and sandboxed environments. The article explicitly notes that detection does not halt execution. Instead, the malware aggregates the results of 10 checks into a bitmask and sends that bitmask as part of its initial request.\u003c/p\u003e\n\n\u003cp\u003eThe documented checks include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHypervisor checks that look for known virtualization vendor IDs such as VMwareVMware, VBoxVBoxVBox, XenVMMXenVMM, and KVMKVMKVM.\u003c/li\u003e\n\u003cli\u003eAn additional hypervisor-related check that treats some other hypervisor vendor IDs differently and accounts for Windows \u003csup\u003e10\u003c/sup\u003e\u0026frasl;\u003csub\u003e11\u003c/sub\u003e hosts with Virtualization-Based Security enabled.\u003c/li\u003e\n\u003cli\u003eA timing check using repeated RDTSC, CPUID, and RDTSC loops.\u003c/li\u003e\n\u003cli\u003eA debugger check using NtQueryInformationProcess with the ProcessDebugPort information class.\u003c/li\u003e\n\u003cli\u003eA process-name check that hashes running process names with SHA256 and compares them to a hardcoded list.\u003c/li\u003e\n\u003cli\u003eA window-title check using strings such as x64dbg, x32dbg, ollydbg, windbg, idapro, process monitor, process explorer, wireshark, fiddler, dnspy, and cff explorer.\u003c/li\u003e\n\u003cli\u003eA sandbox driver check for names such as vbox, vmci, vmhgfs, virtio, vioscsi, and xenbus.\u003c/li\u003e\n\u003cli\u003eA RAM check for systems below 2 GB.\u003c/li\u003e\n\u003cli\u003eA CPU-count check for systems with one processor.\u003c/li\u003e\n\u003cli\u003eAn uptime check for systems running less than five minutes.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThreatLabz also includes an appendix of cracked SHA256 hashes corresponding to process names such as x64dbg.exe, x32dbg.exe, ollydbg.exe, windbg.exe, ida.exe, ida64.exe, procmon.exe, procmon64.exe, procexp.exe, procexp64.exe, wireshark.exe, fiddler.exe, pestudio.exe, dnspy.exe, vmtoolsd.exe, vboxservice.exe, df5serv.exe, cffexplorer.exe, autoruns.exe, and tcpview.exe.\u003c/p\u003e\n\n\u003ch2 id=\"built-in-capabilities\"\u003eBuilt-in capabilities\u003c/h2\u003e\n\n\u003cp\u003eMLTBackdoor includes a small set of built-in commands focused on filesystem operations. The commands described in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003edownload\u003c/code\u003e, which retrieves a file from the victim’s machine.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eupload\u003c/code\u003e, which drops a file on the victim’s machine.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003els\u003c/code\u003e, which lists files in a directory.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edelete\u003c/code\u003e, which deletes a file or folder.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003erename\u003c/code\u003e, which renames or moves a file or folder.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003emkdir\u003c/code\u003e, which creates a new folder.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the BOF loader is what significantly increases MLTBackdoor’s capabilities beyond this built-in command set.\u003c/p\u003e\n\n\u003ch2 id=\"beacon-object-file-loader\"\u003eBeacon Object File loader\u003c/h2\u003e\n\n\u003cp\u003eMLTBackdoor can load Beacon Object Files, which the article describes as Microsoft Common Object File Format compiled files containing sections, a symbol table, and relocations. The malware can map and execute BOFs inside its own process and then free them.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz describes the BOF dispatcher as performing the following steps:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCreating one memory block per section.\u003c/li\u003e\n\u003cli\u003eWalking the COFF symbol table.\u003c/li\u003e\n\u003cli\u003eApplying relocations per section.\u003c/li\u003e\n\u003cli\u003eChanging section permissions to read and execute only.\u003c/li\u003e\n\u003cli\u003eHandling crashes and returning them as results.\u0
