u003cp\u003eThe article emphasizes that a TGT alone is not sufficient to use Kerberos. The TGT is encrypted with the KRBTGT account’s long-term key, so the session key inside it is inaccessible without that key. The article notes that if an attacker could crack the KRBTGT key, they could forge TGTs for any account in the domain, which is the Golden Ticket attack, but that risk exists independently of U2U.\u003c/p\u003e\n\n\u003cp\u003eA TGT must be paired with its session key to be useful. The session key is required to encrypt the authenticator in later TGS requests. The article uses this to explain why Rubeus exports tickets as KRB-CRED structures, because those structures contain the ticket along with the session key, flags, expiration time, and other metadata needed to use it.\u003c/p\u003e\n\n\u003ch2 id=\"session-keys-versus-long-term-keys\"\u003eSession Keys Versus Long-Term Keys\u003c/h2\u003e\n\n\u003cp\u003eThe article describes session keys as randomly generated by the KDC and delivered to the client inside the AS-REP. They are not stored by the KDC, and their validity is tied to the TGT lifetime, which defaults to 10 hours. When the TGT expires, a new TGT with a different session key is issued.\u003c/p\u003e\n\n\u003cp\u003eThe author argues that this limits the usefulness of U2U tickets. Since session keys are randomly generated and not password-derived, there is no dictionary or brute-force path against them as there is with password-derived keys. The article states that capturing a U2U ticket off the wire would leave at most the TGT lifetime to crack a random key, which it describes as not a realistic attack surface.\u003c/p\u003e\n\n\u003ch2 id=\"draft-u2u-scenarios-and-windows-behavior\"\u003eDraft U2U Scenarios and Windows Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe article references the draft-swift-win2k-krb-user2user draft, which describes three scenarios for initiating U2U. The first is when the client already knows it needs U2U and proactively requests the target service’s TGT before sending a U2U TGS-REQ. The article states that this is the path observed in Windows, including in RDP with Network Level Authentication.\u003c/p\u003e\n\n\u003cp\u003eThe second draft scenario is KDC-enforced U2U through account policy. In that model, the KDC would return KDC_ERR_MUST_USE_USER2USER if a client requested a standard service ticket for an account that requires U2U. The author states that Windows has no such user attribute, userAccountControl flag, or Group Policy setting, and that investigation of kerberos.dll found that the error does not exist.\u003c/p\u003e\n\n\u003cp\u003eThe article says attempts to make the KDC return KDC_ERR_MUST_USE_USER2USER failed. Requests using a UPN in the SPN field and an empty SPN returned KDC_ERR_S_PRINCIPAL_UNKNOWN instead. The author also notes that even if the KDC returned such an error, it could not provide the target TGT because the KDC does not retain TGTs after issuance.\u003c/p\u003e\n\n\u003cp\u003eThe third draft scenario is server-enforced U2U after a conventional AP-REQ. The article explains that this path is not generally reached in a standard Windows environment because the KDC detects the missing SPN during the TGS exchange. However, the article says the server-side error path can apply if a service is hardcoded to require U2U and explicitly returns KRB_AP_ERR_USER_TO_USER_REQUIRED when it receives a conventional AP-REQ.\u003c/p\u003e\n\n\u003ch2 id=\"rdp-with-network-level-authentication\"\u003eRDP With Network Level Authentication\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies RDP with Network Level Authentication as the most common legitimate place to observe U2U in the wild. NLA requires authentication before the server renders a login screen, which prevents a full desktop session from being started for an unauthenticated connection. The article explains that NLA relies on CredSSP to forward the user’s credentials to the server in encrypted form over a protected channel.\u003c/p\u003e\n\n\u003cp\u003eIn the author’s lab, after the initial RDP handshake and TLS tunnel were established, the client requested a standard Kerberos service ticket for TERMSRV/hostname.domain.local. The KDC returned a valid service ticket. The article notes that this ticket was not used or cached in the logon session.\u003c/p\u003e\n\n\u003cp\u003eThe client then contacted the RDP server directly to request its TGT, beginning the U2U exchange. The author states that there were no errors from the KDC or RDP server telling the client to use U2U. Instead, CredSSP initiated U2U because it called InitializeSecurityContext with the ISC_REQ_USE_SESSION_KEY flag, which requires a new session key for the security context.\u003c/p\u003e\n\n\u003cp\u003eThe KERB-TGT-REQUEST and KERB-TGT-REPLY were wrapped inside SPNEGO tokens, which were carried in CredSSP TSRequest structures over the established TLS channel. The article emphasizes that this TGT exchange does not appear as raw Kerberos traffic on TCP port 88. The client receives the RDP server’s TGT inside the encrypted CredSSP negotiation before any credentials are forwarded.\u003c/p\u003e\n\n\u003cp\u003eWith the RDP server’s TGT, the client sends a TGS-REQ to the KDC that includes the server’s TGT in additional-tickets and sets ENC-TKT-IN-SKEY. The article notes that the sname can still reference a valid SPN such as TERMSRV/castelblack, but the KDC ignores it once ENC-TKT-IN-SKEY is set. The resulting ticket is issued for the computer account and encrypted with the session key from that account’s TGT.\u003c/p\u003e\n\n\u003cp\u003eThe TGS-REP reflects the same sname supplied in the request. The author notes that this differs from the expired draft, which says a U2U exchange should reflect the UPN of the target service. Further testing with Rubeus confirmed that whatever target value is supplied is reflected back in the sname of the issued ticket.\u003c/p\u003e\n\n\u003cp\u003eFinally, the client sends an AP-REQ to the RDP server inside CredSSP. The AP-REQ sets USE-SESSION-KEY to true, telling the receiver which keying material to use to decrypt the ticket. The RDP server then obtains the session key from LSASS and decrypts the AP-REQ to authenticate the user.\u003c/p\u003e\n\n\u003ch2 id=\"why-rdp-with-nla-uses-u2u\"\u003eWhy RDP With NLA Uses U2U\u003c/h2\u003e\n\n\u003cp\u003eThe author states that the need for U2U in RDP with NLA is debatable because the client can already request a service ticket for the TERMSRV SPN. The article suggests that the legitimate reason is the use of non-cacheable service tickets and a fresh session key. CredSSP calls InitializeSecurityContext with ISC_REQ_USE_SESSION_KEY, and Windows performs a U2U exchange to satisfy that requirement.\u003c/p\u003e\n\n\u003cp\u003eThe article says the new session key is then used to deliver the client’s plaintext credentials. It explains that reusing an existing cached session key would create a risk if an attacker extracted the key and was also intercepting the traffic, because the attacker could decrypt the CredSSP exchange. The article also reiterates that NLA requires authentication before any RDP session is spawned and states that this prevents pre-auth RDP vulnerabilities like BlueKeep.\u003c/p\u003e\n\n\u003ch2 id=\"pkinit-and-pac-credential-info\"\u003ePKINIT and PAC_CREDENTIAL_INFO\u003c/h2\u003e\n\n\u003cp\u003eThe article then connects U2U to UnPAC-the-Hash. It explains that when a user logs in through PKINIT, the user’s NT hash is included in the PAC inside the TGT. This is done to support NTLM-based authentication for legacy services that do not support Kerberos.\u003c/p\u003e\n\n\u003cp\u003eIn PKINIT, the user authenticates with a certificate rather than a password, so the client host does not have the user’s NT hash to cache locally for the msv1_0 authentication package. The article states that Microsoft included the NT hash in the PAC only if the TGT is obtained through certificate authentication. The PAC is encrypted inside the TGT or service tickets, and PAC_CREDENTIAL_INFO is separately encrypted with what the article calls the AS reply key.\u003c/p\u003e\n\n\u003cp\u003eThe AS reply key is derived from the Diffie-Hellman shared secret and the client and server nonces. In PKINIT, this key encrypts the EncASRepPart of the AS-REP, whereas traditional Kerberos uses the user’s encryption key for that purpose. After the AS exchange, LSA derives the AS reply key, decrypts EncASRepPart, and retrieves the TGT session key.\u003c/p\u003e\n\n\u003cp\u003eAt that point, LSA has the TGT, TGT session key, and AS reply key, but it cannot read the PAC inside the TGT because the TGT is encrypted with KRBTGT. To access the PAC, LSA requests a service ticket for the local computer account using an SPN such as HOST/FQDN. The KDC copies the PAC into that service ticket and encrypts the ticket with the computer account’s long-term key.\u003c/p\u003e\n\n\u003cp\u003eLSA can decrypt that service ticket using the computer account key, access the PAC, and use the AS reply key to decrypt PAC_CREDENTIAL_INFO. The recovered NT hash is then cached in the logon session for NTLM authentication. The article states that the AS reply key exists in LSASS memory only long enough for LSA to complete this service ticket decryption process.\u003c/p\u003e\n\n\u003ch2 id=\"unpac-the-hash-connection\"\u003eUnPAC-the-Hash Connection\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that the same primitives used by U2U make UnPAC-the-Hash possible. To perform the attack as described, a certificate issued by the domain Certificate Authority and its corresponding private key are required. The article states that this is typically obtained through ADCS ESC attacks, Shadow Credentials attacks, or by dumping a TGT obtained via PKINIT from a workstation.\u003c/p\u003e\n\n\u003cp\u003eWith the certificate and private key, the operator initiates a PKINIT exchange against the KDC and generates an ephemeral Diffie-Hellman key pair under their control. The KDC returns an AS-REP, from which the AS reply key is derived using the same process Windows LSA uses. This provides a valid TGT and its associated session key.\u003c/p\u003e\n\n\u003cp\u003eThe next step described is requesting a U2U service ticket for the same account. Because the request is U2U, the KDC encrypts the service ticket using the TGT session key instead of a long-term service account key. Since the requester already has that TGT session key, the service ticket can be decrypted.\u003c/p\u003e\n\n\u003cp\u003eOnce decrypted, the embedded PAC becomes accessible. PAC_CREDENTIAL_INFO contains the user’s NT hash and is encrypted with the AS reply key derived during PKINIT. The article explains that using that AS reply key allows the NT hash to be recovered, after which it can be used for Pass-the-Hash or to request Kerberos tickets directly if RC4 encryption is enabled.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaways\"\u003eMain Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eU2U changes the encryption key used for service tickets from a service account long-term key to a TGT session key supplied through an additional ticket.\u003c/li\u003e\n\u003cli\u003eWindows consistently demonstrates the client-initiated U2U scenario, while the article did not find evidence for a Windows account policy that forces U2U through KDC_ERR_MUST_USE_USER2USER.\u003c/li\u003e\n\u003cli\u003eRDP with NLA uses U2U inside CredSSP over TLS, and the TGT exchange is not visible as raw Kerberos traffic on TCP port 88.\u003c/li\u003e\n\u003cli\u003eIn RDP with NLA, U2U appears tied to CredSSP’s request for a fresh session key through ISC_REQ_USE_SESSION_KEY.\u003c/li\u003e\n\u003cli\u003eUnPAC-the-Hash relies on PKINIT-derived AS reply key material and U2U service ticket encryption to access the PAC and recover the NT hash from PAC_CREDENTIAL_INFO.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Kerberos user-to-user authentication encrypts a service ticket with the target user’s TGT session key instead of a service account’s long-term key.","A client obtains the target service user’s TGT through a KERB-TGT-REQUEST and then includes that TGT in the additional-tickets field of a TGS-REQ with the ENC-TKT-IN-SKEY flag set.","The article states that Windows consistently implements the U2U path where the client deliberately initiates U2U, while the draft-described KDC policy and server error scenarios are not generally observed in standard Windows environments.","RDP with Network Level Authentication uses U2U during CredSSP negotiation by requesting the RDP server’s TGT and then obtaining a service ticket encrypted with the session key from that TGT.","UnPAC-the-Hash uses PKINIT and U2U to obtain a decryptable service ticket containing the PAC, allowing recovery of the user’s NT hash from PAC_CREDENTIAL_INFO with the derived AS reply key."],"insights":["In Windows RDP with NLA, the client first obtains a normal TERMSRV service ticket but then does not use or cache it, immediately switching to a U2U exchange initiated by CredSSP through the ISC_REQ_USE_SESSION_KEY flag.","The article found that the draft-described KDC_ERR_MUST_USE_USER2USER behavior does not appear to exist in Windows kerberos.dll, and attempts to trigger it instead produced KDC_ERR_S_PRINCIPAL_UNKNOWN.","In a Windows U2U TGS request, the KDC still reflects the supplied sname such as TERMSRV/hostname in the returned ticket, even though the ticket is issued for the computer account and encrypted with the session key from the additional TGT.","The RDP U2U TGT exchange is carried inside SPNEGO tokens within CredSSP TSRequest structures over the established TLS channel, so it is not visible as raw Kerberos traffic on TCP port 88.","The article argues that U2U’s use in RDP with NLA is likely tied to CredSSP’s need for a fresh, non-cacheable session key to protect forwarded plaintext credentials."],"referencedReports":[{"title":"draft-swift-win2k-krb-user2user","url":"https://datatracker.ietf.org/doc/html/draft-swift-win2k-krb-user2user-01","publisher":"IETF Datatracker","context":"The article cites this Internet-Draft to explain the three scenarios in which Kerberos user-to-user authentication is initiated and then compares those scenarios with observed Windows behavior.","category":"","primary":false}],"body":"\u003cp\u003eThis article is a technical deep dive into Kerberos user-to-user authentication in Windows and how it differs from traditional Kerberos service ticket issuance. In standard Kerberos, service tickets are encrypted with a service account’s long-term key, while U2U encrypts the service ticket using the session key from the target user or service’s TGT. The article focuses on Windows internals and explains why U2U became prominent after ADCS, UnPAC-the-Hash, and Shadow Credentials attacks.\u003c/p\u003e\n\n\u003cp\u003eThe author explains that U2U was designed for peer-to-peer scenarios where a service runs under an account that has no SPN, so the KDC cannot locate a service account key in the usual way. A client can request the target service’s TGT directly, include it in a TGS-REQ as an additional ticket, and set the ENC-TKT-IN-SKEY flag so the KDC encrypts the resulting ticket with the TGT session key. The article emphasizes that handing out raw TGTs is not inherently dangerous because a TGT is unusable without its associated session key.\u003c/p\u003e\n\n\u003cp\u003eThe article’s most concrete Windows example is RDP with Network Level Authentication, where CredSSP initiates U2U during authentication. The client obtains the RDP server’s TGT over the encrypted CredSSP negotiation, requests a U2U service ticket, and presents an AP-REQ indicating that the service ticket is encrypted with a session key. The article also explains how the same PKINIT and U2U primitives support UnPAC-the-Hash by allowing a party with a certificate and private key to decrypt a U2U service ticket and recover the NT hash from PAC_CREDENTIAL_INFO.\u003c/p\u003e\n"},{"n":2,"title":"What Trump’s AI Executive Order Means for Healthcare Sector","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/what-trumps-ai-executive-order-means-for-healthcare-sector/","time":"17:11","priority":"MAY READ","score":55,"tldr":"Trump’s AI executive order could help the healthcare sector improve cyber resilience if it results in faster, coordinated sharing of benchmarks, vulnerability information, and defensive tools through established channels like Health-ISAC.","briefOverview":"\u003cp\u003ePresident Donald Trump’s executive order on artificial intelligence barely mentions healthcare, but experts cited in the article said it could still have a positive impact on the healthcare critical infrastructure sector if implemented effectively. Errol Weiss, chief security officer at Health-ISAC, said the order’s biggest opportunity for healthcare is speed and coordination. He tied that opportunity to the need for critical infrastructure operators to keep pace with attackers using AI.\u003c/p\u003e\n\n\u003cp\u003eWeiss said attackers are professionalizing and leveraging AI to shorten the time between vulnerability discovery and exploitation. He said the healthcare sector would benefit most if review and benchmarking outputs, vulnerability clearinghouse activity, and tool access become timely, actionable information shared through established ISAC channels. He emphasized that the desired result is measurable resilience improvements that prevent cyber incidents from becoming prolonged critical infrastructure outages affecting national security.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article discusses President Donald Trump’s executive order on artificial intelligence and its possible significance for the healthcare sector. Although the order barely mentions healthcare, some experts said it could benefit healthcare as a critical infrastructure sector if implemented effectively. The article presents this as a conditional opportunity rather than a guaranteed outcome.\u003c/p\u003e\n\n\u003cp\u003eErrol Weiss, chief security officer at the Health Information Sharing and Analysis Center, said the order’s biggest opportunity for healthcare is speed and coordination. He said critical infrastructure operators need to stay ahead of attackers who are becoming more professional and using AI. According to Weiss, those attackers are using AI to compress the time between vulnerability discovery and exploitation.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights implementation as the central issue. Weiss said the healthcare sector would benefit most if review and benchmarking outputs, vulnerability clearinghouse activity, and tool access become timely and actionable information sharing. He specifically pointed to established ISAC channels as the route through which that information should move.\u003c/p\u003e\n\n\u003cp\u003eThe affected stakeholder discussed in the article is the healthcare sector as part of critical infrastructure. Health-ISAC is presented as a key information-sharing organization for the sector, through comments from its chief security officer. The article does not name a specific incident, victim organization, threat actor, malware family, or vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe stated desired impact is measurable resilience improvement. Weiss said the goal is to ensure cyber incidents do not become prolonged critical infrastructure outages that affect national security. The article links readers to a Healthcare Info Security article for more information and lists related Health-ISAC resources and news items.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article covers President Donald Trump’s executive order on artificial intelligence and its possible implications for the healthcare sector. It notes that the executive order barely mentions healthcare directly. Despite that, some experts said the directive could potentially help the healthcare critical infrastructure sector if it is implemented effectively.\u003c/p\u003e\n\n\u003cp\u003eThe main voice in the article is Errol Weiss, chief security officer at the Health Information Sharing and Analysis Center, or Health-ISAC. Weiss frames the executive order’s biggest opportunity for healthcare as speed and coordination. The article presents the order as potentially useful for cybersecurity resilience, but only if its implementation produces practical outcomes for the sector.\u003c/p\u003e\n\n\u003ch2 id=\"significance-for-healthcare\"\u003eSignificance for Healthcare\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies healthcare as part of critical infrastructure. It emphasizes that the sector faces attackers who are professionalizing and using AI. Weiss said critical infrastructure operators need to stay ahead of those attackers.\u003c/p\u003e\n\n\u003cp\u003eA key concern described in the article is the shrinking window between vulnerability discovery and exploitation. Weiss said attackers leveraging AI can compress that timeline. In that context, speed and coordination are presented as especially important for healthcare organizations and critical infrastructure operators.\u003c/p\u003e\n\n\u003ch2 id=\"implementation-requirements\"\u003eImplementation Requirements\u003c/h2\u003e\n\n\u003cp\u003eThe article stresses that execution of the executive order matters. Weiss said the healthcare sector will benefit most if several outputs become useful to defenders:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReview and benchmarking outputs.\u003c/li\u003e\n\u003cli\u003eVulnerability clearinghouse activity.\u003c/li\u003e\n\u003cli\u003eTool access.\u003c/li\u003e\n\u003cli\u003eTimely and actionable information sharing.\u003c/li\u003e\n\u003cli\u003eDistribution through established ISAC channels.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not describe specific technical mechanisms in the executive order. Instead, it focuses on whether outputs from the order can be translated into timely and actionable information for healthcare organizations.\u003c/p\u003e\n\n\u003ch2 id=\"stakeholders-mentioned\"\u003eStakeholders Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article explicitly mentions several stakeholders and entities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePresident Donald Trump, who issued the artificial intelligence executive order.\u003c/li\u003e\n\u003cli\u003eThe healthcare sector, which is described as part of critical infrastructure.\u003c/li\u003e\n\u003cli\u003eCritical infrastructure operators, which Weiss said need to stay ahead of AI-enabled attackers.\u003c/li\u003e\n\u003cli\u003eHealth-ISAC, the Health Information Sharing and Analysis Center.\u003c/li\u003e\n\u003cli\u003eErrol Weiss, chief security officer at Health-ISAC.\u003c/li\u003e\n\u003cli\u003eHealthcare Info Security, where readers are directed to read the full article.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eNo specific healthcare organization is described as a victim. The article does not identify a named threat actor, malware family, exploited vulnerability, or specific cyber incident.\u003c/p\u003e\n\n\u003ch2 id=\"threat-and-technical-details\"\u003eThreat and Technical Details\u003c/h2\u003e\n\n\u003cp\u003eThe technical detail in the article centers on attacker use of AI. Weiss said attackers are professionalizing and leveraging AI to reduce the time between vulnerability discovery and exploitation. This is presented as a reason healthcare and other critical infrastructure operators need faster and better coordination.\u003c/p\u003e\n\n\u003cp\u003eThe article does not provide details about a particular exploitation method, malware tool, campaign, or vulnerability. It does not cite a CVE or describe a specific incident response action. Its focus is on policy implementation and information-sharing outcomes rather than technical analysis of an attack.\u003c/p\u003e\n\n\u003ch2 id=\"desired-impact\"\u003eDesired Impact\u003c/h2\u003e\n\n\u003cp\u003eWeiss said the desired outcome is measurable resilience improvement. The article frames success as preventing cyber incidents from turning into prolonged critical infrastructure outages. It also notes that such outages could affect national security.\u003c/p\u003e\n\n\u003cp\u003eThe article’s core message is that the executive order may help the healthcare sector if its outputs are implemented in a way that produces timely, actionable information through established Health-ISAC and ISAC information-sharing channels.\u003c/p\u003e\n","keyPoints":["President Donald Trump’s executive order on artificial intelligence barely mentions healthcare, but some experts said it could potentially benefit the sector if implemented effectively.","Errol Weiss of Health-ISAC said the executive order’s biggest opportunity for healthcare is speed and coordination.","Weiss said critical infrastructure operators need to stay ahead of attackers who are leveraging AI to shorten the time between vulnerability discovery and exploitation.","Weiss said the healthcare sector would benefit most if review and benchmarking outputs, vulnerability clearinghouse activity, and tool access become timely, actionable information sharing through established ISAC channels.","Weiss said the goal should be measurable resilience improvements so cyber incidents do not become prolonged critical infrastructure outages affecting national security."],"insights":["The article suggests that a broadly written AI executive order can still matter for healthcare cybersecurity even when healthcare is barely mentioned, because healthcare is treated as part of critical infrastructure.","Health-ISAC’s comments indicate that the practical value of the order will depend on whether federal outputs become operational intelligence that can move through existing ISAC information-sharing channels.","The article frames success in terms of measurable resilience and prevention of prolonged outages, not simply faster AI adoption or more policy activity."],"referencedReports":[],"body":"\u003cp\u003ePresident Donald Trump’s executive order on artificial intelligence barely mentions healthcare, but experts cited in the article said it could still have a positive impact on the healthcare critical infrastructure sector if implemented effectively. Errol Weiss, chief security officer at Health-ISAC, said the order’s biggest opportunity for healthcare is speed and coordination. He tied that opportunity to the need for critical infrastructure operators to keep pace with attackers using AI.\u003c/p\u003e\n\n\u003cp\u003eWeiss said attackers are professionalizing and leveraging AI to shorten the time between vulnerability discovery and exploitation. He said the healthcare sector would benefit most if review and benchmarking outputs, vulnerability clearinghouse activity, and tool access become timely, actionable information shared through established ISAC channels. He emphasized that the desired result is measurable resilience improvements that prevent cyber incidents from becoming prolonged critical infrastructure outages affecting national security.\u003c/p\u003e\n"},{"n":10,"title":"New in the Threat Center: Compromised Components, Now Available via API","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/new-in-the-threat-center-compromised-components-now-available-via-api","time":"17:18","priority":"MAY READ","score":45,"tldr":"StepSecurity has added an API endpoint that lets Enterprise customers programmatically retrieve the exact compromised OSS packages and versions tied to a Threat Center incident. The goal is to help teams automate incident response, enrich SIEM workflows, and quickly compare incidents against their dependency inventories.","briefOverview":"\u003cp\u003eStepSecurity announced a new API endpoint that makes Threat Center incident data available programmatically. The endpoint returns compromised open source software components associated with a specific threat incident. It is intended to let teams move from notification of an incident to automated action using structured component data.\u003c/p\u003e\n\n\u003cp\u003eThe API fits into StepSecurity’s broader supply chain response loop, alongside real-time detection events, the Threat Center dashboard, pull request checks, and the Secure Registry. The article says StepSecurity detects active supply chain compromises within minutes using systems that uncovered the tj-actions and nx incidents. The new endpoint gives teams on-demand access to the exact affected packages and versions tied to an incident.\u003c/p\u003e\n\n\u003cp\u003eThe endpoint is \u003ccode\u003eGET /github/{owner}/threat-intel/incidents/{incidentId}/compromised-components\u003c/code\u003e and requires a GitHub organization, incident identifier, and valid StepSecurity API token. Its response can include ecosystem, component name, affected version, severity, verification status, description, timestamp, and threat intelligence identifiers. StepSecurity says teams can use this data to automate incident response, enrich SIEM workflows, and compare incidents against SBOMs or lockfiles.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eStepSecurity announced a new API endpoint for Enterprise customers that exposes compromised open source software components associated with Threat Center incidents. The article frames the launch around the speed of supply chain attacks and the shrinking window between compromise and exploitation. StepSecurity says its Threat Intelligence detects active supply chain compromises within minutes and sends those detections into existing team channels.\u003c/p\u003e\n\n\u003cp\u003eThe Threat Center is described as a real-time feed and dashboard for active incidents, historical records, affected packages, and recommended remediation. The new endpoint makes that incident data available programmatically so organizations can integrate it into their own automation and tooling. The article positions the endpoint as another path for accessing intelligence that already powers the Threat Center.\u003c/p\u003e\n\n\u003cp\u003eThe endpoint is \u003ccode\u003eGET /github/{owner}/threat-intel/incidents/{incidentId}/compromised-components\u003c/code\u003e. Users provide their GitHub organization, a unique incident identifier, and a valid StepSecurity API token. The \u003ccode\u003eincidentId\u003c/code\u003e is the same identifier included in Threat-Intelligence detection events and shown in the Threat Center.\u003c/p\u003e\n\n\u003cp\u003eThe response returns compromised OSS component data for the selected incident. The example response includes fields for package type, component name, version, incident group ID, description, severity, verification status, added timestamp, and threat intelligence ID. The article emphasizes that this structured payload enables automation without requiring a person to open the dashboard and manually read affected packages.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity highlights three main uses for the endpoint: automating incident response, enriching SIEM and SOC tooling, and correlating compromised packages against dependency inventories. The article also describes existing controls, including pull request checks that block compromised package versions and the Secure Registry that enforces controls at install time. Together, these capabilities are presented as a response loop for detecting incidents, notifying teams, blocking future exposure, and checking existing exposure.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity announced a new API endpoint that returns compromised open source software components associated with a specific Threat Center incident. The article presents this as an extension of StepSecurity Threat Intelligence and the Threat Center, making incident data available for direct use in automation, SIEM workflows, and internal tooling.\u003c/p\u003e\n\n\u003cp\u003eThe launch is framed around the speed of supply chain attacks. The article states that the time between a package being compromised and that compromise being exploited continues to shrink, and says StepSecurity Threat Intelligence is designed to detect active supply chain compromises within minutes.\u003c/p\u003e\n\n\u003ch2 id=\"threat-center-context\"\u003eThreat Center Context\u003c/h2\u003e\n\n\u003cp\u003eThe Threat Center is described as the place where StepSecurity’s supply chain threat intelligence is consolidated. It provides a real-time feed of active incidents, historical records, affected packages, and recommended remediation in a single view.\u003c/p\u003e\n\n\u003cp\u003eThe article says StepSecurity already surfaces supply chain compromise detections through several connected mechanisms:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReal-time detection events sent to SIEM platforms through existing AWS S3 and webhook integrations.\u003c/li\u003e\n\u003cli\u003eSlack and email notifications.\u003c/li\u003e\n\u003cli\u003eThe Threat Center dashboard for human investigation and remediation.\u003c/li\u003e\n\u003cli\u003ePull request checks such as the NPM Package Compromised Updates Check.\u003c/li\u003e\n\u003cli\u003eThe Secure Registry, which enforces controls at install time for developers, CI runners, and public registry access.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe new endpoint adds on-demand, structured access to the components affected by a specific incident.\u003c/p\u003e\n\n\u003ch2 id=\"api-endpoint-details\"\u003eAPI Endpoint Details\u003c/h2\u003e\n\n\u003cp\u003eThe newly announced endpoint is:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003eGET /github/{owner}/threat-intel/incidents/{incidentId}/compromised-components\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe article says users must provide:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA GitHub organization.\u003c/li\u003e\n\u003cli\u003eA unique incident identifier.\u003c/li\u003e\n\u003cli\u003eA valid StepSecurity API token.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe \u003ccode\u003eincidentId\u003c/code\u003e is the same identifier already provided in Threat-Intelligence detection events and displayed in the Threat Center. This allows the API call to connect directly with alerts and dashboard incidents that teams are already receiving.\u003c/p\u003e\n\n\u003ch2 id=\"returned-data\"\u003eReturned Data\u003c/h2\u003e\n\n\u003cp\u003eThe endpoint returns every compromised OSS component tied to the specified incident. According to the article, the returned data can include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePackage ecosystem or type.\u003c/li\u003e\n\u003cli\u003eComponent name.\u003c/li\u003e\n\u003cli\u003eAffected version.\u003c/li\u003e\n\u003cli\u003eIncident group ID.\u003c/li\u003e\n\u003cli\u003eDescription of the threat.\u003c/li\u003e\n\u003cli\u003eSeverity.\u003c/li\u003e\n\u003cli\u003eVerification status.\u003c/li\u003e\n\u003cli\u003eTimestamp for when the component was added.\u003c/li\u003e\n\u003cli\u003eThreat intelligence ID.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe sample response includes an npm package named \u003ccode\u003emalicious-pkg\u003c/code\u003e at version \u003ccode\u003e1.2.3\u003c/code\u003e, marked as critical and verified, with a description stating that the package contains malicious code that exfiltrates credentials.\u003c/p\u003e\n\n\u003ch2 id=\"role-in-incident-response\"\u003eRole in Incident Response\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity describes the endpoint as a way to remove an early manual step from incident response. A Threat-Intelligence detection event already notifies teams that an incident exists and carries the incident identifier. The API lets teams use that identifier to immediately pull the full list of compromised components.\u003c/p\u003e\n\n\u003cp\u003eThe article says this data can then be routed into:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn-call paging.\u003c/li\u003e\n\u003cli\u003eTicketing systems.\u003c/li\u003e\n\u003cli\u003eDedicated response channels.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe main benefit described is that the alert and the actionable component details can arrive together, without requiring a person to open the Threat Center dashboard first.\u003c/p\u003e\n\n\u003ch2 id=\"siem-and-soc-integration\"\u003eSIEM and SOC Integration\u003c/h2\u003e\n\n\u003cp\u003eThe article says Threat Intelligence was designed for SIEM and Security Operations Center workflows using existing StepSecurity integrations. In this model, the detection event provides the initial signal, while the new endpoint enriches that signal with structured component data.\u003c/p\u003e\n\n\u003cp\u003eThe article specifically calls out the \u003ccode\u003eseverity\u003c/code\u003e and \u003ccode\u003everified\u003c/code\u003e fields as useful pivots for prioritization. Teams can use those fields to prioritize verified, critical compromises and correlate them with other data already present in their SIEM.\u003c/p\u003e\n\n\u003ch2 id=\"dependency-inventory-correlation\"\u003eDependency Inventory Correlation\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies exposure assessment as a central question during a supply chain incident. By returning \u003ccode\u003ecomponent_name\u003c/code\u003e and \u003ccode\u003eversion\u003c/code\u003e, the endpoint allows teams to compare incident data against their own SBOMs or lockfiles.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity says this can help teams determine whether they are exposed in seconds instead of hours. The article positions this as complementary to existing preventive controls: pull request checks block compromised versions during code review, and the Secure Registry enforces controls at install time across CI and developer machines.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-existing-controls\"\u003eRelationship to Existing Controls\u003c/h2\u003e\n\n\u003cp\u003eThe article presents the new API as part of a broader response loop rather than a standalone feature. That loop consists of:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDetecting a compromise within minutes.\u003c/li\u003e\n\u003cli\u003eSending detection events to SIEMs and teams.\u003c/li\u003e\n\u003cli\u003eUsing pull request checks to block compromised package updates.\u003c/li\u003e\n\u003cli\u003eUsing the Secure Registry to enforce install-time controls.\u003c/li\u003e\n\u003cli\u003eCalling the API to retrieve exact compromised components for response and exposure confirmation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the API helps systems keep pace with detections by supplying structured, on-demand component details.\u003c/p\u003e\n\n\u003ch2 id=\"availability-and-getting-started\"\u003eAvailability and Getting Started\u003c/h2\u003e\n\n\u003cp\u003eThe Threat Center and the compromised components endpoint are available to StepSecurity Enterprise customers. To start using the endpoint, the article instructs customers to generate an API token from the StepSecurity dashboard and use it with a real incident from the Threat Center.\u003c/p\u003e\n\n\u003cp\u003eThe article also points readers to the Threat Center documentation and an earlier blog post introducing StepSecurity Threat Intelligence for more information about how the service detects and tracks supply chain incidents.\u003c/p\u003e\n","keyPoints":["StepSecurity has introduced a new API endpoint that returns compromised open source software components for a specific Threat Center incident.","The endpoint uses the path GET /github/{owner}/threat-intel/incidents/{incidentId}/compromised-components and requires a GitHub organization, an incident identifier, and a valid StepSecurity API token.","The API response includes fields such as package ecosystem, component name, affected version, severity, verification status, description, and threat intelligence identifier.","The article says teams can use the endpoint to automate incident response, enrich SIEM and SOC workflows, and correlate compromised components against SBOMs or lockfiles.","The Threat Center and compromised components endpoint are available to StepSecurity Enterprise customers."],"insights":["The incidentId used by the new API is the same identifier already included in Threat-Intelligence detection events and shown in the Threat Center, which allows existing alert pipelines to call the endpoint without adding a separate correlation step.","The endpoint is positioned as an enrichment mechanism rather than a primary alerting channel: detection events notify teams that an incident exists, while the API supplies the affected package and version details needed for automation.","The verified and severity fields in the API response can be used as decision points for automated prioritization, such as escalating verified critical compromises ahead of lower-confidence or lower-severity findings.","The API is designed to complement preventive controls by helping teams check whether compromised components are already present in SBOMs or lockfiles, while pull request checks and the Secure Registry focus on blocking new or future installs."],"referencedReports":[],"body":"\u003cp\u003eStepSecurity announced a new API endpoint that makes Threat Center incident data available programmatically. The endpoint returns compromised open source software components associated with a specific threat incident. It is intended to let teams move from notification of an incident to automated action using structured component data.\u003c/p\u003e\n\n\u003cp\u003eThe API fits into StepSecurity’s broader supply chain response loop, alongside real-time detection events, the Threat Center dashboard, pull request checks, and the Secure Registry. The article says StepSecurity detects active supply chain compromises within minutes using systems that uncovered the tj-actions and nx incidents. The new endpoint gives teams on-demand access to the exact affected packages and versions tied to an incident.\u003c/p\u003e\n\n\u003cp\u003eThe endpoint is \u003ccode\u003eGET /github/{owner}/threat-intel/incidents/{incidentId}/compromised-components\u003c/code\u003e and requires a GitHub organization, incident identifier, and valid StepSecurity API token. Its response can include ecosystem, component name, affected version, severity, verification status, description, timestamp, and threat intelligence identifiers. StepSecurity says teams can use this data to automate incident response, enrich SIEM workflows, and compare incidents against SBOMs or lockfiles.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  const [theme, setTheme] = React.useState(() => document.documentElement.dataset.theme || 'dark');
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  const applyTheme = (t) => {
    document.documentElement.dataset.theme = t;
    try { localStorage.setItem('downlink.theme', t); } catch(e){}
    setTheme(t);
  };
  return (
    <nav className="swipe-nav" style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span className="swipe-clock" style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <select value={theme} onChange={(e) => applyTheme(e.target.value)} title="Select theme" aria-label="Select theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
