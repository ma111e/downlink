03c/li\u003e\n\u003cli\u003eLocating the entry point in the symbol table.\u003c/li\u003e\n\u003cli\u003eRemoving and freeing allocated memory.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe BOF loader is compatible with Cobalt Strike beacons that rely on a small subset of DJB2-hashed imports. The article lists supported imports such as BeaconDataParse, BeaconDataInt, BeaconDataShort, BeaconDataLength, BeaconDataExtract, BeaconPrintf, and BeaconOutput.\u003c/p\u003e\n\n\u003cp\u003eA notable difference described by ThreatLabz is that the loader also includes 19 additional Beacon-prefixed cases that route calls to MLTBackdoor’s own indirect system call wrappers. These include wrappers for calls such as BeaconNtAllocateVirtualMemory, BeaconNtProtectVirtualMemory, BeaconNtFreeVirtualMemory, BeaconNtClose, BeaconNtCreateFile, BeaconNtOpenFile, BeaconNtReadFile, BeaconNtWriteFile, BeaconNtQueryInformationFile, BeaconNtSetInformationFile, BeaconNtQueryDirectoryFile, BeaconNtQuerySystemInformation, BeaconNtOpenProcessToken, BeaconNtQueryInformationToken, BeaconNtCreateKey, BeaconNtOpenKey, BeaconNtSetValueKey, BeaconNtDeleteValueKey, and BeaconNtDeleteKey.\u003c/p\u003e\n\n\u003ch2 id=\"network-communication\"\u003eNetwork communication\u003c/h2\u003e\n\n\u003cp\u003eMLTBackdoor uses a custom encrypted binary protocol over TLS on port 443. The fixed HTTP path is \u003ccode\u003e/api/v1/telemetry\u003c/code\u003e, and the User-Agent is \u003ccode\u003eMicrosoft-Delivery-Optimization/10.1\u003c/code\u003e, which the article says is used to masquerade as legitimate traffic.\u003c/p\u003e\n\n\u003cp\u003eThe malware performs an Elliptic-Curve Diffie-Hellman key exchange using NIST curve P-256. It generates a new key pair per session and performs ECDH with a P-256 public key shared by the C2 server. The resulting shared secret is concatenated with both the session public key and the C2 server public key, then hashed with SHA256 to derive a shared secret used as an AES-256-GCM session key.\u003c/p\u003e\n\n\u003cp\u003eAfter the key exchange, subsequent messages are encrypted with the AES session key and a random 12-byte nonce. The article describes the packet structure as containing a header, encrypted payload, and a 16-byte AES-GCM tag.\u003c/p\u003e\n\n\u003ch2 id=\"dga-and-command-and-control-resilience\"\u003eDGA and command-and-control resilience\u003c/h2\u003e\n\n\u003cp\u003eSome MLTBackdoor samples use hardcoded stack-built C2 domains together with a DGA. Other samples rely only on hardcoded domains or only on the DGA.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the DGA as a deterministic date-based algorithm that generates a new domain per day. ThreatLabz states that the DGA is designed to maintain control of infected systems if hardcoded C2 domains are unreachable.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz notes that the domain generated for April 29, 2026, hrs2y15sungu[.]com, was used not only for C2 communication but also for the distribution campaign described in the infection-chain section.\u003c/p\u003e\n\n\u003ch2 id=\"protocol-naming-and-message-types\"\u003eProtocol naming and message types\u003c/h2\u003e\n\n\u003cp\u003eThreatLabz named the malware MLTBackdoor based on the first four magic bytes of the network communication protocol’s header. The magic value is \u003ccode\u003e0x014D4C54\u003c/code\u003e, represented as \u003ccode\u003e\\x01MLT\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe packet header includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA 32-bit magic value.\u003c/li\u003e\n\u003cli\u003eA 32-bit session ID.\u003c/li\u003e\n\u003cli\u003eA 32-bit message type.\u003c/li\u003e\n\u003cli\u003eA 32-bit payload length.\u003c/li\u003e\n\u003cli\u003eA 12-byte nonce.\u003c/li\u003e\n\u003cli\u003eA 4-byte unknown field.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe session ID consists of four random bytes generated through BCryptGenRandom and is regenerated on each handshake.\u003c/p\u003e\n\n\u003cp\u003eThe article lists supported message types for C2 communication, including check-in messages, BOF tasks, sleep commands, process exit, command execution results, ECDH key exchange, file download and upload operations, directory listing, delete, rename, mkdir, and BOF stdout.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-and-detections\"\u003eIndicators and detections\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Zscaler’s multilayered cloud security platform detects indicators related to MLTBackdoor. The listed threat name is Win64.Backdoor.MLTBackdoor.\u003c/p\u003e\n\n\u003cp\u003eThreatLabz provides SHA256 indicators for several files, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA stage one loader.\u003c/li\u003e\n\u003cli\u003eAn archive containing the stage one loader and encrypted MLTBackdoor.\u003c/li\u003e\n\u003cli\u003eMLTBackdoor samples with domains and DGA.\u003c/li\u003e\n\u003cli\u003eMLTBackdoor samples using DGA only.\u003c/li\u003e\n\u003cli\u003eAn MLTBackdoor sample using domains only.\u003c/li\u003e\n\u003cli\u003eAn MLTBackdoor update sideload archive.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also lists domains associated with the campaign and C2 infrastructure:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ehrs2y15sungu[.]com, described as a DGA domain also used in the distribution campaign.\u003c/li\u003e\n\u003cli\u003ecarrolc[.]com, described as an MLTBackdoor C2.\u003c/li\u003e\n\u003cli\u003ecwrtwright[.]com, described as an MLTBackdoor C2.\u003c/li\u003e\n\u003cli\u003ethomphon[.]com, described as an MLTBackdoor C2.\u003c/li\u003e\n\u003cli\u003epowwowski[.]com/payloads/update.zip, described as an MLTBackdoor update URL.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion-from-the-article\"\u003eConclusion from the article\u003c/h2\u003e\n\n\u003cp\u003eThreatLabz concludes that MLTBackdoor is a relatively new but formidable post-exploitation malware framework. The article emphasizes its filesystem access capabilities, BOF loader extensibility, CFF and MBA obfuscation, anti-analysis behavior, custom encrypted binary network protocol, and DGA-based backup communications. It also states that these features complicate reverse engineering, evade sandbox and analysis environments, and hinder takedown attempts by researchers and law enforcement.\u003c/p\u003e\n","keyPoints":["Zscaler ThreatLabz identified a new malware family called MLTBackdoor in May 2026 that is likely leveraged by a ransomware-related threat actor.","MLTBackdoor was observed being delivered through a multi-stage ClickFix infection chain that downloads an archive containing endpointdlp.dll and an RC4-encrypted data.bin payload.","MLTBackdoor is heavily obfuscated with Mixed Boolean-Arithmetic and Control Flow Flattening techniques and also uses stack-built strings, API hashing, indirect system calls, and multiple anti-analysis checks.","MLTBackdoor supports filesystem commands such as download, upload, ls, delete, rename, and mkdir, and includes a Beacon Object File loader to dynamically add capabilities.","MLTBackdoor uses a custom encrypted binary protocol over TLS on port 443 and can rely on hardcoded C2 domains, a domain generation algorithm, or both for command-and-control communication."],"insights":["MLTBackdoor does not stop running when it detects analysis environments; instead, it aggregates 10 anti-analysis results into a bitmask and sends them during the initial C2 key exchange.","The DGA domain hrs2y15sungu[.]com was used both for C2 communication and for malware distribution on April 29, 2026, showing that the backup domain mechanism can also support the infection chain itself.","MLTBackdoor’s BOF loader extends beyond standard Cobalt Strike-style imports by exposing 19 Beacon-prefixed indirect system call wrappers, allowing loaded BOFs to use the malware’s own syscall evasion layer.","The malware’s network protocol can be identified by the magic value 0x014D4C54, or \\x01MLT, which appears in every client-side and server-side packet header.","MLTBackdoor’s stack-built strings are fragmented across flattened state-machine logic, making automated string recovery tools such as FLOSS unreliable according to the article."],"referencedReports":[],"body":"\u003cp\u003eZscaler ThreatLabz identified a new malware family in May 2026 that it tracks as MLTBackdoor. The malware is likely leveraged by a ransomware-related threat actor and was observed being delivered through a multi-stage ClickFix infection chain. ThreatLabz describes it as a post-exploitation backdoor that can establish a foothold for lateral movement.\u003c/p\u003e\n\n\u003cp\u003eMLTBackdoor includes built-in filesystem commands such as downloading, uploading, listing, deleting, renaming, and creating files or folders. Its most significant extensibility feature is a Beacon Object File loader, which allows the malware to dynamically add new capabilities. The loader is compatible with a subset of Cobalt Strike-style Beacon imports and also routes additional Beacon-prefixed imports to MLTBackdoor’s own indirect system call wrappers.\u003c/p\u003e\n\n\u003cp\u003eThe malware is heavily obfuscated using Mixed Boolean-Arithmetic and Control Flow Flattening, and it uses stack-built strings, API hashing, and indirect system calls to complicate analysis and evade user-mode hooks. It also performs multiple anti-analysis checks and sends the results as a bitmask during its initial communication. Its command-and-control traffic uses a custom encrypted binary protocol over TLS on port 443, with ECDH key exchange, AES-256-GCM encryption, hardcoded domains, and in some samples a date-based DGA for resilience.\u003c/p\u003e\n"},{"n":5,"title":"Windows 11 KB5094126 \u0026 KB5093998 cumulative updates released","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/windows-11-kb5094126-and-kb5093998-cumulative-updates-released/","time":"17:32","priority":"SHOULD READ","score":82,"tldr":"Microsoft released mandatory Windows 11 cumulative updates KB5094126 and KB5093998 for versions 25H2/24H2 and 23H2, delivering June 2026 Patch Tuesday security fixes along with performance, Windows Hello, taskbar, USB, and accessibility improvements. Microsoft says it is not aware of any new known issues with these updates.","briefOverview":"\u003cp\u003eMicrosoft released the Windows 11 KB5094126 and KB5093998 cumulative updates for versions 25H2/24H2 and 23H2. The updates are mandatory because they include June 2026 Patch Tuesday security fixes for vulnerabilities discovered in previous months. Users can install them through Windows Update or manually from the Microsoft Update Catalog.\u003c/p\u003e\n\n\u003cp\u003eAfter installation, Windows 11 25H2 moves to build 26200.8457, Windows 11 24H2 moves to build 26100.8457, and Windows 11 23H2 moves to build 22631.7079. The release includes performance improvements, broader Xbox mode availability, taskbar fixes, and Windows Hello reliability improvements. Microsoft says it is not aware of any new issues with this month\u0026rsquo;s Patch Tuesday update.\u003c/p\u003e\n\n\u003cp\u003eThe update also adds or improves features such as Shared Audio, Magnifier support, Task Manager NPU visibility, camera policy controls, and custom user folder naming during Windows setup. Additional fixes affect Windows Search, storage settings, USB reliability, sensors, HID and input behavior, fonts, Task Scheduler, desktop shortcuts, Microsoft Store downloads, and reliability across sign-in, lock screen, File Explorer, touch gestures, and Settings.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft released Windows 11 KB5094126 and KB5093998 cumulative updates for Windows 11 versions 25H2/24H2 and 23H2. The article describes the updates as mandatory because they contain June 2026 Patch Tuesday security patches for vulnerabilities discovered in previous months. Users can install the updates by going to Start, Settings, Windows Update, and selecting Check for Updates, or by downloading them from the Microsoft Update Catalog.\u003c/p\u003e\n\n\u003cp\u003eThe release is the sixth Patch Tuesday update of 2026 and is based on Windows 11 24H2, meaning Windows 11 25H2 receives the same update. The article states there are no exclusive or special changes for 25H2 compared with 24H2. After installation, Windows 11 25H2 changes to build 26200.8457, Windows 11 24H2 changes to build 26100.8457, and Windows 11 23H2 changes to build 22631.7079.\u003c/p\u003e\n\n\u003cp\u003eThe update includes performance improvements and expands Xbox mode to more PCs. Xbox mode is described as providing an Xbox console-like experience on a PC. Microsoft also patched taskbar issues and improved Windows Hello reliability.\u003c/p\u003e\n\n\u003cp\u003eSeveral new or improved features are included in the update. Shared Audio lets two people listen to the same audio from one Windows 11 PC using Bluetooth LE Audio broadcast technology, while Magnifier gains clearer screen reader announcements, support for permitted protected content, and smoother lens mode movement. Task Manager adds optional NPU-related columns and AppContainer isolation visibility, and camera settings can now be managed by enterprise administrators through Group Policy.\u003c/p\u003e\n\n\u003cp\u003eThe update also includes broad reliability and usability changes across Windows components. These include faster app launch and core shell experiences, improved personalization behavior, Windows Search support for finding and prioritizing files with as few as two characters, USB4 dock and hub display reliability improvements, input and touch keyboard reliability fixes, Times New Roman rendering improvements for Greek and Cyrillic diacritical marks, and Microsoft Store download improvements. Microsoft says it is not aware of any new issues with this month’s Patch Tuesday release.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft released Windows 11 KB5094126 and KB5093998 cumulative updates for Windows 11 versions 25H2/24H2 and 23H2. The updates are mandatory because they include the June 2026 Patch Tuesday security patches for vulnerabilities discovered in previous months.\u003c/p\u003e\n\n\u003cp\u003eUsers can install the updates through Windows Update by going to Start, Settings, Windows Update, and selecting Check for Updates. The updates can also be manually downloaded and installed from the Microsoft Update Catalog.\u003c/p\u003e\n\n\u003ch2 id=\"release-context-and-affected-versions\"\u003eRelease context and affected versions\u003c/h2\u003e\n\n\u003cp\u003eThis release is described as the sixth Patch Tuesday release in 2026. It is based on Windows 11 24H2, which means Windows 11 25H2 receives the same update.\u003c/p\u003e\n\n\u003cp\u003eThe article states that there are no exclusive or special changes for Windows 11 25H2 in this release. Users on Windows 11 25H2 and 24H2 receive the same fixes across the two versions.\u003c/p\u003e\n\n\u003cp\u003eAfter installation, the build numbers change as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows 11 25H2 with KB5094126 changes to build 26200.8457.\u003c/li\u003e\n\u003cli\u003eWindows 11 24H2 with KB5094126 changes to build 26100.8457.\u003c/li\u003e\n\u003cli\u003eWindows 11 23H2 with KB5093998 changes to build 22631.7079.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"security-significance\"\u003eSecurity significance\u003c/h2\u003e\n\n\u003cp\u003eThe most important security aspect of the release is that the updates contain June 2026 Patch Tuesday security patches. The article says these patches address several vulnerabilities discovered in previous months.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify specific CVEs, threat actors, exploitation activity, or affected attack campaigns. It frames the release as a routine but mandatory cumulative security update for supported Windows 11 versions.\u003c/p\u003e\n\n\u003ch2 id=\"major-feature-additions-and-improvements\"\u003eMajor feature additions and improvements\u003c/h2\u003e\n\n\u003ch3 id=\"shared-audio\"\u003eShared Audio\u003c/h3\u003e\n\n\u003cp\u003eThe update introduces Shared Audio, which lets two people listen to the same audio from a single Windows 11 PC at the same time. The feature uses Bluetooth LE Audio broadcast technology.\u003c/p\u003e\n\n\u003cp\u003eUsers can start sharing audio from Quick settings on the taskbar by selecting Shared Audio, choosing two supported, paired, and connected devices, and selecting Start sharing.\u003c/p\u003e\n\n\u003ch3 id=\"magnifier\"\u003eMagnifier\u003c/h3\u003e\n\n\u003cp\u003eMagnifier receives several improvements. It now provides clearer and more consistent announcements when used with a screen reader.\u003c/p\u003e\n\n\u003cp\u003eThe update adds helpful announcements when users zoom in or out, switch views, turn color inversion on or off, or turn Magnifier on or off. Magnifier also now supports magnification of permitted protected content and has improved smoothness when moving in lens mode.\u003c/p\u003e\n\n\u003ch3 id=\"task-manager\"\u003eTask Manager\u003c/h3\u003e\n\n\u003cp\u003eTask Manager now provides improved visibility into NPU usage on PCs with an NPU. New optional NPU and NPU Engine columns are available on the Processes, Users, and Details pages.\u003c/p\u003e\n\n\u003cp\u003eThe Details page also gains optional NPU Dedicated Memory and NPU Shared Memory columns. Neural engines that are part of a GPU now appear on the Performance page, providing a more complete view of AI-related activity.\u003c/p\u003e\n\n\u003cp\u003eTask Manager also adds an optional Isolation column on the Processes and Details pages to show which apps are running in an AppContainer. In addition, the update improves CPU speed display on the Performance page for virtual machines so it does not show higher-than-expected numbers after resuming from hibernate.\u003c/p\u003e\n\n\u003ch3 id=\"camera-controls\"\u003eCamera controls\u003c/h3\u003e\n\n\u003cp\u003eWindows 11’s Multi-App Camera feature allows multiple applications to access a camera stream at the same time. Basic Camera mode provides simplified camera functionality for troubleshooting or stability when a camera is not working correctly.\u003c/p\u003e\n\n\u003cp\u003eEnterprise administrators can now configure Multi-App Camera mode or Basic Camera mode through Group Policy. The setting is located under Computer Configuration, Administrative Templates, Windows Components, Camera, Configure Camera Options.\u003c/p\u003e\n\n\u003ch3 id=\"windows-setup\"\u003eWindows Setup\u003c/h3\u003e\n\n\u003cp\u003eDuring Windows setup, users can now choose a custom name for the user folder on the Device Name page. If this step is skipped, Windows uses the default folder name and continues setup as usual.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that user folder names must follow standard Windows naming requirements.\u003c/p\u003e\n\n\u003ch2 id=\"performance-reliability-and-usability-changes\"\u003ePerformance, reliability, and usability changes\u003c/h2\u003e\n\n\u003cp\u003eThe update accelerates app launch and core shell experiences, including Start menu, Search, and Action Center. It also improves performance and reliability across several Windows components.\u003c/p\u003e\n\n\u003cp\u003ePersonalization improvements include more accurate accent color selection when automatic accent color matching is enabled and better wallpaper persistence across restarts and upgrades. The article specifically notes improved support for large-resolution wallpapers and scenarios that previously could lead to solid color wallpaper fallback.\u003c/p\u003e\n\n\u003cp\u003eWindows Hello receives multiple updates. The Windows Biometric service is optimized to improve performance when a device resumes from Modern Standby. The update also reduces unexpected authentication blocks in Windows Hello Enhanced Sign-in Security by resolving missing secure enrollment metadata.\u003c/p\u003e\n\n\u003cp\u003eWindows Hello sign-in behavior is also changed on the lock screen and sign-in screen. When Windows Hello face or fingerprint is set up and available, it becomes the default sign-in method every time, even if another method was used previously. If a user needs to use a Windows PIN and uses it three times in a row, Windows stays with PIN until the user switches to another sign-in method.\u003c/p\u003e\n\n\u003ch2 id=\"search-storage-usb-and-device-related-updates\"\u003eSearch, storage, USB, and device-related updates\u003c/h2\u003e\n\n\u003cp\u003eWindows Search can now find and prioritize files with as few as two characters. Storage changes include support for specifying Dev Drive size in gigabytes instead of only megabytes, including when resizing volumes in Settings, System, Storage.\u003c/p\u003e\n\n\u003cp\u003eThe Storage page also changes when User Account Control appears. Users now see a UAC prompt only when choosing to view temporary files, rather than immediately when opening the Storage page.\u003c/p\u003e\n\n\u003cp\u003eUSB reliability improvements include more consistent behavior for displays attached to USB4 docks and hubs, especially when coming out of standby. The USB3 stack is also updated with additional resiliency and recovery measures against certain unexpected hardware faults and conditions.\u003c/p\u003e\n\n\u003cp\u003eThe update improves sensor resiliency against apps that could keep the sensor hub powered on and drain battery life. It also improves battery life related to the HID and Input stack for failed HID devices and improves power hygiene against applications that might initiate HID transfers during standby.\u003c/p\u003e\n\n\u003ch2 id=\"input-fonts-scheduling-and-microsoft-store\"\u003eInput, fonts, scheduling, and Microsoft Store\u003c/h2\u003e\n\n\u003cp\u003eInput-related changes improve the reliability of the touch keyboard on the sign-in screen, including when entering or changing a password. The update also improves explorer.exe reliability when closing the input switcher and improves performance when opening or navigating to clipboard history.\u003c/p\u003e\n\n\u003cp\u003eThe Times New Roman font family is updated to improve rendering of combining diacritical marks across Greek and Cyrillic scripts. The article says this addresses mark positioning issues and improves readability and visual consistency.\u003c/p\u003e\n\n\u003cp\u003eTask Scheduler now saves column width adjustments in task list view across sessions. Desktop app shortcut loading reliability is also improved.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft Store changes include underlying improvements to download performance and bandwidth usage. The update also improves error reporting when downloads fail because Windows Update group policy settings are enabled.\u003c/p\u003e\n\n\u003ch2 id=\"known-issues-and-microsoft-s-stated-direction\"\u003eKnown issues and Microsoft’s stated direction\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft says it is not aware of any new issues with this month’s Patch Tuesday release. The article notes that the release is not as massive as previous patch releases.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that Microsoft has confirmed it is working on a larger Windows 11 2026 quality update. That update is described as restoring the movable taskbar and significantly improving performance of modern interfaces, including the right-click menu.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft is also described as having plans to limit Copilot integration in Windows 11, reduce ads, and make the out-of-the-box experience faster with skippable Windows Updates.\u003c/p\u003e\n","keyPoints":["Microsoft released mandatory Windows 11 KB5094126 and KB5093998 cumulative updates for versions 25H2/24H2 and 23H2 to fix security vulnerabilities, bugs, and add new features.","After installing the updates, Windows 11 25H2 changes to build 26200.8457, Windows 11 24H2 changes to build 26100.8457, and Windows 11 23H2 changes to build 22631.7079.","The updates add or improve features including Shared Audio, Magnifier announcements and protected content support, Task Manager NPU usage visibility, Multi-App Camera policy controls, and custom user folder naming during Windows setup.","The updates include performance and reliability improvements for app launch, Start menu, Search, Action Center, Windows Hello, Windows Search, storage settings, USB devices, input, desktop shortcuts, Microsoft Store downloads, and sign-in and lock screens.","Microsoft said it is not aware of any new issues with this month's Patch Tuesday release."],"insights":["Windows 11 25H2 receives the same Patch Tuesday update as 24H2, with no exclusive or special changes between the two versions in this release.","Enterprise administrators can now configure Multi-App Camera mode or Basic Camera mode through Group Policy under Windows Components \u003e Camera \u003e Configure Camera Options.","Microsoft says there are no known issues for this month's Patch Tuesday release, and the article notes that the update is not a massive release compared to previous patch releases.","Windows Search was changed to find and prioritize files with as few as two characters, which may make short filename searches more useful after installation."],"referencedReports":[{"title":"KB5094126","url":"http://support.microsoft.com/en-us/help/5094126","publisher":"Microsoft","context":"The article links Microsoft’s KB5094126 support page as the source for the Windows 11 25H2 and 24H2 June 2026 cumulative update details.","category":"","primary":false},{"title":"KB5093998","url":"https://support.microsoft.com/help/5093998","publisher":"Microsoft","context":"The article links Microsoft’s KB5093998 support page as the source for the Windows 11 23H2 June 2026 cumulative update details.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft released the Windows 11 KB5094126 and KB5093998 cumulative updates for versions 25H2/24H2 and 23H2. The updates are mandatory because they include June 2026 Patch Tuesday security fixes for vulnerabilities discovered in previous months. Users can install them through Windows Update or manually from the Microsoft Update Catalog.\u003c/p\u003e\n\n\u003cp\u003eAfter installation, Windows 11 25H2 moves to build 26200.8457, Windows 11 24H2 moves to build 26100.8457, and Windows 11 23H2 moves to build 22631.7079. The release includes performance improvements, broader Xbox mode availability, taskbar fixes, and Windows Hello reliability improvements. Microsoft says it is not aware of any new issues with this month\u0026rsquo;s Patch Tuesday update.\u003c/p\u003e\n\n\u003cp\u003eThe update also adds or improves features such as Shared Audio, Magnifier support, Task Manager NPU visibility, camera policy controls, and custom user folder naming during Windows setup. Additional fixes affect Windows Search, storage settings, USB reliability, sensors, HID and input behavior, fonts, Task Scheduler, desktop shortcuts, Microsoft Store downloads, and reliability across sign-in, lock screen, File Explorer, touch gestures, and Settings.\u003c/p\u003e\n"},{"n":4,"title":"XBOW tests Anthropic's Mythos Preview for offensive security","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/xbow-tests-anthropics-mythos-preview-for-offensive-security/","time":"16:16","priority":"MAY READ","score":64,"tldr":"XBOW’s sponsored testing found Anthropic’s Mythos Preview to be a major advance for finding vulnerability leads, especially through source-code analysis, native-code review, and reverse engineering. However, the model still needs strong tooling, live-site validation, and careful orchestration to prove exploitability, and its high cost may make other models more practical in some workflows.","briefOverview":"\u003cp\u003eXBOW received early access to Anthropic’s Mythos Preview and tested it across internal benchmarks, workflows, interactive use, and integrations. The company evaluated the model both inside Claude Code and as a raw model through its API as an engine for XBOW agents. XBOW concluded that Mythos Preview is a major advance for generating vulnerability leads, especially when source code is available.\u003c/p\u003e\n\n\u003cp\u003eThe strongest results were in source-code security analysis, where XBOW said the model communicated with unusual technical precision and reasoned well about code. In XBOW’s web exploit benchmark, Mythos Preview reduced false negatives compared with Opus 4.6, with a larger improvement when both models had source-code access. XBOW also reported strong performance in native-code vulnerability discovery, reverse engineering, and browser-interaction workflows.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Mythos Preview is not self-sufficient for practical offensive security work. XBOW found that live-site validation remained critical, and that removing live-site access hurt performance more than removing source-code access even on benchmarks where vulnerabilities could be found from code alone. XBOW also highlighted mixed judgment results and said the model’s high expected cost means cheaper models may be preferable in some use cases.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eXBOW published results from early capability testing of Anthropic’s Mythos Preview, a model it says represents a significant shift in offensive-security capability. Anthropic invited XBOW to assess the model about three months before publication, and XBOW assembled a team of 10 experts from different parts of the company. The testing covered internal benchmarks, workflows, interactive use, and integrations.\u003c/p\u003e\n\n\u003cp\u003eXBOW evaluated Mythos Preview in two contexts: inside Claude Code and as a raw model via API powering XBOW’s agents. Its benchmark system uses open-source applications frozen at versions where vulnerabilities were previously discovered, then runs agents against them. For this evaluation, XBOW also examined judgment in threat modeling, vulnerability validation, and safety, as well as the model’s performance in source-code reading, live-system interaction, native-code analysis, and reverse engineering.\u003c/p\u003e\n\n\u003cp\u003eXBOW found that Mythos Preview was especially strong at source-code audits and vulnerability discovery. Compared with Opus 4.6 on XBOW’s web exploit benchmark, the number of false negatives was cut by 42%, and by 55% in a variation where both models received source code. XBOW said Mythos Preview was impressive at writing code but even more impressive at reading it.\u003c/p\u003e\n\n\u003cp\u003eThe article states that live-site validation remained the hard part. XBOW reported that even on benchmarks where the vulnerability was purely in the code, removing live-site access hurt performance more than removing access to source code. The article describes the strongest workflow as analyzing source code to find a lead, probing the live site to understand deployment behavior, and then crafting an exploit.\u003c/p\u003e\n\n\u003cp\u003eOther findings were more mixed. Mythos Preview showed substantial strength in native-code vulnerability discovery, Chromium-related testing, V8 sandbox work, reverse engineering, and browser visual-acuity workflows. However, XBOW said its judgment could be literal and conservative, and it scored 77.8% on XBOW’s command-safety benchmark compared with 81.2% for Opus 4.6 and 90.1% for Haiku 4.5.\u003c/p\u003e\n\n\u003cp\u003eXBOW also emphasized cost as a limiting factor. The article says Anthropic mentioned Mythos Preview would be five times as expensive as an Opus model, and XBOW found it was not best-in-class when normalized by estimated running cost. XBOW concluded that Mythos Preview should be used as one tool among multiple models, with the best choice depending on the task and cost-accuracy tradeoff.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eXBOW published a sponsored article describing its early testing of Anthropic’s Mythos Preview for offensive-security workflows. XBOW says Anthropic invited it about three months earlier to assess a new model that Anthropic believed represented a significant capability shift. XBOW tested the model through benchmarks, workflows, interactive use, and integrations.\u003c/p\u003e\n\n\u003cp\u003eXBOW’s overall conclusion is that Mythos Preview is a major advance in vulnerability discovery, particularly when source code is available. The article says the model is substantially better than prior models at finding vulnerability candidates, communicates with unusual technical precision, reasons well about code, and shows strong promise in native-code analysis and reverse engineering.\u003c/p\u003e\n\n\u003cp\u003eAt the same time, XBOW stresses that Mythos Preview is not a complete offensive-security system by itself. The article describes the model as “a brain without a body,” arguing that live-site pentesting needs tooling, orchestration, controlled interaction, and validation infrastructure in addition to model reasoning.\u003c/p\u003e\n\n\u003ch2 id=\"testing-methodology\"\u003eTesting methodology\u003c/h2\u003e\n\n\u003cp\u003eXBOW assembled a team of 10 experts from different areas of the company to assess Mythos Preview from multiple angles. The company used the same internal benchmarking system it previously used to analyze Opus 4.7 and GPT 5.5. In that system, XBOW takes open-source applications where vulnerabilities were previously discovered, freezes them at vulnerable versions, and runs agents against them.\u003c/p\u003e\n\n\u003cp\u003eFor Mythos Preview, XBOW expanded the evaluation beyond standard benchmarks. The additional areas included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe model’s judgment in threat modeling, vulnerability validation, and safety.\u003c/li\u003e\n\u003cli\u003eThe model’s ability to read source code versus interact with live systems.\u003c/li\u003e\n\u003cli\u003eThe model’s ability to find exploit classes not yet covered by XBOW’s standard assessments, including native application vulnerabilities.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eXBOW evaluated Mythos Preview both inside Claude Code and as a raw model accessed through its API as an engine for XBOW agents. The article separates these contexts because orchestration, tools, prompting, and live-site access materially affect results.\u003c/p\u003e\n\n\u003ch2 id=\"main-results\"\u003eMain results\u003c/h2\u003e\n\n\u003cp\u003eXBOW says testers were impressed with Mythos Preview in interactive use, including one tester who said it was closer to “just go and find something” than anything they had seen so far. When XBOW gave the model its own source code, the model found weaknesses that XBOW said were not “truly terrible” but included several issues the company wanted to repair. XBOW also tried Mythos Preview on open-source software and said that by the end of the first week, it had found several new vulnerabilities that had to be disclosed.\u003c/p\u003e\n\n\u003cp\u003eThe benchmark results reinforced XBOW’s view that the model is especially strong in source-code analysis. The article identifies four main takeaways:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMythos Preview is extremely powerful for source-code audits.\u003c/li\u003e\n\u003cli\u003eIt is good, but less powerful, at validating exploits.\u003c/li\u003e\n\u003cli\u003eIts judgment is mixed.\u003c/li\u003e\n\u003cli\u003eIt is strong in native-code vulnerability discovery and reverse engineering.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eXBOW says Mythos Preview produced a significant step up over existing models on its web exploit benchmark. A benchmark case is counted as passed only when the system finds a validated way to act on the vulnerability after up to 80 actions, where an action can be a shell command, a Python script using standard commands, or XBOW’s attack tools.\u003c/p\u003e\n\n\u003ch2 id=\"benchmark-comparisons\"\u003eBenchmark comparisons\u003c/h2\u003e\n\n\u003cp\u003eCompared with Opus 4.6, Mythos Preview reduced false negatives by 42% on XBOW’s web exploit benchmark. In a variation where both models received the site’s source code, false negatives were cut by 55%. XBOW characterizes this as evidence that Mythos Preview’s advantage grows when source code is available.\u003c/p\u003e\n\n\u003cp\u003eThe article also compares Mythos Preview, Opus 4.6, and GPT 5.5 by pass rates as a function of allowed actions. XBOW says Mythos Preview finds vulnerabilities in significantly fewer iterations than Opus 4.6, while the difference compared with GPT 5.5 is less pronounced.\u003c/p\u003e\n\n\u003cp\u003eXBOW then considers output-token budget and odds of discovery rather than only action budget and mean pass rate. Under those measures, XBOW says Mythos Preview “hones in on the vulnerability” with unprecedented precision on a token-for-token basis.\u003c/p\u003e\n\n\u003ch2 id=\"live-site-validation\"\u003eLive-site validation\u003c/h2\u003e\n\n\u003cp\u003eA central theme of the article is that finding a candidate vulnerability is not the same as proving exploitability. XBOW argues that many exploitable issues do not appear as obvious source-code defects. They may emerge from configuration, dependencies, deployment choices, or combinations of otherwise safe components.\u003c/p\u003e\n\n\u003cp\u003eXBOW says its work differs from source-code auditing because it performs pentests against live sites as an attacker sees them. The article contrasts this with uses such as Anthropic’s Project Glasswing, which it says excels at auditing source code from a developer’s view.\u003c/p\u003e\n\n\u003cp\u003eThe article reports that even in XBOW benchmarks where the vulnerability can be found from code alone, removing live-site access hurt performance more than removing source-code access. XBOW interprets this as evidence that live-site access can matter more than source-code access for proving which findings are actually exploitable. The best results came when Mythos Preview had both live-site and source-code access.\u003c/p\u003e\n\n\u003cp\u003eXBOW describes the ideal detection pattern when it orchestrates Mythos Preview as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAnalyze source code to find a lead.\u003c/li\u003e\n\u003cli\u003eProbe the live site to understand how the weakness appears in the deployed environment.\u003c/li\u003e\n\u003cli\u003eCraft an exploit from that combined understanding.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"judgment-and-safety-findings\"\u003eJudgment and safety findings\u003c/h2\u003e\n\n\u003cp\u003eXBOW says Mythos Preview’s judgment results were more mixed than its discovery results. Across command safety, threat modeling, and trace triage, the model was often careful and precise, but also literal and conservative. The article says it rejected false positives better than many predecessors, but sometimes lost true positives when evidence did not formally satisfy its criteria or when the intended rule was broader than the written rule.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights the command-safety benchmark as a surprising weakness. In that benchmark, models decide whether a script is safe to execute without affecting the target site. XBOW reports the following accuracies:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHaiku 4.5: 90.1%.\u003c/li\u003e\n\u003cli\u003eOpus 4.6: 81.2%.\u003c/li\u003e\n\u003cli\u003eMythos Preview: 77.8%.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eXBOW says that when it examined Mythos Preview’s reasoning, the model often had a defensible point, but it tended to prioritize the letter of the rules over their spirit. The article concludes that Mythos Preview needs precise prompts, explicit threat models, and validation infrastructure to turn strong reasoning into reliable security outcomes.\u003c/p\u003e\n\n\u003ch2 id=\"native-code-and-reverse-engineering-results\"\u003eNative-code and reverse-engineering results\u003c/h2\u003e\n\n\u003cp\u003eBeyond web applications, XBOW reports substantial strength in native-code vulnerability discovery and reverse engineering. In Chromium-related testing, Mythos Preview found more real bugs with fewer false positives than prior baselines. In V8 sandbox work, it identified true positives in a subtle threat model where previous approaches had produced many findings but no successful true positives.\u003c/p\u003e\n\n\u003cp\u003eXBOW also says the model could triage both its own results and findings generated by competitor models. In reverse-engineering work, XBOW describes the results as among the most striking. The model reasoned through unusual firmware and embedded-systems contexts, including architecture and operating-system combinations that required more than rote pattern matching.\u003c/p\u003e\n\n\u003ch2 id=\"browser-interaction-and-visual-acuity\"\u003eBrowser interaction and visual acuity\u003c/h2\u003e\n\n\u003cp\u003eXBOW says its workflows often require models to interact with live websites through a browser interface. For that, visual acuity matters because the model must identify the right UI element and click in the right place.\u003c/p\u003e\n\n\u003cp\u003eThe evaluated model performed extremely well on XBOW’s visual-acuity QA, roughly matching Sonnet 4.6 and dramatically outperforming Opus 4.6. XBOW says it was not perfectly pixel-accurate when asked for exact coordinates, but it was practically effective at selecting the right browser actions.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that Opus 4.7 performed well on this benchmark. XBOW suggests the broader story may be that recent Anthropic models had begun to deteriorate in this specific area, and Anthropic has now reversed that deterioration.\u003c/p\u003e\n\n\u003ch2 id=\"cost-and-model-selection-tradeoffs\"\u003eCost and model-selection tradeoffs\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that Mythos Preview is powerful but expensive. XBOW says Anthropic mentioned Mythos Preview would be five times as expensive as an Opus model, which XBOW describes as already one of the more expensive options token for token.\u003c/p\u003e\n\n\u003cp\u003eXBOW asks whether using a different model for more time could yield more accuracy for less cost. Its answer is yes: when normalized by estimated running cost, Mythos Preview was not best-in-class on XBOW’s benchmarks, though XBOW says it was not terribly inefficient when high accuracy is desired.\u003c/p\u003e\n\n\u003cp\u003eThe article says this aligns with Point Estimate’s analysis of the AI Security Institute’s benchmarking of Mythos Preview versus GPT-5.5. XBOW frames the practical choice as paying for an agent to use Mythos Preview briefly, or using GPT-5.5 for as long as needed. The better option depends on the use case, and the article says it is often the latter.\u003c/p\u003e\n\n\u003ch2 id=\"xbow-s-conclusion\"\u003eXBOW’s conclusion\u003c/h2\u003e\n\n\u003cp\u003eXBOW concludes that frontier models have taken a major step forward in vulnerability discovery. Mythos Preview is especially strong at finding candidate vulnerabilities from source code and shows impressive ability across web, native-code, and reverse-engineering tasks.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article repeatedly states that Mythos Preview must be mounted in the right harness and equipped with the right tools to reach its full potential. XBOW says it should be one arrow in a broader quiver, not the only model used for security work. Depending on the task, it may be more sensible to let another model try several times than to let Mythos Preview try once.\u003c/p\u003e\n","keyPoints":["XBOW tested Anthropic’s Mythos Preview through benchmarks, workflows, interactive use, and integrations, including use inside Claude Code and as a raw model via API in XBOW’s agents.","XBOW found that Mythos Preview is substantially better than prior models at finding vulnerability candidates, especially when source code is available.","XBOW reported that live-site access remained crucial for validating exploitability, and removing live-site interaction hurt benchmark performance more than removing source-code access.","Mythos Preview showed strong results in native-code vulnerability discovery, reverse engineering, and browser-based visual-acuity workflows.","XBOW said Mythos Preview’s judgment was mixed and that its high estimated cost means other models may be more cost-effective for some use cases."],"insights":["Even on benchmarks where the vulnerability could be found from code alone, removing live-site access reduced Mythos Preview’s performance more than removing source-code access, showing that validation against real application behavior was more important than code access in those cases.","Mythos Preview’s command-safety accuracy was lower than both Haiku 4.5 and Opus 4.6 in XBOW’s benchmark, partly because it tended to follow the literal wording of safety rules rather than their intended spirit.","Mythos Preview reduced false negatives versus Opus 4.6 by 42% on XBOW’s web exploit benchmark, and by 55% when both models were given source code, indicating its advantage grew when source analysis was available.","XBOW found that Mythos Preview’s strongest results came from a combined workflow: analyze source code for leads, probe the live site to understand deployment behavior, and then craft an exploit.","Despite its stronger vulnerability-discovery performance, XBOW concluded Mythos Preview was not always the most cost-effective option because longer runs with cheaper models such as GPT-5.5 could produce better value in some cases."],"referencedReports":[{"title":"How good is Mythos?","url":"https://pointestimate.substack.com/p/how-good-is-mythos","publisher":"Point Estimate","context":"The article says XBOW’s cost-efficiency findings line up with Point Estimate’s analysis comparing Mythos Preview with GPT-5.5.","category":"","primary":false},{"title":"Our evaluation of OpenAI's GPT-5.5 cyber capabilities","url":"https://www.aisi.gov.uk/blog/our-evaluation-of-openais-gpt-5-5-cyber-capabilities","publisher":"AI Security Institute","context":"The article references the AI Security Institute’s benchmarking of Mythos Preview versus GPT-5.5 as a similar comparison to XBOW’s evaluation.","category":"","primary":false}],"body":"\u003cp\u003eXBOW received early access to Anthropic’s Mythos Preview and tested it across internal benchmarks, workflows, interactive use, and integrations. The company evaluated the model both inside Claude Code and as a raw model through its API as an engine for XBOW agents. XBOW concluded that Mythos Preview is a major advance for generating vulnerability leads, especially when source code is available.\u003c/p\u003e\n\n\u003cp\u003eThe strongest results were in source-code security analysis, where XBOW said the model communicated with unusual technical precision and reasoned well about code. In XBOW’s web exploit benchmark, Mythos Preview reduced false negatives compared with Opus 4.6, with a larger improvement when both models had source-code access. XBOW also reported strong performance in native-code vulnerability discovery, reverse engineering, and browser-interaction workflows.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Mythos Preview is not self-sufficient for practical offensive security work. XBOW found that live-site validation remained critical, and that removing live-site access hurt performance more than removing source-code access even on benchmarks where vulnerabilities could be found from code alone. XBOW also highlighted mixed judgment results and said the model’s high expected cost means cheaper models may be preferable in some use cases.\u003c/p\u003e\n"},{"n":3,"title":"Agentic Runtime Security: When Patching Can’t Keep Up.","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/agentic-runtime-security-when-patching-cant-keep-up","time":"15:16","priority":"MAY READ","score":60,"tldr":"AI-driven vulnerability discovery is outpacing organizations’ ability to patch, making the unpatched exposure window the new frontline for attackers. The article argues that defenders need runtime detection, behavioral monitoring, attack reconstruction, and containment across cloud, SaaS, identity, and AI to stop attacks before patches can catch up.","briefOverview":"\u003cp\u003eAnthropic’s Project Glasswing updates show that AI-assisted vulnerability discovery is now outpacing the ability of vendors and maintainers to verify, disclose, and patch flaws. The article says roughly 50 partners used Mythos Preview to find more than 10,000 high- or critical-severity vulnerabilities in important software. It argues that the core security bottleneck has shifted from finding vulnerabilities to closing them fast enough.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that only 75 of 530 disclosed high- or critical-severity bugs had been patched at the time of Anthropic’s initial update, while maintainers asked Anthropic to slow down. It also cites examples involving Cloudflare, Mozilla, Firefox, wolfSSL, Oracle E-Business Suite, TanStack, GitHub Actions, and an AI-assisted 2FA bypass. The main significance is that exploitation often reaches production before patching can, making the unpatched window a critical operational defense problem.\u003c/p\u003e\n\n\u003cp\u003eThe article’s proposed answer is Agentic Runtime Security, described as runtime detection and response across cloud, SaaS, identity, and AI. It emphasizes behavioral detection, attack reconstruction, and containment before indicators of compromise or patches are available. It also argues that posture tools such as SSPM and SaaS-bound ITDR are not sufficient for cross-platform attack paths that move through cloud infrastructure, SaaS, identity, and AI systems.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article frames Anthropic’s Project Glasswing updates as confirmation that AI has changed the economics of vulnerability management. It says Mythos Preview enabled roughly 50 partners to find more than 10,000 high- or critical-severity vulnerabilities in important software. The author argues that the limiting factor in security is no longer discovering flaws but verifying, disclosing, and patching them quickly enough.\u003c/p\u003e\n\n\u003cp\u003eAnthropic’s initial Glasswing update is cited for several examples and metrics. Cloudflare reportedly found 2,000 bugs in the first month, including 400 high or critical findings, while Mozilla found and fixed 271 vulnerabilities in Firefox 150 during testing. Anthropic’s scan of more than 1,000 open-source projects produced 6,202 high- or critical-severity findings at a 90.6% true-positive rate, and Mythos constructed a working certificate-forgery exploit in wolfSSL, tracked as CVE-2026-5194.\u003c/p\u003e\n\n\u003cp\u003eThe article says the remediation pipeline is already struggling under this volume. Of 530 high- or critical-severity bugs Anthropic disclosed, only 75 had been patched at the time of writing, and some maintainers asked Anthropic to slow down. It also says the average time to patch a confirmed critical vulnerability is about two weeks, while vendors such as Palo Alto Networks and Microsoft were seeing increased patch volume.\u003c/p\u003e\n\n\u003cp\u003eThe article places those Glasswing findings into a broader threat-landscape argument. It states that 48,185 CVEs were published in 2025, 90 zero-days were exploited in the wild, and the average critical-severity vulnerability remains open for around 165 days. It further states that in 2026 exploitation often begins about a week before a patch is released, with eCrime breakout times measured in minutes and the fastest observed under half a minute.\u003c/p\u003e\n\n\u003cp\u003eSeveral examples are used to show exploitation reaching production before patching can respond. Oracle E-Business Suite CVE-2025-61882 was described as exploited as a zero-day nearly two months before an emergency patch, followed by extortion against EBS customers. The TanStack and GitHub Actions incident in May 2026 involved three chained flaws and 84 malicious packages published in six minutes, while Google’s threat intelligence group attributed the first publicly confirmed in-the-wild zero-day developed with AI assistance to a 2FA bypass against a popular open-source admin tool.\u003c/p\u003e\n\n\u003cp\u003eThe article’s response is to advocate Agentic Runtime Security as a compensating control for the window patching cannot close. It describes this approach as behavioral detection, attack reconstruction, and containment across cloud, SaaS, identity, and AI. It contrasts that with posture-based tools such as SSPM and SaaS-bound ITDR, which it says are useful for misconfiguration and identity-risk visibility but insufficient for cloud-infrastructure runtime and cross-platform attack paths.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that Anthropic’s Project Glasswing updates validate a major shift in cybersecurity operations: AI can now find critical vulnerabilities faster than defenders can patch them. It presents this as a post-Mythos operating model in which the most important security gap is the time between vulnerability discovery and actual remediation. The author says this gap is no longer theoretical but an operational fact.\u003c/p\u003e\n\n\u003cp\u003eThe article builds on an earlier argument about Claude Mythos shrinking the remediation window. It says Mythos Preview showed that AI could compress the path from vulnerability discovery to working exploit. The new Glasswing updates are presented as confirmation that discovery has accelerated beyond the ability of existing remediation pipelines to keep up.\u003c/p\u003e\n\n\u003ch2 id=\"anthropic-s-project-glasswing-updates\"\u003eAnthropic’s Project Glasswing updates\u003c/h2\u003e\n\n\u003cp\u003eThe first Glasswing update, dated May 22, is described as showing that the security bottleneck has moved. According to the article, roughly 50 partners used Mythos Preview to find more than 10,000 high- or critical-severity vulnerabilities in systemically important software. Anthropic’s framing is quoted in substance: progress in software security used to be limited by finding vulnerabilities, but is now limited by verifying, disclosing, and patching them.\u003c/p\u003e\n\n\u003cp\u003eThe article cites several figures from Anthropic’s supporting data:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCloudflare found 2,000 bugs in the first month, including 400 high or critical bugs.\u003c/li\u003e\n\u003cli\u003eCloudflare’s team considered the false-positive rate better than human testers.\u003c/li\u003e\n\u003cli\u003eMozilla found and fixed 271 vulnerabilities in Firefox 150 while testing Mythos.\u003c/li\u003e\n\u003cli\u003eThat Mozilla result was described as more than ten times what it found in the previous version with an earlier Claude model.\u003c/li\u003e\n\u003cli\u003eAnthropic scanned more than 1,000 open-source projects and found 6,202 high- or critical-severity findings at a 90.6% true-positive rate.\u003c/li\u003e\n\u003cli\u003eMythos constructed a working certificate-forgery exploit in wolfSSL, tracked as CVE-2026-5194.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article highlights that only 75 of 530 high- or critical-severity bugs disclosed by Anthropic had been patched at the time of writing. It also says maintainers asked Anthropic to slow down. The average time to patch a confirmed critical vulnerability is given as about two weeks.\u003c/p\u003e\n\n\u003ch2 id=\"expansion-of-the-capability\"\u003eExpansion of the capability\u003c/h2\u003e\n\n\u003cp\u003eThe second Glasswing update, dated June 2, is presented as showing that the capability is spreading. Anthropic expanded Glasswing to roughly 150 new organizations across more than 15 countries. The article says these organizations span power, water, healthcare, communications, and hardware, including vendors whose code other organizations and governments depend on.\u003c/p\u003e\n\n\u003cp\u003eFor most of those partners, Anthropic estimated that a major attack could affect more than 100 million people. The article treats this as evidence that the issue is not limited to one vendor or one software ecosystem. It says the capability is moving toward broader industry availability.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes Anthropic’s timeline that within 6 to 12 months, many other AI companies may have Mythos-class models. It also notes Anthropic’s warning that some such models may be released without safeguards that prevent misuse. The article says Glasswing’s purpose is therefore not only to harden critical code but also to push industry operating norms to reflect this reality.\u003c/p\u003e\n\n\u003ch2 id=\"the-vulnerability-gap\"\u003eThe vulnerability gap\u003c/h2\u003e\n\n\u003cp\u003eThe article calls the space between identifying an exposure and closing it the “unfixable gap.” It says the Glasswing updates quantify both sides of that gap: vulnerability discovery is rising sharply, while patching capacity has not increased at the same rate. The author says the discovery curve has gone vertical while the patching curve has barely moved.\u003c/p\u003e\n\n\u003cp\u003eOn the discovery side, the article states that 48,185 CVEs were published in 2025. It says this was up roughly 20% year over year, following a 38% jump the year before, and equates to about 131 disclosed CVEs per day. It also states that 90 zero-day vulnerabilities were exploited in the wild, with the enterprise share at an all-time high.\u003c/p\u003e\n\n\u003cp\u003eOn the patching side, the article states that the average critical-severity vulnerability remains open for around 165 days. It says roughly a third of critical vulnerabilities remain unpatched after 180 days. It also says that in about 60% of breaches, a patch was already available when compromise occurred.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central operational claim is that patch availability does not mean patch deployment happens in time. It states that in 2026 exploitation often begins about a week before a patch is released. It also says eCrime breakout times are measured in minutes, with the fastest observed under half a minute, and that handoffs from initial-access broker to ransomware affiliate happen in seconds.\u003c/p\u003e\n\n\u003ch2 id=\"examples-cited-in-the-article\"\u003eExamples cited in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article cites several examples to support its claim that exploitation is reaching production before patching can respond.\u003c/p\u003e\n\n\u003ch3 id=\"oracle-e-business-suite\"\u003eOracle E-Business Suite\u003c/h3\u003e\n\n\u003cp\u003eOracle E-Business Suite CVE-2025-61882 is described as exploited as a zero-day from early August. The article says this occurred nearly two months before the emergency patch. It also says the exploitation was followed by an extortion campaign affecting EBS customers globally.\u003c/p\u003e\n\n\u003ch3 id=\"tanstack-and-github-actions\"\u003eTanStack and GitHub Actions\u003c/h3\u003e\n\n\u003cp\u003eThe TanStack and GitHub Actions incident in May 2026 is described as a chain of three flaws used in a novel pattern. The article says 84 malicious packages were published in six minutes. It also says an 18-minute window quickly moved to GitHub, OpenAI, Mistral, and Grafana.\u003c/p\u003e\n\n\u003cp\u003eThe article presents this as a case where patching was not an option during the active window. It calls the gap structural rather than simply a delayed remediation issue.\u003c/p\u003e\n\n\u003ch3 id=\"ai-assisted-zero-day-development\"\u003eAI-assisted zero-day development\u003c/h3\u003e\n\n\u003cp\u003eThe article says that in May 2026, Google’s threat intelligence group attributed the first publicly confirmed in-the-wild zero-day developed with AI assistance. The described issue was a 2FA bypass against a popular open-source admin tool. The article uses this to argue that the AI-driven discovery curve is now visible in production.\u003c/p\u003e\n\n\u003ch2 id=\"proposed-defense-model-agentic-runtime-security\"\u003eProposed defense model: Agentic Runtime Security\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that faster patching alone cannot close the vulnerability gap. It says runtime detection and response must carry the load when exploitation is structurally faster than remediation. It describes Agentic Runtime Security as a control that watches cloud, SaaS, identity, and AI at runtime.\u003c/p\u003e\n\n\u003cp\u003eThe article defines this approach as detecting and responding to active attacks through behavior and threat intelligence before indicators of compromise exist. It emphasizes containment before business impact. It positions Agentic Runtime Security as the control that covers the window patching cannot close in time.\u003c/p\u003e\n\n\u003cp\u003eThe article outlines three principles for this model:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBehavior should come first, with indicators of compromise added when they arrive.\u003c/li\u003e\n\u003cli\u003eKnown-but-unfixed exposure should be treated as a live detection surface.\u003c/li\u003e\n\u003cli\u003eOrganizations should defend from AI by defending with AI, especially for validation, prioritization, triage, attack reconstruction, and guided containment.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says indicators of compromise lag by definition because they describe attacks that have already happened elsewhere. It argues that detection should start with behavior such as anomalous workflow execution, unfamiliar token usage, and abnormal lateral movement. It says hunts based only on known indicators are always late by design.\u003c/p\u003e\n\n\u003ch2 id=\"cloud-saas-identity-and-ai-as-one-attack-surface\"\u003eCloud, SaaS, identity, and AI as one attack surface\u003c/h2\u003e\n\n\u003cp\u003eThe article says damaging attacks will not wait for posture teams to finish remediation. It describes attacks moving through compromised OAuth tokens, abused connected apps, social-engineered identities, third-party integrations, and API-driven data access. These movements are described as spanning cloud, SaaS, identity, and AI.\u003c/p\u003e\n\n\u003cp\u003eBecause of that cross-platform movement, the article says defenders need telemetry, correlation, investigation, and containment at machine speed. It connects this to Mitiga’s concept of Zero-Impact Breach Prevention. The article says the goal is to detect and contain attacks before business impact materializes.\u003c/p\u003e\n\n\u003ch2 id=\"limits-of-posture-management\"\u003eLimits of posture management\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that posture-based tools, including SaaS Security Posture Management and SaaS-bound ITDR, are useful but insufficient. It says these tools are good at finding misconfigurations, flagging compliance drift, and scoring identity risk. However, it says those capabilities do not solve the problem of exploitation beating patching.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies several structural limits:\u003c/p\u003e\n\n\u003ch3 id=\"scope\"\u003eScope\u003c/h3\u003e\n\n\u003cp\u003eIt says SSPM and SaaS-bound ITDR correlate within SaaS and identity but do not extend into cloud-infrastructure runtime. It specifically names the IaaS control plane, workloads, and cross-platform attack paths as outside the scope of that category. The article says an attacker chaining a compromised SaaS token into cloud control-plane abuse can move through that seam.\u003c/p\u003e\n\n\u003ch3 id=\"detection-model\"\u003eDetection model\u003c/h3\u003e\n\n\u003cp\u003eThe article says posture-centric tools rely on configuration scans and, at best, identity-bounded behavioral analytics. It contrasts that with Agentic Runtime Security, which it says starts from behavioral indicators of attack across cloud, SaaS, identity, and AI. The article says this can decode early-stage attacker activity before indicators of compromise exist.\u003c/p\u003e\n\n\u003ch3 id=\"compensating-control-framing\"\u003eCompensating control framing\u003c/h3\u003e\n\n\u003cp\u003eThe article says monitoring identity behavior when a configuration is not yet remediated can be useful. However, it argues that this is not the same as treating every unfixable gap as a watched detection surface. It says doing so requires telemetry depth sufficient to reconstruct and stop live attacks across environments.\u003c/p\u003e\n\n\u003ch3 id=\"forensic-depth\"\u003eForensic depth\u003c/h3\u003e\n\n\u003cp\u003eThe article argues that closing the gap after compromise requires incident-response-grade reconstruction. It says organizations need a forensic record across cloud, SaaS, identity, and AI that is deep enough to rebuild the full attack story in minutes. It contrasts this with fragmentary event search and short retention.\u003c/p\u003e\n\n\u003ch2 id=\"mitiga-s-positioning\"\u003eMitiga’s positioning\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Mitiga’s premise that cloud infrastructure, SaaS, identity, and AI should be part of one correlated forensic system rather than four siloed posture dashboards. It says Mitiga’s Zero-Impact platform, powered by Helios AIDR, is built around panoramic awareness across these four surfaces. It describes the platform as using behavioral detection, automated triage, attack-story prioritization, and containment.\u003c/p\u003e\n\n\u003cp\u003eThe article says containment can include revoking sessions, quarantining identities, and blocking API calls mid-flight. It frames this as the difference between knowing a window is open and seeing the attacker when they climb through it. The article includes links to Mitiga Helios AIDR and a demo request at the end.\u003c/p\u003e\n\n\u003ch2 id=\"guidance-for-security-leaders\"\u003eGuidance for security leaders\u003c/h2\u003e\n\n\u003cp\u003eThe article says security leaders should assume that some known exposure in their environment will remain open longer than desired. It urges them to ask whether they would see an attacker in time to stop impact if that exposure were used the next day. If the answer is uncertain, the article says the issue has become a runtime defense problem rather than only a remediation problem.\u003c/p\u003e\n\n\u003cp\u003eThe concluding message is that posture can show where open windows are, but runtime detection and response is what stands watch when an attacker uses one. In the article’s framing, compensating controls are no longer secondary in a post-Mythos era. It ends by saying the gap itself is now the strategy.\u003c/p\u003e\n","keyPoints":["Anthropic reported that roughly 50 Project Glasswing partners used Mythos Preview to find more than 10,000 high- or critical-severity vulnerabilities in systemically important software.","Anthropic said the software security bottleneck has shifted from finding vulnerabilities to verifying, disclosing, and patching them, with only 75 of 530 disclosed high- or critical-severity bugs patched at the time of writing.","The article states that in 2026 exploitation often begins about a week before a patch is released, while eCrime breakout times can be measured in minutes or even under half a minute.","The article argues that faster patching alone cannot close the exposure gap and that runtime detection and response must detect behavior, reconstruct attack paths, and contain impact across cloud, SaaS, identity, and AI.","The article says posture-based tools such as SSPM and SaaS-bound ITDR are insufficient because they do not cover cloud-infrastructure runtime or correlate cross-platform attack paths across cloud, SaaS, identity, and AI."],"insights":["Maintainers asked Anthropic to slow down vulnerability disclosures, showing that AI-assisted discovery can overwhelm not only patch engineering but also verification and coordinated disclosure workflows.","Anthropic’s wolfSSL example demonstrates that AI-assisted systems are already capable of producing working exploits against widely deployed cryptographic software, not merely identifying theoretical bugs.","The article reframes known-but-unfixed exposures as active detection surfaces that should be monitored continuously rather than left as lower-priority posture backlog items.","The cited TanStack/GitHub Actions incident illustrates that some AI-speed attack paths can be structural and supply-chain driven, leaving defenders with no immediate patching option during the active exploitation window.","The article argues that effective compensating controls require IR-grade forensic depth across cloud, SaaS, identity, and AI, because fragmented event search cannot reconstruct cross-platform attacks quickly enough."],"referencedReports":[{"title":"Glasswing Initial Update","url":"https://www.anthropic.com/research/glasswing-initial-update","publisher":"Anthropic","context":"The article cites Anthropic’s Project Glasswing initial update as the source for vulnerability-discovery figures, patching rates, and examples such as Cloudflare, Mozilla, and wolfSSL findings.","category":"","primary":false}],"body":"\u003cp\u003eAnthropic’s Project Glasswing updates show that AI-assisted vulnerability discovery is now outpacing the ability of vendors and maintainers to verify, disclose, and patch flaws. The article says roughly 50 partners used Mythos Preview to find more than 10,000 high- or critical-severity vulnerabilities in important software. It argues that the core security bottleneck has shifted from finding vulnerabilities to closing them fast enough.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that only 75 of 530 disclosed high- or critical-severity bugs had been patched at the time of Anthropic’s initial update, while maintainers asked Anthropic to slow down. It also cites examples involving Cloudflare, Mozilla, Firefox, wolfSSL, Oracle E-Business Suite, TanStack, GitHub Actions, and an AI-assisted 2FA bypass. The main significance is that exploitation often reaches production before patching can, making the unpatched window a critical operational defense problem.\u003c/p\u003e\n\n\u003cp\u003eThe article’s proposed answer is Agentic Runtime Security, described as runtime detection and response across cloud, SaaS, identity, and AI. It emphasizes behavioral detection, attack reconstruction, and containment before indicators of compromise or patches are available. It also argues that posture tools such as SSPM and SaaS-bound ITDR are not sufficient for cross-platform attack paths that move through cloud infrastructure, SaaS, identity, and AI systems.\u003c/p\u003e\n"},{"n":11,"title":"User-to-User Authentication: Down the Rabbit Hole – Part 1","source":"specterops.io","sourceColorIdx":1,"link":"https://specterops.io/blog/2026/06/09/user-to-user-authentication-down-the-rabbit-hole-part-1/","time":"16:00","priority":"MAY READ","score":58,"tldr":"The article explains how Kerberos user-to-user authentication works in Windows, especially how RDP with NLA uses U2U to issue service tickets encrypted with a TGT session key instead of a service account key. The key takeaway is that the same U2U mechanics also enable UnPAC-the-Hash after PKINIT, allowing an attacker with a valid certificate/private key to recover a user’s NT hash from the PAC.","briefOverview":"\u003cp\u003eThis article is a technical deep dive into Kerberos user-to-user authentication in Windows and how it differs from traditional Kerberos service ticket issuance. In standard Kerberos, service tickets are encrypted with a service account’s long-term key, while U2U encrypts the service ticket using the session key from the target user or service’s TGT. The article focuses on Windows internals and explains why U2U became prominent after ADCS, UnPAC-the-Hash, and Shadow Credentials attacks.\u003c/p\u003e\n\n\u003cp\u003eThe author explains that U2U was designed for peer-to-peer scenarios where a service runs under an account that has no SPN, so the KDC cannot locate a service account key in the usual way. A client can request the target service’s TGT directly, include it in a TGS-REQ as an additional ticket, and set the ENC-TKT-IN-SKEY flag so the KDC encrypts the resulting ticket with the TGT session key. The article emphasizes that handing out raw TGTs is not inherently dangerous because a TGT is unusable without its associated session key.\u003c/p\u003e\n\n\u003cp\u003eThe article’s most concrete Windows example is RDP with Network Level Authentication, where CredSSP initiates U2U during authentication. The client obtains the RDP server’s TGT over the encrypted CredSSP negotiation, requests a U2U service ticket, and presents an AP-REQ indicating that the service ticket is encrypted with a session key. The article also explains how the same PKINIT and U2U primitives support UnPAC-the-Hash by allowing a party with a certificate and private key to decrypt a U2U service ticket and recover the NT hash from PAC_CREDENTIAL_INFO.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article examines Kerberos user-to-user authentication in Windows and compares it with the standard Kerberos AS, TGS, and AP exchange. In traditional Kerberos, the KDC issues a TGT encrypted with the KRBTGT key and later issues a service ticket encrypted with the target service account’s long-term key. U2U changes this by using the session key from an additional TGT to encrypt the service ticket instead of using a service account key.\u003c/p\u003e\n\n\u003cp\u003eThe author explains that U2U exists for cases such as peer-to-peer authentication, where a service may be hosted under a regular user account that has no SPN. In that case, a standard service ticket request can fail because the KDC cannot locate the associated service account key. U2U addresses this by having the client request the target service’s TGT through a KERB-TGT-REQUEST, place that TGT in the additional-tickets field of a TGS-REQ, and set ENC-TKT-IN-SKEY.\u003c/p\u003e\n\n\u003cp\u003eThe article contrasts the expired user-to-user Kerberos draft with observed Windows behavior. The draft describes three scenarios: a client proactively using U2U, the KDC requiring U2U through policy, and the server requiring U2U after receiving an AP-REQ. The author states that Windows consistently shows the first case, while no Windows account policy or userAccountControl flag was found to force U2U, and attempts to trigger KDC_ERR_MUST_USE_USER2USER instead resulted in KDC_ERR_S_PRINCIPAL_UNKNOWN.\u003c/p\u003e\n\n\u003cp\u003eA major practical example in the article is RDP with Network Level Authentication. In the author’s lab, the RDP client first requested a normal TERMSRV service ticket but did not use or cache it, then requested the server’s TGT inside SPNEGO tokens carried by CredSSP TSRequest structures over TLS. The client then sent a U2U TGS-REQ with ENC-TKT-IN-SKEY set and later delivered an AP-REQ to the RDP server with USE-SESSION-KEY set.\u003c/p\u003e\n\n\u003cp\u003eThe article also explains how U2U relates to UnPAC-the-Hash. When PKINIT is used, the NT hash is included in PAC_CREDENTIAL_INFO inside the PAC so Windows can support NTLM authentication even though the user authenticated with a certificate. By performing PKINIT with a certificate and private key, deriving the AS reply key, and requesting a U2U service ticket encrypted with the known TGT session key, the PAC can be decrypted and the NT hash recovered from PAC_CREDENTIAL_INFO.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThis article is a Windows Kerberos internals deep dive focused on user-to-user authentication, also called U2U. The author explains how U2U differs from traditional Kerberos and why it became more visible after Active Directory Certificate Services, UnPAC-the-Hash, and Shadow Credentials attacks. The article states that it focuses on how U2U works under the hood rather than providing attack execution steps.\u003c/p\u003e\n\n\u003ch2 id=\"standard-kerberos-baseline\"\u003eStandard Kerberos Baseline\u003c/h2\u003e\n\n\u003cp\u003eThe article begins by reviewing the normal Kerberos flow. A client sends an AS-REQ to the KDC with a timestamp encrypted using a key derived from the client’s password, while the username is sent in plaintext so the KDC can look up the matching key in Active Directory. If verification succeeds, the KDC issues a TGT encrypted with the KRBTGT key and returns an AS-REP containing an EncASRepPart encrypted with the client’s key.\u003c/p\u003e\n\n\u003cp\u003eThe TGT contains the user’s metadata in the PAC and includes a session key. A second copy of the session key is delivered to the client in the encrypted EncASRepPart, and the client caches both the TGT and session key in LSASS. When the client needs a service ticket, it sends a TGS-REQ containing the TGT, the target SPN, and an authenticator encrypted with the TGT session key.\u003c/p\u003e\n\n\u003cp\u003eThe KDC decrypts the TGT using the KRBTGT key, extracts the session key, verifies the authenticator, and returns a service ticket. In standard Kerberos, that service ticket is encrypted with the target service account’s long-term key. The client then sends an AP-REQ to the service, and the service decrypts the ticket with its long-term key and uses the ticket session key to validate the authenticator.\u003c/p\u003e\n\n\u003ch2 id=\"why-u2u-exists\"\u003eWhy U2U Exists\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that Windows services commonly run as built-in local accounts or under service accounts with registered SPNs. Regular Active Directory user accounts usually do not have SPNs. If a service is running under an account with no SPN, the KDC cannot look up the account through the requested SPN and may return KDC_ERR_S_PRINCIPAL_UNKNOWN.\u003c/p\u003e\n\n\u003cp\u003eU2U was designed to support peer-to-peer cases where a user needs to authenticate to a service hosted by another user. Instead of encrypting the service ticket with a service account’s long-term key, U2U encrypts the service ticket with the session key from the target service user’s TGT. This allows Kerberos authentication to work even when the target service is not represented by a conventional SPN-backed service account key.\u003c/p\u003e\n\n\u003ch2 id=\"u2u-ticket-flow\"\u003eU2U Ticket Flow\u003c/h2\u003e\n\n\u003cp\u003eThe U2U process described in the article begins when the client sends a KERB-TGT-REQUEST directly to the target service. The service responds with a KERB-TGT-REPLY containing its own TGT. The client then sends a modified TGS-REQ to the KDC with that TGT included in the additional-tickets field.\u003c/p\u003e\n\n\u003cp\u003eThe TGS-REQ also sets the ENC-TKT-IN-SKEY flag. This flag tells the KDC to encrypt the resulting service ticket using the session key from the additional ticket rather than a long-term service key. The KDC decrypts the additional TGT with the KRBTGT key, extracts its session key, and uses that session key to encrypt the new U2U service ticket.\u003c/p\u003e\n\n\u003ch2 id=\"why-sharing-a-tgt-is-not-enough-to-impersonate-the-account\"\u003eWhy Sharing a TGT Is Not Enough to Impersonate the Account\u003c/h2\u003e\n\n\
