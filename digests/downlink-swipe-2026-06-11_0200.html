window.__DL_ARTICLES = [{"n":1,"title":"MCP vs API: When to Use Each (and Why You Need Both)","source":"mitiga.io","sourceColorIdx":0,"link":"https://www.mitiga.io/blog/mcp-vs-api","time":"04:50","priority":"MAY READ","score":55,"tldr":"MCP and APIs are complementary: use APIs for predictable scripted automation, and use MCP when analysts or AI agents need to investigate security data through natural language. Teams adopting agentic SOC workflows should run both, while treating MCP access as privileged because its tokens and scopes expand the attack surface.","briefOverview":"\u003cp\u003eThe article argues that MCP and APIs should not be treated as rivals because they expose the same underlying capabilities for different users. APIs are described as structured, deterministic interfaces for developers and scripts, while MCP exposes platform capabilities as tools that AI agents can discover and call in response to natural language. The central takeaway is that security teams, especially those moving toward an Agentic SOC, need both interfaces.\u003c/p\u003e\n\n\u003cp\u003eAPIs are presented as the better option for scripted automation where teams know exactly what they want to call and need consistent behavior. MCP is presented as better for analysts, AI assistants, and agentic workflow tools that need to investigate security data by asking questions rather than writing endpoint-specific code. The article emphasizes that MCP can reduce time-to-first-answer from days of integration work to minutes by letting the LLM choose tools, chain results, and format output.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights a security caveat: MCP servers give agents credentialed reach into the security stack. Because of that, MCP tokens and scopes become part of the attack surface and should be treated like privileged access. Mitiga says it ships both API and MCP side-by-side to support deterministic automation and live natural-language investigations.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article compares MCP, or Model Context Protocol, with traditional APIs in the context of security operations. It frames them as two interfaces to the same capabilities rather than competing approaches. APIs are described as contracts for code, while MCP is described as a contract for AI agents. The distinction is based less on the underlying plumbing and more on the consumer of the interface.\u003c/p\u003e\n\n\u003cp\u003eFor APIs, the article emphasizes deterministic and scripted automation. Developers use APIs when they know the exact request they want to make, the response they expect, and the behavior they need to repeat consistently. Examples include wiring SIEM alerts into ticketing systems, pulling alert data into daily reports, or building custom enrichment that runs the same way each time. The API path requires working knowledge of HTTP, authentication flows, Swagger or OpenAPI, GraphQL, and automation platforms.\u003c/p\u003e\n\n\u003cp\u003eFor MCP, the article emphasizes intent-driven investigation through natural language. It says AI assistants need MCP to reach into security data, run hunts, pivot on indicators of compromise, and call platform tools on the fly. MCP is presented as useful for Agentic SOC platforms such as Torq and Tines, general workflow builders such as n8n, and human analysts using MCP-compatible clients such as Claude, ChatGPT, or Rovo. In these cases, the user asks a question and expects the agent to assemble the workflow.\u003c/p\u003e\n\n\u003cp\u003eThe article’s main operational claim is that MCP can drastically shorten time-to-value. API integrations may take days because teams must read documentation, configure authentication, map fields, handle pagination, and catch errors. With MCP, the user connects the server once and asks a question, with the LLM determining which tools to call, chaining results, and formatting the output. The article also describes a future direction where LLMs select relevant playbooks based on alert type and use those playbooks to guide MCP tool use.\u003c/p\u003e\n\n\u003cp\u003eThe article does not describe a specific incident or name a threat actor, but it does include a security warning about MCP access. It states that an MCP server gives an agent credentialed reach into the security stack, making its tokens and scopes part of the attack surface. Mitiga says it has observed MCP tokens being stolen in the wild and advises treating MCP access like privileged access. The article concludes that the future of security tooling is multi-protocol by default, with teams choosing between API and MCP per use case, persona, and workflow.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that MCP and APIs are complementary interfaces rather than competing technologies. Both expose the same underlying capabilities, but they are built for different consumers and different operational patterns. APIs serve developers and scripts, while MCP serves AI agents, analysts, and natural-language-driven investigations.\u003c/p\u003e\n\n\u003cp\u003eThe author’s main position is that security teams should run both. APIs remain the right choice for deterministic automation, while MCP is positioned as the right choice for Agentic SOC workflows and human analysts who want to ask questions instead of writing code.\u003c/p\u003e\n\n\u003ch2 id=\"core-distinction-between-mcp-and-apis\"\u003eCore distinction between MCP and APIs\u003c/h2\u003e\n\n\u003cp\u003eThe article defines an API as a contract for code. A user sends a structured request and receives a structured response, making it predictable and deterministic. This makes APIs useful when the workflow is known in advance and needs to behave consistently.\u003c/p\u003e\n\n\u003cp\u003eMCP is defined as a contract for AI agents. It exposes platform capabilities as tools that a large language model can discover, reason about, and call in response to natural language. According to the article, MCP is what allows an AI assistant to reach into security data, run a hunt, pivot on an indicator of compromise, or otherwise use the platform’s capabilities rather than merely chat about them.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the plumbing can be the same, but the consumer is different. APIs are for developers and scripts, while MCP is for agentic workflow tools, AI assistants, and analysts working through natural language.\u003c/p\u003e\n\n\u003ch2 id=\"when-the-article-says-to-use-an-api\"\u003eWhen the article says to use an API\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends using APIs for deterministic, scripted automation that a developer controls line by line. APIs are best when the user knows exactly what needs to be called, what data should come back, and how the system should behave.\u003c/p\u003e\n\n\u003cp\u003eExamples in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWiring a SIEM alert into a ticketing system.\u003c/li\u003e\n\u003cli\u003ePulling alert data into a daily report.\u003c/li\u003e\n\u003cli\u003eBuilding custom enrichment that runs the same way every time.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe API path is described as powerful but slower to implement. It requires reading documentation, setting up authentication, mapping fields, handling pagination, catching errors, and troubleshooting HTTP issues. The article says even a “quick” API integration can take a few days of work.\u003c/p\u003e\n\n\u003ch2 id=\"when-the-article-says-to-use-mcp\"\u003eWhen the article says to use MCP\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends MCP for Agentic SOC workflows and for humans in the loop who want to work in natural language. MCP is presented as useful when the analyst or agent is thinking in questions rather than endpoints.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several places where this pattern appears:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePurpose-built Agentic SOC platforms such as Torq and Tines, which are described as moving beyond static playbooks into LLM-driven investigations.\u003c/li\u003e\n\u003cli\u003eGeneral workflow builders such as n8n, which can let security teams build their own agentic flows on top of MCP.\u003c/li\u003e\n\u003cli\u003eHuman analysts using AI assistants such as Claude, ChatGPT, or other MCP-compatible clients.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAn example question in the article is: “has this hash been seen anywhere in the last 90 days, and was it touched by a privileged account?” The point is that the user does not need to read API documentation or manually construct endpoint calls; they ask a question and expect an answer.\u003c/p\u003e\n\n\u003ch2 id=\"time-to-value-argument\"\u003eTime-to-value argument\u003c/h2\u003e\n\n\u003cp\u003eA major claim in the article is that MCP can shorten time-to-first-answer dramatically. API integrations are described as taking days because of documentation, authentication, data mapping, pagination, and error handling. MCP, by contrast, is described as requiring the user to connect the server once and then ask a question.\u003c/p\u003e\n\n\u003cp\u003eThe article says this speed comes from offloading workflow decisions to the LLM. The LLM figures out which tool to call, chains results, and formats the output. The user describes the desired outcome rather than pre-building a workflow.\u003c/p\u003e\n\n\u003cp\u003eThe article gives an example where a question such as “investigate this alert and tell me if it looks like lateral movement” might lead to different tool-call sequences depending on what the data reveals. One investigation might involve five tool calls, while another might involve three. The workflow is assembled per question rather than designed in advance.\u003c/p\u003e\n\n\u003ch2 id=\"agentic-soc-and-playbook-direction\"\u003eAgentic SOC and playbook direction\u003c/h2\u003e\n\n\u003cp\u003eThe article connects MCP to the concept of the Agentic SOC. It describes a direction where an LLM selects a relevant playbook based on a specific alert type and then uses that playbook to guide which MCP tools to use. This keeps MCP’s adaptability while adding more structure so the agent is not starting from scratch every time.\u003c/p\u003e\n\n\u003cp\u003eThe article presents this as a future direction for agentic investigation. The workflow remains intent-driven, but the agent works from a pattern that fits the case in front of it.\u003c/p\u003e\n\n\u003ch2 id=\"skills-and-operational-requirements\"\u003eSkills and operational requirements\u003c/h2\u003e\n\n\u003cp\u003eThe article contrasts the skills needed for each interface. To use an API well, the user needs familiarity with HTTP, authentication flows, Swagger or OpenAPI, GraphQL, and an automation platform. The user must also be comfortable reading documentation and troubleshooting HTTP errors.\u003c/p\u003e\n\n\u003cp\u003eTo use MCP, the article says the user needs the endpoint to connect it to the environment. After that, the key skill is writing a clear question and judging whether the answer makes sense. The article describes this as shifting the bottleneck from engineering capacity to analytical judgment.\u003c/p\u003e\n\n\u003ch2 id=\"security-caveat-around-mcp\"\u003eSecurity caveat around MCP\u003c/h2\u003e\n\n\u003cp\u003eThe article includes a warning that MCP convenience comes with security risk. An MCP server gives an agent credentialed reach into the security stack. As a result, MCP tokens and scopes become part of the attack surface.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Mitiga has observed MCP tokens being stolen in the wild. It advises teams to connect fast but treat MCP access like privileged access. This caveat is presented as an important operational consideration when adopting MCP.\u003c/p\u003e\n\n\u003ch2 id=\"mitiga-s-position\"\u003eMitiga’s position\u003c/h2\u003e\n\n\u003cp\u003eMitiga says it ships both API and MCP side-by-side. The API is positioned for scripted, deterministic automation, while MCP is positioned for analysts and Agentic SOC platforms that drive live investigations through natural language.\u003c/p\u003e\n\n\u003cp\u003eThe article’s conclusion is that the future of security tooling is multi-protocol by default. Teams should stop comparing MCP and APIs as if one replaces the other, and instead choose the right interface per use case, persona, and workflow.\u003c/p\u003e\n","keyPoints":["MCP and APIs expose the same underlying capabilities but are designed for different consumers: APIs are contracts for code, while MCP is a contract for AI agents.","APIs are best suited for deterministic, scripted automation where developers know exactly what to call and need consistent behavior.","MCP is best suited for analysts, AI assistants, and Agentic SOC platforms that drive live investigations through natural language questions.","The article states that MCP can reduce time-to-first-answer to minutes because the LLM chooses tools, chains results, and formats output without a pre-built workflow.","The article warns that MCP servers give agents credentialed access into security environments, making MCP tokens and scopes part of the attack surface."],"insights":["MCP shifts the bottleneck in security investigations from engineering capacity to analytical judgment, because users mainly need to ask clear questions and assess whether the answer makes sense.","Agentic investigations may combine MCP’s adaptability with playbook guidance, where an LLM selects a relevant playbook based on alert type and uses it to decide which MCP tools to call.","The same natural-language investigation request can trigger different MCP tool-call sequences depending on what the data reveals, so the workflow is assembled per case rather than predesigned.","MCP convenience creates a privileged-access risk because stolen MCP tokens can give an agent-like reach into the security stack, making token scope and protection operationally important."],"referencedReports":[],"body":"\u003cp\u003eThe article argues that MCP and APIs should not be treated as rivals because they expose the same underlying capabilities for different users. APIs are described as structured, deterministic interfaces for developers and scripts, while MCP exposes platform capabilities as tools that AI agents can discover and call in response to natural language. The central takeaway is that security teams, especially those moving toward an Agentic SOC, need both interfaces.\u003c/p\u003e\n\n\u003cp\u003eAPIs are presented as the better option for scripted automation where teams know exactly what they want to call and need consistent behavior. MCP is presented as better for analysts, AI assistants, and agentic workflow tools that need to investigate security data by asking questions rather than writing endpoint-specific code. The article emphasizes that MCP can reduce time-to-first-answer from days of integration work to minutes by letting the LLM choose tools, chain results, and format output.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights a security caveat: MCP servers give agents credentialed reach into the security stack. Because of that, MCP tokens and scopes become part of the attack surface and should be treated like privileged access. Mitiga says it ships both API and MCP side-by-side to support deterministic automation and live natural-language investigations.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

// Shared card chrome so the front and back faces render identical tokens.
function CardTitle({ children }) {
  return (
    <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 20, lineHeight: 1.3, letterSpacing: "-0.005em", color: "var(--text)" }}>
      {children}
    </h2>
  );
}

function SourceTag({ article }) {
  const srcColor = `var(--p${article.sourceColorIdx})`;
  return (
    <>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
        {article.source}
      </span>
    </>
  );
}

function numberedList(items, accent) {
  return (
    <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
      {(items || []).map((item, i) => (
        <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: accent, marginTop: 3, letterSpacing: "0.04em" }}>
            {String(i + 1).padStart(2, "0")}
          </span>
          <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{item}</span>
        </li>
      ))}
    </ul>
  );
}

function KeyPointsSection({ keyPoints, accent }) {
  if (!keyPoints || keyPoints.length === 0) return null;
  return (
    <div style={{ marginTop: 18 }}>
      <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
      {numberedList(keyPoints, accent)}
    </div>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            {report.primary && <span className="report-primary">PRIMARY</span>}
            <a className="report-link" href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
            {report.category && <span className={"report-cat report-cat-" + report.category}>{report.category}</span>}
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
