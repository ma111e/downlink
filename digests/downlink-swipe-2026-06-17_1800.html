window.__DL_ARTICLES = [{"n":4,"title":"Socket Firewall Now Blocks Malicious VS Code and Open VSX Extensions","source":"socket.dev","sourceColorIdx":2,"link":"https://socket.dev/blog/socket-firewall-blocks-malicious-code-extensions?utm_medium=feed","time":"20:18","priority":"SHOULD READ","score":78,"tldr":"Socket Firewall now supports blocking malicious VS Code Marketplace and Open VSX extensions at install and update time, before they can run in developer environments. The beta feature is aimed at preventing poisoned editor extensions like the malicious Nx Console release and GlassWorm campaigns from reaching developers.","briefOverview":"\u003cp\u003eSocket announced that Socket Firewall now supports blocking malicious VS Code Marketplace and Open VSX extensions before they install or update in developer environments. The company frames the feature as a response to incidents such as GitHub’s May 2026 disclosure involving a poisoned third-party VS Code extension and repeated GlassWorm attacks across Open VSX. The key significance is that editor extensions run as third-party code inside developer environments and may have access to source code, terminals, files, credentials, tokens, and internal systems.\u003c/p\u003e\n\n\u003cp\u003eThe new protection routes editor marketplace traffic through Socket’s proxy, forwards requests to the real registry, and filters marketplace results or blocks downloads based on threat verdicts. Socket says the control applies during browsing, installation, updating, and VSIX download flows, creating an install-time and update-time enforcement point rather than relying only on after-the-fact inventory. The feature is available in beta for Socket Enterprise customers and supports rollout through editor configuration, DNS override, and enterprise egress forwarding.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSocket announced an expansion of Socket Firewall to cover editor extension installs from the VS Code Marketplace and Open VSX. The company says the feature helps organizations block malicious editor extensions before they reach developer environments. Socket positions the release as an extension of its existing package-install protection model across ecosystems such as npm, PyPI, Go, and Maven.\u003c/p\u003e\n\n\u003cp\u003eThe article cites GitHub’s May 2026 disclosure that attackers compromised an employee device through a poisoned third-party VS Code extension and exfiltrated roughly 3,800 GitHub-internal repositories. It identifies the extension as Nx Console 18.95.0, a malicious release that reached both the Visual Studio Marketplace and Open VSX before removal. The article also notes Socket researchers have documented repeated GlassWorm attacks across Open VSX involving malicious and compromised extensions designed to steal developer credentials and spread through trusted editor marketplaces.\u003c/p\u003e\n\n\u003cp\u003eSocket emphasizes that code editor extensions can have broad access inside developer environments. According to the article, they may access source code, terminals, files, credentials, tokens, and internal systems. The company argues that organizations using AI-first editors inherit a marketplace they cannot fully gate, making install and update time the key moments for intervention.\u003c/p\u003e\n\n\u003cp\u003eTechnically, Socket Firewall places a proxy in front of editor marketplace traffic. When an editor browses, installs, or updates an extension, the request flows through Socket’s proxy, which forwards it to the real registry and filters the response against threat verdicts. Socket says the proxy also sits in front of extension asset domains and checks verdicts before forwarding VSIX downloads, adding a second enforcement point beyond marketplace search results.\u003c/p\u003e\n\n\u003cp\u003eThe new beta supports the VS Code Marketplace used by Visual Studio Code and Open VSX used by Cursor, Windsurf, VSCodium, Antigravity, and other VS Code-based editors. Socket says clean extensions remain available while flagged extensions are blocked before installation or update. Extension Firewall is available in beta for Socket Enterprise customers and supports marketplace filtering, VSIX download blocking, and rollout paths through editor configuration, DNS override, and enterprise egress forwarding.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSocket announced that Socket Firewall now supports protection for editor extension installs from the VS Code Marketplace and Open VSX. The feature is intended to block malicious editor extensions before they are installed or updated in developer environments. Socket describes this as an expansion of the same enforcement layer it already uses to protect package installs across ecosystems such as npm, PyPI, Go, Maven, and others.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central argument is that editor extensions should be treated as a software supply chain risk because they are third-party code running inside development environments. Socket says these extensions often have access to source code, terminals, files, credentials, tokens, and internal systems. The company states that install and update time are the critical moments to intervene.\u003c/p\u003e\n\n\u003ch2 id=\"context-and-incidents-cited\"\u003eContext and incidents cited\u003c/h2\u003e\n\n\u003cp\u003eThe article cites GitHub’s May 2026 disclosure that attackers compromised an employee device through a poisoned third-party VS Code extension. According to the article, the attackers exfiltrated roughly 3,800 GitHub-internal repositories.\u003c/p\u003e\n\n\u003cp\u003eThe malicious extension named in the article was Nx Console 18.95.0. Socket says that release reached both the Visual Studio Marketplace and Open VSX before it was removed.\u003c/p\u003e\n\n\u003cp\u003eThe article also references repeated GlassWorm attacks documented by Socket researchers across Open VSX. Those attacks involved malicious and compromised extensions designed to steal developer credentials and spread through trusted editor marketplaces.\u003c/p\u003e\n\n\u003ch2 id=\"problem-socket-says-it-is-addressing\"\u003eProblem Socket says it is addressing\u003c/h2\u003e\n\n\u003cp\u003eSocket argues that most extension security starts too late. Inventory tools can show which extensions are already installed and can help with visibility, cleanup, and compliance. However, the article states that by the time a malicious extension appears in inventory, the code has already run.\u003c/p\u003e\n\n\u003cp\u003eSocket positions Firewall as a way to close that gap by creating an install-time and update-time control point. Instead of only detecting installed extensions after the fact, the firewall is designed to filter or block marketplace activity while the editor is browsing, installing, or updating an extension.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-firewall-works\"\u003eHow the firewall works\u003c/h2\u003e\n\n\u003cp\u003eAccording to the article, editor marketplace requests flow through Socket’s proxy. Socket forwards requests to the real registry, checks extension verdicts, and filters or blocks flagged extensions during the marketplace flow.\u003c/p\u003e\n\n\u003cp\u003eThe enforcement applies in multiple places:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMarketplace browsing and search results are filtered against threat verdicts.\u003c/li\u003e\n\u003cli\u003eExtension install and update requests are routed through Socket’s proxy.\u003c/li\u003e\n\u003cli\u003eThe proxy sits in front of extension asset domains.\u003c/li\u003e\n\u003cli\u003eVerdicts are checked before VSIX downloads are forwarded.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSocket says this gives organizations a second enforcement point beyond marketplace search results. The article emphasizes that malicious extensions can be blocked even when an install flow reaches the underlying download URL.\u003c/p\u003e\n\n\u003ch2 id=\"supported-ecosystems-and-affected-developer-tools\"\u003eSupported ecosystems and affected developer tools\u003c/h2\u003e\n\n\u003cp\u003eSocket Firewall now supports two major editor extension ecosystems:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVS Code Marketplace, used by Visual Studio Code.\u003c/li\u003e\n\u003cli\u003eOpen VSX, used by Cursor, Windsurf, VSCodium, Antigravity, and other VS Code-based editors.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article notes that developer extension risk is not limited to one editor. It specifically highlights that many organizations support multiple coding environments, including AI-native editors and VS Code forks that rely on Open VSX.\u003c/p\u003e\n\n\u003ch2 id=\"developer-and-organizational-impact\"\u003eDeveloper and organizational impact\u003c/h2\u003e\n\n\u003cp\u003eSocket says the developer workflow remains simple because clean extensions continue to work. Flagged extensions are blocked from installation or update by the firewall in the path between the editor and the extension registry.\u003c/p\u003e\n\n\u003cp\u003eFor organizations, the feature provides a centralized enforcement model without requiring endpoint software on every developer device. Socket states that enforcement happens at the proxy rather than through an agent.\u003c/p\u003e\n\n\u003ch2 id=\"availability-and-rollout\"\u003eAvailability and rollout\u003c/h2\u003e\n\n\u003cp\u003eExtension Firewall is available in beta for Socket Enterprise customers. The feature supports marketplace filtering and VSIX download blocking.\u003c/p\u003e\n\n\u003cp\u003eSocket says organizations can roll it out through several paths:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEditor configuration.\u003c/li\u003e\n\u003cli\u003eDNS override.\u003c/li\u003e\n\u003cli\u003eEnterprise egress forwarding.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article directs interested customers to contact Socket’s sales team to turn on access and learn more about deployment.\u003c/p\u003e\n","keyPoints":["Socket Firewall now supports VS Code Marketplace and Open VSX extension installs, allowing organizations to block malicious editor extensions before they reach developer environments.","The article cites GitHub’s May 2026 disclosure that attackers compromised an employee device through the malicious Nx Console 18.95.0 VS Code extension and exfiltrated roughly 3,800 GitHub-internal repositories.","Socket says editor extensions can have access to source code, terminals, files, credentials, tokens, and internal systems inside developer environments.","Socket Firewall routes editor marketplace requests through Socket’s proxy, forwards them to the real registry, and filters or blocks flagged extensions based on threat verdicts during search, install, update, and VSIX download flows.","Extension Firewall is available in beta for Socket Enterprise customers and supports marketplace filtering, VSIX download blocking, and rollout paths through editor configuration, DNS override, and enterprise egress forwarding."],"insights":["The article frames extension security as a timing problem: inventory tools may support visibility and cleanup, but they act after an extension has already had a chance to execute.","Socket is treating editor extensions like software supply chain dependencies by applying the same install-time enforcement model it uses for package managers such as npm, PyPI, Go, and Maven.","The proxy design adds enforcement not only at marketplace search results but also at extension asset and VSIX download paths, addressing cases where installation reaches the underlying download URL directly.","The article highlights Open VSX as a critical control point because AI-first and VS Code-based editors such as Cursor, Windsurf, VSCodium, and Antigravity depend on it rather than only the VS Code Marketplace."],"referencedReports":[{"title":"Investigating unauthorized access to GitHub’s internal repositories","url":"https://github.blog/security/investigating-unauthorized-access-to-githubs-internal-repositories/","publisher":"GitHub","context":"The article cites GitHub’s disclosure that attackers compromised an employee device through a poisoned third-party VS Code extension and exfiltrated internal repositories.","category":"","primary":false},{"title":"Nx Console 18.95.0 security advisory","url":"https://github.com/nrwl/nx-console/security/advisories/GHSA-c9j4-9m59-847w","publisher":"Nrwl/Nx Console","context":"The article links to the advisory for the malicious Nx Console 18.95.0 release that reached the Visual Studio Marketplace and Open VSX.","category":"","primary":false}],"body":"\u003cp\u003eSocket announced that Socket Firewall now supports blocking malicious VS Code Marketplace and Open VSX extensions before they install or update in developer environments. The company frames the feature as a response to incidents such as GitHub’s May 2026 disclosure involving a poisoned third-party VS Code extension and repeated GlassWorm attacks across Open VSX. The key significance is that editor extensions run as third-party code inside developer environments and may have access to source code, terminals, files, credentials, tokens, and internal systems.\u003c/p\u003e\n\n\u003cp\u003eThe new protection routes editor marketplace traffic through Socket’s proxy, forwards requests to the real registry, and filters marketplace results or blocks downloads based on threat verdicts. Socket says the control applies during browsing, installation, updating, and VSIX download flows, creating an install-time and update-time enforcement point rather than relying only on after-the-fact inventory. The feature is available in beta for Socket Enterprise customers and supports rollout through editor configuration, DNS override, and enterprise egress forwarding.\u003c/p\u003e\n"},{"n":2,"title":"Crypto Clipper Campaign Abuses Fake Reviews, AI Narrators, and VirusTotal Comments","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/crypto-clipper-campaign-abuses-fake.html","time":"18:14","priority":"SHOULD READ","score":76,"tldr":"Check Point reports a campaign distributing a Rust-based crypto clipboard hijacker disguised as Solana/Pump.fun bots and gambling prediction tools. The attackers build false trust using fake reviews, inflated downloads, AI-narrated YouTube tutorials, GitHub/SourceForge promotion, and coordinated VirusTotal comments to make the malware appear legitimate.","briefOverview":"\u003cp\u003eAn unknown threat actor has been observed using paid or promoted posts on legitimate news websites to generate attention for malicious warez, according to Check Point Research. The campaign promotes tools that are actually tied to a cryptocurrency clipboard hijacker. The actor uses a dedicated WordPress phishing page as a central hub and also relies on GitHub, SourceForge, YouTube, and VirusTotal activity to build credibility.\u003c/p\u003e\n\n\u003cp\u003eThe malware is hidden inside Solana and Pump.fun sniper bots and crash-game predictors, indicating that cryptocurrency asset holders and online gamblers seeking shortcuts or quick profits are the targets. The Rust-based clipper affects Windows and macOS systems. It monitors clipboard contents for cryptocurrency wallet address patterns and replaces matching addresses with attacker-controlled wallet addresses from a hard-coded list.\u003c/p\u003e\n\n\u003cp\u003eA notable element of the campaign is its use of fake reputation signals across trusted platforms. Check Point said the actor used inflated download counts, coordinated five-star reviews, AI-generated tutorial narrators, GitHub stars and forks, SourceForge downloads, and positive VirusTotal comments to make malicious files appear safe. The actor also used EIN Presswire to market the tool’s claimed capabilities, resulting in syndication across partner news websites, primarily in the USA TODAY Network.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCheck Point Research reported that an unknown threat actor is promoting malicious warez through paid or promoted posts on legitimate news websites. The actor’s goal is to distribute a cryptocurrency clipboard hijacker disguised as tools such as Solana and Pump.fun sniper bots and crash-game predictors. The campaign appears aimed at cryptocurrency asset holders and online gamblers looking for shortcuts and quick profits.\u003c/p\u003e\n\n\u003cp\u003eThe operation uses a dedicated WordPress phishing page as a central hub, along with GitHub and SourceForge projects promoted by fake accounts. It also includes a YouTube channel and coordinated activity on VirusTotal. Check Point described the campaign as a “fake reputation economy” spanning platforms that potential victims might check before downloading a tool.\u003c/p\u003e\n\n\u003cp\u003eThe clipboard hijacker is written in Rust and targets both Windows and macOS systems. It continuously monitors the clipboard for content matching cryptocurrency wallet address patterns. When it finds a match, it replaces the wallet address with one controlled by the attacker from a hard-coded list, redirecting digital assets to the attacker.\u003c/p\u003e\n\n\u003cp\u003eThe actor uses what the article describes as Ghost Networks to manipulate reputation-driven systems such as VirusTotal. This includes upvotes and highly positive comments intended to misclassify malicious files as safe or reduce suspicion. Similar tactics appear on GitHub, where at least six accounts are used to cross-promote and distribute the malware, including one repository with 146 stars and 62 forks.\u003c/p\u003e\n\n\u003cp\u003eThe campaign also manipulates download and engagement metrics on SourceForge and YouTube. Check Point noted that SourceForge showed 44,485 downloads, including 37,460 supposedly from Android devices despite only Windows and macOS versions being available, which it said could be explained by an Android farm inflating counts. The tools are also promoted on a YouTube channel with over 91,000 subscribers, where tutorial-style videos feature AI-generated narrators and positive comments.\u003c/p\u003e\n\n\u003cp\u003eAnother unusual element is the use of EIN Presswire to promote the tool’s claimed capabilities. The press release was syndicated across partner news websites, primarily within the USA TODAY Network. Check Point said manipulation of sentiment and reputation across crowd-sourced platforms represents a meaningful shift in how attackers build trust and warned that the same approach could be used to distribute information stealers or ransomware to higher-value targets over time.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCheck Point Research reported a campaign in which an unknown threat actor is using reputation manipulation and cross-platform promotion to distribute a cryptocurrency clipboard hijacker. The actor promotes malicious warez through paid or promoted posts on legitimate news websites and supports the campaign with a dedicated WordPress phishing page, GitHub and SourceForge projects, a YouTube channel, and coordinated activity on VirusTotal.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is built around making malicious tools appear popular, legitimate, and safe. Check Point described the operation as borrowing tactics from legitimate brands, including inflated download counts, coordinated five-star reviews, tutorial-style videos, and promotion on platforms that users tend to trust.\u003c/p\u003e\n\n\u003ch2 id=\"targeting-and-lures\"\u003eTargeting and Lures\u003c/h2\u003e\n\n\u003cp\u003eThe malware is concealed within tools advertised as Solana and Pump.fun sniper bots and crash-game predictors. According to the article, this suggests the campaign targets cryptocurrency asset holders and online gamblers who are searching for shortcuts or quick profits.\u003c/p\u003e\n\n\u003cp\u003eThe tools are promoted across multiple channels to reinforce the appearance of legitimacy. These channels include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA dedicated WordPress phishing page used as a central hub.\u003c/li\u003e\n\u003cli\u003eGitHub repositories promoted by fake accounts.\u003c/li\u003e\n\u003cli\u003eSourceForge projects with inflated download metrics.\u003c/li\u003e\n\u003cli\u003eA YouTube channel with tutorial-style videos.\u003c/li\u003e\n\u003cli\u003eCoordinated VirusTotal comments and upvotes.\u003c/li\u003e\n\u003cli\u003ePaid or promoted posts on legitimate news websites.\u003c/li\u003e\n\u003cli\u003eA press release distributed through EIN Presswire and syndicated to partner news websites.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"malware-behavior\"\u003eMalware Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe payload is a Rust-based cryptocurrency clipboard hijacker. It targets both Windows and macOS systems.\u003c/p\u003e\n\n\u003cp\u003eThe malware continuously monitors clipboard contents for patterns that match cryptocurrency wallet addresses. When it detects a matching wallet address, it replaces the copied address with an attacker-controlled address selected from a hard-coded list. This enables the attacker to redirect cryptocurrency transactions to wallets under their control.\u003c/p\u003e\n\n\u003ch2 id=\"reputation-manipulation-tactics\"\u003eReputation Manipulation Tactics\u003c/h2\u003e\n\n\u003cp\u003eA central feature of the campaign is the manipulation of reputation-driven platforms. Check Point said the actor uses Ghost Networks to poison systems such as VirusTotal by adding upvotes and positive comments intended to reduce suspicion around malicious files.\u003c/p\u003e\n\n\u003cp\u003eThe same reputation-building approach extends to GitHub. The threat actor operates at least six GitHub accounts to cross-promote and distribute the malware. One repository cited in the article had 146 stars and 62 forks, signals that could make the project appear more trustworthy to potential victims.\u003c/p\u003e\n\n\u003cp\u003eSourceForge metrics also showed signs of artificial boosting. Check Point said the SourceForge download counter reached 44,485 downloads, with 37,460 supposedly coming from Android devices even though the developer only offered Windows and macOS versions. Check Point said a plausible explanation was the use of an Android farm to artificially inflate the SourceForge download count.\u003c/p\u003e\n\n\u003ch2 id=\"youtube-and-ai-narration\"\u003eYouTube and AI Narration\u003c/h2\u003e\n\n\u003cp\u003eThe malicious tools are also promoted through a dedicated YouTube channel with more than 91,000 subscribers. The channel was created in July 2020 and claims that its content is “strictly for educational purposes only.”\u003c/p\u003e\n\n\u003cp\u003eThe article says the tutorial-style videos use AI-generated narrators. Positive comments on the videos further reinforce the illusion that the tools are popular and trustworthy.\u003c/p\u003e\n\n\u003ch2 id=\"use-of-press-release-distribution\"\u003eUse of Press Release Distribution\u003c/h2\u003e\n\n\u003cp\u003eOne of the more unusual parts of the campaign is the actor’s use of EIN Presswire to market the tool’s purported capabilities. The cited press release promoted a hash analysis platform and crash-game predictor-related claims.\u003c/p\u003e\n\n\u003cp\u003eThe press release was syndicated across partner news websites, primarily in the USA TODAY Network. This gave the campaign additional visibility through sites that readers may perceive as legitimate news outlets.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eCheck Point said the manipulation of sentiment and reputation across crowd-sourced platforms represents a meaningful shift in how attackers build trust. The campaign does not rely only on a single malicious download page; instead, it creates a broader ecosystem of fake validation across platforms users might check before downloading software.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that the same playbook of fake reputation and aggressive cross-platform promotion could be used to distribute information stealers or ransomware to higher-value targets over time.\u003c/p\u003e\n","keyPoints":["Check Point Research observed an unknown threat actor using paid or promoted posts on legitimate news websites to promote malicious warez.","The campaign distributes a Rust-based cryptocurrency clipboard hijacker hidden inside Solana and Pump.fun sniper bots and crash-game predictors targeting cryptocurrency asset holders and online gamblers.","The malware targets Windows and macOS systems, monitors clipboard contents for cryptocurrency wallet address patterns, and replaces matching addresses with attacker-controlled addresses from a hard-coded list.","The threat actor uses fake reputation tactics across VirusTotal, GitHub, SourceForge, and YouTube, including coordinated positive comments, upvotes, stars, forks, inflated downloads, AI-generated narrators, and positive comments.","Check Point said the actor also used EIN Presswire to market the tool's purported capabilities, leading to syndication across partner news websites primarily in the USA TODAY Network."],"insights":["The campaign shows that attackers are manipulating reputation signals across multiple trusted platforms at once, so positive VirusTotal comments, GitHub stars, SourceForge download counts, and YouTube engagement should not be treated as independent evidence of legitimacy.","The suspicious SourceForge traffic pattern, with 37,460 of 44,485 downloads allegedly coming from Android devices despite only Windows and macOS builds being offered, illustrates how mismatched platform telemetry can reveal artificial promotion.","The use of EIN Presswire and syndication through partner news sites demonstrates that press release distribution can be abused to give malicious tools a veneer of mainstream legitimacy.","The malware’s targeting of users seeking crypto trading shortcuts and gambling predictors highlights that “profit-enhancing” tools in these niches are a high-risk lure for wallet theft."],"referencedReports":[{"title":"From Stars to Upvotes: Fake Reputation Fueling a Crypto Clipboard Hijacker","url":"https://research.checkpoint.com/2026/from-stars-to-upvotes-fake-reputation-fueling-a-crypto-clipboard-hijacker/","publisher":"Check Point Research","context":"The article is based on Check Point Research findings about a campaign using fake reputation signals to distribute a cryptocurrency clipboard hijacker.","category":"","primary":false}],"body":"\u003cp\u003eAn unknown threat actor has been observed using paid or promoted posts on legitimate news websites to generate attention for malicious warez, according to Check Point Research. The campaign promotes tools that are actually tied to a cryptocurrency clipboard hijacker. The actor uses a dedicated WordPress phishing page as a central hub and also relies on GitHub, SourceForge, YouTube, and VirusTotal activity to build credibility.\u003c/p\u003e\n\n\u003cp\u003eThe malware is hidden inside Solana and Pump.fun sniper bots and crash-game predictors, indicating that cryptocurrency asset holders and online gamblers seeking shortcuts or quick profits are the targets. The Rust-based clipper affects Windows and macOS systems. It monitors clipboard contents for cryptocurrency wallet address patterns and replaces matching addresses with attacker-controlled wallet addresses from a hard-coded list.\u003c/p\u003e\n\n\u003cp\u003eA notable element of the campaign is its use of fake reputation signals across trusted platforms. Check Point said the actor used inflated download counts, coordinated five-star reviews, AI-generated tutorial narrators, GitHub stars and forks, SourceForge downloads, and positive VirusTotal comments to make malicious files appear safe. The actor also used EIN Presswire to market the tool’s claimed capabilities, resulting in syndication across partner news websites, primarily in the USA TODAY Network.\u003c/p\u003e\n"},{"n":1,"title":"Google to use UK and EU user IP addresses for ad personalization","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/google-to-use-uk-and-eu-user-ip-addresses-for-ad-personalization/","time":"21:02","priority":"SHOULD READ","score":75,"tldr":"Google will start using UK, EEA, and Swiss users’ IP addresses for ad measurement and personalization from around August 3, 2026, making IP-based device identification part of its advertising stack in regions where IPs are regulated as personal data. The change raises consent and fingerprinting concerns, with Google placing responsibility on advertisers to obtain valid user consent.","briefOverview":"\u003cp\u003eGoogle has begun notifying advertisers that it will start using IP addresses for ad measurement and personalization across the European Economic Area, the UK, and Switzerland on or shortly after August 3, 2026. The article says Google already receives these IP addresses through customer tags, SDKs, HTTP calls, and uploads, but the change is that the addresses will be used to identify devices for measurement and ad personalization. In the affected regions, that use triggers consent requirements because IP addresses are regulated as personal data.\u003c/p\u003e\n\n\u003cp\u003eGoogle will register under IAB Europe’s Transparency and Consent Framework for Feature 3, which covers identifying devices based on automatically transmitted information such as IP addresses. The article frames this as significant because IP-based device identification is a building block of fingerprinting, especially where cookies are blocked or cleared. Google says advertisers remain responsible for obtaining valid consent under its EU User Consent Policy, while user-facing choices for IP-based personalization will come later in the rollout.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGoogle has begun telling advertisers that it plans to use IP addresses for ad measurement and personalization in the European Economic Area, the UK, and Switzerland on or shortly after August 3, 2026. The article says IP addresses are routinely received by online services and that Google already receives them to route traffic and deliver ads. The notable change is the purpose: the same IP addresses will be used to identify devices for measurement and ad personalization.\u003c/p\u003e\n\n\u003cp\u003eGoogle will register under IAB Europe’s Transparency and Consent Framework for Feature 3, described as identifying devices based on information transmitted automatically. Under the framework, Feature 3 covers distinguishing a device from automatically sent data, including the IP address. The article says Feature 3 is not itself a consent step, but attaches to personalization purposes that require user consent rather than legitimate interest.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the EEA, UK, and Switzerland are different from other regions because an IP address is personal data under GDPR, and using it to identify a device is a building block of fingerprinting. It notes that Google’s then Chrome engineering director Justin Schuh wrote in 2019 that fingerprinting subverts user choice because users cannot clear it like cookies. Google reversed that stance in December 2024 by dropping its prohibition on fingerprinting for advertisers, and the UK Information Commissioner’s Office called the reversal “irresponsible.”\u003c/p\u003e\n\n\u003cp\u003eThe timing is tied to the UK ICO’s May 18, 2026 advice to the UK government on possible changes to online advertising consent rules. According to the article, the ICO’s preferred approach would allow some advertising without consent only when based on the context being viewed, while keeping consent mandatory for tracking that profiles people across services. The article states that IP-based personalization across surfaces sits on the consent-required side of that line.\u003c/p\u003e\n\n\u003cp\u003eGoogle’s customer email places the compliance burden on advertisers by reminding them that they remain bound by Google’s EU User Consent Policy and must obtain valid consent from users in the affected regions. Google also frames the change around privacy-enhancing technologies, including on-device processing, trusted execution environments, and secure multi-party computation. Until Google later provides a user-facing choice for IP-based personalization, the article says users can decline non-essential cookies and consent prompts and review ad personalization settings at myadcenter.google.com.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGoogle has begun notifying advertisers that it will start using IP addresses for ad measurement and personalization across the European Economic Area, the UK, and Switzerland on or shortly after August 3, 2026. The article says this is new for those regions because IP addresses are regulated as personal data there.\u003c/p\u003e\n\n\u003cp\u003eGoogle already receives IP addresses through customer tags, SDKs, HTTP calls, and uploads to route traffic and deliver ads. The change described in the article is the purpose for which those addresses will be used: Google will use them to identify devices for measurement and ad personalization.\u003c/p\u003e\n\n\u003ch2 id=\"technical-and-compliance-change\"\u003eTechnical and compliance change\u003c/h2\u003e\n\n\u003cp\u003eThe article says Google will register under IAB Europe’s Transparency and Consent Framework for Feature 3, “Identify devices based on information transmitted automatically.” Under that framework, Feature 3 is the method for distinguishing a device from automatically transmitted data, including the IP address.\u003c/p\u003e\n\n\u003cp\u003eThe article specifies that Feature 3 is not a consent step by itself. Instead, it attaches to personalization purposes, which require user consent rather than legitimate interest.\u003c/p\u003e\n\n\u003cp\u003eGoogle frames the change around privacy-enhancing technologies. The article lists examples provided by Google, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn-device processing\u003c/li\u003e\n\u003cli\u003eTrusted execution environments\u003c/li\u003e\n\u003cli\u003eSecure multi-party computation\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSome personalization features will not arrive until later this year or early next, according to the article. Google says that at that point it will let users on its own properties make a choice about IP-based personalization.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-change-matters\"\u003eWhy the change matters\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Google has used IP signals in advertising elsewhere in the world for spam and fraud prevention and has maintained that IP use is already common across the ads ecosystem. However, the EEA, UK, and Switzerland are treated differently because an IP address is personal data under GDPR.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that using an IP address to identify a device is a building block of fingerprinting. It describes fingerprinting as tracking a device when cookies are blocked or cleared.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that Google once took a different public position on fingerprinting. In 2019, then Chrome engineering director Justin Schuh wrote that fingerprinting subverts user choice and is wrong because users cannot clear it the way they can clear cookies.\u003c/p\u003e\n\n\u003cp\u003eGoogle reversed that stance in December 2024 by dropping its prohibition on fingerprinting for advertisers. The UK Information Commissioner’s Office called the reversal “irresponsible” within a day.\u003c/p\u003e\n\n\u003ch2 id=\"regulatory-context\"\u003eRegulatory context\u003c/h2\u003e\n\n\u003cp\u003eThe article ties the timing of Google’s rollout to recent UK regulatory advice. On May 18, 2026, the UK Information Commissioner’s Office published advice to the UK government on possible changes to online advertising consent rules.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the ICO’s preferred approach would allow some advertising without consent only when it is based on the context being viewed. The ICO’s approach would keep consent mandatory for tracking that profiles people across services.\u003c/p\u003e\n\n\u003cp\u003eThe article states that IP-based personalization across surfaces sits on the consent-required side of that line. It also notes that the ICO has stressed that nothing has changed yet and that existing rules still apply.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties\"\u003eAffected parties\u003c/h2\u003e\n\n\u003cp\u003eThe affected users are people in the European Economic Area, the UK, and Switzerland whose IP addresses may be used for Google ad measurement and personalization. The affected business parties include advertisers using Google advertising systems, because Google’s notice reminds them they remain responsible for consent compliance.\u003c/p\u003e\n\n\u003cp\u003eGoogle’s customer email says advertisers remain bound by the company’s EU User Consent Policy. The article states that advertisers must obtain valid consent from users in the affected regions.\u003c/p\u003e\n\n\u003ch2 id=\"user-options-described-in-the-article\"\u003eUser options described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article says the user-facing choice over IP-based personalization will not arrive until later in Google’s rollout. Until then, it lists the available controls as the familiar ones.\u003c/p\u003e\n\n\u003cp\u003eUsers can decline non-essential cookies and consent prompts. They can also review ad personalization settings under their Google account at myadcenter.google.com.\u003c/p\u003e\n\n\u003ch2 id=\"core-takeaway\"\u003eCore takeaway\u003c/h2\u003e\n\n\u003cp\u003eGoogle is changing how it uses IP addresses in the EEA, UK, and Switzerland by applying them to ad measurement and personalization, not merely to routing traffic or delivering ads. Because IP addresses are treated as personal data in those regions and device identification is tied to fingerprinting concerns, the rollout raises a consent issue that Google places on advertisers under its EU User Consent Policy.\u003c/p\u003e\n","keyPoints":["Google has begun notifying advertisers that it will start using IP addresses for ad measurement and personalization across the European Economic Area, the UK, and Switzerland on or shortly after August 3, 2026.","The change means IP addresses that Google already receives for traffic routing and ad delivery will also be used to identify devices for measurement and ad personalization.","Google will register under IAB Europe’s Transparency and Consent Framework for Feature 3, which covers identifying devices based on automatically transmitted information such as IP addresses.","The article states that IP addresses are personal data under GDPR in the EEA, the UK, and Switzerland, and that using them to identify devices is a building block of fingerprinting.","Google’s customer email says advertisers remain bound by its EU User Consent Policy and must obtain valid consent from users in the affected regions."],"insights":["Google is not newly collecting IP addresses for this rollout; the article says the significant change is that already-received IP addresses will be repurposed for device identification, measurement, and ad personalization.","Google’s registration for IAB Europe TCF Feature 3 does not itself create a separate consent step, but it links IP-based device identification to personalization purposes that require user consent.","The rollout comes after the UK ICO criticized Google’s 2024 reversal on fingerprinting and shortly after the ICO advised that consent should remain mandatory for cross-service profiling.","Google’s user-facing choice for IP-based personalization will arrive later in the rollout, while advertisers are immediately being reminded that they must obtain valid consent under Google’s EU User Consent Policy."],"referencedReports":[{"title":"Our advice to government on potential changes to online advertising rules","url":"https://ico.org.uk/about-the-ico/media-centre/news-and-blogs/2026/05/our-advice-to-government-on-potential-changes-to-online-advertising-rules/","publisher":"Information Commissioner's Office","context":"The article cites the ICO's May 2026 advice to the UK government on changing consent rules for online advertising, noting that consent would remain mandatory for tracking that profiles people across services.","category":"","primary":false}],"body":"\u003cp\u003eGoogle has begun notifying advertisers that it will start using IP addresses for ad measurement and personalization across the European Economic Area, the UK, and Switzerland on or shortly after August 3, 2026. The article says Google already receives these IP addresses through customer tags, SDKs, HTTP calls, and uploads, but the change is that the addresses will be used to identify devices for measurement and ad personalization. In the affected regions, that use triggers consent requirements because IP addresses are regulated as personal data.\u003c/p\u003e\n\n\u003cp\u003eGoogle will register under IAB Europe’s Transparency and Consent Framework for Feature 3, which covers identifying devices based on automatically transmitted information such as IP addresses. The article frames this as significant because IP-based device identification is a building block of fingerprinting, especially where cookies are blocked or cleared. Google says advertisers remain responsible for obtaining valid consent under its EU User Consent Policy, while user-facing choices for IP-based personalization will come later in the rollout.\u003c/p\u003e\n"},{"n":3,"title":"Operationalize CISA BOD 26-04 with Tenable One","source":"tenable.com","sourceColorIdx":5,"link":"https://www.tenable.com/blog/cisa-bod-26-04-tenable-helps-federal-agencies-comply","time":"18:15","priority":"MAY READ","score":51,"tldr":"Tenable says CISA BOD 26-04 pushes federal agencies from static CVSS-based patching to continuous, risk-based exposure management using asset exposure, KEV status, exploit automation and technical impact. The article argues Tenable One can operationalize those requirements through continuous asset discovery, threat intelligence, automation, cloud coverage and CDM-aligned tagging.","briefOverview":"\u003cp\u003eCISA’s Binding Operational Directive 26-04 supersedes BOD 19-02 and BOD 22-01 and shifts federal vulnerability management away from static severity scores such as CVSS. The article says agencies must now prioritize remediation using a dynamic model based on asset exposure, KEV status, exploit automation, and technical impact. Tenable presents Tenable One as a platform for operationalizing these requirements through continuous asset discovery, threat validation, and automated orchestration.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that BOD 26-04 timelines are not static because they can change when a vulnerability is added to the KEV catalog, an asset becomes internet-exposed, or Vulnrichment metadata changes. Tenable says asset exposure is the highest-leverage compliance variable, stating that removing assets from public exposure can shift 76.7% of CVEs from compressed remediation timelines to the deferral tier. It also states that 83% of actively exploited CVEs yield total system control, making forensic triage a routine operational concern under the directive.\u003c/p\u003e\n\n\u003cp\u003eTenable argues that federal agencies need platform-scale automation to meet BOD 26-04’s phased requirements, including policy updates, process updates, remediation, and asset metadata tagging. The article highlights Tenable Hexa AI, API integrations, CDM Dashboard support, Attack Surface Management, Vulnerability Priority Rating, and Tenable One Cloud Exposure as capabilities intended to support the directive. It also says BOD 26-04 applies to federal information systems in third-party and cloud environments, including FedRAMP-certified and non-certified cloud infrastructure.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA’s BOD 26-04 is described as a major change in federal vulnerability management because it supersedes BOD 19-02 and BOD 22-01 and moves agencies away from prioritizing remediation based on static scores such as CVSS. The article says the directive was driven by AI-powered threats and sophisticated adversary campaigns, and it requires agencies to use real-world asset and threat context. Tenable frames the directive as an acceleration from vulnerability management toward exposure management.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies four risk variables that drive remediation timelines under BOD 26-04: asset exposure, KEV status, exploit automation, and technical impact. Tenable One is presented as mapping to these variables through continuous discovery of internet-facing assets, integration with CISA’s KEV catalog, VPR-based assessment of exploit maturity, and CVSS-based technical impact context. The article stresses that compliance is continuous because these variables can change over time.\u003c/p\u003e\n\n\u003cp\u003eTenable highlights asset exposure as the most powerful operational lever in its analysis of the CISA Vulnrichment corpus. The article states that removing an asset from public exposure can shift 76.7% of CVEs from compressed remediation timelines to the deferral tier. It positions Attack Surface Management and asset exposure context as central to both security and compliance under BOD 26-04.\u003c/p\u003e\n\n\u003cp\u003eThe article also emphasizes threat intelligence and vulnerability research as a way to anticipate compressed remediation timelines. It says Tenable Vulnerability Watch can identify exploited vulnerabilities before they appear in CISA’s KEV catalog, and that Tenable has identified more than 4,400 vulnerabilities with automatable, total-system-control, proof-of-concept profiles that are not yet on KEV. It further states that 61% of actively exploited vulnerabilities cannot be automated, so remediation based only on automatable exploitation would miss many active threats.\u003c/p\u003e\n\n\u003cp\u003eBOD 26-04 introduces a forensic triage requirement for KEV-listed vulnerabilities that yield total system control, and the article says this is not a niche case because 83% of actively exploited CVEs yield total system control. Tenable says its threat attribution and campaign context can help forensic teams determine what to look for, including actor activity, tools, infrastructure signatures, and sector targeting. The article describes this as turning a compliance requirement into an informed investigation.\u003c/p\u003e\n\n\u003cp\u003eThe article presents Tenable One, Tenable Hexa AI, API integrations, CDM metadata tagging, Attack Surface Management, Vulnerability Management, Security Center, and Cloud Exposure as capabilities relevant to BOD 26-04 implementation. It says agencies must update policies immediately, update processes within 60 days, and remediate assets and tag metadata within 180 days. It also notes that BOD 26-04 applies to all federal information systems, including third-party and cloud environments, and says Tenable One Cloud Exposure helps validate CSP infrastructure alignment with the directive.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article explains how CISA’s Binding Operational Directive 26-04 changes federal vulnerability management requirements and presents Tenable One as a platform for operationalizing them. It states that BOD 26-04 supersedes BOD 19-02 and BOD 22-01, consolidating previous federal guidance into a single framework. The directive moves agencies away from using static vulnerability severity scores, such as CVSS, as the main basis for patch urgency.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, BOD 26-04 requires a dynamic, risk-based vulnerability prioritization model driven by real-world asset and threat context. Tenable says this shift is driven by the rapid acceleration of AI-powered threats and increasingly sophisticated adversary campaigns. The article frames the directive as a move from traditional vulnerability management to exposure management.\u003c/p\u003e\n\n\u003ch2 id=\"core-bod-26-04-risk-variables\"\u003eCore BOD 26-04 risk variables\u003c/h2\u003e\n\n\u003cp\u003eThe article says BOD 26-04 requires remediation timelines to be driven by four specific risk variables:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAsset exposure\u003c/li\u003e\n\u003cli\u003eKEV status\u003c/li\u003e\n\u003cli\u003eExploit automation\u003c/li\u003e\n\u003cli\u003eTechnical impact\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eTenable presents Tenable One as mapping directly to these variables by providing continuous visibility, asset discovery, threat validation, vulnerability prioritization, and automation.\u003c/p\u003e\n\n\u003ch2 id=\"asset-exposure\"\u003eAsset exposure\u003c/h2\u003e\n\n\u003cp\u003eFor asset exposure, the directive asks whether the vulnerable asset is publicly exposed to the internet. The article says Tenable One uses sensors and third-party data connectors to determine whether a device is internet-facing or has a public IP address. It also says Tenable’s Asset Criticality Rating incorporates external exposure context by considering asset location, network connectivity, and security controls.\u003c/p\u003e\n\n\u003cp\u003eTenable One Attack Surface Management is described as providing continuous discovery and identification of internet-facing assets. The article contrasts this with point-in-time snapshots and says Tenable One gives agencies an always-on, outside-in view of public exposure.\u003c/p\u003e\n\n\u003cp\u003eThe article presents asset exposure as the highest-leverage compliance variable based on Tenable’s analysis of the CISA Vulnrichment corpus against BOD 26-04’s tiered model. It states that removing an asset from public exposure can shift 76.7% of CVEs from compressed remediation timelines to the deferral tier. The article argues that attack surface reduction is both a security measure and the most efficient path to compliance under BOD 26-04.\u003c/p\u003e\n\n\u003ch2 id=\"kev-status\"\u003eKEV status\u003c/h2\u003e\n\n\u003cp\u003eFor KEV status, the directive asks whether a vulnerability is tracked in CISA’s Known Exploited Vulnerabilities catalog. The article says Tenable integrates CISA’s KEV catalog into Vulnerability Priority Rating scoring and compliance workflows. It also says Tenable Vulnerability Watch provides early identification of vulnerabilities exploited in the wild before they appear in the KEV catalog.\u003c/p\u003e\n\n\u003cp\u003eThe article describes this early warning as a compliance advantage because BOD 26-04 timelines compress immediately when a CVE is added to KEV. It says organizations with advance warning can begin remediation before the mandatory clock starts.\u003c/p\u003e\n\n\u003ch2 id=\"exploit-automation\"\u003eExploit automation\u003c/h2\u003e\n\n\u003cp\u003eFor exploit automation, the directive asks whether an adversary can fully automate all steps needed to exploit the vulnerability. The article says Tenable VPR scoring assesses exploit maturity by evaluating whether functional exploit code exists, whether exploitation has been observed at scale, and how accessible the exploitation path is. It also says Tenable’s Asset Exposure Score contextualizes risk by evaluating an asset’s exposure posture in the organization’s environment.\u003c/p\u003e\n\n\u003cp\u003eThe article includes a notable finding from Tenable’s analysis of more than 154,000 enriched CVEs in the CISA Vulnrichment corpus. It states that 61% of actively exploited vulnerabilities cannot be automated. The article says this means organizations that focus exclusively on automatable vulnerabilities will miss the majority of active threats, and it says Tenable accounts for this by incorporating threat actor context, campaign intelligence, and exploitation breadth alongside automation maturity.\u003c/p\u003e\n\n\u003ch2 id=\"technical-impact\"\u003eTechnical impact\u003c/h2\u003e\n\n\u003cp\u003eFor technical impact, the directive asks whether exploitation gives an attacker partial or total control of an asset. The article says Tenable integrates CVSS base scores and severity assessments for every CVE to provide impact context for this distinction. It also says Tenable One can identify technical impact at platform scale and isolate vulnerabilities that fall into the highest-severity compliance tiers.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Tenable’s operational assessment found that 83% of actively exploited CVEs yield total system control. It says total control combined with KEV status on an internet-facing asset triggers the most aggressive compliance tier: three days with mandatory forensic triage. Because the article describes total control as common among exploited vulnerabilities, it says agencies should plan for forensic triage as a routine operational demand rather than an edge case.\u003c/p\u003e\n\n\u003ch2 id=\"continuous-compliance-and-changing-timelines\"\u003eContinuous compliance and changing timelines\u003c/h2\u003e\n\n\u003cp\u003eThe article stresses that BOD 26-04 timelines are not static. It says timelines shift whenever a risk variable changes, such as when a CVE is added to KEV, an asset becomes newly exposed to the internet, or a Vulnrichment assessment changes from non-automatable to automatable. It states that compliance is a continuous state rather than a point-in-time assessment.\u003c/p\u003e\n\n\u003cp\u003eTenable says Tenable One’s continuous monitoring capabilities allow an agency’s prioritization to shift in real time when variables change, rather than waiting for the next scan cycle.\u003c/p\u003e\n\n\u003ch2 id=\"tenable-vulnerability-research-and-predictive-prioritization\"\u003eTenable vulnerability research and predictive prioritization\u003c/h2\u003e\n\n\u003cp\u003eThe article says Tenable has identified more than 4,400 vulnerabilities with the highest-risk technical profile: automatable, total system control, and proof-of-concept available. These vulnerabilities are not yet on the KEV catalog, according to the article. It states that if any of these CVEs receive confirmed exploitation evidence, they immediately move into the most aggressive BOD timeline of three days with mandatory forensic triage.\u003c/p\u003e\n\n\u003cp\u003eTenable Vulnerability Watch and VPR scoring are described as flagging CVEs based on exploit maturity, proof-of-concept availability, and technical impact severity. The article says this gives security teams a prioritized remediation queue that anticipates KEV additions instead of reacting only after they occur.\u003c/p\u003e\n\n\u003cp\u003eThe article also says Tenable’s intelligence is produced through a structured methodology that assesses vulnerabilities, threat actors, campaigns, and environmental exposures as independent but interrelated risk dimensions. Tenable’s research team is described as tracking persistent exploitation at the levels of individual CVEs, vendor product lines, and entire technology classes.\u003c/p\u003e\n\n\u003ch2 id=\"forensic-triage-requirement\"\u003eForensic triage requirement\u003c/h2\u003e\n\n\u003cp\u003eThe article says BOD 26-04 introduces a forensic triage requirement that did not exist in prior directives. For CVEs that are both on KEV and yield total system control, agencies must assess whether compromise has already occurred while remediating within three days. The article points to Table 1 rows 1, 3, and 9 within the BOD for these cases.\u003c/p\u003e\n\n\u003cp\u003eTenable says this is not a niche compliance edge case because 83% of actively exploited CVEs yield total system control. The article states that effective forensic triage requires knowing what to look for. It says Tenable provides threat attribution and campaign context, including which actor is exploiting the vulnerability, what tools and infrastructure signatures are used, and whether exploitation is part of a coordinated campaign targeting the agency’s sector.\u003c/p\u003e\n\n\u003ch2 id=\"phased-implementation-and-automation\"\u003ePhased implementation and automation\u003c/h2\u003e\n\n\u003cp\u003eThe article describes BOD 26-04 as having strict phased implementation timelines:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePhase 1 requires agencies to update policies immediately.\u003c/li\u003e\n\u003cli\u003ePhase 2 requires agencies to update processes within 60 days.\u003c/li\u003e\n\u003cli\u003ePhase 3 requires agencies to actively remediate assets and tag metadata within 180 days.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article argues that manually evaluating four complex variables across thousands of vulnerabilities and thousands of assets is not feasible for human analysts. It presents Tenable Hexa AI as an agentic AI engine in Tenable One that orchestrates automated security workflows at machine speed. It says Tenable Hexa AI applies risk intelligence at platform scale and surfaces the vulnerabilities that matter most so agencies can meet compressed timelines without scaling their teams linearly.\u003c/p\u003e\n\n\u003cp\u003eThe article also says Phase 3 requires agencies to continuously identify and tag all assets reachable outside the internal network with metadata covering organization, environment, exposure, and asset type. Tenable says its API integrations can automate this metadata tagging and feed structured data into the federal Continuous Diagnostics and Mitigation Dashboard.\u003c/p\u003e\n\n\u003ch2 id=\"third-party-and-cloud-environments\"\u003eThird-party and cloud environments\u003c/h2\u003e\n\n\u003cp\u003eThe article states that BOD 26-04 applies to all federal information systems, including systems hosted in third-party and cloud environments. It says agencies are responsible for ensuring underlying infrastructure follows the directive, whether they work with the FedRAMP PMO for certified offerings or directly with cloud service providers for non-certified environments.\u003c/p\u003e\n\n\u003cp\u003eTenable One Cloud Exposure is presented as helping agencies audit and validate that CSP infrastructures align with BOD 26-04 guidelines. The article says Tenable One unifies data across internet-facing assets, traditional IT, and cloud to provide centralized exposure oversight.\u003c/p\u003e\n\n\u003ch2 id=\"tenable-products-and-capabilities-discussed\"\u003eTenable products and capabilities discussed\u003c/h2\u003e\n\n\u003cp\u003eThe article describes several Tenable offerings and capabilities in relation to BOD 26-04:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTenable One Exposure Management Platform for continuous asset discovery, threat validation, and automated orchestration.\u003c/li\u003e\n\u003cli\u003eTenable One Attack Surface Management for continuous discovery of internet-facing assets.\u003c/li\u003e\n\u003cli\u003eAsset Criticality Rating for incorporating exposure context.\u003c/li\u003e\n\u003cli\u003eVulnerability Priority Rating for prioritization and KEV integration.\u003c/li\u003e\n\u003cli\u003eAsset Exposure Score for contextualizing asset exposure posture.\u003c/li\u003e\n\u003cli\u003eTenable Vulnerability Watch for early identification of exploited vulnerabilities.\u003c/li\u003e\n\u003cli\u003eTenable Hexa AI for AI-powered workflow automation.\u003c/li\u003e\n\u003cli\u003eTenable API integrations for metadata tagging and CDM Dashboard integration.\u003c/li\u003e\n\u003cli\u003eTenable One Cloud Exposure for cloud and third-party infrastructure oversight.\u003c/li\u003e\n\u003cli\u003eTenable Security Center and Tenable One Vulnerability Management for baseline KEV identification and asset segmentation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"limits-of-baseline-vulnerability-management-tools\"\u003eLimits of baseline vulnerability management tools\u003c/h2\u003e\n\n\u003cp\u003eThe article says Tenable Security Center and Tenable One Vulnerability Management natively handle core baseline requirements such as KEV status integration and asset segmentation. However, it argues that BOD 26-04 requires localized context and tracking of CISA Stakeholder Specific Vulnerability Categorization Vulnrichment metadata, including exploit automation and technical impact keys.\u003c/p\u003e\n\n\u003cp\u003eThe article says manually importing, filtering, and cross-referencing public Vulnrichment data against an enterprise network requires the scale that Tenable One provides. It presents Tenable One as an ingestion and orchestration engine for advanced BOD 26-04 data requirements, including native Vulnrichment filtering and dynamic merging of internal vulnerability data with Attack Surface Management data.\u003c/p\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall significance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central message is that BOD 26-04 requires federal agencies to prioritize vulnerability remediation using continuously changing risk context rather than static severity scores. It presents asset exposure, KEV status, exploit automation, and technical impact as the directive’s key operational variables. Tenable argues that Tenable One provides the platform-scale visibility, intelligence, automation, cloud coverage, and metadata integration needed to meet the directive’s compliance timelines and turn compliance activity into exposure reduction.\u003c/p\u003e\n","keyPoints":["CISA BOD 26-04 supersedes BOD 19-02 and BOD 22-01 and shifts federal vulnerability management away from static severity scores toward dynamic prioritization based on real-world asset and threat context.","BOD 26-04 requires remediation timelines to be driven by four risk variables: asset exposure, KEV status, exploit automation and technical impact.","Tenable One is presented as mapping to BOD 26-04 requirements by providing continuous asset discovery, attack surface management, threat validation, vulnerability prioritization and automated orchestration.","The article states that Tenable analysis found asset exposure is the highest-leverage compliance variable, with removal from public exposure shifting 76.7% of CVEs from compressed remediation timelines to the deferral tier.","BOD 26-04 introduces a forensic triage requirement for KEV-listed vulnerabilities that yield total system control, and Tenable says 83% of actively exploited CVEs yield total system control."],"insights":["Reducing public internet exposure is presented as the most efficient compliance lever because Tenable found it can move 76.7% of CVEs out of compressed remediation timelines and into the deferral tier.","The article warns that prioritizing only automatable exploits would miss many real-world threats because Tenable found that 61% of actively exploited vulnerabilities cannot be automated.","Federal agencies should treat forensic triage as a routine operational requirement rather than an exception because Tenable says 83% of actively exploited CVEs yield total system control.","Tenable identifies more than 4,400 vulnerabilities with an automatable, total-control, proof-of-concept profile that are not yet in CISA’s KEV catalog but could immediately trigger the most aggressive BOD timeline if exploitation is confirmed.","The article emphasizes that BOD 26-04 compliance can change immediately when variables such as KEV status, internet exposure, or Vulnrichment automation assessments change, making periodic scan-based prioritization insufficient."],"referencedReports":[{"title":"Binding Operational Directive 26-04: Prioritizing Security Updates Based on Risk","url":"https://www.cisa.gov/news-events/directives/bod-26-04-prioritizing-security-updates-based-risk","publisher":"CISA","context":"The article is built around CISA’s BOD 26-04 and explains how Tenable One can help federal agencies operationalize its risk-based vulnerability remediation requirements.","category":"","primary":false}],"body":"\u003cp\u003eCISA’s Binding Operational Directive 26-04 supersedes BOD 19-02 and BOD 22-01 and shifts federal vulnerability management away from static severity scores such as CVSS. The article says agencies must now prioritize remediation using a dynamic model based on asset exposure, KEV status, exploit automation, and technical impact. Tenable presents Tenable One as a platform for operationalizing these requirements through continuous asset discovery, threat validation, and automated orchestration.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that BOD 26-04 timelines are not static because they can change when a vulnerability is added to the KEV catalog, an asset becomes internet-exposed, or Vulnrichment metadata changes. Tenable says asset exposure is the highest-leverage compliance variable, stating that removing assets from public exposure can shift 76.7% of CVEs from compressed remediation timelines to the deferral tier. It also states that 83% of actively exploited CVEs yield total system control, making forensic triage a routine operational concern under the directive.\u003c/p\u003e\n\n\u003cp\u003eTenable argues that federal agencies need platform-scale automation to meet BOD 26-04’s phased requirements, including policy updates, process updates, remediation, and asset metadata tagging. The article highlights Tenable Hexa AI, API integrations, CDM class ErrorBoundary extends React.Component {

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}
