<script type="application/json" id="dl-articles">[{"n":25,"title":"Miasma Mini Shai-Hulud Hits ImmobiliareLabs npm Packages","source":"socket.dev","sourceColorIdx":2,"link":"https://socket.dev/blog/miasma-mini-shai-hulud-hits-immobiliarelabs-npm-packages?utm_medium=feed","time":"16:27","priority":"MUST READ","score":96,"tldr":"The Miasma Mini Shai-Hulud supply chain campaign has expanded to compromise legitimate `@immobiliarelabs` Backstage plugins on npm, using stealthy payloads and GitHub Actions abuse to steal developer and CI/CD secrets.","briefOverview":"\u003cp\u003eThe Miasma Mini Shai-Hulud supply chain campaign has expanded to compromise 22 npm packages published under the \u003ccode\u003e@immobiliarelabs\u003c/code\u003e scope, including Backstage plugins used for GitLab integration and LDAP authentication. The malicious releases occurred in a tight window on June 26, 2026, with multiple historical versions republished to maximize exposure across users pinned to older major versions. This follows the same broader campaign pattern previously observed in LeoPlatform and RStreams packages.\u003c/p\u003e\n\n\u003cp\u003eInitial analysis of the compromised packages reveals a stealthy execution path designed to evade shallow review. Rather than relying on visible preinstall or postinstall scripts, the malware uses a \u0026ldquo;Phantom Gyp\u0026rdquo; trick where a \u003ccode\u003ebinding.gyp\u003c/code\u003e file triggers node-gyp command expansion to invoke a root-level \u003ccode\u003eindex.js\u003c/code\u003e. This index.js performs Caesar-shift decryption followed by AES-128-GCM decryption to deliver multi-stage payloads that download and execute under the Bun runtime if necessary, ultimately stealing a comprehensive range of developer and CI/CD secrets including npm tokens, GitHub tokens, cloud credentials, SSH keys, and Kubernetes configs.\u003c/p\u003e\n\n\u003cp\u003eThe campaign also abuses GitHub Actions through deployment triggers, which can execute workflows without directly modifying workflow files and potentially bypass the \u003ccode\u003eworkflow\u003c/code\u003e OAuth scope. A public workflow run linked to the \u003ccode\u003esimonecorsi\u003c/code\u003e account shows a deployment-triggered execution disguised as \u0026ldquo;Dependabot Updates.\u0026rdquo; Investigators identified the compromised \u003ccode\u003ecodfish/semantic-release-action\u003c/code\u003e GitHub Action as a high-priority lead for the upstream access path, after it was force-pushed with malicious commits on June 24, 2026, causing downstream runners to execute attacker-controlled code. This provides a plausible route from a third-party Action compromise to gaining the credentials needed to publish malicious ImmobiliareLabs package versions.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["On June 26, 2026, 22 npm packages under the @immobiliarelabs scope, including Backstage plugins for GitLab and LDAP authentication, were published with malicious payloads as part of the Miasma Mini Shai-Hulud campaign.","The malicious packages execute hidden JavaScript code using a 'Phantom Gyp' trick that invokes node index.js through a binding.gyp file, avoiding reliance on preinstall or postinstall scripts.","The payloads steal a wide range of developer and CI/CD secrets including .env files, npm/PyPI/GitHub/Slack/AWS/Azure/GCP/Vault tokens, SSH keys, Docker credentials, and Kubernetes configs, and exfiltrate them via the GitHub API.","A compromised third-party GitHub Action, codfish/semantic-release-action, is a high-priority lead as a possible upstream access path, after it was force-pushed with malicious commits that executed obfuscated JavaScript in downstream CI/CD runners.","Attackers used GitHub Actions deployment triggers to execute workflows without modifying the workflow file itself, potentially bypassing the 'workflow' OAuth scope and compromising npm publishing credentials and repository secrets."],"insights":["The payloads use a multi-stage delivery mechanism that first checks for and downloads the Bun runtime if necessary, enabling execution of final malware outside the typical Node.js environment and potentially bypassing Node-specific security controls.","Attackers abuse GitHub Actions deployment triggers to execute malicious workflows without modifying workflow files directly, exploiting a gap that can bypass the 'workflow' OAuth scope protection and remain hidden from defenders who only review code changes.","The campaign injects persistence hooks into AI coding assistant plugins and IDE extensions (e.g., Claude hooks, Cursor rules, .vscode tasks) to maintain long-term access in developer environments, beyond one-time secret theft.","The consistent reuse of the intentionally misspelled string 'thebeautifulsnadsoftime' across multiple waves provides a strong campaign fingerprint for threat hunters to identify and cluster related malicious artifacts."],"referencedReports":[],"body":"\u003cp\u003eThe Miasma Mini Shai-Hulud supply chain campaign has expanded to compromise 22 npm packages published under the \u003ccode\u003e@immobiliarelabs\u003c/code\u003e scope, including Backstage plugins used for GitLab integration and LDAP authentication. The malicious releases occurred in a tight window on June 26, 2026, with multiple historical versions republished to maximize exposure across users pinned to older major versions. This follows the same broader campaign pattern previously observed in LeoPlatform and RStreams packages.\u003c/p\u003e\n\n\u003cp\u003eInitial analysis of the compromised packages reveals a stealthy execution path designed to evade shallow review. Rather than relying on visible preinstall or postinstall scripts, the malware uses a \u0026ldquo;Phantom Gyp\u0026rdquo; trick where a \u003ccode\u003ebinding.gyp\u003c/code\u003e file triggers node-gyp command expansion to invoke a root-level \u003ccode\u003eindex.js\u003c/code\u003e. This index.js performs Caesar-shift decryption followed by AES-128-GCM decryption to deliver multi-stage payloads that download and execute under the Bun runtime if necessary, ultimately stealing a comprehensive range of developer and CI/CD secrets including npm tokens, GitHub tokens, cloud credentials, SSH keys, and Kubernetes configs.\u003c/p\u003e\n\n\u003cp\u003eThe campaign also abuses GitHub Actions through deployment triggers, which can execute workflows without directly modifying workflow files and potentially bypass the \u003ccode\u003eworkflow\u003c/code\u003e OAuth scope. A public workflow run linked to the \u003ccode\u003esimonecorsi\u003c/code\u003e account shows a deployment-triggered execution disguised as \u0026ldquo;Dependabot Updates.\u0026rdquo; Investigators identified the compromised \u003ccode\u003ecodfish/semantic-release-action\u003c/code\u003e GitHub Action as a high-priority lead for the upstream access path, after it was force-pushed with malicious commits on June 24, 2026, causing downstream runners to execute attacker-controlled code. This provides a plausible route from a third-party Action compromise to gaining the credentials needed to publish malicious ImmobiliareLabs package versions.\u003c/p\u003e\n"},{"n":28,"title":"Critical Unauthenticated Remote Code Execution in Splunk Enterprise (CVE-2026-20253)","source":"zscaler.com","sourceColorIdx":5,"link":"https://www.zscaler.com/blogs/security-research/critical-unauthenticated-remote-code-execution-splunk-enterprise-cve-2026","time":"16:41","priority":"MUST READ","score":96,"tldr":"A critical unauthenticated remote code execution vulnerability (CVE-2026-20253) in Splunk Enterprise allows attackers to exploit a PostgreSQL sidecar service recovery endpoint via Splunk Web to achieve arbitrary file write and code execution; active exploitation has been confirmed, and federal agencies must patch immediately.","briefOverview":"\u003cp\u003eOn June 10, 2026, Splunk disclosed CVE-2026-20253, a critical unauthenticated remote code execution vulnerability in Splunk Enterprise scoring 9.8 on the CVSS scale. The flaw arises from missing authentication on a PostgreSQL sidecar service recovery endpoint that is reachable through the Splunk Web interface, which acts as a reverse proxy without enforcing access controls. Versions 10.2.x prior to 10.2.4 and 10.0.x prior to 10.0.7 are affected, while version 9.4 and earlier are not vulnerable. By June 18, CISA added the vulnerability to its Known Exploited Vulnerabilities catalog and mandated federal agencies remediate by June 21 under Binding Operational Directive 26-04, after Splunk confirmed active exploitation in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe attack chain begins with an unauthenticated HTTP request to the exposed recovery endpoint, which accepts an empty Authorization header. An attacker leverages path traversal in the backupFile parameter to create or truncate files at arbitrary filesystem locations, then injects connection string parameters to redirect the database connection to an attacker-controlled server. This allows dumping attacker-supplied content to disk, turning a file creation primitive into an arbitrary file write. By pointing the connection at the local .pgpass file containing plaintext credentials, the attacker authenticates as the privileged postgres_admin user without knowing the password, and ultimately overwrites a scheduled Python script to achieve code execution under the Splunk service account.\u003c/p\u003e\n\n\u003cp\u003eAfter compromise, an attacker can tamper with or delete security telemetry, harvest credentials and API keys from indexed data, disable logging, and pivot laterally into the internal network from the trusted Splunk host. Organizations are urged to upgrade to fixed versions, or temporarily disable the PostgreSQL sidecar service if upgrading is not immediately possible, though this workaround breaks Edge Processor, OpAmp, and SPL2 data pipelines. Placing the Splunk Web interface behind a zero trust access layer is recommended to reduce exposure, especially in AWS deployments where the vulnerable sidecar may be enabled by default.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["CVE-2026-20253 is a critical unauthenticated remote code execution vulnerability in Splunk Enterprise caused by missing authentication on a PostgreSQL sidecar service recovery endpoint reachable via the Splunk Web proxy.","CISA added CVE-2026-20253 to its Known Exploited Vulnerabilities catalog on June 18, 2026, ordering federal agencies to remediate by June 21, 2026 under Binding Operational Directive 26-04.","Attackers can chain path traversal, connection string injection, and reuse of the .pgpass credential file to write arbitrary files and execute code as the Splunk service account.","Splunk Enterprise versions 10.2.x prior to 10.2.4 and 10.0.x prior to 10.0.7 are affected, while version 9.4 and earlier are not.","After compromise, an attacker can tamper with logs, harvest stored credentials, and use the Splunk host to move laterally into the victim's network."],"insights":["The vulnerability hinges on the proxy passing requests to a localhost-only sidecar endpoint without any authentication enforcement, and the sidecar itself accepts an empty Authorization header (Basic Og==), completely bypassing access control without any credential guessing.","Attackers can supply a connection string in the database parameter (e.g., hostaddr=attacker-db.com) to replace the target host, transforming a file-truncation bug into a full arbitrary file write by dumping attacker-controlled data from an external PostgreSQL server.","Splunk stores plaintext credentials in a .pgpass file, and an attacker injects a passfile parameter in the connection string to force the system to read that file, authenticating as the privileged user without knowing the password and enabling remote code execution.","The temporary workaround of disabling the PostgreSQL sidecar service breaks Edge Processor, OpAmp, and SPL2 data pipelines, but leaves core search and indexing unaffected, forcing organizations to choose between remediation and operational functionality.","CISA's emergency directive mandated federal agencies to patch within three days of the KEV listing, an unusually rapid deadline that signals both confirmed active exploitation and the extreme risk a compromised Splunk instance poses for log tampering and lateral movement."],"referencedReports":[],"body":"\u003cp\u003eOn June 10, 2026, Splunk disclosed CVE-2026-20253, a critical unauthenticated remote code execution vulnerability in Splunk Enterprise scoring 9.8 on the CVSS scale. The flaw arises from missing authentication on a PostgreSQL sidecar service recovery endpoint that is reachable through the Splunk Web interface, which acts as a reverse proxy without enforcing access controls. Versions 10.2.x prior to 10.2.4 and 10.0.x prior to 10.0.7 are affected, while version 9.4 and earlier are not vulnerable. By June 18, CISA added the vulnerability to its Known Exploited Vulnerabilities catalog and mandated federal agencies remediate by June 21 under Binding Operational Directive 26-04, after Splunk confirmed active exploitation in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe attack chain begins with an unauthenticated HTTP request to the exposed recovery endpoint, which accepts an empty Authorization header. An attacker leverages path traversal in the backupFile parameter to create or truncate files at arbitrary filesystem locations, then injects connection string parameters to redirect the database connection to an attacker-controlled server. This allows dumping attacker-supplied content to disk, turning a file creation primitive into an arbitrary file write. By pointing the connection at the local .pgpass file containing plaintext credentials, the attacker authenticates as the privileged postgres_admin user without knowing the password, and ultimately overwrites a scheduled Python script to achieve code execution under the Splunk service account.\u003c/p\u003e\n\n\u003cp\u003eAfter compromise, an attacker can tamper with or delete security telemetry, harvest credentials and API keys from indexed data, disable logging, and pivot laterally into the internal network from the trusted Splunk host. Organizations are urged to upgrade to fixed versions, or temporarily disable the PostgreSQL sidecar service if upgrading is not immediately possible, though this workaround breaks Edge Processor, OpAmp, and SPL2 data pipelines. Placing the Splunk Web interface behind a zero trust access layer is recommended to reduce exposure, especially in AWS deployments where the vulnerable sidecar may be enabled by default.\u003c/p\u003e\n"},{"n":2,"title":"CISA sets urgent deadline to fix Cisco flaw exploited in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-sets-urgent-deadline-to-fix-cisco-flaw-exploited-in-attacks/","time":"19:43","priority":"MUST READ","score":95,"tldr":"CISA has issued an urgent directive for federal agencies to patch a critical, actively exploited Cisco Unified Communications Manager vulnerability (CVE-2026-20230) and a remote code execution flaw in PTC Windchill and FlexPLM (CVE-2026-12569) by Sunday, June 28.","briefOverview":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency (CISA) has directed federal agencies to patch two critical vulnerabilities — CVE-2026-20230 in Cisco Unified Communications Manager and CVE-2026-12569 in PTC Windchill and FlexPLM — by Sunday, June 28. Both flaws were added to CISA\u0026rsquo;s Known Exploited Vulnerabilities catalog under Binding Operational Directive 26-04, requiring emergency action. CVE-2026-20230 is a server-side request forgery that can be exploited remotely without authentication via specially crafted HTTP requests; Cisco released a patch on June 3 after a proof-of-concept appeared, but last weekend the threat detection startup Defused confirmed it is now being actively exploited to write arbitrary text files to affected endpoints. The identity and motivation of the threat actor remain unknown.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-12569 is a critical remote code execution vulnerability in PTC\u0026rsquo;s Windchill and FlexPLM product lifecycle management software, used heavily in manufacturing, retail, footwear, and consumer goods industries. The flaw arises from deserialization of untrusted data due to improper input validation, affecting all versions up to 11.0 and multiple 11.1, 11.2, 12.0, 12.1, and 13.0 release branches. PTC published a security advisory on June 18, urging customers to apply mitigations immediately, and CISA\u0026rsquo;s same Sunday deadline compels government agencies to either patch or cease using the affected products by that date.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The U.S. Cybersecurity and Infrastructure Security Agency (CISA) has ordered federal agencies to patch CVE-2026-20230 and CVE-2026-12569 by Sunday, June 28.","CVE-2026-20230 is a critical server-side request forgery in Cisco Unified Communications Manager that is now being actively exploited to write arbitrary text files to affected systems.","CVE-2026-12569 is a critical remote code execution vulnerability in PTC Windchill and FlexPLM caused by improper input validation during deserialization.","Both vulnerabilities were added to CISA's Known Exploited Vulnerabilities catalog under Binding Operational Directive 26-04, mandating emergency remediation."],"insights":["The Cisco Unified CM vulnerability progressed from a publicly available proof-of-concept to active in-the-wild exploitation within roughly three weeks, illustrating an increasingly compressed timeline defenders must meet.","The exploitation technique observed so far—writing arbitrary text files—may be a stealthy initial step that could set the stage for more damaging actions like configuration tampering or remote access, but the attacker's ultimate objective remains unclear.","The unknown threat actor exploiting CVE-2026-20230 leaves incident responders with no known group-specific behaviors or indicators to guide detection, forcing them to rely solely on the vulnerability itself for defense."],"referencedReports":[{"title":"Windchill/FlexPLM Remote Code Execution Vulnerability Advisory","url":"https://www.ptc.com/en/about/trust-center/advisory-center/active-advisories/windchill-flexplm-rce-vulnerability","publisher":"PTC","context":"PTC disclosed the critical RCE vulnerability CVE-2026-12569 and published this advisory to list affected product versions and urge immediate remediation.","category":"","primary":false}],"body":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency (CISA) has directed federal agencies to patch two critical vulnerabilities — CVE-2026-20230 in Cisco Unified Communications Manager and CVE-2026-12569 in PTC Windchill and FlexPLM — by Sunday, June 28. Both flaws were added to CISA\u0026rsquo;s Known Exploited Vulnerabilities catalog under Binding Operational Directive 26-04, requiring emergency action. CVE-2026-20230 is a server-side request forgery that can be exploited remotely without authentication via specially crafted HTTP requests; Cisco released a patch on June 3 after a proof-of-concept appeared, but last weekend the threat detection startup Defused confirmed it is now being actively exploited to write arbitrary text files to affected endpoints. The identity and motivation of the threat actor remain unknown.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-12569 is a critical remote code execution vulnerability in PTC\u0026rsquo;s Windchill and FlexPLM product lifecycle management software, used heavily in manufacturing, retail, footwear, and consumer goods industries. The flaw arises from deserialization of untrusted data due to improper input validation, affecting all versions up to 11.0 and multiple 11.1, 11.2, 12.0, 12.1, and 13.0 release branches. PTC published a security advisory on June 18, urging customers to apply mitigations immediately, and CISA\u0026rsquo;s same Sunday deadline compels government agencies to either patch or cease using the affected products by that date.\u003c/p\u003e\n"},{"n":9,"title":"CISA Adds Exploited PTC Windchill RCE Flaw to KEV as Web Shell Attacks Continue","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cisa-adds-exploited-ptc-windchill-rce.html","time":"12:31","priority":"MUST READ","score":95,"tldr":"CISA added a critical remote code execution vulnerability (CVE-2026-12569) in PTC Windchill and FlexPLM to its Known Exploited Vulnerabilities catalog after confirming active exploitation involving JSP web shells, and has released indicators of compromise and mitigations.","briefOverview":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency (CISA) added a critical remote code execution vulnerability (CVE-2026-12569, CVSS 9.3) to its Known Exploited Vulnerabilities (KEV) catalog, affecting PTC\u0026rsquo;s Windchill PDMLink and FlexPLM product data and lifecycle management software. The flaw stems from improper input validation that allows attackers to execute arbitrary code via deserialization of untrusted data. This marks the first time a PTC product vulnerability has been included in the KEV catalog, emphasizing the seriousness of the threat.\u003c/p\u003e\n\n\u003cp\u003eDespite patches being released the previous week, PTC confirmed on June 25 that threat activity remained heightened, with unknown attackers exploiting the vulnerability to deploy JSP web shells on susceptible systems. The company shared specific indicators of compromise, including attacker IP addresses such as 5.180.41.35, a web shell file hash (55a1eb4c2d3da04376df39d7ba832569c6af1a37a0cf2b95f754ac898023a30c), and a predictable file naming pattern (/Windchill/login/[0-9a-f]{16}.jsp). The presence of a file named flst.txt in /tmp or the Windchill working directory was identified as confirmation of file-listing activity.\u003c/p\u003e\n\n\u003cp\u003ePTC advised immediate mitigation steps, including blocking the command-and-control address 5.180.41.35 at the firewall, searching logs for POST requests to the malicious JSP pattern, scanning filesystems for matching JSP files, and adding a WAF/IDS rule to block requests containing the custom header X-windchill-req. The rapid weaponization of this newly disclosed vulnerability highlights the need for swift patching and proactive threat hunting to limit exposure in enterprise environments.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The U.S. Cybersecurity and Infrastructure Security Agency (CISA) added CVE-2026-12569, a critical remote code execution flaw in PTC Windchill and FlexPLM software, to its Known Exploited Vulnerabilities catalog.","The vulnerability stems from improper input validation and can be exploited through deserialization of untrusted data to execute arbitrary code.","Despite patches being released last week, PTC confirmed continued active exploitation as of June 25, with attackers deploying JSP web shells on affected systems.","PTC released indicators of compromise including attacker IP addresses, a web shell file hash, and a naming pattern, along with mitigation steps like blocking a command-and-control address and scanning for suspicious JSP files.","This is the first PTC product vulnerability added to CISA's KEV catalog, highlighting the rapid weaponization of newly disclosed vulnerabilities."],"insights":["Attackers are using a custom HTTP header X-windchill-req, and a specific WAF/IDS rule to block it provides a low-false-positive detection mechanism.","The presence of a file named flst.txt in /tmp or the Windchill working directory is a unique forensic artifact that confirms attacker file-listing activity, beyond web shell deployment.","Despite the availability of a patch, exploitation continued at heightened levels, demonstrating how quickly threat actors can weaponize public vulnerabilities before many organizations apply fixes.","The predictable 16-hex-character naming pattern and known SHA256 hash of the web shells allow defenders to conduct high-fidelity file system scans and log queries instead of relying solely on behavioral detection."],"referencedReports":[{"title":"CISA Adds Two Known Exploited Vulnerabilities to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/25/cisa-adds-two-known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"CISA added CVE-2026-12569 to the Known Exploited Vulnerabilities catalog based on evidence of active exploitation, as reported in this alert.","category":"","primary":false},{"title":"Windchill FlexPLM RCE Vulnerability Advisory","url":"https://www.ptc.com/en/about/trust-center/advisory-center/active-advisories/windchill-flexplm-rce-vulnerability","publisher":"PTC","context":"PTC released this advisory containing indicators of compromise, mitigation steps, and confirmation of web shell deployment for the exploited CVE-2026-12569 vulnerability.","category":"","primary":false}],"body":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency (CISA) added a critical remote code execution vulnerability (CVE-2026-12569, CVSS 9.3) to its Known Exploited Vulnerabilities (KEV) catalog, affecting PTC\u0026rsquo;s Windchill PDMLink and FlexPLM product data and lifecycle management software. The flaw stems from improper input validation that allows attackers to execute arbitrary code via deserialization of untrusted data. This marks the first time a PTC product vulnerability has been included in the KEV catalog, emphasizing the seriousness of the threat.\u003c/p\u003e\n\n\u003cp\u003eDespite patches being released the previous week, PTC confirmed on June 25 that threat activity remained heightened, with unknown attackers exploiting the vulnerability to deploy JSP web shells on susceptible systems. The company shared specific indicators of compromise, including attacker IP addresses such as 5.180.41.35, a web shell file hash (55a1eb4c2d3da04376df39d7ba832569c6af1a37a0cf2b95f754ac898023a30c), and a predictable file naming pattern (/Windchill/login/[0-9a-f]{16}.jsp). The presence of a file named flst.txt in /tmp or the Windchill working directory was identified as confirmation of file-listing activity.\u003c/p\u003e\n\n\u003cp\u003ePTC advised immediate mitigation steps, including blocking the command-and-control address 5.180.41.35 at the firewall, searching logs for POST requests to the malicious JSP pattern, scanning filesystems for matching JSP files, and adding a WAF/IDS rule to block requests containing the custom header X-windchill-req. The rapid weaponization of this newly disclosed vulnerability highlights the need for swift patching and proactive threat hunting to limit exposure in enterprise environments.\u003c/p\u003e\n"},{"n":11,"title":"Google Details Turla's New STOCKSTAY Backdoor Used in Ukraine Espionage Attacks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/google-details-turlas-new-stockstay.html","time":"07:15","priority":"MUST READ","score":95,"tldr":"Google reveals Turla's new STOCKSTAY backdoor, a .NET-based malware sharing code with Kazuar, used in espionage attacks against Ukrainian government and military organizations and entities interested in Italian foreign policy.","briefOverview":"\u003cp\u003eGoogle Threat Intelligence Group (GTIG) has uncovered a new .NET backdoor called STOCKSTAY, attributed to the Russian state-sponsored Turla group. The malware has been used in cyber espionage campaigns primarily targeting Ukrainian government and military organizations, as well as entities with an interest in Italian foreign policy across several European countries. STOCKSTAY shares significant code and functional overlap with Turla’s established Kazuar backdoor, and development activity traces back to December 2022.\u003c/p\u003e\n\n\u003cp\u003eSTOCKSTAY employs a multi-component architecture consisting of a downloader (STOCKSTAY.MARKETMAKER), a tunneler (STOCKSTAY.STOCKBROKER), the main backdoor (STOCKSTAY.STOCKTRADER), and an orchestrator (STOCKSTAY.STOCKMARKET). Components communicate internally via WM_COPYDATA messages, a form of inter-process communication, while external command-and-control is conducted over a secure WebSocket connection using the open-source websocket-sharp library. A publicly accessible GitHub repository contained a Python-based WebSocket server controller that intentionally avoids decrypting inbound messages, concealing the location of the threat actor’s infrastructure.\u003c/p\u003e\n\n\u003cp\u003eAttack campaigns delivered STOCKSTAY through phishing emails with malicious RDP files, MSI installers hosted on GitHub, and RAR archives exploiting the WinRAR vulnerability CVE-2025-8088 as recently as November 2025. Google notes the malware was used both for initial access into unprofiled environments and as a post-exploitation tool on specific hosts after reconnaissance, sometimes deployed alongside Kazuar to test new capabilities. The overlaps in design and victimology suggest STOCKSTAY is being actively developed in the image of Turla’s long-standing Kazuar backdoor.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The Russian state-sponsored group Turla has deployed a previously undocumented .NET backdoor named STOCKSTAY against Ukrainian government and military organizations and entities interested in Italian foreign policy.","STOCKSTAY shares significant code and functional overlaps with Turla's existing Kazuar backdoor, with development activity dating back to December 2022.","The malware consists of distinct components that communicate via WM_COPYDATA messages and connect to command-and-control servers through secure WebSocket using the open-source websocket-sharp library.","Attack campaigns delivered STOCKSTAY through phishing emails with malicious RDP files and exploitation of the WinRAR vulnerability CVE-2025-8088, as recently as November 2025.","STOCKSTAY has been used for initial access into unprofiled environments and during post-exploitation after reconnaissance, sometimes deployed alongside Kazuar."],"insights":["The STOCKSTAY backdoor was originally designed to masquerade as a stock market data viewing tool, then adapted to mimic PDF viewers and calculator utilities, suggesting a deliberate social engineering ploy to appear as harmless financial or productivity software.","Turla published a Python WebSocket controller on a public GitHub repository that cannot decrypt inbound messages, intentionally preventing hosting platforms from inspecting traffic and obscuring the true location of C2 infrastructure.","STOCKSTAY serves dual roles as an initial access tool for unprofilized environments and as a post-exploitation payload on specific hosts after reconnaissance, indicating a flexible, multi-phase operational design.","Google assesses that Turla may be deploying STOCKSTAY alongside the established Kazuar backdoor to test new capabilities in live operations, particularly when expecting imminent remediation of existing access.","The malware components communicate via inter-process WM_COPYDATA messages rather than typical network-based coordination, a technique that can evade endpoint security solutions focused on network traffic."],"referencedReports":[{"title":"STOCKSTAY: Turla intelligence gathering","url":"https://cloud.google.com/blog/topics/threat-intelligence/stockstay-turla-intelligence-gathering","publisher":"Google Threat Intelligence Group","context":"The article is based entirely on this Google GTIG research, which details the STOCKSTAY backdoor's architecture, components, and operational use by Turla.","category":"","primary":false},{"title":"Turla Turns Kazuar Backdoor into Multi-Component Cyber Espionage Toolkit","url":"https://thehackernews.com/2026/05/turla-turns-kazuar-backdoor-into.html","publisher":"Microsoft Threat Intelligence / The Hacker News","context":"The article references Microsoft's detailed analysis of Kazuar's Kernel, Bridge, and Worker module architecture to establish code and functional overlaps with STOCKSTAY.","category":"","primary":false}],"body":"\u003cp\u003eGoogle Threat Intelligence Group (GTIG) has uncovered a new .NET backdoor called STOCKSTAY, attributed to the Russian state-sponsored Turla group. The malware has been used in cyber espionage campaigns primarily targeting Ukrainian government and military organizations, as well as entities with an interest in Italian foreign policy across several European countries. STOCKSTAY shares significant code and functional overlap with Turla’s established Kazuar backdoor, and development activity traces back to December 2022.\u003c/p\u003e\n\n\u003cp\u003eSTOCKSTAY employs a multi-component architecture consisting of a downloader (STOCKSTAY.MARKETMAKER), a tunneler (STOCKSTAY.STOCKBROKER), the main backdoor (STOCKSTAY.STOCKTRADER), and an orchestrator (STOCKSTAY.STOCKMARKET). Components communicate internally via WM_COPYDATA messages, a form of inter-process communication, while external command-and-control is conducted over a secure WebSocket connection using the open-source websocket-sharp library. A publicly accessible GitHub repository contained a Python-based WebSocket server controller that intentionally avoids decrypting inbound messages, concealing the location of the threat actor’s infrastructure.\u003c/p\u003e\n\n\u003cp\u003eAttack campaigns delivered STOCKSTAY through phishing emails with malicious RDP files, MSI installers hosted on GitHub, and RAR archives exploiting the WinRAR vulnerability CVE-2025-8088 as recently as November 2025. Google notes the malware was used both for initial access into unprofiled environments and as a post-exploitation tool on specific hosts after reconnaissance, sometimes deployed alongside Kazuar to test new capabilities. The overlaps in design and victimology suggest STOCKSTAY is being actively developed in the image of Turla’s long-standing Kazuar backdoor.\u003c/p\u003e\n"},{"n":16,"title":"FBI Warns Russian Intelligence Hackers Target Signal Backup Recovery Keys","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/fbi-warns-russian-intelligence-hackers.html","time":"19:38","priority":"MUST READ","score":95,"tldr":"The FBI and CISA warn that Russian intelligence hackers are phishing Signal users for their Backup Recovery Key, enabling persistent access to message history and account takeover; anyone who shared it must generate a new one immediately.","briefOverview":"\u003cp\u003eThe FBI and CISA have updated an earlier warning to highlight that Russian intelligence hackers are now using phishing messages to steal Signal users\u0026rsquo; Backup Recovery Keys. The attackers pose as Signal support and persuade targets to paste their Recovery Key into a chat, using pretexts such as a mandatory two-factor authentication rollout or an urgent data recovery needed to prevent message loss. The campaign prioritizes individuals of high intelligence value, including current and former government officials, military personnel, journalists, and Ukrainian figures, and has already compromised thousands of accounts worldwide.\u003c/p\u003e\n\n\u003cp\u003eThe stolen Recovery Key allows an attacker to restore the account\u0026rsquo;s full backup, read private and group message history, and take control of the account. Critically, the key remains tied to the phone number and works even against a new account created on the same number, making the exposure persistent. The only defense is to generate a new key in Settings, which immediately invalidates the old one for future backup downloads, though any data already pulled cannot be recovered. The agencies stress that this tactic does not break Signal\u0026rsquo;s encryption; it exploits social engineering to harvest a legitimate feature.\u003c/p\u003e\n\n\u003cp\u003eThe activity is attributed to Russian Intelligence Services, with public group names UNC5792 and UNC4221 now linked to FSB officers and military services. The updated advisory arrives alongside a $10 million State Department Rewards for Justice offer for information on UNC5792 and echoes parallel warnings from Dutch, German, and French agencies this year. Google Threat Intelligence Group had previously documented UNC5792 abusing Signal\u0026rsquo;s linked-device feature, and the FBI warned that tactics would continue to evolve from one-time codes to persistent archive keys. Users are urged to treat any in-app \u0026ldquo;Signal support\u0026rdquo; message as hostile, never share codes or keys in chats, and immediately regenerate a key if any compromise is suspected.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The FBI and CISA updated a prior warning to note that Russian intelligence hackers are now targeting Signal users' Backup Recovery Keys in phishing campaigns.","A stolen Backup Recovery Key allows attackers to restore backups, read private and group message history, and take over the account; the key remains effective even if a new account is created on the same phone number.","The phishing messages impersonate Signal support and instruct targets to paste their Recovery Key into the chat, using pretexts like mandatory two-factor authentication rollouts or urgent data recovery.","The campaign targets individuals of high intelligence value, including current and former U.S. and international government officials, military personnel, journalists, and Ukrainian officials, and has already compromised thousands of accounts worldwide.","The primary defense is to generate a new Recovery Key in Settings to invalidate the old key, but any data previously exfiltrated cannot be recovered."],"insights":["The Signal Backup Recovery Key is tied to the phone number, not the account instance, so a stolen key remains valid even after the target sets up a fresh account on the same number, enabling persistent, indefinite access.","Attackers are successfully guiding users to enable Signal's backup feature and then paste the Recovery Key into the chat, effectively tricking targets into creating a vulnerability they might not have otherwise had.","Generating a new key only stops future backup downloads; any data already retrieved by the attacker cannot be revoked or recovered, making the exposure permanent."],"referencedReports":[{"title":"PSA I-062626-PSA","url":"https://www.ic3.gov/PSA/2026/PSA260626","publisher":"FBI Internet Crime Complaint Center (IC3)","context":"Updated FBI/CISA joint advisory warning that Russian intelligence hackers now coax targets into handing over Signal Backup Recovery Keys.","category":"","primary":false},{"title":"PSA I-032026-PSA","url":"https://www.ic3.gov/PSA/2026/PSA260320","publisher":"FBI Internet Crime Complaint Center (IC3)","context":"Earlier March 2026 notice from FBI/CISA about Russian intelligence phishing campaigns targeting Signal and WhatsApp accounts.","category":"","primary":false},{"title":"Russia targeting Signal messenger","url":"https://cloud.google.com/blog/topics/threat-intelligence/russia-targeting-signal-messenger/","publisher":"Google Threat Intelligence Group","context":"Google documented UNC5792 abusing Signal's linked-device feature in early 2025, establishing the group's earlier tradecraft.","category":"","primary":false}],"body":"\u003cp\u003eThe FBI and CISA have updated an earlier warning to highlight that Russian intelligence hackers are now using phishing messages to steal Signal users\u0026rsquo; Backup Recovery Keys. The attackers pose as Signal support and persuade targets to paste their Recovery Key into a chat, using pretexts such as a mandatory two-factor authentication rollout or an urgent data recovery needed to prevent message loss. The campaign prioritizes individuals of high intelligence value, including current and former government officials, military personnel, journalists, and Ukrainian figures, and has already compromised thousands of accounts worldwide.\u003c/p\u003e\n\n\u003cp\u003eThe stolen Recovery Key allows an attacker to restore the account\u0026rsquo;s full backup, read private and group message history, and take control of the account. Critically, the key remains tied to the phone number and works even against a new account created on the same number, making the exposure persistent. The only defense is to generate a new key in Settings, which immediately invalidates the old one for future backup downloads, though any data already pulled cannot be recovered. The agencies stress that this tactic does not break Signal\u0026rsquo;s encryption; it exploits social engineering to harvest a legitimate feature.\u003c/p\u003e\n\n\u003cp\u003eThe activity is attributed to Russian Intelligence Services, with public group names UNC5792 and UNC4221 now linked to FSB officers and military services. The updated advisory arrives alongside a $10 million State Department Rewards for Justice offer for information on UNC5792 and echoes parallel warnings from Dutch, German, and French agencies this year. Google Threat Intelligence Group had previously documented UNC5792 abusing Signal\u0026rsquo;s linked-device feature, and the FBI warned that tactics would continue to evolve from one-time codes to persistent archive keys. Users are urged to treat any in-app \u0026ldquo;Signal support\u0026rdquo; message as hostile, never share codes or keys in chats, and immediately regenerate a key if any compromise is suspected.\u003c/p\u003e\n"},{"n":17,"title":"New SharkLoader Malware Deploys Cobalt Strike in StrikeShark Cyberattacks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/new-sharkloader-malware-deploys-cobalt.html","time":"18:17","priority":"MUST READ","score":95,"tldr":"A newly discovered campaign named StrikeShark is using the undocumented SharkLoader malware to deliver Cobalt Strike Beacon, targeting government, diplomatic, and software development organizations across Asia, the Middle East, and South America by exploiting known vulnerabilities in public-facing applications.","briefOverview":"\u003cp\u003eA campaign tracked as StrikeShark has been discovered delivering the previously unknown SharkLoader malware to deploy Cobalt Strike Beacon on compromised hosts. The activity has affected a diplomatic organization in Indonesia, government entities in Taiwan, software development companies in multiple countries, and organizations in Hong Kong, Lebanon, Syria, Colombia, North Macedonia, Nepal, and Serbia. Kaspersky, which reported the campaign, notes the broad geographic reach suggests opportunistic targeting rather than a narrow industry focus.\u003c/p\u003e\n\n\u003cp\u003eAttackers gained initial access by exploiting numerous public-facing application vulnerabilities, including ProxyLogon (CVE-2021-26855) in Microsoft Exchange, an Openfire path traversal flaw (CVE-2023-32315), a GeoServer remote code execution bug (CVE-2024-36401), and over a dozen other disclosed flaws. After establishing persistence via web shells, the threat actors used a DLL side-loading chain with a legitimate SystemSettings.exe to load SharkLoader. SharkLoader implements Perfect DLL Hijacking to bypass the Windows Loader Lock, then decrypts and injects Cobalt Strike Beacon using API hooks on VirtualAlloc and Sleep functions to evade memory scanners.\u003c/p\u003e\n\n\u003cp\u003eNo data exfiltration was observed, but extensive reconnaissance, Active Directory enumeration, credential theft from LSASS and NTDS, and deployment of open-source tools like FScan, Searchall, and Pillager indicate an espionage motivation, likely targeting political intelligence or intellectual property. The threat actor is assessed as Chinese-speaking based on tool preferences, though no direct link to a known group has been identified. The absence of built-in persistence in SharkLoader is compensated by Registry Run keys and scheduled tasks, demonstrating the attacker\u0026rsquo;s manual operational control.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A newly discovered campaign called StrikeShark delivers the previously undocumented SharkLoader malware to load Cobalt Strike Beacon on compromised systems.","The campaign targeted a diplomatic organization in Indonesia, government organizations in Taiwan, and software development companies in multiple countries, along with entities in Hong Kong, Lebanon, Syria, Colombia, North Macedonia, Nepal, and Serbia.","Attackers gained initial access by exploiting known vulnerabilities in public-facing applications, including ProxyLogon in Microsoft Exchange, an Openfire path traversal flaw, and a GeoServer remote code execution bug.","The threat actor is assessed to be Chinese-speaking, based on its use of open-source tools like FScan and Pillager commonly associated with Chinese-speaking developers, though no direct link to a known group was found.","No data exfiltration was observed, but the targeting of government and software organizations suggests likely cyber espionage aimed at political intelligence or intellectual property."],"insights":["The campaign employs Perfect DLL Hijacking to circumvent the Windows Loader Lock, a technique publicly documented in 2023, allowing SharkLoader to execute malicious code without triggering lock-related monitoring.","SharkLoader installs API hooks on VirtualAlloc and Sleep functions to move the Cobalt Strike Beacon into memory only when the Beacon calls Sleep, likely evading memory scanners that detect executable code regions at rest.","The attackers exploited at least 15 different CVEs across nine distinct products in an opportunistic manner, indicating they likely rely on publicly available proof-of-concept exploits to compromise a wide range of internet-facing applications.","No data exfiltration was observed, but the extensive reconnaissance and credential theft suggest the campaign may be in a pre-exfiltration phase, with Cobalt Strike's data exfiltration modules potentially poised for later use."],"referencedReports":[{"title":"StrikeShark campaign","url":"https://securelist.com/strikeshark-campaign/120326/","publisher":"Kaspersky","context":"The article's findings and analysis of the StrikeShark campaign, including the SharkLoader malware, are based on Kaspersky's research.","category":"","primary":false},{"title":"Perfect DLL Hijacking","url":"https://elliotonsecurity.com/perfect-dll-hijacking/","publisher":"Elliot Killick","context":"The article notes that SharkLoader implements Perfect DLL Hijacking, a technique detailed by security researcher Elliot Killick in October 2023.","category":"","primary":false}],"body":"\u003cp\u003eA campaign tracked as StrikeShark has been discovered delivering the previously unknown SharkLoader malware to deploy Cobalt Strike Beacon on compromised hosts. The activity has affected a diplomatic organization in Indonesia, government entities in Taiwan, software development companies in multiple countries, and organizations in Hong Kong, Lebanon, Syria, Colombia, North Macedonia, Nepal, and Serbia. Kaspersky, which reported the campaign, notes the broad geographic reach suggests opportunistic targeting rather than a narrow industry focus.\u003c/p\u003e\n\n\u003cp\u003eAttackers gained initial access by exploiting numerous public-facing application vulnerabilities, including ProxyLogon (CVE-2021-26855) in Microsoft Exchange, an Openfire path traversal flaw (CVE-2023-32315), a GeoServer remote code execution bug (CVE-2024-36401), and over a dozen other disclosed flaws. After establishing persistence via web shells, the threat actors used a DLL side-loading chain with a legitimate SystemSettings.exe to load SharkLoader. SharkLoader implements Perfect DLL Hijacking to bypass the Windows Loader Lock, then decrypts and injects Cobalt Strike Beacon using API hooks on VirtualAlloc and Sleep functions to evade memory scanners.\u003c/p\u003e\n\n\u003cp\u003eNo data exfiltration was observed, but extensive reconnaissance, Active Directory enumeration, credential theft from LSASS and NTDS, and deployment of open-source tools like FScan, Searchall, and Pillager indicate an espionage motivation, likely targeting political intelligence or intellectual property. The threat actor is assessed as Chinese-speaking based on tool preferences, though no direct link to a known group has been identified. The absence of built-in persistence in SharkLoader is compensated by Registry Run keys and scheduled tasks, demonstrating the attacker\u0026rsquo;s manual operational control.\u003c/p\u003e\n"},{"n":18,"title":"Miasma Malware Targets npm Packages and GitHub Actions in Supply Chain Attack","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/miasma-malware-targets-npm-packages-and.html","time":"11:05","priority":"MUST READ","score":95,"tldr":"The Miasma malware family has expanded its supply chain attack to npm and Go packages, steals credentials via GitHub Actions compromise, and propagates across developer environments.","briefOverview":"\u003cp\u003eThreat actors linked to the Shai-Hulud, Miasma, and Hades malware family have escalated their supply chain campaign by poisoning a new set of npm packages and extending into the Go ecosystem. Using a compromised maintainer account belonging to the LeoPlatform organization, attackers pushed malicious versions of 20 LeoPlatform and RStreams packages within a six-second window. The campaign also compromised the codfish/semantic-release-action GitHub Action on June 24, 2026, by force-pushing a malicious commit and redirecting version tags to deliver a credential-stealing payload.\u003c/p\u003e\n\n\u003cp\u003eThe malware relies on a binding.gyp file to trigger execution during package installation, downloads and installs the Bun runtime if absent, and launches a JavaScript loader that exfiltrates developer secrets, tokens, and CI/CD environment variables. A dropped GitHub Actions workflow named \u0026ldquo;Run Copilot\u0026rdquo; steals secrets from runner memory and uploads them to public repositories under the description \u0026ldquo;Alright Lets See If This Works.\u0026rdquo; The stolen credentials are then used to propagate the malware into other accessible repositories, continuing the infection chain.\u003c/p\u003e\n\n\u003cp\u003eThe campaign highlights a deliberate evolution in both scope and evasion tactics. The malware incorporates a Russian locale killswitch, checks for endpoint security software, and periodically polls GitHub for commits containing \u0026ldquo;firedalazer\u0026rdquo; to retrieve the Hades variant. Token relay markers have been intentionally rotated from earlier strings to \u0026ldquo;RevokeAndItGoesKaboom,\u0026rdquo; showing that while the operational infrastructure remains consistent, indicators are changed to thwart static detection. Targeting developer workflows rather than solely package install hooks enables the worm to spread across npm, Go, and CI/CD pipelines, putting cloud-native and serverless deployments at heightened risk.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Attackers used a compromised maintainer account to push malicious versions of LeoPlatform and RStreams npm packages within a six-second window.","The malware executes via a binding.gyp file during package installation, downloads and installs the Bun runtime, and then runs a stealer payload to harvest credentials.","A malicious GitHub Actions workflow named \"Run Copilot\" is dropped to steal CI/CD secrets, which are uploaded to a public repository with the description \"Alright Lets See If This Works.\"","The campaign also compromised the codfish/semantic-release-action GitHub Action on June 24, 2026 by force-pushing a malicious commit and redirecting version tags.","The malware includes a Russian locale killswitch, checks for the presence of endpoint security software, and polls GitHub hourly for commits containing \"firedalazer\" to retrieve the Hades variant."],"insights":["The attacker pushed malicious npm package versions within a six-second window, suggesting an automated credential abuse pipeline that minimizes exposure time.","Stolen credentials are uploaded to a public GitHub repository with the searchable description \"Alright Lets See If This Works,\" giving defenders a concrete hunting indicator across GitHub.","The malware checks for a Russian locale killswitch, a geo-targeting evasion that may hint at origin or intended victim geography.","The token relay marker changed from \"IfYouInvalidateThisTokenItWillNukeTheComputerOfTheOwner\" to \"RevokeAndItGoesKaboom,\" demonstrating that while the operational infrastructure remains, indicators are deliberately rotated to evade static detection.","The compromise of a Go module exploits project configuration files rather than build scripts, expanding the infection surface from package installs to developer workspaces via IDEs and AI coding assistants."],"referencedReports":[{"title":"Miasma Malware Hits LeoPlatform npm Packages and Go Ecosystem","url":"https://socket.dev/blog/miasma-mini-shai-hulud-hits-leoplatform-npm-packages-go-ecosystem","publisher":"Socket","context":"Socket reported the latest malicious npm releases affecting LeoPlatform, RStreams packages, and a Go ecosystem compromise.","category":"","primary":false},{"title":"Mass npm Supply Chain Attack: 20 Leo Platform Packages Compromised","url":"https://www.stepsecurity.io/blog/mass-npm-supply-chain-attack-20-leo-platform-packages-compromised","publisher":"StepSecurity","context":"StepSecurity detailed the compromise of LeoPlatform npm packages via a breached maintainer token.","category":"","primary":false},{"title":"Supply Chain Compromise of codfish/semantic-release-action","url":"https://www.stepsecurity.io/blog/supply-chain-compromise-codfish-semantic-release-action","publisher":"StepSecurity","context":"StepSecurity described the force-push attack on codfish/semantic-release-action and the resulting credential theft payload.","category":"","primary":false},{"title":"Shai-Hulud, Miasma - Alright, Let's See If This Works","url":"https://research.jfrog.com/post/shai-hulud-miasma-alright-lets-see-if-this-works/","publisher":"JFrog","context":"JFrog analyzed the token relay marker change from 'IfYouInvalidateThisTokenItWillNukeTheComputerOfTheOwner' to 'RevokeAndItGoesKaboom'.","category":"","primary":false},{"title":"Shai-Hulud Strikes Leo Platform npm","url":"https://www.endorlabs.com/learn/shai-hulud-strikes-leo-platform-npm","publisher":"Endor Labs","context":"Endor Labs noted that the malware polls GitHub hourly for commits containing 'firedalazer' to retrieve the Hades variant.","category":"","primary":false},{"title":"Alright Let's See If This Works: Shai-Hulud, Miasma, Hades Variant Spreads on npm","url":"https://www.ox.security/blog/alright-lets-see-if-this-works-shai-hulud-miasma-hades-variant-spreads-on-npm","publisher":"OX Security","context":"OX Security reported that the malware periodically polls GitHub for commits matching the string 'firedalazer'.","category":"","primary":false},{"title":"Miasma Worm Hits LeoPlatform: 20 npm Packages Compromised","url":"https://safedep.io/miasma-worm-hits-leoplatform-20-npm-packages/","publisher":"SafeDep","context":"SafeDep provided details on the use of a compromised npm token belonging to the maintainer 'czirker'.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors linked to the Shai-Hulud, Miasma, and Hades malware family have escalated their supply chain campaign by poisoning a new set of npm packages and extending into the Go ecosystem. Using a compromised maintainer account belonging to the LeoPlatform organization, attackers pushed malicious versions of 20 LeoPlatform and RStreams packages within a six-second window. The campaign also compromised the codfish/semantic-release-action GitHub Action on June 24, 2026, by force-pushing a malicious commit and redirecting version tags to deliver a credential-stealing payload.\u003c/p\u003e\n\n\u003cp\u003eThe malware relies on a binding.gyp file to trigger execution during package installation, downloads and installs the Bun runtime if absent, and launches a JavaScript loader that exfiltrates developer secrets, tokens, and CI/CD environment variables. A dropped GitHub Actions workflow named \u0026ldquo;Run Copilot\u0026rdquo; steals secrets from runner memory and uploads them to public repositories under the description \u0026ldquo;Alright Lets See If This Works.\u0026rdquo; The stolen credentials are then used to propagate the malware into other accessible repositories, continuing the infection chain.\u003c/p\u003e\n\n\u003cp\u003eThe campaign highlights a deliberate evolution in both scope and evasion tactics. The malware incorporates a Russian locale killswitch, checks for endpoint security software, and periodically polls GitHub for commits containing \u0026ldquo;firedalazer\u0026rdquo; to retrieve the Hades variant. Token relay markers have been intentionally rotated from earlier strings to \u0026ldquo;RevokeAndItGoesKaboom,\u0026rdquo; showing that while the operational infrastructure remains consistent, indicators are changed to thwart static detection. Targeting developer workflows rather than solely package install hooks enables the worm to spread across npm, Go, and CI/CD pipelines, putting cloud-native and serverless deployments at heightened risk.\u003c/p\u003e\n"},{"n":27,"title":"Multiple @immobiliarelabs Backstage Plugins Compromised on npm","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/immobiliarelabs-npm-packages-compromised","time":"16:12","priority":"MUST READ","score":94,"tldr":"Multiple @immobiliarelabs Backstage plugins on npm were compromised with a malicious payload that executes via a node-gyp binding.gyp hook during installation, stealing credentials and persisting in AI coding tools. The attack is part of the Miasma campaign and affects all major version lines.","briefOverview":"\u003cp\u003eOn June 26, 2026, four Backstage plugins maintained by Immobiliare Labs—\u003ccode\u003e@immobiliarelabs/backstage-plugin-gitlab\u003c/code\u003e, its backend, and the LDAP auth frontend and backend—were found to contain a malicious payload in new versions published on npm. The compromised versions were released simultaneously across every supported major release line within a 30-second window, each inserting a 5 MB \u003ccode\u003eindex.js\u003c/code\u003e and a \u003ccode\u003ebinding.gyp\u003c/code\u003e file that triggers code execution during \u003ccode\u003enpm install\u003c/code\u003e via node-gyp. This technique bypasses security tools that only inspect \u003ccode\u003epackage.json\u003c/code\u003e postinstall scripts.\u003c/p\u003e\n\n\u003cp\u003eThe payload is heavily obfuscated with three layers: a ROT-2 Caesar cipher, AES-128-GCM decryption of embedded ciphertexts, and obfuscator.io string table rotation. After unpacking, it downloads the Bun JavaScript runtime to avoid Node.js monitoring hooks and then runs a credential stealer that harvests GitHub tokens, cloud provider credentials, password manager data, SSH keys, and package registry tokens. It also modifies configuration files for AI coding assistants—including Claude Code, GitHub Copilot, Cursor, VS Code, and Aider—to persist and execute malicious code on every session start, and it contains self‑propagation functions that suggest the ability to republish compromised packages using stolen credentials.\u003c/p\u003e\n\n\u003cp\u003eThe attack mirrors the Miasma campaign pattern previously analysed by StepSecurity, where patch releases are simultaneously injected across multiple release lines. The Immobiliare Labs team was notified the same day via a GitHub issue. Indicators of compromise include the presence of \u003ccode\u003eindex.js\u003c/code\u003e and \u003ccode\u003ebinding.gyp\u003c/code\u003e files, specific SHA512 hashes, and network connections to download Bun from its official GitHub releases endpoint. The intrusion demonstrates how an install‑time \u003ccode\u003ebinding.gyp\u003c/code\u003e hook can deliver a full‑spectrum credential theft and persistence chain without tripping conventional package‑script detection.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["On June 26, 2026, compromised versions of four @immobiliarelabs Backstage plugins were published to npm, containing a malicious payload that fires at install time.","The payload uses a binding.gyp file to trigger node-gyp execution of a 5 MB index.js, bypassing tools that only monitor package.json postinstall scripts.","The payload steals credentials from GitHub Actions secrets, cloud provider credentials, package registry tokens, password manager databases, SSH keys, and more.","The payload attempts to persist by modifying configuration files of AI coding assistants, including Claude Code, GitHub Copilot, Cursor, VS Code, Aider, and others.","This attack follows the pattern of the Miasma campaign, employing the same binding.gyp technique to execute malicious code during npm install."],"insights":["The payload uses a binding.gyp file to trigger node-gyp execution during npm install, evading security tools that only check package.json scripts for malicious postinstall behaviors.","The attacker deliberately uses the Bun JavaScript runtime instead of Node.js because Bun does not support --require hook interception, a common monitoring technique in Node.js environments.","The malicious code contains self-propagating worm functions like squatPackage and updateTarball, allowing republishing of tainted packages to npm and PyPI using stolen credentials.","Compromised versions were published simultaneously within a 30-second window across every supported major release line of all four packages, demonstrating a high degree of automation and coordination.","The payload targets AI coding assistant settings (Claude Code, GitHub Copilot, Cursor, VS Code) to persist by executing malicious code on every session start, a novel persistence vector bypassing traditional system monitoring."],"referencedReports":[],"body":"\u003cp\u003eOn June 26, 2026, four Backstage plugins maintained by Immobiliare Labs—\u003ccode\u003e@immobiliarelabs/backstage-plugin-gitlab\u003c/code\u003e, its backend, and the LDAP auth frontend and backend—were found to contain a malicious payload in new versions published on npm. The compromised versions were released simultaneously across every supported major release line within a 30-second window, each inserting a 5 MB \u003ccode\u003eindex.js\u003c/code\u003e and a \u003ccode\u003ebinding.gyp\u003c/code\u003e file that triggers code execution during \u003ccode\u003enpm install\u003c/code\u003e via node-gyp. This technique bypasses security tools that only inspect \u003ccode\u003epackage.json\u003c/code\u003e postinstall scripts.\u003c/p\u003e\n\n\u003cp\u003eThe payload is heavily obfuscated with three layers: a ROT-2 Caesar cipher, AES-128-GCM decryption of embedded ciphertexts, and obfuscator.io string table rotation. After unpacking, it downloads the Bun JavaScript runtime to avoid Node.js monitoring hooks and then runs a credential stealer that harvests GitHub tokens, cloud provider credentials, password manager data, SSH keys, and package registry tokens. It also modifies configuration files for AI coding assistants—including Claude Code, GitHub Copilot, Cursor, VS Code, and Aider—to persist and execute malicious code on every session start, and it contains self‑propagation functions that suggest the ability to republish compromised packages using stolen credentials.\u003c/p\u003e\n\n\u003cp\u003eThe attack mirrors the Miasma campaign pattern previously analysed by StepSecurity, where patch releases are simultaneously injected across multiple release lines. The Immobiliare Labs team was notified the same day via a GitHub issue. Indicators of compromise include the presence of \u003ccode\u003eindex.js\u003c/code\u003e and \u003ccode\u003ebinding.gyp\u003c/code\u003e files, specific SHA512 hashes, and network connections to download Bun from its official GitHub releases endpoint. The intrusion demonstrates how an install‑time \u003ccode\u003ebinding.gyp\u003c/code\u003e hook can deliver a full‑spectrum credential theft and persistence chain without tripping conventional package‑script detection.\u003c/p\u003e\n"},{"n":14,"title":"New Linux pedit COW Exploit Enables Root Access by Poisoning Cached Binaries","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/new-linux-pedit-cow-exploit-enables.html","time":"13:00","priority":"MUST READ","score":93,"tldr":"A local privilege escalation vulnerability (CVE-2026-46331) in the Linux kernel's traffic-control subsystem allows unprivileged users to gain root by corrupting cached binaries in memory, with a public exploit available. Immediate mitigation requires patching, disabling the act_pedit kernel module, or turning off unprivileged user namespaces.","briefOverview":"\u003cp\u003eCVE-2026-46331, nicknamed \u0026ldquo;pedit COW,\u0026rdquo; is an out-of-bounds write in the Linux kernel\u0026rsquo;s act_pedit traffic-control action that corrupts shared page-cache memory. A local unprivileged user can exploit the flaw to gain root by poisoning the cached in-memory image of a setuid binary like /bin/su. A working public exploit appeared within a day of the CVE assignment on June 16, and the attack never modifies the file on disk, so standard file-integrity checks remain clean while the root shell is already open.\u003c/p\u003e\n\n\u003cp\u003eThe exploit requires the act_pedit kernel module to be loadable and unprivileged user namespaces to be enabled, conditions that were present by default on tested RHEL 10 and Debian 13 systems. Ubuntu 24.04 needed routing through AppArmor profiles that still permit user namespaces, while Ubuntu 26.04 blocks the exploit path because its AppArmor policies restrict unprivileged user namespaces, though the kernel itself remains vulnerable. Red Hat, Debian, and Ubuntu have published advisories, and multiple supported releases are affected.\u003c/p\u003e\n\n\u003cp\u003eThe fix was posted on the netdev mailing list in late May as a routine data-corruption patch, and the CVE was assigned only when the patch was merged on June 16. Immediate mitigation options include blacklisting the act_pedit module or setting the maximum user namespaces to zero, which breaks rootless containers and sandboxed browsers. Because the overwrite is in memory only, clearing the page cache removes the poisoned copy but does not stop an already-opened root shell, so a compromised host must be treated as fully taken over.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["CVE-2026-46331 is an out-of-bounds write in the Linux kernel's act_pedit traffic-control action that corrupts shared page-cache memory, enabling a local unprivileged user to escalate to root.","A public exploit surfaced within a day of the CVE assignment, poisoning the in-memory cached copy of a setuid root binary like /bin/su and executing a payload with root privileges without modifying the file on disk.","The exploit requires the act_pedit kernel module to be loadable and unprivileged user namespaces to be enabled, conditions that were present on tested RHEL and Debian systems.","Affected distributions include RHEL 8/9/10, Debian 11/12/13, and Ubuntu 18.04 through 26.04, though Ubuntu 26.04 blocks the exploit path by default through AppArmor policies restricting unprivileged user namespaces.","File-integrity checks may miss the attack because corruption occurs only in memory, and dropping the page cache removes the altered copy but does not terminate an already opened root shell."],"insights":["The vulnerability fix was posted on a public mailing list weeks before CVE assignment, framed as a routine data-corruption patch, with no security warning until after the weaponized exploit appeared.","File-integrity checks are completely blind to this attack because the malicious modification occurs only in memory, never touching the file on disk, allowing a root shell to exist while all checks report clean.","Clearing the page cache after compromise removes the poisoned in-memory copy but does not close an already-opened root shell, so the host must be treated as fully compromised.","Even with a vulnerable kernel, AppArmor profiles that restrict unprivileged user namespaces can block the exploit chain, as demonstrated by Ubuntu 26.04's default configuration.","The exploit uses the ability of an unprivileged user to configure traffic-control actions inside a user namespace, a recently available entry point that bypasses the need for global CAP_NET_ADMIN."],"referencedReports":[{"title":"RHSB-2026-008: Important: kernel-rt security update","url":"https://access.redhat.com/security/vulnerabilities/RHSB-2026-008","publisher":"Red Hat","context":"Red Hat rates the flaw as important in this security bulletin.","category":"","primary":false}],"body":"\u003cp\u003eCVE-2026-46331, nicknamed \u0026ldquo;pedit COW,\u0026rdquo; is an out-of-bounds write in the Linux kernel\u0026rsquo;s act_pedit traffic-control action that corrupts shared page-cache memory. A local unprivileged user can exploit the flaw to gain root by poisoning the cached in-memory image of a setuid binary like /bin/su. A working public exploit appeared within a day of the CVE assignment on June 16, and the attack never modifies the file on disk, so standard file-integrity checks remain clean while the root shell is already open.\u003c/p\u003e\n\n\u003cp\u003eThe exploit requires the act_pedit kernel module to be loadable and unprivileged user namespaces to be enabled, conditions that were present by default on tested RHEL 10 and Debian 13 systems. Ubuntu 24.04 needed routing through AppArmor profiles that still permit user namespaces, while Ubuntu 26.04 blocks the exploit path because its AppArmor policies restrict unprivileged user namespaces, though the kernel itself remains vulnerable. Red Hat, Debian, and Ubuntu have published advisories, and multiple supported releases are affected.\u003c/p\u003e\n\n\u003cp\u003eThe fix was posted on the netdev mailing list in late May as a routine data-corruption patch, and the CVE was assigned only when the patch was merged on June 16. Immediate mitigation options include blacklisting the act_pedit module or setting the maximum user namespaces to zero, which breaks rootless containers and sandboxed browsers. Because the overwrite is in memory only, clearing the page cache removes the poisoned copy but does not stop an already-opened root shell, so a compromised host must be treated as fully taken over.\u003c/p\u003e\n"},{"n":15,"title":"Chinese-Speaking APT Deploys New TinyRCT Backdoor in Southeast Asia Campaign","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/chinese-speaking-apt-deploys-new.html","time":"16:21","priority":"MUST READ","score":93,"tldr":"A Chinese-speaking APT group (CL-STA-1062/UAT-7237) has deployed a previously undocumented custom backdoor, TinyRCT, in a campaign targeting government entities and critical infrastructure across Southeast Asia, using open-source tools like SoftEther VPN and Mimikatz for initial access and lateral movement.","briefOverview":"\u003cp\u003eA Chinese-speaking advanced persistent threat group tracked as CL-STA-1062 (which overlaps with UAT-7237) has been linked to a campaign deploying a previously undocumented custom backdoor called TinyRCT. The operation targeted government entities and critical infrastructure across Southeast Asia, with a specific focus on state-owned enterprises in the energy and government sectors. Threat activity has been ongoing since at least March 2022 against strategic sectors in East Asia, but from mid-2025 the group trained its sights on the Southeast Asian region, compromising at least 10 organizations between October and December 2025.\u003c/p\u003e\n\n\u003cp\u003eTinyRCT is a lightweight .NET remote access trojan that can execute arbitrary commands, enumerate and exfiltrate files, capture the victim’s screen, and delete itself from the compromised host. It uses AES-128 encryption in CBC mode for communication over HTTP, beaconing to a command-and-control server every 10 seconds. The backdoor was delivered through a malicious archive that abused AppDomainManager injection to load a rogue DLL, which then fetched the final payload from an attacker-controlled server. The attackers also relied on a hybrid toolkit of open-source utilities including SoftEther VPN, Mimikatz, VNT, and Yuze for lateral movement and proxy capabilities.\u003c/p\u003e\n\n\u003cp\u003eIn one detected intrusion, the group infiltrated a Southeast Asian government entity, deployed a web shell, exfiltrated data from an MS SQL server, and stole an entire directory of web server source code. Simultaneously, they conducted reconnaissance on another government entity in the same country to identify lateral movement opportunities. The development and use of a custom backdoor tailored for specific capabilities, combined with open-source tools and a persistent focus on critical infrastructure, indicates that CL-STA-1062 will continue to present a significant threat to the region.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A Chinese-speaking APT group tracked as CL-STA-1062 (overlapping with UAT-7237) has deployed a new custom backdoor called TinyRCT in a campaign targeting government entities and critical infrastructure in Southeast Asia.","TinyRCT is a .NET remote access trojan that can execute commands, enumerate and exfiltrate files, capture the victim's screen, and delete itself, communicating with its C2 server over AES-encrypted HTTP beaconing.","The attackers used web shells for initial foothold and combined open-source tools such as SoftEther VPN, Mimikatz, VNT, and Yuze with the custom backdoor to move laterally and maintain access.","The campaign compromised at least 10 organizations in Southeast Asia between October and December 2025, including the exfiltration of an entire directory of web server source code from a government entity and data from an MS SQL server.","CL-STA-1062 has been active in East Asia since at least March 2022, with recent activity beginning mid-2025 focusing on critical infrastructure and government targets in the region."],"insights":["The attackers used AppDomainManager injection, a relatively stealthy technique, to load a malicious DLL that fetched the TinyRCT backdoor, highlighting an evasion-focused delivery method.","The campaign simultaneously exfiltrated data from one government entity while conducting reconnaissance on a second government entity in the same country, indicating a coordinated effort to broaden access and lateral movement opportunities.","Exfiltration of an entire web server source code directory from a government entity suggests the attackers sought long-term strategic insight into the victim's infrastructure, not just immediate data theft.","The threat group's shift from early operations in East Asia since 2022 to a concentrated campaign on Southeast Asian critical infrastructure in mid-2025 demonstrates an evolving geographic and sectoral targeting strategy."],"referencedReports":[{"title":"CL-STA-1062: TinyRCT Backdoor in Southeast Asia Campaign","url":"https://unit42.paloaltonetworks.com/cl-sta-1062-tinyrct-backdoor/","publisher":"Palo Alto Networks Unit 42","context":"The article draws on this Unit 42 technical report that documents the CL-STA-1062 group and the new TinyRCT backdoor.","category":"","primary":false}],"body":"\u003cp\u003eA Chinese-speaking advanced persistent threat group tracked as CL-STA-1062 (which overlaps with UAT-7237) has been linked to a campaign deploying a previously undocumented custom backdoor called TinyRCT. The operation targeted government entities and critical infrastructure across Southeast Asia, with a specific focus on state-owned enterprises in the energy and government sectors. Threat activity has been ongoing since at least March 2022 against strategic sectors in East Asia, but from mid-2025 the group trained its sights on the Southeast Asian region, compromising at least 10 organizations between October and December 2025.\u003c/p\u003e\n\n\u003cp\u003eTinyRCT is a lightweight .NET remote access trojan that can execute arbitrary commands, enumerate and exfiltrate files, capture the victim’s screen, and delete itself from the compromised host. It uses AES-128 encryption in CBC mode for communication over HTTP, beaconing to a command-and-control server every 10 seconds. The backdoor was delivered through a malicious archive that abused AppDomainManager injection to load a rogue DLL, which then fetched the final payload from an attacker-controlled server. The attackers also relied on a hybrid toolkit of open-source utilities including SoftEther VPN, Mimikatz, VNT, and Yuze for lateral movement and proxy capabilities.\u003c/p\u003e\n\n\u003cp\u003eIn one detected intrusion, the group infiltrated a Southeast Asian government entity, deployed a web shell, exfiltrated data from an MS SQL server, and stole an entire directory of web server source code. Simultaneously, they conducted reconnaissance on another government entity in the same country to identify lateral movement opportunities. The development and use of a custom backdoor tailored for specific capabilities, combined with open-source tools and a persistent focus on critical infrastructure, indicates that CL-STA-1062 will continue to present a significant threat to the region.\u003c/p\u003e\n"},{"n":8,"title":"Russia used social engineering to breach prominent messaging accounts, Ukraine says","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/russia-ukraine-social-engineering-messaging-accounts","time":"13:10","priority":"MUST READ","score":92,"tldr":"Ukraine's SBU and the FBI uncovered a Russian social engineering campaign that impersonates messaging platform support to steal account credentials from government, military, and activist targets, exploiting users' morning vulnerability.","briefOverview":"\u003cp\u003eUkraine\u0026rsquo;s Security Service (SBU), together with the FBI, uncovered a long-running Russian campaign to compromise the messaging accounts of government officials, military personnel, politicians, and activists. The operation targeted individuals in Ukraine, Europe, and the United States, aiming to access sensitive military, political, and economic information exchanged through messaging apps. The attackers also sought to steal victims\u0026rsquo; personal data, but the specific Russian intelligence service responsible and the total number of victims were not disclosed.\u003c/p\u003e\n\n\u003cp\u003eThe campaign relied entirely on social engineering rather than exploiting vulnerabilities in the messaging platforms. Attackers sent text messages impersonating official support services, urging recipients to disclose their account credentials. Notably, these messages were timed for morning hours, when users are described as particularly vulnerable due to their physical and emotional state, indicating a deliberate psychological exploitation of timing.\u003c/p\u003e\n\n\u003cp\u003eThe SBU\u0026rsquo;s disclosure follows a pattern of similar Russian espionage efforts reported by
