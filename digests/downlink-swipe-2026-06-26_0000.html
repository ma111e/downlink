t state field at a specific window offset to a hardcoded constant. Codex then extracted a per-digit delta table from the traces, solved the exact sum constraint using OR-Tools CP-SAT, and recovered the correct 25-digit passcode. This session took about 50 minutes and 16.4 million tokens, a significant reduction in time and token usage, and returned the real flag.\u003c/p\u003e\n\n\u003cp\u003eThe author notes that this is a single case study, not a universal benchmark, and that TTD introduces operational costs like disk space and capture reliability. However, the core takeaway is that when the important program behavior is runtime-dependent, giving Codex queryable execution history can ground its reasoning in concrete evidence, avoiding long speculative detours that static analysis alone can encourage.\u003c/p\u003e\n"},{"n":12,"title":"Guardian Agents: The Next Layer of Identity Governance","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/guardian-agents-next-layer-of-identity.html","time":"11:30","priority":"MAY READ","score":50,"tldr":"Traditional identity governance tools fail to secure AI agents because they enforce controls only at authentication time, leaving autonomous agents unmonitored as they operate freely across systems—enterprises need runtime governance that tracks behavior in real time.","briefOverview":"\u003cp\u003eThe article describes how the rapid adoption of production-grade AI agents in enterprises has created a fundamental governance gap that traditional identity and access management (IAM) tools cannot close. These autonomous agents inherit the full permissions of the human or service identities they operate on behalf of, dynamically chaining tool calls across multiple systems, yet they bypass the access request workflows and authentication-time checks that IAM architectures were built around. As a result, security teams often lack any inventory of the agents running in their environment, and the agents\u0026rsquo; runtime behavior remains invisible to governance layers.\u003c/p\u003e\n\n\u003cp\u003eThe concept of a \u0026lsquo;guardian agent\u0026rsquo; is introduced as a purpose-built autonomous control layer that directly governs agentic identities at the execution layer, not just at provisioning or authentication. A guardian agent continuously discovers every AI agent, maps its permission inheritance and ownership, builds a behavioral baseline, and enforces least-privilege policies dynamically during a session. This runtime enforcement contrasts with static role-based access control and addresses the fact that agents\u0026rsquo; permission needs shift with each task, while their inherited credentials often grant far more access than required.\u003c/p\u003e\n\n\u003cp\u003eThe risks of leaving agents unmanaged are severe: over-privileged identities become the norm, orphaned sessions and stale credentials persist unseen, prompt injection attacks turn into privilege escalation vectors, and compromises can propagate laterally through chained multi-agent calls. The article emphasizes that without a dedicated governance layer, these autonomous identities accumulate as \u0026lsquo;identity dark matter,\u0026rsquo; expanding the attack surface and evading audit records. The recommended path to control involves discovery, classification by risk, runtime least-privilege enforcement, and integration of agent telemetry with existing IGA and PAM stacks.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["AI agents inherit the full permissions of the human or service identity they operate on behalf of, dynamically selecting tools and chaining calls across multiple systems, which breaks the static access model of traditional identity governance.","Traditional IAM tools only govern access at authentication time and remain blind to the runtime behavior of AI agents, including their tool calls, data accesses, and cross-system traversals after login.","A guardian agent is an autonomous control layer that continuously discovers AI agents, maps their identities and permission inheritance, baselines their behavior, and enforces least-privilege policies at runtime.","Unmanaged AI agents become 'identity dark matter,' accumulating over-privileged access, orphaned credentials, and exposure to prompt injection attacks that enable privilege escalation without credential compromise.","Effective governance requires deploying discovery mechanisms to inventory all AI agents, classifying them by risk, enforcing runtime least-privilege, and integrating agent identity telemetry into existing IAM and IGA platforms."],"insights":["Prompt injection attacks, typically considered a model integrity risk, become a direct privilege escalation vector when agents run with overprivileged inherited identities—attackers can escalate without touching any credentials.","AI agents don't just carry too much access; they actively discover and traverse stale, over-scoped credentials that IAM teams have long deprioritized, turning neglected access reviews into an immediate attack surface.","Privileged access management (PAM) vaults are blind to agent operations because agents never check out credentials; they use long-lived delegated OAuth tokens or embedded API keys, making their entire execution path invisible to PAM.","The default deployment pattern for agents bypasses security review entirely—line-of-business and engineering teams deploy them via low-code integrations, and security teams often discover them only during incident response or audits."],"referencedReports":[],"body":"\u003cp\u003eThe article describes how the rapid adoption of production-grade AI agents in enterprises has created a fundamental governance gap that traditional identity and access management (IAM) tools cannot close. These autonomous agents inherit the full permissions of the human or service identities they operate on behalf of, dynamically chaining tool calls across multiple systems, yet they bypass the access request workflows and authentication-time checks that IAM architectures were built around. As a result, security teams often lack any inventory of the agents running in their environment, and the agents\u0026rsquo; runtime behavior remains invisible to governance layers.\u003c/p\u003e\n\n\u003cp\u003eThe concept of a \u0026lsquo;guardian agent\u0026rsquo; is introduced as a purpose-built autonomous control layer that directly governs agentic identities at the execution layer, not just at provisioning or authentication. A guardian agent continuously discovers every AI agent, maps its permission inheritance and ownership, builds a behavioral baseline, and enforces least-privilege policies dynamically during a session. This runtime enforcement contrasts with static role-based access control and addresses the fact that agents\u0026rsquo; permission needs shift with each task, while their inherited credentials often grant far more access than required.\u003c/p\u003e\n\n\u003cp\u003eThe risks of leaving agents unmanaged are severe: over-privileged identities become the norm, orphaned sessions and stale credentials persist unseen, prompt injection attacks turn into privilege escalation vectors, and compromises can propagate laterally through chained multi-agent calls. The article emphasizes that without a dedicated governance layer, these autonomous identities accumulate as \u0026lsquo;identity dark matter,\u0026rsquo; expanding the attack surface and evading audit records. The recommended path to control involves discovery, classification by risk, runtime least-privilege enforcement, and integration of agent telemetry with existing IGA and PAM stacks.\u003c/p\u003e\n"},{"n":30,"title":"Open NDR and Threat Intelligence for Modern Detection | Corelight","source":"corelight.com","sourceColorIdx":1,"link":"https://corelight.com/blog/open-ndr-threat-intelligence","time":"21:33","priority":"MAY READ","score":35,"tldr":"Corelight promotes its Open NDR platform, which integrates threat intelligence to enhance network detection and response for modern security operations.","briefOverview":"\u003cp\u003eThe article is a commercial piece by Corelight presenting its Open Network Detection and Response (NDR) platform. It emphasizes how the platform integrates threat intelligence to improve the accuracy and speed of detecting malicious activity on enterprise networks. The solution is built on open-source Zeek network monitoring, providing detailed evidence for security teams.\u003c/p\u003e\n\n\u003cp\u003eThe integration of threat intelligence allows organizations to apply their own custom feeds and avoid vendor lock-in. This approach enables proactive threat hunting and more precise alerting, reducing false positives. Corelight positions Open NDR as a modern tool for security operations centers facing sophisticated threats.\u003c/p\u003e\n\n\u003cp\u003eBy leveraging network evidence, the platform helps security analysts quickly triage and investigate potential intrusions. The article underscores that combining detection with curated intelligence leads to faster response and better protection against data breaches. It promotes the platform as a flexible, intelligence-driven defense for contemporary networks.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Corelight offers an Open NDR platform for network detection and response.","The Open NDR platform integrates threat intelligence to improve threat detection.","The article highlights Corelight's commercial solution for modern security operations."],"insights":["Corelight's Open NDR platform decouples threat intelligence from detection, allowing organizations to apply their own custom feeds and avoid vendor lock-in.","The platform leverages open-source Zeek network evidence to provide detailed visibility that enhances the accuracy of threat intelligence matching.","By integrating third-party threat intelligence directly into network detection, security teams can pivot from reactive alerting to proactive threat hunting."],"referencedReports":[],"body":"\u003cp\u003eThe article is a commercial piece by Corelight presenting its Open Network Detection and Response (NDR) platform. It emphasizes how the platform integrates threat intelligence to improve the accuracy and speed of detecting malicious activity on enterprise networks. The solution is built on open-source Zeek network monitoring, providing detailed evidence for security teams.\u003c/p\u003e\n\n\u003cp\u003eThe integration of threat intelligence allows organizations to apply their own custom feeds and avoid vendor lock-in. This approach enables proactive threat hunting and more precise alerting, reducing false positives. Corelight positions Open NDR as a modern tool for security operations centers facing sophisticated threats.\u003c/p\u003e\n\n\u003cp\u003eBy leveraging network evidence, the platform helps security analysts quickly triage and investigate potential intrusions. The article underscores that combining detection with curated intelligence leads to faster response and better protection against data breaches. It promotes the platform as a flexible, intelligence-driven defense for contemporary networks.\u003c/p\u003e\n"},{"n":3,"title":"Your First GRC Agent: A Red Teamer's Walkthrough","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/your-first-grc-agent-a-red-teamers-walkthrough/","time":"14:01","priority":"MAY READ","score":30,"tldr":"Agentic AI transforms GRC from periodic snapshot compliance to continuous, autonomous monitoring with auditable logs, allowing teams to respond to control drift in real time rather than waiting for scheduled reviews.","briefOverview":"\u003cp\u003eThe article, written by a former red and purple team operator, introduces the concept of agentic AI in governance, risk, and compliance (GRC) and provides a practical walkthrough for building a first GRC agent. It distinguishes agents from traditional automation by their autonomy, context awareness, and ability to execute multi-step sequences, enabling continuous rather than periodic control monitoring. The author argues that while the systems we govern have become elastic and real-time, many compliance programs still rely on point-in-time snapshots, and agentic GRC closes that gap without replacing human judgment.\u003c/p\u003e\n\n\u003cp\u003eA concrete example walks through building an agent for ISO 27001:2022 control A.8.5 (secure authentication) using Anecdotes\u0026rsquo; no-code Agent Studio. The process involves three decisions: picking an event trigger (e.g., evidence older than 24 hours), describing the task in plain English, and deploying it with a full audit trail. When triggered, the agent reads live MFA policy from the identity provider, compares it against the baseline, opens a finding if any group lacks enforcement, and assigns remediation, all logged with timestamped evidence.\u003c/p\u003e\n\n\u003cp\u003eThe author emphasizes that observability and least privilege are essential for trust: the execution log records every action so decisions can be reconstructed for auditors, and the agent should have read-only access to evaluated systems with consequential actions gated behind human sign-off. The recommendation is to start with high-toil, low-judgment tasks like evidence gap detection, build trust, and then expand to higher-stakes controls. The piece also promotes the GRC Data \u0026amp; AI Summit 2026 and early access to Agent Studio.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["An agent differs from schedule-based automation by acting autonomously when a condition is met, using the actual state of the program, and executing multiple analysis-decision-action steps in sequence.","A practical GRC agent can be built by picking a trigger (e.g., evidence older than 24 hours), describing the work in plain English, and deploying it with a full audit trail that logs every step.","Observability is ensured through an execution log that records the trigger, inputs, evaluation, decision, action, and timestamps, making any decision reconstructable for auditors without trusting the agent blindly.","Safe deployment requires giving the agent read-only access to evaluated systems, write access only to designated GRC objects, and routing consequential actions like closing a risk to a human for sign-off.","The author advises starting with high-toil, low-judgment tasks such as evidence gap detection to build trust before expanding to higher-stakes controls."],"insights":["When agentic automation makes control evaluation cheap, trust and verifiability become the new bottleneck: organizations risk simply swapping manual effort for a 'verification tax' on agent decisions unless the execution log is genuinely auditable.","Because non-deterministic AI models will sometimes be wrong, the execution log's traceability is more important than the model's accuracy—it allows teams to fix the instruction rather than guess why a false positive occurred.","Safely adopting agentic GRC requires giving agents read-only access to evaluated systems, write access only to designated GRC objects, and routing any consequential action (like closing a risk) to a human for sign-off, keeping practitioners in control.","The author advises starting not with high-stakes controls but with high-toil, low-judgment tasks like evidence gap detection, because proving the pattern on boring work builds the trust needed before expanding to critical areas."],"referencedReports":[],"body":"\u003cp\u003eThe article, written by a former red and purple team operator, introduces the concept of agentic AI in governance, risk, and compliance (GRC) and provides a practical walkthrough for building a first GRC agent. It distinguishes agents from traditional automation by their autonomy, context awareness, and ability to execute multi-step sequences, enabling continuous rather than periodic control monitoring. The author argues that while the systems we govern have become elastic and real-time, many compliance programs still rely on point-in-time snapshots, and agentic GRC closes that gap without replacing human judgment.\u003c/p\u003e\n\n\u003cp\u003eA concrete example walks through building an agent for ISO 27001:2022 control A.8.5 (secure authentication) using Anecdotes\u0026rsquo; no-code Agent Studio. The process involves three decisions: picking an event trigger (e.g., evidence older than 24 hours), describing the task in plain English, and deploying it with a full audit trail. When triggered, the agent reads live MFA policy from the identity provider, compares it against the baseline, opens a finding if any group lacks enforcement, and assigns remediation, all logged with timestamped evidence.\u003c/p\u003e\n\n\u003cp\u003eThe author emphasizes that observability and least privilege are essential for trust: the execution log records every action so decisions can be reconstructed for auditors, and the agent should have read-only access to evaluated systems with consequential actions gated behind human sign-off. The recommendation is to start with high-toil, low-judgment tasks like evidence gap detection, build trust, and then expand to higher-stakes controls. The piece also promotes the GRC Data \u0026amp; AI Summit 2026 and early access to Agent Studio.\u003c/p\u003e\n"},{"n":23,"title":"Top Koi alternatives in 2026","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/top-koi-alternatives","time":"16:57","priority":"MAY READ","score":30,"tldr":"With Koi now acquired by Palo Alto Networks, teams seeking developer device supply chain protection may face integration complexity and roadmap uncertainty; Aikido Security is positioned as the best alternative, offering broader endpoint coverage and a full SDLC platform with transparent pricing.","briefOverview":"\u003cp\u003eKoi Security, founded in 2024 to protect developer devices from malicious package and extension installs, was acquired by Palo Alto Networks in April 2026 for roughly $400 million. The deal validates the importance of supply chain security at the endpoint but introduces uncertainty around future pricing, packaging, and speed of roadmap development, as Koi\u0026rsquo;s standalone technology is set to be folded into Palo Alto\u0026rsquo;s Cortex XDR and Prisma AIRS platforms.\u003c/p\u003e\n\n\u003cp\u003eThe article evaluates alternatives for teams that need to move quickly or want coverage beyond the install moment. It highlights that Koi\u0026rsquo;s protection stops at endpoint governance and provides no visibility into application security issues like source code vulnerabilities, secrets, or cloud misconfigurations. Additionally, Koi lacks a minimum-package-age defense against \u0026lsquo;publish-and-pray\u0026rsquo; attacks, requires a sales-led evaluation with no public pricing, and relies on existing MDM or EDR agents to enforce blocks, which can limit speed and offline effectiveness.\u003c/p\u003e\n\n\u003cp\u003eAikido Security is presented as the strongest alternative, combining an on-device agent that enforces install policies at the kernel level (including offline) with a default 48-hour minimum package age policy. It extends protection to the full software development lifecycle—covering SAST, SCA, secrets, IaC, containers, DAST, AI pentesting, and cloud posture—with transparent pricing, a free tier, and integrations into developer workflows to reduce toolchain fragmentation.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Palo Alto Networks acquired Koi Security in April 2026 and plans to integrate its technology into Cortex XDR and Prisma AIRS, creating uncertainty around future pricing, packaging, and roadmap.","Koi's protection is limited to governing what software developers install on endpoints, with no visibility into application security weaknesses like source code vulnerabilities, hardcoded secrets, or cloud misconfigurations.","Aikido Security is presented as the leading alternative, offering a default 48-hour minimum package age policy to block newly published malicious packages, an on-device agent that works offline, and a full platform spanning SAST, SCA, secrets, IaC, containers, DAST, AI pentesting, and cloud posture.","Koi does not publish pricing or offer a self-serve trial, requiring a sales-led evaluation, whereas Aikido provides transparent pricing and a free tier."],"insights":["Koi's 'agentless' design relies on existing MDM/EDR agents to act on alerts, meaning its blocking speed is capped by the slowest third-party tool in the stack, while a dedicated on-device agent can enforce policies instantly and work offline.","A 48-hour minimum package age policy addresses the most common supply chain attack pattern—a compromised maintainer pushing a malicious update—but Koi does not publicly advertise any equivalent defense.","Vendor acquisitions typically slow roadmaps for 12 to 18 months, so teams that need to deploy quickly risk disruption if they commit to a recently acquired product like Koi.","Because Koi does not publish technical documentation or offer a self-serve trial, organizations cannot independently verify how its risk engine detects threats, making informed evaluation difficult without a sales-led POC."],"referencedReports":[],"body":"\u003cp\u003eKoi Security, founded in 2024 to protect developer devices from malicious package and extension installs, was acquired by Palo Alto Networks in April 2026 for roughly $400 million. The deal validates the importance of supply chain security at the endpoint but introduces uncertainty around future pricing, packaging, and speed of roadmap development, as Koi\u0026rsquo;s standalone technology is set to be folded into Palo Alto\u0026rsquo;s Cortex XDR and Prisma AIRS platforms.\u003c/p\u003e\n\n\u003cp\u003eThe article evaluates alternatives for teams that need to move quickly or want coverage beyond the install moment. It highlights that Koi\u0026rsquo;s protection stops at endpoint governance and provides no visibility into application security issues like source code vulnerabilities, secrets, or cloud misconfigurations. Additionally, Koi lacks a minimum-package-age defense against \u0026lsquo;publish-and-pray\u0026rsquo; attacks, requires a sales-led evaluation with no public pricing, and relies on existing MDM or EDR agents to enforce blocks, which can limit speed and offline effectiveness.\u003c/p\u003e\n\n\u003cp\u003eAikido Security is presented as the strongest alternative, combining an on-device agent that enforces install policies at the kernel level (including offline) with a default 48-hour minimum package age policy. It extends protection to the full software development lifecycle—covering SAST, SCA, secrets, IaC, containers, DAST, AI pentesting, and cloud posture—with transparent pricing, a free tier, and integrations into developer workflows to reduce toolchain fragmentation.\u003c/p\u003e\n"},{"n":29,"title":"Healthcare Cybersecurity in an Era of Geopolitical Instability","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/healthcare-cybersecurity-in-an-era-of-geopolitical-instability/","time":"11:29","priority":"MAY READ","score":30,"tldr":"European healthcare organizations must now treat cybersecurity as a resilience function shaped by geopolitical instability, not merely as technical protection, because threat exposure and supply-chain dependencies are directly affected by contested statecraft and military conflicts.","briefOverview":"\u003cp\u003eThis opinion piece by Vasileios Mingos, Health-ISAC’s European Director of Operations, argues that the traditional view of healthcare as a protected, neutral sector is increasingly being tested by today’s geopolitical instability. Multiple military conflicts, rising regional tensions, and the persistent use of cyber operations as instruments of statecraft have blurred the lines between civilian and contested domains. The article highlights that these developments are directly interconnected, placing healthcare firmly within the scope of geopolitical cyber threats rather than outside it.\u003c/p\u003e\n\n\u003cp\u003eThe piece examines the implications for Europe, emphasizing that healthcare organizations must understand how geopolitical risk influences their threat exposure, supply chains, and dependencies on external providers. It calls for a strategic shift from pure protection to resilience, urging the sector to adopt governance and preparedness measures suited to a contested environment. Although the full analysis appears on LinkedIn, the summary underscores the need for healthcare to proactively adapt its cybersecurity posture in an era where neutrality no longer guarantees safety.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Healthcare has traditionally been viewed as a protected, civilian, neutral, and essential sector, but that assumption is increasingly being tested.","The current geopolitical environment is marked by sustained instability, with multiple military conflicts and rising tensions across regions.","Cyber operations have become a persistent instrument of statecraft.","These geopolitical and cyber developments are interconnected, and healthcare is no longer outside their scope."],"insights":["The longstanding assumption that healthcare is a neutral, protected sector is eroding, making it a legitimate target within statecraft-driven cyber operations.","European healthcare organizations must now treat geopolitical risk as a direct input to their cybersecurity posture, not merely an external backdrop, because conflicts directly alter their threat exposure and supply-chain dependencies.","The article signals a strategic shift from pure protection to resilience, implying that healthcare leaders should prepare for successful attacks and focus on continuity rather than solely preventing intrusion."],"referencedReports":[],"body":"\u003cp\u003eThis opinion piece by Vasileios Mingos, Health-ISAC’s European Director of Operations, argues that the traditional view of healthcare as a protected, neutral sector is increasingly being tested by today’s geopolitical instability. Multiple military conflicts, rising regional tensions, and the persistent use of cyber operations as instruments of statecraft have blurred the lines between civilian and contested domains. The article highlights that these developments are directly interconnected, placing healthcare firmly within the scope of geopolitical cyber threats rather than outside it.\u003c/p\u003e\n\n\u003cp\u003eThe piece examines the implications for Europe, emphasizing that healthcare organizations must understand how geopolitical risk influences their threat exposure, supply chains, and dependencies on external providers. It calls for a strategic shift from pure protection to resilience, urging the sector to adopt governance and preparedness measures suited to a contested environment. Although the full analysis appears on LinkedIn, the summary underscores the need for healthcare to proactively adapt its cybersecurity posture in an era where neutrality no longer guarantees safety.\u003c/p\u003e\n"},{"n":26,"title":"Rolldown Pulls Rust React Compiler Integration After Binary Size Increase","source":"socket.dev","sourceColorIdx":2,"link":"https://socket.dev/blog/rolldown-pulls-rust-react-compiler-integration?utm_medium=feed","time":"14:21","priority":"MAY READ","score":25,"tldr":"Rolldown and Vite maintainers pulled a Rust-based React Compiler integration after determining the 5MB binary size increase was unjustifiable for all users, opting instead to explore a smaller opt-in implementation.","briefOverview":"\u003cp\u003eRolldown and Vite maintainers removed a Rust-based React Compiler integration after it increased the Rolldown binary from 28.7MB to 33.8MB — a 17% jump. Boshen, an Oxc maintainer, said the cost could not be justified for a feature that would ship to all Vite users by default. The integration had been in discussion for over a year and arrived through an Oxc plugin that raised the napi transform addon from 3.51 MiB to 8.66 MiB.\u003c/p\u003e\n\n\u003cp\u003eThe decision sparked pushback from both sides. Some developers argued React-specific compiler support should live in an opt-in \u003ccode\u003evite-plugin-react\u003c/code\u003e instead of burdening every install. Evan You stressed that Vite is framework-agnostic and downloaded 12 million times a week, so a 5 MB increase paid by non-React users was unacceptable. The arrival of Rspack 2.1 with Rust React Compiler support — 7–13x faster than Babel — made the performance versus size tradeoff more pressing.\u003c/p\u003e\n\n\u003cp\u003eTechnical work is now focused on reducing the binary cost. Boshen removed a JSON-serialization round-trip that converted a Rust AST to a Babel AST and back, cutting 759 KiB and improving transform speed by 27%. A new napi-rs proposal for compressed addons could shrink a 25.74 MB native addon to 8.15 MB with no runtime penalty. Boshen is also experimenting with a smaller implementation that yields a 2x performance gain with only a 1.4 MB increase, while the team explores raw AST transfer to eliminate plugin overhead.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Rolldown and Vite maintainers pulled a Rust-based React Compiler integration after determining that the 17% binary size increase (from 28.7MB to 33.8MB) could not be justified for a feature that would ship to all users by default.","The Oxc PR integrating the Rust React Compiler increased the Oxc napi transform addon from 3.51 MiB to 8.66 MiB, and Boshen later reduced that by 759 KiB by eliminating a JSON serialization round trip.","Evan You argued that Vite is framework-agnostic and cannot add React-specific bloat because it would set a precedent for other framework-specific additions and impose a 5MB download cost on millions of non-React users.","A new napi-rs proposal suggests an optional compress flag that could shrink a native addon's footprint from 25.74MB to 8.15MB on darwin-arm64 with no runtime speed impact.","Boshen is now experimenting with a smaller implementation that shows up to 2x performance improvement with only a 1.4MB binary size increase."],"insights":["The Rust React Compiler integration incurred a performance penalty from an unnecessary JSON serialization round-trip that converted the Rust AST to a Babel AST and back; removing it cut 759 KiB and sped up transformation by about 27%, showing how interop overhead can undercut native performance gains.","A proposed napi-rs compression flag could shrink native addon binaries by nearly 70% with no runtime penalty, potentially resolving the binary size objection by making large addons small on disk until first use.","The direct integration is up to 50% faster than a plugin because plugins introduce data passing and AST cloning overhead, meaning that an opt-in plugin model might reintroduce the very build-time costs the native integration was meant to eliminate."],"referencedReports":[],"body":"\u003cp\u003eRolldown and Vite maintainers removed a Rust-based React Compiler integration after it increased the Rolldown binary from 28.7MB to 33.8MB — a 17% jump. Boshen, an Oxc maintainer, said the cost could not be justified for a feature that would ship to all Vite users by default. The integration had been in discussion for over a year and arrived through an Oxc plugin that raised the napi transform addon from 3.51 MiB to 8.66 MiB.\u003c/p\u003e\n\n\u003cp\u003eThe decision sparked pushback from both sides. Some developers argued React-specific compiler support should live in an opt-in \u003ccode\u003evite-plugin-react\u003c/code\u003e instead of burdening every install. Evan You stressed that Vite is framework-agnostic and downloaded 12 million times a week, so a 5 MB increase paid by non-React users was unacceptable. The arrival of Rspack 2.1 with Rust React Compiler support — 7–13x faster than Babel — made the performance versus size tradeoff more pressing.\u003c/p\u003e\n\n\u003cp\u003eTechnical work is now focused on reducing the binary cost. Boshen removed a JSON-serialization round-trip that converted a Rust AST to a Babel AST and back, cutting 759 KiB and improving transform speed by 27%. A new napi-rs proposal for compressed addons could shrink a 25.74 MB native addon to 8.15 MB with no runtime penalty. Boshen is also experimenting with a smaller implementation that yields a 2x performance gain with only a 1.4 MB increase, while the team explores raw AST transfer to eliminate plugin overhead.\u003c/p\u003e\n"}]</script>
