intended to bring safety and security practices into the agent development workflow rather than leaving them only for later-stage review.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the release as part of Microsoft’s effort to help teams examine both technical behavior and design assumptions earlier in the software development lifecycle. Microsoft said the goal is to address why certain decisions are made at the beginning of a project, including decisions such as whether an agent should have access to a tool.\u003c/p\u003e\n\n\u003ch2 id=\"rampart\"\u003eRAMPART\u003c/h2\u003e\n\n\u003cp\u003eRAMPART stands for Risk Assessment and Measurement Platform for Agentic Red Teaming. Microsoft describes it as a Pytest-native safety and security testing framework for writing and running tests for AI agents.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, RAMPART supports testing across:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAdversarial issues.\u003c/li\u003e\n\u003cli\u003eBenign issues.\u003c/li\u003e\n\u003cli\u003eVarious harm categories.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDevelopers can use RAMPART to write test cases that attack or probe an AI agent. The article says these tests can explore possible safety violations including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCross-prompt injections.\u003c/li\u003e\n\u003cli\u003eUnintended behavioral regressions.\u003c/li\u003e\n\u003cli\u003eData exfiltration.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article defines cross-prompt injections as cases where untrusted data reaches an AI system indirectly through a data source processed by the system. Examples of such data sources include email, files, and web pages.\u003c/p\u003e\n\n\u003ch2 id=\"how-rampart-works\"\u003eHow RAMPART Works\u003c/h2\u003e\n\n\u003cp\u003eRAMPART evaluates the outcomes of the tests and reports the results. The article says the only requirement is an adapter that connects an agent to the test suite.\u003c/p\u003e\n\n\u003cp\u003eRAMPART builds on PyRIT, short for Python Risk Identification Tool. Microsoft released PyRIT more than two years ago as a way to test AI systems.\u003c/p\u003e\n\n\u003cp\u003eRam Shankar Siva Kumar explained the distinction between the two tools by saying that PyRIT is optimized for black-box discovery by security researchers after a system is built, while RAMPART is built for engineers as the system is being built.\u003c/p\u003e\n\n\u003ch2 id=\"clarity\"\u003eClarity\u003c/h2\u003e\n\n\u003cp\u003eClarity is the second tool Microsoft released. Microsoft describes it as a “structured sounding board” meant to help developers arrive at the right approach before writing code.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes Clarity as an “AI thinking partner that pushes back.” Its purpose is to guide teams through several early-stage development activities, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eProblem clarification.\u003c/li\u003e\n\u003cli\u003eSolution exploration.\u003c/li\u003e\n\u003cli\u003eFailure analysis.\u003c/li\u003e\n\u003cli\u003eDecision tracking.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eClarity is intended to help teams clarify design intent and capture assumptions. In Microsoft’s framing, this makes it possible to pressure-test project decisions before implementation begins.\u003c/p\u003e\n\n\u003ch2 id=\"development-lifecycle-focus\"\u003eDevelopment Lifecycle Focus\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said the tools are designed to help teams handle potential issues before a system is built. One example given in the article is an AI agent’s access to a tool, which could be evaluated earlier in the process.\u003c/p\u003e\n\n\u003cp\u003eRam Shankar Siva Kumar said Microsoft wanted to give product managers and engineers a way to pressure-test assumptions at the start of a project. He said this is when changing course is cheap and when the right conversation can save months of rework.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that the tools are not only about finding issues, but also about making safety work more durable and repeatable. Microsoft said a secondary motivation is to make incidents reproducible and mitigations verifiable.\u003c/p\u003e\n\n\u003ch2 id=\"red-team-learnings-as-engineering-assets\"\u003eRed-Team Learnings as Engineering Assets\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said it wants to scale learnings from red teaming exercises by turning them into runnable engineering assets. In this framing, results from security and safety review become testable artifacts that can be used by developers throughout the lifecycle.\u003c/p\u003e\n\n\u003cp\u003eSiva Kumar said Clarity and RAMPART together move AI safety from a one-time review to a set of living artifacts. These artifacts are intended to be usable by developers throughout the lifecycle.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-impact\"\u003eAffected Parties and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies developers, engineers, and product managers as the primary intended users of these tools. RAMPART is aimed at engineers working on AI agents, while Clarity is aimed at teams making early design and planning decisions.\u003c/p\u003e\n\n\u003cp\u003eThe article does not disclose a specific affected organization, breach, active exploitation, or incident impact. It also does not identify a known or suspected threat actor. The disclosed response is Microsoft’s open-source release of RAMPART and Clarity to support safer AI agent development.\u003c/p\u003e\n","keyPoints":["Microsoft has released two open-source tools, RAMPART and Clarity, to help developers test and improve the security of AI agents.","RAMPART is a Pytest-native safety and security testing framework for writing and running tests against AI agents across adversarial, benign, and harm-category scenarios.","RAMPART can be used to probe AI agents for issues such as cross-prompt injections, unintended behavioral regressions, and data exfiltration.","Clarity is described by Microsoft as a structured sounding board that helps developers clarify problems, explore solutions, analyze failures, and track decisions before writing code.","Microsoft said the tools are intended to make incidents reproducible, mitigations verifiable, and AI safety practices part of the development lifecycle."],"insights":["Microsoft is positioning AI agent security as an engineering workflow problem by turning red-team findings into runnable tests that developers can use while the system is still being built.","RAMPART is intended to complement PyRIT rather than replace it, with PyRIT focused on black-box discovery after a system is built and RAMPART focused on developer-led testing during construction.","The article highlights cross-prompt injection through external data sources such as email, files, or web pages as a specific risk category that AI agent tests should cover.","Clarity targets security and safety issues before implementation by forcing teams to document design intent, assumptions, and decisions when changes are still inexpensive."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft has unveiled two open-source tools, RAMPART and Clarity, to help developers better test the security of artificial intelligence agents. RAMPART is a safety and security testing framework, while Clarity is intended to help teams examine design assumptions before code is written. Microsoft said the tools are meant to bring safety into the AI agent development workflow.\u003c/p\u003e\n\n\u003cp\u003eRAMPART, short for Risk Assessment and Measurement Platform for Agentic Red Teaming, is described as a Pytest-native framework for writing and running safety and security tests for AI agents. It can be used to probe agents for issues such as cross-prompt injections, unintended behavioral regressions, and data exfiltration. The tool builds on Microsoft’s earlier PyRIT project and requires an adapter that connects an agent to the test suite.\u003c/p\u003e\n\n\u003cp\u003eClarity is described by Microsoft as a “structured sounding board” and an “AI thinking partner that pushes back.” It guides developers through problem clarification, solution exploration, failure analysis, and decision tracking. Microsoft said the broader goal is to make incidents reproducible, mitigations verifiable, and AI safety a set of living artifacts used throughout the lifecycle.\u003c/p\u003e\n"},{"n":22,"title":"Typosquatting Is No Longer a User Problem. It's a Supply Chain Problem","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/typosquatting-is-no-longer-user-problem.html","time":"10:30","priority":"MAY READ","score":58,"tldr":"Typosquatting has evolved into a supply chain threat where attackers hide lookalike domains inside trusted third-party scripts and browser-delivered assets, bypassing traditional controls like WAFs, EDR, and CSP. The key defense is runtime behavioral monitoring that shows what approved scripts actually do after they execute.","briefOverview":"\u003cp\u003eTyposquatting is presented as a supply chain problem rather than a user-mistake problem. The article argues that attackers now embed lookalike domains inside legitimate third-party scripts and trusted browser-delivered assets, so no mistyped URL or server breach is required. It uses the Trust Wallet Chrome extension incident as the central example of how trusted assets can be modified and used to steal sensitive data inside the browser.\u003c/p\u003e\n\n\u003cp\u003eThe article says current security stacks often cannot see this activity because firewalls, WAFs, EDR, and CSP do not monitor what approved scripts do after execution in the browser. It highlights AI-generated domain variants, homograph attacks, malicious open-source package uploads, and runtime-only payload behavior as reasons manual vetting and static analysis are insufficient. The recommended response is runtime behavioral monitoring that observes script communications, page-element access, and deviations from established baselines.\u003c/p\u003e\n\n\u003cp\u003eThe article’s practical guidance is to prioritize payment pages, authentication pages, and pages handling sensitive data. It recommends auditing third-party scripts, reviewing CSP reports, establishing baselines for approved scripts, deploying runtime monitoring, and using SRI where scripts are self-hosted or cacheable. It emphasizes that domain registration controls, strict CSP, and DMARC are necessary but do not cover what happens after an approved vendor script is silently modified.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article argues that typosquatting has changed from a user-facing phishing issue into a web supply chain risk. Instead of depending on users to mistype a URL or click a phishing link, attackers can place lookalike domains inside legitimate third-party scripts and browser-delivered assets. The article frames this as a shift from deceiving users to inheriting trust through existing dependency chains.\u003c/p\u003e\n\n\u003cp\u003eThe Trust Wallet Chrome extension attack is used as the article’s main illustration. According to the article, a self-replicating npm worm called Shai-Hulud harvested developer credentials, including GitHub tokens, npm publishing keys, and Chrome Web Store API credentials. Attackers then pushed a trojanized Trust Wallet Chrome extension through official channels, where it captured seed phrases and sent them to a domain disguised as a Trust Wallet analytics endpoint. The article states that 2,500 wallets were drained, $8.5 million was stolen, and no server-side alert fired.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes other supply chain examples, including the September 2025 chalk/debug npm attack and the December 2024 Solana Web3.js library attack. In the chalk/debug case, attackers gained access to 18 trusted JavaScript libraries with more than two billion combined weekly downloads and injected malicious code within 16 minutes. In the Solana Web3.js case, malicious versions of the package intercepted private keys during transactions and exfiltrated them to an attacker-controlled domain registered shortly before the attack.\u003c/p\u003e\n\n\u003cp\u003eA key technical point is that many traditional security controls do not observe browser-runtime behavior. The article says firewalls, WAFs, EDR, server logs, and CSP cannot determine what an approved script actually does once it executes in a user’s browser. CSP is described as a guest list rather than a behavior monitor, because an allowlisted script can still access form fields and transmit data if the origin is trusted.\u003c/p\u003e\n\n\u003cp\u003eThe article states that AI and automation have changed the economics of attack and defense. LLMs can generate thousands of convincing domain variations in minutes, homograph attacks can use visually similar characters across alphabets, and full campaign deployment can take under ten minutes. It also cites Sonatype data showing malicious package uploads to open-source repositories rose 156% year over year, which the article says makes manual vetting structurally impossible.\u003c/p\u003e\n\n\u003cp\u003eThe recommended response is runtime behavioral monitoring of scripts on sensitive web pages. The article says organizations should monitor which domains scripts contact, which page elements they access, and how behavior changes from established baselines. It recommends auditing third-party scripts, reviewing approved origins in CSP reports, prioritizing payment and authentication pages, establishing script behavior baselines, and implementing SRI where scripts are self-hosted or cacheable.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-thesis\"\u003eCore thesis\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that typosquatting is no longer primarily a problem caused by users mistyping URLs or falling for phishing links. Instead, it presents typosquatting as a supply chain problem in which attackers embed lookalike domains inside trusted third-party scripts and browser-delivered assets. In this model, no server breach is required and no user mistake is needed.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central claim is that trust is now inherited through dependency chains. A build pipeline may trust npm, a vendor may trust its CDN, and a browser may trust the vendor. Attackers only need to insert themselves somewhere in that trusted chain.\u003c/p\u003e\n\n\u003ch2 id=\"main-example-trust-wallet-chrome-extension\"\u003eMain example: Trust Wallet Chrome extension\u003c/h2\u003e\n\n\u003cp\u003eThe article uses the Trust Wallet Chrome extension incident as its primary example. It says that on December 24, 2025, Trust Wallet users began losing funds even though they had not clicked phishing links, mistyped URLs, or reused weak passwords. The compromise is described as occurring through a trusted browser-delivered asset rather than through a direct server breach.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, a self-replicating npm worm called Shai-Hulud spent months harvesting developer credentials. The harvested credentials included GitHub tokens, npm publishing keys, and Chrome Web Store API credentials. Those credentials allegedly allowed attackers to push a trojanized version of the Trust Wallet Chrome extension through official channels.\u003c/p\u003e\n\n\u003cp\u003eThe malicious extension executed inside users’ browsers. It captured seed phrases and transmitted them to attacker infrastructure hosted at a domain disguised as Trust Wallet’s analytics endpoint. The article states that within 48 hours, 2,500 wallets were drained and total losses reached $8.5 million.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that no server was breached and no alert fired. It argues that this happened not because existing controls were misconfigured, but because server logs, firewalls, WAFs, and EDR were not designed to observe malicious behavior occurring inside a browser session.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-article-says-this-matters-beyond-cryptocurrency\"\u003eWhy the article says this matters beyond cryptocurrency\u003c/h2\u003e\n\n\u003cp\u003eThe article explicitly says the Trust Wallet example is not only a crypto story. It asks readers to replace seed phrases with payment card data and replace the Chrome extension with a marketing pixel, support widget, or A/B testing framework. The article says the attack pattern remains the same: a trusted browser-delivered asset is modified to intercept sensitive user data before the legitimate application processes it.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that a typical e-commerce checkout page runs 40 to 60 third-party scripts. Each script represents a trusted connection. The article’s point is that the same type of browser-runtime compromise could apply to checkout pages, login pages, and other pages that handle sensitive data.\u003c/p\u003e\n\n\u003ch2 id=\"evolution-of-typosquatting\"\u003eEvolution of typosquatting\u003c/h2\u003e\n\n\u003cp\u003eThe article describes modern typosquatting as an evolution from earlier attacks that required direct user deception. It says older social engineering required someone to mistype a URL, click a link, approve a prompt, or trust a sender. In the newer model, the deception is aimed at the dependency graph rather than a person.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights AI as a major factor in this shift. It says LLMs can generate thousands of convincing domain variations in minutes. It also says attackers can use homograph attacks that combine Latin, Cyrillic, and Greek characters to create domains that look visually identical in browser address bars while evading string-distance detection.\u003c/p\u003e\n\n\u003cp\u003eThe article states that domain registration, SSL issuance, and full campaign deployment can now take under ten minutes. It cites Sonatype data saying malicious package uploads to open-source repositories increased 156% year over year. The article concludes from this that manual vetting is no longer viable at the required scale.\u003c/p\u003e\n\n\u003ch2 id=\"additional-examples-cited-in-the-article\"\u003eAdditional examples cited in the article\u003c/h2\u003e\n\n\u003ch3 id=\"trust-wallet-chrome-extension\"\u003eTrust Wallet Chrome Extension\u003c/h3\u003e\n\n\u003cp\u003eThe article describes the Trust Wallet attack as involving Shai-Hulud, stolen developer credentials, a trojanized Chrome extension, and a lookalike analytics domain. It says the result was 2,500 drained wallets and $8.5 million in losses. It also says detection time was zero because there was no server-side visibility into browser-runtime execution.\u003c/p\u003e\n\n\u003ch3 id=\"chalk-debug-npm-attack\"\u003echalk/debug npm attack\u003c/h3\u003e\n\n\u003cp\u003eThe article says that in September 2025, a phishing email targeting a single package maintainer gave attackers access to 18 trusted JavaScript libraries. These included chalk and debug, with more than two billion combined weekly downloads. Within 16 minutes, malicious code was injected across the libraries.\u003c/p\u003e\n\n\u003cp\u003eThe injected code is described as hooking browser APIs to silently intercept network traffic and wallet interactions. The article says fast containment limited direct losses to around $500. However, it emphasizes that the larger issue was the exposure created by two billion weekly downloads.\u003c/p\u003e\n\n\u003ch3 id=\"solana-web3-js-library-attack\"\u003eSolana Web3.js Library Attack\u003c/h3\u003e\n\n\u003cp\u003eThe article says attackers compromised a publish-access account for the @solana/web3.js npm library through phishing. They then published malicious versions containing a hidden function that intercepted private keys mid-transaction. The stolen data was exfiltrated to an attacker-controlled domain registered days before the attack.\u003c/p\u003e\n\n\u003cp\u003eThe article states that any application that auto-updated during the five-hour window shipped the backdoor directly to users. It says nearly $200,000 was drained before discovery.\u003c/p\u003e\n\n\u003ch2 id=\"the-security-stack-blind-spot\"\u003eThe security stack blind spot\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that many existing security tools do not observe what third-party scripts do after they execute in the browser. It specifically names firewalls, WAFs, EDR, server logs, and CSP as insufficient for this runtime visibility problem. The reason given is that these controls generally do not monitor browser-memory behavior by approved scripts.\u003c/p\u003e\n\n\u003cp\u003eThe article gives an example involving a marketing vendor integrated into web properties. That vendor references a JavaScript CDN registered six weeks earlier, with valid SSL and a recognizable domain. If the script is quietly updated and loaded on a payment page, it could use an invisible overlay to intercept keystrokes before they reach the application.\u003c/p\u003e\n\n\u003cp\u003eIn that scenario, the article says server logs would record a normal session. No alert would fire because the suspicious behavior happens inside the browser and through a trusted script path.\u003c/p\u003e\n\n\u003ch2 id=\"csp-limitations\"\u003eCSP limitations\u003c/h2\u003e\n\n\u003cp\u003eThe article calls CSP a frequently cited control but says it is limited. It describes CSP as a guest list rather than a behavior monitor. CSP can govern which origins are allowed, but it cannot determine whether an allowlisted script behaves maliciously after loading.\u003c/p\u003e\n\n\u003cp\u003eThe article gives the example of an allowlisted script that reads payment form fields and exfiltrates the data. Because the origin is trusted, the behavior may still be permitted from CSP’s perspective. The article summarizes this as CSP handling the connection but not the execution.\u003c/p\u003e\n\n\u003ch2 id=\"static-analysis-limitations\"\u003eStatic analysis limitations\u003c/h2\u003e\n\n\u003cp\u003eThe article says malicious behavior in 2026 is often deferred to runtime by design. It states that Shai-Hulud packages remained dormant during automated scanning and activated only under specific runtime conditions. As a result, the article says static analysis cannot catch payloads that load dynamically after execution begins.\u003c/p\u003e\n\n\u003cp\u003eThe article also says AI-generated obfuscation is engineered to defeat static analysis. Such code can pass linting, mimic legitimate minified libraries, and produce no signature matches. The article argues that the harder problem is not just identifying a suspicious domain, but understanding what the script loaded from that domain actually does.\u003c/p\u003e\n\n\u003ch2 id=\"what-detection-requires\"\u003eWhat detection requires\u003c/h2\u003e\n\n\u003cp\u003eThe article says detection requires observing the behavior of scripts after they execute. This includes identifying which domains scripts communicate with, which page elements they access, and how behavior deviates from established baselines. It calls this runtime behavioral monitoring.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several characteristics to monitor:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnexpected data exfiltration, such as scripts reading form fields and sending values to domains outside the approved list.\u003c/li\u003e\n\u003cli\u003eDynamic domain resolution, such as scripts calling recently registered domains or resolving differently from their baseline.\u003c/li\u003e\n\u003cli\u003eBehavioral drift, such as a script that behaved normally last week but accesses different page elements this week.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says runtime behavioral deobfuscation is needed to close the gap left by static analysis. This involves executing scripts in an instrumented environment and tracing actual behavior rather than only reading source code. The article says this should surface access to form fields, cookies, and network endpoints regardless of source-code obfuscation.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-action-plan\"\u003eRecommended action plan\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends prioritizing by exposure. It says payment pages should be addressed first, authentication pages second, and all other pages afterward. It then divides practical steps into actions for the current week and the current month.\u003c/p\u003e\n\n\u003ch3 id=\"this-week\"\u003eThis week\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends that organizations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAudit third-party scripts for recently registered CDN domains in the dependency chain.\u003c/li\u003e\n\u003cli\u003eReview CSP reports, including what approved origins are actually doing rather than only violations.\u003c/li\u003e\n\u003cli\u003eIdentify pages that handle sensitive data, including payment pages, login pages, and PII forms.\u003c/li\u003e\n\u003cli\u003ePrioritize monitoring on the most sensitive pages first.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"this-month\"\u003eThis month\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends that organizations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDeploy runtime behavioral monitoring for payment and authentication pages.\u003c/li\u003e\n\u003cli\u003eEstablish behavioral baselines for all approved third-party scripts.\u003c/li\u003e\n\u003cli\u003eImplement subresource integrity checks where scripts are self-hosted or cacheable.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"controls-described-as-necessary-but-incomplete\"\u003eControls described as necessary but incomplete\u003c/h2\u003e\n\n\u003cp\u003eThe article says proactive domain registration, strict CSP, and enforced DMARC are necessary controls. It maps these to domain registration, script delivery, and email impersonation. However, it says none of them covers what happens after an approved vendor script is silently modified.\u003c/p\u003e\n\n\u003cp\u003eThe article presents that gap as the central issue most teams may not recognize until after an incident. Its recommended response is to combine governance and foundational controls with runtime behavioral monitoring and phased implementation focused first on sensitive web pages.\u003c/p\u003e\n","keyPoints":["Typosquatting has shifted from relying on users mistyping URLs to attackers embedding lookalike domains inside legitimate third-party scripts and trusted browser-delivered assets.","The article states that firewalls, WAFs, EDR, and CSP lack visibility into what approved scripts do once they execute inside the browser.","AI and automation allow attackers to generate thousands of convincing domain variants in minutes and deploy campaigns in under ten minutes.","The Trust Wallet Chrome extension attack showed how a trusted browser-delivered asset could capture sensitive user data and send it to a lookalike domain without triggering server-side alerts.","The article says detection requires runtime behavioral monitoring of scripts, including what domains they communicate with, what page elements they access, and how their behavior changes from established baselines."],"insights":["CSP should be treated as a guest list rather than a behavior monitor, because an allowlisted script can still read payment fields and exfiltrate data while remaining compliant with the policy.","The article recommends prioritizing defenses by exposure, with payment pages first, authentication pages second, and all other pages afterward.","Static analysis is insufficient against modern malicious JavaScript because payloads can remain dormant during scans and activate only under specific runtime conditions.","Behavioral drift is an actionable signal: a script that was previously normal but begins accessing different page elements or communicating with new domains should be investigated.","Subresource integrity checks are useful only where scripts are self-hosted or cacheable, so they do not fully address silently modified approved vendor scripts."],"referencedReports":[{"title":"Sonatype's 10th Annual State of the Software Supply Chain Report","url":"https://www.sonatype.com/press-releases/sonatypes-10th-annual-state-of-the-software-supply-chain-report","publisher":"Sonatype","context":"The article cites Sonatype's data to state that malicious package uploads to open-source repositories jumped 156% year over year.","category":"","primary":false},{"title":"npm Supply Chain Attack September 2025","url":"https://www.sygnia.co/threat-reports-and-advisories/npm-supply-chain-attack-september-2025/","publisher":"Sygnia","context":"The article references Sygnia's threat report/advisory when describing the September 2025 chalk/debug npm attack involving 18 trusted JavaScript libraries.","category":"","primary":false},{"title":"2025 Cost of a Data Breach Report","url":"https://www.ibm.com/think/topics/data-breach","publisher":"IBM","context":"The article cites IBM's 2025 Cost of a Data Breach Report for the finding that the average breach takes 241 days to identify.","category":"","primary":false}],"body":"\u003cp\u003eTyposquatting is presented as a supply chain problem rather than a user-mistake problem. The article argues that attackers now embed lookalike domains inside legitimate third-party scripts and trusted browser-delivered assets, so no mistyped URL or server breach is required. It uses the Trust Wallet Chrome extension incident as the central example of how trusted assets can be modified and used to steal sensitive data inside the browser.\u003c/p\u003e\n\n\u003cp\u003eThe article says current security stacks often cannot see this activity because firewalls, WAFs, EDR, and CSP do not monitor what approved scripts do after execution in the browser. It highlights AI-generated domain variants, homograph attacks, malicious open-source package uploads, and runtime-only payload behavior as reasons manual vetting and static analysis are insufficient. The recommended response is runtime behavioral monitoring that observes script communications, page-element access, and deviations from established baselines.\u003c/p\u003e\n\n\u003cp\u003eThe article’s practical guidance is to prioritize payment pages, authentication pages, and pages handling sensitive data. It recommends auditing third-party scripts, reviewing CSP reports, establishing baselines for approved scripts, deploying runtime monitoring, and using SRI where scripts are self-hosted or cacheable. It emphasizes that domain registration controls, strict CSP, and DMARC are necessary but do not cover what happens after an approved vendor script is silently modified.\u003c/p\u003e\n"},{"n":6,"title":"Identity Alone Isn't Enough: Why Device Security Has to Share the Load","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/identity-alone-isnt-enough-why-device-security-has-to-share-the-load/","time":"14:02","priority":"MAY READ","score":45,"tldr":"Identity and MFA alone can’t reliably stop attackers who steal credentials or session tokens, because a valid login may come from an unsafe or compromised device. Organizations should pair identity checks with continuous device posture verification so access depends on both the user and a trusted, healthy endpoint.","briefOverview":"\u003cp\u003eThe article argues that identity-based security and MFA are no longer sufficient on their own because valid credentials can still be used from unsafe or attacker-controlled devices. It says SaaS sprawl, BYOD, and hybrid work have weakened the assumption that a verified user automatically represents a safe connection. The core issue is not only whether authentication succeeds, but whether the device behind the access request remains trustworthy.\u003c/p\u003e\n\n\u003cp\u003eA major technical concern is the post-authentication blind spot created when attackers steal session tokens after MFA succeeds. The article explains that phishing kits can proxy a login in real time, allowing the victim to complete MFA while the attacker captures the issued session cookie. Because the token in an attacker’s browser can look identical to the token in the user’s browser, traditional authentication logs may not distinguish between them.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends pairing identity controls with continuous device posture verification across the full session. It highlights checks such as encryption status, endpoint protection health, OS patching, configuration compliance, and approved hardware. It presents continuous device trust as a way to reduce the value of stolen credentials and intercepted tokens by tying access to both a verified user and a trusted, healthy endpoint.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article says identity has historically carried much of the burden in cybersecurity, based on the idea that verifying the employee secures access. It argues that this model is under strain as threat actors use AI and sophisticated phishing kits, while organizations operate in environments shaped by SaaS sprawl, BYOD, and hybrid work. In that context, a valid credential is no longer treated as proof that the connection is safe.\u003c/p\u003e\n\n\u003cp\u003eThe technical problem emphasized is the gap after authentication. MFA can succeed exactly as designed while phishing kits proxy the user’s login session in real time and steal the session token issued after MFA. The article notes that a stolen session token used in an attacker’s browser can look the same as the legitimate token in the user’s browser, leaving traditional authentication logs unable to tell them apart.\u003c/p\u003e\n\n\u003cp\u003eThe article cites NIST Special Publication 800-207 as the foundational Zero Trust architecture framework and says it anticipated this issue. According to the article, NIST warns against relying on implied trust after a subject meets a base authentication level. It also says access decisions should consider whether the requesting device has the proper security posture.\u003c/p\u003e\n\n\u003cp\u003eThe article states that many Zero Trust implementations remain heavily identity-centric. They often focus on MFA, password reduction, stronger authentication, and risk-based sign-in policies, while device verification is applied inconsistently. It says device checks may stop at login or apply mainly to browser-based workflows, while legacy protocols, remote access tools, and API integrations may inherit trust once identity is established.\u003c/p\u003e\n\n\u003cp\u003eThe affected parties described are organizations managing corporate, personal, and third-party devices across hybrid and remote work environments. The article says device posture checks can determine whether a device is encrypted, protected by active endpoint security, patched, policy-compliant, and approved hardware. It recommends continuous verification, hardware binding, proportionate enforcement, and self-service remediation so trust can adjust when device conditions change during a session.\u003c/p\u003e\n\n\u003cp\u003eThe article presents Specops Device Trust as a solution that operationalizes this approach by extending trust decisions beyond identity. It says the product continuously authenticates users and verifies devices across Windows, macOS, Linux, and mobile platforms, rather than only at login. The article concludes that identity remains important but can no longer carry the full weight of access decisions alone.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-argument\"\u003eCore argument\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that identity-based security is no longer enough to govern access decisions by itself. Identity remains important, but the article says it is being asked to carry a security burden it was not designed to support. The main reason is that a valid credential or successful MFA event does not necessarily prove that the connection is safe.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this issue around modern enterprise conditions such as SaaS sprawl, BYOD, and hybrid work. In those environments, users may access systems from corporate, personal, or third-party devices with different levels of control and security. The article says organizations need to verify not only who is requesting access, but also whether the device used for that access is trusted and healthy.\u003c/p\u003e\n\n\u003ch2 id=\"post-authentication-blind-spot\"\u003ePost-authentication blind spot\u003c/h2\u003e\n\n\u003cp\u003eA central technical point is that MFA can be bypassed in practice without being technically broken. The article explains that phishing kits can sit between a user and the legitimate login portal, proxy the authentication process in real time, and steal the session token issued after MFA succeeds. In that scenario, the victim completes the expected security checks, while the attacker receives the cookie that proves the authenticated session.\u003c/p\u003e\n\n\u003cp\u003eThe article describes this as a post-authentication blind spot. Once identity is verified and MFA passes, many organizations allow a session to continue until the token expires. The article notes that a session token in an attacker’s browser can look identical to the same token in the legitimate user’s browser, and that traditional authentication logs cannot tell them apart.\u003c/p\u003e\n\n\u003ch2 id=\"zero-trust-and-device-posture\"\u003eZero Trust and device posture\u003c/h2\u003e\n\n\u003cp\u003eThe article cites NIST Special Publication 800-207 as the foundational framework for Zero Trust architecture. It says the framework anticipated the problem of relying on implied trust after a subject meets a base authentication level. The article also says NIST specifies that access decisions should consider whether the device involved in the request has the proper security posture.\u003c/p\u003e\n\n\u003cp\u003eDespite that, the article argues that many Zero Trust implementations have become heavily identity-centric. It says organizations often focus on stronger authentication, MFA, reduced password reliance, and risk-based sign-in policies. Device verification, by contrast, is described as inconsistently applied.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies several areas where device verification may break down:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDevice checks may stop at the point of login.\u003c/li\u003e\n\u003cli\u003eDevice verification may apply mainly to browser-based workflows inside modern conditional access frameworks.\u003c/li\u003e\n\u003cli\u003eLegacy protocols, remote access tools, and API integrations may inherit trust once identity is established.\u003c/li\u003e\n\u003cli\u003ePersonal and third-party devices may be loosely controlled or unmanaged.\u003c/li\u003e\n\u003cli\u003eSession trust may persist even if device posture degrades during the session.\u003c/li\u003e\n\u003cli\u003eIdentity signals and endpoint signals may remain in separate tools with limited integration.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"why-device-security-matters\"\u003eWhy device security matters\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that the same password should not be treated the same way when used from different device contexts. A stolen password used from an attacker-controlled laptop should not receive the same trust as the same password used from an enrolled, encrypted, compliant corporate endpoint. The article says this equal treatment can happen when identity alone governs access.\u003c/p\u003e\n\n\u003cp\u003eDevice posture checks answer questions that identity cannot answer. The article lists examples such as whether the device is encrypted, whether endpoint protection is active and healthy, whether the operating system is patched, whether configuration has drifted from policy, and whether the hardware is approved. These checks provide additional signals that help determine whether a connection should be trusted.\u003c/p\u003e\n\n\u003cp\u003eThe article stresses that these answers need to remain current beyond initial login. It notes that device conditions can change during a session: updates can be delayed, endpoint protection can be disabled, and unapproved software can be installed. Because conditions at login may not match conditions later in the session, the article recommends continuous device verification.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-model\"\u003eRecommended model\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends combining identity with continuous device verification. It presents four principles for a stronger access model:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eContinuously verify both the user and the device, so access remains conditional on device health rather than identity proof alone.\u003c/li\u003e\n\u003cli\u003eBind access to approved hardware, allowing organizations to distinguish between corporate, personal, and third-party endpoints.\u003c/li\u003e\n\u003cli\u003eApply proportionate enforcement, such as conditional restrictions, reduced privileges, or time-bound grace periods, instead of defaulting only to hard blocks.\u003c/li\u003e\n\u003cli\u003eEnable self-service remediation, so users can fix issues related to encryption, OS updates, or endpoint protection without necessarily filing a ticket or losing access unnecessarily.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this approach can reduce the effectiveness of stolen credentials, token replay, MFA fatigue, and attacker-operated endpoints. Its central point is that access should be bound not only to identity, but also to a trusted and healthy endpoint.\u003c/p\u003e\n\n\u003ch2 id=\"product-framing-and-response\"\u003eProduct framing and response\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Specops Device Trust as a way to operationalize the model it describes. It says the solution extends trust decisions beyond identity and maintains enforcement as conditions change. The article states that it authenticates users and verifies devices continuously across Windows, macOS, Linux, and mobile platforms, rather than only at the point of login.\u003c/p\u003e\n\n\u003cp\u003eThe article also includes a sponsored section promoting Specops Password Policy, which it describes as securing Active Directory with compliant password policies and blocking more than 4 billion compromised passwords. It references Verizon’s Data Breach Investigation Report as finding that stolen credentials are involved in 44.7% of breaches. The article ends by encouraging readers to contact Specops or book a demo if they want to evolve their identity security strategy to include device trust.\u003c/p\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall significance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main significance is its shift in focus from authentication success to ongoing access trust. It argues that identity and MFA are necessary but insufficient because attackers can obtain valid credentials or session tokens and use them from unsafe environments. The proposed security improvement is to make access depend on both the verified user and continuous verification of the device’s posture throughout the session.\u003c/p\u003e\n","keyPoints":["A valid credential is no longer a guarantee of a safe connection in environments shaped by SaaS sprawl, BYOD, and hybrid work.","Phishing kits can proxy authentication in real time and steal session tokens after MFA succeeds, making attacker sessions look like legitimate user sessions.","Many Zero Trust implementations remain heavily identity-centric, with device verification applied inconsistently or only at login.","Device posture checks can verify whether a device is encrypted, protected by healthy endpoint security, patched, policy-compliant, and approved hardware.","The article argues that access decisions should combine identity with continuous device verification so trust can adjust when device conditions change during a session."],"insights":["The article highlights that the critical failure point is often after successful authentication, because MFA can work exactly as designed while an attacker still captures the resulting session token.","Traditional authentication logs may not distinguish between a session token used in the legitimate user’s browser and the same token replayed in an attacker’s browser.","Zero Trust deployments can remain fragmented when legacy protocols, remote access tools, and API integrations inherit trust after identity is established.","Device trust programs should include proportionate enforcement, such as reduced privileges or time-bound grace periods, because rigid blocking can drive users toward workarounds.","Self-service remediation is presented as a necessary part of device-based access control, since users need a way to restore trust when encryption, updates, or endpoint protection fail policy checks."],"referencedReports":[{"title":"NIST Special Publication 800-207","url":"https://nvlpubs.nist.gov/nistpubs/specialpublications/NIST.SP.800-207.pdf","publisher":"National Institute of Standards and Technology (NIST)","context":"The article cites it as the foundational Zero Trust architecture framework and notes that it warns against relying on implied trust after base authentication and calls for device posture in access decisions.","category":"","primary":false}],"body":"\u003cp\u003eThe article argues that identity-based security and MFA are no longer sufficient on their own because valid credentials can still be used from unsafe or attacker-controlled devices. It says SaaS sprawl, BYOD, and hybrid work have weakened the assumption that a verified user automatically represents a safe connection. The core issue is not only whether authentication succeeds, but whether the device behind the access request remains trustworthy.\u003c/p\u003e\n\n\u003cp\u003eA major technical concern is the post-authentication blind spot created when attackers steal session tokens after MFA succeeds. The article explains that phishing kits can proxy a login in real time, allowing the victim to complete MFA while the attacker captures the issued session cookie. Because the token in an attacker’s browser can look identical to the token in the user’s browser, traditional authentication logs may not distinguish between them.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends pairing identity controls with continuous device posture verification across the full session. It highlights checks such as encryption status, endpoint protection health, OS patching, configuration compliance, and approved hardware. It presents continuous device trust as a way to reduce the value of stolen credentials and intercepted tokens by tying access to both a verified user and a trusted, healthy endpoint.\u003c/p\u003e\n"}];

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });

  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.

function FlyingCard({ article, startDx, startDy }) {

  React.useEffect(() => {

    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
