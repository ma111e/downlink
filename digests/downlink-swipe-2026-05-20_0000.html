of transactions.\u003c/p\u003e\n\n\u003cp\u003eThe reported losses were especially concentrated among older victims. More than half of the complaints involved individuals over 50, and those complaints accounted for more than $302 million in losses. In most complaints, victims said fraudsters provided detailed instructions on withdrawing money from bank accounts, finding a cryptocurrency kiosk and sending funds.\u003c/p\u003e\n\n\u003cp\u003eTexas led the state-by-state loss figures with 1,179 reports and nearly \u003cspan class=\"math inline\"\u003e\\(57 million in reported losses. Florida followed with 1,213 reports and \\)\u003c/span\u003e32.7 million in losses, while California and Illinois each reported more than $20 million. Arizona, New Jersey, North Carolina, Pennsylvania, Tennessee, Kentucky, Michigan and Ohio all recorded eight-figure losses.\u003c/p\u003e\n\n\u003cp\u003eThe article says the machines are commonly found in commercial spaces such as gas stations, grocery stores and malls. It also cites a prior U.S. Treasury Department warning that cryptocurrency ATMs are increasingly used in cyber thefts involving fake investment schemes, tech support ruses and romance scams. The article states that most of those scams are run by Chinese gangs from compounds in Southeast Asia.\u003c/p\u003e\n\n\u003cp\u003eGovernment responses and legal actions are increasing. Tennessee banned cryptocurrency ATMs last month, Indiana outlawed the technology in March, and a similar measure in Minnesota passed the Senate and awaits a House vote. Massachusetts, Iowa and Washington, D.C. have brought lawsuits or investigations involving kiosk operators, while New Zealand banned all crypto ATMs last year and Australia introduced legislation to set spending limits and other fraud-related rules.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe FBI reported that U.S. residents lost more than $388 million through cryptocurrency kiosks in 2025. The figures were published in a supplement to the FBI’s annual Internet Crime Complaint Center report focused on cryptocurrency ATMs. These kiosks allow people to trade cash for cryptocurrency.\u003c/p\u003e\n\n\u003cp\u003eThe FBI said the use of cryptocurrency kiosks to perpetrate fraudulent activity against the U.S. population is increasing. Criminals are directing victims to send funds through the machines. The report is based on complaints submitted to IC3.\u003c/p\u003e\n\n\u003ch2 id=\"complaint-and-loss-figures\"\u003eComplaint and Loss Figures\u003c/h2\u003e\n\n\u003cp\u003eIn 2025, IC3 received more than 13,400 complaints reporting the use of cryptocurrency kiosks. Reported losses exceeded $388 million. Compared with 2024, complaints increased by 23% and losses increased by 58%.\u003c/p\u003e\n\n\u003cp\u003eThe FBI noted that its data includes complaints where a cryptocurrency kiosk was used in the scam. It also cautioned that the complaints may include other types of transactions. This means the figures are tied to cases involving kiosks but may not be limited solely to kiosk transactions.\u003c/p\u003e\n\n\u003ch2 id=\"victim-profile-and-scam-method\"\u003eVictim Profile and Scam Method\u003c/h2\u003e\n\n\u003cp\u003eMore than half of the complaints involved individuals over 50. Those victims reported losses of more than $302 million. The article identifies older individuals as a major share of the reported losses.\u003c/p\u003e\n\n\u003cp\u003eIn most complaints, victims said fraudsters gave them detailed instructions. Those instructions included how to take money from a bank account, where to find a cryptocurrency kiosk and how to send the funds. The FBI described criminals as ordering victims to send money through the ATMs.\u003c/p\u003e\n\n\u003ch2 id=\"state-by-state-impact\"\u003eState-by-State Impact\u003c/h2\u003e\n\n\u003cp\u003eThe FBI report included state-by-state figures that the article described as staggering. Texas topped the list with 1,179 reports and nearly \u003cspan class=\"math inline\"\u003e\\(57 million in reported losses. Florida was next with 1,213 reports and \\)\u003c/span\u003e32.7 million in losses.\u003c/p\u003e\n\n\u003cp\u003eCalifornia and Illinois each reported more than $20 million in losses. Several other states recorded eight-figure losses, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eArizona\u003c/li\u003e\n\u003cli\u003eNew Jersey\u003c/li\u003e\n\u003cli\u003eNorth Carolina\u003c/li\u003e\n\u003cli\u003ePennsylvania\u003c/li\u003e\n\u003cli\u003eTennessee\u003c/li\u003e\n\u003cli\u003eKentucky\u003c/li\u003e\n\u003cli\u003eMichigan\u003c/li\u003e\n\u003cli\u003eOhio\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"where-the-machines-are-found\"\u003eWhere the Machines Are Found\u003c/h2\u003e\n\n\u003cp\u003eThe article says cryptocurrency ATMs are typically located in commercial spaces. Examples include gas stations, grocery stores and malls. These locations make the machines accessible to the public.\u003c/p\u003e\n\n\u003ch2 id=\"related-scam-categories-and-actors-mentioned\"\u003eRelated Scam Categories and Actors Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article cites a prior U.S. Treasury Department warning that cryptocurrency ATMs are increasingly used in cyber thefts. The schemes mentioned include fake investment schemes, tech support ruses and romance scams. The article states that most of these scams are run by Chinese gangs from compounds in Southeast Asia.\u003c/p\u003e\n\n\u003ch2 id=\"government-and-legal-responses\"\u003eGovernment and Legal Responses\u003c/h2\u003e\n\n\u003cp\u003eSeveral jurisdictions have taken action against cryptocurrency ATMs or kiosk operators. Tennessee banned cryptocurrency ATMs last month. Indiana outlawed the technology in March.\u003c/p\u003e\n\n\u003cp\u003eA similar measure in Minnesota recently passed the Senate and is awaiting a House vote. New Zealand banned all crypto ATMs last year. Australia introduced legislation that would set spending limits and other rules intended to address fraud.\u003c/p\u003e\n\n\u003ch2 id=\"investigations-and-lawsuits-involving-kiosk-operators\"\u003eInvestigations and Lawsuits Involving Kiosk Operators\u003c/h2\u003e\n\n\u003cp\u003eThe article says several recent investigations by state attorneys general have raised questions about the crypto kiosk industry and whether the ATMs serve a legitimate purpose. In February, Massachusetts filed a lawsuit against Bitcoin Depot, described as the largest global kiosk provider. The lawsuit said that among hundreds of customers contacted by the attorney general’s office, more than 80% had been victims of scams.\u003c/p\u003e\n\n\u003cp\u003eIowa also recently sued Bitcoin Depot and another major provider, CoinFlip. The Iowa lawsuit alleged that the companies profited from scams. Washington, D.C. sued kiosk operator Athena in September, alleging that 93% of its transactions in the district were scam related.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article presents cryptocurrency kiosks as an increasingly common tool in reported fraud schemes. The FBI’s 2025 figures show both a rise in complaint volume and a larger rise in reported losses compared with 2024. The reported losses are especially severe for people over 50 and are concentrated in several states, with Texas and Florida leading the list.\u003c/p\u003e\n\n\u003cp\u003eThe response described in the article includes bans, proposed legislation, spending-limit measures, lawsuits and investigations. These actions reflect growing scrutiny of whether cryptocurrency ATMs enable scams and whether kiosk operators are addressing fraud tied to their machines.\u003c/p\u003e\n","keyPoints":["U.S. residents reported losing more than $388 million through cryptocurrency kiosks in 2025, according to an FBI supplement based on IC3 complaints.","The FBI said IC3 received more than 13,400 complaints involving cryptocurrency kiosks in 2025, a 23% increase in complaints and a 58% increase in losses from 2024.","More than half of the 2025 complaints involving cryptocurrency kiosks concerned individuals over age 50, with reported losses exceeding $302 million.","Texas reported 1,179 crypto kiosk-related complaints and nearly $57 million in losses, while Florida reported 1,213 complaints and $32.7 million in losses.","Tennessee and Indiana have banned cryptocurrency ATMs, and lawsuits or investigations in Massachusetts, Iowa and Washington, D.C., have raised concerns about crypto kiosk operators and scam-related transactions."],"insights":["Reported losses were heavily concentrated among older victims: people over 50 accounted for more than $302 million of the $388 million in losses while representing just over half of complaints.","Texas had fewer reported complaints than Florida but far higher reported losses, indicating Texas complaints involved substantially larger losses on average.","The FBI cautioned that its cryptocurrency kiosk figures may include complaints where kiosks were used alongside other transaction types, which limits how precisely the losses can be attributed to kiosks alone.","State legal actions cited unusually high scam exposure among some kiosk operators’ customers, including Massachusetts alleging more than 80% of contacted Bitcoin Depot customers were scam victims and Washington, D.C. alleging 93% of Athena transactions in the district were scam related."],"referencedReports":[{"title":"Supplement to the FBI IC3 annual report on cryptocurrency ATMs","url":"https://www.ic3.gov/PSA/2026/PSA260515-2","publisher":"FBI Internet Crime Complaint Center","context":"The article says the FBI released a supplement to its annual IC3 study focused on cryptocurrency ATMs and reported 2025 complaint and loss figures tied to cryptocurrency kiosks.","category":"","primary":false}],"body":"\u003cp\u003eThe FBI reported that U.S. residents lost more than $388 million through cryptocurrency kiosks in 2025. The figures come from a supplement to the FBI’s annual Internet Crime Complaint Center study focused on cryptocurrency ATMs, which allow people to trade cash for cryptocurrency. The FBI said the use of these kiosks to perpetrate fraud against the U.S. population is increasing.\u003c/p\u003e\n\n\u003cp\u003eThe IC3 received more than 13,400 complaints involving cryptocurrency kiosks in 2025, representing a 23% increase in complaints and a 58% increase in losses from 2024. More than half of the complaints involved individuals over 50, with losses exceeding $302 million. Victims often reported being given detailed instructions by fraudsters on how to withdraw money, locate a kiosk and send funds.\u003c/p\u003e\n\n\u003cp\u003eTexas and Florida topped the state-by-state figures, with Texas reporting nearly \u003cspan class=\"math inline\"\u003e\\(57 million in losses and Florida reporting \\)\u003c/span\u003e32.7 million. Other states, including California, Illinois, Arizona, New Jersey, North Carolina, Pennsylvania, Tennessee, Kentucky, Michigan and Ohio, also reported large losses. The article also describes bans, lawsuits and investigations targeting crypto ATMs or kiosk operators in several jurisdictions.\u003c/p\u003e\n"},{"n":14,"title":"FTC warns 12 major tech firms of violating Take It Down Act","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/ftc-warns-12-firms-of-violating-take-it-down-act","time":"17:29","priority":"SHOULD READ","score":78,"tldr":"The FTC warned major tech platforms that they may be violating the Take It Down Act by failing to provide easy removal processes for nonconsensual intimate images, which must be deleted within 48 hours of a victim’s request. Companies that do not comply could face fines of up to $53,088 per violation.","briefOverview":"\u003cp\u003eThe Federal Trade Commission said it sent letters to major tech firms warning that they are not in compliance with the Take It Down Act. The law sets standards for removing nonconsensual intimate images and began being enforced Tuesday. The FTC said covered platforms must make it easy for victims to request removal and must delete the images within 48 hours of a request.\u003c/p\u003e\n\n\u003cp\u003eThe letters urged companies to immediately comply and warned that failure could result in fines of up to $53,088 per violation. The FTC advised platforms to use hashing or similar technologies so duplicate harmful content can be removed together. It also said companies should share hashes with the National Center for Missing and Exploited Children for minors’ images and StopNCII.org for adults’ images.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Federal Trade Commission said Wednesday that it sent letters to major tech firms warning them that they are not complying with the Take It Down Act. The law sets requirements for removing nonconsensual intimate images from covered platforms. Enforcement began Tuesday, and the FTC said the firms were violating the law by not offering a process for victims to request removal.\u003c/p\u003e\n\n\u003cp\u003eThe Take It Down Act was enacted in May 2025 and gave industry a year to design compliance strategies. It applies to websites, apps, and online services that allow user-generated content or regularly publish or host intimate images shared without consent, according to the FTC press release cited in the article. Platforms must make it easy for people to request removal and must delete covered content within 48 hours of a request.\u003c/p\u003e\n\n\u003cp\u003eFTC Chairman Andrew Ferguson sent the letters last week to Alphabet, Amazon, Apple, Automattic, Bumble, Discord, Match Group, Meta, Microsoft, Pinterest, Reddit, SmugMug, Snapchat, TikTok, and X. The letters urged the companies to “immediately come into compliance” with the law. The FTC warned that failure to comply could lead to fines of up to $53,088 per violation.\u003c/p\u003e\n\n\u003cp\u003eThe FTC advised companies to use hashing or other technologies to ensure duplicates of harmful content are removed at once. It also said firms should share hashes with the National Center for Missing and Exploited Children when images depict minors and with StopNCII.org for adult images. The letters said cross-platform sharing can limit circulation of the images.\u003c/p\u003e\n\n\u003cp\u003eThe letters also recommended clearer and easier victim-facing processes. The FTC said companies should consider placing a clear and conspicuous notice about TIDA on their home pages and wherever intimate content might appear. It also said platforms should allow users to request removal directly from the harmful photo or video and should provide an identifying number for each request so victims can monitor whether images have been removed.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe Federal Trade Commission said it sent letters to major tech firms warning that they are not in compliance with the Take It Down Act. The law sets standards for removing nonconsensual intimate images and began being enforced Tuesday. According to the FTC, the firms are violating the law by not offering a process for victims to request image removal.\u003c/p\u003e\n\n\u003cp\u003eThe FTC letters urged the companies to “immediately come into compliance.” The agency warned that failure to comply could result in fines of up to $53,088 per violation. FTC Chairman Andrew Ferguson said the agency is ready to monitor compliance, investigate violations, and enforce the law.\u003c/p\u003e\n\n\u003ch2 id=\"legal-and-enforcement-context\"\u003eLegal and enforcement context\u003c/h2\u003e\n\n\u003cp\u003eThe Take It Down Act was enacted in May 2025 and gave industry a year to design compliance strategies. The article states that enforcement began Tuesday. The law requires covered platforms to make it easy for people to ask that nonconsensual intimate images be removed and to delete them within 48 hours of a request.\u003c/p\u003e\n\n\u003cp\u003eAccording to the FTC press release cited in the article, covered platforms include websites, apps, and online services that allow user-generated content or regularly publish or host intimate images shared without consent. The law therefore applies to platforms that host user-generated content as well as services that regularly publish or host intimate images shared without consent.\u003c/p\u003e\n\n\u003ch2 id=\"companies-named-in-the-letters\"\u003eCompanies named in the letters\u003c/h2\u003e\n\n\u003cp\u003eFTC Chairman Andrew Ferguson sent the letters last week to the following companies:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAlphabet\u003c/li\u003e\n\u003cli\u003eAmazon\u003c/li\u003e\n\u003cli\u003eApple\u003c/li\u003e\n\u003cli\u003eAutomattic\u003c/li\u003e\n\u003cli\u003eBumble\u003c/li\u003e\n\u003cli\u003eDiscord\u003c/li\u003e\n\u003cli\u003eMatch Group\u003c/li\u003e\n\u003cli\u003eMeta\u003c/li\u003e\n\u003cli\u003eMicrosoft\u003c/li\u003e\n\u003cli\u003ePinterest\u003c/li\u003e\n\u003cli\u003eReddit\u003c/li\u003e\n\u003cli\u003eSmugMug\u003c/li\u003e\n\u003cli\u003eSnapchat\u003c/li\u003e\n\u003cli\u003eTikTok\u003c/li\u003e\n\u003cli\u003eX\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the FTC warned major tech firms that they were not in compliance because they did not offer a process for victims to request removal. The letters were sent before the agency’s public statement and urged immediate compliance.\u003c/p\u003e\n\n\u003ch2 id=\"technical-recommendations\"\u003eTechnical recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe FTC letters advised companies to begin using hashing or other technologies to ensure that duplicates of harmful content are all removed at once. The article describes this as a way to address repeated copies of the same nonconsensual intimate images, rather than only individual instances.\u003c/p\u003e\n\n\u003cp\u003eThe FTC also said tech firms should share their hashes with the National Center for Missing and Exploited Children when images depict minors. For images of adults, the FTC pointed to the nonprofit StopNCII.org. The letters said sharing hashes between platforms can limit the circulation of the images.\u003c/p\u003e\n\n\u003ch2 id=\"victim-facing-process-requirements-and-recommendations\"\u003eVictim-facing process requirements and recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe FTC said platforms should make the request process simple. The letters said companies should allow users to ask for removal directly from the photo or video featuring the harmful content. They also said companies should consider putting a “clear and conspicuous notice about TIDA” on their home page and wherever intimate content might appear.\u003c/p\u003e\n\n\u003cp\u003eThe letters also said platforms must allow victims to easily monitor whether images have been removed. To do so, platforms should provide an “identifying number” for each request. This would give victims a way to track the status of their removal requests.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-agency-response\"\u003eDisclosed impact and agency response\u003c/h2\u003e\n\n\u003cp\u003eThe disclosed impact in the article is regulatory: the FTC warned that companies failing to comply could face fines of up to $53,088 per violation. The agency also stated that it is prepared to monitor compliance, investigate violations, and enforce the Take It Down Act.\u003c/p\u003e\n\n\u003cp\u003eChairman Ferguson said protecting vulnerable people, especially children, from this abuse is a top priority for the agency and the administration. The FTC’s response focuses on immediate compliance, removal processes, duplicate-content controls through hashing, and hash sharing with organizations designated in the letters.\u003c/p\u003e\n\n\u003ch2 id=\"related-context-mentioned-in-the-article\"\u003eRelated context mentioned in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article states that enforcement of the Take It Down Act comes six months after xAI’s Grok chatbot began posting millions of nudified images of individuals, including children. It says this led to worldwide backlash and proposals for new regulation. The article does not state that the FTC letters were sent because of that incident, but it presents the incident as recent context for enforcement of the law.\u003c/p\u003e\n","keyPoints":["The FTC said it sent letters warning major tech firms that they are not in compliance with the Take It Down Act, which sets standards for removing nonconsensual intimate images.","The Take It Down Act requires covered platforms to make it easy for victims to request removal of nonconsensual intimate images and to delete them within 48 hours of a request.","The FTC warned that failure to comply with the law could lead to fines of up to $53,088 per violation.","FTC Chairman Andrew Ferguson said the agency is ready to monitor compliance, investigate violations, and enforce the Take It Down Act.","The FTC letters advised companies to use hashing or similar technologies, share hashes with designated organizations, provide clear notices about the law, simplify removal requests, and give victims identifying numbers to track requests."],"insights":["The article says the FTC warned 12 firms, but the named recipients total 15 companies: Alphabet, Amazon, Apple, Automattic, Bumble, Discord, Match Group, Meta, Microsoft, Pinterest, Reddit, SmugMug, Snapchat, TikTok, and X.","The FTC sent the warning letters last week even though enforcement of the Take It Down Act began Tuesday, indicating the agency was pushing companies to comply immediately as enforcement started.","The FTC’s guidance emphasizes preventing reuploads, not just removing reported images, by urging companies to use hashing and share hashes with NCMEC for minors’ images and StopNCII.org for adults’ images.","The FTC specifically recommended that platforms allow removal requests directly from the harmful photo or video and provide an identifying number so victims can track each request."],"referencedReports":[],"body":"\u003cp\u003eThe Federal Trade Commission said it sent letters to major tech firms warning that they are not in compliance with the Take It Down Act. The law sets standards for removing nonconsensual intimate images and began being enforced Tuesday. The FTC said covered platforms must make it easy for victims to request removal and must delete the images within 48 hours of a request.\u003c/p\u003e\n\n\u003cp\u003eThe letters urged companies to immediately comply and warned that failure could result in fines of up to $53,088 per violation. The FTC advised platforms to use hashing or similar technologies so duplicate harmful content can be removed together. It also said companies should share hashes with the National Center for Missing and Exploited Children for minors’ images and StopNCII.org for adults’ images.\u003c/p\u003e\n"},{"n":19,"title":"Agent AI is Coming. Are You Ready?","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/agent-ai-is-coming-are-you-ready.html","time":"11:58","priority":"SHOULD READ","score":78,"tldr":"Enterprises are adopting AI agents before fixing major identity and access gaps, creating risk because agents may exploit unmanaged accounts, excessive privileges, and orphaned credentials. The key takeaway is that strong IAM hygiene is now essential to keep autonomous AI activity within authorized boundaries.","briefOverview":"\u003cp\u003eOrchid Security released its Identity Gap: Snapshot 2026 on May 19, 2026, reporting that “identity dark matter” now exceeds visible identity elements by 57% to 43%. The article argues that this finding arrives at a critical moment because enterprises are broadly adopting Agent AI. It presents unmanaged identity as a major concern for organizations preparing for or already participating in the Agent AI transformation.\u003c/p\u003e\n\n\u003cp\u003eThe article says AI agents are designed to seek shortcuts when completing tasks, including using hard-coded credentials, borrowing higher-privilege credentials, or grabbing broadly accepted tokens. It emphasizes that an AI agent’s ability to access an application, system, or database does not mean it should have that access. The article identifies well-managed identity and access management as a critical foundation for keeping Agent AI activity within authorized bounds.\u003c/p\u003e\n\n\u003cp\u003eThe report highlights three common identity exposures: invisible non-human accounts, excessive permissions, and orphan accounts. Two out of every three non-human accounts are set up locally within applications, 70% of applications have an excessive number of privileged accounts, and 40% of accounts have outlived their authorized user. Orchid Security recommends reading the full report and points to an Identity Security Readiness Checklist for organizations unsure how to address these issues.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOn May 19, 2026, Orchid Security released the Identity Gap: Snapshot 2026. The article says the report found that “identity dark matter,” described as unseen and unmanaged elements of identity, now overshadows visible identity elements by 57% to 43%. The article frames this as especially important because enterprises are embracing Agent AI. It cites Orchid co-founder Robert Wiseman as explaining that enterprises are doing so with insufficient attention to the risks.\u003c/p\u003e\n\n\u003cp\u003eThe article’s main concern is that AI agents are designed to find efficient ways to complete tasks. It states that when denied access to a necessary system, an agent might use a hard-coded credential stored in plaintext within an application. It also says an agent needing information it is not entitled to read might “borrow” a credential with higher privilege, or use a broadly accepted token when challenged across many systems. The article emphasizes that this creativity “cuts both ways.”\u003c/p\u003e\n\n\u003cp\u003eThe article states that just because an AI agent can find a way to access an application, system, or database does not mean it should do so. It contrasts AI agents with traditional nonhuman actors, which may be restricted by coding, and humans, who may be restrained by conscience. In most cases, according to the article, AI agents have no such constraints or compunctions. As a result, it identifies well-managed identity and access management as a critical foundation for keeping Agent AI activity within authorized boundaries.\u003c/p\u003e\n\n\u003cp\u003eThe affected environments described are North American and European enterprises covered by the Identity Gap Snapshot. The article says IAM shortcuts, gaps, and exceptions have accumulated over years or decades, making it unreasonable to expect everything to be cleaned up at once. It therefore presents the report’s findings as timely because they identify the most common exposures across these enterprise environments. No specific malicious group is identified, but the article refers to threat actors and AI agents as parties that could take advantage of unmanaged identity exposures.\u003c/p\u003e\n\n\u003cp\u003eThe top findings focus on invisible non-human accounts, excessive permissions, and orphan accounts. Two out of every three non-human accounts are set up locally in applications, making them unseen and unmanaged by central IAM programs. Seventy percent of applications have an excessive number of privileged accounts, and 40% of accounts across enterprise environments have outlived their authorized user. The article encourages readers to review the full Identity Gap Snapshot and says Orchid Security’s security researcher team has published an Identity Security Readiness Checklist for organizations preparing for or already involved in Agent AI adoption.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOrchid Security released the results of its \u003cstrong\u003eIdentity Gap: Snapshot 2026\u003c/strong\u003e on May 19, 2026. The article says the report found that “identity dark matter,” defined as unseen and unmanaged elements of identity, now exceeds visible identity elements by \u003cstrong\u003e57% to 43%\u003c/strong\u003e. The article presents this finding as especially concerning because enterprises are embracing Agent AI.\u003c/p\u003e\n\n\u003cp\u003eThe core message is that Agent AI adoption increases the importance of identity and access management. According to the article, AI agents can creatively seek shortcuts to complete tasks, and unmanaged identity weaknesses can give them paths to access systems, applications, or data outside intended bounds. The article argues that well-managed IAM is a critical foundation for keeping Agent AI activity within authorized limits.\u003c/p\u003e\n\n\u003ch2 id=\"why-agent-ai-raises-identity-concerns\"\u003eWhy Agent AI Raises Identity Concerns\u003c/h2\u003e\n\n\u003cp\u003eThe article describes AI agents as “shortcut-seekers by design.” When assigned a task, they are trained to find efficient ways to complete it with machine speed and human-like creativity. The article warns that this behavior can create risk when agents encounter access barriers.\u003c/p\u003e\n\n\u003cp\u003eExamples given in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAn AI agent denied access to a necessary system may use a hard-coded credential stored in plaintext within an application.\u003c/li\u003e\n\u003cli\u003eAn AI agent needing information it is not entitled to read may “borrow” a credential with higher privilege.\u003c/li\u003e\n\u003cli\u003eAn AI agent repeatedly challenged across many systems may grab a broadly accepted token.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article stresses that an AI agent’s ability to find a path into an application, system, or database does not mean it should have that access. It says traditional nonhuman actors may be limited by coding, while humans may be constrained by conscience, but AI agents often lack those same constraints or compunctions.\u003c/p\u003e\n\n\u003ch2 id=\"iam-as-a-control-boundary\"\u003eIAM as a Control Boundary\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies well-managed identity and access management as essential for keeping Agent AI activity within authorized boundaries. It states that IAM shortcuts, gaps, and exceptions have built up over years or even decades. Because of this history, the article says it is not reasonable to expect organizations to clean up every issue at once.\u003c/p\u003e\n\n\u003cp\u003eThis is why the article presents the Identity Gap Snapshot as timely. The report identifies the identity exposures most common across North American and European enterprises. The article positions these findings as a way for organizations to understand where to focus as they prepare for or participate in Agent AI transformation.\u003c/p\u003e\n\n\u003ch2 id=\"top-findings-from-the-identity-gap-snapshot\"\u003eTop Findings From the Identity Gap Snapshot\u003c/h2\u003e\n\n\u003ch3 id=\"invisible-non-human-accounts\"\u003eInvisible Non-Human Accounts\u003c/h3\u003e\n\n\u003cp\u003eThe article says \u003cstrong\u003etwo out of every three non-human accounts\u003c/strong\u003e are set up locally within the application itself. This makes them unseen and unmanaged by the central IAM program. The article says this may be understandable for machine and service accounts, but dangerous for autonomous AI agents.\u003c/p\u003e\n\n\u003ch3 id=\"excessive-permissions\"\u003eExcessive Permissions\u003c/h3\u003e\n\n\u003cp\u003eThe article states that \u003cstrong\u003e70% of all applications\u003c/strong\u003e have an excessive number of privileged accounts. It describes this as far more than expected in the context of least-privilege access. The article identifies this as a major risk in light of current threat actors and AI agents.\u003c/p\u003e\n\n\u003ch3 id=\"orphan-accounts\"\u003eOrphan Accounts\u003c/h3\u003e\n\n\u003cp\u003eThe article reports that \u003cstrong\u003e40% of all accounts\u003c/strong\u003e across enterprise environments have outlived their authorized user. It describes these as orphan accounts that are clearly unmanaged and likely unseen. The article says they are “ripe for the picking” by threat actors and AI agents.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-scope\"\u003eAffected Parties and Scope\u003c/h2\u003e\n\n\u003cp\u003eThe article refers to \u003cstrong\u003eNorth American and European enterprises\u003c/strong\u003e as the environments represented in the Identity Gap Snapshot’s findings. It also addresses organizations preparing for or already participating in the Agent AI transformation. These organizations are the primary audience for the article’s recommendations.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify a specific malicious actor group. It refers generally to threat actors and AI agents as entities that may take advantage of identity weaknesses such as excessive privileges and orphan accounts. It also discusses AI agents as autonomous actors that can find access paths through existing IAM gaps.\u003c/p\u003e\n\n\u003ch2 id=\"impact-described-in-the-article\"\u003eImpact Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article does not describe a specific breach or incident caused by these findings. Instead, it describes exposure and risk created by identity gaps in enterprise environments. The disclosed impacts are framed as unmanaged access paths, excessive privilege, and lingering accounts that may be available for misuse.\u003c/p\u003e\n\n\u003cp\u003eThe article specifically highlights the following impacts:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUnseen and unmanaged identity elements now exceed visible ones.\u003c/li\u003e\n\u003cli\u003eLocally configured non-human accounts may sit outside central IAM oversight.\u003c/li\u003e\n\u003cli\u003eExcessive privileged accounts create risks for least-privilege access models.\u003c/li\u003e\n\u003cli\u003eOrphan accounts remain active after their authorized users are gone.\u003c/li\u003e\n\u003cli\u003eAI agents may find and use shortcuts that allow access outside intended authorization.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended Response\u003c/h2\u003e\n\n\u003cp\u003eThe article encourages readers to review the full \u003cstrong\u003eIdentity Gap: Snapshot 2026\u003c/strong\u003e report. It also says Orchid Security’s security researcher team has published an \u003cstrong\u003eIdentity Security Readiness Checklist\u003c/strong\u003e for organizations uncertain about how to address these issues or how prevalent they may be in their own environments.\u003c/p\u003e\n\n\u003cp\u003eThe article’s recommended direction is to act now if an organization is preparing for or already participating in Agent AI adoption. It does not claim that all IAM problems can be resolved immediately. Instead, it emphasizes that organizations need to understand and address the most common identity exposures as part of Agent AI readiness.\u003c/p\u003e\n\n\u003ch2 id=\"central-takeaway\"\u003eCentral Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central takeaway is that Agent AI adoption makes longstanding IAM gaps more urgent. Identity exposures such as invisible non-human accounts, excessive privileged access, and orphan accounts are already common across enterprise environments. Because AI agents are designed to find efficient paths to complete tasks, the article argues that organizations need strong IAM controls to keep their activity within authorized boundaries.\u003c/p\u003e\n","keyPoints":["Orchid Security’s Identity Gap: Snapshot 2026 found that unmanaged identity elements, described as “identity dark matter,” now outweigh visible identity elements by 57% to 43%.","The article states that AI agents are designed to find efficient shortcuts and may use hard-coded credentials, borrowed privileged credentials, or broadly accepted tokens to complete tasks.","Two out of every three non-human accounts are set up locally within applications, making them unseen and unmanaged by central IAM programs.","Seventy percent of applications were found to have an excessive number of privileged accounts.","Forty percent of accounts across enterprise environments were found to have outlived their authorized user, making them orphan accounts."],"insights":["Identity gaps that may have been tolerated for machine and service accounts become more dangerous when autonomous AI agents can discover and use them without human judgment.","The article frames local application-level account setup as a central visibility problem because these accounts sit outside the central IAM program rather than merely being misconfigured accounts.","Organizations preparing for Agent AI should prioritize remediation of the most common identity exposures identified in the report: invisible non-human accounts, excessive privileged accounts, and orphan accounts.","The article emphasizes that legacy IAM shortcuts, gaps, and exceptions cannot reasonably be cleaned up all at once, making targeted readiness assessment an immediate action for organizations adopting Agent AI."],"referencedReports":[],"body":"\u003cp\u003eOrchid Security released its Identity Gap: Snapshot 2026 on May 19, 2026, reporting that “identity dark matter” now exceeds visible identity elements by 57% to 43%. The article argues that this finding arrives at a critical moment because enterprises are broadly adopting Agent AI. It presents unmanaged identity as a major concern for organizations preparing for or already participating in the Agent AI transformation.\u003c/p\u003e\n\n\u003cp\u003eThe article says AI agents are designed to seek shortcuts when completing tasks, including using hard-coded credentials, borrowing higher-privilege credentials, or grabbing broadly accepted tokens. It emphasizes that an AI agent’s ability to access an application, system, or database does not mean it should have that access. The article identifies well-managed identity and access management as a critical foundation for keeping Agent AI activity within authorized bounds.\u003c/p\u003e\n\n\u003cp\u003eThe report highlights three common identity exposures: invisible non-human accounts, excessive permissions, and orphan accounts. Two out of every three non-human accounts are set up locally within applications, 70% of applications have an excessive number of privileged accounts, and 40% of accounts have outlived their authorized user. Orchid Security recommends reading the full report and points to an Identity Security Readiness Checklist for organizations unsure how to address these issues.\u003c/p\u003e\n"},{"n":7,"title":"Exploit released for new PinTheft Arch Linux root escalation flaw","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/linux/exploit-released-for-new-pintheft-arch-linux-root-escalation-flaw/","time":"10:52","priority":"MAY READ","score":74,"tldr":"A public PoC exploit for the newly patched PinTheft Linux kernel flaw can give local attackers root on Arch Linux systems when the RDS module and other conditions are present. Users should install kernel updates immediately or disable the RDS modules as a temporary mitigation.","briefOverview":"\u003cp\u003eA publicly available proof-of-concept exploit has been released for PinTheft, a recently patched Linux local privilege escalation vulnerability. The flaw can allow local attackers to gain root privileges on Arch Linux systems. The vulnerability is in the Linux kernel\u0026rsquo;s RDS, or Reliable Datagram Sockets, and was patched earlier this month.\u003c/p\u003e\n\n\u003cp\u003eV12 security team said PinTheft is an RDS zerocopy double-free that can be turned into a page-cache overwrite through io_uring fixed buffers. Successful exploitation requires several conditions, including the RDS module being loaded, io_uring being enabled, a readable SUID-root binary, and x86_64 support for the included payload. V12 said the RDS kernel module is enabled by default only on Arch Linux among the common distributions it tested.\u003c/p\u003e\n\n\u003cp\u003eLinux users on affected distributions are advised to install the latest kernel updates as soon as possible. Systems that cannot be patched immediately can mitigate the issue by unloading and disabling the rds_tcp and rds modules. The disclosure follows several recent Linux local privilege escalation vulnerability disclosures, including DirtyDecrypt, DirtyCBC, Dirty Frag, Fragnesia, Copy Fail, and Pack2TheRoot.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA recently patched Linux privilege escalation vulnerability named PinTheft now has a publicly available proof-of-concept exploit. The exploit allows local attackers to gain root privileges on Arch Linux systems. The vulnerability is in the Linux kernel\u0026rsquo;s RDS, or Reliable Datagram Sockets, and is still waiting to be assigned a CVE ID.\u003c/p\u003e\n\n\u003cp\u003eV12 security team described PinTheft as a Linux local privilege escalation exploit for an RDS zerocopy double-free. According to V12, the issue can be turned into a page-cache overwrite through io_uring fixed buffers. The bug exists in the RDS zerocopy send path, where an error path can drop already pinned pages and later cleanup can drop them again because scatterlist entries and entry count remain live after the zcopy notifier is cleared.\u003c/p\u003e\n\n\u003cp\u003eV12 also released a proof-of-concept exploit that steals FOLL_PIN references until io_uring is left holding a stolen page pointer. The exploit can then obtain a root shell. However, exploitation requires the RDS module to be loaded on the target system and also requires io_uring to be enabled, a readable SUID-root binary, and x86_64 support for the included payload.\u003c/p\u003e\n\n\u003cp\u003eThe article says these requirements drastically limit the attack surface. V12 stated that the RDS kernel module is enabled by default only on Arch Linux among the common Linux distributions it tested. Linux users on affected distributions are advised to install the latest kernel updates as soon as possible.\u003c/p\u003e\n\n\u003cp\u003eFor systems that cannot be patched immediately, the article provides a mitigation to unload rds_tcp and rds and block those modules through a modprobe configuration file. The PinTheft disclosure comes amid a wave of other Linux local privilege escalation flaws disclosed over recent weeks. The article also notes that threat actors have started actively exploiting the Copy Fail vulnerability, which CISA added to its Known Exploited Vulnerabilities catalog on May 1.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA proof-of-concept exploit has been publicly released for PinTheft, a recently patched Linux local privilege escalation vulnerability. The flaw can allow local attackers to gain root privileges on Arch Linux systems. The vulnerability affects the Linux kernel\u0026rsquo;s RDS, or Reliable Datagram Sockets, and was patched earlier this month.\u003c/p\u003e\n\n\u003cp\u003ePinTheft is still waiting to be assigned a CVE ID for easier tracking. The article attributes the vulnerability name and technical advisory to the V12 security team.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical details\u003c/h2\u003e\n\n\u003cp\u003eV12 described PinTheft as “a Linux local privilege escalation exploit for an RDS zerocopy double-free that can be turned into a page-cache overwrite through io_uring fixed buffers.” The bug existed in the RDS zerocopy send path.\u003c/p\u003e\n\n\u003cp\u003eAccording to V12, \u003ccode\u003erds_message_zcopy_from_user()\u003c/code\u003e pins user pages one at a time. If a later page faults, the error path drops the pages it already pinned. Later RDS message cleanup drops them again because the scatterlist entries and entry count remain live after the zcopy notifier is cleared.\u003c/p\u003e\n\n\u003cp\u003eV12 said each failed zerocopy send can steal one reference from the first page. The released proof-of-concept exploit steals FOLL_PIN references until io_uring is left holding a stolen page pointer. The exploit can then obtain a root shell.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-requirements\"\u003eExploitation requirements\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that PinTheft exploitation depends on several specific conditions. These requirements significantly limit the attack surface.\u003c/p\u003e\n\n\u003cp\u003eSuccessful exploitation requires:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe RDS module to be loaded on the target system.\u003c/li\u003e\n\u003cli\u003eThe io_uring Linux I/O API to be enabled.\u003c/li\u003e\n\u003cli\u003eA readable SUID-root binary.\u003c/li\u003e\n\u003cli\u003ex86_64 support for the included payload.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eV12 said the RDS kernel module is enabled by default only on Arch Linux among the common distributions it tested. This makes Arch Linux the main distribution highlighted in the article as exposed by default among those tested.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-impact\"\u003eAffected parties and impact\u003c/h2\u003e\n\n\u003cp\u003eThe article states that local attackers can use the exploit to gain root privileges on Arch Linux systems when the required conditions are present. The proof-of-concept exploit was shown obtaining a root shell on Arch Linux.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is a local privilege escalation issue, meaning the article frames the attack as requiring local attacker access. No remote exploitation path is described in the article.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and mitigation\u003c/h2\u003e\n\n\u003cp\u003eLinux users on affected distributions are advised to install the latest kernel updates as soon as possible. The vulnerability was patched earlier this month.\u003c/p\u003e\n\n\u003cp\u003eFor systems that cannot be patched immediately, the article provides a mitigation that unloads and disables the RDS modules:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-text\"\u003ermmod rds_tcp rds\nprintf 'install rds /bin/false\\ninstall rds_tcp /bin/false\\n' \u0026gt; /etc/modprobe.d/pintheft.conf\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eThis mitigation blocks exploitation attempts by removing and preventing the loading of \u003ccode\u003erds_tcp\u003c/code\u003e and \u003ccode\u003erds\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"broader-vulnerability-context\"\u003eBroader vulnerability context\u003c/h2\u003e\n\n\u003cp\u003eThe PinTheft disclosure follows a wave of other Linux local privilege escalation vulnerabilities disclosed over the past several weeks. Some of those vulnerabilities were described as zero-days with no security patches available.\u003c/p\u003e\n\n\u003cp\u003eThe article mentions recently released proof-of-concept exploits for another patched Linux local privilege escalation vulnerability tracked as DirtyDecrypt and DirtyCBC. It says DirtyDecrypt and DirtyCBC belong to the same vulnerability class as several other root-escalation flaws, including Dirty Frag, Fragnesia, and Copy Fail.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that threat actors have started actively exploiting the Copy Fail vulnerability in attacks. CISA added Copy Fail to its Known Exploited Vulnerabilities catalog on May 1 and ordered government agencies to secure their Linux systems within two weeks.\u003c/p\u003e\n\n\u003cp\u003eIn addition, the article notes that Linux distributions rolled out patches last month for Pack2TheRoot, a root-privilege escalation vulnerability in the PackageKit daemon that had gone unnoticed for more than a decade.\u003c/p\u003e\n","keyPoints":["A publicly available proof-of-concept exploit for the recently patched PinTheft Linux privilege escalation vulnerability can allow local attackers to gain root privileges on Arch Linux systems.","PinTheft exists in the Linux kernel's RDS zerocopy send path and involves a double-free that can be turned into a page-cache overwrite through io_uring fixed buffers.","Successful exploitation requires specific conditions, including the RDS module being loaded, io_uring being enabled, a readable SUID-root binary, and x86_64 support for the included payload.","V12 said the RDS kernel module is enabled by default only on Arch Linux among the common Linux distributions it tested, which drastically limits the attack surface.","Affected Linux users are advised to install the latest kernel updates, or temporarily block exploitation by unloading and disabling the rds and rds_tcp modules."],"insights":["PinTheft’s practical exposure is much narrower than a typical Linux kernel LPE because V12 found the required RDS module enabled by default only on Arch Linux among the common distributions it tested.","Systems that cannot be patched immediately have a concrete mitigation path: unloading rds_tcp and rds and blocking them from loading through a modprobe configuration file.","The exploit chain depends on multiple local prerequisites beyond the kernel bug itself, including io_uring being enabled, a readable SUID-root binary, and x86_64 support for the included payload.","The PinTheft disclosure is part of a broader recent cluster of Linux local privilege escalation releases, including DirtyDecrypt, DirtyCBC, Dirty Frag, Fragnesia, Copy Fail, and Pack2TheRoot."],"referencedReports":[{"title":"PinTheft","url":"https://github.com/v12-security/pocs/tree/09e835b587bf71249775654061ae4c79e92cf430/pintheft","publisher":"V12 security team","context":"The article cites V12's Tuesday advisory describing PinTheft as a Linux local privilege escalation exploit for an RDS zerocopy double-free that can be turned into a page-cache overwrite through io_uring fixed buffers.","category":"","primary":false}],"body":"\u003cp\u003eA publicly available proof-of-concept exploit has been released for PinTheft, a recently patched Linux local privilege escalation vulnerability. The flaw can allow local attackers to gain root privileges on Arch Linux systems. The vulnerability is in the Linux kernel\u0026rsquo;s RDS, or Reliable Datagram Sockets, and was patched earlier this month.\u003c/p\u003e\n\n\u003cp\u003eV12 security team said PinTheft is an RDS zerocopy double-free that can be turned into a page-cache overwrite through io_uring fixed buffers. Successful exploitation requires several conditions, including the RDS module being loaded, io_uring being enabled, a readable SUID-root binary, and x86_64 support for the included payload. V12 said the RDS kernel module is enabled by default only on Arch Linux among the common distributions it tested.\u003c/p\u003e\n\n\u003cp\u003eLinux users on affected distributions are advised to install the latest kernel updates as soon as possible. Systems that cannot be patched immediately can mitigate the issue by unloading and disabling the rds_tcp and rds modules. The disclosure follows several recent Linux local privilege escalation vulnerability disclosures, including DirtyDecrypt, DirtyCBC, Dirty Frag, Fragnesia, Copy Fail, and Pack2TheRoot.\u003c/p\u003e\n"},{"n":1,"title":"Ukraine identifies infostealer operator tied to 28,000 stolen accounts","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/ukraine-identifies-infostealer-operator-tied-to-28-000-stolen-accounts/","time":"21:36","priority":"MAY READ","score":72,"tldr":"Ukrainian cyberpolice, with U.S. law enforcement, identified an 18-year-old Odesa suspect accused of running infostealer infrastructure that compromised 28,000 customer accounts at a California online store. Attackers used 5,800 accounts for about $721,000 in unauthorized purchases, causing roughly $250,000 in direct losses.","briefOverview":"\u003cp\u003eUkrainian cyberpolice, working with U.S. law enforcement, identified an 18-year-old man from Odesa suspected of running an infostealer malware operation. The operation targeted users of an online store in California between 2024 and 2025. Police said the malware infected users’ devices and stole browser sessions and account credentials.\u003c/p\u003e\n\n\u003cp\u003eThe attacks impacted 28,000 customer accounts, and cybercriminals used 5,800 of them to make unauthorized purchases totaling about \u003cspan class=\"math inline\"\u003e\\(721,000. The operation caused about \\)\u003c/span\u003e250,000 in direct losses, including chargebacks. Police said stolen information was processed and sold through specialized online resources and Telegram bots.\u003c/p\u003e\n\n\u003cp\u003eA key technical issue was the theft of session data, including session tokens that can allow access to accounts without credentials and may bypass multi-factor authentication in some cases. Police said the suspect administered infrastructure used to process, sell, and utilize stolen session data. Authorities conducted two searches and seized devices, bank cards, storage media, and other digital evidence, but the announcement did not mention an arrest.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eUkrainian cyberpolice, in cooperation with U.S. law enforcement, identified an 18-year-old man from Odesa suspected of involvement in an infostealer malware operation. The operation targeted users of an online store in California. According to police, the activity occurred between 2024 and 2025 and involved infecting users’ devices to steal browser sessions and account credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article describes infostealers as malware designed to harvest sensitive information from infected devices. The stolen data can include passwords, browser cookies, session tokens, crypto wallets, and payment information. In this case, police said the attackers collected login credentials and transmitted them to servers controlled by the attackers.\u003c/p\u003e\n\n\u003cp\u003eThe operation affected 28,000 customer accounts. Cybercriminals used 5,800 of those accounts to make unauthorized purchases totaling about \u003cspan class=\"math inline\"\u003e\\(721,000. Direct losses were estimated at about \\)\u003c/span\u003e250,000, including chargebacks.\u003c/p\u003e\n\n\u003cp\u003ePolice said the stolen information was processed and sold through specialized online resources and Telegram bots. They also said the suspect engaged in cryptocurrency transactions with accomplices. The article states that the suspect administered online infrastructure used to process, sell, and use stolen session data, indicating a central role in the operation.\u003c/p\u003e\n\n\u003cp\u003eAuthorities conducted two searches at the suspect’s residences and seized mobile phones, computer equipment, bank cards, electronic storage media, and other digital evidence. Police said the evidence includes access to resources used to sell stolen data and manage compromised accounts, server activity logs, and cryptocurrency exchange accounts. The announcement did not mention an arrest, and the article says investigators may still be building the case before formally charging him.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eUkrainian cyberpolice, working with U.S. law enforcement, identified an 18-year-old man from Odesa suspected of running an infostealer malware operation. The operation targeted users of an online store in California. According to Ukrainian police, the activity took place between 2024 and 2025.\u003c/p\u003e\n\n\u003cp\u003ePolice said the threat actor used information-stealing malware to infect users’ devices and steal browser sessions and account credentials. The article describes the suspect as someone who administered the online infrastructure used to process, sell, and utilize stolen session data. The police announcement did not mention an arrest.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe malware involved in the operation was described as an “infostealer.” The article explains that infostealers harvest sensitive information from infected devices, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePasswords\u003c/li\u003e\n\u003cli\u003eBrowser cookies\u003c/li\u003e\n\u003cli\u003eSession tokens\u003c/li\u003e\n\u003cli\u003eCrypto wallets\u003c/li\u003e\n\u003cli\u003ePayment information\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003ePolice said the malware secretly infected users’ devices, collected login credentials, and sent the data to servers controlled by the attackers. The stolen information was then processed and sold through specialized online resources and Telegram bots.\u003c/p\u003e\n\n\u003ch2 id=\"session-data-and-account-access\"\u003eSession Data and Account Access\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights the importance of stolen “session data.” It explains that this refers to session tokens that can be used to log in to a victim’s account without needing credentials. In some cases, these session tokens can also bypass multi-factor authentication checks.\u003c/p\u003e\n\n\u003cp\u003eThis session-token theft was central to the operation described by police. The suspect allegedly administered infrastructure used to process, sell, and use the stolen session data. Police said this indicated that he held a central role in the operation.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe attacks impacted 28,000 customer accounts. Cybercriminals used 5,800 of those accounts to make unauthorized purchases. Those purchases totaled about $721,000.\u003c/p\u003e\n\n\u003cp\u003eThe malicious operation caused about $250,000 in direct losses. The article states that these losses included chargebacks.\u003c/p\u003e\n\n\u003ch2 id=\"suspected-actor-and-role\"\u003eSuspected Actor and Role\u003c/h2\u003e\n\n\u003cp\u003eThe suspect is an 18-year-old man from Odesa. Ukrainian police identified him as being tied to the infostealer operation targeting users of the California online store.\u003c/p\u003e\n\n\u003cp\u003ePolice said the suspect administered online infrastructure used in several stages of the scheme. This infrastructure was used to process stolen session data, sell it, and utilize it for compromised accounts. Police also said the suspect engaged in cryptocurrency transactions with accomplices.\u003c/p\u003e\n\n\u003ch2 id=\"evidence-and-law-enforcement-actions\"\u003eEvidence and Law Enforcement Actions\u003c/h2\u003e\n\n\u003cp\u003eAuthorities conducted two searches at the suspect’s residences. During those searches, police seized:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMobile phones\u003c/li\u003e\n\u003cli\u003eComputer equipment\u003c/li\u003e\n\u003cli\u003eBank cards\u003c/li\u003e\n\u003cli\u003eElectronic storage media\u003c/li\u003e\n\u003cli\u003eOther digital evidence\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003ePolice said the seized evidence confirmed the suspect’s involvement in the illegal operation. The evidence reportedly included access to resources used to sell stolen data and manage compromised accounts, server activity logs, and accounts on cryptocurrency exchanges.\u003c/p\u003e\n\n\u003ch2 id=\"current-status\"\u003eCurrent Status\u003c/h2\u003e\n\n\u003cp\u003eAt the stage described in the article, authorities had identified the suspect, conducted searches, and seized devices and other evidence allegedly linking him to the operation. The article notes that the police announcement did not mention an arrest. It states that this suggests investigators may still be building the case before formally charging him.\u003c/p\u003e\n","keyPoints":["Ukrainian cyberpolice, working with U.S. law enforcement, identified an 18-year-old man from Odesa suspected of running an infostealer malware operation targeting users of an online store in California.","The malware operation allegedly infected users’ devices between 2024 and 2025 to steal browser sessions, session tokens, and account credentials.","The attacks impacted 28,000 customer accounts, and cybercriminals used 5,800 of them to make unauthorized purchases totaling about $721,000.","The operation caused about $250,000 in direct losses, including chargebacks.","Police searched two residences linked to the suspect and seized mobile phones, computer equipment, bank cards, electronic storage media, and other digital evidence."],"insights":["The stolen “session data” included session tokens that can allow account access without credentials and, in some cases, bypass multi-factor authentication checks.","The operation monetized stolen data through specialized online resources and Telegram bots, showing that account-session theft was processed and sold through dedicated distribution channels.","Police said the suspect administered infrastructure used to process, sell, and use stolen session data, indicating the investigation focused on backend enablement rather than only the initial malware infections.","The police announcement described searches and evidence seizures but did not mention an arrest, meaning the publicly reported action was identification and evidence collection rather than a completed prosecution step."],"referencedReports":[],"body":"\u003cp\u003eUkrainian cyberpolice, working with U.S. law enforcement, identified an 18-year-old man from Odesa suspected of running an infostealer malware operation. The operation targeted users of an online store in California between 2024 and 2025. Police said the malware infected users’ devices and stole browser sessions and account credentials.\u003c/p\u003e\n\n\u003cp\u003eThe attacks impacted 28,000 customer accounts, and cybercriminals used 5,800 of them to make unauthorized purchases totaling about \u003cspan class=\"math inline\"\u003e\\(721,000. The operation caused about \\)\u003c/span\u003e250,000 in direct losses, including chargebacks. Police said stolen information was processed and sold through specialized online resources and Telegram bots.\u003c/p\u003e\n\n\u003cp\u003eA key technical issue was the theft of session data, including session tokens that can allow access to accounts without credentials and may bypass multi-factor authentication in some cases. Police said the suspect administered infrastructure used to process, sell, and utilize stolen session data. Authorities conducted two searches and seized devices, bank cards, storage media, and other digital evidence, but the announcement did not mention an arrest.\u003c/p\u003e\n"},{"n":9,"title":"Ukraine probes teen suspect in cyber theft scheme targeting California online shoppers","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/ukraine-probes-teen-suspect-cyber-theft-scheme","time":"16:33","priority":"MAY READ","score":68,"tldr":"Ukrainian authorities are investigating an 18-year-old in Odesa for allegedly helping run infrastructure that processed and sold data from nearly 30,000 hacked customer accounts tied to a California online retailer. The stolen accounts were used for at least 5,800 fraudulent purchases worth about $721,000.","briefOverview":"\u003cp\u003eUkrainian authorities have identified an 18-year-old suspect allegedly linked to an international cybercrime operation targeting users of a U.S.-based online retailer. The investigation began after U.S. authorities told Ukraine that hackers operating from Ukraine could be involved in attacks on American e-commerce platform users. Investigators said the activity affected nearly 30,000 customer accounts belonging to an unnamed online retailer in California between 2024 and 2025.\u003c/p\u003e\n\n\u003cp\u003eOfficials said at least 5,800 compromised accounts were used to make unauthorized purchases worth roughly \u003cspan class=\"math inline\"\u003e\\(721,000. The activity caused more than \\)\u003c/span\u003e250,000 in losses, including costs related to chargebacks. The alleged cybercriminal operation used info-stealing malware to infect devices and harvest login credentials and session data.\u003c/p\u003e\n\n\u003cp\u003eUkrainian law enforcement said the 18-year-old Odesa resident allegedly managed online infrastructure used to process, sell, and exploit the stolen data. Authorities searched two residences linked to the suspect and seized mobile phones, computers, bank cards, and electronic storage devices. They also reported recovering alleged credentials, email accounts linked to compromised users, server activity logs, and cryptocurrency exchange account information.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eUkrainian authorities have identified an 18-year-old resident of Odesa who is allegedly linked to an international cybercrime operation. The case involves attacks against users of a U.S.-based online retailer, which officials did not name. The investigation began after U.S. authorities informed Ukrainian counterparts that hackers operating from Ukraine could be involved in attacks targeting users of American e-commerce platforms.\u003c/p\u003e\n\n\u003cp\u003eAccording to investigators, the group gained unauthorized access to tens of thousands of customer accounts between 2024 and 2025. The affected accounts belonged to an unnamed online retailer in California. Officials said nearly 30,000 customer accounts were compromised in the scheme.\u003c/p\u003e\n\n\u003cp\u003eAuthorities said the hackers used at least 5,800 of the compromised accounts to make unauthorized purchases. The purchases were worth roughly \u003cspan class=\"math inline\"\u003e\\(721,000, and the resulting losses exceeded \\)\u003c/span\u003e250,000. Officials said the losses included costs related to chargebacks.\u003c/p\u003e\n\n\u003cp\u003eThe article says the cybercriminals used info-stealing malware to infect devices and harvest login credentials and session data. The stolen information was allegedly processed and sold through online platforms and Telegram channels. Authorities did not identify the hacker group allegedly involved or specify which malware tools were used.\u003c/p\u003e\n\n\u003cp\u003eUkrainian law enforcement said the 18-year-old suspect allegedly managed online infrastructure used to process, sell, and exploit the stolen data. Investigators also said he used cryptocurrency services to conduct transactions with alleged accomplices. Authorities searched two residences linked to the suspect and seized mobile phones, computers, bank cards, and electronic storage devices.\u003c/p\u003e\n\n\u003cp\u003eAmong the recovered materials, authorities reported alleged credentials for platforms used to sell stolen data, email accounts linked to compromised users, server activity logs, and cryptocurrency exchange account information. Police had not responded to a request for comment at the time of publication. The article does not name the retailer, the hacker group, or the malware tools involved.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eUkrainian authorities have identified an 18-year-old suspect allegedly connected to an international cybercrime operation that targeted users of a U.S.-based online retailer. Officials said the operation compromised nearly 30,000 customer accounts belonging to an unnamed online retailer in California. The activity allegedly took place between 2024 and 2025.\u003c/p\u003e\n\n\u003cp\u003eThe investigation began after U.S. authorities informed Ukrainian counterparts that hackers operating from Ukraine could be involved in attacks targeting users of American e-commerce platforms. Ukraine\u0026rsquo;s Prosecutor General described the case in a statement cited by the article. The article says authorities had not identified the alleged hacker group or the specific malware tools used.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-scope\"\u003eAffected Parties and Scope\u003c/h2\u003e\n\n\u003cp\u003eThe affected organization was described only as an unnamed online retailer in California. Investigators said the attackers gained unauthorized access to tens of thousands of customer accounts. Nearly 30,000 customer accounts were compromised, according to officials.\u003c/p\u003e\n\n\u003cp\u003eAuthorities said at least 5,800 of the compromised accounts were later used to make unauthorized purchases. Those purchases were worth roughly \u003cspan class=\"math inline\"\u003e\\(721,000. Officials said the activity caused more than \\)\u003c/span\u003e250,000 in losses, including costs related to chargebacks.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe cybercriminals allegedly used info-stealing malware to infect devices. The malware was used to harvest login credentials and session data. The article does not name the malware tools involved.\u003c/p\u003e\n\n\u003cp\u003eAuthorities said the stolen information was later processed and sold through online platforms and Telegram channels. The recovered materials allegedly included credentials for platforms used to sell stolen data. Investigators also reported finding email accounts linked to compromised users and server activity logs.\u003c/p\u003e\n\n\u003ch2 id=\"suspect-and-alleged-role\"\u003eSuspect and Alleged Role\u003c/h2\u003e\n\n\u003cp\u003eUkrainian law enforcement identified the suspect as an 18-year-old resident of Odesa. Authorities said he allegedly managed online infrastructure used to process, sell, and exploit the stolen data. Investigators also said he used cryptocurrency services to conduct transactions with alleged accomplices.\u003c/p\u003e\n\n\u003cp\u003eThe article does not say that the suspect was the only person involved. It describes the activity as part of a group and refers to alleged accomplices. Authorities did not identify the hacker group allegedly involved.\u003c/p\u003e\n\n\u003ch2 id=\"law-enforcement-response\"\u003eLaw Enforcement Response\u003c/h2\u003e\n\n\u003cp\u003eAuthorities conducted searches at two residences linked to the suspect. During the searches, they said they seized:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMobile phones.\u003c/li\u003e\n\u003cli\u003eComputers.\u003c/li\u003e\n\u003cli\u003eBank cards.\u003c/li\u003e\n\u003cli\u003eElectronic storage devices.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThey also said recovered materials included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAlleged credentials for platforms used to sell stolen data.\u003c/li\u003e\n\u003cli\u003eEmail accounts linked to compromised users.\u003c/li\u003e\n\u003cli\u003eServer activity logs.\u003c/li\u003e\n\u003cli\u003eCryptocurrency exchange account information.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eThe scheme allegedly involved unauthorized access to nearly 30,000 customer accounts. At least 5,800 of those accounts were used to make unauthorized purchases. The unauthorized purchases totaled roughly \u003cspan class=\"math inline\"\u003e\\(721,000, while losses exceeded \\)\u003c/span\u003e250,000, including chargeback-related costs.\u003c/p\u003e\n\n\u003ch2 id=\"unknowns-and-limits-of-disclosure\"\u003eUnknowns and Limits of Disclosure\u003c/h2\u003e\n\n\u003cp\u003eThe article states that authorities did not identify the hacker group allegedly involved. It also says they did not specify which malware tools were used. Police had not responded to a request for comment at the time of publication.\u003c/p\u003e\n","keyPoints":["Ukrainian authorities identified an 18-year-old Odesa resident allegedly linked to an international cybercrime operation targeting users of a U.S.-based online retailer.","Investigators said hackers gained unauthorized access to nearly 30,000 customer accounts belonging to an unnamed online retailer in California between 2024 and 2025.","Officials said at least 5,800 compromised accounts were used to make unauthorized purchases worth roughly $721,000, causing more than $250,000 in losses including chargeback costs.","Authorities said the cybercriminals used info-stealing malware to harvest login credentials and session data, which was later processed and sold through online platforms and Telegram channels.","Law enforcement searched two residences linked to the suspect and seized mobile phones, computers, bank cards, electronic storage devices, and materials tied to stolen data and cryptocurrency accounts."],"insights":["The investigation was initiated after U.S. authorities alerted Ukraine that hackers operating from Ukraine may have been targeting American e-commerce users, highlighting the cross-border nature of the case.","The suspect’s alleged role was tied to managing infrastructure for processing, selling, and exploiting stolen data rather than being identified as the person who directly infected devices.","The reported losses of more than $250,000 were substantially lower than the roughly $721,000 in unauthorized purchases, indicating that chargebacks and related costs were a major but not total measure of the retailer’s financial impact.","Authorities recovered alleged credentials, server activity logs, and cryptocurrency exchange account information, showing that operational and financial records were among the key evidence seized."],"referencedReports":[],"body":"\u003cp\u003eUkrainian authorities have identified an 18-year-old suspect allegedly linked to an international cybercrime operation targeting users of a U.S.-based online retailer. The investigation began after U.S. authorities told Ukraine that hackers operating from Ukraine could be involved in attacks on American e-commerce platform users. Investigators said the activity affected nearly 30,000 customer accounts belonging to an unnamed online retailer in California between 2024 and 2025.\u003c/p\u003e\n\n\u003cp\u003eOfficials said at least 5,800 compromised accounts were used to make unauthorized purchases worth roughly \u003cspan class=\"math inline\"\u003e\\(721,000. The activity caused more than \\)\u003c/span\u003e250,000 in losses, including costs related to chargebacks. The alleged cybercriminal operation used info-stealing malware to infect devices and harvest login credentials and session data.\u003c/p\u003e\n\n\u003cp\u003eUkrainian law enforcement said the 18-year-old Odesa resident allegedly managed online infrastructure used to process, sell, and exploit the stolen data. Authorities searched two residences linked to the suspect and seized mobile phones, computers, bank cards, and electronic storage devices. They also reported recovering alleged credentials, email accounts linked to compromised users, server activity logs, and cryptocurrency exchange account information.\u003c/p\u003e\n"},{"n":16,"title":"Microsoft Open-Sources RAMPART and Clarity to Secure AI Agents During Development","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/microsoft-open-sources-rampart-and.html","time":"17:06","priority":"MAY READ","score":66,"tldr":"Microsoft has open-sourced RAMPART and Clarity to help developers build safer AI agents by testing security risks and challenging design assumptions early in development. The main goal is to make AI safety checks reproducible, verifiable, and part of the engineering workflow rather than a one-time review.","briefOverview":"\u003cp\u003eMicrosoft has unveiled two open-source tools, RAMPART and Clarity, to help developers better test the security of artificial intelligence agents. RAMPART is a safety and security testing framework, while Clarity is intended to help teams examine design assumptions before code is written. Microsoft said the tools are meant to bring safety into the AI agent development workflow.\u003c/p\u003e\n\n\u003cp\u003eRAMPART, short for Risk Assessment and Measurement Platform for Agentic Red Teaming, is described as a Pytest-native framework for writing and running safety and security tests for AI agents. It can be used to probe agents for issues such as cross-prompt injections, unintended behavioral regressions, and data exfiltration. The tool builds on Microsoft’s earlier PyRIT project and requires an adapter that connects an agent to the test suite.\u003c/p\u003e\n\n\u003cp\u003eClarity is described by Microsoft as a “structured sounding board” and an “AI thinking partner that pushes back.” It guides developers through problem clarification, solution exploration, failure analysis, and decision tracking. Microsoft said the broader goal is to make incidents reproducible, mitigations verifiable, and AI safety a set of living artifacts used throughout the lifecycle.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has released two open-source tools called RAMPART and Clarity to support safer development of AI agents. The tools are aimed at helping developers test security and safety issues and examine design choices earlier in the development process. Microsoft said the release is intended to address why certain decisions are made at early stages, such as decisions about an agent’s access to a tool.\u003c/p\u003e\n\n\u003cp\u003eRAMPART stands for Risk Assessment and Measurement Platform for Agentic Red Teaming. It is a Pytest-native safety and security testing framework for writing and running tests for AI agents. The article says it covers adversarial and benign issues as well as various harm categories.\u003c/p\u003e\n\n\u003cp\u003eRAMPART allows users to write test cases that attack or probe an AI agent for possible safety violations. Examples given in the article include cross-prompt injections, unintended behavioral regressions, and data exfiltration. Cross-prompt injections are described as cases where untrusted data reaches an AI system indirectly through a data source such as an email, file, or web page processed by the system.\u003c/p\u003e\n\n\u003cp\u003eRAMPART evaluates the outcomes of tests and reports the results. The article says the tool requires an adapter that connects an agent to the test suite. It also builds on PyRIT, Microsoft’s Python Risk Identification Tool, which was released more than two years ago to test AI systems.\u003c/p\u003e\n\n\u003cp\u003eClarity is presented as a tool for work that happens before implementation. Microsoft describes it as a “structured sounding board” and an “AI thinking partner that pushes back.” It is meant to guide developers through problem clarification, solution exploration, failure analysis, and decision tracking.\u003c/p\u003e\n\n\u003cp\u003eRam Shankar Siva Kumar, founder of Microsoft’s AI Red Team, said the tools are intended to help product managers and engineers pressure-test assumptions at the start of a project, when changing course is cheap. Microsoft also said a secondary motivation is to make incidents reproducible, mitigations verifiable, and red-team learnings scalable by turning them into runnable engineering assets. The article does not identify any external threat actor, active campaign, or disclosed incident impact tied to the release.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft has unveiled two open-source tools, RAMPART and Clarity, to help developers better test the security of artificial intelligence agents. The tools are
