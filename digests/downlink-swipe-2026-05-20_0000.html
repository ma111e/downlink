is described as a Linux-focused infostealer that can harvest credentials from cloud providers, password managers, and developer tools and can propagate in AWS and Kubernetes environments.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGitHub said it is investigating unauthorized access to its internal repositories after TeamPCP listed GitHub source code and internal organizations for sale on a cybercrime forum. The listing allegedly included about 4,000 repositories and carried an asking price of no less than $50,000. TeamPCP said in the post that the listing was “not a ransom” and that it would shred the data after one buyer or leak it for free if no buyer was found.\u003c/p\u003e\n\n\u003cp\u003eGitHub said it currently has no evidence that customer information stored outside GitHub’s internal repositories was impacted. The company specifically referenced customers’ enterprises, organizations, and repositories as areas where it had no evidence of impact. GitHub also said it would notify customers through established incident response and notification channels if any impact is discovered.\u003c/p\u003e\n\n\u003cp\u003eIn a follow-up update, GitHub said it detected and contained a compromise of an employee device involving a poisoned Microsoft Visual Studio Code extension. As part of risk mitigation, GitHub rotated critical secrets and prioritized the highest-impact credentials. GitHub said its current assessment was that the activity involved exfiltration of GitHub-internal repositories only, and that the attacker’s claim of about 3,800 repositories was directionally consistent with its investigation.\u003c/p\u003e\n\n\u003cp\u003eThe article connects the GitHub incident to TeamPCP’s broader activity in software supply chain attacks targeting open-source packages. It says TeamPCP’s Mini Shai-Hulud campaign continued with the compromise of durabletask, an official Microsoft Python client for the Durable Task workflow execution framework. Three malicious durabletask versions were identified: 1.4.1, 1.4.2, and 1.4.3.\u003c/p\u003e\n\n\u003cp\u003eAccording to Wiz, the attacker compromised a GitHub account through a previous attack, dumped GitHub secrets from a repository accessible to that user, and obtained a PyPI token to publish directly. The durabletask payload is described as a dropper that fetches and runs a second-stage payload named “rope.pyz” from check.git-service[.]com. The malware is assessed to be an evolution of the payload used in the compromise of the guardrails-ai package.\u003c/p\u003e\n\n\u003cp\u003eThe durabletask malware is described as a Linux-focused infostealer that harvests credentials associated with major cloud providers, password managers, and developer tools. SafeDep said it also attempts to read HashiCorp Vault KV secrets, unlock and dump 1Password and Bitwarden vaults, and access SSH keys, Docker credentials, VPN configurations, and shell history. Aikido Security and StepSecurity described propagation through AWS SSM, EC2 SendCommand, and Kubernetes kubectl exec, while Endor Labs said the package is downloaded roughly 417,000 times a month and the malicious code runs automatically when imported.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGitHub said it is investigating unauthorized access to its internal repositories after TeamPCP listed the platform’s source code and internal organizations for sale on a cybercrime forum. TeamPCP is described in the article as a notorious threat actor behind a string of software supply chain attacks targeting open-source packages. The group allegedly offered GitHub source code for sale with an asking price of no less than $50,000.\u003c/p\u003e\n\n\u003cp\u003eThe alleged data dump is said to include about 4,000 repositories. In screenshots shared by Dark Web Informer, TeamPCP said, “As always, this is not a ransom,” and claimed it would shred the data after one buyer or leak it for free if no buyer was found.\u003c/p\u003e\n\n\u003ch2 id=\"github-s-stated-impact-assessment\"\u003eGitHub’s Stated Impact Assessment\u003c/h2\u003e\n\n\u003cp\u003eGitHub said it currently has no evidence of impact to customer information stored outside of GitHub’s internal repositories. The company specifically cited customer enterprises, organizations, and repositories as areas where it had no evidence of impact. GitHub also said it was closely monitoring its infrastructure for follow-on activity.\u003c/p\u003e\n\n\u003cp\u003eThe company said it would notify customers through established incident response and notification channels if any impact is discovered. The article does not state that GitHub confirmed any customer repository or customer organization compromise.\u003c/p\u003e\n\n\u003ch2 id=\"compromise-vector-and-response\"\u003eCompromise Vector and Response\u003c/h2\u003e\n\n\u003cp\u003eIn a follow-up update, GitHub said it detected and contained a compromise of an employee device. The compromise involved a poisoned Microsoft Visual Studio Code extension. GitHub said it rotated critical secrets as a risk mitigation measure, prioritizing the highest-impact credentials.\u003c/p\u003e\n\n\u003cp\u003eGitHub’s current assessment is that the activity involved exfiltration of GitHub-internal repositories only. The company said the attacker’s claim of about 3,800 repositories was directionally consistent with its investigation so far.\u003c/p\u003e\n\n\u003ch2 id=\"teampcp-messaging\"\u003eTeamPCP Messaging\u003c/h2\u003e\n\n\u003cp\u003eAfter the incident, an X account linked to TeamPCP, xploitrsturtle2, stated that GitHub “knew for hours” and “delayed telling you.” The same post said, “What an amazing run, it\u0026rsquo;s been an honor to play around with the cats over the past few months.” The article presents this as a statement from an account linked to TeamPCP.\u003c/p\u003e\n\n\u003ch2 id=\"mini-shai-hulud-and-durabletask-compromise\"\u003eMini Shai-Hulud and durabletask Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article also reports that TeamPCP’s self-replicating malware campaign, known as Mini Shai-Hulud, continues to expand. The campaign includes the compromise of durabletask, an official Microsoft Python client for the Durable Task workflow execution framework. Three malicious durabletask package versions were identified: 1.4.1, 1.4.2, and 1.4.3.\u003c/p\u003e\n\n\u003cp\u003eAccording to Wiz, the attacker compromised a GitHub account through a previous attack. The attacker then dumped GitHub secrets from a repository to which that user had access and obtained a PyPI token to publish directly.\u003c/p\u003e\n\n\u003ch2 id=\"durabletask-payload-behavior\"\u003edurabletask Payload Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe payload embedded in the durabletask package is described as a dropper. It is configured to fetch and run a second-stage payload called “rope.pyz” from an external server, check.git-service[.]com. The article says the malware is assessed to be an evolution of the payload deployed in connection with the compromise of the guardrails-ai package the previous week.\u003c/p\u003e\n\n\u003cp\u003eThe malware is designed to activate a full-featured infostealer. It can harvest credentials associated with major cloud providers, password managers, and developer tools, and exfiltrate the data to an attacker-controlled domain. The article notes that the stealer is configured to execute only on Linux systems.\u003c/p\u003e\n\n\u003cp\u003eAccording to SafeDep, the 28KB Python stealer also attempts to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRead HashiCorp Vault KV secrets.\u003c/li\u003e\n\u003cli\u003eUnlock and dump 1Password and Bitwarden password vaults.\u003c/li\u003e\n\u003cli\u003eAccess SSH keys.\u003c/li\u003e\n\u003cli\u003eAccess Docker credentials.\u003c/li\u003e\n\u003cli\u003eAccess VPN configurations.\u003c/li\u003e\n\u003cli\u003eAccess shell history.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"propagation-and-destructive-behavior\"\u003ePropagation and Destructive Behavior\u003c/h2\u003e\n\n\u003cp\u003eAikido Security said that if the machine is running inside AWS, the malware propagates to other EC2 instances using SSM. If it is inside Kubernetes, it propagates through kubectl exec. Aikido Security also said that if the malware detects Israeli or Iranian system settings, there is a 1-in-6 chance it plays audio and then runs rm -rf /*.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity said that after enumerating SSM-managed instances, the malware uses SendCommand with the AWS-RunShellScript document. This is used to execute the rope.pyz payload on up to five other EC2 instances per profile. StepSecurity said the propagation script downloads the payload from the primary command-and-control server, falls back to t.m-kosche[.]com, and runs it in the background.\u003c/p\u003e\n\n\u003ch2 id=\"backup-command-and-control-mechanism\"\u003eBackup Command-and-Control Mechanism\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights the malware’s use of a mechanism called FIRESCALE to identify a backup command-and-control address if the primary domain is unreachable. FIRESCALE works by searching GitHub public commit messages for the pattern “FIRESCALE \u003cbase64_url\u003e.\u003cbase64_signatue\u003e” and extracting command-and-control information from it. The article says Hunt.io previously highlighted details of this technique.\u003c/p\u003e\n\n\u003ch2 id=\"scope-and-handling-guidance-in-the-article\"\u003eScope and Handling Guidance in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article states that because the worm propagates using tokens stolen from infected environments, the number of affected packages is expected to grow. It says any machine or pipeline that installed an affected version of durabletask should be treated as fully compromised.\u003c/p\u003e\n\n\u003cp\u003eEndor Labs researcher Peyton Kennedy said the durabletask package is downloaded roughly 417,000 times a month. Kennedy also said the malicious code runs automatically when the package is imported, with no error messages and no visible signs of compromise.\u003c/p\u003e\n","keyPoints":["GitHub said it is investigating unauthorized access to its internal repositories after TeamPCP listed the platform's source code and internal organizations for sale on a cybercrime forum.","GitHub said it detected and contained a compromise of an employee device involving a poisoned Microsoft Visual Studio Code extension and rotated critical secrets as a risk mitigation measure.","GitHub said its current assessment is that the activity involved exfiltration of GitHub-internal repositories only, with the attacker's claim of about 3,800 repositories being directionally consistent with its investigation.","TeamPCP compromised durabletask, an official Microsoft Python client for the Durable Task workflow execution framework, with malicious versions 1.4.1, 1.4.2, and 1.4.3 identified.","The malicious durabletask payload is a Linux-focused infostealer capable of harvesting credentials from cloud providers, password managers, and developer tools and exfiltrating them to an attacker-controlled domain."],"insights":["Any machine or pipeline that installed durabletask versions 1.4.1, 1.4.2, or 1.4.3 should be treated as fully compromised because the malware runs automatically when the package is imported and shows no visible signs of compromise.","The durabletask compromise shows how stolen GitHub secrets can directly enable downstream package poisoning, as the attacker used access from a previously compromised GitHub account to obtain a PyPI publishing token.","The malware can spread laterally in cloud-native environments by using AWS SSM to execute commands on other EC2 instances and kubectl exec to propagate inside Kubernetes.","The malware uses GitHub public commit messages as a fallback command-and-control discovery mechanism through the FIRESCALE pattern, making ordinary public GitHub activity part of its resilience strategy.","The stealer’s targeting is unusually broad for developer environments, attempting to access cloud credentials, HashiCorp Vault secrets, 1Password and Bitwarden vaults, SSH keys, Docker credentials, VPN configurations, and shell history."],"referencedReports":[{"title":"DurableTask TeamPCP Supply Chain Attack","url":"https://www.wiz.io/blog/durabletask-teampcp-supply-chain-attack","publisher":"Wiz","context":"The article cites Wiz for how the attacker used access from a previously compromised GitHub account to obtain a PyPI token and publish the malicious durabletask package.","category":"","primary":false},{"title":"Malicious durabletask PyPI Supply Chain Attack","url":"https://safedep.io/malicious-durabletask-pypi-supply-chain-attack/","publisher":"SafeDep","context":"The article cites SafeDep for details on the Python stealer’s attempts to read Vault secrets, password vaults, SSH keys, Docker credentials, VPN configurations, and shell history.","category":"","primary":false},{"title":"durabletask Package Compromised: Mini Shai-Hulud","url":"https://www.aikido.dev/blog/durabletask-package-compromised-mini-shai-hulud","publisher":"Aikido Security","context":"The article cites Aikido Security for the malware’s propagation behavior in AWS EC2 via SSM and Kubernetes via kubectl exec.","category":"","primary":false},{"title":"Microsoft's durabletask PyPI Package Compromised in Supply Chain Attack","url":"https://www.stepsecurity.io/blog/microsofts-durabletask-pypi-package-compromised-in-supply-chain-attack#c2-infrastructure","publisher":"StepSecurity","context":"The article cites StepSecurity for details on EC2 propagation using AWS SendCommand and fallback command-and-control infrastructure.","category":"","primary":false},{"title":"Trojanized Microsoft SDK DurableTask 1.4.1 through 1.4.3 Deliver Credential-Stealing Malware","url":"https://www.endorlabs.com/learn/trojanized-microsoft-sdk-durabletask-1-4-1-through-1-4-3-deliver-credential-stealing-malware","publisher":"Endor Labs","context":"The article cites Endor Labs researcher Peyton Kennedy for the package’s monthly download volume and the fact that the malicious code runs automatically on import without visible signs of compromise.","category":"","primary":false}],"body":"\u003cp\u003eGitHub said it is investigating unauthorized access to its internal repositories after TeamPCP listed the platform’s source code and internal organizations for sale on a cybercrime forum. The actor claimed the data included about 4,000 repositories and set an asking price of at least $50,000. GitHub said it currently has no evidence of impact to customer information stored outside its internal repositories, including customer enterprises, organizations, and repositories.\u003c/p\u003e\n\n\u003cp\u003eGitHub later said it detected and contained a compromise of an employee device involving a poisoned Microsoft Visual Studio Code extension. The company rotated critical secrets as a risk mitigation measure and said its current assessment is that the activity involved exfiltration of GitHub-internal repositories only. GitHub said the attacker’s claim of roughly 3,800 repositories was directionally consistent with its investigation.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes TeamPCP’s ongoing Mini Shai-Hulud software supply chain campaign, including the compromise of durabletask, an official Microsoft Python client for the Durable Task workflow execution framework. Malicious durabletask versions 1.4.1, 1.4.2, and 1.4.3 were identified, with a payload that fetches and runs a second-stage payload from an external server. The malware is described as a Linux-focused infostealer that can harvest credentials from cloud providers, password managers, and developer tools and can propagate in AWS and Kubernetes environments.\u003c/p\u003e\n"},{"n":25,"title":"5 Supply Chain Attacks in 48 Hours: Why Securing One Layer Is Not Enough","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/5-supply-chain-attacks-in-48-hours-why-securing-one-layer-is-not-enough","time":"21:43","priority":"MUST READ","score":96,"tldr":"A rapid wave of supply chain attacks hit IDE extensions, GitHub Actions, npm, PyPI, and even GitHub’s internal repos, showing that attackers are targeting the entire development pipeline. The key takeaway is that securing only one layer, like dependencies or registries, is not enough; organizations need defense-in-depth across developer machines, CI/CD runtime, package sources, and threat response.","briefOverview":"\u003cp\u003eBetween May 18 and May 19, 2026, the article says five software supply chain attacks targeted multiple layers of the development pipeline. The incidents included a poisoned VS Code extension, compromised GitHub Actions, a self-replicating npm worm, a trojanized Microsoft-owned PyPI package, and GitHub’s disclosure that about 3,800 internal source code repositories were exfiltrated. The article emphasizes that Microsoft and GitHub were affected despite being highly security-mature organizations.\u003c/p\u003e\n\n\u003cp\u003eThe article’s main significance is that the attacks did not focus on a single software supply chain layer. They targeted developer machines, open-source dependencies, and CI/CD pipelines simultaneously. The article argues that traditional tools such as SCA, SAST, EDR, and CNAPP do not adequately monitor CI/CD runner runtime behavior, developer IDE extensions, or silently replaced GitHub Action tags.\u003c/p\u003e\n\n\u003cp\u003eTechnically, several attacks focused on credential theft and secret exfiltration. The compromised actions-cool GitHub Actions allegedly read Runner.Worker process memory and exfiltrated CI/CD credentials, while the Shai-Hulud npm worm harvested credentials and propagated using stolen npm tokens. The malicious Nx Console VS Code extension used HTTPS, GitHub API, and DNS tunneling exfiltration channels and installed a persistent Python backdoor on macOS.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes an intense 48-hour wave of software supply chain attacks between May 18 and May 19, 2026. Five distinct incidents targeted IDE extensions, GitHub Actions, npm packages, PyPI packages, and GitHub’s internal repositories. The article presents the wave as evidence that attackers are targeting the full development and delivery pipeline rather than one isolated layer.\u003c/p\u003e\n\n\u003cp\u003eOn May 18, a malicious version 18.95.0 of the Nx Console VS Code extension was published to the VS Code Marketplace, where the extension had more than 2.2 million installs. The article says the extension acted as a multi-stage credential stealer using HTTPS, the GitHub API, and DNS tunneling, and it installed a persistent Python backdoor on macOS. A GitHub employee device was compromised through this vector, leading to exfiltration of approximately 3,800 internal GitHub repositories.\u003c/p\u003e\n\n\u003cp\u003eThe same day, the article says the GitHub Actions actions-cool/issues-helper and maintain-one-comment were compromised when all tags in both repositories were replaced with imposter commits. The malicious code used bun to read Runner.Worker process memory and exfiltrate CI/CD credentials to t.m-kosche.com. The article states that every workflow referencing these actions by version tag was affected, while workflows pinned to full-length commit SHAs were unaffected.\u003c/p\u003e\n\n\u003cp\u003eOn May 19, the Shai-Hulud npm worm hit Alibaba’s AntV data visualization ecosystem, echarts-for-react, timeago.js, and dozens more. The article says the worm read GitHub Actions runner process memory, harvested credentials from more than 130 file paths, and used stolen npm tokens to propagate to new packages. The same day, three malicious versions of Microsoft’s official durabletask PyPI package were published within 35 minutes, with payloads that stole credentials from AWS, Azure, GCP, Kubernetes, password managers, and more than 90 developer tool configurations.\u003c/p\u003e\n\n\u003cp\u003eThe article links the Microsoft durabletask PyPI package attack to the TeamPCP threat group and states that the package skipped systems with Russian locale. It also says the Shai-Hulud worm operators and TeamPCP have demonstrated an effective and scalable playbook involving trusted package or action compromise, credential-stealing malware, secret exfiltration, and use of stolen credentials to compromise more packages. The disclosed impacts include GitHub’s confirmed exfiltration of about 3,800 internal repositories and rotation of critical secrets.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that traditional tools and point solutions are insufficient because they do not cover the entire pipeline. It says SCA tools scan dependency manifests for known CVEs, SAST analyzes source code, EDR protects production servers and employee laptops, and CNAPP platforms monitor cloud workloads rather than CI/CD pipelines. As a response, the article promotes defense in depth across developer machines, CI/CD runtime, compromised action blocking, threat intelligence, secure registries, package search, and GitHub checks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a concentrated wave of software supply chain attacks that occurred between May 18 and May 19, 2026. It says five distinct attacks targeted every layer of the software development pipeline: a poisoned VS Code extension, compromised GitHub Actions, hijacked npm packages spreading through a self-replicating worm, a trojanized PyPI package owned by Microsoft, and GitHub’s disclosure that approximately 3,800 internal source code repositories were exfiltrated.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central argument is that securing one layer of the software supply chain is not enough. It states that attackers targeted developer machines, dependencies, and CI/CD pipelines simultaneously, with the shared objective of stealing credentials, exfiltrating secrets, and establishing persistent access across the software supply chain.\u003c/p\u003e\n\n\u003ch2 id=\"timeline-of-the-48-hour-attack-wave\"\u003eTimeline of the 48-Hour Attack Wave\u003c/h2\u003e\n\n\u003ch3 id=\"may-18-2026-nx-console-vs-code-extension-compromise\"\u003eMay 18, 2026: Nx Console VS Code Extension Compromise\u003c/h3\u003e\n\n\u003cp\u003eThe article says a malicious version 18.95.0 of the Nx Console VS Code extension was published to the VS Code Marketplace. The extension had more than 2.2 million installs. The malicious version is described as a multi-stage credential stealer with HTTPS, GitHub API, and DNS tunneling exfiltration channels.\u003c/p\u003e\n\n\u003cp\u003eThe article also says the malicious extension installed a persistent Python backdoor on macOS. A GitHub employee device was compromised through this vector. That compromise led to the exfiltration of approximately 3,800 internal GitHub repositories.\u003c/p\u003e\n\n\u003ch3 id=\"may-18-2026-github-actions-compromise\"\u003eMay 18, 2026: GitHub Actions Compromise\u003c/h3\u003e\n\n\u003cp\u003eThe article says the GitHub Actions actions-cool/issues-helper and maintain-one-comment were compromised. All tags in both repositories were replaced with imposter commits. Any workflow referencing these actions by version tag was affected.\u003c/p\u003e\n\n\u003cp\u003eThe malicious code used bun to read Runner.Worker process memory. It then exfiltrated CI/CD credentials to the attacker-controlled domain t.m-kosche.com. The article notes that workflows pinned to full-length commit SHAs were unaffected by this tag replacement technique.\u003c/p\u003e\n\n\u003ch3 id=\"may-19-2026-shai-hulud-npm-worm\"\u003eMay 19, 2026: Shai-Hulud npm Worm\u003c/h3\u003e\n\n\u003cp\u003eThe article says the Shai-Hulud worm affected Alibaba’s AntV data visualization ecosystem, echarts-for-react, timeago.js, and dozens more packages. It describes the worm as self-replicating and ongoing at the time of the article.\u003c/p\u003e\n\n\u003cp\u003eThe worm read GitHub Actions runner process memory and harvested credentials from more than 130 file paths. It used stolen npm tokens to propagate to new packages. The article presents this as part of a larger pattern in which stolen credentials are used to compromise additional packages.\u003c/p\u003e\n\n\u003ch3 id=\"may-19-2026-microsoft-durabletask-pypi-package-compromise\"\u003eMay 19, 2026: Microsoft durabletask PyPI Package Compromise\u003c/h3\u003e\n\n\u003cp\u003eThe article says three malicious versions of Microsoft’s official Durable Functions SDK package, durabletask, were published within 35 minutes. The package had more than 400,000 monthly downloads.\u003c/p\u003e\n\n\u003cp\u003eThe payload stole credentials from AWS, Azure, GCP, Kubernetes, password managers, and more than 90 developer tool configurations. The article links the attack to the TeamPCP threat group. It also says the payload skipped systems with Russian locale.\u003c/p\u003e\n\n\u003ch3 id=\"may-19-2026-github-breach-disclosure\"\u003eMay 19, 2026: GitHub Breach Disclosure\u003c/h3\u003e\n\n\u003cp\u003eThe article says GitHub publicly confirmed that approximately 3,800 internal repositories were exfiltrated. The breach followed compromise of an employee device by a poisoned VS Code extension. GitHub rotated critical secrets, and the investigation was ongoing.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-disclosed-impact\"\u003eAffected Parties and Disclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies GitHub and Microsoft as major affected organizations. GitHub was affected through the poisoned Nx Console VS Code extension, which compromised an employee device and led to exfiltration of about 3,800 internal repositories. Microsoft was affected through malicious versions of its official durabletask PyPI package.\u003c/p\u003e\n\n\u003cp\u003eOther affected ecosystems and projects named in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAlibaba’s AntV data visualization ecosystem.\u003c/li\u003e\n\u003cli\u003eecharts-for-react.\u003c/li\u003e\n\u003cli\u003etimeago.js, which the article says has 1.5 million weekly downloads.\u003c/li\u003e\n\u003cli\u003eThe actions-cool/issues-helper GitHub Action.\u003c/li\u003e\n\u003cli\u003eThe maintain-one-comment GitHub Action.\u003c/li\u003e\n\u003cli\u003eThe Nx Console VS Code extension.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also references earlier related incidents, including node-ipc on May 14, the Trivy GitHub Action compromise, and the Checkmarx KICS compromise in March. It says the Trivy and KICS incidents demonstrated the same imposter commit technique later used at scale.\u003c/p\u003e\n\n\u003ch2 id=\"technical-patterns-across-the-incidents\"\u003eTechnical Patterns Across the Incidents\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that the attacks used different vectors but shared common objectives. These objectives included credential theft, secret exfiltration, persistence, and use of stolen credentials to expand the compromise.\u003c/p\u003e\n\n\u003cp\u003eNotable technical details described in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA malicious VS Code extension using HTTPS, GitHub API, and DNS tunneling for exfiltration.\u003c/li\u003e\n\u003cli\u003eA persistent Python backdoor installed on macOS.\u003c/li\u003e\n\u003cli\u003eGitHub Action tags silently replaced with imposter commits.\u003c/li\u003e\n\u003cli\u003eMalicious code using bun to read Runner.Worker process memory.\u003c/li\u003e\n\u003cli\u003eExfiltration of CI/CD credentials to t.m-kosche.com.\u003c/li\u003e\n\u003cli\u003eA self-replicating npm worm using stolen npm tokens to propagate.\u003c/li\u003e\n\u003cli\u003eCredential harvesting from more than 130 file paths.\u003c/li\u003e\n\u003cli\u003eA PyPI payload stealing credentials from cloud providers, Kubernetes, password managers, and developer tool configurations.\u003c/li\u003e\n\u003cli\u003eTechniques including WAV steganography, DNS tunneling, dangling orphan commits in legitimate repositories for payload hosting, and process memory reading for extracting masked secrets.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"why-the-article-says-traditional-tools-fall-short\"\u003eWhy the Article Says Traditional Tools Fall Short\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that traditional security tools were built for a different threat model. It says SCA scanners, SAST tools, EDR agents, and CNAPP platforms did not prevent the breaches described in the article.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSCA tools scan dependency manifests for known CVEs and are reactive.\u003c/li\u003e\n\u003cli\u003eSAST tools analyze source code, not runtime behavior inside CI/CD runners.\u003c/li\u003e\n\u003cli\u003eEDR agents protect production servers and employee laptops but do not run on ephemeral GitHub Actions runners.\u003c/li\u003e\n\u003cli\u003eCNAPP platforms monitor cloud workloads rather than the pipelines that deploy to them.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also says point solutions such as package scoring systems and secure registries are useful for the dependency layer but do not cover the full attack surface. For example, a secure registry would not have stopped the Nx Console VS Code extension compromise, and package scoring would not have flagged a legitimate GitHub Action before its tags were hijacked.\u003c/p\u003e\n\n\u003ch2 id=\"ci-cd-runtime-as-a-key-blind-spot\"\u003eCI/CD Runtime as a Key Blind Spot\u003c/h2\u003e\n\n\u003cp\u003eThe article repeatedly highlights runtime behavior inside CI/CD runners as a critical gap. In the actions-cool compromise and the Shai-Hulud worm campaign, malicious code attempted to read Runner.Worker process memory to extract secrets. The article says package scanners and registry policies cannot detect or block that behavior.\u003c/p\u003e\n\n\u003cp\u003eIt argues that defending this layer requires a runtime security agent on the CI/CD runner. Such a control would monitor process behavior, enforce network egress policies, and terminate jobs when anomalous activity is detected.\u003c/p\u003e\n\n\u003ch2 id=\"developer-machines-as-a-key-attack-surface\"\u003eDeveloper Machines as a Key Attack Surface\u003c/h2\u003e\n\n\u003cp\u003eThe article also emphasizes developer workstations as an important layer of the software supply chain. The GitHub breach originated from a poisoned VS Code extension running on a developer laptop, not from a package registry or production system.\u003c/p\u003e\n\n\u003cp\u003eThe article says organizations need visibility into IDE extensions, developer tools, and open-source packages installed on developer machines. This visibility allows teams to answer whether a compromised extension or package is present across their fleet when an incident is announced.\u003c/p\u003e\n\n\u003ch2 id=\"stepsecurity-s-research-and-platform-response\"\u003eStepSecurity’s Research and Platform Response\u003c/h2\u003e\n\n\u003cp\u003eThe article says StepSecurity’s threat intelligence team was among the first to discover, analyze, and publicly report several of the compromises described. It says StepSecurity published detailed analysis of the Nx Console VS Code extension compromise, the actions-cool/issues-helper GitHub Action compromise, the Microsoft durabletask PyPI attack, and the latest Shai-Hulud worm campaign.\u003c/p\u003e\n\n\u003cp\u003eThe article states that StepSecurity uses AI-powered monitoring and runtime analysis, powered by Harden Runner telemetry and ecosystem monitoring. It says this approach enables detection of compromises in near real time.\u003c/p\u003e\n\n\u003cp\u003eThe article also says StepSecurity’s research feeds directly into its platform. When the threat intelligence team publishes indicators of compromise, those indicators are made available in the Threat Center, integrated into Compromised Actions policies, and used by Harden Runner to block exfiltration to known malicious domains.\u003c/p\u003e\n\n\u003ch2 id=\"stepsecurity-controls-mapped-to-the-attack-lifecycle\"\u003eStepSecurity Controls Mapped to the Attack Lifecycle\u003c/h2\u003e\n\n\u003cp\u003eThe article describes several StepSecurity controls and maps them to the incidents.\u003c/p\u003e\n\n\u003ch3 id=\"dev-machine-guard\"\u003eDev Machine Guard\u003c/h3\u003e\n\n\u003cp\u003eDev Machine Guard provides inventory and search capabilities for developer workstations. The article says it can identify IDE extensions and developer tools across a fleet. It can also inventory npm, Python, and other open-source packages installed on developer machines.\u003c/p\u003e\n\n\u003cp\u003eThe article says this control would help identify exposure to the Nx Console compromise and determine whether malicious durabletask versions or Shai-Hulud worm packages were installed locally.\u003c/p\u003e\n\n\u003ch3 id=\"harden-runner\"\u003eHarden Runner\u003c/h3\u003e\n\n\u003cp\u003eHarden Runner is described as a runtime security agent for GitHub Actions. It monitors process behavior and enforces network egress policies on CI/CD runners.\u003c/p\u003e\n\n\u003cp\u003eThe article says that in block mode, Harden Runner prevents credential exfiltration by dropping connections to domains not on the allowlist. In audit mode, it flags anomalous connections and process behavior. The article maps this to attacks that attempted to read process memory and exfiltrate secrets to attacker-controlled domains.\u003c/p\u003e\n\n\u003ch3 id=\"compromised-actions-policy\"\u003eCompromised Actions Policy\u003c/h3\u003e\n\n\u003cp\u003eThe article describes Compromised Actions Policy as a pre-execution gate. Once the StepSecurity Threat Center identifies a compromised GitHub Action, the policy automatically cancels workflow runs that reference it. The article says this provides immediate protection while individual teams update workflow files.\u003c/p\u003e\n\n\u003ch3 id=\"threat-center\"\u003eThreat Center\u003c/h3\u003e\n\n\u003cp\u003eThreat Center provides real-time notifications when new supply chain compromises are identified. The article says it integrates with SIEM platforms such as Splunk and Sentinel, as well as notification channels.\u003c/p\u003e\n\n\u003ch3 id=\"secure-registry\"\u003eSecure Registry\u003c/h3\u003e\n\n\u003cp\u003eSecure Registry is described as a beta feature that acts as a proxy between builds and public package registries. The article says cooldown policies can hold back freshly published package versions until they have been evaluated. It presents this as relevant to the durabletask incident, where malicious versions were published within a 35-minute window.\u003c/p\u003e\n\n\u003ch3 id=\"package-search\"\u003ePackage Search\u003c/h3\u003e\n\n\u003cp\u003ePackage Search scans default branches and open pull requests for known compromised npm, PyPI, and other open-source packages. The article says it can identify repositories referencing affected dependencies in lockfiles or manifests.\u003c/p\u003e\n\n\u003ch3 id=\"github-checks\"\u003eGitHub Checks\u003c/h3\u003e\n\n\u003cp\u003eGitHub Checks enforce cooldown period verification, pwn request detection, and script injection analysis on pull requests. The article says these checks are intended to catch supply chain risks before they reach the main branch.\u003c/p\u003e\n\n\u003ch2 id=\"expected-future-activity-according-to-the-article\"\u003eExpected Future Activity According to the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article says StepSecurity expects more incidents in the coming days and weeks based on observed patterns. It names TeamPCP and the actors operating the Shai-Hulud worm as adversaries with an effective and scalable playbook.\u003c/p\u003e\n\n\u003cp\u003eThe article describes that playbook as compromising a trusted package or action, injecting credential-stealing malware, exfiltrating secrets, and using stolen credentials to compromise additional packages. It also says techniques are evolving and include imposter commits, WAV steganography, DNS tunneling, dangling orphan commits, and process memory reading.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions-in-the-article\"\u003eRecommended Actions in the Article\u003c/h2\u003e\n\n\u003cp\u003eFor StepSecurity Enterprise customers, the article recommends confirming that the following capabilities are enabled:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThreat Center notifications.\u003c/li\u003e\n\u003cli\u003eDev Machine Guard.\u003c/li\u003e\n\u003cli\u003eCompromised Actions Policy.\u003c/li\u003e\n\u003cli\u003eHarden Runner.\u003c/li\u003e\n\u003cli\u003eSecure Registry for npm with a cooldown policy, if using JFrog or Google Artifact Registry.\u003c/li\u003e\n\u003cli\u003eGitHub Checks for cooldown enforcement, pwn request detection, and script injection analysis.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor the broader community, the article points to free resources including Harden Runner for open-source repositories, a free version of Dev Machine Guard, and the StepSecurity Blog for supply chain threat intelligence.\u003c/p\u003e\n\n\u003ch2 id=\"core-takeaway\"\u003eCore Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s core takeaway is that the software supply chain attack surface spans developer machines, dependencies, CI/CD systems, and source code platforms. The incidents described in the article affected multiple layers in a short period of time, including GitHub and Microsoft. The article argues that organizations need defense in depth across the full pipeline rather than relying on a single control such as dependency scanning, package scoring, or secure registries.\u003c/p\u003e\n","keyPoints":["Between May 18 and May 19, 2026, five software supply chain attacks targeted IDE extensions, GitHub Actions, npm packages, PyPI packages, and internal source code repositories.","A malicious Nx Console VS Code extension with more than 2.2 million installs compromised a GitHub employee device and led to the exfiltration of approximately 3,800 GitHub internal repositories.","Compromised GitHub Actions replaced trusted version tags with imposter commits and attempted to steal CI/CD credentials from runner process memory.","The Shai-Hulud npm worm used stolen npm tokens to propagate across packages, while Microsoft’s durabletask PyPI package was trojanized with credential-stealing payloads.","The article argues that traditional tools such as SCA, SAST, EDR, and CNAPP do not provide sufficient coverage because they do not monitor every layer of the software development pipeline, including CI/CD runtime and developer machines."],"insights":["Workflows that pinned GitHub Actions to full-length commit SHAs were unaffected by the actions-cool tag hijacking technique, making SHA pinning a concrete mitigation against imposter commits.","The article highlights CI/CD runner process memory as a critical blind spot because multiple attacks attempted to read Runner.Worker memory to extract masked secrets that conventional package scanners and registry policies would not detect.","A package cooldown policy could have reduced exposure to the malicious Microsoft durabletask releases because all three malicious versions were published within a 35-minute window before discovery.","Developer workstation visibility is presented as essential because the GitHub breach originated from a poisoned VS Code extension rather than from a production system or CI/CD pipeline.","The same incident response question, “Are we affected?”, cannot be answered by dependency scanning alone when compromises span IDE extensions, GitHub Actions, package registries, and runtime behavior."],"referencedReports":[],"body":"\u003cp\u003eBetween May 18 and May 19, 2026, the article says five software supply chain attacks targeted multiple layers of the development pipeline. The incidents included a poisoned VS Code extension, compromised GitHub Actions, a self-replicating npm worm, a trojanized Microsoft-owned PyPI package, and GitHub’s disclosure that about 3,800 internal source code repositories were exfiltrated. The article emphasizes that Microsoft and GitHub were affected despite being highly security-mature organizations.\u003c/p\u003e\n\n\u003cp\u003eThe article’s main significance is that the attacks did not focus on a single software supply chain layer. They targeted developer machines, open-source dependencies, and CI/CD pipelines simultaneously. The article argues that traditional tools such as SCA, SAST, EDR, and CNAPP do not adequately monitor CI/CD runner runtime behavior, developer IDE extensions, or silently replaced GitHub Action tags.\u003c/p\u003e\n\n\u003cp\u003eTechnically, several attacks focused on credential theft and secret exfiltration. The compromised actions-cool GitHub Actions allegedly read Runner.Worker process memory and exfiltrated CI/CD credentials, while the Shai-Hulud npm worm harvested credentials and propagated using stolen npm tokens. The malicious Nx Console VS Code extension used HTTPS, GitHub API, and DNS tunneling exfiltration channels and installed a persistent Python backdoor on macOS.\u003c/p\u003e\n"},{"n":2,"title":"Drupal critical update to fix bug with high exploitation risk","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/drupal-critical-update-to-fix-bug-with-high-exploitation-risk/","time":"12:52","priority":"MUST READ","score":94,"tldr":"Drupal is releasing a critical core security update for versions 10 and 11, warning that exploits may appear within hours of disclosure. Admins should prepare to patch immediately, while Drupal 8 and 9 users should upgrade or apply available hotfixes where possible.","briefOverview":"\u003cp\u003eDrupal announced a core security release scheduled for May 20 and warned that threat actors might develop exploits within hours of the update disclosure. Administrators were urged to reserve time for core updates between 17:00 and 21:00 UTC. The issue is significant because Drupal is widely used by large organizations and in government, education, and healthcare sectors.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects Drupal core versions 8 and later, although Drupal said not all configurations are impacted. Security updates will be available for several Drupal 10 and 11 branches, including some no-longer-supported branches due to the severity of the issue. Drupal 8 and 9 will not receive patches, but hotfix files will be published for certain Drupal 9.5 and 8.9 installations.\u003c/p\u003e\n\n\u003cp\u003eDrupal did not disclose technical details before the announcement and warned that any information appearing online could be fraudulent. Sites using Drupal Steward are already protected against known attack vectors, but Drupal still recommends applying the update. Administrators were told to monitor Drupal’s official security portal and apply the update as soon as it becomes available.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDrupal announced a core security release scheduled for May 20 and warned administrators to prepare for urgent patching. The organization said threat actors might develop exploits within hours of the update disclosure. Administrators were urged to reserve time for core updates between 17:00 and 21:00 UTC.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects Drupal core versions 8 and later, though Drupal clarified that not all configurations are impacted. Security updates will be available for Drupal 11.3.x, 11.2.x, 11.1x, 10.6.x, 10.5.x, and 10.4x. Website administrators running Drupal 8 or 9 were strongly recommended to upgrade to at least version 10.6.\u003c/p\u003e\n\n\u003cp\u003eDrupal said versions 11.1x and 10.4x are no longer supported, but fixes will still be provided for them because of the severity of the security issue. Administrators on those branches should update to Drupal 11.1.9 and 10.4.9. Drupal 8 and 9 have reached end-of-life and will receive no patches.\u003c/p\u003e\n\n\u003cp\u003eFor end-of-life Drupal versions, hotfix files will be published for versions 9.5 and 8.9. These hotfixes are intended to allow remediation for sites running Drupal 9.5.11 or 8.9.20. Sites using Drupal Steward are already protected against known attack vectors, although Drupal still recommends applying the update.\u003c/p\u003e\n\n\u003cp\u003eNo technical details about the vulnerability were disclosed before the release. Drupal warned that any information appearing online about the issue could be fraudulent and intended to trick administrators into risky actions. Administrators were told to monitor Drupal’s official security portal throughout the day for more information and to apply the update as soon as it is available.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eDrupal announced a core security release scheduled for May 20 and warned that threat actors might develop exploits within hours of the update disclosure. Administrators were urged to reserve time for core updates between 17:00 and 21:00 UTC. The article emphasizes the urgency of the update because Drupal is widely used by large organizations and in the government, education, and healthcare sectors.\u003c/p\u003e\n\n\u003ch2 id=\"affected-versions-and-update-availability\"\u003eAffected Versions and Update Availability\u003c/h2\u003e\n\n\u003cp\u003eAccording to Drupal’s public service announcement, the vulnerability affects Drupal core versions 8 and later. Drupal clarified that not all configurations are impacted. Security updates will be available for the following branches:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDrupal 11.3.x\u003c/li\u003e\n\u003cli\u003eDrupal 11.2.x\u003c/li\u003e\n\u003cli\u003eDrupal 11.1x\u003c/li\u003e\n\u003cli\u003eDrupal 10.6.x\u003c/li\u003e\n\u003cli\u003eDrupal 10.5.x\u003c/li\u003e\n\u003cli\u003eDrupal 10.4x\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eWebsite administrators running Drupal 8 or 9 were strongly recommended to upgrade to at least Drupal 10.6.\u003c/p\u003e\n\n\u003ch2 id=\"unsupported-branches-and-special-fixes\"\u003eUnsupported Branches and Special Fixes\u003c/h2\u003e\n\n\u003cp\u003eDrupal stated that versions 11.1x and 10.4x are no longer supported, but fixes will still be provided for them due to the severity of the security issue. Administrators using those branches should update to Drupal 11.1.9 and Drupal 10.4.9.\u003c/p\u003e\n\n\u003cp\u003eDrupal 8 and Drupal 9 have reached end-of-life and will receive no patches. However, hotfix files will be published for Drupal 9.5 and Drupal 8.9, allowing remediation for those running Drupal 9.5.11 or Drupal 8.9.20.\u003c/p\u003e\n\n\u003ch2 id=\"protection-and-response-guidance\"\u003eProtection and Response Guidance\u003c/h2\u003e\n\n\u003cp\u003eDrupal said sites using Drupal Steward are already protected against known attack vectors. Even so, Drupal still recommends applying the update. Administrators were advised to continue monitoring Drupal’s official security portal throughout the day and to apply the security update as soon as it becomes available.\u003c/p\u003e\n\n\u003ch2 id=\"technical-disclosure-status\"\u003eTechnical Disclosure Status\u003c/h2\u003e\n\n\u003cp\u003eNo technical details about the vulnerability were disclosed before the announcement. Drupal stated that neither the Security Team nor any other party could release additional information about the vulnerability until the announcement was made.\u003c/p\u003e\n\n\u003cp\u003eDrupal also warned that any information appearing online about the vulnerability before the official announcement could be fraudulent. The article says such information could be intended to trick administrators into taking risky actions, so caution is advised.\u003c/p\u003e\n\n\u003ch2 id=\"key-impact\"\u003eKey Impact\u003c/h2\u003e\n\n\u003cp\u003eThe main impact described in the article is the need for urgent administrative action across affected Drupal installations. The article does not report active exploitation, identify a specific threat actor, or provide technical details about the flaw. Its primary warning is that exploit development may happen quickly after disclosure, making rapid patching and reliance on official Drupal information especially important.\u003c/p\u003e\n","keyPoints":["Drupal announced a core security release scheduled for May 20 and warned that threat actors might develop exploits within hours of the update disclosure.","The vulnerability affects Drupal core versions 8 and later, although not all configurations are impacted.","Security updates will be available for Drupal 11.3.x, 11.2.x, 11.1x, 10.6.x, 10.5.x, and 10.4x.","Drupal 8 and 9 have reached end-of-life and will receive no patches, but hotfix files will be published for versions 9.5 and 8.9.","Drupal warned that no technical details have been disclosed and that information appearing online before the announcement could be fraudulent."],"insights":["Drupal is making fixes available for unsupported 11.1x and 10.4x branches because of the severity of the issue, indicating administrators on those branches have a short-term patch path but should still move to supported releases.","Administrators running Drupal 9.5.11 or 8.9.20 will not receive normal patches, but they will have hotfix files available as a limited remediation option.","Drupal specifically warned that vulnerability details appearing online before the official announcement may be fraudulent and could trick administrators into unsafe actions.","Sites using Drupal Steward are already protected against known attack vectors, but Drupal still recommends applying the core update."],"referencedReports":[{"title":"Public service announcement","url":"https://www.drupal.org/psa-2026-05-18","publisher":"Drupal","context":"The article cites Drupal's public service announcement as the source for details that the vulnerability affects Drupal core versions 8 and later and that security updates will be released for multiple Drupal 10 and 11 branches.","category":"","primary":false}],"body":"\u003cp\u003eDrupal announced a core security release scheduled for May 20 and warned that threat actors might develop exploits within hours of the update disclosure. Administrators were urged to reserve time for core updates between 17:00 and 21:00 UTC. The issue is significant because Drupal is widely used by large organizations and in government, education, and healthcare sectors.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects Drupal core versions 8 and later, although Drupal said not all configurations are impacted. Security updates will be available for several Drupal 10 and 11 branches, including some no-longer-supported branches due to the severity of the issue. Drupal 8 and 9 will not receive patches, but hotfix files will be published for certain Drupal 9.5 and 8.9 installations.\u003c/p\u003e\n\n\u003cp\u003eDrupal did not disclose technical details before the announcement and warned that any information appearing online could be fraudulent. Sites using Drupal Steward are already protected against known attack vectors, but Drupal still recommends applying the update. Administrators were told to monitor Drupal’s official security portal and apply the update as soon as it becomes available.\u003c/p\u003e\n"},{"n":17,"title":"Microsoft Takes Down Malware-Signing Service Behind Ransomware Attacks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/microsoft-takes-down-malware-signing.html","time":"14:36","priority":"MUST READ","score":94,"tldr":"Microsoft disrupted Fox Tempest, a malware-signing-as-a-service operation that abused Microsoft Artifact Signing to make ransomware and other malware appear legitimate. The takedown seized infrastructure and targeted a service used by multiple cybercrime and ransomware groups to bypass security controls worldwide.","briefOverview":"\u003cp\u003eMicrosoft said it disrupted a malware-signing-as-a-service operation run by a threat actor it tracks as Fox Tempest. The operation abused Microsoft’s Artifact Signing system to deliver malicious code and support ransomware and other attacks. Microsoft said the activity compromised thousands of machines and networks across the world.\u003c/p\u003e\n\n\u003cp\u003eThe disruption effort, codenamed OpFauxSign, included seizing Fox Tempest’s signspace.cloud website, taking hundreds of virtual machines offline, and blocking access to a site hosting the underlying code. Microsoft said the service helped cybercriminals disguise malware as legitimate software by using fraudulently obtained code-signing certificates. The signed malware was used in activity involving Rhysida ransomware, Oyster, Lumma Stealer, Vidar, and links to affiliates tied to INC, Qilin, BlackByte, and Akira.\u003c/p\u003e\n\n\u003cp\u003eFox Tempest allegedly used Artifact Signing to create short-lived fraudulent certificates valid for 72 hours. Microsoft said the actor likely used stolen identities based in the United States and Canada to pass identity validation and obtain digital credentials for signing. The service allowed customers to upload malicious files for signing, later shifting to pre-configured Cloudzy-hosted virtual machines that streamlined the process.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft announced that it disrupted a malware-signing-as-a-service operation that weaponized the company’s Artifact Signing system. The company attributed the activity to Fox Tempest, a threat actor it said has been active since May 2025. Microsoft said the operation enabled cybercriminals to disguise malware as legitimate software and conduct ransomware and other attacks against thousands of machines and networks worldwide.\u003c/p\u003e\n\n\u003cp\u003eThe disruption was codenamed OpFauxSign. Microsoft said it seized the signspace.cloud website, took offline hundreds of virtual machines used in the operation, and blocked access to a site hosting the underlying code. The company described the takedown as a way to disrupt a capability that allowed malicious software to appear legitimate.\u003c/p\u003e\n\n\u003cp\u003eArtifact Signing, formerly Azure Trusted Signing, is Microsoft’s fully managed signing solution for developers to build and distribute applications while confirming software legitimacy and integrity. Fox Tempest allegedly abused this mechanism to generate short-lived fraudulent code-signing certificates that were valid for 72 hours. Microsoft said the actor very likely used stolen identities based in the United States and Canada to pass identity validation and obtain the credentials needed for signing.\u003c/p\u003e\n\n\u003cp\u003eThe SignSpace website was built on Artifact Signing and provided secure file signing through an admin panel and user page. Microsoft said it used Azure subscriptions, certificates, and a structured database to manage users and files. Paying cybercriminal customers could upload malicious files and receive signed binaries, with the service costing between \u003cspan class=\"math inline\"\u003e\\(5,000 and \\)\u003c/span\u003e9,000.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the service enabled deployment of Rhysida ransomware by threat actors such as Vanilla Tempest and was also associated with malware families including Oyster, Lumma Stealer, and Vidar. The article also describes connections between Fox Tempest and affiliates associated with INC, Qilin, BlackByte, and Akira ransomware. These operations targeted healthcare, education, government, and financial services organizations across the United States, France, India, and China.\u003c/p\u003e\n\n\u003cp\u003eStarting in February 2026, Fox Tempest shifted to providing customers with pre-configured virtual machines hosted on Cloudzy. Microsoft said this reduced friction for customers, improved Fox Tempest’s operational security, and streamlined delivery of malicious but trusted signed malware at scale. Microsoft also said Fox Tempest adapted as the company disabled fraudulent accounts and revoked illicit certificates, and court documents show Microsoft worked with a cooperative source to purchase and test the service between February and March 2026.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said it disrupted a malware-signing-as-a-service operation that abused the company’s Artifact Signing system. The operation was attributed to a threat actor Microsoft tracks as Fox Tempest, which the company said has been active since May 2025. Microsoft said the service allowed cybercriminals to make malware look like legitimate software and use it in ransomware and other attacks.\u003c/p\u003e\n\n\u003cp\u003eThe disruption effort was codenamed OpFauxSign. According to Microsoft, the operation involved seizing Fox Tempest’s signspace.cloud website, taking offline hundreds of virtual machines running the service, and blocking access to a site hosting the underlying code.\u003c/p\u003e\n\n\u003ch2 id=\"core-significance\"\u003eCore significance\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said the operation compromised thousands of machines and networks across the world. The article describes Fox Tempest as playing a crucial role in the cybercrime ecosystem by enabling malicious binaries to appear trusted through signed certificates.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said this capability mattered because attackers could make malicious software look legitimate, undermining how people and systems decide what is safe. The company framed disrupting the signing capability as a way to raise the cost of cybercrime.\u003c/p\u003e\n\n\u003ch2 id=\"abuse-of-microsoft-artifact-signing\"\u003eAbuse of Microsoft Artifact Signing\u003c/h2\u003e\n\n\u003cp\u003eArtifact Signing, formerly Azure Trusted Signing, is Microsoft’s fully managed, end-to-end signing solution. It is intended to help developers build and distribute applications while ensuring software is legitimate and has not been modified by unauthorized parties.\u003c/p\u003e\n\n\u003cp\u003eFox Tempest allegedly leveraged this system to generate short-lived fraudulent code-signing certificates. The certificates were valid for only 72 hours. Microsoft said these certificates were used to deliver trusted, signed malware and evade security controls.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said that obtaining legitimate signed certificates through Artifact Signing requires requestors to pass detailed identity validation processes using industry-standard verifiable credentials. Based on that requirement, Microsoft said Fox Tempest very likely used stolen identities based in the United States and Canada to masquerade as a legitimate entity and obtain the digital credentials needed for signing.\u003c/p\u003e\n\n\u003ch2 id=\"signspace-service-model\"\u003eSignSpace service model\u003c/h2\u003e\n\n\u003cp\u003eThe SignSpace website was built on Artifact Signing. Microsoft said it enabled secure file signing through an admin panel and user page.\u003c/p\u003e\n\n\u003cp\u003eThe service used Azure subscriptions, certificates, and a structured database to manage users and files. Paying cybercriminal customers could upload malicious files for signing with certificates fraudulently obtained by Fox Tempest.\u003c/p\u003e\n\n\u003cp\u003eThe resulting binaries could masquerade as legitimate software. The article lists AnyDesk, Microsoft Teams, PuTTY, and Cisco Webex as examples of legitimate software names that malware and ransomware imitated. The service reportedly cost between \u003cspan class=\"math inline\"\u003e\\(5,000 and \\)\u003c/span\u003e9,000.\u003c/p\u003e\n\n\u003ch2 id=\"infrastructure-evolution\"\u003eInfrastructure evolution\u003c/h2\u003e\n\n\u003cp\u003eStarting in February 2026, Fox Tempest shifted to providing customers with pre-configured virtual machines hosted on Cloudzy. This change allowed customers to upload necessary artifacts directly to attacker-controlled infrastructure and receive signed binaries in return.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said this infrastructure evolution:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eReduced friction for customers.\u003c/li\u003e\n\u003cli\u003eImproved operational security for Fox Tempest.\u003c/li\u003e\n\u003cli\u003eStreamlined delivery of malicious but trusted signed malware at scale.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"malware-and-ransomware-associations\"\u003eMalware and ransomware associations\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said the operation enabled the deployment of Rhysida ransomware by threat actors such as Vanilla Tempest. The article also names Oyster, Lumma Stealer, and Vidar as other malware families associated with the service.\u003c/p\u003e\n\n\u003cp\u003eThe article further states that connections were uncovered between Fox Tempest and affiliates linked to several ransomware strains, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eINC.\u003c/li\u003e\n\u003cli\u003eQilin.\u003c/li\u003e\n\u003cli\u003eBlackByte.\u003c/li\u003e\n\u003cli\u003eAkira.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe targeted sectors included healthcare, education, government, and financial services. The article says attacks by these operations affected entities in the United States, France, India, and China.\u003c/p\u003e\n\n\u003ch2 id=\"vanilla-tempest-activity\"\u003eVanilla Tempest activity\u003c/h2\u003e\n\n\u003cp\u003eThe article specifically describes activity by Vanilla Tempest involving binaries signed through the Fox Tempest service. According to the article, Vanilla Tempest distributed these binaries through legitimately purchased advertisements.\u003c/p\u003e\n\n\u003cp\u003eThose advertisements redirected users searching for Microsoft Teams to bogus download pages. This activity led to the deployment of Oyster, also known as Broomstick or CleanUpLoader. The article describes Oyster as a modular implant and loader responsible for delivering Rhysida ransomware.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-response-and-disruption\"\u003eMicrosoft response and disruption\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said it acted to disrupt the service by taking control of or disabling key parts of the operation’s infrastructure. The actions included seizing the signspace.cloud website, taking hundreds of virtual machines offline, and blocking access to a code-hosting site used by the operation.\u003c/p\u003e\n\n\u003cp\u003eThe company also said it had previously enacted countermeasures such as disabling fraudulent accounts and revoking illicitly obtained certificates. Microsoft said Fox Tempest continually adapted its tradecraft in response, including attempting to shift to a different code-signing service.\u003c/p\u003e\n\n\u003cp\u003eCourt documents cited in the article show that Microsoft worked with a “cooperative source” to purchase and test the service between February and March 2026.\u003c/p\u003e\n\n\u003ch2 id=\"key-disclosed-impact\"\u003eKey disclosed impact\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Fox Tempest’s operation supported ransomware and other attacks and compromised thousands of machines and networks globally. It also says that the service was connected to ransomware and malware activity affecting healthcare, education, government, and financial services organizations across multiple countries.\u003c/p\u003e\n\n\u003cp\u003eThe central impact described in the article is the abuse of legitimate code-signing trust. By using fraudulently obtained certificates through Artifact Signing, Fox Tempest enabled malware and ransomware to appear legitimate and bypass security controls.\u003c/p\u003e\n","keyPoints":["Microsoft disrupted a malware-signing-as-a-service operation run by Fox Tempest that abused Microsoft Artifact Signing to deliver malicious code and support ransomware and other attacks.","Microsoft seized Fox Tempest's signspace.cloud website, took offline hundreds of virtual machines running the operation, and blocked access to a site hosting the underlying code.","Fox Tempest used fraudulently obtained short-lived code-signing certificates to make malware and ransomware appear as legitimate software such as AnyDesk, Microsoft Teams, PuTTY, and Cisco Webex.","Microsoft said the service enabled deployment of Rhysida ransomware by actors such as Vanilla Tempest and was also linked to malware families including Oyster, Lumma Stealer, and Vidar.","The operation had connections to affiliates associated with ransomware strains including INC, Qilin, BlackByte, and Akira, with attacks targeting healthcare, education, government, and financial services across several countries."],"insights":["Fox Tempest’s use of 72-hour Artifact Signing certificates shows that very short certificate validity did not prevent signed malware from bypassing trust-based security controls.","Microsoft said Fox Tempest likely used stolen U.S. and Canadian identities to pass Artifact Signing identity validation, highlighting identity fraud as a weakness in the code-signing process described in the article.","The service’s shift in February 2026 to pre-configured Cloudzy-hosted virtual machines reduced customer friction and improved Fox Tempest’s operational security, according to Microsoft.","Vanilla Tempest distributed signed malware through legitimately purchased advertisements that redirected users searching for Microsoft Teams to fake download pages, combining trusted-looking ads with trusted-looking signed binaries.","Fox Tempest repeatedly adapted after Microsoft disabled fraudulent accounts and revoked illicit certificates, including attempting to move to a different code-signing service."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft said it disrupted a malware-signing-as-a-service operation run by a threat actor it tracks as Fox Tempest. The operation abused Microsoft’s Artifact Signing system to deliver malicious code and support ransomware and other attacks. Microsoft said the activity compromised thousands of machines and networks across the world.\u003c/p\u003e\n\n\u003cp\u003eThe disruption effort, codenamed OpFauxSign, included seizing Fox Tempest’s signspace.cloud website, taking hundreds of virtual machines offline, and blocking access to a site hosting the underlying code. Microsoft said the service helped cybercriminals disguise malware as legitimate software by using fraudulently obtained code-signing certificates. The signed malware was used in activity involving Rhysida ransomware, Oyster, Lumma Stealer, Vidar, and links to affiliates tied to INC, Qilin, BlackByte, and Akira.\u003c/p\u003e\n\n\u003cp\u003eFox Tempest allegedly used Artifact Signing to create short-lived fraudulent certificates valid for 72 hours. Microsoft said the actor likely used stolen identities based in the United States and Canada to pass identity validation and obtain digital credentials for signing. The service allowed customers to upload malicious files for signing, later shifting to pre-configured Cloudzy-hosted virtual machines that streamlined the process.\u003c/p\u003e\n"},{"n":3,"title":"Grafana breach caused by missed token rotation after TanStack attack","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/grafana-breach-caused-by-missed-token-rotation-after-tanstack-attack/","time":"15:46","priority":"MUST READ","score":92,"tldr":"Grafana says its breach stemmed from one GitHub workflow token missed during rotation after the TanStack npm supply-chain attack, allowing attackers to access private repositories and steal source code plus some business contact information. The company says no customer production data or systems were compromised and its codebase was not modified.","briefOverview":"\u003cp\u003eGrafana said its data breach was caused by a single GitHub workflow token that was missed during a rotation process after the TanStack npm supply-chain attack. The issue followed the Shai-Hulud malware campaign attributed in the article to TeamPCP hackers, in which dozens of TanStack packages with credential-stealing code were published to npm. Grafana’s CI/CD workflow consumed a malicious package, causing an info-stealer module to run in its GitHub environment and exfiltrate GitHub workflow tokens.\u003c/p\u003e\n\n\u003cp\u003eGrafana detected malicious activity tied to the compromised TanStack packages on May 1 and began incident response, including rotating a significant number of GitHub workflow tokens. However, one token was missed after Grafana initially deemed a specific GitHub workflow not impacted, and attackers used it to access private repositories. The company previously confirmed that source code was stolen and said it would not pay a ransom.\u003c/p\u003e\n\n\u003cp\u003eGrafana’s continued investigation found that the intruder also downloaded operational information and business contact names and email addresses exchanged in a professional relationship context. Grafana said this was not customer production data and that no customer production systems, operations, or Grafana Cloud platform data were compromised based on current evidence. The company also said its codebase was not modified, so users do not need to take action unless future evidence changes that assessment.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGrafana attributed its breach to a single GitHub workflow token that was not rotated after the TanStack npm supply-chain attack. The article links the incident to the ongoing Shai-Hulud malware campaign, attributed to TeamPCP hackers. In that campaign, dozens of TanStack packages containing credential-stealing code were published to the npm index, compromising developer environments including Grafana’s.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, Grafana’s CI/CD workflow consumed one of the malicious npm packages. The info-stealer module then executed inside Grafana’s GitHub environment and exfiltrated GitHub workflow tokens to the attackers. Grafana said it detected malicious activity resulting from the compromised TanStack packages on May 1 and immediately began its incident response plan.\u003c/p\u003e\n\n\u003cp\u003eGrafana’s response included rotating a significant number of GitHub workflow tokens. However, the company later determined that one token was missed because a specific GitHub workflow had originally been deemed not impacted. A subsequent review confirmed that this workflow had in fact been compromised, and the missed token allowed attackers to access Grafana’s private GitHub repositories.\u003c/p\u003e\n\n\u003cp\u003eGrafana previously confirmed that the intruders stole source code and said there was no customer impact. The company also stated that the hackers would not receive a ransom payment. Its continued investigation later found that the intruder downloaded operational information and business details used by Grafana.\u003c/p\u003e\n\n\u003cp\u003eThe downloaded information included business contact names and email addresses exchanged in a professional relationship context. Grafana said the information was not pulled from or processed through production systems or the Grafana Cloud platform. Based on the latest evidence and investigation, the company said no customer production systems or operations were compromised.\u003c/p\u003e\n\n\u003cp\u003eGrafana also said its codebase was not modified during the incident. As a result, the code users downloaded throughout the events is considered safe, and users are not required to take any action. Grafana said it would notify impacted customers directly if that evaluation changes as the investigation continues.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGrafana said its data breach was caused by a single GitHub workflow token that was missed during the company’s token rotation process after the TanStack npm supply-chain attack. The incident occurred in the context of the ongoing Shai-Hulud malware campaign, which the article says is attributed to TeamPCP hackers. In that campaign, dozens of TanStack packages infected with credential-stealing code were published on the npm index.\u003c/p\u003e\n\n\u003cp\u003eThe compromised packages affected developer environments, including Grafana’s. When the malicious npm package was released, Grafana’s CI/CD workflow consumed it. The package’s info-stealer module then executed in Grafana’s GitHub environment and exfiltrated GitHub workflow tokens to attackers.\u003c/p\u003e\n\n\u003ch2 id=\"initial-detection-and-response\"\u003eInitial Detection and Response\u003c/h2\u003e\n\n\u003cp\u003eGrafana said it detected malicious activity resulting from compromised TanStack packages on May 1. The company then immediately deployed its incident response plan. That response included rotating GitHub workflow tokens.\u003c/p\u003e\n\n\u003cp\u003eGrafana said it performed analysis and quickly rotated a significant number of GitHub workflow tokens. However, one token was missed. The company later said the missed token allowed attackers to gain access to its GitHub repositories.\u003c/p\u003e\n\n\u003ch2 id=\"missed-token-and-repository-access\"\u003eMissed Token and Repository Access\u003c/h2\u003e\n\n\u003cp\u003eGrafana’s update said that a specific GitHub workflow was originally deemed not impacted. A later review found that this assessment was incorrect. Grafana confirmed that this workflow had in fact been compromised.\u003c/p\u003e\n\n\u003cp\u003eThe missed GitHub workflow token was then used by attackers to access Grafana’s private repositories. The company had previously confirmed that the intruders stole source code. Grafana also said at that time that there was no customer impact and that the hackers would not receive a ransom payment.\u003c/p\u003e\n\n\u003ch2 id=\"additional-data-downloaded\"\u003eAdditional Data Downloaded\u003c/h2\u003e\n\n\u003cp\u003eGrafana’s continued investigation found that the intruder also downloaded operational information and details used by Grafana for its business. The company said this included business contact names and email addresses exchanged in a professional relationship context. Grafana emphasized that this was not information pulled from or processed through production systems or the Grafana Cloud platform.\u003c/p\u003e\n\n\u003cp\u003eThe article states that this information was not customer production data. Grafana also said that, based on the latest evidence and investigation, no customer production systems or operations had been compromised.\u003c/p\u003e\n\n\u003ch2 id=\"code-integrity-and-customer-impact\"\u003eCode Integrity and Customer Impact\u003c/h2\u003e\n\n\u003cp\u003eGrafana Labs said its codebase was not modified during the incident. Because of that, the company considers the code users downloaded throughout the events to be safe. Grafana said users are not required to take any action.\u003c/p\u003e\n\n\u003cp\u003eThe company also said it would notify impacted customers directly if its evaluation changes based on new evidence from the ongoing investigation.\u003c/p\u003e\n\n\u003ch2 id=\"key-technical-details\"\u003eKey Technical Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe breach followed a TanStack npm supply-chain attack involving malicious packages published to the npm index.\u003c/li\u003e\n\u003cli\u003eGrafana’s CI/CD workflow consumed a malicious npm package.\u003c/li\u003e\n\u003cli\u003eThe malicious package executed an info-stealer module inside Grafana’s GitHub environment.\u003c/li\u003e\n\u003cli\u003eGitHub workflow tokens were exfiltrated to attackers.\u003c/li\u003e\n\u003cli\u003eGrafana rotated many GitHub workflow tokens, but one token was missed.\u003c/li\u003e\n\u003cli\u003eThe missed token was tied to a GitHub workflow that was initially deemed not impacted but later confirmed to have been compromised.\u003c/li\u003e\n\u003cli\u003eAttackers used the missed token to access Grafana’s private GitHub repositories.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eGrafana disclosed the following impacts:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSource code was stolen.\u003c/li\u003e\n\u003cli\u003eOperational information was downloaded.\u003c/li\u003e\n\u003cli\u003eBusiness contact names and email addresses were downloaded.\u003c/li\u003e\n\u003cli\u003eThe downloaded business contact information was described as information exchanged in a professional relationship context.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eGrafana also stated the following limits on the impact:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe information was not customer production data.\u003c/li\u003e\n\u003cli\u003eThe information was not pulled from or processed through production systems or the Grafana Cloud platform.\u003c/li\u003e\n\u003cli\u003eNo customer production systems or operations were compromised based on the latest evidence and investigation.\u003c/li\u003e\n\u003cli\u003eThe codebase was not modified during the incident.\u003c/li\u003e\n\u003cli\u003eUsers are not required to take action at this time.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"current-status\"\u003eCurrent Status\u003c/h2\u003e\n\n\u003cp\u003eGrafana’s investigation is ongoing. The company said it will notify impacted customers directly if new evidence changes its current assessment. As of the article’s latest information, Grafana says customer production systems and Grafana Cloud platform data were not compromised, the codebase was not modified, and users do not need to take action.\u003c/p\u003e\n","keyPoints":["Grafana said its data breach was caused by a single GitHub workflow token that was missed during rotation after the TanStack npm supply-chain attack.","Malicious TanStack packages consumed by Grafana’s CI/CD workflow executed an info-stealer in its GitHub environment and exfiltrated GitHub workflow tokens.","Grafana detected malicious activity from the compromised TanStack packages on May 1 and rotated many GitHub workflow tokens as part of its incident response.","Attackers used the missed token to access Grafana’s private GitHub repositories and steal source code, operational information, and business contact names and email addresses.","Grafana said customer production data, customer production systems, and the Grafana Cloud platform were not compromised, and its codebase was not modified during the incident."],"insights":["A token rotation response can leave a critical gap if workflows initially judged out of scope are not later validated against evidence of compromise.","The incident shows that a compromised npm dependency in CI/CD can expose GitHub workflow tokens from the build environment, not just affect developer workstations.","Grafana’s investigation found that repository access exposed operational and business relationship information even though customer production systems and Grafana Cloud data were not compromised.","Grafana explicitly assessed whether attackers modified its codebase and concluded users did not need to take action because downloaded code remained safe."],"referencedReports":[],"body":"\u003cp\u003eGrafana said its data breach was caused by a single GitHub
