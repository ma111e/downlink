workflow token that was missed during a rotation process after the TanStack npm supply-chain attack. The issue followed the Shai-Hulud malware campaign attributed in the article to TeamPCP hackers, in which dozens of TanStack packages with credential-stealing code were published to npm. Grafana’s CI/CD workflow consumed a malicious package, causing an info-stealer module to run in its GitHub environment and exfiltrate GitHub workflow tokens.\u003c/p\u003e\n\n\u003cp\u003eGrafana detected malicious activity tied to the compromised TanStack packages on May 1 and began incident response, including rotating a significant number of GitHub workflow tokens. However, one token was missed after Grafana initially deemed a specific GitHub workflow not impacted, and attackers used it to access private repositories. The company previously confirmed that source code was stolen and said it would not pay a ransom.\u003c/p\u003e\n\n\u003cp\u003eGrafana’s continued investigation found that the intruder also downloaded operational information and business contact names and email addresses exchanged in a professional relationship context. Grafana said this was not customer production data and that no customer production systems, operations, or Grafana Cloud platform data were compromised based on current evidence. The company also said its codebase was not modified, so users do not need to take action unless future evidence changes that assessment.\u003c/p\u003e\n"},{"n":5,"title":"GitHub investigates internal repositories breach claimed by TeamPCP","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/github-investigates-internal-repositories-breach-claimed-by-teampcp/","time":"05:08","priority":"MUST READ","score":92,"tldr":"GitHub is investigating claims by the TeamPCP hacker group that it accessed about 4,000 internal private code repositories and is trying to sell the data. GitHub says it currently has no evidence that customer data outside its internal repositories was affected.","briefOverview":"\u003cp\u003eGitHub is investigating unauthorized access to its internal repositories after the TeamPCP hacker group claimed it accessed approximately 4,000 repositories containing private code. GitHub told BleepingComputer that it currently has no evidence of impact to customer information stored outside its internal repositories. The company said it is closely monitoring its infrastructure for follow-on activity.\u003c/p\u003e\n\n\u003cp\u003eTeamPCP claimed on the Breached hacking forum that it had access to GitHub\u0026rsquo;s source code and internal organizations. The group asked for at least $50,000 and said it would sell the data to one buyer or leak it for free if no buyer was found. GitHub said affected customers will be alerted through established notification and incident response channels if any evidence of impact is discovered.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that TeamPCP has previously been linked to supply chain attacks targeting developer code platforms including GitHub, PyPI, NPM, and Docker. It also connects the group to prior incidents involving Aqua Security\u0026rsquo;s Trivy vulnerability scanner, Aqua Security Docker images, Checkmarx KICS, LiteLLM, the Mini Shai-Hulud campaign, and stolen Mistral AI source code advertised for sale.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGitHub is investigating a claimed breach of its internal repositories after TeamPCP said it accessed approximately 4,000 private code repositories. The company confirmed to BleepingComputer that it is investigating unauthorized access to GitHub\u0026rsquo;s internal repositories. GitHub said it currently has no evidence that customer information stored outside its internal repositories has been affected.\u003c/p\u003e\n\n\u003cp\u003eGitHub\u0026rsquo;s platform is used by more than 4 million organizations, including 90% of the Fortune 100, and by over 180 million developers. The article states that those users contribute to more than 420 million code repositories. This scale makes the investigation significant, even though GitHub has not reported evidence of impact to customer enterprises, organizations, or repositories outside its internal repositories.\u003c/p\u003e\n\n\u003cp\u003eTeamPCP posted its claims on the Breached hacking forum on Tuesday, saying it had access to GitHub\u0026rsquo;s source code and internal organizations. The group claimed there were around 4,000 private code repositories and asked for offers of at least $50,000. It said it would send samples to interested buyers to verify authenticity and described the offer as a sale rather than a ransom.\u003c/p\u003e\n\n\u003cp\u003eGitHub said it is closely monitoring its infrastructure for follow-on activity. The company also said all affected customers will be alerted through established notification and incident response channels if any evidence of impact is discovered. At the time described in the article, GitHub had not shared more information about the investigation.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies TeamPCP as a group previously linked to supply chain attacks targeting multiple developer code platforms, including GitHub, PyPI, NPM, and Docker. It says the group compromised Aqua Security\u0026rsquo;s Trivy vulnerability scanner in March, which is believed to have led to cascading compromises affecting Aqua Security Docker images and the Checkmarx KICS project. The Trivy breach also affected the LiteLLM open-source Python library, and the article says TeamPCP was more recently linked to the Mini Shai-Hulud supply-chain campaign and to threats to leak Mistral AI source code stolen using compromised CI/CD credentials.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore event\u003c/h2\u003e\n\n\u003cp\u003eGitHub is investigating unauthorized access to its internal repositories after the TeamPCP hacker group claimed to have accessed approximately 4,000 repositories containing private code. GitHub confirmed to BleepingComputer that it is investigating unauthorized access to GitHub\u0026rsquo;s internal repositories.\u003c/p\u003e\n\n\u003cp\u003eGitHub said it currently has no evidence of impact to customer information stored outside of its internal repositories. The company specifically referenced customer enterprises, organizations, and repositories as examples of customer information stored outside those internal repositories.\u003c/p\u003e\n\n\u003ch2 id=\"github-s-disclosed-response\"\u003eGitHub\u0026rsquo;s disclosed response\u003c/h2\u003e\n\n\u003cp\u003eGitHub said it is closely monitoring its infrastructure for follow-on activity. The company also said that if any evidence of impact is discovered, all affected customers will be alerted through established notification and incident response channels.\u003c/p\u003e\n\n\u003cp\u003eAt the time described in the article, GitHub had not shared more information about the investigation. Its public position was that the investigation is ongoing and that there was no current evidence of customer impact outside internal repositories.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-scope-and-actor-statements\"\u003eClaimed scope and actor statements\u003c/h2\u003e\n\n\u003cp\u003eTeamPCP claimed access to \u0026ldquo;Github\u0026rsquo;s source code and internal orgs\u0026rdquo; on the Breached hacking forum on Tuesday. The group claimed there was a total of around 4,000 private code repositories.\u003c/p\u003e\n\n\u003cp\u003eTeamPCP asked for at least $50,000 and said it would send samples to interested buyers to verify authenticity. The group stated that it did not consider the activity a ransom and said it did not care about extorting GitHub.\u003c/p\u003e\n\n\u003cp\u003eThe group said it wanted one buyer and would shred the data on its end after a sale. It also claimed that if no buyer was found, it would leak the data for free.\u003c/p\u003e\n\n\u003ch2 id=\"significance-of-github-s-platform-scale\"\u003eSignificance of GitHub\u0026rsquo;s platform scale\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes GitHub\u0026rsquo;s large role in software development. GitHub\u0026rsquo;s cloud-based development platform is used by more than 4 million organizations, including 90% of the Fortune 100.\u003c/p\u003e\n\n\u003cp\u003eThe platform is also used by over 180 million developers. Those developers contribute to more than 420 million code repositories.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed impact\u003c/h2\u003e\n\n\u003cp\u003eAccording to GitHub, there is currently no evidence that customer information stored outside GitHub\u0026rsquo;s internal repositories has been affected. The article does not state that customer enterprises, organizations, or repositories were compromised.\u003c/p\u003e\n\n\u003cp\u003eThe known issue described by GitHub is unauthorized access to internal repositories. The claimed issue described by TeamPCP is access to GitHub source code and internal organizations, including around 4,000 repositories of private code.\u003c/p\u003e\n\n\u003ch2 id=\"teampcp-s-prior-activity-described-in-the-article\"\u003eTeamPCP\u0026rsquo;s prior activity described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article states that TeamPCP has previously been linked to supply chain attacks targeting multiple developer code platforms, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGitHub\u003c/li\u003e\n\u003cli\u003ePyPI\u003c/li\u003e\n\u003cli\u003eNPM\u003c/li\u003e\n\u003cli\u003eDocker\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also says that in March, TeamPCP compromised Aqua Security\u0026rsquo;s Trivy vulnerability scanner. That compromise is believed to have led to cascading compromises affecting Aqua Security Docker images and the Checkmarx KICS project.\u003c/p\u003e\n\n\u003cp\u003eThe Trivy breach also affected the LiteLLM open-source Python library. The article says that attack infected tens of thousands of devices with \u0026ldquo;TeamPCP Cloud Stealer\u0026rdquo; information-stealing malware.\u003c/p\u003e\n\n\u003cp\u003eMore recently, the article says TeamPCP was linked to the \u0026ldquo;Mini Shai-Hulud\u0026rdquo; supply-chain campaign, which impacted the devices of two OpenAI employees. It also says the group threatened to leak Mistral AI source code stolen using compromised CI/CD credentials.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eGitHub is investigating unauthorized access to internal repositories.\u003c/li\u003e\n\u003cli\u003eTeamPCP claims it accessed about 4,000 private code repositories containing GitHub source code and internal organization data.\u003c/li\u003e\n\u003cli\u003eGitHub says it has no current evidence of impact to customer information stored outside its internal repositories.\u003c/li\u003e\n\u003cli\u003eGitHub is monitoring for follow-on activity and says affected customers will be notified if evidence of impact is found.\u003c/li\u003e\n\u003cli\u003eThe article links TeamPCP to multiple prior developer-focused supply-chain attacks and related compromises.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["GitHub is investigating unauthorized access to its internal repositories after TeamPCP claimed to have accessed approximately 4,000 private code repositories.","GitHub said it currently has no evidence that customer information stored outside its internal repositories, such as customer enterprises, organizations, and repositories, has been affected.","GitHub said affected customers will be alerted through established notification and incident response channels if evidence of impact is discovered.","TeamPCP advertised the alleged GitHub source code and internal organization data on the Breached hacking forum and asked for offers of at least $50,000.","The article states that TeamPCP has previously been linked to supply chain attacks targeting developer platforms including GitHub, PyPI, NPM, and Docker."],"insights":["GitHub is explicitly monitoring for follow-on activity, which is notable because the alleged exposure involves internal repositories rather than confirmed direct access to customer enterprises, organizations, or repositories.","TeamPCP framed the alleged data theft as a sale rather than an extortion attempt, stating it wanted a single buyer and would leak the data for free if no buyer was found.","The article links TeamPCP to repeated software supply-chain compromises across developer ecosystems, including GitHub, PyPI, NPM, Docker, Trivy, LiteLLM, TanStack, and Mistral AI-related incidents.","The alleged breach concerns GitHub’s own internal source code and internal organizations, making the investigation significant even though GitHub says it has no current evidence of impact to customer data stored outside those internal repositories."],"referencedReports":[],"body":"\u003cp\u003eGitHub is investigating unauthorized access to its internal repositories after the TeamPCP hacker group claimed it accessed approximately 4,000 repositories containing private code. GitHub told BleepingComputer that it currently has no evidence of impact to customer information stored outside its internal repositories. The company said it is closely monitoring its infrastructure for follow-on activity.\u003c/p\u003e\n\n\u003cp\u003eTeamPCP claimed on the Breached hacking forum that it had access to GitHub\u0026rsquo;s source code and internal organizations. The group asked for at least $50,000 and said it would sell the data to one buyer or leak it for free if no buyer was found. GitHub said affected customers will be alerted through established notification and incident response channels if any evidence of impact is discovered.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that TeamPCP has previously been linked to supply chain attacks targeting developer code platforms including GitHub, PyPI, NPM, and Docker. It also connects the group to prior incidents involving Aqua Security\u0026rsquo;s Trivy vulnerability scanner, Aqua Security Docker images, Checkmarx KICS, LiteLLM, the Mini Shai-Hulud campaign, and stolen Mistral AI source code advertised for sale.\u003c/p\u003e\n"},{"n":12,"title":"GitHub confirms being hacked by TeamPCP, says customer data unaffected","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/github-confirms-teampcp-hack-customers-unaffected","time":"12:21","priority":"MUST READ","score":92,"tldr":"GitHub confirmed that TeamPCP accessed thousands of internal code repositories after compromising an employee device with a malicious VS Code extension, but said customer data was not affected. The company contained the breach and rotated critical credentials while continuing its investigation.","briefOverview":"\u003cp\u003eGitHub said it is investigating unauthorized access to thousands of its internal code repositories after a hacking group compromised an employee’s device through a poisoned software extension. The company confirmed the breach on social media after TeamPCP advertised stolen source code on a cybercrime forum. GitHub said customer data was unaffected.\u003c/p\u003e\n\n\u003cp\u003eThe Microsoft-owned platform said the hack occurred through a malicious VS Code extension and was “detected and contained.” GitHub said the incident was limited to internal repositories and that the attacker’s claim of around 3,800 stolen repositories was “directionally consistent” with its own findings. The company said critical credentials were rotated the same day the breach was detected, with the most sensitive secrets addressed first.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGitHub said Wednesday that it is investigating unauthorized access to thousands of its internal code repositories. The access followed the compromise of an employee’s device through a poisoned software extension. GitHub, which hosts code for more than 100 million developers worldwide, said customer data was unaffected.\u003c/p\u003e\n\n\u003cp\u003eThe incident is attributed in the article to TeamPCP, a prolific cybercriminal gang. The article describes the GitHub breach as the latest attack by the group, which has conducted a cascading series of supply chain attacks since March. The group has often targeted developer tools, including TanStack, Trivy and LiteLLM, with downstream victims including the European Commission.\u003c/p\u003e\n\n\u003cp\u003eGitHub confirmed the breach on social media after TeamPCP advertised stolen source code on a cybercrime forum. The hackers offered to sell the code for $50,000 and threatened to leak it for free if no buyer came forward. The article characterizes this as a thinly veiled extortion attempt.\u003c/p\u003e\n\n\u003cp\u003eThe Microsoft-owned platform said the compromise occurred after an employee’s device was infected through a malicious VS Code extension. GitHub said the breach was detected and contained, and that it was limited to internal repositories rather than customer data. The company said the attacker’s claim that around 3,800 repositories were stolen was “directionally consistent” with its own findings.\u003c/p\u003e\n\n\u003cp\u003eGitHub said critical credentials were rotated the same day the breach was detected. The company said it addressed the most sensitive secrets first. GitHub also said it would publish a fuller report once its investigation is complete.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGitHub confirmed that it is investigating unauthorized access to thousands of its internal code repositories. The incident followed the compromise of an employee’s device through a poisoned software extension. GitHub said the breach was detected and contained, and that customer data was not affected.\u003c/p\u003e\n\n\u003cp\u003eThe breach was disclosed after TeamPCP advertised stolen source code on a cybercrime forum. The hackers offered to sell the code for $50,000 and threatened to leak it for free if no buyer came forward. GitHub said the attacker’s claim that around 3,800 repositories were stolen was “directionally consistent” with its own findings.\u003c/p\u003e\n\n\u003ch2 id=\"actor-and-broader-context\"\u003eActor and broader context\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies TeamPCP as the hacking group behind the incident. It describes TeamPCP as a prolific cybercriminal gang that has carried out a cascading series of supply chain attacks since March. The group has often targeted developer tools, including TanStack, Trivy and LiteLLM.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that TeamPCP’s downstream victims have included the European Commission. Within that context, the GitHub incident is presented as the latest attack by the group. GitHub is described as hosting code for more than 100 million developers worldwide.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-disclosed\"\u003eTechnical details disclosed\u003c/h2\u003e\n\n\u003cp\u003eGitHub said the hack occurred after an employee’s device was compromised via a malicious VS Code extension. The article also describes the initial compromise as occurring through a poisoned software extension. The company did not disclose additional technical details in the article beyond that mechanism.\u003c/p\u003e\n\n\u003cp\u003eThe access was to internal code repositories. GitHub said the incident was limited to internal repositories rather than customer data. The company said the scope claimed by the attacker, around 3,800 repositories, was “directionally consistent” with its own findings.\u003c/p\u003e\n\n\u003ch2 id=\"impact-disclosed-by-github\"\u003eImpact disclosed by GitHub\u003c/h2\u003e\n\n\u003cp\u003eGitHub said customer data was unaffected. The article states that unauthorized access involved thousands of internal repositories. GitHub did not say in the article that customer repositories or customer data were accessed.\u003c/p\u003e\n\n\u003cp\u003eThe attackers advertised stolen source code on a cybercrime forum. They offered to sell the code for $50,000 and threatened to leak it for free if no buyer came forward. The article characterizes this as an extortion attempt.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-containment\"\u003eResponse and containment\u003c/h2\u003e\n\n\u003cp\u003eGitHub said the breach was detected and contained. The company rotated critical credentials the same day the breach was detected. GitHub said it addressed the most sensitive secrets first.\u003c/p\u003e\n\n\u003cp\u003eThe company also said it would publish a fuller report after completing its investigation. At the time described in the article, GitHub’s investigation was ongoing. The article does not include further details on the timing of the initial compromise or the full list of affected repositories.\u003c/p\u003e\n\n\u003ch2 id=\"key-disclosed-facts\"\u003eKey disclosed facts\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eGitHub is investigating unauthorized access to thousands of internal code repositories.\u003c/li\u003e\n\u003cli\u003eThe incident followed the compromise of an employee’s device through a malicious VS Code extension.\u003c/li\u003e\n\u003cli\u003eTeamPCP advertised stolen source code on a cybercrime forum.\u003c/li\u003e\n\u003cli\u003eThe attackers offered to sell the code for $50,000 and threatened to leak it for free.\u003c/li\u003e\n\u003cli\u003eGitHub said customer data was unaffected.\u003c/li\u003e\n\u003cli\u003eGitHub said the breach was detected and contained.\u003c/li\u003e\n\u003cli\u003eGitHub said the attacker’s claim of around 3,800 stolen repositories was “directionally consistent” with its own findings.\u003c/li\u003e\n\u003cli\u003eGitHub rotated critical credentials the same day the breach was detected, prioritizing the most sensitive secrets.\u003c/li\u003e\n\u003cli\u003eGitHub said it would publish a fuller report once its investigation is complete.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["GitHub said it is investigating unauthorized access to thousands of its internal code repositories after a hacking group compromised an employee's device through a poisoned software extension.","GitHub confirmed the breach on social media after TeamPCP advertised stolen source code on a cybercrime forum.","GitHub said the hack occurred after an employee's device was compromised via a malicious VS Code extension.","GitHub said the breach was detected and contained, and was limited to internal repositories rather than customer data.","GitHub said critical credentials were rotated the same day the breach was detected, with the most sensitive secrets addressed first."],"insights":["TeamPCP’s compromise of GitHub fits the group’s broader pattern described in the article of targeting developer tools and supply chains, including TanStack, Trivy and LiteLLM.","The attackers’ public claim that about 3,800 repositories were stolen was not dismissed by GitHub; the company said it was “directionally consistent” with its own findings.","The breach shows that a malicious VS Code extension was sufficient to compromise an employee device and lead to access to thousands of internal repositories.","GitHub’s same-day rotation of critical credentials, prioritizing the most sensitive secrets first, indicates the company treated exposed credentials as an immediate risk even though it said customer data was unaffected."],"referencedReports":[],"body":"\u003cp\u003eGitHub said it is investigating unauthorized access to thousands of its internal code repositories after a hacking group compromised an employee’s device through a poisoned software extension. The company confirmed the breach on social media after TeamPCP advertised stolen source code on a cybercrime forum. GitHub said customer data was unaffected.\u003c/p\u003e\n\n\u003cp\u003eThe Microsoft-owned platform said the hack occurred through a malicious VS Code extension and was “detected and contained.” GitHub said the incident was limited to internal repositories and that the attacker’s claim of around 3,800 stolen repositories was “directionally consistent” with its own findings. The company said critical credentials were rotated the same day the breach was detected, with the most sensitive secrets addressed first.\u003c/p\u003e\n"},{"n":15,"title":"Webworm Deploys EchoCreep and GraphWorm Backdoors Using Discord and MS Graph API","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/webworm-deploys-echocreep-and-graphworm.html","time":"12:51","priority":"MUST READ","score":92,"tldr":"China-aligned Webworm has expanded its toolkit with two custom backdoors, EchoCreep and GraphWorm, that use Discord and Microsoft Graph API for stealthy command-and-control. The group is shifting from traditional RATs toward proxy tools, VPNs, and legitimate cloud services to better hide operations against government, enterprise, and academic targets.","briefOverview":"\u003cp\u003eCybersecurity researchers reported fresh 2025 activity from Webworm, a China-aligned threat actor that has deployed custom backdoors using Discord and Microsoft Graph API for command-and-control communications. ESET said the group added EchoCreep, which uses Discord for C2, and GraphWorm, which uses Microsoft Graph API for the same purpose. The activity expands Webworm’s toolset as the group moves toward stealthier utilities and custom tools.\u003c/p\u003e\n\n\u003cp\u003eWebworm has been publicly documented since 2022 and has targeted government agencies and enterprises in sectors including IT services, aerospace, and electric power. Its known target geography has included Russia, Georgia, Mongolia, other Asian nations, and more recently European countries such as Belgium, Italy, Serbia, Poland, and Spain. The group has also targeted a local university in South Africa.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Webworm’s use of a GitHub repository impersonating a WordPress fork as a staging ground for malware and tools such as SoftEther VPN. EchoCreep supports file upload, file download, and command execution through cmd.exe, while GraphWorm can create cmd.exe sessions, execute processes, transfer files through Microsoft OneDrive, and stop itself after an operator signal. The initial access path and delivery method for these backdoors are currently unknown.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers have identified fresh 2025 activity from Webworm, a China-aligned threat actor deploying two custom backdoors named EchoCreep and GraphWorm. EchoCreep uses Discord for command-and-control communications, while GraphWorm uses Microsoft Graph API for the same purpose. ESET researcher Eric Howard said Webworm has moved in recent years toward existing and custom proxy tools that are stealthier than full-fledged backdoors.\u003c/p\u003e\n\n\u003cp\u003eWebworm was first publicly documented by Symantec in September 2022 and is assessed to have been active since at least 2022. The group has targeted government agencies and enterprises in IT services, aerospace, and electric power sectors across Russia, Georgia, Mongolia, and several other Asian nations. The article says Webworm overlaps with China-nexus clusters tracked as FishMonger, SixLittleMonkeys, and Space Pirates.\u003c/p\u003e\n\n\u003cp\u003eThe group has historically used remote access trojans including Trochilus RAT, Gh0st RAT, and 9002 RAT, also known as Hydraq and McRat. The discovery of EchoCreep and GraphWorm marks an expansion of Webworm’s arsenal, even as Trochilus and 9002 RAT appear to have been abandoned by the threat actor. Other tools noted in the article include iox, WormFrp, ChainWorm, SmuxProxy, and WormSocket.\u003c/p\u003e\n\n\u003cp\u003eA key part of the reported activity is Webworm’s use of a GitHub repository impersonating a WordPress fork as a staging ground for malware and tools such as SoftEther VPN. ESET said the group’s custom proxy tools can encrypt communications and support chaining across multiple hosts inside and outside a network. The researchers believe the operators use these tools with SoftEther VPN to better cover their tracks and increase stealth.\u003c/p\u003e\n\n\u003cp\u003eEchoCreep supports file upload and download as well as command execution through cmd.exe. GraphWorm is described as more advanced, with capabilities to spawn a cmd.exe session, execute a newly created process, upload and download files to and from Microsoft OneDrive, and stop its execution after receiving an operator signal. Analysis of the Discord channel used by EchoCreep showed the earliest commands were sent on March 21, 2024, with 433 Discord messages sent via the C2 server.\u003c/p\u003e\n\n\u003cp\u003eThe exact delivery method and initial access pathway used by Webworm are unknown. However, the article says the attacker uses open-source utilities such as dirsearch and nuclei to brute-force victim web server files and directories and search for vulnerabilities. Separately, the article notes Cisco Talos research on a BadIIS variant likely sold or shared among multiple Chinese-speaking cybercrime groups under a malware-as-a-service model.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers reported fresh 2025 activity from Webworm, a China-aligned threat actor that has added two custom backdoors to its toolkit. The backdoors are EchoCreep, which uses Discord for command-and-control communications, and GraphWorm, which uses Microsoft Graph API for the same purpose. ESET researcher Eric Howard said Webworm has moved in recent years toward existing and custom proxy tools that are more stealthy than full-fledged backdoors.\u003c/p\u003e\n\n\u003cp\u003eThe activity reflects an expansion of Webworm’s arsenal while the group appears to have moved away from some previously used remote access trojans. The article states that Trochilus and 9002 RAT appear to have been abandoned by the threat actor. Webworm’s newer tooling includes both backdoors and proxy tools designed to support stealthier operations.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-background\"\u003eThreat actor background\u003c/h2\u003e\n\n\u003cp\u003eWebworm was first publicly documented by Symantec in September 2022 and is assessed to have been active since at least 2022. The group has targeted government agencies and enterprises across IT services, aerospace, and electric power sectors. Its targeting has included Russia, Georgia, Mongolia, and several other Asian nations.\u003c/p\u003e\n\n\u003cp\u003eThe article says Webworm overlaps with China-nexus clusters tracked as FishMonger, also known as Aquatic Panda; SixLittleMonkeys; and Space Pirates. SixLittleMonkeys is described as known for deploying Gh0st RAT and a RAT called Mikroceen against entities in Central Asia, Russia, Belarus, and Mongolia.\u003c/p\u003e\n\n\u003ch2 id=\"historical-and-current-tooling\"\u003eHistorical and current tooling\u003c/h2\u003e\n\n\u003cp\u003eWebworm attacks have previously leveraged remote access trojans including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTrochilus RAT\u003c/li\u003e\n\u003cli\u003eGh0st RAT\u003c/li\u003e\n\u003cli\u003e9002 RAT, also known as Hydraq and McRat\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the discovery of EchoCreep and GraphWorm marks an expansion of the group’s arsenal. It also says Trochilus and 9002 RAT appear to have been abandoned by the threat actor.\u003c/p\u003e\n\n\u003cp\u003eOther tools named in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eiox\u003c/li\u003e\n\u003cli\u003eWormFrp\u003c/li\u003e\n\u003cli\u003eChainWorm\u003c/li\u003e\n\u003cli\u003eSmuxProxy\u003c/li\u003e\n\u003cli\u003eWormSocket\u003c/li\u003e\n\u003cli\u003eSoftEther VPN\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eWormFrp has been observed retrieving configurations from a compromised Amazon S3 bucket. ESET said Webworm’s custom proxy tools can encrypt communications and support chaining across multiple hosts both internally and externally to a network. ESET also said it believes the operators use these tools together with SoftEther VPN to better cover their tracks and increase the stealth of their activities.\u003c/p\u003e\n\n\u003ch2 id=\"staging-and-infrastructure\"\u003eStaging and infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Webworm’s use of a GitHub repository impersonating a WordPress fork, listed as github[.]com/anjsdgasdf/WordPress. This repository was used as a staging ground for malware and tools such as SoftEther VPN. The article states that this was done in an effort to blend in and fly under the radar.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that reliance on SoftEther VPN is a tried-and-tested approach adopted by several Chinese hacking groups. In Webworm’s case, SoftEther VPN is described alongside custom proxy tools that support encrypted communications and traffic chaining.\u003c/p\u003e\n\n\u003ch2 id=\"echocreep-capabilities\"\u003eEchoCreep capabilities\u003c/h2\u003e\n\n\u003cp\u003eEchoCreep is one of the two new backdoors attributed to Webworm’s 2025 toolset. It uses Discord for command-and-control communication. The article says EchoCreep supports file upload, file download, and command execution through cmd.exe capabilities.\u003c/p\u003e\n\n\u003cp\u003eAn analysis of the Discord channel used by EchoCreep as command-and-control infrastructure showed that the earliest commands were sent on March 21, 2024. In total, 433 Discord messages were sent via the C2 server.\u003c/p\u003e\n\n\u003ch2 id=\"graphworm-capabilities\"\u003eGraphWorm capabilities\u003c/h2\u003e\n\n\u003cp\u003eGraphWorm is described as a more advanced backdoor than EchoCreep. It uses Microsoft Graph API for command-and-control communication. Its capabilities include spawning a new cmd.exe session and executing a newly created process.\u003c/p\u003e\n\n\u003cp\u003eGraphWorm can also upload and download files to and from Microsoft OneDrive. The article states that it can stop its own execution after receiving a signal from the operators.\u003c/p\u003e\n\n\u003ch2 id=\"targeting-and-affected-parties\"\u003eTargeting and affected parties\u003c/h2\u003e\n\n\u003cp\u003eWebworm has historically targeted government agencies and enterprises in IT services, aerospace, and electric power sectors. The article lists earlier target regions including Russia, Georgia, Mongolia, and several other Asian nations.\u003c/p\u003e\n\n\u003cp\u003eOver the past two years, Webworm has increasingly focused on European countries. The article names governmental organizations in Belgium, Italy, Serbia, Poland, and Spain as targets. It also says the group targeted a local university in South Africa.\u003c/p\u003e\n\n\u003ch2 id=\"initial-access-and-delivery\"\u003eInitial access and delivery\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the exact delivery method for EchoCreep and GraphWorm is unknown. It also says the initial access pathway used by Webworm is presently unknown.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article says Webworm uses open-source utilities such as dirsearch and nuclei. These tools are used to brute-force victim web server files and directories and search for vulnerabilities within.\u003c/p\u003e\n\n\u003ch2 id=\"related-badiis-research-mentioned-in-the-article\"\u003eRelated BadIIS research mentioned in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article also references Cisco Talos research on a BadIIS variant. Talos assessed that the variant is likely sold or shared among multiple Chinese-speaking cybercrime groups under a malware-as-a-service model designed for continuous monetization. The offering is believed to have been under development since at least September 30, 2021.\u003c/p\u003e\n\n\u003cp\u003eThe article says the malware author operates under the alias “lwxat” and has made available supplementary tools. These include service-based installers, droppers, and persistence mechanisms that automate deployment, ensure survivability across IIS server restarts, and sidestep detection.\u003c/p\u003e\n\n\u003cp\u003eCisco Talos researcher Joey Chen said the service offers a dedicated builder tool. According to the article, that builder allows threat actors to generate configuration files, customize payloads, and inject parameters into BadIIS binaries. The listed capabilities include traffic redirection to illicit sites, reverse proxying for search engine crawler manipulation, content hijacking, and backlink injection for malicious search engine optimization fraud.\u003c/p\u003e\n","keyPoints":["Cybersecurity researchers reported fresh 2025 activity from the China-aligned threat actor Webworm, involving custom backdoors that use Discord and Microsoft Graph API for command-and-control communications.","ESET said Webworm added two new backdoors to its toolset in 2025: EchoCreep, which uses Discord for C2 communication, and GraphWorm, which uses Microsoft Graph API for C2 communication.","Webworm has used a GitHub repository impersonating a WordPress fork as a staging ground for malware and tools such as SoftEther VPN.","Over the past two years, Webworm has shifted away from traditional backdoors toward semi-legitimate utilities such as SOCKS proxies and has increasingly focused on European targets, including government organizations in Belgium, Italy, Serbia, Poland, and Spain.","EchoCreep supports file upload, file download, and command execution via cmd.exe, while GraphWorm can create cmd.exe sessions, execute processes, transfer files through Microsoft OneDrive, and stop its own execution on operator command."],"insights":["Webworm’s use of Discord, Microsoft Graph API, GitHub, Microsoft OneDrive, Amazon S3, and SoftEther VPN shows a deliberate reliance on legitimate or widely used services to blend malicious traffic with normal activity.","The earliest EchoCreep Discord C2 commands date back to March 21, 2024, indicating the backdoor was operational well before its reported addition to Webworm’s 2025 toolset.","Webworm’s custom proxy tools support encrypted communications and chaining across multiple internal and external hosts, making network-level tracing and attribution of operator activity more difficult.","The group appears to have abandoned older RATs such as Trochilus and 9002 RAT while expanding into custom backdoors and proxy tooling, reflecting a notable operational shift toward stealthier access methods.","Although the delivery method and initial access path for EchoCreep and GraphWorm are unknown, the article identifies Webworm’s use of dirsearch and nuclei to brute-force web server paths and look for vulnerabilities as a concrete hunting lead."],"referencedReports":[{"title":"Webworm: New burrowing techniques","url":"https://www.welivesecurity.com/en/eset-research/webworm-new-burrowing-techniques/","publisher":"ESET","context":"The article cites ESET researcher Eric Howard and ESET’s analysis describing Webworm’s 2025 addition of EchoCreep and GraphWorm and its shift toward stealthier proxy tools.","category":"","primary":false},{"title":"From PDB strings to MaaS: Tracking a commodity BadIIS ecosystem","url":"https://blog.talosintelligence.com/from-pdb-strings-to-maas-tracking-a-commodity-badiis-ecosystem/","publisher":"Cisco Talos","context":"The article references Cisco Talos research on a BadIIS variant likely sold or shared among multiple Chinese-speaking cybercrime groups under a malware-as-a-service model.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers reported fresh 2025 activity from Webworm, a China-aligned threat actor that has deployed custom backdoors using Discord and Microsoft Graph API for command-and-control communications. ESET said the group added EchoCreep, which uses Discord for C2, and GraphWorm, which uses Microsoft Graph API for the same purpose. The activity expands Webworm’s toolset as the group moves toward stealthier utilities and custom tools.\u003c/p\u003e\n\n\u003cp\u003eWebworm has been publicly documented since 2022 and has targeted government agencies and enterprises in sectors including IT services, aerospace, and electric power. Its known target geography has included Russia, Georgia, Mongolia, other Asian nations, and more recently European countries such as Belgium, Italy, Serbia, Poland, and Spain. The group has also targeted a local university in South Africa.\u003c/p\u003e\n\n\u003cp\u003eThe article describes Webworm’s use of a GitHub repository impersonating a WordPress fork as a staging ground for malware and tools such as SoftEther VPN. EchoCreep supports file upload, file download, and command execution through cmd.exe, while GraphWorm can create cmd.exe sessions, execute processes, transfer files through Microsoft OneDrive, and stop itself after an operator signal. The initial access path and delivery method for these backdoors are currently unknown.\u003c/p\u003e\n"},{"n":10,"title":"7-Eleven confirms breach after ShinyHunters claims","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/7-eleven-reports-data-breach-shinyhunters","time":"16:05","priority":"MUST READ","score":91,"tldr":"7-Eleven confirmed hackers accessed systems storing franchisee documents, exposing names, addresses and Social Security numbers, after ShinyHunters claimed it stole company data from Salesforce. The total number of affected people has not been disclosed.","briefOverview":"\u003cp\u003e7-Eleven confirmed that hackers breached a system used to store documents related to franchises. The company reported the incident to state regulators in Maine, Vermont and Massachusetts this week. It did not say how many people were impacted in total.\u003c/p\u003e\n\n\u003cp\u003eThe breach notification letters say 7-Eleven discovered the breach on April 8 and later determined that cybercriminals gained access to certain 7-Eleven systems used to store franchisee documents. The stolen information includes names, addresses and Social Security numbers. The company did not respond to requests for comment about what other information may have been taken.\u003c/p\u003e\n\n\u003cp\u003eThe notifications came after ShinyHunters claimed in late April that it stole information from 7-Eleven held on Salesforce. The article says 7-Eleven was listed alongside dozens of other companies attacked by ShinyHunters last month. The FBI recently released guidance urging victims of the group not to pay a ransom and to contact the FBI immediately.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003e7-Eleven confirmed a data breach involving systems used to store documents related to franchises. The company reported the incident to state regulators in Maine, Vermont and Massachusetts this week. The filings did not disclose the total number of people impacted.\u003c/p\u003e\n\n\u003cp\u003eAccording to the breach notification letters, 7-Eleven discovered the breach on April 8. After investigating, the company determined that cybercriminals accessed certain 7-Eleven systems used to store franchisee documents. The exposed information includes names, addresses and Social Security numbers.\u003c/p\u003e\n\n\u003cp\u003eThe company did not respond to requests for comment about whether any other information was taken. 7-Eleven is owned by Japanese retail company Seven \u0026amp; I Holdings. The article says the company has about 86,000 stores in 19 countries, with almost 10,000 U.S. stores operating as franchises.\u003c/p\u003e\n\n\u003cp\u003eThe breach notifications followed claims by the ShinyHunters cybercriminal organization that it stole troves of information from 7-Eleven held on Salesforce in late April. The company was listed alongside dozens of other companies attacked by ShinyHunters last month. The article describes ShinyHunters as repeatedly targeting data storage tools to steal large amounts of data from high-profile companies.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that ShinyHunters recently caused a nationwide scandal with an attack on educational software giant Instructure. That attack impacted thousands of universities and K-12 schools across the U.S. and prompted the FBI to release guidance urging victims of the group not to pay a ransom. The FBI also urged any organization impacted by a ShinyHunters attack to contact the FBI immediately.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003e7-Eleven confirmed that hackers breached a system used to store documents related to franchises. The company reported the data breach to state regulators in Maine, Vermont and Massachusetts this week. The article states that 7-Eleven did not say how many people were impacted in total.\u003c/p\u003e\n\n\u003ch2 id=\"discovery-and-affected-systems\"\u003eDiscovery and affected systems\u003c/h2\u003e\n\n\u003cp\u003eThe breach notification letters say 7-Eleven discovered the breach on April 8. Following an investigation, the company determined that cybercriminals gained access to certain 7-Eleven systems used to store franchisee documents.\u003c/p\u003e\n\n\u003cp\u003eThe article does not provide additional technical details about how the systems were accessed. It also does not state whether the compromised systems were directly tied to Salesforce, only that ShinyHunters later claimed it stole 7-Eleven information held on Salesforce.\u003c/p\u003e\n\n\u003ch2 id=\"data-exposed\"\u003eData exposed\u003c/h2\u003e\n\n\u003cp\u003eThe information stolen includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNames\u003c/li\u003e\n\u003cli\u003eAddresses\u003c/li\u003e\n\u003cli\u003eSocial Security numbers\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe company did not respond to requests for comment about what other information may have been taken. No total victim count was disclosed in the article.\u003c/p\u003e\n\n\u003ch2 id=\"company-context\"\u003eCompany context\u003c/h2\u003e\n\n\u003cp\u003e7-Eleven is owned by Japanese retail company Seven \u0026amp; I Holdings. The article says 7-Eleven has about 86,000 stores in 19 countries. Almost 10,000 of the company’s U.S. stores are franchises.\u003c/p\u003e\n\n\u003cp\u003eThis context is relevant because the breached systems are described as being used to store franchisee documents. The article does not specify whether the affected individuals are franchisees, employees, applicants, or other people whose information appeared in franchise-related documents.\u003c/p\u003e\n\n\u003ch2 id=\"shinyhunters-claims\"\u003eShinyHunters claims\u003c/h2\u003e\n\n\u003cp\u003eThe breach notifications came after the ShinyHunters cybercriminal organization claimed in late April that it stole troves of information from 7-Eleven held on Salesforce. The article says 7-Eleven was listed alongside dozens of other companies attacked by ShinyHunters last month.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters is described in the article as repeatedly targeting data storage tools to steal large amounts of data from high-profile companies. The article also cites the FBI’s description of ShinyHunters as a cybercriminal group specializing in large-scale data breaches and extortion.\u003c/p\u003e\n\n\u003ch2 id=\"related-shinyhunters-activity\"\u003eRelated ShinyHunters activity\u003c/h2\u003e\n\n\u003cp\u003eThe article says ShinyHunters recently caused a nationwide scandal with an attack on educational software giant Instructure. That attack impacted thousands of universities and K-12 schools across the U.S.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the Instructure incident prompted the FBI to release a guidance document last week urging victims of the group not to pay a ransom. The FBI warned that ShinyHunters actors’ access to sensitive data could allow them to sell stolen data to other cybercriminals or reuse stolen education-platform data to impersonate school faculty, IT support, financial aid offices or others in future attacks.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-guidance\"\u003eResponse and guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the FBI urged any organization impacted by a ShinyHunters attack to contact the FBI immediately. The FBI also urged victims of the group not to pay a ransom.\u003c/p\u003e\n\n\u003cp\u003e7-Eleven’s reported response in the article consisted of notifying state regulators in Maine, Vermont and Massachusetts. The article does not describe any other remediation steps, customer notifications beyond the cited breach letters, law enforcement coordination by 7-Eleven, or security changes made by the company.\u003c/p\u003e\n","keyPoints":["7-Eleven said hackers breached a system used to store documents related to franchises.","The company reported the data breach to state regulators in Maine, Vermont and Massachusetts, but did not say how many people were impacted in total.","The stolen information includes names, addresses and Social Security numbers.","The breach notifications followed claims by the ShinyHunters cybercriminal organization that it stole information from 7-Eleven held on Salesforce in late April.","The FBI recently urged organizations impacted by ShinyHunters attacks to contact the FBI immediately and not pay a ransom."],"insights":["The breach appears to involve franchisee-related document systems rather than general customer-facing store operations, making franchise operators a central affected population based on the notifications described.","The timing links the confirmed breach to ShinyHunters’ broader campaign against companies using data storage tools, including Salesforce, rather than an isolated claim against 7-Eleven alone.","The FBI’s recent guidance is directly actionable for organizations contacted by ShinyHunters: report the incident to the FBI and do not pay a ransom.","The exposed Social Security numbers make the incident more sensitive than a basic contact-information leak because the article states names, addresses and SSNs were stolen."],"referencedReports":[{"title":"FBI guidance document on ShinyHunters attacks","url":"https://www.ic3.gov/PSA/2026/PSA260515","publisher":"FBI","context":"The article says the FBI released this guidance document urging victims of ShinyHunters not to pay a ransom and to contact the FBI immediately.","category":"","primary":false}],"body":"\u003cp\u003e7-Eleven confirmed that hackers breached a system used to store documents related to franchises. The company reported the incident to state regulators in Maine, Vermont and Massachusetts this week. It did not say how many people were impacted in total.\u003c/p\u003e\n\n\u003cp\u003eThe breach notification letters say 7-Eleven discovered the breach on April 8 and later determined that cybercriminals gained access to certain 7-Eleven systems used to store franchisee documents. The stolen information includes names, addresses and Social Security numbers. The company did not respond to requests for comment about what other information may have been taken.\u003c/p\u003e\n\n\u003cp\u003eThe notifications came after ShinyHunters claimed in late April that it stole information from 7-Eleven held on Salesforce. The article says 7-Eleven was listed alongside dozens of other companies attacked by ShinyHunters last month. The FBI recently released guidance urging victims of the group not to pay a ransom and to contact the FBI immediately.\u003c/p\u003e\n"},{"n":18,"title":"Grafana GitHub Breach Exposes Source Code via TanStack npm Attack","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/grafana-github-breach-exposes-source.html","time":"05:12","priority":"SHOULD READ","score":88,"tldr":"Grafana Labs says a TanStack npm supply-chain attack exposed its GitHub environment, including source code and some internal business information, but found no evidence that customer production systems or Grafana Cloud were compromised. The company refused an extortion demand and is rotating tokens, auditing commits, and strengthening GitHub security.","briefOverview":"\u003cp\u003eGrafana Labs said on May 19, 2026, that its investigation into a recent breach found no evidence that customer production systems or operations were compromised. The company said the scope of the incident was limited to its GitHub environment. That environment included public and private source code as well as internal GitHub repositories.\u003c/p\u003e\n\n\u003cp\u003eGrafana said the downloaded content included repositories used by some teams to collaborate on and store internal operational information and other business details. The company said this included business contact names and email addresses exchanged in a professional relationship context. It emphasized that the information was not pulled from or processed through production systems or the Grafana Cloud platform.\u003c/p\u003e\n\n\u003cp\u003eThe company attributed the breach to the TanStack npm supply chain attack orchestrated by TeamPCP, which also hit OpenAI and Mistral AI. Grafana detected the activity on May 11, rotated many GitHub workflow tokens, and later found that one missed token allowed attackers to access its repositories. Grafana received an extortion demand on May 16 but declined to pay, and it has since rotated automation tokens, enhanced monitoring, audited commits, and strengthened GitHub security.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGrafana Labs said on May 19, 2026, that an investigation into its recent breach found no evidence of compromise affecting customer production systems or operations. The company said the incident was confined to its GitHub environment. That environment included public and private source code and internal GitHub repositories.\u003c/p\u003e\n\n\u003cp\u003eThe downloaded content included more than source code, according to Grafana. Some repositories used by Grafana Labs teams to collaborate on and store internal operational information were also accessed. The company said the material included business contact names and email addresses exchanged in a professional relationship context.\u003c/p\u003e\n\n\u003cp\u003eGrafana stated that the affected information was not pulled from or processed through production systems or the Grafana Cloud platform. This distinction was central to the company’s assessment of impact. The article does not describe compromise of customer production environments.\u003c/p\u003e\n\n\u003cp\u003eGrafana attributed the breach to the TanStack npm supply chain attack orchestrated by TeamPCP. The article says the same campaign also hit OpenAI and Mistral AI. Grafana detected the activity on May 11, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe company said it quickly analyzed the activity and rotated a significant number of GitHub workflow tokens. However, it later determined that a specific GitHub workflow originally deemed not impacted had in fact been compromised. Grafana said a missed token allowed the attackers to gain access to its GitHub repositories.\u003c/p\u003e\n\n\u003cp\u003eGrafana said it received an extortion demand from an unnamed threat actor on May 16, 2026, but chose not to pay the ransom. The company said it made that decision because there was no guarantee the stolen data would be deleted and because payment could encourage future campaigns. Grafana has since rotated automation tokens, implemented enhanced monitoring, audited commits for malicious activity, and worked to improve its GitHub security posture.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGrafana Labs said on May 19, 2026, that its investigation into a recent breach found no evidence that customer production systems or operations were compromised. The company described the scope of the incident as limited to the Grafana Labs GitHub environment. That environment included public and private source code and internal GitHub repositories.\u003c/p\u003e\n\n\u003ch2 id=\"data-and-systems-involved\"\u003eData and Systems Involved\u003c/h2\u003e\n\n\u003cp\u003eGrafana said the downloaded content included source code and GitHub repositories used by some Grafana Labs teams for collaboration. Those repositories also stored internal operational information and other business details. The company said the exposed material included business contact names and email addresses exchanged in a professional relationship context.\u003c/p\u003e\n\n\u003cp\u003eGrafana emphasized that this information was not pulled from or processed through production systems or the Grafana Cloud platform. The article does not report any evidence that customer production systems, customer operations, or Grafana Cloud were compromised.\u003c/p\u003e\n\n\u003ch2 id=\"origin-of-the-breach\"\u003eOrigin of the Breach\u003c/h2\u003e\n\n\u003cp\u003eGrafana said the breach originated from the TanStack npm supply chain attack. The article identifies TeamPCP as the actor that orchestrated that attack. It also says the same attack affected OpenAI and Mistral AI.\u003c/p\u003e\n\n\u003cp\u003eGrafana detected the activity on May 11, 2026. After the initial assessment, the company performed analysis and rotated a significant number of GitHub workflow tokens. However, Grafana later found that a specific GitHub workflow it had originally deemed not impacted had actually been compromised.\u003c/p\u003e\n\n\u003ch2 id=\"token-exposure-and-repository-access\"\u003eToken Exposure and Repository Access\u003c/h2\u003e\n\n\u003cp\u003eGrafana said a missed token allowed the attackers to gain access to its GitHub repositories. A subsequent review confirmed that the GitHub workflow initially considered unaffected had been compromised. This finding expanded the company’s understanding of how the attackers accessed its GitHub environment.\u003c/p\u003e\n\n\u003ch2 id=\"extortion-demand\"\u003eExtortion Demand\u003c/h2\u003e\n\n\u003cp\u003eGrafana received an extortion demand from an unnamed threat actor on May 16, 2026. The company decided not to pay the ransom. Grafana said it made this decision because there was no guarantee the stolen data would actually be deleted and because paying could serve as a catalyst for future campaigns.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that a data extortion crew named CoinbaseCartel listed Grafana Labs on its dark web site on May 15, 2026. The Hacker News said it contacted Grafana for comment and would update the story if it received a response.\u003c/p\u003e\n\n\u003ch2 id=\"response-measures\"\u003eResponse Measures\u003c/h2\u003e\n\n\u003cp\u003eGrafana said it has taken several steps since the incident, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRotating automation tokens.\u003c/li\u003e\n\u003cli\u003eImplementing enhanced monitoring.\u003c/li\u003e\n\u003cli\u003eAuditing all commits for signs of malicious activity.\u003c/li\u003e\n\u003cli\u003eStrengthening its overall GitHub security posture.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese steps were described as part of the company’s response after confirming repository access through a compromised workflow and missed token.\u003c/p\u003e\n\n\u003ch2 id=\"related-github-development\"\u003eRelated GitHub Development\u003c/h2\u003e\n\n\u003cp\u003eThe article says the development comes as GitHub is investigating unauthorized access to its internal repositories. According to the article, TeamPCP listed GitHub source code and internal organizations for sale on a cybercrime forum. The article does not state that this GitHub investigation is directly connected to the Grafana incident beyond appearing in the same broader context of TeamPCP activity.\u003c/p\u003e\n","keyPoints":["Grafana Labs said its investigation found no evidence that customer production systems or operations were compromised.","The incident was limited to the Grafana Labs GitHub environment, including public and private source code and internal GitHub repositories.","Grafana Labs said the downloaded content included internal operational information and business contact names and email addresses exchanged in a professional relationship context.","Grafana Labs said the breach originated from the TanStack npm supply chain attack and was detected on May 11, 2026.","Grafana Labs received an extortion demand on May 16, 2026, but chose not to pay the ransom."],"insights":["Grafana Labs’ initial token-rotation response was incomplete because a GitHub workflow first judged not impacted was later confirmed to have been compromised.","The incident shows that GitHub repositories used for internal collaboration can expose operational and business relationship data even when production systems are not affected.","Grafana Labs explicitly cited the lack of guarantee that stolen data would be deleted as a reason for refusing the extortion demand.","Grafana Labs responded by auditing all commits for malicious activity, indicating that source-code integrity was a key concern after the repository access."],"referencedReports":[],"body":"\u003cp\u003eGrafana Labs said on May 19, 2026, that its investigation into a recent breach found no evidence that customer production systems or operations were compromised. The company said the scope of the incident was limited to its GitHub environment. That environment included public and private source code as well as internal GitHub repositories.\u003c/p\u003e\n\n\u003cp\u003eGrafana said the downloaded content included repositories used by some teams to collaborate on and store internal operational information and other business details. The company said this included business contact names and email addresses exchanged in a professional relationship context. It emphasized that the information was not pulled from or processed through production systems or the Grafana Cloud platform.\u003c/p\u003e\n\n\u003cp\u003eThe company attributed the breach to the TanStack npm supply chain attack orchestrated by TeamPCP, which also hit OpenAI and Mistral AI. Grafana detected the activity on May 11, rotated many GitHub workflow tokens, and later found that one missed token allowed attackers to access its repositories. Grafana received an extortion demand on May 16 but declined to pay, and it has since rotated automation tokens, enhanced monitoring, audited commits, and strengthened GitHub security.\u003c/p\u003e\n"},{"n":4,"title":"Microsoft shares mitigation for YellowKey Windows zero-day","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-shares-mitigation-for-yellowkey-windows-zero-day/","time":"07:31","priority":"SHOULD READ","score":86,"tldr":"Microsoft is tracking the publicly disclosed YellowKey BitLocker bypass zero-day as CVE-2026-45585 and has issued temporary mitigations until a patch is available. Admins should disable the autofstx.exe WinRE startup behavior and move BitLocker from TPM-only to TPM+PIN to help block attacks.","briefOverview":"\u003cp\u003eMicrosoft has shared mitigations for YellowKey, a recently disclosed Windows BitLocker zero-day vulnerability that can grant access to protected drives. The company is tracking the flaw as CVE-2026-45585 and said the public proof of concept violated coordinated vulnerability best practices. Microsoft issued the CVE to provide mitigation guidance until a security update is available.\u003c/p\u003e\n\n\u003cp\u003eThe flaw was disclosed by an anonymous researcher known as Nightmare Eclipse, who described it as a backdoor and published proof-of-concept exploit details. According to the researcher, exploitation involves placing specially crafted FsTx files on a USB drive or EFI partition, rebooting into WinRE, and holding the CTRL key to trigger a shell with unrestricted access to the BitLocker-protected storage volume. Microsoft’s recommended mitigations include preventing autofstx.exe from automatically starting in WinRE and reestablishing BitLocker trust for WinRE.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also advised customers to change already encrypted BitLocker devices from TPM-only mode to TPM+PIN mode. This requires a pre-boot PIN to decrypt the drive at startup and should block YellowKey attacks. For devices not yet encrypted, admins can require additional authentication at startup through Microsoft Intune or Group Policies and configure TPM startup PIN settings to require a startup PIN with TPM.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft has shared mitigation guidance for YellowKey, a recently disclosed Windows BitLocker zero-day vulnerability that grants access to protected drives. The company is tracking the issue as CVE-2026-45585 and described it as a Windows security feature bypass vulnerability. Microsoft said the proof of concept was made public in violation of coordinated vulnerability best practices.\u003c/p\u003e\n\n\u003cp\u003eYellowKey was disclosed last week by an anonymous security researcher known as Nightmare Eclipse. The researcher described the issue as a backdoor and published a proof-of-concept exploit. Nightmare Eclipse said exploitation requires placing specially crafted FsTx files on a USB drive or EFI partition, rebooting into WinRE, and holding the CTRL key to trigger a shell with unrestricted access to the BitLocker-protected storage volume.\u003c/p\u003e\n\n\u003cp\u003eThe article places YellowKey in the context of several other recent disclosures by Nightmare Eclipse. Last month, the researcher disclosed BlueHammer, tracked as CVE-2026-33825, and RedSun, which has no identifier, both described as local privilege escalation zero-days that are now being exploited in attacks. The researcher also leaked GreenPlasma, a privilege-escalation issue that can provide a SYSTEM shell, and UnDefend, a zero-day that standard users can use to block Microsoft Defender definition updates.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft recommended removing the autofstx.exe entry from the Session Manager’s BootExecute REG_MULTI_SZ value, then reestablishing BitLocker trust for WinRE using the procedure detailed under the mitigation guidance referenced in the advisory. Will Dormann, principal vulnerability analyst at Tharros, explained that this prevents the FsTx Auto Recovery Utility from automatically starting when the WinRE image launches. He said this change stops the Transactional NTFS replaying that deletes winpeshl.ini.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also advised customers to configure BitLocker on already encrypted devices from TPM-only mode to TPM+PIN mode. The article says this can be done through PowerShell, the command line, or the control panel, and requires a pre-boot PIN to decrypt the drive at startup. For devices that are not yet encrypted, admins can use Microsoft Intune or Group Policies to enable “Require additional authentication at startup” and set “Configure TPM startup PIN” to “Require startup PIN with TPM.”\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft has shared mitigations for YellowKey, a recently disclosed Windows BitLocker zero-day vulnerability that grants access to protected drives. The company is tracking the flaw as CVE-2026-45585 and describes it as a Windows security feature bypass vulnerability. Microsoft said the proof of concept for the vulnerability was made public in violation of coordinated vulnerability best practices.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft issued the CVE to provide mitigation guidance that customers can implement until a security update is available. The article focuses on configuration-based defenses, including changes to WinRE behavior and BitLocker authentication settings.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-researcher-context\"\u003eDisclosure and Researcher Context\u003c/h2\u003e\n\n\u003cp\u003eYellowKey was disclosed by an anonymous security researcher known as Nightmare Eclipse. The researcher described the flaw as a backdoor and published a proof-of-concept exploit.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the exact circumstances behind the researcher’s recent series of exploit leaks remain unclear. However, Nightmare Eclipse previously said the disclosures are a protest against how Microsoft’s Security Response Center handled the disclosure process for other security flaws they had reported.\u003c/p\u003e\n\n\u003cp\u003eThe article also links YellowKey to other recent disclosures by the same researcher:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBlueHammer, tracked as CVE-2026-33825, described as a local privilege escalation zero-day.\u003c/li\u003e\n\u003cli\u003eRedSun, which has no identifier, also described as a local privilege escalation zero-day.\u003c/li\u003e\n\u003cli\u003eGreenPlasma, described as a zero-day privilege-escalation issue that attackers can abuse to obtain a SYSTEM shell.\u003c/li\u003e\n\u003cli\u003eUnDefend, described as a zero-day that attackers with standard user permissions can exploit to block Microsoft Defender definition updates.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that BlueHammer and RedSun are now being exploited in attacks.\u003c/p\u003e\n\n\u003ch2 id=\"technical-exploitation-details-reported-in-the-article\"\u003eTechnical Exploitation Details Reported in the Article\u003c/h2\u003e\n\n\u003cp\u003eNightmare Eclipse said YellowKey exploitation involves placing specially crafted FsTx files on a USB drive or EFI partition. The attacker then reboots into WinRE and holds down the CTRL key to trigger a shell.\u003c/p\u003e\n\n\u003cp\u003eThe shell is described as having unrestricted access to the BitLocker-protected storage volume. The article does not provide additional exploit code details beyond the summarized exploitation path and the role of the published proof of concept.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-mitigation-guidance\"\u003eMicrosoft’s Mitigation Guidance\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft recommended removing the autofstx.exe entry from the Session Manager’s BootExecute REG_MULTI_SZ value. The company also recommended reestablishing BitLocker trust for WinRE by following the procedure detailed under the “Mitigations” section in the referenced advisory.\u003c/p\u003e\n\n\u003cp\u003eWill Dormann, principal vulnerability analyst at Tharros, explained the significance of this mitigation. He said it prevents the FsTx Auto Recovery Utility, autofstx.exe, from automatically starting when the WinRE image launches. According to Dormann, this change stops the Transactional NTFS replaying that deletes winpeshl.ini.\u003c/p\u003e\n\n\u003ch2 id=\"bitlocker-configuration-changes\"\u003eBitLocker Configuration Changes\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft also advised customers to configure BitLocker on already encrypted devices from TPM-only mode to TPM+PIN mode. The article says this can be done through PowerShell, the command line, or the control panel.\u003c/p\u003e\n\n\u003cp\u003eThis configuration requires a pre-boot PIN to decrypt the drive at startup. Microsoft said this should block YellowKey attacks.\u003c/p\u003e\n\n\u003cp\u003eFor devices that are not yet encrypted, admins can enable “Require additional authentication at startup” using Microsoft Intune or Group Policies. The article says admins should also ensure that “Configure TPM startup PIN” is set to “Require startup PIN with TPM.”\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article states that YellowKey grants access to protected drives and that the exploitation path can result in a shell with unrestricted access to a BitLocker-protected storage volume. Microsoft’s response is currently mitigation guidance rather than a security update.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said it issued the CVE to help customers protect against the vulnerability until a security update is made available. The article does not state that YellowKey itself is being exploited in the wild, but it says Microsoft shared mitigation measures to defend against potential attacks exploiting it in the wild.\u003c/p\u003e\n","keyPoints":["Microsoft is tracking the YellowKey Windows BitLocker zero-day vulnerability as CVE-2026-45585 and has shared mitigation guidance until a security update is available.","YellowKey was disclosed by an anonymous security researcher known as Nightmare Eclipse, who described it as a backdoor and published a proof-of-concept exploit.","Nightmare Eclipse said the exploit involves placing specially crafted FsTx files on a USB drive or EFI partition, rebooting into WinRE, and triggering a shell with unrestricted access to the BitLocker-protected storage volume by holding down the CTRL key.","Microsoft recommended mitigating YellowKey attacks by removing the autofstx.exe entry from the Session Manager's BootExecute REG_MULTI_SZ value and reestablishing BitLocker trust for WinRE.","Microsoft also advised customers to configure BitLocker from TPM-only mode to TPM+PIN mode so a pre-boot PIN is required to decrypt the drive at startup."],"insights":["The mitigation focuses on preventing autofstx.exe from automatically starting in WinRE, because that stops the Transactional NTFS replay behavior that deletes winpeshl.ini.","Switching BitLocker from TPM-only to TPM+PIN is presented as a practical way to block YellowKey attacks because it adds a required pre-boot PIN before drive decryption.","YellowKey is part of a broader set of zero-day disclosures by the same researcher, and the article notes that two previously leaked flaws, BlueHammer and RedSun, are already being exploited in attacks.","Microsoft issued a CVE and mitigation guidance before releasing a security update, indicating organizations need to apply configuration-based defenses rather than wait for a patch."],"referencedReports":[{"title":"CVE-2026-45585 advisory","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-45585","publisher":"Microsoft Security Response Center","context":"The article says Microsoft issued this advisory to provide mitigation guidance for the YellowKey BitLocker security feature bypass until a security update is available.","category":"","primary":false},{"title":"CVE-2026-33825 advisory","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-45585","publisher":"Microsoft Security Response Center","context":"The article says Microsoft recommended reestablishing BitLocker trust for WinRE by following the procedure detailed under the Mitigations section of this advisory.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft has shared mitigations for YellowKey, a recently disclosed Windows BitLocker zero-day vulnerability that can grant access to protected drives. The company is tracking the flaw as CVE-2026-45585 and said the public proof of concept violated coordinated vulnerability best practices. Microsoft issued the CVE to provide mitigation guidance until a security update is available.\u003c/p\u003e\n\n\u003cp\u003eThe flaw was disclosed by an anonymous researcher known as Nightmare Eclipse, who described it as a backdoor and published proof-of-concept exploit details. According to the researcher, exploitation involves placing specially crafted FsTx files on a USB drive or EFI partition, rebooting into WinRE, and holding the CTRL key to trigger a shell with unrestricted access to the BitLocker-protected storage volume. Microsoft’s recommended mitigations include preventing autofstx.exe from automatically starting in WinRE and reestablishing BitLocker trust for WinRE.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also advised customers to change already encrypted BitLocker devices from TPM-only mode to TPM+PIN mode. This requires a pre-boot PIN to decrypt the drive at startup and should block YellowKey attacks. For devices not yet encrypted, admins can require additional authentication at startup through Microsoft Intune or Group Policies and configure TPM startup PIN settings to require a startup PIN with TPM.\u003c/p\u003e\n"},{"n":24,"title":"Tracking TamperedChef Clusters via Certificate and Code Reuse","source":"unit42.paloaltonetworks.com","sourceColorIdx":0,"link":"https://unit42.paloaltonetworks.com/tracking-tampered-chef-clusters/","time":"10:00","priority":"SHOULD READ","score":86,"tldr":"Unit 42 found that TamperedChef-style malware is a large-scale malvertising ecosystem, not a single actor, using legitimate-looking signed productivity apps that stay dormant before delivering stealers, RATs, adware or proxy tools. The key takeaway is that these threats should be treated as malware, not mere PUPs or adware, and tracked through certificate, code, infrastructure and advertising reuse.","briefOverview":"\u003cp\u003eUnit 42 reports on TamperedChef-style malware campaigns involving trojanized productivity applications such as PDF editors, calendars, ZIP tools, GIF makers and file converters. The activity is distributed largely through malicious advertisements and legitimate-looking websites, and Unit 42 tracks three distinct clusters: CL-CRI-1089, CL-UNK-1090 and CL-UNK-1110. Across these clusters, Unit 42 identified more than 4,000 samples across 100 unique variants.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that these applications should not be treated as simple adware or potentially unwanted programs because they can execute commands remotely, exfiltrate credentials and deploy malware without consent. Samples often provide the promised functionality, use code signing, appear credible to users and may remain dormant for weeks to months before activating. Once activated, they can retrieve additional payloads such as information stealers, proxy tooling, remote access Trojans, browser hijackers or adware.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 used code-signing certificate reuse, code reuse, infrastructure overlaps, ad transparency data and public corporate records to map the campaigns. CL-CRI-1089 was linked to 34 code-signing entities and more than 3,300 samples, while CL-UNK-1090 was linked to 39 Israeli corporations for certificate generation and approximately 750 samples. The article recommends user education, EDR/XDR coverage, enterprise browsers, device hardening, removal of malicious files and persistence mechanisms, malware scanning, token revocation and credential resets for impacted users.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eUnit 42 analyzed a broad set of TamperedChef-style malware campaigns that masquerade as productivity software, including PDF editors, calendars, ZIP file extractors, GIF image makers and file conversion tools. These applications are commonly distributed through malicious advertisements, sponsored results and search engine marketing techniques. The article states that since early 2024, Unit 42 observed a sharp increase in information-stealer-style incidents originating from software mimicking legitimate productivity tools.\u003c/p\u003e\n\n\u003cp\u003eThe research tracks three major clusters of activity: CL-CRI-1089, CL-UNK-1090 and CL-UNK-1110. Unit 42 identified more than 4,000 samples across 100 unique variants, and observed approximately 12,000 unique instances of fake productivity software across its customer base. The activity was described as global, with no significant geographic or sector targeting within the Managed Threat Hunting customer base, although Israel and the U.S. saw slightly higher targeting than other countries.\u003c/p\u003e\
