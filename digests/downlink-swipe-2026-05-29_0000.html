<script>
window.__DL_ARTICLES = [{"n":3,"title":"Charter Communications data breach affects 4.9 million accounts","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/charter-communications-data-breach-affects-49-million-accounts/","time":"08:29","priority":"MUST READ","score":95,"tldr":"ShinyHunters breached Charter Communications via voice phishing, stealing personal information from 4.9 million accounts from its Salesforce instance and leaking the data after Charter refused to pay the ransom.","briefOverview":"\u003cp\u003eThe ShinyHunters extortion gang breached Charter Communications in early April 2026, using a voice phishing attack to compromise an employee\u0026rsquo;s Microsoft Entra account and then steal data from the company\u0026rsquo;s Salesforce instance. The company confirmed the incident earlier this week, stating that while an attacker accessed systems, no sensitive personal information (PI) or customer proprietary network information (CPNI) was exfiltrated.\u003c/p\u003e\n\n\u003cp\u003eAfter Charter refused to pay the demanded ransom, ShinyHunters leaked the stolen documents on their dark web site. Have I Been Pwned later analyzed the leaked data and confirmed that 4.9 million unique accounts were affected, exposing names, email addresses, phone numbers, physical addresses, and—for a subset of about 85,000 records—job titles from an internal employee directory.\u003c/p\u003e\n\n\u003cp\u003eThe FBI has advised ShinyHunters victims not to pay ransoms, warning that payment does not prevent further sale of stolen data or additional extortion attempts. The attack is part of a wider campaign in which ShinyHunters has breached hundreds of companies by targeting Salesforce customers over the past year.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCharter Communications, the parent company of the Spectrum brand, suffered a data breach affecting 4.9 million accounts after a cyberattack in early April 2026. The ShinyHunters extortion gang claimed responsibility, stating they gained initial access through a voice phishing (vishing) attack that compromised an employee’s Microsoft Entra account on April 1.\u003c/p\u003e\n\n\u003cp\u003eUsing that foothold, the threat actors allegedly stole 42 million records from Charter’s Salesforce instance. ShinyHunters told BleepingComputer that the exfiltrated data included consumer and business customer names, email addresses, physical addresses, phone numbers, phone types, plan information, support ticket data, and some CPNI data. Charter’s spokesperson, however, disputed the theft of CPNI, asserting that “only sales tools used to manage current, past and prospective Business customers were impacted” and that “no CPNI or sensitive PI was released.”\u003c/p\u003e\n\n\u003cp\u003eAfter Charter refused to pay the ransom demanded for the return and destruction of the stolen data, the gang published the exfiltrated documents on its dark web leak site. Have I Been Pwned subsequently analyzed the dump and verified that 4.9 million unique email addresses were exposed, along with names, phone numbers, and physical addresses. A subset of approximately 85,000 records originating from an internal employee directory also included job titles.\u003c/p\u003e\n\n\u003cp\u003eThe FBI recently issued an advisory specifically urging ShinyHunters victims not to meet ransom demands. The bureau emphasized that paying does not guarantee that the threat actor will not sell the stolen data to other criminals or launch further extortion attempts.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters has been systematically targeting Salesforce customers for more than a year, breaching hundreds of organizations worldwide and claiming the theft of billions of records through Salesforce Aura data theft attacks and a Salesloft Drift campaign. Charter was also among a group of U.S. telecoms previously compromised by Salt Typhoon, a separate China-linked threat actor.\u003c/p\u003e\n\n\u003cp\u003eCharter confirmed the breach earlier this week and stated that it had alerted authorities. The company, which serves over 32 million customers and employs more than 92,000 people, maintains that no sensitive personal information was exfiltrated, while the leaked dataset suggests otherwise for a significant number of accounts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe U.S. telecommunications provider Charter Communications—which operates under the Spectrum brand and serves more than 32 million customers across 41 states—suffered a data breach in early April 2026. The ShinyHunters extortion group claimed responsibility, and the data breach notification service Have I Been Pwned (HIBP) later confirmed that the incident exposed personal information tied to 4.9 million accounts.\u003c/p\u003e\n\n\u003ch2 id=\"incident-details\"\u003eIncident Details\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eInitial Access\u003c/strong\u003e: ShinyHunters told BleepingComputer that they breached Charter’s systems on April 1 through a voice phishing (vishing) attack that compromised an employee’s Microsoft Entra account.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLateral Movement and Exfiltration\u003c/strong\u003e: After gaining access, the attackers claimed to have stolen 42 million records from Charter’s Salesforce instance. The allegedly exfiltrated data fields include:\n\n\u003cul\u003e\n\u003cli\u003eConsumer and business customer names\u003c/li\u003e\n\u003cli\u003eEmail addresses\u003c/li\u003e\n\u003cli\u003ePhysical addresses\u003c/li\u003e\n\u003cli\u003ePhone numbers\u003c/li\u003e\n\u003cli\u003ePhone types\u003c/li\u003e\n\u003cli\u003ePlan information\u003c/li\u003e\n\u003cli\u003eSupport ticket data\u003c/li\u003e\n\u003cli\u003eSome customer proprietary network information (CPNI)\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCharter’s Account\u003c/strong\u003e: The company confirmed the breach but stated that “no sensitive personal information (PI) or customer proprietary network information (CPNI) data was exfiltrated.” Charter’s spokesperson specified that only sales tools used to manage Business customers were impacted and that “no CPNI or sensitive PI was released by the threat actor.”\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"ransom-demand-and-leak\"\u003eRansom Demand and Leak\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eCharter refused to pay the ransom demanded by ShinyHunters for the return and destruction of the stolen data.\u003c/li\u003e\n\u003cli\u003eFollowing the refusal, the gang published the exfiltrated Salesforce documents on their dark web leak site, as shown in a screenshot included in the article.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"data-impact-assessment-by-have-i-been-pwned\"\u003eData Impact Assessment by Have I Been Pwned\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eHIBP analyzed the leaked data and confirmed that 4.9 million unique email addresses were exposed.\u003c/li\u003e\n\u003cli\u003eAdditional exposed attributes: names, phone numbers, and physical addresses.\u003c/li\u003e\n\u003cli\u003eA subset of approximately 85,000 records from an internal employee directory also included job titles.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"actor-profile-shinyhunters\"\u003eActor Profile: ShinyHunters\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eRecent Campaign\u003c/strong\u003e: The gang has been actively targeting Salesforce customers for over a year, breaching hundreds of companies globally.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePrevious Claims\u003c/strong\u003e: ShinyHunters has claimed the theft of billions of records in Salesforce Aura data theft attacks and via a Salesloft Drift campaign.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eModus Operandi\u003c/strong\u003e: The group uses extortion, demanding ransoms and leaking data when victims refuse to pay.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"law-enforcement-advisory\"\u003eLaw Enforcement Advisory\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe FBI recently issued a public advisory (via IC3 PSA 260515) telling ShinyHunters victims not to pay ransoms.\u003c/li\u003e\n\u003cli\u003eThe FBI’s reasoning, as cited in the article, is that payment cannot guarantee that the threat actor will not attempt to sell the stolen data to other cybercriminals or extort the victim again.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-context-for-charter\"\u003eBroader Context for Charter\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eCharter’s systems were previously compromised in a wave of breaches attributed to Salt Typhoon, a Chinese state-backed threat group that also hit AT\u0026amp;T, Verizon, Consolidated Communications, Windstream, and Lumen.\u003c/li\u003e\n\u003cli\u003eThe current breach appears unrelated to that earlier espionage activity, instead stemming from a financially motivated extortion group.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eA single employee’s compromised Microsoft Entra account allowed attackers to exfiltrate a large dataset from an entirely separate Salesforce environment.\u003c/li\u003e\n\u003cli\u003eThe discrepancy between Charter’s official denial of CPNI theft and ShinyHunters’ claim underscores the difficulty of verifying extortionist assertions.\u003c/li\u003e\n\u003cli\u003eThe exposure of 4.9 million accounts—particularly the inclusion of an internal employee directory segment—poses both privacy and targeted phishing risks.\u003c/li\u003e\n\u003cli\u003eThe FBI’s explicit advice to refuse ransom payments aligns with Charter’s response, but does not mitigate the reputational and operational fallout from having the data publicly leaked.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["The ShinyHunters extortion gang breached Charter Communications on April 1 through a voice phishing attack that compromised an employee's Microsoft Entra account.","The threat actors claimed to have stolen 42 million records from Charter's Salesforce instance, including customer names, email addresses, physical addresses, phone numbers, plan information, and support ticket data.","After Charter refused to pay the ransom, the gang leaked the stolen documents on their dark web leak site.","Have I Been Pwned confirmed that the leak exposed 4.9 million unique email addresses along with names, phone numbers, and physical addresses, with a subset of approximately 85,000 records also containing job titles.","The FBI advised victims of ShinyHunters not to pay ransom demands, as payment does not guarantee the data will not be sold or used for further extortion."],"insights":["Charter's public statement denies the theft of any sensitive personal information or customer proprietary network information, directly contradicting ShinyHunters' claim that some CPNI data was among the 42 million records exfiltrated, signaling either misrepresentation by the attackers or a gap in the company's assessment.","The breach originated from a single employee's Microsoft Entra account compromised through voice phishing, yet enabled access to an entirely separate platform—the company's Salesforce instance—highlighting the cross-platform blast radius of credential compromise.","ShinyHunters has been systematically targeting Salesforce customers over the past year, breaching hundreds of companies, which suggests a deliberate focus on exploiting vulnerabilities or misconfigurations common to that ecosystem.","The FBI explicitly advises victims not to pay ShinyHunters' ransom because doing so does not prevent the stolen data from being sold to other criminals or used for further extortion, making non-payment a concrete defensive strategy.","Although Charter serves over 32 million customers, the leaked data affected 4.9 million accounts, and a subset of 85,000 records from an internal employee directory included job titles—indicating the breach extended beyond customer data into internal corporate information."],"referencedReports":[{"title":"Charter Breach Analysis","url":"https://haveibeenpwned.com/Breach/Charter","publisher":"Have I Been Pwned","context":"Have I Been Pwned analyzed the leaked data and confirmed that the incident affected 4.9 million accounts, listing exposed email addresses, names, phone numbers, and physical addresses.","category":"","primary":false},{"title":"Public Service Announcement PSA260515","url":"https://www.ic3.gov/PSA/2026/PSA260515","publisher":"FBI Internet Crime Complaint Center (IC3)","context":"The FBI recently advised ShinyHunters' victims not to give in to the gang's ransom demands, as doing so cannot guarantee the stolen data won't be sold or used for further extortion.","category":"","primary":false}],"body":"\u003cp\u003eThe ShinyHunters extortion gang breached Charter Communications in early April 2026, using a voice phishing attack to compromise an employee\u0026rsquo;s Microsoft Entra account and then steal data from the company\u0026rsquo;s Salesforce instance. The company confirmed the incident earlier this week, stating that while an attacker accessed systems, no sensitive personal information (PI) or customer proprietary network information (CPNI) was exfiltrated.\u003c/p\u003e\n\n\u003cp\u003eAfter Charter refused to pay the demanded ransom, ShinyHunters leaked the stolen documents on their dark web site. Have I Been Pwned later analyzed the leaked data and confirmed that 4.9 million unique accounts were affected, exposing names, email addresses, phone numbers, physical addresses, and—for a subset of about 85,000 records—job titles from an internal employee directory.\u003c/p\u003e\n\n\u003cp\u003eThe FBI has advised ShinyHunters victims not to pay ransoms, warning that payment does not prevent further sale of stolen data or additional extortion attempts. The attack is part of a wider campaign in which ShinyHunters has breached hundreds of companies by targeting Salesforce customers over the past year.\u003c/p\u003e\n"},{"n":10,"title":"Microsoft calls zero-day releases ‘never justifiable’ as researcher threatens to drop more","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/microsoft-calls-zero-day-releases-never-justifiable-as-researcher-threatens-more","time":"13:33","priority":"MUST READ","score":95,"tldr":"Microsoft condemned the uncoordinated release of Windows zero-day vulnerabilities with proof-of-concept code, saying such disclosures are 'never justifiable' and hinting at possible legal action against those who enable cybercrime.","briefOverview":"\u003cp\u003eMicrosoft publicly condemned the uncoordinated release of Windows zero-day vulnerabilities by a pseudonymous researcher, calling such disclosures “never justifiable” and hinting at potential legal action through its Digital Crimes Unit. The researcher, Nightmare Eclipse, has published six vulnerabilities with working proof-of-concept code on GitHub since April; three of them have been exploited in live intrusions and appear on CISA’s known exploited vulnerabilities catalog, while the three most recent disclosures remain unpatched.\u003c/p\u003e\n\n\u003cp\u003eThe researcher threatened to release additional zero-days on July 14—the date of Microsoft’s Patch Tuesday—after alleging that Microsoft deleted their MSRC account, withheld bounty payments, and removed their attribution. The article notes that other security professionals have voiced similar frustrations with Microsoft’s handling of vulnerability disclosures in the past, including failures to credit reporters and leaving customers uninformed about unpatched flaws.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA pseudonymous researcher using the name Nightmare Eclipse has disclosed six Windows vulnerabilities since April, each accompanied by working proof-of-concept code posted to Microsoft-owned GitHub. Microsoft’s own advisories confirm that three of the flaws—BlueHammer (CVE-2026-33825), UnDefend (CVE-2026-45498), and RedSun (CVE-2026-41091)—have been exploited in real-world intrusions and are listed in CISA’s known exploited vulnerabilities catalog. The three more recent disclosures, YellowKey (CVE-2026-45585), GreenPlasma, and MiniPlasma, currently have no patches and no confirmed exploitation.\u003c/p\u003e\n\n\u003cp\u003eIn a blog post titled “A shared responsibility: Protecting customers through coordinated vulnerability disclosure,” Microsoft firmly opposed the uncoordinated releases, stating that disclosures without proper coordination are “never justifiable and have real-world consequences.” While stopping short of directly threatening legal action, the company noted that its Digital Crimes Unit will continue bringing cases against threat actors and “those that enable their criminal activity,” and it reaffirmed that its vulnerability submission portal remains open to anyone, regardless of past interactions or reputation.\u003c/p\u003e\n\n\u003cp\u003eThe researcher, whose GitHub account has been removed and whose Blogger page is currently down, has posted cryptographically signed messages alleging that Microsoft deleted their Microsoft Security Response Center account, withheld bounty payments, and removed their attribution from at least one advisory. They threatened a further release on July 14, coinciding with Microsoft’s Patch Tuesday, and stated their determination against Microsoft was stronger than any financial gain from selling the vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eIndustry reactions cited in the article highlight a history of friction between Microsoft and vulnerability researchers. Katie Moussouris, founder of Luta Security and architect of Microsoft’s original bug bounty program, noted that vendor threats can push researchers toward non-disclosure—an outcome she considers “far worse” than uncoordinated release. The article also recalls Trend Micro’s Zero Day Initiative publicly criticizing Microsoft in 2024 for failing to acknowledge a reported actively exploited vulnerability when it was patched, Tenable’s former CEO accusing Microsoft of keeping customers “deliberately kept in the dark” about an unpatched Azure vulnerability in 2023, and Check Point researcher Haifei Li stating that Microsoft patched a bug he reported without notifying him, emphasizing that coordinated disclosure “can’t be just one-sided.”\u003c/p\u003e\n\n\u003cp\u003eMicrosoft’s blog post acknowledged that it does not expect to agree on everything but emphasized its commitment to transparency and dialogue at researcher events and conferences. The company invited diverse perspectives and reiterated its willingness to accept vulnerability submissions through its public researcher portal, even as it maintained its strong opposition to uncoordinated zero-day releases.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview-of-the-uncoordinated-zero-day-disclosures\"\u003eOverview of the Uncoordinated Zero‑Day Disclosures\u003c/h2\u003e\n\n\u003cp\u003eSince April, a pseudonymous researcher operating under the name Nightmare Eclipse has released a series of Windows zero‑day vulnerabilities. Each disclosure included a fully working proof‑of‑concept exploit, which was posted directly to the Microsoft‑owned GitHub platform, making the code immediately available to both malicious actors and defenders. As of the article’s publication, six vulnerabilities have been disclosed in total:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBlueHammer\u003c/strong\u003e (CVE‑2026‑33825), \u003cstrong\u003eUnDefend\u003c/strong\u003e (CVE‑2026‑45498), and \u003cstrong\u003eRedSun\u003c/strong\u003e (CVE‑2026‑41091) – all released in April. Microsoft’s own patch advisories confirm that each of these three has been exploited in live intrusions. They are listed in CISA’s catalog of Known Exploited Vulnerabilities.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eYellowKey\u003c/strong\u003e (CVE‑2026‑45585), \u003cstrong\u003eGreenPlasma\u003c/strong\u003e, and \u003cstrong\u003eMiniPlasma\u003c/strong\u003e – disclosed earlier in the month. No patches are available and no confirmed exploitation of these three has been reported.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe researcher’s GitHub account has been taken down, and the Blogger page where they published cryptographically signed posts that laid out their grievances is unreachable as of the article’s writing.\u003c/p\u003e\n\n\u003ch2 id=\"researcher-s-grievances-and-future-threats\"\u003eResearcher’s Grievances and Future Threats\u003c/h2\u003e\n\n\u003cp\u003eThe individual has not publicly identified themselves, but their signed posts detail specific complaints against Microsoft. The researcher claims Microsoft:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDeleted their Microsoft Security Response Center (MSRC) account.\u003c/li\u003e\n\u003cli\u003eWithheld bounty payments.\u003c/li\u003e\n\u003cli\u003eRemoved their attribution from at least one advisory.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn their own words, “I could have made some insane cash selling this but no amount of money will stand between me and my determination against Microsoft.” The researcher went on to threaten a further zero‑day release on \u003cstrong\u003eJuly 14\u003c/strong\u003e, which is the scheduled date for Microsoft’s Patch Tuesday, warning they would “make sure your bones are shattered that day.”\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-official-response\"\u003eMicrosoft’s Official Response\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft published a blog post titled “A shared responsibility: Protecting customers through coordinated vulnerability disclosure.” The post articulates the company’s stance in several key points:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eUnequivocal condemnation:\u003c/strong\u003e “Uncoordinated disclosures that put proof‑of‑concept code for unpatched vulnerabilities into the hands of bad actors are never justifiable and have real‑world consequences.”\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHints at legal consequences:\u003c/strong\u003e While careful not to issue a direct threat of legal action, Microsoft stated that its Digital Crimes Unit “will continue bringing cases against these actors and those that enable their criminal activity – coordinating as needed with law enforcement around the world.”\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOpen invitation to submit vulnerabilities:\u003c/strong\u003e The company emphasized that its public researcher portal is always open to anyone, “regardless of past interactions or reputation,” and that it remains committed to transparency, dialogue, and supporting responsible research.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eKatie Moussouris, architect of Microsoft’s original bug bounty program, observed on Bluesky that the phrase “responsible disclosure” (implied by Microsoft’s framing) is loaded: “No vendor uses that term unless they want to call someone irresponsible.”\u003c/p\u003e\n\n\u003ch2 id=\"industry-frustrations-with-microsoft-s-vulnerability-handling\"\u003eIndustry Frustrations with Microsoft’s Vulnerability Handling\u003c/h2\u003e\n\n\u003cp\u003eThe article places the current incident against a broader backdrop of researcher frustration:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eZero Day Initiative (Trend Micro)\u003c/strong\u003e publicly criticized Microsoft in 2024 after reporting an actively exploited vulnerability and receiving no acknowledgment when it was eventually patched.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTenable’s former CEO\u003c/strong\u003e published a LinkedIn post in 2023 alleging that Microsoft had “deliberately kept [customers] in the dark” about an Azure vulnerability that remained unpatched for months after disclosure.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCheck Point researcher Haifei Li\u003c/strong\u003e stated separately that Microsoft had patched a bug he reported without ever notifying him, and that coordinated disclosure “can’t be just one‑sided.”\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMoussouris warned that public zero‑day drops are not ideal but that \u003cstrong\u003enon‑disclosure is far worse\u003c/strong\u003e, and she directly linked the risk of non‑disclosure to threats from vendors.\u003c/p\u003e\n\n\u003ch2 id=\"key-observations\"\u003eKey Observations\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft’s response simultaneously condemns the researcher’s actions while leaving the door open for submissions through official channels, reflecting a tension between deterring uncoordinated disclosure and maintaining a cooperative relationship with the research community.\u003c/li\u003e\n\u003cli\u003eThe researcher’s tactic of scheduling the next release on Microsoft’s Patch Tuesday is deliberately designed to maximize disruption and pressure, potentially forcing out‑of‑band patches or pre‑disclosure scramble.\u003c/li\u003e\n\u003cli\u003eThe article underscores a recurring theme: even when vulnerabilities are responsibly reported, researchers have accused Microsoft of unilateral behavior—patching without notice, withholding credit, and leaving the vulnerability undisclosed to customers—which can erode trust and incentivize future non‑coordinated disclosures.\u003c/li\u003e\n\u003cli\u003eMoussouris’s remark that non‑disclosure is worse than a zero‑day drop highlights an important nuance: if vendors respond to perceived irresponsibility with heavy‑handed tactics, they may inadvertently encourage researchers to go completely silent, leaving critical flaws unknown to defenders.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Microsoft published a blog post calling uncoordinated Windows zero-day releases 'never justifiable' and suggested its Digital Crimes Unit could pursue legal cases against those enabling cybercrime.","A pseudonymous researcher disclosed six Windows vulnerabilities with proof-of-concept code on GitHub, three of which have been exploited in live intrusions and added to CISA’s known exploited vulnerabilities catalog.","The researcher alleged that Microsoft deleted their MSRC account, withheld bounty payments, removed their attribution, and threatened to release more zero-days on July 14.","The article notes that other security professionals have previously criticized Microsoft’s handling of vulnerability reports, including failing to credit researchers and leaving customers uninformed about unpatched flaws."],"insights":["Microsoft's blog post condemns uncoordinated disclosure but simultaneously invites the same researcher to submit vulnerabilities through its portal 'regardless of past interactions or reputation,' revealing a pragmatic need for external research despite strong rhetoric.","The researcher threatened to release more zero-days on July 14, the date of Microsoft's Patch Tuesday, indicating a deliberate strategy to undermine the company's controlled patching cycle and maximize public pressure.","Katie Moussouris noted that vendor threats can push researchers toward non-disclosure, which she considers far worse than uncoordinated release, highlighting how aggressive vendor responses may inadvertently increase security risks."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft publicly condemned the uncoordinated release of Windows zero-day vulnerabilities by a pseudonymous researcher, calling such disclosures “never justifiable” and hinting at potential legal action through its Digital Crimes Unit. The researcher, Nightmare Eclipse, has published six vulnerabilities with working proof-of-concept code on GitHub since April; three of them have been exploited in live intrusions and appear on CISA’s known exploited vulnerabilities catalog, while the three most recent disclosures remain unpatched.\u003c/p\u003e\n\n\u003cp\u003eThe researcher threatened to release additional zero-days on July 14—the date of Microsoft’s Patch Tuesday—after alleging that Microsoft deleted their MSRC account, withheld bounty payments, and removed their attribution. The article notes that other security professionals have voiced similar frustrations with Microsoft’s handling of vulnerability disclosures in the past, including failures to credit reporters and leaving customers uninformed about unpatched flaws.\u003c/p\u003e\n"},{"n":14,"title":"Kimsuky Deploys HTTPSpy, Expands Arsenal with HelloDoor and VS Code Tunnels","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/kimsuky-deploys-httpspy-expands-arsenal.html","time":"05:57","priority":"MUST READ","score":95,"tldr":"North Korea's Kimsuky group is combining sophisticated social engineering (e.g., fake security software installers, spoofed Webex meetings) with abuse of legitimate tools like VS Code tunnels to deploy advanced backdoors such as HTTPSpy and AppleSeed, primarily targeting South Korean military and corporate entities.","briefOverview":"\u003cp\u003eIn March and April 2026, the North Korean threat actor Kimsuky launched fresh attacks on South Korean military and corporate targets, distributing the HTTPSpy backdoor through fake security software installers and a spoofed Cisco Webex meeting page. The Webex lure redirected victims to a real meeting room using a schedule stolen from a compromised attendee, while the malware established persistence via scheduled tasks and retrieved additional payloads.\u003c/p\u003e\n\n\u003cp\u003eConcurrently, Kimsuky broadened its arsenal with new malware families like HelloDoor and HttpMalice, and adopted legitimate tools such as VS Code Remote Tunneling and DWAgent for stealthy remote access, reducing dependence on traditional command-and-control channels. The group continues to target defense, government, medical, and energy sectors, with a marked focus on data exfiltration and stealing South Korean GPKI certificates.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eBetween March and April 2026, North Korean state-sponsored group Kimsuky (Velvet Chollima) launched a series of campaigns targeting South Korean military and corporate entities. The attacks combined social engineering with multi-stage malware delivery, notably using fake security software installation pages and a counterfeit Cisco Webex meeting site. The first campaign impersonated a South Korean B2B messaging service’s security tools, dropping executables disguised as nProtect Online Security and AhnLab Safe Transaction that loaded a second-stage DLL and contacted a C2 server for an unknown payload.\u003c/p\u003e\n\n\u003cp\u003eThe April 2026 campaign used a spoofed Webex page that prompted victims to download a script to fix a camera issue, ultimately deploying an intermediate downloader and then the HTTPSpy remote access trojan. HTTPSpy offers capabilities such as shell command execution, file transfer, screenshot capture, and DLL injection. Notably, the malware also opened a real meeting room using a schedule likely obtained by first compromising a participant, demonstrating a sophisticated pivot to target other attendees.\u003c/p\u003e\n\n\u003cp\u003eSimultaneously, Kaspersky reported that Kimsuky expanded its toolset with new malware variants including HelloDoor (a Rust-based PebbleDash variant possibly built with help from large language models), HttpMalice, and HttpTroy, alongside the established AppleSeed family. The group abused legitimate VS Code Remote Tunneling and Cloudflare Quick Tunnels to establish persistent, covert access without traditional malware C2, while also leveraging the open-source DWAgent for post-exploitation. These activities affected public and private entities across defense, military, government, medical, machinery, and energy industries.\u003c/p\u003e\n\n\u003cp\u003eThe actor’s malware clusters, PebbleDash and AppleSeed, displayed overlapping target sets but diverging objectives: AppleSeed is increasingly focused on data exfiltration and harvesting of GPKI certificates from the C:\\GPKI directory, whereas PebbleDash emphasizes advanced remote control. Kimsuky\u0026rsquo;s ability to retain and modify original source code for its malware families, combined with techniques like JSONPing (verifying infection status by calling a local server), illustrates continuous and agile development of its cyber espionage capabilities.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe North Korean state-sponsored threat actor Kimsuky (also known as Velvet Chollima) was observed conducting a fresh wave of cyber attacks against South Korean military and corporate entities during March and April 2026. The operations employed tailored social engineering, multi-stage payload delivery, and the abuse of legitimate tools, while introducing new malware variants and verification techniques. The group\u0026rsquo;s activities were analyzed by ENKI, Kaspersky, CrowdStrike, Darktrace, and Logpresso, revealing an expanding arsenal and a continued focus on sensitive data theft.\u003c/p\u003e\n\n\u003ch2 id=\"campaign-details\"\u003eCampaign Details\u003c/h2\u003e\n\n\u003ch3 id=\"march-2026-fake-security-software-installers\"\u003eMarch 2026: Fake Security Software Installers\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eA bogus web page impersonated the security software installation page of a South Korean B2B messaging service.\u003c/li\u003e\n\u003cli\u003eThe lure likely targeted messaging administrators within corporate environments.\u003c/li\u003e\n\u003cli\u003eTwo executables, “nos-setup.exe” and “astx-setup.exe”, masqueraded as nProtect Online Security and AhnLab Safe Transaction (ASTx) but contained identical malicious code.\u003c/li\u003e\n\u003cli\u003eThe binaries launched a second-stage DLL (“MemLoader.dll”) via regsvr32.exe, then deleted themselves via a batch script.\u003c/li\u003e\n\u003cli\u003eThe DLL established persistence through a scheduled task and contacted a command-and-control (C2) server, where the attacker likely monitored GET requests and selectively delivered payloads to specific victims (the exact payload remains unknown).\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"april-2026-counterfeit-cisco-webex-page\"\u003eApril 2026: Counterfeit Cisco Webex Page\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eA counterfeit Webex page displayed a pop-up urging victims to download and run a script to resolve camera access issues.\u003c/li\u003e\n\u003cli\u003eThis resulted in downloading a ZIP archive containing an encrypted JavaScript file (“fix-camera.jse”).\u003c/li\u003e\n\u003cli\u003eExecution of the JSE deployed an intermediate downloader (“mTSTCv8.mdxm”) via PowerShell, which performed anti-analysis checks and fetched the next stage (“engine.dat” or “spyInster.dll”).\u003c/li\u003e\n\u003cli\u003eThe DLL dropped a loader (“cacheMon.dat”) that executed HTTPSpy on the system.\u003c/li\u003e\n\u003cli\u003eHTTPSpy is a full-featured remote access trojan capable of running shell commands, uploading/downloading files, launching processes, capturing screenshots, injecting DLLs into specified processes, and self-erasing.\u003c/li\u003e\n\u003cli\u003eThe malware also dropped and opened “meeting.html”, which redirected the victim to a real Webex meeting room associated with an event scheduled around the same time, indicating the attacker likely compromised a previous attendee to steal the schedule and then engineered a fake page to distribute malware to other participants.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-malware-families-and-new-variants\"\u003eKey Malware Families and New Variants\u003c/h2\u003e\n\n\u003cp\u003eThe attack chains dropped a variety of loaders written in JSE, PIF, SCR, and EXE formats, delivering malware from two broad clusters: PebbleDash and AppleSeed.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eHelloDoor\u003c/strong\u003e – A Rust-based PebbleDash variant first seen in August 2025, likely developed with the help of a large language model (LLM). Provides basic features: set current directory, sleep, and execute commands.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHttpMalice\u003c/strong\u003e – The latest PebbleDash backdoor variant, active by December 2025. Gathers system information, sets persistence, performs reconnaissance with native Windows commands, captures screenshots, loads downloaded payloads into memory, runs commands, and exfiltrates output.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHttpTroy\u003c/strong\u003e – A backdoor delivered via a loader named MemLoad; supports file transfer, screenshot capture, command execution, in-memory loading of executables, reverse shell, process termination, and trace removal.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAppleSeed\u003c/strong\u003e – Comes as a Dropper (downloads additional malware, executes commands) and a Spy variant that collects documents, screenshots, keystrokes, USB drive listings, and specifically harvests data from the C:\\GPKI directory (mirroring the earlier Troll Stealer).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHappyDoor\u003c/strong\u003e – An advanced version of AppleSeed first identified in 2021.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"abuse-of-legitimate-tools-and-tunneling\"\u003eAbuse of Legitimate Tools and Tunneling\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eKimsuky abused the \u003cstrong\u003eVS Code Remote Tunneling\u003c/strong\u003e feature to establish covert remote access to victim devices, bypassing traditional malware-based C2 and making detection more difficult. This technique was reported independently by Darktrace and Logpresso.\u003c/li\u003e\n\u003cli\u003eThe group also used \u003cstrong\u003eCloudflare Quick Tunnels\u003c/strong\u003e and distributed the open-source \u003cstrong\u003eDWAgent\u003c/strong\u003e remote monitoring and management tool for post-exploitation activities.\u003c/li\u003e\n\u003cli\u003eKaspersky noted that Kimsuky leveraged VS Code tunneling specifically for persistence.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"additional-techniques-and-innovations\"\u003eAdditional Techniques and Innovations\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eJSONPing\u003c/strong\u003e: The threat actor created decoy web pages that queried a local server set up by the malware on the victim’s machine via JSON with Padding (JSONP) to verify whether the malware was already running. If it was not, an installation prompt was displayed. The exact payload delivered through this method could not be determined as the URL was inactive at the time of analysis.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSelective payload delivery\u003c/strong\u003e: In the March campaign, the attacker likely monitored recurring GET requests from the malware and delivered final payloads only to specific victims, indicating a targeted approach.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMeeting schedule compromise\u003c/strong\u003e: By first compromising a service member’s device or account to obtain a meeting schedule, Kimsuky crafted a fake Webex page that redirected victims to a legitimate meeting room to maximize the lure’s credibility.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"targeting-and-attribution\"\u003eTargeting and Attribution\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003ePrimary targets were South Korean \u003cstrong\u003emilitary and corporate entities\u003c/strong\u003e, but PebbleDash campaigns also afflicted defense organizations in \u003cstrong\u003eBrazil and Germany\u003c/strong\u003e, while the AppleSeed cluster concentrated on \u003cstrong\u003egovernment organizations\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eKaspersky identified overlapping target sectors for the two malware clusters: defense, military, government, medical, machinery, and energy.\u003c/li\u003e\n\u003cli\u003eThe actor retains access to original source code and can modify its malware clusters at will, demonstrating sustained development agility.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"capabilities-and-impact\"\u003eCapabilities and Impact\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eHTTPSpy is a fully featured RAT with extensive control, while the latest backdoors provide flexible reconnaissance, exfiltration, and lateral movement.\u003c/li\u003e\n\u003cli\u003eAppleSeed’s signature capability now includes extraction of \u003cstrong\u003eGPKI certificates\u003c/strong\u003e from the C:\\GPKI directory, indicating a focused effort to steal South Korean government-issued digital identities for further access.\u003c/li\u003e\n\u003cli\u003eThe adoption of VS Code tunneling, Cloudflare tunnels, and DWAgent reflects a deliberate shift toward using legitimate infrastructure to evade detection and maintain long-term access, reducing reliance on custom C2 channels.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe March–April 2026 activity underscores Kimsuky’s continued evolution in social engineering sophistication, malware diversity, and operational security. By combining stolen meeting schedules, real-time infection verification, and the misuse of legitimate remote access tools, the group enhances both delivery success and stealth, while its expanding set of backdoors enables persistent, multi-sector cyber espionage.\u003c/p\u003e\n","keyPoints":["In March and April 2026, Kimsuky targeted South Korean military and corporate entities using fake security software installers and a spoofed Cisco Webex meeting page to deliver malware.","The campaigns distributed HTTPSpy, a full-featured remote access trojan that can execute shell commands, capture screenshots, and inject into processes, while establishing persistence via scheduled tasks.","The fake Webex page redirected victims to a legitimate meeting room using a schedule likely obtained by compromising an attendee's device, indicating precise social engineering based on stolen event details.","Kimsuky expanded its arsenal by abusing legitimate tools like VS Code Remote Tunneling and DWAgent, and developed a Rust-based PebbleDash variant named HelloDoor, possibly with the help of large language models.","The group deployed two malware clusters, PebbleDash and AppleSeed, across defense, government, medical, and energy sectors, with AppleSeed focusing on data exfiltration and extraction of GPKI certificates from the C:\\GPKI directory."],"insights":["Kimsuky leveraged a stolen meeting schedule, likely obtained by first compromising an attendee, to craft a fake Webex page targeting other participants—demonstrating a sophisticated pivot from an initial victim to laterally social-engineer colleagues.","The group used a technique dubbed JSONPing where a decoy web page queries a local server set up by the malware on the victim's machine to verify infection status, ensuring the installation prompt only appears if the target is not already compromised.","Kimsuky abused VS Code Remote Tunneling to establish covert remote access, eliminating the need for traditional malware-based C2 channels and making detection harder, a shift flagged by multiple security vendors.","The AppleSeed cluster has made GPKI certificate extraction from the C:\\GPKI directory a signature capability, signaling a deliberate focus on harvesting South Korean government-issued digital identities for further access.","The development of HelloDoor, a Rust-based PebbleDash variant, likely involved the use of a large language model, indicating Kimsuky's adoption of AI to accelerate and diversify malware creation."],"referencedReports":[{"title":"Kimsuky's Advanced Attack Techniques: JSONPing, Webex Spoofing, and a New HTTPSpy Variant","url":"https://www.enki.co.kr/en/media-center/blog/kimsuky-s-advanced-attack-techniques-jsonping-webex-spoofing-and-a-new-httpspy-variant","publisher":"ENKI","context":"The article cites ENKI's analysis detailing the March-April 2026 campaigns, the discovery of JSONPing, and the HTTPSpy variant delivered via fake security software installers and a spoofed Webex page.","category":"","primary":false},{"title":"2025 European Threat Landscape Report","url":"https://www.crowdstrike.com/en-us/resources/reports/2025-european-threat-landscape-report/","publisher":"CrowdStrike","context":"The article references CrowdStrike's report to note Kimsuky's earlier deployment of HTTPSpy against a German defense manufacturer between May and September 2024.","category":"","primary":false},{"title":"Kimsuky's AppleSeed and PebbleDash campaigns","url":"https://securelist.com/kimsuky-appleseed-pebbledash-campaigns/119785/","publisher":"Kaspersky (Securelist)","context":"Kaspersky's analysis is cited for detailing Kimsuky's use of VS Code tunneling, Cloudflare Quick Tunnels, DWAgent, LLMs, and Rust-based HelloDoor in recent campaigns.","category":"","primary":false},{"title":"Darktrace Identifies Campaign Targeting South Korea Leveraging VS Code for Remote Access","url":"https://www.darktrace.com/blog/darktrace-identifies-campaign-targeting-south-korea-leveraging-vs-code-for-remote-access","publisher":"Darktrace","context":"The article highlights Darktrace's identification of the VS Code tunneling abuse as part of Kimsuky's shift toward legitimate tool-based remote access.","category":"","primary":false},{"title":"1Q Kimsuky Report","url":"https://logpresso.com/ko/blog/2026-05-15-1Q-Kimsuky-report","publisher":"Logpresso","context":"Logpresso's report is mentioned alongside Darktrace as also highlighting Kimsuky's abuse of VS Code tunneling for covert remote access.","category":"","primary":false}],"body":"\u003cp\u003eIn March and April 2026, the North Korean threat actor Kimsuky launched fresh attacks on South Korean military and corporate targets, distributing the HTTPSpy backdoor through fake security software installers and a spoofed Cisco Webex meeting page. The Webex lure redirected victims to a real meeting room using a schedule stolen from a compromised attendee, while the malware established persistence via scheduled tasks and retrieved additional payloads.\u003c/p\u003e\n\n\u003cp\u003eConcurrently, Kimsuky broadened its arsenal with new malware families like HelloDoor and HttpMalice, and adopted legitimate tools such as VS Code Remote Tunneling and DWAgent for stealthy remote access, reducing dependence on traditional command-and-control channels. The group continues to target defense, government, medical, and energy sectors, with a marked focus on data exfiltration and stealing South Korean GPKI certificates.\u003c/p\u003e\n"},{"n":16,"title":"Malicious Sicoob NuGet Steals Banking Credentials as npm Packages Target Cloud Secrets","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/malicious-sicoob-nuget-steals-banking.html","time":"09:11","priority":"MUST READ","score":95,"tldr":"A malicious NuGet package impersonating a Brazilian banking SDK steals client certificates and sensitive transaction data, while a wave of typosquatting npm packages harvest cloud and CI/CD secrets — attackers increasingly use manufactured legitimacy to poison software supply chains and compromise developer environments.","briefOverview":"\u003cp\u003eA malicious NuGet package impersonating a C# SDK for Brazil\u0026rsquo;s Sicoob financial system was found exfiltrating client IDs, PFX certificates, and Boleto API responses to a hardcoded third-party endpoint. The stolen authentication materials could enable attackers to impersonate victims and automate banking operations, while the package\u0026rsquo;s legitimacy was falsely amplified by Google Search AI Mode.\u003c/p\u003e\n\n\u003cp\u003eThe discovery coincided with a surge of supply chain attacks targeting npm, including 14 typosquatting packages that harvested cloud and CI/CD secrets via preinstall hooks. Researchers warn that attackers have moved beyond simple typosquatting toward \u0026ldquo;manufactured legitimacy,\u0026rdquo; crafting package names that appear convincingly useful in routine developer workflows.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA malicious NuGet package called \u0026ldquo;Sicoob.Sdk\u0026rdquo; (versions 2.0.0–2.0.4) was found impersonating a legitimate SDK for Sicoob, a major Brazilian cooperative banking network, to steal authentication credentials. When developers used the package with a client ID, PFX file path, and PFX password, the malicious code read the PFX file from disk, Base64-encoded its contents, and transmitted the encoded data along with the password and client ID to a hardcoded Sentry endpoint. It also exfiltrated raw Boleto API responses, exposing sensitive transaction details such as payment status, amounts, and payer information. Downloaded nearly 500 times, the package gave attackers the ability to misuse stolen PFX certificates to impersonate victims and conduct automated banking operations.\u003c/p\u003e\n\n\u003cp\u003eThe attack\u0026rsquo;s effectiveness was heightened because Google Search AI Mode surfaced the package as a legitimate C# library. Additionally, the threat actors maintained a clean GitHub repository while injecting the malicious data-stealing code only into the NuGet artifact—a source-to-package mismatch designed to evade code review. NuGet blocked the package after responsible disclosure. The profile behind it, named \u0026ldquo;sicoob,\u0026rdquo; also published 11 other packages collectively downloaded about 6,000 times.\u003c/p\u003e\n\n\u003cp\u003eConcurrently, Microsoft discovered 14 malicious npm packages published by a single actor that typosquatted OpenSearch, ElasticSearch, DevOps, and environment-configuration library names. These packages used a preinstall hook to deploy a credential harvester that stole AWS credentials, HashiCorp Vault tokens, npm tokens, and CI/CD secrets from the host environment. The packages were uploaded on May 28, 2026 by a user named \u0026ldquo;vpmdhaj.\u0026rdquo;\u003c/p\u003e\n\n\u003cp\u003eThis incident is part of a broader escalation in supply chain attacks. Recent campaigns include 164 npm packages using dependency confusion to steal environment variables; 141 packages abusing npm as free static hosting for an ad-monetized proxy that targets students with popunder ads; a RAT package called \u0026ldquo;forge-jsxy\u0026rdquo; capable of keylogging, clipboard monitoring, and crypto wallet scanning; and 176 packages that employed high version numbers (\u0026ldquo;99.99.99\u0026rdquo;) to force installation and then steal credentials and deploy additional payloads.\u003c/p\u003e\n\n\u003cp\u003eSonatype released a report highlighting that attackers now practice \u0026ldquo;manufactured legitimacy,\u0026rdquo; designing package names that appear plausible and operationally routine. Techniques include prefix/suffix additions, version mimicry, and names that resemble the function of a legitimate package—transforming a simple install step into a reconnaissance and credential-theft pathway.\u003c/p\u003e\n\n\u003cp\u003eThese supply chain compromises are further linked to TeamPCP (aka Replicating Marauder), which has poisoned popular developer tooling across multiple registries in a worm-like fashion, exploiting automation and CI/CD workflows to push compromise downstream and achieve victim-to-victim expansion.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"malicious-nuget-package-sicoob-sdk\"\u003eMalicious NuGet Package: \u0026ldquo;Sicoob.Sdk\u0026rdquo;\u003c/h2\u003e\n\n\u003cp\u003eThe article details a supply chain attack carried out through a malicious NuGet package named \u0026ldquo;Sicoob.Sdk,\u0026rdquo; which masqueraded as a C# software development kit for Sicoob—one of Brazil\u0026rsquo;s largest cooperative financial systems. The package (versions 2.0.0 through 2.0.4) contained data-stealing functionality that targeted two types of sensitive information:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePFX certificates\u003c/strong\u003e: When a developer instantiated SicoobClient with a client ID, PFX file path, and PFX password, the malicious code read the PFX file from disk, Base64-encoded its contents, and transmitted the client ID, PFX password, and encoded PFX data to a hardcoded third-party Sentry endpoint.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBoleto API responses\u003c/strong\u003e: The package captured raw responses from the Boleto payment API via a separate Sentry path, potentially exposing transaction details such as payment status, amounts, due dates, identifiers, and payer/payee data.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003ePFX certificates are used to authenticate businesses with the Sicoob banking network for automated operations like instant payments and dynamic Pix QR codes. Stolen credentials therefore allow attackers to impersonate the victim\u0026rsquo;s banking API integration, creating severe fraud risks and indirect harm to end users through downstream financial data leakage or payment abuse.\u003c/p\u003e\n\n\u003ch3 id=\"discoverer-and-distribution\"\u003eDiscoverer and Distribution\u003c/h3\u003e\n\n\u003cp\u003eSocket security researcher Kirill Boychenko documented the package, noting that the stolen data could be abused to impersonate victims. The package was downloaded approximately 500 times. After responsible disclosure, NuGet blocked it. The publisher profile “sicoob” also had 11 other packages, which together accumulated about 6,000 downloads.\u003c/p\u003e\n\n\u003ch3 id=\"ai-search-amplification\"\u003eAI Search Amplification\u003c/h3\u003e\n\n\u003cp\u003eCrucially, Google Search AI Mode surfaced the malicious package as a legitimate C# library for interacting with Sicoob banking APIs. This AI-driven recommendation likely directed unsuspecting developers to install the package.\u003c/p\u003e\n\n\u003ch3 id=\"source-to-package-mismatch\"\u003eSource-to-Package Mismatch\u003c/h3\u003e\n\n\u003cp\u003eThe attacker used a GitHub repository (Sicoob-Cooperativa) that appeared clean and legitimate, while the malicious data-stealing code existed only in the artifact uploaded to NuGet. This mismatch allowed the operation to appear trustworthy upon casual code review.\u003c/p\u003e\n\n\u003ch3 id=\"recommended-remediation\"\u003eRecommended Remediation\u003c/h3\u003e\n\n\u003cp\u003eOrganizations that installed the package are advised to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eImmediately remove the package\u003c/li\u003e\n\u003cli\u003eTreat PFX material as compromised\u003c/li\u003e\n\u003cli\u003eReplace exposed PFX certificates\u003c/li\u003e\n\u003cli\u003eRotate PFX passwords\u003c/li\u003e\n\u003cli\u003eChange or disable affected client IDs\u003c/li\u003e\n\u003cli\u003eAudit Sicoob authentication and API logs for unusual activity\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"malicious-npm-packages-stealing-cloud-and-ci-cd-secrets\"\u003eMalicious npm Packages Stealing Cloud and CI/CD Secrets\u003c/h2\u003e\n\n\u003cp\u003eIn a separate but concurrent disclosure, Microsoft’s Defender Security Research Team discovered 14 malicious npm packages published on May 28, 2026 by a single threat actor using the name \u0026ldquo;vpmdhaj\u0026rdquo; (email a39155771@gmail.com). The packages typosquatted well-known libraries related to OpenSearch, ElasticSearch, DevOps, and environment configuration.\u003c/p\u003e\n\n\u003cp\u003eThe packages are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e@vpmdhaj/devops-tools\u003c/li\u003e\n\u003cli\u003e@vpmdhaj/elastic-helper\u003c/li\u003e\n\u003cli\u003e@vpmdhaj/opensearch-setup\u003c/li\u003e\n\u003cli\u003e@vpmdhaj/search-setup\u003c/li\u003e\n\u003cli\u003eapp-config-utility\u003c/li\u003e\n\u003cli\u003eelastic-opensearch-helper\u003c/li\u003e\n\u003cli\u003eenv-config-manager\u003c/li\u003e\n\u003cli\u003eopensearch-config-utility\u003c/li\u003e\n\u003cli\u003eopensearch-security-scanner\u003c/li\u003e\n\u003cli\u003eopensearch-setup\u003c/li\u003e\n\u003cli\u003eopensearch-setup-tool\u003c/li\u003e\n\u003cli\u003esearch-cluster-setup\u003c/li\u003e\n\u003cli\u003esearch-engine-setup\u003c/li\u003e\n\u003cli\u003evpmdhaj-opensearch-setup\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eEach package used a preinstall hook to launch a purpose-built credential harvester that exfiltrated:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAWS credentials\u003c/li\u003e\n\u003cli\u003eHashiCorp Vault tokens\u003c/li\u003e\n\u003cli\u003enpm tokens\u003c/li\u003e\n\u003cli\u003eCI/CD pipeline secrets\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese secrets were stolen directly from the host environment, putting cloud infrastructure and development pipelines at risk.\u003c/p\u003e\n\n\u003ch2 id=\"broader-surge-in-npm-supply-chain-attacks\"\u003eBroader Surge in npm Supply Chain Attacks\u003c/h2\u003e\n\n\u003cp\u003eThe article places these incidents within a larger, recent wave of supply chain campaigns targeting the npm ecosystem:\u003c/p\u003e\n\n\u003ch3 id=\"164-malicious-npm-packages-dependency-confusion\"\u003e164 Malicious npm Packages (Dependency Confusion)\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eSafedep identified 164 packages across five scoped namespaces that contained a postinstall payload.\u003c/li\u003e\n\u003cli\u003eThe payload downloaded second-stage JavaScript, spawned it as a detached process, and sent the victim\u0026rsquo;s environment variables (\u0026ldquo;process.env\u0026rdquo;) to \u0026ldquo;oob.moika.tech/report.\u0026rdquo;\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"141-npm-packages-as-ad-proxy-spam\"\u003e141 npm Packages as Ad Proxy Spam\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eAnother 141 packages were published between May 7 and 27, 2026.\u003c/li\u003e\n\u003cli\u003eInstead of malware, these abused npm as free static hosting for an ad-monetized web proxy that served popunder ads, primarily targeting students who landed on the pages via search results or shared links.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"forge-jsxy-rat-package\"\u003e“forge-jsxy” RAT Package\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eA malicious package named “forge-jsxy” was discovered with capabilities for keylogging, clipboard monitoring, .env scanning, shell history exfiltration, host inventory, remote filesystem access, screenshot capture, and cryptocurrency wallet scanning.\u003c/li\u003e\n\u003cli\u003eIt is assessed to be a continuation of the “forge-jsx” campaign reported in late April 2026.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"176-npm-packages-with-high-version-numbers\"\u003e176 npm Packages with High Version Numbers\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eSonatype detailed a campaign that used dependency confusion by publishing malicious packages with a version number of “99.99.99”; this high version was designed to beat any internal dependency resolution.\u003c/li\u003e\n\u003cli\u003eThe postinstall script fingerprinted the host, downloaded a platform-specific JavaScript payload, conducted reconnaissance, exfiltrated developer secrets, and dropped a second-stage binary.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"evolution-of-attacker-tactics-manufactured-legitimacy\"\u003eEvolution of Attacker Tactics: “Manufactured Legitimacy”\u003c/h2\u003e\n\n\u003cp\u003eSonatype published a report titled “Beyond Typosquatting Attacks” arguing that threat actors have outgrown simple typosquatting. The new pattern, termed \u003cstrong\u003e“manufactured legitimacy,”\u003c/strong\u003e involves designing package names to look plausible, useful, and operationally routine within modern software ecosystems. Specific techniques include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePrefix or suffix addition\u003c/li\u003e\n\u003cli\u003eDependency confusion\u003c/li\u003e\n\u003cli\u003eVersion mimicry\u003c/li\u003e\n\u003cli\u003eEmbedding target terms\u003c/li\u003e\n\u003cli\u003eAltered scopes or namespaces\u003c/li\u003e\n\u003cli\u003eNames that resemble the function of a legitimate package\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis shift transforms a routine install step into a high-risk pathway for reconnaissance, credential theft, and follow-on compromise.\u003c/p\u003e\n\n\u003ch2 id=\"connection-to-teampcp-replicating-marauder\"\u003eConnection to TeamPCP / Replicating Marauder\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that these incidents align with a campaign attributed to \u003cstrong\u003eTeamPCP\u003c/strong\u003e (also known as Replicating Marauder or UNC6780). This group has been poisoning popular developer tooling across npm, PyPI, Docker Hub, and Packagist in a worm-like manner, exploiting automation, inherited trust, and CI/CD workflows to push compromise downstream. BlueVoyant researcher Michael Warren described how the campaign demonstrated that a single poisoned dependency or container image could trigger compromise in an unrelated organization’s release pipeline, turning isolated software poisoning into a reproducible method for victim-to-victim expansion.\u003c/p\u003e\n","keyPoints":["A malicious NuGet package named \"Sicoob.Sdk\" impersonated a C# SDK for Brazil's Sicoob financial system and exfiltrated client IDs, PFX certificates, and Boleto API responses to a hardcoded third-party Sentry endpoint.","The package was surfaced by Google Search AI Mode as a legitimate library, and its linked GitHub repository appeared clean while the malicious code existed only in the NuGet package.","A separate threat actor published 14 malicious npm packages that typosquatted OpenSearch, ElasticSearch, DevOps, and environment-configuration libraries, using a preinstall hook to harvest AWS credentials, HashiCorp Vault tokens, npm tokens, and CI/CD secrets.","The npm ecosystem has recently suffered a staggering spate of supply chain attacks, including campaigns of over 164, 141, and 176 malicious packages employing dependency confusion, postinstall scripts, and ad-monetized proxy hosting.","Sonatype reported that attackers have moved beyond classic typosquatting, now designing package names to appear plausible and operationally routine—a pattern termed \"manufactured legitimacy\"—to transform routine install steps into pathways for reconnaissance and credential theft."],"insights":["Google Search AI Mode surfaced the malicious NuGet package as a legitimate C# library, illustrating how AI-driven search results can amplify supply chain attacks by directly recommending malicious packages to developers.","The attackers used a source-to-package mismatch, keeping a linked GitHub repository clean while injecting data-stealing code only into the NuGet artifact, thereby evading code review and lending a veneer of legitimacy.","The theft of Sicoob API authentication material could indirectly expose end users to downstream financial data leakage or payment abuse, extending the blast radius beyond the immediate developer victim.","In a creative, profit-driven misuse of the registry, one npm campaign published 141 packages that functioned as free static hosting for an ad-monetized web proxy targeting students with popunder ads rather than delivering malware.","Sonatype introduced the concept of \"manufactured legitimacy,\" where attackers design package names to look plausible and operationally routine in developer workflows, transforming a simple install step into a risk pathway for reconnaissance and credential theft."],"referencedReports":[{"title":"Malicious NuGet Package Impersonates Sicoob SDK","url":"https://socket.dev/blog/malicious-nuget-package-impersonates-sicoob-sdk","publisher":"Socket","context":"Socket's analysis revealing the data-stealing functionality in the malicious NuGet package 'Sicoob.Sdk', including PFX certificate exfiltration.","category":"","primary":false},{"title":"Typosquatted npm packages used steal cloud CI/CD secrets","url":"https://www.microsoft.com/en-us/security/blog/2026/05/28/typosquatted-npm-packages-used-steal-cloud-ci-cd-secrets/","publisher":"Microsoft","context":"Microsoft's discovery of 14 typosquatting npm packages that use a preinstall hook to harvest AWS credentials, Vault tokens, and CI/CD secrets.","category":"","primary":false},{"title":"164 malicious npm packages across five scoped namespaces (Dependency Confusion Campaign)","url":"https://safedep.io/oob-moika-tech-dependency-confusion-campaign/","publisher":"Safedep","context":"Safedep's report on 164 malicious npm packages using a postinstall payload to send victim environment variables to an attacker-controlled server.","category":"","primary":false},{"title":"Malicious npm Terminal3Airport Proxy Adware Spam","url":"https://safedep.io/malicious-npm-terminal3airport-proxy-adware-spam/","publisher":"Safedep","context":"Report on 141 npm packages published between May 7 and 27, 2026, that abuse npm as free static hosting for an ad-monetized web proxy targeting students.","category":"","primary":false},{"title":"Malicious forge-jsxy npm RAT Evolution","url":"https://safedep.io/malicious-forge-jsxy-npm-rat-evolution/","publisher":"Safedep","context":"Analysis of the 'forge-jsxy' RAT package, capable of keylogging, clipboard monitoring, .env scanning, and cryptocurrency wallet scanning.","category":"","primary":false},{"title":"Inside a 176-Package npm Campaign Built to Beat Your Internal Dependencies","url":"https://www.sonatype.com/blog/inside-a-176-package-npm-campaign-built-to-beat-your-internal-dependencies","publisher":"Sonatype","context":"Sonatype's analysis of a dependency confusion campaign using high version numbers (99.99.99) and multi-stage payloads to steal credentials and drop binaries.","category":"","primary":false},{"title":"Beyond Typosquatting Attacks","url":"https://www.sonatype.com/resources/research/beyond-typosquatting-attacks","publisher":"Sonatype","context":"Sonatype's research report describing how attackers now manufacture legitimacy through plausible package names to transform install steps into reconnaissance and theft pathways.","category":"","primary":false},{"title":"How Replicating Marauder Rewired the Supply Chain Playbook","url":"https://www.bluevoyant.com/blog/how-replicating-marauder-rewired-the-supply-chain-playbook","publisher":"BlueVoyant","context":"BlueVoyant's analysis of the TeamPCP/Replicating Marauder campaign, highlighting worm-like poisoning of developer tooling to expand compromise across ecosystems.","category":"","primary":false}],"body":"\u003cp\u003eA malicious NuGet package impersonating a C# SDK for Brazil\u0026rsquo;s Sicoob financial system was found exfiltrating client IDs, PFX certificates, and Boleto API responses to a hardcoded third-party endpoint. The stolen authentication materials could enable attackers to impersonate victims and automate banking operations, while the package\u0026rsquo;s legitimacy was falsely amplified by Google Search AI Mode.\u003c/p\u003e\n\n\u003cp\u003eThe discovery coincided with a surge of supply chain attacks targeting npm, including 14 typosquatting packages that harvested cloud and CI/CD secrets via preinstall hooks. Researchers warn that attackers have moved beyond simple typosquatting toward \u0026ldquo;manufactured legitimacy,\u0026rdquo; crafting package names that appear convincingly useful in routine developer workflows.\u003c/p\u003e\n"},{"n":12,"title":"New Russia-Linked GREYVIBE Targets Ukraine with AI-Powered Cyberattacks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/new-russian-linked-greyvibe-targets.html","time":"11:31","priority":"MUST READ","score":92,"tldr":"A newly identified Russian-linked group, GREYVIBE, is using AI-assisted development and multiple social engineering lures to target Ukraine with custom malware, blurring the line between state espionage and cybercrime.","briefOverview":"\u003cp\u003eA newly discovered Russian-speaking threat group named GREYVIBE has been conducting persistent cyberattacks against Ukrainian military, government, civilian, and business organizations since August 2025. The group leverages generative AI tools such as ChatGPT and Gemini to develop custom malware, loaders, and obfuscators, while also relying on deceptive lures like fake CAPTCHA pages and fraudulent adult club websites to deliver remote access trojans and Android spyware.\u003c/p\u003e\n\n\u003cp\u003eGREYVIBE occupies a blurred space between state-directed espionage and cybercrime, with some members believed to have criminal backgrounds and its tools appearing in unrelated cybercriminal campaigns. The group\u0026rsquo;s AI-assisted approach accelerates development and helps evade traditional attribution, but it also introduced exploitable design flaws that exposed backend functionality, indicating a lower level of operational maturity.\u003c/p\u003e\n\n\u003cp\u003eAmong its notable malware are the PowerShell-based PhantomRelay and LegionRelay remote access trojans, along with the FallSpy Android spyware. One infection chain even used WebRTC to capture victim audio and video. The group\u0026rsquo;s activities underscore how AI is being weaponized in the Russo-Ukrainian conflict, while its ties to both state interests and cybercrime make it a difficult actor to categorize.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eWithSecure has exposed GREYVIBE, a previously undocumented Russian-speaking threat actor linked to Kremlin intelligence objectives in the ongoing Russo-Ukrainian war. Active since at least August 2025, the group has persistently targeted a broad victim set across Ukraine\u0026rsquo;s military, government, civilian, and business sectors. Its operations are characterized by multiple creative delivery vectors, from spear-phishing emails to fake CAPTCHA pages and fraudulent Ukrainian adult club websites.\u003c/p\u003e\n\n\u003cp\u003eThe group employs several distinct attack chains. PhantomMail uses spear-phishing links pointing to malicious archives hosted on Google Drive and 4sync that launch a JavaScript loader and ultimately deploy PhantomRelay, a PowerShell-based remote access trojan (RAT) for host profiling and remote command execution. PhantomClick weaponizes ClickFix-style fake CAPTCHA pages mimicking services like Zoom and LAPAS, tricking users into running commands that install PhantomRelay. The PrincessClub campaign lures victims with bogus adult club sites, delivering the FallSpy Android spyware and Windows-based RATs such as PhantomRelayV1 and LegionRelay; later iterations added a WebRTC live call feature to capture audio and video. DroneLink uses fake charity sites supporting the Ukrainian armed forces to drop WireGuard and LegionRelay. A final chain, Nebo, masquerades as a Russian-language login screen likely intended to deceive Ukrainian military personnel.\u003c/p\u003e\n\n\u003cp\u003eThe malware suite includes PhantomRelay and its variant PhantomRelayV1 with custom watchdog persistence, the comparatively capable LegionRelay (offering file theft, screenshot capture, browser data and Telegram/WhatsApp exfiltration, and RDP access setup), and the Android spyware FallSpy. On a small number of infected machines, an XMRig cryptocurrency miner was also deployed, hinting at a financial motivation.\u003c/p\u003e\n\n\u003cp\u003eA defining characteristic of GREYVIBE is its heavy reliance on generative AI. The group used Ideogram AI for imagery, and OpenAI ChatGPT and Google Gemini to aid in developing LegionRelay, obfuscators, loaders, backend infrastructure, and post-compromise commands. This AI assistance helps bridge technical gaps, accelerate development, and reduce dependence on known tools that could aid attribution. However, the same AI integration inadvertently introduced design flaws into LegionRelay, exposing backend functionality—a mistake that more sophisticated state actors would typically avoid and which further suggests the group may include less experienced cybercriminal members.\u003c/p\u003e\n\n\u003cp\u003eEvidence of cybercrime ties is substantial. The group appears to have access to an ISO builder linked to the TrickBot gang and UAC-0098. PhantomRelay variants surfaced in seemingly unrelated cybercrime clusters, including a Microsoft Teams voice phishing campaign between July 2025 and February 2026, and the KongTuke delivery chain in early 2026 that also used ClickFix. Developers uploaded early test samples to VirusTotal and used informal internet slang like \u0026ldquo;letsrollboyos\u0026rdquo; and \u0026ldquo;cuteuwu\u0026rdquo; as naming conventions. WithSecure assesses with moderate confidence that GREYVIBE is connected to the broader cybercrime ecosystem and with low-to-moderate confidence that it involves current or former criminal members.\u003c/p\u003e\n\n\u003cp\u003eThis overlap between state-aligned espionage and cybercrime complicates attribution and blurs traditional boundaries. The group\u0026rsquo;s exact relationship to the Russian state remains unclear—it could be a state-backed unit that absorbed criminal talent, a team operating independently under state direction, or a hybrid formation. The frequent regeneration of AI-created components further threatens to erode the reliability of artifact-based attribution methods over time.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"greyvibe-threat-actor-analysis\"\u003eGREYVIBE Threat Actor Analysis\u003c/h2\u003e\n\n\u003ch3 id=\"overview-and-attribution\"\u003eOverview and Attribution\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eIdentity\u003c/strong\u003e: GREYVIBE is a previously undocumented Russian-speaking threat actor operating broadly in the Russian time zone. Its activities align with Kremlin state interests, specifically intelligence gathering related to the Russo-Ukrainian war.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eActive period\u003c/strong\u003e: Attacks have been ongoing since at least August 2025.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eVictimology\u003c/strong\u003e: Targets include military, government, civilian, and business-related organizations in and related to Ukraine.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSophistication\u003c/strong\u003e: WithSecure assesses the group as low-to-moderately sophisticated, noting operational security blunders and a dependence on AI-assisted tooling.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"attack-vectors-and-delivery-chains\"\u003eAttack Vectors and Delivery Chains\u003c/h3\u003e\n\n\u003cp\u003eGREYVIBE uses a diverse set of social engineering and technical delivery mechanisms:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePhantomMail\u003c/strong\u003e: Spear-phishing emails containing links to malicious ZIP or RAR archives hosted on Google Drive and 4sync. The archive includes a JavaScript-based loader that opens a decoy document and delivers PhantomRelay, a PowerShell-based remote access trojan (RAT) for host profiling and execution of PowerShell scripts and Windows commands.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePhantomClick\u003c/strong\u003e: Fake CAPTCHA pages mimicking Zoom and LAPAS domains. Leveraged a ClickFix-style technique to trick users into running commands that install PhantomRelay.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePrincessClub\u003c/strong\u003e: Fraudulent Ukrainian adult-club websites used to distribute FallSpy spyware on Android and either PhantomRelayV1 or LegionRelay on Windows. Later versions of the lure sites integrated a WebRTC-based live call feature to capture victim audio and video. PhantomRelayV1 is a PhantomRelay variant with a custom watchdog persistence mechanism.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDroneLink\u003c/strong\u003e: Websites posing as charitable foundations supporting the Armed Forces of Ukraine to deliver WireGuard and LegionRelay.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNebo\u003c/strong\u003e: A FallSpy sample that presented a Russian-language login screen, likely intended to deceive Ukrainian military personnel into believing they were accessing a Russian military terminal.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"malware-capabilities\"\u003eMalware Capabilities\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePhantomRelay\u003c/strong\u003e: Lightweight PowerShell RAT. Once implanted, it profiles the compromised host and can execute arbitrary PowerShell scripts and Windows commands.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePhantomRelayV1\u003c/strong\u003e: Evolved variant with a custom watchdog mechanism for persistence.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eLegionRelay\u003c/strong\u003e: A more feature-rich but still lightweight PowerShell-based RAT. Capabilities include:\n\n\u003cul\u003e\n\u003cli\u003eFile enumeration and exfiltration\u003c/li\u003e\n\u003cli\u003eScreenshot capture\u003c/li\u003e\n\u003cli\u003eTheft of browser data\u003c/li\u003e\n\u003cli\u003eExfiltration of Telegram and WhatsApp data\u003c/li\u003e\n\u003cli\u003eSetup of RDP access\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFallSpy\u003c/strong\u003e: Android spyware capable of harvesting sensitive information from infected devices.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eXMRig miner\u003c/strong\u003e: Deployed on a small number of LegionRelay-infected machines, indicating a possible financial motivation alongside espionage.\u003c/li\u003e\
