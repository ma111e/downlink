 wider exposure before formal release.","Anthropic's strategy of allowing a select group of cybersecurity organizations early access to the Mythos model specifically for cybersecurity work indicates they are using real-world adversarial testing to validate safeguards before public release.","Anthropic's warning that the short-term advantage from these tools could go to attackers highlights a calculated public acknowledgment that the defensive benefits of their most powerful models are not immediate, creating a known exploitable window."],"referencedReports":[],"body":"\u003cp\u003eAnthropic has confirmed it will release its restricted Mythos-class AI models to the general public in the coming weeks after delaying the rollout earlier this year over major security risks. Originally announced in April and limited to select companies and security researchers, the model was kept private because Anthropic warned that attackers could gain a short-term advantage from its advanced capabilities if released without strong safeguards.\u003c/p\u003e\n\n\u003cp\u003eAnthropic now states it is making swift progress on developing guardrails and is already allowing a small number of organizations to use the Claude Mythos preview for cybersecurity work. The model shows significant improvements in code reasoning and autonomy—far surpassing the current Opus 4.8 flagship—though the company has not set a firm public release date. A brief, unintended appearance of the Mythos-preview model on the Claude Code platform before being taken offline suggests the model is already moving toward deployment.\u003c/p\u003e\n"},{"n":15,"title":"ChatGPhish Vulnerability Turns ChatGPT Web Summaries Into a Phishing Surface","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/chatgphish-vulnerability-turns-chatgpt.html","time":"18:07","priority":"SHOULD READ","score":82,"tldr":"A vulnerability in ChatGPT’s handling of Markdown from summarized web pages allows attackers to inject phishing links and malicious images directly into the trusted assistant interface, turning any summarized page into a phishing surface.","briefOverview":"\u003cp\u003eSecurity researchers at Permiso disclosed a vulnerability named ChatGPhish that weaponizes ChatGPT’s implicit trust in Markdown content from summarized web pages. The flaw allows attackers to embed phishing links, auto-fetched remote images, fake security alerts, and QR codes directly into the assistant’s trusted UI. This turns any harmless-looking page an employee asks ChatGPT to summarize into a phishing surface.\u003c/p\u003e\n\n\u003cp\u003eWhen ChatGPT renders the summary, it automatically fetches attacker-hosted images and makes Markdown links clickable without additional user interaction. In a proof-of-concept, the technique leaks the victim’s IP address, browser metadata, and can display spoofed system warnings or trick users into scanning a malicious QR code on a mobile device—bypassing desktop URL filters and enterprise controls. The attack highlights how summarization itself becomes an adversarial vector, expanding phishing beyond email into the browser.\u003c/p\u003e\n\n\u003cp\u003eThe ChatGPhish discovery arrives amid a wave of AI-focused attack research. The article also details SymJack and TrustFall attacks that achieve remote code execution on AI coding agents, as well as a range of prompt injection, jailbreak, supply chain, and autonomous agent methods targeting frontier models and agentic workflows.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ePermiso Security’s ChatGPhish finding exploits how ChatGPT’s response renderer trusts Markdown links and images derived from a third‑party page the assistant has just summarized. When a victim prompts ChatGPT to summarize a booby‑trapped web page, the renderer automatically fetches any embedded attacker‑hosted images and surfaces links as live, clickable elements inside the assistant UI. This leaks the user’s IP address, User‑Agent, and Referer, and can present convincing fake security alerts, phishing links, or QR codes served from an attacker‑controlled S3 bucket. Because the content appears within the trusted ChatGPT interface, users may follow the prompts, and the QR‑code tactic bypasses desktop URL filters and enterprise security controls.\u003c/p\u003e\n\n\u003cp\u003eThe significance lies not only in the prompt injection but in the way instructions and media are rendered directly to the user. Earlier in March, Permiso had shown how summarizing an attacker‑controlled email could influence Microsoft Copilot’s output, but ChatGPhish shifts the attack surface from email to the browser. An employee no longer needs to open a malicious attachment or interact with a suspicious message; simply summarizing a page during normal browsing can introduce attacker‑controlled instructions and phishing artifacts into the rendered response.\u003c/p\u003e\n\n\u003cp\u003eThe article then documents two novel attacks on AI coding agents published by Adversa AI. SymJack manipulates an agent into copying a benign‑looking file where the destination is a symlink that points to the agent’s own configuration. The attacker’s payload overwrites the config, causing a malicious Model Context Protocol (MCP) server to spawn on the next restart with full user privileges. TrustFall achieves one‑click remote code execution by placing a malicious MCP server and an auto‑approval configuration inside a repository; when a developer clones the repo and accepts a generic folder‑trust dialog, the server starts as a native OS process without any additional tool call or prompt.\u003c/p\u003e\n\n\u003cp\u003eBeyond these, the article surveys a wide array of AI attack methods. The IICL jailbreak (Involuntary In‑Context Learning) bypasses GPT‑5.4 safety constraints, while Cisco highlights how multi‑turn conversations can circumvent LLM guardrails. Mitiga details a token‑theft attack on Claude Code that rewrites MCP endpoints via a rogue npm package to intercept OAuth tokens. Terra Security shows how OpenClaw’s remote update mechanism can later influence agents through workspace files. Sublime Security demonstrates that hidden text from benign sources in phishing emails can fool AI‑based email security systems, and LayerX reveals ClaudeBleed, where any Chrome extension can hijack Claude’s browser extension to issue commands.\u003c/p\u003e\n\n\u003cp\u003eAdditional findings include typographic prompt injection that hides text in images to bypass vision language model filters (Cisco), host‑level remote code execution from prompt injection in Microsoft Semantic Kernel (CVE‑2026‑25592 and CVE‑2026‑26030), and Unicode‑based bypass of Apple Intelligence’s filters (addressed in iOS 26.4 and macOS 26.4). WebPromptTrap in BrowserOS tricks users into authorizing actions through an AI‑generated summary (patched in v0.32.0). A Snyk audit of 3,984 AI agent skills found that 13.4% contained critical issues such as malware or exposed secrets, and Lasso Security uncovered attacks on NemoClaw sandboxes that exfiltrate OpenClaw data. Finally, Unit 42 demonstrated how threat actors use LLMs to craft adaptive malware and built an autonomous agent called Zealot that chains cloud reconnaissance, exploitation, privilege escalation, and exfiltration with minimal human guidance.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"chatgphish-vulnerability-and-broader-ai-attack-landscape\"\u003eChatGPhish Vulnerability and Broader AI Attack Landscape\u003c/h1\u003e\n\n\u003ch2 id=\"1-chatgphish-turning-chatgpt-web-summaries-into-a-phishing-surface\"\u003e1. ChatGPhish: Turning ChatGPT Web Summaries into a Phishing Surface\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDisclosure\u003c/strong\u003e: Permiso Security codenamed the technique ChatGPhish.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCore flaw\u003c/strong\u003e: ChatGPT’s response renderer implicitly trusts Markdown links and image URLs from a third‑party page it summarizes. It auto‑fetches those images and makes the links clickable in the assistant UI without user intervention.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAttack vector\u003c/strong\u003e: An attacker appends a small payload to any web page. When a victim later prompts ChatGPT to summarize that page, the rendered answer contains attacker‑controlled elements.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExfiltration\u003c/strong\u003e: Auto‑fetched images leak the victim’s IP address, User‑Agent, and Referer headers to the attacker.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePhishing surface\u003c/strong\u003e: Malicious Markdown links appear as live, clickable elements inside the trusted assistant interface. Attackers can serve fake system‑style security alerts and display QR codes from an attacker‑controlled S3 bucket.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBypass of controls\u003c/strong\u003e: QR codes are scanned on a mobile device, circumventing desktop URL filters and enterprise security controls.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSignificance\u003c/strong\u003e: Summarization itself becomes an adversarial surface. An employee merely summarizing a web page during normal browsing can introduce attacker‑controlled instructions and phishing artifacts into the chat UI.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePreceding research\u003c/strong\u003e: In March, Permiso had shown that an attacker‑controlled email summarized by Microsoft Copilot could influence Copilot’s output via cross‑prompt injection (indirect prompt injection).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eShift in attack surface\u003c/strong\u003e: The threat moves from email to the browser; a user no longer needs to open a malicious attachment or interact with a suspicious message—just summarizing a page can introduce the payload.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"2-ai-coding-agent-attacks-symjack-and-trustfall\"\u003e2. AI Coding Agent Attacks: SymJack and TrustFall\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePublishers\u003c/strong\u003e: Adversa AI documented SymJack and TrustFall.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eSymJack\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003eA malicious repository tricks an AI coding agent into copying a seemingly harmless file to a destination that is a symlink pointing to the agent’s own configuration.\u003c/li\u003e\n\u003cli\u003eThe attacker’s payload overwrites the config, and on the next restart a malicious Model Context Protocol (MCP) server spawns and runs arbitrary code with full user privileges.\u003c/li\u003e\n\u003cli\u003eThe technique is described as “a single attack pattern” that achieves remote code execution through AI coding assistants.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTrustFall\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003eAchieves one‑click remote code execution via a malicious repository that ships a configuration that auto‑approves and spawns an MCP server without a user’s explicit approval or a tool call from the agent.\u003c/li\u003e\n\u003cli\u003eWhen a developer clones or opens the repository in an AI coding tool and presses “Enter” on the generic “Yes, I trust this folder” dialog, the MCP server launches as a native OS process with the developer’s full system privileges—executing the payload on server startup before any tool calls and without additional prompts.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"3-additional-prompt-injection-and-jailbreak-techniques\"\u003e3. Additional Prompt Injection and Jailbreak Techniques\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eInvoluntary In‑Context Learning (IICL)\u003c/strong\u003e: A jailbreak approach that exploits the tension between in‑context learning and safety alignment to bypass GPT‑5.4 safety constraints (research paper and Adversa AI blog).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMulti‑turn conversation bypass\u003c/strong\u003e: LLM safety guardrails can be circumvented by tricking the model into a multi‑turn conversation. Cisco notes that real adversaries iterate, reframe refusals, decompose tasks across turns, adopt personas, and escalate gradually—something single‑turn benchmarks miss.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eClaude Code token theft (Mitiga)\u003c/strong\u003e: A vulnerability in Anthropic Claude Code uses a user‑level configuration change in “~/.claude.json” to rewrite MCP endpoints via a rogue npm package, placing an attacker between Claude Code and an OAuth‑backed MCP server to capture tokens for downstream SaaS access.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOpenClaw remote update (Terra Security)\u003c/strong\u003e: An OpenClaw skill can appear benign at installation but later influence the agent through workspace files by instructing the user during skill setup to append specific instructions to the HEARTBEAT.md file.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHidden text phishing evasion (Sublime Security)\u003c/strong\u003e: Phishing emails embed hidden text drawn from a legitimate newsletter or romance novel to confuse AI‑based email security systems into classifying the message as benign.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eClaudeBleed extension hijack (LayerX Security)\u003c/strong\u003e: A flaw in Claude’s Chrome browser extension allows any extension—even one without special permissions—to hijack it because the extension’s code does not verify which script is issuing commands to the Claude LLM. Any extension can invoke a content script and command the Claude extension.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTypographic prompt injection in images (Cisco)\u003c/strong\u003e: Adversarial text rendered as images can bypass safety filters in vision language models. Attackers can craft images that appear as noise to an OCR‑based filter yet carry fully readable instructions to the target VLM.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMicrosoft Semantic Kernel RCE (Microsoft Security)\u003c/strong\u003e: Vulnerabilities CVE‑2026‑25592 and CVE‑2026‑26030 can turn a prompt injection into host‑level remote code execution, as detailed in Microsoft’s “Prompts Become Shells” advisory.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eApple Intelligence filter bypass\u003c/strong\u003e: A combination of the Neural Exec prompt injection attack and the Unicode right‑to‑left‑override function was used to bypass Apple’s input and output filters and hijack Apple Intelligence’s local model. The issue was addressed in iOS 26.4 and macOS 26.4.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWebPromptTrap (Cato Networks)\u003c/strong\u003e: An indirect prompt injection vulnerability in the open‑source agentic browser BrowserOS deceives users into approving an authorization step through an AI summary generated from a legitimate‑looking article with hidden instructions. Patched in BrowserOS version 0.32.0.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"4-ai-skills-supply-chain-risks\"\u003e4. AI Skills Supply Chain Risks\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSnyk audit of AI agent skills ecosystem\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003e3,984 skills from ClawHub and skills.sh were examined.\u003c/li\u003e\n\u003cli\u003e13.4% (534 skills) contained at least one critical security issue: malware distribution, prompt injection attacks, or exposed secrets.\u003c/li\u003e\n\u003cli\u003e1,467 skills had at least one security flaw overall, including hard‑coded API keys, insecure credential handling, and third‑party content exposure.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eNemoClaw attacks (Lasso Security)\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003eTwo attacks targeting NVIDIA’s open‑source reference stack NemoClaw to exfiltrate OpenClaw data were demonstrated.\u003c/li\u003e\n\u003cli\u003eThe attacks exploit the sandbox’s default configuration via a malicious GitHub repository or an npm package.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"5-ai-in-offensive-operations-and-autonomous-cloud-attacks\"\u003e5. AI in Offensive Operations and Autonomous Cloud Attacks\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eThreat actors using LLMs for malware (Unit 42, Palo Alto Networks)\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003eThreat actors are increasingly experimenting with frontier AI to write malware that dynamically adapts its behavior to evade detection.\u003c/li\u003e\n\u003cli\u003eThey also offload decision‑making to the LLM to determine if a compromised environment is valuable enough to drop next‑stage payloads.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBroader exploitation risk\u003c/strong\u003e: Unit 42 warns that the proliferation of frontier AI model capabilities risks empowering adversaries to exploit zero‑days and N‑days at an unprecedented scale, speed, and sophistication.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eZealot proof‑of‑concept agent (Unit 42)\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003eZealot is a PoC agent that leverages LLMs to conduct end‑to‑end cloud attacks with minimal human guidance.\u003c/li\u003e\n\u003cli\u003eIt chains reconnaissance, exploitation, privilege escalation, and data exfiltration by exploiting known misconfigurations and vulnerabilities.\u003c/li\u003e\n\u003cli\u003eThe agent highlights that cloud environments are “AI‑Attack‑Ready” by default because every action has an API equivalent, discovery mechanisms are varied, misconfigurations are rampant, and access is credential‑based.\u003c/li\u003e\n\u003cli\u003eUnit 42 researchers note that the attacks themselves are not novel, but automation lets an AI agent orchestrate operations that once required specialized expertise.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["The ChatGPhish vulnerability allows attackers to inject live Markdown links and images into ChatGPT's summary responses, turning the assistant's interface into a phishing surface.","When ChatGPT summarizes a web page containing attacker-hosted images, the renderer auto-fetches those images and leaks the victim's IP, User-Agent, and Referer.","The technique can display fake system security alerts and QR codes from an attacker's S3 bucket, bypassing desktop URL filters and enterprise security controls.","The SymJack attack tricks AI coding agents into copying a file to a symlink that overwrites the agent's configuration, leading to remote code execution.","The TrustFall attack uses a malicious repository with a pre-approved MCP server to achieve one-click remote code execution when a developer opens the folder in an AI coding tool and accepts the folder trust prompt."],"insights":["ChatGPhish turns the act of summarizing a web page into a passive phishing attack because ChatGPT auto-renders Markdown links and fetches images without user interaction, trusting third-party content blindly.","Attackers can embed QR codes in summarized pages to bypass desktop URL filters and enterprise security controls, as the QR code is delivered through the trusted ChatGPT interface and scanned on a mobile device.","The SymJack attack tricks an AI coding agent into copying a file to a symlink that overwrites the agent's own configuration, turning a simple file operation into persistent remote code execution.","TrustFall achieves one-click RCE by having the developer click a standard 'trust this folder' prompt, after which a pre-approved malicious MCP server executes with full system privileges without further tool calls.","An audit of 3,984 public AI agent skills found that 13.4% contain at least one critical security issue, such as malware or exposed secrets, revealing a high-risk third-party skills supply chain."],"referencedReports":[{"title":"ChatGPhish: ChatGPT Markdown Rendering Vulnerability","url":"https://permiso.io/blog/chatgpt-markdown-rendering-vulnerability","publisher":"Permiso Security","context":"The article details the ChatGPhish vulnerability and links to Permiso’s technical analysis that describes how ChatGPT’s Markdown renderer can be abused for phishing.","category":"","primary":false},{"title":"Copilot Prompt Injection: AI Email Phishing","url":"https://permiso.io/blog/copilot-prompt-injection-ai-email-phishing","publisher":"Permiso Security","context":"The article references earlier Permiso research showing how attacker-controlled emails summarized by Microsoft Copilot could influence its output via cross-prompt injection.","category":"","primary":false},{"title":"The Approval Prompt is Lying to You: Symlink RCE in Five AI Coding Agents","url":"https://adversa.ai/blog/the-approval-prompt-is-lying-to-you-symlink-rce-in-five-ai-coding-agents-claude-code-cursor-antigravity-copilot-grok-build/","publisher":"Adversa AI","context":"The article describes Adversa AI’s SymJack attack pattern that achieves remote code execution through AI coding agents by exploiting symlinks to overwrite configurations.","category":"","primary":false},{"title":"TrustFall: Coding Agent Security Flaw RCE in Claude, Cursor, Gemini CLI \u0026 Copilot","url":"https://adversa.ai/blog/trustfall-coding-agent-security-flaw-rce-claude-cursor-gemini-cli-copilot/","publisher":"Adversa AI","context":"The article references Adversa AI’s TrustFall attack, a one-click RCE via a malicious repository with a pre-approved MCP server that executes without tool calls.","category":"","primary":false},{"title":"Involuntary In-Context Learning (research paper)","url":"https://arxiv.org/abs/2604.19461","publisher":"arXiv (authors not specified in article)","context":"The article mentions the novel jailbreak approach IICL that exploits tension between in-context learning and safety alignment to bypass GPT-5.4 safety constraints, linking to the paper.","category":"","primary":false},{"title":"IICL Attack: GPT-5.4 Safety Bypass via In-Context Learning","url":"https://adversa.ai/blog/iicl-attack-gpt-5-4-safety-bypass-in-context-learning/","publisher":"Adversa AI","context":"The article links to Adversa AI’s blog post demonstrating how the IICL technique bypasses GPT-5.4 safety constraints.","category":"","primary":false},{"title":"Claude Code MCP Token Theft via MITM","url":"https://www.mitiga.io/blog/claude-code-mcp-token-theft-mitm","publisher":"Mitiga","context":"The article references Mitiga’s report on a vulnerability in Anthropic Claude Code that allows token theft by rewriting MCP endpoints through a rogue npm package.","category":"","primary":false},{"title":"OpenClaw Vulnerability Research","url":"https://www.terra.security/blog/openclaw-vulnerability-research","publisher":"Terra Security","context":"The article describes research by Terra Security on a remote update mechanism in OpenClaw skills that lets an attacker influence an agent via workspace files.","category":"","primary":false},{"title":"Prompt Injection Attacks Don’t Look Like What You’re Seeing in Social Media and Headlines","url":"https://sublime.security/blog/prompt-injection-attacks-dont-look-like-what-youre-seeing-in-social-media-and-headlines/","publisher":"Sublime Security","context":"The article cites Sublime Security’s technique of using hidden text from legitimate sources in phishing emails to evade AI-based email security systems.","category":"","primary":false},{"title":"A Flaw in Claude’s Browser Extension Allows Any Extension to Hijack It","url":"https://layerxsecurity.com/blog/a-flaw-in-claudes-browser-extension-allows-any-extension-to-hijack-it/","publisher":"LayerX Security","context":"The article details the ClaudeBleed vulnerability disclosed by LayerX, which lets any Chrome extension hijack Claude’s browser extension and issue commands.","category":"","primary":false},{"title":"Reading Between the Pixels: Assessing Prompt Injection Attack Success in Images","url":"https://blogs.cisco.com/ai/reading-between-the-pixels-assessing-prompt-injection-attack-success-in-images","publisher":"Cisco","context":"The article mentions a study from Cisco showing that adversarial text rendered as images can bypass safety filters in vision language models.","category":"","primary":false},{"title":"Prompts Become Shells: RCE Vulnerabilities in AI Agent Frameworks","url":"https://www.microsoft.com/en-us/security/blog/2026/05/07/prompts-become-shells-rce-vulnerabilities-ai-agent-frameworks/","publisher":"Microsoft","context":"The article references Microsoft’s advisory on CVE-2026-25592 and CVE-2026-26030, which allow host-level remote code execution via prompt injection in Semantic Kernel.","category":"","primary":false},{"title":"Is That a Bad Apple in Your Pocket? We Used Prompt Injection to Hijack Apple Intelligence","url":"https://www.rsaconference.com/library/blog/is-that-a-bad-apple-in-your-pocket-we-used-prompt-injection-to-hijack-apple-intelligence","publisher":"RSA Conference (authors not specified)","context":"The article notes the use of Neural Exec and Unicode right-to-left override to bypass Apple’s input/output filters and hijack Apple Intelligence, as presented at RSAC.","category":"","primary":false},{"title":"WebPromptTrap: New Indirect Prompt Injection Vulnerability","url":"https://www.catonetworks.com/blog/webprompttrap-new-indirect-prompt-injection-vulnerability/","publisher":"Cato Networks","context":"The article describes Cato Networks’ disclosure of WebPromptTrap, an indirect prompt injection in BrowserOS that tricks users into authorizing actions via an AI summary.","category":"","primary":false},{"title":"ToxicSkills: Malicious AI Agent Skills on ClawHub","url":"https://snyk.io/blog/toxicskills-malicious-ai-agent-skills-clawhub/","publisher":"Snyk","context":"The article summarizes a Snyk audit of 3,984 AI agent skills that found 13.4% contained critical issues such as malware distribution and exposed secrets.","category":"","primary":false},{"title":"Sandboxed AI Agents Attack Surface","url":"https://www.lasso.security/blog/sandboxed-ai-agents-attack-surface","publisher":"Lasso Security","context":"The article references Lasso Security’s research on attacks targeting NemoClaw, NVIDIA’s reference stack, to exfiltrate OpenClaw data via a malicious repository or npm package.","category":"","primary":false},{"title":"AI Use in Malware","url":"https://unit42.paloaltonetworks.com/ai-use-in-malware/","publisher":"Unit 42, Palo Alto Networks","context":"The article cites Unit 42 research showing threat actors using LLMs to write adaptive malware and offload decision-making to avoid detection.","category":"","primary":false},{"title":"AI Software Security Risks","url":"https://unit42.paloaltonetworks.com/ai-software-security-risks/","publisher":"Unit 42, Palo Alto Networks","context":"The article quotes Unit 42 warning that frontier AI models could empower adversaries to exploit zero-days at an unprecedented scale.","category":"","primary":false},{"title":"Autonomous AI Cloud Attacks","url":"https://unit42.paloaltonetworks.com/autonomous-ai-cloud-attacks/","publisher":"Unit 42, Palo Alto Networks","context":"The article details a proof-of-concept agent named Zealot, demonstrated by Unit 42, that conducts end-to-end cloud attacks by chaining reconnaissance, exploitation, and exfiltration with minimal human guidance.","category":"","primary":false}],"body":"\u003cp\u003eSecurity researchers at Permiso disclosed a vulnerability named ChatGPhish that weaponizes ChatGPT’s implicit trust in Markdown content from summarized web pages. The flaw allows attackers to embed phishing links, auto-fetched remote images, fake security alerts, and QR codes directly into the assistant’s trusted UI. This turns any harmless-looking page an employee asks ChatGPT to summarize into a phishing surface.\u003c/p\u003e\n\n\u003cp\u003eWhen ChatGPT renders the summary, it automatically fetches attacker-hosted images and makes Markdown links clickable without additional user interaction. In a proof-of-concept, the technique leaks the victim’s IP address, browser metadata, and can display spoofed system warnings or trick users into scanning a malicious QR code on a mobile device—bypassing desktop URL filters and enterprise controls. The attack highlights how summarization itself becomes an adversarial vector, expanding phishing beyond email into the browser.\u003c/p\u003e\n\n\u003cp\u003eThe ChatGPhish discovery arrives amid a wave of AI-focused attack research. The article also details SymJack and TrustFall attacks that achieve remote code execution on AI coding agents, as well as a range of prompt injection, jailbreak, supply chain, and autonomous agent methods targeting frontier models and agentic workflows.\u003c/p\u003e\n"},{"n":11,"title":"What 2,000 Exposed Vibe-Coded Apps Reveal About the Limits of Most Security Stacks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/what-2000-exposed-vibe-coded-apps.html","time":"10:30","priority":"SHOULD READ","score":80,"tldr":"Employees are using AI vibe-coding platforms to build and publicly deploy applications that connect to sensitive corporate systems, and most security stacks miss this because they lack visibility into the full browser session where the entire build, data movement, and publishing process occurs.","briefOverview":"\u003cp\u003eEmployees are using AI vibe-coding platforms to build complete applications that connect to production corporate systems and are published on the open internet, often without any access controls. A Red Access investigation found over 2,000 such applications containing sensitive corporate, operational, or personal data, deployed across six continents and every industry, while organizations continued to pass their audits.\u003c/p\u003e\n\n\u003cp\u003eThis new wave of Shadow AI escapes detection by mature security stacks because EDR, DLP, CASB, and network tools each see only fragments of the activity, missing the full browser session where the entire build, OAuth grants, data movement, and deployment occur. The article argues that session-layer visibility is the only effective control point and recommends immediate non-technical steps: directly asking employees what they\u0026rsquo;ve built, mapping the connections and public exposure of each application, and creating a sanctioned path for future development.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes a fundamental shift in Shadow AI: from employees pasting sensitive data into chatbots to non-developers building and deploying full business applications using vibe-coding platforms. These custom-built apps are wired into sanctioned CRMs, ERPs, BI tools, and ticketing systems, then published on the open internet with the security defaults left at whatever the builder configured—often none, including open admin access. The result is a shadow application surface that sits directly on the public internet, bypassing IT and Security entirely.\u003c/p\u003e\n\n\u003cp\u003eResearch by Red Access surfaced over 380,000 publicly accessible web assets on leading vibe-coding platforms. Of these, roughly 5,000 appeared to be corporate, and more than 2,000 held sensitive corporate, operational, or personal data. None had basic access controls, and many granted administrator-level access to anyone reaching the URL. These exposures spanned every industry across six continents and remained live while organizations successfully passed security audits, highlighting a dangerous visibility gap.\u003c/p\u003e\n\n\u003cp\u003eExisting security stacks systematically miss this threat because they operate in signal fragments. Endpoint Detection and Response (EDR) sees nothing more than benign browser activity on managed devices and is blind to personal laptops and BYOD machines. Data Loss Prevention (DLP) flags known chat interfaces but cannot see an API-based data flow from a vibe-coded app to a cloud BI tool. Cloud Access Security Brokers (CASB) treat an entire vibe-coding platform as one sanctioned vendor and cannot distinguish thousands of custom applications living on its subdomains. Firewalls and SSE see traffic to the platform\u0026rsquo;s domain but lack the application-as-a-business-object context needed to identify individual published apps.\u003c/p\u003e\n\n\u003cp\u003eThe entire build-and-deploy lifecycle—platform choice, OAuth consent to enterprise systems, data movement, and the click to publish—happens inside a single web session. A control positioned at this session layer therefore sees the complete risk narrative, from the individual builder to the exact corporate connections and the public URL, regardless of whether the device is managed or unmanaged, corporate or personal. The article positions session-layer visibility as the natural answer to a risk that is created entirely at the browser.\u003c/p\u003e\n\n\u003cp\u003eFor immediate mitigation, the piece prescribes four non-technical steps. First, run a direct workforce inquiry that frames the effort as an inventory, not an audit, to surface what employees have already built. Second, map each discovered application’s connections to corporate systems, the mechanism (OAuth, API key, manual upload), and its public reachability. Third, establish a sanctioned path with approved platforms, acceptable data categories, and minimum authentication standards—making it easier to comply than to hide. Finally, accept that the process is continuous, as new applications will keep being created, and adopt an ongoing discovery practice at the session layer where the activity occurs.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"introduction-the-new-face-of-shadow-ai\"\u003eIntroduction: The New Face of Shadow AI\u003c/h2\u003e\n\n\u003cp\u003eThe article opens by redefining Shadow AI. Previously, it meant employees pasting sensitive information into ChatGPT. Today, it means employees building entire business applications using AI-driven development platforms (vibe coding), connecting those applications to production systems, and publishing them openly on the internet—without any Security or IT involvement. The artifact has moved from a prompt to a product, and the risk surface has expanded accordingly.\u003c/p\u003e\n\n\u003ch2 id=\"scope-of-the-exposure-the-red-access-report\"\u003eScope of the Exposure: The Red Access Report\u003c/h2\u003e\n\n\u003cp\u003eRed Access published a report titled \u003cem\u003eThe Shadow Builders\u003c/em\u003e, which identified more than 380,000 publicly accessible web assets across leading vibe-coding platforms. From that population, approximately 5,000 assets appeared corporate in nature, and over 2,000 of those contained sensitive corporate, operational, or personal data. These applications were deployed without basic access controls and frequently granted admin-level access to anyone who visited the URL. The exposure spanned six continents and covered every industry examined. Critically, the organizations involved were passing their security audits while these applications remained live and unprotected.\u003c/p\u003e\n\n\u003ch2 id=\"how-shadow-builders-differ-from-traditional-shadow-it\"\u003eHow Shadow Builders Differ from Traditional Shadow IT\u003c/h2\u003e\n\n\u003cp\u003eTraditional Shadow IT was bounded: a team might purchase a Trello account on a corporate card without telling IT, but the data resided inside an unsanctioned SaaS vendor where some form of identity, audit log, and governance surface existed. Shadow Builders invert this model. The application is custom-built by the employee, the data is loaded directly, the integrations are programmatic connections to sanctioned systems of record (CRMs, ERPs, BI platforms, ticketing tools), and the resulting artifact is often published to the open internet. The platform underneath may be audited, but the application built on it is not. There is only the builder, the platform, and the public URL; IT is largely absent.\u003c/p\u003e\n\n\u003ch2 id=\"blind-spots-in-mature-security-stacks\"\u003eBlind Spots in Mature Security Stacks\u003c/h2\u003e\n\n\u003cp\u003eExisting security tools are performing as designed, but the Shadow Builder risk sits in the gaps between them:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eEDR (Endpoint Detection and Response):\u003c/strong\u003e Sees the browser process but cannot see the build activity inside it. To an endpoint agent, a Shadow Builder using a vibe-coding platform looks like ordinary, non-malicious browser traffic. Where deeper visibility exists, it is limited to managed devices and managed browsers; personal laptops, contractor machines, BYOD devices, and personal browser tabs remain invisible.\u003c/p\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eDLP (Data Loss Prevention):\u003c/strong\u003e Watches enumerated channels and can flag a user pasting regulated data into a known AI chat. It does not see a vibe-coded application connecting to a sanctioned BI tool via API and moving data cloud-to-cloud, physically bypassing the endpoint.\u003c/p\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eCASB (Cloud Access Security Broker):\u003c/strong\u003e Designed for Shadow IT involving known SaaS vendors with discoverable identities. CASB cannot readily distinguish an unbounded population of custom applications hosted on a vibe-coding platform\u0026rsquo;s subdomains from the platform itself. All these applications tend to register as a single approved vendor.\u003c/p\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eFirewall and SSE:\u003c/strong\u003e See traffic to the platform’s domain but lack the application-as-business-object context that would surface individual deployed applications. Moreover, most SASE/SSE deployments are partial and leave the unmanaged-device problem unsolved.\u003c/p\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe collective result is fragments of signal that never assemble into a single, governable picture.\u003c/p\u003e\n\n\u003ch2 id=\"the-case-for-session-layer-visibility\"\u003eThe Case for Session-Layer Visibility\u003c/h2\u003e\n\n\u003cp\u003eEnd-to-end, vibe coding is fundamentally a web-session event. The build occurs in the browser. The OAuth grant that links the new application to a sanctioned enterprise system is a browser event. The data moved into the application travels through the session. The deployment—the click that turns the build into a live application at a public URL—is a browser event within the same tab. Every step happens at the session layer, not adjacent to it.\u003c/p\u003e\n\n\u003cp\u003eA control positioned at the session layer therefore sees the entire build path: the platform used, the corporate systems connected and by what mechanism, the data moving in and out, and the publish event that places the application on the open internet. This view is attributable to a specific person and a specific application instance, irrespective of which browser was used, which network path the traffic took, or whether the device is a corporate-issued laptop or a contractor\u0026rsquo;s personal machine.\u003c/p\u003e\n\n\u003ch2 id=\"immediate-actionable-steps\"\u003eImmediate Actionable Steps\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends four non-technical moves for security teams:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eDiscovery:\u003c/strong\u003e Ask employees directly what they have built. Frame the inquiry as an inventory effort rather than an audit to encourage honest responses. A workforce-wide message inquiring about tools built using AI development platforms will surface more than a policy memo or tooling deployment.\u003c/p\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eMapping:\u003c/strong\u003e For each application surfaced, capture which corporate systems it connects to, how the connection is made (OAuth, API key, manual upload—each leaves a different audit trail), and whether the application is publicly reachable. Public reachability is the most actionable short-term signal.\u003c/p\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eSanctioned Path:\u003c/strong\u003e Provide employees with a clear, low-friction alternative. Name approved platforms, define acceptable data categories, and set a minimum authentication standard. The goal is to make the sanctioned path easier than hiding the activity.\u003c/p\u003e\u003c/li\u003e\n\n\u003cli\u003e\u003cp\u003e\u003cstrong\u003eContinuous Process:\u003c/strong\u003e Accept that the picture will change. Vibe-coded applications are constantly being created. A one-month inventory will be incomplete the next. The mature posture is continuous discovery at the session layer where the activity actually happens.\u003c/p\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"conclusion-the-platform-landscape-and-red-access\"\u003eConclusion: The Platform Landscape and Red Access\u003c/h2\u003e\n\n\u003cp\u003eThe article closes by noting that the category will mature and platforms will recalibrate defaults, but none of these adaptations are finished. The exposure already exists in most enterprises. Red Access is described as an agentless, session-layer security platform purpose-built for this use case, providing SSE-grade visibility and governance at the session itself across any browser and any device, including unmanaged ones.\u003c/p\u003e\n","keyPoints":["Red Access identified more than 2,000 publicly accessible vibe-coded applications containing sensitive corporate, operational, or personal data, deployed without basic access controls and often granting admin access by default.","This new Shadow AI shifts from unsanctioned prompts to employees building and publishing complete applications that connect directly to sanctioned production systems and sit on the open internet, without IT or Security involvement.","Mature security stacks (EDR, DLP, CASB, firewall/SSE) miss these exposures because they only see fragments of the activity and lack visibility into the full browser session where building, data movement, and publishing happen.","Every step of vibe coding—platform use, OAuth grants, data transfer, and deployment—occurs at the web session layer, so visibility at that layer reveals the entire build path and risk regardless of whether the device is managed.","The article recommends immediate non-technical actions: directly ask employees what they’ve built, map each application’s corporate connections and public reachability, and establish a sanctioned path with approved platforms and minimum authentication standards."],"insights":["Organizations are passing security audits while over 2,000 publicly exposed, vibe-coded apps containing sensitive data remain live and undetected by existing security tools.","Unlike traditional Shadow IT where unsanctioned apps still sit inside a SaaS vendor with some audit trail, custom vibe-coded apps are often published directly to the open internet, eliminating any governance surface.","CASB solutions cannot distinguish between a sanctioned vibe-coding platform and thousands of custom applications hosted on its subdomains, so the entire risk surface can register as a single approved vendor.","A simple, non-judgmental inquiry directly asking employees what they’ve built is more effective for initial discovery than deploying policy memos or new security tooling."],"referencedReports":[{"title":"The Shadow Builders","url":"https://info.redaccess.io/shadow-ai-builders-security-report","publisher":"Red Access","context":"The article references this report as the source for identifying over 380,000 publicly accessible web assets across vibe-coding platforms, with more than 2,000 containing sensitive data and exposed without access controls.","category":"","primary":false}],"body":"\u003cp\u003eEmployees are using AI vibe-coding platforms to build complete applications that connect to production corporate systems and are published on the open internet, often without any access controls. A Red Access investigation found over 2,000 such applications containing sensitive corporate, operational, or personal data, deployed across six continents and every industry, while organizations continued to pass their audits.\u003c/p\u003e\n\n\u003cp\u003eThis new wave of Shadow AI escapes detection by mature security stacks because EDR, DLP, CASB, and network tools each see only fragments of the activity, missing the full browser session where the entire build, OAuth grants, data movement, and deployment occur. The article argues that session-layer visibility is the only effective control point and recommends immediate non-technical steps: directly asking employees what they\u0026rsquo;ve built, mapping the connections and public exposure of each application, and creating a sanctioned path for future development.\u003c/p\u003e\n"},{"n":5,"title":"Man sent to prison for selling data of 7 millions elderly Americans","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/man-sent-to-prison-for-selling-data-of-7-millions-elderly-americans/","time":"11:07","priority":"MAY READ","score":68,"tldr":"A North Carolina man was sentenced to over 10 years in prison for selling the personal data of more than 7 million elderly Americans to Jamaican lottery scammers, resulting in over $9.5 million in victim losses.","briefOverview":"\u003cp\u003eTroy Murray, operating under the alias Steve Dixon, was sentenced to 121 months in prison after pleading guilty to conspiracy to commit wire fraud for selling lead lists. Between 2016 and 2023, he provided names, addresses, phone numbers, and email addresses of over 7 million elderly Americans to Jamaican lottery scammers. He typically charged \u003cspan class=\"math inline\"\u003e\\(500 per list of 100 to 300 names, sending at least 22,000 lists and generating more than \\)\u003c/span\u003e5.2 million in illegal proceeds while causing victim losses exceeding $9.5 million.\u003c/p\u003e\n\n\u003cp\u003eThe sentencing unfolds as elder fraud grows sharply, with the FBI\u0026rsquo;s 2025 Internet Crime Report recording over 200,000 complaints from Americans 60 and older and total losses near \u003cspan class=\"math inline\"\u003e\\(7.8 billion. Murray's son, Cutter Murray, will separately plead guilty to laundering \\)\u003c/span\u003e1.6 million of the illicit funds.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA North Carolina man, Troy Murray, was sentenced to over 10 years in prison for operating a data brokerage funneling personal information of millions of elderly Americans to Jamaican lottery scammers. Murray, who used the pseudonym Steve Dixon, pleaded guilty in January 2026 to conspiracy to commit wire fraud and received 121 months imprisonment, three years of supervised release, and a forfeiture order of $5.2 million. Prosecutors noted his alias became so embedded in Jamaican fraud circles that it appeared in a 2022 song lyric.\u003c/p\u003e\n\n\u003cp\u003eFrom 2016 to 2023, Murray sold lead lists containing full contact details of older Americans to scammers who used them to perpetrate lottery fraud. He charged approximately \u003cspan class=\"math inline\"\u003e\\(500 per list of 100 to 300 names and distributed at least 22,000 such lists. After traditional wire transfer services blocked his accounts, he switched to accepting prepaid gift cards, illustrating the adaptability of the fraud supply chain. The scheme earned him hundreds of thousands of dollars annually, accumulating over \\)\u003c/span\u003e5.2 million in total profits while causing more than $9.5 million in victim losses.\u003c/p\u003e\n\n\u003cp\u003eMurray lavished the proceeds on farm equipment, vehicles, and precious metal collectibles, and funneled about $1.6 million to his son, Cutter Murray, for personal and business use. The Justice Department announced that his son will plead guilty to money laundering for receiving and laundering those funds.\u003c/p\u003e\n\n\u003cp\u003eThe sentencing arrives amid a dramatic uptick in elder fraud nationwide. The FBI’s 2025 Internet Crime Report shows over 200,000 complaints filed by victims aged 60 and older, a 37% increase from the prior year, with total reported losses reaching nearly \u003cspan class=\"math inline\"\u003e\\(7.8 billion (a 59% year-over-year jump). The average loss per complainant rose to \\)\u003c/span\u003e38,500, indicating that criminals are not only targeting more seniors but extracting far larger sums per incident.\u003c/p\u003e\n\n\u003cp\u003eSeparately that same week, the Justice Department filed insider trading charges against a Google security engineer accused of exploiting confidential company data to place bets on the cryptocurrency-based prediction market Polymarket, underscoring the breadth of federal enforcement actions at the time.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"case-overview\"\u003eCase Overview\u003c/h2\u003e\n\n\u003cp\u003eTroy Murray, a 57-year-old from North Carolina, was sentenced to 121 months (more than 10 years) in federal prison on Thursday for selling the personal information of over 7 million elderly Americans to Jamaican lottery scammers. Murray pleaded guilty in January 2026 to one count of conspiracy to commit wire fraud. In addition to the prison term, he was sentenced to three years of supervised release and ordered to forfeit $5.2 million.\u003c/p\u003e\n\n\u003ch3 id=\"the-alias-and-cultural-footprint\"\u003eThe Alias and Cultural Footprint\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eMurray operated under the pseudonym \u003cstrong\u003eSteve Dixon\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe alias became so notorious within Jamaican fraud networks that it was referenced in a 2022 song lyric by a Jamaican musical artist, according to prosecutors.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"the-data-brokerage-scheme-2016-2023\"\u003eThe Data Brokerage Scheme (2016–2023)\u003c/h2\u003e\n\n\u003ch3 id=\"lead-list-composition-and-sales-model\"\u003eLead List Composition and Sales Model\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eMurray sold lead lists that included \u003cstrong\u003enames, phone numbers, physical addresses, and email addresses\u003c/strong\u003e of elderly Americans.\u003c/li\u003e\n\u003cli\u003eEach list typically contained 100 to 300 names and was priced at \u003cstrong\u003e$500 per list\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe buyers were scammers based in Jamaica and elsewhere who used the data to commit \u003cstrong\u003elottery fraud\u003c/strong\u003e, a scheme that tricks victims into believing they have won a prize but must pay fees or taxes to collect it.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"scale-and-duration\"\u003eScale and Duration\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eOver the course of the scheme, Murray sent at least \u003cstrong\u003e22,000 lead lists\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eHis annual earnings were in the hundreds of thousands of dollars, totaling more than \u003cstrong\u003e$5.2 million\u003c/strong\u003e in illicit proceeds.\u003c/li\u003e\n\u003cli\u003eThe resulting \u003cstrong\u003evictim losses exceeded $9.5 million\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"payment-method-adaptation\"\u003ePayment Method Adaptation\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eInitially, Murray received payments through wire transmission services.\u003c/li\u003e\n\u003cli\u003eAfter those platforms blocked him, he pivoted to requiring payment via \u003cstrong\u003eprepaid gift cards\u003c/strong\u003e, highlighting a common evasion tactic in cyber-enabled fraud.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"money-laundering-and-asset-purchases\"\u003eMoney Laundering and Asset Purchases\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eMurray used the illegal funds to purchase:\n\n\u003cul\u003e\n\u003cli\u003eFarm equipment\u003c/li\u003e\n\u003cli\u003eVehicles\u003c/li\u003e\n\u003cli\u003ePrecious metal collectibles\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eHe also transferred some of the proceeds to his son, \u003cstrong\u003eCutter Murray\u003c/strong\u003e, for personal and business expenses.\u003c/li\u003e\n\u003cli\u003eIn June 2025, the Justice Department announced that Cutter Murray will plead guilty to \u003cstrong\u003eone count of money laundering\u003c/strong\u003e for receiving and laundering approximately \u003cstrong\u003e$1.6 million\u003c/strong\u003e of the fraudulent funds.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-elder-fraud-context\"\u003eBroader Elder Fraud Context\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe sentencing occurs as elder fraud surges nationwide.\u003c/li\u003e\n\u003cli\u003eAccording to the \u003cstrong\u003eFBI’s 2025 Internet Crime Report\u003c/strong\u003e, Americans aged 60 and older:\n\n\u003cul\u003e\n\u003cli\u003eFiled \u003cstrong\u003eover 200,000 fraud complaints\u003c/strong\u003e last year, a \u003cstrong\u003e37% increase\u003c/strong\u003e over 2024.\u003c/li\u003e\n\u003cli\u003eReported total losses of \u003cstrong\u003enearly $7.8 billion\u003c/strong\u003e, a \u003cstrong\u003e59% year-over-year rise\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe average loss per complainant reached \u003cstrong\u003e$38,500\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis data underscores that while the volume of complaints is growing rapidly, the financial impact per victim is climbing even faster, suggesting more sophisticated or high-value targeting by scammers.\u003c/p\u003e\n\n\u003ch2 id=\"separate-doj-action-google-engineer-insider-trading\"\u003eSeparate DOJ Action: Google Engineer Insider Trading\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe article also notes that the same week, the U.S. Justice Department filed \u003cstrong\u003einsider trading charges against a Google security engineer\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eThe engineer is accused of using confidential company data to place bets on \u003cstrong\u003ePolymarket\u003c/strong\u003e, a cryptocurrency-based decentralized prediction market.\u003c/li\u003e\n\u003cli\u003eWhile unrelated to the elder fraud case, this demonstrates a simultaneous federal push against technology-enabled financial crime.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Troy Murray, using the alias Steve Dixon, was sentenced to 121 months in prison for selling the personal information of over 7 million elderly Americans to Jamaican lottery scammers.","Murray charged $500 per lead list of 100 to 300 names and sent at least 22,000 lists, generating more than $5.2 million in illegal proceeds and causing victim losses exceeding $9.5 million.","Murray used the illicit funds to buy farm equipment, vehicles, and precious metal collectibles, and also sent money to his son Cutter Murray, who will plead guilty to money laundering for receiving $1.6 million.","Elder fraud continues to surge, with elderly Americans filing over 200,000 fraud complaints in 2025, a 37% increase from 2024, and reporting total losses of nearly $7.8 billion."],"insights":["The perpetrator's alias became so notorious within Jamaican fraud rings that it was name-checked in a 2022 song lyric, revealing how data brokers can achieve celebrity status in criminal ecosystems.","After being blocked by wire transmission services, Murray seamlessly pivoted to accepting prepaid gift cards, demonstrating how fraud supply chains rapidly adapt payment methods to evade anti-money laundering defenses.","The sale of at least 22,000 discrete lead lists points to an industrialized, on-demand data brokerage model where scammers can repeatedly purchase fresh, curated victim profiles.","Total elder fraud losses rose 59% year-over-year while complaints increased only 37%, indicating that scammers are not only targeting more victims but extracting significantly larger sums from each one."],"referencedReports":[{"title":"2025 Internet Crime Report","url":"https://www.ic3.gov/AnnualReport/Reports/2025_IC3Report.pdf","publisher":"FBI's Internet Crime Complaint Center (IC3)","context":"The article uses the FBI's 2025 Internet Crime Report to highlight a 37% increase in fraud complaints by elderly Americans and total reported losses of nearly $7.8 billion.","category":"","primary":false}],"body":"\u003cp\u003eTroy Murray, operating under the alias Steve Dixon, was sentenced to 121 months in prison after pleading guilty to conspiracy to commit wire fraud for selling lead lists. Between 2016 and 2023, he provided names, addresses, phone numbers, and email addresses of over 7 million elderly Americans to Jamaican lottery scammers. He typically charged \u003cspan class=\"math inline\"\u003e\\(500 per list of 100 to 300 names, sending at least 22,000 lists and generating more than \\)\u003c/span\u003e5.2 million in illegal proceeds while causing victim losses exceeding $9.5 million.\u003c/p\u003e\n\n\u003cp\u003eThe sentencing unfolds as elder fraud grows sharply, with the FBI\u0026rsquo;s 2025 Internet Crime Report recording over 200,000 complaints from Americans 60 and older and total losses near \u003cspan class=\"math inline\"\u003e\\(7.8 billion. Murray's son, Cutter Murray, will separately plead guilty to laundering \\)\u003c/span\u003e1.6 million of the illicit funds.\u003c/p\u003e\n"},{"n":17,"title":"What’s in the container? Analyzing vulnerabilities, risks and protection with Kaspersky Container Security and the KIRA AI assistant","source":"securelist.com","sourceColorIdx":5,"link":"https://securelist.com/container-security-typical-issues/119974/","time":"07:00","priority":"MAY READ","score":68,"tldr":"Sixty-four out of 100 popular Docker Hub images contained critical vulnerabilities and only 10% were fully updated, demonstrating that containerized infrastructure is highly exposed to attacks and requires thorough, ongoing security scanning, secure configuration management, and timely updates.","briefOverview":"\u003cp\u003eA random sample of 100 popular Docker Hub images revealed that 64 contained critically vulnerable software and only 10% were fully updated, exposing containerized environments to frequent attacks such as cryptocurrency mining, DDoS, and data theft. Insecure configurations like hardcoded passwords in Dockerfiles, passwordless sudo for service accounts, and world-writable directories were also widespread, allowing easy privilege escalation inside containers.\u003c/p\u003e\n\n\u003cp\u003eTo address these risks, the article presents Kaspersky Container Security and its KIRA AI assistant, which analyze container images for vulnerabilities and misconfigurations and provide actionable remediation guidance. The article emphasizes that regular scanning, secure secret management, and timely updates are essential to protect container infrastructure from rapidly weaponized flaws and supply chain compromises.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eModern containerized infrastructure has become a prime target for attackers, who quickly repurpose compromised containers for crypto mining, DDoS, traffic proxying, data theft, and lateral movement. An analysis of 100 popular Docker Hub images showed that 64 contained outdated software with critical vulnerabilities, including known RCE flaws in Redis and nginx, and local privilege escalation bugs in sudo and glibc. Only one in ten images was fully up to date, and a single image was found with a record number of vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eBeyond missing patches, the study uncovered widespread insecure configurations. Dockerfiles and environment variables frequently embedded plaintext passwords that remain in layer history and are accessible to anyone with registry access. Passwordless sudo was granted to unprivileged application users like solr and postgres, and directories with binaries were given world-writable permissions (chmod 777), creating straightforward paths to root privileges and container escape.\u003c/p\u003e\n\n\u003cp\u003eIntegrity controls were similarly neglected. Builds often downloaded archives over unencrypted HTTP or with certificate verification disabled, exposing the supply chain to man-in-the-middle attacks during image creation. The article highlights a real-world incident in March 2026 where malicious code was injected directly into official Trivy and LiteLLM container images, demonstrating that frequent updates without integrity checks introduce their own supply chain risks.\u003c/p\u003e\n\n\u003cp\u003eAttackers exploit these weaknesses with increasing speed. The React Server Components vulnerability CVE-2025-55182 was targeted by multiple campaigns just one day after disclosure, and malware families like Kinsing and perfctl have used privilege escalation exploits (Looney Tunables, PwnKit) to install rootkits and hide their presence. Such techniques are employed both by cryptocurrency miners and self-propagating botnets, making container compromises a stepping stone for broader network intrusions.\u003c/p\u003e\n\n\u003cp\u003eTo combat these threats, the article advocates for comprehensive image scanning at every lifecycle stage, combining vulnerability detection, malware checks, and configuration analysis. Kaspersky Container Security with the KIRA AI assistant is presented as a solution that can automatically detect embedded secrets, excessive privileges, disabled integrity checks, and vulnerable packages, then produce context-aware remediation advice, helping organizations balance security with the need for timely updates.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"introduction-the-container-threat-landscape\"\u003eIntroduction: The Container Threat Landscape\u003c/h2\u003e\n\n\u003cp\u003eContainerization has become a cornerstone of modern development, with Docker Hub serving as the largest public image repository. However, container-hosting infrastructure is a highly attractive target for attackers, who exploit vulnerabilities and misconfigurations to perform DDoS attacks, cryptocurrency mining, traffic proxying, data theft, and even container escape to compromise entire enterprise networks. The infrastructure inside containers is often less frequently updated than traditional servers, and developers may introduce insecure solutions when modifying images for specific environments, making comprehensive security analysis essential.\u003c/p\u003e\n\n\u003ch2 id=\"widespread-vulnerabilities-in-public-images\"\u003eWidespread Vulnerabilities in Public Images\u003c/h2\u003e\n\n\u003cp\u003eA random analysis of 100 popular Docker Hub images with 10,000 to 1 million downloads found that 64 contained outdated software with critical vulnerabilities. Examples include CVE-2025-49844 (RCE in Redis via Lua parser), CVE-2026-24061 (nginx crash with possible RCE under certain configurations), CVE-2025-32463 (local privilege escalation in sudo), and CVE-2023-4911 (Looney Tunables). Only 10% of the scanned images were fully up to date, and one image held a record number of vulnerabilities. The article\u0026rsquo;s dashboard showed the top 10 critical vulnerabilities with available PoCs or exploits, illustrating the practical risk that attackers can leverage.\u003c/p\u003e\n\n\u003cp\u003eCritically, the risk is not theoretical; attackers adopt new vulnerabilities extremely quickly. The CVE-2025-55182 vulnerability in React Server Components was targeted by campaigns involving cryptocurrency miners and Mirai/Gafgyt variants just one day after disclosure. Even local privilege escalation bugs are actively used: the Kinsing malware employed CVE-2023-4911 to gain root privileges, and the perfctl campaign used CVE-2021-4034 (PwnKit) to install rootkits that hide malicious activity. This demonstrates that attackers treat container escape as a practical goal and weaponize vulnerabilities with minimal delay.\u003c/p\u003e\n\n\u003ch2 id=\"insecure-configurations-as-a-primary-attack-vector\"\u003eInsecure Configurations as a Primary Attack Vector\u003c/h2\u003e\n\n\u003cp\u003eEven fully patched images can be compromised through misconfigurations. The analysis identified numerous insecure practices across public images, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eHardcoded credentials:\u003c/strong\u003e Passwords embedded in ENV directives (e.g., Moodle, database passwords) or passed via command-line arguments in healthcheck commands remain in layer history and are extractable by anyone with registry access or process listing capabilities.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eExcessive sudo privileges:\u003c/strong\u003e Configurations that grant passwordless sudo to unprivileged users like \u003ccode\u003esolr\u003c/code\u003e, \u003ccode\u003epostgres\u003c/code\u003e, or the entire \u003ccode\u003esudo\u003c/code\u003e group allow instant root access. One image used \u003ccode\u003eecho 'postgres ALL=(ALL:ALL) NOPASSWD:ALL'\u003c/code\u003e to weaken access control, and another modified \u003ccode\u003e/etc/sudoers\u003c/code\u003e to turn all sudo commands into passwordless ones.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWorld-writable system directories:\u003c/strong\u003e Commands such as \u003ccode\u003echmod 0777 /usr/share/cargo\u003c/code\u003e gave any container user write access to binary directories, enabling privilege escalation by replacing executables.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMissing integrity checks:\u003c/strong\u003e Downloads over plain HTTP or with \u003ccode\u003e--no-check-certificate\u003c/code\u003e flag (e.g., for PHPVirtualBox distributions) exposed the build process to man-in-the-middle attacks, allowing attackers to inject malicious code during image creation.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"the-update-supply-chain-dilemma\"\u003eThe Update-Supply Chain Dilemma\u003c/h2\u003e\n\n\u003cp\u003eFrequent updates that patch vulnerabilities also introduce new risks. The article notes a notable supply chain attack in March 2026, where malicious code was injected directly into the official container images of the Trivy and LiteLLM projects. This creates a difficult trade-off: infrequent updates leave known flaws unpatched, while frequent updates expose the environment to potentially compromised dependencies or base images. The recommended approach is to pin dependencies to known-good versions, verify checksums, and scan every updated image for malware.\u003c/p\u003e\n\n\u003ch2 id=\"detecting-and-mitigating-container-threats-with-kira\"\u003eDetecting and Mitigating Container Threats with KIRA\u003c/h2\u003e\n\n\u003cp\u003eKaspersky Container Security integrates an AI assistant named KIRA that analyzes container images for vulnerabilities and misconfigurations. KIRA goes beyond standard rule-based scanning by understanding context; it identifies hardcoded secrets, excessive privileges, disabled certificate verification, and missing integrity checks, and provides explicit remediation steps. For example, it recommended using \u003ccode\u003egosu\u003c/code\u003e instead of passwordless sudo, generating temporary passwords at runtime rather than storing them in layers, and verifying SHA256 hashes against trusted sources. The article highlights how KIRA helped dissect real Dockerfile snippets, turning complex insecure configurations into actionable fixes.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eThe findings confirm that containerized infrastructure is both the simplest and most lucrative target for attackers. With 64% of popular images carrying critical vulnerabilities, widespread credential exposure, and rapid exploitation timelines, organizations must adopt a comprehensive security lifecycle: audit configurations, manage secrets securely, apply updates promptly, scan images for malware at every change, and leverage specialized tools like Kaspersky Container Security to maintain visibility and compliance.\u003c/p\u003e\n","keyPoints":["In an analysis of 100 popular Docker Hub images, 64 contained outdated software with critical vulnerabilities and only 10% were fully up to date.","Insecure configurations such as hardcoded passwords in Dockerfiles, passwordless sudo for unprivileged users, and world-writable directories were found in many images, enabling privilege escalation and container compromise.","Attackers quickly leverage both remote and local vulnerabilities to use compromised containers for cryptocurrency mining, DDoS attacks, data theft, and lateral movement, as demonstrated by the Kinsing and perfctl campaigns.","Supply chain attacks are a tangible risk, exemplified by a March 2026 incident where malicious code was injected directly into official Trivy and LiteLLM container images.","Kaspersky Container Security with the KIRA AI assistant can detect vulnerabilities, misconfigurations, and integrity issues, and provide specific remediation guidance."],"insights":["Frequently updating container images to patch vulnerabilities paradoxically increases the risk of supply chain compromise, forcing a trade-off that requires pinning dependencies and scanning every update.","Secrets embedded in Dockerfile ENV instructions persist in image layer history and are extractable by anyone with registry access, not just those who run the container.","Many image builds download dependencies over unencrypted HTTP or with certificate verification disabled, making the build process itself susceptible to man-in-the-middle attacks that can inject malicious code.","Local privilege escalation exploits such as PwnKit are actively used in container malware campaigns to install rootkits and hide malicious activity, demonstrating that attackers treat container escape as a practical and desirable goal.","A critical vulnerability in React Server Components was targeted by multiple attack campaigns just one day after disclosure, confirming that weaponization timelines for container-accessible flaws are now extremely short."],"referencedReports":[{"title":"CVE-2025-55182 Exploitation","url":"https://securelist.com/cve-2025-55182-exploitation/118331/","publisher":"Securelist (Kaspersky)","context":"The article references this Securelist analysis to show that attackers began exploiting the React Server Components vulnerability just one day after its disclosure, as observed by Kaspersky honeypots.","category":"","primary":false},{"title":"Dero miner infects containers through Docker API","url":"https://securelist.com/dero-miner-infects-containers-through-docker-api/116546/","publisher":"Securelist (Kaspersky)","context":"Cited as an example of a malicious campaign where compromised containers automatically search for and infect new targets, illustrating the self-propagation risk.","category":"","primary":false},{"title":"Critical supply chain attack on Trivy and LiteLLM","url":"https://www.kaspersky.com/blog/critical-supply-chain-attack-trivy-litellm-checkmarx-teampcp/55510/","publisher":"Kaspersky Blog","context":"Referenced as a real-world supply chain incident in March 2026 where malicious code was injected directly into official container images, underscoring the risk of frequent updates.","category":"","primary":false}],"body":"\u003cp\u003eA random sample of 100 popular Docker Hub images revealed that 64 contained critically vulnerable software and only 10% were fully updated, exposing containerized environments to frequent attacks such as cryptocurrency mining, DDoS, and data theft. Insecure configurations like hardcoded passwords in Dockerfiles, passwordless sudo for service accounts, and world-writable directories were also widespread, allowing easy privilege escalation inside containers.\u003c/p\u003e\n\n\u003cp\u003eTo address these risks, the article presents Kaspersky Container Security and its KIRA AI assistant, which analyze container images for vulnerabilities and misconfigurations and provide actionable remediation guidance. The article emphasizes that regular scanning, secure secret management, and timely updates are essential to protect container infrastructure from rapidly weaponized flaws and supply chain compromises.\u003c/p\u003e\n"},{"n":1,"title":"From $5 Attacks to Botnet-Powered Platforms: Inside the DDoS-as-a- Service Market","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/from-5-attacks-to-botnet-powered-platforms-inside-the-ddos-as-a-service-market/","time":"14:32","priority":"MAY READ","score":55,"tldr":"DDoS attacks have become a cheap, easily accessible service with polished panels and low subscription costs, making sophisticated disruption possible for even unskilled attackers.","briefOverview":"\u003cp\u003eFlare researchers compared underground DDoS-related activity from early 2023 and early 2026 and found that raw advertisements for polished DDoS-as-a-service panels surged tenfold, with unique actors tripling and ad clusters quadrupling. The market has shifted from scattered scripts and tutorials toward branded, easy-to-use web panels offering API access, monthly subscriptions, reseller programs, and explicit claims of Cloudflare bypass.\u003c/p\u003e\n\n\u003cp\u003eAttack prices start as low as \u003cspan class=\"math inline\"\u003e\\(5 for a one-hour disruption, while tiered daily plans and premium botnet offerings reach \\)\u003c/span\u003e2,000, making powerful disruption accessible to low-skill buyers. This commoditization means defenders can no longer assume that a serious DDoS attack requires a sophisticated operator behind the keyboard.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDDoS attacks continue to break records, with Cloudflare mitigating a 7.3 Tbps and later a 31.4 Tbps attack, and Microsoft absorbing a 15.72 Tbps assault attributed to the Aisuru botnet. Against this backdrop, Flare researchers examined underground postings across the first five months of 2023 and 2026, finding that high-signal DDoS service advertisements rose roughly tenfold, unique ad clusters quadrupled, and distinct actors tripled, even as overall records only edged up slightly.\u003c/p\u003e\n\n\u003cp\u003eIn 2023, the landscape was diverse but fragmented, dominated by scripts, leaked tools, tutorials, and generic botnet-service ads that recycled the same marketing copy. By 2026, the same underground channels pivoted to tightly packaged products—brands like SatelliteStress, Areshun, and RebirthStress—that compete on price, ease of use, and visible features such as mission-control panels, API integration, \u003csup\u003e24\u003c/sup\u003e\u0026frasl;\u003csub\u003e7\u003c/sub\u003e customer support, and reseller suitability.\u003c/p\u003e\n\n\u003cp\u003eThe technical pitch has been absorbed into the sales language: advertisements now routinely boast Layer 4 and Layer 7 capabilities, Cloudflare and DDoS-Guard bypass, high connection counts, attack vector statistics, and uptime monitoring. While sellers may exaggerate, the consistency of these claims tells defenders exactly what buyers are being conditioned to value—bypass ability, automation, and speed of deployment over raw traffic volume.\u003c/p\u003e\n\n\u003cp\u003eThe pricing model reveals a deeply segmented market. Entry-level attacks are advertised at \u003cspan class=\"math inline\"\u003e\\(5 an hour, \\)\u003c/span\u003e10 per website, or \u003cspan class=\"math inline\"\u003e\\(25 for a 24-hour “home holder” attack. Mid-tier operators offer daily rates from \\)\u003c/span\u003e100 to \u003cspan class=\"math inline\"\u003e\\(500 based on target strength, and high-end botnet-network offers reach \\)\u003c/span\u003e2,000. This spectrum, together with mentions in public reports of booter subscriptions under $25 per month, confirms that both casual harassers and serious campaigners can find a suitable tier.\u003c/p\u003e\n\n\u003cp\u003eThese trends carry a clear operational message: defenders cannot rely on a high sophistication threshold to filter out disruptive threats. The availability of turnkey DDoS panels with built-in bypass marketing means even low-skill adversaries can mount effective attacks. The unmistakable emphasis on reselling also suggests that the distribution chain is expanding, further amplifying potential attack volumes.\u003c/p\u003e\n\n\u003cp\u003eLooking ahead, the underground market is likely to continue refining its service model, adding deeper automation, clearer pricing tiers, stronger reseller incentives, and more aggressive branding around bypass reliability. The baseline expectation for defenders must therefore rise accordingly.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"the-shifting-underground-ddos-market\"\u003eThe Shifting Underground DDoS Market\u003c/h2\u003e\n\n\u003cp\u003eDDoS attacks aim to overwhelm websites, applications, or networks with traffic from many sources. DDoS-as-a-service removes the need for an attacker to build any infrastructure, packaging this capability into a paid, on-demand offering that is aggressively marketed on underground forums. Flare researchers compared dark-web postings from January–May 2023 with those from January–May 2026 and found a striking transformation in how these services are advertised, priced, and consumed.\u003c/p\u003e\n\n\u003ch2 id=\"recent-attack-scale-as-context\"\u003eRecent Attack Scale as Context\u003c/h2\u003e\n\n\u003cp\u003eWhile the article focuses on the marketplace, it frames the discussion with real-world incidents: Cloudflare blocked a 7.3 Tbps attack in 2025 and later reported mitigating a 31.4 Tbps assault in its Q4 2025 DDoS report; Microsoft disclosed that Azure neutralized a record-breaking 15.72 Tbps attack in October 2025, attributing the activity to the Aisuru botnet. These numbers illustrate the enormous firepower that botnet-powered platforms can command, underscoring the urgency of understanding the market that supplies them.\u003c/p\u003e\n\n\u003ch2 id=\"flare-s-research-approach-and-key-metrics\"\u003eFlare’s Research Approach and Key Metrics\u003c/h2\u003e\n\n\u003cp\u003eFlare scholars searched underground sources for DDoS-related content during the first five months of both 2023 and 2026. After cleaning and curating the data (focusing exclusively on distributed denial-of-service, not single-source DoS offerings), they observed the following changes:\u003c/p\u003e\n\n\u003ctable\u003e\n\u003cthead\u003e\n\u003ctr\u003e\n\u003cth\u003eMetric\u003c/th\u003e\n\u003cth\u003e2023\u003c/th\u003e\n\u003cth\u003e2026\u003c/th\u003e\n\u003cth\u003eChange\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\n\u003ctbody\u003e\n\u003ctr\u003e\n\u003ctd\u003eVolume of records\u003c/td\u003e\n\u003ctd\u003e4,403\u003c/td\u003e\n\u003ctd\u003e4,964\u003c/td\u003e\n\u003ctd\u003eSlight increase\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eHigh-signal DDoS service ads\u003c/td\u003e\n\u003ctd\u003e38\u003c/td\u003e\n\u003ctd\u003e364\u003c/td\u003e\n\u003ctd\u003e~10x increase\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eUnique ad clusters\u003c/td\u003e\n\u003ctd\u003e31\u003c/td\u003e\n\u003ctd\u003e123\u003c/td\u003e\n\u003ctd\u003e~4x increase\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eUnique actors\u003c/td\u003e\n\
