n\u003c/ul\u003e\n\n\u003ch3 id=\"ai-integration-in-operations\"\u003eAI Integration in Operations\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePlatforms used\u003c/strong\u003e: Ideogram AI (image generation), OpenAI ChatGPT, and Google Gemini.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAssisted tasks\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003eDevelopment of LegionRelay\u003c/li\u003e\n\u003cli\u003eCreation of obfuscator and loader scripts\u003c/li\u003e\n\u003cli\u003eBackend infrastructure code\u003c/li\u003e\n\u003cli\u003eGeneration of post-compromise commands\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePerceived advantages\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003eBridges technical skills gaps within the group\u003c/li\u003e\n\u003cli\u003eAccelerates the development lifecycle\u003c/li\u003e\n\u003cli\u003eReduces reliance on previously used malware or tools, making attribution via technical artifacts more difficult\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eObserved drawbacks\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003eThe AI-generated code introduced design flaws into LegionRelay that exposed the malware’s backend functionality.\u003c/li\u003e\n\u003cli\u003eSuch errors are less characteristic of highly sophisticated state actors and reinforce the assessment that GREYVIBE may not be a purely nation-state group.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"cybercrime-ecosystem-ties\"\u003eCybercrime Ecosystem Ties\u003c/h3\u003e\n\n\u003cp\u003eMultiple indicators link GREYVIBE to broader cybercriminal activity:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTool lineage\u003c/strong\u003e: Possible access to and use of an ISO builder suspected to be connected to the TrickBot gang and UAC-0098.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eShared malware in unrelated clusters\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003ePhantomRelay variants appeared in a Microsoft Teams voice phishing campaign (July 2025 – February 2026) documented by Field Effect.\u003c/li\u003e\n\u003cli\u003eThe same variants were also distributed via the KongTuke delivery chain using ClickFix (late February – late March 2026).\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOperational security slip-ups\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003eEarly development and test samples were uploaded to VirusTotal.\u003c/li\u003e\n\u003cli\u003eUse of internet slang terms like “letsrollboyos,” “totallyunsus,” and “cuteuwu” as naming conventions for development artifacts.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFinancial activity\u003c/strong\u003e: The deployment of an XMRig cryptocurrency miner on a small subset of infected machines.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWithSecure confidence levels\u003c/strong\u003e:\n\n\u003cul\u003e\n\u003cli\u003eModerate confidence that the group has ties to the broader cybercrime ecosystem.\u003c/li\u003e\n\u003cli\u003eLow-to-moderate confidence that it includes current or former cybercriminal members.\u003c/li\u003e\n\u003cli\u003eThe exact nature of the group’s relationship to the Russian state remains unclear. It could be a state-backed group that absorbed criminal members, operate independently under state-directed tasking, or exist as a hybrid team.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"implications-for-attribution-and-defense\"\u003eImplications for Attribution and Defense\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBlurred boundaries\u003c/strong\u003e: GREYVIBE straddles the line between cybercrime and state-affiliated espionage, complicating attribution and challenging the traditional categorization of threat actors.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAI impact on artifact reliability\u003c/strong\u003e: Because the group can rapidly generate, refactor, or replace components with AI assistance, clustering techniques that rely on stable technical indicators may become less reliable over time.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eActionable weaknesses\u003c/strong\u003e: The group’s security mistakes—such as uploading samples to VirusTotal and introducing flaws through AI-generated code—offer defenders and intelligence analysts a window into its development process and potential detection opportunities.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["GREYVIBE is a previously undocumented Russian-speaking threat actor that has been targeting Ukraine and Ukraine-related entities since at least August 2025.","The group uses multiple attack vectors, including spear-phishing emails, fake CAPTCHA pages, and fraudulent Ukrainian adult club websites, to deliver malware such as PhantomRelay and FallSpy.","GREYVIBE relies on generative AI and large language models like OpenAI ChatGPT and Google Gemini to assist with malware development, obfuscation scripts, and infrastructure creation.","The threat actor has ties to the broader Russian cybercrime ecosystem, and some of its members are believed to be current or former cybercriminal actors.","The group's use of AI has introduced design flaws into its LegionRelay malware, exposing backend functionality and indicating it may not be a pure nation-state actor."],"insights":["The group's use of AI to frequently regenerate and replace components may undermine traditional attribution methods that rely on stable technical artifacts, forcing defenders to adapt their clustering approaches.","Despite leveraging AI for malware development, GREYVIBE inadvertently introduced design flaws into LegionRelay that exposed backend functionality, showing that AI-assisted coding can create exploitable weaknesses even for threat actors.","The deployment of an XMRig cryptocurrency miner on a small number of LegionRelay-infected machines indicates a financial motivation alongside espionage, further blurring the line between state-directed and cybercriminal activity.","PhantomRelay variants appeared in seemingly unrelated cybercrime campaigns (Microsoft Teams phishing and KongTuke delivery chain), suggesting that GREYVIBE's tools may be shared, sold, or repurposed within the criminal ecosystem, which complicates campaign attribution.","Operational security blunders such as uploading early development and test samples to VirusTotal offer defenders a rare opportunity to track the group's tooling evolution and spot weak signals before fully weaponized attacks."],"referencedReports":[{"title":"GREYVIBE","url":"https://labs.withsecure.com/publications/greyvibe","publisher":"WithSecure","context":"WithSecure researcher Mohammad Kazem Hassan Nejad published an analysis detailing the GREYVIBE threat actor's tactics and tools.","category":"","primary":false},{"title":"Rapid Breach: Social Engineering to Remote Access in 300 Seconds","url":"https://www.nccgroup.com/research/rapid-breach-social-engineering-to-remote-access-in-300-seconds/","publisher":"NCC Group","context":"The article references this research in connection with a Microsoft Teams voice phishing campaign that distributed PhantomRelay variants between July 2025 and February 2026.","category":"","primary":false}],"body":"\u003cp\u003eA newly discovered Russian-speaking threat group named GREYVIBE has been conducting persistent cyberattacks against Ukrainian military, government, civilian, and business organizations since August 2025. The group leverages generative AI tools such as ChatGPT and Gemini to develop custom malware, loaders, and obfuscators, while also relying on deceptive lures like fake CAPTCHA pages and fraudulent adult club websites to deliver remote access trojans and Android spyware.\u003c/p\u003e\n\n\u003cp\u003eGREYVIBE occupies a blurred space between state-directed espionage and cybercrime, with some members believed to have criminal backgrounds and its tools appearing in unrelated cybercriminal campaigns. The group\u0026rsquo;s AI-assisted approach accelerates development and helps evade traditional attribution, but it also introduced exploitable design flaws that exposed backend functionality, indicating a lower level of operational maturity.\u003c/p\u003e\n\n\u003cp\u003eAmong its notable malware are the PowerShell-based PhantomRelay and LegionRelay remote access trojans, along with the FallSpy Android spyware. One infection chain even used WebRTC to capture victim audio and video. The group\u0026rsquo;s activities underscore how AI is being weaponized in the Russo-Ukrainian conflict, while its ties to both state interests and cybercrime make it a difficult actor to categorize.\u003c/p\u003e\n"},{"n":4,"title":"ChatGPT share links abused to host fake outage pages to deliver malware","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/chatgpt-share-links-abused-to-host-fake-outage-pages-to-deliver-malware/","time":"18:21","priority":"MUST READ","score":91,"tldr":"Attackers are exploiting ChatGPT's legitimate content-sharing feature to host convincing fake outage pages that trick users into downloading malware, making malicious links appear trustworthy because they use OpenAI's own domain.","briefOverview":"\u003cp\u003eThreat actors are running Google ads that appear for ChatGPT searches, leading users to a malicious shared ChatGPT page hosted on chatgpt.com. The page displays a fake OpenAI outage notice rendered by ChatGPT\u0026rsquo;s own HTML and CSS generation, urging visitors to download a desktop client.\u003c/p\u003e\n\n\u003cp\u003eClicking the download button takes victims to a fake download portal at openew.app that offers booby-trapped macOS and Windows installers. The site uses cloaking to show a harmless AR/VR page to security scanners, while targeted users receive malware.\u003c/p\u003e\n\n\u003cp\u003eThe campaign, dubbed LLMShare, exploits the legitimate OpenAI domain to evade filters and is part of a wider trend of criminals abusing shared AI conversations on ChatGPT, Claude, and Grok to distribute infostealers and execute ClickFix attacks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article details the \u0026ldquo;LLMShare\u0026rdquo; campaign discovered by Push Security, in which threat actors abuse ChatGPT\u0026rsquo;s content-sharing feature to deliver malware. By purchasing Google ads targeting ChatGPT-related searches, attackers direct users to a shared conversation page on the legitimate chatgpt.com domain.\u003c/p\u003e\n\n\u003cp\u003eInstead of a normal chat, the page displays a rendered fake outage notice stating the web version is temporarily unavailable due to high traffic and instructs visitors to download the desktop app. The notice is built as custom HTML and CSS output produced by a ChatGPT prompt, and its presence is revealed by visible \u0026ldquo;Show code\u0026rdquo; and \u0026ldquo;Remix with ChatGPT\u0026rdquo; controls on the page.\u003c/p\u003e\n\n\u003cp\u003eWhen a user clicks the download button, they are sent to a site at openew.app that impersonates OpenAI\u0026rsquo;s desktop application download portal. The landing page uses cloaking to detect security scanning platforms like URLScan, serving them a benign AR/VR company page while delivering the download page to actual victims.\u003c/p\u003e\n\n\u003cp\u003eThe site offers installers for both macOS and Windows; VirusTotal links for each are provided in the article. The exact payload is unclear, but earlier campaigns abusing AI platform sharing features have distributed infostealers. BleepingComputer\u0026rsquo;s test of the Windows sample on Any.Run showed the malware runs commands to detect whether it\u0026rsquo;s running in a virtual machine, an evasion tactic.\u003c/p\u003e\n\n\u003cp\u003ePush Security also observed similar abuse of Claude Artifacts, where shared rendered applications hosted ClickFix-style lures that trick users into executing malicious commands. The article links to related past incidents where actors used Google ads to push infostealers through shared Claude, ChatGPT, and Grok conversations, demonstrating a persistent trend of weaponizing AI platform sharing capabilities.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview-of-the-llmshare-campaign\"\u003eOverview of the LLMShare Campaign\u003c/h2\u003e\n\n\u003cp\u003eThe article reports on a malvertising campaign dubbed \u0026ldquo;LLMShare,\u0026rdquo; uncovered by Push Security. The campaign uses Google advertisements to redirect users searching for ChatGPT to a malicious shared ChatGPT page hosted on OpenAI\u0026rsquo;s own domain. The shared page is crafted to display a fake outage notice that tricks visitors into downloading malware disguised as the ChatGPT desktop application.\u003c/p\u003e\n\n\u003ch2 id=\"attack-delivery-via-google-ads-and-chatgpt-sharing\"\u003eAttack Delivery via Google Ads and ChatGPT Sharing\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThreat actors purchase Google ads for terms related to ChatGPT, ensuring their sponsored link appears prominently in search results.\u003c/li\u003e\n\u003cli\u003eClicking the ad leads to a legitimate shared ChatGPT conversation URL (\u003ccode\u003echatgpt.com/s/\u003c/code\u003e), exploiting the trust and domain reputation of OpenAI.\u003c/li\u003e\n\u003cli\u003eThe shared page does not show an ordinary chat; instead, it renders a full-page outage notice created using ChatGPT\u0026rsquo;s HTML and CSS rendering capabilities.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"fake-outage-notice-and-social-engineering\"\u003eFake Outage Notice and Social Engineering\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe rendered outage notice states: \u0026ldquo;We\u0026rsquo;re experiencing high traffic right now. Our website is temporarily unavailable due to a large number of users. Download our desktop app to continue.\u0026rdquo;\u003c/li\u003e\n\u003cli\u003eBecause the page is generated by ChatGPT, it includes \u0026ldquo;Show code\u0026rdquo; and \u0026ldquo;Remix with ChatGPT\u0026rdquo; controls, confirming the content is a custom HTML document from a prompt.\u003c/li\u003e\n\u003cli\u003eThe download button within the notice leads to \u003ccode\u003eopenew.app\u003c/code\u003e, a fraudulent site impersonating OpenAI\u0026rsquo;s desktop download portal.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"malicious-download-site-and-cloaking\"\u003eMalicious Download Site and Cloaking\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe openew.app site employs cloaking to selectively serve content. When visited by security platforms like URLScan, it displays a harmless webpage for an AR/VR company, hiding the malicious nature from scanners.\u003c/li\u003e\n\u003cli\u003eWhen accessed by the intended victim, the site offers separate downloads for macOS and Windows. The article includes links to VirusTotal scans of both files:\n\n\u003cul\u003e\n\u003cli\u003emacOS: 7e5b708f6659b1fad3aae7b589a706434fbf21708aeec5af5910189b96e25fef\u003c/li\u003e\n\u003cli\u003eWindows: 641526a22667a527290aac8c2c0358265d85c83318a7caca7cff28cecc2dbc16\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eThe ultimate payloads delivered by these downloads are not specified, though the article notes that earlier campaigns abusing AI sharing features have distributed infostealers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"malware-behavior-and-evasion\"\u003eMalware Behavior and Evasion\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eBleepingComputer tested the Windows version on the sandbox Any.Run. It executes various commands to determine whether the device is a genuine user system or a virtual machine, indicating an active effort to avoid automated analysis.\u003c/li\u003e\n\u003cli\u003eThis VM check is a common technique used to hinder sandboxing and threat research.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-abuse-of-ai-platform-sharing-features\"\u003eBroader Abuse of AI Platform Sharing Features\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003ePush Security also detected attacks exploiting Claude Artifacts to host ClickFix-style lures that prompt victims to run malicious commands.\u003c/li\u003e\n\u003cli\u003eThe article references prior campaigns from earlier in the year:\n\n\u003cul\u003e\n\u003cli\u003eGoogle ads were used to direct users searching for Claude downloads to shared Claude conversations containing malicious installation instructions.\u003c/li\u003e\n\u003cli\u003eShared ChatGPT and Grok conversations were abused to perform ClickFix attacks, impersonating software installation guides that tricked users into executing commands that installed malware.\u003c/li\u003e\n\u003cli\u003eIn one case, a fake Claude AI website delivered a new \u0026lsquo;Beagle\u0026rsquo; Windows malware.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eThese incidents illustrate a pattern of threat actors leveraging the inherent trust and functionality of AI platforms\u0026rsquo; sharing features to bypass security controls and distribute malware.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact-and-takeaway\"\u003eImpact and Takeaway\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eUsers searching for ChatGPT are exposed to advertisements controlled by attackers, who can present convincing lures on OpenAI\u0026rsquo;s own domain.\u003c/li\u003e\n\u003cli\u003eThe abuse of legitimate AI platforms\u0026rsquo; rendering and sharing capabilities blurs the line between trusted and malicious content, making detection more challenging.\u003c/li\u003e\n\u003cli\u003eNo specific response or mitigation from OpenAI is mentioned in the article.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Threat actors use Google ads to direct users searching for ChatGPT to a shared ChatGPT page on chatgpt.com.","The shared page hosts a fake outage notice created with ChatGPT's rendering capabilities, tricking users into downloading a desktop app.","The download button leads to a fake OpenAI download site at openew.app that distributes malware for macOS and Windows.","The malicious site employs cloaking to show harmless content to security scanners while displaying the download page to victims.","Similar campaigns have abused shared conversations on AI platforms like ChatGPT, Grok, and Claude to push infostealers and ClickFix attacks."],"insights":["The phishing page is hosted directly on chatgpt.com through ChatGPT's own sharing and HTML rendering features, exploiting the trusted OpenAI domain to bypass security filters.","The fake outage notice includes 'Show code' and 'Remix with ChatGPT' buttons, which reveal that the page is a custom HTML document generated via a ChatGPT prompt—a subtle fingerprint that could aid detection.","The malware executes commands to check for virtual machine environments, actively evading sandbox analysis and hindering automated threat research.","The same campaign abuses multiple AI platforms—including Claude and Grok—showing a larger pattern of criminals leveraging shared AI conversations to distribute malware.","The malicious download site employs cloaking to display a benign AR/VR company page to security scanners, deliberately extending the attack's lifespan by avoiding automated detection."],"referencedReports":[{"title":"LLMShare Malvertising Campaign","url":"http://pushsecurity.com/blog/llmshare-malvertising-campaign","publisher":"Push Security","context":"The article reports on the LLMShare campaign discovered by Push Security, linking to their blog post detailing the abuse of ChatGPT's sharing feature for malware distribution.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors are running Google ads that appear for ChatGPT searches, leading users to a malicious shared ChatGPT page hosted on chatgpt.com. The page displays a fake OpenAI outage notice rendered by ChatGPT\u0026rsquo;s own HTML and CSS generation, urging visitors to download a desktop client.\u003c/p\u003e\n\n\u003cp\u003eClicking the download button takes victims to a fake download portal at openew.app that offers booby-trapped macOS and Windows installers. The site uses cloaking to show a harmless AR/VR page to security scanners, while targeted users receive malware.\u003c/p\u003e\n\n\u003cp\u003eThe campaign, dubbed LLMShare, exploits the legitimate OpenAI domain to evade filters and is part of a wider trend of criminals abusing shared AI conversations on ChatGPT, Claude, and Grok to distribute infostealers and execute ClickFix attacks.\u003c/p\u003e\n"},{"n":2,"title":"Dutch govt disrupts malware botnet with 17 million infected devices","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/dutch-govt-disrupts-malware-botnet-with-17-million-infected-devices/","time":"14:26","priority":"SHOULD READ","score":85,"tldr":"Dutch authorities dismantled a massive botnet of 17 million infected devices by seizing over 200 servers at a local hosting provider, disrupting the criminal proxy service Asocks.","briefOverview":"\u003cp\u003eDutch police and the National Cyber Security Centre (NCSC) dismantled a botnet of at least 17 million infected devices, seizing more than 200 servers from a hosting provider in the Netherlands.\u003c/p\u003e\n\n\u003cp\u003eThe servers controlled compromised computers, tablets, and smartphones to launch cyberattacks. The botnet was linked by local media to Asocks, a paid proxy service advertising millions of IP addresses, but authorities indicated the device owners were unwitting participants.\u003c/p\u003e\n\n\u003cp\u003eUsers can protect their devices by changing default credentials, applying firmware updates, and disabling remote administration when not needed.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDutch authorities, including the police and the NCSC, took down a massive botnet consisting of at least 17 million infected devices. The operation seized over 200 servers located at a Dutch hosting provider, which subsequently took the botnet offline because it was being used for criminal activities.\u003c/p\u003e\n\n\u003cp\u003eBotnets are networks of compromised devices used for illegal purposes such as distributed denial-of-service (DDoS) attacks, malicious traffic proxying, or cryptocurrency mining. The seized servers directly commanded computers, tablets, and smartphones to carry out these cyberattacks.\u003c/p\u003e\n\n\u003cp\u003eAlthough authorities did not officially name the botnet, local media reported it was linked to Asocks, a commercial “universal proxy service” that claimed 7 million IP addresses across 150 locations and 100,000 clients, with monthly subscriptions between \u003cspan class=\"math inline\"\u003e\\(5 and \\)\u003c/span\u003e15. The NCSC’s intervention suggests that the botnet operated without the consent of device owners, contradicting the voluntary bandwidth-sharing model such proxy services often claim.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer contacted Asocks for comment but received no response by publication time. The investigation established that the infrastructure was hosted entirely in the Netherlands, allowing local authorities to act.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes practical prevention: changing default credentials to strong, unique passwords, applying the latest firmware updates, and disabling remote administration panels when not in use can help keep networking devices from being conscripted into similar botnets.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"dutch-botnet-disruption-summary-and-analysis\"\u003eDutch Botnet Disruption: Summary and Analysis\u003c/h1\u003e\n\n\u003ch2 id=\"operation-overview\"\u003eOperation Overview\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eDutch police, in collaboration with the National Cyber Security Centre (NCSC), disrupted a botnet of at least 17 million infected devices.\u003c/li\u003e\n\u003cli\u003eOver 200 servers were seized from a hosting provider in the Netherlands.\u003c/li\u003e\n\u003cli\u003eThe hosting provider itself took the botnet offline after the police seized servers for investigation, because it was facilitating criminal activities.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"botnet-capabilities-and-scope\"\u003eBotnet Capabilities and Scope\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe botnet controlled a wide range of devices: computers, tablets, and smartphones.\u003c/li\u003e\n\u003cli\u003eThese compromised devices were used to launch cyberattacks, including:\n\n\u003cul\u003e\n\u003cli\u003eDistributed denial-of-service (DDoS) attacks\u003c/li\u003e\n\u003cli\u003eMalicious traffic proxying\u003c/li\u003e\n\u003cli\u003eCryptocurrency mining\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eThe scale (17 million devices) makes it one of the largest botnets disrupted in recent memory.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"identification-and-attribution\"\u003eIdentification and Attribution\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAuthorities did not disclose the botnet\u0026rsquo;s name, but local media reports linked it to \u003cstrong\u003eAsocks\u003c/strong\u003e, a paid proxy service.\u003c/li\u003e\n\u003cli\u003eAsocks markets itself as a \u0026ldquo;universal proxy service\u0026rdquo; with:\n\n\u003cul\u003e\n\u003cli\u003e7 million IP addresses\u003c/li\u003e\n\u003cli\u003e150 locations\u003c/li\u003e\n\u003cli\u003e100,000 clients\u003c/li\u003e\n\u003cli\u003eMonthly subscriptions priced between \u003cspan class=\"math inline\"\u003e\\(5 and \\)\u003c/span\u003e15, with bulk purchase discounts\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003eWhile such services often claim devices volunteer bandwidth via a specialized client in exchange for payment, the NCSC’s action indicates that device owners in this case were \u003cstrong\u003enot\u003c/strong\u003e consenting participants.\u003c/li\u003e\n\u003cli\u003eBleepingComputer contacted Asocks for comment but had not received a response at the time of publication.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"takedown-process-and-response\"\u003eTakedown Process and Response\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe investigation uncovered that all 200 servers used to host the infrastructure were physically located in the Netherlands.\u003c/li\u003e\n\u003cli\u003ePolice seized several servers under warrant; the hosting provider then permanently offline the operation upon learning it was used for crime.\u003c/li\u003e\n\u003cli\u003eThe coordinated effort between law enforcement, the national cybersecurity agency, and the hosting company demonstrates an effective public–private operational model for countering large-scale cybercriminal infrastructure.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"protective-recommendations-for-users\"\u003eProtective Recommendations for Users\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eTo prevent devices from becoming part of a botnet, users should:\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eChange default credentials\u003c/strong\u003e to unique, strong passwords.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eApply the latest firmware updates\u003c/strong\u003e to all networking equipment.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eDisable remote administration panels\u003c/strong\u003e when they are not actively needed.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe takedown highlights the real-world scale of botnets that hide behind commercial proxy services.\u003c/li\u003e\n\u003cli\u003eIt shows that even a service advertising millions of IPs may be built on non-consensual endpoints.\u003c/li\u003e\n\u003cli\u003eThe disruption also underscores the importance of user-side hygiene in limiting the pool of exploitable devices.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Dutch police and the National Cyber Security Centre (NCSC) disrupted a botnet of at least 17 million infected devices and seized more than 200 servers.","The seized servers were located at a hosting provider in the Netherlands.","The servers controlled computers, tablets, and smartphones to carry out cyberattacks.","Local media reported that the botnet was linked to the proxy service Asocks, which advertised having 7 million IP addresses.","The hosting provider took the botnet offline because it was being used for criminal activities."],"insights":["The Asocks service, which marketed itself as a legitimate proxy network relying on voluntary bandwidth sharing, was actually a botnet of infected devices, demonstrating that commercial proxy services can be used to disguise massive non-consensual device exploitation.","The disruption relied on the hosting provider taking the botnet offline after police seizure, highlighting that law enforcement can effectively dismantle such infrastructures by working through local hosting companies rather than the botnet's operators.","The article's advice to change default credentials, apply firmware updates, and disable remote administration when not needed is a direct, actionable means for individuals and organizations to prevent their devices from being conscripted into similar botnets."],"referencedReports":[{"title":"Gezamenlijke actie politie en NCSC legt groot botnetwerk plat","url":"https://www.ncsc.nl/nieuws/gezamenlijke-actie-politie-en-ncsc-legt-groot-botnetwerk-plat","publisher":"National Cyber Security Centre (NCSC)","context":"The article cites an official NCSC news release as the source for details about the joint police and NCSC operation that disrupted the botnet of at least 17 million infected devices and seized over 200 servers.","category":"","primary":false},{"title":"The Validation Gap: Automated Pentesting Answers One Question. You Need Six.","url":"https://hubs.li/Q048zztN0","publisher":"BleepingComputer (sponsored guide)","context":"The article promotes this downloadable guide as covering six surfaces that security teams actually need to validate beyond what automated pentesting tools test.","category":"","primary":false}],"body":"\u003cp\u003eDutch police and the National Cyber Security Centre (NCSC) dismantled a botnet of at least 17 million infected devices, seizing more than 200 servers from a hosting provider in the Netherlands.\u003c/p\u003e\n\n\u003cp\u003eThe servers controlled compromised computers, tablets, and smartphones to launch cyberattacks. The botnet was linked by local media to Asocks, a paid proxy service advertising millions of IP addresses, but authorities indicated the device owners were unwitting participants.\u003c/p\u003e\n\n\u003cp\u003eUsers can protect their devices by changing default credentials, applying firmware updates, and disabling remote administration when not needed.\u003c/p\u003e\n"},{"n":7,"title":"US charges Google security engineer with Polymarket insider trading","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/us-charges-google-security-engineer-with-polymarket-insider-trading/","time":"10:11","priority":"SHOULD READ","score":85,"tldr":"A Google security engineer was charged with insider trading after using confidential company data to place winning bets on Polymarket, netting $1.2 million and highlighting the growing risk of misusing proprietary information on decentralized prediction markets.","briefOverview":"\u003cp\u003eA Google security engineer, Michele Spagnuolo, has been charged with insider trading after using confidential company data to place bets on the decentralized prediction market Polymarket. He accessed an internal tool containing Google’s annual “Year in Search” rankings and, under the alias AlphaRaccoon, bet on whether specific individuals would appear in the trending lists.\u003c/p\u003e\n\n\u003cp\u003eBetween October and December 2025, Spagnuolo allegedly risked around \u003cspan class=\"math inline\"\u003e\\(2.75 million across approximately 25 unlikely outcomes with near-perfect accuracy, collecting roughly \\)\u003c/span\u003e1.2 million in USDC.e when the markets resolved. The FBI traced the AlphaRaccoon account to a payment processor registered in his own name and linked to his Italian identification card, and he later moved the proceeds through multiple cryptocurrency‑swapping services, including one that strips wallet addresses from the blockchain.\u003c/p\u003e\n\n\u003cp\u003eThe case underscores how corporate insiders can misuse proprietary information even on permissionless prediction markets. If convicted, Spagnuolo faces up to 20 years in prison for wire fraud and money laundering, and 10 years for commodities fraud.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMichele Spagnuolo, a 36‑year‑old Google security engineer based in Switzerland, has been criminally charged with insider trading for exploiting confidential company information to profit on the Polymarket decentralized prediction platform. A parallel civil complaint was filed by the Commodity Futures Trading Commission (CFTC) the same day.\u003c/p\u003e\n\n\u003cp\u003eSpagnuolo allegedly used his access to an internal software tool that contained Google’s non‑public “Year in Search” data, which was clearly marked with a red “Google Confidential” banner. Beginning in October 2025, he operated a Polymarket account under the alias “AlphaRaccoon” and placed bets on whether particular individuals would appear in Google’s annual top trending search lists.\u003c/p\u003e\n\n\u003cp\u003eAccording to the criminal complaint, the bets targeted approximately 25 unlikely outcomes with near‑perfect accuracy, while the total amount risked reached around \u003cspan class=\"math inline\"\u003e\\(2.75 million. After Google publicly announced its Year in Search results on December 4, 2025, the AlphaRaccoon account collected approximately \\)\u003c/span\u003e1.2 million in USDC.e winnings, and roughly 3.9 million USDC.e were released to the account over the resolution period.\u003c/p\u003e\n\n\u003cp\u003eThe FBI linked the AlphaRaccoon account to a payment processor account registered in Spagnuolo’s name and associated with an Italian government identification card. As online communities on Discord and X began to speculate that the trader was a Google insider, the AlphaRaccoon username was removed and reverted to a generic alphanumeric wallet address.\u003c/p\u003e\n\n\u003cp\u003eSpagnuolo attempted to obscure the proceeds by routing them through multiple cryptocurrency‑swapping services, including one designed to remove wallet addresses from the blockchain. Nevertheless, U.S. authorities charged him with commodities fraud, wire fraud, and money laundering.\u003c/p\u003e\n\n\u003cp\u003eU.S. Attorney Jay Clayton and CFTC Director of Enforcement David I. Miller emphasized that employees entrusted with confidential business information cannot misappropriate it for personal gain. Spagnuolo faces a maximum sentence of 10 years for the commodities fraud count and 20 years each for the wire fraud and money laundering counts, signaling a strong deterrent effort against insider trading in decentralized finance.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"incident-overview\"\u003eIncident Overview\u003c/h2\u003e\n\n\u003cp\u003eA Google security engineer, Michele Spagnuolo, has been indicted for insider trading after using confidential company data to place winning bets on the Polymarket prediction market. The U.S. Attorney’s Office for the Southern District of New York unsealed a criminal complaint on Wednesday, while the Commodity Futures Trading Commission (CFTC) simultaneously filed a civil enforcement action. Spagnuolo allegedly netted approximately $1.2 million in USDC.e by betting on Google’s non‑public “Year in Search” trending lists.\u003c/p\u003e\n\n\u003ch2 id=\"insider-profile\"\u003eInsider Profile\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eName:\u003c/strong\u003e Michele Spagnuolo\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAge:\u003c/strong\u003e 36\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCitizenship/Residence:\u003c/strong\u003e Italian citizen residing in Switzerland\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eEmployer:\u003c/strong\u003e Google (since 2014)\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRole:\u003c/strong\u003e Security engineer\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"the-confidential-data\"\u003eThe Confidential Data\u003c/h2\u003e\n\n\u003cp\u003eSpagnuolo had access to an internal software tool that contained Google’s annual “Year in Search” data — a ranking of the top trending search terms that is not publicly available until its official announcement. The internal tool displayed a “Google Confidential” banner in red text, clearly marking the data as non‑public and sensitive.\u003c/p\u003e\n\n\u003ch2 id=\"the-trading-scheme\"\u003eThe Trading Scheme\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003ePlatform:\u003c/strong\u003e Polymarket, a cryptocurrency‑based decentralized prediction market.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAlias:\u003c/strong\u003e AlphaRaccoon\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eBetting focus:\u003c/strong\u003e Whether specific individuals would appear on Google’s top trending search lists.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTimeframe:\u003c/strong\u003e Bets placed from approximately October 2025 through the resolution period after the official announcement on December 4, 2025.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eScale:\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003eTotal amount risked: roughly $2.75 million.\u003c/li\u003e\n\u003cli\u003eNumber of unlikely outcomes wagered on: approximately 25.\u003c/li\u003e\n\u003cli\u003eAccuracy: near‑perfect, due to the use of actual internal data.\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWinnings:\u003c/strong\u003e Approximately $1.2 million in USDC.e collected by the AlphaRaccoon account. A release of about 3,914,362 USDC.e (the complaint states “3,914,362 million USDC.e,” likely a typographical error for 3.9 million) to the account occurred between December 4 and December 10, 2025. On or about December 10, the account sent roughly 5.045 million USDC.e to another wallet, Wallet‑0xAf6.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"investigation-and-attribution\"\u003eInvestigation and Attribution\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eTracing:\u003c/strong\u003e The FBI traced the AlphaRaccoon Polymarket account back to a payment processor account that was registered in Spagnuolo’s actual name and linked to an Italian government identification card. This broke the anonymity the defendant had attempted.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCommunity speculation:\u003c/strong\u003e Online platforms (Discord and X, formerly Twitter) observed the betting patterns and began to speculate that AlphaRaccoon was a Google insider. Shortly after this public discussion, the “AlphaRaccoon” username was removed, and the account reverted to a default alphanumeric wallet address, an apparent effort to distance the account from the alias.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"money-laundering-attempts\"\u003eMoney Laundering Attempts\u003c/h2\u003e\n\n\u003cp\u003eAfter receiving the winnings, Spagnuolo moved the illegal proceeds through multiple cryptocurrency‑swapping services. Notably, one of the services used was explicitly designed to remove wallet addresses from the blockchain, an advanced obfuscation technique that nevertheless did not prevent law enforcement from tracking the funds.\u003c/p\u003e\n\n\u003ch2 id=\"legal-actions-and-statements\"\u003eLegal Actions and Statements\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCriminal charges (SDNY):\u003c/strong\u003e\n\n\u003cul\u003e\n\u003cli\u003eCommodities fraud (maximum 10 years in prison)\u003c/li\u003e\n\u003cli\u003eWire fraud (maximum 20 years in prison)\u003c/li\u003e\n\u003cli\u003eMoney laundering (maximum 20 years in prison)\u003c/li\u003e\n\u003c/ul\u003e\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCFTC civil complaint:\u003c/strong\u003e Seeking restitution, disgorgement, civil monetary penalties, and trading and registration bans.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eU.S. Attorney Jay Clayton:\u003c/strong\u003e “Today’s charges reinforce a decades‑old message: corporate insiders cannot use confidential business information to turn a profit in our markets. As alleged, Spagnuolo violated the duties he owed to his employer and used Google’s confidential business information to make more than $1.2 million in trading profits on Polymarket.”\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCFTC Director of Enforcement David I. Miller:\u003c/strong\u003e “Employees who are entrusted with confidential business information cannot misappropriate that information for personal financial gain.”\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe case highlights that insider trading is not limited to traditional securities; it can occur on decentralized prediction markets and involve cryptocurrency.\u003c/li\u003e\n\u003cli\u003eEven with technical obfuscation and a decentralized platform, KYC requirements at the on‑ramp (a payment processor) allowed law enforcement to unmask the trader.\u003c/li\u003e\n\u003cli\u003eThe incident prompted spontaneous crowdsourced intelligence from online communities that sped up exposure of the alias.\u003c/li\u003e\n\u003cli\u003eThe presence of a “Google Confidential” banner on the internal tool did not prevent the misuse, emphasizing that data governance must be accompanied by technical controls and monitoring.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Michele Spagnuolo, a Google security engineer, was charged with insider trading for using confidential 'Year in Search' data to place bets on the Polymarket prediction market.","Under the alias 'AlphaRaccoon,' he placed bets on whether specific individuals would appear on Google's top trending search lists, achieving near-perfect accuracy across approximately 25 unlikely outcomes and risking roughly $2.75 million.","He won approximately $1.2 million in USDC.e after Google publicly announced its Year in Search results on December 4, 2025.","The FBI traced the AlphaRaccoon account to a payment processor account registered in Spagnuolo's name and linked to his Italian identification card.","Spagnuolo subsequently moved the illegal proceeds through multiple cryptocurrency-swapping services, including one that removes wallet addresses from the blockchain, and faces charges carrying a maximum of 20 years in prison."],"insights":["The perpetrator's registration of a payment processor in his own name with a government ID directly contradicted his efforts to remain anonymous on the blockchain, revealing a critical operational security failure.","The swift public speculation on Discord and X about the 'AlphaRaccoon' account being a Google insider caused the trader to remove his alias, demonstrating how crowdsourced surveillance can accelerate leak investigations.","The presence of a 'Google Confidential' banner on the internal data tool did not prevent the insider from misusing the information, underscoring that visual warnings alone are insufficient to deter insider threats."],"referencedReports":[{"title":"The Validation Gap: Automated Pentesting Answers One Question. You Need Six.","url":"https://hubs.li/Q048zztN0","publisher":"Not specified","context":"The article promotes a downloadable guide covering six surfaces to validate beyond automated pentesting tools.","category":"","primary":false}],"body":"\u003cp\u003eA Google security engineer, Michele Spagnuolo, has been charged with insider trading after using confidential company data to place bets on the decentralized prediction market Polymarket. He accessed an internal tool containing Google’s annual “Year in Search” rankings and, under the alias AlphaRaccoon, bet on whether specific individuals would appear in the trending lists.\u003c/p\u003e\n\n\u003cp\u003eBetween October and December 2025, Spagnuolo allegedly risked around \u003cspan class=\"math inline\"\u003e\\(2.75 million across approximately 25 unlikely outcomes with near-perfect accuracy, collecting roughly \\)\u003c/span\u003e1.2 million in USDC.e when the markets resolved. The FBI traced the AlphaRaccoon account to a payment processor registered in his own name and linked to his Italian identification card, and he later moved the proceeds through multiple cryptocurrency‑swapping services, including one that strips wallet addresses from the blockchain.\u003c/p\u003e\n\n\u003cp\u003eThe case underscores how corporate insiders can misuse proprietary information even on permissionless prediction markets. If convicted, Spagnuolo faces up to 20 years in prison for wire fraud and money laundering, and 10 years for commodities fraud.\u003c/p\u003e\n"},{"n":6,"title":"Google Chrome adds session cookie theft protection for all users","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/google-chrome-adds-session-cookie-theft-protection-for-all-users/","time":"12:08","priority":"SHOULD READ","score":82,"tldr":"Google Chrome's Device Bound Session Credentials (DBSC) is now generally available and enabled by default for all users, cryptographically binding session cookies to a device so that stolen cookies cannot be used to hijack accounts.","briefOverview":"\u003cp\u003eGoogle Chrome\u0026rsquo;s Device Bound Session Credentials (DBSC) security feature is now generally available and rolling out to all Google Workspace customers, Workspace Individual subscribers, and users with personal Google accounts. DBSC cryptographically binds session cookies to a user\u0026rsquo;s device by leveraging hardware security chips like the Trusted Platform Module (TPM) on Windows or the Secure Enclave on macOS.\u003c/p\u003e\n\n\u003cp\u003eThe feature prevents attackers from using stolen session cookies to hijack accounts, even if malware harvests them, because the cryptographic private key required to decrypt the cookies exists only on the original device. DBSC shifts the defense model from reactive detection to proactive prevention, ensuring that exfiltrated cookies become useless outside the bound hardware.\u003c/p\u003e\n\n\u003cp\u003eThe protection is enabled by default and administrators cannot disable it for Workspace environments, making it a mandatory upgrade that closes a long-exploited gap where threat actors used stolen cookies to bypass multi-factor authentication.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eIn a major step to combat account hijacking, Google announced that its Device Bound Session Credentials (DBSC) feature is now generally available and being deployed to all Chrome users, including Workspace and personal accounts. First revealed in 2024 and launched in beta in April, DBSC cryptographically ties authentication session cookies to the specific device that generated them, neutralizing one of the most persistent threats in modern identity attacks: cookie theft.\u003c/p\u003e\n\n\u003cp\u003eSession cookies have been a prime target for information-stealing malware because they allow attackers to bypass multi-factor authentication (MFA) entirely. The article details a history of abuse, including threat actors exploiting the undocumented Google OAuth \u0026ldquo;MultiLogin\u0026rdquo; API endpoint to generate fresh cookies after original ones expired. Malware operations like Lumma and Rhadamanthys even claimed the ability to revive expired Google authentication cookies, maintaining persistent access to compromised accounts.\u003c/p\u003e\n\n\u003cp\u003eDBSC works by using the device\u0026rsquo;s hardware security module—such as the TPM on Windows or Secure Enclave on macOS—to generate a unique public/private key pair. Session cookies are encrypted in such a way that they can only be decrypted with the private key stored inside that hardware chip. Even if malware successfully exfiltrates the cookie, the attacker cannot use it on another machine because the cryptographic key is not transferable.\u003c/p\u003e\n\n\u003cp\u003eThe rollout covers all Google Workspace customers, Workspace Individual subscribers, and users with personal Google accounts. Crucially, for Workspace environments, DBSC is enabled by default and cannot be turned off by administrators, meaning every managed user will receive this protection automatically and imperatively.\u003c/p\u003e\n\n\u003cp\u003eThis development directly undermines the tactics previously used by cookie-stealing malware and API abuse. By shifting from reactive detection to proactive prevention, Google ensures that stolen session cookies are effectively rendered useless, blocking attackers from exploiting them regardless of whether the cookies are fresh, expired, or revived through legitimate-looking APIs. Previous recommendations, such as enabling Chrome\u0026rsquo;s Enhanced Safe Browsing and removing malware, remain important but are now reinforced by a hardware-backed safeguard that addresses the root cause.\u003c/p\u003e\n\n\u003cp\u003eBeyond individual account security, the move represents an industry shift toward device-bound session integrity. Google framed DBSC as a fundamental change in how the web can defend against cookie theft, moving from detecting breaches after the fact to architecturally preventing stolen credentials from being used at all.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003eComprehensive Synthesis: Google Chrome’s Device Bound Session Credentials (DBSC) — GA Rollout and Impact\u003c/p\u003e\n\n\u003ch3 id=\"overview\"\u003eOverview\u003c/h3\u003e\n\n\u003cp\u003eGoogle has made its Device Bound Session Credentials (DBSC) security feature generally available in the Chrome browser. The feature cryptographically binds session cookies to a specific device’s hardware security chip, preventing attackers from using stolen cookies to gain unauthorized access to accounts, even if multi-factor authentication (MFA) is bypassed. The rollout covers all Google Workspace customers, Workspace Individual subscribers, and users with personal Google accounts.\u003c/p\u003e\n\n\u003ch3 id=\"what-is-dbsc\"\u003eWhat is DBSC?\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eDBSC uses the device’s Trusted Platform Module (TPM) on Windows or Secure Enclave on macOS to generate a unique public/private key pair.\u003c/li\u003e\n\u003cli\u003eSession cookies are encrypted with a key that can only be decrypted by the hardware-bound private key, meaning the cookie cannot be used on any other device.\u003c/li\u003e\n\u003cli\u003eThe feature is described as shifting the security paradigm from reactive detection to proactive prevention of account takeovers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"historical-context-and-threat-landscape\"\u003eHistorical Context and Threat Landscape\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eFor years, threat actors have stolen session cookies to bypass MFA and hijack accounts.\u003c/li\u003e\n\u003cli\u003eThe article highlights specific abuse of the undocumented Google OAuth \u0026ldquo;MultiLogin\u0026rdquo; API endpoint, which allowed attackers to generate new authentication cookies after stolen ones expired.\u003c/li\u003e\n\u003cli\u003eInformation-stealing malware families such as Lumma and Rhadamanthys claimed the ability to revive expired Google authentication cookies, giving attackers persistent access.\u003c/li\u003e\n\u003cli\u003eAt the time, Google advised users to remove malware and enable Enhanced Safe Browsing, but these measures did not prevent the reuse of stolen cookies on another device.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"dbsc-s-security-mechanism\"\u003eDBSC’s Security Mechanism\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eUpon login, Chrome generates a device-bound key pair using the hardware security chip.\u003c/li\u003e\n\u003cli\u003eThe session cookie is cryptographically sealed such that any attempt to use it on a different machine fails without the private key.\u003c/li\u003e\n\u003cli\u003eBecause the private key never leaves the hardware and cannot be extracted by malware, stolen cookies become inert.\u003c/li\u003e\n\u003cli\u003eGoogle stated: “DBSC reduces the risk of session theft and makes it meaningfully more difficult for malicious actors to exploit stolen session cookies.”\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"rollout-and-operational-details\"\u003eRollout and Operational Details\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eDBSC was first announced in 2024 and became available in beta in April of the same year; it is now generally available.\u003c/li\u003e\n\u003cli\u003eThe rollout is global, covering Workspace customers, personal account users, and Workspace Individual subscribers.\u003c/li\u003e\n\u003cli\u003eFor Google Workspace, DBSC is enabled by default and administrators have no option to disable it, making it a mandatory layer of protection for managed environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"impact-on-known-attack-techniques\"\u003eImpact on Known Attack Techniques\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe MultiLogin abuse technique and cookie revival claims by malware operators are effectively neutralized, because the stolen cookies cannot be decrypted without the original device’s hardware keys.\u003c/li\u003e\n\u003cli\u003eEven if malware is present on the user’s device and exfiltrates cookies, an attacker on a different machine cannot replay them.\u003c/li\u003e\n\u003cli\u003eThis redefines the defense against cookie theft: instead of detecting and expiring stolen sessions, Google removes the possibility of remote reuse entirely.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"google-s-stance-and-previous-advice\"\u003eGoogle’s Stance and Previous Advice\u003c/h3\u003e\n\n\u003cul\u003e\n\u003cli\u003eBefore DBSC, Google urged users to remove malware and enable Enhanced Safe Browsing in Chrome to defend against phishing and malware attacks. Those recommendations remain complementary but DBSC now provides a hardware-enforced guarantee.\u003c/li\u003e\n\u003cli\u003eGoogle characterized DBSC as a “fundamental change” in the web’s capability to defend against this threat, indicating a strategic shift rather than a point fix.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"conclusion\"\u003eConclusion\u003c/h3\u003e\n\n\u003cp\u003eThe general availability of DBSC marks a major advancement in browser-based identity protection. By leveraging on-device cryptographic anchors, Google has created a barrier that nullifies the value of stolen session cookies, directly countering the tactics of sophisticated malware and API abuse. With mandatory enablement for Workspace users, the feature sets a new baseline for session security across the Chrome ecosystem.\u003c/p\u003e\n","keyPoints":["Google Chrome's Device Bound Session Credentials (DBSC) security feature is now generally available and rolling out to all Google Workspace customers, Workspace Individual subscribers, and users with personal Google accounts.","DBSC cryptographically binds session cookies to a device's hardware security chip (such as a TPM or Secure Enclave) so that stolen cookies cannot be used by attackers who lack the corresponding private key.","The feature is enabled by default for Google Workspace customers and cannot be disabled by administrators.","Previously, threat actors abused the Google OAuth 'MultiLogin' API endpoint and used info-stealing malware to revive or reuse stolen authentication cookies for account hijacking.","DBSC shifts the security paradigm from reactive detection to proactive prevention of session cookie abuse."],"insights":["DBSC is enabled by default and cannot be disabled by administrators, making it a mandatory, non-bypassable security upgrade for all Google Workspace environments.","The protection completely neutralizes stolen session cookies—even if malware exfiltrates them, attackers cannot use them without access to the device's hardware-backed private key, effectively eliminating this entire attack vector.","By cryptographically binding sessions to hardware, Google shifted from patching specific OAuth endpoint abuses (like 'MultiLogin') to a root-cause defense that renders cookie replay and revival impossible, regardless of attacker technique."],"referencedReports":[],"body":"\u003cp\u003eGoogle Chrome\u0026rsquo;s Device Bound Session Credentials (DBSC) security feature is now generally available and rolling out to all Google Workspace customers, Workspace Individual subscribers, and users with personal Google accounts. DBSC cryptographically binds session cookies to a user\u0026rsquo;s device by leveraging hardware security chips like the Trusted Platform Module (TPM) on Windows or the Secure Enclave on macOS.\u003c/p\u003e\n\n\u003cp\u003eThe feature prevents attackers from using stolen session cookies to hijack accounts, even if malware harvests them, because the cryptographic private key required to decrypt the cookies exists only on the original device. DBSC shifts the defense model from reactive detection to proactive prevention, ensuring that exfiltrated cookies become useless outside the bound hardware.\u003c/p\u003e\n\n\u003cp\u003eThe protection is enabled by default and administrators cannot disable it for Workspace environments, making it a mandatory upgrade that closes a long-exploited gap where threat actors used stolen cookies to bypass multi-factor authentication.\u003c/p\u003e\n"},{"n":8,"title":"California AG sues 23andMe over 2023 breach exposing health data","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/california-ag-sues-23andme-over-2023-breach-exposing-health-data/","time":"18:08","priority":"SHOULD READ","score":82,"tldr":"California's Attorney General is suing 23andMe for failing to prevent a 2023 credential-stuffing breach that exposed genetic and health data of nearly 7 million users, and for misleading customers about the severity of the incident.","briefOverview":"\u003cp\u003eThe California Attorney General has sued 23andMe (now Chrome Holding Co.) over a 2023 data breach that exposed genetic and health information of nearly 7 million customers, including over 855,000 Californians. The lawsuit alleges the company failed to implement reasonable safeguards against credential stuffing and missed multiple intrusion-detection opportunities. It further accuses 23andMe of making misleading public statements by overstating its security posture before the breach and downplaying the incident’s severity afterwards.\u003c/p\u003e\n\n\u003cp\u003eThe breach originated from a credential-stuffing attack that targeted accounts with weak passwords, but attackers also exploited a coding error in the DNA Relatives feature to access a much larger set of accounts that had not opted in. Exposed data included genetic profiles, health predispositions, ancestry information, and details of biological relatives. The incident already prompted multi-million-dollar fines from national regulators and drove the company to file for bankruptcy, while this new state-level complaint seeks an injunction and statutory penalties of up to $7,500 per violation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCalifornia Attorney General Rob Bonta filed a lawsuit against 23andMe, now known as Chrome Holding Co., for failing to protect sensitive customer genetic and personal data during a 2023 security incident. The breach came to light in October 2023 after threat actors offered stolen records for sale and leaked samples that grew into larger data dumps, later confirmed by the company. The attack reportedly began as a credential-stuffing campaign against accounts with weak credentials but escalated due to a coding error in the DNA Relatives feature, allowing access to data from millions of users who had not opted into that feature.\u003c/p\u003e\n\n\u003cp\u003eIn total, the incident exposed information on roughly 6.9 million customers, including raw genotype data, health predisposition reports, ancestry and ethnicity details, and names of biological relatives and DNA matches. Of those affected, 855,541 were California residents, giving the state a direct interest. The exposed datasets gave attackers a deep look into individuals’ genetic profiles and family connections, raising severe privacy risks.\u003c/p\u003e\n\n\u003cp\u003eAfter the breach, the company attempted to minimize the fallout by suggesting the exposed information was mostly public and by blaming customers for password reuse, while insisting that its systems had not been compromised. The Attorney General contends that these statements were misleading, having followed earlier assurances that the company maintained high security standards. The lawsuit argues this contradiction violated California’s False Advertising Law and Unfair Competition Law.\u003c/p\u003e\n\n\u003cp\u003eThe 2023 breach already had significant consequences: by early 2024, national data protection authorities launched investigations that resulted in multi-million-dollar fines, and the financial pressure helped push 23andMe into bankruptcy. The current California complaint highlights that the bankruptcy dispute over a proposed sale of Californians’ genetic data and biological materials is a separate legal matter, meaning the state’s claims proceed independently.\u003c/p\u003e\n\n\u003cp\u003eThe lawsuit cites multiple violations, including the California Genetic Information Privacy Act, the California Reasonable Data Security Law, the California Consumer Privacy Act, and the two laws mentioned above. It seeks an injunction to prevent further violations and statutory penalties ranging from \u003cspan class=\"math inline\"\u003e\\(1,000 to \\)\u003c/span\u003e7,500 per violation, depending on the specific infraction.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"background\"\u003eBackground\u003c/h2\u003e\n\n\u003cp\u003eCalifornia Attorney General Rob Bonta initiated legal action against 23andMe, which now operates as Chrome Holding Co., in response to a severe data breach that occurred in 2023. The company’s core service involves collecting and analyzing customer genetic and personal information, making the protection of that data a critical responsibility. The lawsuit claims the company failed to meet this responsibility and then compounded the problem through misleading communications.\u003c/p\u003e\n\n\u003ch2 id=\"breach-details\"\u003eBreach Details\u003c/h2\u003e\n\n\u003cp\u003eThe breach became publicly known in October 2023 when threat actors offered to sell a large number of records stolen from 23andMe and leaked initial data samples, later followed by much larger portions of the dataset. 23andMe confirmed the leaked data was authentic and attributed the initial access to a credential-stuffing attack that targeted accounts with weak passwords. However, the intrusion did not stop there: attackers exploited a coding error in the DNA Relatives feature, which allowed them to exfiltrate data from users who had opted into that feature and then to pivot and access a much larger set of accounts that had never used it.\u003c/p\u003e\n\n\u003cp\u003eOverall, the incident exposed sensitive information of approximately 6.9 million customers, with 855,541 being California residents. Exposed data categories included genetic data, health predisposition reports, ancestry and ethnicity information, and details about biological relatives and DNA matches, creating a profound privacy exposure.\u003c/p\u003e\n\n\u003ch2 id=\"company-response-and-alleged-misrepresentations\"\u003eCompany Response and Alleged Misrepresentations\u003c/h2\u003e\n\n\u003cp\u003eBefore the breach, 23andMe publicly asserted that its security practices met high standards. After the breach, the company attempted to downplay the severity by claiming the exposed information was largely public and by blaming users for password reuse. It also stated that its own systems had not been breached, a characterization the Attorney General now calls misleading. These statements form the basis for false advertising and unfair competition claims in the lawsuit.\u003c/p\u003e\n\n\u003ch2 id=\"legal-violations-and-claims\"\u003eLegal Violations and Claims\u003c/h2\u003e\n\n\u003cp\u003eThe Attorney General’s complaint asserts violations of several California laws:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCalifornia Genetic Information Privacy Act\u003c/li\u003e\n\u003cli\u003eCalifornia Reasonable Data Security Law\u003c/li\u003e\n\u003cli\u003eCalifornia Consumer Privacy Act (CCPA)\u003c/li\u003e\n\u003cli\u003eFalse Advertising Law\u003c/li\u003e\n\u003cli\u003eUnfair Competition Law\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe claims center on the company’s failure to implement reasonable safeguards against credential-stuffing attacks, missed opportunities to detect the intrusion earlier, and the failure to identify and fix the DNA Relatives coding error that amplified the breach. The lawsuit further targets the deceptive public statements before and after the incident.\u003c/p\u003e\n\n\u003ch2 id=\"relief-sought\"\u003eRelief Sought\u003c/h2\u003e\n\n\u003cp\u003eThe complaint seeks an injunction prohibiting future violations of the above laws, as well as statutory penalties ranging from \u003cspan class=\"math inline\"\u003e\\(1,000 to \\)\u003c/span\u003e7,500 per violation, depending on the specific circumstances.\u003c/p\u003e\n\n\u003ch2 id=\"bankruptcy-and-separate-proceedings\"\u003eBankruptcy and Separate Proceedings\u003c/h2\u003e\n\n\u003cp\u003ePrior to this state lawsuit, the breach had already led to multiple lawsuits, investigations by national data protection authorities, and multi-million-dollar fines. Those pressures contributed to 23andMe filing for bankruptcy. The California AG’s announcement clarifies that the bankruptcy dispute involving a proposed sale of Californians\u0026rsquo; genetic data and biological materials is a separate legal proceeding, so the state’s enforcement action proceeds independently.\u003c/p\u003e\n","keyPoints":["California Attorney General Rob Bonta sued 23andMe, now Chrome Holding Co., over a 2023 data breach that exposed sensitive genetic and personal information.","The breach affected nearly 7 million customers, including over 855,000 Californians, stemming from a credential-stuffing attack that later exploited the DNA Relatives feature.","Exposed data included genetic data, health predisposition reports, ancestry and ethnicity information, and details of biological relatives and DNA matches.","The lawsuit accuses the company of making misleading public statements by assuring strong security before the breach and then downplaying its severity afterward.","The complaint seeks an injunction and statutory penalties up to $7,500 per violation under California’s genetic privacy, data security, consumer protection, and false advertising laws."],"insights":["The breach's scale was enabled by a coding error in the DNA Relatives feature, meaning the exposure went far beyond credential stuffing and stemmed from a product design flaw.","The AG treats the company's pre-breach security assurances and post-breach downplaying as false advertising and unfair competition, making external communications a separate vector of legal liability.","Although 23andMe filed for bankruptcy, the state is pursuing an injunction and penalties as a distinct proceeding, which could affect the proposed sale of Californians' genetic data.","The lawsuit frames the failure to defend against credential stuffing as a violation of reasonable data security, rejecting the company's argument that breaches caused by password reuse are solely the user's fault."],"referencedReports":[],"body":"\u003cp\u003eThe California Attorney General has sued 23andMe (now Chrome Holding Co.) over a 2023 data breach that exposed genetic and health information of nearly 7 million customers, including over 855,000 Californians. The lawsuit alleges the company failed to implement reasonable safeguards against credential stuffing and missed multiple intrusion-detection opportunities. It further accuses 23andMe of making misleading public statements by overstating its security posture before the breach and downplaying the incident’s severity afterwards.\u003c/p\u003e\n\n\u003cp\u003eThe breach originated from a credential-stuffing attack that targeted accounts with weak passwords, but attackers also exploited a coding error in the DNA Relatives feature to access a much larger set of accounts that had not opted in. Exposed data included genetic profiles, health predispositions, ancestry information, and details of biological relatives. The incident already prompted multi-million-dollar fines from national regulators and drove the company to file for bankruptcy, while this new state-level complaint seeks an injunction and statutory penalties of up to $7,500 per violation.\u003c/p\u003e\n"},{"n":9,"title":"Anthropic confirms Claude Mythos-class models will roll out to the public","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/artificial-intelligence/anthropic-confirms-claude-mythos-class-models-will-roll-out-to-the-public/","time":"00:21","priority":"SHOULD READ","score":82,"tldr":"Anthropic plans to make its powerful Mythos-class AI models publicly available in the coming weeks after implementing stronger safeguards to mitigate the significant security risks that previously restricted them.","briefOverview":"\u003cp\u003eAnthropic has confirmed it will release its restricted Mythos-class AI models to the general public in the coming weeks after delaying the rollout earlier this year over major security risks. Originally announced in April and limited to select companies and security researchers, the model was kept private because Anthropic warned that attackers could gain a short-term advantage from its advanced capabilities if released without strong safeguards.\u003c/p\u003e\n\n\u003cp\u003eAnthropic now states it is making swift progress on developing guardrails and is already allowing a small number of organizations to use the Claude Mythos preview for cybersecurity work. The model shows significant improvements in code reasoning and autonomy—far surpassing the current Opus 4.8 flagship—though the company has not set a firm public release date. A brief, unintended appearance of the Mythos-preview model on the Claude Code platform before being taken offline suggests the model is already moving toward deployment.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAnthropic is preparing to make its most powerful AI system to date available to the general public, reversing a cautious posture adopted earlier this year. In April, the company announced the Mythos model as a restricted release only for select companies and security researchers, explicitly citing major security risks. At that time, Anthropic publicly warned that the party best able to leverage these tools could hold the advantage, noting that in the short term this could be attackers if frontier labs were not careful about how they release such capabilities.\u003c/p\u003e\n\n\u003cp\u003eThe security concern centered on the model’s advanced code reasoning and autonomous behavior. Typical industry practice for AI developers is to hold back highly capable models until robust guardrails are in place to prevent misuse. Anthropic now indicates that those safeguards have advanced enough to consider a full public rollout. In a blog post, the company said it expects to bring Mythos-class models to all customers in the coming weeks, though no precise timeline was offered.\u003c/p\u003e\n\n\u003cp\u003eAs a preliminary step, Anthropic is already providing a small set of organizations access to the Claude Mythos preview specifically for cybersecurity work. It remains unclear whether the exact same model currently used in that program will be the one released to the wider public. The company has emphasized swift progress on developing safeguards, suggesting that real-world adversarial testing by these early partners is part of the validation process.\u003c/p\u003e\n\n\u003cp\u003eThe technical leap is significant: the Mythos model reportedly exhibits major improvements in code reasoning and autonomy, far exceeding the capabilities of Anthropic’s latest flagship, Opus 4.8. This performance delta underscores why the company’s original risk assessment treated the model as too dangerous for unrestricted availability.\u003c/p\u003e\n\n\u003cp\u003eAdding a sense of immediacy, the Mythos-preview model briefly appeared for some users on the Claude Code platform before being taken offline. The incident indicates that the model is already integrated into production pipelines, raising both anticipation and the need to ensure that no wider exposure happens before the official, safeguarded release.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAnthropic has confirmed it will bring its Mythos-class AI models to the general public in the coming weeks, ending a months-long restriction that limited access to a select group of companies and security researchers. The move follows what Anthropic describes as swift progress on security guardrails, enabling a rollout of models that previously posed major risks to public and private software.\u003c/p\u003e\n\n\u003ch2 id=\"background-and-original-restriction\"\u003eBackground and Original Restriction\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe Mythos model was first announced in April as a restricted system, available only to specific partners, including security researchers.\u003c/li\u003e\n\u003cli\u003eAt launch, Anthropic explicitly cited major security risks as the reason for withholding the model from general availability.\u003c/li\u003e\n\u003cli\u003eThe company warned that \u0026ldquo;the advantage will belong to the side that can get the most out of these tools,\u0026rdquo; stating that in the short term attackers could benefit if frontier labs release such models carelessly, while in the long term defenders should gain the upper hand by fixing bugs before new code ships.\u003c/li\u003e\n\u003cli\u003eThis language reflects a calculated acknowledgment that the immediate defensive value of the model is not guaranteed, and that a known window of attacker advantage exists if safeguards are insufficient.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"security-concerns-and-guardrails\"\u003eSecurity Concerns and Guardrails\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAI companies typically avoid deploying highly capable models until misuse-prevention guardrails are robust. Anthropic’s April decision aligned with that principle.\u003c/li\u003e\n\u003cli\u003eThe company now says it has made significant progress on those safeguards, enabling a move toward public release.\u003c/li\u003e\n\u003cli\u003eIn its announcement, Anthropic stated: \u0026ldquo;We’re making swift progress on developing these safeguards and expect to be able to bring Mythos-class models to all our customers in the coming weeks.\u0026rdquo; No specific date was given.\u003c/li\u003e\n\u003cli\u003eThe article does not detail the nature of the guardrails, but the mention of swift progress suggests that the safety engineering challenges are actively being resolved.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"rollout-plans-and-early-access\"\u003eRollout Plans and Early Access\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhile a full public launch is imminent, Anthropic is already allowing a small number of organizations to use the Claude Mythos preview expressly for cybersecurity work.\u003c/li\u003e\n\u003cli\u003eIt is unclear whether the identical model will be released to the general public or if a modified version with different capabilities or constraints will be distributed.\u003c/li\u003e\n\u003cli\u003eThe early access program appears to serve as a final round of real-world security testing before wider release, a common practice for high-risk AI systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-capabilities\"\u003eTechnical Capabilities\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe Mythos model demonstrates major improvements in code reasoning and autonomy compared to Anthropic’s current flagship, Opus 4.8.\u003c/li\u003e\n\u003cli\u003eSuch leaps in autonomous code understanding and generation are precisely what earlier risk assessments flagged as dangerous if left unguarded, because they could accelerate exploitation of vulnerabilities.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"accidental-exposure-on-claude-code\"\u003eAccidental Exposure on Claude Code\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe article notes that the Mythos-preview model briefly appeared on the Claude Code platform for some users before being taken offline.\u003c/li\u003e\n\u003cli\u003eThis incident suggests that the model is already integrated into live deployment infrastructure, raising the stakes for ensuring that access controls and safeguards are fully hardened before the intended public release.\u003c/li\u003e\n\u003cli\u003eThe brief leak also illustrates the operational challenge of managing such powerful models within existing development environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"implications\"\u003eImplications\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eAnthropic’s decision marks a significant shift from caution to a controlled confidence in its safety mechanisms, potentially setting a precedent for how other frontier labs handle ultra-capable models that were previously considered too risky for broad distribution.\u003c/li\u003e\n\u003cli\u003eThe acknowledgment of an attacker advantage window—even as defenses improve—remains a stark warning that the security landscape will be shaped by how quickly organizations can operationalize these tools for defense.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Anthropic confirmed it plans to bring Mythos-class models to the general public in the coming weeks after previously restricting access due to security risks.","The Mythos model was announced in April as a restricted model available only to select companies and security researchers.","Anthropic originally cited major security risks with the Mythos model and warned that attackers could have a short-term advantage if frontier labs release these models carelessly.","Anthropic states it is making swift progress on developing safeguards and is already allowing a small number of organizations to use Claude Mythos preview for cybersecurity work.","The Mythos model shows major improvements in code reasoning and autonomy far above Claude's current flagship model, Opus 4.8."],"insights":["The brief accidental appearance and removal of the Mythos-preview model on Claude Code suggests that the model is already integrated into production pipelines, increasing the risk of an unintentional
