u003ctd\u003e15\u003c/td\u003e\n\u003ctd\u003e41\u003c/td\u003e\n\u003ctd\u003e~3x increase\u003c/td\u003e\n\u003c/tr\u003e\n\n\u003ctr\u003e\n\u003ctd\u003eSources observed\u003c/td\u003e\n\u003ctd\u003e22\u003c/td\u003e\n\u003ctd\u003e43\u003c/td\u003e\n\u003ctd\u003e~2x increase\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp\u003eThis data shows that while the total chatter grew only modestly, the portion directly advertising polished services exploded, and the number of distinct operators and places they appeared expanded significantly.\u003c/p\u003e\n\n\u003ch2 id=\"from-scattered-tools-to-branded-services\"\u003eFrom Scattered Tools to Branded Services\u003c/h2\u003e\n\n\u003ch3 id=\"2023-tools-tutorials-and-generic-pitches\"\u003e2023: Tools, Tutorials, and Generic Pitches\u003c/h3\u003e\n\n\u003cp\u003eIn 2023, posts were diverse and often centered on scripts, leaked tools, instructional content, or generic “botnet service” advertisements. One frequently reposted ad claimed Layer 3, 4, and 7 capabilities, API access, automatic payments, game-server targeting, and Cloudflare bypasses. The identical marketing copy appeared across multiple sources and actors, suggesting reselling or recycled marketing rather than original service development.\u003c/p\u003e\n\n\u003ch3 id=\"2026-product-focused-price-oriented-competition\"\u003e2026: Product-Focused, Price-Oriented Competition\u003c/h3\u003e\n\n\u003cp\u003eBy 2026, the nature of ads had shifted to a recognizable product posture. Examples include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eSatelliteStress\u003c/strong\u003e: Positioned as an IP stresser with a user-friendly panel, API access, game-server support, and monthly plans starting at €20. The ad explicitly claims it is “100% botnet-powered” and does not rely on downstream APIs, aiming to distinguish the service from resellers that depend on another provider’s infrastructure.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAreshun\u003c/strong\u003e: A “Premium DDoS Service” offering Layer 4 and Layer 7 attacks, monitoring, API integration, custom plans, \u003csup\u003e24\u003c/sup\u003e\u0026frasl;\u003csub\u003e7\u003c/sub\u003e support, and promotional discount codes.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRebirthStress\u003c/strong\u003e: A botnet-powered IP/web stressing device with a free Layer 7 hub, more than 400 slots, reselling suitability, and plans starting at $15 per month.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTHORCC-related advertisement\u003c/strong\u003e: Claimed more than 7,000 active Layer 4 bots and promoted bandwidth analytics and attack-vector statistics.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eRussian/English post\u003c/strong\u003e: Touted “professional stress testing” with Cloudflare and DDoS-Guard bypasses, high concurrency, and long attack durations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAcross these ads, the competitive pitch coalesced around ease of use, full automation, privacy promises, reliability, and reselling capacity. Sellers were clearly vying for the same customer base, packaging everything into a commercial-grade facade.\u003c/p\u003e\n\n\u003ch2 id=\"technical-language-becomes-a-sales-feature\"\u003eTechnical Language Becomes a Sales Feature\u003c/h2\u003e\n\n\u003cp\u003eRather than disappearing, technical details were repurposed as marketing ammunition. In 2026, terms like “panel,” “API,” “slots,” “bypass,” “monitoring,” “uptime,” and “support” appear frequently. The ability to claim Layer 4 (network) and Layer 7 (application) attack capability is standard, and the most prized differentiator is bypass: Cloudflare and DDoS-Guard bypass claims are prominently displayed.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that while sellers may exaggerate, the uniform emphasis on these features serves as valuable intelligence. It shows that buyers are being conditioned to value a dashboard, automation, bypass promises, and low-friction launch over raw traffic volume alone.\u003c/p\u003e\n\n\u003ch2 id=\"the-business-model-and-pricing-segmentation\"\u003eThe Business Model and Pricing Segmentation\u003c/h2\u003e\n\n\u003cp\u003ePricing has become remarkably low, lowering the barrier for multiple attacker profiles. Observed offers include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e$5 for a one-hour attack\u003c/li\u003e\n\u003cli\u003e$10 for a website attack\u003c/li\u003e\n\u003cli\u003e$25 for a 24-hour “home holder” attack\u003c/li\u003e\n\u003cli\u003eDaily plans ranging from \u003cspan class=\"math inline\"\u003e\\(100 (SamuraiDD) to \\)\u003c/span\u003e100–$500 for weak/medium/strong targets (POWERDDOS)\u003c/li\u003e\n\u003cli\u003eA premium DDoS botnet attack network advertised for $2,000\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese tiers map to distinct buyer segments:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eLow-skill, low-budget users\u003c/strong\u003e: Cheap tests and short disruptions for casual harassment or experimentation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOne-off attackers\u003c/strong\u003e: Daily pricing for a single disruptive event.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCampaign-level actors\u003c/strong\u003e: Private negotiation for longer or repeat attacks.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eResellers and serious customers\u003c/strong\u003e: High-value infrastructure offers and reseller programs that monetize the service without direct technical skill.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe Akamai note mentioned in the article adds context: booter services can cost less than $25 per month and sometimes provide limited trials, reinforcing how accessible this model has become.\u003c/p\u003e\n\n\u003ch2 id=\"implications-for-defenders\"\u003eImplications for Defenders\u003c/h2\u003e\n\n\u003cp\u003eThe commoditization of DDoS means defenders cannot assume that a disruptive attack originates from a sophisticated threat actor. The same polished service model allows a person with minimal technical knowledge to launch attacks that were once the preserve of skilled botnet operators. The heavy marketing of bypass capabilities signals that attackers are specifically targeting protections like Cloudflare, requiring defenders to continually validate and upgrade their mitigation strategies.\u003c/p\u003e\n\n\u003cp\u003eThe growing reseller ecosystem also merits attention. When a single service provider offers reseller suitability, it can spawn multiple storefronts that extend the reach and volume of attacks, making attribution and disruption more complex.\u003c/p\u003e\n\n\u003ch2 id=\"conclusion\"\u003eConclusion\u003c/h2\u003e\n\n\u003cp\u003eUnderground DDoS activity is no longer just about traffic volume; it is a matured digital service industry competing on ease of use, bypass promises, and pricing. The trends observed by Flare indicate that polished DDoS-as-a-service will likely continue to flourish with clearer pricing tiers, deeper automation, and stronger branding around reliability. The primary takeaway for security teams is that the entry barrier has dropped so low that any online service, regardless of prominence, can be targeted effectively by an attacker who simply knows how to buy an attack.\u003c/p\u003e\n","keyPoints":["DDoS-as-a-service has evolved from scattered scripts and tutorials into polished, easily purchasable products with web panels, API access, monthly plans, and customer support.","Between 2023 and 2026, high-signal DDoS service advertisements increased roughly tenfold, with unique ad clusters quadrupling and unique actors tripling.","Attacks are marketed at very low prices, such as $5 for one hour, $25 for 24 hours, and $100–500 per day, making DDoS accessible to low-skill users.","Sellers now prominently advertise technical capabilities like Layer 4/7 attacks, Cloudflare bypasses, and game-server methods as part of their sales pitch to compete for customers.","The market is segmented into cheap tests for casual users, daily pricing for one-off disruption, and premium infrastructure offers for resellers and more serious adversaries."],"insights":["The consistency of sellers' marketing language, even when likely exaggerated, reveals that buyers prioritize bypass claims (e.g., Cloudflare, DDoS-Guard) and ease of use over raw attack volume, giving defenders intelligence on what targets and attack types to expect.","The emergence of 'reseller suitability' as a marketed feature indicates that DDoS-as-a-service is evolving into a criminal franchising model, enabling individuals to profit from attacks without operating infrastructure, which could amplify attack volume and distribution.","The presence of both $5 one-hour tests and $2,000 botnet networks in the same underground market shows that cheap, disposable attacks may serve as reconnaissance or advertisements for more serious, sustained campaigns.","The explicit mention of 'home holder' attacks and game-server targeting illustrates that DDoS services are being tailored for harassment and niche use cases, expanding the threat landscape beyond traditional business outages to individuals and specialized online communities."],"referencedReports":[{"title":"Defending the Internet: How Cloudflare blocked a monumental 7.3 Tbps DDoS attack","url":"https://blog.cloudflare.com/defending-the-internet-how-cloudflare-blocked-a-monumental-7-3-tbps-ddos/","publisher":"Cloudflare","context":"The article cites Cloudflare's mitigation of a 7.3 Tbps attack in 2025 and references its Q4 2025 DDoS report that later detailed a 31.4 Tbps attack.","category":"","primary":false},{"title":"Defending the cloud: Azure neutralized a record-breaking 15 Tbps DDoS attack","url":"https://techcommunity.microsoft.com/blog/azureinfrastructureblog/defending-the-cloud-azure-neutralized-a-record-breaking-15-tbps-ddos-attack/4470422","publisher":"Microsoft","context":"The article references Microsoft's report of Azure mitigating a 15.72 Tbps DDoS attack in October 2025, attributed to the Aisuru botnet.","category":"","primary":false}],"body":"\u003cp\u003eFlare researchers compared underground DDoS-related activity from early 2023 and early 2026 and found that raw advertisements for polished DDoS-as-a-service panels surged tenfold, with unique actors tripling and ad clusters quadrupling. The market has shifted from scattered scripts and tutorials toward branded, easy-to-use web panels offering API access, monthly subscriptions, reseller programs, and explicit claims of Cloudflare bypass.\u003c/p\u003e\n\n\u003cp\u003eAttack prices start as low as \u003cspan class=\"math inline\"\u003e\\(5 for a one-hour disruption, while tiered daily plans and premium botnet offerings reach \\)\u003c/span\u003e2,000, making powerful disruption accessible to low-skill buyers. This commoditization means defenders can no longer assume that a serious DDoS attack requires a sophisticated operator behind the keyboard.\u003c/p\u003e\n"},{"n":13,"title":"Attackers Use LLM Agent for Post-Exploitation After Marimo CVE-2026-39987 Exploit","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/attackers-use-llm-agent-for-post.html","time":"14:39","priority":"MAY READ","score":0,"tldr":"","briefOverview":"","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":[],"insights":[],"referencedReports":[],"body":""}];

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>

  );
}

function ScoreBar({ score }) {

}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span className="swipe-clock" style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <select value={theme} onChange={(e) => applyTheme(e.target.value)} title="Select theme" aria-label="Select theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
