window.__DL_ARTICLES = [{"n":17,"title":"Microsoft Patches Record 206 Flaws, Including Three Zero-Days and Critical RCE Bugs","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/microsoft-patches-record-206-flaws.html","time":"09:38","priority":"MUST READ","score":96,"tldr":"Microsoft’s June 2026 Patch Tuesday fixes a record 206 vulnerabilities, including three publicly disclosed zero-days and several critical remote code execution flaws in Windows components such as Kernel, HTTP.sys, and DHCP Client. Organizations should prioritize patching internet- and network-facing Windows systems due to the risk of unauthenticated remote compromise and denial-of-service attacks.","briefOverview":"\u003cp\u003eMicrosoft released fixes for a record 206 security vulnerabilities across its software portfolio in its June 2026 update. The release includes 39 Critical and 167 Important flaws, with three vulnerabilities publicly disclosed at the time of release. The issues span privilege escalation, remote code execution, information disclosure, spoofing, security feature bypass, denial-of-service, and tampering vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eThe most severe issues include CVE-2026-45657, a Windows Kernel use-after-free flaw with a CVSS score of 9.8 that could allow remote code execution through specially crafted network traffic. Other critical flaws include CVE-2026-47291 in Windows HTTP.sys and CVE-2026-44815 in Windows DHCP Client, both also rated 9.8. The article highlights that some flaws require no credentials or user interaction, making systems handling network traffic high-priority patch targets.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also addressed multiple security feature bypasses, including BitLocker-related issues and publicly disclosed zero-days such as CVE-2026-50507, CVE-2026-49160, and CVE-2026-45586. CVE-2026-49160 is tied to HTTP2/Bomb, a denial-of-service technique that caused an IIS server to exhaust 64 GB of RAM in about 45 seconds during Calif’s testing. The article says the growing number of patches has been linked to AI-assisted vulnerability discovery, a trend Microsoft and security researchers expect to continue.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft’s June 2026 Patch Tuesday addressed a record 206 vulnerabilities across its software portfolio, including three publicly disclosed flaws. Of these, 39 were rated Critical and 167 Important. The vulnerabilities included 63 privilege escalation flaws, 56 remote code execution flaws, 30 information disclosure flaws, 27 spoofing flaws, 20 security feature bypasses, seven denial-of-service issues, and three tampering vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eThe release also included two non-Microsoft CVEs: CVE-2025-10263, a Windows Kernel privilege escalation issue, and CVE-2026-8863, a UEFI Secure Boot security feature bypass. These fixes came in addition to more than 350 Chromium vulnerabilities addressed by Google, which are relevant because Chromium is used in Microsoft Edge. The article presents the update as unusually large and significant in scope.\u003c/p\u003e\n\n\u003cp\u003eOne of the most prominent fixes is CVE-2026-45657, a Windows Kernel use-after-free vulnerability rated 9.8 on the CVSS scale. Microsoft said an attacker could exploit it by sending specially crafted network traffic to a vulnerable Windows system, potentially causing the Windows kernel to process TCP/IP data in a way that allows code execution with system-level privileges. The article also highlights CVE-2026-47291 in Windows HTTP.sys and CVE-2026-44815 in Windows DHCP Client, both rated 9.8 and described as network-exploitable remote code execution flaws.\u003c/p\u003e\n\n\u003cp\u003eSeveral BitLocker-related security feature bypasses were also patched, including CVE-2026-45585, which is associated with the YellowKey proof-of-concept released by Chaotic Eclipse. Microsoft also addressed CVE-2026-45655, CVE-2026-45658, and CVE-2026-50507, with advisories stating that successful exploitation could let an attacker with physical access bypass BitLocker Device Encryption and access encrypted data. Security researcher Will Dormann assessed CVE-2026-50507 as a fix for the BitLocker bypass known as bitskrieg.\u003c/p\u003e\n\n\u003cp\u003eThe three publicly disclosed zero-days identified in the article are CVE-2026-50507, CVE-2026-49160, and CVE-2026-45586. CVE-2026-49160 is linked to HTTP2/Bomb, a denial-of-service technique that Calif found could exhaust 64 GB of RAM on an IIS server in about 45 seconds. Microsoft introduced a new MaxHeadersCount registry setting to limit the number of HTTP/2 and HTTP/3 request headers as a mitigation against excessive memory use, CPU consumption, and denial-of-service attacks.\u003c/p\u003e\n\n\u003cp\u003eThe article also connects CVE-2026-45586 to a suspected fix for a Chaotic Eclipse zero-day privilege escalation exploit called GreenPlasma, and says the June 2026 update plugs MiniPlasma, described as an incomplete fix for CVE-2020-17103. It notes that Chaotic Eclipse also released a proof-of-concept exploit for a Microsoft Defender zero-day called RoguePlanet. The increasing patch volume is attributed to AI-assisted vulnerability discovery, with researchers quoted as saying that AI is driving higher vulnerability counts and raising questions about patch quality at this scale.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft released fixes for a record 206 security vulnerabilities affecting its software portfolio in the June 2026 Patch Tuesday update. The release included three flaws that had been publicly disclosed at the time of release.\u003c/p\u003e\n\n\u003cp\u003eOf the 206 vulnerabilities, Microsoft rated 39 as Critical and 167 as Important. The flaws covered several vulnerability classes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e63 privilege escalation vulnerabilities\u003c/li\u003e\n\u003cli\u003e56 remote code execution vulnerabilities\u003c/li\u003e\n\u003cli\u003e30 information disclosure vulnerabilities\u003c/li\u003e\n\u003cli\u003e27 spoofing vulnerabilities\u003c/li\u003e\n\u003cli\u003e20 security feature bypass vulnerabilities\u003c/li\u003e\n\u003cli\u003eSeven denial-of-service vulnerabilities\u003c/li\u003e\n\u003cli\u003eThree tampering vulnerabilities\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe update also included two non-Microsoft CVEs: CVE-2025-10263, a privilege escalation vulnerability affecting Windows Kernel, and CVE-2026-8863, a UEFI Secure Boot security feature bypass. The article also notes that these are in addition to more than 350 security flaws Google addressed in Chromium, which is used in Microsoft Edge.\u003c/p\u003e\n\n\u003ch2 id=\"most-severe-remote-code-execution-issues\"\u003eMost severe remote code execution issues\u003c/h2\u003e\n\n\u003cp\u003eA leading vulnerability in the release is CVE-2026-45657, a Windows Kernel use-after-free flaw with a CVSS score of 9.8. Microsoft said exploitation could occur through specially crafted network traffic sent to a vulnerable Windows system.\u003c/p\u003e\n\n\u003cp\u003eAccording to Microsoft, malicious network packets could trigger a flaw in how the Windows kernel processes certain TCP/IP data. Successful exploitation could allow an attacker to run code with system-level privileges without signing in or requiring user interaction.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights two other critical remote code execution vulnerabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-47291, a Windows HTTP.sys integer overflow or wraparound flaw rated 9.8 that allows an unauthorized attacker to execute code over a network.\u003c/li\u003e\n\u003cli\u003eCVE-2026-44815, a Windows DHCP Client stack-based buffer overflow vulnerability rated 9.8 that allows an unauthorized attacker to execute code over a network.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAlex Vovk of Action1 said CVE-2026-44815 requires no credentials or user action and can turn network traffic into a full system compromise. He said an attacker could send specially crafted network traffic to a system configured for DHCP services, and that successful exploitation could allow unauthorized code execution over the network with high impact to confidentiality, integrity, and availability.\u003c/p\u003e\n\n\u003cp\u003eThe article states that DHCP is a core network function and that successful exploitation of CVE-2026-44815 could lead to server compromise, malware deployment, data theft, service disruption, and deeper movement into the network. Systems handling DHCP traffic are described as high-priority patch targets.\u003c/p\u003e\n\n\u003ch2 id=\"bitlocker-security-feature-bypasses\"\u003eBitLocker security feature bypasses\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft released patches for CVE-2026-45585, a Windows BitLocker security feature bypass vulnerability with a CVSS score of 6.8. The article says a proof-of-concept exploit called YellowKey was released for this flaw by security researcher Chaotic Eclipse, also known as Nightmare-Eclipse, the previous month.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several other BitLocker-related security feature bypasses addressed in the release:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-45655, with a CVSS score of 5.3\u003c/li\u003e\n\u003cli\u003eCVE-2026-45658, with a CVSS score of 7.8\u003c/li\u003e\n\u003cli\u003eCVE-2026-50507, with a CVSS score of 6.8\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft said in its advisories for these issues that a successful attacker could bypass the BitLocker Device Encryption feature on the system storage device. Microsoft also said an attacker with physical access to the target could exploit the vulnerabilities to gain access to encrypted data.\u003c/p\u003e\n\n\u003cp\u003eSecurity researcher Will Dormann assessed CVE-2026-50507 as a fix for a BitLocker bypass called bitskrieg, which grants full access to encrypted data. The article states that CVE-2026-50507 is one of the publicly disclosed zero-days in the June 2026 release.\u003c/p\u003e\n\n\u003ch2 id=\"publicly-disclosed-zero-days\"\u003ePublicly disclosed zero-days\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies three vulnerabilities as publicly disclosed zero-days:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-50507, a BitLocker-related security feature bypass assessed as a fix for bitskrieg\u003c/li\u003e\n\u003cli\u003eCVE-2026-49160, an HTTP.sys denial-of-service vulnerability\u003c/li\u003e\n\u003cli\u003eCVE-2026-45586, a Windows Collaborative Translation Framework privilege escalation vulnerability\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCVE-2026-45586 has a CVSS score of 7.8 and affects Windows Collaborative Translation Framework, also referenced as CTFMON. The article says it is suspected to be a fix for a zero-day privilege escalation exploit released by Chaotic Eclipse under the name GreenPlasma.\u003c/p\u003e\n\n\u003ch2 id=\"http2-bomb-and-http-sys-denial-of-service\"\u003eHTTP2/Bomb and HTTP.sys denial of service\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-49160 has a CVSS score of 7.5 and is an HTTP.sys denial-of-service vulnerability. The article says it is related to HTTP2/Bomb, an attack technique that can knock web servers offline in seconds.\u003c/p\u003e\n\n\u003cp\u003eIn tests conducted by Calif, an IIS server exhausted 64 GB of RAM in about 45 seconds. To mitigate the attack, Microsoft introduced a new MaxHeadersCount registry setting that limits the number of headers in HTTP/2 and HTTP/3 requests.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said limiting HTTP headers can help protect systems and servers from excessive memory use, high CPU consumption, and denial-of-service attacks. Microsoft also said HTTP/2 HPACK and HTTP/3 QPACK header compression involve more complex protocol processing, and that enforcing a limit such as MaxHeadersCount can help maintain performance and reliability.\u003c/p\u003e\n\n\u003ch2 id=\"miniplasma-and-cve-2020-17103\"\u003eMiniPlasma and CVE-2020-17103\u003c/h2\u003e\n\n\u003cp\u003eThe June 2026 update also plugs MiniPlasma, which the article describes as a separate vulnerability disclosed by Chaotic Eclipse as an incomplete fix for CVE-2020-17103. Microsoft originally addressed CVE-2020-17103 in December 2020.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said that to comprehensively address the vulnerability identified by CVE-2020-17103 and publicly referred to as MiniPlasma, users should install the June 2026 updates for their Windows operating systems.\u003c/p\u003e\n\n\u003ch2 id=\"chaotic-eclipse-activity-mentioned-in-the-article\"\u003eChaotic Eclipse activity mentioned in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article references several vulnerability disclosures or proof-of-concept exploits associated with Chaotic Eclipse, also known as Nightmare-Eclipse:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eYellowKey, a proof-of-concept exploit associated with CVE-2026-45585\u003c/li\u003e\n\u003cli\u003eGreenPlasma, a zero-day privilege escalation exploit suspected to be addressed by CVE-2026-45586\u003c/li\u003e\n\u003cli\u003eMiniPlasma, described as an incomplete fix for CVE-2020-17103\u003c/li\u003e\n\u003cli\u003eRoguePlanet, a Microsoft Defender zero-day proof-of-concept exploit described as a race condition that could be used to spawn a Windows command prompt with SYSTEM privileges\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the patches arrive as Chaotic Eclipse released a proof-of-concept exploit for RoguePlanet.\u003c/p\u003e\n\n\u003ch2 id=\"ai-assisted-vulnerability-discovery-and-patch-volume\"\u003eAI-assisted vulnerability discovery and patch volume\u003c/h2\u003e\n\n\u003cp\u003eThe article attributes the growing number of patches to the use of AI-assisted vulnerability discovery approaches. It says Microsoft expects this trend to continue in the foreseeable future.\u003c/p\u003e\n\n\u003cp\u003eSatnam Narang of Tenable said that as more advanced AI models become available, he expects the norm to continue upward across the board, not just for Patch Tuesday. Dustin Childs of TrendAI’s Zero Day Initiative described the volume of Microsoft vulnerabilities as a sign that AI is supercharging flaw discovery at an uncontrollable scale.\u003c/p\u003e\n\n\u003cp\u003eChilds also said the number of CVEs shipped by Microsoft so far in 2026 exceeds the total number shipped in all of 2018. He described Microsoft’s ability to produce so many patches in a single month as extraordinary and said many testers may wonder what quality issues may exist.\u003c/p\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall significance\u003c/h2\u003e\n\n\u003cp\u003eThe June 2026 Microsoft update is significant because it combines a record number of fixes, multiple Critical remote code execution flaws, and three publicly disclosed zero-days. Several vulnerabilities affect core Windows components or services, including Windows Kernel, HTTP.sys, DHCP Client, BitLocker, Windows Collaborative Translation Framework, and Microsoft Defender.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that some of the most severe flaws can be exploited over a network without credentials or user interaction. It also highlights both software-level and physical-access risks, including remote code execution, denial of service, and BitLocker bypass scenarios that could expose encrypted data.\u003c/p\u003e\n","keyPoints":["Microsoft released fixes for a record 206 security vulnerabilities across its software portfolio, including 39 rated Critical, 167 rated Important, and three that were publicly disclosed at release.","The June 2026 patches include critical remote code execution vulnerabilities in Windows Kernel, Windows HTTP.sys, and Windows DHCP Client, with CVE-2026-45657, CVE-2026-47291, and CVE-2026-44815 each carrying a CVSS score of 9.8.","Microsoft addressed several BitLocker security feature bypass issues, including CVE-2026-45585 linked to the YellowKey proof-of-concept and CVE-2026-50507 assessed as a fix for the bitskrieg bypass.","CVE-2026-49160 is related to the HTTP2/Bomb denial-of-service technique, and Microsoft introduced a new MaxHeadersCount registry setting to limit HTTP/2 and HTTP/3 request headers.","The article says the growing volume of Microsoft patches has been attributed to AI-assisted vulnerability discovery, with researchers expecting vulnerability counts to continue rising."],"insights":["Several of the most serious issues require no credentials or user interaction, making network-exposed Windows systems handling TCP/IP, HTTP.sys, or DHCP traffic especially urgent patch targets.","The HTTP2/Bomb issue has a concrete operational mitigation beyond patching: Microsoft added the MaxHeadersCount registry setting to restrict HTTP/2 and HTTP/3 request headers and reduce memory, CPU, and denial-of-service risk.","Physical security remains relevant for patched Windows endpoints because multiple BitLocker bypass flaws could allow an attacker with physical access to access encrypted data.","The volume of fixes raises potential testing concerns, as TrendAI’s Zero Day Initiative noted that Microsoft’s 2026 CVE count already exceeds its entire 2018 total and questioned what quality issues may exist in such a large patch set."],"referencedReports":[{"title":"June 2026 Security Updates","url":"https://msrc.microsoft.com/update-guide/releaseNote/2026-Jun","publisher":"Microsoft Security Response Center","context":"The article cites Microsoft’s June 2026 release notes as the source for the record 206 patched vulnerabilities.","category":"","primary":false},{"title":"VU#616257","url":"https://kb.cert.org/vuls/id/616257","publisher":"CERT Coordination Center","context":"The article links to CERT/CC’s advisory for the UEFI Secure Boot security feature bypass tracked as CVE-2026-8863.","category":"","primary":false},{"title":"Patch Tuesday June 2026","url":"https://www.action1.com/patch-tuesday/patch-tuesday-june-2026/","publisher":"Action1","context":"The article quotes Action1’s Patch Tuesday analysis regarding the severity and impact of CVE-2026-44815 in Windows DHCP Client.","category":"","primary":false},{"title":"HTTP2/Bomb","url":"https://github.com/califio/publications/tree/main/MADBugs/http2-bomb","publisher":"Calif","context":"The article references Calif’s technical publication on the HTTP2/Bomb technique, including test results showing rapid memory exhaustion on an IIS server.","category":"","primary":false},{"title":"Control the maximum number of HTTP/2 and HTTP/3 request headers in Windows clients and servers","url":"https://support.microsoft.com/en-us/topic/control-the-maximum-number-of-http-2-and-http-3-request-headers-in-windows-clients-and-servers-084da156-7a99-4abf-b759-f973c35eded3","publisher":"Microsoft","context":"The article cites Microsoft’s support guidance describing the MaxHeadersCount registry setting for limiting HTTP/2 and HTTP/3 request headers.","category":"","primary":false},{"title":"CVE-2020-17103","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2020-17103","publisher":"Microsoft Security Response Center","context":"The article cites Microsoft’s updated advisory stating that June 2026 Windows updates comprehensively address the issue publicly referred to as MiniPlasma.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft released fixes for a record 206 security vulnerabilities across its software portfolio in its June 2026 update. The release includes 39 Critical and 167 Important flaws, with three vulnerabilities publicly disclosed at the time of release. The issues span privilege escalation, remote code execution, information disclosure, spoofing, security feature bypass, denial-of-service, and tampering vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eThe most severe issues include CVE-2026-45657, a Windows Kernel use-after-free flaw with a CVSS score of 9.8 that could allow remote code execution through specially crafted network traffic. Other critical flaws include CVE-2026-47291 in Windows HTTP.sys and CVE-2026-44815 in Windows DHCP Client, both also rated 9.8. The article highlights that some flaws require no credentials or user interaction, making systems handling network traffic high-priority patch targets.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also addressed multiple security feature bypasses, including BitLocker-related issues and publicly disclosed zero-days such as CVE-2026-50507, CVE-2026-49160, and CVE-2026-45586. CVE-2026-49160 is tied to HTTP2/Bomb, a denial-of-service technique that caused an IIS server to exhaust 64 GB of RAM in about 45 seconds during Calif’s testing. The article says the growing number of patches has been linked to AI-assisted vulnerability discovery, a trend Microsoft and security researchers expect to continue.\u003c/p\u003e\n"},{"n":11,"title":"Microsoft ships largest Patch Tuesday on record, with one bug under active attack","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/microsoft-ships-largest-patch-tuesday-on-record","time":"13:00","priority":"MUST READ","score":95,"tldr":"Microsoft released its largest Patch Tuesday ever, fixing more than 200 flaws as AI-assisted vulnerability discovery drives patch volumes higher. Organizations should prioritize updates, especially for an actively exploited Microsoft Defender privilege-escalation bug and a critical wormable Windows kernel flaw.","briefOverview":"\u003cp\u003eMicrosoft released fixes for more than 200 security flaws in its June Patch Tuesday, making it the largest Patch Tuesday in the program’s history according to multiple trackers. Microsoft’s monthly release listed 206 of its own CVEs, while ZDI counted 208 and Tenable counted 198 using different counting methods. The surge comes as Microsoft and others say AI tools are driving more vulnerability discovery across the industry.\u003c/p\u003e\n\n\u003cp\u003eThe most alarming flaw highlighted by researchers is CVE-2026-45657, a critical Windows kernel issue rated 9.8 that could allow a remote attacker to take full control of a machine with no user action. ZDI described it as “wormable,” meaning it could spread from one computer to another across a network on its own, though Microsoft rated it “less likely” to be exploited. A separate Microsoft Defender flaw, CVE-2026-41091, has already been exploited in the wild and could let an attacker with a foothold gain full control of a system.\u003c/p\u003e\n\n\u003cp\u003eThree zero-day flaws were also disclosed, including a BitLocker bypass tracked as CVE-2026-50507. Both CVE-2026-41091 and CVE-2026-50507 are tied to the pseudonymous researcher Nightmare Eclipse, who has been in a months-long dispute with Microsoft. The researcher has previously posted working exploit code for unpatched Windows flaws and has threatened another release on the next Patch Tuesday.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft’s June Patch Tuesday fixed more than 200 security flaws, marking the largest release in the program’s history according to multiple vulnerability trackers. Microsoft’s release listed 206 of its own CVEs, while Trend Micro’s Zero Day Initiative counted 208 and Tenable counted 198 after excluding some issues it said were resolved through servicing or disclosed by other vendors. Both ZDI and Tenable described the release as record-setting.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the release as part of a broader shift in vulnerability discovery driven by artificial intelligence. Microsoft security leadership said last month that AI tools are contributing to a surge in vulnerability discovery and that Patch Tuesday releases are expected to keep getting larger. Microsoft also disclosed an internal system, codenamed MDASH, that it said independently found 16 vulnerabilities in May before any human researcher reported them.\u003c/p\u003e\n\n\u003cp\u003eThe most technically concerning issue discussed is CVE-2026-45657, a Windows kernel flaw rated 9.8 out of 10. The bug is reachable over a network because it lies in how the Windows kernel processes network traffic, and it could allow a remote attacker to take full control of a machine without user interaction. ZDI described the flaw as wormable, comparing its self-spreading potential to the quality behind the 2017 WannaCry outbreak, even though Microsoft rated exploitation as less likely.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights CVE-2026-41091, a Microsoft Defender elevation-of-privilege flaw that has been exploited in the wild. Microsoft said an attacker could trick Defender into writing a malicious file to a protected location, granting the highest level of control over the system. The U.S. Cybersecurity and Infrastructure Security Agency added the bug to its catalog of actively exploited flaws on May 20.\u003c/p\u003e\n\n\u003cp\u003eThree zero-day flaws were disclosed, including CVE-2026-50507, a BitLocker bypass that could undermine the feature intended to protect the contents of a stolen Windows laptop. Both CVE-2026-41091 and CVE-2026-50507 are tied to Nightmare Eclipse, a pseudonymous researcher who has been in a dispute with Microsoft over bug-reporting account access, bounty payments, and advisory credit. Nightmare Eclipse has already posted working exploit code for unpatched Windows flaws and has threatened another release on July 14, the date of the next Patch Tuesday.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft’s June Patch Tuesday delivered fixes for more than 200 security flaws, which the article describes as the largest Patch Tuesday in the program’s history. Microsoft’s own monthly release listed 206 of its CVEs, although the company does not promote one headline figure and different vulnerability trackers count the total differently.\u003c/p\u003e\n\n\u003cp\u003eTrend Micro’s Zero Day Initiative counted 208 CVEs from Microsoft and said the release was by far the largest monthly update it had ever seen, exceeding a previous record of 177 set last year. Tenable counted 198 CVEs, excluding several issues it said were resolved through servicing or disclosed by other vendors, but it also called the release the largest since Patch Tuesday began.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-release-is-significant\"\u003eWhy the release is significant\u003c/h2\u003e\n\n\u003cp\u003eThe article presents the record-setting update as another sign that artificial intelligence is reshaping vulnerability discovery. Microsoft’s security leadership acknowledged last month that AI tools are driving a surge in vulnerability discovery across the industry. Tom Gallagher, vice president of engineering at Microsoft’s Security Response Center, said Microsoft expects Patch Tuesday releases to continue trending larger.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also recently disclosed an internal system called MDASH, which it said independently found 16 vulnerabilities in May before any human researcher reported them. ZDI said one of the publicly disclosed flaws in the June release appeared to have been found the same way. The article also notes that Britain’s National Cyber Security Centre warned in April that organizations should prepare for a wave of urgent updates driven by AI-assisted discovery.\u003c/p\u003e\n\n\u003cp\u003eZDI further noted that the number of CVEs Microsoft has shipped so far in 2026 already exceeds the total for all of 2018. The article connects this growing volume to the operational challenge defenders face once patches are released, because attackers can examine patches to reverse-engineer the vulnerabilities they fix and then target systems that have not yet been updated.\u003c/p\u003e\n\n\u003ch2 id=\"critical-wormable-windows-kernel-flaw\"\u003eCritical wormable Windows kernel flaw\u003c/h2\u003e\n\n\u003cp\u003eThe flaw described as most alarming by many researchers is CVE-2026-45657. It is rated 9.8 out of 10 in severity and is located deep in the Windows core. The article says it could allow a remote attacker to take full control of a machine without any action from the user.\u003c/p\u003e\n\n\u003cp\u003eZDI described CVE-2026-45657 as “wormable,” meaning an attack could spread from one computer to another across a network on its own. The article compares that self-spreading property to the quality behind global outbreaks such as the 2017 WannaCry attack, which crippled hospitals and businesses worldwide. Microsoft rated the flaw as “less likely” to be exploited, but ZDI said that rating offered little reassurance.\u003c/p\u003e\n\n\u003cp\u003eThe technical reason the flaw is network-reachable is that it lies in how the Windows kernel processes network traffic. The Windows kernel is described as the most privileged layer of the operating system. According to ZDI, researchers and exploit developers were already examining the patch to reconstruct the underlying flaw, and ZDI urged organizations to install the fix without delay.\u003c/p\u003e\n\n\u003ch2 id=\"actively-exploited-microsoft-defender-flaw\"\u003eActively exploited Microsoft Defender flaw\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies CVE-2026-41091 as the flaw known to have been exploited in the wild. It is rated 7.8 out of 10 and affects Microsoft Defender, the antivirus built into Windows. The vulnerability is an elevation-of-privilege issue that could give an attacker who already has a foothold on a system full control of the machine.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said an attacker could trick Defender into writing a malicious file to a protected location. That action would grant the attacker the highest level of control over the system. The U.S. Cybersecurity and Infrastructure Security Agency added CVE-2026-41091 to its catalog of actively exploited flaws on May 20.\u003c/p\u003e\n\n\u003ch2 id=\"zero-days-and-bitlocker-bypass\"\u003eZero-days and BitLocker bypass\u003c/h2\u003e\n\n\u003cp\u003eThree zero-day flaws were also disclosed in the release. One of them is a BitLocker bypass tracked as CVE-2026-50507. The article explains that the issue means BitLocker, which is intended to encrypt a Windows laptop’s contents so a thief cannot read the drive, can be bypassed.\u003c/p\u003e\n\n\u003cp\u003eBoth CVE-2026-41091 and CVE-2026-50507 are tied to the researcher known as Nightmare Eclipse. The article describes Nightmare Eclipse as a pseudonymous researcher who has been in a months-long standoff with Microsoft.\u003c/p\u003e\n\n\u003ch2 id=\"nightmare-eclipse-dispute\"\u003eNightmare Eclipse dispute\u003c/h2\u003e\n\n\u003cp\u003eNightmare Eclipse began posting working exploit code for unpatched Windows flaws to GitHub in April. The researcher cited grievances including a claim that Microsoft deleted their bug-reporting account, withheld bounty payments, and removed their name from at least one advisory. Microsoft denies the claim that it deleted the researcher’s bug-reporting account.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft initially condemned the exploit releases as “never justifiable” and said its Digital Crimes Unit would continue pursuing those who enable cybercrime. After a backlash from the security community, Microsoft walked back the apparent threat. Nightmare Eclipse has said more is coming and threatened a new release of Windows exploit code on July 14, which is the date of the next Patch Tuesday.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-response-context\"\u003eAffected parties and response context\u003c/h2\u003e\n\n\u003cp\u003eThe affected technologies discussed in the article include Windows, the Windows kernel, Microsoft Defender, and BitLocker. Microsoft issued patches as part of its June Patch Tuesday release. CISA added the actively exploited Microsoft Defender vulnerability to its known exploited vulnerabilities catalog.\u003c/p\u003e\n\n\u003cp\u003eThe article also cites assessments from Trend Micro’s Zero Day Initiative and Tenable, both of which analyzed the scale of the June release. ZDI provided the most forceful warning about CVE-2026-45657, describing it as wormable and urging organizations to patch quickly. Microsoft’s broader response includes acknowledging the AI-driven increase in vulnerability discovery and expecting larger Patch Tuesday releases in the future.\u003c/p\u003e\n","keyPoints":["Microsoft released fixes for more than 200 security flaws in its June Patch Tuesday, which multiple trackers described as the largest monthly release in the program's history.","Microsoft’s security leadership said AI tools are driving a surge in vulnerability discovery, and the company expects Patch Tuesday releases to continue trending larger.","CVE-2026-45657 is a critical Windows kernel flaw rated 9.8 that could allow a remote attacker to take full control of a machine with no user action and was described by ZDI as wormable.","CVE-2026-41091 is an actively exploited Microsoft Defender elevation-of-privilege flaw that could let an attacker with an existing foothold gain full control of a system.","Three zero-day flaws were disclosed, including a BitLocker bypass tracked as CVE-2026-50507, which is tied to the pseudonymous researcher Nightmare Eclipse."],"insights":["Defenders should not rely solely on Microsoft’s “less likely” exploitation rating for CVE-2026-45657, because ZDI warned that researchers and exploit developers were already reverse-engineering the patch and described the flaw as wormable.","Patch prioritization is especially urgent because the release of fixes starts a race in which attackers analyze patches to reconstruct vulnerabilities and target systems that have not yet updated.","The growing use of AI in vulnerability discovery is already changing operational patch management, with Microsoft expecting larger Patch Tuesday releases and ZDI noting that Microsoft’s 2026 CVE total has already surpassed all of 2018.","The dispute involving Nightmare Eclipse creates an unusual disclosure risk, because the researcher has already posted working exploit code for unpatched Windows flaws and threatened another release on the next Patch Tuesday."],"referencedReports":[{"title":"June 2026 Security Updates","url":"https://msrc.microsoft.com/update-guide/en-us/releaseNote/2026-Jun","publisher":"Microsoft Security Response Center","context":"The article cites Microsoft’s monthly June release as listing 206 Microsoft CVEs fixed in Patch Tuesday.","category":"","primary":false},{"title":"The June 2026 Security Update Review","url":"https://www.zerodayinitiative.com/blog/2026/6/9/the-june-2026-security-update-review","publisher":"Trend Micro Zero Day Initiative","context":"The article cites ZDI’s analysis of the June Patch Tuesday release, including its CVE count and assessment of the wormable Windows flaw.","category":"","primary":false},{"title":"Microsoft’s June 2026 Patch Tuesday Addresses 198 CVEs","url":"https://www.tenable.com/blog/microsofts-june-2026-patch-tuesday-addresses-198-cves-cve-2026-49160-cve-2026-50507","publisher":"Tenable","context":"The article cites Tenable’s Patch Tuesday analysis, which counted 198 CVEs and described the release as the largest since the program began.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog","publisher":"U.S. Cybersecurity and Infrastructure Security Agency","context":"The article notes that CISA added CVE-2026-41091 to its catalog of actively exploited flaws on May 20.","category":"","primary":false},{"title":"CVE-2026-45657","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-45657","publisher":"Microsoft Security Response Center","context":"The article links Microsoft’s advisory for the critical Windows kernel flaw described as potentially wormable by ZDI.","category":"","primary":false},{"title":"CVE-2026-41091","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-41091","publisher":"Microsoft Security Response Center","context":"The article links Microsoft’s advisory for the actively exploited Microsoft Defender elevation-of-privilege flaw.","category":"","primary":false},{"title":"CVE-2026-50507","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-50507","publisher":"Microsoft Security Response Center","context":"The article links Microsoft’s advisory for the BitLocker bypass disclosed as a zero-day flaw.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft released fixes for more than 200 security flaws in its June Patch Tuesday, making it the largest Patch Tuesday in the program’s history according to multiple trackers. Microsoft’s monthly release listed 206 of its own CVEs, while ZDI counted 208 and Tenable counted 198 using different counting methods. The surge comes as Microsoft and others say AI tools are driving more vulnerability discovery across the industry.\u003c/p\u003e\n\n\u003cp\u003eThe most alarming flaw highlighted by researchers is CVE-2026-45657, a critical Windows kernel issue rated 9.8 that could allow a remote attacker to take full control of a machine with no user action. ZDI described it as “wormable,” meaning it could spread from one computer to another across a network on its own, though Microsoft rated it “less likely” to be exploited. A separate Microsoft Defender flaw, CVE-2026-41091, has already been exploited in the wild and could let an attacker with a foothold gain full control of a system.\u003c/p\u003e\n\n\u003cp\u003eThree zero-day flaws were also disclosed, including a BitLocker bypass tracked as CVE-2026-50507. Both CVE-2026-41091 and CVE-2026-50507 are tied to the pseudonymous researcher Nightmare Eclipse, who has been in a months-long dispute with Microsoft. The researcher has previously posted working exploit code for unpatched Windows flaws and has threatened another release on the next Patch Tuesday.\u003c/p\u003e\n"},{"n":3,"title":"Microsoft patches Exchange Server zero-day exploited in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-patches-exchange-server-zero-day-exploited-in-attacks/","time":"13:44","priority":"MUST READ","score":94,"tldr":"Microsoft patched an actively exploited Exchange Server zero-day, CVE-2026-42897, that can let remote attackers run arbitrary JavaScript against Outlook Web Access users via crafted emails. Exchange admins should install the June 2026 security updates immediately and keep Microsoft’s temporary mitigation enabled for added protection.","briefOverview":"\u003cp\u003eMicrosoft has patched CVE-2026-42897, an actively exploited Exchange Server vulnerability that enables cross-site scripting attacks targeting Outlook Web Access users. The flaw is described as a high-severity spoofing vulnerability affecting Exchange Server 2016, Exchange Server 2019, and Exchange Server Subscription Edition. Microsoft advised administrators to install the June 2026 security updates as soon as possible.\u003c/p\u003e\n\n\u003cp\u003eAccording to Microsoft’s Exchange Team, attackers can exploit the issue by sending a specially crafted email to a user. If the user opens the email in Outlook Web Access and certain interaction conditions are met, arbitrary JavaScript can execute in the browser context. Microsoft also recommended keeping the Exchange Emergency Mitigation Service mitigation in place for additional protection.\u003c/p\u003e\n\n\u003cp\u003eCISA added CVE-2026-42897 to its Known Exploited Vulnerabilities catalog on May 15 and ordered U.S. government agencies to patch affected servers by May 29. The article notes that CISA has added 20 Microsoft Exchange Server vulnerabilities to its exploited flaws list over the past five years, with ransomware gangs exploiting 14 of them. BleepingComputer said Microsoft had not yet responded to questions about the attacks exploiting this vulnerability.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft released security updates for CVE-2026-42897, an actively exploited Exchange Server vulnerability affecting Outlook Web Access users. The vulnerability is categorized as a high-severity spoofing flaw and can be exploited in cross-site scripting attacks. Affected products include Exchange Server 2016, Exchange Server 2019, and Exchange Server Subscription Edition.\u003c/p\u003e\n\n\u003cp\u003eThe Exchange Team said exploitation can occur when an attacker sends a specially crafted email to a user. If the user opens the message in Outlook Web Access and certain interaction conditions are met, arbitrary JavaScript can execute in the user’s browser context. The article states that remote attackers need no privileges to exploit the vulnerability.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft initially rolled out automatic temporary mitigation for the issue through the Exchange Emergency Mitigation Service in mid-May. It later released the June 2026 security updates to address the flaw in affected Exchange Server installations. Microsoft advised administrators to deploy the updates as soon as possible and to keep the mitigation in place for additional protection.\u003c/p\u003e\n\n\u003cp\u003eCISA added CVE-2026-42897 to its Known Exploited Vulnerabilities catalog on May 15. The agency ordered U.S. government agencies to patch affected servers within two weeks, setting a May 29 deadline. The article also says CISA has added 20 Microsoft Exchange Server vulnerabilities to its list of exploited flaws over the past five years.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify the threat actors exploiting CVE-2026-42897. BleepingComputer said it had not yet received a response from Microsoft to questions about the attacks. It also notes that CISA and the NSA previously released guidance on hardening Exchange servers after Exchange 2016 and 2019 reached the end of support.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft patched CVE-2026-42897, an actively exploited Microsoft Exchange Server vulnerability. The flaw allows threat actors to execute arbitrary JavaScript code in cross-site scripting attacks targeting Outlook Web Access users. Microsoft released security updates for affected Exchange Server installations and advised administrators to deploy them as soon as possible.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is described as a high-severity spoofing issue. It affects Exchange Server 2016, Exchange Server 2019, and Exchange Server Subscription Edition. The article states that it can be exploited by remote attackers with no privileges.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical details\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft’s Exchange Team said attackers could exploit CVE-2026-42897 by sending a specially crafted email to a user. If the user opens the email in Outlook Web Access and certain interaction conditions are met, arbitrary JavaScript can be executed in the browser context. The article frames the exploitation path as a cross-site scripting attack against Outlook Web Access users.\u003c/p\u003e\n\n\u003cp\u003eKey technical details stated in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe vulnerability is tracked as CVE-2026-42897.\u003c/li\u003e\n\u003cli\u003eIt is a high-severity spoofing vulnerability.\u003c/li\u003e\n\u003cli\u003eIt enables arbitrary JavaScript execution in the browser context.\u003c/li\u003e\n\u003cli\u003eExploitation targets Outlook Web Access users.\u003c/li\u003e\n\u003cli\u003eRemote attackers require no privileges.\u003c/li\u003e\n\u003cli\u003eExploitation involves a specially crafted email and specific user interaction conditions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-products\"\u003eAffected products\u003c/h2\u003e\n\n\u003cp\u003eThe affected Microsoft Exchange Server versions named in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExchange Server 2016\u003c/li\u003e\n\u003cli\u003eExchange Server 2019\u003c/li\u003e\n\u003cli\u003eExchange Server Subscription Edition\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft released June 2026 security updates for affected Exchange Server installations. The company recommended installing the updates for the relevant Exchange Server version as soon as possible.\u003c/p\u003e\n\n\u003ch2 id=\"mitigation-and-patching-guidance\"\u003eMitigation and patching guidance\u003c/h2\u003e\n\n\u003cp\u003eBefore releasing the security updates, Microsoft rolled out automatic temporary mitigation through the Exchange Emergency Mitigation Service in mid-May. After releasing the June 2026 security updates, Microsoft advised administrators to keep the mitigation in place. Microsoft said the mitigation provides an additional layer of defense and helps ensure continuous protection as further improvements are released.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft’s stated recommendation was to install the June 2026 Security Updates for the applicable Exchange Server version as soon as possible. It also recommended leaving the mitigation in place for additional protection. The article emphasizes that the mitigation and the security updates are both part of Microsoft’s response to the vulnerability.\u003c/p\u003e\n\n\u003ch2 id=\"government-response\"\u003eGovernment response\u003c/h2\u003e\n\n\u003cp\u003eCISA added CVE-2026-42897 to its Known Exploited Vulnerabilities catalog on May 15. The agency ordered U.S. government agencies to patch affected servers within two weeks. The article states that the deadline for those agencies was May 29.\u003c/p\u003e\n\n\u003cp\u003eThe article also provides broader CISA context for Exchange Server vulnerabilities. It says CISA has added 20 Microsoft Exchange Server vulnerabilities to its list of exploited security flaws over the past five years. It further states that ransomware gangs have exploited 14 of those vulnerabilities.\u003c/p\u003e\n\n\u003ch2 id=\"known-attacks-and-actor-information\"\u003eKnown attacks and actor information\u003c/h2\u003e\n\n\u003cp\u003eThe article says CVE-2026-42897 has been actively exploited in attacks. However, it does not identify the attackers or provide campaign details. BleepingComputer said it had not yet received a response from Microsoft to questions about the attacks exploiting the vulnerability.\u003c/p\u003e\n\n\u003cp\u003eNo named threat actors, malware families, or specific victim organizations are disclosed in the article. The known affected parties described are organizations running impacted Exchange Server versions, Outlook Web Access users, and U.S. government agencies subject to CISA’s patching requirement.\u003c/p\u003e\n\n\u003ch2 id=\"related-exchange-server-security-context\"\u003eRelated Exchange Server security context\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that CISA and the National Security Agency released guidance in October on hardening Exchange servers against attacks. That guidance followed the end of support for Exchange 2016 and Exchange 2019, according to the article. This context is presented alongside CISA’s history of adding exploited Exchange Server vulnerabilities to its Known Exploited Vulnerabilities catalog.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain takeaway\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft has released fixes for CVE-2026-42897, an actively exploited Exchange Server flaw that can allow arbitrary JavaScript execution against Outlook Web Access users through crafted emails. Administrators of affected Exchange Server installations are advised by Microsoft to install the June 2026 security updates promptly and keep the Exchange Emergency Mitigation Service mitigation enabled for added protection.\u003c/p\u003e\n","keyPoints":["Microsoft patched CVE-2026-42897, an actively exploited high-severity spoofing vulnerability in Exchange Server that enables cross-site scripting attacks against Outlook Web Access users.","CVE-2026-42897 affects Exchange Server 2016, Exchange Server 2019, and Exchange Server Subscription Edition, and can be exploited remotely by attackers with no privileges.","Microsoft said attackers could exploit the flaw by sending a specially crafted email that executes arbitrary JavaScript in the browser context if opened in Outlook Web Access and certain interaction conditions are met.","Microsoft advised administrators to install the June 2026 Exchange Server security updates as soon as possible and to keep the Exchange Emergency Mitigation Service mitigation in place for additional protection.","CISA added CVE-2026-42897 to its Known Exploited Vulnerabilities catalog on May 15 and ordered U.S. government agencies to patch affected servers by May 29."],"insights":["Microsoft’s recommendation is not to remove the temporary mitigation after patching; it says administrators should keep the mitigation in place as an additional layer of defense alongside the June 2026 security updates.","The Exchange Emergency Mitigation Service provided automatic temporary mitigation in mid-May, weeks before Microsoft released the security updates that fully address CVE-2026-42897.","The article notes a sustained exploitation pattern against Exchange Server, with CISA adding 20 Exchange vulnerabilities to its known exploited catalog over five years and ransomware gangs exploiting 14 of them.","Microsoft had not answered BleepingComputer’s questions about the attacks exploiting CVE-2026-42897, leaving the article without details on the attackers or campaign activity."],"referencedReports":[{"title":"CVE-2026-42897","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-42897","publisher":"Microsoft","context":"The article cites Microsoft’s security advisory for the actively exploited Exchange Server vulnerability and its released security updates.","category":"","primary":false},{"title":"Addressing Exchange Server May 2026 Vulnerability CVE-2026-42897","url":"https://techcommunity.microsoft.com/blog/exchange/addressing-exchange-server-may-2026-vulnerability-cve-2026-42897/4518498","publisher":"Microsoft Exchange Team","context":"The article quotes Microsoft’s Exchange Team explanation of how CVE-2026-42897 can be exploited and notes the temporary mitigation rolled out through EEMS.","category":"","primary":false},{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/01/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article references CISA’s alert adding CVE-2026-42897 to its Known Exploited Vulnerabilities catalog and requiring U.S. government agencies to patch.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?search=CVE-2024-21182\u0026field_date_added_wrapper=all\u0026field_cve=\u0026sort_by=field_date_added\u0026items_per_page=20\u0026url=","publisher":"CISA","context":"The article links to CISA’s catalog of vulnerabilities exploited in the wild when discussing CVE-2026-42897.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft has patched CVE-2026-42897, an actively exploited Exchange Server vulnerability that enables cross-site scripting attacks targeting Outlook Web Access users. The flaw is described as a high-severity spoofing vulnerability affecting Exchange Server 2016, Exchange Server 2019, and Exchange Server Subscription Edition. Microsoft advised administrators to install the June 2026 security updates as soon as possible.\u003c/p\u003e\n\n\u003cp\u003eAccording to Microsoft’s Exchange Team, attackers can exploit the issue by sending a specially crafted email to a user. If the user opens the email in Outlook Web Access and certain interaction conditions are met, arbitrary JavaScript can execute in the browser context. Microsoft also recommended keeping the Exchange Emergency Mitigation Service mitigation in place for additional protection.\u003c/p\u003e\n\n\u003cp\u003eCISA added CVE-2026-42897 to its Known Exploited Vulnerabilities catalog on May 15 and ordered U.S. government agencies to patch affected servers by May 29. The article notes that CISA has added 20 Microsoft Exchange Server vulnerabilities to its exploited flaws list over the past five years, with ransomware gangs exploiting 14 of them. BleepingComputer said Microsoft had not yet responded to questions about the attacks exploiting this vulnerability.\u003c/p\u003e\n"},{"n":5,"title":"Oracle PeopleSoft servers hacked in ShinyHunters data theft attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/oracle-peoplesoft-servers-hacked-in-shinyhunters-data-theft-attacks/","time":"18:31","priority":"MUST READ","score":94,"tldr":"ShinyHunters claims it is stealing data from Oracle PeopleSoft cloud and on-premises servers using a mix of old and possible zero-day flaws, with more than 100 organizations allegedly affected. PeopleSoft operators should check logs for the reported IP indicators and begin incident response if they see related activity.","briefOverview":"\u003cp\u003eOracle PeopleSoft servers are being targeted in ongoing data theft attacks attributed by the threat actor to the ShinyHunters extortion gang. ShinyHunters told BleepingComputer it stole data from 300 instances across more than 100 organizations. The attacks affect both cloud and on-premises Oracle PeopleSoft customer instances.\u003c/p\u003e\n\n\u003cp\u003ePeopleSoft is used by large organizations for functions including human resources, payroll, finance, supply chain management, procurement, and student administration. ShinyHunters said most affected organizations are in the education sector, and it identified Nottingham University as one victim whose data had already been published on its leak site. Nottingham University also released a statement acknowledging a cybersecurity incident.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor claimed it is using a “gadget chain” of old and zero-day vulnerabilities, but said the attack does not work on all systems and may depend on instance configuration. Researcher Michael R found exposed directories containing tooling related to the activity, including MeshCentral agents, a defacement and credential spray script, and staging materials. The article advises PeopleSoft operators to review logs for connections from the listed IP addresses and begin incident response if indicators are found.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOracle PeopleSoft customer servers are being targeted in ongoing data theft attacks tied to the ShinyHunters extortion gang. BleepingComputer reported that customers running both cloud and on-premises PeopleSoft instances were receiving extortion demands signed by ShinyHunters. The threat actor later confirmed to BleepingComputer that it was behind the attacks.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters claimed it stole data from 300 instances across more than 100 organizations. According to the actor, most affected organizations are in the education sector, including many that had previously been extorted by the group. The actor also said its initial goal was to breach an FBI portal running PeopleSoft, but that attempt was unsuccessful.\u003c/p\u003e\n\n\u003cp\u003eThe group said it is using a “gadget chain” of old and zero-day vulnerabilities to conduct the attacks. It also said exploitation is not working on all systems and may depend on how each PeopleSoft instance is configured. BleepingComputer contacted Oracle to ask whether it was aware of a PeopleSoft zero-day being exploited in data theft attacks, but had not received a reply at the time of publication.\u003c/p\u003e\n\n\u003cp\u003eCybersecurity researcher Michael R found exposed online directories containing tooling connected to the attacks. The visible materials included MeshCentral agents, staging materials, and a defacement and credential spray script. Some infrastructure used TLS certificates with the common name “azurenetfiles[.]net,” a domain previously linked to ShinyHunters.\u003c/p\u003e\n\n\u003cp\u003eFive exposed servers contained a .bash_history file that gave insight into the activity. One shell script was designed to create a ransom note named “README-IF-YOU-SEE-THIS-YOUVE-BEEN-HACKED.TXT” on internal PeopleSoft servers after compromise. The script parsed /etc/hosts for PeopleSoft-related systems, attempted SSH access using accounts such as “psoft,” “oracle,” and “linuxadm,” and then tried to place the ransom note in PeopleSoft web and application server directories.\u003c/p\u003e\n\n\u003cp\u003eThe article advises organizations running Oracle PeopleSoft to analyze logs for connections from the published IP addresses. If those indicators are found, organizations are advised to begin incident response, investigate whether their PeopleSoft instance was compromised, and consider temporarily removing affected servers from internet access until the environment can be secured and reviewed.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOracle PeopleSoft servers are being targeted in ongoing data theft attacks by the ShinyHunters extortion gang, according to the article. The attacks are affecting both cloud and on-premises Oracle PeopleSoft customer instances. BleepingComputer reported that customers were receiving extortion demands signed by ShinyHunters, and the threat actor later confirmed to BleepingComputer that it was behind the activity.\u003c/p\u003e\n\n\u003cp\u003ePeopleSoft is described as an enterprise business software suite used by large organizations to manage operations such as human resources, payroll, finance, supply chain management, procurement, and student administration. Because of its role in large organizations, compromise of PeopleSoft environments may involve sensitive organizational data, although the article does not enumerate the exact data types stolen.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-scale-and-victims\"\u003eClaimed Scale and Victims\u003c/h2\u003e\n\n\u003cp\u003eShinyHunters claimed it stole data from 300 PeopleSoft instances across more than 100 organizations. The threat actor said most impacted organizations are in the education sector. It also said many of those organizations had previously been extorted by the group.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor identified Nottingham University as a victim of these attacks. It claimed the university’s data had already been published on the ShinyHunters data leak site. The article also states that the university released a statement acknowledging that it had suffered a cybersecurity incident.\u003c/p\u003e\n\n\u003cp\u003eShinyHunters also claimed its initial goal was to breach an FBI portal running PeopleSoft. The group said it wanted to “publish a statement and set the record straight on some misinsformation that has been spreading.” However, it said the attempt was not successful and that it did not gain access to the FBI instance.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-exploitation-method\"\u003eClaimed Exploitation Method\u003c/h2\u003e\n\n\u003cp\u003eShinyHunters told BleepingComputer it is using a “gadget chain” of old and zero-day vulnerabilities to conduct the attacks. The group said the attack does not work on all systems. It also said exploitation success may depend on how a PeopleSoft instance is configured.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer contacted Oracle to ask whether it was aware of an Oracle PeopleSoft zero-day being exploited in data theft attacks. The article states that Oracle had not replied at the time of publication. Oracle had also not publicly disclosed information about the attacks, according to the article.\u003c/p\u003e\n\n\u003ch2 id=\"researcher-findings-and-exposed-tooling\"\u003eResearcher Findings and Exposed Tooling\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researcher “Michael R” found several exposed online directories containing tooling related to the activity. The researcher said the exposed directories revealed ongoing targeting of PeopleSoft environments. The visible materials included staging materials, MeshCentral agents, and a defacement and credential spray script.\u003c/p\u003e\n\n\u003cp\u003eThe researcher shared multiple IP addresses as indicators of compromise related to the attacks:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e142.11.200[.]186\u003c/li\u003e\n\u003cli\u003e142.11.200[.]187\u003c/li\u003e\n\u003cli\u003e142.11.200[.]188\u003c/li\u003e\n\u003cli\u003e142.11.200[.]189\u003c/li\u003e\n\u003cli\u003e142.11.200[.]190\u003c/li\u003e\n\u003cli\u003e108.174.202[.]99\u003c/li\u003e\n\u003cli\u003e176.120.22[.]24\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSome of these IP addresses used a TLS certificate with the common name “azurenetfiles[.]net.” The article states that this domain was previously linked to the ShinyHunters extortion gang.\u003c/p\u003e\n\n\u003ch2 id=\"script-behavior-described-in-the-article\"\u003eScript Behavior Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eFive of the exposed servers had a .bash_history file that gave insight into the attacks. One shell script was designed to create a ransom note named “README-IF-YOU-SEE-THIS-YOUVE-BEEN-HACKED.TXT” on an internal PeopleSoft server after it was breached.\u003c/p\u003e\n\n\u003cp\u003eThe script parsed \u003ccode\u003e/etc/hosts\u003c/code\u003e to identify PeopleSoft-related systems. It attempted to connect to those systems over SSH using common PeopleSoft and Oracle administrative accounts, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003epsoft\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eoracle\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003elinuxadm\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIf password authentication failed, the script attempted SSH key-based authentication as a fallback. Once connected, it dropped the ransom note into directories associated with PeopleSoft web and application servers.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-actions-in-the-article\"\u003eRecommended Actions in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article strongly advises organizations running Oracle PeopleSoft to analyze logs for connections from the listed IP addresses. It says that if the indicators are found, organizations should immediately begin incident response. It also advises organizations to investigate whether their PeopleSoft instance was compromised.\u003c/p\u003e\n\n\u003cp\u003eThe article further says organizations should consider temporarily removing affected servers from internet access until the environment can be secured and reviewed.\u003c/p\u003e\n","keyPoints":["The ShinyHunters extortion gang told BleepingComputer it is behind ongoing data theft attacks targeting Oracle PeopleSoft cloud and on-premises customer instances.","ShinyHunters claimed it stole data from 300 PeopleSoft instances across more than 100 organizations, with most impacted organizations in the education sector.","The threat actor said it is using a \"gadget chain\" of old and zero-day vulnerabilities, and that exploitation may depend on how a PeopleSoft instance is configured.","Cybersecurity researcher Michael R found exposed online directories containing attack-related tooling, including MeshCentral agents, a defacement and credential spray script, and staging materials.","Organizations running Oracle PeopleSoft are advised to analyze logs for connections from the listed IP addresses and begin incident response if the indicators are found."],"insights":["The attacks may not succeed uniformly across PeopleSoft environments, because ShinyHunters said exploitation success may depend on how each instance is configured.","The exposed tooling suggests attackers may pivot from a compromised PeopleSoft system by parsing /etc/hosts for related internal servers and trying SSH access with common PeopleSoft and Oracle administrative accounts such as psoft, oracle, and linuxadm.","Some infrastructure used in the activity had TLS certificates with the common name azurenetfiles.net, a domain previously linked to ShinyHunters, making certificate metadata a useful hunting clue in addition to IP indicators.","The threat actor claimed Nottingham University data had already been published on its leak site, while the university separately acknowledged a cybersecurity incident the same day."],"referencedReports":[],"body":"\u003cp\u003eOracle PeopleSoft servers are being targeted in ongoing data theft attacks attributed by the threat actor to the ShinyHunters extortion gang. ShinyHunters told BleepingComputer it stole data from 300 instances across more than 100 organizations. The attacks affect both cloud and on-premises Oracle PeopleSoft customer instances.\u003c/p\u003e\n\n\u003cp\u003ePeopleSoft is used by large organizations for functions including human resources, payroll, finance, supply chain management, procurement, and student administration. ShinyHunters said most affected organizations are in the education sector, and it identified Nottingham University as one victim whose data had already been published on its leak site. Nottingham University also released a statement acknowledging a cybersecurity incident.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor claimed it is using a “gadget chain” of old and zero-day vulnerabilities, but said the attack does not work on all systems and may depend on instance configuration. Researcher Michael R found exposed directories containing tooling related to the activity, including MeshCentral agents, a defacement and credential spray script, and staging materials. The article advises PeopleSoft operators to review logs for connections from the listed IP addresses and begin incident response if indicators are found.\u003c/p\u003e\n"},{"n":7,"title":"Path traversal flaw in AI dev platform Langflow exploited in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/path-traversal-flaw-in-ai-dev-platform-langflow-exploited-in-attacks/","time":"21:23","priority":"MUST READ","score":94,"tldr":"Attackers are actively exploiting CVE-2026-5027, a Langflow path traversal flaw that can let unauthenticated attackers write arbitrary files on exposed servers. Langflow users should upgrade to the latest release immediately.","briefOverview":"\u003cp\u003eAttackers are actively exploiting CVE-2026-5027, a high-severity path traversal vulnerability in the AI development platform Langflow. The flaw allows arbitrary files to be written on exposed servers through Langflow’s file upload functionality. Langflow is an open-source visual platform used for building AI applications, AI agents, RAG systems, and MCP-based workflows.\u003c/p\u003e\n\n\u003cp\u003eTenable said the vulnerable \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint does not sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter from multipart form data, allowing path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e. VulnCheck researcher Caitlin Condon said honeypots have detected attackers exploiting the issue to drop test files on vulnerable instances. Langflow users are recommended to upgrade to the latest release, version 1.10.0.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAttackers are actively exploiting CVE-2026-5027, a high-severity path traversal flaw in Langflow, to write arbitrary files on exposed servers. Langflow is an open-source visual platform for building AI applications, AI agents, Retrieval-Augmented Generation systems, and MCP-based workflows using a drag-and-drop interface. The project is widely used by AI development teams and has more than 149,000 stars and 9,200 forks on GitHub.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is in Langflow’s file upload functionality. Tenable said the \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint does not sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter from multipart form data. This allows an attacker to use path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e to write files to arbitrary locations on the filesystem.\u003c/p\u003e\n\n\u003cp\u003eTenable discovered the flaw at the start of the year and publicly disclosed it on March 27, 2026. The disclosure came more than two months after Tenable initially reported the issue to the Langflow team without receiving a response. Although Tenable did not mention a fix in its advisory, Snyk Security reported on March 30, 2026, that the issue was fixed in the langflow-base package version 0.8.3 and in the Langflow application version 1.9.0.\u003c/p\u003e\n\n\u003cp\u003eVulnCheck researcher Caitlin Condon said the company’s honeypots detected attackers exploiting the vulnerability to drop test files on vulnerable instances. Condon also said Langflow enables unauthenticated auto-login by default, meaning no credentials are required to reach the vulnerable endpoint and a single unauthenticated request can obtain a valid session token before exploitation. Censys scans identified roughly 7,000 publicly exposed Langflow instances, although the article notes that this data includes historical scan results from the previous 12 months and may not reflect the current number of exposed systems.\u003c/p\u003e\n\n\u003cp\u003eThe exploitation follows earlier activity targeting other Langflow vulnerabilities in 2026, including CVE-2026-0770, CVE-2026-21445, and CVE-2026-33017. The article also notes that CISA warned last year about active exploitation of CVE-2025-3248, and that VulnCheck continues to observe activity against it, including activity linked to the Iranian threat group MuddyWater. Langflow users are recommended to upgrade to version 1.10.0, which was published earlier today.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAttackers are actively exploiting CVE-2026-5027, a high-severity path traversal vulnerability in Langflow. The exploitation is being used to write arbitrary files on exposed servers. Langflow is an open-source visual platform for building AI applications, AI agents, Retrieval-Augmented Generation systems, and MCP-based workflows through a drag-and-drop interface rather than traditional coding.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes Langflow’s broad use in AI development. It states that AI development teams widely use the project and that it has accumulated more than 149,000 stars and 9,200 forks on GitHub.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-5027 affects Langflow’s file upload functionality. According to Tenable, the \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint does not sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter from multipart form data.\u003c/p\u003e\n\n\u003cp\u003eBecause the filename is not properly sanitized, an attacker can use path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e. Tenable explained that this allows files to be written to arbitrary locations on the filesystem.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the result as arbitrary file writes on exposed servers. It does not describe any confirmed remote code execution, data theft, or operational disruption from this specific exploitation activity.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-fix-information\"\u003eDisclosure and Fix Information\u003c/h2\u003e\n\n\u003cp\u003eTenable discovered the flaw at the start of the year. It publicly disclosed the issue on March 27, 2026, after initially reporting it to the Langflow team more than two months earlier without receiving a response.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that Tenable did not mention a fix in its advisory. However, Snyk Security reported on March 30, 2026, that the issue was fixed in the \u003ccode\u003elangflow-base\u003c/code\u003e package version 0.8.3.\u003c/p\u003e\n\n\u003cp\u003eSnyk Security also reported that the Langflow application itself received a patch in version 1.9.0. The article recommends that Langflow users upgrade to the latest release, version 1.10.0, which was published earlier today.\u003c/p\u003e\n\n\u003ch2 id=\"observed-exploitation\"\u003eObserved Exploitation\u003c/h2\u003e\n\n\u003cp\u003eVulnCheck security researcher Caitlin Condon said the company’s honeypots have detected attackers exploiting CVE-2026-5027. The observed activity involved dropping test files on vulnerable instances.\u003c/p\u003e\n\n\u003cp\u003eCondon said Langflow enables unauthenticated auto-login by default. As a result, no credentials are required to reach the vulnerable endpoint, and a single unauthenticated request is sufficient to obtain a valid session token before proceeding with exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"exposure\"\u003eExposure\u003c/h2\u003e\n\n\u003cp\u003eCondon added that Censys scans identified roughly 7,000 publicly exposed Langflow instances. The article cautions that Censys data includes historical scan results from the previous 12 months.\u003c/p\u003e\n\n\u003cp\u003eBecause of that limitation, the number may not accurately reflect how many Langflow systems are currently exposed.\u003c/p\u003e\n\n\u003ch2 id=\"related-langflow-vulnerability-activity\"\u003eRelated Langflow Vulnerability Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article places CVE-2026-5027 exploitation in the context of earlier activity targeting Langflow vulnerabilities. It says exploitation of this flaw follows similar activity earlier in the year targeting CVE-2026-0770, CVE-2026-21445, and CVE-2026-33017.\u003c/p\u003e\n\n\u003cp\u003eIt also notes that the U.S. Cybersecurity \u0026amp; Infrastructure Security Agency warned last year about active exploitation of CVE-2025-3248. According to Caitlin Condon, VulnCheck continues to observe activity against CVE-2025-3248, including activity linked to the Iranian threat group MuddyWater.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended Response\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends that Langflow users upgrade to the latest release. The latest release cited is Langflow version 1.10.0, published earlier today.\u003c/p\u003e\n\n\u003cp\u003eThe article also identifies previously reported fixed versions: \u003ccode\u003elangflow-base\u003c/code\u003e version 0.8.3 and Langflow application version 1.9.0, as reported by Snyk Security.\u003c/p\u003e\n","keyPoints":["Attackers are actively exploiting CVE-2026-5027, a high-severity path traversal vulnerability in Langflow, to write arbitrary files on exposed servers.","The flaw affects Langflow's file upload functionality because the POST /api/v2/files endpoint does not properly sanitize the filename parameter in multipart form data.","Tenable publicly disclosed CVE-2026-5027 on March 27, 2026, after reporting it to the Langflow team more than two months earlier without receiving a response.","Snyk Security reported that the issue was fixed in langflow-base version 0.8.3 and in the Langflow application version 1.9.0.","Langflow users are recommended to upgrade to the latest release, version 1.10.0."],"insights":["Because Langflow enables unauthenticated auto-login by default, attackers may not need credentials to reach the vulnerable endpoint and can obtain a valid session token with a single unauthenticated request.","VulnCheck observed exploitation that drops test files, indicating attackers may currently be probing vulnerable Langflow instances before more damaging follow-on activity.","Censys identified roughly 7,000 publicly exposed Langflow instances, but the article notes this figure may be inflated because it includes historical scan results from the prior 12 months.","Langflow has faced repeated exploitation of separate vulnerabilities across 2025 and 2026, including continued activity against CVE-2025-3248 linked by VulnCheck to MuddyWater."],"referencedReports":[{"title":"TRA-2026-26","url":"https://www.tenable.com/security/research/tra-2026-26","publisher":"Tenable","context":"The article cites Tenable's advisory explaining CVE-2026-5027 and noting that Tenable discovered and publicly disclosed the flaw.","category":"","primary":false},{"title":"SNYK-PYTHON-LANGFLOWBASE-15842030","url":"https://security.snyk.io/vuln/SNYK-PYTHON-LANGFLOWBASE-15842030","publisher":"Snyk Security","context":"The article cites Snyk Security's vulnerability entry reporting that the issue was fixed in langflow-base version 0.8.3 and Langflow version 1.9.0.","category":"","primary":false}],"body":"\u003cp\u003eAttackers are actively exploiting CVE-2026-5027, a high-severity path traversal vulnerability in the AI development platform Langflow. The flaw allows arbitrary files to be written on exposed servers through Langflow’s file upload functionality. Langflow is an open-source visual platform used for building AI applications, AI agents, RAG systems, and MCP-based workflows.\u003c/p\u003e\n\n\u003cp\u003eTenable said the vulnerable \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint does not sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter from multipart form data, allowing path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e. VulnCheck researcher Caitlin Condon said honeypots have detected attackers exploiting the issue to drop test files on vulnerable instances. Langflow users are recommended to upgrade to the latest release, version 1.10.0.\u003c/p\u003e\n"},{"n":1,"title":"Microsoft patches YellowKey, GreenPlasma, MiniPlasma zero-days","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-patches-yellowkey-greenplasma-miniplasma-zero-days/","time":"09:57","priority":"MUST READ","score":93,"tldr":"Microsoft’s June 2026 Patch Tuesday fixes three publicly disclosed Windows zero-days: two that allow local attackers to gain SYSTEM privileges and one that can bypass BitLocker on devices with physical access. The flaws were leaked by researcher Nightmare Eclipse amid criticism of Microsoft’s vulnerability disclosure process.","briefOverview":"\u003cp\u003eMicrosoft patched three Windows zero-day vulnerabilities in its June 2026 Patch Tuesday updates: GreenPlasma, MiniPlasma, and YellowKey. Two of the flaws allow attackers to gain SYSTEM privileges on fully patched Windows systems, while the third can grant access to BitLocker-protected drives. All three were disclosed by a researcher using the handle Nightmare Eclipse in protest over Microsoft Security Response Center disclosure handling.\u003c/p\u003e\n\n\u003cp\u003eGreenPlasma and MiniPlasma are local privilege escalation vulnerabilities tracked as CVE-2026-45586 and CVE-2020-17103. They were found in the Collaborative Translation Framework and the Cloud Files Mini Filter Driver, and they allow local attackers to obtain a shell with SYSTEM permissions. YellowKey, tracked as CVE-2026-45585, is described as a backdoor in the Windows Recovery Environment.\u003c/p\u003e\n\n\u003cp\u003eYellowKey can be used by attackers with physical access to bypass BitLocker protection on unpatched Windows 11 and Windows Server \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2025\u003c/sub\u003e systems. Microsoft shar
