ed mitigation measures for YellowKey and criticized the public release of proof-of-concept details as violating coordinated vulnerability best practices. The article also notes that Nightmare Eclipse has released other zero-day proof-of-concept exploits, including BlueHammer, RedSun, UnDefend, and RoguePlanet.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft’s June 2026 Patch Tuesday updates fixed three Windows zero-day vulnerabilities known as GreenPlasma, MiniPlasma, and YellowKey. The article reports that two of the flaws can let attackers gain SYSTEM privileges on fully patched Windows systems, while the third can provide access to BitLocker-protected drives. All three vulnerabilities were disclosed the previous month by a security researcher using the handle Nightmare Eclipse.\u003c/p\u003e\n\n\u003cp\u003eGreenPlasma and MiniPlasma are privilege escalation vulnerabilities tracked as CVE-2026-45586 and CVE-2020-17103. The article states that they were found in the Collaborative Translation Framework, also referred to as CTFMON, and the Cloud Files Mini Filter Driver. Local attackers can exploit them to obtain a shell with SYSTEM permissions on fully patched Windows systems.\u003c/p\u003e\n\n\u003cp\u003eYellowKey is tracked as CVE-2026-45585 and is described as a backdoor in the Windows Recovery Environment, which is used to repair boot-related issues in Windows. Attackers with physical access to targeted devices can use a YellowKey exploit to bypass BitLocker protection. The affected systems named in the article are unpatched Windows 11 and Windows Server \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2025\u003c/sub\u003e systems.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft shared mitigation measures for YellowKey to help defend against potential attacks exploiting it in the wild. The company also complained that the proof-of-concept had been made public in violation of coordinated vulnerability best practices. The three vulnerabilities were patched as part of Microsoft’s June 2026 Patch Tuesday release.\u003c/p\u003e\n\n\u003cp\u003eThe article places these disclosures in the broader context of Nightmare Eclipse’s recent zero-day releases. Over the past several months, the researcher also released proof-of-concept exploits for BlueHammer and RedSun, which the article says are now actively exploited in attacks. More recently, the researcher leaked UnDefend and a Microsoft Defender zero-day exploit named RoguePlanet, and Microsoft’s response shifted from threats of legal action to a statement about working with law enforcement when researchers break the law and cause real harm to customers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft patched three Windows zero-day vulnerabilities as part of its June 2026 Patch Tuesday updates. The flaws are known as GreenPlasma, MiniPlasma, and YellowKey. According to the article, two of them allow attackers to gain SYSTEM privileges on fully patched Windows systems, while the third grants access to BitLocker-protected drives.\u003c/p\u003e\n\n\u003cp\u003eAll three vulnerabilities were disclosed the previous month by a security researcher using the handle Nightmare Eclipse. The article says the disclosures were made in protest over how the Microsoft Security Response Center handles the vulnerability disclosure process.\u003c/p\u003e\n\n\u003ch2 id=\"patched-vulnerabilities\"\u003ePatched Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe three patched zero-days are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGreenPlasma, tracked as CVE-2026-45586.\u003c/li\u003e\n\u003cli\u003eMiniPlasma, tracked as CVE-2020-17103.\u003c/li\u003e\n\u003cli\u003eYellowKey, tracked as CVE-2026-45585.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft fixed all three in its June 2026 Patch Tuesday updates.\u003c/p\u003e\n\n\u003ch2 id=\"greenplasma-and-miniplasma\"\u003eGreenPlasma and MiniPlasma\u003c/h2\u003e\n\n\u003cp\u003eGreenPlasma and MiniPlasma are privilege escalation vulnerabilities. The article states that they were found in the Collaborative Translation Framework, also referred to as CTFMON, and the Cloud Files Mini Filter Driver.\u003c/p\u003e\n\n\u003cp\u003eThese vulnerabilities allow local attackers to obtain a shell with SYSTEM permissions. The article emphasizes that this is possible on fully patched Windows systems prior to the June 2026 fixes.\u003c/p\u003e\n\n\u003ch2 id=\"yellowkey\"\u003eYellowKey\u003c/h2\u003e\n\n\u003cp\u003eYellowKey is described as a backdoor in the Windows Recovery Environment, or WinRE. WinRE is used to repair boot-related issues in Windows.\u003c/p\u003e\n\n\u003cp\u003eThe article states that attackers with physical access to targeted devices can use a YellowKey exploit to bypass BitLocker protection. The affected systems named in the article are unpatched Windows 11 and Windows Server \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2025\u003c/sub\u003e systems.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft shared mitigation measures for YellowKey to defend against potential attacks that exploit it in the wild. The company also said the proof-of-concept had been made public in violation of coordinated vulnerability best practices.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-context\"\u003eDisclosure Context\u003c/h2\u003e\n\n\u003cp\u003eThe article attributes the disclosures to a researcher using the handle Nightmare Eclipse. It says the researcher disclosed the flaws in protest over Microsoft Security Response Center handling of the disclosure process.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes a broader pattern of zero-day proof-of-concept releases by the same researcher. Over the past several months, Nightmare Eclipse released proof-of-concept exploits for BlueHammer, tracked as CVE-2026-33825, and RedSun, which has no identifier listed in the article. The article says those two local privilege escalation zero-days are now actively exploited in attacks.\u003c/p\u003e\n\n\u003ch2 id=\"additional-zero-day-releases-mentioned\"\u003eAdditional Zero-Day Releases Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article says Nightmare Eclipse more recently leaked UnDefend, another zero-day. According to the article, attackers with standard user permissions can exploit UnDefend to block Microsoft Defender definition updates.\u003c/p\u003e\n\n\u003cp\u003eThe article also mentions a Microsoft Defender zero-day exploit named RoguePlanet. RoguePlanet is described as allowing threat actors to spawn command prompts with SYSTEM privileges.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-response\"\u003eMicrosoft Response\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft initially responded to the zero-day leaks with threats of legal action. The article says the company later backtracked after significant social media blowback.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft then said it would work with law enforcement when security researchers break the law and engage in malicious activity causing real harm to customers.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-affected-parties\"\u003eImpact and Affected Parties\u003c/h2\u003e\n\n\u003cp\u003eThe affected vendor is Microsoft, and the impacted technologies named in the article include Windows, BitLocker, Windows Recovery Environment, Collaborative Translation Framework, Cloud Files Mini Filter Driver, and Microsoft Defender. The affected operating systems specifically mentioned for YellowKey are Windows 11 and Windows Server \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2025\u003c/sub\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe key impacts described are local privilege escalation to SYSTEM permissions and bypassing BitLocker protection with physical access. The article also notes that some earlier leaked zero-days from the same researcher are now actively exploited in attacks.\u003c/p\u003e\n","keyPoints":["Microsoft patched three zero-day vulnerabilities in its June 2026 Patch Tuesday updates: GreenPlasma, MiniPlasma, and YellowKey.","GreenPlasma and MiniPlasma are privilege escalation vulnerabilities in the Collaborative Translation Framework and the Cloud Files Mini Filter Driver that allow local attackers to obtain SYSTEM permissions on fully patched Windows systems.","YellowKey is a Windows Recovery Environment backdoor that attackers with physical access can use to bypass BitLocker protection on unpatched Windows 11 and Windows Server 2022/2025 systems.","All three flaws were disclosed by a security researcher using the handle Nightmare Eclipse in protest over how the Microsoft Security Response Center handles the disclosure process.","Nightmare Eclipse has also released proof-of-concept exploits for other Windows zero-days, including BlueHammer, RedSun, UnDefend, and RoguePlanet."],"insights":["YellowKey requires defenders to treat physical access as a realistic attack path because Microsoft issued mitigation guidance for potential in-the-wild exploitation before the patch was available.","The affected privilege-escalation bugs worked on fully patched Windows systems, showing that current patch status alone was not sufficient protection before the June 2026 updates.","Nightmare Eclipse’s earlier leaked BlueHammer and RedSun proof-of-concept exploits are now actively exploited in attacks, indicating that public zero-day leaks described in the article can quickly become operational threats.","Microsoft’s response shifted from threatening legal action over the leaks to saying it would involve law enforcement only when researchers break the law and cause real customer harm."],"referencedReports":[{"title":"CVE-2026-45586","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-45586","publisher":"Microsoft Security Response Center","context":"The article links Microsoft’s vulnerability entry for GreenPlasma, one of the patched privilege escalation zero-days.","category":"","primary":false},{"title":"CVE-2020-17103","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2020-17103","publisher":"Microsoft Security Response Center","context":"The article links Microsoft’s vulnerability entry for MiniPlasma, one of the patched privilege escalation zero-days.","category":"","primary":false},{"title":"CVE-2026-45585","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-45585","publisher":"Microsoft Security Response Center","context":"The article links Microsoft’s vulnerability entry for YellowKey, the BitLocker bypass issue patched in June 2026.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft patched three Windows zero-day vulnerabilities in its June 2026 Patch Tuesday updates: GreenPlasma, MiniPlasma, and YellowKey. Two of the flaws allow attackers to gain SYSTEM privileges on fully patched Windows systems, while the third can grant access to BitLocker-protected drives. All three were disclosed by a researcher using the handle Nightmare Eclipse in protest over Microsoft Security Response Center disclosure handling.\u003c/p\u003e\n\n\u003cp\u003eGreenPlasma and MiniPlasma are local privilege escalation vulnerabilities tracked as CVE-2026-45586 and CVE-2020-17103. They were found in the Collaborative Translation Framework and the Cloud Files Mini Filter Driver, and they allow local attackers to obtain a shell with SYSTEM permissions. YellowKey, tracked as CVE-2026-45585, is described as a backdoor in the Windows Recovery Environment.\u003c/p\u003e\n\n\u003cp\u003eYellowKey can be used by attackers with physical access to bypass BitLocker protection on unpatched Windows 11 and Windows Server \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2025\u003c/sub\u003e systems. Microsoft shared mitigation measures for YellowKey and criticized the public release of proof-of-concept details as violating coordinated vulnerability best practices. The article also notes that Nightmare Eclipse has released other zero-day proof-of-concept exploits, including BlueHammer, RedSun, UnDefend, and RoguePlanet.\u003c/p\u003e\n"},{"n":15,"title":"Unpatched Langflow Flaw CVE-2026-5027 Exploited for Unauthenticated RCE","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/unpatched-langflow-flaw-cve-2026-5027.html","time":"15:00","priority":"MUST READ","score":93,"tldr":"An unpatched Langflow path traversal flaw, CVE-2026-5027, is being actively exploited and can allow unauthenticated remote code execution because default auto-login exposes the vulnerable file upload endpoint. About 7,000 internet-facing Langflow instances may be at risk.","briefOverview":"\u003cp\u003eA high-severity unpatched vulnerability in Langflow, tracked as CVE-2026-5027, is being actively exploited in the wild, according to VulnCheck. Langflow is an open-source low-code platform for building artificial intelligence applications. The flaw has a CVSS score of 8.8 and is described as a path traversal issue that can allow attackers to write files to arbitrary locations.\u003c/p\u003e\n\n\u003cp\u003eTenable said the issue affects the \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint because it does not sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter in multipart form data. Attackers can use path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e to write files elsewhere on the filesystem. VulnCheck said the issue enables remote code execution, and that Langflow’s default unauthenticated auto-login means no credentials are required to reach the vulnerable endpoint.\u003c/p\u003e\n\n\u003cp\u003eObserved exploitation so far appears to involve writing test files on victim systems. Censys data cited in the article shows about 7,000 publicly exposed Langflow instances, most of them in North America. The activity follows exploitation targeting several other Langflow vulnerabilities this year, including one previously weaponized by the Iranian state-sponsored group MuddyWater.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA high-severity unpatched security flaw in Langflow, an open-source low-code platform used to build artificial intelligence applications, has come under active exploitation in the wild. The vulnerability is tracked as CVE-2026-5027 and has a CVSS score of 8.8. VulnCheck reported the exploitation activity, with Caitlin Condon saying the issue enables remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe flaw is a path traversal vulnerability tied to Langflow’s \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint. Tenable, which discovered the issue, said the endpoint fails to sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter from multipart form data. This allows an attacker to use path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e to write files to arbitrary locations on the filesystem.\u003c/p\u003e\n\n\u003cp\u003eAccording to VulnCheck, exploitation does not require credentials because Langflow enables unauthenticated auto-login by default. Condon said a single unauthenticated request is enough to obtain a valid session token before proceeding with exploitation. This default behavior makes the vulnerable endpoint reachable without authentication.\u003c/p\u003e\n\n\u003cp\u003eTenable said it attempted to contact the Langflow project maintainers three times in January and February 2026 before disclosing details of the issue on March 27. The article describes the flaw as unpatched at the time of reporting. Exploitation observed so far appears to involve attackers writing test files on victim systems.\u003c/p\u003e\n\n\u003cp\u003eCensys data cited in the article shows that about 7,000 Langflow instances are publicly exposed on the internet, with most located in North America. The activity follows other exploitation targeting Langflow vulnerabilities this year, including CVE-2026-0770, CVE-2026-33017, CVE-2026-21445, and CVE-2025-34291. The article notes that CVE-2025-34291 was weaponized by the Iranian state-sponsored group MuddyWater.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA high-severity unpatched vulnerability in Langflow is being actively exploited in the wild, according to findings from VulnCheck. Langflow is described in the article as an open-source low-code platform for building artificial intelligence applications. The vulnerability is tracked as CVE-2026-5027 and carries a CVSS score of 8.8.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies CVE-2026-5027 as a path traversal flaw that can allow an attacker to write files to arbitrary locations. VulnCheck’s Caitlin Condon said the vulnerability enables remote code execution. Exploitation activity observed so far appears to involve writing test files on victim systems.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe flaw affects the \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint in Langflow. Tenable, which discovered the vulnerability, said the endpoint does not sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter from multipart form data. Because of this, an attacker can use path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e to write files to arbitrary locations on the filesystem.\u003c/p\u003e\n\n\u003cp\u003eVulnCheck said the issue can be exploited without credentials due to Langflow’s default unauthenticated auto-login behavior. Caitlin Condon stated that no credentials are required to reach the vulnerable endpoint. She also said a single unauthenticated request is sufficient to obtain a valid session token before proceeding with exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-patch-status\"\u003eDisclosure and Patch Status\u003c/h2\u003e\n\n\u003cp\u003eTenable said it attempted to contact the Langflow project maintainers three times in January and February 2026. The company disclosed details of the issue on March 27. The article describes the vulnerability as unpatched at the time of reporting.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-and-observed-activity\"\u003eExposure and Observed Activity\u003c/h2\u003e\n\n\u003cp\u003eAccording to Censys data cited in the article, about 7,000 Langflow instances are publicly exposed on the internet. The article says the majority of those exposed instances are located in North America.\u003c/p\u003e\n\n\u003cp\u003eThe exploitation activity described in the article appears to weaponize CVE-2026-5027 to write test files on victim systems. No further details are provided in the article about specific victims, payloads, or operational objectives tied to the observed exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"related-langflow-exploitation-activity\"\u003eRelated Langflow Exploitation Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article places CVE-2026-5027 in the context of repeated exploitation activity targeting Langflow vulnerabilities during the year. It specifically names several other Langflow CVEs that have been targeted:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-0770\u003c/li\u003e\n\u003cli\u003eCVE-2026-33017\u003c/li\u003e\n\u003cli\u003eCVE-2026-21445\u003c/li\u003e\n\u003cli\u003eCVE-2025-34291\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that CVE-2025-34291 was weaponized by the Iranian state-sponsored group known as MuddyWater. It does not attribute the current CVE-2026-5027 exploitation to a specific threat actor.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe activity highlights attacker interest in infrastructure and tooling used to build and deploy artificial intelligence applications. The article quotes a company statement saying the activity underscores a growing trend of attackers targeting AI application development and deployment tooling. In this case, the combination of arbitrary file write, remote code execution potential, and default unauthenticated auto-login makes the issue especially significant for exposed Langflow deployments.\u003c/p\u003e\n","keyPoints":["A high-severity unpatched Langflow vulnerability tracked as CVE-2026-5027 is being actively exploited in the wild, according to VulnCheck.","CVE-2026-5027 is a path traversal flaw in the POST /api/v2/files endpoint that allows attackers to write files to arbitrary filesystem locations via unsanitized filename parameters.","VulnCheck said the flaw enables remote code execution because Langflow enables unauthenticated auto-login by default, allowing attackers to obtain a valid session token without credentials.","Exploitation observed so far appears to use the bug to write test files on victim systems.","Censys data shows about 7,000 Langflow instances are publicly exposed on the internet, with most located in North America."],"insights":["The disclosure timeline indicates CVE-2026-5027 remained unpatched after Tenable said it contacted Langflow maintainers three times in January and February before publishing details on March 27.","Langflow’s default unauthenticated auto-login materially increases exposure because attackers do not need credentials to reach the vulnerable endpoint before exploitation.","Observed exploitation has so far focused on writing test files, suggesting defenders may be able to look for unexpected file writes as an indicator of targeting described in the article.","Langflow has faced repeated exploitation activity across multiple CVEs this year, including one previously weaponized by the Iranian state-sponsored group MuddyWater."],"referencedReports":[{"title":"TRA-2026-26","url":"https://www.tenable.com/security/research/tra-2026-26","publisher":"Tenable","context":"The article cites Tenable's late-March 2026 alert describing CVE-2026-5027 as a Langflow path traversal flaw in the POST /api/v2/files endpoint.","category":"","primary":false}],"body":"\u003cp\u003eA high-severity unpatched vulnerability in Langflow, tracked as CVE-2026-5027, is being actively exploited in the wild, according to VulnCheck. Langflow is an open-source low-code platform for building artificial intelligence applications. The flaw has a CVSS score of 8.8 and is described as a path traversal issue that can allow attackers to write files to arbitrary locations.\u003c/p\u003e\n\n\u003cp\u003eTenable said the issue affects the \u003ccode\u003ePOST /api/v2/files\u003c/code\u003e endpoint because it does not sanitize the \u003ccode\u003efilename\u003c/code\u003e parameter in multipart form data. Attackers can use path traversal sequences such as \u003ccode\u003e../\u003c/code\u003e to write files elsewhere on the filesystem. VulnCheck said the issue enables remote code execution, and that Langflow’s default unauthenticated auto-login means no credentials are required to reach the vulnerable endpoint.\u003c/p\u003e\n\n\u003cp\u003eObserved exploitation so far appears to involve writing test files on victim systems. Censys data cited in the article shows about 7,000 publicly exposed Langflow instances, most of them in North America. The activity follows exploitation targeting several other Langflow vulnerabilities this year, including one previously weaponized by the Iranian state-sponsored group MuddyWater.\u003c/p\u003e\n"},{"n":16,"title":"CISA Adds Cisco, Chrome, and Arista Flaws to KEV Catalog Amid Active Exploitation","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cisa-adds-cisco-chrome-and-arista-flaws.html","time":"14:44","priority":"MUST READ","score":92,"tldr":"CISA added actively exploited flaws in Cisco Catalyst SD-WAN Manager, Google Chrome V8, and Arista EOS to its KEV catalog, requiring U.S. federal agencies to fix or mitigate them by June 23, 2026. Notably, Arista does not plan to patch its EOS tunnel decapsulation flaw and is recommending ACL-based mitigations instead.","briefOverview":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency added three vulnerabilities to its Known Exploited Vulnerabilities catalog after reports of active exploitation. The newly added flaws affect Cisco Catalyst SD-WAN Manager, Google Chrome V8, and Arista Extensible Operating System. Federal Civilian Executive Branch agencies were ordered to apply fixes or mitigations by June 23, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe Cisco flaw, CVE-2026-20245, could allow an authenticated local attacker to execute arbitrary commands as root by supplying a crafted file to an affected system. The Chrome flaw, CVE-2026-11645, is an out-of-bounds read and write issue in V8 that could allow remote code execution inside a sandbox via a crafted HTML page. The Arista flaw, CVE-2026-7473, can cause affected switches to improperly decapsulate and forward unexpected tunneled packets.\u003c/p\u003e\n\n\u003cp\u003eArista said CVE-2026-7473 affects certain 7020R, 7280R/R2, and 7500R/R2 series products when they are configured as tunnel endpoints with a decapsulation IP. The company acknowledged the flaw has been reported as exploited in the wild but said it does not plan to release a patch because of risks to existing deployments. Arista instead recommended mitigations using access control lists on upstream devices or on affected devices.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA added three vulnerabilities to its Known Exploited Vulnerabilities catalog on Tuesday following reports of active exploitation. The vulnerabilities are CVE-2026-20245 in Cisco Catalyst SD-WAN Manager, CVE-2026-11645 in Google Chrome V8, and CVE-2026-7473 in Arista Extensible Operating System. The action requires Federal Civilian Executive Branch agencies to apply the necessary fixes or mitigations by June 23, 2026.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-20245 has a CVSS score of 7.8 and is described as an improper encoding or escaping of output vulnerability in Cisco Catalyst SD-WAN Manager. According to the article, it could allow an authenticated local attacker to execute arbitrary commands as root. Exploitation involves supplying a crafted file to an affected system.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-11645 has a CVSS score of 8.8 and affects Google Chrome V8. It is described as an out-of-bounds read and write vulnerability. The article says a remote attacker could use a crafted HTML page to execute arbitrary code inside a sandbox.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-7473 has a CVSS score of 6.9 and affects Arista EOS. Arista said that on affected platforms with tunnel decapsulation configurations such as VXLAN, decap-groups, or GRE tunnel interfaces, the switch may incorrectly decapsulate and forward unexpected tunneled packets when the destination IP matches its configured decapsulation IP. The company said this happens because the switch does not verify the tunnel protocol type.\u003c/p\u003e\n\n\u003cp\u003eThe Arista issue primarily affects 7020R, 7280R/R2, and 7500R/R2 series products, but exploitation requires the device to be configured as a tunnel endpoint with a decapsulation IP. Arista credited Comcast\u0026rsquo;s Scott Christiansen, Lukas Peitz, Rich Compton, and Jonathan Davis for responsibly disclosing the issue. Although the vulnerability has been reported as exploited in the wild, Arista said no patch is planned and recommended ACL-based mitigations on upstream devices or on affected devices.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency added three vulnerabilities to its Known Exploited Vulnerabilities catalog after reports of active exploitation. The vulnerabilities affect Cisco Catalyst SD-WAN Manager, Google Chrome V8, and Arista Extensible Operating System. CISA’s additions cover issues that could lead to root command execution, remote code execution inside a sandbox, and unexpected processing of tunneled traffic.\u003c/p\u003e\n\n\u003cp\u003eFederal Civilian Executive Branch agencies were ordered to apply the necessary fixes or mitigations by June 23, 2026. The article identifies the three vulnerabilities as CVE-2026-20245, CVE-2026-11645, and CVE-2026-7473.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerabilities-added-to-cisa-kev\"\u003eVulnerabilities Added to CISA KEV\u003c/h2\u003e\n\n\u003cp\u003eCISA added the following flaws to its Known Exploited Vulnerabilities catalog:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-20245\u003c/strong\u003e: A Cisco Catalyst SD-WAN Manager vulnerability with a CVSS score of 7.8.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-11645\u003c/strong\u003e: A Google Chrome V8 vulnerability with a CVSS score of 8.8.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-7473\u003c/strong\u003e: An Arista EOS vulnerability with a CVSS score of 6.9.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the additions followed reports of active exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"cisco-catalyst-sd-wan-manager-issue\"\u003eCisco Catalyst SD-WAN Manager Issue\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-20245 is described as an improper encoding or escaping of output vulnerability in Cisco Catalyst SD-WAN Manager. The article says the flaw could allow an authenticated local attacker to execute arbitrary commands as root. Exploitation would involve supplying a crafted file to the affected system.\u003c/p\u003e\n\n\u003ch2 id=\"google-chrome-v8-issue\"\u003eGoogle Chrome V8 Issue\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-11645 is described as an out-of-bounds read and write vulnerability in Google Chrome V8. The article says a remote attacker could exploit it using a crafted HTML page. Successful exploitation could allow the attacker to execute arbitrary code inside a sandbox.\u003c/p\u003e\n\n\u003ch2 id=\"arista-eos-issue\"\u003eArista EOS Issue\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-7473 is described as an incomplete comparison with missing factors vulnerability in Arista Extensible Operating System. The article says it could be exploited to process non-configured tunnel traffic.\u003c/p\u003e\n\n\u003cp\u003eArista explained that on affected platforms running Arista EOS where a tunnel decapsulation configuration is present, the switch will incorrectly decapsulate and forward other unexpected tunneled packets if the destination IP matches its configured decapsulation IP. The affected tunnel decapsulation configurations mentioned in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVXLAN, or Virtual Extensible LAN\u003c/li\u003e\n\u003cli\u003eDecap-groups\u003c/li\u003e\n\u003cli\u003eGRE, or Generic Routing Encapsulation, tunnel interfaces\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eArista said the issue occurs because the switch does not verify the tunnel protocol type. This can lead to unexpected processing of non-configured tunnel traffic.\u003c/p\u003e\n\n\u003ch2 id=\"arista-affected-products-and-exploitation-conditions\"\u003eArista Affected Products and Exploitation Conditions\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the Arista security defect mainly impacts the following product series:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e7020R\u003c/li\u003e\n\u003cli\u003e7280R/R2\u003c/li\u003e\n\u003cli\u003e7500R/R2\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eHowever, successful exploitation requires a specific configuration. The device must be configured as a tunnel endpoint with a decapsulation IP. Examples provided in the article include a VXLAN VTEP, a GRE tunnel endpoint, or an IP decap-group.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-exploitation-status\"\u003eDisclosure and Exploitation Status\u003c/h2\u003e\n\n\u003cp\u003eArista acknowledged that CVE-2026-7473 has been reported as being exploited in the wild. The company credited Comcast\u0026rsquo;s Scott Christiansen, Lukas Peitz, Rich Compton, and Jonathan Davis for responsibly disclosing the vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name any threat actor or group associated with exploitation of the three vulnerabilities.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigations\"\u003eResponse and Mitigations\u003c/h2\u003e\n\n\u003cp\u003eArista said it does not plan to release patches for CVE-2026-7473. The company cited the risk that patching the issue could break existing configurations in deployments.\u003c/p\u003e\n\n\u003cp\u003eInstead, Arista outlined two broad mitigation approaches:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApplying ACLs on upstream devices.\u003c/li\u003e\n\u003cli\u003eApplying ACLs on the devices where unexpected decapsulation is happening.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eArista said the goal in both cases is to selectively allow only legitimate tunnel traffic or selectively block malicious tunnel traffic.\u003c/p\u003e\n\n\u003ch2 id=\"required-federal-action\"\u003eRequired Federal Action\u003c/h2\u003e\n\n\u003cp\u003eFederal Civilian Executive Branch agencies must apply necessary fixes or mitigations for the three CISA-listed vulnerabilities by June 23, 2026. The article frames this requirement as a response to the threat posed by the actively exploited Cisco, Chrome, and Arista flaws.\u003c/p\u003e\n","keyPoints":["CISA added CVE-2026-20245, CVE-2026-11645, and CVE-2026-7473 to its Known Exploited Vulnerabilities catalog after reports of active exploitation.","CVE-2026-20245 is an improper output encoding or escaping flaw in Cisco Catalyst SD-WAN Manager that could allow an authenticated local attacker to execute arbitrary commands as root using a crafted file.","CVE-2026-11645 is an out-of-bounds read and write vulnerability in Google Chrome V8 that could allow a remote attacker to execute arbitrary code inside a sandbox via a crafted HTML page.","CVE-2026-7473 affects Arista EOS and can cause affected switches configured as tunnel endpoints to incorrectly decapsulate and forward unexpected tunneled packets with a destination IP matching a configured decapsulation IP.","Arista said it does not plan to patch CVE-2026-7473 because of risks to existing deployments and instead recommended ACL-based mitigations."],"insights":["Arista’s actively exploited EOS flaw requires mitigations rather than a patch, making configuration review and ACL deployment the primary remediation path for affected environments.","CVE-2026-7473 is only exploitable under specific tunnel endpoint configurations, so organizations can prioritize checks on Arista devices configured with VXLAN VTEP, GRE tunnel endpoints, or IP decap-groups.","The Arista issue can be mitigated either upstream or directly on affected switches, giving defenders flexibility to block or allow tunnel traffic based on where enforcement is most practical.","The federal remediation deadline of June 23, 2026 creates a short operational window for agencies to address three different exploited vulnerabilities across browser, SD-WAN management, and network switching environments."],"referencedReports":[{"title":"CISA Adds Three Known Exploited Vulnerabilities to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/09/cisa-adds-three-known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"The article cites CISA's alert announcing the addition of three actively exploited vulnerabilities to the KEV catalog.","category":"","primary":false},{"title":"Known Exploited Vulnerabilities Catalog","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"The article references CISA's KEV catalog as the official catalog where the three vulnerabilities were added.","category":"","primary":false},{"title":"Security Advisory 0137","url":"https://www.arista.com/en/support/advisories-notices/security-advisory/24005-security-advisory-0137","publisher":"Arista","context":"The article cites Arista's security advisory for details and mitigations related to CVE-2026-7473 in Arista EOS.","category":"","primary":false}],"body":"\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency added three vulnerabilities to its Known Exploited Vulnerabilities catalog after reports of active exploitation. The newly added flaws affect Cisco Catalyst SD-WAN Manager, Google Chrome V8, and Arista Extensible Operating System. Federal Civilian Executive Branch agencies were ordered to apply fixes or mitigations by June 23, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe Cisco flaw, CVE-2026-20245, could allow an authenticated local attacker to execute arbitrary commands as root by supplying a crafted file to an affected system. The Chrome flaw, CVE-2026-11645, is an out-of-bounds read and write issue in V8 that could allow remote code execution inside a sandbox via a crafted HTML page. The Arista flaw, CVE-2026-7473, can cause affected switches to improperly decapsulate and forward unexpected tunneled packets.\u003c/p\u003e\n\n\u003cp\u003eArista said CVE-2026-7473 affects certain 7020R, 7280R/R2, and 7500R/R2 series products when they are configured as tunnel endpoints with a decapsulation IP. The company acknowledged the flaw has been reported as exploited in the wild but said it does not plan to release a patch because of risks to existing deployments. Arista instead recommended mitigations using access control lists on upstream devices or on affected devices.\u003c/p\u003e\n"},{"n":2,"title":"China-linked JDY botnet expands targeting of U.S. military networks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/china-linked-jdy-botnet-expands-targeting-of-us-military-networks/","time":"15:00","priority":"SHOULD READ","score":87,"tldr":"The China-linked JDY botnet has expanded to over 1,500 compromised SOHO and IoT devices and is being used to rapidly scan for newly disclosed vulnerabilities, with a strong focus on U.S. military and related networks. Defenders should patch edge devices, lock down remote management, and monitor for unusual outbound scanning.","briefOverview":"\u003cp\u003eThe JDY botnet, a malware network previously associated with Chinese threat actors like Volt Typhoon, has expanded its targeting scope and reconnaissance activity. Black Lotus Labs by Lumen says JDY has grown from roughly 650 active bots in January 2024 to more than 1,500 compromised SOHO and IoT devices today. The botnet maintains a strong focus on the United States, where many compromised devices are located and where it heavily targets military and associated networks.\u003c/p\u003e\n\n\u003cp\u003eJDY is not described as an exploitation framework or DDoS botnet, but as a distributed scanning and fingerprinting network. Researchers say it helps operators locate targets vulnerable to newly disclosed flaws, and that its reconnaissance output appears to be rapidly operationalized by China-nexus APT actors. Lumen researchers observed JDY scans targeting CVE-2026-35616 shortly after Fortinet publicly disclosed the FortiClient EMS flaw.\u003c/p\u003e\n\n\u003cp\u003eThe botnet uses hidden Tor services for command-and-control and, in some cases, the open-source Platypus reverse-shell and host-management framework. Its scanning module supports TCP, SSL/TLS, UDP, ICMP, banner collection, TLS certificate harvesting, and service fingerprinting through downloadable rule sets. Defenders are advised to patch routers, firewalls, and IoT devices, disable unnecessary internet-exposed administrative interfaces, restrict remote management, replace default credentials, and monitor for unusual outbound scanning from edge devices.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eBlack Lotus Labs by Lumen reports that the JDY botnet has significantly expanded its targeting scope and reconnaissance efforts. JDY has previously been associated with Chinese threat actors like Volt Typhoon. The botnet has grown from roughly 650 active bots in January 2024 to more than 1,500 compromised SOHO and IoT devices today. Many of those compromised devices are located in the United States, where JDY heavily targets military and associated networks.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that JDY’s relatively small bot count does not reflect a lack of significance. Unlike an exploitation framework or DDoS botnet, JDY is described as a distributed scanning and fingerprinting network. Its purpose is to help operators find targets vulnerable to newly disclosed flaws. Black Lotus Labs says the activity shows a focus on identifying vulnerable infrastructure shortly after public vulnerability disclosures.\u003c/p\u003e\n\n\u003cp\u003eResearchers say JDY has been observed across a range of sectors, with the U.S. military and associated entities as the most prominent targets. CISA has previously warned about the risk Volt Typhoon operatives pose to unprotected SOHO routers. CISA urged network device vendors to eliminate vulnerabilities in SOHO router web management interfaces during design and development.\u003c/p\u003e\n\n\u003cp\u003eJDY conducts service discovery, service banner grabbing, TLS certificate collection, protocol fingerprinting, and flaw-focused reconnaissance. Compromised devices include products from Cisco, Araknis, Mimosa Networks, Ubiquiti, DrayTek, Hikvision, and Linksys. The malware supports MIPS, MIPS64, MIPSEL, and MIPSEL64 architectures. Lumen researchers observed JDY scans targeting CVE-2026-35616 shortly after Fortinet publicly disclosed the FortiClient EMS flaw.\u003c/p\u003e\n\n\u003cp\u003eThe operators control the botnet through hidden Tor services, which also serve as command-and-control infrastructure. In some cases, the open-source reverse-shell and host-management framework Platypus is also used. The malware registers with a central Dispatch Service, receives scanning assignments, executes them, compresses the results, and sends them back to command-and-control. The botnet client repeats the cycle until the operator orders it to stop.\u003c/p\u003e\n\n\u003cp\u003eJDY’s scanning module supports TCP scanning, SSL/TLS scanning, UDP scanning, ICMP probing, banner collection, TLS certificate harvesting, and service fingerprinting using downloadable rule sets. When the malware has sufficient privileges to open a raw socket, it can conduct faster and stealthier raw SYN scanning with custom-crafted TCP packets. Organizations are advised to keep routers, firewalls, and IoT devices updated, disable unnecessary internet-exposed administrative interfaces, restrict remote management access, replace default credentials, and monitor edge devices for unusual outbound scanning activity.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eBlack Lotus Labs by Lumen reports that the JDY botnet, a malware network previously associated with Chinese threat actors like Volt Typhoon, has expanded its targeting scope and reconnaissance efforts. The botnet has grown from roughly 650 active bots in January 2024 to more than 1,500 compromised SOHO and IoT devices today. The article says JDY maintains a strong focus on the United States, where many compromised devices are located and where it heavily targets military and associated networks.\u003c/p\u003e\n\n\u003cp\u003eAlthough the botnet’s size is relatively small, the article stresses that JDY is not a DDoS botnet or exploitation framework that depends on large numbers of bots. Instead, JDY is described as a distributed scanning and fingerprinting network. Its role is to help operators locate targets vulnerable to newly disclosed flaws.\u003c/p\u003e\n\n\u003ch2 id=\"reported-activity-and-targeting\"\u003eReported Activity and Targeting\u003c/h2\u003e\n\n\u003cp\u003eBlack Lotus Labs says JDY activity shows a clear focus on identifying vulnerable infrastructure shortly after public vulnerability disclosures. The researchers said this suggests that reconnaissance output is rapidly operationalized by China-nexus advanced persistent threat actors. The article states that JDY has been observed targeting a range of sectors, with the U.S. military and associated entities as the most prominent.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that CISA has previously warned about the risk Volt Typhoon operatives pose to unprotected SOHO routers. CISA urged network device vendors to eliminate vulnerabilities in SOHO router web management interfaces during the design and development phases.\u003c/p\u003e\n\n\u003ch2 id=\"botnet-size-and-device-ecosystem\"\u003eBotnet Size and Device Ecosystem\u003c/h2\u003e\n\n\u003cp\u003eJDY has expanded from approximately 650 active bots in January 2024 to more than 1,500 compromised SOHO and IoT devices today. The compromised devices include products from:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco\u003c/li\u003e\n\u003cli\u003eAraknis\u003c/li\u003e\n\u003cli\u003eMimosa Networks\u003c/li\u003e\n\u003cli\u003eUbiquiti\u003c/li\u003e\n\u003cli\u003eDrayTek\u003c/li\u003e\n\u003cli\u003eHikvision\u003c/li\u003e\n\u003cli\u003eLinksys\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the malware targets MIPS, MIPS64, MIPSEL, and MIPSEL64 architectures.\u003c/p\u003e\n\n\u003ch2 id=\"reconnaissance-capabilities\"\u003eReconnaissance Capabilities\u003c/h2\u003e\n\n\u003cp\u003eJDY is designed to perform several forms of reconnaissance and fingerprinting. The article specifically lists:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eService discovery\u003c/li\u003e\n\u003cli\u003eService banner grabbing\u003c/li\u003e\n\u003cli\u003eTLS certificate collection\u003c/li\u003e\n\u003cli\u003eProtocol fingerprinting\u003c/li\u003e\n\u003cli\u003eFlaw-focused reconnaissance\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIts scanning module supports:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTCP scanning\u003c/li\u003e\n\u003cli\u003eSSL/TLS scanning\u003c/li\u003e\n\u003cli\u003eUDP scanning\u003c/li\u003e\n\u003cli\u003eICMP probing\u003c/li\u003e\n\u003cli\u003eBanner collection\u003c/li\u003e\n\u003cli\u003eTLS certificate harvesting\u003c/li\u003e\n\u003cli\u003eService fingerprinting using downloadable rule sets\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the botnet helps operators locate vulnerable targets soon after public vulnerability disclosures. Lumen researchers observed JDY scans targeting CVE-2026-35616 shortly after Fortinet publicly disclosed the FortiClient EMS flaw.\u003c/p\u003e\n\n\u003ch2 id=\"command-and-control-infrastructure\"\u003eCommand-and-Control Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eJDY operators control the botnet through hidden Tor services, which also serve as command-and-control infrastructure. In some cases, the open-source reverse-shell and host-management framework Platypus is used. The malware registers with a central Dispatch Service and receives scanning assignments from it.\u003c/p\u003e\n\n\u003cp\u003eAfter receiving assignments, JDY executes the scans, compresses the results, and sends them back to the command-and-control infrastructure. The botnet client repeats this cycle until the operator specifically orders it to stop.\u003c/p\u003e\n\n\u003ch2 id=\"raw-syn-scanning-behavior\"\u003eRaw SYN Scanning Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies JDY’s TCP scanning function as one of its more technically interesting features. When JDY has sufficient privileges, it performs faster and stealthier raw SYN scanning. This requires the malware to be able to open a raw socket, which generally requires root or administrative privileges.\u003c/p\u003e\n\n\u003cp\u003eIn that mode, JDY initiates high-speed SYN scanning using custom-crafted TCP packets. The custom packets use a fixed source port of 19000, increment destination ports one at a time, and batch-process thousands of scan targets.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-recommendations\"\u003eDefensive Recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends that organizations ensure routers, firewalls, and IoT devices are running the latest security updates and patches to prevent them from being recruited into reconnaissance networks. It also recommends reducing the external attack surface by disabling unnecessary internet-exposed administrative interfaces.\u003c/p\u003e\n\n\u003cp\u003eAdditional defensive measures listed in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRestricting remote management access\u003c/li\u003e\n\u003cli\u003eReplacing default credentials\u003c/li\u003e\n\u003cli\u003eMonitoring for unusual outbound scanning activity originating from edge devices\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese measures are presented in the context of JDY’s increasing botnet activity and its use of compromised SOHO and IoT devices for distributed scanning and fingerprinting.\u003c/p\u003e\n","keyPoints":["Black Lotus Labs by Lumen reports that the China-linked JDY botnet has grown from roughly 650 active bots in January 2024 to over 1,500 compromised SOHO and IoT devices today.","JDY is a distributed scanning and fingerprinting network used to identify vulnerable infrastructure shortly after public vulnerability disclosures, rather than an exploitation framework or DDoS botnet.","Researchers observed that JDY maintains a strong focus on the United States, particularly targeting U.S. military and associated networks.","The botnet includes compromised devices from Cisco, Araknis, Mimosa Networks, Ubiquiti, DrayTek, Hikvision, and Linksys across several MIPS-based architectures.","JDY uses hidden Tor services for command-and-control, receives scanning assignments from a central Dispatch Service, and supports TCP, SSL/TLS, UDP, ICMP, banner collection, TLS certificate harvesting, and service fingerprinting."],"insights":["JDY’s relatively small size does not reduce its significance because its purpose is targeted reconnaissance and fingerprinting, not high-volume DDoS activity.","Public vulnerability disclosures appear to be operationalized quickly, as researchers observed JDY scanning for CVE-2026-35616 shortly after Fortinet disclosed the FortiClient EMS flaw.","Edge devices with root or administrative compromise can make JDY scanning faster and stealthier because the malware can use raw SYN scanning with custom-crafted TCP packets.","Outbound scanning from routers, firewalls, and IoT devices is an important detection signal because JDY’s compromised devices repeatedly execute scan assignments and return compressed results to command-and-control infrastructure."],"referencedReports":[{"title":"Expanded JDY IoT and SOHO Botnet Enables Rapid Vulnerability Exploitation","url":"https://www.lumen.com/blog/en-us/expanded-jdy-iot-and-soho-botnet-enables-rapid-vulnerability-exploitation","publisher":"Black Lotus Labs by Lumen","context":"The article cites Black Lotus Labs' report as the source for analysis that JDY is identifying vulnerable infrastructure shortly after public vulnerability disclosures and targeting U.S. military and associated entities.","category":"","primary":false}],"body":"\u003cp\u003eThe JDY botnet, a malware network previously associated with Chinese threat actors like Volt Typhoon, has expanded its targeting scope and reconnaissance activity. Black Lotus Labs by Lumen says JDY has grown from roughly 650 active bots in January 2024 to more than 1,500 compromised SOHO and IoT devices today. The botnet maintains a strong focus on the United States, where many compromised devices are located and where it heavily targets military and associated networks.\u003c/p\u003e\n\n\u003cp\u003eJDY is not described as an exploitation framework or DDoS botnet, but as a distributed scanning and fingerprinting network. Researchers say it helps operators locate targets vulnerable to newly disclosed flaws, and that its reconnaissance output appears to be rapidly operationalized by China-nexus APT actors. Lumen researchers observed JDY scans targeting CVE-2026-35616 shortly after Fortinet publicly disclosed the FortiClient EMS flaw.\u003c/p\u003e\n\n\u003cp\u003eThe botnet uses hidden Tor services for command-and-control and, in some cases, the open-source Platypus reverse-shell and host-management framework. Its scanning module supports TCP, SSL/TLS, UDP, ICMP, banner collection, TLS certificate harvesting, and service fingerprinting through downloadable rule sets. Defenders are advised to patch routers, firewalls, and IoT devices, disable unnecessary internet-exposed administrative interfaces, restrict remote management, replace default credentials, and monitor for unusual outbound scanning from edge devices.\u003c/p\u003e\n"},{"n":18,"title":"China-Linked JDY Botnet Expands to 1,500+ Devices for Cyber Reconnaissance","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/china-linked-jdy-botnet-expands-to-1500.html","time":"16:08","priority":"SHOULD READ","score":86,"tldr":"China-linked JDY has grown into a 1,500-plus-device SOHO/IoT botnet used for targeted reconnaissance and service fingerprinting to help Chinese threat actors quickly identify vulnerable infrastructure after disclosures. Its use of compromised devices across many regions helps it evade IP-based defenses and persist despite prior botnet takedowns.","briefOverview":"\u003cp\u003eLumen\u0026rsquo;s Black Lotus Labs reported a resurgence and expansion of JDY, a China-linked covert network associated with state-sponsored threat actors. The botnet now comprises more than 1,500 compromised SOHO and IoT devices and is used as a centrally controlled scanner to discover, fingerprint, and map exposed services at scale. The article says its reconnaissance output can support follow-on target identification and exploitation by Chinese nation-state groups.\u003c/p\u003e\n\n\u003cp\u003eJDY was first identified in December 2023 as a cluster within KV-botnet, which had been used by Chinese hacking groups such as Volt Typhoon. After the U.S. government takedown of KV-botnet in early 2024, operators made behavioral changes, and JDY has since expanded beyond its earlier device profile. The botnet now includes devices from Araknis, Mimosa Networks, Ubiquiti, Draytek, Hikvision, Linksys, and others, with many nodes located in the United States and Brazil.\u003c/p\u003e\n\n\u003cp\u003eTechnically, JDY uses Tor nodes to manage infected infrastructure, including command-and-control and payload servers. Its malware fingerprints the host, receives scanning tasks, conducts TCP, SSL, UDP, and ICMP-assisted probing, captures responses such as TLS certificates and metadata, and reports results back to central servers. The malware can use high-speed SYN scanning when raw sockets are available and fall back to standard TCP, TLS, UDP, or ICMP methods when needed.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eLumen\u0026rsquo;s Black Lotus Labs warned of a resurgence and expansion of JDY, a covert botnet associated with China-nexus state-sponsored threat actors. The network is described as containing more than 1,500 SOHO and IoT devices and operating as a centrally controlled, high-performance scanner. Its purpose is to discover, fingerprint, and continuously map exposed services at scale.\u003c/p\u003e\n\n\u003cp\u003eJDY was first flagged in mid-December 2023 as a cluster within KV-botnet. KV-botnet was used for broader scanning against internet targets and involved compromised SOHO routers, firewalls, and IoT devices. The article says Chinese hacking groups such as Volt Typhoon used the stealthy network, and that after a U.S. government takedown in early 2024, the operators changed behavior while a second KV cluster largely went offline.\u003c/p\u003e\n\n\u003cp\u003eBlack Lotus Labs said JDY has expanded in scope and now feeds structured reconnaissance data into a larger scanning ecosystem. The cluster is being used for targeted scanning and service fingerprinting to flag vulnerable infrastructure after public disclosures. The article characterizes this as an industrialized reconnaissance effort whose results are leveraged by Chinese nation-state groups.\u003c/p\u003e\n\n\u003cp\u003eThe botnet has grown from 650 bots at the start of January 2024 to more than 1,500 compromised devices. Most hacked nodes are located in the United States and Brazil, followed by Europe and Asia. While the cluster previously featured Cisco RV320 and RV325 routers, it now includes a broader set of devices from Araknis, Mimosa Networks, Ubiquiti, Draytek, Hikvision, and Linksys.\u003c/p\u003e\n\n\u003cp\u003eJDY\u0026rsquo;s architecture is layered, with operators using Tor nodes to manage infected infrastructure, including command-and-control and payload servers. Attack chains weaponize newly disclosed edge-device vulnerabilities, such as CVE-2026-35616, to deliver a shell script dropper that downloads a payload matching the processor architecture and deletes the malware from disk after launch. Once running, the malware profiles the host, receives scanning tasks, probes targets through TCP, SSL, UDP, and ICMP-assisted methods, and sends responses such as TLS certificates and metadata back to central servers.\u003c/p\u003e\n\n\u003cp\u003eBlack Lotus Labs said the botnet\u0026rsquo;s use of U.S.-based SOHO and IoT devices helps operators evade geofencing, IP reputation detection, and static blocklists. The malware also adapts scanning based on local privileges, using high-speed SYN scanning when raw sockets indicate root privileges and falling back to standard TCP, TLS, UDP, or ICMP methods otherwise. The company said JDY\u0026rsquo;s continued operation shows how reconnaissance networks can persist despite takedowns and provide timely targeting data, often within hours of vulnerability disclosure.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eLumen\u0026rsquo;s Black Lotus Labs reported a \u0026ldquo;resurgence and expansion\u0026rdquo; of JDY, a covert network associated with China-nexus state-sponsored threat actors. The JDY botnet is described as comprising more than 1,500 SOHO and IoT devices. It operates as a centrally controlled, high-performance scanner used to discover, fingerprint, and continuously map exposed services at scale.\u003c/p\u003e\n\n\u003cp\u003eThe article frames JDY as a reconnaissance capability rather than a direct exploitation tool. Black Lotus Labs said the botnet feeds structured reconnaissance data into a larger scanning ecosystem for follow-on target identification and exploitation. The company said the results are leveraged by Chinese nation-state groups.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-kv-botnet\"\u003eRelationship to KV-botnet\u003c/h2\u003e\n\n\u003cp\u003eJDY was first flagged in mid-December 2023 as a cluster within KV-botnet. KV-botnet was primarily used for broader scanning against internet targets and consisted of compromised SOHO routers, firewalls, and IoT devices. The article says the stealthy network was put to use by Chinese hacking groups such as Volt Typhoon.\u003c/p\u003e\n\n\u003cp\u003eAfter KV-botnet was taken down by the U.S. government in early 2024, the botnet operators began making behavioral changes. The article states that the second KV cluster largely went offline after the takedown. It also says the botnet is suspected of being offered by operators to various hacking outfits while the operators also carry out reconnaissance and targeting on their own.\u003c/p\u003e\n\n\u003ch2 id=\"expansion-in-size-and-device-diversity\"\u003eExpansion in Size and Device Diversity\u003c/h2\u003e\n\n\u003cp\u003eBlack Lotus Labs reported that JDY has grown significantly. The botnet increased from about 650 bots at the start of January 2024 to more than 1,500 compromised devices. Most of the hacked nodes are located in the United States and Brazil, followed by Europe and Asia.\u003c/p\u003e\n\n\u003cp\u003eThe device makeup of the botnet has also broadened. Earlier, the cluster primarily featured Cisco RV320 and RV325 routers. The current botnet includes devices from Araknis, Mimosa Networks, Ubiquiti, Draytek, Hikvision, and Linksys.\u003c/p\u003e\n\n\u003ch2 id=\"operational-purpose\"\u003eOperational Purpose\u003c/h2\u003e\n\n\u003cp\u003eJDY is being used for targeted scanning and service fingerprinting. The stated aim is to flag vulnerable infrastructure after public vulnerability disclosures. Black Lotus Labs described this as an industrialized reconnaissance effort.\u003c/p\u003e\n\n\u003cp\u003eThe article says this activity most likely informs:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAsset discovery\u003c/li\u003e\n\u003cli\u003eVulnerability-targeting pipelines\u003c/li\u003e\n\u003cli\u003eDownstream exploitation or attack-orchestration systems\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe malware\u0026rsquo;s stated goal is infrastructure reconnaissance rather than exploitation. It discovers and fingerprints services, captures response data, and reports findings to central servers for ongoing intelligence gathering.\u003c/p\u003e\n\n\u003ch2 id=\"evasion-value-of-compromised-soho-and-iot-devices\"\u003eEvasion Value of Compromised SOHO and IoT Devices\u003c/h2\u003e\n\n\u003cp\u003eBlack Lotus Labs said the botnet\u0026rsquo;s large number of U.S.-based SOHO and IoT devices helps operators evade defenses and traditional IP-based controls. These controls include geofencing, IP reputation-based detection, and static blocklists.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that distributing scanning and reconnaissance activity across a wide range of IP addresses reduces the chance that any single IP address will be labeled as a scanner and blocked. It also states that using compromised SOHO and IoT devices helps the activity blend in with legitimate user traffic.\u003c/p\u003e\n\n\u003ch2 id=\"architecture-and-command-infrastructure\"\u003eArchitecture and Command Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe botnet\u0026rsquo;s architecture is described as layered. Operators use Tor nodes to manage infected infrastructure. This includes both command-and-control servers and payload servers.\u003c/p\u003e\n\n\u003cp\u003eThe command-and-control servers direct bots to perform targeted reconnaissance and system profiling. This activity is contrasted with indiscriminate scanning. Scan results are sent to central servers for ongoing intelligence gathering in support of Chinese threat actors\u0026rsquo; objectives.\u003c/p\u003e\n\n\u003ch2 id=\"infection-chain-and-payload-handling\"\u003eInfection Chain and Payload Handling\u003c/h2\u003e\n\n\u003cp\u003eThe article says attack chains weaponize newly disclosed vulnerabilities in edge devices, giving CVE-2026-35616 as an example. These attacks deliver a shell script dropper. The dropper checks whether the malware is already active.\u003c/p\u003e\n\n\u003cp\u003eIf the malware is not already active, the dropper downloads the primary payload based on the detected processor architecture. The listed architectures include mips, mips64, mipsel, and mipsel64. Once the malware is launched, it is deleted from disk.\u003c/p\u003e\n\n\u003ch2 id=\"malware-capabilities\"\u003eMalware Capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe JDY malware facilitates scanning and target reconnaissance. It is designed to fingerprint the host and receive scanning tasks from a central command-and-control server. It then performs high-volume probing and reports results back to a dispatch server.\u003c/p\u003e\n\n\u003cp\u003eThe article specifically says the malware can conduct:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTCP probing\u003c/li\u003e\n\u003cli\u003eSSL probing\u003c/li\u003e\n\u003cli\u003eUDP probing\u003c/li\u003e\n\u003cli\u003eICMP-assisted probing\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt can also capture responses such as TLS certificates and metadata. These results are then returned to central servers.\u003c/p\u003e\n\n\u003ch2 id=\"adaptive-scanning-behavior\"\u003eAdaptive Scanning Behavior\u003c/h2\u003e\n\n\u003cp\u003eA notable function of the malware is its ability to adapt its scanning methodology based on its privileges on the local system. If it can open a raw socket, which indicates root privileges, it initiates high-speed SYN scanning using custom-crafted TCP packets.\u003c/p\u003e\n\n\u003cp\u003eIf raw sockets are unavailable, or if the assigned task is a web scan, the scanning engine changes its approach. It falls back to standard TCP and TLS connections or uses protocols such as UDP and ICMP.\u003c/p\u003e\n\n\u003ch2 id=\"significance-according-to-black-lotus-labs\"\u003eSignificance According to Black Lotus Labs\u003c/h2\u003e\n\n\u003cp\u003eBlack Lotus Labs said JDY demonstrates how IoT and SOHO botnets and covert networks of compromised devices are being used for rapid vulnerability exploitation. The company said JDY\u0026rsquo;s growth and continued operation illustrate how modern reconnaissance networks can persist despite takedowns. It also said these networks can adapt as a durable capability within a broader adversary ecosystem.\u003c/p\u003e\n\n\u003cp\u003eThe company further stated that JDY\u0026rsquo;s evolution from a supporting component of KV-botnet to an independent, high-performance reconnaissance capability shows that disruption of individual nodes or clusters does not eliminate the underlying capability. According to Black Lotus Labs, the capability persists, adapts, and continues to provide adversaries with timely targeting data, often within hours of vulnerability disclosure.\u003c/p\u003e\n","keyPoints":["Lumen's Black Lotus Labs reported that the China-linked JDY botnet has expanded to more than 1,500 compromised SOHO and IoT devices used for large-scale scanning, service fingerprinting, and reconnaissance.","JDY was first identified in December 2023 as a cluster within KV-botnet, which had been used by Chinese hacking groups such as Volt Typhoon before a U.S. government takedown in early 2024.","The botnet now includes devices from vendors such as Araknis, Mimosa Networks, Ubiquiti, Draytek, Hikvision, and Linksys, with many compromised nodes located in the United States and Brazil.","JDY operators use Tor nodes to manage command-and-control and payload servers, direct bots to perform targeted reconnaissance, and collect scan results on central servers.","The malware can adapt its scanning method based on local privileges, using high-speed SYN scanning when raw sockets are available and falling back to standard TCP, TLS, UDP, or ICMP-based probing otherwise."],"insights":["JDY’s use of many U.S.-based SOHO and IoT devices makes geofencing, IP reputation checks, and static blocklists less effective because the scanning can appear to originate from ordinary domestic user networks.","The botnet’s shift from mostly Cisco RV320 and RV325 routers to a broader mix of Araknis, Mimosa Networks, Ubiquiti, Draytek, Hikvision, and Linksys devices indicates defenders should not treat JDY as limited to its original router profile.","JDY’s role is focused on structured reconnaissance rather than direct exploitation, making it a precursor capability that can feed asset discovery and vulnerability-targeting pipelines after public disclosures.","The botnet’s adaptation after the KV-botnet takedown shows that disrupting a cluster did not remove the underlying reconnaissance capability, which continued operating as a separate and expanded network."],"referencedReports":[{"title":"Expanded JDY IoT and SOHO Botnet Enables Rapid Vulnerability Exploitation","url":"https://www.lumen.com/blog/en-us/expanded-jdy-iot-and-soho-botnet-enables-rapid-vulnerability-exploitation","publisher":"Lumen Black Lotus Labs","context":"The article says Lumen's Black Lotus Labs shared a report warning that the JDY botnet has expanded and is being used for large-scale reconnaissance and service fingerprinting.","category":"","primary":false}],"body":"\u003cp\u003eLumen\u0026rsquo;s Black Lotus Labs reported a resurgence and expansion of JDY, a China-linked covert network associated with state-sponsored threat actors. The botnet now comprises more than 1,500 compromised SOHO and IoT devices and is used as a centrally controlled scanner to discover, fingerprint, and map exposed services at scale. The article says its reconnaissance output can support follow-on target identification and exploitation by Chinese nation-state groups.\u003c/p\u003e\n\n\u003cp\u003eJDY was first identified in December 2023 as a cluster within KV-botnet, which had been used by Chinese hacking groups such as Volt Typhoon. After the U.S. government takedown of KV-botnet in early 2024, operators made behavioral changes, and JDY has since expanded beyond its earlier device profile. The botnet now includes devices from Araknis, Mimosa Networks, Ubiquiti, Draytek, Hikvision, Linksys, and others, with many nodes located in the United States and Brazil.\u003c/p\u003e\n\n\u003cp\u003eTechnically, JDY uses Tor nodes to manage infected infrastructure, including command-and-control and payload servers. Its malware fingerprints the host, receives scanning tasks, conducts TCP, SSL, UDP, and ICMP-assisted probing, captures responses such as TLS certificates and metadata, and reports results back to central servers. The malware can use high-speed SYN scanning when raw sockets are available and fall back to standard TCP, TLS, UDP, or ICMP methods when needed.\u003c/p\u003e\n"},{"n":21,"title":"Compromised Rust crate onering performs code exfiltration","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/compromised-rust-crate-onering-performs-code-exfiltration","time":"10:22","priority":"SHOULD READ","score":86,"tldr":"The Rust crate onering version 1.4.1 was compromised with a malicious build.rs script that exfiltrates the consuming project's latest Git commit metadata and source diff to a Sentry endpoint during builds. Users should avoid the affected crates.io and GitHub versions and check for outbound traffic to the listed Sentry ingest URL.","briefOverview":"\u003cp\u003eOn June 10, 2026, Aikido detected malicious behavior in version 1.4.1 of the Rust crate \u003ccode\u003eonering\u003c/code\u003e. The crate is described as a high-throughput synchronous queue and channels library for Rust with more than 18,000 downloads on crates.io. The article says the latest version added a malicious \u003ccode\u003ebuild.rs\u003c/code\u003e file that harvests Git data from projects building the crate.\u003c/p\u003e\n\n\u003cp\u003eThe malicious build script runs during Cargo builds, meaning the payload can execute simply because a project depends on the crate. It locates the root of the consuming project, collects metadata for the latest Git commit, and captures the full textual diff of that commit. The article emphasizes that users do not need to call any library function for the behavior to occur.\u003c/p\u003e\n\n\u003cp\u003eThe collected data is disguised as a Sentry telemetry event and sent via \u003ccode\u003ecurl\u003c/code\u003e to a Sentry ingest endpoint. The article says the maintainer’s GitHub repository also appears to be compromised, so pulling the crate from Git rather than crates.io is not presented as a safe workaround. Indicators of compromise include dependency \u003ccode\u003eonering\u003c/code\u003e version 1.4.1, the listed Sentry ingest endpoint, and the associated Sentry DSN details.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAikido reported that it detected malicious behavior on June 10, 2026, in the latest version, 1.4.1, of the Rust crate \u003ccode\u003eonering\u003c/code\u003e. The article describes \u003ccode\u003eonering\u003c/code\u003e as a high-throughput synchronous queue and channels library for Rust with over 18,000 downloads on crates.io. It places the event in the context of recent supply chain compromises affecting npm, PyPI, and GitHub, while stating that this case targets the Rust ecosystem.\u003c/p\u003e\n\n\u003cp\u003eThe compromised version added a \u003ccode\u003ebuild.rs\u003c/code\u003e file that executes during the Cargo build process. The article explains that Cargo compiles and runs build scripts on the developer’s machine, making them a high-value place for a payload. In this case, merely depending on the crate and building a project is enough to trigger the behavior.\u003c/p\u003e\n\n\u003cp\u003eThe build script first identifies the root directory of the consuming project rather than the crate’s own directory. It does this by walking up from \u003ccode\u003eOUT_DIR\u003c/code\u003e until it finds the \u003ccode\u003etarget\u003c/code\u003e directory and then taking the parent directory. The article states that this result is the user’s repository.\u003c/p\u003e\n\n\u003cp\u003eAfter locating the repository, the script runs two Git commands against it. One command collects latest commit metadata including commit hash, author, email, date, and subject. The other command runs \u003ccode\u003egit diff HEAD^ HEAD\u003c/code\u003e to capture the full textual diff of the most recent commit, which the article says can leak a rolling stream of source changes over repeated builds.\u003c/p\u003e\n\n\u003cp\u003eThe stolen data is formatted as a Sentry telemetry event and sent with \u003ccode\u003ecurl\u003c/code\u003e to a Sentry ingest endpoint. Commit metadata is placed in event tags, while the code diff is placed in the \u003ccode\u003eextra.patch\u003c/code\u003e field. The article says the Sentry formatting and endpoint disguise the traffic as ordinary crash reporting, and it notes a commented-out local file write line that suggests the payload was tested locally.\u003c/p\u003e\n\n\u003cp\u003eThe article says the issue is not limited to the crates.io package because the maintainer’s GitHub repository also appears to be compromised. Aikido states that it alerted the maintainer through a GitHub issue and provides indicators of compromise, including \u003ccode\u003eonering\u003c/code\u003e version 1.4.1, the Sentry ingest endpoint, and the Sentry DSN public key, organization ID, and project ID.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAikido reported that on June 10, 2026, it detected malicious behavior in version 1.4.1 of the Rust crate \u003ccode\u003eonering\u003c/code\u003e. The article describes \u003ccode\u003eonering\u003c/code\u003e as a high-throughput synchronous queue and channels library for Rust with more than 18,000 downloads on crates.io.\u003c/p\u003e\n\n\u003cp\u003eThe incident is presented as a Rust ecosystem supply chain compromise. The article notes that npm, PyPI, and GitHub had recently received attention due to a wave of supply chain compromises, and states that this week it is Rust’s turn.\u003c/p\u003e\n\n\u003ch2 id=\"core-issue\"\u003eCore issue\u003c/h2\u003e\n\n\u003cp\u003eThe latest version of \u003ccode\u003eonering\u003c/code\u003e added a \u003ccode\u003ebuild.rs\u003c/code\u003e file that harvests Git data from the project building the crate. The article says the collected data includes the actual source code of the most recent commit.\u003c/p\u003e\n\n\u003cp\u003eThe malicious behavior runs at build time. Because Cargo compiles and runs \u003ccode\u003ebuild.rs\u003c/code\u003e scripts on the developer’s machine during the build, a project only needs to depend on the crate and build for the payload to execute. The article explicitly states that the user never has to call a function from the library.\u003c/p\u003e\n\n\u003ch2 id=\"affected-sources\"\u003eAffected sources\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the affected dependency as \u003ccode\u003eonering\u003c/code\u003e version 1.4.1 from crates.io. It also states that the problem is not limited to the package published on crates.io.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the maintainer’s GitHub repository also appears to be compromised. As a result, the article says pulling the crate from Git rather than the registry does not make users safe. Aikido says it immediately alerted the maintainer through a GitHub issue.\u003c/p\u003e\n\n\u003ch2 id=\"technical-behavior-of-the-malicious-build-rs\"\u003eTechnical behavior of the malicious \u003ccode\u003ebuild.rs\u003c/code\u003e\u003c/h2\u003e\n\n\u003cp\u003eThe injected \u003ccode\u003ebuild.rs\u003c/code\u003e performs three main actions described in the article.\u003c/p\u003e\n\n\u003ch3 id=\"1-it-locates-the-consuming-project\"\u003e1. It locates the consuming project\u003c/h3\u003e\n\n\u003cp\u003eThe script locates the root of the project consuming the crate, not the directory of the crate itself. It starts from the \u003ccode\u003eOUT_DIR\u003c/code\u003e environment variable and walks up the path until it finds the \u003ccode\u003etarget\u003c/code\u003e directory. It then takes the parent of that \u003ccode\u003etarget\u003c/code\u003e directory, which the article says is the user’s repository.\u003c/p\u003e\n\n\u003ch3 id=\"2-it-collects-git-commit-data-and-source-changes\"\u003e2. It collects Git commit data and source changes\u003c/h3\u003e\n\n\u003cp\u003eAfter identifying the project path, the script runs Git commands against the consuming repository.\u003c/p\u003e\n\n\u003cp\u003eThe first Git command gathers metadata for the latest commit, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCommit hash\u003c/li\u003e\n\u003cli\u003eAuthor name\u003c/li\u003e\n\u003cli\u003eAuthor email\u003c/li\u003e\n\u003cli\u003eDate\u003c/li\u003e\n\u003cli\u003eSubject\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe second Git command runs \u003ccode\u003egit diff HEAD^ HEAD\u003c/code\u003e. The article explains that this captures the full textual diff of the most recent commit. It also states that, because this happens every time the project is built, the behavior can leak a rolling stream of real source changes over many commits rather than a single snapshot.\u003c/p\u003e\n\n\u003ch3 id=\"3-it-exfiltrates-the-data-through-a-sentry-endpoint\"\u003e3. It exfiltrates the data through a Sentry endpoint\u003c/h3\u003e\n\n\u003cp\u003eThe stolen data is formatted as a Sentry telemetry event. The commit metadata becomes event tags, and the source-code diff is placed in the \u003ccode\u003eextra.patch\u003c/code\u003e field.\u003c/p\u003e\n\n\u003cp\u003eThe payload is sent with \u003ccode\u003ecurl\u003c/code\u003e as a POST request to a Sentry ingest endpoint:\u003c/p\u003e\n\n\u003cp\u003e\u003ccode\u003ehttps://o4511539639222272.ingest.de.sentry.io/api/4511539669368912/envelope/\u003c/code\u003e\u003c/p\u003e\n\n\u003cp\u003eThe article says this disguise is deliberate because outbound traffic to a Sentry ingest URL during a build can look like ordinary crash reporting. It also notes a leftover commented line, \u003ccode\u003e// std::fs::write(\u0026quot;data.txt\u0026quot;, payload)\u003c/code\u003e, which the article says strongly suggests the payload was tested locally by writing it to disk before the network call was added.\u003c/p\u003e\n\n\u003ch2 id=\"impact-described-in-the-article\"\u003eImpact described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article characterizes the attack as focused on source-code exfiltration rather than credential theft. It says the build script harvests Git data from whatever project is building the crate and sends the actual source code from the most recent commit to a remote server.\u003c/p\u003e\n\n\u003cp\u003eThe impact is tied to projects that build with the compromised dependency. Since the payload is in \u003ccode\u003ebuild.rs\u003c/code\u003
