models, bypassing cloud-based inspection points and leaving sensitive data exchanges uninspected.","Netskope One AI Security is presented as a way to inspect MCP traffic, enforce DLP policies on agentic workflows, assess MCP server risk, and monitor app-to-LLM API interactions."],"insights":["For AI agents, the meaningful zero trust control point shifts from login-time authentication to continuous inspection of the data, prompts, tools, and API calls handled during an authorized session.","MCP adoption creates a distinct inspection gap because agent-to-tool conversations may not resemble browser HTTP traffic that secure web gateways were designed to monitor.","Tool poisoning is actionable as a supply-chain-style risk for agent workflows because the article says attackers can register malicious MCP servers or manipulate an agent’s tool list.","Private app-to-LLM API traffic may require local or software-layer inspection inside environments such as AWS VPCs or VMware ESXi because routing through cloud-based security control points is not assumed.","The article frames MCP server reputation and pre-connection risk assessment as an emerging control that zero trust programs need for AI agent ecosystems."],"referencedReports":[{"title":"Worldwide Artificial Intelligence IT Spending Forecast, 2025-2029","url":"https://www.idc.com/getdoc.jsp?containerId=US53688725","publisher":"IDC","context":"The article cites IDC's forecast to state that enterprise AI spending reached $241.8 billion in 2025 and is projected to surpass $867 billion by 2029.","category":"","primary":false},{"title":"AI Jailbreak","url":"https://www.ibm.com/think/insights/ai-jailbreak","publisher":"IBM Research","context":"The article cites IBM Research's findings that jailbreak attempts succeed roughly 20% of the time and may require as few as 42 seconds and five interactions.","category":"","primary":false}],"body":"\u003cp\u003eThe article argues that many zero trust deployments were built around human access patterns, where a user authenticates, a device is checked, and policy is evaluated at the moment of access. It says AI agents do not fit that model because they authenticate once and then autonomously call APIs, read data, invoke tools, and communicate with other agents or systems. The article frames this as a growing enterprise risk as AI spending and agentic workflows increase.\u003c/p\u003e\n\n\u003cp\u003eThe key technical concern is that threats against AI agents can occur mid-session, after valid credentials and authorized sessions are already in place. The article highlights prompt injection, Model Context Protocol traffic, tool poisoning, and app-to-LLM API calls as areas where existing controls may lack visibility or enforcement. It says these gaps can leave organizations without DLP enforcement, threat detection, content inspection, or access control on some AI-driven data flows.\u003c/p\u003e\n\n\u003cp\u003eThe article presents Netskope One AI Security as a way to extend zero trust controls to non-human identities. It says Netskope One Agentic Broker decodes MCP traffic in real time, while Netskope One AI Gateway provides inspection for app-to-LLM API traffic in AWS VPCs and VMware ESXi environments. The stated goal is to give organizations visibility, logging, authentication, DLP, and guardrail enforcement for agentic AI workflows.\u003c/p\u003e\n"},{"n":28,"title":"The Governance Gap: What IDC’s 2026 Data Reveals About AI and the Software Supply Chain","source":"jfrog.com","sourceColorIdx":8,"link":"https://jfrog.com/blog/idcs-2026-data/","time":"19:35","priority":"MAY READ","score":52,"tldr":"IDC’s 2026 data suggests enterprise AI adoption is moving faster than governance, leaving software supply chains exposed to unmanaged “Shadow AI” and risky AI-generated code. The key takeaway is that organizations need platform-level guardrails in delivery pipelines rather than relying on developers or AI agents to self-police compliance.","briefOverview":"\u003cp\u003eJFrog hosted a virtual panel discussion titled “Agentic Software Delivery in 2026: How to Bridge the Gap Between AI Ambition and Delivery Confidence.” The session featured IDC’s George Mironescu and JFrog’s Yuval Fernbach and Asaf Barkan discussing enterprise AI adoption, pipeline governance, and software delivery. The article centers on the gap between executive pressure to adopt AI and the governance needed to manage AI safely in software supply chains.\u003c/p\u003e\n\n\u003cp\u003eThe article cites the IDC 2026 Software Engineering Challenges Report, which surveyed 1,000 enterprise and mid-sized organizations across the United States, Europe, Asia, and the Middle East. It states that AI is the top strategic mandate for organizations heading into 2026, but governance readiness is lagging behind corporate ambition. This gap is described as a defining operational challenge for software delivery teams.\u003c/p\u003e\n\n\u003cp\u003eA key concern is “Shadow AI,” which the article says has replaced Shadow IT as the primary unmanaged enterprise threat. Developers are described as using personal accounts, unvetted third-party plugins, and AI-generated code blocks in production environments. The article argues that organizations need platform-level guardrails at the software supply chain layer rather than relying on AI agents to self-police compliance.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eJFrog’s article recaps a virtual panel discussion on “Agentic Software Delivery in 2026: How to Bridge the Gap Between AI Ambition and Delivery Confidence.” The panel included George Mironescu of IDC, Yuval Fernbach of JFrog ML, and Asaf Barkan of JFrog. The discussion focused on how organizations can accelerate delivery pipelines while avoiding serious security risks. The article frames this issue around enterprise AI adoption, pipeline governance, and software delivery.\u003c/p\u003e\n\n\u003cp\u003eThe article relies on the IDC 2026 Software Engineering Challenges Report, which surveyed 1,000 enterprise and mid-sized organizations globally. The surveyed regions included the United States, Europe, Asia, and the Middle East. According to the article, AI is the top strategic mandate for organizations heading into 2026. At the same time, governance readiness has not kept pace with the pressure on software delivery teams to implement AI quickly.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies Shadow AI as a major unmanaged enterprise threat. It says developers are already using AI in the software supply chain through personal accounts, unvetted third-party plugins, and AI-generated code blocks placed directly into production environments. It argues that delaying governance allows this footprint to grow. It also says that simply blocking or blacklisting AI tools can push developer usage underground.\u003c/p\u003e\n\n\u003cp\u003eA technical concern raised in the article is the misconception that AI agents can self-police compliance and validation. The article states that AI agents operate non-deterministically and do not understand informal policies, unwritten development practices, or shared wiki content. If compliance boundaries exist only in documentation or verbal agreements, the article says automated agents may bypass them. It also notes that a coding agent may hallucinate package names or pull vulnerable open-source dependencies from repositories such as npm or PyPI.\u003c/p\u003e\n\n\u003cp\u003eThe article’s recommended response is to apply governance at the software supply chain layer. It says this does not require slowing AI adoption or restricting what agents can do. Instead, it advocates platform-level guardrails that manage AI adoption within corporate security and governance practices. The article concludes by directing readers to the webinar recording and the full IDC report for additional details.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eJFrog published a recap of a virtual panel discussion titled “Agentic Software Delivery in 2026: How to Bridge the Gap Between AI Ambition and Delivery Confidence.” The panel brought together George Mironescu, Associate Research Director at IDC, and JFrog representatives Yuval Fernbach, VP and CTO of JFrog ML, and Asaf Barkan, Senior Director of Product. The discussion focused on enterprise AI adoption, pipeline governance, and software delivery.\u003c/p\u003e\n\n\u003cp\u003eThe article presents the central challenge as a mismatch between executive demand for rapid AI integration and the governance capabilities needed to manage AI safely in delivery pipelines. It describes engineering and security leaders as being under operational pressure to accelerate software delivery while avoiding serious security risks. The article uses findings from IDC’s 2026 Software Engineering Challenges Report to support this framing.\u003c/p\u003e\n\n\u003ch2 id=\"idc-report-and-governance-gap\"\u003eIDC Report and Governance Gap\u003c/h2\u003e\n\n\u003cp\u003eThe article cites the IDC 2026 Software Engineering Challenges Report as the main data source. The report surveyed 1,000 enterprise and mid-sized organizations globally, including organizations in the United States, Europe, Asia, and the Middle East. According to the article, AI has become the top strategic mandate for organizations heading into 2026.\u003c/p\u003e\n\n\u003cp\u003eThe article states that this top-down AI mandate creates significant operational pressure on software delivery teams. Those teams are expected to execute quickly on corporate AI ambitions. However, the article says governance frameworks are not keeping pace with the rate of AI adoption.\u003c/p\u003e\n\n\u003cp\u003eThe result is described as a widening gap between corporate ambition and governance readiness. The article frames this governance gap as the defining operational challenge of the year.\u003c/p\u003e\n\n\u003ch2 id=\"shadow-ai-in-the-software-supply-chain\"\u003eShadow AI in the Software Supply Chain\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Shadow AI as the new Shadow IT. It says AI is already inside the software supply chain and did not wait for formal organizational approval. Developers are described as adopting AI tools to improve productivity, even when those tools are not officially governed.\u003c/p\u003e\n\n\u003cp\u003eExamples given in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDevelopers pulling code suggestions through personal accounts.\u003c/li\u003e\n\u003cli\u003eDevelopers using unvetted third-party plugins.\u003c/li\u003e\n\u003cli\u003eDevelopers embedding AI-generated code blocks directly into production environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article argues that each day organizations delay governance, the unmanaged AI footprint grows. It also says that simply blocking or blacklisting AI tools does not solve the problem. Instead, blocking tools may push developer usage underground.\u003c/p\u003e\n\n\u003ch2 id=\"limits-of-ai-agent-self-governance\"\u003eLimits of AI Agent Self-Governance\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies a major misconception: the idea that AI agents can be trusted to self-police compliance and validation. It states that AI agents cannot be relied on for this role. The reason given is that AI agents operate non-deterministically.\u003c/p\u003e\n\n\u003cp\u003eThe article says AI agents do not understand:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWord-of-mouth policies.\u003c/li\u003e\n\u003cli\u003eUnwritten developer best practices.\u003c/li\u003e\n\u003cli\u003eThe contents of a shared wiki.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIf compliance boundaries exist only in documentation or verbal agreements, the article says automated agents will bypass them entirely. This is presented as a pipeline governance risk, especially as automated coding tools become more common.\u003c/p\u003e\n\n\u003ch2 id=\"dependency-and-package-risks\"\u003eDependency and Package Risks\u003c/h2\u003e\n\n\u003cp\u003eThe article gives examples of how AI coding agents can introduce supply chain problems. When trying to resolve a bug, an AI agent may hallucinate package names. It may also silently pull vulnerable open-source dependencies from public repositories.\u003c/p\u003e\n\n\u003cp\u003eThe public repositories named in the article are npm and PyPI. The article states that flawed or malicious components may not be discovered until after they have already blocked builds. In that scenario, any velocity gain provided by the agent may be wiped out.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended Response\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that the solution is not to slow AI adoption or restrict what agents can do. Instead, it calls for a shift in how governance is applied. The recommended approach is to build smarter guardrails at the software supply chain layer.\u003c/p\u003e\n\n\u003cp\u003eThe article describes platform-level governance as the viable path for managing AI adoption safely within corporate security and governance practices. It says organizations that are succeeding are not necessarily working harder, but are applying smarter guardrails. The article also notes that most organizations are still in early stages.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-affected-parties\"\u003eDisclosed Impact and Affected Parties\u003c/h2\u003e\n\n\u003cp\u003eThe article does not describe a specific breach, vulnerability disclosure, or incident. The affected parties discussed are enterprise and mid-sized organizations adopting AI in software delivery. The article also focuses on engineering teams, security leaders, software delivery teams, and developers using AI tools.\u003c/p\u003e\n\n\u003cp\u003eThe risks described include unmanaged AI usage, use of unvetted plugins, AI-generated code entering production, hallucinated package names, vulnerable open-source dependencies, and blocked builds. The article presents these as software supply chain and pipeline governance risks.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-further-resources\"\u003eResponse and Further Resources\u003c/h2\u003e\n\n\u003cp\u003eJFrog directs readers to watch the full webinar recording to learn what platform-level governance looks like in practice, which failure patterns to watch for before they block builds, and what organizations scaling autonomous pipelines have in common. The article also links to the full IDC report titled “Key Software Delivery Challenges and Pain Points in 2026.”\u003c/p\u003e\n\n\u003cp\u003eOverall, the article’s main message is that enterprise AI adoption is outpacing governance, and that organizations need platform-level guardrails in the software supply chain to manage AI use safely.\u003c/p\u003e\n","keyPoints":["JFrog hosted a virtual panel discussion with IDC’s George Mironescu and JFrog executives Yuval Fernbach and Asaf Barkan about enterprise AI adoption, pipeline governance, and software delivery.","The IDC 2026 Software Engineering Challenges Report surveyed 1,000 enterprise and mid-sized organizations globally and identifies a widening gap between corporate AI ambition and governance readiness.","The article states that Shadow AI has replaced Shadow IT as the primary unmanaged threat inside enterprises, with developers using personal accounts, unvetted third-party plugins, and AI-generated code in production environments.","The article argues that AI agents cannot be trusted to self-police compliance because they operate non-deterministically and may bypass policies that exist only in documentation or verbal agreements.","The recommended path forward is to build platform-level guardrails at the software supply chain layer to manage AI adoption within corporate security and governance practices."],"insights":["Blacklisting AI tools is presented as counterproductive because it can push developer use of AI underground rather than reducing the risk.","Compliance rules that exist only in wikis, verbal guidance, or informal best practices are ineffective for AI agents because the agents will not reliably recognize or follow them.","AI-generated dependency choices can erase productivity gains when hallucinated package names or vulnerable open-source components later block builds.","The article frames governance at the software supply chain layer as a way to enable AI adoption without slowing delivery, rather than as a restriction on AI use."],"referencedReports":[{"title":"IDC 2026 Software Engineering Challenges Report","url":"https://jfrog.com/whitepaper/idc-report-ai-boom/","publisher":"IDC","context":"The article cites the newly released IDC report, based on a survey of 1,000 enterprise and mid-sized organizations, as evidence that AI adoption is outpacing governance readiness.","category":"","primary":false}],"body":"\u003cp\u003eJFrog hosted a virtual panel discussion titled “Agentic Software Delivery in 2026: How to Bridge the Gap Between AI Ambition and Delivery Confidence.” The session featured IDC’s George Mironescu and JFrog’s Yuval Fernbach and Asaf Barkan discussing enterprise AI adoption, pipeline governance, and software delivery. The article centers on the gap between executive pressure to adopt AI and the governance needed to manage AI safely in software supply chains.\u003c/p\u003e\n\n\u003cp\u003eThe article cites the IDC 2026 Software Engineering Challenges Report, which surveyed 1,000 enterprise and mid-sized organizations across the United States, Europe, Asia, and the Middle East. It states that AI is the top strategic mandate for organizations heading into 2026, but governance readiness is lagging behind corporate ambition. This gap is described as a defining operational challenge for software delivery teams.\u003c/p\u003e\n\n\u003cp\u003eA key concern is “Shadow AI,” which the article says has replaced Shadow IT as the primary unmanaged enterprise threat. Developers are described as using personal accounts, unvetted third-party plugins, and AI-generated code blocks in production environments. The article argues that organizations need platform-level guardrails at the software supply chain layer rather than relying on AI agents to self-police compliance.\u003c/p\u003e\n"},{"n":4,"title":"The 5 Best Practices for Secure Identity Verification","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/the-5-best-practices-for-secure-identity-verification/","time":"14:05","priority":"MAY READ","score":45,"tldr":"Organizations should strengthen identity verification by moving beyond passwords and weak MFA toward phishing-resistant authentication, secure helpdesk verification, device trust, passkeys, and protected biometric workflows. The article frames these controls as essential to reducing credential theft and social-engineering-driven account takeovers.","briefOverview":"\u003cp\u003eThe article presents five best practices for strengthening identity verification as credential theft and AI-driven attacks put pressure on traditional defenses. It says credential theft surged by 160% in 2025 and contributed to one in five data breaches. The central message is that organizations need secure verification workflows that reduce account compromise without adding unnecessary friction for legitimate users.\u003c/p\u003e\n\n\u003cp\u003eThe recommended practices include fatigue-resistant multi-factor authentication, stronger service desk identity checks, device trust signals, passkeys, and better protection for biometric data. The article emphasizes phishing-resistant MFA methods such as FIDO2 security keys, passkeys, and certificate-based authentication, while warning that SMS, email OTPs, push prompts, and fallback passwords can remain weak points. It also promotes Specops products for securing Active Directory passwords and service desk verification workflows.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is a sponsored best-practice piece focused on secure identity verification. It frames the issue around rising credential theft, stating that credential theft surged by 160% in 2025 and contributed to one in five data breaches. It says attackers are using AI-driven attacks to bypass traditional defenses, making weak onboarding, static credentials, and inconsistent authentication policies more dangerous.\u003c/p\u003e\n\n\u003cp\u003eThe first recommendation is to use strong, fatigue-resistant multi-factor authentication. The article explains MFA as the use of two or more factors from categories such as something a user knows, has, or is. It says MFA is strongest when factors come from separate categories and recommends moving away from SMS or email OTPs toward phishing-resistant methods such as FIDO2 security keys, passkeys, and certificate-based authentication.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights the service desk as a frequent target for social engineering. It says attackers impersonate employees to convince support staff to perform actions such as account resets, and that AI-enabled deepfake audio or public information can make these requests appear legitimate. It references Marks and Spencer and Clorox as high-profile breaches where service desk compromise was an initial step toward ransomware deployment or broader lateral movement.\u003c/p\u003e\n\n\u003cp\u003eAnother major recommendation is to include device trust in authentication decisions. The article says attackers can steal session cookies and MFA tokens, so credentials alone are not enough to distinguish legitimate users from compromised accounts. Device trust can consider signals such as whether a device is corporate-managed, patch status, endpoint protection, certificates, browser reputation, session integrity, and signs of compromise.\u003c/p\u003e\n\n\u003cp\u003eThe article also discusses passkeys and biometric data protection. It says passkeys use FIDO2 and WebAuthn standards with public-key cryptography, keeping the private key on the user’s device and reducing exposure to phishing, credential theft, and password reuse. For biometrics, it recommends avoiding raw biometric storage where possible, using encrypted biometric templates, and performing authentication locally on trusted devices when feasible.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article is a sponsored best-practice guide about secure identity verification. It argues that identity verification has become a core part of cyber resilience as credential theft, social engineering, and AI-driven attacks increase pressure on traditional authentication defenses.\u003c/p\u003e\n\n\u003cp\u003eIt states that credential theft surged by 160% in 2025 and contributed to one in five data breaches. The article also cites Verizon’s Data Breach Investigation Report to say stolen credentials are involved in 44.7% of breaches.\u003c/p\u003e\n\n\u003cp\u003eThe central theme is that organizations should verify identities securely while limiting friction for legitimate users. The article identifies weak onboarding, static credentials, and inconsistent authentication policies as weaknesses attackers can exploit.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-practice-1-use-stronger-fatigue-resistant-mfa\"\u003eRecommended practice 1: Use stronger, fatigue-resistant MFA\u003c/h2\u003e\n\n\u003cp\u003eThe article says multi-factor authentication remains one of the most effective ways to reduce account compromise. It defines MFA as requiring two or more factors from different categories:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSomething the user knows, such as a password or PIN.\u003c/li\u003e\n\u003cli\u003eSomething the user has, such as a smartphone, authenticator app, or hardware security key.\u003c/li\u003e\n\u003cli\u003eSomething the user is, such as a fingerprint or facial scan.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article cites NIST guidance to say MFA is strongest when it combines factors from separate categories. It contrasts a password paired with a hardware token or authenticator app against weaker combinations such as passwords and security questions.\u003c/p\u003e\n\n\u003cp\u003eIt also notes that MFA is not immune to exploitation. The article specifically mentions prompt bombing and SIM swapping as attacks that can affect weaker MFA implementations.\u003c/p\u003e\n\n\u003cp\u003eTo improve MFA resilience, the article recommends that organizations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMove away from legacy SMS or email-based one-time passcodes.\u003c/li\u003e\n\u003cli\u003ePrioritize phishing-resistant MFA methods, including FIDO2 security keys, passkeys, or certificate-based authentication.\u003c/li\u003e\n\u003cli\u003eUse authenticator apps that generate local OTPs rather than push-based approval prompts where appropriate.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommended-practice-2-secure-the-service-desk-from-social-engineering\"\u003eRecommended practice 2: Secure the service desk from social engineering\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies helpdesks as frequent social engineering targets because they sit at the intersection of identity, access, and urgent user requests. It says attackers often impersonate employees to convince support staff to perform account-related actions, typically through reset requests.\u003c/p\u003e\n\n\u003cp\u003eIt states that these attacks are becoming more sophisticated. The article specifically mentions AI-enabled deepfake audio and publicly available information as ways attackers can make requests appear legitimate.\u003c/p\u003e\n\n\u003cp\u003eThe article references high-profile breaches involving Marks and Spencer and Clorox. It says service desk compromise was the first step toward ransomware deployment or broader lateral movement in these cases. For Marks and Spencer, it says the attack led to a five-day suspension of sales, with average daily losses of £3.8 million.\u003c/p\u003e\n\n\u003cp\u003eThe article says the problem is often not a lack of security tools, but inconsistent identity verification during high-pressure support interactions. It promotes Specops Secure Service Desk as a way to embed secure identity verification into helpdesk workflows before password resets, MFA changes, or other sensitive actions are completed.\u003c/p\u003e\n\n\u003cp\u003eFor especially high-risk service desk actions, the article promotes Specops Verified ID. It says this adds government document scanning and biometric liveness detection to identity verification workflows to reduce the risk of impersonation leading to account takeover.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-practice-3-include-device-trust-in-identity-decisions\"\u003eRecommended practice 3: Include device trust in identity decisions\u003c/h2\u003e\n\n\u003cp\u003eThe article says modern identity verification cannot rely on credentials alone. It notes that attackers may steal session cookies and MFA tokens, which can weaken the authentication process and make it harder to distinguish legitimate users from compromised accounts.\u003c/p\u003e\n\n\u003cp\u003eIt recommends bringing device trust into authentication and access decisions. The goal is to verify not only who is logging in, but also what device they are logging in from.\u003c/p\u003e\n\n\u003cp\u003eThe article lists device trust signals such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhether the device is corporate-managed or unmanaged.\u003c/li\u003e\n\u003cli\u003eOperating system version and patch status.\u003c/li\u003e\n\u003cli\u003ePresence of endpoint protection or EDR tools.\u003c/li\u003e\n\u003cli\u003eDevice certificates or cryptographic identifiers.\u003c/li\u003e\n\u003cli\u003eBrowser reputation and session integrity.\u003c/li\u003e\n\u003cli\u003eSigns of compromise, malware, rooting, or jailbreaking.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these signals can add useful context to identity verification. A recognized, compliant device on a corporate network may require minimal friction, while the same credentials used from an unmanaged device or suspicious IP range could trigger step-up authentication, restricted access, or a blocked session.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-practice-4-consider-passkeys\"\u003eRecommended practice 4: Consider passkeys\u003c/h2\u003e\n\n\u003cp\u003eThe article says many organizations are looking beyond passwords even though MFA reduces the risk of compromised credentials. It describes passkeys as one of the most widely adopted passwordless options.\u003c/p\u003e\n\n\u003cp\u003eIt says passkeys are built on FIDO2 and WebAuthn standards. They use public-key cryptography to authenticate users without transmitting passwords across the network.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the private key remains securely stored on the user’s device. This makes passkeys resistant to phishing, credential theft, and password reuse attacks.\u003c/p\u003e\n\n\u003cp\u003eThe article also says passkeys reduce friction because users do not need to remember or rotate passwords. However, it notes that passkeys are not yet a complete password replacement, because organizations still rely on passwords as fallback authentication methods during account recovery or device changes.\u003c/p\u003e\n\n\u003cp\u003eBecause passwords can remain in use as fallback methods, the article says strong password policies and phishing-resistant MFA remain important.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-practice-5-protect-biometric-data\"\u003eRecommended practice 5: Protect biometric data\u003c/h2\u003e\n\n\u003cp\u003eThe article says biometric authentication through fingerprints, facial recognition, or voice verification can strengthen identity verification when properly implemented. It also warns that biometric data cannot simply be reset if compromised, unlike passwords.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends avoiding the storage of raw biometric data wherever possible. Instead, it says organizations should store encrypted biometric templates and perform authentication locally on trusted devices when feasible.\u003c/p\u003e\n\n\u003cp\u003eIt also mentions privacy-preserving technologies in high-security environments. One example given is homomorphic encryption, which can allow biometric matching without exposing the underlying biometric data.\u003c/p\u003e\n\n\u003ch2 id=\"vendors-products-and-promoted-offerings\"\u003eVendors, products, and promoted offerings\u003c/h2\u003e\n\n\u003cp\u003eThe article is sponsored and written by Specops Software. It promotes several Specops offerings in the context of identity verification and password security.\u003c/p\u003e\n\n\u003cp\u003eNamed promoted products include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSpecops Password Policy, described as a way to secure Active Directory with compliant password policies and block more than 4 billion compromised passwords.\u003c/li\u003e\n\u003cli\u003eSpecops Secure Service Desk, described as embedding secure identity verification into helpdesk workflows.\u003c/li\u003e\n\u003cli\u003eSpecops Verified ID, described as adding government document scanning and biometric liveness detection for high-risk verification workflows.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"threat-activity-and-affected-parties-mentioned\"\u003eThreat activity and affected parties mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article does not name a specific threat actor group. It refers generally to attackers and threat actors using credential theft, AI-driven attacks, prompt bombing, SIM swapping, deepfake audio, stolen session cookies, and stolen MFA tokens.\u003c/p\u003e\n\n\u003cp\u003eOrganizations and entities mentioned include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSpecops Software, the sponsor and author of the article.\u003c/li\u003e\n\u003cli\u003eVerizon, whose Data Breach Investigation Report is cited.\u003c/li\u003e\n\u003cli\u003eNIST, whose MFA guidance is referenced.\u003c/li\u003e\n\u003cli\u003eMarks and Spencer, cited as an example involving service desk compromise.\u003c/li\u003e\n\u003cli\u003eClorox, cited as another example involving service desk compromise.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that identity verification should combine stronger authentication, secure support workflows, device context, passwordless options, and careful biometric data handling. It presents these measures as ways to reduce credential theft, account takeover, and social engineering risk while maintaining reasonable usability for legitimate users.\u003c/p\u003e\n","keyPoints":["The article says credential theft surged by 160% in 2025 and contributed to one in five data breaches as attackers used AI-driven attacks to bypass traditional defenses.","Organizations should use strong, fatigue-resistant multi-factor authentication and prioritize phishing-resistant methods such as FIDO2 security keys, passkeys, or certificate-based authentication over legacy SMS or email-based one-time passcodes.","Helpdesks are frequent targets for social engineering because attackers impersonate employees to request password resets, MFA changes, or other sensitive account actions.","Device trust can strengthen identity verification by evaluating signals such as whether a device is corporate-managed, its patch status, endpoint protection, device certificates, browser reputation, and signs of compromise.","The article recommends protecting biometric data by avoiding raw biometric storage where possible, using encrypted biometric templates, and performing authentication locally on trusted devices where feasible."],"insights":["MFA implementations that rely on push approvals can still be vulnerable to prompt bombing, so the article recommends using locally generated authenticator app codes where appropriate rather than assuming all app-based MFA is equally resilient.","Service desk identity checks are highlighted as a high-risk weak point because attackers can bypass technical controls by exploiting inconsistent verification during urgent support interactions.","The article treats account recovery and device changes as remaining weak spots for passwordless adoption, noting that passwords often persist as fallback methods even when passkeys are deployed.","Device trust is presented as a way to reduce user friction as well as improve security, because recognized and compliant corporate devices may require fewer authentication challenges while riskier devices trigger step-up controls.","For high-risk service desk actions, the article recommends combining government document scanning with biometric liveness detection to reduce the chance that impersonation leads to account takeover."],"referencedReports":[{"title":"2025 Data Breach Investigations Report","url":"https://www.verizon.com/business/resources/reports/2025-dbir-data-breach-investigations-report.pdf","publisher":"Verizon","context":"The article cites Verizon’s Data Breach Investigation Report to state that stolen credentials are involved in a significant share of breaches.","category":"","primary":false}],"body":"\u003cp\u003eThe article presents five best practices for strengthening identity verification as credential theft and AI-driven attacks put pressure on traditional defenses. It says credential theft surged by 160% in 2025 and contributed to one in five data breaches. The central message is that organizations need secure verification workflows that reduce account compromise without adding unnecessary friction for legitimate users.\u003c/p\u003e\n\n\u003cp\u003eThe recommended practices include fatigue-resistant multi-factor authentication, stronger service desk identity checks, device trust signals, passkeys, and better protection for biometric data. The article emphasizes phishing-resistant MFA methods such as FIDO2 security keys, passkeys, and certificate-based authentication, while warning that SMS, email OTPs, push prompts, and fallback passwords can remain weak points. It also promotes Specops products for securing Active Directory passwords and service desk verification workflows.\u003c/p\u003e\n"},{"n":30,"title":"Best Practices for Managing Third-Party Identity and  Access Management","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/best-practices-for-managing-third-party-identity-and-access-management/","time":"16:57","priority":"MAY READ","score":45,"tldr":"Health-ISAC released a white paper outlining best practices for managing third-party identity and access in healthcare, where vendors and partners often need remote access to network-connected systems and medical devices. The key takeaway is that healthcare organizations must tightly manage third-party accounts, roles, and privileges to reduce IAM-related risk.","briefOverview":"\u003cp\u003eHealth-ISAC has released \u003cem\u003eBest Practices for Managing Third-Party Identity and Access Management\u003c/em\u003e, the 12th white paper in its ongoing series for CISOs on Identity and Access Management. The paper focuses on vendors, partners, and other third parties that need to be managed appropriately to minimize risk to healthcare organizations. The article presents third-party IAM as a significant issue for the health sector because third parties support a wide range of healthcare use cases.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that healthcare organizations operate in a complex environment with complicated facilities, third-party maintenance needs, strong security requirements, and many devices that rely on third parties for maintenance. Many systems and devices used in healthcare have microprocessors and typically connect to a network, which can require remote access by third parties. Because of this, third-party IAM extends beyond simply provisioning a new account in a directory.\u003c/p\u003e\n\n\u003cp\u003eThe white paper is described as addressing the challenges of third-party IAM, defining best practices for health sector organizations, and using real-world scenarios to show how those practices apply. It highlights the need to manage access to necessary systems with appropriate roles and privileges. The article notes that this can be challenging depending on the organization’s IT infrastructure.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eHealth-ISAC has released \u003cem\u003eBest Practices for Managing Third-Party Identity and Access Management\u003c/em\u003e, the 12th white paper in its ongoing series for CISOs on Identity and Access Management. The article states that vendors, partners, and others need to be managed appropriately to minimize risk to healthcare organizations. It frames the paper as a resource focused on third-party IAM in the health sector.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the health sector as complex, with facilities and third-party maintenance issues that are more complicated than those of most retailers. It also says healthcare organizations have security requirements comparable to government organizations. In addition, it describes healthcare as having an array of devices reliant on third parties for maintenance that would rival manufacturing.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that third-party support in healthcare covers a wide range of use cases. It notes that many healthcare systems involve more than an individual with a toolbox performing maintenance. Many systems and devices used in healthcare have microprocessors and typically connect to a network.\u003c/p\u003e\n\n\u003cp\u003eBecause many healthcare systems and devices are network-connected, the article says third parties may require remote access. It states that third-party IAM issues go far beyond provisioning a new account in a directory. Accounts must be managed so they enable access to necessary systems with appropriate roles and privileges.\u003c/p\u003e\n\n\u003cp\u003eThe paper is described as breaking down third-party IAM challenges, defining best practices for health sector organizations, and leveraging use cases to apply those best practices in real-world scenarios. The article does not identify a specific threat actor, incident, or disclosed breach. It presents the white paper as a guide for minimizing risk associated with third-party identity and access management in healthcare.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eHealth-ISAC has released \u003cem\u003eBest Practices for Managing Third-Party Identity and Access Management\u003c/em\u003e, the 12th white paper in an ongoing series for CISOs on Identity and Access Management. The article presents the white paper as a resource for healthcare organizations managing vendors, partners, and other third parties. Its central focus is minimizing risk to healthcare organizations through appropriate third-party identity and access management.\u003c/p\u003e\n\n\u003ch2 id=\"healthcare-iam-context\"\u003eHealthcare IAM Context\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the health sector as a complex environment with a broad and disparate ecosystem of third-party support needs. It says healthcare organizations have more complicated facilities and third-party maintenance issues than most retailers. It also states that healthcare organizations have security requirements comparable to government organizations and an array of devices reliant on third parties for maintenance that would rival manufacturing.\u003c/p\u003e\n\n\u003ch2 id=\"why-third-party-access-matters\"\u003eWhy Third-Party Access Matters\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that third-party support in healthcare often involves more than a person physically performing maintenance. Many systems and devices used in healthcare contain microprocessors and typically connect to a network. As a result, third parties may require remote access to support or maintain those systems and devices.\u003c/p\u003e\n\n\u003ch2 id=\"third-party-iam-challenges\"\u003eThird-Party IAM Challenges\u003c/h2\u003e\n\n\u003cp\u003eThe article states that third-party IAM issues go far beyond provisioning a new account in a directory. It says accounts must be managed to enable access to necessary systems with appropriate roles and privileges. Depending on the IT infrastructure of the organization, the article notes that this can be challenging.\u003c/p\u003e\n\n\u003ch2 id=\"scope-of-the-white-paper\"\u003eScope of the White Paper\u003c/h2\u003e\n\n\u003cp\u003eThe article says the white paper will:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBreak down the challenges of third-party IAM.\u003c/li\u003e\n\u003cli\u003eDefine best practices for health sector organizations to mitigate threats to third-party IAM systems.\u003c/li\u003e\n\u003cli\u003eLeverage use cases to define how those best practices apply in real-world scenarios.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-parties-and-stakeholders\"\u003eAffected Parties and Stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe stakeholders described in the article include healthcare organizations, vendors, partners, and other third parties. The paper is also positioned for CISOs as part of Health-ISAC’s Identity and Access Management white paper series. The article does not name a specific victim organization, threat actor, vulnerability, breach, or incident.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article’s stated concern is risk to healthcare organizations from third-party identity and access management challenges. The response described is the publication of a Health-ISAC white paper intended to explain challenges, define best practices, and apply them through use cases. The article invites readers to read and/or download the white paper.\u003c/p\u003e\n","keyPoints":["Health-ISAC released “Best Practices for Managing Third-Party Identity and Access Management,” the 12th white paper in its ongoing IAM series for CISOs.","The white paper focuses on managing vendors, partners, and other third parties appropriately to minimize risk to healthcare organizations.","The article says healthcare organizations rely on third parties for many use cases because they have complex facilities, maintenance needs, security requirements, and network-connected devices.","The article notes that many healthcare systems and devices contain microprocessors and connect to networks, requiring remote access by third parties.","The paper will break down third-party IAM challenges, define best practices for health sector organizations, and use real-world scenarios to show how those practices apply."],"insights":["Third-party IAM in healthcare is presented as broader than standard directory account provisioning because access must also be managed across specific systems, roles, and privileges.","Healthcare third-party access risk is amplified by the combination of medical devices with microprocessors, network connectivity, and recurring third-party maintenance needs.","The article frames healthcare third-party IAM as unusually complex by comparing healthcare facilities and maintenance demands to retailers, government security requirements, and manufacturing-like device ecosystems.","The white paper is intended to translate best practices into real-world application through healthcare use cases, not only describe abstract IAM principles."],"referencedReports":[],"body":"\u003cp\u003eHealth-ISAC has released \u003cem\u003eBest Practices for Managing Third-Party Identity and Access Management\u003c/em\u003e, the 12th white paper in its ongoing series for CISOs on Identity and Access Management. The paper focuses on vendors, partners, and other third parties that need to be managed appropriately to minimize risk to healthcare organizations. The article presents third-party IAM as a significant issue for the health sector because third parties support a wide range of healthcare use cases.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that healthcare organizations operate in a complex environment with complicated facilities, third-party maintenance needs, strong security requirements, and many devices that rely on third parties for maintenance. Many systems and devices used in healthcare have microprocessors and typically connect to a network, which can require remote access by third parties. Because of this, third-party IAM extends beyond simply provisioning a new account in a directory.\u003c/p\u003e\n\n\u003cp\u003eThe white paper is described as addressing the challenges of third-party IAM, defining best practices for health sector organizations, and using real-world scenarios to show how those practices apply. It highlights the need to manage access to necessary systems with appropriate roles and privileges. The article notes that this can be challenging depending on the organization’s IT infrastructure.\u003c/p\u003e\n"},{"n":14,"title":"Ivanti, Fortinet, and SAP Release Patches for Multiple Critical Vulnerabilities","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/ivanti-fortinet-and-sap-release-patches.html","time":"15:10","priority":"MAY READ","score":40,"tldr":"Fortinet, Ivanti, and SAP released patches for multiple critical flaws that could enable remote code execution, admin account creation, information disclosure, and unauthorized access. Organizations using affected FortiSandbox, Ivanti Sentry, SAP NetWeaver/ABAP, Commerce Cloud, or Data Hub products should update promptly, though no active exploitation has been reported.","briefOverview":"\u003cp\u003eFortinet, Ivanti, and SAP released security updates for multiple critical vulnerabilities that could lead to arbitrary code execution and information disclosure. The affected products include FortiSandbox offerings, Ivanti Sentry, SAP NetWeaver AS ABAP and ABAP Platform, SAP Commerce Cloud, SAP Data Hub, and SAP NetWeaver Application Server Java. The article emphasizes that applying the latest updates is recommended for protection.\u003c/p\u003e\n\n\u003cp\u003eFortinet fixed CVE-2026-25089, a CVSS 9.1 command injection flaw in FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI. Ivanti addressed two critical Ivanti Sentry flaws, including CVE-2026-10520 with a CVSS score of 10.0 and CVE-2026-10523 with a CVSS score of 9.9. SAP also issued fixes for four critical vulnerabilities involving SAML authentication, memory corruption, Spring security, and directory traversal issues.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr Labs published additional details about CVE-2026-10520, saying it could be exploited through a crafted HTTP request to the \u003ccode\u003e/mics/api/v2/sentry/mics-config/handleMessage\u003c/code\u003e endpoint. Ivanti’s patch added controls that redirect unauthenticated requests to the login page. The article states there is no evidence that any of the listed flaws have been exploited in the wild.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eFortinet, Ivanti, and SAP released security updates addressing multiple critical vulnerabilities across enterprise products. The flaws could result in arbitrary code execution, information disclosure, unauthorized command execution, administrative account creation, and unauthorized access. The article frames the updates as important patches for affected deployments and recommends updating to the latest versions.\u003c/p\u003e\n\n\u003cp\u003eFortinet patched CVE-2026-25089, a CVSS 9.1 command injection vulnerability in FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI. Fortinet said the issue involves improper neutralization of special elements used in an OS command and may allow an unauthenticated attacker to execute unauthorized commands through specially crafted HTTP requests. Affected versions include FortiSandbox 5.0.0 through 5.0.5, FortiSandbox 4.4.0 through 4.4.8, FortiSandbox Cloud 5.0.4 through 5.0.5, and FortiSandbox PaaS 5.0.4 through 5.0.5.\u003c/p\u003e\n\n\u003cp\u003eIvanti published fixes for two critical vulnerabilities in Ivanti Sentry, formerly MobileIron Sentry. CVE-2026-10520 is a CVSS 10.0 operating system command injection vulnerability that allows a remote unauthenticated user to achieve root-level remote code execution before versions R10.5.2, R10.6.2, and R10.7.1. CVE-2026-10523 is a CVSS 9.9 authentication bypass vulnerability that allows a remote unauthenticated attacker to create arbitrary administrative accounts and obtain full administrative access before those same fixed versions.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr Labs provided additional technical details about CVE-2026-10520. It said an attacker could exploit the flaw by sending a specially crafted HTTP request to the \u003ccode\u003e/mics/api/v2/sentry/mics-config/handleMessage\u003c/code\u003e endpoint, which is interpreted as a MICS configuration command and executed by a backend component named \u003ccode\u003ehandleExecute()\u003c/code\u003e. Ivanti’s patch added controls that block access to the vulnerable endpoint and redirect unauthenticated requests to the login page.\u003c/p\u003e\n\n\u003cp\u003eSAP released fixes for four critical flaws affecting NetWeaver AS ABAP and ABAP Platform, SAP Commerce Cloud, SAP Data Hub, and SAP NetWeaver Application Server Java. These include CVE-2026-44748, an XML signature wrapping vulnerability in SAML authentication; CVE-2026-27671, a memory corruption vulnerability in Application Server ABAP; CVE-2026-22732, a potential Spring security vulnerability; and CVE-2026-40128, a directory traversal vulnerability. The article states there is no evidence that any of the vulnerabilities have been exploited in the wild.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eFortinet, Ivanti, and SAP released security updates for multiple critical vulnerabilities. The article says the flaws could result in arbitrary code execution and information disclosure. The affected product lines include FortiSandbox, Ivanti Sentry, SAP NetWeaver AS ABAP and ABAP Platform, SAP Commerce Cloud, SAP Data Hub, and SAP NetWeaver Application Server Java.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify any known or suspected threat actors connected to these vulnerabilities. It also states that there is no evidence any of the listed flaws have been exploited in the wild. The recommended response presented in the article is to update affected products to the latest fixed versions.\u003c/p\u003e\n\n\u003ch2 id=\"fortinet-cve-2026-25089\"\u003eFortinet: CVE-2026-25089\u003c/h2\u003e\n\n\u003cp\u003eFortinet patched CVE-2026-25089, a command injection vulnerability with a CVSS score of 9.1. The flaw affects FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI.\u003c/p\u003e\n\n\u003cp\u003eFortinet described the issue as an improper neutralization of special elements used in an OS command vulnerability, classified as CWE-78. According to Fortinet, the flaw may allow an unauthenticated attacker to execute unauthorized commands through specifically crafted HTTP requests.\u003c/p\u003e\n\n\u003cp\u003eAffected Fortinet products and fixed versions listed in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFortiSandbox 5.0.0 through 5.0.5: upgrade to 5.0.6 or above.\u003c/li\u003e\n\u003cli\u003eFortiSandbox 4.4.0 through 4.4.8: upgrade to 4.4.9 or above.\u003c/li\u003e\n\u003cli\u003eFortiSandbox Cloud 5.0.4 through 5.0.5: upgrade to 5.0.6 or above.\u003c/li\u003e\n\u003cli\u003eFortiSandbox PaaS 5.0.4 through 5.0.5: upgrade to 5.0.6 or above.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"ivanti-cve-2026-10520-and-cve-2026-10523\"\u003eIvanti: CVE-2026-10520 and CVE-2026-10523\u003c/h2\u003e\n\n\u003cp\u003eIvanti published fixes for two critical vulnerabilities affecting Ivanti Sentry, formerly MobileIron Sentry. The fixes apply to versions before R10.5.2, R10.6.2, and R10.7.1.\u003c/p\u003e\n\n\u003cp\u003eThe first Ivanti flaw is CVE-2026-10520, which has a CVSS score of 10.0. It is an operating system command injection vulnerability that allows a remote unauthenticated user to achieve root-level remote code execution.\u003c/p\u003e\n\n\u003cp\u003eThe second Ivanti flaw is CVE-2026-10523, which has a CVSS score of 9.9. It is an authentication bypass vulnerability that allows a remote unauthenticated attacker to create arbitrary administrative accounts and obtain full administrative access.\u003c/p\u003e\n\n\u003ch2 id=\"watchtowr-labs-details-on-cve-2026-10520\"\u003ewatchTowr Labs Details on CVE-2026-10520\u003c/h2\u003e\n\n\u003cp\u003ewatchTowr Labs published additional details about CVE-2026-10520. According to watchTowr Labs, an attacker could exploit the vulnerability by issuing a specially crafted HTTP request to the \u003ccode\u003e/mics/api/v2/sentry/mics-config/handleMessage\u003c/code\u003e endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe article says the request is interpreted as a MICS configuration command and executed by a backend component named \u003ccode\u003ehandleExecute()\u003c/code\u003e. Ivanti’s patch added controls that block access to the vulnerable endpoint. The patch causes unauthenticated requests to be redirected to the login page.\u003c/p\u003e\n\n\u003cp\u003eSecurity researcher Sonny Macdonald said Ivanti did not only remove attacker control over the vulnerable execution path. He said Ivanti also added a layer of protection in front of the endpoint by adding authentication.\u003c/p\u003e\n\n\u003ch2 id=\"sap-four-critical-vulnerabilities\"\u003eSAP: Four Critical Vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eSAP released fixes for four critical vulnerabilities. The affected products include SAP NetWeaver AS ABAP and ABAP Platform, SAP Commerce Cloud, SAP Data Hub, and SAP NetWeaver Application Server Java.\u003c/p\u003e\n\n\u003cp\u003eThe SAP vulnerabilities listed in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-44748, with a CVSS score of 9.9, an XML signature wrapping vulnerability in SAML authentication in SAP NetWeaver AS ABAP and ABAP Platform.\u003c/li\u003e\n\u003cli\u003eCVE-2026-27671, with a CVSS score of 9.8, a memory corruption vulnerability in Application Server ABAP of SAP NetWeaver and ABAP Platform.\u003c/li\u003e\n\u003cli\u003eCVE-2026-22732, with a CVSS score of 9.1, a potential Spring security vulnerability within SAP Commerce Cloud and SAP Data Hub.\u003c/li\u003e\n\u003cli\u003eCVE-2026-40128, with a CVSS score of 9.0, a directory traversal vulnerability in SAP NetWeaver Application Server Java Web Container.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"sap-technical-impact-described-in-the-article\"\u003eSAP Technical Impact Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eFor CVE-2026-44748, SAP security company Onapsis said the application allows an authenticated attacker with normal privileges to obtain a valid signed message. The attacker can then send modified signed XML documents with tampered identity information to the verifier.\u003c/p\u003e\n\n\u003cp\u003eOnapsis said improper XML signature verification causes the manipulated identity information to be accepted. The article says this can lead to unauthorized access to sensitive user data and potential disruption of normal system usage.\u003c/p\u003e\n\n\u003cp\u003eFor CVE-2026-27671, the article says an unauthenticated attacker can send a crafted RFC request. The request exploits how the SAP kernel validates the RFC protocol to achieve memory corruption.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-exploitation-status\"\u003eResponse and Exploitation Status\u003c/h2\u003e\n\n\u003cp\u003eThe article states there is no evidence that any of the mentioned flaws have been exploited in the wild. It nevertheless recommends updating to the latest versions for optimal protection.\u003c/p\u003e\n\n\u003cp\u003eThe vendor responses described in the article include Fortinet’s fixed releases for FortiSandbox products, Ivanti’s fixed Sentry versions and access controls for the vulnerable endpoint, and SAP’s security fixes for affected NetWeaver, ABAP Platform, Commerce Cloud, Data Hub, and Application Server Java components.\u003c/p\u003e\n","keyPoints":["Fortinet patched CVE-2026-25089, a CVSS 9.1 command injection vulnerability in FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI that could allow unauthenticated attackers to execute unauthorized commands via crafted HTTP requests.","Ivanti released fixes for CVE-2026-10520 and CVE-2026-10523 in Ivanti Sentry, which could allow remote unauthenticated attackers to achieve root-level remote code execution or create arbitrary administrative accounts.","watchTowr Labs said CVE-2026-10520 could be exploited through a specially crafted HTTP request to the /mics/api/v2/sentry/mics-config/handleMessage endpoint, and Ivanti’s patch blocks unauthenticated access to that endpoint.","SAP issued fixes for four critical vulnerabilities affecting NetWeaver AS ABAP and ABAP Platform, SAP Commerce Cloud, SAP Data Hub, and SAP NetWeaver Application Server Java.","The article states there is no evidence that any of the listed vulnerabilities have been exploited in the wild."],"insights":["Ivanti’s fix for CVE-2026-10520 did more than remove attacker control over the vulnerable execution path; it added authentication in front of the vulnerable endpoint so unauthenticated requests are redirected to the login page.","The Ivanti Sentry command injection issue is especially severe because exploitation could be triggered through a specific HTTP endpoint and lead to root-level remote code execution without authentication.","SAP’s CVE-2026-44748 shows that an authenticated low-privilege attacker could abuse improper XML signature verification to tamper with identity information and gain unauthorized access to sensitive user data.","Although the vulnerabilities span multiple major enterprise vendors and include CVSS scores up to 10.0, the article states there is no evidence that any of them have been exploited in the wild."],"referencedReports":[{"title":"FortiSandbox, FortiSandbox Cloud and FortiSandbox PaaS WEB UI - OS Command Injection","url":"https://fortiguard.fortinet.com/psirt/FG-IR-26-141","publisher":"Fortinet","context":"The article cites Fortinet's PSIRT advisory for CVE-2026-25089 affecting FortiSandbox products.","category":"","primary":false},{"title":"Security Advisory Ivanti Sentry CVE-2026-10520 CVE-2026-10523","url":"https://hub.ivanti.com/s/article/Security-Advisory-Ivanti-Sentry-CVE-2026-10520-CVE-2026-10523?language=en_US","publisher":"Ivanti","context":"The article cites Ivanti's security advisory for fixes addressing two critical Ivanti Sentry vulnerabilities.","category":"","primary":false},{"title":"More Evidence That Words Don’t Mean What We Thought They Meant: Ivanti Sentry Pre-Auth OS Command Injection CVE-2026-10520","url":"https://labs.watchtowr.com/more-evidence-that-words-dont-mean-what-we-thought-they-meant-ivanti-sentry-pre-auth-os-command-injection-cve-2026-10520/","publisher":"watchTowr Labs","context":"The article references watchTowr Labs' additional technical details on exploitation of CVE-2026-10520 in Ivanti Sentry.","category":"","primary":false},{"title":"SAP Security Notes and News: June 2026","url":"https://support.sap.com/en/my-support/knowledge-base/security-notes-news/june-2026.html","publisher":"SAP","context":"The article cites SAP's June 2026 security notes for fixes covering critical vulnerabilities in SAP NetWeaver, ABAP Platform, Commerce Cloud, and Data Hub.","category":"","primary":false}],"body":"\u003cp\u003eFortinet, Ivanti, and SAP released security updates for multiple critical vulnerabilities that could lead to arbitrary code execution and information disclosure. The affected products include FortiSandbox offerings, Ivanti Sentry, SAP NetWeaver AS ABAP and ABAP Platform, SAP Commerce Cloud, SAP Data Hub, and SAP NetWeaver Application Server Java. The article emphasizes that applying the latest updates is recommended for protection.\u003c/p\u003e\n\n\u003cp\u003eFortinet fixed CVE-2026-25089, a CVSS 9.1 command injection flaw in FortiSandbox, FortiSandbox Cloud, and FortiSandbox PaaS WEB UI. Ivanti addressed two critical Ivanti Sentry flaws, including CVE-2026-10520 with a CVSS score of 10.0 and CVE-2026-10523 with a CVSS score of 9.9. SAP also issued fixes for four critical vulnerabilities involving SAML authentication, memory corruption, Spring security, and directory traversal issues.\u003c/p\u003e\n\n\u003cp\u003ewatchTowr Labs published additional details about CVE-2026-10520, saying it could be exploited through a crafted HTTP request to the \u003ccode\u003e/mics/api/v2/sentry/mics-config/handleMessage\u003c/code\u003e endpoint. Ivanti’s patch added controls that redirect unauthenticated requests to the login page. The article states there is no evidence that any of the listed flaws have been exploited in the wild.\u003c/p\u003e\n"},{"n":19,"title":"Your Automated Pentest Looks Clean. See What It Missed in This Expert Webinar","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/your-automated-pentest-looks-clean-see.html","time":"10:27","priority":"MAY READ","score":35,"tldr":"A clean automated pentest report can create false confidence because it may only show that attack paths were tested, not whether security controls detected or blocked them. The webinar argues teams should pair automated pentesting with broader control validation, such as BAS, to prioritize risks based on what actually gets caught.","briefOverview":"\u003cp\u003eThe article promotes a The Hacker News webinar with Picus Security about the limitations of automated pentesting. It argues that a clean or stable pentest report can be misleading because it may show that obvious issues were fixed or that the tool has reached the edge of what it can see. The session features Autumn Stambaugh and Can Yüceel, with host James Azar.\u003c/p\u003e\n\n\u003cp\u003eThe article says automated pentesting is often treated as full security validation, but Picus frames it as only one of six validation surfaces. Automated pentesting is placed on the attack-path surface, which tests whether an attacker can move through an environment. Other areas, including detection rules, cloud configurations, identity controls, and AI guardrails, may remain unproven.\u003c/p\u003e\n\n\u003cp\u003eA central technical point is that automated pentesting can show whether actions such as credential dumping or lateral movement are possible, but it does not show whether a SIEM rule fired, an EDR raised an alert, or the SOC had enough signal to respond. The article contrasts this with breach and attack simulation, which asks whether a control blocked, detected, logged, or missed known behavior. It says teams need this control-validation context to prioritize findings based on whether defenses actually caught the behavior.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article centers on a The Hacker News webinar with Picus Security about what automated pentesting can miss. It says teams may become falsely reassured when repeated automated pentests produce fewer new findings. Leadership may interpret stable results as evidence of security, while the article argues that risk can remain even when reports look clean.\u003c/p\u003e\n\n\u003cp\u003eThe webinar is presented by Autumn Stambaugh and Can Yüceel, with host James Azar. Its stated focus is to show what automated pentesting tools validate, where they stop, and how teams can close the gaps they leave open. The article repeatedly encourages readers to register for the session.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that a flat report can mean obvious weaknesses were fixed, but it can also mean the testing tool has reached the boundary of its visibility. It says automated pentesting is often treated as full security validation, even though it is not. Picus frames validation as six surfaces and places automated pentesting on only one of them: the attack path.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, automated pentesting can test whether an attacker can move through an environment. However, it does not validate other surfaces such as detection rules, cloud configurations, identity controls, or AI guardrails. The article also states that tuning may improve a scan, but it cannot turn an attack-path test into detection or cloud validation.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights a gap between proving that an attacker path exists and proving that defenses would catch it. It says a tool may show that credential dumping or lateral movement is possible, but it cannot tell whether an EDR blocked it, a SIEM logged it, or the SOC had enough signal to act. The risk described is mistaking a reachable path for a defended one.\u003c/p\u003e\n\n\u003cp\u003eThe article contrasts breach and attack simulation with automated pentesting. It says breach and attack simulation asks whether controls block, detect, log, or miss known behavior, while automated pentesting asks how far an attacker could get through an exploitable path. The article says control validation helps teams prioritize findings based on whether defenses actually caught the behavior.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article promotes a The Hacker News webinar with Picus Security focused on gaps left by automated pentesting. It argues that automated pentest results can appear clean or stable while important parts of the security program remain unvalidated. The webinar is positioned as a session to help teams understand what their tools validate, where those tools stop, and how to close what remains open.\u003c/p\u003e\n\n\u003cp\u003eThe session features Autumn Stambaugh and Can Yüceel, with James Azar as host. The article repeatedly directs readers to register for the webinar.\u003c/p\u003e\n\n\u003ch2 id=\"core-message\"\u003eCore Message\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central message is that a clean automated pentest report should not automatically be interpreted as proof of security. It says that after teams run automated pentesting repeatedly, the number of new findings can decline by the third or fourth run. Leadership may read this stability as a sign that the environment is secure, but the article states that the work may slow down while risk remains.\u003c/p\u003e\n\n\u003cp\u003eThe article presents two possible explanations for a flat report:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe obvious holes were fixed.\u003c/li\u003e\n\u003cli\u003eThe tool has reached the edge of what it can see.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article argues that the second possibility is often overlooked.\u003c/p\u003e\n\n\u003ch2 id=\"automated-pentesting-as-one-validation-surface\"\u003eAutomated Pentesting as One Validation Surface\u003c/h2\u003e\n\n\u003cp\u003ePicus frames security validation as six surfaces and places automated pentesting on one of them: the attack path. In this framing, automated pentesting answers whether an attacker can move through an environment. The article says this leaves the other five surfaces unproven.\u003c/p\u003e\n\n\u003cp\u003eThe article names several areas that may remain unvalidated when teams rely only on automated pentesting:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDetection rules.\u003c/li\u003e\n\u003cli\u003eCloud configurations.\u003c/li\u003e\n\u003cli\u003eIdentity controls.\u003c/li\u003e\n\u003cli\u003eAI guardrails.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt also states that tuning may make a scan sharper, but it cannot turn an attack-path test into detection validation or cloud validation.\u003c/p\u003e\n\n\u003ch2 id=\"technical-gap-identified\"\u003eTechnical Gap Identified\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that automated pentesting can prove a path exists without proving whether security controls responded. It gives examples such as credential dumping and lateral movement. A tool may show that those techniques are possible, but the article says that does not show whether the EDR blocked the action, the SIEM logged it, or the SOC had enough signal to act.\u003c/p\u003e\n\n\u003cp\u003eThe risk described is mistaking a reachable path for a defended one. The article says automated pentesting proves that a path exists but says nothing about whether an organization would have caught an attacker using it.\u003c/p\u003e\n\n\u003ch2 id=\"breach-and-attack-simulation-compared-with-automated-pentesting\"\u003eBreach and Attack Simulation Compared With Automated Pentesting\u003c/h2\u003e\n\n\u003cp\u003eThe article contrasts breach and attack simulation with automated pentesting. It says breach and attack simulation asks whether a control reacts to a known behavior. That reaction may be that the behavior was blocked, detected, logged, or missed.\u003c/p\u003e\n\n\u003cp\u003eAutomated pentesting, by contrast, asks how far an attacker could get through an exploitable path. The article says substituting one approach for the other causes the gap to disappear from the report, not from the environment.\u003c/p\u003e\n\n\u003ch2 id=\"prioritization-issue\"\u003ePrioritization Issue\u003c/h2\u003e\n\n\u003cp\u003eThe article says the practical problem is prioritization. If a tool proves a path exists but controls already block or detect it, that finding may not have the same urgency as one that works silently. Without control validation, teams may rank risk with half the evidence missing.\u003c/p\u003e\n\n\u003cp\u003eThe webinar’s focus is described as turning a pile of findings into a ranked queue based on whether controls actually caught the behavior. The article presents this as especially important for teams treating automated pentesting as their full validation program.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-stakeholders\"\u003eAffected Parties and Stakeholders\u003c/h2\u003e\n\n\u003cp\u003eThe article does not describe a specific breach, threat actor, victim, vulnerability, or incident. The stakeholders it names are The Hacker News, Picus Security, Autumn Stambaugh, Can Yüceel, and host James Azar. The audience described is teams that run automated pentesting and may rely on those results as broader security validation.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-or-response\"\u003eDisclosed Impact or Response\u003c/h2\u003e\n\n\u003cp\u003eNo incident impact, remediation advisory, or disclosed breach response is described. The response promoted by the article is registration for the webinar and a shift from relying solely on automated pentesting toward broader validation that includes control response. The article specifically highlights the need to validate whether controls detect, block, log, or miss known behaviors.\u003c/p\u003e\n","keyPoints":["The article promotes a The Hacker News webinar with Picus Security about gaps in automated pentesting validation.","The article says a stable or clean automated pentest report can mean the tool has reached the edge of what it can see rather than that the environment is secure.","Picus frames validation as six surfaces and places automated pentesting on the attack-path surface, leaving areas such as detection rules, cloud configurations, identity controls, and AI guardrails unproven.","The article states that automated pentesting can show whether credential dumping or lateral movement is possible but cannot show whether a SIEM rule fired, an EDR raised an alert, or a SOC had enough signal to act.","The article says breach and attack simulation asks whether a control blocks, detects, logs, or misses known behavior, while automated pentesting asks how far an attacker could get through an exploitable path."],"insights":["A decreasing number of automated pentest findings over repeated runs should be treated as a signal to check tool coverage limits, not as proof that risk has decreased.","Findings from automated pentesting should be prioritized differently depending on whether security controls block or detect the demonstrated behavior, because a reachable but detected path carries different urgency than one that works silently.","Tuning an automated pentesting tool can improve attack-path testing, but the article says it does not convert that test into validation of SIEM rules, EDR alerts, cloud configurations, identity controls, or AI guardrails.","Teams relying on automated pentesting as their full validation program may be ranking risk with incomplete evidence because they know an attack path exists but not whether defenders would have seen or stopped it."],"referencedReports":[],"body":"\u003cp\u003eThe article promotes a The Hacker News webinar with Picus Security about the limitations of automated pentesting. It argues that a clean or stable pentest report can be misleading because it may show that obvious issues were fixed or that the tool has reached the edge of what it can see. The session features Autumn Stambaugh and Can Yüceel, with host James Azar.\u003c/p\u003e\n\n\u003cp\u003eThe article says automated pentesting is often treated as full security validation, but Picus frames it as only one of six validation surfaces. Automated pentesting is placed on the attack-path surface, which tests whether an attacker can move through an environment. Other areas, including detection rules, cloud configurations, identity controls, and AI guardrails, may remain unproven.\u003c/p\u003e\n\n\u003cp\u003eA central technical point is that automated pentesting can show whether actions such as credential dumping or lateral movement are possible, but it does not show whether a SIEM rule fired, an EDR raised an alert, or the SOC had enough signal to respond. The article contrasts this with breach and attack simulation, which asks whether a control blocked, detected, logged, or missed known behavior. It says teams need this control-validation context to prioritize findings based on whether defenses actually caught the behavior.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>

    </div>
  );
}

function htmlPanel(value) {

}

function numberedList(items, accent) {
  return (
