e, execution occurs during the build process and does not require application runtime behavior or use of the crate’s APIs.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-detection-guidance-from-aikido\"\u003eResponse and detection guidance from Aikido\u003c/h2\u003e\n\n\u003cp\u003eAikido says users of its platform should check their central feed and filter on malware issues. The article says the issue will surface as a \u003csup\u003e100\u003c/sup\u003e\u0026frasl;\u003csub\u003e100\u003c/sub\u003e critical issue and that Aikido rescans nightly, while recommending that users trigger a manual rescan.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that non-users can create an Aikido account and connect repositories, and that malware coverage is included in the free plan. It additionally mentions Aikido Device Protection and Aikido Safe Chain as broader or future protection options.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following indicators of compromise:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDependency \u003ccode\u003eonering\u003c/code\u003e version 1.4.1 from crates.io.\u003c/li\u003e\n\u003cli\u003eSentry ingest endpoint: \u003ccode\u003ehttps://o4511539639222272.ingest.de.sentry.io/api/4511539669368912/envelope/\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSentry DSN public key: \u003ccode\u003e8197ee42c4f59c83f4cc6d48f5bae821\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSentry organization ID: \u003ccode\u003eo4511539639222272\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSentry project ID: \u003ccode\u003e4511539669368912\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"actor-information\"\u003eActor information\u003c/h2\u003e\n\n\u003cp\u003eThe article does not name a threat actor or group responsible for the compromise. It refers to “attackers” in the context of supply chain payloads but does not attribute this incident to any specific person, group, or country.\u003c/p\u003e\n","keyPoints":["Aikido detected malicious behavior on June 10, 2026, in version 1.4.1 of the Rust crate onering, a synchronous queue and channels library with over 18,000 downloads on crates.io.","The compromised version added a build.rs file that runs during Cargo builds and locates the root of the project consuming the crate.","The malicious build script runs Git commands to collect the latest commit metadata and the full textual diff of the most recent commit from the consuming project.","The stolen commit metadata and code diff are disguised as a Sentry telemetry event and sent via curl to a Sentry ingest endpoint.","The article says the maintainer's GitHub repository also appears to be compromised, so pulling the crate from Git instead of crates.io does not make users safe."],"insights":["Simply building a project that depends on onering 1.4.1 is enough to trigger the payload, because Cargo automatically compiles and runs build.rs scripts without requiring any library function to be called.","The payload leaks a rolling stream of source changes over repeated builds because it exfiltrates git diff HEAD^ HEAD each time rather than taking only a one-time repository snapshot.","Network monitoring may miss or under-prioritize the activity because the stolen data is sent to a legitimate-looking Sentry ingest URL and formatted as telemetry.","Switching from the crates.io package to the maintainer's GitHub repository is not a safe workaround because the article says the GitHub repository also appears to be compromised."],"referencedReports":[],"body":"\u003cp\u003eOn June 10, 2026, Aikido detected malicious behavior in version 1.4.1 of the Rust crate \u003ccode\u003eonering\u003c/code\u003e. The crate is described as a high-throughput synchronous queue and channels library for Rust with more than 18,000 downloads on crates.io. The article says the latest version added a malicious \u003ccode\u003ebuild.rs\u003c/code\u003e file that harvests Git data from projects building the crate.\u003c/p\u003e\n\n\u003cp\u003eThe malicious build script runs during Cargo builds, meaning the payload can execute simply because a project depends on the crate. It locates the root of the consuming project, collects metadata for the latest Git commit, and captures the full textual diff of that commit. The article emphasizes that users do not need to call any library function for the behavior to occur.\u003c/p\u003e\n\n\u003cp\u003eThe collected data is disguised as a Sentry telemetry event and sent via \u003ccode\u003ecurl\u003c/code\u003e to a Sentry ingest endpoint. The article says the maintainer’s GitHub repository also appears to be compromised, so pulling the crate from Git rather than crates.io is not presented as a safe workaround. Indicators of compromise include dependency \u003ccode\u003eonering\u003c/code\u003e version 1.4.1, the listed Sentry ingest endpoint, and the associated Sentry DSN details.\u003c/p\u003e\n"},{"n":8,"title":"The ‘Miasma’ worm source code briefly leaked on GitHub","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/the-miasma-worm-source-code-briefly-leaked-on-github/","time":"20:27","priority":"SHOULD READ","score":85,"tldr":"The Miasma credential-stealing worm source code was briefly and apparently deliberately published on GitHub, giving other attackers access to a self-propagating supply-chain attack framework. Researchers warn the leak could fuel more attacks against open-source ecosystems by helping threat actors steal developer credentials and compromise legitimate packages and repositories.","briefOverview":"\u003cp\u003eThe Miasma credential-stealing attack framework was briefly open-sourced on GitHub. SafeDep reported that the source code appeared in repositories named \u0026ldquo;Miasma-Open-Source-Release\u0026rdquo; across numerous compromised developer accounts. The article says this suggests a deliberate release rather than an accidental leak.\u003c/p\u003e\n\n\u003cp\u003eMiasma targets open-source ecosystems through supply-chain attacks and appears to be an evolution of the earlier Shai-Hulud worm. It infects developer machines, steals build environment and cloud credentials, and uses them to compromise legitimate repositories and packages. Trojanized versions can then infect downstream developers and continue the cycle.\u003c/p\u003e\n\n\u003cp\u003eSafeDep’s analysis found that Miasma does not need command-and-control infrastructure because it uses GitHub for that purpose. The leaked code revealed a dead-man switch tied to stolen GitHub token validity and a five-stage build pipeline that generates unique payloads. The article warns that the leak could lead to more advanced variants and higher attack rates, as occurred after Shai-Hulud was leaked.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Miasma credential-stealing attack framework was briefly published on GitHub through numerous compromised developer accounts. SafeDep reported that each account used a repository named \u0026ldquo;Miasma-Open-Source-Release\u0026rdquo; to publish the source code. The article says this indicates the source code was deliberately released rather than leaked by accident.\u003c/p\u003e\n\n\u003cp\u003eMiasma appears to be an evolution of the earlier Shai-Hulud worm, which was also previously leaked on GitHub. The article says the two share many features, techniques, and even code. Miasma has been linked to attacks against Red Hat npm packages and, more recently, 73 Microsoft repositories on GitHub.\u003c/p\u003e\n\n\u003cp\u003eThe malware infects developer machines, steals build environment and cloud credentials, and uses those credentials to compromise legitimate repositories and packages. It can publish trojanized versions that infect downstream developers and repeat the cycle. The article describes this as an autonomous, worm-like self-propagation mechanism that can expand a single breach into a wider supply-chain attack.\u003c/p\u003e\n\n\u003cp\u003eSafeDep’s analysis found that Miasma requires no command-and-control infrastructure because it uses GitHub for that role. The framework harvests credentials from cloud providers, CI/CD systems, password managers, Kubernetes, and secret stores. It can abuse those credentials to compromise npm, PyPI, RubyGems, GitHub repositories, Actions workflows, and JFrog Artifactory instances.\u003c/p\u003e\n\n\u003cp\u003eThe leaked code revealed a dead-man switch that monitors a stolen GitHub token every minute when that token is used for exfiltration. If the token is revoked, the component executes a destructive command to recursively delete files and directories in the user’s home and Documents folders. The monitor runs as a systemd user service on Linux or a LaunchAgent on macOS and remains active for up to 72 hours.\u003c/p\u003e\n\n\u003cp\u003eSafeDep also reported a five-stage build pipeline that produces unique payloads for each build using encryption, obfuscation, source transformations, and randomized encoding. The article says these methods make signature-based detection and static analysis harder. Developers are advised to pin project dependencies, delay adoption of newly released package updates for multiple days, and validate new builds in isolated test environments.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that the Miasma credential-stealing attack framework was briefly open-sourced on GitHub. SafeDep said the source code was published through numerous compromised developer accounts, each using a repository named \u0026ldquo;Miasma-Open-Source-Release.\u0026rdquo; The article states that this pattern indicates the threat actors deliberately released the source code rather than exposing it accidentally.\u003c/p\u003e\n\n\u003cp\u003eMiasma has recently targeted open-source ecosystems through supply-chain attacks. The article describes it as an evolution of the earlier Shai-Hulud worm, which was also previously leaked on GitHub and shares many of the same features, techniques, and code.\u003c/p\u003e\n\n\u003ch2 id=\"supply-chain-attack-behavior\"\u003eSupply-chain attack behavior\u003c/h2\u003e\n\n\u003cp\u003eMiasma infects a developer machine and steals the build environment and cloud credentials. It then uses those credentials to compromise legitimate repositories and packages and publish trojanized versions. Those trojanized versions can infect downstream developers and repeat the same cycle.\u003c/p\u003e\n\n\u003cp\u003eThe article describes this as an autonomous, worm-like self-propagation mechanism. It warns that this behavior can quickly expand the malware’s reach and potentially turn a single breach into a widespread supply-chain attack.\u003c/p\u003e\n\n\u003ch2 id=\"prior-links-to-attacks\"\u003ePrior links to attacks\u003c/h2\u003e\n\n\u003cp\u003eThe article says Miasma has previously been linked to high-profile attacks against Red Hat npm packages. It also says the framework was more recently linked to 73 Microsoft repositories on GitHub.\u003c/p\u003e\n\n\u003cp\u003eThese examples are presented as part of Miasma’s recent activity against open-source and developer ecosystems.\u003c/p\u003e\n\n\u003ch2 id=\"safedep-findings\"\u003eSafeDep findings\u003c/h2\u003e\n\n\u003cp\u003eSafeDep reported that the Miasma source code was leaked on GitHub through numerous compromised developer accounts. The repositories used the name \u0026ldquo;Miasma-Open-Source-Release.\u0026rdquo; According to the article, this points to a deliberate release of the source code, similar to how the Shai-Hulud code was previously published.\u003c/p\u003e\n\n\u003cp\u003eSafeDep’s code analysis found that the toolkit requires no command-and-control infrastructure to operate. Instead, it uses GitHub for that purpose.\u003c/p\u003e\n\n\u003ch2 id=\"credential-harvesting-and-compromise-targets\"\u003eCredential harvesting and compromise targets\u003c/h2\u003e\n\n\u003cp\u003eThe framework harvests credentials from several types of developer and infrastructure systems, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCloud providers\u003c/li\u003e\n\u003cli\u003eCI/CD systems\u003c/li\u003e\n\u003cli\u003ePassword managers\u003c/li\u003e\n\u003cli\u003eKubernetes\u003c/li\u003e\n\u003cli\u003eSecret stores\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says Miasma abuses these credentials to compromise multiple package and development platforms, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003enpm packages\u003c/li\u003e\n\u003cli\u003ePyPI packages\u003c/li\u003e\n\u003cli\u003eRubyGems packages\u003c/li\u003e\n\u003cli\u003eGitHub repositories\u003c/li\u003e\n\u003cli\u003eGitHub Actions workflows\u003c/li\u003e\n\u003cli\u003eJFrog Artifactory instances\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt can also move laterally through SSH and AWS Systems Manager. The article adds that it can poison configurations of AI coding tools such as Claude, Gemini, Cursor, Copilot, Kiro, and Cline.\u003c/p\u003e\n\n\u003ch2 id=\"dead-man-switch\"\u003eDead-man switch\u003c/h2\u003e\n\n\u003cp\u003eOne notable capability revealed in the leaked source code is a dead-man switch. The article says this switch is installed when the malware uses a victim’s stolen GitHub token as an exfiltration channel.\u003c/p\u003e\n\n\u003cp\u003eThe component monitors the token’s validity every minute. If the token is revoked, it executes a destructive command, \u003ccode\u003erm -rf ~/; rm -rf ~/Documents\u003c/code\u003e, recursively deleting files and directories in the user’s home and Documents folders.\u003c/p\u003e\n\n\u003cp\u003eThe monitor runs as a systemd user service on Linux or as a LaunchAgent on macOS. It remains active for up to 72 hours.\u003c/p\u003e\n\n\u003ch2 id=\"build-pipeline-and-evasion-characteristics\"\u003eBuild pipeline and evasion characteristics\u003c/h2\u003e\n\n\u003cp\u003eSafeDep also reported that Miasma includes a five-stage build pipeline that generates unique payloads for each build. The process combines several techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePer-file AES-256-GCM encryption of embedded assets\u003c/li\u003e\n\u003cli\u003eRandomized string obfuscation\u003c/li\u003e\n\u003cli\u003eSource transformations\u003c/li\u003e\n\u003cli\u003eJavaScript obfuscation\u003c/li\u003e\n\u003cli\u003eA self-extracting loader wrapping the final payload in three layers of encryption\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says random keys and a randomized outer encoding layer ensure that each generated sample differs from previous builds. This makes signature-based detection and static analysis harder.\u003c/p\u003e\n\n\u003ch2 id=\"expected-impact-of-the-source-code-leak\"\u003eExpected impact of the source-code leak\u003c/h2\u003e\n\n\u003cp\u003eThe article compares the Miasma leak to the earlier Shai-Hulud leak. It says the Shai-Hulud leak led to more advanced variants, including Miasma, and to increased attack rates.\u003c/p\u003e\n\n\u003cp\u003eThe article says the Miasma source-code leak is expected to have a similar effect as threat actors adopt and further adjust the code. It warns this could significantly affect the security of the open-source ecosystem, where supply-chain attacks continue to target projects at an unprecedented pace.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-developer-precautions\"\u003eRecommended developer precautions\u003c/h2\u003e\n\n\u003cp\u003eThe article advises software developers to take several precautions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePin project dependencies.\u003c/li\u003e\n\u003cli\u003eIntroduce multi-day delays before adopting newly released package updates.\u003c/li\u003e\n\u003cli\u003eValidate new builds in isolated test environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese recommendations are presented as defensive steps for developers facing supply-chain risks from trojanized package updates and compromised repositories.\u003c/p\u003e\n","keyPoints":["The Miasma credential-stealing attack framework was briefly open-sourced on GitHub through repositories named \"Miasma-Open-Source-Release\" on numerous compromised developer accounts.","Miasma infects developer machines, steals build environment and cloud credentials, and uses them to compromise legitimate repositories and packages with trojanized versions.","SafeDep found that Miasma requires no command-and-control infrastructure because it uses GitHub for that purpose.","The leaked source code revealed a dead-man switch that can delete files in a user's home and Documents folders if a stolen GitHub token used for exfiltration is revoked.","SafeDep reported that Miasma uses a five-stage build pipeline with encryption, obfuscation, source transformations, and randomized encoding to generate unique payloads for each build."],"insights":["Miasma’s use of GitHub as its command-and-control mechanism means defenders cannot rely on detecting traditional attacker infrastructure to identify its activity.","The dead-man switch creates an additional risk for victims during incident response because revoking a stolen GitHub token can trigger destructive file deletion on infected Linux or macOS systems.","The combination of per-build encryption, obfuscation, source transformations, and randomized encoding makes static signatures less reliable for detecting Miasma samples.","The article recommends delaying adoption of newly released package updates for multiple days, which is an actionable defense against fast-moving trojanized package campaigns."],"referencedReports":[{"title":"Inside the Miasma Supply Chain Attack Toolkit","url":"https://safedep.io/inside-the-miasma-supply-chain-attack-toolkit/","publisher":"SafeDep","context":"The article cites SafeDep’s analysis reporting that the Miasma source code was leaked on GitHub through numerous compromised developer accounts and describing the toolkit’s capabilities.","category":"","primary":false}],"body":"\u003cp\u003eThe Miasma credential-stealing attack framework was briefly open-sourced on GitHub. SafeDep reported that the source code appeared in repositories named \u0026ldquo;Miasma-Open-Source-Release\u0026rdquo; across numerous compromised developer accounts. The article says this suggests a deliberate release rather than an accidental leak.\u003c/p\u003e\n\n\u003cp\u003eMiasma targets open-source ecosystems through supply-chain attacks and appears to be an evolution of the earlier Shai-Hulud worm. It infects developer machines, steals build environment and cloud credentials, and uses them to compromise legitimate repositories and packages. Trojanized versions can then infect downstream developers and continue the cycle.\u003c/p\u003e\n\n\u003cp\u003eSafeDep’s analysis found that Miasma does not need command-and-control infrastructure because it uses GitHub for that purpose. The leaked code revealed a dead-man switch tied to stolen GitHub token validity and a five-stage build pipeline that generates unique payloads. The article warns that the leak could lead to more advanced variants and higher attack rates, as occurred after Shai-Hulud was leaked.\u003c/p\u003e\n"},{"n":9,"title":"GitHub announces npm security changes to tackle supply-chain attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/github-announces-npm-security-changes-to-tackle-supply-chain-attacks/","time":"19:41","priority":"SHOULD READ","score":84,"tldr":"GitHub’s upcoming npm v12 will block dependency install scripts, Git-based dependencies, and remote URL dependencies from running or resolving automatically unless explicitly approved. The change is meant to reduce npm supply-chain attacks that abuse npm install for automatic code execution.","briefOverview":"\u003cp\u003eGitHub announced that npm v12, expected next month, will introduce security-focused changes to reduce supply-chain attacks that abuse behaviors triggered by the \u003ccode\u003enpm install\u003c/code\u003e command. The command is widely used to download dependencies and run install-related package scripts after cloning projects, pulling updates, or during CI/CD builds. GitHub’s main change is to stop trusting automatic code execution and non-registry dependency sources by default.\u003c/p\u003e\n\n\u003cp\u003eStarting in npm v12, \u003ccode\u003enpm install\u003c/code\u003e will not run dependency \u003ccode\u003epreinstall\u003c/code\u003e, \u003ccode\u003einstall\u003c/code\u003e, or \u003ccode\u003epostinstall\u003c/code\u003e scripts unless they are explicitly approved. The same approval requirement applies to native module builds triggered through \u003ccode\u003enode-gyp\u003c/code\u003e and \u003ccode\u003eprepare\u003c/code\u003e scripts from Git, local file, and linked dependencies. GitHub will also require explicit permission before fetching dependencies from Git repositories or resolving remote URL dependencies such as HTTPS tarballs.\u003c/p\u003e\n\n\u003cp\u003eThe article says these defaults could have disrupted techniques used in recent npm supply-chain attacks, including malicious install-script campaigns, data-stealing packages, and Git dependency abuse documented in Shai-Hulud attacks. Projects that rely on these behaviors for legitimate workflows will need to explicitly opt in before upgrading to npm v12. GitHub recommends upgrading to npm 11.16.0 or newer first, because it displays warnings for actions that will break under version 12.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGitHub announced upcoming breaking security changes for npm v12, expected next month, aimed at blocking supply-chain attacks that abuse \u003ccode\u003enpm install\u003c/code\u003e. The article explains that \u003ccode\u003enpm install\u003c/code\u003e downloads and installs project dependencies and runs install-related scripts defined by packages. Developers commonly run it after cloning a project, pulling updates, or in CI/CD builds, making it a target for attackers seeking automated code execution during package installation.\u003c/p\u003e\n\n\u003cp\u003eThe main shift in npm v12 is that automatic code execution and non-registry dependency sources will require explicit approval instead of being trusted by default. Starting in version 12, \u003ccode\u003enpm install\u003c/code\u003e will not run \u003ccode\u003epreinstall\u003c/code\u003e, \u003ccode\u003einstall\u003c/code\u003e, or \u003ccode\u003epostinstall\u003c/code\u003e scripts from dependencies unless those scripts have been explicitly approved. This also covers native module builds triggered through \u003ccode\u003enode-gyp\u003c/code\u003e and \u003ccode\u003eprepare\u003c/code\u003e scripts from Git, local file, and linked dependencies.\u003c/p\u003e\n\n\u003cp\u003eGitHub also said npm v12 will no longer fetch dependencies from Git repositories unless they are explicitly permitted, whether those dependencies are direct or transitive. The article states this removes a code execution path in which a Git dependency’s \u003ccode\u003e.npmrc\u003c/code\u003e file could alter which Git executable is used, even when install scripts are disabled. Dependencies installed from remote URLs, including HTTPS tarballs, will also no longer be resolved unless explicitly permitted.\u003c/p\u003e\n\n\u003cp\u003eThe article connects the new defaults to several recent supply-chain attack techniques. It says the changes could have disrupted malicious \u003ccode\u003epreinstall\u003c/code\u003e and \u003ccode\u003epostinstall\u003c/code\u003e script campaigns targeting \u003ccode\u003eeslint-config-prettier\u003c/code\u003e, Toptal’s Picasso packages, and dozens of data-stealing npm packages. It also mentions Git dependency abuse documented in Shai-Hulud attacks.\u003c/p\u003e\n\n\u003cp\u003eProjects that legitimately depend on automatic install scripts, Git dependencies, or remote URL dependencies will need to opt in explicitly before moving to npm v12. GitHub recommends developers prepare by upgrading to npm 11.16.0 or newer, which displays warnings for actions that will break under version 12. A community discussion has also been opened for developers to share suggestions on the upcoming changes.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGitHub announced that npm v12, expected next month, will introduce several security-focused changes intended to block supply-chain attacks that abuse behaviors triggered by the \u003ccode\u003enpm install\u003c/code\u003e command. The article describes \u003ccode\u003enpm install\u003c/code\u003e as the command used to download and install a project’s dependencies and run install-related scripts defined by packages.\u003c/p\u003e\n\n\u003cp\u003eBecause developers use \u003ccode\u003enpm install\u003c/code\u003e after cloning projects, pulling updates, or during CI/CD builds, the article says attackers target it for its potential to trigger automated code execution during package installation. GitHub’s main theme is to change default trust behavior so that automatic code execution and non-registry dependency sources require explicit approval.\u003c/p\u003e\n\n\u003ch2 id=\"core-security-changes-in-npm-v12\"\u003eCore Security Changes in npm v12\u003c/h2\u003e\n\n\u003cp\u003eGitHub announced three main changes for npm v12.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003enpm install\u003c/code\u003e will not run \u003ccode\u003epreinstall\u003c/code\u003e, \u003ccode\u003einstall\u003c/code\u003e, or \u003ccode\u003epostinstall\u003c/code\u003e scripts from dependencies unless they have been explicitly approved.\u003c/li\u003e\n\u003cli\u003eThe approval requirement also applies to native module builds triggered through \u003ccode\u003enode-gyp\u003c/code\u003e and \u003ccode\u003eprepare\u003c/code\u003e scripts from Git, local file, and linked dependencies.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003enpm install\u003c/code\u003e will no longer fetch dependencies from Git repositories unless those dependencies are explicitly permitted.\u003c/li\u003e\n\u003cli\u003eDependencies installed from remote URLs, such as HTTPS tarballs, will no longer be resolved unless explicitly permitted.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese changes apply to both direct and transitive Git dependencies and remote URL dependencies, according to the article.\u003c/p\u003e\n\n\u003ch2 id=\"technical-significance\"\u003eTechnical Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that the changes remove automatic behaviors that have created opportunities for supply-chain abuse. By blocking unapproved install scripts, npm v12 reduces automatic execution of dependency-provided code during installation.\u003c/p\u003e\n\n\u003cp\u003eGitHub also highlighted a specific Git dependency risk: a Git dependency’s \u003ccode\u003e.npmrc\u003c/code\u003e file could alter which Git executable is used, even when install scripts are disabled. The new rule requiring explicit permission for Git dependencies is intended to remove that code execution path.\u003c/p\u003e\n\n\u003cp\u003eRemote URL dependencies, including HTTPS tarballs, will also require explicit approval. This means npm v12 will no longer automatically resolve these dependencies unless a project has permitted them.\u003c/p\u003e\n\n\u003ch2 id=\"attack-techniques-the-changes-address\"\u003eAttack Techniques the Changes Address\u003c/h2\u003e\n\n\u003cp\u003eThe article says the new defaults could have disrupted several techniques used in recent supply-chain attacks. These include malicious \u003ccode\u003epreinstall\u003c/code\u003e and \u003ccode\u003epostinstall\u003c/code\u003e script campaigns, Git dependency abuse, and attacks involving data-stealing npm packages.\u003c/p\u003e\n\n\u003cp\u003eExamples named in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCampaigns targeting \u003ccode\u003eeslint-config-prettier\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eToptal’s Picasso packages.\u003c/li\u003e\n\u003cli\u003eDozens of data-stealing npm packages.\u003c/li\u003e\n\u003cli\u003eGit dependency abuse documented in Shai-Hulud attacks.\u003c/li\u003e\n\u003cli\u003eShai-Hulud attacks involving signed malicious TanStack and Mistral npm packages.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article does not describe a new active compromise tied to npm v12; it focuses on GitHub’s announced changes and the attack techniques those changes are meant to reduce.\u003c/p\u003e\n\n\u003ch2 id=\"impact-on-developers-and-projects\"\u003eImpact on Developers and Projects\u003c/h2\u003e\n\n\u003cp\u003eProjects that rely on currently automatic behaviors for legitimate workflows will need to explicitly opt in before upgrading to npm v12. This includes workflows depending on dependency install scripts, native module builds through \u003ccode\u003enode-gyp\u003c/code\u003e, Git dependencies, local file dependencies, linked dependencies, or remote URL dependencies.\u003c/p\u003e\n\n\u003cp\u003eAfter upgrading to version 12, only explicitly approved scripts and dependency sources will continue functioning automatically. As a result, projects that do not prepare may encounter broken install workflows once npm v12 is adopted.\u003c/p\u003e\n\n\u003ch2 id=\"github-s-recommended-preparation\"\u003eGitHub’s Recommended Preparation\u003c/h2\u003e\n\n\u003cp\u003eGitHub recommends that developers upgrade to npm 11.16.0 or newer before moving to npm v12. According to the article, npm 11.16.0 and later display warnings for actions that will break under version 12.\u003c/p\u003e\n\n\u003cp\u003eDevelopers can run their normal install routines on npm 11.16.0 or newer to review these warnings. This allows them to identify dependencies or workflows that will require explicit approval before upgrading to npm v12.\u003c/p\u003e\n\n\u003ch2 id=\"community-response-channel\"\u003eCommunity Response Channel\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that GitHub opened a community discussion for developers to share suggestions about the upcoming npm v12 changes. This provides a channel for feedback before the changes arrive in the next major version.\u003c/p\u003e\n","keyPoints":["GitHub announced that npm v12, expected next month, will introduce security-focused changes aimed at blocking supply-chain attacks that abuse behaviors triggered by the npm install command.","Starting in npm v12, npm install will not run preinstall, install, or postinstall scripts from dependencies unless they have been explicitly approved, including native module builds through node-gyp and prepare scripts from Git, local file, and linked dependencies.","npm install will no longer fetch dependencies from Git repositories or resolve dependencies installed from remote URLs, including HTTPS tarballs, unless they are explicitly permitted.","GitHub says the new defaults could have disrupted recent supply-chain attack techniques involving malicious install scripts, data-stealing npm packages, and Git dependency abuse documented in Shai-Hulud attacks.","GitHub recommends developers upgrade to npm 11.16.0 or newer to see warnings about actions that will break under npm v12 and identify workflows that will require explicit approval."],"insights":["Developers can identify likely npm v12 breakages before upgrading by running their normal install routines on npm 11.16.0 or newer, which surfaces warnings for behaviors that will require approval.","The changes address a code execution path that can exist even when install scripts are disabled, because a Git dependency’s .npmrc file could alter which Git executable is used.","Legitimate workflows that depend on Git, local file, linked, or remote URL dependencies will need explicit opt-in rather than relying on npm’s previous default trust model.","The new defaults would have affected multiple recent npm attack patterns, including malicious install scripts in hijacked packages and Git dependency abuse documented in Shai-Hulud attacks."],"referencedReports":[],"body":"\u003cp\u003eGitHub announced that npm v12, expected next month, will introduce security-focused changes to reduce supply-chain attacks that abuse behaviors triggered by the \u003ccode\u003enpm install\u003c/code\u003e command. The command is widely used to download dependencies and run install-related package scripts after cloning projects, pulling updates, or during CI/CD builds. GitHub’s main change is to stop trusting automatic code execution and non-registry dependency sources by default.\u003c/p\u003e\n\n\u003cp\u003eStarting in npm v12, \u003ccode\u003enpm install\u003c/code\u003e will not run dependency \u003ccode\u003epreinstall\u003c/code\u003e, \u003ccode\u003einstall\u003c/code\u003e, or \u003ccode\u003epostinstall\u003c/code\u003e scripts unless they are explicitly approved. The same approval requirement applies to native module builds triggered through \u003ccode\u003enode-gyp\u003c/code\u003e and \u003ccode\u003eprepare\u003c/code\u003e scripts from Git, local file, and linked dependencies. GitHub will also require explicit permission before fetching dependencies from Git repositories or resolving remote URL dependencies such as HTTPS tarballs.\u003c/p\u003e\n\n\u003cp\u003eThe article says these defaults could have disrupted techniques used in recent npm supply-chain attacks, including malicious install-script campaigns, data-stealing packages, and Git dependency abuse documented in Shai-Hulud attacks. Projects that rely on these behaviors for legitimate workflows will need to explicitly opt in before upgrading to npm v12. GitHub recommends upgrading to npm 11.16.0 or newer first, because it displays warnings for actions that will break under version 12.\u003c/p\u003e\n"},{"n":12,"title":"CISA to require federal agencies to patch some cyber vulnerabilities within 3 days","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/cisa-to-require-federal-agencies-to-patch-3-days","time":"19:53","priority":"SHOULD READ","score":82,"tldr":"CISA will require federal civilian agencies to patch the highest-risk, internet-facing and actively exploited vulnerabilities within 72 hours, with agencies given 180 days to implement the new process. The directive is meant to prioritize fixes for vulnerabilities that can be automated and rapidly exploited, especially as AI increases attacker capabilities.","briefOverview":"\u003cp\u003eCISA released a new binding operational directive requiring federal civilian agencies to patch certain high-risk cyber vulnerabilities within 72 hours. The directive is part of a prioritization system intended to address the heightened threat environment associated with the rise of artificial intelligence. Agencies have 180 days to adopt the new patching time frame.\u003c/p\u003e\n\n\u003cp\u003eThe directive uses four criteria to assess vulnerability seriousness: public internet exposure, inclusion in CISA’s Known Exploited Vulnerabilities catalog, whether exploitation can be automated, and the level of control an adversary could gain over a vulnerable system. The three-day deadline applies to currently exploited vulnerabilities that can be automated and would give malicious actors some control over internet-facing systems. Agencies must also examine systems for compromise when a vulnerability could allow complete system control.\u003c/p\u003e\n\n\u003cp\u003eCISA said patching alone generally does not evict a threat actor, so the directive requires agencies to check when and how a vulnerable system was compromised before patching. CISA is also urging state, tribal, and local governments, as well as critical infrastructure owners and operators, to adopt similar vulnerability management regimes. CISA officials said the approach is meant to focus limited resources on the most at-risk assets while allowing lower-priority vulnerabilities to be deferred.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCISA issued a new binding operational directive that requires federal civilian agencies to patch certain cyber vulnerabilities within three days. The directive establishes a risk-based prioritization system for security updates and gives agencies 180 days to adopt the new patching timeline. CISA framed the directive as especially important because advances in artificial intelligence allow threat actors to find and exploit vulnerable assets.\u003c/p\u003e\n\n\u003cp\u003eThe directive assesses vulnerabilities using four criteria: whether the vulnerability is exposed to the public internet, whether it appears in the Known Exploited Vulnerabilities catalog, whether the exploit can be automated, and what level of control an adversary could gain over the vulnerable system. Vulnerabilities meeting three of the four criteria must be patched within 72 hours. The article specifies that this applies to currently exploited vulnerabilities that can be automated and would give malicious actors some control over internet-facing systems.\u003c/p\u003e\n\n\u003cp\u003eFor vulnerabilities that could let hackers take complete control of a system, agencies must examine systems to determine whether they have been compromised and patch within three days. Agencies will have up to two weeks to patch vulnerabilities that meet the same criteria but are not automatable, as long as a threat actor has not taken full control of a system. The directive also requires agencies to check when and how a vulnerable system was compromised before patching.\u003c/p\u003e\n\n\u003cp\u003eCISA emphasized that applying a patch generally does not remove a threat actor from a compromised environment. Acting Executive Assistant Director for Cybersecurity Chris Butera said some agencies may be newer to forensic triage and that CISA can assist with triage analysis. He also said agencies have been given a “good runway” to implement the new vulnerability management processes.\u003c/p\u003e\n\n\u003cp\u003eCISA analyzed how often federal agencies face vulnerabilities that would trigger the 72-hour requirement. At one federal agency studied by CISA, only 1% of vulnerabilities required patching within three days, while more than 60% were less serious and could be patched during the next system update. Acting CISA Director Nick Andersen said the directive is intended to help agencies focus on the highest-risk areas and improve transparency, predictability, and resource planning.\u003c/p\u003e\n\n\u003cp\u003eCISA is strongly urging state, tribal, and local governments, along with critical infrastructure owners and operators, to adopt similar vulnerability management approaches. The article also notes that Sen. Mark Warner introduced legislation directing CISA to collaborate with industry and regulators to modernize cybersecurity defense. Warner said cybersecurity defenses must keep up as artificial intelligence continues to evolve.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCISA released a new binding operational directive requiring federal civilian agencies to patch certain high-risk cyber vulnerabilities within 72 hours. The directive creates a risk-based prioritization system for security updates and is intended to focus federal IT and security teams on the most at-risk assets.\u003c/p\u003e\n\n\u003cp\u003eCISA is giving federal agencies 180 days to adopt the new patching time frame. The agency is also strongly urging state, tribal, and local governments, as well as critical infrastructure owners and operators, to adopt similar vulnerability management regimes.\u003c/p\u003e\n\n\u003ch2 id=\"why-cisa-issued-the-directive\"\u003eWhy CISA Issued the Directive\u003c/h2\u003e\n\n\u003cp\u003eCISA officials tied the directive to a heightened threat environment associated with advances in artificial intelligence. Acting Executive Assistant Director for Cybersecurity Chris Butera said AI advancements allow threat actors to find and exploit vulnerabilities in at-risk assets.\u003c/p\u003e\n\n\u003cp\u003eButera said defenders cannot afford to take weeks to patch systems that can be autonomously exploited at scale. CISA described the directive as a way to expedite and prioritize cyber defense of civilian federal government information systems.\u003c/p\u003e\n\n\u003ch2 id=\"risk-criteria-used-in-the-directive\"\u003eRisk Criteria Used in the Directive\u003c/h2\u003e\n\n\u003cp\u003eThe directive includes four criteria for assessing the seriousness of a vulnerability:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWhether the vulnerability is exposed to the public internet.\u003c/li\u003e\n\u003cli\u003eWhether the vulnerability is listed in CISA’s Known Exploited Vulnerabilities catalog.\u003c/li\u003e\n\u003cli\u003eWhether the exploit can be automated.\u003c/li\u003e\n\u003cli\u003eWhat level of control an adversary would have over a vulnerable system because of malicious activity.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFederal agencies must patch vulnerabilities that meet three of those four criteria within 72 hours.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerabilities-subject-to-the-72-hour-deadline\"\u003eVulnerabilities Subject to the 72-Hour Deadline\u003c/h2\u003e\n\n\u003cp\u003eThe article specifies that the three-day timeline applies to currently exploited vulnerabilities that can be automated and would give malicious actors some control over systems facing the internet.\u003c/p\u003e\n\n\u003cp\u003eWhen agencies determine that hackers can use a vulnerability to take complete control of a system, they must examine systems to assess whether they have been compromised and patch within three days.\u003c/p\u003e\n\n\u003ch2 id=\"two-week-patching-timeline\"\u003eTwo-Week Patching Timeline\u003c/h2\u003e\n\n\u003cp\u003eAgencies will have up to two weeks to patch vulnerabilities that meet the described criteria but are not automatable, provided a threat actor has not taken full control of a system.\u003c/p\u003e\n\n\u003cp\u003eThis creates a distinction between vulnerabilities that can be automated and those that cannot, with automatable exploitation receiving the more urgent 72-hour deadline.\u003c/p\u003e\n\n\u003ch2 id=\"compromise-assessment-before-patching\"\u003eCompromise Assessment Before Patching\u003c/h2\u003e\n\n\u003cp\u003eThe directive requires agencies to check when and how a vulnerable system was compromised before patching. CISA emphasized that applying a patch generally does not evict a threat actor.\u003c/p\u003e\n\n\u003cp\u003eThis means agencies are expected to include forensic triage as part of the remediation process for certain vulnerabilities. Butera acknowledged that this may be a newer step for some federal agencies.\u003c/p\u003e\n\n\u003ch2 id=\"support-for-federal-agencies\"\u003eSupport for Federal Agencies\u003c/h2\u003e\n\n\u003cp\u003eThe article notes uncertainty about how easy it will be for resource-constrained federal agencies, many of which do not have advanced in-house cyber expertise, to triage threats against the four criteria. It is also unclear how feasible the three-day patching window will be for all agencies.\u003c/p\u003e\n\n\u003cp\u003eCISA said it believes agencies should be able to perform the necessary work within three days. Butera said CISA can assist with triage analysis and that agencies have been given a “good runway” to implement the new processes.\u003c/p\u003e\n\n\u003ch2 id=\"expected-impact-on-patching-workloads\"\u003eExpected Impact on Patching Workloads\u003c/h2\u003e\n\n\u003cp\u003eCISA analyzed how often federal agencies encounter vulnerabilities that meet the criteria requiring a 72-hour patch. At one federal agency studied by CISA, only 1% of vulnerabilities required patching within three days.\u003c/p\u003e\n\n\u003cp\u003eIn that same analysis, more than 60% of vulnerabilities were less serious and required patching only at the next system update. Acting CISA Director Nick Andersen said the directive will help agencies focus on the highest-risk areas and defer patching lower-priority vulnerabilities.\u003c/p\u003e\n\n\u003ch2 id=\"statements-from-cisa-officials\"\u003eStatements From CISA Officials\u003c/h2\u003e\n\n\u003cp\u003eButera said the directive prioritizes IT and security operations’ attention on the most at-risk assets. He said this is particularly important because of AI-driven advances that help threat actors find and exploit vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eNick Andersen said the directive provides clear definitions, timelines, and criteria. He said this improves transparency, predictability, and agency resource planning for more effective vulnerability remediation.\u003c/p\u003e\n\n\u003ch2 id=\"broader-government-and-critical-infrastructure-relevance\"\u003eBroader Government and Critical Infrastructure Relevance\u003c/h2\u003e\n\n\u003cp\u003eAlthough the directive applies to federal civilian agencies, CISA is urging state, tribal, and local governments and critical infrastructure owners and operators to adopt similar vulnerability management practices.\u003c/p\u003e\n\n\u003cp\u003eThe article also reports that Sen. Mark Warner introduced legislation directing CISA to collaborate with industry and regulators to modernize cybersecurity defense. Warner said cybersecurity defenses must keep up with evolving threats as AI continues to rapidly evolve.\u003c/p\u003e\n","keyPoints":["CISA issued a new binding operational directive requiring federal civilian agencies to patch certain high-risk cyber vulnerabilities within 72 hours.","The 72-hour deadline applies to vulnerabilities that meet three of four criteria: public internet exposure, inclusion in the Known Exploited Vulnerabilities catalog, automated exploitability, and the level of adversary control over the vulnerable system.","Federal agencies have 180 days to adopt the new patching time frame under the directive.","The directive also requires agencies to check when and how a vulnerable system was compromised before applying a patch, because applying a patch generally does not evict a threat actor.","CISA is strongly urging state, tribal, and local governments, as well as critical infrastructure owners and operators, to adopt similar vulnerability management practices."],"insights":["CISA’s risk model may reduce overall patching burden for agencies because one agency study found only 1% of vulnerabilities would require 72-hour remediation, while more than 60% could wait until the next system update.","The directive treats forensic triage as part of vulnerability management by requiring agencies to assess compromise before patching, reflecting CISA’s warning that patching alone generally does not remove an intruder.","CISA expects some agencies to lack maturity in forensic triage and said it can assist with triage analysis during the 180-day implementation period.","The urgency of the new timelines is explicitly tied to artificial intelligence, which CISA said can help threat actors find and exploit vulnerable internet-facing assets at scale."],"referencedReports":[{"title":"BOD 26-04: Prioritizing Security Updates Based on Risk","url":"https://www.cisa.gov/news-events/directives/bod-26-04-prioritizing-security-updates-based-risk","publisher":"CISA","context":"The article says CISA released this new binding operational directive requiring federal civilian agencies to prioritize and patch certain vulnerabilities within specified timelines.","category":"","primary":false}],"body":"\u003cp\u003eCISA released a new binding operational directive requiring federal civilian agencies to patch certain high-risk cyber vulnerabilities within 72 hours. The directive is part of a prioritization system intended to address the heightened threat environment associated with the rise of artificial intelligence. Agencies have 180 days to adopt the new patching time frame.\u003c/p\u003e\n\n\u003cp\u003eThe directive uses four criteria to assess vulnerability seriousness: public internet exposure, inclusion in CISA’s Known Exploited Vulnerabilities catalog, whether exploitation can be automated, and the level of control an adversary could gain over a vulnerable system. The three-day deadline applies to currently exploited vulnerabilities that can be automated and would give malicious actors some control over internet-facing systems. Agencies must also examine systems for compromise when a vulnerability could allow complete system control.\u003c/p\u003e\n\n\u003cp\u003eCISA said patching alone generally does not evict a threat actor, so the directive requires agencies to check when and how a vulnerable system was compromised before patching. CISA is also urging state, tribal, and local governments, as well as critical infrastructure owners and operators, to adopt similar vulnerability management regimes. CISA officials said the approach is meant to focus limited resources on the most at-risk assets while allowing lower-priority vulnerabilities to be deferred.\u003c/p\u003e\n"},{"n":25,"title":"Oops, I Weaponized the Database: Abusing AI Features in SQL Server 2025","source":"specterops.io","sourceColorIdx":1,"link":"https://specterops.io/blog/2026/06/10/oops-i-weaponized-the-database-abusing-ai-features-in-mssql-2025/","time":"16:00","priority":"SHOULD READ","score":82,"tldr":"SQL Server 2025’s new AI features can be abused as built-in channels for data exfiltration, NTLM coercion, and command-and-control traffic from inside the database engine. Defenders should tightly restrict these features, monitor external model and REST endpoint use, and block unexpected SQL Server egress.","briefOverview":"\u003cp\u003eSpecterOps published research showing how new native AI features in Microsoft SQL Server 2025 can be abused for data exfiltration, NTLM SMB coercion, and command-and-control transport from within the database engine. The article focuses on \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e, \u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e, and \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e. The author frames the issue as the normalization of outbound HTTPS traffic from database servers, which has traditionally been a strong indicator of suspicious activity.\u003c/p\u003e\n\n\u003cp\u003eThe proof-of-concept examples show table data and file contents being sent to an external HTTPS endpoint, including use of triggers for persistent exfiltration when new rows are inserted. The article also demonstrates that UNC paths can be used with ONNX Runtime external models to coerce NTLM authentication over SMB. Microsoft reviewed that coercion behavior and determined it did not meet the bar for security servicing.\u003c/p\u003e\n\n\u003cp\u003eThe research further combines SQL Server AI functions with \u003ccode\u003exp_cmdshell\u003c/code\u003e and later a SQL CLR assembly to create C2 channels that resemble embedding-model traffic. Defensive recommendations include reviewing SQL Server privileges, auditing \u003ccode\u003exp_cmdshell\u003c/code\u003e, SQL Agent jobs, CLR assemblies, and external model changes, alerting on REST endpoint enablement, restricting egress, and baselining legitimate model traffic.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is a technical research post from SpecterOps examining SQL Server 2025’s new AI-related capabilities from an offensive security perspective. The author says SQL Server is often over-privileged and under-monitored during engagements, making it useful for lateral movement and post-exploitation. The research focuses on how new AI features extend that tradecraft inside the database engine itself.\u003c/p\u003e\n\n\u003cp\u003eThe first major feature discussed is \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e, a stored procedure that allows SQL Server to make HTTPS requests to external REST endpoints. The article notes three requirements: the procedure must be enabled, requests must use HTTPS, and the remote server must have a verifiable certificate chain. It also highlights that request and response payloads are limited to 100 MB when UTF-8 encoded over the wire.\u003c/p\u003e\n\n\u003cp\u003eThe article then covers \u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e and \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e, which are designed to define external embedding models and send strings to those models to generate JSON vector arrays. These features are described as supporting retrieval-augmented generation workflows, with SQL Server acting as a storage and retrieval layer. The research then repurposes those same mechanisms for exfiltration and command-and-control demonstrations.\u003c/p\u003e\n\n\u003cp\u003eSeveral proof-of-concepts are shown under the assumption that the operator has compromised a SQL Server account with the \u003ccode\u003esysadmin\u003c/code\u003e role. The article demonstrates dumping database table contents and file contents to an external HTTPS server using \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e. It also shows a trigger that sends newly inserted username and password rows to a remote server whenever changes are made to a target table.\u003c/p\u003e\n\n\u003cp\u003eAnother proof-of-concept uses \u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e with attacker-controlled UNC paths for ONNX Runtime model configuration, causing SQL Server to attempt SMB authentication. The article says Microsoft was notified of this NTLM SMB coercion primitive on April 20, 2026, and determined on May 12, 2026, that it did not represent a security boundary violation. The author states that, as a result, the behavior is expected to remain for now.\u003c/p\u003e\n\n\u003cp\u003eThe final demonstrations create C2 channels using SQL Server’s AI features, first with \u003ccode\u003exp_cmdshell\u003c/code\u003e and then with a .NET CLR assembly loaded as a SQL assembly. The CLR version avoids \u003ccode\u003exp_cmdshell\u003c/code\u003e, uses \u003ccode\u003eCreateProcessW\u003c/code\u003e, and encodes encrypted command traffic to resemble embedding data. The defensive section recommends limiting sysadmin privileges, auditing high-risk SQL features, monitoring external model changes, alerting on REST endpoint enablement, blocking unknown SQL Server egress, and baselining expected AI model traffic.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSpecterOps published a technical research article titled “Oops, I Weaponized the Database: Abusing AI Features in SQL Server 2025.” The article examines new AI-related features in Microsoft SQL Server 2025 and demonstrates how they can be abused for data exfiltration, NTLM SMB coercion, and command-and-control transport from inside the database engine.\u003c/p\u003e\n\n\u003cp\u003eThe author frames SQL Server as a frequent offensive target because it is often over-privileged and under-monitored. The article states that administrators routinely expose credentials in file shares, MSSQL service accounts often have excessive rights, and the database engine already provides post-exploitation primitives once an operator gains access.\u003c/p\u003e\n\n\u003cp\u003eThe research is based on SQL Server 2025 features introduced to support AI and retrieval-augmented generation workflows. The author argues that these features create new offensive opportunities because they normalize outbound HTTPS activity from the database engine.\u003c/p\u003e\n\n\u003ch2 id=\"sql-server-2025-ai-features-discussed\"\u003eSQL Server 2025 AI Features Discussed\u003c/h2\u003e\n\n\u003cp\u003eThe article focuses on three SQL Server 2025 capabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"sp-invoke-external-rest-endpoint\"\u003e\u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e\u003c/h3\u003e\n\n\u003cp\u003eThe stored procedure \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e allows SQL Server on-premises to send requests to arbitrary REST endpoints. The article says this provides a native way to make web requests from SQL Server without relying on noisier mechanisms such as \u003ccode\u003exp_cmdshell\u003c/code\u003e, SQL Agent Jobs, or PowerShell \u003ccode\u003eInvoke-WebRequest\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies three hard requirements for use:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe stored procedure must be enabled for the MSSQL instance.\u003c/li\u003e\n\u003cli\u003eRequests must use HTTPS.\u003c/li\u003e\n\u003cli\u003eThe remote server must have a verifiable certificate chain.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article highlights that payloads, both sent and received, are UTF-8 encoded over the wire and limited to 100 MB. The author treats this size limit as large enough to be useful for offensive data movement.\u003c/p\u003e\n\n\u003ch3 id=\"create-external-model\"\u003e\u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e\u003c/h3\u003e\n\n\u003cp\u003eThe \u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e feature allows an external AI embedding model to be defined inside the database engine. The article shows an example defining a hosted model location, API format, model type, and model name.\u003c/p\u003e\n\n\u003cp\u003eThe author explains that this feature supports AI infrastructure integration by allowing SQL Server to reference an external embedding model. The article later uses this mechanism both for model-backed C2 transport and for an NTLM SMB coercion proof of concept involving UNC paths and ONNX Runtime models.\u003c/p\u003e\n\n\u003ch3 id=\"ai-generate-embeddings\"\u003e\u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e\u003c/h3\u003e\n\n\u003cp\u003eThe \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e function is used with a previously defined external model. It sends a string or character type to the defined embedding model and returns a JSON vector array.\u003c/p\u003e\n\n\u003cp\u003eThe article states that these capabilities support retrieval-augmented generation pipelines, where SQL Server can act as the storage and retrieval layer for AI workflows. The same functionality is then repurposed in the proof-of-concepts for external communications and C2-like behavior.\u003c/p\u003e\n\n\u003ch2 id=\"proof-of-concept-assumption\"\u003eProof-of-Concept Assumption\u003c/h2\u003e\n\n\u003cp\u003eThe offensive demonstrations assume compromise of an account with the \u003ccode\u003esysadmin\u003c/code\u003e role in a SQL Server 2025 instance. The author notes that while explicit permissions can also be granted for these features, the most likely offensive engagement scenario described in the article is landing on a highly privileged SQL account.\u003c/p\u003e\n\n\u003ch2 id=\"data-exfiltration-demonstrations\"\u003eData Exfiltration Demonstrations\u003c/h2\u003e\n\n\u003ch3 id=\"dumping-database-contents\"\u003eDumping Database Contents\u003c/h3\u003e\n\n\u003cp\u003eThe first data exfiltration proof-of-concept uses \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e to send database table contents to an external HTTPS endpoint. The article shows enabling the feature with \u003ccode\u003esp_configure\u003c/code\u003e, querying \u003ccode\u003edbo.app_users\u003c/code\u003e, formatting the results as JSON, and posting them to a remote \u003ccode\u003e/collect\u003c/code\u003e endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe author emphasizes that the 100 MB payload limit allows large amounts of database content to be moved in chunks. The article contrasts this with previous concerns that dumping large tables could tie up C2 communications or slow operations.\u003c/p\u003e\n\n\u003ch3 id=\"dumping-file-contents\"\u003eDumping File Contents\u003c/h3\u003e\n\n\u003cp\u003eThe second exfiltration example combines \u003ccode\u003eOPENROWSET\u003c/code\u003e with \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e to read a file and send its contents to a remote HTTPS server. The example reads the Windows hosts file from \u003ccode\u003eC:\\Windows\\System32\\drivers\\etc\\hosts\u003c/code\u003e and posts it as plain text.\u003c/p\u003e\n\n\u003cp\u003eThe article states that this can move readable files through a separate HTTPS connection originating from MSSQL rather than from a C2 agent. The author presents this as relevant to concerns about triggering security tooling.\u003c/p\u003e\n\n\u003ch3 id=\"persistent-exfiltration-with-triggers\"\u003ePersistent Exfiltration with Triggers\u003c/h3\u003e\n\n\u003cp\u003eThe third data exfiltration example uses a SQL trigger for persistence. The article creates an \u003ccode\u003eAFTER INSERT\u003c/code\u003e trigger on \u003ccode\u003edbo.app_users\u003c/code\u003e that sends newly inserted usernames and passwords to an external HTTPS endpoint.\u003c/p\u003e\n\n\u003cp\u003eThe author describes this as useful when an operator wants to continue aggregating new credentials without sending the entire table each time. The trigger posts the inserted rows as JSON whenever a change occurs.\u003c/p\u003e\n\n\u003ch2 id=\"ntlm-smb-coercion-demonstration\"\u003eNTLM SMB Coercion Demonstration\u003c/h2\u003e\n\n\u003cp\u003eThe article states that \u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e can support locally hosted ONNX models, and that UNC paths can be specified in place of local filesystem paths. The proof-of-concept uses attacker-controlled UNC paths in \u003ccode\u003eLOCATION\u003c/code\u003e or \u003ccode\u003eLOCAL_RUNTIME_PATH\u003c/code\u003e for an ONNX Runtime external model.\u003c/p\u003e\n\n\u003cp\u003eWhen \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e is called against the model, SQL Server attempts to initialize the AI runtime and generates an error. Despite the error, the article says the SMB capture tool records successful NTLM SMB authentication coercion.\u003c/p\u003e\n\n\u003cp\u003eThe author states that this coercion primitive was reported to Microsoft on April 20, 2026. Microsoft determined on May 12, 2026, that the behavior did not represent a security boundary violation because of the nature of file path resolution and therefore did not meet the bar for security servicing.\u003c/p\u003e\n\n\u003ch2 id=\"c2-transport-and-agent-demonstrations\"\u003eC2 Transport and Agent Demonstrations\u003c/h2\u003e\n\n\u003ch3 id=\"simple-c2-with-xp-cmdshell\"\u003eSimple C2 with \u003ccode\u003exp_cmdshell\u003c/code\u003e\u003c/h3\u003e\n\n\u003cp\u003eThe article demonstrates a simple C2 mechanism that uses SQL Server AI features for transport and \u003ccode\u003exp_cmdshell\u003c/code\u003e for command execution. The proof-of-concept enables \u003ccode\u003exp_cmdshell\u003c/code\u003e and external REST endpoints, registers the C2 server as an external model, and uses \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e in a loop to check in and retrieve queued commands.\u003c/p\u003e\n\n\u003cp\u003eThe SQL loop parses returned instructions, supports an \u003ccode\u003eexit\u003c/code\u003e command, supports changing the sleep timer with \u003ccode\u003esleep\u003c/code\u003e, and otherwise executes commands through \u003ccode\u003exp_cmdshell\u003c/code\u003e. Command output is aggregated and sent back through \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e before the loop sleeps.\u003c/p\u003e\n\n\u003cp\u003eThe article states that an 81-line T-SQL query is enough to demonstrate using these features as a C2 channel and agent.\u003c/p\u003e\n\n\u003ch3 id=\"clr-based-c2-agent\"\u003eCLR-Based C2 Agent\u003c/h3\u003e\n\n\u003cp\u003eThe article then presents a more advanced version using a .NET CLR executable loaded as a SQL assembly. The author says this improves on the first proof-of-concept by avoiding \u003ccode\u003exp_cmdshell\u003c/code\u003e and making the C2 transport less like raw command-and-response traffic.\u003c/p\u003e\n\n\u003cp\u003eThe CLR assembly exposes a check-in entry point as a \u003ccode\u003eSqlProcedure\u003c/code\u003e, uses a context connection to reuse the existing in-process SQL session, and calls \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e from within a local SQL query. The agent builds beacon messages containing values such as agent ID, host, user, last acknowledgement, and sequence number.\u003c/p\u003e\n\n\u003cp\u003eThe article describes encrypting and encoding messages, transforming responses into vector-like data, and decoding received vector arrays according to an emulated embedding-style codec. For command execution, the CLR code uses P/Invoke to call \u003ccode\u003eCreateProcessW\u003c/code\u003e with \u003ccode\u003ecmd.exe /c\u003c/code\u003e, replacing \u003ccode\u003exp_cmdshell\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe output is then encrypted, encoded, and sent back via the embeddings function. The article says the assembly can be loaded from hex bytes to avoid dropping files to disk.\u003c/p\u003e\n\n\u003ch2 id=\"deployment-steps-for-the-clr-agent\"\u003eDeployment Steps for the CLR Agent\u003c/h2\u003e\n\n\u003cp\u003eThe MSSQL deployment section configures prerequisites including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eclr enabled\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eclr strict security\u003c/code\u003e set to \u003ccode\u003e0\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eTRUSTWORTHY ON\u003c/code\u003e for the database\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt then registers a C2 server as an external model named \u003ccode\u003eqwen3_svc\u003c/code\u003e, loads the SQL CLR assembly with \u003ccode\u003ePERMISSION_SET = UNSAFE\u003c/code\u003e, and exposes the CLR entry point through a stored procedure. The implant is started by executing \u003ccode\u003edbo.clr_checkin\u003c/code\u003e with the model name and interval.\u003c/p\u003e\n\n\u003cp\u003eThe article also shows a Python C2 server and a terminal user interface used to interact with the channel.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-considerations\"\u003eDefensive Considerations\u003c/h2\u003e\n\n\u003cp\u003eThe article provides several defensive recommendations for SQL Server 2025 environments.\u003c/p\u003e\n\n\u003ch3 id=\"review-sql-server-accounts\"\u003eReview SQL Server Accounts\u003c/h3\u003e\n\n\u003cp\u003eThe author recommends reviewing SQL Server logins and removing \u003ccode\u003esysadmin\u003c/code\u003e permissions where possible. The article specifically notes that web applications are often found using database connection strings with accounts that have \u003ccode\u003esysadmin\u003c/code\u003e roles, even when the application only needs standard query and write capabilities.\u003c/p\u003e\n\n\u003ch3 id=\"audit-high-risk-sql-features\"\u003eAudit High-Risk SQL Features\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends auditing and alerting on:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003exp_cmdshell\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eSQL Agent Jobs\u003c/li\u003e\n\u003cli\u003eCLR assemblies\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt provides example Splunk queries for detecting use of \u003ccode\u003exp_cmdshell\u003c/code\u003e, SQL Agent job procedures, and assembly creation or modification. The article notes that SQL Audit or Extended Events with SQL text exposed are required, because native SQL Server logs do not reliably record each use of these features.\u003c/p\u003e\n\n\u003ch3 id=\"monitor-external-models\"\u003eMonitor External Models\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends alerting on changes to \u003ccode\u003esys.external_models\u003c/code\u003e, including \u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e, \u003ccode\u003eALTER EXTERNAL MODEL\u003c/code\u003e, and \u003ccode\u003eDROP EXTERNAL MODEL\u003c/code\u003e. It provides a Splunk query that extracts the action and model name from SQL text.\u003c/p\u003e\n\n\u003cp\u003eThe author states that native SQL Server logs do not normally record these statements in a searchable form, so custom logging through SQL Audit or Extended Events is required.\u003c/p\u003e\n\n\u003ch3 id=\"alert-on-rest-endpoint-enablement\"\u003eAlert on REST Endpoint Enablement\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends alerting on enablement of \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e by monitoring for \u003ccode\u003eexternal rest endpoint enabled\u003c/code\u003e. It notes that this is covered by the native SQL Server ERRORLOG.\u003c/p\u003e\n\n\u003ch3 id=\"restrict-egress\"\u003eRestrict Egress\u003c/h3\u003e\n\n\u003cp\u003eThe article recommends blocking egress traffic from SQL Server to unknown domains. It states that if AI features are used, organizations should host models inside their network IP space and then block all internet-bound traffic altogether.\u003c/p\u003e\n\n\u003ch3 id=\"baseline-model-traffic\"\u003eBaseline Model Traffic\u003c/h3\u003e\n\n\u003cp\u003eThe article emphasizes the need to understand and baseline legitimate model traffic. It compares legitimate embedding traffic with the demonstrated CLR C2 agent traffic and argues that an untrained analyst may not easily spot the difference.\u003c/p\u003e\n\n\u003ch2 id=\"significance-described-by-the-article\"\u003eSignificance Described by the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article’s closing argument is that SQL Server 2025’s AI features normalize outbound HTTPS traffic from the database engine. The author describes this as challenging because defenders have historically treated egress web traffic from a database engine as an easy indicator of malicious activity.\u003c/p\u003e\n\n\u003cp\u003eThe article also emphasizes that much of the demonstrated abuse uses features as intended. The author argues that defenders do not typically alert on intended use, making monitoring and baselining especially important.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that AI-enabled software will continue creating opportunities for offensive C2 traffic shaping. It compares the potential for AI-model traffic emulation to the introduction of Malleable C2 profiles.\u003c/p\u003e\n","keyPoints":["SQL Server 2025 introduces native AI-related features including sp_invoke_external_rest_endpoint, CREATE EXTERNAL MODEL, and AI_GENERATE_EMBEDDINGS.","The article demonstrates that sp_invoke_external_rest_endpoint can send database table contents or file contents to an external HTTPS endpoint with payloads up to 100 MB.","The article shows that a SQL trigger can use sp_invoke_external_rest_endpoint to exfiltrate newly inserted table rows whenever a change occurs.","The article describes how CREATE EXTERNAL MODEL with UNC paths for ONNX Runtime models can coerce NTLM authentication over SMB.","The article demonstrates combining AI_GENERATE_EMBEDDINGS, external models, xp_cmdshell, and SQL CLR assemblies to create command-and-control channels from within SQL Server."],"insights":["The 100 MB payload limit for sp_invoke_external_rest_endpoint makes SQL Server 2025 practical for moving large database or file contents in chunks rather than only for small API calls.","The abuse scenarios rely heavily on features behaving as intended, which makes simple detection based on feature failure or exploit indicators less useful.","Microsoft determined the reported UNC-path NTLM coercion behavior in CREATE EXTERNAL MODEL did not meet the bar for security servicing, so the article treats it as behavior defenders must monitor or control rather than expect to be patched.","The article emphasizes that once AI features are adopted, outbound HTTPS traffic from a database server may no longer be automatically suspicious, forcing defenders to baseline model traffic and inspect query activity more closely.","Loading a SQL CLR assembly from hex bytes allows the demonstrated agent to avoid dropping its assembly file to disk while still exposing command execution through a stored procedure."],"referencedReports":[],"body":"\u003cp\u003eSpecterOps published research showing how new native AI features in Microsoft SQL Server 2025 can be abused for data exfiltration, NTLM SMB coercion, and command-and-control transport from within the database engine. The article focuses on \u003ccode\u003esp_invoke_external_rest_endpoint\u003c/code\u003e, \u003ccode\u003eCREATE EXTERNAL MODEL\u003c/code\u003e, and \u003ccode\u003eAI_GENERATE_EMBEDDINGS\u003c/code\u003e. The author frames the issue as the normalization of outbound HTTPS traffic from database servers, which has traditionally been a strong indicator of suspicious activity.\u003c/p\u003e\n\n\u003cp\u003eThe proof-of-concept examples show table data and file contents being sent to an external HTTPS endpoint, including use of triggers for persistent exfiltration when new rows are inserted. The article also demonstrates that UNC paths can be used with ONNX Runtime external models to coerce NTLM authentication over SMB. Microsoft reviewed that coercion behavior and determined it did not meet the bar for security servicing.\u003c/p\u003e\n\n\u003cp\u003eThe research further combines SQL Server AI functions with \u003ccode\u003exp_cmdshell\u003c/code\u003e and later a SQL CLR assembly to create C2 channels that resemble embedding-model traffic. Defensive recommendations include reviewing SQL Server privileges, auditing \u003ccode\u003exp_cmdshell\u003c/code\u003e, SQL Agent jobs, CLR assemblies, and external model changes, alerting on REST endpoint enablement, restricting egress, and baselining legitimate model traffic.\u003c/p\u003e\n"},{"n":6,"title":"Microsoft: Some Windows PCs fail to install latest monthly updates","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-some-upgraded-windows-pcs-fail-to-install-monthly-updates/","time":"11:33","priority":"SHOULD READ","score":78,"tldr":"Microsoft says some Windows devices upgraded to Windows 11 24H2 or 25H2 may fail to install the June 2026 cumulative updates with errors 0x80073712 or 0x800f0993. A restart should resolve the issue for many unmanaged and Home devices, while already affected systems may need to remove a specific update package or perform an in-place upgrade.","briefOverview":"\u003cp\u003eMicrosoft warned that a small percentage of Windows devices upgraded to Windows 11 version 24H2 or 25H2 may fail to install the latest monthly cumulative updates. Affected systems can show errors 0x80073712 or 0x800f0993 when users try to install the June 2026 cumulative updates. The issue affects some devices that originated from Windows 10 versions 22H2 and 21H2 or Windows 11 version 23H2 before being upgraded.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said a fix for unmanaged enterprise devices and Windows Home PCs will apply after a system restart, and that no new devices in those categories should be affected after May 19, 2026, at 6:30 p.m. PT. For other affected devices, Microsoft released June 2026 Patch Tuesday updates intended to install automatically during Windows 11 upgrades to prevent the issue. Systems already upgraded to Windows 11 24H2 or 25H2 may need a DISM command to remove the affected package, or an in-place Windows 11 upgrade if that does not work.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft warned customers that some Windows devices upgraded to Windows 11 version 24H2 or 25H2 may have problems installing the latest monthly updates. The issue affects a small percentage of devices originally running Windows 10 versions 22H2 and 21H2, or Windows 11 version 23H2, that were then upgraded to Windows 11 24H2 or 25H2. Users may see Windows updates fail in Settings under Windows Update history.\u003c/p\u003e\n\n\u003cp\u003eThe installation failures occur when attempting to install the June 2026 cumulative updates. Microsoft said affected systems can show error 0x80073712 or 0x800f0993. In Windows Update log files, the errors may appear as 0x800f0993, PSFX_E_REBASE_HYDRATION_CANDIDATES_MISSING, or 0x80073712, ERROR_SXS_COMPONENT_STORE_CORRUPT.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said a fix will roll out to all unmanaged enterprise devices and personal Windows Home PCs after a system restart. The company said no new devices in those categories should be affected starting May 19, 2026, at 6:30 p.m. PT. Microsoft also said restarting the device might allow the resolution to apply sooner and that no other action is required beyond a restart for those devices.\u003c/p\u003e\n\n\u003cp\u003eFor other affected devices, Microsoft released several June 2026 Patch Tuesday updates that should install automatically during upgrades to Windows 11 to prevent the issue from occurring. The listed resolved updates include KB5094127, KB5093998, and KB5094126, depending on the originating and target Windows versions. Microsoft also said the issue will not be addressed on systems that have already been upgraded to Windows 11 24H2 or 25H2.\u003c/p\u003e\n\n\u003cp\u003eFor devices already upgraded and affected, Microsoft advised users to remove the affected package by running a DISM command in an elevated Command Prompt. If that mitigation does not fix the update issue, Microsoft advised performing a Windows 11 in-place upgrade. The article also notes that Microsoft has fixed multiple Windows update installation issues in recent months, including issues involving 0x80073712, restricted network environments, and 0x800f0922 errors.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft warned that some Windows devices may fail to install the latest monthly cumulative updates after being upgraded to Windows 11 version 24H2 or 25H2. The company said the issue affects a small percentage of devices that were originally running Windows 10 versions 22H2 or 21H2, or Windows 11 version 23H2, before being upgraded.\u003c/p\u003e\n\n\u003cp\u003eOn affected systems, users may see Windows Update failures with error 0x80073712 or 0x800f0993 when attempting to install the June 2026 cumulative updates. Microsoft described the problem in a service alert that was first spotted by Microsoft MVP Susan Bradley.\u003c/p\u003e\n\n\u003ch2 id=\"affected-systems\"\u003eAffected systems\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said the issue can affect devices that followed these upgrade paths:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows 10 version 21H2 upgraded to Windows 11 version 24H2 or 25H2.\u003c/li\u003e\n\u003cli\u003eWindows 10 version 22H2 upgraded to Windows 11 version 24H2 or 25H2.\u003c/li\u003e\n\u003cli\u003eWindows 11 version 23H2 upgraded to Windows 11 version 24H2 or 25H2.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft characterized the affected population as a small percentage of devices. The article does not describe the issue as affecting all Windows 11 24H2 or 25H2 systems.\u003c/p\u003e\n\n\u003ch2 id=\"error-details-and-technical-indicators\"\u003eError details and technical indicators\u003c/h2\u003e\n\n\u003cp\u003eAffected users may see the failures in Settings under Windows Update
