 and Update history. Microsoft said Windows updates may fail with the following errors:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e0x80073712\u003c/li\u003e\n\u003cli\u003e0x800f0993\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eWhen reviewing Windows Update log files on affected devices, users may see more specific error information:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e0x800f0993: PSFX_E_REBASE_HYDRATION_CANDIDATES_MISSING\u003c/li\u003e\n\u003cli\u003e0x80073712: ERROR_SXS_COMPONENT_STORE_CORRUPT\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese errors occur when affected systems attempt to install the latest updates, including the June 2026 cumulative updates.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-automatic-resolution-for-some-devices\"\u003eMicrosoft’s automatic resolution for some devices\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said a fix for this known issue will roll out to all unmanaged enterprise devices and personal Windows Home PCs following a system restart. The company said no new devices in those categories should be affected starting May 19, 2026, at 6:30 p.m. PT.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft added that restarting the device may allow the resolution to apply sooner. For those devices, Microsoft said no other action is required beyond a device restart.\u003c/p\u003e\n\n\u003ch2 id=\"preventive-updates-released-in-june-2026-patch-tuesday\"\u003ePreventive updates released in June 2026 Patch Tuesday\u003c/h2\u003e\n\n\u003cp\u003eFor other affected devices, Microsoft released Windows updates as part of June 2026 Patch Tuesday. The article states that these updates should install automatically during upgrades to Windows 11 to prevent the issue from occurring.\u003c/p\u003e\n\n\u003cp\u003eThe listed originating and resolved update pairs are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows 10 version 21H2: originating KB5082200, resolved by KB5094127.\u003c/li\u003e\n\u003cli\u003eWindows 10 version 22H2: originating KB5082200, resolved by KB5094127.\u003c/li\u003e\n\u003cli\u003eWindows 11 version 23H2: originating KB5082052, resolved by KB5093998.\u003c/li\u003e\n\u003cli\u003eWindows 11 version 25H2: originating KB5079391, resolved by KB5094126.\u003c/li\u003e\n\u003cli\u003eWindows 11 version 24H2: originating KB5079391, resolved by KB5094126.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft further explained that this issue will not be addressed on affected systems that have already been upgraded to Windows 11 version 24H2 or 25H2.\u003c/p\u003e\n\n\u003ch2 id=\"mitigation-for-already-upgraded-affected-systems\"\u003eMitigation for already-upgraded affected systems\u003c/h2\u003e\n\n\u003cp\u003eFor devices already upgraded to Windows 11 24H2 or 25H2 and affected by the issue, Microsoft advised removing the affected package to unblock update installation. The article provides the following command to run in an elevated Command Prompt:\u003c/p\u003e\n\n\u003cpre\u003e\u003ccode class=\"language-text\"\u003edism /online /remove-package /packagename:Package_for_RollupFix~31bf3856ad364e35~amd64~~26100.1742.1.10\n\u003c/code\u003e\u003c/pre\u003e\n\n\u003cp\u003eIf that mitigation does not fix the update issue, Microsoft advised users to perform a Windows 11 in-place upgrade.\u003c/p\u003e\n\n\u003ch2 id=\"recent-related-windows-update-issues\"\u003eRecent related Windows update issues\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that Microsoft has fixed multiple Windows update installation problems over the past several months. In April, Microsoft released an out-of-band update to fix the March 2026 non-security preview update, KB5079391, after a known issue triggered 0x80073712 errors on Windows 11 during deployment.\u003c/p\u003e\n\n\u003cp\u003eOne month later, Microsoft warned that customers might encounter Windows Update failures after installing the January 2026 optional non-security preview updates in restricted network environments. More recently, Microsoft resolved a known issue causing failures and 0x800f0922 errors when installing the May 2026 Windows 11 security update, KB5089549.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and response\u003c/h2\u003e\n\n\u003cp\u003eThe disclosed impact is that affected Windows devices cannot install monthly Windows updates. Microsoft’s response includes an automatic fix for unmanaged enterprise devices and Windows Home PCs after restart, preventive June 2026 Patch Tuesday updates for upgrade scenarios, and a manual DISM-based mitigation for systems already upgraded and affected.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify any threat actor, malware, exploitation activity, or security breach connected to this issue. It presents the matter as a Microsoft Windows update installation problem affecting certain upgrade paths.\u003c/p\u003e\n","keyPoints":["Microsoft warned that some Windows devices upgraded to Windows 11 version 24H2 or 25H2 may fail to install the latest monthly cumulative updates.","Affected systems can show Windows Update errors 0x80073712 or 0x800f0993 when attempting to install the June 2026 cumulative updates.","Microsoft said a fix will roll out to all unmanaged enterprise devices and Windows Home PCs after a system restart, with no new devices in those categories expected to be affected after May 19, 2026, 6:30 p.m. PT.","Microsoft released June 2026 Patch Tuesday updates intended to install automatically during upgrades to Windows 11 to prevent the issue from occurring on other affected devices.","For systems already upgraded to Windows 11 version 24H2 or 25H2, Microsoft advised removing the affected package with a DISM command, and performing a Windows 11 in-place upgrade if that mitigation does not work."],"insights":["The issue is tied to devices that were upgraded from specific Windows 10 and Windows 11 versions, rather than all systems already running Windows 11 24H2 or 25H2.","A simple restart may accelerate Microsoft’s automatic resolution for unmanaged enterprise and Windows Home devices, so administrators and users should try rebooting before taking more invasive steps.","Microsoft’s preventive fixes are designed to install during Windows 11 upgrades, but they do not repair systems that have already been upgraded and are already affected.","The Windows Update history may show 0x80073712 or 0x800f0993, while the Windows Update logs can reveal the more specific PSFX_E_REBASE_HYDRATION_CANDIDATES_MISSING or ERROR_SXS_COMPONENT_STORE_CORRUPT errors.","Microsoft’s recommended DISM removal command targets a specific RollupFix package, making it a precise mitigation before resorting to a Windows 11 in-place upgrade."],"referencedReports":[{"title":"Windows release health service alert WI1317180","url":"https://admin.cloud.microsoft/Adminportal/Home?source=applauncher#/windowsreleasehealth/:/issue/WI1317180","publisher":"Microsoft","context":"The article cites a Microsoft service alert as the source of the warning that some upgraded Windows devices may fail to install the latest cumulative update.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft warned that a small percentage of Windows devices upgraded to Windows 11 version 24H2 or 25H2 may fail to install the latest monthly cumulative updates. Affected systems can show errors 0x80073712 or 0x800f0993 when users try to install the June 2026 cumulative updates. The issue affects some devices that originated from Windows 10 versions 22H2 and 21H2 or Windows 11 version 23H2 before being upgraded.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said a fix for unmanaged enterprise devices and Windows Home PCs will apply after a system restart, and that no new devices in those categories should be affected after May 19, 2026, at 6:30 p.m. PT. For other affected devices, Microsoft released June 2026 Patch Tuesday updates intended to install automatically during Windows 11 upgrades to prevent the issue. Systems already upgraded to Windows 11 24H2 or 25H2 may need a DISM command to remove the affected package, or an in-place Windows 11 upgrade if that does not work.\u003c/p\u003e\n"},{"n":13,"title":"Cyberattack shuts down major Australian sugar mills, disrupting harvest","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/cyberattack-shuts-down-major-australian-sugar-producer","time":"15:18","priority":"SHOULD READ","score":78,"tldr":"A cyberattack forced Mackay Sugar to shut down two major mills in Queensland, halting cane harvesting in one of Australia’s largest sugar-growing regions. The company is investigating with cybersecurity experts and authorities but has not disclosed the type of attack or whether data was compromised.","briefOverview":"\u003cp\u003eA cyberattack disrupted sugar production in Queensland’s Mackay region, one of Australia’s largest cane-growing areas. Mackay Sugar said the incident affected parts of its operations and forced the shutdown of its Farleigh and Racecourse mills. As a result, growers were instructed to stop harvesting sugarcane until further notice.\u003c/p\u003e\n\n\u003cp\u003eMackay Sugar said it engaged cybersecurity experts and local authorities to investigate the incident and restore systems safely. The company implemented temporary measures to keep essential operations running and reduce disruption. It did not disclose the nature of the cyberattack, whether data was compromised, or whether ransomware or another form of malicious activity was involved.\u003c/p\u003e\n\n\u003cp\u003eThe disruption affected milling and cane haulage at two facilities that had only recently begun the annual crushing season. Growers in the Marian district were not affected because Mackay Sugar’s third mill was not scheduled to begin operations until the following week. Mackay Sugar operates three mills, generates more than $420 million in annual revenue, and supplies raw sugar to domestic and export markets.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA cyberattack disrupted Mackay Sugar, Australia’s second-largest sugar producer, and forced two major mills in Queensland’s Mackay region to shut down. The affected facilities were the Farleigh and Racecourse mills, where sugar milling and cane haulage operations were suspended. The incident brought harvesting operations to a halt in one of Australia’s largest cane-growing regions.\u003c/p\u003e\n\n\u003cp\u003eMackay Sugar said it was responding to a cybersecurity incident affecting parts of its operations. The company engaged cybersecurity experts and local authorities to investigate the attack and restore its systems safely. It also said it had implemented temporary measures to keep essential operations running and minimize disruption.\u003c/p\u003e\n\n\u003cp\u003eCanegrowers Mackay, which represents local sugarcane farmers, said Mackay Sugar instructed growers early Wednesday morning to cease harvesting immediately. The organization said harvesting should not resume until further communication comes directly from the company. Both affected mills had only recently begun the annual sugarcane crushing season.\u003c/p\u003e\n\n\u003cp\u003eThe company did not disclose the nature of the cyberattack. It also did not say whether any data had been compromised or whether ransomware or another form of malicious activity was involved. No threat actor was identified in the article.\u003c/p\u003e\n\n\u003cp\u003eGrowers in the Marian district were unaffected because Mackay Sugar’s third mill was not scheduled to begin operations until the following week. Mackay Sugar operates three mills and generates annual revenue of more than $420 million. The company supplies raw sugar to domestic customers and export markets including South Korea, Indonesia, Japan and Malaysia.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eA cyberattack disrupted sugar production in Queensland’s Mackay region, one of Australia’s largest cane-growing regions. Mackay Sugar, Australia’s second-largest sugar producer, said it was responding to a cybersecurity incident affecting parts of its operations. The incident forced the shutdown of the company’s Farleigh and Racecourse mills and halted harvesting operations.\u003c/p\u003e\n\n\u003ch2 id=\"affected-operations\"\u003eAffected Operations\u003c/h2\u003e\n\n\u003cp\u003eThe shutdown affected two Mackay Sugar facilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFarleigh mill\u003c/li\u003e\n\u003cli\u003eRacecourse mill\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCanegrowers Mackay said sugar milling and cane haulage operations at both mills had been suspended. Both facilities had only recently begun the annual sugarcane crushing season when the disruption occurred.\u003c/p\u003e\n\n\u003ch2 id=\"impact-on-growers\"\u003eImpact on Growers\u003c/h2\u003e\n\n\u003cp\u003eCanegrowers Mackay, which represents local sugarcane farmers, said Mackay Sugar instructed growers to stop harvesting early Wednesday morning. The organization said Mackay Sugar asked for all harvesting to cease immediately and not resume until further communication comes directly from the company.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the shutdown brought harvesting operations to a halt in the affected area. Growers in the Marian district were not affected because Mackay Sugar’s third mill was not scheduled to begin operations until the following week.\u003c/p\u003e\n\n\u003ch2 id=\"company-response\"\u003eCompany Response\u003c/h2\u003e\n\n\u003cp\u003eMackay Sugar said it engaged cybersecurity experts and local authorities to investigate the incident. The company said it was working to restore affected systems safely. It also said it had implemented temporary measures to keep essential operations running and minimize disruption.\u003c/p\u003e\n\n\u003cp\u003eMackay Sugar said it was communicating with employees, growers, and business partners. The company said it would provide further updates as more information becomes available.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-disclosed\"\u003eTechnical Details Disclosed\u003c/h2\u003e\n\n\u003cp\u003eThe article provides limited technical detail about the incident. Mackay Sugar did not disclose:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe nature of the cyberattack\u003c/li\u003e\n\u003cli\u003eWhether any data had been compromised\u003c/li\u003e\n\u003cli\u003eWhether ransomware was involved\u003c/li\u003e\n\u003cli\u003eWhether another form of malicious activity was involved\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eNo threat actor, malware family, vulnerability, or attack technique was identified in the article.\u003c/p\u003e\n\n\u003ch2 id=\"business-context\"\u003eBusiness Context\u003c/h2\u003e\n\n\u003cp\u003eMackay Sugar operates three mills and generates annual revenue of more than $420 million. The company supplies raw sugar to domestic customers and export markets. The export markets named in the article include South Korea, Indonesia, Japan, and Malaysia.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe incident is significant because it affected both digital systems and physical agricultural operations. The cyberattack led to mill shutdowns, suspended cane haulage, and stopped harvesting by growers. The disruption occurred at the start of the annual crushing season for the affected mills, increasing the immediate operational impact described in the article.\u003c/p\u003e\n","keyPoints":["A cyberattack disrupted Mackay Sugar’s operations and forced the shutdown of its Farleigh and Racecourse mills in Queensland’s Mackay region.","Canegrowers Mackay said Mackay Sugar instructed growers to stop harvesting sugarcane immediately until further communication from the company.","Mackay Sugar said it engaged cybersecurity experts and local authorities to investigate the incident and safely restore affected systems.","The company said it implemented temporary measures to keep essential operations running and minimize disruption while restoration work continues.","Mackay Sugar did not disclose the nature of the cyberattack, whether any data was compromised, or whether ransomware or another form of malicious activity was involved."],"insights":["The disruption extended beyond Mackay Sugar’s internal systems to physical agricultural operations, with growers told to stop harvesting until the company provides further communication.","The incident occurred just after the Farleigh and Racecourse mills had begun the annual sugarcane crushing season, increasing its immediate operational impact.","The Marian district avoided immediate disruption because Mackay Sugar’s third mill was not scheduled to start operations until the following week.","Mackay Sugar’s response emphasized safe restoration of affected systems, indicating the company was prioritizing controlled recovery over quickly resuming milling operations."],"referencedReports":[],"body":"\u003cp\u003eA cyberattack disrupted sugar production in Queensland’s Mackay region, one of Australia’s largest cane-growing areas. Mackay Sugar said the incident affected parts of its operations and forced the shutdown of its Farleigh and Racecourse mills. As a result, growers were instructed to stop harvesting sugarcane until further notice.\u003c/p\u003e\n\n\u003cp\u003eMackay Sugar said it engaged cybersecurity experts and local authorities to investigate the incident and restore systems safely. The company implemented temporary measures to keep essential operations running and reduce disruption. It did not disclose the nature of the cyberattack, whether data was compromised, or whether ransomware or another form of malicious activity was involved.\u003c/p\u003e\n\n\u003cp\u003eThe disruption affected milling and cane haulage at two facilities that had only recently begun the annual crushing season. Growers in the Marian district were not affected because Mackay Sugar’s third mill was not scheduled to begin operations until the following week. Mackay Sugar operates three mills, generates more than $420 million in annual revenue, and supplies raw sugar to domestic and export markets.\u003c/p\u003e\n"},{"n":26,"title":"FIFA World Cup 2026 Scams Are Already Active: Fake Domains, Phishing Sites, and How to Stay Safe","source":"cyble.com","sourceColorIdx":0,"link":"https://cyble.com/blog/fifa-world-cup-2026-scams/","time":"12:10","priority":"SHOULD READ","score":78,"tldr":"Cybercriminals are already impersonating FIFA World Cup 2026 websites with fake ticket, hospitality, streaming, and job portals to steal personal and payment information. Fans and job seekers should only use www.fifa.com or official broadcasters, avoid sponsored or unsolicited links, and report suspected scams to IC3.","briefOverview":"\u003cp\u003eThe FBI has issued a Public Service Announcement warning that threat actors are creating fraudulent FIFA-affiliated websites ahead of the FIFA World Cup 2026. These sites are designed to steal personal information, conduct financial fraud, and sell fake products and services. Cyble researchers analyzed domains flagged by the FBI and confirmed that many remained active at the time of publication.\u003c/p\u003e\n\n\u003cp\u003eThe scams target several groups, including ticket buyers, hospitality customers, streaming viewers, job seekers, and corporate brands. The article says criminals are using typosquatting, fake branding, and professional-looking site layouts to make fraudulent pages appear legitimate. The World Cup’s scale, with 48 teams and 16 host cities across the United States, Canada, and Mexico, is presented as a major reason the threat is arriving early and aggressively.\u003c/p\u003e\n\n\u003cp\u003eCyble highlighted examples including ww-fifa[.]com, a fake hospitality and ticket site, fifa[.]help, which was flagged by 15 of 92 VirusTotal security vendors, and fifaworldcup-careers[.]com, a fake recruitment portal. The article advises users to type www.fifa.com directly, avoid sponsored search results and unsolicited streaming links, verify URLs carefully, and report suspected scams to the FBI’s IC3 at ic3.gov.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reports that FIFA World Cup 2026-related scams are already active before the tournament begins on June 11. The FBI issued a Public Service Announcement warning that threat actors are creating fraudulent versions of FIFA-affiliated websites to steal personal information, conduct financial fraud, and sell fake products and services. Cyble researchers independently analyzed domains flagged by the FBI and found that many were still operational at the time of publication.\u003c/p\u003e\n\n\u003cp\u003eThe primary technique described is typosquatting, where attackers register domains with subtle spelling changes, altered extensions, or misleading variants of official FIFA URLs. The FBI-listed domains include examples tied to tickets, careers, online FIFA branding, and World Cup 2026 themes. The article emphasizes that even when malicious domains are taken down, new ones often appear quickly, making the infrastructure a continuing threat rather than a one-time campaign.\u003c/p\u003e\n\n\u003cp\u003eCyble examined ww-fifa[.]com as an example of a fake FIFA World Cup 2026 hospitality domain. The site used tournament branding, navigation menus, ticket information, and hospitality package offers to encourage visitors to purchase fraudulent packages. Cyble noted warning signs such as duplicate page titles, missing or broken images, attacker-controlled navigation links, and prompts requesting personal and financial information without legitimate payment processing.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes security vendor detections for FIFA-themed domains. Cyble found that fifa[.]help was marked malicious by 15 of 92 VirusTotal vendors, with classifications including phishing and fraud. For fifaworldcup-careers[.]com, a fake employment portal, VirusTotal showed detections for the root domain and www subdomain, while the domain resolved to multiple IP addresses and had SSL certificates, including a wildcard certificate.\u003c/p\u003e\n\n\u003cp\u003eThe affected audiences include fans seeking tickets or hospitality packages, viewers looking for streams, job seekers applying for World Cup-related roles, and organizations in travel, hospitality, ticketing, media, and related sectors. The article recommends typing www.fifa.com directly into the browser, avoiding sponsored search results, using official broadcasters for streaming, and verifying URLs before entering information. Victims or those encountering suspected scams are advised to document evidence and file a complaint with the Internet Crime Complaint Center at ic3.gov.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that scams tied to the FIFA World Cup 2026 are already active ahead of the tournament’s June 11 start date. The FBI has issued a formal Public Service Announcement warning that threat actors are creating fraudulent versions of FIFA-affiliated websites. These websites are being used to steal personal information, conduct financial fraud, and sell fake products and services.\u003c/p\u003e\n\n\u003cp\u003eCyble researchers independently analyzed domains flagged by the FBI and confirmed that many remained active and operational at the time of publication. The article frames the threat as significant because the FIFA World Cup 2026 will involve 48 teams and 16 host cities across the United States, Canada, and Mexico, with an expected global audience of billions.\u003c/p\u003e\n\n\u003ch2 id=\"scam-methods\"\u003eScam Methods\u003c/h2\u003e\n\n\u003cp\u003eThe article says the fraudulent websites are designed to mimic FIFA’s official website, www.fifa.com. These sites attempt to collect personally identifiable information, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFull names\u003c/li\u003e\n\u003cli\u003eHome addresses\u003c/li\u003e\n\u003cli\u003ePhone numbers\u003c/li\u003e\n\u003cli\u003eEmail addresses\u003c/li\u003e\n\u003cli\u003eBanking information\u003c/li\u003e\n\u003cli\u003ePayment card details\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe same fraudulent infrastructure is being used for multiple types of scams, including FIFA ticket scams, fake hospitality package sales, fraudulent job listings, and other financial fraud.\u003c/p\u003e\n\n\u003cp\u003eA key technique described in the article is typosquatting. Attackers register domains with subtle differences from legitimate FIFA web addresses, such as missing letters, altered extensions, hyphenated forms, or other misleading variants. The article notes that these domains may be dressed with FIFA branding, tournament schedules, and professional-looking navigation menus to deceive users.\u003c/p\u003e\n\n\u003ch2 id=\"fbi-flagged-domains\"\u003eFBI-Flagged Domains\u003c/h2\u003e\n\n\u003cp\u003eThe FBI flagged numerous fraudulent FIFA-related domains, which the article reproduces in defanged form. These include domains that impersonate FIFA directly, domains that reference tickets or careers, and domains that use World Cup 2026 themes. Cyble researchers tracked these domains and found that many were still operational at the time of publication.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that domain takedowns do not end the threat because new fraudulent domains tend to appear almost instantaneously. It describes the infrastructure as continuously regenerating rather than a one-time campaign.\u003c/p\u003e\n\n\u003ch2 id=\"fake-hospitality-and-ticket-sites\"\u003eFake Hospitality and Ticket Sites\u003c/h2\u003e\n\n\u003cp\u003eCyble highlighted ww-fifa[.]com as a convincing example of a typosquatting attack. The domain removes a single “w” from the legitimate FIFA URL and presents itself as an official FIFA World Cup 2026 portal. According to the article, the site includes tournament branding, navigation menus, ticket information, and hospitality package offers.\u003c/p\u003e\n\n\u003cp\u003eVisitors are encouraged to purchase premium packages that allegedly include tickets, food, beverages, lounge access, and related services. The article states that these offers are fraudulent.\u003c/p\u003e\n\n\u003cp\u003eCyble identified several indicators that the site was illegitimate, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDuplicate page titles appearing twice in the browser tab\u003c/li\u003e\n\u003cli\u003eMissing or broken images throughout the site\u003c/li\u003e\n\u003cli\u003eNavigation links leading to attacker-controlled pages\u003c/li\u003e\n\u003cli\u003eTicket purchase prompts requesting personal and financial information without legitimate payment processing\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article stresses that modern scam sites may be sophisticated enough to pass a casual inspection because they can convincingly replicate the visual design of official sports portals.\u003c/p\u003e\n\n\u003ch2 id=\"security-vendor-detections\"\u003eSecurity Vendor Detections\u003c/h2\u003e\n\n\u003cp\u003eCyble analyzed the domain fifa[.]help using VirusTotal. At the time of analysis, 15 out of 92 security vendors classified it as malicious. The classifications included phishing, fraud, and related threat categories.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that while 15 detections out of 92 may appear modest, it is still significant for an early-stage domain. It states that many security vendors lag in classifying newly registered domains, so early detections by multiple established providers support the credibility of the threat.\u003c/p\u003e\n\n\u003ch2 id=\"fake-recruitment-sites\"\u003eFake Recruitment Sites\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies fake recruitment as a separate fraud vector. Cyble researchers found fifaworldcup-careers[.]com, which presented itself as a FIFA employment portal for World Cup-related positions. This scam targets job seekers rather than ticket buyers or fans.\u003c/p\u003e\n\n\u003cp\u003eVirusTotal data cited in the article showed:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ewww.fifaworldcup-careers[.]com was flagged by 8 out of 91 vendors\u003c/li\u003e\n\u003cli\u003eThe root domain was flagged by 14 out of 91 vendors\u003c/li\u003e\n\u003cli\u003eThe domain resolved to multiple IP addresses, including 3.71.180.249, 13.249.91.65, and 13.249.91.101\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the use of multiple IP addresses may indicate content delivery or load-balancing infrastructure, which can make takedowns more difficult. WHOIS data showed the domain was registered and updated in mid-to-late April 2026, with the registrant hidden behind a privacy shield. Two SSL certificates were issued on April 15 and April 16, including a wildcard certificate covering *.fifaworldcup-careers[.]com.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights job seekers as a vulnerable audience because they may submit personal information, resumes, and government ID to what they believe is a legitimate employer. It specifically mentions people searching for World Cup-related hospitality, security, event coordination, and media roles.\u003c/p\u003e\n\n\u003ch2 id=\"ticket-scam-avoidance-guidance\"\u003eTicket Scam Avoidance Guidance\u003c/h2\u003e\n\n\u003cp\u003eThe article includes FBI-recommended precautions for avoiding FIFA World Cup 2026 ticket scams. The guidance includes manually typing fifa.com into the browser address bar and avoiding reliance on search results or links in messages. Users are also advised to avoid sponsored search results because attackers can purchase ads that appear above legitimate results.\u003c/p\u003e\n\n\u003cp\u003eAdditional recommendations include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eConfirming that the URL is exactly www.fifa.com before entering information\u003c/li\u003e\n\u003cli\u003eUsing saved bookmarks or browser favorites when revisiting FIFA websites\u003c/li\u003e\n\u003cli\u003eAccessing FIFA subdomains only through the official homepage\u003c/li\u003e\n\u003cli\u003eWatching for broken graphics, poor-quality branding, or duplicate content\u003c/li\u003e\n\u003cli\u003eAvoiding submission of sensitive information unless the site has been independently verified\u003c/li\u003e\n\u003cli\u003eReviewing URLs carefully before clicking advertisements\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these precautions are especially important for scams involving fake ticket prices, fake discounts, exclusive hospitality offers, and limited-time deals.\u003c/p\u003e\n\n\u003ch2 id=\"streaming-scam-risks\"\u003eStreaming Scam Risks\u003c/h2\u003e\n\n\u003cp\u003eThe article also warns that scammers are expected to target viewers seeking FIFA World Cup 2026 streaming options. Fraudulent streaming platforms may exploit demand for match access, particularly where official broadcasts are expensive or limited.\u003c/p\u003e\n\n\u003cp\u003eThe recommended precautions include using only official FIFA channels and licensed regional broadcasters for tournament information. Viewers are advised to watch matches only through broadcasters licensed for their region and to avoid streaming links sent through unsolicited emails, social media messages, or WhatsApp groups.\u003c/p\u003e\n\n\u003cp\u003eThe article also warns users to verify URLs before creating accounts or entering payment information and to be cautious of websites offering heavily discounted subscriptions or “exclusive” access to all matches.\u003c/p\u003e\n\n\u003ch2 id=\"victim-response-and-reporting\"\u003eVictim Response and Reporting\u003c/h2\u003e\n\n\u003cp\u003eThe article says the FBI expects additional spoofed domains to appear before, during, and after the tournament. If users encounter a suspected FIFA World Cup 2026 scam, they are advised to document as much information as possible before the site disappears.\u003c/p\u003e\n\n\u003cp\u003eRecommended evidence includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe fraudulent domain name\u003c/li\u003e\n\u003cli\u003eScreenshots of the website\u003c/li\u003e\n\u003cli\u003eEmails, SMS messages, or chat logs\u003c/li\u003e\n\u003cli\u003ePayment details if a transaction occurred\u003c/li\u003e\n\u003cli\u003eCryptocurrency wallet addresses, if applicable\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eVictims are instructed to file a complaint with the Internet Crime Complaint Center at ic3.gov. The article says reports should include the fake domain, details of interactions with the site, information submitted, payment records, receiving financial institution information, and any cryptocurrency transaction details.\u003c/p\u003e\n\n\u003ch2 id=\"brand-protection-context\"\u003eBrand Protection Context\u003c/h2\u003e\n\n\u003cp\u003eThe article also discusses risks to organizations in sectors adjacent to the FIFA World Cup 2026. It names travel, hospitality, ticketing, media, and related industries as sectors that need proactive brand protection measures.\u003c/p\u003e\n\n\u003cp\u003eCyble presents its Brand Intelligence solution as a way for organizations to detect malicious domains, phishing websites, brand impersonation attempts, and digital abuse in real time. The article also mentions Cyble’s Dark Web and Cyber Crime Monitoring and Takedown \u0026amp; Disruption services as tools for identifying threats, investigating malicious activity, and accelerating removal of fraudulent infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central message is that FIFA World Cup 2026-related cyber fraud is already active and includes fake ticket, hospitality, job, and streaming sites. The FBI has warned about fraudulent FIFA-affiliated domains, and Cyble confirmed that many of the flagged domains were still active. Users are advised to rely on www.fifa.com, official broadcasters, careful URL verification, and IC3 reporting to reduce exposure to these scams.\u003c/p\u003e\n","keyPoints":["The FBI warned that threat actors are creating fraudulent FIFA-affiliated websites to steal personal information, conduct financial fraud, and sell fake products and services related to the FIFA World Cup 2026.","The FBI flagged numerous fraudulent FIFA-related domains using typosquatting and similar tactics, and Cyble researchers confirmed that many remained active at the time of publishing.","Cyble identified ww-fifa[.]com as a fake FIFA World Cup 2026 hospitality and ticket portal that used tournament branding and prompts for personal and financial information.","Cyble found that fifa[.]help was classified as malicious by 15 of 92 security vendors on VirusTotal, with detections including phishing and fraud categories.","Cyble identified fifaworldcup-careers[.]com as a fake FIFA employment portal targeting job seekers, with VirusTotal detections and infrastructure including multiple IP addresses and wildcard SSL certificates."],"insights":["The scam infrastructure is continuously regenerating, so taking down individual FIFA-themed domains does not eliminate the threat because new domains can appear almost immediately.","Some fake FIFA sites are convincing enough to mimic official sports portals with branding, navigation menus, schedules, ticket information, and hospitality offers, making minor site defects such as duplicate titles, broken images, and attacker-controlled links important warning signs.","Early VirusTotal detection rates may understate risk for newly registered domains, as the article notes that many security vendors lag in classifying new domains even when multiple established vendors have already flagged them.","Job seekers are a particularly exposed target because fake FIFA career portals can solicit resumes, full personal information, and government ID from applicants who may not be watching for ticket-related scams.","The fifaworldcup-careers[.]com domain used multiple IP addresses and wildcard SSL certificates, indicating a more deliberate infrastructure setup that can complicate takedown efforts."],"referencedReports":[],"body":"\u003cp\u003eThe FBI has issued a Public Service Announcement warning that threat actors are creating fraudulent FIFA-affiliated websites ahead of the FIFA World Cup 2026. These sites are designed to steal personal information, conduct financial fraud, and sell fake products and services. Cyble researchers analyzed domains flagged by the FBI and confirmed that many remained active at the time of publication.\u003c/p\u003e\n\n\u003cp\u003eThe scams target several groups, including ticket buyers, hospitality customers, streaming viewers, job seekers, and corporate brands. The article says criminals are using typosquatting, fake branding, and professional-looking site layouts to make fraudulent pages appear legitimate. The World Cup’s scale, with 48 teams and 16 host cities across the United States, Canada, and Mexico, is presented as a major reason the threat is arriving early and aggressively.\u003c/p\u003e\n\n\u003cp\u003eCyble highlighted examples including ww-fifa[.]com, a fake hospitality and ticket site, fifa[.]help, which was flagged by 15 of 92 VirusTotal security vendors, and fifaworldcup-careers[.]com, a fake recruitment portal. The article advises users to type www.fifa.com directly, avoid sponsored search results and unsolicited streaming links, verify URLs carefully, and report suspected scams to the FBI’s IC3 at ic3.gov.\u003c/p\u003e\n"},{"n":20,"title":"The Invoice Email With No Text to Scan: Image-Only Payload From a Compromised Account With a Broken ARC Chain","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/image-only-invoice-cross-brand-mismatch-arc-failure","time":"11:00","priority":"MAY READ","score":70,"tldr":"A compromised vendor email account sent an image-only “ACH payment” attachment to an accounts receivable team, passing SPF, DKIM, and DMARC at delivery while hiding weak original authentication and a broken ARC chain. The key risk is that fully authenticated mail from valid accounts can still carry opaque invoice-fraud payloads that evade text and link scanning.","briefOverview":"\u003cp\u003eAn email with the subject “ACH payment” arrived at the accounts receivable team of a global flavoring company from carlaburbo@keystonenatural[.]com. The sender CC’d ap@keystonenatural[.]com, reinforcing the appearance of a legitimate inter-company payment communication. The article states that the sending account was compromised and that the message was labeled as credential theft.\u003c/p\u003e\n\n\u003cp\u003eAt final delivery, the message passed SPF, DKIM, DMARC, and composite authentication, and its SCL score was 1. However, Authentication-Results-Original showed dkim=none and dmarc=none, while ARC validation at i=2 returned cv=fail. The article highlights this discrepancy as a sign that final-hop authentication can vouch for a message sent through compromised infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe payload consisted entirely of a single PNG attachment, image002.png, sized 63,801 bytes. The email had no body text, no links, no macros, and no OCR text extracted, leaving text-based scanning with nothing to inspect. IRONSCALES’ Themis engine flagged the message at 54% confidence, and one mailbox was quarantined.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAn email with the subject “ACH payment” was sent to the accounts receivable team of a global flavoring company from carlaburbo@keystonenatural[.]com. The sender was associated with a natural products company and also CC’d ap@keystonenatural[.]com. The article describes the message as an invoice fraud and payment diversion case involving account compromise.\u003c/p\u003e\n\n\u003cp\u003eThe message appeared legitimate to standard authentication checks at the final delivery hop. SPF passed, DKIM passed using d=keystonenatural[.]com and selector2, DMARC passed, and composite authentication returned reason=100. The spam confidence level was SCL=1, and the gateway had no reason to intervene based on those results.\u003c/p\u003e\n\n\u003cp\u003eThe original authentication results showed a different picture. Authentication-Results-Original recorded dkim=none and dmarc=none, indicating the message had no DKIM signature when first created. ARC validation at i=2 returned cv=fail, meaning the forwarding chain of trust was broken.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Microsoft 365 infrastructure signed the message on behalf of the sender at a relay hop. It explains that the sending account’s mail server added DKIM and SPF alignment that the original message did not have. The article characterizes this as the signature pattern of a compromised account, where the attacker sends through the victim’s infrastructure and the infrastructure automatically vouches for the message.\u003c/p\u003e\n\n\u003cp\u003eThe entire payload was a single PNG attachment named image002.png, with a size of 63,801 bytes and MIME type image/png. There were no links in the body, no body text, no macros, no document attachment to detonate in a sandbox, and no OCR text extracted. The article says the image-only payload evaded text-based content scanning entirely.\u003c/p\u003e\n\n\u003cp\u003eIRONSCALES’ Themis Adaptive AI engine flagged the message at 54% confidence and labeled it as credential theft. The behavioral signals cited included the first-time sender pattern between the two organizations, the image-only payload with no extractable text, and the discrepancy between original and final-hop authentication. One mailbox was quarantined.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes an email-based invoice fraud and payment diversion attempt involving a compromised account at keystonenatural[.]com. The email had the subject “ACH payment” and was sent from carlaburbo@keystonenatural[.]com to the accounts receivable team of a global flavoring company. The sender also CC’d ap@keystonenatural[.]com, which the article says reinforced the appearance of a legitimate inter-company payment communication.\u003c/p\u003e\n\n\u003cp\u003eThe message was notable because it passed standard authentication checks at the final delivery hop while still showing signs of compromised-account abuse when original authentication and ARC data were reviewed. The full payload was a single PNG image attachment, with no body text, links, macros, or extractable OCR text.\u003c/p\u003e\n\n\u003ch2 id=\"core-event\"\u003eCore Event\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that an email titled “ACH payment” reached the accounts receivable workflow of a global flavoring company. The sender was carlaburbo@keystonenatural[.]com, and the sender CC’d the company’s own accounts payable address, ap@keystonenatural[.]com.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the sending account was compromised. It frames the message as invoice fraud, payment diversion, and credential theft, and maps the activity to MITRE ATT\u0026amp;CK techniques for spearphishing attachment, valid accounts, and masquerading.\u003c/p\u003e\n\n\u003ch2 id=\"authentication-results\"\u003eAuthentication Results\u003c/h2\u003e\n\n\u003cp\u003eAt the final delivery hop, the message appeared trustworthy to standard mail authentication controls. The article lists the following final authentication results:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSPF passed.\u003c/li\u003e\n\u003cli\u003eDKIM passed with d=keystonenatural[.]com and selector2.\u003c/li\u003e\n\u003cli\u003eDMARC passed.\u003c/li\u003e\n\u003cli\u003eComposite authentication passed with reason=100.\u003c/li\u003e\n\u003cli\u003eSCL was 1.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the gateway had no reason to intervene based on these surface-level authentication results.\u003c/p\u003e\n\n\u003ch2 id=\"original-authentication-and-arc-discrepancy\"\u003eOriginal Authentication and ARC Discrepancy\u003c/h2\u003e\n\n\u003cp\u003eThe original authentication results contradicted the final-hop authentication picture. Authentication-Results-Original showed dkim=none and dmarc=none, which the article says indicated that the message had no DKIM signature when it was first created.\u003c/p\u003e\n\n\u003cp\u003eARC validation at i=2 returned cv=fail. The article explains that this meant the forwarding chain of trust was broken.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Microsoft 365 infrastructure signed the message on behalf of the sender at the relay hop. It further explains that the sending account’s mail server added DKIM and SPF alignment that the original message never had. According to the article, this is the signature pattern of a compromised account because the attacker sends through the victim’s infrastructure and the infrastructure automatically vouches for the message.\u003c/p\u003e\n\n\u003ch2 id=\"payload-characteristics\"\u003ePayload Characteristics\u003c/h2\u003e\n\n\u003cp\u003eThe entire message payload was a single PNG attachment named image002.png. The article identifies the attachment as image/png and gives its size as 63,801 bytes.\u003c/p\u003e\n\n\u003cp\u003eThe email had:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNo body text.\u003c/li\u003e\n\u003cli\u003eNo links.\u003c/li\u003e\n\u003cli\u003eNo macros.\u003c/li\u003e\n\u003cli\u003eNo document attachments to detonate in a sandbox.\u003c/li\u003e\n\u003cli\u003eNo OCR text extracted.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the image rendered for human eyes but returned nothing for text-based scanners. It also notes that most gateways do not apply OCR to every image attachment in real time.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-message-was-significant\"\u003eWhy the Message Was Significant\u003c/h2\u003e\n\n\u003cp\u003eThe message combined full final-hop authentication with an opaque, image-only payload. The article emphasizes that standard authentication checks showed a fully authenticated message from a real company, while the behavioral layer identified signals consistent with compromised-account activity.\u003c/p\u003e\n\n\u003cp\u003eThe image-only format removed several common inspection surfaces at once. There were no URLs for link scanning, no macros for document analysis, and no extractable text for text-based content scanning.\u003c/p\u003e\n\n\u003cp\u003eThe article says the image likely contained payment instructions or account details, rendered as a visual document that a human in accounts receivable would process manually. It describes the tactic as placing the payload where machines were not looking.\u003c/p\u003e\n\n\u003ch2 id=\"business-context-and-social-engineering-elements\"\u003eBusiness Context and Social Engineering Elements\u003c/h2\u003e\n\n\u003cp\u003eThe email targeted the recipient’s accounts receivable team with an “ACH payment” subject line. The article says this matched the type of workflow an AR team would expect when processing vendor payments.\u003c/p\u003e\n\n\u003cp\u003eThe sender also CC’d ap@keystonenatural[.]com, the sender’s own accounts payable address. The article states that this reinforced the appearance of a legitimate inter-company payment communication.\u003c/p\u003e\n\n\u003cp\u003eThe message was also described as coming from a first-time sender to the target organization. This was one of the behavioral signals considered by IRONSCALES’ Themis engine.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eIRONSCALES’ Themis Adaptive AI engine flagged the message at 54% confidence and labeled it as credential theft. The article says the behavioral signals included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe first-time sender pattern between the two organizations.\u003c/li\u003e\n\u003cli\u003eThe image-only payload with no extractable text.\u003c/li\u003e\n\u003cli\u003eThe discrepancy between original authentication results and final-hop authentication results.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eOne mailbox was quarantined.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise-listed-in-the-article\"\u003eIndicators of Compromise Listed in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article lists the following indicators and context:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSender email: carlaburbo@keystonenatural[.]com, described as a compromised account at a natural products company.\u003c/li\u003e\n\u003cli\u003eSender domain: keystonenatural[.]com, with full SPF, DKIM, and DMARC pass at final hop.\u003c/li\u003e\n\u003cli\u003eCC address: ap@keystonenatural[.]com, described as the sender’s own AP team.\u003c/li\u003e\n\u003cli\u003eAttachment: image002.png, 63,801 bytes, image/png.\u003c/li\u003e\n\u003cli\u003eFinal authentication: SPF=pass, DKIM=pass with selector2, DMARC=pass, compauth=100.\u003c/li\u003e\n\u003cli\u003eOriginal authentication: dkim=none and dmarc=none.\u003c/li\u003e\n\u003cli\u003eARC validation: i=2, cv=fail.\u003c/li\u003e\n\u003cli\u003eSCL: 1.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK Mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to three MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eT1566.001, Phishing: Spearphishing Attachment, because the payload was an image-only PNG attachment used in an invoice fraud context.\u003c/li\u003e\n\u003cli\u003eT1078, Valid Accounts, because a compromised email account was used with full domain authentication at delivery.\u003c/li\u003e\n\u003cli\u003eT1036.005, Masquerading: Match Legitimate Name or Location, because a legitimate vendor identity was used for cross-company invoice fraud.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article states that one mailbox was quarantined. It does not disclose that any payment was made or that any credentials were actually stolen. The article’s stated severity is high, with themes of invoice fraud, payment diversion, and account compromise.\u003c/p\u003e\n","keyPoints":["An email with the subject “ACH payment” was sent from carlaburbo@keystonenatural[.]com to the accounts receivable team of a global flavoring company and CC’d ap@keystonenatural[.]com.","The message passed SPF, DKIM, DMARC, and composite authentication at final delivery, but Authentication-Results-Original showed dkim=none and dmarc=none, and ARC validation at i=2 returned cv=fail.","The entire message payload was a single PNG attachment named image002.png with no body text, no links, no macros, and no OCR text extracted.","The article states that the sending account was compromised and that the final-hop authentication pattern reflected the attacker sending through the victim’s infrastructure.","IRONSCALES’ Themis engine flagged the message at 54% confidence as credential theft, and one mailbox was quarantined."],"insights":["Final-hop SPF, DKIM, DMARC, and compauth passes were misleading because the original authentication results showed no DKIM or DMARC, making the Authentication-Results-Original and ARC failure more useful indicators than the delivery-time authentication verdicts.","The image-only PNG design removed common inspection surfaces at once: there were no URLs for link scanning, no document macros for sandbox analysis, and no extractable text for text-based content scanning.","The CC to the sender’s own accounts payable address increased the appearance of a legitimate inter-company payment workflow while still using a compromised sender account.","A low SCL score did not reflect the message’s risk, showing that spam confidence was insufficient for detecting this invoice-fraud pattern."],"referencedReports":[],"body":"\u003cp\u003eAn email with the subject “ACH payment” arrived at the accounts receivable team of a global flavoring company from carlaburbo@keystonenatural[.]com. The sender CC’d ap@keystonenatural[.]com, reinforcing the appearance of a legitimate inter-company payment communication. The article states that the sending account was compromised and that the message was labeled as credential theft.\u003c/p\u003e\n\n\u003cp\u003eAt final delivery, the message passed SPF, DKIM, DMARC, and composite authentication, and its SCL score was 1. However, Authentication-Results-Original showed dkim=none and dmarc=none, while ARC validation at i=2 returned cv=fail. The article highlights this discrepancy as a sign that final-hop authentication can vouch for a message sent through compromised infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe payload consisted entirely of a single PNG attachment, image002.png, sized 63,801 bytes. The email had no body text, no links, no macros, and no OCR text extracted, leaving text-based scanning with nothing to inspect. IRONSCALES’ Themis engine flagged the message at 54% confidence, and one mailbox was quarantined.\u003c/p\u003e\n"},{"n":23,"title":"SBOMs in 2026: Everyone's generating them, no one's using them","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/sboms-everyones-generating-them-no-ones-using-them","time":"13:53","priority":"MAY READ","score":60,"tldr":"ENISA’s 2026 SBOM report shows that while regulation is pushing many organizations to generate SBOMs, most still struggle to use them for real vulnerability and supplier-risk management. The biggest gap is turning SBOMs from compliance paperwork into continuously monitored, actionable security data.","briefOverview":"\u003cp\u003eENISA published its SBOM Adoption State of Play 2026 report, based on a survey of 334 organizations, most of them EU-based and directly impacted by the Cyber Resilience Act. The article says the CRA is the main driver of SBOM adoption, with 43% of organizations reporting significant acceleration of SBOM investment and 29% reporting moderate influence. While 78% have started their SBOM journey and 79% expect to reach the required maturity level by December 2027, about one in five expect to miss the deadline.\u003c/p\u003e\n\n\u003cp\u003eThe central issue is that generating SBOMs and using them are not the same thing. Many organizations produce SBOMs, including 39% at build time and 74% with at least partially automated per-release generation, but 44% report a moderate utilization gap and 23% report a significant gap. ENISA concludes that SBOMs are mainly used for compliance rather than active security, while teams struggle with vulnerability matching, false positives, incomplete components, and weak identifiers.\u003c/p\u003e\n\n\u003cp\u003eSupplier SBOM adoption is also lagging, with 39% of organizations never receiving SBOMs for commercial software and another 39% receiving them only rarely. Only 10% have mandatory SBOM clauses in supplier contracts, and 45% say fewer than a quarter of suppliers meet their SBOM requirements. The article argues that the defining challenge for 2026 will be turning SBOMs into actionable inputs for vulnerability management, licensing workflows, supplier visibility, and continuous product support.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eENISA’s SBOM Adoption State of Play 2026 report provides a snapshot of software bill of materials adoption across 334 organizations. The survey population was 65% EU-based, and 80% of respondents were directly impacted by the Cyber Resilience Act. The article frames the report as showing a more nuanced reality than simple industry-wide buy-in, with adoption rising but practical use still lagging.\u003c/p\u003e\n\n\u003cp\u003eThe Cyber Resilience Act is identified as the strongest driver of SBOM investment. According to the article, 43% of organizations say the CRA significantly accelerated their SBOM investment, while another 29% say it had a moderate influence. Although 78% have started their SBOM journey and 79% expect to reach the required maturity level by December 2027, roughly one in five expect to miss the deadline and 12% cannot estimate a timeline.\u003c/p\u003e\n\n\u003cp\u003eThe report shows that SBOM generation is more mature than SBOM consumption. Thirty-nine percent of organizations generate SBOMs at build time, and 74% have at least partially automated per-release generation. However, 44% report a moderate gap and 23% report a significant gap between generating SBOMs and using them, while 20% do not know whether or how SBOMs are consumed in their organization.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights technical and operational barriers that limit SBOM usefulness. Fifty-eight percent of respondents rate vulnerability matching, including CPE/PURL alignment and false positives, as a major challenge, and 60% cite data quality issues such as incomplete components and identifiers. ENISA’s conclusion, as presented in the article, is that SBOMs are still used mainly for compliance rather than active security.\u003c/p\u003e\n\n\u003cp\u003eSupplier visibility is another major weakness. Thirty-nine percent of organizations never receive SBOMs for commercial software they buy, another 39% rarely receive them, and only 2% always do. Only 10% have mandatory SBOM clauses in supplier contracts, while 45% say fewer than a quarter of suppliers meet their SBOM requirements, and many organizations do not know what dependency depth they receive.\u003c/p\u003e\n\n\u003cp\u003eThe article closes by arguing that SBOM utilization will define 2026. It says organizations need automated generation on every build, continuous updates across the product support period, vulnerability workflows tied to SBOM data, and better visibility into supplier software. It also describes Aikido Security’s SBOM generation, supplier SBOM import, vulnerability and licensing workflow support, and device protection capabilities as ways to address the gaps identified by ENISA.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eENISA published its \u003cstrong\u003eSBOM Adoption State of Play 2026\u003c/strong\u003e report, based on a survey of \u003cstrong\u003e334 organizations\u003c/strong\u003e. According to the article, \u003cstrong\u003e65%\u003c/strong\u003e of respondents were EU-based and \u003cstrong\u003e80%\u003c/strong\u003e were directly impacted by the \u003cstrong\u003eCyber Resilience Act\u003c/strong\u003e. The report is presented as a clear snapshot of software supply chain transparency, showing that SBOM adoption is increasing but practical utilization remains weak.\u003c/p\u003e\n\n\u003cp\u003eThe article’s main conclusion is that many organizations are now generating SBOMs, but far fewer are using them effectively. SBOMs are described as valuable only when they feed vulnerability and licensing management workflows. ENISA’s own conclusion, as quoted in the article, is that SBOMs are used mainly for compliance purposes rather than active security.\u003c/p\u003e\n\n\u003ch2 id=\"cyber-resilience-act-as-the-main-driver\"\u003eCyber Resilience Act as the Main Driver\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the \u003cstrong\u003eCyber Resilience Act\u003c/strong\u003e is the top driver of SBOM adoption. It reports that:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e43%\u003c/strong\u003e of organizations say the CRA significantly accelerated their SBOM investment.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e29%\u003c/strong\u003e say the CRA had a moderate influence.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e78%\u003c/strong\u003e have started their SBOM journey.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e79%\u003c/strong\u003e expect to reach the required maturity level by the time the CRA becomes fully applicable in \u003cstrong\u003eDecember 2027\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAt the same time, the article notes that roughly \u003cstrong\u003eone in five organizations\u003c/strong\u003e expect to miss the deadline. Another \u003cstrong\u003e12%\u003c/strong\u003e cannot estimate a timeline. This creates a picture of strong regulatory momentum, but uneven readiness.\u003c/p\u003e\n\n\u003ch2 id=\"generation-is-ahead-of-consumption\"\u003eGeneration Is Ahead of Consumption\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that producing an SBOM is different from using one. Most organizations now produce SBOMs, but their use in security workflows is lagging.\u003c/p\u003e\n\n\u003cp\u003eKey figures include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e39%\u003c/strong\u003e generate SBOMs at build time.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e74%\u003c/strong\u003e have at least partially automated per-release generation.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e44%\u003c/strong\u003e report a moderate gap between generating SBOMs and actually utilizing them.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e23%\u003c/strong\u003e report a significant gap.\u003c/li\u003e\n\u003cli\u003eOnly \u003cstrong\u003e7%\u003c/strong\u003e have closed the generation-to-consumption gap.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e20%\u003c/strong\u003e do not know whether or how SBOMs are consumed in their organization.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article describes an unread SBOM in an artifact registry as “just paperwork.” It argues that the value of SBOMs depends on whether they are connected to vulnerability and licensing management.\u003c/p\u003e\n\n\u003ch2 id=\"technical-barriers-to-sbom-use\"\u003eTechnical Barriers to SBOM Use\u003c/h2\u003e\n\n\u003cp\u003eThe report identifies several technical and data quality problems that limit SBOM usefulness. The article highlights two major challenges:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e58%\u003c/strong\u003e of organizations rate vulnerability matching as a major challenge, including issues with \u003cstrong\u003eCPE/PURL alignment\u003c/strong\u003e and false positives.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e60%\u003c/strong\u003e flag data quality issues, including incomplete components and identifiers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese problems make it difficult for teams to turn SBOM data into actionable vulnerability management. The article presents this as one reason SBOMs remain compliance artifacts rather than active security tools.\u003c/p\u003e\n\n\u003ch2 id=\"supplier-sboms-are-rare-and-often-incomplete\"\u003eSupplier SBOMs Are Rare and Often Incomplete\u003c/h2\u003e\n\n\u003cp\u003eSupplier SBOM availability is presented as another major gap. The article says most organizations do not receive SBOMs from suppliers because most suppliers are not sending them.\u003c/p\u003e\n\n\u003cp\u003eThe article reports that:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e39%\u003c/strong\u003e of organizations never receive SBOMs for commercial software they buy.\u003c/li\u003e\n\u003cli\u003eAnother \u003cstrong\u003e39%\u003c/strong\u003e only rarely receive them.\u003c/li\u003e\n\u003cli\u003eOnly \u003cstrong\u003e2%\u003c/strong\u003e always receive supplier SBOMs.\u003c/li\u003e\n\u003cli\u003eOnly \u003cstrong\u003e10%\u003c/strong\u003e have mandatory SBOM clauses in supplier contracts.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e55%\u003c/strong\u003e are working on adding such clauses.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e45%\u003c/strong\u003e say fewer than a quarter of their suppliers meet their SBOM requirements.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe main supplier SBOM quality gaps are described as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCompleteness: \u003cstrong\u003e27%\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eIdentifier accuracy: \u003cstrong\u003e17%\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eVulnerability references: \u003cstrong\u003e12%\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"dependency-depth-creates-an-additional-gap\"\u003eDependency Depth Creates an Additional Gap\u003c/h2\u003e\n\n\u003cp\u003eThe article also highlights a mismatch between the depth of SBOMs organizations need and the depth they receive. It says:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003e36%\u003c/strong\u003e of organizations need SBOMs covering all primary components and direct dependencies, but only \u003cstrong\u003e29%\u003c/strong\u003e receive that level.\u003c/li\u003e\n\u003cli\u003eFor full-depth SBOMs, the gap is \u003cstrong\u003e24% needed\u003c/strong\u003e versus \u003cstrong\u003e14% received\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e45%\u003c/strong\u003e do not know what depth they are getting.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that this directly limits the security value of SBOM programs because many real-world vulnerabilities hide in transitive dependencies.\u003c/p\u003e\n\n\u003ch2 id=\"investment-skills-and-completeness-challenges\"\u003eInvestment, Skills, and Completeness Challenges\u003c/h2\u003e\n\n\u003cp\u003eThe article says the report reveals an industry that understands the supply chain security problem but struggles with follow-through. It notes that concern is high, but investment is lower:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMore than \u003cstrong\u003e90%\u003c/strong\u003e of organizations worry about supply chain security.\u003c/li\u003e\n\u003cli\u003eOnly \u003cstrong\u003e34%\u003c/strong\u003e allocate significant resources to it.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e57%\u003c/strong\u003e cite a lack of skills or staff as a barrier.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCompleteness is described as the main barrier. The article reports that \u003cstrong\u003e62%\u003c/strong\u003e of organizations say achieving a high degree of SBOM completeness is quite a lot or extremely difficult.\u003c/p\u003e\n\n\u003ch2 id=\"format-fragmentation-and-compliance-risk\"\u003eFormat Fragmentation and Compliance Risk\u003c/h2\u003e\n\n\u003cp\u003eThe article says format issues remain unresolved. \u003cstrong\u003eCycloneDX\u003c/strong\u003e leads with \u003cstrong\u003e44%\u003c/strong\u003e adoption, while \u003cstrong\u003eSPDX\u003c/strong\u003e is used by \u003cstrong\u003e29%\u003c/strong\u003e. However, \u003cstrong\u003e28%\u003c/strong\u003e still use proprietary or non-standard formats.\u003c/p\u003e\n\n\u003cp\u003eThe article describes this as a direct compliance risk because the CRA requires a commonly used, machine-readable format. It also notes that Germany’s \u003cstrong\u003eBSI\u003c/strong\u003e guideline explicitly expects \u003cstrong\u003eCycloneDX 1.6+\u003c/strong\u003e or \u003cstrong\u003eSPDX 3.0.1+\u003c/strong\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"organizational-differences\"\u003eOrganizational Differences\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies an unexpected maturity pattern across organization sizes. It says micro and small enterprises are “quietly ahead,” with \u003cstrong\u003e23–25%\u003c/strong\u003e reporting mature, automated SBOM implementation. By contrast, only \u003cstrong\u003e4–6%\u003c/strong\u003e of medium and large organizations report the same level of maturity.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that \u003cstrong\u003e36%\u003c/strong\u003e of large enterprises see SBOMs as a “mandatory burden.” This reinforces the article’s broader point that compliance pressure is driving adoption, but operational integration remains uneven.\u003c/p\u003e\n\n\u003ch2 id=\"market-needs-identified-in-the-report\"\u003eMarket Needs Identified in the Report\u003c/h2\u003e\n\n\u003cp\u003eThe article says the market wants more practical support for SBOM implementation. Requested items include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA reference implementation with ready-made pipelines: \u003cstrong\u003e26%\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eTool benchmarks and a buyer’s guide: \u003cstrong\u003e22%\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eConformance tests: \u003cstrong\u003e18%\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eA profile defining what a “good enough” SBOM looks like: \u003cstrong\u003e31%\u003c/strong\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese findings are presented as evidence that organizations need clearer, more practical guidance on how to implement SBOM programs effectively.\u003c/p\u003e\n\n\u003ch2 id=\"practical-meaning-for-2026\"\u003ePractical Meaning for 2026\u003c/h2\u003e\n\n\u003cp\u003eThe article states that SBOM utilization will define the challenge in 2026. It identifies several required practices:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAutomated generation on every build.\u003c/li\u003e\n\u003cli\u003eContinuous updates across the product support period.\u003c/li\u003e\n\u003cli\u003eVulnerability workflows tied directly to SBOM data.\u003c/li\u003e\n\u003cli\u003eVisibility into supplier software.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these are the areas where the survey shows the biggest gaps and where the CRA will apply the most pressure.\u003c/p\u003e\n\n\u003ch2 id=\"aikido-security-capabilities-described\"\u003eAikido Security Capabilities Described\u003c/h2\u003e\n\n\u003cp\u003eThe final section describes how \u003cstrong\u003eAikido Security\u003c/strong\u003e addresses the gaps discussed in the report. It presents Aikido as a way to move supply chain transparency beyond compliance and into vulnerability and licensing workflows.\u003c/p\u003e\n\n\u003cp\u003eThe article describes three capabilities:\u003c/p\u003e\n\n\u003ch3 id=\"one-click-sbom-generation\"\u003eOne-click SBOM generation\u003c/h3\u003e\n\n\u003cp\u003eAikido can generate SBOMs for repositories in \u003cstrong\u003eCycloneDX\u003c/strong\u003e and \u003cstrong\u003eSPDX\u003c/strong\u003e. The article says these are the two formats pointed to by the CRA and BSI guidance. It also says the exports can be used in technical documentation if a market surveillance authority requests them.\u003c/p\u003e\n\n\u003ch3 id=\"sbom-consumption-and-supplier-sbom-import\"\u003eSBOM consumption and supplier SBOM import\u003c/h3\u003e\n\n\u003cp\u003eAikido also lets organizations import SBOMs received from vendors and suppliers, described as self-reported SBOMs. The article says this allows third-party components to be pulled into the same vulnerability monitoring as internal dependencies. It frames this as a way to help close the SBOM consumption gap identified by ENISA.\u003c/p\u003e\n\n\u003ch3 id=\"aikido-device-protection\"\u003eAikido Device Protection\u003c/h3\u003e\n\n\u003cp\u003eThe article says SBOMs describe what is in products, but not the machines that build and write the software. Aikido Device Protection is described as extending inventory and vulnerability visibility to build servers and developer machines. It covers installed tools, runtimes, and packages, including whether they are outdated or vulnerable.\u003c/p\u003e\n\n\u003cp\u003eThe article states that this helps address a blind spot because supply chain attacks can target CI pipelines and developer workstations rather than the code itself.\u003c/p\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central message is that SBOM adoption is no longer mainly about whether organizations can generate SBOMs. The more important issue is whether organizations can use SBOMs continuously for vulnerability management, licensing workflows, supplier visibility, and product support.\u003c/p\u003e\n\n\u003cp\u003eENISA’s data, as presented in the article, shows that regulatory pressure from the CRA has accelerated adoption, but many organizations still face gaps in consumption, supplier participation, data quality, dependency depth, skills, and standard formats.\u003c/p\u003e\n","keyPoints":["ENISA’s SBOM Adoption State of Play 2026 survey found that the Cyber Resilience Act is the top driver of SBOM adoption, with 43% of organizations saying it significantly accelerated their SBOM investment.","Although most organizations now produce SBOMs, 44% report a moderate gap and 23% report a significant gap between generating SBOMs and actually using them.","Supplier SBOM availability remains limited, with 39% of organizations never receiving SBOMs for commercial software they buy and another 39% receiving them only rarely.","Organizations cite vulnerability matching and data quality as major SBOM challenges, with 58% flagging CPE/PURL alignment and false positives and 60% flagging incomplete components and identifiers.","The article states that the main challenge for 2026 will be SBOM utilization through automated generation, continuous updates, vulnerability workflows tied to SBOM data, and visibility into supplier software."],"insights":["SBOM adoption is being driven more by regulatory pressure than by operational security value, as ENISA concludes SBOMs are still used mainly for compliance rather than active security.","Supplier visibility is a major bottleneck because even organizations that want deeper SBOMs often do not receive them, and 45% do not know what dependency depth their supplier SBOMs cover.","Large enterprises appear less mature than smaller companies in SBOM implementation, with only 4-6% of medium and large organizations reporting mature automated programs compared with 23-25% of micro and small enterprises.","The continued use of proprietary or non-standard SBOM formats by 28% of organizations creates a direct compliance risk under CRA-related expectations for commonly used, machine-readable formats.","The most actionable gap is not SBOM creation but connecting SBOM data to vulnerability and licensing workflows, since unread SBOMs in artifact registries provide little security value."],"referencedReports":[{"title":"SBOM Adoption State of Play 2026","url":"https://www.enisa.europa.eu/publications/sbom-adoption-state-of-play-2026","publisher":"ENISA","context":"The article is based on ENISA’s survey of 334 organizations about SBOM adoption and uses its findings throughout.","category":"","primary":false}],"body":"\u003cp\u003eENISA published its SBOM Adoption State of Play 2026 report, based on a survey of 334 organizations, most of them EU-based and directly impacted by the Cyber Resilience Act. The article says the CRA is the main driver of SBOM adoption, with 43% of organizations reporting significant acceleration of SBOM investment and 29% reporting moderate influence. While 78% have started their SBOM journey and 79% expect to reach the required maturity level by December 2027, about one in five expect to miss the deadline.\u003c/p\u003e\n\n\u003cp\u003eThe central issue is that generating SBOMs and using them are not the same thing. Many organizations produce SBOMs, including 39% at build time and 74% with at least partially automated per-release generation, but 44% report a moderate utilization gap and 23% report a significant gap. ENISA concludes that SBOMs are mainly used for compliance rather than active security, while teams struggle with vulnerability matching, false positives, incomplete components, and weak identifiers.\u003c/p\u003e\n\n\u003cp\u003eSupplier SBOM adoption is also lagging, with 39% of organizations never receiving SBOMs for commercial software and another 39% receiving them only rarely. Only 10% have mandatory SBOM clauses in supplier contracts, and 45% say fewer than a quarter of suppliers meet their SBOM requirements. The article argues that the defining challenge for 2026 will be turning SBOMs into actionable inputs for vulnerability management, licensing workflows, supplier visibility, and continuous product support.\u003c/p\u003e\n"},{"n":29,"title":"One Click to Compromise: ThreatLabz 2026 Phishing and Initial Access Report","source":"zscaler.com","sourceColorIdx":5,"link":"https://www.zscaler.com/blogs/security-research/one-click-compromise-threatlabz-2026-phishing-and-initial-access-report","time":"13:26","priority":"MAY READ","score":58,"tldr":"Zscaler ThreatLabz reports that phishing volume is declining but becoming more targeted and effective, with attackers using AI-generated sites, encrypted delivery, and real-time MFA-bypassing techniques to turn single clicks into session compromise. Security teams should focus on reducing exposed entry points, inspecting encrypted traffic, and stopping credential and session abuse earlier in the attack chain.","briefOverview":"\u003cp\u003eZscaler ThreatLabz’s 2026 Phishing and Initial Access Report describes how phishing remains a major path to enterprise compromise even as overall phishing volume has declined. The article says ThreatLabz observed phishing activity drop by about 20% year over year in both 2024 and 2025, but attackers are shifting toward more targeted and personalized lures. The report frames identity as the real perimeter and highlights reconnaissance, credential validation, encrypted delivery, and session compromise as key parts of the modern initial access chain.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that AI is accelerating phishing infrastructure, not just improving the quality of lures. ThreatLabz identified 413,524 AI-generated site instances and flagged 37,447 of them as malicious, with Manus AI, Blackbox AI, and Anything AI among attributed builders. It also describes campaigns using AI-powered site builders such as DeepSite AI, BlackBox AI, and Lovable AI to create convincing fake portals, lookalike pages, and malicious download portals.\u003c/p\u003e\n\n\u003cp\u003eA central technical concern is that phishing is increasingly delivered through encrypted channels and can defeat common login protections in real time. ThreatLabz found that 95.2% of phishing activity was delivered over encrypted channels and observed kits combining adversary-in-the-middle and browser-in-the-middle techniques to capture credentials and MFA codes during active login flows. The article recommends reducing exposed entry points, inspecting encrypted traffic, preventing compromise earlier, limiting lateral movement, and using deception telemetry to detect probing and credential-seeking behavior.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eZscaler ThreatLabz’s 2026 Phishing and Initial Access Report presents phishing as an evolving initial access problem rather than a disappearing one. The article says phishing volume declined by about 20% year over year in both 2024 and 2025, but it argues that attackers are recalibrating rather than retreating. Instead of relying mainly on broad “spray and pray” delivery, threat actors are using targeted, personalized lures that resemble routine work.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies the services industry as a major area of phishing growth, with hits rising 65.5% year over year from 330.9 million to 547.7 million. It says customer-facing and back-office workflows such as billing, renewals, support, onboarding, and document exchange provide convincing cover for phishing lures. These environments are described as attractive because speed and trust are normal parts of the work.\u003c/p\u003e\n\n\u003cp\u003eAI-generated infrastructure is a major focus of the report. ThreatL
