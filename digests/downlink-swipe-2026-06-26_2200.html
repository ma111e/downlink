<script type="application/json" id="dl-articles">[{"n":1,"title":"FBI: Russian hackers now target Signal backup recovery keys","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/fbi-russian-hackers-now-target-signal-backup-recovery-keys/","time":"22:06","priority":"MUST READ","score":94,"tldr":"The FBI and CISA warn that Russian intelligence-linked phishing campaigns are now tricking high-value Signal users into revealing Backup Recovery Keys, which lets attackers restore and read their historical messages. Users should never share Signal recovery keys and must generate a new key if one may have been exposed.","briefOverview":"\u003cp\u003eThe FBI and CISA warned that a phishing campaign targeting Signal users and tied to Russian intelligence services has evolved to steal Signal Backup Recovery Keys. The campaign targets individuals of high intelligence value, including current and former U.S. and international government officials, military personnel, political figures, journalists, and key officials in Ukraine. The agencies attribute the activity to Russian Intelligence Services, including officers embedded with Russia’s Federal Security Service Border Guards and other actors working on behalf of the Russian military.\u003c/p\u003e\n\n\u003cp\u003eThe attackers continue to impersonate Signal support teams and send messages falsely claiming that Signal is introducing mandatory two-factor verification after alleged attacks by hackers from Iran and post-Soviet countries. Victims are instructed to enable Signal backups and view their recovery key, then later told their data is at risk of permanent loss due to a synchronization issue and asked to paste the key into the message. Anyone with the Backup Recovery Key can restore the backed-up data on their own devices and access historical private and group messages.\u003c/p\u003e\n\n\u003cp\u003eThe FBI said creating a new Signal account with the same phone number does not invalidate a stolen Backup Recovery Key. Users must generate a new Backup Recovery Key through Signal’s backup settings to invalidate the previous key for future backup downloads. However, generating a new key will not prevent attackers from accessing backups they already downloaded using the compromised key.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The FBI and CISA warned that a phishing campaign tied to Russian intelligence services has evolved to steal Signal Backup Recovery Keys, which can allow attackers to access victims’ historical messages.","The campaign targets individuals of high intelligence value, including current and former US and international government officials, military personnel, political figures, journalists, and key officials located in Ukraine.","The FBI attributes the activity to Russian Intelligence Services, including officers embedded with Russia’s Federal Security Service Border Guards and other actors working on behalf of the Russian military, and says the campaign is publicly tracked as UNC5792 and UNC4221.","The attackers impersonate Signal support and instruct victims to enable Signal backups, copy the recovery key, and later paste it into a message under the false claim that their data is at risk of loss due to a synchronization issue.","The FBI warned that creating a new Signal account with the same phone number does not invalidate a stolen Backup Recovery Key, and users must generate a new key in Signal’s backup settings to invalidate the previous key for future backup downloads."],"insights":["The attackers are not breaking Signal’s end-to-end encryption; they are using phishing to obtain recovery keys that let them restore encrypted cloud backups on their own devices.","A stolen Signal Backup Recovery Key can remain useful even after a victim creates a new Signal account with the same phone number, so victims must specifically generate a new backup recovery key to invalidate the old one for future downloads.","Generating a new recovery key does not undo prior exposure, because it cannot stop attackers from accessing backups they already downloaded with the compromised key.","The phishing messages use detailed, app-specific instructions inside Signal’s backup settings, making the scam depend on persuading users to perform legitimate Signal actions and then share the resulting key."],"referencedReports":[{"title":"FBI Public Service Announcement PSA260626","url":"https://www.ic3.gov/PSA/2026/PSA260626","publisher":"FBI Internet Crime Complaint Center","context":"The article is based on an FBI public service announcement warning that Russian intelligence-linked actors are phishing Signal users for Backup Recovery Keys.","category":"","primary":false}],"body":"\u003cp\u003eThe FBI and CISA warned that a phishing campaign targeting Signal users and tied to Russian intelligence services has evolved to steal Signal Backup Recovery Keys. The campaign targets individuals of high intelligence value, including current and former U.S. and international government officials, military personnel, political figures, journalists, and key officials in Ukraine. The agencies attribute the activity to Russian Intelligence Services, including officers embedded with Russia’s Federal Security Service Border Guards and other actors working on behalf of the Russian military.\u003c/p\u003e\n\n\u003cp\u003eThe attackers continue to impersonate Signal support teams and send messages falsely claiming that Signal is introducing mandatory two-factor verification after alleged attacks by hackers from Iran and post-Soviet countries. Victims are instructed to enable Signal backups and view their recovery key, then later told their data is at risk of permanent loss due to a synchronization issue and asked to paste the key into the message. Anyone with the Backup Recovery Key can restore the backed-up data on their own devices and access historical private and group messages.\u003c/p\u003e\n\n\u003cp\u003eThe FBI said creating a new Signal account with the same phone number does not invalidate a stolen Backup Recovery Key. Users must generate a new Backup Recovery Key through Signal’s backup settings to invalidate the previous key for future backup downloads. However, generating a new key will not prevent attackers from accessing backups they already downloaded using the compromised key.\u003c/p\u003e\n"},{"n":2,"title":"The Hidden Attack Surface of Agentic AI: Securing AI Agent Integration Platforms","source":"cyera.com","sourceColorIdx":9,"link":"https://www.cyera.com/research/the-hidden-attack-surface-of-agentic-ai-securing-ai-agent-integration-platforms","time":"22:12","priority":"SHOULD READ","score":82,"tldr":"Cyera found widespread exposure of API keys for AI agent integration platforms like Composio, Nango, Arcade, and others, showing that leaked credentials can unlock broad access to connected tools such as email, code repositories, CI/CD systems, and enterprise apps. The key takeaway is that organizations need to inventory and govern their AI integration layer because a single exposed agent-platform key can create a large downstream breach path.","briefOverview":"\u003cp\u003eCyera researchers examined the AI integration layer across hundreds of organizations and found thousands of exposed credentials for platforms including Composio, Arcade, Nango, Tavily, Exa, LlamaIndex, Firecrawl, and others. The exposed owners included startup founders, CTOs, AI company executives, enterprise software vendors, and financial services organizations across North America, Europe, Africa, and APAC. The article says these platforms connect AI models and agents to enterprise systems, creating additional credentials, secrets, and trust relationships that many security teams have not mapped.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that AI integration platforms can become highly privileged points because they manage authentication, OAuth tokens, action execution, and access to downstream tools. In a Composio test, Cyera connected Gmail, GitHub, and CircleCI, then showed that a single read-only call returned the Gmail access token and refresh token, the GitHub bearer token, and the CircleCI API key. The article also describes Composio’s Proxy Execute API, which allowed fetching Gmail data through a leaked API key, and notes that rotating the Composio key would not stop downstream refresh tokens until each connected grant is revoked.\u003c/p\u003e\n\n\u003cp\u003eCyera found that MCP servers were the largest category by count, but the article says simply knowing an MCP server exists does not reveal what data it can access or what actions it can perform. The article states that organizations need more than inventory: they must understand what each integration can reach, what permissions agents hold through it, and what an attacker could gain from compromise. Cyera recommends building a continuously updated inventory of AI integration infrastructure, understanding the exposure of each integration, and enforcing controls on sensitive data access, excessive permissions, exposed secrets, unsanctioned applications, and risky integrations.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Cyera researchers found thousands of exposed credentials for AI integration platforms including Composio, Arcade, Nango, Tavily, Exa, LlamaIndex, Firecrawl, and other services across hundreds of organizations.","The article says AI integration platforms can become highly privileged points in an agent stack because a single integration may grant access to many downstream applications and services.","In Cyera’s Composio test, a read-only call returned a Gmail access token and refresh token, a GitHub bearer token, and a CircleCI API key from connected tools.","The article states that rotating a leaked Composio key may not end an incident because downstream refresh tokens can continue working until each connected service grant is revoked.","Cyera recommends that organizations build a continuously updated inventory of MCP servers, agent governance platforms, retrieval services, and integration providers, including unsanctioned and externally facing deployments."],"insights":["An asset inventory that only labels something as an “MCP server” is not enough to judge risk, because one MCP server may only expose a public knowledge base while another may reach production cloud environments or customer data.","AI integration platforms can turn convenience features into concentration risk, because one easy onboarding flow can connect email, source code, CI/CD, and other tools behind a single platform key.","Some leaked AI integration credentials may expose the underlying third-party tokens themselves, meaning the incident response must include revoking each downstream grant, not just rotating the integration platform key.","Search and retrieval services are described as less critical than agent authentication platforms, but the article highlights that a compromised search layer can still feed manipulated information into an agent’s decisions without an audit trail.","Cyera found exposed credentials belonging not only to general users but also to founders, CTOs, SVPs of Engineering, AI executives, and enterprise software vendors, including people responsible for building the AI systems at risk."],"referencedReports":[],"body":"\u003cp\u003eCyera researchers examined the AI integration layer across hundreds of organizations and found thousands of exposed credentials for platforms including Composio, Arcade, Nango, Tavily, Exa, LlamaIndex, Firecrawl, and others. The exposed owners included startup founders, CTOs, AI company executives, enterprise software vendors, and financial services organizations across North America, Europe, Africa, and APAC. The article says these platforms connect AI models and agents to enterprise systems, creating additional credentials, secrets, and trust relationships that many security teams have not mapped.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that AI integration platforms can become highly privileged points because they manage authentication, OAuth tokens, action execution, and access to downstream tools. In a Composio test, Cyera connected Gmail, GitHub, and CircleCI, then showed that a single read-only call returned the Gmail access token and refresh token, the GitHub bearer token, and the CircleCI API key. The article also describes Composio’s Proxy Execute API, which allowed fetching Gmail data through a leaked API key, and notes that rotating the Composio key would not stop downstream refresh tokens until each connected grant is revoked.\u003c/p\u003e\n\n\u003cp\u003eCyera found that MCP servers were the largest category by count, but the article says simply knowing an MCP server exists does not reveal what data it can access or what actions it can perform. The article states that organizations need more than inventory: they must understand what each integration can reach, what permissions agents hold through it, and what an attacker could gain from compromise. Cyera recommends building a continuously updated inventory of AI integration infrastructure, understanding the exposure of each integration, and enforcing controls on sensitive data access, excessive permissions, exposed secrets, unsanctioned applications, and risky integrations.\u003c/p\u003e\n"}]</script>
