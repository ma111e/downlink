<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

window.__DL_ARTICLES = [{"n":2,"title":"Official SAP npm packages compromised to steal credentials","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/official-sap-npm-packages-compromised-to-steal-credentials/","time":"22:43","priority":"MUST READ","score":92,"group":null,"groupColor":null,"tldr":"Multiple official SAP npm packages were compromised in a supply-chain attack that uses a malicious preinstall script to steal developer credentials and tokens, with researchers linking the threat actors to the TeamPCP group.","briefOverview":"\u003cp\u003eMultiple official SAP npm packages supporting the Cloud Application Programming Model and Cloud MTA were compromised in a supply-chain attack attributed to the TeamPCP threat actors. The affected packages include @cap-js/sqlite, @cap-js/postgres, @cap-js/db-service, and mbt, all of which have since been deprecated. Security researchers from Aikido and Socket discovered that the compromised packages contain a malicious preinstall script. This script automatically downloads the Bun JavaScript runtime from GitHub to execute a heavily obfuscated payload.\u003c/p\u003e\n\n\u003cp\u003eThe malware targets developer environments and CI/CD pipelines to steal a wide range of credentials, including authentication tokens, SSH keys, and cloud secrets. It also scrapes CI runner memory to extract secrets directly, bypassing standard log masking protections. Once collected, the stolen data is encrypted and uploaded to public GitHub repositories under the victim\u0026rsquo;s account. The attackers also use a dead-drop mechanism that searches GitHub commits for specific strings to retrieve additional tokens.\u003c/p\u003e\n\n\u003cp\u003eThe malware further attempts to self-propagate by modifying other packages using the newly stolen credentials. Researchers linked the attack to previous incidents involving Trivy, Checkmarx, and Bitwarden. SAP\u0026rsquo;s npm publishing process may have been compromised through a misconfigured CircleCI job that exposed an NPM token. SAP did not respond to inquiries at the time of publication.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMultiple official SAP npm packages were compromised in a supply-chain attack believed to be conducted by the TeamPCP threat actors. The affected packages, which support SAP\u0026rsquo;s Cloud Application Programming Model and Cloud MTA, include @cap-js/sqlite v2.2.2, @cap-js/postgres v2.2.2, @cap-js/db-service v2.10.1, and mbt v1.2.48. All four versions have been deprecated on NPM following the discovery. Security researchers from Aikido and Socket reported that the packages were modified to include a malicious preinstall script.\u003c/p\u003e\n\n\u003cp\u003eThis script executes automatically during installation and downloads the Bun JavaScript runtime from GitHub. The runtime is then used to execute a heavily obfuscated execution.js payload. The payload functions as an information stealer designed to extract credentials from both developer machines and CI/CD environments. It targets npm and GitHub authentication tokens, SSH keys, developer credentials, and cloud credentials for AWS, Azure, and Google Cloud.\u003c/p\u003e\n\n\u003cp\u003eThe malware also extracts Kubernetes configurations, CI/CD pipeline secrets, and environment variables. On CI runners, the payload executes an embedded Python script that reads process memory maps and memory files. This allows it to extract every secret matching a specific JSON pattern directly from the Runner.Worker process. This memory scanning technique bypasses all log masking applied by the CI platform.\u003c/p\u003e\n\n\u003cp\u003eOnce the data is collected, it is encrypted and uploaded to public GitHub repositories created under the victim\u0026rsquo;s account. These repositories feature the description \u0026ldquo;A Mini Shai-Hulud has Appeared,\u0026rdquo; mirroring strings from previous Bitwarden attacks. The malware also relies on GitHub commit searches as a dead-drop mechanism to retrieve tokens and gain further access. It searches commit messages for a specific string, decodes the base64 portion into GitHub tokens, and checks for repository access.\u003c/p\u003e\n\n\u003cp\u003eThe deployed payload includes code to self-propagate by using stolen credentials to modify other packages and repositories. Researchers have linked this attack to the TeamPCP group with medium confidence. SAP\u0026rsquo;s npm publishing process may have been compromised via a misconfigured CircleCI job that exposed an NPM token. SAP did not provide a response to inquiries at the time of publication.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"overview-attribution\"\u003eOverview \u0026amp; Attribution\u003c/h3\u003e\n\n\u003cp\u003eMultiple official SAP npm packages were compromised in a supply-chain attack attributed to the TeamPCP threat actors. Security researchers from Aikido and Socket identified the compromise and published technical analyses detailing the attack\u0026rsquo;s mechanics. The attack targets enterprise development workflows by infecting widely used SAP tooling packages.\u003c/p\u003e\n\n\u003ch3 id=\"compromised-assets\"\u003eCompromised Assets\u003c/h3\u003e\n\n\u003cp\u003eThe compromise impacted four specific packages that support SAP\u0026rsquo;s Cloud Application Programming Model and Cloud MTA. The affected versions are now deprecated on NPM and include @cap-js/sqlite v2.2.2, @cap-js/postgres v2.2.2, @cap-js/db-service v2.10.1, and mbt v1.2.48. These packages are commonly utilized in enterprise development environments.\u003c/p\u003e\n\n\u003ch3 id=\"attack-mechanism-payload-execution\"\u003eAttack Mechanism \u0026amp; Payload Execution\u003c/h3\u003e\n\n\u003cp\u003eThe malicious code was injected via a preinstall script that runs automatically during package installation. This script downloads the Bun JavaScript runtime from GitHub to bypass standard execution environments. The runtime then executes a heavily obfuscated execution.js payload. The payload operates as a comprehensive information stealer targeting both developer machines and CI/CD pipelines.\u003c/p\u003e\n\n\u003cp\u003eIt extracts npm and GitHub authentication tokens, SSH keys, developer credentials, and cloud credentials for AWS, Azure, and Google Cloud. It also targets Kubernetes configurations, CI/CD pipeline secrets, and environment variables. On CI runners, the malware executes an embedded Python script to perform memory scraping. The script reads /proc/\u003cpid\u003e/maps and /proc/\u003cpid\u003e/mem files for the Runner.Worker process.\u003c/p\u003e\n\n\u003cp\u003eIt extracts every secret matching the JSON pattern \u003ccode\u003e\u0026quot;key\u0026quot;:{ \u0026quot;value\u0026quot;: \u0026quot;...\u0026quot;, \u0026quot;isSecret\u0026quot;:true}\u003c/code\u003e directly from memory. This technique successfully bypasses all log masking applied by the CI platform. The memory scanning logic is structurally identical to tools used in previous Bitwarden and Checkmarx incidents.\u003c/p\u003e\n\n\u003ch3 id=\"data-exfiltration-dead-drop-tactics\"\u003eData Exfiltration \u0026amp; Dead-Drop Tactics\u003c/h3\u003e\n\n\u003cp\u003eCollected data is encrypted and uploaded to public GitHub repositories created under the victim\u0026rsquo;s account. These repositories are labeled with the description \u0026ldquo;A Mini Shai-Hulud has Appeared,\u0026rdquo; echoing strings from prior supply-chain campaigns. The malware also implements a dynamic dead-drop mechanism using GitHub commit searches. It scans commit messages for the string \u0026ldquo;OhNoWhatsGoingOnWithGitHub:\u003cbase64\u003e\u0026rdquo; to retrieve tokens.\u003c/p\u003e\n\n\u003cp\u003eThe base64 portion is decoded into GitHub tokens, which are then validated against repository access permissions. This approach eliminates the need for hardcoded command-and-control infrastructure. The dead-drop strategy allows attackers to dynamically distribute and rotate access tokens across compromised environments.\u003c/p\u003e\n\n\u003ch3 id=\"self-propagation-attribution-context\"\u003eSelf-Propagation \u0026amp; Attribution Context\u003c/h3\u003e\n\n\u003cp\u003eThe deployed payload contains self-propagation code designed to spread the infection further. Using newly stolen npm or GitHub credentials, the malware modifies other packages and repositories. It injects the same malicious code into these targets to expand its footprint. Researchers have linked this campaign to the TeamPCP threat actors with medium confidence.\u003c/p\u003e\n\n\u003cp\u003eThe group previously utilized similar code and tactics in supply-chain attacks against Trivy, Checkmarx, and Bitwarden. This pattern of memory scraping, dead-drop token retrieval, and self-propagation establishes a clear operational signature. The attack demonstrates how supply-chain compromises can rapidly escalate into widespread credential theft across enterprise CI/CD ecosystems.\u003c/p\u003e\n\n\u003ch3 id=\"vulnerability-vector-vendor-response\"\u003eVulnerability Vector \u0026amp; Vendor Response\u003c/h3\u003e\n\n\u003cp\u003eThe exact method by which the threat actors compromised SAP\u0026rsquo;s npm publishing process remains unconfirmed. Security Engineer Adnan Khan reported that an NPM token may have been exposed through a misconfigured CircleCI job. BleepingComputer contacted SAP for details regarding the compromise but did not receive a reply at the time of publication. The incident highlights the critical risks associated with automated preinstall scripts and CI/CD environment exposure.\u003c/p\u003e\n","keyPoints":["Multiple official SAP npm packages supporting the Cloud Application Programming Model were compromised in a supply-chain attack believed to be conducted by the TeamPCP threat actors.","The compromised packages contain a malicious preinstall script that downloads the Bun JavaScript runtime to execute a payload designed to steal credentials and authentication tokens from developer systems and CI/CD environments.","The malware exfiltrates stolen secrets by uploading encrypted data to public GitHub repositories under the victim's account and attempts to self-propagate by modifying other packages using the stolen credentials.","Security researchers linked the attack to previous incidents involving the Bitwarden and Checkmarx compromises, while SAP's npm publishing process may have been compromised via a misconfigured CircleCI job."],"insights":["The malware bypasses CI platform log masking by directly scanning CI runner memory to extract secrets matching a specific JSON pattern, rendering traditional log scrubbing ineffective.","The attack employs a dynamic dead-drop mechanism that searches GitHub commits for a specific string to decode and retrieve tokens, eliminating the need for hardcoded command-and-control infrastructure.","The payload abuses the npm preinstall lifecycle hook to download and execute the Bun JavaScript runtime from GitHub, demonstrating how package installation scripts can be weaponized to bypass standard dependency monitoring."],"referencedReports":[{"title":"Mini Shai-Hulud Has Appeared","url":"https://www.aikido.dev/blog/mini-shai-hulud-has-appeared","publisher":"Aikido","context":"The article cites this report as the source for technical details regarding the malicious preinstall script and payload execution."},{"title":"SAP CAP npm packages supply chain attack","url":"https://socket.dev/blog/sap-cap-npm-packages-supply-chain-attack","publisher":"Socket","context":"The article cites this report as the source for technical details regarding the malware's memory scanning capabilities and dead-drop mechanisms."}],"body":"\u003cp\u003eMultiple official SAP npm packages supporting the Cloud Application Programming Model and Cloud MTA were compromised in a supply-chain attack attributed to the TeamPCP threat actors. The affected packages include @cap-js/sqlite, @cap-js/postgres, @cap-js/db-service, and mbt, all of which have since been deprecated. Security researchers from Aikido and Socket discovered that the compromised packages contain a malicious preinstall script. This script automatically downloads the Bun JavaScript runtime from GitHub to execute a heavily obfuscated payload.\u003c/p\u003e\n\n\u003cp\u003eThe malware targets developer environments and CI/CD pipelines to steal a wide range of credentials, including authentication tokens, SSH keys, and cloud secrets. It also scrapes CI runner memory to extract secrets directly, bypassing standard log masking protections. Once collected, the stolen data is encrypted and uploaded to public GitHub repositories under the victim\u0026rsquo;s account. The attackers also use a dead-drop mechanism that searches GitHub commits for specific strings to retrieve additional tokens.\u003c/p\u003e\n\n\u003cp\u003eThe malware further attempts to self-propagate by modifying other packages using the newly stolen credentials. Researchers linked the attack to previous incidents involving Trivy, Checkmarx, and Bitwarden. SAP\u0026rsquo;s npm publishing process may have been compromised through a misconfigured CircleCI job that exposed an NPM token. SAP did not respond to inquiries at the time of publication.\u003c/p\u003e\n"},{"n":3,"title":"Popular WordPress redirect plugin hid dormant backdoor for years","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/popular-wordpress-redirect-plugin-hid-dormant-backdoor-for-years/","time":"22:13","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"A widely installed WordPress redirect plugin contained a dormant backdoor that enabled arbitrary code execution and SEO spam for years, prompting researchers to urge users to immediately uninstall it and replace it with a clean version.","briefOverview":"\u003cp\u003eThe Quick Page/Post Redirect WordPress plugin, installed on over 70,000 sites, contained a dormant backdoor that was added in 2020. Austin Ginder, founder of Anchor hosting, discovered the threat after security alerts triggered on twelve of his sites. Versions 5.2.1 and 5.2.2 included a hidden self-update mechanism that directed installations to an external domain for arbitrary code execution.\u003c/p\u003e\n\n\u003cp\u003eIn March 2021, affected sites silently received a tampered version containing a passive backdoor that operated exclusively for logged-out users. The backdoor hooked into content filters to fetch data for cloaked parasite SEO spam operations. Although the malicious server no longer resolves, the vulnerable update mechanism remains active on all 70,000 installations. WordPress.org has temporarily removed the plugin pending a review, and researchers strongly advise users to uninstall it immediately.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Quick Page/Post Redirect plugin, a basic WordPress utility with over 70,000 installations, was found to contain a dormant backdoor added five years ago. Austin Ginder, founder of the WordPress hosting provider Anchor, uncovered the malware after twelve sites on his network triggered security alerts.\u003c/p\u003e\n\n\u003cp\u003eOfficial versions 5.2.1 and 5.2.2, released between 2020 and 2021, contained a hidden self-update mechanism that pointed to a third-party domain. This mechanism allowed attackers to push arbitrary code directly to user sites, bypassing WordPress.org’s official distribution controls. By February 2021, the malicious self-updater was removed from the official plugin directory, but the damage had already been done.\u003c/p\u003e\n\n\u003cp\u003eIn March 2021, sites running the compromised versions silently received a tampered 5.2.3 build from the external server. This tampered build introduced a passive backdoor that triggered exclusively for logged-out users to avoid detection by site administrators. The malicious code hooked into the WordPress content filter to fetch external data, which was used to run cloaked parasite SEO spam campaigns.\u003c/p\u003e\n\n\u003cp\u003eWhile the backdoor itself is currently dormant because the malicious subdomain no longer resolves, the underlying update vulnerability remains active across all affected installations. WordPress.org has temporarily pulled the plugin from its directory pending a security review. The investigation has not determined whether the plugin author intentionally added the backdoor or if their account was compromised by a third party.\u003c/p\u003e\n\n\u003cp\u003eResearchers warn that the 70,000 affected sites still maintain an update check pointing to the compromised external server. The recommended mitigation is to immediately uninstall the plugin and replace it with a clean copy of version 5.2.4 once it is restored to the official directory. Additionally, researchers have urged the party controlling the backdoor to publish a static update manifest that would force all compromised sites to automatically upgrade to the clean version.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch1 id=\"incident-overview\"\u003eIncident Overview\u003c/h1\u003e\n\n\u003cp\u003eThe Quick Page/Post Redirect WordPress plugin, a basic utility used for managing redirects across posts, pages, and custom URLs, was discovered to contain a dormant backdoor. The threat was identified by Austin Ginder, founder of the WordPress hosting provider Anchor, after security alerts triggered on twelve sites within his fleet. The backdoor was originally injected into the plugin code approximately five years prior to the discovery. WordPress.org has temporarily removed the plugin from its official directory while a security review is conducted.\u003c/p\u003e\n\n\u003ch1 id=\"vulnerability-mechanism-and-timeline\"\u003eVulnerability Mechanism and Timeline\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eVersions 5.2.1 and 5.2.2, released between 2020 and 2021, contained a hidden self-update mechanism.\u003c/li\u003e\n\u003cli\u003eThis mechanism directed installations to a third-party domain, anadnet[.]com, enabling the push of arbitrary code outside of WordPress.org’s control.\u003c/li\u003e\n\u003cli\u003eIn February 2021, the malicious self-updater was stripped from subsequent official releases before code reviewers could scrutinize it.\u003c/li\u003e\n\u003cli\u003eBy March 2021, sites running the vulnerable versions silently received a tampered 5.2.3 build from the external server.\u003c/li\u003e\n\u003cli\u003eThis tampered build featured a different cryptographic hash than the legitimate version sourced from WordPress.org.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"malicious-activity-and-impact\"\u003eMalicious Activity and Impact\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe injected backdoor was designed to operate passively and exclusively for logged-out users, effectively hiding its activity from site administrators.\u003c/li\u003e\n\u003cli\u003eThe code hooked into the WordPress the_content filter to fetch external data from the anadnet server.\u003c/li\u003e\n\u003cli\u003eResearchers identified the activity as cloaked parasite SEO, where the compromised plugins rented Google search rankings across seventy thousand websites.\u003c/li\u003e\n\u003cli\u003eThe actual backdoor functionality remains dormant because the malicious command-and-control subdomain no longer resolves, though the parent domain remains active.\u003c/li\u003e\n\u003cli\u003eThe primary security risk stems from the original self-update mechanism, which enabled arbitrary code execution on demand and remains present on all affected installations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch1 id=\"remediation-and-researcher-recommendations\"\u003eRemediation and Researcher Recommendations\u003c/h1\u003e\n\n\u003cul\u003e\n\u003cli\u003eWordPress.org has withheld the plugin pending a review, leaving site owners without an official update path.\u003c/li\u003e\n\u003cli\u003eResearchers strongly advise impacted users to immediately uninstall the Quick Page/Post Redirect plugin.\u003c/li\u003e\n\u003cli\u003eSite administrators should wait for the restoration of version 5.2.4 on the official directory and install a clean copy.\u003c/li\u003e\n\u003cli\u003eAustin Ginder has publicly urged the party controlling the backdoor to publish a static update manifest.\u003c/li\u003e\n\u003cli\u003eSuch a manifest would force all seventy thousand affected installations to automatically upgrade to the clean WordPress.org version, effectively purging the dormant backdoor from compromised sites.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["The Quick Page/Post Redirect WordPress plugin, installed on over 70,000 sites, contained a dormant backdoor added in 2020 that allowed arbitrary code injection.","Versions 5.2.1 and 5.2.2 included a hidden self-update mechanism that directed sites to an external server to silently install a tampered version with a passive backdoor.","The backdoor operates exclusively for logged-out users and hooks into the content filter to fetch data from an external domain for cloaked parasite SEO spam.","Although the malicious external server no longer resolves, the vulnerable self-update mechanism remains active on compromised sites, prompting researchers to recommend immediate uninstallation and replacement with a clean version."],"insights":["The backdoor is cloaked to trigger exclusively for logged-out users, effectively hiding malicious activity from site administrators while serving SEO spam.","Although the malicious external server no longer resolves, the underlying self-update vulnerability remains active on 70,000 installations, allowing for potential future exploitation.","The attacker could potentially force a mass remediation by publishing a static update manifest that overrides the malicious update channel with the clean WordPress.org version."],"referencedReports":[],"body":"\u003cp\u003eThe Quick Page/Post Redirect WordPress plugin, installed on over 70,000 sites, contained a dormant backdoor that was added in 2020. Austin Ginder, founder of Anchor hosting, discovered the threat after security alerts triggered on twelve of his sites. Versions 5.2.1 and 5.2.2 included a hidden self-update mechanism that directed installations to an external domain for arbitrary code execution.\u003c/p\u003e\n\n\u003cp\u003eIn March 2021, affected sites silently received a tampered version containing a passive backdoor that operated exclusively for logged-out users. The backdoor hooked into content filters to fetch data for cloaked parasite SEO spam operations. Although the malicious server no longer resolves, the vulnerable update mechanism remains active on all 70,000 installations. WordPress.org has temporarily removed the plugin pending a review, and researchers strongly advise users to uninstall it immediately.\u003c/p\u003e\n"},{"n":1,"title":"House approves spy program on second attempt, Senate fate murky","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/house-approves-spy-program-on-second-attempt","time":"22:41","priority":"SHOULD READ","score":82,"group":null,"groupColor":null,"tldr":"The House passed a three-year renewal for warrantless surveillance under Section 702, but the legislation faces a critical roadblock in the Senate where GOP leaders oppose it due to a contentious digital currency amendment.","briefOverview":"\u003cp\u003eThe House of Representatives voted 235-191 to renew Section 702 of the Foreign Intelligence Surveillance Act for three years. This legislation permits warrantless surveillance of foreigners by U.S. intelligence agencies. The bill now advances to the Senate just one day before the current authority expires. Senate Republican leaders have publicly stated they will not support the House version due to a controversial rider banning Federal Reserve digital currency. Privacy advocates strongly oppose the measure, arguing it lacks meaningful reforms. Critics note the bill does not require warrants to query Americans\u0026rsquo; communications. Despite these concerns, House Intelligence Committee Chair Rick Crawford defended the legislation. He emphasized that the bill adds Fourth Amendment safeguards and penalties for privacy violations. He urged the Senate to approve the measure to maintain critical national security tools.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe House of Representatives approved a three-year extension of Section 702 of the Foreign Intelligence Surveillance Act on Wednesday. The legislation passed with a vote of 235-191 and preserves warrantless surveillance capabilities targeting foreigners. This authority has long been contested by privacy advocates and libertarians who seek stricter limits. National security officials maintain that these powers are essential for combating cyberattacks and foreign threats. The bill now moves to the Senate with only one day remaining before the current authorization lapses. Senate Republican leaders have indicated they will block the House bill because it includes a permanent ban on the Federal Reserve issuing a digital currency. This rider was added to the surveillance bill as a strategic maneuver to win over ultra-right conservatives. The Senate may instead draft and pass an independent version of the renewal just hours before the deadline. The Trump administration initially sought a clean 18-month reauthorization, which quickly gained Republican backing. However, conservative opposition initially sank an earlier vote and prolonged negotiations for weeks. To secure enough votes, GOP leaders incorporated additional Fourth Amendment safeguards and stricter penalties for privacy violations. House Intelligence Committee Chair Rick Crawford praised the compromise, stating it strengthens oversight while preserving vital security tools. He formally called on the Senate to support the legislation. Conversely, Jake Laperruque of the Center for Democracy and Technology condemned the bill. He described the measure as containing no meaningful reforms or warrants for querying Americans\u0026rsquo; data. He warned that the legislation fails to prevent past or future surveillance abuses.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eLegislative Progress and Voting Outcome\u003c/strong\u003e\nThe House of Representatives voted 235-191 on Wednesday to renew Section 702 of the Foreign Intelligence Surveillance Act.\nThe extension grants a three-year window for warrantless surveillance of foreign individuals.\nThis legislative action follows a failed vote earlier in the month that was derailed by conservative opposition.\nThe Trump administration initially proposed a clean 18-month reauthorization, a proposal that quickly secured Republican support.\nNegotiations were prolonged for weeks until GOP leaders agreed to add policy concessions.\nThese concessions included additional Fourth Amendment safeguards and tougher penalties for privacy violations.\nHouse Intelligence Committee Chair Rick Crawford endorsed the final product.\nHe stated that the bill delivers measurable reforms to enhance oversight and accountability.\nHe also emphasized that the legislation maintains the critical utility of this national security instrument.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eSenate Obstacles and Procedural Uncertainty\u003c/strong\u003e\nThe bill now faces an uncertain path in the Senate, arriving just one day before the current authority expires.\nSenate Republican leadership has publicly committed to opposing the House version.\nThis opposition stems from a controversial rider that permanently bans the Federal Reserve from issuing a digital currency.\nLawmakers added this rider to the surveillance bill as a strategic maneuver to win over ultra-right conservatives.\nSenate leadership may instead draft and pass an independent version of the renewal.\nThis alternative approach could send the legislation back to the House mere hours before the deadline.\nThe procedural standoff highlights significant friction between the chambers regarding both surveillance powers and unrelated financial policy.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eStakeholder Reactions and Policy Critiques\u003c/strong\u003e\nPrivacy advocates and civil liberties groups have strongly criticized the House passage.\nJake Laperruque, deputy director for the Center for Democracy and Technology’s Security and Surveillance Project, condemned the legislation.\nHe characterized the bill as entirely lacking in meaningful reforms.\nCritics specifically note that the measure does not mandate warrants for querying Americans\u0026rsquo; communications.\nLaperruque argued that the legislation contains no provisions to prevent previously observed surveillance abuses.\nHe further warned that the bill fails to establish safeguards against potential future overreach.\nWhile national security officials defend the program as essential for combating cyberattacks and foreign threats, privacy hawks continue to view the extension as a regression in digital rights.\nThe House ultimately prioritized the preservation of intelligence capabilities over comprehensive privacy reforms.\u003c/p\u003e\n","keyPoints":["The House voted 235-191 to renew Section 702 of the Foreign Intelligence Surveillance Act for three years, allowing warrantless surveillance of foreigners.","Senate GOP leaders oppose the House bill because it includes a permanent ban on the Federal Reserve issuing a digital currency.","Privacy advocates criticize the legislation for lacking meaningful reforms and failing to require warrants for querying Americans' messages.","The bill includes additional Fourth Amendment safeguards and penalties for privacy violations to address conservative opposition."],"insights":["Legislative riders, specifically a Federal Reserve digital currency ban, were strategically attached to the surveillance bill to secure ultra-right conservative votes, revealing how unrelated policy conflicts can dictate national security outcomes.","The legislation maintains warrantless access to foreign communications while explicitly omitting warrants for querying Americans' data, highlighting a deliberate policy trade-off that limits domestic privacy protections.","Senate opposition to the digital currency rider creates a procedural standoff that risks a last-minute legislative ping-pong or authority lapse just hours before the three-year extension expires.","The bill introduces punitive measures and Fourth Amendment safeguards to address conservative concerns, yet privacy advocates argue these additions fail to mandate warrants for domestic data queries, limiting their practical impact on surveillance oversight."],"referencedReports":[],"body":"\u003cp\u003eThe House of Representatives voted 235-191 to renew Section 702 of the Foreign Intelligence Surveillance Act for three years. This legislation permits warrantless surveillance of foreigners by U.S. intelligence agencies. The bill now advances to the Senate just one day before the current authority expires. Senate Republican leaders have publicly stated they will not support the House version due to a controversial rider banning Federal Reserve digital currency. Privacy advocates strongly oppose the measure, arguing it lacks meaningful reforms. Critics note the bill does not require warrants to query Americans\u0026rsquo; communications. Despite these concerns, House Intelligence Committee Chair Rick Crawford defended the legislation. He emphasized that the bill adds Fourth Amendment safeguards and penalties for privacy violations. He urged the Senate to approve the measure to maintain critical national security tools.\u003c/p\u003e\n"}];

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}

      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
