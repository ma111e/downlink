ed a concentrated exploitation surge on June 7 with 4 million blocked requests, indicating mass scanning or automated exploitation rather than isolated probing."],"referencedReports":[{"title":"Attackers Actively Exploiting Sensitive Information Exposure Vulnerability in Gravity SMTP Plugin","url":"https://www.wordfence.com/blog/2026/06/attackers-actively-exploiting-sensitive-information-exposure-vulnerability-in-gravity-smtp-plugin/","publisher":"Wordfence","context":"The article cites Wordfence researchers warning that attackers are actively exploiting the Gravity SMTP information disclosure vulnerability and that exposed credentials and system details can aid further attacks.","category":"advisory","primary":true},{"title":"Critical Unauthenticated Arbitrary File Deletion Vulnerability Patched in Avada Builder WordPress Plugin","url":"https://www.wordfence.com/blog/2026/06/critical-unauthenticated-arbitrary-file-deletion-vulnerability-patched-in-avada-builder-wordpress-plugin/","publisher":"Wordfence","context":"The article references a separate Wordfence advisory about CVE-2026-8713 in the Avada Builder WordPress plugin.","category":"advisory","primary":false}],"body":"\u003cp\u003eThreat actors are actively exploiting CVE-2026-4020, an unauthenticated information disclosure vulnerability in the Gravity SMTP WordPress plugin, which is active on 100,000 sites. The flaw affects Gravity SMTP versions 2.1.4 and older and was fixed in version 2.1.5, released on March 17. Defiant warned that hackers are exploiting the issue, and Wordfence said its firewall has blocked more than 17 million attempts against protected customers.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability comes from an exposed REST API endpoint whose \u003ccode\u003epermission_callback\u003c/code\u003e always returns \u003ccode\u003etrue\u003c/code\u003e, allowing unauthenticated GET requests to receive a JSON “System Report” generated by the plugin. The exposed data may include API keys, secrets, OAuth tokens, third-party email service credentials, WordPress configuration details, server and PHP environment information, and database configuration details. Wordfence warned that the exposed credentials could let attackers abuse connected email services, while the system report can reduce the effort needed to plan further attacks.\u003c/p\u003e\n\n\u003cp\u003eWordfence reported that exploitation activity spiked on June 7, when 4 million requests were blocked, with similar activity continuing for several days afterward. A key indicator of compromise is requests to \u003ccode\u003e/wp-json/gravitysmtp/v1/tests/mock-data\u003c/code\u003e in web server access logs, particularly with the \u003ccode\u003e?page=gravitysmtp-settings\u003c/code\u003e query parameter. The article also notes a separate Wordfence advisory for CVE-2026-8713, a critical unauthenticated arbitrary file-deletion flaw in the Avada Builder WordPress plugin fixed in version 3.15.4.\u003c/p\u003e\n"},{"n":4,"title":"15 Malicious JetBrains Plugins Stole AI API Keys from 70,000 Developers","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/jetbrains-malicious-plugins-ai-api-key-theft","time":"20:44","priority":"MUST READ","score":90,"tldr":"JetBrains removed 15 malicious Marketplace plugins that posed as AI developer tools but stole users’ AI API keys and sent them to a live command-and-control server in China. Developers who installed any affected plugins should uninstall them, rotate exposed keys, and audit AI usage and billing for abuse.","briefOverview":"\u003cp\u003eOn June 16, 2026, JetBrains received security reports about a coordinated supply chain attack involving 15 malicious third-party plugins on the JetBrains Marketplace. The plugins were published under seven vendor accounts and posed as legitimate AI-powered developer tools for code review, unit test generation, Git commit message writing, and chat features. JetBrains removed all 15 plugins, permanently banned the seven publisher accounts, and triggered a remote kill-switch to disable the extensions inside IDEs upon relaunch.\u003c/p\u003e\n\n\u003cp\u003eThe campaign ran for approximately eight months, from late October 2025 through June 2026, and accumulated roughly 70,000 total installations. The two most recent plugins, CodeGPT AI Assistant and DeepSeek AI Assist, were published on June 9 and June 10, 2026 and accounted for more than 53,000 downloads. JetBrains confirmed that no internal systems, source code, or corporate infrastructure were compromised.\u003c/p\u003e\n\n\u003cp\u003eThe plugins captured AI provider API keys when developers entered them into plugin settings and clicked Apply, then exfiltrated the keys over unencrypted HTTP to a hardcoded command-and-control server at 39.107.60.51. The code checked for keys starting with sk- and 51 characters long, used deduplication to avoid sending duplicate keys, and posted JSON payloads with a static X-Api-Key header. StepSecurity independently confirmed on June 19, 2026 that the C2 server was still live and responding to API requests, and the article advises affected users to uninstall the plugins, revoke and rotate exposed keys, block the C2 server, and audit API usage and billing.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["JetBrains received security reports on June 16, 2026 identifying 15 malicious third-party plugins on the JetBrains Marketplace that masqueraded as legitimate AI-powered developer tools.","The plugins stole AI provider API keys entered into their settings and exfiltrated them over unencrypted HTTP to the hardcoded command-and-control server at 39.107.60.51.","The campaign ran from late October 2025 through June 2026 and accumulated roughly 70,000 total installations across plugins published under seven vendor accounts.","JetBrains removed all 15 plugins from the Marketplace, permanently banned the seven publisher accounts, and triggered a remote kill-switch that disables the extensions inside IDEs upon relaunch.","StepSecurity independently confirmed on June 19, 2026 that the command-and-control server at 39.107.60.51 was still live and actively responding to API requests."],"insights":["The plugins used a deduplication check before exfiltrating keys, which reduced repeated network transmissions and likely made the malicious activity less noisy in monitoring data.","The stolen API keys were sent over plaintext HTTP, making the exfiltration detectable through network inspection despite the plugins’ attempt to suppress TLS certificate warnings inside the JVM.","The campaign’s two newest plugins accounted for more than 53,000 of the roughly 70,000 total installations, concentrating much of the exposure in the final days before discovery.","The donation wall allegedly returned working API keys from the C2 server to paying users, creating a fraud cycle in which stolen credentials could be used to fund other users’ AI activity.","A live C2 server after Marketplace removal means rotating exposed API keys remains urgent because removing or disabling the plugins alone does not prevent continued abuse of already stolen keys."],"referencedReports":[{"title":"JetBrains Marketplace Ecosystem Security Update: Addressing Malicious Third-Party AI Plugins","url":"https://blog.jetbrains.com/platform/2026/06/marketplace-ecosystem-security-update-malicious-ai-plugins/","publisher":"JetBrains","context":"The article cites this as the JetBrains official advisory describing the malicious third-party AI plugins and JetBrains’ response.","category":"advisory","primary":true}],"body":"\u003cp\u003eOn June 16, 2026, JetBrains received security reports about a coordinated supply chain attack involving 15 malicious third-party plugins on the JetBrains Marketplace. The plugins were published under seven vendor accounts and posed as legitimate AI-powered developer tools for code review, unit test generation, Git commit message writing, and chat features. JetBrains removed all 15 plugins, permanently banned the seven publisher accounts, and triggered a remote kill-switch to disable the extensions inside IDEs upon relaunch.\u003c/p\u003e\n\n\u003cp\u003eThe campaign ran for approximately eight months, from late October 2025 through June 2026, and accumulated roughly 70,000 total installations. The two most recent plugins, CodeGPT AI Assistant and DeepSeek AI Assist, were published on June 9 and June 10, 2026 and accounted for more than 53,000 downloads. JetBrains confirmed that no internal systems, source code, or corporate infrastructure were compromised.\u003c/p\u003e\n\n\u003cp\u003eThe plugins captured AI provider API keys when developers entered them into plugin settings and clicked Apply, then exfiltrated the keys over unencrypted HTTP to a hardcoded command-and-control server at 39.107.60.51. The code checked for keys starting with sk- and 51 characters long, used deduplication to avoid sending duplicate keys, and posted JSON payloads with a static X-Api-Key header. StepSecurity independently confirmed on June 19, 2026 that the C2 server was still live and responding to API requests, and the article advises affected users to uninstall the plugins, revoke and rotate exposed keys, block the C2 server, and audit API usage and billing.\u003c/p\u003e\n"},{"n":2,"title":"The Gentlemen RaaS Uses GentleKiller EDR Framework Targeting 400 Security Processes","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/the-gentlemen-raas-uses-gentlekiller.html","time":"18:33","priority":"SHOULD READ","score":86,"tldr":"The Gentlemen ransomware group is centrally providing affiliates with a standardized EDR-killer toolkit, GentleKiller, that uses BYOVD techniques to disable hundreds of security processes before encryption. ESET says the group rapidly incorporates newly disclosed vulnerable-driver exploits and third-party tools, making it unusually agile and attractive to affiliates.","briefOverview":"\u003cp\u003eThe Gentlemen ransomware-as-a-service operation is actively developing and maintaining endpoint detection and response killers that it provides to affiliates before deploying its encryptor. ESET said this toolset centers on a framework called GentleKiller and also incorporates third-party or leaked tools such as HexKiller, ThrottleBlood, and HavocKiller. The group has been active since March 2025 and has claimed 504 victims, with most located in Southeast Asia, South America, and Western Europe.\u003c/p\u003e\n\n\u003cp\u003eESET described The Gentlemen as one of the most technically agile RaaS groups because it can quickly operationalize newly disclosed proof-of-concept exploits related to bring your own vulnerable driver techniques, sometimes within days of public release. GentleKiller has eight variants, each mimicking a different legitimate product and abusing a different vulnerable or malicious driver. The framework targets 400 processes associated with 48 distinct security programs from multiple vendors.\u003c/p\u003e\n\n\u003cp\u003eThe tools use a shared defense-evasion layer that impersonates security vendors with fake version information, copied legitimate certificates, and icons, while also using binary protection such as Enigma or Themida. ESET said the common structure across the variants suggests a shared development template designed for ease of deployment and operational flexibility for affiliates. The article also notes ESET’s detection of a Rust-based credential stealer called OxideHarvest and a CERT/CC advisory about vendor-signed UEFI applications vulnerable to Secure Boot bypass through a BYOVD attack.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The Gentlemen ransomware-as-a-service operation is developing and maintaining EDR-killing tools that it provides to affiliates for impairing defenses before deploying its encryptor.","ESET said the group’s main framework, GentleKiller, has eight variants that impersonate legitimate security products and abuse vulnerable or malicious drivers through bring your own vulnerable driver techniques.","GentleKiller targets 400 processes associated with 48 distinct security programs from multiple vendors.","ESET reported that The Gentlemen can quickly operationalize newly disclosed proof-of-concept BYOVD exploits, often within days of public release.","ESET also detected a Rust-based credential stealer called OxideHarvest that can harvest data from several popular web browsers."],"insights":["The Gentlemen’s centralized EDR-killer suite materially lowers the technical barrier for affiliates, making the RaaS operation more attractive compared with groups that leave defense evasion to individual affiliates.","The group’s EDR killers use a shared defense-evasion layer with fake vendor metadata, copied legitimate certificates, and legitimate-looking icons, so defenders should not rely on file appearance or version information to assess trustworthiness.","ESET found structural and behavioral similarities across GentleKiller variants, indicating that The Gentlemen can rapidly add newly abused drivers through a reusable development template rather than building each tool from scratch.","The repeated abuse of drivers such as PoisonX.sys across separate campaigns shows that newly disclosed BYOVD techniques can quickly move between ransomware ecosystems and should be prioritized for monitoring and blocking.","CERT/CC’s related Secure Boot bypass advisory highlights that BYOVD risks extend beyond operating-system runtime defenses into the pre-boot phase when trusted vulnerable UEFI applications remain allowed."],"referencedReports":[{"title":"Killing me gently: Inside The Gentlemen’s EDR killer framework","url":"https://www.welivesecurity.com/en/eset-research/killing-me-gently-inside-gentlemens-edr-killer-framework/","publisher":"ESET","context":"The article is primarily based on ESET research describing The Gentlemen’s GentleKiller framework and related EDR-killing tools.","category":"research","primary":true},{"title":"Reverse Engineering a 0-Day PoisonX BYOVD Driver Bypasses CrowdStrike EDR","url":"https://threatlabsnews.xcitium.com/blog/reverse-engineering-a-0-day-poisonx-byovd-driver-bypasses-crowdstrike-edr/","publisher":"Xcitium Threat Labs","context":"The article cites Xcitium’s analysis as an example of recent abuse of PoisonX.sys in BYOVD attacks used to kill CrowdStrike Falcon EDR.","category":"research","primary":false},{"title":"Uptick in Bomgar Exploitation","url":"https://www.huntress.com/blog/uptick-bomgar-exploitation","publisher":"Huntress","context":"The article references Huntress research detailing an intrusion where attackers used BeyondTrust Remote Support and terminated security tools with PoisonX.sys and hrwfpdrv.sys before deploying ransomware.","category":"research","primary":false}],"body":"\u003cp\u003eThe Gentlemen ransomware-as-a-service operation is actively developing and maintaining endpoint detection and response killers that it provides to affiliates before deploying its encryptor. ESET said this toolset centers on a framework called GentleKiller and also incorporates third-party or leaked tools such as HexKiller, ThrottleBlood, and HavocKiller. The group has been active since March 2025 and has claimed 504 victims, with most located in Southeast Asia, South America, and Western Europe.\u003c/p\u003e\n\n\u003cp\u003eESET described The Gentlemen as one of the most technically agile RaaS groups because it can quickly operationalize newly disclosed proof-of-concept exploits related to bring your own vulnerable driver techniques, sometimes within days of public release. GentleKiller has eight variants, each mimicking a different legitimate product and abusing a different vulnerable or malicious driver. The framework targets 400 processes associated with 48 distinct security programs from multiple vendors.\u003c/p\u003e\n\n\u003cp\u003eThe tools use a shared defense-evasion layer that impersonates security vendors with fake version information, copied legitimate certificates, and icons, while also using binary protection such as Enigma or Themida. ESET said the common structure across the variants suggests a shared development template designed for ease of deployment and operational flexibility for affiliates. The article also notes ESET’s detection of a Rust-based credential stealer called OxideHarvest and a CERT/CC advisory about vendor-signed UEFI applications vulnerable to Secure Boot bypass through a BYOVD attack.\u003c/p\u003e\n"},{"n":3,"title":"Unpatchable 'usbliter8' Exploit Breaks Apple A12 and A13 SecureROM Boot Chain","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/unpatchable-usbliter8-exploit-breaks.html","time":"18:37","priority":"SHOULD READ","score":84,"tldr":"Researchers released usbliter8, an unpatchable SecureROM exploit for Apple A12/A13 and related chips that enables privileged code execution via USB in DFU mode with physical access. Most users face low risk, but sensitive environments should treat affected devices as permanently vulnerable if an attacker can control USB/DFU access.","briefOverview":"\u003cp\u003eSecurity researchers at Paradigm Shift published a working exploit called \u003cstrong\u003eusbliter8\u003c/strong\u003e that achieves arbitrary code execution inside the SecureROM of Apple A12 and A13 chips. Because SecureROM is burned into silicon at manufacture, the article says no software update can reach the flaw. The exploit is not remote and requires physical possession of the device, DFU mode, and a USB connection to a dedicated RP2350-based microcontroller board.\u003c/p\u003e\n\n\u003cp\u003eThe public proof of concept supports A12, A13, S4, and S5 SoCs, with A12X and A12Z described as theoretically possible but not yet implemented. Affected device families include iPhone XS/XR and iPhone 11 models, the iPhone SE 2nd generation, several iPads, Apple Watch Series 4 and 5, the first-generation Apple Watch SE, and the HomePod mini. A11 is not affected, while A14 and later appear to be out of reach for this exploit path.\u003c/p\u003e\n\n\u003cp\u003eThe root issue is described as a hardware flaw in the Synopsys DWC2 USB controller, where handling of smaller-than-standard Setup packets can create a repeatable buffer underflow. On A12 and A13, Apple’s USB DART configuration in SecureROM runs in bypass mode, allowing the underflowing DMA pointer to overwrite arbitrary SRAM. The article says the exploit can temporarily demote the SoC’s production mode or boot a raw, unsigned iBoot image, but it does not show a Secure Enclave compromise.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Paradigm Shift published a working exploit called usbliter8 that achieves arbitrary code execution inside the SecureROM of Apple A12 and A13 chips.","The exploit requires physical possession of the device, DFU mode, a USB connection to a dedicated RP2350-based microcontroller board, and completes in under two seconds before Apple’s signed boot chain loads.","The public proof of concept supports A12, A13, S4, and S5 SoCs, while A12X and A12Z support is described as theoretically possible but not implemented.","The root issue is a hardware flaw in the Synopsys DWC2 USB controller combined with Apple configuring the USB DART in bypass mode on affected devices, allowing an underflowing DMA pointer to overwrite arbitrary SRAM.","As of June 19, 2026, no CVE, CVSS score, Apple security advisory, CISA alert, or publicly reported in-the-wild exploitation had been issued."],"insights":["For high-security environments, affected A12, A13, S4, and S5 devices should be treated as a device-custody and hardware-retirement issue because the flaw cannot be fixed by firmware updates.","A14 and later devices are the preferred refresh target because the article says they appear to configure DART correctly and are out of reach for this exploit path.","The practical exposure depends heavily on physical USB control, making untrusted cables, hosts, and DFU-mode access the most important operational risks to manage.","The exploit does not demonstrate a Secure Enclave compromise, so its confirmed impact is control of the application processor’s SecureROM rather than a direct break of Apple’s separate Secure Enclave boundary."],"referencedReports":[{"title":"usbliter8 technical write-up","url":"https://ps.tc/pages/blog-usbliter8.html","publisher":"Paradigm Shift","context":"The article says Paradigm Shift published the full technical write-up for the usbliter8 SecureROM exploit on June 18, 2026.","category":"research","primary":true}],"body":"\u003cp\u003eSecurity researchers at Paradigm Shift published a working exploit called \u003cstrong\u003eusbliter8\u003c/strong\u003e that achieves arbitrary code execution inside the SecureROM of Apple A12 and A13 chips. Because SecureROM is burned into silicon at manufacture, the article says no software update can reach the flaw. The exploit is not remote and requires physical possession of the device, DFU mode, and a USB connection to a dedicated RP2350-based microcontroller board.\u003c/p\u003e\n\n\u003cp\u003eThe public proof of concept supports A12, A13, S4, and S5 SoCs, with A12X and A12Z described as theoretically possible but not yet implemented. Affected device families include iPhone XS/XR and iPhone 11 models, the iPhone SE 2nd generation, several iPads, Apple Watch Series 4 and 5, the first-generation Apple Watch SE, and the HomePod mini. A11 is not affected, while A14 and later appear to be out of reach for this exploit path.\u003c/p\u003e\n\n\u003cp\u003eThe root issue is described as a hardware flaw in the Synopsys DWC2 USB controller, where handling of smaller-than-standard Setup packets can create a repeatable buffer underflow. On A12 and A13, Apple’s USB DART configuration in SecureROM runs in bypass mode, allowing the underflowing DMA pointer to overwrite arbitrary SRAM. The article says the exploit can temporarily demote the SoC’s production mode or boot a raw, unsigned iBoot image, but it does not show a Secure Enclave compromise.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",

}

}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

        }}>TRIAGE</span>

          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>

      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>

        {article.keyPoints && article.keyPoints.length > 0 && (

            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
