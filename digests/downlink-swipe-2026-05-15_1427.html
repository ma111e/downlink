 applies to drivers rejected during the Driver Shiproom evaluation, and devices where no shiproom-approved driver version exists will not receive a recovery action, meaning some faulty drivers may persist.","Microsoft can initiate the rollback directly from its Hardware Dev Center without requiring any action from hardware partners, shifting the responsibility for driver remediation away from vendors and into Microsoft's own operational pipeline.","The recovery mechanism uses the existing Windows Update infrastructure, so no new client agent or partner tooling is needed, making it a transparent, behind-the-scenes capability for end users."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft is introducing Cloud-Initiated Driver Recovery, a new capability that allows the company to remotely roll back problematic Windows drivers delivered through Windows Update without requiring hardware partners or end users to take manual action. The recovery process is managed entirely by Microsoft and will only be initiated for drivers rejected due to quality issues during the Driver Shiproom evaluation. This remediates a gap where devices could otherwise remain on a low-quality driver for an extended period.\u003c/p\u003e\n\n\u003cp\u003eRecovery is delivered through the existing Windows Update infrastructure, meaning no new client agent or partner tooling is required. The feature is being tested between May and August 2026 and will begin rolling back drivers rejected during Flighting or Gradual Rollout starting September 2026. Microsoft also unveiled a Driver Quality Initiative at WinHEC 2026 to raise driver quality, reliability, and security across the Windows ecosystem.\u003c/p\u003e\n"},{"n":6,"title":"What 45 Days of Watching Your Own Tools Will Tell You About Your Real Attack Surface","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/what-45-days-of-watching-your-own-tools.html","time":"11:00","priority":"MAY READ","score":50,"group":null,"groupColor":null,"tldr":"Legitimate Windows tools are abused in 84% of high-severity incidents, making over-entitlement your biggest risk; Bitdefender's free 45-day assessment maps and reduces this attack surface by locking down unnecessary binaries without disrupting operations.","briefOverview":"\u003cp\u003eThe article argues that the most dangerous activity inside organizations is legitimate tool abuse, or living off the land, which was found in 84% of 700,000 high-severity incidents analyzed by Bitdefender. It highlights that a clean Windows 11 install ships with 133 unique living-off-the-land binaries across 987 instances, and PowerShell is active on 73% of endpoints, much of it invoked silently by third-party applications.\u003c/p\u003e\n\n\u003cp\u003eTo address this over-entitlement problem, Bitdefender offers a complimentary 45-day Internal Attack Surface Assessment powered by its GravityZone PHASR technology. The assessment builds behavioral profiles, provides an exposure score and prioritized findings across five categories, and allows optional automated reduction. Early-access customers have reduced their attack surface by 30% or more in the first 30 days, with one reporting close to 70% reduction.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that preemptive cybersecurity is becoming essential, citing Gartner projections that it will account for 50% of IT security spending by 2030. It concludes that the fastest way to shorten an attacker\u0026rsquo;s reach is to look at and reduce the tools available inside your environment, and invites organizations with 250 or more users to request the free assessment.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article builds on a previous piece titled \u0026lsquo;Your Biggest Security Risk Isn\u0026rsquo;t Malware — It\u0026rsquo;s What You Already Trust,\u0026rsquo; which argued that trusted utilities like PowerShell, WMIC, and Certutil are the preferred toolkit of modern threat actors. Bitdefender\u0026rsquo;s analysis of 700,000 high-severity incidents found legitimate-tool abuse in 84% of them, framing the problem not as malware but as over-entitlement of trusted tools.\u003c/p\u003e\n\n\u003cp\u003eTo provide a practical solution, Bitdefender introduces its complimentary Internal Attack Surface Assessment, a 45-day low-effort engagement for organizations with 250 or more employees. The assessment uses GravityZone PHASR technology to turn the abstract problem of living off the land into a specific, prioritized list of users, endpoints, and tools that can be safely removed without breaking business operations. A clean Windows 11 install contains 133 unique living-off-the-land binaries, and Gartner projects that 60% of large enterprises will adopt dynamic attack surface reduction technologies by 2030.\u003c/p\u003e\n\n\u003cp\u003eThe assessment runs in four steps: kickoff and behavioral learning over 30 days, an Attack Surface Dashboard review with an exposure score and findings across five categories (living-off-the-land binaries, remote admin tools, tampering tools, cryptominers, and piracy tools), an optional reduction sprint where controls can be applied manually or via Autopilot with a one-click approval workflow, and a reduction review session.\u003c/p\u003e\n\n\u003cp\u003eEarly results show that early-access customers have reduced their attack surface by 30% or more in the first 30 days, with one reporting close to 70% reduction by locking down LOLBins and remote tools. The article notes this was achieved without investigation overhead or end-user disruption. Different stakeholders benefit: CISOs get a board-ready exposure number, SOC and IT admins see up to 50% less investigation workload, and business decision-makers gain documented surface reduction valued by regulators and insurers.\u003c/p\u003e\n\n\u003cp\u003eThe article ends by reiterating that the most significant risks are already inside the environment, and that a precise, prioritized map of those risks can be obtained within 45 days at no cost without changing the existing security stack. It directs interested organizations to request the assessment, stating that whether a compromise becomes a breach depends on what an attacker can reach once inside.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-argument-and-context\"\u003eCore Argument and Context\u003c/h2\u003e\n\n\u003cp\u003eThe article is a follow-up to a previous piece titled \u0026lsquo;Your Biggest Security Risk Isn\u0026rsquo;t Malware — It\u0026rsquo;s What You Already Trust,\u0026rsquo; which established that trusted administrative utilities (PowerShell, WMIC, netsh, Certutil, MSBuild) are the preferred toolkit of modern threat actors. This new article addresses the common response: \u0026lsquo;We know. So what do we actually do about it?\u0026rsquo;\u003c/p\u003e\n\n\u003cp\u003eBitdefender\u0026rsquo;s analysis of 700,000 high-severity incidents found legitimate-tool abuse in 84% of them, underscoring that the problem is not malware but over-entitlement of legitimate tools. The article states that this over-entitlement problem cannot be patched away.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-from-the-article\"\u003eTechnical Details from the Article\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eA clean Windows 11 install ships with \u003cstrong\u003e133 unique living-off-the-land binaries\u003c/strong\u003e spread across 987 instances.\u003c/li\u003e\n\u003cli\u003eBitdefender Labs telemetry found \u003cstrong\u003ePowerShell active on 73% of endpoints\u003c/strong\u003e, much of it invoked silently by third-party applications.\u003c/li\u003e\n\u003cli\u003eThe article identifies five categories of findings addressed by the assessment: living-off-the-land binaries, remote admin tools, tampering tools, cryptominers, and piracy tools.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"the-internal-attack-surface-assessment\"\u003eThe Internal Attack Surface Assessment\u003c/h2\u003e\n\n\u003cp\u003eThis is a 45-day, low-effort engagement for organizations with 250 or more employees, powered by Bitdefender\u0026rsquo;s GravityZone PHASR (Proactive Hardening and Attack Surface Reduction) technology. It sits alongside whatever endpoint stack the organization already runs. The four steps are:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003e\u003cstrong\u003eKickoff and behavioral learning:\u003c/strong\u003e PHASR builds behavioral profiles for every machine-user pair, typically over 30 days.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAttack Surface Dashboard review:\u003c/strong\u003e The organization receives an exposure score (0–100) and a prioritized list of findings across the five categories, each mapped to specific users and devices.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eOptional reduction sprint:\u003c/strong\u003e Controls can be applied manually or PHASR\u0026rsquo;s Autopilot can enforce them. Users can request access back through a built-in one-click approval workflow.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eReduction review:\u003c/strong\u003e A final session quantifies how much surface has been shrunk and surfaces shadow IT and unauthorized binaries.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003ch2 id=\"results-and-impact\"\u003eResults and Impact\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eEarly-access customers have reduced their attack surface by \u003cstrong\u003e30% or more in the first 30 days\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eOne customer reported close to \u003cstrong\u003e70% reduction\u003c/strong\u003e by locking down LOLBins and remote tools.\u003c/li\u003e\n\u003cli\u003eThese reductions were achieved without investigation overhead or end-user disruption.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"stakeholder-benefits\"\u003eStakeholder Benefits\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eFor the CISO:\u003c/strong\u003e A defensible, board-ready exposure number that moves week over week, mapped to behaviors attackers actually use.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFor the SOC and IT admin:\u003c/strong\u003e Up to \u003cstrong\u003e50% less investigation and response workload\u003c/strong\u003e because entire classes of suspicious-but-legitimate behavior simply don\u0026rsquo;t occur on endpoints that don\u0026rsquo;t need them.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eFor the business decision-maker:\u003c/strong\u003e Documented, ongoing surface reduction — increasingly what regulators, auditors, and cyber-insurers want to see.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"industry-trends-cited\"\u003eIndustry Trends Cited\u003c/h2\u003e\n\n\u003cp\u003eThe article references Gartner projections:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePreemptive cybersecurity will account for \u003cstrong\u003e50% of IT security spending by 2030\u003c/strong\u003e, up from less than 5% in 2024.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003e60% of large enterprises will adopt dynamic attack surface reduction (DASR) technologies by 2030\u003c/strong\u003e, up from less than 10% in 2025.\u003c/li\u003e\n\u003cli\u003eThe reasoning: when most intrusions involve no malware and adversaries move in minutes, \u0026lsquo;detect and respond\u0026rsquo; is too slow; the moves attackers can make must be removed in the first place.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"call-to-action\"\u003eCall to Action\u003c/h2\u003e\n\n\u003cp\u003eThe article ends by inviting organizations with 250 or more users running a Windows-heavy environment to request the free Internal Attack Surface Assessment. It states: \u0026lsquo;Compromises will keep happening. Whether one becomes a breach depends almost entirely on what an attacker can reach once they\u0026rsquo;re in. The fastest way to shorten that list is to look at it.\u0026rsquo;\u003c/p\u003e\n","keyPoints":["Legitimate tool -off-land-tactics?cid=ref%7Cb%7C-CORE-EPP-PHASR-THN-AR","publisher":"Bitdefender","context":"The article references this analysis to support the claim that legitimate-tool abuse was found in 84% of 700,000 high-severity incidents."}],"body":"\u003cp\u003eThe article argues that the most dangerous activity inside organizations is legitimate tool abuse, or living off the land, which was found in 84% of 700,000 high-severity incidents analyzed by Bitdefender. It highlights that a clean Windows 11 install ships with 133 unique living-off-the-land binaries across 987 instances, and PowerShell is active on 73% of endpoints, much of it invoked silently by third-party applications.\u003c/p\u003e\n\n\u003cp\u003eTo address this over-entitlement problem, Bitdefender offers a complimentary 45-day Internal Attack Surface Assessment powered by its GravityZone PHASR technology. The assessment builds behavioral profiles, provides an exposure score and prioritized findings across five categories, and allows optional automated reduction. Early-access customers have reduced their attack surface by 30% or more in the first 30 days, with one reporting close to 70% reduction.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that preemptive cybersecurity is becoming essential, citing Gartner projections that it will account for 50% of IT security spending by 2030. It concludes that the fastest way to shorten an attacker\u0026rsquo;s reach is to look at and reduce the tools available inside your environment, and invites organizations with 250 or more users to request the free assessment.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;

const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function GroupBadge({ group, groupColor }) {
  if (!group || !groupColor) return null;
  const c = groupColor;
  return (
    <span style={{
      display: "inline-block", flexShrink: 0,
      width: 20, height: 20,
      border: "1px solid color-mix(in oklch, " + c + " 45%, transparent)",
      background: "color-mix(in oklch, " + c + " 12%, transparent)",
      borderRadius: 2
    }} />
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">

  );
}

function ReportsPanel({ reports }) {
  return (

  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
