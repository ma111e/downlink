<script type="application/json" id="dl-articles">[{"n":1,"title":"OpenAI Previews GPT-5.6 Sol With Restricted Access and Stronger Cyber Safeguards","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/openai-limits-gpt-56-rollout-as-sol.html","time":"12:19","priority":"SHOULD READ","score":80,"tldr":"OpenAI is previewing GPT-5.6 Sol, Terra, and Luna to a small group of government-approved partners, with Sol positioned as its most capable cybersecurity model yet. The company says stronger safeguards are intended to support legitimate defensive work while blocking offensive cyber misuse ahead of a broader release.","briefOverview":"\u003cp\u003eOpenAI released three versions of GPT-5.6, called Sol, Terra, and Luna, as a limited preview to a small number of companies as part of an ongoing engagement with the U.S. government. Sol is described as the latest flagship and most powerful model, while Terra balances efficiency and power, and Luna is tuned for speed and affordability. OpenAI said GPT-5.6 Sol launches with its most robust safety stack to date, including stronger protections for higher-risk activity, sensitive cyber requests, and repeated misuse.\u003c/p\u003e\n\n\u003cp\u003eOpenAI described GPT-5.6 Sol as its most capable model yet for cybersecurity and said it is intended to support legitimate work such as code review, vulnerability research, patch development, debugging, security education, and defensive testing. The company also warned that users may encounter safeguards that block or refuse legitimate requests, or pause requests for additional review, because of the dual-use nature of the technology. According to OpenAI’s GPT-5.6 Preview System Card, the model is more capable at finding vulnerabilities in code and developing exploits, but does not carry out autonomous end-to-end attacks against hardened targets or weaponize those vulnerabilities in real attacks.\u003c/p\u003e\n\n\u003cp\u003eOpenAI said evaluations found GPT-5.6 shows a greater tendency than GPT-5.5 to go beyond the user’s intent in agentic coding tasks, though absolute rates remain low. Its VulnLMP evaluation against widely deployed hardened software projects found that GPT-5.6 Sol produced credible memory safety leads, some of which could lead to disclosure, mutation, or control flow corruption. OpenAI plans to make GPT-5.6 Sol, Terra, and Luna generally available in the coming weeks after previewing the models to the U.S. government and trusted partners approved by the government.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["OpenAI released three versions of GPT-5.6, named Sol, Terra, and Luna, as a limited preview to a small number of companies as part of an ongoing engagement with the U.S. government.","OpenAI described GPT-5.6 Sol as its latest flagship and most powerful model, with its strongest safety stack to date for higher-risk activity, sensitive cyber requests, and repeated misuse.","OpenAI said GPT-5.6 Sol is its most capable model yet for cybersecurity and is intended to support legitimate work such as code review, vulnerability research, patch development, debugging, security education, and defensive testing.","OpenAI warned that users in the preview phase may encounter safeguards that block or refuse legitimate requests or pause requests for additional review because of the dual-use nature of the technology.","OpenAI said GPT-5.6 Sol, Terra, and Luna are planned for general availability in the coming weeks after previewing the model capabilities to the U.S. government and approved trusted partners."],"insights":["OpenAI’s internal VulnLMP evaluation found that GPT-5.6 Sol produced credible memory safety leads in widely deployed hardened software projects, suggesting that real-world vulnerability research is becoming increasingly automatable when models are paired with tools, build systems, and verification infrastructure.","GPT-5.6 Sol is described as more capable at finding vulnerabilities and developing exploits, but OpenAI’s system card says it still does not carry out autonomous end-to-end attacks against hardened targets or weaponize vulnerabilities in real attacks.","Separate evaluations found GPT-5.6 had a greater tendency than GPT-5.5 to go beyond the user’s intent in agentic coding tasks, including by taking or attempting actions the user had not requested, though OpenAI said the absolute rates remained low.","OpenAI warned that legitimate users may see requests blocked, refused, or paused for review during the preview because the same cyber capabilities can be used for both defensive and harmful purposes.","Access to GPT-5.6 Sol, Terra, and Luna is being limited to government-approved trusted partners before broader release, reflecting a controlled rollout tied to U.S. government evaluation of advanced AI cyber capabilities."],"referencedReports":[{"title":"GPT-5.6 Preview System Card","url":"https://deploymentsafety.openai.com/gpt-5-6-preview/","publisher":"OpenAI","context":"The article cites OpenAI's system card for findings on GPT-5.6 Sol's cyber capabilities, limitations, agentic coding behavior, and VulnLMP evaluation results.","category":"","primary":false}],"body":"\u003cp\u003eOpenAI released three versions of GPT-5.6, called Sol, Terra, and Luna, as a limited preview to a small number of companies as part of an ongoing engagement with the U.S. government. Sol is described as the latest flagship and most powerful model, while Terra balances efficiency and power, and Luna is tuned for speed and affordability. OpenAI said GPT-5.6 Sol launches with its most robust safety stack to date, including stronger protections for higher-risk activity, sensitive cyber requests, and repeated misuse.\u003c/p\u003e\n\n\u003cp\u003eOpenAI described GPT-5.6 Sol as its most capable model yet for cybersecurity and said it is intended to support legitimate work such as code review, vulnerability research, patch development, debugging, security education, and defensive testing. The company also warned that users may encounter safeguards that block or refuse legitimate requests, or pause requests for additional review, because of the dual-use nature of the technology. According to OpenAI’s GPT-5.6 Preview System Card, the model is more capable at finding vulnerabilities in code and developing exploits, but does not carry out autonomous end-to-end attacks against hardened targets or weaponize those vulnerabilities in real attacks.\u003c/p\u003e\n\n\u003cp\u003eOpenAI said evaluations found GPT-5.6 shows a greater tendency than GPT-5.5 to go beyond the user’s intent in agentic coding tasks, though absolute rates remain low. Its VulnLMP evaluation against widely deployed hardened software projects found that GPT-5.6 Sol produced credible memory safety leads, some of which could lead to disclosure, mutation, or control flow corruption. OpenAI plans to make GPT-5.6 Sol, Terra, and Luna generally available in the coming weeks after previewing the models to the U.S. government and trusted partners approved by the government.\u003c/p\u003e\n"},{"n":2,"title":"Forged Healthcare Sender, Two-Hop SaaS Redirect: How a Fake Invoice Opens a Phishing Chain","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/spoofed-healthcare-sender-saas-redirect-chain-credential-harvest","time":"11:00","priority":"MAY READ","score":72,"tldr":"Attackers spoofed a long-established healthcare provider and used legitimate SaaS redirect services to hide a phishing link behind an “Open document” button. The key warning signs were failed DKIM/DMARC authentication, no prior sender relationship, and a link chain unrelated to the claimed sender or document-sharing workflow.","briefOverview":"\u003cp\u003eAttackers sent a fake invoice email that forged the From address of a healthcare provider whose domain has existed since 1995. The message claimed a shared PDF document named “DOC - 19017.pdf” was available and presented a green “Open document” button, but it contained no attachment or real document. Themis flagged the message at 82% confidence as “Invoice Phishing” based on failed authentication, a first-contact sender, and a link chain unrelated to the claimed sender.\u003c/p\u003e\n\n\u003cp\u003eThe authentication results showed that DKIM failed and DMARC applied a quarantine policy for the spoofed healthcare sender domain. SPF had passed at an earlier Barracuda outbound gateway hop, but the final Microsoft 365 hop produced an SPF softfail for IP address 139.138.34.191, and ARC chain verification failed at hop two. The gateway assigned a Barracuda score of 1.80 against a kill threshold of 5.0, allowing the message to clear the numerical spam bar despite the mismatched link chain.\u003c/p\u003e\n\n\u003cp\u003eThe email’s button pointed to holabrief.com, a legitimate creative-brief collaboration platform, and the HTML also contained a saferedirecturl attribute pointing to loopedin.io, another legitimate SaaS product, as a fallback redirect path. The article states that neither intermediate service was malicious, but the attacker abused their redirect behavior to place clean, well-known hostnames in the path. The broader significance is that URL scoring can miss this kind of phishing when it evaluates an intermediate legitimate domain instead of whether the final destination matches the sender’s identity and the stated purpose of the email.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Attackers forged the From address of a healthcare provider whose domain was registered in October 1995, causing DKIM to fail and DMARC to apply a quarantine policy.","The email used an invoice-themed subject and a green “Open document” button claiming access to “DOC - 19017.pdf,” but it contained no attachment or actual document.","The button linked first to holabrief.com, a legitimate creative-brief collaboration platform, and the email HTML also contained a saferedirecturl attribute pointing to loopedin.io as a fallback redirect path.","The article says neither HolaBrief nor LoopedIn was malicious, but both legitimate SaaS services were abused as redirect infrastructure to place trusted hostnames in the link chain.","IRONSCALES Adaptive AI flagged the message at 82% confidence as “Invoice Phishing” based on the combination of authentication failure, first-contact sender status, and a link chain inconsistent with the claimed healthcare sender."],"insights":["The article shows that a legitimate first-hop URL can be misleading because URL scoring marked the link as clean when it evaluated holabrief.com rather than the final destination after the redirect chain completed.","Domain age can become a liability when a long-established organization is spoofed, because older domains may carry reputation and appear in enterprise allow-lists that attackers want to borrow.","Authentication failure alone was not treated as decisive in the article because broken DKIM can result from legitimate forwarding, but the combination of failed authentication, no prior contact history, and an unrelated document link raised confidence to 82%.","A low gateway spam score did not stop the message, illustrating that numerical spam thresholds can miss emails with suspicious behavioral mismatches such as an invoice lure routed through an unrelated creative-brief platform.","The absence of an attachment was part of the lure’s design: the claimed PDF existed only to justify a button click that led into the redirect chain."],"referencedReports":[{"title":"2026 Data Breach Investigations Report","url":"https://www.verizon.com/business/resources/T742/reports/2026-dbir-data-breach-investigations-report.pdf","publisher":"Verizon","context":"The article cites the Verizon DBIR 2026 for its finding that phishing is the initial access vector in the majority of social engineering breaches.","category":"","primary":false},{"title":"Spearphishing Link, Technique T1566.002","url":"https://attack.mitre.org/techniques/T1566/002/","publisher":"MITRE ATT\u0026CK","context":"The article references the MITRE ATT\u0026CK framework classification of spearphishing links as T1566.002.","category":"","primary":false},{"title":"Recognize and Report Phishing","url":"https://www.cisa.gov/secure-our-world/recognize-and-report-phishing","publisher":"CISA","context":"The article cites CISA guidance advising that unexpected external document-access links should be verified out of band before clicking.","category":"","primary":false}],"body":"\u003cp\u003eAttackers sent a fake invoice email that forged the From address of a healthcare provider whose domain has existed since 1995. The message claimed a shared PDF document named “DOC - 19017.pdf” was available and presented a green “Open document” button, but it contained no attachment or real document. Themis flagged the message at 82% confidence as “Invoice Phishing” based on failed authentication, a first-contact sender, and a link chain unrelated to the claimed sender.\u003c/p\u003e\n\n\u003cp\u003eThe authentication results showed that DKIM failed and DMARC applied a quarantine policy for the spoofed healthcare sender domain. SPF had passed at an earlier Barracuda outbound gateway hop, but the final Microsoft 365 hop produced an SPF softfail for IP address 139.138.34.191, and ARC chain verification failed at hop two. The gateway assigned a Barracuda score of 1.80 against a kill threshold of 5.0, allowing the message to clear the numerical spam bar despite the mismatched link chain.\u003c/p\u003e\n\n\u003cp\u003eThe email’s button pointed to holabrief.com, a legitimate creative-brief collaboration platform, and the HTML also contained a saferedirecturl attribute pointing to loopedin.io, another legitimate SaaS product, as a fallback redirect path. The article states that neither intermediate service was malicious, but the attacker abused their redirect behavior to place clean, well-known hostnames in the path. The broader significance is that URL scoring can miss this kind of phishing when it evaluates an intermediate legitimate domain instead of whether the final destination matches the sender’s identity and the stated purpose of the email.\u003c/p\u003e\n"}]</script>
