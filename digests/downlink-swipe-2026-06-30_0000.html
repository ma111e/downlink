<script type="application/json" id="dl-articles">[{"n":26,"title":"Attackers Exploit SimpleHelp CVE-2026-48558 to Deploy TaskWeaver and Djinn Stealer","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/attackers-exploit-simplehelp-cve-2026.html","time":"11:18","priority":"MUST READ","score":95,"tldr":"Attackers are exploiting the critical SimpleHelp authentication bypass CVE-2026-48558 to gain technician access to RMM servers and deploy the new TaskWeaver loader and Djinn Stealer. The malware targets credentials and sensitive data across cloud platforms, developer tools, AI assistants, browsers, SSH, and crypto wallets, prompting CISA to add the flaw to its KEV catalog.","briefOverview":"\u003cp\u003eAn unknown threat actor has been observed exploiting CVE-2026-48558, a maximum-severity authentication bypass vulnerability in SimpleHelp, to deliver two previously unreported malware families called TaskWeaver and Djinn Stealer. The flaw affects the OpenID Connect flow and can allow an unauthenticated attacker to obtain a fully authenticated Technician session by submitting a forged token with arbitrary identity claims. Horizon3.ai said affected deployments include SimpleHelp servers configured to use generic OIDC or Azure AD OIDC, and that attackers may be able to create and authenticate as a new Technician user.\u003c/p\u003e\n\n\u003cp\u003eIn the intrusion documented by Blackpoint Cyber, exploitation of the SimpleHelp flaw gave the attacker access to a publicly accessible Remote Monitoring and Management server as a Technician. That access provided a trusted administrative channel capable of transferring files and executing commands on systems managed through the server. TaskWeaver, delivered as jquery.js and executed through node.exe, is a heavily obfuscated Node.js loader that fingerprints the system, establishes encrypted communications with a remote server, and retrieves and executes additional JavaScript payloads.\u003c/p\u003e\n\n\u003cp\u003eThe observed second-stage payload, Djinn Stealer, targets Windows, macOS, and Linux systems and is designed to steal credentials and sensitive data from browsers, cloud platforms, source control, package registries, infrastructure tooling, AI development assistants, SSH, and cryptocurrency wallets. On Linux, it also attempts to read process command-line and environment data that may contain passwords, API keys, tokens, database connection strings, and other sensitive values. CISA added CVE-2026-48558 to its Known Exploited Vulnerabilities catalog and required Federal Civilian Executive Branch agencies to apply fixes by July 2, 2026.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["An unknown threat actor has been observed exploiting CVE-2026-48558, a critical authentication bypass flaw in SimpleHelp, to deliver the previously unreported malware families TaskWeaver and Djinn Stealer.","CVE-2026-48558 affects SimpleHelp servers configured to use generic OIDC or Azure AD OIDC and can let an unauthenticated attacker create and authenticate as a new Technician user.","TaskWeaver is a heavily obfuscated Node.js loader that fingerprints systems, establishes encrypted communications with a remote server, and retrieves and executes additional JavaScript payloads.","Djinn Stealer targets Windows, macOS, and Linux systems and is designed to harvest credentials and sensitive data from browsers, cloud platforms, source control, infrastructure tools, AI development assistants, SSH, package registries, and cryptocurrency wallets.","CISA added CVE-2026-48558 to its Known Exploited Vulnerabilities catalog and required Federal Civilian Executive Branch agencies to apply fixes by July 2, 2026."],"insights":["Enforcing MFA for SimpleHelp technicians does not block this attack path because the flaw allows attackers to self-register their own MFA method on first login.","The compromised SimpleHelp server gives attackers a trusted administrative channel for file transfer and command execution across managed systems, making the RMM platform itself the distribution mechanism for follow-on malware.","Djinn Stealer’s targeting of AI development assistants such as Claude, Gemini, OpenAI Codex, Cline, OpenCode, and Kilo shows that data stored by AI tooling has become part of credential-theft operations.","On Linux systems, Djinn Stealer looks in running process command lines and environment variables, which may expose passwords, API keys, tokens, and database connection strings even when they are not stored in normal credential files.","The article emphasizes that credentials taken from a developer or administrator workstation can remain useful for accessing production infrastructure, build pipelines, source repositories, cloud tenants, and customer environments after the original endpoint is contained."],"referencedReports":[{"title":"A Djinn in the Machine: TaskWeaver’s Node.js Intrusion Chain","url":"https://blackpointcyber.com/blog/a-djinn-in-the-machine-taskweavers-node-js-intrusion-chain/","publisher":"Blackpoint Cyber","context":"The article cites Blackpoint Cyber's analysis as the source for details on the TaskWeaver loader, Djinn Stealer, and the observed intrusion chain.","category":"research","primary":true},{"title":"CVE-2026-48558 SimpleHelp Authentication Bypass IOCs","url":"https://horizon3.ai/attack-research/disclosures/cve-2026-48558-simplehelp-authentication-bypass-iocs/","publisher":"Horizon3.ai","context":"The article references Horizon3.ai's disclosure for details about the SimpleHelp authentication bypass flaw, affected OIDC configurations, and related impact.","category":"advisory","primary":true},{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/29/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article cites CISA's alert noting that CVE-2026-48558 was added to the Known Exploited Vulnerabilities catalog with a federal remediation deadline.","category":"advisory","primary":false}],"body":"\u003cp\u003eAn unknown threat actor has been observed exploiting CVE-2026-48558, a maximum-severity authentication bypass vulnerability in SimpleHelp, to deliver two previously unreported malware families called TaskWeaver and Djinn Stealer. The flaw affects the OpenID Connect flow and can allow an unauthenticated attacker to obtain a fully authenticated Technician session by submitting a forged token with arbitrary identity claims. Horizon3.ai said affected deployments include SimpleHelp servers configured to use generic OIDC or Azure AD OIDC, and that attackers may be able to create and authenticate as a new Technician user.\u003c/p\u003e\n\n\u003cp\u003eIn the intrusion documented by Blackpoint Cyber, exploitation of the SimpleHelp flaw gave the attacker access to a publicly accessible Remote Monitoring and Management server as a Technician. That access provided a trusted administrative channel capable of transferring files and executing commands on systems managed through the server. TaskWeaver, delivered as jquery.js and executed through node.exe, is a heavily obfuscated Node.js loader that fingerprints the system, establishes encrypted communications with a remote server, and retrieves and executes additional JavaScript payloads.\u003c/p\u003e\n\n\u003cp\u003eThe observed second-stage payload, Djinn Stealer, targets Windows, macOS, and Linux systems and is designed to steal credentials and sensitive data from browsers, cloud platforms, source control, package registries, infrastructure tooling, AI development assistants, SSH, and cryptocurrency wallets. On Linux, it also attempts to read process command-line and environment data that may contain passwords, API keys, tokens, database connection strings, and other sensitive values. CISA added CVE-2026-48558 to its Known Exploited Vulnerabilities catalog and required Federal Civilian Executive Branch agencies to apply fixes by July 2, 2026.\u003c/p\u003e\n"},{"n":2,"title":"CISA: Windows BlueHammer flaw now exploited by ransomware gangs","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisa-windows-bluehammer-flaw-now-exploited-by-ransomware-gangs/","time":"08:53","priority":"MUST READ","score":94,"tldr":"CISA says ransomware gangs are now exploiting BlueHammer (CVE-2026-33825), a Microsoft Defender local privilege escalation flaw that can give attackers SYSTEM-level control of Windows machines. Microsoft patched it in April, and organizations should ensure affected Windows systems are updated.","briefOverview":"\u003cp\u003eCISA confirmed that ransomware gangs have begun exploiting BlueHammer, a high-severity Microsoft Defender privilege escalation vulnerability tracked as CVE-2026-33825. The flaw was leaked in early April by a security researcher known as Nightmare Eclipse, along with proof-of-concept exploit code. Microsoft patched the vulnerability on April 14 as part of the April 2026 Patch Tuesday updates.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft describes the issue as insufficient granularity of access control in Microsoft Defender that allows an authorized local attacker to elevate privileges. Will Dormann of Tharros told BleepingComputer that the flaw is not easy to exploit, but it can give local attackers access to the Security Account Manager database, which contains password hashes for local accounts. With that access, attackers can escalate to SYSTEM privileges and potentially take complete control of the targeted system.\u003c/p\u003e\n\n\u003cp\u003eCISA added BlueHammer to its Known Exploited Vulnerabilities Catalog on April 22 and ordered Federal Civilian Executive Branch agencies to patch affected Windows devices by May 7. CISA has now also flagged the flaw as exploited in ransomware campaigns, although Microsoft has not yet marked it as exploited in attacks. The article notes that CISA has flagged eight Microsoft Defender vulnerabilities exploited in attacks in recent years, with two also targeted by ransomware gangs.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["CISA confirmed that ransomware gangs have begun exploiting BlueHammer, a high-severity Microsoft Defender privilege escalation vulnerability tracked as CVE-2026-33825.","The BlueHammer flaw was leaked in early April by a security researcher known as Nightmare Eclipse along with proof-of-concept exploit code.","Microsoft patched CVE-2026-33825 on April 14 as part of the April 2026 Patch Tuesday updates.","CISA added the BlueHammer flaw to its Known Exploited Vulnerabilities Catalog on April 22 and ordered Federal Civilian Executive Branch agencies to patch affected Windows devices by May 7.","CISA later updated its KEV Catalog to flag CVE-2026-33825 as exploited in ransomware campaigns, although Microsoft has not yet tagged the flaw as exploited in attacks."],"insights":["BlueHammer is described as difficult to exploit, but successful exploitation can expose the SAM database and allow attackers to gain SYSTEM privileges, making its real-world impact severe despite the exploitation barrier.","There is a discrepancy between CISA and Microsoft: CISA has flagged CVE-2026-33825 as exploited in attacks and ransomware campaigns, while Microsoft has not yet marked the flaw as exploited.","The public leak of proof-of-concept exploit code preceded both Microsoft’s patch and later reports of active exploitation, showing how disclosure disputes can quickly affect real-world risk.","CISA’s ransomware flag makes BlueHammer one of only two Microsoft Defender vulnerabilities in its catalog that have also been targeted by ransomware gangs."],"referencedReports":[{"title":"CVE-2026-33825","url":"https://msrc.microsoft.com/update-guide/vulnerability/CVE-2026-33825","publisher":"Microsoft","context":"The article cites Microsoft’s security advisory explaining that insufficient access control in Microsoft Defender allows a local authorized attacker to elevate privileges.","category":"advisory","primary":true},{"title":"CISA Adds One Known Exploited Vulnerability to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/04/22/cisa-adds-one-known-exploited-vulnerability-catalog","publisher":"CISA","context":"The article references CISA’s April 22 alert adding the BlueHammer flaw to the Known Exploited Vulnerabilities Catalog and ordering federal civilian agencies to patch affected Windows devices.","category":"advisory","primary":true},{"title":"Known Exploited Vulnerabilities Catalog: CVE-2026-33825","url":"https://www.cisa.gov/known-exploited-vulnerabilities-catalog?field_cve=CVE-2026-33825","publisher":"CISA","context":"The article cites CISA’s KEV Catalog entry for CVE-2026-33825, including its later flag that the flaw is exploited in ransomware campaigns.","category":"advisory","primary":true}],"body":"\u003cp\u003eCISA confirmed that ransomware gangs have begun exploiting BlueHammer, a high-severity Microsoft Defender privilege escalation vulnerability tracked as CVE-2026-33825. The flaw was leaked in early April by a security researcher known as Nightmare Eclipse, along with proof-of-concept exploit code. Microsoft patched the vulnerability on April 14 as part of the April 2026 Patch Tuesday updates.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft describes the issue as insufficient granularity of access control in Microsoft Defender that allows an authorized local attacker to elevate privileges. Will Dormann of Tharros told BleepingComputer that the flaw is not easy to exploit, but it can give local attackers access to the Security Account Manager database, which contains password hashes for local accounts. With that access, attackers can escalate to SYSTEM privileges and potentially take complete control of the targeted system.\u003c/p\u003e\n\n\u003cp\u003eCISA added BlueHammer to its Known Exploited Vulnerabilities Catalog on April 22 and ordered Federal Civilian Executive Branch agencies to patch affected Windows devices by May 7. CISA has now also flagged the flaw as exploited in ransomware campaigns, although Microsoft has not yet marked it as exploited in attacks. The article notes that CISA has flagged eight Microsoft Defender vulnerabilities exploited in attacks in recent years, with two also targeted by ransomware gangs.\u003c/p\u003e\n"},{"n":17,"title":"Oracle E-Business Suite Flaw CVE-2026-46817 Actively Exploited in the Wild","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/oracle-e-business-suite-flaw-cve-2026.html","time":"05:04","priority":"MUST READ","score":94,"tldr":"Oracle E-Business Suite flaw CVE-2026-46817 is being actively exploited against Oracle Payments systems, allowing unauthenticated attackers to potentially take over vulnerable instances. Organizations running affected versions 12.2.3 through 12.2.15 should apply Oracle’s May 2026 patches and investigate for possible compromise.","briefOverview":"\u003cp\u003eA critical flaw in Oracle E-Business Suite, tracked as CVE-2026-46817, has come under active exploitation in the wild, according to Defused Cyber. The vulnerability has a CVSS score of 9.8 and affects Oracle Payments. The NIST National Vulnerability Database describes it as an easily exploitable issue that allows an unauthenticated attacker with network access via HTTP to compromise Oracle Payments.\u003c/p\u003e\n\n\u003cp\u003eThe flaw affects Oracle E-Business Suite versions 12.2.3 through 12.2.15, and Oracle shipped patches for it in its Critical Security Patch Update last month. Defused Cyber said it observed an actor exploiting the vulnerability on Oracle E-Business honeypots over the weekend, while also noting that there was no known previous exploitation and no public proof-of-concept code. The article says there are currently no details on how the flaw is being exploited, who is behind the activity, or whether it is part of an opportunistic or targeted campaign.\u003c/p\u003e\n\n\u003cp\u003eThe article places CVE-2026-46817 in the context of recent attacks against Oracle enterprise software. It notes that CVE-2025-61882 in Oracle E-Business Suite was previously weaponized by threat actors linked to the Cl0p ransomware operation, and that CVE-2026-35273 in PeopleSoft Suite was exploited in ShinyHunters data theft and extortion attacks. Nissan has acknowledged being impacted by exploitation of the PeopleSoft flaw, potentially exposing employee payroll records, bank details, Social Security numbers, and other personal and financial data.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["CVE-2026-46817 is a critical improper privilege management and authentication flaw in Oracle Payments within Oracle E-Business Suite, with a CVSS score of 9.8.","The flaw affects Oracle E-Business Suite versions 12.2.3 through 12.2.15, and Oracle shipped patches for it in last month’s Critical Security Patch Update.","Defused Cyber said it observed an actor exploiting CVE-2026-46817 on Oracle E-Business honeypots over the weekend, despite no known prior exploitation or public proof-of-concept code.","There are currently no details on how CVE-2026-46817 is being exploited, who is behind the activity, or whether it is part of an opportunistic or targeted campaign.","The article notes recent exploitation of other Oracle flaws, including CVE-2025-61882 in Oracle E-Business Suite by Cl0p-linked actors and CVE-2026-35273 in PeopleSoft Suite in ShinyHunters data theft and extortion attacks."],"insights":["Defused Cyber observed exploitation even though it said there was no known previous exploitation and no public proof-of-concept code, indicating attackers may have developed private knowledge of the flaw.","The lack of public details about the exploit method or responsible actor makes patching and compromise assessment especially important for affected Oracle E-Business Suite users.","The article places CVE-2026-46817 alongside recent exploited Oracle flaws in E-Business Suite and PeopleSoft, showing that major Oracle enterprise applications have been repeatedly targeted in recent data theft and extortion activity.","Jake Knott’s comments on the PeopleSoft exploitation emphasize that some recent Oracle-related attacks involved multi-step chains and familiarity with the codebase, rather than only simple one-step flaws."],"referencedReports":[{"title":"CVE-2026-46817 Detail","url":"https://nvd.nist.gov/vuln/detail/CVE-2026-46817","publisher":"NIST National Vulnerability Database","context":"The article cites the NVD entry for CVE-2026-46817 for the vulnerability description, CVSS score, and impact statement.","category":"advisory","primary":false},{"title":"Oracle Critical Patch Update Advisory - May 2026","url":"https://www.oracle.com/security-alerts/cspumay2026verbose.html","publisher":"Oracle","context":"The article says Oracle shipped patches for CVE-2026-46817 as part of its Critical Security Patch Update last month.","category":"advisory","primary":false}],"body":"\u003cp\u003eA critical flaw in Oracle E-Business Suite, tracked as CVE-2026-46817, has come under active exploitation in the wild, according to Defused Cyber. The vulnerability has a CVSS score of 9.8 and affects Oracle Payments. The NIST National Vulnerability Database describes it as an easily exploitable issue that allows an unauthenticated attacker with network access via HTTP to compromise Oracle Payments.\u003c/p\u003e\n\n\u003cp\u003eThe flaw affects Oracle E-Business Suite versions 12.2.3 through 12.2.15, and Oracle shipped patches for it in its Critical Security Patch Update last month. Defused Cyber said it observed an actor exploiting the vulnerability on Oracle E-Business honeypots over the weekend, while also noting that there was no known previous exploitation and no public proof-of-concept code. The article says there are currently no details on how the flaw is being exploited, who is behind the activity, or whether it is part of an opportunistic or targeted campaign.\u003c/p\u003e\n\n\u003cp\u003eThe article places CVE-2026-46817 in the context of recent attacks against Oracle enterprise software. It notes that CVE-2025-61882 in Oracle E-Business Suite was previously weaponized by threat actors linked to the Cl0p ransomware operation, and that CVE-2026-35273 in PeopleSoft Suite was exploited in ShinyHunters data theft and extortion attacks. Nissan has acknowledged being impacted by exploitation of the PeopleSoft flaw, potentially exposing employee payroll records, bank details, Social Security numbers, and other personal and financial data.\u003c/p\u003e\n"},{"n":28,"title":"Progress Kemp LoadMaster Flaw Could Let Attackers Run Root Commands Pre-Auth","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/progress-kemp-loadmaster-flaw-could-let.html","time":"07:38","priority":"MUST READ","score":94,"tldr":"Progress Kemp LoadMaster has a critical pre-authentication flaw, CVE-2026-8037, that can let attackers run arbitrary commands as root when the API is enabled. Fixed versions are available, and admins should patch immediately or restrict API exposure because a public proof of concept now exists.","briefOverview":"\u003cp\u003eA critical vulnerability in Progress Kemp LoadMaster, tracked as CVE-2026-8037, can let an unauthenticated attacker execute arbitrary commands as root on the appliance by sending a crafted request to its API. The flaw has a CVSS score of 9.8 according to ZDI, and a patch is available. Progress says it has not received any reports of exploitation, but watchTowr Labs published a detailed technical write-up and working proof of concept on June 29.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects LoadMaster GA v7.2.63.1 and older and LTSF v7.2.54.17 and older when the API is enabled. Progress released fixed versions GA v7.2.63.2 and LTSF v7.2.54.18. The article emphasizes that LoadMaster sits at the network edge, making a pre-authentication flaw especially dangerous.\u003c/p\u003e\n\n\u003cp\u003eThe flaw is in a function called escape_quotes(), which was meant to sanitize user input before it was passed into a shell command. The function allocated memory without clearing it and failed to add a null terminator, allowing the system to read beyond the sanitized input into attacker-controlled data in the same API request. Progress also patched CVE-2026-33691, a high-severity WAF bypass involving whitespace padding in filenames that could circumvent file upload extension checks.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["CVE-2026-8037 is a critical Progress Kemp LoadMaster vulnerability with a CVSS score of 9.8 that can let an unauthenticated attacker execute arbitrary commands as root by sending a crafted request to the API.","The vulnerability affects LoadMaster GA v7.2.63.1 and older and LTSF v7.2.54.17 and older when the API is enabled.","Progress released fixed versions GA v7.2.63.2 and LTSF v7.2.54.18, and said it has not received any reports of exploitation.","watchTowr Labs published a detailed technical write-up and working proof of concept for the flaw on June 29.","Progress also patched CVE-2026-33691, a high-severity WAF bypass involving whitespace padding in filenames that could circumvent file upload extension checks."],"insights":["The fix for a root-level pre-authentication command execution path was only two code changes: zero-filling the allocated buffer and adding an explicit null terminator after the escaped output.","The public proof of concept increases urgency because Progress reported no known exploitation, but the full exploit chain is now documented by watchTowr Labs.","The vulnerable endpoint is used for API credential validation, but the article says attackers do not need valid credentials to reach the command execution path.","The article highlights a recurring LoadMaster risk pattern, noting a previously exploited critical command injection flaw in 2024 and five more high-severity LoadMaster flaws patched in April 2026."],"referencedReports":[{"title":"ZDI-26-342","url":"https://www.zerodayinitiative.com/advisories/ZDI-26-342/","publisher":"Zero Day Initiative","context":"The article cites ZDI's advisory for the CVSS 9.8 rating and notes that ZDI coordinated the public advisory release.","category":"advisory","primary":true},{"title":"LoadMaster Critical Security Bulletin June 2026 CVE-2026-8037 CVE-2026-33691","url":"https://community.progress.com/s/article/LoadMaster-Critical-Security-Bulletin-June-2026-CVE-2026-8037-CVE-2026-33691","publisher":"Progress","context":"The article references Progress's June 4 advisory announcing the vulnerability, fixed versions, and lack of reported exploitation.","category":"advisory","primary":true},{"title":"Enterprise Tech In Shell Out: Progress Kemp LoadMaster Uninitialized Heap to Pre-Auth RCE (CVE-2026-8037)","url":"https://labs.watchtowr.com/enterprise-tech-in-shell-out-progress-kemp-loadmaster-uninitialized-heap-to-pre-auth-rce-cve-2026-8037/","publisher":"watchTowr Labs","context":"The article says watchTowr Labs published a detailed technical write-up that walks through the full exploit chain and includes a working proof of concept.","category":"research","primary":true},{"title":"Progress Security Advisory AV26-552","url":"https://www.cyber.gc.ca/en/alerts-advisories/progress-security-advisory-av26-552","publisher":"Canadian Centre for Cyber Security","context":"The article notes that the Canadian Centre for Cyber Security issued an advisory urging administrators to apply the updates.","category":"advisory","primary":false}],"body":"\u003cp\u003eA critical vulnerability in Progress Kemp LoadMaster, tracked as CVE-2026-8037, can let an unauthenticated attacker execute arbitrary commands as root on the appliance by sending a crafted request to its API. The flaw has a CVSS score of 9.8 according to ZDI, and a patch is available. Progress says it has not received any reports of exploitation, but watchTowr Labs published a detailed technical write-up and working proof of concept on June 29.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects LoadMaster GA v7.2.63.1 and older and LTSF v7.2.54.17 and older when the API is enabled. Progress released fixed versions GA v7.2.63.2 and LTSF v7.2.54.18. The article emphasizes that LoadMaster sits at the network edge, making a pre-authentication flaw especially dangerous.\u003c/p\u003e\n\n\u003cp\u003eThe flaw is in a function called escape_quotes(), which was meant to sanitize user input before it was passed into a shell command. The function allocated memory without clearing it and failed to add a null terminator, allowing the system to read beyond the sanitized input into attacker-controlled data in the same API request. Progress also patched CVE-2026-33691, a high-severity WAF bypass involving whitespace padding in filenames that could circumvent file upload extension checks.\u003c/p\u003e\n"},{"n":19,"title":"Langflow RCE Exploited to Deploy Monero Miner on Exposed AI App Endpoints","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/langflow-rce-exploited-to-deploy-monero.html","time":"15:47","priority":"MUST READ","score":92,"tldr":"Threat actors are exploiting a critical unauthenticated Langflow RCE flaw to compromise exposed AI application endpoints and deploy a Monero miner. The malware disables defenses, kills rival miners, establishes cron persistence, and can spread laterally via reused SSH keys.","briefOverview":"\u003cp\u003eThreat actors are exploiting CVE-2026-33017, a critical unauthenticated remote code execution vulnerability in Langflow, to deliver a Monero cryptocurrency miner. Trend Micro observed the campaign over a 19-day window between March 27 and April 15, 2026. The activity targets exposed artificial intelligence application endpoints and can turn a vulnerable Langflow instance into an initial access path for broader compromise.\u003c/p\u003e\n\n\u003cp\u003eThe attack uses attacker-supplied Python code evaluated inside an unauthenticated Langflow API endpoint to download and run a shell script. That script checks whether a binary named “lambsys” is already running, then downloads the binary with curl or wget, launches it as a detached process, and spreads to SSH-reachable hosts the victim can authenticate to. The Go-based binary disables security controls including AppArmor, Ubuntu’s Uncomplicated Firewall, iptables, SELinux, the kernel NMI watchdog, and Alibaba Cloud’s Aliyun agent.\u003c/p\u003e\n\n\u003cp\u003eThe malware kills competing cryptocurrency miners associated with Kinsing, WatchDog, Rocke, and Outlaw, deletes rival wallet and key material, removes system logs, establishes cron-based persistence, and contacts 83.142.209[.]214:80. It later fetches a TAR archive containing a bespoke XMRig miner, queries ipinfo[.]io for the host’s public IP address and location, and wipes the archive after execution. Trend Micro said the campaign shows how exposed AI application endpoints are becoming another route into enterprise environments.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Threat actors are exploiting CVE-2026-33017, a critical unauthenticated remote code execution vulnerability in Langflow, to target exposed AI application endpoints and deploy a Monero cryptocurrency miner.","Trend Micro observed the campaign over a 19-day window between March 27 and April 15, 2026.","The attack uses a single line of Python code evaluated inside an unauthenticated Langflow API endpoint to download a shell script, fetch a miner binary, and launch it as a detached process.","The malware terminates competing cryptocurrency miners, disables host-level security controls, establishes cron-based persistence, contacts 83.142.209[.]214:80, and can spread to other systems through reused SSH keys.","The Go-based lambsys binary fetches and extracts a TAR archive containing a bespoke XMRig miner, queries ipinfo[.]io for the host’s public IP address and location, and then wipes the archive from the file system."],"insights":["The campaign shows that exposed AI application endpoints are being used as an initial access path into enterprise environments, not just as isolated targets for cryptomining.","The malware’s ability to spread through reused SSH keys means a single exposed Langflow instance can become a bridge to other systems the victim host can authenticate to.","The lambsys binary appears designed to outcompete other cryptojacking groups by killing miners linked to Kinsing, WatchDog, Rocke, and Outlaw and deleting rival wallet and key material.","The malware queries ipinfo[.]io so operators can adjust mining pool selection by victim location or exclude victims in certain regions.","Trend Micro found an earlier lambsys artifact compiled in May 2024, indicating the operators have likely been iterating on this malware family for more than two years."],"referencedReports":[{"title":"From Langflow to Monero: Inside CVE-2026-33017 Cryptominer","url":"https://www.trendmicro.com/en_us/research/26/f/from-langflow-to-monero-inside-cve-2026-33017-cryptominer.html","publisher":"Trend Micro","context":"The article cites Trend Micro’s technical report as the source for details on the Langflow exploitation campaign and the lambsys Monero miner payload.","category":"research","primary":true}],"body":"\u003cp\u003eThreat actors are exploiting CVE-2026-33017, a critical unauthenticated remote code execution vulnerability in Langflow, to deliver a Monero cryptocurrency miner. Trend Micro observed the campaign over a 19-day window between March 27 and April 15, 2026. The activity targets exposed artificial intelligence application endpoints and can turn a vulnerable Langflow instance into an initial access path for broader compromise.\u003c/p\u003e\n\n\u003cp\u003eThe attack uses attacker-supplied Python code evaluated inside an unauthenticated Langflow API endpoint to download and run a shell script. That script checks whether a binary named “lambsys” is already running, then downloads the binary with curl or wget, launches it as a detached process, and spreads to SSH-reachable hosts the victim can authenticate to. The Go-based binary disables security controls including AppArmor, Ubuntu’s Uncomplicated Firewall, iptables, SELinux, the kernel NMI watchdog, and Alibaba Cloud’s Aliyun agent.\u003c/p\u003e\n\n\u003cp\u003eThe malware kills competing cryptocurrency miners associated with Kinsing, WatchDog, Rocke, and Outlaw, deletes rival wallet and key material, removes system logs, establishes cron-based persistence, and contacts 83.142.209[.]214:80. It later fetches a TAR archive containing a bespoke XMRig miner, queries ipinfo[.]io for the host’s public IP address and location, and wipes the archive after execution. Trend Micro said the campaign shows how exposed AI application endpoints are becoming another route into enterprise environments.\u003c/p\u003e\n"},{"n":34,"title":"ToddyCat: your hidden email assistant. Part 2","source":"securelist.com","sourceColorIdx":5,"link":"https://securelist.com/toddycat-apt-umbrij-tool-and-oauth/120251/","time":"10:00","priority":"MUST READ","score":92,"tldr":"Kaspersky details ToddyCat’s new Umbrij tool, which silently abuses Chromium remote debugging and existing Google sessions to obtain OAuth codes for Gmail and Google Workspace access. Defenders should watch for suspicious DLL sideloading, headless Chrome or Edge launches with remote debugging enabled, and unexpected Google Workspace Outlook apps authorized on user accounts.","briefOverview":"\u003cp\u003eKaspersky reports that the ToddyCat APT group developed a new tool called Umbrij to access victims’ cloud accounts through the Google API. The campaign focused on corporate email communications hosted on Gmail and used OAuth 2.0 authorization to obtain access to requested Google resources. Kaspersky calls the technique Shadow Token via Remote Debug, or STRD.\u003c/p\u003e\n\n\u003cp\u003eUmbrij works against Chromium-based browsers when a user has not logged out of their Gmail account. The tool copies Chrome or Edge profile data, launches the browser in headless mode with a remote debugging port, and uses the saved session to request access to Google account resources. It automates account selection and permission approval pages, then extracts the OAuth authorization code from the redirected request.\u003c/p\u003e\n\n\u003cp\u003eThe tool was launched through DLL sideloading using legitimate files such as BDSubWiz.exe, VSTestVideoRecorder.exe, and GoogleDesktop.exe. The acquired authorization code is exchanged for an OAuth access token, which the threat actors use to connect to the Gmail account through the API and compromise corporate email communications. The article recommends monitoring suspicious DLL loading, browser launches with remote debugging and headless parameters, and unexpected third-party access by Google Workspace Migration for Microsoft Outlook or Google Workspace Sync for Microsoft Outlook.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["ToddyCat developed a tool called Umbrij to access victims’ Gmail-hosted corporate email accounts through the Google API by obtaining OAuth authorization codes from active browser sessions.","Umbrij targets Chromium-based browsers by copying Chrome or Edge user profile data, launching the browser in headless mode with a remote debugging port, and automating account and permission confirmation pages.","The tool was launched through DLL sideloading using legitimate files including BDSubWiz.exe, VSTestVideoRecorder.exe, and GoogleDesktop.exe.","Umbrij requests broad Google account permissions, including access to email, cloud storage, contacts, calendars, tasks, and directory-related data, using client IDs associated with Google Workspace Migration for Microsoft Outlook or Google Workspace Sync for Microsoft Outlook.","The article recommends detecting this activity by monitoring suspicious DLL loads, browser launches with remote debugging and headless parameters, and unexpected third-party Google account access granted to the two Google Workspace Outlook applications."],"insights":["A browser launched with both `--remote-debugging-port` and `--headless` is highlighted as a high-signal detection opportunity on ordinary user machines that are not used for web development or automated testing.","Disabling Chromium developer tools through the `DeveloperToolsAvailability` policy can disrupt Umbrij’s automated authorization-code retrieval, but the article notes it would not stop a manual attack through the browser interface.","The stolen access may be visible after the fact by checking Google Account third-party app permissions for Google Workspace Migration for Microsoft Outlook or Google Workspace Sync for Microsoft Outlook, especially if those tools are not used by the organization.","Umbrij hides its browser activity from the user’s normal browser history by running against copied profile data in a separate backup folder rather than the primary browser profile.","The tool intentionally uses Google’s legitimate Outlook migration or sync application client IDs while changing several normal request parameters, creating a detectable mismatch from legitimate application behavior."],"referencedReports":[],"body":"\u003cp\u003eKaspersky reports that the ToddyCat APT group developed a new tool called Umbrij to access victims’ cloud accounts through the Google API. The campaign focused on corporate email communications hosted on Gmail and used OAuth 2.0 authorization to obtain access to requested Google resources. Kaspersky calls the technique Shadow Token via Remote Debug, or STRD.\u003c/p\u003e\n\n\u003cp\u003eUmbrij works against Chromium-based browsers when a user has not logged out of their Gmail account. The tool copies Chrome or Edge profile data, launches the browser in headless mode with a remote debugging port, and uses the saved session to request access to Google account resources. It automates account selection and permission approval pages, then extracts the OAuth authorization code from the redirected request.\u003c/p\u003e\n\n\u003cp\u003eThe tool was launched through DLL sideloading using legitimate files such as BDSubWiz.exe, VSTestVideoRecorder.exe, and GoogleDesktop.exe. The acquired authorization code is exchanged for an OAuth access token, which the threat actors use to connect to the Gmail account through the API and compromise corporate email communications. The article recommends monitoring suspicious DLL loading, browser launches with remote debugging and headless parameters, and unexpected third-party access by Google Workspace Migration for Microsoft Outlook or Google Workspace Sync for Microsoft Outlook.\u003c/p\u003e\n"},{"n":13,"title":"CitrixBleed To Infinity And Beyond (Citrix NetScaler Pre-Auth Memory Overread CVE-2026-8451)","source":"labs.watchtowr.com","sourceColorIdx":8,"link":"https://labs.watchtowr.com/citrixbleed-to-infinity-and-beyond-citrix-netscaler-pre-auth-memory-overread-cve-2026-8451/","time":"19:35","priority":"SHOULD READ","score":88,"tldr":"watchTowr details CVE-2026-8451, a pre-auth Citrix NetScaler memory overread in SAML IdP configurations that can leak process memory via the NSC_TASS cookie and potentially crash the nsppe process. Citrix has released patches, and affected NetScaler ADC/Gateway deployments should be updated urgently.","briefOverview":"\u003cp\u003ewatchTowr describes CVE-2026-8451, a Citrix NetScaler pre-authentication memory overread vulnerability that it reported to Citrix in March 2026. Citrix describes the issue as “insufficient input validation leading to memory overread” and assigned it a CVSS score of 8.8. The article says the vulnerability is exploitable when the NetScaler appliance is configured as a SAML identity provider.\u003c/p\u003e\n\n\u003cp\u003eThe affected products listed in the article are NetScaler ADC and NetScaler Gateway 14.1 before 14.1-72.61, NetScaler ADC and NetScaler Gateway 13.1 before 13.1-63.18, NetScaler ADC FIPS before 14.1-72.61 FIPS, and NetScaler ADC FIPS and NDcPP before 13.1-37.272. watchTowr frames the issue as part of a recurring class of Citrix NetScaler memory disclosure problems referred to as CitrixBleed. The article emphasizes that NetScaler Gateway is widely used as a remote access front door for large organizations.\u003c/p\u003e\n\n\u003cp\u003eTechnically, watchTowr found that NetScaler’s SAML XML parsing could mishandle malformed AuthnRequest attributes, including unquoted values terminated with newlines or left unterminated. The parser could read beyond intended attribute boundaries and, in some cases, beyond the XML request buffer, with leaked data returned in the NSC_TASS cookie. The article also states that a simple malformed request can crash the nsppe process, and Citrix published its advisory and patches on 30 June 2026.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["watchTowr disclosed CVE-2026-8451, a Citrix NetScaler pre-authentication memory overread vulnerability that Citrix describes as insufficient input validation leading to memory overread.","The vulnerability is exploitable only when a NetScaler appliance is configured as a SAML identity provider, according to the article.","Citrix lists affected products as NetScaler ADC and NetScaler Gateway 14.1 before 14.1-72.61, NetScaler ADC and NetScaler Gateway 13.1 before 13.1-63.18, NetScaler ADC FIPS before 14.1-72.61 FIPS, and NetScaler ADC FIPS and NDcPP before 13.1-37.272.","watchTowr found that malformed SAML AuthnRequest attributes can cause NetScaler’s XML parser to read beyond intended attribute boundaries and return leaked memory in the NSC_TASS cookie.","The article states that a simple malformed request can reliably crash the NetScaler nsppe process, and Citrix published its advisory and patches on 30 June 2026."],"insights":["Exposure is configuration-dependent: the article says the bug is exploitable when NetScaler is configured as a SAML identity provider, so not every NetScaler deployment has the same immediate risk profile.","The vulnerable parser accepts highly malformed XML structures, including an unterminated AuthnRequest opening tag and an Issuer element placed outside the AuthnRequest, which allowed watchTowr to satisfy validation while still triggering the overread.","Although the leak is smaller than some earlier CitrixBleed-style issues, watchTowr found that changing the request length could consistently extract a few bytes and that leaked output appeared to include a plausible data pointer.","The leaked data is returned in the NSC_TASS cookie, making the HTTP response itself the channel for observing the memory disclosure.","The article emphasizes that a very short malformed SAMLRequest is enough to crash the nsppe process, making denial-of-service impact easier to demonstrate than large-scale memory leakage."],"referencedReports":[],"body":"\u003cp\u003ewatchTowr describes CVE-2026-8451, a Citrix NetScaler pre-authentication memory overread vulnerability that it reported to Citrix in March 2026. Citrix describes the issue as “insufficient input validation leading to memory overread” and assigned it a CVSS score of 8.8. The article says the vulnerability is exploitable when the NetScaler appliance is configured as a SAML identity provider.\u003c/p\u003e\n\n\u003cp\u003eThe affected products listed in the article are NetScaler ADC and NetScaler Gateway 14.1 before 14.1-72.61, NetScaler ADC and NetScaler Gateway 13.1 before 13.1-63.18, NetScaler ADC FIPS before 14.1-72.61 FIPS, and NetScaler ADC FIPS and NDcPP before 13.1-37.272. watchTowr frames the issue as part of a recurring class of Citrix NetScaler memory disclosure problems referred to as CitrixBleed. The article emphasizes that NetScaler Gateway is widely used as a remote access front door for large organizations.\u003c/p\u003e\n\n\u003cp\u003eTechnically, watchTowr found that NetScaler’s SAML XML parsing could mishandle malformed AuthnRequest attributes, including unquoted values terminated with newlines or left unterminated. The parser could read beyond intended attribute boundaries and, in some cases, beyond the XML request buffer, with leaked data returned in the NSC_TASS cookie. The article also states that a simple malformed request can crash the nsppe process, and Citrix published its advisory and patches on 30 June 2026.\u003c/p\u003e\n"},{"n":25,"title":"Apple Patches 30+ iOS, macOS, Safari Flaws, Including AI-Discovered WebKit Bugs","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/apple-patches-30-ios-macos-safari-flaws.html","time":"07:15","priority":"SHOULD READ","score":88,"tldr":"Apple released early security updates for iOS, iPadOS, macOS, and Safari fixing more than 30 flaws, including AI-discovered WebKit bugs that could crash Safari or corrupt memory via malicious web content. Apple said it accelerated the patches because AI may shorten the time attackers need to weaponize newly disclosed vulnerabilities.","briefOverview":"\u003cp\u003eApple released security updates for iOS, macOS, and Safari to address more than three dozen flaws. The fixes include four WebKit vulnerabilities discovered using AI tools such as Anthropic Claude and OpenAI Codex Security. The updates are available for iOS 26.5.2, iPadOS 26.5.2, macOS Tahoe 26.5.2, and Safari 26.5.2. Apple said none of the patched vulnerabilities has been disclosed as actively exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe WebKit flaws include memory corruption, an out-of-bounds write, a use-after-free issue, and an unspecified issue that could lead to Safari or process crashes or memory corruption when processing maliciously crafted web content. Apple credited OpenAI Codex Security for three of the WebKit issues and Anthropic researchers Milad Nasr and Nicholas Carlini, along with Claude, for the use-after-free issue. The four bugs are part of nearly 30 WebKit vulnerabilities patched in the updates, including issues in WebKit Canvas and a flaw that could let a malicious website process restricted web content outside the sandbox.\u003c/p\u003e\n\n\u003cp\u003eApple also fixed kernel-related bugs that could be exploited by a malicious app to leak sensitive kernel state, cause unexpected system termination or write kernel memory, or corrupt kernel memory. Security researcher Hyunwoo Kim was credited with discovering and reporting two of those kernel-related vulnerabilities. Apple told Reuters it released the updates earlier than before because AI tools could speed the development of malicious hacking tools and shrink the time between discovery and weaponization to hours.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Apple released security updates for iOS, macOS, and Safari to address more than three dozen flaws, including four WebKit vulnerabilities discovered using AI tools such as Anthropic Claude and OpenAI Codex Security.","The four AI-associated WebKit vulnerabilities are CVE-2026-43707, CVE-2026-43716, CVE-2026-43745, and CVE-2026-43715, which could cause Safari or related processes to crash or corrupt memory when processing maliciously crafted web content.","Apple credited OpenAI Codex Security for CVE-2026-43707, CVE-2026-43716, and CVE-2026-43745, and credited Anthropic researchers Milad Nasr and Nicholas Carlini, along with Claude, for CVE-2026-43715.","The updates also fixed kernel-related bugs that could let a malicious app leak sensitive kernel state, terminate the system or write kernel memory, or corrupt kernel memory.","Apple said the updates are available for iOS 26.5.2, iPadOS 26.5.2, macOS Tahoe 26.5.2, and Safari 26.5.2, and that none of the patched vulnerabilities has been disclosed as actively exploited in the wild."],"insights":["Apple’s patch timing appears to be changing because the company believes AI can shrink the time between vulnerability disclosure and weaponization to hours.","The article highlights AI tools on both sides of the security process: OpenAI Codex Security and Anthropic Claude helped discover WebKit flaws, while Apple also cited concern that AI could accelerate malicious exploit development.","The fixed WebKit issues are especially important because they involve maliciously crafted web content, meaning exposure could occur through browser-based activity rather than requiring a user to install a separate malicious app.","Although no patched vulnerabilities were reported as actively exploited, Apple still released the updates earlier than before, showing that perceived AI-driven exploit speed influenced the urgency of patch delivery."],"referencedReports":[{"title":"Apple security releases","url":"https://support.apple.com/en-us/100100","publisher":"Apple","context":"The article cites Apple’s security releases page as the source for the iOS, macOS, and Safari security updates addressing over three dozen flaws.","category":"advisory","primary":true},{"title":"About the security content of iOS 26.5.2 and iPadOS 26.5.2","url":"https://support.apple.com/en-us/127594","publisher":"Apple","context":"The article links Apple’s advisory for the iOS 26.5.2 and iPadOS 26.5.2 updates that include the patched vulnerabilities.","category":"advisory","primary":true},{"title":"About the security content of macOS Tahoe 26.5.2","url":"https://support.apple.com/en-us/127595","publisher":"Apple","context":"The article links Apple’s advisory for the macOS Tahoe 26.5.2 update that includes the patched vulnerabilities.","category":"advisory","primary":true},{"title":"About the security content of Safari 26.5.2","url":"https://support.apple.com/en-us/127685","publisher":"Apple","context":"The article links Apple’s advisory for the Safari 26.5.2 update that includes the patched WebKit vulnerabilities.","category":"advisory","primary":true}],"body":"\u003cp\u003eApple released security updates for iOS, macOS, and Safari to address more than three dozen flaws. The fixes include four WebKit vulnerabilities discovered using AI tools such as Anthropic Claude and OpenAI Codex Security. The updates are available for iOS 26.5.2, iPadOS 26.5.2, macOS Tahoe 26.5.2, and Safari 26.5.2. Apple said none of the patched vulnerabilities has been disclosed as actively exploited in the wild.\u003c/p\u003e\n\n\u003cp\u003eThe WebKit flaws include memory corruption, an out-of-bounds write, a use-after-free issue, and an unspecified issue that could lead to Safari or process crashes or memory corruption when processing maliciously crafted web content. Apple credited OpenAI Codex Security for three of the WebKit issues and Anthropic researchers Milad Nasr and Nicholas Carlini, along with Claude, for the use-after-free issue. The four bugs are part of nearly 30 WebKit vulnerabilities patched in the updates, including issues in WebKit Canvas and a flaw that could let a malicious website process restricted web content outside the sandbox.\u003c/p\u003e\n\n\u003cp\u003eApple also fixed kernel-related bugs that could be exploited by a malicious app to leak sensitive kernel state, cause unexpected system termination or write kernel memory, or corrupt kernel memory. Security researcher Hyunwoo Kim was credited with discovering and reporting two of those kernel-related vulnerabilities. Apple told Reuters it released the updates earlier than before because AI tools could speed the development of malicious hacking tools and shrink the time between discovery and weaponization to hours.\u003c/p\u003e\n"},{"n":11,"title":"Malicious PyPI packages give hackers control of Telegram bot servers","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/malicious-pypi-packages-give-hackers-control-of-telegram-bot-servers/","time":"21:02","priority":"SHOULD READ","score":86,"tldr":"Checkmarx found eight malicious PyPI forks of the Pyrogram Telegram bot framework that secretly install a backdoor, letting attackers run Python or shell commands and read files on infected bot servers. Developers who installed these packages should remove them, rotate credentials, and revoke Telegram bot tokens.","briefOverview":"\u003cp\u003eA campaign active since November 2025 has targeted Python developers building Telegram bots with trojanized Pyrogram forks published on PyPI. Checkmarx, which dubbed the campaign Operation Navy Ghost, identified at least eight malicious packages that included the original Pyrogram source code plus a hidden backdoor called \u003ccode\u003esecret.py\u003c/code\u003e. Pyrogram is no longer maintained, but the article notes it remains popular, with nearly 350,000 monthly downloads on PyPI and more than 1,400 forks on GitHub.\u003c/p\u003e\n\n\u003cp\u003eThe backdoor is hidden in the helpers module and registers secret Telegram command handlers when an infected bot launches. These handlers allow the attacker to run supplied Python code or shell commands on the victim’s server, with command output returned through Telegram messages or as a document attachment if it exceeds 4096 bytes. Checkmarx said the malware activates only on Telegram bot accounts, suppresses errors, disables logging, and is designed to operate silently.\u003c/p\u003e\n\n\u003cp\u003eThe malicious packages contain a hardcoded \u003ccode\u003eOWNERS\u003c/code\u003e list of Telegram IDs that gives the attackers exclusive control and helps deactivate the backdoor when it runs on the attacker’s system. Once active, the threat actor can read files, dump secrets, access Telegram chats, download databases, and install a persistent backdoor. Developers who installed the listed packages should remove them immediately, rotate all credentials on affected servers, and revoke their Telegram bot tokens.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Checkmarx reported a campaign active since November 2025 that targeted Python developers building Telegram bots with trojanized Pyrogram forks on PyPI.","At least eight malicious PyPI packages included the original Pyrogram source code plus a hidden backdoor file called secret.py in the helpers module.","The backdoor registers hidden Telegram command handlers that let attackers execute Python code or shell commands and receive the output through Telegram messages or document attachments.","The malware activates only on Telegram bot accounts and is designed to operate silently by suppressing errors and disabling logging.","Developers who installed the listed packages should remove them immediately, rotate all credentials on affected servers, and revoke their Telegram bot tokens."],"insights":["The backdoor is designed to activate only on Telegram bot accounts, which Checkmarx says indicates the attacker is deliberately targeting production environments where databases, credentials, cloud APIs, and sensitive infrastructure may be accessible.","The hardcoded OWNERS list both restricts control of the backdoor to specific Telegram IDs and helps deactivate the backdoor when it launches on the attacker’s own system.","The malicious packages were published from different PyPI accounts, but Checkmarx linked them to a single threat actor through the shared OWNERS list, identical backdoor code, command names, and overlapping infrastructure.","The campaign abused Pyrogram’s continued popularity despite the project no longer being maintained, with the article noting nearly 350,000 monthly PyPI downloads and more than 1,400 GitHub forks."],"referencedReports":[{"title":"Operation Navy Ghost: Pyrogram Telegram Supply Chain Attack","url":"https://checkmarx.com/zero-post/operation-navy-ghost-pyrogram-telegram-supplychain-attack/","publisher":"Checkmarx","context":"The article cites Checkmarx’s analysis as the source for details on the malicious PyPI packages, backdoor behavior, and attacker commands.","category":"research","primary":true}],"body":"\u003cp\u003eA campaign active since November 2025 has targeted Python developers building Telegram bots with trojanized Pyrogram forks published on PyPI. Checkmarx, which dubbed the campaign Operation Navy Ghost, identified at least eight malicious packages that included the original Pyrogram source code plus a hidden backdoor called \u003ccode\u003esecret.py\u003c/code\u003e. Pyrogram is no longer maintained, but the article notes it remains popular, with nearly 350,000 monthly downloads on PyPI and more than 1,400 forks on GitHub.\u003c/p\u003e\n\n\u003cp\u003eThe backdoor is hidden in the helpers module and registers secret Telegram command handlers when an infected bot launches. These handlers allow the attacker to run supplied Python code or shell commands on the victim’s server, with command output returned through Telegram messages or as a document attachment if it exceeds 4096 bytes. Checkmarx said the malware activates only on Telegram bot accounts, suppresses errors, disables logging, and is designed to operate silently.\u003c/p\u003e\n\n\u003cp\u003eThe malicious packages contain a hardcoded \u003ccode\u003eOWNERS\u003c/code\u003e list of Telegram IDs that gives the attackers exclusive control and helps deactivate the backdoor when it runs on the attacker’s system. Once active, the threat actor can read files, dump secrets, access Telegram chats, download databases, and install a persistent backdoor. Developers who installed the listed packages should remove them immediately, rotate all credentials on affected servers, and revoke their Telegram bot tokens.\u003c/p\u003e\n"},{"n":23,"title":"Silent Swap Crypto Clipper Uses Fake Google Notes Extension to Replace Wallet Addresses","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/silent-swap-crypto-clipper-uses-fake.html","time":"15:40","priority":"SHOULD READ","score":85,"tldr":"Researchers uncovered an active crypto-clipper campaign called Silent Swap that installs a fake Google Notes Chromium extension to secretly replace copied wallet addresses with attacker-controlled ones. The malware uses blockchain-based C2 resolution and browser preference tampering to stay resilient and load without normal user approval.","briefOverview":"\u003cp\u003eMcAfee Labs identified an active cryptocurrency clipper campaign called \u003cstrong\u003eSilent Swap\u003c/strong\u003e that steals cryptocurrency by replacing wallet addresses when users initiate transactions. The campaign uses unsigned installers in .NET and Golang variants to deploy a malicious Chromium extension posing as a benign “Google Notes” utility. Because blockchain transactions are usually irreversible, a swapped address can lead to permanent financial loss.\u003c/p\u003e\n\n\u003cp\u003eThe installer retrieves a ZIP archive, scans for Chromium-based browsers, terminates browser processes, and injects the extension by modifying Secure Preferences and Preferences files. The fake extension requests access to the clipboard, all URLs, and browsing history so it can intercept copied wallet addresses and substitute attacker-controlled ones. Silent Swap also uses \u003cstrong\u003eEtherHiding\u003c/strong\u003e, which relies on the blockchain as a dead drop resolver to retrieve active command-and-control server details and allow the operator to rotate infrastructure with a smart contract update.\u003c/p\u003e\n\n\u003cp\u003eMcAfee said the campaign overlaps with a prior CountLoader campaign and that infections are globally distributed, with a higher concentration in India and additional victims in the U.S., Brazil, Indonesia, and Spain. The article also cites Socket’s report on malicious Chrome and Firefox extensions named “VPN Go: Free VPN,” which present visible proxy functionality while continuously monitoring and exfiltrating clipboard data. Socket said users who installed either extension should remove it immediately and treat secrets copied while it was active as compromised.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["McAfee Labs identified an active cryptocurrency clipper campaign called Silent Swap that uses a malicious Chromium extension disguised as a benign “Google Notes” utility.","The installer retrieves a ZIP archive, scans for Chromium-based browser profiles, terminates browser processes, and injects the extension by modifying Secure Preferences and Preferences files.","The fake Google Notes extension requests access to the clipboard, all URLs, and browsing history so it can intercept copied wallet addresses and replace them with attacker-controlled addresses.","Silent Swap uses EtherHiding to retrieve active command-and-control server details from a blockchain smart contract, allowing the attacker to rotate infrastructure without redeploying the malware.","Socket reported separate malicious Chrome and Firefox extensions named “VPN Go: Free VPN” that provide visible proxy functionality while also continuously monitoring and exfiltrating clipboard data."],"insights":["Silent Swap’s use of a blockchain smart contract for command-and-control means the operator can change the active server with a single transaction instead of rebuilding or redeploying the malware.","The malware recalculates browser security verification values after changing protected preference files, which lets the malicious extension appear legitimately installed to the browser.","The campaign avoids relying only on fixed attacker wallet addresses by using server-side, per-victim wallet mapping, while still falling back to a hard-coded wallet if the backend request fails.","The malicious VPN Go extensions used a staged update pattern, first appearing benign in official extension stores before later adding clipboard-stealing behavior.","Users who installed the VPN Go extensions are advised to treat any secrets copied while the extension was active as compromised, including passwords, authentication codes, API keys, OAuth tokens, and seed phrases."],"referencedReports":[{"title":"Crypto Clipper Wallet Swapping Browser Extension Malware","url":"https://www.mcafee.com/blogs/other-blogs/mcafee-labs/crypto-clipper-wallet-swapping-browser-extension-malware/","publisher":"McAfee Labs","context":"The article cites a McAfee Labs technical report as the source for details on the Silent Swap cryptocurrency clipper campaign.","category":"research","primary":true},{"title":"Chrome and Firefox Extensions Free VPNs Add Clipboard Stealers","url":"https://socket.dev/blog/chrome-and-firefox-extensions-free-vpns-add-clipboard-stealers?__cf_chl_f_tk=GnkzAeqCUSH2LvW5f.jX55tNL39WkJj59743cbeGocQ-1782793053-1.0.1.1-F8ctGzY0X_JawpS3v_VSCF0hiSblTN4B_EQikSRklGI","publisher":"Socket","context":"The article references Socket’s report on malicious Chrome and Firefox extensions named “VPN Go: Free VPN” that include clipboard-stealing behavior.","category":"research","primary":true}],"body":"\u003cp\u003eMcAfee Labs identified an active cryptocurrency clipper campaign called \u003cstrong\u003eSilent Swap\u003c/strong\u003e that steals cryptocurrency by replacing wallet addresses when users initiate transactions. The campaign uses unsigned installers in .NET and Golang variants to deploy a malicious Chromium extension posing as a benign “Google Notes” utility. Because blockchain transactions are usually irreversible, a swapped address can lead to permanent financial loss.\u003c/p\u003e\n\n\u003cp\u003eThe installer retrieves a ZIP archive, scans for Chromium-based browsers, terminates browser processes, and injects the extension by modifying Secure Preferences and Preferences files. The fake extension requests access to the clipboard, all URLs, and browsing history so it can intercept copied wallet addresses and substitute attacker-controlled ones. Silent Swap also uses \u003cstrong\u003eEtherHiding\u003c/strong\u003e, which relies on the blockchain as a dead drop resolver to retrieve active command-and-control server details and allow the operator to rotate infrastructure with a smart contract update.\u003c/p\u003e\n\n\u003cp\u003eMcAfee said the campaign overlaps with a prior CountLoader campaign and that infections are globally distributed, with a higher concentration in India and additional victims in the U.S., Brazil, Indonesia, and Spain. The article also cites Socket’s report on malicious Chrome and Firefox extensions named “VPN Go: Free VPN,” which present visible proxy functionality while continuously monitoring and exfiltrating clipboard data. Socket said users who installed either extension should remove it immediately and treat secrets copied while it was active as compromised.\u003c/p\u003e\n"},{"n":12,"title":"Blackfield ransomware asks Nidec Corporation for $2 million ransom","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/blackfield-ransomware-asks-nidec-corporation-for-2-million-ransom/","time":"09:41","priority":"SHOULD READ","score":84,"tldr":"The Blackfield ransomware gang claims it breached Nidec’s Taiwanese subsidiary and is demanding $2 million to delete allegedly stolen data, with a $400,000 option to buy the data immediately. Nidec confirmed a ransomware incident at Nidec Chaun Choung Technology but says it is still investigating any data leak and operational impact.","briefOverview":"\u003cp\u003eThe Blackfield ransomware gang is demanding a $2 million ransom from Nidec Corporation, a major Japanese manufacturer of electronic components for automotive and computing applications. Nidec produces motors ranging from micro-precision motors used in phones and hard drives to heavy-duty motors for robotics, elevators, and large HVAC systems. The company also designs motors for electric vehicles, electric power steering systems, and advanced driver-assistance systems.\u003c/p\u003e\n\n\u003cp\u003eNidec said its Taiwanese subsidiary, Nidec Chaun Choung Technology, was compromised in a ransomware attack after ransomware-originated damage was confirmed on part of a server on June 22, 2026. The company said it shut down the affected server and network to prevent the damage from spreading. Nidec disclosed a possibility of an information leak but said no personal or confidential information has been confirmed to have been leaked online.\u003c/p\u003e\n\n\u003cp\u003eBlackfield claimed responsibility for the attack and gave Nidec more than 15 days to respond before threatening to publish or sell the stolen data. The group is asking \u003cspan class=\"math inline\"\u003e\\(2 million to delete the allegedly stolen information, \\)\u003c/span\u003e5,000 to extend the leak deadline by one day, and $400,000 for immediate download access to the data. Nidec is investigating possible impacts on production, shipping, and other business operations, but said it does not expect the incident to extend to other Nidec Corporation or Nidec Group companies.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["The Blackfield ransomware gang is demanding a $2 million ransom from Nidec Corporation after claiming an attack on its Taiwanese subsidiary, Nidec Chaun Choung Technology.","Nidec confirmed that ransomware-originated damage was found on part of Nidec Chaun Choung Technology’s server on June 22, 2026, and said it shut down the affected server and network to prevent spread.","Nidec said there is a possibility of an information leak, but no personal or confidential information has been confirmed to have been leaked online.","Blackfield threatened to publish or sell the allegedly stolen data, offered to extend the leak deadline by one day for $5,000, and posted a link to download the data immediately for $400,000.","Nidec is investigating possible impacts on production, shipping, and other business operations, but does not expect the incident to affect other Nidec Corporation or Nidec Group companies."],"insights":["Blackfield is monetizing the incident in multiple ways at once: demanding $2 million from Nidec, offering a one-day deadline extension for $5,000, and advertising immediate access to the allegedly stolen data for $400,000.","The confirmed ransomware damage is limited in the article to one Taiwanese subsidiary’s server, while Nidec says it does not expect the incident to spread to other Nidec Corporation or Nidec Group companies.","Nidec has now been linked to ransomware-related data breach claims involving multiple divisions in less than two years, after a 2024 incident at its Vietnam-based Nidec Precision division was claimed by both 8Base and Everest.","The article distinguishes between Blackfield’s claims and verified facts, noting that BleepingComputer could not confirm the validity of the leaked sample data."],"referencedReports":[],"body":"\u003cp\u003eThe Blackfield ransomware gang is demanding a $2 million ransom from Nidec Corporation, a major Japanese manufacturer of electronic components for automotive and computing applications. Nidec produces motors ranging from micro-precision motors used in phones and hard drives to heavy-duty motors for robotics, elevators, and large HVAC systems. The company also designs motors for electric vehicles, electric power steering systems, and advanced driver-assistance systems.\u003c/p\u003e\n\n\u003cp\u003eNidec said its Taiwanese subsidiary, Nidec Chaun Choung Technology, was compromised in a ransomware attack after ransomware-originated damage was confirmed on part of a server on June 22, 2026. The company said it shut down the affected server and network to prevent the damage from spreading. Nidec disclosed a possibility of an information leak but said no personal or confidential information has been confirmed to have been leaked online.\u003c/p\u003e\n\n\u003cp\u003eBlackfield claimed responsibility for the attack and gave Nidec more than 15 days to respond before threatening to publish or sell the stolen data. The group is asking \u003cspan class=\"math inline\"\u003e\\(2 million to delete the allegedly stolen information, \\)\u003c/span\u003e5,000 to extend the leak deadline by one day, and $400,000 for immediate download access to the data. Nidec is investigating possible impacts on production, shipping, and other business operations, but said it does not expect the incident to extend to other Nidec Corporation or Nidec Group companies.\u003c/p\u003e\n"},{"n":22,"title":"RustDuck Botnet Rebuilds in Rust to Hijack Routers and Servers for DDoS","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/rustduck-botnet-rebuilds-in-rust-to.html","time":"17:45","priority":"SHOULD READ","score":84,"tldr":"RustDuck is an actively evolving DDoS botnet that hijacks routers, cameras, Android devices, and exposed servers by abusing weak credentials and known vulnerabilities. Its shift from C to Rust plus strong anti-analysis and encrypted command-and-control features suggest a small but increasingly sophisticated threat.","briefOverview":"\u003cp\u003eRustDuck is a new two-stage malware family that hijacks home routers, IP cameras, Android boxes, and poorly secured servers for distributed denial-of-service attacks. QiAnXin XLab has tracked it since February 2026 and says the main concern is how quickly it is changing, rather than its current size. The malware spreads through weak or default Telnet and SSH passwords, exposed Android debugging interfaces, and known flaws in devices and software from vendors including Huawei, D-Link, Totolink, Apache CouchDB, ThinkPHP, Jenkins, and Hadoop YARN.\u003c/p\u003e\n\n\u003cp\u003eRustDuck stands out because its core module is being rewritten from C into Rust, which the article says makes the malware harder for analysts to take apart. Newer samples run checks for analysis tools, debuggers, honeypots, virtual machines, fake networks, and sandbox time manipulation before erasing traces and quitting. Its communications use ChaCha20-Poly1305, AES-GCM, HKDF-SHA256, and Curve25519, rotate keys every ten minutes, and are made to look like ordinary encrypted web traffic.\u003c/p\u003e\n\n\u003cp\u003eXLab counted more than 20 internet addresses spreading the malware, with the busiest at 176.65.139[.]204, and the control addresses use free dynamic-DNS services such as duckdns.org. The operators can tell infected devices to start or stop attacks, report status, switch control servers, or upgrade the malware. The article says RustDuck is small compared with record-setting botnets such as AISURU, but its Rust rewrite and anti-research behavior are techniques other crews may borrow.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["QiAnXin XLab has tracked RustDuck since February 2026, describing it as a two-stage malware family that hijacks home routers, IP cameras, Android boxes, and poorly secured servers for DDoS attacks.","RustDuck spreads through weak or default Telnet and SSH passwords, exposed Android debugging interfaces, and known flaws in devices and software from vendors including TVT, Ruijie, TP-Link, ZTE, Huawei, D-Link, Totolink, Apache CouchDB, ThinkPHP, Jenkins, and Hadoop YARN.","The malware is being rewritten from C into Rust, and its core module uses anti-analysis checks to look for tools, debuggers, honeypots, virtual machines, fake networks, and sandbox time manipulation before erasing traces and quitting.","RustDuck encrypts its command-and-control communications using ChaCha20-Poly1305, AES-GCM, HKDF-SHA256, and Curve25519, rotates keys every ten minutes, and disguises traffic as ordinary encrypted web traffic.","XLab reported more than 20 internet addresses spreading RustDuck, with the busiest at 176.65.139[.]204, and noted that its control addresses use free dynamic-DNS services such as duckdns.org."],"insights":["RustDuck’s current size is less important than its rapid development, because XLab frames the main concern as the speed and sophistication of its changes rather than today’s bot count.","The Rust rewrite suggests active engineering investment rather than a simple rebranding of leaked botnet code, especially because the Rust core includes custom key handling, anti-analysis behavior, and hardened communications.","RustDuck’s spread shows that years-old device flaws remain operationally valuable to botnet operators, including CVE-2017-17215 in Huawei HG532 routers and CVE-2018-8007 in Apache CouchDB.","Some affected devices cannot realistically be secured by waiting for patches, since the article notes discontinued or unsupported routers where replacement is the recommended response.","The delivery server overlap between RustDuck and a separate ADB-targeting DDoS botnet is not treated as attribution, but the article highlights it as an infrastructure clue worth checking."],"referencedReports":[{"title":"RustDuck","url":"https://blog.xlab.qianxin.com/rustduck-en/","publisher":"QiAnXin XLab","context":"The article is based heavily on XLab’s analysis of RustDuck’s spread, architecture, anti-analysis behavior, encryption, infrastructure, and indicators.","category":"research","primary":true},{"title":"CVE-2025-29635: Mirai Campaign Targets D-Link Devices","url":"https://www.akamai.com/blog/security-research/cve-2025-29635-mirai-campaign-targets-d-link-devices","publisher":"Akamai","context":"The article cites Akamai’s research as observing Mirai variants exploiting CVE-2025-29635 in discontinued D-Link DIR-823X routers.","category":"research","primary":false},{"title":"New Rust Botnet RustoBot Is Routed via Routers","url":"https://www.fortinet.com/blog/threat-research/new-rust-botnet-rustobot-is-routed-via-routers","publisher":"Fortinet","context":"The article references Fortinet’s April 2025 documentation of RustoBot as an earlier Rust-based router botnet used for DDoS attacks.","category":"research","primary":false}],"body":"\u003cp\u003eRustDuck is a new two-stage malware family that hijacks home routers, IP cameras, Android boxes, and poorly secured servers for distributed denial-of-service attacks. QiAnXin XLab has tracked it since February 2026 and says the main concern is how quickly it is changing, rather than its current size. The malware spreads through weak or default Telnet and SSH passwords, exposed Android debugging interfaces, and known flaws in devices and software from vendors including Huawei, D-Link, Totolink, Apache CouchDB, ThinkPHP, Jenkins, and Hadoop YARN.\u003c/p\u003e\n\n\u003cp\u003eRustDuck stands out because its core module is being rewritten from C into Rust, which the article says makes the malware harder for analysts to take apart. Newer samples run checks for analysis tools, debuggers, honeypots, virtual machines, fake networks, and sandbox time manipulation before erasing traces and quitting. Its communications use ChaCha20-Poly1305, AES-GCM, HKDF-SHA256, and Curve25519, rotate keys every ten minutes, and are made to look like ordinary encrypted web traffic.\u003c/p\u003e\n\n\u003cp\u003eXLab counted more than 20 internet addresses spreading the malware, with the busiest at 176.65.139[.]204, and the control addresses use free dynamic-DNS services such as duckdns.org. The operators can tell infected devices to start or stop attacks, report status, switch control servers, or upgrade the malware. The article says RustDuck is small compared with record-setting botnets such as AISURU, but its Rust rewrite and anti-research behavior are techniques other crews may borrow.\u003c/p\u003e\n"},{"n":29,"title":"GuardFall Exposes Open-Source AI Coding Agents to Decades-Old Shell Injection Risks","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/guardfall-exposes-open-source-ai-coding.html","time":"14:26","priority":"SHOULD READ","score":84,"tldr":"Adversa AI’s GuardFall research shows that many open-source AI coding agents can be tricked into running dangerous shell commands because their safety filters inspect raw text instead of what bash actually executes. Users should avoid auto-executing agent commands and isolate agents from real home directories and secrets until stronger shell-aware guards are in place.","briefOverview":"\u003cp\u003eAdversa AI research named GuardFall found that a decades-old shell trick can bypass safety checks meant to stop AI coding and computer-use agents from running dangerous commands. The bypass worked against ten of the eleven popular open-source agents the firm tested, with Continue being the only one built to defend against it. The affected tools named in the article are opencode, Goose, Cline, Roo-Code, Aider, Plandex, Open Interpreter, OpenHands, SWE-agent, and the Hermes project.\u003c/p\u003e\n\n\u003cp\u003eThe issue matters because these agents can run shell commands with the user’s full account access. If pointed at a booby-trapped repository or software package, hidden instructions could lead an agent to run commands that wipe files or steal reachable secrets, including SSH keys, cloud credentials, or files in the home folder. The article says two common conditions can make an attack land: the AI produces the malicious command, and the agent runs on its own with auto-execute enabled or its container sandbox switched off.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the flaw comes from agents checking command text before bash rewrites it for execution. A filter looking for \u003ccode\u003erm\u003c/code\u003e may miss \u003ccode\u003er''m\u003c/code\u003e, while bash removes the empty quotes and runs \u003ccode\u003erm\u003c/code\u003e anyway. The article says adding more blocklist patterns is not enough, and describes Continue’s stronger approach as reading the command the way bash will befo
