<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

<script>
window.__DL_ARTICLES = [{"n":1,"title":"Tycoon2FA hijacks Microsoft 365 accounts via device-code phishing","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/tycoon2fa-hijacks-microsoft-365-accounts-via-device-code-phishing/","time":"14:43","priority":"SHOULD READ","score":86,"tldr":"Tycoon2FA has added device-code phishing to hijack Microsoft 365 accounts, tricking victims into entering attacker-provided codes on Microsoft’s legitimate device login page so attackers receive OAuth tokens. Defenders should disable device code flow where possible, tighten OAuth consent controls, and monitor Entra logs for suspicious device-code authentication.","briefOverview":"\u003cp\u003eThe Tycoon2FA phishing kit now supports device-code phishing attacks that target Microsoft 365 accounts. According to eSentire, a recent campaign begins with a Trustifi click-tracking URL in a lure email and ends with victims granting OAuth tokens to an attacker-controlled device through Microsoft’s legitimate device-login flow. The article notes that this development follows Tycoon2FA’s return after a March law enforcement disruption.\u003c/p\u003e\n\n\u003cp\u003eThe attack uses an invoice-themed phishing email, redirects through Trustifi, Cloudflare Workers, and obfuscated JavaScript layers, and lands victims on a fake Microsoft CAPTCHA page. The phishing page retrieves a Microsoft OAuth device code from the attacker’s backend and tells the victim to enter it at microsoft.com/devicelogin. Once the victim completes MFA, Microsoft issues OAuth access and refresh tokens to the attacker-controlled device.\u003c/p\u003e\n\n\u003cp\u003eThe article says the kit includes extensive anti-analysis protections against researchers, automated scanning, security vendors, VPNs, sandboxes, AI crawlers, cloud providers, and debugging. eSentire recommends disabling OAuth device code flow when it is not needed, restricting OAuth consent permissions, requiring admin approval for third-party apps, enabling Continuous Access Evaluation, enforcing compliant device access policies, and monitoring Entra logs for relevant authentication signals.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Tycoon2FA phishing kit has added support for device-code phishing attacks against Microsoft 365 accounts. The article says the attacks abuse Trustifi click-tracking URLs and Microsoft’s legitimate device-login flow to obtain OAuth tokens for attacker-controlled devices. This allows attackers to gain access to the victim’s Microsoft 365 data and services, including email, calendar, and cloud file storage.\u003c/p\u003e\n\n\u003cp\u003eThe development comes after an international law enforcement operation disrupted the Tycoon2FA phishing platform in March. The article says the operation was rebuilt on new infrastructure and quickly returned to regular activity levels. Abnormal Security reportedly confirmed earlier in the month that Tycoon2FA had rebounded to normal operations and added new obfuscation layers.\u003c/p\u003e\n\n\u003cp\u003eAccording to eSentire, the observed attack begins when a victim clicks a Trustifi click-tracking URL in a lure email. The campaign uses an invoice-themed phishing email that redirects through Trustifi, Cloudflare Workers, and several obfuscated JavaScript layers before reaching a fake Microsoft CAPTCHA page. The article says eSentire does not know how the attackers came to use Trustifi, which is described as a legitimate email security platform.\u003c/p\u003e\n\n\u003cp\u003eThe phishing page retrieves a Microsoft OAuth device code from the attacker’s backend and instructs the victim to copy and paste it into microsoft.com/devicelogin. The victim then completes multi-factor authentication on their end. After that, Microsoft issues OAuth access and refresh tokens to the attacker-controlled device.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights the kit’s protections against researchers and automated scanning. eSentire says Tycoon2FA detects tools and environments such as Selenium, Puppeteer, Playwright, Burp Suite, VPNs, sandboxes, AI crawlers, cloud providers, and debugger timing traps. Requests from suspected analysis environments are redirected to a legitimate Microsoft page, and the kit’s blocklist reportedly contains 230 vendor names and is constantly updated.\u003c/p\u003e\n\n\u003cp\u003eFor defense, eSentire recommends disabling OAuth device code flow when not needed, restricting OAuth consent permissions, requiring admin approval for third-party apps, enabling Continuous Access Evaluation, and enforcing compliant device access policies. The company also recommends monitoring Entra logs for deviceCode authentication, Microsoft Authentication Broker usage, and Node.js user agents. eSentire published indicators of compromise for the latest Tycoon2FA attacks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that the Tycoon2FA phishing kit now supports device-code phishing attacks targeting Microsoft 365 accounts. The campaign also abuses Trustifi click-tracking URLs as part of its delivery chain. According to eSentire, the attack ultimately causes victims to unknowingly grant OAuth tokens to an attacker-controlled device through Microsoft’s legitimate device-login flow at microsoft.com/devicelogin.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this as a significant evolution for Tycoon2FA because the kit continues to develop after a March international law enforcement disruption. That operation disrupted the Tycoon2FA phishing platform, but the article says the malicious operation was rebuilt on new infrastructure and quickly returned to regular activity levels. Abnormal Security reportedly confirmed earlier in the month that Tycoon2FA had rebounded to normal operations and added new obfuscation layers.\u003c/p\u003e\n\n\u003ch2 id=\"device-code-phishing-method\"\u003eDevice-code phishing method\u003c/h2\u003e\n\n\u003cp\u003eDevice-code phishing is described as an attack in which threat actors send a device authorization request to the target service’s provider and forward the generated code to the victim. The victim is tricked into entering the code on the service’s legitimate login page. In this case, the target service is Microsoft 365, and the legitimate login destination is microsoft.com/devicelogin.\u003c/p\u003e\n\n\u003cp\u003eThe article states that entering the code authorizes the attacker to register a rogue device with the victim’s Microsoft 365 account. This gives the attacker unrestricted access to the victim’s data and services. The article specifically names email, calendar, and cloud file storage as affected Microsoft 365 services.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that device-code phishing has increased sharply this year. Push Security recently warned that this type of attack increased by 37x and is supported by at least ten distinct phishing-as-a-service platforms and private kits. A Proofpoint report is also cited as recording a similar surge in the use of the tactic.\u003c/p\u003e\n\n\u003ch2 id=\"tycoon2fa-campaign-flow\"\u003eTycoon2FA campaign flow\u003c/h2\u003e\n\n\u003cp\u003eAccording to eSentire, the attack begins when the victim clicks a Trustifi click-tracking URL in a lure email. The campaign observed by eSentire used an invoice-themed phishing email. The redirect chain moves through Trustifi, Cloudflare Workers, and several obfuscated JavaScript layers.\u003c/p\u003e\n\n\u003cp\u003eThe victim eventually lands on a fake Microsoft CAPTCHA page. From there, the phishing page retrieves a Microsoft OAuth device code from the attacker’s backend. The victim is instructed to copy and paste that code into microsoft.com/devicelogin.\u003c/p\u003e\n\n\u003cp\u003eAfter entering the code, the victim completes multi-factor authentication on their end. The article states that Microsoft then issues OAuth access and refresh tokens to the attacker-controlled device. This means the attack relies on the victim interacting with Microsoft’s legitimate device-login flow rather than only a fake credential page.\u003c/p\u003e\n\n\u003ch2 id=\"use-of-trustifi-infrastructure\"\u003eUse of Trustifi infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe article says the campaign abuses Trustifi click-tracking URLs. Trustifi is described as a legitimate email security platform that provides tools integrated into email services, including Microsoft and Google services. eSentire does not know how the attackers came to use Trustifi.\u003c/p\u003e\n\n\u003cp\u003eTrustifi appears at the beginning of the campaign’s delivery path. The article does not state that Trustifi itself was compromised or explain the mechanism by which the attackers used Trustifi URLs. It only states that the observed phishing email contained a Trustifi tracking URL and that eSentire does not know how the attackers came to use Trustifi.\u003c/p\u003e\n\n\u003ch2 id=\"anti-analysis-and-evasion-features\"\u003eAnti-analysis and evasion features\u003c/h2\u003e\n\n\u003cp\u003eThe Tycoon2FA kit includes extensive protections against researchers and automated scanning. The article lists detection of Selenium, Puppeteer, Playwright, Burp Suite, security vendors, VPNs, sandboxes, AI crawlers, and cloud providers. It also mentions the use of debugger timing traps.\u003c/p\u003e\n\n\u003cp\u003eRequests from devices indicating an analysis environment are automatically redirected to a legitimate Microsoft page, according to eSentire. The researchers found that the kit’s blocklist currently contains 230 vendor names. The article also says the blocklist is constantly updated.\u003c/p\u003e\n\n\u003ch2 id=\"actors-and-affected-parties\"\u003eActors and affected parties\u003c/h2\u003e\n\n\u003cp\u003eThe article refers to Tycoon2FA operators and the Tycoon2FA phishing kit, but it does not name a specific individual or group behind the activity. It describes Tycoon2FA as a phishing platform and notes that it had been disrupted by law enforcement before being rebuilt on new infrastructure. The affected accounts are Microsoft 365 accounts.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies victims as users who click the lure email link, follow the device-code instructions, and complete MFA through Microsoft’s legitimate flow. The impact described is access to Microsoft 365 data and services. Those services include email, calendar, and cloud file storage.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-recommendations-and-indicators\"\u003eDefensive recommendations and indicators\u003c/h2\u003e\n\n\u003cp\u003eThe article says eSentire recommends several mitigations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDisable the OAuth device code flow when it is not needed.\u003c/li\u003e\n\u003cli\u003eRestrict OAuth consent permissions.\u003c/li\u003e\n\u003cli\u003eRequire admin approval for third-party apps.\u003c/li\u003e\n\u003cli\u003eEnable Continuous Access Evaluation.\u003c/li\u003e\n\u003cli\u003eEnforce compliant device access policies.\u003c/li\u003e\n\u003cli\u003eMonitor Entra logs for deviceCode authentication.\u003c/li\u003e\n\u003cli\u003eMonitor for Microsoft Authentication Broker usage.\u003c/li\u003e\n\u003cli\u003eMonitor for Node.js user agents.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also states that eSentire published indicators of compromise for the latest Tycoon2FA attacks. These IoCs are intended to help defenders protect their environments.\u003c/p\u003e\n","keyPoints":["The Tycoon2FA phishing kit now supports device-code phishing attacks to hijack Microsoft 365 accounts.","The attack tricks victims into entering an attacker-provided code on Microsoft’s legitimate device login page, which grants OAuth access and refresh tokens to an attacker-controlled device.","eSentire reported that recent Tycoon2FA campaigns used invoice-themed phishing emails with Trustifi click-tracking URLs that redirected through Trustifi, Cloudflare Workers, and obfuscated JavaScript layers.","The Tycoon2FA kit includes protections against researchers and automated scanning, including detection of Selenium, Puppeteer, Playwright, Burp Suite, VPNs, sandboxes, AI crawlers, and cloud providers.","eSentire recommends disabling the OAuth device code flow when not needed, restricting OAuth consent permissions, requiring admin approval for third-party apps, and monitoring Entra logs for deviceCode authentication."],"insights":["Tycoon2FA returned to normal activity levels and added new obfuscation layers shortly after a March law enforcement disruption, showing that the takedown did not produce a lasting interruption.","The campaign’s use of Microsoft’s legitimate device-login flow means victims complete MFA themselves while unknowingly authorizing attacker-controlled OAuth tokens.","Trustifi click-tracking URLs were used at the start of the attack chain, demonstrating that legitimate email-security platform infrastructure can appear in the delivery path of Tycoon2FA phishing emails.","The kit’s anti-analysis defenses are broad and actively maintained, with eSentire reporting a blocklist of 230 vendor names and automatic redirection of suspected analysis environments to a legitimate Microsoft page.","Monitoring for deviceCode authentication, Microsoft Authentication Broker usage, and Node.js user agents in Entra logs is specifically recommended for detecting this Tycoon2FA activity."],"referencedReports":[{"title":"Device Code Phishing Evolution: Identity Takeover","url":"https://www.proofpoint.com/us/blog/threat-insight/device-code-phishing-evolution-identity-takeover","publisher":"Proofpoint","context":"The article cites a recent Proofpoint report as recording a surge in the use of device-code phishing.","category":"","primary":false},{"title":"Tycoon 2FA Operators Adopt OAuth Device Code Phishing","url":"https://www.esentire.com/blog/tycoon-2fa-operators-adopt-oauth-device-code-phishing","publisher":"eSentire","context":"The article cites new eSentire research describing Tycoon2FA’s use of OAuth device-code phishing and the campaign’s multi-layer delivery chain.","category":"","primary":false}],"body":"\u003cp\u003eThe Tycoon2FA phishing kit now supports device-code phishing attacks that target Microsoft 365 accounts. According to eSentire, a recent campaign begins with a Trustifi click-tracking URL in a lure email and ends with victims granting OAuth tokens to an attacker-controlled device through Microsoft’s legitimate device-login flow. The article notes that this development follows Tycoon2FA’s return after a March law enforcement disruption.\u003c/p\u003e\n\n\u003cp\u003eThe attack uses an invoice-themed phishing email, redirects through Trustifi, Cloudflare Workers, and obfuscated JavaScript layers, and lands victims on a fake Microsoft CAPTCHA page. The phishing page retrieves a Microsoft OAuth device code from the attacker’s backend and tells the victim to enter it at microsoft.com/devicelogin. Once the victim completes MFA, Microsoft issues OAuth access and refresh tokens to the attacker-controlled device.\u003c/p\u003e\n\n\u003cp\u003eThe article says the kit includes extensive anti-analysis protections against researchers, automated scanning, security vendors, VPNs, sandboxes, AI crawlers, cloud providers, and debugging. eSentire recommends disabling OAuth device code flow when it is not needed, restricting OAuth consent permissions, requiring admin approval for third-party apps, enabling Continuous Access Evaluation, enforcing compliant device access policies, and monitoring Entra logs for relevant authentication signals.\u003c/p\u003e\n"},{"n":2,"title":"Grafana GitHub Token Breach Led to Codebase Download and Extortion Attempt","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/05/grafana-github-token-breach-led-to.html","time":"07:13","priority":"SHOULD READ","score":82,"tldr":"Grafana said an unauthorized party used a leaked GitHub token to access its GitHub environment and download code, but found no evidence that customer data, personal information, or customer systems were affected. The attacker attempted extortion, but Grafana says it invalidated the credentials, added protections, and will not pay a ransom.","briefOverview":"\u003cp\u003eGrafana disclosed that an unauthorized party obtained a token that allowed access to the company’s GitHub environment and enabled the download of its codebase. The company said it recently learned of the attack and launched a forensic analysis after discovering the activity. Grafana did not disclose when the incident occurred or how long the threat actor had access.\u003c/p\u003e\n\n\u003cp\u003eGrafana said its investigation found no customer data or personal information was accessed during the incident. It also said it found no evidence of impact to customer systems or operations. The compromised credentials have been invalidated, and the company said it implemented additional security measures to prevent unauthorized access.\u003c/p\u003e\n\n\u003cp\u003eThe attacker attempted to blackmail and extort Grafana by demanding payment to prevent the stolen database from being published. Grafana said it chose not to pay the ransom, citing FBI guidance warning against negotiating with ransomware or extortion actors. Reports from Hackmanac and Ransomware.live indicate that a group named CoinbaseCartel claimed responsibility for the incident.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGrafana disclosed that an unauthorized party obtained a token that granted access to the company’s GitHub environment. The attacker used that access to download Grafana’s codebase. Grafana said it learned of the attack recently, but it did not reveal when the incident occurred or how long the attacker had access.\u003c/p\u003e\n\n\u003cp\u003eThe company said it immediately launched a forensic analysis after discovering the activity. Grafana said it identified the source of the leak, invalidated the compromised credentials, and implemented extra security measures to protect against unauthorized access. The article does not state which specific codebase was downloaded.\u003c/p\u003e\n\n\u003cp\u003eGrafana said its investigation determined that no customer data or personal information was accessed. The company also said it found no evidence that customer systems or operations were affected. Grafana offers products including Grafana Cloud, a fully managed, cloud-hosted observability platform for applications and infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe attacker attempted to blackmail and extort Grafana by demanding payment to prevent the stolen database from being published. Grafana said it opted not to pay the ransom and cited FBI guidance stating that paying does not guarantee recovery of data. The FBI also states that ransom payments can encourage perpetrators to target more victims and incentivize others to engage in the activity.\u003c/p\u003e\n\n\u003cp\u003eGrafana has not attributed the breach to any known threat actor or group. However, reports from Hackmanac and Ransomware.live indicate that CoinbaseCartel claimed responsibility. The article cites Halcyon and Fortinet FortiGuard Labs as describing CoinbaseCartel as a data extortion crew that emerged in September 2025 and is assessed to be an offshoot of the ShinyHunters, Scattered Spider, and LAPSUS$ ecosystems.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eGrafana disclosed that an unauthorized party obtained a token that allowed access to the company’s GitHub environment. According to Grafana, the token gave the attacker the ability to download the company’s codebase. The company said it learned of the attack recently and immediately began a forensic analysis after discovering the activity.\u003c/p\u003e\n\n\u003cp\u003eGrafana did not disclose when the incident occurred. It also did not reveal how long the threat actor had access to its environment. The article states that the breach has not been attributed by Grafana to any known threat actor or group.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-disclosed\"\u003eTechnical Details Disclosed\u003c/h2\u003e\n\n\u003cp\u003eThe central technical detail in the incident is the compromise of a token associated with Grafana’s GitHub environment. Grafana said the unauthorized party obtained this token and used it to access the GitHub environment and download codebase material.\u003c/p\u003e\n\n\u003cp\u003eThe article does not specify which Grafana codebase was downloaded. It notes that Grafana offers several solutions, including Grafana Cloud, which is described as a fully managed, cloud-hosted observability platform for applications and infrastructure.\u003c/p\u003e\n\n\u003cp\u003eGrafana said it identified the source of the leak. The compromised credentials were invalidated, and the company said it implemented additional security measures to protect against unauthorized access.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact\"\u003eDisclosed Impact\u003c/h2\u003e\n\n\u003cp\u003eGrafana said its investigation found no customer data or personal information was accessed during the incident. The company also said it found no evidence of impact to customer systems or operations.\u003c/p\u003e\n\n\u003cp\u003eThe article does not report any operational disruption, customer system compromise, or confirmed exposure of customer information. The known accessed asset, based on Grafana’s disclosure, was the company’s GitHub environment and its codebase.\u003c/p\u003e\n\n\u003ch2 id=\"extortion-attempt\"\u003eExtortion Attempt\u003c/h2\u003e\n\n\u003cp\u003eGrafana said the attacker attempted to blackmail and extort the company. The attacker demanded payment to prevent the stolen database from being published.\u003c/p\u003e\n\n\u003cp\u003eGrafana said it chose not to pay the ransom. The company cited guidance from the U.S. Federal Bureau of Investigation, which warns against negotiating ransom payments with perpetrators because there is no guarantee that payment will help affected companies recover their data.\u003c/p\u003e\n\n\u003cp\u003eThe article also quotes the FBI as stating that paying ransoms encourages perpetrators to target more victims and creates an incentive for others to engage in the same illegal activity.\u003c/p\u003e\n\n\u003ch2 id=\"known-or-suspected-actors\"\u003eKnown or Suspected Actors\u003c/h2\u003e\n\n\u003cp\u003eGrafana has not attributed the breach to any known threat actor or group. However, the article cites reports from Hackmanac and Ransomware.live indicating that a cybercrime group named CoinbaseCartel claimed responsibility for the incident.\u003c/p\u003e\n\n\u003cp\u003eThe article also references Halcyon and Fortinet FortiGuard Labs reporting on CoinbaseCartel. According to those reports as described in the article, CoinbaseCartel is a data extortion crew that emerged in September 2025.\u003c/p\u003e\n\n\u003cp\u003eThe group is assessed to be an offshoot of the ShinyHunters, Scattered Spider, and LAPSUS$ ecosystems. The article says CoinbaseCartel focuses only on data theft and extortion, unlike traditional ransomware groups, and has amassed 170 victims across healthcare, technology, transportation, manufacturing, and business services.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-remediation\"\u003eResponse and Remediation\u003c/h2\u003e\n\n\u003cp\u003eGrafana said it took the following steps after discovering the activity:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLaunched a forensic analysis.\u003c/li\u003e\n\u003cli\u003eIdentified the source of the leak.\u003c/li\u003e\n\u003cli\u003eInvalidated the compromised credentials.\u003c/li\u003e\n\u003cli\u003eImplemented additional security measures to defend against unauthorized access.\u003c/ tortion leverage even when customer data and operations are not affected.","Grafana’s disclosure leaves key exposure details unresolved, including when the incident occurred, how long the attacker had access, and which codebase was downloaded.","The alleged claimant, CoinbaseCartel, is described as a data-theft-and-extortion group rather than a traditional ransomware operation, reflecting an extortion model that does not depend on encrypting victim systems.","Grafana’s refusal to pay contrasts with the recent Instructure case mentioned in the article, where a company settled with ShinyHunters after a large-scale leak threat."],"referencedReports":[{"title":"Ransomware","url":"https://www.fbi.gov/how-we-can-help-you/scams-and-safety/common-frauds-and-scams/ransomware","publisher":"U.S. Federal Bureau of Investigation","context":"The article cites FBI guidance warning that paying ransoms does not guarantee data recovery and can encourage further criminal activity.","category":"","primary":false},{"title":"CoinbaseCartel","url":"https://www.halcyon.ai/jp/threat-group/coinbasecartel","publisher":"Halcyon","context":"The article references Halcyon reporting to describe CoinbaseCartel as a data extortion crew that emerged in September 2025 and is assessed as an offshoot of the ShinyHunters, Scattered Spider, and LAPSUS$ ecosystems.","category":"","primary":false},{"title":"Coinbase Cartel Ransomware","url":"https://www.fortiguard.com/threat-actor/6386/coinbase-cartel-ransomware","publisher":"Fortinet FortiGuard Labs","context":"The article references Fortinet FortiGuard Labs reporting to describe CoinbaseCartel’s activity and its focus on data theft and extortion.","category":"","primary":false}],"body":"\u003cp\u003eGrafana disclosed that an unauthorized party obtained a token that allowed access to the company’s GitHub environment and enabled the download of its codebase. The company said it recently learned of the attack and launched a forensic analysis after discovering the activity. Grafana did not disclose when the incident occurred or how long the threat actor had access.\u003c/p\u003e\n\n\u003cp\u003eGrafana said its investigation found no customer data or personal information was accessed during the incident. It also said it found no evidence of impact to customer systems or operations. The compromised credentials have been invalidated, and the company said it implemented additional security measures to prevent unauthorized access.\u003c/p\u003e\n\n\u003cp\u003eThe attacker attempted to blackmail and extort Grafana by demanding payment to prevent the stolen database from being published. Grafana said it chose not to pay the ransom, citing FBI guidance warning against negotiating with ransomware or extortion actors. Reports from Hackmanac and Ransomware.live indicate that a group named CoinbaseCartel claimed responsibility for the incident.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {

function priorityColor(p) {

  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }

        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {

  return (
    <span style={{

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

        <div style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <select value={theme} onChange={(e) => applyTheme(e.target.value)} title="Select theme" aria-label="Select theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

            <PriorityBadge priority={article.priority} />
          </div>
        </div>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 22, lineHeight: 1.3, color: "var(--text)", letterSpacing: "-0.005em" }}>
          {article.title}
        </h2>
      </div>
      <div style={{ padding: "20px 24px", flex: 1, display: "flex", flexDirection: "column", overflow: "auto" }}>
        <span className="section-label" style={{ marginBottom: 12 }}>TL;DR</span>
        <p style={{ color: "var(--text2)", fontSize: 14, lineHeight: 1.65, fontWeight: 400 }}>{article.tldr}</p>
        {article.keyPoints && article.keyPoints.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
            <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
              {article.keyPoints.map((kp, i) => (
                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: priorityC, marginTop: 3, letterSpacing: "0.04em" }}>
                    {String(i + 1).padStart(2, "0")}
                  </span>
                  <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{kp}</span>
                </li>
              ))}
            </ul>
          </div>
        )}
      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = `var(--p${article.sourceColorIdx})`;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
