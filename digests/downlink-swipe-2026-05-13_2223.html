<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }

window.__DL_ARTICLES = [{"n":3,"title":"New critical Exim mailer flaw allows remote code execution","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/new-critical-exim-mailer-flaw-allows-remote-code-execution/","time":"20:23","priority":"MUST READ","score":95,"group":null,"groupColor":null,"tldr":"A critical use-after-free vulnerability in Exim versions 4.97 through 4.99.2 with GnuTLS enables unauthenticated remote code execution, making immediate updates to version 4.99.3 essential. The flaw was successfully weaponized using a combination of autonomous AI tools and human research, underscoring the urgent need for rapid patching across widely deployed Linux mail servers.","briefOverview":"\u003cp\u003eA critical vulnerability in certain Exim mail server configurations allows unauthenticated attackers to execute arbitrary code.\u003c/p\u003e\n\n\u003cp\u003eIdentified as CVE-2026-45185, the flaw impacts Exim versions 4.97 through 4.99.2 when compiled with GnuTLS and configured to advertise STARTTLS and CHUNKING.\u003c/p\u003e\n\n\u003cp\u003eThe issue is a use-after-free condition triggered during TLS shutdown while processing BDAT chunked SMTP traffic.\u003c/p\u003e\n\n\u003cp\u003eWhen the server frees a TLS transfer buffer, it continues to use stale callback references that write data into the freed memory region.\u003c/p\u003e\n\n\u003cp\u003eThis memory corruption can lead to remote code execution on the affected server.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was discovered and reported by XBOW researcher Federico Kirschbaum on May 1.\u003c/p\u003e\n\n\u003cp\u003eA patched version, Exim 4.99.3, was released on May 12 to address the issue.\u003c/p\u003e\n\n\u003cp\u003eAdministrators using Ubuntu or Debian-based systems should immediately apply the update through their package managers.\u003c/p\u003e\n\n\u003cp\u003eNotably, Exim builds compiled with OpenSSL are completely unaffected by this vulnerability.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA critical security flaw in the Exim open-source mail transfer agent enables unauthenticated remote code execution on vulnerable systems.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-45185 specifically impacts Exim versions ranging from 4.97 to 4.99.2.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability only affects builds compiled with the GnuTLS library that have STARTTLS and CHUNKING features advertised.\u003c/p\u003e\n\n\u003cp\u003eIt is classified as a use-after-free flaw that triggers during the TLS shutdown process.\u003c/p\u003e\n\n\u003cp\u003eThe exploit occurs while the server handles BDAT chunked SMTP traffic.\u003c/p\u003e\n\n\u003cp\u003eDuring this process, Exim incorrectly frees a TLS transfer buffer but continues to use stale callback references.\u003c/p\u003e\n\n\u003cp\u003eThese references write data into the freed memory region, creating a dangerous use-after-free condition.\u003c/p\u003e\n\n\u003cp\u003eAttackers leveraging this flaw can execute arbitrary commands on the server and access sensitive email data.\u003c/p\u003e\n\n\u003cp\u003eDepending on the server\u0026rsquo;s configuration, successful exploitation could allow attackers to pivot deeper into the network environment.\u003c/p\u003e\n\n\u003cp\u003eXBOW researcher Federico Kirschbaum identified and reported the issue on May 1.\u003c/p\u003e\n\n\u003cp\u003eThe Exim maintainers acknowledged the report on May 5, and Linux distribution security teams were notified three days later.\u003c/p\u003e\n\n\u003cp\u003eA complete fix was released in Exim version 4.99.3 on May 12.\u003c/p\u003e\n\n\u003cp\u003eOpenSSL-based Exim builds remain unaffected by this vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights the development of a proof-of-concept exploit that took seven days to create.\u003c/p\u003e\n\n\u003cp\u003eThis development involved a collaborative challenge between XBOW Native, an autonomous AI system, and a human researcher assisted by a large language model.\u003c/p\u003e\n\n\u003cp\u003eThe AI successfully generated working exploits for simplified targets without ASLR and later for targets with ASLR but non-PIE binaries.\u003c/p\u003e\n\n\u003cp\u003eInterestingly, the AI targeted Exim\u0026rsquo;s own memory allocator rather than relying on standard glibc allocator mechanisms.\u003c/p\u003e\n\n\u003cp\u003eDespite the AI\u0026rsquo;s speed, the human researcher ultimately won the race by shaping the work environment and guiding the process.\u003c/p\u003e\n\n\u003cp\u003eThe researcher concluded that while large language models are excellent for rapid code analysis, they are not yet capable of independently crafting exploits for real-world production software.\u003c/p\u003e\n\n\u003cp\u003eOrganizations running Ubuntu or Debian-based distributions are strongly advised to apply the Exim 4.99.3 update immediately through their standard package managers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eVulnerability Overview and Technical Details\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-45185 is a critical use-after-free vulnerability affecting specific configurations of the Exim open-source mail transfer agent.\u003c/li\u003e\n\u003cli\u003eThe flaw impacts Exim versions 4.97 through 4.99.2 when compiled with the GnuTLS library.\u003c/li\u003e\n\u003cli\u003eIt requires the server to advertise both STARTTLS and CHUNKING protocols to be exploitable.\u003c/li\u003e\n\u003cli\u003eOpenSSL-based Exim builds are explicitly unaffected by this issue.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eDiscovery and Remediation Timeline\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eXBOW researcher Federico Kirschbaum discovered and reported the vulnerability to Exim maintainers on May 1.\u003c/li\u003e\n\u003cli\u003eThe maintainers acknowledged the report on May 5.\u003c/li\u003e\n\u003cli\u003eAffected Linux distributions were notified three days after the acknowledgment.\u003c/li\u003e\n\u003cli\u003eA patched version, Exim 4.99.3, was released on May 12 to resolve the issue.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003e\u003cstrong\u003eAI-Assisted Exploit Development\u003c/strong\u003e\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe article details a seven-day challenge to build a proof-of-concept exploit between XBOW Native and a human researcher assisted by a large language model.\u003c/li\u003e\n\u003cli\u003eXBOW Native successfully produced a working exploit for a simplified target lacking Address Space Layout Randomization and non-PIE binaries.\u003c/li\u003e\n\u003cli\u003eIn a second attempt, the AI achieved an exploit on a machine with ASLR enabled but still running non-PIE binaries.\u003c/li\u003e\n\u003cli\u003eRather than attacking glibc\u0026rsquo;s allocator with standard techniques, the AI targeted Exim\u0026rsquo;s own memory allocator.\u003c/li\u003e\n\u003cli\u003eThe human researcher ultimately won the race by actively shaping the work environment instead of allowing the model to operate independently.\u003c/li\u003e\n\u003cli\u003eThe researcher noted that while large language models excel at rapidly analyzing unfamiliar code and identifying suspicious areas, they are not yet ready to independently write exploits for real-world production software.\u003c/li\u003e\n\u003cli\u003eThe human acknowledged that AI tools played a crucial role in accelerating the research process and understanding complex codebases.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["CVE-2026-45185 is a critical use-after-free vulnerability in Exim versions 4.97 through 4.99.2 that enables unauthenticated remote code execution when compiled with GnuTLS.","The flaw triggers during TLS shutdown while processing BDAT chunked SMTP traffic and does not affect OpenSSL-based Exim builds.","XBOW researcher Federico Kirschbaum discovered and reported the vulnerability on May 1, leading to the release of patched Exim version 4.99.3 on May 12.","A proof-of-concept exploit was developed over seven days using a combination of autonomous AI tools and human research assisted by a large language model."],"insights":["Organizations running OpenSSL-based Exim builds are completely unaffected, providing an immediate mitigation path if patching is delayed.","The autonomous AI system bypassed traditional glibc allocator exploitation by targeting Exim's custom memory allocator, revealing a novel attack vector against proprietary memory management.","The human researcher successfully outperformed the autonomous AI in exploit development, concluding that current LLMs cannot yet independently craft exploits for real-world production software.","The vulnerability only triggers when STARTTLS and CHUNKING are explicitly advertised, meaning mail servers with these features disabled are inherently protected."],"referencedReports":[{"title":"dead-letter-cve-2026-45185-xbow-found-rce-exim","url":"https://xbow.com/blog/dead-letter-cve-2026-45185-xbow-found-rce-exim","publisher":"XBOW","context":"The article cites this link when quoting XBOW researchers on their autonomous AI and human-led exploit development process for the vulnerability."}],"body":"\u003cp\u003eA critical vulnerability in certain Exim mail server configurations allows unauthenticated attackers to execute arbitrary code.\u003c/p\u003e\n\n\u003cp\u003eIdentified as CVE-2026-45185, the flaw impacts Exim versions 4.97 through 4.99.2 when compiled with GnuTLS and configured to advertise STARTTLS and CHUNKING.\u003c/p\u003e\n\n\u003cp\u003eThe issue is a use-after-free condition triggered during TLS shutdown while processing BDAT chunked SMTP traffic.\u003c/p\u003e\n\n\u003cp\u003eWhen the server frees a TLS transfer buffer, it continues to use stale callback references that write data into the freed memory region.\u003c/p\u003e\n\n\u003cp\u003eThis memory corruption can lead to remote code execution on the affected server.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was discovered and reported by XBOW researcher Federico Kirschbaum on May 1.\u003c/p\u003e\n\n\u003cp\u003eA patched version, Exim 4.99.3, was released on May 12 to address the issue.\u003c/p\u003e\n\n\u003cp\u003eAdministrators using Ubuntu or Debian-based systems should immediately apply the update through their package managers.\u003c/p\u003e\n\n\u003cp\u003eNotably, Exim builds compiled with OpenSSL are completely unaffected by this vulnerability.\u003c/p\u003e\n"},{"n":2,"title":"Iranian hackers targeted major South Korean electronics maker","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/iranian-hackers-targeted-major-south-korean-electronics-maker/","time":"21:59","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"Iranian hackers linked to the MuddyWater group successfully infiltrated a major South Korean electronics manufacturer and other high-profile targets by abusing legitimate software and DLL sideloading to steal intellectual property and conduct espionage.","briefOverview":"\u003cp\u003eThe Iran-linked hacking group MuddyWater, also known as Seedworm or Static Kitten, recently launched a broad cyber-espionage campaign targeting at least nine high-profile organizations across multiple sectors and regions. Among the primary victims is a major South Korean electronics manufacturer that was compromised for a full week in February 2026. Researchers at Symantec determined that the threat actor operated with an intelligence-driven focus, aiming to steal industrial secrets, intellectual property, and government intelligence. The attackers heavily relied on DLL sideloading techniques, loading malicious code into legitimate binaries from Foremedia and SentinelOne to maintain access and exfiltrate data. They utilized a tool called ChromElevator to steal information stored in Chrome-based browsers while managing payloads through Node.js loaders. The campaign also featured extensive use of PowerShell for reconnaissance, credential theft, and establishing persistent backdoors. Data was exfiltrated using the public file-sharing service sendit.sh to mask malicious traffic as routine uploads. Symantec researchers noted that the attack cadence suggests implant-driven activity rather than continuous human operator presence. Overall, the campaign highlights the group\u0026rsquo;s geographic expansion, operational maturity, and strategic shift toward quieter, more sophisticated attack methods.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Iran-linked threat actor MuddyWater, alternatively identified as Seedworm or Static Kitten, executed a comprehensive cyber-espionage campaign targeting at least nine prominent organizations globally. The targeted entities span multiple industries and include government agencies, educational institutions, Asian industrial manufacturers, a Middle Eastern international airport, and a major South Korean electronics manufacturer. Symantec researchers confirmed that the attackers maintained persistent access within the South Korean firm\u0026rsquo;s network for seven days during February 2026. The operation was explicitly intelligence-driven, with objectives centered on industrial espionage, intellectual property theft, and compromising downstream corporate networks. To achieve this, the group heavily employed DLL sideloading, a technique that forces legitimate, signed executables to load malicious dynamic link libraries. Specifically, the attackers abused fmapp.exe, a Foremedia audio utility, and sentinelmemoryscanner.exe, a SentinelOne component, to deploy fmapp.dll and sentinelagentcore.dll. These malicious DLLs contained ChromElevator, a post-exploitation utility designed to extract data stored within Chrome-based web browsers. The campaign also demonstrated a continued reliance on PowerShell for host and domain reconnaissance, screenshot capture, credential harvesting, and the creation of SOCKS5 tunnels. Unlike previous iterations where PowerShell executed payloads directly, this campaign utilized Node.js loaders to manage and deliver malicious code. The attackers established persistence through registry modifications and maintained a beaconing interval of 90 seconds, indicating an implant-driven operational cadence rather than continuous manual oversight. To exfiltrate stolen data, the group routed traffic through sendit.sh, a public file-sharing platform that effectively disguised malicious uploads as standard web activity. Symantec’s Threat Hunter Team concluded that the campaign reflects a strategic shift toward quieter, more mature operations that leverage trusted tools and services to evade detection. This approach underscores the group\u0026rsquo;s expanding geographic footprint and its focus on high-value intellectual and government intelligence targets.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"campaign-overview\"\u003eCampaign Overview\u003c/h2\u003e\n\n\u003cp\u003eThe Iran-linked advanced persistent threat (APT) group MuddyWater, also tracked as Seedworm or Static Kitten, has conducted a broad and sophisticated cyber-espionage campaign.\nResearchers at Symantec identified at least nine high-profile organizations across multiple sectors and countries as targets.\nThe victim list includes government agencies, educational institutions, industrial manufacturers in Asia, an international airport in the Middle East, and a major South Korean electronics manufacturer.\nThe compromise of the South Korean firm lasted from February 20 to February 27, 2026, during which the threat actor operated continuously within the network.\u003c/p\u003e\n\n\u003ch2 id=\"operational-objectives\"\u003eOperational Objectives\u003c/h2\u003e\n\n\u003cp\u003eThe campaign was explicitly intelligence-driven, focusing on several high-value objectives.\nPrimary goals included the theft of industrial secrets and intellectual property from the targeted electronics manufacturer.\nThe attackers also sought government espionage capabilities and aimed to establish footholds within downstream customer networks and broader corporate infrastructures.\nSymantec researchers characterized the operation as a mature, geographically expanding campaign that deliberately shifts toward quieter, more stealthy attack methodologies.\u003c/p\u003e\n\n\u003ch2 id=\"technical-execution-and-techniques\"\u003eTechnical Execution and Techniques\u003c/h2\u003e\n\n\u003cp\u003eThe threat actor employed a multi-stage technical approach that heavily leverages legitimate software and established scripting languages.\nKey technical components include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDLL Sideloading:\u003c/strong\u003e The campaign relies extensively on DLL sideloading to bypass security controls.\nThe attackers abused two legitimate, signed binaries: \u003ccode\u003efmapp.exe\u003c/code\u003e (a Foremedia audio utility) and \u003ccode\u003esentinelmemoryscanner.exe\u003c/code\u003e (a SentinelOne component).\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eMalicious Payloads:\u003c/strong\u003e The sideloaded DLLs, specifically \u003ccode\u003efmapp.dll\u003c/code\u003e and \u003ccode\u003esentinelagentcore.dll\u003c/code\u003e, contained ChromElevator.\nThis commodity post-exploitation tool is designed to steal data stored within Chrome-based browsers.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCommand and Control:\u003c/strong\u003e While PowerShell remains a core component for reconnaissance, credential theft, persistence, and SOCKS5 tunnel creation, the payload delivery mechanism has evolved.\nThe group now utilizes Node.js loaders to control PowerShell payloads rather than executing them directly.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePersistence and Beaconing:\u003c/strong\u003e The attackers established persistence through registry modifications and configured implants to beacon at 90-second intervals.\nResearchers noted this cadence is consistent with automated implant-driven activity rather than continuous human operator presence.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eData Exfiltration:\u003c/strong\u003e The group utilized \u003ccode\u003esendit.sh\u003c/code\u003e, a public file-sharing service, to exfiltrate stolen data.\nThis technique effectively masks malicious traffic as routine web uploads, obscuring the exfiltration from network monitoring tools.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"threat-actor-assessment\"\u003eThreat Actor Assessment\u003c/h2\u003e\n\n\u003cp\u003eSymantec’s Threat Hunter Team concluded that the campaign demonstrates significant operational maturity and geographic expansion.\nThe deliberate abuse of signed, legitimate binaries and public services marks a clear evolution toward quieter, more resilient attack patterns.\nThe continued use of PowerShell combined with Node.js loaders and DLL sideloading indicates a highly adaptable toolkit focused on long-term intelligence gathering and intellectual property theft.\u003c/p\u003e\n","keyPoints":["The Iran-linked MuddyWater hacking group conducted a cyber-espionage campaign targeting at least nine high-profile organizations across multiple sectors and countries.","The attackers infiltrated a major South Korean electronics manufacturer's network for a week in February 2026 to steal industrial and intellectual property data.","The campaign heavily utilized DLL sideloading by loading malicious DLLs into legitimate binaries like Foremedia audio utilities and SentinelOne components.","Researchers observed the threat actors using PowerShell for reconnaissance, credential theft, and persistence while controlling payloads through Node.js loaders.","The group exfiltrated data using the public file-sharing service sendit.sh to obscure malicious traffic and maintain operational stealth."],"insights":["The threat actor shifted payload control mechanisms to Node.js loaders rather than relying on direct PowerShell execution, indicating an evolution in their command and control infrastructure.","The attackers leveraged sendit.sh, a public file-sharing service, for data exfiltration to camouflage malicious traffic as legitimate web uploads.","The campaign utilized DLL sideloading against signed, legitimate binaries such as Foremedia audio utilities and SentinelOne components to maintain access and steal Chrome-based browser data."],"referencedReports":[{"title":"Technical analysis on Seedworm campaign targeting South Korean electronics","url":"https://www.security.com/threat-intelligence/iran-seedworm-electronics","publisher":"Security.com","context":"The article cites this research when quoting analysts on the implant-driven cadence of the Seedworm threat actor's activity."}],"body":"\u003cp\u003eThe Iran-linked hacking group MuddyWater, also known as Seedworm or Static Kitten, recently launched a broad cyber-espionage campaign targeting at least nine high-profile organizations across multiple sectors and regions. Among the primary victims is a major South Korean electronics manufacturer that was compromised for a full week in February 2026. Researchers at Symantec determined that the threat actor operated with an intelligence-driven focus, aiming to steal industrial secrets, intellectual property, and government intelligence. The attackers heavily relied on DLL sideloading techniques, loading malicious code into legitimate binaries from Foremedia and SentinelOne to maintain access and exfiltrate data. They utilized a tool called ChromElevator to steal information stored in Chrome-based browsers while managing payloads through Node.js loaders. The campaign also featured extensive use of PowerShell for reconnaissance, credential theft, and establishing persistent backdoors. Data was exfiltrated using the public file-sharing service sendit.sh to mask malicious traffic as routine uploads. Symantec researchers noted that the attack cadence suggests implant-driven activity rather than continuous human operator presence. Overall, the campaign highlights the group\u0026rsquo;s geographic expansion, operational maturity, and strategic shift toward quieter, more sophisticated attack methods.\u003c/p\u003e\n"},{"n":1,"title":"Alleged Dream Market admin arrested in Germany after US indictment","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/dream-market-admin-arrested-in-germany","time":"19:54","priority":"SHOULD READ","score":82,"group":null,"groupColor":null,"tldr":"German and US authorities arrested the alleged main administrator of the defunct Dream Market dark web forum in Germany on money laundering charges after he attempted to convert millions in illicit cryptocurrency proceeds into gold bars and cash.","briefOverview":"\u003cp\u003eGerman and U.S. authorities arrested Owe Martin Andresen, the alleged main administrator of the defunct Dream Market dark web forum, during raids on three locations in Germany. Andresen, 49, faces multiple charges of money laundering in both countries after attempting to convert millions of dollars in illicit cryptocurrency proceeds into physical gold bars.\u003c/p\u003e\n\n\u003cp\u003eThe Justice Department indictment accuses him of channeling commissions from illegal drug sales, stolen data, and counterfeit documents through cryptocurrency wallets. Dream Market, which operated from 2013 until its shutdown in 2019, facilitated the sale of tens of kilograms of heroin, cocaine, crack, and fentanyl. U.S. agencies monitored dormant cryptocurrency wallets for years before Andresen accessed them in late 2022 and transferred the funds.\u003c/p\u003e\n\n\u003cp\u003eInvestigators seized approximately \u003cspan class=\"math inline\"\u003e\\(1.7 million in gold bars, \\)\u003c/span\u003e23,000 in cash, and an additional $1.2 million in bank accounts and crypto wallets. Andresen faces up to 240 years in prison for U.S. charges and up to five years for German charges. This arrest follows a series of recent international takedowns targeting other darknet market administrators.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eGerman and U.S. law enforcement arrested Owe Martin Andresen, 49, on May 7 during raids on three locations in Germany. He is the alleged main administrator of Dream Market, a prominent dark web forum that shut down in 2019.\u003c/p\u003e\n\n\u003cp\u003eAn unsealed DOJ indictment accuses Andresen of being the primary operator behind the platform, which launched in 2013. At its peak, the site hosted over 100,000 listings and facilitated the sale of 90 kilograms of heroin, 450 kilograms of cocaine, 25 kilograms of crack cocaine, and 36 kilograms of fentanyl. The marketplace operated through the Tor anonymity network and relied entirely on cryptocurrency payments.\u003c/p\u003e\n\n\u003cp\u003eA 2019 law enforcement operation known as J-Code resulted in dozens of arrests and the platform\u0026rsquo;s eventual shutdown. While mid-level administrators were prosecuted in the U.K. at that time, the main operator evaded capture. U.S. agencies, including the FBI and DEA, monitored associated cryptocurrency wallets between 2016 and 2022 without finding activity.\u003c/p\u003e\n\n\u003cp\u003eAndresen finally accessed the dormant wallets in late 2022, transferring the cryptocurrency to new addresses. He attempted to launder approximately \u003cspan class=\"math inline\"\u003e\\(2 million between August 2023 and April 2025 by purchasing gold bars from an Atlanta company and shipping them to his German residence. A recent raid uncovered about \\)\u003c/span\u003e1.7 million worth of gold bars, \u003cspan class=\"math inline\"\u003e\\(23,000 in cash, and another \\)\u003c/span\u003e1.2 million in bank accounts and crypto wallets.\u003c/p\u003e\n\n\u003cp\u003eAndresen faces six domestic and six international money laundering charges in the U.S., carrying a maximum sentence of 240 years. He also faces charges in Germany, which carry a maximum penalty of five years. U.S. Attorney Theodore Hertzberg confirmed that Andresen will be prosecuted in both jurisdictions. This case aligns with recent enforcement actions, including a 16-year sentence for a Kingdom Market administrator and a 30-year sentence for an Incognito Market operator.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"arrest-and-legal-proceedings\"\u003eArrest and Legal Proceedings\u003c/h3\u003e\n\n\u003cp\u003eGerman and U.S. authorities conducted raids on three locations on May 7, resulting in the arrest of Owe Martin Andresen, 49. He is identified as the alleged main administrator of Dream Market, a major dark web forum that ceased operations in 2019. The U.S. Department of Justice unsealed an indictment accusing Andresen of orchestrating the platform\u0026rsquo;s financial operations. U.S. Attorney Theodore Hertzberg stated that Andresen will face prosecution in both Germany and the United States. The Justice Department has not yet commented on whether it will request his extradition from Germany.\u003c/p\u003e\n\n\u003ch3 id=\"platform-history-and-criminal-activity\"\u003ePlatform History and Criminal Activity\u003c/h3\u003e\n\n\u003cp\u003eDream Market was launched in 2013 by Andresen and other individuals. It quickly grew into one of the largest criminal marketplaces on the internet. At its height, the site featured more than 100,000 active listings. Prosecutors noted that the platform enabled the distribution of 90 kilograms of heroin, 450 kilograms of cocaine, 25 kilograms of crack cocaine, and 36 kilograms of fentanyl. Additional illicit goods included stolen personally identifiable information and counterfeit identification documents. The site was accessed exclusively through the Tor anonymity network and utilized cryptocurrency for all transactions.\u003c/p\u003e\n\n\u003ch3 id=\"law-enforcement-operations-and-digital-forensics\"\u003eLaw Enforcement Operations and Digital Forensics\u003c/h3\u003e\n\n\u003cp\u003eA coordinated 2019 law enforcement operation, referred to as J-Code, successfully dismantled the platform and led to dozens of arrests among online drug dealers. Following the shutdown, Dream Market announced its closure, though the primary administrator remained at large. At least one mid-level administrator was arrested and prosecuted in the United Kingdom during the initial takedown. U.S. agencies, including the FBI and DEA, maintained surveillance over associated cryptocurrency wallets from 2016 through 2022. Investigators discovered that the wallets, which held millions of dollars in customer commissions, remained completely untouched for years. Andresen finally accessed the dormant wallets in late 2022, transferring the cryptocurrency to new addresses.\u003c/p\u003e\n\n\u003ch3 id=\"financial-laundering-and-asset-seizure\"\u003eFinancial Laundering and Asset Seizure\u003c/h3\u003e\n\n\u003cp\u003eProsecutors allege that Andresen laundered approximately $2 million between August 2023 and April 2025. He attempted to convert the illicit cryptocurrency into physical assets by purchasing gold bars from a company in Atlanta. The gold bars were then shipped to his private residence in Germany. During the recent raids, authorities seized the following assets:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApproximately $1.7 million worth of gold bars\u003c/li\u003e\n\u003cli\u003e$23,000 in physical cash\u003c/li\u003e\n\u003cli\u003eBank accounts and cryptocurrency wallets containing an additional $1.2 million allegedly linked to Dream Market operations\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"charges-and-sentencing-exposure\"\u003eCharges and Sentencing Exposure\u003c/h3\u003e\n\n\u003cp\u003eAndresen is indicted on six counts of money laundering and six counts of international money laundering in the United States. The combined U.S. charges carry a maximum penalty of up to 240 years in prison. He also faces separate charges under German law, which carry a maximum sentence of five years. This prosecution follows a wave of recent international actions against darknet market operators. A Taiwanese national was sentenced to 30 years in a U.S. prison for his role as an administrator of Incognito Market. Additionally, the administrator of Kingdom Market received a 16-year sentence following a joint takedown by German and U.S. authorities. U.S. officials also indicted the alleged founder of Nemesis Market last year.\u003c/p\u003e\n","keyPoints":["German and U.S. authorities arrested Owe Martin Andresen, the alleged main administrator of the defunct Dream Market dark web forum, on multiple charges of money laundering.","A raid on Andresen's locations uncovered approximately $1.7 million worth of gold bars, $23,000 in cash, and additional funds tied to cryptocurrency wallets associated with the platform.","Dream Market, which operated from 2013 until its shutdown in 2019, facilitated the sale of illicit drugs and stolen data through the Tor network and cryptocurrency payments.","Andresen faces up to 240 years in prison for U.S. charges and up to five years for German charges related to laundering millions of dollars in illicit proceeds."],"insights":["Dormant cryptocurrency wallets associated with the darknet market remained untouched for over three years after the platform's 2019 shutdown, yet their eventual access in late 2022 provided investigators with a critical long-term financial trail.","The suspect's attempt to launder illicit cryptocurrency by purchasing physical gold bars from a U.S. vendor and shipping them to Germany created a tangible paper trail that facilitated the physical seizure of approximately $1.7 million in assets.","Multi-jurisdictional prosecution strategies allow authorities to pursue maximum penalties by charging suspects under both U.S. and German legal frameworks simultaneously, as seen in the combined 240-year and five-year sentence exposures."],"referencedReports":[],"body":"\u003cp\u003eGerman and U.S. authorities arrested Owe Martin Andresen, the alleged main administrator of the defunct Dream Market dark web forum, during raids on three locations in Germany. Andresen, 49, faces multiple charges of money laundering in both countries after attempting to convert millions of dollars in illicit cryptocurrency proceeds into physical gold bars.\u003c/p\u003e\n\n\u003cp\u003eThe Justice Department indictment accuses him of channeling commissions from illegal drug sales, stolen data, and counterfeit documents through cryptocurrency wallets. Dream Market, which operated from 2013 until its shutdown in 2019, facilitated the sale of tens of kilograms of heroin, cocaine, crack, and fentanyl. U.S. agencies monitored dormant cryptocurrency wallets for years before Andresen accessed them in late 2022 and transferred the funds.\u003c/p\u003e\n\n\u003cp\u003eInvestigators seized approximately \u003cspan class=\"math inline\"\u003e\\(1.7 million in gold bars, \\)\u003c/span\u003e23,000 in cash, and an additional $1.2 million in bank accounts and crypto wallets. Andresen faces up to 240 years in prison for U.S. charges and up to five years for German charges. This arrest follows a series of recent international takedowns targeting other darknet market administrators.\u003c/p\u003e\n"}];

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  return (
    <>
      <div className="tabs">

    </>
  );
}

        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Fly right then flip to detail view
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.28s cubic-bezier(.4,0,.6,1)";
          el.style.transform = `translate(60%, ${dy}px) rotate(12deg) scale(0.95)`;
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.getBoundingClientRect();
            el2.style.transition = "";
          }
        }, 280);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{
        opacity: 0,
        color: flipped ? "var(--accept)" : "var(--discard)",
        borderColor: flipped ? "var(--accept)" : "var(--discard)"
      }}>{flipped ? "DONE" : "SKIP"}</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ minHeight: "100vh" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ display: "flex", justifyContent: "center", padding: "80px 24px 0" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ padding: "32px 24px 48px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto 20px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 32 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 32, textAlign: "center" }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
