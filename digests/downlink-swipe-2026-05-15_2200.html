 said only limited credential material was successfully transferred from those repositories. It also stated that no user data, production systems, or intellectual property were compromised or modified in an unauthorized manner.\u003c/p\u003e\n\n\u003ch2 id=\"openai-s-response\"\u003eOpenAI’s Response\u003c/h2\u003e\n\n\u003cp\u003eAfter identifying the malicious activity, OpenAI said it moved quickly to investigate and contain the incident. The company described several response measures:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIsolated impacted systems and identities.\u003c/li\u003e\n\u003cli\u003eRevoked user sessions.\u003c/li\u003e\n\u003cli\u003eRotated all credentials across impacted repositories.\u003c/li\u003e\n\u003cli\u003eTemporarily restricted code-deployment workflows.\u003c/li\u003e\n\u003cli\u003eAudited user and credential behavior.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBecause the affected repositories included signing certificates for iOS, macOS, and Windows products, OpenAI revoked the certificates and issued new ones. OpenAI said this helps prevent the risk, however unlikely, of someone attempting to distribute a fake app that appears to be from OpenAI.\u003c/p\u003e\n\n\u003ch2 id=\"impact-on-openai-users\"\u003eImpact on OpenAI Users\u003c/h2\u003e\n\n\u003cp\u003eOpenAI said macOS users of the following products are required to update to the latest versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eChatGPT Desktop.\u003c/li\u003e\n\u003cli\u003eCodex App.\u003c/li\u003e\n\u003cli\u003eCodex CLI.\u003c/li\u003e\n\u003cli\u003eAtlas.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe company said Windows and iOS users do not need to take any action. The older certificates are scheduled to be revoked on June 12, 2026. After that date, new downloads and launches of apps signed with the previous certificate will be blocked by built-in macOS protections. OpenAI advised users to apply the updates before the cut-off date for optimal protection.\u003c/p\u003e\n\n\u003ch2 id=\"prior-certificate-rotation\"\u003ePrior Certificate Rotation\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that this is the second time OpenAI has rotated its macOS code-signing certificates in as many months. Around mid-April 2026, OpenAI rotated certificates after a GitHub Actions workflow used to sign its macOS apps downloaded a malicious Axios library on March 31. The article states that Axios had been compromised by a North Korean hacking group called UNC1069.\u003c/p\u003e\n\n\u003cp\u003eOpenAI described the incident as part of a broader shift in the threat landscape, saying attackers are increasingly targeting shared software dependencies and development tooling rather than a single company. The company also said modern software depends on an interconnected ecosystem of open-source libraries, package managers, and continuous integration and continuous deployment infrastructure, allowing upstream vulnerabilities to propagate widely and quickly across organizations.\u003c/p\u003e\n\n\u003ch2 id=\"broader-supply-chain-campaign\"\u003eBroader Supply Chain Campaign\u003c/h2\u003e\n\n\u003cp\u003eThe article says the development follows TeamPCP claiming several fresh victims and compromising hundreds of packages associated with TanStack, UiPath, Mistral AI, OpenSearch, and Guardrails AI. The campaign is described as an ongoing supply chain attack designed to push malware to downstream developers and steal credentials from their systems to further expand the breaches.\u003c/p\u003e\n\n\u003cp\u003eTanStack said no maintainer was phished, no password was leaked, and no token was stolen from a maintainer account. According to TanStack, the attacker engineered a path in which TanStack’s CI pipeline stole its own publish token at the exact moment it was created through a cache that everyone in the chain implicitly trusted. TanStack described the approach as sophisticated and said it had not anticipated it.\u003c/p\u003e\n\n\u003ch2 id=\"teampcp-activity\"\u003eTeamPCP Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article states that TeamPCP announced a supply chain attack contest in partnership with Breached cybercrime. The contest offered participants $1,000 in Monero to compromise open-source packages using the Shai-Hulud worm, which the group made freely available to others.\u003c/p\u003e\n\n\u003cp\u003eTeamPCP also threatened to leak about 5GB of internal source code from Mistral AI. The group asked for a $25,000 buy-it-now price from prospective buyers and said it would leak the material for free to forums if it could not find a buyer within a week.\u003c/p\u003e\n\n\u003ch2 id=\"mistral-ai-impact\"\u003eMistral AI Impact\u003c/h2\u003e\n\n\u003cp\u003eMistral AI confirmed in an updated advisory that it was impacted by a supply chain attack caused by the compromise of TanStack. The company said this led to the release of trojanized versions of its npm and PyPI SDKs.\u003c/p\u003e\n\n\u003cp\u003eMistral AI also said a single developer device was impacted in the hack. The article states there is no evidence that Mistral AI’s infrastructure was breached.\u003c/p\u003e\n\n\u003ch2 id=\"malware-toolkit-and-command-and-control-behavior\"\u003eMalware Toolkit and Command-and-Control Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe article cites a deeper analysis of the modular Python toolkit delivered to Linux systems through the guardrails-ai and mistralai packages. The analysis found that the primary command-and-control server address, 83.142.209[.]194, is hard-coded.\u003c/p\u003e\n\n\u003cp\u003eIf the primary C2 becomes unreachable, a fallback mechanism called FIRESCALE is activated. Hunt.io said the malware searches all public GitHub commit messages worldwide for a signed alternative server URL. The alternative URL is verified against an embedded 4096-bit RSA key.\u003c/p\u003e\n\n\u003cp\u003eHunt.io said exfiltration follows three paths in sequence:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe primary C2 server.\u003c/li\u003e\n\u003cli\u003eThe FIRESCALE dead-drop redirect.\u003c/li\u003e\n\u003cli\u003eThe victim’s own GitHub repository.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to Hunt.io, blocking any single tier leaves the other two intact.\u003c/p\u003e\n\n\u003ch2 id=\"credential-harvesting-and-target-scope\"\u003eCredential Harvesting and Target Scope\u003c/h2\u003e\n\n\u003cp\u003eHunt.io said the malware toolkit is more capable, more resilient, and more sophisticated. Beyond credential files, it captures every environment variable on the machine. It also reads all SSH keys and configuration, walks the entire home directory for dotenv files, and pulls credentials from running Docker containers.\u003c/p\u003e\n\n\u003cp\u003eThe cybersecurity company also reported that the AWS credential collection module covers all 19 availability zones in its target list. This includes us-gov-east-1 and us-gov-west-1, which the article identifies as AWS GovCloud regions restricted to U.S. government agencies and defense contractors.\u003c/p\u003e\n\n\u003ch2 id=\"destructive-behavior\"\u003eDestructive Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe article describes an unusual destructive behavior in the campaign. On machines geolocated to Israel or Iran, a 1-in-6 probability gate activates audio playback at maximum volume, followed by deletion of all accessible files.\u003c/p\u003e\n\n\u003cp\u003eThe malware exits on systems with a Russian locale. The article says these destructive actions targeting specific geographic regions mirror the “kamikaze” wiper previously unleashed by TeamPCP on Iran-based Kubernetes clusters during an earlier supply chain attack that distributed a self-propagating worm known as CanisterWorm.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that these recurring behaviors point to a more intentional operation rather than something opportunistic.\u003c/p\u003e\n","keyPoints":["OpenAI disclosed that two employee devices in its corporate environment were impacted through the Mini Shai-Hulud supply chain attack on TanStack.","OpenAI said no user data, production systems, or intellectual property were compromised or modified without authorization, and only limited credential material was successfully transferred from affected internal source code repositories.","OpenAI isolated impacted systems and identities, revoked user sessions, rotated credentials across impacted repositories, temporarily restricted code-deployment workflows, and audited user and credential behavior.","Because impacted repositories included signing certificates for iOS, macOS, and Windows products, OpenAI revoked the certificates and issued new ones, requiring macOS users of ChatGPT Desktop, Codex App, Codex CLI, and Atlas to update to the latest versions.","Mistral AI confirmed it was impacted by a TanStack-related supply chain attack that released trojanized versions of its npm and PyPI SDKs and affected a single developer device, with no evidence that its infrastructure was breached."],"insights":["The TanStack compromise did not rely on phishing or stolen maintainer credentials; TanStack said the attacker abused a trusted CI cache path so the pipeline exposed its own newly created publish token.","OpenAI has had to rotate macOS code-signing certificates twice in two months due to separate supply chain incidents affecting software dependencies and signing workflows.","The malware’s fallback command-and-control mechanism uses public GitHub commit messages as a dead-drop system for signed alternative server URLs, making single-point blocking less effective.","The credential-harvesting module explicitly targets AWS GovCloud regions, indicating the campaign’s collection logic includes environments used by U.S. government agencies and defense contractors.","The malware includes geographically selective destructive behavior, triggering file deletion on some systems geolocated to Israel or Iran while exiting on systems with a Russian locale."],"referencedReports":[{"title":"Security Advisories","url":"https://docs.mistral.ai/resources/security-advisories","publisher":"Mistral AI","context":"The article cites Mistral AI's updated advisory confirming it was impacted by the TanStack-related supply chain attack and that trojanized npm and PyPI SDKs were released."},{"title":"TeamPCP Python Toolkit FIRESCALE GitHub C2 Takedown","url":"https://hunt.io/blog/teampcp-python-toolkit-firescale-github-c2-takedown","publisher":"Hunt.io","context":"The article references Hunt.io's deeper technical analysis of the modular Python toolkit, including its hard-coded C2 server, FIRESCALE fallback mechanism, and credential-harvesting behavior."}],"body":"\u003cp\u003eOpenAI disclosed that two employee devices in its corporate environment were impacted through the Mini Shai-Hulud supply chain attack on TanStack. The company said it observed activity consistent with the malware’s public behavior, including unauthorized access and credential-focused exfiltration in a limited subset of internal source code repositories. OpenAI said no user data, production systems, or intellectual property were compromised or modified without authorization.\u003c/p\u003e\n\n\u003cp\u003eOpenAI responded by isolating impacted systems and identities, revoking user sessions, rotating credentials across impacted repositories, temporarily restricting code-deployment workflows, and auditing user and credential behavior. Because affected repositories included signing certificates for iOS, macOS, and Windows products, OpenAI revoked those certificates and issued new ones. macOS users of ChatGPT Desktop, Codex App, Codex CLI, and Atlas are required to update before the old certificates are revoked on June 12, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe incident is part of a broader supply chain campaign attributed in the article to TeamPCP, which has compromised hundreds of packages tied to TanStack, UiPath, Mistral AI, OpenSearch, and Guardrails AI. Mistral AI confirmed that trojanized versions of its npm and PyPI SDKs were released and that one developer device was impacted, with no evidence its infrastructure was breached. Hunt.io’s analysis described a modular Python toolkit with a hard-coded C2 server, a GitHub-based fallback mechanism called FIRESCALE, broad credential-harvesting behavior, and selective destructive behavior on systems geolocated to Israel or Iran.\u003c/p\u003e\n"},{"n":4,"title":"TeamPCP hackers advertise Mistral AI code repos for sale","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/teampcp-hackers-advertise-mistral-ai-code-repos-for-sale/","time":"22:50","priority":"SHOULD READ","score":88,"tldr":"TeamPCP hackers claim they stole nearly 450 Mistral AI code repositories after a supply-chain attack involving TanStack and Mistral packages, and are trying to sell the data for $25,000 or leak it. Mistral says some SDK packages were briefly contaminated but denies that core repositories, hosted services, user data, or research environments were compromised.","briefOverview":"\u003cp\u003eTeamPCP is threatening to leak source code allegedly stolen from Mistral AI unless it finds a buyer for the data. In a hacker forum post, the group asked $25,000 for nearly 450 repositories. The hackers claim the data includes almost 5 GB of internal repositories and source code used for training, fine-tuning, benchmarking, model delivery, inference, experiments, and future projects.\u003c/p\u003e\n\n\u003cp\u003eMistral AI told BleepingComputer that hackers compromised a codebase management system after the Mini Shai-Hulud software supply-chain attack. The company said some of its SDK packages were contaminated for a brief period. Mistral also said its forensic investigation found the impacted data was not part of its core code repositories.\u003c/p\u003e\n\n\u003cp\u003eThe incident began with compromised official packages from TanStack and Mistral AI through stolen CI/CD credentials and legitimate workflows. It then spread to hundreds of other projects on the npm and PyPI registries, including UiPath, Guardrails AI, and OpenSearch. Mistral said its hosted services, managed user data, and research and testing environments were not compromised.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTeamPCP is advertising alleged Mistral AI source code for sale and threatening to leak it if no buyer is found. The group is asking $25,000 for nearly 450 repositories and says it will leak the data for free if it cannot find a buyer within a week. The hackers also said the price is flexible and that they will consider offers for the repositories.\u003c/p\u003e\n\n\u003cp\u003eMistral AI is a French artificial intelligence company founded by former researchers from Google’s DeepMind and Meta. The company provides open-weight large language models, including both open source and proprietary models. In a statement to BleepingComputer, Mistral AI confirmed that hackers compromised a codebase management system after the Mini Shai-Hulud software supply-chain attack.\u003c/p\u003e\n\n\u003cp\u003eThe incident started with compromised official packages from TanStack and Mistral AI through stolen CI/CD credentials and legitimate workflows. It then spread to hundreds of other software projects on the npm and PyPI registries. The article names UiPath, Guardrails AI, and OpenSearch among the affected projects.\u003c/p\u003e\n\n\u003cp\u003eTeamPCP claims it stole nearly 5 GB of internal repositories and source code from Mistral AI. The group says the repositories relate to training, fine-tuning, benchmarking, model delivery, inference, experiments, and future projects. Mistral AI said the attackers contaminated some of its SDK packages for a brief period.\u003c/p\u003e\n\n\u003cp\u003eMistral AI’s advisory said the breach occurred after a developer device was impacted by the TanStack supply-chain attack. The company said its forensic investigation determined that the impacted data was not part of its core code repositories. Mistral also said its hosted services, managed user data, and research and testing environments were not compromised.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that OpenAI confirmed the TanStack supply-chain attack impacted systems belonging to two employees who had access to a limited subset of internal source code repositories. OpenAI said a small set of credentials was stolen from the repositories, but its investigation found no evidence they were used in additional attacks. OpenAI responded by rotating exposed code-signing certificates and warning macOS users to update their desktop apps before June 12.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eTeamPCP is threatening to leak source code allegedly stolen from Mistral AI unless a buyer is found for the data. In a post on a hacker forum, the group is asking $25,000 for a set of nearly 450 repositories. The hackers said they will leak the data for free to the forums if they cannot find a buyer within a week.\u003c/p\u003e\n\n\u003cp\u003eMistral AI confirmed to BleepingComputer that hackers compromised a codebase management system after the Mini Shai-Hulud software supply-chain attack. The company said the attackers contaminated some of its SDK packages for a brief period. Mistral AI also said its forensic investigation determined that the impacted data was not part of its core code repositories.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-stolen-data\"\u003eClaimed stolen data\u003c/h2\u003e\n\n\u003cp\u003eTeamPCP claims to have stolen nearly 5 GB of “internal repositories and source code” from Mistral AI. According to the hackers, the material includes code Mistral uses for:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTraining\u003c/li\u003e\n\u003cli\u003eFine-tuning\u003c/li\u003e\n\u003cli\u003eBenchmarking\u003c/li\u003e\n\u003cli\u003eModel delivery\u003c/li\u003e\n\u003cli\u003eInference\u003c/li\u003e\n\u003cli\u003eExperiments\u003c/li\u003e\n\u003cli\u003eFuture projects\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe group said it is seeking a $25,000 buy-it-now price or payment from Mistral to “shred” the data permanently. The threat actor also appeared open to negotiation, saying interested buyers could submit what they believe is a fair offer. The hackers said the sale would be limited to one person.\u003c/p\u003e\n\n\u003ch2 id=\"mistral-ai-s-statement-and-disclosed-impact\"\u003eMistral AI’s statement and disclosed impact\u003c/h2\u003e\n\n\u003cp\u003eMistral AI told BleepingComputer that some SDK packages were contaminated for a brief period. The company also said a codebase management system was compromised after the Mini Shai-Hulud software supply-chain attack.\u003c/p\u003e\n\n\u003cp\u003eIn an advisory published earlier in the week, Mistral AI said the breach occurred after a developer device was impacted by the TanStack supply-chain attack. However, the company said its forensic investigation found that the impacted data was not part of its core code repositories.\u003c/p\u003e\n\n\u003cp\u003eMistral AI also said the following were not compromised:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHosted services\u003c/li\u003e\n\u003cli\u003eManaged user data\u003c/li\u003e\n\u003cli\u003eResearch environments\u003c/li\u003e\n\u003cli\u003eTesting environments\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"supply-chain-attack-details\"\u003eSupply-chain attack details\u003c/h2\u003e\n\n\u003cp\u003eThe broader incident started with the compromise of official packages from TanStack and Mistral AI. The article says this was done through stolen CI/CD credentials and legitimate workflows.\u003c/p\u003e\n\n\u003cp\u003eThe compromise then spread to hundreds of other software projects on the npm and PyPI registries. The article specifically names the following affected projects:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUiPath\u003c/li\u003e\n\u003cli\u003eGuardrails AI\u003c/li\u003e\n\u003cli\u003eOpenSearch\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"affected-and-related-organizations\"\u003eAffected and related organizations\u003c/h2\u003e\n\n\u003cp\u003eMistral AI is described as a French artificial intelligence company founded by former researchers from Google’s DeepMind and Meta. It provides open-weight large language models, including both open source and proprietary models.\u003c/p\u003e\n\n\u003cp\u003eThe article also connects the TanStack supply-chain attack to OpenAI. OpenAI confirmed that the attack impacted systems of two employees who had access to a limited subset of internal source code repositories.\u003c/p\u003e\n\n\u003cp\u003eOpenAI said a small set of credentials was stolen from the repositories. Its investigation found no evidence that those credentials were used in additional attacks.\u003c/p\u003e\n\n\u003ch2 id=\"openai-response-mentioned-in-the-article\"\u003eOpenAI response mentioned in the article\u003c/h2\u003e\n\n\u003cp\u003eOpenAI responded to its exposure by rotating code-signing certificates that were exposed in the incident. The company also warned macOS users that they must update their OpenAI desktop apps before June 12. According to the article, apps that are not updated may fail to launch and stop receiving updates.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways-from-the-article\"\u003eKey takeaways from the article\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eTeamPCP is trying to sell allegedly stolen Mistral AI repositories and has threatened to leak them if no buyer is found.\u003c/li\u003e\n\u003cli\u003eMistral AI confirmed a codebase management system compromise and brief SDK package contamination after the Mini Shai-Hulud supply-chain attack.\u003c/li\u003e\n\u003cli\u003eMistral AI said the impacted data was not part of its core repositories and that hosted services, managed user data, and research and testing environments were not compromised.\u003c/li\u003e\n\u003cli\u003eThe incident began with compromised TanStack and Mistral AI packages using stolen CI/CD credentials and legitimate workflows.\u003c/li\u003e\n\u003cli\u003eThe broader supply-chain incident spread across npm and PyPI projects and also affected OpenAI employee systems with access to a limited subset of internal source code repositories.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["TeamPCP is threatening to leak source code allegedly stolen from Mistral AI unless a buyer is found for the data.","The hackers are asking $25,000 for nearly 450 repositories and claim the data includes almost 5 GB of internal repositories and source code used for training, fine-tuning, benchmarking, model delivery, inference, experiments, and future projects.","Mistral AI confirmed that hackers compromised a codebase management system after the Mini Shai-Hulud software supply-chain attack and contaminated some SDK packages for a brief period.","Mistral AI said its forensic investigation found that the impacted data was not part of its core code repositories and that hosted services, managed user data, research environments, and testing environments were not compromised.","The incident began with compromised official packages from TanStack and Mistral AI through stolen CI/CD credentials and legitimate workflows, then spread to hundreds of other projects on npm and PyPI."],"insights":["Legitimate CI/CD workflows and stolen credentials were sufficient to compromise official packages from TanStack and Mistral AI, making CI/CD credential protection and workflow monitoring central to preventing similar supply-chain incidents.","The same Mini Shai-Hulud supply-chain attack affected multiple major organizations and ecosystems, including npm, PyPI, Mistral AI, OpenAI, UiPath, Guardrails AI, and OpenSearch, showing that dependency compromise can rapidly create cross-organization exposure.","Mistral AI’s public position sharply narrows the reported impact by distinguishing contaminated SDK packages and a compromised codebase management system from its core repositories, hosted services, managed user data, and research and testing environments.","OpenAI’s response shows that even limited source-repository exposure can require operational follow-up for end users, including rotating code-signing certificates and requiring macOS desktop app updates before a deadline."],"referencedReports":[{"title":"Security advisories","url":"https://docs.mistral.ai/resources/security-advisories","publisher":"Mistral AI","context":"The article says Mistral AI published an advisory stating that the breach occurred after a developer device was impacted by the TanStack supply-chain attack."}],"body":"\u003cp\u003eTeamPCP is threatening to leak source code allegedly stolen from Mistral AI unless it finds a buyer for the data. In a hacker forum post, the group asked $25,000 for nearly 450 repositories. The hackers claim the data includes almost 5 GB of internal repositories and source code used for training, fine-tuning, benchmarking, model delivery, inference, experiments, and future projects.\u003c/p\u003e\n\n\u003cp\u003eMistral AI told BleepingComputer that hackers compromised a codebase management system after the Mini Shai-Hulud software supply-chain attack. The company said some of its SDK packages were contaminated for a brief period. Mistral also said its forensic investigation found the impacted data was not part of its core code repositories.\u003c/p\u003e\n\n\u003cp\u003eThe incident began with compromised official packages from TanStack and Mistral AI through stolen CI/CD credentials and legitimate workflows. It then spread to hundreds of other projects on the npm and PyPI registries, including UiPath, Guardrails AI, and OpenSearch. Mistral said its hosted services, managed user data, and research and testing environments were not compromised.\u003c/p\u003e\n"},{"n":5,"title":"Avada Builder WordPress plugin flaws allow site credential theft","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/avada-builder-wordpress-plugin-flaws-allow-site-credential-theft/","time":"15:56","priority":"SHOULD READ","score":85,"tldr":"Two vulnerabilities in the Avada Builder WordPress plugin could let attackers read sensitive server files or extract database data, potentially exposing credentials and enabling site takeover. Site admins should update to Avada Builder 3.15.3 immediately.","briefOverview":"\u003cp\u003eTwo vulnerabilities in the Avada Builder plugin for WordPress allow attackers to read arbitrary files and extract sensitive information from the database. The plugin has an estimated one million active installations and is used with the Avada WordPress theme to build and customize pages without writing code. Impacted website owners and administrators are advised to update to Avada Builder version 3.15.3 as soon as possible.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-4782 affects all versions through 3.15.2 and can be exploited by authenticated users with at least subscriber-level access to read any file on the server. Wordfence said the issue is tied to the plugin’s shortcode-rendering functionality and the custom_svg parameter, which did not properly validate file types or sources. Access to files such as wp-config.php can expose database credentials and cryptographic keys, potentially leading to administrator account compromise and full site takeover.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-4798 is a time-based blind SQL injection affecting Avada Builder versions through 3.15.1 and can be exploited without authentication. Exploitation is possible only if WooCommerce has been enabled and then deactivated, with its database tables still intact. A partial fix was released in version 3.15.2 on April 13, and the fully patched version 3.15.3 was released on May 12.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eTwo vulnerabilities in the Avada Builder plugin for WordPress can allow attackers to read arbitrary server files and extract sensitive information from a site database. Avada Builder has an estimated one million active installations and is a drag-and-drop webpage builder for the Avada WordPress theme. The article states that affected website owners and administrators should update to Avada Builder version 3.15.3 as soon as possible.\u003c/p\u003e\n\n\u003cp\u003eThe first flaw, CVE-2026-4782, affects all versions of Avada Builder through 3.15.2. It can be exploited by authenticated users with at least subscriber-level access to read the contents of any file on the server. Although the flaw received a medium-severity rating because it requires subscriber-level access, the article notes that this may not be a major barrier because many WordPress sites offer user registration.\u003c/p\u003e\n\n\u003cp\u003eWordfence explained that the arbitrary file read issue is possible through the plugin’s shortcode-rendering functionality and the custom_svg parameter. The plugin did not properly validate file types or sources, allowing access to sensitive files such as wp-config.php. The article states that wp-config.php typically contains database credentials and cryptographic keys, and that access to it can lead to administrator account compromise and full site takeover.\u003c/p\u003e\n\n\u003cp\u003eThe second flaw, CVE-2026-4798, is a time-based blind SQL injection affecting Avada Builder versions through 3.15.1. It can be leveraged without authentication, but only if the WooCommerce plugin has been enabled and then deactivated, and if its database tables remain intact. The issue exists because user-controlled input from the product_order parameter was inserted into an SQL ORDER BY clause without proper query preparation.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities were discovered by security researcher Rafie Muhammad and reported through the Wordfence Bug Bounty Program. The issues were submitted to Wordfence on March 21 and reported to the Avada Builder publisher on March 24. Rafie Muhammad received \u003cspan class=\"math inline\"\u003e\\(3,386 and \\)\u003c/span\u003e1,067 for the findings, while a partial fix was released on April 13 in version 3.15.2 and a full fix was released on May 12 in version 3.15.3.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eTwo vulnerabilities in the Avada Builder plugin for WordPress allow attackers to read arbitrary files and extract sensitive information from the database. The plugin has an estimated one million active installations and is used as a drag-and-drop webpage builder for the Avada WordPress theme. It enables users to create and customize website layouts, content sections, and design elements without writing code.\u003c/p\u003e\n\n\u003cp\u003eThe flaws are tracked as CVE-2026-4782 and CVE-2026-4798. The article states that impacted website owners and administrators should update to Avada Builder version 3.15.3 as soon as possible.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2026-4782-arbitrary-file-read\"\u003eCVE-2026-4782: Arbitrary File Read\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-4782 affects all versions of Avada Builder through 3.15.2. It can be exploited by authenticated users with at least subscriber-level access to read the contents of any file on the server.\u003c/p\u003e\n\n\u003cp\u003eWordfence explained that the arbitrary file read vulnerability is possible through the plugin’s shortcode-rendering functionality and the custom_svg parameter. The issue is that the plugin does not properly validate file types or sources. This can allow access to sensitive files such as wp-config.php.\u003c/p\u003e\n\n\u003cp\u003eThe article states that wp-config.php typically contains database credentials and cryptographic keys. Access to wp-config.php can lead to compromise of an administrator account and full site takeover.\u003c/p\u003e\n\n\u003cp\u003eAlthough the flaw received a medium-severity rating because it requires subscriber-level access, the article notes that this requirement does not necessarily represent a barrier. Many WordPress sites offer user registration, which can make subscriber-level access easier to obtain.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2026-4798-sql-injection\"\u003eCVE-2026-4798: SQL Injection\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-4798 is a time-based blind SQL injection vulnerability affecting Avada Builder versions through 3.15.1. The article states that it can be leveraged without authentication.\u003c/p\u003e\n\n\u003cp\u003eExploitation has a specific prerequisite: the WooCommerce e-commerce plugin for WordPress must have been enabled and then deactivated. The WooCommerce database tables must also remain intact.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability exists because user-controlled input from the product_order parameter was inserted into an SQL ORDER BY clause without proper query preparation. The flaw can allow unauthenticated attackers to extract sensitive information from the site database, including password hashes.\u003c/p\u003e\n\n\u003ch2 id=\"affected-software-and-conditions\"\u003eAffected Software and Conditions\u003c/h2\u003e\n\n\u003cp\u003eThe affected plugin is Avada Builder for WordPress. It has an estimated one million active installations.\u003c/p\u003e\n\n\u003cp\u003eThe affected version ranges described in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-4782 affects Avada Builder versions through 3.15.2.\u003c/li\u003e\n\u003cli\u003eCVE-2026-4798 affects Avada Builder versions through 3.15.1.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe SQL injection issue also depends on the WooCommerce plugin having been enabled and then deactivated, with its database tables still intact.\u003c/p\u003e\n\n\u003ch2 id=\"discovery-and-reporting\"\u003eDiscovery and Reporting\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerabilities were discovered by security researcher Rafie Muhammad. They were reported through the Wordfence Bug Bounty Program.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Rafie Muhammad received \u003cspan class=\"math inline\"\u003e\\(3,386 and \\)\u003c/span\u003e1,067 for the findings. The two flaws were submitted to Wordfence on March 21 and reported to the Avada Builder publisher on March 24.\u003c/p\u003e\n\n\u003ch2 id=\"patch-timeline-and-response\"\u003ePatch Timeline and Response\u003c/h2\u003e\n\n\u003cp\u003eA partial fix was released in Avada Builder version 3.15.2 on April 13. The fully patched version, Avada Builder 3.15.3, was released on May 12.\u003c/p\u003e\n\n\u003cp\u003eThe article advises impacted website owners and administrators to update to Avada Builder version 3.15.3 as soon as possible.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerabilities can expose sensitive site data in different ways. CVE-2026-4782 can allow a subscriber-level authenticated attacker to read arbitrary files on the server, including wp-config.php. CVE-2026-4798 can allow unauthenticated attackers to extract sensitive database information, including password hashes, if the WooCommerce-related prerequisite is met.\u003c/p\u003e\n\n\u003cp\u003eThe article specifically states that access to wp-config.php can lead to administrator account compromise and full site takeover. It also states that the SQL injection flaw can be used to extract sensitive information from the site database.\u003c/p\u003e\n","keyPoints":["Two vulnerabilities in the Avada Builder plugin for WordPress, which has an estimated one million active installations, allow attackers to read arbitrary files and extract sensitive information from the database.","CVE-2026-4782 affects Avada Builder versions through 3.15.2 and allows authenticated users with at least subscriber-level access to read the contents of any file on the server.","CVE-2026-4798 is an unauthenticated time-based blind SQL injection affecting Avada Builder versions through 3.15.1, but exploitation requires WooCommerce to have been enabled and then deactivated with its database tables intact.","Wordfence said the arbitrary file read flaw can expose wp-config.php, which typically contains database credentials and cryptographic keys, potentially leading to administrator account compromise and full site takeover.","Avada Builder version 3.15.3, released on May 12, fully patches the vulnerabilities, and impacted site owners are advised to update as soon as possible."],"insights":["The subscriber-level access requirement for CVE-2026-4782 may not meaningfully limit risk because many WordPress sites allow public user registration.","The arbitrary file read flaw is especially dangerous because access to wp-config.php can expose both database credentials and cryptographic keys, creating a path to administrator account compromise and full site takeover.","CVE-2026-4798 can remain exploitable even after WooCommerce is deactivated, as long as WooCommerce had previously been enabled and its database tables remain intact.","Version 3.15.2 only partially fixed the reported issues, so administrators need to install Avada Builder 3.15.3 for the full patch."],"referencedReports":[{"title":"1,000,000 WordPress Sites Affected by Arbitrary File Read and SQL Injection Vulnerabilities in Avada Builder WordPress Plugin","url":"https://www.wordfence.com/blog/2026/05/1000000-wordpress-sites-affected-by-arbitrary-file-read-and-sql-injection-vulnerabilities-in-avada-builder-wordpress-plugin/","publisher":"Wordfence","context":"The article links to Wordfence’s technical analysis explaining how the Avada Builder arbitrary file read vulnerability works through shortcode-rendering functionality and the custom_svg parameter."}],"body":"\u003cp\u003eTwo vulnerabilities in the Avada Builder plugin for WordPress allow attackers to read arbitrary files and extract sensitive information from the database. The plugin has an estimated one million active installations and is used with the Avada WordPress theme to build and customize pages without writing code. Impacted website owners and administrators are advised to update to Avada Builder version 3.15.3 as soon as possible.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-4782 affects all versions through 3.15.2 and can be exploited by authenticated users with at least subscriber-level access to read any file on the server. Wordfence said the issue is tied to the plugin’s shortcode-rendering functionality and the custom_svg parameter, which did not properly validate file types or sources. Access to files such as wp-config.php can expose database credentials and cryptographic keys, potentially leading to administrator account compromise and full site takeover.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-4798 is a time-based blind SQL injection affecting Avada Builder versions through 3.15.1 and can be exploited without authentication. Exploitation is possible only if WooCommerce has been enabled and then deactivated, with its database tables still intact. A partial fix was released in version 3.15.2 on April 13, and the fully patched version 3.15.3 was released on May 12.\u003c/p\u003e\n"},{"n":16,"title":"Turla Turns Kazuar Backdoor Into Modular P2P Botnet for Persistent Access","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/turla-turns-kazuar-backdoor-into.html","time":"17:10","priority":"SHOULD READ","score":85,"tldr":"Microsoft says Russian state-backed Turla has evolved its Kazuar backdoor into a stealthy modular peer-to-peer botnet designed for long-term access, tasking, and data theft. The new Kernel, Bridge, and Worker modules coordinate communications, persistence, collection, and exfiltration while reducing detection opportunities.","briefOverview":"\u003cp\u003eThe Russian state-sponsored hacking group Turla has transformed its Kazuar backdoor into a modular peer-to-peer botnet designed for stealth and persistent access to compromised hosts. Microsoft Threat Intelligence said the upgrade aligns with Secret Blizzard’s objective of maintaining long-term access for intelligence collection. The activity is tied to a group assessed by CISA to be affiliated with Center 16 of Russia’s Federal Security Service.\u003c/p\u003e\n\n\u003cp\u003eKazuar has evolved from a monolithic .NET backdoor into a modular bot ecosystem with Kernel, Bridge, and Worker components. The Kernel coordinates tasks and communications, the Bridge proxies traffic between the Kernel leader and command-and-control server, and the Worker collects data such as keystrokes, system information, file listings, and MAPI details. Attacks distributing the malware have used droppers including Pelmeni and ShadowLoader to decrypt and launch the modules.\u003c/p\u003e\n\n\u003cp\u003eThe Kernel module supports several internal communication methods, including Windows Messaging, Mailslot, and named pipes, and can contact attacker-controlled infrastructure through Exchange Web Services, HTTP, and WebSockets. It also elects a single leader Kernel module to communicate with the Bridge, while other Kernel modules are set to SILENT. Data gathered by Worker modules is encrypted, staged in a configured working directory, and later exfiltrated to the command-and-control server.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft Threat Intelligence reported that Turla has upgraded its Kazuar backdoor into a modular peer-to-peer botnet built for stealth and persistent access. Turla is described as a Russian state-sponsored hacking group assessed by CISA to be affiliated with Center 16 of Russia’s Federal Security Service. The group is also tracked under names including Secret Blizzard, Snake, Uroburos, Waterbug, Venomous Bear, and several others.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Turla is known for attacks targeting government, diplomatic, and defense sectors in Europe and Central Asia. It has also targeted endpoints previously breached by Aqua Blizzard, also known as Actinium and Gamaredon, in support of the Kremlin’s strategic objectives. Microsoft said the Kazuar upgrade supports Secret Blizzard’s broader objective of gaining long-term system access for intelligence collection.\u003c/p\u003e\n\n\u003cp\u003eKazuar is described as a sophisticated .NET backdoor that has been used since 2017. Microsoft’s findings show it has evolved from a monolithic framework into a modular bot ecosystem with three component types: Kernel, Bridge, and Worker. The redesign is said to enable flexible configuration, reduce observable footprint, and support broad tasking.\u003c/p\u003e\n\n\u003cp\u003eThe Kernel module acts as the central coordinator for the botnet, issuing tasks to Worker modules, communicating with the Bridge module, logging actions and collected data, performing anti-analysis and sandbox checks, and applying configuration settings for command-and-control, exfiltration timing, tasking, scanning, collection, and monitoring. The Bridge module functions as a proxy between the leader Kernel module and the command-and-control server. The Worker module logs keystrokes, hooks Windows events, tracks tasks, and gathers system information, file listings, and MAPI details.\u003c/p\u003e\n\n\u003cp\u003eThe Kernel supports internal communication through Windows Messaging, Mailslot, and named pipes, and external communication through Exchange Web Services, HTTP, and WebSockets. It elects a single Kernel leader over Mailslot based on uptime divided by interruptions such as reboots, logoffs, and process termination. Once elected, the leader announces itself and directs other Kernel modules to enter SILENT mode, allowing only the leader to log activity and request tasks through the Bridge module.\u003c/p\u003e\n\n\u003cp\u003eData collected by Worker modules is aggregated, encrypted, and written to Kazuar’s working directory before being exfiltrated to the command-and-control server. Microsoft said this working directory acts as a centralized staging area that separates tasking, collection output, logs, and configuration material. The article states that this design helps Kazuar preserve operational state across restarts and coordinate asynchronous activity between modules while reducing direct interaction with external infrastructure.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft Threat Intelligence reported that the Russian state-sponsored hacking group Turla has transformed its Kazuar backdoor into a modular peer-to-peer botnet. The article describes the new version as engineered for stealth and persistent access to compromised hosts. Microsoft said the upgrade aligns with Secret Blizzard’s broader objective of gaining long-term access to systems for intelligence collection.\u003c/p\u003e\n\n\u003cp\u003eTurla is assessed by the U.S. Cybersecurity and Infrastructure Security Agency to be affiliated with Center 16 of Russia’s Federal Security Service. The article notes that the group overlaps with activity tracked under many names, including ATG26, Blue Python, Iron Hunter, Pensive Ursa, Secret Blizzard, Snake, SUMMIT, Uroburos, Venomous Bear, Waterbug, and WRAITH.\u003c/p\u003e\n\n\u003ch2 id=\"targeting-and-operational-context\"\u003eTargeting and Operational Context\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Turla is known for attacks against government, diplomatic, and defense sectors in Europe and Central Asia. It also says the group has targeted endpoints previously breached by Aqua Blizzard, also known as Actinium and Gamaredon. These activities are described as supporting the Kremlin’s strategic objectives.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft framed the Kazuar upgrade as part of a broader emphasis on durable access. The article contrasts this with threat actors that rely on increasing use of native tools and living-off-the-land binaries to avoid detection. In Kazuar’s case, Microsoft said Secret Blizzard is engineering resilience and stealth directly into its tooling.\u003c/p\u003e\n\n\u003ch2 id=\"kazuar-s-evolution\"\u003eKazuar’s Evolution\u003c/h2\u003e\n\n\u003cp\u003eKazuar is described as a sophisticated .NET backdoor that has been used consistently since 2017. Microsoft’s latest findings chart its evolution from a monolithic framework into a modular bot ecosystem. The article says the new architecture contains three distinct component types with well-defined roles.\u003c/p\u003e\n\n\u003cp\u003eThe redesign is described as enabling:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFlexible configuration.\u003c/li\u003e\n\u003cli\u003eReduced observable footprint.\u003c/li\u003e\n\u003cli\u003eBroad tasking.\u003c/li\u003e\n\u003cli\u003eStealth and persistent access to compromised hosts.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAttacks distributing the malware have been found to rely on droppers such as Pelmeni and ShadowLoader. These droppers decrypt and launch the Kazuar modules.\u003c/p\u003e\n\n\u003ch2 id=\"modular-architecture\"\u003eModular Architecture\u003c/h2\u003e\n\n\u003cp\u003eKazuar’s modular architecture is built around three component types: Kernel, Bridge, and Worker.\u003c/p\u003e\n\n\u003ch3 id=\"kernel-module\"\u003eKernel Module\u003c/h3\u003e\n\n\u003cp\u003eThe Kernel module acts as the central coordinator for the botnet. According to the article, it performs several functions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIssues tasks to Worker modules.\u003c/li\u003e\n\u003cli\u003eManages communication with the Bridge module.\u003c/li\u003e\n\u003cli\u003eMaintains logs of actions and collected data.\u003c/li\u003e\n\u003cli\u003ePerforms anti-analysis and sandbox checks.\u003c/li\u003e\n\u003cli\u003eSets up the environment using configuration parameters.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe Kernel configuration includes parameters related to command-and-control communication, data exfiltration timing, task management, file scanning and collection, and monitoring.\u003c/p\u003e\n\n\u003cp\u003eThe Kernel also exposes three internal communication mechanisms:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows Messaging.\u003c/li\u003e\n\u003cli\u003eMailslot.\u003c/li\u003e\n\u003cli\u003eNamed pipes.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor external communication with attacker-controlled infrastructure, it supports:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eExchange Web Services.\u003c/li\u003e\n\u003cli\u003eHTTP.\u003c/li\u003e\n\u003cli\u003eWebSockets.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the Kernel initiates threads to establish a named pipe channel between Kernel modules for inter-Kernel communications. It also specifies external communication methods and facilitates Kernel-to-Worker and Kernel-to-Bridge communication over Windows Messaging or Mailslot.\u003c/p\u003e\n\n\u003ch3 id=\"bridge-module\"\u003eBridge Module\u003c/h3\u003e\n\n\u003cp\u003eThe Bridge module acts as a proxy between the leader Kernel module and the command-and-control server. The article describes it as the component that enables communication between the elected Kernel leader and attacker-controlled infrastructure.\u003c/p\u003e\n\n\u003ch3 id=\"worker-module\"\u003eWorker Module\u003c/h3\u003e\n\n\u003cp\u003eThe Worker module is responsible for collection and task-related activity. The article states that it can:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLog keystrokes.\u003c/li\u003e\n\u003cli\u003eHook Windows events.\u003c/li\u003e\n\u003cli\u003eTrack tasks.\u003c/li\u003e\n\u003cli\u003eGather system information.\u003c/li\u003e\n\u003cli\u003eGather file listings.\u003c/li\u003e\n\u003cli\u003eGather Messaging Application Programming Interface details.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eData collected by Worker modules is later aggregated, encrypted, and written to Kazuar’s working directory before exfiltration.\u003c/p\u003e\n\n\u003ch2 id=\"kernel-leader-election\"\u003eKernel Leader Election\u003c/h2\u003e\n\n\u003cp\u003eA notable feature of the updated Kazuar architecture is the election of a single Kernel leader. The article states that the Kernel component elects one leader to communicate with the Bridge module on behalf of other Kernel modules.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft explained that elections occur over Mailslot. The leader is elected based on the amount of work, defined as the length of time the Kernel module has been running, divided by interruptions such as reboots, logoffs, or process termination.\u003c/p\u003e\n\n\u003cp\u003eOnce a leader is elected, it announces itself as the leader. It then tells all other Kernel modules to set SILENT. Only the elected leader is not SILENT, allowing that leader Kernel module to log activity and request tasks through the Bridge module.\u003c/p\u003e\n\n\u003ch2 id=\"tasking-collection-and-exfiltration\"\u003eTasking, Collection, and Exfiltration\u003c/h2\u003e\n\n\u003cp\u003eThe Kernel’s end goal is to poll new tasks from the command-and-control server, parse incoming messages, assign tasks to the Worker module, update configuration, and send task results back to the server. The module includes a task handler that processes commands issued by the Kernel leader.\u003c/p\u003e\n\n\u003cp\u003eThe Worker module collects data and writes it into the malware’s operational flow. The article says collected data is aggregated, encrypted, and written to the malware’s working directory. From there, it is exfiltrated to the command-and-control server.\u003c/p\u003e\n\n\u003ch2 id=\"working-directory-and-operational-state\"\u003eWorking Directory and Operational State\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said Kazuar uses a dedicated working directory as a centralized on-disk staging area for internal operations across modules. This directory is defined through configuration and is consistently referenced using fully qualified paths to avoid ambiguity across execution contexts.\u003c/p\u003e\n\n\u003cp\u003eWithin the working directory, Kazuar organizes data by function. The article states that it isolates tasking, collection output, logs, and configuration material into distinct locations.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said this design allows the malware to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDecouple task execution from data storage and exfiltration.\u003c/li\u003e\n\u003cli\u003eMaintain operational state across restarts.\u003c/li\u003e\n\u003cli\u003eCoordinate asynchronous activity between modules.\u003c/li\u003e\n\u003cli\u003eMinimize direct interaction with external infrastructure.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central significance is that Turla has advanced Kazuar from a single backdoor framework into a modular peer-to-peer botnet architecture. Microsoft describes this as a move toward tooling that embeds stealth, resilience, and persistence directly into the malware. The modular design, leader election mechanism, multiple communication channels, and staged working directory all support long-term access and coordinated activity on compromised systems.\u003c/p\u003e\n","keyPoints":["Microsoft reported that the Russian state-sponsored group Turla has transformed its Kazuar backdoor into a modular peer-to-peer botnet designed for stealth and persistent access to compromised hosts.","Kazuar’s new architecture consists of Kernel, Bridge, and Worker modules, with Kernel coordinating tasks, Bridge proxying communication to the command-and-control server, and Worker collecting data such as keystrokes, system information, file listings, and MAPI details.","Attacks distributing Kazuar have relied on droppers including Pelmeni and ShadowLoader to decrypt and launch the modules.","The Kernel module supports internal communication through Windows Messaging, Mailslot, and named pipes, and can contact attacker-controlled infrastructure using Exchange Web Services, HTTP, and WebSockets.","Data collected by Worker modules is aggregated, encrypted, stored in Kazuar’s working directory, and then exfiltrated to the command-and-control server."],"insights":["Kazuar’s leader-election mechanism is designed to limit noisy external communication by making only one Kernel module communicate through the Bridge while forcing the other Kernel modules into SILENT mode.","Turla’s upgrade of Kazuar shows a shift from relying primarily on living-off-the-land techniques to building stealth and resilience directly into custom malware tooling.","Kazuar’s use of multiple internal communication methods and multiple external communication channels gives operators flexibility to maintain coordination and command-and-control if one mechanism is unavailable or detected.","Kazuar’s dedicated working directory separates tasking, collection output, logs, and configuration material, allowing the malware to preserve operational state across restarts and coordinate asynchronous module activity."],"referencedReports":[{"title":"Kazuar: Anatomy of a nation-state botnet","url":"https://www.microsoft.com/en-us/security/blog/2026/05/14/kazuar-anatomy-of-a-nation-state-botnet/","publisher":"Microsoft Threat Intelligence","context":"The article cites Microsoft Threat Intelligence's report as the source for findings on Kazuar's evolution into a modular peer-to-peer botnet."}],"body":"\u003cp\u003eThe Russian state-sponsored hacking group Turla has transformed its Kazuar backdoor into a modular peer-to-peer botnet designed for stealth and persistent access to compromised hosts. Microsoft Threat Intelligence said the upgrade aligns with Secret Blizzard’s objective of maintaining long-term access for intelligence collection. The activity is tied to a group assessed by CISA to be affiliated with Center 16 of Russia’s Federal Security Service.\u003c/p\u003e\n\n\u003cp\u003eKazuar has evolved from a monolithic .NET backdoor into a modular bot ecosystem with Kernel, Bridge, and Worker components. The Kernel coordinates tasks and communications, the Bridge proxies traffic between the Kernel leader and command-and-control server, and the Worker collects data such as keystrokes, system information, file listings, and MAPI details. Attacks distributing the malware have used droppers including Pelmeni and ShadowLoader to decrypt and launch the modules.\u003c/p\u003e\n\n\u003cp\u003eThe Kernel module supports several internal communication methods, including Windows Messaging, Mailslot, and named pipes, and can contact attacker-controlled infrastructure through Exchange Web Services, HTTP, and WebSockets. It also elects a single leader Kernel module to communicate with the Bridge, while other Kernel modules are set to SILENT. Data gathered by Worker modules is encrypted, staged in a configured working directory, and later exfiltrated to the command-and-control server.\u003c/p\u003e\n"},{"n":3,"title":"Microsoft backpedals: Edge to stop loading passwords into memory","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-edge-to-stop-loading-cleartext-passwords-in-memory-on-startup/","time":"14:49","priority":"SHOULD READ","score":82,"tldr":"Microsoft will update Edge so saved passwords are no longer decrypted and kept in clear text in process memory at startup. The change follows a researcher’s disclosure and proof-of-concept showing attackers with sufficient access could dump stored Edge credentials from memory.","briefOverview":"\u003cp\u003eMicrosoft is updating the Edge web browser so it no longer loads saved passwords into process memory in clear text at startup. The change follows a May 4 disclosure by security researcher Tom Jøran Sønstebyseter Rønning, who said Edge decrypted all credentials stored in its built-in password manager on launch and kept them in memory even when not in use. Microsoft had previously described the behavior as “by design” and “an expected feature of the application.”\u003c/p\u003e\n\n\u003cp\u003eRønning released a proof-of-concept tool that could allow attackers with Administrator privileges to dump passwords from other users’ Edge processes. Without administrator privileges, the tool only allows access to Edge processes launched by the same user. Microsoft now describes the update as a defense-in-depth change intended to reduce password exposure in memory.\u003c/p\u003e\n\n\u003cp\u003eThe fix is already live in the Edge Canary channel and will be included in the next update for all supported Edge releases, including Stable, Beta, Dev, Canary, and Extended Stable. Microsoft said the change applies to build 148 and newer and is being prioritized for rollout. The company said the scenario still falls within its expected existing threat model, which excludes attacks where an adversary already has administrative control of a device.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft is changing how Edge handles saved passwords after a researcher disclosed that the browser loaded stored credentials into process memory in clear text at startup. The behavior was reported by security researcher Tom Jøran Sønstebyseter Rønning on May 4. He demonstrated that all credentials stored in Edge’s built-in password manager were decrypted when the browser launched and remained in memory even when not in use. Microsoft initially told BleepingComputer that the behavior was expected and described it as “by design.”\u003c/p\u003e\n\n\u003cp\u003eRønning also released a proof-of-concept tool called EdgeSavedPasswordsDumper. According to the article, the tool could allow attackers with Administrator privileges to dump passwords from other users’ Edge processes. Without administrator privileges, the proof of concept only allows access to Edge processes launched by the same user. The reported scenario involves attackers who can read Edge process memory under those access conditions.\u003c/p\u003e\n\n\u003cp\u003eThe researcher said Edge was the only Chromium-based browser he tested that behaved this way. He contrasted it with Chrome, which he said uses a design that makes it far harder for attackers to extract saved passwords simply by reading process memory. The article does not identify any exploitation in the wild related to this behavior. It frames the issue around password exposure in memory and Microsoft’s change in response.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft Edge Security Lead Gareth Evans said future versions of Edge will no longer load saved passwords into memory on startup. He described the change as a defense-in-depth improvement and said it will come to every supported version of Edge, including Stable, Beta, Dev, Canary, and the Extended Stable channel used by enterprise customers. Microsoft said it is prioritizing the rollout. The fix is already available in Edge Canary and will be included in the next update for supported Edge releases, build 148 and newer.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the scenario falls within its expected existing threat model, which excludes attacks where an adversary already has administrative control of a device. However, Evans said Microsoft is taking a broader view under its Secure Future Initiative and customer feedback. The article also notes previous Edge-related security changes, including protections against malicious sideloaded extensions and restrictions on Internet Explorer mode after hackers used Chakra JavaScript engine zero-day exploits to access target devices.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft is updating the Edge web browser to stop loading saved passwords into process memory in clear text at startup. The change comes after security researcher Tom Jøran Sønstebyseter Rønning disclosed the behavior on May 4. He said Edge decrypted all credentials stored in its built-in password manager when the browser launched and kept them in memory even when they were not in use.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft had previously told BleepingComputer that this behavior was expected and described it as “by design.” The company later announced that future versions of Edge will no longer load saved passwords into memory on startup. Microsoft describes the change as a defense-in-depth improvement rather than a response to a scenario outside its existing threat model.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details-described-in-the-article\"\u003eTechnical details described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe reported behavior involved Edge’s built-in password manager and browser process memory. According to Rønning, all saved credentials were decrypted at launch and remained in memory even when they were not actively needed.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Rønning released a proof-of-concept tool that could dump passwords from Edge processes under certain access conditions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWith Administrator privileges, an attacker could dump passwords from other users’ Edge processes.\u003c/li\u003e\n\u003cli\u003eWithout Administrator privileges, the proof of concept only allowed access to Edge processes launched by the same user.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eRønning said Edge was the only Chromium-based browser he tested that behaved this way. He contrasted Edge with Chrome, saying Chrome uses a design that makes it much harder for attackers to extract saved passwords simply by reading process memory.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-initial-position-and-later-response\"\u003eMicrosoft’s initial position and later response\u003c/h2\u003e\n\n\u003cp\u003eThe article says Rønning reported the issue to Microsoft before publicly disclosing it and was told the behavior was “by design.” Microsoft also told BleepingComputer that it was “an expected feature of the application.”\u003c/p\u003e\n\n\u003cp\u003eMicrosoft later announced that it would change the behavior in future Edge versions. Microsoft Edge Security Lead Gareth Evans said the change will be delivered to every supported version of Edge, including Stable, Beta, Dev, Canary, and the Extended Stable channel used by enterprise customers.\u003c/p\u003e\n\n\u003cp\u003eEvans said Microsoft is prioritizing the rollout. He also said that, under the company’s Secure Future Initiative and based on customer feedback, Microsoft is taking a broader view of where it can reduce exposure through defense-in-depth improvements.\u003c/p\u003e\n\n\u003ch2 id=\"threat-model-and-impact-described\"\u003eThreat model and impact described\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said the reported scenario falls within its expected existing threat model. The article explains that this threat model excludes attacks where an adversary already has administrative control of a device.\u003c/p\u003e\n\n\u003cp\u003eEven so, Microsoft said reducing password exposure in memory is a practical defense-in-depth step. The article does not state that the behavior was exploited in attacks. The described impact is the potential for password dumping from Edge process memory under the access conditions demonstrated by the researcher’s proof of concept.\u003c/p\u003e\n\n\u003ch2 id=\"affected-versions-and-rollout\"\u003eAffected versions and rollout\u003c/h2\u003e\n\n\u003cp\u003eThe fix is already live in the Edge Canary channel. Microsoft said it will be included in the next update for all supported Edge releases.\u003c/p\u003e\n\n\u003cp\u003eThe affected release channels receiving the change include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eStable\u003c/li\u003e\n\u003cli\u003eBeta\u003c/li\u003e\n\u003cli\u003eDev\u003c/li\u003e\n\u003cli\u003eCanary\u003c/li\u003e\n\u003cli\u003eExtended Stable\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the update applies to build 148 and newer.\u003c/p\u003e\n\n\u003ch2 id=\"related-edge-security-changes-noted-in-the-article\"\u003eRelated Edge security changes noted in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article also mentions other Microsoft Edge security-related changes from the previous year. Microsoft introduced a feature to protect users against malicious extensions sideloaded into the browser. It also restricted access to Edge’s Internet Explorer mode after hackers began using zero-day exploits in the Chakra JavaScript engine to access target devices.\u003c/p\u003e\n\n\u003cp\u003eThese related items are presented as prior examples of Edge security changes, while the main focus of the article is Microsoft’s decision to stop loading saved passwords into clear-text process memory at startup.\u003c/p\u003e\n","keyPoints":["Microsoft is updating Edge so it no longer loads saved passwords into process memory in clear text at startup.","Security researcher Tom Jøran Sønstebyseter Rønning disclosed that Edge decrypted all credentials stored in its built-in password manager on launch and kept them in memory even when not in use.","Rønning released a proof-of-concept tool that could allow attackers with Administrator privileges to dump passwords from other users' Edge processes.","Microsoft initially described the behavior as expected and by design, but later announced a defense-in-depth change to reduce password exposure in memory.","The fix is already live in the Edge Canary channel and will be included in the next update for all supported Edge releases build 148 and newer."],"insights":["Microsoft is changing Edge despite saying the scenario falls within its existing threat model, showing that customer feedback and defense-in-depth concerns can drive fixes even when an issue is not treated as a formal security vulnerability.","The researcher said Edge differed from other Chromium-based browsers he tested because Chrome’s design makes simple memory-based extraction of saved passwords harder.","The proof-of-concept’s impact depends on attacker privileges: Administrator access can target other users’ Edge processes, while non-administrator access is limited to Edge processes launched by the same user.","Enterprise environments using the Extended Stable channel are included in the prioritized rollout, so the mitigation is not limited to consumer or preview builds."],"referencedReports":[{"title":"The Validation Gap: Automated Pentesting Answers One Question. You Need Six.","url":"https://hubs.li/Q048zztN0","publisher":"Unspecified sponsor","context":"The article includes a linked guide that says automated pentesting tools answer only one question and that the guide covers six surfaces organizations need to validate."}],"body":"\u003cp\u003eMicrosoft is updating the Edge web browser so it no longer loads saved passwords into process memory in clear text at startup. The change follows a May 4 disclosure by security researcher Tom Jøran Sønstebyseter Rønning, who said Edge decrypted all credentials stored in its built-in password manager on launch and kept them in memory even when not in use. Microsoft had previously described the behavior as “by design” and “an expected feature of the application.”\u003c/p\u003e\n\n\u003cp\u003eRønning released a proof-of-concept tool that could allow attackers with Administrator privileges to dump passwords from other users’ Edge processes. Without administrator privileges, the tool only allows access to Edge processes launched by the same user. Microsoft now describes the update as a defense-in-depth change intended to reduce password exposure in memory.\u003c/p\u003e\n\n\u003cp\u003eThe fix is already live in the Edge Canary channel and will be included in the next update for all supported Edge releases, including Stable, Beta, Dev, Canary, and Extended Stable. Microsoft said the change applies to build 148 and newer and is being prioritized for rollout. The company said the scenario still falls within its expected existing threat model, which excludes attacks where an adversary already has administrative control of a device.\u003c/p\u003e\n"},{"n":10,"title":"Microsoft Exchange, Windows 11 hacked on second day of Pwn2Own","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/pwn2own-day-two-hackers-demo-microsoft-exchange-windows-11-red-had-enterprise-linux-zero-days/","time":"17:47","priority":"SHOULD READ","score":82,"tldr":"On day two of Pwn2Own Berlin 2026, researchers earned $385,750 for exploiting 15 zero-day vulnerabilities across enterprise and AI products, including Microsoft Exchange, Windows 11, Red Hat Enterprise Linux, NVIDIA Container Toolkit, Cursor, and OpenAI Codex. The biggest win was Orange Tsai’s $200,000 Microsoft Exchange exploit chain achieving remote code execution with SYSTEM privileges.","briefOverview":"\u003cp\u003eDuring the second day of Pwn2Own Berlin 2026, competitors earned $385,750 after exploiting 15 unique zero-day vulnerabilities. The targeted products included Windows 11, Microsoft Exchange, and Red Hat Enterprise Linux for Workstations. The competition is taking place at OffensiveCon from May 14 to May 16 and focuses on enterprise technologies and artificial intelligence.\u003c/p\u003e\n\n\u003cp\u003eThe day’s largest award went to Cheng-Da Tsai, also known as Orange Tsai, of DEVCORE Research Team. He earned $200,000 by chaining three bugs to gain remote code execution with SYSTEM privileges on Microsoft Exchange. Other demonstrations included a Windows 11 integer overflow exploit, a Red Hat Enterprise Linux privilege escalation to root, and a use-after-free exploit affecting NVIDIA Container Toolkit.\u003c/p\u003e\n\n\u003cp\u003eThe AI category also produced several successful demonstrations against coding agents and related tools. Le Duc Anh Vu of Viettel Cyber Security hacked Cursor for \u003cspan class=\"math inline\"\u003e\\(30,000, Sina Kheirkhah of Summoning Team demonstrated an OpenAI Codex zero-day for \\)\u003c/span\u003e20,000, and Compass Security exploited Cursor for $15,000. Under Pwn2Own rules, vendors have 90 days to patch vulnerabilities disclosed during the contest.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003ePwn2Own Berlin 2026 continued on its second day with researchers exploiting 15 unique zero-day vulnerabilities and earning \u003cspan class=\"math inline\"\u003e\\(385,750 in cash awards. The event is being held at OffensiveCon from May 14 to May 16 and focuses on enterprise technologies and artificial intelligence. The competition offers more than \\)\u003c/span\u003e1,000,000 in cash and prizes across categories including web browsers, enterprise applications, cloud-native and container environments, virtualization, local privilege escalation, servers, local inference, and LLMs.\u003c/p\u003e\n\n\u003cp\u003eThe most significant result on day two was Cheng-Da Tsai, also known as Orange Tsai, earning $200,000 for a Microsoft Exchange exploit. Tsai, a member of DEVCORE Research Team, chained three bugs to achieve remote code execution with SYSTEM privileges. The article identifies this as the highlight of the second day.\u003c/p\u003e\n\n\u003cp\u003eOther enterprise and platform targets were also compromised during the day. Siyeon Wi earned \u003cspan class=\"math inline\"\u003e\\(7,500 after exploiting an integer overflow bug to hack Windows 11. Ben Koo of Team DDOS escalated privileges to root on Red Hat Enterprise Linux for Workstations and earned \\)\u003c/span\u003e10,000, while 0xDACA and Noam Trobishi used a use-after-free bug to exploit NVIDIA Container Toolkit.\u003c/p\u003e\n\n\u003cp\u003eThe AI category saw successful attacks against AI coding agents and related systems. Le Duc Anh Vu of Viettel Cyber Security hacked the Cursor AI coding agent for \u003cspan class=\"math inline\"\u003e\\(30,000. Sina Kheirkhah of Summoning Team demonstrated an OpenAI Codex zero-day for \\)\u003c/span\u003e20,000, and Compass Security exploited Cursor for $15,000.\u003c/p\u003e\n\n\u003cp\u003eThe article also places day two in the broader context of the event. On the first day, Orange Tsai earned $175,000 for chaining four logic bugs in a Microsoft Edge sandbox escape, while Windows 11 was hacked three times through privilege-escalation zero-days. On the third day, hackers were scheduled to target Microsoft Windows 11, VMware ESXi, Red Hat Enterprise Linux, Microsoft SharePoint, and several AI coding agents.\u003c/p\u003e\n\n\u003cp\u003ePwn2Own rules require all targeted devices to run the latest operating system versions, and entries must compromise the target and demonstrate arbitrary code execution. Vendors have 90 days to patch software and hardware after zero-days are disclosed at the competition. The article notes that during the previous year’s Pwn2Own Berlin contest, TrendMicro’s Zero Day Initiative awarded $1,078,750 for 29 zero-day flaws and some bug collisions.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003ePwn2Own Berlin 2026’s second day resulted in $385,750 in cash awards for competitors who exploited 15 unique zero-day vulnerabilities. The exploited products included Windows 11, Microsoft Exchange, and Red Hat Enterprise Linux for Workstations. The competition is taking place at the OffensiveCon conference from May 14 to May 16 and focuses on enterprise technologies and artificial intelligence.\u003c/p\u003e\n\n\u003cp\u003eSecurity researchers at the event can earn more than $1,000,000 in cash and prizes. The contest categories include web browser, enterprise applications, cloud-native and container environments, virtualization, local privilege escalation, servers, local inference, and LLM categories.\u003c/p\u003e\n\n\u003ch2 id=\"competition-rules-and-disclosure-timeline\"\u003eCompetition Rules and Disclosure Timeline\u003c/h2\u003e\n\n\u003cp\u003eAccording to the article, Pwn2Own rules require targeted devices to run the latest operating system versions. Entries must compromise the target and demonstrate arbitrary code execution. Vendors are given 90 days to patch their software and hardware after the zero-days are disclosed at Pwn2Own.\u003c/p\u003e\n\n\u003ch2 id=\"major-day-two-result-microsoft-exchange\"\u003eMajor Day Two Result: Microsoft Exchange\u003c/h2\u003e\n\n\u003cp\u003eThe biggest result of the second day was achieved by Cheng-Da Tsai, also known as Orange Tsai, of DEVCORE Research Team. He earned $200,000 after chaining three bugs to gain remote code execution with SYSTEM privileges on Microsoft Exchange. The article identifies this exploit chain as the highlight of day two.\u003c/p\u003e\n\n\u003ch2 id=\"other-enterprise-and-platform-exploits\"\u003eOther Enterprise and Platform Exploits\u003c/h2\u003e\n\n\u003cp\u003eSeveral other products were successfully exploited during the second day:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSiyeon Wi earned $7,500 after exploiting an integer overflow bug to hack Windows 11.\u003c/li\u003e\n\u003cli\u003eBen Koo of Team DDOS escalated privileges to root on Red Hat Enterprise Linux for Workstations and earned $10,000.\u003c/li\u003e\n\u003cli\u003e0xDACA and Noam Trobishi used a use-after-free bug to exploit NVIDIA Container Toolkit.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese demonstrations covered local privilege escalation and container-related targets in addition to the Microsoft Exchange remote code execution chain.\u003c/p\u003e\n\n\u003ch2 id=\"ai-category-results\"\u003eAI Category Results\u003c/h2\u003e\n\n\u003cp\u003eThe AI category included successful demonstrations against AI coding tools and related systems. Le Duc Anh Vu of Viettel Cyber Security hacked the Cursor AI coding agent and earned \u003cspan class=\"math inline\"\u003e\\(30,000. Sina Kheirkhah of Summoning Team demonstrated an OpenAI Codex zero-day and earned \\)\u003c/span\u003e20,000. Compass Security also exploited Cursor and earned $15,000.\u003c/p\u003e\n\n\u003ch2 id=\"context-from-day-one\"\u003eContext from Day One\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that Orange Tsai also had a major result on the first day of Pwn2Own Berlin 2026. He earned \u003cspan class=\"math inline\"\u003e\\(175,000 after chaining four logic bugs for a Microsoft Edge sandbox escape. Valentina Palmiotti, also known as chompie, of IBM X-Force Offensive Research earned \\)\u003c/span\u003e20,000 for rooting Red Hat Linux for Workstations and $50,000 for an NVIDIA Container Toolkit zero-day.\u003c/p\u003e\n\n\u003cp\u003eWindows 11 was also hacked three times on the first day. The article names Angelboy and TwinkleStar03, working with the DEVCORE Internship Program, Kentaro Kawane of GMO Cybersecurity, and Marcin Wiązowski as the researchers involved. Each earned $30,000 for demonstrating new privilege-escalation zero-days.\u003c/p\u003e\n\n\u003ch2 id=\"upcoming-day-three-targets\"\u003eUpcoming Day Three Targets\u003c/h2\u003e\n\n\u003cp\u003eOn the third day of Pwn2Own Berlin 2026, hackers were scheduled to target several enterprise and AI-related products. The listed targets included Microsoft Windows 11, VMware ESXi, Red Hat Enterprise Linux, Microsoft SharePoint, and several AI coding agents.\u003c/p\u003e\n\n\u003ch2 id=\"prior-year-comparison\"\u003ePrior-Year Comparison\u003c/h2\u003e\n\n\u003cp\u003eThe article compares the 2026 event with the previous year’s Pwn2Own Berlin contest. During last year’s contest, TrendMicro’s Zero Day Initiative awarded $1,078,750 for 29 zero-day flaws and some bug collisions.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe secon
