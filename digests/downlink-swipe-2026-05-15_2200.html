d day of Pwn2Own Berlin 2026 showed successful exploitation across fully patched enterprise, operating system, container, and AI coding environments. The most notable technical result was Orange Tsai’s Microsoft Exchange exploit chain, which achieved remote code execution with SYSTEM privileges and earned the largest day-two payout.\u003c/p\u003e\n","keyPoints":["During the second day of Pwn2Own Berlin 2026, competitors earned $385,750 after exploiting 15 unique zero-day vulnerabilities in products including Windows 11, Microsoft Exchange, and Red Hat Enterprise Linux for Workstations.","Cheng-Da Tsai, also known as Orange Tsai, of DEVCORE Research Team earned $200,000 by chaining three bugs to gain remote code execution with SYSTEM privileges on Microsoft Exchange.","Siyeon Wi earned $7,500 for exploiting an integer overflow bug to hack Windows 11, and Ben Koo of Team DDOS earned $10,000 for escalating privileges to root on Red Hat Enterprise Linux for Workstations.","In the AI category, Le Duc Anh Vu hacked the Cursor AI coding agent for $30,000, Sina Kheirkhah demonstrated an OpenAI Codex zero-day for $20,000, and Compass Security exploited Cursor for $15,000.","Under Pwn2Own rules, targeted devices run the latest operating system versions, entries must demonstrate arbitrary code execution, and vendors have 90 days to patch disclosed vulnerabilities."],"insights":["The successful exploits targeted fully patched products running the latest operating system versions, indicating that current patch levels did not prevent compromise in these demonstrations.","Microsoft technologies were repeatedly compromised across the event, with Microsoft Exchange hacked on day two and Microsoft Edge plus Windows 11 hacked on day one.","AI coding tools were a significant target category, with Cursor exploited twice and OpenAI Codex also demonstrated as vulnerable on the second day.","Orange Tsai had an outsized impact at the competition, earning $200,000 on day two for Microsoft Exchange and $175,000 on day one for a Microsoft Edge sandbox escape."],"referencedReports":[{"title":"The Validation Gap: Automated Pentesting Answers One Question. You Need Six.","url":"https://hubs.li/Q048zztN0","publisher":"Not specified in the article","context":"The article includes a linked guide about automated pentesting and the six validation surfaces organizations need to assess."}],"body":"\u003cp\u003eDuring the second day of Pwn2Own Berlin 2026, competitors earned $385,750 after exploiting 15 unique zero-day vulnerabilities. The targeted products included Windows 11, Microsoft Exchange, and Red Hat Enterprise Linux for Workstations. The competition is taking place at OffensiveCon from May 14 to May 16 and focuses on enterprise technologies and artificial intelligence.\u003c/p\u003e\n\n\u003cp\u003eThe day’s largest award went to Cheng-Da Tsai, also known as Orange Tsai, of DEVCORE Research Team. He earned $200,000 by chaining three bugs to gain remote code execution with SYSTEM privileges on Microsoft Exchange. Other demonstrations included a Windows 11 integer overflow exploit, a Red Hat Enterprise Linux privilege escalation to root, and a use-after-free exploit affecting NVIDIA Container Toolkit.\u003c/p\u003e\n\n\u003cp\u003eThe AI category also produced several successful demonstrations against coding agents and related tools. Le Duc Anh Vu of Viettel Cyber Security hacked Cursor for \u003cspan class=\"math inline\"\u003e\\(30,000, Sina Kheirkhah of Summoning Team demonstrated an OpenAI Codex zero-day for \\)\u003c/span\u003e20,000, and Compass Security exploited Cursor for $15,000. Under Pwn2Own rules, vendors have 90 days to patch vulnerabilities disclosed during the contest.\u003c/p\u003e\n"},{"n":13,"title":"Four OpenClaw Flaws Enable Data Theft, Privilege Escalation, and Persistence","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/four-openclaw-flaws-enable-data-theft.html","time":"13:35","priority":"SHOULD READ","score":82,"tldr":"Researchers disclosed four chainable OpenClaw vulnerabilities that could let attackers escape sandbox controls, steal sensitive data, escalate privileges, and establish persistence. All flaws were fixed in OpenClaw 2026.4.22, and users should update immediately.","briefOverview":"\u003cp\u003eCybersecurity researchers disclosed four OpenClaw vulnerabilities that can be chained to achieve data theft, privilege escalation, and persistence. Cyera collectively dubbed the flaws “Claw Chain” and said they could let an attacker establish a foothold, expose sensitive data, and plant backdoors. The issues affect OpenClaw’s OpenShell managed sandbox backend, input validation, and loopback runtime access control.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities are tracked as CVE-2026-44112, CVE-2026-44113, CVE-2026-44115, and CVE-2026-44118. The flaws include TOCTOU race conditions that allow reads and writes outside the intended mount root, an input validation bypass using heredoc shell expansion tokens, and an access control issue involving a spoofable ownership indicator. OpenClaw addressed all four vulnerabilities in version 2026.4.22, and users are advised to update to the latest version.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers disclosed a set of four OpenClaw security flaws that could be chained to enable data theft, privilege escalation, and persistence. Cyera collectively named the vulnerabilities “Claw Chain.” The company said the chain could allow an attacker to establish a foothold, expose sensitive data, and plant backdoors.\u003c/p\u003e\n\n\u003cp\u003eTwo of the vulnerabilities are TOCTOU race conditions in the OpenShell managed sandbox backend. CVE-2026-44112 allows attackers to bypass sandbox restrictions and redirect writes outside the intended mount root, while CVE-2026-44113 allows attackers to bypass sandbox restrictions and read files outside the intended mount root. Cyera said CVE-2026-44112 could enable configuration tampering, backdoor planting, and persistent control, while CVE-2026-44113 could be used to read system files, credentials, and internal artifacts.\u003c/p\u003e\n\n\u003cp\u003eThe other two flaws involve command validation and access control. CVE-2026-44115 is an incomplete list of disallowed inputs vulnerability that allows allowlist validation bypass by embedding shell expansion tokens in a heredoc body to execute unapproved commands at runtime. CVE-2026-44118 is an improper access control vulnerability that could allow non-owner loopback clients to impersonate an owner and gain control over gateway configuration, cron scheduling, and execution environment management.\u003c/p\u003e\n\n\u003cp\u003eThe described exploitation chain begins when a malicious plugin, prompt injection, or compromised external input gains code execution inside the OpenShell sandbox. An attacker could then use CVE-2026-44113 and CVE-2026-44115 to expose credentials, secrets, and sensitive files, exploit CVE-2026-44118 to gain owner-level control of the agent runtime, and use CVE-2026-44112 to plant backdoors or make configuration changes for persistence. Cyera said this approach uses the agent’s own privileges and may make detection harder for traditional controls.\u003c/p\u003e\n\n\u003cp\u003eOpenClaw described the fix for CVE-2026-44118 as changing the MCP loopback runtime to issue separate owner and non-owner bearer tokens and derive senderIsOwner only from the token that authenticated the request. The spoofable sender-owner header is no longer emitted or trusted. All four vulnerabilities were fixed in OpenClaw version 2026.4.22 following responsible disclosure, and security researcher Vladimir Tokarev was credited with discovering and reporting the issues.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers disclosed four security flaws in OpenClaw that can be chained to achieve data theft, privilege escalation, and persistence. Cyera collectively dubbed the vulnerabilities “Claw Chain.” According to the article, the flaws can permit an attacker to establish a foothold, expose sensitive data, and plant backdoors.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities affect OpenClaw components and behaviors including the OpenShell managed sandbox backend, allowlist validation, and loopback runtime access control. The article states that all four issues were addressed in OpenClaw version 2026.4.22. Users are advised to update to the latest version to stay protected against potential threats.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerabilities-disclosed\"\u003eVulnerabilities Disclosed\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies four CVEs:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-44112\u003c/strong\u003e: A TOCTOU race condition vulnerability in the OpenShell managed sandbox backend. It allows attackers to bypass sandbox restrictions and redirect writes outside the intended mount root. The article lists its CVSS score as 9.\u003csup\u003e6\u003c/sup\u003e\u0026frasl;\u003csub\u003e6\u003c/sub\u003e.3.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-44113\u003c/strong\u003e: A TOCTOU race condition vulnerability in OpenShell. It allows attackers to bypass sandbox restrictions and read files outside the intended mount root. The article lists its CVSS score as 7.\u003csup\u003e7\u003c/sup\u003e\u0026frasl;\u003csub\u003e6\u003c/sub\u003e.3.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-44115\u003c/strong\u003e: An incomplete list of disallowed inputs vulnerability. It allows attackers to bypass allowlist validation by embedding shell expansion tokens in a heredoc body to execute unapproved commands at runtime. The article lists its CVSS score as 8.8.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCVE-2026-44118\u003c/strong\u003e: An improper access control vulnerability. It could allow non-owner loopback clients to impersonate an owner and elevate privileges to gain control over gateway configuration, cron scheduling, and execution environment management. The article lists its CVSS score as 7.8.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-impact\"\u003eTechnical Impact\u003c/h2\u003e\n\n\u003cp\u003eCyera said successful exploitation of \u003cstrong\u003eCVE-2026-44112\u003c/strong\u003e could allow an attacker to tamper with configuration, plant backdoors, and establish persistent control over a compromised host. Because this flaw enables writes outside the intended mount root, it is described as a way to make configuration changes or plant backdoors after other steps in the chain.\u003c/p\u003e\n\n\u003cp\u003eCyera said \u003cstrong\u003eCVE-2026-44113\u003c/strong\u003e could be weaponized to read system files, credentials, and internal artifacts. The article links this read capability to exposure of sensitive data once an attacker has code execution inside the OpenShell sandbox.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eCVE-2026-44115\u003c/strong\u003e enables execution of unapproved commands at runtime by bypassing allowlist validation through shell expansion tokens embedded in a heredoc body. The article presents this as part of the data exposure stage of the attack chain when combined with CVE-2026-44113.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eCVE-2026-44118\u003c/strong\u003e is tied to privilege escalation within the agent runtime. The article states that its root cause stems from OpenClaw trusting a client-controlled ownership flag named \u003ccode\u003esenderIsOwner\u003c/code\u003e, which signals whether the caller is authorized for owner-only tools, without validating it against the authenticated session.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-chain-described-by-cyera\"\u003eExploitation Chain Described by Cyera\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the exploitation chain as unfolding in four steps:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eA malicious plugin, prompt injection, or compromised external input gains code execution inside the OpenShell sandbox.\u003c/li\u003e\n\u003cli\u003eThe attacker leverages CVE-2026-44113 and CVE-2026-44115 to expose credentials, secrets, and sensitive files.\u003c/li\u003e\n\u003cli\u003eThe attacker exploits CVE-2026-44118 to obtain owner-level control of the agent runtime.\u003c/li\u003e\n\u003cli\u003eThe attacker uses CVE-2026-44112 to plant backdoors or make configuration changes and set up persistence.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eCyera characterized the chain as an attacker weaponizing the agent’s own privileges. The company said an adversary could move through data access, privilege escalation, and persistence while using the agent as their hands inside the environment.\u003c/p\u003e\n\n\u003ch2 id=\"access-control-root-cause-and-fix\"\u003eAccess Control Root Cause and Fix\u003c/h2\u003e\n\n\u003cp\u003eFor CVE-2026-44118, the article states that OpenClaw trusted a client-controlled ownership flag called \u003ccode\u003esenderIsOwner\u003c/code\u003e. This flag indicated whether the caller was authorized for owner-only tools, but the issue was that it was not validated against the authenticated session.\u003c/p\u003e\n\n\u003cp\u003eOpenClaw’s advisory stated that the MCP loopback runtime now issues separate owner and non-owner bearer tokens. It also now derives \u003ccode\u003esenderIsOwner\u003c/code\u003e exclusively from which token authenticated the request. The article says the spoofable sender-owner header is no longer emitted or trusted.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-attribution\"\u003eResponse and Attribution\u003c/h2\u003e\n\n\u003cp\u003eFollowing responsible disclosure, all four vulnerabilities were addressed in OpenClaw version 2026.4.22. The article advises users to update to the latest version to stay protected against potential threats.\u003c/p\u003e\n\n\u003cp\u003eSecurity researcher Vladimir Tokarev was credited with discovering and reporting the issues. The article does not identify any threat actor exploiting the vulnerabilities, nor does it state that there has been observed exploitation in the wild.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that the vulnerabilities are significant because they are chainable. Individually, they involve sandbox bypass, sensitive file access, allowlist validation bypass, and improper access control; together, Cyera said they could enable data theft, privilege escalation, and persistence.\u003c/p\u003e\n\n\u003cp\u003eCyera also warned that each step could look like normal agent behavior to traditional controls. The company said this broadens the blast radius and makes detection significantly harder.\u003c/p\u003e\n","keyPoints":["Cybersecurity researchers disclosed four OpenClaw vulnerabilities collectively called Claw Chain that could be chained to achieve data theft, privilege escalation, and persistence.","The flaws are CVE-2026-44112, CVE-2026-44113, CVE-2026-44115, and CVE-2026-44118, affecting OpenShell sandbox behavior, input validation, and access control.","Cyera said CVE-2026-44113 and CVE-2026-44115 could be used to expose credentials, secrets, and sensitive files, while CVE-2026-44118 could provide owner-level control of the agent runtime.","Cyera said CVE-2026-44112 could allow attackers to tamper with configuration, plant backdoors, and establish persistent control over a compromised host.","OpenClaw addressed all four vulnerabilities in version 2026.4.22 following responsible disclosure by security researcher Vladimir Tokarev."],"insights":["The most actionable mitigation is upgrading to OpenClaw 2026.4.22, because the article states all four vulnerabilities were addressed in that release.","CVE-2026-44118 was especially dangerous because OpenClaw trusted a client-controlled senderIsOwner ownership flag instead of deriving owner status from the authenticated session.","OpenClaw’s fix for CVE-2026-44118 changed the loopback runtime to issue separate owner and non-owner bearer tokens and no longer trust the spoofable sender-owner header.","The exploitation chain could begin from a malicious plugin, prompt injection, or compromised external input, meaning the initial foothold could come through normal agent interaction paths rather than a traditional direct exploit.","Cyera warned that the attack could be hard for traditional controls to detect because each step uses the agent’s own privileges and can resemble normal agent behavior."],"referencedReports":[{"title":"Claw Chain: Cyera Research Unveil Four Chainable Vulnerabilities in OpenClaw","url":"https://www.cyera.com/blog/claw-chain-cyera-research-unveil-four-chainable-vulnerabilities-in-openclaw","publisher":"Cyera","context":"The article cites Cyera’s research as the disclosure of four OpenClaw vulnerabilities collectively dubbed Claw Chain."}],"body":"\u003cp\u003eCybersecurity researchers disclosed four OpenClaw vulnerabilities that can be chained to achieve data theft, privilege escalation, and persistence. Cyera collectively dubbed the flaws “Claw Chain” and said they could let an attacker establish a foothold, expose sensitive data, and plant backdoors. The issues affect OpenClaw’s OpenShell managed sandbox backend, input validation, and loopback runtime access control.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities are tracked as CVE-2026-44112, CVE-2026-44113, CVE-2026-44115, and CVE-2026-44118. The flaws include TOCTOU race conditions that allow reads and writes outside the intended mount root, an input validation bypass using heredoc shell expansion tokens, and an access control issue involving a spoofable ownership indicator. OpenClaw addressed all four vulnerabilities in version 2026.4.22, and users are advised to update to the latest version.\u003c/p\u003e\n"},{"n":1,"title":"Gremlin Stealer's Evolved Tactics: Hiding in Plain Sight With Resource Files","source":"unit42.paloaltonetworks.com","sourceColor":"#c084fc","link":"https://unit42.paloaltonetworks.com/gremlin-stealer-evolution/","time":"10:00","priority":"SHOULD READ","score":80,"tldr":"Gremlin Stealer has evolved into a more evasive, modular infostealer that hides encrypted payloads in .NET resource files and uses packing, string encryption and control-flow obfuscation to hinder analysis. The latest variants steal browser and Discord data, hijack active sessions, clip cryptocurrency wallet addresses and exfiltrate victim data to attacker-controlled infrastructure.","briefOverview":"\u003cp\u003eUnit 42 analyzed a new Gremlin stealer variant that exfiltrates stolen data to a newly deployed site at hxxp[:]194.87.92[.]109. At the time of discovery, VirusTotal showed zero detection for the site, associated URLs, and retrieved artifacts. The malware bundles harvested data into a ZIP archive named with the victim’s public IP address before uploading it to the attacker-controlled site.\u003c/p\u003e\n\n\u003cp\u003eThe latest Gremlin stealer variant shows an increased focus on stealth and anti-analysis. It hides malicious payloads in the .NET Resource section and masks them with XOR encoding to evade static analysis, signature-based detection, and heuristic scanning. Unit 42 also examined a sample packed with a commercial packing utility that uses instruction virtualization, identifier renaming, string encryption, and control-flow obfuscation.\u003c/p\u003e\n\n\u003cp\u003eGremlin stealer targets sensitive information including payment card details, browser cookies, session tokens, cryptocurrency wallet data, and FTP and VPN credentials. Newer functionality includes Discord token extraction, cryptocurrency clipboard hijacking, and WebSocket-based session hijacking of active browser sessions. Palo Alto Networks stated that its products, including Cortex XDR, XSIAM, Advanced WildFire, Advanced Threat Prevention, Advanced URL Filtering, and Advanced DNS Security, provide protections against the threat.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eUnit 42 reported on a newly identified Gremlin stealer variant that uses more advanced obfuscation and anti-analysis techniques than earlier versions. Gremlin stealer is described as malware that siphons sensitive information from compromised systems and exfiltrates it to attacker-controlled servers for potential publication or sale. The article highlights a new Gremlin site at hxxp[:]194.87.92[.]109 used for publishing stolen data.\u003c/p\u003e\n\n\u003cp\u003eAt discovery, VirusTotal showed zero detection for the new Gremlin site, its associated URLs, and retrieved artifacts. After data theft, the malware bundles harvested artifacts into a ZIP archive and names the file using the victim’s public IP address. The harvested data includes browser cookies, session tokens, clipboard contents, cryptocurrency wallet data, and FTP and VPN credentials.\u003c/p\u003e\n\n\u003cp\u003eThe latest Gremlin variant hides malicious payloads in the .NET Resource section and masks them with XOR encoding. Unit 42 states that applying a single-byte XOR decryption routine recovered the plain-text configuration, including hard-coded command-and-control URLs and exfiltration paths. Compared with older samples that lacked obfuscation and left function exports and internal symbols intact, the current version uses staged loading and maps critical functions into memory from the .NET resource section only when needed.\u003c/p\u003e\n\n\u003cp\u003eThe article describes several functional upgrades in the latest Gremlin stealer variant. It includes a dedicated Discord token extraction module, a cryptocurrency clipboard hijacker that replaces wallet addresses in real time, and a WebSocket-based session hijacking module that requests data directly from running browser processes. Unit 42 characterizes these changes as an evolution from a basic credential harvester to a more modular toolkit.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 also analyzed a packed Gremlin sample with SHA256 2172dae9a5a695e00e0e4609e7db0207d8566d225f7e815fada246ae995c0f9b. The packed variant uses a commercial packing utility and anti-analysis methods including identifier renaming, string encryption, and control-flow obfuscation. Palo Alto Networks said its Advanced WildFire, Advanced URL Filtering, Advanced DNS Security, Advanced Threat Prevention, Cortex XDR, and XSIAM protections apply to the threats discussed, and the article provides SHA256 hashes and a URL indicator of compromise.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eUnit 42 analyzed new Gremlin stealer activity showing that the malware has evolved into a more complex and evasive threat. Gremlin stealer is described as malware that siphons sensitive information from compromised systems and exfiltrates it to attacker-controlled servers for possible publication or sale. The article focuses on a newer variant that hides malicious payloads in embedded resources and uses multiple anti-analysis safeguards.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 identified a new Gremlin stealer variant using internal threat intelligence. This variant exfiltrates stolen data to a newly deployed site at hxxp[:]194.87.92[.]109. At the time of discovery, VirusTotal showed zero detection for the site, associated URLs, and retrieved artifacts, with no block list entries, community reports, or malicious categorizations.\u003c/p\u003e\n\n\u003ch2 id=\"data-theft-and-exfiltration\"\u003eData Theft and Exfiltration\u003c/h2\u003e\n\n\u003cp\u003eThe malware targets sensitive data from compromised systems. The article lists targeted information including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePayment card details\u003c/li\u003e\n\u003cli\u003eBrowser cookies\u003c/li\u003e\n\u003cli\u003eSession tokens\u003c/li\u003e\n\u003cli\u003eCryptocurrency wallet data\u003c/li\u003e\n\u003cli\u003eFTP and VPN credentials\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAfter data theft, Gremlin stealer bundles harvested artifacts into a ZIP archive. The archive includes browser cookies, session tokens, clipboard contents, cryptocurrency wallet data, and FTP and VPN credentials. The malware names the ZIP file using the victim’s public IP address to identify the source before uploading it to the attacker-controlled site.\u003c/p\u003e\n\n\u003ch2 id=\"resource-based-payload-hiding\"\u003eResource-Based Payload Hiding\u003c/h2\u003e\n\n\u003cp\u003eThe latest Gremlin stealer iteration places its malicious payload in the .NET Resource section. Unit 42 states that the payload is masked with XOR encoding to bypass signature-based detection and heuristic scanning. The resource section appears as an opaque block of data, concealing strings and API calls that might otherwise trigger alerts.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 applied a single-byte XOR decryption routine to recover the plain-text configuration. This revealed hard-coded command-and-control URLs and exfiltration paths. The article notes that Gremlin stealer’s use of the resource section mirrors tactics used by several high-profile malware families, including Agent Tesla, GuLoader, LokiBot, and Quasar RAT.\u003c/p\u003e\n\n\u003ch2 id=\"comparison-with-older-gremlin-versions\"\u003eComparison With Older Gremlin Versions\u003c/h2\u003e\n\n\u003cp\u003eThe article contrasts older and newer Gremlin stealer variants. Legacy samples lacked obfuscation and left function exports and internal symbols intact. The current iteration implements a staged loading mechanism.\u003c/p\u003e\n\n\u003cp\u003eIn the current variant, each critical function is decrypted and mapped into memory from the .NET resource section only when needed. Unit 42 states that this forces analysts to perform dynamic debugging to observe meaningful program behavior. This marks a clear change in Gremlin stealer’s anti-analysis approach.\u003c/p\u003e\n\n\u003ch2 id=\"expanded-capabilities\"\u003eExpanded Capabilities\u003c/h2\u003e\n\n\u003cp\u003eUnit 42 describes Gremlin stealer’s evolution from a basic credential harvester into a modular toolkit. The latest variant includes a dedicated Discord token extraction module. The article states that this indicates a pivot toward targeting digital identity and social engineering.\u003c/p\u003e\n\n\u003cp\u003eThe variant also includes cryptocurrency clipper functionality. This feature continuously monitors the system clipboard for strings matching cryptocurrency wallet patterns. When it detects a match, it replaces the victim’s address with the attacker’s wallet in real time, diverting funds during transactions.\u003c/p\u003e\n\n\u003cp\u003eAnother major upgrade is a WebSocket-based session hijacking module. The article states that this module allows Gremlin stealer to hijack active, live browser sessions and bypass modern cookie protections by requesting data directly from the running browser process. In the conclusion, Unit 42 states that Gremlin now targets Chromium-based browsers and uses memory-resident techniques to hijack active session tokens and sensitive data directly from running processes rather than relying only on static database files.\u003c/p\u003e\n\n\u003ch2 id=\"packed-variant-and-anti-analysis-techniques\"\u003ePacked Variant and Anti-Analysis Techniques\u003c/h2\u003e\n\n\u003cp\u003eUnit 42 analyzed a Gremlin stealer sample with SHA256 2172dae9a5a695e00e0e4609e7db0207d8566d225f7e815fada246ae995c0f9b that was packed using a commercial packing utility. The article describes the packing as using instruction virtualization, where original code is transformed into custom, non-standard bytecode executed by a private virtual machine.\u003c/p\u003e\n\n\u003cp\u003eThe packed variant uses several anti-analysis techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIdentifier renaming\u003c/li\u003e\n\u003cli\u003eString encryption\u003c/li\u003e\n\u003cli\u003eControl-flow obfuscation\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"identifier-renaming\"\u003eIdentifier Renaming\u003c/h3\u003e\n\n\u003cp\u003eThe article explains that the malware authors replaced meaningful class, method, and variable names with meaningless short names. This removes context from the code and forces analysts to manually trace function calls to determine purpose. As an example, Unit 42 notes that the main orchestrator class is named \u003ccode\u003ehf\u003c/code\u003e, with primary methods \u003ccode\u003ea\u003c/code\u003e, \u003ccode\u003eb\u003c/code\u003e, and \u003ccode\u003ec\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch3 id=\"string-encryption\"\u003eString Encryption\u003c/h3\u003e\n\n\u003cp\u003eThe malware stores important strings in encrypted form rather than as readable strings in the code. The article identifies a decoder method named \u003ccode\u003e_003CModule_003E.c(int, int, int)\u003c/code\u003e. This method takes three integers, calculates an offset and length, opens an embedded resource file, reads encrypted bytes, uses the third integer as a key, and returns the readable string.\u003c/p\u003e\n\n\u003cp\u003eUnit 42 gives an example in which an obfuscated code line calls the decoder with numeric arguments. At runtime, the decoded value becomes \u003ccode\u003ehttp://api.ipify.org/?format=json\u003c/code\u003e. The article states that this prevents analysts from simply searching the code for suspicious keywords such as Telegram, wallet.dat, or api.ipify[.]org.\u003c/p\u003e\n\n\u003ch3 id=\"control-flow-obfuscation\"\u003eControl-Flow Obfuscation\u003c/h3\u003e\n\n\u003cp\u003eThe packed variant also uses control-flow obfuscation. The article describes decompiler output filled with complex and nonsensical if-else statements, goto jumps, and mathematical operations that do not affect the outcome. Unit 42 states that these constructs confuse both human analysts and automated analysis tools by disrupting the expected logical flow.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-significance\"\u003eImpact and Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that Gremlin stealer’s core exfiltration methods, including private web panels or the Telegram Bot API, remain consistent. However, the latest variant has evolved into a more advanced modular stealer. Its scope now includes Chromium-based browser targeting, active session hijacking, Discord token theft, and cryptocurrency clipboard hijacking.\u003c/p\u003e\n\n\u003cp\u003eThe WebSocket-based session hijacking capability is highlighted as a major technical upgrade. The clipboard hijacker adds persistent financial fraud functionality by monitoring the clipboard and replacing cryptocurrency wallet addresses with attacker-controlled ones. The dedicated Discord token stealer scans multiple paths and uses regex validation to compromise modern communication platforms.\u003c/p\u003e\n\n\u003ch2 id=\"protection-and-mitigation-described-by-palo-alto-networks\"\u003eProtection and Mitigation Described by Palo Alto Networks\u003c/h2\u003e\n\n\u003cp\u003ePalo Alto Networks states that customers are better protected through several products and services. The article names the following protections:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAdvanced WildFire\u003c/li\u003e\n\u003cli\u003eAdvanced URL Filtering\u003c/li\u003e\n\u003cli\u003eAdvanced DNS Security\u003c/li\u003e\n\u003cli\u003eAdvanced Threat Prevention\u003c/li\u003e\n\u003cli\u003eCortex XDR\u003c/li\u003e\n\u003cli\u003eCortex XSIAM\u003c/li\u003e\n\u003cli\u003eUnit 42 Incident Response\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that Advanced WildFire machine-learning models and analysis techniques were reviewed and updated in light of the indicators of compromise shared in the research. It also states that Advanced URL Filtering and Advanced DNS Security identify known domains and URLs associated with this activity as malicious. Advanced Threat Prevention is described as having machine learning-based detection for exploits in real time.\u003c/p\u003e\n\n\u003cp\u003eFor Cortex XDR and XSIAM, the article states that these products are designed to prevent execution of known malicious malware and unknown malware using Behavioral Threat Protection and machine learning based on the Local Analysis module. They are also described as protecting against credential gathering tools and techniques using Credential Gathering Protection available from Cortex XDR 3.4. The article adds that Cortex XDR Pro can detect post-exploit activity, including credential-based attacks, with behavioral analytics.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article provides SHA256 hashes for Gremlin stealer samples analyzed in the research:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e2172dae9a5a695e00e0e4609e7db0207d8566d225f7e815fada246ae995c0f9b\u003c/li\u003e\n\u003cli\u003e9aab30a3190301016c79f8a7f8edf45ec088ceecad39926cfcf3418145f3d614\u003c/li\u003e\n\u003cli\u003e971198ff86aeb42739ba9381923d0bc6f847a91553ec57ea6bae5becf80f8759\u003c/li\u003e\n\u003cli\u003eab0fa760bd037a95c4dee431e649e0db860f7cdad6428895b9a399b6991bf3cd\u003c/li\u003e\n\u003cli\u003ef76ba1a4650d8cafb6d3ff071688c5db6fd37e165050f03cece693826f51d346\u003c/li\u003e\n\u003cli\u003ea9f529a5cbc1f3ee80f785b22e0c472953e6cb226952218aecc7ab07ca328abd\u003c/li\u003e\n\u003cli\u003e691896c7be87e47f3e9ae914d76caaf026aaad0a1034e9f396c2354245215dc3\u003c/li\u003e\n\u003cli\u003e281b970f281dbea3c0e8cfc68b2e9939b253e5d3de52265b454d8f0f578768a2\u003c/li\u003e\n\u003cli\u003e9fda1ddb1acf8dd3685ec31b0b07110855832e3bed28a0f3b81c57fe7fe3ac20\u003c/li\u003e\n\u003cli\u003ed11938f14499de03d6a02b5e158782afd903460576e9227e0a15d960a2e9c02c\u003c/li\u003e\n\u003cli\u003e1bd0a200528c82c6488b4f48dd6dbc818d48782a2e25ccd22781c5718c3f62f5\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also provides the following URL indicator:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ehxxp[:]194.87.92[.]109/i.php\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Unit 42 identified a new Gremlin stealer variant that exfiltrates stolen data to a newly deployed attacker-controlled site at hxxp[:]194.87.92[.]109.","The latest Gremlin stealer variant hides its malicious payload in the .NET Resource section and masks it with XOR encoding to evade static analysis and signature-based detection.","Gremlin stealer bundles harvested artifacts such as browser cookies, session tokens, clipboard contents, cryptocurrency wallet data, and FTP and VPN credentials into a ZIP archive named with the victim’s public IP address.","A analyzed Gremlin stealer sample was packed with a commercial packing utility and used identifier renaming, string encryption, and control-flow obfuscation to hinder reverse engineering.","The latest variant includes expanded functionality such as Discord token extraction, cryptocurrency clipboard hijacking, and WebSocket-based session hijacking of active browser sessions."],"insights":["The newly deployed Gremlin stealer site and related artifacts had zero VirusTotal detections at discovery, indicating defenders should not rely solely on public reputation or blocklist status for this activity.","Gremlin’s use of the .NET Resource section means indicators such as C2 URLs, exfiltration paths, strings, and API calls may only become visible after resource decoding or runtime analysis.","The malware’s WebSocket-based session hijacking capability is significant because it requests sensitive data directly from running browser processes rather than relying only on static browser database files.","The latest variant’s clipboard hijacker changes Gremlin from a purely passive infostealer into malware capable of actively interfering with cryptocurrency transactions in real time."],"referencedReports":[{"title":"Agent Tesla campaign","url":"https://www.stormshield.com/news/agent-tesla-campaign/","publisher":"Stormshield","context":"The article links to this external analysis as an example of a malware family that uses resource sections for payload obfuscation."},{"title":"GuLoader Malware Analysis","url":"https://www.crowdstrike.com/en-us/blog/guloader-malware-analysis/","publisher":"CrowdStrike","context":"The article links to this external malware analysis while comparing Gremlin stealer’s resource-section payload obfuscation with techniques used by other malware families."},{"title":"A Deep Dive Into LokiBot Infection Chain","url":"https://blog.talosintelligence.com/a-deep-dive-into-lokibot-infection-chain/","publisher":"Cisco Talos","context":"The article links to this external technical analysis as an example of another malware family associated with payload obfuscation tactics."}],"body":"\u003cp\u003eUnit 42 analyzed a new Gremlin stealer variant that exfiltrates stolen data to a newly deployed site at hxxp[:]194.87.92[.]109. At the time of discovery, VirusTotal showed zero detection for the site, associated URLs, and retrieved artifacts. The malware bundles harvested data into a ZIP archive named with the victim’s public IP address before uploading it to the attacker-controlled site.\u003c/p\u003e\n\n\u003cp\u003eThe latest Gremlin stealer variant shows an increased focus on stealth and anti-analysis. It hides malicious payloads in the .NET Resource section and masks them with XOR encoding to evade static analysis, signature-based detection, and heuristic scanning. Unit 42 also examined a sample packed with a commercial packing utility that uses instruction virtualization, identifier renaming, string encryption, and control-flow obfuscation.\u003c/p\u003e\n\n\u003cp\u003eGremlin stealer targets sensitive information including payment card details, browser cookies, session tokens, cryptocurrency wallet data, and FTP and VPN credentials. Newer functionality includes Discord token extraction, cryptocurrency clipboard hijacking, and WebSocket-based session hijacking of active browser sessions. Palo Alto Networks stated that its products, including Cortex XDR, XSIAM, Advanced WildFire, Advanced Threat Prevention, Advanced URL Filtering, and Advanced DNS Security, provide protections against the threat.\u003c/p\u003e\n"},{"n":8,"title":"Inside the REMUS Infostealer: Session Theft, MaaS, and Rapid Evolution","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/inside-the-remus-infostealer-session-theft-maas-and-rapid-evolution/","time":"14:02","priority":"SHOULD READ","score":78,"tldr":"REMUS has rapidly evolved from a basic infostealer into a commercial malware-as-a-service platform focused on stealing authenticated sessions, cookies, tokens, and browser-side password manager data. The key risk is that attackers can use stolen sessions to bypass MFA and maintain access without relying only on stolen passwords.","briefOverview":"\u003cp\u003eFlare researchers analyzed 128 posts linked to the REMUS underground operation between February 12 and May 8, 2026. The article says REMUS emerged in recent months as a new infostealer malware and has drawn attention from security researchers and malware analysts. The analysis focuses less on the malware’s code alone and more on how the underground operation presented, developed, and commercialized it.\u003c/p\u003e\n\n\u003cp\u003eThe article describes REMUS as rapidly evolving from basic stealer promotion into an actively maintained malware-as-a-service platform. Early posts promoted browser credential theft, cookie collection, Discord token theft, Telegram delivery, and log management, while later updates added restore-token functionality, worker tracking, statistics pages, proxy support, and password-manager-related collection. The operation’s repeated updates, support claims, and operational tooling are presented as evidence that modern MaaS operations increasingly resemble structured software businesses.\u003c/p\u003e\n\n\u003cp\u003eA major theme is REMUS’s shift toward session theft rather than traditional credential theft alone. The article highlights cookie collection, token handling, browser sessions, proxy-assisted restoration, and authenticated access continuity as central features. It also notes advertised collection related to Bitwarden, 1Password, LastPass, and IndexedDB browser storage, while stating that the posts do not prove successful vault decryption or direct password-manager compromise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eREMUS is described as a new infostealer malware that has emerged across the cybercrime landscape in recent months. While prior technical analyses focused on the malware’s capabilities, infrastructure, and similarities to Lumma Stealer, Flare’s article focuses on the underground operation behind REMUS. Flare researchers analyzed 128 posts linked to the REMUS operation from February 12 to May 8, 2026.\u003c/p\u003e\n\n\u003cp\u003eThe article says the underground posts reveal a compressed and aggressive development cycle. In February 2026, early posts presented REMUS as reliable and easy to use, promoting browser credential theft, cookie collection, Discord token theft, Telegram delivery, and basic log management. The operator also advertised “24/7 support” and claimed that with good crypting and a dedicated intermediary server, the callback rate was about 90%.\u003c/p\u003e\n\n\u003cp\u003eMarch 2026 is described as the campaign’s most active development period. During that month, the operator introduced restore-token functionality, expanded log handling, worker tracking, statistics pages, duplicate-log filtering, and improved Telegram delivery workflows. Several updates focused on operational visibility and campaign management rather than theft alone, suggesting REMUS was becoming a broader operational platform.\u003c/p\u003e\n\n\u003cp\u003eIn April 2026, the operation moved further toward session continuity and browser-side authentication artifacts. Updates included SOCKS5 proxy support, improved token restoration, anti-VM toggles, gaming-platform targeting, and password-manager-related collection. One update said REMUS added IndexedDB collection for 1Password and LastPass extensions, and another referenced Bitwarden-related searches.\u003c/p\u003e\n\n\u003cp\u003eThe article connects REMUS to public reporting that described it as a technically significant successor or variant of Lumma Stealer. That reporting noted REMUS as a 64-bit infostealer with similarities to Lumma, including anti-VM checks, browser-focused credential theft, and browser encryption bypass techniques. Flare’s analysis argues that the underground activity shows not only malware lineage, but also a commercial cybercrime product with continuous updates, support, and operational refinements.\u003c/p\u003e\n\n\u003cp\u003eThe most important impact described is the growing emphasis on stolen sessions, cookies, and authentication artifacts. The article states that attackers increasingly seek already authenticated sessions that may bypass MFA prompts, login alerts, device verification, and risk-based authentication systems. It concludes that REMUS reflects a broader shift in infostealer operations toward session persistence, automation, and long-term monetization workflows.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article examines REMUS, a new infostealer malware that has emerged across the cybercrime landscape in recent months. It notes that several recent technical analyses have focused on REMUS’s capabilities, infrastructure, and similarities to Lumma Stealer, including browser targeting mechanisms and credential theft functionality.\u003c/p\u003e\n\n\u003cp\u003eFlare’s analysis focuses on the underground operation behind REMUS rather than only on the malware’s technical lineage. Flare researchers analyzed 128 posts linked to the REMUS underground operation between February 12 and May 8, 2026. These posts included advertisements, update logs, feature announcements, operational discussions, and customer-facing communications.\u003c/p\u003e\n\n\u003cp\u003eThe article presents REMUS as more than a static malware build. It describes the operation as an actively maintained malware-as-a-service platform that evolved quickly over a few months, with repeated feature updates, operational refinements, and new collection capabilities.\u003c/p\u003e\n\n\u003ch2 id=\"development-timeline\"\u003eDevelopment Timeline\u003c/h2\u003e\n\n\u003ch3 id=\"february-2026-initial-commercial-push\"\u003eFebruary 2026: Initial Commercial Push\u003c/h3\u003e\n\n\u003cp\u003eFebruary 2026 marked the beginning of REMUS’s commercial promotion. Early posts emphasized reliability, ease of use, and customer-facing appeal. The advertised functionality included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBrowser credential theft.\u003c/li\u003e\n\u003cli\u003eCookie collection.\u003c/li\u003e\n\u003cli\u003eDiscord token theft.\u003c/li\u003e\n\u003cli\u003eTelegram delivery.\u003c/li\u003e\n\u003cli\u003eBasic log management.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe operator claimed that “with good crypting and a dedicated intermediary server, the callback rate is ~90%.” Another early post marketed the malware as offering “24/7 support” and functionality “simple enough that even a child can figure it out.” The article highlights this as evidence that usability and commercialization were central from the start.\u003c/p\u003e\n\n\u003ch3 id=\"march-2026-most-active-development-period\"\u003eMarch 2026: Most Active Development Period\u003c/h3\u003e\n\n\u003cp\u003eMarch 2026 is described as the campaign’s most active development phase. During this period, the operator introduced several features tied to campaign management and operational visibility, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRestore-token functionality.\u003c/li\u003e\n\u003cli\u003eExpanded log handling.\u003c/li\u003e\n\u003cli\u003eWorker tracking.\u003c/li\u003e\n\u003cli\u003eStatistics pages.\u003c/li\u003e\n\u003cli\u003eDuplicate-log filtering.\u003c/li\u003e\n\u003cli\u003eImproved Telegram delivery workflows.\u003c/li\u003e\n\u003cli\u003eWorker nicknames in log tables and statistics views.\u003c/li\u003e\n\u003cli\u003eImproved loader execution visibility to help operators understand failed infections.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that many of these updates were not focused directly on theft, but on improving how operators could manage campaigns. This suggested that REMUS was developing into a broader operational platform rather than remaining only a malware executable.\u003c/p\u003e\n\n\u003ch3 id=\"april-2026-shift-toward-session-continuity\"\u003eApril 2026: Shift Toward Session Continuity\u003c/h3\u003e\n\n\u003cp\u003eIn April 2026, the REMUS operation showed a clearer move toward session continuity and browser-side authentication artifacts. Updates added or improved:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSOCKS5 proxy support.\u003c/li\u003e\n\u003cli\u003eToken restoration.\u003c/li\u003e\n\u003cli\u003eAnti-VM toggles.\u003c/li\u003e\n\u003cli\u003eGaming-platform targeting.\u003c/li\u003e\n\u003cli\u003ePassword-manager-related collection.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eOne update explicitly stated: “Added IndexedDB collection for 1Password and LastPass extensions.” Another referenced Bitwarden-related searches. The article says these posts increasingly emphasized authenticated sessions, restore workflows, and browser-side storage rather than standalone credentials alone.\u003c/p\u003e\n\n\u003ch3 id=\"early-may-2026-refinement-and-stabilization\"\u003eEarly May 2026: Refinement and Stabilization\u003c/h3\u003e\n\n\u003cp\u003eBy early May 2026, the operation appeared to focus more on refinement and operational stability. The remaining posts referenced restore improvements, bug fixes, collection optimizations, and continued adjustments to delivery and management functionality.\u003c/p\u003e\n\n\u003cp\u003eThe article characterizes this as a shift from rapid feature expansion toward platform stabilization.\u003c/p\u003e\n\n\u003ch2 id=\"connection-to-lumma-stealer\"\u003eConnection to Lumma Stealer\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that public reporting has largely discussed REMUS as a technically significant successor or variant of Lumma Stealer. Researchers described REMUS as a 64-bit infostealer sharing similarities with Lumma, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAnti-VM checks.\u003c/li\u003e\n\u003cli\u003eBrowser-focused credential theft.\u003c/li\u003e\n\u003cli\u003eBrowser encryption bypass techniques.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this technical overlap is important, but argues that the underground data shows a broader story. According to Flare’s analysis, the operator was building a commercial cybercrime product around the malware, repeatedly promoting updates, support, performance improvements, and additional collection capabilities.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights the operator’s claim of approximately 90% successful delivery rates when REMUS was paired with proper crypting and an intermediary server. It describes this language as aimed at reassuring potential buyers about operational reliability.\u003c/p\u003e\n\n\u003ch2 id=\"session-theft-as-a-central-theme\"\u003eSession Theft as a Central Theme\u003c/h2\u003e\n\n\u003cp\u003eA central theme in the article is the growing importance of session theft. The article states that infostealers like REMUS no longer only harvest credentials; they also capture cookies, browser tokens, and authenticated sessions.\u003c/p\u003e\n\n\u003cp\u003eREMUS repeatedly emphasized:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCookie collection.\u003c/li\u003e\n\u003cli\u003eToken handling.\u003c/li\u003e\n\u003cli\u003eBrowser sessions.\u003c/li\u003e\n\u003cli\u003eProxy-assisted restoration.\u003c/li\u003e\n\u003cli\u003eAuthenticated access continuity.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article contrasts this with older infostealer activity that focused primarily on usernames and passwords. It says REMUS promoted browser sessions and authentication artifacts from the earliest stages of the campaign.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that stolen cookies and authenticated sessions have become highly valuable in the underground economy. Instead of stealing credentials and attempting to log in later, attackers increasingly seek already authenticated sessions that may bypass MFA prompts, login alerts, device verification, and risk-based authentication systems.\u003c/p\u003e\n\n\u003cp\u003eMultiple REMUS updates referenced “Restore” improvements, proxy compatibility, and support for multiple proxy types during token restoration workflows. The article says this strongly suggests the operator viewed session persistence as a major selling point.\u003c/p\u003e\n\n\u003ch2 id=\"platforms-and-targets-mentioned\"\u003ePlatforms and Targets Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several platforms and environments that appeared in REMUS updates or advertised capabilities. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDiscord.\u003c/li\u003e\n\u003cli\u003eSteam.\u003c/li\u003e\n\u003cli\u003eRiot Games.\u003c/li\u003e\n\u003cli\u003eTelegram-linked environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that active sessions on these platforms can carry substantial value. Combined with cookie collection and restore functionality, the campaign appeared designed not only to steal credentials but also to preserve and operationalize authenticated access.\u003c/p\u003e\n\n\u003ch2 id=\"password-manager-related-collection\"\u003ePassword-Manager-Related Collection\u003c/h2\u003e\n\n\u003cp\u003eThe article describes password-manager-related collection as the most significant late-stage evolution observed in the REMUS campaign. By April 2026, the operator advertised support tied to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBitwarden.\u003c/li\u003e\n\u003cli\u003e1Password.\u003c/li\u003e\n\u003cli\u003eLastPass.\u003c/li\u003e\n\u003cli\u003eIndexedDB browser storage.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article explains that password managers represent concentrated stores of valuable credentials and authentication material. It also states that IndexedDB is relevant because modern browser applications and extensions frequently use local browser storage mechanisms to retain application data and session information.\u003c/p\u003e\n\n\u003cp\u003eThe article is careful to state that the posts do not prove successful vault decryption or direct password-manager compromise. However, it says they clearly show REMUS development moving toward browser-side storage collection associated with password-management ecosystems.\u003c/p\u003e\n\n\u003ch2 id=\"operational-maturity-and-maas-model\"\u003eOperational Maturity and MaaS Model\u003c/h2\u003e\n\n\u003cp\u003eThe article presents REMUS as an example of how modern malware-as-a-service ecosystems increasingly resemble legitimate software businesses. Across the analyzed posts, the operator repeatedly published:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVersioned updates.\u003c/li\u003e\n\u003cli\u003eBug fixes.\u003c/li\u003e\n\u003cli\u003eFeature expansions.\u003c/li\u003e\n\u003cli\u003eTroubleshooting improvements.\u003c/li\u003e\n\u003cli\u003eStatistics enhancements.\u003c/li\u003e\n\u003cli\u003eOperational visibility refinements.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSeveral posts implied a multi-operator environment through references to workers, statistics dashboards, management visibility, loader monitoring, and log categorization. The article says this aligns with broader MaaS trends where malware developers increasingly separate development, infrastructure, delivery, and monetization into specialized roles.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main conclusion is that REMUS illustrates how modern infostealer operations are evolving beyond simple credential theft. Over a few months, Flare’s analysis observed a transition from basic malware promotion to a structured MaaS ecosystem focused on operational reliability, session persistence, and scalable data collection.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights the growing importance of authenticated sessions and browser-side authentication artifacts in the underground economy. Repeated references to token restoration, proxy-assisted session recovery, and password-manager-related collection show a shift away from only stealing passwords and toward maintaining direct access to already authenticated environments.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that infostealers are becoming mature operational platforms that support persistence, automation, and long-term monetization workflows. It also states that understanding how threat actors operationalize and commercialize malware may become just as important as analyzing the malware itself.\u003c/p\u003e\n","keyPoints":["Flare researchers analyzed 128 posts linked to the REMUS underground operation between February 12 and May 8, 2026.","REMUS was promoted as an actively maintained malware-as-a-service platform with feature updates, operational refinements, customer support, and log management capabilities.","The REMUS operation increasingly emphasized session theft through cookie collection, token handling, browser sessions, proxy-assisted restoration, and authenticated access continuity.","By April 2026, the REMUS operator advertised collection related to Bitwarden, 1Password, LastPass, and IndexedDB browser storage.","The analyzed posts show REMUS evolving from basic malware promotion into a structured MaaS ecosystem focused on operational reliability, session persistence, and scalable data collection."],"insights":["REMUS development prioritized operator usability and campaign management features, such as worker tracking, statistics pages, duplicate-log filtering, loader execution visibility, and Telegram delivery workflows, not only data theft capabilities.","The operator’s repeated focus on restore workflows, SOCKS5 proxy support, and multiple proxy types shows that preserving and reusing authenticated sessions was treated as a core product feature.","REMUS’s advertised password-manager targeting did not prove vault decryption, but it showed a move toward collecting browser-side storage associated with password-management extensions such as 1Password, LastPass, and Bitwarden.","The campaign’s timeline shows a rapid shift from aggressive feature expansion in March and April 2026 to bug fixes, restore improvements, and collection optimizations by early May, indicating a move toward platform stabilization."],"referencedReports":[{"title":"REMUS: Unpacking the 64-bit Evolution of the Lumma Stealer","url":"https://socprime.com/active-threats/remus-unpacking-the-64-bit-evolution-of-the-lumma-stealer/","publisher":"SOC Prime","context":"The article cites this public reporting as technical analysis describing REMUS as a 64-bit infostealer with similarities to Lumma Stealer, including anti-VM checks and browser-focused credential theft."}],"body":"\u003cp\u003eFlare researchers analyzed 128 posts linked to the REMUS underground operation between February 12 and May 8, 2026. The article says REMUS emerged in recent months as a new infostealer malware and has drawn attention from security researchers and malware analysts. The analysis focuses less on the malware’s code alone and more on how the underground operation presented, developed, and commercialized it.\u003c/p\u003e\n\n\u003cp\u003eThe article describes REMUS as rapidly evolving from basic stealer promotion into an actively maintained malware-as-a-service platform. Early posts promoted browser credential theft, cookie collection, Discord token theft, Telegram delivery, and log management, while later updates added restore-token functionality, worker tracking, statistics pages, proxy support, and password-manager-related collection. The operation’s repeated updates, support claims, and operational tooling are presented as evidence that modern MaaS operations increasingly resemble structured software businesses.\u003c/p\u003e\n\n\u003cp\u003eA major theme is REMUS’s shift toward session theft rather than traditional credential theft alone. The article highlights cookie collection, token handling, browser sessions, proxy-assisted restoration, and authenticated access continuity as central features. It also notes advertised collection related to Bitwarden, 1Password, LastPass, and IndexedDB browser storage, while stating that the posts do not prove successful vault decryption or direct password-manager compromise.\u003c/p\u003e\n"},{"n":6,"title":"Microsoft to automatically roll back faulty Windows drivers","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-to-automatically-roll-back-faulty-windows-drivers/","time":"12:29","priority":"MAY READ","score":68,"tldr":"Microsoft is adding Cloud-Initiated Driver Recovery so it can remotely roll back faulty Windows drivers delivered through Windows Update without requiring hardware partners or users to intervene. The feature is being tested through August and is expected to start rolling back rejected drivers in September 2026.","briefOverview":"\u003cp\u003eMicrosoft is introducing Cloud-Initiated Driver Recovery, a Windows Update capability that lets Microsoft remotely roll back problematic Windows drivers. The feature is intended to address drivers that have already been distributed but are later rejected due to quality issues during shiproom evaluation. Microsoft says the recovery process will be handled entirely by Microsoft and will not require action from hardware partners or end users.\u003c/p\u003e\n\n\u003cp\u003eUnder the current process, a faulty driver distributed through Windows Update may remain on devices until a hardware partner submits an updated driver or a user manually uninstalls it. Cloud-Initiated Driver Recovery changes that by allowing Microsoft to roll back the driver to a previously known-good version or the next best available version through Windows Update. The capability uses existing Windows Update infrastructure, coordinated updates to the PnP driver stack, and driver flighting and publishing services.\u003c/p\u003e\n\n\u003cp\u003eThe feature is being tested between May and August and is expected to begin rolling back drivers rejected during Flighting or Gradual Rollout starting in September 2026. Microsoft also recently announced a Driver Quality Initiative at WinHEC 2026 to improve driver quality, reliability, and security across the Windows ecosystem. The company previously said it would periodically remove legacy drivers from the Windows Update catalog to reduce compatibility and security risks.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft is adding a new Windows Update capability called Cloud-Initiated Driver Recovery to remotely roll back faulty Windows drivers. The feature is designed for problematic drivers delivered through Windows Update that are rejected due to quality issues during shiproom evaluation. Microsoft says the remediation process will be fully managed by Microsoft, without requiring hardware partners or end users to take manual action.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that the current driver remediation model can leave devices on low-quality drivers for extended periods. Today, a hardware partner must submit a replacement driver, or users must manually uninstall the problematic driver themselves. Microsoft describes this as a gap in which affected devices may remain on a subpar driver after distribution.\u003c/p\u003e\n\n\u003cp\u003eWith Cloud-Initiated Driver Recovery, Microsoft can trigger a rollback from the Hardware Dev Center Driver Shiproom. The rollback sends devices back to a previously known-good driver version through the Windows Update pipeline, or to the next best version available on Windows Update. Microsoft says this is handled through coordinated updates to the PnP driver stack and the driver flighting and publishing services.\u003c/p\u003e\n\n\u003cp\u003eThe capability will not attempt recovery on devices where a Driver Shiproom-approved driver cannot be located. Microsoft also states that recovery is delivered through existing Windows Update infrastructure, so no new client agent or partner tooling is required. The feature is being tested from May through August and is scheduled to start rolling back drivers rejected during Flighting or Gradual Rollout in September 2026.\u003c/p\u003e\n\n\u003cp\u003eThe affected parties include Microsoft, hardware partners, end users, and the broader Windows hardware ecosystem. The article does not describe any threat actors, exploitation activity, malware, or vulnerability identifiers. It frames the change as part of Microsoft’s broader effort to improve Windows reliability, security, performance, compatibility, and quality.\u003c/p\u003e\n\n\u003cp\u003eThe article also connects the feature to Microsoft’s Driver Quality Initiative, introduced at WinHEC 2026 in Taipei. That initiative aims to raise driver quality, reliability, and security in coordination with OEMs, silicon partners, IHVs, ODMs, and hardware partners. Microsoft also previously announced plans in June 2025 to periodically remove legacy drivers from the Windows Update catalog to reduce compatibility issues and security risks.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft is introducing Cloud-Initiated Driver Recovery, a Windows Update capability that allows Microsoft to remotely roll back problematic Windows drivers. The feature targets drivers distributed through Windows Update that are later rejected due to quality issues during shiproom evaluation. Microsoft says the process is managed entirely by Microsoft and does not require hardware partners or end users to manually remediate the issue.\u003c/p\u003e\n\n\u003cp\u003eThe main significance of the feature is that Microsoft can directly trigger driver recovery through the Windows Update pipeline. Under the current process, remediation depends on a hardware partner submitting a replacement driver or on users manually uninstalling the faulty driver. Microsoft says that approach can leave devices using a low-quality driver for an extended period.\u003c/p\u003e\n\n\u003ch2 id=\"current-remediation-gap\"\u003eCurrent Remediation Gap\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft describes the existing remediation process as partner- or user-dependent. When a driver published through Windows Update is later found to have quality issues, the hardware partner must submit an updated driver, or end users must remove the problematic driver themselves. The article states that this creates a gap in which affected devices may remain on a low-quality driver.\u003c/p\u003e\n\n\u003cp\u003eCloud-Initiated Driver Recovery is intended to close that gap by letting Microsoft initiate the rollback action itself. This changes the recovery flow from a process requiring partner submission or user action to one controlled through Microsoft’s Windows Update infrastructure.\u003c/p\u003e\n\n\u003ch2 id=\"how-cloud-initiated-driver-recovery-works\"\u003eHow Cloud-Initiated Driver Recovery Works\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft can trigger the recovery action directly from the Hardware Dev Center Driver Shiproom. The rollback moves a problematic driver to a previously known-good version through the Windows Update pipeline. If that driver version is not available, Microsoft says the system can use the next best version available on Windows Update.\u003c/p\u003e\n\n\u003cp\u003eThe article says the feature is handled through coordinated updates to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe PnP driver stack.\u003c/li\u003e\n\u003cli\u003eDriver flighting services.\u003c/li\u003e\n\u003cli\u003eDriver publishing services.\u003c/li\u003e\n\u003cli\u003eThe existing Windows Update infrastructure.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft states that no new client agent or partner tooling is required. This means the feature is delivered through mechanisms already used by Windows Update rather than through a separate remediation tool.\u003c/p\u003e\n\n\u003ch2 id=\"scope-and-limitations\"\u003eScope and Limitations\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Cloud-Initiated Driver Recovery will only be initiated for Windows drivers rejected due to quality issues during shiproom evaluation. It also notes that devices where a Driver Shiproom-approved driver cannot be located will not attempt Cloud-Initiated Driver Recovery.\u003c/p\u003e\n\n\u003cp\u003eThe rollout described in the article is tied to drivers rejected during Flighting or Gradual Rollout. Microsoft says the feature is being tested between May and August and will begin rolling back drivers rejected during those stages starting in September 2026.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties\"\u003eAffected Parties\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several groups affected by or involved in this driver-quality process:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft, which will manage the recovery action.\u003c/li\u003e\n\u003cli\u003eHardware partners, who currently must submit replacement drivers under the existing process.\u003c/li\u003e\n\u003cli\u003eEnd users, who currently may need to manually uninstall a problematic driver.\u003c/li\u003e\n\u003cli\u003eOEMs, silicon partners, IHVs, ODMs, and the broader Windows hardware ecosystem, which are referenced in connection with Microsoft’s driver-quality initiatives.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe feature reduces the need for hardware partners or users to manually act after a problematic driver has already been distributed. However, the article does not state that partners are removed from the broader driver development or quality process.\u003c/p\u003e\n\n\u003ch2 id=\"security-and-quality-context\"\u003eSecurity and Quality Context\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft presented Cloud-Initiated Driver Recovery in the context of reliability, quality, and security improvements for Windows drivers. The article also references Microsoft’s Driver Quality Initiative, unveiled at WinHEC 2026 in Taipei. Microsoft said that initiative is intended to improve driver quality, reliability, and security across the Windows ecosystem in coordination with OEM, silicon, and hardware partners.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also said it will continue investing in reliability, security, performance, compatibility, and quality. The company connected this work to the Windows Resiliency Initiative, the new Driver Quality Initiative, and ongoing collaboration with the hardware ecosystem.\u003c/p\u003e\n\n\u003ch2 id=\"related-microsoft-driver-actions\"\u003eRelated Microsoft Driver Actions\u003c/h2\u003e\n\n\u003cp\u003eThe article also notes that Microsoft announced in June 2025 that it planned to periodically remove legacy drivers from the Windows Update catalog. That effort was described as a way to mitigate compatibility issues and security risks. Together with Cloud-Initiated Driver Recovery and the Driver Quality Initiative, the article presents this as part of a broader driver quality and resiliency effort.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-response\"\u003eDisclosed Impact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe disclosed impact is operational and quality-related: devices may currently remain on low-quality drivers for extended periods if remediation depends on partner updates or manual user action. Microsoft’s response is to create a centralized recovery capability that can roll back problematic drivers through Windows Update.\u003c/p\u003e\n\n\u003cp\u003eThe article does not describe exploitation, malware, vulnerabilities, CVEs, threat actors, or active attacks. It focuses on Microsoft’s driver recovery process, its testing and rollout timeline, and the company’s broader driver-quality initiatives.\u003c/p\u003e\n","keyPoints":["Microsoft is introducing Cloud-Initiated Driver Recovery to remotely roll back problematic Windows drivers delivered through Windows Update.","The recovery process will be managed entirely by Microsoft and will not require hardware partners or end users to manually fix driver issues.","Cloud-Initiated Driver Recovery can roll back a problematic driver to a previous stable version or the next best version available on Windows Update.","Devices where a Driver Shiproom-approved driver cannot be located will not attempt Cloud-Initiated Driver Recovery.","The feature is being tested between May and August and will begin rolling back drivers rejected during Flighting or Gradual Rollout starting September 2026."],"insights":["Microsoft is shifting driver remediation authority from hardware partners to its own Windows Update pipeline, reducing the time devices may remain on low-quality drivers after distribution.","The feature is limited to drivers rejected for quality issues during shiproom evaluation, Flighting, or Gradual Rollout, so it is not described as a general-purpose rollback mechanism for all faulty drivers.","Organizations will not need to deploy a new agent or partner tooling because recovery uses existing Windows Update infrastructure.","Cloud-Initiated Driver Recovery is part of a broader driver-quality push that also includes the Driver Quality Initiative and Microsoft’s plan to periodically remove legacy drivers from the Windows Update catalog."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft is introducing Cloud-Initiated Driver Recovery, a Windows Update capability that lets Microsoft remotely roll back problematic Windows drivers. The feature is intended to address drivers that have already been distributed but are later rejected due to quality issues during shiproom evaluation. Microsoft says the recovery process will be handled entirely by Microsoft and will not require action from hardware partners or end users.\u003c/p\u003e\n\n\u003cp\u003eUnder the current process, a faulty driver distributed through Windows Update may remain on devices until a hardware partner submits an updated driver or a user manually uninstalls it. Cloud-Initiated Driver Recovery changes that by allowing Microsoft to roll back the driver to a previously known-good version or the next best available version through Windows Update. The capability uses existing Windows Update infrastructure, coordinated updates to the PnP driver stack, and driver flighting and publishing services.\u003c/p\u003e\n\n\u003cp\u003eThe feature is being tested between May and August and is expected to begin rolling back drivers rejected during Flighting or Gradual Rollout starting in September 2026. Microsoft also recently announced a Driver Quality Initiative at WinHEC 2026 to improve driver quality, reliability, and security across the Windows ecosystem. The company previously said it would periodically remove legacy drivers from the Windows Update catalog to reduce compatibility and security risks.\u003c/p\u003e\n"},{"n":11,"title":"What 45 Days of Watching Your Own Tools Will Tell You About Your Real Attack Surface","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/what-45-days-of-watching-your-own-tools.html","time":"11:00","priority":"MAY READ","score":55,"tldr":"Bitdefender argues that many organizations’ real attack surface comes from trusted admin tools like PowerShell and Certutil being overused or over-permissioned, not just malware. Its free 45-day Internal Attack Surface Assessment identifies which users, endpoints, and legitimate tools can be restricted to reduce attacker options without disrupting business.","briefOverview":"\u003cp\u003eBitdefender’s article argues that a major security risk inside organizations comes from trusted administrative utilities rather than traditional malware. Tools such as PowerShell, WMIC, netsh, Certutil, and MSBuild are used by IT teams but are also commonly abused by modern threat actors. Bitdefender says its analysis of 700,000 high-severity incidents found legitimate-tool abuse in 84% of them.\u003c/p\u003e\n\n\u003cp\u003eThe article presents Bitdefender’s complimentary Internal Attack Surface Assessment as a 45-day engagement for organizations with 250 or more employees. The assessment uses GravityZone PHASR to learn endpoint and user behavior, score exposure, identify risky tools and users, and optionally apply controls. The goal is to reduce attackers’ ability to use living-off-the-land binaries and other existing tools without disrupting business operations.\u003c/p\u003e\n\n\u003cp\u003eThe assessment focuses on five categories: living-off-the-land binaries, remote admin tools, tampering tools, cryptominers, and piracy tools. Bitdefender says early-access customers reduced attack surface by 30% or more in the first 30 days, with one reporting close to 70% reduction by locking down LOLBins and remote tools. The article frames this as a practical way to reduce what attackers can reach after compromise.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article argues that many organizations’ most dangerous internal activity now resembles normal administration rather than overt attacks. It highlights tools such as PowerShell, WMIC, netsh, Certutil, and MSBuild as trusted utilities used by IT teams and threat actors alike. Bitdefender says legitimate-tool abuse appeared in 84% of 700,000 high-severity incidents it analyzed.\u003c/p\u003e\n\n\u003cp\u003eBitdefender positions this issue as an over-entitlement problem rather than a malware problem. The article states that a clean Windows 11 install includes 133 unique living-off-the-land binaries across 987 instances. It also says Bitdefender Labs telemetry found PowerShell active on 73% of endpoints, much of it invoked silently by third-party applications.\u003c/p\u003e\n\n\u003cp\u003eThe article introduces Bitdefender’s complimentary Internal Attack Surface Assessment, available to organizations with 250 or more employees. The 45-day engagement is designed to turn the broad risk of living-off-the-land abuse into a prioritized list of users, endpoints, and tools that can be restricted safely. It is powered by GravityZone PHASR and is described as running alongside an organization’s existing endpoint stack.\u003c/p\u003e\n\n\u003cp\u003eThe assessment process includes behavioral learning, dashboard review, an optional reduction sprint, and a final reduction review. PHASR builds behavioral profiles for each machine-user pair, typically over 30 days, and then provides an exposure score from 0 to 100. Findings are prioritized across living-off-the-land binaries, remote admin tools, tampering tools, cryptominers, and piracy tools.\u003c/p\u003e\n\n\u003cp\u003eThe article says organizations can manually apply controls or use PHASR’s Autopilot to enforce them, while users can request access back through a one-click approval workflow. Bitdefender says early-access customers reduced attack surface by 30% or more in the first 30 days, and one reported close to 70% reduction by locking down LOLBins and remote tools. The article presents these reductions as beneficial for CISOs, SOC and IT administrators, and business decision-makers.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that the most dangerous activity inside many organizations no longer necessarily looks like malware or an obvious attack. Instead, it often looks like ordinary administration performed with trusted utilities. Bitdefender names PowerShell, WMIC, netsh, Certutil, and MSBuild as examples of legitimate tools used by IT teams that are also favored by modern threat actors.\u003c/p\u003e\n\n\u003cp\u003eThe central message is that organizations need to understand and reduce the internal tools and permissions attackers can abuse once they are inside an environment. The article presents Bitdefender’s complimentary \u003cstrong\u003eInternal Attack Surface Assessment\u003c/strong\u003e as a way to identify those risks over roughly 45 days. The assessment is aimed at organizations with 250 or more employees.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-article-says-this-matters\"\u003eWhy the Article Says This Matters\u003c/h2\u003e\n\n\u003cp\u003eBitdefender says its analysis of 700,000 high-severity incidents found legitimate-tool abuse in \u003cstrong\u003e84%\u003c/strong\u003e of them. The article frames this as evidence that trusted utilities have become a major part of real-world attack activity. It argues that this is not primarily a malware problem, but an over-entitlement problem.\u003c/p\u003e\n\n\u003cp\u003eThe article provides two technical indicators of the scale of the issue:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA clean Windows 11 install includes \u003cstrong\u003e133 unique living-off-the-land binaries\u003c/strong\u003e across \u003cstrong\u003e987 instances\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eBitdefender Labs telemetry found \u003cstrong\u003ePowerShell active on 73% of endpoints\u0
