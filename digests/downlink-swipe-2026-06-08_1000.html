<script>
window.__DL_ARTICLES = [{"n":3,"title":"Check Point links VPN zero-day attacks to Qilin ransomware gang","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/check-point-links-vpn-zero-day-attacks-to-qilin-ransomware-gang/","time":"13:05","priority":"MUST READ","score":95,"tldr":"Check Point patched a critical zero-day authentication bypass in certain Remote Access VPN and Mobile Access deployments using deprecated IKEv1 after limited real-world exploitation, including activity tied to a Qilin ransomware affiliate. Customers should apply updates immediately or disable legacy IKEv1 configurations and require stronger certificate-based authentication.","briefOverview":"\u003cp\u003eCheck Point released security updates for a critical flaw affecting Remote Access VPN and Mobile Access deployments that was exploited in zero-day attacks. The vulnerability, tracked as CVE-2026-50751, can let unauthenticated remote attackers bypass authentication and establish a remote access VPN connection. Check Point said exploitation began on May 7, surged in early June, and affected only a few dozen organizations worldwide.\u003c/p\u003e\n\n\u003cp\u003eThe flaw affects only deployments configured to use the deprecated IKEv1 key exchange protocol, with security gateways that accept legacy Remote Access clients and do not require a machine certificate for connections. Check Point linked at least one incident to post-compromise activity associated with a Qilin ransomware affiliate. The company urged customers using IKEv1 to apply security updates immediately or use mitigation measures if they cannot patch right away.\u003c/p\u003e\n\n\u003cp\u003eDuring its investigation, Check Point also found CVE-2026-50752, a certificate validation issue in deprecated IKEv1 that could be exploited in man-in-the-middle attacks on site-to-site VPN connections. Check Point said it has not found evidence that CVE-2026-50752 has been exploited in the wild. The article also notes that Qilin has claimed nearly 400 victims since surfacing in August 2022 under the Agenda name.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCheck Point released security updates for CVE-2026-50751, a critical vulnerability affecting Remote Access VPN and Mobile Access deployments. The flaw was exploited in zero-day attacks and can be used by unauthenticated remote attackers to bypass authentication. Successful exploitation can allow attackers to establish a remote access VPN connection on targeted Mobile Access or SSL VPNs, Remote Access VPNs, or Spark firewalls.\u003c/p\u003e\n\n\u003cp\u003eCheck Point said the vulnerability affects only specific configurations. Affected deployments use the deprecated IKEv1 key exchange protocol, accept legacy Remote Access clients, and do not require a machine certificate for connections. The company said customers using IKEv1 should apply the available security updates immediately.\u003c/p\u003e\n\n\u003cp\u003eThe observed exploitation began on May 7 and surged in early June. Check Point said the activity has been limited to a few dozen targeted organizations globally. At least one case involved confirmed post-compromise activity associated with a Qilin ransomware affiliate.\u003c/p\u003e\n\n\u003cp\u003eFor customers that cannot immediately patch vulnerable systems, Check Point shared mitigation measures. These include removing support for the legacy remote access client, configuring Remote Access VPN Authentication global properties to use IKEv2 only, making Machine Certificate Authentication mandatory, and enabling IPS with downloaded signatures. The company framed these steps as interim measures for reducing exposure.\u003c/p\u003e\n\n\u003cp\u003eWhile investigating CVE-2026-50751, Check Point also found CVE-2026-50752. This second vulnerability affects certificate validation in deprecated IKEv1 key exchange and could be exploited in man-in-the-middle attacks on site-to-site VPN connections. Check Point said it has not found evidence of CVE-2026-50752 exploitation in the wild, but advised customers to apply updates.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies Qilin as a Ransomware-as-a-Service operation that surfaced in August 2022 under the Agenda name. It says Qilin has claimed responsibility for nearly 400 victims on its dark web leak site. Named victims listed in the article include Yangfeng, Nissan, Asahi, Lee Enterprises, Synnovis, and Australia’s Court Services Victoria.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCheck Point released security updates to address a critical flaw affecting Remote Access VPN and Mobile Access deployments. The vulnerability, tracked as CVE-2026-50751, was exploited in zero-day attacks. The flaw can allow unauthenticated remote attackers to bypass authentication on targeted Mobile Access or SSL VPNs, Remote Access VPNs, or Spark firewalls and establish a remote access VPN connection.\u003c/p\u003e\n\n\u003cp\u003eCheck Point said the attacks began on May 7 and surged in early June. The company described the observed exploitation as limited to a few dozen targeted organizations globally. At least one incident included confirmed post-compromise activity associated with a Qilin ransomware affiliate.\u003c/p\u003e\n\n\u003ch2 id=\"cve-2026-50751-technical-scope\"\u003eCVE-2026-50751 technical scope\u003c/h2\u003e\n\n\u003cp\u003eCVE-2026-50751 affects a narrow set of configurations. According to Check Point, the flaw affects only deployments configured to use the deprecated IKEv1 key exchange protocol. The affected security gateways also accept legacy Remote Access clients and do not require a machine certificate for connections.\u003c/p\u003e\n\n\u003cp\u003eThe core impact described in the article is authentication bypass. An unauthenticated remote attacker can exploit the flaw to establish a remote access VPN connection. The affected deployment types named in the article are Mobile Access or SSL VPNs, Remote Access VPNs, and Spark firewalls.\u003c/p\u003e\n\n\u003ch2 id=\"exploitation-and-impact\"\u003eExploitation and impact\u003c/h2\u003e\n\n\u003cp\u003eCheck Point identified active exploitation of CVE-2026-50751. The exploitation was described as affecting only a few dozen targeted organizations worldwide. The article states that one case involved confirmed post-compromise activity associated with a Qilin ransomware affiliate.\u003c/p\u003e\n\n\u003cp\u003eThe article does not provide details about the affected organizations in the CVE-2026-50751 incidents. It also does not describe the specific actions taken after compromise beyond the association with Qilin ransomware affiliate activity. The known timeline given is that attacks started on May 7 and increased in early June.\u003c/p\u003e\n\n\u003ch2 id=\"check-point-response-and-mitigations\"\u003eCheck Point response and mitigations\u003c/h2\u003e\n\n\u003cp\u003eCheck Point released security updates for the vulnerability and urged customers using IKEv1 to apply them immediately. The company also provided mitigation steps for customers that cannot immediately patch vulnerable systems.\u003c/p\u003e\n\n\u003cp\u003eThe mitigation measures listed in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRemove support for the legacy remote access client.\u003c/li\u003e\n\u003cli\u003eConfigure global properties for Remote Access VPN Authentication to IKEv2 only.\u003c/li\u003e\n\u003cli\u003eMake Machine Certificate Authentication mandatory.\u003c/li\u003e\n\u003cli\u003eEnable IPS and download the signatures.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese mitigations are specifically described as measures for customers who cannot immediately patch vulnerable systems. The article frames the updates as the primary response to the vulnerability.\u003c/p\u003e\n\n\u003ch2 id=\"second-vulnerability-cve-2026-50752\"\u003eSecond vulnerability: CVE-2026-50752\u003c/h2\u003e\n\n\u003cp\u003eDuring its investigation of CVE-2026-50751, Check Point found a second vulnerability tracked as CVE-2026-50752. This issue affects certificate validation in the deprecated IKEv1 key exchange protocol. The article states that it can be exploited in man-in-the-middle attacks on site-to-site VPN connections.\u003c/p\u003e\n\n\u003cp\u003eCheck Point said it has not found evidence that CVE-2026-50752 has been exploited in the wild. Even so, the company advised customers to apply updates to mitigate potential exposure. The second vulnerability is presented as separate from the actively exploited authentication bypass issue.\u003c/p\u003e\n\n\u003ch2 id=\"qilin-ransomware-context\"\u003eQilin ransomware context\u003c/h2\u003e\n\n\u003cp\u003eThe article links at least one CVE-2026-50751-related incident to post-compromise activity associated with a Qilin ransomware affiliate. Qilin is described as a Ransomware-as-a-Service operation that surfaced in August 2022 under the name Agenda. The article says Qilin has claimed responsibility for nearly 400 victims on its dark web leak site.\u003c/p\u003e\n\n\u003cp\u003eThe article also lists several high-profile organizations previously claimed or associated with Qilin activity. These include automotive giant Yangfeng, Nissan, Japanese beer company Asahi, publishing giant Lee Enterprises, pathology services provider Synnovis, and Australia’s Court Services Victoria.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey takeaways\u003c/h2\u003e\n\n\u003cp\u003eThe most important issue is the active exploitation of CVE-2026-50751 against certain Check Point Remote Access VPN and Mobile Access deployments. The risk is tied to deprecated IKEv1 configurations that accept legacy Remote Access clients and do not require machine certificates. Check Point has released patches and also outlined configuration mitigations for customers that cannot immediately update.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights a related concern around deprecated IKEv1 through the disclosure of CVE-2026-50752. Although that second vulnerability has not been observed in the wild, Check Point found it during the investigation and advised customers to update. The confirmed connection of at least one incident to Qilin affiliate activity adds ransomware significance to the exploitation campaign.\u003c/p\u003e\n","keyPoints":["Check Point released security updates for CVE-2026-50751, a critical flaw affecting Remote Access VPN and Mobile Access deployments that was exploited in zero-day attacks.","CVE-2026-50751 allows unauthenticated remote attackers to bypass authentication on targeted Mobile Access or SSL VPNs, Remote Access VPNs, or Spark firewalls and establish a remote access VPN connection.","The vulnerability affects only deployments using the deprecated IKEv1 key exchange protocol with security gateways that accept legacy Remote Access clients and do not require a machine certificate for connections.","Check Point said exploitation began on May 7, surged in early June, affected only a few dozen organizations worldwide, and included at least one incident linked to the Qilin ransomware operation.","Check Point also disclosed CVE-2026-50752, a certificate validation vulnerability in deprecated IKEv1 that could be exploited in man-in-the-middle attacks on site-to-site VPN connections, but said it has not found evidence of in-the-wild exploitation."],"insights":["The exploitability of CVE-2026-50751 is narrowed to a specific legacy configuration: deprecated IKEv1, acceptance of legacy Remote Access clients, and no mandatory machine certificate.","Organizations that cannot patch immediately have several configuration-based mitigations available, including disabling legacy Remote Access client support, enforcing IKEv2 only, requiring machine certificate authentication, and enabling IPS signatures.","Check Point’s investigation of the exploited authentication bypass also uncovered a separate IKEv1 certificate validation flaw, CVE-2026-50752, showing that the deprecated protocol presents more than one security exposure.","The observed campaign was limited in scale but high in impact, with only a few dozen organizations affected globally and at least one case involving confirmed Qilin ransomware affiliate activity after compromise."],"referencedReports":[{"title":"CVE-2026-50751","url":"https://support.checkpoint.com/results/sk/sk185033","publisher":"Check Point","context":"The article links Check Point's advisory for CVE-2026-50751, the critical authentication bypass flaw exploited in zero-day attacks.","category":"","primary":false},{"title":"Check Point Releases Important Hotfix for Vulnerabilities in Deprecated IKEv1 VPN Protocol","url":"https://blog.checkpoint.com/security/check-point-releases-important-hotfix-for-vulnerabilities-in-deprecated-ikev1-vpn-protocol/","publisher":"Check Point","context":"The article cites Check Point's warning about active exploitation of CVE-2026-50751 and its hotfix guidance for affected customers.","category":"","primary":false},{"title":"CVE-2026-50752","url":"https://support.checkpoint.com/results/sk/sk185035","publisher":"Check Point","context":"The article links Check Point's advisory for CVE-2026-50752, a certificate validation issue in deprecated IKEv1 that could enable man-in-the-middle attacks.","category":"","primary":false}],"body":"\u003cp\u003eCheck Point released security updates for a critical flaw affecting Remote Access VPN and Mobile Access deployments that was exploited in zero-day attacks. The vulnerability, tracked as CVE-2026-50751, can let unauthenticated remote attackers bypass authentication and establish a remote access VPN connection. Check Point said exploitation began on May 7, surged in early June, and affected only a few dozen organizations worldwide.\u003c/p\u003e\n\n\u003cp\u003eThe flaw affects only deployments configured to use the deprecated IKEv1 key exchange protocol, with security gateways that accept legacy Remote Access clients and do not require a machine certificate for connections. Check Point linked at least one incident to post-compromise activity associated with a Qilin ransomware affiliate. The company urged customers using IKEv1 to apply security updates immediately or use mitigation measures if they cannot patch right away.\u003c/p\u003e\n\n\u003cp\u003eDuring its investigation, Check Point also found CVE-2026-50752, a certificate validation issue in deprecated IKEv1 that could be exploited in man-in-the-middle attacks on site-to-site VPN connections. Check Point said it has not found evidence that CVE-2026-50752 has been exploited in the wild. The article also notes that Qilin has claimed nearly 400 victims since surfacing in August 2022 under the Agenda name.\u003c/p\u003e\n"},{"n":5,"title":"VerdantBamboo Deploys BSD Variant of BRICKSTORM on Linux Appliances","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/verdantbamboo-deploys-bsd-variant-of.html","time":"10:27","priority":"MUST READ","score":92,"tldr":"China-linked VerdantBamboo compromised Linux and BSD-based appliances, including Egnyte Storage Sync, pfSense, and Synology NAS, using BRICKSTORM, PLENET, and AGENTPSD to maintain stealthy access and pivot into Microsoft 365. The campaign highlights the group’s focus on edge and storage devices that often lack EDR coverage, using MSP compromise and stolen credentials to evade defenses.","briefOverview":"\u003cp\u003eVolexity reported that a China-nexus cyber espionage cluster it tracks as VerdantBamboo deployed a BSD variant of BRICKSTORM, along with PLENET and AGENTPSD, against Linux and BSD-based appliances. The activity overlaps with groups tracked by other vendors as Clay Typhoon, UNC5221, and Warp Panda. The intrusion was discovered during a September 2025 incident response engagement involving an unnamed victim.\u003c/p\u003e\n\n\u003cp\u003eThe victim’s Egnyte Storage Sync system was compromised through a local privilege escalation flaw and used to deploy BRICKSTORM. Volexity said the attackers used BRICKSTORM’s proxying capabilities, together with compromised credentials, to access the victim’s Microsoft 365 environment. The article says these steps were assessed as efforts to blend in with legitimate traffic and evade Conditional Access policies.\u003c/p\u003e\n\n\u003cp\u003eAfter remediation, VerdantBamboo returned by using stolen administrative credentials to access the firewall, configure web SSL VPN access, and deploy additional malware to a Synology NAS appliance. Investigators also found that the victim’s managed services provider had been compromised and that its pfSense firewall had been infected with a BSD variant of BRICKSTORM. Volexity characterized the actor as sophisticated, with knowledge of proprietary appliances and customized persistence mechanisms.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA China-nexus cyber espionage group tracked by Volexity as VerdantBamboo has been observed deploying a BSD variant of BRICKSTORM and two other malware families, PLENET and AGENTPSD, to target Linux systems. Volexity said VerdantBamboo overlaps with groups known as Clay Typhoon, UNC5221, and Warp Panda. The activity was uncovered during a September 2025 incident response engagement.\u003c/p\u003e\n\n\u003cp\u003eThe initial case involved an unnamed victim’s Egnyte Storage Sync system, which the adversary compromised by exploiting a local privilege escalation flaw to deploy BRICKSTORM. The issue was addressed in Egnyte Storage Sync version 13.13, released in March 2026. Volexity said the appliance had periodically been accessed by VerdantBamboo through IP addresses assigned via the victim organization’s web SSL VPN.\u003c/p\u003e\n\n\u003cp\u003eAccording to Volexity, the attackers used BRICKSTORM’s proxying capabilities on the Storage Sync system and compromised credentials to access the victim’s Microsoft 365 environment. The article says these steps were assessed as a way to blend into legitimate network traffic and evade Conditional Access policies. The initial compromise is believed to have occurred at least 18 months before it was discovered.\u003c/p\u003e\n\n\u003cp\u003eFollowing initial remediation, VerdantBamboo returned to the same organization using stolen administrative credentials to connect to the firewall. The attackers then abused that access to configure web SSL VPN access to the device, connect to other systems, and deploy additional malware to a Synology Network Attached Storage appliance. The malware deployed over SSH to the NAS appliance included PLENET and AGENTPSD.\u003c/p\u003e\n\n\u003cp\u003eFurther investigation found that the threat actor had compromised the victim organization’s managed services provider and infected the MSP’s pfSense firewall with a BSD variant of BRICKSTORM. Volexity believes the victim was compromised through the breach of the MSP. The company said the actor combines living-off-the-land techniques with malware deployment on systems that traditionally do not or cannot run EDR software.\u003c/p\u003e\n\n\u003cp\u003ePLENET, also known as GRIMBOLT, is described as a cross-platform .NET Core backdoor and a new version of BRICKSTORM compiled using native ahead-of-time compilation. It supports interactive shell, remote command execution, file manipulation, and command-and-control server switching. AGENTPSD is described as a Python-based reverse shell that likely serves as a fallback if the primary implant stops functioning.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eVolexity reported activity by a China-nexus cyber espionage threat cluster it tracks as VerdantBamboo. The group was observed deploying a BSD variant of the BRICKSTORM backdoor, along with two other malware families called PLENET and AGENTPSD, to target Linux systems.\u003c/p\u003e\n\n\u003cp\u003eThe article says VerdantBamboo overlaps with groups tracked by other security vendors as Clay Typhoon by Microsoft, UNC5221 by Google, and Warp Panda by CrowdStrike. Volexity discovered the activity during an incident response engagement in September 2025.\u003c/p\u003e\n\n\u003ch2 id=\"initial-discovery-and-victim-environment\"\u003eInitial Discovery and Victim Environment\u003c/h2\u003e\n\n\u003cp\u003eThe investigation began after Volexity found that VerdantBamboo had compromised an unnamed victim’s Egnyte Storage Sync system. The attackers exploited a local privilege escalation flaw to deploy BRICKSTORM on the appliance.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the issue was addressed in Egnyte Storage Sync version 13.13, which was released in March 2026. Volexity said the appliance had periodically been accessed by VerdantBamboo through IP addresses assigned via the victim organization’s web SSL VPN.\u003c/p\u003e\n\n\u003ch2 id=\"use-of-brickstorm-and-microsoft-365-access\"\u003eUse of BRICKSTORM and Microsoft 365 Access\u003c/h2\u003e\n\n\u003cp\u003eVolexity said the threat actor used BRICKSTORM’s proxying capabilities on the Storage Sync system, together with compromised credentials, to access the victim’s Microsoft 365 environment. The article says these actions were assessed as an effort to blend in with legitimate network traffic and evade Conditional Access policies.\u003c/p\u003e\n\n\u003cp\u003eThe initial compromise is described as having occurred at least 18 months before discovery. This indicates the intrusion had persisted for a significant period before the September 2025 incident response engagement.\u003c/p\u003e\n\n\u003ch2 id=\"return-after-remediation\"\u003eReturn After Remediation\u003c/h2\u003e\n\n\u003cp\u003eAfter initial remediation, VerdantBamboo returned to the same organization. The group used stolen administrative credentials to connect to the firewall.\u003c/p\u003e\n\n\u003cp\u003eThe attackers then abused that access to configure web SSL VPN access to the device, connect to other systems, and deploy additional malware to a Synology Network Attached Storage appliance. The malware deployment to the NAS appliance occurred over SSH.\u003c/p\u003e\n\n\u003ch2 id=\"managed-services-provider-compromise\"\u003eManaged Services Provider Compromise\u003c/h2\u003e\n\n\u003cp\u003eFurther investigation found that the threat actor had also compromised the victim organization’s managed services provider. Specifically, the MSP’s pfSense firewall had been infected with a BSD variant of BRICKSTORM around the same time that the victim’s Storage Sync system was compromised.\u003c/p\u003e\n\n\u003cp\u003eThe article says Volexity believes the victim was compromised through the breach of the MSP. This made the MSP compromise part of the broader intrusion path described in the report.\u003c/p\u003e\n\n\u003ch2 id=\"malware-families-described\"\u003eMalware Families Described\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies three malware families used in the activity:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eBRICKSTORM:\u003c/strong\u003e A known backdoor for which VerdantBamboo deployed a BSD variant on appliances, including the victim’s Egnyte Storage Sync system and the MSP’s pfSense firewall.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003ePLENET / GRIMBOLT:\u003c/strong\u003e A cross-platform backdoor developed in .NET Core and described as a new version of BRICKSTORM compiled using native ahead-of-time compilation. It supports interactive shell, remote command execution, file manipulation, and command-and-control server switching.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAGENTPSD:\u003c/strong\u003e A Python-based reverse shell that likely functions as a fallback if the primary implant stops working.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also notes that PLENET had previously been reported by Google in February in connection with activity attributed to a suspected China-nexus cluster called UNC6201. That activity involved exploitation of CVE-2026-22769 in Dell RecoverPoint for Virtual Machines as a zero-day since mid-2024.\u003c/p\u003e\n\n\u003ch2 id=\"technical-and-operational-characteristics\"\u003eTechnical and Operational Characteristics\u003c/h2\u003e\n\n\u003cp\u003eVolexity described VerdantBamboo as a highly sophisticated threat actor. The company said the group uses a combination of living-off-the-land techniques and malware deployment on systems that traditionally do not or cannot run EDR software.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights the actor’s apparent knowledge of proprietary appliances. Volexity said this knowledge allowed VerdantBamboo to deploy malware with customized persistence mechanisms.\u003c/p\u003e\n\n\u003cp\u003eVolexity also said the group appeared to show operational security discipline. The actor reportedly used a limited number of domains and IP addresses per victim and configured customized implant naming and persistence on a per-device basis.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-products\"\u003eAffected Parties and Products\u003c/h2\u003e\n\n\u003cp\u003eThe affected victim organization was not named in the article. The incident involved the victim’s Egnyte Storage Sync system, Microsoft 365 environment, firewall, and Synology NAS appliance.\u003c/p\u003e\n\n\u003cp\u003eThe victim organization’s managed services provider was also compromised. The MSP’s pfSense firewall was infected with a BSD variant of BRICKSTORM.\u003c/p\u003e\n\n\u003cp\u003eProducts and platforms named in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEgnyte Storage Sync\u003c/li\u003e\n\u003cli\u003eMicrosoft 365\u003c/li\u003e\n\u003cli\u003eSynology Network Attached Storage\u003c/li\u003e\n\u003cli\u003epfSense firewall\u003c/li\u003e\n\u003cli\u003eDell RecoverPoint for Virtual Machines\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"response-and-remediation-mentioned\"\u003eResponse and Remediation Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the local privilege escalation issue affecting Egnyte Storage Sync was addressed in version 13.13, released in March 2026. It also says VerdantBamboo returned after initial remediation, using stolen administrative credentials and firewall access to continue activity against the same organization.\u003c/p\u003e\n\n\u003cp\u003eNo further remediation details, victim identity, or quantified impact were disclosed in the article.\u003c/p\u003e\n","keyPoints":["Volexity attributed the activity to the China-nexus threat cluster VerdantBamboo, which overlaps with groups tracked as Clay Typhoon, UNC5221, and Warp Panda.","Volexity discovered in September 2025 that VerdantBamboo had compromised an unnamed victim's Egnyte Storage Sync system by exploiting a local privilege escalation flaw to deploy BRICKSTORM.","The attackers used BRICKSTORM's proxying capabilities on the Storage Sync system, along with compromised credentials, to access the victim's Microsoft 365 environment.","VerdantBamboo later breached the same organization using stolen administrative credentials to connect to the firewall, configure web SSL VPN access, and deploy additional malware to a Synology NAS appliance.","Further investigation found that the threat actor had compromised the victim organization's managed services provider and infected the MSP's pfSense firewall with a BSD variant of BRICKSTORM."],"insights":["VerdantBamboo used appliance-resident malware and proxying to make Microsoft 365 access appear to originate from the victim’s own environment, helping evade Conditional Access policies.","The same victim was compromised through multiple paths, including an Egnyte Storage Sync appliance, stolen firewall administrative credentials, and a breached MSP pfSense firewall.","The operation targeted systems that traditionally do not or cannot run EDR software, including storage, firewall, and NAS appliances.","The attackers customized implant naming and persistence on a per-device basis while limiting domains and IP addresses per victim, indicating disciplined operational security described by Volexity."],"referencedReports":[{"title":"VerdantBamboo: Just Another BRICKSTORM in the Firewall","url":"https://www.volexity.com/blog/2026/06/04/verdantbamboo-just-another-brickstorm-in-the-firewall/","publisher":"Volexity","context":"The article cites Volexity's technical report as the basis for attributing the activity to VerdantBamboo and describing its malware and intrusion methods.","category":"","primary":false},{"title":"Storage Sync V 13.13 - Miscellaneous Improvements","url":"https://helpdesk.egnyte.com/hc/en-us/articles/43855328739469-Storage-Sync-V-13-13-Miscellaneous-Improvements","publisher":"Egnyte","context":"The article references Egnyte's Storage Sync version 13.13 release as addressing the local privilege escalation issue exploited in the intrusion.","category":"","primary":false}],"body":"\u003cp\u003eVolexity reported that a China-nexus cyber espionage cluster it tracks as VerdantBamboo deployed a BSD variant of BRICKSTORM, along with PLENET and AGENTPSD, against Linux and BSD-based appliances. The activity overlaps with groups tracked by other vendors as Clay Typhoon, UNC5221, and Warp Panda. The intrusion was discovered during a September 2025 incident response engagement involving an unnamed victim.\u003c/p\u003e\n\n\u003cp\u003eThe victim’s Egnyte Storage Sync system was compromised through a local privilege escalation flaw and used to deploy BRICKSTORM. Volexity said the attackers used BRICKSTORM’s proxying capabilities, together with compromised credentials, to access the victim’s Microsoft 365 environment. The article says these steps were assessed as efforts to blend in with legitimate traffic and evade Conditional Access policies.\u003c/p\u003e\n\n\u003cp\u003eAfter remediation, VerdantBamboo returned by using stolen administrative credentials to access the firewall, configure web SSL VPN access, and deploy additional malware to a Synology NAS appliance. Investigators also found that the victim’s managed services provider had been compromised and that its pfSense firewall had been infected with a BSD variant of BRICKSTORM. Volexity characterized the actor as sophisticated, with knowledge of proprietary appliances and customized persistence mechanisms.\u003c/p\u003e\n"},{"n":2,"title":"Microsoft's Own Message Recall Agent Delivered a Credential Harvest","source":"ironscales.com","sourceColorIdx":9,"link":"https://ironscales.com/threat-intelligence/microsoft-message-recall-credential-harvest-internal-auth","time":"11:00","priority":"SHOULD READ","score":82,"tldr":"A phishing attempt abused Microsoft’s own Message Recall mechanism to generate an internally authenticated recall report that appeared trusted but included a prompt to enter email credentials. The key risk is that system-generated internal messages can bypass normal external email defenses, so detection must inspect content and context rather than relying on authentication alone.","briefOverview":"\u003cp\u003eMicrosoft’s Transport Message Recall Routing Agent generated an email that was authenticated as internal and marked with an Originating direction. The message appeared as a “Message Recall Report” from Office365Reports@microsoft[.]com and referenced a real-looking insurance claim subject. It included a legitimate outlook[.]office[.]com recall-report link, but the body also told the recipient, “If prompted, login with your email address and password.”\u003c/p\u003e\n\n\u003cp\u003eThe article describes this as a high-severity credential harvesting attempt that weaponized a Microsoft system mechanism. Because the message carried AuthAs=Internal, AuthMechanism=05, SCL 1, and an internal message source, it sat inside a trust boundary that can reduce scrutiny from tools focused on external mail. The attack is mapped in the article to MITRE ATT\u0026amp;CK techniques T1534, T1078, and T1566.002.\u003c/p\u003e\n\n\u003cp\u003eThemis, IRONSCALES’ Adaptive AI, classified the message at 72% confidence with a VIP Recipient label. The detection relied on behavioral and contextual signals, including a first-time sender, high-risk flagging, community intelligence, and a mismatch between the insurance claim subject and the recipient organization’s documented relationships. Four mailboxes were quarantined.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reports a credential harvesting email delivered through Microsoft’s own Transport Message Recall Routing Agent. The message arrived at a mid-size insurance brokerage as a “Message Recall Report” and used the sender address Office365Reports@microsoft[.]com. Its subject referenced what appeared to be a legitimate insurance claim involving wind damage for a Texas school district, with file numbers, reference codes, and a named vendor.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the message was not sent by an attacker’s external mail server, according to the article. Its headers showed Auto-Submitted: auto-generated and X-MS-Exchange-Generated-Message-Source: Transport Message Recall Routing Agent. It was authenticated as internal with AuthAs=Internal and AuthMechanism=05, had a direction of Originating, and carried an SCL of 1.\u003c/p\u003e\n\n\u003cp\u003eThe recall link pointed to a legitimate Microsoft URL at outlook[.]office[.]com/mail/messageRecall.html with a full message ID parameter. However, the body contained the sentence, “If prompted, login with your email address and password.” The article states that this is not standard language in a Microsoft message recall notification and characterizes it as a credential harvesting prompt embedded in trusted internal traffic.\u003c/p\u003e\n\n\u003cp\u003eThe significance of the incident is that internal authentication created a blind spot. The article says internal messages typically bypass the inbound scanning pipeline, including controls such as URL reputation checks, sender verification, and content analysis that are calibrated for external threats. It maps the activity to MITRE ATT\u0026amp;CK T1534 for Internal Spearphishing, T1078 for Valid Accounts, and T1566.002 for Phishing: Spearphishing Link.\u003c/p\u003e\n\n\u003cp\u003eThemis, IRONSCALES’ Adaptive AI, detected the message at 72% confidence and applied a VIP Recipient label. The article says the detection signals were behavioral, including first-time correspondence, high-risk classification, and anomalous community intelligence. Four mailboxes were quarantined, and the article highlights that the insurance claim subject did not match any documented relationship with the recipient organization.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a high-severity credential harvesting attempt that used Microsoft’s own Transport Message Recall Routing Agent as the delivery mechanism. The message was generated as a “Message Recall Report” and appeared to come from Office365Reports@microsoft[.]com. It was authenticated as internal and marked with an Originating direction.\u003c/p\u003e\n\n\u003cp\u003eThe key issue was that the message looked like a trusted Microsoft system notification while containing an explicit credential prompt. The body included the sentence: “If prompted, login with your email address and password.” The article states that this is not standard language in a Microsoft message recall notification.\u003c/p\u003e\n\n\u003ch2 id=\"message-content-and-presentation\"\u003eMessage Content and Presentation\u003c/h2\u003e\n\n\u003cp\u003eThe email arrived at a mid-size insurance brokerage. Its subject referenced what appeared to be a legitimate insurance claim involving wind damage for a Texas school district. The subject included file numbers, reference codes, and a named vendor.\u003c/p\u003e\n\n\u003cp\u003eThe message included a “View Message Recall Report” link. That link pointed to a legitimate Microsoft URL at outlook[.]office[.]com/mail/messageRecall.html and included a full message ID parameter. The article emphasizes that the link was hosted on Microsoft infrastructure and followed the expected recall report format.\u003c/p\u003e\n\n\u003cp\u003eDespite those trusted-looking elements, the body contained a credential harvesting prompt. The article identifies the line asking the recipient to log in with an email address and password as the suspicious and non-standard element.\u003c/p\u003e\n\n\u003ch2 id=\"technical-characteristics\"\u003eTechnical Characteristics\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the email was not sent by an attacker’s mail server. Instead, it was generated by Microsoft’s Transport Message Recall Routing Agent.\u003c/p\u003e\n\n\u003cp\u003eThe headers and delivery characteristics included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSender address: Office365Reports@microsoft[.]com\u003c/li\u003e\n\u003cli\u003eAuto-Submitted: auto-generated\u003c/li\u003e\n\u003cli\u003eX-MS-Exchange-Generated-Message-Source: Transport Message Recall Routing Agent\u003c/li\u003e\n\u003cli\u003eAuthAs=Internal\u003c/li\u003e\n\u003cli\u003eAuthMechanism=05\u003c/li\u003e\n\u003cli\u003eDirection: Originating\u003c/li\u003e\n\u003cli\u003eSCL: 1\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese details meant the message was treated as system-generated internal traffic. The article describes this as important because security tools often distinguish internal messages from external messages.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-message-created-a-blind-spot\"\u003eWhy the Message Created a Blind Spot\u003c/h2\u003e\n\n\u003cp\u003eThe article says the internal authentication status created a blind spot. Because the Transport Message Recall Routing Agent generated the email, it carried internal authentication and an originating direction rather than an incoming direction.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, internal messages typically bypass the inbound scanning pipeline entirely. It specifically names URL reputation checks, sender verification, and content analysis as controls that are calibrated for external threats. A message generated by the mail platform itself can sit inside the trust boundary by definition.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that the attacker did not need to compromise an internal account in the traditional sense. Instead, the attacker triggered a Microsoft system mechanism that produced the delivery vehicle.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-response\"\u003eDetection and Response\u003c/h2\u003e\n\n\u003cp\u003eThemis, IRONSCALES’ Adaptive AI, classified the message at 72% confidence. It applied a VIP Recipient label and flagged the message as high risk.\u003c/p\u003e\n\n\u003cp\u003eThe article says the detection signals were behavioral and contextual. These included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe sender was a first-time correspondent to the recipient.\u003c/li\u003e\n\u003cli\u003eThe message was flagged as high risk.\u003c/li\u003e\n\u003cli\u003eThe community intelligence layer identified the pattern as anomalous.\u003c/li\u003e\n\u003cli\u003eThe insurance claim subject referenced a specific claim that the recipient organization had no documented relationship with.\u003c/li\u003e\n\u003cli\u003eThe body included a credential prompt.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFour mailboxes were quarantined as part of the response.\u003c/p\u003e\n\n\u003ch2 id=\"mitre-att-ck-mapping\"\u003eMITRE ATT\u0026amp;CK Mapping\u003c/h2\u003e\n\n\u003cp\u003eThe article maps the activity to three MITRE ATT\u0026amp;CK techniques:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eT1534: Internal Spearphishing, because a system-generated internal message was used as the delivery mechanism.\u003c/li\u003e\n\u003cli\u003eT1078: Valid Accounts, because the message leveraged Microsoft internal authentication status.\u003c/li\u003e\n\u003cli\u003eT1566.002: Phishing: Spearphishing Link, because the message combined a credential prompt with a link to the outlook.office.com recall page.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise-listed-in-the-article\"\u003eIndicators of Compromise Listed in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article provides the following indicators and context:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSender Address: Office365Reports@microsoft[.]com, described as a Microsoft system-generated sender.\u003c/li\u003e\n\u003cli\u003eAuth Status: AuthAs=Internal, AuthMechanism=05, described as internal authentication and system-generated.\u003c/li\u003e\n\u003cli\u003eMessage Source: Transport Message Recall Routing Agent, described as the Microsoft Exchange recall mechanism.\u003c/li\u003e\n\u003cli\u003eRecall Link: outlook[.]office[.]com/mail/messageRecall.html?messageid=DM8P221MB0523B843476359C224750363B40B2@DM8P221MB0523[.]NAMP221[.]PROD[.]OUTLOOK[.]COM, described as a legitimate Microsoft recall URL.\u003c/li\u003e\n\u003cli\u003eSCL: 1, described as low spam confidence and consistent with internal traffic.\u003c/li\u003e\n\u003cli\u003eDirection: Originating, described as not inbound and generated within the mail platform.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact-and-affected-parties\"\u003eImpact and Affected Parties\u003c/h2\u003e\n\n\u003cp\u003eThe affected organization described in the article was a mid-size insurance brokerage. The message referenced a Texas school district and an insurance claim subject, but the article states the recipient organization had no documented relationship with that claim.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed response was quarantine of four mailboxes. The article does not name a threat actor or attacker group.\u003c/p\u003e\n","keyPoints":["Microsoft's Transport Message Recall Routing Agent generated an email authenticated as Internal with AuthAs=Internal and AuthMechanism=05, and the message direction was Originating.","The message appeared as a Message Recall Report from Office365Reports@microsoft.com and linked to a legitimate outlook.office.com message recall URL.","The email body included the credential prompt, “If prompted, login with your email address and password,” which the article states is not standard language in a Microsoft message recall notification.","Themis classified the message at 72% confidence with a VIP Recipient label, citing signals including a first-time sender, high risk, and anomalous community intelligence.","Four mailboxes were quarantined after the message was detected."],"insights":["Internal authentication and an Originating direction created a blind spot because internal messages typically bypass inbound scanning controls such as URL reputation checks, sender verification, and content analysis.","The attack did not rely on an attacker-controlled mail server; it weaponized a Microsoft system mechanism to produce a trusted-looking delivery vehicle.","A legitimate Microsoft-hosted outlook.office.com recall URL was not sufficient to establish safety because the suspicious element was the credential prompt embedded in the message body.","Behavioral and contextual signals, including first-time correspondence and an insurance claim subject with no documented relationship to the recipient organization, were needed to detect what authentication status did not reveal."],"referencedReports":[{"title":"Internal Spearphishing, T1534","url":"https://attack.mitre.org/techniques/T1534/","publisher":"MITRE ATT\u0026CK","context":"The article references MITRE ATT\u0026CK T1534 to describe the use of internal messaging systems to deliver malicious content that bypasses perimeter controls.","category":"","primary":false},{"title":"Valid Accounts, T1078","url":"https://attack.mitre.org/techniques/T1078/","publisher":"MITRE ATT\u0026CK","context":"The article maps the incident to MITRE ATT\u0026CK T1078 because it involved Microsoft internal authentication status.","category":"","primary":false},{"title":"Phishing: Spearphishing Link, T1566.002","url":"https://attack.mitre.org/techniques/T1566/002/","publisher":"MITRE ATT\u0026CK","context":"The article maps the credential prompt and recall-page link to MITRE ATT\u0026CK T1566.002.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft’s Transport Message Recall Routing Agent generated an email that was authenticated as internal and marked with an Originating direction. The message appeared as a “Message Recall Report” from Office365Reports@microsoft[.]com and referenced a real-looking insurance claim subject. It included a legitimate outlook[.]office[.]com recall-report link, but the body also told the recipient, “If prompted, login with your email address and password.”\u003c/p\u003e\n\n\u003cp\u003eThe article describes this as a high-severity credential harvesting attempt that weaponized a Microsoft system mechanism. Because the message carried AuthAs=Internal, AuthMechanism=05, SCL 1, and an internal message source, it sat inside a trust boundary that can reduce scrutiny from tools focused on external mail. The attack is mapped in the article to MITRE ATT\u0026amp;CK techniques T1534, T1078, and T1566.002.\u003c/p\u003e\n\n\u003cp\u003eThemis, IRONSCALES’ Adaptive AI, classified the message at 72% confidence with a VIP Recipient label. The detection relied on behavioral and contextual signals, including a first-time sender, high-risk flagging, community intelligence, and a mismatch between the insurance claim subject and the recipient organization’s documented relationships. Four mailboxes were quarantined.\u003c/p\u003e\n"},{"n":4,"title":"Oxford University discloses data breach after careers platform hack","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/oxford-university-discloses-data-breach-after-careerconnect-platform-hack/","time":"11:14","priority":"MAY READ","score":72,"tldr":"Oxford University disclosed a data breach after third-party provider Group GTI’s CareerConnect platform was hacked, exposing users’ names, email addresses, and encrypted passwords for non-SSO accounts. Oxford says its own systems were not compromised, but affected users may face phishing attempts.","briefOverview":"\u003cp\u003eOxford University disclosed a data breach after its third-party provider, Group GTI, informed the university that the CareerConnect career services platform had been compromised. CareerConnect is used by Oxford for career services and is also used by other UK educational organizations, including King’s College London and the University of Manchester. Oxford said the incident affected GTI’s third-party system and that there is no evidence university systems were compromised.\u003c/p\u003e\n\n\u003cp\u003eThe breach occurred on May 28, when attackers gained access to users’ first names, last names, email addresses, and encrypted passwords for users who do not sign in using Single Sign-On. Oxford said alumni, research staff, and employer users access CareerConnect with locally set passwords, which GTI invalidated. These users will be asked to reset their passwords the next time they sign in.\u003c/p\u003e\n\n\u003cp\u003eOxford said there is no evidence that course information, uploaded files, appointment information, or financial information were involved. GTI stated the breach appeared focused on gathering credentials, which may lead to phishing attempts. The university warned staff, students, and external CareerConnect users that they might be targeted by phishing or scam emails.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOxford University disclosed a new data breach after being notified by Group GTI, the third-party provider behind its CareerConnect career services platform. The platform is used by Oxford to run its careers service and is also used by other UK educational organizations, including King’s College London and the University of Manchester. Oxford said the incident was limited to GTI’s third-party system. The university stated there is no evidence that Oxford systems were compromised.\u003c/p\u003e\n\n\u003cp\u003eThe CareerConnect platform was breached on May 28. According to Oxford, attackers accessed users’ first names, last names, email addresses, and encrypted passwords for users who do not sign in using Single Sign-On. Alumni, research staff, and employer users access CareerConnect with passwords set locally on the platform. GTI invalidated those passwords and users will be asked to reset them the next time they sign in.\u003c/p\u003e\n\n\u003cp\u003eOxford said there is no evidence that course information, uploaded files, appointment information, or financial information were involved in the incident. The university also said GTI and Oxford found no evidence that students’ passwords or financial information were accessed. GTI stated that the breach appeared to be focused on gathering credentials. Oxford warned that this could lead to phishing attempts.\u003c/p\u003e\n\n\u003cp\u003eThe university advised staff, students, and external CareerConnect users that they might be targeted by phishing or scam emails. The article does not identify the attackers behind the CareerConnect breach. An Oxford University spokesperson was not immediately available when contacted by BleepingComputer for comment on the incident.\u003c/p\u003e\n\n\u003cp\u003eThis is the second data breach disclosed by Oxford University this year. Earlier in May, Oxford confirmed it was affected by the ShinyHunters breach of Instructure’s Canvas learning management system, which the university uses. In that earlier incident, Oxford said its systems were not compromised and that exposed data was limited to usernames, Canvas email addresses, messages exchanged between users on the platform, course names, and course enrolment information.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eOxford University disclosed a new data breach after being informed by its third-party provider, Group GTI, that the CareerConnect career services platform had been compromised. CareerConnect is used by Oxford for its career services and is also used by other UK educational organizations, including King’s College London and the University of Manchester, to run institution-specific career hubs.\u003c/p\u003e\n\n\u003cp\u003eOxford described the incident as affecting GTI’s third-party system rather than Oxford’s own systems. The university said there is no evidence that university systems were compromised.\u003c/p\u003e\n\n\u003ch2 id=\"breach-details\"\u003eBreach Details\u003c/h2\u003e\n\n\u003cp\u003eOxford said the CareerConnect platform was breached on May 28. Attackers gained access to the following user data:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFirst names\u003c/li\u003e\n\u003cli\u003eLast names\u003c/li\u003e\n\u003cli\u003eEmail addresses\u003c/li\u003e\n\u003cli\u003eEncrypted passwords for users who do not sign in using Single Sign-On\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe university said alumni, research staff, and employer users access CareerConnect with passwords set locally on CareerConnect. Group GTI invalidated those passwords, and affected users will be asked to reset their passwords the next time they sign in.\u003c/p\u003e\n\n\u003ch2 id=\"data-not-found-to-be-involved\"\u003eData Not Found to Be Involved\u003c/h2\u003e\n\n\u003cp\u003eOxford said there is no evidence that several categories of data were involved in the incident. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCourse information\u003c/li\u003e\n\u003cli\u003eUploaded files\u003c/li\u003e\n\u003cli\u003eAppointment information\u003c/li\u003e\n\u003cli\u003eFinancial information\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe university also said GTI and Oxford found no evidence that students’ passwords or financial information were accessed.\u003c/p\u003e\n\n\u003ch2 id=\"stated-purpose-and-follow-on-risk\"\u003eStated Purpose and Follow-On Risk\u003c/h2\u003e\n\n\u003cp\u003eGTI stated that the breach appeared to be focused on gathering credentials. Oxford said this may lead to phishing attempts.\u003c/p\u003e\n\n\u003cp\u003eThe university warned staff, students, and external CareerConnect users that they might be targeted by phishing or scam emails after the incident.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-platform-context\"\u003eAffected Parties and Platform Context\u003c/h2\u003e\n\n\u003cp\u003eThe directly discussed affected platform is CareerConnect, operated by Group GTI and used by Oxford University. The article also notes that the same platform is used by other UK educational organizations, including King’s College London and the University of Manchester.\u003c/p\u003e\n\n\u003cp\u003eOxford is described as a collegiate research university comprising 43 autonomous colleges, with more than 26,000 students and over 5,900 research, teaching, and research support staff. It is also described as the oldest university in the English-speaking world.\u003c/p\u003e\n\n\u003ch2 id=\"response\"\u003eResponse\u003c/h2\u003e\n\n\u003cp\u003eGroup GTI invalidated locally set CareerConnect passwords for affected users. Users who access CareerConnect with local passwords will be prompted to reset them when they next sign in.\u003c/p\u003e\n\n\u003cp\u003eOxford stated that the incident affected only GTI’s third-party system and that there is no evidence of compromise of university systems. The university also issued warnings about possible phishing or scam emails.\u003c/p\u003e\n\n\u003ch2 id=\"relation-to-earlier-oxford-breach-disclosure\"\u003eRelation to Earlier Oxford Breach Disclosure\u003c/h2\u003e\n\n\u003cp\u003eThe article states that this is the second data breach disclosed by Oxford University this year. The earlier incident involved the ShinyHunters extortion gang’s breach of Instructure’s Canvas learning management system, which Oxford uses.\u003c/p\u003e\n\n\u003cp\u003eAfter the Canvas attack, the hackers claimed to have stolen 280 million records tied to students and staff from 8,809 colleges, school districts, and online education platforms worldwide. Instructure later reached an agreement with the cybercrime group, saying that the hackers returned the stolen data and provided shred logs confirming its destruction.\u003c/p\u003e\n\n\u003cp\u003eOxford confirmed it was one of the victims of the Canvas incident. In that case, Oxford said its systems were not compromised and that exposed data was limited to usernames, Canvas email addresses, messages exchanged between users on the platform, course names, and course enrolment information.\u003c/p\u003e\n\n\u003ch2 id=\"known-or-suspected-actors\"\u003eKnown or Suspected Actors\u003c/h2\u003e\n\n\u003cp\u003eThe article does not identify the attackers responsible for the CareerConnect breach. It only states that GTI characterized the breach as appearing focused on gathering credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article separately names ShinyHunters in connection with the earlier Instructure Canvas breach, not the CareerConnect incident.\u003c/p\u003e\n\n\u003ch2 id=\"additional-note\"\u003eAdditional Note\u003c/h2\u003e\n\n\u003cp\u003eBleepingComputer contacted an Oxford University spokesperson for comment on the CareerConnect data breach, but the spokesperson was not immediately available.\u003c/p\u003e\n","keyPoints":["Oxford University disclosed a data breach after third-party provider Group GTI informed it that the CareerConnect career services platform had been compromised.","Attackers breached the CareerConnect platform on May 28 and accessed users’ first names, last names, email addresses, and encrypted passwords for users who do not sign in using Single Sign-On.","Oxford University said there is no evidence that course information, uploaded files, appointment information, financial information, students’ passwords, or university systems were compromised.","Group GTI invalidated locally set CareerConnect passwords, and affected alumni, research staff, and employer users will be asked to reset their passwords when they next sign in.","Oxford University warned staff, students, and external CareerConnect users that they might be targeted by phishing or scam emails following the incident."],"insights":["The incident highlights a recurring third-party exposure pattern for Oxford, as both breaches disclosed this year involved external education technology platforms rather than Oxford’s own systems.","The impact appears different for Single Sign-On users versus users with locally set CareerConnect passwords, since only the latter group had encrypted passwords accessed and invalidated.","Because CareerConnect is used by other UK educational organizations including King’s College London and the University of Manchester, the compromised platform has relevance beyond Oxford’s own user base.","GTI’s statement that the breach appeared focused on gathering credentials makes phishing preparedness a concrete follow-up priority for affected CareerConnect users."],"referencedReports":[],"body":"\u003cp\u003eOxford University disclosed a data breach after its third-party provider, Group GTI, informed the university that the CareerConnect career services platform had been compromised. CareerConnect is used by Oxford for career services and is also used by other UK educational organizations, including King’s College London and the University of Manchester. Oxford said the incident affected GTI’s third-party system and that there is no evidence university systems were compromised.\u003c/p\u003e\n\n\u003cp\u003eThe breach occurred on May 28, when attackers gained access to users’ first names, last names, email addresses, and encrypted passwords for users who do not sign in using Single Sign-On. Oxford said alumni, research staff, and employer users access CareerConnect with locally set passwords, which GTI invalidated. These users will be asked to reset their passwords the next time they sign in.\u003c/p\u003e\n\n\u003cp\u003eOxford said there is no evidence that course information, uploaded files, appointment information, or financial information were involved. GTI stated the breach appeared focused on gathering credentials, which may lead to phishing attempts. The university warned staff, students, and external CareerConnect users that they might be targeted by phishing or scam emails.\u003c/p\u003e\n"},{"n":6,"title":"The Hardest Fork","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/the-hardest-fork.html","time":"11:53","priority":"MAY READ","score":55,"tldr":"The author argues that AI-driven vulnerability discovery will overwhelm today’s open source disclosure and patching systems, making current consumption models unsafe. The proposed solution is a coordinated disclosure pipeline plus a trusted “maintainer of last resort” to fork, patch, and distribute critical projects when upstream maintainers cannot keep up.","briefOverview":"\u003cp\u003eThe article argues that Mythos is real and represents a new category of threat to software security. The author says its findings are not simple scanner results, but novel combinations of many already-detectable issues chained into more serious outcomes. Even if Mythos itself were disputed, the author says the capability is coming and the industry needs to prepare.\u003c/p\u003e\n\n\u003cp\u003eThe central concern is that the open source ecosystem and current consumption model are not ready for AI-driven vulnerability discovery at scale. The author argues that coordinated vulnerability disclosure was built for a slower world where serious bugs took weeks to find and affected a smaller set of well-known projects. A model that can find hundreds of issues overnight in long-tail projects would overwhelm maintainers, downstream users, and existing patching workflows.\u003c/p\u003e\n\n\u003cp\u003eThe proposed response has two parts: a trusted, centralized disclosure pipeline and a “maintainer of last resort.” The first would route vetted reports and patches upstream, while the second would maintain trusted forks when maintainers cannot or will not patch in time. The author frames this as a difficult but necessary “hard fork” for open source consumption infrastructure.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article is an opinion piece about the implications of Mythos and AI-assisted vulnerability discovery for the open source ecosystem. The author says Mythos is real, despite skepticism in parts of the industry, and describes its findings as creative chains of many issues that static analysis tools already detect individually. The article argues that this is not just a better scanner, but a different category of threat.\u003c/p\u003e\n\n\u003cp\u003eThe author says governments, including Washington, are in a difficult position because regulating too little could allow a U.S.-based company to create a dangerous capability, while regulating too much could push the same development elsewhere, including China. The article compares the problem to gain-of-function research and says open source is structurally difficult to govern because laws and executive orders cannot control people around the world publishing code for free. It argues that the United States is therefore right to focus on open source consumption rather than direct governance of open source creation.\u003c/p\u003e\n\n\u003cp\u003eThe article says the current way companies consume open source software is fundamentally broken. Modern applications rely on layered dependencies, and fixing a problem in one component can cascade through an entire stack, especially in large organizations with legacy codebases. The author also warns that rushing to patch can introduce risk because AI has supercharged supply chain attacks and malware could be disguised as a patch.\u003c/p\u003e\n\n\u003cp\u003eThe maintainer side is described as even harder because many important projects are maintained by one or two people in their spare time, and maintainers have already been buried by automated scanners and AI-generated reports. The article emphasizes that open source maintainers do not owe downstream users contracts, service-level agreements, or guaranteed patches. The author says coordinated vulnerability disclosure was designed for a slower world and will not keep up if models can find hundreds of vulnerabilities overnight in long-tail projects.\u003c/p\u003e\n\n\u003cp\u003eThe article proposes a Plan A and Plan B. Plan A is a single trusted group that routes fully vetted reports and patches upstream while supporting maintainers who want help, with the author estimating that this may work for only about 50% of projects at best. Plan B is a centralized, trusted “maintainer of last resort” that can fork and maintain projects when upstream maintainers cannot or will not patch quickly enough.\u003c/p\u003e\n\n\u003cp\u003eThe article describes three possible paths: doing nothing and hoping everything works, allowing chaotic fragmentation through competing forks, or making a deliberate hard fork toward coordinated trust infrastructure. The author argues that the hard fork is the only real option, even though it would require building infrastructure to fork, maintain, and distribute thousands of projects under time pressure. The piece concludes that the same AI capabilities creating the crisis may also make the proposed response possible.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that Mythos is real and that the open source ecosystem is not prepared for the scale of AI-driven vulnerability discovery it represents. The author says many people in the industry view Mythos as a marketing stunt, but he claims to have seen findings that are serious. According to the article, the threat is not a simple case of finding one bad line of code that leads to remote code execution, but rather the creative chaining of dozens of issues from among thousands of findings that existing scanners may already surface individually.\u003c/p\u003e\n\n\u003cp\u003eThe author frames this as a different category of threat rather than a better scanner. He compares the creativity involved to Move 37 and says that even if Mythos itself were a hoax, the broader capability is coming regardless. The rest of the article focuses on what the software industry and government should do in response.\u003c/p\u003e\n\n\u003ch2 id=\"government-and-regulatory-context\"\u003eGovernment and regulatory context\u003c/h2\u003e\n\n\u003cp\u003eThe article says Washington has been tracking this issue, but that regulation is difficult while much of the industry still thinks the issue is made up. The author says boardrooms are now in preparation mode, which gives policymakers an opening to consider what role they should play. He describes the government position as difficult because regulating too little risks a U.S.-based company creating a capability that threatens critical infrastructure, while regulating too much could allow the same thing to happen elsewhere, including China.\u003c/p\u003e\n\n\u003cp\u003eThe article compares the situation to gain-of-function virus research. It says everyone understands that safety rules are needed, but that making rules mandatory in one place does not guarantee the rest of the world will follow them. The author also refers to Wuhan in this comparison.\u003c/p\u003e\n\n\u003ch2 id=\"why-open-source-is-hard-to-govern\"\u003eWhy open source is hard to govern\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies a structural problem: open source is not easily governable. The author says that despite Europe’s Cyber Resilience Act, laws and executive orders do not apply effectively to people around the world putting software on the internet for free. He says the United States understands this and is focusing on consumption, which he describes as the right instinct.\u003c/p\u003e\n\n\u003cp\u003eThe core argument is that the current consumption model for open source software is fundamentally broken. The author says companies have consumed open source freely for years without fully thinking about the implications. Modern applications are built from layers of dependencies, and when something goes wrong in one dependency, fixing it can cascade throughout an entire stack.\u003c/p\u003e\n\n\u003ch2 id=\"risks-in-current-patching-and-dependency-practices\"\u003eRisks in current patching and dependency practices\u003c/h2\u003e\n\n\u003cp\u003eThe article says that for large organizations with legacy codebases, fixing dependency issues is not an afternoon task. It also warns that moving quickly has new risks because AI has also strengthened supply chain attacks. The author says that rushing to patch a vulnerability without careful review could lead an organization to install malware that is worse than the original issue.\u003c/p\u003e\n\n\u003cp\u003eThe author also emphasizes that downstream users cannot assume that open source maintainers will provide fast fixes. Many important projects are maintained by one or two people in their spare time. The article notes that some maintainers care and want to help, while others do not, and says that is acceptable because maintainers owe their downstream users nothing.\u003c/p\u003e\n\n\u003ch2 id=\"maintainer-burden-and-disclosure-limits\"\u003eMaintainer burden and disclosure limits\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the maintainer side as especially difficult. Maintainers have already been overwhelmed for years by automated scanners and AI-generated reports that produce low-quality noise. Unlike commercial software vendors, open source maintainers do not generally have contracts or service-level agreements requiring them to respond, patch, or even be reachable.\u003c/p\u003e\n\n\u003cp\u003eThe author argues that coordinated vulnerability disclosure was designed for an older environment. In that world, serious vulnerability discovery required weeks of expert work and the targets were a smaller set of well-known projects. By contrast, the article says a model can now find hundreds of vulnerabilities overnight in the long tail of open source projects, and the current system will not keep up.\u003c/p\u003e\n\n\u003ch2 id=\"proposed-plan-a-coordinated-disclosure-at-scale\"\u003eProposed Plan A: coordinated disclosure at scale\u003c/h2\u003e\n\n\u003cp\u003eThe article proposes a two-part response, starting with Plan A: coordinated disclosure that works at scale. The author calls for a single trusted group that can route fully vetted reports and patches upstream while supporting maintainers who want help. He argues against having a dozen competing groups filing noisy tickets.\u003c/p\u003e\n\n\u003cp\u003eThe goal is to create one coordinated effort that maintainers recognize and trust, so its reports rise to the top of their inboxes. The article says Glasswing has managed to get about 6% of its findings upstreamed. The author says this kind of program will never reach 100% because that is not how the long tail of open source works, and estimates that normal coordinated disclosure under hard time pressure may work for at most around 50% of projects.\u003c/p\u003e\n\n\u003ch2 id=\"proposed-plan-b-maintainer-of-last-resort\"\u003eProposed Plan B: maintainer of last resort\u003c/h2\u003e\n\n\u003cp\u003ePlan B addresses the remaining cases where coordinated upstream disclosure is insufficient. The article describes a messy middle of projects where maintainers respond but cannot ship a fix in time, or where a patch exists but downstream users do not adopt it. It also includes projects where maintainers cannot or will not patch at all.\u003c/p\u003e\n\n\u003cp\u003eFor those situations, the author proposes a “maintainer of last resort.” This entity would use the open source right to fork projects, assume stewardship, and keep them alive independently. The article notes that forking dead or unresponsive projects already happens, but argues that the new scale of AI-driven vulnerability discovery requires centralization in one trusted place.\u003c/p\u003e\n\n\u003cp\u003eThe author says this approach would involve hard calls and hurt feelings, but presents it as necessary to avoid fragmentation. He says the function needs to be sustainably funded, staffed, neutral, and trusted. He also argues that the same AI capabilities creating the crisis now make a maintainer-of-last-resort function viable at scale.\u003c/p\u003e\n\n\u003ch2 id=\"three-possible-paths\"\u003eThree possible paths\u003c/h2\u003e\n\n\u003cp\u003eThe article lays out three possible futures for open source response.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe first is the “naive” path, in which organizations do nothing and hope that everything works: Glasswing patches everything upstream, vendors sandbox every workload, teams modernize deployment pipelines, maintainers respond rapidly, companies update dependencies immediately, and no one introduces regressions or malware.\u003c/li\u003e\n\u003cli\u003eThe second is the “chaotic” path, in which nobody centralizes and major cloud providers or security vendors each maintain competing forks of critical libraries.\u003c/li\u003e\n\u003cli\u003eThe third is the “hard fork,” described as a deliberate and painful decision to build new trust infrastructure for open source consumption.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe author says the naive world is desirable but not real. He says the chaotic path is the default if no one acts, and that it would leave teams trying to determine which fork has which CVEs fixed and whether those forks introduced new issues. He argues that the hard fork is the most difficult option but the only real one.\u003c/p\u003e\n\n\u003ch2 id=\"the-hard-fork-concept\"\u003eThe “hard fork” concept\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central metaphor is that open source has always included forking as a mechanism for dealing with projects that cannot or will not adapt. In the author’s framing, the community can take stewardship, do the work, and move forward. What has changed is the scale of the problem.\u003c/p\u003e\n\n\u003cp\u003eInstead of forking one project, the author says the ecosystem may need infrastructure to fork, maintain, and distribute thousands of projects. This would happen under time pressure and with real adversaries involved. The author calls this the hardest fork the open source ecosystem has ever had to make.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-response\"\u003eDisclosed impact and response\u003c/h2\u003e\n\n\u003cp\u003eThe article does not disclose a specific incident, exploited vulnerability, CVE, victim organization, or patch advisory. Its impact discussion is broader: the author warns that AI-driven vulnerability discovery could overwhelm existing open source disclosure and patching systems, create risk for critical infrastructure, and fragment the ecosystem if different providers create competing forks. The proposed response is to build centralized disclosure and trusted fork-maintenance infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe article ends by saying the same AI capabilities that created the crisis may make the response possible. The author says software is going to change in ways that would have been unimaginable a year ago and expresses uncertainty about whether the proposed approach will work. He concludes that the work has to begin even though it does not feel easy at the start.\u003c/p\u003e\n","keyPoints":["The author says Mythos is real and describes it as a different category of threat because it can combine many issues found by scanners into more serious exploit chains.","The article argues that the current model for consuming open source software is fundamentally broken and cannot be fixed quickly through incremental improvements.","The author says coordinated vulnerability disclosure was designed for a world with fewer serious vulnerabilities and will not keep up when models can find hundreds overnight in long-tail open source projects.","The article proposes a Plan A of one trusted, coordinated disclosure effort that routes vetted reports and patches upstream while supporting maintainers who want help.","The article proposes a Plan B involving a sustainably funded, staffed, neutral, and trusted “maintainer of last resort” to maintain forks when upstream projects cannot or will not patch in time."],"insights":["The article frames open source governance as less viable than regulating consumption, because laws and executive orders cannot practically control unpaid contributors around the world publishing code online.","The author estimates that even a scaled, trusted coordinated disclosure process may work for only about 50% of projects, making fallback mechanisms necessary rather than optional.","The article highlights that rapid patching can itself become risky because AI-supercharged supply chain attacks may disguise malware as urgent fixes.","The proposed “maintainer of last resort” depends on the same AI capabilities that are creating the vulnerability-discovery crisis, making AI both the source of scale and the proposed way to manage that scale.","The author warns that without centralization, competing forks from cloud providers and security vendors could create a fragmented ecosystem where downstream users cannot easily determine which fork fixes which CVEs or introduces new risks."],"referencedReports":[],"body":"\u003cp\u003eThe article argues that Mythos is real and represents a new category of threat to software security. The author says its findings are not simple scanner results, but novel combinations of many already-detectable issues chained into more serious outcomes. Even if Mythos itself were disputed, the author says the capability is coming and the industry needs to prepare.\u003c/p\u003e\n\n\u003cp\u003eThe central concern is that the open source ecosystem and current consumption model are not ready for AI-driven vulnerability discovery at scale. The author argues that coordinated vulnerability disclosure was built for a slower world where serious bugs took weeks to find and affected a smaller set of well-known projects. A model that can find hundreds of issues overnight in long-tail projects would overwhelm maintainers, downstream users, and existing patching workflows.\u003c/p\u003e\n\n\u003cp\u003eThe proposed response has two parts: a trusted, centralized disclosure pipeline and a “maintainer of last resort.” The first would route vetted reports and patches upstream, while the second would maintain trusted forks when maintainers cannot or will not patch in time. The author frames this as a difficult but necessary “hard fork” for open source consumption infrastructure.\u003c/p\u003e\n"},{"n":1,"title":"Initial Reactions and Key Takeaways from the 2026 Gartner Security and Risk Summit","source":"xmcyber.com","sourceColorIdx":9,"link":"https://xmcyber.com/blog/initial-reactions-and-key-takeaways-from-the-2026-gartner-security-and-risk-summit/","time":"11:50","priority":"MAY READ","score":40,"tldr":"At the 2026 Gartner Security and Risk Summit, the central takeaway was that AI is accelerating both attacker and defender capabilities, making continuous exposure management and attack-path-based prioritization essential. Gartner and XM Cyber emphasized that organizations must focus less on more AI tools and more on proving which exposures are truly exploitable and tied to bus
