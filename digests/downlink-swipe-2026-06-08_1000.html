iness risk.","briefOverview":"\u003cp\u003eThe XM Cyber team attended the 2026 Gartner Security and Risk Summit at the Gaylord Resort in National Harbor, Maryland, and highlighted several takeaways from sessions and discussions at the event. The summit emphasized continuous learning and peer-to-peer engagement, with topics including AI, quantum computing, and privacy-enhancing technologies. The article presents AI as a central disruptive force for cybersecurity, creating benefits for defenders while also enabling more sophisticated attacker activity.\u003c/p\u003e\n\n\u003cp\u003eA major theme was that organizations should not focus only on acquiring AI tools, but should understand and prove which exposures actually matter. The article argues that reachability, exploitability, and attack path validation are more useful than additional dashboards when prioritizing security work. It also describes Gartner’s view that Exposure Assessment Platforms are moving toward convergence with Adversarial Exposure Validation capabilities under a possible Unified Exposure Management Platform category.\u003c/p\u003e\n\n\u003cp\u003eThe article also stresses that people and process are now major barriers to effective exposure management. Gartner discussed the need for security and GRC teams to converge around business resilience, and recommended a Mobilization Coordinator role to help move from automated identification and prioritization to human-led remediation. Gartner predicted that organizations implementing such a role by 2030 could reduce critical exposure dwell time by up to 60%.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eXM Cyber’s article summarizes its initial reactions and key takeaways from the 2026 Gartner Security and Risk Summit held at the Gaylord Resort in National Harbor, Maryland. The event brought together security leaders, practitioners, and vendors, with sessions covering AI, quantum computing, and privacy-enhancing technologies. The article emphasizes that Gartner conferences are distinguished by continuous learning and peer-to-peer engagement. It frames the summit’s most important themes around AI disruption, exposure management, business resilience, and the role of people and process.\u003c/p\u003e\n\n\u003cp\u003eAI was presented as both a major opportunity and a major risk for cybersecurity. The article says AI can help defenders automate routine compliance, accelerate threat detection, and scale security operations, while attackers can use the same kinds of tools for hyper-convincing phishing, automated exploit discovery, and bypassing traditional defenses. It also notes risks such as AI-augmented attacks, prompt injections, and agentic automation hijacks. The article cites a White House Executive Order on Promoting Advanced Artificial Intelligence Innovation and Security, including a federal AI cybersecurity clearinghouse for vulnerability scanning, discovery, validation, and patching.\u003c/p\u003e\n\n\u003cp\u003eThe article discusses Anthropic’s Mythos as a heavily discussed topic across sessions, booths, and vendor pitches. It says views differ on whether frontier models will transform operating models, feed into existing exposure management platforms, or fade as hype. The author argues that the most effective CISOs are not those with the most AI tools, but those who can prove which exposures matter. The article points to reachability, exploitability, and attacker paths to critical assets as the basis for reducing the potential blast radius of AI-fueled attacks.\u003c/p\u003e\n\n\u003cp\u003eContinuous Threat Exposure Management is described as an established and growing area of investment rather than a buzzword. The article says organizations are seeing reductions in mean time to remediate and exposure dwell times, while the vendor landscape is shifting. It cites Gartner’s Mitchell Schneider discussing the Exposure Assessment Platform Magic Quadrant and a future market convergence between Exposure Assessment Platforms and Adversarial Exposure Validation capabilities. Gartner has begun referring to a possible combined category called Unified Exposure Management Platform.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes a convergence between security and Governance, Risk, and Compliance functions. It says legacy quarterly risk oversight checklists and static Value at Risk modeling are inadequate for daily cloud-native infrastructure changes and real-time threat vectors. Gartner’s Deepti Gopal discussed Adaptive Cyber-Risk Governance, and the article cites survey findings that board-level influence is limited by insufficient cybersecurity understanding among board members and difficulty communicating technical risk in business terms. The article concludes that security leaders must become strategic business enablers, with Gartner recommending a Mobilization Coordinator role to connect prioritization, remediation, GRC, IT operations, and SOC workflows.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article presents XM Cyber’s initial reactions and key takeaways from the 2026 Gartner Security and Risk Summit, held at the Gaylord Resort in National Harbor, Maryland. XM Cyber describes the event as heavily attended by security leaders, practitioners, and vendors, and contrasts Gartner’s conference style with other industry events by emphasizing continuous learning and peer-to-peer engagement.\u003c/p\u003e\n\n\u003cp\u003eThe summit covered a range of topics, including AI, quantum computing, and privacy-enhancing technologies. XM Cyber’s write-up focuses on several themes that the author says stood out after multiple days of sessions, industry news, and market conversations.\u003c/p\u003e\n\n\u003ch2 id=\"ai-as-a-dual-use-cybersecurity-force\"\u003eAI as a Dual-Use Cybersecurity Force\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies AI as a central disruptive force in cybersecurity, with both defensive and offensive implications. It references Jeremy D’Hoinne’s session on the future of AI in cybersecurity as framing this dual nature.\u003c/p\u003e\n\n\u003cp\u003eOn the defensive side, the article says AI is helping security teams by:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAutomating routine compliance.\u003c/li\u003e\n\u003cli\u003eAccelerating threat detection.\u003c/li\u003e\n\u003cli\u003eAllowing security operations to scale faster.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eOn the attacker side, the article says AI is being used to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCraft hyper-convincing phishing campaigns.\u003c/li\u003e\n\u003cli\u003eAutomate exploit discovery.\u003c/li\u003e\n\u003cli\u003eBypass traditional defenses.\u003c/li\u003e\n\u003cli\u003eSupport AI-augmented attacks.\u003c/li\u003e\n\u003cli\u003eEnable prompt injections.\u003c/li\u003e\n\u003cli\u003eEnable agentic automation hijacks.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article argues that AI is not just a defensive shield, but a battleground where defenders and attackers are competing for advantage.\u003c/p\u003e\n\n\u003ch2 id=\"national-policy-attention-on-ai-security\"\u003eNational Policy Attention on AI Security\u003c/h2\u003e\n\n\u003cp\u003eThe article says the urgency around AI security has reached national policy levels. It cites a White House Executive Order on Promoting Advanced Artificial Intelligence Innovation and Security.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, that Executive Order explicitly mandates creation of a federal AI cybersecurity clearinghouse. The clearinghouse is described as coordinating the scanning, discovery, validation, and patching of software vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eAt the same time, the article says Gartner warns organizations not to focus too narrowly on AI’s operational efficiency benefits. Gartner predicts that by 2027, 90% of organizations using large language models primarily to reduce false positives and costs will miss their objectives to lower breach rates.\u003c/p\u003e\n\n\u003ch2 id=\"mythos-ai-hype-and-vulnerability-program-reality\"\u003eMythos, AI Hype, and Vulnerability Program Reality\u003c/h2\u003e\n\n\u003cp\u003eThe article says AI appeared in nearly every session, expo booth, and vendor pitch, with many conversations centered on Anthropic’s Mythos. It describes the Mythos narrative as powerful and says frontier models are clearly prominent in industry thinking.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article also says opinions differ on the actual impact these models will have on operating models. Some organizations are proactively retooling their technology stacks, while others are skeptical of the fanfare.\u003c/p\u003e\n\n\u003cp\u003eThe author says the conversation has moved beyond awe at vulnerability discovery capabilities and toward whether these models can help with the areas where vulnerability programs feel the most pain:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePrioritization.\u003c/li\u003e\n\u003cli\u003eValidation.\u003c/li\u003e\n\u003cli\u003eMobilization.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article argues that whether Mythos-like models transform the industry, become inputs into existing exposure management platforms, or fade as hype, successful CISOs are not defined by having the most AI tools. Instead, they are defined by knowing and proving which exposures actually matter.\u003c/p\u003e\n\n\u003ch2 id=\"reachability-exploitability-and-attack-path-reduction\"\u003eReachability, Exploitability, and Attack Path Reduction\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes reachability and exploitability as the starting point for effective exposure management. It explicitly contrasts these with “another dashboard.”\u003c/p\u003e\n\n\u003cp\u003eThe author says there are only a finite number of paths attackers can take and techniques they can use to exploit the exposures along those paths. By proactively identifying every possible path and eliminating those leading to critical assets, the article argues that organizations can mute the potential blast radius of an AI-fueled attack by default.\u003c/p\u003e\n\n\u003cp\u003eThis ties directly to XM Cyber’s broader emphasis on real-world attack path validation. The article also points readers to a related fireside chat with XM Cyber’s CISO Dan Anconina and Senior Sales Engineer Alex Welin.\u003c/p\u003e\n\n\u003ch2 id=\"ctem-and-exposure-management-market-convergence\"\u003eCTEM and Exposure Management Market Convergence\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Continuous Threat Exposure Management is no longer just a buzzword. It says organizations now understand exposure management, are actively adopting and investing in it, and are seeing reductions in mean time to remediate and exposure dwell times.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights a session by Gartner’s Mitchell Schneider discussing the recently published Exposure Assessment Platform Magic Quadrant. It describes Exposure Assessment Platforms as continuously identifying and prioritizing misconfigurations and vulnerabilities across broad asset classes.\u003c/p\u003e\n\n\u003cp\u003eThe article says Gartner sees the market moving toward convergence, with Exposure Assessment Platforms gradually merging with or consuming Adversarial Exposure Validation capabilities. Gartner has begun teasing a possible new combined category called Unified Exposure Management Platform, although the article says it is unclear when that research will begin in earnest.\u003c/p\u003e\n\n\u003ch2 id=\"shift-away-from-siloed-validation-and-cvss-only-thinking\"\u003eShift Away from Siloed Validation and CVSS-Only Thinking\u003c/h2\u003e\n\n\u003cp\u003eThe article describes this convergence as significant because exposure validation has historically been treated as a separate and siloed function. It says this function was often managed by isolated offensive teams using Breach and Attack Simulation or standalone penetration testing tools.\u003c/p\u003e\n\n\u003cp\u003eBy moving toward a CTEM and AI-driven model, the article says security teams can stop treating CVSS scores as gospel. Instead, they can focus on:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe attacker’s perspective.\u003c/li\u003e\n\u003cli\u003eThreat-informed control contexts.\u003c/li\u003e\n\u003cli\u003eFiltering noise to focus on the few exposures that matter most.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article cites a Gartner projection that by 2027, organizations integrating exposure assessment data directly into workflows will experience 30% less unplanned downtime from exploited vulnerabilities.\u003c/p\u003e\n\n\u003ch2 id=\"xm-cyber-s-positioning\"\u003eXM Cyber’s Positioning\u003c/h2\u003e\n\n\u003cp\u003eThe article states that XM Cyber has operated at the intersection of exposure assessment and validation since day one. It says XM Cyber’s foundational thesis is that modern enterprise attack surfaces can only be effectively managed by focusing on real-world attack path validation.\u003c/p\u003e\n\n\u003cp\u003eThe article says this means validating what is truly exploitable and protecting the critical assets and data that matter. It frames Gartner’s market direction as aligning with a shift XM Cyber says it has been pioneering for nearly a decade.\u003c/p\u003e\n\n\u003ch2 id=\"security-and-grc-convergence\"\u003eSecurity and GRC Convergence\u003c/h2\u003e\n\n\u003cp\u003eThe article says technical security teams and Governance, Risk, and Compliance functions have historically operated in silos. It describes tension between the two caused by differing motives, separate toolsets, and distinct operating realities.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, several forces are pushing these functions together:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe rise of enterprise AI.\u003c/li\u003e\n\u003cli\u003eDisruptions to traditional vulnerability management.\u003c/li\u003e\n\u003cli\u003eA volatile regulatory environment.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article references Gartner’s Deepti Gopal and her session on moving from “chaos to clarity” by replacing inflexible legacy risk systems with Adaptive Cyber-Risk Governance.\u003c/p\u003e\n\n\u003ch2 id=\"business-resilience-as-the-shared-goal\"\u003eBusiness Resilience as the Shared Goal\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that the convergence of security and GRC is necessary and welcome. It says both functions are internalizing a shared goal of improved business resilience.\u003c/p\u003e\n\n\u003cp\u003eThe article states that modern enterprise operations involve daily, ephemeral cloud-native technology shifts and instantaneous capital flows. It argues that real-time threat vectors and daily infrastructure changes cannot be managed with legacy quarterly risk oversight checklists or static Value at Risk modeling.\u003c/p\u003e\n\n\u003cp\u003eIt also cites Gartner’s CISO survey, which found that the top factors limiting a CISO’s ability to influence board-level decisions are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInsufficient understanding of cybersecurity among board members, at 49%.\u003c/li\u003e\n\u003cli\u003eThe complexity of communicating technical risk in business terms, at 41%.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"people-and-process-as-core-barriers\"\u003ePeople and Process as Core Barriers\u003c/h2\u003e\n\n\u003cp\u003eThe article says people and process remain critical hurdles to cybersecurity efficacy. It argues that prioritizing exposures based on exploitability, lateral movement, attack paths, and business impact can help bridge technical risk and corporate governance.\u003c/p\u003e\n\n\u003cp\u003eThe article says this alignment can transform GRC from a passive “security tax” into a real-time telemetry stream that supports risk-aware innovation.\u003c/p\u003e\n\n\u003ch2 id=\"mobilization-coordinator-role\"\u003eMobilization Coordinator Role\u003c/h2\u003e\n\n\u003cp\u003eThe article says Gartner has begun recommending dedicated headcount in the form of a new functional role called the Mobilization Coordinator. This role is intended to address the gap between automated identification and prioritization and the human-led conversations needed to fix issues.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, organizations may automate identification and prioritization successfully but still hit a wall when remediation requires coordination across teams.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the Mobilization Coordinator as a bridge that:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWorks with GRC to prioritize exposures impacting regulatory obligations.\u003c/li\u003e\n\u003cli\u003eCoordinates with IT operations to navigate patch deployments.\u003c/li\u003e\n\u003cli\u003eFeeds active exposure data into the SOC to improve threat detection and response.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eGartner predicts that by 2030, organizations implementing a dedicated Mobilization Coordinator will reduce critical exposure dwell time by up to 60%.\u003c/p\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s overall conclusion is that technology is no longer the primary barrier to effective exposure management. Instead, it says the main barriers are processes and people.\u003c/p\u003e\n\n\u003cp\u003eThe author says security leaders must move away from defensive gatekeeping and become strategic business enablers. Across the summit themes, the article emphasizes AI’s dual-use impact, the need for attack-path-based exposure prioritization, the convergence of exposure management categories, and closer alignment between security, GRC, IT operations, and SOC workflows.\u003c/p\u003e\n","keyPoints":["The 2026 Gartner Security and Risk Summit highlighted AI as both a defensive enabler for tasks like compliance automation and threat detection and an attacker advantage for phishing, exploit discovery, prompt injections, and agentic automation hijacks.","Gartner warned that by 2027, 90% of organizations using large language models primarily to reduce false positives and costs will miss their objectives to lower breach rates.","The article argues that effective exposure management depends on reachability, exploitability, and attack path validation rather than simply adopting more AI tools or dashboards.","Gartner described a market shift in which Exposure Assessment Platforms are converging with Adversarial Exposure Validation capabilities into a potential Unified Exposure Management Platform category.","Gartner recommended a dedicated Mobilization Coordinator role and predicted that organizations implementing it by 2030 will reduce critical exposure dwell time by up to 60%."],"insights":["Gartner’s prediction that LLM use focused mainly on reducing false positives and costs will fail to lower breach rates suggests organizations should measure AI security investments against breach reduction and exploitability outcomes, not only operational efficiency.","The article frames Anthropic’s Mythos discussion as shifting from model capability hype toward whether AI can improve the hardest parts of vulnerability programs: prioritization, validation, and mobilization.","Gartner’s emerging Unified Exposure Management Platform concept indicates that standalone exposure validation tools may become less distinct as the market absorbs Adversarial Exposure Validation into broader Exposure Assessment Platforms.","The proposed Mobilization Coordinator role highlights that remediation bottlenecks are increasingly organizational rather than technical, especially at the handoff between automated prioritization and human-led fixing work.","The convergence of security and GRC around business resilience implies that exposure data must be translated into regulatory, operational, and board-level risk terms rather than remaining a purely technical vulnerability-management metric."],"referencedReports":[{"title":"Exposure Assessment Platform (EAP) Magic Quadrant","url":"https://xmcyber.com/blog/xm-cyber-named-a-challenger-in-the-2025-gartner-magic-quadrant-for-exposure-assessment-platforms-eaps/","publisher":"Gartner","context":"The article references Gartner’s recently published Exposure Assessment Platform Magic Quadrant while discussing market convergence between exposure assessment and adversarial exposure validation capabilities.","category":"","primary":false}],"body":"\u003cp\u003eThe XM Cyber team attended the 2026 Gartner Security and Risk Summit at the Gaylord Resort in National Harbor, Maryland, and highlighted several takeaways from sessions and discussions at the event. The summit emphasized continuous learning and peer-to-peer engagement, with topics including AI, quantum computing, and privacy-enhancing technologies. The article presents AI as a central disruptive force for cybersecurity, creating benefits for defenders while also enabling more sophisticated attacker activity.\u003c/p\u003e\n\n\u003cp\u003eA major theme was that organizations should not focus only on acquiring AI tools, but should understand and prove which exposures actually matter. The article argues that reachability, exploitability, and attack path validation are more useful than additional dashboards when prioritizing security work. It also describes Gartner’s view that Exposure Assessment Platforms are moving toward convergence with Adversarial Exposure Validation capabilities under a possible Unified Exposure Management Platform category.\u003c/p\u003e\n\n\u003cp\u003eThe article also stresses that people and process are now major barriers to effective exposure management. Gartner discussed the need for security and GRC teams to converge around business resilience, and recommended a Mobilization Coordinator role to help move from automated identification and prioritization to human-led remediation. Gartner predicted that organizations implementing such a role by 2030 could reduce critical exposure dwell time by up to 60%.\u003c/p\u003e\n"},{"n":7,"title":"AI Phishing Is Crushing SOCs with Alert Volume: How to Reduce Tier 1 Overload","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/ai-phishing-is-crushing-socs-with-alert.html","time":"13:00","priority":"MAY READ","score":35,"tldr":"AI-generated phishing is increasing SOC alert volume and making Tier 1 triage harder, so the article argues teams need faster behavior-based analysis, automation, and structured reports to reduce escalations and response delays. It promotes ANY.RUN’s sandbox as a way to expose phishing chains quickly and cut Tier 1 workload.","briefOverview":"\u003cp\u003eAI-generated phishing is increasing alert volume for SOC teams by enabling attackers to produce convincing emails, fake login pages, and tailored lures quickly. The article says this makes it harder for Tier 1 analysts to dismiss alerts at a glance, especially when phishing campaigns use varied messages, personalized details, and short-lived domains. As queues grow, credential theft attempts or malware delivery can remain buried among routine checks.\u003c/p\u003e\n\n\u003cp\u003eThe article presents faster phishing triage as the main response to Tier 1 overload. It argues that automated checks, behavior-based visibility, and ready-made reports can help analysts reach clearer verdicts without pushing every uncertain case to Tier 2. It promotes ANY.RUN’s Interactive Sandbox as a way to inspect suspicious links in an isolated browser and expose redirects, hidden pages, and credential-harvesting forms.\u003c/p\u003e\n\n\u003cp\u003eA cited example describes a LinkedIn Drive link that led to a fake Microsoft 365 login page hosted on AWS CloudFront and designed to steal corporate credentials. The article says the full phishing chain was exposed inside ANY.RUN’s sandbox in under 60 seconds. It also says ANY.RUN’s reports include verdicts, IOCs, behavioral indicators, MITRE ATT\u0026amp;CK mapping, AI summaries, and recommendations to speed escalations and response.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article focuses on how AI is increasing the volume and quality of phishing attempts that SOC teams must triage. It says attackers can generate convincing emails, fake login pages, and tailored lures in minutes, creating more cases for Tier 1 analysts to review. The main operational concern is that important threats, such as credential theft attempts or malware delivery, may be delayed or buried as queues grow.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, AI-driven phishing changes the workload by producing more lure variations, better impersonation, personalized messages, short-lived domains, and more uncertain cases. These characteristics make similar campaigns look less identical, allow messages to resemble routine HR, finance, or IT requests, and reduce the usefulness of quick visual checks. Short-lived URLs can also return little or no reputation history, leaving analysts without a clear verdict.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that adding more manual checks is not an effective way to handle increased phishing volume. Instead, it recommends combining automated checks, behavior-based visibility, and ready-made reports. This approach is presented as a way for Tier 1 analysts to investigate more alerts while reducing repetitive steps and limiting escalations to cases that truly need deeper review.\u003c/p\u003e\n\n\u003cp\u003eANY.RUN’s Interactive Sandbox is described as a tool that lets teams open suspicious links in a real, isolated browser environment and interact with the page while tracing the attack chain. The article says this can reveal redirects, hidden pages, credential-harvesting forms, and behavior that reputation checks cannot see. In one example, a LinkedIn Drive link led to a fake Microsoft 365 login page hosted on AWS CloudFront, and the sandbox exposed the chain in under 60 seconds.\u003c/p\u003e\n\n\u003cp\u003eThe article also describes ANY.RUN’s automation and reporting features as ways to reduce Tier 1 workload and improve escalation quality. It says the sandbox can navigate pages, solve CAPTCHAs, and trigger hidden phishing steps, while analysts can step in when needed. It also says the Tier 1 Report consolidates verdicts, IOCs, behavioral indicators, MITRE ATT\u0026amp;CK mapping, AI summaries, and recommendations so Tier 2 teams do not need to rebuild the case.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that AI has turned phishing into a higher-volume and more difficult triage problem for SOC teams. It says attackers can now create convincing emails, fake login pages, and tailored lures in minutes. Each polished message creates another case for Tier 1 analysts to review, another link to inspect, and another alert that cannot be dismissed quickly.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central concern is Tier 1 overload. As phishing queues grow, a credential theft attempt or malware delivery attempt can become buried among routine checks. The article frames faster triage as a way to help SOC teams identify the alerts that could develop into serious incidents.\u003c/p\u003e\n\n\u003ch2 id=\"how-ai-phishing-increases-tier-1-workload\"\u003eHow AI Phishing Increases Tier 1 Workload\u003c/h2\u003e\n\n\u003cp\u003eThe article lists several AI-driven changes that make phishing harder for Tier 1 teams to process quickly:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMore lure variations mean similar campaigns no longer look identical, so more alerts require manual review.\u003c/li\u003e\n\u003cli\u003eBetter impersonation makes phishing emails sound like routine HR, finance, or IT requests, increasing the time spent checking context.\u003c/li\u003e\n\u003cli\u003ePersonalized messages use public company or employee details, allowing more emails to pass a quick visual check.\u003c/li\u003e\n\u003cli\u003eShort-lived domains often have little or no reputation history, causing tools to return “unknown” instead of a clear verdict.\u003c/li\u003e\n\u003cli\u003eMore uncertain cases leave Tier 1 with less evidence to close alerts confidently, increasing escalations to Tier 2.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe result described in the article is that Tier 1 spends more time on each alert and sends more unclear cases to Tier 2. As backlogs grow, critical threats may sit in the queue longer. The article says this can delay response and increase the risk of a costly incident.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-workflow-for-handling-ai-phishing-at-scale\"\u003eRecommended Workflow for Handling AI Phishing at Scale\u003c/h2\u003e\n\n\u003cp\u003eThe article says that adding more manual checks will not solve the problem. When phishing volume rises, Tier 1 needs a way to investigate more alerts without spending extra time on repetitive steps or escalating every uncertain case. The proposed workflow combines automated checks, behavior-based visibility, and ready-made reports.\u003c/p\u003e\n\n\u003cp\u003eThis approach is presented as a way to give Tier 1 analysts the evidence needed to reach a clear verdict sooner. It also aims to ensure Tier 2 only steps in when a case truly requires deeper investigation. The article’s examples and recommendations focus on ANY.RUN’s Interactive Sandbox and reporting features.\u003c/p\u003e\n\n\u003ch2 id=\"behavior-visibility-through-interactive-sandboxing\"\u003eBehavior Visibility Through Interactive Sandboxing\u003c/h2\u003e\n\n\u003cp\u003eThe article says reputation checks can be insufficient when attackers launch new phishing variations faster than reputation systems can keep up. Even if a message looks convincing and a URL has no known history, analysts still need a way to see what happens after a user clicks. ANY.RUN’s Interactive Sandbox is described as allowing teams to open suspicious links in a real browser environment, interact with the page, and trace the full attack chain without risking company devices or infrastructure.\u003c/p\u003e\n\n\u003cp\u003eA cited case involved a routine-looking LinkedIn Drive link that led to a fake Microsoft 365 login page. The page was designed to steal corporate credentials. The article says the phishing content was hosted on AWS CloudFront and filtered out free email domains, helping it stay under the radar.\u003c/p\u003e\n\n\u003cp\u003eThe article says the full chain in that case was exposed inside the sandbox in under 60 seconds. It presents this as useful for busy Tier 1 teams because it can reveal redirects, hidden pages, and credential-harvesting forms in one session. It also says this helps analysts reach verdicts on fresh URLs even when those links have no known history.\u003c/p\u003e\n\n\u003ch2 id=\"automation-with-analyst-interactivity\"\u003eAutomation With Analyst Interactivity\u003c/h2\u003e\n\n\u003cp\u003eThe article distinguishes ANY.RUN’s approach from traditional automation by saying traditional automation may miss phishing pages that appear only after a redirect, CAPTCHA, or specific user action. It says such automation may save time on basic checks while still leaving Tier 1 analysts with incomplete results and additional manual investigation work.\u003c/p\u003e\n\n\u003cp\u003eANY.RUN is described as combining automation with interactivity. Once enabled, the sandbox opens suspicious links in an isolated browser, navigates through pages, solves CAPTCHAs, and triggers hidden steps in the phishing chain. The article says team members can also step in at any point when a case needs closer review.\u003c/p\u003e\n\n\u003cp\u003eThe stated benefits include cutting repetitive investigation steps and increasing Tier 1 capacity. The article also says this can help SOCs absorb alert spikes without immediately adding headcount. Human judgment remains available for complex threats because analysts can interact with the session when needed.\u003c/p\u003e\n\n\u003ch2 id=\"tier-1-reports-and-tier-2-handoff\"\u003eTier 1 Reports and Tier 2 Handoff\u003c/h2\u003e\n\n\u003cp\u003eThe article says escalation can remain slow even after Tier 1 confirms a threat. If findings are scattered across different tools, senior team members may need to repeat the same checks before deciding what to do next. To address this, the article describes ANY.RUN’s Tier 1 Report as a ready-to-use handoff after analysis is complete.\u003c/p\u003e\n\n\u003cp\u003eThe report is described as combining:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe verdict.\u003c/li\u003e\n\u003cli\u003eKey IOCs.\u003c/li\u003e\n\u003cli\u003eBehavioral indicators.\u003c/li\u003e\n\u003cli\u003eMITRE ATT\u0026amp;CK mapping.\u003c/li\u003e\n\u003cli\u003eAI Summary explaining what happened and why the activity is malicious.\u003c/li\u003e\n\u003cli\u003eAI Recommendations suggesting next investigation and response steps.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this allows Tier 1 to send a structured report instead of raw technical data. It frames this as a way to prevent Tier 2 from rebuilding the case, reduce the delay between triage and containment, standardize escalations across shifts, and give SOC leaders better oversight of bottlenecks and escalation quality.\u003c/p\u003e\n\n\u003ch2 id=\"claimed-operational-impact\"\u003eClaimed Operational Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article presents faster phishing triage as a form of stronger business protection. It says AI phishing does not only create more alerts, but also keeps SOC teams busy while real threats move closer to the business. The article says teams getting ahead of the problem are giving Tier 1 a faster way to confirm threats, close routine cases, and escalate the right incidents with evidence already prepared.\u003c/p\u003e\n\n\u003cp\u003eThe article reports the following results for teams using ANY.RUN:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e94% of users report faster triage and clearer decisions.\u003c/li\u003e\n\u003cli\u003eUp to 20% decrease in Tier 1 workload.\u003c/li\u003e\n\u003cli\u003e30% fewer Tier 1-to-Tier 2 escalations.\u003c/li\u003e\n\u003cli\u003eUp to 21 minutes faster MTTR per case.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-takeaway\"\u003eOverall Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that AI-enabled phishing increases both alert volume and uncertainty for SOC Tier 1 teams. It argues that reputation checks and manual review are not enough when phishing campaigns use fresh URLs, convincing impersonation, redirects, CAPTCHAs, and hidden content. The article promotes behavior-based sandbox analysis, automated interaction, and structured reporting as ways to reduce Tier 1 overload and speed escalation to Tier 2.\u003c/p\u003e\n","keyPoints":["AI enables attackers to create convincing phishing emails, fake login pages, and tailored lures quickly, increasing the number of alerts Tier 1 SOC analysts must review.","AI-driven phishing causes more lure variations, better impersonation, personalized messages, short-lived domains, and uncertain cases that are harder for Tier 1 teams to dismiss quickly.","The article says ANY.RUN’s Interactive Sandbox lets teams open suspicious links in an isolated browser environment and trace the full phishing chain without risking company devices or infrastructure.","ANY.RUN’s sandbox can automate steps such as navigating pages, solving CAPTCHAs, and triggering hidden phishing content while still allowing analysts to interact with sessions when needed.","The article says ANY.RUN’s Tier 1 Report provides verdicts, IOCs, behavioral indicators, MITRE ATT\u0026CK mapping, AI summaries, and recommendations to speed Tier 1-to-Tier 2 handoffs."],"insights":["Reputation-based URL checks are less decisive against AI-enabled phishing because short-lived domains often return an “unknown” verdict, forcing analysts to rely on post-click behavior instead.","Interactive sandboxing can reveal phishing infrastructure that is hidden behind redirects, CAPTCHAs, or required user actions, which traditional automation may miss.","A cited phishing case used an AWS CloudFront-hosted fake Microsoft 365 login page and filtered out free email domains, showing how attackers use cloud hosting and targeting logic to evade casual review.","Standardized Tier 1 reports can reduce duplicate work by giving Tier 2 teams a ready-made package of verdicts, IOCs, behavioral findings, MITRE ATT\u0026CK mapping, and recommended next steps."],"referencedReports":[],"body":"\u003cp\u003eAI-generated phishing is increasing alert volume for SOC teams by enabling attackers to produce convincing emails, fake login pages, and tailored lures quickly. The article says this makes it harder for Tier 1 analysts to dismiss alerts at a glance, especially when phishing campaigns use varied messages, personalized details, and short-lived domains. As queues grow, credential theft attempts or malware delivery can remain buried among routine checks.\u003c/p\u003e\n\n\u003cp\u003eThe article presents faster phishing triage as the main response to Tier 1 overload. It argues that automated checks, behavior-based visibility, and ready-made reports can help analysts reach clearer verdicts without pushing every uncertain case to Tier 2. It promotes ANY.RUN’s Interactive Sandbox as a way to inspect suspicious links in an isolated browser and expose redirects, hidden pages, and credential-harvesting forms.\u003c/p\u003e\n\n\u003cp\u003eA cited example describes a LinkedIn Drive link that led to a fake Microsoft 365 login page hosted on AWS CloudFront and designed to steal corporate credentials. The article says the full phishing chain was exposed inside ANY.RUN’s sandbox in under 60 seconds. It also says ANY.RUN’s reports include verdicts, IOCs, behavioral indicators, MITRE ATT\u0026amp;CK mapping, AI summaries, and recommendations to speed escalations and response.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {

function pointList(items) {

function ReportsPanel({ reports }) {

}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
