window.__DL_ARTICLES = [{"n":6,"title":"FortiBleed Targeted FortiGate Firewalls in 110 Million-Credential Harvesting Operation","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/fortibleed-targeted-fortigate-firewalls.html","time":"18:20","priority":"MUST READ","score":95,"tldr":"A Russian-speaking initial access broker is linked to FortiBleed, a large credential-harvesting campaign that compromised FortiGate firewalls and other internet-facing systems to collect more than 110 million credentials. The operation used mass scanning, brute forcing, and a custom FortigateSniffer tool to steal cleartext credentials and hashes for resale, lateral movement, and further intrusions.","briefOverview":"\u003cp\u003eA Russian-speaking initial access broker driven by financial gain is assessed to be behind FortiBleed, a large-scale credential-harvesting operation targeting more than 430,000 FortiGate firewalls globally. The campaign has been active since February 2026 and involves collecting credential lists, searching for exposed services, brute-forcing accessible systems, and deploying custom sniffers on compromised firewalls. SOCRadar said the sniffers capture cleartext and hashed credentials from traffic passing through compromised devices, which are then cracked, validated, and reused against Active Directory domains and other exposed services.\u003c/p\u003e\n\n\u003cp\u003eCentral to the operation is FortigateSniffer, a Golang-based tool that uses the FortiOS built-in “diagnose sniffer packet” command to passively capture authentication traffic from infected appliances. The tool monitors traffic across 24 protocols and extracts credentials from services such as Kerberos, SMB, LDAP, RDP, WinRM, MS-SQL, MySQL, PostgreSQL, and RADIUS. The attackers are estimated to have launched at least 659 credential-harvesting pipelines on May 31 and June 15, 2026, identifying more than 110 million credentials, including RADIUS credentials, NTLM hashes, Kerberos hashes, and MySQL authentication tokens.\u003c/p\u003e\n\n\u003cp\u003eSOCRadar said FortiBleed appears to be part of a broader multi-vendor initial access operation that also targets Synology NAS, Sophos firewalls, RDWeb portals, Citrix SSL-VPNs, and MS-SQL servers using automated brute-forcing. The campaign focuses heavily on small and medium businesses with fewer than 200 employees, with notable emphasis on the United States and India and a key focus on the IT services sector. The operation includes target ranking by economic value, geofencing to specific IP ranges, activity limited to Moscow working hours, and use of stolen credentials for lateral movement, Active Directory enumeration, data exfiltration, and persistent authenticated access.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A Russian-speaking initial access broker is assessed to be behind FortiBleed, a large-scale credential-harvesting operation that has targeted over 430,000 FortiGate firewalls globally since February 2026.","The campaign collects credential lists, searches for exposed services, brute-forces accessible systems, and deploys bespoke sniffers on compromised firewalls to capture cleartext and hashed credentials.","A Golang-based tool called FortigateSniffer uses the FortiOS built-in diagnostic command “diagnose sniffer packet” to passively capture authentication traffic across 24 protocols from compromised appliances.","SOCRadar said FortiBleed appears to be part of a broader multi-vendor initial access operation targeting Fortinet devices, Synology NAS, Sophos firewalls, RDWeb portals, Citrix SSL-VPNs, and MS-SQL servers.","The attackers are estimated to have launched at least 659 credential-harvesting pipelines on May 31 and June 15, 2026, identifying more than 110 million credentials including RADIUS credentials, NTLM hashes, Kerberos hashes, and MySQL authentication tokens."],"insights":["The actors ranked targets by economic value before allocating exploitation resources, indicating that the campaign was not purely indiscriminate despite relying on mass scanning and brute forcing.","The campaign focused heavily on small and medium businesses with fewer than 200 employees, and IT services providers were a key target because compromising them could create access paths into customer environments.","The sniffing activity included operational controls such as geofencing to specific IP ranges and limiting activity to between 7 a.m. and 6 p.m. Moscow Time.","Some username and password pairs were repeated across thousands of distinct IP addresses, which Zenox said raises the possibility that the accounts were planted by the attacker as clandestine backdoor access.","The FortiGate-related operation ran in five-hour cycles with 1,000 simultaneous validation threads, and early cycles reportedly had a successful validation rate near 90%."],"referencedReports":[{"title":"Dismantling FortiBleed","url":"https://socradar.io/wp-content/uploads/2026/06/Dismantling-FortiBleed.pdf","publisher":"SOCRadar","context":"The article cites SOCRadar’s fresh report as the main source for details on FortiBleed’s credential harvesting, tooling, targets, and attack stages.","category":"","primary":false},{"title":"What SpyCloud Found Inside the FortiBleed Threat Actor Infrastructure","url":"https://spycloud.com/blog/what-spycloud-found-inside-the-fortibleed-threat-actor-infrastructure/","publisher":"SpyCloud","context":"The article references SpyCloud’s findings on FortiBleed infrastructure, including timing of the capture cycle, hash-cracking setup, and the broader targeting of internet-facing appliances.","category":"","primary":false}],"body":"\u003cp\u003eA Russian-speaking initial access broker driven by financial gain is assessed to be behind FortiBleed, a large-scale credential-harvesting operation targeting more than 430,000 FortiGate firewalls globally. The campaign has been active since February 2026 and involves collecting credential lists, searching for exposed services, brute-forcing accessible systems, and deploying custom sniffers on compromised firewalls. SOCRadar said the sniffers capture cleartext and hashed credentials from traffic passing through compromised devices, which are then cracked, validated, and reused against Active Directory domains and other exposed services.\u003c/p\u003e\n\n\u003cp\u003eCentral to the operation is FortigateSniffer, a Golang-based tool that uses the FortiOS built-in “diagnose sniffer packet” command to passively capture authentication traffic from infected appliances. The tool monitors traffic across 24 protocols and extracts credentials from services such as Kerberos, SMB, LDAP, RDP, WinRM, MS-SQL, MySQL, PostgreSQL, and RADIUS. The attackers are estimated to have launched at least 659 credential-harvesting pipelines on May 31 and June 15, 2026, identifying more than 110 million credentials, including RADIUS credentials, NTLM hashes, Kerberos hashes, and MySQL authentication tokens.\u003c/p\u003e\n\n\u003cp\u003eSOCRadar said FortiBleed appears to be part of a broader multi-vendor initial access operation that also targets Synology NAS, Sophos firewalls, RDWeb portals, Citrix SSL-VPNs, and MS-SQL servers using automated brute-forcing. The campaign focuses heavily on small and medium businesses with fewer than 200 employees, with notable emphasis on the United States and India and a key focus on the IT services sector. The operation includes target ranking by economic value, geofencing to specific IP ranges, activity limited to Moscow working hours, and use of stolen credentials for lateral movement, Active Directory enumeration, data exfiltration, and persistent authenticated access.\u003c/p\u003e\n"},{"n":2,"title":"Cisco Unified CM flaw CVE-2026-20230 now exploited in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/cisco-unified-cm-sme-flaw-cve-2026-20230-now-exploited-in-attacks/","time":"21:48","priority":"MUST READ","score":94,"tldr":"Cisco Unified Communications Manager flaw CVE-2026-20230 is now being exploited, with attackers able to abuse an SSRF bug to write files that can lead to root-level compromise. Cisco patched the issue on June 3, and defenders should update urgently as public exploit details are now available.","briefOverview":"\u003cp\u003eA high-severity server-side request forgery vulnerability in Cisco Unified Communications Manager Server, tracked as CVE-2026-20230, is now being exploited in attacks. Cisco released security updates for the flaw on June 3 and warned that successful exploitation could allow attackers to gain root privileges on affected devices. The issue affects Cisco Unified Communications Manager and Cisco Unified Communications Manager Session Management Edition.\u003c/p\u003e\n\n\u003cp\u003eCisco said the vulnerability is caused by improper input validation for specific HTTP requests. An unauthenticated remote attacker could exploit it by sending a crafted HTTP request to an affected device, allowing files to be written to the underlying operating system for later privilege escalation. Threat intelligence firm Defused reported that exploitation was observed over the weekend and originated from a single IP address using properly constructed file:// payloads.\u003c/p\u003e\n\n\u003cp\u003eDefused said the observed proof-of-concept activity appeared to be reconnaissance, attempting to write a file named \u003ccode\u003e/tmp/cve-2026-20230-test.txt\u003c/code\u003e to vulnerable devices. SSD Secure later published a technical write-up and proof-of-concept exploit explaining how the Webdialer component’s handling of user-supplied URLs can be abused for arbitrary file writes. The article notes that broader targeting is likely now that the flaw has been fully disclosed.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Cisco Unified Communications Manager and Unified Communications Manager Session Management Edition are affected by CVE-2026-20230, a high-severity server-side request forgery flaw.","Cisco released security updates for CVE-2026-20230 on June 3 and warned that successful exploitation could allow attackers to write files that could later be used to gain root privileges.","Defused reported that CVE-2026-20230 is now being actively exploited from a single IP address using file:// payloads to create files on affected devices.","The observed proof-of-concept activity attempted to write a text file named /tmp/cve-2026-20230-test.txt, suggesting the current exploitation is reconnaissance in nature.","SSD Secure published a technical write-up and proof-of-concept exploit showing how Webdialer URL handling can be abused to write arbitrary files and achieve remote code execution."],"insights":["Defused reported active exploitation even though the flaw was not yet listed in CISA’s Known Exploited Vulnerabilities catalog at the time of the article.","The observed activity used a specific test artifact, /tmp/cve-2026-20230-test.txt, which gives defenders a concrete file path to check for signs of probing.","SSD Secure said exploitation requires the target system’s hostname, but its write-up showed that attackers can retrieve that information from the device before carrying out the file-write attack.","The exploitation observed by Defused appeared to be reconnaissance rather than full compromise, but a technical write-up and proof-of-concept exploit were published after the activity was disclosed."],"referencedReports":[{"title":"Cisco Unified Communications Manager and Unified Communications Manager Session Management Edition Server-Side Request Forgery Vulnerability","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-cucm-ssrf-cXPnHcW","publisher":"Cisco","context":"The article cites Cisco’s security advisory warning that CVE-2026-20230 could allow unauthenticated remote attackers to conduct SSRF attacks and write files used to elevate to root.","category":"","primary":false},{"title":"Cisco Unified Communications Manager Arbitrary File Write to RCE","url":"https://ssd-disclosure.com/cisco-unified-communications-manager-arbitrary-file-write-to-rce/","publisher":"SSD Secure","context":"The article references SSD Secure’s technical write-up explaining how the Webdialer component can be abused to write arbitrary files and achieve remote code execution.","category":"","primary":false}],"body":"\u003cp\u003eA high-severity server-side request forgery vulnerability in Cisco Unified Communications Manager Server, tracked as CVE-2026-20230, is now being exploited in attacks. Cisco released security updates for the flaw on June 3 and warned that successful exploitation could allow attackers to gain root privileges on affected devices. The issue affects Cisco Unified Communications Manager and Cisco Unified Communications Manager Session Management Edition.\u003c/p\u003e\n\n\u003cp\u003eCisco said the vulnerability is caused by improper input validation for specific HTTP requests. An unauthenticated remote attacker could exploit it by sending a crafted HTTP request to an affected device, allowing files to be written to the underlying operating system for later privilege escalation. Threat intelligence firm Defused reported that exploitation was observed over the weekend and originated from a single IP address using properly constructed file:// payloads.\u003c/p\u003e\n\n\u003cp\u003eDefused said the observed proof-of-concept activity appeared to be reconnaissance, attempting to write a file named \u003ccode\u003e/tmp/cve-2026-20230-test.txt\u003c/code\u003e to vulnerable devices. SSD Secure later published a technical write-up and proof-of-concept exploit explaining how the Webdialer component’s handling of user-supplied URLs can be abused for arbitrary file writes. The article notes that broader targeting is likely now that the flaw has been fully disclosed.\u003c/p\u003e\n"},{"n":3,"title":"Healthtech firm Xolis suffers data breach impacting 1.4 million people","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/healthtech-firm-xolis-suffers-data-breach-impacting-14-million-people/","time":"19:59","priority":"MUST READ","score":92,"tldr":"Xsolis says a targeted phishing attack gave attackers access to files containing sensitive personal and health information for nearly 1.4 million people. The company has contained the incident, reset passwords, added security measures, and is offering affected individuals 12 months of identity monitoring through Kroll.","briefOverview":"\u003cp\u003eHealthcare technology company Xsolis says sensitive data belonging to nearly 1.4 million individuals was compromised after a targeted phishing attack gave attackers access to part of its network. The company detected unauthorized activity on January 22, 2026, after the phishing attack occurred on January 20, 2026. Xsolis says it contained the activity and began an investigation with external cybersecurity experts.\u003c/p\u003e\n\n\u003cp\u003eThe investigation found that attackers accessed certain files in the Xsolis environment containing customer information. The exposed data included names, addresses, dates of birth, health insurance information, Social Security numbers, and medical treatment information. According to data provided to the U.S. Department of Health and Human Services, 1,396,519 people are impacted.\u003c/p\u003e\n\n\u003cp\u003eXsolis develops AI-powered software used by more than 600 hospitals and health insurers for utilization management, medical necessity reviews, patient status determinations, discharge planning, and reimbursement decisions. The company reported the incident to law enforcement, is notifying potentially affected individuals by mail, and said it is not aware of any attempted misuse of the exposed information. Xsolis also reset passwords for all users and key accounts, increased system monitoring, strengthened credential management, accelerated employee security training, and is offering 12 months of identity monitoring and identity theft restoration services through Kroll.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Xsolis says a targeted phishing attack on January 20, 2026 led to unauthorized activity in a limited portion of its environment that it detected on January 22, 2026.","The attackers accessed certain files containing customer information, including names, addresses, dates of birth, health insurance information, Social Security numbers, and medical treatment information.","Data provided to the U.S. Department of Health and Human Services indicates that 1,396,519 people are impacted by the incident.","Xsolis says it contained the activity, launched an investigation with external cybersecurity experts, reported the incident to law enforcement, and is notifying potentially affected individuals by mail.","The company says it reset passwords for all users and key accounts, increased system monitoring, strengthened credential management, accelerated employee security training, and is offering 12 months of identity monitoring and identity theft restoration services through Kroll."],"insights":["A breach described as affecting only a limited portion of Xsolis’s environment still exposed data tied to nearly 1.4 million people, showing how concentrated healthcare technology providers can hold large volumes of sensitive information.","The exposed information combines identity, insurance, and medical treatment details, which is why Xsolis specifically warned affected individuals to stay alert for targeted attacks despite saying it is not aware of misuse.","Xsolis’s response focused heavily on account security, including resetting passwords for all users and key accounts, strengthening credential management, and accelerating employee security training.","Because Xsolis serves more than 600 hospitals and health insurers, the incident affects people through a healthcare technology provider rather than directly through a hospital or insurer named in the article."],"referencedReports":[],"body":"\u003cp\u003eHealthcare technology company Xsolis says sensitive data belonging to nearly 1.4 million individuals was compromised after a targeted phishing attack gave attackers access to part of its network. The company detected unauthorized activity on January 22, 2026, after the phishing attack occurred on January 20, 2026. Xsolis says it contained the activity and began an investigation with external cybersecurity experts.\u003c/p\u003e\n\n\u003cp\u003eThe investigation found that attackers accessed certain files in the Xsolis environment containing customer information. The exposed data included names, addresses, dates of birth, health insurance information, Social Security numbers, and medical treatment information. According to data provided to the U.S. Department of Health and Human Services, 1,396,519 people are impacted.\u003c/p\u003e\n\n\u003cp\u003eXsolis develops AI-powered software used by more than 600 hospitals and health insurers for utilization management, medical necessity reviews, patient status determinations, discharge planning, and reimbursement decisions. The company reported the incident to law enforcement, is notifying potentially affected individuals by mail, and said it is not aware of any attempted misuse of the exposed information. Xsolis also reset passwords for all users and key accounts, increased system monitoring, strengthened credential management, accelerated employee security training, and is offering 12 months of identity monitoring and identity theft restoration services through Kroll.\u003c/p\u003e\n"},{"n":4,"title":"New macOS ClickFix attack silently mounts DMGs to push infostealer","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/new-macos-clickfix-attack-silently-mounts-dmgs-to-push-infostealer/","time":"18:30","priority":"SHOULD READ","score":84,"tldr":"A new macOS ClickFix campaign tricks users with fake CAPTCHA pages into pasting Terminal commands that silently download, mount, and launch DMG-based Atomic macOS Stealer malware. The malware steals passwords, browser data, crypto wallets, Keychain files, messaging app data, and documents, so users should never run website-provided Terminal commands they do not fully understand.","briefOverview":"\u003cp\u003eA new macOS ClickFix campaign is using fake CAPTCHA pages to trick users into opening Terminal and pasting a malicious command. Palo Alto Networks Unit 42 discovered the campaign, which infects Mac devices with the Atomic macOS Stealer infostealer. The article says ClickFix has grown in popularity among threat actors and has been used by both cybercriminals and state-sponsored hacking groups to distribute malware.\u003c/p\u003e\n\n\u003cp\u003eOnce executed, the command downloads a DMG file from an attacker-controlled server, silently mounts it with macOS’s native hdiutil utility, searches for an application bundle or installer, and launches it automatically. The attack uses curl with quiet flags to save the DMG in the /tmp folder under a random filename, then uses hdiutil attach -nobrowse so the disk image does not appear in Finder or on the desktop. Researchers observed a malicious disk image named s.01M0td.dmg that mounted a volume containing a self-signed application bundle named NNApp.app.\u003c/p\u003e\n\n\u003cp\u003eThe delivered malware is part of the Atomic macOS Stealer family and steals browser credentials, browser history, authentication tokens, cryptocurrency wallet data, Keychain data, messaging app information, Apple Notes databases, Safari cookies, and user documents. It also displays a fake System Preferences authentication prompt to steal the user’s password and can replace legitimate Ledger Live and Trezor Suite installations with malicious versions. Palo Alto observed command-and-control servers at svs-verificationdate[.]beer and 196.251.107[.]171, and the article warns users not to run Terminal commands from websites unless they fully understand them.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Palo Alto Networks Unit 42 discovered a macOS ClickFix campaign that uses fake CAPTCHA pages to instruct users to open Terminal and paste a malicious command.","The command downloads a DMG file from an attacker-controlled server, silently mounts it with macOS hdiutil, searches for an .app or .pkg, and launches it with the macOS open command.","The campaign delivers Atomic macOS Stealer, which steals browser credentials, browser history, authentication tokens, cryptocurrency wallet data, Apple Keychain database files, messaging app data, Apple Notes databases, and user documents.","The malware displays a fake System Preferences authentication prompt to trick the user into entering their password.","Palo Alto observed command-and-control servers at svs-verificationdate[.]beer and 196.251.107[.]171."],"insights":["The campaign reduces visible user interaction compared with earlier DMG-based ClickFix attacks by using Terminal to download, mount, locate, and launch the payload automatically instead of relying on the user to open the downloaded disk image manually.","The use of macOS’s native hdiutil with the -nobrowse option makes the mounted disk image less obvious to the user because it does not appear in Finder or on the desktop.","The malware’s fake System Preferences password prompt is especially actionable for users because it shows that a request for the Mac password during this flow is part of the theft attempt described by researchers.","Beyond stealing wallet files, the malware can replace legitimate Ledger Live and Trezor Suite installations with malicious versions, making installed cryptocurrency management apps part of the risk."],"referencedReports":[],"body":"\u003cp\u003eA new macOS ClickFix campaign is using fake CAPTCHA pages to trick users into opening Terminal and pasting a malicious command. Palo Alto Networks Unit 42 discovered the campaign, which infects Mac devices with the Atomic macOS Stealer infostealer. The article says ClickFix has grown in popularity among threat actors and has been used by both cybercriminals and state-sponsored hacking groups to distribute malware.\u003c/p\u003e\n\n\u003cp\u003eOnce executed, the command downloads a DMG file from an attacker-controlled server, silently mounts it with macOS’s native hdiutil utility, searches for an application bundle or installer, and launches it automatically. The attack uses curl with quiet flags to save the DMG in the /tmp folder under a random filename, then uses hdiutil attach -nobrowse so the disk image does not appear in Finder or on the desktop. Researchers observed a malicious disk image named s.01M0td.dmg that mounted a volume containing a self-signed application bundle named NNApp.app.\u003c/p\u003e\n\n\u003cp\u003eThe delivered malware is part of the Atomic macOS Stealer family and steals browser credentials, browser history, authentication tokens, cryptocurrency wallet data, Keychain data, messaging app information, Apple Notes databases, Safari cookies, and user documents. It also displays a fake System Preferences authentication prompt to steal the user’s password and can replace legitimate Ledger Live and Trezor Suite installations with malicious versions. Palo Alto observed command-and-control servers at svs-verificationdate[.]beer and 196.251.107[.]171, and the article warns users not to run Terminal commands from websites unless they fully understand them.\u003c/p\u003e\n"},{"n":8,"title":"The post-quantum EO is an important milestone. Now it’s time to get to work","source":"blog.cloudflare.com","sourceColorIdx":2,"link":"https://blog.cloudflare.com/post-quantum-eo-2026/","time":"18:25","priority":"SHOULD READ","score":78,"tldr":"Cloudflare welcomes the new U.S. executive order setting 2030–2031 deadlines for federal post-quantum cryptography migration, but argues agencies and vendors must start now, especially on public Internet traffic and authentication. The key takeaway is that post-quantum readiness cannot wait for full inventories or future guidance because harvest-now-decrypt-later risks already exist.","briefOverview":"\u003cp\u003eOn June 22, 2026, President Trump signed Executive Order 14409, “Securing the Nation Against Advanced Cryptographic Attacks.” The order sets a December 31, 2030 deadline for federal agencies to transition their most sensitive systems to post-quantum encryption, and a December 31, 2031 deadline for post-quantum authentication. It also directs federal contractors to comply with post-quantum Federal Information Processing Standards by the end of 2030.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that the order is an important milestone because the timeline for quantum computers that can break today’s public-key cryptography has accelerated. It distinguishes between post-quantum encryption, which is needed now to reduce the risk of attackers collecting encrypted traffic today and decrypting it later, and post-quantum authentication, which is needed to prevent future impersonation, forged certificates, and malicious signatures once a cryptographically relevant quantum computer exists. Cloudflare says the encryption transition is already well underway, while authentication is still in early stages and must begin concurrently because the one-year gap between the EO deadlines is tight.\u003c/p\u003e\n\n\u003cp\u003eThe article says the contractor requirements may create broad supply-chain pressure because federal agencies can only migrate if the products they buy support post-quantum cryptography. Cloudflare recommends that organizations protect public Internet traffic now, update procurement requirements, use a quantum impact inventory to prioritize work, and plan early for authentication systems such as long-lived keys, root certificates, and code-signing infrastructure. It also urges OMB guidance to define what it means to “transition,” include crypto agility, avoid letting exhaustive cryptographic inventories delay action, and keep post-quantum cryptography affordable.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["President Trump signed Executive Order 14409 on June 22, 2026, setting deadlines of December 31, 2030, for federal agencies to transition their most sensitive systems to post-quantum encryption and December 31, 2031, for post-quantum authentication.","The order applies binding deadlines to federal High Value Assets and high impact systems, while National Security Systems are excluded because they are on a separate NSA-managed track with deadlines between 2030 and 2033.","The article says post-quantum encryption is needed now to prevent attackers from collecting encrypted traffic today and decrypting it later once powerful quantum computers are available.","The article argues that post-quantum authentication is a larger migration challenge because it requires coordinated upgrades across clients, servers, certificate authorities, certificate transparency logs, root stores, and browsers.","Cloudflare recommends that organizations protect public Internet traffic now, update procurement requirements to demand post-quantum support, use a quantum impact inventory to prioritize migration, and begin planning for post-quantum authentication."],"insights":["The article warns that merely supporting post-quantum algorithms may not be enough, because systems that still allow classical-only handshakes could remain exposed to downgrade attacks unless quantum-vulnerable cryptography is disabled.","Cloudflare argues that agencies should not wait for exhaustive cryptographic bills of materials before acting, because such inventories can take a full procurement cycle, become stale, and miss systems that should be using cryptography but are not.","The one-year gap between the 2030 encryption deadline and the 2031 authentication deadline is described as too tight for sequential work, so organizations need to begin both migrations in parallel.","The federal contractor requirements may be among the order’s most impactful provisions because they create supply-chain pressure for vendors to ship post-quantum-capable products that will also be used outside the federal government.","The article identifies public Internet traffic as the most immediately actionable starting point because it is easiest for adversaries to collect today for later decryption."],"referencedReports":[{"title":"Transition to Post-Quantum Cryptography Standards","url":"https://nvlpubs.nist.gov/nistpubs/ir/2024/NIST.IR.8547.ipd.pdf","publisher":"NIST","context":"The article cites NIST's 2024 statement that classical public-key cryptography should be deprecated by 2030 and disallowed by 2035.","category":"","primary":false},{"title":"Safeguarding cryptocurrency by disclosing quantum vulnerabilities responsibly","url":"https://research.google/blog/safeguarding-cryptocurrency-by-disclosing-quantum-vulnerabilities-responsibly/","publisher":"Google","context":"The article cites this as one of the research breakthroughs that contributed to Cloudflare accelerating its post-quantum security target to 2029.","category":"","primary":false},{"title":"arXiv:2603.28627","url":"https://arxiv.org/abs/2603.28627","publisher":"Oratomic","context":"The article cites this as one of the research breakthroughs that contributed to Cloudflare accelerating its post-quantum security target to 2029.","category":"","primary":false},{"title":"CNSA 2.0 Algorithms","url":"https://media.defense.gov/2025/May/30/2003728741/-1/-1/0/CSA_CNSA_2.0_ALGORITHMS.PDF","publisher":"NSA","context":"The article references this document for the separate post-quantum migration deadlines for National Security Systems.","category":"","primary":false},{"title":"Product Categories for Technologies That Use Post-Quantum Cryptography Standards","url":"https://www.cisa.gov/resources-tools/resources/product-categories-technologies-use-post-quantum-cryptography-standards","publisher":"CISA","context":"The article cites CISA's guidance distinguishing product categories where post-quantum cryptography is widely available from those still transitioning.","category":"","primary":false},{"title":"arXiv:2603.22442","url":"https://arxiv.org/abs/2603.22442","publisher":"arXiv","context":"The article cites this research while arguing that cryptographic bills of materials can be less useful when they list keys without understanding their purpose.","category":"","primary":false}],"body":"\u003cp\u003eOn June 22, 2026, President Trump signed Executive Order 14409, “Securing the Nation Against Advanced Cryptographic Attacks.” The order sets a December 31, 2030 deadline for federal agencies to transition their most sensitive systems to post-quantum encryption, and a December 31, 2031 deadline for post-quantum authentication. It also directs federal contractors to comply with post-quantum Federal Information Processing Standards by the end of 2030.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that the order is an important milestone because the timeline for quantum computers that can break today’s public-key cryptography has accelerated. It distinguishes between post-quantum encryption, which is needed now to reduce the risk of attackers collecting encrypted traffic today and decrypting it later, and post-quantum authentication, which is needed to prevent future impersonation, forged certificates, and malicious signatures once a cryptographically relevant quantum computer exists. Cloudflare says the encryption transition is already well underway, while authentication is still in early stages and must begin concurrently because the one-year gap between the EO deadlines is tight.\u003c/p\u003e\n\n\u003cp\u003eThe article says the contractor requirements may create broad supply-chain pressure because federal agencies can only migrate if the products they buy support post-quantum cryptography. Cloudflare recommends that organizations protect public Internet traffic now, update procurement requirements, use a quantum impact inventory to prioritize work, and plan early for authentication systems such as long-lived keys, root certificates, and code-signing infrastructure. It also urges OMB guidance to define what it means to “transition,” include crypto agility, avoid letting exhaustive cryptographic inventories delay action, and keep post-quantum cryptography affordable.\u003c/p\u003e\n"},{"n":9,"title":"VA OIG Identifies Lack of Oversight of VA GenAI Chat Tools","source":"health-isac.org","sourceColorIdx":8,"link":"https://health-isac.org/va-oig-identifies-lack-of-oversight-of-va-genai-chat-tools/","time":"19:01","priority":"SHOULD READ","score":78,"tldr":"A VA OIG review found that Department of Veterans Affairs staff use of generative AI chat tools lacks sufficient safeguards and oversight, creating potential patient safety and sensitive data exposure risks. Health-ISAC points healthcare organizations to AI governance guidance to help manage these risks.","briefOverview":"\u003cp\u003eA review of Department of Veterans Affairs staff use of generative artificial intelligence tools identified potential patient safety risks. The article says these risks stem from a lack of safeguards and oversight. It highlights the issue as the use of generative AI tools in healthcare accelerates.\u003c/p\u003e\n\n\u003cp\u003eHealth-ISAC said concern is growing that sensitive patient data may be shared with publicly accessible chatbots. The article also says AI tools could generate output that puts patients at risk of harm or even death. These concerns make oversight and safeguards important for healthcare organizations using generative AI and large language models.\u003c/p\u003e\n\n\u003cp\u003eEarlier this year, Health-ISAC and the Health Sector Coordinating Council Cybersecurity Working Group issued guidance on developing effective AI governance frameworks. The article names Health-ISAC’s “Policies and Safeguards for a Safe Use of AI” white paper and the HSCC Health Industry AI Cyber Governance Framework Implementation Guide. It says these resources are intended to help healthcare organizations create governance and safeguards frameworks and responsibly use GenAI and LLMs while minimizing risk.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["A review of Department of Veterans Affairs staff use of generative artificial intelligence tools identified potential patient safety risks from a lack of safeguards and oversight.","Health-ISAC said concern is growing that sensitive patient data may be shared with publicly accessible chatbots as generative AI tools are used more widely in healthcare.","Health-ISAC said AI tools could generate output that puts patients at risk of harm or even death.","Health-ISAC and the Health Sector Coordinating Council Cybersecurity Working Group issued guidance earlier this year on developing effective AI governance frameworks.","The article directs readers to Health-ISAC’s white paper, “Policies and Safeguards for a Safe Use of AI,” and the HSCC Health Industry AI Cyber Governance Framework Implementation Guide."],"insights":["The article frames generative AI risk in healthcare as both a patient privacy issue and a patient safety issue, because it cites risks from sensitive data sharing and harmful AI-generated output.","The article highlights publicly accessible chatbots as a specific concern, showing that healthcare organizations need safeguards for staff use of common external AI tools, not only internally approved systems.","Health-ISAC and the Health Sector Coordinating Council have already published sector-specific AI governance guidance, so healthcare organizations have named resources they can use to build safeguards rather than starting from scratch."],"referencedReports":[{"title":"HSCC Health Industry AI Cyber Governance Framework Implementation Guide","url":"https://healthsectorcouncil.org/ai-cyber-governance/","publisher":"Health Sector Coordinating Council Cybersecurity Working Group","context":"The article references this guide as guidance to help healthcare organizations create AI governance and safeguards frameworks for responsible GenAI and LLM use.","category":"","primary":false}],"body":"\u003cp\u003eA review of Department of Veterans Affairs staff use of generative artificial intelligence tools identified potential patient safety risks. The article says these risks stem from a lack of safeguards and oversight. It highlights the issue as the use of generative AI tools in healthcare accelerates.\u003c/p\u003e\n\n\u003cp\u003eHealth-ISAC said concern is growing that sensitive patient data may be shared with publicly accessible chatbots. The article also says AI tools could generate output that puts patients at risk of harm or even death. These concerns make oversight and safeguards important for healthcare organizations using generative AI and large language models.\u003c/p\u003e\n\n\u003cp\u003eEarlier this year, Health-ISAC and the Health Sector Coordinating Council Cybersecurity Working Group issued guidance on developing effective AI governance frameworks. The article names Health-ISAC’s “Policies and Safeguards for a Safe Use of AI” white paper and the HSCC Health Industry AI Cyber Governance Framework Implementation Guide. It says these resources are intended to help healthcare organizations create governance and safeguards frameworks and responsibly use GenAI and LLMs while minimizing risk.\u003c/p\u003e\n"},{"n":5,"title":"Five Eyes agencies sound alarm about AI’s threat to cybersecurity","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/five-eyes-alert-artificial-intelligence","time":"18:45","priority":"MAY READ","score":70,"tldr":"Five Eyes cyber agencies warned that frontier AI could transform offensive and defensive cyber capabilities within months, shrinking the time between vulnerability discovery and exploitation. They urged business leaders to urgently reduce attack surfaces, harden access controls, speed patching, retire legacy systems, and strengthen cyber resilience.","briefOverview":"\u003cp\u003eFive Eyes intelligence agencies from the U.S., U.K., Canada, Australia and New Zealand warned that rapidly evolving AI is an urgent cybersecurity threat that business leaders must address immediately. Their announcement said frontier AI models will likely exceed current industry expectations and could fundamentally transform both offensive and defensive cyber capabilities. The agencies said the timeline is measured in months, not years.\u003c/p\u003e\n\n\u003cp\u003eThe announcement said AI lowers barriers for malicious actors and increases the speed and complexity of attacks. It warned that AI is shrinking the window between vulnerability discovery and exploitation, making faster defensive action necessary. The article also notes that the U.S. Cybersecurity and Infrastructure Security Agency recently began requiring federal agencies to use a prioritization triage system for patching some vulnerabilities in less than three days, partly based on whether they use AI.\u003c/p\u003e\n\n\u003cp\u003eThe Five Eyes agencies urged leaders to reduce attack surfaces by cutting off unnecessary system access and external connectivity, pressure test whether systems need to be exposed, and speed up patching. They said unsupported legacy systems are easy targets and called them strategic liabilities rather than just technical debt. The announcement also recommended stronger access controls, tough authentication, funding and authority for internal cyber leaders, secure-by-design and secure-by-default practices, and defense in depth.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Five Eyes intelligence agencies warned that rapidly evolving AI is an urgent cybersecurity threat that business leaders must address immediately.","The agencies said frontier AI models could exceed current industry expectations within months and transform both offensive and defensive cyber capabilities.","The announcement said AI lowers barriers for malicious actors, increases the speed and complexity of attacks, and shrinks the window between vulnerability discovery and exploitation.","The agencies urged leaders to reduce attack surfaces, limit unnecessary access and external connectivity, speed up patching, address unsupported legacy systems, and strengthen access controls.","The announcement recommended that business leaders fund and empower internal cyber leaders, follow evolving guidance, adopt secure-by-design and secure-by-default approaches, and maintain defense in depth."],"insights":["The Five Eyes agencies framed the AI-driven cyber risk as a board and executive responsibility, saying cyber resilience must work under pressure and that simply having controls is not enough.","The announcement treats unsupported legacy systems as business-level strategic liabilities rather than just technical debt because they are easy targets.","The agencies emphasized reducing unnecessary system exposure and external connectivity, making attack-surface reduction an immediate leadership action rather than only a technical cleanup task.","The article links the Five Eyes warning to recent U.S. government actions, including faster federal vulnerability triage and restrictions on Anthropic model exports, showing that AI-related cyber risk is already influencing policy decisions."],"referencedReports":[{"title":"Five Eyes cyber security agencies statement","url":"https://www.cyber.gov.au/about-us/view-all-content/news/five-eyes-cyber-security-agencies-statement?utm_source=linkedin\u0026utm_campaign=fvey-statement-ai\u0026utm_medium=organic\u0026utm_content=guidance\u0026mkt_tok=MTM4LUVaTS0wNDIAAAGilGpxgRpzil9-u_c143aw2PPqw9d_Zd_3rG03qwNPjHxybEg77XRP2JR3DHU3GM96UFgEPRId6LI3reiuKDB4kGx-kWUwXXQdSvHnj9TEoPLAUg","publisher":"Five Eyes cyber security agencies","context":"The article is based on a Five Eyes announcement warning that rapidly evolving AI is an urgent cybersecurity threat and urging business leaders to strengthen defenses.","category":"","primary":false}],"body":"\u003cp\u003eFive Eyes intelligence agencies from the U.S., U.K., Canada, Australia and New Zealand warned that rapidly evolving AI is an urgent cybersecurity threat that business leaders must address immediately. Their announcement said frontier AI models will likely exceed current industry expectations and could fundamentally transform both offensive and defensive cyber capabilities. The agencies said the timeline is measured in months, not years.\u003c/p\u003e\n\n\u003cp\u003eThe announcement said AI lowers barriers for malicious actors and increases the speed and complexity of attacks. It warned that AI is shrinking the window between vulnerability discovery and exploitation, making faster defensive action necessary. The article also notes that the U.S. Cybersecurity and Infrastructure Security Agency recently began requiring federal agencies to use a prioritization triage system for patching some vulnerabilities in less than three days, partly based on whether they use AI.\u003c/p\u003e\n\n\u003cp\u003eThe Five Eyes agencies urged leaders to reduce attack surfaces by cutting off unnecessary system access and external connectivity, pressure test whether systems need to be exposed, and speed up patching. They said unsupported legacy systems are easy targets and called them strategic liabilities rather than just technical debt. The announcement also recommended stronger access controls, tough authentication, funding and authority for internal cyber leaders, secure-by-design and secure-by-default practices, and defense in depth.\u003c/p\u003e\n"},{"n":1,"title":"Windows 11 KB5095093 update rolls out new Point-in-Time restore feature","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/microsoft/windows-11-kb5095093-update-rolls-out-new-point-in-time-restore-feature/","time":"20:22","priority":"MAY READ","score":68,"tldr":"Microsoft’s optional Windows 11 KB5095093 preview update for versions 24H2 and 25H2 begins rolling out a new Point-in-Time Restore feature that can roll back the full PC state using recent restore points. The update also includes many fixes and improvements, including a Recycle Bin filename bug fix, though a known issue with third-party apps launching Office documents remains.","briefOverview":"\u003cp\u003eMicrosoft released the KB5095093 preview cumulative update for Windows 11 24H2 and 25H2. The update is part of Microsoft’s optional monthly non-security preview update schedule, which tests fixes and features ahead of the next Patch Tuesday. It can be installed through Windows Update or downloaded manually from the Microsoft Update Catalog.\u003c/p\u003e\n\n\u003cp\u003eThe update begins rolling out Point-in-Time Restore, a feature that lets users restore a Windows PC to the state it was in at an earlier point in time. Microsoft says it can restore the operating system, applications, and files in minutes using restore points stored locally with Volume Shadow Copy Service. Consumer restore points are created every 24 hours and kept for up to 72 hours or until allocated storage runs out, while enterprise licenses can configure shorter or longer snapshot and retention intervals.\u003c/p\u003e\n\n\u003cp\u003eKB5095093 also includes numerous fixes and improvements, including a fix for a Recycle Bin issue that could show an internal file name instead of the original file name when permanently deleting a file. Other changes cover areas such as Secure Boot certificate rollout, authentication, networking, the emoji panel, widgets, File Explorer, Bluetooth, printing, WSL, graphics, accessibility, and general reliability. Microsoft says a known issue remains where third-party applications may be unable to launch Microsoft Office applications or open documents, and affected users should open the application or document directly.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Microsoft released the optional KB5095093 preview cumulative update for Windows 11 24H2 and 25H2 as part of its monthly non-security preview update schedule.","The update begins rolling out Point-in-Time Restore, which lets users restore a Windows PC, including apps, settings, and personal files, to a recent automatic restore point.","For consumers, Point-in-Time Restore creates new restore points every 24 hours and deletes them after 72 hours or when allocated storage space runs out.","KB5095093 fixes a known Recycle Bin issue where the confirmation dialog could show an internal file name instead of the original file name when permanently deleting a file.","Microsoft says a known issue remains where third-party applications may be unable to launch Microsoft Office applications or open documents, and affected users should open the application or document directly."],"insights":["Point-in-Time Restore is limited to recent recovery because restore points are kept for a maximum of 72 hours, so it is designed for fast rollback from recent issues rather than long-term recovery.","Enterprise-licensed systems have more control than consumer systems because they can configure restore point capture and retention intervals at 4, 6, 12, 16, or 24 hours.","Because KB5095093 is an optional non-security preview update, users normally must choose “Download and install” unless they have enabled “Get the latest updates as soon as they're available.”","Increasing the storage space allocated to Point-in-Time Restore can allow more frequent snapshots without them being deleted because of low storage.","Affected users who encounter the remaining Office launch issue should open the Office application or document directly instead of launching it through the affected third-party software."],"referencedReports":[{"title":"June 23, 2026—KB5095093 (OS Builds 26200.8737 and 26100.8737) Preview","url":"https://support.microsoft.com/en-us/topic/june-23-2026-kb5095093-os-builds-26200-8737-and-26100-8737-preview-0e2a20f2-cf9e-46f8-9f08-e6996220882d#id0ebbn=gradual_rollout","publisher":"Microsoft","context":"The article cites Microsoft's support bulletin as the location of the full release notes for the KB5095093 preview update.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft released the KB5095093 preview cumulative update for Windows 11 24H2 and 25H2. The update is part of Microsoft’s optional monthly non-security preview update schedule, which tests fixes and features ahead of the next Patch Tuesday. It can be installed through Windows Update or downloaded manually from the Microsoft Update Catalog.\u003c/p\u003e\n\n\u003cp\u003eThe update begins rolling out Point-in-Time Restore, a feature that lets users restore a Windows PC to the state it was in at an earlier point in time. Microsoft says it can restore the operating system, applications, and files in minutes using restore points stored locally with Volume Shadow Copy Service. Consumer restore points are created every 24 hours and kept for up to 72 hours or until allocated storage runs out, while enterprise licenses can configure shorter or longer snapshot and retention intervals.\u003c/p\u003e\n\n\u003cp\u003eKB5095093 also includes numerous fixes and improvements, including a fix for a Recycle Bin issue that could show an internal file name instead of the original file name when permanently deleting a file. Other changes cover areas such as Secure Boot certificate rollout, authentication, networking, the emoji panel, widgets, File Explorer, Bluetooth, printing, WSL, graphics, accessibility, and general reliability. Microsoft says a known issue remains where third-party applications may be unable to launch Microsoft Office applications or open documents, and affected users should open the application or document directly.\u003c/p\u003e\n"},{"n":7,"title":"Silent Push partners with CDL Cyber Intelligence to bring preemptive defense to the United Kingdom","source":"silentpush.com","sourceColorIdx":6,"link":"https://www.silentpush.com/news/silent-push-partners-with-cdl-cyber-intelligence/?utm_source=rss\u0026utm_medium=rss\u0026utm_campaign=silent-push-partners-with-cdl-cyber-intelligence","time":"20:07","priority":"MAY READ","score":35,"tldr":"Silent Push has partnered with UK-based CDL Cyber Intelligence to offer preemptive threat intelligence that identifies attacker infrastructure before campaigns reach targets. The partnership focuses on giving UK organizations earlier warning against state-linked and other threats using Silent Push’s Context Graph and Traffic Origin capabilities.","briefOverview":"\u003cp\u003eSilent Push has entered a strategic partnership with CDL Cyber Intelligence, an intelligence-led cybersecurity firm serving organisations across the UK and Europe. CDL’s team includes former intelligence officers, ethical hackers, and security engineers with experience in threat intelligence, incident response, attack surface management, and dark web monitoring. The article says CDL’s clients include organisations across government, financial services, healthcare, and critical infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe partnership is presented as a way to bring preemptive defense to the United Kingdom by identifying attacker preparation before campaigns reach targets. Silent Push says capable threat actors often register infrastructure, age domains, and set up hosting weeks or months before targeting organisations. Its Context Graph tracks how infrastructure is created, managed, and connected across DNS, WHOIS, certificates, and hosting data, then surfaces clusters as Indicators of Future Attack when they match adversary operational patterns.\u003c/p\u003e\n\n\u003cp\u003eThe article states that CDL’s clients get an average of 157 days of lead time before a campaign reaches their perimeter. It also says the UK faces sustained attention because it is a NATO member, a major financial centre, and a jurisdiction with significant government and critical infrastructure targets. Silent Push highlights Traffic Origin as another relevant capability, saying it identifies the true upstream country of origin controlling a connection even when the observed IP looks clean.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Silent Push has entered a strategic partnership with CDL Cyber Intelligence, an intelligence-led cybersecurity firm serving organisations across the UK and Europe.","CDL Cyber Intelligence’s team includes former intelligence officers, ethical hackers, and security engineers with experience in threat intelligence, incident response, attack surface management, and dark web monitoring.","Silent Push says its Context Graph tracks infrastructure creation and connections across DNS, WHOIS, certificates, and hosting data to surface Indicators of Future Attack before campaigns reach targets.","The article states that CDL’s clients get an average of 157 days of lead time before a campaign reaches their perimeter.","Silent Push says its Traffic Origin capability identifies the true upstream country of origin controlling a connection, even when the observed IP appears clean."],"insights":["The article emphasizes that useful warning signs can appear during the attacker preparation phase, when domains, hosting, and related infrastructure are being set up weeks or months before a target is approached.","Silent Push frames the UK as a high-priority environment for preemptive defense because it combines NATO membership, major financial activity, government targets, and critical infrastructure exposure.","The article highlights residential proxies and VPN infrastructure as a specific challenge for UK organisations because attackers can make their activity appear local and legitimate.","The partnership is positioned around CDL’s ability to interpret and act on raw intelligence, not just deploy security tools, which is presented as necessary for using Silent Push’s early-warning data effectively."],"referencedReports":[],"body":"\u003cp\u003eSilent Push has entered a strategic partnership with CDL Cyber Intelligence, an intelligence-led cybersecurity firm serving organisations across the UK and Europe. CDL’s team includes former intelligence officers, ethical hackers, and security engineers with experience in threat intelligence, incident response, attack surface management, and dark web monitoring. The article says CDL’s clients include organisations across government, financial services, healthcare, and critical infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThe partnership is presented as a way to bring preemptive defense to the United Kingdom by identifying attacker preparation before campaigns reach targets. Silent Push says capable threat actors often register infrastructure, age domains, and set up hosting weeks or months before targeting organisations. Its Context Graph tracks how infrastructure is created, managed, and connected across DNS, WHOIS, certificates, and hosting data, then surfaces clusters as Indicators of Future Attack when they match adversary operational patterns.\u003c/p\u003e\n\n\u003cp\u003eThe article states that CDL’s clients get an average of 157 days of lead time before a campaign reaches their perimeter. It also says the UK faces sustained attention because it is a NATO member, a major financial centre, and a jurisdiction with significant government and critical infrastructure targets. Silent Push highlights Traffic Origin as another relevant capability, saying it identifies the true upstream country of origin controlling a connection even when the observed IP looks clean.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

// Shared card chrome so the front and back faces render identical tokens.
function CardTitle({ children }) {
  return (
    <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 20, lineHeight: 1.3, letterSpacing: "-0.005em", color: "var(--text)" }}>
      {children}
    </h2>
  );
}

function SourceTag({ article }) {
  const srcColor = `var(--p${article.sourceColorIdx})`;
  return (
    <>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
        {article.source}
      </span>
    </>
  );
}

function numberedList(items, accent) {
  return (
    <ul style={{ listStyle: "none", marginTop: 10, display: "grid", gap: 8 }}>
      {(items || []).map((item, i) => (
        <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: accent, marginTop: 3, letterSpacing: "0.04em" }}>
            {String(i + 1).padStart(2, "0")}
          </span>
          <span style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55 }}>{item}</span>
        </li>
      ))}
    </ul>
  );
}

function KeyPointsSection({ keyPoints, accent }) {
  if (!keyPoints || keyPoints.length === 0) return null;
  return (
    <div style={{ marginTop: 18 }}>
      <span className="section-label" style={{ marginBottom: 10 }}>KEY POINTS</span>
      {numberedList(keyPoints, accent)}
    </div>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            {report.primary && <span className="report-primary">PRIMARY</span>}
            <a className="report-link" href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
            {report.category && <span className={"report-cat report-cat-" + report.category}>{report.category}</span>}
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const priorityC = priorityColor(article.priority);
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => (
    <>
      <p style={{ color: "var(--text)", fontSize: 13, lineHeight: 1.55, margin: 0 }}>{article.tldr}</p>
      <KeyPointsSection keyPoints={article.keyPoints} accent={priorityC} />
    </>
  ) });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose summary" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  // Key Points are folded under the TL;DR tab so the flipped (behind) view's default
  // matches the front card. Only surface a standalone tab when there is no TL;DR to host them.
  if (!article.tldr && article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => numberedList(article.keyPoints, priorityC) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => numberedList(article.insights, priorityC) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  // Read mode (the flipped detail view) opens on the Brief overview when present;
  // otherwise it falls back to the first available tab (TL;DR, then others).
  const initialTab = tabs.some(t => t.id === "brief") ? "brief" : (tabs[0] ? tabs[0].id : "source");
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  const [theme, setTheme] = React.useState(() => document.documentElement.dataset.theme || 'dark');
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
