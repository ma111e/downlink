<script type="application/json" id="dl-articles">[{"n":1,"title":"FBI disrupts massive AI-powered phishing service using a million URLs","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/fbi-disrupts-massive-ai-powered-phishing-service-using-a-million-urls/","time":"14:36","priority":"SHOULD READ","score":86,"tldr":"The FBI, with Google and Black Lotus Labs, disrupted Outsider Enterprise, a China-based AI-assisted phishing-as-a-service operation tied to over a million fraudulent URLs and millions of stolen credit card records. The takedown seized servers, domains, wallets, and a Telegram bot as part of Operation Riptide.","briefOverview":"\u003cp\u003eThe FBI, working with Google and Black Lotus Labs, dismantled a large Chinese phishing-as-a-service operation called Outsider Enterprise. The operation used AI and distributed phishing kits to run campaigns impersonating trusted brands in text messages sent through AT\u0026amp;T, T-Mobile, and Verizon. Google linked the operation to 9,000 fake websites and more than a million fraudulent URLs.\u003c/p\u003e\n\n\u003cp\u003eAuthorities believe campaigns powered by Outsider Enterprise stole more than 3.8 million credit card records and caused an estimated \u003cspan class=\"math inline\"\u003e\\(1.9 billion in losses. The FBI action was part of Operation Riptide and included technical and legal components. Seized assets included administration servers, a Shopify storefront, a testing account, about \\)\u003c/span\u003e100,000 in USDT, phishing domains, and a Telegram bot linked to the service.\u003c/p\u003e\n\n\u003cp\u003eGoogle said the operation affected hundreds of thousands of users worldwide and sent 2.5 million SMS messages to Android users over a two-week period in May. Android users flagged 55,000 of those messages as fraudulent. Google also filed a civil lawsuit targeting the infrastructure and is coordinating with AT\u0026amp;T, T-Mobile, and Verizon to block fraudulent messages before they reach subscribers.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe FBI, in coordination with Google and Black Lotus Labs, disrupted a major Chinese phishing-as-a-service operation known as Outsider Enterprise. The operation had been active since at least 2023 and used thousands of phishing websites to steal credit card data and passwords. Google connected Outsider Enterprise to 9,000 fake websites and more than a million fraudulent URLs.\u003c/p\u003e\n\n\u003cp\u003eOutsider Enterprise used AI and distributed phishing kits to support campaigns that impersonated trusted brands. The campaigns were delivered through text messages sent through AT\u0026amp;T, T-Mobile, and Verizon. Google said the operation coordinated through Telegram and distributed phishing kits that allowed criminals to send fake text campaigns appearing to come from Google and other trusted brands.\u003c/p\u003e\n\n\u003cp\u003eAuthorities believe the phishing campaigns powered by Outsider Enterprise led to the theft of more than 3.8 million credit card records. The estimated losses were placed at $1.9 billion. Google said the AI-assisted phishing operation affected hundreds of thousands of users worldwide and that victims lost millions to the scams.\u003c/p\u003e\n\n\u003cp\u003eThe takedown was part of the FBI’s broader Operation Riptide, which targets cybercrime activity and infrastructure. During the technical action, the FBI and partners seized multiple administration servers, a Shopify e-commerce storefront, and an account used by the threat actor to test the phishing service. The agency also seized about $100,000 in USDT from Outsider payment wallets and redirected thousands of phishing domains registered at U.S. providers to an FBI splash page.\u003c/p\u003e\n\n\u003cp\u003eThe FBI also took over a Telegram bot linked to Outsider Enterprise that contained information on customers of the phishing service. Google filed a civil lawsuit targeting the operation’s infrastructure and is working with AT\u0026amp;T, T-Mobile, and Verizon to block fraudulent messages before they reach subscribers. Google also cited Android protections, including scam detection for suspicious calls and messaging protections that block more than 10 billion malicious messages every month.\u003c/p\u003e\n\n\u003cp\u003eOver a two-week period in May, Google said 2.5 million SMS messages were sent to Android users from Outsider Enterprise infrastructure. Android users flagged 55,000 of those messages as fraudulent. Google is using the case to support seven bipartisan U.S. anti-scam bills, including the Stop SCAMS Act, which would require the FBI to lead a coordinated national anti-scam strategy.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe FBI, working with Google and Black Lotus Labs, dismantled a large Chinese phishing-as-a-service operation called Outsider Enterprise. The operation used AI and distributed phishing kits to support campaigns that impersonated trusted brands and attempted to steal credit card data and passwords. The campaigns were delivered through text messages sent through AT\u0026amp;T, T-Mobile, and Verizon.\u003c/p\u003e\n\n\u003cp\u003eOutsider Enterprise had been active since at least 2023. Google linked the operation to 9,000 fake websites and more than a million fraudulent URLs. Authorities believe campaigns powered by the service led to the theft of more than 3.8 million credit card records and caused an estimated $1.9 billion in losses.\u003c/p\u003e\n\n\u003ch2 id=\"operation-riptide-and-the-takedown\"\u003eOperation Riptide and the takedown\u003c/h2\u003e\n\n\u003cp\u003eThe action against Outsider Enterprise was part of the FBI’s broader Operation Riptide, which targets cybercrime activity and infrastructure. The effort had both technical and legal components.\u003c/p\u003e\n\n\u003cp\u003eDuring the technical takedown, the FBI and partners seized multiple pieces of infrastructure and assets, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMultiple administration servers.\u003c/li\u003e\n\u003cli\u003eA Shopify e-commerce storefront.\u003c/li\u003e\n\u003cli\u003eAn account the threat actor used to test the phishing service.\u003c/li\u003e\n\u003cli\u003eAround $100,000 in USDT from Outsider payment wallets.\u003c/li\u003e\n\u003cli\u003eThousands of phishing domains registered at U.S. providers, which now redirect to an FBI splash page.\u003c/li\u003e\n\u003cli\u003eA Telegram bot linked to Outsider Enterprise that contained information on customers of the phishing service.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"phishing-infrastructure-and-techniques\"\u003ePhishing infrastructure and techniques\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Outsider Enterprise as a phishing-as-a-service operation that distributed phishing kits. Google said the network coordinated through Telegram and provided kits that allowed criminals to send fake text campaigns appearing to come from Google and other trusted brands.\u003c/p\u003e\n\n\u003cp\u003eThe operation used AI in support of phishing campaigns. The campaigns impersonated trusted brands in SMS messages and directed users toward phishing infrastructure. Google said the AI-assisted phishing operation affected hundreds of thousands of users worldwide.\u003c/p\u003e\n\n\u003cp\u003eGoogle reported that, over a two-week period in May, 2.5 million SMS messages were sent to Android users from Outsider Enterprise infrastructure. Android users flagged 55,000 of those messages as fraudulent.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe article cites several impact figures tied to Outsider Enterprise and its campaigns:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGoogle linked the operation to 9,000 fake websites.\u003c/li\u003e\n\u003cli\u003eGoogle connected the operation to more than one million fraudulent URLs.\u003c/li\u003e\n\u003cli\u003eAuthorities believe more than 3.8 million credit card records were stolen through campaigns powered by the service.\u003c/li\u003e\n\u003cli\u003eEstimated losses were placed at $1.9 billion.\u003c/li\u003e\n\u003cli\u003eGoogle said hundreds of thousands of users worldwide were affected.\u003c/li\u003e\n\u003cli\u003eGoogle estimated that hundreds of thousands of victims lost millions to these scams.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"legal-and-private-sector-response\"\u003eLegal and private-sector response\u003c/h2\u003e\n\n\u003cp\u003eGoogle filed a civil lawsuit targeting the operation’s infrastructure. The company is also coordinating with AT\u0026amp;T, T-Mobile, and Verizon to block fraudulent messages before they reach subscribers.\u003c/p\u003e\n\n\u003cp\u003eGoogle said it is using the case to combine aggressive legal action with collaboration involving federal and state governments. It is also advocating for seven bipartisan U.S. anti-scam bills, including the Stop SCAMS Act.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the Stop SCAMS Act would require the FBI to lead a coordinated national anti-scam strategy. That strategy would bring together federal agencies, law enforcement, and private companies to better track, disrupt, and prevent fraud and scam operations.\u003c/p\u003e\n\n\u003ch2 id=\"android-protections-described-by-google\"\u003eAndroid protections described by Google\u003c/h2\u003e\n\n\u003cp\u003eGoogle said Android users are protected from these threats by AI-powered defenses. The defenses include scam detection on Android that warns users about suspicious calls and messaging protections that block more than 10 billion malicious messages every month.\u003c/p\u003e\n\n\u003cp\u003eThe article presents these Android protections alongside Google’s legal action and coordination with telecommunications providers. Together, the response described in the article includes law enforcement seizures, civil litigation, telecom blocking, domain redirection, and platform-level defenses.\u003c/p\u003e\n","keyPoints":["The FBI, working with Google and Black Lotus Labs, dismantled a Chinese phishing-as-a-service operation called Outsider Enterprise that used thousands of phishing websites to steal credit card data and passwords.","Google linked Outsider Enterprise to 9,000 fake websites and more than a million fraudulent URLs, and authorities believe its campaigns stole more than 3.8 million credit card records causing an estimated $1.9 billion in losses.","During the takedown, the FBI and partners seized multiple administration servers, a Shopify storefront, a testing account, about $100,000 in USDT, and a Telegram bot linked to Outsider Enterprise.","Google filed a civil lawsuit targeting the operation’s infrastructure and is coordinating with AT\u0026T, T-Mobile, and Verizon to block fraudulent messages before they reach subscribers.","Google said Outsider Enterprise sent 2.5 million SMS messages to Android users over a two-week period in May, with Android users flagging 55,000 of them as fraudulent."],"insights":["The disruption combined law enforcement seizures, private-sector litigation, telecom filtering, and domain redirection, showing that the response targeted both the operators and the delivery infrastructure of the phishing service.","Outsider Enterprise’s use of Telegram for coordination and a bot containing customer information indicates that takedowns of criminal communication tools can expose downstream users of phishing-as-a-service platforms.","The article highlights SMS as a major delivery channel for AI-assisted phishing, with Google reporting 2.5 million messages sent to Android users in just two weeks from Outsider Enterprise infrastructure.","Google is pairing technical defenses with policy advocacy, using the case to support bipartisan anti-scam legislation such as the Stop SCAMS Act."],"referencedReports":[],"body":"\u003cp\u003eThe FBI, working with Google and Black Lotus Labs, dismantled a large Chinese phishing-as-a-service operation called Outsider Enterprise. The operation used AI and distributed phishing kits to run campaigns impersonating trusted brands in text messages sent through AT\u0026amp;T, T-Mobile, and Verizon. Google linked the operation to 9,000 fake websites and more than a million fraudulent URLs.\u003c/p\u003e\n\n\u003cp\u003eAuthorities believe campaigns powered by Outsider Enterprise stole more than 3.8 million credit card records and caused an estimated \u003cspan class=\"math inline\"\u003e\\(1.9 billion in losses. The FBI action was part of Operation Riptide and included technical and legal components. Seized assets included administration servers, a Shopify storefront, a testing account, about \\)\u003c/span\u003e100,000 in USDT, phishing domains, and a Telegram bot linked to the service.\u003c/p\u003e\n\n\u003cp\u003eGoogle said the operation affected hundreds of thousands of users worldwide and sent 2.5 million SMS messages to Android users over a two-week period in May. Android users flagged 55,000 of those messages as fraudulent. Google also filed a civil lawsuit targeting the infrastructure and is coordinating with AT\u0026amp;T, T-Mobile, and Verizon to block fraudulent messages before they reach subscribers.\u003c/p\u003e\n"}]</script>
