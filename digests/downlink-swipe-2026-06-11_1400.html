<script>
window.__DL_ARTICLES = [{"n":6,"title":"The Gentlemen Ransomware Claims 478 Victims, Can Spread Like a Worm","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/the-gentlemen-ransomware-claims-478.html","time":"16:50","priority":"SHOULD READ","score":88,"tldr":"The Gentlemen ransomware group has rapidly grown into a major RaaS operation with 478 claimed victims, evolving from affiliate activity into an independent program led by a Russian-speaking actor tied to prior ransomware crews. Its Go-based ransomware can spread worm-like across networks, supports multiple platforms, and is backed by mature affiliate support, BYOVD evasion, and aggressive double-extortion tactics.","briefOverview":"\u003cp\u003eA PRODAFT analysis says The Gentlemen ransomware operation, tracked by the company as Phantom Mantis, evolved from an affiliate conducting double-extortion attacks into an independent partnership program in July 2025. The group previously leveraged resources from RaaS schemes including LockBit, Qilin, and Medusa. The Gentlemen has been active since March 2025 and has claimed 478 victims to date, according to Ransomware.Live data cited in the article.\u003c/p\u003e\n\n\u003cp\u003ePRODAFT attributes leadership of the group to a Russian-speaking cybercriminal it tracks as LARVA-368, who used aliases including hastalamuerte, ArmCorp, zeta88, nobody0, and santamuerte. The article says cybersecurity journalist Brian Krebs identified the individual as Alexander Andreevich Yapaev from Izhevsk, Russia, and PRODAFT told The Hacker News its findings match that persona with high confidence. The group reportedly offers affiliates a 90% profit share and requires applicants to submit at least 1GB of stolen victim data before receiving affiliate panel access.\u003c/p\u003e\n\n\u003cp\u003eTechnically, The Gentlemen supports ransomware variants for Windows, Linux, ESXi, Windows XP+, and Logical Volume Manager environments. Microsoft tracks the cluster as Storm-2697 and says its Go-based Windows ransomware is obfuscated with Garble and can become self-propagating when run with the \u0026ndash;spread argument. The article also describes use of BYOVD-based EDR killing, edge-device access through platforms such as Cisco and Fortinet FortiGate, Windows log clearing, Microsoft Defender disabling, and multi-channel extortion pressure.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA new PRODAFT report describes The Gentlemen ransomware operation as the result of an evolution by Phantom Mantis, a financially motivated threat group that initially acted as an affiliate for double-extortion attacks. The group used resources from RaaS operations such as LockBit, Qilin, and Medusa before becoming an independent partnership program in July 2025. The Gentlemen has been active since March 2025 and has claimed 478 victims, according to Ransomware.Live data cited in the article.\u003c/p\u003e\n\n\u003cp\u003ePRODAFT says Phantom Mantis is led by a Russian-speaking cybercriminal it tracks as LARVA-368, who has used aliases including hastalamuerte, ArmCorp, zeta88, nobody0, and santamuerte. The article says LARVA-368 was previously a member of the Embargo ransomware group before launching ArmCorp, which was later rebranded as The Gentlemen. Brian Krebs identified the individual as Alexander Andreevich Yapaev from Izhevsk, Russia, and PRODAFT told The Hacker News its findings matched that persona with high confidence.\u003c/p\u003e\n\n\u003cp\u003eThe group’s move away from Qilin coincided with a payment dispute in which LARVA-368 accused the RaaS operation of an exit scam and of defrauding them of $48,000. PRODAFT also noted claims from LARVA-368 and LARVA-367 that Qilin was scamming affiliates and had an alleged backdoor in affiliate-panel victim chats, though PRODAFT said it could not confirm those claims. The article says the claims may have been disinformation intended to recruit Qilin affiliates by discrediting the group.\u003c/p\u003e\n\n\u003cp\u003eThe Gentlemen operates a structured affiliate model with a 90% affiliate and 10% operator split, support through Tox, SimpleX Chat, and Ricochet Refresh, and an affiliate panel for user management, target configuration, and ransomware downloads. Applicants must provide at least 1GB of exfiltrated victim data before gaining panel access, a measure described as intended to keep out researchers and law enforcement. The group provides ransomware versions for Windows, Linux, ESXi, Windows XP+, and Logical Volume Manager.\u003c/p\u003e\n\n\u003cp\u003eThe article summarizes a broad intrusion toolkit and tactics, including initial access through edge devices such as VPN appliances, firewalls, Cisco systems, and Fortinet FortiGate. It cites use of tools such as NetExec, RelayKing, TaskHound, PrivHound, CertiHound, EDRStartupHinder, gfreeze, glinker, DumpBrowserSecrets, and Velociraptor. Reported behaviors include BYOVD-based EDR killing, Active Directory discovery, certificate abuse, privilege escalation, file share discovery, clearing Windows Event Logs, disabling Microsoft Defender, and adding antivirus exclusions.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft tracks the cluster as Storm-2697 and says the ransomware is written in Go, obfuscated with Garble, and can turn into a self-propagating worm when launched with the \u0026ndash;spread argument. The ransomware uses X25519 key exchange and XChaCha20 symmetric encryption, and a \u0026ndash;wipe option can remove recoverable artifacts after encryption. Other cited research describes multi-channel extortion using email and phone pressure, a same-day patch after a decryptor appeared in April 2026, average dwell times of two to six weeks, and a focus on organizations running VMware infrastructure.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003ePRODAFT published a detailed analysis of The Gentlemen ransomware operation, which it tracks as Phantom Mantis. The report says the financially motivated group initially operated as an affiliate conducting double-extortion attacks while using resources from RaaS schemes including LockBit, Qilin, and Medusa. In July 2025, Phantom Mantis transitioned into The Gentlemen, an independent partnership program no longer dependent on other RaaS groups.\u003c/p\u003e\n\n\u003cp\u003eThe Gentlemen has been active since March 2025 and has claimed 478 victims to date, according to Ransomware.Live data cited in the article. The article also cites other reporting that described the group as one of the most active ransomware actors, accounting for 10% of ransomware activity in April 2026. Victims are reported across multiple regions, with only about 13% based in the United States and many concentrated in Thailand, the United Kingdom, Brazil, Germany, and India.\u003c/p\u003e\n\n\u003ch2 id=\"actor-attribution-and-evolution\"\u003eActor Attribution and Evolution\u003c/h2\u003e\n\n\u003cp\u003ePRODAFT says Phantom Mantis is led by a Russian-speaking cybercriminal it tracks as LARVA-368. The individual has used online aliases including hastalamuerte, ArmCorp, zeta88, nobody0, and santamuerte. The article says LARVA-368 relies heavily on artificial intelligence for ransomware and tool development, maintenance, and post-exploitation assistance.\u003c/p\u003e\n\n\u003cp\u003eThe article says LARVA-368 is assessed to have been a member of the Embargo ransomware group before launching an operation under the name ArmCorp. ArmCorp was later rebranded as The Gentlemen. Cybersecurity journalist Brian Krebs identified the individual as 36-year-old Alexander Andreevich Yapaev from Izhevsk, Russia, and PRODAFT told The Hacker News that its findings match the same persona with high confidence.\u003c/p\u003e\n\n\u003cp\u003eThe shift toward The Gentlemen reportedly coincided with a dispute between LARVA-368 and Qilin. LARVA-368 accused Qilin of conducting an exit scam and defrauding them of $48,000. PRODAFT also described claims from LARVA-368 and LARVA-367, also known as DevMan, that Qilin was scamming affiliates and had an alleged backdoor in affiliate-panel victim chats; PRODAFT said it could not confirm those claims and noted they may have been disinformation intended to recruit Qilin affiliates.\u003c/p\u003e\n\n\u003ch2 id=\"affiliate-program-and-operations\"\u003eAffiliate Program and Operations\u003c/h2\u003e\n\n\u003cp\u003eThe Gentlemen operates as a RaaS-style partnership program. The article says it courts affiliates with an aggressive profit-sharing model of 90% for affiliates and 10% for the operator. Support for affiliates is provided through The Gentlemen IM app accounts and through messaging platforms including Tox, SimpleX Chat, and Ricochet Refresh.\u003c/p\u003e\n\n\u003cp\u003eThe group reportedly uses an affiliate panel that supports user management, configuring new targets, and downloading ransomware tied to a specific target. To gain access, potential affiliates must provide at least 1GB of exfiltrated victim data to the administrator. The article says this requirement is designed to prevent researchers and law enforcement from gaining access to the infrastructure while posing as affiliates.\u003c/p\u003e\n\n\u003cp\u003eThe group has also been observed paying for Premium accounts on underground forums to increase visibility and fend off competition. A separate Russian-speaking persona named The Gentlemen Data handles communication and technical support. The group provides five ransomware versions designed for Windows, Linux, ESXi, Windows XP+, and Logical Volume Manager environments.\u003c/p\u003e\n\n\u003ch2 id=\"technical-capabilities\"\u003eTechnical Capabilities\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft tracks the cluster as Storm-2697 and says the Windows ransomware is written in Go and obfuscated with Garble. The ransomware can be run with a \u0026ndash;spread argument, which Microsoft said turns it from a single-host encryptor into a self-propagating worm that attempts to deploy the encryptor to every reachable system on the network. A \u0026ndash;wipe argument triggers an additional post-encryption routine to eliminate recoverable artifacts from disk.\u003c/p\u003e\n\n\u003cp\u003eThe ransomware uses a hybrid cryptographic scheme. The article cites X25519 key exchange combined with XChaCha20 symmetric encryption. LevelBlue\u0026rsquo;s Cybereason team described The Gentlemen as a highly adaptive, fast-moving ransomware operation that combines mature ransomware techniques with RaaS features, double extortion, cross-platform lockers, flexible propagation, and affiliate support.\u003c/p\u003e\n\n\u003cp\u003eThe group is also described as having a highly responsive development cycle. ZeroFox reported that the group released a same-day patch after a decryptor was released in April 2026. This is presented in the article as an example of how quickly the operation adapts its tooling.\u003c/p\u003e\n\n\u003ch2 id=\"intrusion-chain-and-tooling\"\u003eIntrusion Chain and Tooling\u003c/h2\u003e\n\n\u003cp\u003eInitial access is obtained through edge devices such as VPN appliances, firewalls, and other internet-facing systems. The article specifically mentions a focus on platforms such as Cisco and Fortinet FortiGate. NCC Group said The Gentlemen follows an enterprise-focused chain beginning with initial access through vulnerable internet-facing services or stolen credentials.\u003c/p\u003e\n\n\u003cp\u003eThe article lists several tools used during infection chains and post-exploitation activity:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNetExec, RelayKing, TaskHound, PrivHound, and CertiHound for Active Directory discovery, certificate abuse, privilege escalation, and file share discovery.\u003c/li\u003e\n\u003cli\u003eEDRStartupHinder, gfreeze, glinker, and DumpBrowserSecrets for evasion of security programs and credential-related activity.\u003c/li\u003e\n\u003cli\u003eVelociraptor for command-and-control.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe attacks attempt to clear System, Application, and Security Windows Event Logs. They also disable Microsoft Defender and add antivirus exclusions. LARVA-368 provides EDR killers to affiliates to bypass security tools using the bring your own vulnerable driver technique.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerabilities-and-infrastructure\"\u003eVulnerabilities and Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eA leaked internal Rocket.Chat database used by the group contained 3,366 messages from November 2025 to late April 2026. The article says the leak showed details about the group’s internal workings, including use of known flaws in VMware Aria Operations, Fortinet, Cisco, and Microsoft software. It also described a criminal enterprise with a clear division of roles and responsibilities.\u003c/p\u003e\n\n\u003cp\u003eCheck Point said the group tracks and evaluates modern vulnerabilities, including CVE-2024-55591, CVE-2025-32433, and CVE-2025-33073. The group combines these with technique-driven paths such as backup abuse, management-controller abuse, and NTLM relay workflows. The article describes this as giving the group a flexible exploitation pipeline.\u003c/p\u003e\n\n\u003cp\u003eIn March 2026, Hunt.io discovered an open directory hosted at 176.120.22[.]127:80 on the Russian bulletproof hosting provider Proton66. The directory exposed 126 files that contained a complete ransomware operator toolkit attributed to a The Gentlemen RaaS affiliate. The toolkit included files for reconnaissance, privilege escalation, defense evasion, credential theft, lateral movement, persistence, and pre-encryption preparation.\u003c/p\u003e\n\n\u003ch2 id=\"victims-impact-and-extortion-model\"\u003eVictims, Impact, and Extortion Model\u003c/h2\u003e\n\n\u003cp\u003eThe Gentlemen has claimed 478 victims to date. According to the article, victim distribution includes Thailand, the United Kingdom, Brazil, Germany, and India, while approximately 13% of victims are based in the United States. The group focuses particularly on organizations running VMware infrastructure, according to Red Piranha.\u003c/p\u003e\n\n\u003cp\u003eThe article says the average dwell time of an intrusion ranges from two to six weeks from initial access to encryption. ZeroFox assessed that the group likely runs a multi-channel extortion operation that combines ransomware attacks with email outreach and phone-based pressure against victims. The group’s double-extortion activity is part of its operating model, and its affiliate program supports target configuration and deployment of ransomware for specific victims.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe article presents The Gentlemen as a fast-growing and technically adaptable ransomware operation that has moved from affiliate work to an independent RaaS program. Its significance comes from its large claimed victim count, multi-platform ransomware, affiliate structure, and ability to support worm-like spreading when the \u0026ndash;spread option is enabled. The group also shows operational maturity through affiliate vetting, technical support, rapid tooling updates, and a broad toolkit spanning the intrusion lifecycle.\u003c/p\u003e\n\n\u003cp\u003eThe central finding is that The Gentlemen is not simply a renamed ransomware strain but a developed criminal ecosystem. The article ties together leadership attribution, affiliate recruitment, technical capabilities, leaked internal communications, tooling exposure, and multiple third-party analyses to show how the group operates. PRODAFT concludes that LARVA-368 has been active in extortion-related activity since at least 2020 and used expertise from earlier RaaS collaborations to establish The Gentlemen RaaS.\u003c/p\u003e\n","keyPoints":["PRODAFT tracks The Gentlemen operation as Phantom Mantis and says it transitioned in July 2025 from an affiliate using other RaaS resources into an independent partnership program.","The Gentlemen has claimed 478 victims to date, and reports cited in the article say it accounted for 10% of ransomware activity in April 2026.","Microsoft tracks the cluster as Storm-2697 and says its Go-based ransomware can become self-propagating across reachable network systems when run with the --spread argument.","The group provides Windows, Linux, ESXi, Windows XP+, and Logical Volume Manager ransomware versions and offers affiliates a 90% profit share.","The article says The Gentlemen uses tactics and tools including BYOVD-based EDR killing, vulnerable edge-device access, red team utilities, log clearing, Microsoft Defender disabling, and multi-channel extortion."],"insights":["The Gentlemen uses an anti-infiltration affiliate vetting process that requires applicants to provide at least 1GB of stolen victim data before accessing the affiliate panel.","LARVA-368 reportedly relies heavily on artificial intelligence to develop and maintain ransomware and tools, as well as to assist with post-exploitation procedures.","The group demonstrated a highly responsive development cycle by releasing a same-day patch after a decryptor became available in April 2026.","The leaked internal Rocket.Chat database showed that the group actively evaluates modern vulnerabilities and combines them with techniques such as backup abuse, management-controller abuse, and NTLM relay workflows.","The ransomware’s --wipe option performs an additional post-encryption routine to remove recoverable artifacts from disk, making recovery harder after encryption."],"referencedReports":[{"title":"Inside the Phantom Mantis Operation","url":"https://catalyst.prodaft.com/public/report/inside-the-phantom-mantis-operation/overview","publisher":"PRODAFT","context":"The article says a detailed PRODAFT report revealed that Phantom Mantis evolved from an affiliate operation into The Gentlemen independent RaaS program.","category":"","primary":false},{"title":"The Gentlemen Ransomware","url":"https://www.cybereason.com/blog/the-gentlemen-ransomware","publisher":"LevelBlue Cybereason","context":"The article cites Cybereason's analysis describing The Gentlemen as a highly adaptive ransomware operation with RaaS features and flexible propagation.","category":"","primary":false},{"title":"Threat Assessment: The Gentlemen Ransomware Group","url":"https://www.halcyon.ai/ransomware-research-reports/threat-assessment-the-gentlemen-ransomware-group","publisher":"Halcyon","context":"The article references Halcyon's threat assessment while discussing The Gentlemen's emergence as one of the most active ransomware actors.","category":"","primary":false},{"title":"NCC Group Monthly Threat Pulse Review of April 2026","url":"https://www.nccgroup.com/newsroom/ncc-group-monthly-threat-pulse-review-of-april-2026/","publisher":"NCC Group","context":"The article quotes NCC Group's monthly threat pulse on The Gentlemen's enterprise-focused attack chain and adaptive tactics.","category":"","primary":false},{"title":"Gentlemen Ransomware Leak","url":"https://socradar.io/blog/gentlemen-ransomware-leak/","publisher":"SOCRadar","context":"The article cites SOCRadar for victim geography, including that about 13% of The Gentlemen's victims are based in the U.S.","category":"","primary":false},{"title":"The Gentlemen Ransomware Defense Evasion TTPs","url":"https://www.huntress.com/blog/the-gentlemen-ransomware-defense-evasion-ttps","publisher":"Huntress","context":"The article references Huntress research on The Gentlemen's attempts to clear Windows Event Logs, disable Microsoft Defender, and add antivirus exclusions.","category":"","primary":false},{"title":"The Gentlemen Russia RaaS Operation Rocket Leak Analysis","url":"https://falconfeeds.io/blogs/the-gentlemen-russia-raas-operation-rocket-leak-analysis/","publisher":"FalconFeeds","context":"The article cites FalconFeeds for details on The Gentlemen ransomware's hybrid cryptographic scheme using X25519 and XChaCha20.","category":"","primary":false},{"title":"The Gentlemen Ransomware: Dissecting a Self-Propagating Go Encryptor","url":"https://www.microsoft.com/en-us/security/blog/2026/05/28/the-gentlemen-ransomware-dissecting-a-self-propagating-go-encryptor/","publisher":"Microsoft","context":"The article cites Microsoft research tracking the cluster as Storm-2697 and describing the ransomware's Go implementation, Garble obfuscation, spread mode, and wipe option.","category":"","primary":false},{"title":"The Gentlemen: A ZeroFox Intelligence Threat Actor Profile","url":"https://www.zerofox.com/reports/the-gentlemen-a-zerofox-intelligence-threat-actor-profile/","publisher":"ZeroFox","context":"The article references ZeroFox's intelligence profile for The Gentlemen's multi-channel extortion tactics and rapid same-day patch after a decryptor release.","category":"","primary":false},{"title":"The Gentlemen Ransomware Analysis","url":"https://redpiranha.net/news/the-gentlemen-ransomware-analysis","publisher":"Red Piranha","context":"The article cites Red Piranha for average intrusion dwell time and the group's focus on organizations running VMware infrastructure.","category":"","primary":false},{"title":"The Gentlemen Ransomware Internal Chat Leak Analysis 2026","url":"https://www.kelacyber.com/blog/the-gentlemen-ransomware-internal-chat-leak-analysis-2026/","publisher":"KELA","context":"The article cites KELA's analysis of leaked internal Rocket.Chat messages used by The Gentlemen.","category":"","primary":false},{"title":"The Gentlemen Leak Analysis","url":"https://ransom-isac.org/blog/the-gentlemen-leak-analysis/","publisher":"Ransom-ISAC","context":"The article references Ransom-ISAC's analysis of an internal Rocket.Chat database leak tied to The Gentlemen.","category":"","primary":false},{"title":"From Conti to The Gentlemen: Tooling Evolved, Gaps Didn't","url":"https://www.vectra.ai/blog/from-conti-to-the-gentlemen-tooling-evolved-gaps-didnt","publisher":"Vectra AI","context":"The article cites Vectra's analysis as further detail on the group's inner workings and role division revealed by leaked chats.","category":"","primary":false},{"title":"Thus Spoke The Gentlemen","url":"https://research.checkpoint.com/2026/thus-spoke-the-gentlemen/","publisher":"Check Point Research","context":"The article quotes Check Point on The Gentlemen's tracking of modern vulnerabilities and use of flexible exploitation paths.","category":"","primary":false},{"title":"TheGentlemen Ransomware Toolkit Russian Proton66 Server","url":"https://hunt.io/blog/thegentlemen-ransomware-toolkit-russian-proton66-server","publisher":"Hunt.io","context":"The article cites Hunt.io's discovery of an open directory on Proton66 exposing a ransomware operator toolkit attributed to a The Gentlemen affiliate.","category":"","primary":false}],"body":"\u003cp\u003eA PRODAFT analysis says The Gentlemen ransomware operation, tracked by the company as Phantom Mantis, evolved from an affiliate conducting double-extortion attacks into an independent partnership program in July 2025. The group previously leveraged resources from RaaS schemes including LockBit, Qilin, and Medusa. The Gentlemen has been active since March 2025 and has claimed 478 victims to date, according to Ransomware.Live data cited in the article.\u003c/p\u003e\n\n\u003cp\u003ePRODAFT attributes leadership of the group to a Russian-speaking cybercriminal it tracks as LARVA-368, who used aliases including hastalamuerte, ArmCorp, zeta88, nobody0, and santamuerte. The article says cybersecurity journalist Brian Krebs identified the individual as Alexander Andreevich Yapaev from Izhevsk, Russia, and PRODAFT told The Hacker News its findings match that persona with high confidence. The group reportedly offers affiliates a 90% profit share and requires applicants to submit at least 1GB of stolen victim data before receiving affiliate panel access.\u003c/p\u003e\n\n\u003cp\u003eTechnically, The Gentlemen supports ransomware variants for Windows, Linux, ESXi, Windows XP+, and Logical Volume Manager environments. Microsoft tracks the cluster as Storm-2697 and says its Go-based Windows ransomware is obfuscated with Garble and can become self-propagating when run with the \u0026ndash;spread argument. The article also describes use of BYOVD-based EDR killing, edge-device access through platforms such as Cisco and Fortinet FortiGate, Windows log clearing, Microsoft Defender disabling, and multi-channel extortion pressure.\u003c/p\u003e\n"},{"n":11,"title":"Miasma and Hades Are Spreading Now: Detect Them on Developer Machines with Suspicious Files","source":"stepsecurity.io","sourceColorIdx":4,"link":"https://www.stepsecurity.io/blog/miasma-and-hades-are-spreading-now-detect-them-on-developer-machines-with-suspicious-files","time":"16:11","priority":"SHOULD READ","score":88,"tldr":"Miasma and Hades are fast-spreading npm and PyPI worms that execute from project files at open or import time, bypassing many install-time defenses while stealing developer secrets and publishing tokens. StepSecurity is promoting Dev Machine Guard’s Suspicious Files feature to detect the specific files these campaigns drop across developer machines.","briefOverview":"\u003cp\u003eThe article says the Miasma worm and its PyPI branch, Hades, are spreading across the npm and PyPI ecosystems. It describes three waves in five days: a Miasma npm wave on June 3, an attack affecting Microsoft Azure organizations on June 5, and the Hades PyPI campaign on June 8. The article’s central concern is identifying which developer machines are affected while the campaign is still active.\u003c/p\u003e\n\n\u003cp\u003eMiasma and Hades are described as self-replicating supply chain worms that search for npm and PyPI publishing tokens and use them to republish infected package versions. The article says the campaign compromised 57 npm packages across more than 286 malicious versions, later affected ensmallen and roughly two dozen related PyPI packages, and spread across 73 Microsoft Azure repositories in under two minutes. It emphasizes that developer machines are valuable targets because they can hold publishing tokens, SSH keys, GitHub credentials, and CI/CD access.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that these campaigns move beyond traditional install-time defenses by executing at project open time or import time. Miasma uses a small binding.gyp file in a technique the article calls “Phantom Gyp,” while Hades uses an obfuscated hook in a package’s \u003cstrong\u003einit\u003c/strong\u003e.py file that downloads Bun and runs a JavaScript payload. StepSecurity presents its Dev Machine Guard Suspicious Files feature as a way to detect related artifacts on developer machines through centrally maintained rules.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reports that Miasma and Hades are actively spreading across npm and PyPI and are designed to run on developer machines. It says the campaigns do not depend only on a careless install or a build step, because payloads can run when a developer opens a project or imports a package. StepSecurity frames the main operational question as which developer machines are affected right now.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity says its research team tracked three waves in five days: the Miasma npm wave on June 3, an attack on Microsoft Azure organizations on June 5, and the Hades PyPI campaign on June 8. The article states that Miasma compromised 57 npm packages across more than 286 malicious versions, including @vapi-ai/server-sdk, which had more than 408,000 monthly downloads. It also says Hades compromised ensmallen and roughly two dozen related machine-learning and bioinformatics packages.\u003c/p\u003e\n\n\u003cp\u003eThe technical shift emphasized in the article is that the execution point has moved from install time to open time and import time. Miasma’s npm variant uses what the article calls “Phantom Gyp,” where a 157-byte binding.gyp file triggers code execution during npm install through a native build step. Hades executes on import through an obfuscated one-line hook in \u003cstrong\u003einit\u003c/strong\u003e.py, which downloads a standalone Bun runtime and runs a JavaScript payload.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that several common defenses have blind spots against these campaigns. Registry gateways and cooldown policies are described as install-time controls that do not see files that execute later from the project tree. EDR is described as challenged by Hades because the payload reads secrets directly from process memory and runs through a legitimate, signed Bun runtime, while SCA scanners are described as focused on declared dependencies rather than files such as binding.gyp, \u003cstrong\u003einit\u003c/strong\u003e.py hooks, or editor configuration files.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity presents Suspicious Files, part of Dev Machine Guard, as the response described in the article. The feature flags files associated with known supply chain attacks across enrolled developer machines, using detection rules maintained and updated by StepSecurity. The dashboard is described as showing file path, device, campaign, confidence, SHA-256, matched rule, first and most recent seen times, and a condition breakdown explaining why a file was flagged.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes an active supply chain campaign involving the Miasma worm and its PyPI branch, Hades. According to the article, Miasma is spreading across npm and Hades is spreading across PyPI. The article emphasizes that these threats run on developer machines when a project is opened or a package is imported, rather than relying only on traditional install-time execution.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity presents this as an urgent developer-machine visibility problem. The article states that the key question for security teams is which developer machines are affected right now. It argues that common controls such as EDR, registry gateways, and SCA scanners were not built to catch the files these worms use on developer machines.\u003c/p\u003e\n\n\u003ch2 id=\"campaign-timeline-and-scale\"\u003eCampaign timeline and scale\u003c/h2\u003e\n\n\u003cp\u003eThe article says StepSecurity tracked three waves in five days:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn June 3, 2026, the Miasma npm wave compromised 57 npm packages across more than 286 malicious versions.\u003c/li\u003e\n\u003cli\u003eOn June 5, an attack on Microsoft Azure organizations disabled 73 repositories.\u003c/li\u003e\n\u003cli\u003eOn June 8, the Hades PyPI campaign compromised ensmallen and roughly two dozen related machine-learning and bioinformatics packages.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article identifies @vapi-ai/server-sdk as the largest npm victim in the June 3 wave, with more than 408,000 monthly downloads. It also states that the broader campaign has infected more than 113 repositories across dozens of accounts. The Microsoft Azure GitHub organization incident is described as spreading across 73 repositories in under two minutes.\u003c/p\u003e\n\n\u003ch2 id=\"worm-behavior-and-impact\"\u003eWorm behavior and impact\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Miasma and Hades as self-replicating worms. Once on a developer machine, they search for npm and PyPI publishing tokens. They then use those tokens to republish infected versions of every package the token can publish.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that this behavior turns each newly compromised developer or package publisher into a new spreader. This is why the article frames speed as central to the campaign. It says the package count climbs by the hour and that security teams need answers in minutes rather than after the next advisory.\u003c/p\u003e\n\n\u003ch2 id=\"technical-execution-methods\"\u003eTechnical execution methods\u003c/h2\u003e\n\n\u003cp\u003eThe article says the campaign has moved beyond the traditional supply chain model of malicious install scripts. It states that many previous malicious packages relied on preinstall and postinstall lifecycle scripts in package.json, but Miasma and Hades use execution paths that many tools do not watch.\u003c/p\u003e\n\n\u003ch3 id=\"miasma-and-phantom-gyp\"\u003eMiasma and “Phantom Gyp”\u003c/h3\u003e\n\n\u003cp\u003eThe npm variant of Miasma uses a technique the article calls “Phantom Gyp.” Instead of using a lifecycle script, it ships a 157-byte binding.gyp file. The article says this triggers code execution during npm install through the native build step and bypasses install-script security checks.\u003c/p\u003e\n\n\u003cp\u003eThe article also says the same actor infected repositories so that the payload runs when a folder is opened in an IDE or AI coding assistant. In that scenario, no install is required at all.\u003c/p\u003e\n\n\u003ch3 id=\"hades-import-time-execution\"\u003eHades import-time execution\u003c/h3\u003e\n\n\u003cp\u003eThe Hades PyPI branch executes on import. The article says the malicious code is an obfuscated one-line hook embedded in a package’s \u003cstrong\u003einit\u003c/strong\u003e.py file. When a developer imports the package, the hook downloads a standalone Bun runtime and runs a JavaScript payload.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that a developer does not need to run something intentionally malicious. It says opening a project in VS Code or importing a dependency that has been used for years can be enough.\u003c/p\u003e\n\n\u003ch2 id=\"files-and-execution-points-highlighted-in-the-article\"\u003eFiles and execution points highlighted in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies several types of files and integration points that can carry or trigger payloads:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ebinding.gyp files used in the Phantom Gyp technique.\u003c/li\u003e\n\u003cli\u003eInjected \u003cstrong\u003einit\u003c/strong\u003e.py hooks in Python packages.\u003c/li\u003e\n\u003cli\u003e.vscode/tasks.json files with runOn folderOpen auto-execution.\u003c/li\u003e\n\u003cli\u003e.vscode/setup.mjs scripts triggered by Visual Studio Code tasks.\u003c/li\u003e\n\u003cli\u003e.claude/setup.mjs SessionStart hooks for Anthropic Claude Code.\u003c/li\u003e\n\u003cli\u003e.claude/settings.json settings injection for Anthropic Claude Code.\u003c/li\u003e\n\u003cli\u003e.cursor/rules/setup.mdc custom rules loaded on project open in Cursor.\u003c/li\u003e\n\u003cli\u003e.gemini/settings.json settings injection for Google Gemini.\u003c/li\u003e\n\u003cli\u003e.github/setup.js workflow injection for GitHub Actions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these files can sit quietly in a project tree and may not appear in package manifests or lockfile diffs.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-article-says-common-defenses-miss-the-campaign\"\u003eWhy the article says common defenses miss the campaign\u003c/h2\u003e\n\n\u003cp\u003eThe article describes specific blind spots in several defensive layers.\u003c/p\u003e\n\n\u003ch3 id=\"registry-gateways-and-cooldown-policies\"\u003eRegistry gateways and cooldown policies\u003c/h3\u003e\n\n\u003cp\u003eRegistry gateways and cooldown policies are described as install-time controls. The article says they decide which package versions a client can fetch from a registry. It argues that they do not see a binding.gyp that fires during a native build, an \u003cstrong\u003einit\u003c/strong\u003e.py hook that runs on import, or a repository file that executes when a folder is opened.\u003c/p\u003e\n\n\u003ch3 id=\"edr\"\u003eEDR\u003c/h3\u003e\n\n\u003cp\u003eThe article says EDR is built to flag suspicious process behavior and known-bad binaries. It states that Hades is designed to slip past EDR by reading secrets directly from process memory, without writing them to disk or making an obviously suspicious network connection. It also says Hades runs through a legitimate, signed Bun runtime downloaded on the fly.\u003c/p\u003e\n\n\u003cp\u003eThe article additionally states that the Hades campaign ships AI prompt-injection content intended to misdirect automated AI triage systems that analyze it.\u003c/p\u003e\n\n\u003ch3 id=\"sca-and-dependency-scanners\"\u003eSCA and dependency scanners\u003c/h3\u003e\n\n\u003cp\u003eThe article says SCA and dependency scanners inventory declared dependencies in manifests and lockfiles. It argues that the files carrying these payloads are not declared dependencies. Examples given include binding.gyp, injected import hooks, and editor configuration files.\u003c/p\u003e\n\n\u003ch2 id=\"stepsecurity-s-response-suspicious-files\"\u003eStepSecurity’s response: Suspicious Files\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Suspicious Files as a feature of StepSecurity’s Dev Machine Guard. It says the feature flags files associated with known supply chain attacks across enrolled developer machines. StepSecurity says its research team maintains and continuously updates the detection rules based on its own research.\u003c/p\u003e\n\n\u003cp\u003eThe article states that coverage includes artifacts behind the Miasma and Hades campaigns. It specifically mentions malicious binding.gyp files, injected import hooks, and editor or AI-tool configuration files that auto-execute when a project is opened or an AI coding session starts.\u003c/p\u003e\n\n\u003ch2 id=\"detection-and-triage-details\"\u003eDetection and triage details\u003c/h2\u003e\n\n\u003cp\u003eThe article says Suspicious Files works out of the box and that detection rules are managed centrally by StepSecurity. It states that when the actor mutates, StepSecurity updates the rules centrally and enrolled fleets are evaluated automatically. The article says there are no rules for customers to write, tune, or keep current.\u003c/p\u003e\n\n\u003cp\u003eFor flagged files, the article says the dashboard provides:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe file path and the device where it was found.\u003c/li\u003e\n\u003cli\u003eThe associated attack campaign.\u003c/li\u003e\n\u003cli\u003eA confidence level.\u003c/li\u003e\n\u003cli\u003eThe file’s SHA-256.\u003c/li\u003e\n\u003cli\u003eThe matched rule and file-path pattern.\u003c/li\u003e\n\u003cli\u003eFirst-seen and most-recently-seen timestamps.\u003c/li\u003e\n\u003cli\u003eA condition breakdown showing which indicators matched and which were required.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the condition breakdown prevents detections from being a black box and helps validation and triage during a live incident.\u003c/p\u003e\n\n\u003ch2 id=\"developer-machine-risk-described-in-the-article\"\u003eDeveloper-machine risk described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that a compromised developer machine is a high-value foothold. It says developer machines may contain npm and PyPI publishing tokens, SSH keys into production, GitHub credentials with elevated scopes, and direct access to CI/CD systems. It also says that files executing on import or project open run with the developer’s own access.\u003c/p\u003e\n\n\u003cp\u003eFor Miasma and Hades specifically, the article says any publishing token found can be used immediately to spread the worm further. This is presented as the reason developer-machine file visibility is important.\u003c/p\u003e\n\n\u003ch2 id=\"deployment-and-availability\"\u003eDeployment and availability\u003c/h2\u003e\n\n\u003cp\u003eThe article says Suspicious Files is part of Dev Machine Guard and runs on the same lightweight agent deployed through existing MDM or EDR tooling. It supports macOS, Windows, and Linux according to the article. It says there is no new agent to install and no detection content to manage.\u003c/p\u003e\n\n\u003cp\u003eFor existing Dev Machine Guard users, the article says Suspicious Files is available in the dashboard under Developer Machines. For organizations not using Dev Machine Guard, the article points to installation script documentation and a demo request as next steps.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central message is that Miasma and Hades have moved beyond defenses focused on package installation. They execute from files on developer machines at import time or project-open time, and StepSecurity is positioning Suspicious Files as a way to detect those artifacts across a developer fleet.\u003c/p\u003e\n","keyPoints":["The Miasma worm and its PyPI branch Hades are spreading across the npm and PyPI ecosystems and can run when a developer opens a project or imports a package.","Miasma uses a “Phantom Gyp” technique involving a small binding.gyp file to trigger code execution during npm install, while Hades executes through an obfuscated hook in a package’s __init__.py file on import.","The article states that registry gateways, EDR, and SCA scanners can miss these campaigns because they focus on install-time checks, process behavior, or declared dependencies rather than suspicious files on developer machines.","StepSecurity’s Suspicious Files feature detects files associated with known supply chain attacks across enrolled developer machines using centrally maintained detection rules.","The feature currently covers Miasma and Hades artifacts such as malicious binding.gyp files, injected import hooks, and editor or AI-tool configuration files that can auto-execute when projects are opened."],"insights":["Security teams should check developer machines directly for malicious project files because the article says these worms can execute at project open or package import time, before or outside the points monitored by registry gateways and dependency scanners.","Editor and AI-coding-assistant configuration files are highlighted as high-risk execution points because files such as .vscode/tasks.json, .claude/setup.mjs, and .cursor/rules/setup.mdc can run with the developer’s existing access without requiring a package install.","The article emphasizes urgency by stating that the campaign spread across 73 Microsoft Azure repositories in under two minutes, making rapid fleet-wide visibility more important than waiting for package advisories.","Detection and triage should use file-level indicators such as path, SHA-256, matched rule, first-seen time, and condition breakdown, because the article says the payloads may avoid obvious malware binaries or classic disk-write and exfiltration patterns."],"referencedReports":[],"body":"\u003cp\u003eThe article says the Miasma worm and its PyPI branch, Hades, are spreading across the npm and PyPI ecosystems. It describes three waves in five days: a Miasma npm wave on June 3, an attack affecting Microsoft Azure organizations on June 5, and the Hades PyPI campaign on June 8. The article’s central concern is identifying which developer machines are affected while the campaign is still active.\u003c/p\u003e\n\n\u003cp\u003eMiasma and Hades are described as self-replicating supply chain worms that search for npm and PyPI publishing tokens and use them to republish infected package versions. The article says the campaign compromised 57 npm packages across more than 286 malicious versions, later affected ensmallen and roughly two dozen related PyPI packages, and spread across 73 Microsoft Azure repositories in under two minutes. It emphasizes that developer machines are valuable targets because they can hold publishing tokens, SSH keys, GitHub credentials, and CI/CD access.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that these campaigns move beyond traditional install-time defenses by executing at project open time or import time. Miasma uses a small binding.gyp file in a technique the article calls “Phantom Gyp,” while Hades uses an obfuscated hook in a package’s \u003cstrong\u003einit\u003c/strong\u003e.py file that downloads Bun and runs a JavaScript payload. StepSecurity presents its Dev Machine Guard Suspicious Files feature as a way to detect related artifacts on developer machines through centrally maintained rules.\u003c/p\u003e\n"},{"n":1,"title":"Authorities dismantle 'AudiA6' ransomware crypto-laundering service","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/legal/authorities-dismantle-audia6-ransomware-crypto-laundering-service/","time":"15:55","priority":"SHOULD READ","score":82,"tldr":"Authorities dismantled AudiA6, a cryptocurrency laundering service allegedly used by ransomware gangs and other cybercriminals to wash more than $380 million. Two alleged administrators were arrested in Georgia, with domains, assets, crypto, and Telegram accounts seized or frozen.","briefOverview":"\u003cp\u003eLaw enforcement has dismantled AudiA6, a cryptocurrency service allegedly used by ransomware actors and other cybercriminals to launder more than $380 million. Europol said the service was linked to more than 15 international investigations involving ransomware attacks and large-scale cryptocurrency theft. The platform is believed to have operated as a central money laundering hub between 2022 and 2025.\u003c/p\u003e\n\n\u003cp\u003eEuropol described AudiA6 as an industrial-scale cryptocurrency laundering operation built around thousands of fraudulent exchange accounts opened with stolen or purchased identities. The service was marketed as a professional cryptocurrency mixing service, but allegedly moved cybercrime proceeds through complex transaction routes and returned “cleaned” funds in about an hour for a 3% to 10% commission. Authorities said the operation involved money mule accounts and Russian-speaking intermediaries recruited for that purpose.\u003c/p\u003e\n\n\u003cp\u003eThe action resulted in two arrests in Georgia, searches of three properties, the seizure of 25 domains, 80 vehicles and properties, and cryptocurrency seizures and freezes. The U.S. Department of Justice named Ruslan Igorevich Tkachuk and Alexander Vladimirovich Ledenev as senior members of AudiA6. Authorities also blocked Telegram accounts used by the network and retrieved 6,000 Know-Your-Customer records linked to money mule accounts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eAuthorities have dismantled AudiA6, a cryptocurrency service allegedly used by ransomware actors and other cybercriminals to launder more than $380 million. Europol said the service was connected to more than 15 international investigations involving ransomware attacks and large-scale cryptocurrency theft. Investigators believe AudiA6 acted as a central money laundering hub between 2022 and 2025.\u003c/p\u003e\n\n\u003cp\u003eEuropol described the operation as industrial-scale and said it was built around thousands of fraudulent cryptocurrency exchange accounts. These accounts were allegedly opened using stolen or purchased identities. The service was marketed as a professional cryptocurrency mixing service, but investigators said it accepted cybercrime proceeds, moved them through complex transaction routes to obscure their origin, and returned “cleaned” funds in about an hour after charging a 3% to 10% commission.\u003c/p\u003e\n\n\u003cp\u003eThe investigation involved authorities from 11 countries across Europe, America, and Asia, supported by Europol and Eurojust. Europol said the action was made possible by the September 2025 arrest in Poland of a Ukrainian national linked to AudiA6. Forensic examination of that suspect’s devices helped investigators identify key individuals behind the operation and eventually locate and arrest them in Georgia.\u003c/p\u003e\n\n\u003cp\u003eAuthorities arrested two individuals in Georgia, searched three properties, seized 25 domains, seized 80 vehicles and properties, seized €86,000 in cryptocurrency, froze €692,000 in cryptocurrency, and blocked Telegram accounts used by the network. The two arrested individuals, a Ukrainian and a Russian national, are believed to be administrators of AudiA6 and the underground forum Dark2Web. Both AudiA6 and Dark2Web websites now display a seizure notice.\u003c/p\u003e\n\n\u003cp\u003eThe U.S. Department of Justice named Ruslan Igorevich Tkachuk, 37, and Alexander Vladimirovich Ledenev, 25, as senior members of the AudiA6 platform. The two are in the custody of Georgian authorities and face sentences of up to 20 years in prison for facilitating cybercrime laundering operations. Authorities also retrieved 6,000 Know-Your-Customer records linked to money mule accounts, which Europol said were created using stolen or purchased identities and were often connected to Russian-speaking intermediaries.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eLaw enforcement has dismantled AudiA6, a cryptocurrency service allegedly used by ransomware actors and other cybercriminals to launder more than $380 million. Europol said the service was linked to more than 15 international investigations involving ransomware attacks and large-scale cryptocurrency theft.\u003c/p\u003e\n\n\u003cp\u003eInvestigators believe AudiA6 acted as a central money laundering hub between 2022 and 2025. The platform was marketed as a “professional cryptocurrency mixing service,” but authorities said it handled cybercrime proceeds and moved funds through complex transaction routes intended to obscure their origin.\u003c/p\u003e\n\n\u003ch2 id=\"alleged-laundering-model\"\u003eAlleged laundering model\u003c/h2\u003e\n\n\u003cp\u003eEuropol described AudiA6 as an “industrial-scale cryptocurrency laundering operation” built around thousands of fraudulent exchange accounts. According to the article, these accounts were opened using stolen or purchased identities.\u003c/p\u003e\n\n\u003cp\u003eThe service allegedly accepted proceeds from cybercrime, moved the money through complex transaction routes, and returned the funds “cleaned” to holders in about an hour. AudiA6 reportedly charged a 3% to 10% commission for this laundering service.\u003c/p\u003e\n\n\u003cp\u003eThe article also says past reports from Intel471 and blockchain investigator ZachXBT had exposed AudiA6 for facilitating illegal activity.\u003c/p\u003e\n\n\u003ch2 id=\"international-investigation-and-arrests\"\u003eInternational investigation and arrests\u003c/h2\u003e\n\n\u003cp\u003eThe investigation involved authorities from 11 countries across Europe, America, and Asia, with support from Europol and Eurojust. Europol said the action was possible because of the September 2025 arrest in Poland of a Ukrainian national linked to AudiA6.\u003c/p\u003e\n\n\u003cp\u003eForensic examination of that suspect’s devices helped investigators identify key individuals behind the operation. Investigators then located and arrested them in Georgia.\u003c/p\u003e\n\n\u003cp\u003eTwo individuals were arrested in Georgia. The article says the two arrested individuals, a Ukrainian and a Russian national, are believed to be administrators of AudiA6 and of the underground forum Dark2Web, which cybercriminals used to advertise illicit services.\u003c/p\u003e\n\n\u003ch2 id=\"enforcement-results\"\u003eEnforcement results\u003c/h2\u003e\n\n\u003cp\u003eAs a result of the action, authorities reported the following outcomes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e2 individuals arrested in Georgia.\u003c/li\u003e\n\u003cli\u003e3 properties searched.\u003c/li\u003e\n\u003cli\u003e25 domains seized.\u003c/li\u003e\n\u003cli\u003e80 vehicles and properties seized.\u003c/li\u003e\n\u003cli\u003e€86,000, or about $99,000, in cryptocurrency seized.\u003c/li\u003e\n\u003cli\u003e€692,000, or about $798,000, in cryptocurrency frozen.\u003c/li\u003e\n\u003cli\u003eTelegram accounts used by the network blocked.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBoth the AudiA6 and Dark2Web websites now display a seizure notice to visitors.\u003c/p\u003e\n\n\u003ch2 id=\"named-individuals-and-legal-exposure\"\u003eNamed individuals and legal exposure\u003c/h2\u003e\n\n\u003cp\u003eThe U.S. Department of Justice named Ruslan Igorevich Tkachuk, age 37, and Alexander Vladimirovich Ledenev, age 25, as senior members of the AudiA6 platform. The two individuals are currently in the custody of Georgian authorities.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, they face sentences of up to 20 years in prison for facilitating cybercrime laundering operations.\u003c/p\u003e\n\n\u003cp\u003eThe Department of Justice said that out of approximately 10,333 bitcoin deposited, approximately 393.39 BTC were received directly from known darknet markets, ransomware organizations, cybercrime services, and other illicit sources. The DOJ valued those direct illicit deposits at around $19,234,331 at the time of the transactions, and said additional funds were deposited indirectly from illicit sources into AudiA6 wallets.\u003c/p\u003e\n\n\u003ch2 id=\"money-mule-and-kyc-infrastructure\"\u003eMoney mule and KYC infrastructure\u003c/h2\u003e\n\n\u003cp\u003eAuthorities also retrieved 6,000 Know-Your-Customer records linked to money mule accounts. Europol said these accounts were created using stolen or purchased identities.\u003c/p\u003e\n\n\u003cp\u003eThe article states that many of the accounts were connected to Russian-speaking intermediaries who recruited them specifically for this purpose. Europol also said the money mule network used multiple domains to register accounts on cryptocurrency exchanges.\u003c/p\u003e\n\n\u003cp\u003eEuropol published information about those domains to raise awareness and help cryptocurrency platforms block them.\u003c/p\u003e\n","keyPoints":["Law enforcement dismantled the AudiA6 cryptocurrency service, which Europol says was used by ransomware actors and other cybercriminals to launder more than $380 million.","Europol said AudiA6 was linked to more than 15 international investigations involving ransomware attacks and large-scale cryptocurrency theft.","Authorities arrested two individuals in Georgia, seized 25 domains, seized 80 vehicles and properties, seized €86,000 in cryptocurrency, froze €692,000 in cryptocurrency, and blocked Telegram accounts used by the network.","The U.S. Department of Justice named Ruslan Igorevich Tkachuk and Alexander Vladimirovich Ledenev as senior members of the AudiA6 platform.","Authorities also retrieved 6,000 Know-Your-Customer records linked to money mule accounts allegedly created using stolen or purchased identities."],"insights":["The takedown was enabled by forensic examination of devices from a Ukrainian national arrested in Poland in September 2025, showing that one suspect’s seized devices exposed the broader AudiA6 operation and led investigators to alleged administrators in Georgia.","AudiA6 relied on thousands of fraudulent exchange accounts created with stolen or purchased identities, making KYC abuse and money mule recruitment central to the laundering operation rather than incidental activity.","Europol published domains used by the money mule network specifically to help cryptocurrency platforms identify and block related exchange registrations.","The service reportedly returned “cleaned” cryptocurrency in about an hour while charging a 3% to 10% commission, indicating a fast, fee-based laundering pipeline designed for operational use by cybercriminals."],"referencedReports":[],"body":"\u003cp\u003eLaw enforcement has dismantled AudiA6, a cryptocurrency service allegedly used by ransomware actors and other cybercriminals to launder more than $380 million. Europol said the service was linked to more than 15 international investigations involving ransomware attacks and large-scale cryptocurrency theft. The platform is believed to have operated as a central money laundering hub between 2022 and 2025.\u003c/p\u003e\n\n\u003cp\u003eEuropol described AudiA6 as an industrial-scale cryptocurrency laundering operation built around thousands of fraudulent exchange accounts opened with stolen or purchased identities. The service was marketed as a professional cryptocurrency mixing service, but allegedly moved cybercrime proceeds through complex transaction routes and returned “cleaned” funds in about an hour for a 3% to 10% commission. Authorities said the operation involved money mule accounts and Russian-speaking intermediaries recruited for that purpose.\u003c/p\u003e\n\n\u003cp\u003eThe action resulted in two arrests in Georgia, searches of three properties, the seizure of 25 domains, 80 vehicles and properties, and cryptocurrency seizures and freezes. The U.S. Department of Justice named Ruslan Igorevich Tkachuk and Alexander Vladimirovich Ledenev as senior members of AudiA6. Authorities also blocked Telegram accounts used by the network and retrieved 6,000 Know-Your-Customer records linked to money mule accounts.\u003c/p\u003e\n"},{"n":5,"title":"Hacker linked to Void Blizzard faces charges over cyberespionage campaign","source":"therecord.media","sourceColorIdx":7,"link":"https://therecord.media/hacker-linked-to-void-blizzard-faces-charges","time":"15:17","priority":"SHOULD READ","score":82,"tldr":"Russian national Denis Obrezko appeared in U.S. federal court on charges that he provided infrastructure supporting Void Blizzard, a Kremlin-linked cyberespionage group accused of compromising at least 11 U.S. companies. He was arrested in Thailand and transferred to U.S. custody as prosecutors allege his crypto-linked purchases helped facilitate attacks against organizations in the U.S. and abroad.","briefOverview":"\u003cp\u003eRussian national Denis Obrezko, 36, appeared in U.S. federal court in Boston on charges tied to a Kremlin-linked cyberespionage campaign. He was transferred to U.S. custody from Thailand, where he was arrested last November. U.S. prosecutors allege he helped the Russian state-linked threat actor Void Blizzard gain unauthorized access to computers by providing infrastructure used to support the group’s cyber operations.\u003c/p\u003e\n\n\u003cp\u003eProsecutors allege cryptocurrency transactions linked to Obrezko were used to purchase a virtual private server and internet domain that facilitated attacks against organizations in the United States and other countries. An FBI affidavit says investigators identified at least 11 compromised U.S. companies, though authorities believe the actual number of victims is significantly higher. Obrezko reportedly remains in custody as the case moves forward.\u003c/p\u003e\n\n\u003cp\u003eResearchers have described Void Blizzard as a relatively new threat group operating in support of Russian government interests. The group has targeted government agencies, defense contractors, transportation companies, media organizations, healthcare providers and nongovernmental organizations across Europe and North America. The hackers typically use purchased or stolen credentials to infiltrate networks and steal emails and internal documents.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eRussian national Denis Obrezko appeared in U.S. federal court in Boston on Tuesday after being transferred to U.S. custody from Thailand. He was arrested in Thailand last November and is now facing charges connected to a Kremlin-linked cyberespionage campaign. The case is being prosecuted by the U.S. Justice Department, which did not respond to a request for comment.\u003c/p\u003e\n\n\u003cp\u003eU.S. prosecutors allege that Obrezko supported Void Blizzard, a Russian state-linked threat actor, by providing infrastructure used in the group’s cyber operations. Reuters reported that prosecutors say this infrastructure helped the group gain unauthorized access to computers. Obrezko reportedly remains in custody as the case proceeds.\u003c/p\u003e\n\n\u003cp\u003eThe alleged infrastructure support included cryptocurrency-linked purchases of a virtual private server and an internet domain. Prosecutors say those resources facilitated attacks against organizations in the United States and other countries. An FBI affidavit filed in the case says investigators identified at least 11 U.S. companies that were compromised, while authorities believe the actual victim count is significantly higher.\u003c/p\u003e\n\n\u003cp\u003eThai authorities arrested Obrezko in early November during a joint operation with the FBI on the resort island of Phuket. Investigators raided his hotel room and seized laptops, mobile phones and cryptocurrency wallets. Russian diplomats later visited him in detention and sought his return to Russia, while Moscow separately placed him on an international wanted list earlier this year.\u003c/p\u003e\n\n\u003cp\u003eRussian state media previously reported that Obrezko is from Stavropol in southwestern Russia and had worked for Russian technology companies developing high-tech systems for domestic industries. Researchers have described Void Blizzard as a relatively new threat group that operates in support of Russian government interests. The group has targeted government agencies, defense contractors, transportation companies, media organizations, healthcare providers and nongovernmental organizations across Europe and North America, typically using purchased or stolen credentials to infiltrate networks and steal emails and internal documents.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore event\u003c/h2\u003e\n\n\u003cp\u003eRussian national Denis Obrezko, 36, appeared in U.S. federal court in Boston on Tuesday after being transferred to U.S. custody from Thailand. He had been arrested in Thailand last November. He is facing charges over alleged support for a Kremlin-linked cyberespionage campaign targeting U.S. companies.\u003c/p\u003e\n\n\u003cp\u003eThe U.S. Justice Department is prosecuting the case, though it did not respond to a request for comment. Obrezko reportedly remains in custody while the case moves forward.\u003c/p\u003e\n\n\u003ch2 id=\"allegations-against-obrezko\"\u003eAllegations against Obrezko\u003c/h2\u003e\n\n\u003cp\u003eU.S. prosecutors allege that Obrezko helped the Russian state-linked threat actor Void Blizzard gain unauthorized access to computers. According to Reuters, prosecutors say he provided infrastructure used to support the group’s cyber operations.\u003c/p\u003e\n\n\u003cp\u003eProsecutors also allege that cryptocurrency transactions linked to Obrezko were used to purchase:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA virtual private server.\u003c/li\u003e\n\u003cli\u003eAn internet domain.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThose resources allegedly facilitated attacks against organizations in the United States and other countries.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-victim-impact\"\u003eDisclosed victim impact\u003c/h2\u003e\n\n\u003cp\u003eAn FBI affidavit filed in the case says investigators identified at least 11 U.S. companies that were compromised. Authorities believe the actual number of victims is significantly higher.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name the compromised companies. It states that the alleged campaign targeted organizations in the United States and other countries.\u003c/p\u003e\n\n\u003ch2 id=\"arrest-and-seizure-in-thailand\"\u003eArrest and seizure in Thailand\u003c/h2\u003e\n\n\u003cp\u003eThai authorities arrested Obrezko in early November during a joint operation with the FBI. The arrest took place on the resort island of Phuket.\u003c/p\u003e\n\n\u003cp\u003eDuring the operation, authorities raided Obrezko’s hotel room and seized several items, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLaptops.\u003c/li\u003e\n\u003cli\u003eMobile phones.\u003c/li\u003e\n\u003cli\u003eCryptocurrency wallets.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"russian-government-and-diplomatic-activity\"\u003eRussian government and diplomatic activity\u003c/h2\u003e\n\n\u003cp\u003eRussian diplomats later visited Obrezko in detention and sought his return to Russia. Moscow separately placed him on an international wanted list earlier this year.\u003c/p\u003e\n\n\u003cp\u003eRussian state media previously reported that Obrezko is a native of Stavropol, a city in southwestern Russia. The same reporting said he had worked for Russian technology companies developing high-tech systems for domestic industries.\u003c/p\u003e\n\n\u003ch2 id=\"void-blizzard-background\"\u003eVoid Blizzard background\u003c/h2\u003e\n\n\u003cp\u003eResearchers have described Void Blizzard as a relatively new threat group operating in support of Russian government interests. The article identifies the group as Russian state-linked and says it has targeted organizations across Europe and North America.\u003c/p\u003e\n\n\u003cp\u003eThe sectors reportedly targeted by Void Blizzard include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGovernment agencies.\u003c/li\u003e\n\u003cli\u003eDefense contractors.\u003c/li\u003e\n\u003cli\u003eTransportation companies.\u003c/li\u003e\n\u003cli\u003eMedia organizations.\u003c/li\u003e\n\u003cli\u003eHealthcare providers.\u003c/li\u003e\n\u003cli\u003eNongovernmental organizations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"reported-tactics-and-data-targeted\"\u003eReported tactics and data targeted\u003c/h2\u003e\n\n\u003cp\u003eAccording to researchers cited in the article, Void Blizzard typically uses purchased or stolen credentials to infiltrate networks. Once inside, the hackers steal emails and internal documents.\u003c/p\u003e\n\n\u003cp\u003eIn this case, prosecutors allege that infrastructure linked to Obrezko supported cyber operations that facilitated attacks against organizations in the United States and other countries. The article specifically identifies a virtual private server and an internet domain as resources allegedly purchased through cryptocurrency transactions linked to him.\u003c/p\u003e\n","keyPoints":["Russian national Denis Obrezko appeared in U.S. federal court in Boston after being transferred from Thailand, where he was arrested in November.","U.S. prosecutors allege that Obrezko supported the Russian state-linked Void Blizzard hacking group by providing infrastructure used in cyber operations.","Prosecutors allege that cryptocurrency transactions linked to Obrezko were used to purchase a virtual private server and internet domain that facilitated attacks against organizations in the United States and other countries.","An FBI affidavit says investigators identified at least 11 compromised U.S. companies, though authorities believe the actual number of victims is significantly higher.","Researchers have described Void Blizzard as a relatively new threat group supporting Russian government interests and targeting organizations across Europe and North America."],"insights":["The case highlights that prosecutors are targeting alleged infrastructure providers for state-linked cyberespionage operations, not only the operators who directly access victim networks.","The alleged use of cryptocurrency to buy a virtual private server and domain shows that financial trails tied to infrastructure purchases can become central evidence in cyberespionage prosecutions.","Void Blizzard’s reported reliance on purchased or stolen credentials makes credential monitoring and account-access controls especially relevant for organizations in its target sectors.","The gap between the 11 identified compromised U.S. companies and authorities’ belief that the true victim count is much higher suggests affected organizations may remain unaware of intrusions tied to this campaign."],"referencedReports":[],"body":"\u003cp\u003eRussian national Denis Obrezko, 36, appeared in U.S. federal court in Boston on charges tied to a Kremlin-linked cyberespionage campaign. He was transferred to U.S. custody from Thailand, where he was arrested last November. U.S. prosecutors allege he helped the Russian state-linked threat actor Void Blizzard gain unauthorized access to computers by providing infrastructure used to support the group’s cyber operations.\u003c/p\u003e\n\n\u003cp\u003eProsecutors allege cryptocurrency transactions linked to Obrezko were used to purchase a virtual private server and internet domain that facilitated attacks against organizations in the United States and other countries. An FBI affidavit says investigators identified at least 11 compromised U.S. companies, though authorities believe the actual number of victims is significantly higher. Obrezko reportedly remains in custody as the case moves forward.\u003c/p\u003e\n\n\u003cp\u003eResearchers have described Void Blizzard as a relatively new threat group operating in support of Russian government interests. The group has targeted government agencies, defense contractors, transportation companies, media organizations, healthcare providers and nongovernmental organizations across Europe and North America. The hackers typically use purchased or stolen credentials to infiltrate networks and steal emails and internal documents.\u003c/p\u003e\n"},{"n":7,"title":"npm v12 delivers one of the biggest security improvements in years","source":"aikido.dev","sourceColorIdx":7,"link":"https://www.aikido.dev/blog/npm-v12-block-postinstall","time":"15:16","priority":"SHOULD READ","score":82,"tldr":"npm v12 will stop running dependency install scripts by default, blocking a major supply-chain attack path abused by recent npm worms and credential stealers. Teams should test npm 11.16.0 warnings now, approve only trusted install scripts, and prepare for the v12 default change.","briefOverview":"\u003cp\u003enpm v12, scheduled to land in July 2026, will stop running dependency install scripts by default. The article describes this as one of the most useful security changes npm could make because recent supply chain attacks have abused install-time execution. Under the new model, install scripts run only for packages explicitly placed on an allowlist.\u003c/p\u003e\n\n\u003cp\u003eToday, npm automatically runs lifecycle scripts such as \u003ccode\u003epreinstall\u003c/code\u003e, \u003ccode\u003einstall\u003c/code\u003e, and \u003ccode\u003epostinstall\u003c/code\u003e for packages anywhere in the dependency tree. The article says this behavior has allowed attackers to compromise users who simply run \u003ccode\u003enpm install\u003c/code\u003e, even if they never import or use the malicious package. npm v12 will also restrict Git dependencies, remote-URL dependencies, and implicit \u003ccode\u003enode-gyp\u003c/code\u003e rebuilds triggered by \u003ccode\u003ebinding.gyp\u003c/code\u003e unless they are explicitly allowed.\u003c/p\u003e\n\n\u003cp\u003eThe article cites attacks including Nx s1ngularity, Shai-Hulud, the axios hijack, Mini Shai-Hulud, and a recent Red Hat package compromise as examples of install-time abuse. It recommends upgrading to npm 11.16.0 or later to see warnings, using \u003ccode\u003enpm approve-scripts --allow-scripts-pending\u003c/code\u003e to identify packages that would be blocked, and committing the resulting allowlist changes. It also notes that some legitimate packages use install scripts for native builds and setup, so teams should review approvals before npm v12 changes the default behavior.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003enpm v12, scheduled for July 2026, will stop running dependency install scripts by default. The article frames this as a major security improvement because npm users have faced a wave of supply chain attacks that exploited postinstall and related lifecycle scripts. Instead of automatically running scripts from any package in the dependency tree, npm will only run scripts for packages that have been explicitly approved.\u003c/p\u003e\n\n\u003cp\u003eIn current npm behavior, packages can define \u003ccode\u003epreinstall\u003c/code\u003e, \u003ccode\u003einstall\u003c/code\u003e, or \u003ccode\u003epostinstall\u003c/code\u003e scripts that execute immediately during \u003ccode\u003enpm install\u003c/code\u003e. The article emphasizes that this code runs before the user imports anything or runs their own application code. In the new model, developers build an allowlist with \u003ccode\u003enpm approve-scripts\u003c/code\u003e, block scripts with \u003ccode\u003enpm deny-scripts\u003c/code\u003e, and commit the resulting configuration alongside the project.\u003c/p\u003e\n\n\u003cp\u003enpm v12 will also change how other dependency sources behave. Git dependencies will no longer resolve unless \u003ccode\u003e--allow-git\u003c/code\u003e is passed, addressing a path where a Git dependency’s npmrc could override the Git executable and run code even with \u003ccode\u003e--ignore-scripts\u003c/code\u003e set. Remote-URL dependencies, such as HTTPS tarballs, will also stop resolving unless \u003ccode\u003e--allow-remote\u003c/code\u003e is passed, reducing the risk that an attacker can point a dependency to an external URL they control and swap the payload later.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights that packages can execute code without declaring scripts if they ship a \u003ccode\u003ebinding.gyp\u003c/code\u003e file, because npm may run an implicit \u003ccode\u003enode-gyp rebuild\u003c/code\u003e during install. npm v12 treats that native build as a declared script, meaning it is blocked unless the package is on the allowlist. The article says these changes are already present in npm 11.16.0 behind warnings, allowing teams to see what will break before upgrading.\u003c/p\u003e\n\n\u003cp\u003eThe article connects the change to several recent npm supply chain incidents, including Nx s1ngularity, Shai-Hulud, the axios hijack, Mini Shai-Hulud, and a recent Red Hat package compromise. It says these attacks typically began with a compromised maintainer account or stolen publish token, followed by a malicious package version that added an install-time hook while often leaving the real source code untouched. Recommended action includes upgrading to npm 11.16.0 or later, reviewing pending script approvals, committing updated \u003ccode\u003epackage.json\u003c/code\u003e changes, and preparing for legitimate install scripts that will need explicit approval.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003enpm v12, scheduled to land in July 2026, will stop running dependency install scripts by default. The article describes this as a long-awaited security improvement that reduces a major npm supply chain attack vector. It focuses on recent attacks that abused install-time execution, especially \u003ccode\u003epostinstall\u003c/code\u003e scripts, to run malicious code when users installed packages.\u003c/p\u003e\n\n\u003cp\u003eThe central change is that install scripts will only run for packages explicitly placed on an allowlist. Developers can build that allowlist with \u003ccode\u003enpm approve-scripts\u003c/code\u003e, block packages with \u003ccode\u003enpm deny-scripts\u003c/code\u003e, and commit the resulting configuration with the rest of the project.\u003c/p\u003e\n\n\u003ch2 id=\"current-npm-behavior\"\u003eCurrent npm Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that when users run \u003ccode\u003enpm install\u003c/code\u003e today, any package anywhere in the dependency tree can define lifecycle scripts named:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003epreinstall\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003einstall\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003epostinstall\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003enpm automatically runs those scripts during installation. This means code can execute as soon as dependencies are installed, before the user imports a package or runs their own code.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that this behavior allowed attackers to compromise systems even when the victim did not directly use or import the malicious package. Running \u003ccode\u003enpm install\u003c/code\u003e while an infected package version was present could be enough.\u003c/p\u003e\n\n\u003ch2 id=\"npm-v12-script-allowlist-model\"\u003enpm v12 Script Allowlist Model\u003c/h2\u003e\n\n\u003cp\u003enpm v12 changes the default behavior so install scripts do not run unless the package is explicitly approved. The allowlist is created with \u003ccode\u003enpm approve-scripts\u003c/code\u003e, and packages can be blocked with \u003ccode\u003enpm deny-scripts\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, when v12 encounters a malicious package with an install script, the install would stop unless that exact package is on the committed allowlist. The attacker could still publish the poisoned version, but on a machine using the new default, it would remain inert files in \u003ccode\u003enode_modules\u003c/code\u003e rather than executing during installation.\u003c/p\u003e\n\n\u003ch2 id=\"additional-dependency-restrictions\"\u003eAdditional Dependency Restrictions\u003c/h2\u003e\n\n\u003cp\u003eThe article describes two other dependency-related changes shipping with npm v12.\u003c/p\u003e\n\n\u003cp\u003eFirst, Git dependencies will no longer resolve unless the user passes \u003ccode\u003e--allow-git\u003c/code\u003e. The article says this closes a quieter execution path where a Git dependency’s npmrc could override the Git executable and run code even when \u003ccode\u003e--ignore-scripts\u003c/code\u003e was set.\u003c/p\u003e\n\n\u003cp\u003eSecond, remote-URL dependencies such as HTTPS tarballs will no longe
