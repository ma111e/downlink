ved tokens, strict scoping, and segmentation. The article describes options such as MCP-mediated access, agent segmentation, gateways, secrets managers, observability, and real-time detection and response. It also connects these practices to emerging frameworks and standards including CISA/NSA partner guidance, OWASP, NIST, FIDO, DPoP, Rich Authorization Requests, OAuth 2.1, and the EU AI Act.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eNetskope Threat Labs presented research at Infosecurity Europe 2026 on how OAuth authorization abuse is becoming a larger problem in the agentic AI era. The article frames OAuth token abuse as distinct from authentication failures because MFA is applied at initial consent, while OAuth tokens can continue authorizing actions afterward without further user checkpoints. It cites the Salesloft/Drift AI Chat Agent breach, in which more than 700 Salesforce customers were compromised from a single stolen OAuth token, and a Gainsight token incident that went undetected for three months.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that AI agents increase the scale of OAuth exposure because agents can hold multiple grants and run continuously. It estimates that if 1,000 employees each launch five agents, and every agent holds around 10 OAuth grants, an enterprise could be managing exposure from about 50,000 active tokens. It says many enterprise platform credentials persist until explicit revocation, and some expiry mechanisms are inactivity-based rather than time-based.\u003c/p\u003e\n\n\u003cp\u003eSeveral technical properties make agents worse than conventional third-party applications in the article’s analysis. These include persistent tokens stored in agent memory or configuration, broad deployment-time scopes, no human approval gate for autonomous actions, limited visibility into runtime behavior, and arbitrary execution workflows. The article says traditional IAM’s monolithic identity model is unsuitable for agents because agents need narrow credentials scoped to specific tasks and expired when those tasks end.\u003c/p\u003e\n\n\u003cp\u003eThe article describes a confused deputy attack pattern in which an adversary places malicious instructions in data an agent legitimately consumes, such as a poisoned document or issue comment. If the agent follows the injected instruction, it may use its own valid OAuth token to carry out the attacker’s intent. The resulting API calls appear authorized because they use valid credentials and granted scopes.\u003c/p\u003e\n\n\u003cp\u003eNetskope recommends architectural defenses built around isolation, short-lived tokens, strict scoping, and segmentation. It discusses MCP-mediated access, agent segmentation, gateways, secrets managers, observability, and detection and response measures such as behavioral baselines, session blocking, and real-time OAuth grant revocation. The article also points to standards and governance efforts from CISA, NSA, partner agencies, OWASP, NIST, FIDO, DPoP, Rich Authorization Requests, OAuth 2.1, and the EU AI Act, and says organizations should start by inventorying tokens, scopes, and agent usage.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eNetskope Threat Labs presented research at Infosecurity Europe 2026 on what the article calls the OAuth trust problem at scale. The central argument is that OAuth authorization abuse has evolved from a third-party supply chain issue into a structural crisis for AI agents. The article focuses on how OAuth tokens already fail at enterprise scale, why autonomous agents expand the problem, and what organizations can do now.\u003c/p\u003e\n\n\u003cp\u003eThe article distinguishes authentication from authorization. MFA is described as firing once when a user consents to an OAuth grant, while the resulting token can operate silently afterward. Netskope argues that this separation means stolen OAuth tokens can bypass the layer where MFA applies.\u003c/p\u003e\n\n\u003ch2 id=\"incidents-and-breach-context\"\u003eIncidents and breach context\u003c/h2\u003e\n\n\u003cp\u003eThe article cites the Salesloft/Drift AI Chat Agent breach as an example of OAuth token risk. It states that more than 700 Salesforce customers were compromised from a single stolen OAuth token. It also cites a separate Gainsight incident in which stolen tokens from August 2023 went undetected for three months before discovery.\u003c/p\u003e\n\n\u003cp\u003eThe article uses these examples to illustrate a broader pattern rather than isolated failures. It cites the Verizon DBIR 2025 finding that third-party involvement appeared in 30% of all breaches, which it says was double the prior year’s 15%. It also cites Proofpoint’s finding that 59% of taken-over accounts had MFA enabled, using that point to argue that attackers had moved beyond the MFA-controlled authentication layer.\u003c/p\u003e\n\n\u003ch2 id=\"why-ai-agents-increase-oauth-exposure\"\u003eWhy AI agents increase OAuth exposure\u003c/h2\u003e\n\n\u003cp\u003eThe article estimates that every agent a user launches may hold around 10 OAuth grants. At the scale of 1,000 employees using five agents each, it says an enterprise could be managing exposure from about 50,000 active tokens. The article emphasizes that many such tokens may have been issued months earlier and never reviewed.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, credentials across major enterprise platforms often persist until someone explicitly revokes them. Where expiry exists, the article says it is typically opt-in, and token rotation must be deliberately enabled per application by the developer or administrator who configured the integration. It also notes that some enforced limits are inactivity-based, meaning a token can remain valid as long as it continues to be used.\u003c/p\u003e\n\n\u003ch2 id=\"structural-agent-risks\"\u003eStructural agent risks\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies five structural properties that make AI agents worse than conventional third-party applications:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePersistent tokens create long-lived credentials in agent memory or configuration and are rarely rotated.\u003c/li\u003e\n\u003cli\u003eBroad scopes are often requested at deployment “just in case” and then not reviewed again.\u003c/li\u003e\n\u003cli\u003eNo human-in-the-loop means autonomous actions lack a user approval gate.\u003c/li\u003e\n\u003cli\u003eOpaque runtime behavior limits visibility into what an agent reads or acts on during execution.\u003c/li\u003e\n\u003cli\u003eArbitrary execution makes agents resemble Remote Code Execution vulnerabilities because of open-ended workflows.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also argues that the traditional IAM model of one person, one identity, and one permission set is unsuitable for agents. It says that model assumes human supervision, accountability, and periodic review. For agents, Netskope says the correct model is a separate narrow credential for each agent, scoped to a specific task and expired when that task ends.\u003c/p\u003e\n\n\u003ch2 id=\"confused-deputy-pattern\"\u003eConfused deputy pattern\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a specific attack pattern based on malicious instructions embedded in data the agent legitimately consumes. Examples given include a poisoned document or a booby-trapped issue comment in a code repository. If the agent follows the injected instruction, it uses its own valid token to execute the attacker’s intent.\u003c/p\u003e\n\n\u003cp\u003eIn this scenario, every resulting API call carries valid credentials and authorized scopes. The article links this pattern to prompt injection and describes it as a confused deputy problem. The risk comes from the agent acting autonomously with its own granted authority while processing untrusted external data.\u003c/p\u003e\n\n\u003ch2 id=\"architectural-defenses-and-blast-radius-reduction\"\u003eArchitectural defenses and blast radius reduction\u003c/h2\u003e\n\n\u003cp\u003eNetskope says the problem is architectural and that defenses should follow four principles: isolation, short-lived tokens, strict scoping, and segmentation. The article presents several design choices available today to support these goals.\u003c/p\u003e\n\n\u003cp\u003eOne option is MCP-mediated access, where the agent requests access through a controlled Model Context Protocol layer. In this model, credentials are issued per tool call and the MCP layer enforces boundaries the agent cannot override. The article notes that true least privilege still depends on implementation choices that assign only the minimum required permissions to each tool invocation.\u003c/p\u003e\n\n\u003cp\u003eAnother option is agent segmentation. The article recommends separating agents by function and assigning each one minimal task-specific credentials. It says this contains a compromised agent’s blast radius to its own narrow scope and makes lateral movement require compromise of a different identity.\u003c/p\u003e\n\n\u003cp\u003eThe article also discusses gateways. It says gateways can support governance and token lifecycle management, and many operate as SWG or web request proxies that drop disallowed traffic and detect or prevent token and data exfiltration. It adds that these options can be combined, such as routing MCP services through gateways, and recommends securing tokens in a secrets manager.\u003c/p\u003e\n\n\u003ch2 id=\"governance-model\"\u003eGovernance model\u003c/h2\u003e\n\n\u003cp\u003eThe article proposes a governance lifecycle and contrasts present-day agent configuration with an ideal future state. In the “today” state, examples include broad scopes such as \u003ccode\u003erepos:all\u003c/code\u003e and \u003ccode\u003ecalendar:readwrite\u003c/code\u003e, a 90-day refresh token, binding to any client with the token, and audit logs that only say an OAuth app accessed GitHub. In the governed state, examples include narrow scopes such as \u003ccode\u003erepos:readwrite:my-org/frontend\u003c/code\u003e, 60-second just-in-time credentials that are automatically reaped, binding to a specific agent and device, destructive action re-approval, and detailed audit records including agent identity, user, file access, sandbox, and time.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights agent observability as a key part of governance. It says audit trails can provide visibility into how AI agents interact with models, tools, and enterprise data. It also says integrations with platforms such as Claude through a Compliance API can help organizations monitor agent misconfigurations, track tool usage, and gain visibility into OAuth-connected third-party applications and services.\u003c/p\u003e\n\n\u003cp\u003eFor detection and response, the article recommends establishing behavioral baselines for agents and tool usage. It says anomaly detection and response can include actions such as blocking a session and revoking OAuth grants in real time.\u003c/p\u003e\n\n\u003ch2 id=\"standards-and-regulatory-alignment\"\u003eStandards and regulatory alignment\u003c/h2\u003e\n\n\u003cp\u003eThe article says major frameworks addressing agent security converge on similar mandates. It lists a CISA/NSA/Australia/Canada/New Zealand/UK joint advisory calling for cryptographic agent identity and short-lived credentials, OWASP Top 10 for Agentic Apps identifying identity and privilege abuse as a top-tier risk, the NIST AI Agent Standards Initiative focusing on agent identity and authorization, and the FIDO Alliance Agentic Auth TWG focused on verifiable agent identity and trusted delegation.\u003c/p\u003e\n\n\u003cp\u003eThe article also identifies technical standards supporting this direction. It says DPoP, defined in RFC 9449, sender-constrains tokens so a stolen token cannot be replayed from a different client. It says Rich Authorization Requests, defined in RFC 9396, enable per-call scoped permissions instead of broad upfront grants. It also states that OAuth 2.1 consolidates these ideas and is in active working group refinement.\u003c/p\u003e\n\n\u003cp\u003eFor Europe, the article says autonomous agents with OAuth access will likely qualify as high-risk systems under Annex III of the EU AI Act, triggering mandatory oversight and audit obligations under Articles 14 and 26. It states that enforcement starts on 2 August 2026. Netskope argues that building the governance model now is both a security and compliance step.\u003c/p\u003e\n\n\u003ch2 id=\"main-takeaway\"\u003eMain takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that the key question is no longer only who logged in. Instead, organizations need to know which entity, authorized by whom, did what, with which token, and for how long. Netskope recommends starting with inventory: identifying what tokens exist, what scopes they hold, and which agents use them.\u003c/p\u003e\n","keyPoints":["Netskope Threat Labs argues that OAuth authorization abuse has become a structural security problem as tokens can continue operating silently after a user’s initial MFA-backed consent.","The article estimates that 1,000 employees using five AI agents each could create exposure from about 50,000 active OAuth tokens, many of which may be long-lived and rarely reviewed.","AI agents worsen OAuth risk because they may use persistent tokens, broad scopes, opaque runtimes, autonomous actions, and arbitrary execution workflows.","The article describes a confused deputy scenario in which an attacker plants malicious instructions in data an agent consumes, causing the agent to use its own valid token to carry out the attacker’s intent.","Netskope recommends governance based on isolation, short-lived tokens, strict scoping, segmentation, observability, and detection and response capabilities for agent OAuth usage."],"insights":["MFA does not mitigate stolen OAuth token abuse because the article states MFA applies only at the initial consent step, while the token later governs authorization without further human checkpoints.","Inactivity-based token expiry can be ineffective for active AI agents because the article notes that tokens may remain valid as long as they keep being used.","The article highlights that agent security depends not only on OAuth standards such as OAuth 2.1, DPoP, and Rich Authorization Requests, but also on implementers assigning minimum permissions per tool invocation.","A practical governance target is to make audit logs specific enough to show the agent identity, user, exact action, sandbox, and time, rather than only recording that an OAuth app accessed a service.","The article frames early agent OAuth governance as both a security and compliance measure for European organizations because EU AI Act enforcement begins on 2 August 2026 and may apply to autonomous agents with OAuth access."],"referencedReports":[{"title":"Verizon DBIR 2025","url":"https://www.verizon.com/business/resources/reports/dbir/","publisher":"Verizon","context":"The article cites the Verizon DBIR 2025 for the finding that third-party involvement appeared in 30% of all breaches, double the prior year’s 15%.","category":"","primary":false},{"title":"State of Phish","url":"https://www.proofpoint.com/us/resources/threat-reports/state-of-phish","publisher":"Proofpoint","context":"The article cites Proofpoint’s State of Phish report for the finding that 59% of taken-over accounts had MFA enabled.","category":"","primary":false},{"title":"Careful Adoption of Agentic AI Services","url":"https://www.cisa.gov/resources-tools/resources/careful-adoption-agentic-ai-services","publisher":"CISA, NSA, and partner cyber agencies","context":"The article lists this joint advisory as a framework mandating cryptographic agent identity and short-lived credentials for agentic AI services.","category":"","primary":false},{"title":"OWASP Top 10 for Agentic Applications for 2026","url":"https://genai.owasp.org/resource/owasp-top-10-for-agentic-applications-for-2026/","publisher":"OWASP","context":"The article references the OWASP Top 10 for Agentic Apps, specifically ASI-03, as identifying identity and privilege abuse as a top-tier risk.","category":"","primary":false}],"body":"\u003cp\u003eAt Infosecurity Europe 2026, Netskope Threat Labs presented research arguing that OAuth authorization abuse has shifted from a third-party supply chain problem into a structural issue for AI agents. The article says MFA applies only when a user initially consents to an OAuth grant, while the resulting token can operate silently afterward. It cites incidents involving Salesloft/Drift AI Chat Agent and Gainsight tokens as examples of how stolen OAuth tokens can affect many customers and remain undetected.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that AI agents make the OAuth trust problem worse because each agent may hold multiple long-lived grants. Netskope estimates that 1,000 employees using five agents each could create exposure from about 50,000 active tokens. It highlights persistent tokens, broad scopes, no human-in-the-loop, opaque runtime behavior, and arbitrary execution as structural properties that increase risk.\u003c/p\u003e\n\n\u003cp\u003eNetskope recommends reducing blast radius through isolation, short-lived tokens, strict scoping, and segmentation. The article describes options such as MCP-mediated access, agent segmentation, gateways, secrets managers, observability, and real-time detection and response. It also connects these practices to emerging frameworks and standards including CISA/NSA partner guidance, OWASP, NIST, FIDO, DPoP, Rich Authorization Requests, OAuth 2.1, and the EU AI Act.\u003c/p\u003e\n"},{"n":10,"title":"Andrew Becherer Joins Socket as Chief Information Security Officer","source":"socket.dev","sourceColorIdx":2,"link":"https://socket.dev/blog/andrew-becherer-socket-ciso?utm_medium=feed","time":"16:36","priority":"MAY READ","score":45,"tldr":"Socket has appointed Andrew Becherer as its first Chief Information Security Officer to lead security, compliance, and risk as the company scales its software supply chain security work. Becherer brings prior CISO experience from Datadog, Iterable, and Sublime Security.","briefOverview":"\u003cp\u003eSocket announced that Andrew Becherer has joined the company as its first Chief Information Security Officer. The company says the role comes as Socket protects more than 27,000 organizations, including enterprises that use it to secure software supply chains. Socket described the appointment as dedicated executive leadership for security, compliance, and risk.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the move against a backdrop of increased reliance on AI-generated code and open source packages that developers may not have reviewed. It states that package hijackings and maintainer compromises that were once only a handful of incidents per year now occur weekly. Socket says Becherer will help guide security across the company, its products, and its work with the defender community.\u003c/p\u003e\n\n\u003cp\u003eBecherer previously worked at iSEC Partners and served as CISO at Datadog, Iterable, and Sublime Security. He also founded Staris AI, where he worked on security and trust issues related to production AI systems. Socket CEO Feross Aboukhadijeh said Becherer understands the supply chain problem from both defender and builder perspectives.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eSocket announced that Andrew Becherer has joined as the company’s first Chief Information Security Officer. The company described the appointment as a major step as it scales its security, compliance, and risk functions. Socket says it now protects more than 27,000 organizations, including enterprises that depend on it to secure the software supply chain behind important products.\u003c/p\u003e\n\n\u003cp\u003eThe article places the announcement in the context of modern engineering organizations relying heavily on open source and AI-generated code. It says AI now writes as much as 90% of code at top engineering organizations, while downstream developers pull in open source they have never reviewed. Socket also states that package hijackings and maintainer compromises have moved from a handful of incidents per year to weekly occurrences.\u003c/p\u003e\n\n\u003cp\u003eBecherer brings experience from several SaaS and security organizations. He began his security career at iSEC Partners, where he worked with hyperscalers on infrastructure security. He later served as CISO at Datadog during its hypergrowth years, then as CISO at Iterable, and most recently as CISO at Sublime Security.\u003c/p\u003e\n\n\u003cp\u003eBetween Iterable and Sublime Security, Becherer founded Staris AI. The article says his work there focused on the security and trust questions involved in building production AI systems. Socket presents this background as relevant to companies that move quickly, serve demanding customers, and treat trust as part of the product.\u003c/p\u003e\n\n\u003cp\u003eSocket CEO Feross Aboukhadijeh said hiring the company’s first CISO was a high-stakes decision. He said Becherer has built and run security at every scale and understands the supply chain problem from both sides. Becherer said he joined because the software supply chain is where the fight is now, and because CISOs are trying to enable developers to use open source and AI tooling without inheriting malicious packages.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eSocket announced that Andrew Becherer has joined the company as its first Chief Information Security Officer. The company framed the appointment as an important moment in its growth, saying it now protects more than 27,000 organizations. Socket said those organizations include enterprises that depend on the company to secure the software supply chain behind their most important products.\u003c/p\u003e\n\n\u003cp\u003eThe announcement presents Becherer’s role as dedicated executive leadership across security, compliance, and risk. Socket said security has been central to how it builds, shaped by a team with deep experience maintaining critical open source infrastructure. At its current scale, the company said that work now requires dedicated leadership.\u003c/p\u003e\n\n\u003ch2 id=\"context-for-the-appointment\"\u003eContext for the Appointment\u003c/h2\u003e\n\n\u003cp\u003eThe article connects the CISO appointment to changes in modern software development. Socket says AI now writes as much as 90% of code at top engineering organizations. It also says developers downstream of that code pull in open source they have never reviewed.\u003c/p\u003e\n\n\u003cp\u003eSocket describes open source security risk as increasingly frequent. The article states that package hijackings and maintainer compromises that were once a handful of incidents per year now happen weekly. It says modern engineering organizations depend on open source to ship faster and need security partners that can keep pace with that shift.\u003c/p\u003e\n\n\u003ch2 id=\"andrew-becherer-s-background\"\u003eAndrew Becherer’s Background\u003c/h2\u003e\n\n\u003cp\u003eAndrew Becherer began his security career at iSEC Partners. There, according to the article, he worked with hyperscalers on infrastructure security.\u003c/p\u003e\n\n\u003cp\u003eHe later served as CISO at Datadog during the company’s hypergrowth years. He also served as CISO at Iterable. Most recently, he was CISO at Sublime Security.\u003c/p\u003e\n\n\u003cp\u003eBetween Iterable and Sublime Security, Becherer founded Staris AI. The article says he worked there on the security and trust questions that come with building production AI systems. Socket highlights this experience as part of his background leading security at companies that move quickly, serve demanding customers, and operate where trust is part of the product.\u003c/p\u003e\n\n\u003ch2 id=\"socket-s-view-of-the-role\"\u003eSocket’s View of the Role\u003c/h2\u003e\n\n\u003cp\u003eSocket CEO Feross Aboukhadijeh said hiring the company’s first CISO was one of the highest-stakes decisions Socket would make. He said Becherer has built and run security at every scale. He also said Becherer understands the supply chain problem from both sides.\u003c/p\u003e\n\n\u003cp\u003eAboukhadijeh described Becherer as both a defender and a builder. He said Becherer has lived through the problem and knows what tools actually help. He also said Becherer is the right person to own how Socket protects itself and how Socket shows up for the security teams it serves.\u003c/p\u003e\n\n\u003ch2 id=\"becherer-s-stated-priorities-and-rationale\"\u003eBecherer’s Stated Priorities and Rationale\u003c/h2\u003e\n\n\u003cp\u003eBecherer said he joined Socket because “the supply chain is where the fight is right now.” He described Socket as doing some of the hardest and most important work in that space. He also said every CISO he talks to is trying to give developers the open source ecosystem and AI tooling they need without inheriting somebody else’s malicious package.\u003c/p\u003e\n\n\u003cp\u003eThe article says Becherer will help guide how Socket builds security into three areas:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe company itself.\u003c/li\u003e\n\u003cli\u003eThe product.\u003c/li\u003e\n\u003cli\u003eSocket’s work with the broader community of defenders.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-and-security-themes-mentioned\"\u003eTechnical and Security Themes Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article does not disclose a specific incident, vulnerability, threat actor, or campaign. Instead, it identifies software supply chain security as the central issue. The specific risks named in the article are package hijackings, maintainer compromises, malicious packages, unreviewed open source dependencies, and security concerns around production AI systems.\u003c/p\u003e\n\n\u003cp\u003eSocket ties these risks to the way engineering teams now build software. It says organizations depend on open source to ship faster. It also says AI-generated code and unreviewed dependencies create a situation where CISOs must balance developer enablement with the risk of inheriting malicious packages.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe disclosed response is organizational rather than technical. Socket is creating its first CISO role and placing Becherer in charge of executive leadership for security, compliance, and risk. The company says his experience will help strengthen the security program behind the products it builds, the infrastructure it operates, and the open source ecosystem it aims to protect.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that Socket is hiring across engineering, product, design, security, and go-to-market. This hiring note is presented at the end of the announcement as part of the company’s broader growth.\u003c/p\u003e\n","keyPoints":["Socket has appointed Andrew Becherer as its first Chief Information Security Officer.","Socket says it now protects more than 27,000 organizations, including enterprises that rely on it to secure software supply chains.","Andrew Becherer previously served as CISO at Datadog, Iterable, and Sublime Security, and founded Staris AI between Iterable and Sublime.","Socket CEO Feross Aboukhadijeh said Becherer will own how Socket protects itself and how it supports the security teams it serves.","Becherer said he joined Socket because software supply chain security is a critical problem for CISOs trying to balance open source and AI tooling with malicious package risk."],"insights":["Socket frames AI-generated code and unreviewed open source dependencies as a combined software supply chain risk that is increasing pressure on security teams.","The article says package hijackings and maintainer compromises have shifted from a few incidents per year to weekly events, indicating that Socket views open source compromise as a frequent operational risk.","Socket’s creation of a first CISO role is tied to its scale of more than 27,000 protected organizations and the need for dedicated executive leadership across security, compliance, and risk.","Andrew Becherer’s background spans both fast-growing SaaS security leadership and production AI trust work, which aligns with Socket’s focus on securing open source use in AI-enabled development environments."],"referencedReports":[],"body":"\u003cp\u003eSocket announced that Andrew Becherer has joined the company as its first Chief Information Security Officer. The company says the role comes as Socket protects more than 27,000 organizations, including enterprises that use it to secure software supply chains. Socket described the appointment as dedicated executive leadership for security, compliance, and risk.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the move against a backdrop of increased reliance on AI-generated code and open source packages that developers may not have reviewed. It states that package hijackings and maintainer compromises that were once only a handful of incidents per year now occur weekly. Socket says Becherer will help guide security across the company, its products, and its work with the defender community.\u003c/p\u003e\n\n\u003cp\u003eBecherer previously worked at iSEC Partners and served as CISO at Datadog, Iterable, and Sublime Security. He also founded Staris AI, where he worked on security and trust issues related to production AI systems. Socket CEO Feross Aboukhadijeh said Becherer understands the supply chain problem from both defender and builder perspectives.\u003c/p\u003e\n"},{"n":2,"title":"Why AI-driven threats are exposing the limits of MSP security stacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/why-ai-driven-threats-are-exposing-the-limits-of-msp-security-stacks/","time":"14:00","priority":"MAY READ","score":35,"tldr":"AI-driven attacks are shrinking response windows and exposing the weaknesses of fragmented MSP security stacks. The article argues MSPs need unified, automated security platforms to improve detection, response, recovery, and scalability.","briefOverview":"\u003cp\u003eAI is increasing the speed and scale of cybercrime, and the article argues that many MSP security operations were not designed for this pace. It cites Gartner’s prediction that AI agents will reduce the time needed to exploit account exposures by 50% by 2027. It also says phishing campaigns can now be generated in minutes and vulnerabilities can be identified and exploited automatically.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central claim is that fragmented MSP security stacks slow response and make it harder to prove client environments are protected. It describes technicians switching between separate tools for EDR alerts, backup status, patching data, and remediation validation. The article says this operational friction gives attackers more time to escalate privileges, move laterally, and deepen access.\u003c/p\u003e\n\n\u003cp\u003eKaseya argues that MSPs need unified, AI-powered platforms that combine security, automation, monitoring, and recovery workflows. It presents Kaseya 365 Endpoint as an example that combines RMM, endpoint security, patch management, backup, ransomware protection, MDR, and \u003csup\u003e24\u003c/sup\u003e\u0026frasl;\u003csub\u003e7\u003c/sub\u003e SOC services. The article frames consolidation as a way to improve response speed, reduce tool sprawl, and support cybersecurity revenue growth.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article argues that AI-driven threats are exposing the limits of traditional and fragmented MSP security stacks. It cites Gartner’s prediction that AI agents will cut the time required to exploit account exposures by 50% by 2027. It also says attackers can generate polished phishing campaigns in minutes and automatically identify and exploit vulnerabilities that previously required manual reconnaissance.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, AI is accelerating multiple stages of the attack lifecycle, including reconnaissance, initial access, and malware development. It cites Verizon’s 2026 Data Breach Investigations Report as finding that threat actors are already using generative AI across several stages of the attack chain. No specific threat actor group is identified in the article.\u003c/p\u003e\n\n\u003cp\u003eThe article describes MSP technicians working across disconnected tools during incidents, including EDR consoles, backup platforms, RMM systems, patching data, and remediation workflows. It says every minute spent switching between platforms is time attackers can use to escalate privileges, move laterally, and increase their foothold. The business impact described includes heavier technician workloads, slower incident response, more difficult service scaling, and pressure on margins.\u003c/p\u003e\n\n\u003cp\u003eKaseya frames modern endpoint security around three capabilities: fast detection, coordinated response, and rapid recovery. It argues that deep integration can allow a ransomware-related detection to trigger device isolation, technician alerts, backup integrity verification, remediation workflows, and recovery progress visibility from a single interface. The article also says automation and AI-assisted response can help patch vulnerabilities, enforce policies, detect anomalies, and trigger remediation without waiting for technician action.\u003c/p\u003e\n\n\u003cp\u003eThe article positions cybersecurity as a growth area for MSPs, citing Kaseya State of the MSP research that says 71% of MSPs reported year-over-year cybersecurity revenue growth and 61% said most or all clients rely on them for cybersecurity guidance. It says the main barrier to expanding services is not demand, but tool complexity and talent constraints. Kaseya promotes unified platforms, including Kaseya 365 Endpoint, as a way to combine RMM, endpoint security, patch management, backup, ransomware protection, MDR, and \u003csup\u003e24\u003c/sup\u003e\u0026frasl;\u003csub\u003e7\u003c/sub\u003e SOC services into one operational model.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article is a sponsored piece written by Kaseya about how AI-driven cyber threats are pressuring managed service providers, or MSPs, to modernize their security operations. Its main argument is that fragmented security stacks are too slow and complex for an environment where AI is accelerating attacker workflows. The article promotes a unified, AI-powered approach that combines prevention, detection, response, recovery, automation, and reporting.\u003c/p\u003e\n\n\u003cp\u003eKaseya frames the issue as both a technical and business challenge for MSPs. Technically, attackers are moving faster across phishing, reconnaissance, initial access, malware development, and vulnerability exploitation. Operationally, MSPs are slowed by disconnected tools, manual workflows, technician workload, and difficulty scaling services without adding cost or staff.\u003c/p\u003e\n\n\u003ch2 id=\"ai-driven-threat-context\"\u003eAI-driven threat context\u003c/h2\u003e\n\n\u003cp\u003eThe article says AI is transforming cybercrime by increasing both speed and scale. It cites Gartner’s prediction that AI agents will reduce the time needed to exploit account exposures by 50% by 2027. It also states that phishing campaigns that once took days to craft can now be generated in minutes and can avoid the obvious errors that previously made them easier to spot.\u003c/p\u003e\n\n\u003cp\u003eThe article further says vulnerabilities that previously required manual reconnaissance can now be identified and exploited automatically. It cites Verizon’s 2026 Data Breach Investigations Report as finding that threat actors are already using generative AI across multiple stages of the attack chain, including reconnaissance, initial access, and malware development. The article does not name any specific threat actor group.\u003c/p\u003e\n\n\u003ch2 id=\"limits-of-fragmented-msp-security-stacks\"\u003eLimits of fragmented MSP security stacks\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that many MSPs still rely on fragmented security stacks that slow down incident response. It gives examples of technicians needing to move between separate platforms: an EDR console for alerts, another login to verify backup status, an RMM system for patching data, and other platforms to validate remediation. This fragmentation is presented as a major operational weakness when attackers are moving quickly.\u003c/p\u003e\n\n\u003cp\u003eThe article says every minute spent switching between tools gives attackers time to escalate privileges, move laterally, and deepen their foothold. It also says fragmented operations increase technician workloads, slow incident response, complicate service scaling, and add pressure to margins. In this view, security outcomes are increasingly determined by operational speed and coordination, not only by the quality of individual tools.\u003c/p\u003e\n\n\u003ch2 id=\"capabilities-the-article-says-modern-endpoint-security-needs\"\u003eCapabilities the article says modern endpoint security needs\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies three core requirements for modern endpoint security operations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSpeed of detection.\u003c/li\u003e\n\u003cli\u003eCoordinated response.\u003c/li\u003e\n\u003cli\u003eFast recovery.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIt argues that achieving these across multiple disconnected platforms is difficult. The article says more MSPs are consolidating around unified environments where security, automation, monitoring, and recovery operate as coordinated workflows.\u003c/p\u003e\n\n\u003ch2 id=\"deep-integration\"\u003eDeep integration\u003c/h2\u003e\n\n\u003cp\u003eThe article distinguishes deep integration from lighter tool connections. It says many MSP security tools may sync data, but response workflows remain disconnected. Kaseya argues that modern endpoint security requires tighter operational integration so each step of response can work together automatically.\u003c/p\u003e\n\n\u003cp\u003eAs an example, the article describes a ransomware detection scenario in which an integrated environment can:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIsolate the affected device.\u003c/li\u003e\n\u003cli\u003eAlert technicians.\u003c/li\u003e\n\u003cli\u003eVerify backup integrity.\u003c/li\u003e\n\u003cli\u003eTrigger remediation workflows.\u003c/li\u003e\n\u003cli\u003eDisplay recovery progress from a single interface.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this kind of coordination can reduce time-to-containment, minimize downtime, and simplify compliance reporting.\u003c/p\u003e\n\n\u003ch2 id=\"automation-and-ai-assisted-response\"\u003eAutomation and AI-assisted response\u003c/h2\u003e\n\n\u003cp\u003eThe article says many MSP environments still rely heavily on manual effort during security incidents. It argues that this creates dangerous delays when response windows are measured in minutes. Automation is described as a way to continuously patch vulnerabilities, enforce security policies, detect anomalies earlier, and trigger remediation without waiting for technician action.\u003c/p\u003e\n\n\u003cp\u003eThe article also links automation to scalability. It says growing attack volumes and shrinking response windows can overwhelm teams, and automation helps MSPs deliver consistent protection across a larger client base without proportional increases in staffing.\u003c/p\u003e\n\n\u003ch2 id=\"tool-sprawl-and-operational-cost\"\u003eTool sprawl and operational cost\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies tool sprawl as a barrier to automation and speed. It says MSPs often add tools over time to address new threats, client requirements, or compliance obligations. According to the article, this can create overlapping functionality, fragmented workflows, and administrative overhead.\u003c/p\u003e\n\n\u003cp\u003eKaseya argues that reducing unnecessary complexity helps teams move faster, respond more consistently, lower licensing costs, and present a clearer security story to clients. The article links this directly to profitability and margin pressure for MSPs.\u003c/p\u003e\n\n\u003ch2 id=\"security-as-a-growth-area-for-msps\"\u003eSecurity as a growth area for MSPs\u003c/h2\u003e\n\n\u003cp\u003eThe article says cybersecurity has become one of the clearest drivers of MSP revenue growth and client retention. It cites the 2026 Kaseya State of the MSP research, which says 71% of MSPs reported year-over-year cybersecurity revenue growth, the highest of any service category. The same research is cited as saying 61% of MSPs report that most or all of their clients rely on them for cybersecurity guidance.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article says demand is not the main barrier to expanding security services. Instead, it points to tool complexity and talent constraints. It says hiring experienced security professionals is expensive and adding more products increases operational overhead while making environments harder to manage.\u003c/p\u003e\n\n\u003ch2 id=\"kaseya-s-promoted-platform-approach\"\u003eKaseya’s promoted platform approach\u003c/h2\u003e\n\n\u003cp\u003eThe article presents unified security platforms as operational multipliers for MSPs. It says these platforms can provide faster remediation, clearer visibility, and stronger reporting. It also says these capabilities help MSPs demonstrate security value, strengthen client trust, and support recurring revenue growth.\u003c/p\u003e\n\n\u003cp\u003eKaseya 365 Endpoint is given as an example of this all-in-one platform model. The article says it combines:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRMM.\u003c/li\u003e\n\u003cli\u003eEndpoint security.\u003c/li\u003e\n\u003cli\u003ePatch management.\u003c/li\u003e\n\u003cli\u003eBackup.\u003c/li\u003e\n\u003cli\u003eRansomware protection.\u003c/li\u003e\n\u003cli\u003eMDR.\u003c/li\u003e\n\u003cli\u003e\u003csup\u003e24\u003c/sup\u003e\u0026frasl;\u003csub\u003e7\u003c/sub\u003e SOC services.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the value of this model is not only having fewer tools, but enabling prevention, detection, response, and recovery to work as a coordinated whole. It frames this as a way to reduce visibility gaps and enable faster response with less overhead.\u003c/p\u003e\n\n\u003ch2 id=\"impact-on-clients-and-msp-relationships\"\u003eImpact on clients and MSP relationships\u003c/h2\u003e\n\n\u003cp\u003eThe article says clients are increasingly judging MSPs not only by their ability to detect threats, but also by how quickly they can respond, recover systems, and communicate during an incident. It argues that integrated security platforms support this by connecting visibility, response, and recovery in a single operational model.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that faster remediation, clearer reporting, and lower operational overhead can help MSPs show security value more effectively. It connects those benefits to stronger client trust and long-term recurring revenue growth.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main takeaway is that AI-driven threats are compressing response windows and making fragmented MSP security operations less effective. Kaseya argues that MSPs need unified, automated, AI-assisted platforms to coordinate detection, response, recovery, and reporting while reducing tool complexity and staffing pressure.\u003c/p\u003e\n","keyPoints":["AI is accelerating cybercrime by enabling faster phishing, reconnaissance, initial access, malware development, and automated vulnerability exploitation.","The article says MSPs using fragmented security stacks lose time switching between disconnected tools for EDR alerts, backup verification, patching data, and remediation validation.","Modern endpoint security operations need fast detection, coordinated response, and rapid recovery across integrated workflows.","The article argues that automation and AI-assisted response can help MSPs patch vulnerabilities, enforce policies, detect anomalies, and trigger remediation without waiting for technicians.","Kaseya says unified platforms such as Kaseya 365 Endpoint can combine RMM, endpoint security, patch management, backup, ransomware protection, MDR, and SOC services into one operational model."],"insights":["The article frames operational speed and coordination, rather than the quality of individual security tools alone, as the deciding factor for MSP security outcomes against AI-driven threats.","A practical response workflow highlighted in the article is to automatically isolate a ransomware-affected device, notify technicians, verify backup integrity, trigger remediation, and show recovery progress from one interface.","The article identifies tool complexity and talent constraints, not lack of customer demand, as the main obstacles to MSPs expanding cybersecurity services.","The article connects security stack consolidation directly to MSP profitability by arguing that fewer disconnected products can reduce licensing costs, technician workload, and the need for proportional staffing increases."],"referencedReports":[{"title":"2026 Data Breach Investigations Report","url":"https://www.verizon.com/business/resources/reports/dbir/","publisher":"Verizon","context":"The article cites Verizon’s 2026 Data Breach Investigations Report as finding that threat actors are deploying generative AI across multiple stages of the attack chain.","category":"","primary":false}],"body":"\u003cp\u003eAI is increasing the speed and scale of cybercrime, and the article argues that many MSP security operations were not designed for this pace. It cites Gartner’s prediction that AI agents will reduce the time needed to exploit account exposures by 50% by 2027. It also says phishing campaigns can now be generated in minutes and vulnerabilities can be identified and exploited automatically.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central claim is that fragmented MSP security stacks slow response and make it harder to prove client environments are protected. It describes technicians switching between separate tools for EDR alerts, backup status, patching data, and remediation validation. The article says this operational friction gives attackers more time to escalate privileges, move laterally, and deepen access.\u003c/p\u003e\n\n\u003cp\u003eKaseya argues that MSPs need unified, AI-powered platforms that combine security, automation, monitoring, and recovery workflows. It presents Kaseya 365 Endpoint as an example that combines RMM, endpoint security, patch management, backup, ransomware protection, MDR, and \u003csup\u003e24\u003c/sup\u003e\u0026frasl;\u003csub\u003e7\u003c/sub\u003e SOC services. The article frames consolidation as a way to improve response speed, reduce tool sprawl, and support cybersecurity revenue growth.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

  return (
    <nav className="swipe-nav" style={{

    }}>

        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>

        }}>TRIAGE</span>

      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}

        <select value={theme} onChange={(e) => applyTheme(e.target.value)} title="Select theme" aria-label="Select theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,

          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}

    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div className="swipe-shell" style={{ display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
