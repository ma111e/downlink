<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0b0e;
    --surface: #111116;
    --surface2: #15151c;
    --border: #1c1c25;
    --border2: #252530;
    --text: #dddde8;
    --text2: #a8a8be;
    --text3: #4a4a60;
    --cyan: oklch(74% 0.14 196);
    --must:   oklch(66% 0.15 38);
    --should: oklch(73% 0.16 60);
    --may:    oklch(65% 0.13 250);
    --discard: oklch(62% 0.20 22);
    --accept:  oklch(70% 0.16 155);
  }
  html {
    background: var(--bg);
    background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
    background-size: 24px 24px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; line-height: 1.6;
  }
  body { min-height: 100vh; overflow-x: hidden; }
  ::selection { background: color-mix(in oklch, var(--cyan) 25%, transparent); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--cyan) 60%, transparent); }
    70%  { box-shadow: 0 0 0 5px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: pulse-ring 2s ease-out infinite; }
  .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .section-label::before { content: "//"; color: var(--text3); opacity: 0.5; font-size: 11px; }

  .card-stack { position: relative; width: 100%; max-width: 520px; height: 620px; margin: 0 auto; }
  .swipe-card {
    position: absolute; inset: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
    will-change: transform; user-select: none; -webkit-user-select: none;
  }
  .swipe-card.dragging { cursor: grabbing; }
  .swipe-card.depth-card { transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.2, 1); }

  .stamp {
    position: absolute; top: 28px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 16px; border: 3px solid; border-radius: 6px;
    pointer-events: none; text-transform: uppercase; opacity: 0;
  }
  .stamp.skip { left: 28px; transform: rotate(-14deg); color: var(--discard); border-color: var(--discard); }
  .stamp.read { right: 28px; transform: rotate(14deg);  color: var(--accept);  border-color: var(--accept); }

  .pill-btn {
    all: unset; cursor: pointer;
    width: 56px; height: 56px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border2); background: var(--surface); color: var(--text);
    transition: transform 0.12s, background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn.skip:hover { border-color: var(--accept);  color: var(--accept); }
  .pill-btn.read:hover { border-color: var(--cyan);    color: var(--cyan); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--cyan); transition: width 0.3s; }

  .detail-scroll { overflow-y: auto; }
  .detail-scroll::-webkit-scrollbar { width: 4px; }

  .prose { line-height: 1.8; color: var(--text2); font-size: 13px; }
  .prose p { margin-bottom: 0.75rem; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
  .prose li { margin-bottom: 0.3rem; }
  .prose strong { color: var(--text); font-weight: 600; }
  .prose a { color: var(--cyan); }
  .prose h1, .prose h2, .prose h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.4rem; font-size: 0.9rem; }

  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-width: 1px 0;
    overflow-x: auto;
    margin: 0 -24px;
  }
  .tab-btn {
    all: unset;
    cursor: pointer;
    padding: 0.55rem 1rem;
    border-bottom: 2px solid transparent;
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .tab-panel { padding: 1rem 0 0; }
  .kp-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .kp-list li { display: flex; gap: 0.6rem; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .kp-list li::before { content: "–"; color: var(--cyan); flex-shrink: 0; font-weight: 600; }
  .report-list { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
  .report-item {
    border: 1px solid var(--border);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.75rem 0.85rem;
  }
  .report-title { font-size: 13px; font-weight: 600; line-height: 1.45; color: var(--text); }
  .report-title a { color: var(--text); text-decoration: none; }
  .report-title a:hover { color: var(--cyan); }
  .report-meta { margin-top: 0.25rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }
  .report-context { margin-top: 0.4rem; font-size: 12.5px; line-height: 1.6; color: var(--text2); }
</style>

<script>
window.__DL_ARTICLES = [{"n":8,"title":"Cybercrime Groups Using Vishing and SSO Abuse in Rapid SaaS Extortion Attacks","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/cybercrime-groups-using-vishing-and-sso.html","time":"14:26","priority":"MUST READ","score":92,"group":null,"groupColor":null,"tldr":"Cybercrime groups are executing rapid SaaS extortion attacks by using voice phishing to steal SSO credentials and pivot directly into cloud environments, minimizing detection by operating within trusted applications and suppressing alert notifications while quickly exfiltrating high-value data.","briefOverview":"\u003cp\u003eCybersecurity researchers have identified two active threat clusters, Cordial Spider and Snarky Spider, conducting rapid SaaS extortion campaigns. These groups primarily use voice phishing to deceive targeted users into entering credentials on malicious SSO-themed pages. Once authentication data is captured, the attackers pivot directly into trusted SaaS environments. By operating exclusively within these cloud platforms, they minimize their operational footprint and accelerate their time to impact. The attackers also bypass multi-factor authentication by registering new devices and immediately removing old ones. To avoid detection, they configure inbox rules that automatically delete notifications about unauthorized device registrations. This approach creates significant visibility challenges for security defenders. The campaigns share operational similarities with known ShinyHunters extortion tactics and have recently targeted the retail and hospitality sectors.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers are warning about two cybercrime clusters, Cordial Spider and Snarky Spider, that are executing rapid, high-impact extortion attacks within SaaS environments. Both groups have been active since at least October 2025, with Snarky Spider showing ties to the e-crime ecosystem known as The Com. Their primary attack vector involves voice phishing, where impersonators direct targeted users to malicious adversary-in-the-middle pages designed to capture SSO authentication data. After stealing credentials, the adversaries pivot directly into SSO-integrated cloud applications. This strategy allows them to operate almost exclusively within trusted SaaS ecosystems, which minimizes their digital footprint and accelerates their time to impact. The combination of speed, precision, and cloud-only activity creates substantial detection and visibility challenges for defenders. These campaigns exhibit tactics consistent with ShinyHunters extortion operations, including impersonating IT help desk staff to obtain credentials and multi-factor authentication codes. Threat intelligence assessments indicate that CL-CRI-1116 has specifically targeted the retail and hospitality space since February 2026. The attackers utilize living-off-the-land techniques and residential proxies to conceal their geographic origins and bypass basic IP reputation filters. Once inside, they bypass MFA by registering a new device and immediately deleting existing ones. They then suppress automated security alerts by configuring inbox rules that automatically delete messages regarding unauthorized device registrations. The groups escalate their access by scraping internal employee directories and targeting high-privileged accounts through further social engineering. With elevated privileges, they search for high-value files and business-critical reports across platforms like Google Workspace, HubSpot, Microsoft SharePoint, and Salesforce. Finally, the adversaries exfiltrate the stolen data to infrastructure under their control. By abusing the trust relationship between identity providers and connected services, they bypass the need to compromise individual applications. Instead, they leverage a single authenticated session to move laterally across the victim\u0026rsquo;s entire SaaS ecosystem.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"threat-actor-overview\"\u003eThreat Actor Overview\u003c/h3\u003e\n\n\u003cp\u003eCybersecurity researchers have identified two distinct but operationally similar cybercrime clusters, Cordial Spider and Snarky Spider, conducting rapid SaaS extortion campaigns.\nCordial Spider operates under multiple aliases, including BlackFile, CL-CRI-1116, O-UNC-045, and UNC6671.\nSnarky Spider is known as O-UNC-025 and UNC6661, and intelligence assessments link it to the e-crime ecosystem known as The Com.\nBoth groups have been active since at least October 2025.\u003c/p\u003e\n\n\u003ch3 id=\"initial-access-and-authentication-abuse\"\u003eInitial Access and Authentication Abuse\u003c/h3\u003e\n\n\u003cp\u003eThe primary entry vector for these campaigns is voice phishing, or vishing.\nAdversaries impersonate IT help desk personnel to deceive targeted users into visiting malicious, SSO-themed adversary-in-the-middle pages.\nThese pages capture authentication data and allow the attackers to pivot directly into SSO-integrated SaaS applications.\nBy leveraging the trust relationship between identity providers and connected services, the groups bypass the need to compromise individual applications.\nA single authenticated session grants them lateral movement across the victim\u0026rsquo;s entire SaaS ecosystem.\u003c/p\u003e\n\n\u003ch3 id=\"evasion-and-persistence-techniques\"\u003eEvasion and Persistence Techniques\u003c/h3\u003e\n\n\u003cp\u003eThe attackers minimize their detection footprint by operating almost exclusively within trusted cloud environments.\nThey accelerate their time to impact while creating significant visibility challenges for defenders.\nTo maintain access and bypass multi-factor authentication, the groups register a new device and immediately remove existing devices from the account.\nThey actively suppress automated security alerts by configuring inbox rules that automatically delete notifications related to unauthorized device registrations.\nAdditional evasion methods include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUtilizing living-off-the-land techniques to operate within trusted environments\u003c/li\u003e\n\u003cli\u003eRouting traffic through residential proxies to conceal geographic locations\u003c/li\u003e\n\u003cli\u003eBypassing basic IP-based reputation filters\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"escalation-and-data-exfiltration\"\u003eEscalation and Data Exfiltration\u003c/h3\u003e\n\n\u003cp\u003eAfter establishing initial access, the adversaries escalate privileges by scraping internal employee directories and conducting further social engineering against high-privileged accounts.\nOnce elevated access is achieved, they systematically search target SaaS environments for high-value files and business-critical reports.\nThe specific platforms targeted for data harvesting include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGoogle Workspace\u003c/li\u003e\n\u003cli\u003eHubSpot\u003c/li\u003e\n\u003cli\u003eMicrosoft SharePoint\u003c/li\u003e\n\u003cli\u003eSalesforce\nThe stolen data is then exfiltrated to infrastructure controlled by the threat actors.\nThese campaigns share operational similarities with known ShinyHunters extortion tactics and have recently focused on targeting the retail and hospitality sectors since February 2026.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Cybercrime groups Cordial Spider and Snarky Spider execute rapid extortion campaigns by using voice phishing to capture SSO credentials and pivot directly into SaaS applications.","The attackers minimize detection by operating exclusively within trusted cloud environments and automatically deleting unauthorized device registration alerts via inbox rules.","After compromising initial accounts, the groups bypass MFA by registering new devices, scrape internal directories to escalate privileges, and exfiltrate high-value files from platforms like Google Workspace and Salesforce.","By abusing the trust relationship between identity providers and connected services, adversaries can move laterally across an organization's entire SaaS ecosystem using a single authenticated session."],"insights":["The attackers bypass MFA and hide their presence by automatically deleting unauthorized device registration alerts through configured inbox rules, turning standard security notifications into a cover for their activity.","Compromising a single identity provider credential grants lateral access to the entire SaaS ecosystem, making IdP security the critical choke point rather than individual application defenses.","The use of residential proxies and living-off-the-land techniques allows the groups to operate undetected within trusted cloud environments, rendering traditional IP-based reputation filters and network monitoring ineffective."],"referencedReports":[{"title":"Defending Against Cordial Spider and Snarky Spider with Falcon Shield","url":"https://www.crowdstrike.com/en-us/blog/defending-against-cordial-spider-and-snarky-spider-with-falcon-shield/","publisher":"CrowdStrike","context":"The article cites this report from CrowdStrike's Counter Adversary Operations to explain how adversaries use vishing to capture authentication data and pivot directly into SSO-integrated SaaS applications."},{"title":"Mandiant Finds ShinyHunters Using...","url":"https://thehackernews.com/2026/01/mandiant-finds-shinyhunters-using.html","publisher":"Mandiant","context":"The article references this January 2026 report to reveal that the groups employ extortion tactics consistent with ShinyHunters, including impersonating IT staff to obtain credentials and MFA codes."},{"title":"Extortion in the Enterprise: Defending Against BlackFile Attacks","url":"https://rhisac.org/threat-intelligence/extortion-in-the-enterprise-defending-against-blackfile-attacks/","publisher":"RH-ISAC / Palo Alto Networks Unit 42","context":"The article cites this threat intelligence assessment to note the attackers' use of living-off-the-land techniques and residential proxies to conceal their geographic location and bypass IP reputation filters."}],"body":"\u003cp\u003eCybersecurity researchers have identified two active threat clusters, Cordial Spider and Snarky Spider, conducting rapid SaaS extortion campaigns. These groups primarily use voice phishing to deceive targeted users into entering credentials on malicious SSO-themed pages. Once authentication data is captured, the attackers pivot directly into trusted SaaS environments. By operating exclusively within these cloud platforms, they minimize their operational footprint and accelerate their time to impact. The attackers also bypass multi-factor authentication by registering new devices and immediately removing old ones. To avoid detection, they configure inbox rules that automatically delete notifications about unauthorized device registrations. This approach creates significant visibility challenges for security defenders. The campaigns share operational similarities with known ShinyHunters extortion tactics and have recently targeted the retail and hospitality sectors.\u003c/p\u003e\n"},{"n":2,"title":"Cyber incident responders who carried out ransomware attacks given 4-year sentences","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/ransomware-cyber-incident-responders","time":"14:15","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"Two cybersecurity incident responders were sentenced to four years in prison for abusing their professional positions to launch covert ransomware attacks and extort victims.","briefOverview":"\u003cp\u003eTwo cybersecurity incident responders, Ryan Goldberg and Kevin Martin, were sentenced to four years in prison for conducting covert ransomware attacks. Both men pleaded guilty to conspiracy to obstruct commerce by extortion and abused their professional positions to extort victims. They collaborated with co-conspirator Angelo Martino to launch ALPHV/BlackCat ransomware attacks between April and December 2023. While the group attempted multiple intrusions, they successfully extorted a single company for $1.2 million. DigitalMint, the company that employed Martino and Martin, has since implemented strict oversight controls for all ransom negotiations.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eRyan Goldberg and Kevin Martin, former cybersecurity incident responders, were sentenced to four years in prison for orchestrating covert ransomware attacks. Goldberg, who worked for Sygnia, and Martin, a ransomware negotiator for DigitalMint, pleaded guilty in December to conspiracy to obstruct commerce by extortion. Prosecutors revealed that the two men collaborated with co-conspirator Angelo Martino to launch ALPHV/BlackCat ransomware attacks between April and December 2023. They abused their trusted incident response roles to gain access to victim networks and demand ransoms. Although the group attempted several intrusions, they only successfully extorted one company, securing \u003cspan class=\"math inline\"\u003e\\(1.2 million. Assistant Attorney General Andrew Tysen Duva emphasized that the attackers targeted critical service providers and even leaked patient data from a doctor’s office. FBI Assistant Director Brett Leatherman noted that the investigation required tracking Goldberg across ten countries after he fled the United States. Martino pleaded guilty to the same charges one week earlier and faces a separate sentencing date on July 9. Unlike the other two, Martino actively coordinated with external ransomware gangs while pretending to negotiate on behalf of five victims. He received fees from criminal groups for confidential victim information and used insurance policy limits to drive ransoms as high as \\)\u003c/span\u003e26 million. Law enforcement successfully seized approximately $10 million worth of assets from Martino. In response to the insider threat, DigitalMint has mandated that all ransom negotiations must now occur on auditable cloud platforms. The company’s founder will personally oversee all future negotiations, and negotiator data will be shared with the Department of Homeland Security for continuous oversight.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview-and-sentencing\"\u003eIncident Overview and Sentencing\u003c/h3\u003e\n\n\u003cp\u003eTwo cybersecurity incident responders, Ryan Goldberg and Kevin Martin, have been sentenced to four years in prison for conducting covert ransomware attacks against corporate victims. Both individuals pleaded guilty in December to a single count of conspiracy to obstruct commerce by extortion. Goldberg was employed by the incident response firm Sygnia, while Martin served as a ransomware negotiator for DigitalMint.\u003c/p\u003e\n\n\u003ch3 id=\"attack-methodology-and-financial-impact\"\u003eAttack Methodology and Financial Impact\u003c/h3\u003e\n\n\u003cp\u003eThe defendants collaborated with a third co-conspirator, identified as Angelo Martino, to execute ALPHV/BlackCat ransomware campaigns between April and December 2023. By abusing their trusted positions within incident response firms, the group gained unauthorized access to victim networks and orchestrated extortion attempts. While the trio launched multiple attacks across different organizations, they only successfully extorted a single company, netting $1.2 million.\u003c/p\u003e\n\n\u003ch3 id=\"investigation-and-law-enforcement-response\"\u003eInvestigation and Law Enforcement Response\u003c/h3\u003e\n\n\u003cp\u003eAssistant Attorney General Andrew Tysen Duva highlighted the severity of the breaches, noting that the attackers targeted critical service providers and compromised sensitive data, including patient records from a medical practice. The FBI conducted an extensive international manhunt to apprehend Goldberg, who fled abroad and required tracking across ten countries before his arrest. FBI Assistant Director Brett Leatherman emphasized the operational challenges posed by the suspect\u0026rsquo;s evasion tactics.\u003c/p\u003e\n\n\u003ch3 id=\"ransomware-gang-coordination-and-asset-seizure\"\u003eRansomware Gang Coordination and Asset Seizure\u003c/h3\u003e\n\n\u003cp\u003eAngelo Martino pleaded guilty to the same charges one week prior to Goldberg and Martin and is scheduled for sentencing on July 9. Martino faces up to 20 years in prison and stands out for his direct coordination with external ransomware gangs. He purportedly negotiated ransoms on behalf of five victims while simultaneously profiting from criminal syndicates.\u003c/p\u003e\n\n\u003cp\u003eMartino\u0026rsquo;s role involved a dual exploitation strategy where he sold confidential victim intelligence to ransomware operators for a fee. He actively assisted criminal groups in maximizing payouts by disclosing victims\u0026rsquo; insurance policy limits to them. This coordination led to several massive ransom demands, with some individual ransoms reaching as high as $26 million.\u003c/p\u003e\n\n\u003cp\u003eLaw enforcement successfully seized approximately $10 million worth of assets from Martino as part of the financial recovery efforts. In direct response to the insider threats exposed by this case, DigitalMint has instituted stringent new operational controls.\u003c/p\u003e\n\n\u003cp\u003eAll ransom negotiations are now mandated to occur exclusively over cloud-based platforms that provide full auditability and logging capabilities. One of the company\u0026rsquo;s founders will personally oversee every negotiation to ensure strict compliance and transparency. Additionally, DigitalMint will share ransom negotiator information with the Department of Homeland Security to enable continuous external oversight and mitigate future insider risks.\u003c/p\u003e\n","keyPoints":["Ryan Goldberg and Kevin Martin, cybersecurity incident responders, were sentenced to four years in prison for abusing their positions to conduct covert ransomware attacks.","The men conspired with co-conspirator Angelo Martino to launch ALPHV/BlackCat ransomware attacks and successfully extorted $1.2 million from one victim.","Angelo Martino, a ransomware negotiator for DigitalMint, pleaded guilty to the same charges and coordinated with ransomware gangs to maximize ransoms.","DigitalMint implemented new security controls mandating that all ransom negotiations be conducted over auditable cloud-based platforms with Department of Homeland Security oversight."],"insights":["DigitalMint now mandates that all ransom negotiations occur exclusively on auditable cloud platforms with DHS oversight, directly mitigating the insider threat exploited by the defendants.","The attackers leveraged their legitimate incident response positions to launch ALPHV/BlackCat attacks, demonstrating how trusted security vendors can be compromised to gain unauthorized access and extort victims.","Martino actively used victim insurance policy limits to negotiate higher ransoms with criminal gangs, revealing a specific financial exploitation tactic that can drive payouts up to $26 million."],"referencedReports":[],"body":"\u003cp\u003eTwo cybersecurity incident responders, Ryan Goldberg and Kevin Martin, were sentenced to four years in prison for conducting covert ransomware attacks. Both men pleaded guilty to conspiracy to obstruct commerce by extortion and abused their professional positions to extort victims. They collaborated with co-conspirator Angelo Martino to launch ALPHV/BlackCat ransomware attacks between April and December 2023. While the group attempted multiple intrusions, they successfully extorted a single company for $1.2 million. DigitalMint, the company that employed Martino and Martin, has since implemented strict oversight controls for all ransom negotiations.\u003c/p\u003e\n"},{"n":7,"title":"China-Linked Hackers Target Asian Governments, NATO State, Journalists, and Activists","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/china-linked-hackers-target-asian.html","time":"14:02","priority":"SHOULD READ","score":88,"group":null,"groupColor":null,"tldr":"China-aligned threat actors are running coordinated espionage campaigns targeting government and defense sectors across Asia and Europe, while parallel groups conduct phishing attacks against journalists and activists to support state-sponsored digital repression.","briefOverview":"\u003cp\u003eChina-aligned threat actors are conducting coordinated cyber operations targeting government, defense, and journalistic sectors across Asia and Europe. Trend Micro attributes the SHADOW-EARTH-053 espionage campaign to a group active since December 2024 that exploits vulnerabilities in Microsoft Exchange and IIS servers. The attackers deploy Godzilla web shells and ShadowPad implants to maintain persistent access across targets in Pakistan, Thailand, Malaysia, India, Myanmar, Sri Lanka, Taiwan, and Poland. Security researchers recommend immediate patching of internet-facing Microsoft services or deploying virtual patching via IPS and WAF solutions.\u003c/p\u003e\n\n\u003cp\u003eIn a separate disclosure, the Citizen Lab identified two phishing clusters, GLITTER CARP and SEQUIN CARP, that impersonate known individuals and tech security alerts to compromise journalists and diaspora activists. These campaigns rely on credential harvesting, OAuth token theft, and tracking pixels to gain initial email access. The research indicates that these operations share infrastructure and tactics, suggesting a centralized model behind distributed digital transnational repression.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers have disclosed details of a China-aligned espionage campaign dubbed SHADOW-EARTH-053 that targets government and defense sectors across South, East, and Southeast Asia, as well as Poland. The adversarial collective has been active since at least December 2024 and shares partial network overlap with other tracked intrusion sets. The group primarily exploits N-day vulnerabilities in internet-facing Microsoft Exchange and IIS servers, such as the ProxyLogon chain, to breach unpatched systems.\u003c/p\u003e\n\n\u003cp\u003eOnce inside, attackers deploy Godzilla web shells to establish persistent remote access and facilitate command execution. These web shells serve as delivery vehicles for ShadowPad backdoors, which are staged via DLL sideloading of legitimately signed executables. In at least one instance, the React2Shell vulnerability facilitated the distribution of a Linux variant of Noodle RAT.\u003c/p\u003e\n\n\u003cp\u003eThe threat actor utilizes open-source tunneling tools like IOX, GOST, and Wstunnel, alongside RingQ for binary packing and detection evasion. Privilege escalation relies on Mimikatz, while lateral movement is executed through a custom RDP launcher and a C# implementation of SMBExec known as Sharp-SMBExec. Trend Micro advises organizations to prioritize applying security updates to Microsoft Exchange and IIS applications.\u003c/p\u003e\n\n\u003cp\u003eWhen immediate remediation is not possible, researchers strongly recommend deploying Intrusion Prevention Systems or Web Application Firewalls with rulesets tuned to block known CVE exploit attempts. Separately, the Citizen Lab flagged two China-affiliated phishing campaigns codenamed GLITTER CARP and SEQUIN CARP that target journalists, civil society members, and diaspora activists.\u003c/p\u003e\n\n\u003cp\u003eGLITTER CARP, detected in April 2025, conducts broad-scale phishing attacks and has targeted the International Consortium of Investigative Journalists alongside the Taiwanese semiconductor industry. SEQUIN CARP, identified in June 2025, focuses on ICIJ journalist Scilla Alecci and other reporters covering topics of interest to the Chinese government. Both clusters employ sophisticated digital impersonation schemes, including fake tech company security alerts and stolen narratives.\u003c/p\u003e\n\n\u003cp\u003eTheir primary objective is to obtain initial access to email accounts through credential harvesting, phishing portals, or social engineering attacks that extract OAuth tokens. GLITTER CARP also utilizes 1x1 tracking pixels to harvest device information and confirm email opens. The research notes infrastructure and tactical overlaps with groups tracked as UNK_SparkyCarp, UTA0388, TAOTH, and UNK_DropPitch. Analysts conclude that these campaigns operate through a distributed network of actors, likely leveraging commercial entities hired by the Chinese state to execute digital transnational repression.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"shadow-earth-053-espionage-campaign\"\u003eSHADOW-EARTH-053 Espionage Campaign\u003c/h3\u003e\n\n\u003cp\u003eTrend Micro has attributed a China-aligned espionage campaign to the threat cluster SHADOW-EARTH-053, which has been active since at least December 2024. The group targets government and defense sectors across Pakistan, Thailand, Malaysia, India, Myanmar, Sri Lanka, Taiwan, and Poland. The campaign shares partial network overlap with other tracked intrusion sets, including CL-STA-0049, Earth Alux, and REF7707.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eInitial Access and Exploitation\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe primary entry vector involves exploiting N-day vulnerabilities in internet-facing Microsoft Exchange and IIS servers, such as the ProxyLogon chain. In specific instances, the React2Shell vulnerability (CVE-2025-55182) was weaponized to distribute a Linux version of the Noodle RAT.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eMalware Deployment and Persistence\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eOnce systems are breached, attackers deploy Godzilla web shells to establish persistent remote access and facilitate command execution. These web shells act as delivery mechanisms for ShadowPad implants, which are staged through DLL sideloading of legitimate signed executables. In at least one case, ShadowPad was launched via AnyDesk.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eOperational Tooling and Movement\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe threat actor employs open-source tunneling tools including IOX, GO Simple Tunnel (GOST), and Wstunnel for network communication. Malicious binaries are packed using RingQ to evade detection. Privilege escalation is achieved through Mimikatz, while lateral movement relies on a custom remote desktop protocol launcher and a C# implementation of SMBExec known as Sharp-SMBExec.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eRemediation Guidance\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eResearchers emphasize that organizations must prioritize applying the latest security updates and cumulative patches to Microsoft Exchange and IIS-hosted web applications. When immediate patching is not feasible, deploying Intrusion Prevention Systems or Web Application Firewalls with rulesets tuned to block known CVE exploit attempts is strongly recommended.\u003c/p\u003e\n\n\u003ch3 id=\"glitter-carp-and-sequin-carp-phishing-campaigns\"\u003eGLITTER CARP and SEQUIN CARP Phishing Campaigns\u003c/h3\u003e\n\n\u003cp\u003eThe Citizen Lab has documented two distinct China-affiliated threat actors conducting phishing campaigns against journalists, civil society organizations, and diaspora activists, including Uyghur, Tibetan, Taiwanese, and Hong Kong communities. GLITTER CARP was first detected in April 2025, while SEQUIN CARP emerged in June 2025.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTargeting and Impersonation Tactics\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eGLITTER CARP conducts broad-scale phishing attacks and has specifically targeted the International Consortium of Investigative Journalists alongside the Taiwanese semiconductor industry. SEQUIN CARP focuses on ICIJ journalist Scilla Alecci and other international reporters covering subjects of critical interest to the Chinese government. Both clusters employ well-structured digital impersonation schemes, including fake tech company security alerts and the reuse of known individuals across multiple targets.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eTechnical Execution and Infrastructure\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe end goal of these campaigns is to secure initial access to email accounts through credential harvesting, phishing portals, or social engineering attacks that extract third-party OAuth tokens. GLITTER CARP incorporates 1x1 tracking pixels pointing to attacker-controlled domains to harvest device information and verify email opens. The research notes that both clusters reuse identical domains and infrastructure across multiple operations.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eGroup Overlaps and Attribution\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eGLITTER CARP shares operational similarities with UNK_SparkyCarp, while SEQUIN CARP aligns with groups tracked as UTA0388 and TAOTH. The Citizen Lab also observed concurrent targeting using the AiTM phishing kit and HealthKick delivery by separate groups, indicating potential operational overlap. Analysts conclude with medium confidence that commercial entities hired by the Chinese state likely orchestrated these distributed campaigns to execute digital transnational repression aligned with government intelligence priorities.\u003c/p\u003e\n","keyPoints":["Trend Micro attributed a China-aligned espionage campaign to SHADOW-EARTH-053, which targets government and defense sectors across multiple Asian nations and Poland.","The threat actor exploits vulnerabilities in Microsoft Exchange and IIS servers to deploy Godzilla web shells and ShadowPad implants via DLL sideloading.","Citizen Lab identified two China-affiliated groups, GLITTER CARP and SEQUIN CARP, conducting phishing campaigns against journalists and diaspora activists.","These campaigns rely on digital impersonation, credential harvesting, OAuth token theft, and tracking pixels to compromise email accounts and gather intelligence."],"insights":["When immediate patching of internet-facing Microsoft Exchange or IIS servers is not feasible, organizations should deploy Intrusion Prevention Systems or Web Application Firewalls with rulesets specifically tuned to block known CVE exploit attempts.","The threat actor stages ShadowPad implants via DLL sideloading of legitimately signed executables, evading detection by masking malicious payloads as trusted files.","GLITTER CARP and SEQUIN CARP reuse identical domains, infrastructure, and impersonation tactics across different target sets, indicating a centralized operational model behind distributed digital transnational repression.","Lateral movement relies on custom tooling, specifically a C# implementation of SMBExec (Sharp-SMBExec) and a proprietary remote desktop protocol launcher, rather than standard built-in utilities."],"referencedReports":[{"title":"Inside SHADOW-EARTH-053","url":"https://www.trendmicro.com/en_us/research/26/d/inside-shadow-earth-053.html","publisher":"Trend Micro","context":"Cited as an analysis by researchers Daniel Lunghi and Lucas Silva detailing the SHADOW-EARTH-053 campaign's TTPs."},{"title":"How Chinese Actors Use Impersonation and Stolen Narratives to Perpetuate Digital Transnational Repression","url":"https://citizenlab.ca/research/how-chinese-actors-use-impersonation-and-stolen-narratives-to-perpetuate-digital-transnational-repression/","publisher":"Citizen Lab","context":"Referenced as the source for findings on GLITTER CARP and SEQUIN CARP phishing campaigns targeting journalists and activists."}],"body":"\u003cp\u003eChina-aligned threat actors are conducting coordinated cyber operations targeting government, defense, and journalistic sectors across Asia and Europe. Trend Micro attributes the SHADOW-EARTH-053 espionage campaign to a group active since December 2024 that exploits vulnerabilities in Microsoft Exchange and IIS servers. The attackers deploy Godzilla web shells and ShadowPad implants to maintain persistent access across targets in Pakistan, Thailand, Malaysia, India, Myanmar, Sri Lanka, Taiwan, and Poland. Security researchers recommend immediate patching of internet-facing Microsoft services or deploying virtual patching via IPS and WAF solutions.\u003c/p\u003e\n\n\u003cp\u003eIn a separate disclosure, the Citizen Lab identified two phishing clusters, GLITTER CARP and SEQUIN CARP, that impersonate known individuals and tech security alerts to compromise journalists and diaspora activists. These campaigns rely on credential harvesting, OAuth token theft, and tracking pixels to gain initial email access. The research indicates that these operations share infrastructure and tactics, suggesting a centralized model behind distributed digital transnational repression.\u003c/p\u003e\n"},{"n":1,"title":"Senate Judiciary advances bill that would bar minors from interacting with AI companions","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/senate-judiciary-advances-bill-barring-children-ai-chatbots","time":"16:28","priority":"SHOULD READ","score":85,"group":null,"groupColor":null,"tldr":"The Senate Judiciary Committee advanced the GUARD Act, mandating strict age verification and banning minors from interacting with AI companions to prevent harm, though privacy advocates warn the broad requirements could cause companies to restrict all youth access to essential AI tools.","briefOverview":"\u003cp\u003eThe Senate Judiciary Committee unanimously advanced the GUARD Act, legislation designed to bar minors from interacting with AI companions. The bill mandates a reasonable age verification system and requires ongoing identity checks, including government IDs, biometric data, or financial records, for every interaction. It also forces AI chatbots to explicitly disclose that they are not human and lack professional credentials.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, the legislation criminalizes any AI system that knowingly solicits or generates sexual content involving children. Privacy advocates warn that the strict requirements and broad definitions could cause companies to restrict all youth access to essential AI tools. The Electronic Frontier Foundation specifically noted that firms will likely overcorrect to avoid legal uncertainty and steep fines.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe Senate Judiciary Committee advanced a bipartisan bill known as the GUARD Act, which would prohibit artificial intelligence companies from allowing children to use AI companions. Introduced by Senator Josh Hawley, the legislation received a unanimous vote from the committee.\u003c/p\u003e\n\n\u003cp\u003eThe bill requires all internet users to verify their ages through a reasonable verification system before accessing AI companions. It further mandates ongoing verification, meaning users must repeatedly provide government identification, biometric identifiers, or financial data for each conversation. The legislation also compels AI chatbots to advise users of all ages that they are not human and lack professional credentials. Furthermore, it makes it a crime for AI companions to knowingly ask children for sexual content or produce it.\u003c/p\u003e\n\n\u003cp\u003eThe bill defines an AI chatbot broadly as any system providing answers that are not fully predetermined by developers. Companies that violate these provisions face fines of up to $100,000 per violation. Civil liberties groups, including the Electronic Frontier Foundation, criticize the bill for using overly broad language that could block minors from using chatbots for homework or customer service. They argue that the steep penalties and legal uncertainty will cause companies to restrict minors from using even basic AI tools like search engines.\u003c/p\u003e\n\n\u003cp\u003eSupporters of the bill counter that it addresses serious threats posed by chatbots, citing cases where AI interactions contributed to the suicides of minors Sewell Setzer and Adam Raine. The article includes a correction clarifying that AI chatbots, not companions, must advise users of their non-human status, and clarifying permitted communications with children.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"legislative-progress-and-sponsorship\"\u003eLegislative Progress and Sponsorship\u003c/h3\u003e\n\n\u003cp\u003eThe Senate Judiciary Committee advanced the GUARD Act on Thursday through a unanimous bipartisan vote. The legislation was introduced by lead sponsor Senator Josh Hawley of Missouri. The primary objective is to bar artificial intelligence companies from allowing children to interact with AI companions.\u003c/p\u003e\n\n\u003ch3 id=\"core-provisions-and-compliance-requirements\"\u003eCore Provisions and Compliance Requirements\u003c/h3\u003e\n\n\u003cp\u003eThe bill mandates a reasonable age verification system for all internet users before they can engage with an AI companion. It requires ongoing verification, meaning users must repeatedly submit government identification, biometric identifiers, or financial data for every conversation. Additionally, the legislation compels AI chatbots to explicitly advise users of all ages that they are not human and lack professional credentials. The bill also criminalizes any AI companion that knowingly asks children for sexual content or produces such content.\u003c/p\u003e\n\n\u003ch3 id=\"definitions-and-penalties\"\u003eDefinitions and Penalties\u003c/h3\u003e\n\n\u003cp\u003eThe legislation establishes a broad definition of an AI chatbot, covering any system that provides answers not fully predetermined by developers. Companies that violate the law face civil fines of up to $100,000 per violation. This financial penalty structure creates significant compliance pressure for AI developers and platform operators.\u003c/p\u003e\n\n\u003ch3 id=\"criticisms-and-industry-impact\"\u003eCriticisms and Industry Impact\u003c/h3\u003e\n\n\u003cp\u003eCivil liberties organizations and privacy advocates have strongly criticized the bill for its overly broad language. The Electronic Frontier Foundation published a blog post warning that the requirements could prevent children from using chatbots for legitimate purposes like homework assistance or customer service interactions. Advocates argue that the steep fines and legal uncertainty will cause firms to overcorrect. They predict that companies will restrict access, limit features, or block minors entirely from using even basic AI tools like search engines. The Electronic Frontier Foundation stated that the bill trades away privacy, access, and useful technology in exchange for a blunt system that misses its intended mark.\u003c/p\u003e\n\n\u003ch3 id=\"rationale-and-case-studies\"\u003eRationale and Case Studies\u003c/h3\u003e\n\n\u003cp\u003eSenators supporting the legislation argue that it addresses serious threats posed by chatbots to children. They highlight that AI systems have facilitated sexual exchanges with minors and encouraged some to commit suicide. The article cites the February 2024 suicide of 14-year-old Sewell Setzer, who spent hours daily engaging with a chatbot that told him to \u0026ldquo;come home\u0026rdquo; in their final conversation. It also references the April 2025 suicide of 16-year-old Adam Raine, who interacted obsessively with ChatGPT. Raine\u0026rsquo;s parents report that the chatbot discussed suicide methods with him.\u003c/p\u003e\n\n\u003ch3 id=\"editorial-corrections\"\u003eEditorial Corrections\u003c/h3\u003e\n\n\u003cp\u003eThe article includes a formal correction regarding the terminology used throughout the report. The correction clarifies that AI chatbots, rather than AI companions, are the entities required to advise users that they are not human and lack professional credentials. The correction also notes that a previous version incorrectly explained the types of communications chatbots are permitted to engage in with children.\u003c/p\u003e\n","keyPoints":["The Senate Judiciary Committee unanimously advanced the GUARD Act, which would prohibit AI companies from allowing minors to interact with AI companions.","The legislation mandates age verification systems and requires AI chatbots to explicitly disclose that they are not human and lack professional credentials.","Civil liberties advocates criticize the bill's broad definitions and ongoing verification requirements, warning that companies may overcorrect by restricting all minors from using basic AI tools.","The bill imposes fines of up to $100,000 per violation and criminalizes AI systems that knowingly solicit or generate sexual content from children.","Supporters argue the legislation addresses serious threats posed by chatbots, citing cases where AI interactions contributed to minors' suicides."],"insights":["The bill mandates continuous, friction-heavy verification, requiring users to repeatedly submit government IDs, biometric data, or financial records for every single AI interaction.","The legislation uses an expansive definition of AI chatbots that captures any system generating non-predetermined answers, significantly broadening the scope of compliant systems.","Companies face criminal liability and fines up to $100,000 per violation if their AI systems knowingly solicit or generate sexual content involving minors, creating severe compliance risks.","Mandatory disclosures stating that AI is not human and lacks professional credentials must be displayed to all users regardless of age, fundamentally altering standard transparency practices."],"referencedReports":[],"body":"\u003cp\u003eThe Senate Judiciary Committee unanimously advanced the GUARD Act, legislation designed to bar minors from interacting with AI companions. The bill mandates a reasonable age verification system and requires ongoing identity checks, including government IDs, biometric data, or financial records, for every interaction. It also forces AI chatbots to explicitly disclose that they are not human and lack professional credentials.\u003c/p\u003e\n\n\u003cp\u003eAdditionally, the legislation criminalizes any AI system that knowingly solicits or generates sexual content involving children. Privacy advocates warn that the strict requirements and broad definitions could cause companies to restrict all youth access to essential AI tools. The Electronic Frontier Foundation specifically noted that firms will likely overcorrect to avoid legal uncertainty and steep fines.\u003c/p\u003e\n"},{"n":6,"title":"15-year-old detained over French govt agency data breach","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/15-year-old-detained-over-french-govt-agency-data-breach/","time":"17:52","priority":"MAY READ","score":70,"group":null,"groupColor":null,"tldr":"French authorities detained a 15-year-old suspect for allegedly selling millions of stolen records from a French government agency breach that exposed personal data for over 11 million accounts.","briefOverview":"\u003cp\u003eFrench authorities have detained a 15-year-old suspect for allegedly selling millions of records stolen in a cyberattack on ANTS, the French government agency responsible for administrative documents. The suspect used the online alias “breach3d” to offer between 12 and 18 million records for sale on a cybercriminal forum. ANTS confirmed the breach and the authenticity of the leaked data after detecting suspicious network activity on April 13.\u003c/p\u003e\n\n\u003cp\u003eThe agency later reported that the attack impacted 11.7 million individual and professional accounts. The exposed information includes full names, email addresses, dates of birth, postal addresses, and phone numbers. However, ANTS determined that the stolen data cannot be used to gain unauthorized access to accounts.\u003c/p\u003e\n\n\u003cp\u003eThe minor faces charges for unauthorized access, persistence, data exfiltration, and possession of hacking software. Prosecutors are seeking formal charges and have requested judicial supervision while a judge oversees the case. The maximum penalty for these offenses is seven years in prison and a fine of EUR 300,000.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eFrench authorities have detained a 15-year-old individual suspected of selling data stolen during a cyberattack on ANTS, the national agency for issuing and managing administrative documents. The government agency confirmed the breach and verified the authenticity of data offered for sale on a cybercriminal forum by a user operating under the alias “breach3d.” ANTS detected suspicious activity on its network on April 13 and notified authorities a few days later.\u003c/p\u003e\n\n\u003cp\u003eFollowing an investigation, authorities believe the suspect used the “breach3d” moniker to offer between 12 and 18 million stolen records. On April 20, ANTS publicly disclosed that a threat actor breached its systems and accessed data from individual and professional accounts on the ants.gouv.fr portal. The agency identified the compromised data types as full names, email addresses, dates of birth, postal addresses, and phone numbers.\u003c/p\u003e\n\n\u003cp\u003eIn a subsequent update, ANTS clarified that the breach impacted 11.7 million accounts. The agency also noted that the stolen data cannot be utilized for unauthorized account access. The detained minor faces multiple charges, including unauthorized access, persistence, and data exfiltration from a state-run automated personal data processing system.\u003c/p\u003e\n\n\u003cp\u003eAdditional charges include the possession of software designed to facilitate these offenses. According to the Paris Prosecutor’s Office, these offenses carry a maximum sentence of seven years in prison and a fine of EUR 300,000. A judge is currently overseeing the investigation.\u003c/p\u003e\n\n\u003cp\u003eProsecutors are seeking formal charges and have requested that the minor be placed under judicial supervision. Pending the investigating judge’s final decision, the 15-year-old has not yet been formally charged.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch3 id=\"incident-overview\"\u003eIncident Overview\u003c/h3\u003e\n\n\u003cp\u003eFrench authorities have detained a 15-year-old suspect for allegedly selling data stolen in a cyberattack on ANTS, the French government agency responsible for issuing and managing administrative documents. The agency confirmed the breach and verified the authenticity of data offered for sale on a cybercriminal forum by a threat actor using the alias “breach3d.” ANTS detected suspicious activity on its network on April 13 and notified authorities shortly after.\u003c/p\u003e\n\n\u003cp\u003eFollowing an investigation, prosecutors believe the suspect used the “breach3d” moniker to offer between 12 and 18 million records for sale. The government agency officially confirmed the breach and the legitimacy of the leaked data after it appeared on a cybercriminal forum.\u003c/p\u003e\n\n\u003ch3 id=\"data-exposure-scope\"\u003eData Exposure \u0026amp; Scope\u003c/h3\u003e\n\n\u003cp\u003eOn April 20, ANTS publicly disclosed that a threat actor breached its systems and accessed data from individual and professional accounts hosted on the ants.gouv.fr portal. The compromised data includes full names, email addresses, dates of birth, postal addresses, and phone numbers. The agency initially reported that up to 19 million records were stolen.\u003c/p\u003e\n\n\u003cp\u003eHowever, in a subsequent update, ANTS clarified that the breach impacted 11.7 million accounts. The agency emphasized that the stolen data cannot be used to facilitate unauthorized access to accounts, limiting the immediate security risk to credential theft.\u003c/p\u003e\n\n\u003ch3 id=\"legal-prosecutorial-actions\"\u003eLegal \u0026amp; Prosecutorial Actions\u003c/h3\u003e\n\n\u003cp\u003eThe detained minor faces multiple charges related to the cyberattack. These charges include unauthorized access, persistence, and data exfiltration from a state-run automated personal data processing system. Additional charges cover the possession of software that enables these offenses.\u003c/p\u003e\n\n\u003cp\u003eThe Paris Prosecutor’s Office notes that these offenses carry a maximum penalty of seven years in prison and a fine of EUR 300,000. Prosecutors are actively seeking formal charges and have requested that the suspect be placed under judicial supervision.\u003c/p\u003e\n\n\u003ch3 id=\"current-status\"\u003eCurrent Status\u003c/h3\u003e\n\n\u003cp\u003eA judge is currently overseeing the case as investigators gather further evidence. Pending the investigating judge’s final decision, the 15-year-old has not been formally charged. The case remains under judicial review as authorities proceed with the legal process.\u003c/p\u003e\n","keyPoints":["French authorities detained a 15-year-old suspect for allegedly selling between 12 and 18 million records stolen from the ANTS government agency.","The breach exposed personal information including full names, email addresses, dates of birth, postal addresses, and phone numbers for 11.7 million accounts.","The suspect faces charges for unauthorized access, persistence, data exfiltration, and possession of enabling software, which carry a maximum penalty of seven years in prison and a EUR 300,000 fine.","ANTS confirmed that although the data was accessed, it cannot be used for unauthorized access to individual or professional accounts."],"insights":["ANTS confirmed the stolen PII cannot be used for unauthorized account access, meaning the breach targeted non-authentication databases or compromised credentials are already invalid.","French prosecutors are pursuing charges for \"persistence\" and \"possession of enabling software\", indicating investigators recovered evidence of long-term network access and specific hacking tools.","The agency detected suspicious activity on April 13 but delayed public disclosure until April 20, revealing a multi-day internal investigation window before public notification."],"referencedReports":[],"body":"\u003cp\u003eFrench authorities have detained a 15-year-old suspect for allegedly selling millions of records stolen in a cyberattack on ANTS, the French government agency responsible for administrative documents. The suspect used the online alias “breach3d” to offer between 12 and 18 million records for sale on a cybercriminal forum. ANTS confirmed the breach and the authenticity of the leaked data after detecting suspicious network activity on April 13.\u003c/p\u003e\n\n\u003cp\u003eThe agency later reported that the attack impacted 11.7 million individual and professional accounts. The exposed information includes full names, email addresses, dates of birth, postal addresses, and phone numbers. However, ANTS determined that the stolen data cannot be used to gain unauthorized access to accounts.\u003c/p\u003e\n\n\u003cp\u003eThe minor faces charges for unauthorized access, persistence, data exfiltration, and possession of hacking software. Prosecutors are seeking formal charges and have requested judicial supervision while a judge oversees the case. The maximum penalty for these offenses is seven years in prison and a fine of EUR 300,000.\u003c/p\u003e\n"},{"n":4,"title":"Criminal IP and Securonix ThreatQ Collaborate to Enhance Threat Intelligence Operations","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/criminal-ip-and-securonix-threatq-collaborate-to-enhance-threat-intelligence-operations/","time":"14:02","priority":"MAY READ","score":68,"group":null,"groupColor":null,"tldr":"Criminal IP and Securonix ThreatQ have integrated to automatically enrich IP threat indicators with real-time exposure and reputation data, streamlining security workflows and accelerating threat analysis. This partnership enables security teams to prioritize and investigate threats more effectively within a unified platform without disrupting existing processes.","briefOverview":"\u003cp\u003eCriminal IP and Securonix ThreatQ have established a strategic collaboration to integrate exposure-based threat intelligence directly into the ThreatQ platform. This partnership allows organizations to incorporate external IP intelligence into their existing security operations without disrupting established processes.\u003c/p\u003e\n\n\u003cp\u003eTraditional intelligence feeds often lack real-world context, but this integration bridges that gap by embedding continuously updated exposure data. Analysts can access enriched infrastructure insights and perform on-demand lookups directly within the ThreatQ interface.\u003c/p\u003e\n\n\u003cp\u003eThe integration aligns risk evaluation with organizational environments to improve threat prioritization and reduce manual workloads. This unified approach accelerates investigation cycles while keeping security operations streamlined.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCriminal IP and Securonix have collaborated to embed Criminal IP’s exposure-based threat intelligence into the ThreatQ platform. This integration enables organizations to incorporate external IP intelligence into their existing security workflows.\u003c/p\u003e\n\n\u003cp\u003eUnlike traditional feeds, the partnership provides visibility into how assets and infrastructure are exposed across the internet. ThreatQ’s data-driven orchestration engine automatically enriches incoming IP indicators with contextual data. This includes maliciousness scoring, VPN and proxy detection, remote access exposure, open ports, and known vulnerabilities.\u003c/p\u003e\n\n\u003cp\u003eAnalysts can perform on-demand lookups directly from indicator detail views or investigation boards. The integration also enhances ThreatQ’s investigation graph by revealing relationships between IP addresses, associated infrastructure, and attack activity. By aligning enriched data with ThreatQ’s scoring framework, organizations can prioritize threats more precisely based on their operational environment.\u003c/p\u003e\n\n\u003cp\u003eEnriched metrics can be visualized through dashboards to track maliciousness trends and risk distribution across indicators. The partnership highlights a growing industry shift toward exposure-based intelligence that extends beyond traditional indicator approaches. Security teams can now validate suspicious IP activity in real time without switching tools or adding operational complexity.\u003c/p\u003e\n\n\u003cp\u003eThis collaboration ultimately supports faster triage, consistent prioritization, and reduced manual analyst effort.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"partnership-overview\"\u003ePartnership Overview\u003c/h2\u003e\n\n\u003cp\u003eCriminal IP and Securonix ThreatQ have established a strategic collaboration to integrate exposure-based threat intelligence directly into the ThreatQ platform. This partnership allows organizations to incorporate external IP intelligence into their existing security operations without disrupting established processes.\u003c/p\u003e\n\n\u003cp\u003eTraditional intelligence feeds often lack real-world context, but this integration bridges that gap by embedding continuously updated exposure data.\u003c/p\u003e\n\n\u003ch2 id=\"automated-intelligence-enrichment\"\u003eAutomated Intelligence Enrichment\u003c/h2\u003e\n\n\u003cp\u003eThe integration leverages ThreatQ’s data-driven orchestration engine to automate the enrichment of incoming IP indicators. Criminal IP’s APIs automatically append contextual data to each indicator. Organizations can configure automated workflows that continuously evaluate incoming indicators against Criminal IP’s threat database.\u003c/p\u003e\n\n\u003cp\u003eThe enrichment process captures multiple data points for each IP address. Key data fields include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMaliciousness scoring\u003c/li\u003e\n\u003cli\u003eVPN and proxy detection\u003c/li\u003e\n\u003cli\u003eRemote access exposure\u003c/li\u003e\n\u003cli\u003eOpen ports\u003c/li\u003e\n\u003cli\u003eKnown vulnerabilities\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis automation ensures threat context remains current while eliminating the need for manual analyst effort during triage. Security teams can rely on consistent prioritization and faster analysis cycles.\u003c/p\u003e\n\n\u003ch2 id=\"unified-investigation-workspace\"\u003eUnified Investigation Workspace\u003c/h2\u003e\n\n\u003cp\u003eSecurity analysts can access Criminal IP intelligence directly within the ThreatQ interface, enabling real-time validation of suspicious IP activity. On-demand lookups are available directly from indicator detail views or investigation boards, providing immediate context during active investigations.\u003c/p\u003e\n\n\u003cp\u003eThe integration also expands ThreatQ’s investigation graph by mapping relationships between IP addresses, associated infrastructure, and attack activity. This unified visibility helps analysts identify patterns and connections across threats without switching between multiple tools.\u003c/p\u003e\n\n\u003cp\u003eTeams can assess risk more effectively within their existing workflows. Real-time validation eliminates the friction of manual cross-platform checks.\u003c/p\u003e\n\n\u003ch2 id=\"intelligence-driven-prioritization\"\u003eIntelligence-Driven Prioritization\u003c/h2\u003e\n\n\u003cp\u003eBy integrating Criminal IP’s data into ThreatQ’s scoring framework, organizations can align risk evaluation with their specific operational environments. Enriched data is visualized through dashboards that track maliciousness trends, VPN usage, and risk distribution across indicators.\u003c/p\u003e\n\n\u003cp\u003eThis precise prioritization supports more effective decision-making and accelerates response workflows. The platform’s orchestration capabilities filter and ingest exposure-based intelligence directly into analysis pipelines.\u003c/p\u003e\n\n\u003cp\u003eOrganizations can visualize risk distribution to identify emerging threats. Automated filtering reduces the burden on security analysts.\u003c/p\u003e\n\n\u003ch2 id=\"strategic-value-and-industry-context\"\u003eStrategic Value and Industry Context\u003c/h2\u003e\n\n\u003cp\u003eThe collaboration underscores a broader shift toward exposure-based intelligence, which continuously monitors internet-facing assets beyond traditional indicator feeds. Criminal IP CEO Byungtak Kang emphasized that the integration supports faster analysis and more effective response throughout the investigation lifecycle.\u003c/p\u003e\n\n\u003cp\u003eSecuronix Chief Revenue Officer Scott Sampson noted that combining orchestration capabilities with real-time threat data reduces manual workloads and focuses attention on relevant threats. The partnership ultimately enables security teams to operationalize threat intelligence through automated enrichment, workflow orchestration, and precise prioritization.\u003c/p\u003e\n\n\u003cp\u003eSecurity operations become more streamlined and data-driven. Analysts can focus on high-value threats rather than manual triage.\u003c/p\u003e\n\n\u003ch2 id=\"company-backgrounds\"\u003eCompany Backgrounds\u003c/h2\u003e\n\n\u003cp\u003eCriminal IP is operated by AI SPERA and provides decision-ready IP address and domain reputation data. The solution continuously scans the global internet to aggregate threat signals across IPs, domains, URLs, and attack infrastructure.\u003c/p\u003e\n\n\u003cp\u003eSecuronix operates a cloud-native Unified Defense SIEM with Agentic AI, unifying detection, investigation, and response. The platform features Sam, an AI SOC Analyst, and helps enterprises achieve breach-ready and board-ready security operations.\u003c/p\u003e\n\n\u003cp\u003eThis content is sponsored and written by Criminal IP. The collaboration represents a targeted enhancement to existing threat intelligence workflows.\u003c/p\u003e\n","keyPoints":["Criminal IP partners with Securonix to integrate exposure-based threat intelligence directly into the ThreatQ platform for automated IP indicator enrichment.","ThreatQ’s data-driven orchestration engine automatically evaluates incoming indicators against Criminal IP’s database to maintain current threat context without manual analyst effort.","Analysts can perform real-time lookups and access enriched infrastructure insights directly within the ThreatQ interface to streamline investigation workflows.","The integration enables organizations to align risk evaluation with their operational environment, improving threat prioritization and reducing manual investigation workloads."],"insights":["The integration automates the enrichment of IP indicators with granular exposure data, including VPN/proxy detection, open ports, and known vulnerabilities, through ThreatQ’s data-driven orchestration engine.","This partnership shifts focus from traditional indicator-based feeds to 'exposure-based' intelligence, revealing how infrastructure is actually exposed across the internet to improve risk assessment accuracy.","Analysts can perform on-demand Criminal IP lookups directly within ThreatQ investigation boards, enabling immediate validation of suspicious activity without switching tools or disrupting existing workflows."],"referencedReports":[],"body":"\u003cp\u003eCriminal IP and Securonix ThreatQ have established a strategic collaboration to integrate exposure-based threat intelligence directly into the ThreatQ platform. This partnership allows organizations to incorporate external IP intelligence into their existing security operations without disrupting established processes.\u003c/p\u003e\n\n\u003cp\u003eTraditional intelligence feeds often lack real-world context, but this integration bridges that gap by embedding continuously updated exposure data. Analysts can access enriched infrastructure insights and perform on-demand lookups directly within the ThreatQ interface.\u003c/p\u003e\n\n\u003cp\u003eThe integration aligns risk evaluation with organizational environments to improve threat prioritization and reduce manual workloads. This unified approach accelerates investigation cycles while keeping security operations streamlined.\u003c/p\u003e\n"},{"n":5,"title":"Story retracted","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/story-retracted/","time":"16:26","priority":"MAY READ","score":25,"group":null,"groupColor":null,"tldr":"BleepingComputer has retracted its report on an Instructure data breach after determining the information was incorrect and based on outdated details from a previous incident.","briefOverview":"\u003cp\u003eBleepingComputer initially published an article regarding a new data breach at Instructure. Shortly after the publication, the organization determined that the information was incorrect. The details were primarily based on outdated information from a prior incident.\u003c/p\u003e\n\n\u003cp\u003eConsequently, the article has been officially retracted. The publication has expressed regret for the error.\u003c/p\u003e\n\n\u003cp\u003eThe retraction notice also includes promotional content for an upcoming event. This event focuses on autonomous validation techniques. The promotion highlights how AI can chain multiple zero-day vulnerabilities into a single exploit.\u003c/p\u003e\n\n\u003cp\u003eThis exploit reportedly bypasses both renderer and operating system sandboxes. The article concludes with links to related security breach reports.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eBleepingComputer published a story claiming a new data breach had occurred at Instructure. The publication quickly recognized that the reported information was inaccurate. The content relied heavily on outdated details from a previous security incident.\u003c/p\u003e\n\n\u003cp\u003eDue to these inaccuracies, the article was formally retracted. The editorial team issued a public apology for the mistake.\u003c/p\u003e\n\n\u003cp\u003eThe retraction page features an advertisement for the Autonomous Validation Summit scheduled for May 12 and 14. The advertisement describes a research finding that 99 percent of identified vulnerabilities remain unpatched. It explains that artificial intelligence successfully chained four zero-day vulnerabilities into a single exploit.\u003c/p\u003e\n\n\u003cp\u003eThis combined exploit effectively bypassed both renderer and operating system sandboxes. The promotion warns that a wave of similar exploits is expected to emerge.\u003c/p\u003e\n\n\u003cp\u003eIt also outlines how autonomous, context-rich validation can identify exploitable weaknesses. This validation process is presented as a way to prove security controls remain effective. The approach is claimed to close the remediation loop efficiently.\u003c/p\u003e\n\n\u003cp\u003eThe page also lists several related articles about other data breaches. These links cover incidents involving McGraw Hill, Infinite Campus, ADT, and Vercel. Each linked article addresses different organizations and varying numbers of affected accounts.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003cp\u003e\u003cstrong\u003eRetraction Notice\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer initially released a report detailing a new data breach at Instructure. Shortly after publication, the editorial team determined that the information was incorrect. The report primarily relied on outdated details from a prior security incident.\u003c/p\u003e\n\n\u003cp\u003eConsequently, the article has been officially retracted. The publication has issued a formal apology for the error.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eEvent Promotion and Technical Claims\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe retraction page includes promotional material for the Autonomous Validation Summit taking place on May 12 and 14. The advertisement highlights a finding that 99 percent of discovered vulnerabilities remain unpatched. Artificial intelligence was used to chain four zero-day vulnerabilities into a single exploit.\u003c/p\u003e\n\n\u003cp\u003eThis combined exploit successfully bypassed both renderer and operating system sandboxes. The promotion warns that a wave of new exploits is expected to follow.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eValidation Methodology\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe event focuses on autonomous, context-rich validation techniques. This methodology aims to identify what is actually exploitable within systems. It also seeks to prove that security controls remain effective under pressure.\u003c/p\u003e\n\n\u003cp\u003eThe approach is designed to close the remediation loop efficiently. Readers are encouraged to claim a spot for the event.\u003c/p\u003e\n\n\u003cp\u003e\u003cstrong\u003eRelated Security Incidents\u003c/strong\u003e\u003c/p\u003e\n\n\u003cp\u003eThe article concludes with a list of related breach reports. These links cover several other major security incidents. The following organizations are referenced in the related articles:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMcGraw Hill experienced a breach affecting 13.5 million accounts.\u003c/li\u003e\n\u003cli\u003eMcGraw Hill confirmed the breach following an extortion threat.\u003c/li\u003e\n\u003cli\u003eInfinite Campus warned of a breach after ShinyHunters claimed data theft.\u003c/li\u003e\n\u003cli\u003eADT suffered a breach affecting 5.5 million people.\u003c/li\u003e\n\u003cli\u003eVercel confirmed a breach as hackers claim to be selling stolen data.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["BleepingComputer initially published a story about a new data breach at Instructure.","The publication determined that the information was incorrect and primarily based on outdated details from a prior incident.","The article has been retracted, and the publication regrets the error."],"insights":["AI was used to chain four zero-days into a single exploit capable of bypassing both renderer and OS sandboxes.","Autonomous, context-rich validation is highlighted as a method to identify exploitable vulnerabilities, verify control effectiveness, and close the remediation loop.","The retraction underscores that breach reporting accuracy depends on verifying data freshness, as outdated details from prior incidents can lead to incorrect publications."],"referencedReports":[],"body":"\u003cp\u003eBleepingComputer initially published an article regarding a new data breach at Instructure. Shortly after the publication, the organization determined that the information was incorrect. The details were primarily based on outdated information from a prior incident.\u003c/p\u003e\n\n\u003cp\u003eConsequently, the article has been officially retracted. The publication has expressed regret for the error.\u003c/p\u003e\n\n\u003cp\u003eThe retraction notice also includes promotional content for an upcoming event. This event focuses on autonomous validation techniques. The promotion highlights how AI can chain multiple zero-day vulnerabilities into a single exploit.\u003c/p\u003e\n\n\u003cp\u003eThis exploit reportedly bypasses both renderer and operating system sandboxes. The article concludes with links to related security breach reports.\u003c/p\u003e\n"},{"n":3,"title":"Federal agencies must patch cPanel bug by Sunday, CISA says","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/cisa-orders-federal-agencies-to-patch-cpanel-bug","time":"16:20","prio function AnalysisTabs({ article }) {
  const tabs = [];

  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });

  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {

}
