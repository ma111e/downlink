<script type="application/json" id="dl-articles">[{"n":1,"title":"Cisco Catalyst SD-WAN Manager CVE-2026-20245 Flaw Actively Exploited – No Patch Available","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cisco-catalyst-sd-wan-manager-cve-2026.html","time":"04:19","priority":"MUST READ","score":96,"tldr":"Cisco says CVE-2026-20245 in Catalyst SD-WAN Manager is being actively exploited to let authenticated netadmin users execute commands as root, and no patch or mitigation is currently available. Customers should ensure fixes for related auth-bypass flaws are applied and check logs for indicators of compromise, especially on internet-exposed systems.","briefOverview":"\u003cp\u003eCisco warned that a high-severity flaw in Cisco Catalyst SD-WAN Manager, tracked as CVE-2026-20245, is being actively exploited. The vulnerability has a CVSS score of 7.8 and affects on-premises, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government deployments. Cisco said there are currently no patches or mitigations available for the flaw.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability exists in the CLI of Cisco Catalyst SD-WAN Manager, formerly SD-WAN vManage, and stems from insufficient validation of user-supplied input. An authenticated local attacker with netadmin privileges could upload a crafted file to execute arbitrary commands as root. Cisco said exploitation requires valid credentials or exploitation of CVE-2026-20182 or CVE-2026-20127.\u003c/p\u003e\n\n\u003cp\u003eCisco reported limited cases where exploitation of CVE-2026-20245 resulted in configuration changes being pushed to edge devices. The company warned that internet-exposed systems are at heightened risk of compromise and advised customers to check /var/log/scripts.log for indicators of compromise. Customers are also advised to upgrade SD-WAN software to ensure fixes for CVE-2026-20182 released on May 14, 2026, have been applied.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco disclosed that CVE-2026-20245, a high-severity vulnerability in Cisco Catalyst SD-WAN Manager, is being actively exploited. The flaw carries a CVSS score of 7.8 and affects multiple deployment types, including on-premises deployments, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government. Cisco said no patches or mitigations are currently available for CVE-2026-20245.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability affects the CLI of Cisco Catalyst SD-WAN Manager, formerly SD-WAN vManage. Cisco said the issue could allow an authenticated local attacker to execute arbitrary commands as root by supplying a crafted file to an affected system. The company attributed the flaw to insufficient validation of user-supplied input, enabling command injection and privilege escalation.\u003c/p\u003e\n\n\u003cp\u003eCisco stated that exploitation requires the attacker to have netadmin privileges on the affected system. According to Cisco, this would require valid credentials or exploitation of CVE-2026-20182 or CVE-2026-20127. Cisco said it is not aware of successful exploitation by other methods.\u003c/p\u003e\n\n\u003cp\u003eCVE-2026-20182 was disclosed by Rapid7 and described as an authentication bypass that could allow unauthenticated remote attackers to obtain administrative privileges on vulnerable systems. The article also says it is similar to CVE-2026-20127, another authentication bypass affecting the same component. Both vulnerabilities have been exploited in the wild as zero-days, and a threat activity cluster called UAT-8616 has been linked to abuse of CVE-2026-20127 as far back as 2023.\u003c/p\u003e\n\n\u003cp\u003eCisco said it observed limited cases where exploitation of CVE-2026-20245 led to a configuration change pushed to edge devices. The company credited Google Mandiant researchers Chester Sng, Pete Boonyakarn, and Logeswaran Nadarajan with discovering and reporting the vulnerability. Cisco said it is unknown who is behind the latest exploitation activity.\u003c/p\u003e\n\n\u003cp\u003eCisco advised customers to upgrade SD-WAN software to ensure they have applied fixes released for CVE-2026-20182 on May 14, 2026. It also warned that internet-exposed systems are at heightened risk of compromise and recommended checking /var/log/scripts.log for specific script upload entries as possible indicators of compromise. The article notes that CVE-2026-20245 is the seventh Cisco SD-WAN flaw flagged as actively exploited this year.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCisco warned that a high-severity security flaw affecting Cisco Catalyst SD-WAN Manager is being actively exploited. The vulnerability is tracked as CVE-2026-20245 and has a CVSS score of 7.8. Cisco Catalyst SD-WAN Manager was formerly known as SD-WAN vManage.\u003c/p\u003e\n\n\u003cp\u003eCisco said there are currently no patches or mitigations available for CVE-2026-20245. The company recommended that customers upgrade their SD-WAN software to ensure they have applied fixes released for CVE-2026-20182 on May 14, 2026.\u003c/p\u003e\n\n\u003ch2 id=\"affected-deployment-types\"\u003eAffected deployment types\u003c/h2\u003e\n\n\u003cp\u003eThe article states that CVE-2026-20245 affects the following Cisco Catalyst SD-WAN Manager deployment types:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOn-Prem Deployment\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud-Pro\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud (Cisco Managed)\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN for Government (FedRAMP)\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical details\u003c/h2\u003e\n\n\u003cp\u003eCisco described CVE-2026-20245 as a vulnerability in the CLI of Cisco Catalyst SD-WAN Manager. The flaw could allow an authenticated local attacker to execute arbitrary commands as root by supplying a crafted file to an affected system.\u003c/p\u003e\n\n\u003cp\u003eCisco said the vulnerability is caused by insufficient validation of user-supplied input. An attacker could exploit it by uploading a crafted file to the affected system. Successful exploitation could allow command injection and privilege escalation to the root user.\u003c/p\u003e\n\n\u003ch2 id=\"exploit-requirements\"\u003eExploit requirements\u003c/h2\u003e\n\n\u003cp\u003eCisco said an attacker must have netadmin privileges on the affected system to exploit CVE-2026-20245. The company stated that this would require valid credentials or exploitation of CVE-2026-20182 or CVE-2026-20127.\u003c/p\u003e\n\n\u003cp\u003eCisco also said it is not aware of successful exploitation by other methods. This makes CVE-2026-20245 notable in the article because it can follow authentication-related compromises described elsewhere in the Cisco SD-WAN ecosystem.\u003c/p\u003e\n\n\u003ch2 id=\"related-vulnerabilities\"\u003eRelated vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe article links CVE-2026-20245 to two related Cisco SD-WAN vulnerabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-20182, with a CVSS score of 10.0, was disclosed by Rapid7 and described as an authentication bypass that could allow unauthenticated remote attackers to obtain administrative privileges on susceptible systems.\u003c/li\u003e\n\u003cli\u003eCVE-2026-20127 is described as another authentication bypass affecting the same component and as similar to CVE-2026-20182.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBoth CVE-2026-20182 and CVE-2026-20127 have been exploited in the wild as zero-days. The article says a threat activity cluster named UAT-8616 has been linked to abuse of CVE-2026-20127 as far back as 2023.\u003c/p\u003e\n\n\u003ch2 id=\"observed-impact\"\u003eObserved impact\u003c/h2\u003e\n\n\u003cp\u003eCisco said it observed limited cases in which exploitation of CVE-2026-20245 resulted in a configuration change being pushed to edge devices. The article does not identify who is behind the latest exploitation efforts.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was discovered and reported by Google Mandiant researchers Chester Sng, Pete Boonyakarn, and Logeswaran Nadarajan, according to Cisco.\u003c/p\u003e\n\n\u003ch2 id=\"detection-guidance-and-risk-warning\"\u003eDetection guidance and risk warning\u003c/h2\u003e\n\n\u003cp\u003eCisco warned that internet-exposed systems are at heightened risk of compromise. To look for indicators of compromise, Cisco advised users to check the \u003ccode\u003e/var/log/scripts.log\u003c/code\u003e file.\u003c/p\u003e\n\n\u003cp\u003eThe article gives examples of log entries involving script uploads, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTenant list upload per vSmart serial number using \u003ccode\u003e/usr/bin/vconfd_script_upload_tenant_list.sh\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003evSmart upload serial numbers using \u003ccode\u003e/usr/bin/vconfd_script_upload_vsmart_serial_numbers.sh\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eZTP upload chassis numbers using \u003ccode\u003e/usr/bin/vconfd_script_upload_chassis_number_file.sh\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-cisco-sd-wan-exploitation-context\"\u003eBroader Cisco SD-WAN exploitation context\u003c/h2\u003e\n\n\u003cp\u003eThe article states that CVE-2026-20245 is the seventh Cisco SD-WAN flaw to be flagged as actively exploited this year. The other cited flaws are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-20182\u003c/li\u003e\n\u003cli\u003eCVE-2026-20127\u003c/li\u003e\n\u003cli\u003eCVE-2026-20122\u003c/li\u003e\n\u003cli\u003eCVE-2026-20128\u003c/li\u003e\n\u003cli\u003eCVE-2026-20133\u003c/li\u003e\n\u003cli\u003eCVE-2022-20775\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe disclosure also follows Cisco addressing another high-severity flaw in Unified Communications Manager, CVE-2026-20230, which has a CVSS score of 8.6. Cisco said proof-of-concept exploit code is public for CVE-2026-20230, but there is no evidence that it has been actively exploited.\u003c/p\u003e\n","keyPoints":["Cisco warned that CVE-2026-20245, a high-severity flaw in Cisco Catalyst SD-WAN Manager, is being actively exploited.","CVE-2026-20245 allows an authenticated local attacker with netadmin privileges to execute arbitrary commands as root by uploading a crafted file to an affected system.","Cisco said exploitation of CVE-2026-20245 requires valid credentials or prior exploitation of CVE-2026-20182 or CVE-2026-20127.","Cisco observed limited cases where exploitation of CVE-2026-20245 resulted in a configuration change pushed to edge devices.","Cisco said there are currently no patches or mitigations available for CVE-2026-20245 and advised customers to upgrade SD-WAN software to apply fixes for CVE-2026-20182."],"insights":["CVE-2026-20245 is especially concerning because Cisco says it can be chained after CVE-2026-20182 or CVE-2026-20127, turning prior authentication-bypass exposure into root-level command execution on affected systems.","The most actionable detection step Cisco provides is to inspect /var/log/scripts.log for suspicious script upload entries involving tenant lists, vSmart serial numbers, or chassis number files.","Internet-exposed Cisco Catalyst SD-WAN Manager systems face heightened risk, even though the flaw itself requires netadmin privileges, because related authentication-bypass vulnerabilities have already been exploited in the wild.","Cisco observed exploitation leading to configuration changes pushed to edge devices, indicating that compromise of SD-WAN Manager can affect downstream network infrastructure rather than remaining limited to the manager system."],"referencedReports":[{"title":"Cisco Catalyst SD-WAN Manager Software Command Injection Vulnerability","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-sdwan-privesc-4uxFrdzx","publisher":"Cisco","context":"The article cites Cisco's advisory as the source for details on CVE-2026-20245, including affected deployments, exploit requirements, impact, and lack of patches or mitigations.","category":"","primary":false}],"body":"\u003cp\u003eCisco warned that a high-severity flaw in Cisco Catalyst SD-WAN Manager, tracked as CVE-2026-20245, is being actively exploited. The vulnerability has a CVSS score of 7.8 and affects on-premises, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government deployments. Cisco said there are currently no patches or mitigations available for the flaw.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability exists in the CLI of Cisco Catalyst SD-WAN Manager, formerly SD-WAN vManage, and stems from insufficient validation of user-supplied input. An authenticated local attacker with netadmin privileges could upload a crafted file to execute arbitrary commands as root. Cisco said exploitation requires valid credentials or exploitation of CVE-2026-20182 or CVE-2026-20127.\u003c/p\u003e\n\n\u003cp\u003eCisco reported limited cases where exploitation of CVE-2026-20245 resulted in configuration changes being pushed to edge devices. The company warned that internet-exposed systems are at heightened risk of compromise and advised customers to check /var/log/scripts.log for indicators of compromise. Customers are also advised to upgrade SD-WAN software to ensure fixes for CVE-2026-20182 released on May 14, 2026, have been applied.\u003c/p\u003e\n"}]</script>
