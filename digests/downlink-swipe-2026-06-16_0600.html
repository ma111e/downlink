from over 12 million patients. iRhythm reported the incident in a filing with the U.S. Securities and Exchange Commission.\u003c/p\u003e\n\n\u003cp\u003eThe company said it discovered the incident on June 9, 2026, and launched an investigation with external cybersecurity experts while activating its cybersecurity response plan. A threat actor contacted iRhythm demanding payment in exchange for not publicly disclosing stolen information, including proprietary data, patient protected health information, and other personal information. iRhythm confirmed that certain data was exfiltrated and determined on June 10, 2026, that the incident was material because of the volume of potentially affected data.\u003c/p\u003e\n\n\u003cp\u003eiRhythm said the attackers gained access through social engineering, but it did not attribute the incident to a specific threat actor or extortion group. The company stated that it has no evidence the incident affected its products, clinical or medical device systems, patient safety, manufacturing and distribution operations, or financial reporting systems. It also said it does not store patients’ payment card or financial account information, and the number of affected individuals was not immediately available.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eiRhythm Holdings disclosed a data breach involving patient personal and health information stored on third-party-hosted business applications. The digital healthcare company said its cardiac monitoring service has analyzed more than 2 billion hours of curated heartbeat data from over 12 million patients. The disclosure was made in a filing with the U.S. Securities and Exchange Commission on Monday.\u003c/p\u003e\n\n\u003cp\u003eAccording to the filing, iRhythm discovered the incident one day earlier and launched an investigation with external cybersecurity experts. The company also activated its cybersecurity response plan to contain the breach. It said the threat actors gained access to the data through social engineering.\u003c/p\u003e\n\n\u003cp\u003eThe company said a threat actor contacted it on June 9, 2026, claiming to have obtained sensitive information. The information allegedly included proprietary data, patient protected health information, and other personal information. The communications demanded payment in exchange for not publicly disclosing the information.\u003c/p\u003e\n\n\u003cp\u003eiRhythm said it has confirmed that certain data was exfiltrated from the affected applications. On June 10, 2026, the company determined that the incident was material because of the volume of potentially affected data. The article states that iRhythm did not attribute the attack to a specific threat actor or extortion group.\u003c/p\u003e\n\n\u003cp\u003eThe company said it has no evidence that the incident affected its products, clinical or medical device systems, patient safety, manufacturing and distribution operations, or financial reporting systems. It also said the breach does not involve clinical or medical device systems and that it does not store patients’ payment card or financial account information. BleepingComputer said it contacted iRhythm for more information, including the number of individuals affected, but a response was not immediately available.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that Danish pharmaceutical giant Novo Nordisk disclosed a separate data breach the previous week involving patient information from some clinical trials and compromised internal IT systems. That incident is presented as a related healthcare-sector breach, but the article does not link it to the iRhythm incident. The iRhythm breach remains unattributed in the article.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eDigital healthcare company iRhythm Holdings disclosed a data breach after hackers stole patients’ personal and health information from third-party-hosted business applications. The company said its cardiac monitoring service has been used to analyze more than 2 billion hours of curated heartbeat data from over 12 million patients.\u003c/p\u003e\n\n\u003cp\u003eThe disclosure was made in a filing with the U.S. Securities and Exchange Commission. iRhythm said the incident involved sensitive information but did not involve its clinical or medical device systems.\u003c/p\u003e\n\n\u003ch2 id=\"discovery-and-response\"\u003eDiscovery and Response\u003c/h2\u003e\n\n\u003cp\u003eIn its SEC filing, iRhythm said it discovered the incident one day before the filing. After discovery, the company launched an investigation with external cybersecurity experts and activated its cybersecurity response plan to contain the breach.\u003c/p\u003e\n\n\u003cp\u003eThe company said it confirmed that certain data was exfiltrated from the affected third-party-hosted business applications. On June 10, 2026, iRhythm determined that the incident was material because of the volume of potentially affected data.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-communication-and-extortion-demand\"\u003eThreat Actor Communication and Extortion Demand\u003c/h2\u003e\n\n\u003cp\u003eThe article states that attackers contacted iRhythm on June 9, 2026. According to iRhythm, the threat actor claimed to have obtained sensitive information and demanded payment in exchange for not publicly disclosing it.\u003c/p\u003e\n\n\u003cp\u003eThe information claimed by the threat actor included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eProprietary data.\u003c/li\u003e\n\u003cli\u003ePatient protected health information.\u003c/li\u003e\n\u003cli\u003eOther personal information.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says iRhythm did not attribute the attack to a specific threat actor or extortion group.\u003c/p\u003e\n\n\u003ch2 id=\"access-method-and-affected-systems\"\u003eAccess Method and Affected Systems\u003c/h2\u003e\n\n\u003cp\u003eiRhythm stated that the threat actors gained access to the data through social engineering. The stolen data was stored on third-party-hosted business applications.\u003c/p\u003e\n\n\u003cp\u003eThe company said it has no evidence that the incident affected:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIts products.\u003c/li\u003e\n\u003cli\u003eClinical or medical device systems.\u003c/li\u003e\n\u003cli\u003ePatient safety.\u003c/li\u003e\n\u003cli\u003eManufacturing and distribution operations.\u003c/li\u003e\n\u003cli\u003eFinancial reporting systems.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe company also said the breach does not involve its clinical or medical device systems.\u003c/p\u003e\n\n\u003ch2 id=\"data-and-patient-impact\"\u003eData and Patient Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article reports that patients’ personal and health information was stolen. iRhythm said it does not store patients’ payment card or financial account information.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer contacted an iRhythm spokesperson with additional questions, including how many individuals had their personal and patient data exposed. A response was not immediately available at the time of publication.\u003c/p\u003e\n\n\u003ch2 id=\"related-healthcare-breach-mentioned\"\u003eRelated Healthcare Breach Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article also notes that Danish pharmaceutical giant Novo Nordisk disclosed a data breach the previous week. In that separate incident, hackers stole patient information from some clinical trials, and the incident involved compromised internal IT systems.\u003c/p\u003e\n\n\u003cp\u003eThe article presents the Novo Nordisk incident as related coverage but does not state that it is connected to the iRhythm breach.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaways\"\u003eKey Takeaways\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eiRhythm disclosed a material data breach involving patient and personal information stored in third-party-hosted business applications.\u003c/li\u003e\n\u003cli\u003eThe company said a threat actor demanded payment to prevent public disclosure of stolen information.\u003c/li\u003e\n\u003cli\u003eiRhythm confirmed data exfiltration and said the access was gained through social engineering.\u003c/li\u003e\n\u003cli\u003eThe company reported no evidence of impact to products, clinical or medical device systems, patient safety, manufacturing and distribution operations, or financial reporting systems.\u003c/li\u003e\n\u003cli\u003eThe number of affected individuals was not disclosed in the article.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["iRhythm Holdings disclosed a data breach after hackers stole patients' personal and health information stored on third-party-hosted business applications.","The company said a threat actor contacted it on June 9, 2026, claiming to have obtained sensitive information and demanding payment to prevent public disclosure.","iRhythm confirmed that certain data was exfiltrated and determined on June 10, 2026, that the incident was material because of the volume of potentially affected data.","The company said the attackers gained access through social engineering and that it has no evidence the incident affected its products, clinical or medical device systems, patient safety, manufacturing and distribution operations, or financial reporting systems.","iRhythm said it does not store patients' payment card or financial account information, and BleepingComputer reported that the number of affected individuals was not immediately available."],"insights":["The breach shows that third-party-hosted business applications can expose sensitive healthcare data even when clinical, medical device, manufacturing, and financial reporting systems remain unaffected.","The attacker’s ransom demand was based on threatened disclosure of stolen data, not on reported disruption to iRhythm’s products or patient-facing medical systems.","iRhythm treated the incident as material within one day of discovery because of the volume of potentially affected data, highlighting how data exposure alone can trigger SEC disclosure obligations.","The company’s statement that access was gained through social engineering makes identity and access controls around hosted business applications a central area for risk reduction."],"referencedReports":[],"body":"\u003cp\u003eDigital healthcare company iRhythm Holdings disclosed a data breach after hackers stole patients’ personal and health information from third-party-hosted business applications. The company said its cardiac monitoring service has been used to analyze more than 2 billion hours of curated heartbeat data from over 12 million patients. iRhythm reported the incident in a filing with the U.S. Securities and Exchange Commission.\u003c/p\u003e\n\n\u003cp\u003eThe company said it discovered the incident on June 9, 2026, and launched an investigation with external cybersecurity experts while activating its cybersecurity response plan. A threat actor contacted iRhythm demanding payment in exchange for not publicly disclosing stolen information, including proprietary data, patient protected health information, and other personal information. iRhythm confirmed that certain data was exfiltrated and determined on June 10, 2026, that the incident was material because of the volume of potentially affected data.\u003c/p\u003e\n\n\u003cp\u003eiRhythm said the attackers gained access through social engineering, but it did not attribute the incident to a specific threat actor or extortion group. The company stated that it has no evidence the incident affected its products, clinical or medical device systems, patient safety, manufacturing and distribution operations, or financial reporting systems. It also said it does not store patients’ payment card or financial account information, and the number of affected individuals was not immediately available.\u003c/p\u003e\n"},{"n":6,"title":"Dozens of malicious wallpapers found on Steam Workshop: gamers’ accounts at risk","source":"securelist.com","sourceColorIdx":5,"link":"https://securelist.com/dozens-of-malicious-wallpapers-found-on-steam-workshop/120186/","time":"09:00","priority":"SHOULD READ","score":82,"tldr":"Attackers are abusing Wallpaper Engine’s Steam Workshop feature to distribute malicious “application wallpapers” that can steal Steam sessions and install backdoors, infostealers, ransomware, or crypto miners. Kaspersky found dozens of infected wallpapers, mainly targeting gamers in China and Russia, and recommends scanning Workshop wallpapers before applying them.","briefOverview":"\u003cp\u003eSince late 2025, malware has been spreading through Steam Workshop by being hidden inside Wallpaper Engine wallpaper packages. The attacks focus on Wallpaper Engine’s Workshop sharing feature, especially its “application wallpaper” type, which can run standalone Windows-compatible programs as desktop backgrounds. Kaspersky found dozens of malicious application wallpapers, each already downloaded thousands or tens of thousands of times.\u003c/p\u003e\n\n\u003cp\u003eThe campaign puts gamers’ Steam accounts and systems at risk, with observed payloads including backdoors, infostealers, crypto miners, botnet loaders, and ransomware. One analyzed sample dropped the DarkKomet backdoor as \u003ccode\u003eSynaptics.exe\u003c/code\u003e and used a modified \u003ccode\u003eAggregatorHost.dll\u003c/code\u003e to locate Steam, hijack the user’s live Steam session, and send collected data to \u003ccode\u003e120.48.156[.]17\u003c/code\u003e. Kaspersky said the attacks primarily targeted China, which accounted for 89% of detected malicious download attempts, followed by Russia at 5.5%.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eKaspersky reported that since late 2025, malware has been spreading rapidly through Steam Workshop via Wallpaper Engine, a popular app for animated desktop wallpapers. The attackers are abusing Wallpaper Engine’s Workshop sharing feature by hiding malware inside user-shared wallpaper packages. Running a compromised wallpaper can result in a stolen Steam account or a system infected with backdoors, crypto miners, ransomware, or other malware.\u003c/p\u003e\n\n\u003cp\u003eWallpaper Engine supports several wallpaper types, including videos, scenes, web pages, and applications. The article identifies application wallpapers as the riskiest format because they are essentially standalone Windows-compatible programs that Wallpaper Engine can set as the desktop background. Cybercriminals used that capability to embed malicious code directly into wallpaper packages published for free on Steam Workshop.\u003c/p\u003e\n\n\u003cp\u003eKaspersky found dozens of malicious application wallpapers on Steam Workshop, with individual items downloaded thousands or tens of thousands of times. The attackers used two distribution methods: archives containing the executable wallpaper alongside malicious EXE files, DLLs, or scripts, and password-protected archives where the password was either entered by the victim or handled automatically by a script. In some cases, the password was hidden in plain sight in the archive name or inside a JSON configuration installed with the wallpaper files.\u003c/p\u003e\n\n\u003cp\u003eOne analyzed game wallpaper appeared harmless and ran normally while deploying malware in the background. It dropped a DarkKomet backdoor named \u003ccode\u003eSynaptics.exe\u003c/code\u003e, launched \u003ccode\u003e._cache_GAME1.exe\u003c/code\u003e to start the NTRaholic game, and installed a modified \u003ccode\u003eAggregatorHost.dll\u003c/code\u003e with a payload. That library searched for the Steam app, hijacked the user’s live Steam session, and sent collected data to a hacker-controlled server at \u003ccode\u003ehxxp://120.48.156[.]17/ey.php\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eKaspersky said the variety of tools used suggests multiple independent hacking groups are abusing the same trend rather than a single actor. The primary targets were gamers in China, which accounted for 89% of malicious download attempts, while Russia accounted for 5.5% and smaller shares appeared in Singapore, Hong Kong, Germany, Vietnam, India, and Canada. Steam had removed the identified malicious wallpapers and links by publication time, but Kaspersky warned that new infected wallpapers continue to appear and recommended scanning such wallpapers before applying them.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eKaspersky reported that malware has been spreading through Steam Workshop since late 2025 by being hidden inside Wallpaper Engine wallpaper packages. Wallpaper Engine is a Steam application that lets users place animated wallpapers on their desktops and share creations through Steam Workshop. The malicious activity focuses on the Windows version of Wallpaper Engine and abuses its Workshop-based content sharing model.\u003c/p\u003e\n\n\u003cp\u003eThe core risk is that running a compromised wallpaper can lead to Steam account theft or leave the victim’s system infected with malware. The article says compromised wallpapers can install backdoors, crypto miners, ransomware, infostealers, and botnet loaders. Kaspersky found dozens of malicious wallpapers, and each had already been downloaded thousands or tens of thousands of times.\u003c/p\u003e\n\n\u003ch2 id=\"why-wallpaper-engine-is-being-abused\"\u003eWhy Wallpaper Engine Is Being Abused\u003c/h2\u003e\n\n\u003cp\u003eWallpaper Engine supports several wallpaper formats:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVideos such as MP4 and WebM files.\u003c/li\u003e\n\u003cli\u003eScenes built inside Wallpaper Engine’s editor.\u003c/li\u003e\n\u003cli\u003eWeb pages using HTML, JavaScript, CSS, audio, and video elements.\u003c/li\u003e\n\u003cli\u003eApplications, which are active windows from third-party Windows-compatible software used as desktop backgrounds.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article identifies application wallpapers as the key security issue. These wallpapers are essentially standalone programs, so the feature allows foreign code to run directly on a user’s computer. Kaspersky says attackers noticed this capability and began embedding malware into application wallpaper packages distributed through Steam Workshop.\u003c/p\u003e\n\n\u003ch2 id=\"distribution-methods-observed\"\u003eDistribution Methods Observed\u003c/h2\u003e\n\n\u003cp\u003eKaspersky observed two main methods for spreading the malicious payloads.\u003c/p\u003e\n\n\u003cp\u003eFirst, some wallpaper packages included an archive containing the executable wallpaper alongside malicious files. These payloads often consisted of compromised EXE files, DLLs, or scripts.\u003c/p\u003e\n\n\u003cp\u003eSecond, some attackers hid malware inside password-protected archives. In those cases, either the victim was tricked into entering the password or a script handled the password automatically. The article says the password could be hidden in plain sight, either in the archive name or inside a JSON configuration installed with the wallpaper files.\u003c/p\u003e\n\n\u003cp\u003eFor other variations, the payload triggered automatically when the user selected and applied the wallpaper.\u003c/p\u003e\n\n\u003ch2 id=\"example-infection-chain\"\u003eExample Infection Chain\u003c/h2\u003e\n\n\u003cp\u003eKaspersky analyzed a game wallpaper sample uncovered in December 2025 that appeared harmless to the user. The built-in game launched normally, ran smoothly, and desktop controls worked as expected. While the wallpaper appeared functional, the infection proceeded in the background.\u003c/p\u003e\n\n\u003cp\u003eThe sample dropped a backdoor file named \u003ccode\u003eSynaptics.exe\u003c/code\u003e onto the victim’s system. Kaspersky identified it as part of the DarkKomet malware family. At the same time, an executable named \u003ccode\u003e._cache_GAME1.exe\u003c/code\u003e launched the actual game, NTRaholic.\u003c/p\u003e\n\n\u003cp\u003eThe \u003ccode\u003e._cache_GAME1.exe\u003c/code\u003e module also installed a custom version of the system library \u003ccode\u003eAggregatorHost.dll\u003c/code\u003e containing a payload. The modified library searched for the Steam application and hunted for account credentials. It then hijacked the user’s live Steam session and sent collected data to a hacker-controlled server at \u003ccode\u003ehxxp://120.48.156[.]17/ey.php\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eKaspersky said that once attackers control an active Steam session, they can use the victim’s account to upload more malicious wallpapers to Steam Workshop.\u003c/p\u003e\n\n\u003ch2 id=\"malware-families-and-payloads\"\u003eMalware Families and Payloads\u003c/h2\u003e\n\n\u003cp\u003eThe article says the malicious Wallpaper Engine packages were used to distribute a broad range of malware. Kaspersky specifically names:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDarkKomet backdoor.\u003c/li\u003e\n\u003cli\u003eLumma infostealer.\u003c/li\u003e\n\u003cli\u003eVidar infostealer.\u003c/li\u003e\n\u003cli\u003eRenEngine loader.\u003c/li\u003e\n\u003cli\u003eCrypto miners.\u003c/li\u003e\n\u003cli\u003eBotnet loaders.\u003c/li\u003e\n\u003cli\u003eRansomware.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eKaspersky also listed detection verdicts assigned to discovered objects, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eHEUR:Trojan-PSW.Win32.gen\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eHEUR:Trojan-PSW.Win32.Python.gen\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eHEUR:Backdoor.Win32.DarkKomet\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eTrojan-Dropper.Python.Agent\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eHEUR:Trojan-Ransom.Win32.Gen.gen\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ePDM:Trojan.Win32.Generic.\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"attribution-and-targeting\"\u003eAttribution and Targeting\u003c/h2\u003e\n\n\u003cp\u003eKaspersky did not attribute the activity to a single named threat actor. The article states that the wide range of tools used suggests the activity is not the work of one mastermind, but rather multiple scattered, independent hacking groups abusing the same trend.\u003c/p\u003e\n\n\u003cp\u003eThe primary targets are gamers in China. Kaspersky says the wallpaper art styles and titles were tailored specifically to Chinese gamers, and its security systems recorded 89% of malicious download attempts in China.\u003c/p\u003e\n\n\u003cp\u003eRussia was the second-largest region by downloads at 5.5%. Other affected countries and territories mentioned were Singapore at 1.4%, Hong Kong at 0.9%, Germany at 0.9%, Vietnam at 0.9%, India at 0.5%, and Canada at 0.5%.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe article says compromised wallpapers can lead to stolen Steam accounts and infected systems. Potential system impacts described include encrypted files from ransomware and degraded performance caused by hidden crypto miners. The Steam account impact includes hijacking a live session and potentially using compromised accounts to upload more malicious wallpapers to Steam Workshop.\u003c/p\u003e\n\n\u003cp\u003eBy the time the post was published, Steam had removed the identified malicious wallpapers and links from the platform. However, Kaspersky warned that new infected wallpapers continue to appear on Steam Workshop. The article recommends running an antivirus scan on these types of wallpapers before applying them.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article includes MD5 hashes, command-and-control servers, and Steam Workshop URLs associated with malicious wallpapers. It lists multiple C2 locations, including \u003ccode\u003e202.144.192[.]29\u003c/code\u003e, \u003ccode\u003e120.48.156[.]17\u003c/code\u003e, \u003ccode\u003ebrightly[.]to\u003c/code\u003e, a Dropbox-hosted \u003ccode\u003eSynaptics.rar\u003c/code\u003e, and a Google Docs download URL. It also lists multiple Steam Workshop file URLs that Kaspersky identified as malicious wallpapers.\u003c/p\u003e\n","keyPoints":["Since late 2025, malware has been spreading through Steam Workshop by being hidden inside Wallpaper Engine wallpaper packages shared by users.","The attacks abuse Wallpaper Engine’s application wallpaper feature, which allows standalone Windows-compatible programs to run as desktop backgrounds.","Kaspersky found dozens of malicious application wallpapers on Steam Workshop, with individual wallpapers downloaded thousands or tens of thousands of times.","One analyzed sample dropped the DarkKomet backdoor as Synaptics.exe and used a modified AggregatorHost.dll to locate Steam, hijack the user’s live Steam session, and send collected data to 120.48.156[.]17.","Kaspersky said 89% of detected malicious download attempts occurred in China, with Russia second at 5.5%, and Steam had removed the identified malicious wallpapers and links by publication time."],"insights":["Wallpaper Engine’s “application wallpaper” format is especially risky because it treats a shared desktop background as a standalone executable program, so applying a wallpaper can be equivalent to running untrusted software.","Some malicious wallpapers used password-protected archives where the password was exposed in the archive name or a bundled JSON configuration, allowing the payload to evade simple inspection while still being unpacked by the victim or a script.","The analyzed sample ran a functional game while deploying malware in the background, showing that a wallpaper behaving normally is not evidence that it is safe.","Hijacked Steam sessions can be used to upload additional malicious wallpapers to Steam Workshop, turning compromised gamer accounts into a distribution mechanism for further infections.","The wide range of payloads, including DarkKomet, Lumma, Vidar, RenEngine, crypto miners, and botnet loaders, led Kaspersky to assess that multiple independent groups are abusing the same Wallpaper Engine distribution path."],"referencedReports":[],"body":"\u003cp\u003eSince late 2025, malware has been spreading through Steam Workshop by being hidden inside Wallpaper Engine wallpaper packages. The attacks focus on Wallpaper Engine’s Workshop sharing feature, especially its “application wallpaper” type, which can run standalone Windows-compatible programs as desktop backgrounds. Kaspersky found dozens of malicious application wallpapers, each already downloaded thousands or tens of thousands of times.\u003c/p\u003e\n\n\u003cp\u003eThe campaign puts gamers’ Steam accounts and systems at risk, with observed payloads including backdoors, infostealers, crypto miners, botnet loaders, and ransomware. One analyzed sample dropped the DarkKomet backdoor as \u003ccode\u003eSynaptics.exe\u003c/code\u003e and used a modified \u003ccode\u003eAggregatorHost.dll\u003c/code\u003e to locate Steam, hijack the user’s live Steam session, and send collected data to \u003ccode\u003e120.48.156[.]17\u003c/code\u003e. Kaspersky said the attacks primarily targeted China, which accounted for 89% of detected malicious download attempts, followed by Russia at 5.5%.\u003c/p\u003e\n"},{"n":9,"title":"Continuous AI Pentesting: What We’re Building, and What It’s Already Finding","source":"cycognito.com","sourceColorIdx":2,"link":"https://www.cycognito.com/blog/new-continuous-ai-pentesting/","time":"08:21","priority":"MAY READ","score":58,"tldr":"CyCognito is introducing continuous AI pentesting that uses AI agents and exposure context to find business-specific risks, especially in exposed AI systems like MCP servers and RAG stacks, that traditional CVE scanning often misses. Early tests reportedly uncovered unauthenticated access to CRM data, exposed knowledge bases, and poorly segmented physical security systems.","briefOverview":"\u003cp\u003eCyCognito describes two related efforts around AI security: expanded coverage for AI assets and a new continuous AI pentesting capability. The platform now detects more of the AI stack, including MCP servers, n8n, Ollama, MLflow, PyTorch, Triton, and other technologies. The company says it has more than 60 detection models in production and growing.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that AI-related risks often do not appear as CVEs and can involve exposed services, missing authentication, and poor segmentation. CyCognito cites examples including an exposed MCP server that allowed unauthenticated access to CRM data, a public CrewAI stack with an anonymously readable RAG knowledge base, and a physical security system exposed alongside AI deployments.\u003c/p\u003e\n\n\u003cp\u003eCyCognito says its continuous AI pentesting capability simulates an AI-powered attacker across external environments. It uses exposure assessment, exposure validation, threat intelligence, and a contextual orchestration layer called Target Graph to decide where testing should run, how deep it should go, and which techniques to use.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCyCognito frames the article around a shift in customer concerns from coverage, prioritization, and emerging threats to exposed MCP servers, unmanaged AI chatbots, and risks that do not show up as CVEs. The company says AI now writes a quarter of production code with twice as many vulnerabilities, while exploitation windows have shortened from days to hours. Against that backdrop, it presents expanded AI asset coverage and a new continuous AI pentesting capability.\u003c/p\u003e\n\n\u003cp\u003eThe first area of work is broader AI asset discovery. CyCognito says its platform now detects more of the AI stack, building on a prior MCP server discovery release. The covered technologies include n8n, Ollama, MLflow, PyTorch, Triton, and others, with more than 60 detection models in production.\u003c/p\u003e\n\n\u003cp\u003eThe second area is continuous AI pentesting, which CyCognito says simulates an AI-powered attacker. The article presents field examples intended to show findings that would not come from CVE scanning. These include unauthenticated CRM data exposure through an externally reachable MCP server, an exposed RAG index behind a CrewAI agent stack, and a physical security system found on the public internet near AI document analysis tools and a customer-facing chatbot.\u003c/p\u003e\n\n\u003cp\u003eIn the CRM example, CyCognito says simulated prompt injection produced verbose error responses that disclosed backend details. Those details revealed the CRM system and calls needed to reach it, after which several million rows of account, opportunity, and per-item financial data were queryable through HTTP POST requests without credentials. In the CrewAI example, authentication was enforced on the agent API but not on the knowledge base storing the agent’s source documents.\u003c/p\u003e\n\n\u003cp\u003eCyCognito describes its architecture as combining Exposure Assessment, Exposure Validation, and Threat Intelligence into a Target Graph orchestration layer. The Target Graph reevaluates the exposed surface and threat matrix, then determines where AI pentesting should run, at what depth, and with which techniques. The company says this model is intended to make AI pentesting continuous across the full external surface rather than limited to selected high-priority assets.\u003c/p\u003e\n\n\u003cp\u003eThe article says the system is designed to improve over time by converting AI-validated attack chains into deterministic tests. CyCognito says this frees AI capacity in future runs and supports specialized agents for web applications and APIs, AI and LLM endpoints, cloud, VPNs, OT/IT systems, and other asset types. The work is internally codenamed Project Kineto, and CyCognito is inviting readers to join a waitlist for progress notes, design partner applications, and early access.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCyCognito presents a new direction for its platform focused on AI asset coverage and continuous AI pentesting. The article says customer conversations have shifted from traditional exposure management questions such as coverage, prioritization, and emerging threats toward exposed MCP servers, unmanaged AI chatbots, and risks that do not appear as CVEs.\u003c/p\u003e\n\n\u003cp\u003eThe company says it has been building on two fronts. First, it is expanding AI asset coverage across technologies such as MCP servers, n8n, Ollama, MLflow, PyTorch, Triton, and more. Second, it is developing continuous AI pentesting, described as a capability that simulates an AI-powered attacker.\u003c/p\u003e\n\n\u003ch2 id=\"stated-motivation\"\u003eStated Motivation\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that the security calculus has changed because AI now writes a quarter of production code and is associated with twice as many vulnerabilities. It also states that the exploitation window has collapsed from days to hours. CyCognito further says that models already in use can find zero-days for a few hundred dollars in tokens.\u003c/p\u003e\n\n\u003cp\u003eThe company’s central claim is that many important AI-era risks are not captured by CVE scanning. The examples it provides involve exposed interfaces, missing authentication, excessive backend access, exposed data stores, and lack of segmentation rather than named vulnerabilities.\u003c/p\u003e\n\n\u003ch2 id=\"expanded-ai-asset-coverage\"\u003eExpanded AI Asset Coverage\u003c/h2\u003e\n\n\u003cp\u003eCyCognito says its platform now detects much more of the AI stack. The article lists the following examples:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMCP servers\u003c/li\u003e\n\u003cli\u003en8n\u003c/li\u003e\n\u003cli\u003eOllama\u003c/li\u003e\n\u003cli\u003eMLflow\u003c/li\u003e\n\u003cli\u003ePyTorch\u003c/li\u003e\n\u003cli\u003eTriton\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe company says it has more than 60 detection models in production and that the number is growing. This expanded coverage builds on a prior MCP server discovery release mentioned in the article.\u003c/p\u003e\n\n\u003ch2 id=\"field-examples-presented\"\u003eField Examples Presented\u003c/h2\u003e\n\n\u003ch3 id=\"exposed-mcp-server-and-crm-data\"\u003eExposed MCP Server and CRM Data\u003c/h3\u003e\n\n\u003cp\u003eCyCognito describes a case involving a large enterprise with an externally reachable MCP server. The server exposed an unauthenticated natural-language interface to the production environment.\u003c/p\u003e\n\n\u003cp\u003eThe article says simulated prompt injection caused verbose error responses that disclosed internal backend details. Those details surfaced the CRM behind the server and the calls needed to reach it. From there, several million rows of account, opportunity, and per-item financial data were queryable through a handful of HTTP POST requests without credentials.\u003c/p\u003e\n\n\u003cp\u003eCyCognito presents this as an example of how an exposed MCP server can create a privileged path into a critical backend system. The article notes that such systems may be deployed outside security workflows and without sufficient authentication.\u003c/p\u003e\n\n\u003ch3 id=\"exposed-rag-index-behind-a-crewai-stack\"\u003eExposed RAG Index Behind a CrewAI Stack\u003c/h3\u003e\n\n\u003cp\u003eAnother example involved an organization with a CrewAI agent stack on the public internet. A security layer had been added, but authentication was enforced only on the agent API itself.\u003c/p\u003e\n\n\u003cp\u003eThe article says authentication was not enforced on the knowledge base read by the agent. As a result, the store holding the agent’s source documents was readable through anonymous requests.\u003c/p\u003e\n\n\u003cp\u003eCyCognito describes this as exposing the RAG index. The article says a RAG index can hold customer data, internal communications, contracts, and operational knowledge, depending on what an organization feeds the agent.\u003c/p\u003e\n\n\u003ch3 id=\"physical-security-system-on-the-public-internet\"\u003ePhysical Security System on the Public Internet\u003c/h3\u003e\n\n\u003cp\u003eThe third example involved a physical security system controlling door locks, card readers, and CCTV. CyCognito says the system was discovered on the public internet.\u003c/p\u003e\n\n\u003cp\u003eThe article says the system was deployed alongside the organization’s AI document analysis tools and customer-facing chatbot. It also says these systems were on the same surface and had the same lack of segmentation.\u003c/p\u003e\n\n\u003cp\u003eCyCognito states that the review processes that missed the AI deployments also missed the physical access system.\u003c/p\u003e\n\n\u003ch2 id=\"how-cycognito-says-the-capability-works\"\u003eHow CyCognito Says the Capability Works\u003c/h2\u003e\n\n\u003cp\u003eCyCognito says findings like the examples above require more than CVE scanning. The company describes them as requiring agents that can spot overlooked weaknesses, execute multi-step tests, and apply reasoning and context.\u003c/p\u003e\n\n\u003cp\u003eFor the exposed CRM example, the article describes the chain as follows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFingerprint an exposed MCP server.\u003c/li\u003e\n\u003cli\u003eAssociate it with the organization.\u003c/li\u003e\n\u003cli\u003eEnumerate the tool catalog.\u003c/li\u003e\n\u003cli\u003eIdentify tools wired to the MCP server.\u003c/li\u003e\n\u003cli\u003eUse natural-language calls to walk the data model.\u003c/li\u003e\n\u003cli\u003ePull the full dataset to validate data exposure and missing authentication.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCyCognito says this kind of attack chain requires knowing which threads to pull and what those threads might connect to.\u003c/p\u003e\n\n\u003ch2 id=\"platform-components\"\u003ePlatform Components\u003c/h2\u003e\n\n\u003cp\u003eThe article says CyCognito’s continuous AI pentesting capability builds on three existing platform modules.\u003c/p\u003e\n\n\u003ch3 id=\"exposure-assessment\"\u003eExposure Assessment\u003c/h3\u003e\n\n\u003cp\u003eExposure Assessment maps the external footprint, attributes assets to the right part of the organization, and enriches them with business and technology context.\u003c/p\u003e\n\n\u003ch3 id=\"exposure-validation\"\u003eExposure Validation\u003c/h3\u003e\n\n\u003cp\u003eExposure Validation runs more than 100,000 deterministic tests continuously. CyCognito says this leaves AI pentesters free to focus on high-judgment work.\u003c/p\u003e\n\n\u003ch3 id=\"threat-intelligence\"\u003eThreat Intelligence\u003c/h3\u003e\n\n\u003cp\u003eThreat Intelligence uses the history of existing and emerging vulnerabilities, playbooks, and statistical models trained on past engagements. The article says this helps understand and predict attacker activities.\u003c/p\u003e\n\n\u003ch2 id=\"target-graph\"\u003eTarget Graph\u003c/h2\u003e\n\n\u003cp\u003eCyCognito says these three modules feed into the Target Graph, a contextual orchestration layer that constantly reevaluates the threat matrix and exposed surface. The Target Graph determines where AI pentesting should run, how deep it should run, and which techniques should be used.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the Target Graph as central to making the capability continuous across the full surface. It uses exposure context, deterministic validation results, emerging threats, and signals from attacker activity in the wild to guide testing decisions.\u003c/p\u003e\n\n\u003ch2 id=\"continuous-coverage-and-the-99-gap\"\u003eContinuous Coverage and the “99% Gap”\u003c/h2\u003e\n\n\u003cp\u003eCyCognito argues that manual pentesting is point-in-time by design. It also says AI testing is often delivered the same way as an on-demand service, which increases speed but does not address scale.\u003c/p\u003e\n\n\u003cp\u003eThe article states that high token cost forces vendors and customers to apply AI testers selectively, typically only to the top 1% of priority assets. CyCognito argues that critical risks can live outside those main applications, in the 99% that gets ignored.\u003c/p\u003e\n\n\u003cp\u003eThe company says the Target Graph is intended to change this by using contextual exposure data and deterministic validation results to make AI pentesting more efficient and continuous. It says this allows test depth and techniques to shift flexibly while increasing cadence and coverage.\u003c/p\u003e\n\n\u003ch2 id=\"self-improving-model\"\u003eSelf-Improving Model\u003c/h2\u003e\n\n\u003cp\u003eCyCognito says the model is designed to improve over time. Every new validated attack chain surfaced by AI is codified into new deterministic tests.\u003c/p\u003e\n\n\u003cp\u003eThe article says each new deterministic test frees AI capacity in future runs. This creates a pipeline where AI-discovered findings can become automated validation logic, allowing AI agents to focus on additional high-judgment testing.\u003c/p\u003e\n\n\u003ch2 id=\"asset-types-covered-by-specialized-agents\"\u003eAsset Types Covered by Specialized Agents\u003c/h2\u003e\n\n\u003cp\u003eThe article says the pipeline already runs specialized agents for every type of exposed asset CyCognito covers. The listed examples include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWeb applications and APIs\u003c/li\u003e\n\u003cli\u003eAI and LLM endpoints\u003c/li\u003e\n\u003cli\u003eCloud\u003c/li\u003e\n\u003cli\u003eVPNs\u003c/li\u003e\n\u003cli\u003eOT/IT systems\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eCyCognito says these agents produce findings with full evidence while working always-on across the full external surface.\u003c/p\u003e\n\n\u003ch2 id=\"project-kineto-and-next-steps\"\u003eProject Kineto and Next Steps\u003c/h2\u003e\n\n\u003cp\u003eCyCognito says the work is moving out of the lab and into real environments. The article states that customer interest was immediate and that some organizations are raising their hands to join as design partners.\u003c/p\u003e\n\n\u003cp\u003eInternally, the effort is codenamed Project Kineto, after the Kinetograph. CyCognito says the name reflects its vision of moving AI pentesting from a still snapshot to a dynamic picture that runs continuously across the attack surface.\u003c/p\u003e\n\n\u003cp\u003eThe article closes by inviting readers to join a waitlist for periodic progress notes from the research team, a chance to apply for the design partner program, and early access before general availability.\u003c/p\u003e\n","keyPoints":["CyCognito says its platform now detects more than 60 AI stack components, including MCP servers, n8n, Ollama, MLflow, PyTorch, and Triton.","CyCognito is building a continuous AI pentesting capability that simulates an AI-powered attacker across external attack surfaces.","The article describes an exposed MCP server that allowed unauthenticated natural-language access to CRM data, including account, opportunity, and financial records.","The article describes a public CrewAI agent stack where authentication protected the agent API but not the knowledge base containing source documents for the RAG index.","CyCognito says its Target Graph orchestration layer uses exposure context, validation results, and threat intelligence to decide where AI pentesting should run, at what depth, and with which techniques."],"insights":["The article highlights that some AI-related exposures are not tied to CVEs, because the most severe examples involved missing authentication, exposed data paths, and poor segmentation rather than known software flaws.","An exposed MCP server can become a privileged bridge into backend business systems when it is connected to internal tools without sufficient authentication.","Protecting only the agent API is insufficient for RAG-based systems if the underlying knowledge base or document store remains anonymously accessible.","CyCognito’s approach attempts to reduce AI pentesting cost by converting validated AI-discovered attack chains into deterministic tests, freeing future AI capacity for higher-judgment testing.","The article argues that critical risks may reside outside the highest-priority 1% of assets, including AI deployments and adjacent systems that traditional review processes can miss."],"referencedReports":[],"body":"\u003cp\u003eCyCognito describes two related efforts around AI security: expanded coverage for AI assets and a new continuous AI pentesting capability. The platform now detects more of the AI stack, including MCP servers, n8n, Ollama, MLflow, PyTorch, Triton, and other technologies. The company says it has more than 60 detection models in production and growing.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that AI-related risks often do not appear as CVEs and can involve exposed services, missing authentication, and poor segmentation. CyCognito cites examples including an exposed MCP server that allowed unauthenticated access to CRM data, a public CrewAI stack with an anonymously readable RAG knowledge base, and a physical security system exposed alongside AI deployments.\u003c/p\u003e\n\n\u003cp\u003eCyCognito says its continuous AI pentesting capability simulates an AI-powered attacker across external environments. It uses exposure assessment, exposure validation, threat intelligence, and a contextual orchestration layer called Target Graph to decide where testing should run, how deep it should go, and which techniques to use.\u003c/p\u003e\n"},{"n":7,"title":"NIS2's 24-Hour Early Warning Requirement: How to Actually Meet It","source":"silentpush.com","sourceColorIdx":6,"link":"https://www.silentpush.com/blog/nis2/?utm_source=rss\u0026utm_medium=rss\u0026utm_campaign=nis2","time":"10:00","priority":"MAY READ","score":45,"tldr":"NIS2 requires in-scope organizations to file an early warning within 24 hours of becoming aware of a significant incident, but many teams lack the pre-correlated infrastructure context needed to do this accurately. The article argues that continuous, preemptive mapping of attacker infrastructure is essential to meet the 24-hour, 72-hour, and 30-day reporting deadlines.","briefOverview":"\u003cp\u003eNIS2 requires in-scope organizations to file an early warning within 24 hours of becoming aware of a significant incident, followed by a full notification within 72 hours and a final report within one month. The article argues that the first 24-hour window is the area where many security teams are least prepared, because credible reporting requires infrastructure context that traditional threat intelligence often does not provide. It says the “becoming aware” threshold may effectively begin when an alert fires in a SIEM, even though attacker activity may already have been underway.\u003c/p\u003e\n\n\u003cp\u003eThe article says NIS2 applies across many sectors, including energy, transport, banking, financial market infrastructure, health, water, digital infrastructure, public administration, and space. It also notes that management bodies can face personal liability for infringements and that executives must approve cybersecurity risk management measures. The central technical argument is that organizations need pre-correlated infrastructure data, including DNS, WHOIS, certificate, host scan, traffic sensor, and behavioral fingerprint data, before an incident begins.\u003c/p\u003e\n\n\u003cp\u003eSilent Push presents its Context Graph as a way to map related attacker infrastructure continuously so analysts can quickly identify clusters, timelines, and dormant assets. The article contrasts this approach with IOC-based detection, which it says often provides stale, point-in-time indicators without showing how infrastructure is connected. It also argues that AI-assisted incident response requires high-quality, verifiable data with provenance, especially for teams building automated detection and response workflows.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article focuses on the 24-hour early warning requirement under Article 23 of EU Directive \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2555\u003c/sub\u003e, known as NIS2. It states that organizations in scope must file an early warning within 24 hours of becoming aware of a significant incident, submit a full incident notification within 72 hours, and provide a final report within one month. The article argues that the early warning deadline is where many organizations will struggle because it requires meaningful initial information before a full investigation can be completed.\u003c/p\u003e\n\n\u003cp\u003eNIS2 is described as applying to a wide range of sectors, including energy, transport, banking, financial market infrastructure, health, drinking water, wastewater, digital infrastructure, public administration, and space. The article says the threshold for a significant incident is broad and includes incidents capable of causing severe operational disruption, financial loss, or material or immaterial damage to other entities. It also highlights that management bodies can be personally liable for infringements, and that senior executives must approve cybersecurity risk management measures.\u003c/p\u003e\n\n\u003cp\u003eThe article criticizes traditional IOC-based detection as reactive and fragmented. It says indicators such as old domain hashes, rotated IP addresses, and file signatures from past campaigns often show what happened but not who built the infrastructure, when it was built, or what related assets may still be dormant. For NIS2 reporting, the article argues that this creates a problem because regulators expect early information about the nature of the incident, affected systems, and preliminary scope.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, meeting the 24-hour requirement requires teams to answer three questions quickly: what infrastructure is involved, how long it has been active, and what else is connected. It describes attacker staging environments as clusters of related domains, IPs, certificates, and hosting patterns, rather than isolated indicators. The article says missing connected infrastructure can force later revisions or resubmissions, which may create additional regulatory exposure.\u003c/p\u003e\n\n\u003cp\u003eSilent Push presents its Context Graph as a preemptive detection capability that continuously aggregates DNS, WHOIS, certificate data, host scans, traffic sensor data, and behavioral fingerprints across IPv4 and IPv6. The article says this allows related infrastructure clusters, DNS history, WHOIS records, and dormant assets to be visible when an incident indicator appears. It also states that Silent Push customers have an average detection lead time of 104 days.\u003c/p\u003e\n\n\u003cp\u003eThe article also discusses AI-assisted and agentic incident response workflows. It says automation for NIS2 reporting is only reliable if the underlying data is current, correlated, machine-consumable, and backed by provenance. Silent Push says its Context Graph supports such workflows through API endpoints, deterministic attribution, confidence signals, and full provenance, and the article connects this to EU AI Act requirements for high-quality, verifiable inference data.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article examines the 24-hour early warning requirement in NIS2 and argues that many security teams are not prepared to meet it in practice. Under Article 23 of EU Directive \u003csup\u003e2022\u003c/sup\u003e\u0026frasl;\u003csub\u003e2555\u003c/sub\u003e, organizations in scope have 24 hours from the moment they become “aware” of a significant incident to file an early warning with their national competent authority. They then have 72 hours to submit a full incident notification and one month to provide a final report.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central argument is that the first 24-hour window is difficult because a credible early warning requires infrastructure context that many traditional detection programs do not have ready. It says traditional threat intelligence and IOC-based detection were not designed to provide the complete, correlated infrastructure picture needed for rapid regulatory reporting.\u003c/p\u003e\n\n\u003ch2 id=\"scope-and-significance-of-nis2\"\u003eScope and significance of NIS2\u003c/h2\u003e\n\n\u003cp\u003eThe article states that NIS2 applies to a broader set of sectors than its predecessor. Sectors named in the article include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEnergy\u003c/li\u003e\n\u003cli\u003eTransport\u003c/li\u003e\n\u003cli\u003eBanking\u003c/li\u003e\n\u003cli\u003eFinancial market infrastructure\u003c/li\u003e\n\u003cli\u003eHealth\u003c/li\u003e\n\u003cli\u003eDrinking water\u003c/li\u003e\n\u003cli\u003eWastewater\u003c/li\u003e\n\u003cli\u003eDigital infrastructure\u003c/li\u003e\n\u003cli\u003ePublic administration\u003c/li\u003e\n\u003cli\u003eSpace\u003c/li\u003e\n\u003cli\u003eICT service management\u003c/li\u003e\n\u003cli\u003eManaged service providers\u003c/li\u003e\n\u003cli\u003eCloud platforms\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the significant incident threshold is broad. An incident qualifies if it has caused or is capable of causing severe operational disruption, financial loss, or material or immaterial damage to other entities. The article characterizes this as a low bar and argues that many organizations may cross it before they realize they have.\u003c/p\u003e\n\n\u003cp\u003eIt also highlights management liability under NIS2. According to the article, management bodies can be held personally liable for infringements, and senior executives are required to approve cybersecurity risk management measures. The article says this changes the board-level conversation for many security leaders.\u003c/p\u003e\n\n\u003ch2 id=\"the-24-hour-reporting-challenge\"\u003eThe 24-hour reporting challenge\u003c/h2\u003e\n\n\u003cp\u003eThe article emphasizes that the phrase “becoming aware” is critical to the 24-hour obligation. It says that, in practice, security teams may become aware of an incident when an alert fires in their SIEM. By that point, the attacker may already have been operational for some time.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that early warning filings require meaningful initial information, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe nature of the incident\u003c/li\u003e\n\u003cli\u003eThe systems affected\u003c/li\u003e\n\u003cli\u003eA preliminary assessment of scope\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says this information depends on understanding the full infrastructure picture, rather than only the single indicator that triggered an alert.\u003c/p\u003e\n\n\u003ch2 id=\"limitations-of-ioc-based-detection\"\u003eLimitations of IOC-based detection\u003c/h2\u003e\n\n\u003cp\u003eThe article criticizes reliance on traditional indicators of compromise. It describes IOCs as fragmented, point-in-time indicators that document what an attacker used and are often pulled from third-party feeds. Examples given include a domain hash from a breach last month, an IP address that has since rotated, or a file signature from a campaign that has already moved on.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, IOCs can show what happened but often do not show:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWho built the infrastructure\u003c/li\u003e\n\u003cli\u003eWhen the infrastructure was built\u003c/li\u003e\n\u003cli\u003eWhat else was registered at the same time\u003c/li\u003e\n\u003cli\u003eWhat infrastructure is dormant and waiting to be activated\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that this gap may be manageable for day-to-day detection but becomes a real problem for NIS2 incident reporting.\u003c/p\u003e\n\n\u003ch2 id=\"required-detection-capabilities-for-the-24-hour-window\"\u003eRequired detection capabilities for the 24-hour window\u003c/h2\u003e\n\n\u003cp\u003eThe article says that filing a complete early warning within 24 hours requires teams to already have infrastructure context assembled before an investigation begins. It argues that most investigations begin with a single indicator and then expand outward, but that approach takes time the regulation does not provide.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies three questions teams need to answer quickly:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eWhat infrastructure is involved?\u003c/strong\u003e The article describes attacker staging environments as clusters of domains, IPs, certificates, hosting patterns, and related assets. It says a single IOC shows only one node, while NIS2 requires accounting for the broader cluster.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eHow long has this been active?\u003c/strong\u003e The article says regulators will want to know when the incident began, not only when it was detected. It argues that organizations need their own data to reconstruct the timeline.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWhat else is connected?\u003c/strong\u003e The article says campaign infrastructure is built with redundancy and that failing to identify the full footprint can require later revisions or resubmissions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"silent-push-context-graph\"\u003eSilent Push Context Graph\u003c/h2\u003e\n\n\u003cp\u003eThe article presents the Silent Push Context Graph as a solution for preemptive detection and infrastructure correlation. It says the Context Graph aggregates several types of data across the full IPv4 and IPv6 range every day, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDNS data\u003c/li\u003e\n\u003cli\u003eWHOIS data\u003c/li\u003e\n\u003cli\u003eCertificate data\u003c/li\u003e\n\u003cli\u003eHost scans\u003c/li\u003e\n\u003cli\u003eTraffic sensor data\u003c/li\u003e\n\u003cli\u003eBehavioral fingerprints\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the Context Graph continuously maps relationships between internet assets. As a result, when an incident indicator surfaces, related infrastructure is already correlated rather than requiring analysts to manually pivot across fragmented tools.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, the Context Graph can show:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRelated infrastructure clusters\u003c/li\u003e\n\u003cli\u003eDNS history\u003c/li\u003e\n\u003cli\u003eWHOIS records\u003c/li\u003e\n\u003cli\u003eWhen infrastructure was first stood up\u003c/li\u003e\n\u003cli\u003eDormant assets connected to the same campaign\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the average detection lead time across Silent Push customers is 104 days. It says that, for NIS2 purposes, this means infrastructure behind a significant incident may be visible and correlated long before an alert fires.\u003c/p\u003e\n\n\u003ch2 id=\"reporting-timeline-described-in-the-article\"\u003eReporting timeline described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article describes how pre-correlated infrastructure data supports the three NIS2 reporting windows:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eAt T+24:\u003c/strong\u003e The early warning can include an infrastructure map and preliminary timeline.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAt T+72:\u003c/strong\u003e The full footprint can be documented with an accurate start date confirmed.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eAt 30 days:\u003c/strong\u003e The final report can reflect what happened, with tactics, techniques, and procedures logged and management sign-off recorded.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says that organizations should avoid starting from scratch after an incident is confirmed. Instead, it argues that the investigation should begin from a picture that has been continuously building in the background.\u003c/p\u003e\n\n\u003ch2 id=\"ai-assisted-workflows-and-data-quality\"\u003eAI-assisted workflows and data quality\u003c/h2\u003e\n\n\u003cp\u003eThe article also discusses automation and agentic workflows for incident response. It says many teams are looking at automating parts of incident response, and that the 24-hour NIS2 window is an obvious candidate for automation. However, it argues that automation is only as reliable as the data it uses.\u003c/p\u003e\n\n\u003cp\u003eThe article says an AI agent that triages incidents or drafts early warnings needs infrastructure context it can act on with confidence. It warns that fragmented or stale IOC data can produce unreliable outputs at the moment when reliability matters most.\u003c/p\u003e\n\n\u003cp\u003eSilent Push says the Context Graph was built to be machine-consumable and includes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMore than 250 API endpoints\u003c/li\u003e\n\u003cli\u003eDeterministic attribution\u003c/li\u003e\n\u003cli\u003eClear confidence signals\u003c/li\u003e\n\u003cli\u003eFull provenance\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article connects this to the EU AI Act, stating that organizations deploying AI-assisted security systems face a separate obligation for high-quality, verifiable inference data. It says Silent Push infrastructure data carries full provenance, which supports teams building automated detection and response into their stack.\u003c/p\u003e\n\n\u003ch2 id=\"supply-chain-and-third-party-ict-risk-monitoring\"\u003eSupply chain and third-party ICT risk monitoring\u003c/h2\u003e\n\n\u003cp\u003eIn its FAQ, the article states that Silent Push supports third-party ICT risk monitoring for NIS2. It says the Discover Shadow IT query surfaces unmanaged third-party services connected to an organization’s domain. It also says active tracking monitors providers such as Mailchimp and SendGrid for signs of weaponization.\u003c/p\u003e\n\n\u003cp\u003eThe article further states that brand impersonation detection can identify lookalike domains and fake login pages at registration. It says these capabilities support NIS2 supply chain risk monitoring obligations.\u003c/p\u003e\n\n\u003ch2 id=\"what-the-article-says-good-readiness-looks-like\"\u003eWhat the article says “good” readiness looks like\u003c/h2\u003e\n\n\u003cp\u003eThe article defines a prepared state as one in which, after an incident is confirmed, the security team can quickly pull up a correlated infrastructure map. The team should also be able to establish when the staging environment was first built, identify connected assets including dormant ones, and prepare a credible draft early warning within the 24-hour window.\u003c/p\u003e\n\n\u003cp\u003eAt the 72-hour mark, the article says the full cluster should be documented, the timeline should be accurate, and containment should cover all attacker-built infrastructure rather than only the assets that appeared during the active incident. At 30 days, it says the final report should not have gaps requiring explanation.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that teams that consistently meet this standard have infrastructure data that is correlated, current, and complete before an incident surfaces.\u003c/p\u003e\n","keyPoints":["Under Article 23 of EU Directive 2022/2555, organizations in scope have 24 hours from becoming aware of a significant incident to file an early warning, 72 hours to submit a full incident notification, and one month to provide a final report.","The article says the 24-hour early warning window is difficult because credible reporting requires infrastructure context, including the nature of the incident, affected systems, and a preliminary assessment of scope.","The article argues that traditional IOC-based detection is often fragmented and stale, and usually does not show who built infrastructure, when it was built, or what related assets may be dormant.","Silent Push says its Context Graph aggregates DNS, WHOIS, certificate data, host scans, traffic sensor data, and behavioral fingerprints to continuously map relationships between internet assets.","The article states that AI-assisted incident response workflows need high-quality, verifiable infrastructure data, and says the Silent Push Context Graph provides machine-consumable data with API endpoints, deterministic attribution, confidence signals, and provenance."],"insights":["The article highlights that the 24-hour NIS2 reporting clock starts when an organization becomes “aware” of a significant incident, which in practice may be when a SIEM alert fires, even though attacker activity may have begun much earlier.","The article frames NIS2 readiness as a detection and data-correlation problem, not just a legal reporting process, because teams need infrastructure maps and timelines before an investigation starts to meet the early warning deadline.","The article notes that missing connected or dormant attacker infrastructure in the early report can create regulatory exposure if the organization later has to revise or resubmit its notification.","The article connects NIS2 incident reporting with the EU AI Act by arguing that AI-assisted security workflows need high-quality, verifiable inference data with provenance to produce reliable automated outputs."],"referencedReports":[],"body":"\u003cp\u003eNIS2 requires in-scope organizations to file an early warning within 24 hours of becoming aware of a significant incident, followed by a full notification within 72 hours and a final report within one month. The article argues that the first 24-hour window is the area where many security teams are least prepared, because credible reporting requires infrastructure context that traditional threat intelligence often does not provide. It says the “becoming aware” threshold may effectively begin when an alert fires in a SIEM, even though attacker activity may already have been underway.\u003c/p\u003e\n\n\u003cp\u003eThe article says NIS2 applies across many sectors, including energy, transport, banking, financial market infrastructure, health, water, digital infrastructure, public administration, and space. It also notes that management bodies can face personal liability for infringements and that executives must approve cybersecurity risk management measures. The central technical argument is that organizations need pre-correlated infrastructure data, including DNS, WHOIS, certificate, host scan, traffic sensor, and behavioral fingerprint data, before an incident begins.\u003c/p\u003e\n\n\u003cp\u003eSilent Push presents its Context Graph as a way to map related attacker infrastructure continuously so analysts can quickly identify clusters, timelines, and dormant assets. The article contrasts this approach with IOC-based detection, which it says often provides stale, point-in-time indicators without showing how infrastructure is connected. It also argues that AI-assisted incident response requires high-quality, verifiable data with provenance, especially for teams building automated detection and response workflows.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Comprehensive", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

    <nav className="swipe-nav" style={{

    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>

        }}>TRIAGE</span>

      <span className="swipe-clock" style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{

          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <select value={theme} onChange={(e) => applyTheme(e.target.value)} title="Select theme" aria-label="Select theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "4px 20px 4px 8px", borderRadius: 2,
          cursor: "pointer", textTransform: "uppercase", appearance: "none", WebkitAppearance: "none",
          backgroundImage: "linear-gradient(45deg, transparent 50%, var(--text3) 50%), linear-gradient(135deg, var(--text3) 50%, transparent 50%)",
          backgroundPosition: "calc(100% - 10px) 50%, calc(100% - 6px) 50%", backgroundSize: "4px 4px, 4px 4px", backgroundRepeat: "no-repeat"
        }}>
          <option value="dark">DARK</option>
          <option value="light">LIGHT</option>
          <option value="contrast">CONTRAST</option>
          <option value="mono">MONO</option>
          <option value="colorblind">COLORBLIND</option>
          <option value="pastel">PASTEL</option>
          
        </select>
      </div>
    </nav>
  );
}
