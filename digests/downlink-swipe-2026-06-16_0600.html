<script>
window.__DL_ARTICLES = [{"n":1,"title":"Critical Fortinet FortiSandbox flaws now exploited in attacks","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/critical-fortinet-fortisandbox-flaws-now-exploited-in-attacks/","time":"09:19","priority":"MUST READ","score":95,"tldr":"Attackers are actively exploiting multiple critical Fortinet FortiSandbox vulnerabilities that allow unauthenticated remote code execution or privilege escalation. Administrators should upgrade affected FortiSandbox deployments immediately to block incoming attacks.","briefOverview":"\u003cp\u003eAttackers are now exploiting several critical vulnerabilities in Fortinet\u0026rsquo;s FortiSandbox cyber threat detection platform, according to threat intelligence company Defused. The vulnerabilities are tracked as CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089. Fortinet released security updates for the three flaws on April 14.\u003c/p\u003e\n\n\u003cp\u003eThe flaws allow unauthenticated threat actors to escalate privileges and execute unauthorized code remotely. The article says the attacks involve low-complexity command injection issues that require no user interaction. Administrators are told to upgrade affected deployments to the latest released versions to address the flaws and block incoming attacks.\u003c/p\u003e\n\n\u003cp\u003eDefused said it observed exploitation of the three FortiSandbox vulnerabilities during the past 24 hours. It noted that CVE-2026-39813 had no previous recorded exploitation and that a working exploit for CVE-2026-25089 had not yet been publicly disclosed. The article also notes that CISA tracks 26 Fortinet vulnerabilities exploited in recent years, including 13 abused by ransomware gangs.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThreat intelligence company Defused reported active exploitation of multiple critical Fortinet FortiSandbox vulnerabilities. The flaws are CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089. Fortinet released security updates for all three on April 14.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities allow unauthenticated threat actors to escalate privileges and remotely execute unauthorized code. The article describes them as low-complexity command injection flaws that require no user interaction. Administrators must upgrade affected FortiSandbox deployments to the latest released versions to resolve the issues and block incoming attacks.\u003c/p\u003e\n\n\u003cp\u003eDefused said it observed exploitation of the FortiSandbox vulnerabilities during the past 24 hours. It specifically stated that CVE-2026-39813 had no previous recorded exploitation. Defused also said CVE-2026-25089 appeared to involve a “vibecoded, likely faulty exploit” and that a working exploit for that vulnerability had not yet been publicly disclosed.\u003c/p\u003e\n\n\u003cp\u003eThe article says Fortinet also flagged CVE-2025-61624, a medium-severity path traversal vulnerability, as exploited in the wild in April. That flaw can allow authenticated attackers to escalate privileges, but successful exploitation requires high privileges on targeted systems. The article says this implies the flaw was very likely chained with another security issue.\u003c/p\u003e\n\n\u003cp\u003eBleepingComputer contacted Fortinet to confirm reports of active exploitation, but a response was not immediately available. The article notes that Fortinet security flaws are often exploited in ransomware attacks and cyber espionage campaigns to breach target networks. It also states that CISA tracks 26 Fortinet vulnerabilities exploited in recent years, 13 of which were abused by ransomware gangs.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eAttackers are now exploiting several critical vulnerabilities in Fortinet\u0026rsquo;s FortiSandbox cyber threat detection platform, according to threat intelligence company Defused. The vulnerabilities are tracked as CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089. Fortinet released security updates for these three critical-severity flaws on April 14.\u003c/p\u003e\n\n\u003cp\u003eThe article says administrators must upgrade affected deployments to the latest released versions to resolve the issues and block incoming attacks. BleepingComputer reached out to Fortinet to confirm reports of active exploitation, but a response was not immediately available.\u003c/p\u003e\n\n\u003ch2 id=\"exploited-fortisandbox-vulnerabilities\"\u003eExploited FortiSandbox vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe three FortiSandbox flaws allow unauthenticated threat actors to escalate privileges and execute unauthorized code remotely. The article describes the issues as low-complexity command injection attacks that require no user interaction.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerabilities discussed are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCVE-2026-39813\u003c/li\u003e\n\u003cli\u003eCVE-2026-39808\u003c/li\u003e\n\u003cli\u003eCVE-2026-25089\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDefused warned on Monday that it was observing exploitation of multiple Fortinet FortiSandbox vulnerabilities during the previous 24 hours. Its warning listed CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089.\u003c/p\u003e\n\n\u003ch2 id=\"notable-exploitation-details-from-defused\"\u003eNotable exploitation details from Defused\u003c/h2\u003e\n\n\u003cp\u003eDefused said CVE-2026-39813 had no previous recorded exploitation. It also described the activity involving CVE-2026-25089 as “vibecoded” and likely faulty. According to the article, Defused said a working exploit for CVE-2026-25089 had not yet been publicly disclosed.\u003c/p\u003e\n\n\u003cp\u003eThese details distinguish the observed activity from simple reuse of a widely available public exploit, at least for CVE-2026-25089 based on Defused\u0026rsquo;s statement. The article does not identify the attackers behind the exploitation activity.\u003c/p\u003e\n\n\u003ch2 id=\"additional-fortinet-vulnerability-mentioned\"\u003eAdditional Fortinet vulnerability mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article also discusses CVE-2025-61624, a medium-severity path traversal vulnerability Fortinet flagged in April as exploited in the wild. This flaw can let authenticated attackers escalate privileges. However, successful exploitation requires high privileges on the targeted systems.\u003c/p\u003e\n\n\u003cp\u003eBecause CVE-2025-61624 requires high privileges, the article says it was very likely chained with another security issue. No specific chained vulnerability or actor is identified in the article.\u003c/p\u003e\n\n\u003ch2 id=\"fortinet-context-and-related-issues\"\u003eFortinet context and related issues\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Fortinet security flaws are often exploited in ransomware attacks and cyber espionage campaigns to breach target networks. It cites prior coverage of Fortinet VPN devices being hit by ransomware and Chinese hackers infecting a Dutch military network with malware.\u003c/p\u003e\n\n\u003cp\u003eIt also notes that Fortinet recently released security updates for another critical FortiSandbox vulnerability, CVE-2026-26083. That flaw could let attackers achieve remote code execution on unpatched systems.\u003c/p\u003e\n\n\u003cp\u003eIn February, Fortinet patched a critical SQL injection vulnerability in FortiClient Enterprise Management Server, tracked as CVE-2026-21643. Defused later flagged that vulnerability as actively exploited. The article says CISA ordered U.S. federal agencies on April 13 to secure FortiClient EMS instances against attacks targeting CVE-2026-21643 within three days.\u003c/p\u003e\n\n\u003ch2 id=\"cisa-tracking-and-broader-exposure\"\u003eCISA tracking and broader exposure\u003c/h2\u003e\n\n\u003cp\u003eThe article states that CISA tracks 26 Fortinet vulnerabilities that have been exploited in attacks in recent years. It says 13 of those vulnerabilities were abused by ransomware gangs.\u003c/p\u003e\n\n\u003cp\u003eThis CISA tracking is presented as broader context for the current FortiSandbox exploitation. The article does not state that CISA has added the three current FortiSandbox vulnerabilities to its Known Exploited Vulnerabilities catalog.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and mitigation\u003c/h2\u003e\n\n\u003cp\u003eThe explicit mitigation in the article is to upgrade affected FortiSandbox deployments to the latest released versions. Fortinet released security updates for CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089 on April 14. The article says upgrading is required to resolve the issues and block incoming attacks.\u003c/p\u003e\n","keyPoints":["Defused reported that attackers have been exploiting multiple Fortinet FortiSandbox vulnerabilities in the past 24 hours, including CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089.","Fortinet released security updates for CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089 on April 14.","The three critical-severity FortiSandbox flaws allow unauthenticated threat actors to escalate privileges and remotely execute unauthorized code through low-complexity command injection attacks that require no user interaction.","Fortinet also flagged CVE-2025-61624, a medium-severity path traversal vulnerability, as exploited in the wild in April.","CISA tracks 26 Fortinet vulnerabilities exploited in attacks in recent years, including 13 abused by ransomware gangs."],"insights":["Defused said CVE-2026-39813 had no previous recorded exploitation, making its observed use in the past 24 hours a newly reported exploitation development.","Defused noted that a working exploit for CVE-2026-25089 has not yet been publicly disclosed and described the observed exploit attempt as likely faulty.","The medium-severity CVE-2025-61624 requires high privileges for successful exploitation, which the article says implies it was very likely chained with another security issue.","The article highlights a recurring pattern for Fortinet products, noting that CISA tracks 26 Fortinet vulnerabilities exploited in recent years and that 13 were abused by ransomware gangs."],"referencedReports":[{"title":"CVE-2026-39813 FortiGuard PSIRT advisory","url":"https://fortiguard.fortinet.com/psirt/FG-IR-26-112","publisher":"Fortinet","context":"The article links Fortinet's PSIRT advisory for CVE-2026-39813 when describing the critical FortiSandbox flaws patched on April 14.","category":"","primary":false},{"title":"CVE-2026-39808 FortiGuard PSIRT advisory","url":"https://fortiguard.fortinet.com/psirt/FG-IR-26-100","publisher":"Fortinet","context":"The article links Fortinet's PSIRT advisory for CVE-2026-39808 when describing the critical FortiSandbox flaws patched on April 14.","category":"","primary":false},{"title":"CVE-2026-25089 FortiGuard PSIRT advisory","url":"https://fortiguard.fortinet.com/psirt/FG-IR-26-141","publisher":"Fortinet","context":"The article links Fortinet's PSIRT advisory for CVE-2026-25089 when describing the critical FortiSandbox flaws patched on April 14.","category":"","primary":false},{"title":"CVE-2025-61624 FortiGuard PSIRT advisory","url":"https://fortiguard.fortinet.com/psirt/FG-IR-26-122","publisher":"Fortinet","context":"The article links Fortinet's PSIRT advisory for CVE-2025-61624, which Fortinet flagged as exploited in the wild.","category":"","primary":false}],"body":"\u003cp\u003eAttackers are now exploiting several critical vulnerabilities in Fortinet\u0026rsquo;s FortiSandbox cyber threat detection platform, according to threat intelligence company Defused. The vulnerabilities are tracked as CVE-2026-39813, CVE-2026-39808, and CVE-2026-25089. Fortinet released security updates for the three flaws on April 14.\u003c/p\u003e\n\n\u003cp\u003eThe flaws allow unauthenticated threat actors to escalate privileges and execute unauthorized code remotely. The article says the attacks involve low-complexity command injection issues that require no user interaction. Administrators are told to upgrade affected deployments to the latest released versions to address the flaws and block incoming attacks.\u003c/p\u003e\n\n\u003cp\u003eDefused said it observed exploitation of the three FortiSandbox vulnerabilities during the past 24 hours. It noted that CVE-2026-39813 had no previous recorded exploitation and that a working exploit for CVE-2026-25089 had not yet been publicly disclosed. The article also notes that CISA tracks 26 Fortinet vulnerabilities exploited in recent years, including 13 abused by ransomware gangs.\u003c/p\u003e\n"},{"n":8,"title":"Ni8mare - Unauthenticated Remote Code Execution in n8n (CVE-2026-21858)","source":"cyera.com","sourceColorIdx":9,"link":"https://www.cyera.com/research/ni8mare-unauthenticated-remote-code-execution-in-n8n-cve-2026-21858","time":"09:00","priority":"MUST READ","score":95,"tldr":"Researchers found CVE-2026-21858, a critical unauthenticated n8n flaw caused by Content-Type confusion in Form webhooks that can let attackers read local files, forge admin sessions, and achieve remote code execution. Locally deployed n8n users should upgrade to version 1.121.0 or later immediately.","briefOverview":"\u003cp\u003eResearchers disclosed CVE-2026-21858, a critical unauthenticated remote code execution vulnerability in n8n with a CVSS score of 10.0. The article says the flaw can enable attackers to take over locally deployed n8n instances and estimates the impact at about 100,000 servers globally. n8n users are advised to upgrade to version 1.121.0 or later because the article states there are no official workarounds.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is described as a Content-Type confusion issue in n8n’s webhook request parsing. By changing a Form submission request from multipart/form-data to another content type such as application/json, an attacker can cause n8n’s regular body parser to populate req.body and override req.body.files. Because the Form webhook file-handling path calls prepareFormReturnItem without verifying multipart/form-data, the attacker can control file metadata, including filepath.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that this primitive can be used to copy local files into workflow data, enabling arbitrary file read. It then shows how reading the local n8n database and configuration file can provide the values needed to forge an n8n-auth session cookie and log in as an administrator. Once authenticated as admin, the attacker can create a workflow using the Execute Command node to achieve code execution.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article presents a technical analysis of CVE-2026-21858, called “Ni8mare,” an unauthenticated remote code execution vulnerability in n8n. It describes n8n as a widely used workflow automation platform with over 100 million Docker pulls and many users and enterprises. The authors state that locally deployed instances are affected and estimate that about 100,000 servers globally are impacted. They credit n8n’s security team for maintaining a strong security posture and responding quickly.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability centers on how n8n parses webhook request bodies. A middleware function, parseRequestBody(), chooses between a multipart/form-data parser and a regular body parser based on the Content-Type header. Multipart requests are handled through Formidable and populate req.body.files with file upload metadata, while other content types are decoded into req.body by the regular body parser. The article emphasizes that this difference creates a Content-Type confusion condition.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerable path is in the Form Webhook node. The article says the Form webhook calls prepareFormReturnItem without first verifying that the Content-Type is multipart/form-data. Because prepareFormReturnItem processes files from req.body.files and calls copyBinaryFile using the filepath value stored there, an attacker who sends a non-multipart body can control req.body.files and point filepath to local files on the n8n instance. This enables arbitrary file read by causing local files to be copied into workflow data.\u003c/p\u003e\n\n\u003cp\u003eThe article demonstrates the issue through an organizational knowledge-base workflow using Forms and a chat interface. In that scenario, an attacker changes the upload request’s Content-Type to application/json and crafts the body to override req.body.files, causing files such as /etc/passwd to be loaded into the knowledge base. The file contents can then be retrieved through the chat interface. The article also shows the same technique being used to load n8n’s local database and configuration file.\u003c/p\u003e\n\n\u003cp\u003eTo escalate from arbitrary file read, the article explains n8n’s session cookie generation process. It says the n8n-auth cookie is generated from a payload containing user information and part of a SHA256 hash derived from the user’s email and password, then signed with a secret key. In local deployments, the article states that the database may be stored at /home/node/.n8n/database.sqlite and the configuration file at /home/node/.n8n/config, providing the data needed to forge an admin session cookie. After logging in as administrator, an attacker can use the built-in Execute Command node to run commands on the instance.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed response is to upgrade n8n to version 1.121.0 or later. The article also recommends not exposing n8n to the internet unless necessary and requiring authentication for all Forms. The responsible disclosure timeline says the vulnerability was reported to n8n on November 9, 2025, acknowledged on November 10, patched on November 18, assigned a CVE on January 6, 2026, and published by Cyera on January 7, 2026.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article discloses and analyzes “Ni8mare,” identified as CVE-2026-21858, a critical unauthenticated remote code execution vulnerability in n8n. The vulnerability is assigned a CVSS score of 10.0 in the article and is described as affecting locally deployed n8n instances. The authors state that the issue could allow attackers to take over affected instances and estimate that about 100,000 servers globally are impacted.\u003c/p\u003e\n\n\u003cp\u003en8n is described as a widely used workflow automation platform for building automated workflows, including AI and AI agent workflows. The article says n8n has over 100 million Docker pulls, millions of users, and thousands of enterprises using it. It emphasizes that n8n often connects to important systems such as Google Drive, OpenAI API keys, Salesforce data, IAM systems, payment processors, customer databases, CI/CD pipelines, and cloud storage.\u003c/p\u003e\n\n\u003ch2 id=\"core-technical-cause\"\u003eCore Technical Cause\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability is presented as a Content-Type confusion issue in n8n’s webhook request handling. The shared webhook execution flow calls a middleware function named parseRequestBody(), which decides how to parse the request body based on the Content-Type header.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRequests with Content-Type multipart/form-data are handled by parseFormData(), described as the file upload parser.\u003c/li\u003e\n\u003cli\u003eOther content types are handled by parseBody(), described as the regular body parser.\u003c/li\u003e\n\u003cli\u003eThe regular body parser decodes the HTTP request body and stores the result in the global req.body variable.\u003c/li\u003e\n\u003cli\u003eThe file upload parser wraps Formidable’s parse() function and populates req.body.files with uploaded file metadata.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article explains that Formidable saves uploaded files to randomly generated paths in a temporary directory, which normally prevents users from controlling upload file paths. The security issue arises not from Formidable itself, but from n8n code that trusts req.body.files in a path where the request was not necessarily parsed as multipart/form-data.\u003c/p\u003e\n\n\u003ch2 id=\"normal-file-upload-handling\"\u003eNormal File Upload Handling\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the expected file-upload pattern in n8n as fetching uploaded files from req.body.files. It uses the ChatTrigger webhook as an example of a safer pattern because it first verifies that the Content-Type header is multipart/form-data before calling a file handler.\u003c/p\u003e\n\n\u003cp\u003eThis check matters because req.body.files is only populated by the file upload parser when multipart/form-data is used. If a request uses another content type, the regular body parser handles the body and places decoded input directly into req.body. That means an attacker can supply a body containing a files property and thereby control req.body.files.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerable-form-webhook-path\"\u003eVulnerable Form Webhook Path\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerable path identified in the article is the Form Webhook node. The Form node is described as a common external interface for workflows that need user input, including workflows where users upload CVs, screenshots, error logs, or other files.\u003c/p\u003e\n\n\u003cp\u003eThe article says the function that handles Form submissions is formWebhook. It calls prepareFormReturnItem without verifying that the Content-Type is multipart/form-data. prepareFormReturnItem is described as a file-handling function that calls copyBinaryFile for each file in req.body.files.\u003c/p\u003e\n\n\u003cp\u003eThe key problem is that copyBinaryFile copies a file from the filepath value stored in req.body.files[id].filepath to persistent storage, either on disk or S3 object storage depending on configuration. Because the Form webhook path does not first ensure that req.body.files came from a real multipart upload, an attacker can send a request with another content type, such as application/json, and define req.body.files directly. This gives the attacker control over filepath.\u003c/p\u003e\n\n\u003ch2 id=\"arbitrary-file-read-primitive\"\u003eArbitrary File Read Primitive\u003c/h2\u003e\n\n\u003cp\u003eThe article demonstrates that controlling req.body.files[number].filepath allows an attacker to make n8n copy local files instead of uploaded files. The example given is /etc/passwd, which is loaded into an organizational knowledge-base workflow.\u003c/p\u003e\n\n\u003cp\u003eThe exploit flow shown in the article is:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003eIntercept the HTTP request sent when uploading a file through a Form.\u003c/li\u003e\n\u003cli\u003eChange the Content-Type from multipart/form-data to something else, such as application/json.\u003c/li\u003e\n\u003cli\u003eCraft the request body so it overrides req.body.files.\u003c/li\u003e\n\u003cli\u003eSet req.body.files[number].filepath to a local file path on the n8n instance.\u003c/li\u003e\n\u003cli\u003eLet the Form workflow process that local file as if it were an uploaded file.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eIn the article’s example, the copied local file becomes available through a RAG-based organizational knowledge base. The attacker can then ask the chat interface about the loaded file and retrieve its contents. The article shows this with /etc/passwd.\u003c/p\u003e\n\n\u003ch2 id=\"escalation-to-authentication-bypass\"\u003eEscalation to Authentication Bypass\u003c/h2\u003e\n\n\u003cp\u003eThe article then explains how arbitrary file read can lead to an authentication bypass in local n8n deployments. It describes n8n authentication sessions as using a cookie named n8n-auth. After login, n8n creates a payload dictionary containing key user details, including the user ID and the first 10 characters of a SHA256 hash derived from a string combining the user’s email and password. This payload is then signed with a secret key and stored in the n8n-auth cookie.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the pieces needed to forge a valid session are available in local files on n8n instances:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUser records are stored in the n8n database.\u003c/li\u003e\n\u003cli\u003eIn Docker deployments, the local database is located at /home/node/.n8n/database.sqlite.\u003c/li\u003e\n\u003cli\u003eThe encryption secret key is stored in a configuration file.\u003c/li\u003e\n\u003cli\u003eThe configuration file location is /home/node/.n8n/config.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe demonstrated authentication bypass involves first using the vulnerability to load the n8n database into the knowledge base, then extracting the admin user ID, email, and hashed password through the chat interface. The attacker then loads the config file using the same technique and extracts the encryption key. With those values, the attacker creates a signed session cookie and sets it as the n8n-auth cookie, resulting in admin access.\u003c/p\u003e\n\n\u003ch2 id=\"remote-code-execution\"\u003eRemote Code Execution\u003c/h2\u003e\n\n\u003cp\u003eAfter administrator access is obtained, the article says code execution is achieved by creating a new workflow containing n8n’s built-in Execute Command node. The screenshot described in the article shows the command id being executed and returning output indicating the process runs as the node user.\u003c/p\u003e\n\n\u003cp\u003eThis final step does not require exploiting another bug according to the article; it uses n8n functionality available after gaining admin access. The article presents this as the final link in the chain from unauthenticated request handling to full instance takeover.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-significance\"\u003eImpact and Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article argues that compromise of an n8n instance has a large blast radius because n8n often centralizes integrations and credentials. It specifically mentions organizational Google Drive, OpenAI API keys, Salesforce data, IAM systems, payment processors, customer databases, CI/CD pipelines, API credentials, OAuth tokens, database connections, and cloud storage.\u003c/p\u003e\n\n\u003cp\u003eThe article frames n8n as a potential single point of failure in automation infrastructure. In its example of a large enterprise with over 10,000 employees and one n8n server used across the organization, a compromised n8n instance could expose many connected systems and secrets.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-actors-mentioned\"\u003eAffected Parties and Actors Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe affected product is n8n, particularly locally deployed instances. The article estimates approximately 100,000 servers globally are impacted.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify a threat actor or active exploitation campaign. It presents the work as research and coordinated disclosure. The authors credit the n8n security team for responding quickly to the report and maintaining a strong security posture.\u003c/p\u003e\n\n\u003ch2 id=\"mitigation-and-recommendations\"\u003eMitigation and Recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe article’s call to action includes three recommendations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUpdate n8n to version 1.121.0 or later.\u003c/li\u003e\n\u003cli\u003eDo not expose n8n to the internet unless absolutely necessary.\u003c/li\u003e\n\u003cli\u003eRequire authentication for all Forms that are created.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that no official workarounds are available for the vulnerability. It identifies upgrading to version 1.121.0 or later as the remediation path.\u003c/p\u003e\n\n\u003ch2 id=\"responsible-disclosure-timeline\"\u003eResponsible Disclosure Timeline\u003c/h2\u003e\n\n\u003cp\u003eThe article provides the following disclosure timeline:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNovember 9, 2025: The vulnerability was reported to n8n.\u003c/li\u003e\n\u003cli\u003eNovember 10, 2025: n8n acknowledged the report.\u003c/li\u003e\n\u003cli\u003eNovember 18, 2025: n8n published a patched version.\u003c/li\u003e\n\u003cli\u003eDecember 29, 2025: The researcher requested an update regarding publication status.\u003c/li\u003e\n\u003cli\u003eJanuary 6, 2026: n8n assigned CVE-2026-21858 to the vulnerability.\u003c/li\u003e\n\u003cli\u003eJanuary 7, 2026: Cyera published the blog post.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe article’s central finding is that a missing multipart/form-data verification in n8n’s Form webhook file-handling path allows an attacker to override req.body.files through Content-Type confusion. That control can be used to read local files, obtain session-signing material and user records from local deployment files, forge an administrator session, and then use the Execute Command node to achieve code execution. The stated remediation is to upgrade to n8n version 1.121.0 or later.\u003c/p\u003e\n","keyPoints":["Researchers discovered CVE-2026-21858, a critical unauthenticated remote code execution vulnerability in n8n with a CVSS score of 10.0 that affects locally deployed instances.","The vulnerability stems from Content-Type confusion in n8n Form webhooks, where a request parsed as application/json can override the req.body.files object that file-handling code later trusts.","By controlling req.body.files[number].filepath, an attacker can cause n8n to copy local files such as /etc/passwd, /home/node/.n8n/database.sqlite, or /home/node/.n8n/config into a workflow for later retrieval.","The article explains that reading the local database and configuration file can provide the data needed to forge an n8n-auth session cookie and log in as an administrator.","After gaining administrator access, an attacker can create a workflow using n8n’s Execute Command node to achieve code execution on the instance."],"insights":["The exploit chain depends on Form webhooks that allow file handling without first verifying multipart/form-data, while other n8n file-handling paths such as ChatTrigger explicitly perform that check.","The vulnerability becomes more severe in common local deployments because both the SQLite database and the encryption secret are stored on disk at predictable paths under /home/node/.n8n/.","A RAG or knowledge-base workflow can unintentionally act as an exfiltration channel, because local files copied through the flaw can be queried back through the chat interface.","n8n’s built-in Execute Command node turns administrative access into code execution without requiring an additional software vulnerability.","Requiring authentication for Forms is specifically recommended because unauthenticated public Forms are the entry point used in the exploit scenario."],"referencedReports":[{"title":"CVE-2026-21858 / GHSA-v4pr-fm98-w9pg","url":"https://github.com/n8n-io/n8n/security/advisories/GHSA-v4pr-fm98-w9pg","publisher":"n8n","context":"The article links to n8n’s GitHub security advisory when identifying the vulnerability as CVE-2026-21858 and noting the assigned CVSS 10.0 score.","category":"","primary":false}],"body":"\u003cp\u003eResearchers disclosed CVE-2026-21858, a critical unauthenticated remote code execution vulnerability in n8n with a CVSS score of 10.0. The article says the flaw can enable attackers to take over locally deployed n8n instances and estimates the impact at about 100,000 servers globally. n8n users are advised to upgrade to version 1.121.0 or later because the article states there are no official workarounds.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is described as a Content-Type confusion issue in n8n’s webhook request parsing. By changing a Form submission request from multipart/form-data to another content type such as application/json, an attacker can cause n8n’s regular body parser to populate req.body and override req.body.files. Because the Form webhook file-handling path calls prepareFormReturnItem without verifying multipart/form-data, the attacker can control file metadata, including filepath.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that this primitive can be used to copy local files into workflow data, enabling arbitrary file read. It then shows how reading the local n8n database and configuration file can provide the values needed to forge an n8n-auth session cookie and log in as an administrator. Once authenticated as admin, the attacker can create a workflow using the Execute Command node to achieve code execution.\u003c/p\u003e\n"},{"n":4,"title":"Cisco Releases Security Updates for Actively Exploited SD-WAN Manager Flaw","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/cisco-releases-security-updates-for.html","time":"06:05","priority":"MUST READ","score":94,"tldr":"Cisco released fixes for CVE-2026-20262, an actively exploited Catalyst SD-WAN Manager flaw that lets authenticated attackers with write access create or overwrite files and potentially gain root privileges. CISA added the vulnerability to its KEV catalog and urged affected organizations to patch and check logs for suspicious WAR file uploads.","briefOverview":"\u003cp\u003eCisco released security updates for CVE-2026-20262, a medium-severity flaw in Cisco Catalyst SD-WAN Manager that has been actively exploited in the wild. The vulnerability has a CVSS score of 6.5 and affects the web UI of the product formerly known as SD-WAN vManage. Cisco said it became aware of limited exploitation in June 2026 and that the issue was discovered during internal security testing.\u003c/p\u003e\n\n\u003cp\u003eThe flaw stems from inadequate validation of user-supplied input during a file upload process. An authenticated remote attacker with valid credentials and at least write access could send crafted HTTP requests to an affected API endpoint to create or overwrite files on the underlying operating system. Cisco said successful exploitation could be used to elevate privileges to root.\u003c/p\u003e\n\n\u003cp\u003eAffected offerings include Cisco Catalyst SD-WAN Manager On-Prem, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government. Cisco published fixed releases across multiple SD-WAN release branches and shared indicators of compromise involving suspicious WAR file uploads and related log entries. CISA added the vulnerability to its Known Exploited Vulnerabilities catalog and required Federal Civilian Executive Branch agencies to apply fixes by June 29, 2026.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco released security updates for CVE-2026-20262, an actively exploited vulnerability in Cisco Catalyst SD-WAN Manager. The issue is rated medium severity with a CVSS score of 6.5 out of 10.0. Cisco said the vulnerability affects the web UI of Catalyst SD-WAN Manager, formerly SD-WAN vManage, and could allow an authenticated remote attacker to create or overwrite files on an affected system.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is caused by inadequate validation of user-supplied input during a file upload process. Cisco said an attacker could exploit the issue by sending crafted HTTP requests to an affected API endpoint. Successful exploitation requires valid credentials with at least write access and could be weaponized to elevate privileges to root.\u003c/p\u003e\n\n\u003cp\u003eThe affected products include Cisco Catalyst SD-WAN Manager On-Prem, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government. Cisco released fixes for several branches, including 20.9.9.2, 20.12.7.2, 20.15.4.5, 20.15.5.3, 20.18.3.1, and 26.1.1.2. The article states that the vulnerability affects these products regardless of deployment type.\u003c/p\u003e\n\n\u003cp\u003eCisco said it became aware of limited exploitation of the vulnerability in June 2026 and that the flaw was discovered during internal security testing. The company shared indicators of compromise and urged customers to audit /var/log/nms/vmanage-server.log for suspicious WAR file uploads. Cisco also listed follow-on log indicators in vmanage-appserver.log and serviceproxy-access.log, while warning that these entries may not consistently appear in every incident log.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that CVE-2026-20262 is the eighth Cisco SD-WAN flaw to be flagged as actively exploited in 2026, following several other listed CVEs. It also states that exploitation of some of those earlier flaws has been attributed to an advanced persistent threat actor named UAT-8616. CISA added CVE-2026-20262 to its Known Exploited Vulnerabilities catalog and required Federal Civilian Executive Branch agencies to apply fixes by June 29, 2026.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCisco released security updates for CVE-2026-20262, a medium-severity vulnerability in Cisco Catalyst SD-WAN Manager that has been actively exploited in the wild. The vulnerability carries a CVSS score of 6.5 out of 10.0. Cisco said it affects the web UI of Cisco Catalyst SD-WAN Manager, formerly known as SD-WAN vManage.\u003c/p\u003e\n\n\u003cp\u003eAccording to Cisco, the flaw could allow an authenticated remote attacker to create a file or overwrite any file on the filesystem of an affected system. Cisco said it became aware of limited exploitation of the vulnerability in June 2026. The company also said the issue was discovered during internal security testing.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability stems from inadequate validation of user-supplied input during a file upload process. Cisco said an attacker could exploit the behavior by sending crafted HTTP requests to an affected API endpoint. Exploitation could allow the attacker to create or overwrite any file on the underlying operating system.\u003c/p\u003e\n\n\u003cp\u003eCisco said the flaw could be weaponized to elevate privileges to root. However, successful exploitation requires the attacker to already have valid credentials with at least write access. The article describes the issue as an arbitrary file creation or overwrite condition tied to file upload handling.\u003c/p\u003e\n\n\u003ch2 id=\"affected-products\"\u003eAffected Products\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability affects the following products regardless of deployment type:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco Catalyst SD-WAN Manager On-Prem\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud-Pro\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN Cloud, Cisco Managed\u003c/li\u003e\n\u003cli\u003eCisco SD-WAN for Government, FedRAMP\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"fixed-versions\"\u003eFixed Versions\u003c/h2\u003e\n\n\u003cp\u003eCisco released patches for multiple Cisco Catalyst SD-WAN release branches. The fixed versions listed in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCisco Catalyst SD-WAN Release 20.9.9.1 and earlier: fixed in 20.9.9.2\u003c/li\u003e\n\u003cli\u003eCisco Catalyst SD-WAN Release 20.12.7.1 and earlier: fixed in 20.12.7.2\u003c/li\u003e\n\u003cli\u003eCisco Catalyst SD-WAN Release 20.15.4.4 and earlier: fixed in 20.15.4.5\u003c/li\u003e\n\u003cli\u003eCisco Catalyst SD-WAN Release 20.15.5.2 and earlier: fixed in 20.15.5.3\u003c/li\u003e\n\u003cli\u003eCisco Catalyst SD-WAN Release 20.18.3: fixed in 20.18.3.1\u003c/li\u003e\n\u003cli\u003eCisco Catalyst SD-WAN Release 26.1.1.1 and earlier: fixed in 26.1.1.2\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eCisco shared indicators of compromise associated with the malicious activity. The company urged customers to audit \u003ccode\u003e/var/log/nms/vmanage-server.log\u003c/code\u003e for suspicious WAR file uploads. The article provides an example showing an uploaded Remote Access AnyConnect profile file using a path traversal sequence to place \u003ccode\u003esuspicious.war\u003c/code\u003e under \u003ccode\u003e/var/lib/wildfly/standalone/deployments/\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eCisco also identified follow-on activity related to attempts to deploy malicious code and interact with it. The article lists a deployment log entry in \u003ccode\u003e/var/log/nms/vmanage-appserver.log\u003c/code\u003e showing \u003ccode\u003esuspicious.war\u003c/code\u003e being deployed. It also lists a service proxy access log entry in \u003ccode\u003e/var/log/nms/containers/service-proxy/serviceproxy-access.log\u003c/code\u003e showing a POST request to \u003ccode\u003e/suspicious/index.jsp\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eCisco warned that these other indicators may not consistently appear in every incident log. The article therefore presents the logs as indicators linked to known malicious activity, not as entries guaranteed to be present in every case.\u003c/p\u003e\n\n\u003ch2 id=\"broader-context\"\u003eBroader Context\u003c/h2\u003e\n\n\u003cp\u003eThe article states that CVE-2026-20262 is the eighth Cisco SD-WAN flaw to be flagged as actively exploited in 2026. The earlier listed vulnerabilities are CVE-2026-20245, CVE-2026-20182, CVE-2026-20127, CVE-2026-20122, CVE-2026-20128, CVE-2026-20133, and CVE-2022-20775. It also says exploitation of some of these flaws has been attributed to an advanced persistent threat actor named UAT-8616.\u003c/p\u003e\n\n\u003ch2 id=\"government-response\"\u003eGovernment Response\u003c/h2\u003e\n\n\u003cp\u003eThe U.S. Cybersecurity and Infrastructure Security Agency added CVE-2026-20262 to its Known Exploited Vulnerabilities catalog. As a result, Federal Civilian Executive Branch agencies are required to apply the fixes by June 29, 2026. The article frames this addition as a response to the active exploitation of the flaw.\u003c/p\u003e\n","keyPoints":["Cisco released security updates for CVE-2026-20262, a medium-severity vulnerability in Cisco Catalyst SD-WAN Manager that has been actively exploited in the wild.","CVE-2026-20262 stems from inadequate validation of user-supplied input during a file upload process and could allow an authenticated remote attacker with at least write access to create or overwrite files on an affected system.","Cisco said successful exploitation of CVE-2026-20262 could be used to elevate privileges to root.","The affected products include Cisco Catalyst SD-WAN Manager On-Prem, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government.","CISA added CVE-2026-20262 to its Known Exploited Vulnerabilities catalog and required Federal Civilian Executive Branch agencies to apply fixes by June 29, 2026."],"insights":["Organizations should audit /var/log/nms/vmanage-server.log specifically for path traversal-style WAR uploads such as ../../../../var/lib/wildfly/standalone/deployments/suspicious.war, because Cisco provided this as an indicator of compromise for the observed exploitation.","Cisco warned that some follow-on indicators may not consistently appear in every incident log, so the absence of deployment or service-proxy access log entries does not rule out exploitation.","The vulnerability requires valid credentials with at least write access, making account auditing and credential review important alongside applying the fixed SD-WAN releases.","CVE-2026-20262 is the eighth Cisco SD-WAN flaw flagged as actively exploited in 2026, indicating repeated targeting of this product line during the year."],"referencedReports":[{"title":"Cisco Catalyst SD-WAN Manager Arbitrary File Write Vulnerability","url":"https://sec.cloudapps.cisco.com/security/center/content/CiscoSecurityAdvisory/cisco-sa-sdwan-arbfw-c2rZvQ","publisher":"Cisco","context":"The article cites Cisco's advisory describing CVE-2026-20262, its impact, exploitation requirements, affected products, fixes, and indicators of compromise.","category":"","primary":false},{"title":"CISA Adds Two Known Exploited Vulnerabilities to Catalog","url":"https://www.cisa.gov/news-events/alerts/2026/06/15/cisa-adds-two-known-exploited-vulnerabilities-catalog","publisher":"CISA","context":"The article references CISA's alert adding CVE-2026-20262 to the Known Exploited Vulnerabilities catalog and setting a June 29, 2026 remediation deadline for FCEB agencies.","category":"","primary":false}],"body":"\u003cp\u003eCisco released security updates for CVE-2026-20262, a medium-severity flaw in Cisco Catalyst SD-WAN Manager that has been actively exploited in the wild. The vulnerability has a CVSS score of 6.5 and affects the web UI of the product formerly known as SD-WAN vManage. Cisco said it became aware of limited exploitation in June 2026 and that the issue was discovered during internal security testing.\u003c/p\u003e\n\n\u003cp\u003eThe flaw stems from inadequate validation of user-supplied input during a file upload process. An authenticated remote attacker with valid credentials and at least write access could send crafted HTTP requests to an affected API endpoint to create or overwrite files on the underlying operating system. Cisco said successful exploitation could be used to elevate privileges to root.\u003c/p\u003e\n\n\u003cp\u003eAffected offerings include Cisco Catalyst SD-WAN Manager On-Prem, Cisco SD-WAN Cloud-Pro, Cisco SD-WAN Cloud, and Cisco SD-WAN for Government. Cisco published fixed releases across multiple SD-WAN release branches and shared indicators of compromise involving suspicious WAR file uploads and related log entries. CISA added the vulnerability to its Known Exploited Vulnerabilities catalog and required Federal Civilian Executive Branch agencies to apply fixes by June 29, 2026.\u003c/p\u003e\n"},{"n":2,"title":"Windows version of SprySOCKS Linux malware used to attack govt orgs","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/windows-version-of-sprysocks-linux-malware-used-to-attack-govt-orgs/","time":"09:00","priority":"SHOULD READ","score":86,"tldr":"ESET says Chinese-linked Earth Lusca has used Windows variants of the SprySOCKS backdoor against government organizations in Taiwan, Thailand, Pakistan, and Honduras. The newer WIN_DRV variant adds kernel-level stealth, persistence, traffic redirection, and possible signs of UEFI bootkit activity.","briefOverview":"\u003cp\u003eESET researchers discovered Windows variants of the SprySOCKS malware that were used between 2023 and 2024 in attacks on government organizations in Taiwan, Thailand, Pakistan, and Honduras. SprySOCKS was previously documented as Linux malware and has been linked to the Chinese threat group Earth Lusca. ESET attributes the Windows activity with high confidence to Earth Lusca, which it tracks as FishMonger and is also known as Aquatic Panda, Red Dev 10, and TAG-22.\u003c/p\u003e\n\n\u003cp\u003eThe Windows variants are named WIN_DRV and WIN_PLUS. Both variants can communicate over TCP, UDP, and WebSocket, support more than 30 command-and-control commands, collect system information, manage processes and files, provide SOCKS proxy functionality, and log keystrokes, clipboard content, and active window titles. WIN_DRV adds kernel-level stealth capabilities that can hide malware artifacts and redirect traffic from arbitrary TCP ports to the backdoor.\u003c/p\u003e\n\n\u003cp\u003eWIN_DRV loads a driver named RawWNPF into memory through another kernel driver named DriverLoader, which is signed using a leaked certificate from the GitHub PastDSE project. The driver can hide processes, network connections, files, and malicious Registry key entries used for persistence. ESET telemetry also showed indications of a possible UEFI bootkit component that might exploit CVE-2023-24932, but the article says no strong evidence was provided to link it to BlackLotus.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eWindows variants of the SprySOCKS malware have been used in attacks targeting government organizations in at least four countries. ESET researchers found the Windows variants in activity from 2023 to 2024 against government organizations in Taiwan, Thailand, Pakistan, and Honduras. SprySOCKS had previously been documented as Linux malware linked to Earth Lusca.\u003c/p\u003e\n\n\u003cp\u003eESET attributes the activity with high confidence to Earth Lusca, which it tracks as FishMonger. The article also lists Aquatic Panda, Red Dev 10, and TAG-22 as other names for the same threat actor. The earlier Linux activity targeted government entities focused on foreign affairs, technology, and telecommunications.\u003c/p\u003e\n\n\u003cp\u003eThe Windows malware has two variants, WIN_DRV and WIN_PLUS. WIN_DRV includes kernel drivers for rootkit-like capabilities, while WIN_PLUS is described as a more barebones backdoor. Both variants communicate over TCP, UDP, and WebSocket and support more than 30 command-and-control commands.\u003c/p\u003e\n\n\u003cp\u003eBoth variants can collect system information, enumerate and manage processes and services, and perform file operations such as listing, creating, deleting, uploading, downloading, copying, renaming, and executing files. They also support SOCKS proxy functionality and can operate as both a client and a server. The article says both variants can log keystrokes, clipboard content, and active window titles.\u003c/p\u003e\n\n\u003cp\u003eWIN_DRV adds the ability to load a driver named RawWNPF directly into memory through another kernel driver named DriverLoader, or fsdiskbit.sys. DriverLoader was signed using a leaked certificate from the GitHub PastDSE project. RawWNPF allows the malware to hide processes through Windows API manipulation, hide network connections, hide files from directory listings, and hide malicious Registry key entries used for persistence.\u003c/p\u003e\n\n\u003cp\u003ePersistence differs between the two variants. WIN_DRV uses scheduled tasks and Image File Execution Options via vds.exe, while WIN_PLUS registers the payload as a Windows Print Processor named VSPMsg. ESET also reported indications of a possible UEFI bootkit component that might exploit CVE-2023-24932, but the article notes that no further details or strong evidence were provided to support a link to BlackLotus.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eESET researchers discovered Windows variants of the SprySOCKS malware family that were used between 2023 and 2024 in attacks on government organizations in Taiwan, Thailand, Pakistan, and Honduras. SprySOCKS had previously been documented as Linux malware and linked to the Chinese threat group Earth Lusca. ESET attributes the Windows activity with high confidence to the same actor, which it tracks as FishMonger and also identifies as Aquatic Panda, Red Dev 10, and TAG-22.\u003c/p\u003e\n\n\u003cp\u003eThe article says the discovery shows Earth Lusca has expanded its arsenal to target a more diverse variety of systems. It contrasts the Windows variants with the previously documented Linux version, noting that the Windows version adds kernel-level stealth capabilities. These capabilities allow operators to hide malware artifacts and communicate with the backdoor through traffic redirected from arbitrary TCP ports.\u003c/p\u003e\n\n\u003ch2 id=\"affected-organizations-and-geography\"\u003eAffected organizations and geography\u003c/h2\u003e\n\n\u003cp\u003eThe Windows SprySOCKS variants were used against government organizations in at least four countries:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eTaiwan\u003c/li\u003e\n\u003cli\u003eThailand\u003c/li\u003e\n\u003cli\u003ePakistan\u003c/li\u003e\n\u003cli\u003eHonduras\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also notes that earlier SprySOCKS activity linked to Earth Lusca targeted government entities focused on foreign affairs, technology, and telecommunications.\u003c/p\u003e\n\n\u003ch2 id=\"attribution\"\u003eAttribution\u003c/h2\u003e\n\n\u003cp\u003eESET attributes the activity with high confidence to Earth Lusca. The article lists several names associated with the same threat actor:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eEarth Lusca\u003c/li\u003e\n\u003cli\u003eFishMonger\u003c/li\u003e\n\u003cli\u003eAquatic Panda\u003c/li\u003e\n\u003cli\u003eRed Dev 10\u003c/li\u003e\n\u003cli\u003eTAG-22\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article describes Earth Lusca as a Chinese threat group and says SprySOCKS has been linked to that group.\u003c/p\u003e\n\n\u003ch2 id=\"windows-sprysocks-variants\"\u003eWindows SprySOCKS variants\u003c/h2\u003e\n\n\u003cp\u003eESET identified two Windows variants of SprySOCKS:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eWIN_DRV\u003c/strong\u003e, which includes kernel drivers for rootkit-like capabilities.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eWIN_PLUS\u003c/strong\u003e, which is described as a more barebones backdoor.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eBoth variants provide a broad set of backdoor and proxy capabilities. According to the article, both can:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCommunicate over TCP, UDP, and WebSocket.\u003c/li\u003e\n\u003cli\u003eSupport more than 30 command-and-control commands.\u003c/li\u003e\n\u003cli\u003eCollect system information.\u003c/li\u003e\n\u003cli\u003eEnumerate and manage processes and services.\u003c/li\u003e\n\u003cli\u003eList, create, delete, upload, download, copy, rename, and execute files.\u003c/li\u003e\n\u003cli\u003eSupport SOCKS proxy functionality.\u003c/li\u003e\n\u003cli\u003eOperate as both a client and a server.\u003c/li\u003e\n\u003cli\u003eLog keystrokes, clipboard content, and active window titles.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"win-drv-technical-details\"\u003eWIN_DRV technical details\u003c/h2\u003e\n\n\u003cp\u003eThe WIN_DRV variant includes additional functionality beyond the more barebones WIN_PLUS variant. It can load a driver named RawWNPF directly into memory. RawWNPF is loaded from another kernel driver named DriverLoader, identified in the article as fsdiskbit.sys.\u003c/p\u003e\n\n\u003cp\u003eThe article says DriverLoader was signed using a leaked certificate from the GitHub PastDSE project. Once loaded, the driver gives the malware several stealth capabilities. These include hiding processes through Windows API manipulation, hiding network connections, hiding files from directory listings, and hiding malicious Registry key entries used for persistence.\u003c/p\u003e\n\n\u003cp\u003eWIN_DRV also includes a feature that inspects incoming TCP traffic and redirects specially crafted packets to the SprySOCKS backdoor. ESET explains that this TCP traffic diversion lets operators send commands through a random TCP port on the victim device without exposing the backdoor’s real listening port in network traffic.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-mechanisms\"\u003ePersistence mechanisms\u003c/h2\u003e\n\n\u003cp\u003eThe two Windows variants use different persistence mechanisms. For WIN_DRV, persistence is achieved through scheduled tasks and Image File Execution Options, or IFEO, via vds.exe. For WIN_PLUS, persistence is achieved by registering the payload as a Windows Print Processor named VSPMsg.\u003c/p\u003e\n\n\u003cp\u003eThe article specifically notes that WIN_DRV can also hide the malicious Registry key entries it uses for persistence. This hiding capability is provided by the RawWNPF driver loaded through DriverLoader.\u003c/p\u003e\n\n\u003ch2 id=\"possible-uefi-bootkit-indication\"\u003ePossible UEFI bootkit indication\u003c/h2\u003e\n\n\u003cp\u003eESET telemetry also showed indications of a UEFI bootkit component. The article says this component might exploit CVE-2023-24932, a Secure Boot flaw that was previously used as a zero-day by the BlackLotus UEFI malware.\u003c/p\u003e\n\n\u003cp\u003eHowever, the article emphasizes that no further details or strong evidence were provided to support a link to BlackLotus. It presents the UEFI bootkit observation as an indication from telemetry rather than a fully supported connection.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe main significance of the report is that SprySOCKS activity is no longer limited to the previously documented Linux malware. The Windows variants add capabilities that include broad command-and-control functions, SOCKS proxying, keylogging, file and process management, and in the WIN_DRV variant, kernel-level stealth.\u003c/p\u003e\n\n\u003cp\u003eThe WIN_DRV variant’s ability to hide artifacts and redirect command traffic through arbitrary TCP ports is a notable technical feature described in the article. ESET’s report also provides detailed technical analysis and indicators of compromise intended to help organizations identify and protect against attacks using the Windows versions of the SprySOCKS backdoor.\u003c/p\u003e\n","keyPoints":["ESET researchers found Windows variants of the SprySOCKS malware used between 2023 and 2024 against government organizations in Taiwan, Thailand, Pakistan, and Honduras.","ESET attributes the activity with high confidence to Earth Lusca, which it tracks as FishMonger and is also known as Aquatic Panda, Red Dev 10, and TAG-22.","The Windows SprySOCKS variants are WIN_DRV, which includes kernel drivers for rootkit-like capabilities, and WIN_PLUS, which is described as a more barebones backdoor.","Both Windows variants can communicate over TCP, UDP, and WebSocket, support more than 30 C2 commands, manage processes and files, provide SOCKS proxy functionality, and log keystrokes, clipboard content, and active window titles.","The WIN_DRV variant can load the RawWNPF driver through a signed DriverLoader driver and use it to hide processes, network connections, files, and Registry key entries used for persistence."],"insights":["The WIN_DRV variant’s TCP traffic diversion lets operators send commands through arbitrary TCP ports, so defenders may not see the backdoor’s real listening port in network traffic.","Earth Lusca used different persistence mechanisms for the two Windows variants: scheduled tasks and IFEO via vds.exe for WIN_DRV, and a Windows Print Processor named VSPMsg for WIN_PLUS.","The WIN_DRV variant loads RawWNPF through DriverLoader, a kernel driver signed with a leaked certificate from the GitHub PastDSE project, showing that certificate trust can be abused to enable rootkit-like behavior.","ESET telemetry showed indications of a possible UEFI bootkit component linked to CVE-2023-24932, but the article notes that ESET did not provide strong evidence connecting it to BlackLotus."],"referencedReports":[{"title":"FishMonger's arsenal upgraded with SprySOCKS for Windows","url":"https://www.welivesecurity.com/en/eset-research/fishmongers-arsenal-upgraded-sprysocks-windows/","publisher":"ESET","context":"The article cites ESET's report as providing detailed technical analysis and indicators of compromise for Windows variants of the SprySOCKS backdoor.","category":"","primary":false}],"body":"\u003cp\u003eESET researchers discovered Windows variants of the SprySOCKS malware that were used between 2023 and 2024 in attacks on government organizations in Taiwan, Thailand, Pakistan, and Honduras. SprySOCKS was previously documented as Linux malware and has been linked to the Chinese threat group Earth Lusca. ESET attributes the Windows activity with high confidence to Earth Lusca, which it tracks as FishMonger and is also known as Aquatic Panda, Red Dev 10, and TAG-22.\u003c/p\u003e\n\n\u003cp\u003eThe Windows variants are named WIN_DRV and WIN_PLUS. Both variants can communicate over TCP, UDP, and WebSocket, support more than 30 command-and-control commands, collect system information, manage processes and files, provide SOCKS proxy functionality, and log keystrokes, clipboard content, and active window titles. WIN_DRV adds kernel-level stealth capabilities that can hide malware artifacts and redirect traffic from arbitrary TCP ports to the backdoor.\u003c/p\u003e\n\n\u003cp\u003eWIN_DRV loads a driver named RawWNPF into memory through another kernel driver named DriverLoader, which is signed using a leaked certificate from the GitHub PastDSE project. The driver can hide processes, network connections, files, and malicious Registry key entries used for persistence. ESET telemetry also showed indications of a possible UEFI bootkit component that might exploit CVE-2023-24932, but the article says no strong evidence was provided to link it to BlackLotus.\u003c/p\u003e\n"},{"n":5,"title":"Fake Microsoft Alerts Used to Deploy North Korean NarwhalRAT Malware","source":"thehackernews.com","sourceColorIdx":8,"link":"https://thehackernews.com/2026/06/fake-microsoft-alerts-used-to-deploy.html","time":"08:14","priority":"SHOULD READ","score":86,"tldr":"North Korea-linked ScarCruft is using fake Microsoft account security alerts to trick targets into opening ZIP/LNK attachments that install the Python-based NarwhalRAT. The malware enables spying through keystroke logging, screenshots, audio recording, data theft, and multi-channel command-and-control using compromised Korean sites and pCloud.","briefOverview":"\u003cp\u003eNorth Korean state-sponsored hacking group ScarCruft, also known as APT37, has been observed using spear-phishing emails that impersonate Microsoft Account security notifications. The messages warn of abnormal one-time password activity and urge recipients to open an attached advisory. Instead of an HWP document, the attachment is a ZIP archive containing a malicious LNK file.\u003c/p\u003e\n\n\u003cp\u003eLaunching the LNK file starts a multi-stage infection chain that uses batch scripts to download and install NarwhalRAT. The chain also retrieves the legitimate Python executable from the official website and a Windows security catalog file, then establishes persistence through a scheduled task. Genians said the CAT file is used to fetch and run the main payload in memory without leaving artifacts on disk.\u003c/p\u003e\n\n\u003cp\u003eNarwhalRAT can log keystrokes, capture screenshots, record ambient audio, collect active window details, gather data from USB media, upload directory contents, execute C2-issued instructions, and switch C2 servers. The malware stages harvested information under %APPDATA%\\naverwhale, a hidden directory name intended to resemble the Naver Whale browser. Genians assessed NarwhalRAT as an advanced RAT with a Python-based multi-stage loader, in-memory execution, multiple C2 channels, and selective information collection functions.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eScarCruft, the North Korean state-sponsored group also known as APT37, has been observed using fake Microsoft Account security alerts in a spear-phishing campaign. According to Genians Security Center, the emails are designed to create concern about possible account compromise and abuse of one-time passwords. The message instructs recipients to open an attached advisory, but the attachment is actually a ZIP archive containing a malicious LNK file rather than an HWP document.\u003c/p\u003e\n\n\u003cp\u003eThe phishing lure claims abnormal activity involving repeated generation of one-time passwords and presents the activity as a third-party phishing attempt targeting the recipient’s Microsoft Account. The email urges the recipient to change their password and is intended to create a false sense of urgency. The goal is to make the victim treat the message as a legitimate security alert and execute the attachment.\u003c/p\u003e\n\n\u003cp\u003eOnce launched, the LNK file initiates a multi-stage infection chain that uses intermediary batch scripts to download and install NarwhalRAT. The chain also retrieves a legitimate Python executable from the official website and a Windows security catalog file. Persistence is achieved through a scheduled task configured to launch the CAT file, which fetches and runs the main payload in memory without leaving artifacts on disk.\u003c/p\u003e\n\n\u003cp\u003eNarwhalRAT is a Python-based remote access trojan with surveillance and data collection capabilities. It can log keystrokes, capture screenshots including high-resolution images, record ambient audio, upload directory contents, collect active window details, gather data from USB media, execute commands from a C2 server, and switch C2 servers. The malware’s name refers to its use of %APPDATA%\\naverwhale to stage harvested data on the compromised host, a hidden directory meant to resemble the Naver Whale browser.\u003c/p\u003e\n\n\u003cp\u003eGenians said the malware uses Korean websites, including daehoat.com and novel21.co.kr, as primary communication relays. It also implements pCloud cloud storage API functionality, including routines that process folderid and auth parameters, indicating use of a legitimate cloud service as a secondary C2 channel in the form of a dead drop resolver. The activity shares multiple similarities with prior ScarCruft Python-based attacks involving ZIP archives, LNK files, batch scripts, Python binaries, CAT files, and scheduled task names that mimic Microsoft components.\u003c/p\u003e\n\n\u003cp\u003eThe deployment of NarwhalRAT is noteworthy because ScarCruft has previously been exclusively associated with the RokRAT malware family. Genians assessed NarwhalRAT as an advanced RAT that integrates a Python-based multi-stage loader, in-memory execution, a multi-C2 operational framework, and selective information collection functions. The article does not identify specific victims, but it describes the campaign as targeting recipients through spear-phishing messages.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eNorth Korean state-sponsored hacking group ScarCruft, also known as APT37, has been observed using spear-phishing messages that impersonate Microsoft Account security notifications. The campaign is designed to deliver a malware strain called NarwhalRAT. Genians Security Center said the attack emails are crafted to make recipients fear account compromise and one-time password abuse so they will execute the attachment.\u003c/p\u003e\n\n\u003cp\u003eThe email body tells the recipient to refer to an attached advisory. However, the article states that the attachment is not a Hangul Word Processor document, but a ZIP archive containing a malicious LNK file. The lure claims abnormal activity tied to repeated one-time password generation and frames it as a third-party phishing attempt against the victim’s Microsoft Account.\u003c/p\u003e\n\n\u003ch2 id=\"phishing-lure-and-initial-access\"\u003ePhishing lure and initial access\u003c/h2\u003e\n\n\u003cp\u003eThe phishing message is designed to create urgency and make the recipient interpret the email as a legitimate Microsoft security alert. It claims there has been abnormal activity involving repeated OTP generation and urges the recipient to change their password. According to Genians, the theme is intended to induce concern over possible account compromise and OTP abuse.\u003c/p\u003e\n\n\u003cp\u003eThe delivery mechanism relies on a ZIP archive containing a malicious LNK file. The article notes that the email body refers to an attached advisory, while the actual attachment format is a malicious archive rather than the expected HWP document. The LNK file is the starting point for the subsequent multi-stage infection chain.\u003c/p\u003e\n\n\u003ch2 id=\"infection-chain\"\u003eInfection chain\u003c/h2\u003e\n\n\u003cp\u003eOnce the LNK file is launched, it initiates a multi-stage infection chain. The chain uses intermediary batch scripts to download and install NarwhalRAT. It also retrieves a legitimate Python executable from the official website and downloads a Windows security catalog file.\u003c/p\u003e\n\n\u003cp\u003ePersistence is achieved through a scheduled task. The scheduled task is configured to launch the CAT file, which is responsible for fetching and running the main payload in memory. The article states that this approach allows the payload to run without leaving artifacts on disk.\u003c/p\u003e\n\n\u003cp\u003eGenians also compared this activity with a prior Python-based ScarCruft attack chain. In that earlier chain, a ZIP archive containing an LNK file led to an obfuscated batch script downloaded from a remote C2 server. The script then downloaded the Python binary and a CAT file, eventually deploying a compiled Python script capable of remote command execution and sending results back to the C2 server.\u003c/p\u003e\n\n\u003ch2 id=\"narwhalrat-capabilities\"\u003eNarwhalRAT capabilities\u003c/h2\u003e\n\n\u003cp\u003eNarwhalRAT is described as Python-based malware with a range of surveillance, data collection, and remote execution capabilities. The article lists the following functions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLogging keystrokes.\u003c/li\u003e\n\u003cli\u003eCapturing screenshots, including support for high-resolution images.\u003c/li\u003e\n\u003cli\u003eRecording ambient audio.\u003c/li\u003e\n\u003cli\u003eUploading directory contents.\u003c/li\u003e\n\u003cli\u003eCollecting active window details.\u003c/li\u003e\n\u003cli\u003eGathering data from USB media.\u003c/li\u003e\n\u003cli\u003eExecuting instructions issued by a command-and-control server.\u003c/li\u003e\n\u003cli\u003eSwitching C2 servers.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe malware stages harvested information in a hidden directory at %APPDATA%\\naverwhale on the compromised host. The name NarwhalRAT refers to this directory path. Genians said the directory name is intended to evade detection by masquerading as Naver Whale, a web browser developed by South Korean company Naver Corporation.\u003c/p\u003e\n\n\u003ch2 id=\"command-and-control-infrastructure\"\u003eCommand-and-control infrastructure\u003c/h2\u003e\n\n\u003cp\u003eGenians said NarwhalRAT uses Korean websites as primary communication relays. The article names daehoat.com and novel21.co.kr as examples of such websites. The malware also implements communication functionality based on the pCloud cloud storage API.\u003c/p\u003e\n\n\u003cp\u003eThe article states that pCloud-specific routines processing folderid and auth parameters were identified in the code. Genians assessed that this indicates the malware was designed to use a legitimate cloud service as a secondary C2 channel. The article describes this secondary channel as a dead drop resolver.\u003c/p\u003e\n\n\u003ch2 id=\"links-to-prior-scarcruft-activity\"\u003eLinks to prior ScarCruft activity\u003c/h2\u003e\n\n\u003cp\u003eGenians said the activity shares multiple similarities with previous Python-based attacks conducted by ScarCruft. Those prior operations used spear-phishing themes such as ticket confirmations and event invitations to trick targets into opening ZIP archives containing LNK files. The technical flow in the newly described campaign follows a similar structure involving LNK files, remote scripts, Python components, and CAT files.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights similarities in scheduled task naming conventions. The NarwhalRAT infection creates a scheduled task named MicrosoftUserInterfacePicturesUpdateTackMachine. A related earlier chain used the name MicrosoftMusicLibrariesPackageTaskMachine.\u003c/p\u003e\n\n\u003ch2 id=\"significance\"\u003eSignificance\u003c/h2\u003e\n\n\u003cp\u003eThe use of NarwhalRAT is notable because ScarCruft has previously been associated with RokRAT. The article states that APT37’s deployment of NarwhalRAT marks a departure from RokRAT, which is described as a malware family exclusively attributed to the group.\u003c/p\u003e\n\n\u003cp\u003eGenians assessed NarwhalRAT as an advanced RAT. The assessment is based on its Python-based multi-stage loader, in-memory execution structure, multi-C2 operational framework, and selective information collection functions. The article does not name specific victim organizations, but it describes the campaign as using spear-phishing messages to target recipients with fake Microsoft Account security alerts.\u003c/p\u003e\n","keyPoints":["North Korean state-sponsored group ScarCruft, also known as APT37, has been observed using spear-phishing emails impersonating Microsoft Account security notifications to deliver NarwhalRAT.","The phishing emails claim abnormal one-time password activity and include a ZIP archive containing a malicious LNK file rather than the referenced Hangul Word Processor document.","The LNK file starts a multi-stage infection chain that uses batch scripts to download and install NarwhalRAT, retrieve the legitimate Python executable, and establish persistence through a scheduled task.","NarwhalRAT can log keystrokes, capture screenshots, record ambient audio, upload directory contents, collect active window details, gather data from USB media, execute C2-issued instructions, and switch C2 servers.","Genians said NarwhalRAT uses Korean websites such as daehoat.com and novel21.co.kr as primary communication relays and implements pCloud API functionality as a secondary C2 channel."],"insights":["NarwhalRAT’s staging path, %APPDATA%\\naverwhale, is designed to blend in by imitating Naver Whale, a South Korean web browser, making that directory name a useful detection clue.","The campaign abuses a legitimate Python executable from the official Python website and a Windows security catalog file, showing that defenders should not treat those components as benign without checking their execution context.","The scheduled task name MicrosoftUserInterfacePicturesUpdateTackMachine resembles naming patterns seen in earlier ScarCruft Python-based campaigns, making unusual Microsoft-like scheduled task names a practical hunting lead.","NarwhalRAT represents a departure from ScarCruft’s previously attributed RokRAT malware, indicating a shift in the group’s tooling.","The malware combines compromised Korean websites with pCloud API-based dead drop resolver functionality, meaning C2 activity may appear as traffic to legitimate cloud services as well as local Korean domains."],"referencedReports":[{"title":"NarwhalRAT","url":"https://www.genians.co.kr/en/blog/threat_intelligence/narwhalrat","publisher":"Genians Security Center","context":"The article relies on Genians Security Center's analysis describing ScarCruft's use of fake Microsoft Account security alerts to deliver NarwhalRAT.","category":"","primary":false},{"title":"Python-based ScarCruft attack chain","url":"https://www.genians.co.kr/en/blog/threat_intelligence/python","publisher":"Genians Security Center","context":"The article references a prior Genians technical analysis of a similar ScarCruft Python-based infection chain using ZIP archives, LNK files, batch scripts, Python, and CAT files.","category":"","primary":false}],"body":"\u003cp\u003eNorth Korean state-sponsored hacking group ScarCruft, also known as APT37, has been observed using spear-phishing emails that impersonate Microsoft Account security notifications. The messages warn of abnormal one-time password activity and urge recipients to open an attached advisory. Instead of an HWP document, the attachment is a ZIP archive containing a malicious LNK file.\u003c/p\u003e\n\n\u003cp\u003eLaunching the LNK file starts a multi-stage infection chain that uses batch scripts to download and install NarwhalRAT. The chain also retrieves the legitimate Python executable from the official website and a Windows security catalog file, then establishes persistence through a scheduled task. Genians said the CAT file is used to fetch and run the main payload in memory without leaving artifacts on disk.\u003c/p\u003e\n\n\u003cp\u003eNarwhalRAT can log keystrokes, capture screenshots, record ambient audio, collect active window details, gather data from USB media, upload directory contents, execute C2-issued instructions, and switch C2 servers. The malware stages harvested information under %APPDATA%\\naverwhale, a hidden directory name intended to resemble the Naver Whale browser. Genians assessed NarwhalRAT as an advanced RAT with a Python-based multi-stage loader, in-memory execution, multiple C2 channels, and selective information collection functions.\u003c/p\u003e\n"},{"n":3,"title":"iRhythm discloses data breach, says hackers stole patient info","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/irhythm-discloses-data-breach-says-hackers-stole-patient-info/","time":"06:31","priority":"SHOULD READ","score":82,"tldr":"iRhythm disclosed a material data breach after hackers used social engineering to steal proprietary data, patient health information, and personal information from third-party-hosted business applications. The company says its medical devices, clinical systems, patient safety, and financial systems were not affected.","briefOverview":"\u003cp\u003eDigital healthcare company iRhythm Holdings disclosed a data breach after hackers stole patients’ personal and health information from third-party-hosted business applications. The company said its cardiac monitoring service has been used to analyze more than 2 billion hours of curated heartbeat data
