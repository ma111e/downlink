ced in pre-trial detention and face offenses including participation in an organized criminal group, hacking into IT systems to commit theft, and money laundering. The maximum penalty for these offenses is 25 years in prison.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Polish authorities arrested four members of an organized cybercrime group accused of breaching telecommunications partners and hijacking employee email accounts to carry out SIM-swapping attacks.","The Polish Cybercrime Bureau carried out the operation with support from the FBI and Homeland Security Investigations in the United States.","Investigators said the suspects hijacked victims’ phone numbers, intercepted SMS messages and email communications, and gained control of accounts at cryptocurrency exchanges.","Authorities estimate that millions of U.S. dollars were stolen and laundered through multiple bank accounts in various countries and digital wallets.","The four arrested individuals are in pre-trial detention and face charges related to participation in an organized criminal group, hacking into IT systems to commit theft, and money laundering."],"insights":["The group allegedly gained the data needed for phone-number takeovers by accessing entities that cooperated with telecommunications operators, showing that partner organizations were part of the attack path.","The suspects combined phone-number hijacking with intercepted SMS messages and email communications to gain control of cryptocurrency exchange accounts.","Polish authorities described the activity as a regular source of income for the suspects, with stolen funds moved through multiple bank accounts in various countries and digital wallets.","Although Polish authorities did not name the arrested suspects, blockchain investigator ZachXBT identified one alleged member from images released after the police raid."],"referencedReports":[],"body":"\u003cp\u003eAuthorities in Poland arrested four members ikely acts as a remote control while the actual work continues in the background on the user’s computer.","briefOverview":"\u003cp\u003eAnthropic appears to be testing Claude Cowork support on mobile, which would allow users to manage long-running Claude tasks from a phone. Claude Cowork is described as a desktop-focused agentic mode for Claude that brings some of Claude Code’s task-running abilities to regular knowledge work. Unlike Claude Code, which is optimized for coding and development tasks, Cowork can work on longer tasks, use files, create documents, generate spreadsheets, write reports, and continue in the background while users monitor progress.\u003c/p\u003e\n\n\u003cp\u003eThe article says screenshots posted on X suggest Anthropic is preparing a mobile experience for Cowork. The screenshots indicate users would be able to start and steer tasks directly from a phone, and check in from a phone, browser, or Claude desktop app. Anthropic also notes in the screenshots that work continues in the background even when the app is closed.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Claude Cowork on mobile does not appear intended to turn the phone into a full desktop-style agent platform. Instead, it appears to work more like a remote control for Cowork on a PC, with the computer still doing the heavy lifting. Anthropic has not publicly announced full mobile Cowork support, but the screenshots suggest the feature is being prepared inside Claude for mobile.\u003c/p\u003e\n","standardSynthesis":"","comprehensiveSynthesis":"","keyPoints":["Anthropic appears to be testing Claude Cowork support on mobile, allowing users to manage long-running Claude tasks from a phone.","Claude Cowork is a desktop-focused agentic mode for Claude that can use files, create documents, generate spreadsheets, write reports, and continue working in the background.","Screenshots posted on X indicate that users may be able to start and steer tasks from a phone and check in from a p
