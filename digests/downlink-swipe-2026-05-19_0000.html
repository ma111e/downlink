ocesses or to the page cache of privileged files. The article names /etc/shadow, /etc/sudoers, and SUID binaries as examples of privileged targets. This can allow local privilege escalation on vulnerable systems.\u003c/p\u003e\n\n\u003cp\u003eDirtyDecrypt affects only distributions with CONFIG_RXGK enabled. The article specifically names Fedora, Arch Linux, and openSUSE Tumbleweed as examples. It also states that in containerized environments, worker nodes running a vulnerable Linux version could provide a pathway to escape the pod.\u003c/p\u003e\n\n\u003cp\u003eZellic assessed DirtyDecrypt as a variant of several recent Linux kernel local privilege escalation flaws: Copy Fail, Dirty Frag, and Fragnesia. The article says these earlier flaws also grant root access on vulnerable systems and involve similar page-cache or copy-on-write-related primitives. It also notes related local privilege escalation or privilege-management issues in Linux PackageKit and the kernel, including CVE-2026-41651 and CVE-2026-46333.\u003c/p\u003e\n\n\u003cp\u003eThe wave of disclosures has prompted Linux kernel developers to review a proposed emergency runtime “killswitch” for disabling vulnerable kernel functions until patches are available. Separately, Rocky Linux introduced an optional security repository to ship urgent fixes quickly in narrow cases where severe vulnerabilities are public, exploit code exists, and upstream patches are not yet available. Rocky Linux emphasized that the repository is disabled by default and is not a replacement for the regular release process.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"core-event\"\u003eCore Event\u003c/h2\u003e\n\n\u003cp\u003eProof-of-concept exploit code has been released for DirtyDecrypt, also known as DirtyCBC, a recently patched Linux kernel local privilege escalation vulnerability. The article identifies the flaw as CVE-2026-31635, with a CVSS score of 7.5, based on the NIST National Vulnerability Database record linking to the DirtyDecrypt PoC.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability was discovered and reported by the Zellic and V12 security team on May 9, 2026. According to the article, the maintainers informed the researchers that it was a duplicate of a vulnerability already patched in the mainline Linux kernel.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eDirtyDecrypt is described by Zellic co-founder Luna Tong as “a rxgk pagecache write due to missing COW [copy-on-write] guard in rxgk_decrypt_skb.” The affected function, rxgk_decrypt_skb(), decrypts an incoming sk_buff, or socket buffer, on the receive side.\u003c/p\u003e\n\n\u003cp\u003eThe article explains that the vulnerable code path handles memory pages partly shared with the page cache of other processes. Under normal Linux behavior, copy-on-write should ensure that when a write occurs to a shared page, a private copy is created first so that the write does not affect another process’s data.\u003c/p\u003e\n\n\u003cp\u003eIn this case, the absence of the copy-on-write guard means data can be written to memory belonging to privileged processes. Depending on the exploit path, the article says it can also write to the page cache of privileged files, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e/etc/shadow\u003c/li\u003e\n\u003cli\u003e/etc/sudoers\u003c/li\u003e\n\u003cli\u003eA SUID binary\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe resulting impact is local privilege escalation.\u003c/p\u003e\n\n\u003ch2 id=\"affected-systems-and-environments\"\u003eAffected Systems and Environments\u003c/h2\u003e\n\n\u003cp\u003eThe article states that DirtyDecrypt affects only Linux distributions with CONFIG_RXGK enabled. It specifically names the following distributions as examples:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eFedora\u003c/li\u003e\n\u003cli\u003eArch Linux\u003c/li\u003e\n\u003cli\u003eopenSUSE Tumbleweed\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also highlights containerized environments. It says that worker nodes running a vulnerable version of Linux could provide a pathway to escape the pod.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-other-linux-kernel-flaws\"\u003eRelationship to Other Linux Kernel Flaws\u003c/h2\u003e\n\n\u003cp\u003eZellic assessed DirtyDecrypt as a variant of several recent Linux local privilege escalation vulnerabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCopy Fail, tracked as CVE-2026-31431\u003c/li\u003e\n\u003cli\u003eDirty Frag, also described as Copy Fail 2, tracked as CVE-2026-43284 and CVE-2026-43500\u003c/li\u003e\n\u003cli\u003eFragnesia, tracked as CVE-2026-46300\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that all of these vulnerabilities grant root access on vulnerable systems.\u003c/p\u003e\n\n\u003cp\u003eCopy Fail was disclosed by researchers at Theori on April 29, 2026, and involved the AF_ALG cryptographic socket interface. Dirty Frag followed a week later and expanded on Copy Fail with two page-cache write primitives. Fragnesia is described as another Dirty Frag variant affecting the XFRM ESP-in-TCP subsystem.\u003c/p\u003e\n\n\u003ch2 id=\"disclosure-and-patch-timing-context\"\u003eDisclosure and Patch-Timing Context\u003c/h2\u003e\n\n\u003cp\u003eThe article describes how the Dirty Frag disclosure process was disrupted after a merged patch for CVE-2026-43284 on May 5 led another researcher to analyze and independently publish details of the defect. The researcher, who used the aliases 0xdeadbeefnetwork and afflicted.sh, said they read the commit, recognized the no-copy-on-write path as a local privilege escalation primitive, and built a PoC.\u003c/p\u003e\n\n\u003cp\u003eThe researcher characterized the work as “n-day weaponization from a public upstream commit.” The article notes that this occurred while the researcher was unaware of the embargo.\u003c/p\u003e\n\n\u003ch2 id=\"other-linux-security-issues-mentioned\"\u003eOther Linux Security Issues Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article also connects the DirtyDecrypt disclosure to other Linux security developments. It cites a local privilege escalation flaw in the Linux PackageKit daemon, CVE-2026-41651, also called Pack2TheRoot, with a CVSS score of 8.8.\u003c/p\u003e\n\n\u003cp\u003eIt also mentions CVE-2026-46333, also called ssh-keysign-pwn, an improper privilege management flaw in the kernel with a CVSS score of 5.5. The article states that this issue allows an unprivileged local user to read root-owned secrets such as SSH private keys.\u003c/p\u003e\n\n\u003cp\u003eThe article lists advisories for CVE-2026-46333 from multiple Linux distributions and vendors, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAlmaLinux\u003c/li\u003e\n\u003cli\u003eAmazon Linux\u003c/li\u003e\n\u003cli\u003eCloudLinux\u003c/li\u003e\n\u003cli\u003eFedora\u003c/li\u003e\n\u003cli\u003eGentoo\u003c/li\u003e\n\u003cli\u003eRed Hat\u003c/li\u003e\n\u003cli\u003eSUSE\u003c/li\u003e\n\u003cli\u003eUbuntu\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"kernel-killswitch-proposal\"\u003eKernel “Killswitch” Proposal\u003c/h2\u003e\n\n\u003cp\u003eThe article says that the recent burst of disclosures has prompted Linux kernel developers to review a proposal for an emergency “killswitch.” The proposed mechanism would allow administrators to disable vulnerable kernel functions at runtime until a patch for a zero-day vulnerability becomes available.\u003c/p\u003e\n\n\u003cp\u003eAccording to the proposal submitted by Linux kernel developer and maintainer Sasha Levin, the killswitch would let a privileged operator make a chosen kernel function return a fixed value without executing its body. The function would return the operator-supplied value, and nothing else would run in its place.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the proposal includes no allowlist and no return-type check. If the kprobe layer accepts the symbol, the killswitch engages it, and the change remains active on every CPU until “disengage” is written or the system reboots.\u003c/p\u003e\n\n\u003ch2 id=\"rocky-linux-security-repository\"\u003eRocky Linux Security Repository\u003c/h2\u003e\n\n\u003cp\u003eRocky Linux has introduced an optional security repository intended to ship urgent security fixes quickly. The article says the repository is aimed particularly at situations where severe vulnerabilities become public before coordinated upstream fixes arrive.\u003c/p\u003e\n\n\u003cp\u003eThe repository is disabled by default. Rocky Linux maintainers said this preserves the default Rocky Linux experience as predictable, stable, and fully upstream-compatible while allowing administrators to opt in when accelerated fixes are needed.\u003c/p\u003e\n\n\u003cp\u003eThe repository is intended for “specific, narrow” cases where:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eA significant vulnerability is public\u003c/li\u003e\n\u003cli\u003eExploit code exists\u003c/li\u003e\n\u003cli\u003eUpstream patches are not available yet\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eRocky Linux emphasized that the security repository is not a replacement for the regular release process. The maintainers also noted that if Rocky Linux ships a fix and upstream later decides not to address it, the next upstream kernel release will supersede the patched version, and users who have not version-locked their kernel will no longer have the Rocky Linux fix.\u003c/p\u003e\n","keyPoints":["Proof-of-concept exploit code has been released for DirtyDecrypt, a recently patched Linux kernel local privilege escalation vulnerability tracked as CVE-2026-31635.","DirtyDecrypt is caused by a missing copy-on-write guard in rxgk_decrypt_skb(), which can allow writes to shared page-cache memory and potentially modify privileged files or memory.","The vulnerability affects Linux distributions with CONFIG_RXGK enabled, including Fedora, Arch Linux, and openSUSE Tumbleweed.","Zellic assessed DirtyDecrypt as a variant of earlier Linux local privilege escalation flaws including Copy Fail, Dirty Frag, and Fragnesia.","Recent Linux kernel vulnerability disclosures have prompted discussion of a proposed runtime kernel “killswitch” and led Rocky Linux to introduce an optional security repository for urgent fixes."],"insights":["DirtyDecrypt’s exposure is configuration-dependent, so checking whether CONFIG_RXGK is enabled is a practical way to prioritize affected Linux systems rather than treating all distributions equally.","Container worker nodes running vulnerable kernels are especially important to patch because the article states they could provide a pathway to escape a pod.","The NVD record links the DirtyDecrypt PoC even though the article says the CVE identifier was not disclosed by the researchers, making the CVE-to-PoC connection traceable through NVD.","Public upstream security fixes can accelerate n-day exploit development, as shown by Dirty Frag details being independently derived from a merged patch before the original embargo process fully played out.","Rocky Linux’s new security repository is explicitly designed for narrow cases where public exploit code exists before coordinated upstream fixes are available, but users may lose those fixes if a later upstream kernel supersedes the patched version."],"referencedReports":[{"title":"DirtyDecrypt PoC","url":"https://github.com/v12-security/pocs/tree/main/dirtydecrypt","publisher":"Zellic and V12 Security","context":"The article cites this GitHub material as the released proof-of-concept and technical description for DirtyDecrypt.","category":"","primary":false},{"title":"DirtyDecrypt Linux Kernel rxgk CVE-2026-31635","url":"https://moselwal.com/blog/dirtydecrypt-linux-kernel-rxgk-cve-2026-31635","publisher":"Moselwal","context":"The article quotes this analysis to explain that the flaw is in rxgk_decrypt_skb() and involves missing copy-on-write protection.","category":"","primary":false},{"title":"Copy Fail 2","url":"https://afflicted.sh/blog/posts/copy-fail-2.html","publisher":"afflicted.sh","context":"The article says another researcher independently published details of the Dirty Frag defect after analyzing a merged patch.","category":"","primary":false},{"title":"AlmaLinux advisory for CVE-2026-46333","url":"https://almalinux.org/blog/2026-05-15-ssh-keysign-pwn-cve-2026-46333/","publisher":"AlmaLinux","context":"The article lists AlmaLinux among distributions that released advisories for CVE-2026-46333.","category":"","primary":false},{"title":"Amazon Linux advisory for CVE-2026-46333","url":"https://explore.alas.aws.amazon.com/CVE-2026-46333.html","publisher":"Amazon Linux","context":"The article lists Amazon Linux among distributions that released advisories for CVE-2026-46333.","category":"","primary":false},{"title":"CloudLinux advisory for CVE-2026-46333","url":"https://blog.cloudlinux.com/ptrace-exit-race-cve-2026-46333-mitigation-and-kernel-update","publisher":"CloudLinux","context":"The article lists CloudLinux among distributions that released advisories for CVE-2026-46333.","category":"","primary":false},{"title":"Fedora advisory for CVE-2026-46333","url":"https://bodhi.fedoraproject.org/updates/FEDORA-2026-8b4a8d18d2","publisher":"Fedora","context":"The article lists Fedora among distributions that released advisories for CVE-2026-46333.","category":"","primary":false},{"title":"Gentoo advisory for CVE-2026-46333","url":"https://bugs.gentoo.org/show_bug.cgi?id=CVE-2026-46333","publisher":"Gentoo","context":"The article lists Gentoo among distributions that released advisories for CVE-2026-46333.","category":"","primary":false},{"title":"Red Hat advisory for CVE-2026-46333","url":"https://access.redhat.com/security/cve/cve-2026-46333","publisher":"Red Hat","context":"The article lists Red Hat among distributions that released advisories for CVE-2026-46333.","category":"","primary":false},{"title":"SUSE advisory for CVE-2026-46333","url":"https://www.suse.com/security/cve/CVE-2026-46333.html","publisher":"SUSE","context":"The article lists SUSE among distributions that released advisories for CVE-2026-46333.","category":"","primary":false},{"title":"Ubuntu advisory for CVE-2026-46333","url":"https://ubuntu.com/security/CVE-2026-46333","publisher":"Ubuntu","context":"The article lists Ubuntu among distributions that released advisories for CVE-2026-46333.","category":"","primary":false}],"body":"\u003cp\u003eProof-of-concept exploit code has been released for DirtyDecrypt, a recently patched Linux kernel local privilege escalation vulnerability. The flaw is tracked as CVE-2026-31635 and has a CVSS score of 7.5. It was discovered and reported by the Zellic and V12 security team on May 9, 2026, but maintainers said it duplicated a vulnerability already patched in mainline.\u003c/p\u003e\n\n\u003cp\u003eDirtyDecrypt is described as a page-cache write issue in rxgk caused by a missing copy-on-write guard in rxgk_decrypt_skb(). The flaw can lead to writes into memory used by privileged processes or into the page cache of privileged files such as /etc/shadow, /etc/sudoers, or a SUID binary. The article says this can result in local privilege escalation.\u003c/p\u003e\n\n\u003cp\u003eThe issue affects only Linux distributions with CONFIG_RXGK enabled, including Fedora, Arch Linux, and openSUSE Tumbleweed. In containerized environments, vulnerable worker nodes could provide a pathway to escape a pod. The disclosure comes amid several related Linux local privilege escalation issues and has prompted discussion of a proposed kernel runtime “killswitch” and Rocky Linux’s optional security repository for urgent fixes.\u003c/p\u003e\n"},{"n":19,"title":"Trapdoor Android Ad Fraud Scheme Hit 659 Million Daily Bid Requests Using 455 Apps","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/trapdoor-android-ad-fraud-scheme-hit.html","time":"16:38","priority":"SHOULD READ","score":84,"tldr":"Researchers uncovered “Trapdoor,” a large Android ad fraud and malvertising scheme using 455 malicious apps to push users into installing second-stage apps that secretly load hidden WebViews and generate fraudulent ad revenue. At its peak it produced 659 million daily bid requests before Google removed the identified apps from the Play Store.","briefOverview":"\u003cp\u003eCybersecurity researchers disclosed a new Android ad fraud and malvertising operation called Trapdoor. HUMAN\u0026rsquo;s Satori Threat Intelligence and Research Team said the activity involved 455 malicious Android apps and 183 threat actor-owned command-and-control domains. The operation targeted Android device users through apps that often appeared to be utility-style tools such as PDF viewers or device cleanup apps.\u003c/p\u003e\n\n\u003cp\u003eTrapdoor combined malvertising distribution with hidden ad-fraud monetization. Users who installed a first-stage threat actor-owned app could be shown fake pop-up alerts mimicking app update messages, which tricked them into installing a second-stage app. The second-stage apps launched hidden WebViews, loaded threat actor-owned HTML5 domains, and requested ads.\u003c/p\u003e\n\n\u003cp\u003eAt its peak, Trapdoor accounted for 659 million bid requests per day, and apps linked to the scheme were downloaded more than 24 million times. Traffic associated with the campaign primarily came from the United States, which made up more than three-fourths of the traffic volume. After responsible disclosure, Google removed the identified malicious apps from the Google Play Store.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers disclosed details of Trapdoor, a new Android ad fraud and malvertising operation targeting Android device users. HUMAN\u0026rsquo;s Satori Threat Intelligence and Research Team said the operation encompassed 455 malicious Android apps and 183 threat actor-owned command-and-control domains. The infrastructure functioned as a pipeline for multi-stage fraud.\u003c/p\u003e\n\n\u003cp\u003eThe operation began when users downloaded a threat actor-owned app, often presented as a utility-style app such as a PDF viewer or device cleanup tool. These initial apps triggered malvertising campaigns that coerced users into downloading additional threat actor-owned apps. The article says the secondary apps launched hidden WebViews, loaded threat actor-owned HTML5 domains, and requested ads.\u003c/p\u003e\n\n\u003cp\u003eTrapdoor was described as self-sustaining because an organic app install could become an illicit revenue generation cycle that funded follow-on malvertising campaigns. The operation used HTML5-based cashout sites, a pattern HUMAN said had also been observed in threat clusters tracked as SlopAds, Low5, and BADBOX 2.0. At its peak, Trapdoor generated 659 million bid requests per day.\u003c/p\u003e\n\n\u003cp\u003eThe apps linked to Trapdoor were downloaded more than 24 million times. Traffic associated with the campaign primarily originated from the United States, which accounted for more than three-fourths of the traffic volume. The article does not name the threat actors behind the operation but repeatedly describes the apps, domains, and campaigns as threat actor-owned.\u003c/p\u003e\n\n\u003cp\u003eHUMAN said the actors abused install attribution tools to enable malicious behavior only for users acquired through threat actor-run ad campaigns while suppressing it for organic downloads. The first-stage app served fake pop-up alerts mimicking app update messages to trick users into installing the next-stage app. The operation also used obfuscation and anti-analysis techniques, including impersonating legitimate SDKs, to avoid detection.\u003c/p\u003e\n\n\u003cp\u003eFollowing responsible disclosure, Google removed all identified malicious apps from the Google Play Store. HUMAN said this effectively neutralized the operation. The article also notes that a complete list of the Android apps was made available by HUMAN.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers disclosed a new Android ad fraud and malvertising operation called Trapdoor. The operation targeted Android device users and was detailed by HUMAN\u0026rsquo;s Satori Threat Intelligence and Research Team. According to the article, Trapdoor involved 455 malicious Android apps and 183 threat actor-owned command-and-control domains.\u003c/p\u003e\n\n\u003cp\u003eHUMAN described the infrastructure as a pipeline for multi-stage fraud. The campaign used apps that often appeared to be ordinary utility-style software, such as PDF viewers or device cleanup tools. These apps were used to initiate a chain that pushed users toward additional threat actor-owned apps.\u003c/p\u003e\n\n\u003ch2 id=\"distribution-and-infection-flow\"\u003eDistribution and Infection Flow\u003c/h2\u003e\n\n\u003cp\u003eTrapdoor began when users downloaded a threat actor-owned app. HUMAN said these apps were commonly utility-style applications. Once launched, the first-stage apps triggered malvertising campaigns intended to coerce users into downloading more threat actor-owned apps.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the organically downloaded app served fake pop-up alerts that mimicked app update messages. These prompts were designed to trick users into installing a next-stage app. Only the second-stage app was used to trigger the fraud activity.\u003c/p\u003e\n\n\u003cp\u003eThe second-stage apps launched hidden WebViews, loaded threat actor-owned HTML5 domains, and requested ads. This behavior allowed Trapdoor to combine malvertising distribution with hidden ad-fraud monetization.\u003c/p\u003e\n\n\u003ch2 id=\"technical-characteristics\"\u003eTechnical Characteristics\u003c/h2\u003e\n\n\u003cp\u003eTrapdoor used a multi-stage model in which the first-stage app acted as a distribution mechanism and the second-stage app performed the fraud. The operation relied on hidden WebViews and threat actor-controlled HTML5 domains. HUMAN characterized these domains as part of an HTML5-based cashout approach.\u003c/p\u003e\n\n\u003cp\u003eThe article says the use of HTML5-based cashout sites was a notable aspect of the operation. It also notes that this pattern had been observed in prior threat clusters tracked as SlopAds, Low5, and BADBOX 2.0. Trapdoor\u0026rsquo;s infrastructure included 183 threat actor-owned command-and-control domains.\u003c/p\u003e\n\n\u003cp\u003eHUMAN also said the operation used multiple obfuscation and anti-analysis techniques. These included impersonating legitimate SDKs to blend in. The article says these techniques helped fuse malvertising distribution, hidden ad fraud monetization, and multi-stage malware distribution.\u003c/p\u003e\n\n\u003ch2 id=\"selective-activation-and-evasion\"\u003eSelective Activation and Evasion\u003c/h2\u003e\n\n\u003cp\u003eA key behavior described in the article is Trapdoor\u0026rsquo;s selective activation. HUMAN said the threat actors abused install attribution tools, which are normally designed to help legitimate marketers track how users discover apps. In Trapdoor, these tools were used to enable malicious behavior only for users acquired through threat actor-run ad campaigns.\u003c/p\u003e\n\n\u003cp\u003eThe malicious behavior was suppressed for organic downloads of the associated apps. The article explains that anyone who downloaded the app directly from the Play Store or sideloaded it would not be targeted. This selective activation meant that the payload was activated only for users who fell victim to the advertising campaign.\u003c/p\u003e\n\n\u003cp\u003eThe article describes this as a way for the operation to sidestep detection. Alongside selective activation, Trapdoor used obfuscation and anti-analysis techniques. HUMAN\u0026rsquo;s Lindsay Kaye said the operation used real, everyday software and techniques such as impersonating legitimate SDKs to blend in.\u003c/p\u003e\n\n\u003ch2 id=\"scale-and-impact\"\u003eScale and Impact\u003c/h2\u003e\n\n\u003cp\u003eTrapdoor reached significant scale. At the peak of the operation, it accounted for 659 million bid requests per day. Android apps linked to the scheme were downloaded more than 24 million times.\u003c/p\u003e\n\n\u003cp\u003eTraffic associated with the campaign primarily originated from the United States. The United States accounted for more than three-fourths of the traffic volume. The article does not provide a breakdown of other regions.\u003c/p\u003e\n\n\u003cp\u003eHUMAN described the campaign as self-sustaining. In this model, an organic app install could turn into an illicit revenue generation cycle. That revenue cycle could then be used to fund additional malvertising campaigns.\u003c/p\u003e\n\n\u003ch2 id=\"actors-and-infrastructure\"\u003eActors and Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe article does not identify the threat actors by name. It refers to the apps, campaigns, HTML5 domains, and command-and-control domains as threat actor-owned. The operation included 455 malicious Android apps and 183 threat actor-owned command-and-control domains.\u003c/p\u003e\n\n\u003cp\u003eThe threat actors also controlled the malvertising campaigns used to acquire targeted users. They abused install attribution tools to distinguish users acquired through those campaigns from organic downloaders. This allowed them to restrict malicious behavior to specific users.\u003c/p\u003e\n\n\u003ch2 id=\"response\"\u003eResponse\u003c/h2\u003e\n\n\u003cp\u003eFollowing responsible disclosure, Google took steps to remove all identified malicious apps from the Google Play Store. The article says this effectively neutralized the operation. HUMAN also made a complete list of the Android apps available.\u003c/p\u003e\n\n\u003cp\u003eGavin Reid, chief information security officer at HUMAN, said Trapdoor showed how fraudsters can turn everyday app installs into a self-funding pipeline for malvertising and ad fraud. He also said the operation was another example of threat actors co-opting legitimate tools, such as attribution software, to assist fraud campaigns and evade detection.\u003c/p\u003e\n","keyPoints":["Cybersecurity researchers disclosed a new Android ad fraud and malvertising operation called Trapdoor that targeted Android device users.","The Trapdoor operation involved 455 malicious Android apps and 183 threat actor-owned command-and-control domains.","Trapdoor used utility-style apps to trigger malvertising campaigns that coerced users into downloading additional threat actor-owned apps.","The second-stage Trapdoor apps launched hidden WebViews, loaded threat actor-owned HTML5 domains, and requested ads to generate fraudulent revenue.","At its peak, Trapdoor accounted for 659 million bid requests per day, and Google removed the identified malicious apps from the Google Play Store after responsible disclosure."],"insights":["Trapdoor selectively activated malicious behavior only for users acquired through threat actor-run ad campaigns, which helped it avoid affecting users who installed the same apps directly from the Play Store or by sideloading.","The operation abused legitimate install attribution tools to distinguish campaign-acquired users from organic downloads and suppress malicious behavior when it was more likely to be observed by researchers.","Trapdoor used first-stage utility apps primarily as a distribution mechanism, while the second-stage apps performed the hidden WebView ad fraud, separating user acquisition from monetization.","The campaign formed a self-sustaining revenue loop in which fraudulent ad revenue could fund additional malvertising campaigns to drive more installations.","Trapdoor impersonated legitimate SDKs and used obfuscation and anti-analysis techniques to blend malicious behavior into real everyday software."],"referencedReports":[{"title":"Satori Threat Intelligence Alert: Trapdoor Funnels Malvertising into Ad Fraud","url":"https://www.humansecurity.com/learn/resource/satori-threat-intelligence-alert-trapdoor-funnels-malvertising-into-ad-fraud/","publisher":"HUMAN Satori Threat Intelligence and Research Team","context":"The article cites HUMAN's Satori team report as the source detailing the Trapdoor Android ad fraud and malvertising operation.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers disclosed a new Android ad fraud and malvertising operation called Trapdoor. HUMAN\u0026rsquo;s Satori Threat Intelligence and Research Team said the activity involved 455 malicious Android apps and 183 threat actor-owned command-and-control domains. The operation targeted Android device users through apps that often appeared to be utility-style tools such as PDF viewers or device cleanup apps.\u003c/p\u003e\n\n\u003cp\u003eTrapdoor combined malvertising distribution with hidden ad-fraud monetization. Users who installed a first-stage threat actor-owned app could be shown fake pop-up alerts mimicking app update messages, which tricked them into installing a second-stage app. The second-stage apps launched hidden WebViews, loaded threat actor-owned HTML5 domains, and requested ads.\u003c/p\u003e\n\n\u003cp\u003eAt its peak, Trapdoor accounted for 659 million bid requests per day, and apps linked to the scheme were downloaded more than 24 million times. Traffic associated with the campaign primarily came from the United States, which made up more than three-fourths of the traffic volume. After responsible disclosure, Google removed the identified malicious apps from the Google Play Store.\u003c/p\u003e\n"},{"n":1,"title":"UK regulator to require tech firms to tackle deepfakes, non-consensual intimate images","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/uk-regulator-to-require-tech-firms-to-tackle-deepfakes-nudification-ai","time":"16:57","priority":"SHOULD READ","score":78,"tldr":"UK regulator Ofcom plans to require tech platforms to better detect and remove non-consensual intimate images and AI-generated deepfakes, including broader use of hash-matching technology. The move shifts more responsibility onto tech companies to stop reuploads and reduce victim burden, with new rules expected this autumn pending Parliament action.","briefOverview":"\u003cp\u003eBritain’s communications regulator, Ofcom, said it will require tech companies to do more to find and remove non-consensual intimate images from their sites. The regulator also said companies must curb the spread of AI-created deepfakes. The changes are being added to Ofcom’s codes of practice and are expected to take effect this autumn pending action from the UK Parliament.\u003c/p\u003e\n\n\u003cp\u003eA key technical measure in Ofcom’s recommendation is broader use of hash matching technology. The article describes hash matching as converting images into a digital fingerprint that can be stored in a database to prevent future uploads of the same or similar files. Ofcom said the update responds to an urgent need to better protect women and girls online.\u003c/p\u003e\n\n\u003cp\u003eThe article places the Ofcom changes alongside UK legislation banning nudification tools and requiring non-consensual intimate images to be removed within two days. Prime Minister Keir Starmer has said tech firms that fail to remove the images promptly could face hefty fines or have their services blocked. The issue has drawn heightened attention after millions of nudified images of non-consenting women and children reportedly spread worldwide via xAI’s Grok chatbot.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOfcom, Britain’s top communications regulator, said it will begin requiring tech companies to do more to detect and remove non-consensual intimate images from their sites. The regulator also said firms must curb the spread of AI-created deepfakes. Ofcom is updating its codes of practice with this new language, and the changes are expected to take effect this autumn pending action from the UK Parliament.\u003c/p\u003e\n\n\u003cp\u003eThe technical mechanism highlighted by Ofcom is expanded use of hash matching technology. The article explains that hash matching converts images into a digital fingerprint that can be stored in a database. That database can then be used to prevent future uploads of the same or similar files.\u003c/p\u003e\n\n\u003cp\u003eOfcom said the changes are being made because of the urgent need to better protect women and girls online. The regulator said the measure, together with new legislation banning nudification tools and requiring non-consensual intimate images to be removed within two days, will make a material difference in protecting women and girls online. The affected parties described in the article include victims of non-consensual intimate images, women and girls, and non-consenting women and children whose nudified images have been circulated.\u003c/p\u003e\n\n\u003cp\u003ePrime Minister Keir Starmer said in February that the new law imposing hefty fines on tech firms that do not promptly remove intimate images was needed to spare victims from repeated reporting. He also warned that companies failing to remove the images within two days could have their services blocked. In an opinion piece, Starmer called the issue a national emergency and said the burden of tackling abuse must shift from victims to perpetrators and companies that enable harm.\u003c/p\u003e\n\n\u003cp\u003eThe article says the UK government’s focus follows several weeks in which millions of nudified images of non-consenting women and children spread worldwide via xAI’s Grok chatbot. It also contrasts Ofcom’s approach with developments in the European Union, where a law allowing tech firms to search communications for child sexual abuse material expired after a standoff over privacy concerns. Tech giants have said they will continue CSAM scanning, while European Commission officials have said the practice is against the law.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eBritain’s communications regulator, Ofcom, said it will require tech companies to take stronger action against non-consensual intimate images and AI-created deepfakes. The regulator is updating its codes of practice to include new language covering these issues. The changes are expected to take effect this autumn, pending action from the UK Parliament.\u003c/p\u003e\n\n\u003cp\u003eOfcom framed the move as a response to the urgent need to better protect women and girls online. The article says the requirements will push sites and apps to do more to find and remove non-consensual intimate images from their services. The regulator also wants platforms to curb the spread of deepfakes created by artificial intelligence.\u003c/p\u003e\n\n\u003ch2 id=\"technical-measure-hash-matching\"\u003eTechnical measure: hash matching\u003c/h2\u003e\n\n\u003cp\u003eOfcom is recommending that sites and apps use hash matching technology more expansively. The article describes hash matching as a process that converts images into a digital fingerprint. That fingerprint can be stored in a database to help prevent future uploads of the same or similar files.\u003c/p\u003e\n\n\u003cp\u003eThis measure is presented as a way to address the repeated spread of harmful material after it has already been identified. The article quotes Prime Minister Keir Starmer describing how victims have had to chase takedowns from site to site and report the same material repeatedly. Hash matching is therefore a central technical component of Ofcom’s updated approach as described in the article.\u003c/p\u003e\n\n\u003ch2 id=\"legal-and-regulatory-response-in-the-uk\"\u003eLegal and regulatory response in the UK\u003c/h2\u003e\n\n\u003cp\u003eThe Ofcom changes are occurring alongside new UK legislation. The article says the legislation bans nudification tools and requires non-consensual intimate images to be removed within two days. Ofcom said that its measure, together with that legislation, will make a material difference in protecting women and girls online.\u003c/p\u003e\n\n\u003cp\u003ePrime Minister Keir Starmer said in February that the law imposing hefty fines on tech firms that fail to promptly remove intimate images was necessary. According to the article, he said the aim was to spare victims from having to make repeated reports to get pictures removed. Starmer also warned that tech companies that fail to remove the images within two days could have their services blocked.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-impact\"\u003eAffected parties and impact\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies women and girls as a primary group the regulatory changes are intended to protect. It also refers to non-consenting women and children whose nudified images spread worldwide through xAI’s Grok chatbot. Victims of non-consensual intimate image abuse are described as having been left to pursue takedowns across multiple sites.\u003c/p\u003e\n\n\u003cp\u003eStarmer described the issue as a national emergency in a February opinion piece. He wrote that victims had been left to fight alone, reporting the same material repeatedly only to see it reappear elsewhere hours later. He said that the burden of tackling abuse should no longer fall on victims, but on perpetrators and the companies that enable harm.\u003c/p\u003e\n\n\u003ch2 id=\"known-platform-context-mentioned-in-the-article\"\u003eKnown platform context mentioned in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article says the British government’s focus follows several weeks during which millions of nudified images of non-consenting women and children spread worldwide via xAI’s Grok chatbot. The article does not provide further technical detail about how those images were generated or distributed. It uses that event as context for the UK government’s and Ofcom’s focus on non-consensual intimate imagery and AI-generated deepfakes.\u003c/p\u003e\n\n\u003ch2 id=\"comparison-with-the-european-union\"\u003eComparison with the European Union\u003c/h2\u003e\n\n\u003cp\u003eThe article says Ofcom’s approach currently follows a different path from that of the UK’s peers. It contrasts the UK approach with a European Union law that allowed tech firms to search communications for child sexual abuse material, or CSAM. That EU law expired last month after a long standoff among lawmakers over privacy concerns.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, tech giants have said they will continue scanning communications for CSAM. European Commission officials, however, have said that the practice is against the law. This contrast highlights that the UK is moving toward strengthened platform detection requirements while the EU is facing legal uncertainty over scanning practices mentioned in the article.\u003c/p\u003e\n\n\u003ch2 id=\"key-elements-from-the-article\"\u003eKey elements from the article\u003c/h2\u003e\n\n\u003cul\u003e\n\u003cli\u003eOfcom will require tech firms to do more to find and remove non-consensual intimate images.\u003c/li\u003e\n\u003cli\u003eOfcom will also require action to curb the spread of AI-created deepfakes.\u003c/li\u003e\n\u003cli\u003eThe regulator is updating its codes of practice, with changes expected this autumn pending UK Parliament action.\u003c/li\u003e\n\u003cli\u003eOfcom recommends broader use of hash matching technology to detect and prevent reuploads of the same or similar files.\u003c/li\u003e\n\u003cli\u003eNew UK legislation bans nudification tools and requires non-consensual intimate images to be removed within two days.\u003c/li\u003e\n\u003cli\u003eStarmer said noncompliant tech firms could face hefty fines or service blocking.\u003c/li\u003e\n\u003cli\u003eThe government’s focus follows the spread of millions of nudified images of non-consenting women and children via xAI’s Grok chatbot.\u003c/li\u003e\n\u003cli\u003eThe article contrasts the UK’s approach with the EU, where a law allowing CSAM scanning expired amid privacy concerns.\u003c/li\u003e\n\u003c/ul\u003e\n","keyPoints":["Ofcom said it will require tech companies to do more to find and remove non-consensual intimate images from their sites and curb the spread of AI-created deepfakes.","Ofcom is updating its codes of practice, with the changes expected to take effect this autumn pending action from the UK Parliament.","Ofcom is recommending that sites and apps use hash matching technology more expansively to detect images and prevent future uploads of the same or similar files.","The regulator said the change is being made due to the urgent need to better protect women and girls online.","UK Prime Minister Keir Starmer said tech companies that fail to remove non-consensual intimate images within two days could face hefty fines or have their services blocked."],"insights":["Ofcom’s proposed use of hash matching would target not only initial uploads but also reuploads of the same or similar intimate images, directly addressing Starmer’s concern that victims must repeatedly report the same material across sites.","The UK approach would place formal detection and takedown obligations on platforms at a time when the EU’s legal basis for scanning communications for CSAM has expired amid privacy disputes.","The planned Ofcom code changes are tied to broader UK measures, including a ban on nudification tools and a requirement to remove non-consensual intimate images within two days.","The government’s focus intensified after millions of nudified images of non-consenting women and children reportedly spread worldwide via xAI’s Grok chatbot."],"referencedReports":[],"body":"\u003cp\u003eBritain’s communications regulator, Ofcom, said it will require tech companies to do more to find and remove non-consensual intimate images from their sites. The regulator also said companies must curb the spread of AI-created deepfakes. The changes are being added to Ofcom’s codes of practice and are expected to take effect this autumn pending action from the UK Parliament.\u003c/p\u003e\n\n\u003cp\u003eA key technical measure in Ofcom’s recommendation is broader use of hash matching technology. The article describes hash matching as converting images into a digital fingerprint that can be stored in a database to prevent future uploads of the same or similar files. Ofcom said the update responds to an urgent need to better protect women and girls online.\u003c/p\u003e\n\n\u003cp\u003eThe article places the Ofcom changes alongside UK legislation banning nudification tools and requiring non-consensual intimate images to be removed within two days. Prime Minister Keir Starmer has said tech firms that fail to remove the images promptly could face hefty fines or have their services blocked. The issue has drawn heightened attention after millions of nudified images of non-consenting women and children reportedly spread worldwide via xAI’s Grok chatbot.\u003c/p\u003e\n"},{"n":6,"title":"Microsoft confirms patching issues in restricted Windows networks","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-confirms-patching-issues-in-restricted-windows-networks/","time":"11:22","priority":"SHOULD READ","score":78,"tldr":"Microsoft warns that January 2026 optional Windows preview updates can break future Windows Update downloads in restricted or air-gapped networks, causing error 0x80010002. Admins should deploy Microsoft’s Known Issue Rollback group policy for affected Windows versions and restart devices while a permanent fix is pending.","briefOverview":"\u003cp\u003eMicrosoft says customers in restricted Windows network environments may encounter Windows Update failures after installing the January 2026 optional non-security preview updates. The issue affects environments ranging from fully isolated, air-gapped systems to strictly firewalled networks. Affected systems display error code 0x80010002 when updating through Windows Update.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said affected devices might be able to download the February monthly Windows security update but then become unable to use Windows Update settings to download updates released in March, April, or later months. The company attributed the issue to recent changes in download timeout requirements when starting download operations. Microsoft said the problem is not related to device integrity or the device’s ability to install Windows updates, only its ability to download updates from the internet through the Windows Update page under Settings.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft is still working to resolve the issue, but IT administrators can use Known Issue Rollback group policies as a workaround. The article lists separate KIR packages for Windows 11 26H1 and for Windows 11 24H2, Windows 11 25H2, and Windows Server 2025. Microsoft said administrators must install and configure the correct Group Policy and restart affected devices to apply the setting.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft confirmed that Windows Update may fail in restricted Windows network environments after installation of the January 2026 optional non-security preview updates. The affected environments include fully isolated air-gapped systems and strictly firewalled networks. Affected systems show error code 0x80010002 when updating through Windows Update.\u003c/p\u003e\n\n\u003cp\u003eAccording to Microsoft, affected devices might still be able to download the February monthly Windows security update. However, those same devices may then be unable to use the Windows Update settings page to download updates released in March, April, or later months. The service alert was first spotted by Microsoft MVP Susan Bradley.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the issue results from recent changes in download timeout requirements when starting download operations. The company stated that the problem is not related to device integrity or to the device’s ability to install Windows updates. Instead, it only affects the device’s ability to download updates from the internet through the Windows Update page under Settings.\u003c/p\u003e\n\n\u003cp\u003eWhile Microsoft continues working on a resolution, it advised IT administrators to use Known Issue Rollback group policies as a workaround. The article links KIR packages for Windows 11 26H1 and for Windows 11 24H2, Windows 11 25H2, and Windows Server 2025. Microsoft said administrators need to install and configure the Group Policy for their Windows version and restart devices to apply the setting.\u003c/p\u003e\n\n\u003cp\u003eThe article also places this issue alongside several recent Windows update problems encountered by administrators. Microsoft previously resolved April 2025 security update installation failures through Windows Server Update Services, fixed a similar August 2025 Windows 11 24H2 cumulative update issue involving 0x80240069 errors, and more recently shared a KIR fix for May 2026 Windows 11 security update installation failures that triggered 0x800f0922 errors.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft confirmed that customers in restricted Windows network environments may encounter Windows Update failures after installing the January 2026 optional non-security preview updates. The affected environments include fully isolated, air-gapped systems as well as strictly firewalled networks. In these environments, affected systems display error code 0x80010002 when updating through Windows Update.\u003c/p\u003e\n\n\u003cp\u003eThe issue was described in a Microsoft service alert first spotted by Microsoft MVP Susan Bradley. Microsoft said affected devices might be able to download the February monthly Windows security update, but then become unable to use the Windows Update settings page to download updates released in March, April, or later months.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft attributed the issue to recent changes in download timeout requirements when starting download operations. The company said the issue is not related to device integrity. It also said the issue is not related to the device’s ability to install Windows updates.\u003c/p\u003e\n\n\u003cp\u003eInstead, Microsoft described the problem as affecting only the device’s ability to download updates from the internet through the Windows Update page under Settings. The reported error code is 0x80010002.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-platforms\"\u003eAffected Parties and Platforms\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the affected customers are those operating Windows systems in restricted network environments. These environments range from fully isolated, air-gapped systems to strictly firewalled networks.\u003c/p\u003e\n\n\u003cp\u003eThe workaround packages listed by Microsoft apply to the following Windows versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows 11 26H1\u003c/li\u003e\n\u003cli\u003eWindows 11 24H2\u003c/li\u003e\n\u003cli\u003eWindows 11 25H2\u003c/li\u003e\n\u003cli\u003eWindows Server 2025\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe direct impact is that affected systems can fail to download Windows updates through the Windows Update settings page. Microsoft said affected devices might still download the February monthly Windows security update, but later become unable to download March, April, or later updates through Windows Update settings.\u003c/p\u003e\n\n\u003cp\u003eThe article does not describe the issue as a device integrity problem. It also does not describe it as an inability to install updates once they are available. Microsoft specifically framed the issue as a download problem related to Windows Update access through Settings.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-response-and-workaround\"\u003eMicrosoft’s Response and Workaround\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said it is still working to resolve the issue. In the meantime, IT administrators can work around the problem by installing one of the listed Known Issue Rollback group policies.\u003c/p\u003e\n\n\u003cp\u003eThe article lists two KIR packages:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows 11 26H1 KB5083806 Known Issue Rollback\u003c/li\u003e\n\u003cli\u003eWindows 11 24H2, Windows 11 25H2, and Windows Server 2025 KB5083631 Known Issue Rollback\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft said administrators must install and configure the Group Policy for their version of Windows to resolve the issue. It also said devices must be restarted to apply the group policy setting. The article notes that Microsoft provides additional guidance for deploying and configuring KIR group policies on its support website.\u003c/p\u003e\n\n\u003ch2 id=\"related-windows-update-issues-mentioned\"\u003eRelated Windows Update Issues Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that administrators have encountered several other Windows update issues in recent years. In April 2025, Microsoft resolved a bug that prevented enterprise customers from installing the April 2025 security updates through Windows Server Update Services.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that Microsoft fixed an almost identical issue in August 2025. That issue caused the Windows 11 24H2 cumulative update to fail with 0x80240069 errors when delivered through Windows Server Update Services.\u003c/p\u003e\n\n\u003cp\u003eMore recently, Microsoft shared another Known Issue Rollback fix for a known issue affecting the May 2026 Windows 11 security update, KB5089549. That issue caused the update to fail to install on some systems and trigger 0x800f0922 errors.\u003c/p\u003e\n","keyPoints":["Microsoft says customers in restricted Windows network environments may encounter Windows Update failures after installing the January 2026 optional non-security preview updates.","Affected systems can display error code 0x80010002 when attempting to update through Windows Update.","Microsoft says affected devices might download the February monthly Windows security update but then be unable to use Windows Update settings to download updates released in March, April, or later months.","Microsoft says the issue is caused by recent changes in download timeout requirements when starting download operations and is not related to device integrity or the ability to install updates.","Microsoft advises IT administrators to deploy the appropriate Known Issue Rollback group policy for their Windows version and restart affected devices to apply the setting."],"insights":["The failure affects the ability to download updates through the Windows Update page under Settings, while Microsoft says it does not indicate a problem with device integrity or update installation capability.","Systems in restricted networks may appear to update successfully in February before losing the ability to download later monthly updates, which could delay detection of the issue until March or later.","The workaround requires administrators to select the Known Issue Rollback package that matches the affected Windows version and to restart devices after applying the group policy.","Microsoft has recently used Known Issue Rollback to address multiple Windows update-related problems, including a May 2026 Windows 11 security update installation issue causing 0x800f0922 errors."],"referencedReports":[{"title":"Microsoft service alert on Windows Update failures in restricted network environments","url":"https://admin.cloud.microsoft/Adminportal/Home?source=applauncher#/windowsreleasehealth/:/issue/WI1311742","publisher":"Microsoft","context":"The article cites a Microsoft service alert confirming Windows Update failures with error 0x80010002 in restricted network environments after January 2026 optional preview updates.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft says customers in restricted Windows network environments may encounter Windows Update failures after installing the January 2026 optional non-security preview updates. The issue affects environments ranging from fully isolated, air-gapped systems to strictly firewalled networks. Affected systems display error code 0x80010002 when updating through Windows Update.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said affected devices might be able to download the February monthly Windows security update but then become unable to use Windows Update settings to download updates released in March, April, or later months. The company attributed the issue to recent changes in download timeout requirements when starting download operations. Microsoft said the problem is not related to device integrity or the device’s ability to install Windows updates, only its ability to download updates from the internet through the Windows Update page under Settings.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft is still working to resolve the issue, but IT administrators can use Known Issue Rollback group policies as a workaround. The article lists separate KIR packages for Windows 11 26H1 and for Windows 11 24H2, Windows 11 25H2, and Windows Server 2025. Microsoft said administrators must install and configure the correct Group Policy and restart affected devices to apply the setting.\u003c/p\u003e\n"},{"n":7,"title":"FBI: Americans lost over $388 million to scams using crypto ATMs in 2025","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/fbi-americans-lost-over-388-million-to-scams-using-crypto-atms-in-2025/","time":"19:45","priority":"SHOULD READ","score":78,"tldr":"The FBI says Americans lost over $388 million in 2025 to scams involving crypto ATMs, with older adults accounting for more than half of complaints and most of the losses. Scammers typically coach victims to withdraw cash and deposit it into kiosks that send funds to criminal-controlled crypto wallets.","briefOverview":"\u003cp\u003eThe FBI said Americans lost more than $388 million in 2025 to scams involving cryptocurrency kiosks, also known as crypto ATMs or Bitcoin ATMs. The Internet Crime Complaint Center received more than 13,400 complaints involving these kiosks. The FBI described this as a 23% increase in complaints and a 58% increase in losses from 2024.\u003c/p\u003e\n\n\u003cp\u003eCryptocurrency kiosks are physical terminals that resemble bank ATMs and allow users to buy or sell crypto assets using cash or debit cards. The article says criminals direct victims to deposit cash into these kiosks, which then transfer the funds to attacker-controlled crypto wallets. In typical complaints, criminals provide detailed instructions on withdrawing cash, locating a kiosk, and sending funds.\u003c/p\u003e\n\n\u003cp\u003eThe impact was especially severe for older victims, with more than half of complaints involving people over 50 and losses over $302 million. The FBI advised people not to send money to people they only know online, not to scan QR codes or follow payment instructions from unknown individuals, and to verify phone calls directly. The article also notes recent statewide bans on cryptocurrency kiosks in Minnesota, Indiana, and Tennessee.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe FBI warned that Americans lost over $388 million in 2025 to scams using cryptocurrency kiosks, also called crypto ATMs or Bitcoin ATMs. The warning came in a public service announcement published on Friday. According to the FBI, reported losses tied to these scams rose nearly 60% compared with the previous year.\u003c/p\u003e\n\n\u003cp\u003eCryptocurrency kiosks are standalone terminals that resemble bank ATMs and may or may not require identity verification to prevent money laundering. They allow users to buy or sell crypto assets using cash or debit cards. The article says they are commonly found in gas stations, convenience stores, and other easily accessible locations.\u003c/p\u003e\n\n\u003cp\u003eThe FBI said criminals use these kiosks by instructing victims to deposit cash that is then sent to attacker-controlled crypto wallets. In typical complaints to the Internet Crime Complaint Center, criminals gave detailed steps for withdrawing cash from a bank, finding a kiosk, and depositing and sending funds. The article identifies the actors as cybercriminals but does not name any specific group or individual.\u003c/p\u003e\n\n\u003cp\u003eThe FBI’s IC3 received more than 13,400 complaints involving cryptocurrency kiosks in 2025, with losses exceeding \u003cspan class=\"math inline\"\u003e\\(388 million. This represented a 23% increase in complaints and a 58% increase in losses from 2024. More than half of the complaints involved individuals over 50, whose losses exceeded \\)\u003c/span\u003e302 million.\u003c/p\u003e\n\n\u003cp\u003eThe article says Americans in Texas, Florida, and California filed more than 3,300 crypto ATM scam complaints and reported over \u003cspan class=\"math inline\"\u003e\\(112 million in estimated losses. It also notes that Minnesota lawmakers banned cryptocurrency kiosks statewide earlier this month, after similar moves in Indiana in March and Tennessee in April. The FBI’s broader 2025 Internet Crime Report said IC3 received more than 1 million complaints last year linked to nearly \\)\u003c/span\u003e21 billion in losses from cyber-enabled crimes.\u003c/p\u003e\n\n\u003cp\u003eThe FBI recommended several protective steps, including not sending money to people known only online and never scanning QR codes or following payment instructions from unknown individuals. It also advised verifying phone calls directly, not sharing personal information over the phone, being wary of anyone claiming to be from the government or law enforcement who demands cryptocurrency payments, stopping transactions if a kiosk operator warns of fraud, and keeping receipts for cryptocurrency transactions.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe FBI said Americans lost over $388 million in 2025 to scams involving cryptocurrency kiosks, also known as crypto ATMs or Bitcoin ATMs. The warning was issued in a public service announcement published on Friday. The FBI said reported losses connected to crypto ATM scams increased nearly 60% compared with the previous year.\u003c/p\u003e\n\n\u003cp\u003eThe FBI’s Internet Crime Complaint Center received more than 13,400 complaints involving cryptocurrency kiosks in 2025. Those complaints were associated with losses of more than $388 million. The FBI said this represented a 23% increase in complaints and a 58% increase in losses from 2024.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-scams-use-cryptocurrency-kiosks\"\u003eHow the scams use cryptocurrency kiosks\u003c/h2\u003e\n\n\u003cp\u003eCryptocurrency kiosks are physical, standalone electronic terminals that resemble bank ATMs. They allow users to buy or sell crypto assets using cash or debit cards. The article notes that these kiosks may or may not require identity verification to prevent money laundering.\u003c/p\u003e\n\n\u003cp\u003eThe kiosks are often located in gas stations, convenience stores, and other easily accessible places. According to the article, cybercriminals ask potential victims to deposit cash into crypto kiosks. The funds are then transferred to crypto wallets controlled by the attackers.\u003c/p\u003e\n\n\u003cp\u003eThe FBI said typical IC3 complaints involving cryptocurrency kiosks describe criminals giving victims detailed instructions. These instructions include how to withdraw cash from a bank, how to locate a kiosk, and how to deposit and send funds using the kiosk.\u003c/p\u003e\n\n\u003ch2 id=\"reported-impact\"\u003eReported impact\u003c/h2\u003e\n\n\u003cp\u003eThe FBI reported more than $388 million in losses from cryptocurrency kiosk scams in 2025. The losses rose 58% from 2024, while the number of complaints rose 23%. This indicates that the reported financial impact grew substantially year over year based on the FBI’s complaint data.\u003c/p\u003e\n\n\u003cp\u003eOlder adults were heavily represented in the complaint data. The FBI said more than half of the complaints involved individuals over 50. Those victims reported losses of more than $302 million.\u003c/p\u003e\n\n\u003cp\u003eThe article also highlights geographic complaint and loss data. According to the FBI’s complaint data and adjusted losses, Americans from Texas, Florida, and California filed more than 3,300 crypto ATM scam complaints. Those complaints were tied to more than $112 million in estimated losses.\u003c/p\u003e\n\n\u003ch2 id=\"actors-described-in-the-article\"\u003eActors described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article describes the perpetrators as cybercriminals. It says these criminals ask victims to deposit cash into cryptocurrency kiosks that transfer funds to attacker-controlled crypto wallets. No specific criminal group, individual, or named campaign is identified in the article.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that criminals provide detailed instructions to victims. These instructions can cover withdrawing cash, locating a kiosk, and using the kiosk to send funds. The FBI warning focuses on the scam method rather than attributing the activity to a named actor.\u003c/p\u003e\n\n\u003ch2 id=\"government-and-law-enforcement-response\"\u003eGovernment and law enforcement response\u003c/h2\u003e\n\n\u003cp\u003eThe FBI issued a public service announcement warning about the rise in reported losses involving cryptocurrency kiosks. The warning included statistics from IC3 complaint data and recommendations to help people avoid becoming victims.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes recent state-level action against cryptocurrency kiosks. Minnesota lawmakers banned cryptocurrency kiosks statewide earlier this month. Indiana enacted a similar ban in March, and Tennessee followed with a ban in April.\u003c/p\u003e\n\n\u003ch2 id=\"fbi-recommended-protective-measures\"\u003eFBI-recommended protective measures\u003c/h2\u003e\n\n\u003cp\u003eThe FBI shared steps people can take to reduce the risk of falling victim to these scams. The recommendations included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDo not send money to people you only know online.\u003c/li\u003e\n\u003cli\u003eNever scan QR codes or follow payment instructions from unknown individuals.\u003c/li\u003e\n\u003cli\u003eAlways verify phone calls directly.\u003c/li\u003e\n\u003cli\u003eDo not share personal information over the phone.\u003c/li\u003e\n\u003cli\u003eBe wary when anyone claiming to be from the government or law enforcement demands cryptocurrency payments.\u003c/li\u003e\n\u003cli\u003eStop transactions if a kiosk operator warns you of fraud.\u003c/li\u003e\n\u003cli\u003eKeep receipts for cryptocurrency transactions.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"broader-cybercrime-context\"\u003eBroader cybercrime context\u003c/h2\u003e\n\n\u003cp\u003eThe article connects the cryptocurrency kiosk scam data to the FBI’s broader 2025 Internet Crime Report. That report said the FBI received more than 1 million complaints through IC3 last year. Those complaints were linked to almost $21 billion in losses from cyber-enabled crimes.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies examples of those cyber-enabled crimes as investment scams, tech support fraud, and business email compromise. The crypto kiosk scam losses are presented as one part of the larger cybercrime landscape reported to IC3 in 2025.\u003c/p\u003e\n","keyPoints":["The FBI said Americans lost over $388 million in 2025 to scams involving cryptocurrency kiosks, also known as crypto ATMs or Bitcoin ATMs.","The FBI’s Internet Crime Complaint Center received more than 13,400 complaints involving cryptocurrency kiosks in 2025, representing a 23% increase in complaints and a 58% increase in losses from 2024.","More than half of the crypto kiosk scam complaints involved individuals over 50, with reported losses exceeding $302 million.","Criminals commonly instruct victims on how to withdraw cash from a bank, locate a cryptocurrency kiosk, and deposit and send funds through the kiosk.","The FBI advised people not to send money to people they only know online, not to follow payment instructions from unknown individuals, and to be wary of anyone claiming to be from the government or law enforcement who demands cryptocurrency payments."],"insights":["Losses from crypto ATM scams grew much faster than complaint volume in 2025, with losses rising 58% while complaints increased 23% from 2024.","Victims over 50 represented more than half of complaints but accounted for over $302 million of the $388 million in reported losses, indicating they bore a disproportionate share of the financial harm.","Texas, Florida, and California together accounted for over 3,300 complaints and more than $112 million in estimated losses tied to crypto ATM scams.","Several states have recently moved to ban cryptocurrency kiosks, with Minnesota, Indiana, and Tennessee taking action in 2026 after the rise in reported scam losses."],"referencedReports":[{"title":"Public Service Announcement on Cryptocurrency Kiosks","url":"https://www.ic3.gov/PSA/2026/PSA260515-2","publisher":"FBI Internet Crime Complaint Center (IC3)","context":"The article cites an FBI public service announcement warning that reported losses from crypto ATM scams rose nearly 60% in 2025 compared with the previous year.","category":"","primary":false}],"body":"\u003cp\u003eThe FBI said Americans lost more than $388 million in 2025 to scams involving cryptocurrency kiosks, also known as crypto ATMs or Bitcoin ATMs. The Internet Crime Complaint Center received more than 13,400 complaints involving these kiosks. The FBI described this as a 23% increase in complaints and a 58% increase in losses from 2024.\u003c/p\u003e\n\n\u003cp\u003eCryptocurrency kiosks are physical terminals that resemble bank ATMs and allow users to buy or sell crypto assets using cash or debit cards. The article says criminals direct victims to deposit cash into these kiosks, which then transfer the funds to attacker-controlled crypto wallets. In typical complaints, criminals provide detailed instructions on withdrawing cash, locating a kiosk, and sending funds.\u003c/p\u003e\n\n\u003cp\u003eThe impact was especially severe for older victims, with more than half of complaints involving people over 50 and losses over $302 million. The FBI advised people not to send money to people they only know online, not to scan QR codes or follow payment instructions from unknown individuals, and to verify phone calls directly. The article also notes recent statewide bans on cryptocurrency kiosks in Minnesota, Indiana, and Tennessee.\u003c/p\u003e\n"},{"n":12,"title":"Discord rolls out end-to-end encryption on voice, video calls","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/discord-rolls-out-end-to-end-encryption-on-voice-video-calls/","time":"20:37","priority":"SHOULD READ","score":78,"tldr":"Discord has made end-to-end encryption the default for all voice and video calls, including DMs, group DMs, voice channels, and Go Live streams, with stage channels excluded. The company says it has no current plans to extend E2EE to text messages due to major engineering challenges.","briefOverview":"\u003cp\u003eDiscord announced that all voice and video calls on the platform are now protected by default with end-to-end encryption. The implementation was completed in March, and Discord said extensive at-scale testing gave it confidence to formally announce the deployment. The company is also starting to remove client code that supports unencrypted fallback.\u003c/p\u003e\n\n\u003cp\u003eThe rollout was achieved by extending Discord’s open-source DAVE encryption protocol across all supported client platforms. The encryption layer covers DMs, group DMs, voice channels, and Go Live streams, while stage channels remain excluded because they are designed for large public broadcasts rather than private conversations. Discord said no opt-in is required for end-to-end encryption on eligible voice and video calls.\u003c/p\u003e\n\n\u003cp\u003eDAVE uses WebRTC encoded transforms, Messaging Layer Security for scalable group key exchanges, and ephemeral identity keys. Discord said extending DAVE across platforms while preserving low latency was technically challenging. The company also said it currently has no plans to extend DAVE to text-based communications because Discord’s text features were built around non-encrypted messaging assumptions.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDiscord announced that all voice and video calls through its communication platform are now protected by default with end-to-end encryption. The implementation was completed in March, but Discord waited until after extensive at-scale testing to formally announce the deployment. The company is now beginning to remove client code that supports unencrypted fallback.\u003c/p\u003e\n\n\u003cp\u003eDiscord is described as a popular platform for text chat, voice calls, video calls, livestreaming, and community servers for gaming, creators, businesses, and interest-based groups. The article cites estimates that Discord has 690 million registered users and more than 200 million monthly active users worldwide. The affected communications include DMs, group DMs, voice channels, and Go Live streams.\u003c/p\u003e\n\n\u003cp\u003eThe migration was achieved by extending Discord’s open-source DAVE encryption protocol to all platforms where Discord clients run. These include desktop, mobile, web browsers, PlayStation, Xbox, and Discord SDKs. Stage channels are the only exception because they are designed for large public broadcasts rather than private conversations.\u003c/p\u003e\n\n\u003cp\u003eDAVE was first introduced in September 2024 and was developed with assistance and auditing from Trail of Bits. The protocol uses WebRTC encoded transforms, Messaging Layer Security for scalable group key exchanges, and ephemeral identity keys. Discord said these choices are intended to enhance privacy while minimizing call disruptions and latency when participants join or leave sessions.\u003c/p\u003e\n\n\u003cp\u003eDiscord highlighted the technical challenges of extending DAVE to all supported platforms while maintaining low latency so the migration would be unnoticeable to users. One example involved a Firefox compatibility issue, which Discord engineers worked with Mozilla to resolve rather than using a workaround or limiting browser support. The article does not identify any malicious actors or security incident tied to the rollout.\u003c/p\u003e\n\n\u003cp\u003eDiscord said it currently has no plans to extend DAVE to text-based communications. The company attributed this to major engineering challenges because Discord’s text features were built from the ground up around non-encrypted messaging assumptions. The disclosed response is focused on completing the voice and video E2EE rollout and removing unencrypted fallback code.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eDiscord announced that all voice and video calls through its platform are now protected by default with end-to-end encryption. The implementation was completed in March, and Discord said extensive at-scale testing gave it confidence to formally announce the deployment. The company is also beginning to remove client code that supports unencrypted fallback.\u003c/p\u003e\n\n\u003cp\u003eDiscord stated that end-to-end encryption is now standard for every voice and video call on Discord outside of stage channels. No user opt-in is required for the protection to apply to covered calls.\u003c/p\u003e\n\n\u003ch2 id=\"scope-of-the-rollout\"\u003eScope of the Rollout\u003c/h2\u003e\n\n\u003cp\u003eThe encryption layer now covers several Discord communication modes:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDMs\u003c/li\u003e\n\u003cli\u003eGroup DMs\u003c/li\u003e\n\u003cli\u003eVoice channels\u003c/li\u003e\n\u003cli\u003eGo Live streams\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eStage channels remain the only exception. Discord excludes them because they are designed for large public broadcasts rather than private conversations.\u003c/p\u003e\n\n\u003ch2 id=\"platform-coverage\"\u003ePlatform Coverage\u003c/h2\u003e\n\n\u003cp\u003eDiscord completed the migration by extending its open-source DAVE encryption protocol to all platforms where Discord clients run. The article lists the supported environments as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eDesktop\u003c/li\u003e\n\u003cli\u003eMobile\u003c/li\u003e\n\u003cli\u003eWeb browsers\u003c/li\u003e\n\u003cli\u003ePlayStation\u003c/li\u003e\n\u003cli\u003eXbox\u003c/li\u003e\n\u003cli\u003eDiscord SDKs\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis means the end-to-end encryption rollout applies broadly across Discord’s supported voice and video calling ecosystem rather than only to selected client types.\u003c/p\u003e\n\n\u003ch2 id=\"technical-foundation\"\u003eTechnical Foundation\u003c/h2\u003e\n\n\u003cp\u003eDAVE was first introduced in September 2024. It was developed with assistance and auditing from Trail of Bits to secure audio and video calls, group chats, voice channels, and Go Live streams on Discord.\u003c/p\u003e\n\n\u003cp\u003eThe protocol uses several technical components:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWebRTC encoded transforms\u003c/li\u003e\n\u003cli\u003eMessaging Layer Security for scalable group key exchanges\u003c/li\u003e\n\u003cli\u003eEphemeral identity keys\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAccording to the article, these mechanisms are used to enhance privacy while minimizing call disruptions and latency when participants join or leave sessions.\u003c/p\u003e\n\n\u003ch2 id=\"deployment-and-testing\"\u003eDeployment and Testing\u003c/h2\u003e\n\n\u003cp\u003eAlthough the implementation was completed in March, Discord formally announced it after extensive at-scale testing. The company said that testing gave it confidence in the deployment. Discord is now starting to remove client code that supports unencrypted fallback.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Discord aimed to make the migration unnoticeable for users. Low latency was a key technical requirement, alongside broad platform support.\u003c/p\u003e\n\n\u003ch2 id=\"engineering-challenges\"\u003eEngineering Challenges\u003c/h2\u003e\n\n\u003cp\u003eDiscord highlighted the technical difficulty of extending DAVE availability to all supported platforms. Maintaining low latency while applying end-to-end encryption across desktop, mobile, browsers, consoles, and SDKs was presented as a major challenge.\u003c/p\u003e\n\n\u003cp\u003eOne specific example involved a compatibility issue with Firefox. Instead of implementing a workaround or limiting browser support, Discord engineers worked with Mozilla to resolve the problem.\u003c/p\u003e\n\n\u003ch2 id=\"user-and-platform-context\"\u003eUser and Platform Context\u003c/h2\u003e\n\n\u003cp\u003eDiscord is described as a popular online platform offering text chat, voice calls, video calls, livestreaming, and community servers. It serves gaming, creator, business, and interest-based communities.\u003c/p\u003e\n\n\u003cp\u003eThe article cites estimates that Discord has 690 million registered users and more than 200 million monthly active users worldwide. This makes the end-to-end encryption rollout significant in scale because it affects a large global user base using Discord’s voice and video features.\u003c/p\u003e\n\n\u003ch2 id=\"text-communications\"\u003eText Communications\u003c/h2\u003e\n\n\u003cp\u003eDiscord said there are currently no plans to extend DAVE to text-based communications. The reason given is that major engineering challenges would obstruct such a move.\u003c/p\u003e\n\n\u003cp\u003eAccording to Discord, its text features were built from the ground up around non-encrypted messaging assumptions. The article does not describe a timeline or plan for bringing end-to-end encryption to text chats.\u003c/p\u003e\n\n\u003ch2 id=\"actors-and-impact\"\u003eActors and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe article does not identify any malicious actors, exploitation activity, or security incident connected to this announcement. The named organizations involved are Discord, Trail of Bits, and Mozilla.\u003c/p\u003e\n\n\u003cp\u003eTrail of Bits is referenced as having assisted with and audited DAVE when it was introduced. Mozilla is referenced because Discord engineers worked with it to resolve a Firefox compatibility issue.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed impact is that eligible Discord voice and video communications are now end-to-end encrypted by default. Stage channels remain excluded, and text-based communications are not currently planned for DAVE encryption.\u003c/p\u003e\n","keyPoints":["Discord announced that all voice and video calls on the platform are now protected by default with end-to-end encryption.","The end-to-end encryption implementation was completed in March, and Dis
