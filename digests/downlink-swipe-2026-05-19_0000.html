 platform Douqiu.\u003c/p\u003e\n","keyPoints":["Cybersecurity researchers found that Nx Console extension rwl.angular-console version 18.95.0 on the Microsoft Visual Studio Code Marketplace was compromised.","The compromised extension fetched and executed an obfuscated payload from an orphan commit inside the official nrwl/nx GitHub repository when a developer opened any workspace.","The payload was a multi-stage credential stealer that harvested developer secrets and exfiltrated them via HTTPS, the GitHub API, and DNS tunneling.","The Nx maintainers said the breach stemmed from a developer machine compromise that leaked GitHub credentials, which were used to push the malicious orphaned commit.","Affected users were advised to update to version 18.100.0 or later, remove listed artifacts, terminate suspicious processes, and rotate credentials reachable from the affected machine."],"insights":["The exposure window for the malicious Nx Console version was only 11 minutes, from May 18, 2026, 2:36 p.m. to 2:47 p.m. CEST, but the maintainers still said a few users were compromised.","The Open VSX version of Nx Console was not affected, making the incident specific to the VS Code Marketplace distribution of the extension.","The payload included Sigstore integration, Fulcio certificate issuance, and SLSA provenance generation, which StepSecurity said could let attackers publish downstream npm packages with valid signed provenance attestations if they also stole npm OIDC tokens.","The malware avoided infecting machines likely located in Russian or CIS time zones and installed a macOS Python backdoor that used the GitHub Search API as a dead drop resolver for receiving further commands.","The compromise was triggered simply by opening any workspace in VS Code with the affected extension installed, rather than requiring the developer to run a project command or install an additional package."],"referencedReports":[{"title":"Nx Console VS Code Extension Compromised","url":"https://www.stepsecurity.io/blog/nx-console-vs-code-extension-compromised","publisher":"StepSecurity","context":"The article cites StepSecurity’s analysis of the compromised Nx Console extension and quotes researcher Ashish Kurmi on how the payload was fetched and executed.","category":"","primary":false},{"title":"Compromised Nx Console VS Code Extension Advisory","url":"https://github.com/nrwl/nx-console/security/advisories/GHSA-c9j4-9m59-847w","publisher":"Nx Console maintainers","context":"The article references this advisory for the stated root cause, indicators of compromise, and remediation guidance.","category":"","primary":false},{"title":"Supply Chain Security Alert: Popular Nx Build System Package Compromised with Data-Stealing Malware","url":"https://www.stepsecurity.io/blog/supply-chain-security-alert-popular-nx-build-system-package-compromised-with-data-stealing-malware","publisher":"StepSecurity","context":"The article links to this prior StepSecurity report while noting that the Nx ecosystem had also been targeted in August 2025.","category":"","primary":false},{"title":"Malicious npm Packages Target Claude Code Hooks","url":"https://safedep.io/malicious-npm-packages-claude-code-hooks/","publisher":"SafeDep","context":"The article cites this analysis in its list of malicious npm packages, describing five packages that used a hidden ELF binary to backdoor Claude Code sessions.","category":"","primary":false},{"title":"Malicious noon-contracts npm DeFi RAT","url":"https://safedep.io/malicious-noon-contracts-npm-defi-rat/","publisher":"SafeDep","context":"The article references this SafeDep analysis while describing a malicious npm package impersonating a Noon Protocol smart contract SDK.","category":"","primary":false},{"title":"Malicious martinez-polygon-clipping-tony npm Telegram RAT","url":"https://safedep.io/malicious-martinez-polygon-clipping-tony-npm-telegram-rat/","publisher":"SafeDep","context":"The article cites this analysis for a trojanized fork that downloaded a Windows RAT using Telegram for command-and-control.","category":"","primary":false},{"title":"Malicious common-tg-service npm Telegram Hijacking Framework","url":"https://safedep.io/malicious-common-tg-service-npm-telegram-hijacking-framework/","publisher":"SafeDep","context":"The article references this report for an npm package that could take over a victim’s Telegram account.","category":"","primary":false},{"title":"Malicious exiouss npm Exam Cheating Tool","url":"https://safedep.io/malicious-exiouss-npm-exam-cheating-tool/","publisher":"SafeDep","context":"The article cites this analysis for an npm package that bundled a ChatGPT and OpenAI session cookie stealer.","category":"","primary":false},{"title":"Mapping the Infrastructure Behind the Kube-Health-Tools Supply Chain Malware","url":"https://panther.com/blog/mapping-the-infrastructure-behind-the-kube-health-tools-supply-chain-malware","publisher":"Panther","context":"The article references this Panther analysis for npm packages tied to the kube-health-tools cluster.","category":"","primary":false},{"title":"Tunnel Vision: Supply Chain Attack Targets Kubernetes via npm and PyPI","url":"https://panther.com/blog/tunnel-vision-supply-chain-attack-targets-kubernetes-via-npm-and-pypi","publisher":"Panther","context":"The article links to this Panther analysis while describing the broader kube-health-tools supply chain malware cluster.","category":"","primary":false},{"title":"Frankly Malicious: Inside a 38-Package npm Supply Chain Campaign Targeting Tech Giants","url":"https://panther.com/blog/frankly-malicious-inside-a-38-package-npm-supply-chain-campaign-targeting-tech-giants","publisher":"Panther","context":"The article cites this report for a coordinated credential harvesting campaign involving 38 npm packages and dependency confusion.","category":"","primary":false},{"title":"4 Years, 51 Packages, 3 Organizations: How npm Became a Gambling Ring’s Config Server","url":"https://panther.com/blog/4-years-51-packages-3-organizations-how-npm-became-a-gambling-ring-s-config-server","publisher":"Panther","context":"The article references this Panther analysis for npm packages under the @hd-team organization used as stagers for Douqiu configuration data.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers flagged a compromised version of the Nx Console extension published to the Microsoft Visual Studio Code Marketplace. The affected extension was rwl.angular-console version 18.95.0, a popular UI and plugin for VS Code, Cursor, and JetBrains with more than 2.2 million VS Code installations. The Open VSX version was not affected.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity said the compromised extension fetched and executed a 498 KB obfuscated payload from a dangling orphan commit inside the official nrwl/nx GitHub repository within seconds of a developer opening any workspace. The payload was described as a multi-stage credential stealer and supply chain poisoning tool that exfiltrated secrets via HTTPS, the GitHub API, and DNS tunneling. It also installed a Python backdoor on macOS systems using the GitHub Search API as a dead drop resolver.\u003c/p\u003e\n\n\u003cp\u003eNx maintainers said the root cause was a developer machine compromise that leaked GitHub credentials, which were then used to push the malicious orphaned commit. The exposure window for version 18.95.0 was May 18, 2026, from 2:36 p.m. to 2:47 p.m. CEST, and the maintainers said a few users were compromised. Users were urged to update to version 18.100.0 or later, remove listed artifacts, terminate suspicious processes, and rotate all credentials reachable from the affected machine.\u003c/p\u003e\n"},{"n":25,"title":"Compromised atool npm Account Delivers CI/CD Credential Stealer Across 24 Packages (echarts-for-react package, timeago.js)","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/compromised-atool-npm-account-delivers-ci-cd-credential-stealer-across-24-packages-echarts-for-react-package-timeago-js","time":"04:33","priority":"MUST READ","score":93,"tldr":"The npm account atool was compromised to publish malicious versions of timeago.js, echarts-for-react, and many AntV-related packages that target CI/CD environments to steal credentials. Teams using these packages should immediately check for affected versions, remove them, and rotate any exposed secrets.","briefOverview":"\u003cp\u003eThe article describes a compromise of the npm account \u003ccode\u003eatool\u003c/code\u003e, which is associated with the email \u003ccode\u003ei@hust.cc\u003c/code\u003e. This account is the primary publisher of \u003ccode\u003etimeago.js\u003c/code\u003e, a JavaScript relative time formatting library with over 1.5 million weekly downloads. The title states that the compromise delivered a CI/CD credential stealer across packages including \u003ccode\u003eecharts-for-react\u003c/code\u003e and \u003ccode\u003etimeago.js\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe account also belongs to the AntV maintainer team, which is tied to Alibaba’s open-source data visualization ecosystem. The article says AntV packages cover graph visualization, 2D rendering, charting, map visualization, and spreadsheet rendering. It notes that individual AntV packages receive between 50,000 and 2,000,000 weekly downloads.\u003c/p\u003e\n\n\u003cp\u003eThe article lists compromised versions across a large set of packages, including \u003ccode\u003etimeago.js\u003c/code\u003e, \u003ccode\u003etimeago-react\u003c/code\u003e, \u003ccode\u003eecharts-for-react\u003c/code\u003e, testing utilities, linting tools, MCP packages, and many \u003ccode\u003e@antv/*\u003c/code\u003e packages. It states that these packages are installed in environments such as data engineering pipelines, financial dashboards, front-end builds, and enterprise data platforms. The article highlights CI/CD environments such as GitHub Actions, GitLab CI, and Kubernetes-hosted pipelines as especially sensitive because they may hold elevated cloud credentials.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article reports that the npm account \u003ccode\u003eatool\u003c/code\u003e, associated with \u003ccode\u003ei@hust.cc\u003c/code\u003e, was compromised. The account is described as the primary publisher of \u003ccode\u003etimeago.js\u003c/code\u003e, a relative time formatting JavaScript library with more than 1.5 million weekly downloads. The title characterizes the compromise as delivering a CI/CD credential stealer through compromised npm packages, including \u003ccode\u003eecharts-for-react\u003c/code\u003e and \u003ccode\u003etimeago.js\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe significance of the account compromise is increased by the account’s role in the AntV maintainer team. AntV is described as Alibaba’s open-source data visualization ecosystem, covering packages for graph visualization, 2D rendering, charting, map visualization, and spreadsheet rendering. The article names examples such as \u003ccode\u003e@antv/g6\u003c/code\u003e, \u003ccode\u003e@antv/g\u003c/code\u003e, \u003ccode\u003e@antv/g2\u003c/code\u003e, \u003ccode\u003e@antv/g2plot\u003c/code\u003e, \u003ccode\u003e@antv/l7\u003c/code\u003e, and \u003ccode\u003e@antv/s2\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article presents a long list of compromised package versions. These include non-AntV packages such as \u003ccode\u003etimeago.js\u003c/code\u003e, \u003ccode\u003etimeago-react\u003c/code\u003e, \u003ccode\u003eecharts-for-react\u003c/code\u003e, \u003ccode\u003ejest-canvas-mock\u003c/code\u003e, \u003ccode\u003ejest-date-mock\u003c/code\u003e, \u003ccode\u003esize-sensor\u003c/code\u003e, \u003ccode\u003ecanvas-nest.js\u003c/code\u003e, \u003ccode\u003efilesize.js\u003c/code\u003e, \u003ccode\u003eonfire.js\u003c/code\u003e, \u003ccode\u003erelationship.js\u003c/code\u003e, \u003ccode\u003eribbon.js\u003c/code\u003e, \u003ccode\u003eslice.js\u003c/code\u003e, \u003ccode\u003eword-width\u003c/code\u003e, \u003ccode\u003elint-md\u003c/code\u003e, \u003ccode\u003elint-md-cli\u003c/code\u003e, \u003ccode\u003emcp-echarts\u003c/code\u003e, and \u003ccode\u003emcp-mermaid\u003c/code\u003e. It also includes many packages under the \u003ccode\u003e@antv\u003c/code\u003e scope.\u003c/p\u003e\n\n\u003cp\u003eThe AntV-related affected packages span many parts of the ecosystem. The article lists compromised versions for packages including \u003ccode\u003e@antv/g\u003c/code\u003e, \u003ccode\u003e@antv/g2\u003c/code\u003e, \u003ccode\u003e@antv/g2plot\u003c/code\u003e, \u003ccode\u003e@antv/g6\u003c/code\u003e, \u003ccode\u003e@antv/l7\u003c/code\u003e, \u003ccode\u003e@antv/s2\u003c/code\u003e, \u003ccode\u003e@antv/x6\u003c/code\u003e, \u003ccode\u003e@antv/util\u003c/code\u003e, \u003ccode\u003e@antv/vendor\u003c/code\u003e, and numerous related renderer, plugin, map, chart, layout, and framework integration packages. The article also includes \u003ccode\u003e@lint-md/cli\u003c/code\u003e, \u003ccode\u003e@lint-md/core\u003c/code\u003e, and \u003ccode\u003e@lint-md/parser\u003c/code\u003e in the compromised package list.\u003c/p\u003e\n\n\u003cp\u003eThe article says these packages are installed in data engineering pipelines, financial dashboards, React, Vue, and Angular front-end builds, and enterprise data platforms. It also states that many such environments run inside GitHub Actions, GitLab CI, or Kubernetes-hosted CI/CD pipelines. The stated risk is that these pipelines may hold elevated cloud credentials, making the compromise a high-value supply chain target.\u003c/p\u003e\n\n\u003cp\u003eThe article does not identify a specific threat actor, attacker group, or attribution for the compromise. It also does not describe remediation steps, package removal status, or a detailed incident response timeline in the provided content. Its disclosed impact is centered on the compromised npm account, the affected package versions, and the exposure of CI/CD environments that may contain elevated credentials.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a supply chain compromise involving the npm account \u003ccode\u003eatool\u003c/code\u003e, associated with the email address \u003ccode\u003ei@hust.cc\u003c/code\u003e. The account is the primary publisher of \u003ccode\u003etimeago.js\u003c/code\u003e, a JavaScript library used for relative time formatting such as displaying “3 hours ago.” The article states that \u003ccode\u003etimeago.js\u003c/code\u003e has more than 1.5 million weekly downloads.\u003c/p\u003e\n\n\u003cp\u003eThe title states that the compromised \u003ccode\u003eatool\u003c/code\u003e npm account delivered a CI/CD credential stealer across packages including \u003ccode\u003eecharts-for-react\u003c/code\u003e and \u003ccode\u003etimeago.js\u003c/code\u003e. The article’s content focuses on the account’s role, the ecosystems it reaches, and a long list of compromised package versions. It frames the incident as a high-value supply chain compromise because the affected packages are used in environments that may contain elevated cloud credentials.\u003c/p\u003e\n\n\u003ch2 id=\"account-and-ecosystem-context\"\u003eAccount and Ecosystem Context\u003c/h2\u003e\n\n\u003cp\u003eThe \u003ccode\u003eatool\u003c/code\u003e npm account is significant because it is not only tied to \u003ccode\u003etimeago.js\u003c/code\u003e, but is also a member of the AntV maintainer team. AntV is described as Alibaba’s open-source data visualization ecosystem. The ecosystem includes packages for graph visualization, 2D rendering, charting, map visualization, and spreadsheet rendering.\u003c/p\u003e\n\n\u003cp\u003eThe article names several major AntV packages and components, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e@antv/g6\u003c/code\u003e for graph visualization.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@antv/g\u003c/code\u003e for 2D rendering.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@antv/g2\u003c/code\u003e and \u003ccode\u003e@antv/g2plot\u003c/code\u003e for charting.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@antv/l7\u003c/code\u003e for map visualization.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e@antv/s2\u003c/code\u003e for spreadsheet rendering.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that individual AntV packages receive between 50,000 and 2,000,000 weekly downloads. This means the compromised account had publishing access or maintainer relevance across packages with substantial usage, according to the article.\u003c/p\u003e\n\n\u003ch2 id=\"affected-environments\"\u003eAffected Environments\u003c/h2\u003e\n\n\u003cp\u003eThe article says the affected packages are used in multiple types of software and business environments. These include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eData engineering pipelines.\u003c/li\u003e\n\u003cli\u003eFinancial dashboards.\u003c/li\u003e\n\u003cli\u003eReact, Vue, and Angular front-end builds.\u003c/li\u003e\n\u003cli\u003eEnterprise data platforms.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that many environments installing these packages run inside CI/CD infrastructure. It specifically names GitHub Actions, GitLab CI, and Kubernetes-hosted CI/CD pipelines. The article states that these pipelines can hold elevated cloud credentials, making them a high-value target for a supply chain attacker.\u003c/p\u003e\n\n\u003ch2 id=\"compromised-packages-and-versions\"\u003eCompromised Packages and Versions\u003c/h2\u003e\n\n\u003cp\u003eThe article includes a large list of compromised package versions. It begins with non-AntV packages and then lists many packages in the AntV ecosystem. The title refers to 24 packages, while the package list shown in the article includes “Show all 143 packages (138 more),” and the visible content lists many more than 24 package entries.\u003c/p\u003e\n\n\u003ch3 id=\"non-antv-packages-listed-as-compromised\"\u003eNon-AntV packages listed as compromised\u003c/h3\u003e\n\n\u003cp\u003eThe article lists compromised versions for several non-AntV packages, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003etimeago.js\u003c/code\u003e versions \u003ccode\u003e4.1.2\u003c/code\u003e and \u003ccode\u003e4.2.2\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003etimeago-react\u003c/code\u003e versions \u003ccode\u003e3.1.7\u003c/code\u003e and \u003ccode\u003e3.2.7\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eecharts-for-react\u003c/code\u003e versions \u003ccode\u003e3.0.7\u003c/code\u003e, \u003ccode\u003e3.1.7\u003c/code\u003e, and \u003ccode\u003e3.2.7\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ejest-canvas-mock\u003c/code\u003e versions \u003ccode\u003e2.5.3\u003c/code\u003e, \u003ccode\u003e2.6.3\u003c/code\u003e, and \u003ccode\u003e2.7.3\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ejest-date-mock\u003c/code\u003e versions \u003ccode\u003e1.0.11\u003c/code\u003e, \u003ccode\u003e1.1.11\u003c/code\u003e, and \u003ccode\u003e1.2.11\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003esize-sensor\u003c/code\u003e versions \u003ccode\u003e1.0.4\u003c/code\u003e, \u003ccode\u003e1.1.4\u003c/code\u003e, and \u003ccode\u003e1.2.4\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ecanvas-nest.js\u003c/code\u003e versions \u003ccode\u003e2.1.4\u003c/code\u003e and \u003ccode\u003e2.2.4\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003efilesize.js\u003c/code\u003e versions \u003ccode\u003e2.1.0\u003c/code\u003e and \u003ccode\u003e2.2.0\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eonfire.js\u003c/code\u003e versions \u003ccode\u003e2.1.1\u003c/code\u003e and \u003ccode\u003e2.2.1\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003erelationship.js\u003c/code\u003e versions \u003ccode\u003e1.3.9\u003c/code\u003e and \u003ccode\u003e1.4.9\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eribbon.js\u003c/code\u003e version \u003ccode\u003e1.1.2\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eslice.js\u003c/code\u003e versions \u003ccode\u003e1.2.1\u003c/code\u003e and \u003ccode\u003e1.3.1\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eword-width\u003c/code\u003e versions \u003ccode\u003e1.1.1\u003c/code\u003e and \u003ccode\u003e1.2.1\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003elint-md\u003c/code\u003e versions \u003ccode\u003e0.3.0\u003c/code\u003e and \u003ccode\u003e0.4.0\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003elint-md-cli\u003c/code\u003e versions \u003ccode\u003e0.2.2\u003c/code\u003e and \u003ccode\u003e0.3.2\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003emcp-echarts\u003c/code\u003e versions \u003ccode\u003e0.8.1\u003c/code\u003e and \u003ccode\u003e0.9.1\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003emcp-mermaid\u003c/code\u003e versions \u003ccode\u003e0.5.1\u003c/code\u003e and \u003ccode\u003e0.6.1\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"antv-packages-listed-as-compromised\"\u003eAntV packages listed as compromised\u003c/h3\u003e\n\n\u003cp\u003eThe article also lists compromised versions for many \u003ccode\u003e@antv/*\u003c/code\u003e packages. These include packages from multiple parts of the AntV ecosystem, such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCore visualization and charting packages including \u003ccode\u003e@antv/g\u003c/code\u003e, \u003ccode\u003e@antv/g2\u003c/code\u003e, \u003ccode\u003e@antv/g2plot\u003c/code\u003e, \u003ccode\u003e@antv/g6\u003c/code\u003e, \u003ccode\u003e@antv/f2\u003c/code\u003e, \u003ccode\u003e@antv/l7\u003c/code\u003e, \u003ccode\u003e@antv/s2\u003c/code\u003e, and \u003ccode\u003e@antv/x6\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eRendering and graphics-related packages including \u003ccode\u003e@antv/g-canvas\u003c/code\u003e, \u003ccode\u003e@antv/g-svg\u003c/code\u003e, \u003ccode\u003e@antv/g-webgl\u003c/code\u003e, \u003ccode\u003e@antv/g-webgpu\u003c/code\u003e, \u003ccode\u003e@antv/g-lite\u003c/code\u003e, and multiple \u003ccode\u003e@antv/g-plugin-*\u003c/code\u003e packages.\u003c/li\u003e\n\u003cli\u003eMap and geospatial visualization packages including \u003ccode\u003e@antv/l7-component\u003c/code\u003e, \u003ccode\u003e@antv/l7-core\u003c/code\u003e, \u003ccode\u003e@antv/l7-draw\u003c/code\u003e, \u003ccode\u003e@antv/l7-layers\u003c/code\u003e, \u003ccode\u003e@antv/l7-map\u003c/code\u003e, \u003ccode\u003e@antv/l7-maps\u003c/code\u003e, \u003ccode\u003e@antv/l7-react\u003c/code\u003e, \u003ccode\u003e@antv/l7-renderer\u003c/code\u003e, \u003ccode\u003e@antv/l7-scene\u003c/code\u003e, \u003ccode\u003e@antv/l7-source\u003c/code\u003e, \u003ccode\u003e@antv/l7-three\u003c/code\u003e, \u003ccode\u003e@antv/l7-utils\u003c/code\u003e, \u003ccode\u003e@antv/l7plot\u003c/code\u003e, and \u003ccode\u003e@antv/larkmap\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eFramework integration packages including \u003ccode\u003e@antv/f-react\u003c/code\u003e, \u003ccode\u003e@antv/f-vue\u003c/code\u003e, \u003ccode\u003e@antv/s2-react\u003c/code\u003e, \u003ccode\u003e@antv/s2-vue\u003c/code\u003e, \u003ccode\u003e@antv/x6-angular-shape\u003c/code\u003e, \u003ccode\u003e@antv/x6-react-shape\u003c/code\u003e, \u003ccode\u003e@antv/x6-vue-shape\u003c/code\u003e, and \u003ccode\u003e@antv/x6-vue3-shape\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eUtility and supporting packages including \u003ccode\u003e@antv/util\u003c/code\u003e, \u003ccode\u003e@antv/vendor\u003c/code\u003e, \u003ccode\u003e@antv/matrix-util\u003c/code\u003e, \u003ccode\u003e@antv/path-util\u003c/code\u003e, \u003ccode\u003e@antv/scale\u003c/code\u003e, \u003ccode\u003e@antv/color-util\u003c/code\u003e, \u003ccode\u003e@antv/dom-util\u003c/code\u003e, \u003ccode\u003e@antv/event-emitter\u003c/code\u003e, \u003ccode\u003e@antv/expr\u003c/code\u003e, and \u003ccode\u003e@antv/graphlib\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article provides exact compromised versions for each listed package. Many packages are shown with two compromised versions, while some have one or three compromised versions.\u003c/p\u003e\n\n\u003ch2 id=\"technical-detail-provided\"\u003eTechnical Detail Provided\u003c/h2\u003e\n\n\u003cp\u003eThe technical details in the provided article are primarily the compromised package names and versions. The title describes the payload as a “CI/CD Credential Stealer,” but the article content shown does not provide code-level behavior, command execution details, network indicators, domains, hashes, or exfiltration mechanics. The content also does not include a detailed timeline of publication, discovery, removal, or containment.\u003c/p\u003e\n\n\u003cp\u003eThe most concrete technical information is the package-version mapping. This is important because the article identifies specific compromised versions rather than only naming affected packages. Examples include \u003ccode\u003etimeago.js\u003c/code\u003e versions \u003ccode\u003e4.1.2\u003c/code\u003e and \u003ccode\u003e4.2.2\u003c/code\u003e, \u003ccode\u003eecharts-for-react\u003c/code\u003e versions \u003ccode\u003e3.0.7\u003c/code\u003e, \u003ccode\u003e3.1.7\u003c/code\u003e, and \u003ccode\u003e3.2.7\u003c/code\u003e, and extensive sets of \u003ccode\u003e@antv/*\u003c/code\u003e versions across adjacent release lines.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-potential-impact-stated-in-the-article\"\u003eAffected Parties and Potential Impact Stated in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies affected parties mainly by ecosystem and environment rather than by individual organizations. The affected package users include teams or systems installing JavaScript packages in data engineering pipelines, dashboards, front-end builds, and enterprise platforms. AntV users are especially relevant because the compromised account is described as a member of the AntV maintainer team.\u003c/p\u003e\n\n\u003cp\u003eThe impact described in the article is centered on CI/CD credential exposure. The article states that many environments using these packages run in GitHub Actions, GitLab CI, or Kubernetes-hosted CI/CD pipelines. It further states that those pipelines may hold elevated cloud credentials.\u003c/p\u003e\n\n\u003ch2 id=\"actors-and-attribution\"\u003eActors and Attribution\u003c/h2\u003e\n\n\u003cp\u003eThe article does not identify a specific threat actor, attacker group, or individual responsible for the compromise. It only states that the \u003ccode\u003eatool\u003c/code\u003e npm account was compromised. The article describes the attacker in generic terms as a supply chain attacker.\u003c/p\u003e\n\n\u003ch2 id=\"response-or-remediation-information\"\u003eResponse or Remediation Information\u003c/h2\u003e\n\n\u003cp\u003eThe provided article content does not describe remediation steps, package takedowns, patched versions, account recovery, maintainer response, npm response, credential rotation, or incident handling actions. It does provide the compromised package versions, which are the main actionable details included in the text. No third-party advisory, research report, or linked technical analysis is present in the provided article content.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe central point of the article is that the compromise of the \u003ccode\u003eatool\u003c/code\u003e npm account affected \u003ccode\u003etimeago.js\u003c/code\u003e, \u003ccode\u003eecharts-for-react\u003c/code\u003e, and a broad set of AntV-related npm packages. Because these packages are used in CI/CD-connected development and enterprise environments, the article frames the compromise as a serious supply chain risk involving potential access to elevated cloud credentials.\u003c/p\u003e\n","keyPoints":["The npm account atool, associated with the email i@hust.cc, is the primary publisher of timeago.js, which has over 1.5 million weekly downloads.","The atool account is also a member of the AntV maintainer team, which publishes data visualization packages including @antv/g6, @antv/g, @antv/g2, @antv/g2plot, @antv/l7, and @antv/s2.","The article lists compromised versions for timeago.js, timeago-react, echarts-for-react, jest-canvas-mock, jest-date-mock, size-sensor, and many AntV packages.","The affected packages are used in environments such as data engineering pipelines, financial dashboards, front-end builds, and enterprise data platforms.","The article states that many environments installing these packages run inside GitHub Actions, GitLab CI, or Kubernetes-hosted CI/CD pipelines that may hold elevated cloud credentials."],"insights":["The compromise of a single npm account, atool, affected both the high-download standalone package timeago.js and a broad set of AntV ecosystem packages because the account was also part of the AntV maintainer team.","The article’s title refers to 24 packages, but the affected package list states “Show all 143 packages,” indicating the impact described in the content is broader than the title suggests.","Many compromised packages are data visualization or front-end build dependencies, which the article says are commonly installed in CI/CD environments such as GitHub Actions, GitLab CI, and Kubernetes-hosted pipelines.","The compromised versions often appear as paired releases across adjacent minor versions, such as timeago.js 4.1.2 and 4.2.2 or echarts-for-react 3.0.7, 3.1.7, and 3.2.7, making exact version matching important when checking dependency manifests and lockfiles."],"referencedReports":[],"body":"\u003cp\u003eThe article describes a compromise of the npm account \u003ccode\u003eatool\u003c/code\u003e, which is associated with the email \u003ccode\u003ei@hust.cc\u003c/code\u003e. This account is the primary publisher of \u003ccode\u003etimeago.js\u003c/code\u003e, a JavaScript relative time formatting library with over 1.5 million weekly downloads. The title states that the compromise delivered a CI/CD credential stealer across packages including \u003ccode\u003eecharts-for-react\u003c/code\u003e and \u003ccode\u003etimeago.js\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe account also belongs to the AntV maintainer team, which is tied to Alibaba’s open-source data visualization ecosystem. The article says AntV packages cover graph visualization, 2D rendering, charting, map visualization, and spreadsheet rendering. It notes that individual AntV packages receive between 50,000 and 2,000,000 weekly downloads.\u003c/p\u003e\n\n\u003cp\u003eThe article lists compromised versions across a large set of packages, including \u003ccode\u003etimeago.js\u003c/code\u003e, \u003ccode\u003etimeago-react\u003c/code\u003e, \u003ccode\u003eecharts-for-react\u003c/code\u003e, testing utilities, linting tools, MCP packages, and many \u003ccode\u003e@antv/*\u003c/code\u003e packages. It states that these packages are installed in environments such as data engineering pipelines, financial dashboards, front-end builds, and enterprise data platforms. The article highlights CI/CD environments such as GitHub Actions, GitLab CI, and Kubernetes-hosted pipelines as especially sensitive because they may hold elevated cloud credentials.\u003c/p\u003e\n"},{"n":3,"title":"Microsoft disrupts Fox Tempest malware-signing-as-a-service platform tied to ransomware gangs","source":"therecord.media","sourceColor":"#a78bfa","link":"https://therecord.media/microsoft-disrupts-fox-tempest-malware-signing-service","time":"16:36","priority":"MUST READ","score":92,"tldr":"Microsoft disrupted Fox Tempest, a malware-signing-as-a-service platform that abused Microsoft Artifact Signing to make ransomware and other malware appear legitimate and bypass security tools. The operation had issued over 1,000 fraudulent certificates and was used by affiliates of gangs including Rhysida, INC, Qilin and Akira.","briefOverview":"\u003cp\u003eMicrosoft said it disrupted Fox Tempest, a malware-signing-as-a-service platform that helped cybercriminals make malware appear like legitimate software. The company unsealed a legal case in U.S. District Court detailing the operation, which it said had been active since May 2025. Microsoft said the service was used to deliver malware, enable ransomware, infect thousands of machines, and compromise networks worldwide.\u003c/p\u003e\n\n\u003cp\u003eFox Tempest abused Microsoft Artifact Signing to create short-lived fraudulent code-signing certificates that helped malicious software pass security checks. Microsoft said ransomware affiliates tied to groups including Rhysida, INC, Qilin, and Akira used the service to sign malware and distribute it through fake websites posing as legitimate software platforms. The malware was made to resemble legitimate tools such as AnyDesk, Teams, Putty, and Webex.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft seized Fox Tempest’s website, took hundreds of virtual machines offline, blocked access to a site hosting underlying code, and revoked more than 1,000 code-signing certificates attributed to the group. The company said Fox Tempest had created over a thousand certificates and hundreds of Azure tenants and subscriptions. Microsoft also said cryptocurrency analysis showed the operation was paid millions of dollars by ransomware affiliates.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft said it took down a critical service used by cybercriminals to make malware look like legitimate software. The company unsealed a legal case in U.S. District Court describing the disruption of Fox Tempest, a service it said had operated since May 2025. Microsoft said Fox Tempest provided code-signing tools that helped malware slip through defenses and enabled ransomware attacks.\u003c/p\u003e\n\n\u003cp\u003eFox Tempest abused Microsoft Artifact Signing, a service designed to verify that software is legitimate and has not been tampered with. According to Steven Masada of Microsoft’s Digital Crimes Unit, malicious software that should have been blocked or flagged was more likely to be opened, allowed to run, or pass security checks. Masada said this allowed attackers to “slip through the front door” by masquerading as legitimate software.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft described Fox Tempest as a malware-signing-as-a-service operation with departments handling infrastructure creation, customer relations, and financial transactions. The group created over a thousand certificates and established hundreds of Azure tenants and subscriptions to support its operations. Microsoft said it revoked over 1,000 code-signing certificates attributed to Fox Tempest.\u003c/p\u003e\n\n\u003cp\u003eThe article says ransomware affiliates tied to Rhysida, INC, Qilin, and Akira uploaded malware to Fox Tempest, had it signed, and then used fake websites that appeared to offer legitimate software downloads. Microsoft observed the service being used to distribute malware families including Oyster, Lumma Stealer, and Vidar. The signed malware was delivered through purchased advertisements and links designed to look like legitimate websites.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said it seized Fox Tempest’s website, took hundreds of virtual machines offline, and blocked access to a site hosting the underlying code. The company also said it obtained evidence showing cybercriminals complaining about the disruption. Microsoft’s analysis of cryptocurrency payments showed Fox Tempest was paid millions of dollars by ransomware affiliates and was used in attacks targeting organizations in the U.S., China, France, and India.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said it disrupted Fox Tempest, a malware-signing-as-a-service platform that helped cybercriminals make malicious software appear legitimate. The company unsealed a legal case in U.S. District Court detailing the disruption of the service, which it said had operated since May 2025. Microsoft said Fox Tempest provided code-signing tools used to deliver malware and enable ransomware attacks.\u003c/p\u003e\n\n\u003cp\u003eSteven Masada, assistant general counsel at Microsoft’s Digital Crimes Unit, said the service helped attackers evade defenses by making malware more likely to be opened, allowed to run, or pass security checks. He said this meant attackers could masquerade as a “welcomed guest” instead of forcing their way into systems.\u003c/p\u003e\n\n\u003ch2 id=\"technical-mechanism\"\u003eTechnical mechanism\u003c/h2\u003e\n\n\u003cp\u003eFox Tempest abused Microsoft Artifact Signing, which is intended to verify that software is legitimate and has not been tampered with. Microsoft said the group used this capability to create short-lived fraudulent code-signing certificates. Those certificates allowed malware and ransomware to resemble legitimate software and bypass security controls.\u003c/p\u003e\n\n\u003cp\u003eThe article says this technique made malicious software appear similar to legitimate applications such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAnyDesk\u003c/li\u003e\n\u003cli\u003eTeams\u003c/li\u003e\n\u003cli\u003ePutty\u003c/li\u003e\n\u003cli\u003eWebex\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft said the use of short-life certificates from a trusted source significantly increased the likelihood of malware execution and successful delivery.\u003c/p\u003e\n\n\u003ch2 id=\"malware-signing-as-a-service-model\"\u003eMalware-signing-as-a-service model\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft characterized Fox Tempest’s operation as malware-signing-as-a-service, or MSaaS. Instead of buying illicit certificates one by one, cybercriminals could upload malware to the service and have it signed for them. Microsoft said this showed how illicit code-signing activity has evolved into a service-based model at scale.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft described Fox Tempest as a well-resourced operation with departments responsible for:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eInfrastructure creation\u003c/li\u003e\n\u003cli\u003eCustomer relations\u003c/li\u003e\n\u003cli\u003eFinancial transactions\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe group allegedly created over a thousand certificates and established hundreds of Azure tenants and subscriptions to support its activity. Microsoft said it revoked more than 1,000 code-signing certificates attributed to Fox Tempest.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actors-and-malware-use\"\u003eThreat actors and malware use\u003c/h2\u003e\n\n\u003cp\u003eThe article says ransomware affiliates tied to large groups including Rhysida, INC, Qilin, and Akira used Fox Tempest’s service. These affiliates uploaded malware to the Fox Tempest site, had it legitimized, and then created fake websites that appeared to offer safe software downloads.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft security officials observed ransomware actors using the service to distribute malware families including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOyster\u003c/li\u003e\n\u003cli\u003eLumma Stealer\u003c/li\u003e\n\u003cli\u003eVidar\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe signed malware was delivered through purchased advertisements and links designed to look like legitimate websites.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-targeting\"\u003eImpact and targeting\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said cybercriminals used Fox Tempest to infect thousands of machines and compromise networks worldwide. The article states that Microsoft analyzed cryptocurrency payments showing Fox Tempest was paid millions of dollars by ransomware affiliates. Microsoft also said the tool was used in attacks targeting organizations in the U.S., China, France, and India.\u003c/p\u003e\n\n\u003cp\u003eThe scheme charged users thousands of dollars. Masada contrasted Fox Tempest with lower-cost services such as RedVDS, a cybercriminal infrastructure provider costing as little as $24 per month that Microsoft disrupted earlier in the year. He said Fox Tempest showed that more sophisticated actors were willing to pay thousands of dollars for advanced capabilities that made attacks easier to carry out, harder to detect, and more likely to succeed.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-response\"\u003eMicrosoft’s response\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said it took several actions against Fox Tempest’s infrastructure. The company said it:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eSeized Fox Tempest’s website\u003c/li\u003e\n\u003cli\u003eTook hundreds of virtual machines offline\u003c/li\u003e\n\u003cli\u003eBlocked access to a site hosting the underlying code\u003c/li\u003e\n\u003cli\u003eRevoked more than 1,000 code-signing certificates attributed to the group\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft also said it obtained evidence showing cybercriminals complaining about the actions. Masada said disrupting the ability to make malicious software look legitimate is important because that capability undermines how people and systems decide what is safe.\u003c/p\u003e\n\n\u003ch2 id=\"significance-described-in-the-article\"\u003eSignificance described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article presents Fox Tempest as an example of how the cybercriminal ecosystem is evolving as disruption operations continue. Microsoft said cybercriminals increasingly rely on services that allow them to scale attacks and bypass defenses. Fox Tempest’s model showed how weaponized code signing can be packaged as a paid service for ransomware affiliates and other cybercriminals.\u003c/p\u003e\n","keyPoints":["Microsoft disrupted Fox Tempest, a malware-signing-as-a-service platform that abused Microsoft Artifact Signing to make malware appear legitimate.","Fox Tempest operated since May 2025 and provided cybercriminals with code signing tools used to deliver malware and enable ransomware attacks.","Microsoft said ransomware affiliates tied to groups including Rhysida, INC, Qilin and Akira used Fox Tempest to sign malware and distribute it through fake software download sites.","Microsoft seized Fox Tempest’s website, took hundreds of virtual machines offline, blocked access to a site hosting underlying code, and revoked over 1,000 code signing certificates attributed to the group.","Microsoft said cryptocurrency analysis showed Fox Tempest was paid millions of dollars by ransomware affiliates and was used in attacks targeting organizations in the U.S., China, France and India."],"insights":["Fox Tempest’s use of short-lived certificates from a trusted Microsoft service made signed malware less likely to trigger antivirus, security warnings, or other safeguards.","The operation shows that illicit code signing has shifted from one-off certificate sales to a scalable service model where criminals can upload malware and receive signed payloads.","Microsoft characterized Fox Tempest as a well-resourced cybercriminal business with separate functions for infrastructure creation, customer relations, and financial transactions.","Ransomware affiliates were willing to pay thousands of dollars for Fox Tempest’s signing capabilities, indicating that advanced evasion services can command far higher prices than low-cost criminal infrastructure offerings."],"referencedReports":[],"body":"\u003cp\u003eMicrosoft said it disrupted Fox Tempest, a malware-signing-as-a-service platform that helped cybercriminals make malware appear like legitimate software. The company unsealed a legal case in U.S. District Court detailing the operation, which it said had been active since May 2025. Microsoft said the service was used to deliver malware, enable ransomware, infect thousands of machines, and compromise networks worldwide.\u003c/p\u003e\n\n\u003cp\u003eFox Tempest abused Microsoft Artifact Signing to create short-lived fraudulent code-signing certificates that helped malicious software pass security checks. Microsoft said ransomware affiliates tied to groups including Rhysida, INC, Qilin, and Akira used the service to sign malware and distribute it through fake websites posing as legitimate software platforms. The malware was made to resemble legitimate tools such as AnyDesk, Teams, Putty, and Webex.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft seized Fox Tempest’s website, took hundreds of virtual machines offline, blocked access to a site hosting underlying code, and revoked more than 1,000 code-signing certificates attributed to the group. The company said Fox Tempest had created over a thousand certificates and hundreds of Azure tenants and subscriptions. Microsoft also said cryptocurrency analysis showed the operation was paid millions of dollars by ransomware affiliates.\u003c/p\u003e\n"},{"n":5,"title":"TP-Link, Photoshop, OpenVPN, Norton VPN vulnerabilities","source":"blog.talosintelligence.com","sourceColor":"#60a5fa","link":"https://blog.talosintelligence.com/tp-link-photoshop-openvpn-norton-vpn-vulnerabilities/","time":"15:39","priority":"MUST READ","score":92,"tldr":"Cisco Talos disclosed multiple vulnerabilities affecting TP-Link Archer AX53, Adobe Photoshop, OpenVPN, and Norton VPN, with impacts including arbitrary code or command execution, privilege escalation, file disclosure, and denial of service. Most have been patched, so users should update affected products immediately, especially given the Norton VPN issue was found in use before a patch was available.","briefOverview":"\u003cp\u003eCisco Talos’ Vulnerability Discovery \u0026amp; Research team disclosed eight vulnerabilities in TP-Link and one each in Adobe Photoshop, OpenVPN, and Gen Digital\u0026rsquo;s Norton VPN. The affected products include TP-Link Archer AX53, Adobe Photoshop, OpenVPN, and Norton VPN. The vulnerabilities have been patched by their respective vendors under Cisco’s third-party vulnerability disclosure policy, except the Norton VPN vulnerability, which was discovered in use before a patch was available.\u003c/p\u003e\n\n\u003cp\u003eThe TP-Link issues affect the Archer AX53 v1.0 1.3.1 Build 20241120 rel.54901(5553) and include stack-based buffer overflow, OS command injection, and external config control vulnerabilities. Several TP-Link vulnerabilities can be triggered by uploading a malicious file with specially crafted configuration values, while one can be triggered by specially crafted network packets. The possible impacts include arbitrary code execution, arbitrary command execution, and arbitrary file reading.\u003c/p\u003e\n\n\u003cp\u003eThe Adobe Photoshop and Norton VPN vulnerabilities are privilege escalation issues tied to their Microsoft Store installation processes. The OpenVPN vulnerability affects OpenVPN 2.6.x and 2.8_git and can lead to denial of service through specially crafted network packets. Cisco Talos directs users to Snort.org for rule sets that can detect exploitation and to Talos Intelligence’s website for vulnerability advisories.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCisco Talos’ Vulnerability Discovery \u0026amp; Research team disclosed a set of vulnerabilities across TP-Link, Adobe Photoshop, OpenVPN, and Gen Digital\u0026rsquo;s Norton VPN. The disclosure includes eight TP-Link vulnerabilities and one vulnerability each in Adobe Photoshop, OpenVPN, and Norton VPN. The article states that the vulnerabilities have been patched by their respective vendors under Cisco’s third-party vulnerability disclosure policy, except for the Norton VPN issue, which was discovered in use before a patch was available.\u003c/p\u003e\n\n\u003cp\u003eThe TP-Link vulnerabilities affect the TP-Link Archer AX53, a dual band gigabit Wi-Fi router. Talos identifies multiple flaws in Tp-Link Archer AX53 v1.0 1.3.1 Build 20241120 rel.54901(5553), including a stack-based buffer overflow in tmpServer opcode 0x436, OS command injection issues in OpenVPN and dnsmasq configuration restore functionality, and external config control issues. The described impacts include arbitrary code execution, arbitrary command execution, and arbitrary file reading.\u003c/p\u003e\n\n\u003cp\u003eSeveral of the TP-Link vulnerabilities depend on specially crafted configuration values and can be triggered by uploading a malicious file. TALOS-2025-2302, associated with CVE-2026-30814, differs in that a specially crafted set of network packets can lead to arbitrary code execution. The TP-Link vulnerabilities were discovered by Lilith \u0026gt;_\u0026gt; of Cisco Talos.\u003c/p\u003e\n\n\u003cp\u003eThe Adobe Photoshop vulnerability, TALOS-2025-2274 and CVE-2026-34632, was discovered by KPC of Cisco Talos. It is a privilege escalation vulnerability in the installation process of Adobe Photoshop via the Microsoft Store. The article identifies the vulnerable installer version as Photoshop_Set-Up.exe 2.11.0.30 and states that a low-privilege user can replace files during installation, potentially resulting in elevation of privileges.\u003c/p\u003e\n\n\u003cp\u003eThe OpenVPN vulnerability, TALOS-2026-2381 and CVE-2026-35058, was discovered by Emma Reuter of Cisco ASIG. It is a reachable assertion vulnerability in the TLS Crypt v2 Client Key Extraction functionality of OpenVPN 2.6.x and 2.8_git. A specially crafted network packet can lead to denial of service, and an attacker can send a sequence of malicious packets to trigger the vulnerability.\u003c/p\u003e\n\n\u003cp\u003eThe Norton VPN vulnerability, TALOS-2025-2276 and CVE-2025-58074, was discovered by KPC of Cisco Talos. It is a privilege escalation vulnerability in the installation process of Norton VPN via the Microsoft Store, where a low-privilege user can replace files during installation. The article states this may result in deletion of arbitrary files and possibly lead to elevation of privileges, and it notes that the vulnerability was discovered in use before a patch was available.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCisco Talos’ Vulnerability Discovery \u0026amp; Research team disclosed vulnerabilities affecting TP-Link, Adobe Photoshop, OpenVPN, and Gen Digital\u0026rsquo;s Norton VPN. The disclosure covers eight vulnerabilities in TP-Link and one vulnerability each in Adobe Photoshop, OpenVPN, and Norton VPN.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the vulnerabilities have been patched by their respective vendors in adherence to Cisco’s third-party vulnerability disclosure policy, with one exception. The Norton VPN vulnerability was discovered in use before a patch was available.\u003c/p\u003e\n\n\u003cp\u003eCisco Talos also states that Snort coverage capable of detecting exploitation of these vulnerabilities is available through the latest rule sets from Snort.org. The article notes that the latest Vulnerability Advisories are posted on Talos Intelligence’s website.\u003c/p\u003e\n\n\u003ch2 id=\"tp-link-vulnerabilities\"\u003eTP-Link vulnerabilities\u003c/h2\u003e\n\n\u003cp\u003eThe TP-Link vulnerabilities were discovered by Lilith \u0026gt;_\u0026gt; of Cisco Talos. The affected device is the TP-Link Archer AX53, described as a dual band gigabit Wi-Fi router.\u003c/p\u003e\n\n\u003cp\u003eThe disclosed TP-Link issues affect Tp-Link Archer AX53 v1.0 1.3.1 Build 20241120 rel.54901(5553). The article describes eight vulnerabilities involving stack-based buffer overflow, OS command injection, and external config control issues.\u003c/p\u003e\n\n\u003ch3 id=\"talos-2025-2302-cve-2026-30814\"\u003eTALOS-2025-2302 / CVE-2026-30814\u003c/h3\u003e\n\n\u003cp\u003eTALOS-2025-2302, assigned CVE-2026-30814, is a stack-based buffer overflow vulnerability. It exists in the tmpServer opcode 0x436 functionality of Tp-Link AX53 v1.0 1.3.1 Build 20241120 rel.54901(5553).\u003c/p\u003e\n\n\u003cp\u003eA specially crafted set of network packets can lead to arbitrary code execution. The article states that an attacker can send packets to trigger this vulnerability.\u003c/p\u003e\n\n\u003ch3 id=\"talos-2025-2303-cve-2026-30815\"\u003eTALOS-2025-2303 / CVE-2026-30815\u003c/h3\u003e\n\n\u003cp\u003eTALOS-2025-2303, assigned CVE-2026-30815, is an OS command injection vulnerability. It exists in the OpenVPN configuration restore script_security functionality of Tp-Link Archer AX53 v1.0 1.3.1 Build 20241120 rel.54901(5553).\u003c/p\u003e\n\n\u003cp\u003eA specially crafted configuration value can lead to arbitrary command execution. The article states that an attacker can upload a malicious file to trigger this vulnerability.\u003c/p\u003e\n\n\u003ch3 id=\"talos-2025-2304-cve-2026-30816\"\u003eTALOS-2025-2304 / CVE-2026-30816\u003c/h3\u003e\n\n\u003cp\u003eTALOS-2025-2304, assigned CVE-2026-30816, is an external config control vulnerability. It exists in the OpenVPN configuration restore crt.sed functionality of Tp-Link Archer AX53 v1.0 1.3.1 Build 20241120 rel.54901(5553).\u003c/p\u003e\n\n\u003cp\u003eA specially crafted configuration value can lead to arbitrary file reading. The article states that an attacker can upload a malicious file to trigger this vulnerability.\u003c/p\u003e\n\n\u003ch3 id=\"talos-2025-2305-cve-2026-30817\"\u003eTALOS-2025-2305 / CVE-2026-30817\u003c/h3\u003e\n\n\u003cp\u003eTALOS-2025-2305, assigned CVE-2026-30817, is an external config control vulnerability. It exists in the OpenVPN configuration restore route_up functionality of Tp-Link Archer AX53 v1.0 1.3.1 Build 20241120 rel.54901(5553).\u003c/p\u003e\n\n\u003cp\u003eA specially crafted configuration value can lead to arbitrary file reading. The article states that an attacker can upload a malicious file to trigger this vulnerability.\u003c/p\u003e\n\n\u003ch3 id=\"talos-2025-2306-cve-2026-30818\"\u003eTALOS-2025-2306 / CVE-2026-30818\u003c/h3\u003e\n\n\u003cp\u003eTALOS-2025-2306, assigned CVE-2026-30818, is an OS command injection vulnerability. It exists in the dnsmasq configuration restore dhcpscript functionality of Tp-Link Archer AX53 v1.0 1.3.1 Build 20241120 rel.54901(5553).\u003c/p\u003e\n\n\u003cp\u003eA specially crafted configuration value can lead to arbitrary command execution. The article states that an attacker can upload a malicious file to trigger this vulnerability.\u003c/p\u003e\n\n\u003ch3 id=\"talos-2025-2307-talos-2025-2308-and-talos-2025-2309\"\u003eTALOS-2025-2307, TALOS-2025-2308, and TALOS-2025-2309\u003c/h3\u003e\n\n\u003cp\u003eTALOS-2025-2307, TALOS-2025-2308, and TALOS-2025-2309 are OS command injection vulnerabilities. They exist in the OpenVPN configuration restore client_disconnect, client_connect, and route_up functionalities of Tp-Link Archer AX53 v1.0 1.3.1 Build 20241120 rel.54901(5553).\u003c/p\u003e\n\n\u003cp\u003eA specially crafted configuration value can lead to arbitrary command execution. The article states that an attacker can upload a malicious file to trigger these vulnerabilities.\u003c/p\u003e\n\n\u003ch2 id=\"adobe-photoshop-vulnerability\"\u003eAdobe Photoshop vulnerability\u003c/h2\u003e\n\n\u003cp\u003eThe Adobe Photoshop vulnerability was discovered by KPC of Cisco Talos. The article describes Adobe Photoshop as a popular digital photo manipulation and illustration program with a wide array of features for personal and business use cases.\u003c/p\u003e\n\n\u003cp\u003eTALOS-2025-2274, assigned CVE-2026-34632, is a privilege escalation vulnerability. It exists in the installation process of Adobe Photoshop via the Microsoft Store.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerable installer version is Photoshop_Set-Up.exe 2.11.0.30. According to the article, a low-privilege user can replace files during the installation process, which may result in elevation of privileges.\u003c/p\u003e\n\n\u003ch2 id=\"openvpn-vulnerability\"\u003eOpenVPN vulnerability\u003c/h2\u003e\n\n\u003cp\u003eThe OpenVPN vulnerability was discovered by Emma Reuter of Cisco ASIG. The article describes OpenVPN as an open source SSL VPN with remote access, site-to-site VPNs, WiFi security, enterprise load balancing, failover, and granular access control features available.\u003c/p\u003e\n\n\u003cp\u003eTALOS-2026-2381, assigned CVE-2026-35058, is a reachable assertion vulnerability. It exists in the TLS Crypt v2 Client Key Extraction functionality of OpenVPN 2.6.x and 2.8_git.\u003c/p\u003e\n\n\u003cp\u003eA specially crafted network packet can lead to a denial of service. The article states that an attacker can send a sequence of malicious packets to trigger this vulnerability.\u003c/p\u003e\n\n\u003ch2 id=\"gen-digital-norton-vpn-vulnerability\"\u003eGen Digital Norton VPN vulnerability\u003c/h2\u003e\n\n\u003cp\u003eThe Norton VPN vulnerability was discovered by KPC of Cisco Talos. The article describes Gen Digital\u0026rsquo;s Norton VPN client as a proprietary tool for private proxy network information exchange.\u003c/p\u003e\n\n\u003cp\u003eTALOS-2025-2276, assigned CVE-2025-58074, is a privilege escalation vulnerability. It exists in the installation process of Norton VPN via the Microsoft Store.\u003c/p\u003e\n\n\u003cp\u003eA low-privilege user can replace files during the installation process. The article states this may result in deletion of arbitrary files, possibly leading to elevation of privileges.\u003c/p\u003e\n\n\u003cp\u003eThe article specifically notes that the Norton VPN vulnerability was discovered in use before a patch was available. This is the only vulnerability in the article described as not having been patched before discovery in use.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-response\"\u003eDisclosed impact and response\u003c/h2\u003e\n\n\u003cp\u003eThe article describes several potential impacts across the disclosed vulnerabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eArbitrary code execution for the TP-Link tmpServer stack-based buffer overflow.\u003c/li\u003e\n\u003cli\u003eArbitrary command execution for multiple TP-Link OS command injection vulnerabilities.\u003c/li\u003e\n\u003cli\u003eArbitrary file reading for two TP-Link external config control vulnerabilities.\u003c/li\u003e\n\u003cli\u003eElevation of privileges for the Adobe Photoshop Microsoft Store installation vulnerability.\u003c/li\u003e\n\u003cli\u003eDenial of service for the OpenVPN reachable assertion vulnerability.\u003c/li\u003e\n\u003cli\u003eDeletion of arbitrary files and possible elevation of privileges for the Norton VPN Microsoft Store installation vulnerability.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the vulnerabilities have been patched by their respective vendors, except for the Norton VPN vulnerability, which was discovered in use before a patch was available. Cisco Talos also points readers to Snort.org for rule sets that can detect exploitation of these vulnerabilities and to Talos Intelligence’s website for the latest Vulnerability Advisories.\u003c/p\u003e\n\n\u003ch2 id=\"actors-and-attribution-stated-in-the-article\"\u003eActors and attribution stated in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the researchers who discovered the vulnerabilities but does not name any threat actor or suspected actor. The named discoverers are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eLilith \u0026gt;_\u0026gt; of Cisco Talos for the TP-Link vulnerabilities.\u003c/li\u003e\n\u003cli\u003eKPC of Cisco Talos for the Adobe Photoshop vulnerability.\u003c/li\u003e\n\u003cli\u003eEmma Reuter of Cisco ASIG for the OpenVPN vulnerability.\u003c/li\u003e\n\u003cli\u003eKPC of Cisco Talos for the Norton VPN vulnerability.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article uses generic attacker descriptions for exploitation scenarios, such as an attacker sending packets, uploading a malicious file, or sending a sequence of malicious packets. It does not attribute exploitation or attempted exploitation to any specific actor.\u003c/p\u003e\n","keyPoints":["Cisco Talos’ Vulnerability Discovery \u0026 Research team disclosed eight vulnerabilities in TP-Link and one vulnerability each in Adobe Photoshop, OpenVPN, and Gen Digital's Norton VPN.","The disclosed TP-Link vulnerabilities affect the TP-Link Archer AX53 v1.0 1.3.1 Build 20241120 rel.54901(5553) and include stack-based buffer overflow, OS command injection, and external config control issues.","The Adobe Photoshop vulnerability, TALOS-2025-2274 (CVE-2026-34632), is a privilege escalation issue in the Microsoft Store installation process involving Photoshop_Set-Up.exe 2.11.0.30.","The OpenVPN vulnerability, TALOS-2026-2381 (CVE-2026-35058), is a reachable assertion issue in the TLS Crypt v2 Client Key Extraction functionality of OpenVPN 2.6.x and 2.8_git that can lead to denial of service.","The Norton VPN vulnerability, TALOS-2025-2276 (CVE-2025-58074), is a privilege escalation vulnerability in the Microsoft Store installation process and was discovered in use before a patch was available."],"insights":["The Norton VPN vulnerability stands out because it was discovered in use before a patch was available, unlike the other vulnerabilities that were patched under Cisco’s third-party disclosure process.","Several TP-Link Archer AX53 issues can be triggered by uploading a malicious configuration file, making configuration restore functionality a recurring attack surface in this disclosure.","Both the Adobe Photoshop and Norton VPN issues involve Microsoft Store installation processes where a low-privilege user can replace files, indicating that installation workflows are central to the privilege escalation risks described.","Cisco Talos notes that Snort rule updates are available to detect exploitation attempts for these disclosed vulnerabilities."],"referencedReports":[],"body":"\u003cp\u003eCisco Talos’ Vulnerability Discovery \u0026amp; Research team disclosed eight vulnerabilities in TP-Link and one each in Adobe Photoshop, OpenVPN, and Gen Digital\u0026rsquo;s Norton VPN. The affected products include TP-Link Archer AX53, Adobe Photoshop, OpenVPN, and Norton VPN. The vulnerabilities have been patched by their respective vendors under Cisco’s third-party vulnerability disclosure policy, except the Norton VPN vulnerability, which was discovered in use before a patch was available.\u003c/p\u003e\n\n\u003cp\u003eThe TP-Link issues affect the Archer AX53 v1.0 1.3.1 Build 20241120 rel.54901(5553) and include stack-based buffer overflow, OS command injection, and external config control vulnerabilities. Several TP-Link vulnerabilities can be triggered by uploading a malicious file with specially crafted configuration values, while one can be triggered by specially crafted network packets. The possible impacts include arbitrary code execution, arbitrary command execution, and arbitrary file reading.\u003c/p\u003e\n\n\u003cp\u003eThe Adobe Photoshop and Norton VPN vulnerabilities are privilege escalation issues tied to their Microsoft Store installation processes. The OpenVPN vulnerability affects OpenVPN 2.6.x and 2.8_git and can lead to denial of service through specially crafted network packets. Cisco Talos directs users to Snort.org for rule sets that can detect exploitation and to Talos Intelligence’s website for vulnerability advisories.\u003c/p\u003e\n"},{"n":23,"title":"Drupal to Release Urgent Core Security Updates on May 20, Sites Told to Prepare","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/drupal-to-release-urgent-core-security.html","time":"10:44","priority":"MUST READ","score":92,"tldr":"Drupal will release urgent core security updates for supported versions on May 20, 2026, and site owners should prepare to patch immediately because exploits may appear within hours or days. Sites on older or end-of-life versions should update to the latest available patch now or plan manual mitigations, with Drupal 8 and 9 users urged to move to a supported release.","briefOverview":"\u003cp\u003eDrupal has announced that it plans to release a core security release for all supported branches on May 20, 2026, during a 5–9 p.m. UTC window. The Drupal Security Team urged site owners to reserve time for core updates because exploits might be developed within hours or days. The exact nature of the security issue has not been disclosed in the article.\u003c/p\u003e\n\n\u003cp\u003eThe planned patches are expected for Drupal core branches 11.3.x, 11.2.x, 10.6.x, and 10.5.x. Drupal advised sites on supported versions to update now to the latest patch release for their branch so any upgrade issues can be addressed before the security window. The article notes that not all configurations are affected, and mitigation information will be included in the advisory.\u003c/p\u003e\n\n\u003cp\u003eDrupal is also providing guidance for sites on older versions. Sites on Drupal 11.1 or 11.0 should update to at least Drupal 11.1.9, while sites on Drupal 10.4 through 10.0 should update to at least Drupal 10.4.9. Drupal 8 and 9 sites may need manual patch files and are strongly advised to update to at least Drupal 10.6 soon, while Drupal 7 is not affected by the issue.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDrupal issued an alert saying it intends to release a core security release for all supported branches on May 20, 2026, between 5 p.m. and 9 p.m. UTC. The Drupal Security Team urged site owners to reserve time for core updates during that window. The team warned that exploits might be developed within hours or days.\u003c/p\u003e\n\n\u003cp\u003eThe article states that not all Drupal configurations are affected. Drupal said site owners should use the release window to determine whether their sites are affected and whether they need an immediate update. Mitigation information is expected to be included in the advisory released with the update.\u003c/p\u003e\n\n\u003cp\u003ePatches are expected for Drupal core branches 11.3.x, 11.2.x, 10.6.x, and 10.5.x. Drupal advised sites on supported versions to update to the latest patch release for their current branch before the deadline. The purpose is to resolve any outstanding upgrade issues ahead of the security release.\u003c/p\u003e\n\n\u003cp\u003eThe exact nature of the security issue has not been disclosed in the article. However, the article notes that the issue is expected to be severe because Drupal is also providing 11.1.x and 10.4.x releases for sites running end-of-life minor core versions. Sites on Drupal 11.1 or 11.0 should update to at least Drupal 11.1.9, and sites on Drupal 10.4 through 10.0 should update to at least Drupal 10.4.9.\u003c/p\u003e\n\n\u003cp\u003eFor sites on end-of-life major versions such as Drupal 8 and 9, patch files for Drupal 8.9 and 9.5 will need to be applied manually. Drupal warned that there is no guarantee those fixes will work correctly and said they may introduce other issues or regressions. Drupal strongly recommended that Drupal 8 or 9 sites update to at least Drupal 10.6 soon, and it said Drupal 7 is not affected by the issue.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eDrupal has issued an alert that it plans to release a core security release for all supported branches on May 20, 2026. The release window is scheduled for 5–9 p.m. UTC. The Drupal Security Team urged site owners to reserve time for core updates during that period because exploits might be developed within hours or days.\u003c/p\u003e\n\n\u003cp\u003eDrupal stated that not all configurations are affected. Site owners are advised to use the release window to determine whether their sites are affected and whether they require an immediate update. Drupal said mitigation information will be included in the advisory.\u003c/p\u003e\n\n\u003ch2 id=\"supported-branches-receiving-patches\"\u003eSupported Branches Receiving Patches\u003c/h2\u003e\n\n\u003cp\u003eThe article states that patches are expected for the following supported Drupal core branches:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e11.3.x\u003c/li\u003e\n\u003cli\u003e11.2.x\u003c/li\u003e\n\u003cli\u003e10.6.x\u003c/li\u003e\n\u003cli\u003e10.5.x\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDrupal advised sites on one of these supported versions to update to the latest patch release for the applicable branch before the security window. The stated reason is to address any outstanding upgrade issues before the urgent security update becomes available.\u003c/p\u003e\n\n\u003ch2 id=\"security-issue-status\"\u003eSecurity Issue Status\u003c/h2\u003e\n\n\u003cp\u003eThe exact nature of the security issue has not been disclosed in the article. The article says the issue is expected to be severe because Drupal is providing 11.1.x and 10.4.x releases for sites running end-of-life minor core versions. No known or suspected threat actors are identified in the article.\u003c/p\u003e\n\n\u003cp\u003eThe Drupal Security Team warned that exploits might be developed within hours or days. This is the article’s main stated reason for urging site owners to prepare for immediate core updates during the May 20 release window.\u003c/p\u003e\n\n\u003ch2 id=\"guidance-for-drupal-11-and-drupal-10-sites\"\u003eGuidance for Drupal 11 and Drupal 10 Sites\u003c/h2\u003e\n\n\u003cp\u003eDrupal gave specific preparation guidance for sites on older minor versions of Drupal 11 and Drupal 10. Sites on Drupal 11.1 or 11.0 should update to at least Drupal 11.1.9. Sites on Drupal 10.4, 10.3, 10.2, 10.1, or 10.0 should update to at least Drupal 10.4.9.\u003c/p\u003e\n\n\u003cp\u003eThe article states that these sites should apply the security update as soon as it is released on May 20. Drupal then recommends that they upgrade to Drupal 11.3 or Drupal 10.6 in the near future.\u003c/p\u003e\n\n\u003ch2 id=\"guidance-for-drupal-8-and-drupal-9-sites\"\u003eGuidance for Drupal 8 and Drupal 9 Sites\u003c/h2\u003e\n\n\u003cp\u003eFor sites still on end-of-life major core versions, including Drupal 8 and Drupal 9, patch files for Drupal 8.9 and 9.5 will need to be applied manually. Drupal warned that there is no guarantee the fixes will work correctly. It also warned that the patch files may introduce other issues or regressions.\u003c/p\u003e\n\n\u003cp\u003eDrupal said the patch files may help mitigate the vulnerability for sites still on these old major versions until they upgrade to a supported release. Drupal strongly recommended that Drupal 8 or 9 sites update to at least Drupal 10.6 soon. The article also states that Drupal 8 and 9 include numerous other previously disclosed security vulnerabilities that will not be addressed by either Drupal Steward or the best-effort patch files.\u003c/p\u003e\n\n\u003ch2 id=\"drupal-7-status\"\u003eDrupal 7 Status\u003c/h2\u003e\n\n\u003cp\u003eDrupal stated that Drupal 7 is not affected by the issue. The article separately says sites on any version of Drupal 9 are advised to update to 9.5.11. Sites on any version of Drupal 8 are advised to update to Drupal 8.9.20.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-response\"\u003eImpact and Response\u003c/h2\u003e\n\n\u003cp\u003eThe disclosed response is a planned core security release across supported Drupal branches, with additional guidance for older versions. The potential impact is not described in technical detail because the underlying issue has not yet been disclosed. Drupal’s primary instruction is for administrators to prepare for the May 20 release window, verify whether their sites are affected, and apply updates or mitigations as directed in the advisory.\u003c/p\u003e\n","keyPoints":["Drupal plans to release a core security update for all supported branches on May 20, 2026, between 5 p.m. and 9 p.m. UTC.","The Drupal Security Team urged site owners to reserve time for core updates because exploits might be developed within hours or days.","Patches are expected for Drupal core branches 11.3.x, 11.2.x, 10.6.x, and 10.5.x.","Drupal said sites on supported versions should update to the latest patch release for their branch before the security window.","Drupal warned that Drupal 8 and 9 sites are end-of-life and should update to at least Drupal 10.6 soon, while Drupal 7 is not affected by the issue."],"insights":["Drupal is preparing security releases even for end-of-life minor versions 11.1.x and 10.4.x, which indicates site owners on those branches should first update to Drupal 11.1.9 or 10.4.9 so they can apply the May 20 security update immediately.","Organizations running Drupal 8 or 9 cannot rely on normal supported updates for this issue and may need to manually apply best-effort patch files for Drupal 8.9 or 9.5, with Drupal warning that these fixes are not guaranteed to work correctly.","Drupal advised site owners to update to the latest supported patch level before the advisory is published so that upgrade problems are resolved before the urgent security window.","Drupal 7 is explicitly not affected by the issue, so Drupal 7 site operators are not included in the May 20 core security update urgency described for other versions."],"referencedReports":[],"body":"\u003cp\u003eDrupal has announced that it plans to release a core security release for all supported branches on May 20, 2026, during a 5–9 p.m. UTC window. The Drupal Security Team urged site owners to reserve time for core updates because exploits might be developed within hours or days. The exact nature of the security issue has not been disclosed in the article.\u003c/p\u003e\n\n\u003cp\u003eThe planned patches are expected for Drupal core branches 11.3.x, 11.2.x, 10.6.x, and 10.5.x. Drupal advised sites on supported versions to update now to the latest patch release for their branch so any upgrade issues can be addressed before the security window. The article notes that not all configurations are affected, and mitigation information will be included in the advisory.\u003c/p\u003e\n\n\u003cp\u003eDrupal is also providing guidance for sites on older versions. Sites on Drupal 11.1 or 11.0 should update to at least Drupal 11.1.9, while sites on Drupal 10.4 through 10.0 should update to at least Drupal 10.4.9. Drupal 8 and 9 sites may need manual patch files and are strongly advised to update to at least Drupal 10.6 soon, while Drupal 7 is not affected by the issue.\u003c/p\u003e\n"},{"n":24,"title":"The New Phishing Click: How OAuth Consent Bypasses MFA","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/the-new-phishing-click-how-oauth.html","time":"11:30","priority":"MUST READ","score":92,"tldr":"Attackers are increasingly bypassing MFA by tricking users into approving OAuth consent prompts, giving them long-lived refresh tokens rather than stolen passwords. Organizations need to treat OAuth grants, AI-agent connections, and third-party integrations as core identity risks with continuous visibility and token-level revocation.","briefOverview":"\u003cp\u003eIn February 2026, a phishing-as-a-service platform called EvilTokens went live and, within five weeks, compromised more than 340 Microsoft 365 organizations across five countries. Targets were asked to enter a short code at microsoft.com/devicelogin and complete their normal MFA challenge, believing they had verified a routine sign-in. Instead, the operator obtained a valid refresh token scoped to the victim’s mailbox, drive, calendar, and contacts.\u003c/p\u003e\n\n\u003cp\u003eThe article’s central point is that OAuth consent phishing can bypass MFA because the user authenticates with the legitimate identity provider and completes MFA before granting access. The resulting token is signed by the identity provider, refreshable, and may last for weeks or months depending on tenant configuration. Password resets may not invalidate the grant; explicit token revocation or re-consent policy enforcement may be required.\u003c/p\u003e\n\n\u003cp\u003eThe article argues that OAuth grants, AI agents, browser-extension grants, and integrations create bridges across SaaS applications that individual application owners may not see. These bridges can form “toxic combinations” when permissions across multiple applications intersect through one identity. It recommends continuous OAuth inventory, grant-age review, cross-application identity review, consent-aware conditional access, and token-level revocation.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes a February 2026 phishing-as-a-service platform called EvilTokens that compromised more than 340 Microsoft 365 organizations across five countries within five weeks. Victims were instructed to enter a short code at microsoft.com/devicelogin and complete their normal MFA process. They believed they were verifying a routine sign-in, but the operator received a valid refresh token for resources including mailbox, drive, calendar, and contacts.\u003c/p\u003e\n\n\u003cp\u003eThe article frames this as consent phishing or OAuth grant abuse, where the important click is not a password submission but acceptance of an OAuth consent prompt. Unlike credential phishing, an OAuth grant does not require replaying a stolen username and password. The user authenticates on the legitimate identity provider, completes MFA on the legitimate domain, and grants access that the identity system treats as valid.\u003c/p\u003e\n\n\u003cp\u003eA key technical detail is that MFA cannot block the attack because MFA has already occurred before the OAuth consent grant is issued. The article states that refresh tokens issued through EvilTokens survived password resets and remained valid for weeks or months depending on tenant configuration. Closing the access required explicit revocation or a conditional access policy that demanded re-consent.\u003c/p\u003e\n\n\u003cp\u003eThe article says this risk has grown because users are now accustomed to frequent consent screens from AI agents, productivity integrations, browser extensions, and SaaS tools. It also argues that scope language does not clearly communicate operational reach, giving examples such as “Read your mail” and “Access files when you\u0026rsquo;re not present.” Attackers operate in the gap between the wording of consent prompts and the real access those scopes provide.\u003c/p\u003e\n\n\u003cp\u003eThe article also discusses toxic combinations, where OAuth grants, integrations, or AI agents bridge permissions across multiple SaaS applications without any one application owner authorizing the combined risk. It cites a scenario involving a finance user who grants separate access to a meeting summarizer, productivity assistant, and CRM enrichment tool. It also references the 2025 Salesloft-Drift incident as an example in which a compromised downstream connector spread across more than 700 Salesforce tenants through legitimately approved OAuth tokens.\u003c/p\u003e\n\n\u003cp\u003eFor response, the article recommends treating OAuth consent like authentication. It lists practical checks including continuous OAuth application inventory, review of grant age and re-consent, review of identities with grants across three or more SaaS applications, monitoring of AI agent and integration bridges, conditional access on consent events, and token-level revocation. It presents AI security platforms, including Reco, as tools for mapping OAuth grants, AI agents, and third-party integrations into an identity graph and revoking access at the token level.\u0
