window.__DL_ARTICLES = [{"n":29,"title":"Shai-Hulud: Here We Go Again. Mass npm Supply Chain Attack Hits the AntV Ecosystem","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/shai-hulud-here-we-go-again-mass-npm-supply-chain-attack-hits-the-antv-ecosystem","time":"06:57","priority":"MUST READ","score":98,"tldr":"A major ongoing npm supply-chain attack has compromised hundreds of AntV and related packages, using install-time malware to steal CI/CD secrets, cloud credentials, GitHub tokens, and developer files, then actively exploiting them. If any affected package/version was installed, assume the environment is compromised and rotate all accessible credentials immediately.","briefOverview":"\u003cp\u003eA new wave of the Mini Shai-Hulud npm worm is actively compromising packages across Alibaba\u0026rsquo;s AntV data visualization ecosystem and related JavaScript packages. The compromised npm account \u003ccode\u003eatool\u003c/code\u003e, which publishes \u003ccode\u003etimeago.js\u003c/code\u003e and maintains packages across the \u003ccode\u003e@antv\u003c/code\u003e namespace, was used to push malicious versions across charting, graph visualization, mapping, and utility packages. The article says the attack is ongoing and that the affected package list continues to grow.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is significant because the payload steals secrets from CI/CD and developer environments and then actively uses stolen GitHub tokens. The article reports that more than 2,500 public GitHub repositories had been created with Dune-themed names and the reversed marker \u003ccode\u003eniagA oG eW ereH :duluH-iahS\u003c/code\u003e, showing that exfiltrated credentials were being used. The article advises anyone who installed an affected package to assume all secrets accessible in that environment are compromised and rotate credentials immediately.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the malware runs during package installation through direct install hooks or through \u003ccode\u003eoptionalDependencies\u003c/code\u003e pointing to a poisoned commit in the legitimate \u003ccode\u003eantvis/G2\u003c/code\u003e repository. It reads GitHub Actions \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory to extract masked CI/CD secrets, harvests credentials from more than 130 file paths, and exfiltrates data through the GitHub API and \u003ccode\u003et.m-kosche.com\u003c/code\u003e. StepSecurity’s Harden-Runner analysis showed the attack being blocked by a global C2 block list and by detection of runner memory reads.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThe article describes an ongoing npm supply chain campaign involving a new wave of the Mini Shai-Hulud worm against Alibaba’s AntV ecosystem and related packages. A compromised npm account named \u003ccode\u003eatool\u003c/code\u003e, associated with \u003ccode\u003etimeago.js\u003c/code\u003e and AntV package maintenance, was used to publish malicious versions of many packages. The affected packages include charting, graph visualization, mapping, testing, React, and utility libraries. The article characterizes the campaign as one of the largest coordinated npm supply chain attacks documented.\u003c/p\u003e\n\n\u003cp\u003eThe payload is designed to steal secrets from CI/CD runners and developer machines. It reads GitHub Actions \u003ccode\u003eRunner.Worker\u003c/code\u003e memory to extract secrets marked \u003ccode\u003eisSecret:true\u003c/code\u003e, including masked secrets in plaintext. It also reads CI environment variables and searches more than 130 file paths for cloud credentials, SSH keys, Kubernetes and Vault configuration, developer tokens, cryptocurrency wallets, chat data, and AI tooling configuration. The article states that if an affected package was installed, all secrets accessible in that environment should be considered compromised.\u003c/p\u003e\n\n\u003cp\u003eThe malware uses two delivery mechanisms during \u003ccode\u003enpm install\u003c/code\u003e. One pattern adds a direct \u003ccode\u003epreinstall\u003c/code\u003e or \u003ccode\u003epostinstall\u003c/code\u003e script that runs \u003ccode\u003ebun run index.js\u003c/code\u003e. Another pattern adds an \u003ccode\u003eoptionalDependencies\u003c/code\u003e GitHub reference to a poisoned commit in the legitimate \u003ccode\u003eantvis/G2\u003c/code\u003e repository, where a \u003ccode\u003eprepare\u003c/code\u003e hook runs the payload and then exits with failure so the optional dependency fails quietly. The article notes that this GitHub dependency pattern can evade checks that only inspect scripts in the published npm tarball.\u003c/p\u003e\n\n\u003cp\u003eExfiltration occurs through a GitHub API dead-drop channel and a fallback C2 server at \u003ccode\u003et.m-kosche.com\u003c/code\u003e on port 443 using the path \u003ccode\u003eapi/public/otel/v1/traces\u003c/code\u003e. The payload encrypts harvested data before exfiltration and uses a spoofed \u003ccode\u003epython-requests/2.31.0\u003c/code\u003e User-Agent for GitHub API activity. The article also describes persistence mechanisms that modify Claude Code, VS Code, and GitHub Actions configuration files. It says the payload can drop \u003ccode\u003e.claude/settings.json\u003c/code\u003e, \u003ccode\u003e.vscode/tasks.json\u003c/code\u003e, setup scripts, and a malicious \u003ccode\u003ecodeql.yml\u003c/code\u003e workflow.\u003c/p\u003e\n\n\u003cp\u003eThe article reports that stolen GitHub tokens have already been used to create more than 2,500 public repositories with Dune-themed names and the reversed campaign marker \u003ccode\u003eniagA oG eW ereH :duluH-iahS\u003c/code\u003e. It presents this repository creation as visible evidence that stolen credentials are being actively exploited. StepSecurity’s Harden-Runner telemetry showed the payload installing through \u003ccode\u003eecharts-for-react@3.0.7\u003c/code\u003e, invoking Bun, spawning GitHub CLI reconnaissance, and using Python processes to read \u003ccode\u003e/proc/[pid]/mem\u003c/code\u003e for the GitHub Actions runner process. Harden-Runner blocked the attack in a default run through both C2 domain blocking and runner memory-read detection.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThe article reports an ongoing npm supply chain attack involving a new wave of the Mini Shai-Hulud worm. The campaign is actively compromising packages across Alibaba’s AntV data visualization ecosystem and related JavaScript packages. The compromised npm account \u003ccode\u003eatool\u003c/code\u003e, which publishes \u003ccode\u003etimeago.js\u003c/code\u003e and maintains packages across the \u003ccode\u003e@antv\u003c/code\u003e namespace, was used to push malicious versions of many packages.\u003c/p\u003e\n\n\u003cp\u003eThe compromised packages span charting, graph visualization, mapping, React integrations, testing utilities, and general-purpose JavaScript utilities. The article lists hundreds of affected package/version combinations and says the number of affected packages continues to grow. It emphasizes that anyone who installed an affected package should assume all secrets accessible in that environment are compromised and rotate credentials immediately.\u003c/p\u003e\n\n\u003ch2 id=\"significance-and-impact\"\u003eSignificance and Impact\u003c/h2\u003e\n\n\u003cp\u003eThe campaign is significant because it does not only steal credentials; it also uses them. The article reports that stolen GitHub tokens have already been used to create more than 2,500 public GitHub repositories. These repositories use Dune-themed names and include the reversed marker \u003ccode\u003eniagA oG eW ereH :duluH-iahS\u003c/code\u003e, which reads forward as \u003ccode\u003eShai-Hulud: Here We Go Again\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eThe article says the volume of these repositories provides a lower bound on the number of unique environments whose credentials were successfully exfiltrated. It also states that if a GitHub token was among those stolen, the attacker used it to create at least one of the repositories under an account they control. The affected environments include CI/CD systems and developer machines that installed the compromised packages.\u003c/p\u003e\n\n\u003ch2 id=\"affected-ecosystem\"\u003eAffected Ecosystem\u003c/h2\u003e\n\n\u003cp\u003eThe compromised account \u003ccode\u003eatool\u003c/code\u003e is described as the primary publisher of \u003ccode\u003etimeago.js\u003c/code\u003e, a JavaScript relative time formatting library with more than 1.5 million weekly downloads. The same account is also described as a member of the AntV maintainer team. AntV is Alibaba’s open-source data visualization suite, with packages covering charting, graph visualization, mapping, rendering, spreadsheet rendering, and supporting utilities.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that standalone packages such as \u003ccode\u003eecharts-for-react\u003c/code\u003e, \u003ccode\u003ejest-canvas-mock\u003c/code\u003e, \u003ccode\u003ejest-date-mock\u003c/code\u003e, and others are unrelated to AntV by function but were maintained by the same account or publishing pipeline that the attacker compromised. The article says these affected packages are used in environments such as data engineering pipelines, financial dashboards, React/Vue/Angular front-end builds, and enterprise data platforms.\u003c/p\u003e\n\n\u003ch2 id=\"attack-timeline\"\u003eAttack Timeline\u003c/h2\u003e\n\n\u003cp\u003eThe article describes two coordinated publishing waves on May 19, 2026 UTC. In the first wave at 01:56 UTC, the attacker published the first malicious version of each package. These packages used a \u003ccode\u003epreinstall\u003c/code\u003e hook that ran \u003ccode\u003ebun run index.js\u003c/code\u003e, installing Bun first through \u003ccode\u003ecurl -fsSL https://bun.sh/install | bash\u003c/code\u003e if Bun was not already installed.\u003c/p\u003e\n\n\u003cp\u003eA second wave occurred about ten minutes later at 02:06 UTC. In this wave, Bun was added as an explicit npm dependency, which the article says made payload execution more reliable in environments where the first runtime installation method might fail silently. The article says the payload itself was functionally identical across the two waves.\u003c/p\u003e\n\n\u003ch2 id=\"delivery-mechanisms\"\u003eDelivery Mechanisms\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies two delivery patterns used by the campaign.\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003cstrong\u003eDirect install hook:\u003c/strong\u003e Many compromised packages add a \u003ccode\u003epreinstall\u003c/code\u003e or \u003ccode\u003epostinstall\u003c/code\u003e script directly to \u003ccode\u003epackage.json\u003c/code\u003e that runs \u003ccode\u003ebun run index.js\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eGitHub optional dependency:\u003c/strong\u003e Some packages, including \u003ccode\u003eecharts-for-react\u003c/code\u003e, add an \u003ccode\u003eoptionalDependencies\u003c/code\u003e reference to a poisoned commit in the legitimate \u003ccode\u003eantvis/G2\u003c/code\u003e GitHub repository.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eIn the optional dependency pattern, npm resolves the GitHub dependency and automatically runs a \u003ccode\u003eprepare\u003c/code\u003e hook in the referenced commit. The hook runs \u003ccode\u003ebun run index.js \u0026amp;\u0026amp; exit 1\u003c/code\u003e, causing the optional dependency to fail after the payload has already executed. The article states that this approach can evade static analysis tools and supply chain monitoring that only inspect \u003ccode\u003escripts\u003c/code\u003e fields in published package tarballs.\u003c/p\u003e\n\n\u003ch2 id=\"payload-behavior\"\u003ePayload Behavior\u003c/h2\u003e\n\n\u003cp\u003eThe article says the payloads analyzed from \u003ccode\u003e@antv/graphlib@2.1.4\u003c/code\u003e and \u003ccode\u003eecharts-for-react@3.0.7\u003c/code\u003e are obfuscated JavaScript files executed by the Bun runtime. The payloads are described as 486 to 498 KB files using a \u003ccode\u003ejavascript-obfuscator\u003c/code\u003e format with a 1,728-entry string table and PBKDF2-based transformations. The cipher key and salt differ per payload, but the article says the algorithm is identical across the campaign.\u003c/p\u003e\n\n\u003cp\u003eThe payload daemonizes itself by forking into a background process using the \u003ccode\u003e__DAEMONIZED=1\u003c/code\u003e environment variable as a re-entry guard. The foreground process exits quickly so \u003ccode\u003enpm install\u003c/code\u003e can complete with no visible error. The background process then performs the full credential harvest.\u003c/p\u003e\n\n\u003ch2 id=\"github-actions-secret-theft\"\u003eGitHub Actions Secret Theft\u003c/h2\u003e\n\n\u003cp\u003eThe most important capability described in the article is GitHub Actions runner memory scraping. The payload locates the \u003ccode\u003eRunner.Worker\u003c/code\u003e process by scanning \u003ccode\u003e/proc/[pid]/cmdline\u003c/code\u003e. It then reads \u003ccode\u003e/proc/[pid]/mem\u003c/code\u003e and pipes the memory dump through commands that strip null bytes, extract JSON fragments containing \u003ccode\u003eisSecret:true\u003c/code\u003e, and deduplicate the results.\u003c/p\u003e\n\n\u003cp\u003eThe article says this extracts every secret marked \u003ccode\u003eisSecret:true\u003c/code\u003e in the runner’s memory, including \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e, repository secrets, environment secrets, and organization secrets. It also states that this bypasses log masking because the secrets are extracted from process memory in plaintext.\u003c/p\u003e\n\n\u003ch2 id=\"other-credential-theft\"\u003eOther Credential Theft\u003c/h2\u003e\n\n\u003cp\u003eThe payload also reads CI/CD environment variables when it detects CI environments such as GitHub Actions, CircleCI, Travis, and Buildkite. The article explicitly lists variables including \u003ccode\u003eGITHUB_TOKEN\u003c/code\u003e, \u003ccode\u003eACTIONS_ID_TOKEN_REQUEST_TOKEN\u003c/code\u003e, \u003ccode\u003eACTIONS_RUNTIME_TOKEN\u003c/code\u003e, \u003ccode\u003eNPM_TOKEN\u003c/code\u003e, AWS access keys, \u003ccode\u003eVAULT_TOKEN\u003c/code\u003e, and \u003ccode\u003eKUBECONFIG\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eIt also searches more than 130 credential file patterns on the host filesystem. The article lists examples including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCloud credentials such as AWS, GCP, Azure, and Terraform files.\u003c/li\u003e\n\u003cli\u003eSSH keys and SSH configuration.\u003c/li\u003e\n\u003cli\u003eDeveloper tokens such as \u003ccode\u003e.npmrc\u003c/code\u003e, \u003ccode\u003e.pypirc\u003c/code\u003e, \u003ccode\u003e.netrc\u003c/code\u003e, Git credentials, and Docker configuration.\u003c/li\u003e\n\u003cli\u003eKubernetes and Vault configuration files.\u003c/li\u003e\n\u003cli\u003eCryptocurrency wallet files for Bitcoin, Ethereum, Electrum, and Dogecoin.\u003c/li\u003e\n\u003cli\u003eSlack, Telegram, and Discord data.\u003c/li\u003e\n\u003cli\u003eAI tooling configuration including Claude-related files.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"exfiltration-channels\"\u003eExfiltration Channels\u003c/h2\u003e\n\n\u003cp\u003eThe article describes two exfiltration paths. The primary channel is a GitHub API dead-drop in the legitimate \u003ccode\u003eantvis/G2\u003c/code\u003e repository. Encrypted data is committed to a dead-drop branch through the GitHub REST API, using a spoofed \u003ccode\u003epython-requests/2.31.0\u003c/code\u003e User-Agent.\u003c/p\u003e\n\n\u003cp\u003eThe fallback channel is a direct TLS connection to \u003ccode\u003et.m-kosche.com\u003c/code\u003e on port 443. The payload posts to \u003ccode\u003eapi/public/otel/v1/traces\u003c/code\u003e, which the article says is designed to look like an OpenTelemetry collector endpoint. The article instructs defenders to block \u003ccode\u003et.m-kosche.com\u003c/code\u003e at the network level regardless of path.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-and-privilege-escalation\"\u003ePersistence and Privilege Escalation\u003c/h2\u003e\n\n\u003cp\u003eThe article says the malware drops persistent backdoor files into Claude Code and VS Code configurations. It can add a Claude Code \u003ccode\u003eSessionStart\u003c/code\u003e hook in \u003ccode\u003e.claude/settings.json\u003c/code\u003e, place \u003ccode\u003e.claude/setup.mjs\u003c/code\u003e, add a VS Code \u003ccode\u003efolderOpen\u003c/code\u003e task in \u003ccode\u003e.vscode/tasks.json\u003c/code\u003e, and place \u003ccode\u003e.vscode/setup.mjs\u003c/code\u003e. It can also inject a malicious \u003ccode\u003e.github/workflows/codeql.yml\u003c/code\u003e workflow that exfiltrates repository secrets on push or deployment events.\u003c/p\u003e\n\n\u003cp\u003eOn Linux CI runner systems, the payload attempts privilege escalation by writing a sudoers rule granting the \u003ccode\u003erunner\u003c/code\u003e user passwordless sudo access. The article presents the command as writing \u003ccode\u003erunner ALL=(ALL) NOPASSWD:ALL\u003c/code\u003e to \u003ccode\u003e/mnt/runner\u003c/code\u003e and setting permissions to \u003ccode\u003e0440\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"stepsecurity-runtime-analysis\"\u003eStepSecurity Runtime Analysis\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity tested \u003ccode\u003eecharts-for-react@3.0.7\u003c/code\u003e in a GitHub Actions workflow protected by Harden-Runner. With default protections enabled, Harden-Runner blocked the attack in two independent ways. First, it blocked the C2 domain \u003ccode\u003et.m-kosche.com\u003c/code\u003e using the global block list. Second, it detected the payload’s attempt to read \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory and terminated the workflow.\u003c/p\u003e\n\n\u003cp\u003eIn a second workflow, StepSecurity disabled the global block list and lockdown mode to observe the full attack chain. Harden-Runner recorded outbound connections to \u003ccode\u003eregistry.npmjs.org\u003c/code\u003e, \u003ccode\u003et.m-kosche.com\u003c/code\u003e, and \u003ccode\u003eapi.github.com\u003c/code\u003e during installation. It also recorded process telemetry showing npm resolving the poisoned GitHub dependency, running the \u003ccode\u003eprepare\u003c/code\u003e hook, invoking Bun, spawning GitHub CLI reconnaissance, and using Python processes to read \u003ccode\u003e/proc/2175/mem\u003c/code\u003e, the memory of \u003ccode\u003eRunner.Worker\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eHarden-Runner flagged four \u003ccode\u003eRunner Worker Memory Read\u003c/code\u003e detections. Each detection involved a \u003ccode\u003epython3.12\u003c/code\u003e process, spawned through \u003ccode\u003esudo\u003c/code\u003e from \u003ccode\u003ebun.exe\u003c/code\u003e, reading the memory of the GitHub Actions runner worker process. The article describes this as a definitive signal that secrets are being extracted from the runner process.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe article provides several indicators of compromise and detection signals, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNetwork traffic to \u003ccode\u003et.m-kosche.com\u003c/code\u003e on port 443, especially path \u003ccode\u003eapi/public/otel/v1/traces\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eGitHub API dead-drop activity involving the \u003ccode\u003eantvis/G2\u003c/code\u003e repository.\u003c/li\u003e\n\u003cli\u003eNetwork requests using User-Agent \u003ccode\u003epython-requests/2.31.0\u003c/code\u003e from runner hosts.\u003c/li\u003e\n\u003cli\u003eUnexpected \u003ccode\u003epreinstall\u003c/code\u003e or \u003ccode\u003epostinstall\u003c/code\u003e scripts referencing \u003ccode\u003ebun run index.js\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eoptionalDependencies\u003c/code\u003e pointing to a GitHub URL with a specific commit in \u003ccode\u003eantvis/G2\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eUnexpected Python processes reading \u003ccode\u003e/proc/*/mem\u003c/code\u003e during CI runs.\u003c/li\u003e\n\u003cli\u003ePackage size anomalies in compromised tarballs.\u003c/li\u003e\n\u003cli\u003eTwo versions of the same package published within minutes.\u003c/li\u003e\n\u003cli\u003eUnexpected commits with message \u003ccode\u003echore: update dependencies\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eDune-themed repository names and the reversed campaign marker.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also lists persistence artifacts to check, including \u003ccode\u003e.claude/settings.json\u003c/code\u003e, \u003ccode\u003e.claude/setup.mjs\u003c/code\u003e, \u003ccode\u003e.vscode/tasks.json\u003c/code\u003e, \u003ccode\u003e.vscode/setup.mjs\u003c/code\u003e, and \u003ccode\u003e.github/workflows/codeql.yml\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended Response\u003c/h2\u003e\n\n\u003cp\u003eThe article recommends that affected users check lockfiles for compromised packages and versions, search \u003ccode\u003enode_modules\u003c/code\u003e for large injected \u003ccode\u003eindex.js\u003c/code\u003e files, and look for \u003ccode\u003e@antv/setup\u003c/code\u003e references in package metadata. It also recommends checking CI/CD logs for \u003ccode\u003e@antv/setup\u003c/code\u003e, \u003ccode\u003et.m-kosche.com\u003c/code\u003e, \u003ccode\u003ebun run index.js\u003c/code\u003e, and Python processes reading \u003ccode\u003e/proc/*/mem\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eFor code repositories and developer machines, the article recommends pinning to safe versions, deleting \u003ccode\u003enode_modules\u003c/code\u003e, reinstalling dependencies, removing persistence artifacts, and rotating credentials. It specifically says to rotate npm tokens, GitHub personal access tokens, cloud API keys, SSH keys, and other secrets accessible on the machine. It also advises users with cryptocurrency wallet files on affected machines to transfer funds to a new wallet immediately.\u003c/p\u003e\n\n\u003cp\u003eFor CI/CD environments, the article recommends rotating all CI secrets immediately, auditing GitHub repositories for unauthorized commits, reviewing network logs, checking for downstream propagation, and reviewing npm access tokens. The central remediation message is that installation of a compromised version should be treated as credential compromise for anything accessible in that environment.\u003c/p\u003e\n","keyPoints":["A new wave of the Mini Shai-Hulud npm worm is actively compromising packages across Alibaba's AntV data visualization ecosystem and related packages maintained by the compromised npm account atool.","The malicious payload reads GitHub Actions runner process memory to extract masked CI/CD secrets, harvests credentials from more than 130 file paths, and exfiltrates stolen data through the GitHub API and the C2 server t.m-kosche.com.","The worm has used stolen GitHub tokens to create over 2,500 public repositories with Dune-themed names and the reversed campaign marker niagA oG eW ereH :duluH-iahS.","The attack uses install-time execution through direct preinstall or postinstall hooks and optionalDependencies pointing to a poisoned commit in the legitimate antvis/G2 GitHub repository.","The article advises anyone who installed an affected package version to assume all secrets accessible in that environment are compromised and rotate credentials immediately."],"insights":["The optionalDependencies GitHub reference pattern can evade static checks that only inspect scripts in published npm tarballs, because the malicious prepare hook is located in a poisoned commit in the legitimate antvis/G2 repository.","The payload extracts masked GitHub Actions secrets from Runner.Worker process memory, so log masking does not protect secrets if the compromised package runs in the workflow environment.","The malware deliberately uses a fake OpenTelemetry endpoint path on t.m-kosche.com, making path-based observability allowlists an unsafe control for this campaign.","The optional dependency’s prepare hook ends with exit 1 so the dependency fails gracefully while the payload has already executed, reducing visible installation errors.","The article’s Harden-Runner test showed that blocking the C2 domain and detecting Runner.Worker memory reads stopped the attack at separate points in the kill chain."],"referencedReports":[],"body":"\u003cp\u003eA new wave of the Mini Shai-Hulud npm worm is actively compromising packages across Alibaba\u0026rsquo;s AntV data visualization ecosystem and related JavaScript packages. The compromised npm account \u003ccode\u003eatool\u003c/code\u003e, which publishes \u003ccode\u003etimeago.js\u003c/code\u003e and maintains packages across the \u003ccode\u003e@antv\u003c/code\u003e namespace, was used to push malicious versions across charting, graph visualization, mapping, and utility packages. The article says the attack is ongoing and that the affected package list continues to grow.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is significant because the payload steals secrets from CI/CD and developer environments and then actively uses stolen GitHub tokens. The article reports that more than 2,500 public GitHub repositories had been created with Dune-themed names and the reversed marker \u003ccode\u003eniagA oG eW ereH :duluH-iahS\u003c/code\u003e, showing that exfiltrated credentials were being used. The article advises anyone who installed an affected package to assume all secrets accessible in that environment are compromised and rotate credentials immediately.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the malware runs during package installation through direct install hooks or through \u003ccode\u003eoptionalDependencies\u003c/code\u003e pointing to a poisoned commit in the legitimate \u003ccode\u003eantvis/G2\u003c/code\u003e repository. It reads GitHub Actions \u003ccode\u003eRunner.Worker\u003c/code\u003e process memory to extract masked CI/CD secrets, harvests credentials from more than 130 file paths, and exfiltrates data through the GitHub API and \u003ccode\u003et.m-kosche.com\u003c/code\u003e. StepSecurity’s Harden-Runner analysis showed the attack being blocked by a global C2 block list and by detection of runner memory reads.\u003c/p\u003e\n"},{"n":28,"title":"Microsoft's durabletask PyPI Package Compromised in Supply Chain Attack","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/microsofts-durabletask-pypi-package-compromised-in-supply-chain-attack","time":"19:37","priority":"MUST READ","score":97,"tldr":"Microsoft’s official durabletask PyPI package was compromised in versions 1.4.1–1.4.3, executing a malicious cloud-focused credential theft and propagation payload on import. Anyone who installed these versions should treat affected systems as compromised, isolate them, pin back to 1.4.0, and rotate all exposed credentials.","briefOverview":"\u003cp\u003eMicrosoft’s \u003ccode\u003edurabletask\u003c/code\u003e Python SDK on PyPI was compromised on May 19, 2026, with malicious versions 1.4.1, 1.4.2, and 1.4.3 uploaded directly to PyPI. The package is the official SDK for Azure Durable Functions and is downloaded over 400,000 times per month. The article says the malicious releases had no matching GitHub tags, releases, or CI/CD runs, indicating the repository build pipeline was bypassed.\u003c/p\u003e\n\n\u003cp\u003eThe injected code ran when the package was imported on Linux and downloaded \u003ccode\u003erope.pyz\u003c/code\u003e from \u003ccode\u003echeck.git-service.com\u003c/code\u003e. The payload is described as a modular cloud intrusion framework that steals secrets from AWS, Azure, GCP, Kubernetes, filesystems, password managers, and HashiCorp Vault. It also supports persistence, exfiltration through multiple channels, and lateral movement through AWS SSM and Kubernetes.\u003c/p\u003e\n\n\u003cp\u003eThe article links the attack to TeamPCP’s Mini Shai-Hulud campaign through the secondary C2 domain \u003ccode\u003et.m-kosche.com\u003c/code\u003e. Microsoft confirmed the compromise and yanked the affected versions. Users of affected versions are instructed to treat systems as compromised, isolate them, pin to version 1.4.0, rotate credentials, and inspect for lateral movement.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eOn May 19, 2026, Microsoft’s official \u003ccode\u003edurabletask\u003c/code\u003e Python SDK was compromised on PyPI. Three malicious versions, 1.4.1, 1.4.2, and 1.4.3, were uploaded within a 35-minute window. The article states that none of these versions had corresponding GitHub tags, releases, or CI/CD runs in Microsoft’s repository. Microsoft later confirmed the compromise and yanked the affected versions.\u003c/p\u003e\n\n\u003cp\u003eThe attack appears to have bypassed the project’s normal publishing workflow. The repository’s release workflow uses a \u003ccode\u003ePYPI_API_TOKEN\u003c/code\u003e stored in GitHub Secrets and publishes with \u003ccode\u003etwine upload\u003c/code\u003e only when a \u003ccode\u003ev*\u003c/code\u003e tag is pushed. No such tag was pushed on May 19, and no CI/CD workflow ran. The article says this points to a compromised PyPI publishing token or compromised maintainer account, and notes that the repository did not use PyPI Trusted Publishing.\u003c/p\u003e\n\n\u003cp\u003eThe malicious code was injected into package files and executed at import time on Linux systems. It downloaded \u003ccode\u003erope.pyz\u003c/code\u003e from \u003ccode\u003ehttps://check.git-service.com/rope.pyz\u003c/code\u003e to \u003ccode\u003e/tmp/managed.pyz\u003c/code\u003e and launched it as a detached background process with output suppressed. The article says version 1.4.1 infected \u003ccode\u003e__init__.py\u003c/code\u003e, version 1.4.2 added \u003ccode\u003etask.py\u003c/code\u003e, and version 1.4.3 expanded injection into additional package submodules.\u003c/p\u003e\n\n\u003cp\u003eThe downloaded payload, \u003ccode\u003erope.pyz\u003c/code\u003e, is described as a 28,703-byte Python zipapp with 17 source files. It includes collectors for AWS, Azure, GCP, Kubernetes, local filesystem credentials, password managers, and HashiCorp Vault. It compresses and encrypts stolen data, then attempts exfiltration through HTTPS to \u003ccode\u003echeck.git-service.com\u003c/code\u003e, GitHub-discovered C2 URLs, and public GitHub repositories created using stolen GitHub tokens.\u003c/p\u003e\n\n\u003cp\u003eThe article connects the incident to TeamPCP’s Mini Shai-Hulud campaign based on the secondary C2 domain \u003ccode\u003et.m-kosche.com\u003c/code\u003e, which it describes as known TeamPCP infrastructure. It also cites Russian folklore-themed exfiltration repository names, a Russian locale exclusion, and a geopolitically targeted destructive payload as additional indicators. The payload includes persistence through a fake \u003ccode\u003epgsql-monitor.service\u003c/code\u003e, propagation through AWS SSM and Kubernetes \u003ccode\u003ekubectl exec\u003c/code\u003e, and a \u003ccode\u003eroulette.py\u003c/code\u003e module that can execute \u003ccode\u003erm -rf /*\u003c/code\u003e on certain locale or timezone-matched systems.\u003c/p\u003e\n\n\u003cp\u003eThe recommended response is to treat systems running \u003ccode\u003edurabletask\u003c/code\u003e 1.4.1, 1.4.2, or 1.4.3 as compromised. The article advises isolating affected systems, checking for \u003ccode\u003e/tmp/managed.pyz\u003c/code\u003e, \u003ccode\u003epgsql-monitor.service\u003c/code\u003e, and related marker files, rotating all accessible credentials, reviewing cloud resources for unauthorized access, checking network logs for C2 connections, and inspecting pods and instances for lateral movement. It also recommends pinning to version 1.4.0, using hash verification, adopting PyPI Trusted Publishing, monitoring for PyPI releases without matching GitHub tags, and restricting outbound network access.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft’s \u003ccode\u003edurabletask\u003c/code\u003e Python SDK was compromised on PyPI on May 19, 2026. The affected versions were \u003ccode\u003e1.4.1\u003c/code\u003e, \u003ccode\u003e1.4.2\u003c/code\u003e, and \u003ccode\u003e1.4.3\u003c/code\u003e, all uploaded directly to PyPI within a 35-minute window. The package is described as the official SDK for Azure Durable Functions and receives over 400,000 downloads per month.\u003c/p\u003e\n\n\u003cp\u003eThe article states that none of the malicious PyPI versions had corresponding tags, releases, or CI/CD runs in Microsoft’s GitHub repository. The attacker therefore bypassed the repository’s build pipeline and uploaded directly to PyPI. Microsoft confirmed the compromise and yanked the affected package versions.\u003c/p\u003e\n\n\u003ch2 id=\"affected-versions\"\u003eAffected Versions\u003c/h2\u003e\n\n\u003cp\u003eThe compromised versions were:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003edurabletask\u003c/code\u003e 1.4.1\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edurabletask\u003c/code\u003e 1.4.2\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edurabletask\u003c/code\u003e 1.4.3\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article advises users to run \u003ccode\u003epip show durabletask\u003c/code\u003e and, if the installed version is one of the affected versions, treat the system as compromised. It recommends pinning to version \u003ccode\u003e1.4.0\u003c/code\u003e, which is described in the timeline as the last clean release.\u003c/p\u003e\n\n\u003ch2 id=\"publishing-and-supply-chain-failure\"\u003ePublishing and Supply Chain Failure\u003c/h2\u003e\n\n\u003cp\u003eThe article explains that the GitHub repository’s release workflow, \u003ccode\u003edurabletask.yml\u003c/code\u003e, normally publishes packages to PyPI using a \u003ccode\u003ePYPI_API_TOKEN\u003c/code\u003e stored in GitHub Secrets and \u003ccode\u003etwine upload\u003c/code\u003e. The workflow triggers only when a tag matching \u003ccode\u003ev*\u003c/code\u003e is pushed to the repository.\u003c/p\u003e\n\n\u003cp\u003eNo such tags were pushed on May 19, and no CI/CD workflow ran. The article states that this indicates the attacker uploaded directly to PyPI and bypassed the repository’s build process. It says this points to either a compromised PyPI publishing token or a compromised maintainer account.\u003c/p\u003e\n\n\u003cp\u003eThe article also notes that the repository did not use PyPI Trusted Publishing through OIDC. It states that Trusted Publishing would have prevented direct token-based uploads from outside the CI/CD pipeline.\u003c/p\u003e\n\n\u003ch2 id=\"initial-malicious-code\"\u003eInitial Malicious Code\u003c/h2\u003e\n\n\u003cp\u003eThe attacker replaced the Microsoft copyright header in \u003ccode\u003e__init__.py\u003c/code\u003e with a short Python dropper. The code imported standard libraries, checked whether the system was Linux, downloaded \u003ccode\u003erope.pyz\u003c/code\u003e from \u003ccode\u003ehttps://check.git-service.com/rope.pyz\u003c/code\u003e, saved it as \u003ccode\u003e/tmp/managed.pyz\u003c/code\u003e, and launched it using \u003ccode\u003epython3\u003c/code\u003e in a detached background process.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights several characteristics of the dropper:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt only runs on Linux.\u003c/li\u003e\n\u003cli\u003eIt runs when the package is imported, not during installation.\u003c/li\u003e\n\u003cli\u003eIt detaches execution with \u003ccode\u003estart_new_session=True\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eIt redirects standard input, output, and error to \u003ccode\u003e/dev/null\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eIt suppresses all exceptions with \u003ccode\u003eexcept: pass\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eIt uses the bland filename \u003ccode\u003emanaged.pyz\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also says the attacker expanded the injection across versions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVersion 1.4.1 infected \u003ccode\u003e__init__.py\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eVersion 1.4.2 infected \u003ccode\u003e__init__.py\u003c/code\u003e and \u003ccode\u003etask.py\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eVersion 1.4.3 infected \u003ccode\u003e__init__.py\u003c/code\u003e, \u003ccode\u003etask.py\u003c/code\u003e, \u003ccode\u003eentities/__init__.py\u003c/code\u003e, \u003ccode\u003eextensions/__init__.py\u003c/code\u003e, and \u003ccode\u003epayload/__init__.py\u003c/code\u003e.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis progression increased the likelihood that the malicious code would run regardless of which submodule was imported first.\u003c/p\u003e\n\n\u003ch2 id=\"runtime-behavior-observed-with-harden-runner\"\u003eRuntime Behavior Observed with Harden-Runner\u003c/h2\u003e\n\n\u003cp\u003eThe article describes a runtime analysis performed in a GitHub Actions workflow protected by Harden-Runner. The StepSecurity Global block list was disabled for the analysis so that the payload could execute and the complete attack chain could be observed. The article notes that in a default Harden-Runner deployment, the outbound call to \u003ccode\u003echeck.git-service.com\u003c/code\u003e would have been blocked automatically.\u003c/p\u003e\n\n\u003cp\u003eDuring \u003ccode\u003epip install durabletask\u003c/code\u003e, only legitimate connections to \u003ccode\u003epypi.org\u003c/code\u003e and \u003ccode\u003efiles.pythonhosted.org\u003c/code\u003e were observed. Malicious behavior began at \u003ccode\u003eimport durabletask\u003c/code\u003e. Harden-Runner recorded outbound connections from \u003ccode\u003epython3.14\u003c/code\u003e to \u003ccode\u003echeck.git-service.com\u003c/code\u003e, additional PyPI calls caused by runtime installation of \u003ccode\u003ecryptography\u003c/code\u003e, and traffic to \u003ccode\u003ewww.youtube.com\u003c/code\u003e, described as a connectivity check or decoy.\u003c/p\u003e\n\n\u003cp\u003eThe process tree showed that a single \u003ccode\u003eimport durabletask\u003c/code\u003e spawned multiple \u003ccode\u003e/tmp/managed.pyz\u003c/code\u003e child processes. These processes performed actions including installing \u003ccode\u003ecryptography\u003c/code\u003e, reloading user systemd services, probing Kubernetes with \u003ccode\u003ekubectl version --client\u003c/code\u003e, decrypting with \u003ccode\u003egpg\u003c/code\u003e, and attempting GitHub token theft through \u003ccode\u003egh auth token\u003c/code\u003e and \u003ccode\u003egh auth status --show-token\u003c/code\u003e. The article states that the chain from import to credential theft completed in under four seconds.\u003c/p\u003e\n\n\u003ch2 id=\"payload-rope-pyz\"\u003ePayload: \u003ccode\u003erope.pyz\u003c/code\u003e\u003c/h2\u003e\n\n\u003cp\u003eThe downloaded payload was identified as \u003ccode\u003erope.pyz\u003c/code\u003e, with SHA256 hash \u003ccode\u003e069ac1dc7f7649b76bc72a11ac700f373804bfd81dab7e561157b703999f44ce\u003c/code\u003e. The article describes it as a 28,703-byte Python zipapp containing 17 source files. It characterizes the payload as a modular credential theft and lateral movement framework.\u003c/p\u003e\n\n\u003cp\u003eBefore running collectors, the payload performs anti-analysis and environment checks. It exits if the platform is not Linux, if the locale begins with Russian, or if the system has two or fewer CPUs. The article says the Russian locale exclusion is a known tactic used by Eastern European cybercrime groups to avoid domestic law enforcement attention, and that the CPU check filters out many automated analysis sandboxes.\u003c/p\u003e\n\n\u003cp\u003eThe payload also installs the \u003ccode\u003ecryptography\u003c/code\u003e Python package if it is not already present. The article says it uses the \u003ccode\u003e--break-system-packages\u003c/code\u003e flag to bypass PEP 668 protections on newer Linux distributions.\u003c/p\u003e\n\n\u003ch2 id=\"credential-collection-capabilities\"\u003eCredential Collection Capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe framework runs seven collector modules in parallel using \u003ccode\u003eThreadPoolExecutor\u003c/code\u003e.\u003c/p\u003e\n\n\u003ch3 id=\"aws\"\u003eAWS\u003c/h3\u003e\n\n\u003cp\u003eThe AWS collector resolves credentials from environment variables, EC2 instance metadata using IMDSv2, and \u003ccode\u003e~/.aws/credentials\u003c/code\u003e profiles. It enumerates Secrets Manager secrets and SSM Parameter Store values across 19 AWS regions. For SSM parameters, it uses \u003ccode\u003eWithDecryption: True\u003c/code\u003e to decrypt SecureString values. It also enumerates SSM-managed instances for lateral movement.\u003c/p\u003e\n\n\u003ch3 id=\"azure\"\u003eAzure\u003c/h3\u003e\n\n\u003cp\u003eThe Azure collector attempts authentication through client secret credentials, client certificate authentication with custom JWT generation, Azure CLI token cache, and managed identity through IMDS. Once authenticated, it enumerates subscriptions, Key Vaults, and secrets within those vaults.\u003c/p\u003e\n\n\u003ch3 id=\"gcp\"\u003eGCP\u003c/h3\u003e\n\n\u003cp\u003eThe GCP collector reads service account JSON key files, manually generates JWTs for authentication, and falls back to the metadata server. It then dumps secrets from Secret Manager for the discovered project.\u003c/p\u003e\n\n\u003ch3 id=\"kubernetes\"\u003eKubernetes\u003c/h3\u003e\n\n\u003cp\u003eThe Kubernetes collector is described as the largest collector at 483 lines. It parses kubeconfig files, handles mTLS client certificates using \u003ccode\u003ememfd_create()\u003c/code\u003e to avoid writing certificates to disk, connects to the Kubernetes API, and dumps secrets across namespaces and contexts. If \u003ccode\u003ekubectl\u003c/code\u003e is not installed, the payload downloads it automatically. The Kubernetes module also propagates to other pods.\u003c/p\u003e\n\n\u003ch3 id=\"filesystem\"\u003eFilesystem\u003c/h3\u003e\n\n\u003cp\u003eThe filesystem collector reads 99 hardcoded credential paths. The article lists targeted data sources including cloud provider configs, Claude Desktop config, Cursor MCP config, VS Code settings, Zed settings, Codeium config, Continue config, SSH keys, Git credentials, Docker configs, npm tokens, PyPI tokens, Cargo tokens, Terraform state files, Pulumi credentials, Ansible vault passwords, Tailscale state, WireGuard configurations, shell histories, \u003ccode\u003e.env\u003c/code\u003e files, Docker container environment variables through the Docker socket, and the full \u003ccode\u003eos.environ\u003c/code\u003e dictionary.\u003c/p\u003e\n\n\u003ch3 id=\"password-managers\"\u003ePassword Managers\u003c/h3\u003e\n\n\u003cp\u003eThe password manager collector targets 1Password, Bitwarden, \u003ccode\u003epass\u003c/code\u003e, and \u003ccode\u003egopass\u003c/code\u003e. It attempts to brute-force unlock these tools by collecting candidate passwords from environment variables matching patterns such as \u003ccode\u003e*PASS*\u003c/code\u003e, \u003ccode\u003e*SECRET*\u003c/code\u003e, and \u003ccode\u003e*KEY*\u003c/code\u003e, and from shell history entries containing \u003ccode\u003ebw unlock\u003c/code\u003e or \u003ccode\u003eop signin\u003c/code\u003e commands.\u003c/p\u003e\n\n\u003ch3 id=\"hashicorp-vault\"\u003eHashiCorp Vault\u003c/h3\u003e\n\n\u003cp\u003eThe Vault collector resolves tokens from \u003ccode\u003eVAULT_TOKEN\u003c/code\u003e, \u003ccode\u003e~/.vault-token\u003c/code\u003e, AppRole login variables, and the Vault CLI. It then walks all KV mounts and reads every secret.\u003c/p\u003e\n\n\u003ch2 id=\"encryption-and-exfiltration\"\u003eEncryption and Exfiltration\u003c/h2\u003e\n\n\u003cp\u003eThe article states that stolen data is compressed with gzip and encrypted using AES-256-GCM. The AES key is wrapped with RSA-OAEP using a hardcoded RSA-4096 public key. The article notes that only the attacker holding the corresponding private key can decrypt the exfiltrated data.\u003c/p\u003e\n\n\u003cp\u003eThe exfiltration design has three redundant layers:\u003c/p\u003e\n\n\u003col\u003e\n\u003cli\u003ePrimary exfiltration through HTTPS POST to \u003ccode\u003ehttps://check.git-service.com/api/public/version\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eSecondary exfiltration through GitHub searches for commits containing \u003ccode\u003eFIRESCALE\u003c/code\u003e beacons with RSA-signed URLs, allowing the attacker to update the C2 endpoint through public GitHub commits.\u003c/li\u003e\n\u003cli\u003eTertiary exfiltration using stolen GitHub tokens to create public repositories with Russian folklore-themed names and upload encrypted stolen data bundles.\u003c/li\u003e\n\u003c/ol\u003e\n\n\u003cp\u003eThe article emphasizes that the tertiary method uses the victim’s own stolen GitHub tokens to exfiltrate stolen credentials through the victim’s own GitHub account.\u003c/p\u003e\n\n\u003ch2 id=\"persistence-and-lateral-movement\"\u003ePersistence and Lateral Movement\u003c/h2\u003e\n\n\u003cp\u003eThe payload installs persistence through a fake PostgreSQL monitoring service named \u003ccode\u003epgsql-monitor.service\u003c/code\u003e. The article lists \u003ccode\u003e/usr/bin/pgmonitor.py\u003c/code\u003e or \u003ccode\u003e~/.local/bin/pgmonitor.py\u003c/code\u003e as host-based indicators associated with this persistence.\u003c/p\u003e\n\n\u003cp\u003eThe framework also includes two propagation mechanisms.\u003c/p\u003e\n\n\u003ch3 id=\"aws-ssm-propagation\"\u003eAWS SSM Propagation\u003c/h3\u003e\n\n\u003cp\u003eAfter identifying SSM-managed instances, the payload uses \u003ccode\u003eSendCommand\u003c/code\u003e with the \u003ccode\u003eAWS-RunShellScript\u003c/code\u003e document to run the payload on up to five other EC2 instances per profile. The propagation script downloads the payload from the primary C2 and falls back to \u003ccode\u003et.m-kosche.com\u003c/code\u003e if needed.\u003c/p\u003e\n\n\u003ch3 id=\"kubernetes-propagation\"\u003eKubernetes Propagation\u003c/h3\u003e\n\n\u003cp\u003eThe Kubernetes propagation path lists running pods across all namespaces using \u003ccode\u003ekubectl get pods\u003c/code\u003e. It then executes a shell script in up to five pods through \u003ccode\u003ekubectl exec\u003c/code\u003e. The script downloads and runs \u003ccode\u003erope.pyz\u003c/code\u003e inside the target pod.\u003c/p\u003e\n\n\u003cp\u003eThe article says both mechanisms use marker files such as \u003ccode\u003e~/.cache/.sys-update-check\u003c/code\u003e and \u003ccode\u003e~/.cache/.sys-update-check-k8s\u003c/code\u003e to avoid reinfecting the same target.\u003c/p\u003e\n\n\u003ch2 id=\"destructive-wiper-module\"\u003eDestructive Wiper Module\u003c/h2\u003e\n\n\u003cp\u003eThe payload includes a \u003ccode\u003eroulette.py\u003c/code\u003e module. This module checks whether the compromised system appears to be in specific geographies based on timezone and locale settings. The article lists timezone markers including \u003ccode\u003eJerusalem\u003c/code\u003e, \u003ccode\u003eTel_Aviv\u003c/code\u003e, and \u003ccode\u003eTehran\u003c/code\u003e, and locale markers including \u003ccode\u003ehe_IL\u003c/code\u003e and \u003ccode\u003efa_IR\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eIf the system matches, the module rolls a virtual die with \u003ccode\u003erandom.randint(1, 6)\u003c/code\u003e. If the result is 2, it sets audio to maximum volume using PulseAudio, plays an audio file from the C2 server, and executes \u003ccode\u003erm -rf /*\u003c/code\u003e. If the system does not match or the roll does not land on the destructive value, the module deploys persistence through the fake PostgreSQL monitoring service.\u003c/p\u003e\n\n\u003ch2 id=\"c2-infrastructure\"\u003eC2 Infrastructure\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies the following command-and-control infrastructure:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePrimary domain: \u003ccode\u003echeck.git-service.com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eSecondary domain: \u003ccode\u003et.m-kosche.com\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eIP address: \u003ccode\u003e160.119.64.3\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eASN: AS7489, HostUS\u003c/li\u003e\n\u003cli\u003eNetname: JACK-NET in the AFRINIC region\u003c/li\u003e\n\u003cli\u003eRegistrar: NameSilo, LLC\u003c/li\u003e\n\u003cli\u003eDomain creation date: May 16, 2026\u003c/li\u003e\n\u003cli\u003ePrivacy provider: PrivacyGuardian.org\u003c/li\u003e\n\u003cli\u003eName servers: \u003ccode\u003ens1.dnsowl.com\u003c/code\u003e, \u003ccode\u003ens2.dnsowl.com\u003c/code\u003e, and \u003ccode\u003ens3.dnsowl.com\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that \u003ccode\u003egit-service.com\u003c/code\u003e was registered three days before the attack and that a TLS certificate for \u003ccode\u003echeck.git-service.com\u003c/code\u003e was issued the same day.\u003c/p\u003e\n\n\u003ch2 id=\"attribution-linkage-described-in-the-article\"\u003eAttribution Linkage Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article connects the attack to TeamPCP’s Mini Shai-Hulud campaign through the secondary C2 domain \u003ccode\u003et.m-kosche.com\u003c/code\u003e, which it describes as known TeamPCP infrastructure. It says the same infrastructure was used in a string of high-profile supply chain attacks in 2025 and 2026.\u003c/p\u003e\n\n\u003cp\u003eThe article lists prior campaigns affecting TanStack, Mistral AI, Guardrails AI, LiteLLM, OpenSearch, Telnyx, \u003ccode\u003e@antv\u003c/code\u003e, and Checkmarx. It also cites Russian folklore naming conventions for exfiltration repositories, Russian locale exclusion, and a geopolitically targeted destructive payload as additional indicators of TeamPCP involvement.\u003c/p\u003e\n\n\u003ch2 id=\"timeline\"\u003eTimeline\u003c/h2\u003e\n\n\u003cp\u003eThe article provides the following timeline:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApril 8, 2026, 18:49 UTC: \u003ccode\u003edurabletask\u003c/code\u003e 1.4.0 published legitimately.\u003c/li\u003e\n\u003cli\u003eMay 16, 2026, 01:31 UTC: \u003ccode\u003erope.pyz\u003c/code\u003e core modules authored.\u003c/li\u003e\n\u003cli\u003eMay 16, 2026, 18:44 UTC: \u003ccode\u003egit-service.com\u003c/code\u003e registered through NameSilo.\u003c/li\u003e\n\u003cli\u003eMay 16, 2026, 18:58 UTC: TLS certificate issued for \u003ccode\u003echeck.git-service.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eMay 19, 2026, 16:19 UTC: \u003ccode\u003edurabletask\u003c/code\u003e 1.4.1 uploaded to PyPI with one infected file.\u003c/li\u003e\n\u003cli\u003eMay 19, 2026, 16:49 UTC: \u003ccode\u003edurabletask\u003c/code\u003e 1.4.2 uploaded to PyPI with two infected files.\u003c/li\u003e\n\u003cli\u003eMay 19, 2026, 16:54 UTC: \u003ccode\u003edurabletask\u003c/code\u003e 1.4.3 uploaded to PyPI with five infected files.\u003c/li\u003e\n\u003cli\u003eMay 19, 2026, 16:47 UTC: Amazon Inspector publishes advisory MAL-2026-4174.\u003c/li\u003e\n\u003cli\u003eMay 19, 2026, 17:54 UTC: GitHub Issue #137 filed reporting the compromise.\u003c/li\u003e\n\u003cli\u003eMay 19, 2026, 18:04 UTC: Microsoft confirms the packages were yanked.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"indicators-of-compromise\"\u003eIndicators of Compromise\u003c/h2\u003e\n\n\u003ch3 id=\"file-hashes\"\u003eFile Hashes\u003c/h3\u003e\n\n\u003cp\u003eThe article lists SHA256 hashes for affected artifacts:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003edurabletask-1.4.1\u003c/code\u003e wheel: \u003ccode\u003e7d80b3ef74ad7992b93c31966962612e4e2ceb93e7727cdbd1d2a9af47d44ba8\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edurabletask-1.4.1\u003c/code\u003e sdist: \u003ccode\u003e3de04fe2a76262743ed089efa7115f4508619838e77d60b9a1aab8b20d2cc8bf\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edurabletask-1.4.2\u003c/code\u003e wheel: \u003ccode\u003eaeaf583e20347bf850e2fabdcd6f4982996ba023f8c2cd56bbd299cfd56516f5\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edurabletask-1.4.2\u003c/code\u003e sdist: \u003ccode\u003e85f54c089d78ebfb101454ec934c767065a342a43c9ee1beac8430cdd3b2086f\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edurabletask-1.4.3\u003c/code\u003e wheel: \u003ccode\u003e877ff2531a63393c4cb9c3c86908b62d9c4fc3db971bc231c48537faae6cb3ec\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003edurabletask-1.4.3\u003c/code\u003e sdist: \u003ccode\u003ec0b094e46842260936d4b97ce63e4539b99a3eae48b736798c700217c52569dc\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003erope.pyz\u003c/code\u003e: \u003ccode\u003e069ac1dc7f7649b76bc72a11ac700f373804bfd81dab7e561157b703999f44ce\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"network-indicators\"\u003eNetwork Indicators\u003c/h3\u003e\n\n\u003cp\u003eThe article lists the following network indicators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003echeck.git-service.com\u003c/code\u003e as the primary C2 and payload host.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003et.m-kosche.com\u003c/code\u003e as the secondary C2 associated with TeamPCP infrastructure.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e160.119.64.3\u003c/code\u003e as the C2 server IP address.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003echeck.git-service.com/rope.pyz\u003c/code\u003e as the payload download URL.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003echeck.git-service.com/api/public/version\u003c/code\u003e as the exfiltration endpoint.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003echeck.git-service.com/v1/models\u003c/code\u003e as a quarantine or persistence trigger.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch3 id=\"host-based-indicators\"\u003eHost-Based Indicators\u003c/h3\u003e\n\n\u003cp\u003eThe article lists the following host-based indicators:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003e/tmp/managed.pyz\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e/usr/bin/pgmonitor.py\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.local/bin/pgmonitor.py\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.cache/.sys-update-check\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003e~/.cache/.sys-update-check-k8s\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003epgsql-monitor.service\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eProcess: \u003ccode\u003epython3 /tmp/managed.pyz\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"recommended-response\"\u003eRecommended Response\u003c/h2\u003e\n\n\u003cp\u003eFor systems running affected versions, the article recommends the following:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIsolate the system rather than only uninstalling the package.\u003c/li\u003e\n\u003cli\u003eCheck for \u003ccode\u003e/tmp/managed.pyz\u003c/code\u003e, \u003ccode\u003epgsql-monitor.service\u003c/code\u003e, and \u003ccode\u003e~/.cache/.sys-update-check\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eRotate all credentials accessible from the system, including AWS keys, Azure service principals, GCP service accounts, Kubernetes secrets, SSH keys, GitHub tokens, database passwords, and secrets stored in environment variables.\u003c/li\u003e\n\u003cli\u003eAudit cloud resources for unauthorized access using exfiltrated credentials.\u003c/li\u003e\n\u003cli\u003eCheck network logs for connections to \u003ccode\u003echeck.git-service.com\u003c/code\u003e and \u003ccode\u003et.m-kosche.com\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eInspect other pods and instances for signs of lateral movement.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eFor prevention, the article recommends:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003ePinning package versions and verifying hashes with \u003ccode\u003epip install --require-hashes\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eUsing PyPI Trusted Publishing through OIDC instead of long-lived API tokens.\u003c/li\u003e\n\u003cli\u003eMonitoring for PyPI releases without matching GitHub tags in dependency trees.\u003c/li\u003e\n\u003cli\u003eRestricting outbound network access from CI/CD runners and production workloads.\u003c/li\u003e\n\u003cli\u003eUsing StepSecurity’s OSS Package Security to detect compromised packages in the supply chain.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"overall-significance\"\u003eOverall Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article presents the \u003ccode\u003edurabletask\u003c/code\u003e compromise as a serious supply chain attack because it affected an official Microsoft package with high monthly download volume and used legitimate PyPI publishing access. The attack did not rely on a visible repository compromise or a malicious CI/CD run, making it difficult to detect through GitHub release monitoring alone.\u003c/p\u003e\n\n\u003cp\u003eThe technical impact described in the article is broad. The payload targeted cloud credentials, Kubernetes secrets, local credential stores, password managers, HashiCorp Vault, GitHub tokens, Docker environments, shell histories, and environment variables. It also included encrypted exfiltration, redundant C2 mechanisms, persistence, cloud and Kubernetes propagation, and a destructive wiper path for systems matching specific locale and timezone indicators.\u003c/p\u003e\n","keyPoints":["Microsoft’s durabletask Python SDK on PyPI was compromised with three malicious versions, 1.4.1, 1.4.2, and 1.4.3, uploaded directly to PyPI on May 19, 2026.","The malicious versions had no corresponding GitHub tags, releases, or CI/CD runs, indicating the attacker bypassed Microsoft’s repository build pipeline using compromised publishing access.","The injected code executed on Linux at import time and downloaded rope.pyz, a modular payload that stole cloud secrets, installed persistence, and attempted lateral movement through AWS SSM and Kubernetes.","The payload exfiltrated stolen data through multiple channels, including HTTPS to check.git-service.com and public GitHub repositories created with stolen GitHub tokens.","Users who installed durabletask versions 1.4.1, 1.4.2, or 1.4.3 are advised to treat affected systems as compromised, isolate them, pin to version 1.4.0, and rotate accessible credentials."],"insights":["The compromise was especially hard to catch through repository monitoring because the malicious PyPI releases had no matching GitHub tags, releases, or CI/CD workflow runs.","The payload began only when durabletask was imported, not during pip install, meaning install-time monitoring alone could miss the malicious behavior.","PyPI Trusted Publishing could have prevented this direct token-based upload path because the article states the project used a long-lived PyPI token instead of OIDC-based publishing.","The payload’s tertiary exfiltration method used victims’ own stolen GitHub tokens to create public repositories and upload encrypted stolen data, making GitHub account audits an important part of response.","The attacker progressively expanded the malicious injection across more package files in versions 1.4.2 and 1.4.3 to increase the chance of execution regardless of which submodule was imported first."],"referencedReports":[{"title":"OSV Advisory MAL-2026-4174","url":"https://osv.dev/vulnerability/MAL-2026-4174","publisher":"Amazon Inspector","context":"The article cites this advisory as the Amazon Inspector publication reporting the malicious durabletask package compromise.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft’s \u003ccode\u003edurabletask\u003c/code\u003e Python SDK on PyPI was compromised on May 19, 2026, with malicious versions 1.4.1, 1.4.2, and 1.4.3 uploaded directly to PyPI. The package is the official SDK for Azure Durable Functions and is downloaded over 400,000 times per month. The article says the malicious releases had no matching GitHub tags, releases, or CI/CD runs, indicating the repository build pipeline was bypassed.\u003c/p\u003e\n\n\u003cp\u003eThe injected code ran when the package was imported on Linux and downloaded \u003ccode\u003erope.pyz\u003c/code\u003e from \u003ccode\u003echeck.git-service.com\u003c/code\u003e. The payload is described as a modular cloud intrusion framework that steals secrets from AWS, Azure, GCP, Kubernetes, filesystems, password managers, and HashiCorp Vault. It also supports persistence, exfiltration through multiple channels, and lateral movement through AWS SSM and Kubernetes.\u003c/p\u003e\n\n\u003cp\u003eThe article links the attack to TeamPCP’s Mini Shai-Hulud campaign through the secondary C2 domain \u003ccode\u003et.m-kosche.com\u003c/code\u003e. Microsoft confirmed the compromise and yanked the affected versions. Users of affected versions are instructed to treat systems as compromised, isolate them, pin to version 1.4.0, rotate credentials, and inspect for lateral movement.\u003c/p\u003e\n"},{"n":21,"title":"Mini Shai-Hulud Pushes Malicious AntV npm Packages via Compromised Maintainer Account","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/mini-shai-hulud-pushes-malicious-antv.html","time":"04:54","priority":"MUST READ","score":95,"tldr":"A compromised npm maintainer account was used in the Mini Shai-Hulud campaign to publish hundreds of malicious versions of popular AntV-related packages, including echarts-for-react, exposing downstream users to credential theft. The malware steals cloud, GitHub, npm, SSH, and other secrets, then uses stolen tokens to spread to more packages, creating a rapidly expanding supply-chain risk.","briefOverview":"\u003cp\u003eCybersecurity researchers discovered a software supply chain attack compromising npm packages associated with the @antv ecosystem as part of the ongoing Mini Shai-Hulud attack wave. Socket said the attack affected packages tied to the npm maintainer account atool, including echarts-for-react, a React wrapper for Apache ECharts with about 1.1 million weekly downloads. The affected packages include many @antv packages and related packages outside the namespace, such as timeago.js, size-sensor, and canvas-nest.js.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is significant because the compromised publishing account is connected to widely used packages across data visualization, graphing, mapping, charting, and React component ecosystems. Socket said the attacker published 639 malicious versions across 323 unique packages, including 558 versions across 279 unique @antv packages. The article says downstream exposure is meaningful for organizations that automatically pull new dependency versions.\u003c/p\u003e\n\n\u003cp\u003eThe stealer payload harvests more than 20 credential types, including cloud, GitHub, npm, SSH, Kubernetes, Vault, Stripe, and database secrets, and attempts Docker container escape through the host socket. The malware exfiltrates data to t.m-kosche[.]com:443 and can fall back to creating public GitHub repositories under victims’ accounts. It also uses stolen npm tokens to enumerate packages, inject malicious payloads, add preinstall hooks, bump versions, and republish packages under compromised maintainer identities.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers reported a new software supply chain attack that compromised npm packages tied to the @antv ecosystem during the ongoing Mini Shai-Hulud attack wave. Socket said the attack affected packages linked to the npm maintainer account atool, including echarts-for-react, which has roughly 1.1 million weekly downloads. The affected set includes @antv/g2, @antv/g6, @antv/x6, @antv/l7, @antv/s2, @antv/f2, @antv/g, @antv/g2plot, @antv/graphin, and @antv/data-set, as well as non-@antv packages including echarts-for-react, timeago.js, size-sensor, and canvas-nest.js.\u003c/p\u003e\n\n\u003cp\u003eSocket said the attacker published 639 malicious versions across 323 unique packages, including 558 versions across 279 unique @antv packages. The article describes the tradecraft as matching Mini Shai-Hulud, in which a compromised maintainer account is used to push trojanized package versions in quick succession. Socket warned that the potential blast radius is significant because the publishing account is associated with widely used packages across charting, mapping, graphing, visualization, and React component ecosystems.\u003c/p\u003e\n\n\u003cp\u003eThe malware payload steals more than 20 credential types, including Amazon Web Services, Google Cloud, Microsoft Azure, GitHub, npm, SSH, Kubernetes, Vault, Stripe, and database connection strings. It also attempts Docker container escape through the host socket. The article says the stealer is identical to the Mini Shai-Hulud payload used in the SAP compromise.\u003c/p\u003e\n\n\u003cp\u003eThe collected data is serialized, compressed, encrypted, and sent to t.m-kosche[.]com:443. As a fallback, the malware uses stolen GitHub tokens to create a public repository under the victim’s account and commit the data in a JSON file. Those repositories use the description “niagA oG eW ereH :duluH-iahS,” which reverses to “Shai-Hulud: Here We Go Again,” and the article says more than 2,200 GitHub repositories contained this marker at the time of writing.\u003c/p\u003e\n\n\u003cp\u003eThe malware also includes npm propagation logic that uses stolen npm tokens to validate access, enumerate packages, download tarballs, inject the payload, add a preinstall hook, increase versions, and republish packages using the compromised maintainer’s identity. SafeDep said the attack used two execution paths: a preinstall hook running “bun run index.js” and, in most malicious versions, an optionalDependencies entry pointing to imposter commits that delivered a second copy of the payload through the legitimate antvis/G2 GitHub repository. The article says SafeDep assessed the 22-minute publishing burst across hundreds of packages as automated rapid exfiltration using a stolen token.\u003c/p\u003e\n\n\u003cp\u003eThe self-replicating Mini Shai-Hulud campaign is assessed to be the work of a financially motivated threat actor named TeamPCP. The article says the activity entered a new phase after TeamPCP released the entire source code for other threat actors to use as part of a supply chain attack contest announced with BreachForums. Datadog said the release lowers the barrier for other actors to adopt TeamPCP’s playbook, and the article notes that a copycat wave has already complicated attribution while continuing to enable credential theft and follow-on exploitation.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers discovered a fresh software supply chain attack targeting npm packages associated with the @antv ecosystem. The activity is described as part of the ongoing Mini Shai-Hulud attack wave. Socket said the attack affected packages tied to the npm maintainer account atool.\u003c/p\u003e\n\n\u003cp\u003eOne notable affected package is echarts-for-react, described as a widely used React wrapper for Apache ECharts with roughly 1.1 million weekly downloads. The article says the tradecraft matches Mini Shai-Hulud, where a compromised maintainer account is used to publish trojanized versions in quick succession.\u003c/p\u003e\n\n\u003ch2 id=\"affected-packages-and-ecosystem-exposure\"\u003eAffected Packages and Ecosystem Exposure\u003c/h2\u003e\n\n\u003cp\u003eThe affected packages include multiple @antv packages, such as:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e@antv/g2\u003c/li\u003e\n\u003cli\u003e@antv/g6\u003c/li\u003e\n\u003cli\u003e@antv/x6\u003c/li\u003e\n\u003cli\u003e@antv/l7\u003c/li\u003e\n\u003cli\u003e@antv/s2\u003c/li\u003e\n\u003cli\u003e@antv/f2\u003c/li\u003e\n\u003cli\u003e@antv/g\u003c/li\u003e\n\u003cli\u003e@antv/g2plot\u003c/li\u003e\n\u003cli\u003e@antv/graphin\u003c/li\u003e\n\u003cli\u003e@antv/data-set\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article also lists related packages outside the @antv namespace, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eecharts-for-react\u003c/li\u003e\n\u003cli\u003etimeago.js\u003c/li\u003e\n\u003cli\u003esize-sensor\u003c/li\u003e\n\u003cli\u003ecanvas-nest.js\u003c/li\u003e\n\u003cli\u003eOther related packages\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSocket said the potential blast radius is significant because the affected publishing account is connected to widely used packages across data visualization, graphing, mapping, charting, and React component ecosystems. The article emphasizes that organizations automatically pulling new dependency versions could face meaningful downstream exposure, even if only a subset of the packages received malicious updates.\u003c/p\u003e\n\n\u003ch2 id=\"scale-of-the-malicious-publishing-activity\"\u003eScale of the Malicious Publishing Activity\u003c/h2\u003e\n\n\u003cp\u003eSocket said the attacker published 639 malicious versions across 323 unique packages. This included 558 malicious versions across 279 unique @antv packages.\u003c/p\u003e\n\n\u003cp\u003eSafeDep described a rapid publishing burst across hundreds of packages. It said the 22-minute publish burst across 314 packages and 631 versions, using an identical obfuscated payload, ruled out a gradual or targeted operation. SafeDep characterized it as automated, rapid exfiltration using a stolen token.\u003c/p\u003e\n\n\u003ch2 id=\"credential-theft-and-exfiltration\"\u003eCredential Theft and Exfiltration\u003c/h2\u003e\n\n\u003cp\u003eThe stealer payload harvested more than 20 credential types. The article specifically lists credentials and secrets associated with:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAmazon Web Services\u003c/li\u003e\n\u003cli\u003eGoogle Cloud\u003c/li\u003e\n\u003cli\u003eMicrosoft Azure\u003c/li\u003e\n\u003cli\u003eGitHub\u003c/li\u003e\n\u003cli\u003enpm\u003c/li\u003e\n\u003cli\u003eSSH\u003c/li\u003e\n\u003cli\u003eKubernetes\u003c/li\u003e\n\u003cli\u003eVault\u003c/li\u003e\n\u003cli\u003eStripe\u003c/li\u003e\n\u003cli\u003eDatabase connection strings\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe malware also attempts Docker container escape via the host socket. The article says the stealer is identical to the Mini Shai-Hulud payload used in the SAP compromise.\u003c/p\u003e\n\n\u003cp\u003eAfter collection, the data is serialized, compressed, encrypted, and exfiltrated to the domain t.m-kosche[.]com:443. As a fallback mechanism, the malware uses a stolen GitHub token to create a public repository under the victim’s account and commit the data in a JSON file.\u003c/p\u003e\n\n\u003cp\u003eThe fallback repositories include the description “niagA oG eW ereH :duluH-iahS,” which reverses to “Shai-Hulud: Here We Go Again.” The article says that, at the time of writing, more than 2,200 GitHub repositories contained this marker.\u003c/p\u003e\n\n\u003ch2 id=\"npm-propagation-mechanism\"\u003enpm Propagation Mechanism\u003c/h2\u003e\n\n\u003cp\u003eThe malware incorporates npm propagation logic that abuses stolen npm tokens. According to the article, it uses those tokens to:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eValidate access through the npm registry API\u003c/li\u003e\n\u003cli\u003eEnumerate packages maintained by the token owner\u003c/li\u003e\n\u003cli\u003eDownload package tarballs\u003c/li\u003e\n\u003cli\u003eInject the malicious payload\u003c/li\u003e\n\u003cli\u003eAdd a preinstall hook\u003c/li\u003e\n\u003cli\u003eIncrease package versions\u003c/li\u003e\n\u003cli\u003eRepublish the packages using the compromised maintainer’s identity\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eSafeDep said the attack uses two execution paths. Each compromised version adds a preinstall hook that runs “bun run index.js.” SafeDep also said 630 of 631 malicious versions injected an optionalDependencies entry pointing to imposter commits, delivering a second copy of the payload through the legitimate antvis/G2 GitHub repository.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-and-campaign-context\"\u003eThreat Actor and Campaign Context\u003c/h2\u003e\n\n\u003cp\u003eThe self-replicating Mini Shai-Hulud campaign is assessed to be the work of a financially motivated threat actor named TeamPCP. The article says the supply chain attack campaign continues to spread through the software supply chain by moving rapidly through open-source registries and infecting hundreds of software packages with credential-stealing code embedded in popular development tools.\u003c/p\u003e\n\n\u003cp\u003eThe article says the activity entered an aggressive new phase after TeamPCP released the entire source code for other threat actors to use. That release was described as part of a supply chain attack contest announced in partnership with BreachForums.\u003c/p\u003e\n\n\u003cp\u003eDatadog said open-sourcing a production offensive framework is not unprecedented but is unusual for an active campaign. Datadog also said the release lowers the barrier for other actors to adopt TeamPCP’s playbook, including techniques such as OIDC token abuse, provenance forgery, and AI tool persistence hooks.\u003c/p\u003e\n\n\u003ch2 id=\"copycat-activity-and-attribution-challenges\"\u003eCopycat Activity and Attribution Challenges\u003c/h2\u003e\n\n\u003cp\u003eThe article says an unknown threat actor later uploaded four malicious npm packages. One of those packages contained a near-verbatim copy of the Shai-Hulud worm with its own command-and-control infrastructure.\u003c/p\u003e\n\n\u003cp\u003eThis activity is described as an indication that cloned versions of the worm may infest open-source ecosystems. The article says the copycat wave complicates attribution efforts while the attacks continue to support credential theft and create opportunities for follow-on exploitation.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-risk-framing\"\u003eImpact and Risk Framing\u003c/h2\u003e\n\n\u003cp\u003eThe article frames the campaign as dangerous because one compromise feeds into the next. As more packages are compromised, the blast radius expands across downstream users and organizations that rely on trusted development tools.\u003c/p\u003e\n\n\u003cp\u003eTrend Micro described the campaign as built for credential theft at scale. It said organizations using GitHub Actions, PyPI, Docker Hub, GitHub Container Registry, VS Code extensions, and cloud-connected CI runners are directly exposed to this risk.\u003c/p\u003e\n\n\u003cp\u003eThe article concludes that the incident shows how tools already trusted inside enterprise networks can be abused as malware delivery vehicles. It emphasizes that the campaign’s self-propagating nature allows each successful compromise to contribute to further compromises.\u003c/p\u003e\n","keyPoints":["Cybersecurity researchers found a software supply chain attack compromising npm packages associated with the @antv ecosystem as part of the Mini Shai-Hulud attack wave.","The attack affected packages tied to the npm maintainer account atool, including echarts-for-react, which has roughly 1.1 million weekly downloads.","Socket said the attacker published 639 malicious versions across 323 unique packages, including 558 versions across 279 unique @antv packages.","The malware steals more than 20 credential types, including AWS, Google Cloud, Microsoft Azure, GitHub, npm, SSH, Kubernetes, Vault, Stripe, and database connection strings.","The malware uses stolen npm tokens to validate access, enumerate maintained packages, inject the malicious payload, add a preinstall hook, increase package versions, and republish them under the compromised maintainer identity."],"insights":["Organizations that automatically pull new dependency versions face meaningful exposure because the compromised publishing account is tied to widely used data visualization, graphing, mapping, charting, and React component packages.","Defenders can hunt for fallback exfiltration by searching for public GitHub repositories with the marker description \"niagA oG eW ereH :duluH-iahS,\" which the article says appeared in more than 2,200 repositories.","Remediation should account for two delivery paths because compromised versions added a preinstall hook and most also injected an optionalDependencies entry that delivered a second payload copy through the legitimate antvis/G2 GitHub repository.","The 22-minute burst across hundreds of packages indicates the operation was automated rapid exfiltration using a stolen token rather than a gradual or narrowly targeted compromise.","The public release of the Shai-Hulud source code has already enabled copycat activity, making attribution harder while increasing the risk of cloned worms spreading through open-source ecosystems."],"referencedReports":[{"title":"AntV Packages Compromised","url":"https://socket.dev/blog/antv-packages-compromised","publisher":"Socket","context":"The article cites Socket for details on the compromised atool maintainer account, affected AntV-related packages, and the scale of downstream exposure.","category":"","primary":false},{"title":"Mini Shai-Hulud Strikes Again: 314 npm Packages Compromised","url":"https://safedep.io/mini-shai-hulud-strikes-again-314-npm-packages-compromised/","publisher":"SafeDep","context":"The article cites SafeDep’s analysis describing the attack’s two execution paths, preinstall hook, optionalDependencies payload path, and rapid 22-minute publishing burst.","category":"","primary":false},{"title":"Shai-Hulud Malware In-Depth Analysis: Open Source Means Loss of Control","url":"https://slowmist.medium.com/shai-hulud-malware-in-depth-analysis-open-source-means-loss-of-control-ca49cdc06bf7","publisher":"SlowMist","context":"The article references SlowMist while discussing TeamPCP’s release of the Shai-Hulud source code and the resulting loss of control over the malware framework.","category":"","primary":false},{"title":"Shai-Hulud Open Source Framework Static Analysis","url":"https://securitylabs.datadoghq.com/articles/shai-hulud-open-source-framework-static-analysis/","publisher":"Datadog Security Labs","context":"The article cites Datadog’s static analysis to explain how open-sourcing the offensive framework lowers the barrier for other actors to adopt TeamPCP’s techniques.","category":"","primary":false},{"title":"Analyzing TeamPCP Supply Chain Attacks","url":"https://www.trendmicro.com/en_us/research/26/e/analyzing-teampcp-supply-chain-attacks.html","publisher":"Trend Micro","context":"The article explicitly describes Trend Micro’s linked work as a report and quotes it on credential theft risks affecting GitHub Actions, PyPI, Docker Hub, GHCR, VS Code extensions, and cloud-connected CI runners.","category":"","primary":false}],"body":"\u003cp\u003eCybersecurity researchers discovered a software supply chain attack comprom
