cord is now removing client code that supports unencrypted fallback.","Discord extended its open-source DAVE encryption protocol to support desktop, mobile, web browsers, PlayStation, Xbox, and Discord SDKs.","The encryption layer covers DMs, group DMs, voice channels, and Go Live streams, while stage channels remain excluded.","Discord said it currently has no plans to extend DAVE to text-based communications because its text features were built around non-encrypted messaging assumptions."],"insights":["Discord waited until after extensive at-scale testing to formally announce the March E2EE rollout and is now removing client code that allowed unencrypted fallback.","Discord engineers worked with Mozilla to resolve a Firefox compatibility issue instead of limiting browser support or adding a workaround.","Stage channels remain outside the E2EE rollout because Discord describes them as large public broadcasts rather than private conversations.","Discord said text-based communications are not planned for DAVE encryption because its text features were built around non-encrypted messaging assumptions."],"referencedReports":[],"body":"\u003cp\u003eDiscord announced that all voice and video calls on the platform are now protected by default with end-to-end encryption. The implementation was completed in March, and Discord said extensive at-scale testing gave it confidence to formally announce the deployment. The company is also starting to remove client code that supports unencrypted fallback.\u003c/p\u003e\n\n\u003cp\u003eThe rollout was achieved by extending Discord’s open-source DAVE encryption protocol across all supported client platforms. The encryption layer covers DMs, group DMs, voice channels, and Go Live streams, while stage channels remain excluded because they are designed for large public broadcasts rather than private conversations. Discord said no opt-in is required for end-to-end encryption on eligible voice and video calls.\u003c/p\u003e\n\n\u003cp\u003eDAVE uses WebRTC encoded transforms, Messaging Layer Security for scalable group key exchanges, and ephemeral identity keys. Discord said extending DAVE across platforms while preserving low latency was technically challenging. The company also said it currently has no plans to extend DAVE to text-based communications because Discord’s text features were built around non-encrypted messaging assumptions.\u003c/p\u003e\n"},{"n":10,"title":"Microsoft plans to improve Windows 11 driver quality in 2026","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-plans-to-improve-windows-11-driver-quality-in-2026/","time":"16:22","priority":"MAY READ","score":64,"tldr":"Microsoft is launching a Driver Quality Initiative in 2026 to improve Windows 11 stability by tightening driver testing, partner requirements, Windows Update catalog hygiene, and encouraging safer user-mode drivers. The effort is part of a broader push to restore confidence in Windows after driver-related crashes and quality complaints.","briefOverview":"\u003cp\u003eMicrosoft plans to raise the quality bar for Windows 11 drivers in 2026 through a new Driver Quality Initiative. The article says drivers are central to Windows because they connect the operating system to silicon, components, and peripherals. Microsoft argues that high-quality drivers support reliable, secure, and performant devices, while driver failures are experienced by customers as device problems.\u003c/p\u003e\n\n\u003cp\u003eThe Driver Quality Initiative is built around four pillars: moving more third-party drivers out of kernel mode, strengthening partner verification and automated checks, improving Windows Update catalog hygiene, and measuring the real-world experience of drivers. Microsoft says it will work closely with partners including AMD and Intel. AMD described driver quality as a shared commitment focused on security, stability, and predictable performance at scale.\u003c/p\u003e\n\n\u003cp\u003eThe article places the initiative within a broader effort to improve Windows 11 and win back Windows fans after criticism and failed Copilot pushes. Microsoft CEO Satya Nadella said the company is doing foundational work to strengthen engagement across Windows, Xbox, Bing, and Edge. Other Windows 11 quality improvements mentioned include taskbar changes, performance improvements for lower-memory devices, and a streamlined Windows Update experience.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft plans to improve Windows 11 driver quality in 2026 by introducing the Driver Quality Initiative. The article says drivers sit at the heart of the Windows experience because they connect the operating system with silicon, components, and peripherals. Microsoft says that when drivers are high quality, customers experience reliable, secure, and performant devices, but when drivers fail, customers experience the problem as a device issue regardless of the root cause.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the initiative as a response to driver quality issues observed by users, including monthly driver updates that could cause BSODs or artifacts in games. It also notes that Microsoft previously hosted WinHEC events for its developers and OEM partners to work on quality, with the last WinHEC held in 2018. The article says Microsoft eventually stopped hosting those events as it started to care less about Windows and more about its cloud business.\u003c/p\u003e\n\n\u003cp\u003eThe Driver Quality Initiative is based on four pillars. Microsoft wants more third-party drivers to move out of kernel mode and into safer user-mode drivers or Microsoft class drivers. It also plans to verify partners more carefully, run more automated checks, update Windows Hardware Compatibility Program requirements, improve Windows Update catalog hygiene, remove outdated or low-quality drivers, and use better data to investigate issues.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also plans to evaluate driver quality across stability, features, performance, battery impact, and heat. The article says this is intended to help partners improve the real Windows experience across media and display, camera, audio, connectivity, and peripherals. Microsoft says the Driver Quality Initiative is a partnership and that it will work closely with partners including AMD and Intel.\u003c/p\u003e\n\n\u003cp\u003eAMD said at WinHEC 2026 that higher-quality drivers are not the responsibility of one company alone. David Harmon, Director of Software Engineering at AMD, called it a shared commitment and said AMD is focused on joint accountability with Microsoft to ensure security, stability, and predictable performance for customers at scale. The article also says the Driver Quality Initiative is based on learnings and infrastructure established through the Windows Resiliency Initiative.\u003c/p\u003e\n\n\u003cp\u003eThe article frames the driver work as part of a broader Microsoft effort to revive Windows 11 after criticism and failed attempts to push Copilot. Satya Nadella said during Microsoft’s FY26 Q3 earnings call that the company is doing foundational work to win back fans and strengthen engagement across Windows, Xbox, Bing, and Edge. Other cited Windows 11 improvements include performance work for lower-memory devices, a streamlined Windows Update experience, a restored movable taskbar, a smaller taskbar toggle, and rumored changes such as a native Start menu, faster launch, reduced power consumption, and a new performance mode.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft plans to raise the quality bar for Windows 11 drivers in 2026 through a new Driver Quality Initiative. The article says Microsoft views drivers as central to the Windows experience because they connect the operating system to silicon, components, and peripherals.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft argues that driver quality directly affects customer experience. According to the article, high-quality drivers help customers experience reliable, secure, and performant devices, while driver failures are experienced as device problems regardless of where the root cause sits.\u003c/p\u003e\n\n\u003ch2 id=\"background-and-context\"\u003eBackground and context\u003c/h2\u003e\n\n\u003cp\u003eThe article says Microsoft previously hosted WinHEC, the Windows Hardware Engineering Conference, before shipping Windows 11. Those events brought Microsoft developers and OEM partners together to work on quality.\u003c/p\u003e\n\n\u003cp\u003eThe last WinHEC was held in 2018. The article says Microsoft eventually stopped hosting those events as it started to care less about Windows and more about its cloud business.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that the lack of an event does not necessarily mean poor drivers. However, it says users have observed a decrease in quality, including monthly driver updates that would frequently cause BSODs or artifacts in games.\u003c/p\u003e\n\n\u003ch2 id=\"driver-quality-initiative\"\u003eDriver Quality Initiative\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft is introducing the Driver Quality Initiative to address driver quality issues. The initiative is described as being built on four pillars:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft is pushing more third-party drivers to move out of kernel mode and into safer user-mode drivers or Microsoft class drivers.\u003c/li\u003e\n\u003cli\u003eMicrosoft will verify partners more carefully, run more automated checks, and update Windows Hardware Compatibility Program requirements.\u003c/li\u003e\n\u003cli\u003eMicrosoft wants better Windows Update catalog hygiene, including removing outdated or low-quality drivers and using better data to investigate issues.\u003c/li\u003e\n\u003cli\u003eMicrosoft will examine stability, features, performance, battery impact, and heat so partners can improve the real Windows experience.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says the initiative is intended to improve the Windows device experience across areas such as media and display, camera, audio, connectivity, and peripherals.\u003c/p\u003e\n\n\u003ch2 id=\"technical-and-operational-details\"\u003eTechnical and operational details\u003c/h2\u003e\n\n\u003cp\u003eA key technical element of the initiative is Microsoft’s effort to move more third-party drivers out of kernel mode. The article describes the target alternatives as safer user-mode drivers or Microsoft’s own class drivers.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also plans to strengthen the validation process for partners. This includes more careful partner verification, more automated checks, and updates to Windows Hardware Compatibility Program requirements.\u003c/p\u003e\n\n\u003cp\u003eAnother major focus is Windows Update catalog hygiene. The article says Microsoft wants to remove outdated or low-quality drivers and use better data to investigate issues.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft is also broadening driver quality evaluation beyond basic functionality. The article lists stability, features, performance, battery impact, and heat as areas Microsoft will consider.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-partners\"\u003eAffected parties and partners\u003c/h2\u003e\n\n\u003cp\u003eThe affected ecosystem includes Microsoft, Windows 11 users, OEM partners, third-party driver developers, and hardware partners. Microsoft says the Driver Quality Initiative is a partnership and that it will work closely with partners including AMD and Intel.\u003c/p\u003e\n\n\u003cp\u003eAMD commented on the initiative at WinHEC 2026. David Harmon, Director of Software Engineering at AMD, said higher-quality drivers are not the responsibility of one company and described driver quality as a shared commitment.\u003c/p\u003e\n\n\u003cp\u003eHarmon said AMD is focused on building a culture of joint accountability with Microsoft. He said the goal is to ensure security, stability, and predictable performance for customers at scale.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-windows-resiliency-initiative\"\u003eRelationship to Windows Resiliency Initiative\u003c/h2\u003e\n\n\u003cp\u003eThe article states that the Driver Quality Initiative is based on learnings and infrastructure established through the Windows Resiliency Initiative. It does not provide detailed technical information about the Windows Resiliency Initiative beyond that relationship.\u003c/p\u003e\n\n\u003cp\u003eThe article also says it is unclear when the driver changes will begin rolling out. It says the changes will gradually be reflected in the coming months as Microsoft continues to work on major improvements to Windows.\u003c/p\u003e\n\n\u003ch2 id=\"broader-windows-11-quality-push\"\u003eBroader Windows 11 quality push\u003c/h2\u003e\n\n\u003cp\u003eThe article frames the Driver Quality Initiative as part of a broader effort by Microsoft to revive Windows 11. It says Microsoft faced months of criticism and failed attempts to push Copilot, and that the company realized it was alienating Windows fans.\u003c/p\u003e\n\n\u003cp\u003eDuring Microsoft’s FY26 Q3 earnings call, CEO Satya Nadella said the company is doing foundational work required to win back fans and strengthen engagement across Windows, Xbox, Bing, and Edge. He said Microsoft has announced performance improvements for lower-memory devices, streamlined the Windows Update experience, and brought focus back to core features and fundamentals that matter most to customers.\u003c/p\u003e\n\n\u003cp\u003eThe article says Windows 11 quality improvements in 2026 also include restoring the movable taskbar, adding a toggle to make the taskbar smaller, and improving taskbar resize controls with a Windows 10-like experience. It also lists rumored features including a native Start menu, faster launch, reduced power consumption, a new performance mode, and more.\u003c/p\u003e\n\n\u003ch2 id=\"disclosed-impact-and-response\"\u003eDisclosed impact and response\u003c/h2\u003e\n\n\u003cp\u003eThe disclosed user impact in the article includes driver-related BSODs and artifacts in games associated with monthly driver updates. The article also says driver failures are experienced by customers as device problems, regardless of the true root cause.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft’s response is the Driver Quality Initiative, which combines safer driver architecture goals, stronger partner checks, Windows Update catalog cleanup, and broader quality measurements. AMD’s response, as quoted in the article, is to treat driver quality as a shared commitment with Microsoft focused on security, stability, and predictable performance.\u003c/p\u003e\n\n\u003ch2 id=\"known-or-suspected-actors\"\u003eKnown or suspected actors\u003c/h2\u003e\n\n\u003cp\u003eThe article does not describe a cyberattack, threat actor, or malicious campaign. The named organizations involved are Microsoft, AMD, and Intel, with Microsoft leading the Driver Quality Initiative and AMD publicly commenting on shared accountability for driver quality.\u003c/p\u003e\n","keyPoints":["Microsoft plans to improve Windows 11 driver quality in 2026 through a new Driver Quality Initiative.","The Driver Quality Initiative will encourage more third-party drivers to move out of kernel mode and into safer user-mode drivers or Microsoft class drivers.","Microsoft will verify partners more carefully, run more automated checks, and update Windows Hardware Compatibility Program requirements.","Microsoft wants to improve Windows Update catalog hygiene by removing outdated or low-quality drivers and using better data to investigate issues.","Microsoft says it will work closely with partners including AMD and Intel to improve driver stability, performance, battery impact, heat, and overall device experience."],"insights":["Microsoft is prioritizing moving third-party drivers out of kernel mode, which indicates that reducing kernel-level driver failures is a central part of its Windows 11 reliability strategy.","Windows Update driver distribution is a specific target for cleanup, with Microsoft planning to remove outdated or low-quality drivers from the catalog rather than only improving future driver submissions.","Microsoft is expanding driver quality evaluation beyond crash prevention to include real-world factors such as battery impact, heat, performance, and feature behavior.","AMD publicly framed driver quality as a shared accountability issue, showing that Microsoft is positioning hardware vendors as co-owners of Windows driver reliability outcomes."],"referencedReports":[{"title":"The Validation Gap: Automated Pentesting Answers One Question. You Need Six.","url":"https://hubs.li/Q048zztN0","publisher":"Not specified in the article","context":"The article includes a linked guide stating that automated pentesting tools answer only one question and that the guide covers six surfaces organizations need to validate.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft plans to raise the quality bar for Windows 11 drivers in 2026 through a new Driver Quality Initiative. The article says drivers are central to Windows because they connect the operating system to silicon, components, and peripherals. Microsoft argues that high-quality drivers support reliable, secure, and performant devices, while driver failures are experienced by customers as device problems.\u003c/p\u003e\n\n\u003cp\u003eThe Driver Quality Initiative is built around four pillars: moving more third-party drivers out of kernel mode, strengthening partner verification and automated checks, improving Windows Update catalog hygiene, and measuring the real-world experience of drivers. Microsoft says it will work closely with partners including AMD and Intel. AMD described driver quality as a shared commitment focused on security, stability, and predictable performance at scale.\u003c/p\u003e\n\n\u003cp\u003eThe article places the initiative within a broader effort to improve Windows 11 and win back Windows fans after criticism and failed Copilot pushes. Microsoft CEO Satya Nadella said the company is doing foundational work to strengthen engagement across Windows, Xbox, Bing, and Edge. Other Windows 11 quality improvements mentioned include taskbar changes, performance improvements for lower-memory devices, and a streamlined Windows Update experience.\u003c/p\u003e\n"},{"n":15,"title":"Microsoft blames macOS update for undismissible Teams location prompts","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/microsoft/microsoft-blames-undismissible-teams-location-prompts-on-macos-update/","time":"16:10","priority":"MAY READ","score":63,"tldr":"Microsoft says a recent macOS security update is causing Teams to repeatedly show location permission prompts because macOS is not saving users’ choices. Until Microsoft and Apple provide a fix, affected users can try resetting Teams location permissions in macOS Privacy \u0026 Security settings.","briefOverview":"\u003cp\u003eMicrosoft confirmed that some macOS users are seeing non-dismissible Microsoft Teams location permission prompts. Affected users reported that the dialog repeatedly asks to use their location “for things like GPS and Wi-Fi,” even after selecting “Don’t Allow.” Microsoft documented the issue in incident report TM1315837.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft attributed the repeated prompts to a recent macOS security update that does not store Teams location permission selections as expected. The issue affects certain Microsoft Teams users on Mac who have enabled location access in their Teams settings. Microsoft said it is working with Apple to understand the change and is also investigating a potential Teams fix.\u003c/p\u003e\n\n\u003cp\u003eUntil a fix is available, Microsoft advised impacted users to manually adjust location access for Microsoft Teams in macOS settings. Users are told to go to System Settings \u0026gt; Privacy \u0026amp; Security \u0026gt; Location Services, find “Microsoft Teams” and “Microsoft Teams ModuleHost,” toggle them on and off, and then set them back to the desired setting. Microsoft said the first reports surfaced on May 11 and classified the incident as an advisory.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft confirmed reports that the Teams collaboration app is showing non-dismissible location permission prompts on some macOS systems. Users said the prompts began appearing over the past week and asked for permission to use location “for things like GPS and Wi-Fi.” One affected user said the prompt initially disappeared after clicking “Don’t Allow,” but later returned repeatedly even after many attempts to dismiss it.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft acknowledged the problem in incident report TM1315837 and attributed it to a recent macOS security update. According to Microsoft, the update does not store users’ location permission selections for Teams as expected. This causes the location prompt to appear repeatedly instead of respecting the user’s choice.\u003c/p\u003e\n\n\u003cp\u003eThe issue affects certain Microsoft Teams users on Mac who have enabled location access in their Teams settings. Microsoft has not disclosed which regions are affected or how many users are impacted. The company said the first reports of the issue surfaced on May 11.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said it is working with Apple to better understand the macOS change and identify a resolution. In parallel, Microsoft is investigating a potential fix within Teams to mitigate the repeated prompts. The incident has been flagged as an advisory, a label the article says is commonly used for service issues with limited scope or impact.\u003c/p\u003e\n\n\u003cp\u003eAs a workaround, Microsoft advised impacted users to manually enable location access for Microsoft Teams in macOS settings. Users should go to System Settings \u0026gt; Privacy \u0026amp; Security \u0026gt; Location Services, locate “Microsoft Teams” and “Microsoft Teams ModuleHost,” toggle them on and off, and then set them back to the desired setting. The article also notes that Microsoft has recently dealt with other Teams issues involving Teams Free chat and calls, meeting joins after a Microsoft Edge update, and desktop client launch failures caused by a service update.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft confirmed that some macOS users are experiencing repeated, non-dismissible Microsoft Teams location permission prompts. The prompts ask for permission to use the user’s location “for things like GPS and Wi-Fi.” According to user reports cited in the article, the dialog can reappear immediately after the user selects “Don’t Allow.”\u003c/p\u003e\n\n\u003cp\u003eMicrosoft acknowledged the issue in a new incident report identified as TM1315837. The company said the problem is linked to a recent macOS security update that does not store users’ location permission selections for Teams as expected.\u003c/p\u003e\n\n\u003ch2 id=\"what-users-are-seeing\"\u003eWhat Users Are Seeing\u003c/h2\u003e\n\n\u003cp\u003eAffected Teams users reported that the prompts have been appearing on macOS devices over the past week. One user said they began seeing the message on macOS on May 14, 2026. The same user said the prompt initially disappeared after one click of “Don’t Allow,” but later kept returning after at least twenty attempts to dismiss it.\u003c/p\u003e\n\n\u003cp\u003eThe article describes the prompt as non-dismissible because the user’s selection does not appear to persist. Microsoft said the first reports of the issue surfaced on May 11.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-explanation\"\u003eMicrosoft’s Explanation\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said it identified that a recent macOS security update is not storing users’ location permission selections for Teams as expected. As a result, Teams users can receive repeated location prompts.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft stated that it is working with Apple to better understand the macOS change and identify a resolution. The company also said it is investigating a possible fix inside Teams to mitigate the repeated prompts.\u003c/p\u003e\n\n\u003ch2 id=\"affected-users\"\u003eAffected Users\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said the issue affects only certain Microsoft Teams users on Mac. The affected users are those who have enabled location access in their Teams settings.\u003c/p\u003e\n\n\u003cp\u003eThe article states that Microsoft has not yet shared which regions are affected. Microsoft also has not disclosed how many users are impacted by the incident.\u003c/p\u003e\n\n\u003ch2 id=\"workaround\"\u003eWorkaround\u003c/h2\u003e\n\n\u003cp\u003eUntil a fix is available, Microsoft advised impacted users to manually enable location access for Microsoft Teams within macOS settings.\u003c/p\u003e\n\n\u003cp\u003eThe workaround steps provided in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOpen System Settings.\u003c/li\u003e\n\u003cli\u003eGo to Privacy \u0026amp; Security.\u003c/li\u003e\n\u003cli\u003eOpen Location Services.\u003c/li\u003e\n\u003cli\u003eLocate “Microsoft Teams” and “Microsoft Teams ModuleHost.”\u003c/li\u003e\n\u003cli\u003eToggle them on and off.\u003c/li\u003e\n\u003cli\u003eSet them back to the desired setting.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article specifically names both “Microsoft Teams” and “Microsoft Teams ModuleHost” as items users should adjust in Location Services.\u003c/p\u003e\n\n\u003ch2 id=\"incident-classification-and-response\"\u003eIncident Classification and Response\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft flagged the incident as an advisory. The article notes that this label is commonly used to describe service issues with limited scope or impact.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft’s response includes coordination with Apple and a parallel investigation into a Teams-side mitigation. No final fix had been announced in the article.\u003c/p\u003e\n\n\u003ch2 id=\"related-teams-issues-mentioned\"\u003eRelated Teams Issues Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article places this incident alongside several other recent Microsoft Teams issues. Microsoft recently began rolling out a fix for a known issue that prevented some Microsoft Teams Free users from chatting and calling others.\u003c/p\u003e\n\n\u003cp\u003eThe company also addressed an issue that blocked Windows users from joining Teams meetings after a bug introduced by a recent Microsoft Edge browser update. In another recent case, Microsoft reverted a service update that blocked some customers from launching the Teams desktop client.\u003c/p\u003e\n\n\u003ch2 id=\"key-takeaway\"\u003eKey Takeaway\u003c/h2\u003e\n\n\u003cp\u003eThe central issue is that a recent macOS security update is causing Teams location permission choices not to persist for some Mac users. This results in repeated location prompts, and Microsoft is working with Apple while also evaluating a Teams-side fix. The available workaround is to reset the relevant Teams location permissions in macOS Location Services.\u003c/p\u003e\n","keyPoints":["Microsoft confirmed that some macOS users are seeing non-dismissible Microsoft Teams prompts requesting permission to use their location.","Microsoft attributed the repeated prompts to a recent macOS security update that does not store users’ location permission selections for Teams as expected.","Microsoft said it is working with Apple to understand the macOS change and is also investigating a possible Teams fix to mitigate the repeated prompts.","The issue affects certain Microsoft Teams users on Mac who have enabled location access in their Teams settings.","Microsoft advised impacted users to manually reset location access for Microsoft Teams and Microsoft Teams ModuleHost in macOS System Settings under Privacy \u0026 Security \u003e Location Services."],"insights":["The workaround requires changing permissions for both \"Microsoft Teams\" and \"Microsoft Teams ModuleHost,\" indicating that Teams’ macOS location access is tied to more than one listed component.","Users who do not have location access enabled in Teams settings are not described as affected, making Teams’ own location setting a practical first place to check when triaging the issue.","Microsoft classified the incident as an advisory, which the article says is commonly used for service issues with limited scope or impact.","The article notes that Microsoft has recently addressed multiple separate Teams disruptions, including issues with Teams Free chat and calls, meeting joins after an Edge update, and desktop client launch failures."],"referencedReports":[{"title":"TM1315837","url":"https://admin.microsoft.com/#/MessageCenter/:/messages/TM1315837","publisher":"Microsoft","context":"The article says Microsoft acknowledged the Teams macOS location prompt issue in a new incident report and classified the incident as an advisory.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft confirmed that some macOS users are seeing non-dismissible Microsoft Teams location permission prompts. Affected users reported that the dialog repeatedly asks to use their location “for things like GPS and Wi-Fi,” even after selecting “Don’t Allow.” Microsoft documented the issue in incident report TM1315837.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft attributed the repeated prompts to a recent macOS security update that does not store Teams location permission selections as expected. The issue affects certain Microsoft Teams users on Mac who have enabled location access in their Teams settings. Microsoft said it is working with Apple to understand the change and is also investigating a potential Teams fix.\u003c/p\u003e\n\n\u003cp\u003eUntil a fix is available, Microsoft advised impacted users to manually adjust location access for Microsoft Teams in macOS settings. Users are told to go to System Settings \u0026gt; Privacy \u0026amp; Security \u0026gt; Location Services, find “Microsoft Teams” and “Microsoft Teams ModuleHost,” toggle them on and off, and then set them back to the desired setting. Microsoft said the first reports surfaced on May 11 and classified the incident as an advisory.\u003c/p\u003e\n"},{"n":13,"title":"Critical Microsoft Vulnerabilities Doubled: From Exposure to Escalation","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/critical-microsoft-vulnerabilities-doubled-from-exposure-to-escalation/","time":"14:00","priority":"MAY READ","score":60,"tldr":"Microsoft disclosed slightly fewer vulnerabilities in 2025, but critical flaws doubled, especially in cloud, identity, Windows Server, and Office, showing that impact matters more than volume. The key takeaway is that patching alone is not enough: organizations must reduce excessive privilege, strengthen identity controls, and limit lateral movement before attackers escalate quietly as trusted users.","briefOverview":"\u003cp\u003eBeyondTrust’s 2026 Microsoft Vulnerabilities Report says Microsoft disclosed 1,273 vulnerabilities in 2025, down from 1,360 the prior year. However, the article emphasizes that total volume is the wrong metric to focus on because critical vulnerabilities doubled from 78 to 157. The authors argue that stable overall counts conceal a more serious shift in impact and concentration.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights Elevation of Privilege vulnerabilities as the largest category, accounting for 40% of all CVEs, while Information Disclosure flaws rose 73%. It says this pattern indicates attackers are prioritizing stealth, reconnaissance, legitimate credentials, and Living Off the Land tactics rather than noisy exploitation. The article frames privilege escalation, identity abuse, and lateral movement as the areas organizations should prioritize.\u003c/p\u003e\n\n\u003cp\u003eCloud, server, and productivity platforms are presented as especially important risk areas. Critical vulnerabilities in Microsoft Azure and Dynamics 365 rose from 4 to 37, Microsoft Windows Server had 780 vulnerabilities with 50 critical, and Microsoft Office vulnerabilities rose from 47 to 157 with critical flaws increasing from 3 to 31. The article recommends reducing standing admin rights, scrutinizing service accounts and AI agents, disabling the Windows preview pane, and using context beyond CVSS scores for prioritization.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eBeyondTrust’s article summarizes findings from the 2026 Microsoft Vulnerabilities Report, which analyzed Microsoft vulnerabilities disclosed in 2025. Microsoft disclosed 1,273 vulnerabilities in 2025, compared with 1,360 the prior year. The article stresses that this small decline in total volume is less important than the doubling of critical vulnerabilities from 78 to 157.\u003c/p\u003e\n\n\u003cp\u003eThe authors argue that risk is concentrating in vulnerability types that help attackers gain knowledge and control inside environments. Elevation of Privilege vulnerabilities accounted for 40% of all CVEs, and Information Disclosure flaws rose 73%. The article says this aligns with breach patterns where initial access may be mundane, but impact is amplified through excessive privilege, misconfigurations, and weak identity controls.\u003c/p\u003e\n\n\u003cp\u003eCloud and business platforms are described as a particularly concerning area. Microsoft Azure and Dynamics 365 saw a slight decrease in total vulnerability count, but critical vulnerabilities rose from 4 to 37 in a single year. The article says cloud platforms now support identity, access management, business automation, and enterprise control planes, so critical flaws can affect workflows, trust boundaries, and business operations.\u003c/p\u003e\n\n\u003cp\u003eThe article also covers endpoint, server, and productivity software trends. Microsoft Windows vulnerability numbers declined, but critical counts remained high, while Microsoft Windows Server vulnerabilities increased to 780 with 50 critical. Microsoft Office vulnerabilities rose 234% year over year, from 47 to 157, and critical Office vulnerabilities increased from 3 to 31.\u003c/p\u003e\n\n\u003cp\u003eNo specific threat group is named, but the article repeatedly refers to threat actors using stealth, reconnaissance, legitimate credentials, and Living Off the Land tactics. It says attackers can quietly escalate access and move laterally when environments contain excessive privilege and weak identity controls. CVE-2025-55241 is cited as an example of a critical Entra ID flaw that could allow forged tokens accepted across any tenant and leave no trace in victim logs.\u003c/p\u003e\n\n\u003cp\u003eThe recommended response is to narrow the blast radius before the next patch cycle rather than relying on patching alone. The article recommends auditing standing admin rights, treating service accounts and AI agents with the same scrutiny as human identities, disabling the Windows preview pane, and prioritizing vulnerabilities that enable privilege escalation, identity abuse, and lateral movement. It also calls for context, exploit knowledge, MITRE ATT\u0026amp;CK mappings, and stronger identity visibility and continuous risk assessment.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eBeyondTrust’s article presents findings from the 2026 Microsoft Vulnerabilities Report, authored by Morey J. Haber and James Maude. The report analyzed Microsoft vulnerabilities disclosed in 2025 and found that Microsoft disclosed 1,273 vulnerabilities, down from 1,360 the year before. The article emphasizes that overall vulnerability totals have remained relatively stable from 2020 to 2026.\u003c/p\u003e\n\n\u003cp\u003eThe central finding is that total vulnerability counts do not reflect the most important risk trend. Critical vulnerabilities doubled year over year, rising from 78 to 157 and reversing a multi-year downward trend. The authors argue that stability in total vulnerability volume conceals instability in impact.\u003c/p\u003e\n\n\u003ch2 id=\"main-significance\"\u003eMain Significance\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main message is that organizations should focus less on the number of vulnerabilities and more on where vulnerabilities are concentrated and what they enable. It says the more important issue is whether vulnerabilities allow threat actors to escalate privileges, abuse identities, move laterally, or compromise high-impact platforms.\u003c/p\u003e\n\n\u003cp\u003eThe article frames privilege as the point where vulnerabilities become breaches. It states that threat actors no longer need noisy exploits or mass malware campaigns if they can quietly escalate access and move laterally using legitimate credentials and Living Off the Land tactics.\u003c/p\u003e\n\n\u003ch2 id=\"vulnerability-category-trends\"\u003eVulnerability Category Trends\u003c/h2\u003e\n\n\u003cp\u003eThe article highlights two vulnerability categories as especially important:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eElevation of Privilege vulnerabilities accounted for 40% of all CVEs.\u003c/li\u003e\n\u003cli\u003eInformation Disclosure flaws rose by 73%.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe authors say this combination shows that attackers are prioritizing stealth and reconnaissance. They connect this trend to real-world breach patterns in which initial access is often mundane, but the impact grows through excessive privilege, misconfigurations, and weak identity controls.\u003c/p\u003e\n\n\u003ch2 id=\"cloud-and-business-platform-risk\"\u003eCloud and Business Platform Risk\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft Azure and Dynamics 365 are described as particularly concerning. Their total vulnerability count decreased slightly, but their critical vulnerabilities increased from 4 to 37 in a single year. The article says this matters because cloud platforms now support identity and access management, business automation, and control planes for entire enterprises.\u003c/p\u003e\n\n\u003cp\u003eThe article states that a critical flaw in these environments can do more than expose data. It can disrupt workflows, affect business operations, and collapse trust boundaries at machine speed. It says that for cloud vulnerabilities, the blast radius becomes the defining risk metric.\u003c/p\u003e\n\n\u003cp\u003eThe article gives CVE-2025-55241 as an example. It describes the issue as a critical Entra ID flaw patched in July 2025 that could allow an attacker to forge tokens accepted across any tenant, leaving no trace in victim logs.\u003c/p\u003e\n\n\u003ch2 id=\"windows-and-windows-server-findings\"\u003eWindows and Windows Server Findings\u003c/h2\u003e\n\n\u003cp\u003eThe article describes endpoint and server results as mixed but still disturbing. Total Microsoft Windows vulnerability numbers declined, but critical counts remained consistently high. Microsoft Windows Server vulnerabilities increased to 780, with 50 classified as critical.\u003c/p\u003e\n\n\u003cp\u003eServers are described as high-value targets because they often run with elevated privileges, host shared services, and provide the foundation for business infrastructure. The article says threat actors understand that compromising a server can provide faster and deeper access than compromising a desktop alone.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-office-findings\"\u003eMicrosoft Office Findings\u003c/h2\u003e\n\n\u003cp\u003eThe article identifies productivity software as one of the most notable shifts in the data. Microsoft Office vulnerabilities increased 234% year over year, rising from 47 to 157. Critical Office vulnerabilities increased from 3 to 31, which the article describes as a 10x increase from the prior year.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft Office is described as a heavily abused attack surface because it sits at the intersection of human behavior, daily operations, and business continuity. The article lists macros, document sharing, preview panes, HTML rendering, new AI capabilities, and add-ins as elements that create a broad exploitation landscape. It says that when Office vulnerabilities spike, users remain the most reliable entry point through social engineering.\u003c/p\u003e\n\n\u003ch2 id=\"threat-actor-behavior-described-in-the-article\"\u003eThreat Actor Behavior Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article does not name a specific threat group. It refers broadly to threat actors and describes their behavior as focused on stealth, reconnaissance, legitimate credentials, privilege escalation, and lateral movement.\u003c/p\u003e\n\n\u003cp\u003eThe article states that attackers are not primarily breaking down the front door with brute force exploits. Instead, it says they are walking in, escalating quietly, and operating as trusted users, including both human and machine identities.\u003c/p\u003e\n\n\u003ch2 id=\"defensive-recommendations\"\u003eDefensive Recommendations\u003c/h2\u003e\n\n\u003cp\u003eThe article says the immediate defense priority is narrowing the blast radius before the next patch cycle. Recommended actions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAuditing standing admin rights.\u003c/li\u003e\n\u003cli\u003eTreating service accounts and AI agents with the same scrutiny as human identities.\u003c/li\u003e\n\u003cli\u003eDisabling the Windows preview pane, which the article says was exploited as an entry point by seven CVEs in 2025.\u003c/li\u003e\n\u003cli\u003ePrioritizing vulnerabilities that enable privilege escalation, identity abuse, and lateral movement.\u003c/li\u003e\n\u003cli\u003eUsing context, exploit knowledge, and mappings to frameworks such as MITRE ATT\u0026amp;CK rather than relying only on CVSS scores.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that patch management is important but insufficient. It says patches do not fix excessive privilege or enforce least privilege for AI agents.\u003c/p\u003e\n\n\u003ch2 id=\"ai-agents-and-identity-governance\"\u003eAI Agents and Identity Governance\u003c/h2\u003e\n\n\u003cp\u003eThe article says AI agents have quickly moved from a future concern to a present reality in organizations BeyondTrust works with. It also says most organizations lack the AI security posture management needed for proper governance.\u003c/p\u003e\n\n\u003cp\u003eThe authors connect AI agents to the broader identity and privilege theme. They argue that service accounts and AI agents should receive the same scrutiny as human identities and that least privilege should apply to AI agents as well.\u003c/p\u003e\n\n\u003ch2 id=\"overall-conclusion\"\u003eOverall Conclusion\u003c/h2\u003e\n\n\u003cp\u003eThe article concludes that the key issue is not the total number of Microsoft vulnerabilities but what those vulnerabilities can unlock when identity controls are weak. Critical vulnerabilities doubled even though total vulnerability disclosures decreased, and the riskiest areas include cloud identity, Windows Server, Microsoft Office, privilege escalation, and information disclosure.\u003c/p\u003e\n\n\u003cp\u003eThe article’s final message is that security programs must focus on privilege reduction, identity visibility, and continuous risk assessment. Without those controls, the article says the numbers may appear stable year over year while the attack surface and business impact continue to increase.\u003c/p\u003e\n","keyPoints":["Microsoft disclosed 1,273 vulnerabilities in 2025, down from 1,360 the prior year, but critical vulnerabilities doubled from 78 to 157.","Elevation of Privilege vulnerabilities accounted for 40% of all Microsoft CVEs, while Information Disclosure flaws rose by 73%.","Critical vulnerabilities in Microsoft Azure and Dynamics 365 increased from 4 to 37 in a single year despite a slight decrease in total vulnerability count for those platforms.","Microsoft Office vulnerabilities rose 234% year over year from 47 to 157, with critical vulnerabilities increasing from 3 to 31.","The article states that patch management alone is insufficient and organizations should prioritize vulnerabilities that enable privilege escalation, identity abuse, and lateral movement."],"insights":["The article argues that total vulnerability counts are a misleading risk signal because Microsoft’s overall volume declined while the number and concentration of critical vulnerabilities increased.","The combination of rising Elevation of Privilege and Information Disclosure flaws suggests attackers are emphasizing stealth, reconnaissance, and legitimate-credential abuse rather than noisy exploitation.","The article identifies cloud identity as a high-impact risk area because a single misconfigured Azure identity can potentially expose an entire tenant before the organization detects the damage.","The article recommends narrowing blast radius before the next patch cycle by auditing standing admin rights, scrutinizing service accounts and AI agents like human identities, and disabling the Windows preview pane.","The article stresses that vulnerability prioritization should account for privilege escalation, identity abuse, lateral movement, exploit context, and MITRE ATT\u0026CK mappings rather than relying only on CVSS scores."],"referencedReports":[{"title":"2026 Microsoft Vulnerabilities Report","url":"https://www.beyondtrust.com/resources/whitepapers/microsoft-vulnerability-report?utm_campaign=2026-MVR\u0026utm_source=BC\u0026utm_medium=Tier_One","publisher":"BeyondTrust","context":"The article cites the report as the source of its analysis of Microsoft vulnerabilities disclosed in 2025 and describes it as the 13th edition of BeyondTrust's annual Microsoft vulnerability report.","category":"","primary":false}],"body":"\u003cp\u003eBeyondTrust’s 2026 Microsoft Vulnerabilities Report says Microsoft disclosed 1,273 vulnerabilities in 2025, down from 1,360 the prior year. However, the article emphasizes that total volume is the wrong metric to focus on because critical vulnerabilities doubled from 78 to 157. The authors argue that stable overall counts conceal a more serious shift in impact and concentration.\u003c/p\u003e\n\n\u003cp\u003eThe article highlights Elevation of Privilege vulnerabilities as the largest category, accounting for 40% of all CVEs, while Information Disclosure flaws rose 73%. It says this pattern indicates attackers are prioritizing stealth, reconnaissance, legitimate credentials, and Living Off the Land tactics rather than noisy exploitation. The article frames privilege escalation, identity abuse, and lateral movement as the areas organizations should prioritize.\u003c/p\u003e\n\n\u003cp\u003eCloud, server, and productivity platforms are presented as especially important risk areas. Critical vulnerabilities in Microsoft Azure and Dynamics 365 rose from 4 to 37, Microsoft Windows Server had 780 vulnerabilities with 50 critical, and Microsoft Office vulnerabilities rose from 47 to 157 with critical flaws increasing from 3 to 31. The article recommends reducing standing admin rights, scrutinizing service accounts and AI agents, disabling the Windows preview pane, and using context beyond CVSS scores for prioritization.\u003c/p\u003e\n"},{"n":27,"title":"Dev Machine Guard Now Supports Windows","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/dev-machine-guard-now-supports-windows","time":"23:08","priority":"MAY READ","score":55,"tldr":"Dev Machine Guard now runs natively on Windows, giving security teams the same visibility and policy enforcement across Windows and macOS developer machines. This closes a major fleet coverage gap for detecting risky AI tools, IDE extensions, MCP servers, npm packages, and other supply chain threats.","briefOverview":"\u003cp\u003eDev Machine Guard now runs natively on Windows, extending the same scanning engine, enterprise dashboard, and policies that were already available for macOS. The release brings Windows developer machines into the same fleet visibility model, allowing them to appear in the dashboard alongside macOS devices. The article presents this as closing a visibility gap for organizations with mixed developer fleets.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Windows developer machines face the same attack surfaces as macOS machines, including AI coding agents, MCP servers, IDE extensions, npm packages, and local processes with access to credentials and source code. It links the need for coverage to recent supply chain incidents involving compromised npm packages and AI-related tooling. The key impact is faster incident response when teams need to identify which machines have a compromised package, extension, or agent installed.\u003c/p\u003e\n\n\u003cp\u003eThe Windows implementation supports Windows 10 and Windows 11, with AMD64 and ARM64 binaries signed with Sigstore and published with build provenance. Detection uses native Windows mechanisms such as \u003ccode\u003e%LOCALAPPDATA%\u003c/code\u003e, \u003ccode\u003e%PROGRAMFILES%\u003c/code\u003e, \u003ccode\u003e$PATH\u003c/code\u003e, Windows Registry uninstall keys, and Windows Task Scheduler. Community mode runs locally, while Enterprise mode reports scan results to the StepSecurity backend for centralized visibility, policy enforcement, and historical reporting.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDev Machine Guard has added native Windows support after previously running on macOS. The article says the same scanning engine, enterprise dashboard, and policies now apply to Windows developer machines. Organizations already using Dev Machine Guard on macOS can run the binary on Windows, point it at their tenant, and see Windows developers appear alongside the rest of the fleet.\u003c/p\u003e\n\n\u003cp\u003eThe article frames Windows support as important because modern Windows developer machines have the same exposure as macOS machines and are the dominant platform in many enterprises. It lists attack surfaces including AI coding agents such as GitHub Copilot, Cursor, and Claude, MCP servers connected to internal systems and credentials, IDE extensions from VS Code Marketplace and OpenVSX, npm packages, and local processes or shell tooling. Before this release, mixed fleets could have macOS devices inventoried while Windows machines were covered by partial scripts or not covered at all.\u003c/p\u003e\n\n\u003cp\u003eThe article cites several supply chain incidents that motivated this work, including the Shai-Hulud npm worm campaign, the s1ngularity Nx compromise, and the Mini Shai-Hulud wave affecting TanStack and other npm packages. It states that in these incidents, the difficult follow-up question was which developer machines had the affected package, extension, or agent installed. With Windows support, the article says security teams can answer that question across both Windows and macOS from the same dashboard.\u003c/p\u003e\n\n\u003cp\u003eThe Windows release supports Windows 10 and Windows 11 developer machines, with AMD64 and ARM64 binaries. The binaries are signed with Sigstore and published with build provenance. Coverage includes AI coding agents, AI CLI tools, IDE extensions, installed IDEs and editor versions, MCP server configurations, npm packages, local frameworks, processes, shell tooling, and device inventory such as hostname, OS version, and serial number.\u003c/p\u003e\n\n\u003cp\u003eThe article says Windows detections use native Windows mechanisms rather than trying to imitate a Unix environment. Application discovery uses \u003ccode\u003e%LOCALAPPDATA%\u003c/code\u003e, \u003ccode\u003e%PROGRAMFILES%\u003c/code\u003e, and \u003ccode\u003e$PATH\u003c/code\u003e; version information is read from the Windows Registry; scheduled scanning uses Windows Task Scheduler via \u003ccode\u003eschtasks\u003c/code\u003e; and file path handling uses \u003ccode\u003efilepath.Join\u003c/code\u003e for Windows drive letters and backslashes. Community mode runs fully locally with JSON or HTML output, while Enterprise mode reports scan results to the StepSecurity backend for centralized visibility, policy enforcement, alerting, historical reporting, and incident triage.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eDev Machine Guard now supports Windows natively in addition to macOS. The article states that the release extends the same scanning engine, enterprise dashboard, and policies to Windows developer machines. Existing macOS users do not need to learn a new workflow: they can run the binary on a Windows machine, point it at their tenant, and Windows developers will appear in the same dashboard as the rest of the fleet.\u003c/p\u003e\n\n\u003cp\u003eThe article presents the release as a way to close a visibility gap in mixed Windows and macOS developer environments. Before this release, Dev Machine Guard inventoried macOS developer machines, while Windows machines were described as being covered by partial scripts shared over Slack or not covered at all. The article says this gap is important during supply chain incidents, when security teams need to quickly answer which developers have a compromised package, extension, or agent installed.\u003c/p\u003e\n\n\u003ch2 id=\"why-windows-coverage-matters\"\u003eWhy Windows Coverage Matters\u003c/h2\u003e\n\n\u003cp\u003eThe article says a modern Windows developer machine is just as exposed as a macOS machine, and in many enterprises Windows is the dominant developer platform. It identifies several shared attack surfaces across developer machines:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAI coding agents such as GitHub Copilot, Cursor, and Claude installed with elevated permissions.\u003c/li\u003e\n\u003cli\u003eMCP servers configured to connect agents to internal systems, repositories, and credentials.\u003c/li\u003e\n\u003cli\u003eIDE extensions auto-updating in the background across VS Code, Cursor, and JetBrains products.\u003c/li\u003e\n\u003cli\u003eExtensions pulled from both the VS Code Marketplace and the OpenVSX registry.\u003c/li\u003e\n\u003cli\u003enpm packages installed globally and across project directories.\u003c/li\u003e\n\u003cli\u003eLocal processes and shell tooling with access to credentials and source code.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article emphasizes that attackers target visibility gaps during supply chain incidents. It frames the central operational question as: which developer machines in the organization currently have the affected package, extension, or agent installed? The release is positioned as enabling that question to be answered across both Windows and macOS fleets from one dashboard.\u003c/p\u003e\n\n\u003ch2 id=\"incidents-referenced-as-motivation\"\u003eIncidents Referenced as Motivation\u003c/h2\u003e\n\n\u003cp\u003eThe article says Dev Machine Guard exists because supply chain attacks against developer machines are no longer hypothetical. It identifies three incidents tracked by the company’s research team in the last twelve months:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe Shai-Hulud npm worm campaign, described as compromising more than 500 packages, earning a CISA advisory, and propagating through CI/CD and developer environments.\u003c/li\u003e\n\u003cli\u003eThe s1ngularity Nx compromise, described as weaponizing AI CLI tools on developer machines to exfiltrate credentials.\u003c/li\u003e\n\u003cli\u003eThe Mini Shai-Hulud wave, described as hitting TanStack and other widely used npm packages and including OIDC token theft from GitHub Actions runners.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that each of these incidents led to the same difficult follow-up question: which developer machines in the organization had the affected package, extension, or agent installed at that moment. It says Dev Machine Guard already answered that question in one query for macOS, and now does so across Windows and macOS.\u003c/p\u003e\n\n\u003ch2 id=\"windows-platform-support\"\u003eWindows Platform Support\u003c/h2\u003e\n\n\u003cp\u003eThe release supports:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eWindows 10 developer machines.\u003c/li\u003e\n\u003cli\u003eWindows 11 developer machines.\u003c/li\u003e\n\u003cli\u003eAMD64, or x64, binaries.\u003c/li\u003e\n\u003cli\u003eARM64 binaries.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article states that the Windows binaries are signed with Sigstore and published with build provenance. It also states that the same binary and the same commands are used for Windows and macOS.\u003c/p\u003e\n\n\u003ch2 id=\"detection-coverage\"\u003eDetection Coverage\u003c/h2\u003e\n\n\u003cp\u003eThe Windows release includes coverage for developer tooling and system inventory categories. According to the article, Dev Machine Guard covers:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAI coding agents, including Claude, Cursor, GitHub Copilot, and Codex.\u003c/li\u003e\n\u003cli\u003eAI CLI tools running on the machine.\u003c/li\u003e\n\u003cli\u003eIDE extensions from both the VS Code Marketplace and the OpenVSX registry.\u003c/li\u003e\n\u003cli\u003eIDE extensions across VS Code, Cursor, Windsurf, Antigravity, and JetBrains products.\u003c/li\u003e\n\u003cli\u003eInstalled IDEs and editor versions.\u003c/li\u003e\n\u003cli\u003eMCP server configurations across supported agents.\u003c/li\u003e\n\u003cli\u003enpm packages installed globally and per project.\u003c/li\u003e\n\u003cli\u003eLocal frameworks, processes, and shell tooling.\u003c/li\u003e\n\u003cli\u003eDevice inventory, including hostname, OS version, and serial number.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis coverage is described as applying to Windows developer machines using the same scanning engine and policy model already used for macOS.\u003c/p\u003e\n\n\u003ch2 id=\"native-windows-detection-approach\"\u003eNative Windows Detection Approach\u003c/h2\u003e\n\n\u003cp\u003eThe article explicitly says Dev Machine Guard uses native Windows mechanisms instead of trying to fake a Unix environment. It lists several implementation details:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eApplication discovery uses \u003ccode\u003e%LOCALAPPDATA%\u003c/code\u003e, \u003ccode\u003e%PROGRAMFILES%\u003c/code\u003e, and \u003ccode\u003e$PATH\u003c/code\u003e lookups.\u003c/li\u003e\n\u003cli\u003eVersion information is read from the Windows Registry at \u003ccode\u003eHKLM\\\\SOFTWARE\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\Uninstall\u003c/code\u003e rather than from macOS \u003ccode\u003eInfo.plist\u003c/code\u003e files.\u003c/li\u003e\n\u003cli\u003eScheduled scanning uses Windows Task Scheduler through \u003ccode\u003eschtasks\u003c/code\u003e, while macOS uses \u003ccode\u003elaunchd\u003c/code\u003e.\u003c/li\u003e\n\u003cli\u003eFile path handling uses \u003ccode\u003efilepath.Join\u003c/code\u003e throughout so directory layouts work correctly under Windows drive letters and backslashes.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese details show that the Windows release is implemented with Windows-specific discovery, scheduling, registry, and path-handling behavior.\u003c/p\u003e\n\n\u003ch2 id=\"community-and-enterprise-modes\"\u003eCommunity and Enterprise Modes\u003c/h2\u003e\n\n\u003cp\u003eThe article describes two operating modes.\u003c/p\u003e\n\n\u003cp\u003eCommunity mode runs fully locally, with nothing leaving the machine. It is described as free for individual developers and open-source maintainers. It produces JSON or HTML reports of what is installed on the machine. The GitHub repository, including detection logic, is available at \u003ccode\u003egithub.com/step-security/dev-machine-guard\u003c/code\u003e.\u003c/p\u003e\n\n\u003cp\u003eEnterprise mode reports scan results to the StepSecurity backend. The article says this enables centralized visibility, policy enforcement, and historical reporting. The Enterprise Tier adds a centralized dashboard with per-device drill-down, policy enforcement for IDE extensions, MCP servers, AI agents, and packages, cooldown periods on newly published npm and PyPI packages, alerting on compromised dependencies, malicious extensions, and unapproved MCP servers, and historical reporting and incident triage across the fleet.\u003c/p\u003e\n\n\u003ch2 id=\"deployment-and-rollout\"\u003eDeployment and Rollout\u003c/h2\u003e\n\n\u003cp\u003eThe article says Windows uses the same binary and the same commands as macOS. It points readers to the Installation Script documentation for full rollout guidance, including MDM and Group Policy deployment. This is presented as part of the path for organizations rolling out the tool across a Windows developer fleet.\u003c/p\u003e\n\n\u003ch2 id=\"impact-for-security-teams\"\u003eImpact for Security Teams\u003c/h2\u003e\n\n\u003cp\u003eThe article’s main stated impact is that security teams can now apply Dev Machine Guard visibility and policies across both macOS and Windows developer machines. This is especially relevant for mixed fleets where Windows machines were previously not covered by the same inventory and policy system. During supply chain incidents, the article says teams can use the same dashboard to determine which developer machines have affected packages, extensions, or agents installed.\u003c/p\u003e\n\n\u003cp\u003eThe article also says the single open-source scanning engine means detections are added once and benefit both platforms. Policies are applied across the fleet from one dashboard. The release is framed as closing the Windows coverage gap for organizations that had been waiting to roll Dev Machine Guard out to their full developer organization.\u003c/p\u003e\n","keyPoints":["Dev Machine Guard now runs natively on Windows in addition to macOS, using the same scanning engine, enterprise dashboard, and policies.","The Windows release covers Windows 10 and Windows 11 developer machines with AMD64 and ARM64 binaries that are signed with Sigstore and published with build provenance.","Dev Machine Guard detects AI coding agents, AI CLI tools, IDE extensions, installed IDEs, MCP server configurations, npm packages, local frameworks, processes, shell tooling, and device inventory on Windows machines.","The article states that Windows support helps security teams answer which developer machines have affected packages, extensions, or agents installed during supply chain incidents.","Enterprise mode reports scan results to the StepSecurity backend for centralized visibility, policy enforcement, alerting, historical reporting, and incident triage."],"insights":["Security teams can use one query in the Dev Machine Guard dashboard to determine which macOS and Windows developer machines have an affected package, extension, or agent installed during a supply chain incident.","The Windows implementation uses native Windows mechanisms such as Registry uninstall keys, Task Scheduler, and Windows-specific application paths rather than relying on a Unix-like compatibility approach.","The same detection logic is added once and applied across both macOS and Windows because Dev Machine Guard is built around a single open-source scanning engine.","Community mode can be used to inspect a Windows developer machine locally and generate JSON or HTML reports without sending any data off the device.","The article highlights MCP server configurations as a specific enterprise policy target alongside IDE extensions, AI agents, and packages."],"referencedReports":[],"body":"\u003cp\u003eDev Machine Guard now runs natively on Windows, extending the same scanning engine, enterprise dashboard, and policies that were already available for macOS. The release brings Windows developer machines into the same fleet visibility model, allowing them to appear in the dashboard alongside macOS devices. The article presents this as closing a visibility gap for organizations with mixed developer fleets.\u003c/p\u003e\n\n\u003cp\u003eThe article emphasizes that Windows developer machines face the same attack surfaces as macOS machines, including AI coding agents, MCP servers, IDE extensions, npm packages, and local processes with access to credentials and source code. It links the need for coverage to recent supply chain incidents involving compromised npm packages and AI-related tooling. The key impact is faster incident response when teams need to identify which machines have a compromised package, extension, or agent installed.\u003c/p\u003e\n\n\u003cp\u003eThe Windows implementation supports Windows 10 and Windows 11, with AMD64 and ARM64 binaries signed with Sigstore and published with build provenance. Detection uses native Windows mechanisms such as \u003ccode\u003e%LOCALAPPDATA%\u003c/code\u003e, \u003ccode\u003e%PROGRAMFILES%\u003c/code\u003e, \u003ccode\u003e$PATH\u003c/code\u003e, Windows Registry uninstall keys, and Windows Task Scheduler. Community mode runs locally, while Enterprise mode reports scan results to the StepSecurity backend for centralized visibility, policy enforcement, and historical reporting.\u003c/p\u003e\n"},{"n":16,"title":"Webinar: The hidden bottlenecks in network incident response","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/webinar-the-hidden-bottlenecks-in-network-incident-response/","time":"12:14","priority":"MAY READ","score":45,"tldr":"BleepingComputer is hosting a June 2, 2026 webinar on how manual triage and fragmented tools slow network incident response. The session will show how automation and AI-assisted workflows can enrich alerts, route incidents, and speed resolution.","briefOverview":"\u003cp\u003eBleepingComputer will host a live webinar on June 2, 2026, titled \u0026ldquo;From alert to resolution: Fixing the gaps in network incident response.\u0026rdquo; The session will feature Edgar Ortiz, a Solutions Engineering Leader and Computer Scientist at Tines. The webinar focuses on why network incident response workflows often slow down during high-pressure situations.\u003c/p\u003e\n\n\u003cp\u003eThe article says IT teams are receiving large volumes of alerts from monitoring platforms, infrastructure systems, identity services, ticketing platforms, and security tools. During network incidents, responders often have to manually move between these systems to understand what happened and coordinate next steps. The webinar will examine how AI-assisted workflows and automation can reduce delays, improve coordination, and help resolve incidents faster.\u003c/p\u003e\n\n\u003cp\u003eA key theme is that manual triage, investigation, enrichment, and routing processes create operational bottlenecks. The session will cover how alerts can be enriched with network, identity, and threat context, and how incidents can be prioritized and routed without manual intervention. It will also address moving from fragmented response processes to coordinated resolution across systems.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eBleepingComputer announced a live webinar scheduled for June 2, 2026, titled \u0026ldquo;From alert to resolution: Fixing the gaps in network incident response.\u0026rdquo; The webinar will feature Edgar Ortiz, a Solutions Engineering Leader and Computer Scientist at Tines. The session is aimed at explaining why incident response workflows often slow down during network incidents.\u003c/p\u003e\n\n\u003cp\u003eThe article describes an environment where IT teams are overwhelmed by alerts from monitoring platforms, infrastructure systems, identity services, ticketing platforms, and security tools. During network incidents, responders often need to manually switch between these systems to determine what happened and coordinate next steps. This manual work can slow the response process during high-pressure situations.\u003c/p\u003e\n\n\u003cp\u003eThe webinar will focus on operational bottlenecks in network incident response. According to the article, many organizations still rely on manual triage, investigation, and routing processes. These manual workflows can slow response times and increase the risk of outages and service disruptions.\u003c/p\u003e\n\n\u003cp\u003eThe technical focus of the session includes alert enrichment, prioritization, and routing. The webinar will cover how to automatically enrich alerts with network, identity, and threat context. It will also discuss techniques to prioritize and route incidents without manual intervention.\u003c/p\u003e\n\n\u003cp\u003eTines is presented as helping organizations build intelligent workflows that connect systems, automate repetitive tasks, and streamline operational response processes across complex environments. The article does not describe a specific threat actor, campaign, vulnerability, or breach. Its disclosed impact is operational: reducing delays, improving coordination, and helping IT teams resolve network incidents faster through automation and AI-assisted workflows.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eBleepingComputer will host a live webinar on June 2, 2026, titled \u0026ldquo;From alert to resolution: Fixing the gaps in network incident response.\u0026rdquo; The webinar will feature Edgar Ortiz, a Solutions Engineering Leader and Computer Scientist at Tines.\u003c/p\u003e\n\n\u003cp\u003eThe session is focused on the hidden bottlenecks that slow down network incident response. It will examine how manual workflows, fragmented tools, and high alert volumes affect IT teams during network incidents.\u003c/p\u003e\n\n\u003ch2 id=\"core-issue-described-in-the-article\"\u003eCore issue described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe article says IT teams are being deluged by alerts from several categories of systems, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMonitoring platforms\u003c/li\u003e\n\u003cli\u003eInfrastructure systems\u003c/li\u003e\n\u003cli\u003eIdentity services\u003c/li\u003e\n\u003cli\u003eTicketing platforms\u003c/li\u003e\n\u003cli\u003eSecurity tools\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eDuring network incidents, responders are often required to manually move between these systems to understand what happened and coordinate next steps. The article frames this manual switching as a key source of delay in incident response workflows.\u003c/p\u003e\n\n\u003ch2 id=\"why-the-topic-matters\"\u003eWhy the topic matters\u003c/h2\u003e\n\n\u003cp\u003eThe article states that alert volumes continue to grow, while many organizations still depend on manual triage, investigation, and routing processes. These manual processes can create operational bottlenecks that slow response times.\u003c/p\u003e\n\n\u003cp\u003eThe article also says these bottlenecks can increase the risk of outages and service disruptions. The webinar is positioned as an opportunity for IT teams to learn how to reduce delays and improve incident resolution.\u003c/p\u003e\n\n\u003ch2 id=\"webinar-focus-areas\"\u003eWebinar focus areas\u003c/h2\u003e\n\n\u003cp\u003eThe webinar will explore why incident response workflows often slow down during high-pressure situations. It will also address how AI-assisted workflows and automation can help IT teams reduce delays, improve coordination, and resolve incidents faster.\u003c/p\u003e\n\n\u003cp\u003eThe article identifies several parts of the network incident response lifecycle where gaps can occur:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAlerting\u003c/li\u003e\n\u003cli\u003eTriage\u003c/li\u003e\n\u003cli\u003eAnalysis\u003c/li\u003e\n\u003cli\u003eRouting\u003c/li\u003e\n\u003cli\u003eResolution\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe session will examine how IT teams can reduce manual overhead and close operational gaps across those stages.\u003c/p\u003e\n\n\u003ch2 id=\"manual-workflow-challenges\"\u003eManual workflow challenges\u003c/h2\u003e\n\n\u003cp\u003eThe article says network incidents often require teams to manually collect context from different systems. Responders may also need to determine ownership, prioritize incidents, and coordinate next steps across multiple platforms and teams.\u003c/p\u003e\n\n\u003cp\u003eThe webinar will examine where these operational workflows commonly break down. It will also discuss how automation can help IT teams respond more efficiently during high-pressure incidents.\u003c/p\u003e\n\n\u003ch2 id=\"technical-and-operational-topics-to-be-covered\"\u003eTechnical and operational topics to be covered\u003c/h2\u003e\n\n\u003cp\u003eThe webinar will cover several specific areas related to network incident response:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eHow network incidents typically evolve from initial alert to service impact\u003c/li\u003e\n\u003cli\u003eWhere triage, enrichment, and routing break down in real-world workflows\u003c/li\u003e\n\u003cli\u003eHow to automatically enrich alerts with network, identity, and threat context\u003c/li\u003e\n\u003cli\u003eTechniques to prioritize and route incidents without manual intervention\u003c/li\u003e\n\u003cli\u003eHow to move from fragmented response to coordinated resolution across systems\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThese topics focus on reducing manual work and improving coordination between systems and teams.\u003c/p\u003e\n\n\u003ch2 id=\"role-of-tines\"\u003eRole of Tines\u003c/h2\u003e\n\n\u003cp\u003eThe article states that Tines helps organizations build intelligent workflows that connect systems, automate repetitive tasks, and streamline operational response processes across complex environments. The webinar will feature Edgar Ortiz from Tines as the presenter.\u003c/p\u003e\n\n\u003cp\u003eThe article presents automation and AI-assisted workflows as ways to improve incident response operations. It does not describe a specific product deployment, customer case study, or incident investigation.\u003c/p\u003e\n\n\u003ch2 id=\"affected-parties-and-impact\"\u003eAffected parties and impact\u003c/h2\u003e\n\n\u003cp\u003eThe article focuses on IT teams that handle network incidents. It describes the operational impact of manual workflows, including delayed response times and increased risk of outages and service disruptions.\u003c/p\u003e\n\n\u003cp\u003eNo specific organization is described as being affected by an incident. The article does not disclose a breach, attack campaign, vulnerability, malware family, or threat actor.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-recommended-direction-described-in-the-article\"\u003eResponse and recommended direction described in the article\u003c/h2\u003e\n\n\u003cp\u003eThe response approach described in the article is to use automation and AI-assisted workflows to improve network incident response. Specifically, the webinar will discuss enriching alerts, prioritizing incidents, routing incidents, and coordinating resolution across systems.\u003c/p\u003e\n\n\u003cp\u003eThe intended outcome is to reduce manual overhead and close gaps between alerting, triage, analysis, routing, and resolution. The article encourages readers to register for the webinar to learn how IT teams can reduce response delays and improve incident resolution.\u003c/p\u003e\n","keyPoints":["BleepingComputer will host a live webinar on June 2, 2026 titled \"From alert to resolution: Fixing the gaps in network incident response\" with Edgar Ortiz from Tines.","The webinar will examine why incident response workflows often slow down during high-pressure network incidents.","The article says many organizations still rely on manual triage, investigation, and routing processes, creating bottlenecks that can slow response times and increase outage risk.","The session will cover how to automatically enrich alerts with network, identity, and threat context.","The webinar will discuss techniques to prioritize and route incidents without manual intervention and move from fragmented response to coordinated resolution across systems."],"insights":["The article highlights that response delays often come from operational handoffs between alerting, triage, analysis, routing, and resolution rather than from alert generation alone.","A practical focus of the webinar is using automation to enrich alerts with network, identity, and threat context before responders begin manual investigation.","The article frames incident ownership and prioritization as automation targets, indicating that routing decisions are a major source of manual overhead during network incidents.","The webinar positions AI-assisted workflows as a way to coordinate response across existing monitoring, infrastructure, identity, ticketing, and security tools instead of replacing those systems."],"referencedReports":[],"body":"\u003cp\u003eBleepingComputer will host a live webinar on June 2, 2026, titled \u0026ldquo;From alert to resolution: Fixing the gaps in network incident response.\u0026rdquo; The session will feature Edgar Ortiz, a Solutions Engineering Leader and Computer Scientist at Tines. The webinar focuses on why network incident response workflows often slow down during high-pressure situations.\u003c/p\u003e\n\n\u003cp\u003eThe article says IT teams are receiving large volumes of alerts from monitoring platforms, infrastructure systems, identity services, ticketing platforms, and security tools. During network incidents, responders often have to manually move between these systems to understand what happened and coordinate next steps. The webinar will examine how AI-assisted workflows and automation can reduce delays, improve coordination, and help resolve incidents faster.\u003c/p\u003e\n\n\u003cp\u003eA key theme is that manual triage, investigation, enrichment, and routing processes create operational bottlenecks. The session will cover how alerts can be enriched with network, identity, and threat context, and how incidents can be prioritized and routed without manual intervention. It will also address moving from fragmented response processes to coordinated resolution across systems.\u003c/p\u003e\n"},{"n":26,"title":"Dev Machine Guard Now Supports Linux","source":"stepsecurity.io","sourceColor":"#2dd4bf","link":"https://www.stepsecurity.io/blog/dev-machine-guard-now-supports-linux","time":"23:09","priority":"MAY READ","score":45,"tldr":"Dev Machine Guard now runs natively on Linux, closing a major visibility gap for security teams monitoring developer machines across macOS, Windows, and Linux. Organizations can now detect risky packages, IDE extensions, AI tools, MCP servers, and system inventory across the full developer fleet from one engine and dashboard.","briefOverview":"\u003cp\u003eDev Machine Guard now runs natively on Linux, adding Linux support to the existing macOS and Windows builds. The article says the same scanning engine now covers every developer machine in a fleet. Existing users can install a .deb or .rpm package, point it at their tenant, and see Linux developers appear in the dashboard alongside other devices.\u003c/p\u003e\n\n\u003cp\u003eThe significance of the release is that Linux developer machines are described as a previous visibility gap for mixed fleets. The article emphasizes that Linux is co
