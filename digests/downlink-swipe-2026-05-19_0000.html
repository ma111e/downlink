ising npm packages associated with the @antv ecosystem as part of the ongoing Mini Shai-Hulud attack wave. Socket said the attack affected packages tied to the npm maintainer account atool, including echarts-for-react, a React wrapper for Apache ECharts with about 1.1 million weekly downloads. The affected packages include many @antv packages and related packages outside the namespace, such as timeago.js, size-sensor, and canvas-nest.js.\u003c/p\u003e\n\n\u003cp\u003eThe campaign is significant because the compromised publishing account is connected to widely used packages across data visualization, graphing, mapping, charting, and React component ecosystems. Socket said the attacker published 639 malicious versions across 323 unique packages, including 558 versions across 279 unique @antv packages. The article says downstream exposure is meaningful for organizations that automatically pull new dependency versions.\u003c/p\u003e\n\n\u003cp\u003eThe stealer payload harvests more than 20 credential types, including cloud, GitHub, npm, SSH, Kubernetes, Vault, Stripe, and database secrets, and attempts Docker container escape through the host socket. The malware exfiltrates data to t.m-kosche[.]com:443 and can fall back to creating public GitHub repositories under victims’ accounts. It also uses stolen npm tokens to enumerate packages, inject malicious payloads, add preinstall hooks, bump versions, and republish packages under compromised maintainer identities.\u003c/p\u003e\n"},{"n":9,"title":"Microsoft Self-Service Password Reset abused in Azure data theft attacks","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/microsoft-self-service-password-reset-abused-in-azure-data-theft-attacks/","time":"19:35","priority":"MUST READ","score":94,"tldr":"Microsoft says threat actor Storm-2949 is abusing Microsoft Entra Self-Service Password Reset and social engineering to hijack privileged accounts, remove MFA, and steal data across Microsoft 365 and Azure. Organizations should prioritize phishing-resistant MFA for privileged users, least-privilege Azure permissions, conditional access, and monitoring of high-risk cloud management activity.","briefOverview":"\u003cp\u003eMicrosoft says a threat actor it tracks as Storm-2949 is targeting Microsoft 365 and Azure production environments to steal sensitive data from high-value assets. The attacks abuse legitimate applications and administration features rather than relying only on malware or exploit activity described in the article. Microsoft says Storm-2949 is a temporary designation for threat activity that is new, emerging, or developing.\u003c/p\u003e\n\n\u003cp\u003eThe actor used social engineering against users with privileged roles, including IT personnel and senior leadership, to obtain Microsoft Entra ID credentials. Microsoft believes the attacker abused the Self-Service Password Reset flow by initiating password resets and tricking victims into approving MFA prompts while posing as IT support. The actor then reset passwords, removed MFA controls, and enrolled Microsoft Authenticator on attacker-controlled devices.\u003c/p\u003e\n\n\u003cp\u003eAfter account hijacking, Storm-2949 used Microsoft Graph API and custom Python scripts to enumerate users, roles, applications, and service principals. The actor accessed OneDrive and SharePoint to search for VPN configurations and IT operational files, then expanded into Azure infrastructure including virtual machines, storage accounts, key vaults, app services, and SQL databases. Microsoft recommends least privilege, conditional access, MFA for all users, phishing-resistant MFA for privileged roles, tighter Azure RBAC permissions, and monitoring of high-risk Azure management operations.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft reports that Storm-2949 is targeting Microsoft 365 and Azure production environments in attacks designed to exfiltrate sensitive data from high-value assets. The actor abuses legitimate applications and administration features across cloud services. Microsoft uses the Storm label as a temporary designation for threat activity that has not yet been fully classified because it is new, emerging, or developing.\u003c/p\u003e\n\n\u003cp\u003eThe attacks began with social engineering against users holding privileged roles, such as IT personnel or members of senior leadership. Microsoft believes Storm-2949 abused the Microsoft Entra ID Self-Service Password Reset flow by initiating a password reset and tricking the victim into approving MFA prompts. The attacker posed as an IT support employee requesting urgent account verification, then reset the password, removed MFA controls, and enrolled Microsoft Authenticator on the attacker’s device.\u003c/p\u003e\n\n\u003cp\u003eOnce accounts were hijacked, Storm-2949 used the Microsoft Graph API and custom Python scripts to enumerate users, roles, applications, and service principals. The actor also evaluated long-term persistence opportunities in each case. The attacker accessed OneDrive and SharePoint, looking for VPN configurations and IT operational files that could support lateral movement from the cloud into the endpoint network.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft says that in one instance Storm-2949 used the OneDrive web interface to download thousands of files in a single action to its own infrastructure. The same data theft pattern was repeated across compromised user accounts, likely because different identities had access to different folders and shared directories. The actor then expanded into Azure resources, including virtual machines, storage accounts, key vaults, app services, and SQL databases.\u003c/p\u003e\n\n\u003cp\u003eIn Azure, Storm-2949 compromised multiple identities with privileged custom Azure RBAC roles across multiple subscriptions. The actor used those permissions to extract sensitive assets from production-based Azure subscriptions, access Azure App Service management paths such as FTP, Web Deploy, and Kudu, modify Key Vault access settings, steal secrets, change firewall and network rules, retrieve storage keys and SAS tokens, and exfiltrate data with custom Python scripts. Microsoft recommends security hardening steps including least privilege, conditional access policies, MFA for all users, phishing-resistant MFA for privileged roles, restricted Azure RBAC permissions, long-term Key Vault logging, reduced Key Vault access, restricted public Key Vault access, Azure Storage data protection options, and monitoring for high-risk Azure management operations.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft says a threat actor it tracks as Storm-2949 is targeting Microsoft 365 and Azure production environments in data theft attacks. The actor’s stated objective, according to Microsoft, is to “exfiltrate as much sensitive data from a target organization’s high-value assets as possible.”\u003c/p\u003e\n\n\u003cp\u003eThe activity abuses legitimate applications and administration features. The article describes a campaign that begins with identity compromise in Microsoft Entra ID and then expands across Microsoft 365 applications and Azure production infrastructure.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft notes that “Storm” is a temporary designation for threat activity that has not yet been classified because it is new, emerging, or developing.\u003c/p\u003e\n\n\u003ch2 id=\"initial-access-and-account-takeover\"\u003eInitial Access and Account Takeover\u003c/h2\u003e\n\n\u003cp\u003eStorm-2949 targeted users with privileged roles, including IT personnel and members of senior leadership. The actor used social engineering to obtain Microsoft Entra ID credentials and gain access to Microsoft 365 data.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft believes the actor abused the Self-Service Password Reset flow. In this approach, the attacker initiated a password reset for a targeted employee account and then tricked the victim into approving MFA prompts.\u003c/p\u003e\n\n\u003cp\u003eTo make the deception more convincing, the attacker posed as an IT support employee requiring urgent account verification. After the victim approved the MFA prompts, the attacker reset the password, removed MFA controls, and enrolled Microsoft Authenticator on the attacker-controlled device.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-365-activity\"\u003eMicrosoft 365 Activity\u003c/h2\u003e\n\n\u003cp\u003eAfter hijacking accounts, Storm-2949 used the Microsoft Graph API and custom Python scripts to enumerate:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eUsers\u003c/li\u003e\n\u003cli\u003eRoles\u003c/li\u003e\n\u003cli\u003eApplications\u003c/li\u003e\n\u003cli\u003eService principals\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe actor also evaluated long-term persistence opportunities for each compromised identity.\u003c/p\u003e\n\n\u003cp\u003eStorm-2949 then accessed OneDrive and SharePoint in Microsoft 365. The attacker searched for VPN configurations and IT operational files, looking for remote access details that could assist with lateral movement from cloud resources into the endpoint network.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said that in one instance, Storm-2949 used the OneDrive web interface to download thousands of files in a single action to attacker-controlled infrastructure. The same pattern of data theft was repeated across all compromised user accounts, likely because different identities had access to different folders and shared directories.\u003c/p\u003e\n\n\u003ch2 id=\"expansion-into-azure\"\u003eExpansion Into Azure\u003c/h2\u003e\n\n\u003cp\u003eThe actor expanded the intrusion into Azure infrastructure. Microsoft says Storm-2949 compromised multiple identities that had privileged custom Azure role-based access control roles across multiple Azure subscriptions.\u003c/p\u003e\n\n\u003cp\u003eThose permissions allowed the attacker to uncover and extract sensitive assets from the victim’s Azure environment, specifically from production-based Azure subscriptions. The affected Azure resources included:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eVirtual machines\u003c/li\u003e\n\u003cli\u003eStorage accounts\u003c/li\u003e\n\u003cli\u003eKey vaults\u003c/li\u003e\n\u003cli\u003eApp services\u003c/li\u003e\n\u003cli\u003eSQL databases\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003ch2 id=\"abuse-of-azure-administration-features\"\u003eAbuse of Azure Administration Features\u003c/h2\u003e\n\n\u003cp\u003eBy using the compromised users’ privileged Azure RBAC permissions, Storm-2949 obtained credentials that allowed it to deploy or use FTP, Web Deploy, and the Kudu console for Azure App Service management.\u003c/p\u003e\n\n\u003cp\u003eWith this access, the actor could:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBrowse the file system\u003c/li\u003e\n\u003cli\u003eCheck environment variables\u003c/li\u003e\n\u003cli\u003eExecute commands remotely within the app’s context\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe attacker also pivoted to Azure Key Vaults. There, Storm-2949 modified access settings and stole dozens of secrets, including database credentials and connection strings.\u003c/p\u003e\n\n\u003ch2 id=\"azure-sql-storage-and-virtual-machine-abuse\"\u003eAzure SQL, Storage, and Virtual Machine Abuse\u003c/h2\u003e\n\n\u003cp\u003eStorm-2949 targeted Azure SQL servers and Storage accounts. The actor changed firewall and network access rules, retrieved storage keys and SAS tokens, and exfiltrated data using custom Python scripts.\u003c/p\u003e\n\n\u003cp\u003eThe attacker also abused Azure VM management features, including VMAccess and Run Command. These features were used to create rogue administrator accounts, execute remote scripts, and steal credentials.\u003c/p\u003e\n\n\u003cp\u003eIn later stages of the attack, Storm-2949 deployed the ScreenConnect remote access tool on compromised systems. The actor also attempted to disable Microsoft Defender protections and wipe forensic evidence.\u003c/p\u003e\n\n\u003ch2 id=\"impact-described-in-the-article\"\u003eImpact Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe article describes large-scale data theft from Microsoft 365 and Azure resources. In Microsoft 365, Storm-2949 downloaded files from OneDrive and SharePoint, including one instance involving thousands of files downloaded in a single action.\u003c/p\u003e\n\n\u003cp\u003eIn Azure, the attacker accessed production-based subscriptions and extracted sensitive assets. The article specifically names stolen or targeted materials including Azure Key Vault secrets, database credentials, connection strings, storage keys, SAS tokens, and data from Azure SQL servers and Storage accounts.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-recommended-defenses\"\u003eMicrosoft’s Recommended Defenses\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft recommends several hardening and best-practice measures to defend against Storm-2949-style attacks:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAdopt the principle of least privilege.\u003c/li\u003e\n\u003cli\u003eEnable conditional access policies.\u003c/li\u003e\n\u003cli\u003eAdd MFA protection for all users.\u003c/li\u003e\n\u003cli\u003eEnsure phishing-resistant MFA for users with privileged roles, such as administrators.\u003c/li\u003e\n\u003cli\u003eLimit Azure RBAC permissions.\u003c/li\u003e\n\u003cli\u003eKeep Azure Key Vault logs for up to a year.\u003c/li\u003e\n\u003cli\u003eReduce access to Key Vault.\u003c/li\u003e\n\u003cli\u003eRestrict public access to Key Vaults.\u003c/li\u003e\n\u003cli\u003eUse data protection options in Azure Storage.\u003c/li\u003e\n\u003cli\u003eMonitor for high-risk Azure management operations.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft’s report also provides indicators of compromise for the observed attacks, along with mitigation and protection guidance.\u003c/p\u003e\n","keyPoints":["Microsoft tracks the threat actor as Storm-2949 and says the attacks aim to exfiltrate as much sensitive data as possible from high-value assets in Microsoft 365 and Azure production environments.","Storm-2949 used social engineering to obtain Microsoft Entra ID credentials from users with privileged roles and abused the Self-Service Password Reset flow to reset passwords, remove MFA controls, and enroll Microsoft Authenticator on attacker-controlled devices.","After hijacking accounts, Storm-2949 used the Microsoft Graph API and custom Python scripts to enumerate users, roles, applications, and service principals, then accessed OneDrive and SharePoint to search for VPN configurations and IT operational files.","The attacker expanded into Azure infrastructure by abusing privileged Azure RBAC permissions to access virtual machines, storage accounts, key vaults, app services, and SQL databases.","Microsoft recommends defenses including least privilege, conditional access policies, MFA for all users, phishing-resistant MFA for privileged roles, restricted Azure RBAC permissions, and monitoring for high-risk Azure management operations."],"insights":["The attack turned a legitimate recovery workflow into an account takeover path by initiating SSPR and socially engineering the victim to approve MFA prompts, showing that MFA approval alone did not prevent compromise in this scenario.","Storm-2949 repeatedly downloaded data from multiple compromised Microsoft 365 accounts because each identity exposed different OneDrive, SharePoint, folder, and shared directory access.","The actor specifically searched Microsoft 365 content for VPN configurations and IT operational files, indicating that cloud document repositories can contain information useful for pivoting into endpoint networks.","Azure management features intended for administration, including VMAccess, Run Command, Kudu, FTP, and Web Deploy, were abused to create rogue administrator accounts, execute commands, inspect app environments, and steal credentials.","Microsoft’s guidance to keep Azure Key Vault logs for up to a year is particularly actionable because the actor modified Key Vault access settings and stole dozens of secrets, including database credentials and connection strings."],"referencedReports":[{"title":"Storm-2949 turned compromised identity into cloud-wide breach","url":"https://www.microsoft.com/en-us/security/blog/2026/05/18/storm-2949-turned-compromised-identity-into-cloud-wide-breach/","publisher":"Microsoft","context":"The article cites Microsoft’s report for details on Storm-2949’s Microsoft 365 and Azure data theft activity, including indicators of compromise and mitigation guidance.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft says a threat actor it tracks as Storm-2949 is targeting Microsoft 365 and Azure production environments to steal sensitive data from high-value assets. The attacks abuse legitimate applications and administration features rather than relying only on malware or exploit activity described in the article. Microsoft says Storm-2949 is a temporary designation for threat activity that is new, emerging, or developing.\u003c/p\u003e\n\n\u003cp\u003eThe actor used social engineering against users with privileged roles, including IT personnel and senior leadership, to obtain Microsoft Entra ID credentials. Microsoft believes the attacker abused the Self-Service Password Reset flow by initiating password resets and tricking victims into approving MFA prompts while posing as IT support. The actor then reset passwords, removed MFA controls, and enrolled Microsoft Authenticator on attacker-controlled devices.\u003c/p\u003e\n\n\u003cp\u003eAfter account hijacking, Storm-2949 used Microsoft Graph API and custom Python scripts to enumerate users, roles, applications, and service principals. The actor accessed OneDrive and SharePoint to search for VPN configurations and IT operational files, then expanded into Azure infrastructure including virtual machines, storage accounts, key vaults, app services, and SQL databases. Microsoft recommends least privilege, conditional access, MFA for all users, phishing-resistant MFA for privileged roles, tighter Azure RBAC permissions, and monitoring of high-risk Azure management operations.\u003c/p\u003e\n"},{"n":11,"title":"Cybercrime service disrupted for abusing Microsoft platform to sign malware","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/cybercrime-service-disrupted-for-abusing-microsoft-platform-to-sign-malware/","time":"21:47","priority":"MUST READ","score":94,"tldr":"Microsoft disrupted a malware-signing-as-a-service operation called Fox Tempest that abused its Artifact Signing platform to issue over 1,000 fraudulent certificates, making ransomware and malware appear legitimate. The service was used by multiple major ransomware and malware groups, prompting Microsoft to revoke certificates, seize infrastructure, and file legal action.","briefOverview":"\u003cp\u003eMicrosoft says it disrupted a malware-signing-as-a-service operation that abused its Artifact Signing service to create fraudulent code-signing certificates. The threat actor, tracked as Fox Tempest, used the platform to generate short-lived certificates that allowed malware to appear digitally signed and trusted. Microsoft said the operation supported ransomware gangs and other cybercriminals.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said Fox Tempest created more than 1,000 certificates and hundreds of Azure tenants and subscriptions. The company revoked over 1,000 certificates, seized the signspace.cloud domain, took hundreds of associated virtual machines offline, and blocked access to infrastructure hosting the platform. Microsoft also unsealed a legal case in the U.S. District Court for the Southern District of New York targeting the operation.\u003c/p\u003e\n\n\u003cp\u003eThe service was linked to campaigns involving Oyster, Lumma Stealer, Vidar, Rhysida, Akira, INC, Qilin, and BlackByte. Microsoft said signed malware was used to impersonate legitimate software such as Microsoft Teams, AnyDesk, PuTTY, and Webex. The company believes the operators likely used stolen identities from the United States and Canada to pass identity verification requirements for Artifact Signing.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eMicrosoft said it disrupted a malware-signing-as-a-service operation that abused Microsoft Artifact Signing to generate fraudulent code-signing certificates. The operation was attributed to a financially motivated threat actor tracked as Fox Tempest. Microsoft said the certificates allowed malware to be digitally signed and trusted as legitimate software by users and operating systems.\u003c/p\u003e\n\n\u003cp\u003eAzure Artifact Signing, previously called Trusted Signing, is a cloud-based service launched by Microsoft in 2024 that allows developers to have programs signed by Microsoft. According to Microsoft Threat Intelligence, Fox Tempest used this platform to create short-lived certificates for cybercriminal use. Microsoft said the group created over 1,000 certificates and established hundreds of Azure tenants and subscriptions.\u003c/p\u003e\n\n\u003cp\u003eAs part of the disruption, Microsoft revoked over 1,000 code-signing certificates attributed to Fox Tempest. The company also seized the signspace.cloud domain, took hundreds of virtual machines tied to the operation offline, and blocked access to infrastructure hosting the cybercrime platform. Microsoft unsealed a legal case in the U.S. District Court for the Southern District of New York targeting the operation.\u003c/p\u003e\n\n\u003cp\u003eThe operation was linked to multiple malware and ransomware campaigns involving Oyster, Lumma Stealer, Vidar, Rhysida, Akira, INC, Qilin, and BlackByte. Microsoft said threat actors including Vanilla Tempest, Storm-0501, Storm-2561, and Storm-0249 used the signed malware in attacks. Microsoft also named the Vanilla Tempest ransomware operation as a co-conspirator in the legal action.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the service operated through signspace.cloud and allowed customers to upload malicious files for signing using fraudulently obtained certificates. The signed files were used to impersonate legitimate software such as Microsoft Teams, AnyDesk, PuTTY, and Webex. In one example cited in Microsoft’s complaint, falsely named Microsoft Teams installer files delivered a malicious loader, installed fraudulently signed Oyster malware, and ultimately deployed Rhysida ransomware.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft believes the operators likely used stolen identities from the United States and Canada to pass Artifact Signing identity verification requirements. The threat actors reportedly used only 72-hour certificates to reduce detection risk. Microsoft also said Fox Tempest later provided customers with pre-configured virtual machines hosted through Cloudzy infrastructure, and promoted the service on a Telegram channel named “EV Certs for Sale by SamCodeSign,” charging \u003cspan class=\"math inline\"\u003e\\(5,000 to \\)\u003c/span\u003e9,000 in bitcoin for access.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft says it disrupted a malware-signing-as-a-service operation that abused the company’s Artifact Signing service to generate fraudulent code-signing certificates. The operation was attributed to a financially motivated threat actor tracked as Fox Tempest. Microsoft said the certificates were used by ransomware gangs and other cybercriminals to make malware appear digitally signed and trusted as legitimate software.\u003c/p\u003e\n\n\u003cp\u003eAzure Artifact Signing, previously called Trusted Signing, is described in the article as a cloud-based service launched by Microsoft in 2024 that allows developers to have their programs signed by Microsoft. According to Microsoft Threat Intelligence, Fox Tempest abused this platform to create short-lived certificates for malicious files.\u003c/p\u003e\n\n\u003ch2 id=\"scale-of-the-operation\"\u003eScale of the Operation\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said Fox Tempest created more than 1,000 certificates and established hundreds of Azure tenants and subscriptions to support the operation. The company said it revoked over 1,000 code-signing certificates attributed to Fox Tempest.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft also said the operation generated millions of dollars in profits. The company described Fox Tempest as a well-resourced group capable of managing infrastructure, customer relations, and financial transactions.\u003c/p\u003e\n\n\u003ch2 id=\"microsoft-s-disruption-and-legal-response\"\u003eMicrosoft’s Disruption and Legal Response\u003c/h2\u003e\n\n\u003cp\u003eIn May 2026, Microsoft’s Digital Crimes Unit, with support from industry partners, disrupted Fox Tempest’s malware-signing-as-a-service offering. Microsoft said the action targeted the infrastructure and access model that enabled broader criminal use of the service.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said it took several steps against the operation:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eRevoked over 1,000 code-signing certificates attributed to Fox Tempest.\u003c/li\u003e\n\u003cli\u003eSeized the signspace.cloud domain used by the service.\u003c/li\u003e\n\u003cli\u003eTook hundreds of virtual machines tied to the operation offline.\u003c/li\u003e\n\u003cli\u003eBlocked access to infrastructure hosting the cybercrime platform.\u003c/li\u003e\n\u003cli\u003eUnsealed a legal case in the U.S. District Court for the Southern District of New York.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe seized signspace.cloud domain now redirects to a Microsoft-operated site explaining that the company seized the domain as part of a lawsuit against the malware-signing-as-a-service scheme.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-service-worked\"\u003eHow the Service Worked\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said the malware-signing platform operated through signspace.cloud. Cybercriminal customers could upload malicious files to be code-signed using fraudulently obtained certificates.\u003c/p\u003e\n\n\u003cp\u003eThe signed malware files were then used to impersonate legitimate software, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eMicrosoft Teams\u003c/li\u003e\n\u003cli\u003eAnyDesk\u003c/li\u003e\n\u003cli\u003ePuTTY\u003c/li\u003e\n\u003cli\u003eWebex\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft’s complaint said that when victims executed falsely named Microsoft Teams installer files, the files delivered a malicious loader. That loader installed fraudulently signed Oyster malware and ultimately deployed Rhysida ransomware.\u003c/p\u003e\n\n\u003cp\u003eThe complaint also said that because the Oyster malware was signed by a certificate from Microsoft’s Artifact Signing service, Windows initially recognized the malware as legitimate software. Microsoft stated that the malware otherwise would have been flagged as suspicious or blocked entirely by Windows operating system security controls.\u003c/p\u003e\n\n\u003ch2 id=\"certificate-abuse-and-identity-verification\"\u003eCertificate Abuse and Identity Verification\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft believes the operators likely used stolen identities from the United States and Canada to pass Artifact Signing identity verification requirements. The article states that the threat actors reportedly used only short-lived certificates valid for 72 hours.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the use of 72-hour certificates reduced the risk of detection. BleepingComputer also noted that it previously reported in March 2025 on threat actors abusing Microsoft’s Trusted Signing service to sign malware used in a Crazy Evil Traffers crypto-theft campaign and a Lumma Stealer campaign. Those malware samples were also signed with three-day certificates, though the article says it is unclear whether they were signed by the Fox Tempest platform.\u003c/p\u003e\n\n\u003ch2 id=\"malware-ransomware-and-threat-actors-linked-to-the-operation\"\u003eMalware, Ransomware, and Threat Actors Linked to the Operation\u003c/h2\u003e\n\n\u003cp\u003eThe operation was linked to numerous malware and ransomware campaigns. The article names the following malware and ransomware families or operations:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eOyster\u003c/li\u003e\n\u003cli\u003eLumma Stealer\u003c/li\u003e\n\u003cli\u003eVidar\u003c/li\u003e\n\u003cli\u003eRhysida\u003c/li\u003e\n\u003cli\u003eAkira\u003c/li\u003e\n\u003cli\u003eINC\u003c/li\u003e\n\u003cli\u003eQilin\u003c/li\u003e\n\u003cli\u003eBlackByte\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eMicrosoft said threat actors including Vanilla Tempest, Storm-0501, Storm-2561, and Storm-0249 used the signed malware in attacks. Microsoft also named the Vanilla Tempest ransomware operation as a co-conspirator in the legal action, stating that the group used the service to distribute malware and ransomware in attacks targeting organizations worldwide.\u003c/p\u003e\n\n\u003ch2 id=\"infrastructure-and-service-evolution\"\u003eInfrastructure and Service Evolution\u003c/h2\u003e\n\n\u003cp\u003eMicrosoft said Fox Tempest evolved its operation earlier in the year by providing customers with pre-configured virtual machines hosted through Cloudzy infrastructure. Customers uploaded malware to those virtual machine environments and received signed binaries using Fox Tempest-controlled certificates.\u003c/p\u003e\n\n\u003cp\u003eThis model was part of the operation Microsoft disrupted when it targeted the infrastructure and access model behind the service.\u003c/p\u003e\n\n\u003ch2 id=\"promotion-and-pricing\"\u003ePromotion and Pricing\u003c/h2\u003e\n\n\u003cp\u003eThe article says the malware-signing platform was promoted on a Telegram channel named “EV Certs for Sale by SamCodeSign.” Pricing ranged from \u003cspan class=\"math inline\"\u003e\\(5,000 to \\)\u003c/span\u003e9,000 in bitcoin for access to the platform.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said the operation generated millions of dollars in profits. The company described the group as capable of managing infrastructure, customer relations, and financial transactions.\u003c/p\u003e\n\n\u003ch2 id=\"impact-described-in-the-article\"\u003eImpact Described in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe primary impact described in the article is that Fox Tempest’s service allowed cybercriminals to make malicious files appear legitimate by signing them with certificates from Microsoft’s Artifact Signing service. This signing allowed malware to be trusted by users and operating systems, and in at least one example caused Windows to initially recognize Oyster malware as legitimate software.\u003c/p\u003e\n\n\u003cp\u003eThe signed malware was used in attacks involving multiple ransomware and malware operations, including Rhysida ransomware after delivery through falsely named Microsoft Teams installer files. Microsoft’s response included certificate revocation, infrastructure takedown, domain seizure, and legal action.\u003c/p\u003e\n","keyPoints":["Microsoft disrupted a malware-signing-as-a-service operation tracked as Fox Tempest that abused Microsoft Artifact Signing to create fraudulent code-signing certificates for cybercriminals.","Microsoft said Fox Tempest created more than 1,000 certificates and hundreds of Azure tenants and subscriptions, and Microsoft revoked over 1,000 code-signing certificates attributed to the group.","Microsoft seized the signspace.cloud domain, took hundreds of related virtual machines offline, blocked access to the operation’s infrastructure, and unsealed a legal case in the Southern District of New York.","The operation was linked to malware and ransomware campaigns involving Oyster, Lumma Stealer, Vidar, Rhysida, Akira, INC, Qilin, and BlackByte.","Microsoft said the signed malware was used to impersonate legitimate software such as Microsoft Teams, AnyDesk, PuTTY, and Webex."],"insights":["Fox Tempest reportedly used only 72-hour certificates when obtaining signing credentials, which Microsoft said reduced the risk of detection.","Microsoft believes the operators likely used stolen identities from the United States and Canada to pass Artifact Signing identity verification requirements.","Malware signed through Microsoft Artifact Signing was initially recognized by Windows as legitimate software, even though it would otherwise have been flagged as suspicious or blocked by Windows security controls.","Fox Tempest evolved its service by giving customers pre-configured virtual machines hosted through Cloudzy infrastructure, where customers uploaded malware and received signed binaries.","The service was marketed on Telegram as “EV Certs for Sale by SamCodeSign,” with access priced between $5,000 and $9,000 in bitcoin."],"referencedReports":[{"title":"Exposing Fox Tempest: A malware-signing service operation","url":"http://www.microsoft.com/en-us/security/blog/2026/05/19/exposing-fox-tempest-a-malware-signing-service-operation/","publisher":"Microsoft Threat Intelligence","context":"The article cites a report published by Microsoft Threat Intelligence detailing Fox Tempest’s abuse of Microsoft Artifact Signing to create fraudulent code-signing certificates.","category":"","primary":false}],"body":"\u003cp\u003eMicrosoft says it disrupted a malware-signing-as-a-service operation that abused its Artifact Signing service to create fraudulent code-signing certificates. The threat actor, tracked as Fox Tempest, used the platform to generate short-lived certificates that allowed malware to appear digitally signed and trusted. Microsoft said the operation supported ransomware gangs and other cybercriminals.\u003c/p\u003e\n\n\u003cp\u003eMicrosoft said Fox Tempest created more than 1,000 certificates and hundreds of Azure tenants and subscriptions. The company revoked over 1,000 certificates, seized the signspace.cloud domain, took hundreds of associated virtual machines offline, and blocked access to infrastructure hosting the platform. Microsoft also unsealed a legal case in the U.S. District Court for the Southern District of New York targeting the operation.\u003c/p\u003e\n\n\u003cp\u003eThe service was linked to campaigns involving Oyster, Lumma Stealer, Vidar, Rhysida, Akira, INC, Qilin, and BlackByte. Microsoft said signed malware was used to impersonate legitimate software such as Microsoft Teams, AnyDesk, PuTTY, and Webex. The company believes the operators likely used stolen identities from the United States and Canada to pass identity verification requirements for Artifact Signing.\u003c/p\u003e\n"},{"n":17,"title":"New Shai-Hulud malware wave compromises 600 npm packages","source":"bleepingcomputer.com","sourceColor":"#38bdf8","link":"https://www.bleepingcomputer.com/news/security/new-shai-hulud-malware-wave-compromises-600-npm-packages/","time":"14:30","priority":"MUST READ","score":94,"tldr":"A new Shai-Hulud supply-chain attack compromised more than 600 npm package versions, mainly in the @antv ecosystem, to steal developer and CI/CD secrets and spread using stolen npm/GitHub credentials. Developers who installed affected packages should downgrade or remove them immediately and rotate exposed credentials.","briefOverview":"\u003cp\u003eThreat actors published more than 600 malicious packages to the npm index as part of a new Shai-Hulud supply-chain campaign. Socket reported 639 malicious versions across 323 unique packages were published in about one hour on May 19. Most affected packages were in the @antv ecosystem, but popular packages outside that namespace were also compromised.\u003c/p\u003e\n\n\u003cp\u003eThe malware targets developer workstations and CI/CD environments to steal GitHub, npm, cloud, Kubernetes, Vault, Docker, database, and SSH credentials. It exfiltrates stolen data primarily through the Session P2P network, with GitHub used as a fallback mechanism when credentials are available. The campaign also produced thousands of rogue GitHub repositories containing campaign markers.\u003c/p\u003e\n\n\u003cp\u003eResearchers reported that this Shai-Hulud variant can abuse OIDC tokens from compromised CI environments to generate valid Sigstore provenance attestations. This means malicious npm packages may appear legitimately signed and pass standard provenance verification checks. Developers who downloaded infected packages are advised to remove or downgrade to known good versions published before May 18 and rotate exposed credentials.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eA new Shai-Hulud supply-chain campaign compromised the npm ecosystem by publishing more than 600 malicious package versions. According to Socket, the attackers published 639 malicious versions across 323 unique packages in about one hour on May 19, between 01:56 UTC and 02:56 UTC. Most affected packages were in the @antv ecosystem, which includes charting, graph visualization, flowchart, and mapping libraries. Some popular packages outside the @antv namespace were also compromised.\u003c/p\u003e\n\n\u003cp\u003eThe attack began with the compromise of the npm account \u003ccode\u003eatool\u003c/code\u003e, which publishes packages in the @antv namespace. Impacted libraries listed in the article include echarts-for-react, @antv/g2, @antv/g6, @antv/x6, @antv/l7, @antv/g2plot, @antv/graphin, timeago.js, size-sensor, and canvas-nest.js. Endor Labs noted that some packages, such as timeago.js, size-sensor, and jest-canvas-mock, had not received legitimate updates for a long time and were less likely to have OIDC trusted publishing configured. The article notes that jest-canvas-mock still has 10 million monthly downloads despite being dormant for about three years.\u003c/p\u003e\n\n\u003cp\u003eThe payload steals secrets from developer and CI/CD environments and exfiltrates them primarily through the Session P2P network. The malware targets environments including GitHub Actions, GitLab CI, Jenkins, Azure DevOps, CircleCI, Vercel, Netlify, and other build platforms. It attempts to steal GitHub, npm, cloud, Kubernetes, Vault, Docker, database, and SSH credentials. Stolen data is serialized, Gzip-compressed, AES-256-GCM-encrypted, and RSA-OAEP-wrapped to make network inspection harder.\u003c/p\u003e\n\n\u003cp\u003eGitHub also served as a fallback exfiltration mechanism when credentials were available. The malware can use the GitHub API to create repositories under a victim’s account and upload stolen data to them. These repositories include a Readme string, \u003ccode\u003eniaga og ew ereh :duluh-iahs\u003c/code\u003e, which is the reverse of “Shai-Hulud: Here We Go Again.” Aikido reported more than 2,700 rogue GitHub repositories matching the campaign’s markers, while BleepingComputer observed at least 2,900 before publication.\u003c/p\u003e\n\n\u003cp\u003eEndor Labs reported that this variant can generate valid Sigstore provenance attestations by abusing OIDC tokens from compromised CI environments and submitting them to Fulcio and Reko. The article states that malicious npm packages may therefore appear legitimately signed and pass standard provenance verification checks. The self-propagation capability is also present: the malware validates stolen npm tokens, enumerates packages owned by victims, downloads tarballs, injects the malicious payload, and republishes infected packages with bumped version numbers.\u003c/p\u003e\n\n\u003cp\u003eAttribution is described as difficult because Shai-Hulud’s code was recently leaked on GitHub by the TeamPCP threat group and has already been used in attacks. Socket said the AntV payloads differ technically from earlier Mini Shai-Hulud artifacts but share the same operational characteristics. Aikido said the payload is smaller and includes persistence through backdoors in VS Code and Claude Code configurations. The recommended response is to remove or downgrade infected npm packages to known good versions published before May 18 and revoke or rotate exposed credentials such as GitHub tokens, cloud tokens, and SSH keys.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThreat actors published more than 600 malicious packages to the Node Package Manager index as part of a new Shai-Hulud supply-chain campaign. The campaign primarily affected the @antv ecosystem, which includes libraries for charting, graph visualization, flowcharts, and mapping. The article also states that popular packages outside the @antv namespace were compromised.\u003c/p\u003e\n\n\u003cp\u003eAccording to Socket, the attackers published 639 malicious versions across 323 unique packages in about one hour on May 19, between 01:56 UTC and 02:56 UTC. Socket maintains a list of package artifacts affected by Shai-Hulud attacks, which the article says has grown to more than 1,000 entries.\u003c/p\u003e\n\n\u003ch2 id=\"affected-packages-and-initial-compromise\"\u003eAffected packages and initial compromise\u003c/h2\u003e\n\n\u003cp\u003eThe attack began with the compromise of the npm account \u003ccode\u003eatool\u003c/code\u003e, which publishes packages in the @antv namespace. The article lists several impacted libraries, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eecharts-for-react\u003c/li\u003e\n\u003cli\u003e@antv/g2\u003c/li\u003e\n\u003cli\u003e@antv/g6\u003c/li\u003e\n\u003cli\u003e@antv/x6\u003c/li\u003e\n\u003cli\u003e@antv/l7\u003c/li\u003e\n\u003cli\u003e@antv/g2plot\u003c/li\u003e\n\u003cli\u003e@antv/graphin\u003c/li\u003e\n\u003cli\u003etimeago.js\u003c/li\u003e\n\u003cli\u003esize-sensor\u003c/li\u003e\n\u003cli\u003ecanvas-nest.js\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eEndor Labs highlighted that some packages, including timeago.js, size-sensor, and jest-canvas-mock, had not received legitimate updates for a long time and were less likely to have OIDC trusted publishing configured. The article notes that jest-canvas-mock still has 10 million monthly downloads but has been dormant for about three years.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-earlier-shai-hulud-activity\"\u003eRelationship to earlier Shai-Hulud activity\u003c/h2\u003e\n\n\u003cp\u003eThe article says the new campaign resembles a previous Shai-Hulud campaign that affected TanStack and Mistral packages. As in that earlier campaign, the payload collects secrets from developer and CI/CD environments and exfiltrates them over the Session P2P network. The article also notes that Shai-Hulud campaigns started last September and have continued to affect multiple software ecosystems, including npm, PyPI, and Composer to a lesser degree.\u003c/p\u003e\n\n\u003cp\u003eAttribution for the new campaign is described as more difficult because Shai-Hulud’s code was recently leaked on GitHub by the TeamPCP threat group and has already been used in attacks. A similar capability involving verifiable SLSA provenance attestation was observed in the payload delivered in the TanStack attack attributed to TeamPCP.\u003c/p\u003e\n\n\u003ch2 id=\"payload-behavior-and-credential-theft\"\u003ePayload behavior and credential theft\u003c/h2\u003e\n\n\u003cp\u003eThe latest wave involves injecting a heavily obfuscated \u003ccode\u003eindex.js\u003c/code\u003e payload. The payload attempts to steal credentials and secrets from developer workstations and CI/CD environments. The article lists targeted credential types including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eGitHub credentials\u003c/li\u003e\n\u003cli\u003enpm credentials\u003c/li\u003e\n\u003cli\u003eCloud credentials\u003c/li\u003e\n\u003cli\u003eKubernetes credentials\u003c/li\u003e\n\u003cli\u003eVault credentials\u003c/li\u003e\n\u003cli\u003eDocker credentials\u003c/li\u003e\n\u003cli\u003eDatabase credentials\u003c/li\u003e\n\u003cli\u003eSSH credentials\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe malware targets developer workstations and CI/CD platforms, including GitHub Actions, GitLab CI, Jenkins, Azure DevOps, CircleCI, Vercel, Netlify, and other build platforms.\u003c/p\u003e\n\n\u003cp\u003eThe stolen data is serialized, Gzip-compressed, AES-256-GCM-encrypted, and RSA-OAEP-wrapped. The article says this makes network inspection harder.\u003c/p\u003e\n\n\u003ch2 id=\"exfiltration-methods\"\u003eExfiltration methods\u003c/h2\u003e\n\n\u003cp\u003eThe main exfiltration channel is \u003ccode\u003efilev2.getsession[.]org/file/\u003c/code\u003e through the Session P2P network. Microsoft also shared the \u003ccode\u003et.m-kosche.com\u003c/code\u003e endpoint for shipping stolen credentials. Endor Labs said that on the wire, the Session P2P traffic is end-to-end encrypted over TCP/443 and is indistinguishable from legitimate Session app traffic at the network layer, with no traditional command-and-control endpoint to block by hostname or IP.\u003c/p\u003e\n\n\u003cp\u003eGitHub is also used as a fallback exfiltration mechanism when credentials are available. If the malware obtains GitHub credentials, it uses the GitHub API to create new repositories under the victim’s account and upload stolen data to them.\u003c/p\u003e\n\n\u003cp\u003eRepositories created as part of the attack contain a Readme file with the string \u003ccode\u003eniaga og ew ereh :duluh-iahs\u003c/code\u003e, which is the reverse of “Shai-Hulud: Here We Go Again.” Aikido reported more than 2,700 rogue GitHub repositories matching the campaign’s markers. BleepingComputer said that before publication, a search showed at least 2,900 GitHub repositories generated by the latest Shai-Hulud supply-chain campaign.\u003c/p\u003e\n\n\u003ch2 id=\"provenance-and-package-legitimacy-concerns\"\u003eProvenance and package legitimacy concerns\u003c/h2\u003e\n\n\u003cp\u003eEndor Labs identified a key addition in this Shai-Hulud variant: the ability to generate valid Sigstore provenance attestations. The malware does this by abusing OpenID Connect tokens from compromised CI environments and submitting them to Fulcio and Reko.\u003c/p\u003e\n\n\u003cp\u003eThe article states that, as a result, malicious npm packages may appear legitimately signed and pass standard provenance verification checks despite containing credential-stealing malware. A similar capability was observed in the TanStack attack attributed to TeamPCP, where the threat actor published malicious package versions with verifiable Supply-chain Levels for Software Artifacts provenance attestation.\u003c/p\u003e\n\n\u003ch2 id=\"self-propagation-capability\"\u003eSelf-propagation capability\u003c/h2\u003e\n\n\u003cp\u003eThe article says the self-propagation capability is present in this attack. The malware validates stolen npm tokens, enumerates packages owned by the victim, downloads package tarballs, injects the malicious payload, and republishes infected packages with bumped version numbers.\u003c/p\u003e\n\n\u003cp\u003eThis allows the malware to spread to other projects when it obtains credentials that permit package publishing.\u003c/p\u003e\n\n\u003ch2 id=\"differences-from-earlier-mini-shai-hulud-payloads\"\u003eDifferences from earlier Mini Shai-Hulud payloads\u003c/h2\u003e\n\n\u003cp\u003eSocket said this variant differs technically from earlier Mini Shai-Hulud payloads while retaining the same operational characteristics. The AntV payloads differ from earlier Mini Shai-Hulud artifacts such as TanStack’s \u003ccode\u003erouter_init.js\u003c/code\u003e and Intercom-related \u003ccode\u003erouter_runtime.js\u003c/code\u003e payloads.\u003c/p\u003e\n\n\u003cp\u003eSocket said the AntV sample uses a root-level \u003ccode\u003eindex.js\u003c/code\u003e, a different primary command-and-control endpoint, and a smaller payload body. Aikido Security confirmed that the core model remains the same but noted differences including the smaller payload and persistence through backdoors planted in VS Code and Claude Code configurations.\u003c/p\u003e\n\n\u003cp\u003eAikido warned that this persistence may indicate the attacker is thinking about what happens after the initial compromise gets cleaned up.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-recommended-response\"\u003eImpact and recommended response\u003c/h2\u003e\n\n\u003cp\u003eThe article’s general recommendation for developers who downloaded infected npm packages is to immediately remove or downgrade to a known good version published before May 18. Developers are also advised to revoke and rotate all exposed credentials, including GitHub tokens, cloud tokens, and SSH keys.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that reports from Socket, Endor Labs, Aikido Security, and Step Security include indicators of compromise along with detection, remediation, and mitigation advice that defenders can use to protect development environments.\u003c/p\u003e\n","keyPoints":["Threat actors published 639 malicious versions across 323 unique npm packages in about one hour on May 19, with most affected packages in the @antv ecosystem.","The Shai-Hulud payload steals secrets from developer and CI/CD environments and exfiltrates them primarily through the Session P2P network, with GitHub used as a fallback mechanism when credentials are available.","The malware can create repositories under victims’ GitHub accounts and upload stolen data, and researchers found thousands of rogue GitHub repositories matching the campaign’s markers.","This Shai-Hulud variant can abuse OIDC tokens from compromised CI environments to generate valid Sigstore provenance attestations, making malicious npm packages appear legitimately signed.","Developers who downloaded infected npm packages are advised to remove or downgrade to a known good version published before May 18 and rotate exposed credentials such as GitHub tokens, cloud tokens, and SSH keys."],"insights":["Standard provenance checks may not be sufficient for this campaign because the malware can abuse OIDC tokens from compromised CI environments to generate valid Sigstore provenance attestations.","Dormant but still widely used packages are a notable risk in this attack, as packages such as jest-canvas-mock had millions of monthly downloads but had not received legitimate updates for years and were less likely to have OIDC trusted publishing configured.","Network blocking by hostname or IP is less effective against the primary exfiltration channel because the malware uses end-to-end-encrypted Session P2P traffic over TCP/443 that Endor Labs says is indistinguishable from legitimate Session app traffic at the network layer.","Cleanup may require checking developer tooling configuration, not just npm dependencies and credentials, because this variant plants persistence backdoors in VS Code and Claude Code configurations.","The presence of thousands of GitHub repositories containing campaign markers provides defenders with a concrete way to identify accounts that may have had stolen data published through the malware’s GitHub fallback exfiltration mechanism."],"referencedReports":[{"title":"AntV Packages Compromised","url":"https://socket.dev/blog/antv-packages-compromised","publisher":"Socket","context":"The article cites Socket’s report for the finding that hackers published 639 malicious versions across 323 npm packages in about one hour and notes that Socket’s report includes indicators of compromise and mitigation advice.","category":"","primary":false},{"title":"Mini Shai-Hulud Returns: 42 Malicious npm Packages \u0026 Fake Sigstore Badges in AntV Ecosystem Attack","url":"https://www.endorlabs.com/learn/mini-shai-hulud-returns-42-malicious-npm-packages-fake-sigstore-badges-in-antv-ecosystem-attack","publisher":"Endor Labs","context":"The article references Endor Labs researchers for analysis of affected dormant packages, Session P2P exfiltration, and the malware’s abuse of OIDC tokens to generate Sigstore provenance attestations.","category":"","primary":false},{"title":"Mini Shai-Hulud: AntV npm Supply Chain Attack","url":"https://www.aikido.dev/blog/mini-shai-hulud-antv-npm-supply-chain-attack","publisher":"Aikido Security","context":"The article cites Aikido Security’s report for the estimate of rogue GitHub repositories and for technical observations about the smaller payload and persistence through VS Code and Claude Code configurations.","category":"","primary":false},{"title":"Shai-Hulud: Here We Go Again — Mass npm Supply Chain Attack Hits the AntV Ecosystem","url":"https://www.stepsecurity.io/blog/shai-hulud-here-we-go-again-mass-npm-supply-chain-attack-hits-the-antv-ecosystem","publisher":"Step Security","context":"The article lists Step Security’s report as one of the attack reports that includes indicators of compromise along with detection, remediation, and mitigation guidance.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors published more than 600 malicious packages to the npm index as part of a new Shai-Hulud supply-chain campaign. Socket reported 639 malicious versions across 323 unique packages were published in about one hour on May 19. Most affected packages were in the @antv ecosystem, but popular packages outside that namespace were also compromised.\u003c/p\u003e\n\n\u003cp\u003eThe malware targets developer workstations and CI/CD environments to steal GitHub, npm, cloud, Kubernetes, Vault, Docker, database, and SSH credentials. It exfiltrates stolen data primarily through the Session P2P network, with GitHub used as a fallback mechanism when credentials are available. The campaign also produced thousands of rogue GitHub repositories containing campaign markers.\u003c/p\u003e\n\n\u003cp\u003eResearchers reported that this Shai-Hulud variant can abuse OIDC tokens from compromised CI environments to generate valid Sigstore provenance attestations. This means malicious npm packages may appear legitimately signed and pass standard provenance verification checks. Developers who downloaded infected packages are advised to remove or downgrade to known good versions published before May 18 and rotate exposed credentials.\u003c/p\u003e\n"},{"n":20,"title":"GitHub Actions Supply Chain Attack Redirects Tags to Steal CI/CD Credentials","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/github-actions-supply-chain-attack.html","time":"05:28","priority":"MUST READ","score":94,"tldr":"Attackers compromised the GitHub Actions projects actions-cool/issues-helper and maintain-one-comment by redirecting all version tags to malicious imposter commits that steal CI/CD credentials from workflow runners. Workflows pinned to trusted full commit SHAs are unaffected, but any workflow using the moved tags may execute the credential-stealing code.","briefOverview":"\u003cp\u003eThreat actors compromised the popular GitHub Actions workflow \u003cstrong\u003eactions-cool/issues-helper\u003c/strong\u003e to execute malicious code that harvests sensitive credentials and exfiltrates them to an attacker-controlled server. StepSecurity researcher Varun Sharma said every existing tag in the repository was moved to point to an imposter commit outside the action’s normal commit history. The attack is significant because workflows referencing the action by version would pull the malicious code on their next run.\u003c/p\u003e\n\n\u003cp\u003eThe imposter commit contains code that downloads the Bun JavaScript runtime, reads memory from the Runner.Worker process to extract credentials, and sends the stolen data to \u003cstrong\u003et.m-kosche[.]com\u003c/strong\u003e. StepSecurity also said 15 tags associated with a second GitHub action, \u003cstrong\u003eactions-cool/maintain-one-comment\u003c/strong\u003e, were compromised with the same functionality. GitHub has disabled access to the maintain-one-comment repository due to a violation of its terms of service.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that the same exfiltration domain was observed in the latest wave of the Mini Shai-Hulud campaign targeting npm packages from the \u003cstrong\u003e@antv\u003c/strong\u003e ecosystem. StepSecurity said only workflows pinned to a known-good full commit SHA are unaffected. Workflows using compromised version tags may execute the credential-stealing code.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eThreat actors compromised the GitHub Actions workflow \u003cstrong\u003eactions-cool/issues-helper\u003c/strong\u003e in a software supply chain attack designed to steal CI/CD credentials. According to StepSecurity researcher Varun Sharma, every existing tag in the repository was moved to an imposter commit that does not appear in the action’s normal commit history. That imposter commit contains malicious code that exfiltrates credentials from CI/CD pipelines running the action.\u003c/p\u003e\n\n\u003cp\u003eThe article describes an imposter commit as a deceptive software supply chain attack technique in which malicious code is injected by referencing a commit or tag that exists only in an adversary-controlled fork rather than the original trusted repository. This can allow attackers to bypass standard pull request reviews and achieve arbitrary code execution. In this case, the compromised tags cause workflows referencing the action by version to retrieve malicious code.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity said the malicious code performs several actions when executed inside a GitHub Actions runner. It downloads the Bun JavaScript runtime, reads memory from the Runner.Worker process to extract credentials, and makes an outbound HTTPS request to the attacker-controlled domain \u003cstrong\u003et.m-kosche[.]com\u003c/strong\u003e to transmit the stolen data. The credential theft occurs within CI/CD pipeline execution environments that run the affected action.\u003c/p\u003e\n\n\u003cp\u003eA second GitHub action, \u003cstrong\u003eactions-cool/maintain-one-comment\u003c/strong\u003e, was also affected, with StepSecurity saying 15 of its tags were compromised with the same functionality. GitHub has since disabled access to the maintain-one-comment repository for a violation of GitHub’s terms of service. The article states that it is currently not known what led GitHub to that decision.\u003c/p\u003e\n\n\u003cp\u003eThe exfiltration domain \u003cstrong\u003et.m-kosche[.]com\u003c/strong\u003e was also observed in the latest wave of the Mini Shai-Hulud campaign targeting npm packages from the \u003cstrong\u003e@antv\u003c/strong\u003e ecosystem. The article says this indicates the two clusters of activity could be related. StepSecurity emphasized that because every tag now resolves to malicious commits, workflows that reference the action by version will pull the malicious code on their next run, while workflows pinned to a known-good full commit SHA are unaffected.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eThreat actors compromised the popular GitHub Actions workflow \u003cstrong\u003eactions-cool/issues-helper\u003c/strong\u003e in a software supply chain attack aimed at stealing CI/CD credentials. The attack involved moving every existing tag in the repository to point to an imposter commit containing malicious code. StepSecurity researcher Varun Sharma said the imposter commit does not appear in the action’s normal commit history.\u003c/p\u003e\n\n\u003cp\u003eThe malicious code is designed to run inside GitHub Actions workflows that use the affected action. When executed, it harvests credentials from CI/CD pipelines and exfiltrates them to an attacker-controlled server. StepSecurity said any workflow referencing the action by version would pull the malicious code on its next run.\u003c/p\u003e\n\n\u003ch2 id=\"imposter-commit-technique\"\u003eImposter Commit Technique\u003c/h2\u003e\n\n\u003cp\u003eThe article describes an \u003cstrong\u003eimposter commit\u003c/strong\u003e as a deceptive software supply chain attack strategy. In this technique, malicious code is injected into a project by referencing a commit or tag that exists only in an adversary-controlled fork rather than the original trusted repository.\u003c/p\u003e\n\n\u003cp\u003eAccording to the article, this approach can allow attackers to bypass standard pull request reviews and achieve arbitrary code execution. In the actions-cool/issues-helper compromise, the repository’s existing tags were redirected to such an imposter commit. This made version-based references to the action resolve to malicious code.\u003c/p\u003e\n\n\u003ch2 id=\"malicious-behavior\"\u003eMalicious Behavior\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity said the imposter commit contains code that executes inside a GitHub Actions runner. The code performs several actions:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eIt downloads the Bun JavaScript runtime to the runner.\u003c/li\u003e\n\u003cli\u003eIt reads memory from the \u003cstrong\u003eRunner.Worker\u003c/strong\u003e process to extract credentials.\u003c/li\u003e\n\u003cli\u003eIt makes an outbound HTTPS call to the attacker-controlled domain \u003cstrong\u003et.m-kosche[.]com\u003c/strong\u003e.\u003c/li\u003e\n\u003cli\u003eIt transmits the stolen data to that domain.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article identifies the target of the theft as sensitive credentials from CI/CD pipelines that run the compromised action.\u003c/p\u003e\n\n\u003ch2 id=\"additional-affected-github-action\"\u003eAdditional Affected GitHub Action\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity also reported that a second GitHub action, \u003cstrong\u003eactions-cool/maintain-one-comment\u003c/strong\u003e, was affected. The company said 15 tags associated with that action were compromised with the same functionality.\u003c/p\u003e\n\n\u003cp\u003eGitHub has since disabled access to the \u003cstrong\u003eactions-cool/maintain-one-comment\u003c/strong\u003e repository. The article says GitHub disabled it due to a violation of GitHub’s terms of service. It also states that it is currently not known what led GitHub to this decision.\u003c/p\u003e\n\n\u003ch2 id=\"possible-link-to-mini-shai-hulud-activity\"\u003ePossible Link to Mini Shai-Hulud Activity\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that the exfiltration domain \u003cstrong\u003et.m-kosche[.]com\u003c/strong\u003e has also been observed in the latest wave of the Mini Shai-Hulud campaign. That campaign targeted npm packages from the \u003cstrong\u003e@antv\u003c/strong\u003e ecosystem.\u003c/p\u003e\n\n\u003cp\u003eBecause the same exfiltration domain appeared in both sets of activity, the article says the two clusters of activity could be related. It does not identify a specific actor responsible for the GitHub Actions compromise beyond referring to threat actors.\u003c/p\u003e\n\n\u003ch2 id=\"impact-and-mitigation-detail-disclosed\"\u003eImpact and Mitigation Detail Disclosed\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity said that because every tag now resolves to malicious commits, any workflow referencing the affected action by version will pull the malicious code on its next run. This makes workflows that rely on version tags vulnerable to executing the credential-stealing payload.\u003c/p\u003e\n\n\u003cp\u003eThe article states that only workflows pinned to a known-good full commit SHA are unaffected. This distinction is important because the attack specifically abused tags, while full commit SHA pinning to a known-good commit avoids the malicious redirected tags.\u003c/p\u003e\n","keyPoints":["Threat actors compromised the GitHub Actions workflow actions-cool/issues-helper to run malicious code that harvests sensitive credentials and exfiltrates them to an attacker-controlled server.","Every existing tag in the actions-cool/issues-helper repository was moved to point to an imposter commit that does not appear in the action's normal commit history.","The malicious code downloads the Bun JavaScript runtime, reads memory from the Runner.Worker process to extract credentials, and sends the stolen data to t.m-kosche.com.","StepSecurity said 15 tags associated with the GitHub action actions-cool/maintain-one-comment were also compromised with the same functionality.","StepSecurity said workflows referencing the affected actions by version will pull the malicious code on their next run, while workflows pinned to a known-good full commit SHA are unaffected."],"insights":["Pinning GitHub Actions by version tag is not sufficient protection in this case because the attack moved every existing tag to malicious commits; only pinning to a known-good full commit SHA avoids the compromised code.","The use of an imposter commit allows malicious code to be introduced outside the action's normal commit history, bypassing standard pull request review visibility.","The same exfiltration domain used in this GitHub Actions compromise was also observed in the Mini Shai-Hulud npm package campaign targeting the @antv ecosystem.","The malicious payload targets GitHub Actions runner memory, specifically the Runner.Worker process, rather than only relying on exposed environment variables or files mentioned in the article."],"referencedReports":[{"title":"actions-cool/issues-helper GitHub Action Compromised: All Tags Point to Imposter Commit That Exfiltrates CI/CD Credentials","url":"https://www.stepsecurity.io/blog/actions-cool-issues-helper-github-action-compromised-all-tags-point-to-imposter-commit-that-exfiltrates-ci-cd-credentials","publisher":"StepSecurity","context":"The article cites StepSecurity researcher Varun Sharma's analysis explaining that all existing tags in the repository were moved to an imposter commit containing credential-exfiltration code.","category":"","primary":false}],"body":"\u003cp\u003eThreat actors compromised the popular GitHub Actions workflow \u003cstrong\u003eactions-cool/issues-helper\u003c/strong\u003e to execute malicious code that harvests sensitive credentials and exfiltrates them to an attacker-controlled server. StepSecurity researcher Varun Sharma said every existing tag in the repository was moved to point to an imposter commit outside the action’s normal commit history. The attack is significant because workflows referencing the action by version would pull the malicious code on their next run.\u003c/p\u003e\n\n\u003cp\u003eThe imposter commit contains code that downloads the Bun JavaScript runtime, reads memory from the Runner.Worker process to extract credentials, and sends the stolen data to \u003cstrong\u003et.m-kosche[.]com\u003c/strong\u003e. StepSecurity also said 15 tags associated with a second GitHub action, \u003cstrong\u003eactions-cool/maintain-one-comment\u003c/strong\u003e, were compromised with the same functionality. GitHub has disabled access to the maintain-one-comment repository due to a violation of its terms of service.\u003c/p\u003e\n\n\u003cp\u003eThe article notes that the same exfiltration domain was observed in the latest wave of the Mini Shai-Hulud campaign targeting npm packages from the \u003cstrong\u003e@antv\u003c/strong\u003e ecosystem. StepSecurity said only workflows pinned to a known-good full commit SHA are unaffected. Workflows using compromised version tags may execute the credential-stealing code.\u003c/p\u003e\n"},{"n":22,"title":"Compromised Nx Console 18.95.0 Targeted VS Code Developers with Credential Stealer","source":"thehackernews.com","sourceColor":"#fb923c","link":"https://thehackernews.com/2026/05/compromised-nx-console-18950-targeted.html","time":"07:49","priority":"MUST READ","score":94,"tldr":"A compromised Nx Console VS Code extension version 18.95.0 briefly delivered credential-stealing malware to developers, harvesting secrets from tools like 1Password, GitHub, npm, AWS, and Claude Code. Anyone who installed it during the exposure window should update immediately, remove listed artifacts, kill suspicious processes, and rotate all credentials from the affected machine.","briefOverview":"\u003cp\u003eCybersecurity researchers flagged a compromised version of the Nx Console extension published to the Microsoft Visual Studio Code Marketplace. The affected extension was rwl.angular-console version 18.95.0, a popular UI and plugin for VS Code, Cursor, and JetBrains with more than 2.2 million VS Code installations. The Open VSX version was not affected.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity said the compromised extension fetched and executed a 498 KB obfuscated payload from a dangling orphan commit inside the official nrwl/nx GitHub repository within seconds of a developer opening any workspace. The payload was described as a multi-stage credential stealer and supply chain poisoning tool that exfiltrated secrets via HTTPS, the GitHub API, and DNS tunneling. It also installed a Python backdoor on macOS systems using the GitHub Search API as a dead drop resolver.\u003c/p\u003e\n\n\u003cp\u003eNx maintainers said the root cause was a developer machine compromise that leaked GitHub credentials, which were then used to push the malicious orphaned commit. The exposure window for version 18.95.0 was May 18, 2026, from 2:36 p.m. to 2:47 p.m. CEST, and the maintainers said a few users were compromised. Users were urged to update to version 18.100.0 or later, remove listed artifacts, terminate suspicious processes, and rotate all credentials reachable from the affected machine.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eCybersecurity researchers reported that Nx Console extension rwl.angular-console version 18.95.0 on the Microsoft Visual Studio Code Marketplace was compromised. The extension is used as a user interface and plugin for code editors including VS Code, Cursor, and JetBrains, and the VS Code extension has more than 2.2 million installations. The article states that the Open VSX version was not affected by the incident.\u003c/p\u003e\n\n\u003cp\u003eAccording to StepSecurity researcher Ashish Kurmi, the compromised extension silently fetched and executed a 498 KB obfuscated payload from a dangling orphan commit hidden inside the official nrwl/nx GitHub repository. This activity occurred within seconds of a developer opening any workspace. The malicious action installed the Bun JavaScript runtime to run an obfuscated index.js payload.\u003c/p\u003e\n\n\u003cp\u003eThe payload was described as a multi-stage credential stealer and supply chain poisoning tool. It harvested developer secrets and exfiltrated them via HTTPS, the GitHub API, and DNS tunneling. It retrieved secrets from 1Password vaults, Anthropic Claude Code configurations, and credentials associated with npm, GitHub, and Amazon Web Services.\u003c/p\u003e\n\n\u003cp\u003eThe malware included checks to avoid infecting machines likely located in Russian or CIS time zones and launched itself as a detached background process. On macOS systems, it installed a Python backdoor that abused the GitHub Search API as a dead drop resolver for receiving additional commands. StepSecurity also highlighted that the payload contained Sigstore integration, including Fulcio certificate issuance and SLSA provenance generation.\u003c/p\u003e\n\n\u003cp\u003eNx maintainers said the root cause was one developer’s machine being compromised in a recent incident that leaked GitHub credentials. Those credentials were abused to push an orphaned, unsigned commit to nrwl/nx that introduced the stealer malware, and the developer’s credentials were temporarily revoked. The maintainers said a few users were compromised and identified the exposure window as May 18, 2026, from 2:36 p.m. to 2:47 p.m. CEST.\u003c/p\u003e\n\n\u003cp\u003eAffected users were advised to update to Nx Console version 18.100.0 or later. The maintainers also published indicators of compromise, including specific files, a Python process running cat.py, and a process with __DAEMONIZED=1 in its environment. Users were recommended to terminate those processes, delete disk artifacts, and rotate all credentials reachable from the affected machine, including tokens, secrets, and SSH keys.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eCybersecurity researchers flagged a compromised version of the Nx Console extension that was published to the Microsoft Visual Studio Code Marketplace. The affected extension was rwl.angular-console version 18.95.0, which is described as a popular user interface and plugin for code editors such as VS Code, Cursor, and JetBrains. The VS Code extension has more than 2.2 million installations.\u003c/p\u003e\n\n\u003cp\u003eThe article states that the Open VSX version of the extension was not affected by the incident. The compromise specifically involved the VS Code Marketplace distribution of Nx Console version 18.95.0.\u003c/p\u003e\n\n\u003ch2 id=\"how-the-compromise-worked\"\u003eHow the Compromise Worked\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity researcher Ashish Kurmi said that within seconds of a developer opening any workspace, the compromised extension silently fetched and executed a 498 KB obfuscated payload. The payload was retrieved from a dangling orphan commit hidden inside the official nrwl/nx GitHub repository.\u003c/p\u003e\n\n\u003cp\u003eThe malicious action was triggered as soon as a developer opened any workspace in VS Code. It led to the installation of the Bun JavaScript runtime, which was used to run an obfuscated index.js payload.\u003c/p\u003e\n\n\u003cp\u003eNx maintainers said the root cause was traced to one of the extension’s developers, whose machine had been compromised in a recent security incident that leaked GitHub credentials. The article says the nature of that prior incident was not disclosed. The developer’s credentials were temporarily revoked.\u003c/p\u003e\n\n\u003cp\u003eAccording to the maintainers, the leaked credentials were abused to push an orphaned, unsigned commit to nrwl/nx. That commit introduced the stealer malware.\u003c/p\u003e\n\n\u003ch2 id=\"malware-capabilities\"\u003eMalware Capabilities\u003c/h2\u003e\n\n\u003cp\u003eThe payload was described as a multi-stage credential stealer and supply chain poisoning tool. It harvested developer secrets and exfiltrated them using multiple channels, including HTTPS, the GitHub API, and DNS tunneling.\u003c/p\u003e\n\n\u003cp\u003eThe malware retrieved secrets from several developer environments and tools, including:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e1Password vaults.\u003c/li\u003e\n\u003cli\u003eAnthropic Claude Code configurations.\u003c/li\u003e\n\u003cli\u003enpm-related secrets.\u003c/li\u003e\n\u003cli\u003eGitHub-related secrets.\u003c/li\u003e\n\u003cli\u003eAmazon Web Services credentials.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe malware also performed checks to avoid infecting machines likely located in Russian or CIS time zones. It launched itself as a detached background process to begin credential harvesting.\u003c/p\u003e\n\n\u003cp\u003eOn macOS systems, the payload installed a Python backdoor. The article says this backdoor abused the GitHub Search API as a dead drop resolver for receiving further commands.\u003c/p\u003e\n\n\u003ch2 id=\"supply-chain-poisoning-risk\"\u003eSupply Chain Poisoning Risk\u003c/h2\u003e\n\n\u003cp\u003eStepSecurity highlighted that one capability stood out: the payload contained full Sigstore integration. This included Fulcio certificate issuance and SLSA provenance generation.\u003c/p\u003e\n\n\u003cp\u003eStepSecurity said that, combined with stolen npm OIDC tokens, this could allow the attacker to publish downstream npm packages with valid, cryptographically signed provenance attestations. The article states that this would make malicious packages appear as legitimate, verified builds.\u003c/p\u003e\n\n\u003ch2 id=\"exposure-window-and-indicators-of-compromise\"\u003eExposure Window and Indicators of Compromise\u003c/h2\u003e\n\n\u003cp\u003eThe Nx team said a few users were compromised as a result of the breach. Users were urged to update to version 18.100.0 or later.\u003c/p\u003e\n\n\u003cp\u003eThe maintainers published the following indicators of compromise:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eNx Console version 18.95.0 was installed during the exposure window between May 18, 2026, at 2:36 p.m. CEST and 2:47 p.m. CEST.\u003c/li\u003e\n\u003cli\u003ePresence of files such as ~/.local/share/kitty/cat.py, ~/Library/LaunchAgents/com.user.kitty-monitor.plist, /var/tmp/.gh_update_state, or /tmp/kitty-*.\u003c/li\u003e\n\u003cli\u003ePresence of a Python process running cat.py.\u003c/li\u003e\n\u003cli\u003ePresence of a process with __DAEMONIZED=1 in its environment.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eAffected users were recommended to terminate the listed processes, delete artifacts on disk, and rotate all credentials reachable from the affected machine. The article specifically mentions tokens, secrets, and SSH keys.\u003c/p\u003e\n\n\u003ch2 id=\"response-and-mitigation\"\u003eResponse and Mitigation\u003c/h2\u003e\n\n\u003cp\u003eThe maintainers advised users to update to Nx Console 18.100.0 or later. They also recommended removing artifacts from disk and terminating suspicious running processes associated with the indicators of compromise.\u003c/p\u003e\n\n\u003cp\u003eUsers whose machines may have been affected were told to rotate all credentials reachable from the affected system. This included tokens, secrets, and SSH keys.\u003c/p\u003e\n\n\u003ch2 id=\"relationship-to-prior-nx-ecosystem-targeting\"\u003eRelationship to Prior Nx Ecosystem Targeting\u003c/h2\u003e\n\n\u003cp\u003eThe article notes that this was the second time the Nx ecosystem had been targeted within a year. In August 2025, several npm packages were infected by a credential stealer as part of a supply chain attack campaign named s1ngularity.\u003c/p\u003e\n\n\u003cp\u003eThe article distinguishes the latest incident from the previous one by stating that the earlier attack involved npm packages, while the latest attack targeted the VS Code extension.\u003c/p\u003e\n\n\u003ch2 id=\"other-malicious-package-findings-mentioned\"\u003eOther Malicious Package Findings Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe article also lists several other malicious package findings in open-source repositories. These include five npm packages containing a hidden ELF binary that backdoored Claude Code sessions to steal developer credentials, a malicious noon-contracts package impersonating a Noon Protocol smart contract SDK, and a trojanized martinez-polygon-clipping fork that downloaded a Windows RAT using Telegram for command-and-control.\u003c/p\u003e\n\n\u003cp\u003eOther packages mentioned include common-tg-service, which contained functionality to take over a victim’s Telegram account, and exiouss, which bundled a ChatGPT and OpenAI session cookie stealer targeting browsers such as Google Chrome, Microsoft Edge, and Brave. The article also cites k8s-pod-checker, dev-env-setup, and node-perf-utils as part of the kube-health-tools cluster that installs a large language model proxy service on the victim’s machine.\u003c/p\u003e\n\n\u003cp\u003eThe article further mentions a coordinated credential harvesting campaign using 38 npm packages and dependency confusion to target CI/CD pipelines associated with companies such as Apple, Google, and Alibaba. It also describes seven npm packages under the @hd-team organization that acted as stagers for configurations used by the Chinese sports gambling and pirated streaming
