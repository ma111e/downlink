mmonly used by backend engineers, SREs, platform teams, AI and machine-learning developers, open-source maintainers, security researchers, and DevOps teams. These machines may hold npm and PyPI publishing tokens, SSH keys, GitHub credentials, and CI/CD access.\u003c/p\u003e\n\n\u003cp\u003eThe Linux release includes detection coverage for AI coding agents, AI CLI tools, IDE extensions, JetBrains IDEs, MCP server configurations, npm packages, Linux system packages, local frameworks, processes, shell tooling, and device inventory. It uses native Linux mechanisms such as /opt/, .desktop entries, $PATH lookups, BIOS serial number device identity, systemd user timers, and package-manager-native queries. Community mode runs locally, while Enterprise mode reports scan results to StepSecurity for centralized visibility, policy enforcement, alerting, reporting, and incident triage.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eDev Machine Guard now supports Linux natively, extending the product beyond the macOS and Windows builds already in use. The article presents the release as a way to cover every developer machine in a fleet with the same scanning engine. Linux users can install either a .deb or .rpm package and connect it to their tenant so the machines appear in the same dashboard as macOS and Windows devices.\u003c/p\u003e\n\n\u003cp\u003eThe article frames Linux coverage as important because Linux is widely used by developers who may have access to production-related systems. It specifically names backend engineers, SREs, platform teams, AI and machine-learning developers, open-source maintainers, security researchers, and DevOps teams. The article says these machines can hold npm and PyPI publishing tokens, SSH keys into production, GitHub credentials with elevated scopes, and direct access to CI/CD systems.\u003c/p\u003e\n\n\u003cp\u003eThe release is tied to recent supply chain incidents tracked by the company’s research team. The article cites the Shai-Hulud npm worm, the s1ngularity Nx compromise, and the Mini Shai-Hulud wave affecting TanStack and other npm packages. It says a recurring follow-up question in these incidents was which developer machines currently had an affected package, extension, or agent installed.\u003c/p\u003e\n\n\u003cp\u003eTechnically, the release supports Linux on AMD64 as both .deb and .rpm packages. The article says the release artifacts are signed with Sigstore and include build provenance attestations. Coverage includes AI coding agents, AI CLI tools, IDE extensions from VS Code Marketplace and OpenVSX, JetBrains IDEs, MCP server configurations, npm packages, Linux system packages, local frameworks, processes, shell tooling, and device inventory.\u003c/p\u003e\n\n\u003cp\u003eDev Machine Guard uses native Linux mechanisms rather than trying to emulate macOS behavior. Application discovery uses /opt/, /usr/share/*.desktop entries, and $PATH lookups, while device identity is derived from the BIOS serial number. Scheduled scanning uses a systemd user timer under the developer’s account, and package detection uses native manager queries such as rpm -qa, snap list, and flatpak list.\u003c/p\u003e\n\n\u003cp\u003eThe article distinguishes between Community and Enterprise modes. Community mode runs locally and produces JSON or HTML reports without sending data anywhere. Enterprise mode reports scan results to the StepSecurity backend for centralized visibility, policy enforcement, alerting, historical reporting, and incident triage across the fleet.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eDev Machine Guard now runs natively on Linux. The article presents this as an extension of the existing macOS and Windows builds, with the same scanning engine now covering every developer machine in an organization’s fleet. Existing Dev Machine Guard users are told there is nothing new to learn: they can install a .deb or .rpm package, point it at their tenant, and Linux developers will appear in the dashboard with everyone else.\u003c/p\u003e\n\n\u003cp\u003eThe release is positioned as closing a visibility gap in mixed developer fleets. Before this release, the article says macOS and Windows developer machines could be inventoried by Dev Machine Guard, while Linux machines were covered only by partial scripts or not covered at all. The article states that this gap matters during supply chain incidents, when teams need to quickly determine which developers have a compromised package or extension installed.\u003c/p\u003e\n\n\u003ch2 id=\"why-linux-coverage-matters\"\u003eWhy Linux Coverage Matters\u003c/h2\u003e\n\n\u003cp\u003eThe article describes Linux as the operating system of choice for several developer groups that are likely to hold production-related access. These groups include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eBackend engineers, SREs, and platform teams running staging environments locally.\u003c/li\u003e\n\u003cli\u003eAI and machine-learning developers who need GPU access and CUDA toolchains.\u003c/li\u003e\n\u003cli\u003eOpen-source maintainers shipping packages used by millions of downstream projects.\u003c/li\u003e\n\u003cli\u003eSecurity researchers and DevOps teams working in production-mirrored environments.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says these are exactly the developer machines an attacker most wants to compromise. It lists sensitive material that may be present on such machines, including publishing tokens for npm and PyPI, SSH keys into production, GitHub credentials with elevated scopes, and direct access to CI/CD systems. It also states that Linux developer machines have often been the least-monitored part of the fleet for many organizations.\u003c/p\u003e\n\n\u003ch2 id=\"incidents-referenced-as-motivation\"\u003eIncidents Referenced as Motivation\u003c/h2\u003e\n\n\u003cp\u003eThe article says Dev Machine Guard exists because supply chain attacks against developer machines are no longer hypothetical. It states that the company’s research team tracked several incidents in the last twelve months.\u003c/p\u003e\n\n\u003cp\u003eThe incidents named in the article are:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eThe Shai-Hulud npm worm campaign, described as compromising more than 500 packages, earning a CISA advisory, and propagating through CI/CD pipelines and developer environments.\u003c/li\u003e\n\u003cli\u003eThe s1ngularity Nx compromise, described as weaponizing AI CLI tools on developer machines, most of them Linux and macOS, to exfiltrate credentials.\u003c/li\u003e\n\u003cli\u003eThe Mini Shai-Hulud wave affecting TanStack and other widely used npm packages, including OIDC token theft from GitHub Actions runners.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says that in each incident, the hardest follow-up question was which developer machines in the organization had the affected package, extension, or agent installed at that moment. It states that Dev Machine Guard already answered that question on macOS and Windows in one query, and that Linux support now enables the same answer across the entire fleet from the same dashboard.\u003c/p\u003e\n\n\u003ch2 id=\"platform-support-and-release-artifacts\"\u003ePlatform Support and Release Artifacts\u003c/h2\u003e\n\n\u003cp\u003eThe Linux release supports Linux on AMD64, also referred to as x86_64. It ships as both .deb and .rpm packages. The article says it has been tested on Debian and RPM-based distributions.\u003c/p\u003e\n\n\u003cp\u003eThe article also states that all release artifacts are signed with Sigstore. It says build provenance attestations are included.\u003c/p\u003e\n\n\u003ch2 id=\"detection-coverage\"\u003eDetection Coverage\u003c/h2\u003e\n\n\u003cp\u003eThe release includes coverage across developer tools, packages, system packages, and device inventory. The article lists the following coverage areas:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eAI coding agents installed on the machine, including Claude, Cursor, GitHub Copilot, and Codex.\u003c/li\u003e\n\u003cli\u003eAI CLI tools running on the machine.\u003c/li\u003e\n\u003cli\u003eIDE extensions from both the VS Code Marketplace and the OpenVSX registry, across VS Code, Cursor, Windsurf, and JetBrains products.\u003c/li\u003e\n\u003cli\u003eJetBrains IDEs, including IntelliJ IDEA, PyCharm, GoLand, WebStorm, RubyMine, CLion, Rider, PhpStorm, DataGrip, RustRover, Aqua, DataSpell, and AppCode.\u003c/li\u003e\n\u003cli\u003eMCP server configurations across supported agents.\u003c/li\u003e\n\u003cli\u003enpm packages, both globally installed and per-project.\u003c/li\u003e\n\u003cli\u003eLinux system packages, including rpm, dpkg, pacman, apk, snap, and flatpak.\u003c/li\u003e\n\u003cli\u003eLocal frameworks, processes, and shell tooling.\u003c/li\u003e\n\u003cli\u003eDevice inventory, including hostname, distribution and kernel version, and BIOS serial number.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThis coverage is presented as part of the same scanning engine that already runs on macOS and Windows.\u003c/p\u003e\n\n\u003ch2 id=\"how-linux-detection-works\"\u003eHow Linux Detection Works\u003c/h2\u003e\n\n\u003cp\u003eThe article says Dev Machine Guard uses native Linux mechanisms instead of trying to emulate macOS conventions. Application discovery uses /opt/, /usr/share/*.desktop entries, and $PATH lookups. Device identity is derived from the BIOS serial number, because Linux does not expose a macOS-style hardware serial.\u003c/p\u003e\n\n\u003cp\u003eScheduled scanning uses a systemd user timer installed under the developer’s own user account. The article emphasizes that this means no root daemon, no system-wide service, and no manual unit-file editing. Package detection uses native package-manager queries, including rpm -qa for RPM, snap list for Snap, and flatpak list for Flatpak.\u003c/p\u003e\n\n\u003ch2 id=\"modes-of-operation\"\u003eModes of Operation\u003c/h2\u003e\n\n\u003cp\u003eThe article describes two modes: Community mode and Enterprise mode.\u003c/p\u003e\n\n\u003cp\u003eCommunity mode runs fully locally, with nothing leaving the machine. It is intended for individual developers and open-source maintainers. The article says the open-source binary is free and produces a JSON or HTML report of everything installed on the machine.\u003c/p\u003e\n\n\u003cp\u003eEnterprise mode reports scan results to the StepSecurity backend. The article says this enables centralized visibility, policy enforcement, historical reporting, and incident triage. It also states that the tier model is identical to macOS and Windows.\u003c/p\u003e\n\n\u003ch2 id=\"enterprise-features\"\u003eEnterprise Features\u003c/h2\u003e\n\n\u003cp\u003eFor organizations rolling out across a Linux developer fleet, the Enterprise Tier adds several capabilities:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eCentralized dashboard with per-device drill-down.\u003c/li\u003e\n\u003cli\u003ePolicy enforcement for IDE extensions, MCP servers, AI agents, and packages.\u003c/li\u003e\n\u003cli\u003eCooldown periods on newly published npm and PyPI packages.\u003c/li\u003e\n\u003cli\u003eAlerting on compromised dependencies, malicious extensions, and unapproved MCP servers.\u003c/li\u003e\n\u003cli\u003eHistorical reporting and incident triage across the entire fleet.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article includes a link to start a free trial for the Enterprise Tier.\u003c/p\u003e\n\n\u003ch2 id=\"deployment-and-access\"\u003eDeployment and Access\u003c/h2\u003e\n\n\u003cp\u003eThe article points readers to installation script documentation for rollout guidance. It says Linux users can install a .deb or .rpm and connect the installation to their tenant. It also links to the GitHub repository for the open-source Dev Machine Guard project, including detection logic.\u003c/p\u003e\n\n\u003cp\u003eFor issues or detection suggestions, the article asks users to open an issue in the project’s GitHub repository.\u003c/p\u003e\n\n\u003ch2 id=\"impact-stated-in-the-article\"\u003eImpact Stated in the Article\u003c/h2\u003e\n\n\u003cp\u003eThe core impact described in the article is that Dev Machine Guard now provides one engine across macOS, Windows, and Linux. The same detections can be added once and benefit every platform. The same policies can apply across the fleet from one dashboard.\u003c/p\u003e\n\n\u003cp\u003eThe article positions the Linux release as the version that closes the gap for organizations waiting to roll out Dev Machine Guard across their full developer organization. It specifically connects that gap to supply chain incident response, where security teams need to know quickly which developer machines have affected packages, extensions, or agents installed.\u003c/p\u003e\n","keyPoints":["Dev Machine Guard now runs natively on Linux, adding Linux coverage to the existing macOS and Windows builds with the same scanning engine.","The Linux release is intended to close a visibility gap for security teams managing mixed developer fleets, especially during supply chain incidents involving compromised packages, extensions, or agents.","The release supports Linux on AMD64 as .deb and .rpm packages, with signed release artifacts and build provenance attestations.","Dev Machine Guard on Linux detects AI coding agents, AI CLI tools, IDE extensions, JetBrains IDEs, MCP server configurations, npm packages, Linux system packages, local frameworks, processes, shell tooling, and device inventory.","Enterprise mode reports Linux scan results to the StepSecurity backend for centralized visibility, policy enforcement, alerting, historical reporting, and incident triage."],"insights":["Linux developer machines are highlighted as especially high-value targets because they often belong to backend engineers, SREs, platform teams, AI developers, open-source maintainers, and security teams that may hold production credentials, publishing tokens, or CI/CD access.","The article identifies the fastest incident-response question as determining which developer machines currently have a compromised package, extension, or agent installed, and positions Linux support as enabling that query across the full fleet.","Dev Machine Guard’s Linux implementation avoids a root daemon by using a systemd user timer under the developer’s own account, which is an actionable deployment detail for organizations concerned about agent privileges.","The release explicitly covers AI-specific attack surfaces such as AI coding agents, AI CLI tools, and MCP server configurations, reflecting incidents where developer-side AI tooling was abused to exfiltrate credentials.","Community mode can be used by individual developers and open-source maintainers to generate local JSON or HTML inventory reports without sending data off the machine."],"referencedReports":[],"body":"\u003cp\u003eDev Machine Guard now runs natively on Linux, adding Linux support to the existing macOS and Windows builds. The article says the same scanning engine now covers every developer machine in a fleet. Existing users can install a .deb or .rpm package, point it at their tenant, and see Linux developers appear in the dashboard alongside other devices.\u003c/p\u003e\n\n\u003cp\u003eThe significance of the release is that Linux developer machines are described as a previous visibility gap for mixed fleets. The article emphasizes that Linux is commonly used by backend engineers, SREs, platform teams, AI and machine-learning developers, open-source maintainers, security researchers, and DevOps teams. These machines may hold npm and PyPI publishing tokens, SSH keys, GitHub credentials, and CI/CD access.\u003c/p\u003e\n\n\u003cp\u003eThe Linux release includes detection coverage for AI coding agents, AI CLI tools, IDE extensions, JetBrains IDEs, MCP server configurations, npm packages, Linux system packages, local frameworks, processes, shell tooling, and device inventory. It uses native Linux mechanisms such as /opt/, .desktop entries, $PATH lookups, BIOS serial number device identity, systemd user timers, and package-manager-native queries. Community mode runs locally, while Enterprise mode reports scan results to StepSecurity for centralized visibility, policy enforcement, alerting, reporting, and incident triage.\u003c/p\u003e\n"}];

<script type="text/babel">

const ARTICLES_RAW = window.__DL_ARTICLES;
const DIGEST_HREF  = window.__DL_DIGEST;
const TIME_WINDOW  = window.__DL_WINDOW;
const ARCHIVE_HREF = "index.html";

const PRIORITY_ORDER = { "MUST READ": 0, "SHOULD READ": 1, "MAY READ": 2 };

const ARTICLES = [...ARTICLES_RAW].sort((a, b) => {
  const p = PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
  return p !== 0 ? p : b.score - a.score;
});

function priorityColor(p) {
  if (p === "MUST READ")   return "var(--must)";
  if (p === "SHOULD READ") return "var(--should)";
  return "var(--may)";
}
function priorityShort(p) {
  return p === "MUST READ" ? "MUST" : p === "SHOULD READ" ? "SHOULD" : "MAY";
}

function swipeHrefForDigest(filename) {
  return String(filename || "").replace(/^downlink-digest-/, "downlink-swipe-");
}

function digestBasename(href) {
  return String(href || "").split("/").pop();
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", padding:24 }}>
        <div style={{ background:"var(--surface)", border:"1px solid var(--border)", borderRadius:8, padding:"40px 32px", maxWidth:480, textAlign:"center" }}>
          <div style={{ fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:"var(--discard)", letterSpacing:"0.18em", marginBottom:12 }}>// RENDER ERROR</div>
          <p style={{ color:"var(--text2)", fontSize:13 }}>{String(this.state.error)}</p>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function PriorityBadge({ priority }) {
  const color = priorityColor(priority);
  return (
    <span style={{
      fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", color,
      border: "1px solid color-mix(in oklch, " + color + " 45%, transparent)",
      background: "color-mix(in oklch, " + color + " 12%, transparent)",
      padding: "2px 8px", borderRadius: 2, whiteSpace: "nowrap"
    }}>
      {priorityShort(priority)}
    </span>
  );
}

function ScoreBar({ score }) {
  const color = score >= 90 ? "var(--must)" : score >= 75 ? "var(--should)" : "var(--text3)";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
      <div style={{ width: 38, height: 3, background: "var(--border2)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: score + "%", background: color }} />
      </div>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color, minWidth: 22, textAlign: "right" }}>{score}</span>
    </div>
  );
}

function htmlPanel(value) {
  return { __html: value || "" };
}

function pointList(items) {
  return (
    <ul className="kp-list">
      {(items || []).map((item, i) => <li key={i}>{item}</li>)}
    </ul>
  );
}

function ReportsPanel({ reports }) {
  return (
    <ul className="report-list">
      {(reports || []).map((report, i) => (
        <li className="report-item" key={i}>
          <div className="report-title">
            <a href={report.url} target="_blank" rel="noopener noreferrer">{report.title || report.url}</a>
          </div>
          {report.publisher && <div className="report-meta">{report.publisher}</div>}
          {report.context && <div className="report-context">{report.context}</div>}
        </li>
      ))}
    </ul>
  );
}

function AnalysisTabs({ article }) {
  const tabs = [];
  if (article.tldr) tabs.push({ id: "tldr", label: "TL;DR", render: () => <div className="prose">{article.tldr}</div> });
  if (article.briefOverview) tabs.push({ id: "brief", label: "Brief", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.briefOverview)} /> });
  if (article.standardSynthesis) tabs.push({ id: "standard", label: "Standard", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.standardSynthesis)} /> });
  if (article.comprehensiveSynthesis) tabs.push({ id: "comprehensive", label: "Full", render: () => <div className="prose" dangerouslySetInnerHTML={htmlPanel(article.comprehensiveSynthesis)} /> });
  if (article.keyPoints && article.keyPoints.length > 0) tabs.push({ id: "keypoints", label: "Key Points", render: () => pointList(article.keyPoints) });
  if (article.insights && article.insights.length > 0) tabs.push({ id: "insights", label: "Insights", render: () => pointList(article.insights) });
  if (article.referencedReports && article.referencedReports.length > 0) tabs.push({ id: "reports", label: "Reports", render: () => <ReportsPanel reports={article.referencedReports} /> });

  const initialTab = tabs[0] ? tabs[0].id : "source";
  const [activeTab, setActiveTab] = React.useState(initialTab);
  React.useEffect(() => setActiveTab(initialTab), [article.n, initialTab]);

  if (tabs.length === 0) {
    const fallbackHTML = htmlPanel(article.body);
    return (
      <div className="tab-panel">
        {article.body ? <div className="prose" dangerouslySetInnerHTML={fallbackHTML} /> : <div className="prose">No analysis text is available for this article.</div>}
      </div>
    );
  }

  const active = tabs.find(tab => tab.id === activeTab) || tabs[0];
  const rightTabIds = new Set(["keypoints", "insights", "reports"]);
  const leftTabs  = tabs.filter(t => !rightTabIds.has(t.id));
  const rightTabs = tabs.filter(t =>  rightTabIds.has(t.id));
  const renderTabBtn = tab => (
    <button key={tab.id} type="button" className={"tab-btn" + (tab.id === active.id ? " active" : "")} onClick={() => setActiveTab(tab.id)}>
      {tab.label}
    </button>
  );
  return (
    <>
      <div className="tabs">
        {leftTabs.map(renderTabBtn)}
        {rightTabs.length > 0 && <span style={{ flex: 1 }} />}
        {rightTabs.map(renderTabBtn)}
      </div>
      <div className="tab-panel">{active.render()}</div>
    </>
  );
}

function Nav({ index, total }) {
  const [time, setTime] = React.useState(() => new Date().toTimeString().slice(0, 8));
  const [theme, setTheme] = React.useState(() => document.documentElement.dataset.theme === 'light' ? 'light' : 'dark');
  React.useEffect(() => {
    const iv = setInterval(() => setTime(new Date().toTimeString().slice(0, 8)), 1000);
    return () => clearInterval(iv);
  }, []);
  const toggleTheme = () => {
    const next = theme === 'light' ? 'dark' : 'light';
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem('downlink.theme', next); } catch(e){}
    setTheme(next);
  };
  return (
    <nav style={{
      position: "sticky", top: 0, zIndex: 100,
      background: "color-mix(in oklch, var(--bg) 90%, transparent)", backdropFilter: "blur(16px)",
      borderBottom: "1px solid var(--border)", padding: "0 24px", height: 56,
      display: "flex", alignItems: "center", justifyContent: "space-between"
    }}>
      <a href="index.html" style={{ display: "flex", alignItems: "center", gap: 0, textDecoration: "none" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--text)" }}>DOWN</span>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: "0.14em", color: "var(--cyan)" }}>LINK</span>
        <span style={{
          marginLeft: 10, fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "var(--cyan)",
          letterSpacing: "0.1em", border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)",
          background: "color-mix(in oklch, var(--cyan) 7%, transparent)", padding: "1px 6px", borderRadius: 2
        }}>TRIAGE</span>
      </a>
      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--text2)", letterSpacing: "0.06em" }}>{time}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 10px", borderRadius: 2, whiteSpace: "nowrap"
        }}>
          {Math.min(index + 1, total)} / {total}
        </div>
        <button type="button" onClick={toggleTheme} title="Toggle light/dark theme" aria-label="Toggle light/dark theme" style={{
          fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, lineHeight: 1, color: "var(--text2)",
          border: "1px solid var(--border2)", background: "var(--surface)", padding: "3px 8px", borderRadius: 2,
          cursor: "pointer", appearance: "none", WebkitAppearance: "none"
        }}>
          {theme === 'light' ? '☾' : '☀'}
        </button>
      </div>
    </nav>
  );
}

function CardFront({ article }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid var(--border)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor, letterSpacing: "0.04em" }}>
              {article.source}
            </span>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>

            <PriorityBadge priority={article.priority} />

      </div>

        {article.keyPoints && article.keyPoints.length > 0 && (

                <li key={i} style={{ display: "grid", gridTemplateColumns: "14px 1fr", gap: 8, alignItems: "start" }}>

            </ul>
          </div>

      </div>
      <div style={{ padding: "14px 24px", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--surface2)" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>{article.time}</span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

function CardBack({ article, onBack }) {
  const srcColor  = article.sourceColor;
  const priorityC = priorityColor(article.priority);
  return (
    <>
      <div style={{ height: 4, background: priorityC }} />
      <div style={{ padding: "16px 24px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text2)", letterSpacing: "0.08em", display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 14 }}>&#8592;</span> BACK
        </button>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <PriorityBadge priority={article.priority} />
        </div>
      </div>
      <div className="detail-scroll" style={{ padding: "20px 24px", flex: 1 }}>
        <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 18, lineHeight: 1.35, color: "var(--text)", marginBottom: 12 }}>
          {article.title}
        </h2>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 18, flexWrap: "wrap" }}>
          <span style={{ width: 5, height: 5, borderRadius: "50%", background: srcColor, display: "inline-block" }} />
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: srcColor }}>{article.source}</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>&#183;</span>
          <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)" }}>{article.time}</span>
        </div>
        <AnalysisTabs article={article} />
        <a href={article.link} target="_blank" rel="noopener noreferrer"
          style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", textDecoration: "none",
            letterSpacing: "0.08em", padding: "6px 12px",
            border: "1px solid color-mix(in oklch, var(--cyan) 30%, transparent)", borderRadius: 2, display: "inline-block", marginTop: 18 }}>
          OPEN SOURCE &#8599;
        </a>
      </div>
      <div style={{ padding: "12px 24px", borderTop: "1px solid var(--border)", background: "var(--surface2)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
          ART · {String(article.n).padStart(2, "0")}
        </span>
        <ScoreBar score={article.score} />
      </div>
    </>
  );
}

// Renders the dismissed card flying off-screen as a non-interactive overlay.
// App mounts this immediately when dismiss is triggered, then unmounts after ~420ms.
function FlyingCard({ article, startDx, startDy }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = `translate(${startDx}px, ${startDy * 0.4}px) rotate(${startDx * 0.05}deg)`;
    el.style.opacity = "1";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.38s cubic-bezier(.4,0,.6,1), opacity 0.38s";
    el.style.transform = `translate(-140%, ${startDy * 1.5}px) rotate(-22deg)`;
    el.style.opacity = "0";
  }, []);
  return (
    <div ref={ref} className="swipe-card" style={{ zIndex: 200, pointerEvents: "none" }}>
      <CardFront article={article} />
    </div>
  );
}

function SwipeCard({ article, isTop, depth, onDismiss, onFlipChange }) {
  const [dragging, setDragging] = React.useState(false);
  const [flipped, setFlipped]   = React.useState(false);

  const cardRef    = React.useRef(null);
  const skipRef    = React.useRef(null);
  const readRef    = React.useRef(null);
  const rafRef     = React.useRef(null);
  const dxRef      = React.useRef(0);
  const dyRef      = React.useRef(0);
  const velRef     = React.useRef({ x: 0, ts: 0 });
  const startRef   = React.useRef({ x: 0, y: 0, pointerId: null, target: null });
  const dirRef     = React.useRef(null);
  // True once this card has been in a depth slot; triggers promote animation on next isTop=true.
  const wasDepthRef = React.useRef(!isTop);

  // Promote animation: smoothly rise from depth=1 position when becoming top card.
  React.useEffect(() => {
    if (!isTop) { wasDepthRef.current = true; return; }
    if (!wasDepthRef.current) return;
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "none";
    el.style.transform = "translateY(8px) scale(0.96)";
    el.getBoundingClientRect();
    el.style.transition = "transform 0.35s cubic-bezier(0.2,0.9,0.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    const t = setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 380);
    return () => clearTimeout(t);
  }, [isTop]);

  // Expose flip trigger + notify parent of flip state.
  React.useEffect(() => {
    if (isTop) {
      if (!flipped) window.__downlinkFlipTop = () => setFlipped(true);
      if (onFlipChange) onFlipChange(flipped);
    }
    return () => { if (isTop) window.__downlinkFlipTop = null; };
  }, [isTop, flipped]);

  const applyDragTransform = (dx, dy) => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${dx * 0.05}deg)`;
    if (skipRef.current) skipRef.current.style.opacity = dx < 0 ? Math.min(1, -dx / 100) : 0;
    if (readRef.current) readRef.current.style.opacity = dx > 0 ? Math.min(1, dx / 100) : 0;
  };

  const resetStamps = () => {
    if (skipRef.current) skipRef.current.style.opacity = "0";
    if (readRef.current) readRef.current.style.opacity = "0";
  };

  const snapBack = () => {
    const el = cardRef.current;
    if (!el) return;
    el.style.transition = "transform 0.32s cubic-bezier(.2,.9,.2,1)";
    el.style.transform = "translate(0,0) rotate(0deg)";
    resetStamps();
    dxRef.current = 0;
    dyRef.current = 0;
    setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 340);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startRef.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, target: e.target };
    velRef.current = { x: 0, ts: performance.now() };
    dirRef.current = null;
  };

  const onPointerMove = (e) => {
    if (startRef.current.pointerId === null) return;
    const rawDx = e.clientX - startRef.current.x;
    const rawDy = e.clientY - startRef.current.y;

    if (dirRef.current === null) {
      if (Math.hypot(rawDx, rawDy) < 8) return;
      dirRef.current = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      if (dirRef.current === 'v') { startRef.current.pointerId = null; return; }
      startRef.current.target?.setPointerCapture?.(startRef.current.pointerId);
      setDragging(true);
    }

    if (dirRef.current !== 'h') return;
    if (flipped && rawDx > 0) return;

    const now = performance.now();
    const dt = now - velRef.current.ts;
    if (dt > 0) velRef.current = { x: (rawDx - dxRef.current) / dt, ts: now };
    dxRef.current = rawDx;
    dyRef.current = flipped ? 0 : rawDy;

    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    rafRef.current = requestAnimationFrame(() => applyDragTransform(dxRef.current, dyRef.current));
  };

  const onPointerUp = () => {
    const wasH = dirRef.current === 'h';
    dirRef.current = null;
    startRef.current.pointerId = null;
    if (!wasH) return;

    setDragging(false);
    if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }

    const dx  = dxRef.current;
    const dy  = dyRef.current;
    const vel = velRef.current.x;
    const DIST_THRESHOLD = 110;
    const VEL_THRESHOLD  = 0.35;

    if (flipped) {
      if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    } else {
      if (vel > VEL_THRESHOLD || dx > DIST_THRESHOLD) {
        // Front continues off to the right and fades out, then the detail view fades in.
        const el = cardRef.current;
        if (el) {
          el.style.transition = "transform 0.32s cubic-bezier(.4,0,.6,1), opacity 0.32s";
          el.style.transform = `translate(140%, ${dy * 1.4}px) rotate(18deg)`;
          el.style.opacity = "0";
        }
        resetStamps();
        setTimeout(() => {
          setFlipped(true);
          dxRef.current = 0;
          dyRef.current = 0;
          const el2 = cardRef.current;
          if (el2) {
            el2.style.transition = "none";
            el2.style.transform = "translate(0,0) rotate(0deg)";
            el2.style.opacity = "0";
            el2.getBoundingClientRect();
            el2.style.transition = "opacity 0.22s ease";
            el2.style.opacity = "1";
            setTimeout(() => { if (cardRef.current) cardRef.current.style.transition = ""; }, 240);
          }
        }, 320);
      } else if (vel < -VEL_THRESHOLD || dx < -DIST_THRESHOLD) {
        resetStamps();
        onDismiss(dx, dy);
      } else {
        snapBack();
      }
    }
  };

  return (
    <div
      ref={cardRef}
      className={"swipe-card" + (!isTop ? " depth-card" : "") + (dragging ? " dragging" : "")}
      style={{
        transform: isTop ? undefined : `translateY(${depth * 8}px) scale(${1 - depth * 0.04})`,
        zIndex: 100 - depth,
        cursor: isTop ? "grab" : "default",
        pointerEvents: isTop ? "auto" : "none",
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      {!flipped ? <CardFront article={article} /> : <CardBack article={article} onBack={() => setFlipped(false)} />}
      <div ref={skipRef} className="stamp skip" style={{ opacity: 0 }}>DONE</div>
      {!flipped && <div ref={readRef} className="stamp read" style={{ opacity: 0 }}>READ</div>}
    </div>
  );
}

function App() {
  const [index, setIndex]           = React.useState(0);
  const [generation, setGeneration] = React.useState(0);
  const [topFlipped, setTopFlipped] = React.useState(false);
  const [flyingCard, setFlyingCard] = React.useState(null);
  const [previousDigestHref, setPreviousDigestHref] = React.useState(null);
  const total     = ARTICLES.length;
  const remaining = total - index;
  const finished  = index >= total;

  React.useEffect(() => {
    fetch("manifest.json", { cache: "no-cache" })
      .then(r => r.ok ? r.json() : null)
      .then(m => {
        const digests = (m && m.digests) || [];
        const current = digestBasename(DIGEST_HREF);
        const idx = digests.findIndex(d => d.filename === current);
        const previous = idx >= 0 ? digests[idx + 1] : null;
        if (previous && previous.filename) setPreviousDigestHref(swipeHrefForDigest(previous.filename));
      })
      .catch(() => {});
  }, []);

  // Dismiss the current top card: renders FlyingCard overlay, immediately advances stack.
  const dismiss = React.useCallback((startDx = 0, startDy = 0) => {
    const article = ARTICLES[index];
    setFlyingCard({ article, startDx, startDy });
    setIndex(i => i + 1);
    setTopFlipped(false);
    setTimeout(() => setFlyingCard(null), 450);
  }, [index]);

  const advance = React.useCallback(() => dismiss(0, 0), [dismiss]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (finished) return;
      if (e.key === "ArrowLeft")  advance();
      if (e.key === "ArrowRight") { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [finished, advance]);

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <Nav index={index} total={total} />
      {finished ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
          <div style={{ background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8, padding: "48px 40px", textAlign: "center", maxWidth: 460, width: "100%" }}>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.18em", marginBottom: 16 }}>// QUEUE EMPTY</div>
            <h2 style={{ fontFamily: "'IBM Plex Sans', sans-serif", fontWeight: 500, fontSize: 24, marginBottom: 10 }}>You're caught up.</h2>
            <p style={{ color: "var(--text2)", fontSize: 13, lineHeight: 1.7, marginBottom: 24 }}>
              All {total} articles in the {TIME_WINDOW} window have been triaged.
            </p>
            <button onClick={() => { setIndex(0); setGeneration(g => g + 1); }}
              style={{ all: "unset", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "var(--cyan)", letterSpacing: "0.08em", padding: "10px 20px", border: "1px solid color-mix(in oklch, var(--cyan) 35%, transparent)", borderRadius: 2, background: "color-mix(in oklch, var(--cyan) 8%, transparent)" }}>
              &#8635; REVIEW AGAIN
            </button>
            <div style={{ display: "flex", justifyContent: "center", flexWrap: "wrap", gap: 12, marginTop: 20 }}>
              {previousDigestHref && (
                <a href={previousDigestHref} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--cyan)" }}>
                  PREVIOUS DIGEST &#8594;
                </a>
              )}
              <a href={ARCHIVE_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                ARCHIVE INDEX
              </a>
              <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
                LIST VIEW
              </a>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px 16px", minHeight: 0 }}>
          <div style={{ maxWidth: 520, margin: "0 auto 16px", width: "100%", flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <span className="section-label">TRIAGE QUEUE</span>
              <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.06em" }}>
                {remaining} REMAINING · {index} CLEARED
              </span>
            </div>
            <div className="progress-bar"><div style={{ width: ((index / total) * 100) + "%" }} /></div>
          </div>

          <div className="card-stack">
            {flyingCard && (
              <FlyingCard
                article={flyingCard.article}
                startDx={flyingCard.startDx}
                startDy={flyingCard.startDy}
              />
            )}
            {ARTICLES.slice(index, index + 3).slice().reverse().map((article, revI, arr) => {
              const realDepth = arr.length - 1 - revI;
              return (
                <SwipeCard
                  key={article.n + "-" + generation}
                  article={article}
                  isTop={realDepth === 0}
                  depth={realDepth}
                  onDismiss={realDepth === 0 ? dismiss : undefined}
                  onFlipChange={realDepth === 0 ? setTopFlipped : undefined}
                />
              );
            })}
          </div>

          <div style={{ display: "flex", gap: 28, justifyContent: "center", alignItems: "center", marginTop: 16, flexShrink: 0 }}>
            <button className="pill-btn skip" onClick={advance} title="Mark as read (ArrowLeft)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </button>
            {!topFlipped && (
              <button className="pill-btn read" onClick={() => { if (window.__downlinkFlipTop) window.__downlinkFlipTop(); }} title="View details (ArrowRight)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            )}
          </div>

          <div style={{ marginTop: 12, textAlign: "center", flexShrink: 0 }}>
            <a href={DIGEST_HREF} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: "var(--text3)", letterSpacing: "0.08em", textDecoration: "none", borderBottom: "1px dotted var(--text3)" }}>
              &#8592; BACK TO LIST VIEW
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
