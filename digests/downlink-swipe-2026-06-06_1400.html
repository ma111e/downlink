<script type="application/json" id="dl-articles">[{"n":1,"title":"Critical Everest Forms Pro flaw exploited to take over WordPress sites","source":"bleepingcomputer.com","sourceColorIdx":10,"link":"https://www.bleepingcomputer.com/news/security/critical-everest-forms-pro-flaw-exploited-to-take-over-wordpress-sites/","time":"14:09","priority":"MUST READ","score":94,"tldr":"Hackers are actively exploiting a critical unauthenticated code execution flaw in Everest Forms Pro versions 1.9.12 and earlier to create rogue WordPress administrator accounts. Site owners should update immediately, check for suspicious admin users such as “diksimarina,” and review logs for compromise.","briefOverview":"\u003cp\u003eHackers are actively exploiting a critical vulnerability, CVE-2026-3300, in the Everest Forms Pro plugin for WordPress. The flaw affects versions 1.9.12 and earlier and can be exploited without authentication to execute arbitrary code on the server. The article says successful exploitation can let attackers take complete control of a WordPress website.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is in the plugin’s Complex Calculation feature, which inserts submitted form field values into a PHP code string and executes it with PHP’s \u003ccode\u003eeval()\u003c/code\u003e function. Although input is passed through \u003ccode\u003esanitize_text_field()\u003c/code\u003e, the article says this does not escape single quotes or other characters that can affect PHP syntax. Attackers can use this to inject PHP code that creates rogue administrator accounts.\u003c/p\u003e\n\n\u003cp\u003eWordfence telemetry shows the flaw is being exploited in the wild, including attempts to create an administrator account named “diksimarina.” The Everest Forms developer released a patch on March 18 after researcher h0xilo submitted the issue through Wordfence in February. Wordfence says active exploitation began on April 13 and that its firewall has blocked more than 29,300 attempts.\u003c/p\u003e\n","standardSynthesis":"\u003cp\u003eHackers are actively exploiting CVE-2026-3300, a critical flaw in the Everest Forms Pro WordPress plugin. The issue affects versions 1.9.12 and earlier and can be leveraged without authentication to execute arbitrary code on the server. Everest Forms Pro is a commercial add-on for the Everest Forms form builder plugin, which is used to create contact, registration, payment, and other custom application forms.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is located in the plugin’s Complex Calculation feature. According to the article, that feature accepts values submitted through form fields, inserts them into a PHP code string, and executes the resulting code using PHP’s \u003ccode\u003eeval()\u003c/code\u003e function. The article says submitted input is passed through \u003ccode\u003esanitize_text_field()\u003c/code\u003e, but that function does not escape single quotes or other characters that influence PHP syntax.\u003c/p\u003e\n\n\u003cp\u003eThis behavior allows an attacker to close the intended string, inject arbitrary PHP code, and comment out the rest of the generated code to avoid a syntax error. Wordfence reported that attackers submit a field value beginning with a single quote, followed by a PHP statement that calls \u003ccode\u003ewp_insert_user()\u003c/code\u003e to create a new administrator account. The reported malicious username is “diksimarina,” and the trailing \u003ccode\u003e//\u003c/code\u003e comment marker causes the remaining generated PHP code to be treated as a comment.\u003c/p\u003e\n\n\u003cp\u003eAdministrator-level access gives attackers broad control over a breached WordPress site. The article says attackers with that access can modify content, install plugins and themes, plant backdoors and webshells, and access private databases. Wordfence telemetry indicates the flaw is being exploited in the wild to create rogue administrator accounts.\u003c/p\u003e\n\n\u003cp\u003eResearcher h0xilo submitted CVE-2026-3300 through Wordfence in February, and the Everest Forms developer released a patch on March 18. Wordfence says active exploitation started on April 13 and that its firewall has blocked more than 29,300 attempts. Wordfence also says attempts primarily originate from 202.56.2[.]126 and 209.146.60.26, and it recommends defenders block them.\u003c/p\u003e\n\n\u003cp\u003eThe article recommends that website administrators review log files and administrator accounts for suspicious activity. It specifically highlights activity containing the string “diksimarina.” Wordfence’s report also provides several offending IP addresses as indicators of compromise.\u003c/p\u003e\n","comprehensiveSynthesis":"\u003ch2 id=\"overview\"\u003eOverview\u003c/h2\u003e\n\n\u003cp\u003eHackers are actively exploiting a critical vulnerability tracked as CVE-2026-3300 in the Everest Forms Pro plugin for WordPress. The flaw affects Everest Forms Pro versions 1.9.12 and earlier. According to the article, the vulnerability can be exploited without authentication to execute arbitrary code on the server.\u003c/p\u003e\n\n\u003cp\u003eEverest Forms Pro is described as a commercial add-on for the WordPress form builder plugin Everest Forms. The plugin is used to create contact, registration, payment, and other custom application forms. The article says exploitation of the flaw can allow attackers to take complete control of a WordPress website.\u003c/p\u003e\n\n\u003ch2 id=\"technical-details\"\u003eTechnical Details\u003c/h2\u003e\n\n\u003cp\u003eThe vulnerability is in the plugin’s Complex Calculation feature. The article explains that this feature accepts values submitted through form fields and inserts them into a PHP code string. The resulting code is then executed using PHP’s \u003ccode\u003eeval()\u003c/code\u003e function.\u003c/p\u003e\n\n\u003cp\u003eAlthough submitted input is passed through \u003ccode\u003esanitize_text_field()\u003c/code\u003e, the article says this function does not escape single quotes or other characters that influence PHP syntax. As a result, an attacker can close the intended string, inject arbitrary PHP code, and comment out the remaining generated code. This lets the attacker achieve code execution on the server.\u003c/p\u003e\n\n\u003cp\u003eWordfence describes an observed exploitation method in which the attacker submits a value for a text field that begins with a single quote. That quote closes the wrapping string literal. The attacker then includes a PHP statement that calls \u003ccode\u003ewp_insert_user()\u003c/code\u003e to create a new administrator account.\u003c/p\u003e\n\n\u003cp\u003eThe article says the observed malicious administrator username is “diksimarina.” Wordfence explains that a trailing \u003ccode\u003e//\u003c/code\u003e comment marker ensures the rest of the generated PHP code, including the closing quote, is treated as a comment and does not cause a syntax error. When the form is processed and the calculation is evaluated, the injected PHP code is executed and the malicious administrator account is created.\u003c/p\u003e\n\n\u003ch2 id=\"impact\"\u003eImpact\u003c/h2\u003e\n\n\u003cp\u003eThe article says administrator-level access gives attackers full power to perform high-risk actions on a breached website. These actions include:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003eModifying website content.\u003c/li\u003e\n\u003cli\u003eInstalling plugins and themes.\u003c/li\u003e\n\u003cli\u003ePlanting backdoors and webshells.\u003c/li\u003e\n\u003cli\u003eAccessing private databases.\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eWordfence telemetry shows the vulnerability is being exploited in the wild to create rogue administrator accounts. The article frames this as a path to complete takeover of affected WordPress websites.\u003c/p\u003e\n\n\u003ch2 id=\"discovery-patch-and-exploitation-timeline\"\u003eDiscovery, Patch, and Exploitation Timeline\u003c/h2\u003e\n\n\u003cp\u003eResearcher h0xilo submitted CVE-2026-3300 through Wordfence in February. The Everest Forms developer released a patch addressing the issue on March 18.\u003c/p\u003e\n\n\u003cp\u003eAccording to Wordfence data cited in the article, active exploitation started on April 13. Wordfence says its firewall has blocked more than 29,300 exploitation attempts.\u003c/p\u003e\n\n\u003ch2 id=\"indicators-and-defensive-recommendations\"\u003eIndicators and Defensive Recommendations\u003c/h2\u003e\n\n\u003cp\u003eWordfence says exploitation attempts originate primarily from two IP addresses:\u003c/p\u003e\n\n\u003cul\u003e\n\u003cli\u003e202.56.2[.]126\u003c/li\u003e\n\u003cli\u003e209.146.60.26\u003c/li\u003e\n\u003c/ul\u003e\n\n\u003cp\u003eThe article says Wordfence recommends that defenders block those IP addresses. It also notes that Wordfence’s report provides several offending IP addresses as indicators of compromise.\u003c/p\u003e\n\n\u003cp\u003eWebsite administrators are recommended to review log files and administrator accounts for suspicious activity. The article specifically calls out the string “diksimarina” as something administrators should look for during review.\u003c/p\u003e\n\n\u003ch2 id=\"parties-mentioned\"\u003eParties Mentioned\u003c/h2\u003e\n\n\u003cp\u003eThe affected product is Everest Forms Pro, a commercial add-on for Everest Forms on WordPress. The vulnerability was submitted by researcher h0xilo through Wordfence. Wordfence provided telemetry showing active exploitation, details about the observed exploit behavior, exploitation volume, and indicators of compromise.\u003c/p\u003e\n\n\u003cp\u003eThe article does not name a specific threat actor group. It describes the exploitation as being carried out by hackers and attackers.\u003c/p\u003e\n","keyPoints":["Hackers are actively exploiting CVE-2026-3300, a critical vulnerability in Everest Forms Pro versions 1.9.12 and earlier, to take complete control of WordPress websites.","The vulnerability exists in the plugin’s Complex Calculation feature, where submitted form values are inserted into a PHP code string and executed with PHP’s eval() function.","Wordfence telemetry shows attackers are exploiting the flaw to create rogue administrator accounts, including one with the username “diksimarina.”","The Everest Forms developer released a patch for CVE-2026-3300 on March 18 after researcher h0xilo submitted the vulnerability through Wordfence in February.","Wordfence reported that active exploitation began on April 13 and that its firewall has blocked more than 29,300 exploitation attempts."],"insights":["The attempted payloads leave a concrete investigation clue because Wordfence observed attackers creating an administrator account with the username “diksimarina,” which site owners can search for in admin accounts and logs.","Although the plugin applied sanitize_text_field(), the article notes this did not escape single quotes or other PHP syntax-affecting characters, showing that the existing sanitization was insufficient for code evaluated with eval().","Wordfence identified two primary source IP addresses, 202.56.2[.]126 and 209.146.60.26, giving defenders specific addresses to block in addition to applying the patch.","There was a gap between the March 18 patch release and the April 13 start of observed exploitation, making unpatched sites especially important to review even if no compromise is immediately visible."],"referencedReports":[{"title":"Attackers Actively Exploiting Critical Vulnerability in Everest Forms Pro Plugin","url":"https://www.wordfence.com/blog/2026/06/attackers-actively-exploiting-critical-vulnerability-in-everest-forms-pro-plugin/","publisher":"Wordfence","context":"The article cites a Wordfence report explaining how attackers exploit CVE-2026-3300 to create a malicious WordPress administrator account and providing exploitation telemetry and IOCs.","category":"","primary":false}],"body":"\u003cp\u003eHackers are actively exploiting a critical vulnerability, CVE-2026-3300, in the Everest Forms Pro plugin for WordPress. The flaw affects versions 1.9.12 and earlier and can be exploited without authentication to execute arbitrary code on the server. The article says successful exploitation can let attackers take complete control of a WordPress website.\u003c/p\u003e\n\n\u003cp\u003eThe vulnerability is in the plugin’s Complex Calculation feature, which inserts submitted form field values into a PHP code string and executes it with PHP’s \u003ccode\u003eeval()\u003c/code\u003e function. Although input is passed through \u003ccode\u003esanitize_text_field()\u003c/code\u003e, the article says this does not escape single quotes or other characters that can affect PHP syntax. Attackers can use this to inject PHP code that creates rogue administrator accounts.\u003c/p\u003e\n\n\u003cp\u003eWordfence telemetry shows the flaw is being exploited in the wild, including attempts to create an administrator account named “diksimarina.” The Everest Forms developer released a patch on March 18 after researcher h0xilo submitted the issue through Wordfence in February. Wordfence says active exploitation began on April 13 and that its firewall has blocked more than 29,300 attempts.\u003c/p\u003e\n"}]</script>
